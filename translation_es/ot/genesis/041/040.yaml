review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la línea del English POB: autoridad sobre la casa, obediencia al mandato de José, y la única superioridad restante de Faraón en relación con el trono. Sin embargo, la nota al pie en español está formulada de manera poco natural y con comillas/puntuación defectuosas; además, «sobre mi casa» es aceptable pero algo rígido en español bíblico actual, y «estarás» puede mejorarse a «serás» para reflejar mejor función/cargo.'
  spanish_quality_summary: 'El texto es comprensible y mayormente natural, pero requiere un ajuste menor para mayor dignidad y fluidez en español: «serás sobre mi casa» mantiene mejor la relación con el hebreo sin sonar tan temporal como «estarás», y la nota necesita corrección estilística. El resto del versículo es claro y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. Las decisiones «mandato», «obedecerá», «trono» y «mi pueblo» concuerdan con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: La nota al pie en español está mal puntuada y suena poco natural.
    rationale: 'El texto actual comienza con una comilla innecesaria y dice «en tu boca todo mi pueblo besará», calco poco idiomático. Debe presentarse como cita literal hebrea más clara: «y a tu boca besará todo mi pueblo», seguida de la explicación idiomática.'
  - severity: low
    issue: «Tú estarás sobre mi casa» suena algo menos idiomático para un nombramiento oficial.
    rationale: Aunque fiel, «estarás» puede percibirse como estado temporal más que investidura. «Tú serás sobre mi casa» conserva la cercanía formal y funciona mejor en registro bíblico digno.
  revised_spanish_text: Tú serás sobre mi casa[a], y todo mi pueblo obedecerá tu mandato. Solo en cuanto al trono seré mayor que tú.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y a tu boca besará todo mi pueblo». La expresión suele entenderse aquí como obedecer o rendir homenaje al mandato de José.'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor: se mejora la naturalidad y el tono del verbo principal («serás»), y se corrige la nota al pie para que exprese con claridad la alternativa literal preservada por el English POB, sin calco torpe ni problemas de puntuación.'
