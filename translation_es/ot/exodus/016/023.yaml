translation:
  language: es
  text: 'Y les dijo: «Esto es lo que Yahvé ha hablado: Mañana será un reposo solemne, un sábado santo[a] para Yahvé. Lo que vayan a hornear, hornéenlo; y lo que vayan a cocer, cuézanlo; y todo lo que sobre, apártenlo para ustedes, para guardarlo hasta la mañana».


    [a] O: «un sábado consagrado a Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sábado consagrado a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y les habló
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce discurso directo de manera simple; «les dijo» conserva esa función sin añadir matices innecesarios. Se mantiene el objeto indirecto «les» para reflejar אֲלֵהֶם.
- source_word: הוּא אֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: This is what Yahweh has spoken
  chosen_spanish: Esto es lo que Yahvé ha hablado
  alternatives_spanish:
  - Esto es lo que Yahvé dijo
  - Esto es lo que Yahvé ha dicho
  lexicon: HALOT
  rationale: La construcción apunta a una declaración ya dada y vigente; «ha hablado» conserva el valor perfecto y la solemnidad. «Esto es lo que» reproduce bien el carácter deíctico de הוּא אֲשֶׁר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el Nombre divino. No se usa «SEÑOR» porque el texto hebreo tiene el Tetragrámaton de manera directa.
- source_word: שַׁבָּת֧וֹן
  english_pob_choice: a solemn rest
  chosen_spanish: un solemne reposo
  alternatives_spanish:
  - un reposo solemne
  - un descanso solemne
  - un cese solemne
  lexicon: HALOT
  rationale: «Reposo» expresa mejor en español el matiz cultual y ritual de cese especial que un simple «descanso». «Solemne» conserva la intensidad marcada del sustantivo.
- source_word: שַׁבַּת קֹדֶשׁ לַיהוָה
  english_pob_choice: a holy Sabbath to Yahweh
  chosen_spanish: un santo sábado para Yahvé
  alternatives_spanish:
  - un sábado santo para Yahvé
  - un sábado sagrado para Yahvé
  lexicon: HALOT
  rationale: «Santo sábado» respeta la apposición del hebreo sin recurrir a formulación eclesiástica ajena al texto. «Para Yahvé» mantiene la orientación cultual del día.
- source_word: מָחָר
  english_pob_choice: Tomorrow is
  chosen_spanish: Mañana será
  alternatives_spanish:
  - Mañana es
  - Mañana
  lexicon: HALOT
  rationale: En español, la frase nominal hebrea fluye mejor con un futuro copulativo implícito; «será» mantiene la referencia temporal y el tono declarativo.
- source_word: אֵת אֲשֶׁר תֹּאפ֞וּ אֵפ֗וּ
  english_pob_choice: What you will bake, bake
  chosen_spanish: Lo que van a hornear, háganlo
  alternatives_spanish:
  - Lo que vayan a hornear, háganlo
  - Lo que hornearán, horneen
  lexicon: HALOT
  rationale: El hebreo repite el verbo para énfasis. En español, «lo que van a hornear, háganlo» conserva la repetición funcional con un imperativo natural. Se prefiere «hornear» por ser el verbo más preciso y digno en este contexto.
- source_word: וְאֵת אֲשֶׁר תְּבַשְּׁלוּ בַּשֵּׁלוּ
  english_pob_choice: and what you will boil, boil
  chosen_spanish: y lo que van a cocer, cózcanlo
  alternatives_spanish:
  - y lo que van a hervir, hiérvanlo
  - y lo que van a cocinar, cocínenlo
  lexicon: HALOT
  rationale: בשל puede abarcar «cocer/cocinar», pero en español «cocer» es lo suficientemente amplio y concreto para la preparación de alimentos. «Cózcanlo» refleja la repetición enfática del verbo hebreo.
- source_word: כָּל הָעֹדֵף
  english_pob_choice: all that is left over
  chosen_spanish: todo lo que sobre
  alternatives_spanish:
  - todo el sobrante
  - todo lo que quede
  lexicon: HALOT
  rationale: La expresión española breve y natural «todo lo que sobre» expresa el remanente después de preparar la comida. Mantiene el valor de excedente sin añadir interpretación.
- source_word: הַנִּיחוּ לָכֶם
  english_pob_choice: set aside for yourselves
  chosen_spanish: déjenlo para ustedes
  alternatives_spanish:
  - sepárenlo para ustedes
  - apártenlo para ustedes
  - déjenlo aparte para ustedes
  lexicon: HALOT
  rationale: El hiphil de נוח implica dejar/poner aparte. «Déjenlo para ustedes» comunica de modo claro y directo la reserva intencional y conserva לָכֶם.
- source_word: לְמִשְׁמֶרֶת
  english_pob_choice: to be kept
  chosen_spanish: para guardarlo
  alternatives_spanish:
  - para conservarlo
  - para que se guarde
  - como cosa guardada
  lexicon: HALOT
  rationale: El sustantivo denota algo puesto bajo custodia o preservación. En español, «para guardarlo» suena natural y mantiene la finalidad sin tecnicismo innecesario.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until the morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta por la mañana
  lexicon: HALOT
  rationale: La frase temporal se traduce de forma directa y fluida. «La mañana» conserva el artículo del hebreo y mantiene el ritmo de la instrucción.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. La política del proyecto pide «Yahvé» en el texto principal, en lugar de la sustitución tradicional «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Caracterización del día: שַׁבָּתוֹן / שַׁבַּת קֹדֶשׁ'
  english_pob_reading: a solemn rest, a holy Sabbath to Yahweh
  chosen_spanish_reading: un solemne reposo, un santo sábado para Yahvé
  alternative_spanish_readings:
  - un reposo solemne, un sábado santo para Yahvé
  - un descanso solemne, un sábado sagrado para Yahvé
  rationale: 'Se mantiene la doble caracterización: cese ritual intenso y día consagrado. «Reposo» y «santo sábado» preservan la fuerza cultual sin borrar la tensión entre descanso común y santidad ritual.'
  doctrine_reference: Lexical theology of Sabbath holiness in Exodus 16:23
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto base y el audit trail inglés; la principal decisión revisada es la conservación de la repetición enfática hebrea en español sin convertirla en una paráfrasis más libre. También se ajustó el tono para que sea publicable en español bíblico contemporáneo sin recurrir a «SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino en coherencia con el proyecto.
  - Se conserva la repetición verbal enfática del hebreo en los dos mandatos de preparación.
  - «Reposo» se usa para שַׁבָּתוֹן por su matiz cultual, no meramente como descanso físico.
  - La formulación evita la sustitución tradicional «sábado santo» como único equivalente, dejando la alternativa en nota.
