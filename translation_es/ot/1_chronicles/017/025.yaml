translation:
  language: es
  text: Porque tú, mi Dios, has revelado[a] a tu siervo que le edificarás una casa[b]; por eso tu siervo ha hallado ánimo para orar delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘has descubierto el oído de tu siervo’, un modismo que significa ‘has revelado a tu siervo’.
    reason: lexical_alternative
  - marker: b
    text: O ‘establecerás una dinastía para él’; ‘casa’ aquí probablemente incluye la idea de un linaje real duradero además de una vivienda o casa real.
    reason: alternative_reading
lexical_decisions:
- source_word: גָּלִיתָ אֶת אֹזֶן עַבְדְּךָ
  english_pob_choice: have revealed to your servant
  chosen_spanish: has revelado a tu siervo
  alternatives_spanish:
  - has descubierto el oído de tu siervo
  - has dado a conocer a tu siervo
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de ‘descubrir el oído’, que en español suena extraño si se traslada mecánicamente. La fórmula ‘has revelado a tu siervo’ conserva el sentido de comunicación divina y mantiene la dignidad del registro orante.
- source_word: לִבְנוֹת לוֹ בָּיִת
  english_pob_choice: that you will build him a house
  chosen_spanish: que le edificarás una casa
  alternatives_spanish:
  - que le construirás una casa
  - que establecerás una casa para él
  lexicon: HALOT
  rationale: Se mantiene ‘casa’ para respetar la imagen hebrea y su doble alcance en el contexto davídico, sin resolver de antemano la referencia dinástica. ‘Edificarás’ sigue de cerca el verbo de la fuente y suena natural en español bíblico contemporáneo.
- source_word: בָּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - dinastía
  - linaje
  lexicon: HALOT
  rationale: ‘Casa’ conserva la metáfora central del texto fuente y permite el doble sentido entre casa física y casa real. ‘Dinastía’ explicita una interpretación legítima pero más cerrada, por eso queda como alternativa.
- source_word: מָצָא ... לְהִתְפַּלֵּל
  english_pob_choice: has found courage to pray
  chosen_spanish: ha hallado ánimo para orar
  alternatives_spanish:
  - ha encontrado valor para orar
  - ha hallado en su corazón orar
  lexicon: HALOT
  rationale: El hebreo expresa haber ‘hallado’ una disposición interior para actuar; en español, ‘ha hallado ánimo’ reproduce esa idea de resolución o valentía sin forzar el modismo. ‘Orar’ mantiene el registro reverente del contexto.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: ‘Delante de ti’ es una equivalencia natural en español y conserva la relación personal y litúrgica de la oración. ‘En tu presencia’ es una alternativa válida, pero algo más explicativa.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: En este contexto de plegaria real, ‘siervo’ mantiene el tono deferente y reconocido por la POB en usos contextuales similares. ‘Esclavo’ sería demasiado duro para el registro devocional, aunque el trasfondo de sujeción queda implícito.
theological_decisions:
- issue: Sentido de בָּיִת en la promesa davídica
  english_pob_reading: Retain 'house' in the main text and allow the dynastic sense to remain implicit
  chosen_spanish_reading: Mantener ‘casa’ en el texto principal y dejar implícito el sentido dinástico
  alternative_spanish_readings:
  - traducir explícitamente ‘dinastía’
  - especificar ‘linaje’
  rationale: El hebreo conserva deliberadamente la ambigüedad entre una casa literal y una casa real/perpetua. El español puede sostener esa tensión con ‘casa’ sin perder inteligibilidad, evitando cerrar el sentido más de lo que exige la fuente.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el acuerdo con el control cruzado fue alto; por eso este borrador conserva la solución auditable del POB en inglés y la expresa en español con la misma tensión lexical/dinástica.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa ‘siervo’ en vez de ‘esclavo’ por el registro orante real y la decisión auditada del POB para este contexto.
  - Se preserva ‘casa’ sin resolverla como ‘dinastía’ en el texto principal para respetar la ambigüedad del hebreo.
  - ‘Orar’ se emplea para reflejar el infinitivo de plegaria en un contexto de súplica formal.
