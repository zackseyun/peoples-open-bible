translation:
  language: es
  text: La luz en su tienda se oscurece, y su lámpara sobre él[a] se apaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «encima de él». La preposición hebrea puede indicar posición sobre o encima de alguien; la imagen probablemente presenta la lámpara alumbrando por encima del malvado.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֭וֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  lexicon: HALOT
  rationale: אור designa luz de manera concreta; en español, «luz» conserva la imagen poética y es natural en este contexto.
- source_word: חָשַׁךְ
  english_pob_choice: grows dark
  chosen_spanish: se oscurece
  alternatives_spanish:
  - se vuelve oscura
  - queda oscura
  lexicon: HALOT
  rationale: El verbo expresa un volverse oscuro; «se oscurece» conserva bien el matiz inceptivo/resultativo que la POB inglesa captó con «grows dark».
- source_word: בְּאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: en su tienda
  alternatives_spanish:
  - en su morada
  - en su casa
  lexicon: HALOT
  rationale: אָהֶל significa literalmente «tienda». Se mantiene la imagen hebrea, que en poesía puede referirse al hogar o morada.
- source_word: וְנֵרוֹ
  english_pob_choice: and his lamp
  chosen_spanish: y su lámpara
  alternatives_spanish:
  - y su luz
  lexicon: HALOT
  rationale: נֵר nombra una lámpara concreta; «lámpara» preserva el paralelismo material con la primera cola.
- source_word: עָלָיו
  english_pob_choice: above him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - por encima de él
  lexicon: HALOT
  rationale: La preposición עַל puede significar «sobre/encima de». «Sobre él» es breve y natural en español, y conserva la imagen espacial de la lámpara situada arriba.
- source_word: יִדְעָךְ
  english_pob_choice: is extinguished
  chosen_spanish: se apaga
  alternatives_spanish:
  - es extinguida
  - se extingue
  lexicon: HALOT
  rationale: El verbo se usa de una llama o lámpara que deja de arder. «Se apaga» es idiomático y fiel; «se extingue» sería más formal, pero menos natural en este paralelismo.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones sustantivas; se mantiene el sentido poético y la equivalencia óptima sin cambios relevantes respecto del contexto fuente.
  spanish_consistency_notes:
  - Se preserva «tienda» para אָהֶל, en continuidad con el valor literal hebreo y la POB inglesa.
  - Se usa «lámpara» para נֵר, no «luz», para respetar la concreción del paralelismo.
  - Se evita una paráfrasis más interpretativa como «se apaga su prosperidad» porque el hebreo habla de luz y lámpara en una imagen doméstica.
  - La puntuación sigue la cadencia poética del bicola hebreo.
