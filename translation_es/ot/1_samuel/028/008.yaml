  to: 'Así que Saúl se disfrazó y se puso ropa[a] distinta, y fue él, junto con dos hombres. Llegaron a la mujer de noche, y él le dijo: «Por favor, adivina para mí por medio de una médium[b], y haz subir para mí al que yo te diga».'
  rationale: Se corrigió «medium» a «médium» por norma y claridad en español. Se simplificó «practica la adivinación para mí» a «adivina para mí» para seguir la revisión final del English POB y reflejar mejor el verbo hebreo en una forma natural. También se mejoró la frase de movimiento a «fue él, junto con dos hombres» para conservar el énfasis sin redundancia. Se mantuvo «haz subir» para preservar la imaginería hebrea y la tensión teológica del pasaje, y se retuvo la nota alternativa sobre «espíritu familiar».
