translation:
  language: es
  text: Pues, ¿quién confiará en un ladrón bien armado[a], que tropieza de ciudad en ciudad? Así le pasa al hombre que no tiene nido[b] y se aloja dondequiera que lo sorprende la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega literalmente significa «bien ceñido» o «bien equipado»; en contexto de un salteador, POB la vierte de forma dinámica como «bien armado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no tiene nido», una metáfora de no tener hogar establecido ni lugar seguro de descanso.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐζώνῳ
  english_pob_choice: well-armed
  chosen_spanish: bien armado
  alternatives_spanish:
  - bien ceñido
  - bien equipado
  - ceñido para la acción
  lexicon: LSJ
  rationale: El griego literalmente sugiere estar bien ceñido o equipado. En combinación con λῃστῇ, la idea es de preparación activa para una acción violenta; «bien armado» comunica esa fuerza en español actual sin volver opaca la imagen.
- source_word: λῃστῇ
  english_pob_choice: robber
  chosen_spanish: ladrón
  alternatives_spanish:
  - bandolero
  - brigante
  - salteador
  lexicon: BDAG
  rationale: El término puede abarcar más que un simple hurto y acercarse a bandido o salteador. En español, «ladrón» es claro y natural, y aquí mantiene el sentido criminal del proverbio; se evita «siervo» o términos eclesiásticos que no corresponden.
- source_word: σφαλλομένῳ
  english_pob_choice: stumbling
  chosen_spanish: que tropieza
  alternatives_spanish:
  - que vacila
  - que va tambaleando
  - que anda errante
  lexicon: LSJ
  rationale: El participio expresa inestabilidad, tropiezo o desvío. «Que tropieza» conserva la imagen de inseguridad y movimiento fallido mejor que una solución más abstracta.
- source_word: νοσσιὰν
  english_pob_choice: nest
  chosen_spanish: nido
  alternatives_spanish:
  - hogar
  - morada
  - refugio
  lexicon: LSJ
  rationale: La palabra es literalmente «nido» y funciona aquí como metáfora de un lugar fijo y seguro. «Nido» preserva la imagen viva del original mejor que suavizarla con «hogar».
- source_word: καταλύοντι
  english_pob_choice: lodges
  chosen_spanish: se aloja
  alternatives_spanish:
  - se hospeda
  - se queda
  - pernocta
  lexicon: BDAG
  rationale: El verbo denota alojarse o detenerse, a menudo por la noche. «Se aloja» suena natural en español y conserva la idea de estancia provisional.
- source_word: οὗ ἐὰν ὀψίσῃ
  english_pob_choice: wherever evening finds him
  chosen_spanish: dondequiera que lo sorprende la tarde
  alternatives_spanish:
  - dondequiera que lo alcance la tarde
  - dondequiera que anochezca
  - dondequiera que llegue la noche
  lexicon: LSJ
  rationale: La cláusula es idiomática y se relaciona con el ocaso. «Lo sorprende la tarde» mantiene el matiz de ser alcanzado por la llegada del tiempo de reposo sin volverlo rígidamente literal.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa singular masculino representativo dentro de un dicho sapiencial. «El hombre» conserva esa forma proverbial en español y resulta fluido en el contexto.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el criterio del POB inglés. La principal decisión fue mantener el metafórico «nido» en español, como hizo el inglés, y expresar la clausula temporal con una equivalencia natural («dondequiera que lo sorprende la tarde») para conservar el movimiento idiomático del original.
  spanish_consistency_notes:
  - Se mantuvo un registro proverbial y sobrio, sin expandir el paralelismo más allá de lo que el griego permite.
  - No se introdujo terminología eclesiástica tradicional; el lenguaje sigue el campo semántico del texto sapiencial.
  - «Nido» conserva la metáfora animal del original y evita una domesticación excesiva a «hogar» o «casa».
