translation:
  language: es
  text: Yahvé[a], he oído el reporte acerca de ti; me llené de reverente temor[b]. Yahvé, revive tu obra en medio de los años; en medio de los años dala a conocer[c]; en la ira[d], recuerda la misericordia[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu fama' o 'lo que se ha oído de ti'. La expresión hebrea se refiere a lo que se ha escuchado acerca de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O 'temí' / 'me asusté'. El hebreo puede expresar temor o reverente asombro.
    reason: lexical_alternative
  - marker: c
    text: O 'presérvala con vida' o 'renuévala'. El hebreo dice literalmente 'hazla vivir'.
    reason: lexical_alternative
  - marker: d
    text: O 'en turbación' o 'en furor'.
    reason: lexical_alternative
  - marker: e
    text: 'Hebreo: ''recuerda compasión'' o ''recuerda tener misericordia''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del pacto en transliteración española, conforme al criterio del proyecto, en vez de ocultarlo con una convención tipográfica.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  lexicon: HALOT
  rationale: El perfecto hebreo puede verterse en presente perfecto o pasado simple. 'He oído' conserva la inmediatez orante y suena natural en español.
- source_word: שִׁמְעֲךָ
  english_pob_choice: the report of you
  chosen_spanish: tu noticia
  alternatives_spanish:
  - tu reporte
  - tu fama
  - lo que se ha oído de ti
  lexicon: HALOT
  rationale: El sustantivo derivado de שמע puede significar noticia, informe o lo oído acerca de alguien. 'Tu noticia' comunica el contenido recibido sobre Yahvé sin reducirlo solo a prestigio o fama.
- source_word: יָרֵאתִי
  english_pob_choice: I stand in awe
  chosen_spanish: me llené de reverente temor
  alternatives_spanish:
  - temí
  - me dio miedo
  - me sobrecogí de temor reverente
  lexicon: HALOT
  rationale: En este contexto de oración y adoración, se preserva la tensión entre temor y reverencia sin bajar el verbo a mero pánico. 'Reverente temor' refleja bien la ambivalencia semántica.
- source_word: פָּעָלְךָ
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - tu hecho
  - tu acción
  lexicon: HALOT
  rationale: '''Obra'' es un equivalente amplio y digno para las acciones poderosas de Dios, y encaja mejor que ''trabajo'' en el registro bíblico español.'
- source_word: בְּקֶרֶב שָׁנִים
  english_pob_choice: in the midst of the years
  chosen_spanish: en medio de los años
  alternatives_spanish:
  - dentro de los años
  - en estos años
  - en el transcurso de los años
  lexicon: HALOT
  rationale: Se conserva el giro poético hebreo con una frase española natural y formal, sin interpretar demasiado el período aludido.
- source_word: חַיֵּהוּ
  english_pob_choice: revive
  chosen_spanish: revive
  alternatives_spanish:
  - devuélvele la vida
  - renuévala
  - presérvala con vida
  lexicon: HALOT
  rationale: El piel imperativo de חיה con sufijo apunta a hacer vivir de nuevo. 'Revive' mantiene la imagen vital y funciona bien con 'tu obra'.
- source_word: תּוֹדִיעַ
  english_pob_choice: make it known
  chosen_spanish: hazla conocer
  alternatives_spanish:
  - dásela a conocer
  - manifiéstala
  - hazlo saber
  lexicon: HALOT
  rationale: El hifil de ידע significa 'hacer conocer'. En español, 'hazla conocer' suena natural y conserva la transitividad de la forma hebrea.
- source_word: בְּרֹגֶז
  english_pob_choice: in wrath
  chosen_spanish: en la ira
  alternatives_spanish:
  - en el furor
  - en el tumulto
  - en la indignación
  lexicon: HALOT
  rationale: '''Ira'' expresa con sobriedad el posible matiz de enojo divino y permite mantener la fuerza del contraste con la petición de misericordia.'
- source_word: רַחֵם
  english_pob_choice: mercy
  chosen_spanish: la misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: HALOT
  rationale: Después de 'recuerda', el sustantivo español 'misericordia' reproduce de modo idiomático la idea verbal hebrea 'tener compasión / mostrar misericordia'.
- source_word: תִּזְכּוֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  - trae a la memoria
  lexicon: HALOT
  rationale: '''Recuerda'' es la correspondencia directa y mantiene la forma imperativa de la súplica.'
theological_decisions:
- issue: La respuesta de Habacuc al oír el relato sobre Yahvé
  english_pob_reading: reverential awe rather than mere terror
  chosen_spanish_reading: reverente temor más que miedo simple
  alternative_spanish_readings:
  - temor
  - miedo
  - pánico
  rationale: La frase española conserva la tensión teológica entre temor y adoración. No se diluye la reacción profética en una emoción meramente psicológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: El sentido de la petición sobre la obra de Dios
  english_pob_reading: a request that God renew/revive his historical saving work
  chosen_spanish_reading: una súplica para que Dios renueve y vuelva visible su obra salvadora en la historia
  alternative_spanish_readings:
  - que preserve viva su obra
  - que reactive su obra
  - que restaure su obra
  rationale: '''Revive'' y ''hazla conocer'' reflejan una petición sobre la intervención histórica de Dios, sin precisar en exceso qué acto concreto está en vista.'
  doctrine_reference: Primacía del hebreo original sobre la tradición interpretativa
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés sin traducirlo mecánicamente: mantiene Yahvé como nombre divino, conserva la tensión entre temor y adoración en יָרֵאתִי, y evita fijar de más el alcance de ''tu obra''. No se aplicaron revisiones adicionales respecto al último pase inglés.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Obra'' se prefirió a ''trabajo'' por registro bíblico y claridad en español.'
  - '''Hazla conocer'' refleja el hifil de ידע con transitividad explícita.'
  - Se preservó la ambigüedad de בְּרֹגֶז mediante 'ira' y nota alternativa.
  - Las notas a pie corresponden a todas las alternativas semánticas significativas preservadas por el POB inglés.
