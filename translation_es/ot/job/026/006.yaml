revisions:
- from: Desnudo está Seol[a] delante de él, y Abadón[b] no tiene cobertura.
  to: Seol[a] yace desnudo delante de él, y Abadón[b] no tiene cubierta.
  rationale: La revisión mantiene plenamente el sentido del hebreo y la auditoría inglesa, pero mejora la naturalidad y la fuerza poética en español. ‘Yace desnudo’ corresponde bien a la imagen de עָרוֹם predicado de Seol y armoniza con la alternativa inglesa ‘lies naked’. ‘Cubierta’ refleja mejor כְּסוּת que ‘cobertura’ en este contexto y preserva el paralelismo con ‘desnudo’. Se conservan las dos notas léxicas auditadas, con formulación española más natural.
