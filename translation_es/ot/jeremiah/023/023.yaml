review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la pregunta retórica, la fórmula profética y el uso de «Yahvé» para יהוה. Sin embargo, «de cerca / de lejos» en español suena menos natural y menos fiel al valor predicativo que el inglés auditado «who is near / who is far away» y el hebreo contrastivo de cercanía/lejanía. El sentido no es origen («de») sino condición o ubicación relativa.
  spanish_quality_summary: La redacción es comprensible, pero «un Dios de cerca ... un Dios de lejos» resulta algo forzada en español bíblico natural. «un Dios que está cerca ... un Dios que está lejos» preserva el paralelismo, suena más idiomático y evita ambigüedad. La puntuación con rayas parentéticas funciona bien.
  glossary_alignment: Alineado con la terminología del proyecto en «Yahvé» para יהוה y «Dios» para אֱלֹהֵי. No hay conflicto terminológico mayor; la revisión propuesta ajusta solo la expresión de cercanía/lejanía para reflejar mejor el hebreo y el rastro POB.
  issues:
  - severity: medium
    issue: «de cerca / de lejos» suena poco natural y ambiguo en español
    rationale: Aunque intenta reflejar el contraste espacial, en español «Dios de cerca» puede sugerir relación o procedencia, no el sentido predicativo «que está cerca». El hebreo y el inglés auditado apuntan a nearness/farness como contraste de presencia, no de origen.
  - severity: low
    issue: La nota al pie repite la construcción menos natural
    rationale: La alternativa y la explicación deberían acompañar la mejora idiomática en el texto principal para mantener consistencia interna y claridad al lector.
