translation:
  language: es
  text: y para prohibir los holocaustos[a] y los sacrificios y las libaciones[b] del santuario[c], y para profanar los sábados y las fiestas[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Holocaustos» conserva la idea de ofrendas totalmente consumidas por el fuego; también puede traducirse «ofrendas quemadas».
    reason: lexical_alternative
  - marker: b
    text: «Libaciones» es la forma española habitual para el rito de derramar una ofrenda líquida; también puede expresarse como «ofrendas de bebida».
    reason: lexical_alternative
  - marker: c
    text: La frase griega puede expresar exclusión del santuario o de su ámbito sagrado; por eso se traduce «del santuario». Algunas versiones suavizan el sentido como «en el santuario».
    reason: lexical_alternative
  - marker: d
    text: «Fiestas» también puede traducirse «festividades» o «festivales».
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλῦσαι
  english_pob_choice: to forbid
  chosen_spanish: prohibir
  alternatives_spanish:
  - impedir
  - vedar
  lexicon: LSJ
  rationale: El infinitivo expresa el contenido de la medida impuesta. En español, "prohibir" comunica mejor una prohibición oficial que una mera estorbación física.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas completamente quemadas
  - sacrificios quemados
  lexicon: LSJ
  rationale: El término griego designa ofrendas totalmente consumidas por el fuego. "Holocaustos" conserva esa fuerza cultual y es un equivalente tradicional en español bíblico, aunque más marcado que "ofrendas quemadas".
- source_word: θυσίας
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  - ofrecimientos
  lexicon: LSJ
  rationale: Es el término sacrificial general, distinto de los holocaustos y de las libaciones. "Sacrificios" mantiene la distinción ritual del texto.
- source_word: σπονδὴν
  english_pob_choice: drink offerings
  chosen_spanish: libaciones
  alternatives_spanish:
  - ofrendas de bebida
  - derramamientos rituales
  lexicon: LSJ
  rationale: Aunque el inglés prefiere "drink offerings" por claridad, en español "libaciones" es el término natural y preciso para este rito.
- source_word: ἐκ τοῦ ἁγιάσματος
  english_pob_choice: from the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - del santuario
  - fuera del santuario
  lexicon: LSJ
  rationale: Sigo la revisión inglesa que entendió ἐκ aquí como exclusión de la práctica del ámbito sagrado, no como mera procedencia espacial. En español, "en el santuario" expresa con naturalidad que allí quedaban prohibidas estas acciones.
- source_word: βεβηλῶσαι
  english_pob_choice: to profane
  chosen_spanish: profanar
  alternatives_spanish:
  - desecrar
  - contaminar
  lexicon: LSJ
  rationale: El verbo indica tratar como común o impuro. "Profanar" es el equivalente cultual más directo y sobrio en español.
- source_word: σάββατα
  english_pob_choice: Sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los sábados de reposo
  - los días de sábado
  lexicon: LSJ
  rationale: En español bíblico, el plural literal "sábados" resulta poco natural; "los sábados" comunica la observancia sabática general. Mantengo el artículo para reflejar el uso colectivo del plural griego.
- source_word: ἑορτάς
  english_pob_choice: feasts
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las festividades
  - las solemnidades
  lexicon: LSJ
  rationale: El término alude a días festivos religiosos. "Fiestas" es claro, breve y fiel al calendario sagrado, y conserva bien el paralelo con "los sábados".
theological_decisions:
- issue: Terminología cultual específica del templo
  english_pob_reading: Retain specific sacrificial categories rather than flattening them into generic worship language.
  chosen_spanish_reading: 'Conservar categorías concretas: holocaustos, sacrificios, libaciones, santuario, sábados y fiestas.'
  alternative_spanish_readings:
  - ofrendas y actos de culto
  - sacrificios y celebraciones religiosas
  rationale: El verso enumera prácticas rituales concretas que fueron suprimidas. Mantener los nombres específicos preserva la tensión histórica y religiosa del texto y evita diluir el ataque contra el sistema sacrificial de Israel.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente normalizó ὁλοκαυτώματα como «burnt offerings» y suavizó ἐκ τοῦ ἁγιάσματος a «in the sanctuary». La versión española sigue esa decisión funcionalmente, pero opta por «holocaustos» para preservar mejor la fuerza del término griego y por «en el santuario» para reflejar el sentido contextual de exclusión del culto allí.
  spanish_consistency_notes:
  - Se mantiene un registro cultual sobrio y consistente con la traducción de textos deuterocanónicos.
  - Se prefieren equivalentes españoles que preservan distinciones rituales del original.
  - No se usa «Señor» ni terminología no presente en el versículo.
  - Los artículos definidos ayudan a reflejar el valor colectivo de los plurales griegos sin forzar el español.
