translation:
  language: es
  text: el que levantó a un muerto de la muerte[a], y de Sheol, conforme a la voluntad de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «por la palabra del Altísimo». El testimonio hebreo lee «por la voluntad de Yahvé».'
    reason: textual_variant
lexical_decisions:
- source_word: המקים
  english_pob_choice: who raised up
  chosen_spanish: el que levantó
  alternatives_spanish:
  - el que resucitó
  - el que hizo levantarse
  - el que hizo subir
  lexicon: HALOT
  rationale: El participio causativo describe la acción de hacer volver a la vida. En español, «levantó» conserva la fuerza verbal y evita introducir de antemano una terminología técnica de resurrección que el contexto no exige.
- source_word: גוע
  english_pob_choice: a corpse
  chosen_spanish: un cadáver
  alternatives_spanish:
  - un muerto
  - un hombre muerto
  - uno que había muerto
  lexicon: HALOT
  rationale: La revisión inglesa optó por «corpse» por mayor precisión léxica frente a גוע. En español, «cadáver» refleja mejor esa concreción física que «un muerto», y mantiene el tono sobrio del pasaje.
- source_word: ממות
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de entre los muertos
  - fuera de la muerte
  - desde la muerte
  lexicon: HALOT
  rationale: La preposición מן con מות expresa separación; «de la muerte» conserva la relación directa con el hebreo y corresponde bien al paralelo griego ἐκ θανάτου.
- source_word: משאול
  english_pob_choice: and from Sheol
  chosen_spanish: y de Sheol
  alternatives_spanish:
  - y del sepulcro
  - y del Hades
  - y del mundo de los muertos
  lexicon: HALOT
  rationale: Se mantiene «Sheol» por ser el término hebreo del texto fuente y por preservar su campo conceptual propio sin reemplazarlo por un equivalente interpretativo.
- source_word: כרצון יהוה
  english_pob_choice: by the will of Yahweh
  chosen_spanish: conforme a la voluntad de Yahvé
  alternatives_spanish:
  - según la voluntad de Yahvé
  - por la voluntad de Yahvé
  - por el querer de Yahvé
  lexicon: HALOT
  rationale: El hebreo indica conformidad con la voluntad divina. «Conforme a» comunica bien esa relación normativa en español y conserva la lectura hebrea principal frente al paralelo griego.
- source_word: יהוה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  - Yahweh
  lexicon: HALOT
  rationale: Según la terminología del proyecto, el nombre divino se vierte «Yahvé» en el texto principal para ser transparente y evitar la sustitución por un título máscara.
theological_decisions:
- issue: Tensión textual entre el hebreo y el paralelo griego al final del verso
  english_pob_reading: by the will of Yahweh
  chosen_spanish_reading: conforme a la voluntad de Yahvé
  alternative_spanish_readings:
  - por la palabra del Altísimo
  - por la voluntad del Altísimo
  rationale: El hebreo disponible es el testimonio principal y habla de la voluntad de Yahvé; el griego paralelo dice «por la palabra del Altísimo». Se conserva la lectura hebrea en el cuerpo del texto y se deja constancia del paralelo en nota para no borrar la tensión documental.
  doctrine_reference: Primacía del idioma original y preservación transparente de variantes textuales.
translation_notes:
  revision_awareness: La forma española sigue la última revisión inglesa que prefirió «a corpse» para גוע, pero adapta esa precisión a un español natural y publicable con «un cadáver». Se mantiene la estructura formal del verso y la variante griega se conserva en nota, sin fusionar ambas lecturas en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva «Sheol» como transliteración, no se sustituye por «sepulcro» o «Hades» en el texto principal.
  - El tono es sobrio y bíblico, pero con español moderno; no se imita mecánicamente el orden del inglés.
  - La nota a refleja explícitamente la variante griega sin alterar el hilo principal hebreo.
