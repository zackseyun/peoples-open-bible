    text: El hebreo tiene el singular colectivo ‘este pueblo’ con verbos singulares en la cláusula final; el español conserva ese singular para reflejar la forma del texto.
    reason: cultural_note
  revision_rationale: Se ajusta ‘para que no’ a ‘no sea que’ para reflejar mejor la fuerza preventiva de פֶּן, se añade la nota faltante sobre el singular colectivo conforme al rastro auditado, y se mejora ligeramente la naturalidad y precisión de הַשְׁמֵן con ‘Embota’.
