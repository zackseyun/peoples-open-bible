    issue: «mandamientos del rey» para ταῖς τοῦ βασιλέως ἐντολαῖς
    rationale: Aunque posible, «mandamientos» en español bíblico suele asociarse más naturalmente con mandamientos divinos o principios morales. En este contexto de decretos reales, «órdenes» representa mejor la autoridad monárquica y coincide con la justificación léxica del POB en inglés.
  - severity: low
    issue: «gritaba» para ἐπιβοῶντος en esta línea de diálogo
    rationale: El participio describe el acto de clamar en introducción al discurso. En español narrativo, «clamó» o «gritó» suena más idiomático y más cercano al inglés auditado «cried out» que el imperfecto «gritaba».
