  - marker: c
    text: Hebrew “sons of Israel”; a standard covenantal designation for the people of Israel.
    reason: cultural_note
  - marker: d
    text: Or “a land that consumes its inhabitants.”
    reason: lexical_alternative
  - marker: e
    text: Or “men of stature,” referring here to impressive physical size.
    reason: lexical_alternative
