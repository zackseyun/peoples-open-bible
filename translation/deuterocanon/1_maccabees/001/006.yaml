translation:
  text: And he called his honored servants[a], who had been brought up with him from youth, and divided his kingdom among them while he was still alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally begins with 'his paides'; in this context the following descriptions ('honored,' 'brought up with him from youth') indicate trusted court companions rather than biological sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The verb straightforwardly means 'called' or 'summoned.' 'Called' is natural modern English and sufficiently covers the sense here without overstating formality.
- source_word: τοὺς παῖδας αὐτοῦ
  chosen: his honored companions
  alternatives:
  - his servants
  - his boys
  - his attendants
  lexicon: LSJ
  rationale: Although παῖς can mean 'child,' 'boy,' or 'servant,' the appositional modifiers τοὺς ἐνδόξους and τοὺς συνεκτρόφους αὐτοῦ ἀπὸ νεότητος indicate trusted court companions/nobles reared with him rather than biological sons. Rendering the phrase as a whole avoids the misleading sense 'his children.'
- source_word: ἐνδόξους
  chosen: honored
  alternatives:
  - glorious
  - distinguished
  - noble
  lexicon: LSJ
  rationale: The adjective denotes persons of high standing or distinction. 'Honored' communicates status in readable English; 'glorious' would sound overstated in this context.
- source_word: συνεκτρόφους
  chosen: companions, who had been brought up with him
  alternatives:
  - foster-brothers
  - those reared with him
  - boyhood companions
  lexicon: LSJ
  rationale: The term refers to those nourished or reared together with someone. Because English lacks a simple natural equivalent, the translation expands slightly to make the relationship clear while staying close to the Greek sense.
- source_word: ἀπὸ νεότητος
  chosen: from youth
  alternatives:
  - from his youth
  - since youth
  lexicon: LSJ
  rationale: This phrase marks the time from early life onward. 'From youth' is concise and idiomatic.
- source_word: διεῖλεν
  chosen: divided
  alternatives:
  - apportioned
  - distributed
  lexicon: BDAG
  rationale: The verb means to divide or distribute. 'Divided' is the most direct rendering in context of assigning rule.
- source_word: τὴν βασιλείαν αὐτοῦ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his realm
  lexicon: BDAG
  rationale: βασιλεία can denote reign, kingship, or kingdom. Here the object being divided among multiple recipients points to the territorial-political sense 'kingdom' rather than the abstract 'kingship.'
- source_word: ἔτι ζῶντος αὐτοῦ
  chosen: while he was still alive
  alternatives:
  - while he yet lived
  - during his lifetime
  lexicon: BDAG
  rationale: This genitive absolute emphasizes that the division occurred before his death. 'While he was still alive' is clear, natural, and preserves the temporal force.
