translation:
  language: es
  text: Tú aplastaste a Rahab[a] como a un caído; con tu poderoso brazo dispersaste a tus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab es un nombre poético que puede referirse a Egipto o a un monstruo o poder del caos vencido por Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: דִכִּאתָ
  english_pob_choice: crushed
  chosen_spanish: quebrantaste
  alternatives_spanish:
  - aplastaste
  - destrozaste
  lexicon: HALOT
  rationale: El verbo expresa un golpe devastador, de quebranto o trituración. «Quebrantaste» conserva la fuerza violenta y es claro en español sin sonar demasiado técnico o redundante con el símil siguiente.
- source_word: כֶחָלָל
  english_pob_choice: like one slain
  chosen_spanish: como a uno muerto
  alternatives_spanish:
  - como a uno caído
  - como a un muerto en batalla
  - como a un herido mortal
  lexicon: HALOT
  rationale: El hebreo usa una comparación con חָלָל, alguien muerto o abatido en combate. «Como a uno muerto» transmite el símil de forma natural en español y deja abierta la referencia bélica.
- source_word: רָהַב
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Egipto
  - monstruo del caos
  - poder del caos
  lexicon: HALOT
  rationale: 'Se mantiene el nombre poético Rahab en el texto principal para preservar la tensión interpretativa que documenta la tradición: posible referencia a Egipto o a una potencia caótica derrotada por Dios.'
- source_word: בִּזְרוֹעַ עֻזְּךָ
  english_pob_choice: with your mighty arm
  chosen_spanish: con tu poderoso brazo
  alternatives_spanish:
  - con tu brazo de poder
  - con el brazo de tu fuerza
  - por tu brazo poderoso
  lexicon: HALOT
  rationale: La expresión instrumental antropomórfica se vierte de manera natural como «con tu poderoso brazo», conservando la imagen corporal de fuerza divina y el sentido instrumental.
- source_word: פִּזַּרְתָּ
  english_pob_choice: scattered
  chosen_spanish: dispersaste
  alternatives_spanish:
  - esparciste
  - derrotaste y dispersaste
  - desparramaste
  lexicon: HALOT
  rationale: El verbo significa dispersar o esparcir. «Dispersaste» es preciso y mantiene el valor militar del contexto sin añadir una intensificación no presente en el hebreo.
- source_word: אוֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - a tus adversarios
  - a los que te odian
  lexicon: HALOT
  rationale: La forma posesiva plural se traduce de manera directa y sobria como «tus enemigos», fiel al registro del pasaje.
theological_decisions:
- issue: Identidad de Rahab en el contexto poético
  english_pob_reading: Retain 'Rahab' in the main text as a poetic proper name for the defeated cosmic/political foe.
  chosen_spanish_reading: Mantener «Rahab» en el texto principal como nombre poético del enemigo derrotado, sin resolverlo a «Egipto» ni a una figura monstruosa.
  alternative_spanish_readings:
  - Egipto
  - monstruo del caos
  - poder caótico
  rationale: El salmo emplea lenguaje elevado para celebrar la victoria soberana de Dios. Traducir prematuramente el nombre como «Egipto» o como una sola figura mítica cerraría una ambigüedad teológica y literaria que el texto conserva.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el consenso alto del control cruzado y mantiene la decisión de preservar Rahab como nombre poético.
  spanish_consistency_notes:
  - Se conservó el registro poético y bélico del hebreo sin suavizar la violencia del verbo principal.
  - «Poderoso brazo» sigue de cerca la imagen antropomórfica del original y la opción inglesa auditada.
  - La nota sobre Rahab preserva la ambigüedad interpretativa documentada por la traducción inglesa y evita fijar una sola identificación.
  - Se prefirió «dispersaste» frente a «esparciste» por su tono ligeramente más formal y su buena correspondencia con el contexto militar.
