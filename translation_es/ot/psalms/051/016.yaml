translation:
  language: es
  text: Líbrame de la culpa de sangre[a], oh, Dios, Dios de mi salvación, y mi lengua cantará con júbilo tu rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la sangre derramada» o «de la sanguinaria culpa»; el hebreo dice literalmente «de sangres», un modismo que a menudo se refiere a culpa por derramamiento de sangre.
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia». El término hebreo puede abarcar tanto la rectitud moral como la justicia judicial.
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sálvame
  lexicon: HALOT
  rationale: נצל expresa pedir liberación o rescate. «Líbrame» conserva el tono de súplica y es natural en español bíblico sin desplazar el matiz de ser sacado de una situación peligrosa o culpable.
- source_word: מִדָּמִים
  english_pob_choice: from bloodguilt
  chosen_spanish: de la sangre
  alternatives_spanish:
  - de la culpa de sangre
  - de la sangre derramada
  - de la sangre culpable
  lexicon: HALOT
  rationale: El hebreo plural דמים puede abarcar sangre derramada, derramamiento violento o culpa de sangre. En español, «de la sangre» mantiene la imagen breve y poética del original y deja abierto el trasfondo idiomático; la nota preserva la alternativa interpretativa principal de «bloodguilt».
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Es una vocación directa a Dios; «oh Dios» reproduce el tono exclamativo y de apelación personal.
- source_word: אֱלֹהֵי תְּשׁוּעָתִי
  english_pob_choice: God of my salvation
  chosen_spanish: Dios de mi salvación
  alternatives_spanish:
  - Dios de mi liberación
  - Dios que me salva
  lexicon: HALOT
  rationale: La construcción de estado constructo se conserva de manera cercana. «Salvación» es el equivalente habitual de תְּשׁוּעָה y mantiene el alcance teológico del salmo.
- source_word: תְּרַנֵּן
  english_pob_choice: will sing aloud
  chosen_spanish: cantará con júbilo
  alternatives_spanish:
  - prorrumpirá en canto
  - cantará alegremente
  - alzará su canto
  lexicon: HALOT
  rationale: La forma verbal transmite una expresión gozosa y sonora. «Cantará con júbilo» comunica bien el énfasis en canto exuberante sin sonar forzado en español.
- source_word: לְשׁוֹנִי
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  - yo
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo. En español, «lengua» es la forma más natural y literaria para este órgano de habla.
- source_word: צִדְקָתֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia salvadora
  - tu justicia y rectitud
  lexicon: HALOT
  rationale: צדקה puede expresar justicia, rectitud y, en contexto pactal, la intervención justa de Dios. Aquí «justicia» mantiene el campo semántico y permite la tensión con la nota alternativa «rectitud»/«justicia» sin reducirla a una sola dimensión.
theological_decisions:
- issue: Sentido de מִדָּמִים en un salmo penitencial
  english_pob_reading: bloodguilt
  chosen_spanish_reading: de la sangre
  alternative_spanish_readings:
  - de la culpa de sangre
  - de la sangre derramada
  rationale: El POB inglés opta por «bloodguilt» pero reconoce «bloodshed» y «bloodguiltiness». En español, la forma breve «de la sangre» preserva la ambigüedad del hebreo idiomático y no fuerza una explicación interpretativa dentro del verso; la nota deja constancia de la lectura de culpa de sangre.
  doctrine_reference: 'DOCTRINE.md: preserve lexical tension rather than prematurely resolving it.'
- issue: Nuance of צִדְקָתֶךָ
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu rectitud
  - tu justicia salvadora
  rationale: El inglés preserva «righteousness» como término amplio con matiz judicial y moral. En español, «justicia» conserva bien ese rango y permite mantener la tensión con la alternativa «rectitud» sin introducir una paráfrasis explicativa en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto sigue el pasaje con alta concordancia respecto del audit trail en inglés; no hubo revisiones posteriores que exigieran cambios, y se conservó la tensión lexical documentada para מִדָּמִים y צִדְקָתֶךָ.
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo y en el genitivo constructo, manteniendo el registro bíblico natural del español.
  - Se prefirió «líbrame» por su naturalidad litúrgica y su correspondencia con una súplica de rescate, sin desplazar el contenido semántico de נצל.
  - Se conservó «mi lengua» para respetar la imagen poética del hebreo.
  - Se mantuvo «justicia» en el texto principal y «rectitud» en nota, siguiendo la decisión POB de no colapsar el término צדקה en una sola glosa estrecha.
