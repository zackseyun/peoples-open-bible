translation:
  language: es
  text: Entonces el pueblo clamó a Moisés, y Moisés oró a Yahvé, y el fuego disminuyó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fuego cedió» o «el fuego se hundió». El verbo hebreo sugiere que el fuego amainó o disminuyó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - clamó en voz alta
  lexicon: HALOT
  rationale: צעק expresa un clamor urgente, normalmente en aflicción o petición de auxilio. En español, «clamó» comunica mejor esa apelación intensa que un simple «llamó» o «dijo».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto narrativo colectivo, עָם se refiere a la comunidad israelita. «El pueblo» es la forma natural y precisa en español para este referente corporativo.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - hacia Moisés
  lexicon: HALOT
  rationale: אֶל marca dirección o movimiento hacia una persona; en español, la preposición «a» transmite de forma idiomática esa orientación.
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró a favor de ellos
  - intercedió
  lexicon: HALOT
  rationale: El hitpael de פלל aquí significa «orar». «Oró» mantiene la relación directa con el verbo hebreo sin añadir la especificación interpretativa de «intercedió», aunque el contexto la sugiera.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: וַתִּשְׁקַע
  english_pob_choice: died down
  chosen_spanish: se apagó
  alternatives_spanish:
  - se aquietó
  - se abatió
  - se hundió
  lexicon: HALOT
  rationale: שקע literalmente sugiere hundirse o declinar. Con «el fuego» como sujeto, «se apagó» expresa de manera clara y natural en español que el fuego cesó, sin imponer una extinción instantánea más fuerte de lo que exige el verbo.
- source_word: הָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  - el incendio
  lexicon: HALOT
  rationale: אֵשׁ significa «fuego» de forma directa. En el contexto inmediato se trata del fuego divino mencionado previamente.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino en español como «Yahvé», siguiendo la política del POB de no enmascararlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva el clamor del pueblo, la oración de Moisés y el verbo final con una equivalencia natural en español. No se introdujeron ampliaciones interpretativas ni cambios de sentido respecto del pass más reciente, que quedó en acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «el pueblo» sobre alternativas más genéricas para preservar el referente colectivo israelita.
  - «Oró» conserva la sencillez del verbo hebreo sin añadir la noción de intercesión como traducción principal.
  - La nota al pie se ancla en «se apagó» para mantener visible la alternativa léxica documentada.
