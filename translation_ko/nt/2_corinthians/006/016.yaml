source:
  edition: SBLGNT
  text: τίς δὲ συγκατάθεσις ναῷ θεοῦ μετὰ εἰδώλων; ⸂ἡμεῖς γὰρ ναὸς θεοῦ ἐσμεν⸃ ζῶντος· καθὼς εἶπεν ὁ θεὸς ὅτι Ἐνοικήσω ἐν αὐτοῖς καὶ ἐμπεριπατήσω, καὶ ἔσομαι αὐτῶν θεός, καὶ αὐτοὶ ἔσονταί ⸀μου λαός.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/006/016.yaml
  text: 'And what agreement has the temple of God with idols? For we are the temple of the living God, just as God said: "I will dwell among them and walk among them, and I will be their God, and they will be my people."'
  footnotes:
  - marker: a
    text: Or “what accord” or “what common cause.”
    reason: lexical_alternative
  - marker: b
    text: Or “I will dwell in them.” The Greek preposition can be rendered “in” or “among”; here the communal covenant context favors “among them.”
    reason: alternative_reading
translation:
  language: ko
  text: '하나님의 성전이 우상과 어떤 합의가 있겠습니까? 우리가 살아 계신 하나님의 성전이기 때문입니다. 하나님께서 이렇게 말씀하셨습니다: 「내가 그들 가운데 거하며 그들 가운데 다니리니, 나는 그들의 하나님이 되고 그들은 내 백성이 되리라.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 인용은 레 26:11-12, 겔 37:27, 출 29:45 등의 결합. 원 히브리어 본문에서 「나」는 야훼(יהוה)이며, LXX에서 ὁ θεός / κύριος로 번역된다. 바울은 LXX 형태로 인용한다.
    reason: cross_reference
