review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia principal de imperativos del hebreo: declarar/proclamar/decir, tocar el shofar, clamar, reunirse e ir a las ciudades fortificadas. Sin embargo, presenta dos problemas de fidelidad: (1) inserta en el texto principal «en voz alta» para absorber el difícil מַלְאוּ, aunque la revisión inglesa auditada decidió no expandir ese elemento en el texto; y (2) la nota [d] mezcla dos alternativas distintas y una de ellas («júntense a las ciudades fortificadas») no corresponde al hebreo, donde la alternativa documentada es para אֶל, es decir, «a/hacia» o «dentro de» las ciudades fortificadas.'
  spanish_quality_summary: El español es claro y legible, pero «Clamen en voz alta» resulta algo redundante y además incorpora una interpretación en el texto principal. «Reúnanse» suena más natural y ampliamente eclesial que «Júntense» en un registro bíblico digno y neutral. «En la tierra» es posible, pero en este contexto de alarma nacional «en el país» o «en la tierra» ambos sirven; no exige cambio. La puntuación y fluidez general son buenas.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías u otros términos de glosario mayor. «Cuerno» para שׁוֹפָר es defendible y la nota cultural lo explica bien. La decisión sobre מַלְאוּ debe alinearse mejor con la auditoría inglesa: no conviene trasladar al texto principal una expansión que ya fue retirada. También conviene ajustar la nota de הֵאָסְפוּ / אֶל עָרֵי הַמִּבְצָר para preservar las alternativas exactas del expediente inglés.'
  issues:
  - severity: medium
    issue: El texto principal añade «en voz alta» como representación de מַלְאוּ.
    rationale: La revisión auditada del POB en inglés eliminó la expansión interpretativa de מַלְאוּ del texto principal por considerarla difícil y no natural sin expansión. Mantener «en voz alta» en español vuelve a introducir una interpretación en el cuerpo del verso.
  - severity: medium
    issue: 'La nota [d] presenta una alternativa incorrecta: «júntense a las ciudades fortificadas».'
    rationale: El hebreo no une directamente הֵאָסְפוּ con las ciudades fortificadas; la variante documentada afecta a אֶל en la frase siguiente («a»/«hacia» frente a «dentro de»). La nota debe separar «Reúnanse» como alternativa de הֵאָסְפוּ y «a las ciudades fortificadas» como alternativa de movimiento.
  - severity: low
    issue: «Júntense» es entendible, pero «Reúnanse» encaja mejor con el registro bíblico neutral y con la fuerza de הֵאָסְפוּ.
    rationale: Ambas opciones son correctas, pero «Reúnanse» suena más natural y digno en español bíblico general, y coincide bien con la convocatoria colectiva.
  revised_spanish_text: 'Declaren en Judá[a], y proclamen en Jerusalén, y digan: Toquen el cuerno[b] en la tierra. Clamen[c] y digan: Reúnanse[d], y vayamos a las ciudades fortificadas.'
