translation:
  language: es
  text: Porque las obras de Yahvé son maravillosas[a][b], y su obra está oculta al hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego de este versículo difiere sustancialmente: «Muchos tiranos se sentaron en el suelo, pero el no imaginado llevó una corona». El testimonio hebreo y el griego parecen reflejar aquí formas textuales distintas.'
    reason: textual_variant
  - marker: b
    text: O «admirables». פְלָאוֹת puede expresar lo extraordinario, maravilloso o admirable.
    reason: lexical_alternative
  - marker: c
    text: O «a la humanidad». El hebreo usa אָדָם en singular genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי פְלָאוֹת
  english_pob_choice: wondrous
  chosen_spanish: son maravillosas
  alternatives_spanish:
  - son admirables
  - son portentosas
  lexicon: HALOT
  rationale: פלא expresa lo extraordinario y admirable; 'maravillosas' comunica bien el tono elevado en español sin sonar forzado.
- source_word: מַעֲשֵׂי
  english_pob_choice: the works of
  chosen_spanish: las obras de
  alternatives_spanish:
  - los hechos de
  - las acciones de
  lexicon: HALOT
  rationale: El plural constructo de מעשה se vierte con naturalidad como 'las obras de', manteniendo el sentido de acciones divinas.
- source_word: יי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: project default for YHWH
  rationale: Aunque el hebreo usa la forma reverencial abreviada יי, el proyecto manda representar el nombre divino como 'Yahvé' en el texto principal, no como máscara devocional.
- source_word: וְנֶעְלָם
  english_pob_choice: is hidden
  chosen_spanish: está oculta
  alternatives_spanish:
  - está escondida
  - permanece oculta
  lexicon: HALOT
  rationale: El nifal de עלם indica estar fuera del alcance humano; 'está oculta' es natural y fiel.
- source_word: מֵאָדָם
  english_pob_choice: from man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo. 'Al hombre' refleja ese valor sin perder inteligibilidad en español.
- source_word: פָּעֳלוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su actuar
  lexicon: HALOT
  rationale: פֹּעַל/פעל aquí apunta a la obra o actuar de Dios; 'su obra' preserva el singular y evita una paráfrasis excesiva.
theological_decisions:
- issue: Representación del nombre divino abreviado en el hebreo (יי)
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: El pasaje hebreo contiene el nombre divino en forma reverente abreviada. El proyecto español exige 'Yahvé' como forma principal, manteniendo la transparencia frente al texto original.
  doctrine_reference: 'Project default: יהוה / YHWH -> Yahvé in the main Spanish text'
- issue: Valor genérico de אָדָם
  english_pob_reading: from man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - al ser humano
  rationale: El hebreo usa un singular genérico. Se conserva esa forma para no diluir la fuerza antropológica del original, aunque el sentido sea humano universal.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table, אָדָם *adam*'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: los marcadores de nota [a] y [b] ahora aparecen exactamente en el texto español, y cada nota está anclada a una forma correspondiente en la traducción.'
  spanish_consistency_notes:
  - Se evitó la traducción mecánica desde el inglés y se volvió al hebreo como fuente principal.
  - Se mantuvo el contraste entre el plural 'las obras' y el singular 'su obra', como en el original.
  - Se conservó un registro lexical de אָדָם como singular genérico, con nota alternativa inclusiva.
  - La forma 'Yahvé' sigue el estándar del proyecto para el nombre divino.
