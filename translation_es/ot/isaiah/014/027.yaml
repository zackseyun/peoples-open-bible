revisions:
- from: Porque Yahvé de los ejércitos ha decidido[a], ¿y quién podrá anularlo? Su mano está extendida[b], ¿y quién la hará volver?
  to: Porque Yahvé de los ejércitos ha determinado[a]; ¿quién podrá anularlo? Su mano está extendida[b]; ¿quién la hará volver?
  rationale: Se corrige la nota [a] para que corresponda al verbo hebreo יָעָץ y no mezcle el sentido de יָפֵר; se corrige la ortografía y se simplifica la nota [b]; y se ajusta «ha decidido» a «ha determinado» para reflejar mejor el propósito deliberado del original y del audit trail inglés. La puntuación se suaviza para un español más natural sin alterar el sentido.
