review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Yahvé habla a Moisés y Aarón, se manda tomar hollín de un horno, y se especifica que Moisés debe lanzarlo hacia arriba a la vista de Faraón. Sin embargo, hay dos desajustes con la evidencia fuente y la auditoría inglesa: (1) la nota [a] está mal formada, porque no corresponde a ninguna alternativa real del texto fuente ni de la POB inglesa; (2) falta la nota léxica sobre «hollín», que en la auditoría inglesa preserva alternativas significativas («hollín fino» / «cenizas»). Además, «y Moisés lo lanzará» es comprensible, pero en español imperativo/instructivo suena más fiel y natural como «y que Moisés lo lance», que refleja mejor el cambio al actor singular dentro de la instrucción.'
  spanish_quality_summary: El español es claro, digno y legible. «Yahvé», «hollín», «ante los ojos de Faraón» y «hacia el cielo» funcionan bien. La principal mejora estilística es reemplazar el futuro «lo lanzará», que en español puede sonar predictivo más que imperativo, por «que Moisés lo lance». También conviene ordenar las notas para que correspondan a alternativas reales y eliminar la nota espuria en «Aarón».
  glossary_alignment: 'La alineación terminológica es mayormente correcta: יְהוָה → «Yahvé» cumple la política del proyecto; פִּיחַ → «hollín» preserva la especificidad léxica mejor que «ceniza»; לְעֵינֵי פַרְעֹה → «ante los ojos de Faraón» conserva bien el modismo. No hay conflicto doctrinal. La única corrección necesaria es restaurar en notas la alternativa léxica documentada para פִּיחַ y ajustar la expresión verbal de וּזְרָקוֹ para reflejar mejor la instrucción dirigida a Moisés.'
  issues:
  - severity: medium
    issue: La nota [a] sobre «Aarón» no está justificada por la fuente ni por la POB inglesa.
    rationale: El hebreo simplemente dice «a Aarón»; no hay variante significativa ni alternativa léxica que requiera una nota. Mantenerla introduce ruido editorial.
  - severity: medium
    issue: Falta la nota léxica para «hollín».
    rationale: La auditoría inglesa preserva alternativas relevantes para פִּיחַ («fine soot» / «ashes»). Dado que el español usa «hollín», conviene conservar esa información como nota para mantener trazabilidad léxica.
  - severity: low
    issue: «y Moisés lo lanzará» suena menos natural que una forma exhortativa/subjuntiva en español.
    rationale: El hebreo cambia del imperativo plural a una instrucción específica sobre Moisés. En español bíblico natural, «y que Moisés lo lance» comunica mejor ese valor directivo que un futuro simple, que puede leerse como mera predicción.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés y a Aarón: «Tomen para ustedes puñados[a] de hollín[b] de un horno, y que Moisés lo lance hacia el cielo[c], ante los ojos de Faraón».'
