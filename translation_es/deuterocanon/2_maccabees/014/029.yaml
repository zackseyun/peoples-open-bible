translation:
  language: es
  text: Pero, como no le era posible oponerse al rey, seguía esperando un momento oportuno para lograrlo mediante una estratagema.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεὶ δὲ
  english_pob_choice: But since
  chosen_spanish: Pero, como
  alternatives_spanish:
  - Y como
  - Ahora bien, como
  lexicon: LSJ
  rationale: La combinación introduce una transición causal con matiz adversativo. «Pero, como» conserva ambos valores de modo natural en español.
- source_word: τῷ βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - contra el rey
  - para con el rey
  lexicon: LSJ
  rationale: El dativo depende de ἀντιπρᾶξαι; en español, «oponerse al rey» expresa con claridad la oposición dirigida hacia él sin volver literal y torpe la construcción.
- source_word: ἀντιπρᾶξαι
  english_pob_choice: to oppose ... openly
  chosen_spanish: oponerse
  alternatives_spanish:
  - actuar contra
  - resistir
  lexicon: LSJ
  rationale: El verbo indica actuar contra u oponerse. En español, «oponerse» es el equivalente más directo y fiel. No se añade «abiertamente» porque no está en el griego.
- source_word: οὐκ ἦν
  english_pob_choice: it was not possible
  chosen_spanish: no le era posible
  alternatives_spanish:
  - no podía
  - no había posibilidad
  lexicon: LSJ
  rationale: La construcción impersonal se vierte bien con «no le era posible», que conserva la idea de imposibilidad sin convertirla en un simple sujeto personal.
- source_word: εὔκαιρον
  english_pob_choice: an opportunity
  chosen_spanish: la oportunidad
  alternatives_spanish:
  - un momento favorable
  - el momento oportuno
  lexicon: LSJ
  rationale: El adjetivo sustantivado señala un tiempo adecuado u oportuno. «La oportunidad» es natural y recoge ese sentido.
- source_word: ἐτήρει
  english_pob_choice: he kept watching for
  chosen_spanish: vigilaba
  alternatives_spanish:
  - seguía vigilando
  - estaba esperando
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua o repetida. «Vigilaba» transmite bien la espera atenta y sostenida.
- source_word: στρατηγήματι
  english_pob_choice: by a stratagem
  chosen_spanish: mediante un estratagema
  alternatives_spanish:
  - por medio de una estratagema
  - mediante una artimaña
  lexicon: LSJ
  rationale: «Estratagema» preserva el sentido de plan astuto o calculado sin cargarlo innecesariamente con una valoración moral que el griego no explicita.
- source_word: τοῦ ἐπιτελέσαι
  english_pob_choice: to accomplish it
  chosen_spanish: de lograrlo
  alternatives_spanish:
  - para cumplirlo
  - para ejecutarlo
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. Como el objeto es implícito en griego, «lograrlo» mantiene la referencia al propósito sin añadir un complemento no expresado.
translation_notes:
  revision_awareness: Se ajustó la redacción para evitar añadir «abiertamente» o cualquier complemento no expresado en el griego, siguiendo la revisión inglesa más reciente que eliminó esa expansión. También se evitó añadir un objeto explícito a ἐπιτελέσαι, porque el original lo deja implícito.
  spanish_consistency_notes:
  - Se mantiene «rey» en minúscula por tratarse de un título común en español dentro del contexto narrativo.
  - Se prefirió «estratagema» para conservar el tono táctico del término griego.
  - La frase completa conserva el imperfecto de acción sostenida con «vigilaba».
