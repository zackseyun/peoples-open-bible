translation:
  language: es
  text: Y que tales pensamientos[a] sean[b] en ustedes, y que estas palabras no lleguen al corazón de mi padre[c]…»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. ἔννοιαι: «pensamientos» o, con énfasis en el aspecto volitivo, «intenciones». El término griego abarca tanto la dimensión cognitiva (concepciones de la mente) como la intencional.'
    reason: lexical_alternative
  - marker: b
    text: El asterisco sobre *γένωνται en la edición crítica de Charles (1908) señala que este verbo presenta una variante textual en el aparato. La forma adoptada sigue la lectura principal de Charles sin conjetura adicional.
    reason: textual_variant
  - marker: c
    text: El texto griego y la traducción inglesa del POB concluyen con puntos suspensivos, lo que indica una laguna o ruptura del manuscrito en este punto de la edición Charles 1908. No se añade texto conjetural.
    reason: source_note
lexical_decisions:
- source_word: ἔννοιαι
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - intenciones
  - reflexiones
  - concepciones
  lexicon: 'LSJ: ἔννοια — thought, notion, conception (ἐν + νοῦς); BDAG: understanding, thought, intent'
  rationale: ἔννοια denota un pensamiento o concepción formada en la mente. «Pensamientos» es el equivalente español más natural y fiel, coincidiendo con el inglés POB «thoughts». «Intenciones» podría subrayar el matiz volitivo implícito en el contexto (Benjamín exhorta a sus hijos a cultivar un estado interior), pero no es la primera acepción del griego; se consigna en nota.
- source_word: γένωνται (*γένωνται)
  english_pob_choice: let be
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - se vuelvan
  lexicon: 'LSJ: γίγνομαι — to become, to be; aoristo medio subjuntivo 3.ª pl. en función hortativa/yusiva'
  rationale: El aoristo subjuntivo γένωνται con sentido hortativo se traduce mediante la construcción española «que sean», estándar para el subjuntivo yusivo. El asterisco en la edición Charles (1908) señala variante textual, consignada en nota; la lectura principal se adopta sin alteración.
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - palabras
  lexicon: 'LSJ: λόγος — palabra, dicho, discurso; pl. λόγοι = palabras, dichos'
  rationale: En plural y referido a un discurso pronunciado, λόγοι se traduce naturalmente «palabras». «Dichos» es alternativa válida pero más arcaizante; «palabras» es preferible para el español moderno latinoamericano.
- source_word: καρδίαν
  english_pob_choice: heart (implied in «come…»)
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: 'LSJ: καρδία — corazón, sede del pensamiento y la voluntad en el griego bíblico'
  rationale: El uso bíblico de καρδία como asiento del pensamiento, la voluntad y los afectos se reproduce fielmente en «corazón», término español igualmente comprensivo. No se aplana la polisemia.
- source_word: τοῦ πατρός μου
  english_pob_choice: my father
  chosen_spanish: mi padre
  lexicon: 'LSJ: πατήρ — padre'
  rationale: Traducción directa sin ambigüedad. En el contexto del Testamento de Benjamín, «mi padre» alude a Jacob/Israel, padre de Benjamín.
theological_decisions:
- issue: Construcción subjuntiva hortativa / yusiva doble
  english_pob_reading: let such thoughts be in you… let not the words come…
  chosen_spanish_reading: que tales pensamientos sean en ustedes… que estas palabras no lleguen
  alternative_spanish_readings:
  - ¡Sean en ustedes tales pensamientos… y no lleguen estas palabras!
  - Ojalá que tales pensamientos sean en ustedes…
  rationale: 'El griego usa dos subjuntivos hotativos: γένωνται (positivo, deseo/exhortación) y μὴ ἔλθωσιν (negativo, prohibición). La construcción española «que + subjuntivo» reproduce el matiz de exhortación/deseo con exactitud. Se evita el imperativo directo («sean»/«no lleguen» sin «que») porque el griego no emplea el imperativo sino el subjuntivo, indicando un deseo o ruego más que una orden imperativa pura.'
  doctrine_reference: 'Paralelos en la tradición de los Testamentos de los Doce Patriarcas: exhortaciones de un patriarca moribundo a sus descendientes (género literario del testamento).'
- issue: Texto incompleto / laguna al final del versículo
  english_pob_reading: let not the words come…'
  chosen_spanish_reading: que estas palabras no lleguen al corazón de mi padre[c]…»
  alternative_spanish_readings:
  - …no lleguen al corazón de mi padre (texto incompleto en la fuente)
  rationale: El texto griego de Charles termina con puntos suspensivos en el inglés POB («come…'"), indicando una laguna o corte del texto en la edición Charles 1908. El español preserva los puntos suspensivos y cierra la cita con guillemet «»» para señalar el fin del discurso directo de Benjamín dentro del marco narrativo del testamento. No se rellena el texto ni se conjetura el contenido faltante.
  doctrine_reference: 'Crítica textual: los Testamentos de los Doce Patriarcas presentan múltiples versiones (griega, armenia, eslava); Charles 1908 es la edición crítica estándar del griego pero reconoce pasajes problemáticos con marcas de aparato (*, ³⁶, ³⁷).'
translation_notes:
  revision_awareness: 'No se han aplicado revisiones al texto fuente inglés del POB (latest_revision_pass: sin cambios, 2026-04-23). El griego de Charles 1908 contiene tres marcas de aparato crítico (*γένωνται, ³⁶ junto a ἐν ὑμῖν, ³⁷ junto a τοιαῦται) que la cadena de auditoría inglesa no trasladó a notas; este borrador español las documenta explícitamente en notas b y en las decisiones léxicas/textuales para mantener la trazabilidad de la fuente.'
  spanish_consistency_notes:
  - Se usa «ustedes» (no «vosotros») para ὑμῖν, conforme al objetivo de español neutro latinoamericano del proyecto.
  - No aparece el nombre divino (YHWH/κύριος), terminología cristológica ni pneumatológica en este versículo; las convenciones terminológicas del proyecto POB para esos términos no aplican aquí.
  - Las guillemets de cierre (»…») marcan el fin del discurso directo de Benjamín dentro del marco narrativo del testamento, siguiendo convenciones de puntuación del español.
  - El superíndice ³⁶ sobre ἐν ὑμῖν y ³⁷ sobre τοιαῦται en el texto griego de Charles son marcas del aparato de esa edición, no números de nota del POB; se mencionan en las decisiones léxicas para claridad, sin inventar entradas de léxico.
