    text: 'También puede entenderse: «las ofrendas por fuego de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: '«Pan de su Dios» es un modismo sacerdotal para la comida presentada a Dios en el sacrificio; también: «el alimento de su Dios».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente אִשֵּׁי יְהוָה para alinearlo con la decisión léxica y semántica documentada por el POB inglés: la idea principal en este contexto es la ofrenda como alimento presentado a Dios, en paralelo con ''el pan de su Dios''. Se conserva en nota la alternativa tradicional ''por fuego''. El resto del versículo puede mantenerse por fidelidad y buena legibilidad.'
