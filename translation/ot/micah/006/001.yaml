id: MIC.6.1
reference: Micah 6:1
source:
  edition: WLC
  text: שִׁמְעוּ נָ֕א אֵ֥ת אֲשֶׁר יְהוָ֖ה אֹמֵ֑ר ק֚וּם רִ֣יב אֶת הֶ/הָרִ֔ים וְ/תִשְׁמַ֥עְנָה הַ/גְּבָע֖וֹת קוֹלֶֽ/ךָ־־־׃
translation:
  text: 'Hear now what Yahweh says: Arise[a], contend before the mountains, and let the hills hear your voice.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'contend with the mountains' or 'bring a case against the mountains.' The Hebrew verb has legal-dispute overtones; here the mountains are likely summoned as witnesses in the LORD's covenant lawsuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ נָא
  chosen: Hear now
  alternatives:
  - Listen now
  - Hear, please
  lexicon: HALOT
  rationale: שׁמע in the imperative calls for attentive hearing; נָא adds urgency or entreaty rather than simple politeness. 'Hear now' is idiomatic, weighty, and natural in prophetic discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹמֵר
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: HALOT
  rationale: The participle here functions as a present or imminent speech introduction. 'Says' is the most natural English rendering in this formula.
- source_word: קוּם
  chosen: Rise
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: The imperative signals a summons to action. 'Rise' is concise and suitably elevated without sounding archaic.
- source_word: רִיב
  chosen: plead your case
  alternatives:
  - contend
  - bring a lawsuit
  - argue your case
  lexicon: HALOT
  rationale: ריב in prophetic lawsuit contexts carries forensic overtones. 'Plead your case' preserves the legal sense while remaining readable modern English.
- source_word: אֶת הֶהָרִים
  lemma: אֶת
  chosen: before the mountains
  alternatives:
  - with the mountains
  - against the mountains
  lexicon: HALOT
  rationale: The preposition אֶת with ריב can mark the party involved in contention. In this context the mountains function as witnesses in a covenant-lawsuit scene more than adversaries, so 'before the mountains' best conveys the setting without implying that the mountains are the defendants.
- source_word: וְתִשְׁמַעְנָה
  chosen: and let ... hear
  alternatives:
  - and may ... hear
  - that ... may hear
  lexicon: HALOT
  rationale: The imperfect with prefixed conjunction after imperatives expresses a jussive-like continuation. 'And let ... hear' captures the hortatory force in natural English.
- source_word: הַגְּבָעוֹת
  chosen: the hills
  alternatives:
  - the high hills
  lexicon: HALOT
  rationale: A straightforward geographical term paired poetically with 'mountains.' 'Hills' preserves the parallelism cleanly.
- source_word: קוֹלֶךָ
  chosen: your voice
  alternatives:
  - your sound
  - what you say
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in direct speech contexts. 'Your voice' is both literal and idiomatic.
