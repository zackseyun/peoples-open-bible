translation:
  language: es
  text: Así se volvieron y siguieron adelante, y pusieron a los niños pequeños, el ganado y los objetos de valor[a] delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los bienes», «el bagaje» o «las pertenencias» para «los objetos de valor». El hebreo aquí se refiere a posesiones transportables o riqueza, no a «gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se dieron vuelta
  - volvieron
  lexicon: HALOT
  rationale: פנה expresa la acción básica de volverse o girar. «Se volvieron» conserva el movimiento narrativo sin añadir una dirección que el hebreo no explicita.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: went on
  chosen_spanish: siguieron adelante
  alternatives_spanish:
  - fueron
  - prosiguieron
  lexicon: HALOT
  rationale: הלך en esta secuencia continúa la acción iniciada por «se volvieron». «Siguieron adelante» suena natural en español y mantiene el avance narrativo.
- source_word: וַיָּשִׂימוּ
  english_pob_choice: put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron delante
  lexicon: HALOT
  rationale: שׂים significa poner/colocar. «Pusieron» es la equivalencia más directa y natural en español.
- source_word: הַטַּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los pequeños
  - los dependientes
  lexicon: HALOT
  rationale: טף se refiere a los pequeños o niños de un grupo, a menudo los más vulnerables. «Los niños pequeños» conserva la idea de pequeñez y dependencia.
- source_word: הַמִּקְנֶה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - las reses
  - el rebaño
  lexicon: HALOT
  rationale: מקנה designa animales de propiedad o cría; «el ganado» es un equivalente amplio y natural en español para este contexto de desplazamiento.
- source_word: הַכְּבוּדָּה
  english_pob_choice: the valuables
  chosen_spanish: los objetos de valor
  alternatives_spanish:
  - los bienes
  - el bagaje
  - las pertenencias
  lexicon: HALOT
  rationale: כבודה aquí no significa «gloria», sino bienes portátiles, riqueza o pertenencias valiosas. «Los objetos de valor» expresa bien esa carga semántica sin perder la tensión lexical documentada.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - por delante de ellos
  lexicon: HALOT
  rationale: La expresión indica posición espacial al frente del grupo. «Delante de ellos» es una forma clara y fiel en español, equivalente a «before them».
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el sintagma correspondiente de la traducción. Se mantuvo la lectura narrativa y lexical del borrador inglés, con ajuste natural a un español bíblico moderno y digno.
  spanish_consistency_notes:
  - Se evitó «Señor» u otras fórmulas teológicas ajenas porque no aparecen en este versículo.
  - Se prefirió «objetos de valor» para preservar la tensión semántica de כבודה y evitar «gloria», que sería incorrecto aquí.
  - «Ganado» se usa como equivalente amplio y comprensible para מקנה en un contexto de traslado.
  - La nota [a] está anclada correctamente en el texto, conforme a la validación previa.
