translation:
  text: 'And so[a], my children, have compassion toward every person with mercy, so that the Lord also, having had compassion on you, may show you mercy. For indeed in the last days God will send his compassion upon the earth, and wherever he finds compassion of mercy, there he dwells. For as much as a man has compassion on his neighbor, so much also the Lord has compassion on him.


    And when we went down into Egypt[b], Joseph did not hold a grudge against us. Paying attention to him, then, you also, my children, love one another, and let each one not reckon evil against his brother. For this divides unity, and scatters every kinship, and troubles the soul, and disfigures the face.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his tender mercies upon the earth.' The Greek literally uses 'his inward parts,' an idiom for deep compassion.
    reason: lexical_alternative
    anchor_ref: '8:2'
  - marker: b
    text: Some witnesses read 'and destroys one's substance/possessions' instead of 'and disfigures the face.'
    reason: textual_variant
    anchor_ref: '8:6'
lexical_decisions:
- source_word: εὐσπλαγχνίαν
  chosen: compassion
  alternatives:
  - tender mercy
  - pity
  lexicon: LSJ
  rationale: The noun denotes heartfelt pity/compassion. 'Compassion' is natural English and preserves the affective force without sounding archaic.
- source_word: κατὰ παντὸς ἀνθρώπου
  chosen: toward every person
  alternatives:
  - toward all people
  - for every human being
  lexicon: LSJ
  rationale: The phrase is distributive and universal. 'Every person' keeps the singular Greek sense while reading idiomatically in English.
- source_word: σπλαγχνισθεὶς
  chosen: having had compassion
  alternatives:
  - being moved with compassion
  - having been merciful
  lexicon: BDAG
  rationale: The participle is cognate with the surrounding compassion language. 'Having had compassion' preserves the verbal link with σπλάγχνα/σπλαγχνίζεται across the chapter.
- source_word: τὰ σπλάγχνα αὐτοῦ
  chosen: his compassion
  alternatives:
  - his tender mercies
  - his inward parts
  lexicon: LSJ
  rationale: Literally 'his inward parts,' but in Greek idiom this signifies deep compassion. Rendering it literally would obscure the sense; 'his compassion' communicates the theological point while preserving the chapter's repeated mercy vocabulary.
- source_word: σπλάγχνα ἐλέους
  chosen: merciful compassion
  alternatives:
  - compassion of mercy
  - tender mercy
  lexicon: BDAG
  rationale: The doubled mercy-compassion expression is rhetorically emphatic. 'Merciful compassion' keeps both elements visible rather than collapsing them into a single English term.
- source_word: τὸν πλησίον αὐτοῦ
  chosen: his neighbor
  alternatives:
  - the one near him
  lexicon: LSJ
  rationale: Standard ethical term for fellow human/near one. 'Neighbor' preserves the moral register and intertextual resonance.
- source_word: οὐκ ἐμνησικάκησεν ἡμῖν
  chosen: did not hold a grudge against us
  alternatives:
  - did not remember wrongs against us
  - did not bear malice toward us
  lexicon: LSJ
  rationale: The verb means to bear resentment or remember injuries. 'Hold a grudge' is clear modern English and fits the paraenetic context.
- source_word: προσέχοντες
  chosen: giving heed to
  alternatives:
  - paying attention to
  - taking notice of
  - looking to
  lexicon: BDAG
  rationale: The participle introduces Joseph as an example to imitate. 'Giving heed to him' preserves the exhortational force better than a weaker observational phrase.
- source_word: μὴ λογίζεσθε κακίαν
  chosen: let each one not reckon evil
  alternatives:
  - do not devise evil
  - do not count wrongdoing
  - do not think evil
  lexicon: BDAG
  rationale: λογίζομαι can mean reckon, consider, account. Here it refers to inwardly calculating or harboring ill against a brother. 'Reckon evil' keeps the deliberative nuance, though slightly formal, and avoids over-paraphrase.
- source_word: χωρίζει ἑνότητα
  chosen: divides unity
  alternatives:
  - separates what is united
  - splits apart oneness
  lexicon: LSJ
  rationale: The terse Greek is rhetorically sharp. 'Divides unity' preserves that compact force.
- source_word: πᾶσαν συγγένειαν
  chosen: every kinship
  alternatives:
  - every family bond
  - all kindred
  lexicon: LSJ
  rationale: The term refers to family relationship or kin-group. 'Every kinship' keeps the breadth of relational bonds in view, not merely the household.
- source_word: τὴν ψυχὴν ταράσσει
  chosen: troubles the soul
  alternatives:
  - disturbs the life
  - agitates the inner self
  lexicon: BDAG
  rationale: A morally and psychologically weighty phrase; 'troubles the soul' preserves the elevated testamentary register.
- source_word: τὸ πρόσωπον ἀφανίζει
  chosen: disfigures the face
  alternatives:
  - ruins the appearance
  - makes the face vanish
  lexicon: LSJ
  rationale: 'The image is concrete: malice shows itself outwardly. ''Disfigures the face'' communicates visible moral corruption better than a hyper-literal ''makes the face disappear.'''
