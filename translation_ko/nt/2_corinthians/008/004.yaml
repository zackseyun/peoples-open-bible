id: 2CO.8.4
reference: '2 Corinthians 8:4'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μετὰ πολλῆς παρακλήσεως δεόμενοι ἡμῶν, τὴν χάριν καὶ τὴν κοινωνίαν τῆς διακονίας τῆς εἰς τοὺς ἁγίους—
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/004.yaml
  text: begging us with much urging for the grace and the fellowship of this ministry to the saints—[a]
translation:
  language: ko
  text: 성도들을 위한 이 섬김의 은혜와 동참함[a]에 자기들도 참여하게 해 달라고 간곡히 우리에게 간청하였습니다—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「성도들을 위한 섬김의 특권과 참여」. 여기서 「은혜」(χάρις)는 그 자체로 헌금에 동참할 수 있도록 주어진 특권을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  lexicon: BDAG
  rationale: 8장의 χάρις 일관성을 유지하되, 여기서는 헌금에 동참할 수 있는 특권으로서의 은혜를 가리킨다. 「은혜」를 본문에 유지하고 각주로 보충한다.
  alternatives_korean:
  - 특권
  - 호의
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_korean: 동참함
  lexicon: BDAG
  rationale: κοινωνία는 단순한 친교가 아니라 구체적 사역에 함께 참여함을 가리킨다. 헌금 문맥에서 「동참함」이 능동적 결속을 가장 잘 담는다.
  alternatives_korean:
  - 사귐
  - 참여
  - 교제
- source_word: διακονία
  english_pob_choice: ministry
  chosen_korean: 섬김
  lexicon: BDAG
  rationale: 여기서 διακονία는 예루살렘 성도들을 위한 구체적 구제 사역을 가리킨다. 8-9장 전반에 걸쳐 「섬김」으로 일관되게 옮기되, 사역적 무게가 강한 곳에서는 「사역」으로 변용한다.
  alternatives_korean:
  - 봉사
  - 사역
- source_word: ἁγίους
  english_pob_choice: saints
  chosen_korean: 성도들
  lexicon: BDAG
  rationale: 바울 서신에서 일관된 신자 호칭으로 「성도」가 표준 등가어이다.
  alternatives_korean:
  - 거룩한 자들
