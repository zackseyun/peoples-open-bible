translation:
  language: es
  text: 'Habla a Roboam[a] hijo de Salomón, rey de Judá, y a toda la casa de Judá[b] y Benjamín, y al resto del pueblo[c], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Di a Roboam ...»'
    reason: lexical_alternative
  - marker: b
    text: «La casa de Judá» conserva el modismo hebreo para la comunidad o entidad política de Judá; alternativamente, «todo Judá».
    reason: lexical_alternative
  - marker: c
    text: «El pueblo» puede referirse en este contexto a los reunidos para la guerra, pero el hebreo aquí no dice explícitamente «ejército».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Speak
  chosen_spanish: Di
  alternatives_spanish:
  - Habla
  - Diles
  lexicon: HALOT
  rationale: El imperativo de אמר introduce una orden para comunicar un mensaje. En español, 'Di' es natural y directo; 'Habla' subrayaría más el acto de dirigirse, pero aquí el valor de mandato de enunciar el mensaje es más preciso.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca destinatario; en español 'a' es la equivalencia más idiomática para introducir al receptor del discurso.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: HALOT
  rationale: Se sigue la forma tradicional española del nombre propio, ampliamente reconocible y estable en lectura bíblica en español.
- source_word: בֶּן שְׁלֹמֹה
  english_pob_choice: son of Solomon
  chosen_spanish: hijo de Salomón
  alternatives_spanish:
  - descendiente de Salomón
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación directa; 'hijo de Salomón' reproduce con claridad el valor genealógico sin añadir matices no presentes.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real en construcción con Judá; 'rey de Judá' conserva la relación sintáctica y el sentido político del hebreo.
- source_word: כָּל בֵּית יְהוּדָה
  english_pob_choice: all the house of Judah
  chosen_spanish: toda la casa de Judá
  alternatives_spanish:
  - todo Judá
  - toda la comunidad de Judá
  lexicon: HALOT
  rationale: '''Casa de Judá'' preserva el modismo hebreo para el colectivo/polidad de Judá. ''Toda la casa de Judá'' mantiene esa imagen sin colapsarla en ''todo Judá''.'
- source_word: וּבִנְיָמִין
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - y la casa de Benjamín
  lexicon: HALOT
  rationale: El nombre tribal aparece de forma independiente; se vierte de manera natural como 'Benjamín', entendiendo el sentido tribal por el contexto.
- source_word: וְיֶתֶר הָעָם
  english_pob_choice: and the rest of the people
  chosen_spanish: y al resto del pueblo
  alternatives_spanish:
  - y al resto de la gente
  - y al resto del ejército
  lexicon: HALOT
  rationale: יֶתֶר significa 'resto' o 'remanente'; הָעָם es 'el pueblo'. Se conserva 'pueblo' porque el hebreo no dice explícitamente 'ejército', aunque el contexto pueda sugerir una convocatoria militar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: El infinitivo quotativo introduce la continuación del mensaje. 'Diciendo' es el equivalente más directo y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con el registro auditado en inglés; no se registran revisiones previas con impacto en esta unidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero esta unidad no contiene el tetragrámaton.
  - Se preserva la terminología de parentesco y títulos de forma literal y comprensible en español.
  - La estructura de cita en dos puntos en español refleja el valor de לֵאמֹר como marcador de continuación del discurso.
