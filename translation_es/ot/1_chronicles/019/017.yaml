translation:
  language: es
  text: Cuando se informó[a] a David, reunió a todo Israel, cruzó el Jordán, avanzó contra ellos y se dispuso contra ellos. Entonces David se dispuso para la batalla contra Aram, y ellos combatieron contra él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se informó» refleja la pasiva impersonal del hebreo; otra posibilidad sería «se le dijo a David».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «combatieron con él». En este contexto, la expresión hebrea usa «con él» con sentido adversativo: combatieron contra David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד לְדָוִיד
  english_pob_choice: When it was reported to David
  chosen_spanish: Cuando se informó a David
  alternatives_spanish:
  - Y se le dijo a David
  - Cuando David fue informado
  lexicon: HALOT
  rationale: La forma pasiva impersonal del hebreo se conserva bien en español con una construcción equivalente y natural. «Se informó a David» mantiene el carácter receptivo del dato sin añadir un sujeto no expresado.
- source_word: וַיֶּאֱסֹף אֶת כָּל יִשְׂרָאֵל
  english_pob_choice: he gathered all Israel
  chosen_spanish: reunió a todo Israel
  alternatives_spanish:
  - juntó a todo Israel
  - convocó a todo Israel
  lexicon: HALOT
  rationale: אָסַף aquí tiene sentido de reunir/convocar en un contexto militar. «Reunió» es claro y fiel, y conserva el matiz de convocatoria sin sobreespecificar la acción.
- source_word: וַיַּעֲבֹר הַיַּרְדֵּן
  english_pob_choice: crossed the Jordan
  chosen_spanish: cruzó el Jordán
  alternatives_spanish:
  - pasó el Jordán
  - cruzó el río Jordán
  lexicon: HALOT
  rationale: עבר con el objeto directo «el Jordán» se vierte de manera idiomática como «cruzó el Jordán». Mantiene la brevedad del hebreo y el sentido geográfico.
- source_word: וַיָּבֹא אֲלֵיהֶם
  english_pob_choice: came against them
  chosen_spanish: vino contra ellos
  alternatives_spanish:
  - se acercó a ellos
  - avanzó contra ellos
  lexicon: HALOT
  rationale: En contexto bélico, בוא אל expresa aproximación hostil. «Vino contra ellos» conserva la relación preposicional y el tono militar sin añadir interpretación excesiva.
- source_word: וַיַּעֲרֹךְ אֲלֵיהֶם
  english_pob_choice: drew up against them
  chosen_spanish: se alineó contra ellos
  alternatives_spanish:
  - se dispuso contra ellos
  - formó línea contra ellos
  lexicon: HALOT
  rationale: ערך en este marco militar es «disponer/poner en orden» tropas para el combate. «Se alineó» reproduce la idea de ordenamiento bélico con una expresión natural en español, sin introducir una expansión interpretativa como «en formación de batalla».
- source_word: וַיַּעֲרֹךְ דָּוִיד לִקְרַאת אֲרָם מִלְחָמָה
  english_pob_choice: Then David drew up for battle against Aram
  chosen_spanish: Entonces David se alineó para la batalla contra Aram
  alternatives_spanish:
  - Entonces David se dispuso para la batalla contra Aram
  - Entonces David formó línea para la batalla contra Aram
  lexicon: HALOT
  rationale: Se mantiene la repetición de ערך con el mismo verbo español para reflejar el paralelismo del hebreo. לִקְרַאת en este contexto se entiende adversativamente como «contra», y מִלְחָמָה se expresa naturalmente como «la batalla».
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo propio como entidad textual. «Aram» evita sustituir el nombre por una designación geopolítica posterior o por una interpretación étnica no explicitada en el versículo.
- source_word: וַיִּלָּחֲמוּ עִמּוֹ
  english_pob_choice: and they fought with him
  chosen_spanish: y ellos pelearon con él
  alternatives_spanish:
  - y pelearon contra él
  - y combatieron con él
  lexicon: HALOT
  rationale: El hebreo usa עִם + verbo de luchar, literalmente «con él», pero el contexto demuestra oposición bélica. «Pelearon con él» conserva la construcción original y la tensión semántica; la alternativa «contra él» sería más explícita, pero menos cercana al giro hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se evita añadir «en formación de batalla» y se conserva un equivalente directo para «drew up against them / against Aram». También se respeta la tensión de עִםוֹ al traducir «con él», dejando visible que el hebreo literalmente dice «con», aunque el contexto sea adversativo.'
  spanish_consistency_notes:
  - Se mantiene «Jordán» como nombre geográfico estándar en español.
  - Se conserva «Aram» sin glosarlo como «Siria» o «arameos», siguiendo la decisión auditada del POB inglés.
  - La repetición de «se alineó» intenta reflejar el paralelismo del hebreo con el mismo verbo ערך en dos cláusulas consecutivas.
