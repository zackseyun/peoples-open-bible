translation:
  language: es
  text: Estableceré tu descendencia[a] para siempre, y edificaré tu trono de generación en generación. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente»; el singular hebreo puede funcionar colectivamente para los descendientes.
    reason: lexical_alternative
  - marker: b
    text: «Selah» es probablemente una notación musical o litúrgica; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: hasta para siempre
  alternatives_spanish:
  - para siempre
  - por siempre
  - para la eternidad
  lexicon: HALOT
  rationale: La combinación expresa duración perpetua. «Hasta para siempre» conserva la fuerza de continuidad durativa del hebreo y suena natural en español bíblico sin forzar una construcción demasiado literal.
- source_word: אָכִין
  english_pob_choice: I will establish
  chosen_spanish: afirmaré
  alternatives_spanish:
  - estableceré
  - haré firme
  - fundaré
  lexicon: HALOT
  rationale: El hiphil de כון puede significar establecer o hacer firme. «Afirmaré» mantiene la idea de dar solidez y permanencia, y funciona bien en paralelo con «descendencia» en español.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu semilla
  - tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» conserva el valor colectivo del singular hebreo y evita tanto el arcaísmo de «simiente» como la posible pérdida de la imagen genealógica en «descendientes».
- source_word: וּבָנִיתִי
  english_pob_choice: and build
  chosen_spanish: edificaré
  alternatives_spanish:
  - y edificaré
  - y construiré
  - y levantaré
  lexicon: HALOT
  rationale: Se conserva la metáfora arquitectónica del verbo בנה aplicada al trono. «Edificaré» es formal y natural en español bíblico, y evita diluir la imagen con un simple «estableceré».
- source_word: לְדֹר וָדֹר
  english_pob_choice: for generation after generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - para todas las generaciones
  - de una generación a otra
  lexicon: HALOT
  rationale: La expresión idiomática española «de generación en generación» comunica bien la continuidad sucesiva del hebreo y es plenamente transparente para el lector.
- source_word: כִּסְאֲךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tu asiento real
  - tu trono real
  lexicon: HALOT
  rationale: «Trono» es la equivalencia estándar en contexto real y mantiene la referencia dinástica del texto.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: HALOT
  rationale: Se translitera el término porque su sentido exacto es incierto; así se preserva la transparencia del texto fuente sin imponer una explicación no segura.
theological_decisions:
- issue: Promesa dinástica y posible lectura mesiánica
  english_pob_reading: Retain the direct address to the Davidic king in its historical sense while allowing its broader canonical significance to remain implicit.
  chosen_spanish_reading: Mantener la promesa dinástica en su sentido histórico directo, sin explicitar dentro del versículo una identificación mesiánica posterior.
  alternative_spanish_readings:
  - Hacer explícito aquí el cumplimiento mesiánico
  - Generalizar la promesa como mera posteridad
  rationale: El hebreo habla directamente de la descendencia y el trono del destinatario. La traducción debe respetar esa formulación dinástica sin resolver de antemano la tensión canónica hacia su cumplimiento posterior.
  doctrine_reference: Preservar la tensión teológica; no resolverla en la redacción del versículo.
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no se requerían cambios; la presente redacción sigue el texto fuente hebreo y el criterio auditado del POB en inglés, conservando la tensión léxica entre «descendencia» colectiva y la metáfora real del trono.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el paralelismo poético con dos miembros coordinados y una nota final separada para Selah.
  - «Descendencia» se emplea de forma coherente con el valor colectivo de זרע.
  - «Edificaré» conserva el matiz arquitectónico del trono sin sustituirlo por un término más abstracto.
