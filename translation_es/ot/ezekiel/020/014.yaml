translation:
  language: es
  text: Pero yo actué por amor de mi nombre, para que no fuera profanado[a] a la vista de las naciones, ante cuyos ojos los había sacado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Profanado» traduce un verbo que significa tratar como común o desacralizar lo que es santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱשֶׂה
  english_pob_choice: But I acted
  chosen_spanish: Pero yo actué
  alternatives_spanish:
  - Pero yo hice
  - Pero yo obré
  - Pero yo actué de ese modo
  lexicon: HALOT
  rationale: עשה es un verbo amplio de ‘hacer, obrar, actuar’. En este contexto, con Dios como sujeto y con las cláusulas de propósito que siguen, ‘actué’ expresa una intervención deliberada y natural en español, sin perder la amplitud del hebreo. Se conserva el contraste adversativo con ‘Pero’.
- source_word: לְמַעַן שְׁמִי
  english_pob_choice: for the sake of my name
  chosen_spanish: por amor de mi nombre
  alternatives_spanish:
  - por causa de mi nombre
  - por el bien de mi nombre
  - por el honor de mi nombre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta al honor/reputación del nombre revelado de Dios. ‘Por amor de mi nombre’ es una fórmula española estable, reverente y fiel al valor teológico del idiomismo. Se evita ‘SEÑOR’ porque el texto habla explícitamente del ‘nombre’.
- source_word: לְבִלְתִּי הֵחֵל
  english_pob_choice: so that it would not be profaned
  chosen_spanish: para que no fuera profanado
  alternatives_spanish:
  - para no profanarlo
  - para que no fuera tratado como común
  - para que no fuera deshonrado
  lexicon: HALOT
  rationale: חלל en este contexto significa profanar/desecrar lo santo. La pasiva española ‘no fuera profanado’ conserva el foco en el nombre de Dios como objeto de deshonra pública, en paralelo con la POB inglesa. ‘Profanar’ mantiene la tensión sacral del hebreo mejor que opciones más débiles como ‘deshonrar’.
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: in the sight of the nations
  chosen_spanish: a la vista de las naciones
  alternatives_spanish:
  - ante los ojos de las naciones
  - delante de las naciones
  - en presencia de las naciones
  lexicon: HALOT
  rationale: La imagen hebrea es visual y pública. ‘A la vista de’ comunica de forma natural esa exposición ante observadores, manteniendo el énfasis de visibilidad pública sin sonar arcaico.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En Ezequiel, גוים designa a los pueblos circundantes. ‘Las naciones’ es la equivalencia neutral y contextualmente adecuada; ‘gentiles’ introduciría un uso posterior no necesario aquí.
- source_word: אֲשֶׁר הוֹצֵאתִי/ם
  english_pob_choice: in whose sight I had brought them out
  chosen_spanish: en cuya vista las había sacado
  alternatives_spanish:
  - ante quienes las había sacado
  - a la vista de quienes las había sacado
  - en cuya presencia las había sacado
  lexicon: HALOT
  rationale: יצא en causativo significa ‘sacar, hacer salir’. El sufijo pronominal remite a Israel, aquí explícitamente ‘las’. Se conserva el tiempo anterior (‘había sacado’) para reflejar la relación temporal del hebreo y el carácter público del éxodo.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: in whose sight
  chosen_spanish: en cuya vista
  alternatives_spanish:
  - delante de ellos
  - ante sus ojos
  - en presencia de ellos
  lexicon: HALOT
  rationale: La repetición de ‘ojos/vista’ se mantiene para preservar el énfasis en el testimonio público. ‘En cuya vista’ reproduce la relación relativa del hebreo y evita perder la repetición semántica.
theological_decisions:
- issue: Sentido de 'por el sake of my name'
  english_pob_reading: God acted to preserve the honor and holiness of his name among the nations.
  chosen_spanish_reading: Dios actúa para preservar el honor y la santidad de su nombre entre las naciones.
  alternative_spanish_readings:
  - Dios actúa solo por reputación en un sentido superficial
  - Dios actuó únicamente para evitar una ofensa verbal
  rationale: En Ezequiel, el ‘nombre’ de Dios es su carácter revelado y su honor pactual, no mera fama humana. La traducción española conserva el peso teológico del idiomismo sin explicitarlo en exceso en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Valor teológico de 'profanado'
  english_pob_reading: '''Profaned'' translates a verb meaning to treat as common or desecrate what is holy.'
  chosen_spanish_reading: ‘Profanado’ traduce un verbo que implica tratar como común o desacralizar lo santo.
  alternative_spanish_readings:
  - deshonrado
  - manchado
  - rebajado
  rationale: ‘Profanar’ en español conserva la oposición entre lo santo y lo común, y por eso comunica mejor la carga cultual y pública de חלל. Se evita diluir el término en una mera ofensa social.
  doctrine_reference: DOCTRINE.md Translation philosophy §§2, 4, 6
translation_notes:
  revision_awareness: La redacción española sigue de cerca la lectura final del POB en inglés, especialmente la cláusula de finalidad y el cierre relativo (‘in whose sight I had brought them out’). Se priorizó la imagen pública repetida de ‘vista/ojos’ y se evitó neutralizar el lenguaje de profanación. La decisión sobre ‘por amor de mi nombre’ recoge la alternativa lexical ya documentada en inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el hebreo nombra explícitamente יהוה; aquí el texto dice ‘mi nombre’, por lo que no aparece el nombre divino en la superficie española.
  - Se usa ‘las’ para el antecedente implícito femenino plural, concordando con ‘naciones’ y con Israel como pueblo en el contexto previo.
  - El registro es bíblico y digno, pero no arcaizante; se evita ‘delante de mis ojos’ por sonar menos natural que ‘a la vista de’.
