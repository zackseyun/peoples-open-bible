revisions:
- from: 'Así dice Yahvé: He aquí[a], yo traigo calamidad sobre este lugar y sobre sus habitantes, todas las palabras del libro que ha leído el rey de Judá.'
  to: 'Así dice Yahvé: He aquí[a], yo voy a traer calamidad sobre este lugar y sobre sus habitantes, todas las palabras del libro que ha leído el rey de Judá.'
  rationale: Se ajusta únicamente el verbo principal a 'voy a traer' para reflejar mejor el participio hebreo מֵבִיא como acción inminente/proyectada, manteniendo intactos el tono profético, la terminología del proyecto y la nota léxica existente.
