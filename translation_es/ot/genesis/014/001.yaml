translation:
  language: es
  text: 'Y aconteció en los días de Amrafel, rey de Sinar, Arioc, rey de Elasar, Quedorlaómer, rey de Elam, y Tidal, rey de las naciones[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rey de Goiim». El hebreo goyim suele significar «naciones», pero aquí podría funcionar como nombre de lugar, en paralelo con los demás títulos reales del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Ahora aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el marco de la historia. «Y aconteció» conserva el valor de enlace y el tono formal sin caer en un calco excesivamente duro; «sucedió» sería posible, pero algo menos marcado como fórmula narrativa.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el tiempo de
  lexicon: HALOT
  rationale: La locución constructa se vierte de manera directa y natural en español. Mantiene la fórmula histórica y no fuerza una paráfrasis.
- source_word: אַמְרָפֶל
  english_pob_choice: Amraphel
  chosen_spanish: Amrafel
  alternatives_spanish:
  - Amrapel
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva como nombre propio transliterado. «Amrafel» mantiene una forma española clara y reconocible, cercana al patrón del hebreo y del uso tradicional en español.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: «Rey» es el equivalente directo y sobrio; «monarca» sería más marcado y menos fiel al registro del texto.
- source_word: שִׁנְעָר
  english_pob_choice: Shinar
  chosen_spanish: Sinar
  alternatives_spanish:
  - Shinar
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma española habitual «Sinar». Mantiene la identificación geográfica sin añadir interpretación.
- source_word: אַרְיֹוךְ
  english_pob_choice: Arioch
  chosen_spanish: Arioc
  alternatives_spanish:
  - Ario
  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera como nombre propio. «Arioc» es una forma española natural y suficientemente cercana al hebreo.
- source_word: אֶלָּסָר
  english_pob_choice: Ellasar
  chosen_spanish: Elasar
  alternatives_spanish:
  - Ellasar
  lexicon: HALOT
  rationale: Se mantiene como topónimo transliterado en forma española breve y legible. No se intenta identificar ni traducir el lugar.
- source_word: כְּדָרְלָעֹמֶר
  english_pob_choice: Chedorlaomer
  chosen_spanish: Quedorlaomer
  alternatives_spanish:
  - Chedorlaomer
  - Kedorlaomer
  lexicon: Transliteración tradicional en español
  rationale: Se elige una forma española que conserva la identidad del nombre propio con ortografía natural en español. La POB inglesa nota la convención tradicional; en español, «Quedorlaomer» evita una grafía híbrida y sigue siendo reconocible.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico conocido. «Elam» es claro y tradicional en español bíblico.
- source_word: וְתִדְעָל
  english_pob_choice: and Tidal
  chosen_spanish: y Tidal
  alternatives_spanish:
  - e Tidal
  lexicon: Transliteración estándar del nombre propio
  rationale: Se mantiene el nombre propio y la conjunción simple. «Y» es natural ante nombre propio con esta forma; no hay necesidad de ajustar eufónicamente.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - Goiim
  - los pueblos
  lexicon: HALOT
  rationale: El audit trail inglés revisó la opción toponímica y finalmente prefirió el sentido léxico «nations». En español se conserva ese valor con «las naciones», porque la evidencia disponible favorece el significado común del término y la enumeración queda plenamente inteligible.
theological_decisions:
- issue: Tratamiento de גּוֹיִם en el título final
  english_pob_reading: The Hebrew goyim commonly means "nations," but here it may function as a place-name, matching the pattern of the other royal titles in the verse.
  chosen_spanish_reading: «rey de las naciones» en el texto principal, con la posibilidad de una lectura toponímica solo como trasfondo implícito.
  alternative_spanish_readings:
  - rey de Goiim
  - rey de los pueblos
  rationale: El expediente inglés terminó revisando la lectura hacia el sentido común «nations». Dado que no hay una decisión doctrinal implicada sino una cuestión lexical/toponímica, el español sigue esa revisión principal y evita introducir un nombre no asentado en el texto base.
  doctrine_reference: Sin implicación doctrinal directa; decisión lexical y de toponimia.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «king of Goiim» a «king of nations» por el adjudicador de revisión, manteniendo el resto del verso sin cambios. La traducción española sigue esa lectura revisada en el texto principal, pero conserva en nota la alternativa toponímica que el expediente inglés consideró.
  spanish_consistency_notes:
  - Se conserva el orden enumerativo de los cuatro reyes y sus reinos, con puntuación que refleja una sola oración narrativa.
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Los nombres propios se han adaptado a formas españolas legibles sin traducirlos.
  - La nota a preserva la tensión lexical entre sentido común y posible nombre de lugar para גּוֹיִם.
