revisions:
- from: Porque he aquí[a], yo levanto a un pastor en la tierra que no atenderá a los que perecen[b], no buscará a los dispersos, no sanará al quebrantado, no sostendrá al sano[c]; pero comerá la carne de los engordados y arrancará sus pezuñas.
  to: Porque he aquí[a], yo levanto a un pastor en la tierra que no atenderá a los que perecen[b], no buscará a los dispersos, no sanará a la quebrantada, no sostendrá a la sana[c], pero comerá la carne de las más gordas y arrancará sus pezuñas.
  rationale: Se hicieron ajustes menores para mejorar la fidelidad imagética y la naturalidad del español sin cambiar la decisión exegética principal del audit trail inglés. «La quebrantada» y «la sana» reflejan mejor el contexto del rebaño y la forma hebrea; «las más gordas» reemplaza una expresión poco idiomática; y la puntuación se suavizó para mayor fluidez.
