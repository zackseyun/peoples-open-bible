translation:
  language: es
  text: 'Porque el que dijo: «No cometerás adulterio», también dijo: «No asesinarás». Ahora bien, si no cometes adulterio pero sí asesinas, has llegado a ser transgresor de la ley.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὁ ... εἰπών
  english_pob_choice: he who said
  chosen_spanish: el que dijo
  alternatives_spanish:
  - el que habló
  - quien dijo
  lexicon: BDAG
  rationale: El participio articular se usa sustantivamente para señalar a la persona que pronunció los mandamientos. «El que dijo» conserva esa referencia personal sin añadir un sujeto explícito que el griego no expresa.
- source_word: Μὴ μοιχεύσῃς
  english_pob_choice: Do not commit adultery
  chosen_spanish: No cometerás adulterio
  alternatives_spanish:
  - No cometas adulterio
  - No adulterarás
  lexicon: BDAG
  rationale: La prohibición cita el lenguaje del mandamiento con fuerza normativa. En español, la forma futurizada tradicional («No cometerás») reproduce bien el tono de mandato citado y es clara en un contexto bíblico.
- source_word: καί
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: Aquí καί conecta un segundo mandamiento del mismo hablante; «también» hace explícita esa relación en español sin perder naturalidad.
- source_word: Μὴ φονεύσῃς
  english_pob_choice: Do not murder
  chosen_spanish: No matarás
  alternatives_spanish:
  - No asesinarás
  - No cometerás homicidio
  lexicon: BDAG
  rationale: φονεύω apunta a asesinato/homicidio, no a matar en general. Sin embargo, en español bíblico «No matarás» es la forma estable y ampliamente reconocible del mandamiento, y comunica adecuadamente la fuerza ética en este contexto.
- source_word: εἰ δὲ
  english_pob_choice: Now if
  chosen_spanish: Ahora bien, si
  alternatives_spanish:
  - Pero si
  - Y si
  lexicon: BDAG
  rationale: La expresión introduce una hipótesis argumentativa. «Ahora bien, si» conserva el giro lógico y el paso al caso hipotético de manera fluida en español.
- source_word: οὐ μοιχεύεις ... φονεύεις δέ
  english_pob_choice: you do not commit adultery but do murder
  chosen_spanish: si no cometes adulterio pero sí matas
  alternatives_spanish:
  - si no cometes adulterio, pero matas
  - si no adulteras pero asesinas
  lexicon: BDAG
  rationale: Los presentes indicativos en la condición plantean un caso general. En español, el contraste se expresa con claridad mediante «pero sí»; el añadido de «sí» recoge la oposición de δέ.
- source_word: γέγονας
  english_pob_choice: you have become
  chosen_spanish: has llegado a ser
  alternatives_spanish:
  - te has convertido en
  - has venido a ser
  lexicon: BDAG
  rationale: El perfecto de γίνομαι marca un estado resultante. «Has llegado a ser» conserva esa idea de resultado sin sonar rígido en español.
- source_word: παραβάτης νόμου
  english_pob_choice: a transgressor of the law
  chosen_spanish: transgresor de la ley
  alternatives_spanish:
  - violador de la ley
  - quebrantador de la ley
  lexicon: BDAG
  rationale: παραβάτης designa a quien viola un precepto o límite. «Transgresor de la ley» preserva el registro jurídico-moral y la amplitud del argumento de Santiago sobre la ley como unidad.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la Ley
  lexicon: BDAG
  rationale: En este contexto, la referencia es a la ley reconocida en el argumento inmediato. En español, el artículo definido es natural y mantiene el referente ya activado por los mandamientos citados.
theological_decisions:
- issue: Identidad del hablante de los mandamientos
  english_pob_reading: he who said, without expanding to 'God' in the main text.
  chosen_spanish_reading: el que dijo, sin explicitar 'Dios' en el texto principal.
  alternative_spanish_readings:
  - porque Dios dijo
  - el que, es decir, Dios, dijo
  rationale: El griego presenta un participio articular y no nombra explícitamente al sujeto. Mantener «el que dijo» respeta esa forma, aunque el contexto implique a Dios.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de la transgresión de la ley
  english_pob_reading: Retained 'a transgressor of the law' rather than a narrower phrase like 'a transgressor of that commandment.'
  chosen_spanish_reading: transgresor de la ley, no de un mandamiento aislado.
  alternative_spanish_readings:
  - transgresor de ese mandamiento
  - violador de ese precepto
  rationale: 'El argumento de Santiago presenta la ley como una unidad moral: quebrantar un mandamiento implica transgredir la ley. La traducción conserva ese alcance sin estrecharlo indebidamente.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran alta concordancia y no requieren revisión sustantiva; la versión española sigue de cerca las decisiones léxicas auditadas, ajustándolas a una formulación idiomática y publicable en español.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος, en consonancia con el argumento de Santiago y con el uso del artículo definido en español.
  - Se usa «transgresor» para preservar el registro jurídico-moral de παραβάτης.
  - Se evita explicitar «Dios» en el texto principal para respetar la forma articular del griego, aunque el contexto lo implique.
  - Las citas de los mandamientos se presentan con comillas y tono bíblico natural en español.
  - Se conserva la oposición lógica de la cláusula condicional con «pero sí», reflejando el contraste de δέ.
