translation:
  language: es
  text: 'En el desierto agreste[a]: Bet-arabá[b], Midín y Secacá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el desierto». El hebreo מִדְבָּר puede designar una región agreste y poco habitada, o un desierto, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Bet-arabá es un nombre de lugar; literalmente, «casa del Arabá».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר
  english_pob_choice: In the wilderness
  chosen_spanish: En el desierto
  alternatives_spanish:
  - En el desierto yermos
  - En la región desértica
  - En el páramo
  lexicon: HALOT
  rationale: El hebreo con preposición locativa marca el marco geográfico donde se ubican los pueblos. En español, «desierto» comunica bien el campo semántico de מִדְבָּר sin sonar artificial; «wilderness» en inglés se refleja aquí con una opción natural y fiel. Mantiene la ambigüedad entre terreno deshabitado y zona árida según el contexto.
- source_word: בֵּית הָעֲרָבָה
  english_pob_choice: Beth-arabah
  chosen_spanish: Bet-arabá
  alternatives_spanish:
  - Bet-arabá
  - Casa del Arabá
  - Bet-áraba
  lexicon: HALOT
  rationale: Se trata de un topónimo, no de una frase descriptiva. Se translitera con adaptación hispana razonable para la pronunciación y la lectura eclesial. No se traduce como «Casa del Arabá» porque la POB en inglés lo trata como nombre propio y la forma transliterada conserva ese criterio.
- source_word: מִדִּין
  english_pob_choice: Middin
  chosen_spanish: Midín
  alternatives_spanish:
  - Middín
  - Midin
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva como transliteración. La tilde en «Midín» ayuda a la pronunciación en español sin alterar el identificador del topónimo.
- source_word: וּסְכָכָה
  english_pob_choice: and Secacah
  chosen_spanish: y Secacá
  alternatives_spanish:
  - y Secacá
  - y Sekacá
  - y Sécacá
  lexicon: HALOT
  rationale: Nombre propio con la conjunción hebrea ו; se vierte con «y». Se conserva la transliteración del topónimo y se adapta la acentuación a patrones de lectura del español. No se sustituye por una forma tradicional no atestiguada en el material base.
theological_decisions:
- issue: Tratamiento de מִדְבָּר como término geográfico
  english_pob_reading: In the wilderness; footnote allows 'in the desert' as lexical alternative
  chosen_spanish_reading: En el desierto
  alternative_spanish_readings:
  - En el desierto
  - En la región desértica
  - En el páramo
  rationale: No hay una decisión doctrinal; la cuestión es léxica y geográfica. Se conserva la idea de zona árida o despoblada sin forzar una equivalencia técnica que excluya matices del hebreo.
  doctrine_reference: N/A
- issue: Topónimos como nombres propios frente a traducción descriptiva
  english_pob_reading: Beth-arabah, Middin, Secacah
  chosen_spanish_reading: Bet-arabá, Midín y Secacá
  alternative_spanish_readings:
  - Casa del Arabá, Midín y Secacá
  - Bet-arabá, Middin y Secacah
  rationale: La POB en inglés mantiene los nombres como topónimos transliterados y solo añade una nota etimológica en Beth-arabah. El español sigue ese mismo criterio para evitar falsear el carácter onomástico del texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El pasaje presenta un alto acuerdo en la revisión comparada y no requiere cambios sustantivos. Se mantuvo la estructura breve del hebreo: marco geográfico seguido de una lista de tres topónimos. La decisión principal fue adaptar la transliteración al español sin abandonar el criterio de nombres propios del POB inglés.'
  spanish_consistency_notes:
  - Se usó «desierto» para מִדְבָּר como término geográfico natural en español, preservando la alternativa «en el desierto» en nota.
  - Los topónimos se mantuvieron transliterados y no se tradujeron, siguiendo la práctica documentada en el audit trail.
  - Se evitó «Señor» o terminología teológica no pertinente, porque el versículo es puramente geográfico.
  - La conjunción final se expresó con «y» conforme al español estándar y al ו hebreo.
