translation:
  language: es
  text: Porque Yahvé no abandonará[a] a su pueblo; no dejará a su heredad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "desamparará" o "desechará" para el primer verbo.
    reason: lexical_alternative
  - marker: b
    text: O "herencia" para "heredad".
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón o fundamento de la afirmación anterior. "Porque" conserva esa fuerza explicativa con naturalidad en español.
- source_word: יִטֹּשׁ
  english_pob_choice: will not forsake
  chosen_spanish: no abandonará
  alternatives_spanish:
  - no desechará
  - no rechazará
  - no dejará
  lexicon: HALOT
  rationale: נטשׁ puede expresar abandonar, dejar o desechar. "Abandonará" comunica bien el matiz de desamparo o rechazo del pacto, sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según el criterio de la POB: transliteración del Tetragrámaton. En español, "Yahvé" es la forma más estable y natural para el nombre propio divino.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: עַם en contexto pactal designa al pueblo de Dios. "Su pueblo" preserva esa relación de pertenencia y el sentido colectivo.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión
  lexicon: HALOT
  rationale: נַחֲלָה puede traducirse como herencia, heredad o posesión asignada. "Heredad" mantiene el tono bíblico y el trasfondo de posesión pactal; en nota puede reconocerse la alternativa "herencia".
- source_word: יַעֲזֹב
  english_pob_choice: he will not abandon
  chosen_spanish: no dejará
  alternatives_spanish:
  - no abandonará
  - no desamparará
  lexicon: HALOT
  rationale: עזב completa el paralelismo con נטשׁ pero no exige repetir exactamente el mismo verbo. "No dejará" suena natural y preserva la idea de no abandonar o desamparar.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se evita la sustitución por un título; "Yahvé" mantiene el nombre personal de Dios y sigue la política doctrinal de la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz pactal de נַחֲלָתוֹ
  english_pob_reading: his inheritance
  chosen_spanish_reading: su heredad
  alternative_spanish_readings:
  - su herencia
  - su posesión
  rationale: La imagen no es meramente material; apunta al pueblo como posesión asignada por pacto. "Heredad" conserva ese valor teológico y literario, aunque "herencia" permanece como alternativa válida.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
