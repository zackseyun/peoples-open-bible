translation:
  language: es
  text: Ahora bien, Dositéo[a], el llamado hijo de Drímilo, judío de nacimiento, pero que después cambió sus costumbres[b] y se apartó de las doctrinas ancestrales, alojó en la tienda a un hombre insignificante[c] en lugar de él; y sucedió que este hombre recibió el castigo de aquel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dositéo, llamado hijo de Drímilo». La forma griega probablemente identifica a la persona mediante un patronímico.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «habiendo cambiado las costumbres/leyes y habiéndose apartado de las doctrinas ancestrales».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un hombre desconocido» o «un hombre sin importancia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δωσίθεος ὁ Δριμύλου λεγόμενος
  english_pob_choice: Dositheus, the one called son of Drimylus
  chosen_spanish: Dositéo, el llamado hijo de Drímilo
  alternatives_spanish:
  - Dositéo, llamado hijo de Drímilo
  - Dositéo, conocido como hijo de Drímilo
  lexicon: LSJ
  rationale: La expresión griega con λεγόμενος funciona de manera natural como identificación patronímica. En español, «el llamado hijo de Drímilo» conserva esa forma de designación sin forzar una relación jurídica o biológica más fuerte de la que el griego especifica.
- source_word: τὸ γένος Ἰουδαῖος
  english_pob_choice: a Jew by birth
  chosen_spanish: judío de nacimiento
  alternatives_spanish:
  - judío por nacimiento
  - judío de linaje
  lexicon: LSJ
  rationale: τὸ γένος señala linaje u origen étnico. «De nacimiento» comunica la identidad heredada de forma natural en español y mantiene la distinción respecto a su conducta posterior.
- source_word: μεταβαλὼν τὰ νόμιμα
  english_pob_choice: having changed his customs
  chosen_spanish: cambió sus costumbres
  alternatives_spanish:
  - cambió sus leyes
  - alteró sus prácticas
  lexicon: LSJ
  rationale: τὰ νόμιμα aquí apunta a prácticas y observancias recibidas, no simplemente a leyes abstractas. «Costumbres» preserva el sentido de conducta religiosa heredada en un español claro.
- source_word: τῶν πατρίων δογμάτων ἀπηλλοτριωμένος
  english_pob_choice: having become estranged from the ancestral beliefs
  chosen_spanish: se apartó de las doctrinas ancestrales
  alternatives_spanish:
  - se alienó de las tradiciones de sus padres
  - quedó ajeno a las doctrinas heredadas
  lexicon: LSJ
  rationale: ἀπηλλοτριωμένος indica alejamiento o extrañamiento. «Se apartó» evita una traducción demasiado técnica y mantiene la fuerza moral del alejamiento de las doctrinas transmitidas por los antepasados.
- source_word: ἄσημόν τινα
  english_pob_choice: some obscure man
  chosen_spanish: un hombre insignificante
  alternatives_spanish:
  - un hombre oscuro
  - un hombre desconocido
  lexicon: LSJ
  rationale: ἄσημος denota a alguien sin marca, relieve o reputación. «Insignificante» comunica esa falta de relieve social o público, aunque admite un matiz más valorativo que «desconocido».
- source_word: κατέκλινεν ἐν τῇ σκηνῇ
  english_pob_choice: lodged some obscure man in the tent in his place
  chosen_spanish: hizo recostar en la tienda a un hombre insignificante en lugar de él
  alternatives_spanish:
  - lo hizo tender en la tienda
  - lo alojó en la tienda en su lugar
  lexicon: LSJ
  rationale: κατακλίνω es literalmente «hacer recostar» o «hacer tender». En este contexto narrativo, la frase conserva la acción de colocar a otro en la tienda y deja clara la sustitución con «en lugar de él».
- source_word: ὃν συνέβη κομίσασθαι τὴν ἐκείνου κόλασιν
  english_pob_choice: and it happened that this man received that one's punishment
  chosen_spanish: y sucedió que este hombre recibió el castigo de aquel
  alternatives_spanish:
  - y aconteció que este hombre sufrió el castigo destinado a aquel
  - y pasó que este hombre recibió el castigo que correspondía al otro
  lexicon: LSJ
  rationale: συνέβη introduce el desenlace como acontecimiento. κομίσασθαι aquí es «recibir/incurrir en», y κόλασις es «castigo». La formulación preserva la ironía del resultado sin explicitar más de lo que el griego dice.
theological_decisions:
- issue: Caracterización de Dositéo como judío que abandona la herencia ancestral
  english_pob_reading: later having changed his customs and become estranged from the ancestral beliefs
  chosen_spanish_reading: después cambió sus costumbres y se apartó de las doctrinas ancestrales
  alternative_spanish_readings:
  - después cambió sus leyes y se alienó de las doctrinas de sus padres
  - más tarde alteró sus prácticas y quedó ajeno a las tradiciones de sus padres
  rationale: El griego presenta una evaluación negativa de la apostasía o alejamiento de la herencia recibida. La traducción conserva esa tensión moral sin suavizarla ni convertirla en una categoría doctrinal posterior ajena al texto.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y moral del texto fuente; no resolverla por armonización.'
translation_notes:
  revision_awareness: Se ha seguido el pasaje griego de Swete 1909 y el audit trail inglés de la POB. No se aplicaron revisiones posteriores al texto base; se mantuvo la tensión entre identidad heredada y abandono de las prácticas ancestrales, y se reflejó la sustitución narrativa del hombre puesto en la tienda.
  spanish_consistency_notes:
  - Se usa «Dios/espíritu/Mesías» según el estilo POB general, pero en este versículo no aparecen.
  - Se mantiene «tienda» para σκηνή, sin cargarla con un valor litúrgico adicional.
  - Se traduce κόλασις como «castigo», conforme al sentido punitivo del pasaje.
  - Se conserva la secuencia narrativa con un solo período largo, como en el griego, pero ajustada a la fluidez del español.
