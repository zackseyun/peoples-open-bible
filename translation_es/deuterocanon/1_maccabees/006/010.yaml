translation:
  language: es
  text: 'Y llamó a todos sus amigos[a] y les dijo: «El sueño se aparta de mis ojos[b], y mi corazón desfallece[c] por la ansiedad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «todos sus compañeros» o «todos sus consejeros»; φίλοι también puede referirse al círculo íntimo de un gobernante.
    reason: lexical_alternative
  - marker: b
    text: Lit., «El sueño se aparta de mis ojos». También puede entenderse como «El sueño ha dejado mis ojos» o «El sueño se ha ido de mis ojos».
    reason: lexical_alternative
  - marker: c
    text: O, «mi corazón se desmaya» o «mi corazón se abate»; el griego expresa un estado de abatimiento interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: LSJ
  rationale: καλέω en aoristo expresa llamar o convocar. «Llamó» es natural en español y conserva la acción simple sin añadir matiz técnico innecesario.
- source_word: πάντας τοὺς φίλους αὐτοῦ
  english_pob_choice: all his friends
  chosen_spanish: todos sus amigos
  alternatives_spanish:
  - todos sus compañeros
  - todos sus consejeros
  lexicon: LSJ
  rationale: φίλοι puede referirse literalmente a amigos, y también a un círculo cortesano. El texto griego base dice «amigos», así que se conserva esa forma en el cuerpo, dejando abierta la alternativa contextual en nota.
- source_word: Ἀφίσταται ἀπὸ τῶν ὀφθαλμῶν μου ὁ ὕπνος
  english_pob_choice: Sleep departs from my eyes
  chosen_spanish: El sueño se aparta de mis ojos
  alternatives_spanish:
  - El sueño ha dejado mis ojos
  - El sueño desaparece de mis ojos
  lexicon: LSJ
  rationale: ἀφίσταται significa apartarse, retirarse o alejarse. La imagen idiomática «de mis ojos» se conserva en español para mantener la vividez de la expresión.
- source_word: συνέπεπτον τῇ καρδίᾳ
  english_pob_choice: my heart faints
  chosen_spanish: mi corazón desfallece
  alternatives_spanish:
  - mi corazón se abate
  - mi corazón se desmaya
  - estoy desfallecido de corazón
  lexicon: LSJ
  rationale: La forma perfecta expresa un estado resultante de abatimiento o colapso interior. «Desfallece» comunica ese estado con dignidad y cercanía al giro revisado del inglés, sin perder la fuerza emocional.
- source_word: ἀπὸ τῆς μερίμνης
  english_pob_choice: from anxiety
  chosen_spanish: por la ansiedad
  alternatives_spanish:
  - por la preocupación
  - a causa de la ansiedad
  lexicon: LSJ
  rationale: μέριμνα puede significar preocupación, cuidado o ansiedad. «Ansiedad» mantiene el peso del contexto; la preposición «por» expresa la causa de manera natural en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la última cláusula de «my heart sinks» a «my heart faints» para acercarse más a συνέπεπτον τῇ καρδίᾳ. Por eso la versión española usa «mi corazón desfallece», que refleja mejor el colapso afectivo que un simple «se hunde» o «se abate».
  spanish_consistency_notes:
  - Se mantuvo «amigos» en el texto principal, coherente con la decisión del POB inglés, sin imponer la lectura técnica de «consejeros» en el cuerpo.
  - Se preservó la imagen corporal de «ojos» para la idiomática del sueño, evitando una paráfrasis abstracta.
  - «Ansiedad» se usó en sentido fuerte, acorde con la gravedad del contexto narrativo.
