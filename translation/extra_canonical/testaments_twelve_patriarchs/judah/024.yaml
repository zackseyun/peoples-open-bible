  text: "XXIV. *Καὶ μετὰ ταῦτα¹ ἀνατελεῖ ὑμῖν ἄστρον²· ἐξ³ Ἰακὼβ ἐν εἰρήνῃ⁴, καὶ ἀναστήσεται ἄνθρωπος ἐκ τοῦ σπέρματός μου⁵ ὡς⁶ ἥλιος δικαιοσύνης συμπορευόμενος⁷ τοῖς ἀνθρώποις⁸ ἐν πραότητι καὶ δικαιοσύνῃ, καὶ πᾶσα ἁμαρτία οὐχ⁹ εὑρεθήσεται ἐν αὐτῷ. 2. Καὶ ἀνοιγήσονται ἐπ᾽ αὐτῷ¹⁰ οἱ οὐρανοὶ ἐκχέαι¹⁴ πνεῦμα¹⁵ εὐλογίαν πατρὸς ἁγίου¹⁶, καὶ αὐτὸς ἐκχέει ἐφ᾽ ὑμᾶς πνεῦμα χάριτος. 3. *Καὶ ἔσεσθε αὐτῷ εἰς υἱοὺς¹⁷ ἐν ἀληθείᾳ¹⁸, *καὶ πορεύεσθε¹⁸ ἐν προστάγμασιν¹⁹ αὐτοῦ πρώτοις καὶ ἐσχάτοις. 4. [Οὗτος ὁ βλαστὸς²⁰ Θεοῦ ὑψίστου *καὶ αὕτη ἡ πηγὴ *πᾶσι παρέχουσα²² ζωήν¹⁰]. 5. Τότε ἀναλάμψει³¹ σκῆπτρον βασιλείας μου, καὶ ἀπὸ τῆς ῥίζης ὑμῶν²² γενήσεται πυθμήν²³· 6. Καὶ ἐξ αὐτῆς βλαστήσει²⁴ ῥάβδος δικαιοσύνης²⁵ τοῖς ἔθνεσι, *κρῖναι καὶ σῶσαι²⁶ πάντας τοὺς²⁷ ἐπικαλουμένους τὸν²⁸ Κύριον."
  language: Greek
  source_pages:
  - 171
  - 172
translation:
  text: |-
    1. He will pour out the spirit of the holy Father’s blessing upon him, and he himself will pour out a spirit of grace upon you.
    2. And you will be for him sons in truth, and you will walk in his commands, first and last.
    3. [This is the shoot of the Most High God, a spring for the life of all flesh.]
    4. Then the scepter of my kingdom will shine forth, and from your root a stem will arise.
    5. And from it will spring up a rod of righteousness for the nations, to judge and to save all who call upon the Lord.
