review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: imperativo de atender al padre, cláusula explicativa sobre el padre que lo engendró, y prohibición de despreciar a la madre en su vejez. También preserva adecuadamente el valor temporal de כִּי como «cuando». Sin embargo, la nota b está anclada al segmento equivocado: el marcador [b] aparece en «te engendró», pero la nota explica «cuando haya envejecido / ha llegado a la vejez», que corresponde a זָקְנָה.'
  spanish_quality_summary: El español es claro y digno. «Escucha a tu padre» y «no desprecies a tu madre» son naturales y fieles. No obstante, «cuando ya sea vieja» suena algo más áspero de lo necesario en español eclesial general; «cuando ya sea anciana» o «cuando haya envejecido» mantiene mejor la dignidad y legibilidad. Además, el error de anclaje de la nota requiere corrección formal obligatoria.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. Las decisiones léxicas principales son coherentes con el expediente inglés: שְׁמַע → «Escucha», זֶה → relativa explicativa, יְלָדֶךָ → «te engendró», בוז → «desprecies». Recomiendo ajustar «vieja» a «anciana» por registro y mover [b] al segmento de la vejez para alinearlo con la rationale documentada.'
  issues:
  - severity: high
    issue: El marcador de la nota [b] está colocado en «te engendró», pero la nota trata sobre «cuando haya envejecido / la vejez».
    rationale: Las notas deben anclarse exactamente al término o frase pertinente. Aquí la nota explica זָקְנָה, no יְלָדֶךָ.
  - severity: medium
    issue: «Cuando ya sea vieja» es fiel en sentido, pero menos digno y menos natural para un registro bíblico amplio que «cuando ya sea anciana».
    rationale: Aunque «vieja» puede ser semánticamente correcto, en español contemporáneo suele sonar más brusco o despectivo, lo que puede distraer del mandato de honrar a la madre.
  revised_spanish_text: Escucha a tu padre[a], el que te engendró, y no desprecies a tu madre cuando ya sea anciana[b].
