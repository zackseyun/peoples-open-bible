translation:
  language: es
  text: Y la tierra tembló[a] por los que habitaban en ella, y toda la casa de Jacob se vistió de vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra». El griego γῆ puede significar «tierra» o «país/territorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσείσθη
  english_pob_choice: shook
  chosen_spanish: tembló
  alternatives_spanish:
  - fue sacudida
  - se estremeció
  lexicon: LSJ
  rationale: El aoristo pasivo de σείω admite la idea de sacudirse o estremecerse. «Tembló» suena natural en español y conserva la fuerza viva del movimiento sin decidir en exceso si es un fenómeno literal, poético o ambos.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  lexicon: LSJ
  rationale: γῆ puede significar «tierra» o «país/land». En español, «la tierra» mantiene amplitud y dignidad poética, y evita imponer una lectura más estrecha que el griego no exige.
- source_word: ἐπὶ τοὺς κατοικοῦντας αὐτήν
  english_pob_choice: for those who dwelt on it
  chosen_spanish: por los que habitaban en ella
  alternatives_spanish:
  - contra los que habitaban en ella
  - sobre los que habitaban en ella
  lexicon: LSJ
  rationale: La preposición ἐπί con acusativo aquí se entiende en relación con los habitantes de la tierra. «Por los que habitaban en ella» sigue de cerca el sentido contextual que adoptó la POB inglesa revisada y fluye naturalmente en español.
- source_word: πᾶς ὁ οἶκος Ἰακώβ
  english_pob_choice: the whole house of Jacob
  chosen_spanish: toda la casa de Jacob
  alternatives_spanish:
  - todo el pueblo de Jacob
  - todo Israel
  lexicon: LSJ
  rationale: «Casa de Jacob» preserva la expresión covenantal y bíblica del original. «Toda» mantiene el valor totalizador de πᾶς sin reemplazar el nombre tradicional por una interpretación expansiva.
- source_word: ἐνεδύσατο
  english_pob_choice: clothed itself with
  chosen_spanish: se vistió de
  alternatives_spanish:
  - se cubrió de
  - se revestió de
  lexicon: LSJ
  rationale: El verbo medio de ἐνδύω conserva la metáfora de vestirse. «Se vistió de» es idiomático y mantiene la imagen concreta sin borrar la metáfora de la vergüenza como prenda.
- source_word: αἰσχύνην
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - oprobio
  lexicon: LSJ
  rationale: αἰσχύνη puede ser «vergüenza» o «deshonra». «Vergüenza» es la opción más directa y comprensible en español, y conserva el peso moral y público del término.
theological_decisions:
- issue: Si γῆ debe traducirse como «tierra» o como un equivalente más restringido a «país/territorio»
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: La POB inglesa prefirió «the earth» por su amplitud y tono de lamento. En español, «la tierra» preserva esa amplitud sin forzar una literalidad científica ni estrechar el alcance a un territorio político.
  doctrine_reference: Principio de primacía del idioma original; equivalencia óptima y estilo bíblico moderno.
- issue: Si debe conservarse la metáfora de vestirse con vergüenza
  english_pob_reading: clothed itself with shame
  chosen_spanish_reading: se vistió de vergüenza
  alternative_spanish_readings:
  - se cubrió de vergüenza
  - se revistió de vergüenza
  rationale: La metáfora está explícita en el griego y la POB la preserva. «Se vistió de vergüenza» mantiene la imagen de manera natural en español y evita una paráfrasis que debilite la carga poética.
  doctrine_reference: Principio de equivalencia óptima; conservar imágenes bíblicas del texto fuente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se evitó «sobre los que habitaban en ella» y se prefirió una formulación española natural que corresponda al valor contextual de ἐπὶ, manteniendo también la metáfora de vestirse con vergüenza en vez de una paráfrasis menos visual.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - «Casa de Jacob» se conservó como expresión bíblica estable, sin expandirla a «Israel».
  - La nota de pie [a] está anclada correctamente en «tierra» para reflejar la alternativa léxica de γῆ.
