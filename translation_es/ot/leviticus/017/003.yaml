translation:
  language: es
  text: Todo hombre[a] de la casa de Israel que degüelle un buey, una oveja o una cabra en el campamento, o que lo degüelle fuera del campamento—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Todo hombre»; la expresión es distributiva («hombre, hombre») y funciona de modo genérico para cualquier miembro de la sociedad israelita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Toda persona
  - Quienquiera
  lexicon: HALOT
  rationale: La duplicación hebrea tiene valor distributivo e inclusivo. «Todo hombre» conserva bien la fuerza general y el matiz legal sin volver la frase demasiado abstracta. En español, «hombre» puede funcionar de manera genérica en este registro, y el añadido de «todo» transmite la distribución.
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Se conserva el idiomatismo del hebreo («casa de Israel») porque tiene peso pactual y no conviene reducirlo a una mera referencia étnica.
- source_word: יִשְׁחַט
  english_pob_choice: slaughters
  chosen_spanish: degüelle
  alternatives_spanish:
  - sacrifique
  - mate
  - desuelle
  lexicon: HALOT
  rationale: El verbo שָׁחַט apunta al acto de degollar o sacrificar un animal. «Degüelle» mantiene con precisión el gesto físico y el registro ritual/legal mejor que «mate». En español bíblico, «sacrificar» podría sugerir demasiado una ofrenda formal, algo que el contexto inmediato no impone.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - res
  lexicon: HALOT
  rationale: «Toro» es una opción natural y clara en español para este animal grande del ganado. Aunque «buey» es frecuente en traducciones tradicionales, puede sugerir animal castrado; «toro» mantiene mejor la referencia genérica a un bovino sacrificial o alimentario.
- source_word: כֶשֶׂב
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - carnero joven
  - cordero
  lexicon: HALOT
  rationale: El término puede abarcar la oveja del rebaño en sentido general. «Oveja» conserva ese valor genérico; «cordero» sería demasiado específico por la edad.
- source_word: עֵז
  english_pob_choice: goat
  chosen_spanish: cabra
  alternatives_spanish:
  - chiva
  lexicon: HALOT
  rationale: «Cabra» es el equivalente más neutro y ampliamente entendido en español para el animal listado.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - dentro del campamento
  lexicon: HALOT
  rationale: Se mantiene la localización directa del hebreo. «Campamento» es más natural en español que «campamento» y preserva el marco narrativo del éxodo y el desierto.
- source_word: אֲשֶׁר ... אֲשֶׁר
  english_pob_choice: who ... or who
  chosen_spanish: que ... o que
  alternatives_spanish:
  - el que ... o el que
  - quien ... o quien
  lexicon: HALOT
  rationale: La repetición relativa se reproduce con «que ... o que» para conservar el paralelismo jurídico del hebreo sin forzar una formulación más rígida.
- source_word: '[implicit object after second יִשְׁחַט]'
  english_pob_choice: slaughters it
  chosen_spanish: lo degüelle
  alternatives_spanish:
  - degüelle
  - lo mate
  lexicon: English ellipsis handling
  rationale: El segundo verbo carece de objeto explícito en hebreo. En español, el pronombre «lo» recupera el objeto implícito sin añadir contenido nuevo. Se prefiere repetir la misma acción verbal para sostener la simetría del versículo.
translation_notes:
  revision_awareness: Se revisó el texto a la luz del hebreo masorético y del audit trail en inglés. No hubo revisiones textuales pendientes ni cambios propuestos en la pasada más reciente; la traducción mantiene el sentido legal y distributivo del original, con un manejo explícito del sujeto genérico y del objeto implícito en la segunda cláusula.
  spanish_consistency_notes:
  - Se usó «campamento» de forma consistente para בַּמַּחֲנֶה y לַמַּחֲנֶה.
  - Se mantuvo la estructura repetida «que ... o que ...» para reflejar el hebreo duplicado.
  - Se eligió un registro legal-bíblico claro y moderno, evitando calcos innecesarios pero preservando los términos rituales clave.
