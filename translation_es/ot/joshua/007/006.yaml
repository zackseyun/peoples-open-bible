revisions:
- from: Entonces Josué rasgó sus vestidos y cayó rostro en tierra delante del arca de Yahvé hasta la tarde[a], él y los ancianos de Israel; y echaron polvo sobre sus cabezas[b].
  to: Entonces Josué rasgó sus vestidos y cayó postrado rostro en tierra delante del arca de Yahvé hasta la tarde, él y los ancianos de Israel; y echaron polvo sobre sus cabezas[a].
  rationale: Se elimina la nota [a] porque no representa una alternativa válida ni está correctamente anclada en el texto. Se mejora «cayó rostro en tierra» a «cayó postrado rostro en tierra» para un español más natural y preciso, manteniendo la solemnidad y la imagen física de postración del hebreo. Se conserva «echaron polvo sobre sus cabezas» por su naturalidad idiomática en español y su fidelidad al gesto cultural descrito.
  reviewer_model: gpt-5.4
