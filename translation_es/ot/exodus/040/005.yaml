translation:
  language: es
  text: Y pondrás el altar de oro[a] para incienso delante del arca del testimonio[b], y pondrás la cortina de la entrada del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse, de manera más tradicional, «el altar de oro del incienso».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el arca del testimonio»; la traducción tradicional suele decir «el arca del pacto».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: you shall place
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - pondrás allí
  - situarás
  lexicon: HALOT
  rationale: נתן aquí expresa poner o colocar un objeto en su sitio. En español, «pondrás» mantiene la instrucción directa y natural sin perder el valor de ubicación ritual.
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro puro
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «altar de oro». En español, «altar de oro» conserva el valor material sin introducir una adjetivación menos literal como «dorado».
- source_word: לִקְטֹרֶת
  english_pob_choice: for incense
  chosen_spanish: para incienso
  alternatives_spanish:
  - para quemar incienso
  - de incienso
  lexicon: HALOT
  rationale: El ל final indica finalidad o función. «Para incienso» conserva esa finalidad de forma breve y clara, sin convertir la frase en el título tradicional fijo si no es necesario.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en frente de
  lexicon: HALOT
  rationale: «Delante de» expresa bien la relación espacial de לִפְנֵי en este contexto cultual y suena natural en español bíblico contemporáneo.
- source_word: אֲרוֹן הָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: Se conserva «testimonio» porque el hebreo dice explícitamente עֵדֻת, no «pacto». «Pacto» es la alternativa tradicional, pero aquí suavizaría la precisión del original.
- source_word: וְשַׂמְתָּ
  english_pob_choice: you shall set
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - situarás
  - pondrás
  lexicon: HALOT
  rationale: שׂים y נתן se solapan semánticamente; en español conviene no forzar una variación artificial. «Pondrás» mantiene paralelismo con el primer verbo y el sentido de acción de colocación.
- source_word: מָסַךְ
  english_pob_choice: the screen
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - la pantalla
  - el cortinaje
  lexicon: HALOT
  rationale: En el ámbito del tabernáculo, מָסַךְ designa un paño colgante de cierre o protección. «Velo» funciona en español bíblico para un elemento colgante de separación; se reserva «pantalla» por ser poco idiomático aquí.
- source_word: הַפֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: de la entrada
  alternatives_spanish:
  - de la puerta
  - del acceso
  lexicon: HALOT
  rationale: פֶּתַח es la abertura o entrada. «Entrada» transmite bien la función arquitectónica del término en español natural.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: of the tabernacle
  chosen_spanish: del tabernáculo
  alternatives_spanish:
  - para el tabernáculo
  - del santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן se traduce de manera estándar como «tabernáculo» en este contexto cultual. El genitivo español «del tabernáculo» reproduce de forma clara la relación del velo con la entrada.
theological_decisions:
- issue: 'Título del arca: «testimonio» vs. «pacto»'
  english_pob_reading: the ark of the testimony
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  rationale: Se preserva la designación más exacta del hebreo. Aunque «arca del pacto» es muy conocida en la tradición, aquí el texto nombra explícitamente el «testimonio», y la traducción no debe reemplazarlo por un equivalente tradicional menos preciso.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Terminología del elemento de entrada del tabernáculo
  english_pob_reading: the screen for the entrance of the tabernacle
  chosen_spanish_reading: el velo de la entrada del tabernáculo
  alternative_spanish_readings:
  - la cortina de la entrada del tabernáculo
  - el velo para la entrada del tabernáculo
  rationale: En español, «velo» comunica bien un paño colgante ritual y preserva un registro bíblico digno. «Cortina» sería posible, pero «velo» mantiene mejor la resonancia cultual sin ocultar que se trata de un cierre de entrada.
  doctrine_reference: Translation philosophy §3 (terminología cultual consistente, con claridad en español)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «golden altar» sobre «gold altar» por naturalidad. En español se optó por «altar de oro», que conserva la literalidad del hebreo sin forzar una adjetivación menos natural. También se mantuvo la precisión de «testimonio» frente a la lectura tradicional «pacto», conforme al audit trail inglés.
  spanish_consistency_notes:
  - 'Se conservó una terminología cultual consistente: «altar de oro», «incienso», «arca del testimonio», «tabernáculo».'
  - Se evitó la sustitución automática por fórmulas tradicionales cuando el hebreo es más específico.
  - La repetición de «pondrás» / «pondrás» refleja el paralelismo verbal del hebreo y no intenta crear una variación estilística artificial.
