revisions:
- from: Entonces Gedeón subió por el camino de los que habitan en tiendas[a], al oriente de Nobá y de Jogbáha, e hirió al campamento; y el campamento estaba seguro[b].
  to: Entonces Gedeón subió por el camino de los que habitan en tiendas[a], al este de Nobah y Jogbehah, y golpeó el campamento mientras el campamento estaba desprevenido[b].
  rationale: Se ajusta el español para mayor naturalidad y mejor alineación con la auditoría inglesa y el hebreo. 'Golpeó el campamento' evita la impropiedad de 'hirió al campamento' sin perder la cercanía a נכה. 'Estaba desprevenido' traslada al texto principal el sentido contextual que la POB inglesa eligió como principal para בֶטַח, mientras la nota conserva 'seguro' como alternativa semántica legítima. También se corrige la función de la nota [a] y se normalizan los topónimos.
  reviewer_model: gpt-5.4
