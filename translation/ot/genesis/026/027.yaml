id: GEN.26.27
reference: Genesis 26:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ יִצְחָ֔ק מַדּ֖וּעַ בָּאתֶ֣ם אֵלָ֑/י וְ/אַתֶּם֙ שְׂנֵאתֶ֣ם אֹתִ֔/י וַ/תְּשַׁלְּח֖וּ/נִי מֵ/אִתְּ/כֶֽם׃
translation:
  text: Isaac said to them[a], “Why have you come to me, since you hated me and sent me away from among you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and you hated me and sent me away from you.” The Hebrew conjunction can be rendered more literally as “and,” but here it likely carries a contrastive or circumstantial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative introduction. Although the following clause is interrogative, English naturally uses 'said' with direct speech here.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct object of speech with אל; straightforward addressee marking.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated by standard English convention per translation philosophy.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Natural interrogative in modern English; preserves the causal sense without stiffness.
- source_word: בָּאתֶם אֵלַי
  chosen: have you come to me
  alternatives:
  - did you come to me
  lexicon: HALOT
  rationale: English present perfect fits the current-result force of the Hebrew perfect in direct discourse, since their arrival has just occurred and motivates Isaac's question.
- source_word: וְאַתֶּם
  chosen: when you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: 'The conjunction links the second clause to the first with adversative/circumstantial force. ''When you'' makes the logic idiomatic in English: their coming is surprising in light of prior hostility.'
- source_word: שְׂנֵאתֶם אֹתִי
  chosen: you hated me
  alternatives:
  - you were hostile to me
  lexicon: HALOT
  rationale: The verb שנא ordinarily means 'hate.' The stronger term should be retained rather than softened, since Isaac is explicitly naming their prior enmity.
- source_word: וַתְּשַׁלְּחוּנִי
  chosen: sent me away
  alternatives:
  - drove me away
  - dismissed me
  lexicon: HALOT
  rationale: שׁלח with personal object in this context means to send someone away. 'Sent me away' is clear and close to the Hebrew; 'drove me away' is possible but somewhat stronger than the verb itself requires.
- source_word: מֵאִתְּכֶם
  chosen: from among you
  alternatives:
  - from you
  - away from you
  lexicon: HALOT
  rationale: The preposition with את conveys separation from their company/presence. 'From among you' preserves the social-relational nuance better than the flatter 'from you.'
