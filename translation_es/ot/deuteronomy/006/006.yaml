review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: «estas palabras», «yo», «hoy» y «corazón» están bien alineados con la evidencia fuente y con la auditoría inglesa. También preserva correctamente la imagen idiomática de עַל לְבָבֶךָ con nota alternativa. Sin embargo, «te mando» debilita el matiz específico de צוה como ‘mandar/ordenar como mandato’ y suena menos preciso en registro bíblico que «te ordeno» o «te estoy ordenando».'
  spanish_quality_summary: El español es claro y legible, pero «yo te mando» puede leerse en varios países como ‘te envío’ o sonar coloquial/ambiguo. «Yo te ordeno» da mejor claridad y dignidad eclesial sin volverse arcaico. El resto del verso suena natural y fiel.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «corazón» preserva correctamente לְבָב. La principal cuestión léxica es mejorar la correspondencia de מְצַוְּךָ para evitar la ambigüedad de «mando».
  issues:
  - severity: medium
    issue: «yo te mando» es potencialmente ambiguo para מְצַוְּךָ
    rationale: Aunque puede significar ‘ordeno’, en español general también puede entenderse como ‘envío’. Dado que el hebreo expresa un acto de mandar/ordenar, conviene una forma inequívoca y más digna en contexto bíblico.
  revised_spanish_text: Y estas palabras que yo te ordeno hoy estarán sobre tu corazón[a].
  revised_footnotes:
  - marker: a
    text: O «en tu corazón». El hebreo dice literalmente «sobre tu corazón», un modismo para guardar estas palabras continuamente en la vida interior.
    reason: lexical_alternative
