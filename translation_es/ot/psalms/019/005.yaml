translation:
  language: es
  text: Por toda la tierra ha salido su línea[a], y hasta el extremo del mundo sus palabras. En ellos ha puesto una tienda para el sol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su sonido/voz ha salido por toda la tierra». El texto consonántico hebreo dice «su línea», pero algunas versiones antiguas y muchos intérpretes entienden el sentido como «sonido» o «voz» en este contexto poético.'
    reason: alternative_reading
  - marker: b
    text: «En ellos» probablemente se refiere a los cielos mencionados en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: קַוָּם
  english_pob_choice: their line
  chosen_spanish: su línea
  alternatives_spanish:
  - su voz
  - su sonido
  - su cordel de medida
  lexicon: HALOT, BDB
  rationale: El texto consonántico de la MT dice literalmente ‘línea’. En español, ‘su línea’ conserva esa lectura primaria y el paralelismo con ‘sus palabras’. Las alternativas interpretativas (‘voz’, ‘sonido’) quedan disponibles en nota porque reflejan una tradición antigua de interpretación, pero no sustituyen el dato textual principal.
- source_word: מִלֵּיהֶם
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su habla
  - sus expresiones
  lexicon: HALOT, BDB
  rationale: ‘Palabras’ es la equivalencia más natural y directa para מִלִּים/מִלֵּי־, y mantiene el paralelismo poético del versículo sin cargar el texto con explicaciones.
- source_word: תֵבֵל
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo habitado
  lexicon: HALOT, BDB
  rationale: ‘Mundo’ comunica bien el alcance universal del hebreo תֵבֵל en un registro poético natural. ‘Mundo habitado’ sería más explícito, pero menos fluido en español.
- source_word: שָׂם
  english_pob_choice: has set
  chosen_spanish: puso
  alternatives_spanish:
  - ha puesto
  - colocó
  - apuntó
  lexicon: HALOT, BDB
  rationale: El verbo perfecto hebreo expresa una acción ya realizada. En español, ‘puso’ preserva esa inmediatez poética y sugiere el acto de colocar una tienda para el sol.
- source_word: אֹהֶל
  english_pob_choice: a tent
  chosen_spanish: una tienda
  alternatives_spanish:
  - un tabernáculo
  - una morada
  lexicon: HALOT, BDB
  rationale: ‘Tienda’ reproduce el sentido ordinario de אֹהֶל sin introducir resonancias cultuales que el contexto no exige. ‘Tabernáculo’ sería demasiado especializado.
- source_word: בָּהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - entre ellos
  - en los cielos
  lexicon: HALOT, BDB
  rationale: El pronombre conserva la referencia implícita a los cielos/firmamento del contexto inmediato. ‘En ellos’ mantiene la ambigüedad del hebreo sin explicitar más de lo necesario en el cuerpo del texto.
- source_word: לַשֶּׁמֶשׁ
  english_pob_choice: for the sun
  chosen_spanish: para el sol
  alternatives_spanish:
  - para el sol mismo
  lexicon: HALOT, BDB
  rationale: La preposición se vierte de manera directa y sobria. No hace falta expandirla, porque el poema ya presenta la imagen con claridad.
- source_word: יָצָא
  english_pob_choice: has gone out
  chosen_spanish: salió
  alternatives_spanish:
  - ha salido
  - se extendió
  lexicon: HALOT, BDB
  rationale: Aunque el inglés usa el presente perfecto para expresar acción con efecto vigente, en español poético ‘salió’ resulta natural y fiel al valor perfectivo del hebreo. ‘Se extendió’ sería más interpretativo.
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y sin cambios necesarios; por eso esta redacción conserva la decisión principal de la POB inglesa de mantener «línea» en el texto, con nota alternativa para la lectura tradicional de «voz/sonido».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito en hebreo.
  - 'Se preservó el paralelismo poético con dos cola principales: ‘su línea / sus palabras’.'
  - Se evitó ‘cielo’ en el cuerpo del texto para no resolver en exceso el antecedente de «en ellos», pero se aclaró en nota.
  - No se usó ‘tabernáculo’ para אֹהֶל a fin de no introducir connotaciones cultuales ajenas al contexto.
