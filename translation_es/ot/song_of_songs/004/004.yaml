translation:
  language: es
  text: Tu cuello es como la torre de David[a], construida para arsenales; mil escudos cuelgan de ella, todos los escudos de los guerreros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con hileras de piedra», «para fortificaciones» o «por niveles». El término hebreo תלפיות es raro y su sentido preciso es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמִגְדַּל
  english_pob_choice: is like the tower
  chosen_spanish: es como la torre
  alternatives_spanish:
  - es como una torre
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige una comparación explícita. En español, «es como la torre» conserva la imagen poética y el valor definido del constructo con David.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio transliterado por convención.
- source_word: צַוָּארֵךְ
  english_pob_choice: your neck
  chosen_spanish: tu cuello
  alternatives_spanish:
  - tu garganta
  lexicon: HALOT
  rationale: Es una referencia corporal directa dentro de la metáfora amorosa; «cuello» es la forma natural y precisa en español.
- source_word: בָּנוּי
  english_pob_choice: built
  chosen_spanish: construida
  alternatives_spanish:
  - edificada
  - construido
  lexicon: HALOT
  rationale: Participio pasivo de בנה; en español, «construida» mantiene el paralelo arquitectónico sin sonar forzado.
- source_word: לְתַלְפִּיּוֹת
  english_pob_choice: for armories
  chosen_spanish: para arsenales
  alternatives_spanish:
  - para armaduras
  - para almacenes de armas
  - con hileras de piedra
  lexicon: HALOT
  rationale: El término hebreo es raro y discutido. El audit trail inglés terminó en un sentido militar general («for armories»), así que «para arsenales» refleja esa decisión sin fingir certeza sobre una etimología más específica.
- source_word: אֶלֶף הַמָּגֵן
  english_pob_choice: a thousand shields
  chosen_spanish: mil escudos
  alternatives_spanish:
  - mil broqueles
  - mil escudos defensivos
  lexicon: HALOT
  rationale: El hebreo expresa un número redondo con un sustantivo colectivo singular; «mil escudos» es natural y conserva el inventario visual.
- source_word: תָּלוּי עָלָיו
  english_pob_choice: hang on it
  chosen_spanish: cuelgan de ella
  alternatives_spanish:
  - están colgados de ella
  - cuelgan sobre ella
  lexicon: HALOT
  rationale: La imagen es estática y visible; «cuelgan de ella» reproduce bien el participio sin sobreinterpretar el movimiento.
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas
  lexicon: HALOT
  rationale: Concordancia natural con «escudos» y preservación del valor colectivo.
- source_word: שִׁלְטֵי
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - broqueles
  - armas
  lexicon: HALOT
  rationale: El texto hebreo distingue este término de מָגֵן, pero en la revisión inglesa ya no se marcó una distinción como «small shields». En español, «escudos» mantiene el sentido sin introducir una especificación no garantizada por el estado final del audit trail.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: of the warriors
  chosen_spanish: de los guerreros
  alternatives_spanish:
  - de los valientes
  - de los héroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים designa combatientes fuertes o valientes. «Guerreros» es idiomático y adecuado para el campo bélico del verso.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail inglés: se prefirió un sentido militar general para לתלפיות («for armories») y se eliminó la especificación «small» para שִׁלְטֵי. Por eso la línea española evita «en hileras de piedra» y usa un equivalente militar general, manteniendo el registro poético y la cautela ante un término raro.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Escudos» traduce tanto מָגֵן como שִׁלְטֵי en sentido general, sin forzar una distinción que el estado final del audit trail inglés ya no sostuvo explícitamente.
  - La sintaxis conserva el paralelismo poético y la metáfora corporal del original sin añadir interpretaciones alegóricas.
