translation:
  language: es
  text: Entonces serás humillada; desde la tierra hablarás[a], y desde el polvo tu habla se oirá baja. Tu voz será como la de un médium[b] desde la tierra, y desde el polvo tu habla piará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como una voz fantasmal’; el hebreo sugiere un hablar débil y tenue desde abajo.
    reason: lexical_alternative
  - marker: b
    text: O ‘como la de un fantasma’ o ‘como la de un necromante’; el hebreo אוֹב se asocia con un médium y con la voz tenue vinculada a la necromancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַלְתְּ
  english_pob_choice: Then you will be brought low
  chosen_spanish: Entonces serás humillada
  alternatives_spanish:
  - Entonces serás abatida
  - Entonces serás puesta en humillación
  lexicon: HALOT
  rationale: El verbo expresa el quedar rebajada o humillada en un contexto de juicio. En español, «serás humillada» conserva bien la pasiva/resultativa y el tono de degradación sin perder naturalidad.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - desde el suelo
  - desde la tierra
  lexicon: HALOT
  rationale: «אֶרֶץ» puede referirse a tierra/suelo. Se eligió «tierra» porque mantiene el paralelismo poético con «polvo» y suena más natural en español bíblico contemporáneo.
- source_word: תְּדַבֵּרִי
  english_pob_choice: you will speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - hablarás
  lexicon: HALOT
  rationale: El Piel de דבר simplemente indica hablar. «Hablarás» es directo y mantiene la imagen de la voz que sale desde abajo.
- source_word: וּמֵעָפָר
  english_pob_choice: and from the dust
  chosen_spanish: y desde el polvo
  alternatives_spanish:
  - y desde el polvo
  - y del polvo
  lexicon: HALOT
  rationale: «עָפָר» es «polvo». Se conserva la repetición para mantener el paralelismo y la imagen de abatimiento.
- source_word: תִּשַּׁח
  english_pob_choice: your speech will be low
  chosen_spanish: tu palabra será baja
  alternatives_spanish:
  - tu palabra será baja
  - tu palabra se humillará
  - tu palabra será tenue
  lexicon: HALOT
  rationale: La raíz es difícil y puede expresar algo bajado, inclinado o reducido. «Será baja» sigue de cerca la revisión inglesa más literal y evita interpretar demasiado, aunque en español suene algo figurado.
- source_word: אִמְרָתֵךְ
  english_pob_choice: your speech
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu palabra
  - tu dicho
  - tu habla
  lexicon: HALOT
  rationale: Aquí אִמְרָה se refiere al dicho o expresión pronunciada. «Palabra» es una opción sobria y bíblicamente comprensible en español, aunque se reconoce la posible amplitud de «speech».
- source_word: כְּאוֹב
  english_pob_choice: like that of a medium
  chosen_spanish: como la de una médium
  alternatives_spanish:
  - como la de una médium
  - como la de un espíritu
  - como la de un adivino
  lexicon: HALOT
  rationale: Se conserva la referencia léxica a אוב como practicante de necromancia/medium. En español, «médium» comunica el oficio sin borrar la tensión teológica del término.
- source_word: קוֹלֵךְ
  english_pob_choice: Your voice
  chosen_spanish: Tu voz
  alternatives_spanish:
  - Tu voz
  - Tu sonido
  lexicon: HALOT
  rationale: קוֹל es «voz» o «sonido». Aquí «voz» corresponde bien al paralelo con «hablarás» y al efecto auditivo del verso.
- source_word: תְּצַפְצֵף
  english_pob_choice: will chirp
  chosen_spanish: chirriará
  alternatives_spanish:
  - chirriará
  - piará
  - gorjeará
  lexicon: HALOT
  rationale: El verbo describe un sonido tenue, agudo o piado/chirrido. «Chirriará» preserva la cualidad fina y extraña del sonido; aunque no es idéntico a «chirp», funciona bien en español sin perder el matiz inquietante.
theological_decisions:
- issue: Sentido de אוֹב en una comparación con prácticas prohibidas
  english_pob_reading: medium
  chosen_spanish_reading: médium
  alternative_spanish_readings:
  - espíritu
  - necromante
  rationale: El texto compara la voz de la ciudad con la de un אוֹב, sin aprobar la práctica. «Médium» mantiene la referencia al especialista en necromancia y preserva la tensión teológica, en vez de resolverla con una equivalencia espiritualizante.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada que optó por una traducción más literal de תִּשַּׁח («será baja») en lugar de expandirla como «susurrará». Se mantuvo la imagen poética de humillación, tierra y polvo, y se conservó la alusión a אוֹב con una nota que refleja la alternativa fantasmagórica documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este verso no contiene el nombre divino.
  - Se mantiene «médium» como término técnico para אוֹב, evitando sustituirlo por lenguaje eclesiástico más tradicional que borraría el trasfondo de necromancia.
  - «Palabra» traduce אִמְרָה de manera consistente en ambos miembros del versículo, aunque el inglés POB usa «speech»; la decisión busca naturalidad sin perder el paralelo.
  - El paralelismo «tierra / polvo» y «hablar / voz» se conserva para reflejar la estructura hebrea del verso.
