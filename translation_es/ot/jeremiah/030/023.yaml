revisions:
- from: ¡Mira![a] La tempestad de ira de Yahvé ha salido; una tormenta arrolladora[b] se abatirá sobre la cabeza de los malvados.
  to: ¡Mira[a]! La tempestad de Yahvé, de ira, ha salido; un torbellino arrollador[b] se arremolinará sobre la cabeza de los malvados.
  rationale: 'Se ajusta la frase inicial para reflejar mejor la estructura hebrea y la decisión léxica documentada: la tormenta es de Yahvé y está caracterizada por ira. Se cambia «tormenta» por «torbellino» en la segunda cola para conservar la acumulación de términos meteorológicos sin repetición plana, y se sustituye «se abatirá» por «se arremolinará» para retener mejor la tensión imagética que la POB inglesa quiso preservar en el verbo final. También se pule la puntuación para una lectura española más natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:25:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del hebreo: anuncio de juicio, nombre divino «Yahvé», acumulación de imágenes de tormenta, y la expresión concreta «sobre la cabeza de los malvados». Sin embargo, desplaza dos matices importantes del audit trail: (1) «la tempestad de ira de Yahvé» mezcla סַעֲרַת יְהוָה con חֵמָה de una manera menos fiel que «la tempestad de Yahvé, de ira» o equivalente; y (2) «se abatirá» para יָחוּל pierde la intención documentada de mantener más visible la imaginería de torbellino/descenso violento que el inglés preservó con «will whirl down».'
  spanish_quality_summary: El español es claro y digno, pero la puntuación y estructura pueden mejorar para sonar más natural y más fiel al paralelismo intensivo hebreo. «¡Mira!» seguido de mayúscula tras el signo resulta menos fluido aquí que «¡Mira[a]!» o «Mira[a]:». Además, repetir «tempestad» y luego «torbellino»/«tormenta» ayuda a reflejar la acumulación hebrea sin sonar de madera.
  glossary_alignment: 'Alineación correcta en lo principal: «Yahvé» respeta la norma del proyecto; «ira» para חֵמָה es apropiado; «malvados» es aceptable para רְשָׁעִים. La principal desalineación es que la decisión léxica de סַעֲרַת יְהוָה debe mostrar más claramente que la tormenta pertenece a Yahvé, no simplemente que sea una «tempestad de ira». También conviene acercar יָחוּל a una formulación que conserve mejor la tensión del audit trail («se arremolinará al bajar», «se precipitará girando», etc.) sin inventar demasiado.'
  issues:
  - severity: medium
    issue: La frase «la tempestad de ira de Yahvé» reordena la relación entre סַעֲרַת יְהוָה y חֵמָה.
    rationale: El hebreo dice literalmente «la tempestad de Yahvé — ira — ha salido», donde la tormenta pertenece a Yahvé y «ira» la califica/appone. En español, la formulación actual puede leerse principalmente como una tempestad cuyo contenido es ira, en vez de la tormenta de Yahvé caracterizada por ira.
  - severity: medium
    issue: «Se abatirá» debilita la decisión documentada de conservar la imaginería turbulenta del verbo final.
    rationale: El audit trail inglés prefirió «will whirl down» frente a «fall». «Se abatirá» comunica descenso violento, pero ya no sugiere remolino o movimiento tempestuoso, que es precisamente el matiz que el proyecto quiso retener.
  - severity: low
    issue: La puntuación y el anclaje de la nota [a] pueden sonar poco naturales.
    rationale: «¡Mira![a] La...» es comprensible, pero en español fluye mejor integrar la nota dentro de la exclamación y usar una puntuación que conecte mejor con la declaración profética.
  revised_spanish_text: ¡Mira[a]! La tempestad de Yahvé, de ira, ha salido; un torbellino arrollador[b] se arremolinará sobre la cabeza de los malvados.
  revised_footnotes:
  - marker: a
    text: 'O: «La tempestad de Yahvé, de ira, ha salido; un torbellino arrollador…». El hebreo acumula términos de tormenta para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «caerá sobre la cabeza de los malvados». El verbo final es difícil; «se arremolinará» procura conservar la imaginería de tormenta en movimiento violento.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la frase inicial para reflejar mejor la estructura hebrea y la decisión léxica documentada: la tormenta es de Yahvé y está caracterizada por ira. Se cambia «tormenta» por «torbellino» en la segunda cola para conservar la acumulación de términos meteorológicos sin repetición plana, y se sustituye «se abatirá» por «se arremolinará» para retener mejor la tensión imagética que la POB inglesa quiso preservar en el verbo final. También se pule la puntuación para una lectura española más natural.'
