revisions:
- from: 'Y dijo el rey de los hijos de Amón a los mensajeros de Jefté: «Israel tomó mi tierra cuando subió de Egipto, desde el Arnón hasta el Jaboc y hasta el Jordán. Así que ahora devuélvelas[a] en paz[b]».'
  to: 'Y dijo el rey de los amonitas a los mensajeros de Jefté: «Israel tomó mi tierra cuando subió de Egipto, desde el Arnón hasta el Jaboc y hasta el Jordán. Así que ahora devuélvelas[a] en paz[b]».'
  rationale: 'Se reemplaza «hijos de Amón» por «amonitas» para una lectura española más natural y fiel al sentido contextual del hebreo. Se corrigen y simplifican las notas al pie para que correspondan exactamente a los elementos relevantes del texto: el pronombre femenino plural y la alternativa de «en paz / pacíficamente».'
  reviewer_model: gpt-5.4
