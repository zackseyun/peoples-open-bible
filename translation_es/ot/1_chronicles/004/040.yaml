- from: Y hallaron pasto[a] rico y bueno, y la tierra era ancha, quieta y pacífica, porque los que de Ham habían habitado allí antes estaban allí primero.
  to: Y hallaron pasto rico y bueno, y la tierra era ancha, tranquila y pacífica, porque los que eran de Ham y habían habitado allí anteriormente[a] habían estado allí antes.
  rationale: Se suavizó la sintaxis final para que el español exprese con claridad la idea de habitantes anteriores relacionados con Ham sin la torpeza de la redacción original. Se cambió 'quieta' por 'tranquila' por mayor naturalidad. Se reemplazó la nota al pie por una alternativa real atestiguada en el expediente inglés.
