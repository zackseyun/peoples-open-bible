translation:
  language: es
  text: Porque tu sustancia mostraba tu dulzura hacia tus hijos[a]; y, sirviendo al deseo del que la comía[b], se transformaba en lo que cada uno quería.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu naturaleza mostraba tu dulzura hacia tus hijos». El griego ὑπόστασις puede significar «sustancia», «naturaleza» o «realidad subyacente».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el alimento se adaptaba al deseo o preferencia de cada persona que lo consumía.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπόστασίς
  english_pob_choice: substance
  chosen_spanish: sustancia
  alternatives_spanish:
  - naturaleza
  - esencia
  - realidad subyacente
  lexicon: LSJ
  rationale: «Sustancia» conserva el sentido concreto y material que el contexto del maná requiere, sin convertir el término en una formulación metafísica ajena al pasaje. En español también mantiene abierta la alternativa de entender la propiedad constitutiva del alimento.
- source_word: γλυκύτητα
  english_pob_choice: sweetness
  chosen_spanish: dulzura
  alternatives_spanish:
  - bondad
  - agradabilidad
  - sabor dulce
  lexicon: LSJ
  rationale: «Dulzura» reproduce la cualidad gustativa y, a la vez, la benevolencia implícita en la provisión divina. Es más natural en español que un calco como «dulzura» literal no lo sería; aquí, sin embargo, encaja bien con el paralelismo del verso.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  - hijos e hijas
  lexicon: LSJ
  rationale: «Hijos» funciona de manera natural en español bíblico y mantiene el sentido colectivo de los destinatarios del cuidado divino. «Niños» sería demasiado restringido; «descendientes» sería más abstracto de lo que exige el texto.
- source_word: τοῦ προσφερομένου
  english_pob_choice: the one who partook of it
  chosen_spanish: del que la participaba
  alternatives_spanish:
  - del que la recibía
  - del que la comía
  - del que la gustaba
  lexicon: LSJ
  rationale: El participio apunta al que toma/consume lo ofrecido en el contexto del alimento. «Participaba» mantiene el vínculo con la acción de comer sin forzar un verbo demasiado coloquial; además preserva la idea de acceso efectivo al alimento. La forma pronominal «la» refiere al alimento del contexto.
- source_word: ἐπιθυμίᾳ
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - apetito
  - capricho
  lexicon: LSJ
  rationale: «Deseo» es el equivalente más amplio y sobrio. «Apetito» podría sonar demasiado físico; «capricho» introduciría una valoración no sustentada por el griego.
- source_word: ὑπηρετῶν
  english_pob_choice: serving
  chosen_spanish: sirviendo
  alternatives_spanish:
  - atendiendo
  - prestando servicio
  - ministrando
  lexicon: LSJ
  rationale: El participio expresa una acción subordinada y funcional respecto al deseo del comensal. «Sirviendo» es natural y transmite la idea de servicio adaptativo que el contexto exige.
- source_word: μετεκιρνᾶτο
  english_pob_choice: changed into
  chosen_spanish: se transformaba
  alternatives_spanish:
  - se cambiaba
  - se convertía
  - se mezclaba
  lexicon: LSJ
  rationale: El verbo sugiere una modificación real del alimento conforme al gusto individual. «Se transformaba» comunica ese cambio sin añadir tecnicismos ni hacer el texto demasiado interpretativo.
- source_word: πρὸς ὃ τις ἐβούλετο
  english_pob_choice: whatever each one wished
  chosen_spanish: en lo que cada uno quería
  alternatives_spanish:
  - según lo que cada uno deseaba
  - en aquello que cada uno quería
  - como cada uno deseaba
  lexicon: LSJ
  rationale: La cláusula distributiva se refleja de modo natural en español con «cada uno quería». «En lo que» conserva la dirección del cambio y la individualización del resultado.
theological_decisions:
- issue: Sentido de ὑπόστασις en el contexto del maná
  english_pob_reading: The phrase refers to the manna's God-given material constitution rather than to God's own metaphysical essence.
  chosen_spanish_reading: La frase se refiere a la constitución o sustancia del alimento provisto, no a la esencia metafísica de Dios.
  alternative_spanish_readings:
  - tu naturaleza mostraba tu dulzura hacia tus hijos
  - tu esencia mostraba tu dulzura hacia tus hijos
  rationale: El contexto inmediato habla del alimento milagroso y de su adaptación al gusto de cada persona. Por eso «sustancia»/«sustancia del alimento» es la lectura más segura en español. Se evita trasladar el término a una reflexión abstracta sobre la esencia divina que el verso no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de «la» en «del que la participaba»
  english_pob_reading: The final clause means that the food adapted itself to each person's preference.
  chosen_spanish_reading: «La» se refiere al alimento del contexto; la frase describe su adaptación al gusto de cada persona.
  alternative_spanish_readings:
  - del que participaba de ella
  - del que la recibía
  rationale: La construcción española debe dejar claro que el objeto es el alimento, no una idea abstracta. El sentido teológico-literario es que el maná se acomodaba al deseo de quien lo consumía.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: He seguido la lectura revisada del audit trail en cuanto a la cláusula final, tomando como base «partook of it» para expresar el comensal efectivo, y conservando el cambio más natural de «changed into» como «se transformaba». También he mantenido la tensión léxica de ὑπόστασις con una traducción principal concreta y una nota alternativa.
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando el texto lo exigiera explícitamente; este versículo no contiene el nombre divino, así que no aplica.
  - He preferido «sustancia» para ὑπόστασις siguiendo la decisión inglesa principal, con nota de alternativa léxica.
  - He mantenido un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - He conservado la referencia distributiva final con «cada uno», que refleja el matiz individual del griego.
