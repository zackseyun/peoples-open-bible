base_translation:
  language: en
  yaml_path: translation/ot/psalms/139/017.yaml
  text: And to me[a], how precious are your thoughts, O God[b]; how vast is the sum of them!
  footnotes:
  - marker: a
    text: Or 'your friends' or 'those dear to you.' The Hebrew form רֵעֶיךָ can be understood that way, but the context of counting and vast number in vv. 17–18 favors 'your thoughts.'
    reason: alternative_reading
  - marker: b
    text: Literally 'their heads.' Here the idiom likely means 'their sum' or 'their total.'
    reason: lexical_alternative
