revisions:
- from: Y el sacerdote lo acercará al altar[a], y le arrancará la cabeza y lo hará arder sobre el altar[b]; y su sangre será escurrida sobre el costado del altar.
  to: Y el sacerdote lo acercará al altar[a], y le desprenderá la cabeza y lo hará arder sobre el altar[b], y su sangre será escurrida sobre el costado del altar.
  rationale: Se ajusta מלק para evitar la sobretraducción de «arrancar» y reflejar mejor el carácter técnico del verbo con un español claro. También se corrige la nota para que la alternativa se refiera a «la cabeza», como en el texto hebreo y en la auditoría inglesa, no al «cuello».
