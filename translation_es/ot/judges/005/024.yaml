- from: Bendita[a] entre las mujeres sea Jael, la esposa de Heber el ceneo; entre las mujeres[b] en la tienda, bendita sea.
  to: Bendita[a] entre las mujeres es Jael, la esposa de Heber el ceneo; entre las mujeres en la tienda[b], bendita es ella.
  rationale: Se cambió la redacción verbal de optativa ('sea') a afirmativa ('es') para reflejar mejor el valor del hebreo en este contexto poético y alinearse con el POB inglés. También se ajustó el cierre a 'bendita es ella' para conservar el paralelismo con mejor naturalidad en español, y se movió la nota [b] a 'tienda' porque allí recae la observación literal sobre el singular.
