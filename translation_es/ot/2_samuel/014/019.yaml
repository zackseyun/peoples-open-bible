translation:
  language: es
  text: 'Entonces el rey dijo: «¿Está la mano de Joab[a] contigo en todo esto?». Y la mujer respondió y dijo: «¡Por tu vida[b], mi señor el rey, nadie puede desviarse a la derecha ni a la izquierda[c] de nada de lo que ha dicho mi señor el rey, porque tu siervo Joab me ordenó esto, y él mismo puso en la boca de tu sierva todas estas palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa la imagen de la «mano» para indicar participación, intervención o influencia: «¿está la mano de Joab contigo...?».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Como vive tu alma». La fórmula juratoria hebrea es literalmente «vive tu alma».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «desviarse a la derecha ni a la izquierda» es un modismo hebreo que significa apartarse de, contradecir o evadir lo que el rey ha dicho.
    reason: cultural_note
lexical_decisions:
- source_word: הֲיָד ... אִתָּךְ
  english_pob_choice: Is the hand of Joab with you
  chosen_spanish: ¿Está Joab contigo en todo esto?
  alternatives_spanish:
  - ¿Está la mano de Joab contigo en todo esto?
  - ¿Joab está implicado contigo en esto?
  lexicon: HALOT
  rationale: En español, «la mano de Joab contigo» suena demasiado literal y opaca. La pregunta hebrea expresa agencia o participación de Joab; «contigo en todo esto» conserva la implicación narrativa sin perder naturalidad.
- source_word: בְּכָל זֹאת
  english_pob_choice: in all this
  chosen_spanish: en todo esto
  alternatives_spanish:
  - en toda esta cuestión
  - en todo este asunto
  lexicon: HALOT
  rationale: La frase refiere al conjunto del plan o situación. «En todo esto» sigue de cerca el hebreo y funciona bien en español bíblico moderno.
- source_word: חֵי נַפְשְׁךָ
  english_pob_choice: As your soul lives
  chosen_spanish: ¡Vive tu alma!
  alternatives_spanish:
  - ¡Por tu vida!
  - Como vive tu alma
  lexicon: HALOT
  rationale: La fórmula juratoria hebrea se preserva con «vive tu alma», que mantiene el vínculo con נֶפֶשׁ/náfesh y evita sustituirla por una paráfrasis más suave. Se usa exclamación para reflejar el carácter solemne del juramento.
- source_word: אִם אִישׁ לְהֵמִין וּלְהַשְׂמִיל
  english_pob_choice: no one can turn to the right or to the left
  chosen_spanish: nadie puede ir a la derecha o a la izquierda
  alternatives_spanish:
  - nadie puede desviarse a la derecha o a la izquierda
  - no hay quien pueda girar a derecha o izquierda
  lexicon: HALOT
  rationale: El hebraísmo de derecha/izquierda se conserva. «Ir» es más idiomático que «girar» en español y comunica bien la idea de desviarse o apartarse de la palabra del rey.
- source_word: מִכֹּל אֲשֶׁר דִּבֶּר
  english_pob_choice: from anything that ... has spoken
  chosen_spanish: de todo lo que ha dicho
  alternatives_spanish:
  - de todo cuanto ha hablado
  - de ninguna de las cosas que ha dicho
  lexicon: HALOT
  rationale: En español, «hablar» puede sonar menos natural con una formulación de autoridad; «ha dicho» conserva la referencia a las palabras del rey y la idea de no apartarse de ellas.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Se conserva el peso léxico de עֶבֶד como «esclavo», coherente con la política POB cuando la autodenominación cortesana no borra la fuerza del término. Aunque en castellano suene fuerte, aquí refleja mejor la relación de subordinación expresa en el texto.
- source_word: צִוָּנִי
  english_pob_choice: commanded me
  chosen_spanish: me lo ordenó
  alternatives_spanish:
  - me lo mandó
  - me lo comandó
  lexicon: HALOT
  rationale: «Ordenó» expresa con claridad la autoridad directiva de Joab; el pronombre «lo» retoma la acción o el encargo implícito en el contexto narrativo.
- source_word: שָׂם בְּפִי
  english_pob_choice: put ... into the mouth of
  chosen_spanish: puso en la boca de
  alternatives_spanish:
  - puso en mi boca
  - me hizo decir
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de colocar palabras en la boca de alguien. En español es una metáfora comprensible y fiel al original.
- source_word: שִׁפְחָתְךָ
  english_pob_choice: your female servant
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu sirvienta
  lexicon: HALOT
  rationale: El femenino específico se mantiene como «esclava» para conservar la correspondencia léxica con שִׁפְחָה y con la opción POB de no suavizar el estatus con «sierva» sin razón contextual.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todos estos דברים
  - todas estas cosas
  lexicon: HALOT
  rationale: «Palabras» es la equivalencia natural cuando el contexto trata de un discurso exacto, no de objetos o asuntos generales.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del pasaje y con la trayectoria de revisión indicada: no se registran cambios sustantivos en el pase más reciente, y la concordancia cruzada fue alta. La versión española conserva la estructura narrativa, el juramento formal y las metáforas corporales del hebreo, ajustándolas solo donde el español exigía mayor naturalidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Esclavo/esclava» se usa de manera consistente para עבד/שפחה, evitando suavizar automáticamente a «siervo/sierva» cuando el hebreo es más fuerte.
  - Se preserva la imagen de la «boca» como vehículo de discurso, porque el hebreo la usa de forma idiomática y clara.
  - La fórmula juratoria se traduce de forma directa para no perder la tensión solemne del original.
