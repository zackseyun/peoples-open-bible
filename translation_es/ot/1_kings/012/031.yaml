translation:
  language: es
  text: Hizo santuarios de lugares altos[a], y nombró sacerdotes de entre todo el pueblo, que no eran de entre los hijos de Leví[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, “casa(s) de lugares altos”, un giro idiomático para recintos o santuarios asociados con los lugares altos.
    reason: lexical_alternative
  - marker: b
    text: O, “que no eran levitas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Hizo
  - Construyó
  - Estableció
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio ('hacer'). En español, 'hizo' conserva esa amplitud sin especificar indebidamente si la acción fue construir o instituir. 'Construyó' sería más restrictivo y 'estableció' desplazaría el foco hacia la organización.
- source_word: בֵּית בָּמוֹת
  english_pob_choice: houses of high places
  chosen_spanish: casas de lugares altos
  alternatives_spanish:
  - casas de lugares altos
  - casas de los lugares altos
  - santuarios de lugares altos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'casa de lugares altos', un giro idiomático para recintos cultuales ligados a los altos lugares. 'Casas de lugares altos' sigue de cerca la forma hebrea y mantiene el valor cultual sin convertirla en una paráfrasis más interpretativa.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes
  - curas
  lexicon: HALOT
  rationale: En contexto cultual, כהנים se refiere a funcionarios sacerdotales. 'Sacerdotes' es el equivalente natural y sobrio en español; 'curas' no corresponde al registro ni al contexto bíblico.
- source_word: מִקְצוֹת הָעָם
  english_pob_choice: from among all the people
  chosen_spanish: de entre todo el pueblo
  alternatives_spanish:
  - de entre el pueblo
  - de entre toda la gente
  - de entre todas las clases del pueblo
  lexicon: HALOT
  rationale: El modismo no indica 'extremos' sino selección amplia desde la población general. 'De entre todo el pueblo' comunica bien que Jeroboam tomó sacerdotes de la gente común, sin restringirlo a un grupo legítimo.
- source_word: אֲשֶׁר לֹא הָיוּ מִבְּנֵי לֵוִי
  english_pob_choice: who were not from the sons of Levi
  chosen_spanish: que no eran de los hijos de Leví
  alternatives_spanish:
  - que no eran levitas
  - que no pertenecían a los hijos de Leví
  lexicon: HALOT
  rationale: La cláusula marca explícitamente su no pertenencia a la línea/tribu levítica. 'De los hijos de Leví' conserva el lenguaje familiar y tribal del hebreo; 'levitas' sería más fluido, pero menos literal respecto a la formulación del texto.
theological_decisions:
- issue: Instituciones cultuales ilegítimas establecidas por Jeroboam
  english_pob_reading: He made houses of high places
  chosen_spanish_reading: Hizo casas de lugares altos
  alternative_spanish_readings:
  - Hizo santuarios en lugares altos
  - Construyó casas de lugares altos
  rationale: El hebreo describe estructuras cultuales asociadas con los lugares altos, sin añadir comentario interpretativo. 'Casas de lugares altos' preserva la tensión del giro original y evita suavizarlo con términos más eclesiásticos o más explicativos.
  doctrine_reference: Criterio de primacía del texto fuente; mantener la referencia histórica y cultual sin armonización doctrinal.
- issue: Condición no levítica de los sacerdotes nombrados
  english_pob_reading: who were not from the sons of Levi
  chosen_spanish_reading: que no eran de los hijos de Leví
  alternative_spanish_readings:
  - que no eran levitas
  - que no eran de la tribu de Leví
  rationale: El texto subraya una ruptura con la línea levítica. La redacción elegida conserva esa distinción genealógica y cultual de forma clara, sin introducir una paráfrasis interpretativa.
  doctrine_reference: Preservación del dato histórico-cultual del texto; sin expansión doctrinal.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail en inglés, que prefirió 'houses of high places' frente a 'shrines on high places'. En español se reflejó esa preferencia con 'casas de lugares altos', manteniendo el matiz más literal del hebreo y evitando introducir 'en' o 'sobre' que no están en la forma fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene 'hijos de Leví' para reproducir la formulación genealógica del hebreo; 'levitas' queda como alternativa anotada.
  - '''Sacerdotes'' se conserva por ser el equivalente cultual estándar en este contexto.'
  - La puntuación y el orden siguen un español moderno y bíblicamente sobrio, sin sacrificar la correspondencia con la sintaxis fuente.
