base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/021.yaml
  text: He was driven away from the sons of men[a], and his heart was made like the beasts, and his dwelling was with the wild donkeys. He was fed grass like oxen, and his body was drenched with the dew of heaven[d][c][b], until he knew that the Most High God rules over the kingdom of mankind and sets over it whomever he wills.
  footnotes:
  - marker: a
    text: Or 'from human beings' for 'from the sons of men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his mind was made like the beasts'; the Aramaic literally says 'his heart was made like [the beasts].'
    reason: lexical_alternative
  - marker: c
    text: '''Wild donkeys'' refers to onagers; older English versions often have ''wild asses.'''
    reason: cultural_note
  - marker: d
    text: Or 'over the kingdom of men.'
    reason: lexical_alternative
