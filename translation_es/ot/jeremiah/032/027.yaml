translation:
  language: es
  text: He aquí, yo soy Yahvé, el Dios de toda carne. ¿Hay algo demasiado difícil[a] para mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Hay alguna cosa demasiado maravillosa para mí?». El verbo hebreo puede expresar algo extraordinario o que rebasa el poder de alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: He aquí conserva el tono solemne y de introducción enfática de la auto-declaración divina, más fiel al valor discursivo del hebreo que un imperativo coloquial como «mira».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término del proyecto en español para el nombre divino, preservando la referencia del Tetragrámaton sin sustituirla por una máscara litúrgica.
- source_word: אֱלֹהֵי כָּל בָּשָׂר
  english_pob_choice: the God of all flesh
  chosen_spanish: el Dios de toda carne
  alternatives_spanish:
  - el Dios de toda la humanidad
  - el Dios de todo ser humano
  - el Dios de toda criatura
  lexicon: HALOT
  rationale: «Toda carne» conserva el idiomatismo hebreo y su amplitud bíblica; en español «toda carne» es inteligible y mantiene la textura semítica mejor que una glosa interpretativa como «toda la humanidad».
- source_word: הֲמִמֶּנִּי יִפָּלֵא כָּל דָּבָר
  english_pob_choice: Is anything too difficult for me?
  chosen_spanish: ¿Hay algo demasiado difícil para mí?
  alternatives_spanish:
  - ¿Hay algo demasiado maravilloso para mí?
  - ¿Hay algo imposible para mí?
  - ¿Hay algo que esté fuera de mi alcance?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad o dificultad excedente ante el poder divino. «Demasiado difícil» sigue la decisión inglesa de captar el sentido idiomático principal, mientras que «maravilloso» queda como alternativa léxica posible del verbo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. En español se mantiene «Yahvé» conforme al estándar del proyecto, preservando el nombre del pacto y evitando la sustitución por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de 'all flesh'
  english_pob_reading: Retained as 'all flesh' rather than interpreting it narrowly as 'all people'
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todo ser humano
  - toda criatura
  rationale: Se conserva la amplitud semítica de la expresión sin reducirla a una paráfrasis antropocéntrica. En este contexto subraya el señorío universal de Dios sobre la vida mortal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: יִפָּלֵא / פלא en el marco de la pregunta retórica
  english_pob_reading: too difficult / too wonderful
  chosen_spanish_reading: demasiado difícil
  alternative_spanish_readings:
  - demasiado maravilloso
  - imposible
  - fuera de mi alcance
  rationale: La forma nifal puede denotar lo extraordinario o lo que excede el poder de alguien. En la pregunta de Yahvé, «demasiado difícil» comunica con claridad el sentido idiomático sin perder la tensión entre lo maravilloso y lo posible para Dios.
  doctrine_reference: HALOT; enfoque de equivalencia óptima del POB
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés indicó que no hubo cambios necesarios y el consenso fue alto; por eso la versión española sigue de cerca la decisión inglesa, manteniendo la alternativa léxica de פלא en nota y sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma fija para יְהוָה, en coherencia con el proyecto.
  - «Toda carne» conserva el eco bíblico del hebreo y evita una glosa explicativa excesiva.
  - La pregunta retórica se formula en español natural sin perder la fuerza absoluta del original.
  - El marcador de nota [a] acompaña a «He aquí» para corresponder con la nota de alternativa léxica.
