base_translation:
  language: en
  yaml_path: translation/ot/zechariah/005/007.yaml
  text: And behold[a], a lead disk was lifted up[b], and this was one woman sitting inside the ephah.
  footnotes:
  - marker: a
    text: Or 'a round lead weight,' 'a disk of lead,' or more literally 'a talent of lead.' The Hebrew expression can denote a heavy round mass of lead; here it appears to function as the ephah's cover.
    reason: lexical_alternative
  - marker: b
    text: An ephah was a dry measure and, by extension, the container used for it; hence some render 'basket.'
    reason: cultural_note
