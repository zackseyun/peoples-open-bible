review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: valor temporal de ἐν τῷ ὑπομεῖναι como «cuando ... persevera», δίκαιον como sustantivo representativo «el justo», referencia retrospectiva de ἐν τούτοις como «en estas cosas», y ὑπὸ Κυρίου como agente del pasivo. Sin embargo, la traducción de ἐλεηθήσεται no es fiel al español natural ni al sentido exacto del pasivo de ‘mostrar misericordia’: «será mostrado misericordia» es gramaticalmente defectuosa.'
  spanish_quality_summary: 'La principal falla es idiomática y sintáctica: «será mostrado misericordia» no es español aceptable. Debe repararse con una forma natural que preserve la misericordia y, si es posible, el valor pasivo, por ejemplo «se le mostrará misericordia» o «recibirá misericordia». También hay un problema de notas: las notas [a] y [b] están invertidas respecto al audit trail inglés. Además, «por el Señor» debería ajustarse al estándar del proyecto como «por Yahvé», salvo razón textual fuerte, que aquí no se demuestra.'
  glossary_alignment: Hay desalineación parcial con la terminología del proyecto. Aunque el audit trail inglés usa «Lord» para κύριος, la política española por defecto pide «Yahvé» para el nombre divino / su representación en el texto principal, y la justificación ofrecida para mantener «Señor» no supera claramente ese valor por defecto. «El justo» y «persevera» están bien. La nota sobre el masculino representativo debe anclarse a «justo», no a la frase temporal.
  issues:
  - severity: high
    issue: «será mostrado misericordia» es una construcción española incorrecta
    rationale: No transmite bien ἐλεηθήσεται en español natural. La forma pasiva puede preservarse mejor con «se le mostrará misericordia»; alternativamente, «recibirá misericordia».
  - severity: medium
    issue: Las notas [a] y [b] están asignadas al contenido equivocado
    rationale: Según el audit trail inglés, una nota pertenece a «el justo» y la otra a la opción «Al perseverar / Por perseverar estas cosas». En el borrador, [a] aparece sobre «justo» pero explica el infinitivo; [b] aparece tras «misericordia» pero explica «el justo».
  - severity: medium
    issue: «el Señor» no sigue el valor por defecto del proyecto para κύριος relacionado con el nombre divino
    rationale: La guía del proyecto en español privilegia «Yahvé» en el texto principal. Dado que no hay una razón doctrinal o contextual fuerte aquí para excepcionarlo, conviene ajustarlo.
  revised_spanish_text: Cuando el justo[a] persevera en estas cosas[b], se le mostrará misericordia por Yahvé.
