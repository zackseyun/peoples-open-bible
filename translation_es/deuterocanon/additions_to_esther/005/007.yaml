  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés: incorpora la idea de «que hemos transmitido» para παρεδώκαμεν, mantiene la cuantificación de ὅσα con «cuántas», y conserva la imagen metafórica de la pestilencia sin convertirla en una glosa explicativa.'
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé» sin necesidad de ocurrencia aquí.
  - Se evita «Cristo» porque el pasaje no contiene lenguaje mesiánico.
  - Se traduce δοῦλος no aplicable en este versículo; no se introduce terminología esclavo/siervo.
  - Se preserva el registro solemne y la sintaxis relativamente formal para una sección deuterocanónica.
  - Los corchetes de nota se usan solo donde hay alternativa lexical relevante en el texto principal.
