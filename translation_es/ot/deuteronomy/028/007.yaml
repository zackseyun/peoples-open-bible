base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/007.yaml
  text: Yahweh will give your enemies who rise up against you defeated before you[a]. By one way they will come out against you[b], and by seven ways they will flee before you.
  footnotes:
