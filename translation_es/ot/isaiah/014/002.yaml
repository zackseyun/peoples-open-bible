revisions:
- from: Los pueblos los tomarán y los llevarán a su lugar[a]; y la casa de Israel los poseerá en la tierra de Yahvé como esclavos varones y esclavas mujeres. Tomarán cautivos a los que los cautivaron[c], y dominarán sobre sus opresores.
  to: Los pueblos los tomarán y los llevarán a su lugar; y la casa de Israel los poseerá[a] en la tierra de Yahvé[b] como esclavos y esclavas[c]. Tomarán cautivos a los que los cautivaron[d], y dominarán sobre sus opresores.
  rationale: Se corrige el anclaje de la nota sobre ‘poseerá/heredará’, se mejora la naturalidad del español en la expresión de género sin perder la fuerza de ‘esclavos’, y se ajustan las notas para reflejar con más fidelidad el rastro léxico-teológico del POB y el juego de palabras hebreo.
