translation:
  language: es
  text: Él miró, y he aquí, junto a su cabeza había una torta cocida sobre piedras calientes[a] y una jarra de agua. Comió y bebió y volvió a acostarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una torta sobre brasas». El hebreo רְצָפִים puede referirse a piedras calentadas usadas para cocer, aunque algunas traducciones lo entienden de manera más general como «brasas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבֵּט
  english_pob_choice: He looked
  chosen_spanish: Él miró
  alternatives_spanish:
  - Él vio
  - Él observó
  lexicon: HALOT
  rationale: נבט expresa la acción de mirar o dirigir la vista. «Miró» conserva esa acción simple y natural en español sin añadir una dirección que el hebreo no explicita.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí que
  - y de pronto
  lexicon: HALOT
  rationale: הִנֵּה es una partícula deíctica que llama la atención sobre lo visto. «Y he aquí» mantiene la vivacidad e inmediatez del hebreo y corresponde bien al registro bíblico en español.
- source_word: מְרַאֲשֹׁתָיו
  english_pob_choice: at his head
  chosen_spanish: a la cabecera
  alternatives_spanish:
  - junto a su cabeza
  - a la altura de su cabeza
  lexicon: HALOT
  rationale: El término señala el lugar junto a la cabeza o en su cabecera. «A la cabecera» reproduce bien la ubicación del alimento y la vasija junto al profeta tendido.
- source_word: עֻגַת
  english_pob_choice: a cake
  chosen_spanish: una torta
  alternatives_spanish:
  - un pan redondo
  - un pastel
  lexicon: HALOT
  rationale: עֻגָה designa una pieza redonda de masa cocida, más cercana a una torta o torta de pan que a un pastel dulce. «Torta» evita la asociación moderna con repostería y conserva la forma de pan.
- source_word: רְצָפִים
  english_pob_choice: baked on hot stones
  chosen_spanish: cocida sobre piedras calientes
  alternatives_spanish:
  - cocida sobre brasas
  - cocida sobre carbón
  lexicon: HALOT
  rationale: El sustantivo probablemente alude a piedras calentadas para cocción. «Piedras calientes» sigue de cerca el sentido probable del hebreo y preserva la alternativa documentada frente a la traducción tradicional «brasas».
- source_word: וְצַפַּחַת מָיִם
  english_pob_choice: and a jar of water
  chosen_spanish: y una vasija de agua
  alternatives_spanish:
  - y una jarra de agua
  - y un cántaro de agua
  lexicon: HALOT
  rationale: צַפַּחַת puede referirse a un recipiente portátil como jarra, vasija o frasco. «Vasija» es suficientemente amplio y sobrio para el contexto narrativo.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ
  english_pob_choice: He ate and drank
  chosen_spanish: Comió y bebió
  alternatives_spanish:
  - Y comió y bebió
  - Entonces comió y bebió
  lexicon: HALOT
  rationale: La serie de verbos consecutivos en wayyiqtol narra acciones simples y encadenadas. En español, el sujeto implícito se entiende por el contexto, y la coordinación directa conserva el ritmo del hebreo.
- source_word: וַיָּשָׁב וַיִּשְׁכָּב
  english_pob_choice: and lay down again
  chosen_spanish: y volvió a acostarse
  alternatives_spanish:
  - y se acostó de nuevo
  - y regresó y se acostó
  lexicon: HALOT
  rationale: שׁוּב + שׁכב expresa el retorno a la acción de acostarse. «Volvió a acostarse» comunica el sentido idiomático con naturalidad en español, sin volverlo rígidamente literal.
translation_notes:
  revision_awareness: El inglés POB ha sido revisado para mantener la secuencia coordinada final sin añadir un «entonces» explícito. En español se ha seguido esa misma economía sintáctica con «y volvió a acostarse», manteniendo la fluidez y la cercanía al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Torta» se usa aquí en sentido bíblico de pan redondo o torta de masa cocida, no con sentido moderno de repostería.
  - 'La secuencia verbal conserva el carácter narrativo simple del hebreo: miró / he aquí / había / comió / bebió / volvió a acostarse.'
