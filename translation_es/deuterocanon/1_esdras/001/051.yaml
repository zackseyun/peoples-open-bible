base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/051.yaml
  text: But he handed everything over into their hands[a]. And after taking all the holy vessels of the Lord, the great and the small, and the treasuries of the Lord and the royal storehouses[b], they carried them away to Babylon.
  footnotes:
  - marker: a
    text: The Greek leaves the subject of 'he handed everything over' implicit. In context, readers may understand this as referring ultimately to the Lord, but the verse itself does not state the subject explicitly.
    reason: alternative_reading
  - marker: b
    text: Or 'the royal treasuries.' The Greek term can denote storage places or repositories; 'storehouses' is the more direct rendering.
    reason: lexical_alternative
