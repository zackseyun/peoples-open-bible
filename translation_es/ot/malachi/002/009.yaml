translation:
  language: es
  text: Así también yo los he hecho despreciados y rebajados[a] ante todo el pueblo, porque ustedes no guardan mis caminos, sino que muestran parcialidad en la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abatidos» o «humillados» para וּשְׁפָלִים; «rebajados» busca expresar el sentido de ser abatidos o puestos en condición baja ante los demás.
    reason: lexical_alternative
  - marker: b
    text: O «en la instrucción» o «en la Torá» para בַּתּוֹרָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֲנִי
  english_pob_choice: So I also
  chosen_spanish: Así también yo
  alternatives_spanish:
  - Y yo también
  - Por eso yo también
  lexicon: HALOT
  rationale: La combinación enfática y conectiva se expresa naturalmente con «Así también yo», que conserva la relación con la reprensión anterior y el énfasis del pronombre explícito.
- source_word: נָתַתִּי אֶתְכֶם
  english_pob_choice: have made you
  chosen_spanish: los he hecho
  alternatives_spanish:
  - los he puesto
  - los he entregado como
  lexicon: HALOT
  rationale: En este contexto, נתן con predicativos expresa causar un estado; «he hecho» comunica mejor el resultado que un calco como «he dado».
- source_word: נִבְזִים
  english_pob_choice: despised
  chosen_spanish: despreciados
  alternatives_spanish:
  - desestimados
  - menospreciados
  lexicon: HALOT
  rationale: El campo semántico es el del desprecio y el trato con desdén. «Despreciados» es claro y fiel al valor social de la palabra.
- source_word: וּשְׁפָלִים
  english_pob_choice: abased
  chosen_spanish: abyectos
  alternatives_spanish:
  - abatidos
  - humillados
  lexicon: HALOT
  rationale: La revisión inglesa favoreció un registro más formal y cercano a «low/abased». «Abyectos» mantiene la idea de bajeza/abatimiento con dignidad literaria en español, sin intensificar indebidamente a «humillados».
- source_word: לְכָל הָעָם
  english_pob_choice: before all the people
  chosen_spanish: ante todo el pueblo
  alternatives_spanish:
  - delante de todo el pueblo
  - en presencia de todo el pueblo
  lexicon: HALOT
  rationale: La frase marca exposición pública y vergüenza social; «ante todo el pueblo» conserva ese matiz de visibilidad pública.
- source_word: כְּפִי אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aquí la construcción introduce la base causal de la sentencia. «Porque» es la equivalencia natural y clara en español.
- source_word: אֵינְכֶם שֹׁמְרִים אֶת דְּרָכַי
  english_pob_choice: you are not keeping my ways
  chosen_spanish: ustedes no guardan mis caminos
  alternatives_spanish:
  - ustedes no observan mis caminos
  - ustedes no siguen mis caminos
  lexicon: HALOT
  rationale: «Guardar» conserva el lenguaje de lealtad/obediencia del verbo שׁמר y «mis caminos» mantiene la metáfora ética del hebreo.
- source_word: וְנֹשְׂאִים פָּנִים
  english_pob_choice: are showing partiality
  chosen_spanish: muestran parcialidad
  alternatives_spanish:
  - hacen acepción de personas
  - favorecen con parcialidad
  lexicon: HALOT
  rationale: El modismo נשׂא פנים en contexto judicial/legal se expresa mejor como «mostrar parcialidad». Se evita una traducción demasiado idiomática y se conserva la fuerza jurídica del texto.
- source_word: בַּתּוֹרָה
  english_pob_choice: in the law
  chosen_spanish: en la ley
  alternatives_spanish:
  - en la instrucción
  - en la Torá
  lexicon: HALOT
  rationale: En este contexto sacerdotal y judicial, «ley» comunica el ámbito normativo de la instrucción divina. Se preservan las alternativas porque תּוֹרָה también puede significar «instrucción» o «Torá».
theological_decisions:
- issue: Alcance de תּוֹרָה en un contexto sacerdotal-jurídico
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la Torá
  rationale: La reprensión apunta a la administración parcial de la norma divina. «La ley» recoge el matiz judicial y covenantal sin negar el rango semántico más amplio de תּוֹרָה.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre juicio divino y vergüenza pública
  english_pob_reading: despised and abased before all the people
  chosen_spanish_reading: despreciados y abyectos ante todo el pueblo
  alternative_spanish_readings:
  - despreciados y abatidos ante todo el pueblo
  - despreciados y humillados ante todo el pueblo
  rationale: El hebreo combina desprecio social con abajamiento. «Abyectos» preserva la formalidad del juicio y el sentido de bajeza sin borrar la tensión social del pasaje.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «humiliated» por «abased» para acercarse más a la correspondencia léxica con el hebreo y a un registro más formal. La redacción española sigue esa revisión y evita suavizar el par de adjetivos, manteniendo el contraste público de desprecio y bajeza.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término base para el tetragrámaton cuando aparezca en pasajes relacionados; aquí no ocurre.
  - Se conserva «ley» como opción principal para תּוֹרָה en este contexto, sin excluir las alternativas léxicas documentadas.
  - «Guardar mis caminos» mantiene el lenguaje de obediencia de alianza y no se sustituye por una paráfrasis moral más amplia.
