  from: that a message may be given to me when I open my mouth, to make known
  to: that a message may be given to me when I open my mouth, so that I may make known
  rationale: The current structure, with a clause followed by a comma and an infinitive of purpose ('...may be given..., to make known...'), is slightly disjointed in English. It weakens the tight connection within the Greek `ἵνα` clause, where the gift of the message and the act of proclaiming it are presented as two parts of a single purpose. Making the purpose explicit with 'so that I may make known' improves the logical flow and more accurately reflects the force of the Greek construction.
