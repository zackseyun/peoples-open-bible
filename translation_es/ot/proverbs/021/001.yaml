translation:
  language: es
  text: Como canales de agua[a] es el corazón de un rey en la mano de Yahvé; él lo desvía hacia donde quiere[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corrientes de agua' o 'cauces de agua'. El hebreo evoca canales divididos que pueden dirigirse.
    reason: lexical_alternative
  - marker: b
    text: O 'desea' o 'le place'. El hebreo puede expresar deseo, agrado o voluntad.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּלְגֵי מַיִם
  english_pob_choice: channels of water
  chosen_spanish: el corazón de un rey está en la mano de Yahvé
  alternatives_spanish:
  - canales de agua
  - corrientes de agua
  - cauces de agua
  lexicon: HALOT
  rationale: La imagen hebrea compara el corazón del rey con canales de agua, pero en español la estructura más natural y fiel es conservar primero la afirmación principal del proverbio. La metáfora de los canales queda implícita en el acto de inclinar; por eso no se desplaza el foco con una paráfrasis excesiva.
- source_word: לֶב מֶלֶךְ
  english_pob_choice: a king’s heart
  chosen_spanish: el corazón de un rey
  alternatives_spanish:
  - el corazón del rey
  - el corazón real
  lexicon: HALOT
  rationale: Se mantiene el valor proverbial general del constructo hebreo con el artículo indefinido 'un rey'. 'Corazón' conserva el sentido de la sede de la voluntad y disposición interior.
- source_word: בְּיַד יְהוָה
  english_pob_choice: in the hand of Yahweh
  chosen_spanish: en la mano de Yahvé
  alternatives_spanish:
  - en la mano de Yahweh
  - bajo la mano de Yahvé
  - en poder de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de dominio y control con 'en la mano de'. Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como 'Yahvé' según la convención española del proyecto y para preservar el nombre divino propio, no un sustituto titulado.
- source_word: עַל כָּל אֲשֶׁר
  english_pob_choice: wherever
  chosen_spanish: a donde
  alternatives_spanish:
  - dondequiera que
  - hacia donde
  - en cualquier dirección que
  lexicon: HALOT
  rationale: Con el verbo 'inclinar', la expresión indica dirección hacia un destino elegido; 'a donde' comunica el valor idiomático con naturalidad en español.
- source_word: יַחְפֹּץ
  english_pob_choice: he desires
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - le place
  - quiere hacer
  lexicon: HALOT
  rationale: El hebreo puede expresar deseo, agrado o voluntad. En español, 'quiere' reproduce bien la idea de decisión/voluntad sin sobrecargar el verbo con matices filosóficos ajenos al proverbio.
- source_word: יַטֶּנּוּ
  english_pob_choice: he turns it
  chosen_spanish: él lo inclina
  alternatives_spanish:
  - él lo dirige
  - él lo vuelve
  - él lo desvía
  lexicon: HALOT
  rationale: El hiphil de נָטָה significa inclinar, dirigir o volver. 'Inclina' mantiene la imagen de la manipulación del curso, y el pronombre 'lo' conserva el referente del corazón del rey.
theological_decisions:
- issue: Soberanía divina sobre los gobernantes
  english_pob_reading: The verse states that the LORD exercises real control over a king’s inner disposition and direction, without specifying a philosophical model of providence or human freedom.
  chosen_spanish_reading: El proverbio afirma que Yahvé ejerce control real sobre la disposición interior y la dirección de un rey, sin cerrar el debate filosófico sobre la providencia o la libertad humana.
  alternative_spanish_readings:
  - Yahvé determina exhaustivamente cada decisión del rey.
  - Yahvé solo influye o aconseja al rey sin control real.
  rationale: La traducción conserva la fuerza del dicho sapiencial mediante 'en la mano de Yahvé' y 'él lo inclina', pero evita añadir un sistema doctrinal no explicitado por el hebreo.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del audit trail inglés y no requiere revisiones adicionales. Se preserva la metáfora del dominio divino sobre el corazón del rey sin resolverla hacia determinismo exhaustivo ni simple influencia.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se optó por 'corazón' para לֶב, conservando el sentido antropológico de voluntad/disposición interior.
  - '''Inclina'' mantiene la imagen verbal de נָטָה y funciona bien con ''a donde''.'
  - '''Quiere'' se eligió por claridad natural en español, pero se anotó la alternativa semántica de deseo/agrado en nota.'
  - 'El proverbio se presenta en forma general: ''un rey'', no un monarca específico.'
