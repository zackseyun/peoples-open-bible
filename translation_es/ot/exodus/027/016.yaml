review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: puerta del atrio, cobertura textil de veinte codos, lista de materiales, obra artesanal, y cuatro soportes con cuatro bases. Sin embargo, «velo» para מָסָךְ introduce una connotación cultual específica menos adecuada que «cortina» o «colgadura» para una entrada del atrio. Además, el inglés auditado conservó notas para la alternativa léxica de מָסָךְ, para la aclaración de «veinte codos long», y para la alternativa «bases/sockets»; el español solo preserva la primera.'
  spanish_quality_summary: El español es legible y digno, pero «velo» suena menos natural y menos arquitectónico en este contexto. «Basas» es preciso pero más técnico; puede mantenerse por dignidad y exactitud, con nota alternativa a «bases». La frase mejora si se hace explícito «de largo» para evitar una elipsis menos clara en español.
  glossary_alignment: No hay conflicto con la terminología teológica del proyecto. Las decisiones principales son léxicas/arquitectónicas. «Atrio», «púrpura», «lino fino torcido» y «bordador» están bien alineados. Se recomienda sustituir «velo» por «cortina» para corresponder mejor a מָסָךְ en este contexto tabernacular.
  issues:
  - severity: medium
    issue: «velo» para מָסָךְ
    rationale: Aunque puede sugerir una tela de cobertura, en español bíblico suele evocar más naturalmente el velo interior o una pieza cultual específica. Aquí se trata de la cortina/colgadura de la entrada del atrio.
  - severity: low
    issue: Falta la aclaración de medida en español
    rationale: El hebreo dice literalmente «veinte codos», pero en español «de veinte codos de largo» suena más completo y arquitectónicamente claro, en línea con la aclaración del audit trail inglés.
  - severity: low
    issue: Falta nota alternativa para אַדְנֵיהֶם
    rationale: El audit trail inglés preserva la alternativa «sockets» frente a «bases». En español conviene conservar la alternativa «bases» si se mantiene «basas» en el texto principal.
  revised_spanish_text: Y para la puerta del atrio habrá una cortina[a] de veinte codos de largo[b], de azul, púrpura y carmesí, y de lino fino torcido, obra de bordador, con cuatro columnas y cuatro basas[c].
  revised_footnotes:
