base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/079.yaml
  text: His offering was one silver plate[a], its weight one hundred thirty shekels, one silver basin of seventy shekels, according to the sanctuary shekel[b]; both of them full of fine flour mixed with oil for a grain offering.
  footnotes:
