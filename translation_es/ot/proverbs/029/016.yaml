review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: cláusula temporal/circunstancial (''Cuando...''), aumento de los impíos, aumento de la transgresión, y contraste con los justos que presencian la caída de los impíos. También preserva correctamente la decisión interpretativa de que el sufijo en ''su caída'' remite a los impíos. Sin embargo, la nota al pie no está bien formulada en español y mezcla alternativas de manera confusa.'
  spanish_quality_summary: 'El texto principal es claro, fiel y natural en español bíblico contemporáneo. ''Los impíos'', ''la transgresión'' y ''los justos'' son opciones dignas y legibles. La frase ''verán su caída'' funciona bien. La mejora necesaria es editorial: limpiar y normalizar la nota al pie para que sea idiomática, precisa y coherente con el motivo léxico documentado.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Impíos' para רְשָׁעִים, 'transgresión' para פָּשַׁע y 'justos' para צַדִּיקִים están bien alineados con la evidencia y la práctica sapiencial en español. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La nota al pie está redactada de forma poco natural y confusa.
    rationale: 'La formulación actual (''O: ''''verán su caída/ruina'''''') no presenta con claridad la alternativa documentada en el POB inglés. La nota inglesa distingue entre el verbo ''ver'' y la posibilidad de traducir el sustantivo como ''caída'' o ''ruina/downfall''; en español conviene expresar esto con una alternativa limpia y una explicación léxica clara.'
  revised_spanish_text: Cuando los impíos se multiplican, la transgresión aumenta; pero los justos verán su caída.[a]
  revised_footnotes:
  - marker: a
    text: 'O: "verán su ruina". El verbo hebreo significa simplemente "ver", y el sustantivo puede traducirse como "caída" o "ruina".'
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse tal como está porque es fiel y natural. Se revisa únicamente la nota al pie para ajustarla al motivo léxico del POB inglés, mejorar su español y evitar una presentación confusa de las alternativas.
