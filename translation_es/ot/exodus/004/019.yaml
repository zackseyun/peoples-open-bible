translation:
  language: es
  text: 'Yahvé dijo a Moisés en Madián[a]: «Ve, regresa a Egipto, porque han muerto todos los hombres que buscaban tu vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ve de regreso a Egipto». El hebreo conserva dos imperativos, literalmente: «Ve, regresa a Egipto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio del pacto, no un título. En español se conserva como «Yahvé» para reflejar el Tetragrama, siguiendo la decisión auditada del POB en inglés y evitando la sustitución tradicional por «SEÑOR».
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El perfecto narrativo de אמר se vierte naturalmente como «dijo» en español. Es la forma más directa y fiel al relato.
- source_word: בְּמִדְיָן
  english_pob_choice: in Midian
  chosen_spanish: en Madián
  alternatives_spanish:
  - mientras estaba en Madián
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. «En Madián» conserva el valor locativo con un español natural.
- source_word: לֵךְ שֻׁב
  english_pob_choice: Go, return
  chosen_spanish: Ve, regresa
  alternatives_spanish:
  - Ve, vuelve
  - Ve y regresa
  lexicon: HALOT
  rationale: Se preservan los dos imperativos. «Ve, regresa» mantiene la fuerza doble del hebreo sin reducirla a un solo mandato.
- source_word: מִצְרָיִם
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  lexicon: HALOT
  rationale: Aunque el hebreo no expresa una preposición explícita aquí, el español requiere «a» con «regresa» para una lectura idiomática y fiel.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» es la equivalencia más clara y natural en español.
- source_word: מֵתוּ
  english_pob_choice: are dead
  chosen_spanish: han muerto
  alternatives_spanish:
  - murieron
  - están muertos
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción concluida con resultado vigente. «Han muerto» conserva ese matiz mejor que un pretérito simple.
- source_word: כָּל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todos los varones
  - todas las personas
  lexicon: HALOT
  rationale: אֲנָשִׁים designa varones en este contexto. «Hombres» mantiene la referencia específica y evita diluirla en un genérico.
- source_word: הַמְבַקְשִׁים
  english_pob_choice: who were seeking
  chosen_spanish: que buscaban
  alternatives_spanish:
  - que estaban buscando
  - que procuraban
  lexicon: HALOT
  rationale: El participio indica una acción en curso o característica en el pasado. «Buscaban» comunica de manera natural esa idea en español sin perder la continuidad del sentido.
- source_word: אֶת נַפְשֶׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu persona
  lexicon: HALOT
  rationale: En esta expresión, נֶפֶשׁ significa la vida misma, es decir, la existencia amenazada. «Tu vida» transmite el modismo con claridad y precisión.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del Dios de Israel en lugar de sustituirlo por un título. «Yahvé» es la forma española coherente con la decisión doctrinal y auditada del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada fue marcada como sin cambios necesarios en la última revisión; esta propuesta sigue esa lectura sin introducir ajustes textuales no motivados por el hebreo. También conserva la nota sobre los dos imperativos, adaptada al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se traduce נֶפֶשׁ como «vida» en este modismo, no como «alma».
  - Se conserva la doble orden «Ve, regresa» para reflejar los dos imperativos hebreos.
  - «Madián» sigue la forma española habitual del topónimo bíblico.
