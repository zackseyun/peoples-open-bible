translation:
  language: es
  text: Hizo cincuenta presillas en el borde de la cortina exterior, en el primer conjunto[a], y hizo cincuenta presillas en el borde de la cortina del segundo conjunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la unión» o «en el primer conjunto unido»; el término hebreo se refiere al conjunto o acoplamiento de las cortinas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  english_pob_choice: loops
  chosen_spanish: presillas
  alternatives_spanish:
  - lazos
  - bucles
  - anillas
  lexicon: HALOT
  rationale: En este contexto textil y de unión de piezas, 'presillas' comunica mejor que 'lazos' la función de enganche de las aberturas o bucles de tela. Mantiene la imagen concreta sin introducir material ni color no presentes en el versículo.
- source_word: שְׂפַת
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - extremo
  - ribete
  lexicon: HALOT
  rationale: '''Borde'' es natural en español para una pieza de tela y preserva la idea física del margen de la cortina.'
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - lona
  - paño
  - panel
  lexicon: HALOT
  rationale: En el tabernáculo, el término designa una gran pieza de tela; 'cortina' es claro y adecuado en español bíblico moderno.
- source_word: הַקִּיצֹנָה
  english_pob_choice: outer
  chosen_spanish: exterior
  alternatives_spanish:
  - externa
  - de afuera
  - más alejada
  lexicon: HALOT
  rationale: '''Exterior'' transmite la posición espacial de la primera cortina dentro del conjunto, sin sobreinterpretar la relación estructural.'
- source_word: בַּמַּחְבָּרֶת
  english_pob_choice: in the first set
  chosen_spanish: en la primera sección
  alternatives_spanish:
  - en la primera unión
  - en el primer conjunto unido
  - en la primera unión de las cortinas
  lexicon: HALOT
  rationale: El hebreo señala una unidad/agrupación de piezas. 'Sección' mantiene la referencia a un conjunto delimitado sin imponer la lectura técnica de 'unión' como si fuera explícita en el texto español.
- source_word: הַחֹבֶרֶת
  english_pob_choice: that was joined to it
  chosen_spanish: de la segunda
  alternatives_spanish:
  - unida a ella
  - que estaba unida a ella
  - acoplada a ella
  lexicon: HALOT
  rationale: El participio hebreo relaciona la segunda cortina con la primera por pertenencia al conjunto. Dado el ajuste revisado en el audit trail inglés, el español conserva la distinción simple entre la cortina exterior en la primera sección y la cortina de la segunda, sin insertar una explicación interpretativa extra en el cuerpo del texto.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - la otra
  - la segunda pieza
  lexicon: HALOT
  rationale: Traducción directa y transparente del ordinal, manteniendo la correlación con la primera sección/cortina.
- source_word: וַיַּעַשׂ ... עָשָׂה
  english_pob_choice: he made ... he made
  chosen_spanish: Hizo ... hizo
  alternatives_spanish:
  - Y hizo ... hizo
  - Fabricó ... fabricó
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo con 'hizo' para reflejar el paralelismo y mantener el tono sobrio del relato artesanal.
theological_decisions:
- issue: La referencia al conjunto unido de cortinas puede traducirse con o sin explicación interpretativa.
  english_pob_reading: The English POB reduced the interpretive expansion in the second revision and kept the first clause as 'in the first set' with a footnote for the joined/coupling sense.
  chosen_spanish_reading: 'Se mantiene una redacción sobria: ''en la primera sección'' y ''de la segunda'', con nota para el posible sentido de conjunto/unión.'
  alternative_spanish_readings:
  - en la primera unión
  - en el primer conjunto unido
  - en el acoplamiento
  rationale: El hebreo permite una referencia técnica al conjunto unido de cortinas. Para no cargar el texto con una paráfrasis explicativa, se conserva la forma breve en el cuerpo y se documenta la alternativa en nota.
  doctrine_reference: No aplica; decisión de terminología constructiva, no doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se eliminó una expansión interpretativa explícita sobre ''joined together'' y se prefirió una distinción más sobria entre la cortina exterior en la primera sección y la cortina de la segunda. La versión española refleja esa misma cautela, manteniendo el paralelismo y sin introducir una glosa más amplia en el texto principal.'
  spanish_consistency_notes:
  - Se usa 'presillas' para לֻלָאֹת por precisión textil y naturalidad en español.
  - '''Exterior'' conserva el sentido espacial de הַקִּיצֹנָה.'
  - '''Primera sección'' funciona como equivalente sobrio de בַּמַּחְבָּרֶת, con la nota a para la alternativa ''unión/conjunto unido''.'
  - Se mantiene 'la segunda' sin añadir 'cortina' al final para no sobrecargar el paralelismo, aunque el antecedente se entiende por contexto.
  - La puntuación y el orden siguen un español bíblico moderno, no arcaizante.
