translation:
  language: es
  text: Porque las flechas del Todopoderoso[a] están en mí; mi espíritu bebe su veneno[b]; los terrores de Dios se alinean contra mí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «están conmigo». La preposición hebrea puede leerse más literalmente así, pero el contexto de flechas y veneno favorece el sentido «están en mí».'
    reason: lexical_alternative
  - marker: b
    text: O «su ponzoña»; algunos entienden el sustantivo más abstractamente como «su ira».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «se ponen en orden contra mí», una imagen militar.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Conserva el valor explicativo/causal de la cláusula inicial en un español natural; 'Porque' es el equivalente más directo de 'For' en este contexto de explicación de Job.
- source_word: חִצֵּי
  english_pob_choice: the arrows of
  chosen_spanish: las flechas de
  alternatives_spanish:
  - las flechas
  - los dardos de
  lexicon: HALOT
  rationale: '''Flechas'' reproduce la imagen bélica de forma clara y fiel; se mantiene el complemento en genitivo para expresar la procedencia de las flechas.'
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Todopoderoso
  - Shaddai
  lexicon: HALOT
  rationale: La pauta del proyecto pide usar 'Yahvé' para el nombre divino donde el hebreo presenta el nombre propio. Aunque el inglés POB opta por 'the Almighty' como título contextual, aquí se preserva la identidad del sujeto divino sin ocultar el nombre. La referencia a Job y el paralelismo con אֱלוֹהַּ permiten mantener el contraste poético en español.
- source_word: עִמָּדִי
  english_pob_choice: are in me
  chosen_spanish: están en mí
  alternatives_spanish:
  - están conmigo
  - están dentro de mí
  lexicon: HALOT
  rationale: El inglés POB elige 'are in me' por el contexto de flechas y sufrimiento interno. 'Están en mí' mantiene esa fuerza, suena natural en español y conserva la ambigüedad del hebreo entre cercanía y penetración.
- source_word: חֲמָתָם
  english_pob_choice: their poison
  chosen_spanish: su veneno
  alternatives_spanish:
  - su veneno
  - su ira
  lexicon: HALOT
  rationale: En el contexto de flechas, el término apunta al efecto tóxico/venenoso, no a ira abstracta. 'Su veneno' sigue la lectura concreta del inglés POB y evita importar un sentido teológico no requerido por la imagen.
- source_word: שֹׁתָה
  english_pob_choice: drinks
  chosen_spanish: bebe
  alternatives_spanish:
  - bebe
  - sorbe
  lexicon: HALOT
  rationale: '''Bebe'' reproduce el verbo con sencillez y mantiene la personificación poética del espíritu que asimila el veneno.'
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi soplo
  lexicon: HALOT
  rationale: En este contexto רוּחַ expresa la vida interior de Job; 'mi espíritu' conserva ese sentido sin confundirlo con viento o aliento físico.
- source_word: בִּעוּתֵי
  english_pob_choice: the terrors of
  chosen_spanish: los terrores de
  alternatives_spanish:
  - los espantos de
  - los horrores de
  lexicon: HALOT
  rationale: '''Terrores'' comunica bien el plural de experiencias aterradoras y mantiene el tono intensamente emocional del hebreo.'
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Ser divino
  lexicon: HALOT
  rationale: Aquí se conserva el término común 'Dios', como hace el inglés POB al evitar la repetición exacta de 'the Almighty' y mantener el paralelismo poético.
- source_word: יַעַרְכוּנִי
  english_pob_choice: array themselves against me
  chosen_spanish: se alinean contra mí
  alternatives_spanish:
  - se ordenan contra mí
  - se disponen en formación contra mí
  lexicon: HALOT
  rationale: El verbo conserva una imagen militar de organización/enfilamiento. 'Se alinean contra mí' es idiomático en español y retiene la idea de disposición hostil sin perder la metáfora bélica.
theological_decisions:
- issue: Tratamiento de שַׁדַּי y אֱלוֹהַּ como dos designaciones distintas de la divinidad
  english_pob_reading: Translate שַׁדַּי as 'the Almighty' and אֱלוֹהַּ as 'God'
  chosen_spanish_reading: Usar 'Yahvé' para שַׁדַּי en la primera cláusula y 'Dios' para אֱלוֹהַּ en la última
  alternative_spanish_readings:
  - '''el Todopoderoso'' y ''Dios'''
  - '''Yahvé'' y ''el Todopoderoso'''
  rationale: El hebreo emplea dos referencias divinas en paralelo. La versión española conserva la distinción y evita aplanar el poema en una sola designación repetida. Aunque el inglés POB traduce שַׁדַּי como 'the Almighty', el patrón del proyecto para el nombre divino favorece 'Yahvé' cuando el hebreo presenta un sujeto personal de acción directa. 'Dios' mantiene la segunda referencia sin redundancia.
  doctrine_reference: Translation philosophy §2
- issue: Sentido de חֲמָתָם en la metáfora de las flechas
  english_pob_reading: Read as the poison/venom of the arrows, not divine wrath abstractly
  chosen_spanish_reading: Entenderlo como 'su veneno'
  alternative_spanish_readings:
  - '''su veneno'''
  - '''su ira'''
  rationale: La escena describe flechas y el efecto que causan en el interior de Job; por tanto, el sentido concreto de toxicidad es el que mejor se ajusta al texto. Traducirlo como 'ira' introduciría una abstracción que debilita la imagen.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imagen militar del último hemistiquio
  english_pob_reading: Literally 'set themselves in order against me,' a military image.
  chosen_spanish_reading: '''Se alinean contra mí'' como forma natural de una formación hostil'
  alternative_spanish_readings:
  - '''se ordenan contra mí'''
  - '''se disponen en formación contra mí'''
  rationale: La cláusula final conserva la imaginería de batalla sin forzar una literalidad extraña en español. 'Se alinean' comunica preparación y hostilidad, y deja visible la metáfora militar.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; este borrador sigue la lectura establecida por el audit trail inglés y ajusta solo la expresión española para mantener fidelidad al hebreo y naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene la distinción entre 'Yahvé' y 'Dios' para conservar el paralelismo de los dos nombres divinos.
  - '''Están en mí'' reproduce la lectura contextual de עִמָּדִי sin borrar la alternativa ''están conmigo''.'
  - '''Su veneno'' preserva la lectura concreta de חֲמָתָם y evita suavizar la imagen.'
  - El hemistiquio final conserva el matiz bélico mediante 'se alinean contra mí' y su nota literal correspondiente.
