translation:
  language: es
  text: 'Y para los restantes hijos de Leví[b]: para los hijos de Amram[a], Subael; para los hijos de Subael, Jehdeía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico en este registro: los nombres personales probablemente representan al jefe o representante de cada rama familiar.'
    reason: cultural_note
  - marker: b
    text: 'O: «los hijos de Leví que quedaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  english_pob_choice: And for the sons of
  chosen_spanish: Y para los hijos de
  alternatives_spanish:
  - Y a los hijos de
  - Ahora, para los hijos de
  lexicon: HALOT
  rationale: La fórmula encabezadora funciona como una introducción de lista genealógica/administrativa. «Y para los hijos de» conserva la conexión y el valor clasificatorio sin sonar forzado en español.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma estándar en español bíblico, con acento gráfico conforme a la pronunciación española.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining
  chosen_spanish: que quedaban
  alternatives_spanish:
  - los restantes
  - los que quedaban
  lexicon: HALOT
  rationale: El participio expresa a los que quedaron o permanecieron. En español, «que quedaban» suena natural y mantiene la idea de resto remanente en una lista de familias.
- source_word: לִ/בְנֵי עַמְרָם
  english_pob_choice: for the sons of Amram
  chosen_spanish: para los hijos de Amram
  alternatives_spanish:
  - a los hijos de Amram
  lexicon: HALOT
  rationale: Se mantiene la repetición de la fórmula genealógica. «Para» refleja adecuadamente la función distributiva/listadora del hebreo en este contexto.
- source_word: שׁוּבָאֵל
  english_pob_choice: Shubael
  chosen_spanish: Shubael
  alternatives_spanish:
  - Subael
  - Shuba'el
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio. No hay base suficiente en el contexto para adaptar la forma más allá de la convención transliterada.
- source_word: לִ/בְנֵי שׁוּבָאֵל
  english_pob_choice: for the sons of Shubael
  chosen_spanish: para los hijos de Shubael
  alternatives_spanish:
  - a los hijos de Shubael
  lexicon: HALOT
  rationale: Se repite la fórmula de lista para preservar la estructura del hebreo. No se suaviza a una paráfrasis que ocultaría la relación de ramas familiares.
- source_word: יֶחְדְּיָהוּ
  english_pob_choice: Jehdeiah
  chosen_spanish: Jehdeía
  alternatives_spanish:
  - Jehdías
  - Jahdías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma española inteligible y cercana al valor consonántico del hebreo. La acentuación ayuda a la lectura en español.
theological_decisions:
- issue: Valor elíptico de los nombres en un registro genealógico/administrativo
  english_pob_reading: 'Hebrew is elliptical in this roster: the personal names likely stand for the family head or representative of each clan branch.'
  chosen_spanish_reading: 'El hebreo es elíptico en este registro: los nombres personales probablemente representan al jefe o representante de cada rama familiar.'
  alternative_spanish_readings:
  - Los nombres son solo listas de individuos.
  - Los nombres funcionan como cabezas de clan por implicación.
  rationale: La nota auditada del POB señala una elipsis real del hebreo. En español conviene preservarla como observación explicativa, porque el texto menciona nombres de manera representativa y no desarrolla la sintaxis completa.
  doctrine_reference: 1 Crónicas 24:20; nota auditada del POB sobre el registro genealógico
- issue: Ambigüedad de הַנּוֹתָרִים
  english_pob_reading: the remaining
  chosen_spanish_reading: que quedaban
  alternative_spanish_readings:
  - los restantes
  - el resto de los
  rationale: El hebreo permite entender un grupo remanente. «Que quedaban» conserva ese matiz sin introducir una equivalencia rígida que suene menos natural en español.
  doctrine_reference: 1 Crónicas 24:20; HALOT
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético dado y el auditorio inglés del POB sin cambios de revisión posteriores; el criterio fue mantener la estructura genealógica repetitiva y la elipsis documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se conserva la secuencia genealógica con fórmulas repetidas para no ocultar la organización del hebreo.
  - Los nombres propios se transliteran, con adaptación ortográfica española mínima cuando ayuda a la lectura.
