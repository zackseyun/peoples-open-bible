review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: Dios oye el gemido, recuerda su pacto y se mencionan Abraham, Isaac y Jacob. Sin embargo, sustituye dos veces אֱלֹהִים por «Yahvé», aunque el texto fuente no usa יהוה aquí. La política terminológica del proyecto pide «Yahvé» para el Tetragrámaton, no para reemplazar automáticamente אֱלֹהִים. Debe mantenerse «Dios» en este versículo para preservar la evidencia fuente y la progresión narrativa.'
  spanish_quality_summary: 'El español es claro y natural. «Oyó», «gemido» y la repetición de «con» funcionan bien. Hay un detalle menor de puntuación: en una serie con repetición enfática de «con», conviene la coma antes de «y con Jacob». La nota a sobre «su gemido» no refleja bien la alternativa inglesa, porque el texto principal ya está en singular; conviene ajustar el texto principal a «sus gemidos» o «su gemir» para que la nota preserve una alternativa real. «Sus gemidos» suena más natural y recoge mejor el matiz colectivo/continuo señalado en la auditoría inglesa.'
  glossary_alignment: 'Alineación parcial. Correcto: «pacto» para בְּרִיתוֹ y «se acordó» para וַיִּזְכֹּר, con nota teológica apropiada. Incorrecto: «Yahvé» por אֱלֹהִים contradice la decisión léxica fuente y no está justificado por la política del glosario, que reserva «Yahvé» para יהוה. No hay cuestión mesiánica ni otros términos de glosario en este versículo.'
  issues:
  - severity: high
    issue: Se tradujo אֱלֹהִים como «Yahvé» en lugar de «Dios».
    rationale: El hebreo fuente dice אֱלֹהִים y la auditoría inglesa escogió «God». La política del proyecto no autoriza reemplazar אֱלֹהִים por «Yahvé» salvo evidencia textual específica del nombre divino, que aquí no existe.
  - severity: medium
    issue: «su gemido» debilita el matiz colectivo/continuo de נַאֲקָתָם y vuelve inservible la nota alternativa.
    rationale: La auditoría inglesa prefiere «their groaning» y ofrece «their groan» como alternativa. En español, si el texto principal ya dice «su gemido», la nota «O «gemido»» no aporta una alternativa real. «Sus gemidos» comunica mejor el sufrimiento colectivo y deja espacio para una nota sobre el singular posible si se quisiera.
  - severity: low
    issue: Falta coma antes de «y con Jacob» en la serie repetida.
    rationale: Con la repetición enfática «con Abraham, con Isaac, y con Jacob», la coma mejora la lectura y refleja mejor la cadencia de la enumeración.
