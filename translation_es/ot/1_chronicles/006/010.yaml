  spanish_consistency_notes:
  - Se usa 'hijos de' para la fórmula genealógica estándar.
  - Se mantiene la conjunción inicial para reflejar la continuidad de la lista.
  - Los nombres propios se transliteran y no se adaptan semánticamente.
  - Se evita 'señor' u otras fórmulas no pertinentes; no hay contenido teológico explícito en este versículo.
