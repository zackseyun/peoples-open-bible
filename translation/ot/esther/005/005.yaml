id: EST.5.5
reference: Esther 5:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ מַהֲרוּ֙ אֶת הָמָ֔ן לַ/עֲשׂ֖וֹת אֶת דְּבַ֣ר אֶסְתֵּ֑ר וַ/יָּבֹ֤א הַ/מֶּ֨לֶךְ֙ וְ/הָמָ֔ן אֶל הַ/מִּשְׁתֶּ֖ה אֲשֶׁר עָשְׂתָ֥ה אֶסְתֵּֽר־־־־׃
translation:
  text: Then the king said[a], "Hurry, bring Haman, so that Esther's word may be done." So the king and Haman came to the banquet that Esther had prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to carry out Esther's word.' The Hebrew literally says 'to do the word of Esther,' where 'word' can mean her stated request or instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֲרוּ
  chosen: Bring ... quickly
  alternatives:
  - Hurry
  - Make haste
  lexicon: HALOT
  rationale: Imperative plural from מהר, addressed to attendants. In context it calls for prompt action regarding Haman's appearance. 'Bring Haman quickly' makes the implied object of the command natural in English while preserving the urgency.
- source_word: אֶת הָמָן
  chosen: Haman
  alternatives:
  - for Haman
  lexicon: HALOT
  rationale: Direct-object marker with the proper name. In English the object is incorporated into the command 'Bring Haman quickly.'
- source_word: לַעֲשׂוֹת אֶת דְּבַר אֶסְתֵּר
  chosen: so that Esther's request may be done
  alternatives:
  - to do Esther's word
  - to carry out Esther's request
  lexicon: HALOT
  rationale: דָּבָר literally means 'word/matter,' but in this court setting it refers to what Esther has asked for. 'Request' communicates the idiomatic sense in clear English. The passive-like 'may be done' reflects the Hebrew infinitive construction without over-literal awkwardness.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. English idiom with the destination stated ('to the banquet') is best served by 'came' here, matching the narrative perspective.
- source_word: הַמִּשְׁתֶּה
  chosen: the banquet
  alternatives:
  - the feast
  - the drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a feast/banquet, often with drinking. 'Banquet' fits the royal setting and is natural modern English.
- source_word: אֲשֶׁר עָשְׂתָה אֶסְתֵּר
  chosen: that Esther had prepared
  alternatives:
  - that Esther had made
  - which Esther had prepared
  lexicon: HALOT
  rationale: עשה with a banquet means 'prepare/make.' 'Had prepared' is idiomatic English for arranging a banquet and appropriately situates the action prior to their arrival.
