theological_decisions:
- issue: Identification of “the spirit that dwells in it” (v.1)
  chosen_reading: Render as “spirit” (uncapitalized) to preserve ambiguity
  alternative_readings:
  - Render as “Spirit,” i.e., the Holy Spirit
  rationale: The Greek lacks ἅγιον in v.1, while v.2 explicitly names “the Holy Spirit.” Preserving the ambiguity in v.1 reflects the text’s progression and maintains tension between human spirit and divine Spirit.
  doctrine_reference: Translation philosophy §Preserve theological tension (3)
- issue: Render ἴασις as “healing” rather than “forgiveness”
  chosen_reading: Use “healing”
  alternative_readings:
  - forgiveness
  - remission
  rationale: Hermas consistently employs medical imagery for repentance and restoration. “Healing” keeps that metaphor active, while readers will naturally understand the soteriological sense.
- issue: Meaning of κοινά ἐστι (“both are κοινά”)
  chosen_reading: “Both are shared”—flesh and spirit are in mutual participation and cannot be defiled separately
  alternative_readings:
  - “both are in common” (literal)
  - “both are partners” (dynamic)
  rationale: 'The point is the inseparability of moral defilement: body and (human/divine) spirit share in purity/defilement. Using “shared” avoids confusion with ‘common/profane’ while conveying the anthropology.'
- issue: Dative expression ζήσῃ τῷ Θεῷ
  chosen_reading: “live to God”
  alternative_readings:
  - “live for God”
  rationale: We retain the dative nuance and elevated tone, echoing the idiom of orientation toward God without over-smoothing.
- issue: Vocative κύριε addressed to the shepherd
  chosen_reading: “Sir”
  alternative_readings:
  - “Lord”
  rationale: To avoid conflating the shepherd with God, and to reflect polite address to a superior/elder, we use “Sir.” Later “the Lord, the Almighty” refers unmistakably to God.
