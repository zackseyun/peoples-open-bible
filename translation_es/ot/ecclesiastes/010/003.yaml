review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: observación adicional pública («Incluso en el camino»), marco temporal («cuando el necio anda»), carencia intelectual asociada al corazón, y la cláusula final con la lectura principal de autodelación, además de conservar la nota sobre la alternativa. Sin embargo, «le falta el corazón de juicio» no corresponde bien a לִבּוֹ חָסֵר; en hebreo no falta un “corazón de juicio”, sino que su corazón carece de juicio/sesatez. La nota también debe anclarse a la cláusula ambigua final, no a «camino».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «le falta el corazón de juicio» suena forzado y poco idiomático en español e introduce una construcción no natural. «Su corazón carece de juicio» preserva mejor la imagen de «corazón» como sede del entendimiento y suena natural. Además, la nota al pie está bien formulada en contenido, pero el marcador debe colocarse donde surge la ambigüedad, no en «camino».
  glossary_alignment: «Necio» alinea bien con סָכָל en un contexto sapiencial. No hay términos teológicos de proyecto comprometidos aquí. La preservación de «corazón» frente a una mera paráfrasis como «le falta entendimiento» es preferible por fidelidad al hebreo y a la revisión inglesa documentada.
  issues:
  - severity: high
    issue: La expresión «le falta el corazón de juicio» es semántica y sintácticamente deficiente.
    rationale: לִבּוֹ חָסֵר significa que su corazón carece de juicio/sesatez; el borrador convierte eso en la ausencia de un supuesto «corazón de juicio», construcción ajena al hebreo y poco natural en español.
  - severity: medium
    issue: El marcador de nota [a] está colocado en «camino» en vez de la cláusula ambigua final.
    rationale: La nota explica la ambigüedad de סָכָל הוּא («que es un necio» / «Él es un necio»), no una variante de «en el camino». Debe anclarse donde el lector encuentra esa ambigüedad.
  - severity: low
    issue: La apertura «Incluso en el camino» es aceptable, pero «Aun en el camino» fluye mejor en registro proverbial bíblico.
    rationale: No es un error, pero «Aun» suena más natural y sobrio en este contexto sin perder el énfasis de וְגַם / Even.
  revised_spanish_text: Aun en el camino, cuando el necio anda, su corazón carece de juicio, y dice a todos que es un necio[a].
  revised_footnotes:
  - marker: a
    text: 'O: «y dice a todos: “Él es un necio.”» El hebreo puede entenderse de dos maneras: que el necio se delata a sí mismo como necio, o que llama necio a otro; el contexto favorece la primera.'
    reason: alternative_reading
