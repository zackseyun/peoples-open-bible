translation:
  language: es
  text: 'Y pronuncia un proverbio[a] a la casa rebelde, y diles: «Así dice el Señor Yahvé: Pon la olla; ponla, y también echa agua en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una parábola». El hebreo מָשָׁל puede denotar proverbio, parábola o dicho figurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְשֹׁל
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - pronuncia
  lexicon: HALOT
  rationale: El verbo משל en esta forma verbal significa comunicar una declaración figurada o proverbial. En español, «habla» conserva la naturalidad y mantiene la relación explícita con la figura siguiente sin forzar un calco como «habla un proverbio».
- source_word: בֵּית הַמֶּרִי
  english_pob_choice: the rebellious house
  chosen_spanish: la casa rebelde
  alternatives_spanish:
  - la casa de la rebelión
  - el pueblo rebelde
  lexicon: HALOT
  rationale: Se conserva el idiomatismo profético «casa» para la colectividad, y «rebelde» transmite el valor adjetival de מֶרִי de forma directa y comprensible. «El pueblo rebelde» aclara, pero suaviza el giro hebreo.
- source_word: מָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: una parábola
  alternatives_spanish:
  - un proverbio
  - una comparación figurada
  lexicon: HALOT
  rationale: El contexto inmediato del signo de la olla favorece una figura extendida y no un proverbio breve. En español, «parábola» comunica bien una palabra figurada o alegórica; se mantiene la alternativa semántica abierta en nota porque el hebreo admite más de un matiz.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la directriz del proyecto para rendir el nombre divino como «Yahvé» y no como una convención de ocultamiento. El título compuesto se mantiene con «el Señor» + nombre propio divino para preservar la distinción de אֲדֹנָי y יהוה sin recurrir a la fórmula tradicional «SEÑOR DIOS».
- source_word: שְׁפֹת
  english_pob_choice: Set on
  chosen_spanish: Pon la olla; ponla
  alternatives_spanish:
  - Coloca la olla; colócala
  - Ponla al fuego; ponla
  lexicon: HALOT
  rationale: El imperativo se refiere a colocar la vasija de cocción en su sitio. «Pon» es el equivalente más natural e imperativo en español, y la repetición conserva la urgencia y el paralelismo del hebreo.
- source_word: הַסִּיר
  english_pob_choice: the pot
  chosen_spanish: la olla
  alternatives_spanish:
  - la vasija
  - la cazuela
  lexicon: HALOT
  rationale: «Olla» es un equivalente claro y contemporáneo para el recipiente de cocina. Aunque «pot» puede abarcar varios utensilios, «olla» es suficientemente amplio sin sonar arcaico o especializado.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - además
  lexicon: HALOT
  rationale: Se conserva el valor aditivo de גם con una coordinación natural en español.
- source_word: יְצֹק בּוֹ מָיִם
  english_pob_choice: pour water into it
  chosen_spanish: echa agua en ella
  alternatives_spanish:
  - derrama agua en ella
  - vierte agua en ella
  lexicon: HALOT
  rationale: יצק es «verter/derramar/echar» según contexto. «Echa agua en ella» suena natural en una escena doméstica y mantiene la dirección del movimiento sin ampliar el sentido a «llenar».
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord Yahweh as an acknowledged alternative
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La guía del proyecto exige traducir יהוה como «Yahvé» en el texto principal. Dado que אֲדֹנָי precede al nombre, se conserva el título reverencial con «el Señor» y se explicita el nombre del pacto en lugar de enmascararlo. Esto mantiene la tensión entre título y nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo textual y no presenta cambios aplicados en la revisión más reciente; por eso se mantiene una solución sobria y directa. La única tensión principal es la amplitud de מָשָׁל y la forma de representar אֲדֹנָי יְהוִה, ambas tratadas explícitamente en la redacción y las notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto para יהוה.
  - Se conserva «el Señor» para אֲדֹנָי sin ocultar el nombre divino.
  - 'Se prefiere vocabulario contemporáneo y eclesialmente comprensible: «olla», «echa», «habla».'
  - La nota de pie marca la alternativa léxica real de מָשָׁל sin exceder el alcance del hebreo.
