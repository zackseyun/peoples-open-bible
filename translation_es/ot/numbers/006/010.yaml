translation:
  language: es
  text: Y el octavo día traerá dos tórtolas o dos palominos[a] al sacerdote, a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos palomas jóvenes»; la expresión hebrea dice literalmente «dos hijos de paloma», un modismo para palomas jóvenes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּ֣וֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y el ... día
  - Y para el ... día
  lexicon: HALOT
  rationale: El hebreo une la conjunción y la preposición con valor temporal; en español, «Y en el octavo día» conserva la secuencia prescriptiva sin sonar forzado.
- source_word: הַ/שְּׁמִינִ֗י
  english_pob_choice: eighth
  chosen_spanish: octavo
  alternatives_spanish:
  - en el día ocho
  lexicon: HALOT
  rationale: Es el ordinal directo que modifica «día» y reproduce fielmente el valor del hebreo.
- source_word: יָבִא֙
  english_pob_choice: he shall bring
  chosen_spanish: traerá
  alternatives_spanish:
  - deberá traer
  - ha de traer
  lexicon: HALOT
  rationale: En una instrucción legal, el futuro español expresa bien la obligación prescriptiva, manteniendo la fuerza directiva del hebreo.
- source_word: שְׁתֵּ֣י תֹרִ֔ים
  english_pob_choice: two turtledoves
  chosen_spanish: dos tórtolas
  alternatives_spanish:
  - dos tortolitas
  - dos palomitas
  lexicon: HALOT
  rationale: תֹרִים designa tórtolas/tórtoles, no palomas genéricas. «Tórtolas» es el equivalente más preciso y bíblico en español.
- source_word: א֥וֹ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: HALOT
  rationale: Conjunción disyuntiva simple; no requiere ajuste.
- source_word: שְׁנֵ֖י בְּנֵ֣י יוֹנָ֑ה
  english_pob_choice: two young pigeons
  chosen_spanish: dos pichones
  alternatives_spanish:
  - dos polluelos de paloma
  - dos jóvenes palomas
  lexicon: HALOT
  rationale: La expresión hebrea literal es «hijos de paloma», un modismo para aves jóvenes. «Pichones» comunica la juventud del ave de forma natural en español y preserva el sentido sacrificial.
- source_word: אֶל הַ/כֹּהֵ֔ן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiando
  lexicon: HALOT
  rationale: El hebreo refiere al oficiante de manera funcional; «sacerdote» es el término estándar y transparente en español. No se fuerza «sacerdote» a «cura» o formas eclesiales posteriores.
- source_word: אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד
  english_pob_choice: to the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada de la tienda del encuentro
  - a la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: «פֶּתַח» es «entrada» y «אֹהֶל מוֹעֵד» se rinde de modo transparente como «tienda de reunión», conservando el nombre hebreo tradicional sin sustituirlo por una paráfrasis litúrgica.
theological_decisions:
- issue: 'Terminología del lugar sagrado: אֹהֶל מוֹעֵד'
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tabernáculo de reunión
  - tienda del encuentro
  rationale: Se conserva el valor técnico del término hebreo sin introducir una denominación eclesiástica posterior. «Tienda de reunión» es la forma más transparente y auditables para el lector español.
  doctrine_reference: Éxodo 25–40; Levítico 1:1
translation_notes:
  revision_awareness: 'Se siguió el estado final del audit trail inglés: no hubo revisiones aplicadas y el pass más reciente indica acuerdo alto/total. Por eso la redacción española mantiene la estructura y decisiones léxicas básicas del texto base, ajustándolas sólo para naturalidad y precisión en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Sacerdote» se usa de forma funcional, no como término litúrgico confesional.
  - «Tienda de reunión» conserva el referente técnico de אֹהֶל מוֹעֵד de manera consistente con el proyecto.
  - La frase final evita «tabernáculo» para no oscurecer el hebreo del sustantivo אֹהֶל, aunque se deja como alternativa en la nota de decisión léxica.
