translation:
  language: es
  text: Yo abrí a mi amado, pero mi amado se había escabullido y había pasado[a]. Mi alma salió cuando él habló[b]; lo busqué, pero no lo hallé. Lo llamé, pero no me respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se había deslizado y había pasado» o «se había retirado y había seguido de largo». El hebreo usa dos verbos para intensificar la partida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Mi alma salió a su hablar» / «Quedé fuera de mí cuando habló». El hebreo expresa un modismo vívido y difícil de reproducir por completo en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּתַחְתִּי אֲנִי
  english_pob_choice: I opened
  chosen_spanish: Abrí yo
  alternatives_spanish:
  - Yo abrí
  - Abrí
  lexicon: HALOT
  rationale: El hebreo usa el pronombre independiente אֲנִי para dar énfasis. En español, «Abrí yo» conserva ese realce sin volver la frase pesada; «Abrí» sería más natural, pero pierde la fuerza enfática documentada.
- source_word: לְדוֹדִי
  english_pob_choice: to my beloved
  chosen_spanish: a mi amado
  alternatives_spanish:
  - para mi amado
  - a mi amado
  lexicon: HALOT
  rationale: La preposición ל con פתח indica la persona a quien se abre. En español, «a mi amado» expresa mejor la dirección y mantiene el sentido relacional de דוֹד como «amado» en Cantares.
- source_word: וְדוֹדִי
  english_pob_choice: but my beloved
  chosen_spanish: pero mi amado
  alternatives_spanish:
  - y mi amado
  - mas mi amado
  lexicon: HALOT
  rationale: 'Aunque ו normalmente es «y», el contexto es claramente adversativo: ella abre, pero él ya no está. «Pero» preserva esa contraposición natural en español.'
- source_word: חָמַק עָבָר
  english_pob_choice: had turned away and gone
  chosen_spanish: se había escabullido y había pasado
  alternatives_spanish:
  - se había deslizado y había pasado
  - se había retirado y había pasado
  lexicon: HALOT
  rationale: El par verbal intensifica la partida. חמק sugiere escabullirse o retirarse furtivamente; עבר añade la idea de pasar. «Se había escabullido y había pasado» conserva ambos matices y la pérdida repentina.
- source_word: נַפְשִׁי יָצְאָה
  english_pob_choice: My soul went out
  chosen_spanish: Mi alma salió
  alternatives_spanish:
  - Me desmayé
  - Mi vida salió
  lexicon: HALOT
  rationale: Se mantiene el idioma poético con «alma» para no aplanar נפשׁ a simple emoción. «Salió» reproduce de forma sobria el verbo hebreo y deja intacta la fuerza idiomática.
- source_word: בְדַבְּרוֹ
  english_pob_choice: when he spoke
  chosen_spanish: al hablar él
  alternatives_spanish:
  - cuando él habló
  - por hablar él
  lexicon: HALOT
  rationale: La construcción con ב puede ser temporal y aquí apunta al momento de su hablar. «Al hablar él» es una solución breve y poética que mantiene la relación temporal sin añadir más que el texto.
- source_word: בִּקַּשְׁתִּיהוּ
  english_pob_choice: I sought him
  chosen_spanish: lo busqué
  alternatives_spanish:
  - lo busqué con empeño
  - lo procuré
  lexicon: HALOT
  rationale: בקשׁ puede ser «buscar» o «buscar con afán». En español, «lo busqué» es natural y suficiente; «buscar» conserva la acción de búsqueda sin volverla más interpretativa.
- source_word: מְצָאתִיהוּ
  english_pob_choice: I did not find him
  chosen_spanish: no lo hallé
  alternatives_spanish:
  - no lo encontré
  lexicon: HALOT
  rationale: «Hallé» es el equivalente literario y directo de מצא en este contexto. Mantiene el paralelismo poético con «lo busqué» y suena más bíblico sin ser arcaizante.
- source_word: קְרָאתִיו
  english_pob_choice: I called him
  chosen_spanish: lo llamé
  alternatives_spanish:
  - lo llamé a él
  - lo invoqué
  lexicon: HALOT
  rationale: El sufijo de objeto permite «lo llamé», que es claro y natural en español. «Llamé a él» sería menos idiomático; «invocar» excede el sentido inmediato del texto.
- source_word: עָנָנִי
  english_pob_choice: he did not answer me
  chosen_spanish: no me respondió
  alternatives_spanish:
  - no me contestó
  - no me dio respuesta
  lexicon: HALOT
  rationale: ענה aquí significa responder/contestar. «No me respondió» conserva la personalización del silencio y el contraste con «lo llamé».
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo, manteniendo el paralelismo verbal y la idiomaticidad poética en español. No se introdujeron cambios textuales respecto del sentido base del original; las notas preservan la alternativa léxica documentada para la partida del amado y la reacción intensa de la hablante.
  spanish_consistency_notes:
  - Se eligió «amado» para דוֹד en coherencia con el registro poético de Cantares y con la decisión inglesa 'beloved'.
  - Se mantuvo «alma» para נפשׁ para conservar la imagen poética y no reducirla a mera emoción.
  - Se evitó introducir léxico eclesiástico ajeno al texto; el verso es amoroso-poético, no litúrgico.
