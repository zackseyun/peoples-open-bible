base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/001/016.yaml
  text: Do not regard your servant as a worthless woman[b][a], for out of the abundance of my complaint and my vexation I have spoken until now.
  footnotes:
  - marker: a
    text: Hebrew literally, 'a daughter of worthlessness,' an idiom for a morally contemptible or disreputable woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'out of my great complaint and vexation.'
    reason: lexical_alternative
