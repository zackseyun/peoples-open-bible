review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: consecuencia temporal inmediata, primer איים en sentido amplio y segundo en sentido literal, y la idea de la salida/desaparición de Tiro. Sin embargo, hay pequeños problemas de fidelidad y español natural: «serán aterradas» no es idiomático para וְנִבְהֲלוּ, y «por tu desaparición» hace más explícita la interpretación que el hebreo/POB inglés, que mantiene la metáfora de «salida/departure».'
  spanish_quality_summary: El español es claro en general, pero necesita pulirse para sonar natural y digno. «Las costas» puede entenderse físicamente más que como regiones marítimas; «costas» es aceptable por la nota, aunque «costas e islas» ya está bien distinguido. El mayor problema de estilo es «serán aterradas», construcción poco natural en español bíblico moderno; «quedarán aterradas» o «se llenarán de terror» suena mejor. También conviene ajustar la puntuación de notas y corregir el error ortográfico «dismadas».
  glossary_alignment: No hay términos del glosario principal comprometidos en este versículo. La decisión de distinguir «costas»/«islas» sigue la lógica documentada del inglés. La frase final debe acercarse más al valor de מִצֵּאתֵךְ como «tu salida/partida» con nota explicativa, en vez de fijar directamente «desaparición» en el texto principal.
  issues:
  - severity: medium
    issue: «serán aterradas» es poco idiomático para וְנִבְהֲלוּ
    rationale: Aunque intenta reflejar la pasividad del nifal, en español suena forzado. «quedarán aterradas» preserva mejor el resultado de terror y la legibilidad.
  - severity: medium
    issue: «por tu desaparición» sobreinterpreta מִצֵּאתֵךְ en el texto principal
    rationale: El hebreo dice literalmente «por/de tu salida»; la interpretación como desaparición pertenece mejor a la nota, como en la POB inglesa.
  - severity: low
    issue: La nota b contiene un error ortográfico y formato mejorable
    rationale: «dismadas» debe ser «desmayadas» o «consternadas»; además conviene usar comillas españolas y redacción más limpia.
  revised_spanish_text: Ahora las costas[a] temblarán el día de tu caída, y las islas que están en el mar quedarán aterradas por tu salida[b].
