review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la comunidad del exilio observó la Pascua en la fecha indicada. Sin embargo, la nota al pie actual no preserva correctamente las alternativas documentadas en el rastro inglés: repite la lectura principal en lugar de ofrecer las alternativas ''los hijos del exilio'', ''los hijos de la cautividad'' o, de forma más natural, ''los exiliados''. Además, ''el día catorce'' es comprensible, pero ''el día catorce del primer mes'' suena menos natural y menos estándar que ''el día catorce del mes primero'' o mejor ''el día catorce del primer mes''; aun así, la mejora principal necesaria es en la nota.'
  spanish_quality_summary: El español es claro y digno. 'Celebraron la Pascua' es natural y fiel al valor idiomático de וַיַּעֲשׂוּ ... אֶת־הַפָּסַח. 'Los hijos del exilio' mantiene bien la cercanía al hebreo, aunque en español requiere apoyo de nota. La redacción general es buena; la reparación es menor y se concentra en corregir la nota y pulir la fecha para mayor fluidez.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Pascua' para הַפָּסַח es adecuado. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La decisión de mantener 'hijos del exilio' en el texto con alternativa explicativa en nota concuerda con la rationale inglesa.
  issues:
  - severity: medium
    issue: La nota al pie no transmite correctamente las alternativas léxicas auditadas.
    rationale: 'La nota dice: "O ''los hijos del exilio'' o ''los exiliados''", pero el texto principal ya usa ''los hijos del exilio''. La nota debe ofrecer alternativas reales al lector, preservando la función de la nota inglesa: alternativas a la literalidad hebrea, no una repetición de la lectura principal.'
  - severity: low
    issue: La formulación de la fecha puede pulirse para sonar más natural en español bíblico contemporáneo.
    rationale: '''El día catorce del primer mes'' es entendible, pero una ligera mejora de flujo con ''el día catorce del primer mes'' ya basta; no es un error grave. Se mantiene porque es aceptable, pero la revisión aprovecha para dejar el verso más fluido junto con la corrección de la nota.'
  revised_spanish_text: Y los hijos del exilio celebraron la Pascua el día catorce del primer mes[a].
  revised_footnotes:
  - marker: a
    text: O 'los hijos de la cautividad' o 'los exiliados'. El hebreo dice literalmente 'los hijos del exilio'.
    reason: lexical_alternative
