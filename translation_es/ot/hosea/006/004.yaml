translation:
  language: es
  text: ¿Qué haré contigo[a], Efraín? ¿Qué haré contigo, Judá? Su lealtad[b] es como una nube de la mañana y como el rocío que se va temprano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué he de hacer contigo?»
    reason: lexical_alternative
  - marker: b
    text: O «amor leal», «fidelidad» o «amor pactal» para חֶסֶד.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֶעֱשֶׂה לְךָ
  english_pob_choice: What shall I do with you
  chosen_spanish: ¿Qué haré contigo
  alternatives_spanish:
  - ¿Qué he de hacer contigo?
  - ¿Qué voy a hacer contigo?
  lexicon: HALOT
  rationale: La pregunta retórica expresa exasperación y deliberación, no simple solicitud de información. «¿Qué haré contigo?» suena natural en español y conserva el tono directo del hebreo.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - —
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio como apelación directa, tal como en el hebreo; en este contexto representa al reino del norte, pero la forma textual sigue siendo el nombre.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - —
  lexicon: Nombre propio bíblico
  rationale: Se mantiene el nombre propio en paralelo con Efraín, respetando la personificación del reino del sur.
- source_word: חַסְדְּכֶם
  english_pob_choice: loyalty
  chosen_spanish: lealtad
  alternatives_spanish:
  - amor leal
  - fidelidad
  - amor pactal
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar lealtad relacional dentro de un pacto. En este versículo, la lectura más directa y menos expansiva en español es «lealtad»; «amor leal» y «fidelidad» quedan como alternativas semánticas cercanas. Evito imponer una expansión interpretativa en el texto principal.
- source_word: כַּעֲנַן בֹּקֶר
  english_pob_choice: like a morning cloud
  chosen_spanish: como una nube de la mañana
  alternatives_spanish:
  - como la neblina de la mañana
  - como una nube matutina
  lexicon: HALOT
  rationale: אֲנָן es «nube» y el sintagma comunica algo insustancial y pasajero al amanecer. «Nube de la mañana» preserva la metáfora con español natural.
- source_word: וְכַטַּל
  english_pob_choice: and like dew
  chosen_spanish: y como el rocío
  alternatives_spanish:
  - y como la escarcha
  - y como el rocío de la mañana
  lexicon: HALOT
  rationale: La imagen paralela exige «rocío»; el artículo puede incluirse naturalmente en español. Se mantiene la sencillez del paralelo poético.
- source_word: מַשְׁכִּים
  english_pob_choice: early
  chosen_spanish: que se va temprano
  alternatives_spanish:
  - que amanece pronto
  - que se disipa temprano
  lexicon: HALOT
  rationale: El participio hiphil expresa la acción de hacer algo temprano; aquí modifica al rocío. «Que se va temprano» conserva la idea de prontitud y de desvanecimiento en el contexto poético.
- source_word: הֹלֵךְ
  english_pob_choice: goes away
  chosen_spanish: se va
  alternatives_spanish:
  - desaparece
  - se desvanece
  lexicon: HALOT
  rationale: El verbo literalmente es «ir/andar», pero en esta construcción describe desaparición o partida. «Se va» mantiene la imagen verbal sin endurecer el español.
theological_decisions:
- issue: Alcance de חֶסֶד en contexto profético de pacto
  english_pob_reading: loyalty
  chosen_spanish_reading: lealtad
  alternative_spanish_readings:
  - amor leal
  - fidelidad
  - amor pactal
  rationale: La POB inglesa revisó la frase desde «covenant loyalty» a «loyalty» para no expandir más allá de lo explícito. En español, «lealtad» conserva la fuerza relacional y ética de חֶסֶד sin convertirla en una paráfrasis doctrinal. Las alternativas se conservan como opciones semánticas legítimas.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente redujo «covenant loyalty» a «loyalty». La versión española sigue esa decisión y evita introducir «pactal» en el texto principal; se conserva la opción interpretativa en la nota. También se corrigió el anclaje de nota para que cada marcador aparezca explícitamente en el texto.
  spanish_consistency_notes:
  - 'Se mantienen nombres propios bíblicos en transliteración española estándar: Efraín, Judá.'
  - El paralelismo poético se conserva con dos comparaciones breves y equivalentes.
  - Se evita traducir חֶסֶד con términos eclesiásticos tradicionales sin apoyo directo del contexto; «lealtad» refleja la revisión inglesa más reciente.
  - La puntuación en español conserva la doble pregunta retórica y la coordinación del símil final.
