translation:
  language: es
  text: Pero mi amor leal[a] no se apartará de él, como se lo quité a Saúl, a quien aparté de delante de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "mi misericordia", "mi amor constante" o "mi lealtad de pacto". El hebreo חֶסֶד expresa amor fiel y comprometido dentro de una relación de pacto.'
    reason: lexical_alternative
  - marker: b
    text: Lit. "a quien aparté de delante de ti". La frase puede referirse a la remoción de Saúl de su posición en relación con David, no solo a un alejamiento físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor leal
  alternatives_spanish:
  - mi amor constante
  - mi misericordia
  - mi lealtad de pacto
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal y comprometido dentro de una relación de pacto. En español, 'amor leal' comunica mejor esa fuerza relacional que 'misericordia', y evita reducir el término a una emoción o solo a un gesto de bondad.
- source_word: יָסוּר
  english_pob_choice: will not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se irá
  - no será removido
  - no se desviará
  lexicon: HALOT
  rationale: El verbo סור puede significar apartarse, retirarse o ser quitado. 'No se apartará' es natural en español y conserva la idea de alejamiento o retirada del favor divino.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - alejándose de él
  - apartándose de él
  lexicon: HALOT
  rationale: La preposición con sufijo indica separación del destinatario prometido; 'de él' es breve e idiomático en español y mantiene la referencia directa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  - justo como
  lexicon: HALOT
  rationale: Introduce la comparación con Saúl. 'Como' reproduce la relación comparativa sin añadir énfasis interpretativo innecesario.
- source_word: הֲסִרֹתִי
  english_pob_choice: I removed
  chosen_spanish: lo aparté
  alternatives_spanish:
  - lo quité
  - lo removí
  - lo retiré
  lexicon: HALOT
  rationale: 'El hifil de סור es causativo: quitar, remover, apartar. ''Lo aparté'' mantiene el vínculo léxico con ''no se apartará'' y suena natural en español.'
- source_word: מֵעִם שָׁאוּל
  english_pob_choice: from Saul
  chosen_spanish: de Saúl
  alternatives_spanish:
  - alejándolo de Saúl
  - fuera de Saúl
  - de su lado, Saúl
  lexicon: HALOT
  rationale: La expresión implica remoción de la asociación o posición respecto de Saúl. En español, 'de Saúl' conserva la brevedad del hebreo y el sentido general sin sobreexplicar.
- source_word: אֲשֶׁר הֲסִרֹתִי מִלְּפָנֶיךָ
  english_pob_choice: whom I removed from before you
  chosen_spanish: a quien aparté de delante de ti
  alternatives_spanish:
  - a quien quité de tu presencia
  - a quien removí de delante de ti
  - a quien aparté de tu vista
  lexicon: HALOT
  rationale: מִלְּפָנֶיךָ es literalmente 'de delante de ti'. 'De delante de ti' preserva la imagen espacial y la ambigüedad del hebreo, que puede aludir a la remoción de Saúl en relación con David, no solo a una salida física.
theological_decisions:
- issue: Sentido de חֶסֶד en el contexto del pacto davídico
  english_pob_reading: Render as 'steadfast love' to preserve covenantal loyalty without importing a narrower doctrinal formula.
  chosen_spanish_reading: Traducir como 'amor leal' para preservar el peso de lealtad de pacto sin reducirlo a una sola noción devocional.
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - lealtad de pacto
  rationale: 'El contraste del versículo no es solo emocional, sino de fidelidad pactal: la disposición de Yahvé hacia la línea de David permanece. ''Amor leal'' comunica esa fidelidad relacional y resulta claro para lectores hispanohablantes.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Alcance de 'de delante de ti'
  english_pob_reading: Keep the wording 'from before you' rather than resolving it into an interpretive paraphrase such as 'from being king before you.'
  chosen_spanish_reading: Conservar 'de delante de ti' en vez de explicitarlo como 'de su puesto delante de ti' o 'de ser rey delante de ti'.
  alternative_spanish_readings:
  - de tu presencia
  - de su puesto delante de ti
  - de ser rey delante de ti
  rationale: El hebreo mantiene una expresión abierta que alude claramente a la remoción de Saúl en relación con David, pero sin precisar por completo el mecanismo. 'De delante de ti' respeta esa tensión y evita añadir interpretación al texto base.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran alta concordancia textual y solo matices léxicos. Se conservó la comparación con Saúl y la imagen literal de 'de delante de ti' para no resolver la ambigüedad presente en el original.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de una sustitución por 'SEÑOR' cuando corresponde al nombre divino en el marco del POB.
  - Se prefirió 'amor leal' para חֶסֶד, siguiendo la fuerza de pacto del término sin traducirlo mecánicamente.
  - Se mantuvo una sintaxis sobria y bíblica, pero con español natural y publicable.
  - Las notas conservan alternativas útiles sin borrar la tensión léxica del hebreo.
