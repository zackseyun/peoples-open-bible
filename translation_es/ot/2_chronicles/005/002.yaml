base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/005/002.yaml
  text: Then Solomon assembled the elders of Israel and all the heads of the tribes[a], the leaders of the fathers’ houses of the sons of Israel, at Jerusalem, to bring up the ark of the covenant of Yahweh from the city of David[b], that is Zion.
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew says 'the sons of Israel,' preserving Israel's genealogical and covenantal identity.
    reason: lexical_alternative
  - marker: b
    text: Or 'which is Zion.'
    reason: lexical_alternative
