  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה → «Yahvé» correctamente; מְשִׁיחַ יְהוָה → «el ungido de Yahvé» correctamente, evitando «Mesías» en este contexto real; no hay conflictos con otros términos doctrinales. La única desalineación documental es que la nota de pie debería acompañar «hijos de muerte» y explicar el modismo, no explicar «Vive Yahvé».'
