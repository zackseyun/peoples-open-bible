parallelism_check: The rendering preserves the initial "I am" declaration and keeps
  the additive structure with repeated "and" (ⲁⲩⲱ) phrases. The unexpected shift to
  "You are" (ⲛⲟⲕ ⲡⲉ) is retained rather than smoothed, maintaining the poem’s dialogic
  tension. The superlative construction "name of names" is kept as-is, preserving
  the rhetorical parallelism and intensification.
voice_check: Thunder’s first-person, oracular voice is maintained with "I am … and
  …" and direct address is preserved via "You are …" and "those who ask me." No third-person
  domestication was introduced; the cadence remains terse and declarative.
