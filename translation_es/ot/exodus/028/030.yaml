base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/030.yaml
  text: And you shall put the Urim and the Thummim into the breastpiece of judgment[a], and they shall be on Aaron’s heart when he goes in before Yahweh[c][b]. And Aaron shall bear the judgment of the sons of Israel on his heart before Yahweh continually.
  footnotes:
  - marker: a
    text: Urim and Thummim are the Hebrew names of sacred objects associated with priestly judgment; their exact form and operation are uncertain. Possible etymological renderings include 'lights' and 'perfections.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the breastpiece for decision' / 'the breastpiece of justice.' The Hebrew word מִשְׁפָּט can denote judgment, decision, or justice depending on context.
    reason: alternative_reading
  - marker: c
    text: '''The sons of Israel'' is the Hebrew expression; it refers to the covenant people of Israel.'
    reason: lexical_alternative
