translation:
  language: es
  text: 'Y el rey dijo: «Tú, averigua[a] de quién es hijo este joven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pregunta»; el hebreo שְׁאַל puede llevar el matiz de pedir información o averiguar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así ... dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción; «Y ... dijo» conserva ese fluir hebreo sin añadir una relación causal o conclusiva más fuerte que la del texto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo con artículo se traduce de manera directa y natural; el contexto identifica a Saúl, pero el hebreo usa el título, no el nombre propio.
- source_word: שְׁאַל
  english_pob_choice: inquire
  chosen_spanish: averigua
  alternatives_spanish:
  - pregunta
  - informa
  - indaga
  lexicon: HALOT
  rationale: En esta construcción, el imperativo pide obtener la información. «Averigua» comunica en español la acción resultante de preguntar/inquirir sin sonar tan rígido como un calco de «inquire».
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis y se mantiene en español con el sujeto explícito.
- source_word: בֶּן מִי
  english_pob_choice: whose son
  chosen_spanish: de quién es hijo
  alternatives_spanish:
  - hijo de quién
  - de quién es el hijo
  lexicon: HALOT
  rationale: La expresión hebrea pregunta por la filiación paterna; «de quién es hijo» es la forma más natural y fiel en español contemporáneo.
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: El demostrativo conserva la deixis cercana del texto, apropiada para un joven presente o inmediatamente visible en la escena.
- source_word: הָעָלֶם
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mozo
  lexicon: HALOT
  rationale: El término denota un varón joven; «joven» es claro, digno y natural en español, sin el tono arcaico de «muchacho» en este contexto de diálogo cortesano.
translation_notes:
  revision_awareness: Se respetó el flujo narrativo del waw consecutivo, el registro formal del mandato y la nota de alternativa léxica del POB inglés para שְׁאַל; no se introdujeron cambios doctrinales ni ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «rey» sin reemplazarlo por el nombre propio, en paralelo al hebreo.
  - Se eligió «joven» para הָעָלֶם por claridad y naturalidad en español, evitando un arcaísmo innecesario.
  - La orden se formula con un imperativo único y directo, preservando la intensidad de אַתָּה + שְׁאַל.
