    issue: «constriñéndose» es reflexivo y no refleja bien el sentido de padecimiento de στενοχωρούμενος
    rationale: El griego describe al espíritu como objeto de constricción, no como agente que se constriñe a sí mismo. En español, «siendo constreñido» o «siendo oprimido» transmite mejor el valor participial.
  - severity: medium
    issue: «siendo ahogado» puede ser ambiguo o menos idiomático para ἀγχόμενος
    rationale: Aunque posible, «ahogado» en español suele evocar inmersión o un resultado más específico. «Sofocado» preserva mejor la idea de asfixia/constricción continua; la alternativa «estrangulado» puede mantenerse en nota.
  - severity: low
    issue: 'La nota al pie a usa una formulación poco natural: «siendo constriñido/estrechado»'
    rationale: Conviene alinear la nota con un español más idiomático y con la revisión principal, sin perder la alternativa léxica de «aliento».
