translation:
  language: es
  text: 'Yahvé habló a Moisés en las llanuras de Moab[a], junto al Jordán, frente a Jericó, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en las estepas de Moab".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - y habló
  - entonces habló
  lexicon: HALOT
  rationale: En español, el verbo inicial del discurso divino suena natural como simple pasado narrativo. El waw consecutivo se expresa de forma idiomática sin añadir más de lo que el hebreo pide; no se refleja 'and' de manera pesada porque la coordinación ya queda clara por la sintaxis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, no como título sustitutivo. 'Yahvé' es la forma ya prevista para el texto español y mantiene la distinción entre el nombre personal de Dios y un título común.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: בְּעַרְבֹת
  english_pob_choice: in the plains
  chosen_spanish: en las llanuras
  alternatives_spanish:
  - en las estepas
  lexicon: HALOT
  rationale: ‘ערבות’ puede referirse a llanuras o estepas. En español, 'llanuras' comunica con claridad el marco geográfico y mantiene la referencia territorial sin sonar forzado. La alternativa 'estepas' se reserva si se quisiera enfatizar el matiz de terreno abierto y semiarido.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Topónimo transliterado de forma estándar.
- source_word: עַל יַרְדֵּן
  english_pob_choice: by the Jordan
  chosen_spanish: junto al Jordán
  alternatives_spanish:
  - a orillas del Jordán
  - cerca del Jordán
  lexicon: HALOT
  rationale: La preposición hebrea aquí indica ubicación adyacente, no que estuvieran literalmente encima del río. 'Junto al Jordán' reproduce con naturalidad el valor espacial y evita una imagen incorrecta.
- source_word: יְרֵחוֹ
  english_pob_choice: Jericho
  chosen_spanish: en Jericó
  lexicon: HALOT
  rationale: Topónimo estándar en español; se conserva la localización final de la escena.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'para decir:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: La forma infinitiva introduce el discurso que continúa en el versículo siguiente. 'Diciendo' preserva esa función sintáctica; los dos puntos ayudan en español a señalar la continuación inmediata del discurso.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre del pacto en forma transliterada, siguiendo la decisión doctrinal del proyecto de no ocultar el Tetragrámaton bajo un sustituto titular. Esto mantiene la transparencia con el hebreo y la continuidad con el registro del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Corregido para evitar el error de validación anterior: no se incluyen notas al pie sin anclaje en el texto. La redacción mantiene la relación sintáctica del hebreo y la localización geográfica sin añadir glosas innecesarias.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'Moisés', 'Moab', 'Jordán' y 'Jericó' como topónimos/nombre propio bíblicos habituales en español.
  - No se añade nota al pie sobre 'llanuras/estepas' porque, aunque la alternativa existe, el texto español no necesita una marca de ambigüedad para ser claro y validado.
