translation:
  language: es
  text: y el Negev[a], y la llanura, el valle de Jericó, la ciudad de las palmeras[b], hasta Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el sur’ para ‘el Negev’. El término hebreo puede funcionar como nombre regional o como descripción direccional/geográfica.
    reason: lexical_alternative
  - marker: b
    text: O ‘la llanura de Jericó’ para ‘el valle de Jericó’. El término hebreo denota un valle amplio o llanura.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: el Negev
  alternatives_spanish:
  - el sur
  - la región del sur
  - el Neguev
  lexicon: HALOT
  rationale: El hebreo puede significar tanto una región geográfica definida como 'sur'. Dado que el texto enumera territorios vistos por Moisés, mantengo el valor de nombre geográfico con transliteración estable en español, 'Negev', en continuidad con el POB inglés y con mejor fuerza toponímica que una mera dirección.
- source_word: הַכִּכָּר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - la vega
  - la comarca
  lexicon: HALOT
  rationale: כִּכָּר en contexto geográfico designa una región llana, no un círculo literal. 'Llanura' es natural en español y conserva el sentido topográfico general, coherente con la aclaración posterior del valle de Jericó.
- source_word: בִּקְעַת יְרֵחוֹ
  english_pob_choice: the valley of Jericho
  chosen_spanish: el valle de Jericó
  alternatives_spanish:
  - la llanura de Jericó
  - el valle/llanura de Jericó
  lexicon: HALOT
  rationale: בִּקְעָה expresa una depresión amplia o valle. 'Valle de Jericó' distingue esta frase de 'la llanura' anterior y mantiene la apposición geográfica del original sin sobreexplicar.
- source_word: עִיר הַתְּמָרִים
  english_pob_choice: the city of palm trees
  chosen_spanish: la ciudad de las palmeras
  alternatives_spanish:
  - la ciudad de palmeras
  - la ciudad de los palmerales
  lexicon: HALOT
  rationale: El hebreo funciona como epíteto conocido de Jericó. 'Palmeras' comunica la imagen con fluidez natural en español, conservando el carácter descriptivo y tradicional del nombre sin añadir elementos no presentes.
- source_word: עַד צֹעַר
  english_pob_choice: as far as Zoar
  chosen_spanish: hasta Zoar
  alternatives_spanish:
  - así como Zoar
  - hasta llegar a Zoar
  lexicon: HALOT
  rationale: עַד marca límite o extensión. 'Hasta Zoar' expresa con sencillez el alcance final del recorrido/topografía mostrada y es una equivalencia natural en español.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - también ... y
  - y además ... y
  lexicon: Hebrew grammar
  rationale: La repetición del objeto con conjunción en hebreo sostiene una enumeración acumulativa. Mantener 'y ... y' preserva el ritmo listado y evita suavizar la secuencia topográfica.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del POB inglés, que preserva la estructura appositiva con comas y evita guiones. El español mantiene esa misma acumulación geográfica y resuelve las equivalencias léxicas con naturalidad sin perder la fuerza toponímica de Negev ni la imaginería de Jericó.
  spanish_consistency_notes:
  - Se conservó 'Negev' como topónimo transliterado, en lugar de 'sur', por la función geográfica del pasaje.
  - '''Llanura'' y ''valle'' se distinguen para reflejar la diferencia entre הַכִּכָּר y בִּקְעַת.'
  - '''Ciudad de las palmeras'' se mantuvo como epíteto de Jericó, con formulación fluida en español.'
  - Se evitó el uso de mayúsculas devocionales o sustituciones litúrgicas que no aparecen en el hebreo de este versículo.
