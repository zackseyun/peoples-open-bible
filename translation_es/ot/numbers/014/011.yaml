    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en medio de él», con referencia al pueblo como colectivo.'
    reason: lexical_alternative
  revision_rationale: Se corrige la omisión grave del objeto «me» en יְנַאֲצֻנִי, se adopta «menospreciará» como equivalente más fiel y natural para נאץ, y se reubican/rehacen las notas para que correspondan exactamente a sus anclas y al razonamiento documentado en el POB inglés. «En medio de él» preserva mejor la observación sobre el singular colectivo de בְּקִרְבּוֹ, mientras el texto principal mantiene el español natural «entre ellos».
