translation:
  language: es
  text: Bendito eres en el firmamento del cielo[a], y digno de alabanza y glorificado para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la expansión del cielo». στερέωμα puede referirse a la estructura firme o a la extensión del cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bendito seas
  - Alabado
  lexicon: BDAG
  rationale: El adjetivo predicativo en esta doxología expresa una bendición dirigida a Dios. «Bendito» conserva el tono litúrgico sin convertir la frase en una exhortación optativa artificial en español.
- source_word: ἐν τῷ στερεώματι
  english_pob_choice: in the firmament
  chosen_spanish: en la expansión
  alternatives_spanish:
  - en el firmamento
  - en la bóveda
  lexicon: LSJ
  rationale: En español, «expansión» comunica con naturalidad el sentido cosmológico de στερέωμα como extensión/estructura del cielo. Se mantiene la alternativa tradicional «firmamento» en nota por su resonancia bíblica.
- source_word: τοῦ οὐρανοῦ
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  - del firmamento
  lexicon: BDAG
  rationale: Aquí οὐρανός funciona como término elevado para el ámbito celeste. «Cielo» es claro y natural en español, sin perder el registro reverente.
- source_word: ὑμνητὸς
  english_pob_choice: praiseworthy
  chosen_spanish: digno de alabanza
  alternatives_spanish:
  - alabado
  - merecedor de himno
  lexicon: LSJ
  rationale: Como adjetivo predicativo, ὑμνητὸς señala que Dios merece ser cantado y alabado. «Digno de alabanza» refleja mejor esa cualidad que un simple participio pasado en español.
- source_word: δεδοξασμένος
  english_pob_choice: glorified
  chosen_spanish: glorificado
  alternatives_spanish:
  - honrado
  - ensalzado
  lexicon: BDAG
  rationale: La forma perfectiva mantiene el estado de gloria reconocido. «Glorificado» conserva el peso teológico y litúrgico del original.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: BDAG
  rationale: La expresión idiomática comunica duración interminable. «Para siempre» es natural y plenamente fiel al valor durativo del griego.
theological_decisions:
- issue: Valor cosmológico de στερέωμα
  english_pob_reading: firmament
  chosen_spanish_reading: expansión
  alternative_spanish_readings:
  - firmamento
  - bóveda del cielo
  rationale: El inglés POB preserva el término cosmológico tradicional con nota alternativa. En español, «expansión» evita una forma que hoy puede sonar más técnica o arcaizante, sin borrar la imagen bíblica. La nota conserva «firmamento» como alternativa válida por la misma razón intertextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Estructura de bendición dirigida a Dios
  english_pob_reading: Blessed are you
  chosen_spanish_reading: Bendito eres
  alternative_spanish_readings:
  - Bendito seas
  rationale: El griego usa segunda persona singular indicativa, dirigida directamente a Dios. «Bendito eres» reproduce el valor declarativo de la frase mejor que una forma desiderativa en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que ajustó ὑμνητὸς de «praise» a «praiseworthy», por lo que el español se formula como «digno de alabanza» para reflejar un adjetivo predicativo paralelo a «glorificado». También se mantuvo la nota alternativa para στερέωμα, según el expediente auditado.
  spanish_consistency_notes:
  - Se usó «Bendito» para conservar el registro doxológico, evitando «Bendito seas» por no introducir un matiz volitivo no explícito en el griego.
  - Se prefirió «expansión» en el texto principal y «firmamento» en nota para mantener claridad moderna sin perder la resonancia bíblica tradicional.
  - Se eligió «digno de alabanza» para ὑμνητὸς porque el español requiere una construcción adjetival natural que conserve el valor de cualidad.
  - Se mantuvo «glorificado» como equivalente directo de δεδοξασμένος en una fórmula de alabanza.
  - «Para siempre» expresa adecuadamente εἰς τοὺς αἰῶνας en español actual sin añadir información interpretativa.
