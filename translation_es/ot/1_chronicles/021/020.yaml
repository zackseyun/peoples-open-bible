  - severity: low
    issue: La puntuación separa innecesariamente el sintagma de los hijos de la acción verbal
    rationale: Las comas alrededor de «que estaban con él» hacen más pesada la lectura. Una redacción más lineal preserva mejor la progresión narrativa del original.
