translation:
  language: es
  text: 'Y si dicen[a]: «Vive Yahvé»[b], sin duda juran falsamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juran en falso» / «juran mentira». La expresión hebrea comunica un juramento falso o insincero.
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula hebrea de juramento: «Vive Yahvé».'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Aunque si
  - Y aunque
  lexicon: HALOT
  rationale: La partícula condicional/concesiva se expresa de forma natural en español con «Y si», manteniendo la relación con el contexto anterior sin sobreexplicar la concesión.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: La fórmula juratoria hebrea se conserva como exclamación de vida aplicada a Yahvé. En español, «Vive Yahvé» reproduce con concisión la forma fija del juramento y preserva el nombre divino.
- source_word: יֹאמֵרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dirán
  - declaran
  lexicon: HALOT
  rationale: El imperfecto plural de אמר se vierte de manera simple con presente narrativo en español, como ocurre habitualmente en formulaciones proverbiales o proféticas.
- source_word: לָכֵן
  english_pob_choice: surely
  chosen_spanish: sin duda
  alternatives_spanish:
  - ciertamente
  - así que
  - por tanto
  lexicon: HALOT
  rationale: Aquí la partícula refuerza la afirmación con valor intensificador. «Sin duda» comunica mejor esa fuerza que una inferencia puramente lógica como «por tanto».
- source_word: לַשֶּׁקֶר
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - con mentira
  - para engaño
  lexicon: HALOT
  rationale: El sintagma preposicional modifica el acto de jurar y funciona adverbialmente. «Falsamente» conserva el valor de swearing falsely sin añadir matices que el hebreo no exige.
- source_word: יִשָּׁבֵעוּ
  english_pob_choice: they swear
  chosen_spanish: juran
  alternatives_spanish:
  - hacen juramento
  - juran un juramento
  lexicon: HALOT
  rationale: El nifal de שבע en contexto juratorio se traduce naturalmente por «juran». El verbo ya implica el acto de jurar, por lo que no hace falta añadir objeto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la serie POB española se adopta «Yahvé» como forma estándar del nombre divino, en lugar de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación entre invocar el nombre de Yahvé y jurar falsamente
  english_pob_reading: they swear falsely
  chosen_spanish_reading: juran falsamente
  alternative_spanish_readings:
  - juran una mentira
  - juran en falso
  rationale: La tensión del verso no es solo que pronuncien un nombre sagrado, sino que lo hagan en un juramento mentiroso. «Juran falsamente» preserva esa fuerza jurídica y moral sin suavizarla.
  doctrine_reference: Lexical-theological note on oath language in prophetic rebuke
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión reciente que reemplazó «even so» por «surely» para לָכֵן, reforzando su valor intensificador. La versión española sigue esa lectura con «sin duda». También se respetó la decisión revisada de traducir la fórmula juratoria como una expresión fija y breve, sin expandirla innecesariamente.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», coherente con el estándar español del proyecto.
  - Se conserva el tono profético directo y la brevedad del hebreo.
  - «Juran falsamente» evita una paráfrasis como «hacen un juramento falso», que sería más larga y menos idiomática.
  - No se introdujeron notas al pie porque el verso en español puede leerse con claridad sin alternativas textuales obligatorias.
