revisions:
- from: 'Cuando los filisteos oyeron el sonido del grito[a], dijeron[b]: «¿Qué significa este gran sonido de grito en el campamento de los hebreos?» Y supieron que el arca de Yahvé había llegado al campamento.'
  to: 'Cuando los filisteos oyeron el sonido del clamor[a], dijeron: «¿Qué es este gran sonido de clamor[a] en el campamento de los hebreos?». Y supieron que el arca de Yahvé había llegado al campamento.'
  rationale: Se corrigen los anclajes de notas para que coincidan con la palabra comentada, se elimina una nota heredada del inglés que ya no aplica al español, se hace la pregunta más cercana al hebreo con '¿Qué es este...?', y se mejora la naturalidad de 'sonido del clamor' sin perder la distinción entre קוֹל y תְּרוּעָה.
