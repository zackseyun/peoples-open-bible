lexical_decisions:
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - heptad
  - seven
  rationale: In Jubilees chronology this denotes a week of years, not a literal seven-day week. The translation preserves the book’s calendrical framework while remaining readable.
- source_word: አምቤልዉ
  chosen: jubilee
  alternatives:
  - cycle
  - period
  rationale: This is the core chronological unit of the book and must be preserved explicitly rather than generalized.
- source_word: ምግባሮሙ
  chosen: conduct
  alternatives:
  - deeds
  - practices
  - works
  rationale: Conduct best captures repeated moral behavior in context, especially in Rebekah’s evaluation of Esau’s wives.
- source_word: ርኵስ
  chosen: unclean
  alternatives:
  - impure
  - defiled
  rationale: Unclean preserves the moral-ritual force common in Second Temple Jewish discourse without overinterpreting as merely ceremonial.
- source_word: ዝሙት
  chosen: fornication
  alternatives:
  - sexual immorality
  - whoredom
  rationale: Fornication preserves the strong sexual-moral charge of the term and matches Jubilees’ concern for illicit unions.
- source_word: ምርጓት
  chosen: impurity
  alternatives:
  - pollution
  - defilement
  rationale: Impurity pairs naturally with fornication and preserves the purity-language central to Jubilees.
- source_word: ወዐቃቤ ለያልይ
  chosen: in the watches of the night
  alternatives:
  - through the night watches
  - at night
  rationale: The phrase is more specific than a generic reference to night and should retain its watch-language.
- source_word: ዝምድር
  chosen: this land
  alternatives:
  - the land
  - the country
  rationale: The demonstrative sense is preserved, referring to the local Canaanite population among whom they dwell.
- source_word: ትውልደ ጽድቅ
  chosen: a righteous offspring
  alternatives:
  - a generation of righteousness
  - righteous descendants
  rationale: Offspring fits the singular collective sense and preserves the covenantal lineage emphasis.
- source_word: ዘርአ ቅዱሰ
  chosen: a holy seed
  alternatives:
  - holy offspring
  - consecrated seed
  rationale: Holy seed is a theologically loaded lineage term in Jewish tradition and should be retained.
- source_word: ተስዓተ ሱባዔ ዓመት
  chosen: nine weeks of years
  alternatives:
  - sixty-three years
  - nine heptads of years
  rationale: The source expresses age in Jubilees’ characteristic chronological idiom; the translation preserves that idiom rather than converting it.
- source_word: ኢያአምር አንስቲ
  chosen: I do not know a woman
  alternatives:
  - I have not known a woman
  - I have had no relations with a woman
  rationale: Know is the idiomatic biblical expression for sexual relations and preserves the register of the text.
- source_word: አገስስኩ ወአፈፃርኩ
  chosen: have I approached one
  alternatives:
  - have I drawn near
  - have I had dealings with one
  rationale: The paired verbs likely intensify sexual abstinence; approached one gives a natural English rendering without flattening the emphasis.
- source_word: አንበርኩ ልብየ
  chosen: I have set my heart
  alternatives:
  - I fixed my mind
  - I resolved
  rationale: This preserves the idiomatic inner resolve expressed by the Ge'ez.
- source_word: ተዐቀብኩ በመንፈስየ
  chosen: I have guarded my spirit
  alternatives:
  - I have kept watch over myself
  - I have guarded my heart
  rationale: Spirit should be retained because Jubilees often frames moral discipline in terms of the inner spirit, not merely behavior.
- source_word: ኢየአብስ ወኢይማስን
  chosen: might not sin and might not be corrupted
  alternatives:
  - might not transgress and be defiled
  - might not err and be ruined
  rationale: This pairing conveys both moral offense and resulting corruption; the chosen rendering preserves both aspects.
- source_word: ይትኃአዘኒ
  chosen: has pressed me
  alternatives:
  - has harassed me
  - has urged me strongly
  rationale: Pressed conveys persistent pressure from Esau without overstating violence.
- source_word: በርትዕ
  chosen: in uprightness
  alternatives:
  - uprightly
  - in righteousness
  rationale: Uprightness fits the ethical context and avoids overloading the line with repeated righteousness language already present elsewhere.
theological_decisions:
- issue: Marriage with Canaanites framed as moral-ritual corruption rather than mere ethnic preference
  chosen_reading: Rendered the denunciation in terms of unclean conduct, fornication, impurity, and absence of righteousness.
  alternative_readings:
  - A softer social distinction about foreign marriage
  - A purely genealogical concern
  rationale: The Ge'ez emphasizes moral and purity categories, consistent with Jubilees’ theology of holy seed and boundary maintenance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Chronological idiom for Jacob’s age
  chosen_reading: Kept 'nine weeks of years' in the main text rather than converting to a simple age number.
  alternative_readings:
  - sixty-three years old
  rationale: Jubilees’ revelatory chronology is a major literary-theological feature and should remain visible in translation.
  doctrine_reference: Preserve calendrical terminology carefully; do not flatten Jubilees’ chronology language.
- issue: Lineage language in Rebekah’s blessing
  chosen_reading: Translated as 'a righteous offspring and a holy seed.'
  alternative_readings:
  - righteous descendants and a consecrated family
  - a just generation and sacred posterity
  rationale: The phrase carries covenantal and purity-theological weight in Jubilees and should remain close to the source idiom.
  doctrine_reference: Consistency of key terms, or documented exception.
