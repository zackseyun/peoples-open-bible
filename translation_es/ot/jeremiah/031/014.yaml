translation:
  language: es
  text: Saciaré a los sacerdotes con abundancia[a][b], y mi pueblo se saciará con mi bondad[c] —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “el alma de los sacerdotes”, con un sentido idiomático de la persona interior o el apetito plenamente saciado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “con gordura”, es decir, con rica abundancia o provisión abundante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: “con mi abundancia” o “con mis bienes”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרִוֵּיתִי
  english_pob_choice: I will satisfy
  chosen_spanish: saciaré
  alternatives_spanish:
  - llenaré
  - empaparé
  - refrescaré
  lexicon: HALOT
  rationale: El piel de רוה expresa hacer beber hasta quedar colmado, por lo que en español 'saciaré' comunica bien la idea de llenura plena y suena natural en el contexto de provisión abundante.
- source_word: נֶפֶשׁ
  english_pob_choice: the priests
  chosen_spanish: el alma de los sacerdotes
  alternatives_spanish:
  - la vida de los sacerdotes
  - el apetito de los sacerdotes
  - los sacerdotes
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona idiomáticamente para la persona interior, el apetito o la vida. En español, 'el alma de los sacerdotes' conserva la imagen más de cerca que simplemente omitirla, y el sentido de plena satisfacción sigue siendo claro.
- source_word: דָּשֶׁן
  english_pob_choice: with abundance
  chosen_spanish: con abundancia
  alternatives_spanish:
  - con gordura
  - con riqueza
  - con rico alimento
  lexicon: HALOT
  rationale: דָּשֶׁן alude a gordura/rico contenido y, por extensión, a abundancia. 'Con abundancia' comunica la idea sin una expresión extraña en español moderno, aunque mantiene el matiz de provisión generosa.
- source_word: וְעַמִּי
  english_pob_choice: and my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo de
  lexicon: HALOT
  rationale: El possessivo de pacto se expresa de forma directa con 'mi pueblo', que reproduce el vínculo relacional del hebreo.
- source_word: אֶת־טוּבִי
  english_pob_choice: with my goodness
  chosen_spanish: con mi bondad
  alternatives_spanish:
  - con mi bondad generosa
  - con mis bienes
  - con mi bien
  lexicon: HALOT
  rationale: טוּב puede significar bondad, bienestar o bienes buenos/provision. 'Bondad' preserva el aspecto de benevolencia divina y puede abarcar también la provisión que sigue en el paralelismo.
- source_word: יִשְׂבָּעוּ
  english_pob_choice: will be filled
  chosen_spanish: se saciará
  alternatives_spanish:
  - quedará satisfecho
  - tendrá su llenura
  - se llenará
  lexicon: HALOT
  rationale: El verbo significa quedar satisfecho/saciado. 'Se saciará' es fiel y natural en español; aunque singulariza al sujeto colectivo, eso es idiomático en español con 'mi pueblo'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto, 'Yahvé', y la fórmula profética se traduce con 'declara', equivalente formal y natural de נְאֻם.
theological_decisions:
- issue: Tratamiento del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה, conservando el nombre divino como 'Yahvé' en vez de una sustitución reverencial que ocultaría el dato del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de טוּבִי en el paralelismo
  english_pob_reading: my goodness / my bounty / my good things
  chosen_spanish_reading: mi bondad
  alternative_spanish_readings:
  - mi bien
  - mi abundancia
  - mis bienes
  rationale: La línea hebrea permite una lectura abstracta de benevolencia y otra concreta de provisión. 'Mi bondad' mantiene esa tensión sin reducirla solo a bienes materiales, mientras que el contexto de saciedad sostiene la dimensión de provisión.
  doctrine_reference: Jeremiah 31:14 lexical-theological context
translation_notes:
  revision_awareness: 'El pasaje muestra alta convergencia entre el texto hebreo y la auditoría inglesa: las decisiones principales se mantienen estables. La única tensión interpretativa relevante es טוּבִי, donde la versión inglesa deja abiertas varias posibilidades; en español se conserva con una nota la amplitud entre bondad y provisión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se traduce נְאֻם con 'declara' como fórmula profética.
  - Se conserva el paralelismo de dos miembros con una puntuación clara y lecturable.
  - Se mantiene la imagen de saciedad sin forzar un calco demasiado literal de 'fatness'.
