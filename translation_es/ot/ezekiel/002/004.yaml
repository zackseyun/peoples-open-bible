translation:
  language: es
  text: 'Y estos hijos son duros de rostro y duros de corazón[a]; yo te envío a ellos, y les dirás[b]: «Así dice el Señor Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «duros de rostro y fuertes de corazón», un modismo para personas descaradas y obstinadas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Así dice el Señor Dios». El hebreo usa el título compuesto אֲדֹנָי יְהוִה; aquí se traduce יְהוִה como «Yahvé» según la política del proyecto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַבָּנִים
  english_pob_choice: The children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los hijos de Israel
  - estos hijos
  lexicon: HALOT
  rationale: בָּנִים nombra literalmente a los varones/hijos, y el contexto colectivo permite un sustantivo plural masculino en español. «Los hijos» conserva el valor léxico sin convertirlo innecesariamente en una paráfrasis amplia.
- source_word: קְשֵׁי פָנִים
  english_pob_choice: hard-faced
  chosen_spanish: de rostro endurecido
  alternatives_spanish:
  - impúdicos
  - de rostro duro
  - descarados
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «duros de rostro» y apunta a descaro/impudicia/obstinación. «De rostro endurecido» mantiene la imagen corporal del hebreo y sugiere la misma dureza sin perder inteligibilidad en español.
- source_word: וְחִזְקֵי לֵב
  english_pob_choice: hard-hearted
  chosen_spanish: de corazón obstinado
  alternatives_spanish:
  - de corazón duro
  - de corazón fuerte
  - obstinados de corazón
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «fuertes de corazón», pero en este contexto profético el matiz es negativo: resistencia interior, terquedad. «De corazón obstinado» comunica esa fuerza interior desviada sin borrar la metáfora.'
- source_word: אֲנִי שׁוֹלֵחַ
  english_pob_choice: I am sending
  chosen_spanish: yo te envío
  alternatives_spanish:
  - yo estoy enviando
  - yo envío
  - yo te estoy enviando
  lexicon: HALOT
  rationale: El participio con pronombre expresa comisión inmediata. En español, el presente simple «te envío» suena natural y conserva la fuerza de encargo actual sin añadir perífrasis innecesaria.
- source_word: אוֹתְךָ אֲלֵיהֶם
  english_pob_choice: you to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - contra ellos
  - hacia ellos
  - a su presencia
  lexicon: HALOT
  rationale: אֶל + sufijo marca dirección hacia el destinatario de la misión. «A ellos» es la forma más directa y fiel en español.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: and you shall say to them
  chosen_spanish: y dirás a ellos
  alternatives_spanish:
  - y les dirás
  - y dirás a ellos
  - y habrás de decirles
  lexicon: HALOT
  rationale: El qatal en contexto de comisión tiene valor de mandato/futuro. «Dirás» preserva ese tono de instrucción profética. Se mantiene «a ellos» para reflejar la estructura del hebreo, aunque «les» sería más idiomático.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Así dice Yahvé
  - Esto dice
  lexicon: HALOT
  rationale: 'La fórmula profética se puede verter con solemnidad en pretérito perfecto: «Así ha dicho». Conserva el carácter de mensaje ya pronunciado/solemne, sin apartarse de la cadencia profética.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor YHWH
  - el Soberano Yahvé
  lexicon: HALOT
  rationale: La política del proyecto pide Yahvé para יְהוִה. En la combinación con אֲדֹנָי, «el Señor Yahvé» evita la redundancia de «Señor Señor» y preserva ambos elementos del título sin ocultar el nombre divino.
theological_decisions:
- issue: Título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El hebreo distingue el título de soberanía אֲדֹנָי del nombre pactual יְהוִה. En español, «el Señor Yahvé» deja visibles ambos componentes y sigue la convención del proyecto para YHWH, sin enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «sons» a «children» para reflejar mejor el sentido colectivo del hebreo; aquí se conservó una forma española masculina colectiva («los hijos») por ser fiel al sustantivo bíblico y natural en el registro profético. También se mantuvo la tensión idiomática de «rostro» y «corazón» en vez de reducirla a una mera abstracción.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוִה conforme a la política del proyecto.
  - Se evitó «siervo» porque no aparece δοῦλος ni equivalente en este versículo.
  - La fórmula profética se tradujo de manera solemnemente natural, sin depender del calco rígido del inglés.
  - Se conservaron las imágenes corporales del hebreo («rostro», «corazón») para no borrar la tensión lexical documentada.
