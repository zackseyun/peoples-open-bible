review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Moisés y los sacerdotes levitas hablan a todo Israel; se mantiene el imperativo doble y la segunda persona singular corporativa. También preserva correctamente Yahvé para יהוה. Sin embargo, falta una nota para la alternativa semántica de לַיהוָה / נִהְיֵיתָ לְעָם, que el rastro inglés conservó explícitamente como matiz de pertenencia (''belonging to'').'
  spanish_quality_summary: 'El español es claro y digno. No obstante, «Calla» suena algo brusco y menos natural en registro bíblico público que «Guarda silencio», que conserva mejor la fuerza concreta de הַסְכֵּת sin sonar áspero. Además, el anclaje de notas está desfasado respecto al contenido: [a] aparece en «Israel» pero la nota trata «sacerdotes levitas»; [b] aparece en «escucha» pero la nota corresponde a la primera orden. Conviene corregir esos anclajes y añadir la nota de pertenencia covenantal.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה → «Yahvé» correctamente; אֱלֹהֶיךָ → «tu Dios»; no hay conflictos terminológicos mayores. «Sacerdotes levitas» es aceptable para הַכֹּהֲנִים הַלְוִיִּם. La única carencia relevante es no preservar en nota la alternativa de pertenencia para «para Yahvé».'
  issues:
  - severity: medium
    issue: Los marcadores de notas no están colocados sobre las expresiones que comentan.
    rationale: En el texto, [a] está en «Israel» pero la nota explica «los sacerdotes levitas»; [b] está en «escucha» aunque la nota comenta el imperativo «Calla». Esto dificulta la trazabilidad y no cumple la disciplina requerida de anclar cada nota en la palabra o frase pertinente.
  - severity: medium
    issue: Falta la nota que preserve la alternativa semántica de pertenencia covenantal en la cláusula final.
    rationale: El rastro inglés incluye una nota para «you have become a people for Yahweh your God» con la alternativa «belonging to». En español, «para Yahvé» puede mantenerse, pero debe conservarse en nota la opción «un pueblo perteneciente a Yahvé tu Dios» o equivalente.
  - severity: low
    issue: «Calla» suena más brusco que el registro deseable y menos idiomático en este contexto litúrgico.
    rationale: Aunque es semánticamente posible, «Guarda silencio» comunica mejor הַסְכֵּת en español bíblico legible, manteniendo la fuerza concreta sin aspereza innecesaria.
  revised_spanish_text: 'Entonces Moisés y los sacerdotes levitas[a] hablaron a todo Israel, diciendo: «Guarda silencio[b] y escucha, Israel: hoy has llegado a ser un pueblo para Yahvé tu Dios[c]».'
  revised_footnotes:
