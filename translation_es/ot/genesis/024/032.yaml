revisions:
- from: Así que el hombre entró en la casa y desató[a] los camellos, y dio paja y forraje[b] a los camellos, y agua para lavar sus pies y los pies de los hombres que estaban con él.
  to: Así que el hombre entró en la casa y descargó[a] los camellos, y dio paja y forraje a los camellos, y agua para lavar sus pies y los pies de los hombres que estaban con él.
  rationale: Se cambia 'desató' por 'descargó' para alinearlo con la decisión lexical principal del POB y comunicar mejor el modismo hebreo en español natural. Se conserva la alternativa más literal en nota. Se elimina la nota b porque no es necesaria ni está respaldada por el rastro inglés.
  reviewer_model: gpt-5.4
