    text: O ‘príncipe’ o ‘gobernante’. El hebreo נָשִׂיא designa a un líder o jefe reconocido.
    reason: lexical_alternative
  - marker: b
    text: O ‘por error’ o ‘sin darse cuenta’. El hebreo se refiere a una falta no intencional.
    reason: lexical_alternative
  - marker: c
    text: O ‘incurre en culpa’. El hebreo marca el estado resultante de culpabilidad.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre שְׁגָגָה, se elimina el anglicismo de la nota [a], y se alisa una frase española poco natural manteniendo el sentido fuente y las decisiones léxicas auditadas. ‘Inadvertidamente’ ofrece un registro más digno y preciso para el contexto levítico.
