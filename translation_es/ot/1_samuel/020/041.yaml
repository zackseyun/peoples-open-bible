base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/041.yaml
  text: When the boy had come[a], David rose from beside the south side and fell with his face to the ground and bowed three times. Then they kissed one another and wept with one another[b], until David wept the more.
  footnotes:
  - marker: a
    text: Hebrew 'from beside the Negeb/south'; the phrase is difficult, and many understand it as referring to the mound or stone near David's hiding place in the immediate context.
    reason: alternative_reading
  - marker: b
    text: Or 'until David wept more,' that is, his weeping exceeded Jonathan's or grew more intense.
    reason: lexical_alternative
