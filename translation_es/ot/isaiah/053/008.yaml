translation:
  language: es
  text: Por opresión y juicio fue quitado; y en cuanto a su generación[a], ¿quién consideró[b] que fue cortado de la tierra de los vivientes, por la transgresión de mi pueblo fue herido[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Su generación'' puede referirse a sus contemporáneos, a sus descendientes o, más ampliamente, a su destino en vida.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''¿quién habló de?'', ''¿quién declaró?'' o ''¿quién meditó sobre?''; el verbo hebreo es raro y difícil.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''el golpe cayó sobre él''; el hebreo לָמוֹ es formalmente plural, pero puede funcionar aquí como singular poético. Algunos lo entienden como ''sobre ellos''.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעֹצֶר
  english_pob_choice: By oppression
  chosen_spanish: Por opresión
  alternatives_spanish:
  - Desde la detención
  - A causa de la opresión
  lexicon: HALOT
  rationale: עֹצֶר puede denotar restricción, detención o confinamiento opresivo. En este contexto, junto con מִמִּשְׁפָּט y seguido de 'fue quitado', 'por opresión' comunica bien el valor instrumental/circunstancial sin volverlo una paráfrasis amplia.
- source_word: וּמִמִּשְׁפָּט
  english_pob_choice: and judgment
  chosen_spanish: y juicio
  alternatives_spanish:
  - y justicia
  - y proceso legal
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia o decisión/proceso legal. 'Juicio' conserva el matiz jurídico del hebreo sin decidir en español si el proceso fue justo o injusto.
- source_word: לֻקָּח
  english_pob_choice: he was taken away
  chosen_spanish: fue quitado
  alternatives_spanish:
  - fue llevado
  - fue tomado
  lexicon: HALOT
  rationale: El pasivo de לקח aquí expresa remoción. 'Fue quitado' es natural en español y mantiene la idea de ser apartado o removido con fuerza.
- source_word: וְאֶת־דּוֹרוֹ
  english_pob_choice: and as for his generation
  chosen_spanish: y en cuanto a su generación
  alternatives_spanish:
  - y su generación
  - y respecto de su generación
  lexicon: HALOT
  rationale: La frase marcada con אֶת funciona de manera tópica. 'En cuanto a su generación' refleja esa colocación y deja abierta la referencia amplia de דּוֹר.
- source_word: מִי יְשׂוֹחֵחַ
  english_pob_choice: who considered
  chosen_spanish: ¿quién consideró?
  alternatives_spanish:
  - ¿quién habló de?
  - ¿quién declaró?
  - ¿quién meditó?
  lexicon: HALOT
  rationale: El verbo es raro y debatido. En esta pregunta retórica, 'consideró' expresa bien la idea de percibir/ponderar el sentido de lo ocurrido, como en la lectura inglesa principal, sin excluir las demás posibilidades.
- source_word: נִגְזַר
  english_pob_choice: he was cut off
  chosen_spanish: fue cortado
  alternatives_spanish:
  - fue separado
  - fue cortado de raíz
  - fue arrancado
  lexicon: HALOT
  rationale: נגזר en el nifal comunica ser cortado o seccionado. 'Fue cortado' sigue de cerca el hebreo y conserva la fuerza de la imagen en el contexto de muerte y separación de la vida.
- source_word: מֵאֶרֶץ חַיִּים
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de la tierra de los vivos
  - fuera de la tierra de los vivientes
  lexicon: HALOT
  rationale: Es un modismo hebreo para el ámbito de los que viven. 'Tierra de los vivientes' preserva la imagen con español natural y digno.
- source_word: מִפֶּשַׁע עַמִּי
  english_pob_choice: for the transgression of my people
  chosen_spanish: por la transgresión de mi pueblo
  alternatives_spanish:
  - a causa de la transgresión de mi pueblo
  - por la rebelión de mi pueblo
  lexicon: HALOT
  rationale: פֶּשַׁע es 'transgresión', 'rebelión' o 'delito'. 'Transgresión' mantiene el valor moral/jurídico más directo y sigue la elección auditable del inglés.
- source_word: נֶגַע
  english_pob_choice: stricken
  chosen_spanish: fue herido
  alternatives_spanish:
  - fue golpeado
  - fue afligido
  - fue herido con un azote
  lexicon: HALOT
  rationale: נֶגַע puede ser golpe, plaga o aflicción. En español, 'fue herido' comunica el padecimiento/smitering sin forzar una categoría médica o legal ajena al contexto poético.
- source_word: לָמוֹ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - sobre él
  - sobre ellos
  - a causa de
  lexicon: HALOT
  rationale: לָמוֹ es formalmente plural, pero aquí la línea puede leerse singularmente en referencia al siervo. 'Por' mantiene la relación causal sin resolver dogmáticamente la ambigüedad de número.
theological_decisions:
- issue: Sentido de לָמוֹ en el último miembro del verso
  english_pob_reading: 'Singular sense referring to the servant: ''stricken for the transgression of my people'''
  chosen_spanish_reading: 'Sentido singular referido al siervo: ''por la transgresión de mi pueblo fue herido'''
  alternative_spanish_readings:
  - fue herido sobre él
  - fue herido sobre ellos
  rationale: Aunque לָמוֹ es morfológicamente plural, en poesía hebrea puede funcionar como singular. En el contexto inmediato el siervo es singular, por lo que la lectura singular es la más coherente en el texto principal; la ambigüedad se preserva sin imponer una solución totalizante.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Alcance de דּוֹרוֹ en 'su generación'
  english_pob_reading: Retain the broad term 'generation' without specifying descendants or contemporaries
  chosen_spanish_reading: Retener 'generación' sin precisar contemporáneos o descendientes
  alternative_spanish_readings:
  - sus contemporáneos
  - sus descendientes
  - su destino en vida
  rationale: El hebreo permite varios sentidos relacionados. 'Generación' conserva el término amplio y deja abierta la tensión interpretativa documentada por la tradición auditada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la línea auditada en inglés, manteniendo las tensiones documentadas en דּוֹרוֹ y לָמוֹ sin resolverlas dogmáticamente; no se detectaron cambios necesarios respecto del último pase de revisión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este verso no lo contiene.
  - '''Mesías'' no corresponde aquí; no aparece en el hebreo de este versículo.'
  - Se prefirió 'transgresión' para פֶּשַׁע por su fuerza moral-jurídica.
  - '''Juicio'' traduce מִשְׁפָּט para conservar el campo legal sin explicitar injusticia en el texto principal.'
  - La puntuación española usa la coma y el punto y coma para reflejar la coordinación y el cambio de foco del hebreo.
