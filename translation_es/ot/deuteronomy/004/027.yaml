revisions:
- from: Y Yahvé los dispersará entre los pueblos[a], y quedarán en pequeño número entre las naciones adonde Yahvé los llevará.
  to: Y Yahvé los dispersará entre los pueblos, y serán pocos en número entre las naciones adonde Yahvé los expulsará[a].
  rationale: Se ajusta נהג al matiz coercitivo documentado por la auditoría inglesa, manteniendo la alternativa en nota. También se mejora la naturalidad y precisión de מתי מספר con 'serán pocos en número'. La distinción entre 'pueblos' y 'naciones' ya queda adecuadamente preservada en el texto sin necesidad de nota específica.
  reviewer_model: gpt-5.4
