translation:
  language: es
  text: y llegaron a estar por debajo y no por encima[a], porque pecamos contra Yahvé nuestro Dios al no escuchar su voz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo y no arriba»; el contraste espacial del griego también expresa un estado rebajado o humillado.
    reason: lexical_alternative
  - marker: b
    text: «Escuchar su voz» es un modismo bíblico que incluye el sentido de obedecerle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθησαν
  english_pob_choice: they became
  chosen_spanish: quedaron
  alternatives_spanish:
  - llegaron a ser
  - se volvieron
  lexicon: BDAG
  rationale: En este contexto de estado resultante, «quedaron» comunica bien la condición en que terminaron sin sonar rígido. Mantiene la idea de resultado de γίνομαι mejor que un simple «fueron».
- source_word: ὑποκάτω
  english_pob_choice: beneath
  chosen_spanish: por debajo
  alternatives_spanish:
  - debajo
  - bajo
  lexicon: LSJ
  rationale: La oposición espacial con ἐπάνω pide un término natural en español. «Por debajo» conserva el contraste de descenso/estatus inferior sin sobrecargar el verso.
- source_word: ἐπάνω
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - arriba
  - sobre
  lexicon: LSJ
  rationale: «Por encima» es el correlato natural de «por debajo» y preserva el contraste espacial y de estatus.
- source_word: ἡμάρτομεν
  english_pob_choice: we sinned
  chosen_spanish: pecamos
  alternatives_spanish:
  - hemos pecado
  - cometimos pecado
  lexicon: BDAG
  rationale: Es el equivalente más directo y bíblico en español, con la misma fuerza moral y teológica del verbo griego.
- source_word: Κυρίῳ θεῷ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - nuestro Dios, Yahvé
  lexicon: BDAG
  rationale: 'Se sigue el default del proyecto para יהוה/YHWH: «Yahvé». Aunque el griego dice κύριος, aquí la frase corresponde al nombre divino en el trasfondo bíblico; por eso no se oculta detrás de «Señor».'
- source_word: πρὸς τὸ μὴ ἀκούειν
  english_pob_choice: by not listening
  chosen_spanish: al no escuchar
  alternatives_spanish:
  - por no escuchar
  - sin escuchar
  lexicon: BDAG
  rationale: La construcción final expresa modo o causa concomitante. «Al no escuchar» fluye con naturalidad en español y conserva el valor de la frase verbal sin convertirla en una paráfrasis interpretativa.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su palabra
  - lo que decía
  lexicon: BDAG
  rationale: Se mantiene la literalidad de φωνή. En el contexto bíblico, «escuchar su voz» conserva el matiz de oír y obedecer sin sustituir el texto por una explicación.
theological_decisions:
- issue: Contraste espacial que también implica humillación o rebajamiento
  english_pob_reading: and they became beneath and not above
  chosen_spanish_reading: y quedaron por debajo y no por encima
  alternative_spanish_readings:
  - y quedaron abajo y no arriba
  - y fueron rebajados y no exaltados
  rationale: Se conserva el contraste del texto griego sin convertirlo en una explicación moral. En español, «por debajo / por encima» deja abierta la alusión a la condición humillada del pueblo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Ἀκούειν τῆς φωνῆς αὐτοῦ como idiom a de obediencia
  english_pob_reading: by not listening to his voice
  chosen_spanish_reading: al no escuchar su voz
  alternative_spanish_readings:
  - por no obedecerle
  - al no prestar oído a su voz
  rationale: El griego preserva la imagen de escuchar la voz; en la Biblia esa imagen implica obediencia. La redacción española mantiene la literalidad y deja al lector captar el sentido idiomático.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Uso del nombre divino en el trasfondo de κύριος
  english_pob_reading: the Lord our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - el Señor nuestro Dios
  - nuestro Dios, Yahvé
  rationale: Para un texto del Antiguo Testamento griego, el proyecto prioriza hacer visible el nombre divino cuando el trasfondo lo sustenta. Aquí la referencia a Dios como sujeto de la desobediencia apunta al nombre del pacto, no a un mero título.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete (LXX) y el audit trail inglés sin cambios adicionales; la decisión principal fue hacer explícito Yahvé según la terminología del proyecto y conservar el modismo bíblico de escuchar la voz en español.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre contraste espacial y explicación teológica, dejando la humillación implícita en el texto.
  - 'Se preservó el lenguaje bíblico directo: pecar contra Yahvé nuestro Dios, al no escuchar su voz.'
  - No se sustituyó 'voz' por 'palabra' o 'mandato' para no borrar el idiomatismo del original.
