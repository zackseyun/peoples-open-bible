translation:
  language: es
  text: Después de haber engendrado a Jared, Mahalalel vivió ochocientos treinta años y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En esta fórmula genealógica, חיה indica la continuación de la vida después del nacimiento del hijo nombrado. «Vivió» es la equivalencia natural en español y conserva el valor temporal de la cláusula.
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran. «Mahalalel» sigue la forma estándar en español y evita una adaptación innecesaria.
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Tras
  - Luego de
  lexicon: HALOT
  rationale: La preposición temporal expresa el período posterior al engendramiento de Jared. «Después de» es clara y fiel al orden temporal del hebreo.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - engendrarlo
  - haberlo engendrado
  - ser su padre
  lexicon: HALOT
  rationale: El hifil de ילד con sujeto masculino significa «engendrar / ser padre de». En español, «haber engendrado» funciona bien con la construcción temporal y evita una paráfrasis demasiado libre.
- source_word: יֶרֶד
  english_pob_choice: Jared
  chosen_spanish: Jared
  alternatives_spanish:
  - Jered
  lexicon: convención onomástica
  rationale: Se sigue la transliteración habitual del nombre propio en español.
- source_word: שְׁלֹשִׁים שָׁנָה וּשְׁמֹנֶה מֵאֹת שָׁנָה
  english_pob_choice: eight hundred and thirty years
  chosen_spanish: ochocientos treinta años
  alternatives_spanish:
  - treinta años y ochocientos años
  - ochocientos y treinta años
  lexicon: HALOT
  rationale: El hebreo presenta la cifra con el orden «treinta años y ochocientas años»; en español idiomático se expresa como el total «ochocientos treinta años», conservando el sentido exacto.
- source_word: וַיּוֹלֶד
  english_pob_choice: and fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y engendró hijos
  - y tuvo
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal que en la primera cláusula genealógica. «Engendró» refleja con precisión el valor genealógico del verbo y conserva la repetición del hebreo.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre descendencia masculina y femenina. «Hijos e hijas» preserva esa distinción en un español natural y público.
translation_notes:
  revision_awareness: El pasaje coincide con el contenido del testimonio inglés auditado y no presenta variantes textuales o decisiones revisionales adicionales en el paquete actual. La solución española conserva la estructura genealógica, la repetición verbal de ילד y la especificidad de «hijos e hijas».
  spanish_consistency_notes:
  - Se usa un estilo genealógico sobrio y directo, sin añadir información inferida.
  - Se evita «SEÑOR» u otras fórmulas no pertinentes porque el versículo no contiene el nombre divino.
  - Se preserva la distinción verbal entre el primer «vivió» y el posterior «engendró».
