translation:
  language: es
  text: Mi boca hablará sabiduría[a], y la meditación de mi corazón será de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los plurales hebreos «sabidurías» y «entendimientos» probablemente funcionan aquí como sustantivos abstractos; por eso se traduce «sabiduría» y «entendimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi hablar
  - mi palabra
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta de la boca como órgano del habla. En español, «mi boca» es natural y sigue de cerca la metáfora hebrea sin volverla abstracta.
- source_word: יְדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - hablará con
  - dirá
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto declarativo se entiende bien como futuro. «Hablará» mantiene la intención de discurso verbal del salmista con un registro claro y natural.
- source_word: חָכְמוֹת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - saberes
  - cosas sabias
  - sabidurías
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural formal, el valor probable es abstracto; por eso se traduce con el singular español «sabiduría», que comunica mejor el sentido y preserva el paralelismo sapiencial.
- source_word: וְהָגוּת
  english_pob_choice: the meditation
  chosen_spanish: la meditación
  alternatives_spanish:
  - la reflexión
  - la meditación interior
  - el pensar
  lexicon: HALOT
  rationale: El sustantivo apunta a actividad interior de meditar o rumiar. «La meditación» conserva ese matiz contemplativo y encaja con el paralelismo entre boca y corazón.
- source_word: לִבִּי
  english_pob_choice: of my heart
  chosen_spanish: de mi corazón
  alternatives_spanish:
  - de mi interior
  - de mi mente
  lexicon: HALOT
  rationale: Se mantiene la relación genitiva directa y el sentido bíblico de «corazón» como centro interior del pensamiento, no solo como emoción.
- source_word: תְבוּנוֹת
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  - entendimientos
  lexicon: HALOT
  rationale: Como en el caso de «wisdom», el plural formal hebreo probablemente funciona de modo abstracto. «Entendimiento» es el equivalente español más natural y conserva el campo sapiencial del verso.
translation_notes:
  revision_awareness: 'Coincide con el texto hebreo y con el audit trail inglés: se preservan los plurales abstractos del hebreo mediante singulares naturales en español, sin perder el paralelismo entre boca/corazón y sabiduría/entendimiento.'
  spanish_consistency_notes:
  - Se mantuvo «corazón» como centro interior de pensamiento, en continuidad con el uso bíblico y con la decisión inglesa de no convertirlo en mera emoción.
  - Se evitó «sabidurías/entendimientos» en el cuerpo principal porque en español suenan marcados y menos idiomáticos en este paralelismo sapiencial.
  - La puntuación con coma antes de la segunda cláusula refleja la coordinación paralela del hebreo.
