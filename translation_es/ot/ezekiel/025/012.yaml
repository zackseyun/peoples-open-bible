translation:
  language: es
  text: 'Así dice el Señor Dios Yahvé: Porque Edom actuó vengativamente[a] contra la casa de Judá, e incurrió en gran culpa[b], y se vengó de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «con venganza, venganza»; es una expresión enfática para actuar con espíritu vengativo o tomar venganza de manera plena.
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «y se hizo muy culpable» o «y fue hallado muy culpable». El hebreo usa una expresión enfática de culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: DOCTRINE.md; uso contextual del Tetragrámaton
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino יְהוִה. En español, «el Señor Yahvé» conserva ambos elementos sin ocultar el nombre propio divino y mantiene el registro solemne del encabezado profético.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio. «Porque» expresa con claridad la relación causal en español moderno y conserva el valor explicativo del hebreo.
- source_word: עֲשׂוֹת
  english_pob_choice: acted
  chosen_spanish: actuó
  alternatives_spanish:
  - hizo
  - obró
  lexicon: HALOT
  rationale: La construcción idiomática con la frase siguiente pide un verbo natural en español. «Actuó» transmite acción deliberada sin añadir contenido ajeno.
- source_word: בִּנְקֹם נָקָם
  english_pob_choice: acted vengefully / in vengeance
  chosen_spanish: con venganza
  alternatives_spanish:
  - vengativamente
  - tomando venganza
  lexicon: HALOT
  rationale: La expresión hebrea es enfática por la repetición de la raíz. «Con venganza» preserva el sentido intenso y deja visible la fuerza del original; la alternativa «vengativamente» sería más idiomática pero menos cercana al sustantivo repetido.
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: against the house of Judah
  chosen_spanish: contra la casa de Judá
  alternatives_spanish:
  - contra la casa de Judá
  - contra la casa de Judá
  lexicon: HALOT
  rationale: «Casa de Judá» mantiene la designación nacional/covenantal. «Contra» explicita la hostilidad implícita en el contexto de represalia.
- source_word: וַיֶּאְשְׁמ֥וּ אָשׁ֖וֹם
  english_pob_choice: incurred grievous guilt
  chosen_spanish: incurrió en gran culpa
  alternatives_spanish:
  - se hizo muy culpable
  - cargó con gran culpa
  lexicon: HALOT
  rationale: El hebreo usa un verbo con intensificación cognada para expresar culpa grave. «Incurrió en gran culpa» conserva la idea de responsabilidad/culpabilidad sin suavizarla ni convertirla en mera emoción.
- source_word: וְנִקְּמ֥וּ בָ/הֶם
  english_pob_choice: and took vengeance on them
  chosen_spanish: y se vengó de ellos
  alternatives_spanish:
  - y tomó venganza de ellos
  - y ejerció venganza sobre ellos
  lexicon: HALOT
  rationale: El verbo refleja retaliación. «Se vengó de ellos» es la forma más natural en español y mantiene la correspondencia con el motivo de venganza repetido en el versículo.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La política del proyecto pide renderizar יְהוָה como «Yahvé» en el texto principal. En esta combinación fija, el español necesita un título compuesto que preserve la solemnidad y el nombre divino sin duplicar «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés: se prefirió una formulación más natural para la acción vengativa y una expresión que refleje la intensidad de la culpa sin perder el tono formal. En español se conservó esa misma lógica, pero adaptada a una sintaxis fluida y auditable.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente del nombre divino según la convención del proyecto.
  - «Casa de Judá» se conservó como designación colectiva y no se redujo a un simple «Judá» para no perder el matiz corporativo.
  - La duplicación enfática de la raíz de venganza quedó representada en la nota, aunque el texto principal opta por una solución idiomática.
  - «Gran culpa» refleja la intensidad del hebreo sin introducir una interpretación doctrinal adicional.
