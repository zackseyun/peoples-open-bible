translation:
  language: es
  text: 'Asiria no nos salvará; no montaremos en caballos, y ya no diremos: «Nuestro Dios», a la obra de nuestras manos. En ti el huérfano de padre[a] encuentra misericordia[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el huérfano». El término hebreo literalmente denota a quien no tiene padre y a menudo se refiere más ampliamente al vulnerable.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede leerse: «Porque en ti el huérfano de padre encuentra misericordia». El hebreo permite un valor explicativo o causal.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  lexicon: HALOT
  rationale: Es un nombre propio nacional; en español bíblico y moderno, «Asiria» es la forma transparente y natural para el imperio al que se rechaza confiar la salvación.
- source_word: יוֹשִׁיעֵנוּ
  english_pob_choice: will not save us
  chosen_spanish: no nos salvará
  alternatives_spanish:
  - no nos librará
  - no podrá salvarnos
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa salvar/liberar. «Salvar» conserva el peso teológico del verbo y encaja con la negación de la confianza política.
- source_word: עַל סוּס לֹא נִרְכָּב
  english_pob_choice: we will not ride on horses
  chosen_spanish: no montaremos en caballos
  alternatives_spanish:
  - no cabalgaremos en caballos
  - no iremos sobre caballos
  lexicon: HALOT
  rationale: La imagen renuncia al apoyo militar. En español, «montar en caballos» suena más natural que un calco rígido, sin perder la referencia a la caballería y la autosuficiencia bélica.
- source_word: וְלֹא נֹאמַר עוֹד
  english_pob_choice: and we will no longer say
  chosen_spanish: y ya no diremos
  alternatives_spanish:
  - y no diremos más
  - ni diremos ya
  lexicon: HALOT
  rationale: «Ya no» transmite bien la cesación desde este punto en adelante que aporta עוֹד.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: Our God
  chosen_spanish: Nuestro Dios
  alternatives_spanish:
  - nuestro dios
  lexicon: HALOT
  rationale: Aunque el contexto es idolátrico, el giro cita la fórmula de confesión errónea. En español, la mayúscula en «Dios» mantiene el valor de título divino que el texto pone en boca del pueblo, tal como la audición inglesa conserva «Our God».
- source_word: לְמַעֲשֵׂה יָדֵינוּ
  english_pob_choice: to the work of our hands
  chosen_spanish: a la obra de nuestras manos
  alternatives_spanish:
  - al trabajo de nuestras manos
  - a la hechura de nuestras manos
  lexicon: HALOT
  rationale: «Obra de nuestras manos» es la expresión bíblica más natural en español para ídolos; conserva la fuerza de fabricación humana sin explicitar de más.
- source_word: יְרֻחַם
  english_pob_choice: finds mercy
  chosen_spanish: encuentra misericordia
  alternatives_spanish:
  - recibe misericordia
  - se le muestra misericordia
  lexicon: HALOT
  rationale: El pasivo de רחם admite una idea de recibir misericordia. «Encuentra misericordia» sigue la solución inglesa idiomática y mantiene la apertura poética sin forzar una paráfrasis causal.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el huérfano de padre
  lexicon: HALOT
  rationale: El inglés optó por «fatherless» con nota de posible sentido más amplio. En español, «huérfano» comunica de inmediato la idea básica y puede abarcar el matiz de vulnerabilidad; la nota preserva la alternativa semántica.
theological_decisions:
- issue: Cómo rendir la relación final entre la cláusula relativa y la misericordia
  english_pob_reading: 'Rendered as a separate sentence: ''In you the fatherless finds mercy.'''
  chosen_spanish_reading: «En ti el huérfano encuentra misericordia.»
  alternative_spanish_readings:
  - «Porque en ti el huérfano encuentra misericordia.»
  - «En ti se muestra misericordia al huérfano.»
  rationale: El hebreo permite leer la cláusula como explicación o fundamento. La redacción elegida conserva la ambigüedad sin introducir una conjunción causal explícita que estreche el sentido.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla
- issue: Si el término final debe leerse literalmente o de modo metafórico
  english_pob_reading: Kept the concrete term 'the fatherless' without interpretive expansion.
  chosen_spanish_reading: Se mantiene «el huérfano» sin expansión interpretativa.
  alternative_spanish_readings:
  - «el huérfano»
  - «el huérfano, es decir, el vulnerable»
  rationale: El texto nombra concretamente al huérfano, pero en el marco profético puede abarcar la condición de Israel sin protección. La traducción no cierra esa amplitud.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios; el borrador español sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la negación de alianzas militares, la fórmula idolátrica y la cláusula final con su ambigüedad explicativa.
  spanish_consistency_notes:
  - Se usó «Asiria» para el nombre propio nacional, de acuerdo con el uso bíblico corriente en español.
  - Se evitó «SEÑOR» porque el hebreo aquí no presenta el tetragrámaton; el término es אֱלֹהֵינוּ dentro de una cita idolátrica.
  - «Misericordia» se emplea para יְרֻחַם siguiendo el valor pasivo de recibir compasión, no como simple sentimiento humano.
  - La mayúscula en «Dios» refleja la forma de cita de un título divino, aunque el contexto denuncia una confesión falsa.
  - «El huérfano» mantiene la concreción del término y, con la nota, deja abierta su amplitud semántica.
