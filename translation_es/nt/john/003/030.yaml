translation:
  language: es
  text: Él debe crecer[a], pero yo debo disminuir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Aquel debe crecer, pero yo debo hacerme menos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνον
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Ese
  - Aquel
  - Aquél
  lexicon: BDAG
  rationale: 'El demostrativo acusativo funciona como sujeto lógico del infinitivo con δεῖ. En español idiomático corresponde un pronombre de tercera persona en nominativo: «Él». Mantiene la referencia a Jesús sin añadir un sustantivo innecesario.'
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario que
  - tiene que
  - conviene que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad o inevitabilidad. «Debe» conserva esa fuerza con naturalidad en español y evita explicitar más de lo que el verso dice sobre el tipo de necesidad.
- source_word: αὐξάνειν
  english_pob_choice: increase
  chosen_spanish: crecer
  alternatives_spanish:
  - aumentar
  - incrementarse
  - hacerse mayor
  lexicon: BDAG
  rationale: El infinitivo presente expresa aumento continuo. «Crecer» es una forma natural en español para el aumento de prominencia o influencia de Jesús, sin limitarlo a crecimiento numérico.
- source_word: ἐμὲ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - mí
  lexicon: BDAG
  rationale: 'Como el acusativo funciona aquí como sujeto lógico del infinitivo, en español se expresa con el pronombre en forma de sujeto: «yo».'
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mientras
  lexicon: BDAG
  rationale: δὲ introduce contraste entre el aumento de Jesús y la disminución de Juan. «Pero» transmite bien ese matiz adversativo en español.
- source_word: ἐλαττοῦσθαι
  english_pob_choice: decrease
  chosen_spanish: disminuir
  alternatives_spanish:
  - hacerse menos
  - decrecer
  - reducirse
  lexicon: BDAG
  rationale: El infinitivo presente medio/pasivo expresa volverse menor o disminuir. «Disminuir» conserva la brevedad y el paralelismo con «crecer».
theological_decisions:
- issue: Necesidad expresada por δεῖ
  english_pob_reading: A statement of divinely fitting and necessary ordering in salvation history, rendered simply as 'must' without over-specifying the kind of necessity.
  chosen_spanish_reading: Una afirmación de necesidad u ordenamiento necesario en la historia de la salvación, renderizada simplemente con «debe» sin precisar más el tipo de necesidad.
  alternative_spanish_readings:
  - Es necesario que él crezca
  - Está decretado que él crezca
  rationale: El verso afirma la prioridad creciente de Jesús y la disminución de Juan. «Debe» preserva la fuerza teológica de necesidad sin resolverla demasiado ni introducir un matiz doctrinal que el griego no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje se mantiene estable, con alta concordancia entre revisores.
  spanish_consistency_notes:
  - Se mantiene la traducción de δεῖ con «debe» para conservar la necesidad sin sobreespecificación.
  - Se usa «crecer/disminuir» como pareja paralela natural en español, equivalente funcional de «increase/decrease».
  - No se introduce «Cristo» ni «Señor»; el referente sigue siendo Jesús en el contexto inmediato.
  - La nota textual/lexical conserva la alternativa más literal del demostrativo acusativo como sujeto lógico.
