translation:
  language: es
  text: El noveno día del mes, la hambruna se agravó en la ciudad, y no había pan[a] para el pueblo de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alimento», ya que «pan» puede funcionar en sentido más amplio como término de sustento.
    reason: lexical_alternative
  - marker: b
    text: «Pueblo de la tierra» también puede referirse en algunos contextos a la gente común o a la población local.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ
  english_pob_choice: On the ninth day of the month
  chosen_spanish: Al noveno día del mes
  alternatives_spanish:
  - El noveno día del mes
  - En el noveno día del mes
  lexicon: HALOT
  rationale: El hebreo expresa literalmente “en/para el nueve del mes”; en español conviene suplir “día” para evitar una frase dura o ambigua. “Al” refleja bien el valor temporal y mantiene naturalidad.
- source_word: וַיֶּחֱזַק
  english_pob_choice: became severe
  chosen_spanish: se agravó
  alternatives_spanish:
  - se hizo más fuerte
  - se intensificó
  - prevaleció
  lexicon: HALOT
  rationale: Con “el hambre” como sujeto, el verbo hebreo de fortalecerse se entiende idiomáticamente como empeoramiento de la condición. “Se agravó” comunica el incremento de la severidad sin perder la fuerza del original.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre extrema
  lexicon: HALOT
  rationale: En español, “hambre” puede abarcar la idea de escasez de alimentos, pero “hambruna” suena más técnico y menos inmediato. Dado el contexto de sitio, “el hambre” conserva la amplitud semántica sin añadir precisión no explicitada en el hebreo.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: Correspondencia locativa directa y natural en español.
- source_word: וְלֹא הָיָה לֶחֶם
  english_pob_choice: and there was no bread
  chosen_spanish: y no había pan
  alternatives_spanish:
  - y no había comida
  - y no había alimento
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de לֶחֶם como “pan”, tal como la traducción inglesa conservó “bread”. En español, “pan” también puede funcionar como término básico de sustento y permite una lectura fiel con el sentido amplio implícito.
- source_word: לְעַם הָאָרֶץ
  english_pob_choice: for the people of the land
  chosen_spanish: para el pueblo de la tierra
  alternatives_spanish:
  - para la gente de la tierra
  - para el pueblo del país
  - para el común del pueblo
  lexicon: HALOT
  rationale: Se conserva la frase literal “pueblo de la tierra” como equivalente más directo de עַם הָאָרֶץ, evitando restringirla a “los comunes” o a una lectura sociológica que el verso por sí solo no exige. En español suena algo marcado, pero sigue siendo reconocible y auditable.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y la lectura hebrea: conserva la secuencia temporal, el aumento de intensidad del hambre, la localización en la ciudad y la imagen concreta de “pan”, con una nota para su posible sentido amplio de alimento. No se aplicaron revisiones posteriores al texto base inglés; el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefiere “pan” por fidelidad a לֶחֶם, manteniendo abierta la lectura amplia de sustento.
  - “Pueblo de la tierra” se conserva literalmente para respetar la ambigüedad social del hebreo.
  - El tono es bíblico pero en español moderno y publicable, sin calco excesivo.
