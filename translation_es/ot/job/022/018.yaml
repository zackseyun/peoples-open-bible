translation:
  language: es
  text: Sin embargo, él llenó sus casas de cosas buenas[a], pero el consejo de los impíos está lejos de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos literalmente, «de prosperidad». El hebreo dice «de bien», probablemente con el sentido de cosas buenas, bienes o beneficios.
    reason: lexical_alternative
  - marker: b
    text: 'O, «que el consejo de los impíos esté lejos de mí». El hebreo, más directamente, presenta una afirmación: «el consejo de los impíos está lejos de mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: Yet he
  chosen_spanish: Sin embargo, él
  alternatives_spanish:
  - Y él
  - Pero él
  lexicon: HALOT
  rationale: La conjunción con pronombre introduce contraste. «Sin embargo» comunica mejor la fuerza adversativa en español que un simple «y», y conserva el sujeto explícito «él».
- source_word: מִלֵּא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - ha llenado
  - llena
  lexicon: HALOT
  rationale: El verbo expresa acción completa en pasado poético. «Llenó» es natural y fiel al valor verbal del hebreo.
- source_word: בָתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus viviendas
  lexicon: HALOT
  rationale: «Casas» conserva la imagen concreta del hebreo. En contexto puede referirse al ámbito de prosperidad de una familia, pero no es necesario explicitarlo en el texto principal.
- source_word: טוֹב
  english_pob_choice: with good things
  chosen_spanish: de bienes
  alternatives_spanish:
  - de cosas buenas
  - con prosperidad
  lexicon: HALOT
  rationale: El hebreo usa «bien/good» en sentido sustantivo. En español, «de bienes» comunica de forma sobria la provisión favorable sin endurecer la frase con un calco.
- source_word: וַעֲצַת
  english_pob_choice: but the counsel
  chosen_spanish: pero el consejo
  alternatives_spanish:
  - y el consejo
  - pero el plan
  lexicon: HALOT
  rationale: «Consejo» es el equivalente directo de עֵצָה y se ajusta al contraste del segundo miembro. Se mantiene la oposición adversativa que el POB inglés marcó.
- source_word: רְשָׁעִים
  english_pob_choice: of the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los perversos
  lexicon: HALOT
  rationale: «Impíos» es un término bíblico claro y digno en español, equivalente al sustantivo/adjetivo plural sustantivado del hebreo.
- source_word: רָחֲקָה מֶנִּי
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - queda lejos de mí
  - está apartado de mí
  lexicon: HALOT
  rationale: El hebreo describe distancia/alejamiento como afirmación, no como imperativo. «Está lejos de mí» preserva ese sentido declarativo y evita convertirlo en oración o deseo.
theological_decisions:
- issue: 'Lectura del segundo hemistiquio: declaración o petición'
  english_pob_reading: The counsel of the wicked is far from me, not 'let it be far from me.'
  chosen_spanish_reading: «El consejo de los impíos está lejos de mí», como declaración de distanciamiento.
  alternative_spanish_readings:
  - «Que el consejo de los impíos esté lejos de mí»
  rationale: El qatal hebreo sostiene una afirmación de alejamiento, y el POB inglés decidió no volverla exhortación. La traducción conserva esa tensión y no la resuelve devocionalmente.
  doctrine_reference: Preservar la ambigüedad y el sentido gramatical del texto fuente; no imponer una lectura litúrgica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que sustituyó el guion por una coma por puntuación más natural; en español se optó por una coma ante la coordinación adversativa. También se respetó la decisión auditada de no convertir el final en una oración desiderativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta línea solo si el contexto lo exigiera; aquí el versículo no lo contiene explícitamente, por lo que no se introduce.
  - Se evita «SEÑOR» como convención de enmascaramiento, siguiendo la política del proyecto cuando el nombre divino no aparece en el verso.
  - «Impíos» y «consejo» conservan el registro bíblico sin sustituirlo por formulaciones eclesiásticas más libres.
  - La puntuación refleja una estructura de dos miembros contrastivos con coma antes de «pero».
