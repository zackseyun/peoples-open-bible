translation:
  language: es
  text: Y ahora[a], mi padre hizo pesado el yugo de ustedes, pero yo añadiré al yugo de ustedes. Mi padre los disciplinó con látigos, pero yo los disciplinaré con escorpiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «con látigos de escorpiones», es decir, látigos o azotes diseñados para ser más dolorosos; el hebreo dice literalmente «con escorpiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעְמִיס
  english_pob_choice: made ... heavy
  chosen_spanish: hizo pesado
  alternatives_spanish:
  - cargó
  - volvió pesado
  - hizo gravoso
  lexicon: HALOT
  rationale: El verbo causativo comunica imponer una carga; en español, «hizo pesado» preserva la metáfora del yugo sin volverla tosca. «Cargó» podría sonar menos directo respecto del estado resultante del yugo.
- source_word: עֹל / עֻלְּכֶם
  english_pob_choice: yoke
  chosen_spanish: yugo / su yugo
  alternatives_spanish:
  - carga
  - opresión
  - sobrecarga
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de gobierno opresivo. «Yugo» conserva la repetición retórica del hebreo y evita desdibujar el símbolo en un abstracto como «opresión».
- source_word: כָּבֵד
  english_pob_choice: heavy
  chosen_spanish: pesado
  alternatives_spanish:
  - duro
  - gravoso
  - severo
  lexicon: HALOT
  rationale: El adjetivo literalmente es «pesado». En español, «pesado» encaja naturalmente con «yugo» y preserva la imagen física del peso.
- source_word: אוֹסִיף עַל
  english_pob_choice: I will add to
  chosen_spanish: añadiré a
  alternatives_spanish:
  - incrementaré
  - aumentaré
  - haré más pesado
  lexicon: HALOT
  rationale: La construcción expresa añadir o aumentar sobre algo ya existente. «Añadiré a su yugo» sigue de cerca la estructura hebrea y deja claro el aumento de severidad por el contexto.
- source_word: יִסַּר / אֲיַסֵּר
  english_pob_choice: disciplined / will discipline
  chosen_spanish: disciplinó / disciplinaré
  alternatives_spanish:
  - castigó / castigaré
  - corrigió / corregiré
  - reprendió / reprenderé
  lexicon: HALOT
  rationale: «Disciplinar» conserva el campo semántico de corrección/castigo y evita precisar indebidamente el tipo de sanción. En este contexto político de amenaza, sigue siendo suficientemente natural en español.
- source_word: בַּשּׁוֹטִים
  english_pob_choice: with whips
  chosen_spanish: con látigos
  alternatives_spanish:
  - con azotes
  - con rebenques
  lexicon: HALOT
  rationale: «שׁוֹט» puede referirse a látigo o azote. «Látigos» es claro y común en español contemporáneo; «azotes» podría sonar más a la acción que al instrumento.
- source_word: בָּעַקְרַבִּים
  english_pob_choice: with scorpions
  chosen_spanish: con escorpiones
  alternatives_spanish:
  - con alacranes
  - con látigos de escorpiones
  - con látigos con puntas de escorpión
  lexicon: HALOT
  rationale: Se conserva la imagen literal del hebreo, como hace el texto fuente. Dado que el inglés POB ya documenta la posible lectura figurada de instrumentos más dolorosos, el español mantiene la literalidad en el texto principal.
translation_notes:
  revision_awareness: Se siguió la lectura del texto hebreo masorético sin cambios textuales relevantes; el estado de revisión del expediente inglés indica que no hubo modificaciones aplicadas y que la coincidencia general es alta.
  spanish_consistency_notes:
  - Se conserva el paralelismo retórico de «mi padre ... pero yo ...» para reflejar el contraste del hebreo.
  - Se mantiene «yugo» de forma consistente para עֹל / עֻלְּכֶם, evitando alternar con sinónimos que debiliten la repetición.
  - «Escorpiones» queda en el texto principal, con nota de alternativa figurada para reflejar la ambigüedad documentada por la POB inglesa.
  - La puntuación y el orden de cláusulas buscan sonar naturales en español sin perder la estructura paralela del original.
