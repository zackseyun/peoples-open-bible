    text: 'O, de manera más idiomática, «vivió hasta ver a sus hijos y a sus nietos». El hebreo dice más literalmente: «vio a sus hijos y a los hijos de sus hijos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal a la decisión final auditada del POB inglés, usando la forma idiomática española «sus nietos» en lugar de la literal «los hijos de sus hijos». Se conserva «vio» en el texto principal por fidelidad al hebreo, y la nota al pie preserva tanto la alternativa idiomática «vivió hasta ver» como la formulación más literal del original hebreo.
