review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura final de propósito del hebreo y preserva las tres designaciones pactales distintas: «tus escogidos», «tu nación» y «tu heredad». También mantiene correctamente «ver», «en la alegría de» y «con». Sin embargo, «a fin de ver» suena algo rígido en español bíblico natural, y «alegrarme en la alegría» resulta menos idiomático que una formulación con «gozo», aunque el sentido básico sí está bien preservado.'
  spanish_quality_summary: La redacción es mayormente fiel y comprensible, con buen registro formal. No obstante, «a fin de ver» tiene tono algo mecánico, y «alegrarme en la alegría» suena pesado por la repetición. Una leve revisión mejora la naturalidad sin apartarse del hebreo ni del rastro auditado del POB inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Escogidos» refleja bien בְּחִירֶיךָ; «nación» respeta גּוֹי mejor que «pueblo» en el texto principal; «heredad» es una opción válida y teológicamente resonante para נַחֲלָתֶךָ. No se requieren notas nuevas, ya que el español no introduce ambigüedad adicional y las alternativas inglesas no exigen preservación obligatoria aquí.
  issues:
  - severity: medium
    issue: «a fin de ver» suena más forzado que necesario
    rationale: Aunque expresa finalidad correctamente, «para ver» es más natural y plenamente fiel al infinitivo con ל en esta secuencia de propósito.
  - severity: medium
    issue: «alegrarme en la alegría» es poco idiomático por repetición léxica
    rationale: La construcción reproduce el hebreo de forma demasiado literal para el español. «Gozarme en el gozo» o «regocijarme en el gozo» conserva la relación cognada con mejor dignidad y fluidez.
  revised_spanish_text: para ver el bien de tus escogidos, gozarme en el gozo de tu nación, y gloriarme con tu heredad.
  revision_rationale: 'Se hicieron dos ajustes menores de estilo para mejorar la naturalidad del español sin cambiar el sentido: «a fin de ver» pasó a «para ver», y «alegrarme en la alegría» a «gozarme en el gozo», preservando la estructura de finalidad y la cercanía al hebreo cognado.'
