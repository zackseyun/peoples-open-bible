translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «Si su padre le hubiera escupido en el rostro, ¿no quedaría deshonrada[a] por siete días? Que quede encerrada fuera del campamento por siete días[b], y después será readmitida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no quedaría avergonzada por siete días?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y después será reunida de nuevo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton con la forma adoptada por el proyecto en español. ‘Yahvé’ evita sustituir el nombre por un título y mantiene la transparencia auditabile del texto fuente.
- source_word: יָרֹק יָרַק
  english_pob_choice: had spit
  chosen_spanish: le hubiera escupido
  alternatives_spanish:
  - hubiera escupido
  - le escupiera
  lexicon: HALOT
  rationale: La secuencia hebrea intensiva expresa una acción hipotética contundente. En español, el pluscuamperfecto de subjuntivo en la prótasis conserva bien el valor irreal y la fuerza del insulto sin calcar mecánicamente la repetición verbal.
- source_word: בְּפָנֶיהָ
  english_pob_choice: in her face
  chosen_spanish: en el rostro
  alternatives_spanish:
  - en la cara
  - delante de ella
  lexicon: HALOT
  rationale: ‘En el rostro’ refleja el idiomatismo del acto de escupir y conserva la idea de afrenta pública. ‘Cara’ sería más coloquial; ‘delante de ella’ diluye demasiado la imagen.
- source_word: תִכָּלֵם
  english_pob_choice: would she not be disgraced
  chosen_spanish: ¿no quedaría avergonzada?
  alternatives_spanish:
  - ¿no sería deshonrada?
  - ¿no quedaría disgraciada?
  lexicon: HALOT
  rationale: El verbo apunta a quedar avergonzada o deshonrada. Se eligió una forma natural en español que preserve el efecto social de la humillación. ‘Disgraciada’ suena menos idiomático en español; ‘deshonrada’ desplaza un poco el matiz.
- source_word: תִּסָּגֵר
  english_pob_choice: Let her be shut up
  chosen_spanish: Que quede encerrada
  alternatives_spanish:
  - Que sea confinada
  - Que permanezca aislada
  lexicon: HALOT
  rationale: El pasivo/niphal indica reclusión o encierro. ‘Encerrada’ mantiene la concreción de la exclusión ritual y es comprensible en español bíblico contemporáneo.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del real
  lexicon: HALOT
  rationale: ‘Campamento’ es la equivalencia clara y estándar para el ámbito del desierto. Se evita ‘real’ por arcaizante y menos transparente para el lector moderno.
- source_word: תֵּאָסֵף
  english_pob_choice: she may be brought back in
  chosen_spanish: será traída de nuevo al campamento
  alternatives_spanish:
  - será reunida de nuevo
  - podrá volver a ser incorporada
  lexicon: HALOT
  rationale: El Niphal de אסף expresa ser reunida o traída de vuelta. La formulación elegida hace explícita la restauración comunitaria y conserva el movimiento de reingreso al campamento.
theological_decisions:
- issue: Naturaleza de la comparación del padre que escupe
  english_pob_reading: A hypothetical analogy for shame and exclusion
  chosen_spanish_reading: Una comparación hipotética para justificar la vergüenza y la exclusión ritual
  alternative_spanish_readings:
  - Una referencia a un hecho literal pasado
  - Una metáfora meramente ornamental
  rationale: El hebreo presenta una comparación retórica usada por Yahvé para explicar la pena de separación. La traducción conserva el carácter hipotético y disciplinario sin añadir simbolismos ajenos al texto.
  doctrine_reference: Números 12:14; cf. uso retórico de la vergüenza en contextos de pureza ritual
- issue: Matiz de תִכָּלֵם
  english_pob_reading: would she not be disgraced
  chosen_spanish_reading: ¿no quedaría avergonzada?
  alternative_spanish_readings:
  - ¿no sería deshonrada?
  - ¿no quedaría humillada?
  rationale: Se preserva la tensión entre vergüenza interna y deshonra social. ‘Avergonzada’ comunica bien el resultado visible del agravio; las alternativas quedan abiertas porque el hebreo puede abarcar ambos matices.
  doctrine_reference: HALOT s.v. כלם; contexto de exclusión comunitaria
- issue: Matiz de תֵּאָסֵף
  english_pob_reading: she may be brought back in
  chosen_spanish_reading: será traída de nuevo al campamento
  alternative_spanish_readings:
  - será reunida de nuevo
  - será recibida de nuevo
  rationale: El cierre del versículo apunta a restauración e incorporación tras el periodo de separación. ‘Traída de nuevo al campamento’ mantiene el pasivo hebreo y la concreción espacial.
  doctrine_reference: HALOT s.v. אסף; contexto de reintegración al campamento
translation_notes:
  revision_awareness: 'Se siguió la última revisión del POB inglés: la cláusula final pasó de una formulación más genérica de recepción a una más concreta de ‘ser traída de nuevo al campamento’. La versión española refleja esa concreción espacial con ‘será traída de nuevo al campamento’, manteniendo el pasivo hebreo de אסף.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como forma regular del nombre divino en el texto principal.
  - Se usa ‘campamento’ para מַחֲנֶה por consistencia con el marco narrativo del desierto.
  - Se mantiene ‘fuera del campamento’ como expresión fija de exclusión ritual.
  - Las notas al pie usan marcas únicas y están ancladas en el texto donde corresponde.
