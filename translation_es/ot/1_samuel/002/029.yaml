base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/029.yaml
  text: Why do you scorn my sacrifice and my offering[a], which I commanded for the dwelling, and honor your sons above me, fattening yourselves from the first of every offering of Israel[c][b], my people?
  footnotes:
  - marker: a
    text: Or 'kick at' or 'treat with contempt.' The Hebrew verb is vivid, literally suggesting a contemptuous kicking at what God commanded.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'which I commanded for/in the dwelling.' The final word may refer to the sanctuary as God's dwelling place.
    reason: alternative_reading
  - marker: c
    text: Or 'making yourselves fat' or 'feeding yourselves from the choicest part of every offering of Israel, my people.'
    reason: lexical_alternative
