translation:
  language: es
  text: Esplendor y majestad están delante de él; fuerza y gozo están en su lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su morada» o «en su santuario». El hebreo dice «en su lugar», una expresión más amplia que la redacción paralela de Salmo 96:6.
    reason: alternative_reading
lexical_decisions:
- source_word: ה֤וֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - gloria
  - majestad
  lexicon: HALOT
  rationale: הוֹד expresa magnificencia solemne o resplandor de rango; "esplendor" conserva esa idea y mantiene la pareja poética con הָדָר sin fusionar ambos términos en una sola noción.
- source_word: הָדָר
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - honor
  - belleza
  - gloria
  lexicon: HALOT
  rationale: En paralelismo poético, הָדָר suele comunicar dignidad regia o majestad. "Majestad" complementa "esplendor" y conserva el tono elevado del hebreo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La imagen es espacial-relacional, literalmente "ante su rostro". "Delante de él" suena natural en español y preserva esa relación sin volverlo artificioso.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - maleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, vigor o poder. "Fuerza" es claro y fiel en español, y funciona bien en el paralelismo con "gozo".
- source_word: חֶדְוָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: חֶדְוָה significa gozo o alegría. "Gozo" es breve, digno y poéticamente equivalente a "joy" en el contexto.
- source_word: בִּמְקֹמוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su morada
  - en su santuario
  lexicon: HALOT
  rationale: מָקוֹם significa "lugar" en sentido amplio. Se conserva la amplitud del hebreo con "en su lugar"; aunque el contexto litúrgico podría sugerir "morada" o "santuario", el texto hebreo no especifica ese matiz.
theological_decisions:
- issue: Si מְקוֹמוֹ debe entenderse específicamente como santuario o morada divina
  english_pob_reading: Rendered broadly as 'his place' with a footnote preserving 'dwelling place' and 'sanctuary' as contextual possibilities.
  chosen_spanish_reading: Traducido de manera amplia como "en su lugar", con nota que preserva "morada" y "santuario" como posibilidades contextuales.
  alternative_spanish_readings:
  - en su morada
  - en su santuario
  rationale: Aunque el contexto es de adoración y el paralelo de Salmo 96:6 menciona "su santuario", 1 Crónicas 16:27 usa deliberadamente מְקוֹמוֹ, un término más amplio. La traducción mantiene esa amplitud para no nivelar la diferencia textual.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve textual tension rather than harmonize it.'
translation_notes:
  revision_awareness: El control más reciente indicó high_agreement y no requirió cambios; se mantiene la lectura amplia de מְקוֹמוֹ y el paralelismo poético de dos miembros con dos binomios semánticos.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y poético, sin recurrir a calcos ingleses innecesarios.
  - '"Esplendor / majestad" conserva la distinción léxica del hebreo.'
  - '"Delante de él" preserva la imagen relacional sin sobreespecificar.'
  - '"En su lugar" retiene la amplitud semántica de מְקוֹמוֹ y evita armonizar con el paralelo de Salmo 96:6.'
  - La nota al pie usa una sola marca y ofrece alternativas reales en español acordes con el archivo inglés.
