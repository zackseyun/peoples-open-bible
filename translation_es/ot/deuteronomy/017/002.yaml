review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal condicional, conserva «Yahvé», mantiene la pareja «un hombre o una mujer» y expresa correctamente la violación del pacto. Sin embargo, hay un problema importante de fidelidad/idiomaticidad en «entre ti» para בְּקִרְבְּךָ, que en español suena no natural y no comunica bien el sentido comunitario; debe ser «entre ustedes» o «en medio de ti» según registro. Además, la colocación de las notas no sigue bien el modelo auditado: la nota principal debe anclarse a la expresión de «entre ustedes / en una de tus puertas», y la nota explicativa cultural extra sobre «puertas» no es necesaria porque el inglés preserva solo una alternativa léxica.'
  spanish_quality_summary: La redacción es mayormente clara, pero «Si se encuentra entre ti» es poco natural en español y puede distraer. También «que haga lo malo… al transgredir» es aceptable, pero «que hace lo malo… al transgredir» o «que haga lo malo… al quebrantar» podrían fluir mejor; no obstante, el cambio indispensable es el pronombre comunitario. Conviene simplificar las notas para evitar sobreanotar donde el POB inglés solo ofrece alternativa léxica.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יהוה -> «Yahvé» correctamente; בְּרִיתוֹ -> «su pacto» es defendible y bien justificado; no hay conflicto con glosario doctrinal. La única desviación relevante es estilística/idiomática en el tratamiento de la segunda persona singular colectiva, donde el español requiere una solución más natural para legibilidad eclesial amplia.'
  issues:
  - severity: high
    issue: «entre ti» para בְּקִרְבְּךָ es poco natural en español
    rationale: 'Aunque reproduce formalmente el singular hebreo, en español contemporáneo «entre ti» no funciona bien para referirse a la comunidad. El sentido es comunitario: «entre ustedes» es claro y fiel, o alternativamente «en medio de ti» si se quisiera conservar el singular colectivo, pero suena más bíblico que natural.'
  - severity: medium
    issue: Distribución y contenido de notas no sigue de cerca el rastro auditado inglés
    rationale: El inglés tiene una nota sobre «among you» y una sobre «his covenant». El borrador mueve la nota de alternativa de «gates» a «se encuentra» y añade una nota cultural extra sobre «puertas». Es preferible una nota léxica única anclada a «puertas» con la alternativa «ciudades/pueblos», y mantener la nota sobre «pacto».
  - severity: low
    issue: «te está dando» es aceptable pero algo más marcado de lo necesario
    rationale: El participio hebreo puede verterse de modo natural como «te da» o «te está dando». No es error, pero «te da» suele sonar más fluido en español jurídico-bíblico.
