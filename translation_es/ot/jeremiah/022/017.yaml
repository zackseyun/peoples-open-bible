  spanish_quality_summary: La redacción es mayormente clara y fiel, pero «no están sino puestos en» suena rígido y poco idiomático. «No están puestos sino en» o similar preserva mejor la exclusividad con mejor fluidez. También conviene alinear el texto con la decisión léxica documentada para לַעֲשׂוֹת, usando «practicar» como infinitivo dentro de la serie.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ganancia deshonesta», «sangre inocente», «opresión» y «extorsión» concuerdan con el audit trail inglés. La nota sobre «extorsión» preserva adecuadamente la alternativa más amplia.
  issues:
  - severity: medium
    issue: La expresión «no están sino puestos en» es poco natural en español.
    rationale: Aunque intenta reflejar la construcción exclusiva אֵין ... כִּי אִם, en español suena trabada. «No están puestos sino en» mantiene el sentido exclusivo y mejora la legibilidad.
  - severity: low
    issue: Desajuste menor entre la decisión léxica para לַעֲשׂוֹת y el texto corrido.
    rationale: La decisión documenta «practicando», pero el texto usa «en practicar». En español, dentro de esta estructura, «en practicar» es correcto; no obstante, conviene explicitar una forma coherente y natural en el texto final.
  - severity: low
    issue: La nota a sobreexplica con «codiciosos» un matiz no central en el texto principal.
    rationale: El hebreo puede incluir codicia, pero la elección principal documentada enfatiza la ganancia obtenida injustamente. Una nota más ceñida al contraste principal evita desplazar el foco.
