id: TIT.3.8
reference: Titus 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πιστὸς ὁ λόγος, καὶ περὶ τούτων βούλομαί σε διαβεβαιοῦσθαι, ἵνα φροντίζωσιν καλῶν ἔργων προΐστασθαι οἱ πεπιστευκότες θεῷ. ταῦτά ⸀ἐστιν καλὰ καὶ ὠφέλιμα τοῖς ἀνθρώποις·
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/008.yaml
  text: This saying is trustworthy[a], and concerning these things I want you to insist confidently, so that those who have believed God may be careful to devote themselves to good works[b]. These things are good and beneficial for people.
  footnotes:
  - marker: a
    text: Or 'insist strongly' or 'affirm confidently.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who have believed in God' or 'those who have trusted God.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이 말씀은 신실합니다. 그러므로 나는 그대가 이런 것들에 관하여 확신 있게 강조하기[a]를 원합니다. 그리하여 하나님을 믿어 온 자들[b]이 선한 일에 힘쓰기를 마음에 두게 하려는 것입니다. 이런 것들은 선하고 사람들에게 유익합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「강하게 주장하기」, 「확신 있게 확언하기」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님을 믿은 자들」, 「하나님을 신뢰해 온 자들」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς ὁ λόγος
  english_pob_choice: This saying is trustworthy
  chosen_korean: 이 말씀은 신실합니다
  alternatives_korean:
  - 이 말은 미쁘다
  - 이 말씀은 믿을 만합니다
  lexicon: BDAG
  rationale: 목회서신의 정형 도입구 πιστὸς ὁ λόγος. 1:9의 πιστοῦ λόγου(「신실한 말씀」)와 일관되게 「신실하다」.
- source_word: διαβεβαιοῦσθαι
  english_pob_choice: insist confidently
  chosen_korean: 확신 있게 강조하기
  alternatives_korean:
  - 강력히 주장하기
  - 단호히 확언하기
  lexicon: BDAG
  rationale: διαβεβαιόομαι는 「강하게 확신하여 말하다」. 「확신 있게 강조하다」가 그 어감을 잘 살린다.
- source_word: φροντίζωσιν ... προΐστασθαι
  english_pob_choice: be careful to devote themselves
  chosen_korean: ~에 힘쓰기를 마음에 두게
  alternatives_korean:
  - ~에 전념하기를 신경 쓰게
  - ~에 앞장서기를 유념하게
  lexicon: BDAG
  rationale: φροντίζω는 「유의하다·마음을 두다」. προΐστημι는 「앞서 ~하다·전념하다·힘쓰다」. 두 동사를 자연스러운 한국어 「힘쓰기를 마음에 두다」로 결합.
- source_word: οἱ πεπιστευκότες θεῷ
  english_pob_choice: those who have believed God
  chosen_korean: 하나님을 믿어 온 자들
  alternatives_korean:
  - 하나님을 신뢰해 온 자들
  - 하나님을 믿은 자들
  lexicon: BDAG
  rationale: 완료 능동 분사. 믿음의 지속적 상태를 살리는 「믿어 온」. πιστεύω + 여격은 「~을 신뢰하다」.
- source_word: καλὰ καὶ ὠφέλιμα τοῖς ἀνθρώποις
  english_pob_choice: good and beneficial for people
  chosen_korean: 선하고 사람들에게 유익합니다
  alternatives_korean:
  - 좋고 사람들에게 이롭습니다
  lexicon: BDAG
  rationale: ὠφέλιμος는 「유익한」. 자연스러운 한국어.
