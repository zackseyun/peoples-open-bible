base_translation:
  language: en
  yaml_path: translation/ot/esther/002/014.yaml
  text: In the evening she would go in[a], and in the morning she would return to the second house of the women, into the care of Shaashgaz, the king’s eunuch, keeper of the concubines[b]. She would not go in again to the king unless the king delighted in her and she was summoned by name.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the second harem.' The Hebrew reads literally 'the second house of the women.'
    reason: lexical_alternative
  - marker: b
    text: '''Go in to the king'' is a Hebrew idiom for entering the king’s chamber/presence; the context implies sexual access without stating it explicitly.'
    reason: cultural_note
