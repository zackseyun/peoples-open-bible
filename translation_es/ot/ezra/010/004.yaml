    issue: Puntuación defectuosa en la nota al pie
    rationale: 'La nota empieza con «''O: ...»; esa comilla simple inicial no corresponde al formato español normal y parece un residuo de edición. Conviene dejar «O: ...» y mantener las alternativas entre comillas angulares.'
