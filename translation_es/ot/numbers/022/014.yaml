translation:
  language: es
  text: 'Así que los oficiales de Moab se levantaron y fueron a Balac, y dijeron: «Balaam se negó a ir con nosotros[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Balaam no quiso ir con nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - príncipes
  - jefes
  - líderes
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a gobernantes, oficiales o príncipes. «Oficiales» conserva el matiz de delegados con autoridad y evita sugerir nobleza hereditaria que «príncipes» podría implicar en español.
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: El verbo קום indica levantarse o ponerse en pie. En español, «se levantaron» mantiene la acción básica sin sonar forzado, y encaja bien con la secuencia narrativa.
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: went to
  chosen_spanish: fueron a
  alternatives_spanish:
  - vinieron a
  - se dirigieron a
  lexicon: HALOT
  rationale: בוא con אֶל puede traducirse según el punto de vista. Aquí «fueron a» reproduce de manera natural el movimiento de regreso hacia Balac.
- source_word: מֵאֵן
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - no quiso
  lexicon: HALOT
  rationale: El participio de מאן expresa rechazo o negativa. «Se negó» es idiomático en español y conserva la fuerza directa de la respuesta de Balaam.
- source_word: הֲלֹךְ עִמָּנוּ
  english_pob_choice: to go with us
  chosen_spanish: ir con nosotros
  alternatives_spanish:
  - venir con nosotros
  - acompañarnos
  lexicon: HALOT
  rationale: El infinitivo הלך con עִם expresa «ir con». «Ir con nosotros» conserva la forma verbal y no suaviza innecesariamente la construcción hebrea.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar para mantener continuidad con la tradición bíblica y el texto fuente.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moab
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo consonante y la auditoría inglesa: el movimiento narrativo se mantiene con lenguaje natural en español, y se conserva la alternativa lexical documentada para מֵאֵן en una nota anclada al verbo principal.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se mantuvo el nombre propio «Balaam» de forma consistente con el audit trail en inglés.
  - La nota al pie está anclada en el segmento relevante («se negó») para evitar un marcador huérfano.
