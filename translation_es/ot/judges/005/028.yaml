translation:
  language: es
  text: 'Por la ventana se asomó la madre de Sísara, y clamó[a] por la celosía: «¿Por qué se demora tanto su carro en venir? ¿Por qué se retrasan las ruedas[b] de sus carros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gimió»; el verbo hebreo raro expresa un lamento o grito angustiado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «los pasos» o «las pisadas» de sus carros; aquí «las ruedas» expresa mejor en español el avance tardío de los carros en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - desde la ventana
  lexicon: HALOT
  rationale: El hebreo expresa visión/salida a través de una abertura. En español, «por la ventana» conserva la relación espacial con naturalidad y evita una construcción rígida.
- source_word: נִשְׁקְפָה
  english_pob_choice: looked out
  chosen_spanish: miraba
  alternatives_spanish:
  - se asomaba
  - miró hacia afuera
  lexicon: HALOT
  rationale: El verbo describe a alguien que observa desde una abertura elevada. «Miraba» comunica el acto continuo y encaja con la escena narrativa.
- source_word: וַתְּיַבֵּב
  english_pob_choice: wailed
  chosen_spanish: se lamentaba
  alternatives_spanish:
  - lloraba
  - clamaba
  lexicon: HALOT
  rationale: El verbo es raro y probablemente expresa un lamento vocal. «Se lamentaba» preserva la nota emotiva sin fijar un matiz demasiado específico que el hebreo no obliga a definir.
- source_word: אֵם סִיסְרָא
  english_pob_choice: Sisera’s mother
  chosen_spanish: la madre de Sísara
  alternatives_spanish:
  - la madre de Sisera
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva de forma natural en español. Se usa «Sísara» con acento según norma castellana bíblica usual en español moderno.
- source_word: הָאֶשְׁנָב
  english_pob_choice: the lattice
  chosen_spanish: la celosía
  alternatives_spanish:
  - la rejilla
  - el enrejado
  lexicon: HALOT
  rationale: El término designa una abertura enrejada; «celosía» es una equivalencia clara y digna en español bíblico contemporáneo.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué se debe
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, conservando el tono insistente del lamento.
- source_word: בֹּשֵׁשׁ
  english_pob_choice: is so late in coming
  chosen_spanish: se demora tanto
  alternatives_spanish:
  - tarda tanto
  - se retrasa tanto
  lexicon: HALOT
  rationale: El verbo implica tardanza o retraso. «Se demora tanto» conserva la idea de tardanza ansiosa y funciona bien con el infinitivo siguiente.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariot
  chosen_spanish: su carro
  alternatives_spanish:
  - su carro de guerra
  - su carruaje
  lexicon: HALOT
  rationale: En este contexto militar, «carro» es una forma sobria y fiel. Evita una expansión interpretativa innecesaria.
- source_word: לָבוֹא
  english_pob_choice: in coming
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - volver
  lexicon: HALOT
  rationale: Se traduce con un infinitivo simple que completa naturalmente la pregunta en español.
- source_word: אֶחֱרוּ
  english_pob_choice: delay
  chosen_spanish: se atrasan
  alternatives_spanish:
  - se demoran
  - tardan
  lexicon: HALOT
  rationale: El plural verbal expresa que los carros no llegan a tiempo. «Se atrasan» mantiene la idea de demora visible en la marcha o el regreso.
- source_word: פַּעֲמֵי
  english_pob_choice: wheels
  chosen_spanish: las huellas
  alternatives_spanish:
  - los pasos
  - las pisadas
  lexicon: HALOT
  rationale: El sustantivo significa literalmente pasos/huellas/huellas de pisada. La tradición auditiva del contexto permite referirse al rastro o golpe de avance; «huellas» conserva la literalidad básica que no se limita a «ruedas».
- source_word: מַרְכְּבוֹתָיו
  english_pob_choice: his chariots
  chosen_spanish: de sus carros
  alternatives_spanish:
  - de sus carros de guerra
  - de sus cuadrigas
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y la referencia a los carros como conjunto. La forma posesiva se integra en la frase nominal final.
translation_notes:
  revision_awareness: Se corrigió la tendencia de una versión previa a usar notas con marcadores no anclados. Aquí no se incluyen notas al pie, porque la redacción española puede expresar el sentido del hebreo sin necesidad de alternativas marcadas en el texto principal.
  spanish_consistency_notes:
  - Se mantiene el registro poético-narrativo del cántico de Débora sin modernizarlo en exceso.
  - Se prefiere «carro» para רכב en singular y «carros» para el plural, respetando la variación del hebreo.
  - Se evita introducir «ruedas» en el texto principal, porque el hebreo habla de pasos/huellas/impulsos del avance; «huellas» deja abierta la imagen sin sobreespecificarla.
  - No se usa «SEÑOR» ni terminología de sustitución, pues el verso no contiene el Nombre divino.
