review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva correctamente la estructura de lista y la mayoría de los nombres del hebreo, pero introduce adaptaciones onomásticas españolas no justificadas por el audit trail inglés ni por el hebreo consonántico/vocalizado. En particular, «Mesulán» altera demasiado מְשֻׁלָּם, y la nota correspondiente no preserva la alternativa documentada en inglés para מַלּוּךְ. También falta la nota sobre la posible variante/forma del nombre «Jeremoth» que el POB inglés sí conserva.
  spanish_quality_summary: 'El español es legible y natural para una lista genealógica, pero algunas castellanizaciones son excesivas o inconsistentes con una política de transliteración estable. «Y de los hijos de Bani» funciona bien. Conviene usar formas más cercanas al hebreo y al audit trail: «Mesulam», «Maluc», «Adaya», «Yasub», «Seal», «Jeremot».'
  glossary_alignment: 'No hay términos teológicos en juego. El punto principal es la consistencia onomástica: preservar nombres propios por transliteración más que por adaptación libre. La política del proyecto favorece fidelidad al nombre fuente; por eso «Mesulán» y «Adaías» son menos adecuados que formas transliteradas más directas. Además, debe mantenerse la nota léxica inglesa sobre «Malluk/Malluch» aplicada al nombre correspondiente en español.'
  issues:
  - severity: high
    issue: «Mesulán» para מְשֻׁלָּם cambia demasiado la forma del nombre
    rationale: La adaptación introduce una terminación aguda española ajena al patrón del nombre y no está respaldada por el audit trail. Una transliteración más fiel como «Mesulam» preserva mejor la identidad onomástica.
  - severity: high
    issue: La nota [a] está anclada al nombre equivocado
    rationale: En el POB inglés, la nota [a] corresponde a מַלּוּךְ (Malluk/Malluch), no a מְשֻׁלָּם. Debe trasladarse al equivalente español de «Maluc/Maluc(h)».
  - severity: medium
    issue: Falta la nota sobre «Jeremoth»/variante de nombre
    rationale: El audit trail inglés conserva una nota textual/onomástica para ירמות. La revisión española debe preservarla, idealmente anclada en «Jeremot[c]».
  - severity: medium
    issue: «Adaías» es una adaptación innecesaria
    rationale: El hebreo עֲדָיָה se representa mejor con una transliteración más directa como «Adaya». «Adaías» suena a regularización tradicional no exigida por la fuente.
  - severity: medium
    issue: «Séal» introduce una tilde no necesaria y una forma poco estable
    rationale: Para שְׁאָל, «Seal» refleja de manera suficiente la vocalización escogida por el POB inglés («Sheal») sin sobreinterpretar la prosodia española. La nota puede explicar variantes.
