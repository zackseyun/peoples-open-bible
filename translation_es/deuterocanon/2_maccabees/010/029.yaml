translation:
  language: es
  text: Menelao nos lo hizo saber[a], queriendo que ustedes, después de bajar[b], se unieran a los suyos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos informó», «nos dio a conocer» o «nos comunicó». El verbo griego expresa la idea de hacer saber o comunicar una noticia.'
    reason: lexical_alternative
  - marker: b
    text: El griego transmitido es sintácticamente difícil. Esta redacción sigue el sentido más llano del texto de Swete, pero conserva la incertidumbre sobre la relación exacta entre el participio y el infinitivo.
    reason: textual_variant
  - marker: c
    text: 'O: «a su propio pueblo», «a su propio bando» o «con los suyos». La expresión griega es abreviada y depende del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεφάνισεν
  english_pob_choice: informed
  chosen_spanish: nos lo hizo saber
  alternatives_spanish:
  - nos informó
  - nos dio a conocer
  - nos comunicó
  lexicon: LSJ
  rationale: El verbo griego significa hacer algo conocido o comunicar una información. «Nos lo hizo saber» conserva el valor de informar sin forzar un registro demasiado moderno o administrativo.
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  - con la intención de
  lexicon: LSJ
  rationale: El participio expresa la intención o voluntad de Menelao. «Queriendo» reproduce bien el valor participial y mantiene la relación sintáctica con la oración principal.
- source_word: κατελθόντας
  english_pob_choice: after coming down
  chosen_spanish: después de bajar
  alternatives_spanish:
  - cuando hubieran bajado
  - habiendo bajado
  lexicon: LSJ
  rationale: La secuencia temporal previa al infinitivo se expresa de modo natural en español con «después de bajar», evitando una construcción demasiado rígida y manteniendo la prioridad de la acción.
- source_word: γίνεσθαι πρὸς τοὺς ἰδίους
  english_pob_choice: to join your own people
  chosen_spanish: se unieran a sus propios
  alternatives_spanish:
  - se unieran a los suyos
  - se unieran a su propio pueblo
  - estuvieran con los suyos
  lexicon: LSJ
  rationale: El griego es elíptico y literalmente significa algo como «llegar a estar con los propios». Siguiendo la lectura inglesa de «join your own people», el español conserva la idea relacional con una formulación breve, aunque algo elíptica, que refleja la concisión del original.
- source_word: τοὺς ἰδίους
  english_pob_choice: your own people
  chosen_spanish: sus propios
  alternatives_spanish:
  - los suyos
  - su gente
  - su propio pueblo
  lexicon: LSJ
  rationale: La expresión griega está abreviada y depende del contexto. En español, «los suyos» es la equivalencia más natural, pero aquí se ha mantenido la tensión de la elipsis con «sus propios» en el flujo de la cláusula; la nota aclara la alternativa más idiomática.
theological_decisions:
- issue: 'Ambigüedad de πρὸς τοὺς ἰδίους: grupo propio, bando o pueblo'
  english_pob_reading: to join your own people
  chosen_spanish_reading: se unieran a sus propios
  alternative_spanish_readings:
  - se unieran a los suyos
  - se unieran a su propio pueblo
  - se pasaran a su propio bando
  rationale: El contexto histórico apunta a pertenencia grupal/política, no a una formulación doctrinal. Se evita cerrar el sentido con una interpretación excesivamente específica y se preserva la ambigüedad del original y del audit trail inglés.
