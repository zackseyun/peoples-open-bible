translation:
  language: es
  text: ¿Descenderán a los cerrojos del Seol[a]? ¿Descenderemos juntos al polvo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las partes del Seol» o «las barras del Seol». La imagen hebrea probablemente evoca las puertas o el encierro del reino de los muertos.
    reason: lexical_alternative
  - marker: b
    text: O «¿Reposaremos juntos en el polvo?». El sustantivo hebreo final puede entenderse como «descenso» o, según algunos intérpretes, como «reposo».
    reason: alternative_reading
lexical_decisions:
- source_word: בַּדֵּי
  english_pob_choice: bars of
  chosen_spanish: barras de
  alternatives_spanish:
  - cerrojos de
  - partes de
  - brazos de
  lexicon: HALOT
  rationale: En contexto con שְׁאֹל, la imagen apunta a los confines que encierran al reino de los muertos. «Barras» conserva la fuerza metafórica del inglés POB y funciona naturalmente en español.
- source_word: שְׁאֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - sepulcro
  - morada de los muertos
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se preserva el término técnico bíblico como «Seol» para no aplanar su carga conceptual a «sepulcro» o «tumba». La transliteración mantiene la distinción léxica y teológica.
- source_word: תֵּרַדְנָה
  english_pob_choice: will they go down
  chosen_spanish: ¿Descenderán?
  alternatives_spanish:
  - ¿irán abajo?
  - ¿bajarán?
  - ¿descenderán ellas?
  lexicon: HALOT
  rationale: El verbo ירד significa «bajar/descender». En español, «descenderán» preserva el tono poético y la idea direccional sin sobrecargar la frase.
- source_word: אִם
  english_pob_choice: shall
  chosen_spanish: ¿
  alternatives_spanish:
  - si
  - acaso
  lexicon: HALOT
  rationale: Aquí אִם funciona de modo interrogativo-retórico, no como una condición ordinaria. El español lo expresa mejor con la segunda pregunta, manteniendo la fuerza retórica del verso.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  - todos a una
  lexicon: HALOT
  rationale: «Juntos» transmite con claridad la idea de compartir el mismo destino, sin desplazar el paralelismo del verso.
- source_word: עַל עָפָר
  english_pob_choice: into the dust
  chosen_spanish: al polvo
  alternatives_spanish:
  - sobre el polvo
  - en el polvo
  - hacia el polvo
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/en», el contexto de muerte y descenso permite una formulación natural en español. «Al polvo» conserva la referencia funeraria sin forzar un calco impropio.
- source_word: נָחַת
  english_pob_choice: descend
  chosen_spanish: descender
  alternatives_spanish:
  - reposar
  - bajar
  - descenso
  lexicon: HALOT
  rationale: Se opta por un verbo de movimiento, en paralelo con תֵּרַדְנָה. El inglés POB preserva la lectura de descenso como principal, y el español sigue esa decisión.
theological_decisions:
- issue: Conservar Seol como término técnico del reino de los muertos
  english_pob_reading: Sheol is retained rather than flattened to 'the grave' or 'the realm of the dead'.
  chosen_spanish_reading: Seol se conserva como transliteración técnica, en lugar de reducirlo a «sepulcro» o «tumba».
  alternative_spanish_readings:
  - sepulcro
  - morada de los muertos
  - tumba
  rationale: El término hebreo tiene un campo semántico más amplio que una simple sepultura física. Mantener «Seol» ayuda a respetar la tensión léxica y literaria del texto.
  doctrine_reference: Terminología veterotestamentaria del estado de los muertos; cf. uso bíblico de שְׁאֹל
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail inglés: sin revisiones aplicadas y con acuerdo alto entre pasadas de revisión. La redacción española mantiene la doble imagen poética del descenso al Seol y al polvo, conservando también las alternativas documentadas en notas.'
  spanish_consistency_notes:
  - Se emplea «Seol» consistentemente como transliteración técnica, no como sustituto interpretativo.
  - «Descenderán» y «descenderemos» conservan el paralelismo interrogativo del hebreo y la decisión inglesa de mantener el movimiento hacia abajo.
  - «Al polvo» mantiene el motivo funerario sin introducir una lectura doctrinal adicional.
  - Las notas a pie de página preservan las alternativas relevantes registradas en el audit trail inglés.
