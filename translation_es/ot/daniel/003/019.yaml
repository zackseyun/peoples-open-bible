translation:
  language: es
  text: Entonces Nabucodonosor se llenó de furor, y la expresión de su rostro cambió contra Sadrac, Mesac y Abed-nego. Respondió y dijo que se calentara el horno [a]siete veces más de lo que solía calentarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «séptuple». La expresión aramea denota calentar el horno a siete veces su intensidad normal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia; «Entonces» conserva la progresión narrativa de manera natural en español.
- source_word: הִתְמְלִי חֱמָא
  english_pob_choice: was filled with fury
  chosen_spanish: se llenó de furor
  alternatives_spanish:
  - se llenó de ira
  - se colmó de furia
  lexicon: HALOT
  rationale: La forma verbal expresa llegar a estar lleno de cólera; «furor» comunica bien la intensidad del término arameo sin volver el texto demasiado arcaico.
- source_word: וּצְלֵם אַנְפּוֹהִי אשתנו
  english_pob_choice: the expression of his face was changed
  chosen_spanish: la expresión de su rostro cambió
  alternatives_spanish:
  - el aspecto de su rostro cambió
  - su semblante cambió
  lexicon: HALOT
  rationale: La expresión aramea dice literalmente que la imagen/semblante del rostro fue cambiada. En español, «la expresión de su rostro cambió» conserva la imagen y suena natural.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - en actitud hostil hacia
  lexicon: HALOT
  rationale: En este contexto la preposición marca una orientación hostil hacia los tres hombres; «contra» preserva ese matiz adversarial.
- source_word: עָנֵה וְאָמַר
  english_pob_choice: He answered and said
  chosen_spanish: Respondió y dijo
  alternatives_spanish:
  - Contestó y dijo
  - Replicó y dijo
  lexicon: HALOT
  rationale: Fórmula narrativa semítica frecuente. Mantener ambos verbos preserva la textura del original y el español lo acepta de forma clara.
- source_word: לְמֵזֵא לְאַתּוּנָא
  english_pob_choice: to heat the furnace
  chosen_spanish: que se calentara el horno
  alternatives_spanish:
  - para calentar el horno
  - que calentaran el horno
  lexicon: HALOT
  rationale: El infinitivo arameo expresa la orden de aumentar el calor del horno. En español, la pasiva perifrástica impersonal transmite la instrucción sin forzar el sujeto.
- source_word: חַד שִׁבְעָה
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete pliegues
  - sietefold
  lexicon: HALOT
  rationale: La expresión aramea es un modismo de incremento multiplicado; «siete veces» es la equivalencia más clara y bíblicamente reconocible en español.
- source_word: עַל דִּי חֲזֵה לְמֵזְיֵהּ
  english_pob_choice: more than it was usually heated
  chosen_spanish: de lo que solía calentarse
  alternatives_spanish:
  - de lo que normalmente se calentaba
  - más de lo que era costumbre calentarlo
  lexicon: HALOT
  rationale: La cláusula es idiomática y señala un calentamiento más allá del grado habitual. «De lo que solía calentarse» comunica el sentido sin sobrecargar el verso.
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Sadrac, Mesac y Abednego
  lexicon: HALOT
  rationale: Se transliteran los nombres propios según la forma tradicional ya asentada en español bíblico, manteniendo la identificación inmediata del pasaje.
translation_notes:
  revision_awareness: El contexto inglés mantiene la fórmula semítica «He answered and said» y entiende «seven times» como modismo de intensidad, no como simple repetición numérica; el español sigue esas decisiones y conserva la referencia idiomática mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - 'Se prefirieron nombres propios bíblicos en las formas españolas establecidas: Sadrac, Mesac y Abed-nego.'
  - «Furor» y «furia» quedan como alternativas cercanas; se eligió «furor» por su registro más bíblico y su adecuación al arameo.
