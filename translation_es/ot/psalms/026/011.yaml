revisions:
- from: Pero yo[a] andaré en mi integridad[b]; redímeme y ten gracia de mí[c].
  to: Pero yo[a] andaré en mi integridad; redímeme y sé misericordioso conmigo[b].
  rationale: Se mantiene «Pero yo» por su contraste natural y enfático, «andaré» por la metáfora hebrea de conducta, «integridad» por el valor de תֻם sin implicar impecabilidad, y «redímeme» por la fuerza de פדה. Se revisa únicamente la última cláusula porque «ten gracia de mí» no es español natural; «sé misericordioso conmigo» comunica idiomáticamente el pedido de favor/gracia, mientras la nota preserva la alternativa más literal vinculada a «gracia». También se simplifica el anclaje de notas para que solo aparezcan donde realmente aportan una alternativa significativa.
