  - severity: medium
    issue: Construcción elíptica insuficientemente resuelta en 'y así también los cantores y los porteros'
    rationale: El hebreo es elíptico, pero en español esa frase queda abrupta sin un verbo suplementado. La nota ya explica la elipsis; el texto principal debe quedar plenamente legible.
  - severity: low
    issue: Posesión en 'Salomón su hijo' algo rígida en español
    rationale: Es entendible y bastante cercano al hebreo, pero 'su hijo Salomón' suele sonar más natural. Aun así, la forma actual no es incorrecta.
