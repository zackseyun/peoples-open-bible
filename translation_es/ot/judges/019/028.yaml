translation:
  language: es
  text: 'Él le dijo: «Levántate, y vayámonos». Pero no hubo respuesta[a]. Entonces la puso sobre el asno[b], y el hombre se levantó y se fue a su lugar[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo puede leerse literalmente: «y no había quien respondiera» o «y no había nadie que respondiera».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Entonces la tomó para ponerla sobre el asno». El verbo hebreo dice literalmente «tomó», aquí con el sentido contextual de levantarla o acomodarla sobre el animal.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a su casa». El hebreo dice literalmente: «a su lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיהָ
  english_pob_choice: He said to her
  chosen_spanish: Él le dijo
  alternatives_spanish:
  - Y le dijo
  lexicon: HALOT
  rationale: Mantiene la secuencia narrativa del wayyiqtol sin forzar un calco innecesario. En español, omitir la conjunción inicial en este contexto suena natural y no altera el sentido.
- source_word: קוּמִי
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte de pie
  lexicon: HALOT
  rationale: Es el imperativo a una mujer en segunda persona singular. «Levántate» transmite el mandato directo con naturalidad y conserva el valor dinámico del verbo.
- source_word: וְנֵלֵכָה
  english_pob_choice: and let us go
  chosen_spanish: y vayámonos
  alternatives_spanish:
  - y vamos
  - y marchemos
  lexicon: HALOT
  rationale: El cohortativo expresa exhortación o decisión compartida. «Vayámonos» reproduce bien ese matiz volitivo en español.
- source_word: וְאֵין עֹנֶה
  english_pob_choice: But there was no answer
  chosen_spanish: Pero no hubo respuesta
  alternatives_spanish:
  - Y no hubo quien respondiera
  - Pero nadie respondió
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no había «respondiendo» o «respondedor». En español, la forma más natural y fiel al efecto idiomático es «no hubo respuesta», manteniendo la falta de contestación sin explicar más de lo que el texto dice.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: Then he put her
  chosen_spanish: Entonces la cargó
  alternatives_spanish:
  - Entonces la tomó
  - Entonces la levantó
  lexicon: HALOT
  rationale: לקח aquí no es un simple «tomar», sino tomarla para colocarla sobre el animal. «Cargó» comunica la acción contextual de levantarla y ponerla sobre el asno sin perder la concreción física del verbo.
- source_word: עַל הַחֲמוֹר
  english_pob_choice: on the donkey
  chosen_spanish: sobre el asno
  alternatives_spanish:
  - sobre el burro
  - encima del asno
  lexicon: HALOT
  rationale: חמור puede traducirse «asno» o «burro»; «asno» es más tradicional y preciso en registro bíblico. «Sobre» expresa mejor el movimiento de colocación que un simple «en».
- source_word: וַיָּקָם הָאִישׁ
  english_pob_choice: and the man rose
  chosen_spanish: y el hombre se levantó
  alternatives_spanish:
  - y el hombre se puso de pie
  - y el hombre se alzó
  lexicon: HALOT
  rationale: Se conserva la diferencia entre este verbo y el siguiente הלך. «Se levantó» mantiene la progresión narrativa sin anticipar el desplazamiento.
- source_word: וַיֵּלֶךְ לִמְקֹמוֹ
  english_pob_choice: and went to his place
  chosen_spanish: y se fue a su lugar
  alternatives_spanish:
  - y fue a su casa
  - y regresó a su lugar
  lexicon: HALOT
  rationale: מקום es literalmente «lugar». «Su lugar» respeta la formulación del hebreo y deja abierta la referencia contextual que el inglés POB también preserva con «his place».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y conserva la misma secuencia narrativa que el audit trail inglés: mandato, ausencia de respuesta, colocación sobre el asno, levantamiento del hombre y partida. Se ha preferido una formulación española natural sin suavizar la fuerza concreta de לקח ni reemplazar מקום por una domesticación excesiva.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no contiene el nombre divino.
  - Se usa «asno» para חמור, coherente con un registro bíblico más estable que «burro» en español editorial.
  - «Lugar» conserva la literalidad de מקום y evita resolver interpretativamente el destino final del hombre.
