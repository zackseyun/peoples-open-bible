translation:
  language: es
  text: Y Simón lo aceptó[a], y aceptó ser sumo sacerdote y ser comandante y etnarca[b] de los judíos[c] y de los sacerdotes, y estar a cargo de todos ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo aceptó y lo asumió». El griego ἐπεδέξατο puede expresar recibir o aceptar formalmente un encargo.
    reason: lexical_alternative
  - marker: b
    text: «Etnarca» es un título político histórico, aproximable a un gobernante o líder de un pueblo.
    reason: cultural_note
  - marker: c
    text: O «los judeanos». El griego Ἰουδαίων puede referirse a los judíos como pueblo o a los judeanos en sentido geo-étnico.
    reason: lexical_alternative
  - marker: d
    text: O «presidir sobre todos ellos» o «estar sobre todos ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδέξατο
  english_pob_choice: accepted it
  chosen_spanish: lo aceptó
  alternatives_spanish:
  - lo recibió
  - lo aceptó y lo asumió
  lexicon: LSJ
  rationale: El medio de ἐπιδέχομαι aquí expresa que Simón aceptó la disposición o cargo implícito del contexto. «Lo aceptó» mantiene la referencia implícita al arreglo sin añadir explicación innecesaria.
- source_word: εὐδόκησεν
  english_pob_choice: agreed
  chosen_spanish: consintió en
  alternatives_spanish:
  - estuvo de acuerdo en
  - aprobó
  lexicon: LSJ
  rationale: En este contexto el verbo señala voluntad y asentimiento para ejercer los oficios nombrados. «Consintió en» conserva ese matiz de aceptación deliberada con registro formal.
- source_word: ἀρχιερατεύσαι
  english_pob_choice: be high priest
  chosen_spanish: ser sumo sacerdote
  alternatives_spanish:
  - ejercer el sumo sacerdocio
  - ser sacerdote principal
  lexicon: LSJ
  rationale: El infinitivo indica desempeñar el cargo. «Ser sumo sacerdote» es fiel, claro y corresponde al título oficial en español bíblico.
- source_word: στρατηγός
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - jefe militar
  lexicon: LSJ
  rationale: El término denota una función de mando militar. «Comandante» es suficientemente amplio y no impone un rango militar moderno más específico de lo que el griego exige.
- source_word: ἐθνάρχης
  english_pob_choice: ethnarch
  chosen_spanish: etnarca
  alternatives_spanish:
  - gobernante del pueblo
  - líder nacional
  lexicon: LSJ
  rationale: Se conserva el título histórico por transliteración en español, como término técnico político. Así se preserva la especificidad del cargo en lugar de reducirlo a una expresión genérica.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: LSJ
  rationale: En este contexto político-nacional, el sentido amplio de pueblo es natural en español. «Los judíos» sigue la opción del POB inglés y mantiene la referencia colectiva sin perder inteligibilidad.
- source_word: ἱερέων
  english_pob_choice: priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los clérigos
  - los ministros
  lexicon: LSJ
  rationale: Es la equivalencia directa del plural griego y conserva la distinción entre el pueblo y el grupo sacerdotal.
- source_word: προστῆσαι
  english_pob_choice: be over them all
  chosen_spanish: estar sobre todos ellos
  alternatives_spanish:
  - presidir sobre todos ellos
  - estar a cargo de todos ellos
  lexicon: LSJ
  rationale: El verbo expresa estar puesto sobre otros, presidir o gobernar. «Estar sobre todos ellos» sigue de cerca la imagen del griego y evita suavizar demasiado la relación jerárquica.
- source_word: ἁπάντων
  english_pob_choice: them all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - a todos
  - de todos
  lexicon: LSJ
  rationale: El genitivo plural remite colectivamente a los grupos mencionados. «Todos ellos» hace explícita la referencia en un español natural y preciso.
theological_decisions:
- issue: Título histórico ἐθνάρχης
  english_pob_reading: ethnarch
  chosen_spanish_reading: etnarca
  alternative_spanish_readings:
  - gobernante del pueblo
  - líder nacional
  rationale: No se trata de una categoría doctrinal sino de un cargo político-histórico. Mantener el término técnico preserva la textura del texto y evita domesticarlo con una explicación interpretativa excesiva.
  doctrine_reference: Principio de transparencia lexical y de preservación de títulos históricos
- issue: Alcance de Ἰουδαίων
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: El contexto de decreto y autoridad nacional favorece una referencia colectiva amplia. «Los judíos» es la forma más natural en español y mantiene abierta la posibilidad geo-étnica sin forzarla.
  doctrine_reference: Primacía del original sobre la tradición de traducción
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pasaje revisado del POB inglés, que ajustó «serve as high priest» a «be high priest» y «stand over them all» a «be over them all». En español se reflejó esa misma precisión con «ser sumo sacerdote» y «estar sobre todos ellos», manteniendo el valor jerárquico y evitando una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se conserva «etnarca» como préstamo técnico, coherente con la política de transliterar títulos históricos.
  - «Los judíos» se mantiene como colectivo amplio; se dejó la alternativa «los judeanos» en nota por la ambigüedad léxica del griego.
  - La construcción «estar sobre todos ellos» conserva la relación de autoridad sin introducir terminología eclesiástica moderna.
