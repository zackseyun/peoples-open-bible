translation:
  language: es
  text: El que cierra su oído al clamor del pobre,[a] también él clamará y no recibirá respuesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el débil» o «el necesitado». El hebreo דָּל puede designar a una persona pobre, débil o socialmente vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹטֵם
  english_pob_choice: shuts
  chosen_spanish: cierra
  alternatives_spanish:
  - tapa
  - sella
  - cierra herméticamente
  lexicon: HALOT
  rationale: El participio qal expresa una acción deliberada de cerrar u obstruir. En español, «cierra su oído» es natural y conserva la imagen concreta sin volverla mecánica.
- source_word: אָזְנוֹ
  english_pob_choice: his ear
  chosen_spanish: su oído
  alternatives_spanish:
  - su oreja
  - sus oídos
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo masculino. «Su oído» mantiene esa forma singular y su concreción, con un registro sobrio y bíblico.
- source_word: מִזַּעֲקַת
  english_pob_choice: to the cry of
  chosen_spanish: al clamor de
  alternatives_spanish:
  - ante el clamor de
  - por el clamor de
  - del clamor de
  lexicon: HALOT
  rationale: Con אטם אָזְן, la preposición introduce aquello que se rehúsa oír. «Al clamor de» comunica de forma natural la relación de rechazo auditivo y mantiene la fuerza de la súplica.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el débil
  - el desvalido
  lexicon: HALOT
  rationale: El término puede abarcar pobreza, debilidad o vulnerabilidad social. «El pobre» es la opción más clara en español y conserva la amplitud contextual sin resolverla en exceso.
- source_word: גַּם הוּא
  english_pob_choice: he also
  chosen_spanish: también él
  alternatives_spanish:
  - él también
  - también esa persona
  - también
  lexicon: HALOT
  rationale: 'La partícula añade reciprocidad enfática: quien se niega a oír experimentará una negativa semejante. «También él» conserva el paralelismo y la referencia masculina genérica del hebreo.'
- source_word: יִקְרָא
  english_pob_choice: will call out
  chosen_spanish: clamará
  alternatives_spanish:
  - gritará
  - llamará
  - alzará su clamor
  lexicon: HALOT
  rationale: El verbo puede significar llamar o gritar en voz alta. «Clamará» mantiene el eco con «clamor» y expresa bien la acción intensa de pedir auxilio.
- source_word: וְלֹא יֵעָנֶה
  english_pob_choice: and not be answered
  chosen_spanish: y no será escuchado
  alternatives_spanish:
  - y no recibirá respuesta
  - y no le responderán
  - y no será atendido
  lexicon: HALOT
  rationale: 'El nifal es pasivo: «ser respondido/escuchado». En español, «no será escuchado» conserva la pasividad y deja implícito el agente, como en el hebreo.'
theological_decisions:
- issue: Agente implícito de la falta de respuesta
  english_pob_reading: Leave the addressee unstated in the main text.
  chosen_spanish_reading: Dejar sin especificar quién no escucha ni responde.
  alternative_spanish_readings:
  - Dar a entender explícitamente que Dios no responde
  - Dar a entender explícitamente que otras personas no responden
  rationale: El hebreo no nombra al agente de la respuesta ausente. En un proverbio, la pasiva puede sugerir justicia divina, pero el texto no la formula abiertamente. Conviene conservar esa ambigüedad.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica cuando el original no la resuelve.'
- issue: Masculino genérico
  english_pob_reading: Retain masculine singular wording ('his ear,' 'he also') as representative/generic.
  chosen_spanish_reading: 'Mantener singular masculino representativo: «su oído», «también él».'
  alternative_spanish_readings:
  - Usar lenguaje inclusivo como «su oído» / «también esa persona»
  - Omitir toda referencia pronominal
  rationale: El hebreo usa formas masculinas singulares genéricas. La traducción debe respetar esa forma gramatical sin volverla artificialmente neutra.
  doctrine_reference: 'Principio de la POB: precisión gramatical antes que neutralización no motivada por el texto.'
translation_notes:
  revision_awareness: 'Se siguió el cierre del pasaje en la revisión inglesa más reciente: una sola oración fluida sin pronombre redundante, manteniendo la reciprocidad del proverbio, el paralelismo con «clamor/clamará» y la pasiva final sin especificar el agente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto; aquí no aparece el tetragrámaton.
  - Se prefirió «clamor/clamará» para conservar coherencia léxica con la raíz de grito/súplica presente en hebreo.
  - Se mantuvo el sujeto genérico masculino singular, coherente con el hebreo y con el audit trail inglés.
  - La pasiva «no será escuchado» deja abierta la identidad del que no responde, sin introducir un agente no explicitado.
