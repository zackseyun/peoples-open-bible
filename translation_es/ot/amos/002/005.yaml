translation:
  language: es
  text: Así que enviaré fuego sobre Judá[a], y devorará las ciudadelas[b] de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra Judá'. El hebreo con ב puede expresarse de varias maneras según el contexto; aquí 'sobre' comunica bien la dirección del juicio sin sobreinterpretar.
    reason: lexical_alternative
  - marker: b
    text: O 'palacios' o 'fortalezas'. El término hebreo puede referirse a construcciones palaciales fortificadas; 'ciudadelas' procura conservar ambos matices en este contexto de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así que enviaré
  alternatives_spanish:
  - Y enviaré
  - Pero enviaré
  lexicon: HALOT
  rationale: El verbo שׁלח en causativo expresa 'enviar'. En español, 'enviaré' conserva el tiempo futuro y la primera persona. 'Así que' reproduce el valor consecutivo que la POB marcó con 'So', sin perder la relación con el contexto previo.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego ardiente
  - llama
  lexicon: HALOT
  rationale: אֵשׁ significa de manera directa 'fuego'. No se introduce una especificación adicional sobre si es literal o figurado, para mantener la tensión profética del texto.
- source_word: בִּיהוּדָה
  english_pob_choice: upon Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - en Judá
  - contra Judá
  lexicon: HALOT
  rationale: '''Sobre'' expresa bien en español la dirección hostil y la caída del juicio, de forma natural y sin volverlo demasiado interpretativo. ''En'' sería más literal pero menos idiomático; ''contra'' añade una explicitación que el hebreo permite pero no exige.'
- source_word: וְאָכְלָה
  english_pob_choice: and it will devour
  chosen_spanish: y devorará
  alternatives_spanish:
  - y consumirá
  - y se lo comerá
  lexicon: HALOT
  rationale: Con el fuego como sujeto, אכל funciona idiomáticamente como 'devorar' o 'consumir'. 'Devorará' conserva la imagen viva y el matiz destructivo del hebreo, como en la decisión inglesa.
- source_word: אַרְמְנוֹת
  english_pob_choice: the citadels
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los palacios
  - las ciudadelas
  lexicon: HALOT
  rationale: אַרְמְנוֹת puede referirse a edificios palaciales fortificados o a bastiones/fortalezas. En español, 'fortalezas' comunica bien la idea de estructuras defensivas devastadas por el fuego; 'palacios' resaltaría más el aspecto regio, y 'ciudadelas' podría sonar más técnico o menos natural en este contexto.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Naturaleza del fuego anunciado
  english_pob_reading: Render as a direct divine judgment image without specifying whether the fire is strictly literal, metaphorical, or mediated through military invasion.
  chosen_spanish_reading: Presentarlo como imagen directa del juicio divino, sin precisar si el fuego es literal, metafórico o mediado por invasión militar.
  alternative_spanish_readings:
  - fuego literal
  - metáfora de invasión
  - juicio por medio de guerra
  rationale: El hebreo y la POB inglesa anuncian fuego y devastación, pero no obligan a identificar el mecanismo exacto. Mantener esa amplitud preserva la tensión profética en vez de resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como sin cambios; no se requieren ajustes respecto del paquete auditado.
  spanish_consistency_notes:
  - Se mantiene 'Judá' y 'Jerusalén' como topónimos estándar en español.
  - Se conserva la imagen de juicio sin aclararla más allá de lo que permite el hebreo.
  - Se evita 'SEÑOR' para יהוה porque este versículo no contiene el Tetragrámaton en forma explícita; el nombre divino no aparece en el texto hebreo base de este versículo.
