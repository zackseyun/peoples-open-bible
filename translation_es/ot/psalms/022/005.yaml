translation:
  language: es
  text: En ti confiaron nuestros padres[a]; confiaron, y tú los libraste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice «nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - En ti solo
  - Sobre ti
  lexicon: HALOT
  rationale: La preposición ב con sufijo de segunda persona singular expresa el objeto de la confianza. «En ti» es la colocación natural en español con «confiaron» y conserva la dirección personal de la dependencia sin añadir exclusividad no explícita en el hebreo.
- source_word: בָּטְחוּ
  english_pob_choice: trusted
  chosen_spanish: confiaron
  alternatives_spanish:
  - pusieron su confianza
  - estuvieron confiados
  lexicon: HALOT
  rationale: בטח comunica confiar/descansar con seguridad. «Confiaron» reproduce de modo idiomático la idea de اعتماد confiada y permite mantener la repetición verbal del hebreo en ambas cláusulas.
- source_word: אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino plural con sufijo de primera persona plural, literalmente «nuestros padres». Se conserva la forma masculina explícita en el texto principal por fidelidad al original; «antepasados» expresa el sentido amplio, pero neutraliza la forma marcada del hebreo.
- source_word: בָּטְחוּ
  english_pob_choice: they trusted
  chosen_spanish: confiaron
  alternatives_spanish:
  - pusieron su confianza
  lexicon: HALOT
  rationale: Se repite el mismo verbo para conservar el paralelismo y el énfasis del hebreo, sin suavizar la reiteración.
- source_word: וַתְּפַלְּטֵמוֹ
  english_pob_choice: and you delivered them
  chosen_spanish: y tú los libraste
  alternatives_spanish:
  - y tú los rescataste
  - y los hiciste escapar
  lexicon: HALOT
  rationale: De פלט, «librar, rescatar, hacer escapar». «Libraste» funciona bien en registro bíblico y comunica el acto divino de salvación sin precisar el modo, manteniendo el equilibrio entre fidelidad y naturalidad en español.
theological_decisions:
- issue: Tratamiento de אֲבֹתֵינוּ con matiz representativo e histórico
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El hebreo usa el término masculino de parentesco. Se mantiene en español para no borrar la forma lexical del texto fuente; la opción más amplia «antepasados» queda como alternativa, pero no sustituye la lectura visible del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador corrige el problema de validación anterior eliminando la nota al pie no anclada. No se requiere nota textual adicional porque la alternativa lexical «antepasados» queda documentada en las decisiones léxicas y no en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal del hebreo con dos ocurrencias de «confiaron».
  - Se mantiene el posesivo plural masculino «nuestros padres» conforme al sustantivo hebreo explícito.
  - «Libraste» preserva el tono bíblico sin introducir una paráfrasis explicativa.
  - No se usan mayúsculas reverenciales ni sustituciones de conveniencia que oculten el texto fuente.
