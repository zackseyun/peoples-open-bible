base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/002/020.yaml
  text: For long ago I broke your yoke[a]; I tore off your bonds. But you said, “I will not serve.” Indeed, on every high hill and under every green tree[c][b], you sprawled out as a prostitute.
  footnotes:
  - marker: a
    text: Or 'from of old.' The Hebrew phrase can denote remote past; here it likely refers to Israel's earlier history of deliverance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under every green tree,' a stock prophetic expression for places associated with idolatrous worship.
    reason: cultural_note
  - marker: c
    text: The Hebrew verb rendered 'sprawled out' is rare and difficult; alternatives include 'bent down' or similar expressions of sexual availability.
    reason: lexical_alternative
