base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/009.yaml
  text: If he is able to fight with me and strike me down[a], then we will be your slaves. But if I prevail against him and strike him down[c][b], then you will be our slaves and serve us.
  footnotes:
  - marker: a
    text: Or 'servants' in both occurrences of עֲבָדִים; here 'slaves' is used because the context is national subjugation and bonded service after combat.
    reason: lexical_alternative
  - marker: b
    text: The verb יכל in 'if I prevail against him' can more literally express ability ('if I am able against him'), but in this combat context it carries the sense of overcoming or prevailing.
    reason: lexical_alternative
  - marker: c
    text: The verb נכה in both clauses may also be rendered 'kill' or 'defeat'; 'strike down' preserves the decisive force while leaving the wording closer to the Hebrew.
    reason: lexical_alternative
