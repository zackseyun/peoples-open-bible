translation:
  language: es
  text: Y ahora, lejos esté de mí[a] preservar mi vida en ningún tiempo de aflicción; porque no soy mejor que mis hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preservarme a mí mismo»; literalmente, «preservar mi vida/mi alma». Aquí ψυχή se refiere a la vida, no al alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή μοι γένοιτο
  english_pob_choice: far be it from me
  chosen_spanish: que no me ocurra
  alternatives_spanish:
  - que nunca me suceda
  - lejos de mí
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de fuerte repudio o rechazo. En español, «que no me ocurra» comunica con naturalidad esa idea de “de ninguna manera / que jamás suceda”, sin volverla demasiado literal ni demasiado solemne.
- source_word: φείσασθαί μου τῆς ψυχῆς
  english_pob_choice: to spare my life
  chosen_spanish: ahorrar mi vida
  alternatives_spanish:
  - perdonar mi vida
  - ahorrarme la vida
  - ahorrarme a mí mismo
  lexicon: LSJ
  rationale: ψυχή aquí se entiende como vida, no como alma inmortal. «Ahorrar mi vida» conserva el valor de φείδομαι como ‘preservar, reservar, escatimar’ y evita introducir una lectura doctrinal no señalada por el griego.
- source_word: ἐν παντὶ καιρῷ θλίψεως
  english_pob_choice: in any time of distress
  chosen_spanish: en ningún tiempo de aflicción
  alternatives_spanish:
  - en todo tiempo de aflicción
  - en cualquier tiempo de angustia
  lexicon: LSJ
  rationale: θλῖψις denota aflicción, presión o angustia. Aquí la combinación con la negación refuerza que no debe buscar su preservación en absoluto bajo circunstancias de aflicción; «tiempo de aflicción» mantiene el paralelo con el griego y su tono bíblico.
- source_word: οὐ γάρ εἰμι κρείσσων
  english_pob_choice: for I am not better
  chosen_spanish: porque no soy mejor
  alternatives_spanish:
  - pues no soy más fuerte
  - porque no soy superior
  lexicon: LSJ
  rationale: 'κρείσσων puede significar mejor, más fuerte o superior. En este contexto, la comparación es moral y de dignidad narrativa: no se considera con derecho a preservarse más que sus hermanos, por lo que «mejor» sigue bien la lectura inglesa y el sentido del griego.'
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: than my brothers
  chosen_spanish: que mis hermanos
  alternatives_spanish:
  - que mis hermanos y parientes
  - que mis hermanos varones
  lexicon: BDAG
  rationale: ἀδελφοί se refiere a sus hermanos literales en la narración. «Hermanos» es la opción más directa y natural en español, sin necesidad de ampliación inclusiva o explicativa.
theological_decisions:
- issue: ψυχή como ‘vida’ y no como ‘alma’
  english_pob_reading: Here ψυχή refers to life rather than the immaterial soul.
  chosen_spanish_reading: Aquí ψυχή se entiende como vida, no como alma inmaterial.
  alternative_spanish_readings:
  - alma
  - vida/yo mismo
  rationale: El contexto de preservar o escatimar la ψυχή es claramente vital y narrativo, no antropológico-filosófico. Mantener ‘vida’ evita cargar el pasaje con una doctrina sobre el alma que el griego no está expresando aquí.
  doctrine_reference: Antropología bíblica; uso contextual de ψυχή en textos narrativos helenísticos
translation_notes:
  revision_awareness: 'El expediente inglés quedó sin cambios en la última revisión (''unchanged: true''); por eso el borrador español sigue de cerca la lectura auditada, manteniendo la misma decisión léxica para ψυχή como ''vida'' y la equivalencia idiomática de la fórmula de repudio.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «hermanos» para ἀδελφοί, acorde con el contexto narrativo literal.
  - La negación intensiva del griego se refleja con una construcción idiomática española, sin añadir contenido doctrinal ajeno al pasaje.
