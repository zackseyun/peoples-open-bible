translation:
  language: es
  text: 'Faraón dijo: «Mira, el pueblo de la tierra ahora son muchos, y ustedes los están haciendo descansar[a] de sus cargas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los han hecho cesar de sus trabajos» o «los están haciendo cesar de sus cargas». El verbo hebreo es causativo («hacer cesar / hacer descansar») y puede traducirse de varias maneras cercanas según qué tan explícito se haga el contexto laboral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La interjección introduce una observación enfática. «Mira» conserva la fuerza deíctica y resulta natural en español moderno; «He aquí» sería más arcaico y menos directo.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: numeroso
  alternatives_spanish:
  - muchos
  - abundante
  lexicon: HALOT
  rationale: El adjetivo cuantitativo describe al pueblo en conjunto. «Numeroso» preserva el valor predicativo y suena más fluido que un literal «muchos» en esta construcción.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - el pueblo del país
  - la gente de la tierra
  - el común del país
  lexicon: HALOT
  rationale: Se conserva la forma transparente del hebreo. En este contexto alude al grupo laboral o populacho sujeto al trabajo en Egipto; «pueblo de la tierra» mantiene el enlace léxico sin explicitar más de lo que el texto dice.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español, con el mismo valor de situación presente que en el hebreo.
- source_word: וְהִשְׁבַּתֶּם
  english_pob_choice: you are making them rest
  chosen_spanish: los están haciendo descansar
  alternatives_spanish:
  - los están haciendo cesar
  - los están haciendo parar
  - los están obligando a descansar
  lexicon: HALOT
  rationale: El verbo causativo de שׁבת puede expresar «hacer cesar» o «hacer descansar». Se opta por «hacer descansar» siguiendo la decisión inglesa más reciente y el matiz de cese/resto, sin perder la fuerza causativa. Se evita «obligar a descansar» por añadir un matiz no explícito.
- source_word: מִסִּבְלֹתָם
  english_pob_choice: from their burdens
  chosen_spanish: de sus cargas
  alternatives_spanish:
  - de sus trabajos
  - de su labor forzada
  - de sus pesadas cargas
  lexicon: HALOT
  rationale: סִבְלֹת apunta a cargas o pesadas cargas impuestas. «Cargas» conserva el vínculo con la opresión y no interpreta de más; «de sus trabajos» debilitaría el sustantivo concreto del hebreo.
theological_decisions:
- issue: Alcance de עַם הָאָרֶץ en el contexto de Faraón
  english_pob_reading: the people of the land refers to the Israelite laboring population within Egypt, while retaining the transparent Hebrew wording
  chosen_spanish_reading: el pueblo de la tierra
  alternative_spanish_readings:
  - el pueblo del país
  - la población trabajadora de la tierra
  rationale: No se sustituye por una paráfrasis explicativa en el texto principal. La traducción mantiene la expresión hebrea visible, dejando que el contexto de Éxodo identifique al grupo referido sin borrar la tensión léxica.
  doctrine_reference: Éxodo 1–5; coherencia narrativa del opresor hablando del pueblo sometido
- issue: Sentido de la forma causativa וְהִשְׁבַּתֶּם
  english_pob_reading: you are making them rest from their burdens
  chosen_spanish_reading: los están haciendo descansar de sus cargas
  alternative_spanish_readings:
  - los están haciendo cesar de sus cargas
  - los están haciendo parar de sus cargas
  rationale: Se conserva la lectura causativa de «hacer cesar/hacer descansar» y el contexto de cargas. «Descansar» reproduce bien la revisión inglesa y permite oír el matiz de cese sin imponer una interpretación devocional adicional.
  doctrine_reference: Lexicografía de שׁבת en forma hiphil; contexto narrativo de trabajo forzado en Éxodo
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «rest from their burdens» sobre «stop from their burdens», y refleja esa decisión en español con «hacer descansar»/«descansar» en lugar de una formulación más dura o puramente literal.
  spanish_consistency_notes:
  - Se usa «Faraón» como nombre propio, conforme al hebreo פַּרְעֹה y a la práctica editorial de la POB.
  - Se mantiene «cargas» para סִבְלֹתָם, evitando sustituirlo por «trabajos» o «labor forzada» en el texto principal.
  - La puntuación con comillas angulares se adapta al uso editorial del español sin alterar el contenido del enunciado.
