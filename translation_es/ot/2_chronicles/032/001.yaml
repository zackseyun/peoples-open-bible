translation:
  language: es
  text: Después de estas cosas y de esta fidelidad[a], Senaquerib, rey de Asiria, vino y entró en Judá, y acampó contra las ciudades fortificadas, con la intención de irrumpir en ellas para sí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta verdad»; אֱמֶת puede significar «verdad» o «fidelidad», y aquí probablemente alude a la conducta fiel de Ezequías en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: O «con la intención de abrir brecha en ellas para sí». El hebreo final es una expresión idiomática de propósito militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Tras
  - Luego de
  lexicon: HALOT
  rationale: La preposición temporal marca secuencia; «Después de» es natural en español y conserva el valor narrativo.
- source_word: הַדְּבָרִים
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos acontecimientos
  - estos asuntos
  lexicon: HALOT
  rationale: דָּבָר puede abarcar hechos o asuntos; «estas cosas» mantiene el giro hebreo sin sobreespecificar.
- source_word: וְהָאֱמֶת הָאֵלֶּה
  english_pob_choice: and this faithfulness
  chosen_spanish: y de esta fidelidad
  alternatives_spanish:
  - y de esta verdad
  - y de estos actos de fidelidad
  lexicon: HALOT
  rationale: Aquí אֱמֶת no comunica principalmente «verdad» abstracta, sino la confiabilidad/fidelidad mostrada en el contexto previo. En español, «fidelidad» conserva mejor esa tensión semántica. Se añade «de» para una sintaxis más natural en español sin perder la relación con lo precedente.
- source_word: סַנְחֵרִיב מֶלֶךְ אַשּׁוּר
  english_pob_choice: Sennacherib king of Assyria
  chosen_spanish: Senaquerib, rey de Asiria
  alternatives_spanish:
  - Senaquerib, el rey de Asiria
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma usual del español bíblico; el título real se traduce de modo directo y claro.
- source_word: וַיָּבֹא בִֽ/יהוּדָה
  english_pob_choice: entered Judah
  chosen_spanish: entró en Judá
  alternatives_spanish:
  - vino a Judá
  - entró a Judá
  lexicon: HALOT
  rationale: El verbo con ב marca ingreso al territorio; «entró en Judá» es la forma más directa y natural en español.
- source_word: וַיִּ֨חַן֙ עַל
  english_pob_choice: encamped against
  chosen_spanish: acampó frente a
  alternatives_spanish:
  - acampó contra
  - acamparó contra
  lexicon: HALOT
  rationale: חנה con עַל indica posicionarse militarmente ante un objetivo. «Frente a» comunica la localización del campamento sin añadir de más la idea de asedio formal, que el contexto sugiere pero no explicita con un término técnico.
- source_word: הֶעָרִים הַבְּצֻרוֹת
  english_pob_choice: the fortified cities
  chosen_spanish: las ciudades fortificadas
  alternatives_spanish:
  - las ciudades amuralladas
  - las ciudades defendidas
  lexicon: HALOT
  rationale: La expresión es estándar; «fortificadas» conserva el sentido militar y es plenamente idiomático en español.
- source_word: לְבִקְעָם אֵלָיו
  english_pob_choice: intended to break into them for himself
  chosen_spanish: dijo que las rompería para sí
  alternatives_spanish:
  - intentó abrir brecha en ellas para sí
  - pensó en irrumpir en ellas para sí
  lexicon: HALOT
  rationale: El hebreo expresa propósito/intención con el infinitivo de בקע y el sufijo pronominal; en español, una subordinada de intención futura en estilo indirecto («dijo que las rompería») mantiene la fuerza volitiva y el matiz de acción dirigida a forzar entrada. «Para sí» conserva el valor idiomático de אֵלָיו como beneficio/dirección en favor propio.
theological_decisions:
- issue: Sentido de אֱמֶת en un relato histórico
  english_pob_reading: this faithfulness
  chosen_spanish_reading: esta fidelidad
  alternative_spanish_readings:
  - esta verdad
  - estos actos de fidelidad
  rationale: La lectura no apunta primero a «verdad» doctrinal, sino a la confiabilidad/rectitud mostrada en la conducta previa de Ezequías. «Fidelidad» preserva esa valoración histórica sin desactivar la posible tensión entre verdad y lealtad.
  doctrine_reference: cf. 2 Crónicas 31–32; valoración de la conducta fiel de Ezequías en el marco narrativo
translation_notes:
  revision_awareness: La redacción española sigue de cerca el paquete fuente hebreo y la lectura auditada del POB inglés. Se conserva la ambigüedad semántica de אֱמֶת mediante la elección principal «fidelidad», y se adapta la cláusula final idiomática de בקע + sufijo con una subordinada natural en español que mantiene el valor de intención militar y beneficio propio. Se evita traducir mecánicamente desde el inglés cuando eso produciría una sintaxis menos fiel al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - «Senaquerib» sigue la ortografía habitual en español bíblico; no se latiniza ni se moderniza el nombre más allá de la forma establecida.
  - «Judá» se conserva como nombre territorial propio, no como adjetivo.
  - Se eligió una construcción verbal española de intención («dijo que las rompería») para reflejar la finalidad implícita del hebreo sin introducir un asedio técnico no expresado explícitamente.
