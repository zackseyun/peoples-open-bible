  to: Y el sumo sacerdote, que es el principal entre sus hermanos, sobre cuya cabeza se ha derramado el aceite de la unción y que ha sido ordenado[a] para vestir las vestiduras, no dejará su cabeza desgreñada[b], ni rasgará sus vestidos.
