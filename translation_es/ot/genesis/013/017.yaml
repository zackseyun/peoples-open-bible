translation:
  language: es
  text: Levántate[a], recorre la tierra, por toda su longitud y su anchura[b], porque a ti te la daré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Álzate, camina por la tierra, por toda su longitud y su anchura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «recorre la tierra, por toda su longitud y su anchura».'
    reason: previous_rendering
lexical_decisions:
- source_word: ק֚וּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  - Levántate y anda
  lexicon: HALOT
  rationale: El imperativo de קום pide una acción inmediata de levantarse. «Levántate» conserva la fuerza directa del mandato y es natural en español bíblico contemporáneo.
- source_word: הִתְהַלֵּךְ
  english_pob_choice: walk through
  chosen_spanish: recorre
  alternatives_spanish:
  - camina por
  - anda por
  - atraviesa
  lexicon: HALOT
  rationale: El hitpael de הלך expresa moverse de un lado a otro o recorrer. «Recorre» comunica bien la idea de desplazarse por toda la zona sin sonar forzado en español.
- source_word: בָּאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al territorio prometido. «La tierra» mantiene la designación bíblica amplia y natural en español, sin añadir la explicación interpretativa de «prometida» al texto principal.
- source_word: לְאָרְכָּהּ
  english_pob_choice: through its length
  chosen_spanish: a lo largo de su extensión
  alternatives_spanish:
  - por su longitud
  - a lo largo de su longitud
  lexicon: HALOT
  rationale: La preposición con אֹרֶךְ marca la extensión lineal del territorio. «A lo largo de su extensión» evita la repetición torpe de «longitud» y conserva la idea de recorrerla de extremo a extremo.
- source_word: וּלְרָחְבָּהּ
  english_pob_choice: and its width
  chosen_spanish: y de su anchura
  alternatives_spanish:
  - y de su amplitud
  - y de su ancho
  lexicon: HALOT
  rationale: רֹחַב corresponde a anchura/ancho. «Anchura» mantiene el paralelo con «extensión» y expresa la merisma de totalidad espacial con claridad en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón de la orden y la promesa. «Porque» es la equivalencia más natural en español y expresa la conexión causal/explanatoria del hebreo.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a ti mismo
  lexicon: HALOT
  rationale: El dativo marca al destinatario de la promesa. «A ti» conserva el sentido personal y enfático del hebreo sin sobretraducirlo.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: I will give it
  chosen_spanish: te la daré
  alternatives_spanish:
  - te la entregaré
  - te la concederé
  - la daré a ti
  lexicon: HALOT
  rationale: El verbo נתן con sufijo femenino singular se refiere a «la tierra». «Te la daré» expresa con naturalidad la promesa y mantiene el referente femenino implícito en español.
theological_decisions:
- issue: Referente del pronombre femenino singular en «te la daré»
  english_pob_reading: The suffix refers to 'the land' as the promised inheritance given by God to Abram.
  chosen_spanish_reading: El sufijo femenino se refiere a «la tierra», entendida como el territorio prometido que Dios concede a Abram.
  alternative_spanish_readings:
  - 'El sufijo podría dejarse implícito: «te daré»'
  - Podría explicitarse como «te daré esa tierra»
  rationale: El hebreo usa un sufijo femenino singular que retoma naturalmente אֶרֶץ. En español conviene reflejar ese género con «la» para conservar el enlace textual y la promesa de herencia, sin añadir material interpretativo indebido.
  doctrine_reference: Promesa del pacto a Abram; herencia de la tierra (Génesis 12:7; 13:15-17).
translation_notes:
  revision_awareness: 'El contexto auditado en inglés pasó por ajustes para evitar una redacción redundante y para reflejar con más claridad la estructura hebrea: ubicación en la tierra + recorrido por su extensión y anchura. La versión española sigue esa lectura estructural y mantiene la promesa futura con el sufijo femenino referido a la tierra.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el texto explicite el nombre divino; este versículo, tal como está dado, no lo contiene.
  - Se prefirió «la tierra» frente a «el país» porque el contexto abrahámico y la terminología POB favorecen el valor territorial/promisorio de אֶרֶץ.
  - «Anchura» se usa para preservar el paralelismo con «extensión» y la merisma de totalidad espacial.
