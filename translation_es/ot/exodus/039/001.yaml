translation:
  language: es
  text: Y del azul, de la púrpura y del carmesí hicieron vestiduras finamente tejidas[a] para ministrar en el santuario, e hicieron las vestiduras sagradas para Aarón, como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vestiduras para servicio». La expresión hebrea es especializada y puede destacar la función de estas prendas en el servicio del tabernáculo o su confección finamente trabajada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַתְּכֵלֶת וְהָאַרְגָּמָן וְתוֹלַעַת הַשָּׁנִי
  english_pob_choice: from the blue, the purple, and the scarlet yarn
  chosen_spanish: de la azul, de la púrpura y del carmesí
  alternatives_spanish:
  - de la azul, de la púrpura y del hilo escarlata
  - de azul, púrpura y carmesí
  - de la azul, de la púrpura y de la grana
  lexicon: HALOT
  rationale: Conservo la serie de colores/textiles del contexto tabernacular. En español, 'azul' y 'púrpura' funcionan bien como términos de color; 'carmesí' comunica el rojo intenso de תּוֹלַעַת הַשָּׁנִי sin forzar 'hilo' si el pasaje ya describe el material de forma compacta. Mantengo la redundancia preposicional para reflejar con claridad la enumeración hebrea.
- source_word: בִגְדֵי שְׂרָד
  english_pob_choice: finely woven garments
  chosen_spanish: vestidos finamente tejidos
  alternatives_spanish:
  - vestidos para servicio
  - vestiduras de servicio
  - vestiduras finamente tejidas
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de no reducir de inmediato la expresión a una mera función litúrgica. 'Finamente tejidos' preserva la posible referencia al trabajo textil especializado y evita borrar la ambigüedad documentada entre función y confección.
- source_word: לְשָׁרֵת
  english_pob_choice: for ministering
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para hacer servicio
  lexicon: HALOT
  rationale: '''Ministrar'' reproduce el matiz cultual formal del verbo en el santuario mejor que un simple ''servir'', y encaja con el uso bíblico-español sin volverlo eclesiástico en exceso.'
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en el recinto santo
  - en lo santo
  lexicon: HALOT
  rationale: '''Santuario'' expresa de modo natural el ámbito sagrado de servicio tabernacular. Evita restringir el término a una sola cámara cuando el hebreo puede abarcar el espacio sagrado del culto.'
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras sagradas
  alternatives_spanish:
  - las vestiduras santas
  - las prendas sagradas
  - las vestiduras consagradas
  lexicon: HALOT
  rationale: '''Vestiduras sagradas'' conserva la designación formal de las prendas de Aarón y su registro reverente. ''Vestiduras'' suena más bíblico y digno que ''prendas'' en este contexto ritual.'
- source_word: לְאַהֲרֹן
  english_pob_choice: for Aaron
  chosen_spanish: para Aarón
  alternatives_spanish:
  - de Aarón
  - destinadas a Aarón
  lexicon: HALOT
  rationale: La preposición indica designación o destino; 'para Aarón' es la forma más directa y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Sigo la terminología española del proyecto: el Tetragrámaton se vierte como ''Yahvé'' en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: como Yahvé había mandado a Moisés
  alternatives_spanish:
  - tal como Yahvé mandó a Moisés
  - como Yahvé había ordenado a Moisés
  lexicon: HALOT
  rationale: '''Había mandado'' refleja bien el valor retrospectivo del relato y mantiene el tono narrativo. ''Mandado'' preserva el verbo de orden divina sin introducir una paráfrasis interpretativa.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo usa el Tetragrámaton directamente, y el proyecto pide preservarlo como nombre propio. En español, 'Yahvé' es la forma consistente con la terminología del proyecto y evita la sustitución por 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de בִגְדֵי שְׂרָד
  english_pob_reading: finely woven garments
  chosen_spanish_reading: vestidos finamente tejidos
  alternative_spanish_readings:
  - vestiduras para servicio
  - vestiduras de servicio
  - vestiduras finamente tejidas
  rationale: La expresión hebrea es especializada y puede referirse tanto a la función ministerial como a la elaboración textil. La redacción española conserva esa tensión sin resolverla de manera prematura.
  doctrine_reference: 'DOCTRINE.md: Lexical precision and preservation of documented ambiguity'
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios; se mantiene la lectura de alta concordancia, con ajuste sistemático del nombre divino al estándar español del proyecto ('Yahvé') y conservación de la ambigüedad de בִגְדֵי שְׂרָד mediante una nota breve.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto en español.
  - Se tradujo בַּקֹּדֶשׁ como 'en el santuario' y no como 'en el lugar santo' para conservar amplitud contextual.
  - '''Vestiduras sagradas'' se reservó para בִּגְדֵי הַקֹּדֶשׁ, distinguiéndolas de los ''vestidos finamente tejidos'' de בִגְדֵי שְׂרָד.'
  - Se conservó un registro bíblico moderno y reverente, evitando arcaismos innecesarios y evitando también un lenguaje eclesiástico excesivamente técnico.
