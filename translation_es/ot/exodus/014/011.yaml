review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene la pregunta retórica sarcástica sobre la falta de tumbas en Egipto, conserva el reproche directo a Moisés y refleja la cláusula final causal/circunstancial. Sin embargo, «nos tomaste» suena menos natural e idiomático en español para לְקַחְתָּנוּ en este contexto de movimiento; «nos sacaste» además se acercaría demasiado a הוֹצִיאָנוּ. Una mejora menor es usar «nos llevaste», que conserva la distinción léxica frente a «sacarnos».'
  spanish_quality_summary: El español es claro, digno y legible. «Sepulcros» funciona bien en registro bíblico comprensible. La sintaxis general es natural. El único punto de fluidez relevante es «que nos tomaste para morir», que en español moderno suena forzado; «que nos llevaste a morir» o «para morir» lee mejor. También conviene ajustar la nota alternativa para que suene igualmente natural.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. La distinción verbal entre לקח y הוציא está bien atendida en principio; la revisión propuesta la preserva mejor en español con «llevaste» frente a «sacarnos».
  issues:
  - severity: medium
    issue: «nos tomaste para morir» suena poco natural en español
    rationale: Aunque «tomar» refleja de cerca לקח, en este contexto acusatorio de traslado físico el español idiomático prefiere «llevar». Esto preserva mejor la legibilidad sin borrar la distinción con הוציא, que sigue siendo «sacar».
  - severity: low
    issue: La nota alternativa repite la misma rigidez verbal
    rationale: Si se revisa el cuerpo a «nos llevaste», conviene que la nota también use una formulación española más natural para mantener consistencia estilística.
  revised_spanish_text: 'Y dijeron a Moisés[a]: «¿Fue porque no había sepulcros en Egipto que nos llevaste para morir en el desierto? ¿Qué es esto que nos has hecho al sacarnos de Egipto?»'
  revised_footnotes:
