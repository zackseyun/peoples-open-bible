  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו הֲ/יָדֹ֤עַ תֵּדַע֙ כִּ֞י בַּעֲלִ֣יס מֶ֣לֶךְ בְּנֵֽי עַמּ֗וֹן שָׁלַח֙ אֶת יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֔ה לְ/הַכֹּתְ/ךָ֖ נָ֑פֶשׁ וְ/לֹא הֶאֱמִ֣ין לָ/הֶ֔ם גְּדַלְיָ֖הוּ בֶּן אֲחִיקָֽם׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/014.yaml
  text: And they said to him[b][a], “Do you really know that Baalis king of the Ammonites has sent Ishmael son of Nethaniah to strike you down?” But Gedaliah son of Ahikam did not believe them.
  footnotes:
  - marker: a
    text: Or “Do you know for certain…?” The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally “to strike you in life/soul,” an idiom meaning to kill or take someone’s life.
    reason: lexical_alternative
