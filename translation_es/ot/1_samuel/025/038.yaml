revisions:
- from: Y aconteció que, como a los diez días[a], Yahvé hirió a Nabal, y murió.
  to: Unos diez días después[a], Yahvé hirió a Nabal, y murió.
  rationale: La revisión mantiene el sentido del hebreo y de la auditoría POB, pero mejora la naturalidad del español. Se sustituye el calco narrativo «Y aconteció que» por una transición temporal directa, y «como a los diez días» por «Unos diez días después», que comunica con más claridad la aproximación temporal sin perder fidelidad. Se conserva «Yahvé», «hirió» y la secuencia «... y murió» para no intensificar la causalidad más allá del texto.
