lexical_decisions:
- source_word: צַלְמוֹן
  english_pob_choice: Zalmon
  chosen_spanish: Zalmón
  alternatives_spanish:
  - Salmón
  lexicon: nombre propio
  rationale: Es un nombre propio y se translitera con adaptación ortográfica mínima al español. Mantengo Zalmón para reflejar la forma consonántica del hebreo, siguiendo la decisión inglesa principal; Salmón queda como variante conocida.
- source_word: הָאֲחֹחִי
  english_pob_choice: the Ahohite
  chosen_spanish: el acohita
  alternatives_spanish:
  - un acohita
  - descendiente de Ahoah
  lexicon: gentilicio
  rationale: El hebreo lleva artículo y funciona como designación de clan/gentilicio en la lista. En español, 'el acohita' conserva ese valor identificador y el tono de lista, sin explicitar indebidamente 'descendiente de Ahoah'.
- source_word: מַהְרַי
  english_pob_choice: Maharai
  chosen_spanish: Maharay
  alternatives_spanish:
  - Maharai
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Uso 'Maharay' para una adaptación hispana fluida y consistente, sin añadir información que el texto no da.
- source_word: הַנְּטֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - un netofatita
  - de Netofa
  lexicon: gentilicio
  rationale: El hebreo presenta un gentilicio con artículo. 'El netofatita' reproduce la forma de lista y mantiene el vínculo con Netofa; 'de Netofa' sería una paráfrasis más dinámica que no se necesita aquí.
translation_notes:
  revision_awareness: El texto fuente y el control inglés coinciden plenamente en contenido y estructura de lista; no se observaron revisiones aplicadas ni tensiones textuales adicionales en este versículo.
  spanish_consistency_notes:
  - Mantengo el estilo enumerativo y nominal propio de la lista de guerreros de David.
  - Conservo los gentilicios con artículo para reflejar la función del hebreo.
  - Uso transliteración estable para nombres propios sin convertirlos en equivalentes interpretativos.
