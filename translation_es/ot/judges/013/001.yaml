  - marker: b
    text: Hebreo «en la mano de los filisteos», un modismo que significa bajo su poder.
    reason: lexical_alternative
  revision_rationale: El texto base es fiel y natural, pero debe añadirse la nota omitida sobre el modismo hebreo בְּיַד, ya presente en la auditoría inglesa. Se mantiene la redacción principal y solo se agrega el anclaje [b] y su nota correspondiente.
