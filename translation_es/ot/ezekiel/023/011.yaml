translation:
  language: es
  text: Cuando su hermana Oholibá vio esto[a], se corrompió más en su lujuria, más que su hermana, y en sus prostituciones más que las prostituciones de su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «cuando vio esto, se corrompió con más lujuria que su hermana, y con más actos de prostitución que su hermana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When ... saw this
  chosen_spanish: Cuando ... vio esto
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: El verbo expresa percepción visual; «cuando» conserva bien la fuerza narrativa-temporal del hebreo, y «esto» hace explícito el objeto implícito, como en el audit trail en inglés.
- source_word: אֲחוֹתָהּ אָהֳלִיבָה
  english_pob_choice: her sister Oholibah
  chosen_spanish: su hermana Oholibá
  alternatives_spanish:
  - Oholibá, su hermana
  - la hermana Oholibá
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y la relación appositiva. «Su hermana» reproduce el referente posesivo del hebreo sin volverlo más interpretativo.
- source_word: וַתַּשְׁחֵת
  english_pob_choice: she became more corrupt
  chosen_spanish: se corrompió más
  alternatives_spanish:
  - se volvió más corrupta
  - se arruinó más
  - actuó con mayor corrupción
  lexicon: HALOT
  rationale: El Hifil aquí tiene sentido de corrupción moral/sexual. «Se corrompió» conserva la idea de deterioro moral sin perder la comparación intensiva con מִמֶּנָּה.
- source_word: עַגְבָתָהּ
  english_pob_choice: her lust
  chosen_spanish: su lujuria
  alternatives_spanish:
  - su deseo lascivo
  - su pasión
  - su concupiscencia
  lexicon: HALOT
  rationale: El sustantivo denota deseo sexual desordenado; «lujuria» comunica esa fuerza moral-sexual de forma clara y digna en español, sin suavizarla.
- source_word: מִמֶּנָּה
  english_pob_choice: than her sister
  chosen_spanish: que su hermana
  alternatives_spanish:
  - más que su hermana
  - en comparación con su hermana
  lexicon: HALOT
  rationale: El hebreo marca comparación; en español, «más ... que» es la correspondencia natural. La referencia es a la hermana mencionada en el contexto inmediato.
- source_word: וְאֶת תַּזְנוּתֶי/הָ
  english_pob_choice: and in her prostitutions
  chosen_spanish: y en sus prostituciones
  alternatives_spanish:
  - y en sus actos de prostitución
  - y en su prostitución
  lexicon: HALOT
  rationale: Se conserva el plural concreto del hebreo y la metáfora sexual explícita. «Prostituciones» sigue la decisión inglesa de mantener la fuerza del término sin reemplazarlo por un abstracto más débil.
- source_word: מִזְּנוּנֵי אֲחוֹתָהּ
  english_pob_choice: more than the prostitutions of her sister
  chosen_spanish: más que las prostituciones de su hermana
  alternatives_spanish:
  - más que los actos de prostitución de su hermana
  - más que las de su hermana
  lexicon: HALOT
  rationale: Se mantiene la comparación intensiva y la repetición léxica para preservar el paralelismo hebreo. El plural «prostituciones» refleja el sustantivo plural del מקור y la textura retórica del pasaje.
theological_decisions:
- issue: Lenguaje sexual explícito como metáfora de infidelidad del pacto
  english_pob_reading: Retain explicit sexual language ('lust,' 'prostitutions') rather than soften to generic 'unfaithfulness.'
  chosen_spanish_reading: Conservar lenguaje sexual explícito («lujuria», «prostituciones») en vez de suavizarlo a «infidelidad» o «deslealtad».
  alternative_spanish_readings:
  - infidelidad
  - deslealtad
  - idolatría
  rationale: El hebreo usa vocabulario sexual gráfico para denunciar la transgresión del pacto. Traducirlo de manera más abstracta borraría la tensión retórica y profética que el texto mismo quiere sostener.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó una comparación menos clara por «than her sister» para ajustar con mayor precisión la referencia comparativa del hebreo. En español, se refleja esa misma claridad con «que su hermana».
  spanish_consistency_notes:
  - Se usa «Oholibá» para el nombre propio, manteniendo la transliteración habitual del POB.
  - Se conserva el campo semántico sexual con «lujuria» y «prostituciones», coherente con la terminología del pasaje en inglés.
  - Se evita «SEÑOR» u այլ substitución teológica porque este versículo no contiene el Tetragrámaton.
  - La comparación se expresa con «más ... que», que es la forma idiomática y fiel al hebreo.
  - Se mantiene el plural «prostituciones» para respetar la repetición y el paralelismo del hebreo.
