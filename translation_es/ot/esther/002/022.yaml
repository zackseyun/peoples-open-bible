translation:
  language: es
  text: Cuando el asunto llegó al conocimiento de Mardoqueo[a], se lo dijo a la reina Ester[b], y Ester se lo dijo al rey en nombre de Mardoqueo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue dado a conocer a Mardoqueo». El pasivo hebreo puede subrayar tanto que el asunto llegó a su conocimiento como que alguien se lo informó.
    reason: lexical_alternative
  - marker: b
    text: O «Ester la reina».
    reason: lexical_alternative
  - marker: c
    text: O «en el nombre de Mardoqueo» o «en representación de Mardoqueo». La frase indica que Ester presentó el informe como procedente de Mardoqueo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּדַע
  english_pob_choice: became known
  chosen_spanish: llegó a conocimiento
  alternatives_spanish:
  - fue dado a conocer
  - llegó a saberse
  - se hizo saber
  lexicon: HALOT
  rationale: El nifal de ידע es pasivo/incoativo. En español, «llegó a conocimiento» conserva bien la idea de que el asunto pasó a ser conocido por Mardoqueo, sin añadir de forma explícita una agencia que el hebreo no requiere.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - el hecho
  - el caso
  lexicon: HALOT
  rationale: דבר es amplio; aquí se refiere al plan/tema ya mencionado en el contexto inmediato. «El asunto» es natural en español y no fuerza una precisión mayor que la del texto.
- source_word: לְמָרְדֳּכַי
  english_pob_choice: to Mordecai
  chosen_spanish: a Mardoqueo
  alternatives_spanish:
  - para Mardoqueo
  - de Mardoqueo
  lexicon: HALOT
  rationale: La preposición marca al destinatario o receptor de la información. «A Mardoqueo» refleja bien la sintaxis y el movimiento informativo.
- source_word: וַיַּגֵּד
  english_pob_choice: he told
  chosen_spanish: se lo dijo
  alternatives_spanish:
  - lo informó
  - se lo comunicó
  - le contó
  lexicon: HALOT
  rationale: נגד en hifil significa decir, comunicar o informar. «Se lo dijo» mantiene el flujo narrativo y refleja la relación entre lo conocido por Mardoqueo y lo transmitido a Ester.
- source_word: לְאֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: la reina Ester
  alternatives_spanish:
  - Ester la reina
  - la reina Ester
  - Ester, la reina
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a Ester la reina». «La reina Ester» es idiomático en español y preserva la apposición de título sin sobreinterpretarla.
- source_word: וַתֹּאמֶר
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló
  - manifestó
  - contó
  lexicon: HALOT
  rationale: Aunque el verbo básico es «decir», en español el destinatario se expresa naturalmente con «le dijo». Esto conserva la acción comunicativa directa del verbo hebreo.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - para el rey
  lexicon: HALOT
  rationale: La preposición corresponde de forma directa al destinatario del mensaje. «Al rey» es la opción más simple y fiel.
- source_word: בְּשֵׁם מָרְדֳּכָי
  english_pob_choice: in Mordecai's name
  chosen_spanish: en nombre de Mardoqueo
  alternatives_spanish:
  - en el nombre de Mardoqueo
  - a nombre de Mardoqueo
  - en representación de Mardoqueo
  lexicon: HALOT
  rationale: בשם puede indicar atribución de origen o representación. La POB inglesa preserva la formulación «in Mordecai's name»; «en nombre de Mardoqueo» mantiene esa atribución sin convertirla por completo en una paráfrasis de representación, aunque esa idea sigue siendo posible según el contexto.
translation_notes:
  revision_awareness: La POB inglesa revisó «spoke to the king» por «told the king» para reflejar con más precisión el verbo de habla. La redacción española ya usa «le dijo», alineada con esa revisión y con el flujo narrativo de los dos verbos consecutivos de comunicación.
  spanish_consistency_notes:
  - Se mantuvo «Mardoqueo» y «Ester» como formas estándar en español bíblico, sin introducir variantes tradicionales innecesarias.
  - Se evitó «SEÑOR» u այլ terminología de máscara divina porque el versículo no contiene nombres divinos ni títulos teológicos.
  - «La reina Ester» conserva la apposición del hebreo sin volverla rígida o arcaizante.
