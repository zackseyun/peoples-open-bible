translation:
  language: es
  text: Y Shaharaim engendró hijos en el territorio de Moab[a], después de despedir[b] a Hushim y a Baara, sus esposas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el campo de Moab» o «en la región/territorio de Moab». «Territorio» expresa el sentido geográfico probable de שָׂדֶה en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «desde/de su despedirlas»; la frase probablemente significa «después de despedir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שַׁחֲרַיִם
  english_pob_choice: And Shaharaim
  chosen_spanish: Y Shaharaim
  alternatives_spanish:
  - Ahora Shaharaim
  - Y Saharaim
  lexicon: HALOT
  rationale: La conjunción וְ conserva el enlace genealógico del verso; en español, «Y» mantiene ese flujo. El nombre propio se translitera para seguir la política del proyecto.
- source_word: הוֹלִיד
  english_pob_choice: fathered children
  chosen_spanish: engendró hijos
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo causativo expresa paternidad/engendramiento. «Engendró hijos» es natural en español y mantiene el sentido genealógico sin añadir descendientes específicos que el versículo no nombra.
- source_word: בִּ/שְׂדֵה מוֹאָב
  english_pob_choice: in the country of Moab
  chosen_spanish: en el territorio de Moab
  alternatives_spanish:
  - en el campo de Moab
  - en la región de Moab
  - en el país de Moab
  lexicon: HALOT
  rationale: שָׂדֶה puede significar literalmente «campo», pero en una expresión geográfica apunta al ámbito territorial. «Territorio de Moab» conserva esa idea con español natural y evita una lectura demasiado agrícola.
- source_word: מִן שִׁלְח/וֹ אֹתָם
  english_pob_choice: after he sent away
  chosen_spanish: después de haber despedido
  alternatives_spanish:
  - después de enviarlos lejos
  - cuando los despidió
  - a partir de su despedida
  lexicon: HALOT
  rationale: 'La construcción con מִן + infinitivo señala circunstancia temporal: «después de / desde que». «Después de haber despedido» reproduce bien esa relación en español y evita una traducción mecánica del giro hebreo.'
- source_word: חוּשִׁים
  english_pob_choice: Hushim
  chosen_spanish: Hushim
  alternatives_spanish:
  - Jusim
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma cercana al audit trail en inglés y al uso onomástico del texto.
- source_word: וְ/אֶת בַּעֲרָא
  english_pob_choice: and Baara
  chosen_spanish: y a Baara
  alternatives_spanish:
  - y Baara
  - y Baará
  lexicon: HALOT
  rationale: El marcador de objeto directo introduce el segundo nombre; en español resulta natural explicitar la preposición personal «a» ante el nombre propio femenino.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus mujeres casadas
  lexicon: HALOT
  rationale: El sustantivo con sufijo se refiere aquí claramente a relaciones conyugales. «Esposas» comunica con claridad el valor marital y evita una versión genérica de «mujeres».
translation_notes:
  revision_awareness: El texto base en inglés fue revisado previamente y quedó sin cambios; esta propuesta mantiene su lectura de conjunto, pero ajusta el español para reflejar con mayor naturalidad la construcción hebrea מִן + infinitivo y el valor geográfico de בִּשְׂדֵה מוֹאָב.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva la transliteración de los nombres propios para coherencia onomástica.
  - «Esposas» se usa por el claro contexto matrimonial de נָשָׁיו.
  - La frase temporal «después de haber despedido» intenta preservar el matiz relacional de מִן שִׁלְחוֹ sin sonar forzada en español.
