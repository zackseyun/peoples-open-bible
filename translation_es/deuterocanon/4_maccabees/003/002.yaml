review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: la razón no extirpa el deseo, pero sí puede hacer posible no quedar sometido a él. Conserva adecuadamente οἷον como introducción ejemplificadora, ἐκκόψαι con imagen de corte, δουλωθῆναι con metáfora de esclavitud, y λογισμός como «la razón». Sin embargo, «ninguno de tus deseos» suena algo forzado con singular griego genérico, y «ser esclavizado por el deseo» es fiel pero menos natural que «ser esclavo del deseo» o «quedar esclavizado al deseo» en este contexto. Además, la nota al pie con «proveer que» no es español natural.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita un ajuste menor de naturalidad y estilo. «Cortar ninguno de tus deseos» y «proveer que uno no sea...» resultan poco idiomáticos en español general. Una formulación más fluida mantiene la fidelidad sin calco innecesario.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: λογισμός -> «la razón»; δουλωθῆναι mantiene la metáfora de esclavitud; ἐπιθυμία/ἐπιθυμίᾳ se conserva con «deseo». No hay conflicto con términos teológicos principales del glosario. La mejora propuesta solo pule la idiomaticidad española.'
  issues:
  - severity: medium
    issue: «cortar ninguno de tus deseos» suena poco natural en español
    rationale: Aunque reproduce literalmente la imagen de ἐκκόψαι, en español fluye mejor «cortar de raíz alguno de tus deseos» o «extirpar». Conviene conservar la viveza metafórica sin crear una construcción áspera.
  - severity: medium
    issue: La nota al pie usa «proveer que», que no es idiomático
    rationale: El inglés formal «provide that one not be enslaved» no debe calcarses como «proveer que». En español formal natural, mejor «hacer posible que uno no sea esclavo del deseo» o «disponer que...» según contexto.
  - severity: low
    issue: «ser esclavizado por el deseo» es fiel pero algo pesado
    rationale: Puede mejorarse a «ser esclavo del deseo» sin perder la metáfora central de δουλωθῆναι; además evita una pasiva perifrástica dura.
  revised_spanish_text: Por ejemplo[a], la razón no puede cortar de raíz alguno de tus deseos, pero la razón puede hacer posible que uno no sea esclavo del deseo.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «la razón puede hacer posible que uno no sea esclavo del deseo».'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español manteniendo el sentido del griego y del audit trail inglés. «Cortar de raíz» conserva la imagen vívida de ἐκκόψαι mejor que «cortar ninguno», y «que uno no sea esclavo del deseo» expresa la metáfora de δουλωθῆναι de manera más idiomática que «ser esclavizado por el deseo». La nota al pie también se ajustó para evitar el calco poco natural «proveer que».
