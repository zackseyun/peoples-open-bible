translation:
  language: es
  text: 'Araunah el rey dio todo esto al rey[a]. Y Araunah dijo al rey[b]: «Yahvé tu Dios te acepte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Araunah el rey». Algunas traducciones suavizan esta expresión para no sugerir un estatus real para Araunah, pero el texto hebreo sí incluye el título.'
    reason: alternative_reading
  - marker: b
    text: 'O: «te sea propicio», «te favorezca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּל
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todo
  - todo aquello
  lexicon: HALOT
  rationale: El hebreo apunta al conjunto de los elementos recién ofrecidos; «todo esto» conserva esa referencia inmediata y la idea de totalidad sin sonar forzado en español.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - entregó
  lexicon: HALOT
  rationale: En narrativa, el perfecto hebreo se vierte naturalmente con pasado simple. «Dio» mantiene la acción directa de ofrecer o ceder los elementos.
- source_word: אֲרַוְנָה
  english_pob_choice: Araunah
  chosen_spanish: Araunah
  alternatives_spanish:
  - Ornan
  lexicon: transliteración tradicional del nombre en Samuel
  rationale: Se conserva la forma de Samuel, no la paralela de Crónicas, porque el texto fuente aquí nombra a Araunah.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: 'El hebreo presenta un título en aposición: «Araunah el rey». En español debe mantenerse esa estructura, aunque resulte inusual, para no borrar el rasgo textual.'
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  lexicon: HALOT
  rationale: La preposición ל introduce aquí al destinatario; «al rey» expresa de forma natural que los bienes fueron dados a David.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La conjunción narrativa avanza la escena; «Y» es breve y fiel, sin añadir matiz interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» en el texto principal y no sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios de ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona masculina singular se refleja con posesivo natural en español. «Tu Dios» preserva la relación personal sin sobreexplicar.
- source_word: יִרְצֶךָ
  english_pob_choice: accept you
  chosen_spanish: te acepte
  alternatives_spanish:
  - te sea propicio
  - te favorezca
  lexicon: HALOT
  rationale: En este contexto ritual y relacional, רצה expresa aceptación favorable. «Te acepte» es conciso y reproduce bien la fuerza de beneplácito del verbo.
theological_decisions:
- issue: Cómo verter el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el nombre de pacto; el español debe conservarlo como nombre propio y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preservación del título 'el rey' aplicado a Araunah
  english_pob_reading: Retain 'Araunah the king' in the main text
  chosen_spanish_reading: Mantener «Araunah el rey»
  alternative_spanish_readings:
  - Araunah dio todo esto al rey
  - Araunah, rey, dio todo esto al rey
  rationale: La aposición está en el hebreo y no hay base para eliminarla. Aunque sea extraña, debe conservarse para respetar la forma del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No hubo cambios en la última pasada de revisión; el veredicto de comprobación fue de alta coincidencia y sin alteraciones necesarias.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en todo el texto.
  - Se mantiene «Araunah el rey» para reflejar la aposición hebrea explícita.
  - Se usa un estilo bíblico moderno y claro, sin caer en arcaísmos innecesarios.
  - La segunda persona singular se conserva de manera consistente con el hebreo.
  - No se introduce puntuación interpretativa adicional fuera de la necesaria para la cita directa.
