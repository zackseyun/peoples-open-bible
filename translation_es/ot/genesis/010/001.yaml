translation:
  language: es
  text: 'Ahora bien, estas son las generaciones de los hijos de Noé: Sem[a], Cam y Jafet. Y les nacieron hijos varones después del diluvio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las descendencias de los hijos de Noé». El término hebreo de encabezado puede abarcar linaje o lo que procede de una persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: La partícula introductoria וְ con demostrativo abre una nueva sección genealógica. «Ahora bien» conserva el valor discursivo de transición sin sonar demasiado literal ni perder naturalidad en español.
- source_word: תּוֹלְדֹת
  english_pob_choice: the generations of
  chosen_spanish: las generaciones de
  alternatives_spanish:
  - los descendientes de
  - el linaje de
  - el relato de
  lexicon: HALOT
  rationale: Se mantiene la fórmula técnica de Génesis «generaciones de» para reflejar la estructura literaria del libro y no estrechar el sentido a solo descendencia biológica.
- source_word: בְּנֵי נֹחַ
  english_pob_choice: the sons of Noah
  chosen_spanish: los hijos de Noé
  alternatives_spanish:
  - los hijos de Noé
  lexicon: HALOT
  rationale: «Hijos de Noé» reproduce bien el hebreo constructo y es natural en español bíblico contemporáneo. Aquí «hijos» conserva el valor genealógico masculino del contexto.
- source_word: שֵׁם חָם וָ/יָפֶת
  english_pob_choice: Shem, Ham, and Japheth
  chosen_spanish: Sem, Cam y Jafet
  alternatives_spanish:
  - Shem, Ham y Japhet
  lexicon: HALOT
  rationale: Son nombres propios transliterados según el uso bíblico estándar en español del proyecto. Se conserva la secuencia nominal sin añadir interpretación.
- source_word: וַ/יִּוָּלְד֥וּ
  english_pob_choice: And sons were born
  chosen_spanish: Y les nacieron
  alternatives_spanish:
  - Y fueron nacidos
  - Y nacieron
  lexicon: HALOT
  rationale: El nifal de ילד expresa nacimiento pasivo/intransitivo. «Les nacieron» es una solución idiomática en español que conserva la relación dativa de לָהֶם y el carácter pasivo del verbo.
- source_word: לָ/הֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: En español, el dativo clítico «les» expresa de forma natural la relación marcada por לָהֶם con el verbo de nacimiento.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino, en español «hijos» funciona como equivalente genealógico natural y evita una dureza innecesaria en una fórmula narrativa breve. El contexto de la lista de descendientes mantiene el referente masculino sin ambigüedad importante.
- source_word: אַחַ֥ר הַ/מַּבּֽוּל
  english_pob_choice: after the flood
  chosen_spanish: después del diluvio
  alternatives_spanish:
  - después del gran diluvio
  - tras el diluvio
  lexicon: HALOT
  rationale: «Diluvio» es el equivalente claro y tradicional de מַבּוּל en Génesis. «Después de» conserva el valor temporal del hebreo אַחַר sin sobretraducirlo.
theological_decisions:
- issue: Fórmula genealógica de תּוֹלְדֹת
  english_pob_reading: the generations of
  chosen_spanish_reading: las generaciones de
  alternative_spanish_readings:
  - los descendientes de
  - el linaje de
  rationale: Se conserva la fórmula canónica de Génesis para mantener la función literaria de encabezado estructural. Traducirla solo como «descendientes» estrecharía el alcance del término hebreo y perdería su uso programático en el libro.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor masculino de בָּנִים en el contexto genealógico
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - varones
  rationale: El hebreo es masculino y el contexto es una genealogía de descendientes masculinos nombrados. «Hijos» conserva la referencia sin forzar una traducción marcadamente técnica o poco natural en español.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relación de nacimiento expresada por וַיִּוָּלְדוּ לָהֶם
  english_pob_reading: And sons were born to them
  chosen_spanish_reading: Y les nacieron
  alternative_spanish_readings:
  - Y fueron nacidos a ellos
  - Y nacieron para ellos
  rationale: La forma española con dativo («les nacieron») comunica bien el hebreo pasivo y evita convertir el verbo en una construcción artificial. Mantiene el enfoque en que los hijos son el resultado que les sobrevino, no una acción de ellos.
  doctrine_reference: Translation philosophy §2 (Source-led naturalness)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para añadir «And» al inicio de la segunda oración, reflejando el ו hebreo. En español también se conserva esa coordinación con «Y» para no perder la continuidad sintáctica del original.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio de la segunda oración para reflejar la coordinación hebrea.
  - Se conserva la fórmula de encabezado «las generaciones de» por consistencia con Génesis.
  - «Diluvio» se usa para מַבּוּל en coherencia con el pasaje y el uso bíblico español.
  - 'Los nombres propios siguen la transliteración bíblica estándar: Noé, Sem, Cam, Jafet.'
