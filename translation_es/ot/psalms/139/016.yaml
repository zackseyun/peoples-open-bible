translation:
  language: es
  text: 'Tus ojos vieron mi forma aún informe[a], y en tu libro fueron escritos todos ellos: los días que fueron formados[c][b], cuando todavía no existía ninguno de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi embrión» / «mi forma aún no terminada». La palabra hebrea se refiere a algo que todavía no está plenamente formado.
    reason: lexical_alternative
  - marker: b
    text: O «todos ellos fueron escritos en tu libro; los días fueron formados». La sintaxis hebrea es comprimida y difícil.
    reason: alternative_reading
  - marker: c
    text: «Fueron formados» también puede rendirse como «fueron moldeados»; algunas traducciones usan «fueron ordenados», pero eso es más interpretativo que el verbo hebreo básico.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלְמִי
  english_pob_choice: my unformed substance
  chosen_spanish: mi sustancia informe
  alternatives_spanish:
  - mi embrión
  - mi forma aún no terminada
  - mi cuerpo informe
  lexicon: HALOT
  rationale: גֹּלֶם alude a algo no formado o aún sin acabado. «Sustancia informe» conserva la idea de algo real pero todavía sin forma definida, sin introducir una especificación biológica más precisa que el hebreo no obliga.
- source_word: רָאוּ עֵינֶיךָ
  english_pob_choice: your eyes saw
  chosen_spanish: tus ojos vieron
  alternatives_spanish:
  - tus ojos han visto
  lexicon: HALOT
  rationale: La construcción hebrea con el sujeto «tus ojos» se traduce de manera directa y natural. En español, el pretérito simple comunica bien el acto contemplativo del poema.
- source_word: וְעַל סִפְרְךָ
  english_pob_choice: and in your book
  chosen_spanish: y en tu libro
  alternatives_spanish:
  - y sobre tu libro
  lexicon: HALOT
  rationale: Aunque עַל suele ser «sobre», con «libro» el sentido idiomático es de registro escrito. «En tu libro» expresa esa imagen de inscripción sin forzar el español.
- source_word: כֻּלָּם
  english_pob_choice: they all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - ellos todos
  lexicon: HALOT
  rationale: El hebreo mantiene el pronombre de manera compacta. «Todos ellos» preserva la referencia explícita y suena natural en español, sin perder la relación con lo escrito en el libro.
- source_word: יִכָּתֵבוּ
  english_pob_choice: were written
  chosen_spanish: fueron escritos
  alternatives_spanish:
  - fueron registrados
  - serían escritos
  lexicon: HALOT
  rationale: El nifal de כתב se rinde con un pasivo concreto. «Fueron escritos» conserva la imagen del libro mejor que «fueron registrados», y no añade una modalización interpretativa excesiva.
- source_word: יָמִים
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - días
  lexicon: HALOT
  rationale: El antecedente más probable de «todos ellos» son los días. Explicitarlo en español aclara la sintaxis comprimida del verso sin abandonar el sentido poético.
- source_word: יֻצָּרוּ
  english_pob_choice: were formed
  chosen_spanish: fueron formados
  alternatives_spanish:
  - fueron moldeados
  - fueron fashionados
  lexicon: HALOT
  rationale: El pual de יצר significa «ser formado / moldeado». «Fueron formados» sigue de cerca la imagen básica y evita elevarla a «ordenados» u otra lectura más interpretativa.
- source_word: וְלֹא אֶחָד בָּהֶם
  english_pob_choice: when not one of them yet existed
  chosen_spanish: cuando todavía no existía ninguno de ellos
  alternatives_spanish:
  - y no existía aún ninguno de ellos
  - antes de que existiera uno solo de ellos
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica y difícil. La opción elegida expresa la anterioridad temporal implícita, manteniendo la tensión del original sin resolverla de modo especulativo.
theological_decisions:
- issue: Si el verso debe sonar como una afirmación fuerte de predestinación mediante «ordenados» o equivalente
  english_pob_reading: Use 'were formed' rather than 'were ordained' to preserve the lexical force of יצר and the theological tension.
  chosen_spanish_reading: Mantener «fueron formados» en vez de «fueron ordenados» o «decretados».
  alternative_spanish_readings:
  - fueron ordenados
  - fueron decretados
  - fueron dispuestos
  rationale: El hebreo presenta formación previa y conocimiento divino, pero el verbo básico es «formar», no un término técnico de decreto. La traducción española conserva esa tensión y no la resuelve hacia una afirmación doctrinal más fuerte que la que el texto exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo representar la relación temporal final sin añadir una interpretación no explícita
  english_pob_reading: '''when not one of them yet existed'' makes the implied idea explicit in idiomatic English.'
  chosen_spanish_reading: «cuando todavía no existía ninguno de ellos»
  alternative_spanish_readings:
  - cuando aún no existía ninguno de ellos
  - antes de que existiera uno solo de ellos
  rationale: El hebreo es condensado; el español necesita una formulación clara. La opción elegida explicita la anterioridad sin introducir una lectura dogmática o cronológica más precisa de la que el texto ofrece.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que eliminó «for me» porque no está explícito en el hebreo. Por eso la cláusula final no añade un complemento equivalente. También conserva la imagen concreta de «escritos» y «formados», evitando la solución interpretativa más fuerte de «ordenados» que el audit trail desaconseja.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino; por eso no aparece en el texto.
  - '«Libro», «escritos» y «formados» conservan las imágenes paralelas del verso: registro y formación.'
  - La puntuación con dos puntos separa con naturalidad las dos cola poéticas sin alterar la relación sintáctica del hebreo.
  - Las notas a pie de página preservan las alternativas documentadas por el audit trail y la ambigüedad sintáctica del final.
