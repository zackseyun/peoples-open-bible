review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el contraste hebreo entre el toque ordinario para reunir al pueblo y la señal distintiva de alarma. Sin embargo, «cuando se reúna la congregación» desplaza el sentido causativo de וּבְהַקְהִיל («cuando reúnan / al reunir») hacia un intransitivo pasivo-medio, y «tocarán» sin complemento puede sonar demasiado absoluto en español. Además, la nota al pie no preserva la alternativa léxica clave documentada en el POB inglés para el contraste entre tocar y tocar señal de alarma.
  spanish_quality_summary: El español es claro y natural, pero conviene ajustar la sintaxis para reflejar mejor que el sujeto implícito reúne a la congregación, no simplemente que esta se reúne. «Harán sonar» funciona mejor en paralelo con «no tocarán señal de alarma» y mantiene el contraste técnico sin añadir «las trompetas» al texto principal.
  glossary_alignment: «Congregación» es aceptable para קָהָל y armoniza con la decisión inglesa. No hay conflictos con la terminología teológica del proyecto. La principal corrección es aspectual/sintáctica en וּבְהַקְהִיל y la preservación de la alternativa léxica sobre תָרִיעוּ en nota.
  issues:
  - severity: medium
    issue: «cuando se reúna la congregación» debilita el valor causativo de וּבְהַקְהִיל
    rationale: El hebreo expresa ‘cuando hagan reunir / al reunir’ la congregación, no meramente ‘cuando la congregación se reúna’. En este contexto legal-instruccional, la forma española debería reflejar mejor la acción de convocarla.
  - severity: medium
    issue: Falta una nota que preserve la alternativa léxica principal del POB inglés sobre la alarma
    rationale: La nota inglesa marca explícitamente la opción ‘blow an alarm blast’ y explica el contraste técnico entre el toque ordinario y la señal de partida. La nota española actual solo da una alternativa para «congregación», que es válida pero no reproduce esa decisión auditada más importante.
  - severity: low
    issue: «tocarán» puede sonar algo elíptico en español
    rationale: Aunque es posible por contexto, «harán sonar» resulta más idiomático y claro en una instrucción sobre trompetas, sin añadir un objeto ausente en hebreo.
  revised_spanish_text: Pero cuando reúnan a la congregación[a], harán sonar, y no tocarán señal de alarma[b].
