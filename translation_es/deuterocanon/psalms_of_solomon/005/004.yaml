- from: Porque nadie tomará despojos[a] de un hombre poderoso[b].
  to: Porque nadie tomará botín[a] de manos de un hombre poderoso[b][c].
  rationale: Se revisa para reflejar mejor παρὰ con genitivo mediante 'de manos de', usar un término más idiomático en español moderno ('botín') manteniendo 'despojos' como alternativa, y preservar la nota del rastro inglés sobre la lectura previa con sujeto explícito 'él'.
