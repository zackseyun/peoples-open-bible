  lexicon: HALOT
  rationale: Nombre propio masculino; se translitera al español como «Ira» para conservar la forma breve y reconocible del hebreo, igual que la decisión inglesa de no traducirlo.
- source_word: הַיִּתְרִי
  english_pob_choice: the Ithrite
  chosen_spanish: el itrita
  alternatives_spanish:
