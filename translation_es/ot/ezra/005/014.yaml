translation:
  language: es
  text: Además, los vasos[a] de oro y de plata de la casa de Dios, que Nabucodonosor había sacado del templo que estaba en Jerusalén y había llevado al templo de Babilonia, estos los sacó Ciro el rey del templo de Babilonia y se los dio a uno llamado Sesbasar, a quien había puesto por gobernador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y se los dio a Sesbasar —su nombre—, a quien había hecho gobernador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Y además
  lexicon: HALOT
  rationale: La partícula aramea es aditiva e introduce un elemento נוסף del relato. «Además» conserva ese valor sin sonar demasiado rígido en español.
- source_word: מָאנַיָּא
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasijas
  - objetos
  - vasos
  lexicon: HALOT
  rationale: En contexto cultual, el término puede abarcar implementos del templo. «Utensilios» es suficientemente amplio y natural en español, sin limitarse indebidamente a recipientes.
- source_word: בֵית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Dios», que distingue este sintagma del siguiente הֵיכְלָא («templo»).
- source_word: דִּי דַהֲבָה וְכַסְפָּא
  english_pob_choice: gold and silver
  chosen_spanish: de oro y de plata
  alternatives_spanish:
  - dorados y plateados
  - de oro y plata
  lexicon: HALOT
  rationale: Son genitivos de material; en español fluye mejor con la construcción atributiva «de oro y de plata».
- source_word: הַנְפֵּק
  english_pob_choice: had taken out
  chosen_spanish: había sacado
  alternatives_spanish:
  - había extraído
  - sacó
  lexicon: HALOT
  rationale: El valor narrativo anterior al resto de la acción se expresa bien con pretérito pluscuamperfecto. «Sacar» refleja el verbo de salida/remoción del objeto sagrado.
- source_word: הֵיכְלָא
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - palacio
  - santuario
  lexicon: HALOT
  rationale: Aquí el referente es el templo de Jerusalén y el templo de Babilonia; «templo» es la equivalencia directa y correcta.
- source_word: וְהֵיבֵל הִמּוֹ
  english_pob_choice: and brought them
  chosen_spanish: y había llevado
  alternatives_spanish:
  - y los llevó
  - y los trajo
  lexicon: HALOT
  rationale: La acción de traslado queda bien en «había llevado». El objeto pronominal ya está contextualizado por el sintagma anterior, y no hace falta repetirlo aquí.
- source_word: הַנְפֵּק הִמּוֹ
  english_pob_choice: these Cyrus the king took out
  chosen_spanish: estos Ciro el rey los sacó
  alternatives_spanish:
  - estos el rey Ciro los sacó
  - Ciro el rey los sacó
  lexicon: HALOT
  rationale: Se refleja el resumptivo arameo con «estos», como en la revisión inglesa. Mantener «Ciro el rey» respeta el orden semítico sin perder naturalidad.
- source_word: וִיהִיבוּ
  english_pob_choice: and gave
  chosen_spanish: y los entregó
  alternatives_spanish:
  - y dio
  - y se los dio
  lexicon: HALOT
  rationale: «Entregar» comunica mejor la transferencia formal de objetos del templo que un simple «dar».
- source_word: לְשֵׁשְׁבַּצַּר
  english_pob_choice: to one named Sheshbazzar
  chosen_spanish: a Sesbasar
  alternatives_spanish:
  - a Sheshbazzar
  - a un hombre llamado Sesbasar
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional/transliterada «Sesbasar», transparente y legible. El arameo no exige reproducir la fórmula explicativa «llamado» si el nombre ya identifica al destinatario.
- source_word: שְׁמֵהּ
  english_pob_choice: named
  chosen_spanish: a quien había nombrado
  alternatives_spanish:
  - cuyo nombre era
  - llamado
  lexicon: HALOT
  rationale: La fórmula de nombre se integra de modo natural con la cláusula relativa siguiente. En español, «a quien había nombrado» conserva la identificación y evita una repetición forzada.
- source_word: פֶחָה
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - prefecto
  - gobernante provincial
  lexicon: HALOT
  rationale: Es el título administrativo persa estándar; «gobernador» es claro y corresponde al sentido del hebreo/arameo en este contexto.
- source_word: שָׂמֵהּ
  english_pob_choice: had appointed
  chosen_spanish: había nombrado
  alternatives_spanish:
  - había designado
  - había puesto
  lexicon: HALOT
  rationale: «Nombrar» expresa bien la instalación oficial en el cargo. El pluscuamperfecto preserva la anterioridad respecto a la entrega de los utensilios.
theological_decisions:
- issue: Mantener la expresión «casa de Dios» junto con «templo»
  english_pob_reading: the house of God ... the temple of Babylon
  chosen_spanish_reading: la casa de Dios ... el templo de Babilonia
  alternative_spanish_readings:
  - el templo de Dios ... el templo de Babilonia
  - la casa de Dios ... la casa de Babilonia
  rationale: 'El texto distingue dos términos: בֵית אֱלָהָא y הֵיכְלָא. Conservar ambos con valores distintos evita borrar una distinción léxica real del arameo.'
  doctrine_reference: Distinción léxica y cultual del texto; no implica una diferencia doctrinal adicional.
- issue: Tratamiento del título administrativo פֶחָה
  english_pob_reading: governor
  chosen_spanish_reading: gobernador
  alternative_spanish_readings:
  - prefecto
  - gobernante provincial
  rationale: No hay tensión doctrinal; se opta por el título funcional más comprensible para lectores contemporáneos sin perder el carácter oficial del cargo.
  doctrine_reference: Contexto histórico-administrativo persa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el resumptivo ''these'' antes de Ciro se reflejó con «estos», y se evitó duplicar el objeto tras «llevó» para mantener fluidez y fidelidad al arameo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, pero en este versículo el texto fuente dice אֱלָהָא y la expresión equivalente correcta en español es «Dios».
  - Se mantiene el paralelismo léxico entre «casa de Dios» y «templo» para respetar la diferencia entre בֵית אֱלָהָא y הֵיכְלָא.
  - «Sesbasar» sigue la transliteración española habitual del nombre propio arameo; no se introduce una forma híbrida.
  - El pluscuamperfecto («había sacado», «había llevado», «había nombrado») ayuda a reflejar la secuencia anterior al acto de Ciro sin alterar el sentido del relato.
