revisions:
- from: 'Porque es testigo entre nosotros y ustedes, y entre nuestras generaciones después de nosotros, para que sirvamos[a] el servicio de Yahvé[b] delante de él con nuestros holocaustos, nuestros sacrificios y nuestros sacrificios de paz[c], para que sus hijos no digan a nuestros hijos mañana[d]: “No tienen parte en Yahvé.”'
  to: 'Porque es testigo entre nosotros y ustedes, y entre las generaciones que vendrán después de nosotros, para que realicemos[a] el servicio de Yahvé delante de él, con nuestros holocaustos, nuestros sacrificios y nuestros sacrificios de paz[b], para que sus hijos no digan a nuestros hijos en el futuro[c]: «No tienen parte[d] en Yahvé».'
  rationale: 'Se revisa el texto para mejorar la fidelidad semántica y la naturalidad del español: se reemplaza la construcción poco idiomática «sirvamos el servicio» por «realicemos el servicio»; se traslada el literal hebreo «mañana» a una nota y se expresa en el texto el sentido contextual «en el futuro»; se añade la alternativa «porción» para חֵלֶק, en línea con el rastro inglés; y se suaviza la expresión sobre las generaciones futuras para una lectura más natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:40:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: el altar como testigo entre las partes y las generaciones futuras, el servicio cultual ante Yahvé, y la prevención de una futura exclusión. Sin embargo, dos decisiones importantes requieren ajuste: (1) לַעֲבֹד אֶת עֲבֹדַת יְהוָה no suena natural en español como "sirvamos el servicio"; conviene un giro idiomático que preserve el matiz cultual, como "realicemos el servicio de Yahvé". (2) מָחָר en este contexto es idiomático para el futuro; dejar "mañana" en el texto principal crea una lectura temporal demasiado estrecha en español, por lo que debe pasar a nota y el texto debe decir "en el futuro" o equivalente. También falta reflejar en nota la alternativa de "porción" para חֵלֶק, preservada en el rastro inglés.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una rigidez innecesaria en "sirvamos el servicio" y una literalidad poco natural en "mañana". Además, "después de nosotros" con "generaciones" es entendible, pero "las generaciones que vendrán después de nosotros" fluye mejor. El resto del registro, incluida la puntuación y el uso de Yahvé, es adecuado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה = "Yahvé" está correctamente preservado; términos sacrificiales como "holocaustos" y "sacrificios de paz" son aceptables. La principal mejora terminológica es expresar עֲבֹדַת יְהוָה de forma cultual e idiomática en español sin perder el valor de "servicio".'
  issues:
  - severity: high
    issue: '"sirvamos el servicio de Yahvé" es una construcción poco natural en español'
    rationale: Aunque intenta reflejar la raíz repetida עבד, produce una frase dura y poco idiomática. "Realicemos el servicio de Yahvé" o "cumplamos el servicio de Yahvé" conserva mejor el sentido cultual y la legibilidad.
  - severity: high
    issue: '"mañana" en el texto principal distorsiona el sentido idiomático de מָחָר'
    rationale: En este contexto hebreo significa "en el futuro / más adelante". Mantener "mañana" como texto principal sugiere un día literal siguiente, algo menos fiel para lectores de español.
  - severity: medium
    issue: Falta una nota para la alternativa de חֵלֶק como "porción"
    rationale: El rastro inglés preserva explícitamente la alternativa "portion". Conviene mantener esa posibilidad en español con una nota en "parte".
  - severity: low
    issue: '"nuestras generaciones después de nosotros" es comprensible pero poco fluido'
    rationale: Una formulación como "las generaciones que vendrán después de nosotros" suena más natural sin apartarse del sentido fuente.
  revised_spanish_text: 'Porque es testigo entre nosotros y ustedes, y entre las generaciones que vendrán después de nosotros, para que realicemos[a] el servicio de Yahvé delante de él, con nuestros holocaustos, nuestros sacrificios y nuestros sacrificios de paz[b], para que sus hijos no digan a nuestros hijos en el futuro[c]: «No tienen parte[d] en Yahvé».'
  revised_footnotes:
