translation:
  language: es
  text: 'Entonces ella cayó sobre su rostro y se inclinó a tierra, y le dijo: «¿Por qué he hallado favor ante tus ojos, para que te fijes en mí[a], siendo yo una mujer extranjera?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me tomes en cuenta», «me prestes atención», «me reconozcas» o «me consideres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עַל־פָּנֶיהָ
  english_pob_choice: she fell on her face
  chosen_spanish: cayó sobre su rostro
  alternatives_spanish:
  - cayó de bruces
  - cayó con el rostro en tierra
  lexicon: HALOT
  rationale: Conserva la imagen idiomática de caída sobre el rostro sin volverla rígida. «Sobre su rostro» mantiene la correspondencia con el hebreo y es natural en español bíblico digno.
- source_word: וַתִּשְׁתַּחוּ אָרְצָה
  english_pob_choice: bowed to the ground
  chosen_spanish: se inclinó a tierra
  alternatives_spanish:
  - se postró en tierra
  - se prosternó hasta el suelo
  lexicon: HALOT
  rationale: El verbo expresa una inclinación/prostración respetuosa. «Se inclinó a tierra» conserva el gesto sin cargarlo de sentido cultual que el contexto narrativo no exige.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Para qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, fiel al valor causal de la partícula.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: have I found favor in your eyes
  chosen_spanish: he hallado favor ante tus ojos
  alternatives_spanish:
  - he hallado gracia ante tus ojos
  - he encontrado favor a tus ojos
  lexicon: HALOT
  rationale: «Favor» reproduce la fórmula social del hebreo; «ante tus ojos» mantiene la imagen semítica de valoración personal. Se evita «gracia» por su carga teológica en español.
- source_word: לְהַכִּירֵנִי
  english_pob_choice: that you should take notice of me
  chosen_spanish: para que me reconozcas
  alternatives_spanish:
  - para que me tomes en cuenta
  - para que me prestes atención
  - para que me hagas caso
  lexicon: HALOT
  rationale: El hiphil de נכר aquí puede significar reconocer o notar favorablemente. «Me reconozcas» es breve, fiel y deja abierta la gama semántica que el inglés POB documenta.
- source_word: וְאָנֹכִי נָכְרִיָּה
  english_pob_choice: though I am a foreign woman
  chosen_spanish: siendo yo una mujer extranjera
  alternatives_spanish:
  - aunque soy una mujer extranjera
  - pues yo soy una mujer extranjera
  - siendo yo extranjera
  lexicon: HALOT
  rationale: «Mujer extranjera» preserva el femenino del hebreo. «Siendo yo» expresa el matiz concesivo que el hebreo aporta en contexto, sin perder fluidez.
theological_decisions:
- issue: La reverencia de Rut no debe convertirse en adoración
  english_pob_reading: Rendered as a gesture of respectful prostration before Boaz, not worship
  chosen_spanish_reading: Se entiende como un gesto de profunda reverencia y respeto ante Booz, no como adoración
  alternative_spanish_readings:
  - Se podría traducir con «adoró»
  - Se podría enfatizar simplemente «saludó reverentemente»
  rationale: El contexto narrativo es interpersonal. Traducir con un verbo de culto introduciría una afirmación que el hebreo no requiere. «Se inclinó a tierra» conserva la deferencia física sin teologizarla.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran alto acuerdo y no registran revisiones aplicadas. La versión española mantiene esa estabilidad: conserva la escena de postración, el interrogativo causal, la fórmula de favor, la posible gama semántica de לְהַכִּירֵנִי y el matiz concesivo de la cláusula final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Booz» se mantiene como forma castellana del nombre propio en coherencia con el uso bíblico en español.
  - Se prefiere «favor» a «gracia» para respetar el valor social del pasaje y evitar una lectura doctrinal no presente en el contexto.
