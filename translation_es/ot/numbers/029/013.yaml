translation:
  language: es
  text: 'Y presentaréis un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: trece toros del ganado, dos carneros y catorce corderos machos de un año; serán sin defecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de aroma suave» o «de aroma dulce». El hebreo רֵיחַ נִיחֹחַ expresa que la ofrenda es aceptable a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: presentaréis
  alternatives_spanish:
  - ofreceréis
  - haréis presentar
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa traer/presentar una ofrenda. «Presentaréis» conserva el matiz cultual y suena natural en español bíblico moderno.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un ascenso
  lexicon: HALOT
  rationale: Para עֹלָה, «holocausto» es el equivalente español tradicional y preciso para la ofrenda completamente consumida por el fuego. Se mantiene la categoría sacrificial, no una paráfrasis.
- source_word: אִשֵּׁה
  english_pob_choice: an offering by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: El término denota una ofrenda hecha por fuego. «Encendida» comunica el valor semántico sin sonar tan áspero como una calca literal, y sigue siendo auditable respecto del hebreo.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de aroma apacible
  - de aroma suave
  lexicon: HALOT
  rationale: La expresión idiomática no describe solo olor físico, sino la aceptación de la ofrenda. «De aroma agradable» preserva la fuerza idiomática sin introducir una interpretación más fuerte que el hebreo.
- source_word: לַֽיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». La preposición hebrea exige «a» aquí, conforme al destino cultual de la ofrenda.'
- source_word: פָּרִים בְּנֵי בָקָר
  english_pob_choice: thirteen bulls from the herd
  chosen_spanish: trece becerros del ganado
  alternatives_spanish:
  - trece toros del ganado
  - trece becerros de la vacada
  lexicon: HALOT
  rationale: La expresión literal significa «toros/becerros, hijos del ganado». «Becerros del ganado» refleja el clasificativo hebreo y evita forzar la edad adulta que «toros» podría sugerir en español.
- source_word: שְׁלֹשָׁה עָשָׂר
  english_pob_choice: thirteen
  chosen_spanish: trece
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - moruecos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español común y claro para machos ovinos adultos usados en sacrificio.
- source_word: שְׁנָיִם
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  english_pob_choice: male lambs a year old
  chosen_spanish: catorce corderos macho de un año
  alternatives_spanish:
  - catorce corderos de un año
  - catorce corderos machos de un año
  lexicon: HALOT
  rationale: El hebreo indica corderos machos con la edad expresada por «hijos de un año». «De un año» reproduce con naturalidad la especificación temporal y conserva el rasgo de sexo en español.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - perfectos
  lexicon: HALOT
  rationale: En contexto sacrificial, el término significa libre de defecto físico o ritual. «Sin defecto» es claro, preciso y evita cargar el texto con resonancias morales no presentes aquí.
- source_word: יִהְיוּ
  english_pob_choice: they shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como formulación prescriptiva. «Serán» mantiene la lisura del enunciado legal en español.
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se adopta la forma del proyecto «Yahvé» para el Tetragrámaton, preservando el nombre propio del pacto en vez de sustituirlo por un título. Esto sigue la pauta editorial del POB en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido idiomático de רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: de aroma agradable
  alternative_spanish_readings:
  - de aroma apacible
  - de suave aroma
  rationale: No se trata de que Dios necesite oler físicamente la ofrenda, sino de la idea de aceptación grata ante Yahvé. «De aroma agradable» conserva la tensión entre imagen sensorial e idiomática.
  doctrine_reference: Numbers 29:13 sacrificial idiom
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin revisiones en el último pase. La versión española sigue el mismo estado estable: conserva la estructura enumerativa, el lenguaje sacrificial y la decisión explícita de usar el Nombre divino «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Holocausto» se usa como término sacrificial establecido para עֹלָה.
  - «Ofrenda encendida» traduce אִשֵּׁה sin diluir la referencia al fuego.
  - La serie numérica y de animales reproduce el orden del hebreo.
  - «Sin defecto» preserva la cualidad cultual de תְּמִימִם sin moralizarla.
