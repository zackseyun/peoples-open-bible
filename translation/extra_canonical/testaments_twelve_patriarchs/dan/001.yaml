  text: Διαθήκη Δὰν τοῦ ἑβδόμου υἱοῦ Ἰακὼβ καὶ Βάλλας¹. I. Ἀντίγραφον λόγων Δάν², *ὧν εἶπεν³ τοῖς υἱοῖς αὐτοῦ⁴ ἐπʼ ἐσχάτων⁵ τῶν⁶ ἡμερῶν αὐτοῦ⁷ *ἐν τῷ ἑκατοστῷ εἰκοστῷ πέμπτῳ⁸ ἔτει⁹ τῆς¹⁰ ζωῆς αὐτοῦ. 2. *Καλέσας γὰρ¹¹ *τὴν πατρίαν αὐτοῦ¹² εἶπεν¹³· ᾿Ακούσατε υἱοὶ *Δὰν λόγων μου¹⁴, καὶ¹⁵ προσέχετε¹⁶ ῥήμασι ⸀τοῦ πατρὸς ὑμῶν⸁¹⁷. 3. *Ἐγὼ¹⁸ ἐπείρασα ἐν καρδίᾳ μου¹⁹ καὶ²⁰ ἐν πάσῃ²¹ ζωῇ μου²², ὅτι καλὸν²³ *καὶ θεῷ εὐάρεστον ἡ ἀλήθεια²⁴ μετὰ δικαιοπραγίας²⁵ *καὶ ⸀ὅτι⸁ πονηρὸν τὸ ψεῦδος²⁶ καὶ ὁ θυμὸς²⁷ πᾶσαν κακίαν *ἐκδιδάσκοντα τὸν ἄνθρωπον²⁸. 4. *Ὁμολογῶ οὖν ὑμῖν σήμερον²⁹, τέκνα μου³⁰, ὅτι ἐν καρδίᾳ μου ἐθέμην³¹ περὶ τοῦ θανάτου³² Ἰωσήφ, ⸀τοῦ ἀδελφοῦ μου⸁³³, *τοῦ ἀγαθοῦ ἀνδρὸς καὶ ἀληθινοῦ³⁴. 5. Καὶ ἔχαιρον ἐπὶ τῇ πράσει αὐτοῦ³⁵, ὅτι³⁶ *ὑπὲρ ἡμᾶς³⁷ *ὁ πατὴρ αὐτὸν ἠγάπα³⁸. 6. Τὸ γὰρ³⁹ πνεῦμα τοῦ ζήλου⁴⁰ καὶ τῆς ἀλαζονείας⁴¹ ἔλεγέ μοι· Καίγε σὺ *αὐτὸς υἱὸς αὐτοῦ εἶ⁴². 7. Καὶ *ἐκ τῶν πνευμάτων⁴³ τοῦ Βελίαρ †συνήργει⁴⁴ μοι, ὅτι⁴⁵· *Λαβὲ τὸ ξίφος καὶ ⌜ἐν τούτῳ⌝⁴⁶ ἄνελε τὸν Ἰωσήφ⁴⁷, καὶ ἀγαπήσει σε ὁ πατήρ⁴⁸, ἀποθανόντος αὐτοῦ. 8. *Τοῦτο δὲ ἦν τὸ πνεῦμα τοῦ θυμοῦ τὸ πεῖθόν με⁴⁹· ὥσπερ⁵⁰ πάρδαλις †ἐκμύζουσα⁵¹ ἔριφον, ἵνα οὕτως *⌜ἐμοὶ ἐνέβαλεν⌝ †ἐκμυζῆσαι⁵² τὸν Ἰωσήφ. 9. ᾿Αλλ᾿ ὁ Θεὸς *τῶν πατέρων⁵³ μου οὐκ εἴασεν αὐτὸν ἐμπεσεῖν εἰς τὰς χεῖράς μου, ἵνα κατὰ μόνας εὑρὼν αὐτὸν ἀνελῶ, καὶ ποιήσω⁶¹ λυθῆναι σκῆπτρον δεύτερον τῷ Ἰσραήλ.
