theological_decisions:
- issue: Rendering of חרם warfare language
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The verse uses technical ḥerem language. 'Devoted to destruction' preserves the religious-judicial force without importing extra doctrinal explanation into the main text. This is a lexical-theological choice because the term implies more than ordinary killing.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Narrative subject shifts between plural and singular
  chosen_reading: 'retain both: plural for the collective actions, singular for ''he left no survivor'' and comparison clauses'
  alternative_readings:
  - regularize all verbs to plural
  - regularize all verbs to singular
  rationale: The Hebrew alternates between plural and singular, likely reflecting Israel/Joshua as collective and leader. Preserving the shift maintains source-text texture rather than resolving it for stylistic smoothness.
  doctrine_reference: Translation philosophy §1, §3, §5
