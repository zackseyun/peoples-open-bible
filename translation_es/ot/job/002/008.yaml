translation:
  language: es
  text: Y tomó un tiesto[a] para rasparse[b], mientras estaba sentado entre las cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fragmento de alfarería».
    reason: lexical_alternative
  - marker: b
    text: O «para rascarse». El verbo hebreo puede denotar rascarse, pero «rasparse» encaja mejor con el uso de un tiesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: And he took
  chosen_spanish: Y tomó
  alternatives_spanish:
  - Entonces tomó
  - Así tomó
  lexicon: HALOT
  rationale: La forma wayyiqtol en hebreo avanza la narración con secuencia simple. En español, «Y tomó» conserva ese movimiento sin añadir matiz temporal o discursivo no requerido por el texto.
- source_word: ל֣וֹ
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó para sí
  lexicon: HALOT
  rationale: El dativo puede expresarse de modo natural en español sin añadir «para sí». El contexto deja claro que el objeto se usa por y para Job.
- source_word: חֶרֶשׂ
  english_pob_choice: a potsherd
  chosen_spanish: un tiesto
  alternatives_spanish:
  - un tiesto de barro
  - un fragmento de vasija
  lexicon: HALOT
  rationale: חֶרֶשׂ designa un fragmento de cerámica/alfarería. «Tiesto» comunica bien la idea de una pieza de barro cocido en español bíblico contemporáneo; se evita una paráfrasis más larga, pero se mantiene la noción de fragmento duro y áspero.
- source_word: לְהִתְגָּרֵד
  english_pob_choice: to scrape himself
  chosen_spanish: para rascarse
  alternatives_spanish:
  - para rasparse
  - para hacerse heridas al rascarse
  lexicon: HALOT
  rationale: El hitpael puede abarcar la acción de rascarse o rasparse. Dado el instrumento mencionado, «rascarse» es natural en español y preserva la acción reflexiva; el matiz áspero queda suficientemente sugerido por «tiesto».
- source_word: בּוֹ
  english_pob_choice: with
  chosen_spanish: con él
  alternatives_spanish:
  - con eso
  lexicon: HALOT
  rationale: El pronombre instrumental se expresa de forma clara en español con «con él», refiriéndose al tiesto. Esta opción evita ambigüedad y mantiene la referencia al instrumento.
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: while he was sitting
  chosen_spanish: y él estaba sentado
  alternatives_spanish:
  - mientras él estaba sentado
  - y estaba sentado
  lexicon: HALOT
  rationale: La cláusula marca una circunstancia concurrente. «Y él estaba sentado» conserva la escena sin forzar una subordinación que el hebreo no exige.
- source_word: בְּתוֹךְ הָאֵפֶר
  english_pob_choice: among the ashes
  chosen_spanish: en medio de la ceniza
  alternatives_spanish:
  - entre las cenizas
  - en medio de las cenizas
  lexicon: HALOT
  rationale: בְּתוֹךְ significa «en medio de / dentro de». «En medio de la ceniza» mantiene la imagen de Job sentado en el montón o lecho de ceniza; se usa singular colectivo para un español más natural y fiel al cuadro.
translation_notes:
  revision_awareness: El pasaje mantiene el mismo sentido y estructura narrativa del texto fuente; la única decisión sensible fue resolver חֶרֶשׂ y לְהִתְגָּרֵד con una combinación española natural que conserve la dureza de la escena sin exagerar ni suavizar el gesto.
  spanish_consistency_notes:
  - Se conserva el tono narrativo simple con coordinación por «y».
  - Se mantiene el sujeto explícito «él» para reflejar la continuidad referencial del hebreo.
  - «Ceniza» se usa como colectivo natural en español, equivalente funcional de הָאֵפֶר en este contexto.
  - No se introduce una nota alternativa para «rascarse» porque el matiz de «rasparse» queda cubierto en la decisión léxica y no afecta la lectura principal.
