- from: Pero no me escuchaste[a], declara Yahvé, para provocarme a ira por la obra de sus manos, para su propio daño.
  to: Pero no me escucharon[a], declara Yahvé, para provocarme a ira por la obra de sus propias manos, para su propio daño.
  rationale: Se corrige la segunda persona plural del verbo principal y se ajusta la referencia posesiva para que el español refleje adecuadamente que el daño recae en los mismos oyentes. Se conserva 'Yahvé' y la idiomaticidad de 'obra de sus manos', manteniendo la amplitud del hebreo sin explicitar 'ídolos' en el texto principal. La nota al pie se actualiza para concordar con el texto revisado y preservar la alternativa singular/plural documentada en inglés.
