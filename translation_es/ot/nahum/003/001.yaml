revisions:
- from: ¡Ay de la ciudad de sangre[a], toda ella llena de engaño, llena de saqueo; la presa no se aparta[b]!
  to: ¡Ay de la ciudad sanguinaria[a], toda ella llena de engaño, llena de saqueo[c]; la presa nunca se aparta[b]!
  rationale: Se reemplaza «ciudad de sangre» por «ciudad sanguinaria» para comunicar con claridad en español el idiomatismo hebreo y mantener la fuerza acusatoria del verso, mientras la nota preserva el literal «ciudad de sangres». Se corrige la redacción de la nota [a], se añade la alternativa léxica de פֶּרֶק según el rastro inglés, y se ajusta «no se aparta» a «nunca se aparta» para reflejar mejor el valor durativo de לֹא יָמִישׁ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: interjección profética, acusación a la ciudad, repetición de «llena de», y cierre con la imagen de la presa que no se va. Sin embargo, «ciudad de sangre» no comunica tan bien en español el idiomatismo hebreo עִיר דָּמִים como sí lo hace «ciudad de sangres» en nota y «ciudad de derramamiento de sangre» o «ciudad sanguinaria» en traducción interpretativa; además, el inglés POB ya fijó «city of bloodshed», por lo que «ciudad de sangre» queda algo opaco. También falta preservar en español la nota alternativa correspondiente a «plunder / robbery», que el rastro auditado sí conserva.'
  spanish_quality_summary: El texto es legible y digno, pero necesita pequeñas mejoras de naturalidad y precisión. «Ciudad de derramamiento de sangre» suena algo pesado; una mejor solución es «ciudad sanguinaria» con nota que preserve el literal hebreo. La nota actual a contiene errores de español («un idiomático») y redacción poco natural. «No se aparta» es aceptable, pero «nunca se aparta» refleja mejor el valor durativo de לֹא יָמִישׁ y armoniza con el inglés auditado. El resto del verso suena bien.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Las decisiones léxicas principales están mayormente alineadas, salvo que «ciudad de sangre» no representa de forma óptima la decisión documentada para עִיר דָּמִים. «Engaño», «saqueo» y «presa» son defendibles; conviene añadir la alternativa de «saqueo/robo violento» en nota para reflejar el expediente inglés.
  issues:
  - severity: medium
    issue: «la ciudad de sangre» es semánticamente opaco en español
    rationale: El hebreo «ciudad de sangres» es idiomático para una ciudad marcada por derramamiento de sangre y culpa de sangre. En español, «ciudad de sangre» suena menos idiomático y menos claro que una opción interpretativa natural como «ciudad sanguinaria», especialmente dado que el POB inglés optó por una explicación del idiomático.
  - severity: medium
    issue: La nota [a] está mal redactada en español
    rationale: «un idiomático» es incorrecto; la nota debe decir «un modismo» o equivalente, y expresar mejor la relación entre «sangres» y derramamiento/culpa de sangre.
  - severity: low
    issue: Falta la nota léxica sobre פֶּרֶק
    rationale: El expediente inglés preserva que «plunder» también puede ser «robbery» con matiz de despojo violento. El español debería reflejar esa alternativa, por ejemplo con «saqueo» y nota «o ‘robo violento’».
  - severity: low
    issue: «no se aparta» podría reflejar mejor el matiz durativo
    rationale: Aunque es correcto, «nunca se aparta» corresponde más de cerca a «never departs» del expediente auditado y comunica mejor la continuidad de la violencia depredadora.
  revised_spanish_text: ¡Ay de la ciudad sanguinaria[a], toda ella llena de engaño, llena de saqueo[c]; la presa nunca se aparta[b]!
  revised_footnotes:
