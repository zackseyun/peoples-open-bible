base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/005/007.yaml
  text: When the men of Ashdod saw that it was so[a], they said, “The ark of the God of Israel must not remain with us[b], because his hand is heavy against us and against Dagon our god.”
  footnotes:
