    text: Hebrew literally 'Gird yourselves'; the sense here is to put on sackcloth for mourning.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''from the temple of your God.'' Hebrew: ''from the house of your God.'''
    reason: lexical_alternative
