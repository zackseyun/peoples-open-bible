translation:
  language: es
  text: 'Moisés llamó a todo Israel y les dijo: «Escucha[a], Israel, los estatutos y los juicios[b] que hoy les hablo para que ustedes los oigan; apréndanlos y guárdenlos, para ponerlos por obra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escucha, Israel». El imperativo hebreo puede denotar una atención receptiva que conduce a la obediencia, no solo oír sonidos.
    reason: lexical_alternative
  - marker: b
    text: «Juicios» traduce aquí משפטים; también puede entenderse como «ordenanzas» o «decisiones legales». El término se refiere a decisiones jurídicas o normas prescritas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa llamar o convocar a la asamblea. «Llamó» conserva la acción directa y natural en español sin sobrecargarla con una formalidad que el hebreo no exige explícitamente.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el pueblo de Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: La expresión mantiene el alcance colectivo y pactal del destinatario. «Todo Israel» es idiomático en español bíblico y fiel a la designación nacional completa.
- source_word: שְׁמַע יִשְׂרָאֵל
  english_pob_choice: Hear, Israel
  chosen_spanish: Oye, Israel
  alternatives_spanish:
  - Escucha, Israel
  - Oye, oh Israel
  lexicon: HALOT
  rationale: 'שׁמע aquí implica más que recepción auditiva: demanda atención obediente. «Oye» conserva el imperativo breve y solemne, sin perder la fuerza exhortativa; en español moderno es suficientemente natural y puede abarcar la escucha atenta.'
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las normas
  lexicon: HALOT
  rationale: חוקים designa disposiciones prescritas o estatutos. «Estatutos» preserva bien el registro legal-pactual y la distinción respecto de משפטים.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los decretos
  alternatives_spanish:
  - los juicios
  - las ordenanzas
  - las decisiones
  lexicon: HALOT
  rationale: משפטים puede referirse a decisiones jurídicas, ordenanzas o normas. En español, «decretos» funciona como equivalente legal general y evita una falsa lectura de «juicios» como actos procesales; aun así, se reconoce que el término conserva un matiz de decisiones normativas.
- source_word: בְּאָזְנֵיכֶם
  english_pob_choice: in your hearing
  chosen_spanish: en vuestros oídos
  alternatives_spanish:
  - en su audición
  - en vuestra escucha
  - a vuestros oídos
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en vuestros oídos». Aquí se conserva de forma más directa porque el español bíblico acepta la metáfora corporal y ayuda a mantener la textura del original; además, el plural de segunda persona se adecua al tono solemne del pasaje.
- source_word: וּלְמַדְתֶּם אֹתָם
  english_pob_choice: learn them
  chosen_spanish: aprendedlos
  alternatives_spanish:
  - aprendedlos bien
  - estudiadlos
  lexicon: HALOT
  rationale: למד aquí exige aprender e internalizar los mandatos. «Aprendedlos» conserva la concisión del hebreo y el vínculo con la obediencia posterior.
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: keep
  chosen_spanish: guardadlos
  alternatives_spanish:
  - observadlos
  - mantenedlos
  lexicon: HALOT
  rationale: שׁמר en contexto de pacto significa guardar u observar obedientemente. «Guardadlos» es natural y fiel a esa obligación de custodia práctica.
- source_word: לַעֲשֹׂתָם
  english_pob_choice: to do them
  chosen_spanish: para ponerlos por obra
  alternatives_spanish:
  - para hacerlos
  - para cumplirlos
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: guardar los mandamientos con miras a ejecutarlos. «Ponerlos por obra» comunica con claridad la obediencia activa y mantiene el sentido de cumplimiento práctico.'
theological_decisions:
- issue: Mantener la pareja legal חקים / משפטים como dos términos distintos
  english_pob_reading: the statutes and the judgments
  chosen_spanish_reading: los estatutos y los decretos
  alternative_spanish_readings:
  - los estatutos y las ordenanzas
  - los decretos y las normas
  rationale: El versículo introduce la instrucción del pacto mediante dos vocablos jurídicos relacionados pero no idénticos. Conservar ambos evita diluir la textura legal del hebreo; «decretos» para משפטים da un español bíblico comprensible sin fusionar los términos.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Alcance exhortativo de שׁמע
  english_pob_reading: Hear, Israel
  chosen_spanish_reading: Oye, Israel
  alternative_spanish_readings:
  - Escucha, Israel
  - Oíd, Israel
  rationale: El imperativo en hebreo implica atención receptiva que desemboca en obediencia. «Oye» conserva la urgencia del mandato y funciona en un registro solemne sin volverse arcaizante.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para añadir una coma antes de «to do them», dejando claro el cierre de la frase final de propósito. La versión española refleja esa estructura con «para ponerlos por obra», que mantiene la relación final sin necesidad de una coma interna adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se usa un registro bíblico sobrio y actual; «Oye, Israel» evita tanto el arcaísmo excesivo como la banalización.
  - 'Se preserva la secuencia retórica del hebreo: llamada narrativa, mandato de escucha, doble designación legal, aprendizaje, guarda y finalidad práctica.'
