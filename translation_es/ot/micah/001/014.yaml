  text: לָ/כֵן֙ תִּתְּנִ֣י שִׁלּוּחִ֔ים עַ֖ל מוֹרֶ֣שֶׁת גַּ֑ת בָּתֵּ֤י אַכְזִיב֙ לְ/אַכְזָ֔ב לְ/מַלְכֵ֖י יִשְׂרָאֵֽל׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/001/014.yaml
  text: Therefore you will give parting gifts for Moresheth-gath[b][a]; the houses of Achzib will prove deceptive to the kings of Israel.
  footnotes:
