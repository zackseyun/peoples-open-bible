    text: 'O también: "ofrenda alzada". El hebreo designa una porción apartada y presentada como ofrenda.'
    reason: lexical_alternative
  - marker: b
    text: O "ofrenda elevada". El hebreo puede referirse a una porción levantada o apartada ritualmente.
    reason: lexical_alternative
  - marker: c
    text: O "ofrendas de comunión". La expresión hebrea es un término técnico para un tipo de sacrificio.
    reason: lexical_alternative
  revision_rationale: Se corrige la precisión anatómica de שׁוֹק con 'muslo', se reemplaza 'de entre' por 'de' para reflejar mejor מֵאֵת, y se reordena/reformula el aparato de notas para que las alternativas correspondan a los términos correctos. También se ajusta 'se las he dado' a 'se los he dado' porque los referentes coordinados ('pecho' y 'muslo') son masculinos.
