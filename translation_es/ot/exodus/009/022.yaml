base_translation:
  language: en
  yaml_path: translation/ot/exodus/009/022.yaml
  text: Then Yahweh said to Moses[a], “Stretch out your hand toward the sky[b], so that hail may fall on all the land of Egypt—on man and on beast and on every plant of the field in the land of Egypt.”
  footnotes:
  - marker: a
    text: Or “toward heaven.” The Hebrew word can mean “sky” or “heaven(s),” but here it refers to the visible heavens from which the hail comes.
    reason: lexical_alternative
  - marker: b
    text: “Man” here means human beings generally, in contrast with “beast.”
    reason: lexical_alternative
