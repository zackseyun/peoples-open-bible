    rationale: Una coma antes de «y ve su rostro» ayuda a distinguir la progresión de acciones y mantiene mejor la cadencia poética sin alterar el sentido.
  revised_spanish_text: Ora a Dios[a], y él lo acepta, y ve su rostro[b] con un grito de gozo; y restaura al hombre su justicia[c].
