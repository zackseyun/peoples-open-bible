translation:
  language: es
  text: Después salió su hermano, con el hilo escarlata[a] en su mano, y le puso por nombre Zerah[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «lo escarlata» sobre su mano; «hilo» se suple a partir del contexto inmediato de 38:28.'
    reason: lexical_alternative
  - marker: b
    text: O bien, «y lo nombró Zerah». Lit. «y llamó su nombre Zerah».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: El adverbio temporal marca sucesión inmediata respecto del nacimiento anterior; «Después» es natural en español y conserva el orden narrativo sin añadir matices no presentes.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - emergió
  lexicon: HALOT
  rationale: En un contexto de parto, el verbo simple «salió» comunica con claridad el movimiento de nacimiento y evita una redundancia poco idiomática en español.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano gemelo
  - el hermano de él
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona masculina se expresa naturalmente como «su hermano»; el contexto de los gemelos ya identifica al referente sin necesidad de explicitar «gemelo».
- source_word: אֲשֶׁר עַל יָדוֹ הַשָּׁנִי
  english_pob_choice: with the scarlet thread on his hand
  chosen_spanish: con el hilo escarlata en su mano
  alternatives_spanish:
  - con lo escarlata en su mano
  - con la escarlata en su mano
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: literalmente dice «lo escarlata» sobre su mano, con el sustantivo implícito por el contexto inmediato de 38:28. En español conviene suplir «hilo» para que la referencia sea inteligible, manteniendo la dependencia del contexto.'
- source_word: הַשָּׁנִי
  english_pob_choice: scarlet thread
  chosen_spanish: hilo escarlata
  alternatives_spanish:
  - cordón escarlata
  - cinta escarlata
  lexicon: HALOT
  rationale: La palabra hebrea designa el color/material escarlata; el sustantivo «hilo» proviene del contexto cercano, y «escarlata» conserva el valor léxico sin sustituirlo por un color más general.
- source_word: וַיִּקְרָא שְׁמוֹ
  english_pob_choice: and he called his name
  chosen_spanish: y le puso por nombre
  alternatives_spanish:
  - y llamó su nombre
  - y lo nombró
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática; en español bíblico y moderno, «poner por nombre» transmite de forma natural el acto de nombrar sin perder el sentido causativo del original.
- source_word: זָרַח
  english_pob_choice: Zerah
  chosen_spanish: Zéraj
  alternatives_spanish:
  - Zerah
  - Zérah
  lexicon: HALOT
  rationale: El nombre propio se translitera de manera consistente con una representación española que preserve la consonante final gutural y facilite la pronunciación en español.
theological_decisions:
- issue: Identidad del que nombra
  english_pob_reading: and he called his name Zerah; the subject is left masculine singular and context most naturally points to the attendant/midwife without over-specifying.
  chosen_spanish_reading: y le puso por nombre Zéraj
  alternative_spanish_readings:
  - y él lo llamó Zéraj
  - y le llamaron Zéraj
  rationale: El hebreo mantiene un sujeto masculino singular no explicitado. El español puede conservar esa indeterminación con una forma impersonalmente natural, sin forzar una identificación que el texto no hace explícita.
  doctrine_reference: Principio de reserva textual; no añadir sujetos no expresados por el hebreo.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail en inglés, que añadió «with» para expresar de forma más natural la cláusula del hilo escarlata sobre la mano. En español se reflejó esa relación con «con».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Zéraj» como transliteración del nombre propio, con acentuación española para ayudar a la lectura sin cambiar la forma del nombre.
  - Se preserva la elipsis del hebreo en la referencia al material escarlata mediante una nota, para no ocultar la tensión léxica del original.
