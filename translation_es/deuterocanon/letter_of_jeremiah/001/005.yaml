review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: una instrucción temporal al ver a la multitud, la imagen espacial delante y detrás de los ídolos, la respuesta interior, y la adoración debida solo a Dios. Sin embargo, hay dos desajustes significativos: «postrada» no concuerda con «una multitud» y además convierte el participio plural activo en un adjetivo singular poco natural; y «A ti te corresponde adorar» desplaza el sentido de δεῖ desde una necesidad general (''se debe/uno debe'') hacia una incumbencia del destinatario. También «Maestro» para Δέσποτα suena menos fiel en español bíblico que «Soberano», que preserva mejor el valor reverencial sin confundirlo con κύριος.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero presenta una incorrección sintáctica importante en «una multitud ... postrada ante ellos». En español natural, el participio debe concordar y funcionar verbalmente: «postrándose ante ellos» o «que se postra». La frase directa también mejora con una formulación más idiomática y fiel: «A ti se te debe adorar». El conjunto revisado queda más natural, digno y preciso.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé/Mesías. Sí hay una cuestión terminológica local: Δέσποτα no debe normalizarse a «Señor», pero «Maestro» en español tiende a significar docente y puede sonar impropio como vocativo divino. «Soberano» preserva mejor la distinción frente a κύριος y el matiz de autoridad de Δέσποτα. «Adorar» para προσκυνεῖν en la cláusula dirigida a Dios está bien. La nota léxica sobre προσκυνέω debe corregirse a un español más natural: «adorándolos» o «adorarlos», no «adorando a ellos».'
  issues:
  - severity: high
    issue: «postrada» no representa bien προσκυνοῦντας αὐτά
    rationale: El griego tiene un participio plural activo ('postrándose / inclinándose / adorando'), mientras que «postrada» es singular y adjetival; además no concuerda con «multitud» de forma natural en esta construcción.
  - severity: medium
    issue: «A ti te corresponde adorar» debilita el valor de δεῖ
    rationale: 'δεῖ expresa necesidad u obligación general: ''se debe'', ''uno debe''. La formulación actual sugiere más bien que al destinatario le incumbe adorar, en vez de que él es el único digno de adoración.'
  - severity: medium
    issue: «Maestro» para Δέσποτα suena poco adecuado en vocativo divino español
    rationale: Aunque busca preservar la distinción con κύριος, en español eclesial «Maestro» se asocia más con teacher. «Soberano» conserva mejor el matiz de autoridad suprema y la reverencia del contexto.
  - severity: low
    issue: 'La nota al pie usa una expresión poco idiomática: «adorando a ellos»'
    rationale: En español natural debe ser «adorándolos» o «adorarlos».
