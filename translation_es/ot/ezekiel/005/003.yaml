translation:
  language: es
  text: Y tomarás de allí unos pocos en número y los atarás en los extremos de tu manto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las orillas de tu manto»; o «en los pliegues de tu prenda». El hebreo dice literalmente «en tus alas/bordes», una expresión usada para el borde o extremo de una prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Y tomarás
  alternatives_spanish:
  - Y tomarás luego
  - Y habrás de tomar
  lexicon: HALOT
  rationale: La forma verbal en mandato profético se expresa naturalmente en español con futuro de exhortación. «Tomarás» conserva la fuerza directiva sin sonar artificial.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ahí
  - de ese lugar
  lexicon: HALOT
  rationale: «De allí» sigue de cerca el adverbio hebreo y mantiene la referencia al conjunto previo de cabello o material ya tratado.
- source_word: מְעַט בְּמִסְפָּר
  english_pob_choice: a few in number
  chosen_spanish: unos pocos en número
  alternatives_spanish:
  - una pequeña cantidad
  - unos cuantos
  lexicon: HALOT
  rationale: La expresión duplica la idea de pequeñez cuantitativa; «unos pocos en número» conserva ambos elementos con naturalidad en español.
- source_word: וְצַרְתָּ
  english_pob_choice: bind
  chosen_spanish: los atarás
  alternatives_spanish:
  - los envolverás
  - los sujetarás
  lexicon: HALOT
  rationale: «Atar» reproduce bien la acción de sujetar o ceñir un pequeño grupo dentro de un pliegue, sin perder la concreción del gesto simbólico.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los mismos
  - a esos
  lexicon: HALOT
  rationale: El pronombre retoma a los pocos tomados; en español conviene integrarlo como objeto directo átono.
- source_word: בִּכְנָפֶיךָ
  english_pob_choice: in the folds of your garment
  chosen_spanish: en los pliegues de tu vestido
  alternatives_spanish:
  - en las orillas de tu vestido
  - en los extremos de tu manto
  - en los bordes de tu ropa
  lexicon: HALOT
  rationale: כָּנָף puede referirse al borde o extremo de una prenda. «Pliegues de tu vestido» preserva la imagen concreta del área de la ropa donde se guarda o ata algo, y sigue la revisión inglesa que privilegió «folds» sobre «edges». "Vestido" aquí funciona como prenda general en español bíblico-readable; no se fuerza «manto» porque el hebreo no exige una prenda específica.
translation_notes:
  revision_awareness: La revisión inglesa cambió de 'edges' a 'folds' para reflejar mejor כנפיך como corners/folds de una prenda. La redacción española adopta «pliegues» para armonizar con esa decisión y mantener la imagen textil sin perder la literalidad básica del hebreo. También se evitó mecanizar «alas» porque en este contexto sería equívoco en español.
  spanish_consistency_notes:
  - 'Se mantuvo el orden hebreo de acción sucesiva con una coordinación simple: «Y tomarás... y los atarás».'
  - Se prefirió un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La nota al pie conserva la ambigüedad léxica de כָּנָף sin imponer una sola solución interpretativa.
