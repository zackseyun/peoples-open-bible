translation:
  language: es
  text: Yahvé descendió en la nube y se puso allí con él[a], y proclamó el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llamó el nombre de Yahvé», «y proclamó en el nombre de Yahvé» o «y proclamó por el nombre de Yahvé». La frase hebrea incluye literalmente la preposición «en/por» con «nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino, no como título. En español, "Yahvé" comunica esa decisión de manera estándar y reverente, manteniendo la correspondencia directa con el original y con la política del proyecto.
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia abajo. "Descendió" conserva la concreción semántica con un registro digno y natural en español bíblico.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en una nube
  - con la nube
  lexicon: HALOT
  rationale: 'La preposición hebrea marca localización/acompañamiento; aquí la lectura más directa y fiel es espacial: Yahvé desciende en la nube teofánica.'
- source_word: וַיִּתְיַצֵּב
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se puso en pie
  - tomó posición
  lexicon: HALOT
  rationale: El hitpael de יצב tiene el valor de ponerse de pie o tomar postura/presentarse. En este contexto narrativo, "se detuvo" comunica con naturalidad la idea de tomar su lugar allí, sin perder la fuerza de la escena.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - al lado de él
  lexicon: HALOT
  rationale: La preposición עם con sufijo pronominal significa simplemente presencia conjunta. "Con él" es la forma más directa y clara en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio señala el lugar del encuentro. "Allí" preserva la función deíctica del hebreo y su ritmo narrativo.
- source_word: וַיִּקְרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - llamó
  - declaró
  lexicon: HALOT
  rationale: En este contexto, con la fórmula que sigue sobre el nombre de Yahvé, קרא tiene sentido declarativo y público. "Proclamó" evita reducirlo a un simple "llamar" y refleja mejor el acto solemne de anuncio.
- source_word: בְשֵׁם יְהוָה
  english_pob_choice: the name of the LORD
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - en el nombre de Yahvé
  - por el nombre de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea admite valor preposicional ('en/by el nombre de'). El cuerpo principal mantiene la formulación "el nombre de Yahvé" porque es la más natural y coherente con el flujo del versículo, sin ocultar el hecho de que el hebreo lleva la preposición ב.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto, no una sustitución titular. "Yahvé" es la forma española consistente con la decisión del proyecto y evita enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de וַיִּקְרָא con בְשֵׁם יְהוָה
  english_pob_reading: The LORD ... proclaimed the name of Yahweh, with a footnote noting prepositional alternatives
  chosen_spanish_reading: proclamó el nombre de Yahvé
  alternative_spanish_readings:
  - proclamó en el nombre de Yahvé
  - proclamó por el nombre de Yahvé
  - llamó en el nombre de Yahvé
  rationale: El hebreo permite entender la expresión como anuncio del nombre divino o como proclamación 'en/by' ese nombre. El texto principal opta por una traducción fluida y fiel; la nota conserva la alternativa preposicional para no borrar la tensión lexical.
  doctrine_reference: Preservar tensión lexical cuando el hebreo permite más de una relación sintáctica válida; no resolverla de modo excesivo en el texto principal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura del audio textual inglés revisado, sin cambios en la conclusión interpretativa: Yahvé es el sujeto de la secuencia, desciende en la nube, se presenta con Moisés y proclama el nombre divino. Se mantiene la alternativa preposicional en nota, como en el expediente inglés.'
  spanish_consistency_notes:
  - Se conserva "Yahvé" en todo el registro para יְהוָה.
  - Se evita "SEÑOR" como sustituto automático, por consistencia con la política del proyecto.
  - '"Proclamó" se usa con valor declarativo solemne, no como simple llamada.'
  - La nota [a] queda anclada en la frase final donde el hebreo presenta la ambigüedad preposicional.
