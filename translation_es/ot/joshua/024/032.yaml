revisions:
- from: Y los huesos de José[a], que los hijos de Israel habían subido de Egipto, los sepultaron en Siquem, en la parcela[b] del campo que Jacob había comprado a los hijos de Hamor, padre de Siquem[c], por cien qesitás[d]; y vino a ser heredad para los hijos de José.
  to: Y los huesos[a] de José, que los hijos de Israel habían sacado de Egipto, los sepultaron en Siquem, en la parcela[b] del campo que Jacob había comprado a los hijos de Hamor, padre de Siquem[c], por cien qesitás[d]; y llegó a ser heredad para los hijos de José.
  rationale: Se corrige la traducción de הֶעֱלוּ para reflejar la transitividad del hebreo ('habían sacado de Egipto') y evitar la lectura equívoca de que los propios hijos de Israel 'subieron'. También se mueve la nota [a] al sustantivo correcto ('huesos') y se pule ligeramente la naturalidad de la cláusula final con 'llegó a ser heredad'.
  reviewer_model: gpt-5.4
