translation:
  language: es
  text: Los ríos[a] han alzado, oh Yahvé; los ríos han alzado su voz; los ríos alzan sus olas golpeantes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inundaciones» en vez de «ríos»; muchas traducciones eligen esa opción para enfatizar las aguas caóticas, pero el sustantivo hebreo significa más literalmente «ríos».
    reason: lexical_alternative
  - marker: b
    text: O «sus rompientes» o «su estruendo». El sustantivo final es raro y denota la fuerza golpeante o estrepitosa de las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשְׂאוּ / יִשְׂאוּ
  english_pob_choice: have lifted up / lift up
  chosen_spanish: han alzado / alzan
  alternatives_spanish:
  - han levantado / levantan
  - han elevado / elevan
  - han alzado su voz / alzan su voz
  lexicon: HALOT
  rationale: 'El verbo נָשָׂא tiene el sentido básico de levantar, alzar o cargar. En español, «alzar» conserva mejor la imagen poética repetida y el movimiento ascendente que «levantar»; además permite la construcción natural «alzar la voz». Mantengo el contraste aspectual del hebreo con perfecto/presente: «han alzado» y «alzan».'
- source_word: נְהָרוֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - ríos caudalosos
  - corrientes
  - inundaciones
  lexicon: HALOT
  rationale: נְהָרוֹת significa normalmente «ríos». Aunque el contexto sugiere aguas tumultuosas, el sentido léxico primario se preserva con «ríos», dejando que el paralelismo y el resto del verso comuniquen la fuerza caótica.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  - Yahvé
  lexicon: HALOT
  rationale: Sigo la convención del proyecto de usar «Yahvé» para el Tetragrámaton. En la invocación directa, «oh Yahvé» reproduce mejor el valor vocativo del hebreo y es natural en español bíblico contemporáneo.
- source_word: קוֹלָם
  english_pob_choice: their voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su ruido
  lexicon: HALOT
  rationale: קוֹל puede significar voz, sonido o ruido. Aquí la personificación poética funciona bien con «su voz», en paralelo con la primera cola del verso. En español, «han alzado su voz» mantiene la imagen sin forzar explicaciones.
- source_word: דָּכְיָם
  english_pob_choice: their pounding waves
  chosen_spanish: sus aguas estruendosas
  alternatives_spanish:
  - sus olas rompientes
  - sus rompientes
  - su estruendo
  lexicon: HALOT
  rationale: El término es raro y denota el golpeteo, estruendo o embate de las aguas. «Aguas estruendosas» comunica la fuerza sonora y visual en un español claro, sin introducir una imagen demasiado específica que el hebreo no exige. «Olas rompientes» sería posible, pero añade una concreción que el original no garantiza.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh, expressed here as 'O Yahweh' in direct address
  chosen_spanish_reading: Yahvé, expresado en vocativo como «oh Yahvé»
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino y no un título. La elección de «Yahvé» conserva esa distinción; el vocativo «oh Yahvé» hace explícita la dirección a Dios en el español del verso. Se evita «SEÑOR» porque ocultaría el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del contexto auditado: mantiene «ríos» frente a la alternativa interpretativa «inundaciones», conserva el paralelismo y la progresión verbal del hebreo, y traduce el nombre divino como «Yahvé» conforme a la política del proyecto. No se detectaron revisiones pendientes en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene una equivalencia estable entre נָשָׂא y «alzar» para conservar la imaginería poética.
  - «Yahvé» se usa de forma consistente para יְהוָה, con vocativo «oh Yahvé» en la invocación.
  - «voz» se conserva en ambos primeros miembros para reflejar קוֹלָם y el paralelismo.
  - La última cola evita precisar «olas» y opta por una formulación abierta que preserve el valor raro de דָּכְיָם.
