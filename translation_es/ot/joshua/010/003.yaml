    rationale: El hebreo אֲדֹנִי צֶדֶק corresponde al nombre compuesto Adoni-zedek en la auditoría inglesa. En español, «Adoni-zédec» conserva mejor la relación visible con la forma fuente y con la tradición bíblica que «Adoni-sedec», cuya sustitución de z por s debilita la trazabilidad de la transliteración.
