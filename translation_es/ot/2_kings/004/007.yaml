translation:
  language: es
  text: 'Entonces ella vino y le contó al hombre de Dios[a], y él dijo: «Ve, vende el aceite, y paga tus deudas[b]; y tú y tus hijos varones podrán vivir de lo que quede[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el varón de Dios». Se conserva el título hebreo sin interpretarlo como «profeta».
    reason: lexical_alternative
  - marker: b
    text: O «paga a tu acreedor», si la forma subyacente se entiende con referencia a la persona a quien se debe en vez de a la deuda misma.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tú y tus hijos varones vivirán del remanente» o «de lo restante».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: Then she came
  chosen_spanish: Entonces ella vino
  alternatives_spanish:
  - Así que ella vino
  - Y ella vino
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo. «Entonces» reproduce bien la secuencia; «vino» conserva el movimiento verbal básico sin añadir interpretación.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le informó
  lexicon: HALOT
  rationale: נגד en hifil es «decir/contar/reportar». «Le contó» suena natural en español y mantiene el acto de narrar una situación a otra persona.
- source_word: לְאִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: al hombre de Dios
  alternatives_spanish:
  - al varón de Dios
  - al profeta
  lexicon: HALOT
  rationale: Se conserva el título hebreo de forma transparente. «Hombre de Dios» evita sustituir el rótulo por una interpretación más específica como «profeta».
- source_word: לְכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Imperativo femenino singular de הלך. «Ve» es una equivalencia directa y natural en español.
- source_word: מִכְרִי
  english_pob_choice: sell
  chosen_spanish: vende
  alternatives_spanish:
  - vende de una vez
  - pon a la venta
  lexicon: HALOT
  rationale: Imperativo femenino singular de מכר. «Vende» es la forma más directa y clara.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el óleo
  - el aceite de oliva
  lexicon: HALOT
  rationale: En español, «aceite» comunica de manera natural el sustantivo hebreo. No se añade «de oliva» porque el texto no lo explicita, aunque sea probable por el contexto.
- source_word: וְשַׁלְּמִי
  english_pob_choice: pay
  chosen_spanish: paga
  alternatives_spanish:
  - repaga
  - salda
  lexicon: HALOT
  rationale: En contexto financiero, שלם en piel puede ser «pagar/repagar/saldar». «Paga» mantiene la instrucción breve y directa.
- source_word: אֶת נִשְׁיֵךְ
  english_pob_choice: pay your debts
  chosen_spanish: tus deudas
  alternatives_spanish:
  - a tu acreedor
  - lo que debes
  lexicon: HALOT
  rationale: La revisión inglesa optó por el plural «debts» para reflejar la forma plural del hebreo. En español, «tus deudas» conserva esa pluralidad y la referencia al pasivo adeudado; «a tu acreedor» sería una alternativa conceptual, no la lectura principal del sintagma.
- source_word: וְאַתְּ וּבָנַיִךְ
  english_pob_choice: you and your sons
  chosen_spanish: tú y tus hijos
  alternatives_spanish:
  - tú y tus hijos varones
  - tú y tus muchachos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tú y tus hijos/ hijos varones». En español, «hijos» es la opción más transparente y comprensible sin perder la referencia a los descendientes masculinos que aporta el contexto.
- source_word: תִּחְיִי
  english_pob_choice: can live
  chosen_spanish: vivirán
  alternatives_spanish:
  - podrán vivir
  - vivirán con
  lexicon: HALOT
  rationale: 'La forma imperfecta expresa consecuencia/provisión. Se eligió un futuro natural en español dentro de la cita directa: «vivirán con lo que quede», que comunica la suficiencia del remanente para sostenerles.'
- source_word: בַּנּוֹתָר
  english_pob_choice: what is left
  chosen_spanish: con lo que quede
  alternatives_spanish:
  - del remanente
  - con el resto
  lexicon: HALOT
  rationale: El sustantivo/participio indica «lo que queda, el remanente». «Con lo que quede» es idiomático y mantiene el sentido de subsistencia a partir del sobrante.
translation_notes:
  revision_awareness: La lectura inglesa revisada cambió «your debt» a «your debts» para reflejar mejor el plural hebreo. La redacción española adopta desde el inicio el plural «tus deudas», manteniendo la transparencia del matiz y la fuerza narrativa del mandato de pagar con el producto del aceite.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para הָאֱלֹהִים como equivalente estándar y transparente.
  - Se preservó el título «hombre de Dios» en vez de «profeta» para no borrar la forma literal del hebreo.
  - Se tradujo el mandato con imperativos directos y naturales en español, sin expandir la frase.
  - La cláusula final refleja el sentido de subsistencia por el remanente, no una paráfrasis libre.
