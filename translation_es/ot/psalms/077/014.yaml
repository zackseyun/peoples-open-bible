    rationale: Aunque reproduce de cerca «is in holiness», en español suena forzado. «Tu camino es santo» preserva la idea de que el obrar de Dios se caracteriza por santidad, conforme a la rationale inglesa, y deja la lectura locativa para la nota.
  - severity: low
