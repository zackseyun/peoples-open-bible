translation:
  language: es
  text: Y la capturaron aquel día, y la hirieron al filo de la espada[a]; y a toda persona que había en ella la dedicaron a destrucción aquel día[b], conforme a todo lo que habían hecho a Laquis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “a la boca/filo de la espada”. La expresión española “al filo de la espada” conserva la imagen hebrea de manera natural.'
    reason: source_note
  - marker: b
    text: 'O: “la destruyeron por completo”; el verbo hebreo indica dedicar algo a destrucción bajo el ḥérem, es decir, bajo el anatema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּהָ
  english_pob_choice: they captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la apresaron
  lexicon: HALOT
  rationale: לכד en contexto militar expresa la toma de una ciudad. "Capturaron" comunica esa acción con naturalidad en español y conserva el sentido de conquista del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal es idiomática; "aquel día" mantiene el énfasis narrativo y la referencia puntual del hebreo.
- source_word: וַיַּכּוּהָ לְפִי חֶרֶב
  english_pob_choice: struck it with the edge of the sword
  chosen_spanish: la atacaron a filo de espada
  alternatives_spanish:
  - la hirieron a filo de espada
  - la golpearon con el filo de la espada
  - la pasaron por la espada
  lexicon: HALOT
  rationale: לְפִי חֶרֶב significa literalmente "a la boca/filo de espada". En español, "a filo de espada" conserva la imagen hebrea y es más natural que una calca como "con la boca de la espada".
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: toda persona que había en ella
  alternatives_spanish:
  - toda alma que había en ella
  - todos los que estaban en ella
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa a las personas dentro de la ciudad, no el alma en sentido antropológico. "Toda persona" evita una lectura doctrinal ajena al contexto y mantiene el valor referencial del texto.
- source_word: הֶחֱרִים
  english_pob_choice: they devoted to destruction
  chosen_spanish: la dedicaron al anatema
  alternatives_spanish:
  - la destruyeron por completo
  - la consagraron a destrucción
  - la pusieron bajo anatema
  lexicon: HALOT
  rationale: חרם tiene el sentido técnico de poner algo bajo herem, es decir, dedicarlo a destrucción por mandato sagrado. "Anatema" conserva ese peso técnico en español, aunque requiere nota por su posible ambigüedad eclesial.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְלָכִישׁ
  english_pob_choice: according to all that they had done to Lachish
  chosen_spanish: conforme a todo lo que habían hecho a Laquis
  alternatives_spanish:
  - según todo lo que habían hecho a Laquis
  - tal como habían hecho a Laquis
  lexicon: HALOT
  rationale: כְּכֹל expresa correspondencia con la acción anterior. "Conforme a todo lo que habían hecho" preserva la relación comparativa y el tiempo narrativo plural coherente con el hebreo.
theological_decisions:
- issue: Renderización de חרם/החרים en un contexto de conquista
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: la dedicaron al anatema
  alternative_spanish_readings:
  - la destruyeron por completo
  - la pusieron bajo anatema
  - la consagraron a destrucción
  rationale: El hebreo lleva la carga técnica de ḥerem, no solo la idea general de destrucción. "Anatema" preserva la noción de consagración bajo juicio, aunque es menos transparente para lectores modernos; por eso conviene mantenerlo con apoyo de nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de נֶפֶשׁ en una frase militar
  english_pob_reading: every person who was in it
  chosen_spanish_reading: toda persona que había en ella
  alternative_spanish_readings:
  - toda alma que había en ella
  - todos los que estaban en ella
  rationale: En este contexto נֶפֶשׁ se refiere a los habitantes de la ciudad. "Persona" evita cargar el texto con implicaciones antropológicas que el hebreo no está haciendo aquí.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB al mantener sujetos plurales implícitos en los verbos de acción y en la clausula final, evitando una singularización no sustentada por el hebreo.
  spanish_consistency_notes:
  - Se mantiene "Laquis" como forma española del topónimo, en paralelo con el inglés POB.
  - Se usa "aquel día" para reproducir la deixis narrativa del hebreo.
  - '"Anatema" se emplea como equivalente técnico de ḥerem, con nota para evitar la lectura exclusivamente eclesiástica del término.'
