translation:
  language: es
  text: ¿Por qué[a], Yahvé, estás lejos? ¿Por qué te ocultas en tiempos de angustia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué te ocultas en tiempos de angustia?»'
