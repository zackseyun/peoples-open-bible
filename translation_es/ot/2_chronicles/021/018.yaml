translation:
  language: es
  text: Y después de todo esto[a], Yahvé lo hirió en sus intestinos con una enfermedad incurable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin remedio»; literalmente, «para que no hubiera curación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  english_pob_choice: And after
  chosen_spanish: Y después de
  alternatives_spanish:
  - Después de
  lexicon: HALOT
  rationale: El hebreo marca secuencia narrativa con la conjunción y la preposición temporal. En español, «Y después de» conserva el enlace narrativo y el valor temporal sin sonar forzado.
- source_word: כָּל זֹאת
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  lexicon: HALOT
  rationale: La referencia resumida a los juicios y hechos previos se expresa de modo natural con «todo esto», preservando el alcance colectivo del hebreo.
- source_word: נְגָפ֨/וֹ
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo afligió
  lexicon: HALOT
  rationale: El verbo comunica un golpe o herida enviada por Dios como juicio. «Lo hirió» mantiene esa fuerza punitiva y suena natural en español bíblico contemporáneo.
- source_word: יְהוָ֧ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del hebreo con la forma de la casa editorial en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: בְּ/מֵעָ֛י/ו
  english_pob_choice: in his intestines
  chosen_spanish: en sus intestinos
  alternatives_spanish:
  - en sus entrañas
  - en sus entrañas internas
  lexicon: HALOT
  rationale: El hebreo se refiere a los órganos internos, específicamente las entrañas/intestinos. «Intestinos» es anatómicamente claro en español actual y conserva la concreción del texto.
- source_word: לָ/חֳלִ֖י
  english_pob_choice: with a disease
  chosen_spanish: con una enfermedad
  alternatives_spanish:
  - con una dolencia
  - con una enfermedad grave
  lexicon: HALOT
  rationale: La preposición introduce el estado resultante de la herida divina. «Enfermedad» comunica adecuadamente la aflicción corporal sin añadir precisión no indicada por el hebreo.
- source_word: לְ/אֵ֥ין מַרְפֵּֽא
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - sin remedio
  - sin sanidad
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que no hay curación o remedio. «Incurable» preserva esa idea con naturalidad y concisión en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama; en la tradición editorial POB el español usa «Yahvé» para mantener el nombre personal de Dios y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el packet hebreo y la auditoría inglesa: conserva la secuencia narrativa, el nombre divino explícito y la dureza corporal del juicio, sin suavizar «hirió» ni convertir «incurable» en una paráfrasis más débil. No hay revisiones aplicadas en el historial reciente; el acuerdo de revisión fue alto y sin objeciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar español del proyecto para יְהוָה.
  - «Hirió» conserva la fuerza de juicio divino indicada por el hebreo y por la elección inglesa «struck him».
  - «Intestinos» se eligió por claridad anatómica moderna frente a «entrañas», que en español puede sonar más idiomático pero menos preciso según contexto.
  - La nota al pie preserva la alternativa de «sin remedio» porque refleja bien la literalidad hebrea y la alternativa inglesa documentada.
