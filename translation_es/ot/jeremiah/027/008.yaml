translation:
  language: es
  text: Y sucederá que la nación o el reino que no sirva[a] a Nabucodonosor, rey de Babilonia, y que no ponga su cuello bajo el yugo[b] del rey de Babilonia, yo castigaré a esa nación con la espada, con hambre y con peste, declara Yahvé, hasta que yo los haya consumido[c] por su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «sirva» expresa sujeción política a Nabucodonosor, no mero trabajo o servicio común.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «poner el cuello bajo el yugo», imagen de someterse a la dominación babilónica.'
    reason: cultural_note
  - marker: c
    text: 'O: «hasta que yo los haya acabado por su mano».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula introduce una consecuencia profética futura. «Sucederá» conserva el tono formal sin forzar un giro demasiado arcaico en español.
- source_word: הַגּוֹי וְהַמַּמְלָכָה
  english_pob_choice: the nation or the kingdom
  chosen_spanish: la nación o el reino
  alternatives_spanish:
  - la nación y el reino
  - cualquier nación y reino
  lexicon: HALOT
  rationale: El par hebreo funciona de modo distributivo para cualquier entidad política que rechace someterse. «O» refleja mejor ese alcance distributivo en español.
- source_word: יַעַבְדוּ אֹתוֹ אֶת נְבוּכַדְנֶאצַּר
  english_pob_choice: will not serve him—Nebuchadnezzar
  chosen_spanish: no sirvan a Nabucodonosor
  alternatives_spanish:
  - no le sirvan a Nabucodonosor
  - no estén sujetos a Nabucodonosor
  lexicon: HALOT
  rationale: עבד aquí expresa servicio/sujeción política al soberano. «Servir» mantiene la amplitud semántica y es natural en español bíblico actual.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio, manteniendo la identificación histórica del rey de Babilonia.
- source_word: יִתֵּן אֶת צַוָּארוֹ בְּעֹל
  english_pob_choice: will not put its neck under the yoke
  chosen_spanish: no pongan su cuello bajo el yugo
  alternatives_spanish:
  - no coloquen su cuello bajo el yugo
  - no sometan su cuello al yugo
  lexicon: HALOT
  rationale: La imagen del cuello bajo el yugo se conserva como metáfora de sumisión a la dominación imperial. «Pongan» respeta el paralelismo y suena natural en español.
- source_word: בְּעֹל מֶלֶךְ בָּבֶל
  english_pob_choice: under the yoke of the king of Babylon
  chosen_spanish: bajo el yugo del rey de Babilonia
  alternatives_spanish:
  - bajo el yugo del rey de Babel
  - bajo el dominio del rey de Babilonia
  lexicon: HALOT
  rationale: «Bajo el yugo» reproduce el hebraísmo con claridad. «Del rey de Babilonia» mantiene la referencia política concreta.
- source_word: בַּחֶרֶב וּבָרָעָב וּבַדֶּבֶר
  english_pob_choice: with the sword, with famine, and with pestilence
  chosen_spanish: con la espada, con hambre y con peste
  alternatives_spanish:
  - con espada, hambre y peste
  - por la espada, por el hambre y por la peste
  lexicon: HALOT
  rationale: Se conserva la tríada profética de juicio. «Peste» refleja mejor el valor de דֶּבֶר que «enfermedad» y encaja con el registro profético.
- source_word: אֶפְקֹד עַל
  english_pob_choice: I will punish
  chosen_spanish: yo castigaré
  alternatives_spanish:
  - yo visitaré con juicio
  - yo traeré castigo sobre
  lexicon: HALOT
  rationale: פקד con עַל en contextos de juicio denota intervención punitiva. «Castigaré» comunica ese sentido de forma directa y fiel.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el nombre divino según la pauta del proyecto. «Declara» conserva el peso oracular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrama, preservando el nombre del pacto en español contemporáneo.
- source_word: עַד תֻּמִּי אֹתָם
  english_pob_choice: until I have consumed them
  chosen_spanish: hasta que yo los haya consumido
  alternatives_spanish:
  - hasta que yo los haya destruido
  - hasta que yo los haya acabado
  lexicon: HALOT
  rationale: תמם aquí apunta a un acabar total en contexto de juicio. «Consumido» sigue de cerca la revisión inglesa más reciente y conserva la severidad del cierre total.
- source_word: בְּיָדוֹ
  english_pob_choice: by his hand
  chosen_spanish: por su mano
  alternatives_spanish:
  - por medio de su mano
  - mediante su mano
  lexicon: HALOT
  rationale: La expresión conserva la idea de agencia instrumentada. «Por su mano» es una forma natural en español para este hebraísmo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara Yahweh
  - declara Jehová
  rationale: El texto hebreo usa directamente el Tetragrama; el proyecto pide «Yahvé» en el texto principal. La fórmula profética se mantiene sin ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de יַעַבְדוּ / servidumbre política
  english_pob_reading: will not serve him
  chosen_spanish_reading: no sirvan a Nabucodonosor
  alternative_spanish_readings:
  - no estén sujetos a Nabucodonosor
  - no obedezcan a Nabucodonosor
  rationale: El verbo hebreo no describe simple trabajo, sino sumisión política al soberano imperial. «Servir» conserva la fuerza de dependencia sin estrechar indebidamente el sentido.
  doctrine_reference: Jeremiah's political-submission oracle; lexical force of עבד in imperial context
- issue: Imagen del yugo
  english_pob_reading: put its neck under the yoke
  chosen_spanish_reading: pongan su cuello bajo el yugo
  alternative_spanish_readings:
  - coloquen su cuello bajo el yugo
  - sometan su cuello al yugo
  rationale: La metáfora es central y debe mantenerse. En español, la imagen de cuello bajo yugo comunica sumisión y dominio sin necesidad de explicación extensa en el cuerpo del verso.
  doctrine_reference: Prophetic metaphor of foreign domination
- issue: Fórmula de juicio final
  english_pob_reading: until I have consumed them by his hand
  chosen_spanish_reading: hasta que yo los haya consumido por su mano
  alternative_spanish_readings:
  - hasta que yo los haya destruido por su mano
  - hasta que yo los haya acabado por su mano
  rationale: El hebreo permite la idea de consumación/destrucción total. «Consumido» mantiene la intensidad del juicio y respeta la revisión inglesa más reciente.
  doctrine_reference: Judgment formula in prophetic diction
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: mantiene la apposición fluida del nombre propio del rey sin guiones y refleja el valor de consumación total con «consumido». También conserva la nota conceptual del yugo como imagen de sumisión, sin suavizar la severidad del juicio.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה según la política del proyecto.
  - Se usa «Nabucodonosor» como forma española estándar del nombre propio.
  - Se mantiene la tríada judicial «espada, hambre y peste» para reflejar la fórmula profética recurrente.
  - «Sirvan» y «yugo» se conservan por su valor político-metafórico, no meramente doméstico.
