translation:
  language: es
  text: 'los que decían a Dios: «Apártate de nosotros», y «¿qué puede hacer el Todopoderoso[a] a nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por nosotros» o «para nosotros». El hebreo puede entenderse con matiz de dirección («a») o de beneficio («por/para»), según cómo se entienda la fuerza retórica de la pregunta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  english_pob_choice: who said
  chosen_spanish: los que decían
  alternatives_spanish:
  - quienes dijeron
  - los que dijeron
  lexicon: HALOT
  rationale: El participio hebreo funciona de modo sustantivo y remite a un grupo descrito en contexto. En español, «los que decían» conserva el valor iterativo o caracterizador del participio mejor que un perfecto simple demasiado puntual, aunque «los que dijeron» sigue siendo posible.
- source_word: לָאֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a El
  - al Dios
  lexicon: HALOT
  rationale: אֵל aquí se entiende como el título común para Dios, no como nombre propio transliterado. En español, «a Dios» es natural y fiel al sentido del pasaje.
- source_word: סוּר
  english_pob_choice: Depart
  chosen_spanish: Apártate
  alternatives_spanish:
  - Vete
  - Aléjate
  lexicon: HALOT
  rationale: El imperativo expresa rechazo y expulsión. «Apártate» preserva la fuerza de alejamiento y suena más solemne que «Vete».
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de él
  - de ellos
  lexicon: HALOT
  rationale: 'La forma y el contexto apuntan a primera persona plural: los hablantes excluyen a Dios de su cercanía. «De nosotros» mantiene esa referencia plural y evita armonizar indebidamente la frase.'
- source_word: וּמַה
  english_pob_choice: and, ‘What can...?’
  chosen_spanish: 'y: «¿Qué puede...?»'
  alternatives_spanish:
  - 'y: «¿Qué...?»'
  - 'y: «¿Qué podrá...?»'
  lexicon: HALOT
  rationale: La partícula introduce la segunda parte de la cita como pregunta retórica. Los dos puntos ayudan a mostrar la continuidad del discurso directo en español.
- source_word: יִפְעַל
  english_pob_choice: can do
  chosen_spanish: puede hacer
  alternatives_spanish:
  - hará
  - haría
  lexicon: HALOT
  rationale: El imperfecto en esta pregunta expresa capacidad/eficacia, no solo futuro. «Puede hacer» reproduce bien el sentido burlón de la pregunta.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Siguiendo la preferencia del proyecto por traducir títulos divinos, «el Todopoderoso» comunica el valor del nombre/título sin transliteración.
- source_word: לָמוֹ
  english_pob_choice: to us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: HALOT
  rationale: 'El final hebreo es semánticamente ambiguo entre dirección/beneficio, y el propio audit trail en inglés reconoció la posibilidad de «to» o «for». En español, «por nosotros» conserva la fuerza retórica del desafío: «¿Qué puede hacer el Todopoderoso por nosotros?» sin forzar una referencia diferente.'
theological_decisions:
- issue: Tratamiento del título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Se mantiene la decisión del POB en inglés de traducir el título en vez de transliterarlo. «El Todopoderoso» es claro, reverente y semanticamente equivalente para el lector en español.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota no anclada. La redacción española ahora no requiere nota al pie, porque la ambigüedad de לָמוֹ se resolvió dentro de la frase con una opción natural en español, sin dejar un marcador huérfano.
  spanish_consistency_notes:
  - Se mantuvo un registro de cita directa con dos segmentos entrecomillados, acorde con el estilo del texto hebreo y la auditoría inglesa.
  - Se prefirió «Dios» para אֵל y «el Todopoderoso» para שַׁדַּי, coherente con las directrices del proyecto.
  - La construcción «los que decían» conserva el carácter descriptivo del participio hebreo.
  - No se introdujeron términos eclesiásticos ajenos al texto; la dicción sigue siendo sobria y bíblica en español neutro.
