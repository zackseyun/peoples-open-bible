    issue: La nota [a] está anclada al nombre «Safán» pero su contenido explica «el escriba / el secretario».
    rationale: Esto desinforma al lector y rompe la correspondencia exigida entre marcador y palabra relevante. La nota debe colocarse en «escriba», no en el nombre propio.
  - severity: medium
    issue: «Lo leyó» no refleja explícitamente el בּוֹ de וַיִּקְרָא בוֹ.
    rationale: Aunque es idiomático, omite un matiz que el POB inglés decidió conservar con ‘read from it’. En español bíblico claro, «leyó en él» preserva mejor la preposición sin volverse ininteligible.
  - severity: low
    issue: «Informó» es un poco más formal que «contó / dijo / comunicó».
    rationale: No es incorrecto, pero puede sonar más administrativo que el hebreo simple נגד. Se puede retener si se desea un matiz cortesano; no requiere adjudicación especial.
  revised_spanish_text: 'Entonces Safán, el escriba[a], informó al rey, diciendo: «Hilkías, el sacerdote, me ha dado un libro[b]»; y Safán leyó en él delante del rey.'
