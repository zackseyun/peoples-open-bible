revisions:
- from: Cuando los oficiales de Faraón la vieron[a], la alabaron ante Faraón, y la mujer fue llevada a la casa de Faraón[b].
  to: Cuando los oficiales de Faraón la vieron, hablaron bien de ella a Faraón[a], y la mujer fue llevada a la casa de Faraón[b].
  rationale: Se ajusta «ante Faraón» a «a Faraón» para reflejar mejor אֶל־פַּרְעֹה y la decisión auditada. Se elige «hablaron bien de ella» porque suena natural en español y preserva el sentido de elogiar/comendar. Se mejora la nota léxica para incluir el matiz de recomendación y se afina la nota cultural sobre «casa» hacia el sentido de casa real/corte.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:21:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: los oficiales de Faraón la vieron, hablaron favorablemente de ella ante/al Faraón, y la mujer fue llevada a la casa de Faraón. Conserva correctamente «la mujer» frente a una expansión interpretativa como «la esposa». Sin embargo, la nota [a] no corresponde exactamente al texto principal: el hebreo אֶל־פַּרְעֹה y la auditoría inglesa favorecen «a Faraón» más que «ante Faraón», y una de las alternativas inglesas es precisamente «commended her to Pharaoh», no solo hablar bien de ella en su presencia.'
  spanish_quality_summary: El español es claro y natural, pero «la alabaron ante Faraón» suena algo menos idiomático en este contexto narrativo y puede sugerir más fuertemente presencia física inmediata que la dirección relacional «a Faraón». «La elogiaron ante Faraón» en la nota además duplica casi el mismo matiz. «La alabaron a Faraón» sería poco natural; una mejor solución es usar «hablaron bien de ella a Faraón» en el texto o «la recomendaron a Faraón / hablaron bien de ella a Faraón». También conviene alinear la nota [b] con la explicación inglesa sobre «household» más que «ámbito doméstico».
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé/Mesías. «Oficiales de Faraón» está bien alineado con la decisión documentada para שָׂרֵי פַרְעֹה. «La mujer» preserva correctamente הָאִשָּׁה. «Casa de Faraón» también sigue bien la preferencia del proyecto, con nota cultural apropiada si se precisa el sentido de casa real/hogar real.
  issues:
  - severity: medium
    issue: «ante Faraón» debilita la dirección relacional de אֶל־פַּרְעֹה
    rationale: El hebreo y la auditoría inglesa apuntan a que los oficiales hablaron favorablemente de ella a Faraón, no meramente en su presencia. «Ante» puede ser defendible, pero en español aquí es menos preciso y algo menos natural.
  - severity: medium
    issue: La nota [a] no preserva bien la alternativa principal documentada
    rationale: La auditoría inglesa conserva «they commended her to Pharaoh». La nota española ofrece «la elogiaron ante Faraón», que sigue arrastrando el mismo problema de «ante» y no refleja tan bien el matiz de recomendación.
  - severity: low
    issue: La nota [b] podría formular mejor el sentido de «household»
    rationale: «Ámbito doméstico» suena algo abstracto. La explicación inglesa sugiere «casa real» o «séquito/hogar real», no solo el edificio físico.
  revised_spanish_text: Cuando los oficiales de Faraón la vieron, hablaron bien de ella a Faraón[a], y la mujer fue llevada a la casa de Faraón[b].
  revised_footnotes:
  - marker: a
    text: 'También puede traducirse: «la elogiaron a Faraón» o «la recomendaron a Faraón».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «casa»; aquí puede implicar la casa real o la corte de Faraón, no solo el edificio físico.'
    reason: cultural_note
  revision_rationale: Se ajusta «ante Faraón» a «a Faraón» para reflejar mejor אֶל־פַּרְעֹה y la decisión auditada. Se elige «hablaron bien de ella» porque suena natural en español y preserva el sentido de elogiar/comendar. Se mejora la nota léxica para incluir el matiz de recomendación y se afina la nota cultural sobre «casa» hacia el sentido de casa real/corte.
