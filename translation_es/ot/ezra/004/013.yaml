source:
  edition: WLC
  text: כְּעַ֗ן יְדִ֨יעַ֙ לֶהֱוֵ֣א לְ/מַלְכָּ֔/א דִּ֠י הֵ֣ן קִרְיְתָ֥/א דָךְ֙ תִּתְבְּנֵ֔א וְ/שׁוּרַיָּ֖/ה יִֽשְׁתַּכְלְל֑וּן מִנְדָּֽה בְל֤וֹ וַ/הֲלָךְ֙ לָ֣א יִנְתְּנ֔וּן וְ/אַפְּתֹ֥ם מַלְכִ֖ים תְּהַנְזִֽק־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/013.yaml
  text: Now let it be known to the king that if this city is rebuilt and its walls are completed[a], they will not pay tribute, tax, or toll, and in the end it will damage the kings' revenue.
  footnotes:
  - marker: a
    text: Or 'and finally it will cause loss to the kings.' The Aramaic expression is concise, and the exact nuance of the loss is inferred from the context of unpaid tribute, tax, and toll.
    reason: lexical_alternative
