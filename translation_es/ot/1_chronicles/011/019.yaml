base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/019.yaml
  text: And he said[a], “Far be it from me before my God to do this! Shall I drink the blood of these men with their lives? For they brought it with their lives.” So he was not willing to drink it[b]. These things the three mighty men did.
  footnotes:
  - marker: a
    text: Or, 'at the risk of their lives.' The Hebrew repeats 'with/by their lives' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Blood'' is kept literally. David speaks of the water as if it were their blood because they obtained it through mortal danger.'
    reason: cultural_note
