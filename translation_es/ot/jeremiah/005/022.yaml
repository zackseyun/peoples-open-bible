revisions:
- from: ¿No me temen? —declara Yahvé. ¿No tiemblan delante de mí, que puse la arena como límite para el mar, un decreto perpetuo que no puede pasar? Aunque sus olas se agiten, no pueden prevalecer; aunque bramen, no pueden pasar sobre él.
  to: ¿No me temerán? —declara Yahvé—. ¿No temblarán delante de mí, yo que puse la arena como límite para el mar, decreto perpetuo al que no puede sobrepasar? Aunque sus olas se encrespen, no pueden prevalecer; aunque bramen, no pueden pasar sobre él.
  rationale: 'Se hicieron ajustes menores de estilo y precisión: se reforzó la pregunta retórica con «¿No me temerán?»; se aclaró la auto-referencia divina con «yo que puse»; y se precisó el sentido de עבר con «al que no puede sobrepasar», para que el lector entienda que el mar no rebasa el límite fijado. También se eligió «se encrespen» como imagen más idiomática para olas agitadas. No se requieren notas nuevas.'
