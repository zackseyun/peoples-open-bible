  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato imperativo, propósito de santidad y referencia al mandato previo de Yahvé. Sin embargo, «día de reposo» se aparta de la decisión léxica auditada para הַשַּׁבָּת y diluye el término identificable «sábado/Sabbat». Además, «te ha mandado» introduce un perfecto compuesto no requerido por צִוְּךָ, donde el pasado simple de la auditoría encaja mejor en el contexto de recordación deuteronómica.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en precisión terminológica y naturalidad bíblica contemporánea. «Guarda» funciona bien para שָׁמוֹר, y «para santificarlo» es aceptable. La mayor mejora necesaria es sustituir «día de reposo» por «día de sábado», más fiel al término fuente y más alineado con la política terminológica del proyecto. También conviene simplificar a «te mandó».
  glossary_alignment: 'Alinea correctamente יְהוָה como «Yahvé» y אֱלֹהֶיךָ como «tu Dios». La principal desalineación es הַשַּׁבָּת: el borrador usa «día de reposo», mientras que la evidencia y la auditoría prefieren una forma que preserve «sábado/Sabbath» como designación del día. No hay conflicto doctrinal mayor, pero sí una cuestión terminológica relevante.'
  issues:
  - severity: medium
    issue: «día de reposo» para יוֹם הַשַּׁבָּת
    rationale: Aunque es comprensible, desplaza el término específico «sábado/Sabbath» hacia una descripción funcional. La auditoría inglesa preserva «Sabbath day», y en español conviene mantener la identificación del día, no solo su carácter de reposo.
  - severity: low
    issue: «te ha mandado» en vez de «te mandó»
    rationale: El perfecto compuesto no es incorrecto, pero el pasado simple refleja mejor la narrativa deuteronómica de un mandato previo y sigue más de cerca la decisión auditada.
  - severity: low
    issue: Nota al pie no refleja la mejor alternativa principal en español
    rationale: Si el texto principal usa «Guarda», la nota puede conservar «Observa» como alternativa, pero debe anclarse a una expresión principal más fiel para הַשַּׁבָּת.
  revised_spanish_text: Guarda el día de sábado[a], para santificarlo, como Yahvé tu Dios te mandó.
