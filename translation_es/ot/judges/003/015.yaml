revisions:
- from: Entonces los hijos de Israel clamaron a Yahvé[a], y Yahvé les levantó un libertador, Ehud hijo de Gera, benjaminita, un hombre impedido en su mano derecha[b]. Y los hijos de Israel enviaron, por mano de él, un tributo a Eglón, rey de Moab.
  to: Entonces los hijos de Israel clamaron a Yahvé, y Yahvé les levantó un libertador, Ehud hijo de Gera, un benjaminita, un hombre impedido en su mano derecha[a]. Y los hijos de Israel enviaron por medio de él un tributo a Eglón, rey de Moab.
  rationale: Se elimina la nota sobre 'el SEÑOR' porque no corresponde al estándar del proyecto ni a una alternativa semántica necesaria del original. Se mejora la naturalidad española con 'un benjaminita' y 'por medio de él', manteniendo el sentido de agencia de בְיָדוֹ. Se conserva la nota lexical importante sobre la descripción inusual de la mano derecha de Ehud.
