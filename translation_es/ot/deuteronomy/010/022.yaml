base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/010/022.yaml
  text: Your fathers went down to Egypt with seventy persons[c][b][a], and now Yahweh your God has made you as numerous as the stars of the heavens.
  footnotes:
  - marker: a
    text: Or 'with seventy souls.' Hebrew נֶפֶשׁ ('soul/person') here is an idiom for counting persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'your ancestors.' The Hebrew specifically says 'your fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like the stars of heaven' or 'as the stars of the sky.' The sense is numerical abundance.
    reason: lexical_alternative
