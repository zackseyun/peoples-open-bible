translation:
  language: es
  text: 'Y cuando llevaron a estos reyes a Josué, Josué llamó a todos los hombres[a] de Israel y dijo a los comandantes de los hombres de guerra que habían ido con él[b]: «Acérquense; pongan sus pies sobre los cuellos de estos reyes». Entonces ellos se acercaron y pusieron sus pies sobre sus cuellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo hombre de Israel»; en este contexto militar, la expresión se refiere a los hombres reunidos con el ejército.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los comandantes de los guerreros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּהוֹצִיאָם
  english_pob_choice: And when they brought out
  chosen_spanish: Y sucedió que, cuando trajeron
  alternatives_spanish:
  - Y aconteció que, cuando trajeron
  - Y cuando trajeron
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea וַיְהִי + כְ con infinitivo se vierte de manera temporal y fluida. En español, «Y sucedió que, cuando…» conserva el giro idiomático sin sonar demasiado mecánico, y mantiene el valor narrativo de transición.
- source_word: הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: these kings
  chosen_spanish: estos reyes
  alternatives_spanish:
  - aquellos reyes
  - estos monarcas
  lexicon: HALOT
  rationale: El demostrativo apunta a los reyes presentes ante Josué; «estos» conserva la deíxis inmediata. «Reyes» es el equivalente natural de מְלָכִים en español bíblico claro.
- source_word: וַיִּקְרָא ... אֶל כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: Joshua called all the men of Israel
  chosen_spanish: Josué llamó a todo el pueblo de Israel
  alternatives_spanish:
  - Josué llamó a todos los hombres de Israel
  - Josué llamó a todo Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo hombre de Israel», pero en este contexto militar el POB inglés optó por una formulación que evita una traducción rígidamente literal. En español, «todo el pueblo de Israel» comunica la convocatoria pública sin perder el sentido colectivo del grupo reunido, aunque se reconoce que el trasfondo inmediato es masculino y militar.
- source_word: קְצִינֵי אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the commanders of the men of war
  chosen_spanish: los comandantes de los hombres de guerra
  alternatives_spanish:
  - los jefes de los guerreros
  - los oficiales de los hombres de guerra
  lexicon: HALOT
  rationale: קְצִינִים refiere a oficiales o comandantes; אַנְשֵׁי הַמִּלְחָמָה es la expresión militar «hombres de guerra». Se conserva la estructura y el registro bélico con «comandantes de los hombres de guerra».
- source_word: הֶהָלְכוּא אִתּוֹ
  english_pob_choice: who had gone with him
  chosen_spanish: que habían ido con él
  alternatives_spanish:
  - que fueron con él
  - que iban con él
  lexicon: HALOT
  rationale: 'El participio funciona de manera atributiva: describe a los comandantes acompañantes de Josué. El pluscuamperfecto español («habían ido») refleja bien la acción previa respecto del momento del discurso.'
- source_word: קִרְבוּ
  english_pob_choice: Come near
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Acérquense hacia aquí
  - Vengan cerca
  lexicon: HALOT
  rationale: El imperativo plural invita a un movimiento físico hacia Josué. «Acérquense» es una solución natural en español moderno y conserva la inmediatez del mandato.
- source_word: שִׂימוּ אֶת רַגְלֵיכֶם עַל צַוְּארֵי
  english_pob_choice: put your feet on the necks of
  chosen_spanish: pongan sus pies sobre los cuellos de
  alternatives_spanish:
  - pongan sus pies sobre el cuello de
  - pongan los pies sobre los cuellos de
  lexicon: HALOT
  rationale: שִׂים se traduce aquí con «poner», un verbo concreto y fiel al gesto simbólico. «Pies» reproduce רַגְלֵיכֶם sin suavizar la escena de dominación militar. «Cuellos» mantiene la imagen corporal; se evita «gargantas» porque el hebreo se refiere al cuello como área anatómica.
- source_word: עַל צַוְּארֵיהֶם
  english_pob_choice: on their necks
  chosen_spanish: sobre sus cuellos
  alternatives_spanish:
  - en sus cuellos
  - encima de sus cuellos
  lexicon: HALOT
  rationale: La preposición עַל expresa contacto y apoyo sobre la parte del cuerpo. «Sobre sus cuellos» es idiomático y conserva la fuerza visual del acto.
theological_decisions:
- issue: Preservación del gesto de humillación militar sin atenuarlo
  english_pob_reading: put your feet on the necks of these kings
  chosen_spanish_reading: pongan sus pies sobre los cuellos de estos reyes
  alternative_spanish_readings:
  - pongan sus pies sobre el cuello de estos reyes
  - pongan sus pies encima de estos reyes
  rationale: El texto describe un acto literal y simbólico de sometimiento militar. La traducción mantiene la crudeza y concreción de la escena, sin transformarla en una paráfrasis menos fuerte ni moralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Mantenimiento del lenguaje masculino y militar del pasaje
  english_pob_reading: all the men of Israel / commanders of the men of war
  chosen_spanish_reading: todo el pueblo de Israel / los comandantes de los hombres de guerra
  alternative_spanish_readings:
  - todos los hombres de Israel / los comandantes de los guerreros
  - todo Israel / los oficiales militares
  rationale: Aunque el hebreo tiene formas masculinas específicas, el español de este versículo permite una formulación colectiva en la primera cláusula para fluidez, mientras conserva la designación militar explícita en la segunda. Se mantiene la referencia al marco bélico sin borrar su carácter masculino donde el contexto lo exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se conservan la secuencia narrativa, la fórmula de convocatoria militar y la imagen de dominación sin suavizar. La principal decisión de adaptación al español fue resolver כָּל אִישׁ יִשְׂרָאֵל con una expresión colectiva natural («todo el pueblo de Israel») para evitar una dureza poco idiomática, manteniendo en nota la alternativa literal y su trasfondo militar. La opción para קְצִינֵי אַנְשֵׁי הַמִּלְחָמָה sigue de cerca la sintaxis del inglés auditado, con «comandantes» y «hombres de guerra»; el resto del versículo se traduce de forma estable y transparente.'
  spanish_consistency_notes:
  - Se usa «Josué» como forma estable del nombre propio.
  - Se preserva la progresión narrativa con «Y sucedió que…», «llamó», «dijo», «se acercaron» y «pusieron».
  - 'Se mantiene el lenguaje corporal concreto: «pies» y «cuellos»; no se introduce suavización interpretativa.'
  - Los marcadores de nota [a] y [b] se colocan en el texto donde corresponden y no se reutilizan.
