translation:
  text: Look out upon the earth, and you will find me among those who see; and do
    not look upon the dung-heap of dung.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲉⲧⲛⲏⲟⲩ literally "who see" (relative + verb of seeing). It could also be
      taken as "the visible ones" or even "the seers" depending on context.
    reason: lexical_alternative
  - marker: b
    text: ⲕⲟⲡρία (Greek loan) + Coptic ⲕⲱⲕ both denote manure/dung; the double expression
      heightens the image of abjection, hence "dung-heap of dung."
    reason: cultural_note
  - marker: c
    text: Consult text gives "I am without shame; I am ashamed" for this block, but
      the Coptic here speaks of going out upon the earth and a dung-heap prohibition;
      the mismatch likely reflects a heuristic line mapping.
    reason: alignment_note
  - marker: d
    text: Or 'I will go out upon the earth; you will find me among those who see;
      neither look upon me on the dung-heap of dung.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲃⲟⲗ
  chosen: go out
  alternatives:
  - come forth
  - go forth
  lexicon: Crum; Layton
  rationale: Common verb/adverb pairing in Sahidic for motion outward; here with future
    prefix yields a volitive/future sense.
- source_word: ϩⲓ ⲡⲕⲁϩ
  chosen: upon the earth
  alternatives:
  - on the ground
  - on the land
  lexicon: Crum; Layton
  rationale: ϩⲓ + noun indicates location/surface; ⲕⲁϩ regularly means earth/ground;
    "earth" preserves cosmological breadth while fitting context.
- source_word: ⲧⲉⲧⲛⲁϭⲓⲛⲉ
  chosen: you will find
  alternatives:
  - you shall find
  - you are going to find
  lexicon: Layton
  rationale: 2pl future with ⲧⲉⲧⲛ- + ⲭⲓⲛⲉ (find). The simple future captures the predictive
    tone.
- source_word: ⲙⲙⲟⲓ
  chosen: me
  alternatives: []
  lexicon: Crum
  rationale: Direct object 1sg; no nuance beyond object pronoun.
- source_word: ϩⲛ
  chosen: among
  alternatives:
  - in
  - within
  lexicon: Crum; Layton
  rationale: Preposition ϩⲛ can be locative "in" or partitive "among"; with a plural/collective
    relative clause, "among" fits best.
- source_word: ⲉⲧⲛⲏⲟⲩ
  chosen: those who see
  alternatives:
  - the ones who look
  - the seers
  - the visible ones
  lexicon: Crum; Layton
  rationale: ⲛⲏⲟⲩ = to see; ⲉⲧ- forms a relative. Sense is ambiguous (subjective vs.
    objective visibility); "those who see" keeps grammatical transparency without
    overinterpreting.
- source_word: ⲟⲩⲧⲉ
  chosen: neither
  alternatives:
  - nor
  - and not
  lexicon: Crum
  rationale: Coordinating negative used to continue a prohibition/negated sequence;
    "neither" fits continuing structure.
- source_word: ⲙⲡⲣⲛⲁⲩ
  chosen: look upon
  alternatives:
  - see
  - behold
  - look at
  lexicon: Crum; Layton
  rationale: Negative imperative/volitive (ⲙⲡⲣ + infinitive) with ⲛⲁⲩ (see). "Look
    upon" preserves a formal tone matching the poem's address.
- source_word: ⲉⲡⲓⲧⲕⲟⲩⲡⲣⲓⲁ
  chosen: on the dung-heap
  alternatives:
  - upon the manure-heap
  - upon the dunghill
  lexicon: Crum; Liddell–Scott (Greek κοπρία)
  rationale: Greek loan κοπρία (dung/manure heap) with article; "dung-heap" is idiomatic
    yet literal.
- source_word: ⲛⲧⲉ
  chosen: of
  alternatives:
  - of the
  lexicon: Crum
  rationale: Genitival linker; simple "of" suffices.
- source_word: ⲡⲓⲕⲱⲕ
  chosen: dung
  alternatives:
  - filth
  - excrement
  lexicon: Crum
  rationale: ⲕⲱⲕ denotes excrement/filth; since κοπρία already signals a heap of dung,
    retaining "dung" preserves the emphatic tautology in Coptic.
parallelism_check: 'The structure moves in three beats: (1) first-person motion "I
  will go out", (2) second-person future discovery "you will find me", (3) prohibitive
  continuation "neither look upon me ...". While not an "I am … I am" paradox, the
  antithetical movement (earthly going out vs. refusal to be seen as refuse) is preserved.
  The paired negative is kept via "neither …".'
voice_check: 'Direct address remains: the speaker self-identifies in first person
  ("I … me") and commands/foretells to a plural audience ("you will find", "neither
  look"). The authoritative, oracular voice is intact, without domesticating the stark
  imagery.'
alignment_risk_note: 'Alignment confidence is only medium, and the Coptic snippet
  centers on going out over the earth and a prohibition against viewing the speaker
  on a "dung-heap of dung". This does not match the consult block’s paradox "I am
  without shame; I am ashamed." Therefore, I did not force that pair into the rendering.
  The internal segmentation is also tricky: the line break likely splits ⲛⲁⲩ across
  lines (…ⲙⲡⲣⲛⲁ | ⲩ …). "ⲉⲧⲛⲏⲟⲩ" is read as a relative plural "those who see", but
  its referent could be construed differently if more context is supplied.'
