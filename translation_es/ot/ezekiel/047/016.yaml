translation:
  language: es
  text: Hamath, Berotá[a], Sibraim —que está entre el límite de Damasco y el límite de Hamath—, Hazer-hatticón[b][c], que está hacia el límite de Haurán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Berotá; algunos comparan el nombre relacionado «Berotai» en 2 Samuel 8:8.
    reason: alternative_reading
  - marker: b
    text: Hazer-hatticón probablemente es un nombre de lugar; literalmente, sus componentes significan algo como «recinto» o «asentamiento del medio».
    reason: lexical_alternative
  - marker: c
    text: O «que está junto al límite de Haurán».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamath
  alternatives_spanish:
  - Jamat
  - Lebo-Hamath
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva transliterado. No se amplía a 'Lebo-Hamath' porque ese elemento no está en el hebreo de este verso.
- source_word: בֵּרוֹתָה
  english_pob_choice: Berothah
  chosen_spanish: Berotá
  alternatives_spanish:
  - Berotah
  - Berotá
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado directamente desde el hebreo. Se adapta la acentuación al español para lectura natural, sin cambiar el referente.
- source_word: סִבְרַיִם
  english_pob_choice: Sibraim
  chosen_spanish: Sibraim
  alternatives_spanish:
  - Sibriam
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado. Se mantiene la forma más cercana a la convención académica y al contorno consonántico hebreo.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - linde
  lexicon: HALOT
  rationale: En una lista de delimitación territorial, 'límite' comunica con claridad la idea de demarcación sin sonar demasiado técnico ni introducir una noción más amplia de territorio.
- source_word: חָצֵר הַתִּיכוֹן
  english_pob_choice: Hazer-hattikon
  chosen_spanish: Hazer-hatticón
  alternatives_spanish:
  - Hazer-hattikon
  - Hazar-haticón
  lexicon: HALOT
  rationale: Se trata de un probable nombre propio compuesto. Se translitera para no perder el valor topográfico que el propio texto preserva; el guion se mantiene según el patrón del original y la costumbre del POB.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - hacia el
  - hacia la dirección de
  lexicon: HALOT
  rationale: En descripciones de frontera, אֶל puede indicar dirección o proximidad. 'Hacia' refleja bien la orientación sin forzar una idea de posesión o contacto directo.
theological_decisions:
- issue: Uso de nombres divinos y geográficos en una lista de límites territoriales
  english_pob_reading: The verse is a geographic itinerary of place names with border markers; no theological claim is being made by the names themselves.
  chosen_spanish_reading: Se conserva la estructura topográfica sin añadir glosas doctrinales ni convertir los nombres en expresiones interpretativas.
  alternative_spanish_readings:
  - Paráfrasis explicativa de los nombres propios
  - Traducción de los componentes de Hazer-hattikon como 'enclosure/recinto del medio'
  rationale: El hebreo presenta una enumeración de topónimos delimitada por cláusulas relacionales. Traducir los componentes semánticos de un nombre compuesto alteraría el perfil del texto como itinerario fronterizo y borraría la tensión entre nombre propio y significado léxico.
  doctrine_reference: Topografía bíblica; no aplica una formulación doctrinal específica.
translation_notes:
  revision_awareness: La revisión más reciente en el audit trail ajustó la preposición inglesa de 'by the border' a 'toward the border' para captar con más precisión אֶל. La redacción española sigue esa misma decisión con 'hacia'. Se mantuvieron los nombres propios y la estructura de lista fronteriza sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Hamath' sin traducir a 'Lebo-Hamath', porque el hebreo aquí nombra Hamath de forma simple.
  - '''Límite'' se usa de modo consistente para גְּבוּל en contexto geográfico.'
  - Los nombres propios se transliteran; solo Berothah recibe adaptación acentual para lectura española.
  - '''Hacia'' preserva la dirección/proximidad de אֶל sin afirmar extensión exacta.'
  - Se evita traducir Hazer-hattikon como frase descriptiva para conservar la función de nombre propio en la enumeración.
