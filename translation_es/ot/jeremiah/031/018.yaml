revisions:
- from: 'He oído ciertamente a Efraín bemoanándose: «Tú me disciplinaste[a], y fui disciplinado, como un becerro sin adiestrar. Devuélveme, y volveré[b], porque tú eres Yahvé, mi Dios».'
  to: 'He oído ciertamente a Efraín lamentándose: «Tú me disciplinaste[a], y fui disciplinado, como un becerro sin adiestrar. Hazme volver, y volveré[b], porque tú eres Yahvé mi Dios».'
  rationale: Se reemplaza la forma inválida «bemoanándose» por «lamentándose», con la nota preservando el matiz reflexivo audible. Se cambia «Devuélveme» por «Hazme volver» para reflejar mejor el hifil de שוב y su repetición con «volveré». Se suaviza la puntuación final a «Yahvé mi Dios» por mayor naturalidad y fidelidad confesional en español.
