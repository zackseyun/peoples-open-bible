revisions:
- from: Porque en mi monte santo[a], en el monte alto de Israel —declara el Señor Yahvé—, allí me servirá toda la casa de Israel, todos ellos en la tierra; allí los aceptaré, y allí pediré[v] sus contribuciones y las primicias de sus ofrendas[b], junto con todas sus cosas santas[c].
  to: Porque en mi monte santo[a], en el monte alto de Israel —declara el Señor Yahvé— allí me servirá toda la casa de Israel, todos ellos en la tierra. Allí los aceptaré, y allí requeriré[d] sus contribuciones y las primicias de sus ofrendas[b], junto con todas sus cosas sagradas[c].
  rationale: Se corrigen el marcador de nota para cumplir el formato requerido, el verbo «pediré» por «requeriré» para reflejar mejor אֶדְרוֹשׁ y la rationale auditada, y «cosas santas» por «cosas sagradas» para mejorar la naturalidad del español sin perder amplitud semántica. También se aligera levemente la puntuación.
