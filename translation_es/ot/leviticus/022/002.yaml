translation:
  language: es
  text: Habla a Aarón y a sus hijos[a], que se mantengan apartados de las cosas santas de los hijos de Israel, las cuales ellos santifican para mí[c][b], y no profanen mi santo nombre. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se aparten de» o «se abstengan de» las cosas santas de los hijos de Israel.'
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Israel» es la expresión hebrea formal; alternativamente, «el pueblo de Israel» o «los israelitas».
    reason: lexical_alternative
  - marker: c
    text: Es decir, las cosas santas que los israelitas consagran a Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige tu palabra a
  lexicon: HALOT
  rationale: El imperativo de דבר introduce una orden divina directa. En español, «Habla a» conserva el tono solemne y mandativo sin volverse forzado.
- source_word: וְיִנָּזְרוּ
  english_pob_choice: keep themselves from
  chosen_spanish: se mantengan apartados de
  alternatives_spanish:
  - se separen de
  - se abstengan de
  lexicon: HALOT
  rationale: El verbo niphal tiene fuerza reflexiva de apartarse o abstenerse. «Se mantengan apartados de» comunica esa separación práctica con naturalidad en español y preserva el matiz cultual.
- source_word: מִקָּדְשֵׁי בְנֵי יִשְׂרָאֵל
  english_pob_choice: from the holy things of the sons of Israel
  chosen_spanish: de las cosas santas de los hijos de Israel
  alternatives_spanish:
  - de las cosas sagradas de los israelitas
  - de las ofrendas santas del pueblo de Israel
  lexicon: HALOT
  rationale: «קדשי» abarca lo consagrado de manera amplia; «cosas santas» conserva esa amplitud cultual mejor que un término más específico como «ofrendas».
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea formal y su valor de designación pactal. En español, «los hijos de Israel» es fiel y entendido en contexto bíblico.
- source_word: יְחַלְּלוּ
  english_pob_choice: profane
  chosen_spanish: profanen
  alternatives_spanish:
  - traten como común
  - deshonren
  lexicon: HALOT
  rationale: En contextos de santidad, חלל significa profanar o desacralizar. «Profanen» es el equivalente más directo y preciso.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - el nombre de mi santidad
  - mi nombre santo
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve naturalmente «mi santo nombre», conservando el vínculo entre nombre y santidad sin perder fluidez española.
- source_word: אֲשֶׁר הֵם מַקְדִּשִׁים לִי
  english_pob_choice: which they sanctify to me
  chosen_spanish: el cual ellos santifican para mí
  alternatives_spanish:
  - que ellos consagran para mí
  - que ellos apartan para mí como santo
  lexicon: HALOT
  rationale: Se mantiene el verbo de santificar/consecrar y el dativo final. «Para mí» conserva la relación de destinación y uso sagrado documentada por el hebreo y el comentario inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: transliteración del nombre divino como «Yahvé», no una sustitución por título.'
theological_decisions:
- issue: Referente de «el cual ellos santifican para mí»
  english_pob_reading: The clause refers to the holy things of the sons of Israel, not directly to my holy name.
  chosen_spanish_reading: La cláusula se entiende primariamente de «las cosas santas de los hijos de Israel», no directamente del «nombre».
  alternative_spanish_readings:
  - Puede leerse más libremente como referido al nombre santo de Dios en el flujo de la frase.
  rationale: El hebreo plural y la lógica cultual favorecen que el sujeto implícito de «santifican» sea lo consagrado por Israel. La redacción española conserva esa relación sin eliminar la tensión sintáctica.
  doctrine_reference: La santidad del nombre divino se vincula con el uso reverente de lo consagrado; se preserva la relación textual sin resolverla artificialmente.
- issue: Uso del nombre divino en la clausura
  english_pob_reading: I am Yahweh.
  chosen_spanish_reading: Yo soy Yahvé.
  alternative_spanish_readings:
  - Yo soy el SEÑOR.
  - Yo soy Yahvéh.
  rationale: Se sigue el principio del proyecto de rendir el Tetragrama con el nombre propio «Yahvé», manteniendo la identidad personal y pactual del hablante.
  doctrine_reference: Éxodo 3:15; Levítico 22:2
translation_notes:
  revision_awareness: 'La redacción incorpora el último pase de revisión del inglés POB: se reflejó el matiz reflexivo de וְיִנָּזְרוּ con «se mantengan apartados de»; se mantuvo la coordinación negativa «y no profanen» en lugar de una finalidad explícita; y se usó «para mí» para el dativo de לִי, siguiendo la última revisión del audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «hijos de Israel» como fórmula pactal formal.
  - «Santo/santas» se emplea para mantener el registro cultual, sin reemplazarlo por terminología eclesiástica posterior.
  - No se reduce קָדְשֵׁי a «ofrendas» para no estrechar indebidamente el alcance del hebreo.
