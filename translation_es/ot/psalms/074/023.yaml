  text: אַל תִּ֭שְׁכַּח ק֣וֹל צֹרְרֶ֑י/ךָ שְׁא֥וֹן קָ֝מֶ֗י/ךָ עֹלֶ֥ה תָמִֽיד־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/074/023.yaml
  text: Do not forget the voice of your enemies[a], the uproar of those who rise against you[b], which goes up continually.
  footnotes:
  - marker: a
    text: Or 'the sound of your enemies' for 'the voice of your enemies.' Hebrew qol can denote either voice or sound/noise depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tumult of those who rise against you rises continually.' The Hebrew can be read more tersely without the relative 'which,' but the main text makes the syntax clearer in English.
    reason: lexical_alternative
