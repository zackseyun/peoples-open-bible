translation:
  language: es
  text: Cuando los filisteos oyeron que David había sido ungido rey sobre todo Israel, todos los filisteos subieron para buscar a David. Y David oyó y salió delante de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «salió a su encuentro» o «salió contra ellos». El hebreo dice literalmente «salió delante de ellos», lo cual puede implicar confrontación militar sin afirmarla de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: En este relato narrativo, שׁמע expresa recibir noticia. «Oyeron» conserva el sentido directo y natural en español, sin añadir una idea más interpretativa como «supieron».
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: La forma con artículo es natural en español para un pueblo ya identificado en el relato y mantiene la referencia colectiva del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que oyeron, por lo que «que» refleja mejor la función de la cláusula que una lectura temporal o causal.
- source_word: נִמְשַׁח
  english_pob_choice: had been anointed
  chosen_spanish: había sido ungido
  alternatives_spanish:
  - fue ungido
  - había sido consagrado
  lexicon: HALOT
  rationale: El nifal de משׁח se expresa con «ungido». El pluscuamperfecto español reproduce bien la anterioridad respecto de «oyeron».
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  lexicon: HALOT
  rationale: La preposición ל marca oficio o resultado. En español, «ungido rey» es conciso y fiel; «como rey» explicita más la relación, pero no es necesario.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - para todo Israel
  lexicon: HALOT
  rationale: «Sobre» preserva la idea de dominio real de עַל y «todo Israel» conserva el alcance político del texto.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron en marcha
  - ascendieron
  lexicon: HALOT
  rationale: עלה en contexto narrativo-militar se traduce de forma natural por «subieron». Mantiene la imagen direccional sin añadir especificación militar no expresada explícitamente.
- source_word: כָל פְּלִשְׁתִּים
  english_pob_choice: all the Philistines
  chosen_spanish: todos los filisteos
  alternatives_spanish:
  - la totalidad de los filisteos
  - todo el ejército filisteo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todos los filisteos». Se conserva la pluralidad colectiva sin convertirla en una formulación más interpretativa.
- source_word: לְבַקֵּשׁ אֶת דָּוִיד
  english_pob_choice: to seek David
  chosen_spanish: para buscar a David
  alternatives_spanish:
  - para buscar a David y encontrarlo
  - para ir tras David
  lexicon: HALOT
  rationale: בקשׁ admite «buscar» en español y, en este contexto, implica persecución. «Buscar a David» preserva la literalidad funcional sin sobredeterminar el motivo.
- source_word: וַיִּשְׁמַע דָּוִיד
  english_pob_choice: And David heard
  chosen_spanish: Y David lo oyó
  alternatives_spanish:
  - Y David oyó
  - Y David escuchó
  lexicon: HALOT
  rationale: Se mantiene la simetría con la primera cláusula y se explicita el objeto implícito con «lo», entendido por el contexto inmediato. «Oyó» conserva el valor de noticia recibida.
- source_word: וַיֵּצֵא לִפְנֵיהֶם
  english_pob_choice: went out before them
  chosen_spanish: salió delante de ellos
  alternatives_spanish:
  - salió al encuentro de ellos
  - salió contra ellos
  lexicon: HALOT
  rationale: La expresión literal «delante de ellos» respeta el hebreo לִפְנֵי/הֶם. En español suena natural y deja abierta la tensión registrada por la POB entre un simple salir al frente y un avance de confrontación.
theological_decisions:
- issue: 'Sentido de la frase final: confrontación implícita o solo desplazamiento'
  english_pob_reading: '''went out before them'' may imply military confrontation without stating it explicitly.'
  chosen_spanish_reading: «salió delante de ellos» conserva la formulación abierta, dejando implícita la posible confrontación sin afirmarla de manera más fuerte que el hebreo.
  alternative_spanish_readings:
  - salió a su encuentro
  - salió contra ellos
  rationale: El texto hebreo usa una expresión espacial literal. Mantenerla en español preserva la ambigüedad documentada por la POB y evita cerrar el sentido hacia una lectura militar explícita que el hebreo no formula directamente.
  doctrine_reference: No aplica; decisión narrativa/lexical.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión inglesa marcada como sin cambios. No se incorporan revisiones textuales nuevas; solo se adapta la solución lexical y la nota alternativa al español manteniendo la ambigüedad reconocida por la POB.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto no porque aparezca explícitamente en este versículo, sino para mantener consistencia general de la serie cuando corresponda.
  - «Ungido» se mantiene para משׁח, coherente con la terminología bíblica del proyecto.
  - Se evita «Cristo» porque el texto no usa Cristo/Mesías como título aquí y la referencia es al acto de unción real de David.
  - La nota [a] se ancla en «delante de ellos» para reflejar la alternativa interpretativa preservada por la POB.
