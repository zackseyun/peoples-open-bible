translation:
  language: es
  text: Y he estado contigo por dondequiera que has andado, y he eliminado[a] a todos tus enemigos de delante de ti, y te haré un nombre como el nombre de los grandes que hay en la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he cortado». El hebreo dice literalmente «he cortado» o «he hecho cortar», con el sentido de quitar de en medio o destruir a los enemigos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que están en la tierra». El hebreo también puede entenderse como «en el país», pero aquí «en la tierra» expresa mejor el alcance amplio del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  english_pob_choice: I have been
  chosen_spanish: he estado
  alternatives_spanish:
  - estuve
  - he sido
  lexicon: HALOT
  rationale: 'El perfecto hebreo en este contexto retrospectivo se refleja mejor en español con pretérito perfecto compuesto: ‘he estado’. Mantiene la idea de presencia continua y encaja con el tono de repaso de la fidelidad divina.'
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto a ti
  lexicon: HALOT
  rationale: ‘Contigo’ expresa de forma natural la cercanía personal del sujeto divino con David y evita una formulación más rígida sin perder el sentido del hebreo.
- source_word: בְּכֹל אֲשֶׁר הָלַכְתָּ
  english_pob_choice: wherever you have gone
  chosen_spanish: en todo lo que has andado
  alternatives_spanish:
  - adondequiera que has ido
  - en cada lugar por donde has pasado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no conviene reducirla a una frase demasiado explicativa. ‘En todo lo que has andado’ conserva la amplitud de la fórmula y su resonancia bíblica, aunque en nota puede entenderse como ‘dondequiera que has ido’.
- source_word: וָאַכְרִית
  english_pob_choice: I have cut off
  chosen_spanish: he eliminado
  alternatives_spanish:
  - he cortado
  - he destruido
  - he extirpado
  lexicon: HALOT
  rationale: El verbo hiphil de כרת tiene la idea de hacer desaparecer o quitar de en medio. En español, ‘he eliminado’ comunica bien la acción sin forzar una imagen corporal que, aquí, podría sonar menos natural que en hebreo. Se mantiene la fuerza de remoción total.
- source_word: אֶת כָּל אוֹיְבֶיךָ
  english_pob_choice: all your enemies
  chosen_spanish: a todos tus enemigos
  alternatives_spanish:
  - a todos los que te enemistaban
  - a todos tus adversarios
  lexicon: HALOT
  rationale: Se conserva el cuantificador explícito ‘todos’ y el sustantivo ‘enemigos’, que es la equivalencia directa más clara en español.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: ‘De delante de ti’ preserva la imagen espacial hebrea de retirar a los enemigos del camino o de la presencia visible de David. ‘De tu presencia’ sería más literal, pero algo más abstracto.
- source_word: וְעָשִׂיתִי לְךָ שֵׁם
  english_pob_choice: I will make for you a name
  chosen_spanish: te haré un nombre
  alternatives_spanish:
  - te daré renombre
  - haré para ti un nombre
  lexicon: HALOT
  rationale: ‘Hacer un nombre’ es el giro bíblico clave y puede mantenerse en español con ‘te haré un nombre’. Conserva la tensión entre nombre literal y fama/renombre, sin borrar la metáfora que el POB inglés preserva.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - reputación
  lexicon: HALOT
  rationale: Se mantiene ‘nombre’ en el texto principal porque el hebreo usa precisamente שֵׁם y el valor de fama/renombre queda implícito en la construcción idiomática.
- source_word: כְּשֵׁם הַגְּדוֹלִים
  english_pob_choice: like the name of the great ones
  chosen_spanish: como el nombre de los grandes
  alternatives_spanish:
  - como el nombre de los grandes hombres
  - como la fama de los grandes
  lexicon: HALOT
  rationale: ‘Los grandes’ reproduce el plural adjetival sin introducir un rasgo masculino que el hebreo no exige explícitamente. Se conserva la comparación con figuras de alta reputación.
- source_word: אֲשֶׁר בָּאָרֶץ
  english_pob_choice: who are on the earth
  chosen_spanish: que hay en la tierra
  alternatives_spanish:
  - que están en la tierra
  - que están en el país
  lexicon: HALOT
  rationale: ‘Que hay en la tierra’ fluye mejor en español y mantiene el alcance amplio del hebreo. ‘Tierra’ permite dejar abierta la referencia a la esfera humana amplia, como en el inglés POB.
theological_decisions:
- issue: Tiempo verbal de las acciones divinas
  english_pob_reading: 'Retrospective divine faithfulness with a forward promise: ''I have been... I have cut off... I will make...'''
  chosen_spanish_reading: 'Repaso retrospectivo de la fidelidad pasada de Yahvé, seguido de una promesa futura: ''he estado... he eliminado... te haré...'''
  alternative_spanish_readings:
  - fui... eliminé... haré
  - he estado... he cortado... haré
  rationale: El hebreo alterna perfectos retrospectivos con un yiqtol de promesa. En español, el pretérito perfecto compuesto ayuda a reflejar esa retrospectividad y a la vez mantiene viva la promesa final en futuro.
  doctrine_reference: 1 Crónicas 17:8; cf. el paralelo de 2 Samuel 7 sobre la promesa davídica
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde un pasado simple a presente perfecto para reflejar mejor los perfectos hebreos en contexto retrospectivo. La versión española sigue esa misma decisión aspectual con 'he estado', 'he eliminado' y futuro 'te haré', sin introducir cambios doctrinales ni ampliar el contenido más allá del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito solo como sujeto del discurso divino en la continuidad literaria del pasaje; no se añadió en el versículo porque el hebreo aquí usa primera persona.
  - Se preservó la metáfora bíblica de 'hacer un nombre', evitando sustituirla por una paráfrasis puramente interpretativa como 'hacerte famoso' en el texto principal.
  - Se eligió 'tierra' en lugar de 'país' para conservar la amplitud posible del hebreo, pero la nota deja abierta la alternativa local.
  - Se usó un español formal y claro, con 'contigo', 'delante de ti' y 'te haré' para sonar natural sin perder la estructura original.
