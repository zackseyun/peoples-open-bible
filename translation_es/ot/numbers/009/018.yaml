review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la repetición de עַל־פִּי יְהוָה, el paralelismo entre partir y acampar, la duración marcada por כָּל יְמֵי אֲשֶׁר, y la permanencia de la nube sobre el tabernáculo. Sin embargo, la elección «según la orden de Yahvé» atenúa el matiz más directo de mandato presente en el modismo, y el imperfecto español «partían / acampaban / permanecía / permanecían» puede sonar habitual o iterativo de modo menos definido que el valor narrativo-general del hebreo en este contexto. Una leve revisión mejora fidelidad y naturalidad.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. No obstante, «según la orden de» resulta algo menos idiomático y menos enérgico que «por mandato de» o «a la orden de», y la cadena de imperfectos suena un poco pesada. «Permanecían acampados» al final funciona bien para la duración.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה y «tabernáculo» para הַמִּשְׁכָּן. «Los hijos de Israel» preserva la forma fuente adecuadamente. La principal mejora necesaria es ajustar עַל־פִּי יְהוָה a una formulación española que preserve mejor la fuerza de mandato.
  issues:
  - severity: medium
    issue: «Según la orden de Yahvé» debilita el modismo de mandato
    rationale: עַל־פִּי יְהוָה aquí expresa dirección autorizada/mandato. «Según» comunica conformidad, pero en español suena menos directo que «por mandato de Yahvé», que preserva mejor la fuerza semántica y sigue siendo natural.
  - severity: low
    issue: Uso de imperfectos en toda la frase
    rationale: «Partían… acampaban… permanecía… permanecían» es comprensible, pero puede sugerir acción habitual más marcada de lo necesario. En español bíblico natural, el presente gnómico o una formulación más directa puede representar mejor la regla general del pasaje.
  - severity: low
    issue: Nota al pie repite una formulación mejorable
    rationale: Si se revisa la frase principal a «por mandato de Yahvé», conviene que la nota también refleje ese equivalente idiomático como explicación del hebreo literal «sobre la boca de Yahvé».
  revised_spanish_text: Por mandato de Yahvé, los hijos de Israel parten[a], y por mandato de Yahvé acampan. Todos los días que la nube permanece sobre el tabernáculo, permanecen acampados.
  revised_footnotes:
