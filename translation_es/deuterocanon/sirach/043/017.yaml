translation:
  language: es
  text: Al destello[a] sacude la nieve, y como langostas se asienta donde permanece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo hebreo es difícil y difiere mucho del paralelo griego. El griego dice en cambio: «La voz de su trueno reprendió la tierra, y una tormenta del viento del norte y un torbellino de viento». Masada también conserva aquí una línea hebrea distinta, con en parte «la voz del trueno» donde el texto de la Guenizá de El Cairo tiene «al destello».'
    reason: textual_variant
lexical_decisions:
- source_word: ברשף
  english_pob_choice: At the flash
  chosen_spanish: Al destello
  alternatives_spanish:
  - Con un destello
  - A la luz del relámpago
  lexicon: HALOT
  rationale: La frase hebrea es breve e instrumental-temporal. «Al destello» conserva esa concisión en español y evita precisar demasiado si se trata de luz, relámpago o llama, tal como el hebreo y la nota inglesa dejan abierto.
- source_word: יניף
  english_pob_choice: he shakes out
  chosen_spanish: sacude
  alternatives_spanish:
  - agita
  - despliega
  - hace caer
  lexicon: HALOT
  rationale: En el contexto de nieve, «sacude» comunica bien la acción de desprender o lanzar en forma natural en español, sin perder la fuerza verbal del hebreo נוף/הניף.
- source_word: שלגו
  english_pob_choice: snow
  chosen_spanish: la nieve de él
  alternatives_spanish:
  - su nieve
  - la nieve
  lexicon: HALOT
  rationale: El sufijo pronominal hebreo puede conservarse de modo transparente como «de él», manteniendo la referencia al agente implícito del contexto. «Su nieve» sería más fluido, pero atenúa la forma del original.
- source_word: וכארבה
  english_pob_choice: and like locusts
  chosen_spanish: y como langostas
  alternatives_spanish:
  - y como una plaga de langostas
  - y como saltamontes
  lexicon: HALOT
  rationale: «Langostas» reproduce el término estándar de ארבה y mantiene el símil compacto del hebreo.
- source_word: ישכון
  english_pob_choice: it settles
  chosen_spanish: se asienta
  alternatives_spanish:
  - se posa
  - se establece
  - se queda
  lexicon: HALOT
  rationale: «Asentarse» expresa bien la idea de llegar a reposo o fijarse en un lugar, sin introducir una imagen demasiado específica.
- source_word: דירתו
  english_pob_choice: where it stays
  chosen_spanish: donde se queda
  alternatives_spanish:
  - en su morada
  - en su vivienda
  - donde habita
  lexicon: HALOT
  rationale: La línea hebrea es textualmente difícil. «Donde se queda» conserva el sentido locativo de דירה sin forzar un registro demasiado elevado ni pretender más certeza de la que ofrece el testimonio hebreo.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego divergente
  english_pob_reading: The main text follows the Hebrew witness; a note preserves the substantially different Greek storm imagery.
  chosen_spanish_reading: El texto principal sigue el hebreo; una nota preserva la imagen griega de tormenta, trueno y viento del norte.
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «La voz de su trueno reprendió la tierra, y una tormenta del viento del norte y un torbellino de espíritu»'
  - Fusionar ambos testigos en una sola redacción
  rationale: La política del proyecto para Sirácide da primacía al hebreo donde se conserva, pero exige honestidad sobre la discrepancia grande con el griego. Por eso el texto español sigue el hebreo y documenta el paralelo griego en nota, sin armonizarlos artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; preserve uncertainty honestly.'
translation_notes:
  revision_awareness: La redacción sigue la última pasada revisada sin cambios; se mantiene la prioridad del hebreo con nota explícita sobre la fuerte divergencia del griego y la tradición de Masada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exigiera; aquí no aparece el Tetragrámaton.
  - No se introdujo terminología eclesiástica tradicional innecesaria.
  - Se preservó la ambigüedad textual en la nota en lugar de armonizar los testigos.
