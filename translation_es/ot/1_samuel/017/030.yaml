revisions:
- from: Entonces se apartó de él hacia otro y dijo la misma cosa[a]; y el pueblo le respondió como antes.
  to: Entonces se apartó de él hacia otro y dijo lo mismo; y el pueblo le respondió como antes[a].
  rationale: Se mejora la naturalidad y legibilidad del español con «dijo lo mismo», sin perder el sentido del hebreo. Además, se reubica la nota al segmento que realmente comenta, siguiendo con mayor precisión la lógica del texto fuente y de la auditoría inglesa.
