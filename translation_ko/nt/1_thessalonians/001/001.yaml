id: 1TH.1.1
reference: 1 Thessalonians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ· χάρις ὑμῖν καὶ ⸀εἰρήνη.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/001.yaml
  text: 'Paul and Silvanus and Timothy[b][a], to the church of the Thessalonians in God the Father and the Lord Jesus Messiah: grace to you and peace.'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning; many English versions transliterate it as 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'assembly' for 'church.' The Greek ἐκκλησία refers to the gathered community.
    reason: lexical_alternative
translation:
  language: ko
  text: '바울과 실루아노와 디모데가 아버지 하나님과 주 예수 메시아[a] 안에 있는 데살로니가인들의 회중[b]에게 편지합니다. 은혜와 평강이 여러분에게 있기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 칭호 Χριστός는 본 번역의 원칙에 따라 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「교회」. 헬라어 ἐκκλησία는 모인 공동체(회중)를 가리키며, 후대 제도적 함의를 피해 「회중」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σιλουανὸς
  english_pob_choice: Silvanus
  chosen_korean: 실루아노
  alternatives_korean:
  - 실라
  lexicon: BDAG
  rationale: 헬라어 Σιλουανός를 그대로 음역한 「실루아노」를 채택한다. 한국 전통의 친숙한 「실라」는 다른 헬라어 형태(Σιλᾶς)를 반영하므로 본문 형태와 어긋난다.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  - 모임
  lexicon: BDAG
  rationale: 글로사리 기본값에 따라 모인 신앙 공동체를 가리키는 ἐκκλησία를 「회중」으로 옮겨, 후대 제도적 「교회」의 함의를 피한다. 영어 POB가 「church」를 택했더라도 한국어에서는 「교회」가 제도성을 더 강하게 함의하므로 「회중」으로 옮기고 각주에 「교회」를 둔다.
- source_word: Θεσσαλονικέων
  english_pob_choice: of the Thessalonians
  chosen_korean: 데살로니가인들의
  alternatives_korean:
  - 데살로니가 사람들의
  lexicon: BDAG
  rationale: 복수 속격으로 「데살로니가에 속한 사람들」을 가리킨다. 한국 교회 전통의 지명 「데살로니가」와 「~인」 접미사를 결합한 「데살로니가인들」이 간결하다.
- source_word: ἐν θεῷ πατρὶ
  english_pob_choice: in God the Father
  chosen_korean: 아버지 하나님 안에
  alternatives_korean:
  - 하나님 아버지 안에
  - 아버지이신 하나님 안에
  lexicon: BDAG
  rationale: 헬라어에는 「우리」(ἡμῶν)가 없으므로 「우리 아버지」로 덧붙이지 않는다. 동격 구문(하나님—곧 아버지)을 자연스럽게 살려 「아버지 하나님」으로 옮긴다.
- source_word: κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_choice: the Lord Jesus Messiah
  chosen_korean: 주 예수 메시아
  alternatives_korean:
  - 주 예수 그리스도
  lexicon: BDAG
  rationale: 칭호 Χριστός를 일관되게 「메시아」로 옮기며, 「주」 칭호와 나란히 두어 인사 정식의 무게를 보존한다.
- source_word: ἐν
  english_pob_choice: in
  chosen_korean: 안에
  alternatives_korean:
  - ~에 속한
  - ~안에 있는
  lexicon: BDAG
  rationale: 처소격 ἐν의 신학적 연합·관계 의미를 살려 「안에」로 옮긴다. 「~에 속한」으로 해석적 풀이를 하지 않고 헬라어 본문의 구조를 보존한다.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  english_pob_choice: grace to you and peace
  chosen_korean: 은혜와 평강이 여러분에게 있기를 빕니다
  alternatives_korean:
  - 여러분에게 은혜와 평강
  lexicon: BDAG
  rationale: 한국어 인사 정식에서는 동사 없는 명사절이 어색하므로 「~이 여러분에게 있기를 빕니다」를 보충해 합쇼체 격식을 갖춘다. 의미 추가가 아닌 자연스러운 한국어 구문화이다.
theological_decisions:
- issue: 인사 정식에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 옮기도록 지시한다. 데살로니가전서 1:1의 「주 예수 메시아」 형태에서도 칭호성이 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title)'
- issue: ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ의 관계 표현
  chosen_reading: 회중이 「아버지 하나님과 주 예수 메시아 안에」 존재한다
  alternative_readings:
  - 아버지 하나님과 주 예수 메시아께 속한 회중
  - 아버지 하나님과 주 예수 메시아의 영역 안에 모인 회중
  rationale: 전치사 ἐν을 「안에」로 보존하여 연합·관계의 신학 언어를 풀어쓰지 않는다. 아버지와 아들이 동일 전치사 아래 병렬됨으로써 두 위격의 관계 역시 보존된다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
