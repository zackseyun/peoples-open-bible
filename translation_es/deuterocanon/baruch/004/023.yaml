translation:
  language: es
  text: Porque los envié con luto y llanto[a], pero Dios me devolverá a ustedes con gozo y alegría para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios me restaurará a ustedes». El verbo griego puede significar «devolver» o «restaurar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέπεμψα
  english_pob_choice: I sent you out
  chosen_spanish: os envié
  alternatives_spanish:
  - os envié fuera
  - os despedí
  lexicon: BDAG
  rationale: El verbo griego expresa enviar fuera o apartar. En español, «os envié» comunica la acción sin cargar innecesariamente el matiz de expulsión formal; el complemento «con luto y llanto» conserva la idea de salida en circunstancias dolorosas.
- source_word: μετὰ πένθους
  english_pob_choice: with mourning
  chosen_spanish: con luto
  alternatives_spanish:
  - con duelo
  - en luto
  lexicon: BDAG
  rationale: πένθος denota duelo o luto por pérdida. «Con luto» es natural y solemne en español bíblico contemporáneo; mantiene el registro concreto del dolor ritual o comunitario.
- source_word: καὶ κλαυθμοῦ
  english_pob_choice: and weeping
  chosen_spanish: y llanto
  alternatives_spanish:
  - y lloriqueo
  - y gemido
  lexicon: BDAG
  rationale: κλαυθμός es llanto o llorar en voz alta. «Llanto» es la correspondencia más directa y digna en español; evita el tono excesivamente coloquial de «llorar» como sustantivo.
- source_word: ἀποδώσει
  english_pob_choice: will give you back
  chosen_spanish: os devolverá
  alternatives_spanish:
  - os restaurará
  - os dará de vuelta
  lexicon: BDAG
  rationale: ἀποδίδωμι puede significar devolver, restituir o dar de vuelta. «Os devolverá» conserva la idea relacional de retorno y permite mantener el dativo μοι ('a mí') del griego, que en este contexto apunta a la madre figurada que recupera a sus hijos.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El artículo griego no exige reproducirse en español. «Dios» es la forma idiomática natural y mantiene la referencia sin introducir una terminología más pesada.
- source_word: μετὰ χαρμοσύνης
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - con regocijo
  lexicon: BDAG
  rationale: χαρμοσύνη expresa gozo o alegría jubilosa. «Con gozo» preserva el tono bíblico y la elevación del original, evitando reducirlo a una emoción genérica.
- source_word: καὶ εὐφροσύνης
  english_pob_choice: and gladness
  chosen_spanish: y alegría
  alternatives_spanish:
  - y regocijo
  - y contento
  lexicon: BDAG
  rationale: εὐφροσύνη añade matiz de alegría festiva o satisfacción gozosa. «Alegría» funciona bien en español y, junto con «gozo», conserva la intensificación poética sin necesidad de un calco forzado.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: BDAG
  rationale: La expresión griega indica permanencia duradera. «Para siempre» es la equivalencia más clara y natural en español, adecuada para una promesa de restauración definitiva.
theological_decisions:
- issue: Voz materna/personificación de Sion o Jerusalén
  english_pob_reading: The speaker is a motherly Zion/Jerusalem figure speaking of the children being given back 'to me.'
  chosen_spanish_reading: El verso mantiene la primera persona implícita en «a mí», dejando oír la voz personificada de Jerusalén/Sión como madre.
  alternative_spanish_readings:
  - Dios os devolverá
  - os restaurará
  rationale: El griego incluye μοι ('a mí'), y el contexto personifica a Jerusalén como madre. Conservar «a mí» evita borrar ese marco teológico y literario; una paráfrasis impersonal suavizaría indebidamente la tensión relacional del texto.
  doctrine_reference: Preservar la tensión literaria y teológica del texto, sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego de Swete con alta concordancia y toma como guía la decisión POB de preservar la relación personal implícita en μοι, manteniendo en español el complemento «a mí». No se detectaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usa «Dios» en lugar de una forma de ocultamiento del nombre divino, conforme al texto griego.
  - Se preserva la pareja semántica «gozo / alegría» para reflejar χαρμοσύνη y εὐφροσύνη sin colapsarlas en una sola palabra.
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota al pie recoge la alternativa lexical principal documentada en el audit trail, sin introducir lecturas no atestiguadas.
