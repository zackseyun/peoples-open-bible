translation:
  language: es
  text: Y todos los del pueblo que estaban en la ciudad fueron llamados[a] para perseguirlos, y persiguieron a Josué y quedaron apartados de la ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gritaron»; el verbo hebreo puede denotar clamor, pero aquí probablemente tiene el sentido de ser convocados o movilizados para la persecución.
    reason: lexical_alternative
  - marker: b
    text: O «fueron separados de la ciudad» o «fueron arrancados de la ciudad». El hebreo sugiere que los perseguidores fueron sacados de la ciudad y apartados de su posición defensiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזָּעֲקוּ
  english_pob_choice: were called out
  chosen_spanish: fue llamado[a]
  alternatives_spanish:
  - fue convocado
  - fue llamado a salir
  lexicon: HALOT
  rationale: El verbo en este contexto militar puede expresar no solo «gritar», sino también ser convocado o movilizado. «Fue llamado» conserva la voz pasiva y la idea de una convocatoria para la acción, sin forzar una equivalencia más interpretativa que la del texto fuente.
- source_word: כָּל הָעָם אֲשֶׁר בָּעִיר
  english_pob_choice: all the people who were in the city
  chosen_spanish: todo el pueblo que estaba en la ciudad
  alternatives_spanish:
  - toda la gente que estaba en la ciudad
  - todos los habitantes de la ciudad
  lexicon: HALOT
  rationale: «Pueblo» corresponde bien a עָם y evita restringir innecesariamente a «hombres». La cláusula relativa mantiene la localización explícita del hebreo sin añadir matices no presentes.
- source_word: לִרְדֹּף אַחֲרֵיהֶם
  english_pob_choice: to pursue them
  chosen_spanish: para perseguirlos
  alternatives_spanish:
  - para ir tras ellos
  - para darles पीछa
  lexicon: HALOT
  rationale: «Perseguir» es el equivalente natural de רדף + אחרי en este contexto narrativo y militar. Resume la acción sin debilitar el sentido de hostilidad o presión del hebreo.
- source_word: וַיִּרְדְּפוּ אַחֲרֵי יְהוֹשֻׁעַ
  english_pob_choice: they pursued Joshua
  chosen_spanish: persiguieron a Josué
  alternatives_spanish:
  - fueron tras Josué
  - lo persiguieron a Josué
  lexicon: HALOT
  rationale: Se conserva el verbo repetido con el mismo valor de persecución. El nombre propio se adapta de forma estándar a «Josué».
- source_word: וַיִּנָּתְקוּ מִן הָעִיר
  english_pob_choice: were drawn away from the city
  chosen_spanish: fueron alejados de la ciudad[b]
  alternatives_spanish:
  - fueron separados de la ciudad
  - fueron arrancados de la ciudad
  lexicon: HALOT
  rationale: El nifal de נתק puede expresar separación, soltura o ser apartado. «Fueron alejados» comunica bien el efecto táctico del pasaje en español natural, sin imponer la imagen más dura de «arrancados» ni la más técnica de «separados».
translation_notes:
  revision_awareness: 'La redacción española sigue el giro revisado del POB inglés («called out») y mantiene el efecto táctico de la escena: los habitantes salen de la ciudad para perseguir, quedan enfocados en Josué y se alejan de la ciudad. Se evitó suavizar o exagerar el valor de נתק, conservando la tensión entre separación espacial y estrategia militar.'
  spanish_consistency_notes:
  - Se mantuvo «Josué» como forma estándar del nombre propio.
  - Se prefirió «pueblo» para עָם por coherencia con el hebreo y por no limitar indebidamente el referente.
  - «Perseguir» se repite para reflejar la repetición verbal del hebreo y la coherencia narrativa.
  - Se usó «fueron alejados» para preservar la ambigüedad de נתק entre separación y desplazamiento forzado.
