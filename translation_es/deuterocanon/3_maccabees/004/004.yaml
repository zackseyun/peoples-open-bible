    reason: lexical_alternative
  - marker: c
    text: «Compasión común» refleja el ἔλεος compartido ordinariamente entre los seres humanos; incluso algunos enemigos fueron conmovidos por ella.
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea mejor el español con el griego y con las decisiones documentadas del POB: se restituye la transparencia verbal de ἐξαπεστέλλοντο en el texto principal («eran enviados fuera») y se deja la coerción explícita en nota; se reemplaza «estrategas» por «generales» con nota para preservar legibilidad sin perder la ambigüedad histórica de στρατηγοί; se refuerza la dureza de μετὰ πικρίας ἀνοίκτου ψυχῆς con «amarga crueldad»; y se usa «deportación» para mantener la relación léxica con el envío forzado.'
