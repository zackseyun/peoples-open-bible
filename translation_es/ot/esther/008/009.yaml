    text: Or 'from India to Ethiopia.' The Hebrew reads 'from Hodu to Cush'; 'Cush' is retained in the main text to preserve the ancient geographical term more precisely.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the twenty-third day of it'.
    reason: previous_rendering
