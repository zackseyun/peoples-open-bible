translation:
  language: es
  text: Pero yo te planté como vid escogida[a], toda ella de semilla genuina[b]. ¿Cómo, pues, te has convertido para mí en sarmientos degenerados[c] de una vid extranjera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vid de uva escogida»; el hebreo puede referirse a una vid selecta o noble.
    reason: lexical_alternative
  - marker: b
    text: O «toda ella de semilla verdadera» o «todo de plantío genuino»; el hebreo enfatiza la autenticidad total del material plantado.
    reason: lexical_alternative
  - marker: c
    text: El hebreo de «sarmientos degenerados» es difícil; también puede traducirse «brotes silvestres» o «crecimiento corrompido».
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַעְתִּיךְ
  english_pob_choice: I planted you
  chosen_spanish: te planté
  alternatives_spanish:
  - yo te había plantado
  - te he plantado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción pasada real; en español, el pretérito simple comunica bien el acto de plantación. Se mantiene la segunda persona femenina singular implícita en el texto hebreo.
- source_word: שֹׂרֵק
  english_pob_choice: choice vine
  chosen_spanish: vid escogida
  alternatives_spanish:
  - vid selecta
  - vid noble
  - vid escogida de calidad
  lexicon: HALOT
  rationale: שֹׂרֵק denota una vid selecta o noble. "Vid escogida" suena natural en español y conserva la cualidad especial sin volverlo interpretativo.
- source_word: כֻּלֹּה זֶרַע אֱמֶת
  english_pob_choice: wholly of true seed
  chosen_spanish: toda ella simiente verdadera
  alternatives_spanish:
  - enteramente de simiente verdadera
  - toda ella de semilla genuina
  - toda de verdadero plantío
  lexicon: HALOT
  rationale: La frase enfatiza totalidad y autenticidad del material plantado. "Simiente verdadera" preserva la imagen agrícola y el valor de אֱמֶת como genuino/verdadero, sin reducirlo a fidelidad moral solamente.
- source_word: וְאֵיךְ
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues?
  alternatives_spanish:
  - ¿Cómo entonces?
  - ¿Y cómo?
  - ¿Cómo es que, pues?
  lexicon: HALOT
  rationale: La partícula introduce contraste retórico. "Pues" ayuda a reflejar la sorpresa y la oposición con la cláusula anterior.
- source_word: נֶהְפַּכְתְּ לִי
  english_pob_choice: have you turned for me into
  chosen_spanish: te has vuelto para mí en
  alternatives_spanish:
  - te has convertido para mí en
  - has cambiado para mí en
  - te has vuelto a mí en
  lexicon: HALOT
  rationale: El nifal de הפך comunica transformación. "Volverte en" conserva el movimiento de cambio; "para mí" retiene la relación afectiva/referencial expresada por לִי sin omitirla.
- source_word: סוּרֵי
  english_pob_choice: degenerate shoots
  chosen_spanish: sarmientos degenerados
  alternatives_spanish:
  - brotes degenerados
  - renuevos degenerados
  - sarmientos torcidos
  lexicon: HALOT
  rationale: El término es difícil. En el contexto de la vid, "sarmientos" resulta idiomático en español bíblico y mantiene la metáfora; "degenerados" comunica la idea de desviación/corrupción que el inglés POB preservó.
- source_word: הַגֶּפֶן נָכְרִיָּה
  english_pob_choice: of a foreign vine
  chosen_spanish: de una vid extraña
  alternatives_spanish:
  - de una vid extranjera
  - de una vid ajena
  - de una vid forastera
  lexicon: HALOT
  rationale: נָכְרִיָּה significa extranjera/ajena/extraña. "Vid extraña" es natural en español y conserva el matiz de alteridad covenantal sin forzar un término demasiado técnico.
theological_decisions:
- issue: Imagen de Israel/Judá como vid plantada por Yahvé
  english_pob_reading: Retained the agricultural/vine imagery directly rather than paraphrasing into moral language alone.
  chosen_spanish_reading: Se conserva la imagen agrícola de la vid y los sarmientos, sin convertirla en una paráfrasis moralizante.
  alternative_spanish_readings:
  - Te planté como pueblo escogido ... pero te volviste corrupta
  - Yo te planté como una planta pura ...
  rationale: El hebreo usa una metáfora extendida con fuerte carga profética y de pacto. Mantenerla permite la intertextualidad y evita resolver la tensión del reproche profético dentro del texto principal.
  doctrine_reference: Principio de primacía de la fuente original; preservar la tensión teológica en lugar de explicarla en exceso.
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo y el audit trail inglés de la POB. La solución mantiene la metáfora de la vid, conserva לִי con "para mí", y resuelve el término difícil סוּרֵי con una opción idiomática en español que sigue la intención del POB inglés. No se identificaron cambios necesarios respecto del consenso auditado.
  spanish_consistency_notes:
  - Se usa «vid» para שֹׂרֵק y «sarmientos» para la imagen de crecimiento lateral en el contexto vitícola.
  - Se mantiene el tratamiento singular femenino implícito del hebreo con verbos en segunda persona singular.
  - «Simiente» se usa de forma agrícola/bíblica, no en sentido genealógico abstracto.
  - No se introduce «SEÑOR»; el verso no contiene el Tetragrámaton explícito en la forma base provista.
