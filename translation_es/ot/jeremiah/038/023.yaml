translation:
  language: es
  text: Y a todas tus esposas y a tus hijos los sacarán a los caldeos[a], y tú no escaparás de su mano[b], porque serás capturado por mano del rey de Babilonia[b], y esta ciudad será quemada con fuego[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los babilonios’, por ‘los caldeos’.
    reason: lexical_alternative
  - marker: b
    text: En hebreo, ‘de su mano’ y ‘por mano del rey de Babilonia’ son modismos para poder o control.
    reason: cultural_note
  - marker: c
    text: El verbo hebreo es femenino singular y concuerda con ‘ciudad’; el sentido es que la ciudad será quemada.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֶׁיךָ
  english_pob_choice: your wives
  chosen_spanish: tus mujeres
  alternatives_spanish:
  - tus esposas
  - tus mujeres, es decir, tus esposas
  lexicon: HALOT
  rationale: El hebreo apunta a las mujeres del rey en su casa; en español, ‘mujeres’ puede abarcar ese uso contextual sin imponer un término más técnico. ‘Esposas’ sería más explícito, pero ‘mujeres’ conserva mejor la amplitud del hebreo y evita estrechar demasiado el referente.
- source_word: בָּנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus varones
  - tus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘tus hijos/varones’, en español ‘hijos’ comunica con naturalidad el conjunto masculino en este contexto familiar y dinástico. Se evita ‘niños’ porque no refleja la referencia genealógica.
- source_word: מוֹצִאִים
  english_pob_choice: will be brought out
  chosen_spanish: se los llevarán
  alternatives_spanish:
  - serán sacados
  - serán llevados fuera
  lexicon: HALOT
  rationale: El participio pasivo causa una acción sufrida; en español, ‘se los llevarán’ expresa bien la imposición y mantiene el sentido de traslado forzado sin sonar rígido. ‘Serán sacados’ conserva más literalmente la imagen de ‘sacar’, pero resulta menos natural aquí.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo. Aunque históricamente se refiere al poder babilónico, ‘caldeos’ está más cerca de la forma fuente y preserva la distinción auditada por la POB en inglés.
- source_word: לֹא תִמָּלֵט מִיָּדָם
  english_pob_choice: will not escape from their hand
  chosen_spanish: no escaparás de su mano
  alternatives_spanish:
  - no te librarás de su mano
  - no escaparás de ellos
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de ‘mano’ como poder/control, pero en español se alisa ligeramente la construcción para que sea idiomática. ‘Librar’ sería posible, pero ‘escapar’ preserva el movimiento del contexto profético.
- source_word: בְיַד מֶלֶךְ בָּבֶל
  english_pob_choice: by the hand of the king of Babylon
  chosen_spanish: por mano del rey de Babilonia
  alternatives_spanish:
  - en mano del rey de Babilonia
  - a manos del rey de Babilonia
  lexicon: HALOT
  rationale: ‘Por mano de’ reproduce la idiomática hebrea de agencia/instrumentalidad sin convertirla simplemente en ‘por el rey’, lo que borraría la metáfora documentada. ‘A manos de’ también sería posible, pero aquí ‘por mano de’ sigue más de cerca la formulación fuente.
- source_word: תִּתָּפֵשׂ
  english_pob_choice: you will be seized
  chosen_spanish: serás preso
  alternatives_spanish:
  - serás capturado
  - te prenderán
  lexicon: HALOT
  rationale: El niphal expresa ser atrapado/capturado. ‘Serás preso’ es breve y formal, y en español bíblico comunica bien el estado de quedar bajo arresto o captura; ‘capturado’ también sería viable, pero ‘preso’ mantiene una resonancia judicial más inmediata.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad, esta
  lexicon: HALOT
  rationale: Correspondencia directa y natural del demostrativo.
- source_word: תִּשְׂרֹף בָּאֵשׁ
  english_pob_choice: will be burned with fire
  chosen_spanish: será quemada con fuego
  alternatives_spanish:
  - la quemarán con fuego
  - será consumida por el fuego
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa una forma verbal femenina singular que concuerda con ‘ciudad’, en español un pasivo resulta más claro y fiel al efecto: la ciudad es el objeto destruido por el fuego. ‘Quemada con fuego’ conserva la imagen concreta sin suavizarla.'
theological_decisions:
- issue: Metáfora de ‘mano’ para poder y control
  english_pob_reading: ‘from their hand’ and ‘by the hand of the king of Babylon’ are idioms for power or control.
  chosen_spanish_reading: ‘de su mano’ y ‘por mano del rey de Babilonia’ se conservan como modismos de poder y control.
  alternative_spanish_readings:
  - ‘de ellos’ / ‘por el rey de Babilonia’
  - ‘del poder de ellos’ / ‘bajo el poder del rey de Babilonia’
  rationale: Se preserva la imagen hebrea de ‘mano’ porque el texto no solo informa sobre agencia, sino sobre dominio y captura. Traducirlo de forma plana debilitaría la fuerza retórica y semántica del pasaje.
  doctrine_reference: Uso bíblico de idiomatismo de soberanía/poder; cf. lenguaje profético de captura y dominio
- issue: Referencia de ‘caldeos’ frente a ‘babilonios’
  english_pob_reading: Or 'the Babylonians' for 'the Chaldeans.'
  chosen_spanish_reading: ‘caldeos’ en el texto principal, con la alternativa ‘babilonios’ como posible equivalencia contextual.
  alternative_spanish_readings:
  - ‘babilonios’
  - ‘los caldeos, es decir, los babilonios’
  rationale: El POB inglés mantiene ‘Chaldeans’ como forma más cercana al hebreo y solo anota la equivalencia histórica. La traducción española conserva ese criterio para no borrar la especificidad del término fuente.
  doctrine_reference: No doctrinal; decisión lexical-histórica
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios relevantes de revisión; el último pase indica ‘unchanged’. La versión española busca mantener la metáfora de ‘mano’, el etnónimo ‘caldeos’ y el sentido pasivo de ‘será quemada’, ajustando solo la sintaxis para que el español sea natural y publicable.
  spanish_consistency_notes:
  - Se usó ‘Y’ inicial para reflejar la coordinación narrativa.
  - Se conservó ‘Babilonia’ como topónimo tradicional en español, mientras se mantuvo ‘caldeos’ para el etnónimo fuente.
  - Se evitó ‘SEÑOR’ porque este versículo no contiene el nombre divino.
  - La pasiva española en ‘será quemada con fuego’ preserva mejor el efecto que una construcción activa impersonal.
