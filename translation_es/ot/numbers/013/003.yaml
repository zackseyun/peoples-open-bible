translation:
  language: es
  text: Entonces Moisés los envió desde el desierto de Parán, por orden de Yahvé[a]. Todos ellos eran hombres[b], jefes de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la palabra de Yahvé». El hebreo dice literalmente «sobre la boca de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'O «líderes de los israelitas». Hebreo: «jefes de los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo narrativo de שׁלח expresa una acción pasada de envío. «Envió» es natural en español bíblico actual y conserva la simpleza del original sin añadir matices no presentes.
- source_word: מִמִּדְבַּר פָּארָן
  english_pob_choice: from the wilderness of Paran
  chosen_spanish: desde el desierto de Parán
  alternatives_spanish:
  - desde el desierto de Farán
  - desde el yermo de Parán
  lexicon: HALOT
  rationale: מִדְבָּר designa un territorio despoblado o desierto; «desierto» funciona bien en español y es claro para el lector. Se translitera el nombre propio como «Parán».
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por orden de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por la boca de Yahvé
  lexicon: HALOT
  rationale: El hebreo es un modismo literal «sobre la boca de» que indica mandato o dirección. «Por orden de» expresa la fuerza directiva de manera idiomática en español y mantiene la noción de autoridad divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme a la terminología del proyecto, en lugar de sustituirlo por un título.
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Todos juntos
  lexicon: HALOT
  rationale: El término enfatiza la totalidad del grupo. «Todos ellos» conserva el énfasis sin sonar forzado en español.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino y se refiere a representantes varones. «Hombres» mantiene la precisión de género y el valor semántico del término.
- source_word: רָאשֵׁי בְנֵי יִשְׂרָאֵל
  english_pob_choice: heads of the sons of Israel
  chosen_spanish: jefes de los hijos de Israel
  alternatives_spanish:
  - líderes de los israelitas
  - cabezas de los hijos de Israel
  lexicon: HALOT
  rationale: «Jefes» transmite la idea concreta de ראשׁים como cabezas o principales. Se conserva «hijos de Israel» para mantener la expresión pactual del hebreo, en lugar de neutralizarla a «israelitas».
- source_word: הֵמָּה
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - ellos eran
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis, pero en español ese valor se integra de forma natural en la copulativa; «eran» evita una repetición dura y expresa adecuadamente la identificación del grupo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa el Tetragrámaton directamente. Se mantiene la transliteración del nombre divino para preservar la referencia personal y pactal del texto, en consonancia con la norma del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje masculino y expresión pactual בְנֵי יִשְׂרָאֵל
  english_pob_reading: men ... heads of the sons of Israel
  chosen_spanish_reading: hombres ... jefes de los hijos de Israel
  alternative_spanish_readings:
  - varones ... líderes de los israelitas
  - hombres ... líderes de los israelitas
  rationale: El pasaje identifica a representantes masculinos, por lo que conviene conservar el género marcado. «Hijos de Israel» retiene la fórmula pactual y genealógica del hebreo, en vez de sustituirla por una etiqueta étnica más general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje de referencia; la lectura actual coincide con la última pasada de revisión y con el dictamen de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, conforme a la terminología del proyecto.
  - Se conserva «hijos de Israel» para reflejar la fórmula hebrea y su carga pactual.
  - Se usa lenguaje masculino explícito («hombres») porque el hebreo lo marca así.
  - «Jefes» se emplea como equivalente de רָאשֵׁי, manteniendo la idea de cabezas o principales sin sobreexplicar.
