translation:
  language: es
  text: En aquellos días Ezequías cayó enfermo hasta el punto de morir, y oró a Yahvé, y le respondió[a] y le dio una señal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «y le dijo». El verbo hebreo es «dijo», pero aquí lleva el sentido de respuesta de Yahvé a la oración de Ezequías.
    reason: lexical_alternative
  - marker: b
    text: O «prodigio» o «portento».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - Por aquellos días
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula temporal idiomática. «En aquellos días» reproduce bien el valor anafórico y suena natural en español bíblico contemporáneo sin perder el tono narrativo.
- source_word: חָלָה
  english_pob_choice: became sick
  chosen_spanish: cayó enfermo
  alternatives_spanish:
  - se enfermó
  - quedó enfermo
  - estuvo enfermo
  lexicon: HALOT
  rationale: El verbo expresa el inicio de la enfermedad, no solo un estado. «Cayó enfermo» conserva ese matiz de acontecer y es idiomático en español.
- source_word: עַד לָמוּת
  english_pob_choice: to the point of death
  chosen_spanish: hasta morir
  alternatives_spanish:
  - al punto de morir
  - hasta el punto de morir
  - hasta la muerte
  lexicon: HALOT
  rationale: La construcción hebrea marca gravedad extrema. «Hasta morir» mantiene la fuerza límite del hebreo con una forma breve y natural en español.
- source_word: וַיִּתְפַּלֵּל אֶל יְהוָה
  english_pob_choice: and he prayed to Yahweh
  chosen_spanish: y oró a Yahvé
  alternatives_spanish:
  - y oró a Yahweh
  - y oró al SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la convención del proyecto, en lugar de enmascararlo con un título. «Oró a» expresa con claridad el destinatario de la oración.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: and he answered him
  chosen_spanish: y él le respondió
  alternatives_spanish:
  - y le dijo
  - y le habló
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y le dijo», el contexto narrativo y el audit trail inglés señalan que el sentido es la respuesta de Yahvé a la oración de Ezequías. En español, «respondió» comunica mejor esa función sin borrar la tensión léxica documentada.
- source_word: מוֹפֵת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - milagro
  - portento
  - prodigio
  lexicon: HALOT
  rationale: «Señal» es adecuado para el acto confirmatorio dado a Ezequías y mantiene la amplitud semántica de מוֹפֵת sin especificar más de lo que el contexto exige.
- source_word: נָתַן לוֹ
  english_pob_choice: gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - le concedió
  - le otorgó
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural del verbo con objeto indirecto, manteniendo la sencillez narrativa del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La política del proyecto pide transliterar el Tetragrámaton como «Yahvé» en el texto principal. Se evita el reemplazo por un título, preservando el nombre pactual de Dios conforme al marco doctrinal del POB en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo (WLC) y el audit trail en inglés. La opción de «respondió» conserva la decisión contextual ya documentada en inglés para וַיֹּאמֶר לוֹ, mientras que «Yahvé» sigue la política doctrinal del proyecto para el Tetragrámaton. No se detectaron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantuvo un registro sintáctico sencillo y narrativo, acorde con un relato histórico breve.
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Señal» se eligió por su amplitud y por evitar sobreespecificar el tipo de mofaet.
  - La nota [a] preserva la alternativa semántica del hebreo sin duplicar innecesariamente el sentido en el cuerpo del texto.
