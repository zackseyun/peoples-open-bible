translation:
  language: es
  text: Y la tierra se llenó de violencia. Y después de esto pecaron contra las bestias y las aves y todo lo que se mueve y todo lo que anda sobre la tierra, y se derramó mucha sangre sobre la tierra, y todo—
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: “the earth was filled with violence”
  english_pob_choice: And the earth was filled with violence.
  chosen_spanish: Y la tierra se llenó de violencia.
  alternatives_spanish:
  - Y la tierra estuvo llena de violencia.
  - Y la tierra quedó llena de violencia.
  lexicon: no aplica
  rationale: Conserva el sentido de plenitud/completitud de la frase y el sustantivo 'violencia' con la misma fuerza que el inglés POB, en español natural y digno.
- source_word: “they sinned against the beasts”
  english_pob_choice: they sinned against the beasts
  chosen_spanish: pecaron contra las bestias
  alternatives_spanish:
  - pecaron contra los animales
  - pecaron contra las fieras
  lexicon: no aplica
  rationale: '''Bestias'' reproduce de modo directo el campo léxico del texto fuente y mantiene la referencia a los animales sin suavizarla indebidamente. ''Animales'' sería más general; ''fieras'' introduciría una restricción no indicada.'
- source_word: “and birds”
  english_pob_choice: and birds
  chosen_spanish: y contra las aves
  alternatives_spanish:
  - y contra los pájaros
  lexicon: no aplica
  rationale: '''Aves'' es el equivalente amplio y estilísticamente adecuado para un registro bíblico moderno.'
- source_word: “everything that moves”
  english_pob_choice: everything that moves
  chosen_spanish: todo lo que se mueve
  alternatives_spanish:
  - todo lo que anda
  - todo ser que se mueve
  lexicon: no aplica
  rationale: Mantiene la amplitud del original sin restringirlo a seres humanos o animales específicos.
- source_word: “everything that walks upon the earth”
  english_pob_choice: everything that walks upon the earth
  chosen_spanish: y todo lo que anda sobre la tierra
  alternatives_spanish:
  - y todo lo que camina sobre la tierra
  - y todo ser que anda sobre la tierra
  lexicon: no aplica
  rationale: '''Anda sobre la tierra'' comunica el valor general de movimiento/andar del original sin forzar una imagen demasiado literal de ''walks'' en todos los casos.'
- source_word: “much blood was shed upon the earth”
  english_pob_choice: and much blood was shed upon the earth
  chosen_spanish: y se derramó mucha sangre sobre la tierra
  alternatives_spanish:
  - y mucha sangre fue derramada sobre la tierra
  - y se vertió mucha sangre sobre la tierra
  lexicon: no aplica
  rationale: '''Se derramó'' es la fórmula natural y fiel para el pasivo/referencial del original, conservando la imagen de sangre vertida en la tierra.'
theological_decisions:
- issue: Alcance de 'against the beasts' en el texto ge'ez
  english_pob_reading: they sinned against the beasts
  chosen_spanish_reading: pecaron contra las bestias
  alternative_spanish_readings:
  - pecaron contra los animales
  rationale: La revisión auditada indica que el ge'ez apunta a una acción contra las bestias, no a una lectura reflexiva ('contra sí mismos'). La traducción mantiene esa dirección y evita introducir una interpretación ajena del episodio.
  doctrine_reference: No aplica; decisión textual/filológica basada en la revisión del pasaje.
- issue: Fragmento final incompleto
  english_pob_reading: and all—
  chosen_spanish_reading: y todo—
  alternative_spanish_readings:
  - y todo…
  - y todo
  rationale: Se conserva el cierre incompleto del testimonio disponible, porque el expediente auditado indica que el texto fuente termina de manera abrupta. No se completa artificialmente la frase.
  doctrine_reference: No aplica; fidelidad textual al estado del testimonio.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del expediente, que restituye que la tierra fue llenada de violencia, que el pecado fue contra las bestias, las aves y todo lo que se mueve, y que hubo mucho derramamiento de sangre sobre la tierra; además, conserva el final truncado «y todo—» porque el testimonio disponible termina así.
  spanish_consistency_notes:
  - Se mantiene 'tierra' para earth y 'sangre' para blood en toda la línea.
  - 'Se conserva el paralelismo de las tres series: bestias/aves/todo lo que se mueve; todo lo que anda sobre la tierra.'
  - No se introdujo 'SEÑOR', 'Cristo' ni vocabulario ajeno al testimonio de Jubileos.
  - La nota [a] está anclada explícitamente en 'bestias' para evitar marcadores huérfanos.
