review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien el sentido central del hebreo: la inminente acción judicial de Yahvé sobre el ganado de Faraón en el campo, con la lista de animales y la intensidad de la plaga. También mantiene correctamente ''Yahvé'' para יְהוָה y conserva el hebraísmo ''la mano de Yahvé''. Sin embargo, la enumeración española desajusta los dos colectivos finales: בָּקָר וּבַצֹּאן corresponden mejor a ''las vacas/el ganado vacuno y las ovejas/el rebaño'', no a ''los rebaños y las manadas'', que además invierte y difumina la referencia. La nota al pie está anclada en ''Mira'' pero explica ''plaga/pestilencia'', por lo que el marcador está mal ubicado.'
  spanish_quality_summary: 'El español es claro y legible, pero hay dos problemas de calidad: (1) el marcador de nota debe ir en ''plaga'', no en ''Mira''; (2) ''los rebaños y las manadas'' suena poco natural y semánticamente impreciso para בָּקָר וּבַצֹּאן. ''Los asnos'' es defendible, aunque ''burros'' sería más coloquial; no requiere cambio. El uso de dos puntos puede funcionar, pero la raya reproduce mejor la estructura enfática del original y del audit trail inglés.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: ''Yahvé'' para יְהוָה, ''plaga'' con nota alternativa para דֶּבֶר, y conservación de ''mano'' para יַד. La principal desalineación léxica está en בָּקָר / צֹאן, donde el draft no refleja con suficiente fidelidad los colectivos ''ganado vacuno'' y ''rebaño/ovejas''.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal anclado
    rationale: La nota explica la alternativa léxica de דֶּבֶר ('plaga' / 'pestilencia'), pero el marcador [a] aparece en 'Mira'. Debe colocarse junto a 'plaga'.
  - severity: medium
    issue: Renderización imprecisa de בָּקָר וּבַצֹּאן
    rationale: '''Los rebaños y las manadas'' no corresponde bien a ''the herds and the flocks'' ni al hebreo. בָּקָר apunta a ganado vacuno/herds y צֹאן a ovejas/cabras/flocks. En español, una opción fiel y natural es ''las vacas y las ovejas''.'
  - severity: low
    issue: Puntuación mejorable en la introducción de la lista
    rationale: La raya en lugar de dos puntos refleja mejor la apposición/enumeración enfática del original y del POB inglés, aunque no es un error grave.
  revised_spanish_text: Mira, la mano de Yahvé vendrá sobre tu ganado que está en el campo—sobre los caballos, los asnos, los camellos, las vacas y las ovejas—con una plaga[a] muy severa.
  revised_footnotes:
