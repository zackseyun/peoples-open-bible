id: MIC.5.11
reference: Micah 5:11
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֥י כְשָׁפִ֖ים מִ/יָּדֶ֑/ךָ וּֽ/מְעוֹנְנִ֖ים לֹ֥א יִֽהְיוּ לָֽ/ךְ־׃
translation:
  text: And I will cut off sorceries from your hand[b][a], and you will have no soothsayers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'witchcrafts' for 'sorceries.'
    reason: lexical_alternative
  - marker: b
    text: Or 'soothsayers' or 'fortune-tellers' for 'diviners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: And I will cut off
  alternatives:
  - And I will destroy
  - And I will remove
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means to cut off, remove, or eliminate. 'Cut off' preserves the concrete covenantal/judicial force of the Hebrew while remaining natural English.
- source_word: כְשָׁפִים
  chosen: sorceries
  alternatives:
  - witchcrafts
  - magic arts
  lexicon: HALOT
  rationale: The plural noun refers to magical practices. 'Sorceries' is clear modern English and fits the prophetic denunciation of occult practices without importing specifically early modern connotations of 'witchcraft.'
- source_word: מִיָּדֶךָ
  chosen: from your hand
  alternatives:
  - out of your hand
  - from among you
  lexicon: HALOT
  rationale: The idiom literally reads 'from your hand.' Retaining 'hand' preserves the Hebrew image of possession/control. Here it communicates removal from Judah's power or practice, not merely spatial separation.
- source_word: וּמְעוֹנְנִים
  chosen: diviners
  alternatives:
  - soothsayers
  - fortune-tellers
  - augurs
  lexicon: HALOT
  rationale: The participial form denotes practitioners of divination/omen-reading. 'Diviners' is the broadest accurate English term and avoids the narrower or archaic feel of some alternatives.
- source_word: לֹא יִהְיוּ לָךְ
  chosen: you will have no
  alternatives:
  - they will not be for you
  - there will not be for you
  lexicon: HALOT
  rationale: This clause is literally 'they will not be to/for you.' In idiomatic English, 'you will have no' best conveys the sense that such practitioners will no longer exist among or belong to the people addressed.
