revisions:
- from: Porque cuando les faltó el alimento y toda el agua escaseó[a], decidieron recurrir a su ganado, y resolvieron consumir todo lo que Dios les había mandado, por medio de sus leyes, no comer.
  to: Porque cuando se les acabó el alimento y toda el agua se volvió escasa, decidieron recurrir a su ganado[a], y resolvieron consumir todo lo que Dios les había mandado en sus leyes que no comieran.
  rationale: 'Se hizo una corrección menor pero necesaria. «Se les acabó el alimento» suena más natural para ἐξέλειπεν; «toda el agua se volvió escasa» preserva la idea de escasez general sin la forma defectuosa «toda el agua»; y la cláusula final se reestructuró a un español claro y fiel: Dios les había mandado en sus leyes que no comieran esas cosas. Se ajustó además la nota para que ofrezca una alternativa real y refleje mejor el idiomatismo griego.'
