translation:
  language: es
  text: 'Entonces Balaam dijo al ángel de Yahvé[a]: «He pecado, porque no sabía que estabas de pie en el camino para salir a mi encuentro. Y ahora, si es malo ante tus ojos[b], volveré atrás»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mensajero de Yahvé». El hebreo מַלְאַךְ puede significar «ángel» o «mensajero»; aquí se prefiere «ángel» por el carácter sobrenatural de la escena.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «si es malo en tus ojos». Se conserva el modismo hebreo para no diluir su fuerza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un ser celestial que se interpone ante Balaam, por lo que «ángel» es la opción más natural y fiel en español. Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en su forma transliterada usual en español del proyecto. Evito la sustitución por un título, porque el hebreo usa el Tetragrama de manera directa.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pequé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa confesión de culpa con relevancia presente. «He pecado» es la forma natural y sobria en español para una confesión directa.
- source_word: כִּי לֹא יָדַעְתִּי
  english_pob_choice: for I did not know
  chosen_spanish: porque no sabía
  alternatives_spanish:
  - pues no sabía
  - porque no había sabido
  lexicon: HALOT
  rationale: «Porque» conserva la relación causal. «No sabía» comunica con naturalidad el imperfecto/pretérito de ignorancia en la confesión de Balaam.
- source_word: נִצָּב לִקְרָאתִי
  english_pob_choice: were standing in the road to meet me
  chosen_spanish: estabas de pie en el camino para encontrarme
  alternatives_spanish:
  - estabas plantado en el camino para recibirme
  - estabas en el camino para encontrarme
  - estabas de pie en el camino para salir a mi encuentro
  lexicon: HALOT
  rationale: La imagen literal de estar «de pie» se conserva para no borrar el matiz de נִצָּב. «Para encontrarme» refleja לִקְרָאתִי sin forzar una interpretación más intensa que la del texto; en español también puede oírse como «salir a mi encuentro».
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la ruta
  - sobre el camino
  lexicon: HALOT
  rationale: «Camino» reproduce bien el ámbito de tránsito del hebreo y suena natural en español bíblico contemporáneo. No se introduce una precisión adicional que el texto no exige.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora bien
  - Y bien, ahora
  lexicon: HALOT
  rationale: El marcador discursivo se conserva de forma directa para enlazar la confesión con la petición siguiente.
- source_word: אִם רַע בְּעֵינֶיךָ
  english_pob_choice: if it is evil in your eyes
  chosen_spanish: si es malo a tus ojos
  alternatives_spanish:
  - si es perverso a tus ojos
  - si te parece mal
  - si te parece malo
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea «en tus ojos» para no suavizar la fuerza del texto. «Malo» refleja la dureza semántica de רַע sin desplazarla a una mera impresión subjetiva.
- source_word: אָשׁוּבָה לִּי
  english_pob_choice: I will turn back
  chosen_spanish: me volveré
  alternatives_spanish:
  - volveré
  - regresaré
  - me regresaré
  lexicon: HALOT
  rationale: El cohortativo expresa una disposición o intención de retorno. «Me volveré» transmite el giro direccional sin sonar excesivamente coloquial.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto, en consonancia con la política del proyecto y con el auditable origen hebreo del pasaje. No se sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לִקְרָאתִי en el encuentro con el ángel
  english_pob_reading: to meet me
  chosen_spanish_reading: para encontrarme
  alternative_spanish_readings:
  - para salir a mi encuentro
  - para recibirme
  rationale: El hebreo puede ser simplemente direccional/relacional («salir al encuentro») sin requerir una carga hostil explícita. En español se conserva esa ambigüedad controlada para no exceder el texto fuente.
  doctrine_reference: HALOT; revisión auditada del POB en inglés
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «to confront me on the road» a «in the road to meet me» para ajustarse más al hebreo לִקְרָאתִי בַּדָּרֶךְ. La redacción española sigue esa misma orientación: mantiene la imagen de estar «en el camino» y el matiz de encuentro, sin intensificarlo a oposición explícita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se usa «ángel» en el texto principal, con nota alternativa «mensajero» para reflejar מַלְאַךְ.
  - Se conserva el modismo hebreo «a tus ojos» por ser parte de la tensión expresiva del versículo.
  - «Camino» se emplea de forma uniforme para בַּדָּרֶךְ y no se introduce una paráfrasis más interpretativa.
