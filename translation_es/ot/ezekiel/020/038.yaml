base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/038.yaml
  text: I will purge from among you the rebels and those who transgress against me[a]. I will bring them out of the land where they sojourn, but they will not enter the land of Israel[c][b]. Then you will know that I am Yahweh.
  footnotes:
  - marker: a
    text: Or 'I will sift out from among you.' The Hebrew verb conveys separating out those unfit to remain within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the land of their sojournings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew has a singular verb, 'he will not enter,' used with a collective/distributive sense for the group.
    reason: lexical_alternative
