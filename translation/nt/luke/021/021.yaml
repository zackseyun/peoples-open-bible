id: LUK.21.21
reference: Luke 21:21
source:
  edition: SBLGNT
  text: τότε οἱ ἐν τῇ Ἰουδαίᾳ φευγέτωσαν εἰς τὰ ὄρη, καὶ οἱ ἐν μέσῳ αὐτῆς ἐκχωρείτωσαν, καὶ οἱ ἐν ταῖς χώραις μὴ εἰσερχέσθωσαν εἰς αὐτήν,
translation:
  text: Then let those in Judea flee to the mountains[a], and let those in the midst of her depart, and let those in the countryside not enter into her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronouns 'her' and 'into her' refer to Jerusalem, personified with a feminine pronoun in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence from the preceding signs; 'Then' is concise and natural while preserving the discourse flow.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  chosen: those in Judea
  alternatives:
  - those in the region of Judea
  - the ones in Judea
  lexicon: BDAG
  rationale: Substantival article with prepositional phrase refers to people located in Judea. 'Those in Judea' is idiomatic and sufficiently formal.
- source_word: φευγέτωσαν
  chosen: let ... flee
  alternatives:
  - must flee
  - should flee
  lexicon: BDAG
  rationale: Third-person present imperative calls for urgent action. 'Let ... flee' preserves the imperative force without over-interpreting as mere advice or absolute necessity.
- source_word: εἰς τὰ ὄρη
  chosen: to the mountains
  alternatives:
  - into the hills
  lexicon: BDAG
  rationale: Literal destination phrase. 'Mountains' is the straightforward rendering of ὄρη; 'hills' is possible dynamically but less exact.
- source_word: οἱ ἐν μέσῳ αὐτῆς
  chosen: those in the midst of her
  alternatives:
  - those in the middle of it
  - those inside the city
  lexicon: BDAG
  rationale: The phrase is literally 'those in the midst of her.' The feminine pronoun likely refers to Jerusalem from the immediate context, but the noun is not repeated here. Retaining 'her' preserves the Greek anaphora and the feminine personification common for cities.
- source_word: ἐκχωρείτωσαν
  chosen: let ... depart
  alternatives:
  - let ... leave
  - let ... go out
  lexicon: BDAG
  rationale: The verb denotes withdrawing or going away from a place. 'Depart' is slightly more formal and fits the urgent evacuation context without adding a directional nuance not explicit in English.
- source_word: οἱ ἐν ταῖς χώραις
  chosen: those in the countryside
  alternatives:
  - those in the rural areas
  - those in the fields
  - those in the districts
  lexicon: BDAG
  rationale: χῶραι here refers to country areas surrounding the city/region rather than cultivated fields specifically. 'Countryside' is natural modern English and contextually precise.
- source_word: μὴ εἰσερχέσθωσαν
  chosen: let ... not enter
  alternatives:
  - must not enter
  - should not go in
  lexicon: BDAG
  rationale: Negative present imperative prohibiting entry. 'Let ... not enter' preserves the imperative form and matches the parallel clauses.
- source_word: εἰς αὐτήν
  chosen: into her
  alternatives:
  - into it
  - into the city
  lexicon: BDAG
  rationale: The feminine pronoun again likely points to Jerusalem. 'Into her' preserves the grammatical gender and personified city imagery; the referent can be clarified in a footnote.
