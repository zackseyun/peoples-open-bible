    issue: Marcador de nota mal anclado
    rationale: La nota [a] explica el hebreo תָּו («taw»), que corresponde a «marca», pero en el borrador aparece después de «le dijo». Esto rompe la relación entre texto y nota exigida por el proyecto y puede confundir al lector.
  revised_spanish_text: 'Y Yahvé le dijo: «Pasa por en medio de la ciudad, por en medio de Jerusalén, y pon una marca[a] sobre las frentes de los hombres que suspiran y gimen por todas las abominaciones que se hacen en medio de ella».'
  revised_footnotes:
