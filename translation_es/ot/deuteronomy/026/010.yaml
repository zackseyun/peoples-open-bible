translation:
  language: es
  text: Y ahora, he aquí, he traído las primicias[a] de la tierra que tú me has dado, Yahvé. Y la pondrás delante de Yahvé tu Dios, y te postrarás delante de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los primeros frutos de la tierra» o «lo primero del fruto de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora, pues
  - Ahora
  lexicon: HALOT
  rationale: La partícula marca el paso al acto presente de la ofrenda; «Y ahora» conserva la conexión discursiva de forma natural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí, pues
  lexicon: HALOT
  rationale: Es una partícula deíctica que llama la atención sobre la ofrenda. «He aquí» mantiene el énfasis demostrativo con registro bíblico digno sin sonar arcaico de manera innecesaria.
- source_word: הֵבֵאתִי
  english_pob_choice: I have brought
  chosen_spanish: he traído
  alternatives_spanish:
  - he llevado
  - traigo
  lexicon: HALOT
  rationale: El perfecto הראשון persona singular expresa una acción ya cumplida en la confesión ritual; el pretérito perfecto compuesto en español comunica bien ese valor resultativo.
- source_word: רֵאשִׁית פְּרִי הָאֲדָמָה
  english_pob_choice: the firstfruits of the ground
  chosen_spanish: los primeros frutos de la tierra
  alternatives_spanish:
  - las primicias de la tierra
  - lo primero del fruto de la tierra
  lexicon: HALOT
  rationale: El hebreo combina «primero/primicias» con «fruto de la tierra». «Los primeros frutos de la tierra» conserva la imagen agrícola y es claro en español; «primicias» es posible, pero puede sonar más eclesiástico que el hebreo aquí.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: En este contexto agrícola, «tierra» es natural en español y mantiene la referencia al producto agrícola sin desplazar el foco hacia una noción territorial.
- source_word: אֲשֶׁר נָתַתָּה לִּי
  english_pob_choice: that you ... have given me
  chosen_spanish: que tú me has dado
  alternatives_spanish:
  - que tú me diste
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa y el reconocimiento directo de que el fruto es don de Yahvé; el perfecto compuesto refleja bien el estado presente derivado de la acción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé», no una sustitución por mayúsculas reverenciales.'
- source_word: וְהִנַּחְתּוֹ
  english_pob_choice: Then you shall set it down
  chosen_spanish: y lo pondrás
  alternatives_spanish:
  - y lo colocarás
  - y lo dejarás
  lexicon: HALOT
  rationale: En la instrucción ritual, el verbo indica colocar la ofrenda ante Dios. «Poner» es simple y fiel en español; el contexto ya aporta la idea de depositarlo delante de Yahvé.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la dimensión espacial y cultual de presentación ante Dios con claridad natural en español.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: En la fórmula de la sección, el nombre divino reaparece junto al título relacional. Se mantiene la combinación plenamente explícita para respetar la repetición del hebreo y el auditable enlace con el nombre de pacto.
- source_word: וְהִשְׁתַּחֲוִיתָ
  english_pob_choice: and bow down
  chosen_spanish: y te inclinarás
  alternatives_spanish:
  - y te postrarás
  - y adorarás
  lexicon: HALOT
  rationale: El verbo señala el gesto físico de reverencia/prostración. «Te inclinarás» preserva el acto corporal sin ampliar indebidamente a la idea más general de «adorar».
theological_decisions:
- issue: Renderización del nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El proyecto pide «Yahvé» como forma principal en español, preservando el nombre de pacto y evitando el sustituto litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Sentido de la acción final: adoración vs. postración'
  english_pob_reading: bow down
  chosen_spanish_reading: te inclinarás
  alternative_spanish_readings:
  - te postrarás
  - adorarás
  rationale: La decisión sigue el valor verbal concreto del hebreo, que describe un gesto corporal de reverencia. «Adorar» sería una interpretación más amplia; «te inclinarás» conserva la tensión entre acto físico y acto cultual.
  doctrine_reference: HALOT / sentido verbal de השתחוה
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente favoreció «behold» y «firstfruits of the ground» frente a alternativas menos formales o más perifrásticas. La propuesta española refleja esa misma dirección: mantiene una partícula de atención solemne («he aquí») y una expresión compacta y fiel para רֵאשִׁית פְּרִי הָאֲדָמָה («los primeros frutos de la tierra»), sin perder la referencia agrícola ni el tono ritual.'
  spanish_consistency_notes:
  - Se conserva la misma forma de nombre divino, «Yahvé», en las tres ocurrencias del versículo.
  - 'El pronombre de segunda persona singular se mantiene coherente en toda la cláusula: «tú», «me has dado», «tu Dios».'
  - «Te inclinarás» se usa para mantener la concreción física del verbo hebreo y evitar una traducción interpretativa excesiva.
  - La frase «los primeros frutos de la tierra» busca ser inteligible en español y, al mismo tiempo, cercana a la estructura hebrea del texto.
