translation:
  language: es
  text: 'Y dijeron a Moisés: «Tus siervos han hecho un recuento[a] de los hombres de guerra que están bajo nuestro mando[b], y no falta ni un solo hombre de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea dice literalmente: «han levantado la cabeza de los hombres de guerra», un modismo para hacer un censo o recuento.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «que están en nuestra mano» o «que están a nuestro cargo / bajo nuestra responsabilidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  lexicon: HALOT
  rationale: En el contexto militar y de subordinación ante Moisés, la POB inglesa reconoce la fuerza léxica de עבד sin atenuarla con una neutralización total. En español, «esclavos» conserva mejor esa tensión que «siervos», aunque suene más fuerte; se mantiene porque el término de base admite ese valor y el contexto no exige suavizarlo.
- source_word: נָשְׂאוּ אֶת רֹאשׁ
  english_pob_choice: have taken a count
  chosen_spanish: han hecho un recuento
  alternatives_spanish:
  - han levantado la cabeza de
  - han contado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y la POB opta por el sentido administrativo de censo/recuento. «Han hecho un recuento» comunica ese valor con naturalidad en español, sin perder la base figurada del hebreo.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los combatientes
  lexicon: HALOT
  rationale: Se conserva la estructura nominal cercana al hebreo y a la POB inglesa. «Hombres de guerra» es más literal y mantiene el matiz militar específico, aunque en español resulte un poco formal.
- source_word: אֲשֶׁר בְּיָדֵנוּ
  english_pob_choice: who are under our command
  chosen_spanish: que están bajo nuestro mando
  alternatives_spanish:
  - que están en nuestra mano
  - que están bajo nuestra custodia
  lexicon: HALOT
  rationale: La imagen hebrea de «en nuestra mano» señala autoridad/responsabilidad. La POB inglesa la interpreta como mando militar; en español, «bajo nuestro mando» expresa bien esa relación sin perder el trasfondo idiomático.
- source_word: נִפְקַד מִמֶּנּוּ אִישׁ
  english_pob_choice: not one man of us is missing
  chosen_spanish: no falta ni un solo hombre de nosotros
  alternatives_spanish:
  - no se ha perdido ningún hombre de entre nosotros
  - no está ausente ni un hombre de nosotros
  lexicon: HALOT
  rationale: El nifal de פקד aquí comunica ausencia o falta en el recuento. «No falta ni un solo hombre de nosotros» es idiomático en español y preserva la idea de que ninguno quedó sin contabilizar o desaparecido.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura revisada de la POB en inglés: se conserva el inicio narrativo simple, el valor idiomático de נָשְׂאוּ אֶת רֹאשׁ como recuento, la relación de autoridad de בְּיָדֵנוּ como mando, y la idea final de ausencia total con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio conforme al estándar bíblico en español.
  - Se usa «mando» para la imagen de autoridad militar, en continuidad con la decisión inglesa de «under our command».
  - Se opta por «recuento» para evitar un calco demasiado literal del modismo hebreo y porque el contexto es claramente administrativo-militar.
  - El cierre «ni un solo hombre de nosotros» conserva el énfasis totalizador del hebreo y de la POB inglesa.
