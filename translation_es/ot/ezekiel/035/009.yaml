review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: juicio duradero, ciudades deshabitadas y reconocimiento de Yahvé. Sin embargo, hay un problema significativo de alineación gramatical en la cláusula final: וִידַעְתֶּם es 2ª persona plural, no singular. El borrador traduce «entonces sabrás», pero debe reflejarse como «entonces sabrán» o, menos probable en este contexto, «entonces ustedes sabrán». Dado que el referente previo es Edom/personas asociadas, el plural español impersonal resulta natural.'
  spanish_quality_summary: El español es claro y digno. «Te haré una desolación perpetua» suena natural, aunque «desolación eterna» también sería posible; «perpetua» es aceptable. «Tus ciudades no serán habitadas» es idiomático y fiel. La principal deficiencia de calidad es la incongruencia pronominal singular/plural dentro del versículo, que produce una lectura menos cuidada.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה se traduce correctamente como «Yahvé»; שִׁמְמוֹת por «desolación» con nota sobre el plural intensivo está bien encaminado. No hay conflictos terminológicos mayores, pero la nota al pie actual repite indebidamente la lectura principal como alternativa y debe ajustarse para reflejar alternativas reales.'
  issues:
  - severity: high
    issue: Persona/número incorrectos en «entonces sabrás»
    rationale: El hebreo וִידַעְתֶּם es 2ª persona plural. La justificación del borrador intenta mantener el singular por flujo discursivo, pero eso no preserva la forma fuente. Debe corregirse en el texto y en la decisión léxica correspondiente.
  - severity: medium
    issue: Nota al pie mal formulada
    rationale: 'La nota dice: «O “una desolación perpetua”, “unas desolaciones perpetuas”». La primera opción es idéntica al texto principal, por lo que no funciona como alternativa útil. Debe ofrecer alternativas reales, por ejemplo «una ruina perpetua» o «desolaciones perpetuas».'
  - severity: low
    issue: Decisión léxica sobre וִידַעְתֶּם racionaliza en exceso contra la morfología
    rationale: La explicación afirma que se usa singular pese a la forma plural masorética. Eso contradice el mandato de revisar contra la evidencia fuente. Conviene normalizar la traducción al plural sin nota especial.
  revised_spanish_text: Te haré una desolación perpetua[a], y tus ciudades no serán habitadas; entonces sabrán que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: O «una ruina perpetua» o «desolaciones perpetuas». El hebreo usa un sustantivo plural para la devastación, probablemente para intensificar el juicio.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para reflejar fielmente el plural hebreo וִידַעְתֶּם con «sabrán». Se mantiene el resto del versículo porque representa bien el sentido fuente y la terminología del proyecto. También se repara la nota al pie para que ofrezca alternativas reales en español y explique mejor el plural intensivo de שִׁמְמוֹת.
