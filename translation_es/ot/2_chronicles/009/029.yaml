base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/009/029.yaml
  text: Now the rest of the acts of Solomon[a], from first to last, are they not written in the records of Nathan the prophet, and in the prophecy of Ahijah the Shilonite[b], and in the visions of Iddo the seer concerning Jeroboam son of Nebat?
  footnotes:
  - marker: a
    text: Or 'the words/account of Nathan the prophet.' The Hebrew term can denote either spoken words or a written record; here it likely refers to a documentary source.
    reason: lexical_alternative
  - marker: b
    text: Or 'about' or possibly 'against Jeroboam son of Nebat.' The Hebrew preposition can carry several related senses; 'concerning' best fits the source-citation context.
    reason: lexical_alternative
