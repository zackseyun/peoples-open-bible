  - marker: a
    text: O «a su santo Dios y Salvador». La frase griega puede entenderse como una cadena compacta de títulos para Dios.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español y reflejar mejor el valor participial de ἄρτι τὸν θάνατον ἐκπεφυγότες. También se ajustó «Salvador» a minúscula para una cadena tituladora más natural en español sin alterar el sentido.
