translation:
  language: es
  text: 'Entonces Jehú reunió a todo el pueblo y les dijo[a]: «Acab sirvió a Baal[b] poco; Jehú le servirá mucho[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La declaración de Jehú es irónica en contexto: dice que servirá a Baal «mucho», pero la narración muestra que es un ardid para reunir a los adoradores de Baal.'
    reason: cross_reference
  - marker: b
    text: O «adoró a Baal» / «le adorará»; el verbo hebreo también se usa para servicio religioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - reunió a
  lexicon: HALOT
  rationale: קבץ en narrativa indica poner juntos a los presentes; «reunió» suena natural en español y conserva la acción concreta de convocar al grupo.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo allí
  - toda la asamblea
  lexicon: HALOT
  rationale: «Pueblo» mantiene el alcance colectivo y evita reducir el grupo a una multitud informal. «Todo» reproduce el valor total de כָּל.
- source_word: עָבַד אֶת הַבַּעַל
  english_pob_choice: served Baal
  chosen_spanish: sirvió a Baal
  alternatives_spanish:
  - adoró a Baal
  - rindió servicio a Baal
  lexicon: HALOT
  rationale: עבד con una deidad expresa servicio/culto. «Sirvió» conserva la fuerza léxica más cercana y deja abierta la dimensión religiosa sin sustituirla por una paráfrasis interpretativa.
- source_word: מְעָט
  english_pob_choice: a little
  chosen_spanish: poco
  alternatives_spanish:
  - un poco
  - en poca medida
  - apenas
  lexicon: HALOT
  rationale: «Poco» expresa cantidad/medida escasa y mantiene el contraste breve con הַרְבֵּה en la frase siguiente.
- source_word: יַעַבְדֶנּוּ
  english_pob_choice: will serve him
  chosen_spanish: le servirá
  alternatives_spanish:
  - servirá a Baal
  - le rendirá servicio
  - lo adorará
  lexicon: HALOT
  rationale: El sufijo retoma a Baal; en español, el dativo «le» preserva esa referencia sin repetir el nombre, y el futuro mantiene el valor del imperfecto en el discurso directo.
- source_word: הַרְבֵּה
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - bastante
  - más
  lexicon: HALOT
  rationale: «Mucho» conserva el paralelismo terso con «poco» y refleja el valor adverbial contrastivo del hebreo.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehú
  alternatives_spanish:
  - Jehu
  lexicon: Standard transliteration
  rationale: Se sigue la transliteración usual en español bíblico para el nombre propio.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español bíblico el nombre divino se conserva como «Baal» sin artículo para evitar una forma artificial.
theological_decisions:
- issue: Valor religioso de עבד con deidad
  english_pob_reading: '''served'' is closer to the Hebrew and leaves the religious sense intact; ''worshiped'' is possible but less formally aligned.'
  chosen_spanish_reading: «sirvió» conserva la ambigüedad respetando tanto el servicio cultual como la formulación verbal del hebreo.
  alternative_spanish_readings:
  - «adoró»
  - «rindió culto a»
  rationale: En español, «sirvió» permite reflejar el verbo hebreo sin cerrar prematuramente la dimensión de culto. La nota puede aclarar que también puede entenderse como adoración, si se desea.
  doctrine_reference: Translation philosophy §1, §3
- issue: Ironía de la declaración de Jehú
  english_pob_reading: Render the statement straightforwardly as Jehu's claim without signaling irony in the main text.
  chosen_spanish_reading: La traducción presenta la afirmación de Jehú de manera directa, sin marcar la ironía en el cuerpo del versículo.
  alternative_spanish_readings:
  - «fingió que serviría a Baal»
  - «dijo que serviría a Baal»
  rationale: La ironía pertenece al contexto narrativo amplio, no a la formulación explícita del versículo. Mantener la declaración simple preserva la transparencia textual y evita añadir interpretación al texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El contexto auditado coincide en alto grado con la versión inglesa final: se mantienen la estructura narrativa, el paralelo «poco... mucho» y la decisión de no incorporar la ironía al cuerpo principal del versículo. No se reportan revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Jehú» de manera consistente para el nombre propio.
  - «Baal» se conserva sin artículo en el texto principal, conforme al uso bíblico español.
  - Se mantiene el paralelismo léxico «poco... mucho» para reflejar מְעָט / הַרְבֵּה.
  - No se introduce «Cristo», «SEÑOR» ni otras formas que no correspondan al hebreo de este versículo.
