translation:
  language: es
  text: 'Oigan esto[a], por favor, jefes de la casa de Jacob y gobernantes de la casa de Israel, que detestan la justicia y tuercen todo lo recto[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escuchen ahora»; la partícula נָא puede expresar urgencia además de ruego.
    reason: lexical_alternative
  - marker: b
    text: O «todo lo que es recto». El hebreo dice literalmente «todo lo recto», conservando el contraste con «tuercen».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan, escuchen
  lexicon: HALOT
  rationale: El imperativo plural pide una proclamación profética dirigida a varios oyentes. «Oigan» conserva la fuerza de llamado y suena natural en español; «escuchen» también es posible, pero aquí «oigan» reproduce mejor el golpe inicial del hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - les ruego
  lexicon: HALOT
  rationale: La partícula expresa ruego/urgencia. «Por favor» comunica la apelación de manera clara y contemporánea; «ahora» podría sonar solo temporal. «Les ruego» intensifica demasiado el tono.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta palabra
  - este mensaje
  lexicon: HALOT
  rationale: El demostrativo funciona como objeto directo del mandato. «Esto» es lo más cercano y evita añadir contenido no expresado en el hebreo.
- source_word: רָאשֵׁי בֵּית יַעֲקֹב
  english_pob_choice: heads of the house of Jacob
  chosen_spanish: jefes de la casa de Jacob
  alternatives_spanish:
  - cabezas de la casa de Jacob
  - líderes de la casa de Jacob
  lexicon: HALOT
  rationale: «Heads» conserva el hebraísmo, pero en español «jefes» comunica mejor la metáfora de autoridad sin sonar forzado. «Líderes» sería más interpretativo.
- source_word: וּקְצִינֵי בֵּית יִשְׂרָאֵל
  english_pob_choice: and rulers of the house of Israel
  chosen_spanish: y gobernantes de la casa de Israel
  alternatives_spanish:
  - y jefes de la casa de Israel
  - y oficiales de la casa de Israel
  lexicon: HALOT
  rationale: קְצִינִים denota autoridades civiles/administrativas. «Gobernantes» mantiene el sentido de autoridad y queda bien en paralelo con «jefes».
- source_word: הַמֲתַעֲבִים
  english_pob_choice: who detest
  chosen_spanish: que detestan
  alternatives_spanish:
  - que aborrecen
  - que consideran repugnante
  lexicon: HALOT
  rationale: El participio describe una actitud continua de rechazo hacia la justicia. «Detestan» es fuerte, natural y fiel al valor del verbo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - el derecho
  lexicon: HALOT
  rationale: En este contexto profético, מִשְׁפָּט apunta a la justicia judicial y social. «La justicia» es la equivalencia más clara en español.
- source_word: הַיְשָׁרָה
  english_pob_choice: all that is straight
  chosen_spanish: todo lo recto
  alternatives_spanish:
  - todo lo que es recto
  - toda rectitud
  lexicon: HALOT
  rationale: La forma hebrea mantiene la imagen de rectitud/linealidad. «Todo lo recto» conserva el paralelismo con «torcer» mejor que una abstracción como «rectitud».
- source_word: יְעַקֵּשׁוּ
  english_pob_choice: make crooked
  chosen_spanish: tuercen
  alternatives_spanish:
  - hacen torcido
  - pervierten
  lexicon: HALOT
  rationale: El verbo juega con el contraste entre lo recto y lo torcido. «Tuercen» es idiomático y preserva la imagen sin perder la tensión retórica.
theological_decisions:
- issue: Conservación del paralelismo y del contraste moral entre justicia/rectitud y lo torcido
  english_pob_reading: detest justice and make crooked all that is straight
  chosen_spanish_reading: detestan la justicia y tuercen todo lo recto
  alternative_spanish_readings:
  - aborrecen la justicia y pervierten todo lo recto
  - detestan el juicio y tuercen toda rectitud
  rationale: La frase hebrea construye un contraste fuerte entre justicia/rectitud y deformación moral. «Tuercen todo lo recto» conserva la imagen y el paralelismo con «detestan la justicia», evitando suavizar la denuncia.
  doctrine_reference: Principio de preservación de imagen retórica y fuerza profética; original-language primacy.
- issue: Designaciones corporativas de Israel/Jacob
  english_pob_reading: the house of Jacob ... the house of Israel
  chosen_spanish_reading: la casa de Jacob ... la casa de Israel
  alternative_spanish_readings:
  - Jacob ... Israel
  - el pueblo de Jacob ... el pueblo de Israel
  rationale: Se conserva la repetición de בית («casa») para mantener el paralelismo poético y el sentido corporativo/covenantal. «Jacob» e «Israel» sin «casa» perderían esa estructura.
  doctrine_reference: Consistencia terminológica y respeto por la estructura del texto fuente.
translation_notes:
  revision_awareness: 'La revisión auditada indica que no se requirieron cambios sustanciales: el consenso es alto y solo se señalaron observaciones menores. Esta redacción sigue de cerca el hebreo y mantiene el paralelismo, el tono profético y la metáfora recto/torcido del original.'
  spanish_consistency_notes:
  - Se mantiene «casa de Jacob / casa de Israel» de forma consistente con el paralelismo hebreo.
  - Se traduce מִשְׁפָּט como «justicia» para conservar el sentido judicial-social del contexto profético.
  - Se conserva la imagen de rectitud/torcedura con «recto» y «tuercen», evitando una paráfrasis abstracta.
