- from: Pero si amonestas a un hombre impío, y él no se vuelve de su impiedad ni de su mal camino[a], morirá por su iniquidad[b]; pero tú habrás librado tu vida.
  to: Pero si adviertes a un hombre impío, y él no se vuelve de su impiedad ni de su mal camino[a], morirá en su iniquidad; pero tú habrás librado tu vida[b].
  rationale: Se ajusta הִזְהַרְתָּ a 'adviertes' para seguir mejor la decisión auditada 'warn'; se cambia 'por su iniquidad' a 'en su iniquidad' para preservar la formulación hebrea documentada y no resolver de más la relación causal; y se corrige la nota [b] para que acompañe la cláusula final sobre נַפְשְׁךָ, conforme al rastro POB inglés.
