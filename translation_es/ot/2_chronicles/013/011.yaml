revisions:
- from: Y hacemos subir holocaustos a Yahvé mañana tras mañana y tarde tras tarde, y incienso aromático, y la disposición del pan sobre la mesa pura, y el candelabro de oro con sus lámparas para encenderlas tarde tras tarde; porque estamos guardando la responsabilidad[a] de Yahvé nuestro Dios, pero ustedes lo han abandonado.
  to: Y ofrecemos holocaustos a Yahvé mañana tras mañana y tarde tras tarde, e incienso aromático, y la disposición del pan[a] sobre la mesa pura, y el candelabro de oro con sus lámparas para arder tarde tras tarde; porque guardamos el encargo[b] de Yahvé nuestro Dios, pero ustedes lo han abandonado.
  rationale: Se ajusta 'וּמַקְטִרִים' a 'ofrecemos' para un español más natural y fiel al acto sacrificial; se cambia 'la responsabilidad' por 'el encargo' para reflejar mejor מִשְׁמֶרֶת como deber sagrado observado; y se añade la nota exigida para 'la disposición del pan' con las alternativas tradicionales preservadas por el audit trail inglés. También se suaviza 'para encenderlas' a 'para arder', más cercano a 'with its lamps to burn'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:59:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y mantiene los elementos cultuales principales: holocaustos, incienso, pan ordenado, mesa pura, candelabro de oro, lámparas, observancia del deber sagrado y contraste con el abandono de Yahvé. Sin embargo, dos decisiones clave debilitan la fidelidad: ''hacemos subir'' para וּמַקְטִרִים suena poco natural en español bíblico y no expresa tan bien la acción sacrificial como ''ofrecemos''; y ''la responsabilidad'' para מִשְׁמֶרֶת pierde el matiz cultual de encargo/deber observado. Además, falta en español la nota léxica que el POB inglés conserva para ''la disposición del pan''.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero algunas expresiones resultan algo forzadas: ''hacemos subir holocaustos'' y ''guardando la responsabilidad''. ''Tarde tras tarde'' es entendible, aunque en contexto cultual ''atardecer tras atardecer'' o ''cada atardecer'' podría sonar más preciso; no es un error mayor. La sintaxis general es buena y el registro es apropiado.'
  glossary_alignment: Acierta con 'Yahvé' para יהוה y con terminología cultual como 'holocaustos', 'incienso aromático', 'mesa pura' y 'candelabro de oro'. No obstante, para el modismo שׁמר משמרת conviene una formulación como 'cumplimos el encargo' o 'guardamos el encargo', más cercana a 'keep the charge'. También conviene preservar la alternativa tradicional para וּמַעֲרֶכֶת לֶחֶם en nota, como hace el inglés con 'showbread'/'bread of the Presence'.
  issues:
  - severity: medium
    issue: וּמַקְטִרִים traducido como 'hacemos subir'
    rationale: Aunque intenta reflejar la imagen de hacer ascender en humo, en español suena rígido y menos idiomático que 'ofrecemos', que comunica mejor la acción sacrificial en contexto con 'holocaustos'.
  - severity: high
    issue: מִשְׁמֶרֶת traducido como 'la responsabilidad'
    rationale: '''Responsabilidad'' es demasiado abstracto y contemporáneo; pierde el matiz cultual de cargo/encargo/deber sagrado que se observa o guarda. El inglés auditado eligió ''the charge'', y el español debe reflejar ese valor más de cerca.'
  - severity: medium
    issue: Falta la nota léxica para 'la disposición del pan'
    rationale: El POB inglés preserva en nota las alternativas 'showbread'/'bread of the Presence'. Dado que el español principal también opta por la literalidad, debe conservar alternativas útiles como 'los panes de la Presencia' o 'el pan de la Presencia'.
  revised_spanish_text: Y ofrecemos holocaustos a Yahvé mañana tras mañana y tarde tras tarde, e incienso aromático, y la disposición del pan[a] sobre la mesa pura, y el candelabro de oro con sus lámparas para arder tarde tras tarde; porque guardamos el encargo[b] de Yahvé nuestro Dios, pero ustedes lo han abandonado.
  revised_footnotes:
  - marker: a
    text: O 'los panes de la Presencia' o 'el pan de la Presencia'. Literalmente, 'la disposición del pan'.
    reason: lexical_alternative
  - marker: b
    text: O 'el cargo' o 'la obligación'. La expresión hebrea se refiere a un deber o encargo sagrado que se guarda y se cumple.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'וּמַקְטִרִים' a 'ofrecemos' para un español más natural y fiel al acto sacrificial; se cambia 'la responsabilidad' por 'el encargo' para reflejar mejor מִשְׁמֶרֶת como deber sagrado observado; y se añade la nota exigida para 'la disposición del pan' con las alternativas tradicionales preservadas por el audit trail inglés. También se suaviza 'para encenderlas' a 'para arder', más cercano a 'with its lamps to burn'.
