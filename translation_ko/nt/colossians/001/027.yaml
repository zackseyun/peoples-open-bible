id: COL.1.27
reference: Colossians 1:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἷς ἠθέλησεν ὁ θεὸς γνωρίσαι τί τὸ πλοῦτος τῆς δόξης τοῦ μυστηρίου τούτου ἐν τοῖς ἔθνεσιν, ⸀ὅ ἐστιν Χριστὸς ἐν ὑμῖν, ἡ ἐλπὶς τῆς δόξης·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/027.yaml
  text: To them God chose to make known what is the riches of the glory of this mystery among the Gentiles, which is Messiah in you, the hope of glory.
translation:
  language: ko
  text: 하나님께서는 이방인들 가운데에 있는 이 비밀의 영광의 풍성함이 무엇인지를 그들에게 알리시기를 원하셨으니, 곧 여러분 안에[a] 계신 메시아, 영광의 소망이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분 가운데」. 헬라어 ἐν ὑμῖν은 개인 안의 거하심이나 공동체 가운데의 임재 둘 다로 읽힐 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: οἷς ἠθέλησεν ὁ θεὸς γνωρίσαι
  english_pob_choice: To them God chose to make known
  chosen_korean: 하나님께서는 ... 그들에게 알리시기를 원하셨으니
  alternatives_korean:
  - 하나님이 그들에게 알리고자 하셨으니
  - 그들에게 하나님이 알리시기를 기뻐하셨으니
  lexicon: BDAG
  rationale: θέλω의 「의지·뜻함」을 「원하셨으니」로 옮긴다. 합쇼체 격조에 맞춰 한국어 어순을 자연스럽게 재배열한다.
- source_word: τί τὸ πλοῦτος τῆς δόξης τοῦ μυστηρίου τούτου
  english_pob_choice: what is the riches of the glory of this mystery
  chosen_korean: 이 비밀의 영광의 풍성함이 무엇인지를
  alternatives_korean:
  - 이 비밀의 영광이 얼마나 풍성한지를
  - 이 비밀의 영광의 풍요가 무엇인지
  lexicon: BDAG
  rationale: 헬라어 압축 구문을 「풍성함이 무엇인지」로 보존한다. 「풍성함」은 한국 교회의 정립된 표현.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_korean: 이방인들 가운데에
  alternatives_korean:
  - 이방인들 가운데
  - 열방 가운데
  lexicon: BDAG
  rationale: ἔθνη는 비유대인을 가리키므로 「이방인들」이 한국 교회의 정립된 표현이다.
- source_word: ὅ ἐστιν Χριστὸς ἐν ὑμῖν
  english_pob_choice: which is Messiah in you
  chosen_korean: 곧 여러분 안에 계신 메시아
  alternatives_korean:
  - 즉 여러분 안의 메시아
  - 곧 여러분 가운데 메시아
  lexicon: BDAG
  rationale: 관계대명사는 「비밀」을 받아 그 정체를 식별한다. Χριστός의 칭호성을 살려 「메시아」로 옮긴다.
- source_word: ἡ ἐλπὶς τῆς δόξης
  english_pob_choice: the hope of glory
  chosen_korean: 영광의 소망
  alternatives_korean:
  - 그 영광의 소망
  - 영광을 향한 소망
  lexicon: BDAG
  rationale: 속격 압축 구문 「영광의 소망」을 그대로 보존한다.
theological_decisions:
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 「비밀」의 내용을 식별하는 본 구절에서 Χριστός는 칭호성이 강하다. 본 번역의 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default Messiah where title'
- issue: ἐν ὑμῖν의 의미
  chosen_reading: 「여러분 안에」(개인적·복수적)
  alternative_readings:
  - 여러분 가운데
  rationale: 헬라어는 두 의미를 함께 담을 수 있다. 본문은 「안에」로 직역하고 「가운데」 가능성은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
