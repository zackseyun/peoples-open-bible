    reason: alternative_reading
  - marker: c
    text: O «las siete trenzas de su cabeza».
    reason: lexical_alternative
  revision_rationale: Se corrige la inconsistencia de la nota b, se reemplaza «trenzas» por «mechones» para reflejar mejor la amplitud léxica de מַחְלְפוֹת conforme al POB inglés, y se suaviza «Así que» a «Entonces» para un flujo narrativo más fiel y natural en español.
