translation:
  language: es
  text: Según el número de todo varón de un mes de edad en adelante, eran ocho mil seiscientos, los que guardaban el encargo[a] de lo santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el encargo de lo santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר
  english_pob_choice: By the number of
  chosen_spanish: Según el número de
  alternatives_spanish:
  - Por el número de
  - De acuerdo con el número de
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un conteo censal. «Según el número de» conserva ese valor enumerativo y suena natural en español bíblico contemporáneo.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - cada varón
  lexicon: HALOT
  rationale: «Varón» reproduce bien el referente masculino humano del censo. «Todo» mantiene el valor distributivo de כָּל.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: de un mes de edad en adelante
  alternatives_spanish:
  - desde un mes de edad en adelante
  - de un mes y más
  lexicon: HALOT
  rationale: Es una fórmula de umbral de edad. «De un mes de edad en adelante» expresa con claridad el hebreo sin forzar el estilo.
- source_word: שְׁמֹנַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  english_pob_choice: eight thousand six hundred
  chosen_spanish: ocho mil seiscientos
  alternatives_spanish:
  - '8.600'
  - ocho mil seiscientas
  lexicon: HALOT
  rationale: Se mantiene el número en palabras, como en un registro bíblico formal. No se feminiza el numeral porque el referente implícito son varones.
- source_word: שֹׁמְרֵי
  english_pob_choice: keeping
  chosen_spanish: los que guardaban
  alternatives_spanish:
  - guardando
  - los guardianes de
  lexicon: HALOT
  rationale: El participio expresa una función continua. «Los que guardaban» hace explícito el valor personal del participio en español y evita un gerundio pesado.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: charge
  chosen_spanish: el encargo
  alternatives_spanish:
  - la custodia
  - la responsabilidad
  lexicon: HALOT
  rationale: «Encargo» comunica la idea de una responsabilidad encomendada. Se evita «cargo» por posible ambigüedad moderna y «custodia» por sonar más restringido a vigilancia física.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy place
  chosen_spanish: de lo santo
  alternatives_spanish:
  - del lugar santo
  - del santuario
  - de lo sagrado
  lexicon: HALOT
  rationale: La revisión inglesa volvió a «the holy place» para acercarse más a הַקֹּדֶשׁ. En español, «lo santo» conserva mejor la referencia lexical amplia del término sin fijarlo demasiado pronto a un recinto concreto.
theological_decisions:
- issue: Alcance de הַקֹּדֶשׁ
  english_pob_reading: the holy place
  chosen_spanish_reading: de lo santo
  alternative_spanish_readings:
  - del lugar santo
  - del santuario
  rationale: 'El hebreo usa el sustantivo con artículo «lo santo», que puede abarcar la esfera sagrada o el recinto santo según contexto. Dado que el audit trail inglés opta por «the holy place» para mayor cercanía lexical, el español mantiene una forma más literal y abierta: «lo santo».'
  doctrine_reference: Números 3:28; uso cultual de הקֹדֶשׁ en textos sacerdotales
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final de «the sanctuary» a «the holy place» para acercarse más a הַקֹּדֶשׁ. El español sigue esa corrección, pero evita encerrar el sentido en un sustantivo locativo demasiado estrecho; por eso traduce «de lo santo» y conserva la nota alternativa para la lectura más explícita.
  spanish_consistency_notes:
  - Se mantiene el estilo censal y numérico formal del pasaje.
  - «Varón» y no «macho» para un registro bíblico reverente y claro.
  - La referencia final queda deliberadamente abierta entre el ámbito santo y el lugar santo, en armonía con la tensión léxica del hebreo.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton.
