review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite con fidelidad el sentido del griego: «Entonces le dijeron: “Señor, danos siempre este pan”». Refleja bien εἶπον, οὖν, πρὸς αὐτόν, πάντοτε, δὸς, ἡμῖν y τὸν ἄρτον τοῦτον. También conserva adecuadamente la amplitud semántica de Κύριε con «Señor».'
  spanish_quality_summary: 'El texto principal suena natural, claro y digno en español. La única reparación necesaria está en la nota: el inglés preserva explícitamente la alternativa «Sir», y la nota española actual no la da como alternativa real sino que repite «Señor», lo cual debilita la documentación del rango semántico. Conviene ajustar la nota para mencionar «Señor» / «Señor, señor» no es necesario; la alternativa más fiel en español es «Señor» en texto y «O “Señor”/“caballero”» sería forzado. Mejor: indicar «O “Señor” como forma de cortesía; el griego también puede significar “señor” en sentido reverente». Sin embargo, para reflejar mejor el audit trail inglés, puede decirse «O “Señor” como tratamiento respetuoso», sin crear una alternativa española artificial.'
  glossary_alignment: Se alinea con la terminología del proyecto al usar «Señor» para κύριος y «pan» para ἄρτος. No hay conflicto con Yahvé/Mesías u otros términos de glosario. La revisión propuesta solo afina la nota para reflejar mejor la justificación léxica documentada para κύριος.
  issues:
  - severity: medium
    issue: La nota al pie no preserva claramente la alternativa semántica documentada para κύριε.
    rationale: 'El audit trail inglés conserva una nota de alternativa: «Or “Sir ...”». La nota española actual dice «O “Señor” como trato respetuoso», lo que no presenta una verdadera alternativa ni refleja con precisión que κύριε puede funcionar como forma de cortesía además de título reverente.'
  revised_spanish_text: 'Entonces le dijeron[a]: «Señor, danos siempre este pan».'
  revised_footnotes:
  - marker: a
    text: O «Señor» como tratamiento respetuoso. El griego κύριε puede funcionar tanto como forma cortés de dirigirse a alguien como también como «Señor».
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se corrige la nota para que documente mejor la amplitud semántica de κύριε, en línea con la nota inglesa, sin introducir una alternativa española artificial o poco idiomática en el texto principal.
