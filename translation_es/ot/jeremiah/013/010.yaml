translation:
  language: es
  text: Este pueblo malo, los que se niegan a oír mis palabras, los que andan en la obstinación de su corazón y los que van tras otros dioses para servirles y para postrarse ante ellos, llegará a ser como este cinto[a], que no sirve para nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cinturón' o 'faja'; el hebreo אֵזוֹר designa una prenda ceñida a la cintura. En el contexto de la acción simbólica de Jeremías 13, las versiones oscilan entre 'cinto', 'cinturón' y 'faja'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם הַזֶּה הָרָע
  english_pob_choice: This evil people
  chosen_spanish: Este pueblo malo
  alternatives_spanish:
  - Este pueblo perverso
  - Esta nación mala
  lexicon: HALOT
  rationale: עָם conviene aquí como 'pueblo' para el colectivo de Judá, y רַע como calificativo moral se mantiene con 'malo', sin suavizar la denuncia profética.
- source_word: הַמֵּאֲנִים לִשְׁמוֹעַ
  english_pob_choice: who refuse to hear
  chosen_spanish: que se niega a oír
  alternatives_spanish:
  - que rehúsa escuchar
  - que no quiere oír
  lexicon: HALOT
  rationale: מָאֵן expresa negativa deliberada, no simple falta de percepción. 'Oír' preserva el valor bíblico de escuchar con obediencia.
- source_word: אֶת דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  lexicon: HALOT
  rationale: El hebreo está en plural, por lo que 'palabras' conserva mejor la forma explícita del texto.
- source_word: הַהֹלְכִים בִּשְׁרִרוּת לִבָּם
  english_pob_choice: who walk in the stubbornness of their heart
  chosen_spanish: que anda en la obstinación de su corazón
  alternatives_spanish:
  - que camina en la obstinación de su corazón
  - que sigue la terquedad de su corazón
  lexicon: HALOT
  rationale: שְׁרִרוּת comunica obstinación/terquedad más que mero deseo. En español, 'anda en' reproduce bien el uso hebreo de conducta continua. Se conserva el singular colectivo 'su corazón'.
- source_word: וַיֵּלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  english_pob_choice: and who go after other gods
  chosen_spanish: y que va tras otros dioses
  alternatives_spanish:
  - y que va detrás de otros dioses
  - y que sigue a otros dioses
  lexicon: HALOT
  rationale: אַחֲרֵי implica ir tras/seguir detrás; 'va tras' suena natural en español y mantiene la idea de apostatar siguiendo a otros dioses.
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: para servirles
  alternatives_spanish:
  - para servirlos
  - para adorarlos
  lexicon: HALOT
  rationale: עבד en relación con deidades abarca servicio/devoción, no solo culto formal. 'Servirles' conserva esa distinción frente al verbo siguiente.
- source_word: וּלְהִשְׁתַּחֲוֺת לָהֶם
  english_pob_choice: and to bow down to them
  chosen_spanish: y para postrarse ante ellos
  alternatives_spanish:
  - y para inclinarse ante ellos
  - y para adorarlos
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה denota postración física; 'postrarse ante ellos' preserva la imagen concreta y evita fusionarlo con 'servir'.
- source_word: וִיהִי
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - se volverá
  - llegará a ser
  lexicon: HALOT
  rationale: En esta comparación profética, el resultado se expresa naturalmente en español con el futuro simple 'será'.
- source_word: כָּאֵזוֹר הַזֶּה
  english_pob_choice: like this waistband
  chosen_spanish: como este cinto
  alternatives_spanish:
  - como este cinturón
  - como este cinturón para la cintura
  lexicon: HALOT
  rationale: אֵזוֹר puede referirse a cinturón/cinto/faja. 'Cinto' mantiene el sentido de prenda ceñida a la cintura y suena digno y natural en español bíblico.
- source_word: אֲשֶׁר לֹא יִצְלַח לַכֹּל
  english_pob_choice: which is good for nothing
  chosen_spanish: que no sirve para nada
  alternatives_spanish:
  - que no es útil para nada
  - que no aprovecha para nada
  lexicon: HALOT
  rationale: La expresión idiomática comunica inutilidad total. 'No sirve para nada' es la manera más natural de reproducir esa fuerza en español contemporáneo.
theological_decisions:
- issue: Distinción entre servir y postrarse en la idolatría
  english_pob_reading: Render עבד as 'serve' and השתחוה as 'bow down'
  chosen_spanish_reading: Conservar 'servirles' y 'postrarse ante ellos'
  alternative_spanish_readings:
  - unificar ambos como 'adorarlos'
  - usar 'servirlos' y 'adorarlos'
  rationale: El hebreo usa dos verbos distintos para aspectos diferentes de la idolatría. Mantener ambos evita aplanar la acusación profética y conserva su fuerza retórica.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: mantiene la secuencia descriptiva presente (''va tras'') antes del resultado futuro (''será''), conserva la distinción entre ''servir'' y ''postrarse'', y traduce el cierre idiomático como inutilidad total.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' en el texto principal solo cuando el hebreo nombra explícitamente el nombre divino; aquí no aparece, por lo que no se introduce.
  - 'Se mantuvo el paralelismo verbal del hebreo con dos infinitivos en español: ''servirles'' y ''postrarse ante ellos''.'
  - '''Pueblo'' se usa para el colectivo de Judá conforme al valor del hebreo עָם.'
  - El orden de la cláusula final refleja el contraste profético y evita una paráfrasis demasiado libre.
