translation:
  language: es
  text: Mejor es refugiarse en Yahvé que confiar en el hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la humanidad' o 'en la gente'; el hebreo usa un singular genérico para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: El adjetivo predicativo introduce una valoración comparativa. En español, "Mejor es" conserva la concisión proverbial del hebreo y suena natural en registro bíblico sin añadir contenido ajeno.
- source_word: לַחֲסוֹת
  english_pob_choice: to take refuge
  chosen_spanish: refugiarse
  alternatives_spanish:
  - tomar refugio
  - buscar refugio
  lexicon: HALOT
  rationale: El verbo expresa la imagen de buscar protección/shelter, no solo confianza abstracta. "Refugiarse" comunica bien esa metáfora en español actual y mantiene la fuerza del paralelo con confiar.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el Señor
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según la norma del proyecto, no la sustitución por un título. "Yahvé" es la forma establecida para el Tetragrámaton en el texto principal.
- source_word: מִבְּטֹחַ
  english_pob_choice: than to trust
  chosen_spanish: que confiar
  alternatives_spanish:
  - que confiarse
  - que poner confianza
  lexicon: HALOT
  rationale: La partícula comparativa con infinitivo constructo expresa "más ... que". "Confiar" es el equivalente natural y breve para בטח; mantiene el sentido de dependencia/seguridad sin sobreparafrasear.
- source_word: בָּאָדָם
  english_pob_choice: in man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - en la humanidad
  - en la gente
  - en una persona
  lexicon: HALOT
  rationale: אָדָם aparece en singular genérico y contrasta con Yahvé. "El hombre" preserva esa forma singular representativa y la tensión antropológica del hebreo, siguiendo la decisión auditada de no diluirla en un plural abstracto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. La versión española sigue la convención del proyecto de transliterarlo como "Yahvé" para mantener visible el nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor genérico singular de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  - los seres humanos
  rationale: El contraste no es entre Dios y un varón individual, sino entre la confianza en Yahvé y la confianza en la condición humana. Sin embargo, el singular hebreo es deliberado; "el hombre" conserva esa forma y su alcance genérico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con el audit trail inglés; no se introdujeron revisiones posteriores ni cambios textuales. La decisión principal fue adaptar la sintaxis comparativa al español manteniendo el paralelismo hebreo y el nombre divino visible.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como forma consistente del Tetragrámaton.
  - '"El hombre" conserva el singular genérico del hebreo y evita neutralizar la comparación.'
  - '"Refugiarse" retiene la metáfora de protección, complementaria a "confiar" en el segundo hemistiquio.'
  - La nota al pie aclara la alternativa inclusiva sin alterar el texto principal.
