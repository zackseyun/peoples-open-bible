translation:
  language: es
  text: 'Pero él dijo[a]: «¡Ustedes son ociosos, ociosos! Por eso dicen: “Vayamos y sacrifiquemos a Yahvé”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ociosos, ociosos», con repetición enfática; alternativamente, «perezosos, muy perezosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw narrativo introduce la respuesta de Faraón en secuencia; en español, «Pero» refleja mejor el matiz adversativo del contexto que «Y», sin perder la simpleza del verbo de habla.
- source_word: נִרְפִּים
  english_pob_choice: idle
  chosen_spanish: ociosos
  alternatives_spanish:
  - perezosos
  - flojos
  - inactivos
  lexicon: HALOT
  rationale: El término acusa falta de diligencia o dejadez; «ociosos» transmite bien esa censura en español y conserva un tono idiomático fuerte. En nota se preserva la alternativa «perezosos», que también captura el campo semántico.
- source_word: נִרְפִּים אַתֶּם נִרְפִּים
  english_pob_choice: You are idle, idle!
  chosen_spanish: ustedes son ociosos, ociosos
  alternatives_spanish:
  - ustedes son perezosos, perezosos
  - ociosos son ustedes, ociosos
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo sin suavizarla. El orden natural en español requiere explicitar el sujeto para que el reproche suene claro y con la misma fuerza retórica.
- source_word: עַל כֵּן
  english_pob_choice: That is why
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por esta razón
  lexicon: HALOT
  rationale: Expresa la inferencia causal que Faraón atribuye al comportamiento de ellos. «Por eso» es la forma más natural y directa en español actual.
- source_word: אֹמְרִים
  english_pob_choice: you say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - ustedes dicen
  lexicon: HALOT
  rationale: El participio funciona como presente en discurso directo. En español, «dicen» mantiene la naturalidad y evita una formulación excesivamente literal.
- source_word: נֵלְכָה
  english_pob_choice: Let us go
  chosen_spanish: Vamos
  alternatives_spanish:
  - Vayamos
  - Vayámonos
  lexicon: HALOT
  rationale: La cohorte plural expresa una propuesta o intención compartida. «Vamos» comunica de modo idiomático esa exhortación implícita dentro del discurso citado.
- source_word: נִזְבְּחָה
  english_pob_choice: and sacrifice
  chosen_spanish: y sacrificaremos
  alternatives_spanish:
  - y ofrezcamos sacrificio
  - y vayamos a sacrificar
  lexicon: HALOT
  rationale: La forma cohortativa del verbo se vierte mejor como futuro de intención en la cita española para conservar la fuerza volitiva de la frase hebrea. Se mantiene el acto cultual con el verbo «sacrificar».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». La preposición ל indica destinatario/dirigido a la acción sacrificial, por lo que «a Yahvé» resulta más natural que una calca rígida.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el nombre del pacto. Siguiendo la norma del proyecto, se conserva el nombre propio divino en español como «Yahvé», evitando la sustitución tradicional por «SEÑOR» y manteniendo la trazabilidad del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor discursivo de la acusación repetida
  english_pob_reading: You are idle, idle!
  chosen_spanish_reading: ¡Ustedes son ociosos, ociosos!
  alternative_spanish_readings:
  - ¡Ustedes son perezosos, perezosos!
  - ¡Ociosos, ociosos son ustedes!
  rationale: La repetición hebrea funciona como intensificación retórica. Se conserva esa tensión sin diluirla en una paráfrasis más suave, manteniendo el tono acusatorio de Faraón.
  doctrine_reference: Principio de fidelidad retórica y semántica en discurso directo
- issue: Cohortativos de primera persona plural
  english_pob_reading: Let us go and sacrifice
  chosen_spanish_reading: Vamos y sacrificaremos
  alternative_spanish_readings:
  - Vayamos y sacrifiquemos
  - Vamos a ir y a sacrificar
  rationale: El hebreo presenta dos cohortativos consecutivos con sentido volitivo/propositivo. En español, el futuro de intención en la segunda cláusula preserva mejor la fuerza de resolución que una simple coordinación infinitiva.
  doctrine_reference: Principio de equivalencia óptima para formas volitivas en discurso directo
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del último pase, que no exigió cambios. La presente redacción mantiene la decisión del nombre divino como «Yahvé», conserva la repetición enfática del hebreo y ajusta la sintaxis española para que el reproche y la cita directa suenen naturales sin perder trazabilidad al original.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para לַיהוָה, conforme al estándar del proyecto.
  - Se conserva la repetición intensiva del adjetivo como recurso retórico en español.
  - «Sacrificaremos» se eligió para reflejar la intención volitiva del cohortativo sin perder claridad.
  - El discurso directo mantiene puntuación española con comillas angulares y signos de exclamación iniciales según corresponda.
