revisions:
- from: Cuando un hombre toma esposa y se casa con ella[a], y sucede que no halla favor en sus ojos porque ha hallado en ella alguna indecencia, y le escribe un certificado de divorcio, lo pone en su mano y la despide de su casa,
  to: Si un hombre toma esposa y se casa con ella, y sucede que ella no halla favor en sus ojos porque ha hallado en ella alguna indecencia[a], y le escribe un certificado de divorcio, lo pone en su mano y la envía fuera de su casa,
  rationale: Se ajusta «Cuando» a «Si» para reflejar con mayor precisión la protasis legal condicional del hebreo y de la auditoría inglesa. Se mueve la nota al sintagma ambiguo «alguna indecencia» para anclarla donde realmente pertenece. Se cambia «la despide de su casa» por «la envía fuera de su casa» para conservar el componente espacial explícito del original.
