translation:
  language: es
  text: Shaaf[a] engendró a Sheva, padre de Madmanna, padre de Macbena[b] y padre de Gibea; y la hija de Caleb fue Acsá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la forma verbal es femenina, pero en esta genealogía se refiere a Shaaf y se vierte de manera idiomática como ''engendró''.'
    reason: lexical_alternative
  - marker: b
    text: O 'fundador de' para las expresiones 'padre de Madmanna', 'padre de Macbena' y 'padre de Gibea'.
    reason: lexical_alternative
  - marker: c
    text: Acsá también puede escribirse 'Achsá' en transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - dio a luz
  - fue padre de
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es femenina y en sentido inmediato significa 'dio a luz', el contexto genealógico atribuye la acción a un varón (Shaaf). En español, 'engendró' conserva la relación genealógica sin sugerir una madre, y evita la literalidad discordante de 'dio a luz'.
- source_word: שַׁעַף
  english_pob_choice: Shaaph
  chosen_spanish: Shaaf
  alternatives_spanish:
  - Saaf
  - Shaaf
  lexicon: nombre propio (transliteración)
  rationale: Se translitera el nombre propio de manera cercana a las consonantes hebreas y con forma legible para el español. 'Shaaf' mantiene la aspiración inicial habitual en la tradición bíblica y evita una adaptación innecesaria.
- source_word: אֲבִי
  english_pob_choice: father of
  chosen_spanish: padre de
  alternatives_spanish:
  - fundador de
  - antepasado de
  lexicon: HALOT
  rationale: En estas fórmulas genealógicas, אבי puede indicar paternidad inmediata o relación fundacional con un asentamiento. 'Padre de' preserva la estructura hebrea y deja abierta la posible fuerza fundacional sin imponerla en el texto principal.
- source_word: מַדְמַנָּה
  english_pob_choice: Madmannah
  chosen_spanish: Madmanna
  alternatives_spanish:
  - Madmaná
  - Madmanná
  lexicon: nombre propio (transliteración)
  rationale: Se translitera el topónimo. 'Madmanna' refleja de manera natural la forma consonántica y resulta publicable en español sin forzar una traducción interpretativa.
- source_word: שְׁוָא
  english_pob_choice: Sheva
  chosen_spanish: Sefá
  alternatives_spanish:
  - Shevá
  - Shéva
  lexicon: nombre propio (transliteración)
  rationale: El hebreo presenta un nombre propio; en español se opta por una transliteración breve y fluida. 'Sefá' evita una secuencia gráfica ajena al español, pero conserva de forma suficiente la identidad del nombre. La variación inglesa 'Sheva/Shava' se resuelve aquí con una forma española estable.
- source_word: מַכְבֵּנָה
  english_pob_choice: Machbenah
  chosen_spanish: Macbena
  alternatives_spanish:
  - Machbena
  - Macbena
  lexicon: nombre propio (transliteración)
  rationale: Se mantiene el topónimo como nombre propio transliterado. 'Macbena' ofrece una lectura clara para el español y conserva la forma básica del término hebreo sin añadir pronunciación no sustentada.
- source_word: גִבְעָא
  english_pob_choice: Gibea
  chosen_spanish: Gibea
  alternatives_spanish:
  - Gibea
  - Gibá
  lexicon: nombre propio (transliteración)
  rationale: Se conserva la forma tradicional transliterada del topónimo, ya estable y comprensible en español bíblico.
- source_word: וּבַת
  english_pob_choice: daughter was
  chosen_spanish: la hija de
  alternatives_spanish:
  - y la hija de
  - y la hija
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal. En español, 'la hija de Caleb' expresa con naturalidad la relación sin añadir un verbo innecesario; el verbo copulativo se sobreentiende en la estructura.
- source_word: כָּלֵב
  english_pob_choice: Caleb’s
  chosen_spanish: Caleb
  alternatives_spanish:
  - de Caleb
  lexicon: nombre propio (transliteración)
  rationale: Se mantiene el nombre propio en forma reconocible y estándar para el lector español.
- source_word: עַכְסָה
  english_pob_choice: Acsah
  chosen_spanish: Axsá
  alternatives_spanish:
  - Acsá
  - Acsah
  lexicon: nombre propio (transliteración)
  rationale: Se translitera el nombre propio con una grafía española clara. 'Axsá' preserva mejor la consonante fricativa y evita una lectura confusa; además, la acentuación final guía la pronunciación en español.
theological_decisions:
- issue: Fórmula genealógica con verbo femenino aplicado a un varón
  english_pob_reading: '''fathered'' refleja idiomáticamente que el sujeto masculino Shaaph es el antepasado, aunque el hebreo usa una forma verbal femenina que literalmente sería ''she bore''.'
  chosen_spanish_reading: '''engendró'' mantiene el sentido genealógico masculino sin ocultar que el hebreo usa una forma verbal marcada que, en contexto, no se traduce de manera literal como si hablara de una mujer.'
  alternative_spanish_readings:
  - '''dio a luz'''
  - '''fue padre de'''
  rationale: 'El español requiere evitar una traducción que haga parecer femenina la acción del sujeto. ''Engendró'' conserva la tensión del texto: la forma verbal hebrea no coincide con el género del sujeto, pero el contexto genealógico dirige la lectura hacia la paternidad.'
  doctrine_reference: Genealogías veterotestamentarias; uso contextual del lenguaje de descendencia
- issue: Expresión אבי en listas genealógicas y topónimos
  english_pob_reading: '''father of'' se mantiene en el texto principal y la nota abre la opción de ''founder of'' para expresiones sobre ciudades o clanes.'
  chosen_spanish_reading: '''padre de'' en el texto principal, con nota sobre posible valor fundacional en topónimos.'
  alternative_spanish_readings:
  - fundador de
  - antepasado de
  rationale: No hay base suficiente en este versículo para reemplazar la fórmula por una interpretación más específica. 'Padre de' conserva la transparencia del hebreo y permite que una nota aclare el posible sentido fundacional sin eliminar la ambigüedad documentada.
  doctrine_reference: Semántica genealógica hebrea y nombres de asentamientos
translation_notes:
  revision_awareness: Se revisó el antecedente inglés en busca de la corrección de nombres propios y de la decisión de mantener la fórmula genealógica 'father of'. La versión española sigue esa línea, pero adapta la cláusula inicial a un verbo natural en español ('engendró') y normaliza los nombres propios en transliteraciones legibles. También se preserva la alternativa fundacional de אבי en nota, porque la auditoría inglesa la documenta y el hebreo lo permite. El nombre del final se vierte como Axsá para una forma española clara, con nota que reconoce la variante ortográfica inglesa.
  spanish_consistency_notes:
  - Se mantiene 'padre de' como calco controlado de אבי y no se sustituye por 'fundador de' en el texto principal.
  - Los nombres propios se transliteran de forma consistente y publicable en español.
  - La acentuación de Axsá y la grafía Shaaf buscan guiar la lectura sin alterar la identidad de los nombres.
  - No se añade puntuación interpretativa fuera de la estructura genealógica del versículo.
