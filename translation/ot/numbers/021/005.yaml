id: NUM.21.5
reference: Numbers 21:5
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר הָ/עָ֗ם בֵּֽ/אלֹהִים֮ וּ/בְ/מֹשֶׁה֒ לָ/מָ֤ה הֶֽעֱלִיתֻ֨/נוּ֙ מִ/מִּצְרַ֔יִם לָ/מ֖וּת בַּ/מִּדְבָּ֑ר כִּ֣י אֵ֥ין לֶ֨חֶם֙ וְ/אֵ֣ין מַ֔יִם וְ/נַפְשֵׁ֣/נוּ קָ֔צָה בַּ/לֶּ֖חֶם הַ/קְּלֹקֵֽל׃
translation:
  text: 'And the people spoke against God and against Moses: “Why have you brought us up out of Egypt to die in the wilderness? For there is no bread and no water[a], and we loathe this miserable bread.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this contemptible bread” or “this worthless bread.” The Hebrew adjective is rare and expresses disdain for the food God provided.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke against
  alternatives:
  - spoke
  - spoke against
  - complained against
  lexicon: HALOT
  rationale: Though דבר with ב can more literally be 'speak with/to/about,' in complaint contexts it carries an adversative sense. Here the content is clearly hostile toward God and Moses, so 'spoke against' best captures the force without over-paraphrasing to 'blasphemed' or 'complained'.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Standard rendering for the collective noun with the article.
- source_word: בֵּאלֹהִים
  chosen: against God
  alternatives:
  - to God
  - about God
  lexicon: HALOT
  rationale: The preposition ב with דבר is rendered adversatively here because the speech is accusatory. 'God' is the plain sense of אֱלֹהִים in this context.
- source_word: וּבְמֹשֶׁה
  chosen: and against Moses
  alternatives:
  - and to Moses
  - and about Moses
  lexicon: HALOT
  rationale: Parallel to 'against God'; the complaint is directed adversatively toward both God and Moses.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Natural interrogative in English.
- source_word: הֶעֱלִיתֻנוּ
  chosen: have you brought us up
  alternatives:
  - did you bring us up
  - have you led us up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up.' The perfect in direct speech can be rendered idiomatically in English as present perfect. 'Brought us up' preserves the exodus idiom from Egypt.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: '''Out of Egypt'' is idiomatic with the exodus motif and matches the directional force.'
- source_word: לָמוּת
  chosen: to die
  lexicon: HALOT
  rationale: Straightforward infinitive of purpose/result.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness rather than sandy desert specifically. 'Wilderness' also preserves biblical thematic resonance.
- source_word: כִּי אֵין לֶחֶם וְאֵין מַיִם
  chosen: For there is no bread and no water
  alternatives:
  - For there is no food and no water
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread,' though it can broadly denote food. Because the next clause also uses לֶחֶם for the manna-like provision, retaining 'bread' in both places preserves the rhetorical complaint and lexical repetition.
- source_word: וְנַפְשֵׁנוּ קָצָה
  chosen: and we loathe
  alternatives:
  - and our soul is disgusted
  - and we are weary of
  - and our appetite detests
  lexicon: HALOT
  rationale: Literally, 'our soul has become disgusted/short.' English idiom prefers a verbal rendering. 'We loathe' captures the strong revulsion without awkward literalism.
- source_word: בַּלֶּחֶם הַקְּלֹקֵל
  chosen: this miserable bread
  alternatives:
  - this worthless bread
  - this contemptible bread
  - this miserable food
  lexicon: HALOT
  rationale: קְלֹקֵל is a rare adjective conveying something slight, contemptible, or miserable. 'Miserable bread' preserves the noun 'bread' and the people's disdain. The demonstrative 'this' is supplied idiomatically in English because the complaint is directed at the present provision, though not explicit in Hebrew.
