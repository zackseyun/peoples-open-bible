lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: But ... came
  chosen_spanish: Pero ... vino
  alternatives_spanish:
  - Y sucedió
  - Ahora sucedió
  lexicon: HALOT
  rationale: El waw consecutivo introduce progreso narrativo; en español, «Pero» conserva el enlace con el contexto previo y una leve contraposición, mientras que «vino» expresa con naturalidad la llegada de la revelación sin la rigidez de una fórmula más literal.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en aquella noche
  lexicon: HALOT
  rationale: La expresión temporal exige el valor demostrativo de הַהוּא. «Aquella noche» lo comunica de forma natural y digna en español.
- source_word: דְּבַר אֱלֹהִים
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - un mensaje de Dios
  - la palabra procedente de Dios
  lexicon: HALOT
  rationale: En una fórmula de revelación profética, דָּבָר puede ser «palabra» o «mensaje». «La palabra de Dios» conserva el registro formal y la fuerza teológica del hebreo sin resolver indebidamente la ambigüedad.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere claramente al Dios de Israel en sentido singular; «Dios» es el equivalente directo y sobrio en español.
- source_word: אֶל נָתָן
  english_pob_choice: to Nathan
  chosen_spanish: a Natán
  alternatives_spanish:
  - para Natán
  - hacia Natán
  lexicon: HALOT
  rationale: אֶל marca dirección hacia el receptor de la revelación. «A Natán» es la construcción natural en español y mantiene el nombre propio transliterado según la práctica del proyecto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo. «Diciendo» es la equivalencia tradicional y clara en español, sin añadir contenido interpretativo.
theological_decisions:
- issue: Fórmula revelatoria דְּבַר אֱלֹהִים
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - un mensaje de Dios
  - la palabra procedente de Dios
  rationale: Se mantiene el tono revelatorio formal del hebreo. «La palabra de Dios» preserva la solemnidad y no añade elementos doctrinales ajenos al texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se conserva la progresión narrativa, la localización temporal y la fórmula profética sin ampliar el sentido. No hay revisiones aplicadas en el contexto inglés, y el borrador español sigue esa lectura estable.'
  spanish_consistency_notes:
  - Se usa «Natán» para el nombre propio, coherente con la transliteración del proyecto.
  - «Palabra de Dios» mantiene la fórmula bíblica formal y evita la sustitución por un giro más interpretativo.
  - La puntuación reproduce la clausura narrativa con comas y la cláusula introductoria de discurso directo.
