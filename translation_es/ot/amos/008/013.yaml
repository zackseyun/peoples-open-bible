review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: «En aquel día» para בַּיּוֹם הַהוּא, «las vírgenes hermosas» para הַבְּתוּלֹת הַיָּפוֹת, «los jóvenes» para וְהַבַּחוּרִים y «de sed» para בַּצָּמָא. El sentido principal de תִּתְעַלַּפְנָה como desfallecer/desmayarse también está bien representado.'
  spanish_quality_summary: La redacción principal es natural y digna en español. Sin embargo, la nota al pie está defectuosa porque repite la misma opción ya usada en el texto («se desmayarán») en vez de preservar la alternativa auditada «will swoon». Conviene corregir la nota a una alternativa española real, como «desfallecerán» o «se desvanecerán».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Vírgenes» preserva adecuadamente בְּתוּלֹת; «jóvenes» es aceptable para בַּחוּרִים en este contexto, aunque «jóvenes» puede ser algo menos explícito que «jóvenes varones» o «hombres jóvenes». No requiere cambio. La decisión principal pendiente es corregir la nota léxica alternativa.
  issues:
  - severity: medium
    issue: La nota al pie léxica es incorrecta y redundante.
    rationale: 'El inglés auditado conserva una alternativa real: «Or ''will swoon from thirst.''». La nota española dice «O: «se desmayarán»», que no ofrece ninguna alternativa y además repite el texto principal. Esto rompe la trazabilidad léxica del expediente.'
  - severity: low
    issue: La formulación de la nota puede sonar poco natural en español editorial bíblico.
    rationale: 'Además de su contenido repetitivo, la puntuación y formulación «''O: «se desmayarán». ''» es torpe. Una nota breve y clara en español debe dar una alternativa completa y natural.'
  revised_spanish_text: En aquel día las vírgenes hermosas y los jóvenes se desmayarán de sed[a].
