  glossary_alignment: No hay términos teológicos mayores en juego. El etnónimo griego Χαλδαίων debe mantenerse literalmente, pero en español la forma normativa es «caldeos», no «Chaldeos». La decisión de no sustituir por «babilonios» es correcta.
