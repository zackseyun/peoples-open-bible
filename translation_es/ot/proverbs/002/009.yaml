translation:
  language: es
  text: Entonces entenderás la rectitud, la justicia y la equidad[a], todo buen camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» para מֵישָׁרִים, enfatizando lo que es derecho o moralmente llano.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así
  lexicon: HALOT
  rationale: Marca secuencia temporal y resultado lógico del contexto anterior; «Entonces» es natural en español y conserva el vínculo consecutivo.
- source_word: תָּבִין
  english_pob_choice: you will understand
  chosen_spanish: entenderás
  alternatives_spanish:
  - discernirás
  - comprenderás
  - llegarás a entender
  lexicon: HALOT
  rationale: El imperfecto qal expresa una comprensión futura o adquirida; «entenderás» es claro, digno y fiel al valor cognitivo del verbo.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia moral
  - lo recto
  lexicon: HALOT
  rationale: En este contexto sapiencial puede señalar lo recto o justo. Se eligió «justicia» para mantener el paralelo con מִשְׁפָּט y conservar el campo ético-jurídico sin sonar redundante con «rectitud» en la misma línea.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - juicio
  - orden justo
  lexicon: HALOT
  rationale: Aunque suele poder rendirse como «juicio» o «justicia», aquí la serie pide diferenciación en español. «Rectitud» preserva el valor normativo y permite distinguirlo de צֶדֶק sin perder el sentido de orden correcto.
- source_word: מֵישָׁרִים
  english_pob_choice: equity
  chosen_spanish: equidad
  alternatives_spanish:
  - uprightness -> rectitud
  - lo derecho
  - lo llano
  lexicon: HALOT
  rationale: La raíz comunica lo derecho, llano o moralmente nivelado. «Equidad» transmite bien la idea de trato justo y recto; la nota conserva la alternativa lexical «uprightness/rectitud» que el inglés POB preservó.
- source_word: כָּל מַעְגַּל טוֹב
  english_pob_choice: every good path
  chosen_spanish: todo camino bueno
  alternatives_spanish:
  - cada camino bueno
  - todo sendero bueno
  - toda senda buena
  lexicon: HALOT
  rationale: Se mantiene la construcción distributiva con un sustantivo singular («camino») para reflejar מַעְגַּל y el adjetivo «bueno» para טוֹב. «Todo camino bueno» suena natural y conserva la amplitud proverbial.
theological_decisions:
- issue: Relación entre la triada de cualidades y la frase final
  english_pob_reading: The phrase is an expansion of what is understood, not a separate new idea.
  chosen_spanish_reading: 'La frase final se lee como ampliación de lo que se entenderá: «equidad, todo camino bueno».'
  alternative_spanish_readings:
  - 'Como un cuarto objeto coordinado: «equidad y todo camino bueno»'
  - 'Como explicación resumida: «la totalidad de los caminos buenos»'
  rationale: El hebreo acumula términos sin ruptura fuerte; en español una coma permite mantener la serie y a la vez insinuar que la última expresión resume o amplía la anterior, sin imponer un quiebre mayor que el del original.
  doctrine_reference: Sabiduría ética en Proverbios; coherencia con el paralelismo hebreo y la formación moral del justo.
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a la palabra correspondiente. La redacción sigue de cerca el hebreo y el audit trail inglés, evitando una traducción mecánica y preservando la tensión léxica entre צֶדֶק, מִשְׁפָּט y מֵישָׁרִים.
  spanish_consistency_notes:
  - Se prefirieron sustantivos éticos diferenciados para reflejar el paralelismo hebreo.
  - «Entonces» mantiene la conexión consecutiva del versículo con el contexto previo.
  - «Todo camino bueno» conserva el valor distributivo de כָּל y la imagen proverbial de מַעְגַּל.
  - La nota [a] está anclada en el texto para evitar notas sueltas.
