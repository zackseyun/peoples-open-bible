revisions:
- from: 'Y entrando, dijo a su padre: «Mira, he encontrado a alguien que irá conmigo». Y él dijo: «Llámalo junto a mí, para que yo pueda saber de qué tribu es[a], y si es digno de confianza[b] para ir contigo[c]»'
  to: 'Y entró y dijo a su padre: «Mira, he encontrado a alguien que irá conmigo». Y él dijo: «Llámalo para que venga ante mí, para que yo sepa de qué tribu es[a] y si es digno de confianza[b] para ir contigo[c]»'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español: el participio inicial se convirtió en narración finita («Y entró y dijo»), «Llámalo junto a mí» se reemplazó por la formulación idiomática «Llámalo para que venga ante mí», y «para que yo pueda saber» se simplificó a «para que yo sepa». También se ajustó la primera nota para apoyar la decisión POB de mantener «tribu» en vez de abrir hacia «linaje».'
