translation:
  language: es
  text: Y a Sedequías, rey de Judá, y a sus funcionarios[a] los entregaré en manos de sus enemigos, en manos de los que buscan su vida, y en manos del ejército del rey de Babilonia, que se ha retirado de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La alternativa más literal sería 'sus príncipes' o 'sus jefes'; se prefirió 'sus funcionarios' por ser más amplia y contextualmente adecuada en este pasaje real-administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: uso bíblico estándar del nombre propio
  rationale: El nombre propio se vierte con la forma española bíblica más reconocible y estable, manteniendo la referencia histórica sin transliteración excesiva.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus funcionarios
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  - sus líderes
  lexicon: HALOT
  rationale: En este contexto real y administrativo, שָׂר puede abarcar altos cargos o autoridades. 'Funcionarios' conserva amplitud y evita imponer un rango militar o monárquico más específico de lo que el hebreo exige.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: entregaré
  alternatives_spanish:
  - daré
  - pondré en manos
  lexicon: HALOT
  rationale: Con בְּיַד, נתן expresa entregar a alguien al poder de otro. 'Entregaré' reproduce bien la fuerza idiomática en español sin sonar forzado.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - a merced de
  lexicon: HALOT
  rationale: La imagen idiomática se conserva con una expresión natural en español. 'En manos de' mantiene la repetición retórica del hebreo y su idea de dominio/control.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  lexicon: HALOT
  rationale: Equivalente directo y claro del plural con sufijo pronominal.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: those who seek their life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que buscan matarlos
  - los que buscan sus vidas
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de 'buscar el alma/vida' sin explicar demasiado. 'Su vida' en singular refleja el uso idiomático y mantiene el tono amenazante.
- source_word: חֵיל מֶלֶךְ בָּבֶל
  english_pob_choice: the army of the king of Babylon
  chosen_spanish: el ejército del rey de Babilonia
  alternatives_spanish:
  - las fuerzas del rey de Babilonia
  lexicon: HALOT
  rationale: חֵיל aquí denota fuerza militar; 'ejército' es la traducción más natural y precisa para el contexto de asedio.
- source_word: הָעֹלִים מֵעֲלֵיכֶם
  english_pob_choice: which has withdrawn from you
  chosen_spanish: que se ha retirado de ustedes
  alternatives_spanish:
  - que está retirándose de ustedes
  - que ha subido lejos de ustedes
  lexicon: HALOT
  rationale: La frase literal 'los que suben de sobre ustedes' es un modismo de retirada. Siguiendo la decisión auditada del inglés, 'se ha retirado' comunica con naturalidad el sentido del movimiento fuera del asedio sin perder la referencia idiomática.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una redacción más literal ('which has gone up away from you') a 'which has withdrawn from you' para expresar mejor el modismo hebreo de retirada. La traducción española sigue esa revisión y opta por una formulación natural equivalente ('se ha retirado de ustedes').
  spanish_consistency_notes:
  - Se mantuvo la repetición de 'en manos de' para reflejar el paralelismo del hebreo.
  - '''Sedequías'' sigue la forma española bíblica habitual; no se transliteró el nombre de manera estrictamente fonética.'
  - '''Sus enemigos'' y ''los que buscan su vida'' preservan el doble aumento de amenaza del original.'
  - El sujeto colectivo 'ejército' se trató con verbo singular ('se ha retirado') conforme al uso natural del español.
