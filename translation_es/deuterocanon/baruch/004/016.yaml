translation:
  language: es
  text: Y se llevaron a los amados de la viuda, y de entre sus hijas la dejaron desolada y sola.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «la dejaron desolada, como la única que quedó de entre sus hijas». El griego τὴν μόνην puede entenderse más literalmente como «la única», aunque aquí el sentido es que quedó sola.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  english_pob_choice: carried away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - los llevaron
  - se los llevaron
  lexicon: BDAG
  rationale: El verbo expresa llevarse o apartar personas, con matiz de remoción forzada. 'Se llevaron' comunica bien la acción sin especificar de más el modo, y funciona naturalmente en español.
- source_word: τοὺς ἀγαπητοὺς
  english_pob_choice: the beloved ones
  chosen_spanish: los amados
  alternatives_spanish:
  - los queridos
  - los amados seres
  lexicon: LSJ
  rationale: El sustantivo/adjetivo substantivado destaca a quienes son objeto de amor. 'Los amados' conserva la fuerza afectiva y el plural del griego.
- source_word: τῆς χήρας
  english_pob_choice: the widow’s
  chosen_spanish: de la viuda
  alternatives_spanish:
  - de la viuda
  lexicon: BDAG
  rationale: El genitivo posesivo se vierte de forma natural en español. Se mantiene la imagen de la viuda como figura personificada, sin explicarla en el texto principal.
- source_word: ἀπὸ τῶν θυγατέρων
  english_pob_choice: from among her daughters
  chosen_spanish: de entre sus hijas
  alternatives_spanish:
  - de sus hijas
  - de entre las hijas
  lexicon: LSJ
  rationale: '''ἀπό'' con genitivo tiene sentido separativo/partitivo. ''De entre'' refleja mejor la idea de extracción de un grupo que un simple posesivo.'
- source_word: τὴν μόνην
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - la única
  - solitaria
  lexicon: BDAG
  rationale: Aunque literalmente puede significar 'la única', aquí funciona como predicativo del estado resultante. 'Sola' es más idiomático en español y conserva la idea de abandono, sin perder la tensión literal que el inglés anotó.
- source_word: ἠρήμωσαν
  english_pob_choice: they left her desolate
  chosen_spanish: la dejaron desolada
  alternatives_spanish:
  - la devastaron
  - la arrasaron
  lexicon: LSJ
  rationale: El verbo significa hacer desolado o dejar en ruina. 'La dejaron desolada' reproduce el resultado del acto y mantiene el tono severo del original.
theological_decisions:
- issue: La personificación de la viuda y sus hijas
  english_pob_reading: Retain the familial and widow imagery directly in the translation without explicating Jerusalem/Zion in the main text.
  chosen_spanish_reading: Mantener directamente la imagen de la viuda y sus hijas, sin explicitar Jerusalén/Sión en el cuerpo principal.
  alternative_spanish_readings:
  - Interpretar la viuda como Jerusalén/Sión en el texto principal
  rationale: El griego presenta una personificación poética; la traducción debe conservar su textura figurativa. Explicar la identidad alegórica en el texto principal añadiría interpretación no obligada por la forma del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del inglés, que ajustó la puntuación para unir 'desolate and alone'; en español se integra naturalmente como 'desolada y sola'. También se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'viuda' en sentido figurado, coherente con la auditoría inglesa.
  - Se evitó 'Cristo' o terminología no pertinente; el versículo no contiene vocabulario cristológico.
  - '''Desolada'' conserva la fuerza de ἠρήμωσαν sin sobreinterpretar como castigo específico.'
  - El marcador [a] está anclado en el texto, conforme a la validación requerida.
