translation:
  language: es
  text: Entonces ustedes se levantarán de la emboscada[a] y tomarán la ciudad, porque Yahvé su Dios la entregará en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del lugar de la emboscada». El hebreo puede referirse a la emboscada como tal o a la posición de emboscada.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּקֻמוּ
  english_pob_choice: you shall rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se alzarán
  - se pondrán de pie
  - se levantarán y saldrán
  lexicon: HALOT
  rationale: El qal imperfecto 2mp de קום expresa aquí la acción de incorporarse para pasar a la ofensiva. «Se levantarán» conserva el movimiento concreto y es natural en español.
- source_word: מֵהָאֹרֵב
  english_pob_choice: from the ambush
  chosen_spanish: desde la emboscada
  alternatives_spanish:
  - desde el lugar de la emboscada
  - desde el escondite
  - desde la emboscada preparada
  lexicon: HALOT
  rationale: אֹרֵב denota una emboscada o acción de acechar. «Desde la emboscada» mantiene el sentido militar y evita una paráfrasis excesiva.
- source_word: וְהוֹרַשְׁתֶּם
  english_pob_choice: take the city
  chosen_spanish: tomarán la ciudad
  alternatives_spanish:
  - conquistarán la ciudad
  - capturarán la ciudad
  - tomarán posesión de la ciudad
  lexicon: HALOT
  rationale: El hebreo base de ירשׁ en hiphil puede implicar tomar posesión/desposeer, pero la revisión inglesa reciente decidió evitar expandirlo con «take possession of». Por eso en español se refleja con el más directo «tomarán la ciudad», sin introducir una glosa interpretativa adicional.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Correspondencia directa y transparente de עִיר con artículo definido.
- source_word: וּנְתָנָהּ
  english_pob_choice: will give it
  chosen_spanish: la entregará
  alternatives_spanish:
  - la dará
  - la pondrá en sus manos
  - la concederá
  lexicon: HALOT
  rationale: El perfecto con waw expresa resultado cierto y futuro en la secuencia imperativa; en español, «la entregará» reproduce mejor la idea de concesión divina que un simple «la dará» y mantiene la metáfora de entrega.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de sustitución por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: En español bíblico de registro amplio, «su Dios» refleja la forma de segunda persona plural sin forzar un calco. El contexto ya identifica la relación de pacto con el destinatario.
- source_word: בְּיֶדְכֶם
  english_pob_choice: into your hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - bajo su poder
  - en su poder
  lexicon: HALOT
  rationale: La expresión hebrea idiomática «en la mano de» comunica entrega y control. En español, «en su mano» conserva el modismo; el singular mantiene el patrón bíblico de la frase sin recargarla.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino como transliteración, en coherencia con la política del proyecto y con el sentido del texto hebreo. No se sustituye por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la expresión idiomática «en su mano»
  english_pob_reading: into your hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - bajo su poder
  - en su poder
  - en sus manos
  rationale: La imagen bíblica de entrega en la mano expresa dominio y concesión soberana. Se preserva el modismo para no perder el eco legal-militar del hebreo.
  doctrine_reference: Uso idiomático bíblico de יָד como símbolo de poder y control
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la primera redacción de «take possession of the city» a «take the city» para evitar expansión innecesaria. La propuesta española sigue esa revisión y evita glosar el verbo con «tomar posesión», aunque mantiene la fuerza de la secuencia militar y la certeza del don divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se mantiene el tono bíblico sobrio sin arcaísmos innecesarios.
  - «su Dios» refleja el plural de segunda persona sin recurrir a «vuestro», más marcado regionalmente.
  - La metáfora de la mano se conserva para mantener el paralelismo con el hebreo.
