translation:
  language: es
  text: Y Moisés tenía ochenta años[a], y Aarón tenía ochenta y tres años, cuando hablaron a Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y Moisés era hijo de ochenta años, y Aarón hijo de tres y ochenta años, cuando hablaron a Faraón».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ / waw conjuntiva inicial
  english_pob_choice: Now
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - entonces
  lexicon: HALOT
  rationale: El waw inicial funciona como conector narrativo. En español, «y» mantiene la continuidad sin añadir matiz temporal no expresado explícitamente.
- source_word: בֶּן ... שָׁנָה
  english_pob_choice: was ... years old
  chosen_spanish: tenía ... años
  alternatives_spanish:
  - era de ... años
  - era un hijo de ... años
  lexicon: HALOT
  rationale: El hebreo usa el giro literal «hijo de X años» para la edad. En español, la forma idiomática y natural para expresar edad es «tenía ... años», conservando el sentido sin calco duro.
- source_word: שְׁמֹנִים שָׁנָה
  english_pob_choice: eighty years old
  chosen_spanish: ochenta años
  alternatives_spanish:
  - ochenta años de edad
  lexicon: HALOT
  rationale: 'La expresión cardinal de edad se traduce de forma directa y natural en español: «ochenta años».'
- source_word: שָׁלֹשׁ וּשְׁמֹנִים שָׁנָה
  english_pob_choice: eighty-three years old
  chosen_spanish: ochenta y tres años
  alternatives_spanish:
  - tres y ochenta años
  lexicon: HALOT
  rationale: Aunque el hebreo ordena los numerales como «tres y ochenta», el español normal usa «ochenta y tres». Se conserva el valor numérico exacto, no la estructura idiomática hebrea.
- source_word: בְּדַבְּרָם
  english_pob_choice: when they spoke
  chosen_spanish: cuando hablaron
  alternatives_spanish:
  - cuando hablaban
  - al hablar
  - mientras hablaban
  lexicon: HALOT
  rationale: La preposición + infinitivo con sufijo tiene aquí valor temporal. «Cuando hablaron» transmite de manera clara la circunstancia temporal del evento en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - contra
  lexicon: HALOT
  rationale: En contexto de discurso dirigido a una persona, el equivalente natural en español es la preposición «a».
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: El título se vierte con la forma usual en español bíblico, «Faraón», sin artículo salvo necesidad sintáctica.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con la lectura auditada en inglés. Se mantuvo la equivalencia óptima: se evita calcar el hebraísmo de edad en el cuerpo principal, pero se preserva en nota como alternativa formal documentada.'
  spanish_consistency_notes:
  - Se emplea «Faraón» como título bíblico estándar en español.
  - Se conserva «hablaron a Faraón» para reflejar la dirección verbal del hebreo, sin sobreespecificar con preposiciones adicionales.
  - La nota alternativa registra el hebraísmo de edad que el texto inglés POB también documenta.
