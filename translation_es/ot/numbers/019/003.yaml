translation:
  language: es
  text: Y daréis[a] a Eleazar el sacerdote, y él la sacará fuera del campamento[b], y será degollada delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y daréis a Eleazar el sacerdote». El hebreo usa una forma verbal directiva; se traduce con futuro exhortativo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «fuera del campamento». La redacción española mantiene el mismo sentido con una formulación natural.'
    reason: spanish_style_note
lexical_decisions:
- source_word: וּנְתַתֶּם
  english_pob_choice: You shall give
  chosen_spanish: Y daréis
  alternatives_spanish:
  - Y darán
  - Y habréis de dar
  lexicon: HALOT
  rationale: El hebreo usa un perfecto con waw en contexto legal/instruccional, con fuerza de mandato futuro. «Daréis» conserva el tono directivo en español sin añadir perífrasis innecesarias.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - a ella
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a la novilla roja. En español, concordar con «la» preserva el género del antecedente, algo que el inglés no refleja con «it».
- source_word: אֶל אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: to Eleazar the priest
  chosen_spanish: a Eleazar el sacerdote
  alternatives_spanish:
  - a Eleazar, el sacerdote
  - para Eleazar el sacerdote
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y el título traducido. «El sacerdote» reproduce el sustantivo definido sin sustituirlo por terminología eclesiástica tradicional.
- source_word: וְהוֹצִיא
  english_pob_choice: and he shall bring it out
  chosen_spanish: y él la sacará fuera
  alternatives_spanish:
  - y la sacará
  - y la llevará fuera
  lexicon: HALOT
  rationale: 'El hifil de יצא tiene valor causativo: hacer salir / sacar. «La sacará fuera» conserva ese sentido y mantiene naturalidad en español.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - al exterior del campamento
  - a fuera del campamento
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «a fuera de fuera del campamento», pero en español la forma idiomática fiel es «fuera del campamento».
- source_word: וְשָׁחַט
  english_pob_choice: it shall be slaughtered
  chosen_spanish: será degollada
  alternatives_spanish:
  - será sacrificada
  - será inmolada
  lexicon: HALOT
  rationale: El verbo שָׁחַט significa matar por degüello. «Degollada» preserva la fuerza léxica concreta mejor que un verbo más general como «sacrificada» o «inmolada».
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La preposición expresa ubicación frontal o en presencia de él. «Delante de él» es natural y mantiene la relación espacial/presencial sin sobreinterpretarla.
theological_decisions:
- issue: Sujeto implícito del degüello
  english_pob_reading: The text is rendered so that the slaughter occurs in Eleazar's presence without explicitly stating that Eleazar himself performs it.
  chosen_spanish_reading: La pasiva «será degollada delante de él» deja sin especificar quién ejecuta la acción, manteniendo que el acto ocurre ante Eleazar sin afirmar que él mismo lo hace.
  alternative_spanish_readings:
  - y él la degollará delante de él
  - y será degollada por él
  rationale: El hebreo permite más de una lectura del sujeto implícito. La forma pasiva española conserva esa tensión y evita resolver lo que el texto no explicita.
  doctrine_reference: Preservar la ambigüedad textual en lugar de imponer una aclaración interpretativa.
translation_notes:
  revision_awareness: La decisión española sigue el pasaje hebreo y coincide con la revisión más reciente del audit trail inglés, que prefirió una formulación formal y dejó sin resolver explícitamente el sujeto del degüello. Se preserva esa ambigüedad en una pasiva española natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «el sacerdote» como traducción de הַכֹּהֵן, sin sustituirlo por un término litúrgico distinto.
  - «Degollada» se eligió por la concreción del verbo hebreo שָׁחַט.
  - La referencia femenina de la novilla se preserva con «la» para evitar neutralización indebida.
