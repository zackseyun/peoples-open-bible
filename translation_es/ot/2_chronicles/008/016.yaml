translation:
  language: es
  text: Así, toda la obra de Salomón fue preparada[a] desde el día en que se cimentó[b] la casa de Yahvé hasta que quedó terminada. Y así, la casa de Yahvé quedó concluida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue establecida», «fue puesta en orden» o «fue dispuesta». El verbo hebreo puede abarcar la idea de quedar firme, preparada o arreglada.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «desde el día en que se cimentó la casa de Yahvé hasta su terminación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכֹּן
  english_pob_choice: was prepared
  chosen_spanish: fue preparada
  alternatives_spanish:
  - fue establecida
  - fue puesta en orden
  - fue dispuesta
  lexicon: HALOT
  rationale: El hebreo de כון en esta forma puede expresar quedar firme, ser dispuesto o quedar preparado. Siguiendo el ajuste revisado del POB inglés, 'fue preparada' mantiene el resultado de la obra ya ordenada y lista, sin perder la posibilidad de firmeza/establecimiento.
- source_word: כָּל מְלֶאכֶת שְׁלֹמֹה
  english_pob_choice: all the work of Solomon
  chosen_spanish: toda la obra de Salomón
  alternatives_spanish:
  - todo el trabajo de Salomón
  - toda la labor de Salomón
  lexicon: HALOT
  rationale: מְלָאכָה abarca obra, trabajo o labor. 'Obra' es natural en español y mantiene el sentido global del proyecto real de construcción.
- source_word: מוּסַד
  english_pob_choice: the house of the LORD was founded
  chosen_spanish: se cimentó
  alternatives_spanish:
  - se fundó
  - se echó el cimiento
  - se puso el fundamento
  lexicon: HALOT
  rationale: El sustantivo/forma verbal relacionada con יסד apunta al acto fundacional o a la colocación del fundamento. 'Se cimentó' preserva la imagen constructiva y suena idiomático en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'casa' para seguir de cerca el hebreo בַּיִת y el término doctrinal 'Yahvé' para el nombre divino. 'Templo' sería más interpretativo.
- source_word: וְעַד כְּלֹתוֹ
  english_pob_choice: until it was finished
  chosen_spanish: hasta que quedó terminada
  alternatives_spanish:
  - hasta su terminación
  - hasta que se acabó
  lexicon: HALOT
  rationale: כְּלֹתוֹ expresa la culminación de aquello que se venía construyendo; por el antecedente inmediato, el referente natural en español es la casa. 'Quedó terminada' evita una construcción pesada y conserva el resultado final.
- source_word: שָׁלֵם
  english_pob_choice: was completed
  chosen_spanish: quedó completa
  alternatives_spanish:
  - fue completada
  - quedó terminada
  lexicon: HALOT
  rationale: 'שָׁלֵם aquí funciona como predicado de estado: íntegro/completo. ''Quedó completa'' preserva la idea de totalidad lograda y evita repetir ''terminada'' en la frase siguiente.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para יְהוָה, usando 'Yahvé' en el texto principal para preservar el nombre propio divino en vez de una sustitución titulárica.
theological_decisions:
- issue: Nombre divino יְהוָה en una frase de cierre sobre el templo/casa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La tradición del POB distingue el nombre del pacto del título genérico. Mantener 'Yahvé' hace visible el Tetragrámaton en el texto español, alineado con la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador español sigue la revisión más reciente del POB inglés, que cambió ''established'' por ''prepared'' y añadió el matiz conclusivo de ''So''. Por eso el español usa ''Así'' al inicio y ''fue preparada'' en lugar de una forma más rígida de ''establecida''. También conserva el cierre duplicado del hebreo con una segunda cláusula resumidora: ''Así, la casa de Yahvé quedó completa''.'
  spanish_consistency_notes:
  - Se mantiene la traducción de יהוה como 'Yahvé' en todo el versículo.
  - Se conserva 'casa' en lugar de 'templo' para reflejar el hebreo בֵּית.
  - '''Obra'' traduce מְלָאכָה con un registro natural y amplio.'
  - Las notas a y b distinguen la alternativa léxica de la nota literal sin mezclar ambas.
  - La frase final reproduce el efecto de resumen del hebreo y del inglés POB revisado.
