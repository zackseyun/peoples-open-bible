review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: mantiene el matiz volitivo/jusivo en «Que se alegren… digan…», conserva el paralelismo de gozo, traduce בך como «en ti», preserva «Yahvé» para יְהוָה y vierte תְּשׁוּעָה como «salvación» con alternativa válida. Sin embargo, la distribución de las notas no sigue bien el rastro de auditoría inglés: la nota [a] debe acompañar «salvación», no «en ti», y falta una nota para la aclamación «¡Sea engrandecido Yahvé!» que en el POB inglés conserva la alternativa literal/explicativa.'
  spanish_quality_summary: El español es claro, natural y digno. «Que se alegren y se regocijen en ti» suena bien y evita calcos torpes. «¡Sea engrandecido Yahvé!» es fiel y litúrgico, aunque algo menos idiomático que «¡Sea magnificado Yahvé!» o «¡Yahvé sea engrandecido!», pero sigue siendo aceptable. La principal reparación necesaria es de aparato de notas, no de legibilidad.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», תְּשׁוּעָה → «salvación» con alternativa «liberación». No hay conflictos con la glosa doctrinal principal. La nota inglesa sobre «May Yahweh be magnified!» debe reflejarse en español, idealmente explicando que el hebreo expresa una aclamación desiderativa y evitando «SEÑOR».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «en ti», pero en el rastro inglés la nota de alternativa léxica corresponde a «salvation/deliverance».
    rationale: El POB inglés nota la ambigüedad de תְּשׁוּעָה, no de בך. Aunque una nota sobre «en ti» no es errónea en sí, desplaza una alternativa preservada por la auditoría y puede romper la correspondencia editorial esperada.
  - severity: medium
    issue: Falta una nota para «¡Sea engrandecido Yahvé!».
    rationale: El POB inglés incluye una nota explicando el hebreo «May the LORD be magnified» como aclamación que desea que la grandeza de Yahvé sea reconocida públicamente. Esa decisión significativa debería conservarse también en español.
  - severity: low
    issue: La nota actual sobre «en ti» añade una explicación no necesaria.
    rationale: No crea error doctrinal ni de traducción, pero introduce un aparato distinto del audit trail sin una necesidad fuerte de claridad en español.
  revised_spanish_text: 'Que se alegren y se regocijen en ti todos los que te buscan; los que aman tu salvación[a] digan siempre: «¡Sea engrandecido Yahvé![b]»'
