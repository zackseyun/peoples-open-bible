review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego en el orden básico y en las distinciones clave: «conoce todas las cosas y entiende», «me guiará … en mis acciones», y «me guardará». Mantiene correctamente la personificación femenina de la Sabiduría. Sin embargo, la nota al pie está anclada en «conoce», cuando la alternativa «comprehende» corresponde a συνίει («entiende»), no a οἶδε. Además, el inglés POB documenta una nota sobre la ambigüedad de ἐν τῇ δόξῃ αὐτῆς, y el español no la preserva en el lugar relevante.'
  spanish_quality_summary: El texto es claro, natural y digno en español. «Porque ella conoce todas las cosas y entiende» suena bien, aunque «sabe» también sería posible; no exige cambio. «Prudentemente» y «en mis acciones» son buenas elecciones. El punto principal de calidad editorial es corregir la nota al pie para que no cree una falsa alternativa lexical en el verbo equivocado y para reflejar la ambigüedad real de «por/en/mediante su gloria».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La personificación femenina se conserva con «ella». Las decisiones léxicas principales son coherentes con el rastro POB. La excepción necesaria es de aparato: la nota debe trasladarse de «conoce» a «gloria» para alinearse con la decisión léxica y teológica documentada sobre ἐν τῇ δόξῃ αὐτῆς.'
  issues:
  - severity: medium
    issue: La nota al pie actual está anclada en «conoce[a]» pero su contenido corresponde a «entiende/comprehende».
    rationale: El inglés POB no preserva una alternativa en «knows» sino en la frase final «by/in/through her glory». Además, «comprehende» como alternativa de συνίει no debe anotarse sobre οἶδε, porque eso confunde la distinción léxica que el verso precisamente conserva.
  - severity: medium
    issue: Falta la nota que preserve la ambigüedad de ἐν τῇ δόξῃ αὐτῆς.
    rationale: El expediente inglés considera significativa la tensión entre sentido instrumental y locativo. El español principal «por su gloria» es defendible, pero debe acompañarse de la nota equivalente para no borrar alternativas preservadas por POB.
  revised_spanish_text: Porque ella conoce todas las cosas y entiende, y me guiará prudentemente en mis acciones, y me guardará por su gloria[a].
  revised_footnotes:
  - marker: a
    text: 'O: «en su gloria» o «mediante su gloria». La frase griega puede expresar ubicación o medio.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel, claro y natural. Se elimina la nota incorrectamente colocada sobre «conoce» y se añade la nota requerida en «por su gloria» para reflejar la ambigüedad documentada de ἐν τῇ δόξῃ αὐτῆς.
