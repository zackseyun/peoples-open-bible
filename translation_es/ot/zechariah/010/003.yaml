translation:
  language: es
  text: Mi ira arde contra los pastores, y castigaré a los machos cabríos[a]; porque Yahvé de los Ejércitos[b] ha atendido a su rebaño, la casa de Judá, y los hará como su caballo majestuoso en la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los líderes»; el hebreo «machos cabríos» puede emplearse metafóricamente para designar a gobernantes o jefes prominentes.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «el SEÑOR de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los líderes
  - los pastores del rebaño
  lexicon: HALOT
  rationale: Conservo la imagen pastoral del hebreo y del inglés auditado. «Pastores» es transparente en español y mantiene la acusación metafórica contra quienes debían cuidar al pueblo.
- source_word: חָרָה אַפִּי
  english_pob_choice: My anger burns
  chosen_spanish: Mi ira arde
  alternatives_spanish:
  - Mi ira se enciende
  - Mi enojo arde
  lexicon: HALOT
  rationale: El modismo hebreo expresa ira intensa. «Arde» comunica con naturalidad la fuerza de la imagen sin aplanarla a una mera declaración abstracta.
- source_word: הָעַתּוּדִים
  english_pob_choice: the male goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - los machos de cabra
  - los líderes
  lexicon: HALOT
  rationale: Sigo el sentido literal del término para preservar el paralelismo animal-pastoral del versículo. La posible lectura metafórica queda preservada en nota, como en el audit trail inglés.
- source_word: אֶפְקֹד
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con juicio
  - llamaré a cuentas
  lexicon: HALOT
  rationale: En este contexto adverso, פקד tiene valor de intervención punitiva. «Castigaré» transmite con claridad esa fuerza negativa en español.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los Ejércitos Celestiales
  lexicon: HALOT
  rationale: Sigo el estándar del proyecto para יהוה como «Yahvé». «De los Ejércitos» traduce צבאות de manera directa y conserva el peso militar del título.
- source_word: עֶדְרוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su hato
  - su manada
  lexicon: HALOT
  rationale: «Rebaño» es el equivalente natural en el campo semántico de pastor y ovejas, y funciona mejor que opciones más técnicas o regionales.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - la casa de Judá
  lexicon: HALOT
  rationale: Mantengo la construcción formal «casa de Judá», que reproduce con fidelidad la relación de pertenencia y descendencia del hebreo.
- source_word: וְשָׂם אוֹתָם
  english_pob_choice: and will make them
  chosen_spanish: y los hará
  alternatives_spanish:
  - y los pondrá
  - y los establecerá
  lexicon: HALOT
  rationale: En la secuencia profética, el valor futuro es el más natural en español. «Hará» conserva el vínculo con la comparación siguiente sin sobreespecificar el verbo.
- source_word: כְּסוּס הוֹדוֹ
  english_pob_choice: like his majestic horse
  chosen_spanish: como su caballo majestuoso
  alternatives_spanish:
  - como su caballo de majestad
  - como su caballo espléndido
  lexicon: HALOT
  rationale: «Majestuoso» comunica adecuadamente הוֹד como grandeza o esplendor. Sigo la revisión inglesa que eliminó «war» por no estar explícito en la frase nominal.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en guerra
  - para la batalla
  lexicon: HALOT
  rationale: «En la batalla» es la forma más directa e idiomática en español para el sustantivo de guerra en este contexto concreto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Sigo la terminología doctrinal del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre del pacto en lugar de ocultarlo tras una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Tensión entre imagen literal y sentido metafórico de הָעַתּוּדִים
  english_pob_reading: the male goats
  chosen_spanish_reading: los machos cabríos
  alternative_spanish_readings:
  - los líderes
  - los gobernantes
  rationale: Mantengo la imagen literal en el texto principal porque el versículo construye una metáfora pastoral completa. La posible referencia a dirigentes queda sugerida sin resolverla del todo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la imagen final a «majestic horse» en vez de «majestic war horse» para mayor precisión léxica. También preserva la decisión de mantener la metáfora animal en «machos cabríos» y la posibilidad metafórica en nota.
  spanish_consistency_notes:
  - He usado «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - He conservado «la casa de Judá» y no he reducido la frase a solo «Judá», para mantener la construcción hebrea formal.
  - He elegido «en la batalla» en lugar de «en guerra» por ser más natural en español y equivalente al contexto inmediato.
  - No he introducido lenguaje eclesiástico tradicional como «SEÑOR» o «pastores» en sentido institucional; «pastores» aquí conserva el sentido metafórico del hebreo.
