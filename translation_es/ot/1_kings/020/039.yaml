translation:
  language: es
  text: 'Mientras el rey pasaba[a], clamó al rey y dijo: «Tu siervo salió en medio de la batalla, y he aquí, un hombre se apartó y me trajo a otro hombre, y dijo: “Guarda a este hombre. Si llega a faltar[b], tu vida será por la suya[c], o pesarás un talento de plata”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iba pasando» / «estaba pasando por allí». El participio hebreo expresa acción en curso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si desaparece» / «si de algún modo no se encuentra». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la idea de que llegue a faltar o quedar sin ser hallado.'
    reason: lexical_alternative
  - marker: c
    text: Lit., «tu vida bajo/en lugar de su vida», una fórmula legal de sustitución.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵר
  english_pob_choice: was passing by
  chosen_spanish: pasaba
  alternatives_spanish:
  - iba pasando
  - estaba pasando por allí
  lexicon: HALOT
  rationale: El participio con וַיְהִי expresa acción en curso; en español, «pasaba» comunica bien la acción durativa sin rigidizar la escena.
- source_word: צָעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: HALOT
  rationale: El verbo denota un clamor fuerte y urgente. «Clamó» conserva la intensidad y mantiene un registro digno.
- source_word: עַבְדְּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: En el contexto legal y de auto-presentación ante el rey, el hebreo puede tener fuerza de subordinación personal. Se mantiene «esclavo» para no suavizar indebidamente el término; «siervo» sería más tradicional pero menos fuerte.
- source_word: בְּקֶרֶב הַמִּלְחָמָה
  english_pob_choice: into the midst of the battle
  chosen_spanish: en medio de la batalla
  alternatives_spanish:
  - en el centro de la batalla
  - en plena batalla
  lexicon: HALOT
  rationale: La imagen de estar dentro del conflicto se expresa naturalmente en español con «en medio de la batalla», sin perder el valor de inmersión del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y sucedió que
  lexicon: HALOT
  rationale: «Y he aquí» reproduce la función narrativa de presentación vívida y es suficientemente claro en español bíblico contemporáneo.
- source_word: אִישׁ סָר
  english_pob_choice: a man turned aside
  chosen_spanish: un hombre se apartó
  alternatives_spanish:
  - un hombre se desvió
  - un hombre se hizo a un lado
  lexicon: HALOT
  rationale: סוּר sugiere apartarse o desviarse. «Se apartó» resulta más natural en español y conserva la idea de abandonar la trayectoria principal.
- source_word: וַיָּבֵא אֵלַי אִישׁ
  english_pob_choice: and brought a man to me
  chosen_spanish: me trajo un hombre
  alternatives_spanish:
  - me llevó un hombre
  - me presentó un hombre
  lexicon: HALOT
  rationale: La secuencia verbal indica que alguien puso a otro bajo la atención del hablante. «Me trajo un hombre» es la forma más directa y fiel al hebreo.
- source_word: שְׁמֹר
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Vigila
  lexicon: HALOT
  rationale: El imperativo exige custodia activa. «Guarda» funciona bien en español y mantiene la brevedad del mandato.
- source_word: אִם הִפָּקֵד יִפָּקֵד
  english_pob_choice: If he is ever missing
  chosen_spanish: Si llega a ser perdido
  alternatives_spanish:
  - Si llega a faltar
  - Si resulta ausente
  - Si en alguna manera se pierde
  lexicon: HALOT
  rationale: El hebreo usa intensificación con infinitivo absoluto y verbo finito. Se conserva esa fuerza con una construcción que expresa eventualidad y resultado; «perdido» refleja el pasivo de manera más literal, aunque suena menos idiomático que «faltar».
- source_word: נַפְשְׁךָ תַּחַת נַפְשׁוֹ
  english_pob_choice: your life shall be for his life
  chosen_spanish: tu vida será por la vida de él
  alternatives_spanish:
  - tu vida estará en lugar de la suya
  - tu vida sustituirá a la suya
  - tu vida por la de él
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí significa «vida», y תַּחַת expresa sustitución o intercambio. La formulación conserva la relación legal sin explicitarla demasiado en el cuerpo del texto.
- source_word: כִּכַּר כֶּסֶף
  english_pob_choice: a talent of silver
  chosen_spanish: un talento de plata
  alternatives_spanish:
  - un talento de dinero
  - una plata de talento
  lexicon: HALOT
  rationale: «Talento» es el equivalente tradicional de medida de peso, y «plata» mantiene la materia preciosa implicada en el pago.
- source_word: תִּשְׁקוֹל
  english_pob_choice: you shall weigh out
  chosen_spanish: tendrás que pesar
  alternatives_spanish:
  - pesarás
  - deberás pesar
  - entregarás
  lexicon: HALOT
  rationale: El verbo alude al pago por peso. «Tendrás que pesar» conserva la concreción económica del hebreo mejor que «pagarás».
theological_decisions:
- issue: Fórmula legal de sustitución con נַפְשׁ תַּחַת נַפְשׁ
  english_pob_reading: Literally, 'your life under/in place of his life,' a legal formula of substitution.
  chosen_spanish_reading: tu vida será por la vida de él
  alternative_spanish_readings:
  - tu vida estará en lugar de la suya
  - tu vida sustituirá a la suya
  rationale: La frase hebrea refleja una fórmula jurídica de sustitución. En español, «será por» conserva la equivalencia sin perder la seriedad legal del intercambio.
  doctrine_reference: Éxodo 21:23-25; Números 35:31-33
- issue: Intensificación de la cláusula condicional con הִפָּקֵד יִפָּקֵד
  english_pob_reading: If he is ever missing / If he is in any way unaccounted for.
  chosen_spanish_reading: Si llega a ser perdido
  alternative_spanish_readings:
  - Si en alguna manera se pierde
  - Si llega a faltar
  - Si resulta ausente
  rationale: Se preserva la idea de contingencia intensificada sin neutralizarla. El español no replica la estructura morfológica, pero sí su fuerza de advertencia formal.
  doctrine_reference: Uso intensivo del infinitivo absoluto hebreo
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y toma como guía la solución inglesa ya auditada, sin depender mecánicamente de ella. Se mantuvieron las imágenes legales y narrativas: el rey que pasa, el clamor del hablante, el hombre que se aparta, la custodia del cautivo y la penalidad por sustitución.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se conserva la distinción entre «vida» y cualquier sentido más amplio de «alma», porque נֶפֶשׁ aquí es vida en fórmula legal.
  - Se emplea «talento de plata» como medida de peso monetaria, no como capacidad o habilidad.
  - Se mantuvo un registro bíblico contemporáneo, evitando arcaísmos innecesarios sin perder solemnidad.
