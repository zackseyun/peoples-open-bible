revisions:
- from: 'Y dijo Hazael[a]: «¿Por qué llora mi señor?» Y él dijo: «Porque sé el mal que harás a los hijos de Israel: prenderás fuego a sus fortalezas[b], matarás a sus jóvenes con la espada, estrellarás a sus pequeños contra el suelo y abrirás el vientre de sus embarazadas».'
  to: 'Hazael dijo: «¿Por qué llora mi señor?» Y él dijo: «Porque sé el mal que harás a los hijos de Israel[a]: prenderás fuego a sus fortalezas[b], matarás a sus jóvenes con la espada, harás pedazos a sus pequeños, y abrirás el vientre de sus mujeres embarazadas».'
  rationale: La revisión corrige la ubicación del marcador [a] para que coincida con la frase explicada, elimina la adición no atestiguada «contra el suelo», mejora levemente la naturalidad narrativa en español, y aclara «sus mujeres embarazadas» sin suavizar la violencia del texto ni apartarse de las decisiones léxicas documentadas.
