translation:
  language: es
  text: Tú cambiaste mi duelo en danza; desataste mi cilicio y me ceñiste[a] de alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me vestiste de alegría». El verbo hebreo es literalmente «me ceñiste» o «me ataste», preservando la imagen de la alegría como algo que se lleva puesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַכְתָּ
  english_pob_choice: you turned
  chosen_spanish: convertiste
  alternatives_spanish:
  - volteaste
  - cambiaste
  - transformaste
  lexicon: HALOT
  rationale: הָפַךְ expresa una inversión o cambio de estado. «Convertiste» comunica bien la reversión concreta y suena natural en español, sin perder la imagen de cambio radical.
- source_word: מִסְפְּדִי
  english_pob_choice: my mourning
  chosen_spanish: mi lamento
  alternatives_spanish:
  - mi duelo
  - mi duelo de dolor
  - mi lamentación
  lexicon: HALOT
  rationale: מִסְפֵּד abarca duelo, llanto o lamentación por pérdida. «Lamento» conserva el tono poético y amplio en español; «duelo» también sería posible, pero «lamento» mantiene mejor la resonancia de expresión de dolor.
- source_word: לְמָחוֹל
  english_pob_choice: into dancing
  chosen_spanish: en danza
  alternatives_spanish:
  - en baile
  - en danzar
  - en regocijo
  lexicon: HALOT
  rationale: מָחוֹל designa danza celebratoria. En español, «en danza» mantiene el paralelismo verbal con la idea de transformación y es más natural que «en baile» en registro bíblico-poético.
- source_word: פִּתַּחְתָּ
  english_pob_choice: you untied
  chosen_spanish: desataste
  alternatives_spanish:
  - deshiciste
  - aflojaste
  - abristes
  lexicon: HALOT
  rationale: Con el objeto «cilicio», el verbo comunica la acción de soltar o desatar la prenda. «Desataste» preserva la concreción del gesto mejor que una paráfrasis abstracta.
- source_word: שַׂקִּי
  english_pob_choice: my sackcloth
  chosen_spanish: mi cilicio
  alternatives_spanish:
  - mi saco de luto
  - mi sayal
  - mi ropa de duelo
  lexicon: HALOT
  rationale: שַׂק refiere a la prenda áspera asociada al duelo y la penitencia. «Cilicio» es el término tradicional más exacto y comprensible en ámbito bíblico; «sayal» sería menos común y más regional.
- source_word: וַתְּאַזְּרֵנִי
  english_pob_choice: and clothed me
  chosen_spanish: me ceñiste
  alternatives_spanish:
  - me vestiste
  - me rodeaste
  - me ceñiste con
  lexicon: HALOT
  rationale: אזר significa ceñir o ajustar alrededor. La imagen del verso sugiere que la alegría fue puesta como una prenda o cinturón; «me ceñiste» conserva mejor la metáfora que «me vestiste», y refleja la posible lectura alternativa de «girded me» documentada en el audit trail.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: de alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  - de gozo
  lexicon: HALOT
  rationale: שִׂמְחָה es gozo/alegría. «De alegría» encaja con «ceñir de» en español y mantiene la imagen de la alegría como aquello con lo que se reviste al hablante.
theological_decisions:
- issue: La imagen de la alegría como vestido o ceñidor
  english_pob_reading: and clothed me with joy; footnote notes the verb is literally 'bound/girded,' preserving the image of joy as something worn like a garment.
  chosen_spanish_reading: me ceñiste de alegría
  alternative_spanish_readings:
  - me vestiste de alegría
  - me rodeaste de alegría
  - me ceñiste con alegría
  rationale: 'El hebreo conserva una metáfora corporal: la alegría no solo acompaña, sino que se impone como prenda o ceñidor. «Me ceñiste de alegría» preserva esa tensión entre vestir y ceñir mejor que una simple paráfrasis, y evita borrar la imagen verbal.'
  doctrine_reference: Metáfora poética de restauración y gozo; no doctrinal formal.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de forma directa y conserva la secuencia de reversión: lamento → danza, cilicio → desatado, y alegría → ceñimiento. Se tuvo en cuenta la revisión inglesa que eliminó el redundante «for me» después de «dancing»; en español, el pronombre posesivo de «mi lamento» ya cumple esa función y no requiere repetición.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el tetragrámaton.
  - Se mantuvo la metáfora corporal de אזר con «ceñiste», evitando diluirla en un simple «vestiste».
  - «Cilicio» fue preferido por su precisión bíblica y por corresponder al saco de duelo del hebreo.
  - La preposición «de» en «ceñiste de alegría» funciona de modo idiomático en español y conserva la relación instrumental/metafórica del original.
