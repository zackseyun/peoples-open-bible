revisions:
- from: 'Que los cielos[a] se alegren, y que la tierra se goce; y que digan entre las naciones: «¡Yahvé reina!»'
  to: 'Que los cielos se alegren, y que la tierra se alegre; y que digan entre las naciones: «¡Yahvé[a] reina!»'
  rationale: Se reemplaza «se goce» por «se alegre» para lograr un español más natural y fiel al sentido de גיל sin afectar el paralelismo volitivo. También se mueve la nota al lugar pertinente, junto a «Yahvé», y se simplifica su redacción para que describa con precisión el dato fuente en vez de una alternativa inexistente.
