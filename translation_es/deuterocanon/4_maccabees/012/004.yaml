    rationale: Aunque el griego literalmente dice ‘ser persuadido’, el English POB documenta que aquí la fuerza es de obediencia práctica. ‘Si no te dejas persuadir’ introduce una formulación reflexiva española menos natural y debilita la amenaza de cumplimiento exigido por el contexto.
