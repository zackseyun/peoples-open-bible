    text: Or 'having enjoyed full salvation.' The Greek σωτηρία can denote rescue/deliverance in context, while also carrying broader salvation language.
    reason: lexical_alternative
  - marker: b
    text: Or 'the holy deliverer of Israel.' The Greek σωτήρ may be rendered either 'Savior' or 'deliverer' depending on whether the emphasis is on title or immediate rescue.
    reason: lexical_alternative
