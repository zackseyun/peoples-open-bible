translation:
  language: es
  text: Y cuando terminen su testimonio[a], la bestia que sube del abismo hará guerra contra ellos, los vencerá y los matará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hará guerra con ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τελέσωσιν
  english_pob_choice: finish
  chosen_spanish: terminen
  alternatives_spanish:
  - completen
  - lleven a término
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo tras ὅταν expresa una acción futura eventual: ''cuando terminen''. ''Terminen'' suena natural en español y conserva la idea de llevar a cabo por completo su testimonio sin añadir matices ajenos.'
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio dado
  - testificación
  lexicon: BDAG
  rationale: '''Testimonio'' reproduce bien el valor judicial y declarativo de μαρτυρία y encaja de forma natural con ''terminen su testimonio''. ''Testificación'' sería más técnico y menos idiomático.'
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - fiera
  - animal feroz
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον funciona como término apocalíptico fijo. 'Bestia' es el equivalente directo y ya mantiene la fuerza simbólica sin suavizarla.
- source_word: ἀναβαῖνον
  english_pob_choice: comes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - se levanta
  lexicon: BDAG
  rationale: 'El participio presente se expresa de manera relativa: ''la bestia que sube''. ''Sube'' es claro en español y conserva el movimiento ascendente desde el abismo; ''asciende'' sería más formal y menos natural.'
- source_word: ἀβύσσου
  english_pob_choice: abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - abismo sin fondo
  - profundidad
  lexicon: BDAG
  rationale: '''Abismo'' es el equivalente español más directo de ἄβυσσος y evita la paráfrasis interpretativa de ''foso sin fondo''. Mantiene la terminología apocalíptica.'
- source_word: ποιήσει μετ’ αὐτῶν πόλεμον
  english_pob_choice: will make war with them
  chosen_spanish: hará guerra contra ellos
  alternatives_spanish:
  - hará guerra con ellos
  - combatirá contra ellos
  - entablará guerra contra ellos
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'hará guerra con ellos', el sentido idiomático en español se expresa mejor como 'hará guerra contra ellos'. Esto preserva la hostilidad implícita sin sonar forzado en español.
- source_word: νικήσει
  english_pob_choice: conquer
  chosen_spanish: los vencerá
  alternatives_spanish:
  - los conquistará
  - los derrotará
  - prevalecerá sobre ellos
  lexicon: BDAG
  rationale: '''Vencerá'' comunica con naturalidad la idea de derrotar/sojuzgar que νικάω tiene aquí. ''Conquistará'' sería más solemne, pero en español puede sonar más amplio o político; ''vencerá'' es claro y fiel.'
- source_word: ἀποκτενεῖ
  english_pob_choice: kill
  chosen_spanish: los matará
  alternatives_spanish:
  - los asesinará
  - los dará muerte
  lexicon: BDAG
  rationale: '''Matará'' es la equivalencia directa y más natural en español. ''Dar muerte'' sería más formal y ''asesinará'' añadiría una connotación jurídica que el verbo griego no exige.'
theological_decisions:
- issue: La relación hostil en ποιήσει μετ’ αὐτῶν πόλεμον
  english_pob_reading: will make war with them
  chosen_spanish_reading: hará guerra contra ellos
  alternative_spanish_readings:
  - hará guerra con ellos
  rationale: El griego usa μετά con genitivo, literalmente 'con ellos', pero la expresión fija en español requiere 'contra ellos' para transmitir la hostilidad sin ambigüedad. Se conserva así el sentido del texto sin ocultar la construcción subyacente.
  doctrine_reference: 'Translation philosophy: original-language primacy with idiomatic Spanish clarity'
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el pasaje tuvo alta coincidencia en la revisión; por eso la traducción española sigue de cerca la lectura estable del griego y conserva la misma alternativa de guerra como nota.
  spanish_consistency_notes:
  - Se mantiene 'bestia' para θηρίον, en coherencia con la terminología apocalíptica estable.
  - Se usa 'abismo' para ἄβυσσος, evitando la paráfrasis tradicional 'pozo sin fondo'.
  - Se prefirió 'vencerá' para νικήσει por naturalidad y claridad en español, sin perder el sentido de derrota contundente.
  - '''Hará guerra contra ellos'' ajusta la idiomaticidad española, aunque la nota preserva la alternativa más literal ''con ellos''.'
