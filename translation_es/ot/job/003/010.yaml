translation:
  language: es
  text: porque no cerró las puertas de mi matriz[a], ni ocultó el sufrimiento[b] de mi vista.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi vientre'. En este contexto, 'matriz' encaja mejor por la referencia al nacimiento de Job.
    reason: lexical_alternative
  - marker: b
