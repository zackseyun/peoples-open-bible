translation:
  language: es
  text: y trescientos escudos de oro batido[a]; trescientos siclos[b] de oro se aplicaban a cada escudo. Y el rey los puso en la Casa del Bosque del Líbano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro martillado» para «oro batido».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «trescientos oro» para cada escudo; «siclos» se suple por claridad, probablemente por el paralelo en 1 Reyes 10:17.'
    reason: lexical_alternative
  - marker: c
    text: La Casa del Bosque del Líbano era un edificio real con nombre propio; también puede entenderse «el palacio del Bosque del Líbano».
    reason: cultural_note
lexical_decisions:
- source_word: מָגִנִּים / shields
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - escudos de guerra
  - broqueles
  lexicon: HALOT
  rationale: מָגֵן designa un escudo; en español, «escudos» es natural y fiel. «Broqueles» sería más arcaico y no añade precisión aquí.
- source_word: זָהָב שָׁחוּט / beaten gold
  english_pob_choice: beaten gold
  chosen_spanish: oro batido
  alternatives_spanish:
  - oro martillado
  - oro golpeado
  lexicon: HALOT
  rationale: שָׁחוּט apunta a metal trabajado, probablemente batido o laminado. «Oro batido» conserva la imagen material con buena naturalidad en español.
- source_word: שְׁלֹשׁ מֵאוֹת זָהָב / three hundred shekels of gold
  english_pob_choice: three hundred shekels of gold
  chosen_spanish: trescientos siclos de oro
  alternatives_spanish:
  - trescientos de oro
  - trescientos piezas de oro
  lexicon: HALOT
  rationale: El hebreo omite la unidad, pero el paralelo en 1 Reyes 10:17 y el uso idiomático permiten suplirla. «Siclos» hace explícita la medida implícita sin apartarse del dato fuente.
- source_word: יַעֲלֶה עַל / went onto
  english_pob_choice: went onto
  chosen_spanish: subían sobre
  alternatives_spanish:
  - iban sobre
  - se aplicaban sobre
  lexicon: HALOT
  rationale: El valor concreto de עלה con עַל es de 'subir a/sobre'. En español, «subían sobre» conserva la imagen del metal que se aplicaba a cada escudo, sin volverlo demasiado interpretativo.
- source_word: הַמָּגֵן הָאֶחָת / each shield
  english_pob_choice: each shield
  chosen_spanish: cada escudo
  alternatives_spanish:
  - el escudo único
  - un escudo cada uno
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, el sentido distributivo es claro por el contexto. «Cada escudo» expresa ese valor de manera natural en español.
- source_word: וַיִּתְּנֵם / put them
  english_pob_choice: put them
  chosen_spanish: los puso
  alternatives_spanish:
  - los colocó
  - los depositó
  lexicon: HALOT
  rationale: נתן con complemento locativo suele significar 'poner/colocar'. «Los puso» es directo y fiel al movimiento de ubicar los escudos en el edificio.
- source_word: בֵּית יַעַר הַלְּבָנוֹן / the House of the Forest of Lebanon
  english_pob_choice: the House of the Forest of Lebanon
  chosen_spanish: la Casa del Bosque del Líbano
  alternatives_spanish:
  - el palacio del Bosque del Líbano
  - la Casa de la Selva del Líbano
  lexicon: HALOT
  rationale: Se preserva como nombre propio de un edificio real. «Bosque» es la equivalencia directa de יער; «Casa» mantiene la forma del nombre tradicional del lugar.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de 2 Crónicas 9:16 y el criterio de la POB en inglés: mantener la cifra/medida implícita como «siclos», conservar la imagen verbal de que el oro «subía sobre» cada escudo y tratar בית יער הלבנון como nombre propio de un edificio real. No se registraron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se usa «escudos» para מָגִנִּים y no un término eclesiástico o arcaizante.
  - «Oro batido» mantiene la tensión entre trabajado/laminado y evita simplificarlo a un adorno genérico.
  - «Casa del Bosque del Líbano» conserva la estructura nominal del original y la convención POB de no mascarar nombres propios.
  - La puntuación divide la cláusula principal en dos miembros, reflejando el hebreo y la versión inglesa auditada.
