  text: וְ/הָיָ֣ה שְׁאֵרִ֣ית יַעֲקֹ֗ב בְּ/קֶ֨רֶב֙ עַמִּ֣ים רַבִּ֔ים כְּ/טַל֙ מֵ/אֵ֣ת יְהוָ֔ה כִּ/רְבִיבִ֖ים עֲלֵי עֵ֑שֶׂב אֲשֶׁ֤ר לֹֽא יְקַוֶּה֙ לְ/אִ֔ישׁ וְ/לֹ֥א יְיַחֵ֖ל לִ/בְנֵ֥י אָדָֽם׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/005/006.yaml
  text: And the remnant of Jacob will be among many peoples like dew from Yahweh[a], like showers upon the grass[b], which do not wait for a man or delay for the sons of man.
  footnotes:
  - marker: a
    text: Or 'does not hope for a man, nor wait for the sons of man.' The Hebrew verbs can both carry the sense of waiting or hoping; the line emphasizes that the dew and rain come apart from human agency.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of man,' a Hebrew expression for human beings.
    reason: lexical_alternative
