  text: וַ/אֲבִי/כֶן֙ הֵ֣תֶל בִּ֔/י וְ/הֶחֱלִ֥ף אֶת מַשְׂכֻּרְתִּ֖/י עֲשֶׂ֣רֶת מֹנִ֑ים וְ/לֹֽא נְתָנ֣/וֹ אֱלֹהִ֔ים לְ/הָרַ֖ע עִמָּדִֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/007.yaml
  text: Yet your father has deceived me and changed my wages ten times[c][b][a], but God did not allow him to harm me.
  footnotes:
  - marker: a
    text: Or 'has deceived me' or 'has tricked me.' The Hebrew verb can denote deceptive or mocking treatment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten times,' an idiom for repeated changes, possibly not meant as an exact count.
    reason: cultural_note
  - marker: c
    text: Literally, 'God did not give him to harm me,' meaning God did not permit him to do me harm.
    reason: lexical_alternative
