revisions:
- from: No te engrías delante de un rey[a], ni te pongas en el lugar de los grandes.
  to: No te engrías delante de un rey, ni te pongas de pie en el lugar[a] de los grandes.
  rationale: Se conserva 'No te engrías' por su fidelidad y naturalidad para תִּתְהַדַּר. Se ajusta la segunda cláusula a 'no te pongas de pie' para reflejar mejor תַּעֲמֹד ('stand'). Se traslada la nota al lugar correcto y con el contenido correcto, preservando la alternativa documentada para בִּמְקוֹם גְּדֹלִים en vez de crear una nota no respaldada sobre 'delante de un rey'.
