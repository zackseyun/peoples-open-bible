lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros
  lexicon: LSJ
  rationale: Se conserva el pronombre explícito para mantener el énfasis en la primera persona plural y la responsabilidad de los hablantes.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Aquí introduce la explicación de la afirmación anterior; en español, «Porque» expresa de forma natural esa relación causal o explicativa.
- source_word: διὰ τὰς ἑαυτῶν ἁμαρτίας
  english_pob_choice: because of our own sins
  chosen_spanish: a causa de nuestros propios pecados
  alternatives_spanish:
  - por nuestros propios pecados
  - debido a nuestros propios pecados
  lexicon: LSJ
  rationale: «a causa de» transmite bien el valor causal de διά con acusativo. «propios» conserva el énfasis reflexivo de ἑαυτῶν, sin rebajarlo al más neutro «nuestros».
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - culpas
  lexicon: LSJ
  rationale: «Pecados» es la equivalencia más directa y bíblicamente clara para ἁμαρτίας, preservando el peso moral y teológico del término.
- source_word: πάσχομεν
  english_pob_choice: are suffering
  chosen_spanish: padecemos
  alternatives_spanish:
  - sufrimos
  - estamos padeciendo
  lexicon: LSJ
  rationale: «Padecemos» es natural y digno en español bíblico, y mantiene el sentido de sufrimiento presente sin necesitar un auxiliar progresivo.
theological_decisions:
- issue: Atribución del sufrimiento a los propios pecados
  english_pob_reading: The clause states that their suffering is due to their own sins.
  chosen_spanish_reading: El texto afirma que su padecimiento proviene de sus propios pecados.
  alternative_spanish_readings:
  - Nosotros sufrimos por nuestros pecados.
  - Sufrimos a causa de nuestros propios pecados.
  rationale: La formulación española conserva la relación causal y el énfasis reflexivo de «sus propios pecados», sin suavizar la carga penitencial del versículo ni convertirla en una idea más genérica.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la primacía del idioma original; no atenuar la atribución moral del sufrimiento.'
