translation:
  language: es
  text: 'Entonces Moisés se enojó muchísimo y dijo a Yahvé[a]: «No tomes en cuenta[b] su ofrenda. No he tomado de ellos ni un solo asno, ni he hecho daño a ninguno de ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Nombre divino: el hebreo usa el Tetragrámaton יְהוָה; POB lo vierte como «Yahvé».'
    reason: theological_note
  - marker: b
    text: 'O: «No consideres su ofrenda» o «No aceptes su ofrenda». El hebreo literalmente dice: «No te vuelvas hacia su ofrenda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְמֹשֶׁה מְאֹד
  english_pob_choice: Then Moses became very angry
  chosen_spanish: Entonces Moisés se enojó muchísimo
  alternatives_spanish:
  - Entonces Moisés estaba muy enojado
  - Entonces se encendió muchísimo la ira de Moisés
  lexicon: HALOT
  rationale: El hebreo expresa un giro idiomático de ira intensa; «se enojó muchísimo» comunica naturalmente la intensidad de מְאֹד sin perder el valor del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política POB para el Tetragrámaton es transliterarlo como nombre propio. En español, «Yahvé» preserva el nombre divino sin sustituirlo por un título.
- source_word: אַל תֵּפֶן אֶל מִנְחָתָם
  english_pob_choice: Do not regard their offering
  chosen_spanish: No mires su ofrenda
  alternatives_spanish:
  - No tomes en cuenta su ofrenda
  - No vuelvas tu rostro hacia su ofrenda
  - No consideres su ofrenda
  lexicon: HALOT
  rationale: פנה אל es literalmente «volver(se) hacia». En español, «no mires» conserva la imagen verbal y cubre la idea de prestar atención o conceder favor que el contexto exige.
- source_word: מִנְחָתָם
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su presente
  - su tributo
  lexicon: HALOT
  rationale: מִנְחָה puede ser regalo, tributo u ofrenda; en este contexto cultual, «ofrenda» es lo suficientemente amplio y natural sin precisar innecesariamente «ofrenda vegetal».
- source_word: לֹא חֲמוֹר אֶחָד מֵהֶם נָשָׂאתִי
  english_pob_choice: I have not taken a single donkey from them
  chosen_spanish: No he tomado de ellos ni un solo asno
  alternatives_spanish:
  - No he tomado de ellos ni un solo burro
  - Ni un solo asno he tomado de ellos
  lexicon: HALOT
  rationale: נשא aquí transmite tomar/apropiarse. «Ni un solo asno» conserva la imagen concreta y evita suavizar la acusación de explotación material.
- source_word: וְלֹא הֲרֵעֹתִי אֶת אַחַד מֵהֶם
  english_pob_choice: nor have I harmed any one of them
  chosen_spanish: ni he hecho daño a ninguno de ellos
  alternatives_spanish:
  - ni he perjudicado a ninguno de ellos
  - ni he tratado mal a ninguno de ellos
  lexicon: HALOT
  rationale: El hifil de רעע expresa hacer mal/dañar. «Hacer daño» es natural en español y mantiene la negación de cualquier agravio personal.
theological_decisions:
- issue: Nombre divino יְהוָה en discurso directo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura POB no enmascara el nombre divino con un título. «Yahvé» es la forma coherente en español para reflejar el nombre personal del pacto en el discurso de Moisés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto español sigue la revisión auditada que prefirió una equivalencia más natural para la expresión idiomática de פנה אל, manteniendo a la vez la imagen subyacente de «volver la mirada» o conceder atención. También preserva la decisión POB de usar «Yahvé» para יְהוָה y mantiene las dos negaciones del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma uniforme para יְהוָה, conforme al criterio POB.
  - Se eligió «ofrenda» para מִנְחָה por ser amplio y compatible con el contexto cultual.
  - «Asno» conserva el referente animal concreto del hebreo חמור sin introducir una domesticación innecesaria.
  - La doble negación («No he tomado... ni he hecho daño...») reproduce la estructura enfática del hebreo.
