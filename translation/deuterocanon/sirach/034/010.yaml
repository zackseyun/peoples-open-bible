translation:
  text: A man who has not been tested knows little, but one who has wandered[b] increases cunning[c][a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied in Zone 1 does not match the Greek text for this verse; the translation therefore follows the Greek witness here.
    reason: textual_variant
  - marker: b
    text: Or 'one who has gone astray' / 'one who has been misled'; the Greek can carry either literal wandering or figurative deviation.
    reason: alternative_reading
  - marker: c
    text: Or 'craftiness' or 'shrewdness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς οὐκ ἐπειράθη
  chosen: a man who has not been tested
  alternatives:
  - one who has not been tried
  - one who has no experience
  lexicon: BDAG
  rationale: The Hebrew Zone 1 text appears to mismatch this verse, so the Greek parallel must be used as actual translation input. ἐπειράθη can denote being tried/tested or gaining experience through trial. 'Tested' preserves the experiential sense without overparaphrasing. 'A man' reflects the generic singular in a gender-accurate way per project philosophy.
- source_word: ὀλίγα οἶδεν
  chosen: knows little
  alternatives:
  - knows few things
  lexicon: BDAG
  rationale: A natural English rendering of the idiom meaning limited knowledge.
- source_word: ὁ δὲ πεπλανημένος
  chosen: one who has wandered
  alternatives:
  - one who has gone astray
  - one who has been misled
  - the experienced traveler
  lexicon: BDAG
  rationale: The participle from πλανάω can mean wandering, going astray, or being led astray. In this wisdom context it may overlap with gaining experience through roaming, but the negative semantic range remains possible. 'Has wandered' preserves the ambiguity better than a fully positive or fully moralized rendering.
- source_word: πληθυνεῖ
  chosen: increases
  alternatives:
  - multiplies
  - abounds in
  lexicon: BDAG
  rationale: Straightforward verbal sense of becoming more or causing to abound.
- source_word: πανουργίαν
  chosen: cunning
  alternatives:
  - craftiness
  - shrewdness
  lexicon: BDAG
  rationale: πανουργία often carries a negative sense such as craftiness or unscrupulous cleverness. 'Cunning' is concise and preserves that edge, while allowing the wisdom-text nuance that experience can produce practical savvy.
