translation:
  language: es
  text: Y Moab quedará avergonzado[a] por causa de Quemos, así como la casa de Israel quedó avergonzada por causa de Betel[b], su confianza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será avergonzado». El hebreo puede traducirse más literalmente como «avergonzado de/por causa de Quemos», pero el sentido es que la confianza de Moab en Quemos terminará en desgracia.
    reason: lexical_alternative
  - marker: b
    text: Betel era el santuario del norte de Israel asociado con la adoración del becerro; la frase también podría traducirse más literalmente como «de/desde Betel, su confianza».
    reason: cultural_note
lexical_decisions:
- source_word: וּבֹשׁ
  english_pob_choice: will be put to shame
  chosen_spanish: será avergonzado
  alternatives_spanish:
  - será puesto en vergüenza
  - quedará avergonzado
  - será humillado
  lexicon: HALOT
  rationale: El hebreo expresa venir a vergüenza pública en contexto de juicio; en español, «ser avergonzado» conserva el valor pasivo/resultativo mejor que un mero estado interno de emoción. «Humillado» es posible, pero desplaza el matiz de vergüenza pública.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: Transliteración estándar
  rationale: Nombre propio nacional; se conserva la forma transliterada usual.
- source_word: מִכְּמוֹשׁ
  english_pob_choice: because of Chemosh
  chosen_spanish: por causa de Quemos
  alternatives_spanish:
  - a causa de Quemos
  - por Quemos
  - de Quemos
  lexicon: HALOT
  rationale: La preposición hebrea tras בוש puede marcar relación de motivo o fuente de vergüenza. «Por causa de» comunica bien que la vergüenza sobreviene a Moab en relación con su confianza en Quemos, sin forzar un sentido instrumental teológico.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: Uso conjuntivo comparativo
  rationale: La comparación entre los dos casos queda natural y clara en español con «así como».
- source_word: בֹּשׁוּ
  english_pob_choice: was put to shame
  chosen_spanish: fue avergonzada
  alternatives_spanish:
  - quedó avergonzada
  - fue puesta en vergüenza
  lexicon: HALOT
  rationale: Se mantiene el mismo campo léxico que en la primera mitad del versículo para conservar el paralelo hebreo. El singular concuerda con el colectivo «la casa de Israel».
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la familia de Israel
  - Israel
  lexicon: Uso bíblico colectivo
  rationale: La expresión tiene peso histórico y colectivo; se conserva literalmente porque no se trata solo del nombre «Israel», sino de la fórmula nacional-covenantal.
- source_word: מִבֵּית אֵל
  english_pob_choice: because of Bethel
  chosen_spanish: por causa de Betel
  alternatives_spanish:
  - desde Betel
  - a causa de Betel
  lexicon: HALOT
  rationale: Se preserva el referente histórico del santuario de Betel. «Por causa de» refleja que la vergüenza vino en relación con el lugar y su confianza, no que Israel sintiera vergüenza «desde» un punto geográfico.
- source_word: מִבְטֶחָם
  english_pob_choice: their confidence
  chosen_spanish: su confianza
  alternatives_spanish:
  - su seguridad
  - su esperanza
  lexicon: HALOT
  rationale: El término denota el objeto de confianza; «confianza» mantiene el paralelismo y la ironía profética mejor que «seguridad», que puede sonar más abstracto.
theological_decisions:
- issue: Sentido de Betel en el contraste profético
  english_pob_reading: Bethel refers to the northern Israelite sanctuary associated with idolatrous trust, not a generic 'house of God.'
  chosen_spanish_reading: Betel se entiende como el santuario del norte en el que Israel puso su confianza, no como un simple ‘casa de Dios’.
  alternative_spanish_readings:
  - ‘casa de Dios’ como traducción literal del nombre
  - Betel como topónimo sin explicación
  rationale: El contraste del pasaje enfrenta la confianza de Moab en Quemos con la confianza fracasada de Israel en Betel. Traducir el nombre como ‘casa de Dios’ ocultaría la alusión polémica al santuario idólatra y suavizaría la crítica profética.
  doctrine_reference: 'Translation philosophy: primacía del texto original y preservación de la tensión teológica/histórica cuando está sustentada por el contexto.'
translation_notes:
  revision_awareness: Coincide con la última revisión del texto fuente en que no fueron necesarios cambios; se conserva el paralelismo de vergüenza entre Moab e Israel y la referencia histórica a Betel.
  spanish_consistency_notes:
  - Se mantiene el mismo campo léxico para בוש en ambas cláusulas («avergonzado/avergonzada») para preservar el paralelismo.
  - Se usa ‘Betel’ como topónimo histórico, no como ‘casa de Dios’, para no borrar la referencia cultual.
  - ‘Por causa de’ se repite en ambas mitades para reflejar el paralelo de motivo/relación presente en el hebreo.
  - La puntuación separa con coma la cláusula comparativa final, siguiendo el ritmo poético del hebreo.
