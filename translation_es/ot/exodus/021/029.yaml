    reason: cultural_note
  revision_rationale: Se ajustó el español para reflejar mejor el sentido habitual de נַגָּח, el matiz práctico de control en וְלֹא יִשְׁמְרֶנּוּ, y la fuerza jurídica de יוּמָת, evitando calcos poco naturales. Se añadió una nota para conservar y explicar el modismo temporal hebreo documentado en la auditoría inglesa.
