translation:
  language: es
  text: Si un gobernante escucha una mentira[a], todos sus servidores son malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Si un gobernante presta atención a la falsedad, todos sus servidores son malvados."'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁל
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - jefe
  - príncipe
  lexicon: HALOT
  rationale: El participio designa a quien ejerce autoridad. "Gobernante" es natural en español y suficientemente amplio para el sentido proverbial, sin concretarlo demasiado en un cargo específico.
- source_word: מַקְשִׁיב
  english_pob_choice: listens
  chosen_spanish: atiende
  alternatives_spanish:
  - escucha
  - da oído a
  - presta atención
  lexicon: HALOT
  rationale: El hiphil de קשׁב expresa atención receptiva. "Atiende" conserva la idea de escuchar con cuidado y evita sonar demasiado mecánico.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  - a un
  lexicon: HALOT
  rationale: Con קשׁב, la preposición marca el objeto al que se presta atención. En español, "atiende a" reproduce de forma natural la relación.
- source_word: דְּבַר שָׁקֶר
  english_pob_choice: a lying word
  chosen_spanish: una palabra mentirosa
  alternatives_spanish:
  - una mentira
  - falsedad
  - un informe falso
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "palabra de mentira". "Palabra mentirosa" conserva el singular y la imagen concreta, a la vez que evita reducir el sentido a un informe formal.
- source_word: מְשָׁרְתָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus sirvientes
  - sus asistentes
  - sus ministros
  lexicon: HALOT
  rationale: El término se refiere a quienes sirven al gobernante. "Servidores" comunica bien la relación de servicio sin cargar el texto con una etiqueta institucional moderna.
- source_word: רְשָׁעִים
  english_pob_choice: wicked
  chosen_spanish: malvados
  alternatives_spanish:
  - impíos
  - malos
  - corruptos
  lexicon: HALOT
  rationale: El adjetivo expresa maldad moral. "Malvados" mantiene con claridad ese peso ético en español actual.
theological_decisions:
- issue: Relación entre la atención del gobernante y el estado moral de sus servidores
  english_pob_reading: all his servants are wicked
  chosen_spanish_reading: todos sus servidores son malvados
  alternative_spanish_readings:
  - todos sus servidores llegan a ser malvados
  - todos sus servidores se vuelven malvados
  rationale: El hebreo presenta la segunda cola como una descripción nominal, no como un cambio explícito de estado. Por eso se conserva "son malvados" para reflejar con más fidelidad la afirmación del texto, siguiendo la revisión final del POB inglés.
  doctrine_reference: 'Proverbios sapienciales: observación moral general, no doctrina sistemática'
translation_notes:
  revision_awareness: El inglés POB fue revisado desde una formulación resultativa ('become wicked') a una más literal ('are wicked'). La versión española sigue esa revisión y evita introducir un matiz de cambio que el hebreo no explicita.
  spanish_consistency_notes:
  - Se conservó el paralelismo breve y proverbial del hebreo.
  - '"Gobernante" y "servidores" mantienen un registro público y neutral apropiado para el contexto sapiencial.'
  - La nota al pie ofrece la alternativa lexical correspondiente a "falsehood" sin desviar el cuerpo principal.
