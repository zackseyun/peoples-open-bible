translation:
  language: es
  text: Nuestros niños pequeños[a], nuestras esposas, nuestro ganado y todos nuestros animales se quedarán[b] allí, en las ciudades de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros hijos». טַף suele referirse especialmente a los pequeños o dependientes.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice simplemente «serán», pero en contexto implica que permanecerán allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפֵּינוּ
  english_pob_choice: our little children
  chosen_spanish: nuestros niños pequeños
  alternatives_spanish:
  - nuestros hijos
  - nuestros dependientes
  - nuestros pequeños
  lexicon: HALOT
  rationale: טַף suele referirse especialmente a niños pequeños o dependientes no combatientes. «Niños pequeños» conserva esa idea con naturalidad en español, mejor que el más genérico «hijos».
- source_word: נָשֵׁינוּ
  english_pob_choice: our wives
  chosen_spanish: nuestras esposas
  alternatives_spanish:
  - nuestras mujeres
  lexicon: HALOT
  rationale: En este contexto familiar y tribal, el sentido natural es el de las mujeres del hogar, es decir, las esposas. «Esposas» es claro y fiel en español.
- source_word: מִקְנֵנוּ
  english_pob_choice: our livestock
  chosen_spanish: nuestro ganado
  alternatives_spanish:
  - nuestros animales de cría
  - nuestros rebaños
  lexicon: HALOT
  rationale: מִקְנֶה designa ganado o animales domésticos como propiedad móvil. «Ganado» comunica bien ese sentido en español y evita redundancia excesiva con «animales».
- source_word: וְכָל בְּהֶמְתֵּנוּ
  english_pob_choice: and all our animals
  chosen_spanish: y todos nuestros animales
  alternatives_spanish:
  - y todas nuestras bestias
  - y toda nuestra hacienda animal
  lexicon: HALOT
  rationale: בְּהֵמָה es más amplio que מִקְנֶה y puede abarcar animales domésticos en general. «Animales» mantiene esa amplitud; «todo nuestro ganado» sonaría demasiado repetitivo y más estrecho.
- source_word: יִהְיוּ
  english_pob_choice: will remain
  chosen_spanish: se quedarán
  alternatives_spanish:
  - permanecerán
  - estarán
  lexicon: HALOT
  rationale: Aunque el verbo base es simplemente «ser/estar», el contexto exige la idea de permanecer en ese lugar mientras los demás avanzan. «Se quedarán» expresa esa fuerza contextual de manera natural.
- source_word: בְּעָרֵי הַגִּלְעָד
  english_pob_choice: in the cities of Gilead
  chosen_spanish: en las ciudades de Galaad
  alternatives_spanish:
  - en los poblados de Galaad
  - en las ciudades de Gilead
  lexicon: HALOT
  rationale: «Galaad» es la forma española usual del topónimo bíblico. «Ciudades» conserva el plural del hebreo עָרִים sin necesidad de suavizarlo.
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que cambió «cattle» por «animals» para evitar redundancia y reflejar mejor la amplitud de בְּהֵמָה. En español, esa distinción se preserva con «ganado» / «animales».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aplica.
  - Se mantiene un registro bíblico actual y claro, sin arcaísmos innecesarios.
  - Se evitó traducir mecánicamente «will be»; se optó por la fuerza contextual de permanencia, como en el audit trail inglés.
