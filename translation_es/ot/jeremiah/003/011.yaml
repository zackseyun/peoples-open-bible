    text: O «Israel descarriada se ha mostrado más justa que la traicionera Judá».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que preserve la alternativa léxica del inglés auditado para מְשֻׁבָה («backsliding»), expresada idiomáticamente en español como «descarriada».
