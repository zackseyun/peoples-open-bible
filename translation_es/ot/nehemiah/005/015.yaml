translation:
  language: es
  text: Pero los gobernadores anteriores, los que estuvieron antes de mí, impusieron pesadas cargas sobre el pueblo y les quitaban pan y vino, además de cuarenta siclos de plata[a]. Incluso sus sirvientes[b] ejercían autoridad sobre el pueblo. Pero yo no actué así, por temor de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de cuarenta siclos de plata». La frase hebrea puede indicar un cobro monetario adicional, además del pan y el vino.
    reason: lexical_alternative
  - marker: b
    text: O «subordinados» o «jóvenes». El hebreo puede referirse a asistentes o funcionarios menores al servicio de los gobernadores.
    reason: lexical_alternative
  - marker: c
    text: O «por reverencia a Dios». La expresión hebrea dice literalmente «por el temor de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפַּחוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - funcionarios
  - gobernadores provinciales
  lexicon: HALOT
  rationale: פֶּחָה designa a un gobernador o administrador provincial en el período persa. «Gobernadores» es natural en español y conserva el matiz histórico-administrativo.
- source_word: הָרִאשֹׁנִים
  english_pob_choice: former
  chosen_spanish: anteriores
  alternatives_spanish:
  - primeros
  - previos
  lexicon: HALOT
  rationale: En contexto distingue a los predecesores de Nehemías; «anteriores» suena claro y mantiene la referencia temporal sin forzar un matiz de anterioridad absoluta.
- source_word: אֲשֶׁר לְפָנַי
  english_pob_choice: who were before me
  chosen_spanish: los que estuvieron antes de mí
  alternatives_spanish:
  - que me precedieron
  - antes de mi tiempo
  lexicon: HALOT
  rationale: La frase señala a los ocupantes previos del cargo. «Los que estuvieron antes de mí» conserva la imagen relacional del hebreo y es idiomática en español.
- source_word: הִכְבִּידוּ עַל הָעָם
  english_pob_choice: laid heavy burdens on the people
  chosen_spanish: cargaron pesadamente sobre el pueblo
  alternatives_spanish:
  - oprimieron al pueblo
  - impusieron cargas pesadas al pueblo
  lexicon: HALOT
  rationale: El verbo con sentido de «hacer pesado» se refleja con una expresión verbal que mantiene la metáfora de carga. «Cargaron pesadamente sobre» preserva el peso semántico sin volverlo demasiado interpretativo.
- source_word: וַיִּקְחוּ מֵהֶם
  english_pob_choice: took from them
  chosen_spanish: tomaron de ellos
  alternatives_spanish:
  - recibieron de ellos
  - exigieron de ellos
  lexicon: HALOT
  rationale: El verbo básico לקח es «tomar». En este contexto fiscal puede implicar exacción, pero «tomaron de ellos» permanece cercano al hebreo y al audit trail inglés.
- source_word: בְּלֶחֶם וָיַיִן
  english_pob_choice: bread and wine
  chosen_spanish: pan y vino
  alternatives_spanish:
  - alimentos y vino
  lexicon: HALOT
  rationale: El hebreo nombra concretamente los artículos; «pan y vino» conserva el paralelismo y evita generalizar a «alimentos».
- source_word: אַחַר כֶּסֶף שְׁקָלִים אַרְבָּעִים
  english_pob_choice: besides forty shekels of silver
  chosen_spanish: además de cuarenta siclos de plata
  alternatives_spanish:
  - en adición a cuarenta siclos de plata
  - después de cuarenta siclos de plata
  lexicon: HALOT
  rationale: אַחַר aquí funciona idiomáticamente como «además de / en adición a». «Además de» reproduce mejor el valor que «después de», que sería engañoso en español.
- source_word: נַעֲרֵיהֶם
  english_pob_choice: servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus sirvientes
  - sus jóvenes
  lexicon: HALOT
  rationale: Aunque נער puede significar «joven», el contexto administrativo favorece subordinados en servicio a los gobernadores. «Servidores» comunica esa relación sin sobretraducir.
- source_word: שָׁלְטוּ עַל הָעָם
  english_pob_choice: ruled over the people
  chosen_spanish: dominaban sobre el pueblo
  alternatives_spanish:
  - gobernaban sobre el pueblo
  - ejercían autoridad sobre el pueblo
  lexicon: HALOT
  rationale: שׁלט expresa dominio o autoridad efectiva. «Dominaban sobre» conserva la fuerza del verbo y su matiz de poder ejercido sobre otros.
- source_word: וַאֲנִי לֹא עָשִׂיתִי כֵן
  english_pob_choice: But I did not do so
  chosen_spanish: Pero yo no hice así
  alternatives_spanish:
  - Pero yo no actué de esa manera
  - Pero yo no hice lo mismo
  lexicon: HALOT
  rationale: La fórmula contrasta la conducta de Nehemías con la de sus predecesores. «No hice así» sigue de cerca el hebreo y su valor de contraste.
- source_word: מִפְּנֵי יִרְאַת אֱלֹהִים
  english_pob_choice: because of the fear of God
  chosen_spanish: por temor de Dios
  alternatives_spanish:
  - por reverencia a Dios
  - porque temía a Dios
  lexicon: HALOT
  rationale: La construcción idiomática se traduce con la expresión bíblica «temor de Dios», que mantiene la densidad teológica del hebreo y evita diluirla en un simple «respeto».
theological_decisions:
- issue: יִרְאַת אֱלֹהִים como motivo moral y teológico
  english_pob_reading: because of the fear of God
  chosen_spanish_reading: por temor de Dios
  alternative_spanish_readings:
  - por reverencia a Dios
  - porque temía a Dios
  rationale: Se conserva la frase estable «temor de Dios» para retener el sentido de conciencia reverente y responsabilidad ante Dios, sin convertirla en temor servil ni suavizarla excesivamente.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto inglés del POB mantiene una traducción óptima-congruente y no presenta revisiones aplicadas en este pasaje; se ha conservado la misma estructura interpretativa principal, ajustada a un español natural y auditables desde el hebreo. La nota inglesa sobre אַחַר como posible levía añadida se refleja en la nota [a], y la ambigüedad de נַעֲרֵיהֶם se mantiene en [b].
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es el nombre divino; aquí aparece אֱלֹהִים, por eso se traduce «Dios».
  - Se mantiene «temor de Dios» como fórmula teológica estable y transparente.
  - «Gobernadores» se usa para פַּחוֹת en coherencia con la terminología administrativa persa del libro de Nehemías.
  - «Pan y vino» conserva la concreción del hebreo, y «además de» refleja el valor idiomático de אַחַר en este contexto.
