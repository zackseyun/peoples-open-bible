translation:
  language: es
  text: 'o como un ave que vuela por el aire: no se encuentra ningún rastro comprobable[a] de su camino; aunque el aire ligero[b], azotado por el batir de sus alas y partido con violencia por el silbido de las alas en movimiento, fue atravesado, y después de eso no se halló en él ninguna señal de su paso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘huella de su camino’ para τεκμήριον πορείας; el griego subraya que no queda un indicio demostrable del recorrido del ave.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘el aire ligero’ traduce πνεῦμα κοῦφον, que también puede entenderse como ‘aire leve’ o ‘brisa ligera’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀρνέου
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave del aire
  lexicon: LSJ
  rationale: ‘Ave’ conserva el registro general y amplio del griego para un ave cualquiera, sin especificar especie. En español funciona bien en un símil elevado y evita un coloquialismo innecesario.
- source_word: διιπτάντος
  english_pob_choice: flying through
  chosen_spanish: que vuela por
  alternatives_spanish:
  - que atraviesa volando
  - que pasa volando por
  lexicon: LSJ
  rationale: La idea es el movimiento de paso en vuelo; ‘que vuela por’ mantiene la imagen con naturalidad en español y no añade matices no presentes.
- source_word: ἀέρα
  english_pob_choice: the air
  chosen_spanish: el aire
  alternatives_spanish:
  - el cielo
  - la atmósfera
  lexicon: LSJ
  rationale: ‘Aire’ es el equivalente directo y coincide con la revisión inglesa que precisó πνεῦμα κοῦφον como ‘light air’. No conviene convertirlo en ‘cielo’, que cambia la escena.
- source_word: τεκμήριον πορείας
  english_pob_choice: evidence of its path
  chosen_spanish: evidencia de su camino
  alternatives_spanish:
  - prueba de su ruta
  - huella de su trayecto
  - señal de su viaje
  lexicon: LSJ
  rationale: τεκμήριον expresa una evidencia demostrable, no solo una señal débil. ‘Evidencia de su camino’ preserva ese peso probatorio, y ‘camino’ comunica bien πορεία en español.
- source_word: πληγῇ
  english_pob_choice: by the stroke
  chosen_spanish: por el golpe
  alternatives_spanish:
  - por el batir
  - por el azote
  lexicon: LSJ
  rationale: 'El dativo instrumental apunta al medio: el impacto del aleteo. ‘Golpe’ es claro y conserva la fuerza física de la imagen.'
- source_word: μαστιζόμενον
  english_pob_choice: whipped
  chosen_spanish: azotado
  alternatives_spanish:
  - lacerado
  - latiado
  lexicon: LSJ
  rationale: ‘Azotado’ reproduce bien la idea de ser castigado o sacudido con fuerza. Es una traducción natural del metáfora de μαστιζόμενον sin debilitarla.
- source_word: ταρσῶν
  english_pob_choice: pinions
  chosen_spanish: rémiges
  alternatives_spanish:
  - alas
  - plumas de vuelo
  lexicon: LSJ
  rationale: El término apunta a la parte del ala usada para volar; ‘rémiges’ es un término español preciso para las plumas de vuelo y conserva mejor la especificidad anatómica que simplemente ‘alas’.
- source_word: πνεῦμα κοῦφον
  english_pob_choice: the light air
  chosen_spanish: el aire ligero
  alternatives_spanish:
  - la brisa ligera
  - el aire leve
  lexicon: LSJ
  rationale: La revisión inglesa corrigió ‘wind’ a ‘air’ para mayor exactitud. ‘Aire ligero’ mantiene esa precisión y deja abierta la sutileza de κοῦφον sin forzar ‘viento’.
- source_word: σχιζόμενον βίᾳ ῥοιζῷ
  english_pob_choice: split by force with the whirring
  chosen_spanish: partido con violencia por el silbido
  alternatives_spanish:
  - rasgado con violencia por el zumbido
  - abierto a la fuerza por el silbido
  lexicon: LSJ
  rationale: 'La construcción describe el aire siendo dividido por la fuerza y el ruido del vuelo. ‘Partido con violencia por el silbido’ preserva ambos elementos: la fractura y el sonido rápido/whizzing de ῥοιζῷ.'
- source_word: κινουμένων πτερύγων
  english_pob_choice: of moving wings
  chosen_spanish: de las alas en movimiento
  alternatives_spanish:
  - de alas agitadas
  - de alas que se mueven
  lexicon: LSJ
  rationale: La frase genitiva funciona como complemento del silbido o rumor producido por el movimiento. ‘Alas en movimiento’ es natural y mantiene la referencia a la actividad de vuelo.
- source_word: διωδεύθη
  english_pob_choice: was traversed
  chosen_spanish: fue atravesado
  alternatives_spanish:
  - fue recorrido
  - fue pasado por
  lexicon: LSJ
  rationale: La voz pasiva presenta el aire como espacio recorrido por el ave. ‘Fue atravesado’ conserva la pasiva impersonal y la idea de tránsito.
- source_word: σημεῖον ἐπιβάσεως
  english_pob_choice: sign of its passage
  chosen_spanish: señal de su paso
  alternatives_spanish:
  - marca de su tránsito
  - huella de su paso
  lexicon: LSJ
  rationale: ‘Señal de su paso’ es una forma natural y fiel de σημεῖον ἐπιβάσεως. Mantiene el sentido de que no queda rastro visible del desplazamiento.
translation_notes:
  revision_awareness: 'Seguí la revisión final del texto inglés POB, que corrigió ‘wind’ a ‘air’ para πνεῦμα κοῦφον. Por eso elegí ‘aire ligero’ en vez de ‘viento’, manteniendo la precisión física del pasaje. También conservé la doble imagen del movimiento del ave: el aire es ‘atravesado’ y luego no queda ‘señal de su paso’.'
  spanish_consistency_notes:
  - Usé ‘Yahvé’ como norma general del proyecto no aplicable aquí porque el versículo no contiene el nombre divino.
  - Mantuve un registro elevado pero claro, evitando calcos rígidos cuando el español requiere una formulación más natural.
  - ‘Ave’ se prefirió a ‘pájaro’ por el tono literario del pasaje.
  - No añadí ninguna interpretación doctrinal; el texto es una comparación de la desaparición de un rastro en el aire.
