translation:
  language: es
  text: 'Entonces Judá dijo a Tamar, su nuera: «Quédate como viuda en la casa de tu padre hasta que mi hijo Sela crezca», porque dijo[a]: «No sea que también él muera como sus hermanos». Así Tamar se fue y vivió en la casa de su padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque pensó», ya que el hebreo «dijo» también puede introducir razonamiento interno.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּלָּתוֹ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  lexicon: HALOT
  rationale: כַּלָּה designa aquí la relación de nuera; 'nuera' es el equivalente natural y preciso en español. 'Hija política' es comprensible pero menos común y más marcada regionalmente.
- source_word: שְׁבִי
  english_pob_choice: Remain
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Reside
  lexicon: HALOT
  rationale: El imperativo de ישׁב en este contexto ordena continuar residiendo. 'Quédate' comunica con naturalidad esa permanencia sin perder el valor de mandato.
- source_word: אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: como viuda
  alternatives_spanish:
  - viuda
  - en condición de viuda
  lexicon: HALOT
  rationale: El hebreo presenta estado o condición; en español, 'como viuda' expresa esa situación impuesta por Judá. Mantiene la fuerza de estado sin sonar forzado.
- source_word: בֵית אָבִיךְ
  english_pob_choice: in your father’s house
  chosen_spanish: en la casa de tu padre
  alternatives_spanish:
  - en la casa de tu familia paterna
  - en el hogar de tu padre
  lexicon: HALOT
  rationale: La locución idiomática de residencia doméstica se vierte de forma directa. 'Casa de tu padre' conserva el valor familiar y de pertenencia del hebreo.
- source_word: יִגְדַּל
  english_pob_choice: grows up
  chosen_spanish: crezca
  alternatives_spanish:
  - sea mayor
  - alcance la madurez
  lexicon: HALOT
  rationale: יגדל indica crecer hasta la madurez; 'crezca' es breve, natural y suficientemente amplio para no especificar más de lo que el texto dice.
- source_word: שֵׁלָה בְנִי
  english_pob_choice: my son Shelah
  chosen_spanish: mi hijo Sela
  alternatives_spanish:
  - mi hijo Selá
  lexicon: HALOT
  rationale: Se conserva el nombre propio. Se opta por 'Sela' por uso español fluido y para mantener uniformidad onomástica; la vocalización alternativa 'Selá' es posible.
- source_word: כִּי אָמַר
  english_pob_choice: for he said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues pensó
  - porque pensó
  lexicon: HALOT
  rationale: El hebreo puede introducir razonamiento interno con 'dijo'. 'Porque dijo' preserva esa ambigüedad documentada sin resolverla en la traducción principal.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - por miedo a que
  lexicon: HALOT
  rationale: פֶּן expresa prevención ante un posible resultado. 'No sea que' reproduce bien esa cautela en español y suena natural en este registro.
- source_word: כְּאֶחָיו
  english_pob_choice: like his brothers
  chosen_spanish: como sus hermanos
  alternatives_spanish:
  - igual que sus hermanos
  - tal como sus hermanos
  lexicon: HALOT
  rationale: La comparación remite al destino de sus hermanos. 'Como sus hermanos' es la forma más directa y fiel para mantener el paralelismo.
- source_word: וַתֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - se quedó
  - habitó
  - residió
  lexicon: HALOT
  rationale: Aunque el verbo comparte raíz con el imperativo anterior, aquí la secuencia narrativa pide un verbo de asentamiento. 'Vivió' comunica residencia estable con naturalidad en español.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: her father’s house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - el hogar de su padre
  - la casa paterna
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el sentido de residencia familiar. 'La casa de su padre' es claro y fiel al hebreo.
theological_decisions:
- issue: ¿'dijo' como habla externa o como razonamiento interno?
  english_pob_reading: for he said; the Hebrew 'said' can introduce internal reasoning.
  chosen_spanish_reading: porque dijo
  alternative_spanish_readings:
  - porque pensó
  - porque se dijo a sí mismo
  rationale: El hebreo permite que 'dijo' introduzca motivo interno sin afirmar explícitamente un monólogo. La versión principal conserva la forma textual y deja abierta la inferencia contextual, como en el audit trail inglés.
  doctrine_reference: Ninguna; decisión semántico-discursiva del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente no cambió el sentido base ni introdujo ajustes textuales; el borrador español sigue de cerca el audit trail con la misma resolución de la ambigüedad de כִּי אָמַר y sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva el paralelismo 'casa de tu padre' / 'casa de su padre' para reflejar el hebreo בֵית אָבִיךְ / בֵית אָבִיהָ.
  - Se usa 'nuera' para כַּלָּתוֹ por ser el término kinésico preciso y natural en español.
  - Se evita 'sierva' o 'criada' porque el hebreo no lo sugiere aquí.
  - El registro intenta ser digno y publicable sin recurrir a formulaciones arcaizantes.
