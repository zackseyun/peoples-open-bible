    issue: La nota [a] repite prácticamente el texto principal
    rationale: El texto principal ya dice «tomar las armas[a]», y la nota dice «O, “tomar las armas”», lo cual no aporta alternativa ni aclaración útil. Debe reemplazarse por una alternativa real como «armarse» o una explicación distinta.
  - severity: medium
    issue: La cláusula final sobredesarrolla el griego con «con ímpetu y prontitud»
    rationale: προθύμως significa algo como «de buena gana», «con prontitud», «con entusiasmo», mientras que ἐξώρμησαν ya expresa la salida impetuosa. Añadir «ímpetu» además de «prontitud» duplica y redistribuye el sentido de manera menos precisa.
