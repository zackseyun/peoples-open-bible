translation:
  language: es
  text: 'Así dice el Señor Yahvé: Cuando[a] toda la tierra se alegró, yo te dejaré desolada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así como toda la tierra se alegró». El hebreo con כ puede entenderse también en sentido comparativo.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se mantiene en presente declarativo en español para conservar el carácter oracular vigente, con una forma natural y solemne.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se conserva el título compuesto sin ocultar el Nombre divino. 'Señor' refleja אֲדֹנָי y 'Yahvé' traduce יְהוָה según el estándar del proyecto.
- source_word: כִּשְׂמֹחַ
  english_pob_choice: As ... rejoiced
  chosen_spanish: Así como ... se alegró
  alternatives_spanish:
  - Cuando ... se alegró
  - Mientras ... se alegró
  lexicon: HALOT
  rationale: El כ con infinitivo se entiende aquí de manera temporal/comparativa. 'Así como' preserva esa ambigüedad sin forzar una causalidad que el hebreo no exige.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el país
  lexicon: HALOT
  rationale: Aunque puede leerse más localmente como 'la tierra/país', en castellano 'toda la tierra' mantiene la amplitud del hebreo y evita limitar el alcance sin base suficiente.
- source_word: שָׂמַח
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - gozó
  lexicon: HALOT
  rationale: '''Se alegró'' transmite el sentido básico del verbo con dignidad y sin exagerar la intensidad; además permite mantener el matiz temporal del participio/infinitivo con naturalidad en español.'
- source_word: שְׁמָמָה
  english_pob_choice: desolate
  chosen_spanish: desolación
  alternatives_spanish:
  - desolado
  - devastación
  lexicon: HALOT
  rationale: Con עשה + ל, el hebreo expresa convertir a alguien en aquello. 'Te convertiré en desolación' preserva mejor la construcción resultativa que un simple adjetivo.
- source_word: אֶעֱשֶׂה לָּךְ
  english_pob_choice: I will make you
  chosen_spanish: yo te convertiré
  alternatives_spanish:
  - yo haré de ti
  - yo te haré
  lexicon: HALOT
  rationale: 'En español, ''convertir en'' reproduce con claridad el valor resultativo de עשה + ל + pronombre: hacer que el destinatario llegue a ser una desolación.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: Se evita la sustitución reverencial por 'SEÑOR' y se conserva el Nombre revelado como 'Yahvé', en línea con la convención del proyecto para יְהוָה. 'Señor' traduce el componente אדני del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor temporal/comparativo de כִּשְׂמֹחַ
  english_pob_reading: As the whole earth rejoiced
  chosen_spanish_reading: Así como toda la tierra se alegró
  alternative_spanish_readings:
  - Cuando toda la tierra se alegró
  - Mientras toda la tierra se alegró
  rationale: El hebreo permite entender la cláusula como temporal. La redacción española conserva esa lectura principal sin eliminar la posibilidad comparativa/documental que el texto deja abierta.
  doctrine_reference: 'Nota exegética del hebreo: כ + infinitivo con valor temporal'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de 'rejoices' a 'rejoiced' para reflejar mejor el valor temporal del hebreo. La versión española adopta esa lectura temporal con 'se alegró' y mantiene la alternativa temporal en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה de forma consistente con el estándar del proyecto.
  - Se mantiene 'Señor' para אֲדֹנָי dentro del título compuesto.
  - '''Tierra'' se elige aquí por la amplitud probable del hebreo; no se estrecha a ''país'' sin evidencia contextual adicional.'
  - La construcción resultativa 'convertir en desolación' evita una paráfrasis excesiva y conserva la fuerza del hebreo.
