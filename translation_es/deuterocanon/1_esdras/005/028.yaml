translation:
  language: es
  text: los porteros[a], cuatrocientos; los hijos de Ismael, hijos de Lakubath[b], mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego sigue esta lectura en este punto: «los hijos de Ismael, hijos de Lakubath, mil». El paralelo hebreo de Nehemías 7 no coincide aquí, así que la traducción sigue el testimonio griego en vez de armonizar la lista.'
    reason: textual_variant
  - marker: b
    text: «Lakubath» refleja la forma griega Λακουβάτου. Puede estar relacionado con la forma más conocida Akkub/Lakkub en listas paralelas, pero aquí se conserva el nombre según este testimonio griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ θυρωροί
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardapuertas
  lexicon: LSJ
  rationale: θυρωρός nombra a quien cuida o custodia una puerta. En español, para un registro bíblico sobrio, «porteros» conserva la función institucional sin sonar demasiado moderno; «guardianes de la puerta» sería más explícito, pero menos conciso.
- source_word: τετρακόσιοι
  english_pob_choice: four hundred
  chosen_spanish: cuatrocientos
  alternatives_spanish:
  - '400'
  lexicon: LSJ
  rationale: Número cardinal directo en español, sin necesidad de cifra arábiga en el cuerpo del texto.
- source_word: οἱ Ἰσμαήλου
  english_pob_choice: the sons of Ishmael
  chosen_spanish: los hijos de Ismael
  alternatives_spanish:
  - los de Ismael
  lexicon: LSJ
  rationale: El genitivo de parentesco se vierte naturalmente como una designación de linaje. «Los hijos de Ismael» mantiene la forma censal y la claridad genealógica.
- source_word: υἱοὶ Λακουβάτου
  english_pob_choice: sons of Lakubath
  chosen_spanish: hijos de Lakubat
  alternatives_spanish:
  - hijos de Lakubath
  - hijos de Akkub
  lexicon: LSJ
  rationale: El griego de Swete transmite Λακουβάτου; por eso se conserva el nombre en transliteración, ajustado a una forma hispana breve. Se evita armonizar con listas paralelas más conocidas, porque este testimonio griego debe gobernar la redacción principal.
- source_word: χίλιοι
  english_pob_choice: one thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil, uno
  lexicon: LSJ
  rationale: Equivalente cardinal directo. En español, «mil» funciona con naturalidad en este tipo de enumeración.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete como ancla principal. Se mantiene la divergencia con el paralelo hebreo/masorético indicada en el expediente, y no se armoniza el nombre propio con listas paralelas.
  spanish_consistency_notes:
  - Se prefirió «porteros» como equivalente funcional de θυρωροί, coherente con un ámbito de templo o comunidad.
  - 'Se conservó la estructura censal breve del original: grupo + número, sin añadir conectores no presentes.'
  - Se mantuvo la transliteración del nombre propio según el griego, para respetar la evidencia textual primaria.
