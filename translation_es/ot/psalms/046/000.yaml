translation:
  language: es
  text: Para el director del coro. De los hijos de Coré. Según Alamoth[a]. Un cántico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «según doncellas», es decir, para voces femeninas o agudas; el término hebreo «Alamoth» probablemente es una indicación musical o el nombre de una melodía.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  - Para el director
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término señala al responsable de la ejecución musical. 'Director del coro' conserva la función litúrgico-musical con claridad natural en español.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: Of the sons of Korah
  chosen_spanish: De los hijos de Coré
  alternatives_spanish:
  - Para los hijos de Coré
  - Perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: La preposición en este tipo de superscripción puede indicar asociación, atribución o destino. 'De los hijos de Coré' mantiene esa ambigüedad sin decidir de más.
- source_word: עֲלָמוֹת
  english_pob_choice: Alamoth
  chosen_spanish: Alamot
  alternatives_spanish:
  - doncellas
  - voces agudas
  - soprano
  - Alamot
  lexicon: HALOT
  rationale: El término es incierto y probablemente técnico; transliterarlo como 'Alamot' preserva la indeterminación del hebreo y evita resolverlo como si significara con certeza 'doncellas' o un registro vocal.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Un cántico
  alternatives_spanish:
  - Un canto
  - Una canción
  lexicon: HALOT
  rationale: '''Cántico'' es un equivalente reverente y natural en el registro bíblico español, y comunica bien la identificación genérica de la pieza en la superscripción.'
translation_notes:
  revision_awareness: 'La colocación del marcador sigue la revisión auditada: la nota se ancla en ''Alamot'' y no en ''director del coro'', porque la explicación alternativa se refiere al término hebreo técnico.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando el texto lo requiera, pero este versículo es una superscripción sin el tetragrámaton.
  - '''Coré'' sigue la forma habitual en español bíblico para קֹרַח.'
  - Se mantiene el orden breve y fragmentario propio de una superscripción poética, sin añadir conectores interpretativos.
