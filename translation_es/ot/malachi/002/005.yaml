translation:
  language: es
  text: Mi pacto con él fue de vida y paz, y se las di a él[a]; esto exigía reverencia, y él me mostró reverencia, y quedó sobrecogido[b] ante mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para temor» o «para reverencia»; la sintaxis hebrea después de «y se las di a él» es comprimida.
    reason: lexical_alternative
  - marker: b
    text: O «se mostró humillado», «tembló» o «quedó consternado» ante mi nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִיתִי
  english_pob_choice: My covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi pacto
  lexicon: HALOT
  rationale: בְּרִית se traduce de manera natural y precisa como «pacto» en español bíblico contemporáneo. «Alianza» es posible, pero «pacto» conserva mejor el matiz formal y jurídico del hebreo sin sonar eclesiástico o explicativo.
- source_word: הָיְתָה אִתּוֹ
  english_pob_choice: was with him
  chosen_spanish: con él fue
  alternatives_spanish:
  - estuvo con él
  - era con él
  lexicon: HALOT
  rationale: La construcción hebrea expresa la relación del pacto con él. En español, «con él fue» mantiene la relación y la predicación de manera idiomática, sin imponer una paráfrasis más amplia que el original.
- source_word: הַחַיִּים וְהַשָּׁלוֹם
  english_pob_choice: life and peace
  chosen_spanish: de vida y paz
  alternatives_spanish:
  - de vida y paz
  - de la vida y la paz
  - de vida y bienestar
  lexicon: HALOT
  rationale: Se conserva la pareja léxica directa «vida y paz». «Paz» comunica el sentido básico de שָׁלוֹם; «bienestar» sería más explicativo y menos directo.
- source_word: וָאֶתְּנֵם לוֹ
  english_pob_choice: and I gave them to him
  chosen_spanish: y se las di
  alternatives_spanish:
  - y se las di
  - y se las concedí
  - y las di a él
  lexicon: HALOT
  rationale: El sufijo plural refiere naturalmente a «vida y paz». En español, «se las di» mantiene la referencia plural y el dativo beneficiario con buena naturalidad.
- source_word: מוֹרָא
  english_pob_choice: this called for reverence
  chosen_spanish: esto exigía reverencia
  alternatives_spanish:
  - esto pedía reverencia
  - esto exigía temor reverente
  - esto llamaba a reverencia
  lexicon: HALOT
  rationale: מוֹרָא puede significar temor, reverencia o temor reverente. Dado el contexto pactal positivo, «esto exigía reverencia» preserva la fuerza obligatoria de la construcción comprimida, sin borrar la tensión entre temor y reverencia.
- source_word: וַיִּירָאֵנִי
  english_pob_choice: and he revered me
  chosen_spanish: y él me reverenció
  alternatives_spanish:
  - y me reverenció
  - y me temió
  - y me mostró reverencia
  lexicon: HALOT
  rationale: El verbo ירא mantiene el campo de «temer/reverenciar». En español, «reverenció» conserva el vínculo semántico con «reverencia» y evita una repetición semánticamente pobre de «temió» junto a la frase anterior.
- source_word: וּמִפְּנֵי שְׁמִי
  english_pob_choice: before my name
  chosen_spanish: ante mi nombre
  alternatives_spanish:
  - delante de mi nombre
  - en presencia de mi nombre
  - ante mi nombre
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial-metafórica. «Ante mi nombre» reproduce bien la postura reverente; «ante» suena más natural que «antes de» o «delante de» en este contexto.
- source_word: נִחַת
  english_pob_choice: he stood in awe
  chosen_spanish: se mostró sobrecogido
  alternatives_spanish:
  - quedó sobrecogido
  - se estremeció
  - se vio humillado
  lexicon: HALOT
  rationale: נִחַת, en Niphal de חתת, puede denotar estar dismayed, humiliated, shattered, or trembling. En este contexto positivo, «se mostró sobrecogido» comunica reverente conmoción sin convertir el término en pánico o deshonra.
theological_decisions:
- issue: La respuesta humana adecuada al pacto y al nombre divino
  english_pob_reading: The verse describes reverential fear/awe, not servile terror.
  chosen_spanish_reading: El versículo describe reverencia y sobrecogimiento ante el pacto de vida y paz, no terror servil.
  alternative_spanish_readings:
  - El versículo podría leerse como temor intenso o desmayo ante Dios.
  - La formulación podría enfatizar más el temor que la reverencia.
  rationale: 'Mantengo la tensión del hebreo entre temor y reverencia: מוֹרָא y ירא no se suavizan por completo, pero el contexto de «vida y paz» orienta la escena hacia una reverencia pactal. «Se mostró sobrecogido» preserva la gravedad de נִחַת sin introducir una nota negativa excesiva.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que resolvió la frase difícil tras «and I gave them to him» como una relación de reverencia exigida por el don pactal, en vez de una traducción literal torpe de «as fear». También refleja la decisión revisada de mantener un registro reverente para ירא / נִחַת, evitando tanto el terror servil como una paráfrasis demasiado suave.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere explícitamente; en este versículo no aparece el tetragrámaton.
  - «Pacto» se usa de modo consistente para בְּרִית en vez de «alianza», porque el contexto legal-pactual es central.
  - «Reverencia» y el verbo «reverenció» se emplean para conservar el campo semántico de מוֹרָא / ירא sin borrar la posible tensión con temor.
  - No se usa «SEÑOR» para el nombre divino, porque aquí el referente es «mi nombre» y no una sustitución del tetragrámaton.
