revisions:
- from: 'Y Jabez invocó al Dios de Israel, diciendo: «Si me bendices de verdad y amplías mi territorio, y tu mano está conmigo, y me libras de la mal[a] para que no sufra dolor». Y Dios le concedió lo que pidió.'
  to: 'Y Jabez invocó al Dios de Israel, diciendo: «¡Si de verdad me bendices, y amplías mi territorio, y que tu mano esté conmigo[a], y me libras del daño[b] para que no sufra dolor[c]!». Y Dios le concedió lo que pidió.'
  rationale: Se corrige una forma española incorrecta («de la mal») y se alinea el texto principal con la decisión auditada del POB de traducir רָעָה como «daño», conservando «mal» en nota. También se ajusta la cláusula de la mano divina para expresar petición en lugar de indicación, y se restituye la nota de eco con el nombre de Jabez. El resto del versículo puede conservarse con cambios mínimos.
