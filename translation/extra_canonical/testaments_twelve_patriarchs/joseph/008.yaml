translation:
  text: '6[a]. And she said to me, “See then, you love me. Let this be enough for me: only take thought for my life and for my children, and I have hope that I shall also obtain my desire.” 7. But she did not know that I spoke thus because of my Lord, and not because of her. 8. For if anyone falls under the passion of desire and is enslaved to it, as she also was, even if he hears something good, he interprets it in terms of that passion, toward his evil desire[b].


    1. So I say, my children, that it was about the sixth hour when she left me. And bending my knee to the Lord all that day and all that night, toward dawn I rose, weeping and asking for deliverance from her. 2. At last, with evil intent, she seized my garments by force, dragging me violently toward intercourse. 3. Therefore, when I saw that in her frenzy she had hold of my tunic, I left it behind and fled naked. 4. But she, taking hold of it, slandered me; and when her husband came, he cast me into prison in his house, and on the next day, after scourging me, he sent me into Pharaoh’s dungeon. 5. And while I was in chains[c], the Egyptian woman was constrained by grief.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text in this verse is textually tangled in the witness represented by the OCR layer. The sense is clear overall: she kept Joseph''s garment, falsely accused him, and he was imprisoned and later sent to Pharaoh''s prison.'
    reason: textual_variant
    anchor_ref: '8:4'
  - marker: b
    text: Or 'into sexual union.' The Greek συνουσία is an explicit term for sexual relations.
    reason: lexical_alternative
    anchor_ref: '8:2'
  - marker: c
    text: This scene echoes Gen 39:12, where Joseph leaves his garment and flees from Potiphar's wife.
    reason: cross_reference
    anchor_ref: '8:3'
lexical_decisions:
- source_word: ἀντιποιῆσαι τῆς ζωῆς μου
  chosen: take responsibility for my life
  alternatives:
  - care for my life
  - claim my life as your concern
  lexicon: LSJ
  rationale: The idiom conveys taking something in hand or making it one's concern. 'Take responsibility for my life' preserves the manipulative appeal without over-paraphrasing.
- source_word: προσδοκίαν ἀπολαῦσαι τῆς ἐπιθυμίας μου
  chosen: hope that I shall also obtain my desire
  alternatives:
  - hope to enjoy my desire
  - expectation of attaining what I desire
  lexicon: LSJ
  rationale: ἀπολαύω can mean enjoy/obtain; here the context is her hoped-for fulfillment of lustful intent, so 'obtain my desire' is clear and restrained.
- source_word: διὰ τὸν Κύριόν μου
  chosen: because of my Lord
  alternatives:
  - for the sake of my Lord
  - on account of my Master
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project defaults. The phrase indicates Joseph's Godward motive, not attraction to the woman.
- source_word: ὑποπέσῃ πάθει ἐπιθυμίας
  chosen: falls under the passion of desire
  alternatives:
  - falls into a lustful passion
  - comes under the suffering of desire
  lexicon: LSJ
  rationale: πάθος with ἐπιθυμία denotes overpowering passion or lust. 'Falls under' reflects ὑποπίπτω and keeps the image of subjection.
- source_word: δουλωθῇ αὐτῷ
  chosen: is enslaved to it
  alternatives:
  - is made a slave to it
  - is brought into bondage by it
  lexicon: LSJ
  rationale: The bonded force of δουλόω is salient in this moral warning, so 'enslaved' fits the project's preference for explicit bondage language.
- source_word: ἐκλαμβάνει αὐτὸ πρὸς τὴν πονηρὰν ἐπιθυμίαν
  chosen: interprets it in terms of that passion, toward his evil desire
  alternatives:
  - takes it as serving his evil desire
  - construes it for his wicked craving
  lexicon: LSJ
  rationale: The sense is that even good words are misread through the lens of lust. 'Interprets it in terms of' preserves the cognitive distortion.
- source_word: κλίνας γόνυ
  chosen: bending my knee
  alternatives:
  - bowing the knee
  - kneeling
  lexicon: LSJ
  rationale: A slightly formal rendering preserves the testamentary and prayerful register.
- source_word: λύτρωσιν ἐξ αὐτῆς
  chosen: deliverance from her
  alternatives:
  - release from her
  - redemption from her
  lexicon: LSJ
  rationale: λύτρωσις here is practical rescue, not atonement language; 'deliverance' is natural and weighty.
- source_word: μετὰ βίας ἐφελκομένη με εἰς συνουσίαν
  chosen: dragging me violently toward intercourse
  alternatives:
  - pulling me by force into sexual union
  - trying to drag me into relations
  lexicon: LSJ
  rationale: συνουσία here is plainly sexual intercourse. The translation states this directly without euphemistic flattening.
- source_word: μαινομένη
  chosen: in her frenzy
  alternatives:
  - raving
  - being mad with passion
  lexicon: LSJ
  rationale: The term suggests a maddened state; 'in her frenzy' captures both emotional excess and loss of restraint.
- source_word: χιτών
  chosen: tunic
  alternatives:
  - garment
  - cloak
  lexicon: LSJ
  rationale: χιτών is specifically the inner garment/tunic, and the Genesis allusion is better preserved with the more precise term.
- source_word: ἐσυκοφάντησέ με
  chosen: slandered me
  alternatives:
  - falsely accused me
  - maligned me
  lexicon: LSJ
  rationale: The verb implies false accusation with malicious intent. 'Slandered me' is concise, though the false-charge nuance is noted in alternatives.
- source_word: εἰρκτήν
  chosen: dungeon
  alternatives:
  - prison
  - jail
  lexicon: LSJ
  rationale: The term can denote a place of confinement; 'dungeon' fits the severity and the Pharaoh setting.
- source_word: συνείχετο ἀπὸ τῆς λύπης
  chosen: was constrained by grief
  alternatives:
  - was overcome by grief
  - was afflicted with grief
  lexicon: LSJ
  rationale: συνέχω can mean be pressed hard or afflicted. 'Constrained by grief' preserves the literal pressure imagery while remaining readable.
