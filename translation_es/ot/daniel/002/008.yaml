- from: 'El rey respondió y dijo[a]: «Con certeza sé que ustedes procuran ganar tiempo, porque han visto que el asunto se ha apartado de mí».'
  to: 'El rey respondió y dijo[a]: «Sé con certeza que ustedes procuran ganar tiempo, porque han visto que el asunto ha salido de mí».'
  rationale: Se ajusta el orden a «Sé con certeza» para mejor fluidez, y se reemplaza «se ha apartado de mí» por «ha salido de mí» para acercarse más al valor básico del arameo y al razonamiento del POB inglés, preservando al mismo tiempo la ambigüedad textual. También se afina la nota para incluir «la palabra» como alternativa explícita más cercana al campo semántico de מִלְּתָא.
