  rationale: Se ajusta el registro de הִנֵּה a «He aquí» para un tono profético más digno, y se corrige כְּזֶרֶם de «torbellino» a «tormenta» para representar con mayor fidelidad la imagen de tormenta violenta/aguacero del hebreo y del POB inglés. También se armoniza la nota b con esa imagen revisada. No se requieren cambios doctrinales ni estructurales.
