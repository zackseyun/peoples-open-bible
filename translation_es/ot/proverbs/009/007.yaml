  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Burlador», «deshonra», «reprende» y «hombre malvado» son compatibles con el audit trail. La excepción relevante es mumo: se recomienda «oprobio» como equivalente más natural del resultado metafórico en español, preservando en nota la literalidad «su mancha».'
