translation:
  language: es
  text: No harán distinción de personas en el juicio[a]; al pequeño y al grande los oirán por igual. No se amedrentarán[b] delante de ningún hombre, porque el juicio le pertenece a Dios. Y el asunto que les resulte demasiado difícil, me lo traerán, y yo lo oiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «reconocer rostros en el juicio»; es un modismo que significa mostrar parcialidad o favoritismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No tendrán miedo delante de ningún hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַכִּירוּ פָנִים
  english_pob_choice: show partiality
  chosen_spanish: hacer distinción de personas
  alternatives_spanish:
  - mostrar parcialidad
  - mostrar favoritismo
  - reconocer rostros
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en contexto judicial, significa favorecer a una persona sobre otra. En español, «hacer distinción de personas» conserva el sentido legal y suena natural en un registro bíblico contemporáneo; «mostrar parcialidad» también es posible, pero la primera fórmula recoge mejor el trasfondo judicial sin sonar demasiado técnica.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio legal
  - en la justicia
  - en una causa
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט se refiere al acto de juzgar y decidir casos, no solo a la idea abstracta de justicia. «En el juicio» mantiene el marco forense del verso y el paralelismo con el resto de la instrucción.
- source_word: כַּקָּטֹן כַּגָּדֹל
  english_pob_choice: the small and the great alike
  chosen_spanish: al pequeño y al grande los oirán por igual
  alternatives_spanish:
  - al pequeño y al grande por igual
  - al pequeño y al grande igualmente
  - al menor y al mayor por igual
  lexicon: HALOT
  rationale: La pareja contrasta estatus social bajo y alto. «Pequeño» y «grande» conservan el contraste sin reinterpretarlo; «por igual» expresa el valor distributivo del hebreo y del inglés POB, que pide escuchar a ambos con la misma atención.
- source_word: תִּשְׁמָעוּן
  english_pob_choice: you shall hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - darán oído
  - oirán la causa
  lexicon: HALOT
  rationale: En contexto judicial, שׁמע implica atender una causa o escuchar un caso. «Oirán» reproduce la sencillez del verbo y permite el matiz forense; añadir «por igual» ayuda a que el sentido distributivo quede explícito en español.
- source_word: תָגוּרוּ
  english_pob_choice: be intimidated
  chosen_spanish: se amedrentarán
  alternatives_spanish:
  - tendrán miedo
  - se asustarán
  - se dejarán intimidar
  lexicon: HALOT
  rationale: El verbo aquí expresa retraerse por temor ante una persona. «Se amedrentarán» comunica mejor la presión de intimidación en un contexto judicial que «tendrán miedo», y evita suavizar el tono.
- source_word: מִפְּנֵי אִישׁ
  english_pob_choice: by any man
  chosen_spanish: delante de ningún hombre
  alternatives_spanish:
  - ante ningún hombre
  - por causa de ningún hombre
  - frente a ningún hombre
  lexicon: HALOT
  rationale: La frase hebrea literalmente dice «de delante de un hombre» con valor genericamente negativo. «Delante de ningún hombre» conserva el universal negativo del mandato y el singular genérico masculino; «ante ningún hombre» también es viable, pero «delante de» refleja mejor el trasfondo espacial de la expresión.
- source_word: כִּי הַמִּשְׁפָּט לֵאלֹהִים הוּא
  english_pob_choice: for the judgment belongs to God
  chosen_spanish: porque el juicio le pertenece a Dios
  alternatives_spanish:
  - porque el juicio es de Dios
  - porque el juicio pertenece a Dios
  - pues el juicio es de Dios
  lexicon: HALOT
  rationale: El hebreo afirma que el juicio está bajo la posesión/autoridad de Dios. «Le pertenece a Dios» preserva esa relación de pertenencia sin convertirla en una abstracción impersonal; el dativo con «le» ayuda a conservar la dirección del hebreo.
- source_word: וְהַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la causa
  - el caso
  - la cuestión
  lexicon: HALOT
  rationale: En un contexto judicial, דָּבָר puede referirse a un asunto o caso sometido a decisión. «Asunto» es suficientemente amplio y natural en español; evita redundar con «juicio» y no restringe innecesariamente el alcance.
- source_word: אֲשֶׁר יִקְשֶׁה מִכֶּם
  english_pob_choice: that is too difficult for you
  chosen_spanish: que les resulte demasiado difícil
  alternatives_spanish:
  - que sea demasiado difícil para ustedes
  - que les quede demasiado difícil
  - que les sea demasiado difícil
  lexicon: HALOT
  rationale: La expresión hebrea señala una dificultad real para los jueces. «Les resulte demasiado difícil» conserva el carácter situacional e impersonal del hebreo, y suena natural en español sin perder la tensión de incapacidad.
- source_word: תַּקְרִבוּן אֵלַי
  english_pob_choice: you shall bring to me
  chosen_spanish: me lo traerán
  alternatives_spanish:
  - me lo presentarán
  - me lo llevarán
  - lo acercarán a mí
  lexicon: HALOT
  rationale: El verbo de קרב puede significar acercar o presentar. En español jurídico común, «me lo traerán» comunica de manera clara que el caso será remitido a Moisés; el clítico «lo» retoma el asunto/caso de forma natural.
- source_word: וּשְׁמַעְתִּיו
  english_pob_choice: and I will hear it
  chosen_spanish: y yo lo escucharé
  alternatives_spanish:
  - y lo oiré
  - y lo escucharé atentamente
  - y lo atenderé
  lexicon: HALOT
  rationale: El sufijo se refiere al asunto mencionado antes. «Lo escucharé» preserva el paralelismo con «oirán» y mantiene el lenguaje judicial de oír un caso, sin sobretraducir a «resolveré».
theological_decisions:
- issue: Carácter divino del juicio en la clausula final
  english_pob_reading: Judicial decision-making is presented as belonging to God, grounding the judges' impartiality.
  chosen_spanish_reading: El juicio le pertenece a Dios, de modo que la imparcialidad de los jueces queda fundada en su autoridad.
  alternative_spanish_readings:
  - el juicio es de Dios
  - el juicio pertenece a Dios
  - el juicio está en manos de Dios
  rationale: El hebreo no solo afirma una ética judicial, sino una afirmación teológica sobre la autoridad de Dios sobre el juicio. «Le pertenece a Dios» mantiene la afirmación sin introducir una explicación más amplia que no está explícita en el versículo.
  doctrine_reference: Preservar la afirmación teológica tal como aparece en el texto, sin resolverla en una doctrina más extensa.
- issue: Sentido genérico de אִישׁ
  english_pob_reading: Rendered as 'man' in 'by any man.'
  chosen_spanish_reading: Se conserva el masculino genérico en «ningún hombre».
  alternative_spanish_readings:
  - nadie
  - ninguna persona
  - ningún ser humano
  rationale: El hebreo usa un singular masculino con valor genérico. «Hombre» conserva esa forma y el tono del original; aunque «nadie» sería más natural, borraría el dato léxico que la política del proyecto pide mantener cuando sea posible.
  doctrine_reference: 'Sexo gramatical y fuerza genérica: mantener la forma cuando el hebreo la emplea con valor inclusivo.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin copiarlo mecánicamente: se mantuvo el marco judicial, el paralelo pequeño/grande, la fuerza de intimidación de תָגוּרוּ y la pertenencia del juicio a Dios. No se registraron revisiones previas en el paquete, y el consenso de revisión indica alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino, sino «Dios».
  - Se mantuvo un registro judicial uniforme con «juicio», «asunto», «oirán» y «escucharé».
  - «Hombre» se conserva como masculino genérico, conforme a la política del proyecto y al hebreo singular.
