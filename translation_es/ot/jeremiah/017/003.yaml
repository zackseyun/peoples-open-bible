revisions:
- from: Mi montaña en el campo[a]—tu riqueza[b], todos tus tesoros, y tus lugares altos[c] a causa del pecado[d] en todo tu territorio—Iahvé los daré como botín.
  to: Mi montaña en el campo[a]—tu riqueza[b], todos tus tesoros, y tus lugares altos a causa del pecado[c] en todo tu territorio[d]—los daré como botín.
  rationale: La revisión elimina la adición no atestiguada de «Iahvé», corrige la sintaxis española, y recoloca la nota de alternativa donde realmente corresponde en la frase causal. También añade una nota breve para el matiz distributivo de «בכל גבוליך», preservando mejor la documentación inglesa de «throughout all your territory» sin recargar el texto principal.
  reviewer_model: gpt-5.4
