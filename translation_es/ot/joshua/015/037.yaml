lexical_decisions:
- source_word: צְנָן
  english_pob_choice: Zenan
  chosen_spanish: Zenán
  alternatives_spanish:
  - Zenan
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en la lista territorial de Judá; en español conviene conservar la transliteración como topónimo. Se adapta solo la acentuación gráfica al patrón español para lectura natural, sin traducir el sentido posible del término.
- source_word: חֲדָשָׁה
  english_pob_choice: Hadashah
  chosen_spanish: Hadasá
  alternatives_spanish:
  - Hadashah
  - Jadasá
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar, no como adjetivo 'nuevo'. Se mantiene como topónimo transliterado; la forma con acento final favorece la pronunciación española y evita leerlo como traducción semántica.
- source_word: מִגְדַּל גָּד
  english_pob_choice: Migdal-gad
  chosen_spanish: Migdal-gad
  alternatives_spanish:
  - Torre de Gad
  lexicon: HALOT
  rationale: El hebreo puede significar 'torre', pero en este contexto la POB inglesa lo trata como nombre establecido de lugar. Por eso se conserva como topónimo compuesto, sin volcarlo a 'Torre de Gad' en el texto principal.
- source_word: וַ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Gramática española
  rationale: Conjunción copulativa normal para unir los elementos de la serie en español.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Gramática española
  rationale: Conjunción copulativa para el último elemento de la lista; en español la forma simple 'y' es la más natural ante este topónimo.
translation_notes:
  revision_awareness: Se corrige el problema anterior eliminando la nota sin anclaje. No se añaden notas al pie porque la decisión de conservar 'Migdal-gad' como topónimo ya queda reflejada directamente en la traducción y no requiere alternativa anclada para este verso aislado.
  spanish_consistency_notes:
  - Se usa transliteración de topónimos en todo el verso, en coherencia con el tratamiento de nombres propios del original.
  - Se evita introducir una glosa 'Torre de Gad' en el texto principal para no deshacer el estatus toponímico documentado por la POB inglesa.
  - La puntuación sigue el patrón de lista breve con comas y 'y' antes del último elemento.
