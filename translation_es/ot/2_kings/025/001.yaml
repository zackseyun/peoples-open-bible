base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/001.yaml
  text: And it happened in the ninth year of his reign[a], in the tenth month, on the tenth day of the month, that Nebuchadnezzar king of Babylon came, he and all his army, against Jerusalem[b], and encamped against it and built a siege wall around it.
  footnotes:
  - marker: a
    text: Or 'siegeworks' or 'siege rampart' for the Hebrew דָּיֵק, a term for military works built against a city during a siege.
    reason: lexical_alternative
  - marker: b
    text: The name may also be rendered 'Nebuchadrezzar' in some transliteration traditions.
    reason: lexical_alternative
