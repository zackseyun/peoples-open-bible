translation:
  language: es
  text: si hubiéramos edificado para nosotros un altar para apartarnos de seguir a Yahvé, o para ofrecer sobre él holocausto o ofrenda vegetal, o para hacer sobre él sacrificios de paz[a], que Yahvé mismo lo[b] demande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sacrificios de paz» también puede traducirse «sacrificios de comunión».
    reason: lexical_alternative
  - marker: b
    text: 'O: «que Yahvé mismo pida cuenta de ello», es decir, que nos llame a rendir cuentas por ello.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִבְנוֹת לָנוּ מִזְבֵּחַ
  english_pob_choice: if we built for ourselves an altar
  chosen_spanish: si hubiéramos edificado para nosotros un altar
  alternatives_spanish:
  - si hubiéramos construido para nosotros un altar
  - si construyéramos para nosotros un altar
  lexicon: HALOT
  rationale: El infinitivo con ל en este contexto juramentario expresa condición. En español, el pluscuamperfecto de subjuntivo transmite bien la hipótesis contrafactual. 'Edificado' mantiene un registro bíblico digno y 'para nosotros' conserva לָנוּ.
- source_word: לָשׁוּב מֵאַחֲרֵי יְהוָה
  english_pob_choice: to turn away from following Yahweh
  chosen_spanish: para apartarnos de seguir a Yahvé
  alternatives_spanish:
  - para volver atrás de Yahvé
  - para apartarnos de Yahvé
  lexicon: HALOT
  rationale: שׁוּב con מֵאַחֲרֵי expresa dejar de seguir, literalmente volverse desde detrás de alguien. 'Apartarnos de seguir' conserva la imagen de seguimiento y la fuerza de desvío/apostasía sin sonar forzado en español.
- source_word: וְאִם לְהַעֲלוֹת עָלָיו עוֹלָה
  english_pob_choice: or if to offer on it burnt offering
  chosen_spanish: o para ofrecer sobre él holocausto
  alternatives_spanish:
  - o para ofrecer sobre él un holocausto
  - o para subir sobre él holocausto
  lexicon: HALOT
  rationale: 'הַעֲלוֹת con עוֹלָה es lenguaje sacrificial técnico: ''ofrecer'' comunica el acto cultual y ''holocausto'' es la equivalencia habitual de עוֹלָה. Se evita ''subir'' por sonar ambiguo en español.'
- source_word: וּמִנְחָה
  english_pob_choice: and grain offering
  chosen_spanish: o ofrenda vegetal
  alternatives_spanish:
  - o ofrenda de cereal
  - o oblación
  lexicon: HALOT
  rationale: Para מִנְחָה, 'ofrenda vegetal' es una opción clara y ampliamente inteligible en español eclesial, preservando la referencia a una ofrenda no animal. Se evita 'ofrenda' a secas por perder especificidad; 'oblación' sería más tradicional pero menos transparente.
- source_word: וְאִם לַעֲשׂוֹת עָלָיו זִבְחֵי שְׁלָמִים
  english_pob_choice: or if to make on it sacrifices of peace offerings
  chosen_spanish: o para hacer sobre él sacrificios de comunión
  alternatives_spanish:
  - o para ofrecer sobre él sacrificios de comunión
  - o para hacer sobre él sacrificios de paz
  lexicon: HALOT
  rationale: זִבְחֵי שְׁלָמִים admite 'sacrificios de paz' o 'de comunión'. 'Comunión' comunica mejor el sentido relacional/covenantal del término y es natural en español bíblico. Se conserva 'hacer' para reflejar la estructura verbal amplia del hebreo, aunque 'ofrecer' sería una alternativa idiomática.
- source_word: יְהוָה הוּא יְבַקֵּשׁ
  english_pob_choice: may Yahweh himself require it
  chosen_spanish: Yahvé mismo lo requerirá
  alternatives_spanish:
  - Yahvé mismo lo pedirá cuenta
  - Yahvé mismo nos pedirá cuenta de ello
  lexicon: HALOT
  rationale: יְבַקֵּשׁ en este juramento tiene valor de exigir cuenta o reclamar responsabilidad. El español 'lo requerirá' mantiene la brevedad y la fuerza judicial; 'pedirá cuenta' explicita mejor la implicación, pero añade más palabras. Se conserva 'mismo' para traducir הוּא como énfasis.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; conforme al criterio del proyecto, se vierte como 'Yahvé' en el cuerpo principal. Se evita 'SEÑOR' porque oculta el nombre propio divino sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza juramentaria del cierre
  english_pob_reading: may the LORD himself require it
  chosen_spanish_reading: Yahvé mismo lo requerirá
  alternative_spanish_readings:
  - que Yahvé mismo lo requiera
  - Yahvé mismo lo requerirá
  rationale: El hebreo continúa un juramento autoimprecatorio; en español, el futuro simple conserva el carácter de exigencia/juicio sin introducir una modalidad que no es explícita en el hebreo. Dado que la formulación española no puede reproducir exactamente el matiz inglés con 'may', se opta por una equivalencia formal que preserve la responsabilidad judicial implícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés, que corrigió la coordinación para reflejar la estructura disyuntiva repetida (''or grain offering''). En español se mantuvo la misma secuencia disyuntiva con ''o'', y se preservó la lógica cultual del hebreo: altar para apartarse de Yahvé, o para holocausto, o para ofrenda vegetal, o para sacrificios de comunión. Se tuvo en cuenta también la observación del auditor sobre la fuerza del cierre como juramento, aunque el español final usa futuro simple por naturalidad y para conservar el sentido de exigencia judicial.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Holocausto'', ''ofrenda vegetal'' y ''sacrificios de comunión'' mantienen un registro bíblico inteligible y distinguen los tipos sacrificiales.'
  - Se conservó 'seguir' para מֵאַחֲרֵי, evitando reducirlo a una simple separación geográfica o emocional.
  - No se introdujo 'Cristo' ni terminología del NT; el pasaje es puramente veterotestamentario.
  - La nota al pie se ancla en 'lo' porque el hebreo permite entender que Yahvé requerirá la acción o pedirá cuentas de ella.
