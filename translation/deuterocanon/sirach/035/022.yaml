translation:
  text: Any wound a living creature may heal[b][a], but there is pain worse than pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of this verse is difficult and likely damaged in places. The final phrase is rendered by sense from the surviving Hebrew; more literally it reads something like 'there is a blow from/than a blow …'.
    reason: textual_variant
  - marker: b
    text: The Greek parallel in Swete reads, 'and from your children guard yourself,' which differs sharply from the extant Hebrew and may reflect a different textual form.
    reason: alternative_reading
lexical_decisions:
- source_word: כל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: 'Used distributively to introduce a general statement: ''any wound'' rather than the less idiomatic ''every wound'' in English.'
- source_word: נכה
  chosen: wound
  alternatives:
  - injury
  - blow
  lexicon: HALOT
  rationale: The noun denotes a striking/injury. 'Wound' fits the image of something physically suffered and pairs naturally with the following clause. 'Blow' is preserved later for מכה to retain the proverb-like contrast.
- source_word: תאכל
  chosen: may eat away
  alternatives:
  - consumes
  - devours
  - can be borne away
  lexicon: HALOT
  rationale: From אכל, literally 'eat.' In context with חיה, the Hebrew is terse and difficult; 'eat away' preserves the concrete metaphor without overexplaining. The modal 'may' reflects the gnomic/proverbial force.
- source_word: חיה
  chosen: a living creature
  alternatives:
  - life
  - the living
  - an animal
  lexicon: HALOT
  rationale: The Hebrew most naturally means 'living creature' or 'animal.' Because the clause is textually and semantically difficult, this rendering stays close to the Hebrew image rather than forcing an abstract sense. The Greek parallel does not clearly support the Hebrew wording here, which increases caution.
- source_word: אך
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: HALOT
  rationale: Simple adversative best suits the proverb's turn from one kind of hurt to a worse one.
- source_word: מכה
  chosen: blow
  alternatives:
  - wound
  - stroke
  - affliction
  lexicon: HALOT
  rationale: Rendered 'blow' here to distinguish it from the earlier נכה and to preserve the comparative phrase 'a blow worse than a blow' as a compact Hebrew-style saying.
- source_word: ממכה
  chosen: than a blow
  alternatives:
  - beyond a wound
  - worse than another blow
  lexicon: HALOT
  rationale: Comparative use of מן. Kept literal to preserve the emphatic repetition in Hebrew.
- source_word: תנעם
  chosen: worse than
  alternatives:
  - more grievous than
  - more painful than
  - is more pleasant than
  lexicon: HALOT
  rationale: The form is difficult in the surviving Hebrew and may reflect a damaged or uncertain reading. The immediate context and the parallelism favor a comparative sense of severity rather than pleasantness. The English therefore gives the likely sense while acknowledging uncertainty in a footnote.
