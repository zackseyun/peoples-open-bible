translation:
  language: es
  text: El león[a], poderoso entre las bestias, no retrocede ante ninguno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un león, poderoso entre los animales». El hebreo usa una palabra poética para «león» y un término amplio para la vida animal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִשׁ
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - un león
  - el león
  lexicon: HALOT
  rationale: לַיִשׁ es un término poético para 'león'. En español, 'el león' conserva bien el valor proverbial y emblemático; 'un león' también sería posible, pero suena un poco menos sentencioso en este contexto.
- source_word: גִּבּוֹר
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - valiente
  - mighty
  lexicon: HALOT
  rationale: גִּבּוֹר expresa fuerza, poder o proeza. 'Poderoso' transmite con naturalidad esa idea en español y mantiene el tono elevado del proverbio sin añadir matiz militar innecesario.
- source_word: בַּבְּהֵמָה
  english_pob_choice: among beasts
  chosen_spanish: entre las bestias
  alternatives_spanish:
  - entre los animales
  - entre las fieras
  lexicon: HALOT
  rationale: La construcción con בְּהֵמָה señala el ámbito animal en general. 'Entre las bestias' conserva el paralelismo y el registro proverbial; 'entre los animales' es más neutro, pero menos marcado.
- source_word: וְלֹא יָשׁוּב
  english_pob_choice: and does not turn back
  chosen_spanish: y no retrocede
  alternatives_spanish:
  - y no vuelve atrás
  - y no se da vuelta
  lexicon: HALOT
  rationale: שׁוּב literalmente es 'volver/volver atrás'. En contexto describe que no cede ni se retira. 'No retrocede' comunica bien esa imagen en español con naturalidad; 'no vuelve atrás' es más literal.
- source_word: מִפְּנֵי כֹל
  english_pob_choice: before any
  chosen_spanish: ante nadie
  alternatives_spanish:
  - ante cualquiera
  - delante de cualquiera
  - ante todo
  lexicon: HALOT
  rationale: 'מִפְּנֵי es ''delante de'' o ''ante'' en sentido de enfrentamiento o retirada. כֹל es amplio (''cualquiera'', ''nadie'', ''todo''). ''Ante nadie'' en español refleja el valor totalizante de la negación: el león no retrocede ante ningún ser.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés; no se introdujeron cambios de sentido. Se mantuvo la imagen proverbial del león como ejemplo de valentía y poder, con una equivalencia española natural para la negación final.
  spanish_consistency_notes:
  - Se prefirió 'león' en singular definido para conservar el valor emblemático del proverbio, coherente con la decisión inglesa.
  - '''Bestias'' se mantuvo para reproducir el registro elevado y la amplitud del término hebreo sin reducirlo a un animal específico.'
  - '''Ante nadie'' resume la negación total de מִפְּנֵי כֹל sin añadir un sujeto ausente en el hebreo.'
