translation:
  language: es
  text: 'Por tanto[a], oh rey, que mi consejo te sea aceptable: rompe con tus pecados por medio de la justicia, y con tus iniquidades mostrando misericordia a los pobres, para que quizá haya una prolongación de tu prosperidad[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces». La partícula aramea es inferencial y puede introducir la conclusión de Daniel con matiz ligeramente variable.
    reason: lexical_alternative
  - marker: b
    text: O «de tu tranquilidad» o «de tu paz». El término final puede abarcar bienestar, seguridad o reposo; en el contexto real del rey, «prosperidad» capta mejor el sentido global.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce una conclusión inferencial. «Por tanto» preserva el valor conclusivo con registro digno y natural en español.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: HALOT
  rationale: Es un vocativo directo; «oh rey» conserva la apelación formal sin sonar artificioso.
- source_word: מִלְכִּי
  english_pob_choice: my counsel
  chosen_spanish: mi consejo
  alternatives_spanish:
  - mi consejo prudente
  - mi consejo/advice
  lexicon: HALOT
  rationale: «Consejo» reproduce el sentido formal de la exhortación de Daniel mejor que un simple «consejo» coloquial o «consejo prudente» más interpretativo.
- source_word: יִשְׁפַּר עֲלָיִךְ
  english_pob_choice: let my counsel be acceptable to you
  chosen_spanish: acepta mi consejo
  alternatives_spanish:
  - que mi consejo te sea agradable
  - que mi consejo te parezca bien
  lexicon: HALOT
  rationale: El arameo es idiomático; en español, una forma imperativa respetuosa comunica la aceptación requerida con claridad. Mantiene el tono deferente del original sin perder fluidez.
- source_word: וְחֲטָיָךְ
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus faltas
  - tus ofensas
  lexicon: HALOT
  rationale: «Pecados» es el equivalente moral y teológico más directo y natural; evita suavizar el término.
- source_word: בְּצִדְקָה
  english_pob_choice: by righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - por justicia
  - mediante justicia
  - con rectitud
  lexicon: HALOT
  rationale: El sustantivo expresa rectitud/justicia práctica. «Con justicia» permite la relación instrumental o acompañante sin sonar forzado en español, y mantiene la tensión entre conducta justa y esfera legal-moral.
- source_word: פְרֻק
  english_pob_choice: break off
  chosen_spanish: rompe
  alternatives_spanish:
  - corta
  - pon fin a
  - abandona
  lexicon: HALOT
  rationale: El verbo tiene imagen de ruptura/desprendimiento. «Rompe» conserva la fuerza metafórica y la urgencia de cesar el pecado sin importar una lectura expiatoria que el contexto no exige.
- source_word: וַעֲוָיָתָךְ
  english_pob_choice: your iniquities
  chosen_spanish: tus iniquidades
  alternatives_spanish:
  - tus maldades
  - tus culpas
  - tus perversidades
  lexicon: HALOT
  rationale: «Iniquidades» mantiene la diferenciación con «pecados» y preserva el matiz de culpa o perversidad del término arameo.
- source_word: בְּמִחַן עֲנָיִן
  english_pob_choice: by showing mercy to the poor
  chosen_spanish: con misericordia para con los pobres
  alternatives_spanish:
  - mostrando misericordia a los pobres
  - con compasión hacia los pobres
  - con misericordia hacia los pobres
  lexicon: HALOT
  rationale: El hebreo/arameo indica trato compasivo hacia los necesitados; en español, «misericordia para con los pobres» conserva el contenido ético y el destinatario, sin reducirlo a simple limosna.
- source_word: הֵן
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  - puede ser que
  lexicon: HALOT
  rationale: La partícula introduce posibilidad, no certeza. «Quizá» reproduce bien esa cautela en español.
- source_word: תֶּהֱוֵא אַרְכָה
  english_pob_choice: there may perhaps be a prolonging
  chosen_spanish: haya un prolongamiento
  alternatives_spanish:
  - haya una prolongación
  - se prolongue
  - haya una extensión
  lexicon: HALOT
  rationale: Se conserva la idea de «prolongación/prolongamiento» sin sobreespecificar. «Prolongamiento» refleja el sustantivo arameo con suficiente literalidad y naturalidad.
- source_word: לִשְׁלֵוְתָךְ
  english_pob_choice: of your prosperity
  chosen_spanish: de tu prosperidad
  alternatives_spanish:
  - de tu tranquilidad
  - de tu paz
  - de tu bienestar
  lexicon: HALOT
  rationale: En contexto real y monárquico, el término puede abarcar bienestar/seguridad/prosperidad. «Prosperidad» es la opción más adecuada para la situación del rey, sin negar los matices de paz o tranquilidad.
theological_decisions:
- issue: Si la exhortación implica una expiación meritoria por obras o un llamado al arrepentimiento expresado en justicia y misericordia
  english_pob_reading: A call for the king to turn from sin through righteous and merciful conduct, without implying that human works independently atone for guilt.
  chosen_spanish_reading: Un llamado al rey a apartarse del pecado mediante conducta justa y misericordiosa, sin sugerir que las obras humanas expíen por sí mismas la culpa.
  alternative_spanish_readings:
  - Una lectura de limosna o misericordia como redención meritoria del pecado
  - Un mandato de ganar el perdón por obras
  rationale: 'Se mantiene la tensión del texto: hay un imperativo ético real, pero el verbo se vierte como ruptura/abandono, no como redención meritoria. Así se conserva el peso moral del pasaje sin importar una doctrina de expiación por obras que el arameo no exige.'
  doctrine_reference: Principio de primacía del original; evitar introducir una soteriología ajena al contexto inmediato.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB inglés: se mantiene la estructura conclusiva con una partícula equivalente a «then/therefore», y se conserva el matiz tentativo de הֵן con «quizá»; también se preserva la elección de «that» en el valor final mediante una construcción final natural en español («de modo que quizá haya...»), sin introducir una certeza mayor que la del original.'
  spanish_consistency_notes:
  - Se usa «pecados» para חטא y «iniquidades» para עֲוָיוֹת para conservar el paralelismo y la distinción semántica.
  - Se evita «SEÑOR» o equivalente de máscara, porque el texto no contiene el nombre divino.
  - Se mantiene «prosperidad» para שְׁלוֵתָךְ, aunque «tranquilidad/paz» siguen siendo lecturas posibles y se consignan en nota.
  - Se evita «limosna» porque el arameo enfatiza misericordia/compasión hacia los pobres, no una práctica eclesiástica específica.
  - Se conserva un registro formal y público adecuado para una Biblia de dominio abierto y lectura eclesial amplia.
