translation:
  language: es
  text: Una alabanza de David[a]. Te exaltaré, mi Dios el Rey[b][c], y bendeciré tu nombre por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David»; לְדָוִד puede indicar autoría o asociación.
    reason: alternative_reading
  - marker: b
    text: O «te ensalzaré».
    reason: lexical_alternative
  - marker: c
    text: O «mi Dios y Rey»; el hebreo más literalmente dice «mi Dios, el Rey».
    reason: alternative_reading
lexical_decisions:
- source_word: תְּהִלָּה
  english_pob_choice: A praise
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Una alabanza
  - Un canto de alabanza
  lexicon: HALOT
  rationale: En encabezados de salmos, תְּהִלָּה funciona como título nominal. En español, «Un salmo» comunica de manera natural la función de encabezamiento sin volverlo una paráfrasis verbal, y preserva el carácter de rótulo del texto.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: La preposición ל en superscripciones es ambigua entre autoría, dedicación o asociación. «De David» conserva esa amplitud, como en el audit trail inglés.
- source_word: אֲרוֹמִמְךָ
  english_pob_choice: I will exalt you
  chosen_spanish: Yo te exaltaré
  alternatives_spanish:
  - Yo te ensalzaré
  - Yo te levantaré en alto
  lexicon: HALOT
  rationale: El verbo expresa elevar/exaltar. «Exaltar» es el equivalente español más directo y solemne; mantiene el tono de adoración sin caer en un calco torpe.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi dios
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona exige «mi». «Dios» conserva el referente al Dios verdadero; la mayúscula sigue la convención reverente en español bíblico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - mi Rey
  - el soberano
  lexicon: HALOT
  rationale: El artículo definido debe mantenerse. «El Rey» preserva la apposición con «mi Dios» sin introducir un posesivo que no está en el hebreo.
- source_word: וַאֲבָרֲכָה
  english_pob_choice: and I will bless
  chosen_spanish: y bendeciré
  alternatives_spanish:
  - y bendeciré yo
  - y alabaré
  lexicon: HALOT
  rationale: ברך en esta construcción expresa bendecir en acto de alabanza. «Bendeciré» respeta el término bíblico sin sustituirlo por «alabaré», que perdería el eco léxico del hebreo.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: «Nombre» conserva el valor bíblico de identidad y reputación revelada, más que una simple etiqueta personal.
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La fórmula geminada intensifica la duración indefinida. «Por siempre y para siempre» es idiomático en español y preserva la repetición enfática del hebreo.
theological_decisions:
- issue: Relación entre «mi Dios» y «el Rey» en la apposición hebrea
  english_pob_reading: my God the King
  chosen_spanish_reading: mi Dios, el Rey
  alternative_spanish_readings:
  - mi Dios y Rey
  - mi Dios, el Rey
  rationale: 'El hebreo presenta una apposición: Dios es identificado como Rey. En español, la coma puede ayudar a leerlo como appositivo sin añadir una conjunción inexistente. Aquí se adopta «mi Dios, el Rey» para claridad natural, manteniendo la identidad real de Dios sin transformar la frase en una coordinación.'
  doctrine_reference: Soberanía divina / realeza de Yahvé
- issue: Tratamiento del encabezado del salmo
  english_pob_reading: A praise of David
  chosen_spanish_reading: Un salmo de David
  alternative_spanish_readings:
  - Una alabanza de David
  - Un canto de alabanza de David
  rationale: El rótulo hebreo es una superscripción de género y asociación. «Un salmo de David» transmite la función litúrgica del encabezado en español actual sin forzar una traducción demasiado literal que suene extraña.
  doctrine_reference: Superscripciones de los Salmos / función litúrgica del título
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la puntuación entre «my God» y «the King» para reflejar la apposición directa. En español se optó por una coma explicativa («mi Dios, el Rey») para hacer explícita la relación appositiva sin alterar el contenido, y se mantuvo la fórmula enfática «por siempre y para siempre» para equivaler «forever and ever».
  spanish_consistency_notes:
  - Se preserva el nombre divino como «Dios» en este verso, porque el hebreo usa אֱלֹהַי / הַמֶּלֶךְ y no el tetragrámaton.
  - Se mantuvo «bendeciré» en lugar de «alabaré» para conservar el campo léxico de ברך, aunque el sentido funcional es doxológico.
  - La frase «el Rey» se conserva con artículo definido para reflejar la estructura hebrea y la realeza divina implícita en el texto.
