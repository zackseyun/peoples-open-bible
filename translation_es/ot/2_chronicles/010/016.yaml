  yaml_path: translation/ot/2_chronicles/010/016.yaml
  text: And all Israel[a], because the king did not listen to them, answered the king, saying, “What share do we have in David? We have no inheritance in the son of Jesse. Each man to your tents, O Israel! Now see to your own house[b], David.” So all Israel went to their tents.
  footnotes:
