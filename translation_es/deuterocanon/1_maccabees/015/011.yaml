translation:
  language: es
  text: Y el rey Antíoco lo persiguió, y llegó a Dora, huyendo hacia la costa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego subraya la ubicación de Dora «junto al mar»; por eso también podría entenderse «hacia la ribera del mar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - lo buscó
  - fue tras él
  lexicon: BDAG
  rationale: En contexto militar y político, διώκω expresa persecución activa. «Persiguió» conserva esa fuerza en español sin añadir matices innecesarios.
- source_word: Ἀντίοχος ὁ βασιλεύς
  english_pob_choice: King Antiochus
  chosen_spanish: el rey Antíoco
  alternatives_spanish:
  - Antíoco el rey
  - el rey Antiocho
  lexicon: LSJ
  rationale: El español natural antepone el título al nombre. «Antíoco» mantiene la forma habitual del nombre propio en español bíblico.
- source_word: ἦλθεν εἰς Δῶρα
  english_pob_choice: he came to Dora
  chosen_spanish: llegó a Dora
  alternatives_spanish:
  - vino a Dora
  - fue a Dora
  lexicon: LSJ
  rationale: ἔρχομαι puede ser «venir/ir/llegar» según el punto de vista narrativo. Aquí «llegó» expresa bien el arribo a la ciudad sin forzar la perspectiva.
- source_word: φεύγων
  english_pob_choice: fleeing
  chosen_spanish: huyendo
  alternatives_spanish:
  - mientras huía
  - al huir
  lexicon: BDAG
  rationale: El participio expresa acción concurrente o de manera. «Huyendo» reproduce de forma natural esa acción simultánea con el verbo principal.
- source_word: τὴν ἐπὶ τὴν θάλασσαν
  english_pob_choice: to the seacoast
  chosen_spanish: hacia el seacoast
  alternatives_spanish:
  - hacia la costa
  - hacia la ribera del mar
  - hacia el litoral
  lexicon: LSJ
  rationale: El griego enfatiza la zona «sobre/by the sea». Sin embargo, el préstamo inglés «seacoast» no debe trasladarse literalmente al español; la idea se expresa mejor con una frase como «hacia la costa» o «hacia la ribera del mar». Aquí se corrige a un español natural y preciso, conservando el valor geográfico del texto.
translation_notes:
  revision_awareness: 'Se corrigió el error del intento previo: la nota al pie debía ir anclada en el texto. Además, se evitó calcar el inglés «seacoast» y se ajustó la frase para que el español sea idiomático y fiel al griego.'
  spanish_consistency_notes:
  - Se mantuvo «Antíoco» como forma española habitual del nombre.
  - Se tradujo el participio φεύγων como acción concurrente («huyendo»), no como una cláusula explicativa separada.
  - La expresión final conserva la referencia geográfica costera del griego sin introducir una formulación demasiado literal o extraña al español.
