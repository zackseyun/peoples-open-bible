translation:
  language: es
  text: 'Había ocho tablas[a], con sus bases[b] de plata, dieciséis bases: dos bases debajo de una tabla y dos bases debajo de cada una.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'marcos' para קְרָשִׁים; el término hebreo se refiere a las piezas estructurales verticales del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O 'basas' o 'zócalos' para אֲדָנִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: There were
  chosen_spanish: Había
  alternatives_spanish:
  - Y había
  - Existían
  lexicon: HALOT
  rationale: En un inventario descriptivo, היה se expresa naturalmente en español con una forma existencial. Se omite la conjunción inicial para evitar dureza innecesaria en la lista, manteniendo el valor descriptivo del hebreo.
- source_word: שְׁמֹנָה קְרָשִׁים
  english_pob_choice: eight frames
  chosen_spanish: ocho marcos
  alternatives_spanish:
  - ocho tablas
  - ocho planchas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קֶרֶשׁ designa las piezas estructurales verticales. 'Marcos' comunica mejor la función constructiva en español contemporáneo que 'tablas', sin perder concreción.
- source_word: וְאַדְנֵיהֶם כֶּסֶף
  english_pob_choice: with their silver bases
  chosen_spanish: con sus basas de plata
  alternatives_spanish:
  - con sus bases de plata
  - con sus zócalos de plata
  lexicon: HALOT
  rationale: אֲדָנִים nombra los apoyos metálicos del tabernáculo. 'Basas' conserva una terminología bíblica comprensible en español y mantiene el matiz de soporte físico; 'bases' es viable, pero 'basas' resulta más tradicional y preciso en este contexto.
- source_word: שִׁשָּׁה עָשָׂר אֲדָנִים
  english_pob_choice: sixteen bases
  chosen_spanish: dieciséis basas
  alternatives_spanish:
  - dieciséis bases
  - dieciséis zócalos
  lexicon: HALOT
  rationale: Se conserva el sustantivo ya elegido para אֲדָנִים y se expresa el cardinal de forma normal en español. La repetición del sustantivo tras el número se mantiene por fidelidad al hebreo, donde subraya el total.
- source_word: שְׁנֵי אֲדָנִים שְׁנֵי אֲדָנִים
  english_pob_choice: two bases under one frame, and two bases under each frame
  chosen_spanish: dos basas debajo de un marco, y dos basas debajo de cada marco
  alternatives_spanish:
  - dos basas debajo de un marco, y dos basas debajo del otro marco
  - dos basas debajo de cada marco
  lexicon: HALOT
  rationale: El hebreo repite la construcción distributiva. En español, 'debajo de cada marco' expresa mejor el valor distributivo señalado en la revisión inglesa, sin reducirlo a una simple mención de dos piezas aisladas.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - under
  lexicon: HALOT
  rationale: Para un montaje físico, 'debajo de' es más natural que un calco rígido y mantiene el sentido espacial de apoyo.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  english_pob_choice: one frame
  chosen_spanish: un marco
  alternatives_spanish:
  - el marco uno
  - el único marco
  lexicon: HALOT
  rationale: El singular con artículo y numeral en hebreo cumple una función distributiva. En español, 'un marco' reproduce ese valor con naturalidad y evita una formulación pesada.
translation_notes:
  revision_awareness: La redacción sigue el valor distributivo del hebreo y la revisión inglesa que evita limitar la cláusula final a una sola pieza adicional. Se conservó la enumeración repetida porque forma parte del patrón constructivo del versículo. Se optó por 'basas' en lugar de 'bases' para mantener una terminología bíblica española clara y consistente.
  spanish_consistency_notes:
  - Se mantiene 'marcos' para קְרָשִׁים en coherencia con el valor estructural del término en el tabernáculo.
  - Se mantiene 'basas' para אֲדָנִים como término técnico de soporte; la nota ofrece 'bases' como alternativa válida.
  - La última cláusula se traduce distributivamente con 'cada marco' para reflejar el hebreo repetido y la revisión auditada del inglés.
  - No se añadió conectivo inicial innecesario; el verso funciona como inventario descriptivo en español.
