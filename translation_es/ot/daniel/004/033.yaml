translation:
  language: es
  text: En aquel tiempo me fue devuelto[a] el entendimiento, y, para la gloria de mi reino, mi majestad y mi esplendor volvieron a mí. Mis consejeros y mis nobles me buscaron[b], y fui restablecido[c] sobre mi reino, y se me añadió una grandeza extraordinaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi razón»; el término arameo puede referirse al entendimiento o a la capacidad mental recuperada.
    reason: lexical_alternative
  - marker: b
    text: O «mis asesores y mis grandes me buscaron»; los términos pueden referirse a consejeros y altos dignatarios del reino.
    reason: lexical_alternative
  - marker: c
    text: O «fui restaurado/confirmado sobre mi reino»; el pasivo puede expresar restauración o reinstalación firme.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּהּ זִמְנָא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal aramea marca el momento de la restauración. «En aquel tiempo» suena natural en español bíblico moderno y conserva la secuencia narrativa sin añadir matices de inmediatez que el texto no exige.
- source_word: מַנְדְּעִי
  english_pob_choice: my reason
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - mi razón
  - mi entendimiento
  - mi mente
  lexicon: HALOT
  rationale: El contexto describe la recuperación tras la locura del rey. En español, «entendimiento» comunica bien la capacidad mental/restaurada sin sonar demasiado técnico; se conserva la alternativa semántica documentada por la POB inglesa.
- source_word: יְתוּב עֲלַי
  english_pob_choice: returned to me
  chosen_spanish: me volvió
  alternatives_spanish:
  - volvió a mí
  - regresó a mí
  - fue restaurado en mí
  lexicon: HALOT
  rationale: El verbo repite la idea de retorno. «Me volvió» mantiene esa imagen verbal de manera concisa y natural en español, con el pronombre dativo que refleja el movimiento hacia el sujeto.
- source_word: לִיקַר מַלְכוּתִי
  english_pob_choice: for the glory of my kingdom
  chosen_spanish: para la gloria de mi reino
  alternatives_spanish:
  - para el honor de mi reino
  - para el esplendor de mi reino
  lexicon: HALOT
  rationale: La preposición expresa relación/finalidad. «Gloria» reproduce la dignidad real asociada al reino y sigue de cerca la opción auditada en inglés.
- source_word: הַדְרִי
  english_pob_choice: my majesty
  chosen_spanish: mi majestad
  alternatives_spanish:
  - mi honor
  - mi grandeza
  lexicon: HALOT
  rationale: El sustantivo es claramente regio. «Majestad» es el equivalente más directo y sobrio en español para una dignidad real personal.
- source_word: וְזִוִי
  english_pob_choice: splendor
  chosen_spanish: mi esplendor
  alternatives_spanish:
  - mi brillo
  - mi resplandor
  - mi apariencia
  lexicon: HALOT
  rationale: En contexto monárquico, el término apunta al resplandor o apariencia regia recuperada. «Esplendor» conserva la fuerza de la imagen sin reducirla a brillo físico.
- source_word: הַדָּבְרַי
  english_pob_choice: my counselors
  chosen_spanish: mis consejeros
  alternatives_spanish:
  - mis asesores
  - mis consejeros reales
  lexicon: HALOT
  rationale: La función cortesana es la de quienes aconsejan al rey. «Consejeros» es claro y fiel al oficio implícito.
- source_word: וְרַבְרְבָנַי
  english_pob_choice: my nobles
  chosen_spanish: mis nobles
  alternatives_spanish:
  - mis grandes
  - mis señores
  - mis magnates
  lexicon: HALOT
  rationale: El término designa a los altos dignatarios del reino. «Nobles» es idiomático en español y preserva el matiz aristocrático sin explicar de más.
- source_word: יְבַעוֹן
  english_pob_choice: sought me
  chosen_spanish: me buscaron
  alternatives_spanish:
  - me buscaron de nuevo
  - me procuraron
  - me buscaron
  lexicon: HALOT
  rationale: El verbo puede significar buscar o requerir. «Me buscaron» sigue el valor básico del hebreo/aramaico y evita añadir una dirección que no está explícita en el texto.
- source_word: עַל מַלְכוּתִי הָתְקְנַת
  english_pob_choice: I was reestablished over my kingdom
  chosen_spanish: fui restablecido sobre mi reino
  alternatives_spanish:
  - fui restaurado sobre mi reino
  - fui confirmado sobre mi reino
  - quedé restablecido sobre mi reino
  lexicon: HALOT
  rationale: La forma pasiva comunica que el rey fue colocado nuevamente en su lugar sobre el reino. «Restablecido» recoge restauración y firme reinstalación sin forzar un término técnico eclesiástico.
- source_word: רְבוּ יַתִּירָה
  english_pob_choice: surpassing greatness
  chosen_spanish: una grandeza mayor
  alternatives_spanish:
  - una grandeza sobreabundante
  - una grandeza extraordinaria
  - una grandeza superior
  lexicon: HALOT
  rationale: La frase intensifica el aumento concedido. En español, «una grandeza mayor» conserva la comparación y suena más natural que un calco más pesado, sin perder la idea de excedencia.
- source_word: הוּסְפַת לִי
  english_pob_choice: was added to me
  chosen_spanish: se me añadió
  alternatives_spanish:
  - me fue añadida
  - me fue dada
  - se me aumentó
  lexicon: HALOT
  rationale: El pasivo expresa recepción de un incremento externo. «Se me añadió» mantiene la pasividad y la idea de algo recibido, en una forma idiomática de español.
theological_decisions:
- issue: Agencia divina implícita en la restauración del rey
  english_pob_reading: Use passive formulations without inserting 'by God' into the verse.
  chosen_spanish_reading: Conservar formulaciones pasivas o de recepción sin añadir explícitamente «por Dios» en el versículo.
  alternative_spanish_readings:
  - «Dios me volvió el entendimiento»
  - «Dios me restableció sobre mi reino»
  rationale: El contexto mayor atribuye la restauración al Altísimo, pero este versículo en sí lo expresa de manera implícita. Mantener la pasiva respeta la forma del texto y evita introducir una aclaración doctrinal que no aparece aquí.
  doctrine_reference: Primacía del texto original; no importar afirmaciones doctrinales no formuladas explícitamente en el versículo.
translation_notes:
  revision_awareness: La POB inglesa revisó esta línea para volver más literal «sought me» frente a «sought me out». La redacción española sigue esa decisión con «me buscaron», manteniendo un registro formal y cercano al valor léxico básico. También se preserva la estructura pasiva de restauración y el incremento final sin explicitar agencia divina fuera del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - Se mantiene «esplendor» para זִוִי en consonancia con la decisión inglesa y con el contexto regio.
  - «Restablecido» se usa aquí como equivalente de restauración/reinstalación sobre el reino, evitando «confirmado» en el texto principal pero dejándolo como alternativa.
  - «Entendimiento» se prefiere a «razón» en el texto principal por fluidez natural en español, pero ambas opciones quedan documentadas.
  - Se conserva un tono bíblico moderno y sobrio, sin arcaísmos innecesarios.
