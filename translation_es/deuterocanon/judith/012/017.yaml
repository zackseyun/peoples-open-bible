translation:
  language: es
  text: 'Y Holofernes le dijo: «Bebe, pues, y alégrate con nosotros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὀλοφέρνης
  english_pob_choice: Holofernes
  chosen_spanish: Holofernes
  alternatives_spanish:
  - Holofernes
  lexicon: convención onomástica
  rationale: Se conserva la transliteración del nombre propio, siguiendo el uso habitual en español bíblico y la práctica del proyecto de no traducir nombres personales.
- source_word: Πίε
  english_pob_choice: Do drink
  chosen_spanish: Bebe
  alternatives_spanish:
  - Bebe, por favor
  - Toma
  lexicon: LSJ
  rationale: El imperativo aoristo de πίνω expresa una invitación/orden directa a beber. En español, «Bebe» transmite la misma fuerza con naturalidad; «por favor» suavizaría demasiado el tono.
- source_word: δὴ
  english_pob_choice: Do
  chosen_spanish: pues
  alternatives_spanish:
  - ahora
  - en verdad
  - —
  lexicon: LSJ
  rationale: δή añade énfasis e inmediatez. «Pues» conserva un matiz exhortativo y discursivo en español sin volver la frase artificial; la omisión también sería posible, pero aquí se mantiene la señal de insistencia.
- source_word: γενήθητι μεθʼ ἡμῶν εἰς εὐφροσύνην
  english_pob_choice: be merry with us
  chosen_spanish: alégrate con nosotros
  alternatives_spanish:
  - sé feliz con nosotros
  - únete a nuestra alegría
  - diviértete con nosotros
  lexicon: LSJ
  rationale: La construcción idiomática no pide un calco literal de «llega a ser»; el sentido es participar en el estado festivo del grupo. «Alégrate con nosotros» conserva la invitación a compartir la alegría y evita reducir εὐφροσύνη a simple diversión.
translation_notes:
  revision_awareness: La traducción inglesa revisó «join us in gladness» a «be merry with us» para expresar con más naturalidad la invitación festiva de γενήθητι μεθʼ ἡμῶν εἰς εὐφροσύνην. La versión española sigue esa misma línea de equivalencia óptima, usando un verbo exhortativo natural («alégrate») que preserva la dimensión de participación comunitaria y el tono imperativo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la fuerza exhortativa de los dos imperativos griegos sin sobreexplicarlos.
  - «Con nosotros» expresa el valor de μεθʼ ἡμῶν de forma explícita en español, en lugar de absorberlo por completo en un solo verbo.
