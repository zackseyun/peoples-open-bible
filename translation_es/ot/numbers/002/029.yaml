lexical_decisions:
- source_word: מַטֶּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  - clan
  lexicon: HALOT
  rationale: En el contexto censal y de campamento de Números, מַטֶּה designa una unidad tribal, no un objeto literal. «Tribu» comunica de forma natural esa unidad en español y sigue la decisión auditada del POB en inglés.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: Aquí נָשִׂיא se refiere al jefe reconocido de la tribu. «Jefe» es claro en español y evita las connotaciones monárquicas de «príncipe»; también conserva el sentido administrativo del cargo.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - de los descendientes de
  - de la casa de
  lexicon: HALOT
  rationale: La construcción hebrea se conserva de manera directa. «Hijos de» mantiene la fórmula tribal tradicional y refleja fielmente el genitivo relacional del מקור.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: Transliteración propia del proyecto
  rationale: Nombre tribal propio transliterado al español como «Neftalí», forma estable y reconocible en español bíblico.
- source_word: אֲחִירַע
  english_pob_choice: Ahira
  chosen_spanish: Ahira
  alternatives_spanish:
  - Ajira
  lexicon: Transliteración propia del proyecto
  rationale: Nombre propio conservado en transliteración; se mantiene la forma breve y convencional en español bíblico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La fórmula patronímica se expresa de modo directo en español con «hijo de», equivalente esperado y transparente.
- source_word: עֵינָן
  english_pob_choice: Enan
  chosen_spanish: Enán
  alternatives_spanish:
  - Enan
  lexicon: Transliteración propia del proyecto
  rationale: Nombre propio transliterado al español como «Enán», ajustado a la acentuación natural del español para lectura pública.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la auditoría inglesa de alta concordancia; no se documentan revisiones textuales o cambios interpretativos adicionales en este versículo.
