translation:
  language: es
  text: o masas fétidas de humo arrastradas[a], o espantosas chispas que destellan desde sus ojos, cuyo daño no solo podía aplastarlos, sino que aun su sola apariencia aterradora podía destruirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
