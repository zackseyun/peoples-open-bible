review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: el rey da la orden, se identifican tres grupos del personal del templo, se sacan los objetos idolátricos del templo de Yahvé, se queman fuera de Jerusalén y se lleva su polvo a Betel. También preserva correctamente Yahvé y la ambigüedad de אֲשֵׁרָה mediante nota. Sin embargo, hay un desajuste principal: צְבָא הַשָּׁמַיִם en este contexto se entiende mejor como «hueste del cielo» que «ejército del cielo», porque la expresión es idiomática para los cuerpos/poderes celestes venerados, no un ejército literal. Además, conviene ajustar la puntuación para una lectura más natural en español.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse ligeramente. «Guardianes del umbral» es aceptable y bastante fiel; «utensilios» también funciona. La frase general fluye bien. El cambio más recomendable es «hueste del cielo», que suena más bíblico-natural en español y evita una lectura demasiado literal-militar de «ejército».
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֲשֵׁרָה -> «Aserá» con nota adecuada; עֲפָרָם -> «su polvo» conforme a la revisión inglesa auditada. No hay conflicto con otros términos doctrinales principales. Se sugiere una excepción léxica menor frente a la decisión española documentada para צְבָא הַשָּׁמַיִם: «hueste del cielo» preserva mejor el modismo bíblico en español.'
  issues:
  - severity: medium
    issue: «todo el ejército del cielo» suena demasiado literal para צְבָא הַשָּׁמַיִם
    rationale: Aunque «ejército» reproduce el valor básico de צבא, la expresión hebrea es un modismo bíblico para la hueste celeste o los astros/poderes celestes. En español bíblico y eclesial, «hueste del cielo» comunica mejor ese sentido sin sugerir un ejército militar ordinario.
  - severity: low
    issue: La coma tras «fuera de Jerusalén» no es necesaria
    rationale: 'Puede mantenerse, pero sin esa pausa la oración fluye con más naturalidad: «fuera de Jerusalén en los campos de Cedrón».'
