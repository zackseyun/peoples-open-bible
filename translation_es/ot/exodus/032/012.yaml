translation:
  language: es
  text: '¿Por qué habrían de decir los egipcios[a]: «Los sacó con mala intención, para matarlos en las montañas y borrarlos[b] de la faz de la tierra»? Apártate de tu ardiente ira[c] y desiste[d] del daño destinado para tu pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los egipcios dirían». El hebreo presenta una pregunta retórica con matiz deliberativo.
    reason: alternative_reading
  - marker: b
    text: O «consumirlos» / «destruirlos por completo». El verbo hebreo expresa destrucción total.
    reason: lexical_alternative
  - marker: c
    text: O «tu ira ardiente» / «tu furor». La expresión hebrea conserva la imagen del calor de la ira.
    reason: lexical_alternative
  - marker: d
    text: O «cede» / «cambia de parecer». El hebreo usa lenguaje antropopático en la súplica de Moisés; «desiste» procura conservar esa fuerza sin implicar error moral en Dios.
    reason: theological_note
lexical_decisions:
- source_word: לָמָּה / לֵאמֹר יֹאמְרוּ
  english_pob_choice: Why should ... say
  chosen_spanish: ¿Por qué habrían de decir...
  alternatives_spanish:
  - ¿Por qué dirán...
  - ¿Por qué dirían...
  lexicon: HALOT
  rationale: La pregunta es retórica y deliberativa; en español, «habrían de decir» comunica mejor la fuerza de incredulidad/objeción que un futuro simple o un condicional llano.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Aquí se refiere al pueblo, no al territorio; por eso se traduce como plural personal.
- source_word: בְּרָעָה
  english_pob_choice: with evil intent
  chosen_spanish: con mala intención
  alternatives_spanish:
  - para mal
  - con intención dañina
  - con perversidad
  lexicon: HALOT
  rationale: La frase expresa motivo o propósito atribuido a Dios por los egipcios. «Mala intención» conserva ese valor de intención hostil sin sonar excesivamente arcaico.
- source_word: הוֹצִיאָם
  english_pob_choice: He brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los sacó de allí
  lexicon: HALOT
  rationale: El hifil de יצא en el contexto del éxodo se vierte naturalmente como «sacar»; en español suena más directo que una traducción más literal de «hacer salir».
- source_word: לַהֲרֹג אֹתָם
  english_pob_choice: to kill them
  chosen_spanish: para matarlos
  alternatives_spanish:
  - para matarlos a ellos
  - para darles muerte
  lexicon: HALOT
  rationale: Infinitivo de propósito claro y directo; «matar» es la equivalencia moderna más transparente.
- source_word: בֶּהָרִים
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en los montes
  - en la región montañosa
  lexicon: HALOT
  rationale: El plural hebreo apunta a un terreno montañoso; «montañas» es una correspondencia natural y comprensible en español.
- source_word: וּלְכַלֹּתָם
  english_pob_choice: and to wipe them off
  chosen_spanish: y acabarlos
  alternatives_spanish:
  - y consumirlos
  - y destruirlos por completo
  - y exterminarlos
  lexicon: HALOT
  rationale: כלה comunica destrucción total. «Acabarlos» preserva esa fuerza en español, y la continuidad con la imagen de eliminación total queda reforzada por el complemento siguiente.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: off the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la faz del suelo
  - de la faz de la tierra
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico de borrado total. «Faz de la tierra» mantiene la imagen tradicional sin perder inteligibilidad; se evita «suelo» por sonar menos idiomático en español bíblico.
- source_word: שׁוּב
  english_pob_choice: Turn from
  chosen_spanish: Vuélvete de
  alternatives_spanish:
  - Aparta tu ira
  - Vuelve atrás de
  lexicon: HALOT
  rationale: La forma imperativa pide un giro lejos de la ira. «Vuélvete de» reproduce el movimiento verbal con naturalidad y deja visible la metáfora.
- source_word: מֵחֲרוֹן אַפֶּךָ
  english_pob_choice: your burning anger
  chosen_spanish: tu ardiente ira
  alternatives_spanish:
  - tu ira ardiente
  - tu furor
  - tu ira abrasadora
  lexicon: HALOT
  rationale: La expresión literal habla del calor/furia de la ira. «Ardiente ira» preserva la metáfora y suena más fluido que una calca.
- source_word: וְהִנָּחֵם
  english_pob_choice: and relent
  chosen_spanish: y reléntate
  alternatives_spanish:
  - y cede
  - y arrepiéntete
  - y cambia de parecer
  lexicon: HALOT
  rationale: Se mantiene la tensión antropopática del hebreo. «Reléntate» intenta conservar la fuerza del verbo en un español devocional moderno sin convertirlo en mera explicación; por la misma razón se evita «arrepiéntete» para no sugerir culpa moral en Dios.
- source_word: עַל הָרָעָה
  english_pob_choice: concerning the harm
  chosen_spanish: respecto del mal
  alternatives_spanish:
  - respecto del desastre
  - acerca de la calamidad
  - en cuanto al mal
  lexicon: HALOT
  rationale: Se conserva la raíz semántica de רעה con una formulación que suene natural en español. Aquí se prefiere «mal» por la relación lexical con el hebreo, mientras el contexto evita entenderlo como mal moral en Dios.
- source_word: לְעַמֶּךָ
  english_pob_choice: for your people
  chosen_spanish: para tu pueblo
  alternatives_spanish:
  - por tu pueblo
  - contra tu pueblo
  - en favor de tu pueblo
  lexicon: HALOT
  rationale: En el contexto de intercesión y amenaza, «para tu pueblo» expresa el referente afectado por la acción divina; evita la ambigüedad de «contra» y sigue de cerca la revisión inglesa más reciente.
theological_decisions:
- issue: Anthropopathic language in וְהִנָּחֵם
  english_pob_reading: Render as 'relent' rather than 'repent' or 'change your mind.'
  chosen_spanish_reading: Traducir con «reléntate» para conservar la súplica antropopática sin implicar que Dios haya obrado mal.
  alternative_spanish_readings:
  - arrepiéntete
  - cambia de parecer
  - cede
  rationale: El hebreo usa lenguaje relacional humano en la intercesión de Moisés. La forma elegida mantiene esa tensión y evita tanto una atenuación excesiva como una carga doctrinal equivocada.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of הָרָעָה when predicated of God's threatened action
  english_pob_reading: Render as 'harm' in the main text.
  chosen_spanish_reading: Traducir como «el mal» con nota contextual implícita en la cláusula «respecto del mal destinado para tu pueblo».
  alternative_spanish_readings:
  - el desastre
  - la calamidad
  - el mal
  rationale: El sustantivo hebreo debe conservar su vínculo con la raíz anterior, pero en este versículo se refiere a una acción de juicio amenazado, no a mal moral en Dios. La redacción elegida preserva la conexión léxica y la tensión teológica.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Final prepositional relation with לְעַמֶּךָ
  english_pob_reading: '''for your people'' / ''concerning your people'' following the revision pass.'
  chosen_spanish_reading: «para tu pueblo» dentro de la frase «respecto del mal destinado para tu pueblo».
  alternative_spanish_readings:
  - para con tu pueblo
  - contra tu pueblo
  - concerniente a tu pueblo
  rationale: La revisión inglesa intenta reflejar mejor la relación contextual de la amenaza. En español, «destinado para tu pueblo» comunica el alcance del juicio sin forzar una preposición más pesada o menos idiomática.
  doctrine_reference: Revision awareness; Translation philosophy §1
translation_notes:
  revision_awareness: La redacción refleja la revisión inglesa más reciente en la cláusula final al expresar el alcance como «para tu pueblo» y no con una preposición de oposición. También conserva la tensión entre la acusación de los egipcios («con mala intención») y la súplica de Moisés respecto del juicio divino.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el estilo general del proyecto cuando corresponda, pero este versículo no nombra el tetragrámaton explícitamente.
  - Se mantuvo el paralelismo entre la acusación humana de intención maliciosa y la petición de retirar la ira, sin neutralizar la antropopatía del hebreo.
  - Se prefirió léxico bíblico comprensible en español moderno («faz de la tierra», «ardiente ira») sin depender de calcos ingleses.
