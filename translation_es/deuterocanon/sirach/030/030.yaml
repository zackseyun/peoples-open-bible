    issue: 'Error gramatical: «que que»'
    rationale: La coordinación comparativa en español debe leerse «..., que tú ...» o mejor «..., que tú mires ...» tras «es mejor que». La duplicación es un fallo formal claro.
  - severity: high
    issue: Pérdida de la distinción entre τέκνα y υἱῶν
    rationale: El original distingue un término general («children») de uno específico («sons»), y el POB inglés lo preserva explícitamente. El borrador usa «hijos» en ambas cláusulas y borra esa diferencia semántica.
  - severity: medium
    issue: «te pidan» debilita demasiado δεηθῆναί
    rationale: En este contexto de dependencia económica, el verbo tiene más fuerza que una mera petición. «Tengan que pedirte» conserva mejor la idea de necesidad sin sobretraducir a «mendiguen».
