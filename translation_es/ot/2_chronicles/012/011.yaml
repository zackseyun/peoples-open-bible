    rationale: La alternativa inglesa «guardroom» corresponde a תָּא, el cuarto/cámara, no al conjunto «de los guardias». En español conviene marcar «aposento[a]» o «aposento[c]» y explicar «O «cuarto de guardia»».
  - severity: medium
