  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Dios’ corresponde a אֱלֹהִים aquí. No intervienen términos sensibles como Yahvé/Mesías/espíritu/esclavo. Se preserva correctamente ‘pan’ como elección léxica concreta con nota.
