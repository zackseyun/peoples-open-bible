translation:
  language: es
  text: Entonces derramó algo del aceite de la unción sobre la cabeza de Aarón y lo ungió para consagrarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּצֹק
  english_pob_choice: poured
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - puso
  lexicon: HALOT
  rationale: יצק expresa el acto de verter un líquido. «Derramó» comunica bien esa acción en español natural sin añadir una intensidad que el hebreo no exige.
- source_word: מִשֶּׁמֶן הַמִּשְׁחָה
  english_pob_choice: some of the anointing oil
  chosen_spanish: algo del aceite de la unción
  alternatives_spanish:
  - parte del aceite de la unción
  - del aceite de la unción
  lexicon: HALOT
  rationale: El מִן partitivo queda expresado de forma clara con «algo de». «Aceite de la unción» es una forma transparente en español para שֶׁמֶן הַמִּשְׁחָה y conserva el sentido ritual.
- source_word: עַל רֹאשׁ אַהֲרֹן
  english_pob_choice: on Aaron’s head
  chosen_spanish: sobre la cabeza de Aarón
  alternatives_spanish:
  - en la cabeza de Aarón
  - encima de la cabeza de Aarón
  lexicon: HALOT
  rationale: «Sobre la cabeza» reproduce la relación locativa del hebreo de manera natural en español y mantiene la imagen ritual concreta.
- source_word: וַיִּמְשַׁח
  english_pob_choice: anointed
  chosen_spanish: lo ungió
  alternatives_spanish:
  - lo consagró con unción
  - lo ungió con aceite
  lexicon: HALOT
  rationale: משׁח se refiere al acto ritual de ungir. «Ungió» es el equivalente directo y conserva el valor cultual del verbo sin sustituirlo por un término más interpretativo.
- source_word: לְקַדְּשׁוֹ
  english_pob_choice: to consecrate him
  chosen_spanish: para consagrarlo
  alternatives_spanish:
  - para santificarlo
  - para hacerlo santo
  lexicon: HALOT
  rationale: En contexto sacerdotal, קדשׁ apunta a apartar para servicio sagrado. «Consagrarlo» expresa bien esa dedicación cultual en español, de forma más transparente que «santificarlo».
theological_decisions:
- issue: קדשׁ en contexto de investidura sacerdotal
  english_pob_reading: to consecrate him
  chosen_spanish_reading: para consagrarlo
  alternative_spanish_readings:
  - para santificarlo
  - para hacerlo santo
  rationale: El versículo describe el rito de instalación de Aarón para servicio sacerdotal. «Consagrar» conserva la fuerza cultual y vocacional del hebreo sin cargar el texto con matices doctrinales posteriores que no están explícitos aquí.
  doctrine_reference: Translation philosophy §6; afirmaciones de traducción textualmente fundamentada
- issue: Matiz partitivo de מִשֶּׁמֶן
  english_pob_reading: some of the anointing oil
  chosen_spanish_reading: algo del aceite de la unción
  alternative_spanish_readings:
  - parte del aceite de la unción
  - del aceite de la unción
  rationale: El hebreo indica una porción tomada del aceite, no simplemente una referencia genérica al aceite. «Algo del» hace explícito el valor partitivo sin sobreexplicar el texto.
  doctrine_reference: HALOT; sintaxis hebrea del partitivo con מִן
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Levítico 8:12 y coincide con la decisión inglesa auditada: derramar una porción del aceite de la unción sobre la cabeza de Aarón y ungirlo para consagrarlo. No se registran notas textuales ni revisiones sustanciales en el antecedente inglés.'
  spanish_consistency_notes:
  - Se mantiene «Aarón» con la ortografía bíblica estándar en español.
  - Se usa «aceite de la unción» de manera consistente con la terminología ritual del pasaje.
  - «Ungió» y «consagrarlo» preservan la secuencia ritual sin fusionar ambos verbos en una sola idea.
