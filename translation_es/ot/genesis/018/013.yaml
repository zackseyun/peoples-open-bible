translation:
  language: es
  text: 'Y Yahvé dijo a Abraham[a]: «¿Por qué se rió Sara, diciendo: “¿Acaso de veras daré a luz, ya que soy anciana?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Acaso de veras daré a luz?». El verbo «dar a luz» implica el nacimiento de un hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo, en línea con la decisión inglesa de no sustituirlo por un título. «Yahvé» es la forma establecida en el proyecto para יְהוָה y evita ocultar el nombre pactual.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: La forma narrativa פשוטa de אמר se expresa naturalmente en español con «dijo», manteniendo el tono directo y sobrio del relato.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué, pues?
  - ¿Por qué es esto?
  lexicon: HALOT
  rationale: El giro interrogativo se adapta de forma idiomática a «¿Por qué?», sin añadir expansión artificial que no aporte al sentido.
- source_word: צָחֲקָה
  english_pob_choice: did ... laugh
  chosen_spanish: se rió
  alternatives_spanish:
  - rió
  - se había reído
  lexicon: HALOT
  rationale: El verbo de reír en este contexto de narración pasada se vierte de manera natural con un pretérito perfecto simple. «Se rió» conserva la acción puntual y la referencia a la risa de Sara.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Se mantiene el marcador de discurso con «diciendo», que introduce la cita de Sara sin sobreinterpretarla como pensamiento interno exclusivo.
- source_word: הַאַף אֻמְנָם
  english_pob_choice: Shall I indeed
  chosen_spanish: ¿Acaso de veras
  alternatives_spanish:
  - ¿De veras?
  - ¿Será que de verdad?
  lexicon: HALOT
  rationale: La combinación de partícula interrogativa y énfasis se refleja con una pregunta marcada por «¿Acaso de veras», que conserva la sorpresa e incredulidad del hebreo sin sonar forzada en español.
- source_word: אֵלֵד
  english_pob_choice: bear a child
  chosen_spanish: daré a luz
  alternatives_spanish:
  - tendré un hijo
  - pariré
  lexicon: HALOT
  rationale: El verbo ילד en este contexto expresa dar a luz. En español, «daré a luz» comunica de forma clara y digna la posibilidad de embarazo/parto, aunque el objeto «un hijo» queda implícito como en el hebreo.
- source_word: וַאֲנִי זָקַנְתִּי
  english_pob_choice: now that I am old
  chosen_spanish: ahora que soy vieja
  alternatives_spanish:
  - y yo he envejecido
  - pues ya soy anciana
  lexicon: HALOT
  rationale: La cláusula causal se vierte como una explicación temporal y de estado actual. «Soy vieja» es fiel al contenido, aunque en español «anciana» sería una alternativa más formal; se prefiere la forma más directa por la voz de Sara en discurso directo.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente, no un título genérico. La traducción mantiene el nombre propio divino para preservar la identidad pactual de Yahvé en la escena.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de la pregunta divina sobre la risa de Sara
  english_pob_reading: Why did Sarah laugh, saying, 'Shall I indeed bear a child, now that I am old?'
  chosen_spanish_reading: '¿Por qué se rió Sara, diciendo: “¿Acaso de veras daré a luz, ahora que soy vieja?”'
  alternative_spanish_readings:
  - '¿Por qué se rió Sara, diciendo: “¿De verdad daré a luz, ahora que soy vieja?”'
  - '¿Por qué se rió Sara, diciendo: “¿Acaso realmente tendré un hijo, ahora que soy vieja?”'
  rationale: Se conserva el tono de reprensión/incredulidad divina y la sorpresa de la pregunta de Sara sin suavizarla. La traducción mantiene la tensión entre la pregunta de Yahvé y la incredulidad de Sara, que es central en la narración.
  doctrine_reference: Génesis 18:13 en el marco narrativo de la promesa del hijo de la mujer estéril/anciana
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó la interrogación final a un registro más formal y más cercano a הַאַף אֻמְנָם. El español adopta una equivalencia equivalente en tono con «¿Acaso de veras…?», manteniendo el valor de asombro y la referencia a dar a luz. También se preservó el nombre divino como Yahvé, en coherencia con la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se usa «daré a luz» para reflejar el verbo de parto sin añadir explícitamente «un hijo» dentro del texto principal; esa implicación queda indicada en la nota.
  - La puntuación de la cita respeta el estilo español y conserva la estructura de discurso directo del hebreo y del inglés auditado.
