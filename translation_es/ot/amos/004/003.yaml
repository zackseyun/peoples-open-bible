translation:
  language: es
  text: Y por las brechas saldrán ustedes[a], cada mujer directamente delante de ella[b], y serán arrojadas hacia Harmon —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También posible: «y serán arrojadas a Harmon», «a la fortaleza» o «al Hermón». El hebreo הַהַרְמוֹנָה es oscuro y su referente preciso no se conoce con certeza.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «mujer delante/opuesta a ella»; probablemente significa que cada mujer saldrá directamente por la brecha que tiene enfrente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְרָצִים
  english_pob_choice: through the breaches
  chosen_spanish: por las brechas
  alternatives_spanish:
  - a través de las brechas
  - por las aberturas
  lexicon: HALOT
  rationale: פְרָצִים alude a roturas o brechas, probablemente en una muralla; en español, 'por las brechas' conserva la imagen y el movimiento de salida a través de esas aberturas.
- source_word: תֵּצֶאנָה
  english_pob_choice: you will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldréis
  - irán afuera
  - saldrán hacia afuera
  lexicon: HALOT
  rationale: El qal imperfecto femenino plural de יצא expresa 'salir'; en este contexto profético, el español impersonal/plural 'saldrán' transmite el hecho de la salida sin añadir detalles no presentes en el hebreo.
- source_word: אִשָּׁה
  english_pob_choice: each woman
  chosen_spanish: cada mujer
  alternatives_spanish:
  - una mujer
  - mujer por mujer
  lexicon: HALOT
  rationale: El sustantivo singular con valor distributivo se vierte naturalmente como 'cada mujer', preservando el matiz individualizante del hebreo.
- source_word: נֶגְדָּהּ
  english_pob_choice: straight ahead of her
  chosen_spanish: rectamente delante de ella
  alternatives_spanish:
  - delante de ella
  - frente a ella
  - directamente ante ella
  lexicon: HALOT
  rationale: נֶגֶד puede significar 'delante de', 'en frente de' u 'opuesto a'; en este pasaje, 'rectamente delante de ella' expresa el avance directo sin torcerse, que es el sentido contextual que el POB inglés explicó como 'straight ahead of her'.
- source_word: וְהִשְׁלַכְתֶּנָה
  english_pob_choice: you will be cast out
  chosen_spanish: serán arrojadas
  alternatives_spanish:
  - serán echadas
  - serán lanzadas
  - serán expulsadas
  lexicon: HALOT
  rationale: La forma es difícil; el POB inglés la entendió en sentido pasivo/impersonal de expulsión. En español, 'serán arrojadas' conserva la fuerza de 'cast out' sin convertir el verbo en una explicación interpretativa más amplia que el texto.
- source_word: הַהַרְמֹנָה
  english_pob_choice: toward Harmon
  chosen_spanish: hacia Harmon
  alternatives_spanish:
  - a Harmon
  - hacia Hermón
  - hacia la fortaleza
  lexicon: HALOT
  rationale: El término es oscuro y su referente preciso es incierto. La transliteración 'Harmon' mantiene la indeterminación textual sin resolverla prematuramente como nombre común o topónimo alternativo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte con un verbo de declaración natural en español; el Tetragrámaton se rinde como 'Yahvé' según la terminología del proyecto y la evidencia del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino; la política del proyecto pide reproducirlo como 'Yahvé' en vez de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la expulsión en la segunda mitad del verso
  english_pob_reading: you will be cast out toward Harmon
  chosen_spanish_reading: serán arrojadas hacia Harmon
  alternative_spanish_readings:
  - serán echadas hacia Harmon
  - serán expulsadas hacia Harmon
  rationale: El hebreo combina una forma verbal difícil con un destino oscuro. 'Serán arrojadas' conserva la violencia y el carácter pasivo/impersonal que el POB inglés documentó, sin afirmar más de lo que el texto permite.
  doctrine_reference: 'DOCTRINE.md: Source transparency and preserved ambiguities'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis auditado del POB en inglés: conserva la imagen de las brechas, el valor distributivo de «cada mujer», la ambigüedad de נֶגֶד y la oscuridad de הַהַרְמוֹנָה, sin suavizarla ni resolverla de forma especulativa. No se incorporaron revisiones posteriores porque el registro indica que no hubo cambios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se prefirió un español moderno y bíblico pero no arcaizante; por eso se evitó «SEÑOR» como sustituto del nombre divino.
  - «Arrojadas» mantiene la fuerza del POB inglés 'cast out' y la violencia implícita del contexto profético.
  - La puntuación conserva una cadencia de verso profético y separa la fórmula oracular final con raya larga.
