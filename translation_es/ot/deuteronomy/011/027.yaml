translation:
  language: es
  text: la bendición[a], si prestan oído a los mandamientos de Yahvé su Dios[b], que yo les estoy mandando hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la bendición que vendrá cuando obedezcan los mandamientos de Yahvé su Dios». El hebreo usa una partícula relativa con sentido condicional.'
    reason: lexical_alternative
  - marker: b
    text: «Prestar oído a» también puede traducirse «obedecer», porque en hebreo este verbo suele incluir la idea de oír con respuesta obediente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַבְּרָכָה
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - bendición
  - la bendición que recibirán
  lexicon: HALOT
  rationale: Conservo el sintagma nominal definido y la relación con el enunciado anterior sin añadir material interpretativo. En español, 'la bendición' comunica bien la continuidad del contraste con 'la maldición' del contexto inmediato.
- source_word: אֲשֶׁר
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - que
  - cuando
  lexicon: HALOT
  rationale: Aunque la partícula es formalmente relativa, aquí introduce la condición bajo la cual se aplica la bendición. 'Si' transmite de manera natural la fuerza condicional que el audit trail inglés preservó con 'if'.
- source_word: תִּשְׁמְעוּ
  english_pob_choice: you listen
  chosen_spanish: escuchan
  alternatives_spanish:
  - oyen
  - obedecen
  - escuchen
  lexicon: HALOT
  rationale: '''Escuchar'' conserva el valor básico de oír con atención y deja explícita, sin exagerarla, la implicación obediencial del contexto pactal. El presente general en español funciona bien para este sentido exhortativo.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: Con verbos de oír/escuchar en español, la preposición natural es 'a'. Aunque el hebreo usa אֶל, la equivalencia idiomática en español pide 'escuchar a'.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: HALOT
  rationale: '''Mandamientos'' es el término más preciso y reconocible para las disposiciones divinas del pacto. Mantiene el peso formal de מִצְוֹת sin recurrir a una paráfrasis más débil.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Sigo la convención del proyecto para el Tetragrámaton en español: ''Yahvé''. Conserva el nombre propio divino, evitando la sustitución titulada y manteniendo coherencia interna en el POB español.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: En español latinoamericano neutral, 'su Dios' transmite el posesivo de segunda persona plural sin marcar regionalismo peninsular ni redundancia innecesaria.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  english_pob_choice: which I am commanding you today
  chosen_spanish: que yo les estoy mandando hoy
  alternatives_spanish:
  - que yo les mando hoy
  - que hoy les mando
  lexicon: HALOT
  rationale: El participio tiene fuerza progresiva/discursiva; 'les estoy mandando' refleja el acto de habla en curso y conserva la inmediatez de 'hoy'. 'Mandar' es idiomático en español y expresa con claridad el acto de dar un mandato.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La lectura del original usa el Tetragrámaton, y la tradición del POB inglés lo resuelve como nombre propio. En español, 'Yahvé' es la forma más establecida y publicable para preservar el nombre revelado de Dios sin masking litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH / יהוה → Yahvé'
- issue: Valor de אֲשֶׁר en un contexto de promesa condicionada
  english_pob_reading: if
  chosen_spanish_reading: si
  alternative_spanish_readings:
  - que
  - cuando
  rationale: El texto no solo introduce una relativa; establece la condición de la bendición. 'Si' preserva mejor la relación condicional explícita sin convertir la cláusula en una descripción meramente relativa.
  doctrine_reference: Hermenéutica pactal del texto hebreo en Deuteronomio 11:27
- issue: Sentido de שׁמע con objeto preposicional
  english_pob_reading: you listen
  chosen_spanish_reading: escuchan
  alternative_spanish_readings:
  - obedecen
  - oyen
  rationale: El hebreo puede incluir obediencia implícita, pero el audit trail inglés prefirió 'listen' para no sobrerenderizar. En español, 'escuchar' conserva esa tensión entre oír y obedecer sin imponer 'obedecer' como equivalente principal.
  doctrine_reference: Relación semántica entre oír y obedecer en el hebreo bíblico
translation_notes:
  revision_awareness: 'El draft sigue el estado revisado del audit trail inglés: conserva la cláusula relativa/condicional con puntuación natural en español y mantiene el participio presente como acción en curso («les estoy mandando hoy»), en línea con la última revisión que clarificó la relación sintáctica de la cláusula final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se evita «SEÑOR» por la convención del proyecto y para preservar el nombre propio divino.
  - «Mandamientos» se mantiene como término legal/covenantal estándar.
  - El posesivo plural de segunda persona se expresa con «su» en registro neutral latinoamericano.
  - La traducción conserva la tensión semántica de שׁמע sin resolverla por completo en la línea principal.
