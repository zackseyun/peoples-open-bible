translation:
  language: es
  text: Y para la puerta del atrio habrá una cortina[a] de veinte codos de largo[b], de azul, púrpura y carmesí, y de lino fino torcido, obra de bordador, con cuatro columnas y cuatro basas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «colgadura» para el cubrimiento de la entrada.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «veinte codos»; «de largo» se añade en español para claridad en la descripción arquitectónica.
    reason: lexical_alternative
  - marker: c
    text: O «cuatro bases» en lugar de «cuatro basas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/שַׁ֨עַר
  english_pob_choice: And for the gate
  chosen_spanish: Y para la puerta
  alternatives_spanish:
  - Y para la entrada
  - Y para el portal
  lexicon: HALOT
  rationale: שַׁעַר en contexto arquitectónico de tabernáculo designa la abertura de acceso; «puerta» comunica de forma natural la función de acceso sin perder el valor estructural del término.
- source_word: הֶֽ/חָצֵ֜ר
  english_pob_choice: of the courtyard
  chosen_spanish: del atrio
  alternatives_spanish:
  - del patio
  - de la corte
  lexicon: HALOT
  rationale: חָצֵר se refiere al recinto del tabernáculo; en español bíblico y eclesial «atrio» es claro y preciso para este espacio cerrado, aunque «patio» también sería posible.
- source_word: מָסָ֣ךְ
  english_pob_choice: a screen
  chosen_spanish: un velo
  alternatives_spanish:
  - una cortina
  - un colgante
  - una pantalla
  lexicon: HALOT
  rationale: El término describe un cubrimiento de acceso, no una puerta sólida. En español «velo» conserva la idea de cobertura ligera y es más natural en este entorno litúrgico-constructivo; «cortina» sería una alternativa válida si se quisiera enfatizar el soporte textil.
- source_word: עֶשְׂרִ֣ים אַמָּ֗ה
  english_pob_choice: twenty cubits long
  chosen_spanish: de veinte codos
  alternatives_spanish:
  - con una longitud de veinte codos
  - de veinte codos de largo
  lexicon: HALOT
  rationale: El hebreo expresa la medida literalmente; en español se puede dejar la cifra sin añadir «largo» cuando el contexto arquitectónico ya hace claro que se trata de la extensión del velo.
- source_word: תְּכֵ֨לֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul intenso
  - azul violeta
  lexicon: HALOT
  rationale: El término designa material teñido de azul. «Azul» es la forma breve y estándar; no se añade «hilo» porque aquí los materiales aparecen en lista compacta.
- source_word: וְ/אַרְגָּמָ֜ן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura real
  lexicon: HALOT
  rationale: אַרְגָּמָן alude al tinte púrpura. «Púrpura» mantiene mejor el color-textil histórico que «morado».
- source_word: וְ/תוֹלַ֧עַת שָׁנִ֛י
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  lexicon: HALOT
  rationale: La expresión remite al color rojo intenso del material textil. En español, «carmesí» comunica bien el tono sin forzar la mención de «hilo»; el contexto de la lista de tejidos ya lo sugiere.
- source_word: וְ/שֵׁ֥שׁ מָשְׁזָ֖ר
  english_pob_choice: fine twined linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino trenzado
  - lino finamente torcido
  lexicon: HALOT
  rationale: שֵׁשׁ es lino fino, y מָשְׁזָר indica que está torcido o retorcido en la manufactura. «Lino fino torcido» conserva la literalidad útil para la transparencia del texto, aunque «lino fino trenzado» también podría leerse de manera idiomática.
- source_word: מַעֲשֵׂ֣ה רֹקֵ֑ם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de bordador
  alternatives_spanish:
  - trabajo de bordador
  - obra bordada
  lexicon: HALOT
  rationale: La construcción hebrea señala una labor artesanal especializada. «Obra de bordador» reproduce el agente técnico sin exagerar ni expandir el sentido.
- source_word: עַמֻּֽדֵי/הֶם֙ אַרְבָּעָ֔ה
  english_pob_choice: with four pillars
  chosen_spanish: con cuatro columnas
  alternatives_spanish:
  - con cuatro pilares
  - con cuatro postes
  lexicon: HALOT
  rationale: עַמּוּדִים son soportes verticales; «columnas» es una opción natural y digna en español, aunque «pilares» también preserva bien la función estructural.
- source_word: וְ/אַדְנֵי/הֶ֖ם אַרְבָּעָֽה
  english_pob_choice: and four bases
  chosen_spanish: y cuatro basas
  alternatives_spanish:
  - y cuatro bases
  - y cuatro zócalos
  - y cuatro pedestales
  lexicon: HALOT
  rationale: אֲדָנִים en la construcción del tabernáculo son piezas de apoyo para los soportes. «Basas» es el término tradicional y preciso en este contexto; «bases» sería una alternativa más transparente pero algo menos técnica.
theological_decisions:
- issue: Tratamiento del nombre divino y del contexto sacro
  english_pob_reading: No appears directly in the verse; the verse is architectural.
  chosen_spanish_reading: No se introduce ninguna convención de sustitución divina; se mantiene el registro constructivo del pasaje.
  alternative_spanish_readings:
  - No relevante para este versículo.
  - Uso de terminología más litúrgica como «cortina» en vez de «velo».
  rationale: El versículo es una instrucción de fabricación para el atrio. No hay mención explícita del nombre divino ni de un debate doctrinal directo; por tanto, la traducción debe limitarse a la transparencia arquitectónica y textil.
  doctrine_reference: Éxodo 27:16; transparencia textual en instrucciones del tabernáculo
- issue: Elección de términos textiles y su posible resonancia litúrgica
  english_pob_reading: screen; blue, purple, scarlet yarn; fine twined linen
  chosen_spanish_reading: velo; azul, púrpura y carmesí; lino fino torcido
  alternative_spanish_readings:
  - cortina; hilo azul, púrpura y escarlata; lino fino torcido
  - pantalla; azul, púrpura y escarlata
  rationale: «Velo» mantiene la idea de cubrimiento sin convertir el texto en una barrera arquitectónica sólida. «Carmesí» y «lino fino torcido» conservan el color y la manufactura textil sin añadir elementos no presentes en el hebreo.
  doctrine_reference: Éxodo 27:16; terminología del tabernáculo
translation_notes:
  revision_awareness: El audit trail inglés mantuvo la descripción de materiales y eliminó posesivos redundantes antes de «four pillars» y «four bases» para hacer más natural la redacción. La versión española sigue ese mismo principio de fluidez formal, sin añadir posesivos que no están en el hebreo. También se tuvo en cuenta la nota inglesa sobre la posibilidad de leer מָסָךְ como «curtain» o «hanging», por lo que se preserva una nota alternativa en español.
  spanish_consistency_notes:
  - Se mantiene «atrio» para חָצֵר en contexto del tabernáculo.
  - Se usa «basas» para אֲדָנִים, coherente con el léxico técnico del mobiliario sacro.
  - 'La lista de colores y materiales conserva el orden hebreo: azul, púrpura, carmesí y lino fino torcido.'
  - No se añadió «hilo» o «yarn» porque el español permite elipsis natural en una enumeración de textiles.
