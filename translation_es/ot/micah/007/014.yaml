translation:
  language: es
  text: Apacienta a tu pueblo con tu cayado, el rebaño de tu heredad, que habita solo en el bosque, en medio de Carmel[a]; que pasten en Basán y en Galaad, como en los días de antaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de terreno fértil» / «en tierra fértil». El hebreo Carmel puede referirse tanto a la región de Carmel como a un terreno fructífero.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְעֵה
  english_pob_choice: Shepherd
  chosen_spanish: Apacienta
  alternatives_spanish:
  - Pastorea
  - Shepherd
  lexicon: HALOT
  rationale: El hebreo es un imperativo de רעה dirigido a Dios con imagen pastoral. En español, «apacienta» conserva la acción de conducir al rebaño con cuidado y alimento, sin perder naturalidad. «Pastorea» también es posible, pero «apacienta» suena más verbal y directo aquí.
- source_word: בְשִׁבְטֶךָ
  english_pob_choice: with your staff
  chosen_spanish: con tu vara
  alternatives_spanish:
  - con tu cayado
  - con tu cetro
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, cayado o cetro. Dado el contexto pastoral, «vara» preserva el campo semántico amplio y evita cargar la imagen solo hacia la disciplina. «Cayado» es aceptable, pero «vara» permite reflejar mejor la ambivalencia lexical del hebreo.
- source_word: צֹאן נַחֲלָתֶךָ
  english_pob_choice: the flock of your inheritance
  chosen_spanish: el rebaño de tu heredad
  alternatives_spanish:
  - las ovejas de tu heredad
  - tu rebaño heredado
  lexicon: HALOT
  rationale: «Rebaño» transmite el sustantivo colectivo, y «heredad» conserva el valor de posesión pactal del hebreo נַחֲלָה. «Heredad» es un término bíblico comprensible en español y mantiene la relación de pertenencia mejor que una paráfrasis más abstracta.
- source_word: שֹׁכְנִי לְבָדָד
  english_pob_choice: dwelling alone
  chosen_spanish: que habita solo
  alternatives_spanish:
  - que vive solo
  - morando aparte
  lexicon: HALOT
  rationale: El participio expresa un estado continuo. «Que habita solo» preserva la condición estable de aislamiento o apartamiento sin sonar forzado. Se evita interpretar más de la cuenta si ese «solo» alude a separación geográfica o a seguridad protegida.
- source_word: יַעַר
  english_pob_choice: in a forest
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en un bosque
  - en la selva
  lexicon: HALOT
  rationale: «Bosque» es el equivalente más natural en español para יַעַר. Mantiene la imagen de terreno arbolado y relativamente agreste que continúa la línea poética del verso.
- source_word: בְּתוֹךְ כַּרְמֶל
  english_pob_choice: in the midst of Carmel
  chosen_spanish: en medio de Carmel
  alternatives_spanish:
  - en medio de un campo fértil
  - en la región de Carmel
  lexicon: HALOT
  rationale: Se conserva «Carmel» como nombre propio, siguiendo la decisión inglesa de no desactivar de entrada la referencia geográfica-poética. La frase puede sugerir también fertilidad, pero el texto base permite mantener la ambigüedad con una nota.
- source_word: יִרְעוּ
  english_pob_choice: let them graze
  chosen_spanish: que pasten
  alternatives_spanish:
  - que ramoneen
  - que se alimenten
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza jussiva en contexto de súplica. «Que pasten» comunica bien la petición de abundancia pastoral y mantiene el paralelismo con el rebaño.
- source_word: בָשָׁן וְגִלְעָד
  english_pob_choice: in Bashan and Gilead
  chosen_spanish: en Basán y en Galaad
  alternatives_spanish:
  - en Basán y Galaad
  - en Bashán y Galaad
  lexicon: HALOT
  rationale: Se transliteran los nombres propios en forma usual del español bíblico («Basán», «Galaad») para conservar su valor geográfico y evocar las regiones fértiles mencionadas por el hebreo.
- source_word: כִּימֵי עוֹלָם
  english_pob_choice: as in days of old
  chosen_spanish: como en los días de antaño
  alternatives_spanish:
  - como en los días de antes
  - como en los días antiguos
  lexicon: HALOT
  rationale: עולם aquí señala antigüedad o duración pasada, no eternidad metafísica. «Antaño» es idiomático en español y expresa bien la referencia temporal histórica.
theological_decisions:
- issue: Valor de שֵׁבֶט entre instrumento pastoral y símbolo de disciplina
  english_pob_reading: pastoral 'staff' within shepherd imagery
  chosen_spanish_reading: vara pastoral dentro de la imagen del pastor
  alternative_spanish_readings:
  - vara de disciplina
  - cetro de autoridad
  rationale: El contexto inmediato es una petición de cuidado, provisión y restauración del pueblo. «Vara» mantiene la posibilidad semántica amplia del hebreo sin imponer una lectura disciplinaria que el verso no subraya.
  doctrine_reference: Shepherding imagery in biblical theology; covenant care of God for his people
translation_notes:
  revision_awareness: 'La presente redacción sigue de cerca el texto hebreo y coincide en lo esencial con la auditoría inglesa: conserva la metáfora pastoral, la ambigüedad de שֵׁבֶט, y la posible doble referencia de Carmel. No se aplicaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí el verso no lo contiene.
  - Se usa un registro bíblico moderno y natural, evitando calcos innecesarios como «pastorea» donde «apacienta» expresa mejor el imperativo pastoral.
  - Los nombres propios se transliteran en su forma bíblica habitual para conservar continuidad con la tradición de lectura en español.
