    changes_summary: Changed 'disfigured' to 'marred' for closer lexical correspondence to מִשְׁחַת, and rendered בְּנֵי אָדָם as 'sons of mankind' to avoid repeating 'man' while preserving the formal register and distinction in the Hebrew.
translation:
  language: es
  text: Tal como muchos quedaron horrorizados[a] ante ti, tan desfigurado[b] estaba su aspecto, más allá del de un hombre, y su forma más allá de la de los hijos de los hombres.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa de la segunda persona ('ante ti') a la tercera ('su aspecto', 'su forma') dentro del mismo versículo.
    reason: alternative_reading
  - marker: b
    text: O 'maltrecho'. El hebreo también puede expresarse como 'marcado por daño' o 'desfigurado'.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'hijos de los hombres', una expresión idiomática para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Tal como
  alternatives_spanish:
  - Así como
  - Como
  lexicon: HALOT
  rationale: Introduces la comparación correlativa con כֵּן de manera natural en español y conserva el valor comparativo de la partícula sin endurecer el orden hebreo.
- source_word: שָׁמְמוּ
  english_pob_choice: were appalled
  chosen_spanish: se quedaron asombrados
  alternatives_spanish:
  - quedaron atónitos
  - se horrorizaron
  lexicon: HALOT
  rationale: En este contexto de reacción ante la apariencia del siervo, la idea central es el impacto intenso de quienes lo vieron. 'Se quedaron asombrados' comunica el sobresalto sin añadir más horror del que el hebreo exige.
- source_word: עָלֶיךָ
  english_pob_choice: at you
  chosen_spanish: de ti
  alternatives_spanish:
  - contra ti
  - ante ti
  lexicon: HALOT
  rationale: El hebreo mantiene la segunda persona masculina singular; en español, con 'asombrarse de alguien' se conserva la dirección del impacto y se evita forzar una construcción menos natural.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  lexicon: HALOT
  rationale: Traducción directa y natural del plural, manteniendo el sujeto amplio del contraste.
- source_word: מִשְׁחַת
  english_pob_choice: marred/disfigured
  chosen_spanish: desfigurado
  alternatives_spanish:
  - mutilado
  - maltrecho
  lexicon: HALOT
  rationale: La base semántica apunta a deformación o daño visible. En español, 'desfigurado' conserva bien el sentido físico y visible, sin perder claridad.
- source_word: מַרְאֵהוּ
  english_pob_choice: his appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su rostro
  lexicon: HALOT
  rationale: '''Aspecto'' reproduce de forma clara la idea de la apariencia visible. Se evita ''rostro'' porque el término hebreo es más amplio que la cara.'
- source_word: וְתֹאֲרוֹ
  english_pob_choice: and his form
  chosen_spanish: y su forma
  alternatives_spanish:
  - y su figura
  - y su porte
  lexicon: HALOT
  rationale: '''Forma'' mantiene la distinción del paralelo hebreo con ''aspecto'' y resulta idiomática en español para la configuración externa.'
- source_word: מִבְּנֵי אָדָם
  english_pob_choice: beyond the sons of mankind
  chosen_spanish: más que la de los hijos de los hombres
  alternatives_spanish:
  - más que la de la humanidad
  - más que la de los seres humanos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'hijos de los hombres', que el audit trail trata como un idiomático de seres humanos, manteniendo la sonoridad y la referencia representativa.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: Respeta el término masculino representativo del hebreo y coincide con la formulación comparativa del verso.
theological_decisions:
- issue: Cambio de persona gramatical dentro del versículo
  english_pob_reading: Retain the Masoretic shift from second person ('you') to third person ('his').
  chosen_spanish_reading: Conservar el cambio del 'ti' a 'su' sin armonizarlo.
  alternative_spanish_readings:
  - homogeneizar todo en tercera persona
  - mantener todo en segunda persona
  rationale: El texto hebreo pasa de dirigirse directamente al siervo a describir su aspecto en tercera persona. Ese cambio forma parte del testimonio textual recibido y no debe suavizarse en la traducción.
  doctrine_reference: Philosophy of translation §1, §3, §5
- issue: Idioma representativo para seres humanos
  english_pob_reading: Use 'man' and 'sons of man' rather than fully gender-neutral substitutes.
  chosen_spanish_reading: Conservar 'hombre' y 'hijos de los hombres' como lenguaje representativo.
  alternative_spanish_readings:
  - ser humano
  - humanidad
  - personas
  rationale: El hebreo usa אִישׁ y בְּנֵי אָדָם; en español, el lenguaje representativo mantiene mejor el eco del original y la distinción poética del paralelismo.
  doctrine_reference: 'Translation philosophy §4; contested terms: אָדָם'
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada del inglés al preferir una palabra de daño visible para מִשְׁחַת y conservar el paralelismo entre 'aspecto' y 'forma', pero adapta el registro para que suene natural en español sin borrar el cambio de persona ni la imagen idiomática de 'hijos de los hombres'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma de proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se mantiene el lenguaje representativo 'hombre' / 'hijos de los hombres' por fidelidad al hebreo y al paralelismo poético.
  - '''Aspecto'' y ''forma'' distinguen las dos imágenes hebreas sin sobreinterpretarlas.'
  - La nota [a] registra la alternancia de persona, una tensión textual que no se armoniza.
