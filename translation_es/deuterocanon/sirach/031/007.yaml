revisions:
- from: Porque es un tropiezo para un necio[a], y todo simple[ton] queda atrapado por él.
  to: Porque es un tropiezo para un necio[a], y todo ingenuo queda atrapado por él.
  rationale: 'Se conserva la estructura y el sentido del hebreo, así como la nota sobre la divergencia textual griega, pero se corrige el principal problema de calidad: «simple[ton]» se sustituye por «ingenuo», que expresa naturalmente la credulidad de פותה en español amplio y legible.'
