translation:
  language: es
  text: Ahora[a], hijo mío, escúchame; levántate, huye a mi hermano Labán en Harán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora, hijo mío, escucha mi voz, y levántate; huye para ti a mi hermano Labán en Harán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Es un marcador discursivo de transición inmediata. En español, «Ahora» comunica la urgencia sin sobrecargar el texto con una conjunción que aquí no es necesaria.
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: Conserva el tono afectivo y la relación familiar directa. «Hijo mío» suena natural en español bíblico y mantiene la apelación personal.
- source_word: שְׁמַע בְּקֹלִי
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - óyeme
  - obedéceme
  lexicon: HALOT
  rationale: La expresión hebrea es literal y puede implicar obediencia, pero la formulación básica es oír/escuchar la voz. En español, «escucha mi voz» preserva esa imagen sin explicitar más de lo que el hebreo dice.
- source_word: וְקוּם
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - levántate y
  - ponte de pie
  lexicon: HALOT
  rationale: Es el imperativo de קום. «Levántate» es el equivalente natural y digno en español, manteniendo el impulso secuencial del mandato.
- source_word: בְּרַח לְךָ
  english_pob_choice: flee
  chosen_spanish: huye
  alternatives_spanish:
  - escapa
  - huye para ti
  lexicon: HALOT
  rationale: ברח significa «huir/fugarse». El dativo ético לְךָ no exige una traducción explícita en español; «huye» conserva la fuerza urgente del verbo.
- source_word: אֶל לָבָן אָחִי
  english_pob_choice: to my brother Laban
  chosen_spanish: a mi hermano Labán
  alternatives_spanish:
  - a Labán, mi hermano
  - hacia mi hermano Labán
  lexicon: HALOT
  rationale: La relación apposicional se expresa con claridad en español mediante «mi hermano Labán». Se mantiene el orden natural y se preserva el vínculo familiar del original.
- source_word: חָרָנָה
  english_pob_choice: in Haran
  chosen_spanish: en Harán
  alternatives_spanish:
  - a Harán
  - hasta Harán
  lexicon: HALOT
  rationale: El hebreo marca dirección hacia la localidad, pero en español la identificación locativa con «en Harán» es natural y sigue el criterio del audit trail inglés para evitar una repetición torpe de movimiento.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal. La redacción sigue el audit trail inglés: «Now/And now», «listen to my voice», dos imperativos consecutivos y la ubicación natural «en Harán».'
  spanish_consistency_notes:
  - Se conserva el tratamiento familiar directo con «hijo mío» para reflejar בְנִי.
  - «Labán» y «Harán» siguen la transliteración estándar en español bíblico.
  - No se añadió «obedéceme» en el texto principal para no desplazar el valor literal de «mi voz», aunque la implicación de obediencia sigue siendo posible en la nota.
  - Se prefirió «huye» sobre una expansión como «escapa para ti» por la fuerza imperativa del hebreo.
