translation:
  language: es
  text: La espada de Yahvé está llena de sangre; ha sido cebada con grasa, con la sangre de corderos y machos cabríos[a], con la grasa de los riñones de carneros. Porque Yahvé tiene un sacrificio[b] en Bosra, y una gran matanza en la tierra de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Machos cabríos» traduce un término más específico que significa machos de cabra.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Porque para Yahvé hay un sacrificio en Bosra». La cláusula hebrea no tiene verbo expreso y puede construirse de ambas maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - hoja
  - arma
  lexicon: HALOT
  rationale: חֶרֶב designa una espada concreta; 'espada' es el equivalente natural y conserva la imagen de juicio.
- source_word: לַיהוָה
  english_pob_choice: of the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: 'El lamed marca relación/pertenencia en este contexto: la espada se identifica como instrumento de Yahvé. Se sigue la política del proyecto de usar ''Yahvé'' para el Nombre divino.'
- source_word: מָלְאָה דָם
  english_pob_choice: is filled with blood
  chosen_spanish: está llena de sangre
  alternatives_spanish:
  - está colmada de sangre
  - se ha llenado de sangre
  lexicon: HALOT
  rationale: El perfectivo hebreo tiene fuerza resultativa y presente vívido; 'está llena' comunica ese estado sin volverlo excesivamente analítico.
- source_word: הֻדַּשְׁנָה
  english_pob_choice: is made fat
  chosen_spanish: está engordada
  alternatives_spanish:
  - está cebada
  - está hecha gorda
  lexicon: HALOT
  rationale: El pasivo de דשׁן expresa volverse graso/cebado. 'Engordada' conserva la metáfora sacrificial en español y evita suavizarla.
- source_word: מֵחֵלֶב
  english_pob_choice: with fat
  chosen_spanish: con grasa
  alternatives_spanish:
  - con sebo
  - con la grasa
  lexicon: HALOT
  rationale: חֵלֶב se refiere a la grasa/sebo sacrificial. 'Grasa' es claro y natural en español contemporáneo; 'sebo' sería más técnico pero menos fluido.
- source_word: מִדַּם כָּרִים וְעַתּוּדִים
  english_pob_choice: with the blood of lambs and goats
  chosen_spanish: con la sangre de corderos y machos cabríos
  alternatives_spanish:
  - con la sangre de corderos y cabras
  - con la sangre de carneros y machos cabríos
  lexicon: HALOT
  rationale: כָּרִים puede denotar corderos o crías de oveja; 'corderos' es una forma clara y natural. עַתּוּדִים son machos cabríos; se explicita el rasgo masculino porque el término lo lleva y el contexto es sacrificial.
- source_word: עַתּוּדִים
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras
  - chivos
  lexicon: HALOT
  rationale: 'El término es más específico que ''goats'': designa machos cabríos. Se mantiene la precisión léxica del hebreo.'
- source_word: מֵחֵלֶב כִּלְיוֹת אֵילִים
  english_pob_choice: with the fat of the kidneys of rams
  chosen_spanish: con la grasa de los riñones de carneros
  alternatives_spanish:
  - con el sebo de los riñones de carneros
  - con la grasa renal de carneros
  lexicon: HALOT
  rationale: Se preserva el detalle sacrificial explícito de 'riñones' y el genitivo de carneros. 'Grasa' mantiene el registro bíblico sin forzar tecnicismos.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - machos de oveja
  - borregos
  lexicon: HALOT
  rationale: '''Carneros'' es el equivalente estándar para el animal sacrificial masculino.'
- source_word: כִּי זֶבַח לַיהוָה
  english_pob_choice: For the LORD has a sacrifice
  chosen_spanish: Porque Yahvé tiene un sacrificio
  alternatives_spanish:
  - Porque para Yahvé hay un sacrificio
  - Porque Yahvé ha dispuesto un sacrificio
  lexicon: HALOT
  rationale: Se respeta la cláusula sin verbo explícito del hebreo; 'tiene un sacrificio' sigue la lectura del POB inglés y conserva la posibilidad gramatical alternativa sin resolverla por paráfrasis.
- source_word: בְּבָצְרָה
  english_pob_choice: in Bozrah
  chosen_spanish: en Bosra
  alternatives_spanish:
  - en Bozra
  - en Bosrá
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma española más reconocible y clara.
- source_word: וְטֶבַח גָּדוֹל
  english_pob_choice: and a great slaughter
  chosen_spanish: y una gran matanza
  alternatives_spanish:
  - y una gran matanza ritual
  - y un gran degüello
  lexicon: HALOT
  rationale: טֶבַח es 'matanza'/'degüello'; 'matanza' es directo y conserva el tono de juicio y sacrificio sin exagerar el registro coloquial.
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en el país de Edom
  - en la tierra de Idumea
  lexicon: HALOT
  rationale: Se conserva la referencia geográfica literal y el nombre propio tradicional del territorio.
theological_decisions:
- issue: Ambigüedad sintáctica de la cláusula 'porque Yahvé tiene un sacrificio...'
  english_pob_reading: The English POB keeps the clause as a finite statement while noting in a footnote that the Hebrew is verbless and can also be construed as 'for the LORD there is a sacrifice in Bozrah.'
  chosen_spanish_reading: Porque Yahvé tiene un sacrificio en Bosra
  alternative_spanish_readings:
  - Porque para Yahvé hay un sacrificio en Bosra
  - Porque en Bosra hay un sacrificio para Yahvé
  rationale: La redacción conserva la lectura principal del POB y, a la vez, permite percibir la alternativa sintáctica del hebreo sin borrar la tensión entre posesión y localización.
  doctrine_reference: 'Translation philosophy §3: preserve grammatical and theological tension rather than resolving it prematurely.'
- issue: Imaginería sacrificial aplicada al juicio divino sobre Edom
  english_pob_reading: Retain explicit sacrificial language ('sacrifice,' 'fat,' 'kidneys,' 'slaughter') as metaphor for Yahweh's judgment on Edom.
  chosen_spanish_reading: Mantener 'sacrificio', 'grasa', 'riñones' y 'matanza' como lenguaje sacrificial explícito para el juicio de Yahvé.
  alternative_spanish_readings:
  - Suavizar la imagen hacia simple lenguaje bélico
  - Reformular como destrucción general
  rationale: El texto profético une sacrificio y juicio; conservar esa unión evita borrar la carga teológica del pasaje.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than flattening the metaphor.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se prefirió ''fat'' sobre ''fatness'' por mayor precisión léxica; en español eso se reflejó con ''grasa'' en lugar de una abstracción como ''grasez''. También se mantuvo la lectura final con lenguaje sacrificial explícito y la nota sobre la cláusula hebrea sin verbo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino, de acuerdo con la política del proyecto.
  - Se preserva la imaginería sacrificial completa sin convertirla en mera escena de batalla.
  - '''Bosra'' se mantiene como topónimo transliterado en español para coherencia con el resto del corpus.'
  - '''Machos cabríos'' conserva la especificidad del hebreo עַתּוּדִים.'
  - '''Grasa'' transmite mejor el campo semántico de חֵלֶב que una paráfrasis más vaga.'
