base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/028.yaml
  text: But as soon as they had rest[a], they turned back to do evil before you, and you abandoned them into the hand of their enemies, who ruled over them. Then they turned back and cried out to you[c][b], and you heard from heaven and delivered them many times according to your abundant mercies.
  footnotes:
  - marker: a
    text: Or 'when they had rest.' The Hebrew temporal clause can be rendered more literally that way; 'as soon as they had rest' brings out the immediate relapse implied by the context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the hand of their enemies,' a Hebrew idiom for being given over to another's power.
    reason: cultural_note
  - marker: c
    text: Or 'according to your great compassion.' The Hebrew uses a plural noun, 'your mercies/compassions.'
    reason: lexical_alternative
