translation:
  language: es
  text: Entonces todo el pueblo del país entró en la casa de Baal y la derribó[a]. Destruyeron por completo sus altares y sus imágenes[b], y mataron a Mattán, sacerdote de Baal, delante de los altares. Luego el sacerdote nombró supervisores sobre la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Baal». El hebreo dice literalmente «la casa de Baal».
    reason: lexical_alternative
  - marker: b
    text: O «sus ídolos» o «sus estatuas» para «sus imágenes».
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa el nombre divino YHWH; aquí se traduce «Yahvé».
    reason: theological_note
lexical_decisions:
- source_word: כָל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - toda la gente de la tierra
  - todo el pueblo del país
  - los habitantes de la tierra
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo sin reducirlo a una categoría social más interpretativa. En español, «pueblo de la tierra» suena natural y mantiene la referencia colectiva amplia.
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  lexicon: HALOT
  rationale: «Casa» reproduce el sustantivo hebreo בית y mantiene el paralelismo con «la casa de Yahvé» al final del versículo. «Templo» sería más interpretativo.
- source_word: וַיִּתְּצֻהוּ
  english_pob_choice: tore it down
  chosen_spanish: la derribó
  alternatives_spanish:
  - la demolió
  - la echó abajo
  - la destruyó
  lexicon: HALOT
  rationale: El verbo expresa derribar una estructura. «La derribó» es natural, directo y conserva el carácter físico de la acción.
- source_word: מִזְבְּחֹתָיו
  english_pob_choice: his altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - los altares de él
  - sus lugares de sacrificio
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se refleja de forma directa con «sus». Mantiene la relación con Baal sin añadir explicaciones.
- source_word: צְלָמָיו
  english_pob_choice: his images
  chosen_spanish: sus imágenes
  alternatives_spanish:
  - sus ídolos
  - sus estatuas
  - sus figuras
  lexicon: HALOT
  rationale: «Imágenes» sigue de cerca el término hebreo y evita cargar el sentido con «ídolos», aunque el contexto cultual lo hace evidente.
- source_word: שִׁבְּרוּ הֵיטֵב
  english_pob_choice: thoroughly smashed
  chosen_spanish: destruyeron por completo
  alternatives_spanish:
  - rompieron del todo
  - hicieron pedazos
  - aplastaron por completo
  lexicon: HALOT
  rationale: La combinación verbal intensifica la idea de fracturar y dejar inútiles los objetos. «Destruyeron por completo» comunica la totalidad de la acción con fluidez en español.
- source_word: מַתָּן כֹּהֵן הַבַּעַל
  english_pob_choice: Mattan the priest of Baal
  chosen_spanish: Mattan, sacerdote de Baal
  alternatives_spanish:
  - Mattan, el sacerdote de Baal
  - Mattan, el sacerdote baalita
  lexicon: HALOT
  rationale: Respeta la identificación del personaje y su cargo. En español, el inciso nominal con coma es la forma más clara y natural.
- source_word: לִפְנֵי הַמִּזְבְּחוֹת
  english_pob_choice: before the altars
  chosen_spanish: delante de los altares
  alternatives_spanish:
  - frente a los altares
  - ante los altares
  lexicon: HALOT
  rationale: «Delante de» conserva el valor espacial de לִפְנֵי sin sonar arcaico en español actual.
- source_word: וַיָּשֶׂם הַכֹּהֵן פְּקֻדּוֹת
  english_pob_choice: Then the priest appointed overseers
  chosen_spanish: Luego el sacerdote puso encargados
  alternatives_spanish:
  - Luego el sacerdote nombró supervisores
  - Entonces el sacerdote estableció supervisores
  - Luego el sacerdote instituyó cargos
  lexicon: HALOT
  rationale: פְּקֻדּוֹת admite un sentido administrativo de personas puestas en cargo o vigilancia. «Encargados» es suficientemente amplio para reflejar esa función sin forzar un oficio técnico no explícito.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la correspondencia formal con «la casa de Baal» y el nombre divino conforme al criterio doctrinal del proyecto. «Casa» preserva el contraste literario del versículo.
theological_decisions:
- issue: Renderizado del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre propio divino. En español del POB, «Yahvé» conserva ese nombre sin sustituirlo por un título, siguiendo el criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el flujo de revisión más reciente: no se requieren cambios respecto del consenso alto del audit trail en inglés. La versión española mantiene las mismas decisiones clave sobre «casa», «imágenes» y el nombre divino, adaptadas a la terminología del proyecto en español.'
  spanish_consistency_notes:
  - Se conserva el paralelismo «la casa de Baal / la casa de Yahvé».
  - «Imágenes» se mantiene como término neutro y literal para צְלָמִים.
  - «Encargados» refleja una solución administrativa amplia para פְּקֻדּוֹת sin imponer una lectura más específica que la evidencia.
  - La puntuación busca claridad narrativa sin alterar la secuencia de acciones del hebreo.
