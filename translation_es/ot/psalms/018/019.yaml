review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: enemigos que se le enfrentan en el momento de desgracia, en contraste con Yahvé como sostén. Conserva correctamente אֵידִי como «mi calamidad» y יְהוָה como «Yahvé». Sin embargo, la nota alternativa para יְקַדְּמוּנִי introduce «Me adelantaron», que en español suena poco natural y no comunica bien el matiz contextual de encuentro hostil; conviene ajustarla a alternativas más fieles al expediente inglés.'
  spanish_quality_summary: 'El texto principal en español es claro, natural y de registro digno: «Me salieron al encuentro... pero Yahvé fue mi apoyo». La frase suena idiomática y preserva el contraste. La única reparación necesaria es estilística y semántica en la nota al pie, para mejorar claridad y fidelidad.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; אֵידִי → «calamidad»; לְמִשְׁעָן → «apoyo». La elección «Me salieron al encuentro» para יְקַדְּמוּנִי es aceptable como equivalente contextual. La nota debe conservar las alternativas inglesas documentadas de forma idiomática en español.'
  issues:
  - severity: medium
    issue: La nota al pie usa «Me adelantaron» como alternativa de יְקַדְּמוּנִי.
    rationale: Aunque קדמ puede incluir la idea de preceder, «Me adelantaron» en español actual no transmite de manera clara el sentido contextual de venir al encuentro o sobrevenir en un contexto hostil. Las alternativas auditadas fueron «They came upon me» y «They met me», por lo que conviene algo como «Vinieron sobre mí» o «Me encontraron».
  revised_spanish_text: Me salieron al encuentro en el día de mi calamidad[a], pero Yahvé fue mi apoyo.
  revised_footnotes:
  - marker: a
    text: 'O: «Vinieron sobre mí» o «Me encontraron» en el día de mi calamidad.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el hebreo y la política terminológica del proyecto. Se corrige únicamente la nota léxica para expresar alternativas españolas más idiomáticas y más cercanas a las opciones documentadas en el expediente inglés.
