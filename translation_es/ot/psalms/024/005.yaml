review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «recibirá» para יִשָּׂא, «bendición» para בְּרָכָה, el nombre divino «Yahvé», y la frase constructa «del Dios de su salvación». Sin embargo, la nota al pie no preserva fielmente las alternativas documentadas en el POB inglés para צְדָקָה, porque sustituye «righteousness» con alternativas «vindication» y «justice», pero en español el texto principal ya usa «justicia»; por eso la nota debe ofrecer alternativas realmente distintas del texto principal y alineadas con el expediente inglés.'
  spanish_quality_summary: 'El español es claro, natural y digno. La línea principal suena bien en registro bíblico moderno. El único problema de calidad es de consistencia semántica entre texto y nota: anclar la nota en «Yahvé» cuando la variación léxica afecta «justicia» puede confundir al lector, y la nota actual ofrece «justicia» como explicación de «justicia», lo cual pierde utilidad.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהִים → «Dios», יִשְׁעוֹ → «salvación». Para צְדָקָה, «justicia» es aceptable como elección contextual, pero la documentación inglesa eligió «righteousness» con nota «vindication / justice». En español, si se mantiene «justicia» en el texto, la nota debe compensar con alternativas como «vindicación» y «rectitud» o similar, y el anclaje debe ir sobre «justicia», no sobre «Yahvé».'
  issues:
  - severity: medium
    issue: Marcador de nota colocado en «Yahvé» en lugar de en «justicia».
    rationale: La nota explica el campo semántico de צְדָקָה, no el nombre divino. El anclaje actual puede inducir a pensar que la nota trata sobre «Yahvé».
  - severity: medium
    issue: La nota no refleja de forma óptima las alternativas del expediente inglés para צְדָקָה.
    rationale: El POB inglés documenta «vindication» y «justice» como alternativas a «righteousness». En español, como el texto principal ya usa «justicia», conviene preservar la amplitud con alternativas no redundantes, especialmente «vindicación», y aclarar que el hebreo también puede comunicar rectitud/justicia salvadora.
  revised_spanish_text: Recibirá bendición de Yahvé y justicia[a] del Dios de su salvación.
  revised_footnotes:
  - marker: a
    text: O «vindicación» o «rectitud». El término hebreo también puede tener matices judiciales y salvíficos, además del sentido moral.
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal, que es fiel y natural, pero se mueve la nota al término relevante («justicia») y se ajusta su contenido para preservar mejor la ambigüedad léxica documentada para צְדָקָה sin redundancia en español.
