translation:
  language: es
  text: Y cuando se consumieron los materiales del sacrificio[a], Nehemías ordenó que el agua restante se derramara sobre piedras más grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más literal, «las cosas del sacrificio». El griego es más amplio que un simple singular «el sacrificio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηλώθη
  english_pob_choice: had been consumed
  chosen_spanish: se consumieron
  alternatives_spanish:
  - se agotaron
  - fueron consumidas
  - se terminaron
  lexicon: LSJ
  rationale: El aoristo pasivo en contexto sacrificial expresa que los elementos del sacrificio quedaron consumidos. «Se consumieron» mantiene la idea de consumación sin forzar un detalle mecánico adicional.
- source_word: τὰ τῆς θυσίας
  english_pob_choice: the things of the sacrifice
  chosen_spanish: las cosas del sacrificio
  alternatives_spanish:
  - los elementos del sacrificio
  - las cosas sacrificiales
  - el sacrificio
  lexicon: LSJ
  rationale: El neutro plural con genitivo es más amplio que «el sacrificio» como evento; por eso se conserva una formulación amplia y natural en español. «Las cosas» refleja esa amplitud, aunque pueda sonar algo general.
- source_word: τὸ περιλειπόμενον ὕδωρ
  english_pob_choice: the remaining water
  chosen_spanish: el agua restante
  alternatives_spanish:
  - el agua que quedaba
  - el agua sobrante
  lexicon: LSJ
  rationale: La participación expresa agua que quedó después de la acción anterior. «Agua restante» es fiel, clara y suficientemente sobria para el registro bíblico.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  - dispuso
  lexicon: LSJ
  rationale: El verbo indica una instrucción con autoridad. «Ordenó» conserva bien el tono narrativo y la autoridad de Nehemías.
- source_word: λίθους μείζονας
  english_pob_choice: larger stones
  chosen_spanish: piedras más grandes
  alternatives_spanish:
  - piedras mayores
  - piedras grandes
  lexicon: LSJ
  rationale: El comparativo μείζονας debe expresarse como tamaño relativo. «Más grandes» evita que «grandes» se lea solo como importancia.
- source_word: καταχεῖν
  english_pob_choice: to be poured on
  chosen_spanish: que se derramara sobre
  alternatives_spanish:
  - que se vertiera sobre
  - que se echara sobre
  - que se derramase sobre
  lexicon: LSJ
  rationale: El infinitivo indica verter sobre algo. En español, la pasiva/impersonal con subjuntivo suena natural y respeta la instrucción de derramar el agua sobre las piedras.
