base_translation:
  language: en
  yaml_path: translation/ot/judges/013/006.yaml
  text: Then the woman came and said to her husband[a], “A man of God came to me, and his appearance was like the appearance of an angel of God, very fearsome. I did not ask him where he was from[b], and he did not tell me his name.”
  footnotes:
  - marker: a
    text: Or, 'an angel of God.' The Hebrew can be understood as a comparison to a divine messenger without requiring the woman to have fully identified him at this point.
    reason: alternative_reading
  - marker: b
    text: '''Very fearsome'' may also be rendered ''very awesome'' or ''very terrifying''; the Hebrew expresses an appearance that inspired intense awe and fear.'
    reason: lexical_alternative
