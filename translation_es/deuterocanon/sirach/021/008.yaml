translation:
  language: es
  text: El que edifica su casa con dinero ajeno es como el que junta sus piedras para el invierno[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con la riqueza ajena». El griego dice literalmente «en bienes/dineros ajenos», una fórmula que puede abarcar dinero, recursos o posesiones de otra persona.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para la temporada de tormenta». χειμών también puede aludir al tiempo invernal o tormentoso; la imagen subraya lo tardío e inútil de reunir piedras cuando ya llega el mal tiempo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ οἰκοδομῶν
  english_pob_choice: He who builds
  chosen_spanish: El que edifica
  alternatives_spanish:
  - El que construye
  - Quien edifica
  lexicon: LSJ
  rationale: El participio articular griego funciona de modo proverbial y general. «El que edifica» conserva el valor sentencioso y suena natural en español bíblico sin perder la referencia a una acción de construcción.
- source_word: τὴν οἰκίαν αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su vivienda
  lexicon: LSJ
  rationale: Aquí οἰκία se entiende en sentido literal de edificio, coherente con «edifica» y con la imagen de las piedras. «Casa» es la correspondencia más directa y clara.
- source_word: ἐν χρήμασιν ἀλλοτρίοις
  english_pob_choice: with another’s money
  chosen_spanish: con dinero ajeno
  alternatives_spanish:
  - con riquezas ajenas
  - con bienes ajenos
  - con el dinero de otros
  lexicon: LSJ
  rationale: El griego usa χρήματα con ἀλλότριος para expresar recursos que pertenecen a otro. «Dinero ajeno» conserva la fuerza idiomática y evita reducirlo a «moneda» o a una idea demasiado abstracta de riqueza.
- source_word: ὡς συνάγων
  english_pob_choice: is like one gathering
  chosen_spanish: es como el que junta
  alternatives_spanish:
  - es como quien recoge
  - es como uno que reúne
  lexicon: LSJ
  rationale: La comparación con ὡς + participio se expresa bien con «es como el que». «Junta» refleja la acción concreta de reunir piedras, con un registro sobrio y proverbial.
- source_word: αὐτοῦ τοὺς λίθους
  english_pob_choice: his stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - las piedras de él
  - las piedras para sí
  lexicon: LSJ
  rationale: El posesivo griego puede referirse a las piedras del constructor, no necesariamente a piedras ya poseídas como objeto independiente. En español, «sus piedras» mantiene la referencia natural al material de construcción y la relación posesiva implícita.
- source_word: εἰς χειμῶνα
  english_pob_choice: for winter
  chosen_spanish: para el invierno
  alternatives_spanish:
  - contra el invierno
  - para la temporada de invierno
  - para la estación de los vientos
  lexicon: LSJ
  rationale: χειμών puede incluir la idea de estación fría o tiempo de tormenta. «Para el invierno» reproduce la imagen principal y deja intacta la tensión de inutilidad sugerida por la comparación.
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con el contexto auditado en inglés, y la revisión más reciente no introdujo cambios. La redacción española sigue la lectura proverbiaI confirmada por el control cruzado: un edificador que usa recursos ajenos se compara con quien reúne piedras demasiado tarde, cuando se aproxima el invierno o la estación de tormenta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva «casa» en sentido arquitectónico, ya que el contexto de edificar y juntar piedras excluye aquí el sentido de «hogar» o «familia».
  - «Dinero ajeno» reproduce la fuerza ética del griego sin suavizarla a «riqueza»; la nota ofrece la alternativa más amplia documentada en el audit trail.
  - «Para el invierno» se deja en el cuerpo del texto por ser la forma más breve y natural; la nota preserva la posible intensificación estacional de χειμών.
