    issue: La nota [b] añade una alternativa («antepasados») que no es necesaria para resolver una ambigüedad fuerte.
    rationale: No es un error; simplemente amplía la explicación más allá de lo estrictamente exigido. Aun así, la nota sigue siendo fiel y útil.
