translation:
  language: es
  text: Y ellos se apoderaron de la ciudad, y quemaron el recinto del templo, junto con todos los que estaban en él[a]; y Carnain fue derrotada, y ya no pudo resistir delante de Judas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con todo lo que había en él». El griego puede leerse de modo más amplio, aunque en contexto probablemente se refiere a las personas dentro del recinto sagrado.
    reason: alternative_reading
lexical_decisions:
- source_word: προκατελάβοντο
  english_pob_choice: seized the city
  chosen_spanish: se apoderaron de la ciudad
  alternatives_spanish:
  - tomaron la ciudad
  - capturaron la ciudad
  - ocuparon la ciudad
  lexicon: LSJ
  rationale: El verbo compuesto expresa toma de posesión/captura. En español, «se apoderaron de» conserva la fuerza de apropiación militar sin introducir un calco forzado como «capturaron primero», que el repaso inglés también consideró demasiado literal.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - villa
  lexicon: LSJ
  rationale: «Ciudad» es el equivalente natural y preciso para πόλις en este contexto narrativo militar.
- source_word: τέμενος
  english_pob_choice: temple precinct
  chosen_spanish: recinto del templo
  alternatives_spanish:
  - precinto del templo
  - santuario
  - templo
  lexicon: LSJ
  rationale: τέμενος designa el área sagrada o recinto consagrado, no necesariamente solo el edificio. «Recinto del templo» preserva esa amplitud mejor que «templo» a secas.
- source_word: ἐνεπύρισαν ἐν πυρί
  english_pob_choice: burned ... with fire
  chosen_spanish: prendieron fuego
  alternatives_spanish:
  - lo quemaron con fuego
  - lo incendiaron
  - lo quemaron
  lexicon: LSJ
  rationale: El griego es enfático, pero en español «prendieron fuego» comunica de manera natural la acción incendiaria sin redundancia excesiva. El complemento «al recinto del templo» mantiene el objeto quemado.
- source_word: σὺν πᾶσιν τοῖς οὖσιν ἐν αὐτῷ
  english_pob_choice: together with all who were in it
  chosen_spanish: junto con todos los que estaban en él
  alternatives_spanish:
  - con todo lo que había en él
  - junto con todo lo que estaba en él
  lexicon: LSJ
  rationale: La construcción admite un sentido amplio, pero el contexto bélico favorece personas dentro del recinto. «Los que estaban en él» conserva esa lectura y deja implícita la nota de alternativa textual/lexical.
- source_word: ἐτροπώθη
  english_pob_choice: was routed
  chosen_spanish: fue derrotada
  alternatives_spanish:
  - fue puesta en fuga
  - fue desbaratada
  - fue derrotada y dispersada
  lexicon: LSJ
  rationale: El pasivo militar puede traducirse como ser derrotado/puesto en fuga. Dado que el sujeto es la ciudad-personificación, «fue derrotada» suena natural en español y conserva el resultado de la acción.
- source_word: Καρναῒν
  english_pob_choice: Karnain
  chosen_spanish: Carnain
  alternatives_spanish:
  - Karnain
  - Carnaín
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre propio en forma reconocible para español bíblico. «Carnain» refleja la forma tradicional más cercana al uso castellano sin cambiar el referente.
- source_word: οὐκ ἐδύνατο ἔτι ὑποστῆναι
  english_pob_choice: could no longer stand
  chosen_spanish: ya no pudo resistir
  alternatives_spanish:
  - ya no pudo mantenerse en pie
  - ya no pudo sostenerse
  - ya no pudo hacer frente
  lexicon: LSJ
  rationale: ὑποστῆναι significa sostenerse/aguantar/resistir. «Ya no pudo resistir» expresa bien la incapacidad de mantenerse frente al enemigo y evita una imagen demasiado literal de postura física.
- source_word: κατὰ πρόσωπον Ἰούδα
  english_pob_choice: before Judas
  chosen_spanish: delante de Judas
  alternatives_spanish:
  - frente a Judas
  - ante Judas
  - cara a cara con Judas
  lexicon: LSJ
  rationale: La expresión idiomática indica confrontación directa. «Delante de Judas» es natural en español y preserva la idea de no poder mantenerse ante él, sin forzar el modismo «cara a cara».
theological_decisions:
- issue: Sujeto femenino singular para «Karnain» y lenguaje de derrota
  english_pob_reading: and Karnain was routed
  chosen_spanish_reading: y Carnain fue derrotada
  alternative_spanish_readings:
  - y Carnain fue derrotado
  - y Carnain fue puesta en fuga
  rationale: El griego trata Καρναῒν como sujeto femenino singular, probablemente por la ciudad-personificación. Se conserva ese valor con «fue derrotada», manteniendo la concordancia del original y el carácter narrativo.
  doctrine_reference: Personificación geográfica en narración histórica; concordancia gramatical del sujeto griego.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó una traducción demasiado literal de προκατελάβοντο («in advance») y simplificó κατὰ πρόσωπον Ἰούδα a un valor más natural («before Judas»). Por eso el español evita cualquier idea de «primero» o «de antemano» y opta por una expresión idiomática de confrontación directa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el nombre divino; aquí no aparece.
  - «Mesías/Cristo» no interviene en este versículo.
  - Se mantiene el registro histórico-bélico y no se introduce lenguaje devocional ajeno al pasaje.
  - La nota textual/lexical sobre σὺν πᾶσιν τοῖς οὖσιν ἐν αὐτῷ se preserva como alternativa abierta en nota al pie.
