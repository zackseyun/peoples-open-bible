revisions:
- from: Y todos los que transgredan tanto la ley de tu Dios como la ley del rey serán castigados diligentemente[a], ya sea con muerte o con castigo[b], con multa de plata o con confiscación[c].
  to: Y todos los que transgredan tanto la ley de tu Dios como la ley del rey serán castigados estrictamente[a], ya sea con muerte o con castigo[b], con una multa de plata o con confiscación[c].
  rationale: 'Se hizo una reparación menor para evitar un calco poco idiomático en español: «diligentemente» se cambió por «estrictamente», que comunica mejor la ejecución rigurosa de la sanción en un registro jurídico claro. También se añadió el artículo en «una multa de plata» para mejorar la fluidez. Se conservó la nota textual principal y se incorporó en la nota [a] la alternativa cercana al matiz del adverbio griego.'
