translation:
  language: es
  text: Y el principal de los principales de los levitas fue Eleazar, hijo de Aarón el sacerdote, encargado de los que cumplían la custodia del santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas santas». El hebreo הַקֹּדֶשׁ puede denotar tanto el santuario mismo como los objetos sagrados asociados con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/נְשִׂיא
  english_pob_choice: And the chief
  chosen_spanish: Y el principal
  alternatives_spanish:
  - Y el jefe
  - Y el príncipe
  lexicon: HALOT
  rationale: נָשִׂיא puede referirse a un jefe o líder de rango. En español, «principal» comunica prioridad jerárquica sin introducir matices monárquicos que «príncipe» podría sugerir.
- source_word: נְשִׂיאֵי הַלֵּוִי
  english_pob_choice: of the chiefs of the Levites
  chosen_spanish: de los principales de los levitas
  alternatives_spanish:
  - sobre los principales de los levitas
  - de los jefes de los levitas
  lexicon: HALOT
  rationale: La cadena constructa indica superioridad dentro del grupo. «De los principales de los levitas» conserva la relación sintáctica y evita una paráfrasis más interpretativa.
- source_word: אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Eleazar son of Aaron the priest
  chosen_spanish: Eleazar, hijo de Aarón, el sacerdote
  alternatives_spanish:
  - Eleazar hijo de Aarón, el sacerdote
  - Eleazar, hijo de Aarón, sacerdote
  lexicon: HALOT
  rationale: Se conserva la filiación y el título sacerdotal en aposición natural al español. «El sacerdote» se mantiene para respetar el enlace del título con Aarón, como en el inglés auditado.
- source_word: פְּקֻדַּת
  english_pob_choice: having oversight of
  chosen_spanish: encargado de
  alternatives_spanish:
  - con la supervisión de
  - a cargo de
  - con la responsabilidad de
  lexicon: HALOT
  rationale: פְּקֻדָּה expresa cargo, responsabilidad u supervisión. «Encargado de» comunica bien la función administrativa/cultual sin forzar una abstracción excesiva en español.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_choice: those who kept charge
  chosen_spanish: los que guardaban el cargo
  alternatives_spanish:
  - los que guardaban la custodia
  - los que cumplían la guardia
  - los que mantenían la vigilancia
  lexicon: HALOT
  rationale: La expresión intensifica la idea de custodia o responsabilidad confiada. «Guardaban el cargo» conserva el juego de guardia/responsabilidad del hebreo, aunque suene menos idiomático que otras opciones; se prefiere por fidelidad semántica.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - las cosas santas
  - lo santo
  - el lugar santo
  lexicon: HALOT
  rationale: En este contexto tabernacular, הַקֹּדֶשׁ puede aludir al santuario mismo. «Santuario» mantiene la lectura cultual principal y es la opción más clara en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de הַקֹּדֶשׁ
  english_pob_reading: 'the sanctuary; footnote: Or ''the holy things.'' The Hebrew הַקֹּדֶשׁ can denote either the sanctuary itself or the sacred objects associated with it.'
  chosen_spanish_reading: el santuario
  alternative_spanish_readings:
  - las cosas santas
  - lo santo
  - el lugar santo
  rationale: El hebreo admite una ambigüedad real entre el espacio sagrado y los objetos sagrados. Se adopta «el santuario» en el texto principal por coherencia con el contexto levítico, y se preserva la alternativa en nota para no borrar la tensión semántica.
  doctrine_reference: Números 3:32; uso cultual de הַקֹּדֶשׁ en contexto tabernacular
translation_notes:
  revision_awareness: 'El texto sigue de cerca el último estado revisado del inglés POB: «chief of the chiefs of the Levites», con ajuste natural al español («el principal de los principales de los levitas»). Se conserva la estructura administrativa y la ambigüedad de הַקֹּדֶשׁ mediante nota, tal como el audit trail inglés la documenta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presenta el nombre divino; aquí no aparece.
  - Se mantiene «levitas» en minúscula como sustantivo común de grupo étnico/funcional, conforme al estilo bíblico en español.
  - «Santuario» se usa para הַקֹּדֶשׁ por contexto; la nota registra la alternativa «las cosas santas» sin eclipsar la lectura principal.
