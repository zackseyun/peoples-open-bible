translation:
  language: es
  text: 'Pero este fue el mandato que les di: «Escuchen[a] mi voz, y yo seré su Dios, y ustedes serán mi pueblo; y anden en todo el camino que yo les mando, para que les vaya bien.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Obedezcan mi voz». El hebreo «escuchar mi voz» suele incluir la idea de obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  - Pero más bien
  lexicon: HALOT
  rationale: En este contexto, la expresión introduce una corrección adversativa frente al contraste anterior; «Pero» comunica con naturalidad ese giro sin añadir matices interpretativos innecesarios.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this command
  chosen_spanish: este mandato
  alternatives_spanish:
  - esta palabra
  - esta orden
  - esta cosa
  lexicon: HALOT
  rationale: Aunque דָּבָר puede ser «palabra», «asunto» o «cosa», aquí se relaciona directamente con צִוִּיתִי («mandé»), por lo que «mandato» preserva el sentido de una instrucción dada.
- source_word: צִוִּיתִי אוֹתָם לֵאמֹר
  english_pob_choice: I gave them
  chosen_spanish: les di fue
  alternatives_spanish:
  - les mandé fue
  - les ordené diciendo
  - les di este mandato
  lexicon: HALOT
  rationale: El hebreo introduce el contenido del mandato con fórmula verbal de envío/mandato. En español, «les di fue» integra con naturalidad la cita directa y evita una redundancia pesada, manteniendo el carácter imperativo.
- source_word: שִׁמְעוּ בְקוֹלִי
  english_pob_choice: Listen to my voice
  chosen_spanish: Escuchen[a] mi voz
  alternatives_spanish:
  - Obedezcan mi voz
  - Oigan mi voz
  - Escúchenme
  lexicon: HALOT
  rationale: La expresión hebrea conserva literalmente la imagen de oír la voz. Se mantiene «Escuchen» para no importar de entrada la glosa interpretativa de obediencia al cuerpo del texto, aunque esa fuerza está presente por el contexto del pacto; la nota ofrece la alternativa tradicional «Obedezcan».
- source_word: וְהָיִיתִי לָכֶם לֵאלֹהִים
  english_pob_choice: and I will be your God
  chosen_spanish: y yo seré su Dios
  alternatives_spanish:
  - y seré Dios para ustedes
  - y yo seré Dios de ustedes
  lexicon: HALOT
  rationale: Es la fórmula pactal clásica. «Yo seré su Dios» conserva la relación covenantal de manera clara y solemne en español.
- source_word: וְאַתֶּם תִּהְיוּ לִי לְעָם
  english_pob_choice: and you shall be my people
  chosen_spanish: y ustedes serán mi pueblo
  alternatives_spanish:
  - y ustedes serán para mí un pueblo
  - y serán mi gente
  lexicon: HALOT
  rationale: La fórmula recíproca se traduce en paralelo con la anterior. «Mi pueblo» preserva el lenguaje bíblico de alianza sin recurrir a formulaciones eclesiásticas ajenas al texto.
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: and walk
  chosen_spanish: y anden
  alternatives_spanish:
  - y caminarán
  - y vivirán
  - y seguirán
  lexicon: HALOT
  rationale: הלך en contextos éticos suele referirse al modo de vida. «Anden» conserva la metáfora bíblica del caminar y funciona bien en español contemporáneo.
- source_word: בְּכָל הַדֶּרֶךְ
  english_pob_choice: in all the way
  chosen_spanish: en todo el camino
  alternatives_spanish:
  - en todo el sendero
  - en toda la senda
  - en cada camino
  lexicon: HALOT
  rationale: El singular «el camino» refleja mejor la forma hebrea que un plural abstracto. «En todo el camino» transmite la totalidad del ámbito de obediencia sin diluir la imagen.
- source_word: אֲשֶׁר אֲצַוֶּה אֶתְכֶם
  english_pob_choice: that I command you
  chosen_spanish: que yo les mando
  alternatives_spanish:
  - que yo les ordeno
  - que yo les mandaré
  - que yo les he de mandar
  lexicon: HALOT
  rationale: El imperfecto hebreo puede ser presente o futuro; aquí el presente español suena natural en una estipulación general y conserva la validez continua del mandato.
- source_word: לְמַעַן יִיטַב לָכֶם
  english_pob_choice: so that it may go well with you
  chosen_spanish: para que les vaya bien
  alternatives_spanish:
  - para que les vaya mejor
  - a fin de que estén bien
  - para que les resulte bien
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica bienestar resultante. «Les vaya bien» es la equivalencia española más natural y fiel al sentido relacional y práctico del pasaje.
theological_decisions:
- issue: Fórmula de pacto relacional
  english_pob_reading: I will be your God, and you shall be my people
  chosen_spanish_reading: yo seré su Dios, y ustedes serán mi pueblo
  alternative_spanish_readings:
  - seré Dios para ustedes, y serán un pueblo para mí
  - yo seré Dios de ustedes, y ustedes serán mi pueblo
  rationale: La frase expresa relación de pacto, no una definición ontológica abstracta. La versión elegida mantiene el paralelismo y la solemnidad del convenio bíblico en español claro.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: El matiz obediencial de שִׁמְעוּ בְקוֹלִי
  english_pob_reading: Listen to my voice
  chosen_spanish_reading: Escuchen mi voz
  alternative_spanish_readings:
  - Obedezcan mi voz
  - Escúchenme
  rationale: Se preserva la literalidad de la imagen hebrea («oír/escuchar la voz») sin convertirla de forma automática en una glosa explicativa. La fuerza de obediencia permanece por el contexto del pacto y se puede explicitar en nota.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «every way» a «all the way» para reflejar mejor el singular de הַדֶּרֶךְ. En español se siguió esa corrección con «en todo el camino», evitando pluralizar el término y conservando la imagen unitaria del camino de obediencia. También se mantuvo la decisión auditada de no traducir en el texto principal la frase como «Obedezcan mi voz», aunque se registra como alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como término por defecto para el nombre divino cuando corresponda; en este versículo el hebreo usa אֱלֹהִים, por lo que se tradujo «Dios».
  - Se conservó la metáfora bíblica de «camino»/«anden» en lugar de reemplazarla por formulaciones más abstractas.
  - Se evitó «mi pueblo» en plural o con sustantivos eclesiásticos; la fórmula pactal quedó en lenguaje bíblico directo.
  - La puntuación de la cita sigue el estilo castellano con comillas tipográficas y una sola nota al pie vinculada al mandato de oír/obedecer.
