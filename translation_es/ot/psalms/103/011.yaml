revisions:
- from: Porque, como los cielos son más altos que la tierra, así de grande es su amor constante[a] para con los que le temen.
  to: Porque tan altos están los cielos sobre la tierra, tan grande es su amor fiel[a] hacia los que le temen.
  rationale: Se ajusta la comparación para reflejar mejor el hebreo, se mejora la naturalidad poética del español, y se fortalece la correspondencia de חסד con una expresión que preserve mejor el matiz de 'steadfast love' documentado en la auditoría inglesa.
  reviewer_model: gpt-5.4
