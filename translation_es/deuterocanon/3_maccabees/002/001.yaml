translation:
  language: es
  text: Señor, Señor, rey de los cielos y dueño de toda la creación, santo entre los santos[a], único soberano, Todopoderoso, presta atención a nosotros, que somos oprimidos por un hombre[b] impío y profano, hinchado de arrogancia y fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santo en los santos». La frase griega es compacta y litúrgica; «entre los santos» expresa de manera natural la relación implícita en ἐν.
    reason: lexical_alternative
  - marker: b
    text: El griego no dice explícitamente «hombre», pero el participio singular describe a un único adversario; en español se lo hace explícito para mayor claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: LSJ
  rationale: Vocativo de κύριος usado como título divino. En español, «Señor» es el equivalente más natural y reverente; «Dueño» o «Soberano» perderían la correspondencia litúrgica y la repetición enfática del vocativo.
- source_word: βασιλεῦ τῶν οὐρανῶν
  english_pob_choice: king of the heavens
  chosen_spanish: rey de los cielos
  alternatives_spanish:
  - rey de los cielos
  - rey del cielo
  lexicon: LSJ
  rationale: El griego tiene el plural τῶν οὐρανῶν, pero en español bíblico «cielos» transmite bien ese plural y suena más natural que una forma singular.
- source_word: δέσποτα πάσης τῆς κτίσεως
  english_pob_choice: master of all creation
  chosen_spanish: dueño de toda la creación
  alternatives_spanish:
  - dueño de toda la creación
  - señor de toda la creación
  lexicon: LSJ
  rationale: δέσποτα subraya dominio absoluto y pertenencia; «dueño» preserva esa fuerza sin repetir simplemente «Señor», que ya traduce κύριε.
- source_word: ἅγιε ἐν ἁγίοις
  english_pob_choice: holy among the holy ones
  chosen_spanish: santo entre los santos
  alternatives_spanish:
  - santo en los santos
  - santísimo entre los santos
  lexicon: LSJ
  rationale: La preposición ἐν admite sentido locativo/comunitario; «entre los santos» conserva la estructura compacta y el tono litúrgico. «Santo en los santos» suena demasiado literal en español.
- source_word: μόναρχε
  english_pob_choice: sole ruler
  chosen_spanish: único soberano
  alternatives_spanish:
  - único gobernante
  - soberano único
  lexicon: LSJ
  rationale: El término expresa soberanía exclusiva. «Único soberano» mantiene la unicidad y evita el matiz político moderno de «monarca».
- source_word: παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Que todo lo puede
  lexicon: LSJ
  rationale: Título divino tradicional y claro en español. «Todopoderoso» conserva el peso teológico del epíteto sin sonar técnico.
- source_word: πρόσχες ἡμῖν
  english_pob_choice: give heed to us
  chosen_spanish: atiende a nosotros
  alternatives_spanish:
  - atiende a nosotros
  - pon atención a nosotros
  - ten cuidado de nosotros
  lexicon: LSJ
  rationale: El imperativo pide atención divina y favorable. «Atiende a nosotros» suena formal y devocional en español; «ten cuidado de nosotros» introduce un matiz no presente aquí.
- source_word: καταπονουμένοις
  english_pob_choice: being oppressed
  chosen_spanish: somos oprimidos
  alternatives_spanish:
  - somos oprimidos
  - estamos siendo oprimidos
  - afligidos
  lexicon: LSJ
  rationale: El participio expresa presión/sufrimiento bajo dominio hostil. La pasiva en presente refleja bien la situación continua; «afligidos» sería más genérico.
- source_word: ἀνοσίου καὶ βεβήλου
  english_pob_choice: unholy and profane
  chosen_spanish: impío y profano
  alternatives_spanish:
  - impío y profano
  - irreverente y profano
  - sin piedad y profano
  lexicon: LSJ
  rationale: La pareja describe impiedad religiosa y profanación. «Impío y profano» distingue ambas cualidades de forma sobria y reconocible.
- source_word: θράσει καὶ σθένει πεφρυασμένου
  english_pob_choice: puffed up with arrogance and strength
  chosen_spanish: hinchado de arrogancia y fuerza
  alternatives_spanish:
  - hinchado de arrogancia y fuerza
  - pavoneado de audacia y fuerza
  - inflado de arrogancia y poder
  lexicon: LSJ
  rationale: πεφρυασμένου sugiere estar hinchado/pavoneado con orgullo; θράσει apunta a audacia insolente. «Hinchado de arrogancia y fuerza» conserva la metáfora y la combinación de descaro y poder.
theological_decisions:
- issue: Acumulación de títulos divinos en una invocación solemne
  english_pob_reading: 'Translate each title distinctly: Lord... king of the heavens... master... holy... sole ruler... Almighty'
  chosen_spanish_reading: 'Traducir cada título por separado: Señor... rey de los cielos... dueño... santo... único soberano... Todopoderoso'
  alternative_spanish_readings:
  - Fundir algunos títulos en una sola expresión
  - Reducir la acumulación a fórmulas más breves
  rationale: La oración apila epítetos para dar intensidad retórica y teológica. Mantenerlos diferenciados en español preserva la textura del griego y evita borrar matices entre κύριε, δέσποτα, μόναρχε y παντοκράτωρ.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; consistencia de términos clave, salvo excepción documentada.'
- issue: Tratamiento del singular hostil implícito en el participio
  english_pob_reading: man is supplied for clear English
  chosen_spanish_reading: hombre impío y profano
  alternative_spanish_readings:
  - persona impía y profana
  - ser impío y profano
  rationale: El griego no añade un sustantivo explícito, pero el participio singular describe a un único opresor. En español, «hombre» hace explícito ese referente singular sin ampliar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: suplir solo lo necesario para claridad cuando la gramática del destino lo requiere.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la auditoría inglesa: conserva la invocación acumulativa, mantiene el plural de «cielos», distingue δέσποτα de κύριος con «dueño», y vierte θράσει καὶ σθένει con una metáfora de hinchazón/presunción compatible con la revisión inglesa más formal («puffed up»).'
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε según el valor divino del vocativo.
  - Se conserva «cielos» en plural para reflejar τῶν οὐρανῶν.
  - «Todopoderoso» corresponde a παντοκράτωρ como título divino tradicional y claro.
  - La nota [a] preserva la alternativa de ἅγιε ἐν ἁγίοις sin imponerla en el cuerpo principal.
  - La nota [b] explica la adición interpretativa de «hombre» para reflejar el singular implícito del griego.
