translation:
  language: es
  text: Y cuando estuvo en angustia, buscó el favor[a] de Yahvé su Dios y se humilló mucho delante del Dios de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''imploró a Yahvé su Dios'' o ''rogó a Yahvé su Dios''. El hebreo es un modismo que literalmente significa ''suavizar/apaciguar el rostro''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el Dios de sus padres''. ''Antepasados'' es una posibilidad inclusiva, pero el texto mantiene la forma masculina del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְהָצֵר לוֹ
  english_pob_choice: And when he was in distress
  chosen_spanish: Y cuando estuvo en angustia
  alternatives_spanish:
  - Y cuando estuvo en aflicción
  - Y cuando estuvo en apuro
  lexicon: HALOT
  rationale: La construcción marca circunstancia temporal y el verbo expresa una situación de presión o aflicción. 'Angustia' preserva el peso experiencial en un español natural y digno.
- source_word: חִלָּה אֶת־פְּנֵי
  english_pob_choice: sought the favor of
  chosen_spanish: imploró el favor de
  alternatives_spanish:
  - rogó el favor de
  - entretó con súplica a
  lexicon: HALOT
  rationale: El hebreo es un modismo que literalmente alude a 'suavizar/apaciguar el rostro'. 'Imploró el favor de' conserva el sentido de súplica respetuosa sin volverlo demasiado literal o opaco.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton en la forma adoptada por el proyecto en español: ''Yahvé'', en lugar de sustituirlo por un título.'
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - su Dios personal
  lexicon: HALOT
  rationale: El sufijo posesivo indica relación personal y de pacto. En español, 'su Dios' comunica la posesión sin añadir matices ajenos al texto.
- source_word: וַיִּכָּנַע
  english_pob_choice: and humbled himself
  chosen_spanish: y se humilló
  alternatives_spanish:
  - y se sometió
  - y se abajó
  lexicon: HALOT
  rationale: El nifal de כנע aquí es reflexivo en contexto penitencial. 'Se humilló' mantiene la idea de abatimiento voluntario mejor que una lectura meramente pasiva.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: El intensificador se expresa con un adverbio natural en español. 'Mucho' es claro y suficiente para conservar la intensificación del verbo.
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La locución idiomática hebrea funciona como 'ante/delante de'. 'Delante de' es transparente y mantiene la imagen relacional sin sonar arcaica.
- source_word: אֱלֹהֵי אֲבֹתָיו
  english_pob_choice: the God of his fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se conserva la expresión de historia de pacto tal como aparece en hebreo. 'Padres' mantiene la forma del texto y la referencia ancestral tradicional.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa יְהוָה directamente. La forma 'Yahvé' sigue la convención del proyecto para preservar el nombre propio de Dios, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de pacto en 'el Dios de sus padres'
  english_pob_reading: the God of his fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de sus antepasados
  rationale: El hebreo conserva el lenguaje ancestral masculino. En español se mantiene esa forma porque es fiel, reconocible y no exige una neutralización que el texto no pide.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del audit trail en inglés y no requiere ajustes de revisión adicionales: conserva el nombre divino como Yahvé, reproduce el modismo de חִלָּה אֶת־פְּנֵי con una equivalencia verbal natural y mantiene la referencia ancestral masculina del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Angustia'' traduce el estado de presión/distress sin añadir interpretaciones.'
  - '''Imploró el favor de'' conserva el valor idiomático de חִלָּה אֶת־פְּנֵי.'
  - '''Se humilló'' refleja el valor reflexivo de וַיִּכָּנַע en contexto penitencial.'
  - '''El Dios de sus padres'' mantiene la fórmula covenantal y la referencia textual masculina.'
