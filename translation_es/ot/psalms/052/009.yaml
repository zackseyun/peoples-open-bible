translation:
  language: es
  text: Mira, este es el hombre que no hizo de Dios su refugio[a], sino que confió en la abundancia de sus riquezas y buscó fuerza en su destrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortaleza» o «baluarte» para «refugio».
    reason: lexical_alternative
  - marker: b
    text: Hebreo הַוָּה también puede significar «ruina», «mal deseo» o «planes destructivos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Observa
  lexicon: HALOT
  rationale: Interjección deíctica que introduce una observación enfática. «Mira» preserva la inmediatez y suena natural en español moderno sin perder el tono exhortativo o demostrativo.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino con valor representativo. «El hombre» conserva el género y la referencia proverbial sin forzar un término más técnico o genérico.
- source_word: לֹא יָשִׂים אֱלֹהִים מָעוּזוֹ
  english_pob_choice: did not make God his refuge
  chosen_spanish: no hizo de Dios su refugio
  alternatives_spanish:
  - no puso a Dios como su refugio
  - no hizo de Dios su fortaleza
  lexicon: HALOT
  rationale: שׂים con complemento predicativo expresa «hacer de / poner como». «Refugio» comunica bien מָעוֹז como lugar o fuente de seguridad; mantiene la claridad idiomática del POB inglés.
- source_word: וַיִּבְטַח
  english_pob_choice: trusted
  chosen_spanish: confió
  alternatives_spanish:
  - y confió
  - sino que confió
  lexicon: HALOT
  rationale: En contexto contrasta con no tomar a Dios por refugio. En español, «sino que confió» expresa mejor el contraste que un simple «y».
- source_word: בְּרֹב עָשְׁרוֹ
  english_pob_choice: in the abundance of his riches
  chosen_spanish: en la abundancia de sus riquezas
  alternatives_spanish:
  - en su gran riqueza
  - en la multitud de sus riquezas
  lexicon: HALOT
  rationale: «Abundancia» reproduce רֹב y «riquezas» reproduce עֹשֶׁר. La frase mantiene ambos elementos sin endurecer el español.
- source_word: יָעֹז
  english_pob_choice: sought strength
  chosen_spanish: buscó fuerza
  alternatives_spanish:
  - se fortaleció
  - se hizo fuerte
  lexicon: HALOT
  rationale: El verbo expresa el gesto de hacerse fuerte o buscar fortaleza. «Buscó fuerza» sigue de cerca el sentido adoptado en la revisión inglesa («sought strength») y conserva el matiz de búsqueda de apoyo.
- source_word: בְּהַוָּתוֹ
  english_pob_choice: in his destruction
  chosen_spanish: en su destrucción
  alternatives_spanish:
  - en su ruina
  - en su daño
  - en sus perversos planes
  lexicon: HALOT
  rationale: La voz hebrea es semánticamente amplia y puede incluir ruina o destrucción. «Destrucción» preserva el peso del término sin cerrar indebidamente sus posibles matices.
theological_decisions:
- issue: Referencia masculina singular de הַגֶּבֶר
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - alguien
  rationale: Se conserva el singular masculino del hebreo, que funciona aquí como tipo representativo. Evita neutralizar una forma marcada por el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ambigüedad semántica de הַוָּה
  english_pob_reading: destruction
  chosen_spanish_reading: destrucción
  alternative_spanish_readings:
  - ruina
  - daño
  - perversos planes
  rationale: El POB inglés preserva la tensión semántica del término con una nota. En español, «destrucción» mantiene esa gravedad y deja abierta la amplitud del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al reflejar יָעֹז como «buscó fuerza» en lugar de una forma estática como «se hizo fuerte»; también se conservó la alternativa semántica de הַוָּה mediante nota, sin ocultar su ambigüedad.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים conforme al criterio base del proyecto.
  - Se usó «refugio» para מָעוֹז, en línea con la decisión inglesa y con la naturalidad del español bíblico contemporáneo.
  - Se evitó «Cristo» y terminología no pertinente al versículo.
  - El tono general es formal y apto para lectura eclesial, sin arcaísmos innecesarios.
