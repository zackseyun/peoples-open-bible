translation:
  language: es
  text: para proclamar[a] con voz de acción de gracias, y para contar todas tus maravillas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacer oír la voz de acción de gracias'. El hebreo usa un verbo causativo ('hacer oír'), y 'proclamar' expresa ese sentido de manera idiomática.
    reason: lexical_alternative
  - marker: b
    text: O 'tus obras maravillosas' o 'tus hechos maravillosos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשְׁמִעַ
  english_pob_choice: to proclaim
  chosen_spanish: para hacer oír
  alternatives_spanish:
  - para proclamar
  - para hacer escuchar
  - para publicar
  lexicon: HALOT
  rationale: 'El Hiphil de שׁמע tiene valor causativo: ''hacer oír'' o ''dar a oír''. En español, ''para hacer oír'' conserva mejor esa causatividad que ''proclamar'', y sigue siendo natural en el registro poético.'
- source_word: בְּקוֹל
  english_pob_choice: with a voice
  chosen_spanish: con voz
  alternatives_spanish:
  - con la voz
  - en voz alta
  - al oírse
  lexicon: HALOT
  rationale: La preposición con קוֹל se traduce de manera concreta como 'con voz'. Mantiene la imagen hebrea sin volverla demasiado interpretativa.
- source_word: תּוֹדָה
  english_pob_choice: thanksgiving
  chosen_spanish: acción de gracias
  alternatives_spanish:
  - agradecimiento
  - alabanza
  - gracias
  lexicon: HALOT
  rationale: תּוֹדָה puede referirse a agradecimiento expresado en palabra o canto. 'Acción de gracias' preserva ese matiz culto y verbal en español mejor que solo 'alabanza'.
- source_word: וּלְסַפֵּר
  english_pob_choice: and to recount
  chosen_spanish: y para contar
  alternatives_spanish:
  - y para relatar
  - y para narrar
  - y para declarar
  lexicon: HALOT
  rationale: ספּר en piel significa contar o relatar detalladamente. 'Contar' es la opción española más directa y natural aquí; se mantiene el paralelismo con el infinitivo anterior sin sobrecargar el verso.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todos los
  - cada una de las
  lexicon: HALOT
  rationale: 'El sentido es inclusivo y total. En español concuerda con ''maravillas'' en femenino plural: ''todas''.'
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus obras maravillosas
  - tus hechos asombrosos
  - tus obras portentosas
  lexicon: HALOT
  rationale: נִפְלְאוֹתֶיךָ puede significar 'maravillas' o 'hechos maravillosos'. Dado el paralelismo poético, 'maravillas' es la forma más natural y abarcará tanto el acto como su carácter extraordinario.
translation_notes:
  revision_awareness: 'El texto inglés auditado traduce לַשְׁמִעַ como ''to proclaim'' y nota explícitamente la fuerza causativa (''cause to hear''). También conserva la ambigüedad de נִפְלְאוֹתֶיךָ con alternativas como ''wonders'' y ''marvelous works''. La versión española mantiene esas dos decisiones: un giro causativo natural (''para hacer oír'') y un sustantivo abierto (''maravillas''), sin borrar la tensión semántica del hebreo.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo con dos infinitivos: ''para hacer oír'' / ''y para contar''.'
  - '''Acción de gracias'' funciona como equivalente culto y bíblico de תּוֹדָה sin depender de fórmulas eclesiásticas fijas.'
  - '''Maravillas'' deja espacio para la doble lectura de hechos extraordinarios y obras maravillosas, acorde con el audit trail inglés.'
