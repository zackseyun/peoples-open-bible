translation:
  language: es
  text: 'Y cuando oyeron todas las palabras[a], cada uno se volvió con temor hacia su compañero, y dijeron a Baruc: «Sin falta tenemos que decir al rey todas estas palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno miró con temor a su compañero». El hebreo literalmente dice: «temieron, cada uno a su compañero», expresando una reacción mutua de temor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּשָׁמְעָם
  english_pob_choice: And when they heard
  chosen_spanish: Y sucedió que, al oír
  alternatives_spanish:
  - Y cuando oyeron
  - Y aconteció que, cuando oyeron
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se vierte de modo idiomático en español con una transición temporal natural. «Y sucedió que» conserva el valor de avance narrativo de וַיְהִי sin sonar excesivamente literal.
- source_word: אֶת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todos los dichos
  lexicon: HALOT
  rationale: «דְּבָרִים» se entiende aquí como el contenido leído del rollo, por eso «palabras» es más preciso que «cosas». Se mantiene el paralelismo con la repetición final del versículo.
- source_word: פָּחֲדוּ
  english_pob_choice: turned in fear
  chosen_spanish: se volvió, temeroso
  alternatives_spanish:
  - se llenó de temor
  - retrocedió con miedo
  - se volvió con temor
  lexicon: HALOT
  rationale: El hebreo expresa temor y, en la construcción con אִישׁ אֶל רֵעֵהוּ, una reacción visible entre ellos. «Se volvió, temeroso» conserva ese movimiento relacional que el POB inglés quiso captar con «turned in fear».
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man to his companion
  chosen_spanish: cada hombre ... hacia su compañero
  alternatives_spanish:
  - cada uno ... hacia su compañero
  - uno a otro
  - cada hombre ... a su compañero
  lexicon: HALOT
  rationale: La expresión distributiva se conserva con «cada hombre ... hacia su compañero», que es natural en español y refleja la orientación mutua de la reacción. Se evita una nivelación impersonal que perdería el matiz individual.
- source_word: וַיֹּאמְרוּ אֶל בָּרוּךְ
  english_pob_choice: and they said to Baruch
  chosen_spanish: y dijeron a Baruc
  alternatives_spanish:
  - y le dijeron a Baruc
  - entonces dijeron a Baruc
  lexicon: HALOT
  rationale: Se mantiene la continuación narrativa directa. «Baruc» sigue la forma española usual del nombre, y el verbo simple «dijeron» reproduce adecuadamente el hebreo sin sobrecarga estilística.
- source_word: הַגֵּיד נַגִּיד
  english_pob_choice: We must surely tell
  chosen_spanish: Sin duda tenemos que decir
  alternatives_spanish:
  - Ciertamente debemos decir
  - Tenemos que contarlo sin falta
  - Debemos decirlo con certeza
  lexicon: HALOT
  rationale: El infinitivo absoluto con el imperfecto intensifica la determinación del habla directa. «Sin duda tenemos que decir» comunica urgencia y certeza en español, sin forzar un calco como «ciertamente diremos» que podría oscurecer el valor exhortativo-resuelto.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey gobernante
  - al monarca
  lexicon: HALOT
  rationale: El referente es claro en el contexto; «rey» es la traducción directa y más natural en español.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todos estos dichos
  - todas estas cosas
  lexicon: HALOT
  rationale: Se conserva la repetición de «palabras» y el demostrativo «estas», tal como en el hebreo y en el texto inglés auditado, porque el contexto sigue siendo el contenido del rollo leído.
theological_decisions:
- issue: La reacción de miedo expresada por el verbo hebreo יחד con el giro interpersonal
  english_pob_reading: turned in fear to his companion
  chosen_spanish_reading: se volvió, temeroso, hacia su compañero
  alternative_spanish_readings:
  - tuvo miedo y se volvió hacia su compañero
  - se miró con temor al compañero
  rationale: 'No hay un punto doctrinal controvertido, pero sí una tensión expresiva: el hebreo no dice solo «tener miedo», sino una respuesta visible entre los oficiales. La redacción española procura no perder ese matiz narrativo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la lectura de ''words'' para דְּבָרִים, reproduce la intensificación de הַגֵּיד נַגִּיד con una solución idiomática española y conserva la nota alternativa sobre el giro idiomático de פָּחֲדוּ + אִישׁ אֶל רֵעֵהוּ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Baruc» sigue la forma española del nombre propio usada de manera estándar.
  - Se mantiene «palabras» para דְּבָרִים por coherencia con el contexto del rollo leído.
