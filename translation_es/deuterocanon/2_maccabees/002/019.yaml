  glossary_alignment: 'No hay términos de glosario mayor implicados. La revisión propuesta mantiene fidelidad al léxico griego y al razonamiento del POB: «Castiga» para βάσανισον, «opr imen» para καταδυναστεύοντας, y un verbo más fuerte como «ultrajan» para ἐξυβρίζοντας; «con arrogancia» expresa mejor ἐν ὑπερηφανίᾳ que «en arrogancia».'
