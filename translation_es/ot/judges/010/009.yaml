revisions:
- from: Entonces los amonitas cruzaron el Jordán para pelear también contra Judá[a], Benjamín y la casa de Efraín; e Israel fue angustiado[b] en gran manera.
  to: Entonces los amonitas cruzaron el Jordán para pelear también contra Judá, Benjamín y la casa de Efraín, e Israel quedó en gran angustia[a].
  rationale: Se elimina la nota ajena al expediente inglés y se conserva la alternativa documentada en la cláusula final. Se reemplaza «fue angustiado» por «quedó en gran angustia» para un español más natural y fiel al sentido resultativo del hebreo, sin perder la intensidad de מְאֹד.
