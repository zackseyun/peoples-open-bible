base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/033.yaml
  text: And if one of the Levites redeems it[a], then the sale of the house in the city of his possession shall be released in the Jubilee[b]; for the houses of the cities of the Levites are their possession among the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'shall go out' or 'shall revert' in the Jubilee; the Hebrew is literally 'shall go out,' referring to the sold property leaving the buyer's possession and returning.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
