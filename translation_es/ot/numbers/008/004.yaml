revisions:
- from: 'Ahora bien, esta fue la obra de la menorá: trabajo martillado de oro[a], desde su base hasta su flor era trabajo martillado. Conforme al modelo[b] que Yahvé había mostrado a Moisés, así hizo la menorá.'
  to: 'Ahora bien, esta era la hechura del candelabro: trabajo martillado de oro[a]; desde su base hasta su flor, era de trabajo martillado. Conforme al modelo[b] que Yahvé había mostrado a Moisés, así hizo el candelabro.'
  rationale: Se revisa principalmente הַמְּנֹרָה de 'menorá' a 'candelabro' para seguir la decisión documentada de traducir el nombre del objeto en vez de transliterarlo. También se mejora la naturalidad de מַעֲשֵׂה con 'hechura', que encaja mejor con un contexto de manufactura artesanal. Se conservan 'trabajo martillado', 'modelo' y 'Yahvé', junto con las notas léxicas auditadas.
  reviewer_model: gpt-5.4
