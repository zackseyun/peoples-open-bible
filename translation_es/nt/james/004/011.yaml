translation:
  language: es
  text: No hablen mal unos de otros[a], hermanos[b]. El que habla mal de un hermano o juzga a su hermano habla mal de la ley y juzga la ley. Pero si juzgas la ley, no eres hacedor de la ley, sino juez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hablen contra unos y otros»; el verbo griego puede significar hablar contra alguien de modo hostil o difamatorio.'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» reproduce la forma masculina plural del griego y probablemente incluye a toda la comunidad, es decir, hermanos y hermanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλαλεῖτε / καταλαλῶν / καταλαλεῖ
  english_pob_choice: speak against
  chosen_spanish: hablar mal de
  alternatives_spanish:
  - hablar contra
  - calumniar
  - difamar
  lexicon: BDAG
  rationale: La repetición del verbo pide una solución repetible en español. 'Hablar mal de' comunica el sentido hostil o difamatorio sin restringirlo solo a una acusación formal; 'calumniar' o 'difamar' suenan más técnicos y estrechan demasiado el alcance.
- source_word: ἀλλήλων
  english_pob_choice: one another
  chosen_spanish: unos de otros
  alternatives_spanish:
  - unos a otros
  - entre sí
  lexicon: BDAG
  rationale: Expresa bien la reciprocidad en español natural y conserva el tono exhortativo del mandato.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego y, a la vez, en español puede funcionar de manera representativa para toda la comunidad. La nota preserva la posible referencia inclusiva.
- source_word: ἀδελφοῦ / τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: a brother / his brother
  chosen_spanish: un hermano / su hermano
  alternatives_spanish:
  - un creyente / su creyente
  - un hermano de fe / su hermano de fe
  lexicon: BDAG
  rationale: '''Hermano'' mantiene la metáfora familiar y la coherencia léxica con el vocativo del verso. ''Creyente'' explicita el sentido pero va más allá del texto inmediato.'
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: NA28/SBLGNT textual tradition
  rationale: 'La conjunción es disyuntiva: hablar mal de un hermano o juzgarlo son acciones paralelas.'
- source_word: κρίνων / κρίνει / κρίνεις
  english_pob_choice: judges / judge
  chosen_spanish: juzga / juzgas
  alternatives_spanish:
  - condena / condenas
  - emite juicio / emites juicio
  lexicon: BDAG
  rationale: '''Juzgar'' conserva la repetición verbal con ''ley'' y mantiene el contraste final con ''hacedor''. ''Condenar'' sería más estrecho y más fuerte de lo que exige el contexto.'
- source_word: νόμου / νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley de Dios
  - la ley mosaica
  lexicon: BDAG
  rationale: En español, 'ley' es el equivalente natural para νόμος. Se mantiene la amplitud del referente sin especificarlo más de lo que el versículo dice.
- source_word: ποιητὴς
  english_pob_choice: doer
  chosen_spanish: hacedor
  alternatives_spanish:
  - cumplidor
  - practicante
  - el que hace
  lexicon: BDAG
  rationale: '''Hacedor'' reproduce la dicción característica de Santiago y conserva la oposición con ''juez''. ''Cumplidor'' enfatizaría obediencia pero perdería parte de la fuerza proverbial del sustantivo.'
- source_word: κριτής
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juzgador
  - que juzga
  lexicon: BDAG
  rationale: '''Juez'' es el sustantivo directo y natural en español, y refuerza el contraste con ''hacedor de la ley''.'
theological_decisions:
- issue: Alcance comunitario de ἀδελφοί
  english_pob_reading: Render as 'brothers' in the main text, with inclusive sense preserved in a footnote.
  chosen_spanish_reading: Mantener 'hermanos' en el texto principal, con nota que indique que el plural masculino probablemente abarca a toda la comunidad.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermandad
  rationale: El griego usa una forma masculina plural. En español, 'hermanos' puede ser representativo, y la nota evita borrar la posible inclusión de mujeres sin sustituir la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Referente de 'la ley'
  english_pob_reading: Translate as 'the law' without specifying further in the main text.
  chosen_spanish_reading: Traducir 'la ley' sin concretar más el referente.
  alternative_spanish_readings:
  - la ley mosaica
  - la ley real
  - la ley de Dios
  rationale: El pasaje presupone una referencia normativa ya conocida en Santiago, pero el versículo no la delimita. Traducir de modo amplio conserva la ambigüedad teológica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el mismo conjunto de decisiones léxicas del POB en inglés. No se requirieron revisiones posteriores; el pasaje quedó en alto acuerdo con la auditoría existente.
  spanish_consistency_notes:
  - 'Se mantiene una sola solución para καταλαλέω en todo el versículo: ''hablar mal de''.'
  - Se conserva la correspondencia 'ley' / 'hacedor' / 'juez' para reflejar la progresión argumental del griego.
  - El vocativo 'hermanos' se deja en la forma fuente y la nota recoge su posible valor inclusivo.
  - La puntuación en español separa con claridad las tres unidades retóricas del versículo sin alterar la relación sintáctica.
