  to: Por tanto, la tierra[a] se lamenta, y se debilita todo el que habita en ella, junto con las bestias del campo y las aves de los cielos; incluso los peces del mar son quitados[b].
  rationale: Se corrige la nota [a] para reflejar con más claridad la decisión documentada sobre הָאָרֶץ y su alternativa léxica. Se cambia 'son recogidos' por 'son quitados' para comunicar de forma natural en español la idea de remoción bajo juicio que el POB inglés auditó para יֵאָסֵפוּ, manteniendo en la nota la opción más literal 'reunidos'.
