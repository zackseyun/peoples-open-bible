translation:
  language: es
  text: En el décimo día de este séptimo mes, habrá para ustedes una santa convocatoria; se afligirán[a], y no harán ninguna clase de trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se humillarán” o “se negarán a sí mismos”. El hebreo dice literalmente: “afligirán sus almas”, una expresión ritual asociada con la abnegación, especialmente con el ayuno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶ/עָשׂוֹר
  english_pob_choice: On the tenth day
  chosen_spanish: El diez
  alternatives_spanish:
  - El décimo día
  - En el día diez
  lexicon: HALOT
  rationale: La expresión hebrea es una fecha calendárica; en español bíblico natural, 'El diez' comunica la referencia al día del mes sin sobrecargar el texto. Se mantiene la sobriedad del original y la lectura queda apta para publicación.
- source_word: לַ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י הַ/זֶּ֗ה
  english_pob_choice: of this seventh month
  chosen_spanish: del séptimo mes
  alternatives_spanish:
  - de este séptimo mes
  - en este séptimo mes
  lexicon: HALOT
  rationale: El hebreo especifica el mes por orden y añade el demostrativo 'este'. En español, 'del séptimo mes' es la formulación natural para el dato calendárico; el valor deíctico ya queda suficientemente situado por el contexto inmediato de la lista ritual.
- source_word: מִֽקְרָא קֹ֨דֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocatoria
  alternatives_spanish:
  - una convocación santa
  - una asamblea santa
  lexicon: HALOT
  rationale: '''מִקְרָא'' implica una reunión convocada oficialmente; ''convocatoria'' conserva ese matiz de llamamiento público. ''Santa'' mantiene el carácter cultual de קֹדֶשׁ. Se evita ''asamblea'' porque puede perder el énfasis en que la reunión es convocada.'
- source_word: יִהְיֶ֣ה לָ/כֶ֔ם
  english_pob_choice: there shall be for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - les será
  lexicon: HALOT
  rationale: La construcción hebrea indica lo que ese día constituirá para el pueblo. 'Habrá para ustedes' reproduce bien la función de la frase en español sin introducir un sujeto ajeno.
- source_word: וְ/עִנִּיתֶ֖ם אֶת נַפְשֹׁתֵי/כֶ֑ם
  english_pob_choice: you shall afflict yourselves
  chosen_spanish: se afligirán ustedes mismos
  alternatives_spanish:
  - se humillarán
  - se negarán a sí mismos
  lexicon: HALOT
  rationale: Se conserva el verbo fuerte del hebreo y su fuerza ritual de autoaflicción. 'Ustedes mismos' refleja el reflexivo implícito sin convertir el mandato en una paráfrasis doctrinalmente más débil. Se evita 'humillar' como único término porque puede atenuar la idea de aflicción ritual presente en el hebreo.
- source_word: כָּל מְלָאכָה
  english_pob_choice: you shall do no work at all
  chosen_spanish: ninguna clase de trabajo
  alternatives_spanish:
  - ningún trabajo
  - ni una sola obra
  lexicon: HALOT
  rationale: '''כָּל'' intensifica la prohibición total. ''Ninguna clase de trabajo'' comunica esa totalidad de manera idiomática en español y conserva el alcance legal del mandato mejor que una simple negación genérica.'
- source_word: לֹ֥א תַעֲשֽׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán
  alternatives_spanish:
  - no harán ustedes
  - no harán ninguna
  lexicon: HALOT
  rationale: La forma verbal futura con negación en hebreo legal se expresa naturalmente en español con futuro de mandato/prohibición. Se opta por una redacción directa y sobria acorde con el registro normativo del pasaje.
theological_decisions:
- issue: La expresión ritual וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  english_pob_reading: you shall afflict yourselves
  chosen_spanish_reading: se afligirán ustedes mismos
  alternative_spanish_readings:
  - se humillarán
  - se negarán a sí mismos
  rationale: El contexto del día santo requiere preservar el valor ritual de autoaflicción, sin reducirlo de antemano a una sola práctica ni espiritualizarlo. 'Se afligirán ustedes mismos' mantiene la carga penitencial y el vínculo con el ayuno o la abstinencia ritual, que el propio hebreo deja en forma idiomática.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión: el texto inglés auditado quedó estable y de alta concordancia; la versión española conserva la misma estructura legal y la misma decisión lexical principal sobre la autoaflicción ritual.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el hebreo aquí no contiene el nombre divino.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al texto de base.
  - '''Santa convocatoria'' conserva el registro cultual del hebreo sin convertirlo en una mera reunión administrativa.'
  - La negación total de 'ninguna clase de trabajo' refleja el alcance de כָּל מְלָאכָה.
  - El reflexivo español se usa para representar el objeto pronominal hebreo con naturalidad, sin borrar la fuerza del verbo ענה.
