review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura condicional, la identidad tribal, el cruce del Jordán, el nombre divino «Yahvé», y el sentido general de la concesión de Galaad. Sin embargo, «y la tierra es sometida» suena poco natural en español bíblico actual; el pasivo/resultativo de וְנִכְבְּשָׁה se expresa mejor como «queda sometida» o «es sometida», con preferencia por la primera. Además, «delante de ustedes» en ambas ocurrencias de לִפְנֵי es fiel pero algo rígido; «ante ustedes» mejora la fluidez sin pérdida semántica. El resto refleja adecuadamente el hebreo.
  spanish_quality_summary: La redacción es clara y ampliamente legible, pero tiene un leve tono calco en «es sometida delante de ustedes». Una pequeña revisión la vuelve más natural y digna sin alterar el sentido. «Y Moisés les dijo» y «los hijos de Gad y los hijos de Rubén» son aceptables; «como posesión» también funciona bien en este contexto.
  glossary_alignment: Cumple con el estándar del proyecto al usar «Yahvé» para יהוה. No hay conflicto relevante con otros términos doctrinales del glosario. «Posesión» para אֲחֻזָּה está alineado con la decisión auditada.
  issues:
  - severity: medium
    issue: «y la tierra es sometida» suena antinatural en español
    rationale: Aunque es semánticamente cercano al nifal de כבש, en español la combinación resulta forzada. «y la tierra queda sometida» conserva mejor el valor resultativo/pasivo y mejora la legibilidad.
  - severity: low
    issue: Repetición rígida de «delante de»
    rationale: «Delante de Yahvé» y «delante de ustedes» son fieles, pero en la segunda aparición «ante ustedes» fluye mejor en español sin perder el sentido de לִפְנֵי.
  revised_spanish_text: 'Y Moisés les dijo: «Si los hijos de Gad y los hijos de Rubén cruzan el Jordán con ustedes, todo hombre armado para la guerra delante de Yahvé, y la tierra queda sometida ante ustedes, entonces les darán la tierra de Galaad como posesión».'
  revision_rationale: Se hicieron ajustes menores de estilo para evitar un calco poco natural («es sometida») y mejorar la fluidez («ante ustedes»), manteniendo intacto el sentido del hebreo y las decisiones léxicas del audit trail.
