  text: ἕκαστα δὲ τούτων ἐπεγνωκὼς σύ, βασιλεῦ, καὶ τῆς χώρας καὶ τοῦ περιισταμένου γένους ἡμῶν προσνοήθητι, καθ᾽ ἣν ἔχεις πρὸς ἅπαντας εὐαπάντητον φιλανθρωπίαν.
