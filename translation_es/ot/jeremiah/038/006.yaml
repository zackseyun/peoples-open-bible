translation:
  language: es
  text: Así que tomaron a Jeremías y lo echaron a la cisterna[a] de Malkías, hijo del rey, que estaba en el atrio[b] de la guardia, y bajaron a Jeremías con cuerdas. En la cisterna no había agua, sino solo lodo[c]; y Jeremías se hundió en el lodo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "pozo" para hebreo בּוֹר; el contexto de que no había agua sino solo lodo favorece aquí una cisterna de agua.
    reason: lexical_alternative
  - marker: b
    text: O "atrio de la prisión" o "patio de la prisión". El término hebreo probablemente se refiere a un área de detención vigilada.
    reason: lexical_alternative
  - marker: c
    text: O "barro" o "cieno" para "lodo".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - agarraron
  - se llevaron
  lexicon: HALOT
  rationale: לקח expresa la acción básica de tomar; en español, "tomaron" mantiene el sentido narrativo simple sin añadir matiz de violencia que no exige el verbo por sí mismo.
- source_word: וַיַּשְׁלִכוּ אֹתוֹ אֶל־הַבּוֹר
  english_pob_choice: threw him into the cistern
  chosen_spanish: lo echaron en el cisterna[a]
  alternatives_spanish:
  - lo arrojaron al pozo
  - lo echaron al pozo
  lexicon: HALOT
  rationale: השליך sí comunica un acto brusco; "echaron" conserva ese golpe narrativo. Para בּוֹר, el contexto de agua ausente y lodo apoya "cisterna" más que un pozo genérico.
- source_word: הַבּוֹר
  english_pob_choice: the cistern
  chosen_spanish: la cisterna
  alternatives_spanish:
  - el pozo
  - el foso
  lexicon: HALOT
  rationale: El contexto precisa una cavidad para agua que quedó sin agua y con lodo; por eso "cisterna" es más exacto que "pozo".
- source_word: מַלְכִּיָּהוּ בֶן־הַמֶּלֶךְ
  english_pob_choice: Malkijah the king’s son
  chosen_spanish: de Malkías, hijo del rey
  alternatives_spanish:
  - de Malkías, el hijo del rey
  - de Malquías, hijo del rey
  lexicon: HALOT
  rationale: Se translitera el nombre de forma natural en español bíblico y se conserva la apposición "hijo del rey" sin convertirla en un título dinástico que el hebreo no desarrolla.
- source_word: אֲשֶׁר בַּחֲצַר הַמַּטָּרָה
  english_pob_choice: which was in the court of the guard
  chosen_spanish: que estaba en el atrio de la guardia
  alternatives_spanish:
  - que estaba en el patio de la guardia
  - que estaba en el atrio de la prisión
  lexicon: HALOT
  rationale: חָצֵר puede ser "atrio" o "patio"; "atrio" funciona bien en registro bíblico. מַטָּרָה aquí designa un área vigilada, por eso "guardia" reproduce mejor la función que "prisión".
- source_word: וַיְשַׁלְּחוּ אֶת־יִרְמְיָהוּ בַּחֲבָלִים
  english_pob_choice: they lowered Jeremiah with ropes
  chosen_spanish: y bajaron a Jeremías con cuerdas
  alternatives_spanish:
  - y lo dejaron bajar con cuerdas
  - y descendieron a Jeremías con cuerdas
  lexicon: HALOT
  rationale: שלח, en este contexto con cuerdas y una cisterna, significa dejar/bajar a alguien hacia abajo; "bajaron" expresa la acción de manera natural y clara en español.
- source_word: בַּחֲבָלִים
  english_pob_choice: with ropes
  chosen_spanish: con cuerdas
  alternatives_spanish:
  - con sogas
  - por medio de cuerdas
  lexicon: HALOT
  rationale: חבלים corresponde a cuerdas o sogas; "cuerdas" es la opción más neutral y ampliamente inteligible en español.
- source_word: וּבַבּוֹר אֵין מַיִם כִּי אִם־טִיט
  english_pob_choice: Now there was no water in the cistern, but only mud
  chosen_spanish: En la cisterna no había agua, sino solo lodo[b]
  alternatives_spanish:
  - En la cisterna no había agua, sino solo barro
  - En la cisterna no había agua, sino solo cieno
  lexicon: HALOT
  rationale: אֵין marca ausencia real; כִּי אִם es exceptivo. "Sino solo" refleja bien la exclusión del agua. Para טִיט, "lodo" es claro y conserva la textura blanda y peligrosa del lugar.
- source_word: טִיט
  english_pob_choice: mud
  chosen_spanish: lodo
  alternatives_spanish:
  - barro
  - cieno
  lexicon: HALOT
  rationale: טִיט puede ser lodo/barro/cieno; "lodo" transmite mejor la mezcla húmeda y atrapante que sigue siendo fácilmente comprensible hoy.
- source_word: וַיִּטְבַּע יִרְמְיָהוּ בַּטִּיט
  english_pob_choice: Jeremiah sank into the mud
  chosen_spanish: Jeremías se hundió en el lodo
  alternatives_spanish:
  - Jeremías se sumergió en el lodo
  - Jeremías quedó hundido en el lodo
  lexicon: HALOT
  rationale: טבע expresa hundirse/sumergirse. "Se hundió" conserva el movimiento descendente y el peligro inmediato sin sobreexplicar el grado de inmovilidad.
translation_notes:
  revision_awareness: El inglés POB resuelve בּוֹר como "cistern" por el contexto de ausencia de agua y presencia de lodo; la versión española mantiene esa decisión. También conserva el matiz instrumental de בַּחֲבָלִים con "con cuerdas" y la caída final con "se hundió". No se detectaron revisiones aplicadas en el pasaje fuente; se sigue el estado más reciente sin cambios.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene "Jeremías" como nombre propio bíblico tradicional en español.
  - '"Atrio de la guardia" conserva el valor de una zona vigilada sin traducirla como "prisión" de forma automática.'
  - La elección de "lodo" evita un calco rígido y suena natural en español, pero deja abierta la alternativa léxica del hebreo.
  - La puntuación reproduce la estructura narrativa de dos acciones iniciales, una localización, una acción instrumental y el desenlace final.
