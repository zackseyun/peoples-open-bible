translation:
  language: es
  text: 'Entonces la ira de Yahvé se encendió contra Amasías, y le envió un profeta, que le dijo: «¿Por qué has buscado[a] a los dioses del pueblo, que no libraron a su pueblo de tu mano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consultado» o «inquirido de» los dioses del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the LORD’s anger burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - se encendió la ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo vívido de ira encendida. En español, «se encendió» conserva la imagen de fuego/ardor sin volverlo duro o antinatural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente al Tetragrámaton; la norma del proyecto pide «Yahvé» como transliteración del nombre divino, no una sustitución titular.
- source_word: בַּאֲמַצְיָהוּ
  english_pob_choice: against Amaziah
  chosen_spanish: contra Amasías
  alternatives_spanish:
  - sobre Amasías
  - en contra de Amasías
  lexicon: HALOT
  rationale: Con el verbo de ira, la preposición expresa hostilidad dirigida contra la persona; en español «contra» transmite bien ese valor.
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un mensajero profético
  lexicon: HALOT
  rationale: Es el equivalente normal y exacto del sustantivo hebreo.
- source_word: דָרַשְׁתָּ
  english_pob_choice: have you sought
  chosen_spanish: has buscado
  alternatives_spanish:
  - has consultado
  - has inquirido de
  lexicon: HALOT
  rationale: «Buscar» conserva la amplitud semántica de דרש, que puede incluir consultar o inquirir, sin obligar al español a especificar más de lo que el hebreo dice explícitamente.
- source_word: אֱלֹהֵי הָעָם
  english_pob_choice: the gods of the people
  chosen_spanish: a los dioses del pueblo
  alternatives_spanish:
  - a los dioses de ese pueblo
  - a los dioses de la gente
  lexicon: HALOT
  rationale: La construcción hebrea es posesiva/relacional; en español «del pueblo» mantiene la referencia al pueblo pagano del contexto sin añadir información.
- source_word: אֲשֶׁר לֹא הִצִּילוּ
  english_pob_choice: who did not deliver
  chosen_spanish: que no libraron
  alternatives_spanish:
  - que no salvaron
  - que no rescataron
  lexicon: HALOT
  rationale: «Librar» funciona bien en contexto militar y reproduce el valor de liberación/protección del verbo hebreo sin sonar excesivamente teológico.
- source_word: עַמָּם
  english_pob_choice: their people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su propio pueblo
  lexicon: HALOT
  rationale: Se conserva la relación posesiva del hebreo con una formulación natural en español; no se añade «propio» porque el hebreo no lo exige.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu dominio
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se mantiene de forma literal y comprensible en español, preservando la imagen concreta de poder/control.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre propio divino como «Yahvé» en lugar de ocultarlo detrás de un título.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y refleja la revisión más reciente del audit trail, que prefirió mantener «their people» sin expansión innecesaria; por eso se traduce de forma directa con «a su pueblo» y no «a su propio pueblo».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Amasías» sigue la forma española usual del nombre propio.
  - Se conserva la metáfora de la ira que se enciende para no aplanar el modismo hebreo.
  - La nota textual/lexical queda anclada solo en «buscado», porque en español emerge la misma ambigüedad que en el inglés POB entre buscar, consultar e inquirir.
