  yaml_path: translation/deuterocanon/2_maccabees/003/019.yaml
  text: And the women[a], with sackcloth bound under their breasts, were filling the streets; and the virgins who were shut in, some were running to the gates, others to the walls[c][b], and some were peering out through the windows.
  footnotes:
  - marker: a
    text: Or 'maidens'; the Greek more specifically says 'virgins.'
    reason: lexical_alternative
  - marker: b
    text: '''Were crowding the streets'' renders a Greek expression literally meaning ''were multiplying along the streets.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'with sackcloth bound under their breasts' depicts women wearing mourning garb fastened around the chest.
    reason: cultural_note
