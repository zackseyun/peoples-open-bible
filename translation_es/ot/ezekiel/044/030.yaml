base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/030.yaml
  text: And the first of all the firstfruits of everything[a], and every contribution from all your contributions, shall belong to the priests. You shall give the first of your dough to the priest[c][b], to cause a blessing to rest on your house.
  footnotes:
  - marker: a
    text: Or 'every offering from all your offerings.' The Hebrew term refers to a portion set apart and contributed for sacred use.
    reason: lexical_alternative
  - marker: b
    text: Or 'the first of your kneaded dough'; the Hebrew term can refer to dough or, by extension, the kneading batch.
    reason: lexical_alternative
  - marker: c
    text: That is, so that blessing may rest upon your household.
    reason: lexical_alternative
