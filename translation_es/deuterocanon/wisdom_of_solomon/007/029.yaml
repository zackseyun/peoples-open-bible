translation:
  language: es
  text: Porque ella es más hermosa que el sol, y está por encima de todo orden de las estrellas. Comparada con la luz[a], resulta ser superior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Comparada con la luz, resulta ser anterior». El griego προτέρα puede significar prioridad temporal o precedencia comparativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐπρεπεστέρα
  english_pob_choice: more beautiful
  chosen_spanish: más hermosa
  alternatives_spanish:
  - más bella
  - más espléndida
  - más comedida
  lexicon: LSJ
  rationale: El comparativo expresa belleza o lozanía superior. «Más hermosa» comunica de forma natural y digna la comparación poética, sin endurecer el español con un calco como «más espléndida», ni añadir matices ajenos como «comedida».
- source_word: ὑπὲρ
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - más allá de
  - sobre
  - por sobre
  lexicon: BDAG
  rationale: Aquí ὑπέρ marca superioridad comparativa. «Por encima de» conserva el valor relacional y funciona bien junto al paralelismo del verso.
- source_word: θέσιν
  english_pob_choice: arrangement
  chosen_spanish: orden
  alternatives_spanish:
  - disposición
  - arreglo
  - posición
  lexicon: LSJ
  rationale: En «de las estrellas» el sustantivo apunta al orden o disposición cósmica, no a una sola ubicación. «Orden» es el término español más claro y sobrio para esa idea.
- source_word: φωτί
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: LSJ
  rationale: El dativo funciona como estándar de comparación. En español conviene explicitar «la luz» para hacer natural la construcción sin perder la referencia genérica al resplandor visible.
- source_word: συγκρινομένη
  english_pob_choice: compared with
  chosen_spanish: comparada con
  alternatives_spanish:
  - siendo comparada con
  - en comparación con
  lexicon: BDAG
  rationale: El participio se rinde con una construcción pasiva breve y idiomática. «Comparada con» preserva el sentido de comparación sin sobrecargar la sintaxis.
- source_word: προτέρα
  english_pob_choice: superior
  chosen_spanish: superior
  alternatives_spanish:
  - anterior
  - previa
  - más temprana
  lexicon: LSJ
  rationale: La tradición inglesa del texto final entendió aquí una comparación de excelencia más que de tiempo. En español, «superior» evita introducir una secuencia temporal que no queda obligada por el verso y mantiene la progresión poética de belleza y excelencia.
theological_decisions:
- issue: Sentido de προτέρα en relación con la luz
  english_pob_reading: comparative superiority ('superior')
  chosen_spanish_reading: superioridad comparativa ('superior')
  alternative_spanish_readings:
  - anterior en el tiempo ('anterior','más temprana')
  rationale: El verso ya afirma superioridad con «más hermosa» y «por encima de». Traducir προτέρα como «superior» preserva la coherencia retórica del pasaje y evita introducir una afirmación temporal no explicitada en el texto griego.
  doctrine_reference: Preservar la tensión textual y la progresión poética sin resolver más de lo que el texto dice.
translation_notes:
  revision_awareness: 'El paquete inglés presenta una revisión importante en la última pasada: cambió «earlier» por «superior» para reflejar mejor el paralelismo de excelencia del verso. La versión española sigue esa decisión revisada y la mantiene coherente con el resto de la línea comparativa.'
  spanish_consistency_notes:
  - Se mantuvo «hermosa» para εὐπρεπεστέρα por ser natural y fiel al valor comparativo de belleza/semejanza.
  - Se evitó «SEÑOR» u այլ nomenclatura no pertinente; este versículo no contiene el Nombre divino.
  - «Orden de las estrellas» conserva el matiz cósmico de θέσις sin exagerar a una categoría técnica.
  - La nota alternativa se ancla en la comparación final porque ahí se concentra la ambigüedad de προτέρα.
