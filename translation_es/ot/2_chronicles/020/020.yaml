revisions:
- from: 'Se levantaron temprano por la mañana y salieron al desierto[a] de Tecoa. Y mientras salían, Josafat se puso en pie y dijo: «Escúchenme, Judá y habitantes de Jerusalén: crean en Yahvé, su Dios, y serán establecidos; crean en sus profetas[b], y tendrán éxito».'
  to: 'Se levantaron temprano en la mañana y salieron al desierto[a] de Tecoa. Mientras salían, Josafat se puso de pie y dijo: «Escúchenme, Judá y habitantes de Jerusalén: crean en Yahvé, su Dios, y serán afirmados[b]; crean a sus profetas[c], y tendrán éxito».'
  rationale: Se ajusta la redacción para mejorar la naturalidad del español y alinearla mejor con el rastro auditado del POB. Se añade la nota faltante sobre el juego de palabras entre «crean» y «serán afirmados», se cambia la segunda exhortación a «crean a sus profetas» por mayor naturalidad en español, conservando en nota la alternativa más literal «crean en sus profetas», y se pule ligeramente la primera cláusula narrativa.
  reviewer_model: gpt-5.4
