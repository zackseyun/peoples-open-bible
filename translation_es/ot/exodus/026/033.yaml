review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en sus elementos principales: פָּרֹכֶת como ''velo'', קְרָסִים como piezas de unión, אֲרוֹן הָעֵדוּת como ''arca del testimonio'', y la distinción entre הַקֹּדֶשׁ y קֹדֶשׁ הַקֳּדָשִׁים. Sin embargo, hay dos problemas de fidelidad formal: ''meterás'' rebaja el registro y no refleja bien וְהֵבֵאתָ (''traerás/introducirás''), y la nota [c] contradice el dato fuente porque dice que ''Lugar Santísimo'' es literal, cuando lo literal es ''Santo de los Santos'' o ''santo de santos''.'
  spanish_quality_summary: 'El español es generalmente claro y legible, pero ''meterás'' suena demasiado coloquial para un texto cultual y ''allá'' es menos natural que ''allí'' en este contexto. ''Separará para ustedes entre...'' es algo rígido, pero aceptable por conservar לָכֶם; aun así, conviene una formulación más idiomática: ''hará separación para ustedes entre...''.'
  glossary_alignment: 'Se respetan bien las decisiones del proyecto: ''velo'', ''arca del testimonio'', ''Lugar Santo'' y ''Lugar Santísimo''. No hay conflictos con Yahvé/Mesías u otros términos globales. La excepción necesaria es corregir la nota sobre קֹדֶשׁ הַקֳּדָשִׁים para que el alternativo literal en español quede bien documentado.'
  issues:
  - severity: medium
    issue: '''meterás'' para וְהֵבֵאתָ'
    rationale: El hebreo hifil de בוא aquí significa 'traer' o 'introducir', no simplemente 'meter'. 'Meterás' es entendible pero demasiado coloquial y menos digno para el registro bíblico.
  - severity: medium
    issue: La nota [c] afirma erróneamente que 'Lugar Santísimo' es literal
    rationale: El inglés auditado documenta que lo literal es 'holy of holies'. En español, lo más cercano es 'Santo de los Santos' o 'santo de santos', no 'Lugar Santísimo'.
  - severity: low
    issue: '''allá'' suena menos natural que ''allí'' en este contexto instructivo'
    rationale: No es infiel, pero 'allí' encaja mejor en español bíblico moderno neutral para indicar el lugar más allá del velo.
  - severity: low
    issue: Anclaje de nota [a] en 'velo' no corresponde al alternativo principal que necesita nota
    rationale: La nota inglesa documenta el alternativo de 'Most Holy Place', no el de 'veil'. En español puede mantenerse una nota sobre 'cortina', pero no es la alternativa más significativa; es mejor trasladar el aparato crítico al término realmente debatido en este versículo.
  revised_spanish_text: Pondrás el velo debajo de los corchetes, y allí, dentro del velo, traerás el arca del testimonio[a]; y el velo hará separación para ustedes entre el Lugar Santo y el Lugar Santísimo[b].
  revised_footnotes:
