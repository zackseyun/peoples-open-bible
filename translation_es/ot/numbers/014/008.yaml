translation:
  language: es
  text: Si Yahvé se complace en nosotros[a], él nos llevará a esta tierra y nos la dará, una tierra que mana leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está complacido con nosotros» o «nos favorece».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Si es que
  lexicon: HALOT
  rationale: El hebreo introduce una condición real ligada al favor de Yahvé; «Si» conserva mejor esa estructura que «Cuando», aunque el matiz puede ser retórico.
- source_word: חָפֵץ בָּנוּ
  english_pob_choice: delights in us
  chosen_spanish: se complace en nosotros
  alternatives_spanish:
  - se deleita en nosotros
  - nos favorece
  - nos tiene agrado
  lexicon: HALOT
  rationale: חפץ expresa complacencia, agrado o deleite. En español, «se complace en nosotros» mantiene el sentido afectivo y relacional sin volverlo excesivamente coloquial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB para el Tetragrámaton: «Yahvé» como transliteración del nombre divino, en lugar de sustituirlo por un título.'
- source_word: וְהֵבִיא אֹתָנוּ אֶל הָאָרֶץ הַזֹּאת
  english_pob_choice: he will bring us into this land
  chosen_spanish: él nos llevará a esta tierra
  alternatives_spanish:
  - él nos traerá a esta tierra
  - él nos hará entrar en esta tierra
  lexicon: HALOT
  rationale: El hebreo expresa la acción de llevar/traer al país prometido. «Llevará a esta tierra» suena natural en español y conserva el movimiento hacia la posesión de la tierra; «a esta tierra» respeta el demostrativo del texto.
- source_word: וּנְתָנָהּ לָנוּ
  english_pob_choice: and give it to us
  chosen_spanish: y nos la dará
  alternatives_spanish:
  - y nos la concederá
  - y nos la entregará
  lexicon: HALOT
  rationale: נתן es el verbo básico de dar. El pronombre enclítico «la» explicita que el referente es «la tierra», como en el hebreo con sufijo.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - un país
  - una tierra
  lexicon: HALOT
  rationale: «Tierra» es la forma más fiel y natural para la הארץ bíblica en este contexto de herencia territorial. Se preserva además la repetición appositiva del hebreo.
- source_word: אֲשֶׁר הִוא זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: flowing with milk and honey
  chosen_spanish: que fluye leche y miel
  alternatives_spanish:
  - que mana leche y miel
  - que fluye con leche y miel
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de abundancia con el verbo «fluir». Aunque en español puede sentirse elíptico, refleja de cerca el hebreo sin añadir elementos ajenos al texto.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La decisión de la POB inglesa de no ocultar el nombre divino se mantiene en español con «Yahvé», forma establecida en el proyecto para el Tetragrámaton. Así se preserva la referencia al nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente de Números 14:8 y conserva la lectura y decisiones léxicas del audit trail inglés, en especial el nombre divino, el condicional inicial y la metáfora de la tierra fértil. No se registran revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y digno, evitando calcos innecesarios pero conservando la estructura condicional del hebreo.
  - «Tierra» se usa de manera consistente para הארץ en este pasaje, ya que aquí no hay motivo contextual para optar por «país».
  - La frase final conserva el hebraísmo idiomático «fluye leche y miel» para no diluir la imagen de abundancia.
