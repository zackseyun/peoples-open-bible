    rationale: El inglés tiene «Or 'upon God is fearsome splendor/majesty.'»; la nota española «O «sobre Dios hay majestad temible/imponente»» omite la alternativa «esplendor» y añade «imponente», que no es la variación principal documentada.
  - severity: low
    issue: «hay majestad imponente» es menos literal y menos poético que una predicación directa.
    rationale: El hebreo no requiere el giro existencial «hay». En español bíblico-natural, «sobre Dios está majestad imponente» conserva mejor la concisión y la fuerza del original.
  revised_spanish_text: Desde el norte viene[a] esplendor dorado; sobre Dios está majestad imponente[b].
