lexical_decisions:
- source_word: τούναντίον
  english_pob_choice: the opposite
  chosen_spanish: lo contrario
  alternatives_spanish:
  - al contrario
  - lo opuesto
  lexicon: LSJ
  rationale: Expresa con naturalidad la idea idiomática de contraste esperado frente a la realidad; aquí introduce el marco de expectativa opuesta.
- source_word: ἐκδεχόμενοι
  english_pob_choice: expected
  chosen_spanish: esperaban
  alternatives_spanish:
  - aguardaban
  - esperaban que sucediera
  lexicon: LSJ
  rationale: El participio comunica una actitud de espera/expectativa; 'esperaban' conserva esa postura mental en español sin forzar una paráfrasis.
- source_word: συμφύτῳ
  english_pob_choice: inborn
  chosen_spanish: innata
  alternatives_spanish:
  - nativa
  - congénita
  lexicon: LSJ
  rationale: '''Innata'' transmite la idea de algo unido por naturaleza, sin añadir tecnicismo innecesario y manteniendo el matiz de rasgo incorporado.'
- source_word: κακοηθείᾳ
  english_pob_choice: malice
  chosen_spanish: maldad
  alternatives_spanish:
  - malicia
  - perversidad
  - mala disposición
  lexicon: LSJ
  rationale: '''Maldad'' conserva el peso moral del término y funciona bien en español; ''malicia'' puede sonar demasiado estrecha como intención hostil puntual.'
- source_word: τὸ καλόν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo recto
  lexicon: LSJ
  rationale: El neutro sustantivado pide una abstracción moral; 'lo bueno' es claro y fiel, manteniendo la referencia ética sin sobrerinterpretar.
- source_word: ἀπωσάμενοι
  english_pob_choice: pushed away
  chosen_spanish: apartaron
  alternatives_spanish:
  - rechazaron
  - alejaron de sí
  - empujaron lejos
  lexicon: LSJ
  rationale: El verbo medio sugiere repulsión activa; 'apartaron' es idiomático y suficientemente enérgico para 'pushed away'.
- source_word: διηνεκῶς
  english_pob_choice: continually
  chosen_spanish: sin cesar
  alternatives_spanish:
  - continuamente
  - constantemente
  - sin interrupción
  lexicon: LSJ
  rationale: '''Sin cesar'' reproduce la continuidad insistente del adverbio con buen ritmo español y fuerza aspectual.'
- source_word: φαῦλον
  english_pob_choice: what is base
  chosen_spanish: lo vil
  alternatives_spanish:
  - lo bajo
  - lo ruin
  - lo malo
  lexicon: LSJ
  rationale: '''Lo vil'' conserva el juicio moral y cualitativo de φαῦλος, cercano a ''base'' sin reducirlo solo a maldad genérica.'
- source_word: ἐκνεύοντες
  english_pob_choice: turning aside
  chosen_spanish: inclinándose hacia
  alternatives_spanish:
  - desviándose hacia
  - apartándose hacia
  - torciéndose hacia
  lexicon: LSJ
  rationale: El participio sugiere una deriva continua hacia un objeto moral; 'inclinándose hacia' expresa bien esa tendencia sostenida en español.
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa muestran un paralelismo moral continuo: expectativa opuesta, repulsión del bien y deriva persistente hacia lo bajo. La versión española conserva ese encadenamiento sin suavizar el contraste ni introducir vocabulario eclesiástico ajeno al original.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología teológica no presente, porque el versículo no contiene el Tetragrámaton ni referencias directas a títulos divinos.
  - Se prefirió un registro sobrio y literario compatible con la prosa deuterocanónica, manteniendo la secuencia participial del griego en una sola oración fluida.
  - '''Lo bueno'' y ''lo vil'' preservan el contraste ético del texto sin cerrar indebidamente el alcance semántico de τα/τὸ καλόν y φαῦλον.'
