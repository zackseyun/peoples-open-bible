translation:
  language: es
  text: 'Entonces vino palabra de Yahvé a Jonás por segunda vez[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra vez» para «por segunda vez». El hebreo marca explícitamente la repetición después de la comisión previa de Jonás.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció ...
  - Y ... fue
  - Ahora ... vino
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce avance en la historia. En español, «Entonces» conserva la secuencia; «vino» reproduce de modo natural la llegada de la palabra profética sin volverla rígida o impersonal.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» mantiene la fórmula profética y su resonancia bíblica. Se usa «Yahvé» por la convención del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en hebreo. En español se adopta «Yahvé», la forma fijada por el proyecto, para preservar el nombre propio y no ocultarlo detrás de una sustitución tradicional.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: En esta fórmula de vocación, la preposición marca al destinatario de la palabra. «A» es la equivalencia natural y precisa en español.
- source_word: יוֹנָה
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonah
  lexicon: standard Spanish biblical onomastics
  rationale: Los nombres bíblicos se adaptan al uso consagrado en español. «Jonás» es la forma reconocible y correcta en lectura eclesial en español.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: El adverbio indica repetición explícita tras la comisión anterior. «Por segunda vez» preserva con precisión esa repetición y mantiene el énfasis narrativo; «otra vez» es posible pero menos exacto respecto al valor ordinal.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'así:'
  - diciendo,
  lexicon: HALOT
  rationale: La forma introduce el contenido del discurso inmediato en el versículo siguiente. «Diciendo:» es idiomático en español y prepara la cita sin añadir información ajena al texto.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal de Dios revelado en el hebreo, conforme a la convención del proyecto. No se sustituye por un título como «el SEÑOR», para no borrar la referencia directa al nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de שֵׁנִית
  english_pob_reading: a second time[a] / Or 'again'
  chosen_spanish_reading: por segunda vez[a]
  alternative_spanish_readings:
  - otra vez
  - de nuevo
  rationale: Se preserva la tensión lexical documentada entre el valor ordinal («segunda») y la posibilidad idiomática de «otra vez». «Por segunda vez» comunica ambas cosas sin perder el matiz de repetición después de la primera comisión de Jonás.
  doctrine_reference: No doctrinal issue; lexical nuance only
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el borrador español sigue de cerca la estructura del hebreo y conserva la nota de alternativa léxica para שֵׁנִית.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme a la política del proyecto.
  - «Jonás» sigue la forma usual española del nombre propio bíblico.
  - La puntuación con dos puntos tras «diciendo» introduce la cita siguiente de forma natural en español.
