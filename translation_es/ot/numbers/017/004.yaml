translation:
  language: es
  text: Así, Eleazar el sacerdote tomó los incensarios[a] de bronce que habían ofrecido los que fueron quemados[b], y los martillaron para hacer un revestimiento[c] para el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'braseros' para 'incensarios'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los quemados'' o ''los que fueron quemados'', en referencia a los consumidos por fuego en el relato anterior.'
    reason: lexical_alternative
  - marker: c
    text: O 'chapado' o 'recubrimiento' para 'revestimiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְתּוֹת
  english_pob_choice: censers
  chosen_spanish: incensarios
  alternatives_spanish:
  - braseros
  - censers
  lexicon: HALOT
  rationale: En contexto cultual, el término designa recipientes para brasas o incienso. En español, 'incensarios' comunica mejor esa función que un calco como 'censers'; 'braseros' es posible, pero puede sugerir un objeto doméstico más general.
- source_word: הַנְּחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: Como en el audit trail inglés, 'bronce' es la opción más natural y reconocible para los utensilios del tabernáculo, aun cuando el campo léxico hebreo puede abarcar cobre/bronce.
- source_word: הִקְרִיבוּ
  english_pob_choice: had offered
  chosen_spanish: habían ofrecido
  alternatives_spanish:
  - habían presentado
  - habían acercado
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo en hiphil expresa ofrecer/presentar una ofrenda. El pluscuamperfecto español refleja bien la relación temporal con la narración previa, como en el inglés auditado.
- source_word: הַשְּׂרֻפִים
  english_pob_choice: those who were burned
  chosen_spanish: habían ofrecido[a][b]
  alternatives_spanish:
  - los quemados
  - los que fueron quemados
  lexicon: HALOT
  rationale: La referencia es a los hombres consumidos por fuego en el relato anterior. En español, esa aclaración se incorpora en la nota para no introducir una expresión demasiado dura o ambigua en el cuerpo del texto, preservando la referencia histórica y la tensión léxica del participio pasivo.
- source_word: וַיְרַקְּעוּם
  english_pob_choice: they hammered them out
  chosen_spanish: los martillaron hasta hacer de ellos
  alternatives_spanish:
  - los golpearon hasta convertirlos
  - los batieron en láminas
  lexicon: HALOT
  rationale: El verbo significa batir/forjar metal. En español, 'martillaron' conserva la imagen artesanal y el objeto directo explícito que el audit trail inglés restablece; la frase 'hasta hacer de ellos' expresa el resultado sin forzar una pasiva extraña.
- source_word: צִפּוּי
  english_pob_choice: a covering
  chosen_spanish: un revestimiento
  alternatives_spanish:
  - una cubierta
  - un recubrimiento
  - un revestimiento metálico
  lexicon: HALOT
  rationale: '''Revestimiento'' comunica el sentido de algo aplicado como capa/overlay sobre una superficie. Es más preciso que ''cubierta'' para el trabajo metálico, y mantiene la neutralidad del término hebreo.'
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: for the altar
  chosen_spanish: para el altar
  alternatives_spanish:
  - sobre el altar
  - del altar
  lexicon: HALOT
  rationale: 'El lamed expresa finalidad: el metal fue trabajado para servir como revestimiento del altar. ''Para el altar'' conserva esa intención sin introducir una localización no explícita.'
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de ''the burned men'' a ''those who were burned'' para mayor naturalidad y exactitud, y luego hizo explícito el objeto directo en ''hammered them out''. En español se siguió esa revisión: se evitó una etiqueta humana rígida en el texto principal, se mantuvo la referencia al grupo consumido por fuego en nota, y se explicitó ''los'' como objeto de ''martillaron''.'
  spanish_consistency_notes:
  - Se mantiene 'Eleazar' y 'el sacerdote' de forma literal y clara.
  - Se eligió 'bronce' siguiendo la decisión auditada en inglés.
  - '''Revestimiento'' se usa de manera consistente con el valor de overlay/cubierta metálica.'
  - No se usó 'SEÑOR' ni terminología teológica añadida, porque el versículo no contiene esos elementos.
