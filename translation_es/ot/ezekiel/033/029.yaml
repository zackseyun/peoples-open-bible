base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/029.yaml
  text: Then they will know that I am Yahweh[b][a], when I make the land a desolation and a waste because of all the abominations that they have committed.
  footnotes:
  - marker: a
    text: Or 'and they will know.' The Hebrew conjunction can be rendered simply 'and,' but here it likely carries the sense of result in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a desolation and an astonishment/horror.' The second Hebrew noun can emphasize not only ruin but the appalling effect of that ruin.
    reason: lexical_alternative
