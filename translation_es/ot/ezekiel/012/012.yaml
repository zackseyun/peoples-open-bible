  to: Y el príncipe que está entre ellos llevará su equipaje[b] sobre el hombro en la oscuridad y saldrá[a]. Abrirán un boquete en el muro para sacarlo por él. Cubrirá su rostro para que no vea la tierra con sus ojos[c].
  rationale: Se corrige la cláusula del muro para reflejar mejor la imagen concreta de חתר, se reemplaza «muralla» por «muro» para mayor precisión, y se realinea la nota [b] con la documentación auditada del POB inglés sobre el objeto implícito «su equipaje».
