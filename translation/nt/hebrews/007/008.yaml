theological_decisions:
- issue: Nature of the contrast between Levitical priests and Melchizedek
  chosen_reading: The verse contrasts mortal Levitical priests with Melchizedek as one whom Scripture testifies as living, without requiring a claim that Melchizedek is literally immortal in himself.
  alternative_readings:
  - The verse teaches Melchizedek's literal ongoing personal immortality.
  rationale: 'The argument in Hebrews uses the Genesis narrative''s literary presentation: Levitical priests are explicitly mortal, whereas Melchizedek is presented without recorded death and thus ''testified'' as living. The translation preserves this tension by retaining the passive testimony language rather than over-interpreting it.'
  doctrine_reference: Preserve theological tension rather than resolve it.
