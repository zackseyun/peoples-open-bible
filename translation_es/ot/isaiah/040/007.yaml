translation:
  language: es
  text: La hierba se seca[a], la flor se marchita, porque el aliento de Yahvé sopla sobre ella; ciertamente, el pueblo es hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el viento de Yahvé sopla sobre ella'; menos probable aquí, 'el Espíritu de Yahvé sopla sobre ella'.
    reason: alternative_reading
lexical_decisions:
- source_word: יָבֵשׁ
  english_pob_choice: dries up
  chosen_spanish: se seca
  alternatives_spanish:
  - se agosta
  - se marchita
  lexicon: HALOT
  rationale: El verbo expresa volverse seco o quedar sin humedad. En español, 'se seca' comunica de manera natural la pérdida de vitalidad de la vegetación sin cargar el verso con un giro demasiado técnico.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - césped
  lexicon: HALOT
  rationale: '''Hierba'' mantiene el sentido colectivo de vegetación baja y funciona bien en el paralelismo poético. ''Pasto'' sería posible, pero puede sonar más regional; ''césped'' es demasiado específico.'
- source_word: נָבֵל
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se desvanece
  - se mustia
  lexicon: HALOT
  rationale: El verbo se usa normalmente para marchitarse o perder frescura, especialmente en imágenes de flores. 'Se marchita' conserva la fuerza poética y el paralelismo con la hierba.
- source_word: צִיץ
  english_pob_choice: flower
  chosen_spanish: flor
  alternatives_spanish:
  - floración
  - capullo
  lexicon: HALOT
  rationale: '''Flor'' es la equivalencia más natural y clara en español para el objeto del paralelismo. Otras opciones resultan más restringidas o menos idiomáticas.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la causa del secarse y marchitarse. 'Porque' expresa esa relación causal con claridad en español moderno.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - viento
  - Espíritu
  lexicon: HALOT
  rationale: '''Aliento'' preserva mejor en español la imagen de una exhalación poderosa y vivificante/destructiva atribuida a Yahvé. ''Viento'' queda como alternativa contextual; ''Espíritu'' es posible pero menos probable en este verso inmediato.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración española 'Yahvé', conforme a la terminología del proyecto. Se evita la sustitución por un título como 'SEÑOR' para no ocultar el nombre propio.
- source_word: נָשְׁבָה
  english_pob_choice: blows
  chosen_spanish: sopla
  alternatives_spanish:
  - ha soplado
  - sopla sobre
  lexicon: HALOT
  rationale: El verbo significa soplar. 'Sopla' suena natural en español poético y mantiene la imagen activa del aliento/viento divino.
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre eso
  - en ella
  lexicon: HALOT
  rationale: El sufijo pronominal retoma la hierba/flor. 'Sobre ella' es idiomático en español y conserva el impacto del soplo divino sobre la vegetación.
- source_word: אָכֵן
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en verdad
  - seguramente
  lexicon: HALOT
  rationale: La partícula aporta confirmación enfática. 'Ciertamente' mantiene ese matiz con un registro sobrio y bíblico sin sonar arcaico.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: '''El pueblo'' reproduce la colectividad definida del hebreo y preserva la resonancia bíblica del término sin restringirlo indebidamente.'
theological_decisions:
- issue: Rendering of רוּחַ יְהוָה
  english_pob_reading: the breath of Yahweh
  chosen_spanish_reading: el aliento de Yahvé
  alternative_spanish_readings:
  - el viento de Yahvé
  - el Espíritu de Yahvé
  rationale: El contexto poético inmediato trata de vegetación que se seca y flores que se marchitan; por eso 'aliento' conserva el sentido de una exhalación divina eficaz. 'Viento' sigue siendo una lectura posible y se documenta como alternativa, mientras que 'Espíritu' es menos probable aquí aunque no imposible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Collective force of הָעָם
  english_pob_reading: the people
  chosen_spanish_reading: el pueblo
  alternative_spanish_readings:
  - las personas
  - la humanidad
  rationale: El hebreo permite una referencia colectiva amplia. 'El pueblo' mantiene la forma definida y la tensión interpretativa abierta entre un colectivo particular y una generalización sobre la fragilidad humana.
  doctrine_reference: Contexto profético-poético de Isaías 40:7
translation_notes:
  revision_awareness: El draft sigue el texto hebreo masorético dado y el trazado auditado en inglés, sin cambios de revisión pendientes; se ha conservado la ambigüedad documentada de רוּחַ mediante una nota al pie.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino, según la terminología del proyecto.
  - Se conserva un registro bíblico claro y natural, evitando calcos innecesarios.
  - 'La imagen vegetal se mantiene con paralelismo directo: hierba/flor/pueblo.'
  - La nota al pie marca solo la alternativa léxica relevante para רוּחַ, sin sobrecargar el verso.
