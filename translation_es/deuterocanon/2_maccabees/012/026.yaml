translation:
  language: es
  text: Entonces avanzó contra Carnión y Atargatis[a][b], y masacró veinticinco mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible lectura alternativa: «Atargatis» puede designar un santuario de Atargatis más que otro nombre de ciudad.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «dos miríadas de cuerpos y cinco mil», es decir, veinticinco mil muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξελθὼν
  english_pob_choice: he advanced
  chosen_spanish: avanzó
  alternatives_spanish:
  - salió
  - marchó
  lexicon: LSJ
  rationale: El participio de ἐξέρχομαι indica salida con movimiento hacia una acción militar; en español, «avanzó» comunica ese desplazamiento ofensivo con naturalidad y mantiene el tono narrativo bélico.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: LSJ
  rationale: En un contexto de ataque, ἐπί señala dirección hostil hacia el objetivo; «contra» reproduce bien ese valor militar.
- source_word: τὸ Κάρνιον
  english_pob_choice: Carnion
  chosen_spanish: Carnión
  alternatives_spanish:
  - Karnión
  lexicon: LSJ
  rationale: Es un nombre propio geográfico, por lo que se translitera. Se conserva el acento gráfico español para una lectura fluida.
- source_word: τὸ Ἀτεργάτιον
  english_pob_choice: Atargatis
  chosen_spanish: Atargatis
  alternatives_spanish:
  - Atargatión
  - el santuario de Atargatis
  lexicon: LSJ
  rationale: La tradición auditada del POB optó por «Atargatis» y revisó desde una forma más literal hacia una más precisa con respecto al referente asociado. En español, mantener «Atargatis» preserva esa decisión sin forzar una reinterpretación en el texto principal.
- source_word: κατέσφαξεν
  english_pob_choice: slaughtered
  chosen_spanish: masacró
  alternatives_spanish:
  - mató
  - degolló
  lexicon: LSJ
  rationale: El verbo expresa matanza violenta y masiva; «masacró» comunica la crudeza del acto mejor que un simple «mató» y sin sonar demasiado coloquial.
- source_word: μυριάδας σωμάτων δύο πεντακισχιλίους
  english_pob_choice: twenty-five thousand men
  chosen_spanish: veinticinco mil hombres
  alternatives_spanish:
  - veinticinco mil personas
  - dos miríadas de cuerpos y cinco mil
  lexicon: LSJ
  rationale: La expresión griega suma 25.000. Aunque literalmente dice «cuerpos», aquí funciona como recuento de los caídos; «hombres» es idiomático en un parte de guerra y sigue la decisión auditada en inglés.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefirió «Atargatis» en lugar de una forma más transliterada/ambigua, manteniendo el sentido militar y la cifra total de 25.000.
  spanish_consistency_notes:
  - Se conservaron nombres propios con transliteración coherente al español.
  - Se mantuvo la fuerza violenta de κατέσφαξεν sin suavizarla.
  - La cifra se expresó de modo idiomático, con nota literal para transparencia auditiva.
