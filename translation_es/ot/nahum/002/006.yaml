translation:
  language: es
  text: Él recuerda a sus nobles[a]; tropiezan en su marcha. Se apresuran hacia su muralla, y se ha dispuesto la protección de asedio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hombres poderosos»; el verbo hebreo normalmente significa «recordar», aunque aquí también puede sugerir llamar o reunir a sus tropas.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo puede aludir a un dispositivo protector de asedio, como un mantelete o una pantalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכֹּר
  english_pob_choice: He remembers
  chosen_spanish: Él recuerda
  alternatives_spanish:
  - Él se acuerda
  - Él convoca
  - Él hace venir
  lexicon: HALOT
  rationale: El verbo básico es «recordar», y el contexto militar no obliga a convertirlo en «convocar». En español, «recuerda» conserva el valor léxico principal y deja abierta la tensión contextual que el lector puede inferir del movimiento bélico.
- source_word: אַדִּירָיו
  english_pob_choice: his nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus poderosos
  - sus hombres valientes
  - sus grandes
  lexicon: HALOT
  rationale: El sustantivo puede referirse a hombres poderosos o nobles. «Sus nobles» sigue la opción inglesa del POB y mantiene la idea de altos dignatarios o guerreros de rango, sin forzar una paráfrasis más interpretativa.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: they stumble
  chosen_spanish: tropiezan
  alternatives_spanish:
  - vacilan
  - se tambalean
  - flaquean
  lexicon: HALOT
  rationale: El nifal de כשל expresa tropezar o tambalearse. «Tropiezan» es natural en español y conserva la imagen irónica de tropas que avanzan con prisa pero pierden el paso.
- source_word: בַּהֲלִיכוֹתָם
  english_pob_choice: in their march
  chosen_spanish: en su marcha
  alternatives_spanish:
  - en su avance
  - al andar
  - en su caminar
  lexicon: HALOT
  rationale: La forma literal alude a sus idas o caminatas; en contexto militar, «marcha» comunica el avance del ejército de manera idiomática y fiel al movimiento sugerido por el hebreo.
- source_word: יְמַהֲרוּ
  english_pob_choice: They hurry
  chosen_spanish: Se apresuran
  alternatives_spanish:
  - Se dan prisa
  - Corren
  - Se precipitan
  lexicon: HALOT
  rationale: El verbo indica prisa. «Se apresuran» reproduce bien el impulso urgente de la escena sin añadir matices no presentes en el texto.
- source_word: חוֹמָתָהּ
  english_pob_choice: her wall
  chosen_spanish: su muro
  alternatives_spanish:
  - su muralla
  - el muro de ella
  - su pared
  lexicon: HALOT
  rationale: El sufijo femenino singular probablemente personifica a la ciudad. En español, «su muro» evita el antropomorfismo explícito de «de ella» y preserva la referencia a la muralla de la ciudad sin perder naturalidad.
- source_word: הַסֹּכֵךְ
  english_pob_choice: the siege shelter
  chosen_spanish: el refugio de asedio
  alternatives_spanish:
  - el mantolete de asedio
  - la cubierta de asedio
  - el escudo móvil
  lexicon: HALOT
  rationale: El término designa un dispositivo protector en contexto de asedio, pero su identificación exacta es discutida. «Refugio de asedio» conserva la función protectora y deja espacio para la ambigüedad técnica documentada por el POB.
- source_word: וְהֻכַן
  english_pob_choice: is set up
  chosen_spanish: se ha dispuesto
  alternatives_spanish:
  - se ha levantado
  - se ha preparado
  - se ha establecido
  lexicon: HALOT
  rationale: El hophal indica que algo ha sido hecho listo o establecido. «Se ha dispuesto» expresa bien la preparación/instalación del artefacto de asedio sin obligar a una sola imagen técnica.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del POB en inglés, que volvió a «remembers» para reflejar con mayor precisión יִזְכֹּר, y mantiene la lectura militar de la segunda mitad del versículo con la nota sobre el implemento de asedio.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes; aquí no aparece nombre divino explícito.
  - Se mantiene la equivalencia de tono sobrio y militar, evitando expansión interpretativa.
  - Las notas preservan la ambigüedad léxica donde el inglés POB la documenta.
