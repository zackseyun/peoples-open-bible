  to: 'Entonces le dijeron: «Por favor, dinos por causa de quién ha venido sobre nosotros esta calamidad[a]. ¿Cuál es tu ocupación, y de dónde vienes? ¿Cuál es tu tierra[b], y de qué pueblo eres?»'
  rationale: Se corrige «decláranos» por «dinos» para lograr español natural y fiel al sentido de הַגִּידָה נָּא לָנוּ. Se reubica la nota [a] a la cláusula de רָעָה/causalidad, en línea con el audit trail inglés. Se cambia «este mal» por «esta calamidad» en el texto principal para reflejar mejor el contexto de desastre, manteniendo la alternativa más literal en nota.
