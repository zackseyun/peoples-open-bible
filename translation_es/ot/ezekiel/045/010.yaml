translation:
  language: es
  text: Deben tener balanzas justas[a], un efa[b] justo y un bat[c] justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'balanzas de justicia, un efa de justicia y un bat de justicia'.
    reason: lexical_alternative
  - marker: b
    text: Un efa era una medida estándar para secos.
    reason: cultural_note
  - marker: c
    text: Un bat era una medida estándar para líquidos.
    reason: cultural_note
lexical_decisions:
- source_word: מֹאזְנֵי
  english_pob_choice: scales
  chosen_spanish: balanzas
  alternatives_spanish:
  - escalas
  lexicon: HALOT
  rationale: El hebreo se refiere a instrumentos de pesaje; en español, 'balanzas' es el término natural y preciso para un contexto comercial/legal. 'Escalas' también sería posible, pero suena menos idiomático en este uso.
- source_word: צֶדֶק
  english_pob_choice: honest
  chosen_spanish: de justicia
  alternatives_spanish:
  - justas
  - rectas
  - honestas
  lexicon: HALOT
  rationale: El sustantivo צֶדֶק aparece tres veces modificando las medidas y apunta a la rectitud/fidelidad en el peso y la medida. En español, 'de justicia' conserva el sustantivo y el tono jurídico-ético del hebreo sin reducirlo a una simple cualidad moralizada.
- source_word: אֵיפָה
  english_pob_choice: ephah
  chosen_spanish: efa
  alternatives_spanish:
  - medida seca
  lexicon: HALOT
  rationale: Es una unidad de medida hebrea específica. Se mantiene transliterada como 'efa' para preservar la referencia cultural y la correspondencia con el sistema de medidas del texto.
- source_word: בַּת
  english_pob_choice: bath
  chosen_spanish: bato
  alternatives_spanish:
  - medida líquida
  lexicon: HALOT
  rationale: Es una unidad hebrea de capacidad para líquidos. 'Bato' adapta la transliteración al español y mantiene la unidad técnica del original.
- source_word: יְהִי לָכֶם
  english_pob_choice: You must have
  chosen_spanish: Tendrán
  alternatives_spanish:
  - Debe haber para ustedes
  - Han de tener
  lexicon: HALOT
  rationale: La construcción jussiva con לָכֶם expresa obligación normativa. En español, 'Tendrán' comunica adecuadamente el mandato comunitario en forma directa y publicable; el contenido obligatorio queda reforzado por el contexto y por la formulación de las medidas justas.
theological_decisions:
- issue: Relación entre צֶדֶק y la formulación ética de las medidas
  english_pob_reading: honest scales, an honest ephah, and an honest bath
  chosen_spanish_reading: balanzas de justicia, efa de justicia y bato de justicia
  alternative_spanish_readings:
  - balanzas honestas, efa honesto y bato honesto
  - balanzas justas, efa justo y bato justo
  rationale: El texto no sólo exige exactitud técnica sino rectitud conforme a justicia. Mantener 'de justicia' preserva la fuerza sustantiva del hebreo y evita diluir la carga jurídica en un adjetivo demasiado general o meramente comercial.
  doctrine_reference: Justicia/rectitud en la vida comunitaria; integridad en el comercio (cf. Lev 19:35-36; Prov 11:1)
translation_notes:
  revision_awareness: El contexto inglés mantiene 'honest' por fluidez idiomática, pero el hebreo repite צֶדֶק tres veces; la versión española conserva esa repetición con 'de justicia' para no perder la insistencia lexical del original. No hay revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa 'balanzas' para מֹאזְנֵי, siguiendo el sentido instrumental del plural hebreo.
  - Se transliteran las unidades como 'efa' y 'bato' para mantener consistencia con la terminología técnica del sistema de medidas bíblico.
  - Se evita 'SEÑOR' o cualquier sustitución teológica no pertinente; el versículo trata de medidas justas, no de nombres divinos.
  - La estructura breve y normativa de la frase española busca reflejar el tono legal del hebreo sin añadir explicaciones al cuerpo del texto.
