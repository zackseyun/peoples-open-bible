    rationale: Aunque 'nación' es singular gramatical, la segunda cláusula también puede leerse como referencia colectiva y el verbo hebreo es plural. En español, 'correrán hacia ti' preserva mejor la forma fuente y evita justificar una singularización innecesaria.
  - severity: low
    issue: '''y del Santo de Israel'' es menos natural que ''y por el Santo de Israel'' o una coordinación equivalente.'
    rationale: La construcción con 'del' resulta opaca en español contemporáneo. Dado que el inglés auditado tomó valor causal/appositivo, conviene expresarlo claramente sin perder fidelidad.
