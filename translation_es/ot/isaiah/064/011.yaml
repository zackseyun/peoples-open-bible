translation:
  language: es
  text: ¿Te reprimirás[a] por estas cosas, Yahvé? ¿Seguirás callando y afligiéndonos[b] en gran manera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Te contendrás a causa de estas cosas, Yahvé?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y humillándonos en gran manera». El verbo hebreo puede llevar la idea de afligir o humillar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/עַל אֵלֶּה
  english_pob_choice: over these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - con respecto a estas cosas
  - sobre estas cosas
  lexicon: HALOT
  rationale: La construcción interrogativa expresa ocasión o motivo de la reacción divina. En español, «por estas cosas» comunica mejor la idea de causa/ocasión que un calco como «sobre estas cosas», y sigue siendo fiel al valor retórico del hebreo.
- source_word: תִתְאַפַּק
  english_pob_choice: restrain yourself
  chosen_spanish: te contendrás
  alternatives_spanish:
  - te reprimirás
  - te detendrás
  - te guardarás
  lexicon: HALOT
  rationale: 'El hitpael de אפק tiene fuerza reflexiva: contenerse, retenerse, no actuar. «Te contendrás» preserva esa autorrestricción sin sonar forzado en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma castellana estable y legible para el nombre personal de Dios.
- source_word: תֶּחֱשֶׁה
  english_pob_choice: keep silent
  chosen_spanish: Callarás
  alternatives_spanish:
  - Guardarás silencio
  - Permanecerás callado
  lexicon: HALOT
  rationale: El verbo significa estar/callarse. En una pregunta retórica, «Callarás» es natural y mantiene el paralelismo con la acción divina contenida.
- source_word: וּ/תְעַנֵּ/נוּ
  english_pob_choice: and afflict us
  chosen_spanish: y nos afligirás
  alternatives_spanish:
  - y nos humillarás
  - y nos oprimirás
  lexicon: HALOT
  rationale: El piel de ענה puede significar afligir o humillar. Dado el lamento por la devastación, «afligirás» expresa el sufrimiento padecido sin desplazar el sentido hacia una mera humillación moral.
- source_word: עַד מְאֹד
  english_pob_choice: so very severely
  chosen_spanish: tanto
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - muchísimo
  lexicon: HALOT
  rationale: La combinación intensifica el verbo anterior. En español, la repetición interrogativa ya carga la emoción del verso; «tanto» deja abierta la intensidad del hebreo sin sobredeterminarla ni introducir un adverbio más pesado.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio de Dios en español, evitando la sustitución por un título y conservando la decisión doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés quedó en alta concordancia y no requirió cambios de fondo. La versión española conserva la pregunta retórica, el nombre divino como Yahvé y la ambigüedad léxica de ענה mediante una nota alternativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para יְהוָה por coherencia con la política del proyecto.
  - «Afligirás» mantiene el tono de lamentación y el paralelismo con «Callarás».
  - La intensidad de עַד מְאֹד se dejó absorbida por el tono del verso, siguiendo la lectura inglesa que la vincula al verbo precedente.
