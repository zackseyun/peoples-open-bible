translation:
  language: es
  text: Mira, estoy haciendo algo nuevo; ahora brota—¿no lo perciben[a]? Aun haré un camino en el desierto[b], ríos en el yermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo saben» o «lo reconocen». El hebreo también puede entenderse como «¿no lo conocen?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el desierto». El hebreo usa dos términos relacionados pero distintos para tierra árida: «desierto» y «yermo/desolación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - Aquí estoy
  lexicon: HALOT
  rationale: La fórmula introductoria tiene fuerza deíctica y llama la atención del oyente. «Mira» conserva esa apelación directa en un español natural y digno, sin volverla demasiado arcaica.
- source_word: עֹשֶׂה
  english_pob_choice: I am doing
  chosen_spanish: estoy haciendo
  alternatives_spanish:
  - hago
  - haré
  - estoy por hacer
  lexicon: HALOT
  rationale: El participio comunica acción en curso o inminente. «Estoy haciendo» refleja iniciativa divina activa sin forzar un futuro más explícito que el hebreo no exige.
- source_word: חֲדָשָׁה
  english_pob_choice: a new thing
  chosen_spanish: algo nuevo
  alternatives_spanish:
  - una cosa nueva
  - una obra nueva
  - un hecho nuevo
  lexicon: HALOT
  rationale: En español, «algo nuevo» transmite mejor el valor sustantivado de la expresión que una calca rígida, manteniendo abierta la amplitud del acto divino.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: HALOT
  rationale: Marca inmediatez de forma clara y natural.
- source_word: תִצְמָח
  english_pob_choice: it springs up
  chosen_spanish: brota
  alternatives_spanish:
  - germina
  - se levanta
  - sale
  lexicon: HALOT
  rationale: El verbo evoca brotar o germinar. «Brota» conserva la imagen orgánica en un español vivo y breve.
- source_word: הֲלוֹא
  english_pob_choice: do you not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es así que
  lexicon: HALOT
  rationale: La pregunta retórica busca reconocimiento. «¿No» mantiene la fuerza interrogativa y el tono de reproche/llamado a percibir.
- source_word: תֵדָעוּהָ
  english_pob_choice: perceive it
  chosen_spanish: lo perciben
  alternatives_spanish:
  - lo saben
  - lo reconocen
  - lo entienden
  lexicon: HALOT
  rationale: ידע puede ser «saber», «reconocer» o «percibir». Aquí la idea es advertir la obra emergente de Dios, por eso «perciben» refleja mejor la captación concreta del hecho.
- source_word: אָשִׂים
  english_pob_choice: I will make
  chosen_spanish: abriré
  alternatives_spanish:
  - pondré
  - haré
  - trazaré
  lexicon: HALOT
  rationale: Con «camino» en este contexto, la acción divina es hacer accesible una vía. «Abriré» expresa con claridad esa creación/provisión del camino sin perder el sentido de hacer/poner.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la soledad
  lexicon: HALOT
  rationale: «Desierto» es el equivalente más natural y transparente en español. La nota conserva la distinción semántica con el segundo término paralelo.
- source_word: דֶּרֶךְ
  english_pob_choice: a way
  chosen_spanish: un camino
  alternatives_spanish:
  - una senda
  - una ruta
  lexicon: HALOT
  rationale: En español, «camino» es la opción más natural para la metáfora concreta y a la vez teológicamente cargada de la vía provista por Dios.
- source_word: בִּישִׁימוֹן
  english_pob_choice: in the wasteland
  chosen_spanish: en la tierra seca
  alternatives_spanish:
  - en el yermo
  - en la desolación
  - en el páramo
  lexicon: HALOT
  rationale: El segundo término designa un lugar árido y desolado. «Tierra seca» comunica bien esa sequedad y evita repetir exactamente «desierto», manteniendo el paralelismo distinguido.
- source_word: נְהָרוֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: HALOT
  rationale: El plural denota abundancia de agua. «Ríos» conserva la imagen plena y enfática del hebreo.
theological_decisions:
- issue: Alcance del «algo nuevo» y su cumplimiento
  english_pob_reading: Retain the concrete imagery of new creation/exodus-like renewal without specifying a single doctrinal fulfillment in the translation.
  chosen_spanish_reading: Conservar la imagen concreta de una obra nueva de Dios sin cerrar el verso a un único cumplimiento doctrinal.
  alternative_spanish_readings:
  - Una referencia principal al regreso del exilio
  - Una renovación escatológica más amplia
  - Una anticipación tipológica de la salvación mesiánica
  rationale: La poesía profética admite varias capas de cumplimiento. La traducción debe preservar esa tensión teológica en vez de resolverla dentro del propio texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje fue revisado en la fuente inglesa y quedó sin cambios: el auditor confirma alta concordancia. La versión española sigue esa lectura estable, sin introducir ampliaciones interpretativas ni ajustes textuales innecesarios.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no lo contiene explícitamente.
  - «Desierto» / «tierra seca» preserva la distinción semántica entre מִדְבָּר y יְשִׁימוֹן.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece en este verso.
  - La estructura retórica conserva el contraste entre la obra nueva y el paisaje árido, central en el hebreo.
