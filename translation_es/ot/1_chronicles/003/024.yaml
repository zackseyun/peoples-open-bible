- source_word: הדיוהו
  english_pob_choice: Hodaviah
  chosen_spanish: Hodavías
  alternatives_spanish:
  - Hodaviah
  - Hodías
  - Hodevahu
  lexicon: HALOT
  rationale: El hebreo presenta una grafía inusual para este nombre. Se adopta la identificación convencional 'Hodaviah', adaptada al español como 'Hodavías' para lectura natural, sin perder el vínculo con la forma tradicional.
- source_word: וְאֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: HALOT
  rationale: 'Nombre propio; en español se evita la h muda inglesa y se usa una transliteración más fluida: ''Eliasib''.'
- source_word: וּפְלָיָה
  english_pob_choice: Pelaiah
  chosen_spanish: Pelaías
  alternatives_spanish:
