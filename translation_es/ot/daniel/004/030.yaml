revisions:
- from: En ese mismo momento se cumplió la palabra contra Nabucodonosor. Fue expulsado de entre los hombres[a], y comió hierba como los bueyes; y su cuerpo fue empapado con el rocío del cielo, hasta que su cabello creció como plumas de águilas, y sus uñas como las de las aves.
  to: En ese mismo momento se cumplió la palabra contra Nabucodonosor. Fue expulsado de entre los hombres, y comió hierba como los bueyes, y su cuerpo quedó empapado por el rocío del cielo, hasta que su cabello creció como plumas de águilas[a], y sus uñas como garras de aves.
  rationale: Se corrigió la colocación y el contenido de la nota para que correspondan a «águilas» y no alteren el referente de la comparación; se ajustó «sus uñas como las de las aves» a «sus uñas como garras de aves» para reflejar mejor la decisión léxica documentada; y se suavizó «fue empapado con» a «quedó empapado por» para un español más natural.
