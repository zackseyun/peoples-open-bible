translation:
  text: And when all were already expecting the coming judgment[a], and the enemies had already joined battle, and the army had been drawn up, and the beasts had been suitably stationed in one part, and the cavalry posted on the flanks[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the impending decision' or 'the coming crisis' for 'the coming judgment.'
    reason: alternative_reading
  - marker: b
    text: That is, likely the war elephants in the battle formation.
    reason: cultural_note
lexical_decisions:
- source_word: προσδοκώντων
  chosen: were already expecting
  alternatives:
  - were waiting for
  - were anticipating
  lexicon: LSJ
  rationale: The participle denotes expectant waiting. 'Expecting' fits the military tension and reads naturally in English while preserving the anticipatory sense.
- source_word: τὴν ἐσομένην κρίσιν
  chosen: the coming judgment
  alternatives:
  - the impending decision
  - the coming crisis
  lexicon: LSJ
  rationale: κρίσις can mean judgment, decision, or crisis. In this battle context it refers to the decisive outcome about to occur; 'judgment' preserves the gravity and possible theological resonance without over-paraphrasing.
- source_word: προσμιξάντων τῶν πολεμίων
  chosen: the enemies had already joined battle
  alternatives:
  - the enemies had already engaged
  - the enemies had already come into contact
  lexicon: LSJ
  rationale: The verb literally suggests coming together or engaging. In military context, 'joined battle' idiomatically conveys hostile engagement better than a wooden 'mixed with.'
- source_word: τῆς στρατιᾶς ἐκταγείσης
  chosen: the army had been drawn up
  alternatives:
  - the army had been arrayed
  - the army had been deployed
  lexicon: LSJ
  rationale: The passive participle indicates arranging troops in order. 'Drawn up' is a standard military expression that is both accurate and readable.
- source_word: τῶν θηρίων
  chosen: the beasts
  alternatives:
  - the animals
  - the elephants
  lexicon: LSJ
  rationale: The Greek says 'beasts.' In the immediate 2 Maccabees battle context these are war elephants, but the source term itself is broader. The main text keeps the literal term; the more specific identification is preserved in a footnote.
- source_word: ἐπὶ μέρος
  chosen: in one part
  alternatives:
  - in a sector
  - to one side
  lexicon: LSJ
  rationale: The phrase indicates placement in a particular section of the battle line. 'In one part' stays close to the Greek without over-specifying the tactical arrangement.
- source_word: εὐκαίρως ἀποκατασταθέντων
  lemma: εὐκαίρως
  chosen: had been suitably stationed
  alternatives:
  - had been advantageously placed
  - had been posted at the right moment/in the right place
  lexicon: LSJ
  rationale: The adverb εὐκαίρως conveys appropriateness or timeliness, and ἀποκαθίστημι here concerns positioning. 'Suitably stationed' captures apt tactical placement in concise English.
- source_word: τῆς δὲ ἵππου
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the horse troops
  lexicon: LSJ
  rationale: Although literally 'the horse,' the collective military sense is cavalry. This is the natural English equivalent.
- source_word: κατὰ κέρας τεταγμένης
  chosen: posted on the flanks
  alternatives:
  - drawn up by wings
  - arrayed on the horns
  lexicon: LSJ
  rationale: κέρας in military usage refers to a wing or flank of an army. 'Posted on the flanks' communicates the tactical meaning clearly for modern readers.
