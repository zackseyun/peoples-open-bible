translation:
  language: es
  text: Y si trae un cordero como su ofrenda por el pecado[a], traerá una hembra sin defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El hebreo חַטָּאת puede designar el sacrificio que trata con el pecado y con la impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Ahora, si
  lexicon: HALOT
  rationale: La partícula condicional introduce una alternativa dentro de la instrucción sacrificial. En español, «Y si» conserva la continuidad con el contexto inmediato sin volver la frase pesada.
- source_word: כֶּבֶשׂ
  english_pob_choice: a lamb
  chosen_spanish: un cordero
  alternatives_spanish:
  - una oveja
  lexicon: HALOT
  rationale: En el contexto sacrificial, el término designa un animal del rebaño; «cordero» es la opción natural y clara en español para este uso.
- source_word: יָבִיא
  english_pob_choice: he brings
  chosen_spanish: presenta
  alternatives_spanish:
  - trae
  - ofrece
  lexicon: HALOT
  rationale: El verbo en hebreo describe la acción cultual de llevar/presentar la ofrenda. En español, «presenta» comunica bien el acto ritual sin perder el sentido concreto de traer la víctima/ofrenda.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es la ofrenda que se acerca a Dios; «ofrenda» es transparente y conserva el vínculo ritual del término con el acto de presentarla.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para la ofrenda por el pecado
  lexicon: HALOT
  rationale: 'Aquí se preserva la tensión documentada en el hebreo: חַטָּאת puede referirse tanto al pecado como a la ofrenda que trata con él. Se opta por «para el pecado» en el texto principal para no cerrar de antemano la discusión semántica; la nota explica la alternativa de «ofrenda por el pecado»/«ofrenda de purificación».'
- source_word: נְקֵבָה
  english_pob_choice: a female
  chosen_spanish: una hembra
  alternatives_spanish:
  - una hembra animal
  - un ejemplar hembra
  lexicon: HALOT
  rationale: El término especifica el sexo del animal. «Hembra» es preciso y natural en español en este contexto, y evita una frase más técnica o menos fluida.
- source_word: תְמִימָה
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - perfecta
  lexicon: HALOT
  rationale: En la legislación sacrificial, el adjetivo indica ausencia de defecto físico. «Sin defecto» es claro, fiel y estándar en español bíblico contemporáneo.
- source_word: יְבִיאֶנָּה
  english_pob_choice: he shall bring
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - traerá
  lexicon: HALOT
  rationale: El verbo repetido retoma la acción cultual y el sufijo femenino remite al animal hembra. «Ofrecerá» evita una repetición torpe y comunica adecuadamente el acto de presentar la víctima en el rito.
theological_decisions:
- issue: Sentido de חַטָּאת en legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: para el pecado
  alternative_spanish_readings:
  - como ofrenda por el pecado
  - para la ofrenda por el pecado
  - ofrenda de purificación
  rationale: El hebreo permite una tensión real entre el pecado y la ofrenda que lo trata. La tradición inglesa optó por «sin offering» y anotó la posibilidad de «purification offering». En español, se conserva la tensión en el texto principal con «para el pecado», y se deja abierta la alternativa ritual en la nota para no sobreprecisar el término.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El inglés POB y la revisión más reciente muestran acuerdo alto y sin cambios necesarios. La redacción española sigue la misma estructura decisiva del original hebreo y conserva la nota léxica sobre חַטָּאת sin suavizar la tensión semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - 'Se prefirió terminología sacrificial clara y contemporánea: «ofrenda», «sin defecto», «hembra».'
  - La frase verbal evita calco rígido y mantiene el carácter prescriptivo del hebreo.
  - La nota al pie se ancla en «pecado» para reflejar la ambigüedad léxica sin duplicar marcadores.
