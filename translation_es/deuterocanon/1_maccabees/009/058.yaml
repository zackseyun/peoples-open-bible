  yaml_path: translation/deuterocanon/1_maccabees/009/058.yaml
  text: And all the lawless men took counsel[a], saying, “Look, Jonathan and those with him are living in peace and confidence. So now let us bring Bacchides, and he will seize them all in a single night.”
