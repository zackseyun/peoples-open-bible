  text: ὁ ποιῶν τὴν ἁμαρτίαν ἐκ τοῦ διαβόλου ἐστίν, ὅτι ἀπ’ ἀρχῆς ὁ διάβολος ἁμαρτάνει. εἰς τοῦτο ἐφανερώθη ὁ υἱὸς τοῦ θεοῦ ἵνα λύσῃ τὰ ἔργα τοῦ διαβόλου.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/008.yaml
  text: 'The one who practices sin is from the devil[a], because the devil has been sinning from the beginning[d][c][b]. For this purpose the Son of God was revealed: to destroy the works of the devil.'
  footnotes:
  - marker: a
    text: Or 'The one who does sin' / 'whoever commits sin.' The Greek expression uses a present participle, suggesting ongoing or characteristic practice rather than a single isolated act.
    reason: lexical_alternative
  - marker: b
    text: Or 'is of the devil.' The Greek literally uses 'from' (ἐκ), expressing source or moral-spiritual origin/alignment.
    reason: alternative_reading
  - marker: c
    text: Or 'appeared' for 'was revealed.' The Greek emphasizes manifestation or disclosure.
    reason: lexical_alternative
  - marker: d
    text: Or 'to undo the works of the devil.' The verb literally means 'to loose' and by extension 'to break up' or 'destroy.'
    reason: lexical_alternative
