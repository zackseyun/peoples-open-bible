translation:
  language: es
  text: 'Sin embargo, no comerán de los que rumian ni de los que tienen la pezuña dividida[a]: el camello, porque rumia, pero no tiene la pezuña dividida; es inmundo para ustedes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «parten la pezuña».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «inmundo para ustedes»; esto es, inmundo para Israel bajo las leyes alimentarias.'
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: Marca una restricción o excepción respecto de la regla anterior. «Sin embargo» conserva el matiz adversativo/restrictivo de forma natural en español.
- source_word: מִמַּעֲלֵי הַגֵּרָה
  english_pob_choice: from among those that chew the cud
  chosen_spanish: de los que rumian
  alternatives_spanish:
  - de los que hacen subir el rumen
  - de los rumiantes
  lexicon: HALOT
  rationale: La expresión hebrea alude a ‘hacer subir’ la comida; en español bíblico y moderno, «rumiar» comunica correctamente la categoría alimentaria sin perder el sentido técnico.
- source_word: וּמִמַּפְרִיסֵי הַפַּרְסָה
  english_pob_choice: or from among those that divide the hoof
  chosen_spanish: ni de los que tienen la pezuña dividida
  alternatives_spanish:
  - ni de los que parten la pezuña
  - ni de los que separan la pezuña
  lexicon: HALOT
  rationale: «Tener la pezuña dividida» transmite de manera clara y fiel la descripción anatómica. Se evita un calco más áspero como «dividir la pezuña».
- source_word: הַגָּמָל
  english_pob_choice: the camel
  chosen_spanish: el camello
  alternatives_spanish:
  - el dromedario
  lexicon: HALOT
  rationale: Equivalente léxico directo y estándar.
- source_word: כִּי מַעֲלֵה גֵרָה הוּא
  english_pob_choice: because it chews the cud
  chosen_spanish: porque rumia
  alternatives_spanish:
  - porque hace subir el rumen
  - porque mastica el cud
  lexicon: HALOT
  rationale: Se conserva la razón dada en el texto. «Rumia» es la forma natural y precisa en español para esta acción biológica en el contexto alimentario.
- source_word: וּפַרְסָה אֵינֶנּוּ מַפְרִיס
  english_pob_choice: but does not divide the hoof
  chosen_spanish: pero no tiene la pezuña dividida
  alternatives_spanish:
  - pero no divide la pezuña
  - pero no parte la pezuña
  lexicon: HALOT
  rationale: Se preserva el contraste con la cláusula anterior y se expresa en español idiomático la ausencia de la característica requerida.
- source_word: טָמֵא הוּא לָכֶם
  english_pob_choice: it is unclean to you
  chosen_spanish: es inmundo para ustedes
  alternatives_spanish:
  - es impuro para ustedes
  - es ritualmente inmundo para ustedes
  lexicon: HALOT
  rationale: «Inmundo» mantiene el término bíblico tradicional para טָמֵא en contexto levítico, sin diluir la categoría cultual. «Para ustedes» conserva la perspectiva covenantal/legal del destinatario.
theological_decisions:
- issue: Naturaleza de la impureza alimentaria en la ley levítica
  english_pob_reading: unclean
  chosen_spanish_reading: inmundo
  alternative_spanish_readings:
  - ritualmente inmundo
  - impuro
  rationale: El hebreo טָמֵא en este pasaje designa una clasificación de pureza para Israel. Se conserva el término bíblico breve y fuerte «inmundo», evitando restringirlo interpretativamente a «ritual» en el texto principal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El texto español sigue el consenso alto del expediente inglés y mantiene sin cambios las decisiones estables: restricción inicial con valor adversativo, verbo de rumiar para מעלה גרה, descripción anatómica explícita para מפריס הפרסה, y la calificación cultual final como «inmundo».'
  spanish_consistency_notes:
  - Se usó «pezuña» para mantener un registro bíblico claro y natural en español.
  - Se eligió «inmundo» en vez de «impuro» para conservar la terminología levítica tradicional, acorde con la fuerza léxica de טָמֵא.
  - La nota sobre el camello aclara la oposición entre las dos características sin añadir interpretación doctrinal ajena al texto.
  - El marcador [a] se ancla en «Sin embargo» para reflejar la restricción de אַךְ; [b] se ancla en la cláusula final sobre la pezuña dividida para preservar la observación explicativa del expediente inglés.
