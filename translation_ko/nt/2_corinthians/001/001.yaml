id: 2CO.1.1
reference: 2 Corinthians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ καὶ Τιμόθεος ὁ ἀδελφὸς τῇ ἐκκλησίᾳ τοῦ θεοῦ τῇ οὔσῃ ἐν Κορίνθῳ, σὺν τοῖς ἁγίοις πᾶσιν τοῖς οὖσιν ἐν ὅλῃ τῇ Ἀχαΐᾳ·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/001.yaml
  text: 'Paul, an apostle of Messiah Jesus by the will of God, and Timothy our brother, to the church of God that is in Corinth, together with all the saints who are in all Achaia:'
  footnotes:
  - marker: a
    text: Or, Christ Jesus.
    reason: alternative_reading
  - marker: b
    text: Or 'Timothy the brother'.
    reason: previous_rendering
translation:
  language: ko
  text: '하나님의 뜻으로 메시아 예수의 사도가 된 바울과 우리 형제 디모데가, 고린도에 있는 하나님의 교회와 온 아가야에 있는 모든 성도에게 편지합니다:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 사신
  - 보냄 받은 자
  lexicon: BDAG
  rationale: 바울의 위임된 직분을 가리키는 정립된 한국어 등가어. 「사신」/「보냄 받은 자」는 칭호의 무게를 약화시킨다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: Χριστός의 칭호적 의미를 보존. DOCTRINE.md 정책에 따라 칭호로 기능할 때는 「메시아」로 옮긴다.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_korean: 하나님의 뜻으로
  alternatives_korean:
  - 하나님의 뜻을 통하여
  lexicon: BDAG
  rationale: 바울의 사도직이 신적 위임에서 나옴을 드러내는 정형 표현. 한국어 자연스러움을 위해 「~으로」를 채택한다.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_korean: 교회
  alternatives_korean:
  - 회중
  - 모임
  lexicon: BDAG
  rationale: 본문은 한 도시 안의 신자 공동체 전체를 가리키며, 바울 서신 인사 정식에서는 「교회」가 가장 자연스럽다. 영어 POB도 "church"를 채택했다.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_korean: 성도
  alternatives_korean:
  - 거룩한 자들
  lexicon: BDAG
  rationale: 바울의 인사 정식에서 「성도」가 가장 자연스럽고 간결한 등가어.
- source_word: σὺν
  english_pob_choice: together with
  chosen_korean: 와
  alternatives_korean:
  - 함께
  lexicon: BDAG
  rationale: σύν의 결속·동반 의미를 한국어 접속조사 「와」로 자연스럽게 옮기되 「모든 성도에게」로 묶어 동반을 드러낸다.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: our brother
  chosen_korean: 우리 형제
  alternatives_korean:
  - 그 형제
  lexicon: BDAG
  rationale: 헬라어는 정관사만 가지나, 한국어에서 「그 형제」는 어색하므로 영어 POB의 「our brother」를 따라 「우리 형제」로 옮긴다.
