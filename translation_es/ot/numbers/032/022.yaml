  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la secuencia condicional del hebreo, mantiene «Yahvé» para יְהוָה, y refleja bien el sentido de נְקִיִּים como liberación de responsabilidad. Sin embargo, hay un problema importante de ubicación de notas: la nota [a] está anclada a «Yahvé», pero su contenido comenta «libres de obligación / inocentes / sin culpa», no el nombre divino. La nota [b], en cambio, explica «Yahvé» pero está anclada a «Israel». También conviene ajustar «será sometida» a un presente más directo y natural en español, acorde con el valor resultativo/contextual del hebreo y del inglés POB.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero la frase mejora con «quede sometida» en lugar de «será sometida», y con una mejor colocación de las notas. «Libres de obligación para con Yahvé y para con Israel» es natural y fiel. La puntuación con punto y coma es aceptable.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» se conserva correctamente; no hay conflictos con otros términos doctrinales. La principal desalineación es técnica y editorial: las notas al pie están intercambiadas respecto de sus anclajes.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota [a] define una alternativa para נְקִיִּים («sin culpa / inocentes»), pero está colocada en «Yahvé». La nota [b] explica la transliteración de יְהוָה, pero está colocada en «Israel». Esto rompe la trazabilidad léxica requerida por el proyecto.
  - severity: medium
    issue: «será sometida» suena menos natural que una formulación subordinada/resultativa en contexto condicional.
    rationale: 'וְנִכְבְּשָׁה en esta estructura se entiende bien como resultado de la campaña: «cuando la tierra quede sometida» o «y la tierra quede sometida». «Será sometida» no es incorrecto, pero suena más rígido y menos idiomático aquí.'
  - severity: low
    issue: La nota sobre el nombre divino no necesita describirse como «se translitera aquí» si el texto principal ya usa «Yahvé».
    rationale: No es un error, pero una formulación más directa («Yahvé representa el nombre divino יְהוָה») suena más natural en español editorial.
