translation:
  language: es
  text: Y Moisés dio a la tribu de Gad, a los hijos de Gad[a], según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hijos/descendientes de Gad». El hebreo dice literalmente «hijos de Gad», una fórmula genealógica tribal estándar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - dio
  - entregó
  - asignó
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, נתן expresa el acto de dar o asignar una porción. «Dio» conserva la sencillez y naturalidad del hebreo sin introducir una interpretación más técnica de la que exige el texto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio estándar
  rationale: Nombre propio bíblico en su forma española habitual y ampliamente reconocible.
- source_word: לְמַטֵּה
  english_pob_choice: to the tribe of
  chosen_spanish: a la tribu de
  alternatives_spanish:
  - para la tribu de
  - a la vara de
  lexicon: HALOT
  rationale: En este contexto genealógico y territorial, מַטֶּה significa «tribu», no «vara». La preposición לְ se vierte naturalmente como «a» en el reparto de la heredad.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gad
  lexicon: Nombre propio estándar
  rationale: Transliteración estándar del nombre tribal.
- source_word: לִבְנֵי
  english_pob_choice: to the sons of
  chosen_spanish: a los hijos de
  alternatives_spanish:
  - a los hijos de
  - a los descendientes de
  - a los hijos/descendientes de
  lexicon: HALOT
  rationale: «Hijos de» reproduce el lenguaje genealógico masculino del hebreo. En español, «hijos» conserva mejor la forma del texto que una generalización como «descendientes».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en contextos tribales alude a divisiones de tipo clan/familia extensa. «Clanes» comunica bien esa unidad social en español bíblico contemporáneo; «según» refleja el valor distributivo de לְ.
translation_notes:
  revision_awareness: La traducción sigue el texto hebreo directamente y mantiene el patrón de reparto territorial observado en la edición inglesa POB. No se requieren revisiones textuales ni ajustes de sentido respecto del audit trail disponible.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución, ya que no aparece el Tetragrámaton en este versículo.
  - Se prefirió «tribu» frente a lecturas literales de מַטֶּה porque el contexto de reparto territorial lo exige claramente.
  - «Hijos» se conserva por fidelidad al hebreo; la nota ofrece la alternativa inclusiva/explicativa que el español puede sugerir.
  - «Clanes» se usa de modo consistente con el valor distributivo de לְמִשְׁפְּחֹתָם en fórmulas de asignación territorial.
