id: PS151.1.6
reference: Psalm 151 1:6
source:
  edition: lxx-swete-1909
  text: ἐξῆλθον εἰς συνάντησιν τῷ ἀλλοφύλῳ, καὶ ἐπικατηράσατό με ἐν τοῖς εἰδώλοις αὐτοῦ·
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: I went out to meet the foreigner[a], and he cursed me by his idols[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Philistine.” The Greek says “the foreigner/one of another people,” a term often used for Philistines in the Septuagint.
    reason: alternative_reading
  - marker: b
    text: Or, “he cursed me in the name of his idols.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, literally 'went/came out.' In English narrative, 'came out' works naturally with 'to meet me' and preserves the movement without overinterpreting direction.
- source_word: εἰς συνάντησιν
  chosen: to meet
  alternatives:
  - for an encounter with
  - to a meeting with
  lexicon: BDAG
  rationale: This idiom means going out for the purpose of meeting someone. 'To meet' is the most natural and accurate English rendering.
- source_word: τῷ ἀλλοφύλῳ
  chosen: the foreigner
  alternatives:
  - the Philistine
  - the man of another race/people
  lexicon: LSJ
  rationale: 'ἀλλόφυλος literally denotes one of another people/tribe, often used in the LXX for ''Philistine.'' Since the Greek here uses the broader term rather than a direct ethnic name, ''the foreigner'' preserves the wording of the source while fitting the singular dative after the meeting idiom. The appositional English reflects the sense in context: the one met is the foreign opponent.'
- source_word: ἐπικατηράσατό
  chosen: cursed
  alternatives:
  - called down curses on
  - utterly cursed
  lexicon: BDAG
  rationale: The verb means to invoke a curse against someone. 'Cursed' is concise and faithful; stronger expansions are possible but not required by the context.
- source_word: ἐν τοῖς εἰδώλοις αὐτοῦ
  chosen: by his idols
  alternatives:
  - in the name of his idols
  - with his idols
  lexicon: BDAG
  rationale: 'The phrase likely expresses instrument or sphere: the foreign opponent cursed David with reference to his idols, effectively invoking them. ''By his idols'' is compact English that preserves the idolatrous reference without adding words absent from the Greek; the more explicit ''in the name of his idols'' is preserved as an alternative.'
