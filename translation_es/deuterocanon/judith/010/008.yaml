revisions:
- from: 'Y les dijeron: «Que el Dios de nuestros padres te conceda favor[a], y lleve a cabo tus empresas[b] para gloria[c] de los hijos de Israel y exaltación de Jerusalén». Y ella se postró ante Dios[d].'
  to: 'Y le dijeron: «Que el Dios de nuestros padres te conceda favor[a], y lleve tus empeños[b] a término para gloria[c] de los hijos de Israel y exaltación de Jerusalén». Y ella se postró ante Dios[d].'
  rationale: Se corrige un error gramatical importante ('les' → 'le'), se reemplaza 'empresas' por 'empeños' para evitar un matiz comercial y acercarse mejor al sentido de ἐπιτηδεύματα, y se ajusta la nota sobre καύχημα para que describa con más precisión el valor léxico documentado. El resto del texto conserva fielmente la bendición y el gesto reverente final.
