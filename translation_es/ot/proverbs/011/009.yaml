translation:
  language: es
  text: Con su boca el hombre impío destruye a su prójimo[a]; pero mediante el conocimiento los justos son librados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hipócrita destruye a su prójimo con su boca». El hebreo puede denotar a una persona hipócrita, impía o irreligiosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los justos escapan mediante el conocimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶה
  english_pob_choice: With his mouth
  chosen_spanish: Con su boca
  alternatives_spanish:
  - Por su boca
  - Con la boca
  lexicon: HALOT
  rationale: La preposición ב expresa medio o instrumento. En español, «con su boca» conserva la imagen concreta de la boca como instrumento de daño y suena natural en registro sapiencial.
- source_word: חָנֵף
  english_pob_choice: the godless man
  chosen_spanish: el hombre impío
  alternatives_spanish:
  - el hipócrita
  - el hombre profano
  - el hombre malvado
  lexicon: HALOT
  rationale: El término puede abarcar hipócrita, impío o irreligioso. En Proverbios, el contraste con «los justos» favorece una carga moral-religiosa amplia; «impío» conserva esa amplitud sin reducirlo solo a falta de sinceridad exterior.
- source_word: יַשְׁחִת
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - corrompe
  - lleva a la ruina
  lexicon: HALOT
  rationale: El hiphil de שׁחת comunica destrucción o ruina. «Destruye» es directo, enérgico y mantiene la fuerza proverbial del verbo.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su amigo
  - a su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o prójimo. «Prójimo» funciona bien en español bíblico actual para el plano social-ético amplio del proverbio, sin exigir una relación íntima de amistad.
- source_word: וּבְדַעַת
  english_pob_choice: but by knowledge
  chosen_spanish: pero por el conocimiento
  alternatives_spanish:
  - pero mediante el conocimiento
  - pero por la sabiduría/conocimiento
  lexicon: HALOT
  rationale: La partícula ו marca contraste con el primer colon, y ב vuelve a indicar medio. «Conocimiento» preserva el término técnico sapiencial דַּעַת; «por el conocimiento» expresa bien el medio en español.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: El plural funciona sustantivamente. «Los justos» es la forma breve y natural en español, y mantiene la categoría ética central de Proverbios.
- source_word: יֵחָלֵצוּ
  english_pob_choice: are delivered
  chosen_spanish: son librados
  alternatives_spanish:
  - son rescatados
  - escapan
  - son liberados
  lexicon: HALOT
  rationale: 'El nifal de חלץ puede expresar ser librado o rescatado. «Son librados» preserva la pasiva/mediopasiva y deja abierta la relación exacta con el conocimiento: puede ser que los justos sean librados por el conocimiento o que el conocimiento sea su medio de salvación.'
theological_decisions:
- issue: Sentido de חָנֵף en contexto sapiencial
  english_pob_reading: the godless man rather than 'the hypocrite'
  chosen_spanish_reading: el hombre impío, en vez de «el hipócrita»
  alternative_spanish_readings:
  - el hipócrita
  - el hombre profano
  - el irreligioso
  rationale: El hebreo puede incluir hipocresía, pero el proverbio contrapone una figura moral y espiritualmente torcida con «los justos». «Impío» expresa mejor esa categoría amplia en español y evita limitar el término a mera incongruencia exterior.
  doctrine_reference: Translation philosophy §1, §4, §5
- issue: Relación sujeto-medio en el segundo colon
  english_pob_reading: '''the righteous are delivered'' as a general class statement'
  chosen_spanish_reading: «los justos son librados» como afirmación general del grupo
  alternative_spanish_readings:
  - el conocimiento libra a los justos
  - los justos escapan por el conocimiento
  rationale: La sintaxis hebrea toma naturalmente צַדִּיקִים como sujeto de יֵחָלֵצוּ. La traducción española conserva esa lectura principal, aunque «por el conocimiento» mantiene el matiz instrumental del medio.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios posteriores al pase de alta concordancia; se mantiene la solución aprobada por el auditor inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva «justos» para צַדִּיקִים y «conocimiento» para דַּעַת, coherentes con el léxico sapiencial del libro.
  - «Impío» se eligió para mantener la amplitud semántica documentada de חָנֵף sin introducir una lectura más estrecha que la del audit trail inglés.
