    issue: La nota [a] está anclada en «su padre» pero explica la expresión «durmió con sus padres».
    rationale: Las notas deben aparecer en la palabra o frase relevante. Tal como está, el lector puede pensar que la nota aclara «su padre» en vez del modismo funerario hebreo.
  - severity: low
    issue: La coma en «David, su padre» suena menos natural en español en esta fórmula.
    rationale: Aunque refleja la aposición hebrea, en español bíblico fluye mejor «la ciudad de David su padre» o una reformulación equivalente. La coma puede crear una pausa algo torpe sin aportar claridad.
  revised_spanish_text: Salomón durmió[a] con sus padres y fue sepultado en la ciudad de David su padre, y Roboam su hijo reinó en su lugar.
