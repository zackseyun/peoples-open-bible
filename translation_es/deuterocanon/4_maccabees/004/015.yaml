  - severity: low
    issue: Redacción de la nota al pie con comilla inicial sobrante
    rationale: La nota empieza con una comilla simple innecesaria antes de O, lo que afecta la presentación editorial aunque no el contenido.
  revised_spanish_text: Ahora bien, cuando murió el rey Seleuco, su hijo Antíoco Epífanes lo sucedió en el poder, un hombre orgulloso y formidable[a].
