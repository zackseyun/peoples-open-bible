    issue: Falta una nota léxica para «me ha engañado»
    rationale: La auditoría inglesa conserva una alternativa importante para הֵתֶל (‘has deceived me’ / ‘has tricked me’ / sentido de trato burlón o engañoso). El borrador español omite esa aclaración y en cambio añade una nota menos necesaria sobre «ha variado mi salario repetidas veces».
  - severity: medium
    issue: Las notas a y b están mal distribuidas respecto del contenido del POB
    rationale: En el inglés, una nota explica el modismo «ten times» y otra la alternativa léxica del verbo anterior. En el español, ambas notas quedaron ancladas a «diez veces», lo cual distorsiona qué palabra o frase está siendo explicada.
  - severity: high
