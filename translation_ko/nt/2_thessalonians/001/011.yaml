id: 2TH.1.11
reference: 2 Thessalonians 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς ὃ καὶ προσευχόμεθα πάντοτε περὶ ὑμῶν, ἵνα ὑμᾶς ἀξιώσῃ τῆς κλήσεως ὁ θεὸς ἡμῶν καὶ πληρώσῃ πᾶσαν εὐδοκίαν ἀγαθωσύνης καὶ ἔργον πίστεως ἐν δυνάμει,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/011.yaml
  text: To this end also we always pray for you[a], that our God may count you worthy of the calling and may fulfill every good resolve and work of faith with power[c][b],
translation:
  language: ko
  text: 이를 위해 우리도 여러분을 위하여 언제나 기도합니다. 우리 하나님께서 여러분을 그 부르심에 합당하게 여기시고, 선의 모든 좋은 뜻과 믿음의 일을 능력으로 이루시기를[a] 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「합당하게 만드시기를」. 헬라어 ἀξιόω는 「합당하게 여기다」 또는 「합당하게 만들다」 두 의미를 모두 가질 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: To this end
  chosen_korean: 이를 위해
  alternatives_korean:
  - 이러한 까닭으로
  - 그 목적을 위해
  lexicon: BDAG
  rationale: 앞 구절의 종말론적 목적을 가리키는 자연스러운 한국어 표현.
- source_word: προσευχόμεθα πάντοτε
  english_pob_choice: we always pray
  chosen_korean: 언제나 기도합니다
  alternatives_korean:
  - 항상 기도합니다
  - 늘 기도드립니다
  lexicon: BDAG
  rationale: 지속적 습관적 행위를 「언제나 기도합니다」로 자연스럽게 표현한다.
- source_word: ἀξιώσῃ
  english_pob_choice: may count ... worthy
  chosen_korean: 합당하게 여기시고
  alternatives_korean:
  - 합당하게 만드시고
  - 합당하다 여기시고
  lexicon: BDAG
  rationale: ἀξιόω는 두 의미를 가질 수 있으나, 인간의 공로로 자격을 획득하는 의미를 피하기 위해 「합당하게 여기다」의 평가적 의미를 우선한다.
- source_word: τῆς κλήσεως
  english_pob_choice: of the calling
  chosen_korean: 그 부르심에
  alternatives_korean:
  - 그 부름에
  lexicon: BDAG
  rationale: 헬라어에는 소유격 대명사가 없으나 정관사가 가리키는 「(이미 알려진) 그 신적 부르심」을 「그 부르심」으로 보존한다.
- source_word: πᾶσαν εὐδοκίαν ἀγαθωσύνης
  english_pob_choice: every good resolve
  chosen_korean: 선의 모든 좋은 뜻
  alternatives_korean:
  - 모든 선한 뜻
  - 선을 향한 모든 결심
  - 선에 대한 모든 호의
  lexicon: BDAG
  rationale: εὐδοκία는 「좋은 뜻/결심/호의」, ἀγαθωσύνη는 「선」. 두 명사의 속격 구조를 「선의 ~ 좋은 뜻」으로 보존하면서 자연성을 살린다.
- source_word: ἔργον πίστεως
  english_pob_choice: work of faith
  chosen_korean: 믿음의 일
  alternatives_korean:
  - 믿음에서 나오는 일
  - 믿음으로 하는 일
  lexicon: BDAG
  rationale: 바울적 정형 표현을 그대로 보존한다.
- source_word: ἐν δυνάμει
  english_pob_choice: with power
  chosen_korean: 능력으로
  alternatives_korean:
  - 능력 가운데
  - 권능으로
  lexicon: BDAG
  rationale: 도구적·영역적 의미를 「능력으로」로 자연스럽게 표현한다.
theological_decisions:
- issue: ἀξιώσῃ — 「합당하게 여기다」 또는 「합당하게 만들다」
  chosen_reading: 합당하게 여기시고
  alternative_readings:
  - 합당하게 만드시고
  rationale: 인간이 자기 공로로 자격을 세운다는 함의를 피하면서도, 하나님이 그들을 부르심에 합당한 자로 여기시기를 구하는 본문의 무게를 보존한다. 대안은 각주로 보존.
  doctrine_reference: 'Preserve theological tension'
- issue: πίστεως의 번역
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  rationale: 기본 번역은 「믿음」이며, 속격 구조의 음영을 좁히지 않는다.
  doctrine_reference: 'Contested terms: πίστις'
