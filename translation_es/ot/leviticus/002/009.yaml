translation:
  language: es
  text: Entonces el sacerdote levantará de la ofrenda de cereal su porción memorial y la quemará en el altar, una ofrenda de alimento[a], un aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una ofrenda hecha por fuego, un aroma agradable para Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵרִים
  english_pob_choice: shall lift up
  chosen_spanish: levantará
  alternatives_spanish:
  - tomará
  - alzará
  lexicon: HALOT
  rationale: El verbo tiene aquí un gesto ritual concreto de levantar o tomar una porción de la ofrenda para presentarla. 'Levantará' conserva esa acción sin volverla demasiado pesada en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En español culto, 'sacerdote' comunica bien el cargo cultual de כֹּהֵן. Se mantiene el referente sin introducir un matiz no presente en el hebreo.
- source_word: מִן הַמִּנְחָה
  english_pob_choice: from the grain offering
  chosen_spanish: de la ofrenda de cereal
  alternatives_spanish:
  - de la ofrenda de grano
  - de la ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en Levítico 2 designa la ofrenda cereal. 'Ofrenda de cereal' es claro en español y evita la ambigüedad de 'ofrenda de grano' en algunos registros.
- source_word: אַזְכָּרָתָהּ
  english_pob_choice: its memorial portion
  chosen_spanish: su porción memorial
  alternatives_spanish:
  - su porción para memorial
  - su memorial
  lexicon: HALOT
  rationale: El término no se refiere a toda la ofrenda, sino a la parte representativa que se quema como memorial delante de Dios. 'Porción memorial' conserva esa fuerza sacrificial y evita simplificarlo a un mero recuerdo mental.
- source_word: וְהִקְטִיר
  english_pob_choice: and burn it
  chosen_spanish: y la quemará
  alternatives_spanish:
  - y la ofrecerá en humo
  - y la hará subir en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר describe quemar sobre el altar con resultado de humo. 'Quemará' es natural en español y suficientemente preciso aquí.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: en el altar
  alternatives_spanish:
  - sobre el altar
  - en el altar
  lexicon: HALOT
  rationale: El hebreo con terminación direccional se expresa de manera idiomática en español con 'en el altar', que comunica adecuadamente el acto litúrgico.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda hecha por fuego
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: El hebreo conserva la categoría cultual tradicional de la ofrenda consumida por fuego. 'Hecha por fuego' mantiene esa relación sin recurrir a una paráfrasis más interpretativa como 'ofrenda de alimento'.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - aroma agradable
  lexicon: HALOT
  rationale: La expresión fija comunica aceptación cultual, no solo olor. 'Aroma agradable' conserva la imagen y evita sobreinterpretarla.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir יהוה como 'Yahvé' en el texto principal, evitando la sustitución por una mayúscula reverencial. 'Para' expresa correctamente la dirección cultual implícita en la fórmula.
theological_decisions:
- issue: Fórmula sacrificial אִשֵּׁה רֵיחַ נִיחֹחַ
  english_pob_reading: a food offering, a pleasing aroma to the LORD
  chosen_spanish_reading: una ofrenda hecha por fuego, aroma agradable para Yahvé
  alternative_spanish_readings:
  - una ofrenda por fuego, aroma agradable para Yahvé
  - una ofrenda hecha por fuego, un aroma agradable para Yahvé
  rationale: La fórmula debe conservar la categoría sacrificial y el motivo de aceptación. 'Hecha por fuego' mantiene la fuerza cultual de אִשֵּׁה, mientras que 'aroma agradable' reproduce el valor de aceptación sin convertirlo en una explicación doctrinal posterior.
  doctrine_reference: Translation philosophy §§1, 6; principio del proyecto sobre יהוה → Yahvé
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura estable del hebreo masorético y conserva el mismo contenido semántico que la revisión final inglesa, sin cambios relevantes en el análisis auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יהוה.
  - '''Ofrenda de cereal'' traduce מִנְחָה en su sentido específico de Levítico 2.'
  - '''Porción memorial'' preserva el carácter representativo de אַזְכָּרָה.'
  - '''Ofrenda hecha por fuego'' conserva la fórmula cultual sin reemplazarla por ''ofrenda de alimento''.'
  - '''Aroma agradable'' mantiene la imagen de aceptación cultual sin suavizarla en exceso.'
