  rationale: Se corrigió la gramática de la primera pregunta («¿De quién se burlan?»), se ajustó el primer sintagma familiar a «hijos de transgresión» para seguir más de cerca la decisión léxica auditada, y se refinó la dicción de las otras cláusulas para mayor naturalidad y mejor correspondencia con el hebreo y las notas inglesas.
