translation:
  language: es
  text: 'Y los hijos de Josías: el primogénito[a], Johanán; el segundo, Joacim; el tercero, Sedequías; el cuarto, Salum.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Salum suele identificarse con Joacaz en 2 Reyes 23:30–34 y Jeremías 22:11; aquí el cronista conserva el nombre Salum en la genealogía de Josías.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora, los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בְנֵי se entiende de manera natural como 'hijos de'. Se conserva la conjunción inicial con 'Y' para mantener el flujo enumerativo del hebreo sin añadir interpretación.
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josiah
  lexicon: Nombre propio hebreo
  rationale: En español bíblico, 'Josías' es la forma establecida y más readable para el rey de Judá, sin perder la identificación con el nombre hebreo.
- source_word: הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero
  - el mayor
  lexicon: HALOT
  rationale: '''Primogénito'' expresa de forma directa tanto el orden de nacimiento como el valor genealógico del término, y es el equivalente español más preciso y natural.'
- source_word: יוֹחָנָן
  english_pob_choice: Johanan
  chosen_spanish: Johanan
  alternatives_spanish:
  - Jehohanan
  lexicon: Nombre propio hebreo
  rationale: Se mantiene la transliteración convencional 'Johanan', ya que el texto hebreo presenta ese nombre propio y no un título o apelativo.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hijo
  lexicon: HALOT
  rationale: El ordinal se traduce de manera simple y exacta para conservar la secuencia de la lista sin explicitar 'hijo' de más.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Jehoiaquim
  alternatives_spanish:
  - Joaquim
  - Eliacim
  lexicon: Nombre propio hebreo
  rationale: La forma española tradicional y reconocible del nombre es 'Jehoiaquim'; se evita 'Eliacim' porque el hebreo aquí da Jehoiakim, no el nombre previo asociado a su ascenso al trono.
- source_word: הַשְּׁלִשִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hijo
  lexicon: HALOT
  rationale: Se conserva el ordinal en una forma breve y fiel al patrón enumerativo del hebreo.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedequías
  lexicon: Nombre propio hebreo
  rationale: '''Sedequías'' es la forma española estándar del nombre real hebreo; mantiene la identificación histórica y la fluidez en español.'
- source_word: הָרְבִיעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - el cuarto hijo
  lexicon: HALOT
  rationale: El ordinal se rinde literalmente para preservar la estructura genealógica del versículo.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Shallum
  alternatives_spanish:
  - Salum
  lexicon: Nombre propio hebreo
  rationale: Se conserva la forma 'Shallum' como transliteración coherente con el audit trail inglés y con el texto hebreo, evitando armonizar el nombre en el cuerpo principal.
theological_decisions:
- issue: Orden genealógico frente a armonización histórica
  english_pob_reading: Render the verse as a simple list of Josiah's sons in birth-order labels as given in the Hebrew text, without harmonizing to the better-known succession narratives.
  chosen_spanish_reading: Presentar el versículo como una lista genealógica sencilla de los hijos de Josías, con los ordinales tal como aparecen en el hebreo, sin reordenar los nombres para ajustarlos a los relatos históricos más conocidos.
  alternative_spanish_readings:
  - Reordenar o adaptar los nombres en el texto principal para acomodarlos a la secuencia de los reyes posteriores a Josías
  - Sustituir Shallum por el nombre equivalente de 2 Reyes y Jeremías en el texto principal
  rationale: El hebreo de Crónicas ofrece una enumeración genealógica con ordinales explícitos. La traducción debe conservar esa presentación, y cualquier tensión con 2 Reyes 23:30–34 o Jeremías 22:11 debe quedar para nota, no para alteración del texto principal.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: no se requerían cambios. Se mantuvo la estructura genealógica del hebreo y la nota cruzada sobre Shallum, conservando la tensión documentada sin armonización en el texto principal.'
  spanish_consistency_notes:
  - Se usó 'hijos de' para בְנֵי por el contexto genealógico inmediato.
  - Se mantuvieron nombres propios en formas españolas estándar cuando existen ('Josías', 'Jehoiaquim', 'Sedequías') y transliteración coherente cuando el audit trail la preserva ('Johanan', 'Shallum').
  - 'Los ordinales se tradujeron de manera uniforme: ''el primogénito'', ''el segundo'', ''el tercero'', ''el cuarto''.'
  - La nota al pie se ancla en 'primogénito' porque el texto inglés documenta la identificación de Shallum, no una cuestión del primer hijo en sí; el marcador remite al punto donde la lista introduce la primera denominación ordinal y evita duplicar notas.
