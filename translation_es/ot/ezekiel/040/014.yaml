translation:
  language: es
  text: Y él hizo los postes[a] de sesenta codos,[b] y el atrio llegaba hasta los postes de la puerta, todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de esta cláusula arquitectónica es incierto. 'Postes' también podría traducirse como 'jambas' o 'pilastras'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''Y él hizo los postes de sesenta codos, hasta el poste del atrio, la puerta todo alrededor''. La sintaxis hebrea de la segunda cláusula es oscura.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - fabricó
  - levantó
  lexicon: HALOT
  rationale: El verbo hebreo עשה es el verbo común 'hacer'. En este contexto arquitectónico, 'hizo' conserva la forma básica sin sobreinterpretar como 'midió'.
- source_word: אֵילִים
  english_pob_choice: the jambs
  chosen_spanish: los dinteles
  alternatives_spanish:
  - los jambas
  - los postes
  - los pilastras
  lexicon: HALOT
  rationale: El término arquitectónico es difícil. En español, 'dintel' puede servir como elemento estructural de abertura, aunque no agota la posible imagen de postes/proyecciones. Se evita 'pilastras' por ser más interpretativo y menos directo para el lector general.
- source_word: שִׁשִּׁים אַמָּה
  english_pob_choice: sixty cubits
  chosen_spanish: sesenta codos
  alternatives_spanish:
  - sesenta codos
  - sesenta medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos' para mantener el valor histórico y arquitectónico del texto.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y
  alternatives_spanish:
  - y hacia
  - y hasta
  lexicon: HALOT
  rationale: El enlace hebreo es sintácticamente difícil. 'Y' preserva la relación sin resolver de más la construcción.
- source_word: אֵיל
  english_pob_choice: the jamb
  chosen_spanish: los dinteles
  alternatives_spanish:
  - el dintel
  - el poste
  - la pilastra
  lexicon: HALOT
  rationale: Se mantiene la misma solución lexical que en la primera cláusula para conservar coherencia en la estructura arquitectónica.
- source_word: הֶחָצֵר
  english_pob_choice: the court
  chosen_spanish: la corte
  alternatives_spanish:
  - el atrio
  - el patio
  lexicon: HALOT
  rationale: '''Corte'' sigue la terminología arquitectónica/formal del español bíblico y refleja el espacio delimitado del templo; ''atrio'' es posible pero menos literal al lexema base.'
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta
  - la entrada
  lexicon: HALOT
  rationale: '''Puerta'' es la equivalencia más natural y clara en español para el elemento de acceso del recinto.'
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La duplicación intensifica la idea de circunferencia completa. 'Todo alrededor' reproduce bien ese énfasis en español.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que unificó el plural en la segunda cláusula ('jambs') y suavizó la sintaxis hacia una lectura más natural, manteniendo la ambigüedad arquitectónica donde el hebreo sigue siendo oscuro.
  spanish_consistency_notes:
  - Se mantuvo un solo término arquitectónico de forma coherente en ambas apariciones del hebreo אֵילִים / אֵיל.
  - Se preservó la unidad antigua 'codos' sin conversión métrica.
  - La cláusula final conserva la idea de extensión envolvente con 'todo alrededor', en línea con el hebreo duplicado סָבִיב סָבִיב.
