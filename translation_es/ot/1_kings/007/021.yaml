translation:
  language: es
  text: Erigió los pilares en el pórtico del templo[a]. Erigió el pilar derecho y le puso por nombre Jaquín; luego erigió el pilar izquierdo y le puso por nombre Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jaquín y Boaz son transliteraciones de los nombres hebreos de los pilares, no traducciones de sus posibles significados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: set up
  chosen_spanish: puso en pie
  alternatives_spanish:
  - erigió
  - levantó
  - puso
  lexicon: HALOT
  rationale: El verbo hebreo aquí expresa hacer que algo quede erguido o colocado en posición. «Puso en pie» conserva esa fuerza de colocación/erección y suena natural en español bíblico contemporáneo.
- source_word: הָעַמֻּדִים
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las columnas
  - los postes
  lexicon: HALOT
  rationale: En este contexto arquitectónico, «pilares» reproduce bien el sentido estructural de עַמּוּד y mantiene el tono concreto del pasaje.
- source_word: לְאֻלָם הַהֵיכָל
  english_pob_choice: at the portico of the temple
  chosen_spanish: junto al pórtico del templo
  alternatives_spanish:
  - en el pórtico del templo
  - para el pórtico del templo
  - ante el pórtico del templo
  lexicon: HALOT
  rationale: El לְ aquí se entiende locativamente en el contexto de instalación física; «junto al» comunica la ubicación sin forzar una preposición menos natural en español. «Pórtico» conserva el valor de אֻלָם como acceso o vestíbulo frontal.
- source_word: הָעַמּוּד הַיְמָנִי
  english_pob_choice: the right pillar
  chosen_spanish: el pilar derecho
  alternatives_spanish:
  - el pilar de la derecha
  - el pilar del lado derecho
  lexicon: HALOT
  rationale: «Derecho» refleja la orientación espacial de יְמָנִי de manera breve y paralela al miembro siguiente.
- source_word: וַיִּקְרָא אֶת שְׁמוֹ
  english_pob_choice: called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - lo nombró
  - le puso por nombre
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea más directamente que con una paráfrasis moderna, porque el texto enfatiza el acto de nombrar.
- source_word: יָכִין
  english_pob_choice: Jachin
  chosen_spanish: Jaquín
  alternatives_spanish:
  - Jaquín
  - Yaquín
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. «Jaquín» sigue la convención castellana más extendida y mantiene la correspondencia con la forma hebrea.
- source_word: הָעַמּוּד הַשְּׂמָאלִי
  english_pob_choice: the left pillar
  chosen_spanish: el pilar izquierdo
  alternatives_spanish:
  - el pilar de la izquierda
  - el pilar del lado izquierdo
  lexicon: HALOT
  rationale: «Izquierdo» conserva el paralelismo con «derecho» y traduce con precisión שְּׂמָאלִי.
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Boaz
  alternatives_spanish:
  - Boás
  - Boʽaz
  lexicon: HALOT
  rationale: Nombre propio transliterado; «Boaz» es la forma usual y reconoce la identidad nominal sin interpretarla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios; por ello el español sigue de cerca el audit trail de la POB inglesa, manteniendo la ubicación arquitectónica, la fórmula de nombramiento y la transliteración de los nombres propios sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene «puso en pie» para ambos verbos וַיָּקֶם por consistencia y para reflejar la repetición enfática del hebreo.
  - Se usa «pórtico» en singular porque el hebreo articula una sola ubicación frontal del templo.
  - Los nombres propios se ofrecen como «Jaquín» y «Boaz», con transliteración castellana estándar y sin traducir posibles significados.
