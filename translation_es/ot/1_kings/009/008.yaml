base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/008.yaml
  text: And this house will become a ruin[a]. Everyone who passes by it will be appalled and will whistle, and they will say[b], ‘Why has Yahweh done thus to this land and to this house?’
  footnotes:
