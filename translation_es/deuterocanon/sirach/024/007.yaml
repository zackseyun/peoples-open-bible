translation:
  language: es
  text: Entre todas estas busqué un lugar de descanso[a], y en la heredad de quién me alojaré[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reposo»; el sustantivo griego puede denotar descanso o reposo, pero aquí probablemente conserva el sentido de un lugar de descanso en paralelo con «me alojaré».
    reason: lexical_alternative
  - marker: b
    text: O «acamparé». El verbo griego puede referirse a alojarse o a acampar para pasar la noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τούτων πάντων
  english_pob_choice: Among all these
  chosen_spanish: Entre todas estas
  alternatives_spanish:
  - Entre todas ellas
  - Con todas estas
  lexicon: LSJ
  rationale: μετά con genitivo puede expresar relación distributiva o de compañía; en este contexto la voz poética de Sabiduría examina dentro de un conjunto de posibles ámbitos. «Entre todas estas» conserva esa idea de selección dentro del grupo y suena natural en español.
- source_word: ἀνάπαυσιν
  english_pob_choice: a resting place
  chosen_spanish: un lugar de descanso
  alternatives_spanish:
  - descanso
  - reposo
  lexicon: LSJ
  rationale: El sustantivo puede significar descanso o reposo, pero aquí está en paralelo con la pregunta sobre dónde alojarse. En español, «un lugar de descanso» mantiene la fuerza locativa que exige el contexto.
- source_word: ἐζήτησα
  english_pob_choice: I sought
  chosen_spanish: busqué
  alternatives_spanish:
  - quise encontrar
  - anduve buscando
  lexicon: LSJ
  rationale: ζητέω en pasado se expresa con un pretérito simple directo y claro. «Busqué» comunica la acción sin añadir matices no presentes en el griego.
- source_word: κληρονομίᾳ
  english_pob_choice: inheritance
  chosen_spanish: heredad
  alternatives_spanish:
  - herencia
  - posesión
  lexicon: LSJ
  rationale: Aunque «herencia» es posible, «heredad» reproduce mejor en español bíblico la idea de posesión asignada o porción heredada, conservando el matiz de lote o ámbito perteneciente a alguien.
- source_word: τίνος
  english_pob_choice: whose
  chosen_spanish: ¿en qué...
  alternatives_spanish:
  - ¿de quién...
  - ¿de quién será...?
  lexicon: LSJ
  rationale: El griego pregunta por el poseedor de la heredad. En español, la construcción natural es «¿en qué heredad...?», que deja implícita la pregunta posesiva sin forzar una formulación poco idiomática.
- source_word: αὐλισθήσομαι
  english_pob_choice: shall I lodge
  chosen_spanish: me alojaré
  alternatives_spanish:
  - acamparé
  - me quedaré
  lexicon: LSJ
  rationale: αὐλίζομαι puede referirse a alojarse o pasar la noche. «Me alojaré» es la equivalencia más natural y neutral en español; «acamparé» sería demasiado específico y militarizado para este contexto.
theological_decisions:
- issue: Sabiduría personificada buscando morada
  english_pob_reading: Render the verse straightforwardly as Wisdom seeking a resting place and asking in whose inheritance she will lodge, without importing later doctrinal identifications.
  chosen_spanish_reading: Presentar la frase como la voz personificada de la Sabiduría que busca un lugar de descanso y pregunta en qué heredad se alojará, sin identificarla prematuramente con una figura doctrinal posterior.
  alternative_spanish_readings:
  - Identificar explícitamente la heredad con Israel en el texto principal
  - Parafrasear la línea como aceptación entre los pueblos
  rationale: El griego presenta una pregunta literaria de Sabiduría personificada. La traducción debe preservar esa tensión y dejar que el contexto inmediato precise el sentido de la heredad, en vez de resolverlo anticipadamente.
  doctrine_reference: Preservar la tensión literaria y teológica del texto sapiencial.
translation_notes:
  revision_awareness: 'El borrador sigue el estado de alta concordancia del paquete fuente y conserva las dos ambigüedades léxicas principales señaladas por la auditoría inglesa: ἀνάπαυσιν y αὐλισθήσομαι. No se registraron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Heredad» se mantiene como término bíblico coherente con lenguaje de porción asignada.
  - La puntuación reproduce la pregunta doble del griego con una pausa fuerte antes de la segunda cláusula.
