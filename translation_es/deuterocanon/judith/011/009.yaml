translation:
  language: es
  text: Y ahora, en cuanto al asunto que Ajor habló en tu consejo, hemos oído sus palabras, porque los hombres de Betulia le perdonaron la vida[a], y él les informó de todo lo que había hablado en tu presencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo salvaron”; el verbo griego puede significar preservar, guardar o mantener con vida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “todo lo que había hablado de ti / junto a ti”; probablemente significa todo lo que había dicho en tu presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  english_pob_choice: matter
  chosen_spanish: asunto
  alternatives_spanish:
  - materia
  - tema
  - hecho
  lexicon: LSJ
  rationale: En este contexto λόγος no se limita a “palabra”, sino al contenido del discurso de Achior. “Asunto” comunica bien el tema o materia de la intervención sin sonar forzado en español.
- source_word: συνεδρείᾳ
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - asamblea
  - consejo deliberativo
  lexicon: LSJ
  rationale: La idea es la de una reunión deliberativa. “Consejo” es natural, formal y fiel al contexto narrativo.
- source_word: ἠκούσαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: LSJ
  rationale: El perfecto español conserva el resultado presente del acto de oír, como en la elección inglesa.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - declaraciones
  - dichos
  lexicon: LSJ
  rationale: “Palabras” mantiene el carácter verbal de lo que se escuchó y es el equivalente más directo y transparente.
- source_word: περιεποίησαντο
  english_pob_choice: spared
  chosen_spanish: lo preservaron
  alternatives_spanish:
  - lo salvaron
  - lo perdonaron
  - lo mantuvieron con vida
  lexicon: LSJ
  rationale: El verbo puede significar preservar, guardar o salvar. Aquí el contexto permite la idea de que no lo destruyeron, por eso “preservaron” refleja bien la tensión lexical sin imponer sólo “salvaron”.
- source_word: οἱ ἄνδρες Βαιτυλουά
  english_pob_choice: the men of Bethulia
  chosen_spanish: los hombres de Betulia
  alternatives_spanish:
  - los varones de Betulia
  - los habitantes varones de Betulia
  lexicon: LSJ
  rationale: Se conserva la referencia específica a los varones/defensores de la ciudad. “Hombres de Betulia” es idiomático y fiel.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: informó
  alternatives_spanish:
  - refirió
  - anunció
  - contó
  lexicon: LSJ
  rationale: El verbo implica transmitir un informe o relatar un contenido. “Informó” comunica esa función narrativa con claridad.
- source_word: πάντα ὅσα ἐξελάλησεν παρὰ σοί
  english_pob_choice: everything that he had spoken from you
  chosen_spanish: todo lo que había hablado ante ti
  alternatives_spanish:
  - todo lo que había dicho de tu parte
  - todo lo que había dicho en tu presencia
  - todo lo que había hablado junto a ti
  lexicon: LSJ
  rationale: La construcción griega con παρά + dativo apunta a cercanía/presencia en el habla; en español, “ante ti” preserva esa relación sin forzar “de tu parte”, que podría sugerir comisión o mandato.
theological_decisions:
- issue: 'Valor de περιεποίησαντο: preservar vs. salvar'
  english_pob_reading: the men of Bethulia spared him
  chosen_spanish_reading: los hombres de Betulia lo preservaron
  alternative_spanish_readings:
  - lo salvaron
  - lo mantuvieron con vida
  - lo perdonaron
  rationale: La escena indica que no lo mataron ni lo abandonaron, pero el verbo puede abarcar más que un simple “salvar”. “Preservaron” mantiene la amplitud semántica y deja abierta la alternativa documentada de “salvaron”.
  doctrine_reference: Ninguna; decisión léxica contextual.
- issue: Sentido de παρὰ σοί con ἐξελάλησεν
  english_pob_reading: everything that he had spoken from you
  chosen_spanish_reading: todo lo que había hablado ante ti
  alternative_spanish_readings:
  - todo lo que había dicho en tu presencia
  - todo lo que había hablado de tu parte
  rationale: La frase no exige que Achior haya hablado como enviado por Holofernes; más bien puede indicar lo dicho en su presencia. “Ante ti” conserva esa proximidad sin añadir un matiz de comisión no asegurado por el griego.
  doctrine_reference: Ninguna; decisión de alcance semántico.
translation_notes:
  revision_awareness: Se siguió el sentido causal de ὅτι reflejado en la revisión inglesa más reciente, usando “porque”. También se preservó la tensión lexical de περιεποίησαντο con una opción española amplia (“preservaron”) y la ambigüedad de παρὰ σοί con una formulación que no sobreinterpreta la relación espacial o de agencia.
  spanish_consistency_notes:
  - Se usó “Betulia” como transliteración estándar del topónimo Βαιτυλουά.
  - Se mantuvo el nombre propio “Achior” sin adaptar a forma hispana distinta, por consistencia con el audit trail.
  - Se prefirió “ante ti” en el cuerpo principal para representar la cercanía/presencia de παρὰ σοί sin cerrar el matiz interpretativo.
  - Se conservaron los marcadores de nota [a] y [b] exactamente en las frases a las que remiten.
