translation:
  language: es
  text: Porque desde lejos[a] verás la tierra, pero no entrarás en ella, en la tierra que yo doy a los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desde el lado opuesto” o “desde lejos”; la expresión hebrea indica que Moisés verá la tierra sin entrar en ella.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente se dice “los hijos de Israel” o “los israelitas”. El hebreo dice “los hijos de Israel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior. En español, «Porque» conserva la conexión causal/discursiva sin forzar una paráfrasis.
- source_word: מִנֶּגֶד
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a la distancia
  - desde enfrente
  - desde lejos
  lexicon: HALOT
  rationale: La expresión hebrea indica ver la tierra sin entrar en ella. «Desde lejos» comunica naturalmente esa distancia visual y conserva la idea de no llegar a cruzar al lugar visto.
- source_word: תִּרְאֶה
  english_pob_choice: you shall see
  chosen_spanish: verás
  alternatives_spanish:
  - verás
  - verás tú
  - verás con tus ojos
  lexicon: HALOT
  rationale: El imperfecto 2ms aquí tiene valor futuro/profético. «Verás» es directo, solemne y fiel al anuncio divino.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio se trata de la tierra prometida. «La tierra» es la forma más natural y teológicamente reconocible en español.
- source_word: וְשָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - ahí
  - hasta allí
  lexicon: HALOT
  rationale: El adverbio señala el lugar al que no llegará Moisés. «Allí» evita una repetición pesada y mantiene la dirección espacial.
- source_word: לֹא תָבֹא
  english_pob_choice: you shall not go
  chosen_spanish: no irás
  alternatives_spanish:
  - no entrarás
  - no llegarás
  - no irás
  lexicon: HALOT
  rationale: בוא puede ser ‘ir’, ‘venir’ o ‘entrar’. Dado que el siguiente miembro ya explicita el destino («a la tierra»), «no irás» preserva el flujo del hebreo sin redundancia excesiva.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - hacia la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: La preposición אֶל marca movimiento hacia el destino; en español, «a la tierra» transmite el acceso negado de manera natural. El contexto ya hace claro que la entrada queda prohibida.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  english_pob_choice: that I am giving
  chosen_spanish: que yo doy
  alternatives_spanish:
  - que yo estoy dando
  - que yo estoy dando ahora
  - que yo doy
  lexicon: HALOT
  rationale: El participio נֹתֵן presenta la acción divina como vigente o inminente. En español, «que yo doy» conserva esa vivacidad con mayor naturalidad que una perífrasis demasiado pesada.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los hijos de Israelitas
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene la designación literal del hebreo dentro de la convención bíblica española. «Hijos de Israel» es una forma estable y comprensible que conserva el matiz de designación pactual masculina del texto fuente.
theological_decisions:
- issue: Designación pactual masculina בְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los hijos de Israelitas
  - los israelitas
  rationale: El hebreo usa una fórmula masculina convencional para el pueblo del pacto. En español, «hijos de Israel» mantiene la literalidad y la carga histórica del giro sin neutralizarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje muestra alto acuerdo entre la auditoría inglesa y el chequeo cruzado, sin cambios necesarios.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo del hebreo: verás la tierra / no irás allí / a la tierra que yo doy.'
  - Se evitó «SEÑOR» y se traduce el nombre divino solo cuando aparece; en este versículo no aparece יהוה.
  - Se mantuvo un español sobrio y bíblico, sin reemplazar la designación pactual «hijos de Israel» por un equivalente más genérico.
