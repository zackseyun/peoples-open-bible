translation:
  language: es
  text: Y entre esas naciones no tendrás[a] reposo, ni habrá lugar de descanso para la planta de tu pie; y allí Yahvé te dará un corazón tembloroso, ojos que desfallecen[b], y angustia de alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no estarás en paz».
    reason: lexical_alternative
  - marker: b
    text: Lit. «desfallecimiento / consunción de ojos».
    reason: lexical_alternative
  - marker: c
    text: O «dolor de alma» o «tristeza de alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַרְגִּיעַ
  english_pob_choice: you will find no rest
  chosen_spanish: no tendrás reposo
  alternatives_spanish:
  - no estarás en paz
  - no tendrás descanso
  lexicon: HALOT
  rationale: El hiphil de רגע expresa el llegar a estar quieto o en reposo; en español, «no tendrás reposo» conserva la fuerza idiomática sin volverlo mecánico. «Reposo» mantiene el matiz de cese de agitación que el contexto de exilio requiere.
- source_word: מָנוֹחַ
  english_pob_choice: resting place
  chosen_spanish: lugar de descanso
  alternatives_spanish:
  - descanso
  - reposo
  lexicon: HALOT
  rationale: El sustantivo denota un lugar o estado de reposo. Con «para la planta de tu pie», «lugar de descanso» comunica bien la imagen concreta y sigue de cerca la estructura hebrea.
- source_word: לְכַף רַגְלֶךָ
  english_pob_choice: for the sole of your foot
  chosen_spanish: para la planta de tu pie
  alternatives_spanish:
  - para tu pie
  - para la suela de tu pie
  lexicon: HALOT
  rationale: כַּף רֶגֶל señala la parte inferior del pie; «planta» es la equivalencia natural y precisa en español, más clara que una traducción literal menos idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto pide conservar el nombre divino en forma transliterada. En español se adopta «Yahvé» como forma natural y ampliamente reconocible, manteniendo el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: לֵב רַגָּז
  english_pob_choice: a trembling heart
  chosen_spanish: un corazón tembloroso
  alternatives_spanish:
  - un corazón tembloroso y agitado
  - un corazón inquieto
  lexicon: HALOT
  rationale: רַגָּז expresa temblor, agitación y turbulencia interior. «Corazón tembloroso» conserva la imagen vívida y la carga emocional del pasaje.
- source_word: כִּלְיוֹן עֵינַיִם
  english_pob_choice: failing eyes
  chosen_spanish: ojos que desfallecen
  alternatives_spanish:
  - ojos que se consumen
  - ojos debilitados
  lexicon: HALOT
  rationale: כִּלְיוֹן tiene la idea de desgaste o consumirse. «Ojos que desfallecen» comunica en español la imagen de debilitamiento y agotamiento que la expresión hebrea transmite.
- source_word: דַּאֲבוֹן נָפֶשׁ
  english_pob_choice: anguish of soul
  chosen_spanish: angustia de alma
  alternatives_spanish:
  - dolor de alma
  - tristeza de alma
  - angustia del alma
  lexicon: HALOT
  rationale: דַּאֲבוֹן puede ser dolor, aflicción o angustia. «Angustia de alma» preserva la intensidad del término y mantiene נֶפֶשׁ como «alma», sin diluirlo en una emoción más leve.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Se conserva el nombre propio de Dios como transliteración, en armonía con la política del proyecto, evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la estructura y en las tres imágenes centrales: ausencia de reposo, corazón tembloroso, ojos que desfallecen y angustia del alma. La única adaptación principal es la forma española del nombre divino, conservada como transliteración reverente («Yahvé») acorde con la política terminológica del proyecto en español.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de los tres miembros finales con puntuación equivalente al inglés.
  - «Planta de tu pie» se eligió por naturalidad en español y por precisión anatómica.
  - No se suavizó la fuerza de la maldición; se conservaron imágenes corporales y afectivas concretas.
