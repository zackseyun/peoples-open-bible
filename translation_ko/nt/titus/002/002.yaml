id: TIT.2.2
reference: Titus 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πρεσβύτας νηφαλίους εἶναι, σεμνούς, σώφρονας, ὑγιαίνοντας τῇ πίστει, τῇ ἀγάπῃ, τῇ ὑπομονῇ.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/002.yaml
  text: Older men are to be temperate[a], dignified, self-controlled, sound in faith, in love, and in steadfastness.
  footnotes:
  - marker: a
    text: Or 'sound in faithfulness.' The Greek πίστις can mean either 'faith' or 'faithfulness' depending on context.
    reason: lexical_alternative
translation:
  language: ko
  text: 나이 많은 남자들은 절제하고, 품위 있고, 신중하며, 믿음[a]과 사랑과 인내에서 건전해야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함」. 헬라어 πίστις는 문맥에 따라 「믿음」 또는 「신실함」을 의미할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβύτας
  english_pob_choice: Older men
  chosen_korean: 나이 많은 남자들
  alternatives_korean:
  - 노인들
  - 연로한 남자들
  lexicon: BDAG
  rationale: "πρεσβύτης는 1:5의 πρεσβύτερος(장로)와 달리 단순히 나이 든 남자를 가리킨다. 「나이 많은 남자들」이 다음 절(πρεσβύτιδας: 나이 많은 여자들)과 짝지어 구분된다."
- source_word: νηφαλίους
  english_pob_choice: temperate
  chosen_korean: 절제하고
  alternatives_korean:
  - 술 취하지 않고
  - 정신을 차리고
  lexicon: BDAG
  rationale: νηφάλιος는 본래 「술 취하지 않은」 → 비유적으로 「분별 있는·절제하는」. 한국어 「절제」가 일반적이며 1:8의 ἐγκρατῆ(자제력)와 구분된다.
- source_word: σεμνούς
  english_pob_choice: dignified
  chosen_korean: 품위 있고
  alternatives_korean:
  - 위엄 있고
  - 진중하고
  lexicon: BDAG
  rationale: σεμνός는 존경받을 만한 품격. 「품위 있는」이 합쇼체와 어울린다.
- source_word: σώφρονας
  english_pob_choice: self-controlled
  chosen_korean: 신중하며
  alternatives_korean:
  - 분별 있고
  - 절제하며
  lexicon: BDAG
  rationale: 1:8과 일관되게 「신중하며」로 옮긴다.
- source_word: ὑγιαίνοντας τῇ πίστει, τῇ ἀγάπῃ, τῇ ὑπομονῇ
  english_pob_choice: sound in faith, in love, and in steadfastness
  chosen_korean: 믿음과 사랑과 인내에서 건전해야
  alternatives_korean:
  - 믿음과 사랑과 견딤에 있어 건강해야
  - 신실함과 사랑과 인내에 있어 건전해야
  lexicon: BDAG
  rationale: 세 가지 미덕을 자연스러운 한국어 「~과 ~과 ~에서」 구조로 묶는다. ὑπομονή의 「인내」가 정립된 한국어 등가어.
