base_translation:
  language: en
  yaml_path: translation/ot/numbers/026/054.yaml
  text: To the larger group you shall increase its inheritance[a], and to the smaller group you shall diminish its inheritance[b]; each one's inheritance shall be given according to those numbered of him.
  footnotes:
  - marker: a
    text: Hebrew 'each man' uses a masculine singular distributively; the sense is that each tribal group receives its inheritance in proportion to its census count.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to his numbered ones' / 'according to his census count.' The Hebrew phrase is concise and ties the allotment directly to the number counted.
    reason: lexical_alternative
