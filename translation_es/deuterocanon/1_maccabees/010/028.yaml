revisions:
- from: Y os devolveremos bienes por lo que hacéis con nosotros[a].
  to: Y les devolveremos cosas buenas por lo que hacen con nosotros[a].
  rationale: Se reemplaza «bienes» por «cosas buenas» para preservar el sentido amplio e inespecífico de ἀγαθὰ sin sugerir bienes materiales. También se ajusta «os/hacéis» a «les/hacen» para un español más neutral y ampliamente legible en América Latina. Se mantiene «con nosotros» y su nota porque refleja fielmente μεθʼ ἡμῶν y la racionalidad del English POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:11:37Z'
