  yaml_path: translation/deuterocanon/2_maccabees/007/023.yaml
  text: Therefore the Creator of the world[a], who formed the origin of man and devised the origin of all things, will in mercy give back to you both spirit and life[b], since you now disregard yourselves for the sake of his laws.
  footnotes:
  - marker: a
    text: Or 'spirit and life.' The Greek πνεῦμα can mean 'breath' or 'spirit'; here 'breath' was chosen because the context stresses God restoring life to the martyrs.
    reason: lexical_alternative
  - marker: b
    text: '''The origin of man'' uses the Greek singular ἀνθρώπου in a representative sense; the phrase refers broadly to human coming-into-being.'
    reason: cultural_note
