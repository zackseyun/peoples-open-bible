translation:
  language: es
  text: Solo cuídate y guárdate muy bien,[a] no sea que olvides las cosas que vieron tus ojos y no sea que se aparten de tu corazón[b] todos los días de tu vida. Da a conocerlas a tus hijos[c] y a los hijos de tus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''guarda tu נֶפֶשׁ''. Aquí puede referirse a ti mismo, a tu vida, o a tu persona entera; no necesariamente a un ''alma'' separada.'
    reason: theological_note
  - marker: b
    text: Hebreo 'tu corazón', que suele referirse a la persona interior, incluyendo memoria, entendimiento y voluntad.
    reason: cultural_note
  - marker: c
    text: O 'tus hijos e hijas' / 'tu descendencia'. El hebreo usa términos masculinos plurales que pueden referirse específicamente a hijos varones o más ampliamente a hijos/descendientes según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  lexicon: HALOT
  rationale: Expresa la restricción enfática inicial sin añadir matiz adversativo. En español, 'Solo' funciona de manera natural y breve para abrir la exhortación con énfasis.
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: guard yourself
  chosen_spanish: cuídate
  alternatives_spanish:
  - guárdate
  - ponte en guardia
  lexicon: HALOT
  rationale: El hebreo es una advertencia de vigilancia sobre uno mismo. 'Cuídate' conserva el sentido reflexivo de atención personal en un español claro y digno; 'guárdate' suena más duro y puede resultar menos natural en este contexto.
- source_word: וּשְׁמֹר נַפְשְׁךָ מְאֹד
  english_pob_choice: keep your soul very carefully
  chosen_spanish: guarda tu vida
  alternatives_spanish:
  - guarda tu alma
  - guarda tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la vida/la persona, no una división técnica del ser humano. 'Vida' evita imponer 'alma' como si el texto hablara de una parte separada, y 'con mucho esmero' refleja la intensidad de מְאֹד.
- source_word: פֶּן תִּשְׁכַּח
  english_pob_choice: lest you forget
  chosen_spanish: no sea que olvides
  alternatives_spanish:
  - para que no olvides
  - no olvides
  lexicon: HALOT
  rationale: La partícula פֶּן introduce una advertencia de posible consecuencia negativa. 'No sea que' reproduce bien ese matiz preveniente en español.
- source_word: הַדְּבָרִים אֲשֶׁר רָאוּ עֵינֶיךָ
  english_pob_choice: the things that your eyes saw
  chosen_spanish: las cosas que vieron tus ojos
  alternatives_spanish:
  - las cosas que tus ojos vieron
  - lo que viste con tus propios ojos
  lexicon: HALOT
  rationale: '''Cosas'' rinde bien דְּבָרִים en este contexto de experiencia visible. El orden ''vieron tus ojos'' conserva la fuerza hebrea de la percepción ocular como testimonio directo.'
- source_word: וּפֶן יָסוּרוּ מִלְּבָבְךָ
  english_pob_choice: and lest they depart from your heart
  chosen_spanish: y no sea que se aparten de tu corazón
  alternatives_spanish:
  - y no sea que se alejen de tu corazón
  - y no sea que salgan de tu corazón
  lexicon: HALOT
  rationale: '''Apartarse'' traduce היטבוּ? no, más precisamente סור con la imagen de desviarse/irse. ''Corazón'' mantiene la antropología bíblica del centro interior de memoria, voluntad y entendimiento; es la opción más transparente en español.'
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  lexicon: HALOT
  rationale: Es una fórmula idiomática hebrea que en español se entiende con naturalidad literal, sin necesidad de paráfrasis.
- source_word: וְהוֹדַעְתָּם
  english_pob_choice: Make them known
  chosen_spanish: Dá a conocerlas
  alternatives_spanish:
  - dáselas a conocer
  - hazlas saber
  lexicon: HALOT
  rationale: El Hifil de ידע significa hacer conocer/informar. 'Dá a conocerlas' mantiene el valor causativo y suena exhortativo en español contemporáneo.
- source_word: לְבָנֶיךָ וְלִבְנֵי בָנֶיךָ
  english_pob_choice: to your children and to your children's children
  chosen_spanish: a tus hijos y a los hijos de tus hijos
  alternatives_spanish:
  - a tus hijos y a tus nietos
  - a tus hijos y a tus descendientes
  lexicon: HALOT
  rationale: '''Hijos'' aquí puede funcionar de manera representativa para descendencia masculina y femenina según el contexto. ''Hijos de tus hijos'' conserva la estructura hebrea y el alcance intergeneracional sin estrecharlo a un solo término genealógico.'
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: rendered as 'your soul' in the latest English revision, but earlier audit recognized the whole person/self sense
  chosen_spanish_reading: '''tu vida'''
  alternative_spanish_readings:
  - '''tu alma'''
  - '''tu ser'''
  rationale: En este mandato, נֶפֶשׁ apunta a la vida/la persona entera. 'Tu vida' evita sugerir una antropología más técnica de la que el hebreo aquí exige, y mantiene la advertencia fuerte y comprensible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de בָנֶיךָ
  english_pob_reading: '''your children'' as a gender-accurate representative rendering'
  chosen_spanish_reading: '''tus hijos'' / ''los hijos de tus hijos'''
  alternative_spanish_readings:
  - '''tus niños'''
  - '''tus descendientes'''
  rationale: El hebreo usa masculino plural para descendencia, y el contexto es de transmisión pactal entre generaciones. En español, 'hijos' conserva la forma y la cadencia del paralelismo; no se reduce aquí a 'varones' porque el contexto es representativo.
  doctrine_reference: Translation philosophy §4
- issue: Advertencia con פֶּן
  english_pob_reading: '''lest'' as a negative warning/purpose clause'
  chosen_spanish_reading: '''no sea que'''
  alternative_spanish_readings:
  - '''para que no'''
  - '''no vayas a'''
  rationale: La construcción española 'no sea que' comunica con precisión la advertencia preventiva y conserva el tono solemne del texto hebreo.
  doctrine_reference: Hebrew discourse particle usage
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y toma en cuenta la auditoría inglesa más reciente, pero no depende mecánicamente de ella. Se conservaron: el énfasis inicial de רַק, la advertencia con פֶּן, la imagen del corazón como centro interior y la transmisión intergeneracional. Se ajustó נֶפֶשׁ a ''vida'' por claridad antropológica en español, y se mantuvo la forma hebrea de la descendencia con ''hijos de tus hijos''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' y no hay referencias al Tetragrámaton en este versículo.
  - '''Solo'' abre la exhortación con énfasis restrictivo sin añadir contraste.'
  - '''Corazón'' se usa en sentido bíblico de centro interior, no como mero sentimiento.'
  - '''Dá'' lleva tilde por ser imperativo afirmativo de ''dar''.'
  - Se evitó 'alma' para נֶפֶשׁ porque en español puede sonar más doctrinalmente cargado que el hebreo aquí.
