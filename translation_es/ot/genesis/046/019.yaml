translation:
  language: es
  text: 'Los hijos de Raquel, la esposa de Jacob: José y Benjamín.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los hijos
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, el hebreo בְּנֵי se refiere aquí a los hijos directos de Raquel. «Hijos de» conserva la relación genealógica más natural en español y evita ampliar indebidamente el sentido a «descendientes».
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rakel
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. «Raquel» es la forma natural y reconocible para el lector hispanohablante.
- source_word: אֵשֶׁת
  english_pob_choice: wife
  chosen_spanish: la esposa de
  alternatives_spanish:
  - la mujer de
  - la mujer
  lexicon: HALOT
  rationale: El sustantivo en constructo con Jacob exige una relación matrimonial. «Esposa» comunica con claridad el valor relacional de אֵשֶׁת sin perder precisión; «mujer» sería más ambiguo en español.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob’s
  chosen_spanish: Jacob
  alternatives_spanish:
  - de Jacob
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y la relación posesiva mediante la construcción española «la esposa de Jacob», que refleja adecuadamente la cadena constructa hebrea.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: HALOT
  rationale: Forma española bíblica estándar del nombre propio.
- source_word: וּ/בִנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - e Benjamín
  lexicon: HALOT
  rationale: Conjunción simple más nombre propio. «Y Benjamín» es la forma natural en español; no se requiere eufonía especial ante esta vocal inicial porque el uso corriente admite «y» antes de /b/.
translation_notes:
  revision_awareness: El texto inglés auditado presenta alta concordancia con la fuente hebrea y no requiere notas de variante ni ajustes doctrinales. La puntuación con dos puntos reproduce de manera natural la aposición explicativa del hebreo.
  spanish_consistency_notes:
  - 'Se siguió el patrón onomástico español estándar: Raquel, Jacob, José y Benjamín.'
  - Se prefirió «esposa» frente a «mujer» por claridad relacional en español y fidelidad al constructo hebreo.
  - No se añadieron notas al pie porque la línea hebrea y el acuerdo del audit trail no presentan variantes relevantes.
