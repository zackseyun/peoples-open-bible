revisions:
- from: Nos hemos vuelto huérfanos[a], sin padre; nuestras madres son como viudas.
  to: Hemos quedado huérfanos[a], sin padre; nuestras madres son como viudas.
  rationale: Se ajusta la expresión verbal para un español más natural sin perder el sentido resultativo del hebreo, y se mejora la nota alternativa para reflejar mejor la opción léxica documentada por el English POB en un español idiomático. La comparación 'como viudas' se mantiene intacta por fidelidad al prefijo comparativo כ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: יְתוֹמִים = ''huérfanos'', הָיִינוּ con sentido resultativo, אֵין אָב = ''sin padre'', y כְּאַלְמָנוֹת conserva correctamente la comparación ''como viudas''. La nota léxica para יְתוֹמִים también refleja la alternativa preservada por el English POB.'
  spanish_quality_summary: La frase es clara y fiel, pero 'Nos hemos vuelto huérfanos' suena algo menos natural y más reflexiva de lo necesario en español bíblico contemporáneo. 'Hemos quedado huérfanos' expresa mejor el estado resultante causado por la calamidad. Además, las alternativas internas 'padreless' deben corregirse, aunque no afectan el texto público. La nota 'O "sin padre"' funciona, pero 'sin padre' no es la mejor alternativa sustantiva en español; conviene alinearla con una formulación más idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Huérfanos', 'padre', 'nuestras madres' y 'como viudas' están bien alineados. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: '''Nos hemos vuelto huérfanos'' es menos natural que otras opciones españolas para un estado sufrido.'
    rationale: Aunque transmite el valor resultativo de הָיִינוּ, en español suena más idiomático 'hemos quedado huérfanos', especialmente en un lamento donde la condición sobreviene por una calamidad.
  - severity: low
    issue: La nota léxica 'O "sin padre"' no refleja la alternativa más natural en español.
    rationale: El English POB da 'fatherless' como alternativa. En español, 'sin padre' es comprensible, pero como alternativa léxica es más natural 'huérfanos de padre'.
  - severity: low
    issue: En las decisiones léxicas internas aparece 'padreless'.
    rationale: Es un error de forma en español/inglés mezclado. No exige adjudicación compleja, pero muestra necesidad de limpieza editorial.
  revised_spanish_text: Hemos quedado huérfanos[a], sin padre; nuestras madres son como viudas.
  revised_footnotes:
  - marker: a
    text: O 'huérfanos de padre'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión verbal para un español más natural sin perder el sentido resultativo del hebreo, y se mejora la nota alternativa para reflejar mejor la opción léxica documentada por el English POB en un español idiomático. La comparación 'como viudas' se mantiene intacta por fidelidad al prefijo comparativo כ.
