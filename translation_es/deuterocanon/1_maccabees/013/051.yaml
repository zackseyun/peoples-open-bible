revisions:
- from: Y entró en ella el día veintitrés del segundo mes[a], en el año ciento setenta y uno, con alabanza y palmas, y con cítaras[b], címbalos, liras, himnos y cantos, porque un gran enemigo había sido quebrantado de Israel.
  to: Y entró en ella el día veintitrés del segundo mes, en el año ciento setenta y uno, con alabanza y palmas, y con cítaras[a], címbalos, liras[b], himnos y cantos, porque un gran enemigo había sido aplastado de en medio de Israel.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a los instrumentos pertinentes en el texto. Se sustituyó «había sido quebrantado de Israel» por «había sido aplastado de en medio de Israel» para reflejar mejor el sentido de συνετρίβη y, especialmente, de ἐξ Ἰσραήλ como remoción desde dentro de Israel, con español natural y fiel. No se requiere adjudicación adicional porque son ajustes claros de fidelidad y legibilidad.
