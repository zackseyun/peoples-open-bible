translation:
  language: es
  text: entonces oirás desde el cielo[a], y perdonarás el pecado de tu pueblo Israel, y los harás volver a la tierra que les diste a ellos y a sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde los cielos». El hebreo usa la forma plural «cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: hear
  chosen_spanish: oirás
  alternatives_spanish:
  - escucharás
  - oirás y responderás
  lexicon: HALOT
  rationale: En este contexto de oración, שׁמע implica oír con atención y respuesta implícita. «Oirás» mantiene la naturalidad del español y conserva la relación semántica con el hebreo sin explicitar más de lo que el texto dice.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa plural, pero en español bíblico y actual «el cielo» funciona bien como la esfera de la presencia divina. Se mantiene la referencia al lugar/ámbito de escucha sin forzar una pluralidad que suena menos natural en español.
- source_word: סָלַחְתָּ
  english_pob_choice: forgive
  chosen_spanish: perdonarás
  alternatives_spanish:
  - absolverás
  - perdonarás
  lexicon: HALOT
  rationale: סלח es el verbo estándar para el perdón divino. «Perdonarás» es claro y fiel en español moderno.
- source_word: לְחַטַּאת
  english_pob_choice: the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - la culpa
  lexicon: HALOT
  rationale: El sustantivo singular funciona colectivamente para la culpa de Israel. «Pecado» es la correspondencia más transparente y usual en español para este uso.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - Israel, tu pueblo
  lexicon: HALOT
  rationale: 'Se preserva el orden natural en español y la doble identificación pactal: pertenencia («tu pueblo») y nombre propio («Israel»).'
- source_word: וַהֲשֵׁיבוֹתָם
  english_pob_choice: bring them back
  chosen_spanish: los traerás de vuelta
  alternatives_spanish:
  - los harás volver
  - los restaurarás
  lexicon: HALOT
  rationale: 'El hifil de שוב es causativo: Dios hace que regresen. «Los traerás de vuelta» preserva esa causalidad con un español natural y evita neutralizarlo en «restaurarás», que podría sonar más interpretativo.'
- source_word: אֶל הָאֲדָמָה
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra cultivable
  - al suelo
  lexicon: HALOT
  rationale: En este contexto nacional-pactual, אֲדָמָה apunta a la tierra dada a Israel, no al suelo físico. «La tierra» comunica esa referencia con claridad en español.
- source_word: אֲשֶׁר נָתַתָּה לָהֶם וְלַאֲבֹתֵיהֶם
  english_pob_choice: that you gave to them and to their fathers
  chosen_spanish: que tú les diste y a sus padres
  alternatives_spanish:
  - que tú les diste y a sus antepasados
  - que tú les diste y a sus padres
  lexicon: HALOT
  rationale: Se conserva la estructura doble de dativos y la referencia genealógico-pactual. «Padres» mantiene la forma del hebreo y la continuidad con el texto fuente; «antepasados» es una alternativa posible, pero menos literal.
theological_decisions:
- issue: Referencia de אֲבֹתֵיהֶם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo dice literalmente «sus padres». En la línea de la POB inglesa, se mantiene la formulación genealógica y pactual sin neutralizarla en el texto principal; la alternativa se reserva para una nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor de la petición verbal en תִּשְׁמַע
  english_pob_reading: then you will hear
  chosen_spanish_reading: entonces tú oirás
  alternative_spanish_readings:
  - entonces, oye
  - entonces oirás
  rationale: El imperfecto hebreo en contexto de oración admite valor futuro/volitivo. El español «oirás» conserva ese matiz sin transformar la frase en un imperativo no presente en el texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la corrección de una formulación torpe anterior hacia un futuro más natural, la decisión de traducir שׁמע como ‘hear’ en contexto de oración, el mantenimiento de ‘fathers’ frente a ‘ancestors’, y la lectura causal de שוב como ‘bring back’. La versión española sigue esas decisiones sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando aparece el nombre divino; aquí no ocurre.
  - «Tierra» se usa en sentido pactual/nacional, no como simple suelo.
  - La voz verbal española intenta conservar el valor futuro-volitivo del hebreo sin añadir elementos explicativos.
  - Se preserva «padres» en la nota para reflejar con precisión el hebreo y la preferencia del audit trail inglés.
