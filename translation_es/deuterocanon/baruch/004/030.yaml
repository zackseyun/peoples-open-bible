translation:
  language: es
  text: Ten ánimo[a], Jerusalén[b]; el que te puso nombre te consolará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten valor».'
    reason: lexical_alternative
