base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/020.yaml
  text: And Eli would bless Elkanah and his wife and say[b][a], “May Yahweh give you offspring by this woman in place of the petition that was asked for Yahweh.” Then they would go to his place.
  footnotes:
  - marker: a
    text: 'Hebrew: ''in place of the request/loan that she asked from the LORD.'' The wording echoes the root ''ask'' used repeatedly in the Samuel birth narrative and may allude specifically to Samuel as the child obtained by asking and then given to the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb in 'asked' is masculine singular, but the context points to Hannah as the one who asked for the child (see 1 Samuel 1:20, 27–28).
    reason: alternative_reading
