translation:
  language: es
  text: No hay paz,[a] dice Yahvé, para los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “bienestar” o “plenitud”. El hebreo שָׁלוֹם puede abarcar paz, bienestar y plenitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No habrá
  lexicon: HALOT
  rationale: La negación existencial hebrea se expresa de manera natural en español con 'No hay', que mantiene la idea de inexistencia sin cargar matices temporales ajenos al hebreo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia más concisa y común para שָׁלוֹם en este contexto profético. Otras posibilidades como ''bienestar'' o ''plenitud'' reflejan sentidos amplios, pero ampliarían más de lo que el enunciado breve permite.'
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - declara
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, la fórmula profética funciona como marco de cita vigente. En español, 'dice' conserva ese valor formular sin forzar pasado narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue la norma del proyecto para el Nombre divino, preservando la referencia del pacto y evitando el reemplazo por un título genérico.
- source_word: לָרְשָׁעִים
  english_pob_choice: for the wicked
  chosen_spanish: para los malvados
  alternatives_spanish:
  - para los impíos
  - a los malvados
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural sustantivado se refiere a personas moralmente perversas. 'Malvados' comunica bien el sentido y evita una connotación eclesiástica más técnica que 'impíos'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La lectura del texto fuente contiene explícitamente el Tetragrámaton. Se mantiene la forma del nombre divino conforme al estándar del proyecto, sin ocultarlo tras 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance semántico de שָׁלוֹם
  english_pob_reading: 'peace with note: peace, welfare, wholeness'
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - integridad
  rationale: En este versículo la declaración breve admite el sentido ampliado de שָׁלוֹם, pero el núcleo proclamativo en español queda mejor con 'paz'. Los matices adicionales se preservan en la nota.
  doctrine_reference: HALOT; English POB footnote a
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la auditoría inglesa y no presenta cambios posteriores en la revisión más reciente; la presente redacción sigue de cerca esa decisión, adaptándola a un español natural sin perder el alcance léxico de שָׁלוֹם ni la forma del Nombre divino.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para יְהוָה conforme al estándar del proyecto.
  - '''Malvados'' se eligió por naturalidad y claridad; ''impíos'' queda como alternativa válida pero más marcada en registro bíblico tradicional.'
  - La nota se ancla en 'paz' para conservar el matiz ampliado de שָׁלוֹם sin recargar el cuerpo principal.
