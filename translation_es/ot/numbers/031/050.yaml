translation:
  language: es
  text: 'Así hemos presentado la ofrenda de Yahvé: cada hombre lo que encontró—artículos de oro, brazaletes[a] y pulseras, anillos, pendientes y colgantes[b]—para hacer expiación por nosotros mismos[c] delante de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'tobilleras' para 'brazaletes' (אֶצְעָדָה).
    reason: lexical_alternative
  - marker: b
    text: El significado exacto de 'colgantes' (כוּמָז) es incierto; posibles traducciones incluyen 'collares', 'ornamentos' o 'anillos de nariz'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'por nuestras vidas' o 'por nuestras personas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּקְרֵב
  english_pob_choice: So we have brought near
  chosen_spanish: Así hemos traído cerca
  alternatives_spanish:
  - Así hemos presentado
  - Así hemos acercado
  lexicon: HALOT
  rationale: El verbo קרב en causativo conserva la idea de 'traer/poner cerca' en un contexto cultual. 'Hemos traído cerca' mantiene la imagen de la ofrenda sin volverla un mero 'presentar', y 'Así' refleja el waw narrativo con naturalidad en español.
- source_word: קָרְבַּן יְהוָה
  english_pob_choice: the LORD’s offering
  chosen_spanish: la ofrenda de Yahvé
  alternatives_spanish:
  - la ofrenda para Yahvé
  - la ofrenda de Yahvé
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda/presentación traída a Dios. Se conserva el poseído con 'de Yahvé' para mantener el vínculo directo con el nombre divino, sin reemplazarlo por una fórmula de ocultamiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto: transliterar el Tetragrámaton como ''Yahvé'', preservando el nombre propio divino en vez de sustituirlo por un título.'
- source_word: אִישׁ אֲשֶׁר מָצָא
  english_pob_choice: each man what he found
  chosen_spanish: cada hombre lo que encontró
  alternatives_spanish:
  - cada uno lo que encontró
  - cada hombre lo que había encontrado
  lexicon: HALOT
  rationale: Se conserva el valor distributivo de אִישׁ en su contexto masculino, con 'cada hombre'. 'Lo que encontró' traduce la cláusula relativa de forma directa y natural.
- source_word: כְלִי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - objetos de oro
  - piezas de oro
  - ornamentos de oro
  lexicon: HALOT
  rationale: כְלִי es un término amplio para objeto/artefacto. 'Artículos de oro' reproduce esa amplitud sin estrechar prematuramente el término a una clase específica de joyas.
- source_word: אֶצְעָדָה
  english_pob_choice: armlets
  chosen_spanish: brazaletes
  alternatives_spanish:
  - brazaletes de brazo
  - tobilleras
  - armillas
  lexicon: HALOT
  rationale: El término puede referir un adorno para la extremidad; 'brazaletes' es una solución clara y comprensible en español, aunque la posibilidad de 'tobilleras' queda abierta como alternativa léxica.
- source_word: צָמִיד
  english_pob_choice: bracelets
  chosen_spanish: pulseras
  alternatives_spanish:
  - brazaletes
  - manillas
  lexicon: HALOT
  rationale: Se opta por 'pulseras' porque en español distingue bien el adorno de muñeca y fluye con la lista de joyas. 'Brazaletes' sigue siendo posible, pero sería más amplio y menos diferenciado aquí.
- source_word: טַבַּעַת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - sortijas
  lexicon: HALOT
  rationale: El hebreo no exige 'anillo de sello'; 'anillos' es la equivalencia directa y coincide con la revisión inglesa más reciente, que prefirió 'rings' por precisión.
- source_word: עָגִיל
  english_pob_choice: earrings
  chosen_spanish: pendientes
  alternatives_spanish:
  - aretes
  - aros
  lexicon: HALOT
  rationale: '''Pendientes'' es un equivalente transparente y natural en español para un adorno de la oreja. Se evita forzar un término más específico que el texto no requiere.'
- source_word: כוּמָז
  english_pob_choice: pendants
  chosen_spanish: colgantes
  alternatives_spanish:
  - pendientes colgantes
  - collares
  - ornamentos
  lexicon: HALOT
  rationale: El objeto exacto es incierto; 'colgantes' mantiene la cautela del hebreo y de la tradición auditada inglesa al no precisar de más. La ambigüedad se conserva sin perder legibilidad.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer atonamiento
  - para expiar
  lexicon: HALOT
  rationale: '''Hacer expiación'' preserva el peso cultual de כפר en un registro bíblico claro para el español. ''Expiación'' es preferible aquí a un giro más genérico, porque el contexto sacrificial es explícito.'
- source_word: עַל נַפְשֹׁתֵינוּ
  english_pob_choice: for ourselves
  chosen_spanish: por nosotros mismos
  alternatives_spanish:
  - por nuestras vidas
  - por nuestras personas
  - por nuestras almas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'por nuestras vidas/personas'. 'Por nosotros mismos' comunica bien el valor idiomático del sustantivo נֶפֶשׁ sin introducir una antropología ajena al pasaje.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Delante de Yahvé'' conserva el modismo espacial-jurídico del hebreo, con un español sobrio y bíblico. Refleja la relación cultual sin necesidad de explicitar más de lo que el texto dice.'
theological_decisions:
- issue: La relación entre la ofrenda y la expiación
  english_pob_reading: The gift is presented as an offering associated with making atonement for the men before the LORD.
  chosen_spanish_reading: La ofrenda se presenta como vinculada a una expiación realizada por los hombres delante de Yahvé.
  alternative_spanish_readings:
  - La ofrenda es solo un regalo de gratitud sin sentido expiatorio
  - La frase significa únicamente apartar el peligro sin matiz cultual
  rationale: El texto nombra explícitamente קָרְבָּן y לְכַפֵּר, por lo que la traducción debe conservar el lenguaje sacrificial y expiatorio. No se debe diluir en una mera gratitud general ni en una explicación no cultual que el hebreo no exige.
  doctrine_reference: Pentateuco sacrificial; cf. Levítico 16; Números 8:12
- issue: Valor distributivo y masculino de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: En este contexto, el singular masculino es distributivo y apunta a los varones que regresan de la campaña. Mantener 'cada hombre' respeta la referencia del texto sin neutralizar el género donde el hebreo lo marca.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'signet' de 'signet rings' y dejó simplemente 'rings'. En consonancia, la versión española usa 'anillos' y evita especificar más de lo que el hebreo requiere. También se mantiene la cautela respecto de כוּמָז, cuya identificación exacta sigue incierta.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el registro cultual con 'ofrenda', 'hacer expiación' y 'delante de Yahvé'.
  - La lista de objetos se traduce con términos comunes y distinguibles en español para evitar ambigüedad innecesaria.
  - No se añaden notas al pie porque el texto español ya incorpora la cautela léxica necesaria y no requiere marcadores textuales explícitos.
