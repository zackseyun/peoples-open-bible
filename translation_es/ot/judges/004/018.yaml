base_translation:
  language: en
  yaml_path: translation/ot/judges/004/018.yaml
  text: Jael went out to meet Sisera and said to him[a], “Turn aside, my lord, turn aside to me; do not be afraid.” So he turned aside to her into the tent[b], and she covered him with a blanket.
  footnotes:
  - marker: a
    text: Or “Come in, my lord, come in to me.” The Hebrew verb literally means “turn aside,” preserving the image of leaving one’s path to enter shelter.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may also refer to a rug or other covering cloth.
    reason: lexical_alternative
