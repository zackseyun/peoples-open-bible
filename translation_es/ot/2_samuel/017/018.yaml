translation:
  language: es
  text: Pero un joven los vio y le informó a Absalón[a]; entonces los dos se fueron rápidamente y llegaron a la casa de un hombre en Bahurim, que tenía un pozo en su patio, y descendieron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajaron dentro de él», es decir, dentro del pozo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - muchacho joven
  - sirviente
  lexicon: HALOT
  rationale: נַעַר puede referirse a un muchacho, joven o sirviente; aquí el personaje observa, avisa y actúa con independencia. En español, «joven» comunica bien la edad aproximada sin imponer una lectura de estatus como «sirviente».
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo informó
  alternatives_spanish:
  - se lo contó
  - lo notificó
  - lo comunicó
  lexicon: HALOT
  rationale: El hifil de נגד significa dar aviso, contar o informar. «Se lo informó» preserva el sentido de comunicación dirigida a Absalón y suena natural en español actual.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: HALOT
  rationale: El hebreo enfatiza explícitamente la dualidad. «Los dos» es directo y conserva esa precisión sin sonar pesado.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - apresuradamente
  - en seguida
  lexicon: HALOT
  rationale: El término expresa prisa o rapidez. «Rápidamente» mantiene el valor adverbial con buena fluidez en español.
- source_word: בֵּית אִישׁ
  english_pob_choice: the house of a man
  chosen_spanish: la casa de un hombre
  alternatives_spanish:
  - la casa de un varón
  - la casa de un hombre cualquiera
  lexicon: HALOT
  rationale: La construcción hebrea es sencilla y descriptiva. «La casa de un hombre» conserva la forma básica y el valor indefinido del original.
- source_word: בְּבַחוּרִים
  english_pob_choice: in Bahurim
  chosen_spanish: en Bahurim
  alternatives_spanish:
  - a Bahurim
  - en la aldea de Bahurim
  lexicon: HALOT
  rationale: Es un topónimo transliterado. «En Bahurim» es la equivalencia locativa natural en español.
- source_word: בְאֵר
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  - fuente
  - aljibe
  lexicon: HALOT
  rationale: בְאֵר normalmente designa un pozo. «Pozo» es la opción más clara y congruente con el contexto inmediato, donde luego se habla de descender allí.
- source_word: בַּחֲצֵרוֹ
  english_pob_choice: in his courtyard
  chosen_spanish: en su patio
  alternatives_spanish:
  - en su patio interior
  - en su corral
  - en su cortile
  lexicon: HALOT
  rationale: חָצֵר puede referirse a un patio o recinto alrededor de la casa. «Patio» comunica bien la idea en español moderno y conserva la relación espacial con la vivienda.
- source_word: וַיֵּרְדוּ שָׁם
  english_pob_choice: they went down there
  chosen_spanish: descendieron allí
  alternatives_spanish:
  - bajaron allí
  - bajaron a él
  - descendieron al pozo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «bajaron allí». «Descendieron allí» conserva el movimiento hacia abajo y deja que el contexto inmediato precise el destino implícito.
translation_notes:
  revision_awareness: 'Se revisó el ritmo narrativo para mantener la secuencia hebrea: observación, informe, marcha rápida, llegada, descripción del lugar y descenso. No se introdujeron elementos explicativos fuera del contexto inmediato; el destino implícito de «allí» queda aclarado por la nota, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Bahurim» como topónimo transliterado.
  - Se prefirió «pozo» para בְאֵר, en coherencia con el contexto y la nota alternativa sobre el descenso.
  - Se usó un estilo narrativo sobrio y directo, adecuado para prosa bíblica en español contemporáneo.
  - «Absalón» se conserva sin artículo, conforme al uso normal de nombres propios bíblicos en español.
