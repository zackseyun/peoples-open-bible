lexical_decisions:
- source_word: ⲡϩⲟ ⲙⲡⲕⲁϩ
  chosen: beneath the earth
  alternatives:
  - under the earth
  - the lower part of the earth
  - underworld
  lexicon: Crum, Coptic Dictionary (general sense)
  rationale: ⲡϩⲟ functions as a nominalized “below/under,” governing the genitive
    ⲙⲡⲕⲁϩ “of the earth.” Rendered as a prepositional phrase for readability while
    preserving the locative sense without importing the mythic baggage of “underworld.”
- source_word: ⲉⲧⲛⲟⲩϫⲉ
  chosen: they ascend
  alternatives:
  - they go up
  - they rise
  lexicon: Crum (verb for upward motion)
  rationale: Maintains the explicit upward motion; “ascend” preserves the directional
    nuance and Thunder’s elevated diction.
- source_word: ⲙⲙⲟⲥ
  chosen: to me
  alternatives:
  - toward me
  - unto me
  lexicon: Sahidic pronominal object morphology
  rationale: Direct object with 1st person singular suffix; “to me” renders the dative/goal
    nuance in English idiom.
- source_word: ⲉⲃⲟⲗ ϩⲓϫⲙ
  chosen: from
  alternatives:
  - out from
  - from upon
  lexicon: Crum (prepositional cluster)
  rationale: The compound literally reads “out from upon”; in English this compresses
    to “from” without loss of source sense. The fuller nuance is noted in the alignment
    note.
- source_word: ⲕⲁϩ
  chosen: earth
  alternatives:
  - land
  - ground
  lexicon: Crum
  rationale: Context favors the broader cosmological “earth,” not mere soil or land
    parcel.
