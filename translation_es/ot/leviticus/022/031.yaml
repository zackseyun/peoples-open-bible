    rationale: 'El hebreo coordina dos verbos distintos: שׁמר y עשה. El inglés auditado preserva esa dualidad con «keep ... and do them». En español, «cumplir» se acerca demasiado a «guardar» y reduce la fuerza concreta de «hacerlos».'
  - severity: low
