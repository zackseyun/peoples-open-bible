translation:
  language: es
  text: Hijo de ser humano[a], pon tu rostro hacia los hijos de Amón y profetiza contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "los amonitas". Hebreo: "los hijos de Amón".'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo בן־אדם que el POB mantiene de forma consistente en Ezequiel. 'Hijo de hombre' es la equivalencia más transparente en español y preserva la carga literaria y profética del vocativo.
- source_word: שִׂים פָּנֶיךָ
  english_pob_choice: set your face
  chosen_spanish: pon tu rostro
  alternatives_spanish:
  - dirige tu rostro
  - fija tu rostro
  lexicon: HALOT
  rationale: '''Pon'' reproduce bien el imperativo de שׂים y ''tu rostro'' mantiene la imagen corporal del hebreo פָּנֶיךָ. En español, ''poner el rostro hacia'' suena natural y conserva la fuerza idiomática sin suavizarla en exceso.'
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - contra
  - a
  lexicon: HALOT
  rationale: '''Hacia'' corresponde al valor básico de אֶל y evita introducir la hostilidad demasiado pronto; esa orientación adversativa queda explicitada por la cláusula siguiente, igual que en el inglés auditado.'
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la forma literal 'hijos de Amón' para reflejar la expresión hebrea y su textura genealógica. 'Amonitas' es más idiomático, pero menos transparente frente al texto fuente.
- source_word: וְהִנָּבֵא
  english_pob_choice: and prophesy
  chosen_spanish: y profetiza
  alternatives_spanish:
  - y habla proféticamente
  - y anuncia como profeta
  lexicon: HALOT
  rationale: El imperativo de נבא se vierte con el verbo directo 'profetiza', que es claro, exacto y suficientemente solemne en español.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - acerca de ellos
  - sobre ellos
  lexicon: HALOT
  rationale: En contexto oracular de juicio, על adquiere sentido adversativo. 'Contra ellos' reproduce esa orientación hostil de manera natural en español.
theological_decisions:
- issue: Vocativo profético בן־אדם en Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: Se mantiene el título/vocativo tradicional del libro para no perder la repetición estructural y la tensión literaria del hebreo. Aunque 'mortal' explica el sentido general, atenúa la forma idiomática que el POB quiere preservar.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave y fidelidad a la forma fuente cuando es teológicamente/literariamente relevante.'
- issue: Relación entre אֶל y עֲלֵיהֶם en una orden profética de juicio
  english_pob_reading: toward ... against them
  chosen_spanish_reading: hacia ... contra ellos
  alternative_spanish_readings:
  - a ... acerca de ellos
  - contra ... acerca de ellos
  rationale: 'Se conserva la progresión semántica: primero la orientación del gesto profético y luego la dirección adversativa del mensaje. Eso evita cargar ''hacia'' con un valor hostil que el hebreo no expresa aún en la primera mitad.'
  doctrine_reference: 'DOCTRINE.md: atención al contexto y a la distinción de matices léxicos.'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; la versión española sigue de cerca sus decisiones léxicas principales y mantiene la misma distinción entre la orientación inicial ('hacia') y la hostilidad explícita ('contra').
  spanish_consistency_notes:
  - Se conserva la fórmula profética 'Hijo de hombre' para mantener coherencia con Ezequiel en todo el libro.
  - Se traduce בְּנֵי עַמּוֹן literalmente como 'los hijos de Amón' para reflejar la textura del hebreo; la nota ofrece la alternativa idiomática 'los amonitas'.
  - '''Profetiza contra ellos'' sigue el valor adversativo contextual de על sin desplazarlo al inicio de la frase.'
  - Se usa 'rostro' para פָּנִים, manteniendo la imaginería corporal hebrea en lugar de sustituirla por 'gaze' o 'atención'.
