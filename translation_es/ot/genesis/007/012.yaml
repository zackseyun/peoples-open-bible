  to: Y hubo lluvia sobre la tierra cuarenta días y cuarenta noches[a].
  rationale: Se reemplaza «estuvo» por «hubo lluvia» para lograr un español más natural sin apartarse del hebreo narrativo וַיְהִי. También se corrige la nota para ofrecer una alternativa real y explicar mejor la decisión lexical.
