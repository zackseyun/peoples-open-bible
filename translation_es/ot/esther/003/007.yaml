  language: en
  yaml_path: translation/ot/esther/003/007.yaml
  text: In the first month[a], that is, the month of Nisan, in the twelfth year of King Ahasuerus, Pur—that is, the lot—was cast before Haman, from day to day and from month to month, until the twelfth month, that is, the month of Adar.
  footnotes:
