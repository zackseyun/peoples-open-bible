translation:
  language: es
  text: 'Pero él le dijo: «Por favor, mi señor[a], ¿cómo podré salvar a Israel? Mira, mi clan[b] es el más débil[c] en Manasés, y yo soy el más joven en la casa de mi padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Señor»; el hebreo puede funcionar como tratamiento respetuoso hacia un interlocutor humano, sin decidir aquí plenamente su identidad.'
    reason: theological_note
  - marker: b
    text: 'O: «mi grupo familiar»; literalmente, «mi mil». El término hebreo puede referirse a una división de clan.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el más pobre» o «el menos importante» en Manasés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Perdona
  lexicon: HALOT
  rationale: Es una partícula de súplica cortés; en español, «Por favor» comunica ruego respetuoso y mantiene el tono deferente de la petición.
- source_word: אֲדֹנָי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - Señor
  - señor
  lexicon: HALOT
  rationale: Aquí se trata de un trato respetuoso hacia el interlocutor inmediato. «Mi señor» conserva la ambigüedad narrativa sin convertirlo prematuramente en título divino.
- source_word: בַּמָּה
  english_pob_choice: how can
  chosen_spanish: ¿cómo podré
  alternatives_spanish:
  - ¿por qué medio podré?
  - ¿de qué manera podré?
  lexicon: HALOT
  rationale: 'La pregunta es idiomática: pide el medio o posibilidad de la acción. En español, «¿cómo podré?» suena natural y conserva la fuerza interrogativa.'
- source_word: אוֹשִׁיעַ
  english_pob_choice: I save
  chosen_spanish: salvar
  alternatives_spanish:
  - librar
  - rescatar
  lexicon: HALOT
  rationale: El verbo hiphil de יָשַׁע tiene el sentido de salvar/liberar. «Salvar» es la opción más amplia y habitual, sin perder el valor de liberación del contexto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  lexicon: HALOT
  rationale: Introduce una observación que apoya la objeción de Gedeón. «Mira» reproduce el deíctico con naturalidad en español actual.
- source_word: אַלְפִּי
  english_pob_choice: my clan
  chosen_spanish: mi clan
  alternatives_spanish:
  - mi mil
  - mi familia extensa
  lexicon: HALOT
  rationale: Aunque literalmente relacionado con «mil», aquí designa una división social/tribal. «Clan» preserva la función social sin confundir al lector con un literalismo engañoso.
- source_word: הַדַּל
  english_pob_choice: the weakest
  chosen_spanish: el más débil
  alternatives_spanish:
  - el más pobre
  - el más pequeño
  lexicon: HALOT
  rationale: En este contexto el término expresa inferioridad o insignificancia social. «El más débil» recoge esa idea con buena naturalidad en español.
- source_word: בִּמְנַשֶּׁה
  english_pob_choice: in Manasseh
  chosen_spanish: en Manasés
  alternatives_spanish:
  - dentro de Manasés
  lexicon: HALOT
  rationale: Nombre propio tribal; se mantiene la forma española usual del topónimo bíblico.
- source_word: הַצָּעִיר
  english_pob_choice: the youngest
  chosen_spanish: el más joven
  alternatives_spanish:
  - el menor
  - el más pequeño
  lexicon: HALOT
  rationale: En el marco de la casa paterna, la idea principal es la menor edad/jerarquía familiar. «El más joven» expresa eso de modo claro y natural.
- source_word: בְּבֵית אָבִי
  english_pob_choice: in my father’s house
  chosen_spanish: en la casa de mi padre
  alternatives_spanish:
  - en la casa paterna
  - en el hogar de mi padre
  lexicon: HALOT
  rationale: Es una expresión hebrea para el núcleo familiar/household. «Casa de mi padre» mantiene la formulación bíblica sin volverse arcaica.
theological_decisions:
- issue: Valor de אֲדֹנָי en el diálogo
  english_pob_reading: Respectful human-style address, preserving narrative tension
  chosen_spanish_reading: «mi señor» en minúsculas, como tratamiento respetuoso al interlocutor
  alternative_spanish_readings:
  - «Señor» con mayúscula
  - «Señor mío»
  rationale: La escena todavía mantiene la tensión narrativa sobre la identidad del interlocutor. La minúscula evita resolver de antemano si se trata de un título divino o de respeto humano.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el contexto no la resuelve.'
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en mantener la ambigüedad de אֲדֹנָי, traducir בִּי como súplica cortés, y tomar אַלְפִּי como «clan» en sentido social. La revisión más reciente no introdujo cambios, y esta propuesta sigue esa lectura estable.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología por defecto del proyecto, pero este versículo no la contiene.
  - Se usa «Manasés» para el nombre tribal conforme al uso bíblico español estándar.
  - «Salvar» se mantiene para coherencia con otros pasajes donde יָשַׁע expresa liberación/salvación.
  - Las comillas y el tratamiento de la cita siguen el registro bíblico en español moderno.
