translation:
  language: es
  text: Y darás a los levitas a Aarón y a sus hijos; ellos han sido enteramente dados[a] a él, de entre los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dados, dados» o «ciertamente dados»; la repetición expresa énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O «de entre los israelitas». Hebreo: «de entre los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: You shall give
  chosen_spanish: darás
  alternatives_spanish:
  - y darás
  - deberás dar
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona como mandato/directiva en contexto legislativo. En español, 'darás' conserva el valor exhortativo sin sonar forzado; se añadió la conjunción inicial por la coordinación natural del hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los descendientes de Leví
  lexicon: HALOT
  rationale: '''Levitas'' es el término establecido en español para el grupo tribal/ministerial, y comunica con claridad la referencia sin explicar de más.'
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - para Aarón y para sus hijos
  lexicon: HALOT
  rationale: El ל indica destinatario/beneficiario del acto de entrega. 'A' conserva bien la relación de transferencia y es natural en español.
- source_word: נְתוּנִם נְתוּנִם
  english_pob_choice: wholly given
  chosen_spanish: enteramente dados
  alternatives_spanish:
  - dados, dados
  - completamente dados
  - ciertamente dados
  lexicon: HALOT
  rationale: 'El hebreo repite el participio para intensificar: ''dados, dados'' / ''ciertamente dados''. En español, ''enteramente dados'' transmite la fuerza de la repetición de modo fluido, sin perder la idea de total dedicación.'
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: ellos están
  alternatives_spanish:
  - ellos son
  - ellos mismos están
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. 'Ellos' se conserva explícitamente; 'están' suena natural en la cláusula predicativa con 'enteramente dados'.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: El referente inmediato es Aarón. 'A él' mantiene la dirección de la entrega y evita una paráfrasis más interpretativa.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre los israelitas
  - de entre los hijos de Israel, es decir, los israelitas
  lexicon: HALOT
  rationale: '''מֵאֵת'' marca procedencia/extracción desde el conjunto del pueblo. ''De entre'' expresa bien la selección desde el interior del grupo. Se conservó ''hijos de Israel'' para reflejar la forma hebrea y la formulación covenantal.'
theological_decisions:
- issue: Renderización de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel, como expresión pactal
  rationale: Se preserva la metáfora familiar del hebreo y la lectura literal del POB inglés, evitando sustituirla automáticamente por un colectivo neutral. 'Hijos de Israel' es idiomático y fiel, aunque en nota puede entenderse como 'israelitas'.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Intensificación de נְתוּנִם נְתוּנִם
  english_pob_reading: wholly given
  chosen_spanish_reading: enteramente dados
  alternative_spanish_readings:
  - dados, dados
  - completamente dados
  - ciertamente dados
  rationale: No se disuelve la repetición enfática del hebreo; se conserva su sentido intensivo mediante una expresión española equivalente. La fórmula sigue mostrando dedicación total al servicio de Aarón.
  doctrine_reference: HALOT / nota de énfasis lexical en el texto base
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo con apoyo del audit trail inglés. No hubo revisiones aplicadas en la última pasada; el borrador mantiene la decisión del POB inglés de conservar la estructura de entrega y la intensificación de נתן, adaptando al español la repetición enfática con 'enteramente dados'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton cuando aparezca en contextos adyacentes; aquí no aparece.
  - '''Hijos de Israel'' se conserva por fidelidad a la formulación hebrea y al principio de mantener el lenguaje pactal cuando el contexto lo justifica.'
  - '''Aarón'' y ''sus hijos'' se mantienen como nombres propios y relación familiar ministerial estándar en toda la serie.'
  - La preposición 'de entre' refleja correctamente extracción/origen desde el conjunto del pueblo, no mera procedencia geográfica.
