  to: Entonces el rey fue a su palacio y pasó la noche ayunando; no llevaron ante él diversiones[a], y el sueño huyó de él.
  rationale: Se conserva el sentido del original y del POB inglés, pero se mejora la naturalidad y precisión de la cláusula difícil con «no llevaron ante él diversiones[a]», que refleja mejor la idea de traer algo a la presencia del rey. También se simplifica la nota para mantener la incertidumbre léxica sin introducir un término moderno innecesario.
