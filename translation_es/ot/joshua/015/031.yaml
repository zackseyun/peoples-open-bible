review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo contiene solo tres topónimos enlazados por waw conjuntiva en una lista: צִקְלַג, מַדְמַנָּה, סַנְסַנָּה. El borrador español preserva correctamente que se trata de nombres de lugar y la estructura básica de lista, pero sus formas ''Madmana'' y ''Sansana'' simplifican demasiado la transliteración y pierden rasgos consonánticos presentes en el hebreo y retenidos en la auditoría inglesa. ''Ziclag'' es defendible en español, pero conviene mantener una transliteración más directamente alineada con la forma fuente y reconocible en tradición bíblica.'
  spanish_quality_summary: La frase es natural y legible en español. Sin embargo, al ser una lista de topónimos, la prioridad es la fidelidad formal. 'Madmana' y 'Sansana' suenan demasiado castellanizados frente al hebreo; 'Madmana' además borra la geminación nasal reflejada en la forma inglesa auditada. Una revisión mínima mejora precisión sin afectar la legibilidad.
  glossary_alignment: No hay términos teológicos del glosario global implicados. La cuestión principal es la transliteración coherente de nombres propios. Se debe evitar una adaptación que opaque innecesariamente la forma hebrea cuando el español puede recibir sin problema 'Madmanah' y 'Sansanah'.
  issues:
  - severity: medium
    issue: '''Madmana'' reduce en exceso מַדְמַנָּה'
    rationale: La forma hebrea termina en -ah y contiene una nasal geminada; aunque el español no necesita duplicar consonantes siempre, 'Madmana' se aleja más de la forma fuente y de la auditoría inglesa de lo necesario.
  - severity: medium
    issue: '''Sansana'' reduce en exceso סַנְסַנָּה'
    rationale: La forma propuesta elimina la aspiración/gráfica final y simplifica un nombre puramente transliterado sin ganar claridad real en español. 'Sansanah' conserva mejor la forma del topónimo.
  - severity: low
    issue: '''Ziclag'' frente a ''Ziklag'''
    rationale: '''Ziclag'' puede leerse bien en español, pero ''Ziklag'' se alinea más estrechamente con la auditoría inglesa y con una transliteración más transparente del hebreo. Aun así, no es un problema grave.'
  revised_spanish_text: Ziklag, Madmanah y Sansanah.
  revision_rationale: Se ajustan los topónimos para reflejar más fielmente la forma hebrea y la auditoría POB, manteniendo una lista natural en español y sin añadir notas innecesarias.
