translation:
  language: es
  text: 'Yahvé entra[a] en juicio con los ancianos de su pueblo y sus príncipes: «Son ustedes los que han devorado[b] la viña[c]; el despojo[d] del pobre está en sus casas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viene en juicio» o «entra a juicio».
    reason: lexical_alternative
  - marker: b
    text: «Han devorado» también puede verterse «han consumido» o «han quemado»; el verbo hebreo comunica una destrucción por consumo.
    reason: lexical_alternative
  - marker: c
    text: «La viña» probablemente funciona como metáfora del pueblo o de la comunidad, en eco con la imaginería de la viña en Isaías.
    reason: cross_reference
  - marker: d
    text: O «el botín del pobre» o «lo robado al pobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, en línea con la práctica POB y con el valor fuente del hebreo, evitando sustituirlo por un título.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: into judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - en el juicio
  - para juicio
  - a juicio
  lexicon: HALOT
  rationale: El hebreo expresa entrada en una situación/ámbito judicial; en español, «en juicio» mantiene la fuerza legal sin volver la frase forzada. La alternativa «a juicio» o «para juicio» sería menos natural aquí.
- source_word: יָבֹוא
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - viene
  - vendrá
  - entrará
  lexicon: HALOT
  rationale: Se preserva el valor verbal de movimiento/entrada con un presente profético natural en español, coherente con el auditable «enters» del POB.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: Se mantiene la preposición literal del hebreo. Aunque el contexto es adversarial, «con» conserva la formulación fuente; el tono acusatorio queda claro por el contenido del juicio.
- source_word: זִקְנֵי עַמּוֹ
  english_pob_choice: the elders of his people
  chosen_spanish: los ancianos de su pueblo
  alternatives_spanish:
  - los ancianos de su gente
  - los líderes de su pueblo
  lexicon: HALOT
  rationale: «Ancianos» reproduce el término de liderazgo comunitario sin reducirlo a edad biológica; «de su pueblo» mantiene el constructo con naturalidad.
- source_word: וְשָׂרָיו
  english_pob_choice: and its princes
  chosen_spanish: y sus príncipes
  alternatives_spanish:
  - y sus gobernantes
  - y sus jefes
  lexicon: HALOT
  rationale: «Príncipes» preserva el registro elevado del hebreo שׂרים. Se mantiene el posesivo «sus» de modo concordante con el referente colectivo implícito.
- source_word: וְאַתֶּם
  english_pob_choice: It is you
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero ustedes
  - Sí, ustedes mismos
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. En español, el énfasis se sostiene mediante la colocación inicial y la cita directa subsiguiente; no se fuerza con una perífrasis menos natural.
- source_word: בִּעַרְתֶּם
  english_pob_choice: have devoured
  chosen_spanish: han devorado
  alternatives_spanish:
  - han consumido
  - han destruido
  - han quemado
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir consumir, destruir o quemar, «han devorado» recoge el valor de consumo destructivo elegido por el POB y expresa bien la explotación denunciada sin perder la imagen agresiva.
- source_word: הַכֶּרֶם
  english_pob_choice: the vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - la viña de uvas
  - el viñedo
  lexicon: HALOT
  rationale: En español bíblico actual, «viña» es más natural que «viñedo» y conserva la imagen agrícola/metafórica. Se evita explicitar su referente para no interpretar en el texto principal.
- source_word: גְּזֵלַת
  english_pob_choice: the plunder
  chosen_spanish: el despojo
  alternatives_spanish:
  - el robo
  - el botín
  - la rapiña
  lexicon: HALOT
  rationale: «Despojo» comunica el resultado de un saqueo o robo y suena natural en un contexto profético de injusticia. Mantiene la carga de lo arrebatado al pobre.
- source_word: הֶעָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el necesitado
  lexicon: HALOT
  rationale: El término apunta aquí a la vulnerabilidad socioeconómica; en singular colectivo, «el pobre» es claro y fiel en español.
- source_word: בְּבָתֵּיכֶם
  english_pob_choice: is in your houses
  chosen_spanish: está en sus casas
  alternatives_spanish:
  - está en sus hogares
  - está en sus palacios
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y el sentido de residencia/posesión. «Sus casas» es directo y evita sobreinterpretar como «palacios».
theological_decisions:
- issue: Imagen de la viña
  english_pob_reading: Retain 'the vineyard' as a metaphor without explicating it as 'my people' in the main text.
  chosen_spanish_reading: Retener «la viña» como metáfora sin explicitar en el texto principal que representa al pueblo.
  alternative_spanish_readings:
  - mi pueblo
  - la nación
  - la comunidad
  rationale: Isaías usa la imagen de la viña de forma profética y acusatoria. Mantenerla en español respeta la tensión metafórica del pasaje y evita insertar una interpretación no presente en el hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza judicial de עִם
  english_pob_reading: Render עִם literally as 'with' rather than interpretively as 'against'.
  chosen_spanish_reading: Traducir עִם literalmente como «con», no como «contra».
  alternative_spanish_readings:
  - contra
  - frente a
  rationale: Aunque el contexto es confrontativo, el hebreo usa la preposición literal. «Con» mantiene la trazabilidad al texto fuente y deja que el juicio mismo exprese la oposición.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tono del presente profético
  english_pob_reading: Present-tense English rendering gives prophetic vividness while preserving future/judicial force.
  chosen_spanish_reading: Usar presente («entra») para reproducir la vivacidad profética sin perder el valor futuro del hebreo.
  alternative_spanish_readings:
  - entrará
  - vendrá
  rationale: En español, el presente profético es natural y solemne; transmite inmediatez sin alejarse del sentido verbal hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional; por eso la redacción española sigue de cerca el análisis auditado del POB y mantiene intactas las decisiones lexicográficas y teológicas principales.
  spanish_consistency_notes:
  - Se conserva Yahvé para el Nombre divino, coherente con el proyecto español.
  - «Príncipes» se mantiene por el registro del hebreo שׂרים; no se rebaja a «funcionarios».
  - El texto principal evita explicitar la metáfora de la viña, pero la nota la documenta.
  - El plural posesivo «sus casas» refleja el hebreo y la referencia colectiva.
  - La puntuación con dos puntos introduce correctamente la cita directa y distingue el discurso divino del reproche.
