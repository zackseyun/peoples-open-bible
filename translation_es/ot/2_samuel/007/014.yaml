translation:
  language: es
  text: Yo seré para él un padre, y él será para mí un hijo. Cuando cometa iniquidad, lo disciplinaré con la vara de hombres y con golpes de seres humanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: “con golpes humanos”. El hebreo dice literalmente: “con los golpes de los hijos de hombre”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶהְיֶה לּוֹ לְאָב
  english_pob_choice: I will be a father to him
  chosen_spanish: Yo seré para él un padre
  alternatives_spanish:
  - Yo seré su padre
  lexicon: HALOT
  rationale: La construcción relacional con ל preserva mejor el vínculo de pacto que una posesión llanamente idiomática. “Para él un padre” mantiene la transparencia formal y suena natural en español.
- source_word: וְהוּא יִהְיֶה לִּי לְבֵן
  english_pob_choice: and he will be a son to me
  chosen_spanish: y él será para mí un hijo
  alternatives_spanish:
  - y él será mi hijo
  lexicon: HALOT
  rationale: Se conserva la reciprocidad idiomática del hebreo, evitando suavizarla demasiado con “mi hijo”, aunque esa opción sea posible en español.
- source_word: בְּהַעֲוֺתוֹ
  english_pob_choice: he commits iniquity
  chosen_spanish: cometa iniquidad
  alternatives_spanish:
  - haga lo malo
  - delinca
  - se aparte en culpa
  lexicon: HALOT
  rationale: “Iniquidad” conserva la gravedad moral del hebreo עון/עוה mejor que un “hacer lo malo” más débil. Se usa subjuntivo tras “cuando” para reflejar la situación eventual.
- source_word: וְהֹכַחְתִּיו
  english_pob_choice: I will discipline him
  chosen_spanish: lo disciplinaré
  alternatives_spanish:
  - lo corregiré
  - lo reprenderé
  - lo castigaré
  lexicon: HALOT
  rationale: En contexto de vara y golpes, “disciplinar” expresa corrección punitiva sin reducirlo a mera reprensión verbal.
- source_word: בְּשֵׁבֶט אֲנָשִׁים
  english_pob_choice: with the rod of men
  chosen_spanish: con vara de hombres
  alternatives_spanish:
  - con vara humana
  - con la vara usada por hombres
  lexicon: HALOT
  rationale: “Vara” comunica naturalmente שֵׁבֶט como instrumento de disciplina y conserva la imagen metafórica. “De hombres” sigue la estructura hebrea y mantiene la referencia a medios humanos.
- source_word: וּבְנִגְעֵי בְּנֵי אָדָם
  english_pob_choice: and with the blows of the sons of man
  chosen_spanish: y con golpes de hijos de hombre
  alternatives_spanish:
  - y con golpes humanos
  - y con azotes de los hijos de hombre
  lexicon: HALOT
  rationale: Se retiene la expresión hebrea “hijos de hombre” para no borrar el paralelismo con בְּנֵי אָדָם. “Golpes” traduce נגע como daño físico/azote sin sobreinterpretar el término.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: En el sintagma constructo se conserva la forma tradicional y genérica “hijo(s) de hombre”, que en español sigue siendo comprensible y respeta la textura del hebreo.
theological_decisions:
- issue: Alcance de la promesa filial en el pacto davídico
  english_pob_reading: Render the verse in its immediate historical sense about the Davidic son/king without importing an explicit messianic interpretation into the translation.
  chosen_spanish_reading: Traducir el versículo en su sentido histórico inmediato acerca del hijo/rey davídico, sin introducir una interpretación mesiánica explícita en la redacción.
  alternative_spanish_readings:
  - Leerlo como directamente mesiánico en el texto principal
  rationale: La traducción debe preservar el enunciado del pacto en su contexto original. La aplicación cristológica posterior puede anotarse o enseñarse aparte, pero no debe imponerse en la línea principal sin apoyo explícito del hebreo.
  doctrine_reference: Primacía del sentido original; conservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: Se corrige la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando el hebreo lo exija; aquí no aparece el nombre divino.
  - Se preserva el paralelismo hebreo padre/hijo sin cristianizarlo en el texto principal.
  - “Hijo de hombre” se conserva para reflejar בני אדם y su tono genérico humano.
  - 'La nota [a] está anclada en el punto de ambigüedad léxica real: “golpes de hijos de hombre”.'
