translation:
  language: es
  text: Mira a mis enemigos[a], porque son muchos, y me odian con odio violento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y con odio de violencia me odian». La expresión hebrea subraya el carácter violento y despiadado de su odio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Look at
  chosen_spanish: Mira a
  alternatives_spanish:
  - Considera a
  - Mira
  lexicon: HALOT
  rationale: Imperativo masculino singular dirigido a Dios en oración. «Mira a» conserva la fuerza de la petición y suena natural en español contemporáneo; «considera» sería más interpretativo.
- source_word: אוֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me son hostiles
  lexicon: HALOT
  rationale: El sustantivo con sufijo de primera persona singular pide una referencia posesiva directa. «Enemigos» es claro y fiel; «adversarios» suaviza más de lo que el hebreo sugiere.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» expresa bien el valor causal en español sin forzar el enlace lógico.
- source_word: רָבּוּ
  english_pob_choice: they are many
  chosen_spanish: son muchos
  alternatives_spanish:
  - se han multiplicado
  - son numerosos
  lexicon: HALOT
  rationale: El perfecto qal plural comunica aquí la gran cantidad de los enemigos. «Son muchos» es idiomático y preserva el sentido numérico sin sobrerreproducir el aspecto verbal.
- source_word: וְשִׂנְאַת חָמָס
  english_pob_choice: with violent hatred
  chosen_spanish: con odio violento
  alternatives_spanish:
  - con odio cruel
  - con odio de violencia
  - con una violencia odiosa
  lexicon: HALOT
  rationale: La expresión hebrea puede leerse literalmente como una «hated of violence / violence-hatred», pero el inglés POB ya documenta el sentido de un odio caracterizado por la violencia. «Odio violento» conserva esa tensión lexical y la vuelve natural en español.
- source_word: שְׂנֵאוּנִי
  english_pob_choice: they hate me
  chosen_spanish: me odian
  alternatives_spanish:
  - me han odiado
  - me tienen odio
  lexicon: HALOT
  rationale: El perfecto qal con objeto de primera persona funciona en este lamento como estado hostil continuo. En español, el presente «me odian» expresa mejor esa hostilidad vigente que un perfecto puntual.
theological_decisions:
- issue: Cómo reflejar el destinatario implícito de la súplica
  english_pob_reading: Look at my enemies...
  chosen_spanish_reading: Mira a mis enemigos...
  alternative_spanish_readings:
  - Mira mis enemigos...
  - Fíjate en mis enemigos...
  rationale: El hebreo presenta una oración dirigida a Dios con imperativo singular. En español, «Mira a» mantiene mejor la dirección personal de la súplica que soluciones menos directas o más idiomáticamente ambiguas.
  doctrine_reference: Salmo de lamentación; oración dirigida a Yahvé.
- issue: Cómo manejar la expresión intensiva sobre la violencia del odio
  english_pob_reading: they hate me with violent hatred
  chosen_spanish_reading: me odian con odio violento
  alternative_spanish_readings:
  - me odian con un odio de violencia
  - me odian con odio cruel
  rationale: La frase hebrea conserva una cualidad lexicalmente densa que no debe diluirse. «Odio violento» mantiene la carga de violencia y hostilidad brutal que la nota inglesa explicita.
  doctrine_reference: Antropología bíblica del odio violento y la injusticia; sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura estable del WLC y coincide con la revisión inglesa más reciente, que no introdujo cambios. La nota reproduce la alternativa literal documentada en el aparato inglés sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, aunque este versículo no lo menciona explícitamente en el texto hebreo.
  - Se mantiene el registro de lamento bíblico con sintaxis sobria y directa.
  - «Odio violento» conserva la fuerza semántica de la construcción nominal hebrea sin desplazarla hacia una paráfrasis más explicativa.
