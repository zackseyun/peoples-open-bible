translation:
  language: es
  text: Por esta razón[a], el rey Darío firmó el documento y la prohibición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Por esto». El arameo introduce una consecuencia. También puede traducirse de forma más formal: «Entonces, el rey Darío escribió o registró el documento y la prohibición»; pero «firmó» expresa mejor su ratificación legal en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Porque de esto
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: La expresión aramea introduce una consecuencia directa del contexto anterior. «Por esto» conserva la relación causal de forma natural en español sin añadir más contenido del que el texto da.
- source_word: מַלְכָּא דָּרְיָוֶשׁ
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío, el rey
  - el rey Dario
  lexicon: HALOT
  rationale: Se mantiene el título real y el nombre propio en orden natural del español, con la forma habitual «Darío».
- source_word: רְשַׁם
  english_pob_choice: signed
  chosen_spanish: firmó
  alternatives_spanish:
  - escribió
  - registró
  - puso su firma
  lexicon: HALOT
  rationale: En este contexto administrativo, el verbo señala la validación formal del escrito. «Firmó» comunica bien la fuerza legal sin sobrecargar el texto con una paráfrasis.
- source_word: כְּתָבָא
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - el escrito
  - el decreto escrito
  - la escritura
  lexicon: HALOT
  rationale: El sustantivo designa un escrito formal. «Documento» es claro y acorde con el contexto jurídico-administrativo.
- source_word: וֶאֱסָרָא
  english_pob_choice: the injunction
  chosen_spanish: la prohibición
  alternatives_spanish:
  - la interdicción
  - la orden restrictiva
  - el mandamiento
  lexicon: HALOT
  rationale: El término arameo expresa una restricción legal vinculante. «Prohibición» transmite esa fuerza normativa de manera comprensible en español; «injunction» en inglés POB se refleja aquí sin adoptar terminología jurídica poco natural.
theological_decisions:
- issue: Valor jurídico de los dos sustantivos finales
  english_pob_reading: the document and the injunction
  chosen_spanish_reading: el documento y la prohibición
  alternative_spanish_readings:
  - el escrito y la interdicción
  - el documento y la orden restrictiva
  rationale: La POB inglesa distingue entre el texto escrito y la medida legal impuesta. En español, «documento» y «prohibición» preservan esa distinción y la fuerza legal del pasaje sin duplicar innecesariamente el campo semántico de «decreto».
  doctrine_reference: Ninguna; decisión léxico-contextual.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal. La nota conserva la alternativa histórica/legal del arameo y la decisión óptima del contexto.
  spanish_consistency_notes:
  - Se usa «Darío» con mayúscula y sin artículo delante del nombre propio en la posición más natural del español.
  - «Prohibición» evita introducir una traducción eclesiástica o excesivamente técnica donde el arameo apunta a una restricción jurídica formal.
  - El ritmo breve de la frase sigue de cerca la economía del original arameo.
