translation:
  language: es
  text: Y sucedió en el noveno año de su reinado, en el décimo mes, el día diez del mes, que Nabucodonosor, rey de Babilonia, vino, él y todo su ejército, contra Jerusalén, y acampó contra ella, y construyeron contra ella una muralla de asedio[a] alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obras de asedio» o «terraplén de asedio» para el hebreo דָּיֵק, término para las construcciones militares levantadas contra una ciudad durante un asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa introductoria se conserva como transición histórica natural en español, sin cargarla de arcaísmo. «Sucedió» mantiene el tono de enlace de relato del hebreo y del POB inglés.
- source_word: בִּשְׁנַת הַתְּשִׁיעִית לְמָלְכוֹ
  english_pob_choice: in the ninth year of his reign
  chosen_spanish: en el noveno año de su reinado
  alternatives_spanish:
  - en el noveno año de su gobierno
  - en el noveno año de su realeza
  lexicon: HALOT
  rationale: «Reinado» es el equivalente idiomático y exacto para la fórmula regnal; preserva la relación temporal sin añadir matices no presentes.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el décimo mes
  alternatives_spanish:
  - en el mes décimo
  lexicon: HALOT
  rationale: Se mantiene la referencia calendárica simple del hebreo. No se convierte a un mes moderno porque el texto no lo especifica.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: el día diez del mes
  alternatives_spanish:
  - el décimo día del mes
  lexicon: HALOT
  rationale: La construcción hebrea se expresa de forma natural en español con artículo y sustantivo explícito. «El día diez del mes» conserva la datación sin sobreformalizarla.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - avanzó
  lexicon: HALOT
  rationale: En contexto militar, «vino» mantiene el movimiento narrativo directo del hebreo y combina bien con la construcción bélica que sigue. «Llegó» sería posible, pero menos dinámica aquí.
- source_word: נְבֻכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  - Nebucadrézar
  lexicon: Transliteración tradicional española
  rationale: Se usa la forma española ampliamente reconocible y fiel al nombre real. La variante de transliteración no cambia el referente histórico.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: Título real más topónimo, renderizados de manera directa y estándar en español.
- source_word: הוּא וְכָל חֵילוֹ
  english_pob_choice: he and all his army
  chosen_spanish: él y todo su ejército
  alternatives_spanish:
  - él y todas sus fuerzas
  - él y toda su hueste
  lexicon: HALOT
  rationale: '«Ejército» transmite con claridad el sentido militar de חֵיל en un sitio; se conserva el énfasis del pronombre explícito: Nabucodonosor personalmente, junto con su fuerza total.'
- source_word: עַל יְרוּשָׁלַםִ
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: El hebreo y el contexto de asedio exigen valor adversativo, no mero movimiento direccional. «Contra» reproduce mejor la hostilidad implícita.
- source_word: וַיִּחַן עָלֶיהָ
  english_pob_choice: and encamped against it
  chosen_spanish: y la sitió
  alternatives_spanish:
  - y acampó contra ella
  - y puso campamento contra ella
  lexicon: HALOT
  rationale: En este contexto, חנה expresa la instalación militar ante la ciudad. «La sitió» comunica el hecho bélico de manera más natural en español, sin perder la idea de hostigamiento militar. Se evita una redundancia excesiva con la frase siguiente.
- source_word: וַיִּבְנוּ עָלֶיהָ דָּיֵק סָבִיב
  english_pob_choice: and built a siege wall around it
  chosen_spanish: y levantó contra ella una muralla de sitio alrededor
  alternatives_spanish:
  - y construyeron un terraplén de sitio alrededor de ella
  - y edificaron obras de sitio alrededor de ella
  lexicon: HALOT
  rationale: דָּיֵק designa obras militares de asedio; «muralla de sitio» conserva el carácter concreto de una estructura de bloqueo, como en el POB inglés. Se mantiene la tensión entre singularidad del dispositivo y pluralidad verbal del hebreo, que puede funcionar como plural de acción con sujeto colectivo implícito.
- source_word: סָבִיב
  english_pob_choice: around it
  chosen_spanish: alrededor
  alternatives_spanish:
  - alrededor de ella
  - en derredor
  lexicon: HALOT
  rationale: El adverbio de encirclement se integra naturalmente en español. El referente femenino implícito de Jerusalén queda claro por el contexto inmediato.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail inglés sin cambios sustanciales respecto del sentido ya validado. La decisión principal en español fue compactar la doble idea de «encamped against it» y «built a siege wall around it» con verbos y sintagmas naturales, manteniendo el asedio explícito. No se introdujeron lecturas textuales alternativas ni enmiendas al nombre propio más allá de la forma española estándar.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se evita «SEÑOR» porque no hay יהוה aquí.
  - «Ejército» se mantiene por el contexto bélico inmediato; no se suaviza a «fuerzas».
  - La referencia femenina de Jerusalén se conserva implícitamente en «la sitió» y «contra ella» para mantener cohesión referencial.
  - La nota de pie marca la ambigüedad léxica de דָּיֵק sin anular la opción principal de traducción.
