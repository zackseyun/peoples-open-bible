  rationale: Se conserva la traducción general, pero se ajusta 'te he escuchado' a 'te he oído' para reflejar mejor שָׁמַעְתִּי en este contexto y se suaviza levemente la puntuación para una lectura más natural en español sin perder el énfasis acumulativo del hebreo.
