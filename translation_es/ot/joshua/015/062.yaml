translation:
  language: es
  text: 'y Nibsán[a], la Ciudad de la Sal, y En-gedi: seis ciudades con sus asentamientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus aldeas' para 'sus asentamientos'. El término hebreo puede designar lugares menores asociados con las ciudades mencionadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּבְשָׁן
  english_pob_choice: Nibshan
  chosen_spanish: Nibsán
  alternatives_spanish:
  - Ha-Nibsán
  - Nibshan
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene transliterarlo de forma natural. Se omite la huella del artículo hebreo, como en el tratamiento normal de topónimos.
- source_word: עִיר הַמֶּלַח
  english_pob_choice: the City of Salt
  chosen_spanish: la Ciudad de la Sal
  alternatives_spanish:
  - Ciudad de Sal
  - la ciudad de sal
  lexicon: HALOT
  rationale: La construcción hebrea es transparente y contiene valor toponímico. Se conserva el sentido literal con artículo, porque en español suena más natural y mantiene el nombre significativo del lugar.
- source_word: עֵין גֶּדִי
  english_pob_choice: En-gedi
  chosen_spanish: En-gedi
  alternatives_spanish:
  - En Gedi
  - Fuente del Cabrito
  lexicon: HALOT
  rationale: Es un topónimo ya fijado por transliteración en la tradición bíblica. Aunque sus componentes son significativos, la forma transliterada es la más reconocible y fiel al nombre propio.
- source_word: עָרִים שֵׁשׁ
  english_pob_choice: six cities
  chosen_spanish: seis ciudades
  alternatives_spanish:
  - seis poblaciones
  - seis pueblos
  lexicon: HALOT
  rationale: La expresión resume el total de asentamientos enumerados. 'Ciudades' conserva el término territorial estándar del hebreo en este contexto.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their settlements
  chosen_spanish: sus dependencias
  alternatives_spanish:
  - sus aldeas
  - sus asentamientos
  lexicon: HALOT
  rationale: חַצְרִים puede referirse a lugares subordinados o dependientes de las ciudades principales. 'Dependencias' comunica esa subordinación sin restringir innecesariamente a 'aldeas'.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Se conserva la simple coordinación de la lista. La forma 'y' es la más natural en español en este encadenamiento de topónimos.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el texto inglés quedó sin cambios y la concordancia general es alta. La versión española sigue el mismo sentido listal y toponímico del hebreo, sin introducir interpretación adicional.
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos propios y la traducción del nombre significativo 'Ciudad de la Sal'.
  - '''Dependencias'' busca reflejar el matiz de asentamientos subordinados indicado por el hebreo, en línea con la nota inglesa sobre ''villages'' / ''settlements''.'
  - El texto conserva la estructura de lista territorial y el cierre cuantitativo del versículo.
