review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: mantiene la elipsis del sujeto, preserva ''rey'' y ''sátrapa'', y refleja la repetición de ποιεῖ con ''hace''. También conserva correctamente ''talentos'' en sentido monetario con nota aclaratoria. Sin embargo, hay un desajuste importante en la tercera cláusula: ''hace que todo hable'' suena extraño en español y además ''todo'' con singular verbal debilita el valor distributivo/práctico de πάντα + λαλεῖν, que en contexto apunta a que todos terminan hablando de dinero. La primera cláusula también puede mejorarse levemente de ''a todos los corazones'' a ''ricos todos los corazones'' para reflejar más de cerca la construcción griega y sonar menos forzada.'
  spanish_quality_summary: 'El español es en general claro y digno, pero presenta dos giros poco naturales: ''hace ricos a todos los corazones'' y sobre todo ''hace que todo hable''. El primero es aceptable, aunque algo pesado; el segundo resulta poco idiomático. Una revisión menor puede conservar la cercanía formal al griego y mejorar la legibilidad: ''hace ricos todos los corazones'' y ''hace hablar de talentos a todos''.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Sátrapa' está bien conservado. 'Talentos' se mantiene correctamente como término monetario y la nota evita la falsa lectura moderna de 'talentos' como habilidades. No hay términos de la lista principal que requieran ajuste.
  issues:
  - severity: medium
    issue: La frase 'hace que todo hable en términos de talentos' es poco natural en español.
    rationale: Aunque 'everything' apareció en una revisión inglesa, el propio análisis léxico reconoce que πάντα funciona prácticamente con referente personal por el infinitivo 'hablar'. En español, 'todo hable' suena abstracto y torpe; 'hace hablar de talentos a todos' comunica el sentido con mayor fidelidad idiomática sin perder la amplitud retórica.
  - severity: low
    issue: '''Hace ricos a todos los corazones'' suena algo forzado.'
    rationale: La imagen de 'corazones' debe conservarse, pero en español la secuencia con 'a' puede sentirse pesada. 'Hace ricos todos los corazones' mantiene la literalidad básica y mejora el flujo.
  revised_spanish_text: Y hace ricos todos los corazones, y no se acuerda ni del rey ni del sátrapa; y hace hablar de talentos[a] a todos.
  revised_footnotes:
  - marker: a
    text: 'O: "hace que todos hablen en sumas de dinero". La expresión griega usa "talentos" en sentido monetario, no en el sentido moderno de capacidades naturales.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la tercera cláusula para un español más natural y fiel al sentido práctico de πάντα con 'hablar', evitando el extraño 'todo hable'. También se aligera la primera cláusula sin abandonar la imagen de 'corazones'. La nota se mantiene centrada en el valor monetario de 'talentos'.
