  to: 'Entonces Naamán dijo[a]: «Si no, te ruego que se le dé a tu siervo una carga de tierra, tanto como puedan llevar un par de mulas; porque tu siervo ya no ofrecerá holocausto ni sacrificio a otros dioses[b], sino solo a Yahvé»[c].'
