translation:
  language: es
  text: Y tu tasación[a] para el varón de veinte años hasta sesenta años será de cincuenta siclos de plata, según el siclo del santuario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tasación» traduce el hebreo עֵרֶךְ en su sentido técnico de valor fijado para un voto o evaluación ritual; no indica valor intrínseco.
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea especifica el estándar sagrado de medida, no simplemente un siclo descrito como «santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valuación
  alternatives_spanish:
  - tu valor asignado
  - tu tasación
  lexicon: HALOT
  rationale: En Levítico 27, עֵרֶךְ designa el valor fijado en un voto o evaluación ritual, no el valor intrínseco de la persona. «Valuación» conserva el sentido jurídico-cultual y refleja el poseído de segunda persona del hebreo.
- source_word: הַזָּכָר
  english_pob_choice: the male
  chosen_spanish: el varón
  alternatives_spanish:
  - el macho
  - el hombre
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino marcado con artículo en una categoría legal. «Varón» mantiene la referencia masculina sin la posible dureza de «macho» ni la sobrepersonalización de «hombre».
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וְעַד בֶּן שִׁשִּׁים שָׁנָה
  english_pob_choice: from twenty years old up to sixty years old
  chosen_spanish: de veinte años en adelante, pero menor de sesenta años
  alternatives_spanish:
  - de veinte años hasta sesenta años
  - desde los veinte años hasta los sesenta
  lexicon: HALOT
  rationale: La expresión hebrea marca un rango de edad. «De veinte años en adelante, pero menor de sesenta años» comunica el límite inferior y el superior de forma natural en español, sin perder la estructura del intervalo.
- source_word: חֲמִשִּׁים שֶׁקֶל כֶּסֶף
  english_pob_choice: fifty shekels of silver
  chosen_spanish: cincuenta siclos de plata
  alternatives_spanish:
  - cincuenta siclos de plata
  - cincuenta shekels de plata
  lexicon: HALOT
  rationale: «Siclo» es la forma española usual para šeqel en contexto bíblico. «Plata» conserva el sustantivo material del hebreo y mantiene la expresión de peso/valor.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - según el siclo sagrado
  - de acuerdo con el siclo del santuario
  lexicon: HALOT
  rationale: La frase hebrea especifica el estándar por el cual se mide el siclo. «Siclo del santuario» sigue el audit trail inglés y evita interpretar el adjetivo como mera cualidad moral; «según» expresa norma o medida.
- source_word: וְהָיָה ... וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - habrá de ser
  lexicon: HALOT
  rationale: En este contexto legal, el hebreo formula una disposición estipulativa. En español, «será» transmite con naturalidad la prescripción sin cargar el texto con modalización innecesaria.
theological_decisions:
- issue: Clasificación legal por sexo y edad
  english_pob_reading: the male
  chosen_spanish_reading: el varón
  alternative_spanish_readings:
  - el hombre
  - el macho
  rationale: El verso no habla de humanidad en general, sino de una categoría legal dentro de un sistema de valuación votiva. «El varón» preserva la distinción sexual y evita neutralizar la clasificación del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Naturaleza de עֵרֶךְ en Levítico 27
  english_pob_reading: valuation
  chosen_spanish_reading: valuación
  alternative_spanish_readings:
  - valor
  - tasación
  rationale: La decisión mantiene el marco cultual-jurídico de una valuación asignada, no una afirmación abstracta sobre dignidad o precio comercial. «Valuación» conserva la tensión técnica del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió «according to the sanctuary shekel» por ser más natural y exacto para בְּשֶׁקֶל הַקֹּדֶשׁ. Esa decisión se reflejó en «según el siclo del santuario».
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «varón» para reproducir la categoría masculina del hebreo con naturalidad en español bíblico contemporáneo.
  - «Siclo» se emplea de forma consistente para שֶׁקֶל en contextos de peso/valor bíblico.
