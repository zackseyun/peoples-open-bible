translation:
  language: es
  text: Porque la razón prudente[a] ahuyenta todas estas pasiones viciosas, así como también la ira; pues también domina incluso esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mente disciplinada». El griego ὁ σώφρων νοῦς combina la idea de facultad racional con la de autodominio disciplinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακόηθη
  english_pob_choice: vicious
  chosen_spanish: viciosas
  alternatives_spanish:
  - malas
  - malignas
  - malvadas
  lexicon: LSJ
  rationale: El adjetivo describe pasiones moralmente dañinas o corruptas. «Viciosas» conserva el valor ético negativo y el matiz de corrupción interior, con una dignidad natural en español.
- source_word: πάθη
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - emociones
  - afectos
  - sufrimientos
  lexicon: LSJ
  rationale: En 4 Macabeos el término designa impulsos o apetitos desordenados, no meros sufrimientos. «Pasiones» mantiene el tono técnico-filosófico del argumento.
- source_word: ὁ σώφρων νοῦς
  english_pob_choice: prudent reason
  chosen_spanish: la mente prudente
  alternatives_spanish:
  - la razón prudente
  - la mente sobria y disciplinada
  - la razón sobria
  lexicon: LSJ
  rationale: El griego combina la facultad racional (νοῦς) con la cualidad de σωφρών, que implica prudencia y dominio propio. «Mente prudente» conserva la referencia al intelecto con una formulación natural en español, aunque deja abierta la alternativa más explícitamente filosófica «razón prudente».
- source_word: ἀπωθεῖται
  english_pob_choice: drives away
  chosen_spanish: rechaza
  alternatives_spanish:
  - ahuyenta
  - expulsa
  - aparta
  lexicon: LSJ
  rationale: El verbo expresa una acción eficaz de apartar o rechazar con fuerza. «Rechaza» es claro y conciso en español; «aparta» o «ahuyenta» serían posibles, pero «rechaza» encaja bien con la sintaxis de la oración.
- source_word: θυμόν
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  - el furor
  lexicon: LSJ
  rationale: Aquí el término nombra una afectividad que debe ser dominada. «Ira» es un equivalente bíblico y solemne en español, cercano al valor contextual de ὀ θυμός.
- source_word: δεσπόζει
  english_pob_choice: is master even over this
  chosen_spanish: es dueña de esta
  alternatives_spanish:
  - tiene dominio incluso sobre esto
  - es señora aun de esto
  - domina incluso esto
  lexicon: LSJ
  rationale: El verbo expresa señorío o dominio. Opté por una formulación femenina que concuerda con «mente» y comunica la idea de dominio efectivo; la alternativa más literal sería «tiene dominio incluso sobre esto».
theological_decisions:
- issue: Cómo rendir ὁ σώφρων νοῦς sin borrar la tensión entre razón y autodominio
  english_pob_reading: prudent reason / the self-controlled mind
  chosen_spanish_reading: la mente prudente
  alternative_spanish_readings:
  - la razón prudente
  - la mente autocontrolada
  rationale: 'La frase griega une facultad racional y sobriedad ética. «Mente prudente» mantiene ambos elementos sin imponer un tecnicismo filosófico excesivo, y conserva la lectura antropológica del pasaje: la razón disciplinada gobierna las pasiones.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning over translation tradition.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios necesarios respecto del pase más reciente; se mantiene la equivalencia óptima y la lectura ética-filosófica del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - «Mesías»/«Cristo» no aplica en este versículo.
  - Se mantiene la distinción entre «mente» y «razón» en la nota para no borrar la tensión lexical de νοῦς.
  - Se evita un calco rígido de «is master even over this» y se privilegia una formulación idiomática con dominio efectivo.
