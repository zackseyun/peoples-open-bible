translation:
  language: es
  text: y Hesbón con sus tierras de pastoreo[a], y Jazer con sus tierras de pastoreo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tierras comunales' o 'tierras circundantes', para el término hebreo que se refiere al terreno abierto perteneciente a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Heshbón
  alternatives_spanish:
  - Jeshbón
  - Hesbón
  lexicon: HALOT
  rationale: Es nombre propio de lugar; se translitera al español con la forma más reconocible y natural en castellano bíblico moderno, manteniendo la referencia geográfica sin traducir el topónimo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - sus terrenos alrededor
  - sus terrenos de pastoreo
  lexicon: HALOT
  rationale: En el contexto de ciudades levíticas, מִגְרָשׁ designa el terreno abierto asociado a la ciudad. 'Pastizales' comunica de forma clara y natural la idea de tierras abiertas de uso pastoral; conserva el sentido funcional sin introducir una glosa interpretativa excesiva.
- source_word: יַעְזֵיר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Yazer
  - Jaazer
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se conserva la forma habitual en español bíblico para mantener continuidad con el uso reconocible en mapas y obras de referencia.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: HALOT
  rationale: El marcador de objeto no se representa explícitamente en español; la cadena coordinada se vierte con 'y' para preservar la enumeración simple y fluida.
translation_notes:
  revision_awareness: 'El texto inglés POB y el control cruzado indican acuerdo alto y sin cambios; por ello no se introducen variantes textuales ni notas adicionales. La única decisión relevante es léxica: mantener los topónimos como nombres propios y traducir מִגְרָשׁ con un equivalente español natural que conserve la función del terreno urbano-levítico.'
  spanish_consistency_notes:
  - 'Se conserva la repetición coordinada del hebreo con una estructura española simple: ''y ..., y ...''.'
  - Se evita 'suburbios' por ser históricamente cargado y potencialmente engañoso en español contemporáneo.
  - '''Pastizales'' funciona como opción readable; la nota preserva alternativas más literales para transparencia.'
  - No se usan mayúsculas especiales ni equivalentes litúrgicos porque el verso no contiene el tetragrámaton ni términos teológicos de alta carga doctrinal.
