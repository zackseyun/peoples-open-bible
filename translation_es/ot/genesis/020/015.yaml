translation:
  language: es
  text: 'Y Abimelec dijo: «Mira, mi tierra está delante de ti; habita donde sea bueno a tus ojos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habita donde te parezca mejor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide avance secuencial; «Y ... dijo» conserva el flujo del relato en español sin añadir matiz temporal o causal que el hebreo no exige.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  lexicon: Transliteración tradicional adaptada
  rationale: Se conserva el nombre propio bíblico en una forma habitual y readable para español, manteniendo la identidad del personaje sin traducción.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  lexicon: HALOT
  rationale: La partícula deíctica introduce atención inmediata; «Mira» comunica en español actual la fuerza apelativa de הִנֵּה mejor que «He aquí» o «He aquí que», que resultan más arcaicos.
- source_word: אַרְצִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi tierra
  - mi país
  - mi territorio
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance amplio de אֶרֶץ y suena natural en español bíblico; «país» introduciría un matiz político moderno y «territorio» sería demasiado técnico.
- source_word: לְפָנֶיךָ
  english_pob_choice: is before you
  chosen_spanish: está delante de ti
  alternatives_spanish:
  - está ante ti
  - queda a tu disposición
  lexicon: HALOT
  rationale: La locución espacial hebrea se refleja con una imagen igualmente visible en español. «Delante de ti» mantiene la apertura/ofrecimiento implícitos sin explicitar de más la inferencia.
- source_word: בַּטּוֹב בְּעֵינֶיךָ
  english_pob_choice: dwell where it is good in your eyes
  chosen_spanish: habita donde te parezca bueno
  alternatives_spanish:
  - habita donde sea bueno a tus ojos
  - habita donde te resulte bueno
  lexicon: HALOT
  rationale: La expresión idiomática combina evaluación y preferencia personal. En español, «te parezca bueno» preserva el sentido subjetivo de «en tus ojos» y evita una calca dura; «habita» refleja el imperativo de residencia.
theological_decisions:
- issue: Valor de la imagen idiomática «en tus ojos / delante de ti»
  english_pob_reading: The English POB preserves the Hebraic idiom with 'is before you' and 'in your eyes'.
  chosen_spanish_reading: Se conserva la imaginería espacial y perceptiva con «está delante de ti» y «te parezca bueno».
  alternative_spanish_readings:
  - queda a tu disposición
  - como te convenga
  rationale: 'No hay una tensión doctrinal, pero sí una decisión hermenéutica: mantener la concreción hebrea sin convertirla en una paráfrasis plana. Así se respeta la voz del texto fuente y la invitación real de Abimelec a elegir residencia.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base hebrea no presenta variantes textuales relevantes aquí; la revisión inglesa más reciente volvió a una formulación más formal («dwell where it is good in your eyes»). El español sigue esa opción de mayor cercanía, pero opta por una equivalencia natural de la frase idiomática con «habita donde te parezca bueno».
  spanish_consistency_notes:
  - Se mantiene la traducción de יהוה como «Yahvé» como norma del proyecto, aunque este versículo no la contiene.
  - «Habita» se usa para reflejar el imperativo de residencia de שֵׁב, evitando un simple «vive» que podría perder el matiz de asentamiento/permiso.
  - La puntuación con comillas españolas y dos puntos reproduce una cita directa clara y publicable.
