  yaml_path: translation/ot/exodus/016/001.yaml
  text: They set out from Elim[a], and the whole congregation of the sons of Israel came to the wilderness of Sin, which is between Elim and Sinai[b], on the fifteenth day of the second month after they had gone out from the land of Egypt.
  footnotes:
