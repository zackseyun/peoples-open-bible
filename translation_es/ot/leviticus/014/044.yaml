revisions:
- from: Entonces el sacerdote vendrá y examinará[a], y si en verdad la llaga se ha extendido en la casa, es una enfermedad de la casa[b] que corroe; es impura.
  to: Entonces el sacerdote vendrá y examinará[a], y si en verdad la mancha se ha extendido en la casa, es un mildiu destructivo[b] en la casa; es impura.
  rationale: Se reemplazó «la llaga» por «la mancha» para mayor naturalidad en contexto de una casa. Se cambió «una enfermedad de la casa que corroe» por «un mildiu destructivo en la casa» para reflejar fielmente la revisión auditada del inglés («destructive mildew») y mantener el referente doméstico concreto. También se reubicó la nota [b] sobre «destructivo», que es el término realmente comentado por la nota.
