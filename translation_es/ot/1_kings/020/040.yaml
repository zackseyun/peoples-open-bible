translation:
  language: es
  text: 'Y mientras tu siervo andaba ocupado aquí y allá[a], él ya no estaba[b]. Entonces el rey de Israel le dijo: «Así será tu juicio[c]; tú mismo lo has decidido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «andaba haciendo esto y aquello». El hebreo expresa una ocupación dispersa en varias tareas o direcciones.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y él no estaba». En contexto, el hombre ya no se encontraba allí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu sentencia» / «tu veredicto». El rey está aplicando al hombre su propio criterio de juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: El hebreo עבד puede ser ‘esclavo’ o ‘siervo’; la POB en inglés optó por ‘your servant’ por el tono deferente. En español, ‘tu esclavo’ mantiene la fuerza léxica de עבד y conserva la relación de subordinación del hablante ante el rey, sin suavizarla más de lo que el contexto exige.
- source_word: עֹשֵׂה הֵנָּה וָהֵנָּה
  english_pob_choice: was busy here and there
  chosen_spanish: andaba ocupado aquí y allá
  alternatives_spanish:
  - estaba haciendo esto y aquello
  - estaba ocupado aquí y allá
  lexicon: HALOT
  rationale: La expresión idiomática describe estar ocupado en distintas direcciones o tareas. ‘Andaba ocupado aquí y allá’ comunica el sentido evasivo y disperso del hebreo de forma natural en español, preservando el valor idiomático que la POB documenta.
- source_word: וְהוּא אֵינֶנּוּ
  english_pob_choice: he was gone
  chosen_spanish: él no estaba
  alternatives_spanish:
  - y él no estaba allí
  - y había desaparecido
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘y él no está’. La POB anota que en contexto implica que el hombre ya no estaba presente. En español, ‘él no estaba’ mantiene la literalidad básica y deja abierta la inferencia narrativa de que el preso se había escapado, sin añadir una explicación que el hebreo no expresa explícitamente.
- source_word: מִשְׁפָּטֶךָ
  english_pob_choice: your judgment
  chosen_spanish: tu juicio
  alternatives_spanish:
  - tu sentencia
  - tu veredicto
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene valor judicial. ‘Juicio’ conserva el campo legal y permite reproducir la declaración del rey con sobriedad. ‘Sentencia’ o ‘veredicto’ serían posibles, pero ‘juicio’ sigue de cerca la amplitud del término hebreo.
- source_word: כֵּן
  english_pob_choice: So shall
  chosen_spanish: Así será
  alternatives_spanish:
  - Entonces será así
  - De ese modo será
  lexicon: HALOT
  rationale: La partícula introduce la conclusión judicial del rey. ‘Así será’ reproduce el valor de sentencia con un tono formal y natural en español, equivalente al ‘So shall’ de la POB.
- source_word: אַתָּה חָרָצְתָּ
  english_pob_choice: you yourself have decided it
  chosen_spanish: tú mismo lo has decidido
  alternatives_spanish:
  - tú mismo lo has determinado
  - tú mismo lo has pronunciado
  lexicon: HALOT
  rationale: חרץ significa decidir o determinar en este contexto judicial. El pronombre enfático אַתָּה se refleja con ‘tú mismo’. ‘Lo has decidido’ conserva la idea de auto-condena por la propia declaración del hombre, tal como destaca la POB.
theological_decisions:
- issue: Lectura judicial de מִשְׁפָּט en el dicho del rey
  english_pob_reading: your judgment / your sentence / your verdict
  chosen_spanish_reading: tu juicio
  alternative_spanish_readings:
  - tu sentencia
  - tu veredicto
  rationale: No hay una cuestión doctrinal amplia, pero sí una tensión semántica entre juicio, sentencia y veredicto. Se eligió ‘juicio’ porque mantiene el registro legal sin estrechar prematuramente el término. La continuación ‘tú mismo lo has decidido’ deja claro que el rey aplica al hombre su propio estándar.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La POB en inglés fue revisada y quedó sin cambios; el cruce de control reporta alta concordancia y aprobación. La redacción española sigue esa lectura estable, sin introducir variantes textuales ni reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió ‘tu esclavo’ en coherencia con la política POB para עבד cuando el contexto resalta subordinación personal.
  - Se preservó el tono judicial con ‘juicio’ y ‘decidido’, evitando reemplazos litúrgicos o eclesiásticos ajenos al contexto.
  - La puntuación de diálogo en español se normalizó con comillas angulares y coma antes de la cita final de reporte narrativo.
