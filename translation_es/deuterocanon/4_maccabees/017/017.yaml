revisions:
- from: Sí, el tirano mismo y todo su consejo admiraron su perseverancia[a], por la cual ahora están de pie ante el trono divino y viven la edad bienaventurada[b].
  to: Ciertamente, el tirano mismo y todo su consejo se maravillaron de su perseverancia, por la cual ahora están de pie ante el trono divino[a] y viven la era bienaventurada[b].
  rationale: Se corrigen los anclajes de notas para que correspondan al aparato auditado, se refuerza ἐξεθαύμασαν con 'se maravillaron de', se mejora la naturalidad de Αὐτός γέ τοι con 'Ciertamente', y se sustituye 'edad' por 'era' para preservar αἰών en un español más idiomático sin resolverlo como 'eternidad'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:14:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del griego: el tirano y su consejo se asombran de la ὑπομονή de los mártires, y por ella ahora están ante el trono divino y viven el αἰών bienaventurado. Sin embargo, hay un desajuste importante en las notas: los marcadores [a] y [b] están intercambiados respecto a los puntos léxicos documentados en el inglés POB. Además, ''admiraron'' atenúa un poco ἐξεθαύμασαν, que expresa asombro más que admiración.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'Sí' como arranque enfático suena menos natural en registro bíblico que 'Ciertamente' o simplemente omitir partícula explícita; y 'la edad bienaventurada' es demasiado literal y poco idiomática en español contemporáneo. 'La era bienaventurada' preserva mejor αἰών sin sonar extraña. También conviene fortalecer ἐξεθαύμασαν con 'se maravillaron de'.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Trono divino' respeta bien τῷ θείῳ ... θρόνῳ. No aparecen Yahvé/Mesías u otros términos sensibles del glosario. La decisión sobre αἰών requiere español más natural sin resolverlo como 'eternidad'.
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] están aplicados a las frases equivocadas.
    rationale: En el inglés auditado, la nota a corresponde a la alternativa de 'stand before/beside the divine throne', mientras que la nota b corresponde a 'live the blessed age'. En el español, [a] está puesto sobre 'perseverancia' y [b] sobre 'edad bienaventurada', dejando sin anclar la nota sobre el trono.
  - severity: medium
    issue: '''Admiraron'' debilita el matiz de ἐξεθαύμασαν.'
    rationale: El verbo griego indica asombro/maravilla. 'Admiraron' puede leerse más como aprecio que como quedar impactados.
  - severity: medium
    issue: '''La edad bienaventurada'' suena poco natural en español.'
    rationale: Aunque es formalmente cercano a αἰών, en español bíblico actual 'edad' en este sentido resulta extraño. 'Era bienaventurada' preserva mejor la imagen temporal sin forzar 'eternidad'.
  - severity: low
    issue: '''Sí'' como equivalente de Αὐτός γέ τοι es algo tosco al inicio.'
    rationale: La fuerza enfática puede expresarse con mejor naturalidad mediante 'Ciertamente' en español eclesial moderno.
  revised_spanish_text: Ciertamente, el tirano mismo y todo su consejo se maravillaron de su perseverancia, por la cual ahora están de pie ante el trono divino[a] y viven la era bienaventurada[b].
  revised_footnotes:
  - marker: a
    text: O 'junto al trono divino'. El verbo griego y la construcción con dativo pueden entenderse como presencia ante el trono o como una posición próxima a él.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la era bienaventurada'; en el contexto, probablemente alude a un estado eterno bienaventurado.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de notas para que correspondan al aparato auditado, se refuerza ἐξεθαύμασαν con 'se maravillaron de', se mejora la naturalidad de Αὐτός γέ τοι con 'Ciertamente', y se sustituye 'edad' por 'era' para preservar αἰών en un español más idiomático sin resolverlo como 'eternidad'.
