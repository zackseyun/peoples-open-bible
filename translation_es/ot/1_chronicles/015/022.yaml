revisions:
- from: Y Chenanías[a], jefe de los levitas, dirigía la carga[b], porque era entendido en ella.
  to: Y Chenanías[a], jefe de los levitas, dirigió el transporte[b], porque era experto en ello.
  rationale: Se revisa para expresar mejor la acción implicada por מַשָּׂא en este contexto ('transporte' en vez de 'carga'), mejorar la naturalidad y precisión de מֵבִין הוּא ('experto' en vez de 'entendido'), y usar un tiempo verbal narrativo más natural en español ('dirigió'). Se conservan la estructura del texto y la nota con la alternativa musical documentada en el POB inglés.
