review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: prohibición legal, sacrificio de la Pascua, conservación de «puertas» con nota metonímica, y uso correcto de «Yahvé». Sin embargo, «que Yahvé tu Dios te da» suena poco natural y menos fiel al relativo hebreo; en español debe vincularse mejor con «puertas» mediante «las que».'
  spanish_quality_summary: La redacción es generalmente clara, pero necesita un ajuste de fluidez y gramática. «En ninguna de tus puertas» funciona, aunque «en cualquiera de tus puertas» sería otra opción; la forma actual es aceptable. Los problemas reales están en la coma antes de la relativa, la formulación «que ... te da», y la nota b, que contiene el error gramatical «un metonimia».
  glossary_alignment: 'Alineado en términos clave: יְהוָה -> «Yahvé» conforme al proyecto; הַפָּסַח -> «la Pascua» con nota alternativa adecuada; שְׁעָרֶיךָ -> «puertas» preservando la dicción deuteronómica y la imagen hebrea. No hay conflicto terminológico mayor.'
  issues:
  - severity: medium
    issue: 'Relativa española poco natural: «que Yahvé tu Dios te da»'
    rationale: Aunque comprensible, en español suena abrupta y no enlaza limpiamente con «puertas». «las que Yahvé tu Dios te da» o «que Yahvé tu Dios te está dando» mejora la fidelidad sintáctica y la legibilidad.
  - severity: low
    issue: Coma antes de la relativa
    rationale: La coma separa indebidamente una relativa especificativa. En español estándar debe omitirse aquí.
  - severity: low
    issue: 'Error gramatical en la nota b: «un metonimia»'
    rationale: Debe decir «una metonimia».
