review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: acción divina directa (''Tú los plantaste''), arraigo, crecimiento y producción de fruto, seguido del contraste entre profesión verbal e interioridad real. Sin embargo, ''en su boca'' suena forzado en español en este contexto, y la traducción de כִּלְיוֹתֵיהֶם como ''entrañas'' no refleja tan claramente como conviene el valor antropológico de ''ser interior/motivos ocultos'' documentado en el audit trail inglés.'
  spanish_quality_summary: El español es claro y mayormente natural, pero 'Tú estás cerca en su boca' resulta menos idiomático que 'en su boca' exige aquí; 'estás cerca en su boca' puede sonar calcado. 'Lejos de sus entrañas' es comprensible y digno, pero en español contemporáneo eclesial puede sugerir visceralidad física más que interioridad moral. Conviene ajustar la segunda cláusula para mayor naturalidad y precisión semántica, preservando la nota literal sobre 'riñones'.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión clave es antropológica: el inglés POB optó por un equivalente dinámico (''innermost being'') con nota literal. En español, ''su ser más íntimo'' o ''su interior'' se alinea mejor con esa racionalidad que ''sus entrañas'', manteniendo la nota sobre ''riñones''.'
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''Tú estás cerca en su boca'''
    rationale: Aunque literal, en español suena calcada. 'Estás cerca de boca' no existe, y 'en su boca' funciona mejor si el predicado se formula como 'te tienen cerca en la boca' o se conserva con una solución más natural que mantenga la imagen verbal.
  - severity: medium
    issue: '''Lejos de sus entrañas'' puede desviar el sentido antropológico'
    rationale: '''Entrañas'' mantiene corporeidad, pero en español moderno puede sugerir lo visceral o emotivo más que el ''ser interior o motivos ocultos'' que documenta la nota inglesa. Una formulación como ''lejos de su ser más íntimo'' comunica mejor el contraste fuente-sentido.'
  revised_spanish_text: Tú los plantaste; también echaron raíces. Crecen; también dan fruto. Tú estás cerca en su boca[a], pero lejos de su ser más íntimo.
  revised_footnotes:
