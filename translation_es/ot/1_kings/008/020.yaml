translation:
  language: es
  text: Yahvé ha cumplido la palabra que habló[a], y yo me he levantado en lugar de David, mi padre, y me he sentado en el trono de Israel, tal como habló Yahvé, y he edificado la casa[b] para el nombre de Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha establecido su palabra» o «ha llevado a cabo su palabra».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa»; es decir, el templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם / דְּבָרוֹ
  english_pob_choice: has fulfilled his word
  chosen_spanish: ha cumplido su palabra
  alternatives_spanish:
  - ha establecido su palabra
  - ha llevado a cabo su palabra
  lexicon: HALOT
  rationale: La construcción causativa con דבר en este contexto comunica que Yahvé hizo que su palabra se realizara. «Ha cumplido» conserva el valor de realización de la palabra divina sin perder la fuerza del verbo hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino revelado en el Tetragrama, conforme al criterio del proyecto. «Yahvé» evita la sustitución por un título y mantiene la referencia personal del texto.
- source_word: וָאָקֻם
  english_pob_choice: I have risen
  chosen_spanish: me he levantado
  alternatives_spanish:
  - he surgido
  - me he puesto en pie
  lexicon: HALOT
  rationale: En español, «me he levantado» comunica de manera natural la idea de tomar el lugar real de predecesión, manteniendo la relación verbal con קום sin sonar forzado.
- source_word: תַּחַת דָּוִד אָבִי
  english_pob_choice: in the place of David my father
  chosen_spanish: en lugar de David, mi padre
  alternatives_spanish:
  - en vez de David, mi padre
  - después de David, mi padre
  lexicon: HALOT
  rationale: «En lugar de» expresa la sucesión dinástica implícita en תחת sin añadir una nota interpretativa ajena al hebreo.
- source_word: עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: on the throne of Israel
  chosen_spanish: sobre el trono de Israel
  alternatives_spanish:
  - en el trono de Israel
  - sobre el trono de Israel
  lexicon: HALOT
  rationale: «Sobre el trono» reproduce bien la imagen hebrea del entronizado y funciona de forma natural en español.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh spoke
  chosen_spanish: tal como habló Yahvé
  alternatives_spanish:
  - tal como dijo Yahvé
  - justo como habló Yahvé
  lexicon: HALOT
  rationale: Se conserva la repetición de דבר con «habló», manteniendo el paralelismo verbal con «ha cumplido su palabra que había hablado».
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene «la casa» para respetar el término hebreo y su valor teológico. Aunque el referente es el templo, la metáfora de la casa se conserva sin necesidad de sustituirla por una glosa interpretativa.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: para el nombre de Yahvé
  alternatives_spanish:
  - en honor del nombre de Yahvé
  - para el nombre del Señor
  lexicon: HALOT
  rationale: La expresión bíblica «para el nombre de» se conserva porque tiene peso cultual y teológico propio; no se reduce a una idea general de honor.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable del título de pacto, sin necesidad de expansión.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de transliterar el Tetragrama como nombre propio. En este versículo, además, el paralelismo con «habló Yahvé» y «para el nombre de Yahvé» se mantiene coherente con la repetición del nombre divino en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'הַבַּיִת: traducción de la referencia al edificio sagrado'
  english_pob_reading: the house; that is, the temple
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa, es decir, el templo
  rationale: Se conserva la tensión lexical entre «casa» y su referente templario. El contexto basta para identificar el edificio, y la traducción no borra la imagen bíblica de la casa de Yahvé.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el estado revisado más reciente del inglés POB: se adopta la preferencia por un perfecto natural en primera línea («ha cumplido»), se conserva el paralelismo verbal con el segundo «habló», y se mantiene «la casa» en vez de sustituirla por «templo».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para el Tetragrama.
  - Se mantiene «la casa» como equivalente de הַבַּיִת, con aclaración en nota, para conservar la metáfora templaria.
  - «En lugar de» expresa la sucesión real sin introducir matices ajenos al texto.
  - El perfecto compuesto en español refleja bien el estado resultante de la acción divina y la declaración del rey.
