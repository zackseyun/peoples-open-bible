translation:
  language: es
  text: Entonces los hombres se levantaron de allí y miraron hacia abajo, hacia Sodoma[a], y Abraham iba con ellos para despedirlos en su camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miraron hacia Sodoma». El verbo hebreo sugiere mirar desde un punto elevado.
    reason: lexical_alternative
  - marker: b
    text: O «para acompañarlos al despedirse». La expresión hebrea se refiere a acompañar a los huéspedes que parten y enviarlos en su camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: El verbo de קום en este contexto narra el inicio de una nueva acción. «Se levantaron» conserva el movimiento narrativo sin añadir una idea más específica que el hebreo no exige.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: Es la equivalencia natural y directa para el adverbio locativo. «De allí» mantiene el cambio espacial con claridad.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los visitantes
  - los personajes
  lexicon: HALOT
  rationale: Se conserva el sustantivo ordinario del hebreo. Aunque el contexto más amplio identifique a estas figuras de otra manera, el texto aquí dice «los hombres» y esa tensión narrativa debe mantenerse.
- source_word: וַיַּשְׁקִפוּ
  english_pob_choice: looked down toward
  chosen_spanish: miraron hacia
  alternatives_spanish:
  - miraron desde lo alto hacia
  - miraron hacia abajo sobre
  lexicon: HALOT
  rationale: El hebreo sugiere mirar desde una posición elevada, pero en español una solución demasiado literal sonaría forzada. «Miraron hacia» conserva el movimiento de orientación, y la nota explica la posible implicación de altura.
- source_word: עַל־פְּנֵי סְדֹם
  english_pob_choice: toward Sodom
  chosen_spanish: hacia Sodoma
  alternatives_spanish:
  - en dirección a Sodoma
  - sobre Sodoma
  lexicon: HALOT
  rationale: La expresión idiomática apunta hacia Sodoma. «Hacia Sodoma» es natural en español y respeta el sentido direccional del hebreo sin perder la posible perspectiva elevada indicada por el verbo.
- source_word: הֹלֵךְ
  english_pob_choice: was walking
  chosen_spanish: iba
  alternatives_spanish:
  - andaba
  - estaba caminando
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «iba» comunica bien esa acción acompañante y evita una construcción más pesada.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: Traducción directa y natural del complemento preposicional con sufijo pronominal.
- source_word: לְשַׁלְּחָם
  english_pob_choice: to send them on their way
  chosen_spanish: para despedirlos
  alternatives_spanish:
  - para acompañarlos al salir
  - para verlos partir
  lexicon: HALOT
  rationale: El verbo en este contexto describe la costumbre de acompañar a los huéspedes al partir. «Despedirlos» en español recoge bien esa función relacional y hospitable sin añadir detalles ajenos al hebreo.
theological_decisions:
- issue: Identidad de הָאֲנָשִׁים en el contexto inmediato
  english_pob_reading: Render as 'the men' in the main text
  chosen_spanish_reading: Renderizar como «los hombres» en el texto principal
  alternative_spanish_readings:
  - los visitantes
  - los ángeles
  rationale: El hebreo usa el sustantivo común «hombres»; el versículo no los identifica explícitamente como ángeles. Mantener esa forma preserva la tensión narrativa y sigue la prioridad del texto fuente.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor de עַל־פְּנֵי סְדֹם y del verbo וַיַּשְׁקִפוּ
  english_pob_reading: looked down toward Sodom / looked out over Sodom
  chosen_spanish_reading: miraron hacia Sodoma
  alternative_spanish_readings:
  - miraron desde lo alto hacia Sodoma
  - miraron sobre Sodoma
  rationale: La referencia a una vista elevada está en el verbo, no necesariamente en la preposición. Por eso el texto principal se mantiene idiomático y la nota conserva la alternativa lexical.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje base sin necesidad de cambios posteriores: coincide con el control de revisión más reciente, que no introdujo modificaciones y fue confirmado por la verificación cruzada de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Sodoma» como topónimo estable.
  - Se evita introducir «ángeles» en el texto principal para respetar la designación explícita del hebreo.
  - «Despedirlos» conserva la cortesía de hospitalidad implícita en לְשַׁלְּחָם sin sobretraducirlo como simple movimiento físico.
