translation:
  language: es
  text: Por tanto, será noche para ustedes[a], sin visión, y oscuridad para ustedes, sin adivinación; el sol se pondrá para los profetas[b], y el día se oscurecerá sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de visión» / «de adivinación»; el hebreo puede leerse más literalmente, pero aquí probablemente expresa privación: «sin visión» y «sin adivinación».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el sol vendrá sobre los profetas»; el sentido idiomático es que el sol se pondrá o bajará para ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la consecuencia del reproche anterior; «Por tanto» conserva el valor inferencial del hebreo y su tono profético sin sonar demasiado coloquial.
- source_word: לַיְלָה
  english_pob_choice: it will be night
  chosen_spanish: será noche
  alternatives_spanish:
  - habrá noche
  - será de noche
  lexicon: HALOT
  rationale: El hebreo presenta un predicado nominal con sentido futuro de juicio; «será noche» reproduce esa brevedad poética en español.
- source_word: מֵחָזוֹן
  english_pob_choice: without vision
  chosen_spanish: sin visión
  alternatives_spanish:
  - privados de visión
  - sin revelación
  lexicon: HALOT
  rationale: Se mantiene la fuerza privativa que la POB inglesa entendió como privación de acceso revelatorio. «Visión» conserva el término técnico profético sin explicitar más de lo que el texto exige.
- source_word: וְחָשְׁכָה
  english_pob_choice: and darkness
  chosen_spanish: y oscuridad
  alternatives_spanish:
  - y se oscurecerá
  - y tinieblas
  lexicon: HALOT
  rationale: La POB inglesa tomó la forma verbal como expresión nominal paralela. «Oscuridad» conserva el paralelismo con «será noche» y evita una paráfrasis excesiva.
- source_word: מִקְּסֹם
  english_pob_choice: without divination
  chosen_spanish: sin adivinación
  alternatives_spanish:
  - sin sortilegios
  - sin adivinaciones
  lexicon: HALOT
  rationale: «Adivinación» es el equivalente estándar para קסם en contextos proféticos de denuncia. Mantiene la condena de prácticas oraculares ilícitas.
- source_word: וּבָאָה הַשֶּׁמֶשׁ עַל הַנְּבִיאִים
  english_pob_choice: the sun will go down on the prophets
  chosen_spanish: el sol se pondrá sobre los profetas
  alternatives_spanish:
  - el sol caerá sobre los profetas
  - el sol se esconderá sobre los profetas
  - el sol se irá sobre los profetas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «vendrá el sol», el sentido idiomático es la puesta del sol. «Se pondrá» conserva esa imagen natural y el matiz de cese de iluminación señalado en la POB inglesa.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - esos profetas
  lexicon: HALOT
  rationale: La forma definida sencilla basta en español; el contexto ya identifica a los profetas bajo juicio.
- source_word: וְקָדַר עֲלֵיהֶם הַיּוֹם
  english_pob_choice: and the day will grow dark over them
  chosen_spanish: y el día se oscurecerá sobre ellos
  alternatives_spanish:
  - y el día se pondrá oscuro sobre ellos
  - y el día se nublará sobre ellos
  lexicon: HALOT
  rationale: קדר comunica oscurecimiento o luto. «Se oscurecerá» preserva la imagen del día que pierde su claridad, en línea con la lectura inglesa del oscurecimiento judicial.
theological_decisions:
- issue: Sentido privativo de las preposiciones en «sin visión» y «sin adivinación»
  english_pob_reading: 'The Hebrew preposition can be rendered more literally, but here likely means deprivation: ''without vision'' and ''without divination.'''
  chosen_spanish_reading: «Sin visión» y «sin adivinación» expresan privación de don y de práctica oracular, no simple procedencia.
  alternative_spanish_readings:
  - «de visión» / «de adivinación»
  - «desde visión» / «desde adivinación»
  rationale: 'La cláusula describe juicio: se les quita el acceso a la revelación y a la adivinación. En español, «sin» comunica con claridad esa privación, manteniendo la tensión entre la literalidad de la preposición y el sentido contextual.'
  doctrine_reference: Juicio profético y cesación de revelación; cf. el contexto inmediato de la denuncia contra los profetas.
- issue: Imagen del sol y del día como lenguaje de juicio sobre los profetas
  english_pob_reading: The sun will go down on the prophets ... and the day will grow dark over them.
  chosen_spanish_reading: La puesta del sol y el oscurecimiento del día describen el fin de su iluminación y exposición bajo juicio.
  alternative_spanish_readings:
  - Un evento astronómico literal
  - Una metáfora meramente social de vergüenza
  rationale: El contexto trata de profetas y adivinación; por eso la oscuridad funciona primariamente como imagen del retiro de la revelación y del juicio divino, sin exigir un fenómeno cósmico literal.
  doctrine_reference: Juicio divino sobre falsos profetas; pérdida de luz revelatoria.
translation_notes:
  revision_awareness: La redacción sigue de cerca la decisión auditada de la POB inglesa de preservar el paralelismo poético y la lectura privativa de מִן en «sin visión» / «sin adivinación», y de tratar וּבָאָה הַשֶּׁמֶשׁ como modismo de puesta del sol. No se detectaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto cuando el texto no nombra explícitamente el Tetragrámaton.
  - Se mantiene «visión» como término técnico profético y «adivinación» para קֶסֶם/קסם.
  - Se conserva un registro poético y sobrio, evitando suavizar el juicio anunciado.
  - Las notas al pie solo señalan alternativas relevantes donde el español crea o conserva una ambigüedad real.
