translation:
  language: es
  text: Quien busca con diligencia el bien[a] halla favor[b], pero al que busca el mal, este le sobreviene[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «busca temprano el bien»; el verbo hebreo puede expresar búsqueda diligente o temprana.'
    reason: lexical_alternative
  - marker: b
    text: «Favor» puede referirse en sentido amplio a aceptación o buena voluntad, ya sea de Dios, de personas o de ambos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «el mal vendrá sobre él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחֵר
  english_pob_choice: diligently seeks
  chosen_spanish: con diligencia busca
  alternatives_spanish:
  - busca temprano
  - busca con empeño
  - se dedica a buscar
  lexicon: HALOT
  rationale: El participio expresa búsqueda intensa, atenta o diligente; «con diligencia busca» conserva esa fuerza sin reducirla al sentido temporal de «temprano», que en español podría sonar demasiado estrecho o cronológico.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - bondad
  - lo que es bueno
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona de modo sustantivado. «El bien» es una forma natural en español que preserva el alcance moral y práctico del objeto buscado.
- source_word: יְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - anda en busca de
  - persigue
  lexicon: HALOT
  rationale: «Buscar» reproduce bien el verbo hebreo y mantiene el paralelismo con la segunda mitad del versículo sin introducir un matiz innecesariamente técnico.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - aceptación
  - buena voluntad
  - gracia
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sustantivo puede abarcar aceptación o buena voluntad. «Favor» conserva esa amplitud en español y no fuerza una referencia exclusivamente divina o humana.
- source_word: וְדֹרֵשׁ
  english_pob_choice: but the one who searches for
  chosen_spanish: pero el que lo busca
  alternatives_spanish:
  - y el que busca
  - pero el que procura
  - pero quien lo persigue
  lexicon: HALOT
  rationale: La conjunción formal es «y», pero el paralelismo antitético exige «pero» en español. El pronombre «lo» representa de manera natural el antecedente implícito de lo malo/evil buscado, evitando una repetición pesada.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - lo malo
  - daño
  lexicon: HALOT
  rationale: «El mal» preserva tanto la dimensión moral como la posibilidad de consecuencia dañina, dejando abierta la amplitud semántica del hebreo en este dicho sapiencial.
- source_word: תְבוֹאֶנּוּ
  english_pob_choice: evil comes to the one who searches for it
  chosen_spanish: viene sobre el que lo busca
  alternatives_spanish:
  - le sobreviene
  - cae sobre el que lo busca
  - viene a él
  lexicon: HALOT
  rationale: El verbo expresa la llegada o venida inevitable del mal al buscador. «Viene sobre» comunica con naturalidad en español la idea proverbial de que el mal recae sobre esa persona.
theological_decisions:
- issue: Alcance de רָצוֹן (favor)
  english_pob_reading: Rendered broadly as 'favor' without specifying whether human or divine.
  chosen_spanish_reading: «favor» sin especificar si procede de Dios, de personas o de ambos.
  alternative_spanish_readings:
  - favor de Dios
  - favor de la gente
  - aceptación
  rationale: El hebreo no identifica el origen del favor. Mantenerlo abierto evita resolver artificialmente una tensión interpretativa que el texto no resuelve y conserva la amplitud sapiencial del proverbio.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: La versión española sigue la lectura POB de paralelismo antitético y mantiene la amplitud semántica de רָצוֹן y רָעָה. Se evita una traducción mecánica de la glosa inglesa; en particular, se conserva el posible matiz de búsqueda diligente del participio שֹׁחֵר y se deja abierto el referente del «favor».
  spanish_consistency_notes:
  - Se usa «favor» como término POB para רָצוֹן, no «gracia» ni «aceptación», porque el contexto no especifica el origen del favor.
  - Se prefiere «el mal» para רָעָה por su rango moral y sus posibles implicaciones de daño o calamidad.
  - El antitético «pero» refleja la función de וְ en este proverbio, aunque el hebreo tenga una simple conjunción.
  - La frase «el que lo busca» evita repetir «el mal» de modo pesado y mantiene la referencia al objeto buscado.
