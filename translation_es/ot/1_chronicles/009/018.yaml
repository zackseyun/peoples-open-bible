translation:
  language: es
  text: Hasta entonces[a] estaban en la puerta del rey, al oriente; ellos eran los porteros de los campamentos[b] de los hijos de Leví.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hasta entonces» recoge el matiz temporal de continuidad del hebreo; también podría entenderse «Hasta ahora» o «Hasta ese momento».
    reason: lexical_alternative
  - marker: b
    text: O «para los campamentos» o «para las compañías de los hijos de Leví». El término hebreo puede denotar campamentos o divisiones organizadas, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד הֵנָּה
  english_pob_choice: Until then
  chosen_spanish: Hasta entonces
  alternatives_spanish:
  - Y hasta ahora
  - Hasta ese momento
  lexicon: HALOT
  rationale: La locución hebrea expresa una continuidad temporal hasta un punto señalado; «Hasta entonces» conserva ese valor retrospectivo de manera natural en español.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: at the king’s gate
  chosen_spanish: en la puerta del rey
  alternatives_spanish:
  - en la puerta real
  - junto a la puerta del rey
  lexicon: HALOT
  rationale: שַׁעַר es «puerta» o «portal», y la construcción con ב indica localización; «en la puerta del rey» mantiene la referencia constructa sin forzar una paráfrasis.
- source_word: מִזְרָחָה
  english_pob_choice: on the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al este
  - al oriente
  lexicon: HALOT
  rationale: La forma direccional apunta a orientación espacial. «Hacia el oriente» comunica bien la dirección/eje del lugar y suena natural en español bíblico contemporáneo.
- source_word: הֵמָּה
  english_pob_choice: they were
  chosen_spanish: ellos eran
  alternatives_spanish:
  - eran ellos
  - ellos estaban
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y funciona en una cláusula sin verbo expreso; en español conviene suplir la cópula para mantener claridad sin perder el énfasis identificador.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardias de la puerta
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: En este contexto administrativo-cultual, «porteros» es un equivalente tradicional y claro en español para quienes custodian las puertas. Mantiene la función sin endurecer el término con una lectura militar.
- source_word: לְמַחֲנוֹת
  english_pob_choice: for the camps
  chosen_spanish: de los campamentos
  alternatives_spanish:
  - para los campamentos
  - de las huestes
  lexicon: HALOT
  rationale: El hebreo puede referir campamentos o agrupaciones organizadas. Se conserva «campamentos» como reflejo más directo del sustantivo, sin imponer una interpretación más administrativa que el texto no exige aquí.
- source_word: בְּנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los descendientes de Leví
  - los levitas
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «hijos de Leví». «Hijos de Leví» preserva la forma genealógica y el paralelismo del original mejor que la generalización «levitas».
translation_notes:
  revision_awareness: El audit trail inglés osciló entre «divisions» y «camps» para מַחֲנוֹת; la revisión más reciente volvió a «camps». La redacción española sigue esa decisión y conserva la referencia a los «campamentos» de los hijos de Leví. También se integraron notas breves para reflejar las alternativas temporales y léxicas documentadas en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Leví» como forma española estándar del nombre propio.
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton.
  - Se prefirió una sintaxis directa y publicable sin perder el orden lógico del hebreo.
