translation:
  language: es
  text: Y las aguas volvieron y cubrieron los carros y los jinetes[a], a todo el ejército de Faraón que había ido tras ellos en el mar; no quedó de ellos ni uno solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la caballería» para «los jinetes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - se volvieron
  lexicon: HALOT
  rationale: שוב aquí describe el retorno de las aguas a su lugar; «volvieron» es natural en español y conserva el movimiento narrativo sin forzar una interpretación adicional.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo tiene sentido concreto y dramático en este pasaje; «las aguas» mantiene el cuadro del mar cerrándose sobre los egipcios.
- source_word: וַיְכַסּוּ
  english_pob_choice: covered
  chosen_spanish: cubrieron
  alternatives_spanish:
  - taparon
  - sepultaron
  lexicon: HALOT
  rationale: כסה significa «cubrir». «Cubrieron» reproduce el sentido básico sin ampliar a «sepultaron», que sería más interpretativo.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - la carroza militar
  lexicon: HALOT
  rationale: En español bíblico, «carros» es claro y natural para רכב; evita el giro más técnico «carros de guerra», aunque ese matiz está implícito por el contexto militar.
- source_word: הַפָּרָשִׁים
  english_pob_choice: the horsemen
  chosen_spanish: los jinetes
  alternatives_spanish:
  - la caballería
  - los soldados montados
  lexicon: HALOT
  rationale: פָּרָשִׁים son guerreros montados. «Jinetes» es directo y entendible; «caballería» sería más colectivo e interpretativo.
- source_word: לְכֹל חֵיל פַּרְעֹה
  english_pob_choice: all the army of Pharaoh
  chosen_spanish: todo el ejército de Faraón
  alternatives_spanish:
  - toda la fuerza de Faraón
  - todas las tropas de Faraón
  lexicon: HALOT
  rationale: חֵיל aquí tiene sentido militar. «Todo el ejército de Faraón» conserva el totalizador de לְכֹל y el sentido bélico del término.
- source_word: הַבָּאִים אַחֲרֵיהֶם בַּיָּם
  english_pob_choice: that had gone after them into the sea
  chosen_spanish: que había entrado tras ellos en el mar
  alternatives_spanish:
  - que iba tras ellos por el mar
  - que había ido detrás de ellos al mar
  lexicon: HALOT
  rationale: El participio en contexto expresa a los perseguidoras ya metidos en el mar. «Había entrado tras ellos» refleja bien la secuencia narrativa sin volverla demasiado literal en español.
- source_word: לֹא נִשְׁאַר בָּהֶם עַד אֶחָד
  english_pob_choice: Not one of them remained
  chosen_spanish: no quedó de ellos ni uno
  alternatives_spanish:
  - no permaneció entre ellos ni uno
  - no quedó entre ellos uno solo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica totalidad. «No quedó de ellos ni uno» es idiomático en español y preserva el énfasis sin añadir explicación.
theological_decisions:
- issue: Alcance de la destrucción del ejército egipcio
  english_pob_reading: 'The verse states total destruction of the Egyptian force that entered the sea after Israel: not one of that group remained.'
  chosen_spanish_reading: 'El versículo afirma la destrucción total de la fuerza de Faraón que entró en el mar tras Israel: no quedó de ese grupo ni uno.'
  alternative_spanish_readings:
  - El versículo podría entenderse como una afirmación menos amplia, limitada al grupo que persiguió a Israel y entró en el mar.
  - También podría leerse como una afirmación absoluta sobre todo Egipto, pero el hebreo la vincula al ejército que iba tras ellos.
  rationale: La sintaxis hebrea ata la cláusula final al grupo descrito antes. La traducción mantiene la totalidad enfática del texto sin extenderla más allá del ejército perseguidores mencionado.
  doctrine_reference: Éxodo 14:28; total destrucción del contingente perseguidor
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al evitar una ruptura de oración innecesaria y al mantener una cláusula final fluida. También conserva la relación estrecha entre el ejército de Faraón y la frase «que había entrado tras ellos en el mar», sin ampliar el alcance más allá de lo que dice el hebreo.
  spanish_consistency_notes:
  - Se usó «Faraón» de forma consistente para פַּרְעֹה.
  - Se prefirió «las aguas» por el plural hebreo y la imagen narrativa.
  - «No quedó de ellos ni uno» conserva la fuerza totalizadora de עַד אֶחָד sin calco rígido.
  - 'El término militar se tradujo con un registro bíblico claro y contemporáneo: «carros», «jinetes», «ejército».'
