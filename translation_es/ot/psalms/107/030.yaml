translation:
  language: es
  text: Entonces se alegraron de que se aquietaran[a], y él los llevó a su puerto anhelado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se calmaran»; el verbo puede entenderse de las aguas o las olas que se vuelven quietas.
    reason: lexical_alternative
  - marker: b
    text: O «al puerto que deseaban» o «al refugio que anhelaban».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: Then they were glad
  chosen_spanish: Entonces se alegraron
  alternatives_spanish:
  - Y se regocijaron
  - Así se alegraron
  lexicon: HALOT
  rationale: שׂמח expresa alegría o gozo. «Se alegraron» comunica bien el resultado emocional en español y conserva el avance narrativo de la forma wayyiqtol con «Entonces».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de la alegría: se alegraron de que... En español, «de que» mantiene la relación subordinante sin forzar un matiz causal único.'
- source_word: יִשְׁתֹּקוּ
  english_pob_choice: they grew quiet
  chosen_spanish: se aquietaran
  alternatives_spanish:
  - se callaran
  - se calmaran
  lexicon: HALOT
  rationale: שׁתק denota callarse o aquietarse; en este contexto poético marino, «aquietarse» comunica el cese del estruendo o agitación sin añadir explícitamente «olas» o «aguas», como hizo la revisión inglesa al evitar un sujeto añadido.
- source_word: וַיַּנְחֵם
  english_pob_choice: and he led them
  chosen_spanish: y él los llevó
  alternatives_spanish:
  - y él los condujo
  - y él los guió
  lexicon: HALOT
  rationale: נחה significa guiar o conducir. «Los llevó» es natural en español y preserva la agencia personal del sujeto implícito, entendido en el contexto como Dios/Yahvé.
- source_word: אֶל מְחוֹז
  english_pob_choice: to their desired haven
  chosen_spanish: al puerto
  alternatives_spanish:
  - al refugio
  - al haven
  lexicon: HALOT
  rationale: מְחוֹז designa un lugar de llegada o puerto/abrigo seguro. «Puerto» es la opción más transparente en español para un marco marítimo, sin perder el sentido de llegada segura.
- source_word: חֶפְצָם
  english_pob_choice: their desired
  chosen_spanish: de su deseo
  alternatives_spanish:
  - deseado
  - anhelado
  lexicon: HALOT
  rationale: חפץ expresa deseo, deleite o anhelo. «De su deseo» conserva de forma abierta la idea de un destino anhelado y evita cerrar demasiado el matiz en una sola adjetivación.
theological_decisions:
- issue: Sujeto implícito de וַיַּנְחֵם
  english_pob_reading: The subject is rendered as 'he,' referring to God in the psalm's context.
  chosen_spanish_reading: Se mantiene «él» como sujeto implícito referido a Dios en el contexto del salmo.
  alternative_spanish_readings:
  - se los llevó
  - Dios los llevó
  rationale: El verbo hebreo está en tercera masculina singular y el contexto del salmo atribuye la conducción al actuar de Yahvé. «Él» conserva la agencia personal sin añadir un nombre que el versículo no explicita.
  doctrine_reference: Salmo 107:23-32; traducción con sujeto divino implícito
- issue: Interpretación del segundo hemistiquio
  english_pob_reading: they grew quiet
  chosen_spanish_reading: se aquietaran
  alternative_spanish_readings:
  - se calmaran
  - quedaran quietos
  rationale: El hebreo usa un verbo intransitivo sin objeto explícito; el contexto marítimo sugiere la cesación de la tempestad o del movimiento. «Aquietarse» preserva esa tensión sin introducir más de lo que el verso dice.
  doctrine_reference: Salmo 107:29-30; economía textual
- issue: מְחוֹז חֶפְצָם
  english_pob_reading: their desired haven
  chosen_spanish_reading: el puerto de su deseo
  alternative_spanish_readings:
  - su puerto anhelado
  - el refugio de su deseo
  rationale: La frase hebrea puede entenderse como un destino/puerto deseado. «Puerto de su deseo» mantiene el campo semántico marítimo y, a la vez, deja visible el componente de anhelo o deseo.
  doctrine_reference: Hebreo poético; metáfora marítima
translation_notes:
  revision_awareness: La versión inglesa final retiró «the waters» para no añadir un sujeto explícito que el hebreo no menciona; esta versión española sigue esa revisión y evita introducir «aguas» u «olas» en el texto principal, dejando esa posibilidad en nota. También conserva el destino marítimo con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino en la línea doctrinal, pero en el texto del verso el sujeto queda en el pronombre implícito, conforme al hebreo y al audit trail inglés.
  - Se eligió una construcción subordinada con «de que» para reflejar el enlace de כִּי sin sobredeterminar la relación causal.
  - «Aquietarse» se prefirió sobre «callarse» porque funciona mejor con el contexto del mar y mantiene dignidad poética.
  - «Puerto de su deseo» conserva la imagen de destino deseado sin introducir una paráfrasis amplia.
