  to: Y los sacerdotes, los profetas y todo el pueblo oyeron a Jeremías hablar estas palabras en la casa de Yahvé[a].
  rationale: Se ajusta la sintaxis a un español más natural y claro sin alterar el sentido del hebreo. «Oyeron a Jeremías hablar» preserva adecuadamente la idea de que lo oyeron en el acto de pronunciar esas palabras, y se simplifica la puntuación coordinada conforme al estilo español legible. La nota sobre «templo» se mantiene porque refleja una alternativa contextual válida preservada en el rastro de auditoría inglés.
