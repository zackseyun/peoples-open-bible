source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Ecce loquere in aures plebi meae sermones prophetiae

    2 quos inmisero in os tuum, dicit dominus, Et fac ut in carta

    3 scribantur, quoniam fideles et ueri sunt. Ne timeas a cogitationibus aduersum te, nec turbent te incredulitates, contra dicentium. Quoniam omnis incredulus in incredulitate sua morietur. Ecce ego induco, dicit dominus, super orbem terrarum mala, gladium et famem et mortem et interitum, Propter quod superposuit iniquitas omnem terram, et adimpleta sunt opera nocua illorum. Propterea dicit dominus: Iam non silebo in impietatibus eorum quae inreligiose agunt, nec sustinebo in his quae inique exercent. ecce sanguis innoxius et iustus clamat ad me, et animae iustorum clamant perseueranter. Vindicans uindicabo illos, dicit dominus, et accipiam omnem sanguinem innoxium ex illis ad me. Ecce populus meus quasi grex ad occisionem ducitur; iam non patiar illum habitare in terra Aegypti, Sed educam eum in manu potenti et brachio excelso, et percutiam Aegyptum plaga sicut prius, et corrumpam omnem terram eius. Lugeat Aegyptus et fundamenta eius a plaga uerberationis et castigationis quam inducit dominus. Lugeant cultores operantes terram, quoniam deficient semina eorum, et uastabuntur ligna eorum ab uredine et grandine et a sidus terribile. Vae saeculo et qui inhabitant in eum! Quia adpropinquauit gladius et contritio eorum, et exsurget gens super gentem ad pugnam, et rumphea in manibus eorum. Erit enim inconstabilitio hominibus; alii aliis inualescentes non curabunt regem suum et principem megestanorum suorum in potentia sua. Concupiscet enim homo in ciuitatem ire et non poterit. Propter superbiam enim eorum ciuitates turbabuntur, domus exterentur, homines metuent. Non miserebitur homo proximum suum ad impetum faciendum in domos eorum in gladium, ad diripiendas substantias eorum propter famem panis et tribulationem multam. Ecce ego conuoco, dicit deus, omnes reges terrae ad me uerendum ab oriente et ab austro, ab euro et a libano, ad conuertendos se et reddere quae dederunt illis. Sicut faciunt usque hodie electis meis, sic faciam et reddam in sinu eorum. haec dicit dominus deus: Non parcet dextera mea super peccantes, nec cessabit rumphaea super effundentes sanguinem innocuum super terram. Et exiit ignis ab ira eius et deuorauit fundamenta terrae et peccatores quasi stramen incensum. Vae eis qui peccant et non obseruant mandata mea, dicit dominus; Non parcam illis. discedite filii apostatae, nolite contaminare sanctificationem meam. Quoniam nouit dominus omnes qui derelinquunt in illum, propterea tradidit eos in mortem et in occisionem. Iam enim uenerunt super orbem terrarum mala, et manebitis in illis, non enim liberabit uos deus propter quod peccastis in eum. Ecce uisio horribilis, et facies illius ab oriente! Et exient nationes draconum Arabum in curris multis, et sibilatus eorum a die itineris fertur super terram, ut etiam timeant et trepidentur omnes, qui illos audient. Carmonii insanientes in ira exient ut apri de silua et aduenient in uirtute magna et constabunt in pugnam cum illis et uastabunt portionem terrae Assyriorum in dentibus suis. Et post haec superualescent dracones natiuitatis menores suae, et si conuerterint se conspirantes in uirtute magna ad persequendos eos, Et isti turbabuntur et silebunt in uirtute illorum et conuertent pedes suos in fugam, Et a territorio Assyriorum subsessor obsidebit illos et consumet unum ex illis, et erit timor et tremor in exercitum illorum et inconstantia in reges ipsorum. Ecce nubs ab oriente et a septentrione usque ad meridianum et facies illorum horrida ualde, plena irae et procellae; Et conlident se inuicem et effundent sidus copiosum super terram et sidus illorum, et erit sanguis a gladio usque ad uentrem equi Et femur hominis et suffraginem cameli, et erit timor et tremor multus super terram, Et horrebunt qui uidebunt iram illam, et tremor adprehendit illos. et post haec mouebuntur nimbi copiosi A meridiano et septentrione et portio alia ab occidente. Et superinualescent uenti ab oriente et recludent eum et nubem quam suscitauit in ira, et sidus ad faciendam exteritionem ab orientalem notum et occidentem uiolabitur. Et exaltabuntur nubes magnae et ualidae plenae irae et sidus, ut exterant omnem terram et inhabitantes eam, et fundent super omnem altum et eminentem sidus terribile, Ignem et grandinem et rumph[e]as uolantes et aquas multas, ut etiam impleantur omnes

    4 quoniam omnis incredulus in incredulitate sua morietur.

    5 ecce ego induco, dicit Dominus, super orbem terrarum mala, gladium et famem et mortem et interitum,

    6 propter quod superposuit iniquitas omnem terram et adimpletae sunt operationes eorum.

    7 propterea dicit Dominus:

    8 iam non silebo impietates eorum quae inreligiose agunt, nec sustinebo in his quae inique exercent. ecce sanguis innoxius et iustus clamat ad me, et animae iustorum clamant perseveranter.

    9 vindicans vindicabo illos, dicit Dominus, et accipiam omnem sanguinem innocuum ex illis ad me.

    10 ecce populus meus quasi grex ad occisionem ducitur. iam non patiar illum habitare in terra Aegypti,

    11 sed educam eum in manu potenti et brachio excelso, et percutiam Aegyptum plaga sicut prius, et corrumpam terram omnem eius.

    12 lugeat Aegyptus et fundamenta eius a plaga verberati et mastigati quam inducet Dominus.

    13 lugeant cultores operantes terram, quoniam deficient semina eorum et vastabuntur ligna eorum ab uredine et grandine et a sidus terribile.

    14 vae saeculo et qui habitant in eum.

    15 quia adpropinquavit gladius et extritio illorum, et exsurget gens contra gentem ad pugnam, et romphea in manibus eorum.

    16 erit enim constabilitio hominibus, alisalios supervalescentes non curabunt regem suum et principem megestanorum suorum in potentia sua.

    17 concupiscet enim homo in civitatem ire et non poterit.

    18 propter superbiam enim eorum civitates turbabuntur, domus exterentur, homines metuent.

    19 non miserebitur homo proximo suo ad irritum faciendum in domos eorum in gladium, ad diripiendas substantias eorum propter famem panis et tribulationem multam.

    20 ecce ego convoco, dicit Deus, omnes reges terrae ad movendum, qui sunt a borea et a noto et ab euro et a libano, ad convertendos in se et reddere quae dederunt illis.

    21 sicut faciunt usque hodie electis meis, sic faciam et reddam in sinum ipsorum. haec dicit Dominus Deus:

    22 non parcet dextera mea super peccantes nec cessabit romphea super effundentes sanguinem innocuum super terram.

    23 et exiit ignis ab ira eius et devoravit fundamenta terrae et peccatores quasi stramen incensum.

    24 vae eis qui peccant et non observant mandata mea, dicit Dominus,

    25 non parcam illis, discedite, filii apostatae, nolite contaminare sanctificationem meam.

    26 novit Deus qui peccantin eum, propterea tradet eos in mortem et in occisionem.

    27 iam enim venerunt super orbem terrarum mala, et manebitis in illis; non enim liberabit vos Deus, propter quod peccastis in eum.

    28 ecce visio horribilis, et facies illius ab oriente.

    29 et exient nationes draconum Arabum in curris multis, et sibilatus eorum a die itinerisfertur super terram, ut etiam timeant et trepidentur omnes qui illos audient.

    30 Carmonii insanientes in ira exient de silva et advenient in virtute magna et constabunt in pugnam cum illis et vastabunt portionem terrae Assyriorum in dentibus suis.

    31 et post haec supervalescet draco nativitatis memoria suae, et si converterint se conspirantes in virtute magna ad persequendos eos,

    32 et isti turbabuntur et silebunt in virtute illorum et convertent pedes suos in fugam,

    33 et a territorio Assyriorum subsessor subsedebiteos et consumet unum ex illis, et erit timor et tremor in exercitum illorum et inconstabilitio in regno illorum.

    34 ecce nubs ab oriente et a septentrione usque ad meridianum, et facies illorum horrida valde, plena irae et procellae.

    35 et conlident se invicem et effundent sidus copiosum super terram et sidus illorum, et erit sanguis a gladio usque ad ventrem equi

    36 et femur hominis et suffraginem cameli. et erit timor et tremor multus super terram,

    37 et horrebunt qui videbunt iram illam, et tremor adprehendet illos. et post haec movebuntur nimbi copiosi

    38 a meridiano et septentrione, et portio alia ab occidente.

    39 et superinvalescent venti ab oriente et recludent eum et nubem quam suscitavit in ira, et sidus ad faciendam exteritionem ab orientalem notum et occidentem violabitur.

    40 et exaltabuntur nubes magnae et validae plenaeirae et sidus, ut exterant omnem terram et inhabitantes eam, et fundent super omnemaltum et eminentem sidus terribile.

    41 ignem et grandinem et rompheas volantes et aquas multas, ut etiam impleantur omnes campi et omnes rivi a plenitudine aquarum illarum.

    42 campi et omnes ruii plenitudine aquarum illarum. Et demolient ciuitates et muros et montes et colles et ligna siluarum et fena

    43 pratorum et frumenta eorum. Et transibunt constanter usque

    44 Babylonem et exterent eam. Conuenient ad ipsam et circuibunt eam et effundent sidus et omnem iram super eam, et subibit puluis et fumus usque ad caelum, et omnes in circuitu lugebunt

    45 eam. Et qui subremanserint seruient his qui eam exteruerunt.

    46 Et tu Asia consors in specie Babylonis et gloria personae

    47 eius, Vae tibi, misera, propter quod adsimilasti ei, ornasti filias tuas in fornicatione ad placendum et gloriandum in amatoribus

    48 tuis qui te cupierunt semper. Fornicarian odibilem imitata es in omnibus operibus eius et adinuentionibus eius; propterea dicit

    49 deus: Inmittam tibi mala, uiduitatem, paupertatem et famem et gladium et pestem ad deuastandas domus tuas, ad uiolationem

    50 et mortem. Et gloria uirtutis tuae sicut flos siccabitur, cum

    51 exsurget ardor qui emissus est super te. Et infirmaberis et paupera a plaga et mastigata a uulneribus, ut non possis tuos

    52 suscipere potentes et amatores. Numquid ego sic zelabo te,

    53 dicit dominus, Nisi occidisses electos meos in omni tempore, exultans percussione manuum et dicens super mortem eorum

    54 cum inebriata es? Exorna speciem uultus tui! Merces fornicariae in sinus tuos, propterea redditionem recipies. Sicut facies electis meis, dicit dominus, sic faciet tibi deus et tradet te in malis. Et nati tui fame interient, et tu rumphea cades, et

    55 merces fornicariae in sinus tuos, propterea redditionem percipies.

    56 sicut facies electis meis, dicit Dominus, sic faciet tibi Deus et tradet te in malis.

    57 ciuitates tuae conterentur, et omnes tui in campo gladio cadent; Et qui sunt in montibus fame peribunt, et manducabunt carnes

    58 suas et sanguinem bibent a fame panis et siti aquae. Infelix

    59 primaria uenies, et rursum accipies mala. Et in transitu

    60 allident ciuitatem otiosam et exterent aliquam portionem terrae tuae et partem gloriae tuae exterminabunt rursum reuertentes a Babylonia subuersa. Et demolita eris illis pro stipula et ipsi

    61 erunt tibi ignis. Et deuorabunt te et ciuitates tuas, terram

    62 tuam et montes tuos, omnes siluas tuas et lignum fructiferum igni conburent. Filios tuos captiuos ducent et censum tuum

    63 praeda habebunt et gloriam faciei tuae exterminabunt.'
  language: Latin
  chapter: 15
  verse_count: 63
  witness_situation: Latin is the only extant witness for this chapter (Christian addition, Latin only). No Syriac/Ethiopic/Arabic/Armenian/Georgian apparatus applies.
  note: Verse-numbered cleaned Latin loaded from sources/2esdras/latin/transcribed/. Chapter 7 includes 7:36-105 restored from Bensly 1875.
translation:
  text: '1 Behold[a], speak in the ears of my people the words of prophecy

    2 that I will put into your mouth, says the Lord, and cause them to be written on a scroll,

    3 because they are faithful and true. Do not fear the schemes against you, and do not let the unbelief of those who speak against you trouble you.

    4 For every unbeliever will die in his unbelief.

    5 Behold, I am bringing evils upon the world, says the Lord: sword and famine and death and destruction,

    6 because iniquity has spread over the whole earth, and their harmful works have been brought to fullness.

    7 Therefore the Lord says:

    8 I will no longer keep silent about their impieties, which they practice irreligiously, nor will I endure the things they carry out unjustly. Behold, innocent and righteous blood cries out to me, and the souls of the righteous cry out continually.

    9 In avenging I will avenge them, says the Lord, and I will take to myself from them all innocent blood.

    10 Behold[b], my people are being led like a flock to the slaughter. I will no longer allow them to dwell in the land of Egypt,

    11 but I will lead them out with a mighty hand and an uplifted arm, and I will strike Egypt with a plague as before, and I will ruin all its land.

    12 Let Egypt mourn, and its foundations, because of the plague of beating and chastisement that the Lord will bring upon it.

    13 Let the farmers who work the ground mourn, because their seed will fail, and their trees will be laid waste by blight and hail and by a dreadful star.

    14 Woe to the age and to those who dwell in it!

    15 For the sword and their destruction are near, and nation will rise against nation for battle, with broadswords in their hands.

    16 For there will be instability among men; overpowering one another, they will pay no attention to their king, nor to the chief men among them, in their power.

    17 A man will desire to go into a city and will not be able.

    18 For because of their pride the cities will be thrown into confusion, the houses will be destroyed, and men will be afraid.

    19 A man will have no pity on his neighbor, but will rush upon their houses with the sword, plundering their possessions because of hunger for bread and great distress.

    20 Behold, I am summoning, says God, all the kings of the earth to stir themselves up, those from the north and the south and the east and Lebanon, to turn themselves against one another and repay what they have given them.

    21 As they do to my chosen ones to this day, so I also will do and repay into their bosom. Thus says the Lord God:

    22 My right hand will not spare the sinners, and the broadsword will not cease from those who pour out innocent blood upon the earth.

    23 And fire went out from his wrath and devoured the foundations of the earth and sinners like straw set ablaze.

    24 Woe to those who sin and do not keep my commandments, says the Lord.

    25 I will not spare them. Depart, you apostate children; do not defile my sanctuary.

    26 For God knows those who sin against him; therefore he will hand them over to death and to slaughter.

    27 For already evils have come upon the world, and you will remain in them; for God will not deliver you, because you have sinned against him.

    28 Behold, a dreadful vision, and its appearance is from the east.

    29 And nations of Arabian dragons will come out with many chariots, and their hissing is carried over the earth from the day of their march, so that all who hear them will fear and tremble.

    30 The Carmonians, raging in wrath, will come out from the forest, and they will come with great force and stand for battle against them, and they will lay waste the portion of the land of the Assyrians with their teeth.

    31 And after this the dragon, mindful of its birth, will prevail; and if they turn themselves, conspiring in great force to pursue them,

    32 then these will be thrown into confusion and be silenced by their strength, and they will turn their feet to flight.

    33 And from the territory of the Assyrians an ambusher will lie in wait for them and consume one of them, and there will be fear and trembling in their army and instability in their kingdom.

    34 Behold, clouds from the east and from the north as far as the south, and their appearance is very dreadful, full of wrath and storm.

    35 And they will strike one another and pour out a heavy star upon the earth, even their star, and there will be blood from the sword up to the horse''s belly

    36 and to a man''s thigh and a camel''s hock.

    37 And there will be great fear and trembling upon the earth, and those who see that wrath will shudder, and trembling will seize them. After this mighty storm-clouds will be stirred up

    38 from the south and from the north, and another part from the west.

    39 And the winds from the east will grow strong and shut it in, and the cloud that he raised up in wrath, and the star appointed to bring destruction toward east and west, will be thrown into confusion.

    40 And great and mighty clouds will be lifted up, full of wrath and star, to destroy all the earth and those who dwell in it, and they will pour out upon every high and lofty place a dreadful star,

    41 fire and hail and flying broadswords and many waters, so that all the fields and all the rivers will be filled from the abundance of those waters.

    42 And they will tear down cities and walls, mountains and hills, trees of the forests and grass of the meadows and their grain.

    43 And they will press steadily on to Babylon and destroy her.

    44 They will gather against her and surround her and pour out star and all wrath upon her, and dust and smoke will go up to heaven, and all around her will mourn her.

    45 And those who survive will serve those who destroyed her.

    46 And you, Asia, partner in Babylon''s splendor and in the glory of her person—

    47 woe to you, miserable one, because you made yourself like her and adorned your daughters for prostitution, to please and glory in your lovers who always desired you.

    48 You have imitated that hateful prostitute in all her works and devices; therefore God says:

    49 I will send evils upon you: widowhood and poverty and famine and sword and pestilence, to lay waste your houses with violation

    50 and death. And the glory of your strength will dry up like a flower when the heat rises that has been sent out against you.

    51 And you will be weakened, poor from the plague and scourged with wounds, so that you will not be able to receive your mighty ones and your lovers.

    52 Would I have been so jealous against you, says the Lord,

    53 if you had not killed my chosen ones at all times, exulting with the striking of your hands and speaking over their death when you were drunk?

    54 Adorn your face''s beauty! The wages of prostitution are in your bosom; therefore you will receive repayment.

    55 As you do to my chosen ones, says the Lord, so God will do to you and will hand you over to evils. And your children will die of hunger, and you will fall by the broadsword.

    56 Your cities will be shattered, and all yours in the field will fall by the sword.

    57 And those in the mountains will perish by famine and will eat their own flesh

    58 and drink their own blood because of hunger for bread and thirst for water. Unhappy one, as chief among women you will come, and again you will receive evils.

    59 And in passing they will dash against the idle city and destroy some part of your land, and they will again wipe out part of your glory as they return from devastated Babylon.

    60 And you will be broken down by them like stubble, and they will be to you like fire.

    61 And they will devour you and your cities, your land and your mountains; all your forests and your fruitful trees they will burn with fire.

    62 Your children they will carry away captive, and your wealth they will take as spoil[c][d][e][f][g],

    63 and they will wipe out the glory of your face.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Latin sanctificationem meam is literally 'my sanctification' or 'my holy thing.' The rendering 'my sanctuary' takes it concretely in this context of defilement, but the phrase may more broadly denote what belongs to God's holiness.
    reason: lexical_alternative
    anchor_ref: '15:25'
  - marker: b
    text: The phrase 'nations of Arabian dragons' follows the difficult Latin nationes draconum Arabum closely. The imagery may be symbolic, monstrous, or ethnographic in a way no longer fully recoverable from the Latin alone.
    reason: textual_variant
    anchor_ref: '15:29'
  - marker: g
    text: The clause about 'the dragon, mindful of its birth' is textually obscure. The translation preserves the strange image rather than replacing it with a smoother conjecture.
    reason: textual_variant
    anchor_ref: '15:31'
  - marker: f
    text: Latin sidus is singular here and throughout this section. It can mean 'star,' but in apocalyptic context it may also function as a celestial portent. The translation keeps 'star' to preserve the imagery.
    reason: lexical_alternative
    anchor_ref: '15:35'
  - marker: e
    text: This verse is one of the chapter's harder Latin cruxes. The rendering reflects a best-effort sense of cosmic forces being shut in and thrown into disorder, but the syntax and referents are uncertain.
    reason: textual_variant
    anchor_ref: '15:39'
  - marker: d
    text: The address to Asia as Babylon's partner reflects a compositional layer distinct from the Jewish core of 4 Ezra. The rhetoric here belongs to the later Latin Christian appendix commonly called 6 Ezra.
    reason: compositional_layer
    anchor_ref: '15:46'
  - marker: c
    text: The phrase rendered 'chief among women' translates the difficult Latin primaria. It likely mocks Asia's former prominence or rank, but the exact nuance is uncertain.
    reason: lexical_alternative
    anchor_ref: '15:58'
lexical_decisions:
- source_word: carta
  chosen: scroll
  alternatives:
  - book
  - document
  lexicon: Lewis & Short
  rationale: In prophetic context the command is to commit the oracle to writing on a physical writing medium; 'scroll' fits ancient register better than generic 'paper' or 'document'.
- source_word: fideles et ueri
  chosen: faithful and true
  alternatives:
  - trustworthy and true
  lexicon: Lewis & Short
  rationale: Preserves the solemn prophetic formula and the sense that the words are reliable, not merely factually correct.
- source_word: incredulus / incredulitas
  chosen: unbeliever / unbelief
  alternatives:
  - faithless / faithlessness
  lexicon: Lewis & Short
  rationale: The Latin stresses refusal to believe the prophetic word; 'unbelief' keeps the rhetorical repetition visible in v. 4.
- source_word: mala
  chosen: evils
  alternatives:
  - calamities
  - disasters
  lexicon: Lewis & Short
  rationale: Retains the stark prophetic diction and allows the list 'sword and famine and death and destruction' to explicate the kind of evils meant.
- source_word: interitum
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: Lewis & Short
  rationale: Best broad rendering in this judgment list without importing later theological overtones of 'perdition'.
- source_word: innoxius
  chosen: innocent
  alternatives:
  - guiltless
  - harmless
  lexicon: Lewis & Short
  rationale: In bloodguilt context 'innocent blood' is the natural and theologically loaded English equivalent.
- source_word: animae iustorum
  chosen: the souls of the righteous
  alternatives:
  - the lives of the righteous
  lexicon: Lewis & Short
  rationale: The lamenting dead or oppressed righteous are foregrounded; 'souls' preserves the apocalyptic register.
- source_word: in manu potenti et brachio excelso
  chosen: with a mighty hand and an uplifted arm
  alternatives:
  - with a strong hand and exalted arm
  lexicon: Lewis & Short
  rationale: Echoes exodus-style deliverance language while remaining idiomatic English.
- source_word: uredine
  chosen: blight
  alternatives:
  - scorching
  - mildew
  lexicon: Lewis & Short
  rationale: A crop-destroying affliction is intended; 'blight' is concise and agriculturally intelligible.
- source_word: sidus terribile
  chosen: a dreadful star
  alternatives:
  - a terrible star
  - a dread portent
  lexicon: Lewis & Short
  rationale: The repeated Latin sidus is left as 'star' rather than generalized to 'sign,' preserving the apocalyptic celestial imagery even where the exact referent is uncertain.
- source_word: saeculo
  chosen: the age
  alternatives:
  - the world
  - the present age
  lexicon: Lewis & Short
  rationale: The lament is broader than the physical earth alone; 'age' preserves apocalyptic temporal coloring, though the surrounding context still concerns the inhabited world.
- source_word: rumphea / romphea
  chosen: broadsword
  alternatives:
  - great sword
  - sword
  lexicon: Lewis & Short
  rationale: The term denotes a large sword; 'broadsword' preserves the heightened martial imagery and distinguishes it from generic gladius.
- source_word: constabilitio / inconstabilitio
  chosen: instability
  alternatives:
  - confusion
  - disorder
  lexicon: Lewis & Short
  rationale: The Latin points to social and political unsettlement; 'instability' keeps the repeated motif visible in vv. 16 and 33.
- source_word: megestanorum
  chosen: chief men
  alternatives:
  - great men
  - magnates
  lexicon: Lewis & Short
  rationale: A loanword for grandees or nobles; 'chief men' is readable and preserves hierarchical force without sounding overly technical.
- source_word: in sinu eorum / in sinum ipsorum
  chosen: into their bosom
  alternatives:
  - into their lap
  - back upon them
  lexicon: Lewis & Short
  rationale: Keeps the idiomatic image of recompense returned to one's own breast rather than flattening it to abstract repayment.
- source_word: sanctificationem meam
  chosen: my sanctuary
  alternatives:
  - my holiness
  - my consecrated thing
  lexicon: Lewis & Short
  rationale: In context of defilement by apostates, a concrete sacred sphere is likely intended; 'sanctuary' communicates that better than abstract 'holiness'.
- source_word: nationes draconum Arabum
  chosen: nations of Arabian dragons
  alternatives:
  - Arabian dragon-peoples
  - Arab nations like dragons
  lexicon: Lewis & Short
  rationale: The Latin is strange and should remain strange; preserving 'dragons' keeps the oracle's monstrous imagery rather than domesticating it.
- source_word: Carmonii
  chosen: the Carmonians
  alternatives:
  - Carmanians
  lexicon: Lewis & Short
  rationale: A transliterated ethnonym is preferable since the exact identification is uncertain.
- source_word: subsessor
  chosen: an ambusher
  alternatives:
  - one lying in wait
  - besieger
  lexicon: Lewis & Short
  rationale: The context is tactical interception from Assyrian territory; 'ambusher' captures the lurking hostile force better than the more static 'besieger'.
- source_word: nubs / nimbi
  chosen: clouds / storm-clouds
  alternatives:
  - masses of cloud
  lexicon: Lewis & Short
  rationale: The weather imagery merges with military and cosmic judgment imagery; varying to 'storm-clouds' in v. 37 helps English readability while preserving the motif.
- source_word: effundent sidus copiosum
  chosen: pour out a heavy star
  alternatives:
  - pour out an abundant star
  - pour out a shower of stars
  lexicon: Lewis & Short
  rationale: The singular sidus is awkward but should not be silently pluralized; 'heavy star' preserves the singular portent-like object while signaling force.
- source_word: suffraginem cameli
  chosen: a camel's hock
  alternatives:
  - a camel's hamstring
  - a camel's leg-joint
  lexicon: Lewis & Short
  rationale: A lower hind-leg joint is intended; 'hock' is precise and vivid in the blood-depth image.
- source_word: violabitur
  chosen: will be thrown into confusion
  alternatives:
  - will be violated
  - will be shattered
  lexicon: Lewis & Short
  rationale: The clause is textually difficult; in context of cosmic upheaval and disrupted destructive forces, a sense of disorder fits better than moral 'violation,' but the uncertainty is noted in a footnote.
- source_word: otiosam
