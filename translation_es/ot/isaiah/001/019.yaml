    issue: Registro pronominal no acorde al español meta
    rationale: El borrador usa 'estáis' y 'comeréis', formas de vosotros propias de España, mientras que el proyecto pide español neutral latinoamericano / ampliamente legible en iglesia.
  - severity: low
    issue: La nota al pie tiene redacción y puntuación poco naturales
    rationale: 'La formulación actual (''O: «si estáis dispuestos y escucháis», donde ''''escucháis'''' lleva el sentido de obedecer.'') presenta comillas defectuosas y suena torpe; conviene simplificarla.'
  - severity: low
    issue: Puede mejorarse la naturalidad de la primera cláusula sin perder fidelidad
    rationale: '''Si están dispuestos y obedecen'' o ''Si quieren y obedecen'' funciona mejor en español neutral que ''Si estáis dispuestos y obedecéis''.'
  revised_spanish_text: Si están dispuestos y obedecen[a], comerán lo bueno de la tierra.
  revised_footnotes:
