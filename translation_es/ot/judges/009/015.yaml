translation:
  language: es
  text: 'Entonces el zarzal[a] dijo a los árboles: «Si de veras ustedes me están ungiendo como rey sobre ustedes, vengan, busquen refugio bajo mi sombra[b]; pero si no, salga fuego del zarzal[c] y consuma los cedros del Líbano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Zarzal» traduce aquí el arbusto espinoso אָטָד en su sentido natural y figurado; también podría traducirse «arbusto espinoso» o «espino».
    reason: lexical_alternative
  - marker: b
    text: '«Busquen refugio» también puede traducirse «busquen amparo». La imagen conserva la ironía del pasaje: un zarzal ofrece poca sombra real.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede entenderse como una expresión jussiva («salga fuego del zarzal») o como una afirmación de resultado («saldrá fuego del zarzal»).
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָטָד
  english_pob_choice: the bramble
  chosen_spanish: el zarzal
  alternatives_spanish:
  - la zarza
  - el espino
  lexicon: HALOT
  rationale: אָטָד designa un arbusto espinoso. En español, «zarzal» comunica bien la imagen de matorral espinoso y suena natural en la fábula; evita una forma demasiado botánica o poco idiomática.
- source_word: אִם בֶּאֱמֶת
  english_pob_choice: If you are truly
  chosen_spanish: Si de veras
  alternatives_spanish:
  - Si en verdad
  - Si realmente
  lexicon: HALOT
  rationale: La frase expresa sinceridad o autenticidad. «De veras» mantiene el matiz enfático sin rigidizar el español.
- source_word: מֹשְׁחִים אֹתִי לְמֶלֶךְ
  english_pob_choice: anointing me as king
  chosen_spanish: me están ungiendo como rey
  alternatives_spanish:
  - me están haciendo rey
  - me están nombrando rey
  lexicon: HALOT
  rationale: מָשַׁח conserva su fuerza ritual y política; «ungiendo» preserva la imagen original que POB también conserva en inglés.
- source_word: עֲלֵיכֶם
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre vosotros
  - encima de ustedes
  lexicon: HALOT
  rationale: En contexto real, עַל expresa dominio o gobierno. «Sobre ustedes» es la equivalencia natural en español.
- source_word: בֹּאוּ חֲסוּ
  english_pob_choice: come, take refuge
  chosen_spanish: vengan, busquen refugio
  alternatives_spanish:
  - vengan, refugíense
  - vengan, hallen refugio
  lexicon: HALOT
  rationale: חסה implica buscar protección/refugio. «Busquen refugio» conserva el sentido y evita forzar un registro demasiado literal o arcaico.
- source_word: בְצִלִּי
  english_pob_choice: in my shade
  chosen_spanish: en mi sombra
  alternatives_spanish:
  - bajo mi sombra
  - en mi sombra protectora
  lexicon: HALOT
  rationale: 'צל puede ser «sombra» o «sombra protectora». «En mi sombra» es claro y mantiene la ironía: un arbusto espinoso ofrece poca protección.'
- source_word: וְאִם אַיִן
  english_pob_choice: but if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - si no
  lexicon: HALOT
  rationale: La construcción introduce la alternativa contraria. «Y si no» reproduce la conexión condicional con fluidez en español.
- source_word: תֵּצֵא אֵשׁ מִן הָאָטָד
  english_pob_choice: let fire come out from the bramble
  chosen_spanish: salga fuego del zarzal
  alternatives_spanish:
  - que salga fuego del zarzal
  - saldrá fuego del zarzal
  lexicon: HALOT
  rationale: El imperfecto en este apódosis tiene valor volitivo/jusivo. «Salga fuego» preserva esa fuerza mejor que un futuro simple.
- source_word: וְתֹאכַל
  english_pob_choice: and consume
  chosen_spanish: y consuma
  alternatives_spanish:
  - y devore
  - y lo consuma
  lexicon: HALOT
  rationale: אכל con fuego significa consumir por incendio. «Consuma» mantiene un tono elevado y exacto sin ser arcaizante.
- source_word: אַרְזֵי הַלְּבָנוֹן
  english_pob_choice: the cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros del Líbano montañoso
  - los cedros del Líbano
  lexicon: HALOT
  rationale: La expresión es establecida y literaria. «Cedros del Líbano» conserva la resonancia bíblica y la referencia geográfica.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y se mantuvo su equivalencia óptima: se conservaron los elementos clave de la fábula (zarzal/árboles, ungir como rey, refugio/sombra, fuego/consumir cedros) sin añadir interpretaciones ajenas al hebreo. No se detectaron cambios aplicados en la última pasada inglesa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo explícitamente lo requeriría; este versículo no contiene el Tetragrámaton.
  - Se mantuvo «ungiendo» para preservar la imagen real-ritual del verbo hebreo משׁח.
  - Se eligió el singular colectivo «zarzal» por su naturalidad en español y por el contraste literario con «los árboles» y «los cedros del Líbano».
