  alternative_readings:
  - 「의롭다 함을 받았다」(법정적 칭의 일관)
  rationale: 6장 문맥은 죄의 지배로부터의 해방을 다루며, δικαιόω의 어휘 폭은 해방/풀려남도 포함한다. 그러나 5장 칭의와의 연결을 보존하려면 「의롭다 함」도 정당하다. 본문은 6장 노예 해방 수사에 맞춰 해방의 의미를 채택했고 대안은 각주적으로 보존.
