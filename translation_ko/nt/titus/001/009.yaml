id: TIT.1.9
reference: Titus 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀντεχόμενον τοῦ κατὰ τὴν διδαχὴν πιστοῦ λόγου, ἵνα δυνατὸς ᾖ καὶ παρακαλεῖν ἐν τῇ διδασκαλίᾳ τῇ ὑγιαινούσῃ καὶ τοὺς ἀντιλέγοντας ἐλέγχειν.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/009.yaml
  text: holding firmly to the trustworthy word in accordance with the teaching[b][a], so that he may be able both to exhort by sound teaching and to rebuke those who contradict it.
  footnotes:
  - marker: a
    text: Or 'holding fast to the faithful word according to the teaching.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to refute those who contradict.' The Greek verb can carry the sense of exposing or proving someone wrong as well as rebuking.
    reason: lexical_alternative
translation:
  language: ko
  text: 가르침[a]을 따른 신실한 말씀을 굳게 붙들어, 건전한 가르침으로 권면도 하고 반대하는 자들을 논박할[b] 수도 있어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「교훈을 따른 신실한 말씀을 굳게 붙들어」. 디다케(διδαχή)는 사도적 전승의 가르침을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「반대하는 자들을 책망할」. 헬라어 ἐλέγχω는 책망·논박·드러내어 잘못을 증명함의 어감을 함께 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντεχόμενον
  english_pob_choice: holding firmly to
  chosen_korean: 굳게 붙들어
  alternatives_korean:
  - 굳게 잡아
  - 단단히 붙들어
  lexicon: BDAG
  rationale: ἀντέχομαι(중간태)는 「~을 굳게 붙들다·고수하다」. 합쇼체 산문에서 「굳게 붙들다」가 자연스럽다.
- source_word: κατὰ τὴν διδαχὴν
  english_pob_choice: in accordance with the teaching
  chosen_korean: 가르침을 따른
  alternatives_korean:
  - 교훈을 따른
  - 가르침에 부합하는
  lexicon: BDAG
  rationale: διδαχή는 사도적 전승된 가르침. κατά + 대격은 기준·일치를 가리킨다. 글로서리 「가르침/교훈」 중 본문 흐름에서는 「가르침」을 택한다.
- source_word: πιστοῦ λόγου
  english_pob_choice: the trustworthy word
  chosen_korean: 신실한 말씀
  alternatives_korean:
  - 믿을 만한 말씀
  - 신뢰할 만한 말씀
  lexicon: BDAG
  rationale: πιστός는 「믿을 만한·신실한」. 목회서신의 정형 표현 「신실한 말씀」.
- source_word: ἐν τῇ διδασκαλίᾳ τῇ ὑγιαινούσῃ
  english_pob_choice: by sound teaching
  chosen_korean: 건전한 가르침으로
  alternatives_korean:
  - 바른 교훈으로
  - 건강한 가르침으로
  lexicon: BDAG
  rationale: ὑγιαίνω(「건강한」)는 목회서신의 핵심 은유로 거짓 가르침과 대비된다. 「건전한」이 그 은유를 잘 살린다. διδασκαλία(가르침/교훈)는 가르치는 행위·내용 양의적이나 본문에서는 「가르침」으로 통일.
- source_word: παρακαλεῖν
  english_pob_choice: to exhort
  chosen_korean: 권면도 하고
  alternatives_korean:
  - 격려도 하고
  - 위로도 하고
  lexicon: BDAG
  rationale: παρακαλέω의 핵심 의미는 「곁에 불러 권하다」. 목회서신의 권면 어감으로 「권면」이 정립되어 있다.
- source_word: ἐλέγχειν
  english_pob_choice: to rebuke
  chosen_korean: 논박할
  alternatives_korean:
  - 책망할
  - 드러내어 꾸짖을
  lexicon: BDAG
  rationale: ἐλέγχω는 단순한 「책망」을 넘어 잘못을 드러내고 입증하여 굴복시키는 어감. 「반대하는 자들」을 상대로 한 본문 맥락에서 「논박」이 더 정확하다. 각주로 「책망」을 둔다.
- source_word: τοὺς ἀντιλέγοντας
  english_pob_choice: those who contradict
  chosen_korean: 반대하는 자들
  alternatives_korean:
  - 거슬러 말하는 자들
  - 반박하는 자들
  lexicon: BDAG
  rationale: ἀντιλέγω의 분사. 「반대하는 자들」이 자연스럽다.
