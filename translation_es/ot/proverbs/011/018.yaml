translation:
  language: es
  text: El malvado obtiene una ganancia engañosa[a], pero el que siembra rectitud recibe una recompensa verdadera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hace una obra de falsedad»; la expresión hebrea puede enfatizar tanto una ganancia engañosa como un trabajo que resulta vacío o falso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una recompensa segura» o «una recompensa confiable»; literalmente, «salario/recompensa de verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - un malvado
  - el impío
  - una persona malvada
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino proverbial con valor representativo. "Malvado" conserva la fuerza moral negativa sin forzar una formulación más eclesiástica como "impío". El artículo definido mantiene el tono proverbial general.
- source_word: עֹשֶׂה פְעֻלַּת שָׁקֶר
  english_pob_choice: earns deceptive wages
  chosen_spanish: hace ganancia engañosa
  alternatives_spanish:
  - obtiene una ganancia engañosa
  - cobra un salario engañoso
  - hace una obra de falsedad
  lexicon: HALOT
  rationale: La expresión hebrea combina 'hacer' con una frase nominal de 'obra/resultado' y 'falsedad'. El POB inglés opta por el resultado económico irónico. En español, "hace ganancia engañosa" conserva la tensión entre actividad y rendimiento, y evita suavizarla demasiado hacia una paráfrasis moral general.
- source_word: שָׁקֶר
  english_pob_choice: deceptive
  chosen_spanish: engañosa
  alternatives_spanish:
  - falsa
  - fraudulenta
  - vacía
  lexicon: HALOT
  rationale: '"שָׁקֶר" abarca falsedad, engaño e inestabilidad. "Engañosa" refleja bien la idea de un beneficio que aparenta ser real pero no lo es, en línea con la nota inglesa sobre ganancia/recompensa no fiable.'
- source_word: וְזֹרֵעַ
  english_pob_choice: but one who sows
  chosen_spanish: pero el que siembra
  alternatives_spanish:
  - y el que siembra
  - y uno que siembra
  - pero uno que siembra
  lexicon: HALOT
  rationale: Aunque la conjunción puede ser simplemente copulativa, el contraste antitético exige "pero" en español para una lectura natural. "El que siembra" preserva el sujeto proverbial singular sin añadir género innecesario.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - recta conducta
  - justeza
  lexicon: HALOT
  rationale: En Proverbios, צְדָקָה puede abarcar conducta correcta y justicia relacional. Aquí "justicia" mantiene el peso ético y es una equivalencia natural en español; se conserva la amplitud semántica sin rigidizar el término como una categoría técnica exclusiva.
- source_word: שֶׂכֶר אֱמֶת
  english_pob_choice: a true reward
  chosen_spanish: una recompensa verdadera
  alternatives_spanish:
  - un salario seguro
  - una recompensa fiel
  - un pago de verdad
  lexicon: HALOT
  rationale: La construcción puede significar 'salario/recompensa de verdad', es decir, recompensa confiable o genuina. "Recompensa verdadera" mantiene el contraste con la ganancia engañosa y suena natural en español, sin perder el valor de certeza/reliabilidad.
theological_decisions:
- issue: Renderización de צְדָקָה en un proverbio sapiencial
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - righteousness transliterated as "justicia" only in doctrinal note
  rationale: Aunque el POB inglés conserva 'righteousness', en español 'justicia' comunica con claridad el campo semántico sapiencial de conducta correcta, equidad y fidelidad ética. No se trata de desplazar una terminología doctrinal, sino de elegir la forma más natural y fiel al contexto proverbial.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — δικαιοσύνη/righteousness principle applied analogically to Hebrew צְדָקָה; Translation philosophy §5'
- issue: Tensión entre 'ganancia' y 'salario/recompensa' en el paralelo hebreo
  english_pob_reading: deceptive wages / true reward
  chosen_spanish_reading: ganancia engañosa / recompensa verdadera
  alternative_spanish_readings:
  - salario engañoso / salario verdadero
  - pago engañoso / pago verdadero
  - ganancia falsa / recompensa segura
  rationale: El hebreo contrapone un resultado falso o engañoso con una remuneración genuina. En español, 'ganancia' para la primera cola y 'recompensa' para la segunda conserva el contraste sin imponer un único término técnico. La diferencia léxica refleja la forma idiomática del proverbio y mantiene la ambigüedad productiva del original.
  doctrine_reference: Proverbios 11:18; lexical contrast in English audit trail; Translation philosophy §3
translation_notes:
  revision_awareness: El texto español sigue el pasaje hebreo consonante del WLC y el control de calidad del audit trail inglés, sin cambios aplicados en revisiones posteriores. Se mantuvo la alternancia proverbial y el contraste semántico entre un beneficio engañoso y una recompensa genuina.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '"Justicia" se emplea aquí como equivalente contextual de צְדָקָה en sabiduría, sin desplazar la lectura ética del término.'
  - Se conservó el singular proverbial masculino con "el que" / "el malvado" para reflejar el valor general del hebreo.
  - Las notas a pie de página marcan alternativas léxicas relevantes sin multiplicar glosas innecesarias.
