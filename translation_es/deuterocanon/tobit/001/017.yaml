  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión léxica clave es γένος μου: ''de los míos'' se alinea mejor con la amplitud documentada en el POB que ''de mi linaje''.'
