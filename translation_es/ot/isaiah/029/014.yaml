translation:
  language: es
  text: 'Por tanto[a], he aquí, yo volveré a hacer algo asombroso con este pueblo: algo asombroso y maravilloso; y perecerá la sabiduría de sus sabios, y el entendimiento de sus hombres entendidos se ocultará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volveré a tratar maravillosamente a este pueblo, maravilla sobre maravilla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Conserva el valor inferencial/consecutivo del hebreo y su tono profético sin volverlo demasiado coloquial.
- source_word: הִנְנִי
  english_pob_choice: behold, I
  chosen_spanish: he aquí, yo
  alternatives_spanish:
  - mirad, yo
  - aquí estoy
  lexicon: HALOT
  rationale: Mantiene el deíctico solemne de atención; en español, "he aquí" conserva mejor ese matiz profético que una mera indicación espacial.
- source_word: יוֹסִף לְהַפְלִיא
  english_pob_choice: will again do something astonishing
  chosen_spanish: volveré a hacer algo asombroso
  alternatives_spanish:
  - seguiré haciendo algo asombroso
  - haré de nuevo algo asombroso
  lexicon: HALOT
  rationale: El verbo יסף en este giro expresa añadir/continuar, no solo repetición mecánica; "volveré a hacer" transmite bien la reanudación de la acción divina.
- source_word: לְהַפְלִיא
  english_pob_choice: do something astonishing
  chosen_spanish: hacer algo asombroso
  alternatives_spanish:
  - obrar maravillosamente
  - obrar de manera prodigiosa
  lexicon: HALOT
  rationale: El causativo de פלא apunta a obrar algo extraordinario; "asombroso" mantiene la fuerza del evento sin perder naturalidad en español.
- source_word: הַפְלֵא וָפֶלֶא
  english_pob_choice: something astonishing and marvelous
  chosen_spanish: algo asombroso y maravilloso
  alternatives_spanish:
  - maravilla sobre maravilla
  - asombro y maravilla
  lexicon: HALOT
  rationale: La duplicación intensifica la idea; se conserva con dos adjetivos coordinados que reflejan la repetición hebrea sin volverla oscura.
- source_word: חָכְמַת חֲכָמָיו
  english_pob_choice: the wisdom of its wise men
  chosen_spanish: la sabiduría de sus sabios
  alternatives_spanish:
  - la sabiduría de sus hombres sabios
  - la sabiduría de sus sabios varones
  lexicon: HALOT
  rationale: '"Sabiduría" traduce bien חכמה; "sus sabios" preserva el referente colectivo masculino del hebreo y el sufijo posesivo sobre el pueblo.'
- source_word: וּבִינַת נְבֹנָיו
  english_pob_choice: the understanding of its discerning men
  chosen_spanish: la inteligencia de sus entendidos
  alternatives_spanish:
  - el discernimiento de sus prudentes
  - la comprensión de sus hombres perspicaces
  lexicon: HALOT
  rationale: בינה combina comprensión/discernimiento; "inteligencia" es una opción amplia y digna en español, y "entendidos" refleja el participio/epíteto de נבון como personas caracterizadas por discernimiento.
- source_word: תִּסְתַּתָּר
  english_pob_choice: will hide itself
  chosen_spanish: se ocultará
  alternatives_spanish:
  - se esconderá
  - quedará oculta
  lexicon: HALOT
  rationale: La forma reflexiva/pasiva admite una traducción natural en español; "se ocultará" conserva la idea de desaparición/retirada de la capacidad de discernir, sin forzar una personificación excesiva.
theological_decisions:
- issue: Mantenimiento del carácter profético de la intervención divina
  english_pob_reading: I will again do something astonishing with this people
  chosen_spanish_reading: volveré a hacer algo asombroso con este pueblo
  alternative_spanish_readings:
  - haré de nuevo algo asombroso con este pueblo
  - volveré a obrar maravillosamente con este pueblo
  rationale: La formulación evita neutralizar el tono de juicio y maravilla del original; mantiene que es Yahvé quien actúa soberanamente y que la acción es extraordinaria, no meramente llamativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Representación de los sabios y entendidos como grupo masculino del texto
  english_pob_reading: wise men / discerning men
  chosen_spanish_reading: sabios / entendidos
  alternative_spanish_readings:
  - hombres sabios / hombres entendidos
  - personas sabias / personas entendidas
  rationale: El hebreo usa plurales masculinos con valor representativo. Se conserva esa referencia sin volverla artificial, manteniendo la tensión entre exactitud morfológica y lectura pública natural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones sustantivas: la lectura estable se mantiene. La versión española sigue de cerca las decisiones léxicas documentadas, especialmente para יסף + פלא, la duplicación enfática de פלא y el par חכמים/נבונים, sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se usa "Yahvé" según la pauta del proyecto, aunque este versículo no lo explicita léxicamente; el sujeto divino está determinado por el contexto inmediato.
  - '"sabios" y "entendidos" conservan el paralelismo y la forma masculina plural del hebreo; no se aplanó a un neutro genérico.'
  - '"se ocultará" mantiene el matiz reflexivo del hebreo y resulta natural en español bíblico contemporáneo.'
