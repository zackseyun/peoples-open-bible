revisions:
- from: Pero los judíos estaban guardando una lealtad y benevolencia firmes hacia los reyes;
  to: Pero los judíos mantenían una buena voluntad y lealtad inquebrantables hacia los reyes;
  rationale: 'La revisión conserva el sentido exacto del griego y del POB inglés, pero mejora la legibilidad y la naturalidad del español: «mantenían» refleja mejor φυλάσσοντες; «buena voluntad» comunica εὔνοια con más claridad que «benevolencia»; y «inquebrantables» expresa con precisión el valor de ἀδιάστροφον como constancia no desviada. También se restituye el orden semántico del original: buena voluntad antes que lealtad.'
