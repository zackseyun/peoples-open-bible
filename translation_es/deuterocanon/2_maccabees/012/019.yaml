translation:
  language: es
  text: Pero Dositeo y Sosípatro, líderes bajo Macabeo, salieron[a] y destruyeron a los que había dejado atrás Timoteo en la fortaleza, más de diez mil hombres.
  philosophy: optimal-equivalence
  footnotes:
