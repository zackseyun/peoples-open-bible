translation:
  language: es
  text: Y dijeron que este documento debía inscribirse en tablas de bronce y colocarse en el atrio del santuario[a][b][c], en un lugar seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escrito» o «registro» para «documento». El término griego alude a la resolución escrita formal.
    reason: lexical_alternative
  - marker: b
    text: O «placas de bronce» o «tablillas de bronce». La frase denota un soporte metálico inscrito para exhibición duradera.
    reason: lexical_alternative
  - marker: c
    text: O «en un lugar confiable». El griego puede destacar tanto la seguridad como la confiabilidad del lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: γραφήν
  english_pob_choice: document
  chosen_spanish: documento
  alternatives_spanish:
  - escrito
  - registro
  - decreto
  lexicon: LSJ
  rationale: γραφή puede significar un escrito o registro formal. Aquí se trata de la resolución escrita que acaba de mencionarse, por lo que 'documento' comunica bien ese carácter sin volverlo más técnico de lo que permite el griego.
- source_word: θέσθαι
  english_pob_choice: be inscribed / be put
  chosen_spanish: inscribirse
  alternatives_spanish:
  - ponerse
  - colocarse
  - depositarse
  lexicon: LSJ
  rationale: El infinitivo de τίθημι aquí expresa el acto de poner el escrito sobre las tablas. Dado el ajuste revisionado en el audit trail, 'inscribirse' refleja mejor la idea de registrar el texto en el soporte metálico.
- source_word: δέλτοις χαλκαῖς
  english_pob_choice: bronze tablets
  chosen_spanish: tablas de bronce
  alternatives_spanish:
  - placas de bronce
  - tablillas de bronce
  lexicon: LSJ
  rationale: δέλτος designa una tabla o tablilla para escribir; con χαλκαῖς, el sentido es de soporte metálico duradero para inscripción pública. 'Tablas de bronce' conserva el valor material y la intención de permanencia.
- source_word: στῆσαι
  english_pob_choice: set up
  chosen_spanish: colocarse
  alternatives_spanish:
  - erigirse
  - ponerse
  - instalarse
  lexicon: LSJ
  rationale: El verbo expresa dejar las tablas en posición visible en un lugar público. 'Colocarse' mantiene la idea de instalación sin añadir solemnidad o verticalidad que el español podría sugerir con 'erigirse'.
- source_word: περιβόλῳ
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - recinto
  - corral
  lexicon: LSJ
  rationale: περίβολος puede referirse a un espacio cercado o recinto. En contexto de templo, 'atrio' es una forma natural en español para el área enmarcada del santuario, manteniendo el sentido de espacio delimitado y público.
- source_word: τῶν ἁγίων
  english_pob_choice: of the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - de las cosas santas
  - del lugar santo
  lexicon: LSJ
  rationale: El genitivo probablemente señala el recinto sagrado del templo más que 'cosas santas' en abstracto. 'Del santuario' reproduce bien esa referencia espacial y cultual.
- source_word: ἐν τόπῳ πιστῷ
  english_pob_choice: in a secure place
  chosen_spanish: en un lugar seguro
  alternatives_spanish:
  - en un lugar confiable
  - en un lugar fiel
  lexicon: LSJ
  rationale: πιστός puede implicar confiable, seguro o digno de confianza. Para la custodia de un documento oficial, 'lugar seguro' transmite naturalmente la protección y permanencia buscadas.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que corrigió la idea de 'put on bronze tablets' a 'inscribed on bronze tablets'; por eso la traducción española usa 'inscribirse en tablas de bronce' y mantiene el resto de la cláusula con equivalencia óptima al griego.
  spanish_consistency_notes:
  - Se mantuvo 'santuario' para τῶν ἁγίων, en línea con el contexto del templo y la decisión inglesa auditada.
  - Se eligió 'tablas de bronce' en vez de 'placas' para conservar una forma natural en español sin perder la imagen de soporte duradero.
  - No se introdujo vocabulario doctrinal ajeno; el versículo es administrativo/cultual y la traducción busca claridad pública.
  - Los marcadores de nota [a][b][c] aparecen en el texto exactamente donde corresponden a las alternativas léxicas documentadas.
