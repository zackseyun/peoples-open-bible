translation:
  language: es
  text: El niño de pecho jugará junto al agujero de la cobra[b][a], y el niño destetado pondrá su mano en la guarida de la víbora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «áspid» para «cobra». El término hebreo denota una serpiente venenosa, tradicionalmente identificada con el áspid/cobra.
    reason: lexical_alternative
  - marker: b
    text: O «extenderá su mano» en lugar de «pondrá su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁעֲשַׁע
  english_pob_choice: will play
  chosen_spanish: jugará
  alternatives_spanish:
  - se divertirá
  - hará sus juegos
  lexicon: HALOT
  rationale: El verbo expresa en este contexto una acción infantil libre y sin temor, no solo placer interior. «Jugará» reproduce de forma natural esa idea en español y mantiene el contraste poético con el peligro que rodea al niño.
- source_word: יוֹנֵק
  english_pob_choice: the nursing child
  chosen_spanish: el niño de pecho
  alternatives_spanish:
  - el lactante
  - el niño que mama
  lexicon: HALOT
  rationale: La forma hebrea designa a un niño que aún se alimenta de leche materna. «Niño de pecho» es una expresión clara y reverente en español, y conserva bien el paralelismo con «niño destetado».
- source_word: חֻר
  english_pob_choice: hole
  chosen_spanish: agujero
  alternatives_spanish:
  - hoyo
  - cueva
  lexicon: HALOT
  rationale: El término denota una abertura o cavidad. «Agujero» es la equivalencia más directa en español y funciona bien con la imagen de la serpiente.
- source_word: פָּתֶן
  english_pob_choice: cobra
  chosen_spanish: cobra
  alternatives_spanish:
  - áspid
  - víbora
  lexicon: HALOT
  rationale: El hebreo nombra una serpiente venenosa tradicionalmente identificada como áspid/cobra. Se conserva «cobra» porque es comprensible para el lector moderno y refleja la decisión del POB inglés.
- source_word: מְאוּרַת
  english_pob_choice: den
  chosen_spanish: madriguera
  alternatives_spanish:
  - guarida
  - cueva
  lexicon: HALOT
  rationale: El sustantivo designa el lugar de la serpiente. «Madriguera» mantiene el paralelo con «agujero» y ofrece una imagen natural en español, sin perder la idea de un refugio o escondrijo.
- source_word: צִפְעוֹנִי
  english_pob_choice: viper
  chosen_spanish: la víbora
  alternatives_spanish:
  - la culebra venenosa
  - el áspid
  lexicon: HALOT
  rationale: El término apunta a una serpiente venenosa. «Víbora» es un equivalente general y claro en español, sin especificar más de lo que el hebreo permite.
- source_word: גָּמוּל
  english_pob_choice: the weaned child
  chosen_spanish: el niño destetado
  alternatives_spanish:
  - el destetado
  - el niño ya destetado
  lexicon: HALOT
  rationale: El hebreo se refiere a un niño que ya ha sido destetado. «Niño destetado» conserva el sentido lexical y el contraste con «niño de pecho».
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: Aunque el hebreo marca masculino singular, en español «su mano» comunica el referente de manera natural y fiel en contexto, sin cargar innecesariamente la frase.
- source_word: הָדָה
  english_pob_choice: will put
  chosen_spanish: pondrá
  alternatives_spanish:
  - extenderá
  - alzará
  lexicon: HALOT
  rationale: El verbo describe la acción de colocar o extender la mano hacia el lugar de la serpiente. «Pondrá» es conciso e idiomático en español y sigue de cerca la elección inglesa.
theological_decisions:
- issue: Alcance de la imagen de paz en el reino de justicia
  english_pob_reading: Render the verse straightforwardly as depicting extraordinary peace and safety, without specifying whether the imagery is literal, symbolic, or both.
  chosen_spanish_reading: Traducir el versículo como una imagen directa de paz y seguridad extraordinarias, sin resolver si el cuadro es literal, simbólico o ambos.
  alternative_spanish_readings:
  - Una descripción de cambio literal en la creación
  - Una figura principalmente simbólica de paz mesiánica
  rationale: El hebreo presenta una escena poética en la que criaturas vulnerables permanecen ilesas junto a serpientes venenosas. La traducción debe conservar esa tensión interpretativa y no fijar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de última revisión; la decisión de mantener la imagen zoológica y la estructura paralela se conserva íntegramente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se conservó la distinción infantil poética entre «niño de pecho» y «niño destetado».
  - Se evitó «SEÑOR» y otras sustituciones no motivadas por el texto hebreo.
  - La puntuación y el orden sintáctico buscan una lectura pública fluida en español, manteniendo la correspondencia semántica del original.
