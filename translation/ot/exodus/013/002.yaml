- issue: Representative use of אָדָם in contrast with בְּהֵמָה
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular collective contrasts human and animal categories. Following the translation philosophy's gender-accurate principle, 'man' is retained in the main text as representative language rather than neutralizing the contrast. An inclusive alternative is worth preserving in a footnote for modern readers.
