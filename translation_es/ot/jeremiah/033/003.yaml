translation:
  language: es
  text: Clama a mí, y yo te responderé, y te diré cosas grandes y ocultas[a] que no has conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inaccesibles» o «fortificadas»; el término hebreo sugiere asuntos fuera del acceso ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  english_pob_choice: Call
  chosen_spanish: Clama
  alternatives_spanish:
  - Llama
  - Haz un llamado
  lexicon: HALOT
  rationale: El imperativo qal de קרא aquí es una invitación directa a dirigirse a Dios. «Clama» conserva el matiz de invocación intensa que puede tener el verbo en español bíblico sin volverlo más fuerte que el hebreo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa destino directo del clamor. «A mí» es natural y preciso en español.
- source_word: וְאֶעֱנֶךָּ
  english_pob_choice: and I will answer you
  chosen_spanish: y yo te responderé
  alternatives_spanish:
  - y yo te contestaré
  - y te daré respuesta
  lexicon: HALOT
  rationale: ענה en este contexto significa responder. «Responderé» preserva el paralelismo y el futuro promisor; se evita una paráfrasis más libre.
- source_word: וְאַגִּידָה
  english_pob_choice: and I will tell you
  chosen_spanish: y te anunciaré
  alternatives_spanish:
  - y te declararé
  - y te haré saber
  lexicon: HALOT
  rationale: נגד en hiphil puede significar decir, declarar o hacer saber. «Anunciaré» comunica bien la idea de comunicar revelación divina en un registro digno y claro; la elección mantiene la apertura semántica entre «decir» y «hacer saber».
- source_word: גְּדֹלֹות
  english_pob_choice: great things
  chosen_spanish: cosas grandes
  alternatives_spanish:
  - grandes cosas
  - grandes asuntos
  lexicon: HALOT
  rationale: El adjetivo sustantivado femenino plural se entiende de forma amplia. «Cosas grandes» es fiel y fluido en español; «grandes asuntos» estrecharía innecesariamente el sentido.
- source_word: וּבְצֻרוֹת
  english_pob_choice: hidden things
  chosen_spanish: cercadas
  alternatives_spanish:
  - inaccesibles
  - fortificadas
  - ocultas
  lexicon: HALOT
  rationale: La raíz בצר puede sugerir algo cortado, inaccesible o fortificado. En el contexto de revelación, el español «cercadas» mantiene la imagen de algo rodeado/fortificado y deja abierta la tensión semántica que el inglés POB preservó en la nota con alternativas.
- source_word: לֹא יְדַעְתָּם
  english_pob_choice: that you have not known
  chosen_spanish: que no has conocido
  alternatives_spanish:
  - que no has sabido
  - que no has llegado a conocer
  lexicon: HALOT
  rationale: El perfecto con sufijo indica cosas no conocidas previamente por el destinatario. «No has conocido» conserva esa experiencia previa negada y suena natural en español.
theological_decisions:
- issue: Valor de וּבְצֻרוֹת en una promesa de revelación divina
  english_pob_reading: hidden things
  chosen_spanish_reading: cercadas
  alternative_spanish_readings:
  - ocultas
  - inaccesibles
  - fortificadas
  rationale: El POB inglés eligió «hidden things» en el texto principal y dejó alternativas léxicas en nota. En español, «cercadas» conserva la imagen física de algo cerrado o fortificado sin borrar la tensión entre lo oculto y lo inaccesible; por eso se mantiene en el cuerpo del texto y se explicitan alternativas en la nota.
  doctrine_reference: Jeremías 33:3; filosofía de traducción POB sobre equivalencia óptima y preservación de tensiones léxicas
- issue: Matiz del llamado a Dios en el imperativo inicial
  english_pob_reading: Call to me
  chosen_spanish_reading: Clama a mí
  alternative_spanish_readings:
  - Llámame
  - Invócame
  rationale: El verbo español «clamar» transmite bien la dirección orante del hebreo sin reducirlo a una simple llamada conversacional. Mantiene el carácter devocional y la urgencia del mandato.
  doctrine_reference: Jeremías 33:3; uso contextual de קרא en apelación a Dios
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés de POB. Se conserva la promesa en tres miembros paralelos, se mantiene la tensión semántica de וּבְצֻרוֹת con una opción española que no la aplana, y no se introducen cambios doctrinales ni expansiones interpretativas ajenas al fuente.
  spanish_consistency_notes:
  - Se usa «a mí» para אֵלַי y «te» para los sufijos de segunda persona, manteniendo la relación directa entre Dios y el destinatario.
  - Se prefiere «Clama» por su tono bíblico y devocional, pero sin forzar un arcaísmo innecesario.
  - «Cosas grandes» conserva la amplitud del plural sustantivado.
  - La nota explora alternativas españolas que reflejan la misma gama semántica que el POB inglés dejó abierta.
  - No se usa «SEÑOR» ni «Cristo», pues el versículo no contiene esos términos.
