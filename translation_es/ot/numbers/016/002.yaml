translation:
  language: es
  text: y se levantaron delante de Moisés, con doscientos cincuenta hombres de los hijos de Israel[a], jefes de la congregación, llamados a la asamblea[b], hombres de renombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los israelitas». El hebreo dice «de los hijos de Israel», una designación de pacto que se conserva aquí por transparencia de la fuente.
    reason: lexical_alternative
  - marker: b
    text: O «convocados a la reunión». La frase hebrea puede referirse a hombres oficialmente llamados a la asamblea señalada de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: HALOT
  rationale: El verbo קום en esta narración expresa levantarse para actuar o ponerse en oposición. «Se levantaron» conserva el movimiento narrativo sin añadir explícitamente una lectura de rebelión que el verbo solo no obliga.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: La preposición señala posición relacional y espacial. «Delante de» es natural en español y mantiene abierta la fuerza de confrontación que el contexto aporta.
- source_word: וַאֲנָשִׁים
  english_pob_choice: with ... men
  chosen_spanish: con ... hombres
  alternatives_spanish:
  - y ... hombres
  - junto con ... hombres
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica tras el verbo; en español se suaviza con «con» para unir al grupo principal sin sobrerinterpretar la sintaxis.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la designación del hebreo para mantener la transparencia de la frase de pacto. «Hijos de Israel» refleja directamente בְּנֵי y evita reemplazarla por una forma más general sin necesidad.
- source_word: נְשִׂיאֵי עֵדָה
  english_pob_choice: leaders of the congregation
  chosen_spanish: jefes de la congregación
  alternatives_spanish:
  - líderes de la congregación
  - príncipes de la congregación
  lexicon: HALOT
  rationale: נָשִׂיא puede denotar jefe, caudillo o líder elevado. «Jefes» preserva mejor el matiz de autoridad/primacía del término, mientras que «congregación» comunica adecuadamente עֵדָה como comunidad reunida.
- source_word: קְרִאֵי מוֹעֵד
  english_pob_choice: called to the assembly
  chosen_spanish: llamados a la asamblea
  alternatives_spanish:
  - llamados para la reunión
  - convocados a la asamblea
  lexicon: HALOT
  rationale: El participio pasivo sugiere hombres convocados para una instancia comunitaria oficial. «Llamados a la asamblea» mantiene la pasividad y el sentido institucional sin forzar una frase técnica.
- source_word: אַנְשֵׁי שֵׁם
  english_pob_choice: men of renown
  chosen_spanish: hombres de renombre
  alternatives_spanish:
  - hombres de nombre
  - hombres famosos
  lexicon: HALOT
  rationale: Es un modismo hebreo para personas de reputación o distinción. «Hombres de renombre» es una equivalencia idiomática establecida y fiel al valor semántico.
theological_decisions:
- issue: Designación covenantal "sons of Israel"
  english_pob_reading: The Hebrew reads 'from the sons of Israel,' a covenantal designation retained here for source-language transparency.
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - de los israelitas
  - del pueblo de Israel
  rationale: Se preserva la forma concreta del hebreo para no diluir la fórmula de pertenencia pactal. La opción más idiomática se deja como alternativa, pero no se adopta en el texto principal porque reduce la transparencia del dato fuente.
  doctrine_reference: Éxodo 1:1; Números 1:2
- issue: Naturaleza de la asamblea convocada
  english_pob_reading: The Hebrew phrase may denote men officially called to the community's appointed assembly.
  chosen_spanish_reading: llamados a la asamblea
  alternative_spanish_readings:
  - convocados a la reunión
  - llamados al encuentro
  rationale: La frase puede aludir a una convocatoria oficial de la comunidad, no solo a una reunión casual. «Asamblea» conserva mejor el carácter comunitario e institucional que el contexto sugiere.
  doctrine_reference: Números 16:19; Deuteronomio 31:30
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del POB inglés, que sustituyó «along with» por «with» para una línea más formal y natural. En español se reflejó esa misma sobriedad con «con», sin introducir expansiones interpretativas. También se mantuvieron sin cambios sustantivos los demás rasgos auditados del versículo: la secuencia narrativa, la referencia a los hijos de Israel, los líderes de la congregación, los llamados a la asamblea y los hombres de renombre.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - Se mantuvo «congregación» para עֵדָה, en línea con el valor comunitario del término.
  - «Hijos de Israel» se conservó por transparencia y coherencia con el resto de la traducción.
  - No se usó «siervos» ni vocabulario eclesiástico que altere el registro del hebreo.
