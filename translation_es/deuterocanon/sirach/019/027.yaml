translation:
  language: es
  text: El que inclina su rostro y finge no oír[a]—donde no se le reconoce, te[b] llevará ventaja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se hace el sordo» para «finge no oír»; el participio griego describe a alguien que aparenta sordera o hace oídos sordos.
    reason: lexical_alternative
  - marker: b
    text: O «te anticipará» / «se te adelantará»; el verbo griego puede significar adelantarse a alguien, aquí probablemente con el sentido de obtener ventaja.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκύφων
  english_pob_choice: lowers
  chosen_spanish: inclina
  alternatives_spanish:
  - baja
  - agacha
  - inclina hacia abajo
  lexicon: LSJ
  rationale: El participio describe una postura corporal de inclinar o bajar el rostro. «Inclina» conserva la imagen física en español con naturalidad y sin forzar una construcción demasiado literal.
- source_word: πρόσωπον
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - semblante
  lexicon: LSJ
  rationale: «Rostro» mantiene el sentido ordinario de πρόσωπον y suena digno en español bíblico moderno.
- source_word: ἑτεροκωφῶν
  english_pob_choice: pretends not to hear
  chosen_spanish: finge no oír
  alternatives_spanish:
  - se hace el sordo
  - finge sordera
  - actúa como sordo
  lexicon: LSJ
  rationale: La forma rara sugiere una actitud deliberada de hacerse el sordo o no atender. «Finge no oír» comunica esa intención con fluidez en español y evita una expresión demasiado coloquial.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - cuando
  - allí donde
  lexicon: LSJ
  rationale: 'El valor locativo del adverbio encaja mejor en la escena de reconocimiento social: «donde no se le reconoce».'
- source_word: οὐκ ἐπεγνώσθη
  english_pob_choice: he is not recognized
  chosen_spanish: no se le reconoce
  alternatives_spanish:
  - no lo reconocen
  - no es conocido
  - no se le conoce
  lexicon: LSJ
  rationale: El pasivo de ἐπιγινώσκω puede ser «ser reconocido» o «ser conocido». En este contexto de disimulo social, «no se le reconoce» reproduce bien la idea de pasar inadvertido.
- source_word: προφθάσει
  english_pob_choice: he will get the better of you
  chosen_spanish: te llevará ventaja
  alternatives_spanish:
  - te ganará la delantera
  - te sobrepasará
  - se te anticipará
  lexicon: LSJ
  rationale: El verbo expresa adelantarse, anticiparse o sobrepasar. La revisión inglesa optó por una idea de ventaja o ventaja táctica; «te llevará ventaja» transmite ese matiz de manera natural y ética en español, sin introducir una noción ajena al contexto sapiencial.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa del cierre («will get the better of you»), evitando la traducción menos precisa «te adelantará» como sentido principal. También conserva la ambigüedad social de οὐκ ἐπεγνώσθη con una formulación pasiva natural en español.
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno y claro, sin recurrir a «señor»/«SEÑOR» ni a un calco rígido.
  - «Rostro» se prefirió a «cara» por tono literario sin perder naturalidad.
  - No se añadió contenido interpretativo sobre quién habla; la frase queda como sentencia sapiencial de observación social.
  - El segundo miembro conserva la idea de ventaja de προφθάσει, en línea con la revisión auditada del inglés.
