translation:
  language: es
  text: Joás tenía siete años cuando comenzó a reinar, y reinó cuarenta años en Jerusalén. El nombre de su madre era Zibía[a], de Beer-sheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Zibía: transliteración hispanizada del nombre propio hebreo.'
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן שֶׁבַע שָׁנִים
  english_pob_choice: was seven years old
  chosen_spanish: tenía siete años
  alternatives_spanish:
  - era de siete años
  - era un hijo de siete años
  lexicon: HALOT
  rationale: La fórmula hebrea de edad es literalmente ‘hijo de siete años’, pero en español natural la equivalencia idiomática es ‘tenía siete años’. Conserva el sentido simple sin calco rígido.
- source_word: בְּמָלְכ֔/וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - al comenzar a reinar
  lexicon: HALOT
  rationale: El valor temporal de ב con la forma verbal señala el momento de ascensión al trono. ‘Comenzó a reinar’ reproduce bien ese inicio de reinado en un español claro.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo expresa la acción de reinar; ‘reinó’ mantiene la fórmula real narrativa y la fuerza verbal del hebreo.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerushalén
  lexicon: HALOT
  rationale: Es el valor locativo directo del nombre de lugar. Se usa la forma castellana asentada y transparente para la lectura pública.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica hebrea de forma natural en español, sin perder la estructura informativa del original.
- source_word: צִבְיָה
  english_pob_choice: Zibiah
  chosen_spanish: Zibía
  alternatives_spanish:
  - Zibia
  lexicon: Transliteration
  rationale: Se translitera el nombre propio en una forma hispanizada mínima para facilitar lectura y pronunciación, manteniendo la identificación del nombre original.
- source_word: מִבְּאֵר שָׁבַע
  english_pob_choice: from Beer-sheba
  chosen_spanish: de Beer-sheba
  alternatives_spanish:
  - de Beerseba
  - de Beer Sheba
  lexicon: HALOT
  rationale: La preposición מִ indica procedencia/origen. Se conserva el topónimo compuesto con grafía reconocible, manteniendo la relación geográfica del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios necesarios y que el acuerdo con la fuente fue alto; por ello, la draft española sigue de cerca la formulación directa del texto hebreo y la equivalencia óptima ya aceptada en inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece.
  - Se usa ‘reinó’ como fórmula real estándar, coherente con el registro narrativo.
  - Los nombres propios se conservan transliterados de modo legible en español.
  - Se evitó ‘SEÑOR’ o perífrasis doctrinales porque el versículo no contiene el Tetragrámaton ni un problema teológico explícito.
