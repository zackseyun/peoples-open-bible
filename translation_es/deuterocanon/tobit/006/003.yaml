translation:
  language: es
  text: Entonces el joven bajó para lavarse[a], y un pez saltó del río y quiso tragarse al joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intentó tragarse al joven». El verbo griego puede indicar voluntad o intento; la redacción principal usa «quiso» para conservar esa tensión con una expresión natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el niño
  - el muchacho joven
  lexicon: LSJ
  rationale: παιδάριον es un diminutivo que puede significar muchacho, niño o joven. En Tobit, el personaje viaja y actúa con autonomía, así que «el joven» conserva la referencia narrativa sin infantilizarlo.
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: LSJ
  rationale: El verbo expresa movimiento hacia abajo. «Bajó» es la forma natural en español y conserva la dirección concreta del desplazamiento hacia el agua.
- source_word: περικλύσασθαι
  english_pob_choice: to wash himself
  chosen_spanish: lavarse
  alternatives_spanish:
  - bañarse
  - enjuagarse
  lexicon: LSJ
  rationale: El infinitivo medio indica que la acción recae sobre el propio sujeto. «Lavarse» reproduce con claridad la idea de limpiarse; «bañarse» podría sugerir más de lo que el contexto requiere.
- source_word: ἀνεπήδησεν
  english_pob_choice: leaped up
  chosen_spanish: saltó
  alternatives_spanish:
  - brincó
  - se levantó de un salto
  lexicon: LSJ
  rationale: El verbo comunica un movimiento súbito hacia arriba. «Saltó» preserva la vivacidad narrativa con una formulación natural en español.
- source_word: ἰχθύς
  english_pob_choice: a fish
  chosen_spanish: un pez
  alternatives_spanish:
  - el pez
  lexicon: LSJ
  rationale: El sustantivo aparece sin artículo en griego; «un pez» mantiene ese valor indefinido en la primera mención.
- source_word: ἀπὸ τοῦ ποταμοῦ
  english_pob_choice: from the river
  chosen_spanish: desde el río
  alternatives_spanish:
  - del río
  - fuera del río
  lexicon: LSJ
  rationale: «Desde el río» conserva el punto de procedencia y encaja bien con la imagen de un salto repentino fuera del agua.
- source_word: ἐβουλήθη
  english_pob_choice: tried to
  chosen_spanish: quiso
  alternatives_spanish:
  - intentó
  - deseó
  lexicon: LSJ
  rationale: El verbo puede expresar voluntad o intención. En español, «quiso» mantiene el impulso volitivo y permite oír la intención hostil sin imponer una paráfrasis más fuerte que el griego.
- source_word: καταπεῖν
  english_pob_choice: to swallow
  chosen_spanish: tragarse
  alternatives_spanish:
  - devorarlo
  - engullirlo
  lexicon: LSJ
  rationale: El verbo significa literalmente «tragar». El reflexivo «tragarse» reproduce bien la acción dirigida al joven y suena natural en español, sin intensificar indebidamente la imagen.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal, concordando con el juicio de alta concordancia del audit trail en inglés. La traducción inglesa opta por un equivalente dinámico («tried to swallow»); en español se preservó la misma tensión semántica con «quiso tragarse», sin perder la posibilidad de una lectura más intencional que ejecutiva.
  spanish_consistency_notes:
  - Se mantuvo «el joven» de forma coherente para τὸ παιδάριον, evitando «niño» para no desajustar la edad narrativa de Tobit.
  - No se introdujo vocabulario litúrgico o eclesial ajeno al pasaje; la escena se tradujo con léxico concreto y narrativo.
  - 'La elección de «desde el río» y «saltó» conserva la secuencia visual del griego: descenso al agua, salto del pez y amenaza de ingestión.'
