translation:
  language: es
  text: Entonces el monte Sinaí estaba todo cubierto de humo, porque Yahvé había descendido sobre él en fuego, y su humo subió como el humo de un horno[a], y todo el monte tembló grandemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el humo de un horno de cocción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַר סִינַי
  english_pob_choice: Now Mount Sinai
  chosen_spanish: Entonces el monte Sinaí
  alternatives_spanish:
  - Y el monte Sinaí
  - Ahora el monte Sinaí
  lexicon: HALOT
  rationale: El hebreo abre con waw narrativa; en español, 'Entonces' conserva la continuación discursiva y suena natural en una escena narrativa solemne. 'Monte Sinaí' traduce directamente הַר סִינַי.
- source_word: עָשַׁן כֻּלּוֹ
  english_pob_choice: was all in smoke
  chosen_spanish: estaba todo cubierto de humo
  alternatives_spanish:
  - estaba completamente en humo
  - estaba todo humeando
  lexicon: HALOT
  rationale: עָשַׁן expresa un estado de estar humeante/llenarse de humo; כֻּלּוֹ intensifica la totalidad. 'Cubierto de humo' comunica bien el estado resultante en español sin volver demasiado activo el verbo.
- source_word: מִפְּנֵי אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La expresión introduce la causa; 'porque' es la forma más clara y natural en español.
- source_word: יָרַד עָלָיו יְהוָה
  english_pob_choice: the LORD had descended on it
  chosen_spanish: Yahvé había descendido sobre él
  alternatives_spanish:
  - Yahvé descendió sobre él
  - el Señor había descendido sobre él
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' por la política del proyecto para יְהוָה. El pluscuamperfecto refleja bien que el descenso de Yahvé es la causa ya dada del estado del monte.
- source_word: בָּאֵשׁ
  english_pob_choice: in fire
  chosen_spanish: en fuego
  alternatives_spanish:
  - con fuego
  - entre fuego
  lexicon: HALOT
  rationale: La preposición ב con אֵשׁ indica el modo/manifestación de la descenso; 'en fuego' mantiene la concreción del hebreo y la imagen teofánica.
- source_word: וַיַּעַל עֲשָׁנוֹ
  english_pob_choice: and its smoke went up
  chosen_spanish: y su humo subía
  alternatives_spanish:
  - y su humo ascendía
  - y el humo de él subía
  lexicon: HALOT
  rationale: עלה conserva el movimiento hacia arriba; 'subía' comunica bien el aspecto narrativo imperfectivo del vav consecutivo en español.
- source_word: כְּעֶשֶׁן הַכִּבְשָׁן
  english_pob_choice: like the smoke of a furnace
  chosen_spanish: como el humo de un horno
  alternatives_spanish:
  - como el humo de un horno de fundición
  - como el humo de un horno/horno de cal
  lexicon: HALOT
  rationale: כִּבְשָׁן puede ser 'horno' o 'horno/kiln'. Se eligió 'horno' por ser natural y suficientemente amplio; el sentido de humo intenso queda preservado. En español, 'horno' evita forzar una especificación técnica que el contexto no exige.
- source_word: וַיֶּחֱרַד
  english_pob_choice: and trembled
  chosen_spanish: temblaba
  alternatives_spanish:
  - se estremecía
  - se agitaba
  - se conmovía
  lexicon: HALOT
  rationale: חרד expresa temblor/estremecimiento intenso. 'Temblaba' es la opción más clara y fiel; en combinación con 'grandemente' conserva la intensidad sin sobreinterpretar un matiz emocional específico.
- source_word: כָּל הָהָר מְאֹד
  english_pob_choice: the whole mountain trembled greatly
  chosen_spanish: todo el monte temblaba grandemente
  alternatives_spanish:
  - todo el monte temblaba muchísimo
  - todo el monte se estremecía enormemente
  lexicon: HALOT
  rationale: כָּל הָהָר se traduce con 'todo el monte'. מְאֹד intensifica el verbo; 'grandemente' preserva la fuerza del adverbio y mantiene un tono elevado acorde al pasaje.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrama como 'Yahweh'; en español, la forma equivalente y ya asentada en este registro es 'Yahvé'. Se evita la sustitución por 'SEÑOR' para no ocultar el nombre propio revelado en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó la lectura inglesa auditada y no hay revisiones aplicadas; la versión española conserva la misma decisión de fondo sobre el Tetragrama, la imagen del humo y la intensidad del temblor.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en coherencia con los términos del proyecto.
  - '''Monte Sinaí'' y ''monte'' se usan de forma consistente para הַר.'
  - '''Humo'' se emplea para עָשָׁן/עֲשָׁן, manteniendo la imagen física del pasaje.'
  - '''Horno'' se eligió como equivalente general de כִּבְשָׁן, con nota de alternativa lexical.'
  - '''Temblaba grandemente'' conserva la intensificación de מְאֹד sin introducir un matiz doctrinal nuevo.'
