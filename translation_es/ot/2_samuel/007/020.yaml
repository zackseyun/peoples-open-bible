translation:
  language: es
  text: ¿Y qué más puede decirte David? Tú conoces a tu siervo, Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וּמַה
  english_pob_choice: And what / what more
  chosen_spanish: ¿Y qué más
  alternatives_spanish:
  - ¿Y qué
  - ¿Qué más
  lexicon: HALOT
  rationale: En español, la pregunta retórica queda natural como «¿Y qué más…?», conservando la continuidad discursiva del וְ inicial y el valor intensivo de מה con עוֹד.
- source_word: יּוֹסִיף
  english_pob_choice: can ... say
  chosen_spanish: puede decir
  alternatives_spanish:
  - puede añadir
  - podría decir
  lexicon: HALOT
  rationale: El hebreo usa יסף + infinitivo para la idea idiomática de «añadir a hablar». En español, «puede decir» expresa de forma natural la imposibilidad retórica de añadir más palabras.
- source_word: עוֹד
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - todavía
  - de nuevo
  lexicon: HALOT
  rationale: Aquí intensifica la pregunta, por lo que «más» reproduce mejor el sentido de «¿qué más?» que un adverbio independiente como «todavía» o «de nuevo».
- source_word: לְדַבֵּר אֵלֶיךָ
  english_pob_choice: say to you
  chosen_spanish: decir a ti
  alternatives_spanish:
  - hablarte
  - decirte
  lexicon: HALOT
  rationale: El hebreo es literalmente «hablar a ti». «Decir a ti» mantiene la dirección del discurso, aunque en español habría sido igualmente posible «hablarte». Se conserva la formulación más cercana al original en la pregunta retórica.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: uso nominal estándar
  rationale: Nombre propio transliterado de forma estándar.
- source_word: וְאַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Y tú
  lexicon: HALOT
  rationale: 'El hebreo mantiene el pronombre con fuerza enfática. En español, el contexto ya suena continuado, así que la conjunción puede quedar implícita sin perder el énfasis: «Tú conoces…».'
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: conoces
  alternatives_spanish:
  - has conocido
  - sabes
  lexicon: HALOT
  rationale: El perfecto hebreo en contexto de oración expresa un conocimiento plenamente vigente. «Conoces» comunica mejor ese estado actual que un pretérito compuesto.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: a tu esclavo[a]
  alternatives_spanish:
  - a tu siervo
  - a tu servidor
  lexicon: HALOT
  rationale: La raíz עבד conserva el valor de dependencia vinculada al servicio. La POB inglesa documenta que, aunque «servant» es más natural en inglés, el campo léxico puede ser más fuerte. En español se eligió «esclavo» para mantener esa fuerza lexical, con la nota necesaria para no suavizarla indebidamente.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yavé
  - mi Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino YHWH. Según el criterio del proyecto, YHWH se rinde como «Yahvé» en el texto principal. «Señor Yahvé» evita la duplicación artificial de «Señor Señor» y conserva el compuesto reverencial sin ocultar el nombre propio.
theological_decisions:
- issue: Representación del nombre divino YHWH en la combinación אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - mi Señor Yahvé
  rationale: La decisión doctrinal del proyecto pide traducir יהוה como «Yahvé» y no como una máscara tipográfica. En esta fórmula compuesta, «Señor Yahvé» preserva el título y el nombre divino sin producir una repetición poco natural en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Fuerza léxica de עַבְדְּךָ en una oración real
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: En la escena, David se humilla ante Yahvé con lenguaje de dependencia total. Dado que la POB inglesa reconoce que el término puede cargar una fuerza de esclavitud/dependencia, se conserva «esclavo» para no diluir el matiz. La nota protege la lectura ante posibles objeciones estilísticas.
  doctrine_reference: POB lexical policy on δοῦλος / עבד where bonded-status force is present
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador de nota [a] aparece explícitamente en el texto español, anclado en «esclavo[a]». No se añadieron notas sin ancla. La redacción se ajustó también para mantener el nombre divino según la norma del proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - Se mantuvo «esclavo» para עבד por la fuerza léxica documentada, en lugar de suavizar a «siervo».
  - Se evitó «SEÑOR» o «GOD» como máscaras tipográficas ajenas al español objetivo.
  - La sintaxis del versículo conserva el tono de oración y la pregunta retórica del hebreo.
