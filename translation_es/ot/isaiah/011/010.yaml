translation:
  language: es
  text: Y en aquel día la raíz de Isaí, que está en pie como estandarte[a] para los pueblos—a él buscarán las naciones[b]—, y su lugar de reposo será glorioso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como señal para los pueblos»; נֵס designa un estandarte o señal elevada de reunión.
    reason: lexical_alternative
  - marker: b
    text: O «las naciones inquirirán de él» o «lo consultarán».
    reason: lexical_alternative
  - marker: c
    text: O «su reposo será glorioso» / «su lugar de reposo será glorioso».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será / y ... estará
  alternatives_spanish:
  - Y ... acontecerá
  - Y ... vendrá a ser
  lexicon: HALOT
  rationale: La fórmula profética introduce un estado o acontecimiento futuro; en español, «y en aquel día» seguido de «será» mantiene la apertura natural sin forzar un calco arcaizante.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: «En aquel día» conserva el valor fórmula-escatológico de Isaías y es la equivalencia más estable en español bíblico sin sonar rígida.
- source_word: שֹׁרֶשׁ יִשַׁי
  english_pob_choice: the root of Jesse
  chosen_spanish: la raíz de Isaí
  alternatives_spanish:
  - el retoño de Isaí
  - la raíz de Jesé
  lexicon: HALOT
  rationale: Se preserva la metáfora de «raíz» y el nombre propio bíblico en la forma española habitual «Isaí». «Raíz» respeta el lenguaje del texto y su fuerza intertextual.
- source_word: עֹמֵד
  english_pob_choice: stands
  chosen_spanish: que está en pie
  alternatives_spanish:
  - que se alza
  - que permanece
  lexicon: HALOT
  rationale: «Está en pie» transmite la postura firme y presente del participio sin introducir una imagen más interpretativa como «se alza», aunque esta también sería viable.
- source_word: לְנֵס עַמִּים
  english_pob_choice: as a banner for the peoples
  chosen_spanish: como estandarte para los pueblos
  alternatives_spanish:
  - como señal para los pueblos
  - como bandera para los pueblos
  lexicon: HALOT
  rationale: «Estandarte» conserva la idea de un signo levantado de convocatoria. «Bandera» es posible, pero «estandarte» suena más cercano al valor emblemático y público de נֵס.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - a quien
  lexicon: HALOT
  rationale: «A él» es la expresión más directa y natural con «buscarán», manteniendo el movimiento dirigido hacia la figura del versículo.
- source_word: גּוֹיִם יִדְרֹשׁוּ
  english_pob_choice: the nations will seek
  chosen_spanish: buscarán las naciones
  alternatives_spanish:
  - las naciones le consultarán
  - las naciones preguntarán por él
  lexicon: HALOT
  rationale: El verbo דרשׁ puede significar buscar, inquirir o consultar. Dado el contexto de atracción internacional hacia la figura davídica, «buscarán» preserva bien el campo semántico sin cerrar la ambigüedad de fondo.
- source_word: וְהָיְתָה מְנֻחָתוֹ כָּבוֹד
  english_pob_choice: and his resting place will be glorious
  chosen_spanish: y su lugar de reposo será gloria
  alternatives_spanish:
  - y su descanso será glorioso
  - y su lugar de reposo será glorioso
  lexicon: HALOT
  rationale: Se mantiene la estructura nominal hebrea de מְנֻחָתוֹ + כָּבוֹד. «Lugar de reposo» conserva la posible referencia locativa, y «será gloria» retiene el sustantivo hebreo sin reducirlo a un simple adjetivo.
theological_decisions:
- issue: Referencia mesiánica de la «raíz de Isaí»
  english_pob_reading: Retain the expression without making the messianic identification explicit in the main text.
  chosen_spanish_reading: Conservar la expresión sin añadir una identificación explícita con el Mesías en el texto principal.
  alternative_spanish_readings:
  - la raíz mesiánica de Isaí
  - el Mesías, la raíz de Isaí
  rationale: El hebreo no explicita la identificación, aunque el marco canónico la favorece fuertemente. La traducción conserva la metáfora para no sobreinterpretar, dejando que la fuerza teológica emerja del propio texto.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Sentido de מְנֻחָתוֹ כָּבוֹד
  english_pob_reading: his resting place will be glorious
  chosen_spanish_reading: su lugar de reposo será gloria
  alternative_spanish_readings:
  - su descanso será glorioso
  - su lugar de reposo será glorioso
  rationale: El hebreo es compacto y admite una lectura nominal. «Será gloria» preserva la densidad del sustantivo כָּבוֹד; «lugar de reposo» mantiene la posible lectura espacial sin convertir el cierre en una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: 'La redacción sigue la alta concordancia del audit trail inglés y conserva las decisiones revisadas: el valor de נֵס como signo levantado, el rango semántico de דרשׁ entre buscar/inquirir/consultar, y la clausula nominal final de כָּבוֹד. Se adopta una formulación española fluida que mantiene esas tensiones sin resolverlas de manera indebida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece explícitamente; este versículo no lo contiene.
  - Se mantiene «Isaí» como forma española bíblica del nombre propio.
  - «Pueblos» traduce עַמִּים y «naciones» traduce גּוֹיִם para conservar la distinción del hebreo.
  - «Estandarte» se eligió por su cercanía funcional a נֵס y por su registro bíblico comprensible.
  - La clausura con «gloria» conserva el peso nominal de כָּבוֹד y no lo reduce prematuramente a un adjetivo.
