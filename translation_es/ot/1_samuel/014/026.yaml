base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/026.yaml
  text: When the people came into the forest[a], behold, there was a flow of honey, but no one put his hand to his mouth[c][b], because the people feared the oath.
  footnotes:
  - marker: a
    text: Or, 'honey was flowing' or 'a stream of honey.' The Hebrew expression is literally 'a going/flow of honey.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'no one put his hand to his mouth,' an idiom meaning no one ate any of the honey.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'the oath'; in context this refers to Saul's earlier oath that effectively placed a curse on anyone who ate before evening (see 1 Sam 14:24).
    reason: cross_reference
