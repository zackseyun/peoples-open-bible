translation:
  language: es
  text: 'Así dice Yahvé[a], el que lo hizo[c][b], Yahvé que lo formó para establecerlo—Yahvé es su nombre:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que lo hace ... el que lo forma para establecerlo». Los participios hebreos pueden traducirse con un sentido más presente y continuo.'
    reason: lexical_alternative
  - marker: b
    text: El nombre divino YHWH se expresa aquí con «Yahvé»; otras traducciones usan «el SEÑOR».
    reason: alternative_reading
  - marker: c
    text: Los sufijos femeninos de «lo hizo ... lo formó ... establecerlo» también podrían reflejarse con «la», pero el verso no identifica explícitamente el referente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Esto dice
  lexicon: HALOT
  rationale: Introduce una fórmula profética en un español natural y solemne. 'Así' conserva el tono declarativo sin sonar artificial.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: ha dicho
  alternatives_spanish:
  - dice
  - dijo
  lexicon: HALOT
  rationale: La fórmula profética puede sonar presente o perfecta en español. 'Ha dicho' mantiene el valor declarativo y evita una rigidez excesiva, sin perder la fuerza de palabra proclamada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo. 'Yahvé' es el término base del proyecto en español y evita la sustitución por un título.
- source_word: עֹשָׂהּ
  english_pob_choice: who made it
  chosen_spanish: quien lo hizo
  alternatives_spanish:
  - quien lo hace
  - quien lo hizo a ella
  lexicon: HALOT
  rationale: El participio de עשה admite un sentido aspectual continuo o puntual. En español, 'lo hizo' comunica de manera natural la acción creadora, manteniendo el referente no explícito del sufijo femenino con un pronombre neutro impersonal.
- source_word: יוֹצֵר אוֹתָהּ
  english_pob_choice: who formed it
  chosen_spanish: Yahvé que lo formó
  alternatives_spanish:
  - Yahvé que lo modeló
  - Yahvé que lo plasmó
  lexicon: HALOT
  rationale: יוֹצֵר sugiere formar/modelar con intención. 'Formó' es el equivalente más transparente y conserva el paralelismo con 'lo hizo'.
- source_word: לַהֲכִינָהּ
  english_pob_choice: to establish it
  chosen_spanish: para establecerlo
  alternatives_spanish:
  - para afirmarlo
  - para dejarlo firme
  lexicon: HALOT
  rationale: כּון en hifil puede expresar establecer, afirmar o dejar firme. 'Para establecerlo' reproduce bien la finalidad del infinitivo sin cargar la frase con una paráfrasis excesiva.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - es el nombre de él
  - su nombre es
  lexicon: HALOT
  rationale: La cláusula final identifica solemnemente al sujeto por su nombre. 'Es su nombre' conserva la estructura hebrea y resulta plenamente idiomática en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. En la línea terminológica del proyecto, se mantiene el nombre propio 'Yahvé' en lugar de sustituirlo por un título, preservando la referencia personal y pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de los sufijos femeninos en 'lo hizo / lo formó / establecerlo'
  english_pob_reading: Render with impersonal 'it' and leave the referent implicit
  chosen_spanish_reading: Mantener un pronombre neutro e implícito ('lo') sin especificar el referente
  alternative_spanish_readings:
  - lo hizo / la hizo
  - lo formó / la formó
  - especificar 'la ciudad' u otro referente
  rationale: El hebreo presenta sufijos femeninos, pero el antecedente no está explícito en el verso. En español, conviene no forzar un antecedente ni resolver la ambigüedad con una identificación interpretativa que el texto no da.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la versión española conserva el paralelismo verbal y la ambigüedad del referente, con ajuste de estilo para fluidez publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para YHWH.
  - Se conserva el referente implícito con «lo», evitando especificarlo.
  - 'Se mantiene el paralelismo de los tres verbos: hacer, formar, establecer.'
  - 'La cláusula final sigue la estructura solemne del hebreo: identificación del nombre divino al cierre.'
