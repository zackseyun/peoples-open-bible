translation:
  language: es
  text: Tengo bueyes y asnos, rebaños, siervos varones[a] y siervas, y he enviado para informar a mi señor, para hallar favor en tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esclavos y esclavas». Los términos hebreos pueden denotar servidumbre vinculada a la casa; aquí se traducen «siervos varones y siervas» por legibilidad en esta lista de bienes y miembros domésticos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִי
  english_pob_choice: I have
  chosen_spanish: Tengo
  alternatives_spanish:
  - Hay para mí
  - Me pertenecen
  - Poseo
  lexicon: HALOT
  rationale: El hebreo expresa posesión mediante היה + ל. En español, «tengo» comunica de forma natural la posesión actual en este inventario de bienes.
- source_word: שׁוֹר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  - bueyes
  lexicon: HALOT
  rationale: «Bueyes» conserva el animal bovino concreto y es más idiomático en español bíblico que una traducción demasiado general como «ganado».
- source_word: חֲמוֹר
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - caballos
  lexicon: HALOT
  rationale: «Asnos» corresponde bien al término hebreo y mantiene un registro bíblico claro en español; «burros» sería más coloquial.
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: El término hebreo es colectivo para ganado menor. «Rebaños» preserva el sentido colectivo sin forzar una especificación que el hebreo no da aquí.
- source_word: עֶבֶד
  english_pob_choice: male servants
  chosen_spanish: siervos varones
  alternatives_spanish:
  - sirvientes varones
  - esclavos varones
  - siervos
  lexicon: HALOT
  rationale: En este listado doméstico, el hebreo puede abarcar servidumbre vinculada a la casa. «Siervos varones» conserva la distinción de sexo y deja visible la tensión servil sin imponer una solución más fuerte o más débil de lo que el contexto exige.
- source_word: שִׁפְחָה
  english_pob_choice: female servants
  chosen_spanish: siervas
  alternatives_spanish:
  - sirvientas
  - esclavas
  - siervas mujeres
  lexicon: HALOT
  rationale: El femenino hebreo se refleja de modo natural con «siervas». Es breve, idiomático y mantiene la correspondencia con el masculino anterior.
- source_word: וָאֶשְׁלְחָה
  english_pob_choice: I have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  - mandé
  lexicon: HALOT
  rationale: El valor discursivo del verbo en esta comunicación se expresa bien con el perfecto español, que comunica una acción ya realizada con relevancia presente.
- source_word: לְהַגִּיד
  english_pob_choice: to tell
  chosen_spanish: para comunicarlo
  alternatives_spanish:
  - para decirlo
  - para informarlo
  - para avisarlo
  lexicon: HALOT
  rationale: «Comunicarlo» suena natural en español y transmite la función declarativa del infinitivo hebreo; el pronombre clítico retoma el contenido implícito del mensaje.
- source_word: לַאדֹנִי
  english_pob_choice: my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi señor y amo
  - a mi amo
  lexicon: HALOT
  rationale: El tratamiento es deferencial y humano, no divino. «Mi señor» reproduce la cortesía del hebreo sin cargar el texto con una formulación más dura o más servil.
- source_word: לִמְצֹא חֵן בְּעֵינֶיךָ
  english_pob_choice: so that I may find favor in your eyes
  chosen_spanish: para hallar favor en tus ojos
  alternatives_spanish:
  - para encontrar gracia en tus ojos
  - para ganar tu favor
  - para hallar gracia ante ti
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «en tus ojos», muy transparente en español bíblico, y «favor» traduce bien חֵן en este contexto de búsqueda de aceptación.
theological_decisions:
- issue: עֶבֶד / שִׁפְחָה en una lista de posesiones y personal doméstico
  english_pob_reading: male servants and female servants
  chosen_spanish_reading: siervos varones y siervas
  alternative_spanish_readings:
  - esclavos y esclavas
  - sirvientes y sirvientas
  rationale: La tradición auditada de POB evita fijar «esclavos» cuando el contexto resalta la pertenencia doméstica más que el estatus jurídico. En español, «siervos varones y siervas» mantiene la distinción de género y deja intacta la tensión entre servidumbre y pertenencia a la casa.
  doctrine_reference: 'DOCTRINE.md: contested-servitude terms; Translation philosophy §1 y §5'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no se hicieron cambios: el pasaje quedó estable con alta concordancia entre evaluaciones. No se documentaron revisiones textuales que alteren la base de trabajo.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto cuando el texto lo requiera, pero aquí no aparece el nombre divino.
  - Se conserva el tratamiento reverencial «mi señor» y el pronombre de segunda persona plural/no plural según el español de confianza no aplica; en este versículo se usa «tus ojos» por ajuste estilístico natural al hebreo y a la cita directa.
  - Se prefiere «favor» para חֵן por coherencia con el modismo hebreo y la práctica POB en contextos de aceptación favorable.
