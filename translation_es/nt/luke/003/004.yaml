translation:
  language: es
  text: 'como está escrito en el libro de las palabras de Isaías el profeta[a]: «Voz del que clama en el desierto[b]: “Preparen el camino del Señor; hagan rectas sus sendas”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé». La cita alude a Isaías 40:3, donde el hebreo tiene el nombre divino YHWH.'
    reason: alternative_reading
  - marker: b
    text: 'La frase «en el desierto» puede entenderse con «clama», como aquí, o con el mandato que sigue: «Voz del que clama: “En el desierto preparen el camino del Señor”».'
    reason: alternative_reading
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva introduce una cita de autoridad bíblica; «está escrito» es la correspondencia natural en español y conserva el valor vigente de la escritura como texto autorizado.
- source_word: ἐν βίβλῳ λόγων
  english_pob_choice: the book of the words
  chosen_spanish: en el libro de las palabras
  alternatives_spanish:
  - en el rollo de las palabras
  - en el libro
  lexicon: BDAG
  rationale: Se mantienen ambos sustantivos de la expresión griega. «Libro» es la opción más natural en español, aunque el objeto antiguo fuera más propiamente un rollo; «palabras» conserva que Lucas especifica el contenido citado.
- source_word: Ἠσαΐου τοῦ προφήτου
  english_pob_choice: Isaiah the prophet
  chosen_spanish: Isaías el profeta
  alternatives_spanish:
  - Isaías, el profeta
  lexicon: BDAG
  rationale: La estructura aposicional identifica al autor de la cita. «Isaías el profeta» es claro, fiel y natural en español.
- source_word: Φωνὴ βοῶντος
  english_pob_choice: A voice of one crying
  chosen_spanish: Voz del que clama
  alternatives_spanish:
  - Voz de uno que clama
  - Voz que clama
  lexicon: BDAG
  rationale: La construcción genitiva se expresa de forma natural con «del que clama», preservando el sentido personal del participio y el tono profético.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en el yermo
  lexicon: BDAG
  rationale: Aquí «desierto» comunica bien ἔρημος en español bíblico y retiene el trasfondo profético. La nota preserva la ambigüedad de su enlace sintáctico con «clama» o con lo que sigue.
- source_word: Ἑτοιμάσατε
  english_pob_choice: Prepare
  chosen_spanish: Preparen
  alternatives_spanish:
  - Preparaos
  - Preparad
  lexicon: BDAG
  rationale: El imperativo plural se vierte con naturalidad y dignidad en español actual. Mantiene la fuerza exhortativa del mandato.
- source_word: τὴν ὁδὸν κυρίου
  english_pob_choice: the way of the Lord
  chosen_spanish: el camino del Señor
  alternatives_spanish:
  - el camino del Señor Dios
  - el camino del Señor
  lexicon: BDAG
  rationale: «Camino» expresa bien la metáfora de la vía a preparar. En español, «Señor» conserva la forma establecida para κύριος en esta cita, siguiendo el criterio del POB inglés de no sobreespecificar «Yahvé» en el texto principal cuando el griego cita κύριος.
- source_word: εὐθείας ποιεῖτε
  english_pob_choice: make ... straight
  chosen_spanish: hagan rectas
  alternatives_spanish:
  - enderecen
  - hagan ... recto
  lexicon: BDAG
  rationale: La construcción predicativa se expresa con naturalidad mediante «hagan rectas», conservando la orden de alinear o enderezar el trayecto.
- source_word: τὰς τρίβους αὐτοῦ
  english_pob_choice: his paths
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus veredas
  lexicon: BDAG
  rationale: «Sendas» es una alternativa sobria y bíblicamente apta para τρίβοι, manteniendo el paralelismo con «camino» y la imaginería de preparación de rutas.
theological_decisions:
- issue: κύριος en una cita de Isaías que en hebreo remite al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto griego cita κύριος, y la pauta del POB para κύριος es «Lord»; en español, el equivalente funcional es «Señor». Aunque el trasfondo de Isaías 40:3 remite a YHWH, el texto principal conserva la forma del título griego y deja el matiz del nombre divino sin imponerlo en la línea principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje fuente y el audit trail inglés sin cambios sustantivos respecto de la última revisión: se mantiene la cita de Isaías con el eco de Isaías 40:3, la opción principal para κύριος como «Señor», y la nota sobre la posible asociación sintáctica de «en el desierto».'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en coherencia con la decisión documental del POB y con el estilo bíblico español.
  - Se evita «SEÑOR» mayúsculo como convención de sustitución, conforme al criterio del proyecto; si se menciona Yahvé, queda en nota.
  - «Sendas» se eligió para τρίβους por su tono bíblico y por mantener el paralelo con «camino».
