translation:
  language: es
  text: 'La palabra que habló Jeremías el profeta a Baruc hijo de Nerías, cuando escribió estas palabras en un rollo al dictado de Jeremías[a], en el cuarto año de Joacim hijo de Josías, rey de Judá, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la boca de Jeremías»; literalmente, «de la boca de Jeremías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta es la palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto' o 'mensaje'. En un encabezado profético, 'la palabra' conserva el registro formal y la fórmula profética sin añadir paráfrasis.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de hablar. 'Habló' suena natural en español y mantiene el tono narrativo solemne del encabezado.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Jeremías
  - profeta
  lexicon: HALOT
  rationale: Título directo y transparente; en español es el equivalente natural del hebreo y del inglés auditado.
- source_word: בְּכָתְבוֹ
  english_pob_choice: when he wrote
  chosen_spanish: cuando escribió
  alternatives_spanish:
  - al escribir
  - mientras escribía
  lexicon: HALOT
  rationale: La construcción temporal señala el momento de la escritura. 'Cuando escribió' es claro y fiel, y evita una traducción demasiado rígida.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: En contexto de dictado y registro escrito, 'palabras' reproduce mejor el sentido textual que 'cosas' o 'dichos'.
- source_word: עַל־סֵפֶר
  english_pob_choice: in a scroll
  chosen_spanish: en un rollo
  alternatives_spanish:
  - sobre un rollo
  - en un libro
  lexicon: HALOT
  rationale: סֵפֶר aquí designa un documento escrito, probablemente un rollo. 'Rollo' es el equivalente español más natural y preciso; 'libro' sería engañoso.
- source_word: מִפִּי יִרְמְיָהוּ
  english_pob_choice: at the mouth of Jeremiah
  chosen_spanish: al dictado de Jeremías
  alternatives_spanish:
  - de la boca de Jeremías
  - por boca de Jeremías
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a dictado oral. En español, 'al dictado de Jeremías' comunica ese sentido con naturalidad, sin perder la relación con el hebreo.
- source_word: בַּשָּׁנָה הָרְבִעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  lexicon: HALOT
  rationale: Fórmula cronológica estándar; se traduce de forma directa.
- source_word: לִיהוֹיָקִים
  english_pob_choice: of Jehoiakim
  chosen_spanish: de Joacim
  alternatives_spanish:
  - de Jehoiaquim
  lexicon: HALOT
  rationale: Se usa la forma española más extendida y reconocible de ese nombre real, sin alterar la referencia histórica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  lexicon: HALOT
  rationale: Fórmula introductoria que anticipa la cita siguiente; 'diciendo' conserva la estructura hebrea y el tono formal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene el encabezado profético, conserva la referencia idiomática a la oralidad de Jeremías y adapta עַל־סֵפֶר a un español natural con ''en un rollo''. También incorpora la forma española convencional ''Joacim'' para el nombre real, sin perder la identificación histórica.'
  spanish_consistency_notes:
  - Se preserva 'Yahvé' solo cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - Se mantiene el título profético 'el profeta' y la fórmula narrativa con 'diciendo' para conservar el registro de superscripción.
  - '''Rollo'' se usa para סֵפֶר en este contexto documental, evitando ''libro'' por anacrónico.'
  - '''Al dictado de Jeremías'' refleja el idioma hebreo sin borrar la metáfora de ''la boca'' en la nota.'
  - '''Joacim'' es la forma castellana de uso tradicional; se evita la transliteración inglesa para lectura eclesial en español.'
