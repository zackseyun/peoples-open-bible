    issue: «Su daño» para עֲמָלוֹ introduce ambigüedad de posesión/paciente
    rationale: En español, «su daño» suele entenderse como el daño que él recibe, mientras que el hebreo aquí se refiere al mal/perjuicio que él ha tramado y que vuelve sobre él.
  - severity: medium
    issue: La nota [a] está mal formulada y no refleja fielmente el expediente inglés
    rationale: 'Dice «O: “su maldad” o “su daño”» mientras el texto principal ya usa «daño», y omite la gama «trouble/mischief». Debe explicar mejor el campo semántico de עָמָל en este contexto retributivo.'
  - severity: low
    issue: Falta de «propio» en la segunda línea respecto a la intensificación del inglés auditado
    rationale: No es necesario añadirlo, porque el español ya es natural y el posesivo basta; no obstante, el paralelismo queda suficientemente conservado sin cambio.
  revised_spanish_text: Su mal[a] volverá sobre su propia cabeza[b], y su violencia descenderá sobre su cráneo.
