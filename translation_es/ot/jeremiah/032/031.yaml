  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ira»/«furor» para אַף/חֵמָה es aceptable; «Porque» para כִּי y «ha sido para mí» para הָיְתָה לִּי son correctos. La conservación del antropomorfismo es adecuada. La revisión propuesta mejora la naturalidad sin apartarse de la filosofía POB.
