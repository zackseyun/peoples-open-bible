review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: declaración anticipada, anuncio antes del cumplimiento, propósito preventivo, y triple referencia polémica a objetos idolátricos distintos. Sin embargo, las notas al pie no siguen fielmente la auditoría inglesa: la nota [a] fue colocada en «desde hace mucho» pero su contenido corresponde a «antes de que sucediera»; la nota [b] duplica esa misma alternativa en lugar de preservar la observación inglesa sobre el literal «antes de que viniera/llegara»; y la nota [c] introduce una alternativa innecesaria para «mi ídolo» que debilita una decisión léxica ya documentada. Además, conviene ajustar «para que no dijeras» a «no sea que dijeras» para reflejar mejor פֶּן.'
  spanish_quality_summary: El español es claro, natural y digno. «Te lo declaré», «te lo hice oír», «imagen tallada» e «imagen fundida» funcionan bien. El principal problema es de aparato crítico y anclaje de notas, no de fluidez. También «no sea que dijeras» suena más cercano al matiz preventivo del hebreo que «para que no dijeras».
  glossary_alignment: No hay conflicto con la terminología de proyecto. Se conserva correctamente la triple distinción «ídolo / imagen tallada / imagen fundida». No intervienen aquí Yahvé, Mesías, espíritu, etc. La decisión de no usar «imagen» para עָצְבִּי en el texto principal es correcta según la auditoría inglesa.
  issues:
  - severity: high
    issue: Las notas [a] y [b] están intercambiadas y duplican contenido incorrectamente.
    rationale: La nota inglesa [a] pertenece a «before it came to pass / before it happened» y explica que el hebreo es literalmente «before it came». En el borrador, [a] está anclada en «desde hace mucho», lo cual no corresponde al source ni a la auditoría.
  - severity: medium
    issue: La nota [c] para «mi ídolo» introduce una alternativa no respaldada como nota necesaria.
    rationale: La auditoría inglesa no preserva una nota aquí; además, añadir «mi imagen» como alternativa debilita la diferenciación léxica intencional entre עָצְבִּי, פִסְלִי y נִסְכִּי.
  - severity: low
    issue: «Para que no dijeras» puede mejorarse a «no sea que dijeras».
    rationale: פֶּן introduce una cláusula preventiva. «No sea que» reproduce mejor ese matiz en español bíblico moderno y digno.
  revised_spanish_text: 'Te lo declaré desde hace mucho; antes de que sucediera[a], te lo hice oír, no sea que dijeras: «Mi ídolo las hizo, y mi imagen tallada y mi imagen fundida[b] las mandaron».'
  revised_footnotes:
  - marker: a
    text: 'O: «antes de que viniera». El hebreo dice literalmente «antes de que viniera / llegara».'
    reason: lexical_alternative
  - marker: b
    text: «Imagen fundida» también puede traducirse «imagen de fundición».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el aparato de notas para que coincida con la evidencia fuente y la auditoría inglesa, elimina una nota innecesaria sobre «mi ídolo», y mejora ligeramente la representación de פֶּן con «no sea que». El texto principal ya era sustancialmente fiel, por lo que los cambios son puntuales.
