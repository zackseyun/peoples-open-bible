translation:
  language: es
  text: Sube a este monte de los Abarim, el monte Nebo, que está en la tierra de Moab, frente a Jericó[a], y mira la tierra de Canaán, que yo estoy dando a los hijos de Israel[b] como posesión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enfrente de Jericó» o «opuesto a Jericó». El hebreo usa un modismo geográfico que indica posición opuesta o enfrente de Jericó.
    reason: lexical_alternative
  - marker: b
    text: 'O «a los israelitas». Hebreo: «a los hijos de Israel».'
    reason: lexical_alternative
  - marker: c
    text: O «como heredad». El término hebreo puede designar una posesión o un terreno en propiedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Ve hacia arriba
  lexicon: HALOT
  rationale: El imperativo qal de עלה expresa movimiento ascendente. «Sube» es natural en español y conserva la dirección del mandato sin volverlo artificiosamente solemne.
- source_word: הַר הָעֲבָרִים
  english_pob_choice: mountain of the Abarim
  chosen_spanish: monte de los Abarim
  alternatives_spanish:
  - el monte de los Abarim
  - la montaña de los Abarim
  - el monte de la región de Abarim
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico Abarim como topónimo transliterado. «Monte de los Abarim» reproduce bien la construcción hebrea y su referencia territorial.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  lexicon: HALOT
  rationale: El demostrativo modifica al sintagma del monte y en español basta «este» para conservar la deíxis sin sobrecargar la frase.
- source_word: הַר נְבוֹ
  english_pob_choice: Mount Nebo
  chosen_spanish: el monte Nebo
  alternatives_spanish:
  - el monte de Nebo
  lexicon: HALOT
  rationale: Se conserva Nebo como nombre propio y se expresa la aposición con «el monte Nebo», forma clara y fiel en español.
- source_word: אֲשֶׁר בְּאֶרֶץ מוֹאָב
  english_pob_choice: which is in the land of Moab
  chosen_spanish: que está en la tierra de Moab
  alternatives_spanish:
  - que está en el país de Moab
  - que está en la tierra moabita
  lexicon: HALOT
  rationale: «Tierra de Moab» es la equivalencia directa y tradicional del hebreo אֶרֶץ + nombre propio; «está» reproduce el valor locativo del relativo.
- source_word: אֲשֶׁר עַל פְּנֵי יְרֵחוֹ
  english_pob_choice: opposite Jericho
  chosen_spanish: frente a Jericó
  alternatives_spanish:
  - opuesto a Jericó
  - enfrente de Jericó
  - de cara a Jericó
  lexicon: HALOT
  rationale: El modismo espacial עַל־פְּנֵי en contextos geográficos indica posición enfrente/opuesta. «Frente a Jericó» comunica ese sentido con naturalidad, sin perder la orientación topográfica.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y contempla
  lexicon: HALOT
  rationale: El imperativo de ראה aquí pide observar con atención. «Mira» funciona bien en español y evita el tono demasiado arcaico de «ve» o el más interpretativo «contempla».
- source_word: אֶת אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la tierra de Kenán
  lexicon: HALOT
  rationale: Se mantiene el nombre propio consagrado por el uso bíblico en español. «Tierra de Canaán» refleja con precisión el objeto directo marcado por אֶת.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  english_pob_choice: which I am giving
  chosen_spanish: que yo doy
  alternatives_spanish:
  - que yo estoy dando
  - que yo estoy entregando
  - que yo voy a dar
  lexicon: HALOT
  rationale: El participio נֹתֵן puede expresar acción en curso o inminente. En español, «yo doy» conserva la fuerza presente del don divino y evita una perífrasis excesiva.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Jacob
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión masculina plural del hebreo, traduciendo בְּנֵי como «hijos». Es una fórmula de pacto bien reconocible y más cercana al texto que la neutralización con «pueblo» o «israelitas».
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como propiedad
  - como herencia
  lexicon: HALOT
  rationale: אֲחֻזָּה denota una posesión o tenencia, a menudo de tierra. «Posesión» es fiel y sobrio; «heredad» o «herencia» introducirían una matización más específica que el sustantivo por sí solo no exige.
theological_decisions:
- issue: Mantener el masculino plural en בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - al pueblo de Israel
  - a los hijos de Jacob
  rationale: La expresión hebrea es una fórmula covenantal masculina plural. Se preserva su forma fuente para no diluir la concreción del término, siguiendo la lectura auditada del POB en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés indica que no se introdujeron cambios y que existe alto acuerdo con la fuente; por tanto, la presente redacción sigue de cerca el texto hebreo y las decisiones auditadas del POB inglés sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene «Canaán», «Moab», «Jericó» y «Nebo» como topónimos transliterados estándar en español.
  - Se conserva «hijos de Israel» para reflejar la fórmula hebrea masculina plural sin neutralización.
  - «Posesión» se usa de manera general, sin forzar la idea específica de herencia, que queda como alternativa en nota.
