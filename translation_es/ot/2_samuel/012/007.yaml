review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca el audit trail inglés: Natán confronta a David, se conserva la fórmula profética, el nombre divino «Yahvé», la unción real y la liberación de Saúl. La nota alternativa sobre «ese hombre» también está bien justificada. Sin embargo, hay un desajuste de fuerza discursiva en אַתָּה הָאִישׁ: el inglés auditado marca exclamación por el clímax acusatorio, y el español la pierde con punto. También conviene suavizar la repetición explícita de «yo» en la segunda cláusula, ya que el énfasis puede mantenerse sin sonar rígido en español.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Así dice Yahvé, el Dios de Israel» y «te libré de la mano de Saúl» funcionan bien. La principal mejora es estilística y pragmática: «¡Tú eres el hombre!» comunica mejor la fuerza de la reprensión. Además, omitir el segundo «yo» mejora la naturalidad sin perder el énfasis global del original.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel», מְשַׁחְתִּיךָ → «te ungí», הִצַּלְתִּיךָ → «te libré». «Como rey» para לְמֶלֶךְ es aceptable en español. No hay conflictos doctrinales relevantes.'
  issues:
  - severity: medium
    issue: Falta la exclamación en «Tú eres el hombre»
    rationale: אַתָּה הָאִישׁ es la acusación climática de Natán; el audit trail inglés la traduce con exclamación. En español, «¡Tú eres el hombre!» preserva mejor la fuerza retórica del original.
  - severity: low
    issue: La repetición de «yo» en ambas cláusulas suena algo rígida en español
    rationale: El hebreo usa pronombre independiente para énfasis, pero en español no siempre hace falta repetirlo de forma plena en cada cláusula. Mantener «Yo te ungí...» y luego «y te libré...» conserva el sentido con mejor fluidez.
