revisions:
- from: 'Entonces ella dijo al rey[a]: «Verdad es la palabra que oí en mi tierra acerca de tus palabras y acerca de tu sabiduría».'
  to: 'Entonces ella dijo al rey[a]: «Era verdad lo que oí en mi tierra acerca de tus palabras y de tu sabiduría»'
  rationale: Se cambia la cláusula principal a «Era verdad lo que oí...» para expresar con español natural el modismo אֱמֶת הַדָּבָר אֲשֶׁר שָׁמַעְתִּי, manteniendo el contenido semántico del hebreo y de la traducción inglesa auditada. Se conserva «tus palabras» en el texto principal, conforme a la decisión del POB, y se mueve la alternativa más literal/amplia («asunto», «tus asuntos») a la nota. También se suaviza la repetición preposicional para mejorar la legibilidad.
