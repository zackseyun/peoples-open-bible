- from: Proclamaron un ayuno y sentaron a Nabot en[a] cabeza del pueblo.
  to: Proclamaron un ayuno y sentaron a Nabot al frente del pueblo[a].
  rationale: Se cambia 'en cabeza del pueblo' por 'al frente del pueblo' para lograr un español natural y claro en el cuerpo del texto, mientras la nota conserva tanto las alternativas como la literalidad hebrea documentada por el POB.
