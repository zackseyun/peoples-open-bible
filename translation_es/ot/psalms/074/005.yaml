  language: es
  text: Era como alguien que alzaba hachas en una espesura de árboles[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se hizo conocido como quien llevaba hachas hacia arriba en una espesura de madera». El hebreo es compacto y algo difícil, por eso se conserva aquí una traducción más formal.'
