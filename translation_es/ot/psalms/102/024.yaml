translation:
  language: es
  text: Afligió su fuerza[a] en el camino[b]; acortó mis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «su fuerza»; muchos entienden «mi fuerza» a la luz del contexto circundante en primera persona.
    reason: alternative_reading
  - marker: b
    text: 'O: «en el curso de la vida»; literalmente, «en el camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִנָּה
  english_pob_choice: afflicted
  chosen_spanish: afligió
  alternatives_spanish:
  - humilló
  - debilitó
  lexicon: HALOT
  rationale: El piel de ענה puede expresar afligir, humillar o debilitar. En español, «afligió» conserva la fuerza verbal y deja la imagen poética sin suavizarla excesivamente.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en el curso de la vida
  - a lo largo del viaje
  lexicon: HALOT
  rationale: La expresión es literalmente locativa («en/on the way»). «En el camino» preserva la imagen básica en español natural y permite la lectura metafórica del curso de la vida sin imponerla en el texto principal.
- source_word: כחו
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - su fuerza
  lexicon: HALOT
  rationale: Aunque la lectura consonántica señalada en el contexto inglés apunta a tercera persona en hebreo, el auditor revisó la forma hacia la primera persona para ajustar la referencia contextual. En español, «mi fuerza» mantiene la coherencia del sujeto poético del salmo y refleja la lectura adoptada en la revisión más reciente.
- source_word: קִצַּר
  english_pob_choice: shortened
  chosen_spanish: acortó
  alternatives_spanish:
  - recortó
  - cortó
  lexicon: HALOT
  rationale: «Acortó» es el equivalente más natural y claro en español para el valor básico de קצר, conservando el paralelismo poético.
- source_word: יָמָי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - mis años
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona se traduce de manera directa. «Mis días» conserva el sentido de duración de vida sin añadir interpretación.
theological_decisions:
- issue: Tensión de persona en el verso
  english_pob_reading: The English audit trail preserved a tension between an earlier third-person understanding and the latest revision favoring first person ('my strength').
  chosen_spanish_reading: 'Mantener la primera persona coherente en la línea principal: «mi fuerza» / «mis días».'
  alternative_spanish_readings:
  - «su fuerza» / «mis días»
  rationale: El propio registro de revisión más reciente corrige la lectura hacia primera persona para la fuerza. En español conviene seguir esa decisión revisada y no conservar una mezcla artificial de personas, ya que aquí no se documenta una tensión teológica que deba preservarse en la forma final.
  doctrine_reference: Translation philosophy §3; revision_awareness del paquete de auditoría.
translation_notes:
  revision_awareness: El paquete de auditoría muestra una revisión reciente que cambió la lectura de la fuerza desde «his strength» a «my strength». Esta versión española sigue esa corrección y conserva la imagen de «en el camino», con una nota alternativa para su posible valor idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando el nombre divino aparece, pero este versículo no lo contiene.
  - Se mantiene el paralelismo breve de dos cola, con puntuación semicolon para reflejar la poesía hebrea.
  - «Mi fuerza» sigue la lectura revisada del expediente; no se introduce una harmonización adicional más allá de la revisión ya documentada.
