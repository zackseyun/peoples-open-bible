translation:
  language: es
  text: 'Entonces Moisés subió de las llanuras de Moab al monte Nebo, a la cima de Pisgá, que está frente a Jericó. Y Yahvé le mostró[a] toda la tierra: Galaad hasta Dan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé le hizo ver toda la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. En español, «subió» es natural, claro y conserva el sentido direccional sin añadir solemnidad innecesaria.
- source_word: מֵעַרְבֹת מוֹאָב
  english_pob_choice: from the plains of Moab
  chosen_spanish: desde las llanuras de Moab
  alternatives_spanish:
  - desde las estepas de Moab
  - desde la planicie de Moab
  lexicon: HALOT
  rationale: עַרְבוֹת nombra una región baja y abierta; «llanuras» comunica bien el valor geográfico en español contemporáneo y mantiene la referencia territorial.
- source_word: הַר נְבוֹ
  english_pob_choice: Mount Nebo
  chosen_spanish: el monte Nebo
  alternatives_spanish:
  - el monte Nebó
  - el monte del Nebo
  lexicon: HALOT
  rationale: La estructura hebrea con הַר + nombre propio se vierte naturalmente como «el monte X». Se conserva el nombre propio Nebo.
- source_word: רֹאשׁ הַפִּסְגָּה
  english_pob_choice: the top of Pisgah
  chosen_spanish: la cumbre del Pisgá
  alternatives_spanish:
  - la cima del Pisgá
  - la parte superior del Pisgá
  lexicon: HALOT
  rationale: רֹאשׁ aquí es idiomático para la parte más alta. «Cumbre» mantiene la imagen de altura y suena natural en español. Se conserva Pisgá como topónimo.
- source_word: אֲשֶׁר עַל פְּנֵי יְרֵחוֹ
  english_pob_choice: which is opposite Jericho
  chosen_spanish: que está frente a Jericó
  alternatives_spanish:
  - que mira hacia Jericó
  - que está opuesto a Jericó
  lexicon: HALOT
  rationale: עַל־פְּנֵי en contexto geográfico suele indicar posición enfrente o frente a. «Frente a Jericó» comunica bien la orientación espacial sin sonar artificial.
- source_word: וַיַּרְאֵהוּ יְהוָה
  english_pob_choice: the LORD showed him
  chosen_spanish: Yahvé le mostró
  alternatives_spanish:
  - Yahvé le hizo ver
  - Yahvé le causó ver
  lexicon: HALOT
  rationale: 'El hifil de ראה tiene fuerza causativa: «hizo ver / mostró». «Le mostró» es la opción más natural en español y preserva la iniciativa divina.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el Señor
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto, el Tetragrama se vierte como «Yahvé» para preservar el nombre propio del pacto, no como sustitución titulativa.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra prometida
  - todo el país
  lexicon: HALOT
  rationale: En este pasaje הָאָרֶץ puede traducirse como «la tierra» en sentido territorial/covenantal. «Toda la tierra» conserva la amplitud del objeto visto y suena fluido en español.
- source_word: הַגִּלְעָד עַד דָּן
  english_pob_choice: Gilead as far as Dan
  chosen_spanish: Galaad hasta Dan
  alternatives_spanish:
  - Galaad, hasta Dan
  - Galaad y hasta Dan
  lexicon: HALOT
  rationale: La construcción final especifica el alcance de lo visto. «Hasta Dan» reproduce עַד de manera directa y clara. Se usa «Galaad» como forma española habitual del topónimo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo emplea el Tetragrama directamente. Mantener «Yahvé» conserva el nombre propio de Dios revelado a Israel, de acuerdo con la política del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the verb וַיַּרְאֵהוּ
  english_pob_reading: the LORD showed him / the LORD caused him to see
  chosen_spanish_reading: Yahvé le mostró
  alternative_spanish_readings:
  - Yahvé le hizo ver
  - Yahvé le causó ver
  rationale: El hifil de ראה admite una lectura causativa. «Le mostró» conserva esa causalidad de forma idiomática en español y evita una paráfrasis más pesada sin perder el sentido.
  doctrine_reference: 'Hebrew verbal morphology: Hiphil causative of ראה'
- issue: Extent phrase כָּל הָאָרֶץ ... עַד דָּן
  english_pob_reading: 'all the land: Gilead as far as Dan'
  chosen_spanish_reading: 'toda la tierra: Galaad hasta Dan'
  alternative_spanish_readings:
  - toda la tierra, Galaad hasta Dan
  - toda la tierra de Galaad hasta Dan
  rationale: El inglés POB usa dos puntos para introducir la especificación geográfica. En español, el colon también introduce con naturalidad la delimitación de la vista de Moisés, sin convertirla en una lista o en una paráfrasis.
  doctrine_reference: Source syntax and revision awareness for appositional specification
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en inglés, donde se prefirió dos puntos para introducir la especificación final («Gilead as far as Dan»). En español se preservó esa relación con «toda la tierra: Galaad hasta Dan», manteniendo la estructura de ampliación geográfica sin añadir elementos interpretativos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme a la terminología del proyecto.
  - Se mantiene «Moisés» y los topónimos bíblicos en formas españolas estándar y reconocibles.
  - «Tierra» se conserva por su valor territorial/covenantal en el contexto, sin expandirlo a «tierra prometida» porque el hebreo no lo explicita en este versículo.
  - La nota al pie en Nebo se limita a una alternativa lexical breve, ya que el texto principal ya deja transparente el topónimo.
