translation:
  language: es
  text: Fue con Joram hijo de Acab a la guerra contra Hazael, rey de Aram[a], en Ramot de Galaad; y los arameos hirieron[b] a Joram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, 'rey de Siria' y 'los sirios'; el hebreo dice 'Aram' y 'arameos'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''golpearon a Joram''. El verbo hebreo puede significar ''golpear'' en sentido más general; ''hirieron'' se elige porque el contexto de batalla y el pasaje paralelo indican lesión más que muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He went
  chosen_spanish: Fue
  alternatives_spanish:
  - Fue
  - Fue yendo
  - Marchó
  lexicon: HALOT
  rationale: El hebreo narra movimiento con wayyiqtol de הלך. En español, para este contexto histórico-narrativo, 'Fue' comunica el desplazamiento sin forzar una equivalencia mecánica con un verbo militar que el texto no expresa explícitamente.
- source_word: אֶת יוֹרָם
  english_pob_choice: with Joram
  chosen_spanish: con Joram
  alternatives_spanish:
  - junto con Joram
  - acompañado de Joram
  lexicon: HALOT
  rationale: Aquí אֶת no funciona como objeto directo, sino como marca de acompañamiento. 'Con Joram' conserva esa relación de compañía en español de manera natural.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to war
  chosen_spanish: a la guerra
  alternatives_spanish:
  - a la batalla
  - para la guerra
  lexicon: HALOT
  rationale: La construcción hebrea expresa dirección o propósito ligado al combate. 'A la guerra' suena natural en español y mantiene el sentido de ir hacia una campaña bélica.
- source_word: עִם חֲזָהאֵל
  english_pob_choice: against Hazael
  chosen_spanish: contra Hazael
  alternatives_spanish:
  - con Hazael
  - frente a Hazael
  lexicon: HALOT
  rationale: Aunque עִם significa normalmente 'con', en este contexto de enfrentamiento militar la relación es adversarial. 'Contra Hazael' conserva la fuerza contextual sin perder la base preposicional del hebreo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva 'Aram' por transparencia frente al hebreo y para no sustituir el etnónimo/geónimo por el tradicional 'Siria', que es menos directo respecto del texto fuente.
- source_word: בְּרָמֹת גִּלְעָד
  english_pob_choice: at Ramoth-gilead
  chosen_spanish: en Ramot de Galaad
  alternatives_spanish:
  - en Ramot-galaad
  - en Ramot de Galaad
  lexicon: HALOT
  rationale: La localización de la batalla admite en español la preposición 'en' para el lugar. 'Ramot de Galaad' mantiene el nombre propio con forma clara y readable; 'Galaad' traduce el topónimo bíblico de uso común en español.
- source_word: וַיַּכּוּ
  english_pob_choice: wounded
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - herieron
  - hirieron de gravedad
  lexicon: HALOT
  rationale: El verbo נכה puede significar 'golpear', 'herir' o 'vencer'. El POB inglés opta por 'wounded' siguiendo el contexto narrativo y el paralelo. En español, 'hirieron' preserva la ambigüedad relativa entre golpe y lesión sin afirmar más de lo que el hebreo garantiza.
- source_word: אֲרַמִּים
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - los sirios
  - los arameos de Aram
  lexicon: HALOT
  rationale: Se mantiene el plural étnico 'arameos' para reflejar directamente אֲרַמִּים y evitar la sustitución tradicional por 'sirios', que oculta la forma del original.
- source_word: אֶת יוֹרָם
  english_pob_choice: Joram
  chosen_spanish: a Joram
  alternatives_spanish:
  - a Joram
  - contra Joram
  lexicon: HALOT
  rationale: El marcador אֶת introduce el complemento directo del golpe. En español, 'a Joram' conserva esa estructura; el contexto bélico ya deja claro que el evento es un ataque.
theological_decisions:
- issue: Topónimo y etnónimo Aram/Siria
  english_pob_reading: Traditionally 'king of Syria' and 'the Syrians'; Hebrew has 'Aram' and 'Arameans.'
  chosen_spanish_reading: '''rey de Aram'' y ''los arameos'''
  alternative_spanish_readings:
  - '''rey de Siria'' y ''los sirios'''
  rationale: La decisión sigue la transparencia del texto hebreo y evita la sustitución tradicional que no está en el original. No introduce una diferencia doctrinal, pero sí una precisión histórica y geográfica importante para la lectura bíblica.
  doctrine_reference: Principio de transparencia textual / equivalencia lexical histórica
- issue: Sentido de וַיַּכּוּ en contexto bélico
  english_pob_reading: '''wounded'' is chosen because the battle context and the parallel account indicate injury rather than death.'
  chosen_spanish_reading: '''hirieron'''
  alternative_spanish_readings:
  - '''golpearon'''
  - '''mataron'''
  - '''vencieron'''
  rationale: El hebreo permite varios matices, pero el contexto narrativo y el paralelo sugieren lesión en batalla. 'Hirieron' evita cerrar indebidamente el sentido hacia muerte o derrota total, manteniendo la tensión lexical documentada.
  doctrine_reference: Contexto narrativo y paralelos históricos
- issue: Preposición adversativa en עִם
  english_pob_reading: '''against Hazael'''
  chosen_spanish_reading: '''contra Hazael'''
  alternative_spanish_readings:
  - '''con Hazael'''
  - '''frente a Hazael'''
  rationale: Aunque la preposición hebrea es 'con', la relación semántica en el contexto de guerra es de oposición. Traducir 'contra' hace explícita esa fuerza sin negar la forma original.
  doctrine_reference: Semántica contextual de preposiciones en narrativa bélica
translation_notes:
  revision_awareness: 'Se revisó el texto contra el audit trail inglés y no se requerían cambios posteriores: la versión inglesa más reciente aparece como sin cambios, con alta concordancia del revisor. La traducción española sigue esa lectura sin introducir expansiones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene 'Aram' y 'arameos' de forma consistente con la política de transparencia textual.
  - Se usa 'Joram' para reflejar la forma hebrea יוֹרָם en este versículo.
  - Se conserva un estilo narrativo sobrio y bíblico, pero en español natural, evitando arcaísmos innecesarios.
  - La nota sobre 'hirieron' preserva la alternativa verbal sin cerrar el sentido más allá del hebreo.
