  glossary_alignment: No hay conflictos con la terminología de proyecto como Yahvé/Mesías/etc. El uso de 'ungieron' debe preservarse por la decisión teológica documentada sobre la unción real. La expresión técnica 'el pueblo de la tierra' está bien conservada y explicada en nota.
