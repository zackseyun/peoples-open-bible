review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura fuente está bien reflejada: זֹאת הַתּוֹרָה = «Esta es la ley», לְכָל נֶגַע = «para todo caso», y la fórmula conclusiva legal de Levítico 13–14 se conserva. Sin embargo, «eccema» para נֶתֶק no preserva adecuadamente la incertidumbre léxica ni el referente específico de una afección del cuero cabelludo/barba; además, la nota al pie está mal anclada, pues el marcador aparece sobre «lepra» en vez de sobre el término correspondiente a נֶתֶק.'
  spanish_quality_summary: El español es fluido y claro, pero «eccema» suena demasiado clínicamente específico y potencialmente engañoso. También conviene evitar la nota con el anglicismo «scall» sin aclaración útil en español. Una solución más fiel y legible es «picazón» con nota al pie anclada allí, preservando la alternativa «erupción escamosa».
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías. «Ley» y «caso» están bien. «Lepra» sigue la elección inglesa revisada («leprous disease») aunque con posible imprecisión moderna; no requiere cambio aquí. El problema principal es נֶתֶק: el borrador se aparta de la decisión POB documentada («itch») al usar «eccema», que introduce una equivalencia médica no justificada.'
  issues:
  - severity: high
    issue: «eccema» para וְלַנָּתֶק es demasiado específico y no sigue la decisión léxica auditada
    rationale: El inglés POB eligió «itch» y reservó alternativas más técnicas en nota por la incertidumbre del término. «Eccema» en español sugiere un diagnóstico médico concreto que el hebreo no garantiza.
  - severity: high
    issue: La nota al pie [a] está anclada en «lepra» en lugar del término correspondiente a נֶתֶק
    rationale: La nota explica el valor léxico de נֶתֶק, no de צָרַעַת. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: La nota conserva «scall» como tradicionalismo inglés poco útil para lectores hispanos
    rationale: Puede mantenerse como dato histórico secundario, pero no debe desplazar una explicación clara en español; conviene reformular la nota para priorizar «erupción escamosa» y la incertidumbre del referente.
  revised_spanish_text: Esta es la ley para todo caso de lepra y para una picazón[a].
