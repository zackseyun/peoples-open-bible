    issue: Inconsistencia léxica en τὰ σκεύη τὰ πολεμικὰ αὐτοῦ
    rationale: El texto dice «pertrechos de guerra», mientras la explicación habla de «Pertenchos de guerra». Además de la inconsistencia, «pertrechos» puede sonar más logístico que armamentístico; «armas de guerra» refleja mejor la elección inglesa auditada «weapons of war».
  - severity: low
    issue: Naturalidad de «se vistió una coraza»
    rationale: Aunque es comprensible y bastante fiel a ἐνεδύσατο, en español moderno neutro «se puso una coraza» suena más natural sin pérdida de precisión.
  - severity: low
