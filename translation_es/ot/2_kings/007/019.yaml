base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/019.yaml
  text: Then the officer answered the man of God and said[a], “If Yahweh were making windows in the heavens, could this thing happen?” And he said, “Look, you will see it with your own eyes, but you will not eat from it.”
  footnotes:
  - marker: a
    text: Or “floodgates in the sky.” The Hebrew literally says “windows in the heavens,” an image for openings in heaven through which provision or judgment might come.
    reason: lexical_alternative
