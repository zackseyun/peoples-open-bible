  text: אליהו שבאוצר נסתר, ונמלא רוחו אלישע.<br><small>(יב)</small> פי שנים אותות הרבה, ומופתים כל מוצא פיהו.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Ἠλίας ὃς ἐν λαίλαπι ἐσκεπάσθη, καὶ Ἐλεισαιὲ ἐνεπλήσθη πνεύματος αὐτοῦ, καὶ ἐν ἡμέραις αὐτοῦ οὐκ ἐσαλεύθη ὑπὸ ἄρχοντος, καὶ οὐ κατεδυνάστευσεν αὐτὸν οὐδείς.
    kind: greek_parallel
