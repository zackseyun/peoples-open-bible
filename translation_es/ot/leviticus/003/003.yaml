translation:
  language: es
  text: Y del sacrificio de las ofrendas de paz, ofrecerá como ofrenda de alimento[a] a Yahvé la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda hecha por fuego» o «ofrenda de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - traerá
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa la acción ritual de acercar/presentar una ofrenda. En español, «ofrecerá» comunica bien el acto cultual sin sonar forzado, y mantiene la relación con el ofrecimiento ante Dios.
- source_word: מִזֶּבַח הַשְּׁלָמִים
  english_pob_choice: from the sacrifice of peace offerings
  chosen_spanish: del sacrificio de las ofrendas de paz
  alternatives_spanish:
  - del sacrificio de las ofrendas de comunión
  - del sacrificio de las ofrendas de bienestar
  lexicon: HALOT
  rationale: Se conserva la categoría sacrificial tradicional «ofrendas de paz», que en español bíblico es reconocible y refleja la terminología cultual estable. «Comunión» o «bienestar» expresan matices semánticos, pero no sustituyen tan bien la categoría ritual.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda ígnea
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  lexicon: HALOT
  rationale: La base semántica de אִשֶּׁה es el ofrecimiento consumido por fuego; en español, «ofrenda ígnea» preserva ese valor sin depender de una paráfrasis demasiado explicativa. Las alternativas más literales quedan como posibilidades equivalentes, pero la forma elegida es más compacta y cultual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé» en el texto principal. La preposición «a» reproduce el destinatario cultual del ofrecimiento.'
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la parte grasa
  lexicon: HALOT
  rationale: En el marco sacrificial, חֵלֶב designa la grasa reservada para el altar. «Grasa» es natural y clara en español, y evita una carga arcaica innecesaria; «sebo» sería más técnico pero menos transparente.
- source_word: הַמְכַסֶּה
  english_pob_choice: that covers
  chosen_spanish: que cubre
  alternatives_spanish:
  - que recubre
  - cubriendo
  lexicon: HALOT
  rationale: El participio funciona atributivamente y describe la grasa que cubre las entrañas. «Que cubre» reproduce con sencillez la relación descriptiva del hebreo.
- source_word: הַקֶּרֶב
  english_pob_choice: the entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - las vísceras
  - los intestinos
  lexicon: HALOT
  rationale: En un contexto de sacrificio animal, קֶרֶב se refiere a los órganos internos. «Entrañas» es natural, reverente y suficientemente preciso en español; «vísceras» o «intestinos» serían más técnicos o demasiado restringidos.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: all the fat that is on the entrails
  chosen_spanish: toda la grasa que está sobre las entrañas
  alternatives_spanish:
  - toda la grasa sobre las entrañas
  - toda la grasa que hay sobre las entrañas
  lexicon: HALOT
  rationale: 'Se mantiene la distinción anatómica del hebreo: primero la grasa que cubre las entrañas, y luego toda la grasa que está sobre ellas. «Está sobre» conserva con claridad el valor locativo de עַל.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto en español usa «Yahvé» como forma principal del nombre divino. Se evita la sustitución por «el SEÑOR» para no ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de אִשֶּׁה en contexto sacrificial
  english_pob_reading: a food offering
  chosen_spanish_reading: ofrenda ígnea
  alternative_spanish_readings:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  rationale: Aunque la POB inglesa opta por «food offering» para comunicar la categoría cultual, en español «ofrenda ígnea» expresa mejor la relación con el fuego sin reducir el término a una explicación interpretativa. La traducción preserva el matiz ritual y permite una nota alternativa donde conviene.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; la presente propuesta sigue de cerca el texto fuente hebreo y el rastro auditado en inglés, manteniendo las distinciones sacrificiales y la terminología del nombre divino conforme a la convención española del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, en coherencia con las pautas del proyecto en español.
  - «Ofrendas de paz» conserva la categoría cultual tradicional; no se sustituyó por una glosa más explicativa.
  - «Grasa» y «entrañas» mantienen la concreción anatómica del hebreo sin tecnicismos innecesarios.
  - La nota[a] se ancla en «ofrenda ígnea» para preservar la alternativa lexical señalada por la POB inglesa.
