translation:
  language: es
  text: 'Así dice Yahvé: Hagan justicia y rectitud[a], y libren al despojado de la mano del opresor. No opriman al extranjero residente[b], al huérfano ni a la viuda, y no cometan violencia[c], ni derramen sangre inocente en este lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hagan lo justo y recto». El hebreo usa dos términos coordinados, «justicia» y «rectitud», que juntos expresan conducta pública y moral fiel.'
    reason: lexical_alternative
  - marker: b
    text: «Extranjero residente» traduce un término para una persona no nativa que vive entre Israel y suele estar en situación vulnerable; tradicionalmente se ha dicho «forastero residente» o «forastero».
    reason: cultural_note
  - marker: c
    text: 'O: «no hagan violencia» o «no hagan daño/agravio». El hebreo distingue esta prohibición de la anterior; por eso no se absorbe en «no opriman».'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Así declara Yahvé
  lexicon: HALOT
  rationale: La fórmula profética exige una equivalencia natural en español. Se conserva el nombre divino Yahvé, conforme al criterio del proyecto, en lugar de sustituirlo por una convención de máscara.
- source_word: עֲשׂוּ
  english_pob_choice: Do
  chosen_spanish: Hagan
  alternatives_spanish:
  - Haced
  - Practiquen
  lexicon: HALOT
  rationale: Imperativo plural adecuado y natural en español contemporáneo; mantiene el tono exhortativo del hebreo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este contexto ético-social, מִשְׁפָּט no se limita a una decisión judicial, sino que abarca práctica pública justa; 'justicia' es la forma más clara y fiel.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justicia recta
  - lo correcto
  lexicon: HALOT
  rationale: Se preserva la distinción con מִשְׁפָּט. 'Rectitud' comunica mejor la idea de conducta moral y orden correcto sin repetir exactamente 'justicia'.
- source_word: וְהַצִּילוּ
  english_pob_choice: deliver
  chosen_spanish: libren
  alternatives_spanish:
  - rescaten
  - salven
  - saquen
  lexicon: HALOT
  rationale: El verbo pide intervención activa para sacar a la víctima de una situación de abuso. 'Libren' expresa bien esa acción de rescate/defensa en español.
- source_word: גָזוּל
  english_pob_choice: the robbed person
  chosen_spanish: al oprimido
  alternatives_spanish:
  - al despojado
  - al robado
  - a la persona robada
  lexicon: HALOT
  rationale: El término apunta al que ha sido despojado o tratado injustamente. Dado el paralelismo con עָשׁוֹק y el contexto social, 'el oprimido' funciona como equivalente comunicativo sin perder la idea de victimización.
- source_word: מִיַּד עָשׁוֹק
  english_pob_choice: from the hand of the oppressor
  chosen_spanish: de la mano del opresor
  alternatives_spanish:
  - del poder del opresor
  - de manos del opresor
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'mano' como imagen de poder/control, y 'opresor' como término socialmente preciso y coherente con el contexto.
- source_word: גֵר
  english_pob_choice: resident foreigner
  chosen_spanish: residente extranjero
  alternatives_spanish:
  - forastero residente
  - extranjero residente
  - forastero
  lexicon: HALOT
  rationale: Cubre la idea de un no nativo que vive entre Israel y es socialmente vulnerable. 'Residente extranjero' es claro y evita el matiz potencialmente anacrónico de otras opciones.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: huérfano
  alternatives_spanish:
  - sin padre
  - el huérfano
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'the fatherless' por su valor tradicional, en español 'huérfano' comunica de manera natural la categoría vulnerable sin añadir un giro artificial.
- source_word: וְאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  lexicon: HALOT
  rationale: Traducción directa y transparente de la categoría social vulnerable.
- source_word: אַל תֹּנוּ
  english_pob_choice: Do not oppress
  chosen_spanish: No opriman
  alternatives_spanish:
  - No maltraten
  - No exploten
  lexicon: HALOT
  rationale: El verbo denota trato abusivo o explotador. 'Opriman' conserva la fuerza social del mandato negativo y encaja con el campo semántico del verso.
- source_word: אַל תַּחְמֹסוּ
  english_pob_choice: and do not do violence to
  chosen_spanish: no hagan violencia
  alternatives_spanish:
  - no cometan violencia
  - no hagan daño
  - no agraven la injusticia
  lexicon: HALOT
  rationale: Se mantiene el segundo verbo como prohibición distinta, no absorbida por 'opriman'. 'Hagan violencia' preserva el sustantivo/acción de חמס y la intensificación retórica del hebreo.
- source_word: דָם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre del inocente
  - sangre sin culpa
  lexicon: HALOT
  rationale: Es el modismo bíblico habitual para homicidio injusto. 'Sangre inocente' suena natural y mantiene la carga jurídica y moral del hebreo.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en este sitio
  lexicon: HALOT
  rationale: Conserva la deixis del texto sin especificar más allá de lo que el verso dice.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se traduce con 'Yahvé' para preservar el nombre del pacto y evitar la convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Pareja ética מִשְׁפָּט וּצְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - lo justo y lo recto
  - justicia y justicia
  rationale: Se mantienen dos términos coordinados y distinguibles. 'Rectitud' traduce bien el componente de conducta correcta/uprightness que el par expresa junto con 'justicia'.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
- issue: Secuencia de prohibiciones sobre los vulnerables
  english_pob_reading: Do not oppress the resident foreigner, the fatherless, or the widow, and do not do violence
  chosen_spanish_reading: No opriman al residente extranjero, al huérfano ni a la viuda, y no hagan violencia
  alternative_spanish_readings:
  - No opriman ni hagan violencia al residente extranjero, al huérfano y a la viuda
  - No maltraten...
  rationale: 'El hebreo separa dos verbos negativos: primero no oprimir a los grupos vulnerables y luego no ejercer violencia. La traducción conserva esa distinción y evita fusionar las dos prohibiciones.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que reordenó las prohibiciones para reflejar mejor el hebreo y evitar fusionar 'oprimir' con 'hacer violencia'. La presente versión mantiene esa distinción en español y conserva el paralelismo con una sintaxis clara y publicable.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma estándar del nombre divino en español.
  - '''Residente extranjero'' sigue la terminología POB ya documentada para גֵר.'
  - Se evitó traducir mecánicamente 'the fatherless' como 'el sin padre'; 'huérfano' es más natural en español y no pierde la referencia social.
  - 'Se conservaron dos prohibiciones distintas: ''no opriman'' y ''no hagan violencia''.'
