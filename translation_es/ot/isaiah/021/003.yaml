translation:
  language: es
  text: Por eso mis lomos están llenos de angustia[a]; dolores se han apoderado de mí como los dolores de una mujer que da a luz. Estoy encorvado[b] por lo que oigo; estoy consternado por lo que veo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'temblor' para חַלְחָלָה; el término hebreo puede denotar un estremecimiento corporal intenso o un estado de angustia.
    reason: lexical_alternative
  - marker: b
    text: O 'doblado' / 'torcido' para 'encorvado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָלְאוּ מָתְנַי
  english_pob_choice: my loins are filled
  chosen_spanish: mis lomos se llenan
  alternatives_spanish:
  - mi cintura se llena
  - mi cuerpo se llena
  lexicon: HALOT
  rationale: מָתְנַיִם alude literalmente a los lomos/la cintura. 'Lomos' conserva la imagen corporal concreta y sigue de cerca la fuerza formal del hebreo, al tiempo que es comprensible en contexto.
- source_word: חַלְחָלָה
  english_pob_choice: anguish
  chosen_spanish: angustia
  alternatives_spanish:
  - temblor
  - retorcimiento
  - horror
  lexicon: HALOT
  rationale: El término denota una conmoción física intensa o un estado de angustia corporal. 'Angustia' comunica bien el sufrimiento visceral sin perder la severidad del hebreo.
- source_word: צִירִים
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - convulsiones
  - retorcimientos
  lexicon: HALOT
  rationale: El término puede referirse a dolores, especialmente de parto. Como la comparación siguiente explicita ese campo, 'dolores' mantiene la conexión y evita una redundancia innecesaria.
- source_word: אֲחָזוּנִי
  english_pob_choice: have seized me
  chosen_spanish: me han asido
  alternatives_spanish:
  - me han tomado
  - me han agarrado
  lexicon: HALOT
  rationale: El verbo expresa un asimiento fuerte y repentino. 'Asido' preserva esa sensación de fuerza y resulta natural en español bíblico contemporáneo.
- source_word: כְּצִירֵי יוֹלֵדָה
  english_pob_choice: like the pains of a woman giving birth
  chosen_spanish: como los dolores de una mujer que da a luz
  alternatives_spanish:
  - como dolores de parto
  - como los dolores de una mujer en labor
  lexicon: HALOT
  rationale: La comparación es explícita y vívida. 'Que da a luz' mantiene la imagen completa del hebreo y sigue siendo claro para el lector moderno.
- source_word: נַעֲוֵיתִי
  english_pob_choice: I am bent over
  chosen_spanish: estoy encorvado
  alternatives_spanish:
  - estoy doblado
  - estoy torcido
  lexicon: HALOT
  rationale: La forma niphal expresa estar doblado, torcido o encorvado. 'Encorvado' suena natural en español y conserva el efecto corporal de la aflicción.
- source_word: מִשְּׁמֹעַ
  english_pob_choice: from hearing
  chosen_spanish: por lo que oigo
  alternatives_spanish:
  - a causa de oír
  - de oír
  lexicon: HALOT
  rationale: La preposición con infinitivo funciona causalmente. 'Por lo que oigo' mantiene la causalidad y fluye mejor en español que una calca más rígida.
- source_word: נִבְהַלְתִּי
  english_pob_choice: I am dismayed
  chosen_spanish: estoy consternado
  alternatives_spanish:
  - estoy desolado
  - estoy alarmado
  lexicon: HALOT
  rationale: El verbo expresa estar turbado, alarmado o sobrecogido. 'Consternado' conserva la fuerza del estado emocional y evita exagerar a 'terrorizado'.
- source_word: מֵרְאוֹת
  english_pob_choice: from seeing
  chosen_spanish: por lo que veo
  alternatives_spanish:
  - a causa de lo que veo
  - de ver
  lexicon: HALOT
  rationale: Como en el miembro paralelo anterior, la expresión es causal. 'Por lo que veo' preserva el paralelismo con 'por lo que oigo' y suena idiomática en español.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'terrified' a 'dismayed' para נבהלתי; la redacción española sigue esa revisión con 'consternado', evitando una intensificación no exigida por el hebreo. También se conservó la pareja causal 'from hearing / from seeing' como 'por lo que oigo / por lo que veo' para mantener el paralelismo y la claridad.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - '''Lomos'' conserva la imaginería corporal del hebreo; no se suavizó a ''cintura'' en el texto principal para no perder fuerza lexical.'
  - Se prefirió un español natural que preserve la estructura causal y paralelística del hebreo sin calcado excesivo.
