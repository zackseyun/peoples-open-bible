review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mantiene el énfasis en «el levita mismo», el lenguaje legal-cultual de «llevarán su iniquidad», y la negación enfática de la herencia entre los hijos de Israel. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: לְדֹרֹתֵיכֶם es 2mp («sus/vuestras generaciones» según el registro), no «sus generaciones» si el resto del discurso va dirigido a la audiencia; y la ubicación/función de las notas no corresponde bien a la auditoría, que preserva alternativas para «llevarán su iniquidad», «hijos de Israel» y la repetición «heredarán heredad».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «para todas sus generaciones» suena menos natural y además desajusta la persona; «por todas sus generaciones» o «a lo largo de sus generaciones» sería más idiomático. «No heredarán heredad» es algo rígido, pero aceptable por la repetición hebrea; conviene sostenerlo con una nota bien anclada. El resto es legible y no cae en calcos excesivamente torpes.
  glossary_alignment: No hay conflicto con los términos de proyecto centrales. «Tienda de reunión» es aceptable para אֹהֶל מוֹעֵד. Se preserva «hijos de Israel» conforme a la política de género-precisión. «Iniquidad» mantiene la fuerza teológica del hebreo. La principal corrección es ajustar la persona en לְדֹרֹתֵיכֶם y reordenar las notas para reflejar las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: «para todas sus generaciones» desajusta la persona de לְדֹרֹתֵיכֶם
    rationale: El hebreo lleva sufijo de 2ª persona plural («vuestras/sus» según tratamiento), y la auditoría inglesa tiene «throughout your generations». En español bíblico neutral conviene «por todas sus generaciones» si se mantiene el trato de ustedes, no «sus» con un valor ambiguo desligado del mandato directo.
  - severity: medium
    issue: Faltan notas para dos alternativas léxicas preservadas por la auditoría inglesa
    rationale: La auditoría inglesa documenta alternativas para «bear their iniquity» y «among the sons of Israel». El borrador en cambio introduce una nota no necesaria en «tienda de reunión» y otra redundante en «perpetuo», dejando sin reflejar alternativas semánticamente más relevantes.
  - severity: low
    issue: La nota sobre חֻקַּת עוֹלָם no aporta una alternativa real distinta del texto
    rationale: El texto principal ya dice «estatuto perpetuo», y la nota ofrece «O ‘perpetuo’», lo que no añade información útil ni corresponde a una ambigüedad significativa.
  revised_spanish_text: Pero el levita mismo hará el servicio de la tienda de reunión, y ellos llevarán su iniquidad[a]. Es un estatuto perpetuo por todas sus generaciones, y entre los hijos de Israel[b] no heredarán heredad[c].
  revised_footnotes:
  - marker: a
    text: O «llevarán su culpa». El modismo hebreo también puede denotar culpa, iniquidad o la responsabilidad/consecuencias asociadas con ella.
    reason: lexical_alternative
  - marker: b
    text: O «entre los israelitas». El hebreo dice «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no heredarán heredad», repetición hebrea que enfatiza la negación de la porción tribal de tierra.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó «para todas sus generaciones» a «por todas sus generaciones» para reflejar mejor לְדֹרֹתֵיכֶם y sonar más natural en español. Se eliminaron notas secundarias o redundantes y se restauraron las notas léxicas principales preservadas por la auditoría inglesa: la ambigüedad de «llevarán su iniquidad», la alternativa «israelitas» para «hijos de Israel», y la explicación de la repetición enfática «heredarán heredad».'
