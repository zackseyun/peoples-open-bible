  glossary_alignment: 'La terminología del proyecto está bien alineada: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios», מִצְוֺתָיו → «sus mandamientos», חֻקֹּתָיו → «sus estatutos», קְלָלוֹת → «maldiciones». La decisión de conservar el modismo auditivo también coincide con la justificación lexical/theológica del POB, pero debe apoyarse con nota para no perder la alternativa «obedecer».'
