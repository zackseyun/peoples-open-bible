translation:
  language: es
  text: Cuando la capa de rocío se había levantado, he aquí que sobre la superficie del desierto había algo fino, como en hojuelas[a], fino como escarcha sobre el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algo fino, escamoso»; el término hebreo raro traducido aquí «como en hojuelas» es incierto en su matiz y puede describir textura o apariencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  english_pob_choice: had gone up
  chosen_spanish: había subido
  alternatives_spanish:
  - se había levantado
  - había desaparecido
  lexicon: HALOT
  rationale: עלה expresa literalmente un movimiento hacia arriba. En este contexto del rocío, «había subido» conserva la imagen sin explicitar interpretaciones como evaporación o desaparición.
- source_word: שִׁכְבַת הַטָּל
  english_pob_choice: the layer of dew
  chosen_spanish: la capa del rocío
  alternatives_spanish:
  - la capa de rocío
  - el depósito del rocío
  lexicon: HALOT
  rationale: שִׁכְבָה refiere a una capa o estrato extendido. «Capa del rocío» es natural en español y mantiene la idea física de una cobertura sobre el suelo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce una observación repentina y vívida. «He aquí» conserva ese giro enfático sin banalizarlo.
- source_word: עַל פְּנֵי הַמִּדְבָּר
  english_pob_choice: on the surface of the wilderness
  chosen_spanish: sobre la superficie del desierto
  alternatives_spanish:
  - sobre la faz del desierto
  - sobre la superficie del desierto
  lexicon: HALOT
  rationale: פְּנֵי literalmente es «rostro/faz/superficie». «Superficie» comunica bien el sentido espacial; «desierto» mantiene la referencia geográfica del contexto de Éxodo.
- source_word: דַּק
  english_pob_choice: fine
  chosen_spanish: fino
  alternatives_spanish:
  - delgado
  - pequeño
  lexicon: HALOT
  rationale: El adjetivo describe una cualidad de finura o delgadez. «Fino» funciona en ambas apariciones y es el equivalente más natural en español.
- source_word: מְחֻסְפָּס
  english_pob_choice: flaky thing
  chosen_spanish: escamoso
  alternatives_spanish:
  - en escamas
  - con aspecto de escamas
  - hojoso
  lexicon: HALOT
  rationale: El término es raro y su matiz exacto es incierto. «Escamoso» intenta preservar la referencia visual a una textura en placas o escamas, sin fijar de más el sentido. El hebreo no explicita un sustantivo, por lo que en español se omite uno también.
- source_word: דַּק כַּכְּפֹר
  english_pob_choice: fine as frost
  chosen_spanish: fino como escarcha
  alternatives_spanish:
  - fino como la escarcha
  - delgado como escarcha
  lexicon: HALOT
  rationale: כְּפֹר designa escarcha/helada fina. «Escarcha» es el equivalente español más claro y común, y conserva la comparación visual del hebreo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - sobre la tierra
  lexicon: HALOT
  rationale: En este contexto físico, «tierra» reproduce bien אֶרֶץ y su amplitud semántica; «suelo» sería también posible, pero «tierra» enlaza mejor con la imagen natural del pasaje.
translation_notes:
  revision_awareness: El texto español sigue de cerca el auditable English POB, pero ajusta la sintaxis para que suene natural en español y conserva la incertidumbre léxica del término raro מְחֻסְפָּס mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «desierto» para מִדְבָּר por coherencia contextual en Éxodo.
  - Se conserva la duplicación de «fino» para reflejar la repetición enfática del hebreo.
  - No se introduce puntuación interpretativa adicional más allá de la coma necesaria para el flujo español.
