translation:
  language: es
  text: Y ahora, ¿por qué gritas[a] tanto? ¿Acaso no hay rey en ti[b]? ¿Ha perecido tu consejero, para que te hayan sobrevenido dolores de parto[c], como una mujer que da a luz?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «clamas en voz alta» o «gritas en voz alta». El verbo hebreo puede denotar un grito o clamor fuerte; aquí probablemente expresa un grito angustiado.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «¿Acaso no hay rey en ti?»'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se hayan apoderado de ti» o «te hayan agarrado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָרִיעִי
  english_pob_choice: cry out loudly
  chosen_spanish: gritas
  alternatives_spanish:
  - clamas
  - gritas con voz fuerte
  - gritas en voz alta
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar un grito o clamor fuerte. En español, 'gritas' comunica de manera natural el alarido de angustia; el contexto y la nota preservan la fuerza del término.
- source_word: רֵעַ
  english_pob_choice: so loudly
  chosen_spanish: tanto
  alternatives_spanish:
  - con tanta fuerza
  - tan fuerte
  - en gran manera
  lexicon: HALOT
  rationale: El sustantivo funciona de modo adverbial intensificando el grito. 'Tanto' mantiene esa intensificación de forma breve y natural en español.
- source_word: הֲמֶלֶךְ אֵין בָּךְ
  english_pob_choice: Is there no king in you?
  chosen_spanish: ¿Acaso no hay rey en ti?
  alternatives_spanish:
  - ¿No tienes rey?
  - ¿No está tu rey en ti?
  lexicon: HALOT
  rationale: La pregunta hebrea es literalmente '¿no hay rey en ti?'. Se conserva la preposición 'en ti' para mantener la metáfora de la ciudad/persona femenina addressada.
- source_word: יוֹעֲצֵךְ
  english_pob_choice: your counselor
  chosen_spanish: tu consejero
  alternatives_spanish:
  - tu asesor
  - tu consejera
  lexicon: HALOT
  rationale: El participio designa a quien da consejo; 'consejero' es la equivalencia más directa y más natural en registro bíblico en español.
- source_word: אָבָד
  english_pob_choice: has perished
  chosen_spanish: se ha perdido
  alternatives_spanish:
  - ha perecido
  - ha desaparecido
  lexicon: HALOT
  rationale: El verbo puede significar perecer o perderse. 'Se ha perdido' evita especificar el modo de desaparición y funciona bien dentro de la pregunta retórica.
- source_word: הֶחֱזִיקֵךְ
  english_pob_choice: have seized you
  chosen_spanish: te hayan asaltado
  alternatives_spanish:
  - te hayan tomado
  - te hayan apretado
  - te hayan sujetado
  lexicon: HALOT
  rationale: Con 'dolores de parto' como sujeto, un verbo dinámico como 'asaltar' transmite la irrupción repentina y violenta del dolor. Se mantiene la fuerza de la imagen sin volverla demasiado literal o extraña en español.
- source_word: חִיל
  english_pob_choice: labor pains
  chosen_spanish: dolores de parto
  alternatives_spanish:
  - retortijones de parto
  - angustias
  - trabajos de parto
  lexicon: HALOT
  rationale: En este contexto de comparación con el parto, 'dolores de parto' es la expresión más clara y fiel en español estándar.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como a una mujer que da a luz
  alternatives_spanish:
  - como a una mujer en trabajo de parto
  - como a una partera
  lexicon: HALOT
  rationale: El participio refiere explícitamente a la mujer en el acto de dar a luz. 'Que da a luz' es natural, preciso y mantiene la comparación directa.
theological_decisions:
- issue: Dirección femenina singular y personificación de la ciudad/pueblo
  english_pob_reading: Preserved implicitly through second-person feminine imagery and explicit childbirth comparison, without adding 'Daughter Zion' or another interpretive identifier not present in this verse.
  chosen_spanish_reading: Se conserva implícitamente mediante la segunda persona singular y la comparación con una mujer que da a luz, sin añadir un identificador interpretativo como 'Hija de Sion'.
  alternative_spanish_readings:
  - Hija de Sion, ¿por qué gritas tanto?
  - ¿Por qué gritáis tanto?
  rationale: El hebreo usa formas femeninas singulares y una imagen de parto. El español mantiene esa tensión sin explicitar más de lo que dice el versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que eliminó 'so' antes de 'loudly' para acercarse más al valor léxico del hebreo. En español se reflejó esa decisión con un intensificador simple ('tanto') y sin añadir un equivalente excesivo de 'so'.
  spanish_consistency_notes:
  - Se mantuvo 'rey' y 'consejero' para conservar el paralelismo retórico de la pregunta.
  - Se evitó 'SEÑOR' o una paráfrasis interpretativa, porque este versículo no contiene el tetragrámaton ni una alusión directa al nombre divino.
  - La imagen de dolor de parto se dejó explícita y no se neutralizó, porque es central en el hebreo y en el auditable de la POB.
