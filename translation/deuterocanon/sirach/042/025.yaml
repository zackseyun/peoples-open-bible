theological_decisions:
- issue: Referent of αὐτοῦ
  chosen_reading: his = God
  alternative_readings:
  - its = creation/heaven
  rationale: The surrounding context praises the ordered works of creation as displaying the Creator's majesty. The rhetorical question about never being satisfied by seeing 'his glory' most naturally points to God's glory manifested in those works, though an impersonal referent is grammatically possible.
  doctrine_reference: Preserve theological tension rather than resolve it; choose the most natural reading and preserve the alternative in a footnote.
