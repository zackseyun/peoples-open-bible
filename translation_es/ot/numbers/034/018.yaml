translation:
  language: es
  text: Y tomarán un jefe de cada tribu para heredar la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para recibir la tierra en herencia». El verbo hebreo puede denotar heredar o causar/asignar una herencia; aunque aquí el texto principal sigue «heredar», el contexto también puede sugerir participación en la asignación de las porciones de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En este contexto administrativo de distribución de la tierra, נָשִׂיא designa a un representante o jefe reconocido. «Líder» en inglés POB se refleja naturalmente como «líder» en español, evitando el matiz monárquico de «príncipe».
- source_word: אֶחָד ... אֶחָד
  english_pob_choice: one ... each
  chosen_spanish: un ... de cada
  alternatives_spanish:
  - uno ... uno
  - un único ... de cada
  lexicon: HALOT
  rationale: 'La repetición subraya la distribución: uno por cada tribu. En español, «un líder de cada tribu» comunica esa función distributiva con naturalidad, sin repetir de forma artificial «uno».'
- source_word: מִמַּטֶּה
  english_pob_choice: from each tribe
  chosen_spanish: de cada tribu
  alternatives_spanish:
  - de una tribu
  - de cada vara/tribu
  lexicon: HALOT
  rationale: Aunque מַטֶּה puede significar literalmente «vara», aquí el contexto tribal-administrativo exige «tribu». «De cada tribu» preserva la distribución por unidades tribales.
- source_word: תִּקְחוּ
  english_pob_choice: you shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán ustedes
  - deberán tomar
  lexicon: HALOT
  rationale: El imperfecto funciona como mandato. «Tomarán» en español transmite bien la instrucción dirigida al grupo, con tono formal y bíblico sin resultar demasiado rígido.
- source_word: לִנְחֹל
  english_pob_choice: to inherit the land
  chosen_spanish: para heredar la tierra
  alternatives_spanish:
  - para recibir la tierra en herencia
  - para poseer la tierra como herencia
  lexicon: HALOT
  rationale: El audit trail inglés optó por «to inherit the land» tras revisar una posible lectura de reparto. En español, «heredar la tierra» conserva el valor de posesión hereditaria y evita introducir explícitamente la idea de «repartir», que no está expresada de forma directa por el verbo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En Números, «la tierra» es la forma más natural y fiel para la הארץ prometida y asignada.
translation_notes:
  revision_awareness: El inglés POB pasó de una paráfrasis administrativa («to apportion the land as an inheritance») a una versión más directa («to inherit the land»). El español sigue esa revisión y evita añadir una noción de reparto que el verbo hebreo no expresa explícitamente en esta forma.
  spanish_consistency_notes:
  - Se conservó el registro bíblico formal, pero con sintaxis natural en español.
  - Se evitó «príncipe» para נָשִׂיא por su posible lectura monárquica ajena al contexto.
  - No se añadieron notas al pie porque la solución española no requiere una alternativa textual marcada en el verso.
