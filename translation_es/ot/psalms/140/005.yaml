translation:
  language: es
  text: Guárdame[a], oh Yahvé, de las manos del impío; protégeme del hombre violento, que ha planeado hacer tropezar mis pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la mano del impío». El singular hebreo puede leerse de manera individual o colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «que han ideado derribar mis pasos».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרֵנִי
  english_pob_choice: Keep me
  chosen_spanish: Guárdame
  alternatives_spanish:
  - Presérvame
  - Vela por mí
  lexicon: HALOT
  rationale: שׁמר expresa aquí una petición de protección. «Guárdame» conserva la fuerza imperativa y suena natural en español bíblico sin volverse arcaizante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título. «Yahvé» es la forma establecida en el español del POB.'
- source_word: מִידֵי רָשָׁע
  english_pob_choice: from the hands of the wicked
  chosen_spanish: de las manos del impío
  alternatives_spanish:
  - de la mano del impío
  - del poder del impío
  - de las manos de los malvados
  lexicon: HALOT
  rationale: La imagen hebrea de «las manos» comunica poder o control hostil; se conserva en plural porque el hebreo lo permite y el español lo entiende bien. «Impío» refleja el singular genérico de רָשָׁע con un término bíblico claro.
- source_word: מֵאִישׁ חֲמָסִים
  english_pob_choice: from the violent man
  chosen_spanish: del hombre violento
  alternatives_spanish:
  - del varón violento
  - de un hombre violento
  - de los hombres violentos
  lexicon: HALOT
  rationale: Se mantiene el singular אִישׁ como «hombre». חֲמָסִים se traduce por el adjetivo «violento» para sonar natural en español y conservar la idea de un personaje caracterizado por la violencia.
- source_word: תִּנְצְרֵנִי
  english_pob_choice: guard me
  chosen_spanish: protégeme
  alternatives_spanish:
  - guárdame
  - custódíame
  - vélame
  lexicon: HALOT
  rationale: נצר añade un segundo ruego paralelo de protección. «Protégeme» evita repetir exactamente «guárdame» y preserva la sinonimia poética del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: HALOT
  rationale: El relativo introduce la cláusula sobre el agresor; «que» es la opción más natural y sobria en español para este contexto.
- source_word: חָשְׁבוּ
  english_pob_choice: have planned
  chosen_spanish: ha planeado
  alternatives_spanish:
  - han planeado
  - ha ideado
  - ha tramado
  lexicon: HALOT
  rationale: חשב aquí denota intención maliciosa y planificación. Se adopta singular en español porque el antecedente inmediato es singular; «ha planeado» mantiene la lectura representativa sin perder claridad.
- source_word: לִדְחוֹת
  english_pob_choice: to trip up
  chosen_spanish: hacer tropezar
  alternatives_spanish:
  - derribar
  - hacer caer
  - desplazar
  lexicon: HALOT
  rationale: דחה puede expresar empujar o hacer caer. Con «mis pasos/pies» la idea idiomática en español es «hacer tropezar», que preserva la imagen de obstaculizar el caminar.
- source_word: פְּעָמָי
  english_pob_choice: my feet
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis pies
  - mis huellas
  - mis pisadas
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente puede evocar pies o pasos, en combinación con דחה la lectura idiomática de «pasos» resulta más fiel al movimiento y al tropiezo buscado.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh SEÑOR
  - oh Jehová
  rationale: Se mantiene la transliteración del Nombre divino conforme al criterio del POB y se evita la sustitución reverencial por un título. «Oh Yahvé» es la forma litúrgica y transparente en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor colectivo o individual de רָשָׁע y singular de אִישׁ חֲמָסִים
  english_pob_reading: collective 'the wicked' alongside singular 'the man of violence'
  chosen_spanish_reading: singular genérico en «el impío» y singular explícito en «el hombre violento»
  alternative_spanish_readings:
  - 'pluralizar: «de los impíos... de los hombres violentos»'
  - 'singularizar ambos: «del impío... del hombre violento»'
  rationale: 'El hebreo usa formas singulares con valor genérico/representativo. Se conserva esa tensión: «el impío» puede leerse como clase y «el hombre violento» mantiene el singular explícito de אִישׁ.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente afinó la naturalidad de la segunda mitad, prefiriendo «violent man» y corrigiendo la concordancia verbal. Esta versión española sigue esa misma lectura final: conserva el singular del agresor, mantiene el paralelismo de dos peticiones de protección y evita una calca rígida de la sintaxis inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante del Nombre divino.
  - 'Se conserva el paralelismo verbal con dos imperativos de protección: «Guárdame» / «protégeme».'
  - «Impío» se usa para רָשָׁע como equivalente bíblico sobrio y coherente con el tono del texto.
  - «Hombre violento» refleja el singular del hebreo y la opción final del audit trail inglés.
  - «Mis pasos» se interpreta en el sentido dinámico del tropiezo y no como mera referencia podológica.
