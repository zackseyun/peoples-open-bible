  yaml_path: translation/ot/exodus/032/008.yaml
  text: They have quickly turned aside from the way that I commanded them. They have made for themselves a cast image of a calf[a], and have bowed down to it and sacrificed to it, and said, ‘These are your gods, Israel, who brought you up from the land of Egypt.’
  footnotes:
