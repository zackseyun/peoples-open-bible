translation:
  language: es
  text: Y apresaron a los dos príncipes de Madián[a], Oreb y Zeeb. Mataron a Oreb junto a la roca de Oreb, y a Zeeb lo mataron junto al lagar de Zeeb. Luego persiguieron a Madián[b], y trajeron las cabezas de Oreb y Zeeb a Gedeón desde el otro lado del Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Oreb y Zeeb se conservan como nombres propios. Sus nombres están relacionados con «cuervo» y «lobo» en hebreo, pero el texto principal no los traduce.
    reason: lexical_alternative
  - marker: b
    text: 'O también: «desde más allá del Jordán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - jefes
  - líderes
  - oficiales
  lexicon: HALOT
  rationale: שַׂר puede denotar un gobernante, jefe o príncipe. Aquí se refiere a dos altos mandos madianitas. «Príncipes» conserva el rango político-militar elevado y coincide con el registro narrativo.
- source_word: וַֽיִּלְכְּדוּ
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - apresaron
  - se apoderaron de
  lexicon: HALOT
  rationale: לָכַד significa capturar o apresar. «Capturaron» es claro, natural y adecuado en un contexto militar.
- source_word: עֹרֵב
  english_pob_choice: Oreb
  chosen_spanish: Oreb
  alternatives_spanish:
  - Cuervo
  lexicon: HALOT
  rationale: Es un nombre propio, por lo que se translitera. Aunque el nombre se relaciona con la palabra hebrea para «cuervo», el texto principal conserva el antropónimo.
- source_word: זְאֵב
  english_pob_choice: Zeeb
  chosen_spanish: Zeeb
  alternatives_spanish:
  - Lobo
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera en el texto principal. Su sentido léxico es «lobo», pero aquí funciona como antropónimo.
- source_word: בְּצוּר
  english_pob_choice: at the rock of
  chosen_spanish: en la roca de
  alternatives_spanish:
  - junto a la roca de
  - en la peña de
  lexicon: HALOT
  rationale: צוּר significa roca o peña. «En la roca de Oreb» mantiene la construcción de lugar y la referencia etiológica del nombre.
- source_word: בְיֶקֶב
  english_pob_choice: at the winepress of
  chosen_spanish: en el lagar de
  alternatives_spanish:
  - junto al lagar de
  - en el lagar llamado de
  lexicon: HALOT
  rationale: יֶקֶב denota un lagar o prensa de vino. «En el lagar de Zeeb» refleja bien el hebreo y su valor topográfico.
- source_word: וַיִּרְדְּפוּ אֶל מִדְיָן
  english_pob_choice: Then they pursued Midian
  chosen_spanish: Luego persiguieron a Madián
  alternatives_spanish:
  - Y persiguieron a Madián
  - Entonces persiguieron a Madián
  lexicon: HALOT
  rationale: La construcción con רָדַף y אֶל aquí expresa persecución continuada contra los madianitas. «Persiguieron a Madián» es idiomático en español y evita una traducción demasiado literal de la preposición.
- source_word: וְרֹאשׁ עֹרֵב וּזְאֵב
  english_pob_choice: the heads of Oreb and Zeeb
  chosen_spanish: las cabezas de Oreb y Zeeb
  alternatives_spanish:
  - la cabeza de Oreb y de Zeeb
  - las cabezas de Oreb y de Zeeb
  lexicon: HALOT
  rationale: Aunque רֹאשׁ está en singular constructo, la coordinación de dos nombres implica un sentido distributivo. En español, el plural «cabezas» comunica con naturalidad que trajeron las cabezas de ambos.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: from across the Jordan
  chosen_spanish: desde el otro lado del Jordán
  alternatives_spanish:
  - desde más allá del Jordán
  - de la otra orilla del Jordán
  lexicon: HALOT
  rationale: La expresión significa literalmente «desde más allá / al otro lado del Jordán». «Desde el otro lado del Jordán» conserva la perspectiva espacial de forma clara y sobria.
theological_decisions:
- issue: None significant beyond lexical/topographical rendering
  english_pob_reading: The verse is rendered straightforwardly as a narrative report of capture, execution, pursuit, and transport of heads across the Jordan.
  chosen_spanish_reading: Se mantiene como relato narrativo directo, sin añadir matices teológicos no presentes en el hebreo.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay una tensión doctrinal específica en este versículo; la tarea principal es preservar con exactitud los hechos narrados y las relaciones espaciales.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Coincide con la decisión inglesa de mantener los nombres propios transliterados, traducir el lugar como «rock/winepress of ...», y expresar «from across the Jordan» con una forma espacial clara y moderna. No hay revisiones textuales aplicadas en el registro inglés, y el acuerdo de revisión es alto.
  spanish_consistency_notes:
  - Se conserva «Madián» como forma española del nombre propio.
  - Se usa «Jordán» con artículo implícito en la expresión locativa habitual del español bíblico moderno.
  - Se mantiene la puntuación narrativa simple y directa, acorde con el tono del versículo.
