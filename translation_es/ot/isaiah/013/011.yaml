  text: וּ/פָקַדְתִּ֤י עַל תֵּבֵל֙ רָעָ֔ה וְ/עַל רְשָׁעִ֖ים עֲוֺנָ֑/ם וְ/הִשְׁבַּתִּי֙ גְּא֣וֹן זֵדִ֔ים וְ/גַאֲוַ֥ת עָרִיצִ֖ים אַשְׁפִּֽיל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/013/011.yaml
  text: And I will punish the world for its evil[a], and the wicked for their iniquity; I will put an end to the pride of the arrogant[b], and I will humble the haughtiness of the ruthless.
  footnotes:
