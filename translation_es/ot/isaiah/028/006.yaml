review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: continúa la serie de beneficios del versículo anterior, conserva «espíritu de justicia», el rol judicial del que se sienta para juzgar, y la idea de fuerza para los defensores en la puerta. Sin embargo, «rechazan la batalla» no expresa con suficiente precisión el causativo de מְשִׁיבֵי (‘hacer retroceder’, ‘repeler’), y «en la puerta» suena menos natural que «a la puerta» o «en el portón/puerta de la ciudad» para un punto de defensa. También conviene ajustar «para el que se sienta en juicio» a una formulación más idiomática en español judicial.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «el que se sienta en juicio» suena algo literal y ambiguo, como si fuera un litigante y no un juez. «Rechazan la batalla» es poco natural en español y debilita la imagen militar. Una revisión menor puede mejorar precisión y legibilidad sin apartarse del original.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «justicia», «espíritu» y la continuidad implícita con Yahvé están bien manejados. La principal corrección es léxica: para מְשִׁיבֵי corresponde mejor «hacen retroceder» o «repelen» que «rechazan».'
  issues:
  - severity: medium
    issue: «para el que se sienta en juicio» es ambiguo e idiomáticamente débil
    rationale: El hebreo לַיֹּשֵׁב עַל הַמִּשְׁפָּט se refiere al que ocupa el puesto judicial/tribunal. En español, «sentarse en juicio» puede malentenderse; «al que se sienta para juzgar» expresa mejor la función.
  - severity: medium
    issue: «rechazan la batalla» no refleja bien מְשִׁיבֵי
    rationale: El participio causativo de שוב indica hacer retroceder o repeler la batalla/enemigo, no simplemente rechazarla de modo abstracto. «Repelen» o «hacen retroceder» es más fiel y natural.
  - severity: low
    issue: La nota c está anclada en «puerta» aunque la alternativa principal afecta sobre todo al verbo
    rationale: La práctica de anclaje puede mantenerse, pero en este caso la nota explica una alternativa verbal y nominal; conviene que el texto revisado haga innecesaria esa tensión o conserve una nota más clara.
