translation:
  language: es
  text: Siembren para ustedes mismos con miras a la justicia; sieguen según el amor fiel. Rompan para ustedes mismos la tierra no labrada[a], porque es tiempo de buscar a Yahvé[b], hasta que él venga y haga llover justicia sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tierra en barbecho’.
    reason: lexical_alternative
  - marker: b
    text: O ‘hasta que él venga y les enseñe justicia’. El verbo hebreo puede significar ‘enseñar’, pero la imaginería agrícola de este versículo favorece ‘hacer llover’.
    reason: alternative_reading
lexical_decisions:
- source_word: זִרְעוּ
  english_pob_choice: Sow
  chosen_spanish: Siembren
  alternatives_spanish:
  - Sembren
  - Planten
  lexicon: HALOT
  rationale: El imperativo plural de זרע conserva la metáfora agrícola; en español, «siembren» comunica bien la acción y mantiene la imagen de siembra sin volverse mecánico.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes mismos
  alternatives_spanish:
  - para ustedes
  - para vosotros mismos
  lexicon: HALOT
  rationale: La preposición con el pronombre tiene fuerza benefactiva/reflexiva en esta serie de imperativos. «Para ustedes mismos» la hace explícita en español sin perder naturalidad.
- source_word: לִצְדָקָה
  english_pob_choice: for righteousness
  chosen_spanish: para justicia
  alternatives_spanish:
  - para rectitud
  - en justicia
  lexicon: HALOT
  rationale: Aquí la relación de finalidad o resultado se conserva mejor con «para». Elegí «justicia» porque el campo léxico de צְדָקָה admite ese valor y el verso culmina con צֶדֶק; «rectitud» también sería posible, pero «justicia» mantiene la coherencia léxica.
- source_word: קִצְרוּ
  english_pob_choice: reap
  chosen_spanish: siegen
  alternatives_spanish:
  - cosechen
  - recojan
  lexicon: HALOT
  rationale: El paralelo agrícola con «siembren» se conserva con «siegen», un equivalente natural y directo para קצר.
- source_word: לְפִי חֶסֶד
  english_pob_choice: according to steadfast love
  chosen_spanish: conforme a la fidelidad amorosa
  alternatives_spanish:
  - según la misericordia
  - según el amor leal
  - en proporción a la fidelidad amorosa
  lexicon: HALOT
  rationale: לפי expresa conformidad o proporción. Traduzco חסד con «fidelidad amorosa» para preservar su peso de lealtad pactual y afecto, evitando reducirlo a simple «bondad» o a una sola noción emocional.
- source_word: נִ֥ירוּ
  english_pob_choice: Break up
  chosen_spanish: Rompan
  alternatives_spanish:
  - Abran
  - Aren
  lexicon: HALOT
  rationale: El imperativo pide trabajar la tierra; «rompan» comunica la fuerza de la acción de arar o deshacer la superficie endurecida. En español se entiende bien con el complemento posterior.
- source_word: נִ֑יר
  english_pob_choice: unplowed ground
  chosen_spanish: la tierra no labrada
  alternatives_spanish:
  - tierra yerta
  - tierras sin labrar
  - tierra de barbecho
  lexicon: HALOT
  rationale: El sustantivo denota terreno sin labrar o recién preparado. «La tierra no labrada» es claro, idiomático y evita una solución demasiado técnica.
- source_word: וְ/עֵת לִ/דְר֣וֹשׁ
  english_pob_choice: for it is time to seek
  chosen_spanish: porque es tiempo de buscar
  alternatives_spanish:
  - y es tiempo de buscar
  - pues es tiempo de buscar
  - porque ha llegado el tiempo de buscar
  lexicon: HALOT
  rationale: La frase funciona de manera explicativa y motivadora; «porque» une con naturalidad el mandato anterior con su urgencia.
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé,
  - al Yahvé
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte «Yahvé» en el texto principal, no como máscara litúrgica.
- source_word: עַד יָבֹא
  english_pob_choice: until he comes
  chosen_spanish: hasta que él venga
  alternatives_spanish:
  - hasta su venida
  - hasta que venga
  lexicon: HALOT
  rationale: Mantiene la continuidad temporal del buscar persistente hasta la llegada divina, con español natural.
- source_word: וְיֹרֶה
  english_pob_choice: and rains
  chosen_spanish: y haga llover
  alternatives_spanish:
  - y llueva
  - y enseñe
  - y derrame lluvia
  lexicon: HALOT
  rationale: En este contexto agrícola, la imagen de lluvia es la lectura principal. «Haga llover» preserva el valor causativo del verbo y funciona mejor con el objeto implícito.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia salvadora
  lexicon: HALOT
  rationale: El término retoma el campo de צדקה y en este marco pactal-moral «justicia» es la opción más directa y consistente.
- source_word: לָכֶם
  english_pob_choice: on you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: Con la metáfora de lluvia, «sobre ustedes» reproduce la imagen espacial en español.
theological_decisions:
- issue: Sentido de וְיֹרֶה צֶדֶק
  english_pob_reading: 'The clause continues the agricultural metaphor: the LORD ''rains righteousness'' on his people.'
  chosen_spanish_reading: 'La cláusula continúa la metáfora agrícola: Yahvé ''hace llover justicia'' sobre su pueblo.'
  alternative_spanish_readings:
  - Yahvé 'les enseña justicia'
  - Yahvé 'derrama justicia' sobre ustedes
  rationale: El contexto inmediato está dominado por sembrar, segar y labrar, así que la imagen de lluvia es la más cohesionada. Aun así, el verbo puede significar 'enseñar', por lo que conviene conservar esa tensión como alternativa documentada.
  doctrine_reference: Preservar la ambigüedad semántica documentada sin anular la metáfora agrícola principal.
translation_notes:
  revision_awareness: La base inglesa no muestra revisiones aplicadas en este pasaje; el último pase indica que no hubo cambios necesarios, y el dictamen de revisión fue de alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el criterio del proyecto para el nombre divino.
  - 'Se preservó la duplicación de la imagen agrícola: sembrar, segar, romper tierra y llover.'
  - Se evitó ‘Cristo’ o formulaciones eclesiásticas tradicionales porque el hebreo no las requiere aquí.
  - La puntuación conserva el ritmo exhortativo con dos puntos y coma para reflejar la secuencia imperativa.
