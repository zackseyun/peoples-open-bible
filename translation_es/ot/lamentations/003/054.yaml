translation:
  language: es
  text: 'Las aguas se cerraron[a] sobre mi cabeza; dije[b]: «Estoy cortado.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Las aguas fluyeron sobre mi cabeza».
    reason: lexical_alternative
  - marker: b
    text: O «estoy condenado» o «estoy destruido». El hebreo dice «estoy cortado», preservando la imagen de ser separado de la vida o de la esperanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָפוּ
  english_pob_choice: closed over
  chosen_spanish: cerraron sobre
  alternatives_spanish:
  - fluyeron sobre
  - cubrieron
  - se desbordaron sobre
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto expresa la imagen de aguas que suben y envuelven al hablante. «Cerraron sobre» conserva el golpe visual de encierro/engullimiento que buscó el inglés POB con «closed over», sin volver la frase demasiado explicativa.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con un plural español elevado y poético. «Las aguas» mantiene el carácter colectivo y la tonalidad de lamentación del texto.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - upon
  lexicon: HALOT
  rationale: «Sobre» reproduce con naturalidad la relación espacial de las aguas con la cabeza y funciona bien en español con el verbo de engullimiento.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  lexicon: HALOT
  rationale: Es una correspondencia directa del idiomático corporal hebreo, preservando la imagen concreta de ahogo o amenaza de muerte.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - pensé
  - me dije
  lexicon: HALOT
  rationale: Aunque el contexto es interior, el hebreo usa el verbo estándar «decir». «Dije» mantiene esa forma y permite que el lector perciba la lamentación interior por el contexto.
- source_word: נִגְזָרְתִּי
  english_pob_choice: I am cut off
  chosen_spanish: estoy cortado
  alternatives_spanish:
  - estoy condenado
  - estoy destruido
  - estoy separado
  lexicon: HALOT
  rationale: La forma nifal de גזר conserva la metáfora de ser «cortado». «Estoy cortado» mantiene esa imagen, aunque suene marcado en español; por eso se deja la tensión semántica que el POB inglés también preservó.
theological_decisions:
- issue: Imagen de ahogo y estado de desamparo final
  english_pob_reading: Waters closed over my head; ... “I am cut off.”
  chosen_spanish_reading: 'Las aguas cerraron sobre mi cabeza; dije: «Estoy cortado.»'
  alternative_spanish_readings:
  - 'Las aguas me cubrieron la cabeza; dije: «Estoy perdido.»'
  - 'Las aguas se desbordaron sobre mi cabeza; dije: «Estoy destruido.»'
  rationale: La lectura principal conserva la metáfora física de ser envuelto por aguas y el enunciado abrupto de estar «cortado», sin resolverlo prematuramente en una interpretación más abstracta. Esto respeta la tensión literaria y teológica del lamento.
  doctrine_reference: Lamentaciones 3:54; cf. Salmo 69:1-2, Isaías 53:8
translation_notes:
  revision_awareness: 'El pasaje tiene alta concordancia con el audit trail inglés y no requiere cambios revisionales: se mantiene la imagen de inmersión por aguas y la tensión de נִגְזָרְתִּי como una expresión metafórica no explicada de forma excesiva.'
  spanish_consistency_notes:
  - Se mantiene «las aguas» en plural para reflejar el hebreo y el registro poético.
  - «Estoy cortado» conserva la literalidad metafórica; no se sustituye por una paráfrasis doctrinalmente más suave.
  - La puntuación reproduce una pausa fuerte antes de la confesión interior, acorde con el hebreo y el inglés POB.
