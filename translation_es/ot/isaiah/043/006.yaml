translation:
  language: es
  text: 'Diré al norte: «Entrégalos[a]», y al sur: «No los retengas». Trae a mis hijos desde lejos, y a mis hijas desde el extremo de la tierra[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Da» / «No retengas»; el hebreo deja implícito el objeto, refiriéndose al pueblo disperso de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el extremo de la tierra». En español también se suele decir «desde los confines de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  english_pob_choice: I will say
  chosen_spanish: Yo diré
  alternatives_spanish:
  - Diré
  - Yo diré
  lexicon: HALOT
  rationale: El imperfecto 1cs se entiende de modo futuro en esta proclamación profética; en español, «diré» comunica el anuncio divino con naturalidad. El pronombre explícito «yo» conserva el énfasis del hablante sin añadir contenido nuevo.
- source_word: לַצָּפוֹן
  english_pob_choice: to the north
  chosen_spanish: al norte
  alternatives_spanish:
  - al norte
  - a la región del norte
  lexicon: HALOT
  rationale: Se trata de un punto cardinal personificado, no de un topónimo. «Al norte» es la forma más natural en español y mantiene el sentido direccional.
- source_word: תֵּנִי
  english_pob_choice: Give them up
  chosen_spanish: Entrégalos
  alternatives_spanish:
  - Dalos
  - Entrégalos
  - Suéltalos
  lexicon: HALOT
  rationale: El imperativo femenino singular se dirige al norte personificado. Como el hebreo deja implícito el objeto, el español necesita expresarlo; «entrégalos» refleja la idea de ceder o liberar a los exiliados sin exagerar ni suavizar el mandato.
- source_word: וּלְתֵימָן
  english_pob_choice: and to the south
  chosen_spanish: y al sur
  alternatives_spanish:
  - y al sur
  - y a Temán
  lexicon: HALOT
  rationale: En este paralelismo con «norte», תימן tiene sentido direccional. «Al sur» evita confundirlo con el nombre propio Temán y sigue el contexto de reunión desde todos los puntos.
- source_word: אַל תִּכְלָאִי
  english_pob_choice: Do not hold them back
  chosen_spanish: No los retengas
  alternatives_spanish:
  - No los detengas
  - No los reprimas
  - No los retengas
  lexicon: HALOT
  rationale: La negación más verbo jussivo femenino singular continúa la personificación. «Retener» comunica bien la idea de no impedir la salida o el retorno; es más idiomático que un calco rígido.
- source_word: הָבִיאִי
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Trae
  - Haz venir
  lexicon: HALOT
  rationale: El imperativo hifil femenino singular mantiene la serie de mandatos a regiones personificadas. «Trae» es breve, claro y natural en español.
- source_word: בָנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos
  - mis varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español bíblico «hijos» puede abarcar a los descendientes del pueblo en conjunto y evita una lectura extraña en una frase paralela con «hijas». Se conserva el vínculo posesivo de 1cs.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde lejos
  - de lejos
  lexicon: HALOT
  rationale: La expresión adverbial se vierte con una locución natural en español que conserva la distancia del origen sin forzar la sintaxis.
- source_word: וּבְנוֹתַי
  english_pob_choice: and my daughters
  chosen_spanish: y a mis hijas
  alternatives_spanish:
  - y a mis hijas
  - y mis hijas
  lexicon: HALOT
  rationale: Se conserva el femenino plural explícito y la simetría con el miembro anterior. El acusativo con «a» mantiene la relación de movimiento hacia el hablante.
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde el extremo de la tierra
  - desde el fin de la tierra
  - desde los confines de la tierra
  lexicon: HALOT
  rationale: El hebreo es singular; «el extremo de la tierra» refleja mejor el valor literal que la idiomática plural «los confines». «Tierra» funciona bien para el ámbito habitado/restaurado en el contexto profético.
theological_decisions:
- issue: Personificación de norte y sur como agentes de liberación
  english_pob_reading: The north and south are personified regions commanded by God to release and return his dispersed covenant people.
  chosen_spanish_reading: El norte y el sur están personificados como regiones a las que Dios manda entregar y no retener a su pueblo disperso.
  alternative_spanish_readings:
  - Fuerzas cósmicas personificadas sin referencia concreta al exilio
  - Simplemente direcciones geográficas sin personificación
  rationale: El contexto inmediato de Isaías 43 es la restauración de Israel. Los imperativos femeninos singulares concuerdan con sustantivos direccionales personificados, y las menciones de hijos e hijas explicitan que se trata del regreso del pueblo del pacto.
  doctrine_reference: Restauración de Israel / retorno del exilio; personificación poética profética.
translation_notes:
  revision_awareness: Concordancia alta con el texto hebreo y con la auditoría inglesa; no se requirieron revisiones sustantivas respecto del sentido básico. Se mantuvo la personificación direccional y el paralelismo hijo/hija, adaptando la fuerza verbal al español natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantuvo el tono profético directo y la personificación poética.
  - Se preservó el paralelismo inclusivo masculino/femenino mediante «mis hijos / mis hijas», evitando neutralización indebida.
  - Las comillas y el uso de dos puntos siguen la puntuación española para discurso directo.
