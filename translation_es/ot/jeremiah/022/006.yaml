    timestamp: '2026-04-23T10:55:09Z'
    unchanged: false
    changes_summary: Removed 'yet' because the Hebrew does not explicitly mark a contrast here; retained 'surely' for the emphatic oath-like construction, and kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: 'Porque así dice Yahvé acerca de la casa del rey de Judá: Tú eres para mí Galaad, la cumbre[a] del Líbano; ciertamente te convertiré en un yermo[b], ciudades no habitadas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la cabeza’ o ‘la cima del Líbano’. El hebreo dice ‘cabeza del Líbano’, un modismo para su altura o prominencia.
    reason: lexical_alternative
  - marker: b
    text: La frase ‘ciertamente te convertiré’ refleja una expresión hebrea enfática de tipo juramentario (literalmente, ‘si no te convierto’).
    reason: lexical_alternative
  - marker: c
    text: 'O ‘ciudades deshabitadas’. El hebreo puede describir el resultado del juicio: ciudades dejadas sin habitantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del pacto según el criterio del proyecto, con la forma española establecida 'Yahvé' en lugar de un sustituto de máscara o una forma menos transparente.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - contra
  lexicon: HALOT
  rationale: En el marco profético introductorio, 'acerca de' comunica bien el destinatario del oráculo sin cargar de antemano una idea de hostilidad que no está en la preposición misma.
- source_word: בֵּית מֶלֶךְ יְהוּדָה
  english_pob_choice: the house of the king of Judah
  chosen_spanish: la casa del rey de Judá
  alternatives_spanish:
  - el palacio del rey de Judá
  - la casa real de Judá
  lexicon: HALOT
  rationale: '''Casa'' conserva la amplitud semántica del hebreo y permite incluir la idea de dinastía o establecimiento real sin restringirla innecesariamente a ''palacio''.'
- source_word: גִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Se translitera el topónimo con la forma española usual 'Galaad'. En este contexto funciona metafóricamente como imagen de valor y prominencia.
- source_word: רֹאשׁ הַלְּבָנוֹן
  english_pob_choice: the summit of Lebanon
  chosen_spanish: la cumbre del Líbano
  alternatives_spanish:
  - la cabeza del Líbano
  - la cima del Líbano
  lexicon: HALOT
  rationale: '''Cumbre'' expresa el sentido idiomático de רֹאשׁ en imagen geográfica y conserva la elevación honorífica; ''cabeza'' sería más literal, pero menos natural en español.'
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí, en mi opinión
  lexicon: HALOT
  rationale: El dativo relacional se vierte con 'para mí', que suena natural en español y preserva el valor de estimación o pertenencia implicado por el hebreo.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - si no
  lexicon: HALOT
  rationale: Se refleja la fuerza enfática juramentaria del hebreo, no una condición literal. 'Ciertamente' preserva el tono aseverativo sin añadir un contraste que el texto no marca explícitamente.
- source_word: אֲשִׁיתְךָ
  english_pob_choice: I will make you
  chosen_spanish: te convertiré en
  alternatives_spanish:
  - te haré
  - te pondré como
  lexicon: HALOT
  rationale: Con el predicado que sigue, 'convertiré en' expresa bien la transformación en un estado de desolación, manteniendo el valor resultativo de שׂים en esta construcción.
- source_word: מִדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - un desierto árido
  - un yermo
  lexicon: HALOT
  rationale: Se eligió 'desierto' por ser comprensible y fuerte en español. En este contexto comunica desolación, aunque el trasfondo bíblico no se limita a arena sino a ruina inhabitada.
- source_word: עָרִים לֹא נוֹשָׁבָה
  english_pob_choice: cities not inhabited
  chosen_spanish: ciudades no habitadas
  alternatives_spanish:
  - ciudades deshabitadas
  - ciudades sin habitantes
  lexicon: HALOT
  rationale: Se mantiene la estructura del hebreo y la lectura del POB inglés, preservando la idea de ciudades dejadas vacías como resultado del juicio.
theological_decisions:
- issue: Tensión entre elogio honorífico y anuncio de juicio
  english_pob_reading: The verse first acknowledges the royal house as precious/exalted ('Gilead... summit of Lebanon') and then announces certain devastation.
  chosen_spanish_reading: El versículo primero presenta a la casa real con imágenes de valor y altura, y luego anuncia con certeza su devastación.
  alternative_spanish_readings:
  - Las imágenes podrían entenderse solo como referencias geográficas a cedros y riqueza.
  - Podría suavizarse el contraste para enfatizar solo la condena.
  rationale: 'La traducción conserva la tensión retórica del hebreo: honor elevado seguido de juicio inevitable. No se armoniza ni se debilita el contraste, porque forma parte del sentido profético del versículo.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que eliminó un 'yet' añadido en inglés porque el hebreo no marca explícitamente un contraste. En español se evitó cualquier equivalente adversativo y se mantuvo 'ciertamente' para la fuerza enfática de אִם לֹא. También se respetó la lectura ya aprobada de 'Yahvé' para el nombre divino y la imagen honorífica seguida de juicio.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma del nombre divino conforme al estándar del proyecto.
  - '''Galaad'' se usa en forma española habitual, con nota para la alternativa más literal ''cabeza/cima del Líbano''.'
  - Se prefirió 'ciertamente' para la fuerza enfática, evitando introducir una conjunción adversativa no presente en el hebreo.
  - '''Desierto'' conserva el registro bíblico de desolación; la nota aclara que no se limita a arena.'
  - '''Ciudades no habitadas'' sigue la forma del texto fuente y evita suavizar el resultado del juicio.'
