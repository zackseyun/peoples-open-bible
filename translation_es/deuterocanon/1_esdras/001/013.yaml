translation:
  language: es
  text: Porque los sacerdotes ofrecían la grasa[a] hasta el atardecer, y los levitas lo prepararon para sí mismos y para los sacerdotes, sus hermanos, los hijos de Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la grasa de las víctimas». El griego se refiere a la grasa sacrificial ofrecida en el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέφερον
  english_pob_choice: were offering up
  chosen_spanish: ofrecían
  alternatives_spanish:
  - ofrecían en ofrenda
  - alzaban como ofrenda
  - ofrecían en el altar
  lexicon: BDAG
  rationale: En contexto sacrificial, el verbo expresa una acción cultual continuada. En español, «ofrecían» comunica de forma natural la acción en curso; la mención de «la grasa» y el contexto del altar ya aportan el valor sacrificial sin sobrecargar la frase.
- source_word: τὰ στέατα
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la grasa sacrificial
  - los pedazos de grasa
  - las grasas
  lexicon: LSJ
  rationale: El griego se refiere a la grasa sacrificada. «Grasa» es la forma más directa y natural en español; «grasa sacrificial» sería más explicativa, pero añade una glosa que el texto no explícita.
- source_word: ἕως ὀψίας
  english_pob_choice: until evening
  chosen_spanish: hasta el atardecer
  alternatives_spanish:
  - hasta la tarde
  - hasta la noche
  - hasta el anochecer
  lexicon: LSJ
  rationale: La expresión marca el límite temporal del acto. «Atardecer» expresa bien el tramo final del día en español moderno y conserva la referencia a la caída de la tarde sin añadir más de lo debido.
- source_word: ἡτοίμασαν
  english_pob_choice: prepared
  chosen_spanish: se prepararon
  alternatives_spanish:
  - prepararon
  - se hicieron listos
  - prepararon comida
  lexicon: BDAG
  rationale: 'El verbo puede ser simplemente «preparar»; sin objeto explícito, el español necesita una forma que refleje el uso reflexivo implícito en el contexto: los levitas se dispusieron para el servicio/comida compartida. «Se prepararon» preserva esa economía.'
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - para ellos mismos
  - para su propio uso
  lexicon: BDAG
  rationale: Es el dativo reflexivo directo. «Para sí mismos» es natural y mantiene el énfasis de que también participaron de la preparación.
- source_word: τοῖς ἱερεῦσιν ἀδελφοῖς αὐτῶν
  english_pob_choice: for the priests, their brothers
  chosen_spanish: para los sacerdotes, sus hermanos
  alternatives_spanish:
  - para sus hermanos, los sacerdotes
  - para los sacerdotes, que eran sus hermanos
  lexicon: BDAG
  rationale: El griego conserva la relación apposicional entre «sacerdotes» y «hermanos». En español, la coma mantiene esa relación sin neutralizar la kinship language; «sus hermanos» reproduce el vínculo corporativo/tribal del texto.
- source_word: υἱοῖς Ἀαρών
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los descendientes de Aarón
  - Aaronitas
  lexicon: BDAG
  rationale: «Hijos de Aarón» es la manera más fiel y reconocible de preservar el designación sacerdotal tradicional del texto. «Descendientes» explicita la idea, pero suaviza la fórmula bíblica.
theological_decisions:
- issue: La relación fraterna entre levitas y sacerdotes en un contexto cultual
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus correligionarios
  - sus compañeros
  rationale: El POB inglés conserva el lenguaje de parentesco masculino del griego. En español, «sus hermanos» mantiene la carga tribal/covenantal sin despersonalizarla ni sustituirla por un equivalente sociológico más débil.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto base griego y el audit trail inglés muestran alta concordancia y no requieren cambios textuales. Se ha mantenido la economía del original, con una decisión española natural para ἕως ὀψίας como «hasta el atardecer» y una equivalencia cultual sobria para τὰ στέατα.
  spanish_consistency_notes:
  - Se usa «sacerdotes» para ἱερεῖς y «levitas» para Λευεῖται de manera consistente con el registro bíblico en español.
  - Se conserva «Aarón» con grafía estándar en español.
  - No se ha introducido «Cristo» ni «SEÑOR», porque el versículo no contiene esos términos.
  - La coma en «los sacerdotes, sus hermanos» preserva la estructura apposicional del griego.
