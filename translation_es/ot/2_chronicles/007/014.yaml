review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura condicional del hebreo y preserva bien la secuencia principal: humillarse, orar, buscar el rostro de Dios, volverse de los malos caminos, y la respuesta divina de oír, perdonar y sanar. Sin embargo, varias formas verbales quedaron en singular (''se humilla'', ''ora'', ''busca'', ''se vuelve'') cuando el sujeto real es plural/collectivo en la construcción condicional, y la relativa ''sobre quien es invocado mi nombre'' suena menos fiel al sentido idiomático que la opción establecida ''que es llamado por mi nombre'' / ''sobre quienes es invocado mi nombre''.'
  spanish_quality_summary: 'El texto es generalmente comprensible y digno, pero presenta problemas de concordancia y naturalidad. En español bíblico moderno, la cadena verbal debe ir en subjuntivo plural tras ''si'': ''se humilla[n]/oran/buscan/se apartan''. Además, ''sobre quien'' con ''mi pueblo'' resulta sintácticamente áspero; ''que es llamado por mi nombre'' es mucho más natural y sigue transmitiendo pertenencia pactual. ''Oiré desde los cielos'' es entendible, pero ''oiré desde el cielo'' o ''oiré desde los cielos'' ambos son posibles; aquí se puede conservar el plural si se desea mantener color hebreo. También conviene mejorar ''se vuelve de sus malos caminos'' a ''se apartan de sus malos caminos'' o ''se vuelven de sus malos caminos''; la primera suena más natural en español contemporáneo.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. No aparece el Tetragrámaton. La decisión sobre el idiom hebreo del nombre divino debe alinearse con la rationale inglesa: expresar pertenencia/identificación con Dios en español idiomático, preservando la alternativa literal en nota. El léxico de ''sanar'' para רפא y ''pecado'' singular colectivo está bien alineado.'
  issues:
  - severity: high
    issue: Concordancia verbal inadecuada en la protasis
    rationale: 'El texto dice ''Si mi pueblo... se humilla y ora, y busca... y se vuelve'', pero la cláusula relativa y el referente colectivo exigen en esta construcción una serie verbal coherente en plural/subjuntivo: ''se humillan, oran, buscan, se apartan'' o equivalente. La forma actual suena gramaticalmente defectuosa y rompe la fluidez.'
  - severity: medium
    issue: La formulación 'sobre quien es invocado mi nombre' es poco natural y menos alineada con la decisión auditada
    rationale: Aunque intenta conservar la literalidad, en español suena forzada y además usa singular ('quien') con un referente colectivo. La decisión inglesa privilegia el sentido idiomático 'who are called by my name', con la forma más literal relegada a nota. En español conviene 'que es llamado por mi nombre' en el texto y dejar la literalidad en la nota.
  - severity: medium
    issue: '''Se vuelve de sus malos caminos'' es menos natural que alternativas españolas claras'
    rationale: La idea de שׁוב se mantiene, pero la formulación actual suena calcada. 'Se apartan de sus malos caminos' comunica con claridad el arrepentimiento moral en español natural, sin perder el sentido fuente.
  revised_spanish_text: Si mi pueblo[a], que es llamado por mi nombre, se humilla, ora, busca mi rostro y se aparta de sus malos caminos, entonces yo oiré desde los cielos, perdonaré su pecado y sanaré su tierra.
  revised_footnotes:
  - marker: a
    text: Literalmente, «sobre quienes es invocado mi nombre», un hebraísmo que expresa pertenencia o identificación con Dios.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la sintaxis española para que la oración sea natural y gramatical: se simplificó la cadena verbal sin exceso de conjunciones, se mejoró el giro idiomático principal a ''que es llamado por mi nombre'' conforme a la rationale auditada, y se preservó la alternativa más literal en la nota. También se ajustó ''se aparta de sus malos caminos'' para un español más claro y fiel al sentido de arrepentimiento moral. No se requiere adjudicación especial; es una reparación estilística y gramatical clara.'
