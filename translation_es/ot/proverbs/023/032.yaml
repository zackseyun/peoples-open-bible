translation:
  language: es
  text: Al final muerde como una serpiente[a], y pica[c] como una víbora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Su final muerde como una serpiente». El hebreo dice literalmente «su final», refiriéndose al desenlace del vino en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O «áspid» para «víbora». El término hebreo designa una serpiente venenosa.
    reason: lexical_alternative
  - marker: c
    text: El verbo final es léxicamente difícil; tradicionalmente se ha entendido como una acción dañina propia de una serpiente venenosa. También se han propuesto «golpea» o «suelta veneno».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִיתוֹ
  english_pob_choice: In the end
  chosen_spanish: Al final
  alternatives_spanish:
  - Su final
  - En su final
  - Finalmente
  lexicon: HALOT
  rationale: אַחֲרִית puede referirse al final, desenlace u परिणाम/resultante. En español, «Al final» comunica de modo natural el sentido adverbial y el valor proverbial del resultado último, sin perder la referencia al desenlace.
- source_word: כְּנָחָשׁ
  english_pob_choice: like a snake
  chosen_spanish: como una serpiente
  alternatives_spanish:
  - como una culebra
  - como una serpiente venenosa
  lexicon: HALOT
  rationale: נָחָשׁ designa una serpiente o culebra. «Serpiente» es el término más amplio y digno en español bíblico moderno; evita reducir innecesariamente el matiz zoológico de la imagen.
- source_word: יִשָּׁךְ
  english_pob_choice: it bites
  chosen_spanish: muerde
  alternatives_spanish:
  - morderá
  - hiere
  lexicon: HALOT
  rationale: El verbo significa «morder». En español proverbial, una forma verbal simple y general transmite mejor la verdad sentenciosa que un futuro explícito.
- source_word: וּכְצִפְעֹנִי
  english_pob_choice: and like a viper
  chosen_spanish: como una víbora
  alternatives_spanish:
  - como un áspid
  - como una culebra venenosa
  lexicon: HALOT
  rationale: צִפְעֹנִי nombra una serpiente venenosa. «Víbora» reproduce bien el valor de peligro venenoso y es idiomática en español; «áspid» sería más específico pero menos natural.
- source_word: יַפְרִשׁ
  english_pob_choice: it stings
  chosen_spanish: hiere
  alternatives_spanish:
  - pica
  - suelta veneno
  - muerde
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto exige una acción dañina de serpiente. «Hiere» conserva la oscuridad lexical sin forzar una precisión inexistente; permite mantener la tensión documentada entre «pica», «hiere» o «suelta veneno».
translation_notes:
  revision_awareness: 'El texto inglés POB presenta una traducción de equivalencia óptima con tres notas léxicas: el sentido adverbial de אַחֲרִיתוֹ, la equivalencia de צִפְעֹנִי como «viper», y la dificultad del verbo final יַפְרִשׁ. La versión española mantiene esas tensiones con una formulación natural: «Al final» para el desenlace, «serpiente/víbora» para las dos imágenes animales, y «hiere» para conservar la ambigüedad del verbo difícil sin cerrar indebidamente el sentido.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético de dos miembros.
  - «Serpiente» y «víbora» diferencian los dos términos hebreos sin exagerar la especificidad zoológica.
  - Se evita una paráfrasis explicativa dentro del texto principal para no resolver la ambigüedad que el POB inglés deja abierta.
