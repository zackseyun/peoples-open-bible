translation:
  language: es
  text: Y si están atados[a] en cadenas, atrapados en cuerdas de aflicción[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “con grilletes” para “en cadenas”.
    reason: lexical_alternative
  - marker: b
    text: O “en cuerdas de miseria” o “en cuerdas de pobreza”; el término hebreo puede denotar aflicción, miseria o pobreza según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La combinación de la conjunción וְ con la condicional אִם se expresa naturalmente en español como “Y si”, conservando el enlace discursivo sin forzar un matiz adversativo que el hebreo no exige.
- source_word: אֲסוּרִים
  english_pob_choice: they are bound
  chosen_spanish: están atados
  alternatives_spanish:
  - están presos
  - están encadenados
  - están sujetos
  lexicon: HALOT
  rationale: El participio pasivo de אסר comunica estado de sujeción. “Están atados” preserva el valor verbal/pasivo y es claro en español; “presos” o “encadenados” estrechan más la imagen de lo que permite el hebreo.
- source_word: בַּזִּקִּים
  english_pob_choice: in chains
  chosen_spanish: en cadenas
  alternatives_spanish:
  - con grillos
  - en grilletes
  - con fetters
  lexicon: HALOT
  rationale: זִקִּים refiere a ligaduras o cadenas/frenos. “En cadenas” conserva la imagen concreta y es idiomático en español; evita el término técnico “grilletes”, menos natural aquí.
- source_word: יִלָּכְדוּן
  english_pob_choice: caught
  chosen_spanish: atrapados
  alternatives_spanish:
  - capturados
  - cogidos
  - apresados
  lexicon: HALOT
  rationale: El nifal de לכד expresa ser tomado/capturado. “Atrapados” mantiene el pasivo y funciona bien en paralelo con “atados”, sin cargar innecesariamente el verso con una imagen judicial o militar.
- source_word: בְּחַבְלֵי
  english_pob_choice: in cords of
  chosen_spanish: en cuerdas de
  alternatives_spanish:
  - en sogas de
  - en lazos de
  - con cuerdas de
  lexicon: HALOT
  rationale: חַבְלֵי conserva el sustantivo concreto “cuerdas/cordeles”. “En cuerdas de” sigue de cerca la metáfora de sujeción y deja abierta la amplitud del hebreo.
- source_word: עֹנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - pobreza
  - desdicha
  lexicon: HALOT
  rationale: עֹנִי puede denotar aflicción, miseria o pobreza según el contexto. Aquí, como en la POB inglesa, “aflicción” mantiene la amplitud del término sin decidir prematuramente por una sola esfera de sufrimiento.
theological_decisions:
- issue: Imagen concreta de sujeción frente a lectura metafórica del sufrimiento
  english_pob_reading: Retain the concrete imagery of physical restraint while allowing it to function metaphorically for suffering or divine discipline.
  chosen_spanish_reading: Conservar la imagen concreta de estar atados y atrapados, dejando que funcione como metáfora de sufrimiento o disciplina divina sin resolverla de antemano.
  alternative_spanish_readings:
  - Interpretarlo solo como encarcelamiento literal
  - Interpretarlo solo como una metáfora de la adversidad
  rationale: El hebreo presenta términos materiales (cadenas, cuerdas) pero el contexto más amplio habla de la acción de Dios en el sufrimiento humano. El español mantiene ambas posibilidades, sin desactivar la tensión presente en el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje base sin cambios revisionales relevantes; se mantiene la alta concordancia del control más reciente y no se introducen ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el estilo sobrio y directo propio de la POB.
  - Se usa “aflicción” para no reducir עֹנִי a “pobreza”, aunque esa posibilidad se documenta en nota.
  - Se evita “SEÑOR” u otra sustitución no presente en el hebreo de este versículo.
  - La puntuación española conserva la cadencia condicional del hebreo con una sola coma interna.
