translation:
  language: es
  text: 'Y dije[a]: «¿Quién me dará alas como las de una paloma? Me iría volando y habitaría»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «¡Quién me diera alas como las de una paloma! Me iría volando y estaría en reposo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y yo dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce el discurso del salmista en secuencia. «Y dije» conserva la progresión narrativa sin añadir matices no presentes en el hebreo.
- source_word: מִי יִתֶּן לִּי
  english_pob_choice: Who will give me
  chosen_spanish: ¿Quién me dará?
  alternatives_spanish:
  - ¡Quién me diera!
  - ¿Quién podría darme?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de deseo o anhelo. En español, la pregunta directa mantiene la forma visible del hebreo, mientras que la alternativa optativa se preserva en nota por su fuerza más idiomática.
- source_word: אֵבֶר
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - un ala
  - plumas de vuelo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, aquí funciona colectivamente como imagen de vuelo. En español, «alas» es la manera natural y fiel de expresar esa imagen.
- source_word: כַּיּוֹנָה
  english_pob_choice: like a dove
  chosen_spanish: como de paloma
  alternatives_spanish:
  - como una paloma
  - cual paloma
  lexicon: HALOT
  rationale: El comparativo כ indica semejanza. «Como de paloma» conserva la relación de pertenencia o cualidad del hebreo de manera fluida en español, sin endurecer la imagen.
- source_word: אָעוּפָה
  english_pob_choice: I would fly away
  chosen_spanish: Me iría volando
  alternatives_spanish:
  - volaría
  - me escaparía volando
  lexicon: HALOT
  rationale: La forma cohortativa expresa deseo o impulso. «Me iría volando» comunica bien ese matiz volitivo y el sentido de escape implícito en el contexto.
- source_word: וְאֶשְׁכֹּנָה
  english_pob_choice: and dwell
  chosen_spanish: y habitaría
  alternatives_spanish:
  - y moraría
  - y me establecería
  - y viviría
  lexicon: HALOT
  rationale: Desde שכן, el verbo significa habitar o morar. Se eligió «habitaría» por ser formal y cercano al valor léxico, manteniendo la continuidad con la revisión inglesa que prefirió una forma más cercana que «descansar».
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó una paráfrasis más interpretativa de וְאֶשְׁכֹּנָה por un verbo más cercano al hebreo («dwell»). En español se reflejó esa preferencia con «habitaría» en lugar de una expansión como «estaría en reposo», aunque esta última se conserva como alternativa idiomática en nota.
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reproducir la secuencia narrativa del wayyiqtol.
  - Se usó «habitaría» para sostener el paralelismo verbal y la cercanía léxica, evitando diluir el cierre del verso en una interpretación excesiva.
  - Se preservó la tensión entre la forma literal de la petición («¿Quién me dará?») y la lectura optativa más natural en español en la nota.
  - No se introdujo vocabulario eclesiástico ajeno al hebreo; la imaginería permanece simple y poética.
