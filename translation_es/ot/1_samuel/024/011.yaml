translation:
  language: es
  text: '¡Mira! Este día tus propios ojos han visto que Yahvé te puso hoy en mi mano en la cueva, y dije[a]: «Te mataré», pero te perdoné la vida[b]. Dije: «No extenderé mi mano contra mi señor, porque él es el ungido de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y él dijo que te matara», «y se dijo que te matara» o «y alguien dijo que yo debía matarte». El hebreo tiene un verbo singular sin sujeto explícito.'
    reason: alternative_reading
  - marker: b
    text: 'O: «te tuve compasión». El verbo hebreo también puede expresar la idea de abstenerse de dañar por compasión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - Mira
  lexicon: HALOT
  rationale: La interjección hebrea introduce una llamada enfática de atención. «¡Mira!» conserva el impulso deíctico con español natural y digno, sin cargar el registro con una fórmula más arcaica.
- source_word: רָאוּ עֵינֶיךָ
  english_pob_choice: your own eyes have seen
  chosen_spanish: tus propios ojos han visto
  alternatives_spanish:
  - tus ojos han visto
  - has visto con tus propios ojos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de los ojos como testigos. «Tus propios ojos han visto» reproduce la fuerza enfática sin sonar forzado en español.
- source_word: נְתָנְךָ יְהוָה ... בְּיָדִי
  english_pob_choice: Yahweh gave you ... into my hand
  chosen_spanish: Yahvé te puso ... en mi mano
  alternatives_spanish:
  - Yahvé te entregó ... en mi mano
  - Yahvé te dio ... en mi mano
  lexicon: HALOT
  rationale: El giro hebreo con נתן + ביד expresa poner a alguien bajo poder ajeno. «Puso en mi mano» conserva la metáfora y su valor de dominio; «entregó» sería posible pero algo más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino, evitando el reemplazo por una máscara litúrgica.
- source_word: בַּמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - dentro de la cueva
  lexicon: HALOT
  rationale: Es un valor locativo directo y claro.
- source_word: וְאָמַר לַהֲרָגְךָ
  english_pob_choice: and I said to kill you
  chosen_spanish: y yo dije para matarte
  alternatives_spanish:
  - y dije que te matara
  - y se dijo para matarte
  lexicon: HALOT
  rationale: La forma verbal hebrea es singular sin sujeto explícito; el contexto del discurso favorece «yo dije» como reflejo directo del texto auditado. «Para matarte» preserva el infinitivo de propósito/resultado sin añadir un sujeto no atestiguado.
- source_word: וַתָּחָס עָלֶיךָ
  english_pob_choice: but I spared you
  chosen_spanish: pero te perdoné
  alternatives_spanish:
  - pero te tuve compasión
  - pero te preservé
  lexicon: HALOT
  rationale: El verbo puede expresar librar de daño por compasión o por abstención. En este contexto narrativo, «te perdoné» comunica con naturalidad la abstención de matar; se mantiene la tensión semántica con la nota alternativa.
- source_word: לֹא אֶשְׁלַח יָדִי
  english_pob_choice: I will not stretch out my hand
  chosen_spanish: No extenderé mi mano
  alternatives_spanish:
  - No alzaré mi mano
  - No pondré mi mano
  lexicon: HALOT
  rationale: Se conserva el hebraísmo idiomático de «extender la mano», comprensible en español y útil para mantener la fuerza figurada de la amenaza rechazada.
- source_word: בַּאדֹנִי
  english_pob_choice: against my lord
  chosen_spanish: contra mi señor
  alternatives_spanish:
  - contra mi amo
  - contra mi señorío
  lexicon: HALOT
  rationale: Aquí «אדני» designa al superior humano (Saúl), no un título divino. «Señor» preserva el tono cortesano y la relación de subordinación política.
- source_word: מְשִׁיחַ יְהוָה
  english_pob_choice: the LORD’s anointed
  chosen_spanish: el ungido de Yahvé
  alternatives_spanish:
  - el ungido del SEÑOR
  - el Mesías de Yahvé
  lexicon: HALOT
  rationale: En este relato real, מְשִׁיחַ se refiere al rey consagrado, no al título mesiánico escatológico. «Ungido de Yahvé» mantiene la relación de consagración y el vínculo con el Nombre divino.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la norma del proyecto, se traslada como «Yahvé» para conservar el Nombre pactal y evitar una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מְשִׁיחַ יְהוָה en narrativa monárquica
  english_pob_reading: Yahweh’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el ungido del SEÑOR
  rationale: La expresión designa al rey apartado por Dios. Se evita «Mesías» porque en español puede sugerir de inmediato una lectura escatológica posterior que el contexto aquí no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; Contested terms table by analogy to title translation principles
translation_notes:
  revision_awareness: La POB inglesa pasó de una paráfrasis con sujeto indefinido («someone said to kill you») a una lectura más directa del singular hebreo («I said to kill you»). La redacción española sigue esa revisión y evita introducir un sujeto no expresado en el hebreo, manteniendo al mismo tiempo la tensión semántica del verbo וַתָּחָס con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio global del proyecto.
  - «Ungido de Yahvé» conserva el lenguaje de consagración real sin convertirlo automáticamente en título mesiánico técnico.
  - Se preserva el hebraísmo de la mano como metáfora de poder y acción hostil o retenida.
  - El tono general busca ser publicable y claro en español contemporáneo, sin borrar la densidad del original.
