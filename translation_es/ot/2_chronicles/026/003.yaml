translation:
  language: es
  text: Uzías tenía dieciséis años[a] cuando comenzó a reinar, y reinó cincuenta y dos años en Jerusalén. El nombre de su madre era Jecolía[b], de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''cuando comenzó a reinar'' o ''al comenzar a reinar''.'
    reason: alternative_reading
  - marker: b
    text: Jecolía también puede transliterarse 'Jecolía' o 'Jechilía'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: was sixteen years old
  chosen_spanish: tenía dieciséis años
  alternatives_spanish:
  - era de dieciséis años
  - era un hijo de dieciséis años
  lexicon: HALOT
  rationale: El hebreo expresa la edad con una construcción idiomática. En español, 'tenía dieciséis años' comunica con naturalidad el dato cronológico sin volverla literal de forma extraña.
- source_word: בְמָלְכֹו
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando fue hecho rey
  - en su reinar
  lexicon: HALOT
  rationale: La construcción con ב marca el momento de acceso al trono. 'Comenzó a reinar' conserva ese inicio de reinado de manera clara y fiel.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo señala el ejercicio continuado de la realeza; 'reinó' es el equivalente español directo y formal en este tipo de nota cronológica.
- source_word: וַחֲמִשִּׁים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: fifty-two years
  chosen_spanish: cincuenta y dos años
  alternatives_spanish:
  - cincuenta y dos años exactos
  - cincuenta y dos años completos
  lexicon: HALOT
  rationale: Número cardinal estándar en español; no requiere expansión ni glosa.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Su madre se llamaba
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: La fórmula genealógica hebrea se puede verter con sintaxis natural. Se mantiene el valor documental del encabezado familiar.
- source_word: יכיליה
  english_pob_choice: Jecoliah
  chosen_spanish: Jecolía
  alternatives_spanish:
  - Jecolía
  - Jechilía
  - Yecolía
  lexicon: HALOT
  rationale: Nombre propio transliterado al uso español, conservando la vocalización probable y una forma legible para lectores de habla hispana.
- source_word: מִן יְרוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - procedente de Jerusalén
  lexicon: HALOT
  rationale: En este contexto genealógico, מִן expresa procedencia/origen. En español, 'de Jerusalén' es la forma más natural y compacta.
theological_decisions:
- issue: Marcado temporal de la entronización en בְמָלְכֹו
  english_pob_reading: when he became king
  chosen_spanish_reading: cuando comenzó a reinar
  alternative_spanish_readings:
  - cuando fue hecho rey
  - al comenzar a reinar
  rationale: 'No hay tensión doctrinal, pero sí una decisión aspectual: la frase hebrea señala el inicio del reinado. ''Comenzó a reinar'' conserva el valor de entrada al trono sin añadir elementos no presentes.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el audit trail inglés: no hay revisiones aplicadas ni cambios pendientes; se mantiene el sentido cronológico, genealógico y onomástico sin ampliaciones.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo lo exige explícitamente; este versículo no lo contiene.
  - Se mantiene 'reinó' para la fórmula regia y 'comenzó a reinar' para la entronización, siguiendo la distinción del audit trail.
  - Los nombres propios se transliteran con ortografía española legible, sin ocultar la posible variante onomástica indicada en nota.
