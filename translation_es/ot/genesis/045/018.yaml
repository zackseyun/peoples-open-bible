revisions:
- from: Lleven a su padre y a sus casas[a], y vengan a mí, y yo les daré lo mejor de la tierra de Egipto, y comerán la grasa[b] de la tierra.
  to: Tomen a su padre y a sus hogares[a], y vengan a mí, y yo les daré lo mejor de la tierra de Egipto, y comerán la grasa[b] de la tierra.
  rationale: Se ajusta וּקְחוּ a 'Tomen' para seguir más de cerca la decisión auditada 'Take' y evitar un matiz añadido de 'bring/llevar'. Se cambia בָּתֵּיכֶם a 'sus hogares' para reflejar mejor el sentido contextual de 'households' en español natural. Se conserva 'la grasa de la tierra' con nota porque mantiene el modismo bíblico, como en el POB inglés, pero con ayuda explicativa para lectores modernos.
  reviewer_model: gpt-5.4
