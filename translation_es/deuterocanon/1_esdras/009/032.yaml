  - severity: medium
    issue: «Chosamao» reduce en exceso la forma de Χοσάμαος.
    rationale: Dado que el nombre es difícil y con poco control externo, conviene una transliteración más conservadora. «Chosamaus» sigue mejor la decisión inglesa auditada y evita una castellanización que oscurece la forma fuente.
