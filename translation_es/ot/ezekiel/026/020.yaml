- from: Entonces te haré bajar con los que descienden al pozo[a], al pueblo antiguo; y te haré habitar en la tierra de abajo, como las ruinas antiguas, con los que descienden al pozo, para que no seas habitada[b]. Pero pondré gloria[c] en la tierra de los vivientes.
