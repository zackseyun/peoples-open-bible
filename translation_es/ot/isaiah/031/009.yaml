translation:
  language: es
  text: Su roca pasará[a] a causa del terror, y sus príncipes se llenarán de terror ante la señal[b], declara Yahvé[c], cuyo fuego está en Sion y cuyo horno está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su fortaleza desaparecerá en terror». El hebreo «roca» puede funcionar metafóricamente para el refugio o gobernante de Asiria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus príncipes quedarán consternados ante el estandarte/bandera». El hebreo נֵס puede referirse a una señal militar o a un estandarte.'
    reason: alternative_reading
  - marker: c
    text: La imagen del «fuego» y del «horno» de Yahvé en Sion y Jerusalén probablemente evoca su presencia consumidora en juicio, aunque el texto no precisa el matiz con mayor detalle.
    reason: cultural_note
lexical_decisions:
- source_word: וְסַלְעוֹ
  english_pob_choice: his rock
  chosen_spanish: su roca
  alternatives_spanish:
  - su peñasco
  - su fortaleza
  lexicon: HALOT
  rationale: Conserva la metáfora de סֶלַע como “roca”, que en contexto puede aludir al refugio o poder de Asiria sin explicarlo demasiado. “Su roca” es natural en español y mantiene la imagen original.
- source_word: מִמָּגוֹר
  english_pob_choice: because of terror
  chosen_spanish: por el terror
  alternatives_spanish:
  - a causa del terror
  - desde el terror
  lexicon: HALOT
  rationale: La preposición מִן puede expresar causa o fuente. “Por el terror” comunica de forma idiomática en español que el derrumbe ocurre a causa del pánico.
- source_word: יַעֲבוֹר
  english_pob_choice: will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - desaparecerá
  - se apartará
  lexicon: HALOT
  rationale: עבר puede significar “pasar” o “desaparecer” según el contexto. “Pasará” permite conservar la fuerza del verbo sin añadir interpretación excesiva; el complemento “por el terror” aclara la causalidad.
- source_word: וְחַתּוּ
  english_pob_choice: will be terrified
  chosen_spanish: serán aterrados
  alternatives_spanish:
  - serán aterrados de miedo
  - serán quebrantados
  lexicon: HALOT
  rationale: חתת puede expresar quedar deshecho, consternado o aterrado. Dado el paralelismo con terror y el sujeto humano (“sus príncipes”), “serán aterrados” preserva el impacto del hebreo.
- source_word: מִנֵּס
  english_pob_choice: at the signal
  chosen_spanish: ante el estandarte
  alternatives_spanish:
  - ante la señal
  - ante la bandera
  lexicon: HALOT
  rationale: נֵס puede referirse a señal, estandarte o bandera. Aquí el hebreo permite la ambigüedad entre señal militar y estandarte; “ante el estandarte” conserva mejor la imagen concreta y sigue siendo comprensible en español. Se evita cerrar innecesariamente el sentido con “señal”.
- source_word: שָׂרָיו
  english_pob_choice: his princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus jefes
  - sus oficiales
  lexicon: HALOT
  rationale: שַׂר puede ser príncipe, jefe o comandante. “Príncipes” refleja bien el valor amplio del término y coincide con la tradición de traducción sin perder el matiz de rango.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como “Yahvé”, conforme a la terminología del proyecto. La fórmula profética נְאֻם se vuelve con naturalidad “dice”, una equivalencia sobria y fiel en español.
- source_word: אֲשֶׁר א֥וּר ל֙וֹ בְּצִיּוֹן
  english_pob_choice: whose fire is in Zion
  chosen_spanish: cuyo fuego está en Sion
  alternatives_spanish:
  - cuya luz está en Sion
  - que tiene fuego en Sion
  lexicon: HALOT
  rationale: אור aquí se entiende mejor como “fuego” por el paralelismo con “horno”. “Cuyo fuego está en Sion” conserva la imagen posesiva y evita suavizar el efecto del texto.
- source_word: וְתַנּוּר ל֖וֹ בִּירוּשָׁלִָם
  english_pob_choice: and whose furnace is in Jerusalem
  chosen_spanish: y cuyo horno está en Jerusalén
  alternatives_spanish:
  - y cuyo horno tiene en Jerusalén
  - y cuyo horno ardiente está en Jerusalén
  lexicon: HALOT
  rationale: תַּנּוּר se traduce aquí como “horno”, que en español puede abarcar también la idea de “furnace” cuando el contexto es de fuego intensificado. Mantener “horno” preserva la correspondencia imagética con el hebreo y con el paralelismo del verso.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - dice el Señor
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como “Yahvé” en el texto principal. Se evita la sustitución por “el Señor”, que enmascararía el nombre revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagery of fire and furnace in Zion/Jerusalem
  english_pob_reading: whose fire is in Zion and whose furnace is in Jerusalem
  chosen_spanish_reading: cuyo fuego está en Sion y cuyo horno está en Jerusalén
  alternative_spanish_readings:
  - cuyo fuego purificador está en Sion y cuyo horno está en Jerusalén
  - cuya llama está en Sion y cuyo horno está en Jerusalén
  rationale: Se mantiene la imagen sin especificar más de lo que el hebreo dice. El versículo puede evocar presencia consumidora y juicio, pero el texto no obliga a una interpretación más estrecha; por eso se conserva la tensión imagética.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el acuerdo alto del audit trail en inglés, sin cambios respecto a la última pasada revisada: se conservan la metáfora de la roca, la ambigüedad de נֵס como estandarte/señal y la imagen final de fuego/horno sin sobredeterminarla.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יְהוָה conforme al estándar del proyecto.
  - Se usa “Sion” sin tilde en concordancia bíblica habitual en español.
  - “Horno” se conserva como equivalente sobrio de תַּנּוּר, sin añadir connotaciones que no están en el hebreo.
  - Las notas alternativas preservan tensiones léxicas documentadas en el inglés POB.
