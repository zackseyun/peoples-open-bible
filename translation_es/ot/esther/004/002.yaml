translation:
  language: es
  text: Él llegó hasta el frente de la puerta del rey[a], porque nadie podía entrar por la puerta del rey[b] vestido de cilicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''hasta la presencia de la puerta del rey'' / ''delante de la puerta del rey''. El hebreo enfatiza que se acercó solo hasta el punto que quedaba delante de ella.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede expresarse más formalmente: ''porque no había entrada por la puerta del rey en cilicio''. El sentido es que estaba prohibido entrar con ropa de duelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: He came
  chosen_spanish: Él llegó
  alternatives_spanish:
  - Él vino
  - Él fue
  lexicon: HALOT
  rationale: El wayyiqtol de בוא expresa llegada o arribo al punto señalado. En español, 'llegó' comunica de forma natural el movimiento narrativo hacia la puerta sin añadir matices ajenos.
- source_word: עַד לִפְנֵי
  english_pob_choice: as far as the front of
  chosen_spanish: hasta delante de
  alternatives_spanish:
  - hasta la presencia de
  - hasta antes de
  - hasta frente a
  lexicon: HALOT
  rationale: '''עַד לִפְנֵי'' marca un límite espacial: se aproximó hasta el punto inmediatamente anterior, sin pasar. ''Hasta delante de'' conserva la idea de límite y ubicación frontal de manera clara en español.'
- source_word: שַׁעַר הַמֶּלֶךְ
  english_pob_choice: the king’s gate
  chosen_spanish: la puerta del rey
  alternatives_spanish:
  - la puerta real
  - la puerta del rey
  lexicon: HALOT
  rationale: '''שַׁעַר'' puede ser ''puerta'' o ''portón''. En español, ''la puerta del rey'' es claro y mantiene el escenario cortesano sin volverlo más técnico de lo necesario.'
- source_word: כִּי אֵין לָבוֹא
  english_pob_choice: because no one could enter
  chosen_spanish: porque no se podía entrar
  alternatives_spanish:
  - porque no había entrada
  - porque no era posible entrar
  - porque nadie podía entrar
  lexicon: HALOT
  rationale: La construcción אֵין + infinitivo comunica imposibilidad o prohibición según el contexto. En español, la impersonal 'no se podía entrar' conserva ese valor sin especificar indebidamente sujeto humano.
- source_word: אֶל שַׁעַר הַמֶּלֶךְ
  english_pob_choice: the king’s gate
  chosen_spanish: a la puerta del rey
  alternatives_spanish:
  - en la puerta del rey
  - hacia la puerta del rey
  lexicon: HALOT
  rationale: Aquí אֶל tiene fuerza direccional vinculada al acceso. En español, 'a la puerta del rey' sostiene la idea de entrada prohibida sin recargar la frase.
- source_word: בִּלְבוּשׁ שָׂק
  english_pob_choice: clothed in sackcloth
  chosen_spanish: vestido de cilicio
  alternatives_spanish:
  - con ropa de cilicio
  - ataviado de cilicio
  - clothed in sackcloth
  lexicon: HALOT
  rationale: '''שָׂק'' designa ropa de duelo/aflicción; en español bíblico estándar, ''cilicio'' es el equivalente más estable y reconocido. ''Vestido de cilicio'' conserva el valor de vestidura exterior sin interpretar más allá del hebreo.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La redacción mantiene la restricción espacial del hebreo y evita introducir una formulación más interpretativa de la necesaria.
  spanish_consistency_notes:
  - Se prefirió 'puerta del rey' de forma uniforme para שַׁעַר הַמֶּלֶךְ.
  - '''Cilicio'' se usa como término bíblico y eclesial ampliamente comprendido para בִּלְבוּשׁ שָׂק.'
  - La impersonal 'no se podía entrar' refleja la prohibición/imposibilidad implícita en אֵין לָבוֹא sin agregar sujeto explícito.
