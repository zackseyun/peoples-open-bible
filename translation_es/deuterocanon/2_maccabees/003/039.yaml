translation:
  language: es
  text: Pues él mismo[a], que tiene su morada en el cielo, es el guardián y auxiliador de aquel lugar[b], y golpea y destruye a los que vienen para hacer daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habita en el cielo». El griego dice literalmente «que tiene la morada celestial».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el griego dice más literalmente «aquel lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς γάρ
  english_pob_choice: For he himself
  chosen_spanish: Pues él mismo[a]
  alternatives_spanish:
  - Porque él mismo[a]
  - Pues él mismo
  lexicon: LSJ
  rationale: Conserva el énfasis del pronombre αὐτός y el matiz causal de γάρ con una partícula natural en español. 'Él mismo' mantiene la fuerza enfática sin añadir contenido no presente en el griego.
- source_word: κατοικίαν ἐπουράνιον ἔχων
  english_pob_choice: who has his dwelling in heaven
  chosen_spanish: que tiene su morada en el cielo
  alternatives_spanish:
  - que habita en el cielo
  - cuya morada está en el cielo
  - que tiene su morada celestial
  lexicon: LSJ
  rationale: '''Tiene su morada en el cielo'' sigue de cerca el participio posesivo griego y conserva la idea de residencia celestial sin convertirlo totalmente en una paráfrasis. ''Morada'' es natural en español bíblico y mantiene dignidad.'
- source_word: ἐπόπτης
  english_pob_choice: overseer
  chosen_spanish: supervisor
  alternatives_spanish:
  - vigilante
  - guardián
  - observador
  lexicon: LSJ
  rationale: '''Supervisor'' refleja la idea de uno que vigila y dirige con mayor precisión que ''guardián'', y preserva la relación semántica con el segundo miembro, βοηθός, sin confundir los dos términos.'
- source_word: βοηθός
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - ayuda
  - auxiliador
  - auxiliador y protector
  lexicon: LSJ
  rationale: '''Ayudador'' conserva el sustantivo agente del griego y el paralelo con ''supervisor''. Aunque menos frecuente en español general, es claro y evita sustituirlo por un término más interpretativo como ''protector''.'
- source_word: ἐκείνου τοῦ τόπου
  english_pob_choice: that place
  chosen_spanish: aquel lugar[b]
  alternatives_spanish:
  - ese lugar[b]
  - ese sitio[b]
  - el templo[b]
  lexicon: LSJ
  rationale: '''Aquel lugar'' reproduce literalmente τόπος y mantiene la reserva del texto griego. En contexto alude al templo, pero el español conserva la forma amplia del original y deja la identificación para la nota.'
- source_word: τοὺς παραγινομένους ἐπὶ κακώσει
  english_pob_choice: those who come to do harm
  chosen_spanish: a los que se presentan para hacer daño
  alternatives_spanish:
  - a los que vienen para hacer daño
  - a los que llegan con intención de dañar
  - a los que se acercan para perjudicar
  lexicon: LSJ
  rationale: '''Se presentan para hacer daño'' expresa con naturalidad el participio de llegada/presencia y la finalidad de ἐπὶ κακώσει. Evita añadir una connotación demasiado específica de agresión física o militar.'
- source_word: τύπτων ἀπόλλυσι
  english_pob_choice: he strikes and destroys
  chosen_spanish: golpea y destruye
  alternatives_spanish:
  - hiere y destruye
  - castiga y destruye
  - hiere y arruina
  lexicon: LSJ
  rationale: '''Golpea'' refleja el participio τύπτων de forma directa, y ''destruye'' conserva ἀπόλλυσι. La pareja mantiene la intensidad punitiva sin introducir un matiz ajeno como ''derriba'' o ''aniquila''.'
theological_decisions:
- issue: Referente del sujeto enfático αὐτός
  english_pob_reading: The subject refers to God as the heavenly protector of the temple.
  chosen_spanish_reading: El sujeto se entiende como Dios, protector celestial del templo.
  alternative_spanish_readings:
  - El sujeto puede leerse como una referencia divina general asociada al cielo.
  - El texto deja implícito el referente sin nombrarlo de forma explícita.
  rationale: El contexto narrativo atribuye a Dios la defensa del templo; por eso la traducción conserva la referencia implícita sin insertarla en el cuerpo del versículo. La nota sobre 'aquel lugar' permite mantener el vínculo contextual con el templo sin sobreespecificar el término griego.
  doctrine_reference: 2 Macabeos 3:38-39; protección divina del santuario
- issue: La relación entre 'supervisor' y 'ayudador'
  english_pob_reading: overseer and helper
  chosen_spanish_reading: supervisor y ayudador
  alternative_spanish_readings:
  - guardián y ayudador
  - vigilante y protector
  rationale: Mantener dos sustantivos distintos preserva la duplicidad del griego ἐπόπτης / βοηθός. 'Supervisor' y 'ayudador' evitan fusionar los roles y conservan la tensión lexical del original.
  doctrine_reference: LSJ; distinción semántica en ἐπόπτης y βοηθός
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que prefirió una formulación más natural para κατοικίαν ἐπουράνιον ἔχων ('tiene su morada en el cielo') y simplificó la fuerza de τύπτων ἀπόλλυσι a 'golpea y destruye'. La versión española preserva esa naturalidad sin perder el énfasis del participio posesivo ni la dureza de la acción punitiva.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto en el proyecto solo cuando el texto lo exige; aquí el sujeto queda implícito y no se inserta un nombre divino no explicitado por el versículo.
  - '''Morada en el cielo'' evita el calco rígido y sigue el tenor del audit trail inglés.'
  - Se conservaron dos términos distintos para ἐπόπτης y βοηθός, evitando unificar ambos en 'protector'.
  - Las notas a pie de página están ancladas exactamente en el texto con [a] y [b], sin notas sueltas.
