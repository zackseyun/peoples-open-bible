translation:
  language: es
  text: Toda oscuridad está guardada para sus tesoros[a]; un fuego no avivado lo consumirá[b]; consumirá lo que quede en su tienda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda oscuridad está reservada para él»; la expresión hebrea con «sus cosas ocultas/tesoros» es difícil y puede referirse tanto a calamidad guardada para él como a lo que está escondido entre sus reservas.'
    reason: alternative_reading
  - marker: b
    text: «No avivado» puede significar un fuego no encendido ni atizado por soplo humano, lo que sugiere un fuego enviado por Dios o de fuerza irresistible.
    reason: lexical_alternative
  - marker: c
    text: 'O: «dañará al sobreviviente en su tienda» / «consumirá el remanente en su tienda».'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - Toda clase de
  lexicon: HALOT
  rationale: 'Como cuantificador, en español natural modifica a «oscuridad» con valor total: «toda oscuridad». Mantiene la amplitud del hebreo sin volverlo rígidamente literal.'
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - tenebrosidad
  lexicon: HALOT
  rationale: «Oscuridad» conserva la imagen concreta y también el posible valor figurado de calamidad o juicio, como en el audit trail inglés.
- source_word: טָמוּן
  english_pob_choice: is hidden up
  chosen_spanish: está oculta
  alternatives_spanish:
  - está escondida
  - está reservada
  lexicon: HALOT
  rationale: El participio pasivo expresa algo oculto o guardado para después. «Está oculta» fluye bien en español y conserva la ambigüedad entre ocultamiento y reserva.
- source_word: לִצְפּוּנָיו
  english_pob_choice: for his treasures
  chosen_spanish: para sus tesoros
  alternatives_spanish:
  - para sus cosas escondidas
  - para sus reservas ocultas
  - en reserva para él
  lexicon: HALOT
  rationale: La forma es difícil y puede aludir a cosas escondidas o a tesoros/depósitos reservados. «Sus tesoros» sigue la opción probable del POB inglés y deja espacio para la tensión lexical mediante la nota.
- source_word: תְּאָכְלֵהוּ
  english_pob_choice: will consume him
  chosen_spanish: lo consumirá
  alternatives_spanish:
  - lo devorará
  - lo comerá
  lexicon: HALOT
  rationale: Con sujeto fuego, «consumirá» es idiomático en español y conserva la fuerza destructiva del verbo sin perder la imagen de fuego.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: El artículo indefinido corresponde bien al hebreo en este contexto y presenta al fuego como agente de juicio.
- source_word: לֹא נֻפָּח
  english_pob_choice: not blown
  chosen_spanish: no avivado
  alternatives_spanish:
  - no soplado
  - no atizado
  - no encendido por soplo humano
  lexicon: HALOT
  rationale: El verbo apunta a soplar/avivar fuego. «No avivado» comunica en español la idea de un fuego no estimulado por aliento humano, sin reducirlo solo a una cuestión mecánica de soplar.
- source_word: יֵרַע
  english_pob_choice: it will feed on
  chosen_spanish: dañará
  alternatives_spanish:
  - consumirá
  - hará mal a
  - devorará
  lexicon: HALOT
  rationale: Aquí el hebreo puede ser «hacer mal» o actuar destructivamente. Dado el paralelismo con el fuego que consume, «dañará» preserva la fuerza negativa sin forzar una personificación excesiva en español.
- source_word: שָׂרִיד
  english_pob_choice: what remains
  chosen_spanish: lo que quede
  alternatives_spanish:
  - el remanente
  - el sobreviviente
  - lo restante
  lexicon: HALOT
  rationale: El término puede referirse al sobreviviente o al remanente. Para español poético y neutro, «lo que quede» mantiene la indeterminación señalada por el POB inglés.
- source_word: בְּאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: en su tienda
  alternatives_spanish:
  - en su tienda de campaña
  - en su morada
  lexicon: HALOT
  rationale: «Tienda» conserva la imagen literal de Job y su valor de hogar/ residencia. Es la elección más fiel y legible en español bíblico.
theological_decisions:
- issue: 'Naturaleza de la primera línea: oscuridad como calamidad reservada u ocultamiento de bienes'
  english_pob_reading: All darkness is hidden up for his treasures; the Hebrew phrase involving 'his hidden things/treasures' is difficult and may refer either to calamity reserved for him or to what is hidden among his stores.
  chosen_spanish_reading: Toda oscuridad está oculta para sus tesoros.
  alternative_spanish_readings:
  - Toda oscuridad está reservada para él.
  - Toda oscuridad está escondida entre sus depósitos.
  rationale: 'Conservo la ambigüedad teológica y lexical: la frase puede hablar de calamidad guardada para el impío o de cosas ocultas dentro de sus propios bienes. El texto español evita decidir demasiado y la nota explica la alternativa.'
  doctrine_reference: Sabiduría poética en Job; retribución judicial implícita, no doctrina sistemática explícita.
- issue: Sentido de 'un fuego no avivado'
  english_pob_reading: '''A fire not blown'' may mean a fire not kindled or fanned by human breath, implying a divinely sent or otherwise inextinguishable fire.'
  chosen_spanish_reading: un fuego no avivado
  alternative_spanish_readings:
  - un fuego no soplado
  - un fuego no atizado
  - un fuego no encendido por soplo humano
  rationale: 'La formulación mantiene la tensión interpretativa: no es solo un fuego normal, sino uno que no depende de soplo humano. En Job, esto sugiere un juicio irresistible o de procedencia no humana.'
  doctrine_reference: Juicio divino en la literatura sapiencial; imagen poética de destrucción inevitable.
- issue: 'Última cláusula: daño vs. consumo del remanente/sobreviviente'
  english_pob_reading: Or 'it will harm the survivor in his tent' / 'it will consume the remnant in his tent.'
  chosen_spanish_reading: dañará lo que quede en su tienda.
  alternative_spanish_readings:
  - consumirá al sobreviviente en su tienda.
  - dañará al remanente en su tienda.
  rationale: El hebreo permite tanto la idea de herir como la de consumir el resto que queda. «Dañará» preserva el margen semántico sin cerrar la imagen, y «lo que quede» evita forzar a una persona concreta donde el hebreo puede ser impersonal.
  doctrine_reference: Destrucción total del patrimonio/linaje del impío en el discurso de Job; lenguaje poético de juicio.
translation_notes:
  revision_awareness: 'El contexto de revisión más reciente indica que no hubo cambios necesarios y el acuerdo con la revisión automatizada fue alto con objeciones menores. Por eso conservo la estructura del POB inglés, pero ajusto el español para naturalidad: traduzco la primera cola con una ambigüedad controlada, mantengo la imagen de fuego no avivado y hago explícita la opción semántica de la última cola sin cerrar la lectura.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí porque el versículo no contiene el Tetragrámaton.
  - Se evita «SEÑOR» como máscara teológica; el pasaje no requiere sustitución del nombre divino.
  - «Tienda» conserva el campo semántico de hogar/dwelling en Job.
  - Se preserva la tensión entre ocultamiento y reserva en «sus tesoros».
  - «No avivado» refleja mejor el valor de נֻפָּח que un mero «no soplado» en español, sin perder la referencia al aliento humano.
