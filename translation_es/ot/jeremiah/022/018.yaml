revisions:
- from: 'Por tanto, así dice Yahvé acerca de Jehoiaquim, hijo de Josías, rey de Judá: no harán lamentación por él, diciendo: «¡Ay, hermano mío!» o «¡Ay, hermana!» No harán lamentación por él, diciendo: «¡Ay, señor!» o «¡Ay, su majestad!»'
  to: 'Por tanto, así dice Yahvé acerca de Jehoiaquim, hijo de Josías, rey de Judá: no lo lamentarán[a], diciendo: «¡Ay, hermano mío!» o «¡Ay, hermana!» No lo lamentarán[a], diciendo: «¡Ay, señor!» o «¡Ay, su majestad![b]»'
  rationale: Se reemplazó «no harán lamentación por él» por «no lo lamentarán» para lograr un español más natural sin perder el sentido básico; se añadió una nota para conservar explícitamente el matiz funerario formal de ספד. También se añadió una nota sobre la alternativa «su esplendor» para reflejar la decisión léxica documentada para הֹדֹה. Se mantuvieron «Yahvé», la asimetría «hermano mío / hermana», y «señor / su majestad» por buena fidelidad al hebreo y a la auditoría inglesa.
