lexical_decisions:
- source_word: וְאֶל
  english_pob_choice: But to
  chosen_spanish: Pero al
  alternatives_spanish:
  - Y al
  - Ahora al
  lexicon: HALOT
  rationale: La conjunción con preposición introduce un giro discursivo hacia el rey de Judá; «Pero al» conserva el contraste/adición con naturalidad en español.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: the king of Judah
  chosen_spanish: el rey de Judá
  alternatives_spanish:
  - Judá's king
  lexicon: HALOT
  rationale: Es la forma constructa normal y clara en español; mantiene la referencia real y geográfica sin forzar el orden.
- source_word: הַשֹּׁלֵחַ אֶתְכֶם
  english_pob_choice: who sent you
  chosen_spanish: que los envió
  alternatives_spanish:
  - que los está enviando
  - el que los envía
  lexicon: HALOT
  rationale: El participio funciona como rasgo identificador del rey; en español, la relativa simple con pretérito expresa de forma natural la acción pasada que lo caracteriza en este contexto.
- source_word: לִדְרֹשׁ אֶת יְהוָה
  english_pob_choice: to inquire of Yahweh
  chosen_spanish: para consultar a Yahvé
  alternatives_spanish:
  - para buscar a Yahvé
  - para inquirir de Yahvé
  lexicon: HALOT
  rationale: דרשׁ con Dios aquí apunta a consultar/buscar orientación divina; «consultar» comunica bien el contexto profético sin perder la fuerza relacional del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino como nombre propio, conforme al estándar del proyecto, en vez de sustituirlo por un título.
- source_word: כֹּה תֹאמְרוּ אֵלָיו
  english_pob_choice: thus you shall say to him
  chosen_spanish: así le dirán
  alternatives_spanish:
  - esto le dirán
  - de esta manera le dirán
  lexicon: HALOT
  rationale: La fórmula mensajera se vierte con una construcción directa y solemne en español, manteniendo el valor directivo del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Así dijo
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; el presente mantiene el carácter formal y vivo del mensaje autorizado.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Traducción directa y natural del sintagma de pacto, conservando la identificación relacional con Israel.
- source_word: הַדְּבָרִים אֲשֶׁר שָׁמָעְתָּ
  english_pob_choice: As for the words that you have heard—
  chosen_spanish: En cuanto a las palabras que has oído[a]—
  alternatives_spanish:
  - Acerca de las palabras que has oído—
  - En cuanto a las palabras que oíste—
  lexicon: HALOT
  rationale: «En cuanto a» reproduce el tópico resumptivo del hebreo y evita forzar una oración completa en español; el perfecto «has oído» es natural en la alocución directa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrama directamente. Se conserva como nombre propio «Yahvé» para reflejar el nombre del pacto y no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene el giro topical «En cuanto a…» para reflejar la cláusula suspendida, en línea con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva el registro profético-formal con «Así dice» y la relativa de mensaje «que los envió».
  - «Consultar» se eligió por el contexto de consulta oracular; no se debilitó a «buscar» sin base contextual.
  - La cláusula final queda deliberadamente abierta, como en el hebreo, y la nota explica la alternativa de tiempo verbal y la suspensión sintáctica.
