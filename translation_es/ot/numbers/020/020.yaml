translation:
  language: es
  text: 'Pero él dijo: «No pasarás por aquí». Entonces Edom salió a su encuentro[a] con una gran multitud[b] y con mano fuerte[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para enfrentarlo». La expresión hebrea en sí es neutral, «salir al encuentro», pero el contexto es claramente hostil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con un pueblo pesado»; es un modismo que aquí significa una multitud grande o imponente.
    reason: lexical_alternative
  - marker: c
    text: O «con mano poderosa», es decir, con poder o fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: La partícula waw-consecutiva avanza la narración; en este contexto, el español «Pero» expresa mejor el giro adversativo frente a la petición previa, como en la decisión inglesa. Se mantiene el sujeto implícito con «él», claro por el contexto.
- source_word: לֹא תַעֲבֹר
  english_pob_choice: You shall not pass through
  chosen_spanish: No pasarás
  alternatives_spanish:
  - No pasarás por aquí
  - No podrás pasar
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición/refusal tajante. En español, la forma directa «No pasarás» conserva la firmeza y naturalidad del mandato negativo. Se omite «through» porque en este contexto el verbo «pasar» ya comunica atravesar territorio; añadirlo puede sonar forzado.
- source_word: וַיֵּצֵא אֱדוֹם
  english_pob_choice: And Edom came out
  chosen_spanish: Entonces Edom salió
  alternatives_spanish:
  - Y Edom salió
  - Luego Edom salió
  lexicon: HALOT
  rationale: יצא se traduce de modo básico como «salir». «Entonces» refleja el avance narrativo sin sobreinterpretar la escena como maniobra militar explícita.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - a su encuentro
  - para encontrarlo
  - contra él
  lexicon: HALOT
  rationale: El verbo/preposición hebreos son neutrales en su forma básica («salir al encuentro»). En español, «a recibirlo» comunica el sentido de aproximación personal y mantiene abierta la tensión contextual hostil sin introducirla de forma innecesaria en el verbo mismo.
- source_word: בְּעַם כָּבֵד
  english_pob_choice: with a large force
  chosen_spanish: con un pueblo numeroso
  alternatives_spanish:
  - con una multitud numerosa
  - con un gran pueblo
  - con una fuerza grande
  lexicon: HALOT
  rationale: La frase literal es «con un pueblo pesado». En español, «pueblo numeroso» conserva la idea de cantidad y peso/masa, sin hacer del término una interpretación militar más fuerte de la que el hebreo exige por sí solo.
- source_word: וּבְיָד חֲזָקָה
  english_pob_choice: and with a strong hand
  chosen_spanish: y con mano fuerte
  alternatives_spanish:
  - y con una mano poderosa
  - y con fuerza
  - y con mano poderosa
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la «mano» como idiomática de poder/fuerza. «Fuerte» mantiene la cercanía a חזק y deja oír el modismo sin reemplazarlo por una formulación más interpretativa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido y el tono del texto hebreo y del auditr trail inglés, manteniendo las dos expresiones idiomáticas principales con equivalentes naturales en español y dejando nota de sus alternativas literales.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando el texto lo requiera, pero en este versículo no aparece el nombre divino.
  - Se conserva la oposición narrativa con «Pero» para reflejar el valor adversativo que el audit trail inglés destacó.
  - Se evita intensificar «a recibirlo» hacia «contra él» en el texto principal, reservando la lectura hostil para la nota, como hace el inglés con «to meet him».
