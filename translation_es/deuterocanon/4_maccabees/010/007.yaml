translation:
  language: es
  text: Y como de ninguna manera podían estrangularlo[a], arrancaron la piel desde las mismas puntas de sus dedos y le arrancaron el cuero cabelludo, e inmediatamente lo llevaron a la rueda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «con las mismas puntas de los dedos»; la frase griega es inusualmente gráfica y probablemente indica que la piel fue arrancada hasta las puntas de los dedos.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ κατὰ μηδένὰ τρόπον
  english_pob_choice: since they were in no way able
  chosen_spanish: y como en ninguna manera podían
  alternatives_spanish:
  - y de ninguna manera podían
  - y puesto que no podían en absoluto
  lexicon: LSJ
  rationale: La construcción griega expresa incapacidad total; «como» refleja bien el valor causal de καί + participio en este contexto, y «en ninguna manera» conserva la fuerza negativa sin sonar arcaico.
- source_word: ἰσχύοντες
  english_pob_choice: were able
  chosen_spanish: podían
  alternatives_spanish:
  - eran capaces
  - tenían fuerza para
  lexicon: LSJ
  rationale: Aquí el participio funciona con sentido de capacidad efectiva, no solo de fuerza física; «podían» comunica esa aptitud con naturalidad en español.
- source_word: ἄγξαι
  english_pob_choice: to strangle
  chosen_spanish: estrangularlo
  alternatives_spanish:
  - ahorcarlo
  - asfixiarlo
  lexicon: LSJ
  rationale: El verbo se refiere a apretar la garganta o causar sofocación; «estrangular» es la equivalencia más clara y directa en este contexto de tortura.
- source_word: περισύραντες
  english_pob_choice: dragged off / tore off
  chosen_spanish: arrancaron
  alternatives_spanish:
  - desprendieron
  - tiraron de
  lexicon: LSJ
  rationale: El participio exige una acción violenta de arrancar o desprender la piel; «arrancaron» conserva el carácter agresivo sin forzar una imagen mecánica poco natural en español.
- source_word: τὸ δέρμα
  english_pob_choice: the skin
  chosen_spanish: la piel
  alternatives_spanish:
  - el cuero
  - la carne
  lexicon: LSJ
  rationale: El sentido literal es corporal; «la piel» es el término normal y preciso en español.
- source_word: σὺν ἄκραις ταῖς τῶν δακτύλων κορυφαῖς
  english_pob_choice: with the very tips of his fingers / from the very tips of his fingers
  chosen_spanish: desde las mismas puntas de sus dedos
  alternatives_spanish:
  - con las mismas puntas de sus dedos
  - hasta las puntas de sus dedos
  lexicon: LSJ
  rationale: La frase griega es gráfica e inusual y señala el alcance extremo del desollamiento. «Desde las mismas puntas de sus dedos» mantiene la idea de origen/extensión del arrancamiento y preserva la crudeza del original mejor que una paráfrasis más suave.
- source_word: ἀπεσκύθισον
  english_pob_choice: scalped him
  chosen_spanish: lo desollaron
  alternatives_spanish:
  - lo despellejaron
  - le arrancaron el cuero cabelludo
  lexicon: LSJ
  rationale: El verbo pertenece al campo de desollar/arrancar la piel; en español «desollar» preserva la violencia del acto y puede abarcar el sentido específico aquí descrito. «Despellejar» sería posible, pero «desollar» suena más directo y sobrio en registro bíblico.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: e inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  lexicon: LSJ
  rationale: Marca sucesión rápida; «e inmediatamente» mantiene el encadenamiento narrativo del griego.
- source_word: ἦγον ἐπὶ τὸν τροχόν
  english_pob_choice: they led him to the wheel
  chosen_spanish: lo llevaron a la rueda
  alternatives_spanish:
  - lo condujeron a la rueda
  - lo trasladaron a la rueda
  lexicon: LSJ
  rationale: La escena describe el traslado hacia un instrumento de tortura; «lo llevaron a la rueda» es natural y conserva la referencia directa al instrumento.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en cuanto al inicio causal («And since»), la violencia de περισύραντες («tore off»), y la especificidad de ἀπεσκύθισον. En español se optó por «como en ninguna manera podían» para reflejar ese valor causal sin perder la negación enfática. También se mantuvo la alusión intensa a las puntas de los dedos mediante una nota alternativa, ya que el griego es deliberadamente gráfico.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se preservó el registro sobrio y narrativo propio del POB, evitando eufemismos.
  - Se eligió «desollar» para mantener la fuerza del verbo griego sin introducir una explicación interpretativa no exigida por el texto.
  - La nota a pie de página conserva la alternativa literal sobre las puntas de los dedos porque el griego admite esa ambigüedad intensa y el inglés POB también la documenta.
