revisions:
- from: Así que yo también escogeré para ellos un trato duro[a], y haré venir sobre ellos sus temores[b]; porque llamé, y nadie respondió; hablé, y no escucharon; hicieron lo malo ante mis ojos, y escogieron lo que no me complacía.
  to: Yo también escogeré para ellos un trato duro[a], y haré venir sobre ellos sus temores[b], porque llamé y nadie respondió; hablé y no escucharon; hicieron lo malo a mis ojos, y escogieron lo que no me agradó.
  rationale: Se ajusta el inicio a 'Yo también' para reflejar con más fidelidad גַּם אֲנִי sin añadir una conclusión discursiva excesiva; se mejora la fórmula evaluativa a 'a mis ojos'; y se cambia 'no me complacía' por 'no me agradó' para representar mejor el hebreo y el POB auditado, manteniendo claridad y la ironía de 'escoger'.
  reviewer_model: gpt-5.4
