translation:
  language: es
  text: 'Pero Moisés dijo a Dios: «¿Quién soy yo para que vaya a Faraón y para que saque a los hijos de Israel[a] de Egipto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר se expresa de manera natural en español con 'dijo', que preserva el acto de comunicación sin añadir matices innecesarios.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español bíblico y general la referencia al Dios verdadero se expresa de forma directa como 'Dios', sin artículo marcado.
- source_word: מִי אָנֹכִי
  english_pob_choice: Who am I
  chosen_spanish: ¿Quién soy yo?
  alternatives_spanish:
  - ¿Quién soy yo, en realidad?
  lexicon: HALOT
  rationale: La pregunta retórica se reproduce de forma idiomática en español con '¿Quién soy yo?', conservando la humildad e insuficiencia que expresa Moisés.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En este contexto la partícula introduce una cláusula de resultado o finalidad dentro de la pregunta retórica; en español 'para que' comunica mejor esa relación que un simple 'que'.
- source_word: אֵלֵךְ
  english_pob_choice: I should go
  chosen_spanish: vaya
  alternatives_spanish:
  - iré
  - fuera
  lexicon: HALOT
  rationale: El imperfecto en este contexto expresa acción contemplada o hipotética; el subjuntivo 'vaya' conserva ese sentido dentro de la pregunta retórica.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: Se mantiene el nombre/título tradicional ampliamente reconocido en español, con mayúscula como designación personal.
- source_word: וְכִי
  english_pob_choice: and that
  chosen_spanish: y para que
  alternatives_spanish:
  - y que
  - y
  lexicon: HALOT
  rationale: La segunda cláusula paralela conserva la coordinación y la misma relación de finalidad/resultado para reproducir la estructura de la objeción de Moisés.
- source_word: אוֹצִיא
  english_pob_choice: I should bring
  chosen_spanish: saque
  alternatives_spanish:
  - sacara
  - sacaré
  lexicon: HALOT
  rationale: El verbo causativo de יצא se traduce con 'sacar', que es el equivalente natural en español para 'bring out'; el subjuntivo mantiene la dependencia retórica del inicio de la frase.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica masculina del hebreo con 'hijos de Israel', evitando neutralizarla en 'israelitas' sin una razón textual específica.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con 'sacar' en español, 'de Egipto' transmite de forma natural el punto de origen y la salida implícita del verbo causativo.
theological_decisions:
- issue: Rendering of בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  rationale: El hebreo usa una expresión genealógica masculina. Se conserva esa forma en el cuerpo del texto para mantener la correspondencia formal y la transparencia audit-able del original; 'los israelitas' queda como alternativa de claridad idiomática, pero no se adopta como texto principal.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4 (Gender-accurate over gender-neutral)'
translation_notes:
  revision_awareness: 'Alineado con el pasaje fuente y con la auditoría inglesa: se conservó la estructura retórica de doble objeción, el valor causativo de יצא como ''sacar'', y la expresión masculina בני ישראל como ''los hijos de Israel'' para mantener transparencia formal sin perder naturalidad española.'
  spanish_consistency_notes:
  - Usa 'Dios' sin artículo, siguiendo el uso bíblico español para la referencia directa al Dios verdadero.
  - Conserva 'Faraón' como transliteración estable y reconocible en español.
  - Mantiene la pregunta retórica con subjuntivo para reflejar la dependencia de las cláusulas con כִּי / וְכִי.
  - Evita 'SEÑOR' porque el hebreo aquí dice אֱלֹהִים, no el Tetragrámaton.
