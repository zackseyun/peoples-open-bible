translation:
  language: es
  text: Solo sepan con certeza que, si me dan muerte[a], estarán poniendo sangre inocente sobre ustedes, sobre esta ciudad y sobre sus habitantes; porque en verdad Yahvé me ha enviado a ustedes para hablar todas estas palabras para que ustedes oigan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me matan». El hebreo usa un verbo causativo, que encaja con el contexto judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en sus oídos», una expresión idiomática que significa «para que ustedes oigan» o «en su presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: אַךְ introduce una advertencia enfática y limitadora. 'Solo' conserva bien en español ese matiz de restricción solemne sin sonar forzado.
- source_word: יָדֹעַ תֵּדְעוּ
  english_pob_choice: know for certain
  chosen_spanish: sepan con certeza
  alternatives_spanish:
  - conozcan con certeza
  - sepan ciertamente
  lexicon: HALOT
  rationale: La infinitiva absoluta intensifica el verbo finito; 'sepan con certeza' transmite esa seguridad enfática de manera natural en español.
- source_word: מְמִתִים אַתֶּם אֹתִי
  english_pob_choice: you put me to death
  chosen_spanish: me dan muerte
  alternatives_spanish:
  - me matan
  - me hacen morir
  lexicon: HALOT
  rationale: El participio causativo de מות apunta a una ejecución deliberada. 'Me dan muerte' mantiene esa fuerza más claramente que un simple 'me matan'.
- source_word: דָם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre sin culpa
  - sangre inocente derramada
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula fija de derramamiento injusto de sangre. 'Sangre inocente' es la equivalencia más directa y reconocible en español bíblico.
- source_word: נֹתְנִים עֲלֵיכֶם
  english_pob_choice: are bringing on yourselves
  chosen_spanish: estarán poniendo ... sobre ustedes
  alternatives_spanish:
  - estarán trayendo ... sobre ustedes
  - se estarán echando ... sobre ustedes
  lexicon: HALOT
  rationale: La metáfora de 'dar/poner sobre' expresa incurrir en culpa de sangre. En español, 'estarán poniendo' conserva la imagen sin perder claridad jurídica.
- source_word: וְאֶל הָעִיר הַזֹּאת וְאֶל יֹשְׁבֶיהָ
  english_pob_choice: on this city, and on its inhabitants
  chosen_spanish: sobre esta ciudad y sobre sus habitantes
  alternatives_spanish:
  - contra esta ciudad y contra sus habitantes
  - sobre la ciudad y sus habitantes
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'sobre' para reflejar el paralelismo del hebreo y la extensión del daño/culpa a la ciudad y a quienes la habitan.
- source_word: בֶאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - de veras
  lexicon: HALOT
  rationale: '''En verdad'' preserva el tono solemne y la afirmación de certeza factual que refuerza la comisión profética.'
- source_word: שְׁלָחַנִי יְהוָה
  english_pob_choice: the LORD has sent me
  chosen_spanish: Yahvé me ha enviado
  alternatives_spanish:
  - Yahvé me envió
  - el SEÑOR me ha enviado
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo como 'Yahvé', conforme a la convención del proyecto. El perfecto se vierte en pasado compuesto para resaltar la vigencia actual del envío.
- source_word: עֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - contra ustedes
  - hacia ustedes
  lexicon: HALOT
  rationale: Con el verbo 'enviar' en contexto profético, עַל marca dirección hacia los destinatarios; 'a ustedes' comunica esa orientación sin cargar innecesariamente el sentido adversativo.
- source_word: לְדַבֵּר בְּאָזְנֵיכֶם
  english_pob_choice: to speak ... in your hearing
  chosen_spanish: para hablar ... a sus oídos
  alternatives_spanish:
  - para hablar ... en su presencia
  - para hablar ... ante ustedes
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, 'en/a los oídos', porque expresa el acto directo de proclamarles el mensaje. En español suena natural y mantiene la fuerza idiomática.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todas estas declaraciones
  lexicon: HALOT
  rationale: '''Palabras'' reproduce con precisión דְּבָרִים cuando se refiere al mensaje pronunciado por el profeta; ''cosas'' diluiría el valor discursivo del texto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrama directamente. Siguiendo la convención doctrinal del proyecto, se translitera como 'Yahvé' para preservar el nombre personal del Dios de Israel en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Concordante con el expediente inglés: se mantiene la equivalencia óptima, la intensificación de יָדֹעַ תֵּדְעוּ, el matiz causativo de מְמִתִים, la metáfora jurídica de דָם נָקִי / נֹתְנִים עֲלֵיכֶם, y la transliteración de יְהוָה como Yahvé. No se registran revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se preserva la repetición de 'sobre' para reflejar el paralelismo hebreo.
  - '''A sus oídos'' se usa como calco idiomático auditable; la nota explica su sentido.'
  - '''Yahvé'' mantiene la terminología del proyecto para el nombre divino.'
  - El registro es solemne y bíblico, pero con sintaxis española natural.
