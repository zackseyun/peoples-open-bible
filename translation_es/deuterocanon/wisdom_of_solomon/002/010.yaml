review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego y conserva los elementos principales: opresión del pobre/justo, falta de clemencia hacia la viuda y desprecio por las canas del anciano muy entrado en años. Sin embargo, «no perdonemos a la viuda» se desvía del matiz de μὴ φεισώμεθα, que aquí significa ‘no perdonar / no escatimar / no tener consideración’ en el sentido de no abstenerse de dañarla, no de remitirle una culpa. También conviene ajustar la nota [a], porque «inocente» introduce un matiz no documentado por la nota inglesa.'
  spanish_quality_summary: El español es claro y digno. «Oprimamos al pobre justo» y «las canas de un anciano cargado de años» son legibles, aunque esta última frase puede simplificarse ligeramente. «No tengamos compasión de la viuda» suena más natural y fiel que «no perdonemos a la viuda» en este contexto. El resto mantiene un registro bíblico moderno y comprensible.
  glossary_alignment: No hay términos del glosario principal en conflicto. La decisión «justo» para δίκαιον es aceptable en español, aunque el razonamiento inglés favorece ‘righteous’; «justo» preserva bien el contraste ético en este contexto. «Anciano» para πρεσβύτου y «canas» para πολιάς están bien. El único ajuste léxico necesario es φείδομαι.
  issues:
  - severity: medium
    issue: «No perdonemos a la viuda» no representa bien μὴ φεισώμεθα en este contexto.
    rationale: En español, «perdonar a alguien» sugiere absolver o excusar una falta. El griego aquí expresa no ahorrar daño o no mostrar clemencia. «No tengamos compasión de la viuda» o «no la perdonemos» sería más cercano; la forma actual con complemento personal directo cambia el sentido.
  - severity: low
    issue: La nota [a] añade «el pobre inocente», alternativa no respaldada por la nota inglesa auditada.
    rationale: La evidencia auditada solo preserva «the just poor man» como alternativa de orden/relación de los términos, no un cambio semántico a «inocente».
  - severity: low
    issue: La nota [b] está bien en sustancia, pero el texto principal puede alinearse mejor con ella.
    rationale: Si se usa «mostremos consideración» o una expresión afín, la relación entre texto y nota queda más transparente; aun así, «respetemos» no es incorrecto.
  revised_spanish_text: Oprimamos al pobre justo[a]; no tengamos compasión de la viuda, ni respetemos las canas de un anciano cargado de años[b].
