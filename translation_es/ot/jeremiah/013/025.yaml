translation:
  language: es
  text: Esta es tu suerte[a], la porción medida para ti de mi parte, declara Yahvé, porque me olvidaste y confiaste en la falsedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu porción» o «tu parte asignada». El hebreo combina términos de suerte y porción, subrayando algo que te ha sido asignado.
    reason: lexical_alternative
  - marker: b
    text: O «en mentiras» o «en el engaño». El hebreo שֶׁקֶר puede significar falsedad, mentira o engaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  lexicon: HALOT
  rationale: El demostrativo introduce una declaración judicial; en español conviene explicitar el verbo copulativo para una formulación natural y fiel al sentido de sentencia.
- source_word: גוֹרָלֵךְ
  english_pob_choice: your lot
  chosen_spanish: tu lote
  alternatives_spanish:
  - tu suerte
  - tu porción
  - tu destino
  lexicon: HALOT
  rationale: גוֹרָל expresa la idea concreta de algo asignado por sorteo o adjudicación. «Lote» conserva esa fuerza de asignación; «suerte» o «destino» suenan más interpretativos.
- source_word: מְנָת מִדַּיִךְ
  english_pob_choice: the portion measured out to you
  chosen_spanish: la porción medida para ti
  alternatives_spanish:
  - la porción que te fue medida
  - tu porción medida
  - tu porción asignada
  lexicon: HALOT
  rationale: La combinación intensifica la idea de una porción distribuida o adjudicada. «Medida para ti» conserva la imagen de medida/porcionamiento sin sonar forzado en español.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: desde mí
  alternatives_spanish:
  - de mí
  - procedente de mí
  lexicon: HALOT
  rationale: El hebreo marca procedencia. «Desde mí» mantiene la fuente personal del juicio y evita una frase más abstracta que debilite la relación directa con Yahvé.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares the LORD
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: El giro profético נְאֻם se vierte de forma natural como «declara». Se conserva el nombre divino «Yahvé» según la norma del proyecto, en lugar de sustituirlo por una máscara tipo «SEÑOR».
- source_word: שָׁכַחַתְּ אֹתִי
  english_pob_choice: you have forgotten me
  chosen_spanish: me olvidaste
  alternatives_spanish:
  - te has olvidado de mí
  - me has olvidado
  lexicon: HALOT
  rationale: El acusativo directo es claro en hebreo. En español, el pretérito simple suena natural en una denuncia profética y mantiene la relación personal del reproche.
- source_word: וַתִּבְטְחִי
  english_pob_choice: and trusted
  chosen_spanish: y confiaste
  alternatives_spanish:
  - y pusiste tu confianza
  - y te apoyaste
  lexicon: HALOT
  rationale: «Confiar» reproduce bien el verbo de seguridad/reliance. «Confiaste» es breve y mantiene el paralelismo con el olvido de Yahvé.
- source_word: בַּשָּׁקֶר
  english_pob_choice: in falsehood
  chosen_spanish: en la falsedad
  alternatives_spanish:
  - en mentiras
  - en el engaño
  - en lo falso
  lexicon: HALOT
  rationale: שֶׁקֶר puede abarcar mentira, falsedad o engaño. «Falsedad» conserva el alcance amplio que la POB inglesa documentó sin concretar indebidamente el referente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: El proyecto prescribe transcribir el Tetragrámaton como «Yahvé». Se evita la sustitución por un título para preservar el nombre de pacto revelado en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección singular femenina del reproche
  english_pob_reading: Retained as singular 'you' addressed to Judah/Jerusalem collectively
  chosen_spanish_reading: Conservar la segunda persona singular implícita dirigida a la ciudad/nación
  alternative_spanish_readings:
  - nombrar explícitamente a Judá
  - nombrar explícitamente a Jerusalén
  rationale: El hebreo usa formas femeninas singulares para dirigirse a Judá/Jerusalén como entidad colectiva. El español mantiene el reproche en segunda persona sin importar un sustantivo ausente del verso.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import claims the text does not make'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se adopta una fórmula natural para נְאֻם יְהוָה («declara Yahvé») y se conserva el resto del sentido sentencioso: asignación de un lote/porción, procedencia divina, acusación de olvido y confianza en la falsedad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Lote» preserva la concreción del hebreo גוֹרָל sin convertirlo en una paráfrasis moralizante.
  - «Falsedad» mantiene abierta la gama semántica de שֶׁקֶר sin sobreespecificar.
  - La oración conserva el orden retórico de sentencia, causa y acusación, con puntuación española natural.
