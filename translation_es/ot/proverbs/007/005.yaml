translation:
  language: es
  text: para guardarte de la mujer prohibida[a], de la mujer extranjera, cuyas palabras son seductoras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyas palabras halagan» o «que halaga con sus palabras». El hebreo dice literalmente: «ha hecho suaves sus palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמָרְךָ
  english_pob_choice: to keep you
  chosen_spanish: para guardarte
  alternatives_spanish:
  - para conservarte
  - para protegerte
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Guardarte» conserva el sentido protector de שׁמר y suena natural en español, sin perder la relación con la instrucción previa.
- source_word: מֵאִשָּׁה זָרָה
  english_pob_choice: from the forbidden woman
  chosen_spanish: de la mujer prohibida
  alternatives_spanish:
  - de la mujer extraña
  - de la adúltera
  - de la mujer ajena
  lexicon: HALOT
  rationale: זָרָה significa literalmente «extraña/foránea», pero en Proverbios esta unión funciona como término idiomático para una mujer sexual y moralmente fuera de los límites correctos. «Prohibida» comunica mejor esa fuerza en español actual que una calca tradicional.
- source_word: מִנָּכְרִיָּה
  english_pob_choice: from the foreign woman
  chosen_spanish: de la mujer extranjera
  alternatives_spanish:
  - de la forastera
  - de la mujer ajena
  - de la extranjera
  lexicon: HALOT
  rationale: נָכְרִיָּה sí porta más directamente la idea de «extranjera/foránea». Como el hebreo coloca dos términos en paralelo, conviene diferenciarlos en español para no aplanar la distinción léxica.
- source_word: אֲמָרֶיהָ
  english_pob_choice: whose words
  chosen_spanish: cuyas palabras
  alternatives_spanish:
  - cuyas frases
  - su hablar
  - sus palabras
  lexicon: HALOT
  rationale: El plural constructo significa «sus palabras/sus dichos». «Cuyas palabras» enlaza con naturalidad al adjetivo siguiente.
- source_word: הֶחֱלִיקָה
  english_pob_choice: are smooth
  chosen_spanish: son suaves
  alternatives_spanish:
  - son lisonjeras
  - suavizan
  - son halagadoras
  lexicon: HALOT
  rationale: El hifil de חלק denota «hacer suave» y, en sentido figurado, habla suave o halagadora. «Son suaves» preserva la imagen básica con un español claro; el matiz de lisonja queda disponible en la nota.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia; no hubo cambios revisados en la última pasada. La única tensión relevante es cómo reflejar en español la doble caracterización de la mujer (זרה / נכריה) sin colapsar ambos términos, y cómo traducir חלק en un registro natural sin perder la imagen de «suavidad» en el habla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se evita «SEÑOR» y también se evita «Cristo», «gracia» u otras fórmulas no presentes en el hebreo.
  - «Mujer prohibida» y «mujer extranjera» distinguen los dos hebraísmos paralelos; no se unifican para no perder la señal retórica.
  - 'La nota reproduce la alternativa semántica documentada por el inglés: «halagan/lisonjeras», ligada al hebreo literal de «hacer suave».'
