translation:
  language: es
  text: Delante de él se postrarán los habitantes del desierto[a], y sus enemigos lamerán el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente ‘tribus del desierto’; el término hebreo צִיִּים puede referirse a habitantes de regiones desérticas, aunque en algunos contextos se usa para criaturas del desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  english_pob_choice: Before him
  chosen_spanish: Delante de él
  alternatives_spanish:
  - Ante él
  - En su presencia
  lexicon: HALOT
  rationale: La expresión con לְפָנָיו indica ubicación o posición relacional 'ante/en presencia de'. 'Delante de él' suena natural en español y conserva esa relación sin volverla artificial.
- source_word: יִכְרְעוּ
  english_pob_choice: will bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se arrodillarán
  - se inclinarán
  lexicon: HALOT
  rationale: כרע puede significar arrodillarse o inclinarse en señal de sumisión. En este contexto real de sometimiento, 'se postrarán' comunica bien la humillación obediente que el verbo sugiere.
- source_word: צִיִּים
  english_pob_choice: the desert dwellers
  chosen_spanish: los habitantes del desierto
  alternatives_spanish:
  - las tribus del desierto
  - los nómadas
  - las criaturas del desierto
  lexicon: HALOT
  rationale: El término es difícil y puede referirse a habitantes de regiones áridas o, en otros contextos, a seres del desierto. Como aquí aparece junto con 'sus enemigos', el referente humano es el más probable; 'habitantes del desierto' conserva esa ambigüedad relativa sin decidir demasiado.
- source_word: וְאֹיְבָיו
  english_pob_choice: and his enemies
  chosen_spanish: y sus enemigos
  alternatives_spanish:
  - y los que le son hostiles
  lexicon: HALOT
  rationale: אֹיְבָיו es una correspondencia directa y transparente con 'sus enemigos'.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - la tierra
  - el polvo del suelo
  lexicon: HALOT
  rationale: Aunque en hebreo no lleva artículo, en español la expresión fija 'lamer el polvo' suena natural con artículo definido y mantiene la imagen de humillación total.
- source_word: יְלַחֵכוּ
  english_pob_choice: will lick
  chosen_spanish: lamerán
  alternatives_spanish:
  - lamerán hasta el suelo
  - chuparán
  lexicon: HALOT
  rationale: El verbo לחך significa 'lamer'. Mantener 'lamerán' preserva la metáfora concreta y el tono poético del verso.
theological_decisions:
- issue: Imaginería de sometimiento real vs. abstracta
  english_pob_reading: The verse depicts royal conquest/submission in poetic imagery rather than requiring a literal act in every case.
  chosen_spanish_reading: El verso presenta la sumisión y humillación de los enemigos en lenguaje poético realista, sin exigir que cada elemento se lea de modo literal en todos los casos.
  alternative_spanish_readings:
  - Una predicción estrictamente literal de postración física y lamer polvo
  - Una paráfrasis política abstracta sin la imagen corporal
  rationale: Conviene conservar la imagen corporal del hebreo porque es un recurso tradicional de realeza y victoria. A la vez, la lectura no obliga a entenderlo como descripción técnica de un rito físico en cada instancia.
  doctrine_reference: Salmo 72; imaginería real de humillación/sometimiento
translation_notes:
  revision_awareness: 'El borrador sigue el estado de alta concordancia del audit trail inglés: no se introducen cambios sustanciales respecto de la decisión léxica y teológica ya estabilizada, y se conserva la ambigüedad de צִיִּים mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo cuando el texto lo requiere; en este versículo no aparece el nombre divino.
  - '''Se postrarán'' y ''lamerán el polvo'' conservan la fuerza imagística del hebreo y son idiomáticos en español bíblico contemporáneo.'
  - '''Habitantes del desierto'' evita una decisión excesivamente estrecha sobre צִיִּים y coincide con la lectura humana preferida en el audit trail.'
