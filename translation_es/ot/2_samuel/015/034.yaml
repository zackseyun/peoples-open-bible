base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/034.yaml
  text: But if you return to the city and say to Absalom[a], ‘I will be your servant, O king; I was your father’s servant in the past[b], and now I will be your servant,’ then you will frustrate Ahithophel’s counsel for me.
  footnotes:
  - marker: a
    text: Or 'I am your servant, O king; I was your father’s servant formerly, and now I am your servant.' The Hebrew sequence is compressed and can be construed more literally with present-tense declarations.
    reason: alternative_reading
  - marker: b
    text: '''Servant'' here reflects courtly and political allegiance; ''slave'' is a possible lexical alternative for עֶבֶד, but the bonded nuance is not foregrounded in this setting.'
    reason: lexical_alternative
