review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: negación de residencia en una casa desde el éxodo hasta el presente, seguida del contraste con una existencia itinerante en tienda y tabernáculo. Conserva correctamente ''una casa'', ''los hijos de Israel'' y ''tabernáculo''. Sin embargo, ''he andado'' debilita el matiz de presencia/movimiento continuo de וָאֶהְיֶה מִתְהַלֵּךְ y en español puede sonar a simple caminar, no a morar de manera itinerante. Una leve mejora produce una correspondencia más fiel y más natural.'
  spanish_quality_summary: El español es claro y digno, pero 'sino que he andado en una tienda y en un tabernáculo' suena algo rígido y menos idiomático en contexto de residencia divina. 'He estado moviéndome' o 'he ido de un lugar a otro' expresaría mejor la idea; la primera mantiene mejor la cercanía formal con el participio hebreo. También conviene usar coma antes de 'sino que' en lugar de punto y coma para una lectura más fluida.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'los hijos de Israel' sigue la decisión documentada de preservar בְּנֵי con valor masculino; 'tabernáculo' mantiene la distinción cultual de מִשְׁכָּן; no aparecen términos del glosario mayor como Yahvé/Mesías. No se requieren notas al pie en español, ya que el texto revisado no introduce ambigüedad nueva y las alternativas inglesas no necesitan trasladarse obligatoriamente aquí.
  issues:
  - severity: medium
    issue: '''he andado'' para וָאֶהְיֶה מִתְהַלֵּךְ'
    rationale: Aunque posible, en español sugiere principalmente caminar, mientras que el hebreo en este contexto expresa una condición continua de moverse/estar de un lugar a otro en contraste con habitar en una casa.
  - severity: low
    issue: Puntuación con punto y coma antes de 'sino que'
    rationale: No es incorrecta, pero una coma produce una unión más natural entre las dos mitades contrastivas de la oración en español bíblico moderno.
  revised_spanish_text: Porque no he habitado en una casa desde el día en que saqué a los hijos de Israel de Egipto hasta hoy, sino que he estado moviéndome en una tienda y en un tabernáculo.
  revision_rationale: Se ajusta 'he andado' a 'he estado moviéndome' para reflejar mejor el valor continuo e itinerante de וָאֶהְיֶה מִתְהַלֵּךְ en contraste con 'habitar en una casa'. Se suaviza también la puntuación para una lectura más natural sin alterar el sentido. El resto del borrador es fiel al hebreo y a las decisiones léxicas documentadas.
