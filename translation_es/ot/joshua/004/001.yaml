review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja correctamente la estructura temporal del hebreo, el valor colectivo singular de כָל הַגּוֹי, el nombre divino יְהוָה como «Yahvé», y la continuación de la fórmula de habla hacia el versículo siguiente. Sin embargo, «había terminado» con sujeto singular («toda la nación») suena menos natural en español que el plural semántico «habían terminado», ya que el colectivo se entiende como el pueblo entero realizando la acción. También conviene preferir una apertura narrativa menos rígida que «Y aconteció».
  spanish_quality_summary: 'El texto es claro y fiel, pero «Y aconteció» suena algo acartonado para el español moderno neutral que pide el proyecto. «Y sucedió» conserva la función discursiva sin arcaísmo innecesario. Además, con «toda la nación», el verbo subordinado se lee mejor en plural por silepsis: «habían terminado de cruzar».'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; יְהוֹשֻׁעַ → «Josué» correctamente; הַיַּרְדֵּן → «el Jordán» natural y fiel. La nota sobre «todo el pueblo» preserva bien la alternativa léxica del inglés.'
  issues:
  - severity: medium
    issue: Inicio narrativo «Y aconteció»
    rationale: Aunque es fiel, suena más arcaizante y menos natural que «Y sucedió» en español neutral moderno. El proyecto pide evitar formulaciones acartonadas cuando no son necesarias.
  - severity: medium
    issue: Concordancia en «toda la nación había terminado»
    rationale: Gramaticalmente posible por concordancia formal con el colectivo singular, pero en español la acción distributiva del colectivo humano se expresa con mayor naturalidad como «toda la nación habían terminado» o, mejor aún, reformulando. Dado que el texto conserva «toda la nación» por fidelidad léxica, el plural verbal mejora la legibilidad.
  revised_spanish_text: Y sucedió[a] que, cuando toda la nación habían terminado de cruzar el Jordán, Yahvé dijo a Josué,
  revised_footnotes:
  - marker: a
    text: O «todo el pueblo»; el hebreo «toda la nación» usa un sustantivo colectivo singular para Israel.
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula narrativa a un español más natural («Y sucedió») y se mejora la fluidez de la cláusula con el colectivo humano manteniendo la elección léxica «toda la nación» y la nota explicativa ya documentada. No se requiere adjudicación especial.
