review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la imaginería central del hebreo: sanidad corporal y renovación del entorno. Sin embargo, en el tramo final no sigue la decisión principal auditada de la POB inglesa: בָּעֲרָבָה se tradujo allí como sustantivo común (''desert plain''), con ''Arabah'' solo en nota. El español invierte esa prioridad al poner ''Arabá'' en el texto principal y además crea una nota redundante/conflictiva con ''desierto[b]'' y ''Arabá[c]''. También conviene reflejar mejor la distinción entre מִדְבָּר y עֲרָבָה.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero ''el cojo'' puede sonar más marcado y menos natural que ''el que cojea'' o una solución plural; aun así es defendible. El problema principal de legibilidad/fidelidad está en las notas y en la geografía/terreno: ''corrientes en la Arabá'' suena incompleto por elipsis verbal y, unido a la nota b, confunde el paralelismo. ''Llanura desértica'' o ''llanura árida'' comunica mejor עֲרָבָה en español general.'
  glossary_alignment: 'No hay conflicto con los términos doctrinales globales. Las decisiones clave requieren ajuste contextual: mantener ''cantará de alegría'' es válido, conservar ''aguas'' está bien, y distinguir מִדְבָּר de עֲרָבָה en español es importante. La nota inglesa sobre alternativa geográfica debe preservarse, pero como nota, no como texto principal.'
  issues:
  - severity: high
    issue: בָּעֲרָבָה fue puesto como nombre propio en el texto principal ('en la Arabá').
    rationale: La auditoría inglesa eligió como lectura principal el sustantivo común 'in the desert plain' y relegó 'in the Arabah' a nota alternativa. El español debe preservar esa jerarquía salvo razón fuerte, que aquí no se documenta.
  - severity: high
    issue: Las notas b y c están desalineadas y parcialmente invertidas respecto del texto.
    rationale: Si el texto principal dice 'en el desierto' y luego 'en la Arabá', la nota b ('O en el Arabá') apunta al lugar equivocado y duplica/confunde la nota c. Las notas no reflejan limpiamente las alternativas del inglés ni la sintaxis española.
  - severity: medium
    issue: La distinción entre מִדְבָּר y עֲרָבָה quedó aplanada/inconsistente.
    rationale: Aunque 'desierto' para מִדְבָּר es aceptable, entonces עֲרָבָה conviene traducir de forma diferenciada como 'llanura desértica' o similar, no solo como otro término desértico sin explicación.
  - severity: low
    issue: '''El cojo'' es fiel pero puede sonar más áspero en español contemporáneo eclesial.'
    rationale: No es incorrecto, pero en una revisión de estilo podría considerarse 'el que cojea' o una opción plural genérica. No es necesario forzar este cambio si se conserva la precisión.
  revised_spanish_text: Entonces el cojo[a] saltará como un ciervo, y la lengua del mudo cantará de alegría; porque aguas han brotado en el desierto, y corrientes en la llanura desértica[b].
  revised_footnotes:
  - marker: a
    text: O «los cojos»; el hebreo usa un singular con valor genérico.
    reason: lexical_alternative
  - marker: b
    text: O «en el Arabá», tomando el término como nombre geográfico en lugar del sustantivo común «llanura desértica».
    reason: alternative_reading
  revision_rationale: 'Se corrige la prioridad de lectura para עֲרָבָה conforme a la POB inglesa: el sentido común ''llanura desértica'' va en el texto principal y la lectura geográfica ''Arabá'' queda en nota. También se eliminan notas redundantes/confusas y se preserva mejor la distinción entre מִדְבָּר y עֲרָבָה. El resto del versículo puede mantenerse.'
