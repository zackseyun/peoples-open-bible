base_translation:
  language: en
  yaml_path: translation/ot/joshua/021/044.yaml
  text: And Yahweh gave them rest all around[a], according to all that he had sworn to their fathers. Not one man from all their enemies stood before them[b]; Yahweh gave all their enemies into their hand.
  footnotes:
  - marker: a
    text: Or 'No one could stand before them.' The Hebrew idiom 'stand before' means to withstand successfully.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' a common idiom for giving someone over to another's power.
    reason: lexical_alternative
