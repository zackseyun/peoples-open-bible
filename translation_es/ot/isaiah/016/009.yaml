translation:
  language: es
  text: Por tanto, yo lloro con el llanto de Jazer por la vid de Sibmá; te empapo[a] con mis lágrimas, Hesbón y Elealé[b], porque sobre tu fruto de verano y sobre tu cosecha ha caído el grito de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te riego con mis lágrimas». El verbo transmite la idea de saturar o empapar.'
    reason: lexical_alternative
  - marker: b
    text: «El grito de guerra» refleja un matiz posible de הֵידָד en este contexto; también podría aludir, por implicación, al grito alegre de la vendimia que ha cesado.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶבְכֶּה
  english_pob_choice: I weep
  chosen_spanish: yo lloro
  alternatives_spanish:
  - yo lloraré
  - déjame llorar
  lexicon: HALOT
  rationale: El imperfecto en este lamento puede expresar acción actual o futura. En español, «yo lloro» comunica con naturalidad el tono de duelo continuo sin forzar un futuro ni una petición modal.
- source_word: בִּבְכִי יַעְזֵר
  english_pob_choice: with the weeping of Jazer
  chosen_spanish: con el llanto de Jazer
  alternatives_spanish:
  - por el llanto de Jazer
  - como llora Jazer
  lexicon: HALOT
  rationale: La preposición ב con בְּכִי permite un valor asociativo/instrumental. «Con el llanto de Jazer» conserva la construcción y el paralelismo con el dolor compartido.
- source_word: גֶּפֶן שִׂבְמָה
  english_pob_choice: the vine of Sibmah
  chosen_spanish: la vid de Sibmá
  alternatives_spanish:
  - la viña de Sibmá
  - la vid de Sibmah
  lexicon: HALOT
  rationale: גפן es «vid» en singular; en poesía puede tener valor colectivo, pero «vid» preserva la imagen básica sin ampliar indebidamente a «viña». Se translitera el topónimo conforme a la política del proyecto.
- source_word: אֲרַיָּוֶךְ
  english_pob_choice: I drench you
  chosen_spanish: te empapo
  alternatives_spanish:
  - te riego
  - te saturo
  - te empapo con
  lexicon: HALOT
  rationale: El Piel de רוה transmite la idea de saturar o empapar. «Te empapo» suena natural en español y mantiene la metáfora de inundación por lágrimas.
- source_word: דִּמְעָתִי
  english_pob_choice: with my tears
  chosen_spanish: con mis lágrimas
  alternatives_spanish:
  - con mi llanto
  - con mis lágrimas
  lexicon: HALOT
  rationale: El sustantivo es singular en hebreo pero funciona como medio de riego metafórico. En español, el plural «lágrimas» es la formulación idiomática más clara.
- source_word: חֶשְׁבּוֹן וְאֶלְעָלֵה
  english_pob_choice: Heshbon and Elealeh
  chosen_spanish: Hesbón y Elealé
  alternatives_spanish:
  - Heshbón y Elealé
  - Hesbón y Eleale
  lexicon: HALOT
  rationale: Son nombres propios de lugares; se transliteran con adaptación gráfica española para legibilidad, manteniendo identificables los topónimos.
- source_word: קֵיץ
  english_pob_choice: summer fruit
  chosen_spanish: fruto de verano
  alternatives_spanish:
  - fruta de verano
  - fruto estival
  - producción de verano
  lexicon: HALOT
  rationale: קיץ designa el producto del verano. «Fruto de verano» conserva la referencia agrícola y evita especificar más de lo que el hebreo dice.
- source_word: קָצִיר
  english_pob_choice: harvest
  chosen_spanish: cosecha
  alternatives_spanish:
  - siega
  - recolección
  lexicon: HALOT
  rationale: «Cosecha» es el equivalente español más natural del término agrícola y mantiene el paralelo con «fruto de verano».
- source_word: הֵידָד
  english_pob_choice: the battle shout
  chosen_spanish: el grito de guerra
  alternatives_spanish:
  - el grito
  - el grito de batalla
  - el alarido
  lexicon: HALOT
  rationale: La revisión inglesa favorece un matiz bélico para הֵידָד en este contexto de devastación. «Grito de guerra» preserva ese valor sin perder la ambigüedad de un clamor que irrumpe sobre la cosecha.
- source_word: נָפָל
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - ha descendido
  - ha caído sobre
  lexicon: HALOT
  rationale: El verbo significa literalmente «caer». En español, «ha caído» mantiene la imagen de un clamor que irrumpe o se abate sobre la cosecha, sin resolver en exceso la interpretación.
theological_decisions:
- issue: Sentido de הֵידָד al final del versículo
  english_pob_reading: The battle shout has fallen.
  chosen_spanish_reading: ha caído el grito de guerra.
  alternative_spanish_readings:
  - ha cesado el grito de la vendimia
  - ha caído el grito de la vendimia
  - ha caído el clamor
  rationale: El hebreo permite la ambigüedad entre un grito hostil que irrumpe y un grito gozoso de cosecha que desaparece. La redacción principal conserva el matiz bélico de la revisión inglesa, pero sin eliminar la posibilidad de que el término siga evocando un clamor general.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa sin resolverla indebidamente.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente, que prefirió «battle shout» para הֵידָד, pero conserva en nota la tensión interpretativa heredada del audit trail: clamor hostil que cae sobre la cosecha, o eco de un grito de vendimia interrumpido. También se mantiene la imagen de riego/saturación con mis lágrimas, siguiendo la decisión léxica documentada para אֲרַיָּוֶךְ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo explícitamente lo exige; este versículo no contiene el nombre divino.
  - 'Se transliteran los topónimos con grafía española estable: Jazer, Sibmá, Hesbón, Elealé.'
  - Se mantiene «vid» en singular para גֶּפֶן, conforme a la imagen poética del hebreo.
  - «Grito de guerra» se eligió como equivalente funcional de la revisión inglesa «battle shout», sin borrar la ambigüedad poética del término.
