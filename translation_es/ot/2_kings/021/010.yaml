translation:
  language: es
  text: Yahvé habló por medio de sus siervos, los profetas[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de», un giro idiomático que significa «por medio de» o «mediante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El piel de דבר expresa ‘hablar’. En español, ‘habló’ conserva el valor narrativo y el movimiento verbal directo mejor que ‘dijo’, que sería posible pero menos cercano al verbo hebreo aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio del pacto en español como ‘Yahvé’, conforme al criterio del proyecto para יהוה. Esto evita la sustitución por un título y mantiene la referencia al nombre divino revelado.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y denota agencia/instrumentalidad. En español, ‘por medio de’ comunica bien la mediación sin una calca dura; ‘por la mano de’ conservaría más la textura, pero suena menos natural.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  lexicon: HALOT
  rationale: Aunque el lexema puede significar ‘esclavo’, aquí el contexto profético destaca servicio comisionado. ‘Siervos’ es la opción más natural y fiel al uso teológico habitual en este contexto, sin forzar la saliencia de esclavitud.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: 'Traducción directa del plural definido. La aposición precisa cuáles siervos son: los profetas.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La construcción infinitiva que introduce discurso directo se vierte naturalmente como ‘diciendo’, manteniendo la transición formal hacia la palabra divina siguiente.
theological_decisions:
- issue: Nombre divino YHWH/יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrama directamente. Se conserva el nombre propio en español como ‘Yahvé’ para reflejar el texto base y la decisión doctrinal del proyecto, en vez de reemplazarlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el testimonio de auditoría muestra alta concordancia entre el inglés POB y la evaluación posterior, así que esta versión española sigue de cerca el sentido y las decisiones léxicas ya aprobadas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de manera consistente para יהוה, conforme al criterio del proyecto.
  - ‘Siervos’ se usa aquí en sentido de servicio comisionado; no se introduce ‘esclavos’ porque el contexto profético no lo exige.
  - La nota[a] se ancla en la frase ‘por medio de’ para preservar la alternativa idiomática del hebreo ‘por la mano de’.
