base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/015.yaml
  text: But he rebelled against him by sending his messengers to Egypt[a], that they might give him horses and many people. Will he prosper? Will he escape[b], who does these things? Can he break a covenant and yet escape?
  footnotes:
