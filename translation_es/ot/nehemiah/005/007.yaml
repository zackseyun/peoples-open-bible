base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/005/007.yaml
  text: Then I took counsel with myself[a], and I brought charges against the nobles and the officials, and I said to them, “You are exacting interest[c][b], each from his brother.” And I assembled a great assembly against them.
  footnotes:
  - marker: a
    text: Or “I contended with the nobles and the officials.” The Hebrew verb can carry either a legal-accusatory nuance (“brought charges”) or a more general sense of contention.
    reason: lexical_alternative
  - marker: b
    text: Or “You are charging interest, each from his fellow.” Literally, “a man against his brother you are exacting [it],” preserving the kinship language of fellow Israelites.
    reason: lexical_alternative
  - marker: c
    text: Or “I called a great assembly against them.” The Hebrew literally says, “I set/gave against them a great assembly,” an idiom for convening public opposition.
    reason: lexical_alternative
