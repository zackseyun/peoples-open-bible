  text: וְ/אֵת֩ יֶ֨תֶר הָ/עָ֜ם הַ/נִּשְׁאָרִ֣ים בָּ/עִ֗יר וְ/אֶת הַ/נֹּֽפְלִים֙ אֲשֶׁ֣ר נָפְל֣וּ עָלָ֔י/ו וְ/אֵ֛ת יֶ֥תֶר הָ/עָ֖ם הַ/נִּשְׁאָרִ֑ים הֶגְלָ֛ה נְבֽוּזַר אֲדָ֥ן רַב טַבָּחִ֖ים בָּבֶֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/039/009.yaml
  text: As for the rest of the people who remained in the city[a], and the deserters who had gone over to him, together with the rest of the people who remained, Nebuzaradan, the captain of the guard[c][b], carried away to Babylon.
  footnotes:
  - marker: a
    text: Or 'those who had defected to him.' The Hebrew idiom literally says 'those who had fallen to him,' a military expression for going over to the opposing side.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'the rest of the people who remained.' The repetition has been preserved rather than smoothed out.
    reason: lexical_alternative
  - marker: c
    text: '''Captain of the guard'' renders a title literally related to ''chief of the slaughterers,'' an official Babylonian royal/military post.'
    reason: cultural_note
