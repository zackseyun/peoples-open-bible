    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que preserve la alternativa léxica documentada («mundo» / «tierra»). Se mejora la frase final a «aliento impetuoso» para reflejar mejor la fuerza de נִשְׁמַת רוּחַ sin redundancia antinatural en español, manteniendo la imagen antropomórfica de «tus narices». También se ajusta la nota [c] para conservar la ambigüedad «viento/espíritu» presente en la auditoría inglesa. Se deja intacto el resto del verso porque es fiel al hebreo y legible en español.
