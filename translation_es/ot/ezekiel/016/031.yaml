base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/031.yaml
  text: When you built your mound at the head of every road and made your high place in every square[a], you were not like a prostitute[c][b], in that you scorned payment.
  footnotes:
  - marker: a
    text: Or 'your vaulted chamber' or 'your shrine-platform'; the Hebrew term refers to a raised structure associated with the chapter's prostitution imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'at every street corner.' Literally, 'at the head of every road.'
    reason: lexical_alternative
  - marker: c
    text: That is, unlike an ordinary prostitute, Jerusalem did not act for pay; the following verses explain that she gave gifts instead of receiving them.
    reason: cross_reference
