    issue: «una vez fueron» es una formulación poco natural en español narrativo
    rationale: Aunque intenta reflejar «once went», en español bíblico y general suena extraña. «Cierta vez» o «una vez» colocado como marco narrativo antes del sujeto funciona mejor para una fábula/parábola.
  - severity: medium
    issue: «ungir un rey sobre sí mismos» es un calco torpe
    rationale: El hebreo expresa que buscaban un rey que reinara sobre ellos. En español, la combinación con «ungir» pide una reformulación más idiomática, como «ungir un rey para que reinara sobre ellos».
  - severity: low
    issue: La nota al pie conserva una alternativa demasiado literal
    rationale: «sobre sí mismos» en la nota alternativa comparte el mismo problema de naturalidad que el texto principal; conviene ajustar la alternativa española sin perder la explicación del hebreo intensivo.
