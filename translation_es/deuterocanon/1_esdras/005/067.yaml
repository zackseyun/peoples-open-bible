    rationale: Las instrucciones exigen que cada nota aparezca exactamente en la palabra o frase relevante, con formato [a], [b]. En el borrador, ambas notas aparecen al final de la cita, lo que debilita la correspondencia semántica.
  - severity: low
    issue: La puntuación con notas al final de la cita resulta menos natural.
    rationale: En español bíblico moderno, al insertar notas en palabras concretas, la frase fluye mejor si los marcadores van junto a «Jesúa» y «casa», dejando el punto de cierre fuera de las comillas según el estilo de la edición.
