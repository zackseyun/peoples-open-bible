base_translation:
  language: en
  yaml_path: translation/ot/numbers/027/020.yaml
  text: And you shall put some of your splendor on him[c][b][a], so that all the congregation of the sons of Israel may obey.
  footnotes:
  - marker: a
    text: Or 'some of your majesty' or 'some of your honor.' The Hebrew word can denote splendor or dignity as well as the authority attached to office.
    reason: lexical_alternative
  - marker: b
    text: Or 'may listen' or 'may hear.' The Hebrew verb often carries the sense of hearing with obedience.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
