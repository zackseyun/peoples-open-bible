    rationale: La nota inglesa «Or “Thus you shall speak.”» comenta la cláusula וְכֹה תְדַבֵּר, no el sustantivo דָּבָר. Dejarla en «palabra» induce una asociación léxica errónea.
  - severity: low
    issue: La redacción de la nota alternativa puede ajustarse para reflejar con mayor precisión la alternativa del inglés auditado.
    rationale: «O “de este modo hablarás”» es válida, pero debe estar anclada al segmento final. Así se preserva correctamente la decisión léxica sobre כֹה.
  revised_spanish_text: 'Entonces Yahvé puso una palabra en la boca de Balaam y dijo: «Vuelve a Balac, y así[a] hablarás».'
  revised_footnotes:
  - marker: a
    text: O «de este modo hablarás».
