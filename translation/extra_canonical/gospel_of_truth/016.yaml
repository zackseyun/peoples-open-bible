technical_vocabulary_note: 'Key Valentinian terms are retained with capitalization
  where conceptually loaded: ‘Fullness’ for Pleroma, ‘All’ for the cosmic totality,
  ‘Deficiency’ as the soteriological opposite of Fullness, and ‘Logos’ as a technical
  Christological-philosophical title. ‘Place of Rest’ is kept as a set phrase to reflect
  the eschatological locus of repose in the treatise. Where the Coptic preserves a
  Greek loan with doctrinal freight (e.g., ⲭⲣⲏⲥⲧⲟⲥ), we render in a way that signals
  the likely pun (Good/Christ) without erasing the titular sense (‘Messiah’).'
