    rationale: El hebreo לְהָקֵל מֵעֲלֵיהֶם expresa quitar peso/carga. En español, «para aligerar la nave» o «para aligerarla» sin el segundo «para ellos» comunica mejor el sentido sin torpeza estilística.
  - severity: low
    issue: «se recostó» es menos directo que «se acostó» para וַיִּשְׁכַּב.
    rationale: No es infiel, pero שכב suele expresarse más naturalmente aquí como «se acostó» antes de quedarse profundamente dormido.
