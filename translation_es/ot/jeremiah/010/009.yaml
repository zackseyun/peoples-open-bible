revisions:
- from: Plata martillada se trae de Tarsis[a], y oro de Ufaz, obra de artífice y de manos de orfebre. Azul y púrpura son su vestidura; todos ellos son obra de hábiles hombres.
  to: Plata martillada se trae de Tarsis, y oro de Ufaz[a], obra de artífice y de manos de orfebre. Azul y púrpura son su vestidura; todos ellos son obra de hombres expertos.
  rationale: 'Se requiere una reparación menor: mover la nota textual para que quede anclada en ‘Ufaz’, que es el término al que realmente se refiere la variante, y pulir ‘hábiles hombres’ a ‘hombres expertos’ para mejorar la naturalidad del español manteniendo el masculino del hebreo y el contexto artesanal.'
