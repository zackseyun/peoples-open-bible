review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: πρὶν ἀρρωστῆσαί σε = «Antes de enfermarte», ταπεινώθητι = «humíllate», y δεῖξον ἐπιστροφήν en contexto de ἁμαρτημάτων se transmite correctamente como «muestra arrepentimiento». Sin embargo, «en el tiempo de los pecados» suena poco natural en español y puede oscurecer el valor temporal-exhortativo de ἐν καιρῷ ἁμαρτημάτων; conviene una formulación más idiomática que preserve «cuando haya pecados / en tiempo de pecado» sin perder el plural contextual.'
  spanish_quality_summary: 'El español es claro y digno en general, pero tiene dos detalles mejorables: la coma antes de «y» no es necesaria en español normal, y «en el tiempo de los pecados» resulta rígido y poco idiomático. La nota al pie conserva bien la alternativa léxica, aunque «vuelta atrás» puede sonar algo torpe; aun así, es aceptable si se suaviza a «un volverse atrás».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Arrepentimiento» para ἐπιστροφήν está bien justificado por el contexto de «pecados». «Humíllate» respeta la decisión reflexiva documentada para ταπεινώθητι. No se implican términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: «en el tiempo de los pecados» es poco natural en español
    rationale: Aunque calca de cerca el inglés auditado, en español suena forzado y puede dificultar la comprensión. Una forma como «cuando haya pecados» mantiene la fuerza temporal y el vínculo con el plural ἁμαρτημάτων de manera más idiomática.
  - severity: low
    issue: Coma innecesaria antes de «y»
    rationale: La puntuación española normalmente no lleva coma antes de una coordinación simple; quitarla mejora la fluidez sin afectar el sentido.
  - severity: low
    issue: La alternativa de nota «vuelta atrás» suena algo rígida
    rationale: Para ἐπιστροφή, una nota como «un volverse atrás» expresa mejor en español el matiz de giro/retorno moral que el calco nominal «vuelta atrás».
  revised_spanish_text: Antes de enfermarte, humíllate y, cuando haya pecados, muestra arrepentimiento[a].
  revised_footnotes:
  - marker: a
    text: O «muestra un volverse atrás» / «muestra tu regreso». El griego ἐπιστροφή puede denotar un giro o regreso; aquí se traduce «arrepentimiento» por la referencia inmediata a los pecados.
    reason: lexical_alternative
