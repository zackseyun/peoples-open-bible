review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y la personificación del hebreo: los montes reaccionan, pasa un torrente de aguas, y el abismo/profundidad alza su voz y sus manos. Sin embargo, en Hab 3:10 el inglés POB decidió intensificar עָבָר con ''swept by'', y el español ''pasó'' atenúa demasiado esa fuerza imagética. También conviene alinear mejor la nota b con la razón documentada. El resto del sentido fuente está sustancialmente bien preservado.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad e imágenes poéticas comprensibles. 'Los montes te vieron y se estremecieron' funciona bien. 'El abismo dio su voz' es inteligible, aunque 'la profundidad' o 'las profundidades' serían alternativas más cercanas al registro bíblico sin la posible carga infernal de 'abismo'; aun así, no es un error grave aquí. La mejora principal es hacer más vívida la cláusula del torrente.
  glossary_alignment: No hay conflictos con la terminología global principal. No aparecen Yahvé, Mesías, etc. La personificación cósmica documentada por el POB se conserva correctamente. La decisión 'abismo' para תְּהוֹם es aceptable, aunque 'la profundidad' / 'las profundidades' podría evitar asociaciones no deseadas; no exige adjudicación externa.
  issues:
  - severity: medium
    issue: '''pasó'' debilita la fuerza de עָבָר con sujeto ''un torrente de aguas'''
    rationale: El hebreo básico significa 'pasó', pero el English POB documentó 'swept by' para sacar a la luz la fuerza de la imagen del torrente. En español, 'pasó' resulta demasiado neutro; 'pasó arrasando' sería excesivo, pero 'pasó impetuoso' o 'se precipitó' también interpretan más. 'barrió al pasar' sería demasiado libre. Una solución sobria y fiel es 'pasó de largo' como alternativa en nota, mientras el texto principal puede decir 'pasó' solo si se acepta la atenuación; mejor aún, 'pasó torrencialmente' suena menos natural. La mejor reparación mínima es 'un torrente de aguas pasó de largo[b]' si se prioriza fuerza dinámica idiomática en español, aunque añade un matiz espacial.
  - severity: low
    issue: La nota b no refleja bien la decisión auditada del POB
    rationale: La nota inglesa preserva 'passed by' como alternativa al texto principal más vívido. La nota española actual invierte el peso, defendiendo 'pasó' como más básico. Debe reformularse para que la alternativa sea el sentido más neutro y el texto principal exprese mejor la escena.
  revised_spanish_text: Los montes te vieron y se estremecieron[a]; un torrente de aguas pasó de largo[b]. El abismo dio su voz; levantó en alto sus manos[c].
