translation:
  language: es
  text: Y después de cortar la lengua del impío Nicanor, dijo que la arrojaría pieza por pieza a las aves, y colgaría la retribución[a] de su insensatez frente al templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la retribución debida por su insensatez». La expresión griega τὰ ἐπίχειρα puede designar recompensa o lo que uno recibe a cambio de sus obras.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσαν
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - idioma
  - habla
  lexicon: LSJ
  rationale: El acto físico de cortar exige el sentido corporal de γλῶσσα; en español, «lengua» conserva ese valor literal y evita una abstracción como «idioma» o «habla».
- source_word: δυσσεβοῦς
  english_pob_choice: ungodly
  chosen_spanish: impío
  alternatives_spanish:
  - inícuo
  - irreverente
  - profano
  lexicon: LSJ
  rationale: El adjetivo marca irreverencia contra Dios. «Impío» mantiene el peso religioso y es natural en español bíblico actual.
- source_word: ἐκτεμών
  english_pob_choice: after cutting out
  chosen_spanish: después de cortar
  alternatives_spanish:
  - habiendo cortado
  - tras cortar
  lexicon: LSJ
  rationale: El participio antecede a la acción principal; «después de cortar» expresa bien la secuencia sin sonar forzado en español.
- source_word: ἔφη
  english_pob_choice: he said he would
  chosen_spanish: dijo que la arrojaría
  alternatives_spanish:
  - dijo que
  - declaró que arrojaría
  lexicon: LSJ
  rationale: El griego introduce la intención expresada; en español, la forma natural es «dijo que la arrojaría», que conserva el valor prospectivo.
- source_word: μετὰ μέρος
  english_pob_choice: piece by piece
  chosen_spanish: pieza por pieza
  alternatives_spanish:
  - pedazo por pedazo
  - uno a uno
  lexicon: LSJ
  rationale: La expresión indica distribución en porciones; «pieza por pieza» es fiel y clara, y encaja con el contexto de arrojarla a las aves.
- source_word: τοῖς ὄρνεσιν
  english_pob_choice: to the birds
  chosen_spanish: a las aves
  alternatives_spanish:
  - a los pájaros
  - para las aves
  lexicon: LSJ
  rationale: «Ὄρνεσιν» designa aves en general; «aves» es más amplio y sobrio que «pájaros», y preserva el tono elevado del pasaje.
- source_word: τὰ ἐπίχειρα
  english_pob_choice: the reward
  chosen_spanish: el premio
  alternatives_spanish:
  - la recompensa
  - el pago
  - la retribución
  lexicon: LSJ
  rationale: La expresión puede significar recompensa o lo que uno recibe por sus actos. Dado el contexto punitivo, «premio» conserva la idea de contraprestación recibida; en español puede sonar irónico, manteniendo la tensión del original sin neutralizarla.
- source_word: τῆς ἀνοίας
  english_pob_choice: of his folly
  chosen_spanish: de su insensatez
  alternatives_spanish:
  - de su necedad
  - de su locura
  - de su torpeza
  lexicon: LSJ
  rationale: Ἀνοία expresa falta de juicio, necedad o insensatez. «Insensatez» suena natural, serio y mantiene la carga moral del término.
- source_word: κατέναντι τοῦ ναοῦ
  english_pob_choice: opposite the temple
  chosen_spanish: frente al templo
  alternatives_spanish:
  - opuesto al templo
  - delante del templo
  - enfrente del templo
  lexicon: LSJ
  rationale: Κατέναντι suele significar «frente a» u «opuesto a». «Frente al templo» es idiomático en español y conserva la visibilidad pública del acto.
- source_word: κρεμιάσαι
  english_pob_choice: hang up
  chosen_spanish: colgaría
  alternatives_spanish:
  - suspendería
  - colgar
  - exhibiría colgado
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa la intención de exhibir públicamente. «Colgaría» es la forma más directa y natural en español.
theological_decisions:
- issue: Caracterización religiosa de Nicanor mediante δυσσεβοῦς
  english_pob_reading: ungodly
  chosen_spanish_reading: impío
  alternative_spanish_readings:
  - profano
  - irreverente
  rationale: 'No se trata solo de un insulto moral, sino de una calificación teológica: Nicanor actúa sin reverencia hacia Dios. «Impío» preserva esa dimensión religiosa en un registro claro y bíblico.'
  doctrine_reference: 'Translation philosophy: readable modern Spanish, not archaic or artificially solemn.'
- issue: Valor de τὰ ἐπίχειρα como retribución o recompensa
  english_pob_reading: the reward
  chosen_spanish_reading: el premio
  alternative_spanish_readings:
  - la recompensa
  - la retribución
  - el pago
  rationale: El griego permite entender la frase como recompensa debida por sus obras, con matiz punitivo en el contexto. «Premio» mantiene la idea de lo recibido por sus actos y deja visible la ironía del pasaje; no se neutraliza la tensión entre recompensa y castigo.
  doctrine_reference: Lexical ambiguity preserved where the source itself permits more than one nuance.
translation_notes:
  revision_awareness: La redacción española sigue el texto griego directamente y toma como contexto auditable la decisión inglesa más reciente de leer τὰ ἐπίχειρα como «reward». Se preserva esa ambigüedad recompensatoria en español con «premio», sin borrar el matiz punitivo que el contexto exige. También se mantienen la secuencia participial, el carácter corporal de «lengua» y la calificación teológica de Nicanor como «impío».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se prefiere «impío» para δυσσεβοῦς por su fuerza religiosa y su naturalidad en español bíblico.
  - «Aves» se eligió sobre «pájaros» por registro más digno y por cercanía al sentido general de ὄρνεσιν.
  - La puntuación refleja una sola oración larga, como en el original, con incisos coordinados.
