review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura comparativa y la imaginería agrícola del hebreo, y preserva adecuadamente el título compuesto אֲדֹנָי יְהוִה como «el Señor Yahvé». Sin embargo, hay dos desajustes importantes: (1) la nota [a] está anclada en «brote», pero el contenido de la nota trata sobre צְדָקָה, por lo que el anclaje es incorrecto; y (2) el texto principal usa «justicia» donde la pista auditada del POB prefiere como lectura principal «righteousness» con «justice» sólo como alternativa en nota. En español, «rectitud» reproduce mejor esa decisión principal sin perder inteligibilidad, dejando «justicia» como alternativa documentada.'
  spanish_quality_summary: El español es claro y digno, pero «hace salir su brote» suena algo menos natural que «produce su crecimiento» o «hace brotar su crecimiento». También conviene reubicar la nota al término correcto y suavizar «delante de» a «ante» para mayor fluidez bíblica contemporánea. La versión revisada mantiene la repetición retórica de «brotar» y mejora la naturalidad general.
  glossary_alignment: 'Se alinea bien con «Yahvé» para יהוה. El principal problema terminológico está en צְדָקָה: según la auditoría inglesa, la lectura base debe reflejar «righteousness», con «justice» como alternativa. En español, «rectitud» funciona mejor como equivalente principal en este contexto; «justicia» puede conservarse en nota. No hay otros conflictos significativos con el glosario del proyecto.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «brote», pero su contenido explica צְדָקָה.
    rationale: Esto rompe la correspondencia obligatoria entre anclaje y nota, y puede confundir al lector sobre qué término está siendo aclarado.
  - severity: medium
    issue: «justicia» aparece en el texto principal en lugar de una equivalencia principal de «righteousness».
    rationale: La auditoría del POB mantiene «righteousness» como lectura principal y «justice» como alternativa. En español, «rectitud» preserva mejor esa jerarquía semántica.
  - severity: low
    issue: «hace salir su brote» es comprensible pero poco idiomático.
    rationale: Aunque es formalmente cercano al hebreo, «produce su crecimiento» suena más natural y sigue siendo fiel a la imagen agrícola amplia de צִמְחָהּ.
  revised_spanish_text: Porque así como la tierra produce su crecimiento, y como un jardín hace brotar lo que en él fue sembrado, así el Señor Yahvé hará brotar rectitud[a] y alabanza ante todas las naciones.
  revised_footnotes:
