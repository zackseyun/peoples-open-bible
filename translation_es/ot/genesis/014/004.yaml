lexical_decisions:
- source_word: שְׁתֵּים עֶשְׂרֵה שָׁנָה
  english_pob_choice: for twelve years
  chosen_spanish: Por doce años
  alternatives_spanish:
  - Doce años
  lexicon: HALOT
  rationale: El hebreo expresa una duración temporal; en español, «Por doce años» comunica de manera natural ese lapso y conserva la relación con la cláusula siguiente.
- source_word: עָבְדוּ
  english_pob_choice: they had served
  chosen_spanish: les sirvieron
  alternatives_spanish:
  - estuvieron sujetos a
  - les habían servido
  lexicon: HALOT
  rationale: En este contexto político, עבד implica servicio o sujeción a un soberano. «Les sirvieron» mantiene la fuerza relacional del verbo sin introducir una formulación más interpretativa; el tiempo perfecto compuesto en español no es obligatorio porque la secuencia narrativa ya marca la anterioridad.
- source_word: אֶת כְּדָרְלָעֹמֶר
  english_pob_choice: Kedorlaomer
  chosen_spanish: Kedorlaomer
  alternatives_spanish:
  - Cedorlaomer
  - Chedorlaomer
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se conserva «Kedorlaomer» siguiendo la decisión auditada de transliteración directa desde la forma hebrea, con la alternativa tradicional en nota.
- source_word: וּשְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: but in the thirteenth year
  chosen_spanish: pero en el año trece
  alternatives_spanish:
  - y en el año trece
  - pero al año trece
  lexicon: HALOT
  rationale: La idea es un contraste temporal después de doce años de servicio. «Pero en el año trece» suena natural en español y preserva el giro narrativo del hebreo.
- source_word: מָרָדוּ
  english_pob_choice: they rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - se sublevaron
  - se revoltaron
  lexicon: HALOT
  rationale: מָרַד significa rebelarse o sublevarse. «Se rebelaron» es la forma más directa e idiomática en español y conserva el sentido político-militar del texto.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo y el audit trail inglés: duración inicial, servicio a un soberano, nombre propio transliterado y contraste temporal final. No se introdujeron cambios textuales ni revisiones relevantes respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se prefirió «Por doce años» para reflejar el valor durativo del hebreo sin sonar mecánico.
  - «Les sirvieron» conserva el matiz de sujeción/vasallaje implícito en el contexto.
  - Se mantuvo la transliteración «Kedorlaomer» por consistencia con la decisión auditada del inglés POB.
  - «Año trece» reproduce el giro temporal sin forzar una perífrasis más pesada.
