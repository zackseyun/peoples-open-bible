translation:
  language: es
  text: Si hubiéramos olvidado el nombre de nuestro Dios y hubiéramos extendido nuestras manos a un dios extranjero[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un dios extraño». El adjetivo hebreo puede significar «extranjero», «extraño» o «ajeno», en el sentido de una deidad que no pertenece al culto del pacto de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Supongamos que
  lexicon: HALOT
  rationale: La partícula condicional introduce una hipótesis o protesta retórica; «Si» expresa con naturalidad esa estructura en español sin añadir matices no presentes en el hebreo.
- source_word: שָׁכַחְנוּ
  english_pob_choice: we had forgotten
  chosen_spanish: hubiéramos olvidado
  alternatives_spanish:
  - olvidamos
  - hemos olvidado
  lexicon: HALOT
  rationale: 'El perfecto hebreo en este contexto condicional retrospectivo se corresponde bien con el pluscuamperfecto de subjuntivo español: una situación hipotética ya concluida.'
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: «Nombre» conserva el valor idiomático hebreo de identidad, reputación y presencia invocada de Dios, sin explicarlo en exceso.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de nuestro Dios
  - de Dios nuestro
  lexicon: HALOT
  rationale: Se mantiene el posesivo explícito en una construcción natural en español. «Dios» es la elección estándar para אֱלֹהִים en este contexto.
- source_word: וַנִּפְרֹשׂ כַּפֵּינוּ
  english_pob_choice: and spread out our hands
  chosen_spanish: y extendido nuestras manos
  alternatives_spanish:
  - y abierto nuestras manos
  - y alzado nuestras manos
  lexicon: HALOT
  rationale: «Extender las manos» preserva el gesto corporal del hebreo con fluidez en español y evita suavizarlo con una paráfrasis más interpretativa.
- source_word: לְאֵל זָר
  english_pob_choice: to a foreign god
  chosen_spanish: a un dios extranjero
  alternatives_spanish:
  - a un dios extraño
  - a un dios ajeno
  lexicon: HALOT
  rationale: «Extranjero» transmite con claridad la idea de una deidad no perteneciente al culto del pacto. Se evita «extraño» como única opción porque en español puede sonar meramente raro, aunque sigue siendo una alternativa válida del campo semántico.
theological_decisions:
- issue: Cómo reflejar el objeto idólatra sin neutralizar la fuerza del hebreo
  english_pob_reading: spread out our hands to a foreign god
  chosen_spanish_reading: extendido nuestras manos a un dios extranjero
  alternative_spanish_readings:
  - levantado nuestras manos a un dios extranjero
  - extendido nuestras palmas a un dios extranjero
  rationale: El hebreo conserva el gesto concreto y deja explícito el destino idolátrico. La versión española mantiene esa tensión sin convertirlo prematuramente en una paráfrasis doctrinal como «adorar» o «orar a».
  doctrine_reference: Preservar la tensión textual y la concreción del gesto ritual
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió revisiones posteriores; la versión española sigue la misma decisión lexical y teológica principal: mantener la hipótesis condicional, el gesto corporal y la referencia a una deidad ajena con una alternativa léxica anotada.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en sentido singular y posesivo.
  - Se mantiene «nombre» como calco idiomático fiel, no como simple etiqueta.
  - La alternancia entre «extranjero» y «extraño» queda documentada en nota para reflejar la amplitud semántica del hebreo.
  - El orden de las cláusulas sigue el hebreo y el inglés auditado, pero con sintaxis española natural.
