translation:
  language: es
  text: 'Y dijo Dios: «Que las aguas pululen de seres vivientes[a], y que las aves[b] vuelen sobre la tierra, sobre la superficie de la expansión[c] de los cielos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que las aguas enjambren de seres vivientes». El hebreo usa un verbo y un sustantivo emparentados («pululen de pululación / enjambre»), enfatizando la abundancia de vida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «criaturas voladoras» en lugar de «aves». El hebreo עוֹף puede ser más amplio que solamente aves.'
    reason: lexical_alternative
  - marker: c
    text: «Expansión» también puede traducirse «firmamento» o «bóveda».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And God said
  chosen_spanish: Y dijo Dios
  alternatives_spanish:
  - Entonces dijo Dios
  - Así dijo Dios
  lexicon: HALOT
  rationale: El waw consecutivo introduce narración secuencial; «Y dijo Dios» conserva ese avance sin añadir matiz causal o inferencial que el hebreo no exige.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto creador singular, «Dios» es la equivalencia natural y fiel, manteniendo el referente único del texto hebreo.
- source_word: יִשְׁרְצוּ
  english_pob_choice: Let ... swarm
  chosen_spanish: Que ... se llenen de enjambres
  alternatives_spanish:
  - Que ... pululen
  - Que ... hormigueen
  - Que ... pululen de vida
  lexicon: HALOT
  rationale: El verbo expresa abundancia de movimiento viviente. En español, «se llenen de enjambres» intenta conservar la fuerza intensiva del verbo y su vínculo con el sustantivo siguiente, sin sonar forzado como un calco directo.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: La forma plural hebrea se refleja mejor con «las aguas», que además es el uso normal en el relato de la creación.
- source_word: שֶׁרֶץ
  english_pob_choice: swarms
  chosen_spanish: enjambres
  alternatives_spanish:
  - swarms
  - teemores
  lexicon: HALOT
  rationale: El sustantivo cognado con el verbo anterior intensifica la imagen de proliferación. «Enjambres» conserva la idea de multiplicidad abundante y ayuda a preservar el juego verbal del hebreo.
- source_word: נֶפֶשׁ חַיָּה
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - seres vivos
  - criaturas vivientes
  - almas vivientes
  lexicon: HALOT
  rationale: La expresión denota vida animada, no una afirmación técnica sobre el alma. «Seres vivientes» comunica esa realidad de forma clara y digna en español, sin cargar el texto con una terminología doctrinal posterior.
- source_word: וְעוֹף
  english_pob_choice: and let birds
  chosen_spanish: y que las aves
  alternatives_spanish:
  - y que los pájaros
  - y que las criaturas voladoras
  lexicon: HALOT
  rationale: Aunque el término puede ser más amplio que «aves», en este contexto la referencia natural y más idiomática en español es «aves», manteniendo el registro elevado del capítulo.
- source_word: יְעוֹפֵף
  english_pob_choice: fly
  chosen_spanish: vuelen
  alternatives_spanish:
  - vuelen alrededor
  - aleteen
  lexicon: HALOT
  rationale: El verbo describe el movimiento de volar; «vuelen» es la forma más directa y natural para expresar la jussiva del hebreo en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: above the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - encima de la tierra
  - por encima de la tierra
  lexicon: HALOT
  rationale: Con verbos de vuelo, la preposición indica posición sobre la superficie terrestre. «Sobre la tierra» es claro y fiel, sin sugerir contacto con el suelo.
- source_word: עַל פְּנֵי
  english_pob_choice: across the face of
  chosen_spanish: sobre la superficie de
  alternatives_spanish:
  - sobre la faz de
  - a través de la superficie de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta; «sobre la superficie de» conserva la imagen espacial de manera natural en español. Se evita «faz» por sonar más arcaico.
- source_word: רְקִיעַ
  english_pob_choice: expanse
  chosen_spanish: la expansión
  alternatives_spanish:
  - el firmamento
  - la bóveda
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de evitar «firmamento», «expansión» mantiene la amplitud espacial del término y es comprensible en español contemporáneo.
- source_word: הַשָּׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - de los cielos
  - del cielo
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «los cielos», que mantiene el registro elevado y la forma del original mejor que «el cielo».
theological_decisions:
- issue: נֶפֶשׁ חַיָּה en el contexto de la creación
  english_pob_reading: living creatures
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - seres vivos
  - criaturas vivientes
  - almas vivientes
  rationale: El hebreo describe vida animada en los seres creados, no una doctrina antropológica especializada. «Seres vivientes» evita importar un sentido técnico de «alma» que el contexto no exige.
  doctrine_reference: Translation philosophy §3, §6
- issue: רְקִיעַ y su trasfondo cosmológico
  english_pob_reading: expanse
  chosen_spanish_reading: la expansión
  alternative_spanish_readings:
  - el firmamento
  - la bóveda
  rationale: El término es importante cosmológicamente, pero el verso no obliga a una modelización interpretativa. «La expansión» conserva la imagen sin fijar indebidamente una lectura cosmológica particular.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del expediente inglés y conserva sus decisiones clave: el paralelismo intensivo de יִשְׁרְצוּ / שֶׁרֶץ, la amplitud de עוֹף, y la opción de «expanse» para רְקִיעַ. No se registran revisiones sustantivas adicionales en el pasaje base, por lo que el borrador español adopta una equivalencia óptima estable y auditable.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en contexto singular creador.
  - Se traduce נֶפֶשׁ חַיָּה de forma no técnica como «seres vivientes», evitando «almas vivientes».
  - Se conserva el plural hebreo de הַמַּיִם y הַשָּׁמָיִם con «las aguas» y «los cielos».
  - Se evita «SEÑOR» porque el texto fuente es אֱלֹהִים, no el Tetragrámaton.
  - La secuencia verbal en español preserva la narración lineal del hebreo sin añadir causalidad.
