base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/039/013.yaml
  text: Nebuzaradan the captain of the guard[a], Nebushazban the chief officer, Nergal-sharezer the chief magus[c][b], and all the chief officials of the king of Babylon sent word.
  footnotes:
  - marker: a
    text: Or simply, 'sent.' The Hebrew verb is elliptical here, and the following verse continues the action they initiated.
    reason: lexical_alternative
  - marker: b
    text: '''Chief officer'' translates a title that can also be rendered ''chief eunuch'' or ''chief court official.'''
    reason: lexical_alternative
  - marker: c
    text: '''Chief magus'' renders a Babylonian court title; traditionally some English versions leave it untranslated as ''Rab-mag.'''
    reason: lexical_alternative
