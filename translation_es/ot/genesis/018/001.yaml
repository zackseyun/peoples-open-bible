translation:
  language: es
  text: Yahvé se apareció[a] a él, junto a las encinas de Mamre, mientras estaba sentado a la entrada de la tienda, en el calor del día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a los terebintos de Mamre». El término hebreo puede referirse a árboles grandes como encinas o terebintos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - fue visto
  - se reveló
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa una manifestación visible. «Se apareció» reproduce bien ese sentido narrativo y conserva la concreción del hebreo; «se reveló» sería posible, pero desplaza el énfasis hacia la interpretación.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  - a Abraham
  lexicon: HALOT
  rationale: La forma pronominal de tercera masculina singular se refiere a Abraham en el contexto. «A él» es la reproducción directa y mantiene la referencia sin añadir el nombre propio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para preservar el nombre personal de Dios en lugar de sustituirlo por un título.
- source_word: בְּאֵלֹנֵי
  english_pob_choice: by the oaks of
  chosen_spanish: junto a los encinares de
  alternatives_spanish:
  - junto a los robles de
  - junto a los terebintos de
  lexicon: HALOT
  rationale: אֵלֹנֵי puede referirse a árboles grandes como encinas o terebintos. «Encinares» comunica en español una agrupación de árboles y evita forzar una especie exacta que el hebreo no determina con total certeza.
- source_word: מַמְרֵא
  english_pob_choice: Mamre
  chosen_spanish: Mamre
  alternatives_spanish:
  - Mamré
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estable. Se conserva «Mamre» como forma clara y reconocible en español bíblico.
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: while he was sitting
  chosen_spanish: mientras estaba sentado
  alternatives_spanish:
  - y estaba sentado
  - cuando estaba sentado
  lexicon: HALOT
  rationale: La construcción aporta circunstancia concomitante. «Mientras estaba sentado» transmite el valor de estado en curso y el trasfondo de la escena de manera natural en español.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - en la entrada de la tienda
  - en el umbral de la tienda
  lexicon: HALOT
  rationale: פֶּתַח significa apertura/entrada. «A la entrada de la tienda» es idiomático en español y refleja bien el lugar concreto indicado por el hebreo.
- source_word: כְּחֹם הַיּוֹם
  english_pob_choice: in the heat of the day
  chosen_spanish: en el calor del día
  alternatives_spanish:
  - a la hora más calurosa del día
  - en el ardor del día
  lexicon: HALOT
  rationale: El modismo expresa el momento de mayor calor del día. «En el calor del día» es fiel y natural; evita precisar una hora que el texto no nombra.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio divino como «Yahvé» para mantener la transparencia del original y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones posteriores; el cotejo final mostró acuerdo alto y sin cambios. La redacción española sigue esa línea, manteniendo el nombre divino, la escena narrativa y la ambigüedad botánica del término hebreo sin sobrerinterpretarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - 'Se conserva el valor narrativo de la aparición con un verbo reflexivo natural en español: «se apareció».'
  - «Encinares» funciona como equivalente amplio para el agrupamiento de árboles, con nota alternativa para no perder la tensión lexical del hebreo.
  - 'El orden de la oración sigue el movimiento del original: aparición divina, localización, circunstancia de Abraham y marco temporal.'
