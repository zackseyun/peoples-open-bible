    reason: alternative_reading
  - marker: b
    text: 'O: “una festividad para Yahvé”.'
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal del borrador por su claridad, pero se añade 'y' para reflejar la conjunción hebrea, y se corrige la nota léxica para que represente de verdad la alternativa documentada para חַג. También se mueve el marcador [b] al lugar semánticamente correcto.
