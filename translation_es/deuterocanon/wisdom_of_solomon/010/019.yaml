translation:
  language: es
  text: Pero inundó a sus enemigos, y desde las profundidades del abismo los hizo subir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hizo subir desde las profundidades del abismo». El verbo griego puede sugerir que algo brota o asciende; aquí probablemente se refiere a que el mar los arrojó desde lo profundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς δὲ ἐχθροὺς αὐτῶν
  english_pob_choice: their enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a sus adversarios
  - a sus foes
  lexicon: LSJ
  rationale: ἐχθρούς nombra a enemigos; «enemigos» es el equivalente natural y mantiene el tono judicial del pasaje. El posesivo «sus» conserva la referencia de pertenencia sin añadir interpretación.
- source_word: κατέκλυσεν
  english_pob_choice: flooded
  chosen_spanish: sumergió
  alternatives_spanish:
  - inundó
  - anegó
  - ahogó
  lexicon: LSJ
  rationale: El verbo expresa una acción de agua que cubre o abruma. En español, «sumergió» conserva la imagen acuática sin afirmar explícitamente la muerte, igual que el griego no lo dice de forma directa en este verbo.
- source_word: ἐκ βάθους ἀβύσσου
  english_pob_choice: from the depths of the abyss
  chosen_spanish: desde las profundidades del abismo
  alternatives_spanish:
  - desde la profundidad del abismo
  - desde lo profundo del abismo
  lexicon: LSJ
  rationale: La construcción mantiene el lenguaje elevado y la imagen cósmica del mar profundo. «Profundidades» refleja mejor el valor idiomático y la revisión inglesa que pasó de «depth» a «depths».
- source_word: ἀνέβρασεν
  english_pob_choice: brought them up
  chosen_spanish: los hizo subir
  alternatives_spanish:
  - los levantó
  - los hizo brotar
  - los sacó a flote
  lexicon: LSJ
  rationale: El verbo puede sugerir que algo sube, brota o es hecho surgir. «Los hizo subir» conserva la noción de ascenso sin cerrar la ambigüedad del texto, y evita introducir la imagen interpretativa de cuerpos arrojados a la orilla.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: LSJ
  rationale: El pronombre retoma a los enemigos. En español, «los» integra naturalmente el objeto directo y mantiene la brevedad del griego.
theological_decisions:
- issue: Imagen de juicio en el mar sin explicitar la muerte
  english_pob_reading: Retain concrete water-judgment imagery without explicitly adding 'drowned' or 'dead bodies' to the text.
  chosen_spanish_reading: Conservar la imagen concreta de juicio por el agua sin añadir explícitamente «ahogó» ni «cuerpos muertos».
  alternative_spanish_readings:
  - Ahogó a sus enemigos, y desde las profundidades del abismo los hizo subir
  - Inundó a sus enemigos, y desde las profundidades del abismo los hizo subir
  rationale: El griego usa dos verbos vívidos, pero no nombra de forma explícita la muerte. La versión española mantiene esa tensión y deja que el lector perciba la escena del éxodo sin resolverla interpretativamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión final inglesa que cambió «depth» por «depths» y prefirió una expresión más natural para ἀνέβρασεν. En español se reflejó esa decisión con «desde las profundidades del abismo» y «los hizo subir», evitando un calco duro y manteniendo la imagen acuática sin explicitar más de lo que el griego dice.
  spanish_consistency_notes:
  - Se usó «abismo» para ἀβύσσου, en consonancia con el registro bíblico y sin sustituirlo por términos más cotidianos que atenúen la imagen.
  - Se mantuvo el pronombre átono «los» para la referencia directa a «sus enemigos», siguiendo la economía del original.
  - La nota al pie se ancla en «subir» para preservar la alternativa lexical del verbo ἀνέβρασεν sin duplicar marcadores.
