translation:
  language: es
  text: 'Hay una generación[a]: ¡cuán altivos son sus ojos y sus párpados se alzan!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una generación: ¡cuán altivos son sus ojos y sus párpados se alzan!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  english_pob_choice: There is a generation
  chosen_spanish: Hay una generación
  alternatives_spanish:
  - Una generación
  - Existe una generación
  - Hay un linaje
  lexicon: HALOT
  rationale: דּוֹר puede designar una generación o clase de personas. En este contexto proverbial funciona como una introducción exclamativa a un tipo de gente. En español, 'Hay una generación' conserva el valor existencial e idiomático sin añadir interpretación excesiva.
- source_word: מָה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - qué
  - cómo
  lexicon: HALOT
  rationale: Aquí מָה es exclamativo y expresa grado. 'Cuán' reproduce bien la exclamación de intensidad en español y encaja con la estructura poética de la frase.
- source_word: רָמוּ
  english_pob_choice: lofty
  chosen_spanish: altivos
  alternatives_spanish:
  - altos
  - elevados
  - altaneros
  lexicon: HALOT
  rationale: El verbo רום expresa altura/exaltación, pero en este contexto los ojos elevados señalan orgullo. 'Altivos' preserva la imagen vertical y la connotación moral de soberbia sin volver la frase demasiado abstracta.
- source_word: עֵינָיו
  english_pob_choice: its eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus ojos (de él)
  - sus ojos (de esa generación)
  lexicon: HALOT
  rationale: El sufijo es masculino singular y concuerda con דּוֹר como colectivo. En español, 'sus ojos' mantiene la referencia colectiva de manera natural; se evita forzar 'de él' o 'de ella'.
- source_word: וְעַפְעַפָּיו
  english_pob_choice: and its eyelids
  chosen_spanish: y sus párpados
  alternatives_spanish:
  - y sus pestañas
  - y sus parpados
  lexicon: HALOT
  rationale: עַפְעַף designa literalmente los párpados. 'Párpados' conserva la imagen corporal concreta y es el equivalente más transparente en español.
- source_word: יִנָּשֵׂאוּ
  english_pob_choice: are raised high
  chosen_spanish: están levantados
  alternatives_spanish:
  - son levantados
  - están elevados
  - se alzan
  lexicon: HALOT
  rationale: El nifal de נשׂא aquí expresa que están alzados/levantados. 'Están levantados' mantiene el estado visible de la postura y sugiere el gesto de orgullo sin añadir una interpretación más fuerte que el texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y también la revisión del POB inglés que ajustó el orden para reflejar mejor la exclamación: ''how lofty are its eyes''. En español se preserva esa intensidad con ''¡cuán altivos son sus ojos!'''
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió 'párpados' para עַפְעַף por transparencia léxica y porque mantiene la imaginería corporal del verso.
  - '''Altivos'' conserva la posible tensión entre altura física y soberbia moral, en lugar de suavizarla con ''altos''.'
