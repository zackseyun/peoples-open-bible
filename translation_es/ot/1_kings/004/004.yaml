translation:
  language: es
  text: Benaías, hijo de Joyadá, estaba a cargo del ejército, y Sadoc y Abiatar eran sacerdotes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ministros principales» u «oficiales principales» para כֹּהֲנִים, si aquí se entiende en un sentido administrativo más amplio de la corte.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנָיָ֥הוּ
  english_pob_choice: Benaiah
  chosen_spanish: Benaías
  alternatives_spanish:
  - Benaia
  - Benaya
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con una forma hispanizada usual y reconocible, sin traducirlo.
- source_word: בֶן יְהוֹיָדָ֖ע
  english_pob_choice: son of Jehoiada
  chosen_spanish: hijo de Joyadá
  alternatives_spanish:
  - hijo de Jehoiada
  - hijo de Yehoyadá
  lexicon: transliteración estándar
  rationale: Se mantiene el sentido filial explícito del hebreo. 'Joyadá' ofrece una adaptación hispánica natural del nombre, sin perder la identificación del personaje.
- source_word: עַל הַ/צָּבָ֑א
  english_pob_choice: was over the army
  chosen_spanish: estaba sobre el ejército
  alternatives_spanish:
  - estaba a cargo del ejército
  - era comandante del ejército
  lexicon: HALOT
  rationale: Se conserva la relación de supervisión expresada por עַל sin introducir un título militar más específico que el hebreo no explicita. 'Ejército' refleja bien צָבָא en este contexto.
- source_word: צָבָא
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - la tropa
  - la fuerza militar
  lexicon: HALOT
  rationale: Aquí צָבָא designa las fuerzas militares organizadas; 'ejército' es el equivalente moderno más claro en español.
- source_word: צָד֥וֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: transliteración estándar
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio.
- source_word: אֶבְיָתָ֖ר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiathar
  lexicon: transliteración estándar
  rationale: Se adopta la forma española habitual del nombre propio.
- source_word: כֹּהֲנִֽים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes[a]
  - ministros principales
  - oficiales principales
  lexicon: HALOT
  rationale: El sentido léxico ordinario de כֹּהֲנִים es 'sacerdotes'; en español, 'sacerdotes' preserva ese valor básico y es plenamente inteligible. El contexto cortesano no obliga a sustituirlo por un sentido administrativo más amplio.
theological_decisions:
- issue: Si כֹּהֲנִים debe entenderse como un término cultual normal o como una designación administrativa de corte.
  english_pob_reading: priests, with a footnoted alternative of 'chief ministers' or 'principal officers' if the broader court-administrative sense is intended
  chosen_spanish_reading: sacerdotes
  alternative_spanish_readings:
  - ministros principales
  - oficiales principales
  rationale: La lectura primaria se mantiene en su sentido léxico habitual, ya que Sadoc y Abiatar son figuras sacerdotales conocidas y el texto no exige desplazar el término a un sentido cortesano. Se preserva la tensión interpretativa mediante nota, sin borrar la alternativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El paquete de revisión indica acuerdo alto y sin cambios necesarios; la redacción española sigue la lectura estable del texto hebreo y conserva la nota alternativa sobre כֹּהֲנִים.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre 'ejército' y 'sacerdotes' sin fusionar los oficios.
  - Se prefirió una sintaxis simple y bíblica, adecuada para lectura pública, sin añadir información no contenida en el hebreo.
  - 'Los nombres propios se hispanizan de forma consistente: Benaías, Joyadá, Sadoc y Abiatar.'
