  yaml_path: translation/ot/judges/001/033.yaml
  text: Naphtali did not drive out the inhabitants of Beth-shemesh or the inhabitants of Beth-anath[a], so he lived among the Canaanites, the inhabitants of the land. And the inhabitants of Beth-shemesh and Beth-anath became forced labor for them.
  footnotes:
