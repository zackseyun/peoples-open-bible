review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la mayoría de los puntos: conserva bien δούλῃ como ''esclava'', κοιτῶνος como una estancia para dormir, ἔξοδον como la salida de Judith, la costumbre expresada por καθάπερ καθʼ ἡμέρας, la finalidad devocional de προσευχὴν, y κατὰ τὰ ῥήματα ταῦτα como referencia a las palabras recién dichas. Sin embargo, hay dos desajustes relevantes: (1) στῆναι se ha suavizado a ''se quedara'', perdiendo el matiz más concreto de ''ponerse/estar apostada'' fuera; y (2) la nota [a] está anclada en ''salida'' pero su contenido trata de ''alcoba/cámara de dormir'', por lo que no corresponde al lugar textual correcto. Además, el pluscuamperfecto ''había dicho'' no refleja tan bien el simple ἔφη del relato como ''dijo''.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero puede mejorarse en precisión y naturalidad narrativa. 'Alcoba' funciona, aunque 'cámara de dormir' como alternativa en nota es mejor que repetir 'alcoba'. La secuencia verbal suena más natural y fiel con 'le dijo ... que estuviera ... porque dijo que saldría...' en vez de 'había dicho'. También conviene mantener la nota en el punto correcto del texto. El resultado revisado sigue siendo natural y digno sin caer en calco rígido.
  glossary_alignment: Buena alineación con la terminología del proyecto en δούλῃ -> 'esclava' y προσευχὴ -> 'oración'. No hay conflictos teológicos. Se recomienda ajustar στῆναι hacia 'estuviera' para reflejar mejor la orden de estar apostada afuera, sin abandonar la fluidez del español.
  issues:
  - severity: medium
    issue: στῆναι se tradujo como 'se quedara'
    rationale: El griego expresa más específicamente ponerse/estar fuera, no solo permanecer. 'Estuviera fuera' o 'se pusiera fuera' conserva mejor la instrucción concreta sin sonar forzado.
  - severity: medium
    issue: La nota [a] está anclada en 'salida' pero explica 'alcoba/cámara de dormir'
    rationale: Las notas deben aparecer en la palabra o frase relevante. Tal como está, el lector asociará erróneamente la nota con 'salida'.
  - severity: low
    issue: '''había dicho'' sobrerrepresenta anterioridad frente a ἔφη'
    rationale: El verbo narrativo griego simplemente introduce lo que ella decía. 'Dijo que saldría' es más fiel y más fluido en español.
  revised_spanish_text: Y Judith le dijo a su esclava que estuviera fuera de su alcoba[a] y vigilara su salida, como en los días anteriores; pues dijo que saldría para su oración[b]. Y habló a Bagoas según estas palabras.
  revised_footnotes:
  - marker: a
    text: O 'cámara de dormir' para 'alcoba'.
    reason: lexical_alternative
  - marker: b
    text: La frase 'como en los días anteriores' refleja la costumbre establecida de Judith de salir a orar; más literalmente, 'como día tras día'.
    reason: lexical_alternative
