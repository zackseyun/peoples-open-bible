translation:
  language: es
  text: Hombres[a], ¿no son fuertes las mujeres? Grande es la tierra, y alto es el cielo, y veloz en su curso es el sol, porque gira en el circuito del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque gira en el círculo del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Varones
  - ¡Hombres!
  lexicon: LSJ
  rationale: El vocativo plural mantiene la apelación directa del griego. «Hombres» conserva la fuerza retórica y el paralelismo con la versión inglesa auditada.
- source_word: οὐκ ἰσχυραὶ αἱ γυναῖκες
  english_pob_choice: are not women strong?
  chosen_spanish: ¿no son fuertes las mujeres?
  alternatives_spanish:
  - ¿no son fuertes las mujeres?
  - ¿no son poderosas las mujeres?
  lexicon: LSJ
  rationale: «Fuertes» reproduce el valor básico de ἰσχυραί sin sobreinterpretar como poder político o social. Se mantiene la pregunta retórica implícita en el griego.
- source_word: μεγάλη ἡ γῆ
  english_pob_choice: Great is the earth
  chosen_spanish: Grande es la tierra
  alternatives_spanish:
  - La tierra es grande
  lexicon: LSJ
  rationale: Se conserva el orden predicado-sujeto para reflejar la elevación retórica del original y el paralelismo con las cláusulas siguientes.
- source_word: ὑψηλὸς ὁ οὐρανός
  english_pob_choice: high is heaven
  chosen_spanish: alto es el cielo
  alternatives_spanish:
  - alto es el cielo
  - el cielo es alto
  lexicon: LSJ
  rationale: «Cielo» es la opción más natural en español para οὐρανός en esta secuencia cosmológica; «alto es» preserva el orden enfático del griego y la lectura auditable inglesa sin forzar «heaven» en castellano.
- source_word: ταχὺς τῷ δρόμῳ ὁ ἥλιος
  english_pob_choice: swift in its course is the sun
  chosen_spanish: veloz en su carrera es el sol
  alternatives_spanish:
  - rápido en su curso es el sol
  - veloz en su trayectoria es el sol
  lexicon: LSJ
  rationale: δρόμος puede expresar curso, carrera o recorrido. «Carrera» mantiene el dinamismo del texto y la imagen de movimiento del sol, con estilo natural en español.
- source_word: ὅτι στρέφεται
  english_pob_choice: because it turns
  chosen_spanish: porque gira
  alternatives_spanish:
  - porque se vuelve
  - porque da vueltas
  lexicon: LSJ
  rationale: στρέφεται admite «gira» o «da vueltas». «Gira» es breve, directo y suficientemente literal; conserva el sentido causal introducido por ὅτι.
- source_word: ἐν τῷ κύκλῳ τοῦ οὐρανοῦ
  english_pob_choice: in the circuit of heaven
  chosen_spanish: en el circuito del cielo
  alternatives_spanish:
  - en el círculo del cielo
  - en la circunferencia del cielo
  lexicon: LSJ
  rationale: «Circuito» reproduce καλά the idea de recorrido circular sin exigir una cosmología moderna. Se usa «cielo» para mantener consistencia con οὐρανός en la frase anterior.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «the heaven» a «heaven» por naturalidad. En español se eligió «el cielo» desde el inicio, sin artículo duplicado problemático, y se mantuvo la estructura retórica del griego con orden predicado-sujeto donde es viable.
  spanish_consistency_notes:
  - Se conservó el tono sapiencial/poético del original sin añadir explicaciones doctrinales.
  - «Cielo» se usa consistentemente para οὐρανός en esta cláusula y en la nota alternativa.
  - La pregunta retórica se mantuvo explícita con signos de interrogación en español.
  - No se introdujo «SEÑOR» ni terminología eclesiástica ajena al texto; el pasaje es cosmológico y antropológico.
