  revision_awareness: 'Coincide con la última pasada revisada: no se registraron cambios sustanciales ni observaciones pendientes en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «Amén» como respuesta congregacional estándar.
  - «Alabó» traduce el verbo הלל en sentido doxológico, no como mero elogio secular.
  - La estructura narrativa en español sigue el orden del hebreo sin añadir elementos no presentes.
