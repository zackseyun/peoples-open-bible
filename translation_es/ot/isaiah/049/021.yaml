translation:
  language: es
  text: 'Entonces dirás en tu corazón[a]: «¿Quién dio a luz a estos para mí, si yo estaba despojada de hijos y estéril, desterrada y apartada? Y estos, ¿quién los crió? Mira, yo fui dejada sola[b]; estos, ¿dónde estaban?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién me ha engendrado a estos?». El verbo hebreo puede expresarse de forma más general, pero la voz femenina personificada favorece en español la imagen de parto: «dio a luz».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «estos, ¿dónde están?». El español usa «estaban» para expresar la fuerza contextual de la pregunta retrospectiva, manteniendo la forma más literal del hebreo y dejando implícita la cuestión de origen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתְּ
  english_pob_choice: Then you will say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  lexicon: HALOT
  rationale: El waw consecutivo en discurso profético expresa secuencia futura; «entonces» comunica mejor la progresión que un simple «y» en español.
- source_word: בִּלְבָבֵךְ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - para ti misma
  - en tu mente
  lexicon: HALOT
  rationale: Mantiene el modismo hebreo del interior personal sin volverlo demasiado abstracto; «corazón» es natural y fiel en español bíblico contemporáneo.
- source_word: מִי יָלַד לִי אֶת־אֵלֶּה
  english_pob_choice: Who has borne these for me
  chosen_spanish: ¿Quién me ha dado a luz a estos?
  alternatives_spanish:
  - ¿Quién me ha engendrado a estos?
  - ¿Quién ha dado a luz a estos para mí?
  lexicon: HALOT
  rationale: En la voz personificada femenina de Sion, ילד conserva el matiz de parto/maternidad. «Dar a luz» comunica ese sentido con claridad en español; «engendrar» sería más literal pero menos acorde con la perspectiva femenina.
- source_word: שְׁכוּלָה
  english_pob_choice: bereaved
  chosen_spanish: privada de hijos
  alternatives_spanish:
  - desolada por la pérdida de hijos
  - afligida por la pérdida
  lexicon: HALOT
  rationale: El término denota a una mujer desposeída de hijos por pérdida. «Privada de hijos» preserva la idea de carencia causada por ausencia/loss sin introducir un léxico funerario que no está en el sustantivo mismo.
- source_word: גַלְמוּדָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - sin hijos
  - barrenada
  lexicon: HALOT
  rationale: «Estéril» es el equivalente natural y digno en español para la imposibilidad de tener hijos; distingue esta idea de la de «privada de hijos».
- source_word: גֹּלָה
  english_pob_choice: exiled
  chosen_spanish: desterrada
  alternatives_spanish:
  - en exilio
  - exiliada
  lexicon: HALOT
  rationale: El participio describe a Sion como una mujer fuera de su tierra. «Desterrada» conserva el matiz de expulsión y suena más bíblico en español que «exiliada».
- source_word: וְסוּרָה
  english_pob_choice: cast away
  chosen_spanish: apartada
  alternatives_spanish:
  - rechazada
  - arrojada lejos
  - alejada
  lexicon: HALOT
  rationale: El contexto expresa separación/expulsión y abandono. «Apartada» refleja la idea de ser puesta fuera o separada sin forzar una lectura técnica adicional.
- source_word: מִי גִדֵּל
  english_pob_choice: who has raised them
  chosen_spanish: ¿quién los crió?
  alternatives_spanish:
  - ¿quién los crió y los hizo crecer?
  - ¿quién los educó?
  lexicon: HALOT
  rationale: גדל en piel con objeto personal se refiere a criar niños. «Crió» es el equivalente más natural y preciso en español.
- source_word: הֵן
  english_pob_choice: Behold / Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula es deíctica y enfática; «Mira» conserva la llamada de atención con un tono digno y actual.
- source_word: נִשְׁאַרְתִּי לְבַדִּי
  english_pob_choice: I was left alone
  chosen_spanish: yo fui dejada sola
  alternatives_spanish:
  - me quedé sola
  - quedé sola
  lexicon: HALOT
  rationale: El nifal de שאר conserva pasividad/ser dejada. «Fui dejada sola» mantiene ese matiz y, al estar en voz femenina, sigue la personificación del texto.
- source_word: אֵלֶּה אֵיפֹה הֵם
  english_pob_choice: these—where were they?
  chosen_spanish: estos, ¿dónde estaban?
  alternatives_spanish:
  - estos, ¿de dónde salieron?
  - estos, ¿dónde estaban entonces?
  lexicon: HALOT
  rationale: La revisión inglesa volvió más literal la cláusula final; en español, la pregunta retórica «¿dónde estaban?» reproduce el valor de «where were they?» y deja implícita la pregunta por su origen.
theological_decisions:
- issue: Persona femenina de Sion hablando de hijos
  english_pob_reading: Retain maternal imagery directly in the translation
  chosen_spanish_reading: Mantener directamente la imagen maternal de Sion como mujer que habla de sus hijos
  alternative_spanish_readings:
  - Reducirlo a una imagen corporativa de la comunidad
  - neutralizar los hijos en favor de 'descendencia'
  rationale: El hebreo presenta a Sion personificada como mujer/madre que se maravilla por la presencia de sus hijos. Conservar esa imaginería evita imponer una lectura abstracta que el texto no exige.
  doctrine_reference: Isaías 49:21; filosofía de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, especialmente en la cláusula final, que se volvió más literal como «these—where were they?». También incorpora el ajuste de «cast away» frente a «cast off», reflejado en español como «apartada», y conserva la imaginería maternal/personificada de Sion sin abstraerla.
  spanish_consistency_notes:
  - He mantenido un registro bíblico claro y contemporáneo, evitando tanto arcaísmos excesivos como paráfrasis libres.
  - «Dar a luz / criar / estéril / desterrada» conserva el campo semántico maternal y de desposesión que estructura el versículo.
  - La puntuación busca reflejar la sintaxis poética y las pausas retóricas del hebreo sin recargar el español.
  - Usé «Mira» para el deíctico enfático, coherente con un español natural y reverente.
