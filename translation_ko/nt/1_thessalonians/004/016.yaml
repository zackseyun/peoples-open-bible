id: 1TH.4.16
reference: 1 Thessalonians 4:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι αὐτὸς ὁ κύριος ἐν κελεύσματι, ἐν φωνῇ ἀρχαγγέλου καὶ ἐν σάλπιγγι θεοῦ, καταβήσεται ἀπ’ οὐρανοῦ, καὶ οἱ νεκροὶ ἐν Χριστῷ ἀναστήσονται πρῶτον,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/016.yaml
  text: For the Lord himself will descend from heaven with a command[a], with the voice of an archangel, and with the trumpet of God, and the dead in Messiah will rise first[b],
  footnotes:
  - marker: a
    text: Or “with a shout of command.” The Greek κέλευσμα can denote a summons or commanding cry.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the dead in Christ will rise first.”'
    reason: alternative_reading
translation:
  language: ko
  text: 주님 친히 호령[a]과 천사장의 음성과 하나님의 나팔 소리와 더불어 하늘로부터 내려오시리니, 메시아 안에서[b] 죽은 자들이 먼저 일어날 것이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「명령의 외침」. 헬라어 κέλευσμα는 호출이나 호령의 외침을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 번역은 「그리스도 안에서」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς ὁ κύριος
  english_pob_choice: the Lord himself
  chosen_korean: 주님 친히
  alternatives_korean:
  - 주님 자신이
  - 친히 주님께서
  lexicon: BDAG
  rationale: αὐτός의 강조를 「친히」로 살린다.
- source_word: ἐν κελεύσματι
  english_pob_choice: with a command
  chosen_korean: 호령과 더불어
  alternatives_korean:
  - 명령의 외침과 함께
  - 호령으로
  lexicon: BDAG
  rationale: κέλευσμα는 군사적·권위적 호령. 한국어 「호령」이 명령적 외침의 무게를 잘 담는다.
- source_word: ἐν φωνῇ ἀρχαγγέλου
  english_pob_choice: with the voice of an archangel
  chosen_korean: 천사장의 음성과
  alternatives_korean:
  - 대천사의 음성과
  - 천사장의 외침과
  lexicon: BDAG
  rationale: 한국 교회 전통의 「천사장」 어휘.
- source_word: ἐν σάλπιγγι θεοῦ
  english_pob_choice: with the trumpet of God
  chosen_korean: 하나님의 나팔 소리와
  alternatives_korean:
  - 하나님의 트럼펫 소리와
  - 신적 나팔의 울림과
  lexicon: BDAG
  rationale: σάλπιγξ의 「나팔」 어휘. 「소리」를 보충해 청각적 사건성을 강조한다.
- source_word: καταβήσεται ἀπ’ οὐρανοῦ
  english_pob_choice: will descend from heaven
  chosen_korean: 하늘로부터 내려오시리니
  alternatives_korean:
  - 하늘에서 내려오실 것이니
  - 하늘로부터 강림하시리니
  lexicon: BDAG
  rationale: 미래 시제. 「내려오시리니」가 종말론적 강림의 무게를 합쇼체 격식으로 자연스럽게 담는다.
- source_word: οἱ νεκροὶ ἐν Χριστῷ
  english_pob_choice: the dead in Messiah
  chosen_korean: 메시아 안에서 죽은 자들
  alternatives_korean:
  - 메시아 안에 있는 죽은 자들
  - 그리스도 안에서 죽은 자들
  lexicon: BDAG
  rationale: 「~안에서 죽은」 어순이 한국어로 자연스럽고 바울의 「그리스도 안에」 정형 표현을 보존한다. 칭호 Χριστός는 「메시아」.
- source_word: ἀναστήσονται πρῶτον
  english_pob_choice: will rise first
  chosen_korean: 먼저 일어날 것이며
  alternatives_korean:
  - 먼저 부활할 것이며
  - 가장 먼저 살아날 것이며
  lexicon: BDAG
  rationale: ἀνίστημι의 「일어남」 기본 의미. 「일어남」이 본문의 부활 의미와 비유적 무게를 함께 담는다. 「부활」도 가능하나 어휘의 폭을 좁히지 않는다.
