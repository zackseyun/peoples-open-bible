revisions:
- from: Entonces los amonitas y los moabitas se levantaron contra los habitantes del monte Seír para entregarlos al anatema[a] y destruirlos; y cuando acabaron con los habitantes de Seír, se ayudaron unos a otros para destruirse mutuamente.
  to: Entonces los amonitas y los moabitas se levantaron contra los habitantes del monte Seír para consagrarlos a la destrucción[a] y destruirlos; y cuando acabaron con los habitantes de Seír, se ayudaron unos a otros para destruirse mutuamente.
  rationale: Se reemplazó «entregarlos al anatema» por «consagrarlos a la destrucción» para reflejar con mayor fidelidad y claridad el valor de חרם en contexto de guerra sacral, evitando una lectura eclesiástica de «anatema». También se rehízo la nota para preservar la alternativa formal sin usar una expresión poco natural en español.
