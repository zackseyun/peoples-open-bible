translation:
  language: es
  text: Ellos también actuaron con astucia, y fueron y se aprovisionaron[a], y tomaron sacos gastados para sus asnos, y odres de vino gastados[b], rajados y remendados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se disfrazaron»; también puede entenderse «hicieron provisiones para sí mismos». El hebreo וַיִּצְטַיָּרוּ es difícil y se ha entendido de más de una manera. El contexto de la apariencia engañosa apoya «se disfrazaron».'
    reason: alternative_reading
  - marker: b
    text: 'O: «atados» o «amarrados», describiendo odres reparados al ser sujetos después de haberse rajado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָרְמָה
  english_pob_choice: with cunning
  chosen_spanish: con astucia
  alternatives_spanish:
  - con cunning
  - con engaño
  - astutamente
  lexicon: HALOT
  rationale: El hebreo expresa sagacidad o astucia; en este contexto narrativo tiene un matiz de engaño. «Con astucia» conserva el sustantivo abstracto sin reducirlo a una mera adverbialización, y encaja bien en español bíblico moderno.
- source_word: וַיִּצְטַיָּרוּ
  english_pob_choice: made provisions
  chosen_spanish: se prepararon
  alternatives_spanish:
  - se dispusieron
  - hicieron provisiones para sí mismos
  - se disfrazaron
  lexicon: HALOT
  rationale: La forma es difícil y la POB inglesa optó, tras revisión, por «made provisions» por mayor proximidad léxica. En español, «se prepararon» refleja de manera natural la idea de aprestarse o equiparse, sin afirmar más de lo que el verbo sostiene por sí solo. Se preserva en la nota la alternativa interpretativa relacionada con el contexto de engaño.
- source_word: שַׂקִּים
  english_pob_choice: sacks
  chosen_spanish: sacos
  alternatives_spanish:
  - sacos de arpillera
  - bolsas
  - costales
  lexicon: HALOT
  rationale: Designa recipientes bastos para carga. «Sacos» es claro y natural en español; «costales» también sería posible regionalmente, pero «sacos» es más neutral.
- source_word: בָּלִים
  english_pob_choice: worn-out
  chosen_spanish: gastados
  alternatives_spanish:
  - viejos
  - desgastados
  - raídos
  lexicon: HALOT
  rationale: El adjetivo señala deterioro por uso. «Gastados» comunica bien el desgaste material y resulta idiomático en español para objetos y ropa.
- source_word: לַחֲמוֹרֵיהֶם
  english_pob_choice: for their donkeys
  chosen_spanish: para sus asnos
  alternatives_spanish:
  - sobre sus asnos
  - para sus burros
  lexicon: HALOT
  rationale: La relación preposicional indica destino o uso con los animales. «Asnos» mantiene el registro bíblico sobrio y preciso; «burros» sería más coloquial.
- source_word: נֹאדוֹת יַיִן
  english_pob_choice: wineskins
  chosen_spanish: odres de vino
  alternatives_spanish:
  - bodegas de cuero
  - bolsas de vino
  - odres
  lexicon: HALOT
  rationale: El recipiente tradicional de piel para líquidos se expresa bien como «odres». Añadir «de vino» evita ambigüedad en español y reproduce el sustantivo compuesto hebreo.
- source_word: מְבֻקָּעִים
  english_pob_choice: split open
  chosen_spanish: rotos
  alternatives_spanish:
  - abiertos
  - rajados
  - partidos
  lexicon: HALOT
  rationale: El participio indica ruptura o abertura por quiebre. «Rotos» es breve y natural; la imagen específica de ruptura queda más desarrollada con el contexto siguiente de remiendo.
- source_word: מְצֹרָרִים
  english_pob_choice: patched
  chosen_spanish: remendados
  alternatives_spanish:
  - atados
  - vendados
  - sujetos
  lexicon: HALOT
  rationale: La forma probablemente alude a haber sido atados o reparados mediante amarre tras abrirse. «Remendados» comunica la idea funcional de reparación en español, como hizo la POB inglesa con «patched», sin comprometerse con un detalle técnico único.
- source_word: גַם הֵמָּה
  english_pob_choice: They too
  chosen_spanish: Ellos también
  alternatives_spanish:
  - También ellos
  - Incluso ellos
  lexicon: HALOT
  rationale: La partícula enfática marca inclusión comparativa. «Ellos también» suena natural y conserva el énfasis narrativo.
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  - salieron
  lexicon: HALOT
  rationale: El verbo narrativo de desplazamiento se expresa con «fueron», que es simple y fluido en español.
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - agarraron
  - recogieron
  lexicon: HALOT
  rationale: Verbo narrativo básico para tomar objetos; «tomaron» es directo y sobrio.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa que abandonó «disguised themselves» y prefirió «made provisions» para וַיִּצְטַיָּרוּ. Por eso la traducción española evita introducir explícitamente «se disfrazaron» en el cuerpo del texto y, en su lugar, usa «se prepararon», manteniendo la ambigüedad controlada del verbo mientras conserva el flujo narrativo de la escena.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo»/«Mesías» porque no aplica al versículo.
  - «Asnos» se eligió por registro bíblico neutral y por coherencia con el objeto de carga descrito en el hebreo.
  - Se preservó la tensión interpretativa de וַיִּצְטַיָּרוּ en la nota sin forzar un único sentido técnico.
  - 'La serie verbal conserva el paralelismo narrativo hebreo: actuaron, fueron, se prepararon, tomaron.'
