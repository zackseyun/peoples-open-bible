translation:
  language: es
  text: excepto Caleb hijo de Jefone; él la verá, y a él daré la tierra sobre la cual ha andado, y a sus hijos[a], porque ha seguido plenamente a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus descendientes'; el hebreo dice literalmente 'sus hijos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֽוּלָתִ֞י
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - exceptuando
  lexicon: HALOT
  rationale: Introduces la excepción al juicio anterior con una forma natural y precisa en español.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  english_pob_choice: Caleb son of Jephunneh
  chosen_spanish: Caleb hijo de Jefone
  alternatives_spanish:
  - Caleb, hijo de Jefone
  lexicon: convención onomástica española
  rationale: Se conserva el nombre propio con transliteración bíblica estable en español; 'hijo de' reproduce la relación filiativa del hebreo.
- source_word: יִרְאֶנָּה
  english_pob_choice: he shall see it
  chosen_spanish: él la verá
  alternatives_spanish:
  - él la verá con certeza
  - la verá
  lexicon: HALOT
  rationale: El sufijo femenino remite a 'la tierra'; 'la verá' mantiene la referencia y el sentido promisorío/judicial del hebreo.
- source_word: וְלוֹ אֶתֵּן
  english_pob_choice: and to him I will give
  chosen_spanish: y a él daré
  alternatives_spanish:
  - y se la daré a él
  - y a él le daré
  lexicon: HALOT
  rationale: Conserva el dativo enfático sin forzar el orden español; el tiempo futuro expresa promesa.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio el término apunta a la tierra de la promesa; 'tierra' es fiel y suficientemente amplio en español.
- source_word: אֲשֶׁר דָּרַךְ בָּהּ
  english_pob_choice: on which he has walked
  chosen_spanish: sobre la cual ha andado
  alternatives_spanish:
  - por la cual ha andado
  - que ha pisado
  lexicon: HALOT
  rationale: '''Andado'' conserva el lenguaje concreto de caminar/trotar por la tierra; ''sobre la cual'' expresa bien el relativo con antecedente femenino.'
- source_word: וּלְבָנָיו
  english_pob_choice: and to his sons
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus hijos varones
  - y a sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'sus hijos/sons', en español 'hijos' puede abarcar la descendencia masculina directa sin sonar rígido; se mantiene la referencia hereditaria del contexto. La lectura tradicional 'hijos' evita introducir una precisión excesiva en el cuerpo del texto.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Causa simple y natural en español para introducir la razón de la promesa.
- source_word: מִלֵּא אַחֲרֵי יְהוָה
  english_pob_choice: he has fully followed Yahweh
  chosen_spanish: siguió plenamente a Yahvé
  alternatives_spanish:
  - ha seguido plenamente a Yahvé
  - siguió de todo corazón a Yahvé
  lexicon: HALOT
  rationale: '''Siguió plenamente'' comunica el idiomático ''llenar tras'' sin volverlo opaco. Se conserva ''Yahvé'' conforme a la convención del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: en español, ''Yahvé'' preserva el nombre del pacto sin la máscara litúrgica ''SEÑOR''.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El verso usa directamente el Tetragrámaton, por lo que conviene mantener el nombre propio divino en español. 'Yahvé' sigue la convención del proyecto y evita ocultar el nombre en una fórmula genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de וּלְבָנָיו
  english_pob_reading: and to his sons
  chosen_spanish_reading: y a sus hijos
  alternative_spanish_readings:
  - y a sus hijos varones
  - y a sus descendientes
  rationale: El hebreo es literalmente masculino plural con sufijo de 3ms. En el cuerpo del texto, 'hijos' conserva la referencia sin endurecer innecesariamente la formulación; la nota puede aclarar la literalidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente sin cambios sustantivos respecto del inglés auditado; mantiene la excepción inicial, el pronombre femenino de 'la verá', la promesa de la tierra, la referencia a los hijos de Caleb y la fórmula idiomática de seguir plenamente a Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'tierra' para הָאָרֶץ en lugar de 'país' para conservar el lenguaje bíblico de posesión/promesa.
  - La nota de pie a trata únicamente la ambigüedad lexical de וּלְבָנָיו y no altera el cuerpo del texto.
  - La formulación 'siguió plenamente' preserva el sentido idiomático sin introducir una paráfrasis devocional más libre.
