translation:
  language: es
  text: Que los reyes de Tarsis y de las costas lejanas[a] traigan tributo[b]; que los reyes de Sabá y de Seba ofrezcan regalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Costas lejanas» traduce el alcance amplio de אִיִּים; también puede entenderse como «islas» o, más generalmente, como regiones marítimas distantes.
    reason: lexical_alternative
  - marker: b
    text: «Tributo» refleja el contexto real del versículo; el hebreo también puede significar «regalo» u «ofrenda», pero aquí la lectura política es la más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  english_pob_choice: the kings of
  chosen_spanish: los reyes de
  alternatives_spanish:
  - reyes de
  lexicon: HALOT
  rationale: El hebreo está en estado constructo plural; en español se conserva de forma natural con «los reyes de». La adición del artículo da fluidez sin alterar el sentido.
- source_word: תַרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshish
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado al uso español bíblico habitual, manteniendo la referencia al lugar.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las costas lejanas
  - las tierras marítimas
  lexicon: HALOT
  rationale: El término puede ser literalmente «islas», pero en uso poético amplía el sentido a tierras marítimas distantes. «Las costas» comunica mejor ese alcance geográfico en español sin perder la amplitud semántica.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - ofrenda
  - regalo
  - presente
  lexicon: HALOT
  rationale: En un contexto real y de sometimiento político, el término denota tributo más que un regalo genérico o una ofrenda cultual. «Tributo» preserva la fuerza política documentada por la POB inglesa.
- source_word: יָשִׁיבוּ
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - lleven
  - devuelvan
  - rindan
  lexicon: HALOT
  rationale: El hiphil de שוב puede significar ‘hacer volver’ o, idiomáticamente, ‘traer/entregar’. «Traigan» es natural en español y conserva la acción de presentar tributo.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Sabá
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma española bíblica establecida.
- source_word: וּ/סְבָא
  english_pob_choice: Seba
  chosen_spanish: Seba
  alternatives_spanish:
  - Saba
  lexicon: HALOT
  rationale: Nombre propio distinto de Sabá; se conserva la diferencia fonética y gráfica para no fusionar dos topónimos hebreos diferentes.
- source_word: אֶשְׁכָּר
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - ofrendas
  - regalos
  - presentes
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un regalo o pago; como el primer hemistiquio ya usa «tributo», «dones» mantiene la variación poética y evita repetir una sola solución.
- source_word: יַקְרִיבוּ
  english_pob_choice: offer
  chosen_spanish: ofrezcan
  alternatives_spanish:
  - presenten
  - traigan
  - acerquen
  lexicon: HALOT
  rationale: El hiphil de קרב es ‘acercar/presentar/ofrecer’. «Ofrezcan» funciona bien en español y refleja el registro formal del verso, en línea con la revisión inglesa más idiomática.
translation_notes:
  revision_awareness: La POB inglesa revisó el segundo hemistiquio de «present gifts» a «offer gifts» para dar una formulación más formal e idiomática; la versión española sigue esa preferencia con «ofrezcan dones», manteniendo la distinción entre מִנְחָה y אֶשְׁכָּר. También se respetó la alternativa lexical de אִיִּים mediante una nota, porque el español «costas» deja abierta la lectura amplia de ‘islas / regiones marítimas lejanas’.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se evitó «Cristo/Mesías» porque no aparece ninguna forma correspondiente en el hebreo de este versículo.
  - Se conservaron topónimos bíblicos en transliteración española estándar para claridad litúrgica y lectora.
  - 'El paralelismo verbal se preserva con dos subjuntivos exhortativos: «traigan» / «ofrezcan».'
