    rationale: «Antes de la ruina, la arrogancia» reproduce el orden hebreo de forma algo rígida. En español proverbial y eclesial, una formulación verbal como «La arrogancia va antes de la ruina» o nominal más asentada suena mejor sin perder sentido.
  - severity: low
