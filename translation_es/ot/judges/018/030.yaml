translation:
  language: es
  text: Entonces los hijos de Dan erigieron para sí la imagen tallada, y Jonatán, hijo de Gersón, hijo de Moisés[a], él y sus hijos fueron sacerdotes para la tribu de los danitas hasta el día del cautiverio de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Moisés»; la tradición masorética incluye una letra suspendida que produce la lectura tradicional «Manasés».'
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּקִימוּ
  english_pob_choice: set up
  chosen_spanish: se hicieron / establecieron
  alternatives_spanish:
  - erigieron
  - pusieron
  lexicon: HALOT
  rationale: El hifil de קום expresa levantar o instalar algo. En español, «se hicieron» con el objeto «la imagen tallada» conserva el sentido de instaurarla para su uso; «establecieron» sería posible, pero menos concreto. Se evita un calco rígido si la construcción resulta más natural en español.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - por su cuenta
  lexicon: HALOT
  rationale: El dativo es reflexivo en sentido de beneficio propio. «Para sí» reproduce ese valor sin añadir interpretación.
- source_word: בְּנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los danitas
  - la gente de Dan
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica y tribal del hebreo. «Los danitas» es válido, pero aquí la forma literal mantiene la distinción frente a הַדָּנִי más adelante.
- source_word: הַפָּסֶל
  english_pob_choice: the carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo
  - la imagen esculpida
  lexicon: HALOT
  rationale: פֶּסֶל designa una imagen hecha por talla o escultura. «Imagen tallada» preserva el contenido material sin recurrir a una formulación arcaica.
- source_word: וִיהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Convención onomástica española
  rationale: Se usa la forma española habitual del nombre propio.
- source_word: בֶּן גֵּרְשֹׁם
  english_pob_choice: the son of Gershom
  chosen_spanish: hijo de Gersón
  alternatives_spanish:
  - hijo de Gershom
  lexicon: Convención onomástica española
  rationale: Se adapta el nombre a la forma española corriente, manteniendo la identificación genealógica.
- source_word: בֶּן מְהוּא
  english_pob_choice: son of Moses
  chosen_spanish: hijo de Moisés[a]
  alternatives_spanish:
  - hijo de Manasés
  lexicon: HALOT
  rationale: La lectura consonántica y el contexto del POB inglés apoyan «Moisés» en el texto principal. La tradición masorética con nun suspendida conserva la lectura alternativa «Manasés», por lo que se mantiene la tensión textual en nota en vez de resolverla silenciosamente.
- source_word: וּבָנָיו
  english_pob_choice: he and his sons
  chosen_spanish: él y sus hijos
  alternatives_spanish:
  - y sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y sus hijos», el español requiere explicitar el sujeto pleno de la oración para que el predicado «fueron sacerdotes» quede claro.
- source_word: כֹהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes del culto
  lexicon: HALOT
  rationale: Es el equivalente estándar en contexto cultual.
- source_word: לְשֵׁבֶט הַדָּנִי
  english_pob_choice: for the tribe of the Danites
  chosen_spanish: para la tribu de los danitas
  alternatives_spanish:
  - para la tribu de Dan
  - para la tribu danita
  lexicon: HALOT
  rationale: La frase indica función en favor de ese grupo tribal. «Danitas» transmite el adjetivo gentilicio y suena natural en español bíblico.
- source_word: עַד יוֹם גְּלוֹת הָאָרֶץ
  english_pob_choice: until the day of the exile of the land
  chosen_spanish: hasta el día del cautiverio de la tierra
  alternatives_spanish:
  - hasta el día del exilio de la tierra
  - hasta el día en que la tierra fue llevada al destierro
  lexicon: HALOT
  rationale: La expresión es breve y algo inusual. «Cautiverio» conserva el tono bíblico y el posible valor colectivo del evento sin precisar más de lo que el hebreo exige. «Exilio» también sería posible, pero «cautiverio» mantiene mejor el registro tradicional y el carácter formular.
theological_decisions:
- issue: Identificación genealógica de Jonatán
  english_pob_reading: son of Moses, with a footnote noting the traditional reading Manasseh
  chosen_spanish_reading: hijo de Moisés, con nota sobre la lectura tradicional «Manasés»
  alternative_spanish_readings:
  - hijo de Manasés
  rationale: El texto hebreo base y el seguimiento del POB inglés conservan la lectura «Moisés» en el cuerpo principal, mientras la tradición masorética ofrece la forma alternativa «Manasés» mediante una consonante suspendida. Mantener esa tensión evita borrar un dato textual relevante.
  doctrine_reference: Principio POB de preservar variantes y tensiones textuales sin armonizarlas artificialmente
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado: mantiene la lectura principal «Moisés» en el texto, conserva la variante tradicional en nota y refleja sin expansión interpretativa la clausula final sobre el cautiverio/exilio de la tierra. No se incorporaron revisiones adicionales porque el pasaje ya se consideró estable en la pasada más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «danitas» para הַדָּנִי y «hijos de Dan» para בְּנֵי דָן para conservar la distinción hebrea.
  - Se prefirió «cautiverio de la tierra» por fidelidad formal y por el paralelismo con la formulación inglesa auditada.
