id: LUK.13.7
reference: Luke 13:7
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς τὸν ἀμπελουργόν· Ἰδοὺ τρία ἔτη ⸂ἀφ’ οὗ⸃ ἔρχομαι ζητῶν καρπὸν ἐν τῇ συκῇ ταύτῃ καὶ οὐχ εὑρίσκω· ⸀ἔκκοψον αὐτήν· ἱνατί καὶ τὴν γῆν καταργεῖ;
translation:
  text: Then he said to the vine-dresser[a], ‘Look, for three years now I have come seeking fruit on this fig tree and have found none. Cut it down. Why should it even keep using up the ground?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Why should it also make the soil useless?” The Greek verb can carry the sense of rendering the ground unproductive, not merely occupying space.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμπελουργόν
  chosen: vine-dresser
  alternatives:
  - gardener
  - keeper of the vineyard
  lexicon: BDAG
  rationale: The term denotes one who works/cultivates a vineyard. 'Vine-dresser' is precise and natural enough in context, preserving the vineyard setting better than the broader 'gardener'.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces attention emphatically. 'Look' preserves the force in readable modern English without the archaic feel of 'Behold'.
- source_word: τρία ἔτη ἀφ’ οὗ
  chosen: for three years now
  alternatives:
  - these three years
  - for three years since
  lexicon: BDAG
  rationale: The construction marks duration from a point in the past up to the present. 'For three years now' communicates the ongoing situation idiomatically in English.
- source_word: ἔρχομαι ζητῶν
  chosen: I have come seeking
  alternatives:
  - I come looking for
  - I have been coming to seek
  lexicon: BDAG
  rationale: The present with participle in this context describes repeated/ongoing action. English present perfect captures the repeated visits over the three-year span more naturally than a simple present.
- source_word: καρπὸν
  chosen: fruit
  lexicon: BDAG
  rationale: Literal agricultural sense in the parable; no need to import metaphor into the translation itself.
- source_word: συκῇ
  chosen: fig tree
  lexicon: BDAG
  rationale: Standard lexical meaning; explicit in English.
- source_word: οὐχ εὑρίσκω
  chosen: have found none
  alternatives:
  - find none
  - do not find any
  lexicon: BDAG
  rationale: With the preceding aspectual choice, present tense is best represented idiomatically by English present perfect, summarizing the repeated unsuccessful searches.
- source_word: ἔκκοψον
  chosen: Cut it down
  alternatives:
  - Cut it out
  - Chop it down
  lexicon: BDAG
  rationale: Aorist imperative gives a direct command to remove the tree. 'Cut it down' is the standard and clear rendering for a tree.
- source_word: ἱνατί
  chosen: Why
  alternatives:
  - Why indeed
  - For what reason
  lexicon: BDAG
  rationale: Direct interrogative asking the reason/purpose; simple 'Why' is sufficient.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: Here καί has an adjunctive/intensifying force in the rhetorical question. 'Even' brings out the sense that the tree not only fails to bear fruit but also wastes resources.
- source_word: γῆν
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: BDAG
  rationale: In this agricultural context, 'ground' is the most natural English expression for the soil/space occupied by the tree.
- source_word: καταργεῖ
  chosen: keep using up
  alternatives:
  - make useless
  - render unproductive
  - exhaust
  lexicon: BDAG
  rationale: In context the verb refers to making the ground unproductive/useless by occupying it without yielding fruit. 'Keep using up' expresses the practical force clearly in modern English.
