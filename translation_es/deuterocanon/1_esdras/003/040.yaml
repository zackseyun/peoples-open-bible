translation:
  language: es
  text: Y estas hacen las vestiduras de los hombres[a], y estas dan gloria a los hombres, y los hombres no pueden existir aparte de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pueden estar sin las mujeres». El infinitivo griego es literalmente «ser/estar», que puede traducirse de manera más literal como «estar» en lugar de «existir».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὗται
  english_pob_choice: these
  chosen_spanish: éstas
  alternatives_spanish:
  - ellas
  - estas mujeres
  lexicon: LSJ
  rationale: Conservo el demostrativo femenino plural para mantener la repetición enfática del griego. En español, «éstas» reproduce el enlace anafórico con el contexto anterior sin recargar el verso con una glosa explícita que no está en el texto.
- source_word: ποιοῦσιν
  english_pob_choice: make
  chosen_spanish: hacen
  alternatives_spanish:
  - hacen / fabrican
  - producen
  - forjan
  lexicon: BDAG
  rationale: El verbo griego expresa producir o hacer. «Hacen» es natural en español y sirve para ambos miembros paralelos del versículo, sin introducir una precisión artesanal que el griego no exige.
- source_word: στολάς
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - vestiduras
  - ropas
  - prendas
  lexicon: LSJ
  rationale: «στολή» puede referirse a ropa o vestidura. Opto por «vestidos» porque es claro y digno en español, y mantiene el sentido concreto de prendas sin restringirlo a un atuendo litúrgico o solemne.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  - distinción
  lexicon: BDAG
  rationale: «δόξα» aquí apunta a la gloria, honra o prestigio que las mujeres confieren a los hombres. «Gloria» conserva el tono elevado del griego y la simetría retórica del paralelismo.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Aunque ἄνθρωποι puede ser genérico, el contraste inmediato con mujeres exige un sentido relacional masculino. «Los hombres» refleja mejor esa oposición que un inclusivo genérico que diluiría la precisión del pasaje.
- source_word: εἶναι
  english_pob_choice: exist
  chosen_spanish: existir
  alternatives_spanish:
  - ser
  - estar
  - vivir
  lexicon: BDAG
  rationale: El infinitivo de εἰμί después de δύνανται puede traducirse literalmente por «ser», pero en español «no pueden ser aparte de las mujeres» resulta menos claro en este contexto. «Existir» expresa la afirmación amplia sobre la vida humana sin añadir contenido ajeno.
- source_word: χωρὶς τῶν γυναικῶν
  english_pob_choice: apart from women
  chosen_spanish: aparte de las mujeres
  alternatives_spanish:
  - sin las mujeres
  - separados de las mujeres
  lexicon: BDAG
  rationale: «χωρίς» significa «sin/aparte de». «Aparte de» conserva la dependencia relacional expresada por el griego y suena natural en español; «sin» sería válido, pero aquí el matiz de separación queda bien captado por «aparte de».
theological_decisions:
- issue: Referencia masculina de οἱ ἄνθρωποι frente a τῶν γυναικῶν
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: El verso contrasta explícitamente a los hombres con las mujeres, por lo que el valor masculino del sustantivo debe conservarse. Traducirlo de manera inclusiva borraría una oposición que el texto griego presenta deliberadamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de εἶναι con δύνανται
  english_pob_reading: exist
  chosen_spanish_reading: existir
  alternative_spanish_readings:
  - ser
  - vivir
  rationale: La POB inglesa documenta la posibilidad de traducir más literalmente como «be». En español, «existir» comunica la idea general con claridad, mientras que «ser» podría sonar demasiado abstracto o extraño en esta construcción.
  doctrine_reference: DOCTRINE.md §Lexical transparency and idiomatic clarity
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo final mostró alta concordancia con observaciones menores. Por eso mantengo el contenido semántico del texto fuente y solo ajusto la formulación española para que sea natural, transparente y fiel al paralelismo griego.
  spanish_consistency_notes:
  - Conservo la repetición enfática de «éstas... y éstas...» como reflejo del griego αὗται... καὶ αὗται.
  - Mantengo «los hombres» para respetar el contraste masculino explícito con «las mujeres».
  - Evito «SEÑOR» u otras sustituciones no pertinentes, ya que el verso no contiene el nombre divino ni lenguaje de título teológico.
  - Uso «gloria» y no «honor» para preservar el tono elevado del término δόξα en el paralelismo del pasaje.
