translation:
  language: es
  text: Y Azarías durmió con sus padres[a], y lo sepultaron con sus padres en la ciudad de David. Y Jotam su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con sus antepasados». El hebreo usa la fórmula convencional «durmió con sus padres» para referirse a la muerte y sepultura entre generaciones anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: reposó
  alternatives_spanish:
  - durmió
  - se durmió
  - murió
  lexicon: HALOT
  rationale: El hebreo usa la fórmula eufemística de muerte y entierro. En español, "reposó" conserva ese tono funerario sin reducirlo a "murió" ni sonar demasiado coloquial con "durmió".
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus ancestros
  lexicon: HALOT
  rationale: La fórmula real de sepultura se mantiene de manera literal y natural en español. "Padres" conserva el paralelismo tradicional de la expresión hebrea; "antepasados" explicita el sentido pero pierde la forma fija.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo activo plural se refleja con una construcción activa en español. "Sepultar" mantiene registro bíblico y funerario; "enterrar" es posible, pero un poco menos solemne.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David,
  - en la ciudad de David
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico tradicional y transparente. Es la forma estándar y más reconocible en español bíblico.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En la fórmula sucesoria, "reinó" reproduce con concisión la acción regia sin añadir matices no presentes en el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '"En su lugar" expresa sucesión al trono de forma clara y natural. "En vez de él" puede sonar más contrastivo; "después de él" debilita la idea de reemplazo.'
theological_decisions:
- issue: Fórmula de muerte y sepultura "reposó con sus padres"
  english_pob_reading: Preserves the Hebrew euphemism 'slept with his fathers' rather than flattening it to 'died.'
  chosen_spanish_reading: Conserva el eufemismo hebreo con "reposó con sus padres".
  alternative_spanish_readings:
  - murió y fue sepultado con sus padres
  - durmió con sus padres
  rationale: No se debe borrar la fórmula tradicional ni convertirla directamente en un enunciado explicativo. "Reposó" mantiene el valor idiomático de muerte honorable y sepultura entre generaciones, sin imponer una interpretación doctrinal adicional.
  doctrine_reference: Uso bíblico convencional del eufemismo de muerte/sepultura; sin implicación doctrinal controvertida
- issue: Referencia a la ciudad de David
  english_pob_reading: Standard place-name expression identifying royal burial location.
  chosen_spanish_reading: Mantiene la referencia histórica y dinástica sin ampliación.
  alternative_spanish_readings:
  - la ciudad de David
  - David's city
  rationale: La expresión debe conservarse como designación geográfica e histórica del sepulcro real. No se introduce glosa interpretativa en el texto principal.
  doctrine_reference: Topografía bíblica e ისტორική narrativa real; sin carga doctrinal directa
translation_notes:
  revision_awareness: El contexto auditado en inglés no mostró revisiones sustantivas ni cambios pendientes; se siguió la decisión inglesa de mantener el eufemismo funerario, el pasivo activo de sepultura y la fórmula sucesoria breve.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio "Azarías" y el de "Jotam" en forma española estándar.
  - Se preservó la fórmula real de sucesión con "reinó en su lugar" para evitar una paráfrasis más explicativa.
  - Se usó registro bíblico sobrio y contemporáneo, sin reemplazar términos por equivalentes eclesiásticos más tradicionales cuando no añadían fidelidad.
  - La nota al pie queda anclada solo en la expresión idiomática de parentesco/memorial funerario.
