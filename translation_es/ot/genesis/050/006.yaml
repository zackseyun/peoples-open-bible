translation:
  language: es
  text: 'Y Faraón dijo[a]: «Sube y sepulta a tu padre, como te hizo jurar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como te puso bajo juramento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; en español, «Y ... dijo» conserva ese flujo sin añadir una relación causal o temporal más fuerte de la que el hebreo exige.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: Se mantiene el título propio tradicional y reconocible en español. No se traduce como un sustantivo común porque el texto se refiere al gobernante egipcio específico.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Asciende
  lexicon: HALOT
  rationale: עלה conserva aquí el matiz direccional de subir desde Egipto hacia Canaán. «Sube» reproduce ese valor mejor que el simple «ve».
- source_word: וּקְבֹר
  english_pob_choice: and bury
  chosen_spanish: sepulta
  alternatives_spanish:
  - y sepulta
  - entierra
  lexicon: HALOT
  rationale: El verbo קבר significa enterrar/sepultar. «Sepulta» es digno y natural en español bíblico; el objeto «a tu padre» permite omitir un pronombre añadido.
- source_word: אֶת אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - tu padre
  lexicon: HALOT
  rationale: En español, el objeto directo humano se expresa normalmente con la preposición «a». Así se mantiene la referencia al padre sin sonar forzado.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: «Como» funciona de forma natural para introducir la comparación o correspondencia con el juramento previo, sin sobrecargar la frase.
- source_word: הִשְׁבִּיעֶךָ
  english_pob_choice: he made you swear
  chosen_spanish: te hizo jurar
  alternatives_spanish:
  - te puso bajo juramento
  - te obligó a jurar
  lexicon: HALOT
  rationale: 'El hifil de שׁבע es causativo: alguien hace que otro jure. «Te hizo jurar» conserva esa fuerza causal de manera clara y sobria en español.'
theological_decisions:
- issue: La dirección «Sube» conserva un matiz geográfico-teológico del viaje desde Egipto hacia la tierra de Canaán.
  english_pob_reading: Go up
  chosen_spanish_reading: Sube
  alternative_spanish_readings:
  - Ve
  - Asciende
  rationale: Aunque «ve» sería más general, el hebreo usa עלה, que literalmente significa subir. En este contexto la dirección refleja el desplazamiento hacia una región más alta y no debe neutralizarse sin necesidad.
  doctrine_reference: No aplica; decisión lexical-geográfica basada en el hebreo.
- issue: 'El juramento se expresa como causa: alguien hizo que José jurara.'
  english_pob_reading: he made you swear
  chosen_spanish_reading: te hizo jurar
  alternative_spanish_readings:
  - te puso bajo juramento
  - te obligó a jurar
  rationale: El hifil de שׁבע no describe meramente una acción interna de José, sino la imposición del juramento por parte de otro. «Te hizo jurar» preserva esa relación causal sin ampliar indebidamente el sentido.
  doctrine_reference: No aplica; cuestión de valencia verbal y fidelidad léxica.
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo entre la traducción inglesa POB y la revisión más reciente; no se registran cambios sustantivos. Se mantuvieron las decisiones centrales: valor direccional de עלה, verbo causativo de שׁבע y estructura narrativa simple.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable aquí; no aparece el tetragrámaton en este versículo.
  - Se preservó el matiz de movimiento ascendente con «Sube», en línea con el hebreo y con el inglés POB.
  - «Sepulta» evita una paráfrasis explicativa y sigue el valor básico de קבר.
  - La nota al pie conserva la alternativa causal del juramento sin duplicar el sentido principal.
