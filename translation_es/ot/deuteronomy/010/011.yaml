revisions:
- from: 'Y Yahvé me dijo[a]: «Levántate, ve delante del pueblo por el camino[b], para que entren y tomen posesión de la tierra que juré a sus padres[c] darles».'
  to: 'Y Yahvé me dijo: «Levántate, ve delante del pueblo[a] para la marcha, para que entren y tomen posesión de la tierra que juré a sus padres[b] darles».'
  rationale: Se reemplaza «por el camino» por «para la marcha» para reflejar mejor לְמַסַּע. Se elimina la nota innecesaria sobre «me habló» y se reubica la nota alternativa en «delante del pueblo», donde corresponde por לִפְנֵי הָעָם. Se mantiene el resto del versículo por ser fiel, natural y conforme al glosario del proyecto.
  reviewer_model: gpt-5.4
