translation:
  language: es
  text: Y del resto del aceite que está en su palma[a], el sacerdote pondrá sobre el lóbulo de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho[b], sobre la sangre de la ofrenda por la culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su palma». El hebreo puede referirse a la palma o al hueco de la mano; aquí se conserva una formulación natural que no pierde la imagen ritual.
    reason: lexical_alternative
  - marker: b
    text: O «encima de la sangre de la ofrenda por la culpa». El sentido es que el aceite se aplica en el mismo lugar ya marcado por la sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיֶּתֶר
  english_pob_choice: from the rest of
  chosen_spanish: del resto de
  alternatives_spanish:
  - de lo que queda de
  - del remanente de
  lexicon: HALOT
  rationale: מִיֶּתֶר expresa lo que queda sobrante; «del resto de» conserva el sentido partitivo introducido por מִן y suena natural en español ritual.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el óleo
  lexicon: HALOT
  rationale: שֶׁמֶן es el término normal para aceite en este contexto. «Aceite» es claro y moderno; «óleo» podría sonar más eclesiástico y menos directo.
- source_word: עַל כַּפּוֹ
  english_pob_choice: that is on his palm
  chosen_spanish: que está en su palma
  alternatives_spanish:
  - que está sobre su palma
  - que tiene en su palma
  lexicon: HALOT
  rationale: כַּף puede significar la palma o concavidad de la mano. «En su palma» respeta la imagen ritual y permite la lectura espacial sin forzar la preposición.
- source_word: יִתֵּן
  english_pob_choice: shall put some
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - hará poner
  lexicon: HALOT
  rationale: נתן aquí es «poner/colocar». El español no necesita explicitar «algo» porque el partitivo ya quedó expresado por «del resto de».
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: the lobe of the ... ear
  chosen_spanish: el lóbulo de la oreja
  alternatives_spanish:
  - la punta de la oreja
  - el borde de la oreja
  lexicon: HALOT
  rationale: El término designa la extremidad externa de la oreja. «Lóbulo» es la equivalencia anatómica más clara en español en este contexto ritual.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que se está purificando
  alternatives_spanish:
  - el que es purificado
  - la persona que se está purificando
  lexicon: HALOT
  rationale: El participio hitpael señala al que está en proceso de purificación ritual. «Se está purificando» preserva el proceso y evita reducirlo a una pasiva estática.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - del lado derecho
  - diestra
  lexicon: HALOT
  rationale: En la fórmula ritual repetida, el adjetivo indica simplemente el lado derecho. «Derecha» es la forma natural en español.
- source_word: בֹּהֶן יָדוֹ
  english_pob_choice: the thumb of his right hand
  chosen_spanish: el pulgar de su mano derecha
  alternatives_spanish:
  - el dedo gordo de su mano derecha
  - el pulgar de la mano derecha
  lexicon: HALOT
  rationale: בֹּהֶן se refiere al pulgar en la mano. «Pulgar» es la opción más clara y precisa en español para la mano.
- source_word: בֹּהֶן רַגְלוֹ
  english_pob_choice: the big toe of his right foot
  chosen_spanish: el dedo gordo de su pie derecho
  alternatives_spanish:
  - el pulgar de su pie derecho
  - el dedo mayor de su pie derecho
  lexicon: HALOT
  rationale: En el pie, בֹּהֶן designa el dedo gordo. «Dedo gordo» evita un calco extraño como «pulgar del pie» y mantiene la claridad anatómica.
- source_word: עַל דַּם הָאָשָׁם
  english_pob_choice: on top of the blood of the guilt offering
  chosen_spanish: sobre la sangre de la ofrenda por la culpa
  alternatives_spanish:
  - encima de la sangre de la ofrenda por la culpa
  - sobre la sangre de la ofrenda por el delito
  lexicon: HALOT
  rationale: אָשָׁם es el término técnico sacrificial. «Ofrenda por la culpa» conserva el vínculo con la culpa/culpabilidad sin introducir una paráfrasis doctrinal ajena.
theological_decisions:
- issue: Término sacrificial אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de restitución
  - ofrenda de reparación
  rationale: En español, «ofrenda por la culpa» comunica el valor técnico de אָשָׁם sin cargar de inmediato la lectura con «pecado» (que corresponde a otras ofrendas) ni con una sola opción interpretativa como «reparación».
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Relación espacial entre el aceite y la sangre
  english_pob_reading: on top of the blood of the guilt offering
  chosen_spanish_reading: sobre la sangre de la ofrenda por la culpa
  alternative_spanish_readings:
  - encima de la sangre de la ofrenda por la culpa
  - sobre el mismo lugar marcado por la sangre
  rationale: El hebreo indica que el aceite se aplica sobre el mismo punto previamente marcado por la sangre. El español mantiene la relación con «sobre» sin sobreexplicar en el texto principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente sin cambios sustantivos: se mantiene el valor partitivo de מִיֶּתֶר, la imagen ritual de la mano/palma, la anatomía específica de oreja-mano-pie y la relación espacial del aceite con la sangre.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se usó «ofrenda por la culpa» para אָשָׁם, en continuidad con la decisión inglesa auditada.
  - Se evitó «siervo» o «purificarlo» para no borrar el proceso reflexivo del participio hebreo.
  - «Dedo gordo del pie» se eligió por claridad idiomática en español, manteniendo la referencia anatómica exacta.
