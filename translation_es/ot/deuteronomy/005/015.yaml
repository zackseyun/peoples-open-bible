revisions:
- from: Y recuerda que fuiste esclavo[a] en la tierra de Egipto, y Yahvé tu Dios te sacó de allí con mano poderosa y brazo extendido[b]; por eso Yahvé tu Dios te mandó guardar el día de reposo.
  to: Y recuerda que fuiste esclavo en la tierra de Egipto, y Yahvé tu Dios te sacó de allí con mano poderosa[a] y brazo extendido; por eso Yahvé tu Dios te mandó guardar el día de reposo[b].
  rationale: 'Se conserva casi todo el texto principal porque es fiel y natural, pero se corrige el aparato de notas para que coincida con la evidencia fuente y con la auditoría inglesa: [a] ahora explica «mano poderosa», y [b] se traslada al final para explicar el modismo hebreo detrás de «guardar el día de reposo». También se elimina la nota innecesaria sobre «siervo», que debilitaba la decisión doctrinal de «esclavo».'
  reviewer_model: gpt-5.4
