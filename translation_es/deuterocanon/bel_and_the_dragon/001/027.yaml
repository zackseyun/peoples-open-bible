translation:
  language: es
  text: 'Y Daniel tomó pez, grasa y pelo[a], y los coció juntos, e hizo masas, y las puso en la boca del dragón; y cuando el dragón las hubo comido, reventó. Y dijo: «Vean sus objetos de veneración».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus cosas sagradas” o “las cosas que veneran”; el griego se refiere a objetos tenidos por sagrados o dignos de veneración.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίσσαν
  english_pob_choice: pitch
  chosen_spanish: pez
  alternatives_spanish:
  - brea
  - alquitrán
  lexicon: LSJ
  rationale: πίσσα designa una sustancia resinosa o semejante al alquitrán; en español bíblico y general, 'pez' es un equivalente natural y preciso para este material pegajoso. 'Brea' o 'alquitrán' también son posibles, pero 'pez' conserva mejor la concisión y la textura antigua del relato.
- source_word: στῖρ
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - tallow
  lexicon: LSJ
  rationale: El término alude a grasa animal. 'Grasa' es el término más amplio y comprensible en español. 'Sebo' sería más específico, pero menos transparente para lectores generales.
- source_word: τρίχας
  english_pob_choice: hair
  chosen_spanish: pelo
  alternatives_spanish:
  - cabello
  lexicon: LSJ
  rationale: El griego plural simplemente dice 'hair'. 'Pelo' mantiene la referencia literal sin restringirla a cabello humano.
- source_word: ἥψησεν ἐπὶ τὸ αὐτό
  english_pob_choice: boiled them together
  chosen_spanish: los coció juntos
  alternatives_spanish:
  - los hirvió juntos
  - los coció en una sola mezcla
  lexicon: LSJ
  rationale: ἕψω puede significar cocer o hervir. En español, 'cocerlos juntos' comunica de manera natural la acción de prepararlos combinados; 'los hirvió juntos' sería más literal, pero menos idiomático en este contexto.
- source_word: μάζας
  english_pob_choice: cakes
  chosen_spanish: tortas
  alternatives_spanish:
  - pasteles
  - bollos
  - masas
  lexicon: LSJ
  rationale: μᾶζα refiere a porciones formadas de masa o alimento aplastado/cocido. 'Tortas' funciona bien en español para piezas redondas o compactas de alimento preparado, sin introducir una idea moderna ajena.
- source_word: δράκοντος
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente
  lexicon: LSJ
  rationale: El contexto narrativo trata explícitamente de un δράκων. 'Dragón' preserva la figura literaria y coincide con la tradición de esta historia; 'serpiente' rebajaría el tono del relato.
- source_word: φαγὼν
  english_pob_choice: when the dragon had eaten them
  chosen_spanish: cuando el dragón las hubo comido
  alternatives_spanish:
  - después de comerlas
  - habiéndolas comido
  lexicon: LSJ
  rationale: El participio aoristo se vierte temporalmente. 'Las hubo comido' reproduce bien la anterioridad de la acción en un español elevado y bíblico, y mantiene el orden narrativo.
- source_word: διερράγη
  english_pob_choice: it burst apart
  chosen_spanish: reventó
  alternatives_spanish:
  - se abrió
  - estalló
  - se rompió
  lexicon: LSJ
  rationale: El verbo expresa ruptura violenta. 'Reventó' es breve, natural y transmite con fuerza el resultado súbito; 'se rompió' sería demasiado débil.
- source_word: τὰ σεβάσματα ὑμῶν
  english_pob_choice: your objects of worship
  chosen_spanish: sus objetos de veneración
  alternatives_spanish:
  - sus objetos de culto
  - sus cosas veneradas
  - sus ídolos
  lexicon: LSJ
  rationale: '''σεβάσματα'' son cosas veneradas o reverenciadas. ''Objetos de veneración'' conserva el matiz amplio del griego sin sustituirlo por el más interpretativo ''ídolos''. En contexto polémico, la ironía narrativa queda intacta.'
theological_decisions:
- issue: Término polemico para los objetos venerados
  english_pob_reading: your objects of worship
  chosen_spanish_reading: sus objetos de veneración
  alternative_spanish_readings:
  - sus ídolos
  - sus objetos de culto
  - sus cosas veneradas
  rationale: La lectura en inglés evita endurecer el término con 'idols'. En español, 'objetos de veneración' preserva esa neutralidad relativa y deja que el relato mismo haga la denuncia irónica.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing claims the text does not make.'
translation_notes:
  revision_awareness: La versión sigue el texto griego del LXX de Swete y el audit trail inglés sin cambios sustantivos; se mantiene la secuencia narrativa, el sentido literal de los materiales y la ambigüedad controlada de τὰ σεβάσματα ὑμῶν.
  spanish_consistency_notes:
  - Se usa 'dragón' de manera consistente con la tradición textual de Bel y el Dragón.
  - '''Pez'' se eligió para πίσσα como equivalente español natural de pitch/tar resinosa.'
  - '''Objetos de veneración'' evita imponer ''ídolos'' donde el griego habla más ampliamente de cosas reverenciadas.'
  - La nota al pie se ancla solo en la expresión final, donde nace la principal alternativa lexical.
