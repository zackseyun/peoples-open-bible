translation:
  language: es
  text: Y gobernó sobre todos los reyes, desde el Río[a] hasta la tierra de los filisteos y hasta la frontera de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «el Río» probablemente se refiere al río Éufrates, una designación geográfica habitual en la Biblia hebrea.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And he was
  chosen_spanish: Y fue
  alternatives_spanish:
  - Y estaba
  - Y llegó a ser
  lexicon: HALOT
  rationale: El waw consecutivo con היה introduce el estado o situación histórica; en español, 'fue' sirve como arranque natural de la cláusula y permite integrarlo con el participio siguiente sin sonar forzado.
- source_word: מוֹשֵׁל
  english_pob_choice: ruled
  chosen_spanish: gobernante
  alternatives_spanish:
  - reinaba
  - gobernó
  - ejercía dominio
  lexicon: HALOT
  rationale: El participio de משל expresa ejercer autoridad o dominio. Aquí el español 'gobernante' conserva el valor de función/estado continuo mejor que un perfecto puntual; en combinación con 'fue' comunica la idea de que estaba ejerciendo gobierno sobre los reyes.
- source_word: בְּכָל הַמְּלָכִים
  english_pob_choice: over all the kings
  chosen_spanish: sobre todos los reyes
  alternatives_spanish:
  - entre todos los reyes
  - sobre cada uno de los reyes
  lexicon: HALOT
  rationale: La preposición ב con משל marca el ámbito u objetos del dominio. 'Sobre' expresa bien la relación de superioridad/suzeranía que el inglés POB captó con 'over'.
- source_word: מִן הַנָּהָר
  english_pob_choice: from the River
  chosen_spanish: desde el Río
  alternatives_spanish:
  - desde el Río Éufrates
  - desde el Éufrates
  lexicon: HALOT
  rationale: Se conserva la designación geopolítica tradicional 'el Río' sin explicitar en el texto principal el Éufrates, porque el audit trail inglés también mantiene esa forma literal y la identificación puede quedar para nota.
- source_word: אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: the land of the Philistines
  chosen_spanish: la tierra de los filisteos
  alternatives_spanish:
  - Filistea
  - el territorio de los filisteos
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien אֶרֶץ y mantiene la transparencia geográfica. ''Filisteos'' conserva el etnónimo sin convertirlo en un topónimo más interpretativo.'
- source_word: גְּבוּל מִצְרָיִם
  english_pob_choice: the border of Egypt
  chosen_spanish: la frontera de Egipto
  alternatives_spanish:
  - el borde de Egipto
  - el límite de Egipto
  lexicon: HALOT
  rationale: גְּבוּל puede ser 'frontera' o 'límite'; 'frontera' es la opción más natural y clara en español contemporáneo para una delimitación territorial.
theological_decisions:
- issue: Alcance geopolítico de la fórmula "desde el Río hasta..."
  english_pob_reading: '"the River" likely refers to the Euphrates River, a standard geographic designation in the Hebrew Bible.'
  chosen_spanish_reading: '"el Río" se conserva como designación geopolítica convencional; la referencia probable al Éufrates queda implícita.'
  alternative_spanish_readings:
  - desde el Éufrates
  - desde el río Éufrates
  rationale: No se debe perder la tensión entre la literalidad del hebreo y la referencia histórica probable. Mantener 'el Río' respeta la formulación bíblica recurrente y deja espacio para una nota aclaratoria.
  doctrine_reference: Ninguna doctrina en juego; decisión geográfica y de traducción
- issue: Relación de soberanía sobre otros reyes
  english_pob_reading: over all the kings
  chosen_spanish_reading: sobre todos los reyes
  alternative_spanish_readings:
  - entre todos los reyes
  - por encima de todos los reyes
  rationale: La expresión comunica supremacía política/suzerana. 'Sobre' preserva la fuerza relacional sin suavizarla ni convertirla en mera coexistencia.
  doctrine_reference: Ninguna doctrina en juego; decisión semántica y histórica
translation_notes:
  revision_awareness: Se siguió el paquete fuente proporcionado, que coincide plenamente con la auditoría inglesa (high_agreement) y no presenta revisiones aplicadas; por eso no hubo necesidad de introducir variantes textuales ni emendaciones.
  spanish_consistency_notes:
  - Se mantuvo un registro geográfico sobrio y transparente, sin sustituir nombres propios por equivalentes tradicionales más interpretativos.
  - Se prefirió 'frontera' para גבול y 'tierra' para אֶרֶץ para conservar el paralelismo territorial del hebreo.
  - El texto principal evita explicitar 'Éufrates' para no exceder lo que el hebreo dice, pero la nota lo aclara.
  - No hay términos teológicos sensibles en este versículo; la principal decisión fue de alcance político-geográfico.
