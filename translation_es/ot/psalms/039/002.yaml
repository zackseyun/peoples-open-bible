  source_alignment_summary: 'El borrador transmite bien el sentido del hebreo: una resolución previa de vigilar la conducta para no pecar con la lengua, y de poner una restricción concreta a la boca mientras el malvado está presente. Sin embargo, la nota al pie no preserva la alternativa documentada en la auditoría inglesa, que no trata de אָמַרְתִּי sino de רָשָׁע (‘el malvado’ / ‘un malvado’).'
  spanish_quality_summary: El español es claro y digno. ‘Guardaré mis caminos’ y ‘con mi lengua’ son naturales y fieles. ‘Pondré un bozal a mi boca’ conserva bien la imagen concreta, aunque ‘guardar un bozal para mi boca’ sería más literal; la opción del borrador sigue siendo aceptable en español. El ajuste principal necesario es corregir la nota para reflejar la alternativa significativa del sustantivo masculino singular ‘רָשָׁע’.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección ‘el malvado’ para רָשָׁע está alineada con la decisión inglesa revisada (‘the wicked’) y mantiene el singular masculino sin añadir ‘hombre’.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en ‘Dije’ y explica alternativas de אָמַרְתִּי, pero la auditoría inglesa conserva una nota sobre רָשָׁע.
    rationale: 'La nota inglesa [a] dice: ‘Or “the wicked” or “a wicked person.” The Hebrew is masculine singular.’ Esa alternativa significativa no debe perderse en español. En cambio, las alternativas ‘Pensé’/‘resolví’ solo aparecen en decisiones léxicas, no como nota preservada en el texto auditado.'
  - severity: low
    issue: La alternativa española ‘Resolvía’ en decisiones léxicas es inadecuada como equivalente de ‘I resolved’.
    rationale: En español correspondería ‘resolví’, no el imperfecto ‘resolvía’. Esto no afecta directamente el texto principal, pero confirma que esa nota no debe mantenerse como pie de página del versículo.
  revised_spanish_text: 'Dije: «Guardaré mis caminos para no pecar con mi lengua; pondré un bozal a mi boca mientras el malvado[a] está delante de mí».'
  revised_footnotes:
