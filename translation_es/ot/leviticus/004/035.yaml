translation:
  language: es
  text: Y quitará toda su grasa, como se quita la grasa del cordero del sacrificio de las ofrendas de paz; y el sacerdote la hará arder sobre el altar, sobre las ofrendas de alimento[a] de Yahvé. Así el sacerdote hará expiación por él respecto al pecado que cometió, y será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘ofrendas hechas por fuego a Yahvé’. La expresión hebrea es un término técnico sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבָּהּ / חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - porción grasa
  lexicon: HALOT
  rationale: En español, 'grasa' comunica de modo natural la sustancia animal destinada a ser removida y ofrecida. 'Sebo' puede sonar más técnico o restringido; 'porción grasa' explicita la función, pero añade interpretación que el hebreo no obliga en el texto principal.
- source_word: יָסִיר / יוּסַר
  english_pob_choice: shall remove / is removed
  chosen_spanish: quitará / se quita
  alternatives_spanish:
  - removerá / se removerá
  - tomará aparte / se aparta
  lexicon: HALOT
  rationale: '''Quitar'' conserva el acto ritual de retirar la grasa y es idiomático en español moderno. ''Remover'' suena más técnico y menos natural; ''tomar aparte'' añade una dirección interpretativa no explicitada.'
- source_word: הַכֶּשֶׂב
  english_pob_choice: the lamb
  chosen_spanish: el cordero
  alternatives_spanish:
  - la oveja
  - el carnero joven
  lexicon: HALOT
  rationale: Aunque el término hebreo puede abarcar el animal ovino en general, en contexto sacrificial español 'cordero' es la opción más natural y precisa para el referente probable. 'Oveja' sería demasiado general; 'carnero joven' resulta demasiado explicativo.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de las ofrendas de paz
  alternatives_spanish:
  - el sacrificio de las ofrendas de comunión
  - el sacrificio de paz
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' mantiene la categoría sacrificial tradicional y comprensible. ''Ofrendas de comunión'' aclara el matiz relacional, pero desplaza el término técnico; ''sacrificio de paz'' suena menos natural en español.'
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: hará arder
  alternatives_spanish:
  - quemará
  - ofrecerá en humo
  lexicon: HALOT
  rationale: '''Hará arder'' conserva la acción ritual de consumir la ofrenda por fuego sin volverla demasiado prosaica. ''Quemará'' puede sonar demasiado general; ''ofrecerá en humo'' es más técnico, pero menos idiomático.'
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: la
  alternatives_spanish:
  - las
  - ello
  lexicon: Hebrew grammar
  rationale: Aunque el hebreo es plural, el referente colectivo en español se expresa mejor como singular femenino concordando con 'toda su grasa'. El antecedente inmediato es una masa/porción de grasa, no individuos separados, y el contexto de la frase exige fluidez en español.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: '''Sobre el altar'' reproduce bien la imagen locativa del hebreo y encaja con el acto sacrificial. ''En el altar'' sería menos preciso; ''encima del altar'' es posible, pero más pesado.'
- source_word: עַל אִשֵּׁי יְהוָה
  english_pob_choice: on the food offerings of Yahweh
  chosen_spanish: sobre los alimentos ofrendados a Yahvé
  alternatives_spanish:
  - sobre las ofrendas quemadas de Yahvé
  - sobre las ofrendas hechas por fuego a Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una expresión técnica difícil; 'alimentos ofrendados' sigue la línea del POB inglés de hacer inteligible el término sin perder su carácter cultual. 'Ofrendas hechas por fuego' es más literal, pero en español puede sonar demasiado explicativo y menos natural. 'Yahvé' preserva el nombre divino según la convención del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: Hebrew Bible convention
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, transliterado como 'Yahvé' en español. Se evita 'el SEÑOR' porque enmascara el nombre divino y rompe la transparencia buscada.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: shall make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará expiación por él en favor de él
  - hará atonamiento por él
  lexicon: HALOT
  rationale: '''Hacer expiación'' conserva el marco cultual y teológico del hebreo sin introducir una teoría más estrecha. ''Expiación'' es el equivalente español más estable; ''atonamiento'' no es idiomático.'
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he committed
  chosen_spanish: por el pecado que cometió
  alternatives_spanish:
  - a causa de su pecado que cometió
  - respecto al pecado que cometió
  lexicon: HALOT
  rationale: '''Pecado'' traduce naturalmente חטאת en este contexto, y ''que cometió'' conserva el énfasis en la acción culpable. ''Respecto al pecado'' sería más literal pero menos idiomático; ''a causa de'' puede sonar causal de modo innecesariamente interpretativo.'
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: La pasiva española 'le será perdonado' refleja bien el resultado de la acción ritual y mantiene el sentido de don recibido. 'Se le perdonará' es posible, pero menos enfático en la resultante del procedimiento sacrificial.
theological_decisions:
- issue: Lenguaje de la expiación sacrificial
  english_pob_reading: shall make atonement for him
  chosen_spanish_reading: hará expiación por él
  alternative_spanish_readings:
  - hará propiciación por él
  - hará atonamiento por él
  rationale: El pasaje pertenece al lenguaje sacerdotal de Levítico y describe el efecto ritual de la ofrenda sin definir una teoría sistemática. 'Expiación' preserva la categoría bíblica y evita restringir el sentido a una sola explicación doctrinal.
  doctrine_reference: Terminología sacrificial levítica; cf. Lev 4 y la serie de purificación/expiación en el libro
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La traducción busca transparencia auditiva y textual, por lo que conserva el nombre propio divino en español. 'El SEÑOR' sería una sustitución tradicional, pero oscurece la presencia explícita del Tetragrámaton en el hebreo.
  doctrine_reference: Convención del proyecto para יְהוָה / YHWH
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más reciente del POB inglés: mantiene el singular colectivo del referente de la grasa, conserva la localización cultual ''sobre el altar'', y refleja la construcción final del hebreo con ''por el pecado que cometió'' / ''le será perdonado''. También ajusta el nombre divino al estándar español del proyecto: Yahvé.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, evitando la sustitución por 'SEÑOR'.
  - '''Expiación'' se usa como término técnico sacerdotal, no como explicación doctrinal exhaustiva.'
  - '''Ofrendas de paz'' conserva el nombre tradicional del sacrificio sin introducir una reformulación innecesaria.'
  - La nota al pie marca la alternativa léxica principal para אִשֵּׁי יְהוָה, siguiendo el patrón de transparencia del POB.
