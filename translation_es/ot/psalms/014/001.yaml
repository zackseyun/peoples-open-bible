    text: O, «para el director de música» o «para el maestro del coro».
    reason: lexical_alternative
  - marker: b
    text: «De David» también puede significar «por David» o «para David» en el encabezamiento del salmo.
    reason: lexical_alternative
  - marker: c
    text: El hebreo cambia del singular («el necio») al plural («están corrompidos»), pasando de un individuo representativo a la clase que representa.
    reason: lexical_alternative
  revision_rationale: Se propone una revisión menor para alinear mejor el español con la decisión léxica auditada sobre הִשְׁחִיתוּ, mejorar la naturalidad de la cláusula central y corregir la correspondencia exacta entre marcadores del texto y notas al pie. No hay problema doctrinal ni de fondo; es una reparación pequeña y segura.
