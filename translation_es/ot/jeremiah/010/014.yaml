revisions:
- from: Todo hombre es estúpido[a], sin conocimiento; todo metalúrgico es avergonzado por su ídolo, porque su imagen fundida es mentira[b], y no hay aliento[c] en ellos.
  to: Todo hombre es necio[a], sin conocimiento; todo artesano del metal queda avergonzado por su ídolo, porque su imagen fundida es mentira[c][b], y no hay aliento en ellos.
  rationale: La revisión conserva el significado del hebreo y del POB inglés, pero mejora la naturalidad y dignidad del español meta. «Necio» funciona mejor que «estúpido» en registro bíblico moderno; «artesano del metal» representa mejor a צוֹרֵף que «metalúrgico»; y «queda avergonzado» es más idiomático que «es avergonzado». Se mantuvieron las notas de alternativas léxicas y se corrigió su redacción para mayor fidelidad y claridad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:58Z'
