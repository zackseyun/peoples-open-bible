translation:
  language: es
  text: ¿Tienes ganado? Cuídalo[a]; y si es provechoso[b], consérvalo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «ve con tus ojos». Es decir, obsérvalo o vigílalo cuidadosamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «si es אֻמָּנָה»; la fuerza exacta del adjetivo es incierta, pero el paralelo griego χρήσιμα favorece la idea de algo provechoso o útil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהֵמָה / Κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales domésticos
  - bestias de carga
  - ganado
  lexicon: HALOT; LXX κτήνη
  rationale: En este contexto sapiencial, el hebreo y el griego apuntan a animales poseídos y útiles para el trabajo o la economía doméstica. 'Ganado' comunica posesión y utilidad de manera natural en español, sin reducir indebidamente el sentido a 'vacas' ni hacerlo demasiado general con 'animales'.
- source_word: רְאֵה עֵינֶיךָ / ἐπισκέπτου αὐτά
  english_pob_choice: Keep your eye on it
  chosen_spanish: Cuídalo
  alternatives_spanish:
  - Vigílalo
  - Míralo atentamente
  - Ponle atención
  lexicon: HALOT; LSJ
  rationale: La imagen literal de 'ver con tus ojos' y el griego ἐπισκέπτου expresan inspección cuidadosa y vigilancia. 'Cuídalo' transmite con naturalidad esa supervisión activa en español, manteniendo la fuerza práctica del mandato.
- source_word: אֻמָּנָה / χρήσιμα
  english_pob_choice: profitable
  chosen_spanish: provechoso
  alternatives_spanish:
  - útil
  - rentable
  - beneficioso
  lexicon: HALOT; BDAG/LSJ χρήσιμα
  rationale: La tradición de la POB resolvió la tensión hebreo/griego hacia el valor de utilidad/provecho. 'Provechoso' conserva ese matiz de beneficio práctico sin forzar una lectura demasiado económica como 'rentable'.
- source_word: הַעֲמִידָהּ / ἐμμενέτω σοι
  english_pob_choice: keep it
  chosen_spanish: consérvalo
  alternatives_spanish:
  - mantenlo
  - retenlo
  - déjalo
  - guárdalo
  lexicon: HALOT; LSJ
  rationale: El hebreo literalmente sugiere 'hacerlo permanecer', y el griego apunta a que siga contigo. 'Consérvalo' expresa bien la idea de retenerlo y mantenerlo en posesión, con un tono sobrio y publicable en español.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: mantiene el singular para concordar con el sustantivo hebreo singular y refleja la decisión de traducir אֻמָּנָה con un término de utilidad/provecho, en diálogo con χρήσιμα del griego.'
  spanish_consistency_notes:
  - Se usó 'ganado' para un referente singular colectivo, en paralelo con el singular del hebreo y del ajuste revisado en inglés.
  - '''Cuídalo'' y ''consérvalo'' preservan la lógica imperativa breve del proverbio sin añadir explicación interpretativa al cuerpo del texto.'
  - Las notas a pie de página conservan la tensión léxica entre el hebreo incierto y el griego más explícito.
