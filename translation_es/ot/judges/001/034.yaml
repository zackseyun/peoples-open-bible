translation:
  language: es
  text: Y los amorreos[a] hicieron retroceder a los hijos de Dan hacia la región montañosa[b], porque no les permitieron bajar al valle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el amorreo"; el hebreo usa una forma singular colectiva, pero el sentido en contexto es plural.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "hacia la montaña"; aquí se entiende como la región montañosa en contraste con el valle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְחֲצוּ
  english_pob_choice: pressed ... back
  chosen_spanish: presionaron
  alternatives_spanish:
  - apretaron
  - oprimieron
  - forzaron
  lexicon: HALOT
  rationale: El hebreo expresa la idea de apretar, oprimir o poner bajo presión. En español, "presionaron" conserva esa fuerza hostil sin añadir más de lo que el contexto requiere; el complemento direccional "hacia la región montañosa" comunica el efecto de empujarlos fuera de la llanura.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el sentido contextual es de un pueblo/grupo étnico. En español, el plural colectivo "los amorreos" es natural y mantiene la lectura comunitaria que el audit trail inglés documenta.
- source_word: בְּנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los danitas
  - el pueblo de Dan
  lexicon: HALOT
  rationale: Se conserva la expresión filial/tribal del hebreo. "Los hijos de Dan" es transparente y fiel; "danitas" sería más idiomático, pero suaviza la forma fuente.
- source_word: הָהָרָה
  english_pob_choice: into the hill country
  chosen_spanish: hacia la región montañosa
  alternatives_spanish:
  - a la región montañosa
  - hacia la montaña
  - a la serranía
  lexicon: HALOT
  rationale: El hebreo indica movimiento direccional hacia la zona alta. "Región montañosa" expresa bien el contraste geográfico con "el valle". Se prefirió "hacia" para reflejar el matiz direccional de la forma hebrea, aunque no se explicite "entrada".
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque no
  lexicon: HALOT
  rationale: Introduce una razón causal directa; "porque" es la opción más clara y natural en español.
- source_word: לֹא נְתָנוֹ
  english_pob_choice: they did not allow them
  chosen_spanish: no les permitieron
  alternatives_spanish:
  - no los dejaron
  - no les dieron permiso
  - no les concedieron
  lexicon: HALOT
  rationale: El hebreo usa una construcción permisiva que el inglés resolvió con sentido colectivo plural. En español, "no les permitieron" preserva tanto la idea de impedir como la pluralidad contextual del sujeto sin perder la tensión gramatical del original.
- source_word: לָרֶדֶת
  english_pob_choice: to go down
  chosen_spanish: bajar
  alternatives_spanish:
  - descender
  - ir abajo
  lexicon: HALOT
  rationale: En un contexto geográfico, "bajar" es el equivalente más natural y comunica el movimiento desde la zona alta al valle con claridad.
- source_word: לָעֵמֶק
  english_pob_choice: into the valley
  chosen_spanish: al valle
  alternatives_spanish:
  - hacia el valle
  - en el valle
  lexicon: HALOT
  rationale: עֵמֶק se refiere a un valle o depresión baja. "Al valle" mantiene la dirección del movimiento y la contraposición con "región montañosa".
theological_decisions:
- issue: Lectura colectiva singular/plural del sujeto amorreo y del complemento pronominal
  english_pob_reading: The Hebrew uses collective singular forms for the people group, while the sense in context is plural.
  chosen_spanish_reading: 'Se traduce en plural colectivo: "los amorreos" y "no les permitieron".'
  alternative_spanish_readings:
  - el amorreo ... no le permitió
  - el amorreo ... no los dejó
  rationale: La forma hebrea es singular colectiva, pero el contexto narrativo apunta a un pueblo actuando contra otro grupo. El español requiere decidir entre la forma gramatical y la claridad contextual; aquí se sigue la lectura colectiva plural que el audit trail inglés ya documenta.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se mantiene la lectura sin cambios respecto del audit trail inglés más reciente: el sujeto etnónimo funciona colectivamente, la dirección es de ascenso hacia la zona alta y el motivo es impedir el descenso al valle. No se detectaron revisiones aplicadas en el expediente fuente.'
  spanish_consistency_notes:
  - Se conserva "amorreos" en plural colectivo para armonizar con el sentido contextual y con la práctica POB auditada.
  - '"Hijos de Dan" se mantiene literalmente para preservar la estructura tribal hebrea.'
  - '"Región montañosa" evita el calco duro de "montaña" y refleja el contraste geográfico del verso.'
  - '"Bajar al valle" conserva la oposición espacial entre altura y depresión sin agregar interpretaciones.'
  - Se evita introducir lenguaje teológico ajeno; el versículo es narrativo y geográfico.
