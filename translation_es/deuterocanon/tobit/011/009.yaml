  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están bien encaminadas, salvo que παιδίον se vierte mejor como «hijo» aquí por contexto maternal y por evitar una infantilización innecesaria en español.
