    rationale: Se afirma que se preserva la ambigüedad del sujeto, pero la redacción con 'lo exaltó y lo santificó' introduce además un objeto definido que estrecha la interpretación.
  revised_spanish_text: De entre ellos exaltó y santificó[a], y de entre ellos estableció un número fijo de días[b].
