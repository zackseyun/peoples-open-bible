revisions:
- from: Pero si su mano no halla lo suficiente para restituírselo[a], entonces su venta quedará en poder del que lo compró hasta el año del jubileo; y en el jubileo saldrá, y él volverá a su posesión.
  to: Pero si su mano no halla lo suficiente para restituírselo, entonces lo que vendió quedará en poder del que lo compró hasta el año del jubileo; y saldrá en el jubileo, y él volverá[a] a su posesión.
  rationale: Se reemplaza 'su venta' por 'lo que vendió' para reflejar con mayor fidelidad que מִמְכָּרוֹ aquí apunta al bien vendido. Se mantiene la lectura principal personal ('él volverá') por coherencia con el POB inglés y el contexto del jubileo, y se conserva la ambigüedad en nota de forma más precisa. No se requiere adjudicación adicional.
