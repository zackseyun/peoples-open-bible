translation:
  language: es
  text: Entonces Yahvé rechazó a toda la descendencia[a] de Israel, y los afligió y los entregó en manos de saqueadores[b], hasta que los echó de su presencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «semilla/descendencia de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los entregó en mano de saqueadores».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de delante de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְאַס
  english_pob_choice: rejected
  chosen_spanish: rechazó
  alternatives_spanish:
  - despreció
  - rechazó
  - repudió
  lexicon: HALOT
  rationale: מָאַס expresa rechazo decisivo; «rechazó» comunica la fuerza judicial del verbo sin añadir el matiz emocional más fuerte de «despreció».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino; el estándar español del proyecto exige «Yahvé» para preservar el tetragrámaton sin sustituirlo por un título.
- source_word: בְּכָל זֶרַע יִשְׂרָאֵל
  english_pob_choice: all the offspring of Israel
  chosen_spanish: a todo el linaje de Israel
  alternatives_spanish:
  - a toda la descendencia de Israel
  - a toda la semilla de Israel
  lexicon: HALOT
  rationale: זֶרַע puede significar semilla, descendencia u offspring. «Linaje» mantiene el sentido colectivo y genealógico en español, con un registro natural y digno.
- source_word: וַיְעַנֵּם
  english_pob_choice: afflicted them
  chosen_spanish: los afligió
  alternatives_spanish:
  - los humilló
  - los oprimió
  lexicon: HALOT
  rationale: ענה en piel puede ser afligir, humillar u oprimir. «Afligió» sigue bien la secuencia de juicio divino y evita restringir el verbo a opresión social.
- source_word: וַיִּתְּנֵם בְּיַד
  english_pob_choice: gave them into the hand of
  chosen_spanish: los entregó en mano de
  alternatives_spanish:
  - los entregó en manos de
  - los puso en mano de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica poner bajo el poder de otro. «Los entregó en mano de» conserva la imagen bíblica y la relación de dominio.
- source_word: שֹׁסִים
  english_pob_choice: plunderers
  chosen_spanish: saqueadores
  alternatives_spanish:
  - despojadores
  - plunderadores
  lexicon: HALOT
  rationale: El participio de שסס alude a quienes despojan o saquean. «Saqueadores» es claro en español y mantiene la violencia predatoria del término.
- source_word: עַד אֲשֶׁר
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el punto de que
  - hasta que finalmente
  lexicon: HALOT
  rationale: La combinación introduce el límite temporal de la acción; «hasta que» es la forma más natural y fiel en español.
- source_word: הִשְׁלִיכָם
  english_pob_choice: he had cast them out
  chosen_spanish: los echó
  alternatives_spanish:
  - los arrojó
  - los expulsó
  lexicon: HALOT
  rationale: השליך literalmente es echar/arrojar. En este contexto judicial, «los echó» comunica expulsión sin sobreinterpretar con un término más técnico.
- source_word: מִפָּנָיו
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de él
  - fuera de su vista
  lexicon: HALOT
  rationale: La idiomática hebrea «de delante de su rostro» expresa alejamiento de su presencia. «De su presencia» conserva el sentido relacional y judicial con naturalidad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el Nombre propio del texto hebreo en vez de sustituirlo por un título. La forma «Yahvé» es la convención base del proyecto para el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de «todo el linaje de Israel»
  english_pob_reading: retain the comprehensive wording without narrowing it in translation
  chosen_spanish_reading: conservar la amplitud de la expresión sin resolverla más allá del texto
  alternative_spanish_readings:
  - limitarlo al reino del norte
  - entenderlo como todos los descendientes étnicos de Jacob en sentido absoluto
  rationale: La traducción mantiene la universalidad verbal del hebreo y no fuerza una reducción histórica que el verso no explicita. El contexto narrativo sí apunta al reino del norte, pero esa precisión queda implícita, no resuelta en la línea.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran revisiones aplicadas y el resumen de control indica alta concordancia, por lo que se mantiene la línea de traducción ya validada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva la metáfora forense/relacional de «su presencia» sin suavizarla a una paráfrasis más interpretativa.
  - «Saqueadores» mantiene la fuerza léxica de שֹׁסִים sin introducir tecnicismos innecesarios.
