translation:
  language: es
  text: Valórala mucho[a] y ella te exaltará[b]; te honrará cuando la abraces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘Atesórala’ o ‘Tenla en alta estima’. El verbo inicial es raro y puede expresar valorar, apreciar con cariño o ensalzar a la sabiduría.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘porque la abrazas’. La cláusula también puede leerse de manera causal; aquí se sigue la lectura temporal/circunstancial de la POB inglesa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַלְסְלֶהָ
  english_pob_choice: Prize her highly
  chosen_spanish: Atesórala
  alternatives_spanish:
  - Estímala mucho
  - Valórala altamente
  - Cásala en alta estima
  lexicon: HALOT
  rationale: El verbo hebreo es raro y la POB inglesa decidió evitar una repetición artificial con ‘exaltar’. En español, ‘atesorar’ comunica bien el valor intenso y afectivo de la sabiduría sin perder la idea de apreciarla en alto grado. ‘Estímala mucho’ es posible, pero algo menos vívido; ‘valórala altamente’ suena demasiado técnico.
- source_word: וּתְרוֹמְמֶךָּ
  english_pob_choice: and she will exalt you
  chosen_spanish: y ella te exaltará
  alternatives_spanish:
  - y ella te levantará en alto
  - y ella te elevará
  lexicon: HALOT
  rationale: רומם expresa elevar, exaltar. ‘Exaltará’ conserva el tono honorífico y la personificación femenina de la sabiduría. ‘Levantará en alto’ o ‘elevará’ son comprensibles, pero menos naturales y menos marcados en el registro sapiencial.
- source_word: תְּכַבֵּדְךָ
  english_pob_choice: she will honor you
  chosen_spanish: te honrará
  alternatives_spanish:
  - te dará honor
  - te glorificará
  - te hará pesado
  lexicon: HALOT
  rationale: El piel de כבד aquí comunica otorgar honra. ‘Te honrará’ es la equivalencia española más clara y fiel; ‘glorificará’ sería demasiado fuerte en este contexto, y ‘te hará pesado’ reproduce la imagen etimológica pero no la función contextual.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: Siguiendo la lectura contextual de la POB, כִּי introduce la circunstancia en que ocurre el honor, no necesariamente una causa estricta. ‘Cuando’ fluye de manera natural en español y preserva esa relación temporal/circunstancial.
- source_word: תְחַבְּקֶנָּה
  english_pob_choice: you embrace her
  chosen_spanish: la abraces
  alternatives_spanish:
  - la estreches contra ti
  - la tomes en brazos
  - la recibas con cariño
  lexicon: HALOT
  rationale: חבק significa abrazar. ‘La abraces’ conserva el verbo directo y la imagen de aferrar a la sabiduría como una mujer personificada. Mantiene también el tono proverbial e íntimo del hebreo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que mantiene sin cambios la solución óptima. La traducción española refleja esa misma decisión de evitar una repetición innecesaria entre el primer y el segundo verbo, pero sin debilitar el paralelismo hebreo.
  spanish_consistency_notes:
  - 'Se mantuvo el sujeto femenino singular para la sabiduría personificada: ‘ella’ / ‘la’.'
  - 'Se preservó el paralelismo verbal del hebreo con dos promesas consecutivas: valoración inicial y exaltación/honor posteriores.'
  - Se usó ‘cuando’ para כי, en continuidad con la decisión auditada de la POB inglesa, sin excluir que el matiz causal siga siendo posible.
