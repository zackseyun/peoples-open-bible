translation:
  language: es
  text: Tuyo es un brazo con fuerza[a]; tu mano es fuerte; tu diestra es exaltada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú tienes un brazo con poder; tu mano muestra fuerza; tu diestra es levantada en alto».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְךָ
  english_pob_choice: Yours is
  chosen_spanish: Tuyo es
  alternatives_spanish:
  - Tú tienes
  - Te pertenece
  lexicon: HALOT
  rationale: La construcción posesiva enfática se conserva mejor en español con 'Tuyo es', que mantiene el arranque prominente del verso sin volverlo tosco. 'Te pertenece' es posible, pero suena más explicativo que poético.
- source_word: זְרוֹעַ
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - brazo
  - fuerza
  - poder
  lexicon: HALOT
  rationale: El hebreo mantiene la imagen corporal de poder. 'Brazo' es el equivalente natural en español bíblico para conservar la metáfora sin abstraerla en 'fuerza' o 'poder'.
- source_word: עִם גְּבוּרָה
  english_pob_choice: with might
  chosen_spanish: con poder
  alternatives_spanish:
  - con poder
  - con fuerza
  - en poder
  lexicon: HALOT
  rationale: La preposición עִם con גְּבוּרָה indica acompañamiento o caracterización. 'Con poder' preserva esa relación de manera clara y idiomática en español.
- source_word: תָּעֹז
  english_pob_choice: is strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - es fuerte
  - muestra fuerza
  - prevalece
  lexicon: HALOT
  rationale: El valor predicativo se vierte de forma natural con 'es fuerte'. 'Muestra fuerza' explicita la idea, pero añade un matiz menos directo; 'prevalece' se aleja del campo semántico principal.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica básica de la acción poderosa de Dios. 'Mano' es la equivalencia directa y transparente.
- source_word: תָּרוּם
  english_pob_choice: is exalted
  chosen_spanish: es exaltada
  alternatives_spanish:
  - es exaltada
  - está levantada en alto
  - es alzada
  lexicon: HALOT
  rationale: '''Exaltada'' mantiene tanto la altura como la dignidad/potencia del hebreo רום, y funciona bien en el paralelismo poético con ''es fuerte''.'
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  - tu diestra
  lexicon: HALOT
  rationale: '''Diestra'' es la forma bíblica y poética más concisa para יְמִינֶךָ, preservando el paralelismo y la carga simbólica de la mano derecha como lugar de poder y victoria.'
theological_decisions:
- issue: Imagen corporal aplicada a Dios
  english_pob_reading: Retain the bodily imagery ('arm,' 'hand,' 'right hand') in the main text.
  chosen_spanish_reading: Conservar la imagen corporal ('brazo', 'mano', 'diestra') en el texto principal.
  alternative_spanish_readings:
  - Abstractar la imagen como 'poder' o 'fuerza'
  rationale: El verso usa antropomorfismo poético para hablar del poder de Yahvé. Mantener la imagen sigue la primacía del texto original y evita borrar el paralelismo hebreo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto auditado en inglés no muestra revisiones aplicadas; el último pase indica que no hubo cambios y el nivel de acuerdo fue alto, con solo observaciones menores. La redacción española sigue esa línea estable, conservando la imaginería corporal y la fuerza poética del hebreo.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y digno, evitando 'SEÑOR' como máscara para el nombre divino, aunque aquí no aparece el Tetragrámaton.
  - '''Brazo'', ''mano'' y ''diestra'' conservan el paralelismo hebreo y la metáfora de poder.'
  - '''Tuyo es'' refleja mejor el valor posesivo enfático inicial que una paráfrasis explicativa.'
