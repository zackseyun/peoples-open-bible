review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del hebreo y la línea del POB en cuanto a la redención, la conducción divina y la amplitud deliberada de 'tu morada santa'. Sin embargo, pierde la distinción verbal documentada entre נָחִיתָ ('has guiado/has llevado') y נֵהַ֥לְתָּ ('has conducido/has guiado') al invertir en el texto principal lo que luego explica en las decisiones léxicas. También 'hasta' para אֶל es defendible, pero 'a' se ajusta mejor al valor básico de destino sin añadir matiz de trayecto.
  spanish_quality_summary: 'El español es claro y digno, pero conviene alinear mejor el texto principal con la justificación léxica y con el paralelismo poético: ''has llevado'' o ''has guiado'' en la primera cola y ''has guiado'' en la segunda suena natural y mantiene la diferencia semántica. ''Tu santa morada'' fluye un poco mejor que ''tu morada santa'' en registro bíblico moderno, aunque ambas son aceptables.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Redimiste' preserva bien גאל. 'Amor constante' es aceptable para חֶסֶד, aunque 'amor fiel' también sería posible; no requiere cambio. La nota sobre la amplitud de 'tu santa morada' está bien encaminada.
  issues:
  - severity: medium
    issue: El texto principal invierte la distinción entre los dos verbos hebreos respecto de las decisiones léxicas documentadas.
    rationale: נָחִיתָ fue explicado como 'has guiado/has llevado' y נֵהַ֥לְתָּ como 'has conducido/has guiado' para preservar una diferencia semántica. El borrador pone 'has guiado' primero y 'has conducido' después, pero luego justifica exactamente lo contrario en la segunda decisión léxica. Conviene armonizar el texto con la rationale auditada.
  - severity: low
    issue: '''Hasta'' para אֶל añade un matiz más fuerte de recorrido/completitud que el hebreo no exige.'
    rationale: אֶל marca movimiento hacia un destino. 'A' es la equivalencia más directa y natural en español; 'hasta' no es incorrecto, pero es algo más interpretativo.
  - severity: low
    issue: La nota a [a] cambia la razón de la nota inglesa de alternativa léxica por 'alternative_reading'.
    rationale: 'No afecta el texto bíblico, pero conviene mantener la naturaleza de la nota: es una alternativa de formulación para עַם זוּ, no una lectura textual distinta.'
  revised_spanish_text: En tu amor constante has llevado al pueblo que redimiste[a]; en tu fuerza los has guiado a tu santa morada[b].
