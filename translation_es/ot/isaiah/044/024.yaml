  to: 'Así dice Yahvé, tu Redentor, el que te formó desde el vientre: yo soy Yahvé, que hago todas las cosas, que yo solo extendí los cielos, y extendí la tierra por mí mismo[a].'
  rationale: Se reubica la nota al lugar correcto, porque comenta la cláusula final difícil y no el nombre divino. También se suaviza la redacción final para un español más natural y para reflejar mejor la agencia exclusiva de Yahvé en ambos miembros de la frase, sin alterar el sentido del hebreo ni la decisión teológica documentada.
