  text: וְ/אִ֕ישׁ אֲשֶׁ֥ר יִגַּ֖ע בְּ/מִשְׁכָּב֑/וֹ יְכַבֵּ֧ס בְּגָדָ֛י/ו וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָמֵ֥א עַד הָ/עָֽרֶב־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/015/005.yaml
  text: And a man who touches his bed shall wash his clothes and bathe in water[b][a], and he shall be unclean until the evening.
  footnotes:
