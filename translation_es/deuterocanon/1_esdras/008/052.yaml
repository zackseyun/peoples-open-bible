translation:
  language: es
  text: Porque me avergoncé de pedir hombres a caballo y soldados de a pie como escolta, por seguridad contra los que nos eran hostiles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballería e infantería como escolta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετράπην
  english_pob_choice: I was ashamed
  chosen_spanish: me avergoncé
  alternatives_spanish:
  - sentí vergüenza
  - me dio vergüenza
  lexicon: BDAG
  rationale: El aoristo pasivo expresa vergüenza o embarazo. «Me avergoncé» conserva la fuerza afectiva y suena natural en español, sin suavizar la reserva del hablante.
- source_word: αἰτῆσαι
  english_pob_choice: to ask for
  chosen_spanish: pedir
  alternatives_spanish:
  - solicitar
  - pedirle
  lexicon: BDAG
  rationale: El infinitivo indica hacer una petición. «Pedir» es claro, idiomático y suficientemente cercano al griego.
- source_word: ἵππεις
  english_pob_choice: horsemen
  chosen_spanish: caballería
  alternatives_spanish:
  - hombres a caballo
  - jinetes
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «hombres a caballo», en español «caballería» comunica bien la fuerza militar montada. Se conserva además la alternativa en nota para reflejar el matiz lexical.
- source_word: πεζοὺς
  english_pob_choice: foot soldiers
  chosen_spanish: tropas de a pie
  alternatives_spanish:
  - infantería
  - soldados de a pie
  lexicon: LSJ
  rationale: πεζοί contrasta con la caballería como tropas en tierra. «Tropas de a pie» es natural y mantiene el contraste militar sin sonar excesivamente técnico.
- source_word: προπομπὴν
  english_pob_choice: as an escort
  chosen_spanish: como escolta
  alternatives_spanish:
  - como acompañamiento
  - como convoy
  lexicon: LSJ
  rationale: El término alude a un acompañamiento protector. «Como escolta» expresa de modo directo esa función en español.
- source_word: ἕνεκεν ἀσφαλείας
  english_pob_choice: for safety
  chosen_spanish: por seguridad
  alternatives_spanish:
  - para seguridad
  - por protección
  lexicon: BDAG
  rationale: La frase expresa propósito. «Por seguridad» es breve, natural y fiel al sentido de protección para el viaje.
- source_word: τῆς πρὸς τοὺς ἐναντίους ἡμῖν
  english_pob_choice: against those hostile to us
  chosen_spanish: contra los que nos eran hostiles
  alternatives_spanish:
  - contra nuestros enemigos
  - contra los adversarios que teníamos
  lexicon: LSJ
  rationale: La construcción griega apunta a personas hostiles u opuestas. «Los que nos eran hostiles» preserva el valor adjetival de ἐναντίους sin convertirlo en una categoría militar más fuerte que la del texto.
theological_decisions:
- issue: Relación con el paralelo masorético de Esdras 8:22, que trae otra escena y otro contenido
  english_pob_reading: Translate the Greek military-escort statement directly, without importing the MT's fasting/prayer language.
  chosen_spanish_reading: Traducir directamente la afirmación griega sobre la escolta militar, sin introducir ayuno ni oración del paralelo hebreo.
  alternative_spanish_readings:
  - Armonizar con el paralelo y omitir la escolta
  - Reformular hacia una petición de ayuda divina
  rationale: En 1 Esdras el testimonio griego es la fuente primaria; el paralelo hebreo sirve como comprobación, no como control. Aquí no coincide con el contenido de este versículo, así que la traducción debe seguir el griego y mantener la referencia a la escolta.
  doctrine_reference: 'PHILOSOPHY.md: en libros deuterocanónicos, el texto fuente principal es Swete LXX; los paralelos WLC funcionan como control cruzado, no como testigo determinante.'
translation_notes:
  revision_awareness: El texto coincide con la última pasada revisada y no requiere cambios adicionales; se conserva la decisión de traducir el griego directamente y la nota lexical sobre el binomio militar.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene el registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Caballería» y «tropas de a pie» conservan el contraste militar del griego con fluidez en español.
  - La nota al pie refleja la alternativa lexical documentada por el audit trail inglés.
