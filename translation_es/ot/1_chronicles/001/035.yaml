translation:
  language: es
  text: 'Los hijos de Esaú: Elifaz, Reuel[a], Jeús, Jalam y Coré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Reuel» también puede aparecer como «Raguel» en algunas tradiciones en inglés, pero eso refleja otra vía de transliteración y no un nombre hebreo distinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En una lista genealógica, el plural constructo de בן expresa parentesco filial directo. En español, «los hijos de» es la forma más natural y exacta para mantener ese valor genealógico sin ampliar innecesariamente a «descendientes».
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esao
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado al uso bíblico español estándar como «Esaú». Conserva la referencia directa al personaje sin latinizarlo más allá de lo necesario.
- source_word: אֱלִיפַז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Elihfaz
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado según el uso bíblico español habitual «Elifaz». Refleja fielmente el hebreo y coincide con la tradición española más asentada.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Raguel
  lexicon: N/A (nombre propio)
  rationale: Se conserva «Reuel» porque el hebreo apunta claramente a esa forma; «Raguel» pertenece a otra tradición de transliteración mediada por griego/latín, no a un nombre distinto. La nota mantiene visible la alternativa histórica sin adoptarla en el texto principal.
- source_word: וִיעוּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Yeús
  lexicon: N/A (nombre propio)
  rationale: Para el nombre אישי con waw conjuntiva, se adopta la forma española bíblica «Jeús», que refleja la tradición de transliteración usual y conserva la identificación convencional del nombre.
- source_word: וְיַעְלָם
  english_pob_choice: Jalam
  chosen_spanish: Jalam
  alternatives_spanish:
  - Yalam
  lexicon: N/A (nombre propio)
  rationale: Se mantiene «Jalam» como forma bíblica española tradicional, coherente con la convención de transliterar nombres propios según el uso eclesial y literario recibido.
- source_word: וְקֹרַח
  english_pob_choice: and Korah
  chosen_spanish: y Coré
  alternatives_spanish:
  - y Koraj
  lexicon: N/A (nombre propio)
  rationale: «Coré» es la forma española bíblica estándar para קֹרַח. Aunque «Korah» sería más cercano al inglés auditado, la forma española tradicional es más inteligible y estable para lectores de Biblia en español.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; el corte actual muestra alta concordancia con el hebreo (verificación 1.0), así que la versión española sigue de cerca la lista genealógica sin añadir ni omitir elementos.
  spanish_consistency_notes:
  - Se conservó el orden de los cinco nombres del hebreo.
  - Se usó una forma española bíblica estable para cada nombre propio, evitando calcos innecesarios del inglés cuando la tradición española ofrece una forma reconocible.
  - La nota de pie se ancla en «Reuel» para preservar la alternativa de transliteración documentada en el audit trail.
