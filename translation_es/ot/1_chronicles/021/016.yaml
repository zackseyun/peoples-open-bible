translation:
  language: es
  text: David alzó los ojos y vio al ángel de Yahvé[a] de pie entre la tierra y los cielos, con su espada desenvainada en la mano, extendida sobre Jerusalén. Entonces David y los ancianos, cubiertos de saco, cayeron sobre sus rostros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre la tierra y el cielo». El hebreo dice «entre la tierra y los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - miró hacia arriba
  lexicon: HALOT
  rationale: Conserva el modismo hebreo de manera natural en español y mantiene el tono solemne del relato.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el ángel de Yahweh
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: «Ángel» mantiene el valor habitual de מַלְאַךְ en este contexto, y «Yahvé» sigue la pauta del proyecto para el nombre divino, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el nombre divino con la forma establecida del proyecto en español, preservando la identidad personal del nombre pactal.
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - parado
  lexicon: HALOT
  rationale: «De pie» expresa con naturalidad la postura visible del mensajero sin añadir una idea de permanencia ajena al contexto.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמַיִם
  english_pob_choice: between the earth and the heavens
  chosen_spanish: entre la tierra y los cielos
  alternatives_spanish:
  - entre la tierra y el cielo
  - entre la tierra y los cielos
  lexicon: HALOT
  rationale: «Tierra» y «cielos» conservan el contraste cósmico y el plural hebreo de שָׁמַיִם, con un español claro y reverente.
- source_word: וְחַרְבּוֹ שְׁלוּפָה
  english_pob_choice: with his sword drawn
  chosen_spanish: con su espada desenvainada
  alternatives_spanish:
  - con la espada desenvainada
  - con su espada sacada
  lexicon: HALOT
  rationale: «Desenvainada» es el equivalente natural y preciso de una espada sacada de la vaina, manteniendo el matiz amenazante.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en su mano
  - en su mano derecha
  lexicon: HALOT
  rationale: La frase española se integra de forma idiomática con el referente ya claro en el contexto inmediato.
- source_word: נְטוּיָה עַל יְרוּשָׁלִָם
  english_pob_choice: stretched out over Jerusalem
  chosen_spanish: extendida sobre Jerusalén
  alternatives_spanish:
  - tendida sobre Jerusalén
  - alzada sobre Jerusalén
  lexicon: HALOT
  rationale: «Extendida» reproduce el gesto de amenaza visual sin forzar una metáfora adicional; conserva la tensión del pasaje.
- source_word: וַיִּפֹּל ... עַל פְּנֵיהֶם
  english_pob_choice: fell on their faces
  chosen_spanish: cayeron sobre su rostro
  alternatives_spanish:
  - cayeron sobre sus rostros
  - se postraron
  lexicon: HALOT
  rationale: La expresión refleja la postración reverente. Se usa el singular genérico «su rostro» para un giro bíblico natural en español, sin perder el sentido colectivo.
- source_word: וְהַזְּקֵנִים
  english_pob_choice: and the elders
  chosen_spanish: y los ancianos
  alternatives_spanish:
  - y los líderes
  - y los mayores
  lexicon: HALOT
  rationale: «Ancianos» conserva el término institucional y narrativo habitual del hebreo bíblico.
- source_word: מְכֻסִּים בַּשַּׂקִּים
  english_pob_choice: covered in sackcloth
  chosen_spanish: cubiertos de saco
  alternatives_spanish:
  - vestidos de saco
  - envueltos en saco
  lexicon: HALOT
  rationale: «Saco» reproduce el referente cultural del hebreo para la tela penitencial; «cubiertos» sigue de cerca la forma pasiva del participio.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea del proyecto exige preservar el nombre propio divino como transliteración. En este versículo, el ángel pertenece a Yahvé, y la forma «Yahvé» evita la sustitución por un título y mantiene la transparencia auditiva y teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de humillación ritual con saco y postración
  english_pob_reading: covered in sackcloth ... fell on their faces
  chosen_spanish_reading: cubiertos de saco ... cayeron sobre su rostro
  alternative_spanish_readings:
  - vestidos de saco ... se postraron
  - envueltos en saco ... cayeron boca abajo
  rationale: Se conserva la imagen corporal y penitencial sin suavizarla. «Saco» mantiene la señal cultural de duelo/arrepentimiento, y la postración expresa la gravedad de la escena.
  doctrine_reference: Uso narrativo y penitencial del vestuario de duelo en el AT
translation_notes:
  revision_awareness: 'El texto sigue el pasaje hebreo masorético y concuerda con la auditoría inglesa: mantiene «Yahvé» para el Tetragrámaton, conserva el plural «cielos» como reflejo de שָׁמַיִם y reproduce la postración final con una formulación idiomática en español. No se introdujeron cambios textuales respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto en español.
  - Se prefirió «cielos» para respetar el plural hebreo de שָׁמַיִם.
  - «Saco» conserva el valor cultural de sackcloth sin reemplazarlo por un término más interpretativo.
  - La escena de postración se mantiene con un equivalente bíblico claro y natural en español.
