translation:
  language: es
  text: Y sucederá que, a causa de la abundancia de leche que da, comerá cuajada[a]; porque cuajada y miel comerá todo el que quede en medio de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mantequilla». El hebreo חֶמְאָה puede referirse más ampliamente a productos lácteos espesados o cuajados, no necesariamente a la mantequilla moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: Expresa la fórmula futura narrativa de manera natural en español, manteniendo el valor de anuncio de evento futuro.
- source_word: מֵרֹב
  english_pob_choice: because of the abundance of
  chosen_spanish: a causa de la abundancia de
  alternatives_spanish:
  - por la abundancia de
  - debido a la abundancia de
  lexicon: HALOT
  rationale: Conserva el matiz causal del hebreo y su relación con la abundancia sin volverlo demasiado libre.
- source_word: עֲשׂוֹת חָלָב
  english_pob_choice: milk he gives
  chosen_spanish: leche
  alternatives_spanish:
  - producción de leche
  - el dar leche
  lexicon: HALOT
  rationale: El hebreo apunta a la generación o producción de leche; en español, la frase causal puede mantenerse de forma concisa sin forzar una perífrasis pesada. El sujeto elíptico continúa el del contexto inmediato.
- source_word: יֹאכַל חֶמְאָה
  english_pob_choice: he will eat curds
  chosen_spanish: comerá cuajada
  alternatives_spanish:
  - comerá requesón
  - comerá mantequilla
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada de evitar 'butter' moderno, 'cuajada' transmite un producto lácteo espeso/coagulado compatible con el contexto pastoril.
- source_word: חֶמְאָה וּדְבַשׁ
  english_pob_choice: curds and honey
  chosen_spanish: cuajada y miel
  alternatives_spanish:
  - cuajada y panal
  - mantequilla y miel
  lexicon: HALOT
  rationale: Mantiene la collocación tradicional de alimento abundante, respetando el sentido de חֶמְאָה como producto lácteo espeso.
- source_word: כָּל הַנּוֹתָר
  english_pob_choice: everyone left
  chosen_spanish: todo el que quede
  alternatives_spanish:
  - todos los que queden
  - todo restante
  lexicon: HALOT
  rationale: El participio sustantivado funciona como expresión de los sobrevivientes; en español, 'todo el que quede' conserva la referencia personal y naturalidad.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - dentro de la tierra
  lexicon: HALOT
  rationale: Preserva la imagen espacial de בקרב. 'Tierra' mantiene la amplitud geográfica del hebreo; 'país' sería más restrictivo y menos transparente.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB, que ajustó el verbo de la primera cláusula a una forma más natural ('gives'). Se conservó la decisión auditada de renderizar חֶמְאָה con un término lácteo no anacrónico y de mantener el paralelismo con 'cuajada y miel'.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - '''Yahvé'' no aparece en este versículo; no se requiere decisión sobre el nombre divino.'
  - La traducción conserva la progresión causal y descriptiva del hebreo sin añadir interpretaciones históricas.
