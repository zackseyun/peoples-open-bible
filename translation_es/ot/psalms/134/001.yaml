revisions:
- from: Cántico de ascensiones[a]. He aquí, bendecid a Yahvé, todos ustedes, siervos de Yahvé[b], que están de pie en la casa de Yahvé por la noche.
  to: Cántico de las subidas. He aquí[a], bendigan a Yahvé, todos ustedes, siervos de Yahvé[b], que están de pie en la casa de Yahvé por la noche.
  rationale: 'Se corrigen tres puntos: (1) el anclaje de la nota lexical sobre הִנֵּה se mueve a ''He aquí'', donde realmente corresponde; (2) ''bendecid'' se cambia a ''bendigan'' para mantener un español neutral latinoamericano coherente con ''todos ustedes''; y (3) el título se ajusta a ''Cántico de las subidas'', más natural en español y todavía formalmente fiel a שִׁיר הַמַּעֲלוֹת. No se requieren cambios doctrinales ni una reformulación mayor.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:58:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue correctamente el audit trail inglés en los puntos principales: título superscrito, uso de Yahvé para יְהוָה, imperativo ''bendecir'', vocativo a los siervos, imagen concreta de ''estar de pie'', y la referencia temporal nocturna. Sin embargo, hay desajustes menores pero reales entre el texto y las notas/decisiones documentadas.'
  spanish_quality_summary: 'El español es comprensible, pero mezcla registros de forma poco natural: ''He aquí'' y ''bendecid'' son formas elevadas/voseantes de España, mientras ''todos ustedes'' es latinoamericano moderno. Además, la nota [a] está anclada al título cuando en realidad corresponde a הִנֵּה (''He aquí''). ''Cántico de ascensiones'' es entendible, pero suena menos idiomático que ''Canto de las subidas'' o, mejor, la forma tradicional y transparente ''Cántico de las subidas''.'
  glossary_alignment: 'Se mantiene correctamente ''Yahvé'' para יְהוָה. La elección ''siervos'' para עַבְדֵי está justificada por el contexto cultual. No hay conflicto doctrinal importante. La principal mejora es alinear el español con un registro neutral latinoamericano: ''bendigan'' en lugar de ''bendecid'', y reubicar la nota de הִנֵּה.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'Cántico de ascensiones' pero su contenido explica la partícula הִנֵּה ('He aquí').
    rationale: Esto desinforma al lector y rompe la correspondencia exigida entre marcador y palabra/frase anotada. La nota debe anclarse en 'He aquí' o equivalente.
  - severity: medium
    issue: '''bendecid'' desentona con el objetivo de español neutral latinoamericano y con ''todos ustedes''.'
    rationale: La combinación de segunda persona plural peninsular con 'ustedes' produce mezcla de dialectos. 'Bendigan' conserva el imperativo plural y mejora la legibilidad eclesial panhispánica.
  - severity: medium
    issue: '''Cántico de ascensiones'' suena forzado en español.'
    rationale: Aunque formalmente cercano a 'Ascents', en español bíblico natural resulta más idiomático 'Cántico de las subidas', que preserva la imagen sin la abstracción poco usual 'ascensiones'.
  revised_spanish_text: Cántico de las subidas. He aquí[a], bendigan a Yahvé, todos ustedes, siervos de Yahvé[b], que están de pie en la casa de Yahvé por la noche.
  revised_footnotes:
  - marker: a
    text: O «Miren» o «Vean» para la partícula inicial.
    reason: lexical_alternative
  - marker: b
    text: «Casa de Yahvé» se refiere al santuario del templo.
    reason: cultural_note
  revision_rationale: 'Se corrigen tres puntos: (1) el anclaje de la nota lexical sobre הִנֵּה se mueve a ''He aquí'', donde realmente corresponde; (2) ''bendecid'' se cambia a ''bendigan'' para mantener un español neutral latinoamericano coherente con ''todos ustedes''; y (3) el título se ajusta a ''Cántico de las subidas'', más natural en español y todavía formalmente fiel a שִׁיר הַמַּעֲלוֹת. No se requieren cambios doctrinales ni una reformulación mayor.'
