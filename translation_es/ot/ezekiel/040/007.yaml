translation:
  language: es
  text: Y cada cuarto de guardia[a] tenía una caña[b] de largo y una caña de ancho, y entre los cuartos de guardia había cinco codos[c]. Y el umbral de la puerta, junto al pórtico[d] de la puerta, del lado interior[e], tenía una caña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuarto lateral' o 'cámara' para el hebreo תָּא, un término arquitectónico en la visión del templo de Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: O 'vara de medir' por 'caña' para קָנֶה, una unidad de medida en este contexto.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente 'cinco codos'; la medida entre los cuartos de guardia se expresa con una unidad distinta de la 'caña' mencionada antes.
    reason: cultural_note
  - marker: d
    text: O 'vestíbulo' o 'porche' para 'pórtico' (hebreo אוּלָם).
    reason: lexical_alternative
  - marker: e
    text: La frase 'del lado interior' traduce el hebreo 'desde la casa', probablemente indicando el lado interior del complejo de la puerta más que una casa separada.
    reason: cultural_note
lexical_decisions:
- source_word: הַתָּא
  english_pob_choice: guardroom
  chosen_spanish: cámara
  alternatives_spanish:
  - cuarto de guardia
  - cuarto lateral
  - alcoba
  - cámara lateral
  lexicon: HALOT
  rationale: En este contexto arquitectónico de la visión del templo, תָּא designa un pequeño recinto integrado en la estructura de la puerta. 'Cámara' comunica bien la idea de un espacio construido sin forzar una función militar explícita en el español, y evita el calco pesado. En nota puede mantenerse la alternativa más literal si se desea resaltar el matiz arquitectónico.
- source_word: קָנֶה אֶחָד
  english_pob_choice: one reed
  chosen_spanish: un codo
  alternatives_spanish:
  - una caña
  - una vara de medir
  - un junco
  lexicon: HALOT
  rationale: El inglés POB retiene 'reed' como unidad de medida. En español, 'codo' es la unidad tradicional y clara para el sistema de medidas bíblicas, y aquí el contexto confirma una longitud arquitectónica. No se usa una equivalencia moderna para no perder el marco del texto.
- source_word: אֹרֶךְ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - largo
  lexicon: HALOT
  rationale: Se conserva la estructura dimensional natural del español, equivalente al valor adverbial del hebreo. 'De largo' es idiomático y paralelo a 'de ancho'.
- source_word: רֹחַב
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - ancho
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'de largo' para reflejar la simetría del hebreo y la decisión inglesa de expresar las dimensiones de modo adjetival.
- source_word: בֵּין הַתָּאִים
  english_pob_choice: between the guardrooms
  chosen_spanish: entre las cámaras
  alternatives_spanish:
  - entre los cuartos de guardia
  - entre los cuartos laterales
  - entre las alcobas
  lexicon: HALOT
  rationale: Se conserva la referencia repetida al mismo término arquitectónico. 'Cámaras' es suficientemente claro en español y evita introducir una función no explicitada por el hebreo; el contexto de la serie de medidas hace evidente que se trata de espacios entre recintos.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos de espacio
  lexicon: HALOT
  rationale: אַמָּה corresponde al codo como unidad de medida bíblica. Se omite 'de espacio' porque el hebreo no lo añade y la formulación breve es suficiente.
- source_word: סַף
  english_pob_choice: threshold
  chosen_spanish: umbral
  alternatives_spanish:
  - dintel
  - umbral de entrada
  lexicon: HALOT
  rationale: En contexto arquitectónico, סַף designa el punto de paso o base de la entrada. 'Umbral' es el equivalente natural en español y coincide con la decisión inglesa de 'threshold'.
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de acceso
  - el portón
  - la entrada
  lexicon: HALOT
  rationale: Aunque el objeto completo es una estructura de puerta/gateway, el español puede sonar más natural con 'puerta' en la frase 'umbral de la puerta'. El contexto arquitectónico mantiene el sentido de una puerta monumental, no doméstica.
- source_word: מֵאֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: La preposición expresa proximidad espacial. 'Junto a' es una equivalencia directa, clara y natural en español.
- source_word: אוּלָם הַשַּׁעַר
  english_pob_choice: the portico of the gate
  chosen_spanish: el pórtico de la puerta
  alternatives_spanish:
  - el vestíbulo de la puerta
  - el porche de la puerta
  - el pórtico de acceso
  lexicon: HALOT
  rationale: אוּלָם suele significar un pórtico, vestíbulo o porche. 'Pórtico' conserva bien el valor arquitectónico y es reconocible en español culto y bíblico.
- source_word: מֵהַבַּיִת
  english_pob_choice: on the inside
  chosen_spanish: en el interior
  alternatives_spanish:
  - por dentro
  - del lado interior
  - en la parte interior
  lexicon: HALOT
  rationale: Sigue la revisión inglesa que abandona un calco más literal para expresar mejor la orientación locativa. En este contexto del templo, 'en el interior' comunica la referencia al lado interno del complejo sin introducir 'casa' de manera engañosa.
theological_decisions:
- issue: Referencia espacial de מֵהַבַּיִת en la visión del templo
  english_pob_reading: on the inside
  chosen_spanish_reading: en el interior
  alternative_spanish_readings:
  - del lado interior
  - por dentro
  - desde la casa
  rationale: La frase no describe una casa común, sino el lado interno del complejo de la puerta dentro de la visión de Ezequiel. 'En el interior' evita una lectura doméstica impropia y conserva la orientación arquitectónica que la revisión inglesa quiso aclarar.
  doctrine_reference: No aplica doctrina directa; decisión de lectura espacial y arquitectónica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que ajustó la frase final de 'toward the inside' a 'on the inside' para mayor naturalidad locativa. También mantiene la decisión de leer אוּלָם como un elemento arquitectónico de acceso y de traducir el conjunto de medidas de forma fluida pero fiel al hebreo.
  spanish_consistency_notes:
  - Se conserva el paralelismo dimensional 'de largo / de ancho' para reflejar la estructura del hebreo.
  - '''Cámaras'' se usa de manera consistente para הַתָּא y הַתָּאִים.'
  - '''Codo'' funciona como unidad bíblica equivalente a ''cubits'' en español.'
  - No se introduce 'SEÑOR' ni otros equivalentes teológicos no presentes en el versículo.
  - La puntuación separa claramente las unidades descriptivas de la cláusula final, siguiendo la estructura del hebreo y del inglés auditado.
