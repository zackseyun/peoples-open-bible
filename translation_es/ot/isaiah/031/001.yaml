  yaml_path: translation/ot/isaiah/031/001.yaml
  text: Woe to those who go down to Egypt for help[a], who rely on horses and trust in chariots because they are many, and in horsemen because they are very strong[c][b], but do not look to the Holy One of Israel and do not seek Yahweh.
  footnotes:
  - marker: a
    text: Or 'lean on horses' for 'rely on horses'; the Hebrew verb pictures support sought from something one leans upon.
    reason: lexical_alternative
  - marker: b
    text: Or 'cavalry' for 'horsemen.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
