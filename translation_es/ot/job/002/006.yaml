translation:
  language: es
  text: 'Yahvé dijo al acusador[a]: «Mira, él está en tu mano[b]; solo conserva su vida[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Satanás»; el hebreo dice literalmente «el satan», con artículo, y probablemente funciona aquí como título: «el acusador» o «el adversario».'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «está en tu mano», un modismo que significa que está bajo tu poder o control.'
    reason: lexical_alternative
  - marker: c
    text: O «su alma»; en este contexto נֶפֶשׁ suele significar «vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma transliterada, conforme al criterio del proyecto y al audit trail inglés que evita sustituirlo por un título.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el adversario
  lexicon: HALOT
  rationale: El sustantivo con artículo funciona aquí como título/rol. «Acusador» mantiene el matiz judicial y oposicional que el inglés POB documenta.
- source_word: הִנּוֹ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - He aquí
  lexicon: HALOT
  rationale: Es una interjección deíctica que introduce la cláusula siguiente con énfasis. «Mira» suena natural en español moderno y conserva la fuerza exhortativa sin arcaísmo excesivo.
- source_word: בְיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - bajo tu autoridad
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano», como en el hebreo y en el inglés auditado, sin perder inteligibilidad en español.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - pero
  lexicon: HALOT
  rationale: La partícula limita de forma estricta la अनुमति/concesión implícita. «Solo» expresa bien esa restricción en español.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: HALOT
  rationale: En este contexto נפש no apunta principalmente a un alma separada, sino a la vida concreta de Job bajo amenaza; «vida» evita una lectura no exigida por el hebreo.
- source_word: שְׁמֹר
  english_pob_choice: preserve
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - mantén
  - protege
  lexicon: HALOT
  rationale: El verbo significa literalmente guardar/observar, pero aquí la prohibición es no destruir la vida de Job. «Preserva» refleja ese valor de conservar sin añadir una paráfrasis extra.
theological_decisions:
- issue: Si הַשָּׂטָן debe leerse como nombre propio o como título/función
  english_pob_reading: the Accuser
  chosen_spanish_reading: el Acusador
  alternative_spanish_readings:
  - Satanás
  - el adversario
  rationale: La presencia del artículo en hebreo sugiere un título más que un nombre fijo. «El Acusador» preserva la función literaria y jurídica del personaje en el prólogo.
  doctrine_reference: Job 1–2; lectura lexical de הַשָּׂטָן con artículo
- issue: Si נַפְשׁוֹ debe entenderse como «alma» o como «vida»
  english_pob_reading: his life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  rationale: 'El contexto trata del límite impuesto a la aflicción: puede ser herido, pero no muerto. «Vida» comunica mejor la restricción concreta sin imponer una oposición cuerpo/alma ajena al pasaje.'
  doctrine_reference: Job 2:6; uso contextual de נֶפֶשׁ
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del audit trail inglés, que prefirió un registro más formal para la interjección y una traducción más directa de שְׁמֹר como «preserve». En español se mantuvo ese mismo sentido con «preserva», y se conservó el valor de artículo en הַשָּׂטָן mediante «el Acusador».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva el artículo en «el Acusador» para reflejar la función/título del hebreo.
  - Se mantiene la imagen idiomática de «en tu mano» con nota explicativa.
  - «Vida» se usa para נֶפֶשׁ en contexto de peligro mortal, sin introducir una distinción alma/cuerpo no explicitada.
