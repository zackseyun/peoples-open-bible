translation:
  language: es
  text: Como una ofrenda de primicias[a], los presentaréis a Yahvé; pero no subirán al altar como aroma agradable[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como una ofrenda primicial».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no subirán al altar para un aroma agradable», un modismo que indica que no deben ser ofrecidos allí como ofrenda aceptable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrecimiento
  - ofrenda sacrificial
  lexicon: HALOT
  rationale: קָרְבַּן denota una ofrenda presentada en contexto cultual. «Ofrenda» es el equivalente natural y digno en español, y comunica el acto sacrificial sin arcaísmos innecesarios.
- source_word: רֵאשִׁית
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - primera cosecha
  lexicon: HALOT
  rationale: En el contexto del culto, רֵאשִׁית se refiere a la primera parte del producto presentada a Dios. «Primicias» es el término bíblico y comprensible que conserva ese valor cultual.
- source_word: קָרְבַּן רֵאשִׁית
  english_pob_choice: an offering of firstfruits
  chosen_spanish: una ofrenda de primicias
  alternatives_spanish:
  - una ofrenda de los primeros frutos
  - una ofrenda primicial
  lexicon: HALOT
  rationale: La construcción posesiva se expresa naturalmente en español como «ofrenda de primicias», manteniendo la relación entre el sustantivo principal y su especificación cultual.
- source_word: תַּקְרִיבוּ
  english_pob_choice: you may present
  chosen_spanish: la presentaréis
  alternatives_spanish:
  - la ofreceréis
  - la presentaréis ante Yahvé
  lexicon: HALOT
  rationale: El hifil de קרב en contexto sacrificial significa presentar o acercar una ofrenda. «Presentaréis» reproduce ese sentido cultual con claridad; el futuro en español puede expresar mandato/instrucción normativa en este tipo de legislación.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: la
  alternatives_spanish:
  - las
  - las ofrendas
  lexicon: HALOT
  rationale: Aunque el hebreo tiene objeto plural masculino, el referente inmediato en el contexto es la ofrenda/las primicias mencionadas antes. En español, por concordancia con «ofrenda», se vierte de forma singular colectiva sin perder el referente.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino como «Yahvé» según la terminología del proyecto, y la preposición ל se expresa como dirección/dedicación: «a Yahvé».'
- source_word: וְאֶל־הַמִּזְבֵּחַ
  english_pob_choice: but on the altar
  chosen_spanish: pero no subirán sobre el altar
  alternatives_spanish:
  - pero no irán al altar
  - pero no ascenderán al altar
  lexicon: HALOT
  rationale: 'El hebreo enlaza con contraste respecto de la primera cláusula. En español, la construcción negativa hace explícita la prohibición: no deben llegar a ser colocadas/consumidas en el altar.'
- source_word: לֹא יַעֲלוּ
  english_pob_choice: they must not go up
  chosen_spanish: no subirán
  alternatives_spanish:
  - no ascenderán
  - no serán elevadas
  lexicon: HALOT
  rationale: עלה literalmente es «subir/ascender». «No subirán» conserva la imagen verbal y la relación con el altar sin recurrir a una paráfrasis más interpretativa.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor agradable
  - como aroma de suave olor
  lexicon: HALOT
  rationale: La fórmula sacrificial se traduce de manera clara en español. «Aroma agradable» conserva el valor idiomático de aceptación/agrado divino sin oscurecer el hebreo idiomático.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama, no un título genérico. La forma del proyecto en español es «Yahvé», que mantiene la identificación del nombre de pacto y evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor cultual de la fórmula «לְרֵיחַ נִיחֹחַ»
  english_pob_reading: as a pleasing aroma
  chosen_spanish_reading: como aroma agradable
  alternative_spanish_readings:
  - como aroma de grato olor
  - como olor agradable
  rationale: Se conserva la metáfora sacrificial sin explicarla en exceso dentro del texto. En la tradición bíblica, la expresión señala una ofrenda aceptable ante Dios; el español mantiene ese sentido de manera sobria.
  doctrine_reference: Levítico 1–3; fórmula sacrificial recurrente
translation_notes:
  revision_awareness: La redacción sigue de cerca el orden del hebreo, pero adopta una construcción española fluida. Se integra el sentido cultual de קָרְבַּן רֵאשִׁית como «ofrenda de primicias», se preserva la imagen verbal de עלה con «subirán», y se conserva la fórmula sacrificial de נִיחֹחַ como «aroma agradable».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Primicias» se mantiene como término bíblico estable para רֵאשִׁית en contexto de culto.
  - «Aroma agradable» conserva la fórmula sacrificial sin recurrir al equivalente eclesiástico tradicional más interpretativo.
  - El sujeto implícito plural del hebreo se refleja en la forma verbal española; la referencia concreta sigue siendo la ofrenda mencionada en el contexto inmediato.
