translation:
  language: es
  text: Porque es mejor que tus hijos tengan necesidad de ti que tú mires[a] a las manos de tus hijos varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «que tú dependas de tus hijos varones». El griego dice literalmente «mires a las manos de tus hijos varones», usando «manos» como imagen de apoyo o provisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - preferible
  - superior
  lexicon: LSJ
  rationale: El comparativo pide una solución natural en español; «mejor» expresa con claridad la idea de mayor conveniencia o ventaja sin añadir matices no presentes en el griego.
- source_word: τὰ τέκνα
  english_pob_choice: children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus hijos
  lexicon: LSJ
  rationale: El griego usa un término amplio para «hijos/descendencia», pero el contexto inmediato se completa con υἱῶν («hijos varones»). En español, «hijos» conserva la referencia familiar y permite mantener el contraste con el segundo miembro de la frase.
- source_word: δεηθῆναί σου
  english_pob_choice: should have need of you
  chosen_spanish: tengan necesidad de ti
  alternatives_spanish:
  - necesiten de ti
  - dependan de ti
  lexicon: LSJ
  rationale: La construcción con δέομαι y genitivo expresa necesidad o dependencia respecto de una persona. «Tengan necesidad de ti» conserva esa relación sin convertirla en una paráfrasis demasiado libre.
- source_word: ἐμβλέπειν
  english_pob_choice: should look to
  chosen_spanish: mires
  alternatives_spanish:
  - miras hacia
  - mires a
  - dependas de
  lexicon: LSJ
  rationale: El verbo griego, junto con «a las manos», conserva una imagen concreta de orientación visual. En español, «mires a» mantiene la imagen y sugiere dependencia, aunque el valor de apoyo se aclara por el objeto de la mirada.
- source_word: εἰς χεῖρας
  english_pob_choice: to the hands
  chosen_spanish: a las manos
  alternatives_spanish:
  - a las manos
  - en las manos
  - para apoyo de
  lexicon: LSJ
  rationale: Se preserva literalmente «manos» porque en la imagen bíblica remite a sostén, provisión o ayuda práctica. No se sustituye por un equivalente explicativo para no perder la concreción del original.
- source_word: υἱῶν
  english_pob_choice: sons
  chosen_spanish: de tus hijos
  alternatives_spanish:
  - de tus hijos varones
  - de tus hijos
  lexicon: LSJ
  rationale: Aquí el griego sí usa el término específico para «hijos varones». En español se conserva el contraste con el miembro anterior sin forzar una repetición artificial del mismo sustantivo.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete (κρεῖσσον... τὰ τέκνα δεηθῆναί σου ἢ σὲ ἐμβλέπειν εἰς χεῖρας υἱῶν σου) y concuerda con el audit trail inglés, que mantiene la imagen de «look to the hands» con una nota de lectura más dinámica. No se reportan revisiones textuales ni cambios posteriores en el expediente.
  spanish_consistency_notes:
  - Se mantiene «hijos» para traducir υἱῶν, reservando un equivalente amplio para τέκνα en la primera mitad del versículo.
  - La nota aclara la imagen de «manos» como apoyo/provisión, coherente con el tratamiento inglés.
  - Se evita «SEÑOR» u otros términos no pertinentes; el verso no contiene léxico divino explícito.
