translation:
  language: es
  text: Y como hombres al acecho[a], una banda de sacerdotes asesina en el camino hacia Siquem; ciertamente[b], han cometido maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil; alternativamente: «como ladrones que se ponen al acecho de un hombre, así una banda de sacerdotes asesina en el camino hacia Siquem».'
    reason: alternative_reading
  - marker: b
    text: O «maldad vergonzosa», «crimen infame». El término hebreo puede denotar una acción atroz o escandalosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְחַכֵּי
  english_pob_choice: And like men lying in wait
  chosen_spanish: Y como hombres que están al acecho
  alternatives_spanish:
  - Y como hombres escondidos
  - Y como hombres que esperan al acecho
  lexicon: HALOT
  rationale: La comparación expresa una actitud de espera predatoria; «estar al acecho» comunica mejor que un simple «esperar» la idea de emboscada implícita en el hebreo y en la solución inglesa auditada.
- source_word: אִישׁ גְּדוּדִים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - un hombre de tropa
  - un hombre de asaltantes
  - ladrones
  lexicon: HALOT
  rationale: El hebreo es difícil y comprimido. En español, «hombres» mantiene la imagen plural y evita resolver en exceso la estructura; la nota preserva la alternativa de lectura sin borrar la ambigüedad documentada.
- source_word: חֶבֶר כֹּהֲנִים
  english_pob_choice: a band of priests
  chosen_spanish: una banda de sacerdotes
  alternatives_spanish:
  - un grupo de sacerdotes
  - una compañía de sacerdotes
  - una asociación de sacerdotes
  lexicon: HALOT
  rationale: «Banda» conserva el matiz de grupo unido y además sugiere el tono hostil/conspirativo del contexto, como en la decisión inglesa.
- source_word: דֶּרֶךְ
  english_pob_choice: on the way to
  chosen_spanish: en el camino a
  alternatives_spanish:
  - por el camino a
  - sobre el camino a
  - hacia
  lexicon: HALOT
  rationale: «Camino» es una traducción directa y natural del sentido locativo de דֶּרֶךְ; «en el camino a» conserva el movimiento hacia Siquem sin sonar forzado.
- source_word: יְרַצְּחוּ
  english_pob_choice: murders
  chosen_spanish: asesina
  alternatives_spanish:
  - mata
  - asesinan
  - comete asesinato
  lexicon: HALOT
  rationale: El verbo רצח tiene fuerza de homicidio criminal, no mero matar. En español, «asesina» preserva esa violencia lexical con un sujeto colectivo singular, como en la línea inglesa.
- source_word: שֶׁכְמָה
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Shequem
  - Siquén
  lexicon: HALOT
  rationale: Se usa la forma española establecida del topónimo bíblico. La dirección queda clara con «a Siquem».
- source_word: כִּי
  english_pob_choice: indeed
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en efecto
  - pues
  - de veras
  lexicon: HALOT
  rationale: Aquí כִּי introduce una conclusión enfática; «ciertamente» transmite el valor enfático sin volver causal lo que en el contexto funciona como remate acusatorio.
- source_word: זִמָּה
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad vergonzosa
  - crimen infame
  - deshonra
  lexicon: HALOT
  rationale: El término puede abarcar una acción inicua y vergonzosa de gran gravedad. «Maldad» es amplio y fiel en español; la nota conserva la alternativa semántica que el inglés POB también reconoció.
theological_decisions:
- issue: 'Interpretación del comienzo oscuro: וּכְחַכֵּי אִישׁ גְּדוּדִים'
  english_pob_reading: The priests are compared to violent ambushers/raiders lying in wait.
  chosen_spanish_reading: Los sacerdotes son comparados con hombres que están al acecho, es decir, con agresores emboscados.
  alternative_spanish_readings:
  - Como ladrones que aguardan a un hombre, así una banda de sacerdotes asesina en el camino a Siquem.
  - Como un hombre de asaltantes, una banda de sacerdotes...
  rationale: El hebreo es breve y sintácticamente difícil. La versión española mantiene la imagen de acecho y violencia sin pretender resolver el texto más allá de lo que el testimonio auditado permite.
  doctrine_reference: Principio POB de preservar la tensión textual y no borrar ambigüedades documentadas
- issue: Valor de זִמָּה al final del verso
  english_pob_reading: wickedness / shameful crime / heinous act
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - crimen infame
  - maldad vergonzosa
  - deshonra
  rationale: En este contexto profético, זִמָּה nombra una acción moralmente aberrante. «Maldad» funciona en español como término amplio y claro, mientras que la nota conserva la amplitud semántica del hebreo.
  doctrine_reference: HALOT; principio de equivalencia óptima con preservación del rango semántico
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del auditor inglés: cambió «on the road» por «on the way» y «outrage» por «wickedness». La redacción española sigue esa revisión al usar «en el camino a» y «maldad», pero mantiene en nota la alternativa más fuerte («crimen infame») para no borrar el rango semántico de זִמָּה. También se preservó la ambigüedad del arranque hebreo en una nota alineada con el pie inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se prefirió «Siquem» como topónimo bíblico español estándar.
  - Se mantuvo «sacerdotes» y no otro equivalente eclesiástico, porque el hebreo designa el oficio sacerdotal.
  - La puntuación separa la conclusión enfática con punto y coma, acorde con el paralelismo del verso y la dicción profética.
