revisions:
- from: Todo varón[a] entre los hijos de Aarón podrá comer de ello. Es estatuto perpetuo para vuestras generaciones, de las ofrendas encendidas de Yahvé. Todo lo que toque[b] a ellos será santo.
  to: Todo varón[a] entre los hijos de Aarón podrá comer de ello. Es un estatuto perpetuo por todas sus generaciones, de las ofrendas de alimento de Yahvé. Todo lo que los toque[b] quedará santificado.
  rationale: Se corrigió la sintaxis española («los toque»), se alineó אִשֵּׁי con la decisión contextual del POB mediante «ofrendas de alimento», y se hizo explícito el matiz resultativo de יִקְדָּשׁ con «quedará santificado», preservando la lectura alternativa en nota. También se neutralizó ligeramente el registro con «sus generaciones».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva adecuadamente «hijos de Aarón», «Yahvé» y la amplitud de «todo lo que». Sin embargo, en dos puntos clave no refleja con suficiente fidelidad el expediente POB ni el hebreo: «de las ofrendas encendidas» se aparta de la decisión documentada «food offerings» y suena menos claro en español que «ofrendas de alimento/comida»; y «será santo» atenúa el matiz verbal de cambio de estado en יִקְדָּשׁ, que el POB fijó como «shall become holy».'
  spanish_quality_summary: 'El español es generalmente legible, pero mezcla registro e idiomaticidad: «vuestras generaciones» suena más peninsular/tradicional que el objetivo neutral; «toque a ellos» no es español natural y debe ser «los toque» o «toque esas cosas». Además, «de las ofrendas encendidas» resulta poco idiomático y puede confundir. Conviene ajustar hacia una redacción más natural y eclesialmente clara.'
  glossary_alignment: Alinea bien con «Yahvé». No hay conflicto con otros términos del glosario principal. La excepción importante es אִשֵּׁי, donde el proyecto ya documentó una preferencia contextual por «food offerings»; en español debe reflejarse esa racionalidad mejor que con una formulación centrada en el fuego.
  issues:
  - severity: medium
    issue: «de las ofrendas encendidas de Yahvé» no sigue bien la decisión léxica contextual para מֵאִשֵּׁי יְהוָה
    rationale: El expediente inglés optó por «food offerings» precisamente para evitar una expresión mecánica basada en el fuego. «Ofrendas encendidas» no es la mejor equivalencia en español y puede sonar extraña o imprecisa.
  - severity: high
    issue: «Todo lo que toque a ellos» es gramaticalmente antinatural en español
    rationale: Aunque intenta reflejar el hebreo, en español estándar la construcción normal es «todo lo que los toque». La forma actual perjudica la legibilidad sin ganar fidelidad real.
  - severity: medium
    issue: «será santo» debilita el matiz de resultado/cambio de estado de יִקְדָּשׁ
    rationale: El POB documentó «shall become holy» como la mejor lectura principal. En español, «quedará santificado» o «llegará a ser santo» preserva mejor ese valor, dejando la alternativa restrictiva en nota.
  - severity: low
    issue: «para vuestras generaciones» no encaja del todo con el objetivo de español neutral latinoamericano
    rationale: No es infiel, pero «por todas sus generaciones» o «a través de sus generaciones» suena más neutral que la forma con «vuestras».
  revised_spanish_text: Todo varón[a] entre los hijos de Aarón podrá comer de ello. Es un estatuto perpetuo por todas sus generaciones, de las ofrendas de alimento de Yahvé. Todo lo que los toque[b] quedará santificado.
  revised_footnotes:
