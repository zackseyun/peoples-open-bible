revisions:
- from: Él dijo que prendería fuego a mis montañas[a], y mataría a mis jóvenes con la espada, y arrojaría a mis niños de pecho al suelo, y daría a mis pequeños como botín, y despojaría a mis vírgenes.
  to: Él dijo que prendería fuego a mis montañas, y mataría a mis jóvenes hombres con la espada, y arrojaría a mis niños de pecho al suelo, y daría a mis pequeños como botín, y despojaría a mis vírgenes[a].
  rationale: Se corrige una falla importante de anclaje y contenido en la nota al pie, trasladándola a la cláusula de «mis vírgenes» y alineándola con la evidencia y la decisión léxica del POB inglés sobre σκυλεῦσαι. Además, se ajusta «mis jóvenes» a «mis jóvenes hombres» para reflejar mejor el masculino específico de νεανίσκους en un español todavía natural y legible.
