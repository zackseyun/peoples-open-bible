translation:
  language: es
  text: Pues[a] por causa de todo asunto, el ojo tiembla, y lágrimas fluyen del rostro.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'El hebreo conservado aquí difiere mucho de la tradición griega, que dice: «El que teme al Señor no será ciertamente tímido ni cobarde, porque él mismo es su esperanza». El texto principal sigue el testimonio hebreo existente.'
    reason: textual_variant
lexical_decisions:
- source_word: כי
  english_pob_choice: For because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque debido a
  lexicon: HALOT
  rationale: El hebreo introduce una explicación causal. En español, «Porque» conserva de forma natural ese valor causal y evita sobrecargar la frase con una duplicación poco idiomática de «for because».
- source_word: מפני כל דבר
  english_pob_choice: because of every matter
  chosen_spanish: por causa de cualquier asunto
  alternatives_spanish:
  - a causa de todo asunto
  - por cada cosa
  - por causa de toda circunstancia
  lexicon: HALOT
  rationale: «מפני» expresa causalidad o motivo; «כל דבר» mantiene un alcance general, no restringido al habla. «Asunto»/«cosa» son posibles; «asunto» suena más natural en español formal y conserva la amplitud proverbial del hebreo.
- source_word: תזוע עין
  english_pob_choice: the eye trembles
  chosen_spanish: el ojo tiembla
  alternatives_spanish:
  - el ojo es sacudido
  - el ojo vacila
  - el ojo se estremece
  lexicon: HALOT
  rationale: El verbo transmite sacudida o temblor. «El ojo tiembla» mantiene la imagen corporal singular del hebreo sin convertirla en una paráfrasis emocional.
- source_word: ומפנים
  english_pob_choice: and from the face
  chosen_spanish: del rostro
  alternatives_spanish:
  - de la cara
  - del semblante
  - de la presencia
  lexicon: HALOT
  rationale: La raíz literalmente significa «cara/rostro». En español, «rostro» preserva la imagen y resulta más digno y bíblicamente claro que «cara».
- source_word: דמעה תדמע
  english_pob_choice: tears will flow
  chosen_spanish: lágrimas fluyen
  alternatives_spanish:
  - lágrimas correrán
  - una lágrima llorará
  - lágrimas brotan
  lexicon: HALOT
  rationale: La construcción intensiva hebrea usa sustantivo + verbo de la misma raíz. En español, «lágrimas fluyen» comunica la imagen del llanto de manera natural y digna, sin forzar una literalidad extraña como «la lágrima llorará».
theological_decisions:
- issue: Divergencia textual fuerte entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek parallel is substantially different and is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega divergente se consigna en nota.
  alternative_spanish_readings:
  - 'Harmonizar el texto con el griego: «El que teme al Señor no será tímido ni cobarde, porque él mismo es su esperanza»'
  - Suprimir la discrepancia textual
  rationale: En este pasaje, el hebreo y el griego no son equivalentes cercanos. La práctica de la POB es traducir el hebreo donde se conserva y señalar honestamente el paralelo griego como testigo textual alterno, sin fusionar ambas tradiciones en una sola lectura.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está disponible; preservar la divergencia textual con transparencia'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, que ajustó el orden de la segunda cláusula para hacerla más natural sin cambiar el sentido. En español se mantuvo la estructura paralela del hebreo, con un orden igualmente fluido y sobrio. Dado que el paquete fuente marca una discrepancia mayor entre hebreo y griego, el texto español prioriza el hebreo y registra el griego en nota.
  spanish_consistency_notes:
  - Se usó «rostro» en lugar de «cara» para mantener dignidad y consistencia bíblica.
  - Se evitó «SEÑOR» porque el pasaje hebreo no contiene aquí el Tetragrámaton, sino un sustantivo reverencial equivalente en la tradición griega.
  - Se conservó un registro formal y sobrio, acorde con una traducción pública y auditada.
