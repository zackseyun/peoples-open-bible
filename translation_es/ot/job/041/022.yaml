translation:
  language: es
  text: Debajo de él hay afilados fragmentos de cerámica[a]; se extiende[b] como un trillo sobre el lodo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiestos», por «fragmentos de cerámica».
    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: «hace del lodo un trillo», tomando la línea como una construcción de objeto directo en vez de una comparación.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחְתָּיו
  english_pob_choice: Under him
  chosen_spanish: Debajo de él
  alternatives_spanish:
  - Bajo él
  - Bajo sus pies
  lexicon: HALOT
  rationale: La preposición con sufijo de tercera persona indica lo que está en posición inferior respecto de Leviatán. «Debajo de él» conserva la relación espacial con un español natural y claro.
- source_word: חַדּוּדֵי
  english_pob_choice: sharp
  chosen_spanish: afilados
  alternatives_spanish:
  - agudos
  - puntiagudos
  lexicon: HALOT
  rationale: El plural constructo expresa una cualidad de filo o punta. En español, «afilados» funciona como adjetivo natural para modificar «fragmentos» y mantiene la fuerza visual del hebreo.
- source_word: חָרֶשׂ
  english_pob_choice: shards of pottery
  chosen_spanish: fragmentos de barro
  alternatives_spanish:
  - tiestos
  - fragmentos de cerámica
  - cascotes de barro
  lexicon: HALOT
  rationale: El término puede referirse a alfarería/cerámica, a menudo en fragmentos. «Fragmentos de barro» conserva el material básico y permite una lectura comprensible; «tiestos» sería más tradicional, pero menos transparente para algunos lectores.
- source_word: יִרְפַּד
  english_pob_choice: he spreads himself
  chosen_spanish: se extiende
  alternatives_spanish:
  - se despliega
  - se tiende
  lexicon: HALOT
  rationale: El verbo puede expresar extenderse o hacer una capa/lecho. Dado el contexto y la revisión inglesa que destacó el matiz reflexivo/comparativo, «se extiende» comunica la acción sin sobrecargarla con explicación extra.
- source_word: חָרוּץ
  english_pob_choice: a threshing sledge
  chosen_spanish: una trilla
  alternatives_spanish:
  - un trillo
  - un trillo de trillar
  - un trillo trillador
  lexicon: HALOT
  rationale: Se trata de un implemento agrícola de trilla con elementos cortantes. «Una trilla» no es la forma técnica más precisa, pero en español general puede evocar el instrumento de trillar; se evita «trillo» si pudiera sonar demasiado regional o ambiguo. La imagen funcional es la prioridad.
- source_word: עֲלֵי
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: La preposición marca posición superior respecto del lodo. «Sobre» es la equivalencia más directa y sobria en español bíblico contemporáneo.
- source_word: טִיט
  english_pob_choice: the mud
  chosen_spanish: el lodo
  alternatives_spanish:
  - el barro
  - la ciénaga
  - el fango
  lexicon: HALOT
  rationale: El sustantivo designa barro/lodo/fango. «Lodo» conserva el valor físico y suena natural en castellano bíblico moderno.
translation_notes:
  revision_awareness: La frase final sigue de cerca el hebreo y el audit trail inglés, pero adopta una formulación española más natural. Se conservó la imagen de los fragmentos cortantes bajo Leviatán y la comparación agrícola del segundo hemistiquio, reflejando la revisión inglesa que reforzó el matiz comparativo/reflexivo.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos conforme al estándar del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» porque no aparece en el texto fuente.
  - Se mantuvo el contraste imagístico entre material quebradizo y herramienta de trilla, sin suavizar la violencia visual del hebreo.
