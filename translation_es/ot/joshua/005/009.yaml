base_translation:
  language: en
  yaml_path: translation/ot/joshua/005/009.yaml
  text: And Yahweh said to Joshua[b][a], “Today I have rolled away the reproach of Egypt from upon you.” So the name of that place was called Gilgal to this day.
  footnotes:
  - marker: a
    text: Or 'the disgrace of Egypt' or 'Egypt's reproach.' The phrase may refer to the shame of Israel's past in Egypt, reproach from Egypt, or covenant disgrace now removed.
    reason: lexical_alternative
  - marker: b
    text: '''Gilgal'' sounds like the Hebrew verb for ''roll away,'' creating a wordplay with ''Today I have rolled away.'''
    reason: cultural_note
