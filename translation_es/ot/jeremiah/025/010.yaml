    text: 'Or ''I will put an end to from among them.'' The Hebrew verb is causative: ''cause to perish/disappear.'''
    reason: lexical_alternative
  - marker: b
    text: '''The voice of the bridegroom and the voice of the bride'' refers to wedding celebration, a stock image of normal communal life.'
    reason: cultural_note
