translation:
  language: es
  text: camellos cuatrocientos treinta y cinco, y caballos siete mil treinta y seis, mulos doscientos cuarenta y cinco[a], animales de carga[b] cinco mil quinientos veinticinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo suministrado aquí no corresponde al contenido de este versículo; por lo tanto, la lista griega es la fuente controladora para la traducción.
    reason: textual_variant
  - marker: b
    text: El griego ὑποζύγια es un término amplio para animales destinados a llevar cargas; también puede entenderse como 'bestias de carga'.
    reason: lexical_alternative
lexical_decisions:
- source_word: κάμηλοι
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: LSJ
  rationale: El griego designa camellos de manera directa; en español 'camellos' es el equivalente natural y preciso. 'Dromedarios' sería una especificación innecesaria que el contexto no exige.
- source_word: ἵπποι
  english_pob_choice: horses
  chosen_spanish: caballos
  lexicon: LSJ
  rationale: Término zoológico directo y transparente; 'caballos' conserva el sentido sin carga interpretativa adicional.
- source_word: ἡμίονοι
  english_pob_choice: mules
  chosen_spanish: mulos
  alternatives_spanish:
  - mulas
  lexicon: LSJ
  rationale: El griego se refiere a mulas/mulos. En español, 'mulos' funciona bien como plural genérico y evita la ambigüedad de género cuando el texto enumera animales sin distinguir sexo.
- source_word: ὑποζύγια
  english_pob_choice: pack animals
  chosen_spanish: animales de carga
  alternatives_spanish:
  - bestias de carga
  - animales de tiro
  lexicon: LSJ
  rationale: La palabra griega es amplia y no nombra una especie concreta; 'animales de carga' conserva ese valor genérico mejor que una traducción más estrecha. 'Bestias de carga' sería posible, pero 'animales de carga' resulta más digno y natural en español moderno.
- source_word: τετρακόσιοι τριάκοντα πέντε
  english_pob_choice: four hundred thirty-five
  chosen_spanish: cuatrocientos treinta y cinco
  alternatives_spanish:
  - '435'
  lexicon: numeral phrase
  rationale: Se traduce con palabras para mantener el estilo enumerativo del versículo y la fluidez de la lista.
- source_word: ἑπτακισχίλιοι τριάκοντα ἕξ
  english_pob_choice: seven thousand thirty-six
  chosen_spanish: siete mil treinta y seis
  alternatives_spanish:
  - '7.036'
  lexicon: numeral phrase
  rationale: La cifra se vierte de forma literal y clara en español, conservando el orden del original.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  english_pob_choice: two hundred forty-five
  chosen_spanish: doscientos cuarenta y cinco
  alternatives_spanish:
  - '245'
  lexicon: numeral phrase
  rationale: Equivalente numérico directo y idiomático.
- source_word: πεντακισχίλια πεντακόσια εἴκοσι πέντε
  english_pob_choice: five thousand five hundred twenty-five
  chosen_spanish: cinco mil quinientos veinticinco
  alternatives_spanish:
  - '5.525'
  lexicon: numeral phrase
  rationale: Equivalente numérico directo y idiomático, manteniendo el estilo de lista.
theological_decisions:
- issue: No hay asunto doctrinal explícito; el único punto relevante es la elección del término genérico para ὑποζύγια.
  english_pob_reading: pack animals
  chosen_spanish_reading: animales de carga
  alternative_spanish_readings:
  - bestias de carga
  - animales de tiro
  rationale: La decisión no afecta una doctrina, pero sí evita estrechar indebidamente el sentido del griego. 'Animales de carga' preserva la amplitud semántica documentada en el audit trail inglés.
