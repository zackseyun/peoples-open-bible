translation:
  language: es
  text: Y Josafat hizo la paz con el rey de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Josafat estaba en paz con el rey de Israel». El verbo hebreo puede entenderse como establecer paz o como estar en un estado de paz; el texto principal favorece el sentido eventivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יַּשְׁלֵ֥ם
  english_pob_choice: made peace
  chosen_spanish: hizo paz
  alternatives_spanish:
  - estuvo en paz
  - entró en paz
  - hizo la paz
  lexicon: HALOT
  rationale: El verbo en hifil con waw consecutiva expresa el establecimiento de relaciones pacíficas o la conclusión de paz. En español, «hizo paz» mantiene el valor eventivo y evita reducirlo a un estado estático. «Hizo la paz» también es posible, pero «hizo paz» conserva mejor la concisión del hebreo.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: transliteración bíblica estable en español
  rationale: Se usa la forma bíblica española más reconocible y natural, equivalente al nombre propio transliterado en inglés POB.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - con respecto a
  - en relación con
  lexicon: HALOT
  rationale: La preposición marca la parte con la cual se establece la paz; «con» es el equivalente directo y idiomático en español.
- source_word: מֶ֥לֶךְ יִשְׂרָאֵֽל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - Israel, su rey
  - el rey de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa. En español, el artículo definido es natural porque el contexto identifica al monarca reinante del reino del norte.
