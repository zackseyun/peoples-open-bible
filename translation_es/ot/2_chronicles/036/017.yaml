base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/017.yaml
  text: So he brought up against them the king of the Chaldeans[a], who killed their young men with the sword in the house of their sanctuary, and had no compassion on young man or virgin, old man or aged man[c][b]. He gave all into his hand.
