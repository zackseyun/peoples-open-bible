translation:
  language: es
  text: 'Porque no decidió[a] tratarnos a nosotros como a las otras naciones: con ellas espera pacientemente hasta que hayan llegado al colmo de sus pecados, y entonces las castiga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: ὁ δεσπότης, «el Dueño» o «el Soberano», refiriéndose a Dios; el texto principal usa una forma verbal natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμένει
  english_pob_choice: he waits
  chosen_spanish: las espera
  alternatives_spanish:
  - espera
  - aguarda
  - se demora en esperar
  lexicon: LSJ
  rationale: El verbo expresa la idea de esperar o retener la acción hasta un momento determinado. En español, «las espera» conserva esa espera deliberada sin sonar forzado.
- source_word: μακροθυμῶν
  english_pob_choice: patiently
  chosen_spanish: con paciencia
  alternatives_spanish:
  - pacientemente
  - con longanimidad
  - con forbearancia
  lexicon: LSJ
  rationale: El participio matiza la espera con paciencia o longanimidad divina. «Con paciencia» es natural en español y mantiene el valor adverbial del griego.
- source_word: ὁ δεσπότης
  english_pob_choice: he
  chosen_spanish: implícito en el verbo personal
  alternatives_spanish:
  - el Dueño
  - el Soberano
  - el Señor
  lexicon: LSJ
  rationale: El griego dice literalmente «el Dueño/Soberano», refiriéndose a Dios. En español, para fluidez, el sujeto puede quedar implícito en la conjugación verbal («decidió», «espera», «castiga») sin perder la referencia al Señorío divino.
- source_word: μέχρι τοῦ ... κολάσῃ
  english_pob_choice: until they have reached ... and then punishes them
  chosen_spanish: hasta que hayan llegado ... y entonces las castiga
  alternatives_spanish:
  - hasta que lleguen ... y luego las castiga
  - hasta que alcancen ... y entonces las castiga
  lexicon: LSJ
  rationale: 'La construcción marca el límite de la paciencia divina: el castigo llega solo cuando se ha alcanzado el punto fijado. La secuencia «hasta que ... y entonces» refleja bien ese valor temporal.'
- source_word: καταντήσαντας αὐτοὺς πρὸς ἐκπλήρωσιν ἁμαρτιῶν
  english_pob_choice: they have reached the full measure of their sins
  chosen_spanish: hayan llegado al colmo de sus pecados
  alternatives_spanish:
  - hayan llegado a la plenitud de sus pecados
  - hayan alcanzado la medida completa de sus pecados
  - hayan colmado sus pecados
  lexicon: LSJ
  rationale: La expresión indica haber llegado al cumplimiento o a la plenitud de los pecados. «Al colmo de sus pecados» conserva la idea de medida plena y el matiz de culminación.
- source_word: κολάσῃ
  english_pob_choice: punishes
  chosen_spanish: las castiga
  alternatives_spanish:
  - las pune
  - las corrige con castigo
  - las sanciona
  lexicon: LSJ
  rationale: El verbo es claramente punitivo. «Castiga» comunica con claridad el acto de imponer castigo sin añadir matices ajenos.
- source_word: οὕτως καὶ ἐφʼ ἡμῶν ἔκρινεν εἶναι
  english_pob_choice: he did not decide to deal with us as he does with the other nations
  chosen_spanish: no decidió tratarnos a nosotros como a las otras naciones
  alternatives_spanish:
  - no juzgó que con nosotros fuera así
  - no consideró que debiera ser así con nosotros
  - no determinó obrar así con nosotros
  lexicon: LSJ
  rationale: El griego afirma que él juzgó/decidió que ese modo no sería el mismo en nuestro caso. El español mantiene el contraste implícito con «las otras naciones» sin sobre-explicar más allá del texto.
theological_decisions:
- issue: Diferencia entre el trato de Dios a las naciones y a Israel
  english_pob_reading: The verse contrasts God's delayed punishment of other nations until their sins are full with his different, earlier disciplinary dealing with Israel.
  chosen_spanish_reading: El verso contrapone la paciencia de Dios con las otras naciones, hasta que sus pecados se colman, y su distinto trato con nosotros.
  alternative_spanish_readings:
  - 'Puede leerse sin explicitar tanto la comparación: Dios no decidió tratarnos como a las otras naciones.'
  - También podría traducirse de forma más literal, dejando más comprimida la comparación.
  rationale: El griego presenta una contraposición comprimida (οὐ ... καθάπερ ... οὕτως ... ἐφʼ ἡμῶν). La redacción española explicita la comparación de manera natural sin añadir doctrina externa ni suavizar la tensión entre paciencia y castigo.
  doctrine_reference: Preservar la tensión teológica del texto; equivalencia óptima
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan ampliamente. La principal decisión en español fue hacer explícita la comparación implícita y conservar el matiz de paciencia divina con una formulación idiomática y reverente.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el sujeto verbal, en línea con el referente de ὁ δεσπότης.
  - «Naciones» y «pecados» siguen la pluralidad del pasaje sin singularizar indebidamente.
  - Se evitó «SEÑOR» como máscara automática, porque el griego usa δεσπότης y el audit trail distingue este término de κύριος.
