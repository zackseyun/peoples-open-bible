revisions:
- from: Además[a], considerando a los gobernantes vecinos y a los que lindan con el reino, que están atentos a las ocasiones y esperan lo que sucederá, he nombrado rey a mi hijo Antíoco, a quien, cuando subía repetidas veces a las satrapías superiores, muchas veces encomendé y recomendé a la mayoría de ustedes[b]. Y he escrito a él lo que se incluye abajo.
  to: Además[a], considerando a los gobernantes vecinos y a los que lindan con el reino, que están atentos a las oportunidades y esperan lo que sucederá, he nombrado a mi hijo Antíoco como rey, a quien, cuando subía repetidas veces a las satrapías superiores, muchas veces encomendé y recomendé a la mayoría de ustedes[b]. Y le he escrito lo que está escrito abajo.
  rationale: 'La revisión hace ajustes pequeños pero importantes para mejorar fidelidad y naturalidad: se refuerza καιρός con «oportunidades», se suaviza la sintaxis de investidura real, se corrige el dativo español a «le he escrito» y se reemplaza «se incluye abajo» por «está escrito abajo», más cercano al griego y al tono epistolar-documental del pasaje.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:15:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: la motivación política, la designación de Antíoco como rey, la referencia a las satrapías y la mención de lo escrito a continuación. Sin embargo, hay varios puntos de fidelidad fina que conviene ajustar: «a la mayoría de ustedes» suaviza τοῖς πλείστοις ὑμῶν, que se entiende mejor como «a la mayoría de ustedes» o «a muchos de ustedes», pero en este contexto cortesano suena más natural «a la mayoría de ustedes»; el problema principal no es ese sino «he escrito a él», que es español poco natural, y «lo que se incluye abajo», que debilita τὰ ὑπογεγραμμένα frente a la idea más concreta de «lo escrito abajo / lo que está escrito abajo». También «atentos a las ocasiones» es aceptable, pero «pendientes de las oportunidades» o «atentos a las oportunidades» refleja mejor καιρός como momento oportuno.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta giros poco naturales o algo rígidos: «he escrito a él» debe ser «le he escrito»; «lo que se incluye abajo» suena administrativo moderno y menos fiel que «lo que está escrito abajo». Además, «rey a mi hijo Antíoco» es comprensible, pero «a mi hijo Antíoco como rey» o «a mi hijo Antíoco por rey» lee mejor en español actual sin perder precisión. El resto del verso es legible y de registro adecuado.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Satrapías» preserva correctamente el término persa. «Gobernantes» para δυνάστας y «recomendé / encomendé» para la pareja verbal son decisiones válidas. Se recomienda afinar καιρός con «oportunidades» en vez de «ocasiones» por la racionalidad lexical documentada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: «he escrito a él» es una construcción poco natural en español
    rationale: Aunque formalmente comprensible, en español estándar y eclesial amplio la forma idiomática es «le he escrito». La versión actual distrae innecesariamente.
  - severity: medium
    issue: «lo que se incluye abajo» debilita el matiz documental de τὰ ὑπογεγραμμένα
    rationale: El griego se refiere a lo escrito a continuación; «se incluye» suena editorial moderno y menos fiel que «lo que está escrito abajo» o «las cosas escritas abajo».
  - severity: low
    issue: «que están atentos a las ocasiones» refleja menos bien καιρός que «oportunidades»
    rationale: La auditoría inglesa justificó explícitamente el matiz de oportunidad política. «Ocasiones» es posible, pero «oportunidades» conserva mejor ese valor.
  - severity: low
    issue: «he nombrado rey a mi hijo Antíoco» es entendible pero algo menos natural que alternativas disponibles
    rationale: La construcción española puede mejorarse con «he nombrado a mi hijo Antíoco como rey», que expresa con más fluidez la investidura sin cambiar el sentido.
  revised_spanish_text: Además[a], considerando a los gobernantes vecinos y a los que lindan con el reino, que están atentos a las oportunidades y esperan lo que sucederá, he nombrado a mi hijo Antíoco como rey, a quien, cuando subía repetidas veces a las satrapías superiores, muchas veces encomendé y recomendé a la mayoría de ustedes[b]. Y le he escrito lo que está escrito abajo.
  revised_footnotes:
  - marker: a
    text: 'O: «los gobernantes vecinos y los que están contiguos al reino». El griego acumula descripciones geopolíticas que se solapan para enfatizar las potencias circundantes.'
    reason: lexical_alternative
  - marker: b
    text: «Satrapías superiores» conserva el término administrativo persa del griego; puede referirse de manera amplia a las provincias del interior o del oriente, no solo a «provincias» en sentido general.
    reason: cultural_note
  revision_rationale: 'La revisión hace ajustes pequeños pero importantes para mejorar fidelidad y naturalidad: se refuerza καιρός con «oportunidades», se suaviza la sintaxis de investidura real, se corrige el dativo español a «le he escrito» y se reemplaza «se incluye abajo» por «está escrito abajo», más cercano al griego y al tono epistolar-documental del pasaje.'
