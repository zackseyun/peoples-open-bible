revisions:
- from: Cuando la nube era levantada de sobre la tienda[a], después de eso, los hijos de Israel se ponían en marcha; y en el lugar donde la nube se detenía[b], allí acampaban los hijos de Israel.
  to: Siempre que la nube se elevaba de sobre la tienda[a], después de eso los hijos de Israel se ponían en marcha; y en el lugar donde la nube se asentaba, allí acampaban los hijos de Israel[b].
  rationale: 'La revisión ajusta tres puntos menores pero importantes: 1) ''Siempre que'' expresa mejor el valor repetido de וּלְפִי הֵעָלֹת; 2) ''se elevaba'' mejora la naturalidad española frente a la pasiva rígida ''era levantada''; 3) ''se asentaba'' refleja mejor el matiz de יִשְׁכָּן (''settled'') que ''se detenía''. También se reubica la nota [b] para anclarla directamente a ''los hijos de Israel'', que es el término al que corresponde la alternativa. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: la nube se eleva de sobre la tienda, luego los hijos de Israel parten, y donde la nube se asienta, allí acampan. También preserva correctamente ''la tienda'' y ''los hijos de Israel'' con notas alternativas. Sin embargo, dos elecciones españolas pueden mejorarse: ''Cuando'' debilita el matiz iterativo de וּלְפִי + infinitivo mejor reflejado por ''Siempre que'', y ''se detenía'' para יִשְׁכָּן pierde el matiz de posarse/asentarse que el inglés auditado documenta como ''settled''.'
  spanish_quality_summary: El texto es claro y legible, pero 'era levantada' suena algo rígido y menos natural que 'se elevaba' o 'se levantaba'. Además, 'después de eso' es comprensible, pero 'después' o 'después de eso' ambas funcionan; el principal ajuste necesario es mejorar naturalidad y precisión en la primera y segunda cláusulas sin apartarse del hebreo. La repetición 'allí ... allí' está bien preservada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se mantiene 'los hijos de Israel' en línea con la trazabilidad del POB, con nota para 'los israelitas'. 'La tienda' en vez de 'tabernáculo' en el texto principal también está correctamente alineado con la decisión auditada, con nota léxica apropiada.
  issues:
  - severity: medium
    issue: '''Cuando'' no expresa con suficiente claridad el valor iterativo/procedimental de וּלְפִי הֵעָלֹת'
    rationale: El hebreo y el POB inglés presentan una situación repetida ('Whenever'). En español bíblico claro, 'Siempre que' refleja mejor esa recurrencia que 'Cuando'.
  - severity: medium
    issue: '''se detenía'' para יִשְׁכָּן atenúa el sentido de asentarse/posarse'
    rationale: Aunque una nube puede 'detenerse', el verbo hebreo aquí, y la decisión inglesa 'settled', apuntan más a establecerse o posarse en un lugar. 'Se asentaba' conserva mejor ese matiz sin antropomorfismo excesivo.
  - severity: low
    issue: '''era levantada'' suena algo forzado en español natural'
    rationale: La pasiva refleja o un verbo intransitivo natural como 'se elevaba' comunica mejor el movimiento de la nube en español, manteniendo el sentido de הֵעָלֹת sin rigidez innecesaria.
  revised_spanish_text: Siempre que la nube se elevaba de sobre la tienda[a], después de eso los hijos de Israel se ponían en marcha; y en el lugar donde la nube se asentaba, allí acampaban los hijos de Israel[b].
  revised_footnotes:
  - marker: a
    text: O 'de sobre el tabernáculo', ya que 'la tienda' aquí se refiere a la tienda del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  revision_rationale: 'La revisión ajusta tres puntos menores pero importantes: 1) ''Siempre que'' expresa mejor el valor repetido de וּלְפִי הֵעָלֹת; 2) ''se elevaba'' mejora la naturalidad española frente a la pasiva rígida ''era levantada''; 3) ''se asentaba'' refleja mejor el matiz de יִשְׁכָּן (''settled'') que ''se detenía''. También se reubica la nota [b] para anclarla directamente a ''los hijos de Israel'', que es el término al que corresponde la alternativa. No se requiere adjudicación adicional.'
