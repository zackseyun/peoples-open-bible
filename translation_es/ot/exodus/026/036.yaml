translation:
  language: es
  text: Harás una cortina[a] para la entrada de la tienda, de azul, púrpura y escarlata, y de lino fino torcido, obra de un bordador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «velo» para la cobertura de la entrada; aquí se usa «cortina» para distinguirla del velo interior descrito en otras partes del capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָסָךְ
  english_pob_choice: screen
  chosen_spanish: pantalla
  alternatives_spanish:
  - cortina
  - velo
  lexicon: HALOT
  rationale: El término designa un colgante o cobertura funcional para una abertura. «Pantalla» mantiene la idea de un elemento que cubre o separa, y ayuda a distinguirlo del velo interior mencionado en el contexto inmediato. Se evita «velo» por su asociación cultual más específica y «cortina» por ser menos precisa para esta función.
- source_word: לְפֶתַח הָאֹהֶל
  english_pob_choice: for the entrance of the tent
  chosen_spanish: para la entrada de la tienda
  alternatives_spanish:
  - para la abertura de la tienda
  - para el acceso de la tienda
  lexicon: HALOT
  rationale: «Entrada» traduce de manera natural פֶתַח en este contexto de construcción. «Tienda» mantiene la referencia concreta al אֹהֶל sin introducir «tabernáculo» en una frase donde el hebreo habla simplemente de la tienda.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - azul
  lexicon: HALOT
  rationale: La gama exacta es un azul de tinte prestigioso, pero en español bíblico «azul» comunica bien el color sin sobrecargar la frase. Se evita repetir «hilo» porque el hebreo enumera materiales coloreados de forma compacta.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura
  lexicon: HALOT
  rationale: «Púrpura» conserva el valor de tejido teñido de color púrpura y su registro bíblico/dignificado. «Morado» sería más coloquial y menos preciso para este inventario textil.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - hilo escarlata
  - escarlata
  lexicon: HALOT
  rationale: Aquí la expresión nombra material teñido de escarlata; el hebreo no obliga a explicitar «hilo» en la frase principal. En español, «escarlata» funciona como adjetivo sustantivado dentro de la lista de materiales y evita añadir un sustantivo no expresado en el hebreo.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino fino torcido
  lexicon: HALOT
  rationale: «שֵׁשׁ» es lino fino y «מָשְׁזָר» indica que fue torcido o hilado en torsión. «Lino fino torcido» conserva ambas ideas con un español claro y breve. Se prefiere «torcido» por su fidelidad técnica, aunque «retorcido» también sería posible en español.
- source_word: מַעֲשֵׂה רֹקֵם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de un bordador
  alternatives_spanish:
  - trabajo de un bordador
  - obra bordada
  - obra de un bordador
  lexicon: HALOT
  rationale: La construcción alude a labor artesanal decorativa, probablemente de bordado. «Obra de un bordador» preserva el foco en el artesano, como en el inglés POB, y resulta natural en español bíblico.
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás
  lexicon: HALOT
  rationale: La forma imperfectiva con waw en esta secuencia de instrucciones tiene fuerza directiva. «Harás» es un mandato claro y fluido en español; se omite «y» para no recargar el verso, aunque la coordinación está implícita en la serie de mandatos del contexto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet hebreo y el criterio del POB inglés: distingue funcionalmente la cubierta exterior de la entrada de la cortina interior, y mantiene la lista de materiales textiles sin añadir glosas innecesarias.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y moderno, sin sustituir los colores y materiales por equivalentes más genéricos.
  - «Tienda» se usa para אֹהֶל conforme al contexto de construcción del santuario, evitando introducir «tabernáculo» donde el hebreo es más concreto.
  - 'La lista material conserva el orden del hebreo: azul, púrpura, escarlata y lino fino torcido.'
  - No se añadió «hilo» a los colores para no forzar una explicitación que el hebreo solo sugiere por el contexto textil.
