translation:
  language: es
  text: Y el sacerdote se pondrá su vestidura de lino[a], y se pondrá prendas interiores de lino sobre su cuerpo[b]; y quitará las cenizas de la ofrenda quemada que el fuego consumió sobre el altar[c], y las pondrá junto al altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vestidura» traduce aquí una prenda ritual general; el hebreo nombra una vestidura sacerdotal específica, pero el texto no precisa su corte.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre su carne». Se traduce «sobre su cuerpo» por naturalidad en español, conservando la idea de prenda llevada directamente sobre la piel.
    reason: lexical_alternative
  - marker: c
    text: La frase hebrea es compacta y también puede expresarse, de manera más literal, como «las cenizas que el fuego consumió de la ofrenda quemada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹ
  english_pob_choice: his linen garment
  chosen_spanish: su vestido de lino
  alternatives_spanish:
  - su vestidura de lino
  - su túnica de lino
  - su ropa de lino
  lexicon: HALOT
  rationale: En contexto sacerdotal, מִדּוֹ designa una prenda ritual/oficial. «Vestido» comunica bien una prenda puesta para el servicio sin forzar una forma exacta de corte; «de lino» conserva el material explicitado por בַד.
- source_word: בַד
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lienzo
  - tela de lino
  lexicon: HALOT
  rationale: En la legislación sacerdotal, בַד se refiere al material de lino. «Lino» es la equivalencia más clara y estable en español bíblico contemporáneo.
- source_word: מִכְנְסֵי בַד
  english_pob_choice: linen undergarments
  chosen_spanish: calzoncillos de lino
  alternatives_spanish:
  - ropa interior de lino
  - pantalones de lino
  - calzas de lino
  lexicon: HALOT
  rationale: El término alude a la prenda inferior llevada junto al cuerpo. «Calzoncillos» expresa mejor en español moderno la función de prenda interior; se evita «breeches»/«calzas» por sonar arcaico o ambiguo.
- source_word: עַל בְּשָׂרוֹ
  english_pob_choice: on his body
  chosen_spanish: sobre su cuerpo
  alternatives_spanish:
  - sobre su carne
  - sobre su cuerpo desnudo
  - junto a su piel
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «sobre su carne». «Sobre su cuerpo» mantiene el sentido de contacto directo y resulta más natural en español que una traducción demasiado cruda. Se preserva la tensión semántica entre corporalidad y prenda interior.
- source_word: וְהֵרִים
  english_pob_choice: he shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - levantará
  - retirará
  - sacará
  lexicon: HALOT
  rationale: El verbo literalmente significa «levantar/elevar», pero aquí el acto ritual es retirar las cenizas del altar. «Quitará» conserva la fuerza procedural en un español fluido.
- source_word: הַדֶּשֶׁן
  english_pob_choice: the ashes
  chosen_spanish: las cenizas
  alternatives_spanish:
  - la ceniza
  - los residuos de ceniza
  lexicon: HALOT
  rationale: En este contexto sacrificial, דֶּשֶׁן designa el residuo de ceniza producido por la combustión. «Cenizas» es la equivalencia natural y correcta.
- source_word: אֲשֶׁר תֹּאכַל הָאֵשׁ אֶת הָעֹלָה
  english_pob_choice: from the burnt offering that the fire consumed on the altar
  chosen_spanish: de la ofrenda quemada, a la que el fuego consumió sobre el altar
  alternatives_spanish:
  - de la ofrenda quemada que el fuego consumió sobre el altar
  - de la holocausto que el fuego consumió sobre el altar
  lexicon: HALOT
  rationale: La cláusula hebrea identifica las cenizas como procedentes de la ofrenda totalmente consumida por el fuego. «De la ofrenda quemada» expresa el origen; «a la que el fuego consumió» mantiene el vínculo relativo y la acción del fuego. Se evita una paraprástasis que diluya el nexo textual.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: la ofrenda quemada
  alternatives_spanish:
  - el holocausto
  - la ofrenda totalmente quemada
  - la ofrenda ascensional
  lexicon: HALOT
  rationale: Se prefiere «ofrenda quemada» porque comunica en español el sentido cultual de עֹלָה sin usar «holocausto», que en español moderno puede cargar asociaciones históricas no deseadas. También se preserva la relación con el fuego consumiendo la ofrenda.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  english_pob_choice: beside the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - cerca del altar
  - junto a la parte lateral del altar
  lexicon: HALOT
  rationale: אֵצֶל indica proximidad lateral o adyacente. «Junto al altar» es conciso, natural y fiel al matiz espacial.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión más reciente del inglés POB, que ajustó la cláusula de las cenizas para reflejar con mayor precisión el hebreo: las cenizas provienen de la ofrenda totalmente consumida por el fuego sobre el altar. La versión española conserva ese vínculo y evita expandir innecesariamente el relativo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo donde aparece en el texto fuente; este versículo no lo contiene.
  - Se evita «SEÑOR» por convención; no aplica aquí.
  - Se conserva un registro ritual claro y sobrio, con vocabulario culto pero moderno.
  - «Ofrenda quemada» sigue la decisión contextual de English POB para עֹלָה, evitando una traducción etimológica que pudiera sonar menos transparente al lector hispano.
  - No se fuerza una equivalencia de género o de oficio distinta del hebreo; «el sacerdote» mantiene el referente explícito del texto.
