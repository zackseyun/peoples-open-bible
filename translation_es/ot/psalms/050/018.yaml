translation:
  language: es
  text: Si viste a un ladrón[a], te agradaba[b], y tu porción estaba con los adúlteros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ladrón» traduce de forma directa גַנָּב; también puede entenderse simplemente como «un thief / uno que roba», pero «ladrón» es la opción natural en español actual.
    reason: lexical_alternative
  - marker: b
    text: O «aprobabas de él» / «consentías con él». El verbo hebreo puede expresar agrado, favor o aceptación; «te agradaba» preserva ese sentido básico en español natural.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «tu porción estaba con los adúlteros», un modismo que significa que te alineabas con ellos o compartías su compañía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce aquí una cláusula condicional o de caso; «Si» conserva su fuerza directa en español y funciona bien en el reproche retórico del contexto.
- source_word: רָאִיתָ
  english_pob_choice: you saw
  chosen_spanish: veías
  alternatives_spanish:
  - viste
  - has visto
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar una acción puntual en este tipo de acusación, pero en español «veías» mantiene mejor el tono de conducta habitual o patrón de conducta que el pasaje reprocha.
- source_word: גַנָּב
  english_pob_choice: a thief
  chosen_spanish: un ladrón
  alternatives_spanish:
  - un ladrón
  - un robador
  lexicon: HALOT
  rationale: גנב designa al que roba; «ladrón» es el equivalente natural y claro en español.
- source_word: וַתִּרֶץ
  english_pob_choice: you were pleased with
  chosen_spanish: te complacías con
  alternatives_spanish:
  - aprobabas de él
  - consentías con él
  - te agradaba él
  lexicon: HALOT
  rationale: La raíz רצה puede expresar agrado, aprobación o aceptación. «Te complacías con» conserva esa idea de favor/aceptación sin volverla más interpretativa de lo que permite el hebreo.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - en su compañía
  lexicon: HALOT
  rationale: La preposición y el sufijo se rinden de manera directa y natural como «con él».
- source_word: וְעִם
  english_pob_choice: and with
  chosen_spanish: y con
  alternatives_spanish:
  - y entre
  lexicon: HALOT
  rationale: La coordinación hebrea se expresa de forma simple y transparente con «y con».
- source_word: מְנָאֲפִים
  english_pob_choice: adulterers
  chosen_spanish: los adúlteros
  alternatives_spanish:
  - adúlteros
  - los que cometen adulterio
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para designar personas caracterizadas por el adulterio; «los adúlteros» es conciso y fiel.
- source_word: חֶלְקֶךָ
  english_pob_choice: your portion was
  chosen_spanish: tu porción estaba
  alternatives_spanish:
  - tu parte estaba
  - tu suerte estaba
  - tu lote estaba
  lexicon: HALOT
  rationale: חלק puede significar porción, parte o lote. «Tu porción estaba» preserva la metáfora hebrea de pertenencia o alineación sin añadir una explicación al texto principal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: el texto inglés lee «were pleased with him» y conserva la idea idiomática de alineación en la segunda mitad. La versión española sigue esa decisión lexical y evita convertir el hebreo en un simple «consentiste» o en una paráfrasis explicativa en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «adúlteros» para preservar el participio sustantivado hebreo.
  - Se prefirió un español natural pero cercano al orden y a la metáfora del hebreo, sin domesticar «porción» en «grupo» o «compañía».
  - La elección de imperfectos («veías», «te complacías», «estaba») da continuidad discursiva al reproche y evita forzar una lectura demasiado puntual.
