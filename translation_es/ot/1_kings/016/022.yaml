translation:
  language: es
  text: Pero el pueblo que seguía a Omri prevaleció[a] sobre el pueblo que seguía a Tibni hijo de Ginat. Entonces murió Tibni, y Omri llegó a ser rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue más fuerte que» / «se impuso sobre». El verbo hebreo puede denotar fuerza o superioridad; aquí se refiere a que la facción de Omri ganó la ventaja en el conflicto civil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  english_pob_choice: prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - fue más fuerte que
  - se impuso sobre
  - venció
  lexicon: HALOT
  rationale: En esta construcción con אֶת, el verbo expresa superioridad o victoria sobre un rival, no solo fortalecimiento interno. «Prevaleció» conserva esa fuerza política y suena natural en español.
- source_word: הָעָם אֲשֶׁר אַחֲרֵי עָמְרִי
  english_pob_choice: the people who followed Omri
  chosen_spanish: el pueblo que seguía a Omri
  alternatives_spanish:
  - el pueblo que iba detrás de Omri
  - el pueblo del lado de Omri
  - la gente que seguía a Omri
  lexicon: HALOT
  rationale: אַחֲרֵי literalmente es «después de», pero aquí indica adhesión o lealtad a un líder. «Que seguía a Omri» conserva la idea de facción alineada con él.
- source_word: אֶת הָעָם אֲשֶׁר אַחֲרֵי תִּבְנִי
  english_pob_choice: over the people who followed Tibni
  chosen_spanish: sobre el pueblo que seguía a Tibni
  alternatives_spanish:
  - contra el pueblo que seguía a Tibni
  - sobre el grupo que estaba con Tibni
  - sobre la gente del lado de Tibni
  lexicon: HALOT
  rationale: El marcador אֶת con חזק da el sentido de prevalecer sobre un grupo rival. Mantener el paralelismo con la primera mitad ayuda a reflejar el contraste del hebreo.
- source_word: תִּבְנִי בֶן גִּינַת
  english_pob_choice: Tibni son of Ginath
  chosen_spanish: Tibni hijo de Ginat
  alternatives_spanish:
  - Tibni, hijo de Ginat
  - Tibni hijo de Ginat
  - Tibni, hijo de Ginath
  lexicon: proyecto onomástico
  rationale: «Hijo de» es el equivalente normal de בן en una identificación genealógica. «Ginat» sigue la transliteración establecida para el nombre propio.
- source_word: וַיָּמָת תִּבְנִי
  english_pob_choice: So Tibni died
  chosen_spanish: Así murió Tibni
  alternatives_spanish:
  - Y murió Tibni
  - Entonces murió Tibni
  - De modo que murió Tibni
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Así» mantiene la secuencia y el matiz de resultado narrativo sin añadir causalidad explícita.
- source_word: וַיִּמְלֹךְ עָמְרִי
  english_pob_choice: Omri became king
  chosen_spanish: Omri llegó a ser rey
  alternatives_spanish:
  - Omri reinó
  - Omri se hizo rey
  - Omri comenzó a reinar
  lexicon: HALOT
  rationale: מלך en este contexto señala ascensión al trono tras la muerte del rival. «Llegó a ser rey» comunica bien la entronización y evita reducirlo a un simple período de reinado.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y coincide con la lectura y la decisión léxica del POB en inglés. No se detectaron revisiones posteriores que alteren el sentido base del versículo.
  spanish_consistency_notes:
  - Se mantiene «Omri» y «Tibni» como transliteraciones consistentes de los nombres propios.
  - Se usa «pueblo» para reflejar el sustantivo hebreo colectivo, aunque el sentido contextual es de facciones políticas.
  - «Prevaleció sobre» conserva la relación de superioridad expresada por חזק con אֶת.
  - Se evita un castellano arcaizante para que el versículo sea claro y publicable en español actual.
