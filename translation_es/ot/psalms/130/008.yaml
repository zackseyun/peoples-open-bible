translation:
  language: es
  text: Y él redimirá a Israel de todas las iniquidades de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, «de todas sus iniquidades». El hebreo usa «Israel» en singular con un sufijo singular («su»/«de él»), tratando a Israel como un todo colectivo. Más idiomáticamente en español, podría entenderse: «de todas sus iniquidades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ֭/הוּא
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Y él mismo
  - Y él, en cuanto a él
  lexicon: HALOT
  rationale: El hebreo añade el pronombre independiente junto con la conjunción, lo que da continuidad y un leve énfasis. En español, «Y él» transmite de forma natural esa continuidad sin sobredimensionar el énfasis con «mismo».
- source_word: יִפְדֶּ֣ה
  english_pob_choice: will redeem
  chosen_spanish: redimirá
  alternatives_spanish:
  - rescatará
  - comprará de vuelta
  lexicon: HALOT
  rationale: פדה expresa liberación mediante rescate o redención. «Redimirá» conserva ese valor fuerte y es adecuado en un contexto salmódico y teológicamente denso.
- source_word: יִשְׂרָאֵ֑ל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio, porque el texto habla del pueblo del pacto de manera colectiva y la forma breve es la más fiel al hebreo.
- source_word: מִ֝/כֹּ֗ל
  english_pob_choice: from all
  chosen_spanish: de todas
  alternatives_spanish:
  - de todo
  - de cada una de
  lexicon: HALOT
  rationale: La preposición más כֹּל expresa totalidad. En español, «de todas» fluye naturalmente con el sustantivo plural siguiente y comunica la extensión completa de la liberación.
- source_word: עֲוֺנֹתָֽי/ו
  english_pob_choice: his iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus pecados
  - su culpa
  - sus iniquidades[a]
  lexicon: HALOT
  rationale: עָוֹן suele implicar iniquidad o culpa, no solo pecado en sentido general. Se eligió «iniquidades» para conservar la fuerza léxica. El sufijo hebreo es singular («su»), pero en español se suaviza naturalmente a «sus» por tratarse de Israel como colectivo; la nota preserva la tensión entre la gramática hebrea y el español idiomático.
theological_decisions:
- issue: Sufijo pronominal singular aplicado a Israel como colectivo
  english_pob_reading: Render the 3ms suffix literally as 'his,' referring to Israel as a collective singular.
  chosen_spanish_reading: Se traduce idiomáticamente como «sus iniquidades», entendiendo a Israel como un colectivo y evitando un «su» singular demasiado rígido en español.
  alternative_spanish_readings:
  - «de sus iniquidades»
  - «de su iniquidad»
  rationale: El hebreo conserva singularidad gramatical con Israel y su sufijo; el español exige una acomodación más natural cuando el referente es un pueblo. La nota mantiene visible la tensión textual sin perder claridad de lectura.
  doctrine_reference: Translation philosophy items 1, 3 y 5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente; la redacción sigue el texto fuente hebreo con el mismo juicio auditado sobre la tensión entre el singular gramatical y el colectivo semántico.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto cuando corresponda; aquí el versículo no contiene el nombre divino.
  - «Redimirá» mantiene el campo semántico de פדה sin introducir una paráfrasis doctrinalmente más débil.
  - La nota al pie conserva la alternativa idiomática y explica la singularidad hebrea del sufijo pronominal.
