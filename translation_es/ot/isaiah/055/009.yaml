translation:
  language: es
  text: Porque como los cielos[a] son más altos que la tierra, así mis caminos son más altos que sus caminos[b], y mis pensamientos que sus pensamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo». El hebreo שָׁמַיִם es plural en su forma y suele traducirse «los cielos».
    reason: lexical_alternative
  - marker: b
    text: «Pensamientos» también puede significar «planes» o «intenciones» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación anterior; «Porque» conserva el valor causal/explanatorio de manera natural en español.
- source_word: גָבְהוּ
  english_pob_choice: are higher
  chosen_spanish: son más altos
  alternatives_spanish:
  - están más altos
  - son superiores
  lexicon: HALOT
  rationale: El verbo en contexto expresa un estado comparativo, no un proceso; «son más altos» reproduce la comparación de forma directa y clara.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos/los cielos del cielo
  - los cielos
  lexicon: HALOT
  rationale: «Cielos» mantiene el plural hebreo y es la forma española más natural y reverente; «los cielos» también permite oír el matiz poético de esfera elevada.
- source_word: מֵאָרֶץ
  english_pob_choice: than the earth
  chosen_spanish: que la tierra
  alternatives_spanish:
  - que la tierra
  - por encima de la tierra
  lexicon: HALOT
  rationale: La preposición comparativa se expresa con naturalidad en español mediante «que» en una comparación de superioridad.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  lexicon: HALOT
  rationale: Marca la analogía entre la altura de los cielos y la superioridad de los caminos y pensamientos de Dios.
- source_word: דְרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis maneras de actuar
  - mis sendas
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora bíblica de conducta o modo de proceder sin explicitarla en exceso.
- source_word: מִדַּרְכֵיכֶם
  english_pob_choice: than your ways
  chosen_spanish: que vuestros caminos
  alternatives_spanish:
  - que sus caminos
  - que sus sendas
  lexicon: HALOT
  rationale: Mantiene el paralelismo exacto con «mis caminos» y conserva el mismo valor metafórico de modo de actuar.
- source_word: וּמַחְשְׁבֹתַי
  english_pob_choice: and my thoughts
  chosen_spanish: y mis pensamientos
  alternatives_spanish:
  - y mis planes
  - y mis intenciones
  lexicon: HALOT
  rationale: «Pensamientos» preserva la amplitud semántica hebrea y el paralelo con la frase anterior sin restringirla solo a planes.
- source_word: מִמַּחְשְׁבֹתֵיכֶם
  english_pob_choice: than your thoughts
  chosen_spanish: que vuestros pensamientos
  alternatives_spanish:
  - que vuestros planes
  - que vuestras intenciones
  lexicon: HALOT
  rationale: Conserva el paralelismo poético y la comparación implícita del hebreo, en correspondencia con «mis pensamientos».
theological_decisions:
- issue: Metáfora de la trascendencia divina frente a la comprensión humana
  english_pob_reading: Retain 'my ways' and 'my thoughts' as direct metaphors for God's manner of acting and thinking without paraphrastic expansion.
  chosen_spanish_reading: Conservar «mis caminos» y «mis pensamientos» como metáforas directas de la manera de obrar y de pensar de Dios, sin explicarlas dentro del versículo.
  alternative_spanish_readings:
  - mis maneras de actuar
  - mis planes e intenciones
  rationale: La comparación poética subraya la trascendencia de Dios y la limitación humana. Traducir con metáforas preserva la tensión teológica y la fuerza literaria del texto.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido hebreo y el audit trail inglés: mantiene la comparación con מִן mediante «que», conserva el paralelismo poético de «caminos/pensamientos» y no desarrolla la metáfora más allá de lo que el texto warrants. No se registran revisiones previas aplicadas.'
  spanish_consistency_notes:
  - Se usó «cielos» para שָׁמַיִם, respetando el plural hebreo y la elevación poética del contexto.
  - Se mantuvo la correspondencia «mis... / vuestros...» en ambos miembros del paralelismo.
  - Se preservó la amplitud semántica de מַחְשְׁבֹת con «pensamientos», sin reducirla a «planes».
  - Se empleó «vuestros» por coherencia bíblica y registro litúrgico, manteniendo un español reverente y comprensible.
