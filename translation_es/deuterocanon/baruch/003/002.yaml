translation:
  language: es
  text: Escucha, Señor, y ten misericordia, porque hemos pecado contra ti[a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «delante de ti» o «en tu presencia». La frase griega puede indicar estar ante Dios y, al mismo tiempo, la ofensa dirigida contra él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄκουσον
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha, por favor
  lexicon: ἀκούω
  rationale: En oración directa, el imperativo español natural y reverente es «Escucha». Conserva el tono petitorio sin sonar tan impersonal como «Oye» ni añadir suavización no presente en el griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: κύριος
  rationale: En la dirección a Dios, «Señor» es el equivalente español más estable y litúrgicamente comprensible. Aunque el proyecto base usa «Lord», en español «Señor» comunica de forma natural el vocativo divino sin perder la referencia al título.
- source_word: ἐλέησον
  english_pob_choice: have mercy
  chosen_spanish: ten misericordia
  alternatives_spanish:
  - ten piedad
  - muéstrate misericordioso
  lexicon: ἐλεέω
  rationale: «Ten misericordia» es la expresión española más idiomática y bíblica para la súplica de ἐλέησον. Mantiene el valor imperativo de la petición y evita una paráfrasis más libre.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: ὅτι
  rationale: Aquí introduce la razón de la súplica. «Porque» expresa con claridad la causalidad en español moderno y conserva el sentido explicativo del griego.
- source_word: ἡμάρτομεν
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - hemos errado
  - pecamos
  lexicon: ἁμαρτάνω
  rationale: «Pecado» reproduce directamente el campo semántico de ἁμαρτάνω en un contexto penitencial. El perfecto compuesto español comunica un acto pasado con relevancia presente, como en el inglés auditado.
- source_word: ἐναντίον σου
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - delante de ti
  - ante ti
  - en tu presencia
  lexicon: ἐναντίον
  rationale: Con «hemos pecado», la relación más natural y teológicamente fuerte es «contra ti». Conserva el matiz de ofensa dirigida a Dios, que la auditoría inglesa también prioriza.
theological_decisions:
- issue: Tratamiento del vocativo divino Κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El pasaje es una oración penitencial dirigida a Dios. En español, «Señor» es la forma reverente y comprensible que corresponde al vocativo κύριος; «Dueño» o «Maestro» debilitarían el carácter orante y no reflejarían bien el uso bíblico.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Spanish adaptation of divine address'
- issue: Fuerza de ἐναντίον σου después de «hemos pecado»
  english_pob_reading: against you
  chosen_spanish_reading: contra ti
  alternative_spanish_readings:
  - delante de ti
  - ante ti
  - en tu presencia
  rationale: Aunque ἐναντίον puede describir estar 'delante de' alguien, en una confesión de pecado el sentido relacional de ofensa es el más importante. «Contra ti» expresa esa dimensión sin añadir contenido ajeno al griego.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern Spanish
translation_notes:
  revision_awareness: La redacción española sigue de cerca el sentido y la función orante del griego de Swete, pero adapta el vocativo y la súplica a un español natural y reverente. Frente al texto inglés auditado, se conservó la estructura breve de petición + razón causal, y se hizo explícita la alternativa semántica de ἐναντίον en nota.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - «Señor» se usa como vocativo divino idiomático en español, correspondiente al κύριος griego.
  - «Contra ti» preserva la fuerza confesional del texto sin perder la posibilidad literal alternativa indicada en la nota.
