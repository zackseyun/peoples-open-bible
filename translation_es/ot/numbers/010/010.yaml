review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: día de alegría, tiempos señalados, comienzos de meses, toque de trompetas sobre los sacrificios, función memorial ante Dios, y cierre con el nombre divino. Sin embargo, hay dos problemas de fidelidad formal y de anclaje de notas: el marcador [a] está colocado en «alegría» aunque la nota corresponde a «los comienzos de sus meses», y «y les serán como memorial» es menos fiel que «y serán para ustedes por memorial / como memorial» para וְהָיוּ לָכֶם לְזִכָּרוֹן.'
  spanish_quality_summary: El español es mayormente claro y digno. «Tiempos señalados», «holocaustos» y «delante de su Dios» funcionan bien. Conviene ajustar «y les serán como memorial» a una formulación más natural y exacta en español bíblico moderno. También debe corregirse la ubicación de la nota [a].
  glossary_alignment: 'Se mantiene correctamente «Yahvé» para יְהוָה, «ofrendas de paz» para שְׁלָמִים, «Dios» para אֱלֹהִים y «holocaustos» para עֹלָה. No hay conflicto doctrinal. La excepción necesaria es solo técnica: reubicar la nota lexical sobre «lunas nuevas» al sintagma «los comienzos de sus meses».'
  issues:
  - severity: medium
    issue: Nota [a] anclada en la palabra equivocada
    rationale: La nota «O “sus lunas nuevas”...» explica רָאשֵׁי חָדְשֵׁיכֶם, no שִׂמְחַתְכֶם. Debe anclarse en «los comienzos de sus meses».
  - severity: medium
    issue: «y les serán como memorial» suena menos natural y menos preciso
    rationale: וְהָיוּ לָכֶם לְזִכָּרוֹן expresa ‘serán para ustedes como memorial/por memorial’. «Les serán» es posible, pero menos idiomático aquí y diluye la construcción dativa hebrea.
  - severity: low
    issue: Uso de «su» puede sonar ambiguo en español eclesial amplio
    rationale: Aunque el plural de cortesía no está en juego y el contexto permite «su/sus», «ustedes» en la cláusula memorial mejora claridad en español latinoamericano sin alterar el sentido.
  revised_spanish_text: Y en el día de su alegría, y en sus tiempos señalados, y en los comienzos[a] de sus meses, tocarán las trompetas sobre sus holocaustos y sobre los sacrificios de sus ofrendas de paz, y serán para ustedes como memorial delante de su Dios[b]. Yo soy Yahvé, su Dios.
  revised_footnotes:
  - marker: a
    text: O «sus lunas nuevas». El hebreo dice literalmente «los comienzos de sus meses».
    reason: lexical_alternative
  - marker: b
    text: O «los sacrificios de sus ofrendas de comunión».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] al sintagma correcto que traduce רָאשֵׁי חָדְשֵׁיכֶם y se ajusta «y les serán» a «y serán para ustedes» para reflejar mejor וְהָיוּ לָכֶם y sonar más natural en español. Se conserva el resto de la terminología sacrificial y el uso de «Yahvé» conforme al proyecto.
