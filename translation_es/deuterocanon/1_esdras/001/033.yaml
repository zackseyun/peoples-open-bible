translation:
  language: es
  text: Y reinó en Israel y Jerusalén durante tres meses[a]; y el rey de Egipto lo depuso y no le permitió seguir reinando en Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en Israel y Jerusalén». En español, con un verbo de realeza, también podría decirse «sobre Israel y Jerusalén» para expresar el ámbito de su gobierno, pero aquí se conserva la forma del texto griego.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede en otros contextos significar «restaurar» o «poner», pero aquí el contexto indica que el rey de Egipto lo quitó del reinado en Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐβασίλευσεν
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a reinar
  - ejerció el reinado
  lexicon: BDAG
  rationale: El aoristo verbal expresa ejercicio real de la realeza; en español, «reinó» comunica de manera natural y formal que ejerció el reino, sin añadir matices de coronación o ascenso que el griego no obliga a poner.
- source_word: ἐν Ἰσραὴλ καὶ Ἰερουσαλήμ
  english_pob_choice: over Israel and Jerusalem
  chosen_spanish: en Israel y en Jerusalén
  alternatives_spanish:
  - sobre Israel y Jerusalén
  lexicon: BDAG
  rationale: Mantengo la preposición del griego, porque la fuente dice literalmente «en». Aunque en español «sobre» sería más idiomático con reinar, aquí la POB inglesa ya documenta la tensión entre literalidad y sentido; el español conserva el dato formal del texto fuente.
- source_word: μῆνας τρεῖς
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  - tres meses
  lexicon: BDAG
  rationale: Para expresar duración en español, «durante» es natural y claro. Conserva el valor temporal sin cambiar la referencia cuantitativa.
- source_word: ἀπεκατέστησεν
  english_pob_choice: deposed him
  chosen_spanish: lo depuso
  alternatives_spanish:
  - lo removió de reinar
  - lo apartó del reinado
  - lo restauró para reinar
  lexicon: BDAG
  rationale: 'En este contexto histórico la acción es privativa: el rey de Egipto lo aparta del trono. «Lo depuso» es la equivalencia española más precisa y concisa para la lectura contextual ya documentada en la POB inglesa.'
- source_word: βασιλεύειν ἐν Ἰερουσαλήμ
  english_pob_choice: from reigning in Jerusalem
  chosen_spanish: de reinar en Jerusalén
  alternatives_spanish:
  - de seguir reinando en Jerusalén
  - de reinar en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La construcción española «de reinar» conserva la relación del infinitivo con el verbo causativo implícito en la frase. No añado «seguir» porque el contexto ya indica cese de reinado; tampoco desarrollo más de lo que el griego exige.
- source_word: βασιλεὺς Αἰγύπτου
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el monarca de Egipto
  lexicon: BDAG
  rationale: Es el título directo y transparente. «Rey de Egipto» mantiene la forma tradicional sin recurrir a vocabulario más marcado o menos bíblico.
theological_decisions:
- issue: Sentido de ἀπεκατέστησεν con el infinitivo βασιλεύειν
  english_pob_reading: The king of Egypt deposed him, i.e. removed him from reigning in Jerusalem.
  chosen_spanish_reading: El rey de Egipto lo depuso, es decir, lo apartó del reinado en Jerusalén.
  alternative_spanish_readings:
  - El rey de Egipto lo restauró para reinar en Jerusalén.
  - El rey de Egipto lo confirmó para reinar en Jerusalén.
  rationale: La narrativa histórica inmediata favorece una lectura privativa, no restaurativa. Conservo esa decisión en español para no invertir el sentido del episodio; aun así, dejo constancia de que el verbo griego admite otros valores en otros contextos.
  doctrine_reference: 'Translation philosophy §§1, 5: primacía del texto original con decisión contextual documentada.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que pasó de «removed him» a «deposed him», y se reflejó esa precisión contextual en español con «lo depuso». También se respetó la decisión auditada de mantener el valor privativo de ἀπεκατέστησεν frente a la alternativa restaurativa.
  spanish_consistency_notes:
  - Se mantuvo el nombre geográfico «Jerusalén» con la misma forma en toda la cláusula.
  - Se usó el pretérito perfecto simple («reinó», «depuso») para reflejar la narración histórica del aoristo griego.
  - Se evitó sustituir «rey de Egipto» por fórmulas más interpretativas para conservar la transparencia del registro bíblico.
