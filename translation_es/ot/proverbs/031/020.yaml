review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el paralelismo hebreo y las decisiones léxicas principales: כַּפָּהּ como «palma», פָּרְשָׂה como «abre», יָדֶיהָ como «manos», שִׁלְּחָה como «extiende», y la distinción entre עָנִי («pobre») y אֶבְיוֹן («necesitado»). Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el POB inglés para פָּרְשָׂה con כַּף: la alternativa debe expresar «extiende/tiende/despliega su palma», no «su mano abierta», que cambia la categoría de la variante y pierde la relación verbal del hebreo.'
  spanish_quality_summary: El texto es claro, natural y digno en español. «Ella abre su palma al pobre, y extiende sus manos al necesitado» suena bien y conserva la imagen concreta. El único problema de calidad está en la redacción de la nota, que actualmente es poco idiomática y no corresponde al tipo de alternativa léxica preservada en inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos teológicos sensibles. La elección de «palma», «pobre» y «necesitado» está bien alineada con el expediente léxico.
  issues:
  - severity: medium
    issue: La nota al pie [a] no reproduce fielmente la alternativa léxica documentada para פָּרְשָׂה.
    rationale: 'El POB inglés conserva como alternativa «She spreads out her palm to the poor». La nota española actual «O: “su mano abierta”» no traduce esa variante verbal, introduce un sintagma nominal distinto, y debilita la trazabilidad del expediente léxico.'
  revised_spanish_text: Ella abre su palma[a] al pobre, y extiende sus manos al necesitado.
  revised_footnotes:
  - marker: a
    text: 'O: «Extiende su palma al pobre».'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal, porque es fiel, claro y natural. Solo se corrige la nota al pie para que preserve la alternativa léxica real del hebreo y del POB inglés: una variante verbal de פָּרְשָׂה con «palma», no una reformulación nominal como «su mano abierta».'
