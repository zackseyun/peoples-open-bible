translation:
  language: es
  text: 'El rey Ptolomeo Filopátor a los generales y soldados por todo Egipto y en todo lugar[a]: saludos y buena salud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega κατὰ τόπον es idiomática y puede aludir a una distribución por lugares, localidades o distritos. Por eso la traducción dice 'en todo lugar' sin decidir más específicamente la referencia administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  lexicon: LSJ
  rationale: Se mantiene el título real inicial como encabezamiento epistolar. En español, el artículo definido es natural al presentar al remitente y conserva el valor titulativo del griego.
- source_word: Πτολεμαῖος Φιλοπάτωρ
  english_pob_choice: Ptolemy Philopator
  chosen_spanish: Ptolomeo Filopátor
  alternatives_spanish:
  - Ptolomeo Filopator
  lexicon: Nombres propios transliterados
  rationale: Se translitera el nombre y el epíteto, sin traducirlos, conforme al criterio del proyecto para nombres propios.
- source_word: τοῖς κατʼ Αἴγυπτον
  english_pob_choice: throughout Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - en Egipto
  - por todo Egipto
  lexicon: LSJ
  rationale: El griego identifica a los destinatarios ubicados en Egipto. En español, 'de Egipto' funciona como complemento de pertenencia o localización administrativa en una salutación dirigida a los grupos que están allí; 'por todo Egipto' habría explicitado más el alcance distributivo, pero 'de Egipto' evita añadir una expansión interpretativa que el sintagma por sí solo no exige.
- source_word: καὶ κατὰ τόπον
  english_pob_choice: and in every place
  chosen_spanish: y de todo lugar
  alternatives_spanish:
  - y en todo lugar
  - y lugar por lugar
  - y en cada distrito
  lexicon: LSJ
  rationale: Se conserva el valor distributivo/local de la expresión idiomática sin forzar una precisión administrativa que el griego no define de manera explícita. 'De todo lugar' suena natural en español y mantiene la amplitud de la dirección.
- source_word: στρατηγοῖς
  english_pob_choice: the generals
  chosen_spanish: a los generales
  alternatives_spanish:
  - a los comandantes
  - a los jefes militares
  lexicon: LSJ
  rationale: '''Generales'' es la equivalencia directa y formal para στρατηγοῖς en un saludo oficial.'
- source_word: στρατιώταις
  english_pob_choice: and soldiers
  chosen_spanish: y soldados
  alternatives_spanish:
  - y tropas
  lexicon: LSJ
  rationale: Se conserva el referente personal concreto del término militar, evitando abstraerlo a 'tropas'.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - alégrense
  - salve
  lexicon: LSJ
  rationale: Como infinitivo epistolar de saludo, 'saludos' reproduce la función formularia de apertura en español contemporáneo sin perder el carácter oficial.
- source_word: ἐρρῶσθαι
  english_pob_choice: and good health
  chosen_spanish: buena salud
  alternatives_spanish:
  - salud
  - que gocen de salud
  - bienestar
  lexicon: LSJ
  rationale: La fórmula epistolar expresa bienestar y salud. 'Buena salud' conserva el sentido directo de la cláusula y resulta idiomática en español.
translation_notes:
  revision_awareness: La revisión inglesa corrigió 'in Egypt' a 'throughout Egypt' para reflejar mejor κατʼ Αἴγυπτον. En español, se optó por una formulación natural que mantiene la amplitud geográfica sin sobreespecificar el alcance local de κατὰ τόπον.
  spanish_consistency_notes:
  - Se mantiene un registro formal y epistolar coherente con una salutación oficial.
  - Se transliteran los nombres propios y se conserva el tono administrativo del texto griego.
  - La combinación 'saludos y buena salud' reproduce la fórmula doble del original sin modernizarla en exceso.
