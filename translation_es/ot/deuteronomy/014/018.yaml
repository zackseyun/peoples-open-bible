translation:
  language: es
  text: la cigüeña[a], y la garza[b] según su especie, y la abubilla[c], y el murciélago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la garza’ para ‘la cigüeña’; la identificación exacta de varias aves en este versículo es incierta.
    reason: lexical_alternative
  - marker: b
    text: O ‘el ibis’ o ‘el zambullidor’ para ‘la garza’.
    reason: lexical_alternative
  - marker: c
    text: Las versiones inglesas tradicionales suelen leer ‘lapwing’; el término hebreo probablemente se refiere a la abubilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲסִידָה
  english_pob_choice: the stork
  chosen_spanish: la cigüeña
  alternatives_spanish:
  - la garza
  lexicon: HALOT, BDB
  rationale: El inglés POB eligió ‘stork’ como identificación principal, con nota de que también puede entenderse ‘heron’. En español, ‘cigüeña’ es el equivalente zoológico natural de ‘stork’ y comunica mejor el ave probable en un registro bíblico legible. Se preserva la incertidumbre en nota.
- source_word: הָאֲנָפָה
  english_pob_choice: the heron
  chosen_spanish: la garza
  alternatives_spanish:
  - el ibis
  - el zambullidor
  lexicon: HALOT, BDB
  rationale: POB inglés mantiene ‘heron’ como elección convencional, reconociendo la incertidumbre. ‘Garza’ es la opción española más natural y amplia para un ave zancuda; evita una transliteración o una especificación excesiva que el hebreo no asegura.
- source_word: לְמִינָהּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su clase
  - según su género
  lexicon: HALOT, BDB
  rationale: La fórmula hebrea es taxonómica y clasificatoria. ‘Según su especie’ reproduce bien el valor de agrupación y es idiomática en español bíblico moderno.
- source_word: הַדּוּכִיפַת
  english_pob_choice: the hoopoe
  chosen_spanish: la abubilla
  alternatives_spanish:
  - la lapwing
  lexicon: HALOT, BDB
  rationale: El audit trail inglés prefiere ‘hoopoe’ sobre la tradición antigua ‘lapwing’. En español, el equivalente estándar y reconocido de ‘hoopoe’ es ‘abubilla’, que conserva la primacía del original frente a una tradición menos probable.
- source_word: הָעֲטַלֵּף
  english_pob_choice: the bat
  chosen_spanish: el murciélago
  lexicon: HALOT, BDB
  rationale: El hebreo designa claramente al murciélago. Se mantiene el sentido directo sin atenuarlo, aun cuando la lista lo coloque entre criaturas voladoras.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del POB inglés, que no introdujo cambios y mantiene alta concordancia con la decisión léxica previa. No hubo revisiones aplicadas adicionales en el pasaje.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque este versículo no contiene el tetragrámaton ni una referencia divina.
  - Se conserva el paralelismo coordinado simple de la lista zoológica.
  - ‘Abubilla’ se usa por su correspondencia moderna con el inglés POB ‘hoopoe’, en lugar de mantener la tradición inglesa ‘lapwing’.
