  lexicon: BDAG
  rationale: 5:22 τηρέω(지키다)와 일관. ἐντολή는 본 절에서 11-12절의 권면 전체를 가리키므로 「명령」(앞 절들의 어휘와 일관)이 자연스럽다.
- source_word: ἄσπιλον
