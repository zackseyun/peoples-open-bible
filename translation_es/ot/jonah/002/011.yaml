translation:
  language: es
  text: Entonces Yahvé habló al pez[a], y este vomitó a Jonás a tierra firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dijo al pez».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El verbo אמר significa literalmente 'decir'. En español, 'habló al pez' comunica con naturalidad el diálogo dirigido a un destinatario y conserva la secuencia narrativa sin sobreinterpretar un mandato explícito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor del Nombre divino en el texto hebreo. 'Yahvé' preserva el nombre personal de Dios y se ajusta al estándar del proyecto; se evita la sustitución por un título.
- source_word: לַדָּג
  english_pob_choice: to the fish
  chosen_spanish: al pez
  alternatives_spanish:
  - al gran pez
  - al pez grande
  lexicon: HALOT
  rationale: דג aquí es simplemente 'pez'; el adjetivo 'grande' no está presente en este versículo y no debe añadirse. El artículo y la preposición quedan bien representados por 'al'.
- source_word: וַיָּקֵא
  english_pob_choice: vomited
  chosen_spanish: vomitó
  alternatives_spanish:
  - lo arrojó
  - lo expulsó
  lexicon: HALOT
  rationale: קיא denota vomitar; 'vomitó' es la equivalencia más directa y transparente. Se conserva la fuerza del verbo sin suavizarla.
- source_word: אֶת יוֹנָה
  english_pob_choice: Jonah
  chosen_spanish: a Jonás
  alternatives_spanish:
  - Jonás
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת se refleja en español con la preposición personal 'a', normal en la sintaxis española con persona.
- source_word: אֶל הַיַּבָּשָׁה
  english_pob_choice: onto the dry land
  chosen_spanish: sobre la tierra seca
  alternatives_spanish:
  - a la tierra seca
  - sobre la tierra firme
  lexicon: HALOT
  rationale: יַבָּשָׁה es 'tierra seca' o 'tierra firme'. 'Sobre la tierra seca' reproduce el movimiento hacia la costa/continente sin importar un matiz no explicitado en el hebreo.
theological_decisions:
- issue: Tratamiento del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto para el Tetragrámaton favorece la transliteración del Nombre. 'Yahvé' mantiene la referencia al Nombre personal de Dios y evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB usa 'spoke to the fish' y anota como alternativa 'said to the fish'; no hubo cambios en la revisión más reciente. La versión española conserva esa apertura semántica con 'habló al pez' y una nota que permite 'le dijo al pez'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'Jonás' como forma española del nombre propio.
  - No se introduce 'pez grande' porque no aparece en este versículo.
  - La imagen final se expresa con 'tierra seca', en línea con הַיַּבָּשָׁה y la elección inglesa 'dry land'.
