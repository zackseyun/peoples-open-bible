translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que sustituyó una referencia contrastiva al 'segundo pilar' por una formulación con pronombre para reflejar mejor el hebreo. Por eso el español evita un énfasis innecesario en contraste y conserva el sentido de circunferencia/medición alrededor del pilar.
  spanish_consistency_notes:
  - Se conserva el estilo bíblico sobrio y técnico, con 'pilares' y 'codos' de manera uniforme.
  - Se evita 'Cristo', 'Señor' u այլ terminología no presente en el versículo.
  - La nota mantiene la alternativa lexical del audit trail sin duplicar el sentido principal del texto.
