    rationale: El POB inglés eligió transliterar el etnónimo como «Anakim» y justificó explícitamente no expandirlo ni sustituirlo por otra forma. «anaceos» es comprensible pero se aparta innecesariamente de esa rationale y puede sonar más interpretativo/tradicional que el enfoque fuente-cercano documentado.
