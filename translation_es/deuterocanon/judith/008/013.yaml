translation:
  language: es
  text: Y ahora están poniendo a prueba a Yahvé Todopoderoso[a], y no entenderán nada[b] jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están examinando» o «están investigando» a Yahvé Todopoderoso.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hasta la era»; la expresión significa «para siempre» o «por todo el tiempo».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριον Παντοκράτορα
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor, el Todopoderoso
  - el Señor, el Omnipotente
  - el Dueño Todopoderoso
  lexicon: LEH
  rationale: κύριος se rinde con 'Señor' por el equivalente funcional usual en español bíblico; Παντοκράτωρ se expresa naturalmente como 'Todopoderoso', preservando la idea de soberanía divina sin recurrir a una fórmula arcaizante.
- source_word: ἐξετάζετε
  english_pob_choice: are testing
  chosen_spanish: están poniendo a prueba
  alternatives_spanish:
  - están probando
  - están examinando
  - están investigando
  lexicon: BDAG
  rationale: El verbo puede implicar escrutinio, examen o prueba. 'Poner a prueba' conserva el tono de reprensión del contexto y la decisión inglesa revisada, sin reducirlo a una mera investigación técnica.
- source_word: οὐθὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: '''Nada'' es la equivalencia española más idiomática para el objeto negado y conserva la amplitud del indefinido griego.'
- source_word: ἐπιγνώσεσθε
  english_pob_choice: you will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - conocerán plenamente
  - llegarán a comprender
  - reconocerán
  lexicon: BDAG
  rationale: En este contexto la idea es incapacidad de comprensión real ante el escrutinio de Dios. 'Entenderán' transmite con claridad la fuerza epistemológica del verbo en español actual.
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - por toda la era
  - por toda la eternidad
  lexicon: LEH
  rationale: '''Jamás'' aquí funciona como negación temporal enfática y reproduce bien la fuerza de duración indefinida del giro griego. Se evita una traducción demasiado técnica como ''hasta la era''.'
theological_decisions:
- issue: Cómo expresar κύριος en un contexto de la LXX deuterocanónica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: La lectura inglesa trata κύριος como título divino. En español 'Señor' comunica esa misma referencia reverente y evita rebajar el título a un simple 'maestro'.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Fuerza de ἐξετάζετε en una reprensión sobre la indagación humana de Dios
  english_pob_reading: you are testing the Lord Almighty
  chosen_spanish_reading: están poniendo a prueba al Señor Todopoderoso
  alternative_spanish_readings:
  - están examinando al Señor Todopoderoso
  - están interrogando al Señor Todopoderoso
  rationale: 'La frase mantiene la tensión teológica: seres humanos actúan como si pudieran someter a examen a Dios. ''Poner a prueba'' reproduce la reprensión sin suavizarla ni convertirla en mera curiosidad intelectual.'
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Valor de ἕως τοῦ αἰῶνος en una negación de comprensión
  english_pob_reading: you will never understand anything
  chosen_spanish_reading: no entenderán nada jamás
  alternative_spanish_readings:
  - no entenderán nada para siempre
  - no llegarán a entender nada nunca
  rationale: La combinación negativa en español conserva la idea de imposibilidad total y duradera. 'Jamás' traduce de forma natural la duración indefinida del griego sin perder el énfasis de la frase.
  doctrine_reference: LEH ἕως τοῦ αἰῶνος
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del inglés auditado, que prefirió 'testing' frente a 'probing' por naturalidad contextual. En español se refleja esa decisión con 'poner a prueba', manteniendo además la duración indefinida de οὐθὲν ... ἕως τοῦ αἰῶνος mediante 'no entenderán nada jamás'.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος y 'Todopoderoso' para Παντοκράτωρ, en línea con el tratamiento divino estándar del proyecto.
  - Se evita 'Cristo' o terminología litúrgica no presente en el texto.
  - '''Poner a prueba'' conserva la tensión doctrinal de la reprensión sin añadir una interpretación ajena al griego.'
  - La negación se formula con 'nada jamás' para reproducir el carácter absoluto de οὐθὲν ... ἕως τοῦ αἰῶνος.
