translation:
  language: es
  text: 'Habla a los hijos de Israel y diles: Cuando un hombre o una mujer haga un voto especial[a], el voto de nazareo[b], para consagrarse a Yahvé,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si un hombre o una mujer se aparta mediante un voto de nazareo».'
    reason: lexical_alternative
  - marker: b
    text: «Nazareo» se refiere a una persona especialmente apartada para Yahvé bajo un voto.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo el idiomatisimo hebreo literal sin volverlo genérico en exceso. En español, 'hijos de Israel' comunica bien la fórmula de pacto y mantiene la relación familiar implícita del original.
- source_word: אִישׁ אוֹ אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: HALOT
  rationale: El hebreo menciona explícitamente ambos sexos; por eso no lo reduzco a un neutro como 'cualquiera'. 'Un hombre o una mujer' preserva la inclusión legal del texto.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: En esta instrucción legal, la partícula introduce un caso. 'Cuando' suena natural en español y conserva el sentido condicional sin endurecerlo como hipotético puro.
- source_word: יַפְלִא
  english_pob_choice: makes a special vow
  chosen_spanish: haga un voto especial
  alternatives_spanish:
  - se aparte por un voto
  - haga un voto extraordinario
  - haga un voto notable
  lexicon: HALOT
  rationale: El verbo intensifica la acción de votar en un contexto de apartamiento voluntario. 'Voto especial' comunica el matiz sin sobreexplicar ni perder la relación con el sustantivo siguiente.
- source_word: לִנְדֹּר נֶדֶר
  english_pob_choice: vow
  chosen_spanish: haga un voto
  alternatives_spanish:
  - haga un juramento
  - tome un voto
  lexicon: HALOT
  rationale: La forma infinitivo + sustantivo cognado refuerza la acción de formular un voto. En español, 'hacer un voto' es la equivalencia más clara y sobria.
- source_word: נֶדֶר נָזִיר
  english_pob_choice: the vow of a Nazirite
  chosen_spanish: el voto de nazareo
  alternatives_spanish:
  - el voto de nazareo
  - el voto de nazireo
  lexicon: HALOT
  rationale: '''Nazareo'' es la forma castellana más usual y reconocible para el término técnico de Números 6. Mantiene la relación constructa del hebreo sin paraphrasear la institución.'
- source_word: נָזִיר
  english_pob_choice: Nazirite
  chosen_spanish: nazareo
  alternatives_spanish:
  - nazareo
  - nazirita
  lexicon: HALOT
  rationale: Prefiero 'nazareo' para evitar un anglicismo transliterado innecesario en español. El término sigue siendo técnico, pero inteligible para lectores bíblicos.
- source_word: לְהַזִּיר
  english_pob_choice: to dedicate himself
  chosen_spanish: para consagrarse
  alternatives_spanish:
  - para apartarse
  - para dedicarse
  - para consagrarse a sí mismo
  lexicon: HALOT
  rationale: El verbo expresa apartamiento con sentido consagratorio. 'Consagrarse' comunica bien ese acto en español bíblico contemporáneo sin volverlo demasiado interpretativo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: HALOT
  rationale: 'Sigo la política del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre del pacto y evita la máscara convencional ''SEÑOR''.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El hebreo nombra directamente a יהוה. En español, 'Yahvé' es la forma establecida por la política del proyecto y conserva visible el nombre divino en vez de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Inclusión de hombre y mujer en una ley de consagración
  english_pob_reading: Retain both 'a man or a woman'
  chosen_spanish_reading: un hombre o una mujer
  alternative_spanish_readings:
  - cualquiera
  - una persona
  rationale: El texto explícitamente incluye ambos sexos y no conviene neutralizarlo. Mantener la dupla respeta la forma legal del hebreo y evita borrar un matiz del alcance de la norma.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Término técnico nazireo/nazareo
  english_pob_reading: Nazirite
  chosen_spanish_reading: nazareo
  alternative_spanish_readings:
  - nazireo
  - nazirita
  rationale: El pasaje trata una institución específica. 'Nazareo' es la opción más natural en español bíblico para este marco ritual y conserva la tensión entre voto, apartamiento y consagración.
  doctrine_reference: Lexical consistency for technical terms
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido hebreo y la auditable de la POB inglesa: mantiene la estructura legal del enunciado, preserva la mención explícita de hombre y mujer, y conserva el término técnico del voto de nazareo con el nombre divino Yahvé. No hay cambios de revisión aplicados en el contexto fuente, así que no se introducen reajustes editoriales adicionales.'
  spanish_consistency_notes:
  - Uso 'Yahvé' de manera consistente para יהוה.
  - Empleo 'voto' para נדר y 'nazareo' para נזיר, evitando mezclar 'nazareo/nazareo' con 'Nazareo' como nombre propio salvo inicio de oración.
  - '''Consagrarse'' intenta recoger el valor de separación dedicada del verbo sin borrar el matiz ritual.'
  - La nota a marca la alternativa sintáctica y lexical completa preservada en el inglés audit trail.
