translation:
  language: es
  text: Entonces se vieron[a] los canales del mar; se pusieron al descubierto los cimientos del mundo[b], ante el reproche de Yahvé, ante el soplo del aliento de sus fosas nasales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparecieron».
    reason: alternative_reading
  - marker: b
    text: O «el mundo habitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָאוּ
  english_pob_choice: were seen
  chosen_spanish: se vieron
  alternatives_spanish:
  - aparecieron
  - llegaron a verse
  lexicon: HALOT
  rationale: El nifal de ראה conserva la pasiva/medio-pasiva; en español, 'se vieron' reproduce con naturalidad la pasividad y la imagen vívida del verso sin introducir una explicación ajena al texto.
- source_word: אֲפִיקֵי יָם
  english_pob_choice: the channels of the sea
  chosen_spanish: los canales del mar
  alternatives_spanish:
  - los lechos del mar
  - los cauces del mar
  - los canales del mar
  lexicon: HALOT
  rationale: אֲפִיקִים puede significar canales, cauces o lechos de agua. 'Canales del mar' mantiene la imagen de los surcos o pasajes expuestos por la acción divina y sigue de cerca la decisión inglesa sin sobrecargar con una glosa interpretativa.
- source_word: יִגָּלוּ
  english_pob_choice: were laid bare
  chosen_spanish: se pusieron al descubierto
  alternatives_spanish:
  - fueron descubiertos
  - quedaron al descubierto
  lexicon: HALOT
  rationale: El nifal de גלה expresa quedar/ser descubierto. 'Se pusieron al descubierto' es idiomático en español y conserva el matiz poético de exposición visible.
- source_word: מֹסְד֣וֹת תֵּבֵל
  english_pob_choice: the foundations of the world
  chosen_spanish: los cimientos del mundo
  alternatives_spanish:
  - los fundamentos del mundo
  - los cimientos de la tierra
  - los fundamentos de la tierra
  lexicon: HALOT
  rationale: מֹסְדוֹת son fundamentos o cimientos. תֵּבֵל en poesía suele referirse al mundo habitado; 'mundo' conserva bien el alcance cósmico y resulta natural en español.
- source_word: בְּגַעֲרַת יְהוָה
  english_pob_choice: at the rebuke of Yahweh
  chosen_spanish: ante el reproche de Yahvé
  alternatives_spanish:
  - por el reproche de Yahvé
  - a causa del reproche de Yahvé
  - ante la reprensión de Yahvé
  lexicon: HALOT
  rationale: גְּעָרָה puede ser reprensión o reproche en contextos teofánicos. 'Reproche' mantiene la fuerza de una reprensión divina; 'ante' comunica el efecto causal/en presencia de esa palabra poderosa en español poético. Se preserva 'Yahvé' según la convención del proyecto.
- source_word: מִנִּשְׁמַת רוּחַ אַפּוֹ
  english_pob_choice: at the blast of the breath of his nostrils
  chosen_spanish: ante el soplo del aliento de sus fosas nasales
  alternatives_spanish:
  - ante el soplo del aliento de su nariz
  - ante el aliento del soplo de sus fosas nasales
  - por el soplo del aliento de sus fosas nasales
  lexicon: HALOT
  rationale: נִשְׁמָה es aliento/soplo y רוּחַ aquí intensifica la exhalación poética; אַף literalmente es nariz/fosas nasales y, por extensión, ira. 'Aliento de sus fosas nasales' conserva la imagen antropomórfica hebrea. Se usa 'soplo' para נִשְׁמָה por su fuerza sonora y poética en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: El texto hebreo trae explícitamente el Tetragrama. La convención del proyecto en español es 'Yahvé', para preservar el nombre propio del pacto sin sustituirlo por un título. Esto sigue la decisión teológica del POB de no enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adapted in Spanish as Yahvé)'
- issue: Valor de תֵּבֵל
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la tierra
  - el mundo habitado
  rationale: תֵּבֵל suele designar el mundo habitado en poesía, pero la traducción base inglesa opta por 'world' para mantener naturalidad y amplitud cósmica. 'Mundo' en español reproduce bien ese alcance sin introducir una especificación no requerida por el verso.
  doctrine_reference: HALOT / poesía sapiencial y de lamentación
translation_notes:
  revision_awareness: 'Se siguió el pasaje inglés auditado sin cambios de revisión aplicados; el estado de revisión más reciente indica que no se necesitaron modificaciones. La versión española conserva las decisiones léxicas y teológicas principales: el verbo pasivo de «ver», la imagen de los canales/lechos expuestos, el par de paralelismos cósmicos y el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva el paralelismo poético con dos miembros coordinados por punto y coma.
  - '''Mar'' y ''mundo'' se usan en sentido común y poético, sin capitalización teológica añadida.'
  - '''Fosas nasales'' preserva la imaginería corporal hebrea y evita suavizar el antropomorfismo.'
