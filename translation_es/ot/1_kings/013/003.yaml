translation:
  language: es
  text: 'Y en aquel día dio una señal[a], diciendo: «Esta es la señal que Yahvé ha hablado: he aquí, el altar será desgarrado, y la ceniza[b] que está sobre él será derramada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “maravilla” o “portento” para “señal” (hebreo מוֹפֵת).
    reason: lexical_alternative
  - marker: b
    text: “Ceniza” traduce un término hebreo que puede referirse más específicamente a los restos grasos o cenicientos de los sacrificios.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: he gave
  chosen_spanish: dio
  alternatives_spanish:
  - dijo
  - puso
  lexicon: HALOT
  rationale: En el contexto de מוֹפֵת, נתן funciona idiomáticamente como ‘dar’ una señal. ‘Dio’ conserva la acción de proporcionar el signo sin forzar una glosa más interpretativa.
- source_word: מוֹפֵת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - portento
  - maravilla
  lexicon: HALOT
  rationale: ‘Señal’ comunica bien en español la función de autenticación profética. ‘Signo’ sería posible, pero ‘señal’ suena más natural en narración bíblica y no exagera el componente extraordinario.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Introducción normal de discurso directo en español. ‘Diciendo’ preserva la relación sintáctica del hebreo sin añadir contenido.
- source_word: זֶה הַמּוֹפֵת
  english_pob_choice: This is the sign
  chosen_spanish: Esta es la señal
  alternatives_spanish:
  - Este es el signo
  - Esta es la señal de autenticación
  lexicon: HALOT
  rationale: Se mantiene la deixis enfática del hebreo. ‘Señal’ continúa la elección terminológica del primer מוֹפֵת para consistencia dentro del versículo.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD has spoken
  chosen_spanish: Yahvé ha hablado
  alternatives_spanish:
  - Yahvé habló
  - Yahvé ha dicho
  lexicon: HALOT
  rationale: El perfecto español expresa una palabra ya pronunciada cuyo cumplimiento se verifica ahora. Se conserva ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: transliteración del Tetragrámaton como ‘Yahvé’ en el texto principal, evitando la sustitución por un título.'
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: HALOT
  rationale: En español, ‘miren’ transmite la fuerza deíctica y la llamada a atender el anuncio sin sonar arcaico. Es una equivalencia dinámica moderada para un contexto profético.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Renderización directa y transparente del objeto cultual.
- source_word: נִקְרָע
  english_pob_choice: will be torn apart
  chosen_spanish: será partido
  alternatives_spanish:
  - será roto
  - será desgarrado
  - será dividido
  lexicon: HALOT
  rationale: El pasivo comunica el quiebre del altar. ‘Partido’ mantiene la idea de ruptura física y suena natural en español; ‘desgarrado’ sería más fuerte pero menos literal para un altar de piedra.
- source_word: וְנִשְׁפַּךְ
  english_pob_choice: will be poured out
  chosen_spanish: será derramada
  alternatives_spanish:
  - será vaciada
  - será vertida
  - caerá
  lexicon: HALOT
  rationale: ‘Derramada’ conserva el movimiento de salida/vertido del hebreo y funciona bien con ‘la ceniza’ en español.
- source_word: הַדֶּשֶׁן
  english_pob_choice: the ashes
  chosen_spanish: la ceniza
  alternatives_spanish:
  - las cenizas
  - la grasa quemada y las cenizas
  lexicon: HALOT
  rationale: El contexto sacrificial permite ‘ceniza’ como término natural en español. Se evita sobrecargar el texto principal con la explicación técnica; la nota preserva la precisión semántica.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that are on it
  chosen_spanish: que está sobre él
  alternatives_spanish:
  - que están sobre él
  - que hay sobre él
  - sobre él
  lexicon: HALOT
  rationale: En español, ‘ceniza’ suele ser singular colectivo; por eso el relativo va en singular. ‘Sobre él’ retiene la referencia al altar con claridad.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo nombra explícitamente a YHWH. Se mantiene el nombre propio ‘Yahvé’ en español para preservar la decisión teológica y filológica del proyecto de no ocultar el Tetragrámaton detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del audit trail inglés sin cambios sustantivos: conserva la función de מוֹפֵת como signo validante, el nombre divino como Yahvé y la imagen del altar roto con sus residuos sacrificiales derramados.'
  spanish_consistency_notes:
  - 'Se mantiene una sola elección para מוֹפֵת en todo el versículo: ‘señal’.'
  - ‘Yahvé’ se usa de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - El singular colectivo ‘la ceniza’ evita una falsa pluralización en español y armoniza con ‘está’.
