revisions:
- from: Y esperaré en Yahvé[a], que oculta su rostro de la casa de Jacob[b], y en él esperaré.
  to: Y esperaré a Yahvé, que oculta[a] su rostro de la casa de Jacob[b], y pondré mi esperanza en él.
  rationale: Se corrige la primera cola a 'esperaré a Yahvé' para reflejar con mayor fidelidad y naturalidad el hebreo לַיהוָה. Se mueve la nota [a] al verbo 'oculta', que es donde corresponde la alternativa participial documentada. Se ajusta la última cola a 'pondré mi esperanza en él' para distinguir mejor קוה de חכה en español y mantener buena fluidez.
