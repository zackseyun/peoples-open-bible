  - severity: medium
    issue: «Entregó ... en su mano» es poco natural y ambiguo en español
    rationale: Aunque intenta reflejar בְּיָדָם, en español «en su mano» suena forzado y el posesivo singular puede confundirse. «En manos de ellos» preserva el modismo de entrega al poder de otro y mejora la legibilidad.
  - severity: low
