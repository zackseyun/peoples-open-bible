translation:
  language: es
  text: En aquellos días no había rey en Israel[a]; cada hombre hacía lo recto a sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos hacían lo que era recto a sus propios ojos». El hebreo usa el singular masculino «hombre» en sentido representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un marco temporal narrativo retrospectivo. «En aquellos días» es la equivalencia española más natural y conserva el tono bíblico sin añadir matiz interpretativo.
- source_word: אֵין מֶלֶךְ בְּיִשְׂרָאֵל
  english_pob_choice: there was no king in Israel
  chosen_spanish: no había rey en Israel
  alternatives_spanish:
  - no existía rey en Israel
  - no hubo rey en Israel
  lexicon: HALOT
  rationale: אֵין expresa ausencia. «No había rey en Israel» reproduce de forma idiomática esa ausencia en español y evita endurecer el tiempo verbal más de lo que exige el contexto.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  - todo hombre
  lexicon: HALOT
  rationale: El hebreo usa el singular אִישׁ en sentido representativo. «Cada hombre» preserva esa fuerza singular masculina que el POB inglés mantuvo con «each man», sin neutralizarla indebidamente.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo que era recto
  - lo justo
  - lo correcto
  lexicon: HALOT
  rationale: יָשָׁר denota lo recto, derecho, correcto. En esta expresión fija, «lo recto» transmite bien el juicio evaluativo del texto y conserva la concisión del hebreo.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: ante sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - en sus propios ojos
  - según su propia vista
  lexicon: HALOT
  rationale: La metáfora hebrea comunica juicio subjetivo. «Ante sus propios ojos» mantiene el sentido idiomático de valoración personal; aunque difiere levemente de la calca inglesa, su función semántica es equivalente y natural en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: did
  chosen_spanish: hacía
  alternatives_spanish:
  - hizo
  - haría
  - solía hacer
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, aquí expresa acción habitual o reiterada en una síntesis narrativa. «Hacía» comunica mejor esa habitualidad en español que un perfecto simple.
theological_decisions:
- issue: Evaluación narrativa de la condición de Israel sin convertirla en una tesis política explícita
  english_pob_reading: The verse is a descriptive statement that also carries negative evaluative force through the idiom 'what was right in his own eyes,' without expanding it into a doctrinal claim beyond the text.
  chosen_spanish_reading: El versículo se presenta como una afirmación descriptiva que también carga una valoración negativa por medio de la expresión «lo recto ante sus propios ojos», sin convertirla en una tesis doctrinal o política que el texto no enuncia.
  alternative_spanish_readings:
  - Una nota histórica neutral sobre la falta de autoridad central
  - Una afirmación doctrinal explícita de que la monarquía era la solución necesaria
  rationale: El refrán de Jueces funciona literariamente como evaluación del desorden social y religioso. La traducción conserva esa tensión al expresar el dicho con sobriedad y sin ampliar su alcance más allá de lo que dice el versículo.
  doctrine_reference: Conservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Coincide con el control final disponible: no se registraron revisiones aplicadas y el acuerdo de revisión fue alto, por lo que la redacción propuesta mantiene la lectura estándar del verso sin cambios adicionales.'
  spanish_consistency_notes:
  - Se conserva «rey» para מֶלֶךְ, acorde con el paralelismo narrativo y sin introducir «gobernante» u otro término no sustentado por el hebreo.
  - Se mantiene el singular representativo «cada hombre» para reflejar el hebreo אִישׁ y la decisión auditada del POB inglés.
  - La frase final se formula con un modismo español claro («ante sus propios ojos») para preservar el sentido idiomático de subjetividad evaluativa.
  - Se evita «SEÑOR» u otras sustituciones, porque el versículo no contiene el nombre divino ni alusiones que lo requieran.
