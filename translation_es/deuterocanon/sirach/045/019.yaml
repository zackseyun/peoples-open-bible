translation:
  language: es
  text: Los hombres de Datán y Abiram[a], y la compañía de Coré en la fuerza de su ira[b]—Yahvé vio y se enfureció, y los consumió en el calor de su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego amplía el juicio: «fueron llevados a su fin en ira; hizo prodigios para ellos, para consumirlos en el fuego de su llama». El testimonio hebreo es más breve aquí.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en la fiereza de su ira». La frase hebrea está comprimida y puede describir la violencia airada de los rebeldes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אנשי
  english_pob_choice: The men of
  chosen_spanish: Los hombres de
  alternatives_spanish:
  - La gente de
  - Los seguidores de
  lexicon: HALOT
  rationale: El hebreo nombra de manera concreta a los integrantes del grupo. «Los hombres de» conserva esa identificación directa y evita suavizar el matiz colectivo.
- source_word: דתן ואבירם
  english_pob_choice: Dathan and Abiram
  chosen_spanish: Datán y Abiram
  lexicon: Convención bíblica española estándar
  rationale: Los nombres propios se transliteran en forma bíblica habitual en español.
- source_word: ועדת קרח
  english_pob_choice: and the company of Korah
  chosen_spanish: y la compañía de Coré
  alternatives_spanish:
  - y la congregación de Coré
  - y la asamblea de Coré
  lexicon: HALOT
  rationale: «עדה» puede ser asamblea, congregación o compañía. «Compañía» reproduce bien el sentido de un grupo rebelde sin cargarlo con un tono eclesial que el contexto no exige.
- source_word: בעזוז אפם
  english_pob_choice: in the strength of their anger
  chosen_spanish: en la fuerza de su ira
  alternatives_spanish:
  - en la fiereza de su ira
  - en su ira poderosa
  lexicon: HALOT
  rationale: «עֲזוּז» expresa fuerza, vigor o vehemencia; «אף» aquí es ira. «En la fuerza de su ira» sigue de cerca la construcción hebrea y su intensidad.
- source_word: וירא יהוה
  english_pob_choice: Yahweh saw
  chosen_spanish: Yahvé vio
  alternatives_spanish:
  - Yahvé miró
  - Yahvé contempló
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé», conforme al criterio del proyecto, y el verbo פשוט ראה se traduce de forma directa.
- source_word: ויתאנף
  english_pob_choice: and was enraged
  chosen_spanish: y se indignó
  alternatives_spanish:
  - y se enfureció
  - y se airó
  lexicon: HALOT
  rationale: El hitpael de אנף expresa el paso a la ira o manifestación de indignación. «Se indignó» mantiene la intensidad sin sonar demasiado coloquial.
- source_word: ויכלם
  english_pob_choice: and he consumed them
  chosen_spanish: y los consumió
  alternatives_spanish:
  - y los destruyó
  - y los acabó
  lexicon: HALOT
  rationale: Aunque el hebreo es difícil, el contexto y el paralelo griego apoyan un acto de destrucción punitiva. «Consumió» permite conservar la imagen de consumación/destrucción sin añadir elementos ajenos.
- source_word: בחרון אפו
  english_pob_choice: in the heat of his anger
  chosen_spanish: en el calor de su ira
  alternatives_spanish:
  - en el ardor de su ira
  - en la ardiente ira de él
  lexicon: HALOT
  rationale: Es un modismo hebreo de ira intensa. «Calor de su ira» preserva la metáfora en español natural y transparente.
theological_decisions:
- issue: Divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton. En el español del proyecto se lo vierte como «Yahvé» para preservar el nombre del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Base textual principal in Sirach
  english_pob_reading: Translate primarily from the extant Hebrew, while allowing the Greek to clarify the judgment language in ויכלם
  chosen_spanish_reading: Traducir principalmente del hebreo conservado, dejando que el griego apoye la comprensión de «y los consumió»
  alternative_spanish_readings:
  - Incorporar la expansión griega sobre maravillas y fuego consumidor en el texto principal
  - Seguir solo la expansión griega
  rationale: La política del POB para Sirácida es dar prioridad al hebreo donde existe y usar el griego como apoyo para pasajes difíciles. Por eso no se importa la expansión griega al texto principal, aunque sí informa la interpretación de la cláusula final.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as input'
translation_notes:
  revision_awareness: 'El borrador sigue el último pase de revisión sin cambios sustanciales: el testimonio hebreo se traduce como base, el griego se usa solo como apoyo para la cláusula difícil de ויכלם, y se conserva el nombre divino como Yahvé. No se incorporó la expansión griega al texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - «Compañía» se mantiene para עדה por coherencia con el tratamiento de grupos rebeldes en Sirácida.
  - «Consumió» conserva la imagen de destrucción intensa sin sobrerinterpretar el verbo hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino para mantener transparencia textual.
