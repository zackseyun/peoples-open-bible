translation:
  language: es
  text: Se asentaron desde Havilá hasta Sur, que está frente a Egipto, en dirección a Asur[b]. Se asentó frente a todos sus hermanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se asentó frente a todos sus hermanos». La cláusula hebrea final es idiomática y puede describir posición espacial más que hostilidad.'
    reason: alternative_reading
  - marker: b
    text: Asur también puede traducirse «Asiria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּנוּ
  english_pob_choice: They settled
  chosen_spanish: Habitaban
  alternatives_spanish:
  - Se asentaron
  - Vivían
  lexicon: HALOT
  rationale: El hebreo expresa residencia continua en un territorio. «Habitaban» mantiene el sentido de establecimiento sin sonar tan conclusivo como «se asentaron», y funciona bien en una descripción geográfica.
- source_word: מֵחֲוִילָה עַד שׁוּר
  english_pob_choice: from Havilah to Shur
  chosen_spanish: desde Havilá hasta Sur
  alternatives_spanish:
  - de Havilá a Sur
  - desde Javilá hasta Sur
  lexicon: HALOT
  rationale: La fórmula territorial se conserva de forma directa. Se translitera Havilá y Sur para mantener los nombres propios del texto base.
- source_word: אֲשֶׁר עַל־פְּנֵי מִצְרַיִם
  english_pob_choice: which is opposite Egypt
  chosen_spanish: que está frente a Egipto
  alternatives_spanish:
  - que está opuesto a Egipto
  - que queda frente a Egipto
  lexicon: HALOT
  rationale: «Frente a» reproduce bien el valor espacial de עַל־פְּנֵי sin introducir una dirección más precisa de la que el hebreo garantiza. En español suena natural y conserva la relación geográfica.
- source_word: בֹּאֲכָה אַשּׁוּרָה
  english_pob_choice: as you go toward Asshur
  chosen_spanish: en dirección a Asur
  alternatives_spanish:
  - camino a Asur
  - hacia Asur
  lexicon: HALOT
  rationale: La forma direccional pide un giro dinámico. Se mantiene Asur como transliteración del topónimo, porque el texto hebreo nombra el lugar/entidad así y el inglés POB conserva «Asshur» con nota alternativa.
- source_word: עַל־פְּנֵי כָל אֶחָיו נָפָל
  english_pob_choice: He settled opposite all his brothers
  chosen_spanish: Se asentó frente a todos sus hermanos
  alternatives_spanish:
  - Se asentó en oposición a todos sus hermanos
  - Se asentó ante todos sus hermanos
  lexicon: HALOT
  rationale: El audit trail inglés revisó una lectura más interpretativa («in defiance») y prefirió una formulación más literal («opposite»). En español, «frente a» preserva esa literalidad espacial y deja abierta la tensión del hebreo idiomático sin resolverla demasiado.
theological_decisions:
- issue: Interpretación de עַל־פְּנֵי כָל־אֶחָיו נָפָל
  english_pob_reading: He settled opposite all his brothers
  chosen_spanish_reading: Se asentó frente a todos sus hermanos
  alternative_spanish_readings:
  - Se asentó en oposición a todos sus hermanos
  - Se asentó en desafío de todos sus hermanos
  rationale: 'La frase hebrea es idiomática y debatida. El POB en inglés optó por una lectura más literal en la revisión final, evitando cargar el verso con hostilidad explícita. El español refleja esa misma cautela: conserva la imagen de posición relativa («frente a») y no fuerza una interpretación adversativa.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que pasó de una lectura adversativa («in defiance of») a otra más literal («opposite»). Por eso el español evita intensificar el sentido y mantiene la ambigüedad espacial del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se mantuvo la transliteración de topónimos para respetar el patrón del POB y la evidencia hebrea.
  - «Frente a» se eligió por claridad idiomática en español y por fidelidad al valor relacional de עַל־פְּנֵי.
