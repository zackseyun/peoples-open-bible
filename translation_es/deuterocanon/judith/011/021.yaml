translation:
  language: es
  text: No hay mujer como ella de un extremo de la tierra al otro[a], en hermosura de rostro y sabiduría al hablar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de un extremo del territorio al otro». El griego γῆ puede significar «tierra» o «territorio»; aquí se mantiene «tierra» por la amplitud hiperbólica del elogio.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «en un buen/hermoso rostro y discernimiento de palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἔστιν
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se halla
  lexicon: BDAG
  rationale: La negación existencial en español se expresa con naturalidad mediante 'No hay', conservando el valor de existencia/ausencia del griego sin forzar un calco.
- source_word: τοιαύτη γυνὴ
  english_pob_choice: woman like her
  chosen_spanish: mujer como ella
  alternatives_spanish:
  - una mujer así
  - una mujer como esta
  lexicon: BDAG
  rationale: '''τοιαύτη'' indica cualidad o clase; ''como ella'' conserva el sentido referencial y es más natural en español que un calco más rígido.'
- source_word: ἀπʼ ἄκρου ἕως ἄκρου τῆς γῆς
  english_pob_choice: from one end of the earth to the other
  chosen_spanish: de un extremo de la tierra al otro
  alternatives_spanish:
  - de un extremo de la tierra hasta el otro
  - de extremo a extremo de la tierra
  lexicon: LSJ
  rationale: Se mantiene el merismo hiperbólico del griego. 'Tierra' sigue la decisión inglesa de leer γῆ en sentido amplio, y 'de un extremo... al otro' reproduce la estructura idiomática.
- source_word: ἐν καλῷ προσώπῳ
  english_pob_choice: in beauty of face
  chosen_spanish: en hermosura de rostro
  alternatives_spanish:
  - con bello rostro
  - en belleza de rostro
  lexicon: LSJ
  rationale: '''ἐν + dativo'' se traduce aquí como esfera o aspecto: la mujer sobresale ''en hermosura de rostro''. ''Rostro'' conserva πρόσωπον de forma clara y digna.'
- source_word: καὶ συνέσει λόγων
  english_pob_choice: and wisdom of speech
  chosen_spanish: y sabiduría de palabras
  alternatives_spanish:
  - y entendimiento en las palabras
  - y prudencia al hablar
  lexicon: BDAG
  rationale: σύνεσις denota entendimiento/discernimiento; en español, 'sabiduría' comunica bien la alabanza, mientras que 'de palabras' conserva λόγων sin añadir una interpretación excesiva.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'like this one' por 'like her' para mayor naturalidad; en español se siguió la forma natural 'como ella' sin perder el valor demostrativo del griego.
  spanish_consistency_notes:
  - Se mantuvo 'tierra' para γῆ, en paralelo con la decisión auditada en inglés de leer el alcance de modo universal.
  - Se evitó 'mujer así' porque 'como ella' reproduce mejor el comparativo implícito sin sonar artificioso.
  - '''Sabiduría de palabras'' refleja la alabanza de σύνεσις + λόγων y conserva una leve tensión entre entendimiento y elocuencia.'
  - Las notas se anclan en el texto con [a] y [b] para cumplir la trazabilidad requerida.
