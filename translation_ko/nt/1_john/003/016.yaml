  text: '이로써 우리는 사랑을 알게 되었습니다: 곧 그분이 우리를 위하여 자기 목숨을 내놓으셨다는 것입니다. 그러므로 우리도 형제들을 위하여 우리 목숨을 내놓아야 합니다.'
  philosophy: optimal-equivalence
