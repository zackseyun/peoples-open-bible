translation:
  language: es
  text: Pero Edom se negó a dejar pasar a Israel por su territorio[a], así que Israel se apartó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se desvió de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rechazó
  - rehusó
  lexicon: HALOT
  rationale: El verbo expresa negativa o rechazo de conceder el paso. «Se negó» comunica bien la voluntad negativa sin forzar un tono más duro que el contexto no exige.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio geográfico/nacional tal como en el texto fuente y en la auditoría inglesa.
- source_word: נְתֹן אֶת
  english_pob_choice: to let
  chosen_spanish: dejar
  alternatives_spanish:
  - permitir
  - dar
  lexicon: HALOT
  rationale: La construcción idiomática comunica impedir o conceder permiso de paso. «Dejar pasar» expresa con naturalidad la idea de no permitir el tránsito.
- source_word: עֲבֹר
  english_pob_choice: pass through
  chosen_spanish: dejar pasar
  alternatives_spanish:
  - pasar por
  - atravesar
  lexicon: HALOT
  rationale: En el contexto territorial, el sentido es tránsito por una zona, no solo pasar en general. En español, la locución «dejar pasar» mantiene esa idea de permiso de tránsito.
- source_word: בִּגְבֻלוֹ
  english_pob_choice: through his territory
  chosen_spanish: por su territorio
  alternatives_spanish:
  - por su frontera
  - dentro de sus límites
  lexicon: HALOT
  rationale: גְּבוּל puede ser frontera, límite o territorio. Aquí el sentido práctico es el espacio bajo control de Edom, por eso «territorio» es la opción más clara y fiel.
- source_word: וַיֵּט
  english_pob_choice: turned away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se volvió aparte
  lexicon: HALOT
  rationale: El verbo puede significar torcerse o desviarse. En este contexto describe el cambio de ruta de Israel; «se apartó» reproduce bien la dirección del movimiento.
- source_word: מֵעָלָיו
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - alejándose de él
  lexicon: HALOT
  rationale: La preposición expresa alejamiento respecto de Edom. «De él» es breve y natural en español, y el movimiento ya queda claro con «se apartó».
theological_decisions:
- issue: Tratamiento del nombre divino y posible ocultamiento por traducción tradicional
  english_pob_reading: No aplica en este versículo; el texto trata de Edom e Israel.
  chosen_spanish_reading: No hay decisión teológica especial en este versículo.
