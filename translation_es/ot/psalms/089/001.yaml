lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - salmo contemplativo
  - canto instructivo
  - instrucción
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo porque funciona como encabezado literario y su sentido preciso es incierto. En español, transliterarlo mantiene la forma heredada del título y evita imponer una interpretación no segura.
- source_word: לְ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - para
  - perteneciente a
  - por
  lexicon: HALOT
  rationale: En los encabezamientos de salmo, ל expresa asociación o atribución. 'De' es la equivalencia natural en español para este valor relacional y permite dejar abierta la relación exacta.
- source_word: אֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Ethan
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran de manera estándar. No hay razón textual para adaptar el nombre.
- source_word: הָאֶזְרָחִי
  english_pob_choice: the Ezrahite
  chosen_spanish: el ezrajita
  alternatives_spanish:
  - el ezraíta
  - el zeraíta
  lexicon: HALOT
  rationale: La forma base transmitida se refleja con un gentilicio transparente en español. 'Ezrajita' conserva la cercanía al hebreo consonántico y evita decidir prematuramente por la asociación interpretativa con Zéraj/Zerah.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que existe alta concordancia con el control cruzado; por eso el borrador mantiene la estructura del título y preserva las ambigüedades documentadas sin ampliarlas.
  spanish_consistency_notes:
  - Se mantiene 'Maskil' como etiqueta técnica, coherente con la decisión inglesa de no explicar el término en el cuerpo del texto.
  - Se usa 'de' para ל en el encabezado, siguiendo el valor relacional habitual en superscripciones.
  - Se conserva la ambigüedad entre 'ezrajita' y la posible lectura 'zeraíta' mediante nota al pie, sin imponer una solución interpretativa.
  - El español evita formas eclesiásticas tradicionales no motivadas por el hebreo y mantiene un registro sobrio y publicable.
