translation:
  language: es
  text: Porque en nuestras generaciones no se ha levantado tribu, ni clan, ni pueblo, ni ciudad de entre nosotros que adore dioses hechos por manos[a], como sucedió en días pasados; ni hay ninguno hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolos hechos por manos humanas». El griego dice literalmente «dioses hechos por manos», una expresión polémica para los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀνέστη
  english_pob_choice: has arisen
  chosen_spanish: se ha levantado
  alternatives_spanish:
  - ha surgido
  - ha aparecido
  - resucitó
  lexicon: BDAG
  rationale: En este contexto no se trata de resurrección literal, sino de la aparición o surgimiento de una realidad dentro de la historia del pueblo. «Se ha levantado» conserva la imagen de surgir dentro de una comunidad y suena natural en español.
- source_word: ἐν ταῖς γενεαῖς ἡμῶν
  english_pob_choice: in our generations
  chosen_spanish: en nuestras generaciones
  alternatives_spanish:
  - en nuestros tiempos
  - a lo largo de nuestras generaciones
  lexicon: BDAG
  rationale: «Generaciones» expresa bien la sucesión histórica del pueblo y mantiene la referencia colectiva del griego.
- source_word: φυλή
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - pueblo
  - grupo tribal
  lexicon: BDAG
  rationale: En contexto israelita, φυλή es la unidad tribal; «tribu» conserva ese nivel social con transparencia.
- source_word: πατριὰ
  english_pob_choice: clan
  chosen_spanish: clan
  alternatives_spanish:
  - familia
  - linaje
  lexicon: BDAG
  rationale: «Clan» refleja una subdivisión de parentesco menor que tribu y es comprensible en español contemporáneo.
- source_word: δῆμος
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - comunidad
  - populacho
  lexicon: LSJ
  rationale: Aquí δῆμος designa un colectivo humano dentro de la secuencia social. «Pueblo» conserva la amplitud del término sin volverlo técnico en exceso.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - villa
  lexicon: BDAG
  rationale: «Ciudad» corresponde al sentido básico y completa la lista escalonada de unidades sociales.
- source_word: ἐξ ἡμῶν
  english_pob_choice: from among us
  chosen_spanish: de entre nosotros
  alternatives_spanish:
  - de nosotros
  - entre nosotros
  lexicon: BDAG
  rationale: «De entre nosotros» preserva la idea de procedencia interna del grupo, no solo pertenencia general.
- source_word: οἱ προσκυνοῦσι
  english_pob_choice: worships
  chosen_spanish: que adore
  alternatives_spanish:
  - que se postre ante
  - que rinda culto a
  lexicon: BDAG
  rationale: El verbo tiene aquí sentido religioso. «Adore» comunica la acción de culto de manera natural en español, sin perder la fuerza polémica del contexto.
- source_word: θεοῖς χειροποιήτοις
  english_pob_choice: gods made by hands
  chosen_spanish: dioses hechos por manos
  alternatives_spanish:
  - dioses hechos por manos humanas
  - ídolos hechos por manos
  lexicon: BDAG
  rationale: El griego dice literalmente «dioses hechos por manos». Mantener «hechos por manos» conserva la literalidad polemizante y evita sustituir de entrada por «ídolos», aunque esa sea la implicación del pasaje. La frase puede sonar extraña en español, pero esa tensión está respaldada por el original.
- source_word: καθάπερ ἐγένετο ἐν ταῖς πρότερον ἡμέραις
  english_pob_choice: as happened in former days
  chosen_spanish: como sucedió en los días anteriores
  alternatives_spanish:
  - como ocurrió en tiempos antiguos
  - como pasó en días pasados
  lexicon: BDAG
  rationale: «Días anteriores» reproduce el contraste temporal con el pasado idólatra mencionado en el contexto inmediato y mantiene un registro sobrio y claro.
- source_word: οὐδὲ ἔστιν ἐν τῇ ἡμέρᾳ τῇ σήμερον
  english_pob_choice: nor is there any even to this day
  chosen_spanish: ni siquiera hay alguno hasta el día de hoy
  alternatives_spanish:
  - ni hay ninguno hasta hoy
  - ni existe alguno hasta este día
  lexicon: BDAG
  rationale: La coordinación negativa del griego refuerza la afirmación anterior. «Ni siquiera hay alguno hasta el día de hoy» preserva ese énfasis sin calcar de modo rígido la sintaxis griega.
theological_decisions:
- issue: Expresión polémica θεοῖς χειροποιήτοις
  english_pob_reading: gods made by hands
  chosen_spanish_reading: dioses hechos por manos
  alternative_spanish_readings:
  - ídolos hechos por manos humanas
  - ídolos hechos por manos
  rationale: 'El texto griego usa una expresión provocadora: literalmente «dioses hechos por manos», que critica la idolatría sin sustituirla por una explicación interpretativa. En español se conserva esa literalidad en el cuerpo del texto; la nota aclara que la referencia pragmática es a ídolos.'
  doctrine_reference: Original-language primacy; anti-idolatry polemic in the deuterocanonical text.
- issue: Coordinación negativa final
  english_pob_reading: nor is there any even to this day
  chosen_spanish_reading: ni siquiera hay alguno hasta el día de hoy
  alternative_spanish_readings:
  - ni hay ninguno hasta hoy
  - y no hay ninguno hasta hoy
  rationale: La segunda cláusula no solo informa ausencia presente, sino que intensifica la afirmación anterior. En español, «ni siquiera hay alguno» refleja mejor esa continuidad negativa que una simple frase declarativa.
  doctrine_reference: Greek coordination and emphatic negation in the source text.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura griega y toma en cuenta la revisión inglesa más reciente, especialmente la coordinación negativa final («ni siquiera hay alguno hasta el día de hoy») para mantener el paralelo con οὐδὲ ἔστιν. Se preserva además la literalidad polémica de θεοῖς χειροποιήτοις, con nota aclaratoria sobre su sentido idolátrico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa «dioses» en plural para reflejar el plural griego θεοῖς, aunque el contexto los entiende como ídolos.
  - «Tribu / clan / pueblo / ciudad» conserva la escala social del original sin forzar tecnicismos modernos.
  - La coordinación negativa final se ha resuelto con «ni siquiera hay alguno», siguiendo la forma reforzada del griego y la revisión inglesa más reciente.
