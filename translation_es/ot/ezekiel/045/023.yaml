review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: duración de siete días, holocausto a Yahvé, siete toros y siete carneros sin defecto cada día, y un sacrificio por el pecado con macho cabrío cada día. Sin embargo, omite las alternativas léxicas preservadas en el rastro inglés para הֶחָג y חַטָּאת, que deben conservarse como notas al pie en español. También conviene ajustar la repetición ''cada día durante los siete días'' a un orden más natural sin perder el distributivo del hebreo.'
  spanish_quality_summary: El texto es claro, natural y eclesialmente legible. 'Holocausto', 'Yahvé', 'toros', 'carneros' y 'sin defecto' están bien escogidos. La frase 'cada día durante los siete días' suena algo redundante en español, aunque es fiel; una leve reordenación mejora la fluidez sin alterar el contenido. La puntuación es correcta.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> ''Yahvé''; עוֹלָה -> ''holocausto''; תְּמִימִם -> ''sin defecto''. La decisión ''sacrificio por el pecado'' para חַטָּאת es aceptable, pero debe preservarse la alternativa ''ofrenda de purificación'' en nota, ya que el inglés auditado la conservó. Asimismo, para הֶחָג debe preservarse la alternativa ''festival'' en nota española.'
  issues:
  - severity: medium
    issue: Faltan notas al pie para alternativas léxicas preservadas en el POB inglés.
    rationale: El rastro inglés incluye nota para הֶחָג ('festival') y para חַטָּאת ('purification offering'). La revisión española debe conservar esas alternativas cuando el inglés las preservó.
  - severity: low
    issue: La secuencia 'cada día durante los siete días' es algo rígida en español.
    rationale: Es fiel al hebreo, pero una formulación como 'cada día, durante los siete días' o 'cada día por los siete días' mejora la lectura. Se puede mantener el contenido completo con mejor fluidez.
  revised_spanish_text: Durante los siete días de la fiesta[a], ofrecerá como holocausto a Yahvé siete toros y siete carneros sin defecto cada día, durante los siete días, y como sacrificio por el pecado[b] un macho cabrío cada día.
  revised_footnotes:
