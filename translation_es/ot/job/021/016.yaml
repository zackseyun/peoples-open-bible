translation:
  language: es
  text: 'He aquí[a]: ¿no está su prosperidad en su propia mano? El consejo de los malvados está lejos de mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «He aquí, su prosperidad no está en su propia mano». El hebreo puede entenderse como una negación directa en lugar de una pregunta retórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold / Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce una llamada de atención enfática. «Mira» comunica esa fuerza deíctica en un español natural y reverente, sin caer en un arcaísmo pesado. Se mantiene la función discursiva del arranque.
- source_word: בְיָדָם
  english_pob_choice: in their own hand
  chosen_spanish: en su propia mano
  alternatives_spanish:
  - en su mano
  - bajo su control
  - en sus manos
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» se conserva. «Su propia mano» refleja el matiz reflexivo del inglés POB («own») y expresa posesión o control sin perder la metáfora corporal.
- source_word: טוּבָם
  english_pob_choice: their prosperity
  chosen_spanish: su prosperidad
  alternatives_spanish:
  - su bien
  - su bienestar
  - su riqueza
  lexicon: HALOT
  rationale: En el contexto de Job 21, טוּב se refiere al florecimiento aparente de los impíos. «Prosperidad» capta mejor ese sentido contextual que un genérico «bien» o una concreción como «riqueza».
- source_word: עֲצַת
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - la intención
  - la estrategia
  lexicon: HALOT
  rationale: «Consejo» conserva el rango semántico de עֵצָה como plan, designio o deliberación, y mantiene la formulación bíblica tradicional sin forzar un sentido demasiado técnico.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: «Malvados» es claro y de registro bíblico adecuado en español. Aunque «impíos» es posible, aquí «malvados» evita sonar más eclesiástico que el hebreo y mantiene el contraste moral directo.
- source_word: רָחֲקָה מֶנִּי
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - se ha alejado de mí
  - está muy lejos de mí
  - está distante de mí
  lexicon: HALOT
  rationale: La forma verbal concordando con «el consejo» se expresa naturalmente con «está lejos de mí». Conserva la idea de distancia/rechazo personal sin sobrerinterpretar el matiz aspectual.
theological_decisions:
- issue: 'Primera cláusula: ¿pregunta retórica o negación directa?'
  english_pob_reading: 'The English POB preserves the rhetorical question: ''is not their prosperity in their own hand?'' and footnotes the direct-negation possibility.'
  chosen_spanish_reading: ¿no está su prosperidad en su propia mano?
  alternative_spanish_readings:
  - No está su prosperidad en su propia mano.
  - 'Mira: su prosperidad no está en su propia mano.'
  rationale: El hebreo permite ambas lecturas. La interrogativa conserva la ambigüedad y el tono retórico del POB, sin resolver el sentido en el cuerpo principal. La alternativa negativa queda implícitamente disponible, pero no se impone.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual y teológica; no eliminar una lectura viable que el texto hebreo permite.'
- issue: Matiz de rechazo en la segunda cola
  english_pob_reading: '''The counsel of the wicked is far from me'' as Job''s disavowal.'
  chosen_spanish_reading: El consejo de los malvados está lejos de mí.
  alternative_spanish_readings:
  - El consejo de los impíos se aleja de mí.
  - Estoy lejos del consejo de los malvados.
  rationale: La formulación mantiene el hebreo y la lectura del POB como una declaración de rechazo personal al consejo de los malvados. No se convierte en una moralización general ni en una autoafirmación más amplia de lo que el verso dice.
  doctrine_reference: Job 21:16 in context; cf. Job 22:18 for parallel disavowal language.
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del POB en su registro formal («Behold») y preserva la nota textual sobre la posible lectura negativa directa. Se mantuvo la pregunta retórica en el texto principal por coherencia con el audit trail, pero se ofreció una formulación española plenamente natural y compatible con la ambigüedad hebrea.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «malvados» para רְשָׁעִים por claridad y registro bíblico natural en español.
  - Se conservó la metáfora de la «mano» para בְיָדָם, evitando una paráfrasis interpretativa excesiva.
  - La interrogativa con [a] refleja la ambigüedad documentada; la nota ofrece la lectura alternativa sin resolverla en el cuerpo principal.
