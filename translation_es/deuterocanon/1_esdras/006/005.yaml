review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego: οἱ πρεσβύτεροι τῶν Ἰουδαίων = «los ancianos de los judíos», ἔσχον χάριν = «hallaron favor», y mantiene αἰχμαλωσία como «cautiverio» sin resolver de más la ambigüedad. Sin embargo, παρὰ τοῦ κυρίου expresa origen/fuente («del/de parte del Señor»), no relación espacial o de presencia. Por eso «ante Yahvé» no preserva fielmente el valor de παρά con genitivo. Además, la nota actual reconoce esa diferencia, lo que confirma que el texto principal debe corregirse.'
  spanish_quality_summary: El español es generalmente claro y digno. «Hallaron favor» y «para ejercer supervisión» son naturales. No obstante, «hallaron favor ante Yahvé» suena idiomático en español bíblico, pero aquí desvía el sentido fuente; «de parte de Yahvé» o «de Yahvé» es más fiel. El resto del verso es legible, aunque algo pesado por la compresión del griego; eso es aceptable dada la filosofía de preservación.
  glossary_alignment: 'La elección de «Yahvé» concuerda con la norma del proyecto para el nombre divino. «Cautiverio» también concuerda con la decisión auditada de mantener la literalidad de αἰχμαλωσία. El principal desajuste no es terminológico sino semántico: «ante» no refleja el origen marcado por παρὰ.'
  issues:
  - severity: high
    issue: «ante Yahvé» para παρὰ τοῦ κυρίου
    rationale: παρά con genitivo indica fuente/origen («de», «de parte de»), no «ante». La formulación actual cambia el sentido de favor procedente de Dios a favor hallado en su presencia.
  - severity: low
    issue: La nota al pie corrige implícitamente el texto principal
    rationale: La nota explica que el griego es literalmente «del Señor» / «de parte del Señor», de modo que el cuerpo del texto queda innecesariamente tensionado con la evidencia fuente. Conviene alinear texto y nota.
  revised_spanish_text: Y los ancianos de los judíos hallaron favor de parte de Yahvé,[a] habiendo sido puestos sobre el cautiverio para ejercer supervisión.
  revised_footnotes:
  - marker: a
    text: O «del Señor». El griego dice παρὰ τοῦ κυρίου, literalmente «de parte del Señor» o «del Señor», indicando que el favor procede de Dios. Se usa «Yahvé» en español conforme a la norma terminológica del proyecto para la referencia divina.
    reason: theological_note
  revision_rationale: Se corrige «ante Yahvé» a «de parte de Yahvé» para reflejar con fidelidad el valor de fuente/origen de παρὰ τοῦ κυρίου, manteniendo al mismo tiempo la terminología del proyecto («Yahvé»). No se requieren más cambios porque el resto del borrador conserva bien la compresión y ambigüedad del griego.
