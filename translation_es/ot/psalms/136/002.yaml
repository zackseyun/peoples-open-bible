  - marker: a
    text: O «Dios por encima de todos los dioses». El hebreo dice literalmente «Dios de dioses», una expresión idiomática de supremacía.
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce el hebreo hesed, que suele referirse al amor leal y de pacto; también puede entenderse como «misericordia» o «fidelidad de pacto».
    reason: lexical_alternative
  revision_rationale: 'Se conserva la fidelidad al hebreo y a las decisiones del POB, pero se reordena la cláusula final para lograr español natural y claramente poético: «su amor fiel es para siempre». También se ajustan los anclajes de notas para que cada una corresponda a la expresión pertinente.'
