translation:
  language: es
  text: Por eso yo, tu sierva, habiendo conocido todas estas cosas, huí de delante de ellos[a], y Dios me envió para hacer contigo cosas[b] ante las cuales se asombrará toda la tierra[c], cuando oigan hablar de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de su presencia». La expresión griega dice literalmente «de delante de ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «asuntos». El griego πράγματα es amplio y no especifica con más precisión cómo participa Holofernes.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todo el mundo» o, en sentido más estrecho, «todo el territorio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Por consiguiente
  lexicon: LSJ
  rationale: Expresa la conclusión lógica que introduce la afirmación de Judith, con un español natural y digno.
- source_word: ἡ δούλη σου
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu servidora
  lexicon: BDAG
  rationale: δουλή conserva la idea de dependencia/subordinación; en este contexto de habla cortesana, 'sierva' transmite deferencia sin volver rígida la relación, y evita atenuar demasiado el matiz de sujeción que 'servidora' podría suavizar.
- source_word: ἐπιγνοῦσα
  english_pob_choice: having learned
  chosen_spanish: habiendo conocido
  alternatives_spanish:
  - habiendo aprendido
  - habiendo comprendido
  lexicon: BDAG
  rationale: El participio expresa conocimiento adquirido antes de la huida; 'habiendo conocido' mantiene esa adquisición de información sin forzar un matiz exclusivamente escolar o intelectual.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas materias
  lexicon: LSJ
  rationale: Conserva el alcance totalizante de πάντα y el plural explícito de ταῦτα en un giro natural del español.
- source_word: ἀπέδρων
  english_pob_choice: fled
  chosen_spanish: huí
  alternatives_spanish:
  - escapé
  - hice huir
  lexicon: LSJ
  rationale: '''Huí'' refleja bien la salida apresurada y decidida de la protagonista; mantiene el tono narrativo sin sobreexplicar.'
- source_word: ἀπὸ προσώπου αὐτῶν
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - de ante ellos
  lexicon: LSJ
  rationale: La expresión semítica literal se conserva con una construcción española clara. 'De delante de ellos' mantiene la direccionalidad de la huida y el color de la imagen original.
- source_word: ἀπέστειλέν με ὁ θεός
  english_pob_choice: God sent me
  chosen_spanish: Dios me envió
  alternatives_spanish:
  - Dios me ha enviado
  lexicon: BDAG
  rationale: Se mantiene la afirmación directa de comisión divina sin añadir matices interpretativos ajenos al relato.
- source_word: ποιῆσαι μετὰ σοῦ πράγματα
  english_pob_choice: to do with you things
  chosen_spanish: para hacer contigo cosas
  alternatives_spanish:
  - para realizar contigo asuntos
  - para obrar contigo hechos
  lexicon: LSJ
  rationale: '''Cosas'' es la correspondencia más general y fiel a πράγματα aquí, que el contexto no precisa más. ''Contigo'' conserva la relación sintáctica amplia de μετὰ σοῦ sin decidir si Holofernes es socio, medio o destinatario.'
- source_word: ἐφʼ οἷς
  english_pob_choice: at which
  chosen_spanish: ante las cuales
  alternatives_spanish:
  - por las cuales
  - a causa de las cuales
  lexicon: LSJ
  rationale: Con 'asombrará' en español, la construcción más natural es 'ante las cuales'; expresa la ocasión del asombro sin perder la referencia a las πράγματα anteriores.
- source_word: ἐκστήσεται
  english_pob_choice: will be astonished
  chosen_spanish: se asombrará
  alternatives_spanish:
  - quedará pasmada
  - quedará asombrada
  lexicon: BDAG
  rationale: El verbo comunica fuerte sorpresa/estupor. 'Se asombrará' es claro, elevado y no excesivamente coloquial.
- source_word: πᾶσα ἡ γῆ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el mundo
  - la tierra entera
  lexicon: LSJ
  rationale: '''Tierra'' reproduce bien el alcance bíblico amplio del giro sin forzar la abstracción de ''mundo''.'
- source_word: ὅσο ἐὰν ἀκούσωσιν αὐτά
  english_pob_choice: whenever they hear of them
  chosen_spanish: cuando las oigan
  alternatives_spanish:
  - cada vez que las oigan
  - en cuanto las oigan
  lexicon: BDAG
  rationale: '''Las oigan'' retoma las ''cosas'' mencionadas antes y en español expresa con naturalidad el simple hecho de oír hablar de ellas en este contexto.'
theological_decisions:
- issue: Comisión divina explícita en la voz de Judith
  english_pob_reading: 'Render the statement straightforwardly as Judith''s claim: ''God sent me'''
  chosen_spanish_reading: 'Traducir la afirmación de manera directa: ''Dios me envió'''
  alternative_spanish_readings:
  - Dios dice que me envió
  - Según Dios, me envió
  rationale: El texto presenta una declaración directa en discurso de Judith; la traducción no debe suavizar ni desautorizar la afirmación, sino dejar que el lector perciba la pretensión teológica tal como aparece en la fuente.
  doctrine_reference: Preservar la tensión teológica sin resolverla editorialmente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: mantiene el valor amplio de πράγματα con ''cosas'', y traduce ἀκούσωσιν αὐτά de manera natural como ''cuando las oigan'', sin forzar un complemento explícito de ''hablar de'' que no está en el griego.'
  spanish_consistency_notes:
  - Se conserva 'Dios' para ὁ θεός, sin introducir 'Señor' ni 'Yahvé' porque el versículo usa θεός y no el nombre divino.
  - '''Sierva'' mantiene el tono deferente y la fuerza de dependencia de δούλη mejor que ''servidora'' en este contexto.'
  - '''Toda la tierra'' se eligió en la decisión léxica interna como opción natural equivalente a πᾶσα ἡ γῆ; en el texto se optó por ''toda la tierra'' no por ''el mundo'' para preservar el eco bíblico amplio sin exceder la imagen geográfica.'
  - Se evitó 'Cristo' y otras terminologías no presentes en el versículo.
  - La relación entre 'cosas' y el asombro de 'toda la tierra' queda abierta, como en el griego, sin especificar más la implicación de Holofernes.
