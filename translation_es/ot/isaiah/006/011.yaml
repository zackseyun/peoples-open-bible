revisions:
- from: 'Entonces dije[a]: «¿Hasta cuándo, Señor?». Y él dijo: «Hasta que las ciudades yacieran en ruinas, sin habitante, y las casas sin gente, y la tierra quede[b] una desolación».'
  to: 'Entonces dije[a]: «¿Hasta cuándo, Señor?». Y él dijo: «Hasta que las ciudades queden asoladas, sin habitante, y las casas sin gente, y la tierra sea devastada, una desolación».'
  rationale: Se corrige el español para reflejar con naturalidad y precisión el valor prospectivo de la respuesta («queden») y para restaurar el contenido léxico de devastación en תִּשָּׁאֶה («sea devastada»), manteniendo el cierre nominal intensificador «una desolación». Se elimina la nota [b] porque ya no hace falta una glosa suplementaria una vez que el texto principal expresa claramente el verbo de desolación.
  reviewer_model: gpt-5.4
