translation:
  language: es
  text: Porque he aquí, el Señor, Yahvé de los ejércitos, está quitando de Jerusalén y de Judá apoyo y sustento[a], todo apoyo de pan y todo apoyo de agua[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bastón y sostén», una traducción tradicional de la pareja de términos hebreos para formas de apoyo o sustento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo apoyo de pan y todo apoyo de agua»; es decir, toda provisión básica de alimento y bebida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque he aquí
  lexicon: HALOT
  rationale: La conjunción introduce la razón o continuación del anuncio previo; «porque» conserva esa relación causal en español de forma natural.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: HALOT
  rationale: «He aquí» conserva la función deíctica y solemne del hebreo con un registro bíblico claro en español, sin caer en arcaísmo excesivo.
- source_word: הָאָדוֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - el Soberano
  lexicon: HALOT
  rationale: Aquí el título marcado por el artículo comunica autoridad divina; «Señor» es la forma más natural y reverente en español para este título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según la convención del proyecto: «Yahvé», en lugar de una sustitución por título.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» transmite con más transparencia la fuerza militar/plural del título divino; «huestes» sería más tradicional, pero menos claro para lectores actuales.
- source_word: מֵסִיר
  english_pob_choice: is removing
  chosen_spanish: está quitando
  alternatives_spanish:
  - está removiendo
  - está apartando
  lexicon: HALOT
  rationale: El participio indica acción en curso o inminente. «Está quitando» comunica bien la privación activa y resulta idiomático en español.
- source_word: מַשְׁעֵן וּמַשְׁעֵנָה
  english_pob_choice: support and supply
  chosen_spanish: apoyo y sustento
  alternatives_spanish:
  - apoyo y abastecimiento
  - sostén y sustento
  - apoyo y dependencia
  lexicon: HALOT
  rationale: La pareja masculina/femenina funciona como una duplicación retórica de recursos de sostén. «Apoyo y sustento» preserva el sentido de provisión y soporte sin forzar un calco opaco.
- source_word: כֹּל מִשְׁעַן לֶחֶם
  english_pob_choice: all support of bread
  chosen_spanish: todo apoyo de pan
  alternatives_spanish:
  - toda provisión de pan
  - todo sustento de pan
  lexicon: HALOT
  rationale: Se conserva la repetición de «apoyo» y la imagen concreta de «pan» como alimento básico. La construcción sigue de cerca el hebreo sin perder naturalidad.
- source_word: וְכֹל מִשְׁעַן מָיִם
  english_pob_choice: and all support of water
  chosen_spanish: y todo apoyo de agua
  alternatives_spanish:
  - y toda provisión de agua
  - y todo sustento de agua
  lexicon: HALOT
  rationale: Se replica el paralelismo hebreo con la misma base léxica para enfatizar la privación total de los recursos esenciales.
theological_decisions:
- issue: Renderizar el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre divino propio, no un simple título. La forma escogida sigue la política del proyecto para preservar ese nombre en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  rationale: El título expresa la soberanía de Dios sobre las fuerzas militares/cósmicas. «De los Ejércitos» conserva la fuerza semántica y es comprensible para lectores contemporáneos.
  doctrine_reference: 'DOCTRINE.md: Títulos divinos — צְבָאוֹת'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del inglés POB: conserva la secuencia «support and supply» mediante una pareja española equivalente («apoyo y sustento») y mantiene el paralelismo de «todo apoyo de...» sin introducir puntuación fuerte que rompa el flujo. Se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una formulación más natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la política del proyecto.
  - «Ejércitos» se usa consistentemente para צְבָאוֹת en este pasaje.
  - «Apoyo» y «sustento» preservan el doblete hebreo de soporte/provisión sin perder legibilidad.
  - La repetición de «todo apoyo de...» refleja el paralelismo hebreo de manera audible en español.
