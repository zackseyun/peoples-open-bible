translation:
  language: es
  text: Yo derribaré el muro que ustedes revocaron con cal[a], y lo haré caer hasta el suelo, de modo que quede al descubierto su cimiento. Caerá, y perecerán en medio de él. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortero débil». El hebreo puede enfatizar tanto un blanqueo engañoso como un recubrimiento inferior; en este contexto la imagen comunica una capa superficial y fraudulenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרַסְתִּי
  english_pob_choice: I will tear down
  chosen_spanish: Yo derribaré
  alternatives_spanish:
  - Yo destruiré
  - Yo demoleré
  lexicon: HALOT
  rationale: הרס expresa derribar o demoler una estructura. «Derribaré» conserva la imagen concreta del muro y suena natural en español bíblico moderno.
- source_word: הַקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - el muro
  lexicon: HALOT
  rationale: El hebreo designa una pared o muro físico; «muro» mantiene mejor la imagen de una estructura amenazada en el contexto profético.
- source_word: טַחְתֶּם תָּפֵל
  english_pob_choice: you plastered with whitewash
  chosen_spanish: recubrieron con cal
  alternatives_spanish:
  - encalaron
  - recubrieron con mortero flojo
  - revocaron con cal
  lexicon: HALOT
  rationale: El giro apunta a un recubrimiento engañoso o deficiente. «Recubrieron con cal» conserva el sentido de un blanqueo superficial; en nota se puede mantener la alternativa de «mortero flojo» como matiz léxico.
- source_word: וְהִגַּעְתִּיהוּ אֶל הָאָרֶץ
  english_pob_choice: and bring it down to the ground
  chosen_spanish: y lo haré caer hasta el suelo
  alternatives_spanish:
  - y lo llevaré hasta el suelo
  - y lo pondré sobre la tierra
  lexicon: HALOT
  rationale: La forma causativa comunica llevar el muro al nivel del suelo. «Haré caer hasta el suelo» refleja el resultado con claridad idiomática.
- source_word: וְנִגְלָה יְסֹדוֹ
  english_pob_choice: so that its foundation is laid bare
  chosen_spanish: de modo que quede al descubierto su cimiento
  alternatives_spanish:
  - y su cimiento quede descubierto
  - y su fundamento quede al descubierto
  lexicon: HALOT
  rationale: גלה aquí indica exposición de lo oculto. «Quede al descubierto» preserva la imagen de revelar la debilidad estructural; «cimiento» es un equivalente claro y natural para יְסֹד en español.
- source_word: וְנָפְלָה
  english_pob_choice: It will fall
  chosen_spanish: Caerá
  alternatives_spanish:
  - Se derrumbará
  - Va a caer
  lexicon: HALOT
  rationale: El verbo retoma el muro; «Caerá» es breve y fiel al paralelismo del hebreo.
- source_word: וּכְלִיתֶם בְּתוֹכָהּ
  english_pob_choice: and you will perish in its midst
  chosen_spanish: y perecerán en medio de él
  alternatives_spanish:
  - y perecerán dentro de él
  - y serán consumidos en su interior
  lexicon: HALOT
  rationale: כלה puede significar perecer o ser consumido. «Perecerán» comunica el juicio con claridad; «en medio de él» mantiene el valor espacial de בְּתוֹכָהּ, en línea con la revisión auditada del inglés.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  english_pob_choice: Then you will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé
  alternatives_spanish:
  - Entonces conocerán que yo soy Yahvé
  - Y sabrán que yo soy Yahvé
  lexicon: HALOT
  rationale: La fórmula de reconocimiento de Ezequiel conserva el nombre divino. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título genérico.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. En español, el proyecto traduce ese nombre como «Yahvé» para mantener la transparencia del texto fuente y no ocultar el nombre divino detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de תָּפֵל en el recubrimiento del muro
  english_pob_reading: whitewash / flimsy mortar
  chosen_spanish_reading: cal
  alternative_spanish_readings:
  - mortero flojo
  - revoco defectuoso
  - encalado
  rationale: El contexto de Ezequiel 13 presenta un revestimiento engañoso y frágil sobre un muro inestable. «Cal» mantiene la imagen de blanqueo superficial sin forzar una interpretación técnica única; la nota puede preservar la tensión entre blanqueo y mortero deficiente.
  doctrine_reference: HALOT; contexto de Ezequiel 13:10-15
- issue: Relación espacial de בְּתוֹכָהּ
  english_pob_reading: in its midst
  chosen_spanish_reading: en medio de él
  alternative_spanish_readings:
  - dentro de él
  - en su interior
  rationale: «En medio de él» reproduce con mayor precisión el valor locativo del hebreo y coincide con la revisión auditada del inglés; mantiene la imagen de quedar atrapados dentro del muro al caer.
  doctrine_reference: Revisión aplicada 2026-04-23; cf. EZK.13.14 audit trail
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la clausula final de «within it» a «in its midst» y fijó el nombre divino como Yahweh. La redacción española refleja ambos puntos con «en medio de él» y «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo el paralelismo del muro/cimiento/caída para conservar la secuencia retórica del hebreo.
  - Se prefirió un español sobrio y contemporáneo, evitando expresiones demasiado tradicionales donde no aportan fidelidad adicional.
  - El nombre divino se translitera como «Yahvé» de forma consistente con el estándar del proyecto.
