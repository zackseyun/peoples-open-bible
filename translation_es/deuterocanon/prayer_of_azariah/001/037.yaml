  rationale: Se ajusta «arriba de los cielos» a «sobre los cielos» para mayor precisión y mejor registro. Se reemplaza «ensálcenlo muy por encima» por «exáltenlo en gran manera», que comunica la intensificación de ὑπερυψοῦτε sin introducir una noción espacial ajena. La nota se armoniza con la variante singular/plural mencionada en el audit trail inglés.
