translation:
  language: es
  text: Así, el rebaño se apareó junto a las varas[a], y el rebaño parió crías rayadas, moteadas[b] y manchadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las varas»; el hebreo אֶל puede indicar dirección o proximidad, y aquí la escena favorece una relación espacial cercana.
    reason: alternative_reading
  - marker: b
    text: La distinción entre «moteadas» (נְקֻדִּים) y «manchadas» (טְלֻאִים) es aproximada; el segundo término también puede traducirse como «parchadas», «abigarradas» o «jaspeadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱמוּ
  english_pob_choice: mated
  chosen_spanish: se apareó
  alternatives_spanish:
  - entró en celo
  - se acopló
  lexicon: HALOT
  rationale: El verbo hebreo se refiere literalmente a estar caliente, pero en este contexto de reproducción animal la idea es la de apareamiento. «Se apareó» comunica la acción reproductiva con naturalidad en español sin perder el valor contextual.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas y las cabras
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor, especialmente ovejas y cabras. «El rebaño» preserva el sentido colectivo y funciona bien en español en ambas cláusulas repetidas.
- source_word: אֶל הַמַּקְלוֹת
  english_pob_choice: by the rods
  chosen_spanish: junto a las varas
  alternatives_spanish:
  - junto a los varales
  - al lado de las varas
  lexicon: HALOT
  rationale: La preposición admite una relación espacial amplia; en este contexto de cría visual, «junto a» expresa la cercanía instrumental sin forzar una lectura más específica que el hebreo no exige. «Varas» traduce מַקְלוֹת de manera directa y natural.
- source_word: וַתֵּלַדְןָ
  english_pob_choice: bore ... young
  chosen_spanish: parió crías
  alternatives_spanish:
  - dio a luz crías
  - engendró crías
  lexicon: HALOT
  rationale: ילד aquí describe el acto de dar a luz/parecer. En español, «parió» mantiene el carácter concreto y reproductivo del verbo; «crías» suple el referente implícito, como hace el inglés POB con «young».
- source_word: עֲקֻדִּים
  english_pob_choice: striped
  chosen_spanish: rayadas
  alternatives_spanish:
  - listadas
  - a bandas
  lexicon: HALOT
  rationale: El término denota animales marcados con bandas o rayas. «Rayadas» es la equivalencia más clara y natural en español para el valor principal que el POB inglés expresó como «striped».
- source_word: נְקֻדִּים
  english_pob_choice: speckled
  chosen_spanish: salpicadas
  alternatives_spanish:
  - punteadas
  - moteadas
  lexicon: HALOT
  rationale: El hebreo apunta a marcas pequeñas o punteadas. «Salpicadas» conserva la idea de múltiples pequeños puntos; se mantiene una distinción léxica respecto de «manchadas», aunque la diferencia entre los dos términos no es absoluta.
- source_word: וּטְלֻאִים
  english_pob_choice: spotted
  chosen_spanish: manchadas
  alternatives_spanish:
  - moteadas
  - abigarradas
  - blotadas
  lexicon: HALOT
  rationale: El término describe un patrón de manchas o parches más grandes que el anterior. «Manchadas» transmite bien esa marca irregular y deja abierta la ligera imprecisión semántica reconocida por el POB inglés.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB inglés que prefiere una relación espacial más natural para אֶל en este contexto («by the rods»), sin añadir especificaciones no presentes en el hebreo. Se conserva la repetición de «el rebaño» y la tríada de descripciones del pelaje, reflejando el paralelismo del verso.
  spanish_consistency_notes:
  - Se usa «rebaño» para הַצֹּאן de manera consistente con el valor colectivo de ganado menor.
  - Se mantiene «varas» para מַקְלוֹת y no se introduce terminología eclesiástica o arcaizante.
  - Las tres descripciones del pelaje se distinguen en español, pero se reconoce en la nota que la frontera entre los dos últimos términos es aproximada.
  - Se evita sustituir el verbo reproductivo por una paráfrasis abstracta; la versión conserva concreción biológica acorde con el hebreo.
