    text: 'O, de manera más interpretativa: "él cargará con la responsabilidad de su propia muerte". El hebreo dice literalmente: "su sangre estará sobre su cabeza".'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "si una mano está sobre él", un modismo que significa que se le hace daño.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el modismo jurídico de culpa de sangre para reflejar el hebreo y la decisión del POB inglés ('estará sobre' en lugar de 'caerá sobre'), se restauró el plural 'nuestras cabezas', y se movió la nota [b] al modismo final que realmente explica. También se suavizó levemente la expresión espacial para una lectura más natural sin perder la imagen concreta del original.
