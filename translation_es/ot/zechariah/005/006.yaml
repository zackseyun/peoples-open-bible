translation:
  language: es
  text: 'Y yo dije: «¿Qué es?» Y él dijo: «Esta es la cesta de medir[a] que sale». Y dijo[b]: «Esta es su apariencia en toda la tierra»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la efa que sale». El término hebreo designa una medida de volumen y, por extensión, el recipiente de medición mismo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el mismo mensajero siguió hablando.
    reason: clarification
  - marker: c
    text: Hebreo literalmente, «este es su ojo en toda la tierra». Muchos entienden el sentido como «su apariencia» o «lo que se ve de ellos»; otros, siguiendo una lectura o interpretación alternativa, traducen «su iniquidad en toda la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיפָה
  english_pob_choice: basket
  chosen_spanish: efa
  alternatives_spanish:
  - cesta
  - canasta
  - recipiente medidor
  lexicon: HALOT
  rationale: El hebreo אֵיפָה nombra ante todo una medida, y por extensión el recipiente de medición en la visión. En español, conservar «efa» mantiene el vínculo con el término técnico y permite explicar la referencia sin reemplazarla por un objeto que el texto no nombra explícitamente.
- source_word: הַיּוֹצֵאת
  english_pob_choice: that is going out
  chosen_spanish: que sale
  alternatives_spanish:
  - que está saliendo
  - que va saliendo
  - que sale hacia afuera
  lexicon: HALOT
  rationale: El participio femenino con artículo funciona como rasgo descriptivo del objeto. «Que sale» es natural en español y conserva la idea de movimiento/proceso sin sobrerrepresentar el aspecto verbal.
- source_word: עֵינָם
  english_pob_choice: their appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su ojo
  - su apariencia
  - lo que se ve de ellos
  lexicon: HALOT
  rationale: El consonántico hebreo dice literalmente «su ojo/sus ojos», pero en contexto la POB inglesa entiende el sentido como la apariencia visible. «Su aspecto» preserva esa lectura figurada en un español claro, sin imponer la alternativa textual de «su iniquidad» en el texto principal.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - en todo el país
  - por toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/land». En una visión profética, «tierra» permite amplitud natural y sigue de cerca el valor semántico del hebreo sin forzar una lectura universalizante más allá del contexto.
- source_word: מַה הִיא
  english_pob_choice: What is it?
  chosen_spanish: ¿Qué es?
  alternatives_spanish:
  - ¿Qué es eso?
  - ¿Qué es esto?
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo es femenino, en español la referencia a un objeto se expresa de modo idiomático con «¿Qué es?». Mantener la pregunta breve respeta el intercambio directo de la escena.
theological_decisions:
- issue: Interpretación de עֵינָם en la cláusula final
  english_pob_reading: ‘their appearance’ in the main text, with note for 'their eye' / 'their iniquity'
  chosen_spanish_reading: «su aspecto» en el texto principal
  alternative_spanish_readings:
  - «su ojo/sus ojos»
  - «su iniquidad»
  rationale: La lectura masorética apunta a «ojo», pero es difícil en el contexto. «Su aspecto» conserva una salida semántica plausible derivada de עין como lo visible, sin emendar el texto ni importar la interpretación de «iniquidad» al cuerpo principal. La tensión queda preservada para el lector y para la nota textual si se requiriera.
  doctrine_reference: Prioridad del texto original y preservación de la tensión interpretativa; no resolver una dificultad léxica por tradición posterior sin base suficiente.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: cada nota está anclada en el texto con su marcador exacto. La redacción principal se ajustó para que [a] y [b] aparezcan donde corresponde.'
  spanish_consistency_notes:
  - Se mantiene «tierra» para אָרֶץ en armonía con el contexto profético.
  - Se evita sustituir el término técnico אֵיפָה por una paráfrasis demasiado libre.
  - Se usa «aspecto» para reflejar la lectura preferida de עֵינָם sin borrar la dificultad del hebreo.
  - La puntuación y el uso de comillas siguen normas del español actual.
