translation:
  language: es
  text: 'Y Yahvé dijo a Jehú: «Porque has hecho bien al hacer lo recto ante mis ojos, y has hecho con la casa de Acab conforme a todo lo que estaba en mi corazón, tus hijos[a] hasta la cuarta generación se sentarán en el trono de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tus hijos, hijos de cuartas [generaciones]», un modismo que significa una dinastía de cuatro generaciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: the project default for the divine name
  rationale: Se sigue el default del proyecto para el nombre divino, conservando el referente del pacto sin sustituirlo por una convención de ocultamiento.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón de manera natural en español y preserva la fuerza causal del hebreo.
- source_word: הֱטִיבֹתָ
  english_pob_choice: you have done well
  chosen_spanish: has hecho bien
  alternatives_spanish:
  - has obrado bien
  - has actuado bien
  lexicon: HALOT
  rationale: La expresión española es idiomática y conserva la valoración positiva del verbo causativo/intensivo hebreo.
- source_word: לַעֲשׂוֹת הַיָּשָׁר בְּעֵינַי
  english_pob_choice: in carrying out what is right in my eyes
  chosen_spanish: al hacer lo recto[a] ante mis ojos
  alternatives_spanish:
  - al hacer lo que es recto ante mis ojos
  - al cumplir lo recto ante mis ojos
  lexicon: HALOT
  rationale: Mantiene la fórmula evaluativa hebrea 'recto ante mis ojos'. Se usa 'al hacer' para reflejar el infinitivo de propósito/acción, y 'lo recto' para conservar el sustantivo/adjetivo sustantivado. La nota recoge la resonancia idiomática de la frase.
- source_word: כְּכֹל אֲשֶׁר בִּלְבָבִי
  english_pob_choice: according to all that was in my heart
  chosen_spanish: conforme a todo lo que estaba en mi corazón
  alternatives_spanish:
  - según todo lo que estaba en mi corazón
  - de acuerdo con todo lo que estaba en mi corazón
  lexicon: HALOT
  rationale: '''Corazón'' preserva la metáfora hebrea de intención, voluntad y propósito interior; ''conforme a'' reproduce bien la norma/medida implícita.'
- source_word: עָשִׂיתָ לְבֵית אַחְאָב
  english_pob_choice: have done to the house of Ahab
  chosen_spanish: has hecho a la casa de Acab
  alternatives_spanish:
  - has obrado contra la casa de Acab
  - has actuado respecto de la casa de Acab
  lexicon: HALOT
  rationale: '''Casa de Acab'' conserva el sentido dinástico. Se evita añadir explícitamente ''contra'' para no sobreespecificar más allá del hebreo, aunque el contexto implique juicio.'
- source_word: בְּנֵי רְבִעִים
  english_pob_choice: your sons to the fourth generation
  chosen_spanish: tus hijos hasta la cuarta generación
  alternatives_spanish:
  - tu descendencia hasta la cuarta generación
  - tus hijos de la cuarta generación
  lexicon: HALOT
  rationale: Se opta por una formulación clara en español que preserve la promesa dinástica. 'Hijos' sigue de cerca el hebreo y 'hasta la cuarta generación' explica el alcance idiomático.
- source_word: יֵשְׁבוּ לְךָ עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: shall sit on the throne of Israel
  chosen_spanish: se sentarán en el trono de Israel
  alternatives_spanish:
  - reinarán sobre Israel
  - se sentarán para ti en el trono de Israel
  lexicon: HALOT
  rationale: '''Sentarse en el trono'' conserva el modismo real hebreo. Se omite ''para ti'' por ser innecesario en español y por mantenerse dentro de la línea idiomática del POB inglés.'
theological_decisions:
- issue: Alabanza divina a la ejecución de juicio sobre la casa de Acab
  english_pob_reading: Render the verse as a divine commendation of Jehu's execution of judgment on Ahab's house, without expanding that approval beyond what the verse states.
  chosen_spanish_reading: Traducir el versículo como una aprobación divina de la acción de Jehú respecto de la casa de Acab, sin extender esa aprobación a todo su reinado o carácter.
  alternative_spanish_readings:
  - suavizar la aprobación para evitar una posible implicación moral más amplia
  - convertir la frase en una aprobación general de Jehú
  rationale: El hebreo afirma explícitamente que Jehú hizo bien al llevar a cabo lo recto ante los ojos de Yahvé en relación con la casa de Acab. La traducción debe conservar esa declaración y, al mismo tiempo, no añadir una afirmación teológica más amplia que el texto no da.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el control de revisión más reciente: el texto en inglés y sus decisiones léxicas quedaron confirmados sin cambios, con acuerdo alto y sin revisiones aplicadas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Casa de Acab'' mantiene el nombre propio en forma española habitual y el sentido dinástico.'
  - '''Trono de Israel'' conserva la imagen real sin expandirla a ''reinar'' para no perder el modismo.'
  - La nota de pie marca la expresión idiomática clave sin sobrecargar el cuerpo del texto.
