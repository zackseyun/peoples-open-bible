translation:
  language: es
  text: Y aconteció en el camino, en el lugar de alojamiento[b], que Yahvé se encontró con él[a] y buscó matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo no identifica explícitamente a quién se refiere «él»; puede aludir a Moisés o, en algunas interpretaciones, a su hijo.
    reason: alternative_reading
  - marker: b
    text: 'O también: «en el campamento de la noche»; el hebreo habla de un lugar de alojamiento, no necesariamente de una posada comercial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio. «Aconteció» conserva ese valor discursivo con un tono natural y digno en español.
- source_word: בַדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - a lo largo del camino
  - durante el viaje
  lexicon: HALOT
  rationale: «En el camino» reproduce con claridad el sentido locativo de la frase hebrea sin añadir matices interpretativos.
- source_word: בַּמָּלוֹן
  english_pob_choice: at the lodging place
  chosen_spanish: en el lugar de alojamiento
  alternatives_spanish:
  - en el campamento de la noche
  - en la posada
  lexicon: HALOT
  rationale: מָלוֹן designa un lugar para pasar la noche; «lugar de alojamiento» evita la imagen moderna de una posada comercial y sigue la referencia al lugar donde se pernocta.
- source_word: וַיִּפְגְּשֵׁהוּ
  english_pob_choice: met him
  chosen_spanish: se encontró con él
  alternatives_spanish:
  - lo encontró
  - se le apareció
  lexicon: HALOT
  rationale: פגע puede significar encontrarse o salir al encuentro, con posible carga hostil según el contexto. «Se encontró con él» mantiene el núcleo léxico y deja que la frase siguiente aporte la amenaza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - intentó
  - quiso
  lexicon: HALOT
  rationale: בקש expresa «buscar»; «buscó» preserva el valor verbal básico y la tensión narrativa. En español, unido al infinitivo siguiente, comunica una intención activa sin sobreinterpretar.
- source_word: הֲמִיתוֹ
  english_pob_choice: to put him to death
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - ponerlo a muerte
  lexicon: HALOT
  rationale: El hiphil de מות con sufijo pronominal indica la acción de causar la muerte. «Matarlo» es la forma más directa y natural en español para este contexto, sin perder la gravedad del acto.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se adopta «Yahvé» como transliteración reverente y transparente del nombre divino, manteniendo la decisión doctrinal del POB en una forma natural para el lector hispanohablante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad del pronombre «him»
  english_pob_reading: Retain the Hebrew ambiguity with 'him' in the main text
  chosen_spanish_reading: Conservar «él» sin identificarlo
  alternative_spanish_readings:
  - a Moisés
  - a su hijo
  rationale: El hebreo no especifica el antecedente del sufijo pronominal. La traducción conserva esa ambigüedad con «él» en el texto principal, evitando resolverla interpretativamente y manteniendo la tensión textual documentada por el POB.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que no introdujo cambios y mantuvo alta concordancia con el texto fuente y el análisis previo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conservó la ambigüedad del referente pronominal con «él», en continuidad con la auditoría inglesa.
  - Se eligió un español moderno y digno, evitando arcaísmos como «acaeció» o «Jehová» sin base editorial.
  - «Lugar de alojamiento» mantiene la fuerza semántica de מָלוֹן sin convertirlo en una posada moderna.
