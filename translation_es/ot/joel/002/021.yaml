translation:
  language: es
  text: No tengas miedo, tierra; alégrate y regocíjate, porque Yahvé ha hecho grandes cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Idiomáticamente, el hebreo puede entenderse como «ha actuado grandemente» o «ha hecho grandes cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּֽירְאִ֖י
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, no estés atemorizada
  lexicon: HALOT
  rationale: La forma negativa con imperativo/imperfecto expresa prohibición. «No temas» es breve, natural y fiel al tono profético; conserva el registro formal del original sin añadir explicaciones.
- source_word: אֲדָמָ֑ה
  english_pob_choice: O land
  chosen_spanish: oh tierra
  alternatives_spanish:
  - oh tierra del país
  - oh suelo
  lexicon: HALOT
  rationale: En el contexto de Joel, el vocativo personifica la tierra afectada por el juicio y la restauración. «Tierra» comunica mejor el ámbito territorial y agrícola que «suelo», y el vocativo «oh» reproduce el llamado poético.
- source_word: גִּ֣ילִי
  english_pob_choice: rejoice
  chosen_spanish: alégrate
  alternatives_spanish:
  - regocíjate
  - exulta
  lexicon: HALOT
  rationale: El verbo denota júbilo. «Alégrate» es claro y natural en español; mantiene el paralelismo con el siguiente imperativo y evita un giro demasiado elevado para el registro general.
- source_word: וּשְׂמָחִ֔י
  english_pob_choice: and be glad
  chosen_spanish: y regocíjate
  alternatives_spanish:
  - y alégrate
  - y sé gozosa
  lexicon: HALOT
  rationale: Se preserva la diferencia con גִּילִי usando otro verbo de gozo. «Regocíjate» intensifica el primer mandato y refleja mejor la repetición poética que si ambos se vertieran igual.
- source_word: כִּֽי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de los imperativos. «Porque» expresa causalidad de modo directo y natural en español.
- source_word: הִגְדִּ֥יל יְהוָ֖ה לַעֲשׂוֹת
  english_pob_choice: has done great things
  chosen_spanish: ha hecho grandes cosas
  alternatives_spanish:
  - ha actuado grandemente
  - ha obrado grandes cosas
  lexicon: HALOT
  rationale: La construcción idiomática hebrea significa que Yahvé ha obrado de manera grande o poderosa. «Ha hecho grandes cosas» es idiomático en español y conserva el sentido de acción magnífica sin forzar una paráfrasis más explícita.
- source_word: יְהוָ֖ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino como transliteración estándar de POB en español: «Yahvé». Así no se sustituye por un título como «SEÑOR», y se mantiene la decisión doctrinal del proyecto.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. La política del proyecto en español es transliterarlo como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Duplicación poética de los imperativos de gozo
  english_pob_reading: rejoice and be glad
  chosen_spanish_reading: alégrate y regocíjate
  alternative_spanish_readings:
  - regocíjate y alégrate
  - alégrate y alboroza
  rationale: Se mantiene la tensión poética de dos mandatos distintos en hebreo, en vez de colapsarlos en un solo verbo. Esto preserva la intensificación y el paralelismo del verso.
  doctrine_reference: Principio poético de equivalencia óptima en paralelismo hebreo
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y coincide con la lectura auditada en inglés. No se detectaron revisiones aplicadas en la versión inglesa reciente; la decisión clave es mantener la construcción idiomática de הִגְדִּיל לַעֲשׂוֹת como acción grande/poderosa en español sin perder el paralelismo poético.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «No temas» conserva la concisión profética y evita una ampliación innecesaria.
  - 'Los dos verbos de gozo se distinguen para reflejar el hebreo: primero alegría jubilosa, luego regocijo intensificado.'
  - «Tierra» reproduce el vocativo personificado mejor que «suelo» o «tierra del país» en este contexto.
