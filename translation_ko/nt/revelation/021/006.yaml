  rationale: '21:6과 22:13은 각각 다른 조합으로 동일 정체를 선언한다. 본문의 차이를 존중하여 한국어에서도 각 구절의 표현을 그대로 보존하며, 셋이 동의어가 아니라 보완적 자기 선언임을 살린다.'
  doctrine_reference: 'DOCTRINE.md: Preserve threefold self-identification of God'
