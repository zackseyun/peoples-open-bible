translation:
  language: es
  text: Si yo tuviera razón, mi propia boca me condenaría; aunque soy intachable, me mostraría torcido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque soy intachable, él me mostraría torcido», tomando a Dios como el sujeto implícito en la segunda cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  lexicon: HALOT
  rationale: La partícula introduce una condición en el primer miembro; en español, «Si» conserva esa relación de manera natural. La concesión del conjunto se percibe en la antítesis del verso, no en esta partícula aislada.
- source_word: אֶצְדָּק
  english_pob_choice: I am in the right
  chosen_spanish: yo estuviera en lo correcto
  alternatives_spanish:
  - yo fuera justo
  - yo fuera recto
  - yo me justificara
  lexicon: HALOT
  rationale: 'Aquí צדק funciona de modo forense e intransitivo: estar en lo correcto / tener razón. «Estuviera en lo correcto» expresa bien la situación hipotética y evita cargar el verbo con una idea causal de autojustificación que el hebreo no exige.'
- source_word: פִּי
  english_pob_choice: my own mouth
  chosen_spanish: mi propia boca
  alternatives_spanish:
  - mi boca
  lexicon: HALOT
  rationale: '«Boca» reproduce el sustantivo hebreo de manera directa. Añadir «propia» conserva el matiz enfático e irónico: la misma boca de Job actuaría contra él.'
- source_word: יַרְשִׁיעֵנִי
  english_pob_choice: would condemn me
  chosen_spanish: me condenaría
  alternatives_spanish:
  - me declararía culpable
  - me declararía impío
  lexicon: HALOT
  rationale: En contexto jurídico, רשׁע en hiphil significa condenar o declarar culpable. «Me condenaría» es la opción española más natural y fiel al tono forense del verso.
- source_word: תָּם
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - íntegro
  - inocente
  - blameless
  lexicon: HALOT
  rationale: En Job, תם señala integridad moral, no perfección sin pecado. «Intachable» comunica bien esa cualidad en español moderno y mantiene el equilibrio entre fuerza ética y sobriedad.
- source_word: וַיַּעְקְשֵׁנִי
  english_pob_choice: it would prove me crooked
  chosen_spanish: me probaría torcido
  alternatives_spanish:
  - me mostraría torcido
  - me haría torcido
  - él me haría torcido
  lexicon: HALOT
  rationale: Se conserva la lectura del POB inglés de un sujeto implícito continuado desde «mi boca». «Probaría» refleja el valor resultativo/forense de la construcción y «torcido» traduce bien la idea de עקשׁ.
theological_decisions:
- issue: Sujeto implícito de וַיַּעְקְשֵׁנִי
  english_pob_reading: The subject is carried over from 'my mouth' ('it would prove me crooked').
  chosen_spanish_reading: 'El sujeto se entiende como continuado desde «mi propia boca»: «me probaría torcido».'
  alternative_spanish_readings:
  - «él me haría torcido», tomando a Dios como sujeto implícito
  - «me declararía torcido» sin precisar sujeto
  rationale: La paralelismo favorece mantener el mismo sujeto implícito del primer hemistiquio. Así se preserva la tensión del texto sin introducir de manera innecesaria una acusación más explícita contra Dios, aunque esa lectura siga siendo posible y quede registrada.
  doctrine_reference: Preservar la tensión teológica del original y la primacía del hebreo sobre una resolución dogmática previa.
translation_notes:
  revision_awareness: Se ha seguido el pasaje hebreo de Job 9:20 y el archivo auditado en inglés. La traducción inglesa POB lee la primera cola como condicional («If I am in the right») y conserva en la segunda la continuidad del sujeto desde «my mouth»; se ha mantenido esa decisión, con ajuste natural del español para un registro bíblico claro y publicable.
  spanish_consistency_notes:
  - Se usa «Dios» de forma implícita solo cuando el texto lo requiere; aquí no se explicita porque el hebreo permite continuidad del sujeto previo.
  - Se mantiene «torcido» para conservar el campo semántico de עקשׁ sin suavizarlo a una mera imperfección moral.
  - «Intachable» se prefiere a «justo» para evitar confundir תם con צדק y para reflejar la cualidad ética de integridad.
  - La puntuación reproduce la estructura paralela del hebreo y del inglés auditado, con dos miembros equilibrados separados por punto y coma.
