translation:
  language: es
  text: 'Así, José lo estableció como estatuto hasta hoy sobre la tierra de Egipto: una quinta parte pertenece a Faraón. Solo la tierra de los sacerdotes no llegó a ser de Faraón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: made
  chosen_spanish: lo convirtió en
  alternatives_spanish:
  - lo estableció como
  - lo hizo
  lexicon: HALOT
  rationale: En contexto administrativo-jurídico, שׂוּם expresa establecer una norma. «Lo convirtió en» conserva el valor causativo sin sonar forzado en español; mantiene la idea de que José fijó la disposición como regla.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - esto
  lexicon: HALOT
  rationale: El objeto retoma la disposición anterior sobre el tributo. En español, el referente es neutro en función, por lo que «lo» resulta natural y suficientemente anafórico.
- source_word: לְחֹק
  english_pob_choice: a statute
  chosen_spanish: un estatuto
  alternatives_spanish:
  - una ley fija
  - un decreto
  lexicon: HALOT
  rationale: חֹק designa una norma establecida. «Estatuto» preserva el carácter formal y jurídico, y evita reducirlo a una simple ley civil genérica.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: para este día
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: La secuencia indica vigencia continua. «Para este día» mantiene el valor de continuidad en una forma breve y bíblica en español; también deja claro que la norma sigue vigente al momento narrativo.
- source_word: עַל אַדְמַת מִצְרַיִם
  english_pob_choice: concerning the land of Egypt
  chosen_spanish: acerca de la tierra de Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Aquí עַל delimita el ámbito de la disposición. «Acerca de» comunica la esfera de aplicación de la norma sin sugerir de manera impropia simple ubicación física.
- source_word: לְפַרְעֹה
  english_pob_choice: for Pharaoh
  chosen_spanish: pertenece a Faraón
  alternatives_spanish:
  - es para Faraón
  - corresponde a Faraón
  lexicon: HALOT
  rationale: En el contexto del impuesto agrícola, la preposición marca destino o beneficio. «Pertenece a Faraón» expresa con claridad el efecto económico-jurídico de la norma.
- source_word: לַחֹמֶשׁ
  english_pob_choice: the fifth
  chosen_spanish: la quinta parte
  alternatives_spanish:
  - un quinto
  - el quinto
  lexicon: HALOT
  rationale: חֹמֶשׁ significa una quinta parte. En español, «la quinta parte» comunica mejor que «el quinto» la fracción tributaria concreta, evitando ambigüedad de género o sustantivación artificial.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto
  - Únicamente
  lexicon: HALOT
  rationale: Marca la excepción a la regla general. «Solo» conserva la restricción de forma directa y natural.
- source_word: אַדְמַת הַכֹּהֲנִים
  english_pob_choice: the land of the priests
  chosen_spanish: la tierra de los sacerdotes
  alternatives_spanish:
  - la tierra de los sacerdotes
  - la tierra sacerdotal
  lexicon: HALOT
  rationale: La construcción posesiva/construida señala la tierra asociada a los sacerdotes. «Sacerdotes» es el equivalente más claro y público en español; «tierra de los sacerdotes» mantiene la relación de pertenencia.
- source_word: לְבַדָּם
  english_pob_choice: alone
  chosen_spanish: en cambio
  alternatives_spanish:
  - solamente
  - por sí sola
  lexicon: HALOT
  rationale: El hebreo intensifica la excepción. En español, repetir «sola/solamente» junto con «Solo» resulta redundante; «en cambio» conserva el contraste implícito y evita un calco pesado, siguiendo la revisión inglesa que resolvió la redundancia formal.
- source_word: לֹא הָיְתָה לְפַרְעֹה
  english_pob_choice: did not become Pharaoh’s
  chosen_spanish: no llegó a ser de Faraón
  alternatives_spanish:
  - no perteneció a Faraón
  - no fue de Faraón
  lexicon: HALOT
  rationale: היה + ל expresa aquí un cambio de pertenencia/posesión. «No llegó a ser de Faraón» capta el resultado estatal sin forzar un simple pasado estático; refleja la oposición con el resto de la tierra sometida al tributo.
translation_notes:
  revision_awareness: 'Se siguió el patrón revisado del inglés POB: se expresa la vigencia continua de la norma de manera natural, se traduce la quinta parte como fracción tributaria concreta, y se evita la redundancia de marcar dos veces la excepción del terreno sacerdotal. No se añadió aparato de notas porque el español no introdujo una ambigüedad nueva que requiriera alternativas explícitas en el texto.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - Se mantuvo «Faraón» como nombre/título tradicional en español por uso bíblico consolidado.
  - «Sacerdotes» se conservó como término funcional directo; no se sustituyó por «sacerdotes» rituales u otra perífrasis.
  - La estructura general sigue una prosa bíblica moderna, clara y publicable, sin copiar mecánicamente la sintaxis inglesa.
