translation:
  language: es
  text: Este mes será para ustedes el comienzo de los meses[a]; será el primer mes del año para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Esta luna nueva», ya que la palabra hebrea puede asociarse con el ciclo de la luna nueva; aquí se refiere al mes del calendario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹדֶשׁ הַזֶּה
  english_pob_choice: This month
  chosen_spanish: Este mes
  alternatives_spanish:
  - Esta luna nueva
  - Este mes lunar
  lexicon: HALOT
  rationale: En este contexto legal y calendárico, חֹדֶשׁ se entiende naturalmente como «mes». Aunque la palabra está emparentada con el ciclo de la luna nueva, en español «este mes» comunica con claridad la designación calendárica sin forzar una traducción etimológica.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: HALOT
  rationale: La expresión marca a Israel como destinatario de la orden/institución. «Para ustedes» suena natural en español neutro y conserva el valor de referencia y pertenencia del precepto.
- source_word: רֹאשׁ חֳדָשִׁים
  english_pob_choice: the beginning of months
  chosen_spanish: el comienzo de los meses
  alternatives_spanish:
  - la cabeza de los meses
  - el primero de los meses
  lexicon: HALOT
  rationale: רֹאשׁ funciona idiomáticamente como «comienzo» en orden temporal. «El comienzo de los meses» preserva la imagen hebrea sin caer en un calco extraño para el español.
- source_word: רִאשׁוֹן
  english_pob_choice: the first month
  chosen_spanish: el primer mes
  alternatives_spanish:
  - el mes primero
  - el mes principal
  lexicon: HALOT
  rationale: El adjetivo expresa prioridad ordinal. En español, el sustantivo «mes» debe completarse explícitamente para que la frase quede natural y fiel al contexto calendárico.
- source_word: הוּא
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - es
  - quedará siendo
  lexicon: HALOT
  rationale: El hebreo es nominal y exhortativo en contexto legislativo. «Será» refleja bien la fuerza instituyente de la declaración sin añadir contenido doctrinal.
- source_word: לְחָדְשֵׁי הַשָּׁנָה
  english_pob_choice: of the year
  chosen_spanish: del año
  alternatives_spanish:
  - entre los meses del año
  - para los meses del año
  lexicon: HALOT
  rationale: 'La construcción delimita el ámbito de la cuenta: este mes ocupa el primer lugar respecto de los meses del año. «Del año» es la forma más sobria y clara en español.'
theological_decisions:
- issue: Fuerza normativa de la cláusula hebrea sin verbo explícito
  english_pob_reading: 'Rendered with future/modal force: ''shall be'''
  chosen_spanish_reading: 'Renderizada con futuro normativo: «será»'
  alternative_spanish_readings:
  - «es»
  - «queda siendo»
  rationale: En un contexto de institución del calendario de Israel, el español debe sonar prescriptivo. «Será» comunica una orden/establecimiento vigente sin sobreinterpretar el texto ni convertirlo en mera descripción.
  doctrine_reference: 'Principios de traducción POB: fidelidad contextual e ինտención prescriptiva del discurso legal'
- issue: Posible sentido de חֹדֶשׁ como «luna nueva» frente a «mes»
  english_pob_reading: 'This month / footnote: Or ''This new moon,'' since the Hebrew word can be associated with the new-moon cycle; here it refers to the calendrical month.'
  chosen_spanish_reading: «Este mes» con nota alternativa sobre «luna nueva»
  alternative_spanish_readings:
  - «Esta luna nueva»
  - «Este mes lunar»
  rationale: La base semántica permite la asociación con la luna nueva, pero aquí la función es calendárica. Mantener «mes» en el texto principal evita confusión y preserva la tensión léxica documentada; la nota recoge la alternativa histórica/etimológica.
  doctrine_reference: HALOT; auditorio calendárico-legal de Éxodo 12
- issue: Relación entre ordinal y sustantivo en la segunda cláusula
  english_pob_reading: the first month of the year
  chosen_spanish_reading: «el primer mes del año»
  alternative_spanish_readings:
  - «el mes primero del año»
  - «el primero de los meses del año»
  rationale: El hebreo concentra la prioridad en el orden del mes dentro del año. En español, «el primer mes del año» es la forma más transparente y evita una rigidez sintáctica innecesaria.
  doctrine_reference: HALOT; sintaxis de ordinales en español
translation_notes:
  revision_awareness: 'Concordante con el antecedente inglés: se mantiene la lectura calendárica principal de חֹדֶשׁ como «mes», con nota para la alternativa «luna nueva», y se conserva el valor normativo de la cláusula mediante «será». No se detectaron revisiones aplicadas en el antecedente inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparece el Nombre divino; este versículo no lo contiene.
  - «Mes» se mantiene de forma consistente para חֹדֶשׁ en contexto calendárico.
  - «Para ustedes» conserva el destinatario colectivo y evita regionalismos marcados.
  - La nota al pie usa una alternativa léxica real y no introduce una paráfrasis doctrinal.
