  to: Sus posesiones ganaderas eran siete mil ovejas[a], tres mil camellos, quinientas yuntas de bueyes, quinientas asnas y una servidumbre muy numerosa; y aquel hombre era más importante que todos los hijos de oriente[b].
  rationale: Se reemplazó 'Tenía' por 'Sus posesiones ganaderas eran' para reflejar mejor מִקְנֵהוּ. Se cambió 'una casa muy grande' por 'una servidumbre muy numerosa' para evitar la ambigüedad de 'casa' en español y comunicar mejor el establecimiento doméstico de Job; aunque es algo más específico que el inglés 'household', es más natural y menos equívoco. Se ajustó 'más grande' a 'más importante' para expresar mejor el valor comparativo de estatus en גָּדוֹל. Se añadió la nota inglesa sobre 'hijos de oriente' como alternativa de lectura más natural.
