revisions:
- from: Y se reunieron a él todos los que estaban en angustia[a], todos los que tenían acreedor, y todos los que tenían amargura de alma[b]; y llegó a ser jefe sobre ellos. Y había con él como cuatrocientos hombres.
  to: Y se reunieron con él todos los que estaban en angustia[a], todos los que estaban en deuda, y todos los amargos de alma[b]; y él llegó a ser comandante sobre ellos. Estaban con él unos cuatrocientos hombres.
  rationale: Se revisó «tenían acreedor» a «estaban en deuda» para seguir la revisión aprobada del POB inglés y mejorar la naturalidad en español. Se cambió «había con él» por «estaban con él» para reflejar más directamente el hebreo. Se ajustó «jefe» a «comandante» por mejor correspondencia contextual con שַׂר, y «como cuatrocientos» a «unos cuatrocientos» para una aproximación más idiomática en español. También se suavizó «tenían amargura de alma» a «amargos de alma», que conserva mejor el modismo hebreo sin volverlo pesado.
