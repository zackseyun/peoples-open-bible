revisions:
- from: 'Pero Moisés le dijo: “¿Sientes celos por mí? ¡Ojalá todo el pueblo de Yahvé fuera profeta[a], y Yahvé pusiera su Espíritu[b] sobre ellos!”'
  to: 'Pero Moisés le dijo: «¿Sientes celos por mí? ¡Ojalá todo el pueblo de Yahvé fueran profetas, y Yahvé pusiera su Espíritu[a] sobre ellos!»'
  rationale: Se corrige «profeta» a «profetas» para reflejar fielmente el plural נְבִיאִים y se elimina la nota [a] anterior porque no aportaba una alternativa válida y repetía el error. Se conserva «Yahvé» y «su Espíritu» según las decisiones del proyecto. La nota restante se reancla como [a] para explicar la expresión hebrea «dar/poner su Espíritu sobre ellos».
