translation:
  language: es
  text: Y solo él[a], si dice matar, matan; si dice liberar, liberan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si dice dejar ir, dejan ir». El verbo griego puede significar liberar, dejar ir o perdonar, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he alone
  chosen_spanish: él solo
  alternatives_spanish:
  - él mismo
  - solo él
  lexicon: LSJ
  rationale: El pronombre es enfático en contexto. «Él solo» transmite la exclusividad del sujeto mejor que un simple «él», y evita una redundancia innecesaria frente a «él mismo».
- source_word: εἰ μόνος ἐστίν
  english_pob_choice: is alone
  chosen_spanish: solo
  alternatives_spanish:
  - está solo
  - es el único
  lexicon: LSJ
  rationale: La idea de singularidad/aislamiento se integra de manera natural en español con «solo», manteniendo el énfasis del griego sin volver la frase pesada.
- source_word: ἐὰν εἴπῃ
  english_pob_choice: if he says
  chosen_spanish: si dice
  alternatives_spanish:
  - si dijera
  - si él dice
  lexicon: BDAG
  rationale: 'La construcción condicional general se expresa con el presente de indicativo en español: «si dice», que conserva la fuerza contingente y la concisión del griego.'
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - poner a muerte
  lexicon: BDAG
  rationale: «Matar» es la equivalencia directa y más natural para el infinitivo de acción. No se añade un matiz judicial que el griego aquí no exige.
- source_word: ἀποκτέννουσιν
  english_pob_choice: they kill
  chosen_spanish: matan
  alternatives_spanish:
  - dan muerte
  - lo matan
  lexicon: BDAG
  rationale: El presente plural se vierte con «matan», breve y directo, manteniendo el paralelismo con el infinitivo anterior y el tono tajante del texto.
- source_word: ἀφεῖναι
  english_pob_choice: to release
  chosen_spanish: soltar
  alternatives_spanish:
  - liberar
  - dejar ir
  - perdonar
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «release», en español «soltar» comunica con precisión el campo semántico de dejar ir/soltar, y suena más natural en una cadena paralela tan breve. Se evita «perdonar», que estrecharía indebidamente el sentido.
- source_word: ἀφίουσιν
  english_pob_choice: they release
  chosen_spanish: sueltan
  alternatives_spanish:
  - liberan
  - dejan ir
  - perdonan
  lexicon: BDAG
  rationale: 'Se mantiene la misma raíz léxica que en el infinitivo para conservar el paralelismo estilístico: «soltar / sueltan». Esto refleja el rango de «release/let go» sin introducir un valor legal específico.'
translation_notes:
  revision_awareness: Se siguió de cerca el griego de Swete (καὶ αὐτὸς εἰ μόνος ἐστίν, ἐὰν εἴπῃ ἀποκτεῖναι, ἀποκτέννουσιν· εἴπεν ἀφεῖναι, ἀφίουσιν·) y el audit trail inglés. La principal decisión de divergencia fue traducir ἀφεῖναι/ἀφίουσιν con «soltar/sueltan» en lugar de «liberar/liberan», porque en español mantiene mejor la concisión y el contraste paralelo del verso, sin perder el rango semántico indicado por la nota inglesa.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo verbal breve: matar/matan; soltar/sueltan.'
  - «Él solo» reproduce el énfasis del sujeto sin sobreexplicar.
  - No se introdujo lenguaje eclesiástico ni judicial ajeno al texto.
  - La nota al pie mantiene la alternativa «dejar ir» para reflejar el rango léxico de ἀφίημι.
