translation:
  language: es
  text: 'Y Eliseo dijo al rey de Israel[a]: «¿Qué tengo yo que ver contigo? Ve a los profetas de tu padre y a los profetas de tu madre». Y el rey de Israel le respondió: «No[b], porque Yahvé ha llamado a estos tres reyes para entregarlos en manos de Moab».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «¿Qué tengo yo que ver contigo?» expresa distancia, rechazo o ruptura de relación.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es breve y difícil; también puede entenderse como una súplica: «Por favor, no; porque Yahvé ha llamado...».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לִּי וָלָךְ
  english_pob_choice: What have I to do with you?
  chosen_spanish: ¿Qué tengo yo que ver contigo?
  alternatives_spanish:
  - ¿Qué tengo yo contigo?
  - ¿Qué tengo que ver con usted?
  lexicon: HALOT
  rationale: El hebreo es un modismo de distancia o rechazo, no una pregunta literal. En español, «¿Qué tengo yo que ver contigo?» conserva el tono de reproche con naturalidad actual y sin volverlo demasiado coloquial.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: El imperativo breve del hebreo se mantiene de forma directa. «Ve» es claro, sobrio y fiel al valor exhortativo del contexto.
- source_word: נְבִיאֵי אָבִיךָ ... נְבִיאֵי אִמֶּךָ
  english_pob_choice: the prophets of your father ... the prophets of your mother
  chosen_spanish: los profetas de tu padre ... los profetas de tu madre
  alternatives_spanish:
  - los profetas de tu padre ... y los profetas de tu madre
  - los profetas de tu padre ... los profetas de tu madre
  lexicon: HALOT
  rationale: Se conserva la referencia punzante a la casa real y sus asociaciones idólatras. La construcción posesiva en español refleja con claridad el paralelo hebreo.
- source_word: אַל כִּי
  english_pob_choice: No, for
  chosen_spanish: No, porque
  alternatives_spanish:
  - Por favor, no, porque
  - No, ya que
  lexicon: HALOT
  rationale: La respuesta del rey es sintética y ambigua. «No, porque» reproduce bien la protesta breve que entiende el contexto, sin cerrar indebidamente las posibilidades de lectura que el hebreo permite.
- source_word: קָרָא
  english_pob_choice: has called
  chosen_spanish: ha llamado
  alternatives_spanish:
  - ha convocado
  - ha reunido
  lexicon: HALOT
  rationale: «Ha llamado» reproduce el verbo básico y mantiene la amplitud semántica de una acción divina que convoca o dispone la situación.
- source_word: לִשְׁלֹשֶׁת הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: these three kings
  chosen_spanish: a estos tres reyes
  alternatives_spanish:
  - a estos tres monarcas
  - a los tres reyes estos
  lexicon: HALOT
  rationale: Se conserva la mención concreta de «estos tres reyes» y el matiz de dirección implícito en la construcción del hebreo al enlazarse con el infinitivo siguiente.
- source_word: לָתֵת אוֹתָם
  english_pob_choice: to give them
  chosen_spanish: para entregarlos
  alternatives_spanish:
  - para darlos
  - para ponerlos
  lexicon: HALOT
  rationale: En español, «entregar» expresa mejor el resultado de quedar bajo el control de otro. Conserva la fuerza del propósito/resultadode la frase hebrea.
- source_word: בְּיַד מוֹאָב
  english_pob_choice: into the hand of Moab
  chosen_spanish: en manos de Moab
  alternatives_spanish:
  - en la mano de Moab
  - bajo el poder de Moab
  lexicon: HALOT
  rationale: La imagen hebrea de la mano como poder se mantiene con una expresión natural en español. «En manos de Moab» comunica dominio sin perder la metáfora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: no se sustituye por un título, sino que se translitera el nombre divino. En español bíblico, «Yahvé» es la forma más estable y legible para este registro.'
theological_decisions:
- issue: Forma de la respuesta del rey ante אַל כִּי
  english_pob_reading: No, for ... The Hebrew expression is difficult and may be read as a plea rather than a blunt objection.
  chosen_spanish_reading: No, porque ...
  alternative_spanish_readings:
  - Por favor, no, porque ...
  - No, ya que ...
  - ¡Ay, porque ...
  rationale: El hebreo es difícil y admite más de una entonación. La redacción elegida deja oír la protesta del rey sin decidir más de lo que el texto exige, y conserva la tensión señalada en el aparato inglés.
  doctrine_reference: Principio de cautela exegética ante expresiones elípticas y ambiguas
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios revelado a Israel, conforme a la política doctrinal del proyecto. No se oculta detrás de un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La imagen de «dar en la mano de Moab»
  english_pob_reading: to give them into the hand of Moab
  chosen_spanish_reading: para entregarlos en manos de Moab
  alternative_spanish_readings:
  - para darlos en manos de Moab
  - para ponerlos en poder de Moab
  rationale: La metáfora bíblica de la mano como poder o dominio se conserva. La formulación española evita una paráfrasis explicativa excesiva y mantiene la tensión narrativa del juicio implícito.
  doctrine_reference: Principio de preservación de imaginería bíblica
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa que cambió la primera cláusula a una forma más idiomática y formal («What have I to do with you?») y mantuvo «And» para reflejar la conjunción hebrea. En español, eso favorece una estructura sobria y directa, sin añadir conectores adversativos o explicativos que no estén en el texto. También respeté la decisión del POB inglés de preservar la imagen de la «mano» y de traducir el Tetragrámaton con el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה, conforme al criterio del proyecto.
  - Se mantiene «reyes» y no «gobernantes» para conservar la correspondencia léxica con el hebreo.
  - La frase «en manos de Moab» preserva la metáfora bíblica y su tono narrativo.
  - El registro es sobrio y eclesialmente legible, evitando tanto arcaísmos excesivos como coloquialismos fuertes.
