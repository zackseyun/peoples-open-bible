translation:
  language: es
  text: Y uno de los hijos de Joiada, hijo de Eliasib, el sumo sacerdote, era yerno[a] de Sanbalat el horonita; así que lo expulsé[b] de mi presencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en sentido más amplio, «estaba relacionado por matrimonio con Sanbalat». El hebreo puede designar una relación matrimonial; en este contexto, «yerno» es la lectura más específica y natural.
    reason: lexical_alternative
  - marker: b
    text: O «lo eché», «lo hice huir» o «lo desterré». El verbo hebreo enfatiza una remoción forzosa; no especifica la forma administrativa exacta de la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  english_pob_choice: And one of the sons of
  chosen_spanish: Y uno de los hijos de
  alternatives_spanish:
  - Y de los hijos de
  - Y uno de entre los hijos de
  lexicon: HALOT
  rationale: El hebreo expresa un sentido partitivo; en español, «uno de los hijos de» comunica de forma natural y fiel ese valor sin perder la idea de pertenencia al grupo.
- source_word: יוֹיָדָע
  english_pob_choice: Joiada
  chosen_spanish: Joiada
  alternatives_spanish:
  - Jehoiada
  lexicon: transliteración estándar
  rationale: Se mantiene la forma breve usada en la POB inglesa y coherente con la transliteración del hebreo en este nombre propio.
- source_word: בֶּן אֶלְיָשִׁיב
  english_pob_choice: son of Eliashib
  chosen_spanish: hijo de Eliasib
  alternatives_spanish:
  - hijo de Elíasib
  lexicon: HALOT
  rationale: La construcción genealógica se conserva de manera directa. «Eliasib» es una transliteración clara y bíblicamente reconocible en español.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: HALOT
  rationale: «Sumo sacerdote» es el equivalente español establecido para el título sacerdotal supremo. «Gran sacerdote» sería demasiado literal y poco natural.
- source_word: חָתָן לְסַנְבַלַּט
  english_pob_choice: was a son-in-law of Sanballat
  chosen_spanish: era yerno de Sanbalat
  alternatives_spanish:
  - estaba relacionado por matrimonio con Sanbalat
  lexicon: HALOT
  rationale: En este contexto, חתן denota una relación matrimonial específica; «yerno» refleja la lectura más natural y precisa, mientras que «relacionado por matrimonio» preservaría una alternativa más amplia.
- source_word: הַחֹרֹנִי
  english_pob_choice: the Horonite
  chosen_spanish: el horonita
  alternatives_spanish:
  - el de Horonaim
  lexicon: gentilic
  rationale: Se conserva el gentilicio tradicional de forma transparente en español. No se desarrolla el topónimo porque el texto lo usa como identificador étnico/geográfico.
- source_word: וָאַבְרִיחֵהוּ
  english_pob_choice: so I drove him away
  chosen_spanish: así que lo eché lejos de mí
  alternatives_spanish:
  - así que lo expulsé
  - así que lo eché de mí
  - así que lo hice huir
  lexicon: HALOT
  rationale: El verbo en hiphil expresa un alejamiento forzoso. «Lo eché lejos de mí» conserva la fuerza de expulsión sin introducir una forma jurídica que el hebreo no especifica.
- source_word: מֵעָלָי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi presencia
  - lejos de mí
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente significa «de sobre mí» y aquí funciona como alejamiento personal. «De mí» es conciso; el matiz de separación ya está reforzado por el verbo.
theological_decisions:
- issue: Relación matrimonial como dato narrativo sin implicación doctrinal adicional
  english_pob_reading: was a son-in-law of Sanballat
  chosen_spanish_reading: era yerno de Sanbalat
  alternative_spanish_readings:
  - estaba relacionado por matrimonio con Sanbalat
  rationale: El versículo informa de una relación familiar que explica la gravedad narrativa del conflicto, pero no requiere amplificación doctrinal. Se mantiene el dato concreto que el contexto favorece.
  doctrine_reference: Nehemías 13:28 en su contexto narrativo-histórico
translation_notes:
  revision_awareness: 'Se siguió de cerca el expediente de la POB inglesa: se mantuvo la lectura partitiva de וּמִבְּנֵי, se conservó el gentilicio «horonita», se prefirió una equivalencia natural para חתן en este contexto y se respetó la fuerza del verbo final sin introducir una formalidad legal no atestiguada. No hubo revisiones aplicadas en el pasaje fuente, y el acuerdo de revisión previo es alto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en los casos donde el hebreo מקור sea el nombre divino; aquí no aparece.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se mantiene «esclavo»/«siervo» fuera de este pasaje según el criterio lexical del proyecto; aquí no aplica.
  - 'La transliteración de nombres propios sigue un español bíblico claro y consistente: Joiada, Eliasib, Sanbalat, horonita.'
