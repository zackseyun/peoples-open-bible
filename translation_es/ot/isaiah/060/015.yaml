translation:
  language: es
  text: En lugar de que fueras abandonada y odiada[a], sin que nadie pasara, te convertiré en una majestad eterna, un gozo de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘una majestad eterna’ o ‘una gloria eterna’. El término hebreo puede denotar exaltación, majestad o la condición honrada de alguien o algo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: Instead of
  chosen_spanish: En lugar de
  alternatives_spanish:
  - En vez de
  - En lugar de que
  lexicon: HALOT
  rationale: 'Expresa con naturalidad en español la idea de intercambio o reemplazo presente en el hebreo: la condición anterior es sustituida por la nueva realidad prometida.'
- source_word: הֱיוֹתֵךְ
  english_pob_choice: your being
  chosen_spanish: que fueras
  alternatives_spanish:
  - tu ser
  - tu estado de ser
  - que eras
  lexicon: HALOT
  rationale: El infinitivo sustantivado con sufijo introduce la condición previa de la destinataria. En español, una subordinada con imperfecto de subjuntivo mantiene el valor de condición sin sonar forzada.
- source_word: עֲזוּבָה
  english_pob_choice: forsaken
  chosen_spanish: abandonada
  alternatives_spanish:
  - desamparada
  - desierta
  - abandonada
  lexicon: HALOT
  rationale: ‘Abandonada’ comunica bien la idea de haber sido dejada sola o desatendida, y en español suena más natural que una transliteración de matiz jurídico-covenantal.
- source_word: שְׂנוּאָה
  english_pob_choice: hated
  chosen_spanish: odiada
  alternatives_spanish:
  - aborrecida
  - despreciada
  - rechazada
  lexicon: HALOT
  rationale: El participio pasivo expresa ser objeto de odio. ‘Odiada’ conserva la fuerza directa del término hebreo.
- source_word: וְאֵין עוֹבֵר
  english_pob_choice: with no one passing through
  chosen_spanish: sin que nadie pasara
  alternatives_spanish:
  - sin que nadie atravesara
  - sin transeúntes
  - sin que nadie transitara
  lexicon: HALOT
  rationale: La imagen describe desolación urbana o de paso interrumpido. ‘Pasara’ reproduce la idea de ausencia de tránsito de manera idiomática en español.
- source_word: וְשַׂמְתִּיךְ
  english_pob_choice: I will make you
  chosen_spanish: te convertiré
  alternatives_spanish:
  - te haré
  - te pondré como
  - te estableceré como
  lexicon: HALOT
  rationale: Aunque el verbo puede ser ‘poner’ o ‘hacer’, aquí la construcción expresa transformar a la ciudad en algo distinto. ‘Te convertiré en’ conserva el sentido causativo con un giro natural en español.
- source_word: לִגְאוֹן
  english_pob_choice: an everlasting majesty
  chosen_spanish: una majestad eterna
  alternatives_spanish:
  - una gloria eterna
  - un esplendor eterno
  - una exaltación eterna
  lexicon: HALOT
  rationale: El hebreo גאון puede significar exaltación, majestad o gloria. Siguiendo la revisión inglesa que prefirió ‘majesty’, ‘majestad’ evita la ambigüedad negativa de ‘orgullo’ y mantiene el tono elevado del oráculo.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - para siempre
  - duradera
  lexicon: HALOT
  rationale: El adjetivo expresa duración indefinida. ‘Eterna’ es la equivalencia más natural y solemne en este contexto profético.
- source_word: מְשׂוֹשׂ
  english_pob_choice: a joy
  chosen_spanish: un gozo
  alternatives_spanish:
  - una alegría
  - un regocijo
  - una delicia
  lexicon: HALOT
  rationale: El sustantivo denota gozo o alegría. ‘Gozo’ ofrece un registro bíblico y claro, sin perder inteligibilidad para lectores contemporáneos.
- source_word: דּוֹר וָדוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - de una generación a otra
  - para todas las generaciones
  lexicon: HALOT
  rationale: Es el equivalente idiomático directo en español y conserva la repetición enfática del hebreo.
theological_decisions:
- issue: Matiz de גאון en un contexto de restauración
  english_pob_reading: an everlasting majesty
  chosen_spanish_reading: una majestad eterna
  alternative_spanish_readings:
  - una gloria eterna
  - un esplendor eterno
  - un orgullo eterno
  rationale: El contexto promete la restauración y el honor concedido por Dios a Sion; por eso se prefiere un término de dignidad y exaltación, no uno que sugiera arrogancia moral. ‘Majestad’ refleja ese estatus exaltado y preserva la tensión lexical del hebreo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre abandono/odio y la inversión prometida
  english_pob_reading: Instead of your being forsaken and hated
  chosen_spanish_reading: En lugar de que fueras abandonada y odiada
  alternative_spanish_readings:
  - En vez de que fueras desamparada y aborrecida
  - En lugar de tu abandono y odio
  rationale: 'La frase hebrea presenta un cambio de estado: la ciudad antes abandonada y odiada es transformada por la acción divina. La redacción española mantiene ese contraste sin suavizarlo.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La base inglesa revisó ‘pride’ a ‘majesty’ para גאון, evitando la lectura negativa de ‘pride’ y ajustando el registro. La propuesta española sigue esa revisión y conserva la alternativa semántica principal (‘gloria’), sin diluir el valor honorífico del término hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como terminología por defecto cuando el contexto lo requiera, pero en este versículo el nombre divino no aparece explícitamente.
  - ‘Majestad’ se usa aquí en sentido de honor y elevación; no debe leerse como referencia a una entidad real o título humano.
  - ‘Gozo’ y ‘generación en generación’ conservan el paralelismo poético del hebreo con registro bíblico claro.
