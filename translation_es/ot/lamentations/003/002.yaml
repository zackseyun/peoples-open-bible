revisions:
- from: Me ha conducido y me ha hecho andar en tinieblas[a] y no en luz.
  to: Me ha empujado y me ha hecho andar en tinieblas, y no luz[a].
  rationale: Se ajusta נָהַג a «me ha empujado» para reflejar mejor la coerción y aflicción destacadas en la auditoría inglesa, sin perder concisión poética. Se cambia «y no en luz» por «y no luz» para respetar mejor la elipsis tajante del hebreo y mejorar la fidelidad formal al contraste «tinieblas / luz». La nota alternativa se conserva y se actualiza para coincidir con la redacción revisada.
