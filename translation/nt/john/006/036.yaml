id: JHN.6.36
reference: John 6:36
source:
  edition: SBLGNT
  text: ἀλλ’ εἶπον ὑμῖν ὅτι καὶ ἑωράκατέ με καὶ οὐ πιστεύετε.
translation:
  text: But I told you that you have even seen me[a], and yet you do not believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'But I told you that you have indeed seen me, and yet you do not believe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement; 'But' is the most natural concise English adversative here.
- source_word: εἶπον
  chosen: I told
  alternatives:
  - I said
  - I spoke
  lexicon: BDAG
  rationale: Aorist of λέγω referring to a prior statement to the audience. 'I told' fits direct address in English better than the more wooden 'I said to you.'
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The indirect object is naturally absorbed into English verbal idiom as 'I told you' rather than expressed separately.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what Jesus previously said; standard English complementizer.
- source_word: καὶ
  chosen: even though
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: The first καί before ἑωράκατέ has an emphatic/adverbial force in context, highlighting the surprising concession that they have in fact seen him. Rendering it with concessive force in English best captures the sense rather than a flat 'also.'
- source_word: ἑωράκατέ
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: BDAG
  rationale: Perfect tense of ὁράω indicates a completed act with present relevance. English present perfect preserves that aspect better than simple past.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of 'have seen'; straightforward pronoun rendering.
- source_word: καὶ
  chosen: and
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Coordinates the two clauses. In English, because the first clause is rendered concessively, the second clause is best expressed as the main clause 'you do not believe.'
- source_word: οὐ πιστεύετε
  chosen: you do not believe
  alternatives:
  - you are not believing
  - you do not have faith
  lexicon: BDAG
  rationale: Present active indicative expresses their ongoing unbelief. 'Believe' is the standard rendering for πιστεύω in Johannine usage and is preferable to the more nominal 'have faith' here.
