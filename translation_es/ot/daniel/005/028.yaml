translation:
  language: es
  text: 'Peres: tu reino ha sido dividido y dado a los medos y persas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «Peres» como transliteración del término arameo inscrito para mantener el juego de palabras con «dividido» y con «persas»; así se preserva la fuerza interpretativa del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרֵס
  english_pob_choice: Peres
  chosen_spanish: Peres
  alternatives_spanish:
  - Dividido
  - Una división
  lexicon: HALOT
  rationale: Se conserva la transliteración del término inscrito, porque Daniel interpreta precisamente la palabra escrita y el texto depende del juego de palabras con el verbo siguiente y con «Persia/persas» al final.
- source_word: פְּרִיסַת
  english_pob_choice: has been divided
  chosen_spanish: ha sido dividido
  alternatives_spanish:
  - está dividido
  - ha sido partido
  lexicon: HALOT
  rationale: El valor verbal expresa una división ya decretada y efectiva; el perfecto en español con «ha sido» comunica bien ese estado consumado sin perder la fuerza judicial del anuncio.
- source_word: מַלְכוּתָךְ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu dominio real
  lexicon: HALOT
  rationale: «Reino» es la forma más natural en español para el ámbito o dominio bajo Beltsasar, y evita trasladar el énfasis al cargo abstracto de realeza.
- source_word: וִיהִיבַת
  english_pob_choice: and given
  chosen_spanish: y dado
  alternatives_spanish:
  - y entregado
  - y concedido
  lexicon: HALOT
  rationale: Se mantiene la idea de transferencia pasiva/resultativa del reino a nuevos poseedores; «dado» es breve y fiel al sentido del contexto.
- source_word: לְמָדַי
  english_pob_choice: to the Medes
  chosen_spanish: a los medos
  alternatives_spanish:
  - a Media
  - al medo
  lexicon: HALOT
  rationale: 'Se traduce el gentilicio como pueblo: «medos», en paralelo con «persas», que es el referentepolítico-histórico más claro para el lector.'
- source_word: וּפָרָס
  english_pob_choice: and Persians
  chosen_spanish: y persas
  alternatives_spanish:
  - y Persia
  - y paras
  lexicon: HALOT
  rationale: Se conserva el grupo étnico en español para reflejar el referente histórico; la transliteración no es necesaria aquí porque la transliteración de פְּרֵס ya quedó preservada en el primer miembro de la inscripción.
translation_notes:
  revision_awareness: 'El texto coincide con la lectura final más reciente del expediente inglés, que no requirió cambios. Se mantuvo la equivalencia óptima: transliteración del término inscrito, verbo en pasiva/resultativa consumada y gentilicios históricos en plural.'
  spanish_consistency_notes:
  - Se usa «Peres» como forma transliterada en español por la misma razón auditada en el POB inglés.
  - «Medos» y «persas» se mantienen como pueblos, no como topónimos, para seguir el paralelismo del original.
  - Se evitó «SEÑOR» u otros sustitutos porque no interviene el Tetragrámaton en este versículo.
