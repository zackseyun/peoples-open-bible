    text: 'O: «la descendencia de tu cuerpo». Hebreo, literalmente: «el fruto de tu vientre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y en la aflicción» o «y en la angustia extrema».'
    reason: lexical_alternative
  revision_rationale: Se corrige el error grave 'siega' por 'sitio', se mejora la naturalidad de 'tus hijos e hijas', se ajusta el tiempo verbal a 'te dio' para reflejar mejor la cláusula relativa hebrea, y se reubica la nota [b] al término correspondiente a וּבְמָצוֹק, en línea con el audit trail inglés. Se mantiene 'Yahvé' según la política del proyecto y 'carne' por su fuerza literal.
