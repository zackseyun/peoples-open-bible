translation:
  language: es
  text: Pero sobre los piadosos está la misericordia de Yahvé, y sobre los que lo temen está su misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁσίους
  english_pob_choice: godly
  chosen_spanish: piadosos
  alternatives_spanish:
  - fieles
  - devotos
  lexicon: LSJ
  rationale: En el contexto de los Salmos de Salomón, ὅσιοι funciona como un grupo con identidad religiosa concreta, más cercano a 'piadosos' o 'fieles' que a 'santos'. 'Piadosos' conserva el matiz devocional y la lectura socio-religiosa indicada por la revisión, sin introducir connotaciones eclesiales posteriores.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia constante
  lexicon: LSJ
  rationale: '''Misericordia'' es la correspondencia directa y natural en español para ἔλεος en este tipo de formulación bíblica. Mantiene la repetición del término en ambos miembros de la frase y el tono de alianza sin ampliar el sentido.'
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: default project terminology
  rationale: Aunque el griego dice Κυρίου, el proyecto exige 'Yahvé' cuando el contexto remite al nombre divino. Aquí la construcción expresa la misericordia del Dios de Israel; por ello se evita el encubrimiento con 'Señor' y se mantiene el nombre divino explícito.
- source_word: φοβουμένους
  english_pob_choice: those who fear him
  chosen_spanish: los que lo temen
  alternatives_spanish:
  - los que lo reverencian
  - los reverentes
  lexicon: LSJ
  rationale: '''Los que lo temen'' preserva el idioma bíblico fuerte del temor de Dios. ''Reverenciar'' suavizaría la tensión teológica que el griego conserva entre reverencia y temor, y no refleja tan bien el valor tradicional del participio.'
theological_decisions:
- issue: Si suavizar el lenguaje de temor hacia una fórmula de reverencia
  english_pob_reading: those who fear him
  chosen_spanish_reading: los que lo temen
  alternative_spanish_readings:
  - los que lo reverencian
  rationale: El griego conserva la formulación bíblica clásica de temor de Dios. En español, 'los que lo temen' mantiene esa tensión teológica sin resolverla hacia una mera actitud de respeto, y por eso es más fiel al peso del texto.
  doctrine_reference: Preservar la tensión bíblica entre temor reverente y temor real ante Dios.
translation_notes:
  revision_awareness: La revisión reciente favoreció 'godly' por naturalidad formal frente a 'pious'; en español, 'piadosos' respeta mejor la etiqueta grupal de ὅσιοι en este libro que un adjetivo más genérico como 'devotos', y mantiene la distinción respecto de ἅγιοι sin perder claridad.
  spanish_consistency_notes:
  - 'Se mantiene la estructura paralela del griego: ''sobre ... está ..., y sobre ... está ...''.'
  - Se usa 'Yahvé' para Κυρίου conforme al estándar del proyecto y no como simple calco de 'Lord'.
  - No se añade nota de pie porque el texto español no introduce una ambigüedad nueva que requiera anclaje explícito.
