    rationale: Aunque comprensible, en español bíblico natural la relativa se expresa mejor como «que habló» o «que él habló», evitando una construcción poco idiomática.
  - severity: low
    issue: «Así que volvieron» añade un matiz consecutivo algo más fuerte de lo necesario.
    rationale: El hebreo solo marca secuencia narrativa; «Entonces volvieron» o «Y volvieron» suena más neutro y natural en español.
