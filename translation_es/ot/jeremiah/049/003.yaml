translation:
  language: es
  text: Lamenta, Heshbón, porque Ai ha sido devastada. Clamen, hijas de Rabbá; vístanse de cilicio, hagan duelo y vaguen entre las murallas, porque su rey[a] irá al exilio, junto con sus sacerdotes y sus oficiales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Milcom» o «Malcam», tomando el hebreo como el nombre del dios ammonita en lugar de «su rey».
    reason: alternative_reading
lexical_decisions:
- source_word: הֵילִילִי
  english_pob_choice: Wail
  chosen_spanish: Lamenta
  alternatives_spanish:
  - Gime
  - Aúlla
  - Haz duelo
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa lamento intenso. «Lamenta» conserva el valor de duelo y suena natural y digno en español bíblico contemporáneo.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Heshbón
  alternatives_spanish:
  - Jesbón
  lexicon: Nombre propio
  rationale: Topónimo transliterado de forma clara y reconocible en español.
- source_word: שֻׁדְּדָה
  english_pob_choice: is devastated
  chosen_spanish: ha sido devastada
  alternatives_spanish:
  - ha sido destruida
  - ha sido saqueada
  lexicon: HALOT
  rationale: El pasivo comunica el resultado de la devastación sin restringir el matiz a destrucción total o saqueo בלבד.
- source_word: עַי
  english_pob_choice: Ai
  chosen_spanish: Ai
  alternatives_spanish:
  - la ciudad de Ai
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según el texto masorético.
- source_word: צְעַקְנָה
  english_pob_choice: Cry out
  chosen_spanish: Clamen
  alternatives_spanish:
  - Griten
  - Exclamen
  lexicon: HALOT
  rationale: Imperativo femenino plural de clamor en contexto de lamentación. «Clamen» mantiene el tono exhortativo y luctuoso.
- source_word: בְּנוֹת רַבָּה
  english_pob_choice: daughters of Rabbah
  chosen_spanish: hijas de Rabbá
  alternatives_spanish:
  - mujeres de Rabbá
  - hijas de Rabá
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «hijas de» como personificación de las mujeres o habitantes de la ciudad, sin deshacer la metáfora.
- source_word: חֲגֹרְנָה שַׂקִּים
  english_pob_choice: Put on sackcloth
  chosen_spanish: vístanse de cilicio
  alternatives_spanish:
  - cíñanse de cilicio
  - pónganse cilicio
  lexicon: HALOT
  rationale: «Vestirse de cilicio» es una equivalencia natural en español para la acción ritual de duelo, manteniendo la fuerza cultural del gesto.
- source_word: סְפֹדְנָה
  english_pob_choice: mourn
  chosen_spanish: hagan duelo
  alternatives_spanish:
  - lloren
  - laméntense
  lexicon: HALOT
  rationale: «Hagan duelo» expresa el lamento funerario/disasterario con mayor precisión que un simple «lloren».
- source_word: וְהִתְשׁוֹטַטְנָה
  english_pob_choice: wander about
  chosen_spanish: vaguen
  alternatives_spanish:
  - anden errantes
  - deambulen
  lexicon: HALOT
  rationale: El verbo refleja movimiento agitado y sin rumbo; «vaguen» conserva esa inquietud sin volverse demasiado técnico.
- source_word: בַּגְּדֵרוֹת
  english_pob_choice: among the walls
  chosen_spanish: entre las murallas
  alternatives_spanish:
  - entre los muros
  - junto a las cercas
  lexicon: HALOT
  rationale: En contexto urbano de lamento, «murallas» comunica mejor la imagen de la ciudad sitiada o en ruina que un término más genérico como «cercas».
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: La puntuación masorética permite leerlo como «su rey», y esa lectura armoniza con los posesivos siguientes. Se mantiene la tensión con la lectura divina en nota.
- source_word: בַּגּוֹלָה יֵלֵךְ
  english_pob_choice: will go into exile
  chosen_spanish: irá al destierro
  alternatives_spanish:
  - irá al exilio
  - será llevado al cautiverio
  lexicon: HALOT
  rationale: «Ir al destierro» reproduce el idioma de deportación con buena naturalidad en español y evita una calca pesada.
- source_word: כֹּהֲנָיו
  english_pob_choice: his priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes del culto
  lexicon: HALOT
  rationale: Se traduce literalmente en español; si se leyera Milcom, el referente cultual seguiría siendo inteligible.
- source_word: וְשָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  lexicon: HALOT
  rationale: «Oficiales» conserva la amplitud semántica de líderes/funcionarios sin imponer una jerarquía más específica que el hebreo no exige.
theological_decisions:
- issue: 'Lectura de מַלְכָּם: rey humano o deidad ammonita Milcom/Malcam'
  english_pob_reading: their king
  chosen_spanish_reading: su rey
  alternative_spanish_readings:
  - Milcom
  - Malcam
  rationale: La vocalización masorética favorece la lectura posesiva, y el paralelo con «sus sacerdotes y sus oficiales» la hace coherente. Sin embargo, el consonántico también admite la deidad ammonita, por lo que la ambigüedad se preserva mediante nota.
  doctrine_reference: Translation philosophy §3 (preservar tensiones textuales y teológicas documentadas)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. No se añadieron notas sin ancla ni marcadores reutilizados.
  spanish_consistency_notes:
  - Se mantuvo «Heshbón» como transliteración estable del topónimo.
  - Se usó «cilicio» para el término ritual de duelo, coherente con el registro bíblico en español.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni un caso directo de κύριος.
  - Se preservó la ambigüedad de מַלְכָּם con una nota anclada en el texto.
