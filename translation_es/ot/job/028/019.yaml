translation:
  language: es
  text: El topacio de Cus[a] no puede igualarla; no se puede valorar en oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “crisólito de Cus” o “peridoto de Cus”; la identificación exacta de פִּטְדָה es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַרְכֶנָּה
  english_pob_choice: cannot equal it
  chosen_spanish: no se le puede comparar
  alternatives_spanish:
  - no puede igualarla
  - no puede compararse con ella
  lexicon: HALOT
  rationale: El verbo ערך expresa aquí comparación en valor o rango. En español, ‘comparar’ comunica con naturalidad la idea de equivalencia imposible; la construcción impersonal mantiene el tono sapiencial y la referencia al objeto implícito del contexto. Se conserva el género femenino de ‘ella’/‘la’ como posible referencia a la sabiduría, pero el texto evita forzarlo donde el español puede sonar más fluido con ‘le’.
- source_word: פִּטְדַת כּוּשׁ
  english_pob_choice: the topaz of Cush
  chosen_spanish: el topacio de Cus
  alternatives_spanish:
  - el crisólito de Cus
  - el peridoto de Cus
  lexicon: HALOT
  rationale: ‘Topacio’ sigue la opción tradicional y reconocible, mientras que la identificación exacta de פִּטְדָה permanece incierta. ‘Cus’ translitera el topónimo según la política del proyecto. La nota preserva las alternativas minerales porque el término hebreo no permite precisión taxonómica segura.
- source_word: בְּכֶתֶם טָהוֹר
  english_pob_choice: in pure gold
  chosen_spanish: en oro puro
  alternatives_spanish:
  - con oro puro
  - frente a oro puro
  lexicon: HALOT
  rationale: El hebreo usa ב con valor instrumental o de valoración. En español, ‘en oro puro’ reproduce bien la idea de tasación/comparación sin resultar forzado. ‘Oro puro’ conserva el matiz de כֶּתֶם טָהוֹר como metal fino y refinado.
- source_word: תְסֻלֶּה
  english_pob_choice: it cannot be valued
  chosen_spanish: no se puede valorar
  alternatives_spanish:
  - no se puede tasar
  - no se puede apreciar
  lexicon: HALOT
  rationale: El verbo apunta a evaluación o fijación de precio, no solo a pesar físicamente. ‘Valorar’ mantiene el paralelo con el primer hemistiquio y expresa bien la imposibilidad de ponerle precio a la sabiduría.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con la lectura auditada en inglés; no se requieren revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparece el tetragrámaton; aquí no aplica.
  - ‘Cus’ se translitera de forma consistente con nombres propios bíblicos del proyecto.
  - La estructura paralela de los dos hemistiquios se conserva en español con una negación comparativa y otra de valoración.
