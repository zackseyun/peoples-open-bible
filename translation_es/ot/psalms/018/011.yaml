translation:
  language: es
  text: Y cabalgó sobre un querubín y voló; se lanzó veloz[a] sobre las alas del viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se precipitó» / «se abalanzó» para el verbo raro aquí traducido «se lanzó veloz».
    reason: lexical_alternative
  - marker: b
    text: El hebreo רוּחַ puede significar «viento», «aliento» o «espíritu»; aquí «viento» encaja mejor con la imaginería de tormenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכַּב
  english_pob_choice: rode
  chosen_spanish: cabalgó
  alternatives_spanish:
  - montó
  - anduvo a caballo
  lexicon: HALOT
  rationale: El qal wayyiqtol de רכב expresa la acción de montar o cabalgar. En español, "cabalgó" conserva la imagen dinámica y poética mejor que un calco más plano como "montó".
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición marca posición de apoyo o montura. "Sobre" reproduce bien la relación espacial en español poético y es natural en este contexto.
- source_word: כְּרוּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  - ser celestial alado
  lexicon: HALOT
  rationale: En español bíblico, "querubín" es el equivalente establecido y comprensible para el singular de כְּרוּב. Mantiene la concreción de la imagen sin explicarla en exceso.
- source_word: וַיָּעֹף
  english_pob_choice: flew
  chosen_spanish: voló
  alternatives_spanish:
  - echó a volar
  - planeó
  lexicon: HALOT
  rationale: El verbo עוף significa volar. "Voló" es la correspondencia directa y preserva el paralelismo con el movimiento rápido del verso.
- source_word: וַיֵּדֶא
  english_pob_choice: sped
  chosen_spanish: se lanzó veloz
  alternatives_spanish:
  - se precipitó
  - se deslizó
  - danzó velozmente
  lexicon: HALOT
  rationale: Este verbo raro comunica movimiento rapidísimo, paralelo a "voló". "Se lanzó veloz" capta la rapidez sin decidir de forma innecesaria entre "darted", "swooped" o una lectura de aparición.
- source_word: כַּנְפֵי
  english_pob_choice: wings of
  chosen_spanish: alas de
  alternatives_spanish:
  - alas del
  - plumas de
  lexicon: HALOT
  rationale: El constructo de כָּנָף se vierte naturalmente como "alas de". En español, "alas del viento" fluye con naturalidad y conserva la figura poética.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: En este contexto de teofanía tormentosa, רוּחַ significa "viento". Se mantiene la lectura meteorológica que mejor encaja con la imagen poética del verso.
theological_decisions:
- issue: Imagen concreta de Dios montando sobre un querubín
  english_pob_reading: Retain the concrete poetic image of God riding on a cherub.
  chosen_spanish_reading: Mantener la imagen concreta de Yahvé cabalgando sobre un querubín.
  alternative_spanish_readings:
  - Tratar al querubín como metáfora de nubes de tormenta
  - Convertir la imagen en una referencia genérica a seres angelicales
  rationale: El hebreo presenta una teofanía poética concreta. La traducción debe preservar la imagen sin desmitologizarla ni imponer una explicación cosmológica que el texto no explicita.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de רוּחַ en la expresión final
  english_pob_reading: Render רוּחַ as 'wind' in the main text.
  chosen_spanish_reading: Traducir רוּחַ como "viento" en el texto principal.
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto inmediato es de tormenta y movimiento aéreo; "viento" es la lectura más natural y transparente. Las otras posibilidades se conservan como alternativas léxicas, pero son menos probables aquí.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No revision was needed in the latest review pass; the English POB audit trail shows high agreement and the current wording remains stable.
  spanish_consistency_notes:
  - Se preserva Yahvé como nombre divino cuando el verso alude al sujeto tácito del salmo, en coherencia con el estándar del proyecto.
  - Se mantiene el tono poético y la concreción imagética sin añadir explicación interpretativa al texto principal.
  - '"Querubín" y "viento" conservan el registro bíblico y la transparencia semántica requerida.'
