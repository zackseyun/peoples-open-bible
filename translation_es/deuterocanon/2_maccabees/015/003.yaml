- from: Pero aquel hombre tres veces maldito preguntó si hay en el cielo un gobernante que mandó observar el día del sábado[a].
  to: Pero aquel hombre tres veces maldito preguntó si hay en el cielo un gobernante que ordenó guardar el sábado[a].
