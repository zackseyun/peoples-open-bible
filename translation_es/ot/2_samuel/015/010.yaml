    issue: La nota [a] está anclada en «Israel[a]» en lugar de en «cuerno».
    rationale: La nota explica שׁוֹפָר, no «Israel». Según las instrucciones, el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: La nota dice «del cuerno de shofar».
    rationale: Esa expresión es infeliz y redundante en español; «shofar» ya nombra el instrumento. Debe decir «el sonido del shofar» o «del cuerno de carnero».
