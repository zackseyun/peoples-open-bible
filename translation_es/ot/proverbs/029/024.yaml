  text: חוֹלֵ֣ק עִם גַּ֭נָּב שׂוֹנֵ֣א נַפְשׁ֑/וֹ אָלָ֥ה יִ֝שְׁמַ֗ע וְ/לֹ֣א יַגִּֽיד־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/029/024.yaml
  text: Whoever shares with a thief hates his own life[b][a]; he hears a curse and does not disclose it.
  footnotes:
  - marker: a
    text: Or 'hears a curse' or 'hears an adjuration.' The Hebrew term can refer to an oath that invokes a curse, likely in a legal setting where a witness is bound to speak.
    reason: lexical_alternative
  - marker: b
    text: That is, one who is complicit with a thief harms himself by refusing to disclose what he knows.
    reason: cultural_note
