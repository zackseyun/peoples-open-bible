lexical_decisions:
- source_word: בְדַעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - no con conocimiento
  - sin saber
  lexicon: HALOT
  rationale: La construcción con ב + sustantivo abstracto expresa modo o condición; en español, «sin conocimiento» comunica de forma natural la carencia que la POB inglesa expresó con «without knowledge».
- source_word: יְדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - está hablando
  - hablará
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como presente evaluativo general. «Habla» conserva el valor verbal y suena natural en español.
- source_word: דְבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - lo que dice
  lexicon: HALOT
  rationale: דברים puede referirse a palabras o declaraciones; «sus palabras» es el equivalente más directo y claro en español.
- source_word: בְהַשְׂכֵּיל
  english_pob_choice: without understanding
  chosen_spanish: carecen de entendimiento
  alternatives_spanish:
  - sin entendimiento
  - sin inteligencia
  - sin sabiduría
  lexicon: HALOT
  rationale: 'Para evitar una repetición excesivamente literal de «sin» y mantener la paralela del hemistiquio, se expresa la idea como una carencia: «carecen de entendimiento». Conserva el contenido léxico de שכל sin forzar una calca poco idiomática.'
- source_word: לֹא
  english_pob_choice: without
  chosen_spanish: carecen de
  alternatives_spanish:
  - no son con
  - no tienen
  lexicon: HALOT
  rationale: Aunque לֹא es literalmente «no», el paralelismo hebreo en español se entiende mejor con una formulación de carencia. «Carecen de» preserva el sentido negativo de la construcción sin perder naturalidad.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de revisión fue alto y sin objeciones. La presente redacción sigue de cerca el sentido hebreo confirmado por la POB inglesa, ajustando la sintaxis para un español natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo «Job» como nombre propio.
  - Se evitó «SEÑOR» o lenguaje de sustitución divina porque el versículo no contiene el Tetragrámaton.
  - «conocimiento» y «entendimiento» se usaron como pares semánticos distintos, reflejando el paralelismo hebreo sin colapsarlo en un solo término.
  - La nota al pie conserva la alternativa explícita de la POB inglesa en forma española natural.
