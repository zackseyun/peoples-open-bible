translation:
  language: es
  text: '¡Cuánto menos, cuando dices: «No lo ves»! El caso está delante de él, y debes esperarlo.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y retorcerte ante él»; el verbo hebreo es difícil, y muchos lo entienden aquí como «esperarlo con expectación».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  english_pob_choice: How much less when
  chosen_spanish: ¡Cuánto más, cuando
  alternatives_spanish:
  - Aún más, cuando
  - Y mucho más, cuando
  - Cuánto menos, cuando
  lexicon: HALOT
  rationale: La expresión hebrea introduce un argumento de lo mayor a lo menor. En español, «¡Cuánto más, cuando» conserva ese impulso inferencial/intensificador con naturalidad y sin volverlo meramente concesivo.
- source_word: תֹאמַר
  english_pob_choice: you say
  chosen_spanish: dices
  alternatives_spanish:
  - digas
  - dices tú
  - declares
  lexicon: HALOT
  rationale: Es una segunda persona singular simple; «dices» reproduce el acto de habla directo sin añadir matices no requeridos por el hebreo.
- source_word: לֹא תְשׁוּרֶנּוּ
  english_pob_choice: You do not see him
  chosen_spanish: No lo ves
  alternatives_spanish:
  - No lo miras
  - No lo percibes
  - No lo contemplas
  lexicon: HALOT
  rationale: El verbo שׁוּר apunta a ver/observar/percibir. En contexto, el lamento es la aparente invisibilidad de Dios para Job; «No lo ves» comunica bien esa queja sin sobrecargar el verso.
- source_word: דִּין
  english_pob_choice: the case
  chosen_spanish: el caso
  alternatives_spanish:
  - la causa
  - el juicio
  - el litigio
  lexicon: HALOT
  rationale: Se trata de un asunto forense o legal. «El caso» mantiene el sentido jurídico en un español claro y actual.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La locución marca localización/proximidad jurídica. «Delante de él» conserva la imagen de un asunto puesto ante Dios.
- source_word: וּתְחוֹלֵל לוֹ
  english_pob_choice: and you must wait for him
  chosen_spanish: y debes esperar por él
  alternatives_spanish:
  - y debes aguardar por él
  - y has de esperar por él
  - y debes retorcerte ante él
  lexicon: HALOT
  rationale: El hebreo es difícil y admite varias lecturas. La línea principal sigue la comprensión contextual de espera confiada/exhortativa que adopta el audit trail inglés. «Debes esperar por él» preserva el tono imperativo implícito sin cerrar la ambigüedad del verbo.
theological_decisions:
- issue: Sentido de la queja sobre la invisibilidad de Dios
  english_pob_reading: Elihu tells Job that even if God is not presently seen, Job's case still stands before God and Job should wait for him.
  chosen_spanish_reading: Eliú le dice a Job que, aunque no vea a Dios, su caso sigue delante de él y debe esperar su acción.
  alternative_spanish_readings:
  - Eliú dice que Dios no ve el caso
  - Eliú afirma que Job debe aferrarse a Dios sin reclamar
  rationale: La lectura principal evita convertir el versículo en una afirmación doctrinal sobre la ignorancia divina. El peso está en la queja humana sobre no ver a Dios y en la exhortación a esperar su respuesta.
  doctrine_reference: Consistencia con la soberanía y la justicia divina; preservar la tensión del texto
- issue: Valor de la última cláusula hebrea
  english_pob_reading: The final clause means 'writhe before him' rather than 'wait for him' in the footnote, while the main text uses 'wait for him'.
  chosen_spanish_reading: La línea principal traduce la cláusula como una exhortación a esperar, manteniendo una nota para la alternativa más literal.
  alternative_spanish_readings:
  - retorcerte ante él
  - girar/rodar ante él
  - anhelarlo con impaciencia
  rationale: El verbo es raro y semánticamente difícil. Dado el contexto forense del versículo, la espera resulta la lectura más coherente; aun así, la nota conserva la alternativa más literal para no borrar la tensión lexical.
  doctrine_reference: Primacía del dato léxico y del contexto inmediato
translation_notes:
  revision_awareness: Se revisó el contexto original y la auditoría inglesa; no hubo revisiones aplicadas en la última pasada, y el consenso general fue de alta concordancia con solo ajustes menores.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito por el pronombre «él», conforme al hebreo y al flujo del versículo.
  - Se evitó «SEÑOR» porque el texto hebreo aquí no usa el Tetragrámaton como término directo del versículo.
  - «El caso» conserva el matiz jurídico de דִּין en un registro natural para lectura pública.
  - La nota al pie preserva la dificultad léxica de וּתְחוֹלֵל sin forzar una sola solución.
