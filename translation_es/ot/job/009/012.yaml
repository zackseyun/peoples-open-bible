translation:
  language: es
  text: 'Mira[a], si él arrebata, ¿quién podrá hacerlo volver[b]? ¿Quién puede decirle: «¿Qué haces?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si él se apodera» o «si él se lleva». El verbo hebreo sugiere una toma súbita y enérgica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿quién podrá traerlo de vuelta?». El hebreo significa literalmente «hacer que vuelva».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. «Mira» conserva la vivacidad del inglés POB «Look» y suena natural en español moderno; «He aquí» sería más arcaico.
- source_word: יַחְתֹּף
  english_pob_choice: snatches away
  chosen_spanish: arrebata
  alternatives_spanish:
  - arrebata y se lleva
  - despoja
  - secuestra
  lexicon: HALOT
  rationale: El verbo expresa tomar de manera súbita y fuerte. «Arrebata» comunica bien la brusquedad del acto sin añadir una paráfrasis excesiva; «se lleva» ayudaría al matiz de remoción, pero puede sonar más débil por sí solo.
- source_word: יְשִׁיבֶנּוּ
  english_pob_choice: turn him back
  chosen_spanish: hacerlo volver
  alternatives_spanish:
  - traerlo de vuelta
  - devolverlo
  - hacer que regrese
  lexicon: HALOT
  rationale: La forma causativa de שוב apunta a «hacer volver / causar que regrese». «Hacerlo volver» refleja esa causalidad y mantiene la pregunta retórica sobre la imposibilidad de revertir la acción.
- source_word: מִי
  english_pob_choice: who can
  chosen_spanish: ¿quién podrá?
  alternatives_spanish:
  - ¿quién puede?
  - ¿quién sería capaz de?
  lexicon: HALOT
  rationale: En este contexto interrogativo, la fuerza es de incapacidad. «¿Quién podrá?» suena natural y conserva la fuerza retórica del hebreo y del inglés POB.
- source_word: יֹאמַר אֵלָיו
  english_pob_choice: say to him
  chosen_spanish: decirle
  alternatives_spanish:
  - hablarle
  - protestarle
  - responderle
  lexicon: HALOT
  rationale: Es un ruego directo al destinatario implícito en contexto; «decirle» mantiene la sencillez del original sin introducir una interpretación extra como «protestarle».
- source_word: מַה תַּעֲשֶׂה
  english_pob_choice: What are you doing?
  chosen_spanish: ¿Qué haces?
  alternatives_spanish:
  - ¿Qué estás haciendo?
  - ¿Qué haces tú?
  lexicon: HALOT
  rationale: La pregunta desafiante funciona naturalmente en español como «¿Qué haces?». Es breve, directa y conserva el tono de reprensión o desafío sin alargar la frase.
theological_decisions:
- issue: Pronombres de tercera persona para Dios en el discurso poético
  english_pob_reading: 'Render the pronouns personally as referring to God: ''he... him.'''
  chosen_spanish_reading: 'Conservar los pronombres personales: «él... le / lo».'
  alternative_spanish_readings:
  - neutralizar a «eso... lo»
  - reformular impersonalmente
  rationale: El contexto inmediato presenta la acción irresistible de Dios y la respuesta imposible del ser humano. Mantener la referencia personal evita diluir la soberanía divina expresada en el verso y sigue la lectura del POB en inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Job 9:12 y el audit trail inglés del POB. No hubo revisiones aplicadas en la fuente inglesa más reciente; la cross-check indicó acuerdo alto con observaciones menores, principalmente de matiz léxico.
  spanish_consistency_notes:
  - Se usa «Dios» de forma implícita en la referencia pronominal del contexto, sin sustituir el pronombre del verso.
  - Se mantuvo un registro natural y reverente, evitando calcos como «volverlo de nuevo» o «hacer que regrese» cuando una forma más idiomática preserva mejor el valor retórico.
  - El marcador [a] se ancla en la primera cláusula para reflejar la alternativa léxica documentada del verbo hebreo.
