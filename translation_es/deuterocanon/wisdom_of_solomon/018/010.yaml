revisions:
- from: Pero el grito discordante de los enemigos resonó de vuelta[a], y el lamento lastimero por los niños que eran llorados fue llevado por todas partes.
  to: Pero el grito discordante de los enemigos resonó[a], y el lamento lastimero por los niños que eran llorados se extendía por todas partes.
  rationale: Se ajusta «resonó de vuelta» a «resonó» para evitar un calco poco natural, manteniendo el efecto acústico de ἀντήχει. Se cambia «fue llevado por todas partes» por «se extendía por todas partes» para reflejar de manera más idiomática la difusión expresada por διεφέρετο. Se conserva «niños» para no estrechar παίδων más allá del griego y se mantiene la nota de alternativa estructural.
