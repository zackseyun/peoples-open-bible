translation:
  language: es
  text: Huya del pecado como de la presencia de una serpiente[b][a]; porque si te acercas, te morderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «huye del pecado como de la faz/presencia de una serpiente». La imagen griega es muy concreta; «serpiente» también podría verterse «víbora» o «serpiente venenosa», pero el griego solo exige el animal, no una especie precisa.'
    reason: lexical_alternative
  - marker: b
    text: La línea hebrea conservada en la fuente proporcionada no coincide con el griego de este versículo y parece reflejar un desajuste de ubicación textual; por eso la traducción principal sigue el testimonio griego aquí.
    reason: textual_variant
lexical_decisions:
- source_word: φεῦγε / ἀπὸ ἁμαρτίας
  english_pob_choice: Flee from sin
  chosen_spanish: Huya del pecado
  alternatives_spanish:
  - Aléjate del pecado
  - Huye del pecado
  lexicon: BDAG
  rationale: El griego exige una acción urgente de escape; en español, «huya» preserva el tono imperativo y de advertencia. «Pecado» mantiene el peso moral y teológico de ἁμαρτίας sin suavizarlo.
- source_word: ὡς ἀπὸ προσώπου ὄφεως
  english_pob_choice: as from the face of a snake
  chosen_spanish: como de la presencia de una serpiente
  alternatives_spanish:
  - como de la cara de una serpiente
  - como si estuvieras ante una serpiente
  lexicon: BDAG / LSJ
  rationale: «προσώπου» conserva la imagen concreta de la cercanía directa; en español, «presencia» transmite esa inmediatez de modo natural y reverente. «Serpiente» mantiene el animal de la metáfora; «víbora» sería más específico, pero el griego no obliga a esa precisión.
- source_word: ἐὰν ... προσέλθῃς
  english_pob_choice: if you come near it
  chosen_spanish: si te acercas
  alternatives_spanish:
  - si te aproximas
  - si llegas cerca
  lexicon: BDAG
  rationale: προσέρχομαι aquí significa acercarse. «Si te acercas» es idiomático en español y conserva la idea de proximidad peligrosa.
- source_word: δήξεταί σε
  english_pob_choice: it will bite you
  chosen_spanish: te morderá
  alternatives_spanish:
  - te picará
  - te herirá
  lexicon: BDAG / LSJ
  rationale: El verbo denota morder de manera concreta. «Te morderá» mantiene la imagen vívida y la consecuencia física del símil.
theological_decisions:
- issue: Base textual en una discrepancia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The translation follows the Greek witness; the Hebrew line in the provided source appears mismatched to this verse.
  chosen_spanish_reading: La traducción sigue el testimonio griego; la línea hebrea provista parece no corresponder a este versículo.
  alternative_spanish_readings:
  - Intentar una traducción del hebreo de Kahana tal como está dado
  - Fusionar ambas lecturas en una paráfrasis
  rationale: La evidencia aportada para este versículo muestra una desalineación entre el hebreo extante y el griego de Sirácida 21:2. Para no inventar una armonización, el texto español se apoya en el griego paralelo, mientras se reconoce la discrepancia de forma transparente.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio original más estable disponible y declarar honestamente la incertidumbre textual'
- issue: Conservar la fuerza moral de «ἁμαρτίας» sin diluirla
  english_pob_reading: sin
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - culpa
  - maldad
  - transgresión
  rationale: «Pecado» es la equivalencia más directa y estable para ἁμαρτία en español bíblico. Otras opciones desplazan el alcance moral o legal del término y debilitan la imagen de huida urgente.
  doctrine_reference: BDAG; uso bíblico estándar de ἁμαρτία
translation_notes:
  revision_awareness: La versión inglesa previa fue revisada para este versículo debido a una desalineación entre el hebreo de Kahana provisto y el paralelo griego. El texto español sigue la decisión final de usar el griego como base textual para esta unidad, sin borrar la tensión documental.
  spanish_consistency_notes:
  - Se conserva un registro transparente de la variante textual con nota b, sin intentar armonizar artificialmente el hebreo y el griego.
  - Se mantiene «pecado» para ἁμαρτία y no se sustituye por un término moral más débil.
  - «Serpiente» se usa como equivalente natural y amplio de ὄφις; la nota a preserva la alternativa «víbora» sin imponerla en el texto principal.
  - El imperativo singular «huya» refleja la forma exhortativa del griego y funciona en registro bíblico formal en español.
