translation:
  language: es
  text: Fui criado en pañales y con cuidados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con atenciones» o «con preocupaciones». El griego puede referirse al cuidado, la atención o la preocupación ansiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σπαργάνοις
  english_pob_choice: in swaddling cloths
  chosen_spanish: en pañales
  alternatives_spanish:
  - envuelto en mantillas
  - en paños de envolver
  lexicon: LSJ
  rationale: σπάργανα designa los lienzos o paños usados para envolver a un bebé. En español, «pañales» comunica de forma natural la imagen infantil y conserva la concreción sin sonar forzado. Otras opciones como «mantillas» o «paños de envolver» son posibles, pero menos idiomáticas aquí.
- source_word: ἀνετράφην
  english_pob_choice: I was brought up
  chosen_spanish: fui criado
  alternatives_spanish:
  - fui educado
  - fui criado y alimentado
  - fui levantado
  lexicon: BDAG/LSJ
  rationale: El aoristo pasivo indica haber sido criado o alimentado desde la infancia. «Fui criado» es breve, natural en español y mantiene la pasividad del verbo griego sin añadir matices educativos que no están explícitos en el texto.
- source_word: φροντίσιν
  english_pob_choice: with cares
  chosen_spanish: con cuidados
  alternatives_spanish:
  - con preocupaciones
  - con atenciones
  - con afanes
  lexicon: LSJ
  rationale: φροντίς puede significar cuidado, atención o preocupación ansiosa. En este contexto de infancia, «cuidados» expresa bien la idea de atención dada por quienes lo crían, sin cerrar indebidamente la tensión entre cuidado diligente y preocupación o esmero.
theological_decisions:
- issue: Sentido de φροντίσιν en el contexto de la infancia
  english_pob_reading: with cares
  chosen_spanish_reading: con cuidados
  alternative_spanish_readings:
  - con preocupaciones
  - con atenciones
  rationale: El texto subraya una infancia plenamente humana. «Cuidados» preserva la concisión del griego y deja abierta la amplitud semántica de φροντίς, sin imponer una glosa más fuerte que el original.
  doctrine_reference: 'Translation philosophy: preserve lexical tension rather than over-resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: La revisión auditada en inglés quedó sin cambios sustantivos; no se detectaron ajustes pendientes en el verso. La versión española sigue la misma resolución principal y conserva la amplitud de φροντίσιν mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «fui criado» para reflejar el pasivo griego y evitar una paráfrasis más interpretativa.
  - Se evita «Señor» o terminología teológica ajena porque el verso no contiene vocabulario divino.
  - «Cuidados» se usa en sentido de atención/cuidado humano, no como resolución de una ambigüedad doctrinal.
