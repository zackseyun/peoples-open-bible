translation:
  language: es
  text: Le cegó los ojos a Sedequías y lo sujetó con grilletes de bronce para llevarlo a Babilonia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con cadenas de bronce» o «con grillos de bronce».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי צִדְקִיָּהוּ
  english_pob_choice: Zedekiah’s eyes
  chosen_spanish: los ojos de Sedequías
  alternatives_spanish:
  - los ojos de Sedequías
  - los ojos de Sedecías
  lexicon: HALOT
  rationale: La construcción hebrea es un estado constructo con nombre propio; en español, «los ojos de Sedequías» mantiene la concreción del objeto directo. En el texto final, la forma pronominal «le cegó los ojos» evita una repetición torpe y sigue siendo fiel al referente concreto.
- source_word: עִוֵּר
  english_pob_choice: blinded
  chosen_spanish: cegó
  alternatives_spanish:
  - lo cegó
  - le hizo ciego
  - le privó de la vista
  lexicon: HALOT
  rationale: El verbo significa cegar. «Cegó» es directo, natural y suficientemente fuerte en español moderno; conserva la acción física sin añadir explicación interpretativa.
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo apresó
  - lo encadenó
  lexicon: HALOT
  rationale: אָסַר expresa atar o sujetar. «Lo ató» reproduce bien la acción básica y funciona de forma natural con el complemento instrumental que sigue. «Lo encadenó» sería más específico de lo que el verbo por sí solo exige.
- source_word: בַּנְחֻשְׁתַּיִם
  english_pob_choice: with bronze shackles
  chosen_spanish: con grilletes de bronce
  alternatives_spanish:
  - con cadenas de bronce
  - con hierros de bronce
  - con fetters de bronce
  lexicon: HALOT
  rationale: El término designa una forma de restricción de bronce. «Grilletes de bronce» comunica bien la idea de una sujeción metálica concreta, sin obligar a elegir entre cadenas o fetos cuando el hebreo es más general que cualquiera de esos términos.
- source_word: לָבִיא אֹתוֹ בָּבֶלָה
  english_pob_choice: to bring him to Babylon
  chosen_spanish: para llevarlo a Babilonia
  alternatives_spanish:
  - para traerlo a Babilonia
  - para conducirlo a Babilonia
  - a fin de llevarlo a Babilonia
  lexicon: HALOT
  rationale: El infinitivo de propósito con dirección expresa finalidad de movimiento. «Para llevarlo a Babilonia» es natural en español y preserva el sentido teleológico del hebreo sin sobrecargar la frase.
theological_decisions:
- issue: Uso del nombre divino
  english_pob_reading: No aparece el Tetragrámaton ni un sustituto divino en este versículo
  chosen_spanish_reading: No se introduce ninguna forma divina
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El versículo no contiene referencia explícita al nombre divino ni a un título divino que requiera decisión terminológica; por tanto, no se añade nada en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión auditada indica que el texto inglés no requirió cambios y que el control de calidad señaló solo observaciones menores. La versión española sigue de cerca el sentido hebreo y la solución inglesa aprobada, ajustando la idiomaticidad al español sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se evitó la forma tradicional «Sedecías» para mantener coherencia onomástica con el nombre propio en una forma ampliamente reconocible y cercana al hebreo.
  - Se eligió «Babilonia» como destino direccional natural en español, correspondiente al he final hebreo.
  - La nota de pie conserva la alternativa léxica principal del inglés, aunque adaptada a la terminología más comprensible en español.
