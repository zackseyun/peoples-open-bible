translation:
  language: es
  text: Por tanto, ya no verán visiones falsas ni practicarán adivinación[a], y libraré a mi pueblo de sus manos. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tendrán visiones falsas». El hebreo usa el verbo común de «ver» para la experiencia visionaria profética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce con naturalidad la consecuencia lógica del juicio previo y conserva el valor inferencial del hebreo.
- source_word: שָׁוְא
  english_pob_choice: 'false'
  chosen_spanish: falsas
  alternatives_spanish:
  - vanas
  - vacías
  - sin valor
  lexicon: HALOT
  rationale: En este contexto modifica las visiones proféticas y expresa su carácter engañoso o no verdadero; 'falsas' es idiomático en español y preserva la fuerza semántica.
- source_word: תֶחֱזֶינָה
  english_pob_choice: you will ... see
  chosen_spanish: verán
  alternatives_spanish:
  - tendrán visiones
  - contemplarán
  lexicon: HALOT
  rationale: El verbo חזה en contexto profético conserva el sentido de 'ver' una visión; 'verán' mantiene el giro profético sin explicarlo de más.
- source_word: קֶסֶם
  english_pob_choice: divination
  chosen_spanish: adivinación
  alternatives_spanish:
  - sortilegio
  - adivinanzas
  - mancias
  lexicon: HALOT
  rationale: Es el equivalente natural en español para la práctica mântica prohibida por el contexto profético.
- source_word: תִקְסַמְנָה
  english_pob_choice: practice divination
  chosen_spanish: practicarán adivinación
  alternatives_spanish:
  - harán adivinación
  - adivinarán
  lexicon: HALOT
  rationale: El verbo cognado se expresa con una construcción natural en español que conserva la actividad prohibida y evita ambigüedad.
- source_word: עוֹד
  english_pob_choice: anymore
  chosen_spanish: ya no
  alternatives_spanish:
  - nunca más
  - no más
  lexicon: HALOT
  rationale: Marca cese definitivo desde este punto; en español 'ya no' comunica bien la fuerza aspectual sin redundancia.
- source_word: וְהִצַּלְתִּי
  english_pob_choice: I will deliver
  chosen_spanish: libraré
  alternatives_spanish:
  - rescataré
  - salvaré
  lexicon: HALOT
  rationale: En el contexto inmediato de liberación del control opresivo, 'libraré' expresa bien la acción de sacar del poder de alguien.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo propio
  lexicon: HALOT
  rationale: Mantiene la designación pactual directa y sobria del hebreo.
- source_word: מִיֶּדְכֶן
  english_pob_choice: from your hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de vuestro poder
  - de su poder
  lexicon: HALOT
  rationale: Conserva la metáfora hebrea de la mano como poder o control. En español, 'de su mano' suena natural y mantiene la imagen sin explicarla en exceso.
- source_word: וִידַעְתֶּן
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: El valor consecutivo/resultativo se expresa de forma clara con 'Entonces' en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa el nombre propio del pacto. En español del proyecto, 'Yahvé' mantiene la referencia al nombre revelado y evita la sustitución por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Prophetic idiom of חזה with שׁוא
  english_pob_reading: see false visions
  chosen_spanish_reading: verán visiones falsas
  alternative_spanish_readings:
  - tendrán visiones falsas
  - verán engaños
  rationale: Se conserva el lenguaje profético sin convertirlo en una paráfrasis interpretativa. El español permite mantener la tensión entre el acto de 'ver' y la falsedad de lo visto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; optimal equivalence'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que eliminó el redundante 'anymore' tras 'no longer'. Por eso se usa 'ya no' sin añadir otro intensificador final. También se conserva el valor resultativo de la cláusula final con 'Entonces sabrán'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se traduce קֶסֶם con 'adivinación' por ser el término español más transparente y fiel al campo semántico del pasaje.
  - La metáfora 'de su mano' se conserva para reflejar el control/poder implícito en el hebreo.
  - Se usa 'mi pueblo' para עַמִּי sin expansión interpretativa.
