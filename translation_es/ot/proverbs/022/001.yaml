base_translation:
  language: en
  yaml_path: translation/ot/proverbs/022/001.yaml
  text: A name is to be chosen rather than great wealth[c][b][a], and favor is better than silver and gold.
  footnotes:
  - marker: a
    text: Or 'A name is more desirable than great wealth; favor is better than silver and gold.'
    reason: lexical_alternative
