translation:
  language: es
  text: Y a todo el que permanezca[a], en cualquier lugar donde habita, los hombres de su lugar[b] lo apoyen[c] con plata y oro, con bienes y con ganado, junto con la ofrenda voluntaria para la casa de Dios que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dondequiera que resida» o «dondequiera que sojurne».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hombres de su lugar»; esto puede referirse de modo más amplio a los habitantes locales o a los vecinos.'
    reason: lexical_alternative
  - marker: c
    text: O «lo asistan»; el verbo hebreo significa literalmente «levantar/cargar», aquí usado para brindar apoyo práctico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָר
  english_pob_choice: who remains
  chosen_spanish: el que queda
  alternatives_spanish:
  - el que permanece
  - el sobreviviente
  lexicon: HALOT
  rationale: El participio niphal expresa a alguien que queda o es dejado atrás. «El que queda» es natural en español y conserva la idea de estar entre los que no han partido aún para el retorno.
- source_word: מִכָּל הַמְּקֹמוֹת אֲשֶׁר הוּא גָר שָׁם
  english_pob_choice: in any place where he is living
  chosen_spanish: en cualquier lugar donde habita
  alternatives_spanish:
  - de cualquier lugar donde reside
  - dondequiera que more
  lexicon: HALOT
  rationale: גָר puede significar habitar, residir o sojornar. «Habita» comunica bien la residencia ordinaria en español sin perder la amplitud del hebreo.
- source_word: יְנַשְּׂאֻהוּ
  english_pob_choice: let ... support him
  chosen_spanish: lo apoyen
  alternatives_spanish:
  - lo asistan
  - lo sostengan
  - lo carguen
  lexicon: HALOT
  rationale: El verbo literalmente significa «levantar/cargar», pero aquí la acción concreta es proveer ayuda material para el viaje y la restauración. «Lo apoyen» mantiene el sentido práctico sin volverlo demasiado literal o extraño.
- source_word: אַנְשֵׁי מְקֹמוֹ
  english_pob_choice: the men of his place
  chosen_spanish: los hombres de su lugar
  alternatives_spanish:
  - la gente de su lugar
  - sus vecinos
  - los habitantes de su lugar
  lexicon: HALOT
  rationale: El hebreo usa un masculino plural explícito. Se conserva ese rasgo con «los hombres de su lugar», siguiendo la forma marcada del texto base; «su lugar» refleja מְקוֹמוֹ.
- source_word: בְּכֶסֶף וּבְזָהָב
  english_pob_choice: with silver and gold
  chosen_spanish: con plata y oro
  alternatives_spanish:
  - con dinero y oro
  lexicon: HALOT
  rationale: Los términos designan metales preciosos; «plata y oro» es la equivalencia directa y mantiene el paralelismo del hebreo.
- source_word: וּבִרְכוּשׁ
  english_pob_choice: with goods
  chosen_spanish: con bienes
  alternatives_spanish:
  - con posesiones
  - con propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a posesiones o recursos materiales. «Bienes» es una equivalencia amplia, natural y fiel al contexto de contribución.
- source_word: וּבִבְהֵמָה
  english_pob_choice: with livestock
  chosen_spanish: con ganado
  alternatives_spanish:
  - con animales
  - con bestias de carga
  lexicon: HALOT
  rationale: En este contexto, בְהֵמָה alude a animales domésticos o de carga como parte de los recursos entregados. «Ganado» es una forma concisa y comprensible en español.
- source_word: הַנְּדָבָה
  english_pob_choice: the freewill offering
  chosen_spanish: la ofrenda voluntaria
  alternatives_spanish:
  - la ofrenda espontánea
  - la contribución voluntaria
  lexicon: HALOT
  rationale: נְדָבָה designa una contribución hecha de buena voluntad. «Ofrenda voluntaria» comunica bien el carácter libre del don sin añadir matices extra.
- source_word: לְבֵית הָאֱלֹהִים
  english_pob_choice: for the house of God
  chosen_spanish: para la casa de Dios
  alternatives_spanish:
  - para la casa de Dios
  - para el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «casa de Dios» en vez de sustituirla por «templo», para conservar la formulación del original y su tono cultual específico.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se halla en Jerusalén
  - que está en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa localiza la casa de Dios. «Que está en Jerusalén» es claro y fiel al hebreo.
theological_decisions:
- issue: Preservación de la expresión cultual «casa de Dios»
  english_pob_reading: for the house of God
  chosen_spanish_reading: para la casa de Dios
  alternative_spanish_readings:
  - para el templo de Dios
  - para la casa de Yahvé
  rationale: El hebreo dice literalmente «casa de Dios». Se conserva esa formulación para no reemplazarla por una glosa interpretativa como «templo», aunque el contexto la presupone.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Valor del masculino plural en אַנְשֵׁי מְקֹמוֹ
  english_pob_reading: the men of his place
  chosen_spanish_reading: los hombres de su lugar
  alternative_spanish_readings:
  - la gente de su lugar
  - sus vecinos
  rationale: Se conserva el masculino plural marcado del hebreo, sin neutralizarlo, porque la forma fuente es explícitamente masculina. Esto mantiene la transparencia textual aun cuando el referente social pueda abarcar a la comunidad local en general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido práctico de יְנַשְּׂאֻהוּ
  english_pob_reading: let ... support him
  chosen_spanish_reading: lo apoyen
  alternative_spanish_readings:
  - lo sostengan
  - lo asistan
  - lo carguen
  rationale: La imagen literal de «levantar/cargar» no comunica bien el contexto de provisión para el regreso. «Lo apoyen» conserva la acción de ayuda material y la intención del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió el pase de revisión más reciente sin cambios sustanciales; el texto español conserva la lectura auditada y no introduce expansiones interpretativas. La alineación general con el control cruzado es alta, sin conflictos textuales relevantes.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, en coherencia con el estándar del proyecto.
  - Se conserva la expresión «casa de Dios» en lugar de «templo», siguiendo el hebreo literal.
  - «Los hombres de su lugar» preserva el plural masculino del original y se ancla con nota explicativa.
  - El verbo «apoyen» evita tanto una literalidad pesada como una paráfrasis excesiva.
  - La puntuación refleja una enumeración de recursos seguida de la ofrenda voluntaria, conforme a la sintaxis hebrea.
