translation:
  language: es
  text: Todo el trabajo del hombre es para su boca, y sin embargo ni su apetito[a] se llena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alma»: «y sin embargo ni el alma se llena». Aquí נֶפֶשׁ probablemente se refiere al deseo o apetito en el contexto de comer y saciarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todo
  alternatives_spanish:
  - Todo lo
  - Cada
  lexicon: HALOT
  rationale: El cuantificador totalizador se expresa de forma natural con 'Todo' en español y conserva la amplitud del hebreo sin añadir énfasis innecesario.
- source_word: עֲמַל
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - fatiga
  - esfuerzo
  lexicon: HALOT
  rationale: En contexto sapiencial, עֲמַל apunta al esfuerzo humano y su carga. 'Trabajo' es una opción clara y digna en español; 'labor' sería posible, pero 'trabajo' suena más natural aquí y mantiene el peso del término sin exagerar la interpretación.
- source_word: הָאָדָם
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la humanidad
  - del ser humano
  lexicon: HALOT
  rationale: El hebreo usa אָדָם de manera genérica y representativa. 'Del hombre' conserva el singular proverbial y la referencia humana general, sin convertirlo en plural abstracto ni neutralizarlo innecesariamente.
- source_word: לְפִיהוּ
  english_pob_choice: for his mouth
  chosen_spanish: para su boca
  alternatives_spanish:
  - para su apetito
  - para su comida
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de la 'boca' en el texto principal, tal como hace la POB en inglés, porque el hebreo es literal. La lectura interpretativa se deja fuera del cuerpo principal para no borrar la metáfora.
- source_word: וְגַם
  english_pob_choice: yet even
  chosen_spanish: y aun
  alternatives_spanish:
  - y también
  - pero aun
  lexicon: HALOT
  rationale: '''Y aun'' reproduce bien la fuerza aditiva con matiz intensificativo. Aunque el inglés resalta el giro contrastivo con ''yet even'', el español puede expresar esa transición con naturalidad sin añadir una conjunción adversativa explícita.'
- source_word: הַנֶּפֶשׁ
  english_pob_choice: appetite
  chosen_spanish: apetito
  alternatives_spanish:
  - alma
  - deseo
  - vida
  lexicon: HALOT
  rationale: En este contexto de comer, saciedad y deseo insaciable, נֶפֶשׁ se entiende mejor como la fuerza del apetito o deseo interno. 'Apetito' comunica esa idea de forma directa en español y evita imponer una antropología dualista al texto.
- source_word: לֹא תִמָּלֵא
  english_pob_choice: is not filled
  chosen_spanish: no queda satisfecho
  alternatives_spanish:
  - no se llena
  - no será llenado
  - no se satisface
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'no será llenada / no se llena', en español 'no queda satisfecho' transmite con claridad la imagen de plenitud frustrada en relación con el apetito, manteniendo el sentido de insatisfacción sin sonar torpe.
theological_decisions:
- issue: Valor de אָדָם como genérico humano singular
  english_pob_reading: a man's
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de un hombre
  - de la humanidad
  - del ser humano
  rationale: El verso formula una observación proverbial sobre la condición humana. 'Del hombre' mantiene el singular representativo y respeta el paralelo del hebreo sin convertirlo en una abstracción que diluya la forma del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Sentido de נֶפֶשׁ en contexto de comida y satisfacción
  english_pob_reading: appetite
  chosen_spanish_reading: apetito
  alternative_spanish_readings:
  - alma
  - deseo
  - vida
  rationale: Traducir נֶפֶשׁ como 'alma' aquí podría introducir una oposición cuerpo/alma que el versículo no exige. 'Apetito' conserva la tensión textual entre esfuerzo humano y deseo nunca colmado, sin resolverla doctrinalmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Alineado con la revisión más reciente (gpt-5.4), sin cambios requeridos; el acuerdo de verificación fue alto y no se reportaron problemas en los pases de revisión.
  spanish_consistency_notes:
  - Se mantiene 'apetito' para נֶפֶשׁ en coherencia con la decisión léxica del contexto inmediato.
  - Se conserva la imagen concreta de 'boca' en lugar de interpretar directamente como 'comida' o 'necesidad'.
  - La formulación 'del hombre' preserva el valor genérico singular del hebreo אָדָם sin feminizar ni pluralizar el enunciado.
  - El ritmo breve y proverbial del hebreo se refleja con una sintaxis concisa y clara en español.
