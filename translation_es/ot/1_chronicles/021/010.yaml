translation:
  language: es
  text: 'Ve y habla a David[a], diciendo: «Así dice Yahvé: Yo pongo tres cosas delante de ti. Elige una de ellas para ti, y la haré venir sobre ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Tres estoy extendiendo/poniendo sobre ti». El hebreo deja sin expresar el objeto; el sentido es que Yahvé pone tres opciones delante de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: El imperativo de הלך se expresa de forma directa y natural con «Ve». Conserva el mandato de desplazamiento sin añadir matices no presentes en el hebreo.
- source_word: וְדִבַּרְתָּ אֶל דָּוִיד
  english_pob_choice: and speak to David
  chosen_spanish: y habla a David
  alternatives_spanish:
  - y dile a David
  - y conversa con David
  lexicon: HALOT
  rationale: דבר con אֶל se rinde mejor como «hablar a». «Habla a» preserva la relación verbal y evita sustituirla por un «decir» que suaviza el matiz del verbo original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - y le dirás
  lexicon: HALOT
  rationale: Como introducción de discurso directo, «diciendo» funciona como calco idiomático claro en español y mantiene la estructura del hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética se conserva con «Así dice». Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה, sin ocultar el nombre divino.
- source_word: שָׁלֹושׁ אֲנִי נֹטֶה עָלֶיךָ
  english_pob_choice: I am setting three things before you
  chosen_spanish: Yo estoy poniendo tres cosas delante de ti
  alternatives_spanish:
  - Estoy extendiendo tres cosas sobre ti
  - Yo te estoy proponiendo tres opciones
  lexicon: HALOT
  rationale: נֹטֶה literalmente es «extender/estirar», pero en este contexto el sentido es presentar algo ante alguien. «Poniendo... delante de ti» preserva la imagen de disponibilidad sin forzar una traducción más interpretativa. «Cosas» mantiene el objeto implícito, como en el hebreo.
- source_word: בְּחַר לְךָ
  english_pob_choice: Choose one of them for yourself
  chosen_spanish: Elige una de ellas para ti
  alternatives_spanish:
  - Escoge una para ti
  - Elige para ti
  lexicon: HALOT
  rationale: בחר se rinde con el imperativo «elige». El dativo לְךָ se expresa con «para ti», que en español reproduce el matiz de interés personal sin excesiva literalidad.
- source_word: אַחַת מֵהֵנָּה
  english_pob_choice: one of them
  chosen_spanish: una de ellas
  alternatives_spanish:
  - una de éstas
  - una sola de ellas
  lexicon: HALOT
  rationale: El femenino singular y el partitivo requieren un antecedente femenino plural implícito; «ellas» es la forma más natural en español para referirse a las tres opciones subentendidas.
- source_word: וְאֶעֱשֶׂה לָּךְ
  english_pob_choice: and I will do it to you
  chosen_spanish: y yo te la haré
  alternatives_spanish:
  - y yo lo haré contra ti
  - y yo lo haré para ti
  lexicon: HALOT
  rationale: 'עשה con ל puede implicar hacer algo a alguien. Dado que el contexto es de juicio, el español puede sonar más natural con un objeto femenino anticipando «una de ellas»: «te la haré». Aunque menos explícito que «hacerlo a ti», conserva el sentido de que la acción recaerá sobre David sin introducir un verbo interpretativo más fuerte.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: Se sigue el principio del proyecto de no enmascarar el Tetragrámaton con una sustitución litúrgica. «Yahvé» preserva el nombre del pacto según la convención editorial del POB español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Objeto implícito de ‘tres’
  english_pob_reading: I am setting three things before you
  chosen_spanish_reading: Yo estoy poniendo tres cosas delante de ti
  alternative_spanish_readings:
  - tres juicios
  - tres plagas
  - tres opciones
  rationale: El hebreo omite el sustantivo, y el contexto inmediato permite interpretarlo de varias maneras. Se prefiere una solución mínima que conserve la ambigüedad hasta que el contexto la aclare, sin adelantar una identificación que el verso no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Valor de נֹטֶה en este contexto
  english_pob_reading: I am stretching out/setting
  chosen_spanish_reading: estoy poniendo delante
  alternative_spanish_readings:
  - estoy extendiendo sobre ti
  - estoy tendiendo contra ti
  rationale: «Poniendo delante» comunica en español la idea contextual de presentar tres alternativas ante David, sin perder de vista que el verbo hebreo conserva una imagen física de ‘extender’.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustantivos respecto del análisis auditado; se conserva la ambigüedad del objeto implícito y la decisión de renderizar el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la ambigüedad del número tres con un sustantivo mínimo («cosas») en vez de especificar juicios o plagas.
  - Se evita «Señor» en el texto principal para no ocultar el nombre propio divino.
  - El pronombre de objeto en «te la haré» busca reflejar el antecedente femenino implícito de «una de ellas».
