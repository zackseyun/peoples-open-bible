translation:
  language: es
  text: Su santuario fue arrasado como un desierto; sus fiestas se convirtieron en luto, sus sábados en oprobio, su honor en menosprecio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἁγίασμα
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - lugar santo
  - recinto santo
  lexicon: LSJ
  rationale: ἁγίασμα aquí designa el espacio sagrado del templo, no la cualidad abstracta de santidad. «Santuario» conserva el sentido cultual y es natural en español bíblico contemporáneo.
- source_word: ἠρημώθη
  english_pob_choice: was laid waste
  chosen_spanish: fue arrasado
  alternatives_spanish:
  - fue devastado
  - fue desolado
  lexicon: LSJ
  rationale: El pasivo expresa ruina total. «Fue arrasado» reproduce bien la fuerza de devastación y suena idiomático en español.
- source_word: ὡς ἔρημος
  english_pob_choice: like a wilderness
  chosen_spanish: como un desierto
  alternatives_spanish:
  - como un yermo
  - como un lugar desolado
  lexicon: LSJ
  rationale: La comparación explícita pide una imagen de desolación. «Desierto» es claro en español; aunque «wilderness» en inglés conserva resonancia bíblica, aquí el paralelo natural es «desierto».
- source_word: αἱ ἑορταὶ
  english_pob_choice: feasts
  chosen_spanish: fiestas
  alternatives_spanish:
  - festividades
  - fiestas señaladas
  lexicon: LSJ
  rationale: En este contexto de culto y calendario sagrado, ἑορταί refiere celebraciones religiosas. «Fiestas» comunica bien el valor cultual sin sonar forzado.
- source_word: ἐστράφησαν εἰς πένθος
  english_pob_choice: were turned into mourning
  chosen_spanish: se volvieron duelo
  alternatives_spanish:
  - se convirtieron en luto
  - fueron transformadas en duelo
  lexicon: LSJ
  rationale: La construcción marca transformación. «Se volvieron duelo» preserva el cambio de estado y mantiene la concisión del original, con un tono natural en español.
- source_word: τὰ σάββατα
  english_pob_choice: Sabbaths
  chosen_spanish: sábados
  alternatives_spanish:
  - sabbats
  - días de reposo
  lexicon: LSJ
  rationale: El plural alude a las observancias sabáticas recurrentes. «Sábados» es comprensible para lectores en español; se mantiene el valor de institución de reposo, no el día común de la semana.
- source_word: εἰς ὀνειδισμόν
  english_pob_choice: into reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  lexicon: LSJ
  rationale: ὀνειδισμός expresa vergüenza pública, insulto o afrenta. «Oprobio» concentra bien esa carga de deshonra social y cultual.
- source_word: τιμὴ
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - dignidad
  - gloria
  lexicon: LSJ
  rationale: En este contexto τιμή señala el prestigio y la estima asociados con Jerusalén y su culto. «Honor» es la correspondencia más directa y transparente.
- source_word: εἰς ἐξουδένωσιν
  english_pob_choice: into contempt
  chosen_spanish: en desprecio
  alternatives_spanish:
  - en humillación
  - en menosprecio
  lexicon: LSJ
  rationale: ἐξουδένωσις indica ser tratado como nada, despreciado o rebajado. «En desprecio» comunica el resultado con claridad; se evita suavizar la pérdida de valor implícita.
theological_decisions:
- issue: Posee feminine referent repeated in Greek (αὐτῆς)
  english_pob_reading: Render as 'her' throughout, leaving the antecedent implicit as in the Greek context of Jerusalem/Zion.
  chosen_spanish_reading: Conservar la personificación con «de ella / sus» sin explicitar «Jerusalén» en el texto principal.
  alternative_spanish_readings:
  - de Jerusalén
  - de la ciudad
  rationale: El griego repite el posesivo femenino sin nombrar de nuevo el antecedente. El español puede sostener esa personificación con «de ella» y «sus», preservando el lamento poético y la economía del original.
  doctrine_reference: Principio de primacía del texto fuente y conservación de la fuerza literaria cuando el español lo permite naturalmente.
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando las notas al pie no ancladas. El texto ahora es autosuficiente y no contiene marcadores de nota.
  spanish_consistency_notes:
  - Se mantuvo el léxico cultual con «santuario», «fiestas» y «sábados», en continuidad con la correspondencia auditada del griego.
  - Se evitó sustituir el lenguaje de lamento por una paráfrasis explicativa; la sintaxis sigue de cerca la serie de transformaciones del original.
  - Se prefirió «oprobio» y «desprecio» para conservar la doble degradación social del pasaje.
