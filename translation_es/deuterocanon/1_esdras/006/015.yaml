translation:
  language: es
  text: También derribaron la casa y la quemaron[a], y llevaron cautivo al pueblo a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la casa de Dios, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: BDAG
  rationale: Conserva el sustantivo literal del griego y, en este contexto histórico, deja que el contexto identifique la casa como el templo sin forzar una paráfrasis.
- source_word: καθελόντες
  english_pob_choice: tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - tiraron abajo
  - demolieron
  lexicon: BDAG
  rationale: Expresa bien la acción de desmantelar o tumbar una construcción, con fuerza natural en español y sin sobreinterpretar.
- source_word: ἐνεπύρισαν
  english_pob_choice: burned
  chosen_spanish: la quemaron
  alternatives_spanish:
  - la incendiaron
  - la prendieron fuego
  lexicon: BDAG
  rationale: El verbo indica quemar o incendiar; en español, "la quemaron" es claro, breve y acorde con la secuencia de destrucción.
- source_word: λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: BDAG
  rationale: '"Pueblo" conserva el valor colectivo del término y suena más natural en este contexto que una forma demasiado general o abstracta.'
- source_word: ᾐχμαλώτευσαν
  english_pob_choice: they took captive
  chosen_spanish: llevaron cautivo
  alternatives_spanish:
  - tomaron cautivo
  - llevaron en cautiverio
  lexicon: BDAG
  rationale: Mantiene la imagen de captura y deportación. En español, "llevaron cautivo" comunica la acción sin perder la fuerza verbal del original.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - a la ciudad de Babilonia
  lexicon: BDAG
  rationale: La preposición simple "a" es la forma idiomática y fiel para el movimiento hacia Babilonia.
theological_decisions:
- issue: Referent of 'the house'
  english_pob_reading: the phrase refers to the temple, but is rendered 'the house' in the main text
  chosen_spanish_reading: la casa permanece literal en el texto principal, con la identificación implícita como el templo en la nota
  alternative_spanish_readings:
  - el templo
  - la casa de Dios
  rationale: El griego usa οἶκος, no un término explícito para templo. Mantener "la casa" preserva la huella léxica y deja que el contexto histórico-bíblico determine el referente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios recientes; el presente borrador sigue de cerca la decisión establecida de conservar el sustantivo literal para οἶκος y la fuerza de destrucción y cautiverio en la secuencia verbal.
  spanish_consistency_notes:
  - Se conserva la referencia implícita al templo mediante "la casa", como en el rastro auditado en inglés.
  - '"Cautivo" mantiene el valor de captura/deportación sin sustituirlo por un lenguaje más interpretativo como "exiliaron".'
  - 'El orden de la cláusula sigue el griego y el inglés auditado: destrucción de la casa, luego captura del pueblo.'
