translation:
  language: es
  text: 'En aquel tiempo se dirá a este pueblo y a Jerusalén: «Un viento caliente[a] de las alturas desnudas[b] en el desierto viene hacia la hija de mi pueblo, no para aventar ni para limpiar[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «viento abrasador».
    reason: lexical_alternative
  - marker: b
    text: «Alturas desnudas» también puede entenderse como «colinas desnudas»; el hebreo alude a elevaciones expuestas, sin árboles.
    reason: lexical_alternative
  - marker: c
    text: Aquí «limpiar» se refiere a la limpieza del grano después del aventado, no a una purificación moral o ritual en este contexto inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: Es una fórmula temporal profética natural en español y conserva la deixis sin volverse arcaica.
- source_word: יֵאָמֵר
  english_pob_choice: it will be said
  chosen_spanish: se dirá
  alternatives_spanish:
  - será dicho
  - dirán
  lexicon: HALOT
  rationale: El niphal impersonal se expresa bien con una pasiva refleja en español, evitando añadir un sujeto no presente en el hebreo.
- source_word: לָעָם הַזֶּה וְלִירוּשָׁלִַם
  english_pob_choice: to this people and to Jerusalem
  chosen_spanish: a este pueblo y a Jerusalén
  alternatives_spanish:
  - a este pueblo y a la ciudad de Jerusalén
  - concerniente a este pueblo y a Jerusalén
  lexicon: HALOT
  rationale: La preposición marca destinatario del dicho; se mantiene el paralelismo entre el pueblo y Jerusalén.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - ráfaga
  lexicon: HALOT
  rationale: El contexto meteorológico y agrícola exige 'viento', no 'espíritu'.
- source_word: צַח
  english_pob_choice: hot
  chosen_spanish: caliente
  alternatives_spanish:
  - cálido
  - ardiente
  - abrasador
  lexicon: HALOT
  rationale: En español 'caliente' reproduce de manera directa la cualidad térmica del hebreo sin intensificarla más allá del contexto.
- source_word: שְׁפָיִים
  english_pob_choice: bare heights
  chosen_spanish: las alturas desnudas
  alternatives_spanish:
  - las colinas desnudas
  - las alturas peladas
  lexicon: HALOT
  rationale: Se conserva la imagen topográfica de elevaciones expuestas y sin vegetación, evitando el matiz cultual de 'lugares altos'.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - desde el desierto
  lexicon: HALOT
  rationale: Aquí funciona como marco espacial del viento; 'desierto' es claro en español y comunica el ambiente árido del hebreo.
- source_word: דֶּרֶךְ
  english_pob_choice: comes toward
  chosen_spanish: viene hacia
  alternatives_spanish:
  - se dirige hacia
  - va hacia
  lexicon: HALOT
  rationale: El hebreo usa dirección/movimiento; en español conviene verbalizarlo para que la frase suene natural y conserve la orientación hacia el objeto.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija de mi gente
  - mi pueblo
  lexicon: HALOT
  rationale: Se mantiene la personificación poética y afectiva sin reducirla a un mero colectivo.
- source_word: לֹא לִזְרוֹת
  english_pob_choice: not for winnowing
  chosen_spanish: no para aventar
  alternatives_spanish:
  - no para trillar
  - no para limpiar con el aventador
  lexicon: HALOT
  rationale: '''Aventar'' comunica el acto de lanzar el grano al aire para separarlo de la paja, equivalente funcional de ''winnowing'' en español bíblico natural.'
- source_word: וְלֹא לְהָבַר
  english_pob_choice: and not for cleansing
  chosen_spanish: ni para limpiar
  alternatives_spanish:
  - ni para purgar
  - ni para depurar
  lexicon: HALOT
  rationale: Se conserva la referencia al resultado agrícola de limpiar el grano después del aventado, sin convertirlo en purificación moral o ritual.
theological_decisions:
- issue: Retener la personificación בַּת עַמִּי
  english_pob_reading: the daughter of my people
  chosen_spanish_reading: la hija de mi pueblo
  alternative_spanish_readings:
  - mi pueblo
  - la hija de mi pueblo, es decir, Judá/Jerusalén
  rationale: La personificación forma parte del tono emotivo de Jeremías y no debe ser aplanada. En español, mantenerla preserva la carga poética y el afecto implícito.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo renderizar רוּחַ en este contexto
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto inmediato es meteorológico y agrícola, con imágenes de desierto y aventado; 'espíritu' introduciría una ambigüedad que el hebreo local no requiere.
  doctrine_reference: Translation philosophy §1
- issue: Cómo expresar לֹא ... וְלֹא ...
  english_pob_reading: not for winnowing or for cleansing
  chosen_spanish_reading: no para aventar, ni para limpiar
  alternative_spanish_readings:
  - no para aventar ni para limpiar
  - no para aventar o para limpiar
  rationale: El hebreo niega dos fines. En español, 'ni ... ni ...' o 'no ... ni ...' preserva la coordinación negativa y evita sugerir alternativa donde hay exclusión.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el último estado auditado en inglés, que prefirió 'hot wind' sobre 'scorching wind' y suavizó la coordinación negativa a 'or for cleansing'. En español se mantuvo la misma imagen básica, pero se conservó la negación enfática del hebreo con 'no ... ni ...' porque reproduce mejor la doble finalidad negada en la fuente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como default del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''viento'' se usa por contexto meteorológico, no ''espíritu''.'
  - '''la hija de mi pueblo'' conserva la personificación poética del hebreo.'
  - '''aventar'' y ''limpiar'' se eligieron por su sentido agrícola, no moral.'
