revisions:
- from: 'Y sucedió que, cuando retiraba su mano, he aquí que salió su hermano. Entonces ella dijo: «¡Qué brecha te has abierto!» Y llamó su nombre Pérez.'
  to: 'Y cuando retiró su mano, de pronto salió su hermano. Entonces ella dijo[a]: «¡Qué brecha te has abierto!» Así fue llamado Pérez.'
  rationale: Se simplifica la apertura para evitar una construcción recargada en español y seguir la revisión ya aplicada en inglés. Se mantiene «brecha» para preservar el juego de palabras con Pérez, y se restaura la nota explicativa del hebreo literal. La fórmula final se rehace como impersonal natural («Así fue llamado Pérez»), que refleja mejor וַיִּקְרָא שְׁמוֹ sin calco extraño.
