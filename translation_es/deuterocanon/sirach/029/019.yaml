base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/029/019.yaml
  text: A sinner who falls into surety and pursues contracts will fall into lawsuits[a][b].
  footnotes:
  - marker: a
    text: Or 'will fall into judgments' or 'legal disputes.' The Greek κρίσεις can refer broadly to judicial proceedings or verdicts; 'lawsuits' is chosen here because the context is financial surety and contractual obligations.
    reason: lexical_alternative
  - marker: b
    text: '''Surety'' refers to becoming security or guarantor for another person''s debt or obligation.'
    reason: cultural_note
