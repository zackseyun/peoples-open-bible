revisions:
- from: Todo nacido en la tierra[a] hará así estas cosas, para presentar una ofrenda encendida[b], aroma agradable para Yahvé.
  to: Toda persona nativa[a] hará estas cosas de esta manera, para presentar una ofrenda de alimento[b], aroma agradable para Yahvé.
  rationale: Se corrigió הָאֶזְרָח a «persona nativa» para reflejar pertenencia nativa a la comunidad, no nacimiento literal en la tierra. Se mantuvo la fuerza distributiva y legal de la cláusula, y se mejoró la naturalidad de כָּכָה con «de esta manera». Se ajustó אִשֵּׁה a «ofrenda de alimento» para alinearse con la decisión léxica auditada, preservando las alternativas de fuego en nota. «Yahvé» y «aroma agradable» se mantuvieron por fidelidad y buena legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura legal del hebreo y conserva Yahvé correctamente, pero הָאֶזְרָח no significa literalmente «nacido en la tierra». Se refiere al nativo del pueblo/la comunidad, en contraste con el extranjero residente del contexto. Además, «ofrenda encendida» no representa bien אִשֵּׁה según la pista léxica auditada; es mejor una forma más estable como «ofrenda de alimento» con nota alternativa, o «ofrenda hecha por fuego».
  spanish_quality_summary: El español es generalmente claro, pero «Todo nacido en la tierra» suena poco natural y puede sugerir simplemente cualquier persona nacida físicamente en un territorio. «Aroma agradable para Yahvé» es correcto y legible. La frase mejora en naturalidad y precisión con «Toda persona nativa» o similar; dado el contexto legal y la revisión inglesa, «Toda persona nativa» funciona mejor que un masculino marcado.
  glossary_alignment: Alineación parcial. «Yahvé» cumple el glosario del proyecto. «Aroma agradable» encaja para רֵיחַ נִיחֹחַ. Pero «nacido en la tierra» se aparta del valor de הָאֶזְרָח, y «ofrenda encendida» se aparta de la decisión POB para אִשֵּׁה, que prefiere «food offering» con alternativas de fuego preservadas en nota.
  issues:
  - severity: high
    issue: הָאֶזְרָח se tradujo como «nacido en la tierra».
    rationale: El término denota al nativo/miembro autóctono de la comunidad de Israel, no una descripción literal de nacimiento en suelo territorial. La formulación actual puede malentenderse y no refleja bien el contraste con el forastero del contexto.
  - severity: medium
    issue: La nota [a] refuerza una literalidad problemática.
    rationale: Decir «Literalmente, “todo nacido en la tierra”» documenta como si fuera una equivalencia léxica precisa, cuando en realidad la mejor explicación es el valor representativo del singular masculino para «persona nativa» o «nativo».
  - severity: medium
    issue: אִשֵּׁה se tradujo como «ofrenda encendida».
    rationale: Aunque intenta reflejar el fuego, esta expresión no es idiomática ni coincide con la decisión auditada del POB. «Ofrenda de alimento» preserva mejor la opción principal documentada, mientras la nota puede conservar «ofrenda de fuego / hecha por fuego».
  revised_spanish_text: Toda persona nativa[a] hará estas cosas de esta manera, para presentar una ofrenda de alimento[b], aroma agradable para Yahvé.
  revised_footnotes:
  - marker: a
    text: O «Todo nativo»; el hebreo usa una forma masculina singular con fuerza representativa en instrucción legal.
    reason: lexical_alternative
  - marker: b
    text: 'También: «ofrenda de fuego» u «ofrenda hecha por fuego».'
    reason: lexical_alternative
  revision_rationale: Se corrigió הָאֶזְרָח a «persona nativa» para reflejar pertenencia nativa a la comunidad, no nacimiento literal en la tierra. Se mantuvo la fuerza distributiva y legal de la cláusula, y se mejoró la naturalidad de כָּכָה con «de esta manera». Se ajustó אִשֵּׁה a «ofrenda de alimento» para alinearse con la decisión léxica auditada, preservando las alternativas de fuego en nota. «Yahvé» y «aroma agradable» se mantuvieron por fidelidad y buena legibilidad.
