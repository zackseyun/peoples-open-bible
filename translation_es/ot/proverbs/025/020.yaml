- from: Como el que se quita un vestido en un día frío[a], y como vinagre sobre natrón[b], así es el que canta canciones a un corazón afligido.
  to: Como el que se quita una prenda en un día frío, y como vinagre sobre natrón[a], así es el que canta canciones a un corazón afligido.
  rationale: Se cambia «vestido» por «prenda» para reflejar mejor el sentido general de בֶּגֶד en español natural. Se elimina la nota mal ubicada sobre «día frío» y se conserva una sola nota anclada a «natrón», que sí corresponde a la alternativa lexical documentada en la auditoría inglesa y aclara el referente mineral y la imagen reactiva. No se requieren cambios adicionales en «corazón afligido», que transmite bien el sentido contextual de לֶב רָע.
