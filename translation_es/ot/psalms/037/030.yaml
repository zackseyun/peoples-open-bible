translation:
  language: es
  text: La boca del justo pronuncia sabiduría[a], y su lengua habla justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «medita en sabiduría» o «murmura sabiduría». El verbo hebreo puede indicar hablar en voz baja o rumiar; aquí, por el paralelo con «su lengua habla», probablemente se refiere a expresión verbal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «juicio». El término hebreo puede referirse a justicia, a una decisión legal o a lo que es recto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  english_pob_choice: The mouth of
  chosen_spanish: La boca de
  alternatives_spanish:
  - La boca
  - De la boca de
  lexicon: HALOT
  rationale: La construcción en hebreo es en estado constructo y expresa pertenencia; en español, «la boca de» preserva esa relación nominal y la metonimia del habla sin forzar una paráfrasis.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: HALOT
  rationale: צַדִּיק es un sustantivo/adjetivo sustantivado de valor moral y pactual. «El justo» es la equivalencia natural en español y conserva el registro bíblico sin añadir «hombre», que no está en el hebreo.
- source_word: יֶהְגֶּה
  english_pob_choice: utters
  chosen_spanish: emite
  alternatives_spanish:
  - medita en
  - murmura
  - habla
  lexicon: HALOT
  rationale: El verbo הגה puede abarcar murmurar, meditar o articular en voz baja. Aquí, por el paralelo con «su lengua habla», el sentido probable es expresión verbal; «emite» mantiene un tono sobrio y evita reducirlo a meditación interior o a un habla demasiado libre.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sensatez
  lexicon: HALOT
  rationale: חָכְמָה se rinde de forma directa como «sabiduría»; es el contenido que brota de la boca del justo.
- source_word: לְשׁוֹנוֹ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su habla
  - su lenguaje
  lexicon: HALOT
  rationale: La imagen corporal de «lengua» es literal y mantiene el paralelismo poético con «la boca».
- source_word: תְּדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - declara
  lexicon: HALOT
  rationale: דבר en esta forma pi‘el concordando con «lengua» expresa habla articulada; «habla» es la equivalencia más natural en español y conserva la sencillez del paralelo poético.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - lo recto
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar justicia, juicio o decisión legal. En este contexto sapiencial, «justicia» conserva la fuerza ética y comunitaria del término mejor que «juicio», que en español puede sonar restringido a un veredicto.
theological_decisions:
- issue: El matiz de מִשְׁפָּט entre «justicia» y «juicio»
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - juicio
  - lo recto
  rationale: La POB inglesa eligió «justice» por el entorno sapiencial y por la orientación ética del verso. En español, «justicia» comunica mejor esa dimensión normativa y relacional; se conserva la alternativa «juicio» para reflejar la amplitud semántica del hebreo.
  doctrine_reference: DOCTRINE.md § Lexical fidelity and semantic range
- issue: Paralelismo entre «boca» y «lengua» como habla externa
  english_pob_reading: utters wisdom ... speaks justice
  chosen_spanish_reading: emite sabiduría ... habla justicia
  alternative_spanish_readings:
  - medita sabiduría ... habla justicia
  - murmura sabiduría ... habla justicia
  rationale: El hebreo contrapone dos órganos del habla para describir expresión verbal justa. La traducción evita leer el primer verbo como meditación puramente interior y mantiene el paralelismo audible con el segundo hemistiquio.
  doctrine_reference: DOCTRINE.md § Poetry and parallelism
translation_notes:
  revision_awareness: 'La línea inglesa pasó por una revisión importante: se eliminó «man» de «the righteous man» porque el hebreo solo dice «el justo». La redacción española sigue ese ajuste y no añade un sustantivo masculino innecesario; conserva además el valor poético del paralelismo y la amplitud semántica de מִשְׁפָּט mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene «justo» como sustantivo para צַדִּיק, en coherencia con la revisión inglesa que evitó añadir «hombre».
  - Se usa «sabiduría» y «justicia» como sustantivos abstractos, respetando la economía poética del hebreo.
  - La puntuación con coma reproduce el paralelismo de dos miembros coordinados.
  - Las notas a y b se anclan en los términos con mayor carga semántica y ambigüedad en español.
