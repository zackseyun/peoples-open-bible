translation:
  language: es
  text: Por tanto, nosotros continuamente nos acordamos de ustedes en todo tiempo, en las fiestas[a] y en los demás días señalados[b], cuando ofrecemos sacrificios y en nuestras oraciones, como es justo y conveniente acordarse de los hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festividades».
    reason: lexical_alternative
  - marker: b
    text: «Días señalados» traduce una expresión que indica los otros días que corresponden, se deben o están prescritos para observancia.
    reason: cultural_note
lexical_decisions:
- source_word: ἀδιαλείπτως
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - incesantemente
  lexicon: LSJ
  rationale: ‘Continuamente’ expresa la regularidad persistente del recuerdo litúrgico sin sugerir una acción literalmente ininterrumpida en cada instante.
- source_word: ἑορταῖς
  english_pob_choice: festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las festividades
  - los festivales
  lexicon: LSJ
  rationale: ‘Fiestas’ es natural en español bíblico y conserva el sentido cultual del calendario religioso mejor que una opción más moderna o secularizada.
- source_word: καθηκούσαις ἡμέραις
  english_pob_choice: appointed days
  chosen_spanish: los demás días debidos
  alternatives_spanish:
  - los demás días señalados
  - los demás días prescritos
  lexicon: LSJ
  rationale: La frase griega indica días que corresponden, se deben o están prescritos; ‘debidos’ conserva esa fuerza normativa sin perder fluidez en español.
- source_word: μνημονεύομεν ὑμῶν
  english_pob_choice: remember you
  chosen_spanish: nos acordamos de ustedes
  alternatives_spanish:
  - los recordamos
  - hacemos memoria de ustedes
  lexicon: LSJ
  rationale: ‘Acordarse de’ comunica memoria personal y relacional. Se prefirió ‘ustedes’ por claridad y naturalidad en español contemporáneo.
- source_word: ἐφʼ ὧν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en las cuales
  - en ocasión de las cuales
  lexicon: LSJ
  rationale: ‘Cuando’ transmite bien el valor temporal de la cláusula sin volverla pesada en español.
- source_word: προσφέρομεν θυσίων
  english_pob_choice: we offer sacrifices
  chosen_spanish: ofrecemos sacrificios
  alternatives_spanish:
  - presentamos sacrificios
  - hacemos sacrificios
  lexicon: LSJ
  rationale: Es la correspondencia más directa y cultualmente adecuada para el verbo y el complemento sacrificial.
- source_word: προσευχαῖς
  english_pob_choice: prayers
  chosen_spanish: nuestras oraciones
  alternatives_spanish:
  - las oraciones
  - las plegarias
  lexicon: LSJ
  rationale: El posesivo ‘nuestras’ hace explícita la conexión con el sujeto plural del verbo sin añadir contenido ajeno; ‘oraciones’ es claro y digno.
- source_word: ὡς δέον ἐστὶν καὶ πρέπον
  english_pob_choice: as it is right and fitting
  chosen_spanish: como es justo y conveniente
  alternatives_spanish:
  - como es debido y propio
  - como es necesario y apropiado
  lexicon: LSJ
  rationale: ‘Justo y conveniente’ reproduce bien la doble idea de obligación moral y adecuación social/ritual presente en el griego.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - de los hermanos y hermanas
  - de los parientes
  lexicon: LSJ
  rationale: Se conserva el plural masculino del original y el valor de fraternidad covenantal/política del término sin neutralizarlo.
theological_decisions:
- issue: Valor de ἀδελφῶν como kinship term masculino plural
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los parientes
  rationale: El contexto diplomático y étnico usa ‘hermanos’ como designación de comunión/parentesco entre comunidades judías. No hay presión contextual para expandir a una formulación inclusiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre sacrificios y oraciones como actos de memoria
  english_pob_reading: when we offer sacrifices and in our prayers
  chosen_spanish_reading: cuando ofrecemos sacrificios y en nuestras oraciones
  alternative_spanish_readings:
  - al ofrecer sacrificios y en oraciones
  - cuando presentamos sacrificios y en oraciones
  rationale: La secuencia mantiene unidos los actos litúrgicos como ocasiones concretas de memoria, sin convertir la cláusula en una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'El inglés POB revisó solo el orden de palabras para mejorar fluidez, sin cambios sustantivos. La presente versión española sigue esa lectura revisada y conserva las mismas decisiones léxicas principales: continually/continually = continuamente; festivals = fiestas; appointed days = días debidos; remember you = nos acordamos de ustedes; right and fitting = justo y conveniente; brothers = hermanos.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se prefirió ‘ustedes’ por norma de claridad y neutralidad panhispánica en un discurso plural.
  - Se conservó ‘hermanos’ sin expansión inclusiva por fidelidad al masculino plural y al uso de parentesco covenantal del texto.
