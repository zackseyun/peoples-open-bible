base_translation:
  language: en
  yaml_path: translation/ot/joshua/007/025.yaml
  text: And Joshua said[a], “Why have you troubled us? Yahweh will trouble you this day.” And all Israel stoned him with stones[c][b], and they burned them with fire and stoned them with stones.
  footnotes:
  - marker: a
    text: Hebrew 'Why have you troubled us? The LORD will trouble you'—a wordplay on the same verb is preserved here with 'bring trouble.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('him') to plural ('them') after Achan is named, likely encompassing Achan together with others or with his household and possessions; the translation preserves this shift rather than smoothing it out.
    reason: alternative_reading
  - marker: c
    text: Two different Hebrew verbs for stoning are used in this verse; both refer to execution by stones and are rendered similarly in English.
    reason: lexical_alternative
