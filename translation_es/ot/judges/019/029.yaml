    rationale: 'El hebreo añade un detalle de modo: literalmente «según sus huesos», entendido idiomáticamente como desmembramiento por miembros/partes esqueléticas. El POB inglés lo refleja con «limb by limb». El borrador lo traslada solo a una nota y lo pierde en la línea principal.'
  - severity: low
