  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; nombres propios ''Betsabé'' y ''Salomón'' en formas bíblicas españolas; no hay conflictos con otros términos doctrinales clave. La decisión de mantener ''su esposa'' concuerda con la justificación auditada.'
