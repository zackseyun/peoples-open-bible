translation:
  language: es
  text: Y allí comerán delante de Yahvé su Dios, y se alegrarán en todo lo que emprendan[a], ustedes y sus hogares, con lo que Yahvé su Dios los ha bendecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en todo lo que pongan por obra» o «en toda la obra de su mano». El hebreo dice literalmente: «en todo el envío de su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: you shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán allí
  - ustedes comerán
  lexicon: HALOT
  rationale: El verbo qal con waw consecutiva en este contexto exhortativo se vierte naturalmente con valor de mandato futuro en español. 'Comerán' conserva el sentido instructivo sin añadir parafraseo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' reproduce el valor deíctico y mantiene la referencia al lugar señalado en el contexto inmediato.'
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé, su Dios
  alternatives_spanish:
  - en presencia de Yahvé, su Dios
  lexicon: HALOT
  rationale: '''Delante de'' es la equivalencia idiomática más directa para לִפְנֵי en este marco de culto. Se conserva ''Yahvé'' según la norma del proyecto para יְהוָה.'
- source_word: וּשְׂמַחְתֶּם
  english_pob_choice: you shall rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se gozarán
  - se regocijarán
  lexicon: HALOT
  rationale: '''Alegrarse'' comunica bien la respuesta festiva y cultual del pasaje en español actual; mantiene el futuro exhortativo sin volverlo demasiado solemne o arcaico.'
- source_word: בְּכֹל מִשְׁלַח יֶדְכֶם
  english_pob_choice: in all the work of your hand
  chosen_spanish: en todo lo que emprendan
  alternatives_spanish:
  - en todo el trabajo de su mano
  - en todo lo que pongan por obra
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo ('el envío/estirar de la mano') para lo que uno hace o emprende. En español, 'en todo lo que emprendan' preserva el alcance idiomático y la fuerza del contexto mejor que una traducción literal rígida. El sustantivo 'mano' se evita en el cuerpo principal por sonar menos natural, pero se mantiene el sentido de actividad humana.
- source_word: אַתֶּם וּבָתֵּיכֶם
  english_pob_choice: you and your households
  chosen_spanish: ustedes y sus casas
  alternatives_spanish:
  - ustedes y sus hogares
  - ustedes y sus familias
  lexicon: HALOT
  rationale: '''Casas'' reproduce de forma bastante directa בָּתִּים y puede abarcar la unidad doméstica; en español es más concreto y menos interpretativo que ''familias''. En nota se puede entender el valor colectivo si se desea.'
- source_word: אֲשֶׁר בֵּרַכְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: with which Yahweh your God has blessed you
  chosen_spanish: con lo que Yahvé, su Dios, los habrá bendecido
  alternatives_spanish:
  - con lo cual Yahvé, su Dios, los ha bendecido
  - porque Yahvé, su Dios, los ha bendecido
  lexicon: HALOT
  rationale: El relativo final conecta naturalmente con el ámbito de gozo/actividad bendecida. Se conserva el perfecto con valor resultativo/futuro perfecto en estilo exhortativo español. El cambio a plural ('los') sigue el plural del discurso, mientras que el hebreo pasa al singular sufijado al final; en español se prioriza la fluidez del destinatario colectivo sin perder el referente corporativo de Israel.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar la transliteración reverencial ''Yahvé'' en lugar de sustituir por un título. Esto preserva el nombre pactual revelado a Israel y evita la convención de ocultarlo detrás de ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Corporate singular/plural shift in address
  english_pob_reading: retain plural commands and render the final singular suffix as English singular within a corporate sense
  chosen_spanish_reading: mantener el plural exhortativo y reflejar el destinatario corporativo de forma natural en español
  alternative_spanish_readings:
  - uniformar todo a singular formal
  - uniformar todo a plural explícito
  rationale: El hebreo alterna entre plural y singular, rasgo retórico de Deuteronomio. En español, 'ustedes' conserva la exhortación colectiva; el cierre con 'los habrá bendecido' mantiene el referente comunitario sin forzar un singular artificial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text meaning and document exceptions'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hacía falta modificar el sentido base. Esta versión española sigue de cerca el texto hebreo y el audit trail inglés, especialmente en el modismo מִשְׁלַח יֶדְכֶם y en el uso del nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se evita 'Mesías/Cristo' porque el versículo no contiene terminología mesiánica.
  - '''Delante de'' conserva la relación cultual de לִפְנֵי sin volverla paráfrasis.'
  - Se opta por un español sobrio y publicable, con modismo explicado en nota para no perder la fuerza semántica del hebreo.
