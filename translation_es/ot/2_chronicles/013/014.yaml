translation:
  language: es
  text: Cuando Judá se volvió, he aquí que la batalla estaba delante de ellos y detrás de ellos; y clamaron a Yahvé, y los sacerdotes tocaban las trompetas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: turned around
  chosen_spanish: se volvió
  alternatives_spanish:
  - dio media vuelta
  - se giró
  lexicon: HALOT
  rationale: El verbo פנה aquí describe un giro físico ante el ataque. «Se volvió» conserva la idea de cambio de orientación de forma natural en español sin añadir más detalle del que exige el hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - los de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: El nombre colectivo funciona como sujeto representando al ejército/pueblo. «Judá» mantiene la concisión y el paralelo con el hebreo, como en la traducción inglesa.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: La partícula introduce una escena repentina y llamativa. «He aquí» preserva ese valor discursivo de sorpresa o evidencia abrupta en un registro bíblico claro.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En este contexto militar inmediato, «batalla» corresponde mejor que «guerra» y evita ampliar el sentido más allá del enfrentamiento descrito.
- source_word: פָּנִים וְאָחוֹר
  english_pob_choice: before them and behind them
  chosen_spanish: delante de ellos y detrás de ellos
  alternatives_spanish:
  - por delante y por detrás
  - al frente y a la retaguardia
  lexicon: HALOT
  rationale: La expresión idiomática indica ataque desde ambos lados. «Delante de ellos y detrás de ellos» sigue de cerca el hebreo y resulta natural en español.
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - pidieron auxilio
  lexicon: HALOT
  rationale: El verbo expresa un clamor urgente dirigido a Dios. «Clamaron» transmite mejor la apelación intensa y reverente que «gritaron».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se aplica el término proyectual para el Tetragrámaton. «A Yahvé» conserva la referencia explícita al nombre divino sin sustituirlo por un título de ocultamiento.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los levitas sacerdotales
  - los ministros del culto
  lexicon: HALOT
  rationale: La equivalencia es directa y transparente. «Sacerdotes» es la forma normal en español para כֹּהֲנִים en este contexto.
- source_word: מחצצרים
  english_pob_choice: were blowing
  chosen_spanish: tocaban
  alternatives_spanish:
  - soplaban
  - hacían sonar
  lexicon: HALOT
  rationale: El participio indica acción en curso; en español bíblico, «tocaban» comunica con naturalidad la ejecución continua de las trompetas. «Hacían sonar» también sería posible, pero menos conciso.
- source_word: בַּחֲצֹצְרוֹת
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - las trompetas de plata
  - las trompetas rituales
  lexicon: HALOT
  rationale: El término designa los instrumentos de trompeta del texto, sin añadir el calificativo «de plata» que no aparece aquí. «Trompetas» respeta el sentido y evita importar un detalle no explícito.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto establece «Yahvé» como forma principal para יְהוָה. Se conserva el nombre propio divino en lugar de un título sustitutivo, en continuidad con la política del POB y con la transparencia frente al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y mantiene la coordinación simple del original, en línea con la revisión inglesa que sustituyó una relación de simultaneidad implícita por una coordinación directa con «and». En español se refleja con «y» sin introducir subordinación temporal adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino.
  - Se preserva el orden narrativo abrupto con «he aquí» para וְהִנֵּה.
  - «Clamaron» se usa para conservar la intensidad orante del verbo, no un simple grito.
  - «Tocaban las trompetas» refleja el participio hebreo con acción en curso.
  - No se añade material interpretativo como «de plata» o «rituales» porque el hebreo de este versículo no lo explicita.
