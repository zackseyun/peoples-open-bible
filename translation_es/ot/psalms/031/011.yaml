  text: כִּ֤י כָל֪וּ בְ/יָג֡וֹן חַיַּ/י֮ וּ/שְׁנוֹתַ֪/י בַּ/אֲנָ֫חָ֥ה כָּשַׁ֣ל בַּ/עֲוֺנִ֣/י כֹחִ֑/י וַ/עֲצָמַ֥/י עָשֵֽׁשׁוּ׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/031/011.yaml
  text: For my life is spent with grief[a], and my years with sighing; my strength has failed because of my iniquity[b], and my bones waste away.
  footnotes:
