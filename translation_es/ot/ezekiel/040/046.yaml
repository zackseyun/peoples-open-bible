review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido del hebreo: la cámara orientada al norte está asignada a los sacerdotes responsables del altar; estos se identifican específicamente como los hijos de Sadoc, seleccionados de entre los hijos de Leví, que se acercan a Yahvé para servirle. También mantiene correctamente el nombre divino Yahvé y la distinción sacerdotal dentro de Leví. Sin embargo, hay pequeños problemas de forma y terminología: ''encargo del altar'' suena menos natural que una formulación de responsabilidad cultual, y ''Zadoc/Leví'' no sigue la grafía española bíblica más habitual ni la forma usada por el propio proyecto en español.'
  spanish_quality_summary: El español es claro y digno, pero requiere ajustes menores para mayor naturalidad y consistencia. 'Cámara' funciona en contexto arquitectónico. 'Cuya frente mira hacia el norte' es comprensible, aunque algo literal. La principal mejora es reemplazar 'guardan el encargo del altar' por una expresión más idiomática como 'tienen a su cargo el altar'. Además, conviene unificar las grafías propias a 'Sadoc' y 'Leví' para una lectura bíblica más natural en español.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' está correcto; לְשָׁרְתוֹ -> ''ministrarle'' preserva el matiz cultual; בְנֵי צָדוֹק debe ajustarse a ''hijos de Sadoc'' por consistencia ortográfica española; מִבְּנֵי לֵוִי se puede mantener como ''de entre los hijos de Leví''. No hay conflicto doctrinal significativo.'
  issues:
  - severity: medium
    issue: '''guardan el encargo del altar'' suena forzado en español'
    rationale: Aunque intenta reflejar שמרי משמרת, la expresión no es idiomática. Una formulación como 'tienen a su cargo el altar' transmite mejor la responsabilidad cultual sin perder el sentido.
  - severity: medium
    issue: Grafía 'Zadoc' inconsistente con el uso español bíblico más natural
    rationale: En español eclesial y bíblico es más normal 'Sadoc'. El cambio mejora legibilidad y coherencia sin alterar el sentido.
  - severity: low
    issue: Grafía 'Leví' menos habitual que 'Leví' con acento está aceptable, pero debe mantenerse consistente con el texto revisado
    rationale: La forma con acento es válida en español; el punto principal es la consistencia interna con el resto del versículo y nota.
  revised_spanish_text: Y la cámara cuya frente mira hacia el norte es para los sacerdotes que tienen a su cargo el altar. Ellos son los hijos de Sadoc[a], los que de entre los hijos de Leví se acercan a Yahvé para ministrarle.
  revised_footnotes:
  - marker: a
    text: 'O: «los que se acercan de entre los hijos de Leví a Yahvé para servirle».'
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la consistencia del español sin cambiar el sentido del hebreo ni las decisiones del POB: ''tienen a su cargo el altar'' expresa mejor la responsabilidad cultual que ''guardan el encargo del altar'', y ''Sadoc'' normaliza la grafía del nombre propio en español bíblico. Se conservan ''Yahvé'' y ''ministrarle'' por fidelidad terminológica y cultual.'
