lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: LSJ
  rationale: La conjunción simple mantiene la unión narrativa sin añadir matiz temporal o explicativo que el griego no exige.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: LSJ
  rationale: El aoristo de λέγω se vierte de manera natural con «dijo» en una introducción directa del discurso.
- source_word: Μαρδοχαῖος
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: onomastic transliteration
  rationale: Se usa la forma española tradicional del nombre propio, ampliamente reconocible en contexto bíblico.
- source_word: Παρὰ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - por
  - desde
  lexicon: LSJ
  rationale: Con genitivo, παρά expresa aquí procedencia/origen; en español «de Dios» comunica esa fuente de manera natural y fiel.
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el dios
  lexicon: LSJ
  rationale: En este relato judío, ὁ θεός se refiere al único Dios verdadero; en español se omite el artículo igual que en el inglés auditado.
- source_word: ἐγένετο
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - han sucedido
  - han acontecido
  - han llegado a pasar
  lexicon: LSJ
  rationale: γίνομαι aquí puede expresar ocurrencia u origen. «Han venido» preserva la idea de procedencia junto con «de Dios», sin resolver la tensión entre ‘venir’ y ‘suceder’ más de lo que el griego permite.
- source_word: ταῦτα
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estos hechos
  - Estos acontecimientos
  lexicon: LSJ
  rationale: El neutro plural demostrativo se conserva en plural con una forma clara y neutra en español.
theological_decisions:
- issue: Origen divino de los acontecimientos expresado por παρά + genitivo
  english_pob_reading: These things have come from God
  chosen_spanish_reading: Estas cosas han venido de Dios
  alternative_spanish_readings:
  - Estas cosas han sucedido por Dios
  - Estas cosas han acontecido de parte de Dios
  rationale: La frase griega atribuye a Dios la procedencia de los hechos sin detallar el modo de causalidad. «Han venido de Dios» conserva esa atribución de origen y mantiene abierta la relación entre providencia y acontecimiento.
  doctrine_reference: Preservar la tensión teológica sin explicitar un mecanismo causal no dicho por el texto.
translation_notes:
