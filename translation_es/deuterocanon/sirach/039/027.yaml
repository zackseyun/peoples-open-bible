review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: «todas estas cosas» / «para bien» / contraste con los malos / mismo fenómeno que resulta dañino. También conserva correctamente la nota sobre el paralelo griego «los piadosos». Sin embargo, «se tornarán en mal» desplaza el matiz pasivo-reflexivo documentado en inglés («they are turned») hacia un futuro más directo y algo menos natural en español en este contexto. Además, «en mal» suena más forzado que una formulación como «se vuelven dañinas» o «se vuelven para mal».'
  spanish_quality_summary: 'El texto es claro y legible, pero tiene dos puntos mejorables de estilo y naturalidad: «para bien a los buenos» resulta comprensible aunque algo rígido; «se tornarán en mal» suena literario pero menos idiomático en español actual y algo distante del resultado adversativo concreto. Una revisión leve puede mantener la dignidad bíblica y mejorar fluidez.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Impíos» es aceptable para רעים en registro sapiencial, aunque «malvados» o «malos» también serían posibles. La decisión principal que requiere ajuste no es terminológica sino sintáctico-semántica: conviene reflejar mejor el valor de נהפכו como cambio de efecto.'
  issues:
  - severity: medium
    issue: «se tornarán en mal» no refleja óptimamente el matiz de נהפכו
    rationale: El hebreo/inglés auditado subraya que las mismas cosas «son vueltas / se vuelven» dañinas para los impíos. El futuro «se tornarán» puede sonar como simple devenir, y «en mal» no expresa tan claramente el resultado perjudicial.
  - severity: low
    issue: «para bien a los buenos» es algo rígido en español
    rationale: Es fiel, pero una leve reordenación mejora la naturalidad sin perder el paralelismo sapiencial.
  revised_spanish_text: Todas estas cosas son para bien para los buenos[a]; así también, para los impíos, se vuelven dañinas.
