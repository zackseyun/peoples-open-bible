translation:
  language: es
  text: El que se quede en esta ciudad morirá a espada, por hambre y por pestilencia; pero el que salga y se pase[a] a los caldeos que los sitian a ustedes, vivirá[b], y su vida le será como botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "deserte a los caldeos". El modismo hebreo "caer sobre" puede indicar pasarse al bando enemigo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "su vida le será como botín"; es decir, escapará con su vida como única ganancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשֵׁב
  english_pob_choice: the one who stays
  chosen_spanish: el que se quede
  alternatives_spanish:
  - el que permanece
  - el que habita
  - el que se queda en la ciudad
  lexicon: HALOT
  rationale: El participio comunica a la persona que permanece dentro de la ciudad sitiada. En español, "el que se quede" mantiene la fuerza representativa singular y suena natural sin perder el matiz de permanencia.
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - dentro de esta ciudad
  lexicon: HALOT
  rationale: Es una localización directa y sencilla; "esta ciudad" conserva la deixis del hebreo.
- source_word: בַּחֶרֶב וּבָרָעָב וּבַדָּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: a espada, por hambre y por pestilencia
  alternatives_spanish:
  - por la espada, por el hambre y por la pestilencia
  - por guerra, hambre y peste
  lexicon: HALOT
  rationale: '"Espada" conserva el hebraísmo concreto para muerte violenta en guerra. "Hambre" y "pestilencia" mantienen el triángulo de juicio de Jeremías sin suavizarlo con términos más generales.'
- source_word: וְהַיּוֹצֵא
  english_pob_choice: but the one who goes out
  chosen_spanish: pero el que salga
  alternatives_spanish:
  - y el que salga
  - el que salga
  lexicon: HALOT
  rationale: El hebreo contrapone al que permanece con el que sale; en español, "pero" comunica bien el contraste implícito en el contexto.
- source_word: וְנָפַל עַל
  english_pob_choice: defects to
  chosen_spanish: se pase a
  alternatives_spanish:
  - se entregue a
  - defeccione a
  - se vaya con
  lexicon: HALOT
  rationale: El idioma hebreo puede significar irse con el enemigo o pasarse a su bando. "Se pase a" preserva la idea de cambio de lealtad en un español natural, sin añadir una lectura más técnica que podría sonar ajena al registro bíblico.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del texto fuente. "Caldeos" corresponde al término hebreo y evita sustituirlo por una designación histórica explicativa que el hebreo no usa aquí.
- source_word: הַצָּרִים עֲלֵיכֶם
  english_pob_choice: who are besieging you
  chosen_spanish: que los sitian
  alternatives_spanish:
  - que están sitiándolos
  - que los asedian
  lexicon: HALOT
  rationale: El participio describe un sitio militar. "Que los sitian" es claro, directo y refleja el cuadro de asedio sin sobreexplicar.
- source_word: יִחְיֶה
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - seguirá con vida
  - sobrevivirá
  lexicon: HALOT
  rationale: El verbo básico es "vivir"; "vivirá" conserva la forma léxica y deja que el contexto determine que se trata de sobrevivir al sitio.
- source_word: וְהָיְתָה לּוֹ נַפְשׁוֹ לְשָׁלָל
  english_pob_choice: and his life will be to him as plunder
  chosen_spanish: y su vida le será como botín
  alternatives_spanish:
  - y su vida le será por botín
  - y su vida le quedará como botín
  - y su vida será para él como despojo
  lexicon: HALOT
  rationale: La imagen idiomática se conserva con "botín", que refleja el valor de lo único rescatado del desastre. "Su vida" traduce נפש aquí como vida, no como alma, porque el contexto es la supervivencia física.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: HALOT
  rationale: En este dicho de guerra y supervivencia, נפש se refiere a la vida concreta que queda a salvo; "su vida" evita introducir una connotación doctrinal ajena al contexto.
theological_decisions:
- issue: Sentido de נפש en un contexto de asedio y supervivencia
  english_pob_reading: Render נַפְשׁוֹ as 'his life' rather than 'his soul.'
  chosen_spanish_reading: Traducirlo como "su vida" y no como "su alma".
  alternative_spanish_readings:
  - su alma
  - su ser
  rationale: El pasaje trata de sobrevivir físicamente al juicio sobre la ciudad. "Vida" respeta el sentido concreto del hebreo y evita importar una antropología posterior que el texto no exige.
  doctrine_reference: 'Principio POB: preservar la tensión teológica sin resolverla ni sobredeterminarla; no introducir una afirmación doctrinal que el hebreo no formula.'
- issue: Valor del giro idiomático וְנָפַל עַל
  english_pob_reading: defects to the Chaldeans
  chosen_spanish_reading: se pase a los caldeos
  alternative_spanish_readings:
  - se entregue a los caldeos
  - defeccione a los caldeos
  rationale: El hebreo usa un giro de transferencia de lealtad hacia el enemigo. "Se pase a" conserva ese movimiento idiomático sin perder comprensibilidad en español.
  doctrine_reference: 'Principio POB: mantener la imagen cuando sea posible, pero permitiendo una equivalencia óptima cuando el calco resulte poco natural.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del auditor inglés, que prefirió una solución equivalente más natural para el giro idiomático de 'fall over to'. Por eso el español adopta "se pase a" en lugar de un calco como "caiga sobre" o una paráfrasis demasiado explicativa. También conserva la decisión estable de traducir נפש como "vida" en este contexto de juicio y supervivencia.
  spanish_consistency_notes:
  - Se usa "caldeos" para הַכַּשְׂדִּים, coherente con el término del texto fuente.
  - '"Pestilencia" conserva el registro bíblico para דָּבֶר y mantiene el paralelismo de juicio.'
  - '"Botín" reproduce la metáfora del hebreo sin sustituirla por una explicación más larga en el texto principal.'
  - '"Vida" se mantiene para נֶפֶשׁ en esta clase de pasaje, en línea con el audit trail inglés y la política terminológica del proyecto.'
