  - marker: b
    text: O ‘los hijos de Israel’. Aquí la expresión se refiere específicamente a los hijos varones de Jacob, por eso ‘hijos’ es más preciso que una traducción más amplia como ‘descendientes’ o ‘hijos e hijas’.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del borrador pero corrige tres puntos: (1) reemplaza ''sus mujeres'' por ''sus esposas'' para reflejar con precisión נְשֵׁיהֶם; (2) reemplaza ''carros'' por ''carretas'' para evitar una lectura moderna de automóviles y representar mejor עֲגָלוֹת; y (3) reubica la nota [b] al término relevante, ''hijos'', para que la explicación sobre בְנֵי יִשְׂרָאֵל corresponda correctamente al texto anclado.'
