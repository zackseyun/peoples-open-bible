translation:
  language: es
  text: He aquí[a], tú has instruido a muchos, y has fortalecido manos débiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo introduce una afirmación enfática para llamar la atención sobre lo que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: El hebreo es un marcador discursivo de atención. En español, «¡Mira!» conserva el impulso exhortativo e inmediato del original en poesía, sin sonar tan arcaico como «He aquí».
- source_word: יִסַּרְתָּ
  english_pob_choice: have instructed
  chosen_spanish: has instruido
  alternatives_spanish:
  - has disciplinado
  - has corregido
  - has amonestado
  lexicon: HALOT
  rationale: El verbo יסר puede abarcar disciplina, corrección e instrucción mediante corrección. Aquí el contexto retórico presenta la acción como formativa y sabia, por lo que «has instruido» mantiene esa amplitud positiva mejor que una traducción centrada solo en castigo.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  lexicon: HALOT
  rationale: El adjetivo cuantitativo es directo y neutro. «Muchos» es la opción natural en español y refleja la sencillez del hebreo.
- source_word: יָדַיִם רָפוֹת
  english_pob_choice: weak hands
  chosen_spanish: manos débiles
  alternatives_spanish:
  - manos flácidas
  - manos desalentadas
  - manos desfallecidas
  lexicon: HALOT
  rationale: La expresión es idiomática y corporal. «Manos débiles» preserva la metáfora de fuerza reducida con buena claridad en español; otras opciones son posibles, pero menos transparentes o más interpretativas.
- source_word: תְּחַזֵּק
  english_pob_choice: you have strengthened
  chosen_spanish: has fortalecido
  alternatives_spanish:
  - fortaleces
  - has dado fuerza
  - has hecho fuertes
  lexicon: HALOT
  rationale: El pi‘el de חזק expresa fortalecer. El perfecto concuerda con la acción completada en el paralelismo, por lo que «has fortalecido» comunica bien el sentido retrospectivo del pasaje.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantuvo estable: no hubo revisiones aplicadas y el consenso de revisión fue de alta concordancia. La redacción española sigue de cerca esa lectura sin introducir matices no sustentados por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «has instruido» para יסר, en línea con la decisión auditada de la POB inglesa de privilegiar el sentido de instrucción mediante corrección.
  - Se conserva la metáfora corporal «manos débiles» para יָדַיִם רָפוֹת, evitando una paráfrasis abstracta.
  - El marcadordiscursivo inicial se vierte con una exclamación breve para reproducir la fuerza poética de הִנֵּה.
  - El tiempo verbal perfecto compuesto en español refleja adecuadamente el perfecto hebreo en una observación retrospectiva.
