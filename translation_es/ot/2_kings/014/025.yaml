base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/025.yaml
  text: He restored the border of Israel from Lebo-hamath as far as the Sea of the Arabah[a], according to the word of Yahweh, the God of Israel, which he had spoken by the hand of his servant Jonah son of Amittai, the prophet[b], who was from Gath-hepher.
  footnotes:
