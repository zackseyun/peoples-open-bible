  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: conserva el énfasis de αὐτὸς con «Él mismo», mantiene «rey» como predicado, expresa dominio con «sobre los cielos» y vierte κρίνων de manera natural con un verbo finito. Sin embargo, «soberanos» para ἀρχάς no sigue de cerca la decisión auditada del POB («rulers») y en español se superpone demasiado con «reyes», debilitando la distinción del paralelismo.'
