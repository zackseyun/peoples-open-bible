    text: O 'daba gracias en oración'; el hebreo puede entenderse más literalmente como 'cabeza del comienzo, dando gracias en oración', indicando que Matanías presidía o iniciaba la acción de gracias.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'jefe' a 'principal' para reflejar mejor רֹאשׁ en este contexto cultual/listado, y 'iniciaba' a 'comenzaba' para una expresión más natural y estable en español formal. Se mantuvo la nota léxica, anclándola correctamente al texto revisado.
