    issue: «he tendido a Judá como mi arco» debilita la imagen de דָרַךְ ... קֶשֶׁת
    rationale: El hebreo describe el acto de tensar/doblar el arco para usarlo. «Tender» en español no activa con claridad esa imagen y puede sonar impreciso o poco idiomático en este contexto.
  - severity: low
    issue: «Porque» es menos idiomático que «Pues» para la conexión discursiva inicial
    rationale: כִּי aquí introduce fundamento o explicación de la promesa previa. «Porque» es posible, pero «Pues» suena más natural al inicio de una declaración profética conectada al contexto anterior.
  revised_spanish_text: Pues he tensado a Judá como mi arco; con Efraín lo he llenado. Despertaré a tus hijos[a], Sión, contra tus hijos, Grecia, y te haré como espada de guerrero.
