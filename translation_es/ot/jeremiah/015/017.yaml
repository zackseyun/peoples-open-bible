translation:
  language: es
  text: No me senté en la compañía de los que ríen[a], ni me regocijé; por causa de tu mano me senté solo[b], porque me llenaste de indignación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el consejo de los que hacen fiesta' o 'en el círculo de los que se divierten'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'de delante de tu mano'; la frase probablemente significa 'por causa de tu mano' o 'bajo la presión de tu mano'.
    reason: lexical_alternative
  - marker: c
    text: O 'ira' o 'furor' para 'indignación'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  english_pob_choice: I did not sit / I sat
  chosen_spanish: me senté / me senté solo
  alternatives_spanish:
  - habité
  - permanecí
  - me quedé
  lexicon: HALOT
  rationale: En este contexto poético, ישׁב conserva el gesto concreto de 'sentarse' y funciona bien en español junto con la idea de compañía y soledad. 'Habitar' o 'permanecer' serían posibles, pero diluyen la imagen corporal que el texto usa para expresar aislamiento.
- source_word: בְּסוֹד
  english_pob_choice: in the company of
  chosen_spanish: en la compañía de
  alternatives_spanish:
  - en el consejo de
  - en el círculo de
  - en la asamblea de
  lexicon: HALOT
  rationale: סוֹד puede referir un círculo íntimo, consejo o compañía. Aquí el contraste es social y relacional, no institucional, así que 'compañía' comunica mejor la cercanía grupal sin volverlo técnico.
- source_word: מְשַׂחֲקִים
  english_pob_choice: those who laugh
  chosen_spanish: los que se alegran
  alternatives_spanish:
  - los que ríen
  - los que hacen fiesta
  - los burladores
  lexicon: HALOT
  rationale: El participio puede abarcar reír, jugar o festejar. Dado el paralelismo con 'ni me regocijé', 'los que se alegran' expresa el ámbito de gozo social sin estrechar indebidamente el sentido a 'burladores'.
- source_word: וָאֶעְלֹז
  english_pob_choice: nor did I rejoice
  chosen_spanish: ni me regocijé
  alternatives_spanish:
  - ni exulté
  - ni me alegré
  - ni jubile
  lexicon: HALOT
  rationale: עָלַז expresa regocijo/exultación. 'Me regocijé' mantiene dignidad literaria en español y reproduce el contraste con la cláusula anterior sin sonar arcaico.
- source_word: מִפְּנֵי יָדְךָ
  english_pob_choice: because of your hand
  chosen_spanish: por causa de tu mano
  alternatives_spanish:
  - a causa de tu mano
  - debido a tu mano
  - desde delante de tu mano
  lexicon: HALOT
  rationale: La expresión es literalmente 'de/desde delante de tu mano'. En el español de lectura pública, 'por causa de tu mano' conserva la metáfora de la mano divina y comunica con claridad la relación causal, sin borrar la imagen.
- source_word: בָּדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en soledad
  - apartado
  - aislado
  lexicon: HALOT
  rationale: בָּדָד significa estar solo, aparte o aislado. 'Solo' es natural, breve y conserva la carga emocional del verso; 'aislado' o 'apartado' serían más interpretativos.
- source_word: זַעַם
  english_pob_choice: indignation
  chosen_spanish: indignación
  alternatives_spanish:
  - ira
  - enojo
  - furor
  lexicon: HALOT
  rationale: זַעַם puede denotar ira o indignación, a menudo con matiz judicial/divino. 'Indignación' preserva la gravedad y permite mantener la tensión teológica sin fijar excesivamente si el énfasis es emotivo o punitivo.
- source_word: מִלֵּאתָנִי
  english_pob_choice: you filled me
  chosen_spanish: me llenaste
  alternatives_spanish:
  - me has llenado
  - me colmaste
  lexicon: HALOT
  rationale: מלא significa 'llenar'. 'Me llenaste' sigue la secuencia verbal del hebreo y conserva la fuerza directa del agente divino.
theological_decisions:
- issue: Relación entre la mano de Dios y la soledad del profeta
  english_pob_reading: God's hand is rendered as a metaphor for divine pressure/compulsion without paraphrasing it away.
  chosen_spanish_reading: La 'mano' de Yahvé se mantiene como imagen de presión o empuje divino, vinculada a la soledad del profeta.
  alternative_spanish_readings:
  - mano como protección
  - mano como mera presencia
  rationale: El hebreo permite entender que la postura aislada del profeta resulta del peso de la vocación y del mensaje de juicio. La traducción conserva la imagen corporal 'tu mano' para no resolver la ambigüedad ni convertirla en una explicación doctrinal cerrada.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Fuerza de זַעַם
  english_pob_reading: Rendered as 'indignation' rather than explicitly 'wrath' in the main text.
  chosen_spanish_reading: Se traduce 'indignación' en el texto principal, en vez de 'ira' o 'furor'.
  alternative_spanish_readings:
  - ira
  - furor
  - enojo
  rationale: '''Indignación'' mantiene la seriedad del término y deja abierta la tensión: Yahvé llena al profeta con el peso de su juicio/enojo sin que la traducción decida de forma demasiado estrecha entre matiz afectivo o judicial.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; se mantiene la lectura auditada y no hubo ajustes posteriores en el pasaje. El cotejo cruzado reportó alta concordancia (1.0).
  spanish_consistency_notes:
  - Se conservó 'mano' para יָד como metáfora divina, coherente con el tratamiento auditado en inglés.
  - Se prefirió 'indignación' para זַעַם, manteniendo la tensión teológica documentada entre ira, furor e indignación.
  - Se usó 'me senté' para ישׁב y 'solo' para בָּדָד, siguiendo la imagen concreta y relacional del verso.
  - 'El verbo inicial se coordinó con negación simple en español: ''No me senté... ni me regocijé'', evitando sobrecargar el paralelismo hebreo.'
