  yaml_path: translation/deuterocanon/4_maccabees/015/010.yaml
  text: For they were righteous and self-controlled[a], brave and noble-minded and loving their brothers, and so devoted to their mother that, even while keeping the law's requirements to the point of death[b], they obeyed her.
  footnotes:
  - marker: a
    text: Or 'loving their mother.' The Greek adjective can be rendered more literally, but 'devoted to their mother' brings out the sense of affectionate loyalty in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lawful ordinances' or 'the customs prescribed by the law' for 'the law's requirements.'
    reason: lexical_alternative
