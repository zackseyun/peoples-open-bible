translation:
  language: es
  text: El impío fue turbado a causa de sus transgresiones, no sea llevado[a][b] junto con los pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «no cuando sea llevado junto con los pecadores». La cláusula griega μὴ ὅτε συμπαραληφθῇ es sintácticamente difícil; la línea principal la entiende en sentido preventivo: «no sea llevado».'
    reason: alternative_reading
  - marker: b
    text: «Llevado» también puede verterse «arrastrado», «arrebatado» o «llevado juntamente», resaltando la idea de un destino compartido con los pecadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  english_pob_choice: was troubled
  chosen_spanish: fue turbado
  alternatives_spanish:
  - fue trastornado
  - fue perturbado
  - fue inquietado
  lexicon: BDAG / uso bíblico de ταράσσω
  rationale: ταράσσω expresa alteración, turbación o perturbación interior o circunstancial. 'Fue turbado' conserva ese valor de inquietud grave en español bíblico sin reducirlo solo a emoción pasajera.
- source_word: ὁ ἀσεβής
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el inicuo
  - el irreverente
  lexicon: BDAG
  rationale: ἀσεβής subraya falta de piedad o reverencia hacia Dios. 'Impío' es el equivalente más natural y preciso en español para ese campo semántico, más específico que 'malvado'.
- source_word: διὰ παραπτώματα αὐτοῦ
  english_pob_choice: because of his transgressions
  chosen_spanish: a causa de sus transgresiones
  alternatives_spanish:
  - por sus transgresiones
  - a causa de sus faltas
  - por sus ofensas
  lexicon: BDAG
  rationale: διά con acusativo es causal; 'a causa de' reproduce con claridad esa relación. 'Transgresiones' mantiene el peso moral y jurídico de παραπτώματα mejor que términos más débiles como 'faltas'.
- source_word: μὴ ὅτε συμπαραληφθῇ
  english_pob_choice: lest he be taken away
  chosen_spanish: no sea que sea llevado
  alternatives_spanish:
  - para que no sea llevado
  - no cuando sea llevado
  - no sea arrastrado
  lexicon: BDAG
  rationale: La construcción griega es comprimida y admite una lectura preventiva. 'No sea que sea llevado' conserva esa cautela sin forzar una interpretación más cerrada que el texto.
- source_word: μετὰ τῶν ἁμαρτωλῶν
  english_pob_choice: with sinners
  chosen_spanish: junto con los pecadores
  alternatives_spanish:
  - con los pecadores
  - junto a los pecadores
  - con los impíos
  lexicon: BDAG
  rationale: μετά con genitivo marca compañía; 'junto con' expresa mejor la idea de asociación en un mismo destino. 'Pecadores' corresponde naturalmente a ἁμαρτωλοί en este contexto.
theological_decisions:
- issue: Sentido de la cláusula μὴ ὅτε συμπαραληφθῇ
  english_pob_reading: 'The main text takes it in a preventive sense: ''lest he be taken away.'' The note preserves the alternative ''not when he is taken away.'''
  chosen_spanish_reading: 'La línea principal sigue un sentido preventivo: ''no sea que sea llevado''.'
  alternative_spanish_readings:
  - '''no cuando sea llevado'''
  - '''para que no sea llevado'''
  rationale: El griego es sintácticamente difícil y puede leerse de modo preventivo o temporal. La redacción principal preserva la lectura más coherente con el contexto de juicio, sin eliminar la alternativa documentada.
  doctrine_reference: Juicio divino y retribución moral implícita en el texto
- issue: Valor de συμπαραληφθῇ como acción compartida en juicio
  english_pob_reading: '''Taken away'' could also be rendered ''swept away'' or ''taken along together,'' highlighting shared judgment with sinners.'
  chosen_spanish_reading: '''Llevado'' deja abierta la posibilidad de una remoción/juicio compartido sin especificar más de lo que el griego dice.'
  alternative_spanish_readings:
  - '''arrebatado'''
  - '''arrastrado junto con otros'''
  - '''llevado juntamente'''
  rationale: El verbo compuesto sugiere ser tomado juntamente con otros; por eso conviene una forma que no borre la idea de compañía en la acción. 'Llevado junto con' mantiene la ambigüedad útil y la conexión con los pecadores.
  doctrine_reference: Solidaridad en el juicio con los pecadores
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no hubo revisiones aplicadas en el control más reciente; se mantiene la lectura óptima-equivalente con las alternativas documentadas.'
  spanish_consistency_notes:
  - Se usa 'impío' para ὁ ἀσεβής, en línea con el valor religioso-ético del término.
  - '''Transgresiones'' conserva el matiz moral de παραπτώματα sin suavizarlo a ''faltas''.'
  - La cláusula final mantiene la ambigüedad documentada de μὴ ὅτε συμπαραληφθῇ mediante una nota y una traducción preventiva.
  - '''Pecadores'' traduce ἁμαρτωλοί de forma natural y coherente con el campo semántico bíblico.'
