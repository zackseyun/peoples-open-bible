  to: Si se levanta y camina afuera apoyado en su bastón[a], entonces el que lo golpeó quedará exento de responsabilidad; solo deberá pagar por el tiempo que perdió[b] y hacer que lo curen por completo[c].
  rationale: Se ajustó el español para reflejar con más precisión el matiz jurídico de וְנִקָּה y para expresar de manera más idiomática la obligación causativa e intensiva de וְרַפֹּא יְרַפֵּא. También se mejoró la naturalidad de la compensación por שִׁבְתּוֹ sin perder el sentido auditado de tiempo de incapacidad.
