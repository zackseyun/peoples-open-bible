translation:
  language: es
  text: Tomará su celo como armadura[a], y armará a la creación para defensa contra enemigos[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus celos». El griego ζῆλος puede significar «celo» o «celos», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hará de la creación un arma» o «equipará la creación como arma». «Armará a la creación» expresa el sentido de manera natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: λήμψεται
  english_pob_choice: he will take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - tomará para sí
  lexicon: LSJ
  rationale: El futuro de λαμβάνω aquí conserva la imagen de apropiación o asunción activa; «tomará» mantiene el impulso marcial mejor que «recibirá».
- source_word: πανοπλίαν
  english_pob_choice: full armor
  chosen_spanish: armadura
  alternatives_spanish:
  - armadura completa
  - panoplia
  lexicon: LSJ
  rationale: En español, «armadura» comunica de manera natural el equipo total de guerra. «Armadura completa» sería más explícita, pero resulta menos fluida; «panoplia» es menos transparente para lectura pública.
- source_word: τὸν ζῆλον αὐτοῦ
  english_pob_choice: his zeal
  chosen_spanish: su celo
  alternatives_spanish:
  - su celo ardiente
  - su celosía
  - su celos
  lexicon: LSJ
  rationale: ζῆλος puede significar celo o celos. Aquí el contexto guerrero y judicial favorece «celo» como ardor activo; «celos» sonaría demasiado relacional o afectivo en español actual.
- source_word: ὁπλοποιήσει
  english_pob_choice: he will arm
  chosen_spanish: armará
  alternatives_spanish:
  - lo convertirá en arma
  - equipará como armas
  lexicon: LSJ
  rationale: El verbo expresa hacer o proveer de armas. «Armará» preserva la función sin volver la frase forzada, y mantiene la imagen de equipamiento bélico.
- source_word: τὴν κτίσιν
  english_pob_choice: creation
  chosen_spanish: a la creación
  alternatives_spanish:
  - la creación
  - el mundo creado
  lexicon: LSJ
  rationale: «Creación» conserva el alcance cósmico del sustantivo y su fuerza colectiva; el artículo y la preposición ayudan a que la sintaxis española sea natural.
- source_word: εἰς ἄμυναν ἐχθρῶν
  english_pob_choice: for defense against enemies
  chosen_spanish: para defensa contra los enemigos
  alternatives_spanish:
  - para defenderse de los enemigos
  - para repeler enemigos
  lexicon: LSJ
  rationale: ἄμυνα denota defensa o repulsión. «Defensa contra los enemigos» sigue de cerca la construcción griega y mantiene el matiz defensivo que el texto expresa, sin intensificarlo innecesariamente.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: The subject is God, continuing the personified divine-warrior description from the surrounding context.
  chosen_spanish_reading: El sujeto implícito es Dios, continuando la imagen del guerrero divino del contexto inmediato.
  alternative_spanish_readings:
  - Una personificación más abstracta de la justicia divina
  rationale: El pasaje de Sabiduría 5 presenta a Dios actuando como guerrero; conservar la tercera persona singular en español respeta el sujeto implícito sin añadir explicaciones ajenas al verso.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral.'
- issue: Sentido de ζῆλος aplicado a Dios
  english_pob_reading: Rendered as God's zeal functioning metaphorically as armor.
  chosen_spanish_reading: Se traduce como «celo», entendiendo que funciona metafóricamente como armadura divina.
  alternative_spanish_readings:
  - «Celos» de Dios como armadura
  - «ardor» de Dios como armadura
  rationale: «Celo» preserva la tensión léxica entre ardor y posible celosía sin fijarla de modo doctrinal. En español, «celos» podría sonar demasiado psicológico o posesivo; «ardor» pierde el vínculo formal con el campo semántico del griego.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Readable modern English, not archaic or academic.'
translation_notes:
  revision_awareness: 'El inglés auditado mantuvo «full armor» y «arm creation», y la revisión posterior solo afinó la naturalidad de «for defense against enemies». La versión española conserva esa misma línea interpretativa: lenguaje bélico directo, con «celo» para ζῆλος y «armará a la creación» para ὁπλοποιήσει τὴν κτίσιν, sin suavizar la metáfora.'
  spanish_consistency_notes:
  - Se usa «Dios» en las decisiones teológicas porque el contexto de Sabiduría 5 trata del guerrero divino; el texto mismo queda en tercera persona sin añadir nombre propio.
  - Se prefirió «armadura» en lugar de «panoplia» para un registro bíblico público y claro, pero la nota conserva la alternativa literal.
  - «Defensa contra los enemigos» sigue la sintaxis y el matiz defensivo del griego; no se introdujo un sujeto posesivo inexistente en el texto griego.
