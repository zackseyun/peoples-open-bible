translation:
  language: es
  text: 'Así que la mujer se apresuró, corrió y se lo dijo a su marido[a], y le dijo: «Mira, el hombre que vino a mí aquel día se me apareció».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que vino a mí el otro día». La expresión hebrea dice literalmente «que vino a mí en el día» y se refiere a la visita anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - apresuró sus pasos
  lexicon: HALOT
  rationale: מָהַר expresa prisa o rapidez. «Se apresuró» comunica bien la urgencia en español actual y mantiene un registro natural y digno.
- source_word: וַתָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se echó a correr
  - corrió rápidamente
  lexicon: HALOT
  rationale: רוץ indica correr físicamente. «Corrió» conserva el segundo verbo y la intensificación narrativa del hebreo.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo dijo
  alternatives_spanish:
  - le informó
  - lo comunicó
  lexicon: HALOT
  rationale: נגד en piel/hifil tiene el sentido de contar o informar. En español, «se lo dijo» suena natural y reproduce el acto de comunicar sin sobreformalidad.
- source_word: לְאִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: En este contexto doméstico, אִישׁ con sufijo posesivo se refiere idiomáticamente al marido. «Marido» es claro, fiel y evita una lectura demasiado literal e imprecisa.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. «Mira» reproduce la vivacidad del hebreo y encaja bien en diálogo directo.
- source_word: נִרְאָה אֵלַי
  english_pob_choice: has appeared to me
  chosen_spanish: se me ha aparecido
  alternatives_spanish:
  - me ha aparecido
  - ha aparecido ante mí
  lexicon: HALOT
  rationale: El nifal de ראה aquí comunica una aparición percibida por la hablante. «Se me ha aparecido» preserva la vivencia personal y la fuerza perfectiva del reporte.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el personaje
  lexicon: HALOT
  rationale: La mujer lo describe desde su perspectiva inmediata como «el hombre», sin introducir una identificación teológica más amplia que el verso no explicita.
- source_word: אֲשֶׁר בָּא בַיּוֹם אֵלַי
  english_pob_choice: who came to me that day
  chosen_spanish: que vino a mí aquel día
  alternatives_spanish:
  - que vino a mí ese día
  - que vino a mí el otro día
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «que vino a mí en el día». «Aquel día» conserva el carácter retrospectivo y la referencia a una visita previa concreta sin forzar una expresión demasiado literal.
theological_decisions:
- issue: Identidad del 'hombre' en la voz de la mujer
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ángel
  - el mensajero de Dios
  rationale: El contexto mayor identifica al visitador como el ángel de Yahvé, pero en este versículo la mujer habla desde su percepción inmediata y lo llama simplemente «el hombre». La traducción mantiene esa perspectiva sin adelantar una identificación que el verso no hace.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de la expresión temporal hebrea literal
  english_pob_reading: who came to me the other day
  chosen_spanish_reading: que vino a mí aquel día
  alternative_spanish_readings:
  - que vino a mí el otro día
  - que vino a mí ese día
  rationale: La expresión hebrea dice literalmente «en el día» y remite a la visita anterior. «Aquel día» preserva la referencia retrospectiva sin perder naturalidad en español; la alternativa más explícita puede aclararse en nota.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo y la decisión auditada en inglés de mantener dos verbos distintos para la prisa (מיהר / רוץ), de traducir el nifal de ראה como una aparición percibida, y de conservar la perspectiva inmediata de la mujer sin reinterpretar al visitante. No se detectaron cambios de revisión en el contexto inglés que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma POB en español para el nombre divino cuando corresponda, aunque este versículo no lo contiene explícitamente.
  - Se mantuvo «marido» como equivalente contextual de אִישׁ con sufijo posesivo en un entorno doméstico, coherente con el criterio POB de precisión contextual.
  - «Se me ha aparecido» conserva el matiz de acontecimiento reciente y la vivencia personal del habla directa.
  - La nota textual/lexical conserva la alternativa temporal documentada en el audit trail inglés sin convertirla en paráfrasis del texto principal.
