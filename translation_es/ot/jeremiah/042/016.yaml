  text: וְ/הָיְתָ֣ה הַ/חֶ֗רֶב אֲשֶׁ֤ר אַתֶּם֙ יְרֵאִ֣ים מִמֶּ֔/נָּה שָׁ֛ם תַּשִּׂ֥יג אֶתְ/כֶ֖ם בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/הָ/רָעָ֞ב אֲשֶׁר אַתֶּ֣ם דֹּאֲגִ֣ים מִמֶּ֗/נּוּ שָׁ֣ם יִדְבַּ֧ק אַחֲרֵי/כֶ֛ם מִצְרַ֖יִם וְ/שָׁ֥ם תָּמֻֽתוּ־׀׃
