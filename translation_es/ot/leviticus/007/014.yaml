base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/014.yaml
  text: And from it he shall present one from each offering as a contribution to Yahweh[c][b][a]; it shall belong to the priest who sprinkles the blood of the peace offerings.
  footnotes:
