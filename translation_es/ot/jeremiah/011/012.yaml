review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: futuro profético (''Entonces ... irán''), sujetos colectivos (''las ciudades de Judá y los habitantes de Jerusalén''), clamor dirigido a dioses falsos, y negación de salvación en el tiempo de crisis. Sin embargo, la frase temporal española y una nota necesitan ajuste para alinearse mejor con el POB auditado y con la naturalidad del español.'
  spanish_quality_summary: El español es claro y digno, pero 'en el tiempo de su calamidad' suena algo calcado; 'en el tiempo de su angustia' además estrecha demasiado el sentido. 'En el momento de su calamidad' o 'cuando les venga la calamidad' suena más natural. También conviene evitar una nota innecesaria sobre 'ofrecen incienso', ya que no preserva una alternativa significativa del inglés sino una simple reformulación española.
  glossary_alignment: Se mantiene correctamente 'Judá', 'Jerusalén', 'los dioses' para הָאֱלֹהִים en contexto idolátrico, y el lenguaje cultual 'queman incienso'. No hay conflicto con la terminología del proyecto. La única mejora es estilística-semántica en בְּעֵת רָעָתָם, donde conviene una expresión temporal más idiomática en español.
  issues:
  - severity: medium
    issue: La expresión 'en el tiempo de su calamidad' es poco idiomática en español.
    rationale: Aunque comprensible, suena calco del inglés/hebreo. 'En el momento de su calamidad' preserva mejor el valor temporal de בְּעֵת y mejora la fluidez.
  - severity: low
    issue: La nota [a] ('O “a quienes ofrecen incienso”') no preserva una alternativa fuente significativa.
    rationale: El inglés auditado no incluyó nota para esta cláusula relativa; la variante es solo una reformulación estilística española y añade ruido innecesario.
  - severity: medium
    issue: La nota [b] incluye 'angustia', que no corresponde tan bien al campo semántico principal documentado.
    rationale: El POB inglés documenta 'calamity/disaster/trouble'; 'angustia' puede desplazar el sentido hacia una experiencia interna más que hacia calamidad sufrida.
  revised_spanish_text: Entonces las ciudades de Judá y los habitantes de Jerusalén irán y clamarán a los dioses a quienes queman incienso, pero no los salvarán en el momento de su calamidad[a].
  revised_footnotes:
  - marker: a
    text: O 'en el momento de su desastre' o 'en el tiempo de su aflicción'.
    reason: lexical_alternative
  revision_rationale: Se quitó la nota innecesaria sobre 'ofrecen incienso', se reemplazó la expresión temporal por una forma más natural en español ('en el momento de su calamidad') y se ajustó la nota léxica para mantener alternativas cercanas al sentido de רָעָה como calamidad sufrida, sin introducir una opción menos precisa como 'angustia'.
