translation:
  language: es
  text: Contra ti —y contra ti solo[a]— he pecado, y he hecho lo malo a tus ojos[b], para que seas justificado en tus palabras y quedes sin culpa en tu juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Contra ti solo he pecado». El hebreo enfatiza a Dios como la parte ofendida última.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que seas justificado en tus palabras y puro cuando juzgues».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְךָ לְבַדְּךָ
  english_pob_choice: Against you—you alone—
  chosen_spanish: Contra ti, contra ti solo[a]
  alternatives_spanish:
  - A ti, a ti solo
  - Contra ti solamente
  lexicon: HALOT
  rationale: 'La construcción con לְ y el énfasis de לְבַדְּךָ en un contexto confesional se rinde de forma natural como una afirmación de ofensa dirigida a Dios: «Contra ti». Repetir «contra ti» conserva el énfasis del hebreo mejor que una sola mención. «Solo» mantiene la exclusividad sin suavizar la tensión teológica.'
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he cometido pecado
  - pequé
  lexicon: HALOT
  rationale: 'El perfecto hebreo en confesión se expresa bien en español con el pretérito perfecto compuesto: «he pecado». Mantiene el valor de confesión presente y no suena tan abstracto como una perífrasis más literal.'
- source_word: וְהָרַע
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - lo que es malo
  - el mal
  lexicon: HALOT
  rationale: El artículo sustantivando el adjetivo se vierte con un neutro natural en español. «Lo malo» conserva la categoría moral sin forzar una formulación demasiado pesada.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: a tus ojos
  alternatives_spanish:
  - en tus ojos
  - a tu vista
  lexicon: HALOT
  rationale: 'La imagen hebrea se conserva en español con la preposición «a» en el valor evaluativo: «a tus ojos». Es idiomático y refleja la evaluación divina sin explicitarla de más.'
- source_word: עָשִׂיתִי
  english_pob_choice: I have done
  chosen_spanish: he hecho
  alternatives_spanish:
  - hice
  - he cometido
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «he pecado» mediante el perfecto compuesto. «He hecho» es sobrio y fiel al acto ya confesado.
- source_word: תִּצְדַּק
  english_pob_choice: may be justified
  chosen_spanish: seas justificado
  alternatives_spanish:
  - seas declarado justo
  - quedes justificado
  lexicon: HALOT
  rationale: La raíz צדק en este marco judicial-moral admite «justificado» como forma transparente en español. Aunque «declarado justo» es una alternativa posible, la forma verbal mantiene mejor el paralelismo con la tradición exegética y la revisión inglesa más reciente.
- source_word: בְּדָבְרֶךָ
  english_pob_choice: in your words
  chosen_spanish: en tus palabras
  alternatives_spanish:
  - en lo que dices
  - en tu palabra
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo puede expresarse naturalmente en plural en español como «palabras», siguiendo el criterio del auditorio inglés de conservar la naturalidad sin perder cercanía al hebreo.
- source_word: תִּזְכֶּה
  english_pob_choice: blameless
  chosen_spanish: seas hallado limpio
  alternatives_spanish:
  - seas puro
  - quedes limpio
  lexicon: HALOT
  rationale: El verbo זכה en paralelo judicial puede expresar pureza o quedar sin culpa. «Seas hallado limpio» preserva la idea de vindicación/pureza sin imponer un tecnicismo doctrinal ajeno al paralelismo.
- source_word: בְשָׁפְטֶךָ
  english_pob_choice: in your judgment
  chosen_spanish: en tu juicio
  alternatives_spanish:
  - cuando juzgas
  - en tu juzgar
  lexicon: HALOT
  rationale: «Juicio» conserva el campo judicial y suena natural en español. Se evita el giro más verbal para mantener el paralelismo con «en tus palabras».
theological_decisions:
- issue: La confesión «contra ti, contra ti solo» frente al hecho de que el pecado también daña a otros
  english_pob_reading: Retain the absolute God-directed wording without softening it
  chosen_spanish_reading: Conservar el lenguaje absoluto dirigido a Dios sin atenuarlo
  alternative_spanish_readings:
  - Contra ti sobre todo
  - Contra ti principalmente
  rationale: 'El hebreo presenta la confesión con máxima fuerza teológica: el pecado es, en última instancia, contra Dios. La traducción debe preservar esa tensión sin introducir matices interpretativos que no están en el texto.'
  doctrine_reference: Mantener la tensión teológica; no resolverla en el texto principal.
- issue: El valor forense-moral de «seas justificado» y «seas hallado limpio»
  english_pob_reading: Render God's vindication in judicial-moral terms ('may be justified' / 'blameless')
  chosen_spanish_reading: Traducir la vindicación divina en términos judiciales y morales
  alternative_spanish_readings:
  - seas declarado justo ... seas puro
  - quedes justificado ... seas limpio
  rationale: El paralelismo final afirma la rectitud de Dios en su palabra y juicio. «Justificado» y «hallado limpio» conservan el marco forense sin cargar el versículo con desarrollos doctrinales ajenos.
  doctrine_reference: Equivalencia óptima; respetar el marco judicial del hebreo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que movió la cláusula final hacia un valor más directo de «may be justified» y conservó el paralelismo judicial. Se ha evitado depender mecánicamente del inglés anterior y se ha tomado como guía la forma hebrea y el ajuste auditado más reciente.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por la segunda persona; no se introduce «SEÑOR» porque el versículo no contiene el tetragrámaton.
  - Se conserva el registro confesional y judicial con verbos en perfecto compuesto para reflejar el hebreo perfectivo en contexto de arrepentimiento.
  - «Justificado» se usa en sentido forense, no como terminología doctrinal de un sistema posterior.
  - La duplicación «Contra ti, contra ti» reproduce el énfasis hebreo de לְךָ לְבַדְּךָ.
  - «Hallado limpio» mantiene la idea de pureza/vindicación sin volver el texto más técnico de lo necesario.
