revisions:
- from: Mi pacto con él fue de vida y paz[a], y se las di; esto exigía reverencia, y él me reverenció[b], y se mostró sobrecogido ante mi nombre.
  to: Mi pacto con él fue de vida y paz, y se las di a él[a]; esto exigía reverencia, y él me mostró reverencia, y quedó sobrecogido[b] ante mi nombre.
  rationale: 'La revisión corrige tres puntos: (1) restituye el dativo explícito «a él» de וָאֶתְּנֵם לוֹ; (2) reubica la nota [a] en el lugar donde realmente aplica la observación sobre la sintaxis comprimida; y (3) mejora la naturalidad del español con «me mostró reverencia» en lugar de «me reverenció», sin apartarse de la decisión interpretativa del POB. Se mantiene «quedó sobrecogido» como buena solución para נִחַת en contexto positivo, con alternativas preservadas en nota.'
