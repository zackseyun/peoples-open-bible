translation:
  language: es
  text: Y Judas y su campamento se volvieron de repente por el camino hacia el desierto, en dirección a Bosor; y capturó la ciudad, y mató a todo varón a filo de espada[a], y tomó todos sus despojos, y la incendió con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la boca de la espada»; es un giro idiomático que significa muerte a espada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - cambió de rumbo
  lexicon: LSJ
  rationale: El verbo expresa cambio de dirección en un movimiento militar. 'Se volvió' conserva la acción de volverse o cambiar de rumbo sin añadir la idea de retirada.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su ejército
  - su fuerza
  lexicon: LSJ
  rationale: παρεμβολή designa propiamente un campamento o fuerza acampada. 'Campamento' mantiene el concreto militar del griego.
- source_word: ὁδὸν εἰς τὴν ἔρημον
  english_pob_choice: by the road into the wilderness
  chosen_spanish: por el camino hacia el desierto
  alternatives_spanish:
  - por el camino al desierto
  - por la senda del desierto
  lexicon: LSJ
  rationale: La construcción es comprimida; en español conviene expresar el trayecto con naturalidad, conservando 'camino' y la dirección hacia 'el desierto'.
- source_word: εἰς Βοσὸρ
  english_pob_choice: toward Bosor
  chosen_spanish: hacia Bosor
  alternatives_spanish:
  - a Bosor
  lexicon: LSJ
  rationale: La preposición indica movimiento direccional. 'Hacia' refleja bien el avance orientado al lugar nombrado.
- source_word: ἄφνω
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - inesperadamente
  lexicon: LSJ
  rationale: El adverbio marca brusquedad en la maniobra. 'De repente' es natural en español y preserva esa inmediatez.
- source_word: κατελάβετο
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - se apoderó de
  - tomó
  lexicon: LSJ
  rationale: En contexto militar el verbo es apoderarse de una ciudad. 'Capturó' es preciso y idiomático en español moderno.
- source_word: πᾶν ἀρσενικόν
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todos los varones
  lexicon: LSJ
  rationale: El griego es literal y amplio. 'Varón' conserva el alcance personal y evita el tono demasiado técnico de 'males' en español.
- source_word: ἐν στόματι ῥομφαίας
  english_pob_choice: with the edge of the sword
  chosen_spanish: con la boca de la espada[a]
  alternatives_spanish:
  - con el filo de la espada
  - a filo de espada
  lexicon: LSJ
  rationale: Se mantiene la metáfora literal del griego, 'en la boca de la espada', que en español se entiende mejor como 'con la boca de la espada'. La nota explica el sentido idiomático y la alternativa establecida.
- source_word: τὰ σκῦλα
  english_pob_choice: spoils
  chosen_spanish: los despojos
  alternatives_spanish:
  - el botín
  - las riquezas tomadas
  lexicon: LSJ
  rationale: '''Despojos'' reproduce el término de guerra con registro bíblico adecuado y conserva la concreción del saqueo.'
- source_word: ἐνέπρησεν αὐτὴν πυρί
  english_pob_choice: burned it with fire
  chosen_spanish: la incendió con fuego
  alternatives_spanish:
  - la quemó con fuego
  - la prendió fuego
  lexicon: LSJ
  rationale: El griego incluye explícitamente 'con fuego'; 'incendió' comunica el acto con fuerza, y 'con fuego' preserva el énfasis del original.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una equivalencia óptima: ''turned'', ''captured'', ''spoils'' y la nota sobre ''in the mouth of the sword''. La versión española conserva ese mismo balance, pero evita calcos innecesarios donde el español requeriría una formulación más natural, sin perder la metáfora crucial del idiomático ''στόματι ῥομφαίας''.'
  spanish_consistency_notes:
  - Se mantiene 'Bosor' como transliteración del topónimo.
  - Se usa 'campamento' para παρεμβολή por coherencia con el sentido militar concreto.
  - '''Despojos'' y ''incendió con fuego'' conservan el registro narrativo bélico de la perícopa.'
  - La nota al pie explica la metáfora hebraizante del arma sin reemplazarla en el texto principal por una paráfrasis plana.
