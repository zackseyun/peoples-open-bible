  yaml_path: translation/ot/2_samuel/016/004.yaml
  text: Then the king said to Ziba[a], “Behold, all that belongs to Mephibosheth is yours.” And Ziba said, “I bow down; may I find favor in your eyes, my lord the king.”
  footnotes:
