  rationale: '북극성 원칙: 저자가 의도한 「신적 부르심」의 칠층층층 운율을 그대로 옮긴다. 「어찌하여」를 「왜」로 옮긴 것은 현대 합쇼체 등록에 맞추되, 호격의 무게는 보존한다.'
