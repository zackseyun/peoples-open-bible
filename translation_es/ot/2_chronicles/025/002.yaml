review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: acción positiva evaluada por Yahvé seguida por una calificación adversativa sobre la falta de devoción completa. «A los ojos de Yahvé» preserva correctamente בְּעֵינֵי יְהוָה, y «pero» comunica adecuadamente רַק en este contexto. Sin embargo, «con un corazón íntegro» puede desplazar levemente el énfasis de totalidad/completitud de שָׁלֵם hacia integridad moral; el inglés auditado y la nota favorecen más claramente la idea de corazón entero/completo.'
  spanish_quality_summary: 'El español es claro y digno. «Él hizo lo recto a los ojos de Yahvé» suena natural y fiel. La principal mejora es estilística-semántica: «no con un corazón entero» suena más directamente bíblico y preserva la metáfora de totalidad sin sugerir tanto la cualidad ética de integridad. La nota también debe ajustarse para alinear mejor las alternativas y evitar que «íntegro» funcione como literal primario de «completo/entero».'
  glossary_alignment: Se respeta correctamente la política del proyecto al usar «Yahvé» para יְהוָה. No hay conflictos con otros términos doctrinales. La revisión propuesta mejora la alineación con la decisión inglesa «with a whole heart» y con la rationale teológica de devoción incompleta, sin intensificarla a «corazón dividido».
  issues:
  - severity: medium
    issue: «corazón íntegro» no es la mejor equivalencia de בְּלֵבָב שָׁלֵם
    rationale: Aunque es defendible, «íntegro» en español puede oírse más como rectitud moral o incorruptibilidad que como totalidad/entereza. El hebreo y la auditoría inglesa enfatizan un corazón entero/completo, es decir, una devoción no plena.
  - severity: low
    issue: La nota al pie necesita realinearse con la formulación revisada
    rationale: La nota actual explica «completo/íntegro», pero si se adopta «entero» en el texto principal conviene que las alternativas y la glosa literal correspondan exactamente al nuevo anclaje y a la rationale lexical del inglés.
  revised_spanish_text: Él hizo lo recto a los ojos de Yahvé[a], pero no con un corazón entero.
  revised_footnotes:
  - marker: a
    text: O «no con un corazón perfecto» o «no de todo corazón». El hebreo dice «no con un corazón entero/completo», refiriéndose a una devoción incompleta.
    reason: lexical_alternative
  revision_rationale: Se revisa «con un corazón íntegro» a «con un corazón entero» para reflejar más de cerca la idea de corazón completo/whole heart en el hebreo שָׁלֵם y en la auditoría inglesa, preservando la tensión teológica de obediencia externa con lealtad interna incompleta. La nota se ajusta para mantener coherencia con esa decisión léxica.
