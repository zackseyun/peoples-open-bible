translation:
  language: es
  text: ¡Ay de los que son héroes[a] para beber vino, y hombres de vigor[b] para mezclar bebida embriagante!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres poderosos» para «héroes». El hebreo suele referirse a guerreros o hombres de gran capacidad, pero aquí se aplica irónicamente a su habilidad para beber.
    reason: lexical_alternative
  - marker: b
    text: O «hombres de valor». La expresión normalmente designa hombres valientes o competentes; aquí se usa sarcásticamente en paralelo con «héroes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֕וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de…!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los…!
  - ¡Pobre de los…!
  lexicon: HALOT
  rationale: El interjección profética expresa denuncia y lamento. En español, «¡Ay de…!» conserva ese tono oracular y la fuerza de advertencia mejor que un simple «woe» transliterado o una paráfrasis explicativa.
- source_word: גִּבּוֹרִ֖ים
  english_pob_choice: heroes
  chosen_spanish: héroes
  alternatives_spanish:
  - hombres poderosos
  - hombres valientes
  - guerreros
  lexicon: HALOT
  rationale: El POB inglés eligió «heroes» para mantener la ironía; en español, «héroes» reproduce bien esa ironía y resulta natural en una denuncia profética, sin forzar un marco militar que el contexto invierte sarcásticamente.
- source_word: לִ/שְׁתּ֣וֹת
  english_pob_choice: at drinking
  chosen_spanish: para beber
  alternatives_spanish:
  - al beber
  - en beber
  - para el beber
  lexicon: HALOT
  rationale: El infinitivo con ל indica la esfera o habilidad en la que se consideran destacados. «Para beber» comunica esa aptitud sin sonar rígido; «al beber» también sería posible, pero menos directo en este tipo de oráculo.
- source_word: יָ֑יִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - vino
  lexicon: HALOT
  rationale: «Vino» es el equivalente normal de יַיִן y preserva la generalidad del término hebreo.
- source_word: וְ/אַנְשֵׁי חַ֖יִל
  english_pob_choice: men of strength
  chosen_spanish: hombres de vigor
  alternatives_spanish:
  - hombres de valor
  - hombres valientes
  - hombres fuertes
  lexicon: HALOT
  rationale: La expresión puede referirse a hombres capaces, valientes o poderosos. «Hombres de vigor» mantiene la idea de fuerza/proeza sin imponer un matiz militar demasiado estrecho; además conserva mejor el paralelismo irónico con «héroes».
- source_word: לִ/מְסֹ֥ךְ
  english_pob_choice: at mixing
  chosen_spanish: para mezclar
  alternatives_spanish:
  - al mezclar
  - para preparar
  - para mezclarlo
  lexicon: HALOT
  rationale: El verbo se refiere a mezclar, especialmente bebida alcohólica. «Para mezclar» reproduce el valor funcional del infinitivo con ל y mantiene el paralelismo con «para beber».
- source_word: שֵׁכָֽר
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida fuerte
  - bebida embriagante
  - aguardiente
  lexicon: HALOT
  rationale: «Licor fuerte» comunica el sentido de bebida intoxicante sin especificar indebidamente un tipo moderno de alcohol. Evita «cerveza», que sería demasiado concreto, y preserva la amplitud del hebreo.
theological_decisions:
- issue: Tono irónico de la denuncia profética
  english_pob_reading: heroes / men of strength used sarcastically of drinking prowess
  chosen_spanish_reading: héroes / hombres de vigor usados irónicamente para describir destreza en beber y mezclar alcohol
  alternative_spanish_readings:
  - valientes de beber
  - mártires de la bebida
  - expertos bebedores
  rationale: El hebreo usa términos de excelencia y poder en un contexto de reproche. La traducción debe conservar esa inversión irónica, no neutralizarla ni convertirla en simple descripción moral.
  doctrine_reference: Isaías 5:22; ironía profética en oráculos de juicio
translation_notes:
  revision_awareness: El contexto auditado del POB inglés permanece sin cambios sustanciales en la última revisión; se mantiene la lectura irónica y el paralelismo de dos miembros. No se detectan revisiones aplicadas que requieran ajustar el español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el sistema terminológico del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se prefirió «licor fuerte» frente a opciones más específicas para no sobretraducir שֵׁכָר.
  - La estructura con dos sintagmas paralelos («para beber vino», «para mezclar licor fuerte») sigue el hebreo y el análisis del POB inglés.
