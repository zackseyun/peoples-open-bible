translation:
  language: es
  text: Por tanto, volveré y tomaré de nuevo mi grano en su tiempo, y mi vino nuevo en su tiempo señalado; y quitaré[a] mi lana y mi lino, que eran para cubrir su desnudez[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'arrebataré' para el verbo hebreo וְהִצַּלְתִּי, enfatizando una remoción repentina.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''su desnudez''; el término también puede implicar vergüenza por la exposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Entonces
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión o consecuencia del discurso profético con naturalidad en español, manteniendo la lógica de juicio que introduce el verso.
- source_word: אָשׁוּב
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - regresaré
  - daré la vuelta
  lexicon: HALOT
  rationale: En español, 'volver' comunica de forma más idiomática la idea de retorno divino sin forzar un calco.
- source_word: וְלָקַחְתִּי
  english_pob_choice: and take back
  chosen_spanish: tomaré de nuevo
  alternatives_spanish:
  - tomaré
  - recobraré
  - quitaré
  lexicon: HALOT
  rationale: El contexto es de recuperación/reversión de dones concedidos; 'tomaré de nuevo' preserva la idea de reposición sin perder el valor de לקח como 'tomar'.
- source_word: דְגָנִי
  english_pob_choice: my grain
  chosen_spanish: mi grano
  alternatives_spanish:
  - mi cereal
  - mi cosecha
  lexicon: HALOT
  rationale: '''Grano'' reproduce el término agrícola general con claridad moderna y sin archaísmo.'
- source_word: בְּעִתּוֹ
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - cuando le corresponde
  lexicon: HALOT
  rationale: Conserva la referencia al momento apropiado o debido del producto, con una formulación natural en español.
- source_word: וְתִירוֹשִׁי
  english_pob_choice: my new wine
  chosen_spanish: mi vino nuevo
  alternatives_spanish:
  - mi mosto
  - mi vino fresco
  lexicon: HALOT
  rationale: '''Vino nuevo'' preserva el matiz de תירוש como producto reciente de la cosecha, sin sustituirlo por ''mosto'', que puede sonar más técnico o regional.'
- source_word: בְּמוֹעֲדוֹ
  english_pob_choice: in its season
  chosen_spanish: en su temporada
  alternatives_spanish:
  - en su estación
  - en su tiempo señalado
  lexicon: HALOT
  rationale: '''Temporada'' funciona bien para el paralelismo agrícola y comunica la idea del tiempo propio o señalado del fruto.'
- source_word: וְהִצַּלְתִּי
  english_pob_choice: and I will take away
  chosen_spanish: quitaré
  alternatives_spanish:
  - arrancaré
  - arrebataré
  - tomaré away
  lexicon: HALOT
  rationale: El hiphil de נצל puede implicar retirar súbitamente; en español 'quitaré' expresa la remoción de manera breve y directa. La nota preserva la alternativa más enfática.
- source_word: צַמְרִי
  english_pob_choice: my wool
  chosen_spanish: mi lana
  alternatives_spanish:
  - mi lana de oveja
  lexicon: HALOT
  rationale: '''Lana'' es el equivalente natural de צמר y conserva el material textil mencionado en paralelo con el lino.'
- source_word: וּפִשְׁתִּי
  english_pob_choice: and my flax
  chosen_spanish: mi lino
  alternatives_spanish:
  - mi lino de lino
  - mi fibra de lino
  lexicon: HALOT
  rationale: Aunque el hebreo se refiere a la materia prima 'flax', el contexto de cobertura textil en español se expresa con mayor claridad mediante 'lino', manteniendo el paralelo con 'lana' y el uso para vestimenta/cobertura.
- source_word: לְכַסּוֹת
  english_pob_choice: which were to cover
  chosen_spanish: que eran para cubrir
  alternatives_spanish:
  - para cubrir
  - destinados a cubrir
  lexicon: HALOT
  rationale: La cláusula de propósito se vierte de modo explícito para mostrar la función de esos materiales en el contexto.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su vergüenza
  - su desnudez descubierta
  lexicon: HALOT
  rationale: '''Desnudez'' preserva la imagen concreta y la carga de exposición/shame del hebreo. El posesivo en español se adapta al referente implícito femenino del contexto.'
theological_decisions:
- issue: Cómo reflejar la lógica de juicio y reversión de dones en el verso
  english_pob_reading: Use 'take back' for לקח while keeping the rest of the verse close to the Hebrew
  chosen_spanish_reading: tomaré de nuevo
  alternative_spanish_readings:
  - tomaré
  - recobraré
  rationale: La frase española conserva la idea de que YHWH revoca lo que había concedido, sin ampliar innecesariamente el contenido doctrinal ni perder el matiz de reversión pactual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo conservar la imagen de vergüenza/exposición en עֶרְוָתָהּ
  english_pob_reading: Retain 'her nakedness' in the main text
  chosen_spanish_reading: su desnudez
  alternative_spanish_readings:
  - su vergüenza
  - su desnudez descubierta
  rationale: La metáfora profética es deliberadamente corporal y vergonzante; 'desnudez' mantiene el golpe retórico y evita suavizar el texto en exceso.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El paquete de origen y el audit trail en inglés muestran alta concordancia y no registran revisiones aplicadas; se mantiene una formulación española fiel al hebreo, con ajuste idiomático moderado para claridad y lectura pública.
  spanish_consistency_notes:
  - Se mantiene 'YHWH' como 'Yahvé' solo cuando aparezca explícitamente el nombre divino; en este verso no aparece.
  - Se preserva el paralelismo agrícola (grano/vino nuevo/lana/lino) sin introducir términos litúrgicos ajenos al hebreo.
  - '''Desnudez'' se conserva para no neutralizar la imagen profética de exposición y vergüenza.'
