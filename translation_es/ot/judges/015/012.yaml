translation:
  language: es
  text: 'Ellos le dijeron: «Hemos descendido para atarte, para entregarte en manos[a] de los filisteos». Sansón les dijo: «Júrenme que ustedes mismos[b] no caerán sobre mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para darte en la mano de los filisteos». El hebreo dice literalmente «darte en la mano de», un modismo para poner a alguien bajo el poder de otro.
    reason: lexical_alternative
  - marker: b
    text: O «que ustedes mismos no me atacarán». El verbo hebreo puede denotar un asalto violento en este contexto; «caer sobre mí» preserva mejor el giro original.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאֱסָרְךָ
  english_pob_choice: to bind you
  chosen_spanish: atarte
  alternatives_spanish:
  - ligarte
  - sujertarte
  lexicon: HALOT
  rationale: אָסַר expresa la acción de sujetar o poner bajo restricción. En español, «atarte» es natural y conserva la idea concreta de inmovilizar, sin sobrecargar el texto con un matiz jurídico que el hebreo no exige aquí.
- source_word: יָרַדְנוּ
  english_pob_choice: we have come down
  chosen_spanish: Hemos descendido
  alternatives_spanish:
  - Hemos bajado
  - Bajamos
  lexicon: HALOT
  rationale: יַרַד conserva el movimiento espacial hacia abajo. «Hemos descendido» mantiene ese valor direccional y suena adecuado en un registro bíblico digno.
- source_word: לְתִתְּךָ בְּיַד
  english_pob_choice: to give you into the hand of
  chosen_spanish: para entregarte en manos de
  alternatives_spanish:
  - para ponerte en manos de
  - para darte en mano de
  lexicon: HALOT
  rationale: נתן בְּיַד es un giro idiomático de entrega a poder ajeno. «Entregarte en manos de» conserva la imagen hebrea de «mano» y comunica bien la idea de poner a alguien bajo dominio o control.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  lexicon: HALOT
  rationale: La transliteración habitual en español bíblico es «filisteos». Mantiene identificación histórica y lectura fluida.
- source_word: הִשָּׁבְעוּ לִי
  english_pob_choice: Swear to me
  chosen_spanish: Júrenme
  alternatives_spanish:
  - Háganme juramento
  - Prométanme bajo juramento
  lexicon: HALOT
  rationale: El imperativo nifal de שׁבע exige lenguaje de juramento, no mera promesa. «Júrenme» es breve, imperativo y fiel al peso solemne del verbo.
- source_word: פֶּן
  english_pob_choice: that ... not
  chosen_spanish: que ustedes no
  alternatives_spanish:
  - para que no
  - no sea que
  lexicon: HALOT
  rationale: פֶּן introduce una prevención negativa. En español, la construcción «que ustedes no» expresa de manera natural la cautela exigida por el contexto del juramento.
- source_word: תִּפְגְּעוּן בִּי
  english_pob_choice: you yourselves will not fall upon me
  chosen_spanish: caerán sobre mí
  alternatives_spanish:
  - me atacarán
  - se lanzarán contra mí
  lexicon: HALOT
  rationale: פגע puede significar «caer sobre», «atacar» o «golpear» según contexto. Dado el valor idiomático preservado por la revisión inglesa, «caerán sobre mí» reproduce de cerca la imagen verbal sin interpretar más de lo necesario.
- source_word: אַתֶּם
  english_pob_choice: you yourselves
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - ustedes en persona
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis. En español, ese énfasis queda suficientemente marcado por la forma enfática del discurso directo; por eso se conserva «ustedes» sin añadir una glosa pesada en el cuerpo del texto.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir «para entregarte en manos de» como reflejo más cercano de נתן ביד y «caerán sobre mí» para preservar el matiz idiomático de פגע. También se mantuvo la fuerza del juramento con un imperativo breve y solemne.
  spanish_consistency_notes:
  - Se conserva «manos de» para reflejar el hebreo idiomático, sin sustituirlo por una explicación abstracta en el texto principal.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el pasaje.
  - «Filisteos» sigue la transliteración estándar y clara para lectores de español.
  - El énfasis de אַתֶּם se deja implícito en el discurso directo; el matiz se explica en nota en lugar de sobrecargar la frase principal.
