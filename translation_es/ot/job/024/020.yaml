translation:
  language: es
  text: El vientre lo olvida; el gusano se alimenta dulcemente de él[a]. Ya no se le recuerda[b], y la injusticia se quiebra como un árbol[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el gusano lo halla dulce». El hebreo expresa que el gusano lo encuentra dulce como alimento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ya no será recordado». El hebreo expresa cese de recuerdo.'
    reason: alternative_reading
  - marker: c
    text: 'O: «el injusto» o «el malvado». El hebreo usa un sustantivo abstracto que puede funcionar por metonimia para la persona.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁכָּחֵהוּ / רֶחֶם
  english_pob_choice: The womb forgets him
  chosen_spanish: El vientre se olvida de él
  alternatives_spanish:
  - El vientre lo olvida
  - La matriz se olvida de él
  - Se olvida de él el vientre
  lexicon: HALOT
  rationale: Se conserva la imagen literal de רֶחֶם como 'vientre', que en español comunica la referencia materna sin forzar una expansión interpretativa. 'Se olvida de él' mantiene el valor gnómico y la personificación del sujeto, en línea con el inglés POB.
- source_word: מְתָקוֹ / רִמָּה
  english_pob_choice: feeds sweetly on him
  chosen_spanish: se deleita en él
  alternatives_spanish:
  - se alimenta dulcemente de él
  - le sabe dulce
  - encuentra dulce su alimento
  lexicon: HALOT
  rationale: El hebreo expresa la idea de 'ser dulce' respecto del gusano; en español, 'se deleita en él' reproduce de forma natural la ironía macabra sin perder el matiz de gusto/agrado que el POB intentó conservar. Se evita una frase demasiado mecánica que sonaría poco idiomática.
- source_word: ע֥וֹד לֹֽא יִזָּכֵר
  english_pob_choice: He is remembered no more
  chosen_spanish: Ya no se le recuerda
  alternatives_spanish:
  - No se lo recuerda más
  - No volverá a ser recordado
  - Se le recuerda no más
  lexicon: HALOT
  rationale: La construcción hebrea indica cesación de la memoria; el español impersonal 'se le recuerda' conserva el pasivo y suena natural. 'Ya no' refleja היטב la fuerza de עוֹד לֹא como 'ya no / no más'.
- source_word: וַתִּשָּׁבֵר
  english_pob_choice: is broken
  chosen_spanish: se quiebra
  alternatives_spanish:
  - es quebrada
  - se rompe
  - queda quebrada
  lexicon: HALOT
  rationale: '''Se quiebra'' mantiene el pasivo y la imagen de fragilidad con un verbo más idiomático en español que ''es quebrada''. El POB usa ''is broken'' para preservar la compactación poética; aquí se conserva esa concisión.'
- source_word: כָּעֵץ
  english_pob_choice: like a tree
  chosen_spanish: como un árbol
  alternatives_spanish:
  - como árbol
  - como madera
  - como un tronco
  lexicon: HALOT
  rationale: Se mantiene la comparación directa con עֵץ como 'árbol', que es la equivalencia más clara y reconocible en español y preserva el paralelismo con el hebreo.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la maldad
  - la perversidad
  - el injusto
  lexicon: HALOT
  rationale: Se sigue la revisión del POB hacia 'injustice' por ser más natural en contexto, pero se conserva la forma abstracta del hebreo. El artículo definido refuerza la entidad abstracta y mantiene abierta la posibilidad metonímica del evildoer.
theological_decisions:
- issue: Si עַוְלָה debe entenderse como abstracción o como persona malvada.
  english_pob_reading: 'abstract: ''injustice is broken like a tree'''
  chosen_spanish_reading: 'abstracta: ''la injusticia se quiebra como un árbol'''
  alternative_spanish_readings:
  - '''el injusto se quiebra como un árbol'''
  - '''el malvado se quiebra como un árbol'''
  rationale: Se conserva la lectura abstracta porque el sustantivo hebreo es una abstracción y la filosofía POB prioriza la forma del original. La lectura concreta se deja implícitamente posible, pero no se adopta en el texto principal para no borrar la tensión semántica documentada.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cómo reflejar la personificación del vientre y la imagen del gusano en el juicio sobre el impío.
  english_pob_reading: The womb forgets him; the worm feeds sweetly on him.
  chosen_spanish_reading: El vientre se olvida de él; el gusano se deleita en él.
  alternative_spanish_readings:
  - El vientre lo olvida; el gusano se alimenta dulcemente de él.
  rationale: La personificación se conserva sin suavizar el tono macabro. 'Se deleita' comunica el contraste irónico de 'dulce' aplicado al gusano, evitando perder el forcejeo entre literalidad e inteligibilidad que el POB documenta.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del POB en inglés, que cambió 'unrighteousness' por 'injustice' para hacer más natural עַוְלָה sin abandonar la forma abstracta. La versión española sigue esa decisión y conserva la posibilidad de lectura concreta en nota, alineada con el historial de revisión y el acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - '''Gusano'' se mantuvo como equivalente directo de רִמָּה, sin especificar ''larva'' o ''manguito'', para conservar la fuerza de la imagen.'
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al texto.
  - La puntuación y el orden sintáctico buscan una cadencia poética publicable en español sin introducir material no atestiguado.
