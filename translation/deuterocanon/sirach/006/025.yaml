- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her') for wisdom
  alternative_readings:
  - Use 'it' to avoid personification
  rationale: Both the Hebrew suffixes and the Greek feminine pronoun refer to personified wisdom in the surrounding context. Preserving 'her' reflects the source text's literary-theological presentation rather than flattening it.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source text''s plain sense'
- issue: Handling of uncertain Hebrew term תַחְבּוּלוֹתֶיהָ in light of Greek parallel
  chosen_reading: Translate with Greek-supported 'bonds' in the main text
  alternative_readings:
  - restraints
  - disciplines
  - devices
  rationale: The Hebrew witness is marked major_mismatch and the term is text-critically difficult. Because Hebrew remains primary where extant, the rendering stays anchored in the Hebrew metaphor of imposed constraint, but the Greek parallel provides decisive clarification toward 'bonds.' This avoids overconfident reconstruction while giving a readable translation.
