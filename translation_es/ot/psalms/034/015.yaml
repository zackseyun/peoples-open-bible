review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa hebrea: apartarse del mal, hacer el bien, buscar la paz y perseguirla. «Apártate del mal», «haz el bien» y «busca la paz» son fieles al sentido fuente y al rastro léxico del POB. La única desviación relevante está en וְרָדְפֵהוּ, donde «síguela» debilita el matiz de persecución activa y persistente de רדף; «persíguela» preserva mejor la fuerza verbal documentada en el inglés.'
  spanish_quality_summary: El español es natural, claro y eclesialmente legible. La puntuación y el registro son adecuados. La nota sobre «paz» está bien formulada y comunica con claridad el campo semántico más amplio de shalom. Cambiar «síguela» por «persíguela» mejora la precisión sin sacrificar fluidez.
  glossary_alignment: No hay términos de glosario mayor implicados aparte de shalom -> «paz», que se maneja correctamente con nota explicativa. La revisión propuesta también alinea mejor el verbo hebreo רדף con la decisión del POB inglés «pursue it».
  issues:
  - severity: medium
    issue: «síguela» atenúa el sentido de וְרָדְפֵהוּ
    rationale: רדף significa perseguir, ir tras algo con empeño. «Seguir» puede sugerir simplemente ir detrás o continuar, mientras que «persíguela» conserva mejor la energía exhortativa del hebreo y del POB inglés «pursue it».
  revised_spanish_text: Apártate del mal y haz el bien; busca la paz[a] y persíguela.
  revised_footnotes:
  - marker: a
    text: O «bienestar» o «plenitud» para «paz» (hebreo shalom), destacando que implica más que la ausencia de conflicto.
    reason: lexical_alternative
