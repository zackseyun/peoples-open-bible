review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: negación enfática, incapacidad de la fuerza destructiva para prevalecer sobre los εὐσεβεῖς, y futuro pasivo en la segunda cláusula. Sin embargo, la nota al pie actual no preserva bien la alternativa documentada en el rastro inglés: la alternativa principal para κρατήσῃ es más bien «apoderarse de / dominar / prevalecer contra», no simplemente «no prevalecerá contra» como reformulación del texto principal. Conviene ajustar la nota para que represente mejor la amplitud léxica del verbo.'
  spanish_quality_summary: 'El español es claro y natural. «Nunca dominará a los piadosos, y en su llama no serán quemados» suena digno y legible. El único detalle de calidad es estilístico en la nota: empieza con comilla innecesaria y la formulación puede pulirse. El texto principal no requiere cambios sustanciales.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Piadosos» es aceptable para εὐσεβῶν en este contexto; «llama» para φλογί y «serán quemados» para καήσονται están bien. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie no refleja con precisión la alternativa léxica auditada para κρατήσῃ.
    rationale: El rastro inglés conserva como alternativa «It will never seize the devout», explicando que el verbo puede significar tomar posesión, dominar o prevalecer. La nota española actual ofrece «no prevalecerá contra los piadosos», que se acerca demasiado al sentido ya expresado en el texto principal y no preserva bien la alternativa de «asir/apoderarse de».
  - severity: low
    issue: Puntuación y redacción imperfectas en la nota al pie.
    rationale: La nota abre con una comilla sobrante tras el apóstrofo y puede expresarse con español más limpio y natural.
  revised_spanish_text: Nunca dominará[a] a los piadosos, y en su llama no serán quemados.
  revised_footnotes:
  - marker: a
    text: 'O: «Nunca se apoderará de los devotos». El verbo griego puede significar tomar posesión de, dominar o prevalecer contra.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y natural. Solo se corrige la nota léxica para representar mejor la alternativa documentada en el POB inglés y para mejorar su redacción en español.
