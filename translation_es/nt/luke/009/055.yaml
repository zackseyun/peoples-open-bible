  text: Pero él se volvió y los reprendió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos posteriores añaden: «y dijo: “No saben de qué clase de espíritu son; porque el Hijo del Hombre no ha venido a destruir la vida de las personas, sino a salvarla”»'
