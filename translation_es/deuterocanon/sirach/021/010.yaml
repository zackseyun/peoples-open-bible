translation:
  language: es
  text: El camino de los pecadores[a] está allanado con piedras, y al final hay una fosa[b] del Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está empedrado con piedras». El participio griego puede enfatizar un camino hecho liso o nivelado; «allanado con piedras» conserva esa idea, y «empedrado con piedras» resalta más la imagen de una calzada.
    reason: lexical_alternative
  - marker: b
    text: «Hades» aquí se refiere al reino de los muertos; alternativamente, «el sepulcro» o «el inframundo».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁδός
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - vía
  - ruta
  lexicon: BDAG
  rationale: En español, «camino» comunica tanto la imagen concreta de un recorrido como el sentido figurado de conducta o curso de vida. «Vía» sonaría más técnico; «sendero» estrecha demasiado la imagen.
- source_word: ἁμαρτωλῶν
  english_pob_choice: of sinners
  chosen_spanish: de los pecadores
  alternatives_spanish:
  - de las personas pecadoras
  - de los malvados
  lexicon: BDAG
  rationale: La construcción posesiva se mantiene de forma directa. «Pecadores» conserva la categoría moral sin suavizarla.
- source_word: ὡμαλισμένη
  english_pob_choice: is paved
  chosen_spanish: está empedrado
  alternatives_spanish:
  - está alisado
  - está nivelado
  - está hecho suave
  lexicon: LSJ
  rationale: El participio expresa una vía hecha lisa o pareja; con ἐκ λίθων, el sentido imagina una calzada de piedras. «Empedrado» transmite mejor la escena en español que una descripción más abstracta.
- source_word: ἐκ λίθων
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - de piedras
  - a base de piedras
  lexicon: BDAG
  rationale: Con «empedrado», la preposición natural en español es «con». Mantiene el material de la imagen sin forzar una literalidad poco idiomática.
- source_word: ἐπʼ ἐσχάτῳ αὐτῆς
  english_pob_choice: at its end
  chosen_spanish: al final de él
  alternatives_spanish:
  - en su extremo
  - en su última parte
  lexicon: BDAG
  rationale: La frase señala el extremo o desenlace del camino. «Al final de él» conserva la referencia al camino y su resultado.
- source_word: βόθρος
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - foso
  - hoyo
  - abismo
  lexicon: LSJ
  rationale: En castellano, «pozo» mantiene la idea de una oquedad profunda y peligrosa. «Foso» o «hoyo» debilitan el peso ominoso; «abismo» intensifica más de lo que permite el término griego.
- source_word: ᾅδου
  english_pob_choice: of Hades
  chosen_spanish: de Hades
  alternatives_spanish:
  - del sepulcro
  - del lugar de los muertos
  - del Hades
  lexicon: BDAG
  rationale: Se conserva «Hades» como nombre propio del ámbito de los muertos, en vez de resolverlo como «sepulcro» o «infierno». Esto sigue la precisión del texto griego y mantiene la tensión conceptual.
theological_decisions:
- issue: ᾅδου como nombre del reino de los muertos
  english_pob_reading: Hades here refers to the realm of the dead; alternatively, the grave or the underworld.
  chosen_spanish_reading: Hades se refiere al reino de los muertos; alternativamente, el sepulcro o el inframundo.
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el inframundo
  rationale: El griego usa ᾅδης de manera explícita; por eso no se sustituye por un término más interpretativo como «infierno». «Hades» preserva el trasfondo septuagintal y evita cerrar la imagen con una sola equivalencia doctrinal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it into later terminology.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto inglés: no hubo cambios necesarios, y la elección española conserva la misma decisión principal sobre ὡμαλισμένη/ἐκ λίθων y ᾅδου.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando el calco excesivo.
  - «Hades» se conserva como nombre propio por fidelidad al griego; no se reemplaza por «infierno» porque el contexto sapiencial habla del destino de los muertos, no de una formulación doctrinal posterior.
  - La metáfora del camino se preserva con «camino» y «empedrado», que resulta natural en español y fiel a la imagen de una vía preparada pero conduciendo a la destrucción.
