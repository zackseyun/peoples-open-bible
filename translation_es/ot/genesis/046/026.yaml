    rationale: La nota [a] explica el hebreo 'los que salen de su muslo/lomo', correspondiente a 'que salieron de sus lomos', no a 'Egipto'. Esto rompe la trazabilidad entre texto y nota requerida por el proyecto.
  - severity: low
    issue: La clausula final puede sonar más natural en español.
    rationale: '''Fueron en total sesenta y seis personas'' es inteligible, pero para una cifra censal ''eran en total sesenta y seis personas'' fluye mejor y suena menos forzado.'
  - severity: low
