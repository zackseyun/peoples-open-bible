translation:
  language: es
  text: Llamo a mi siervo[a], pero él no responde[b]; le suplico con mi propia boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mi esclavo». El hebreo עֶבֶד puede significar «siervo» o «esclavo», según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero no respondió». Los tiempos verbales hebreos también pueden entenderse más estrictamente como pasados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעַבְדִּי
  english_pob_choice: to my servant
  chosen_spanish: a mi esclavo
  alternatives_spanish:
  - a mi siervo
  - a mi servidor
  lexicon: HALOT
  rationale: עֶבֶד puede denotar tanto 'siervo' como 'esclavo'. Aquí el contexto de humillación social y dependencia personal favorece conservar la fuerza léxica de 'esclavo', como en la alternativa documentada por el POB inglés.
- source_word: קָרָאתִי
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - clamé
  - estoy clamando
  lexicon: HALOT
  rationale: El perfecto hebreo puede funcionar en discurso poético como presente vívido. 'Clamo' comunica mejor el lamento continuo que un simple pasado, sin añadir matices no atestiguados.
- source_word: וְלֹא יַעֲנֶה
  english_pob_choice: but he does not answer
  chosen_spanish: pero él no responde
  alternatives_spanish:
  - y él no responde
  - pero no responde
  - y no responde
  lexicon: HALOT
  rationale: ענה significa 'responder'. La relación es contrastiva; por eso 'pero' refleja mejor la oposición que 'y'. El presente mantiene el valor situacional del hebreo.
- source_word: בְּמוֹ פִי
  english_pob_choice: with my own mouth
  chosen_spanish: con mi propia boca
  alternatives_spanish:
  - con mi boca
  - personalmente
  - de viva voz
  lexicon: HALOT
  rationale: La frase intensifica la humillación de Job al subrayar la intervención directa. 'Con mi propia boca' preserva ese énfasis mejor que una forma más neutra.
- source_word: אֶתְחַנֶּן לוֹ
  english_pob_choice: I plead with him
  chosen_spanish: le suplico
  alternatives_spanish:
  - le imploro
  - le ruego
  - intercedo ante él
  lexicon: HALOT
  rationale: חנן en hitpael expresa buscar favor o suplicar misericordia. 'Le suplico' transmite bien la acción de mendigar favor sin añadir el modal 'debo', que el texto revisado del POB inglés descartó.
translation_notes:
  revision_awareness: El POB inglés revisó su propia redacción desde «I must plead» a «I plead» para reflejar con mayor directitud el imperfecto hebreo. La versión española evita introducir obligación modal y mantiene el valor poético actual del reclamo.
  spanish_consistency_notes:
  - Se mantiene «esclavo» como opción principal porque el término hebreo עֶבֶד admite esa fuerza léxica y el contexto enfatiza la degradación de Job.
  - Se usa puntuación con punto y coma para reflejar la pausa poética del hebreo y la estructura contrastiva de la línea.
  - No se traduce el hebreo por un eufemismo eclesiástico; se conserva el contraste humano directo del verso.
  - Los marcadores de nota [a] y [b] están anclados en el texto y corresponden a alternativas documentadas.
