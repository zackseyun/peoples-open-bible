base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/001.yaml
  text: If you return[a], O Israel, declares Yahweh, to me you should return; if you remove your detestable things from before me and do not wander about[c][b],
  footnotes:
  - marker: a
    text: Or, 'If you return, O Israel ... you will return to me,' preserving the repeated Hebrew verb more formally.
    reason: alternative_reading
  - marker: b
    text: '''Detestable things'' refers especially to abhorrent idolatrous objects; alternatively, ''your abominations'' or more interpretively ''your idols.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'and do not waver' or 'and do not stray'; the Hebrew verb can suggest wandering, instability, or wavering.
    reason: lexical_alternative
