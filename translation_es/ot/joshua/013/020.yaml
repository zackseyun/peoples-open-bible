review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la lista toponímica hebrea: בֵית פְּעוֹר, אַשְׁדּוֹת הַפִּסְגָּה, y בֵית הַיְשִׁמוֹת se representan como topónimos/topografía en secuencia correcta. También preserva adecuadamente la nota de alternativa léxica para אַשְׁדּוֹת. Sin embargo, la forma española de Pisgah como «Pisgá» es innecesariamente adaptada y menos reconocible; conviene mantener una transliteración más estable y ampliamente identificable en español bíblico.'
  spanish_quality_summary: 'El español es claro y natural para una lista geográfica. «Las laderas de Pisga» funciona bien. El principal ajuste es ortográfico/toponímico: «Pisga» es más legible y menos idiosincrásico que «Pisgá». La nota también debe armonizarse con esa forma. El resto del verso suena bien y no requiere reformulación mayor.'
  glossary_alignment: No hay términos teológicos sensibles aquí. La política de transliterar topónimos se cumple en general con «Bet-peor» y «Bet-jesimot». Para הַפִּסְגָּה, el uso de nombre geográfico transliterado también es correcto, pero la adaptación con tilde final no está bien justificada por el proyecto; «Pisga» alinea mejor con una transliteración española convencional.
  issues:
  - severity: medium
    issue: Topónimo «Pisgá» poco justificado
    rationale: El hebreo הַפִּסְגָּה se usa como nombre geográfico. En español bíblico general, «Pisga» es una forma transliterada más natural y reconocible que «Pisgá». La tilde final introduce una adaptación no necesaria y puede dificultar la familiaridad del lector.
  - severity: low
    issue: La nota al pie repite la forma menos recomendable del topónimo
    rationale: Si se corrige el topónimo en el texto principal, la nota debe reflejar la misma forma para mantener consistencia editorial.
