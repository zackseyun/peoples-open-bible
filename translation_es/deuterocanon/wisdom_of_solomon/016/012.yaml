- from: Porque ni hierba[a] ni emplasto[b] los sanó, sino tu palabra, oh Señor, sana todas las cosas.
  to: Pues ni hierba[a] ni emplasto[b] los sanó, sino tu palabra, oh Yahvé, sana todas las cosas.
  rationale: Se cambió «Porque» por «Pues» para una apertura más natural y fiel al matiz discursivo. Se sustituyó «Señor» por «Yahvé» para ajustarse a la terminología obligatoria del proyecto respecto del nombre divino. Se mantuvo «emplasto» porque es fiel al sentido de μάλαγμα y ya está respaldado por la nota alternativa «cataplasma».
