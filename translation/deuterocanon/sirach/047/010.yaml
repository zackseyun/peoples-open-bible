translation:
  text: He gave splendor[a], beauty, and glory to the festivals year after year; when they praised his holy name[b], before morning the court resounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult in the surviving Hebrew. The Greek parallel reads, 'and from early morning the sanctuary resounded,' which likely preserves the intended sense of the line.
    reason: textual_variant
  - marker: b
    text: Or, more literally from the Hebrew honor-cluster, 'majesty, beauty, and honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתן
  chosen: He gave
  alternatives:
  - He appointed
  - He bestowed
  lexicon: HALOT
  rationale: The Hebrew verb נתן normally means 'give.' In context with festivals and honor-language, 'gave' or 'bestowed' are both possible; 'gave' preserves the directness of the Hebrew while allowing the sense that David endowed the festivals with splendor.
- source_word: לחגים
  chosen: to the festivals
  alternatives:
  - for the festivals
  - at the festivals
  - in the festivals
  lexicon: HALOT
  rationale: The lamed preposition can mark relation or advantage. Because the Hebrew line speaks of assigning honor to the recurring feast celebrations, 'to the festivals' fits the Hebrew witness, while the Greek parallel ('in festivals') confirms the festive setting.
- source_word: בכל שנה ושנה
  chosen: year after year
  alternatives:
  - every year
  - each and every year
  lexicon: HALOT
  rationale: This idiom denotes repeated annual recurrence. 'Year after year' is natural modern English and preserves the iterative force.
- source_word: הוד פאר וכבוד
  chosen: splendor and glory
  alternatives:
  - majesty, beauty, and honor
  - splendor, beauty, and honor
  lexicon: HALOT
  rationale: The Hebrew piles up near-synonyms of magnificence. To avoid wooden overloading in English while preserving the elevated style, 'splendor and glory' condenses the cluster. 'Honor' is conceptually present, but the pair chosen reads more naturally in English poetry-like prose.
- source_word: בהללו
  chosen: when they praised
  alternatives:
  - in praising
  - as they praised
  lexicon: HALOT
  rationale: 'The prefixed ב with infinitive/construct-like form is temporal here. The Greek parallel likewise supports a temporal-circumstantial sense: ''in the praising of them/him.'' ''When they praised'' is clear and idiomatic.'
- source_word: את שם קדשו
  chosen: his holy name
  alternatives:
  - the name of his holiness
  - his sacred name
  lexicon: HALOT
  rationale: A standard Hebrew expression for reverent invocation. 'His holy name' is the most natural English equivalent and matches biblical idiom.
- source_word: לפני בקר
  chosen: from early morning
  alternatives:
  - before morning
  - at daybreak
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat awkward in isolation, but with the Greek parallel ἀπὸ πρωῒ ('from early morning') it is best understood as indicating the early hour of praise rather than 'before morning' in a strict temporal sense.
- source_word: ירן משפט
  chosen: the sanctuary resounded
  alternatives:
  - judgment rang out
  - ordinance resounded
  - music rang out
  lexicon: HALOT
  rationale: The Hebrew here is difficult and likely corrupt or compressed. The Greek parallel reads 'the sanctuary resound' (ἠχεῖν τὸ ἁγίασμα), which provides the clearest sense in context of temple praise. The English follows the likely sense supported by the Greek while remaining anchored to the Hebrew's idea of sounding forth.
