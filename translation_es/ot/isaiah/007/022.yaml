  text: וְ/הָיָ֗ה מֵ/רֹ֛ב עֲשׂ֥וֹת חָלָ֖ב יֹאכַ֣ל חֶמְאָ֑ה כִּֽי חֶמְאָ֤ה וּ/דְבַשׁ֙ יֹאכֵ֔ל כָּל הַ/נּוֹתָ֖ר בְּ/קֶ֥רֶב הָ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/007/022.yaml
  text: And it will happen that because of the abundance of milk he gives[a], he will eat curds; for everyone left in the midst of the land will eat curds and honey.
  footnotes:
