review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: sacar de entre los pueblos, reunir de entre las tierras, y conservar la tensión entre restauración y juicio con la tríada exódica final. Sin embargo, la cláusula relativa «a las cuales fueron dispersados» es menos natural y menos precisa que «donde/en las cuales han sido dispersados», y la nota b actualmente ofrece como alternativa una formulación más fiel que la lectura principal. También conviene alinear mejor el matiz aspectual de נְפוֹצֹתֶם con un resultado vigente.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos asperezas de estilo: «a las cuales fueron dispersados» suena forzado con el verbo «dispersar», y «furor derramado» es posible pero algo menos natural en registro bíblico que «ira derramada» o «furia derramada». Dado que el inglés POB eligió ''wrath'' con nota para ''fury'', en español la opción principal más natural y eclesial es «ira derramada», dejando «furor» como alternativa si se desea. Además, «Yo» es innecesario y puede omitirse.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé en este versículo. «Pueblos», «tierras», «mano fuerte» y «brazo extendido» están bien alineados con las decisiones auditadas. La principal mejora es ajustar la relativa de dispersión y preferir una formulación española más natural para חֵמָה שְׁפוּכָה.
  issues:
  - severity: medium
    issue: 'Relativa poco natural: «a las cuales fueron dispersados»'
    rationale: El hebreo אֲשֶׁר ... בָּם significa «donde/en las cuales ...». Con «dispersados», en español «a las cuales» suena torpe y menos idiomático que «en las cuales» o «donde».
  - severity: medium
    issue: La nota b contradice implícitamente la mejor opción principal
    rationale: La nota ofrece «donde fueron dispersados», que es más natural que el texto principal actual. La lectura principal debe ser la mejor traducción, no una opción inferior a la nota.
  - severity: low
    issue: «Furor derramado» es menos natural que «ira derramada»
    rationale: Aunque חֵמָה puede ser «furor», en español bíblico contemporáneo «ira derramada» suena más natural y mantiene intacta la fuerza judicial. Además, concuerda con la nota inglesa que preserva la alternativa, no al revés.
  - severity: low
    issue: Pronombre explícito «Yo» innecesario
    rationale: El futuro verbal ya expresa el sujeto; omitir «Yo» mejora la fluidez sin pérdida de sentido.
  revised_spanish_text: Los sacaré de entre los pueblos y los reuniré de entre las tierras[a] donde han sido dispersados,[b] con mano fuerte y con brazo extendido, y con ira derramada.[c]
