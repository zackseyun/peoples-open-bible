revisions:
- from: 'Por causa de mis hermanos y de mis compañeros[a], hablaré ahora[b]: «Paz dentro de ti[c]».'
  to: 'Por el bien de mis hermanos y de mis compañeros[a], diré ahora[b]: «Paz[c] dentro de ti[d]».'
  rationale: Se ajustó לְמַעַן a «Por el bien de» por mejor naturalidad y precisión contextual; se cambió «hablaré» por «diré» porque en español es la forma más idiomática con discurso directo y concuerda con la decisión inglesa documentada de 'say'. Se separaron las notas para que el matiz de shalom quede anclado a «Paz» y la alternativa de בךְ quede anclada a «ti», corrigiendo la correspondencia entre texto y notas. También se eliminó el inglés residual en una nota.
