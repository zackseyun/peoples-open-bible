translation:
  language: es
  text: Él corromperá con palabras suaves[a] a los que obran maldad contra el pacto, pero el pueblo que conoce a su Dios se mantendrá firme y actuará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con lisonjas» o «por lisonjas».
    reason: lexical_alternative
  - marker: b
    text: O «será fuerte y actuará».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַרְשִׁיעֵי בְרִית
  english_pob_choice: those who act wickedly against the covenant
  chosen_spanish: a los que obran maldad contra el pacto
  alternatives_spanish:
  - a los que quebrantan el pacto obrando maldad
  - a los perversos contra el pacto
  - a los que profanan el pacto
  lexicon: HALOT
  rationale: El participio comunica personas que actúan malvadamente; en español, "obran maldad" conserva el sentido verbal y relacional. "Contra el pacto" mantiene la fuerza de oposición que el inglés POB resolvió con 'against the covenant'.
- source_word: יַחֲנִיף
  english_pob_choice: he will corrupt
  chosen_spanish: corromperá
  alternatives_spanish:
  - hará impío
  - seducirá
  - contaminará
  lexicon: HALOT
  rationale: El hifil de חנף puede expresar causar impiedad o corrupción moral/religiosa. "Corromperá" reproduce bien esa fuerza sin concretar de más el mecanismo, siguiendo la lectura del POB inglés.
- source_word: בַּחֲלַקּוֹת
  english_pob_choice: with smooth words
  chosen_spanish: con palabras suaves
  alternatives_spanish:
  - con lisonjas
  - con palabras lisas
  - con halagos
  lexicon: HALOT
  rationale: El hebreo alude a lo liso/suave y, por extensión, a habla halagadora. "Palabras suaves" conserva la metáfora y resulta natural en español; se mantiene la alternativa interpretativa de la lisonja en las notas.
- source_word: וְעַם
  english_pob_choice: but the people
  chosen_spanish: pero el pueblo
  alternatives_spanish:
  - y el pueblo
  - mas el pueblo
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el contraste contextual es adversativo. "Pero" expresa mejor la relación discursiva en español, como hizo el inglés POB con 'but'.
- source_word: יֹדְעֵי אֱלֹהָיו
  english_pob_choice: who know their God
  chosen_spanish: que conoce a su Dios
  alternatives_spanish:
  - que conocen a su Dios
  - conocedores de su Dios
  - los que conocen a su Dios
  lexicon: HALOT
  rationale: El participio expresa conocimiento relacional continuo. En el hebreo, el sufijo singular puede funcionar distributivamente; en español, el singular colectivo "el pueblo" hace natural "conoce a su Dios" sin perder el sentido corporativo.
- source_word: יַחֲזִקוּ
  english_pob_choice: will stand firm
  chosen_spanish: se mantendrá firme
  alternatives_spanish:
  - será fuerte
  - se fortalecerá
  - permanecerá firme
  lexicon: HALOT
  rationale: 'El hifil de חזק aquí tiene valor resultativo/intransitivo: permanecer fuerte o firme. "Se mantendrá firme" comunica la perseverancia resistiendo, con claridad idiomática en español.'
- source_word: וְעָשׂוּ
  english_pob_choice: and take action
  chosen_spanish: y actuará
  alternatives_spanish:
  - y hará
  - y actuará con decisión
  - y obrará
  lexicon: HALOT
  rationale: עָשׂוּ es semánticamente amplio ('hacer, actuar, obrar'). En este contexto de conflicto, "actuará" refleja una respuesta concreta y decidida sin añadir contenido ajeno al texto.
theological_decisions:
- issue: Contraste entre corrupción del pacto y fidelidad activa
  english_pob_reading: The verse contrasts apostates corrupted by the king with covenant-faithful people who remain steadfast and act decisively.
  chosen_spanish_reading: El versículo contrasta a los infieles al pacto, corrompidos por la astucia verbal, con el pueblo fiel que permanece firme y responde con acción.
  alternative_spanish_readings:
  - El versículo puede leerse más literalmente como una simple yuxtaposición sin marcar tanto el contraste.
  - Puede dejarse el final como 'y hará' sin explicitar el matiz de respuesta decidida.
  rationale: La relación entre las dos mitades es claramente contrastiva en el contexto. La traducción española debe reflejar esa oposición sin exagerar ni doctrinalizar el pasaje. El final se mantiene activo porque el hebreo y el POB inglés sugieren una fidelidad que se manifiesta en acción.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el pass más reciente del POB inglés, sin cambios de revisión pendientes; la decisión principal es adaptar a español el contraste adversativo y la fuerza lexical de 'smooth words' / 'stand firm and act'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהָיו, con posesivo singular distribuido de modo natural en español por el sustantivo colectivo 'pueblo'.
  - Se usa 'pacto' para בְרִית por consistencia con el lenguaje bíblico y con el sentido relacional/jurídico del texto.
  - Se evita 'SEÑOR' y no hay aquí referencia a יהוה explícito; tampoco se introduce 'Cristo' ni terminología ajena al versículo.
  - La puntuación y el registro son de español bíblico moderno, sobrio y publicable.
