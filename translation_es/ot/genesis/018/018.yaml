translation:
  language: es
  text: Abraham ciertamente llegará a ser una nación grande y poderosa, y todas las naciones de la tierra serán bendecidas en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las naciones de la tierra se bendecirán a sí mismas por él». La forma hebrea también puede entenderse de ese modo; aquí se sigue la lectura pasiva: «serán bendecidas en él».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָי֧וֹ יִֽהְיֶ֛ה
  english_pob_choice: will surely become
  chosen_spanish: seguramente llegará a ser
  alternatives_spanish:
  - ciertamente llegará a ser
  - llegará a ser con toda certeza
  lexicon: HALOT
  rationale: La combinación del infinitivo absoluto con el imperfecto intensifica la idea verbal. En español, «seguramente llegará a ser» conserva la fuerza enfática y la futuridad sin sonar mecánico.
- source_word: לְ/ג֥וֹי
  english_pob_choice: a ... nation
  chosen_spanish: una nación
  alternatives_spanish:
  - un pueblo
  - una gente
  lexicon: HALOT
  rationale: «Nación» reproduce bien גוי en este contexto de promesa patriarcal y mantiene la coherencia con «todas las naciones» al final del versículo.
- source_word: גָּד֖וֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande e importante
  - grande y notable
  lexicon: HALOT
  rationale: «Grande» es la equivalencia directa y natural en español; conserva la amplitud cuantitativa y cualitativa del término.
- source_word: וְ/עָצ֑וּם
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - poderoso
  - numerosa
  lexicon: HALOT
  rationale: En español, «poderosa» comunica mejor la idea de fuerza e imponencia asociada a עצום sin reducirla solo a tamaño numérico.
- source_word: וְ/נִ֨בְרְכוּ
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - se bendecirán
  - se bendecirán a sí mismas
  - recibirán bendición
  lexicon: HALOT
  rationale: 'La lectura principal sigue el valor pasivo del nifal en la fórmula abrahámica: las naciones reciben bendición en relación con Abraham.'
- source_word: ב֔/וֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - por medio de él
  lexicon: HALOT
  rationale: «En él» refleja con naturalidad el hebreo בּוֹ y mantiene la formulación tradicional de la promesa sin expandir el sentido más allá de lo necesario.
- source_word: כֹּ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  - todas las naciones del mundo
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance universal del hebreo y es la correspondencia más estable con la fórmula bíblica; «naciones» mantiene la consistencia con גוי.
theological_decisions:
- issue: Lectura de נִבְרְכוּ en la promesa abrahámica
  english_pob_reading: The nations are blessed in relation to Abraham, with a footnoted alternative that they may bless themselves by him.
  chosen_spanish_reading: Las naciones serán bendecidas en relación con Abraham, manteniendo abierta la posibilidad alternativa de que se bendigan a sí mismas por él.
  alternative_spanish_readings:
  - las naciones se bendecirán por él
  - las naciones se bendecirán a sí mismas por él
  rationale: El texto hebreo admite la discusión pasiva/reflexiva. La redacción principal preserva la lectura pasiva, mientras la nota conserva la alternativa sin resolver la tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el borrador sigue el texto hebreo y conserva la tensión interpretativa documentada por la POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גוי a lo largo del versículo.
  - Se usa «bendecidas» para reflejar el valor pasivo principal del nifal en la fórmula de Abraham.
  - «Tierra» se conserva por el alcance universal de la expresión final.
  - El registro busca ser bíblico y claro en español moderno, sin caer en calcos innecesarios.
