translation:
  language: es
  text: 'Los hijos de Jafet: Gomer[a], Magog, Madai, Javan, Tubal, Meshech y Tiras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente identificaciones étnicas o geográficas en usos posteriores: «Madai» = «los medos», y «Javan» = «Jonia» o «los griegos». El texto principal conserva los nombres hebreos por transliteración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En una genealogía, el hebreo constructo plural de בֵּן introduce la línea filial masculina. «Los hijos de» reproduce de forma natural y fiel esa relación sin ampliar el sentido a «descendientes».
- source_word: יֶפֶת
  english_pob_choice: Japheth
  chosen_spanish: Jafet
  alternatives_spanish:
  - Jáphet
  lexicon: HALOT
  rationale: Nombre propio; se adapta a la forma hispana tradicional y transparente, manteniendo la referencia al personaje bíblico.
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  lexicon: HALOT
  rationale: Nombre propio transliterado; no hay motivo contextual para interpretarlo o traducirlo.
- source_word: מָגוֹג
  english_pob_choice: Magog
  chosen_spanish: Magog
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración, como en el texto fuente y el audit trail inglés.
- source_word: מָדַי
  english_pob_choice: Madai
  chosen_spanish: Madai
  alternatives_spanish:
  - los medos
  lexicon: HALOT
  rationale: El audit trail inglés preserva el nombre hebreo en el texto principal. En español conviene mantener «Madai» para no cerrar prematuramente la referencia etnogeográfica.
- source_word: יָוָן
  english_pob_choice: Javan
  chosen_spanish: Javan
  alternatives_spanish:
  - Jonia
  - los griegos
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado en la lista genealógica; aunque puede relacionarse con Jonia o los griegos en usos posteriores, aquí el contexto favorece la forma nominal.
- source_word: תֻבָל
  english_pob_choice: Tubal
  chosen_spanish: Tubal
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Meshech
  lexicon: HALOT
  rationale: Se adapta al español «Mesec», forma más natural y establecida en castellano, sin cambiar la identidad del nombre.
- source_word: תִירָס
  english_pob_choice: Tiras
  chosen_spanish: Tirás
  alternatives_spanish:
  - Tiras
  lexicon: HALOT
  rationale: Se usa la acentuación española «Tirás» para favorecer la lectura en español, conservando la transliteración del nombre propio.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto principal junto a «Gomer».
  spanish_consistency_notes:
  - Se mantuvo el formato genealógico breve y enumerativo del hebreo.
  - Se prefirió una forma española estable para nombres propios cuando existe una tradición transliterada natural en castellano.
  - No se introdujeron equivalencias etnográficas en el texto principal para no exceder lo que el hebreo presenta aquí como lista de nombres.
