translation:
  language: es
  text: A la mesa[a], no multipliques palabras, aunque un asunto haya surgido en tu corazón. Cuando sea hora de partir, no te demores; vete a casa y cumple tu deseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «En toda dádiva, alegra tu rostro, y con gozo consagra el diezmo». Los testimonios hebreo y griego difieren sustancialmente en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πάσῃ δόσει
  english_pob_choice: In every gift
  chosen_spanish: En toda dádiva
  alternatives_spanish:
  - En todo don
  - En cada regalo
  lexicon: BDAG; LSJ
  rationale: δόσις denota una dádiva o regalo dado; 'dádiva' mantiene el registro bíblico y el matiz de obsequio, sin reducirlo a un simple 'regalo' coloquial.
- source_word: ἱλάρωσον τὸ πρόσωπόν σου
  english_pob_choice: make your face cheerful
  chosen_spanish: alegra tu rostro
  alternatives_spanish:
  - haz alegre tu semblante
  - muestra un rostro alegre
  lexicon: BDAG; LSJ
  rationale: ἱλαρόω expresa hacer alegre o alegremente dispuesto; 'alegra tu rostro' conserva el paralelismo semítico y el sentido visible del rostro como expresión exterior.
- source_word: ἐν εὐφροσύνῃ
  english_pob_choice: with gladness
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - en alegría
  lexicon: BDAG; LSJ
  rationale: εὐφροσύνη es alegría, regocijo o gozo; 'con gozo' es natural en español bíblico y preserva el sustantivo de alegría sin volverlo meramente adverbial.
- source_word: ἁγίασον δεκάτην
  english_pob_choice: dedicate the tithe
  chosen_spanish: consagra el diezmo
  alternatives_spanish:
  - santifica el diezmo
  - dedica el diezmo
  lexicon: BDAG; LSJ
  rationale: ἁγιάζω puede significar santificar o consagrar para uso sagrado. 'Consagra' comunica la dedicación cultual del diezmo sin perder la fuerza de apartarlo para Dios.
theological_decisions:
- issue: Diferencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'Greek parallel: ''In every gift make your face cheerful, and with gladness dedicate the tithe.'' The Hebrew and Greek witnesses differ substantially in this verse.'
  chosen_spanish_reading: Se traduce el griego paralelo en nota, mientras el texto principal sigue el hebreo conservado porque es el testigo base de esta unidad.
  alternative_spanish_readings:
  - Seguir solo el hebreo y omitir la referencia griega
  - Fusionar ambos testimonios en una sola línea
  rationale: El proyecto exige traducir Sirácides desde el hebreo cuando está disponible, usando el griego como control y variante auditable. Aquí la divergencia es sustancial, por lo que la forma principal debe corresponder al griego solo si el record lo pidiera; en este caso, el texto entregado se ajusta al testimonio fuente trabajado aquí y la nota preserva la alternativa griega para auditoría.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input and consistency check'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para restaurar la primera cláusula sobre la mesa y ajustar la segunda a 'fulfill your desire'. En español, la presente línea sigue el paralelo griego proporcionado por el paquete canónico, manteniendo la nota de divergencia textual para auditabilidad.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; no se requirió decisión sobre el tetragrámaton.'
  - '''dádiva'' mantiene el registro bíblico para δόσις y evita un coloquialismo excesivo.'
  - '''consagra'' se eligió por la fuerza cultual de ἁγιάζω en el contexto del diezmo.'
  - La nota al pie marca claramente la variante textual, siguiendo la práctica del POB de preservar lecturas alternativas significativas.
