translation:
  language: es
  text: Por seis días harás tu trabajo, pero el séptimo día cesarás[a], para que descansen tu buey y tu asno, y se refresquen el hijo de tu sierva[b] y el residente extranjero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descansarás»; el verbo hebreo significa fundamentalmente «cesar, parar».
    reason: lexical_alternative
  - marker: b
    text: O «el hijo de tu sierva».
    reason: lexical_alternative
  - marker: c
    text: «Residente extranjero» designa aquí al extranjero que vive entre Israel bajo su orden social y legal.
    reason: cultural_note
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: For six days
  chosen_spanish: Por seis días
  alternatives_spanish:
  - Seis días
  lexicon: HALOT
  rationale: La expresión funciona como acusativo de duración. 'Por seis días' conserva el marco temporal en español de manera natural y fiel.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - tendrás que hacer
  lexicon: HALOT
  rationale: En instrucción legal, el imperfecto se vierte con valor exhortativo o normativo. 'Harás' mantiene la fuerza de mandamiento sin recargar el español.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your work
  chosen_spanish: tu trabajo
  alternatives_spanish:
  - tu labor
  - tus obras
  lexicon: HALOT
  rationale: El sustantivo es amplio, pero en el contexto del mandamiento sabático la referencia natural es al trabajo cotidiano. 'Tu trabajo' es claro y suficientemente amplio.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: but on the seventh day
  chosen_spanish: pero en el séptimo día
  alternatives_spanish:
  - y en el séptimo día
  lexicon: HALOT
  rationale: '''Pero'' expresa bien el contraste entre los seis días de trabajo y el día séptimo de cese.'
- source_word: תִּשְׁבֹּת
  english_pob_choice: you shall cease
  chosen_spanish: cesarás
  alternatives_spanish:
  - descansarás
  - te detendrás
  lexicon: HALOT
  rationale: El verbo básico es 'cesar, parar'. 'Cesarás' preserva esa fuerza léxica, como en la POB inglesa, sin sustituirla por una idea más estrecha de descanso personal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: Marca finalidad. 'Para que' es la equivalencia natural y clara en español.
- source_word: יָנוּחַ
  english_pob_choice: may rest
  chosen_spanish: descanse
  alternatives_spanish:
  - tenga descanso
  - repose
  lexicon: HALOT
  rationale: El verbo expresa reposo o alivio. 'Descanse' comunica bien el beneficio de pausa para los animales sin perder el sentido de reposo.
- source_word: שׁוֹרְךָ
  english_pob_choice: your ox
  chosen_spanish: tu buey
  alternatives_spanish:
  - tu toro
  - tu buey de labor
  lexicon: HALOT
  rationale: En español bíblico y actual, 'buey' comunica el animal de trabajo de manera precisa y natural.
- source_word: וַחֲמֹרֶךָ
  english_pob_choice: and your donkey
  chosen_spanish: tu asno
  alternatives_spanish:
  - tu burro
  - tu mula
  lexicon: HALOT
  rationale: '''Asno'' es un equivalente fiel y más tradicional que ''burro''; conserva el paralelismo con el buey.'
- source_word: וְיִנָּפֵשׁ
  english_pob_choice: may be refreshed
  chosen_spanish: se refresque
  alternatives_spanish:
  - recobre aliento
  - sea aliviado
  lexicon: HALOT
  rationale: El nifal de נפשׁ sugiere recobrar aliento o ser renovado. 'Se refresque' conserva la idea de alivio vital que la POB inglesa destaca.
- source_word: בֶּן אֲמָתְךָ
  english_pob_choice: the son of your female servant
  chosen_spanish: el hijo de tu sierva
  alternatives_spanish:
  - el hijo de tu esclava
  - el hijo de tu criada
  lexicon: HALOT
  rationale: '''Sierva'' mantiene el vínculo social de dependencia sin forzar una terminología más dura que pueda sonar extraña en español, mientras conserva la relación literal ''hijo de''.'
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el extranjero residente
  lexicon: HALOT
  rationale: Aunque 'sojourner' es una categoría legal-social importante, en español 'forastero' puede sonar demasiado temporal. Aquí se prefiere 'forastero' como equivalente más accesible, pero se conserva la nota para explicar que se trata de un extranjero residente bajo el orden social de Israel.
theological_decisions:
- issue: Sentido de שׁבת en la legislación sabática
  english_pob_reading: you shall cease
  chosen_spanish_reading: cesarás
  alternative_spanish_readings:
  - descansarás
  - te detendrás
  rationale: La decisión mantiene el énfasis original en la cesación del trabajo. El reposo aparece como consecuencia y propósito en la cláusula siguiente, no como la única idea del verbo.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: Traducción del término social גר
  english_pob_reading: the sojourner
  chosen_spanish_reading: el forastero
  alternative_spanish_readings:
  - el residente extranjero
  - el extranjero residente
  rationale: El verso extiende el alivio sabático también al no israelita que vive entre el pueblo. Se conserva esa inclusión social, aunque 'forastero' requiere nota para evitar una lectura meramente ocasional o turística.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español. También se ajustó el cierre para que la nota [b] acompañe al término correspondiente sin añadir notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo la secuencia legal de seis días de trabajo y séptimo día de cese.
  - Se preservó la fuerza verbal de 'cesar' para תִּשְׁבֹּת, en lugar de suavizarlo a solo 'descansar'.
  - Se usó un español contemporáneo y digno, evitando calcos pesados.
  - Se optó por 'sierva' para reflejar la relación social del hebreo sin introducir una terminología más marcada que pudiera desviar el sentido.
  - El término 'forastero' se dejó con nota explicativa para sostener la categoría social del hebreo גר.
