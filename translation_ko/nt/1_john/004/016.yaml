  yaml_path: translation/nt/1_john/004/016.yaml
  text: And we have come to know and have believed the love that God has for us[a]. God is love, and the one who remains in love remains in God[c][b], and God remains in him.
  footnotes:
  - marker: a
    text: Or 'the love that God has in us.' The Greek phrase can denote love present within believers or manifested among the community.
    reason: alternative_reading
  - marker: b
    text: Greek 'in him' uses a masculine singular form with representative force; that is, the one who remains in love.
    reason: lexical_alternative
  - marker: c
    text: Or 'have come to know and have believed'.
    reason: previous_rendering
translation:
  language: ko
  text: 그리고 우리는 하나님께서 우리에게 가지고 계신 사랑을 알게 되었고 믿게 되었습니다. 「하나님은 사랑이시며」[a], 사랑 안에 머무는 자는 하나님 안에 머물고 하나님도 그 사람 안에 머무십니다.
  philosophy: optimal-equivalence
