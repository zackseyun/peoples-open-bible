revisions:
- from: Y sucedió[a], cuando David estaba en Edom, cuando Joab, el comandante del ejército, había subido para sepultar a los muertos[b], que hirió a todo varón en Edom—
  to: Y sucedió[a], cuando David estaba en Edom[b], cuando Joab, el comandante del ejército, había subido para sepultar a los caídos, que abatió a todo varón en Edom—
  rationale: Se corrigió el verbo principal para reflejar la fuerza letal de וַיַּךְ en este contexto («abatió» en vez de «hirió»), se ajustó «los muertos» a «los caídos» para conservar el matiz bélico de הַחֲלָלִים, y se movió la nota [b] al segmento que realmente explica. El resto de la estructura y el registro del borrador son adecuados.
