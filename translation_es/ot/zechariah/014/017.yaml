  to: Y sucederá que cualquiera de entre las familias de la tierra que no suba a Jerusalén para adorar al Rey[a], Yahvé de los Ejércitos[b], sobre ellos no habrá lluvia.
  rationale: Se ajusta la frase inicial a 'cualquiera de entre las familias de la tierra' para reflejar con más naturalidad y precisión el distributivo del hebreo sin perder el tono formal. Se mantiene 'suba', 'adorar', 'Rey', 'Yahvé' y la cláusula de juicio 'sobre ellos no habrá lluvia', que son fieles al original y al rastro POB. También se simplifica la nota b para que funcione como alternativa léxica breve.
