  to: Y se halló escrito que Mardoqueo había informado acerca de Bigtana y Tares[a], dos de los eunucos[b] del rey, entre los que guardaban el umbral, que habían buscado poner las manos sobre el rey Asuero.
  rationale: Se corrige el modismo final para expresar con claridad el atentado implícito en לִשְׁלֹחַ יָד sin caer en una paráfrasis excesiva. También se reubica la nota b sobre «eunucos», que es el término realmente comentado, y se limpia su formato. El resto del versículo puede mantenerse porque refleja fielmente el hebreo y las decisiones auditadas en inglés.
