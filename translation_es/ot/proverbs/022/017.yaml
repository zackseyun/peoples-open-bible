translation:
  language: es
  text: Inclina tu oreja y oye las palabras de los sabios[a], y pon tu corazón en mi conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pon tu corazón en mi enseñanza». El hebreo dice literalmente «en mi conocimiento», lo cual puede referirse al conocimiento del hablante mismo o, por extensión, a la instrucción que ese conocimiento comunica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַט
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Baja
  - Tiende
  lexicon: HALOT
  rationale: El imperativo hifil de נטה expresa la idea de inclinar o extender. En español, «inclina» conserva la imagen corporal de atención deliberada y suena natural en este paralelismo.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tus oídos
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo de segunda persona masculina singular. «Tu oído» mantiene el singular y la imagen idiomática sin sonar forzado en español.
- source_word: וּשְׁמַע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y oye atentamente
  lexicon: HALOT
  rationale: שׁמע puede implicar oír con atención. «Oye» conserva el paralelismo con «inclina tu oído» y distingue este mandato del anterior.
- source_word: דִּבְרֵי חֲכָמִים
  english_pob_choice: the words of the wise
  chosen_spanish: las palabras de los sabios
  alternatives_spanish:
  - los dichos de los sabios
  - las palabras de los sabios hombres
  lexicon: HALOT
  rationale: דִּבְרֵי es «palabras/dichos» en constructo plural, y חֲכָמִים es plural. «Los sabios» mantiene el plural y evita una redacción innecesariamente masculina.
- source_word: וְלִבְּךָ
  english_pob_choice: and set your heart
  chosen_spanish: y aplica tu corazón
  alternatives_spanish:
  - y dirige tu corazón
  - y pon tu corazón
  lexicon: HALOT
  rationale: לֵב designa la interioridad, especialmente pensamiento y voluntad. «Corazón» preserva esa antropología bíblica; «aplica» refleja bien la orientación intencional del verbo.
- source_word: תָּשִׁית
  english_pob_choice: set
  chosen_spanish: aplica
  alternatives_spanish:
  - pon
  - coloca
  - dirige
  lexicon: HALOT
  rationale: שׁית significa poner, colocar, fijar. En esta construcción con «corazón», «aplica» transmite bien la acción volitiva de orientar la mente y la voluntad hacia algo.
- source_word: לְדַעְתִּי
  english_pob_choice: on my knowledge
  chosen_spanish: a mi conocimiento
  alternatives_spanish:
  - sobre mi conocimiento
  - a mi enseñanza
  - a mi saber
  lexicon: HALOT
  rationale: La forma es literalmente «a/para mi conocimiento». «A mi conocimiento» conserva el sufijo de primera persona y la cercanía al hebreo. La alternativa «enseñanza» se reserva como opción interpretativa, no como base principal.
translation_notes:
  revision_awareness: No se requirieron cambios respecto del último pase de revisión; la equivalencia general coincide con el texto fuente y con el audit trail en inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal de dos imperativos: «inclina» / «oye».'
  - Se conservó «corazón» para reflejar el valor antropológico de לֵב, sin reducirlo a «mente».
  - Se evitó sustituir el campo semántico de «conocimiento» por «enseñanza» en el texto principal, dejando esa lectura en nota.
  - El registro es bíblico y digno, pero con sintaxis española natural y legible.
