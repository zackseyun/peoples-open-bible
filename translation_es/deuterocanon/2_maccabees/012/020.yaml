translation:
  language: es
  text: Pero Macabeo, después de organizar por compañías a la tropa que estaba con él, los puso sobre las compañías; y cargaron contra Timoteo, que tenía alrededor de sí doce miríadas[a] de infantes, dos mil jinetes, y además siete mil quinientos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «doce miríadas de infantes», es decir, 120.000 soldados de infantería.'
    reason: lexical_alternative
  - marker: b
    text: La frase griega es condensada; aquí se entiende ἑπτακισχιλίοις como «siete mil quinientos».
    reason: alternative_reading
lexical_decisions:
- source_word: διατάξας
  english_pob_choice: after arranging
  chosen_spanish: después de ordenar en formación
  alternatives_spanish:
  - después de disponer
  - tras organizar
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa de disposición militar. «Ordenar en formación» conserva el sentido preparatorio y el matiz táctico sin sonar mecánico en español.
- source_word: τὴν περὶ αὐτὸν στρατιὰν
  english_pob_choice: the troops around him
  chosen_spanish: la tropa que estaba con él
  alternatives_spanish:
  - las tropas alrededor de él
  - su tropa
  lexicon: LSJ
  rationale: La expresión griega describe a la fuerza acompañante de Macabeo. En español, «la tropa que estaba con él» mantiene la idea de compañía y evita una literalidad pesada.
- source_word: σπειρηδόν
  english_pob_choice: by companies
  chosen_spanish: en formación por compañías
  alternatives_spanish:
  - por compañías
  - en compañías
  lexicon: LSJ
  rationale: El adverbio indica agrupación militar por unidades. «En formación por compañías» reproduce el sentido organizativo y deja claro el valor táctico sin imponer un tecnicismo romano.
- source_word: κατέστησεν αὐτοὺς ἐπὶ τῶν σπειρῶν
  english_pob_choice: set them over the companies
  chosen_spanish: los colocó frente a las compañías
  alternatives_spanish:
  - los puso sobre las compañías
  - los situó contra las compañías
  lexicon: LSJ
  rationale: La frase es condensada; el contexto militar favorece una colocación opuesta o enfrentada. «Frente a» comunica la disposición adversarial que el inglés POB también intentó preservar.
- source_word: ὥρμησαν
  english_pob_choice: they charged
  chosen_spanish: cargaron
  alternatives_spanish:
  - arremetieron
  - irrumpieron
  lexicon: LSJ
  rationale: En contexto bélico, el verbo expresa un avance ofensivo súbito. «Cargaron» es natural en español militar y conserva fuerza y brevedad.
- source_word: μυριάδας δώδεκα πεζῶν
  english_pob_choice: twelve myriads of foot soldiers
  chosen_spanish: doce miríadas de infantes
  alternatives_spanish:
  - doce miríadas de soldados de infantería
  - ciento veinte mil infantes
  lexicon: LSJ
  rationale: Se mantiene la unidad griega «miríadas» para conservar transparencia textual, y «infantes» aclara πεζῶν. La cifra equivalente queda apoyada en la nota.
- source_word: ἱππεῖς δὲ δισχιλίους
  english_pob_choice: two thousand horsemen
  chosen_spanish: dos mil jinetes
  alternatives_spanish:
  - dos mil caballeros
  - dos mil de caballería
  lexicon: LSJ
  rationale: «Jinetes» es una equivalencia clara y natural para tropas montadas; evita la ambigüedad de «caballeros» en español moderno.
- source_word: καὶ πρὸς τοῖς ἑπτακισχιλίοις
  english_pob_choice: and seven thousand five hundred
  chosen_spanish: y además siete mil quinientos
  alternatives_spanish:
  - y siete mil quinientos más
  - y aparte siete mil quinientos
  lexicon: LSJ
  rationale: La revisión inglesa entendió la frase como una cantidad adicional totalizada en 7,500. «Además siete mil quinientos» refleja el valor aditivo sin sobreexplicar la compresión griega.
theological_decisions:
- issue: Tratamiento del nombre propio Μακκαβαῖος
  english_pob_reading: Maccabeus
  chosen_spanish_reading: Macabeo
  alternative_spanish_readings:
  - Maccabeo
  - Macabeo
  rationale: Se usa «Macabeo» como forma española estándar y legible para el nombre/título, sin introducir una paráfrasis adicional. No hay tensión doctrinal aquí; es una decisión onomástica.
  doctrine_reference: N/A
- issue: Equivalencia del número griego μυριάδες
  english_pob_reading: twelve myriads of foot soldiers, that is, 120,000 infantry (footnote in English audit trail)
  chosen_spanish_reading: doce miríadas de infantes
  alternative_spanish_readings:
  - ciento veinte mil infantes
  - doce miríadas de soldados de infantería
  rationale: Se conserva el modo de contar griego en el texto principal para respetar la superficie del original, y se deja la equivalencia implícita en la nota. Esto evita borrar la forma numérica documentada por el audit trail.
  doctrine_reference: N/A
- issue: Comprensión de πρὸς τοῖς ἑπτακισχιλίοις
  english_pob_reading: and seven thousand five hundred
  chosen_spanish_reading: y además siete mil quinientos
  alternative_spanish_readings:
  - y siete mil quinientos
  - y además siete mil
  rationale: La revisión más reciente del inglés POB interpreta la frase comprimida como 7,500 adicionales; el español sigue esa lectura para mantener consistencia con el pasaje auditado. Se evita una traducción que diluya la corrección textual revisada.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail inglés: mantiene la organización militar «por compañías», conserva la estructura táctica de oposición frente a las compañías y adopta la lectura revisada de la cifra final como «siete mil quinientos» en vez de una simple mención de siete mil adicionales.'
  spanish_consistency_notes:
  - Se usa «Macabeo» y no «Maccabeus» para una forma española natural y reconocible.
  - «Miríadas» se mantiene para reflejar la expresión cuantitativa griega con transparencia, mientras la nota da la equivalencia numérica.
  - «Jinetes» evita un calco innecesario y es comprensible en español bíblico contemporáneo.
  - No se introducen términos eclesiásticos ajenos al contexto militar del versículo.
