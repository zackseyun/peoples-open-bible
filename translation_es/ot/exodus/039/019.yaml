translation:
  language: es
  text: Hicieron dos anillos de oro y los pusieron en los dos extremos del pectoral[a], en su borde del lado interior, hacia el efod[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Pectoral’ traduce el nombre de esta pieza sacerdotal; la alternativa ‘coraza’ sería engañosa en español moderno.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘hacia adentro’ (literalmente, ‘hacia la casa’), indicando el lado del pectoral que quedaba hacia el efod; también puede entenderse como ‘frente al efod’ u ‘opuesto al efod’.
    reason: cultural_note
lexical_decisions:
- source_word: טַבְּעֹת זָהָב
  english_pob_choice: gold rings
  chosen_spanish: anillos de oro
  alternatives_spanish:
  - aros de oro
  - anillos dorados
  lexicon: HALOT
  rationale: טַבַּעַת designa un anillo o aro de fijación. 'Anillos de oro' conserva el material y suena natural en español; 'aros' es posible, pero 'anillos' es más transparente y cercano al uso técnico de sujeción.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral del juicio
  - la placa pectoral
  lexicon: HALOT
  rationale: En este contexto sacerdotal, la pieza del vestuario es el חֹשֶׁן. 'Pectoral' es un término claro y tradicional en español bíblico para esta prenda; 'placa pectoral' puede sonar más explicativo, pero no es tan natural. Se evita 'coraza' para no introducir la idea de armadura.
- source_word: שְׂפָתוֹ
  english_pob_choice: its edge
  chosen_spanish: su borde
  alternatives_spanish:
  - su orilla
  - su labio
  - su ribete
  lexicon: HALOT
  rationale: שָׂפָה puede ser 'labio', 'borde' o 'orilla'. Para un objeto trabajado, 'borde' comunica con precisión la parte exterior o límite de la pieza, sin cargar una imagen demasiado corporal.
- source_word: אֲשֶׁר אֶל עֵבֶר הָאֵפֹד
  english_pob_choice: that was on the inner side toward the ephod
  chosen_spanish: que estaba en la parte interior hacia el efod
  alternatives_spanish:
  - que estaba frente al efod
  - que daba hacia el efod
  - que estaba del lado del efod
  lexicon: HALOT
  rationale: עֵבֶר puede señalar lado, región o posición relativa. En una descripción de confección, 'en la parte interior hacia el efod' preserva la relación espacial sin forzar 'frente a', que en español podría sonar más a oposición visual que a ubicación adyacente.
- source_word: בָּיְתָה
  english_pob_choice: on the inner side
  chosen_spanish: en la parte interior
  alternatives_spanish:
  - hacia adentro
  - en el interior
  - del lado de adentro
  lexicon: HALOT
  rationale: La forma derivada de בַּיִת tiene sentido direccional de 'hacia dentro' o 'inward'. 'En la parte interior' mantiene esa orientación y resulta natural en español contemporáneo.
- source_word: וַיָּשִׂימוּ עַל
  english_pob_choice: and put ... on
  chosen_spanish: y los pusieron en
  alternatives_spanish:
  - y los colocaron en
  - y los fijaron en
  - y los pusieron sobre
  lexicon: HALOT
  rationale: שׂוּם es un verbo general de poner/colocar. En este contexto de fabricación, 'los pusieron en' comunica la acción de fijación sin introducir un matiz técnico no explicitado por el hebreo.
- source_word: שְׁנֵי קְצוֹת
  english_pob_choice: the two ends
  chosen_spanish: los dos extremos
  alternatives_spanish:
  - los dos lados
  - los dos bordes
  - las dos puntas
  lexicon: HALOT
  rationale: קָצֶה significa 'extremo' o 'fin'. 'Extremos' es preciso y algo más técnico que 'lados'; evita sugerir esquinas o puntas, que el texto no menciona.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide con la línea general del POB en inglés: dos anillos de oro, colocados en los dos extremos del pectoral, en su borde interior hacia el efod. No se requieren revisiones respecto del audit trail proporcionado.'
  spanish_consistency_notes:
  - Se mantuvo 'efod' como préstamo técnico, conforme al uso bíblico especializado.
  - Se evitó 'SEÑOR' o equivalentes porque no aparece el Tetragrámaton en este versículo.
  - '''Pectoral'' conserva la terminología sacerdotal sin introducir la imagen de armadura.'
  - La referencia espacial se expresó como 'parte interior hacia el efod' para no perder la sutileza direccional del hebreo.
