translation:
  language: es
  text: Queden en silencio, habitantes de la costa[a]; los mercaderes de Sidón, los que cruzan el mar[b], te han llenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «isla»; el hebreo אִי puede referirse a una isla o a una región costera.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede entenderse de manera más escueta: «el mercader de Sidón, cruzando el mar, te abastecía» o «era tu provecho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹּמּוּ
  english_pob_choice: Be silent
  chosen_spanish: Callad
  alternatives_spanish:
  - Guardaos silencio
  - Estad en silencio
  lexicon: HALOT
  rationale: Imperativo plural de דמם. «Callad» conserva el mandato directo y la reacción de silencio ante el juicio, con un español natural y sobrio.
- source_word: יֹשְׁבֵי אִי
  english_pob_choice: inhabitants of the coastland
  chosen_spanish: habitantes de la costa
  alternatives_spanish:
  - habitantes de la costa marítima
  - los que habitan la costa
  lexicon: HALOT
  rationale: אִי puede referirse a isla o región costera. En este contexto profético y marítimo, «costa» comunica bien el ámbito sin forzar una isla literal.
- source_word: סֹחֵר
  english_pob_choice: the merchants
  chosen_spanish: los mercaderes
  alternatives_spanish:
  - los comerciantes
  - el mercader
  lexicon: HALOT
  rationale: El participio singular hebreo tiene sentido colectivo en el contexto. «Mercaderes» refleja mejor la fuerza colectiva adoptada en el POB inglés revisado.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: Transliteración estándar
  rationale: Nombre propio de lugar; «Sidón» es la forma normal en español bíblico y conserva la referencia geográfica.
- source_word: עֹבֵר יָם
  english_pob_choice: those who cross the sea
  chosen_spanish: los que cruzan el mar
  alternatives_spanish:
  - cruzadores del mar
  - los que navegan por el mar
  lexicon: HALOT
  rationale: El participio describe actividad continua o característica. «Los que cruzan el mar» mantiene la imagen marítima y la relación participial sin sonar artificioso.
- source_word: מִלְאֻךְ
  english_pob_choice: have filled you
  chosen_spanish: te han llenado
  alternatives_spanish:
  - te llenaron
  - te han colmado
  lexicon: HALOT
  rationale: La forma verbal con sufijo de segunda femenina singular se refleja naturalmente como «te han llenado». Conserva el verbo de llenura sin añadir una lectura económica no obligada por la forma.
theological_decisions:
- issue: Ambigüedad de אִי (isla vs. región costera)
  english_pob_reading: the coastland
  chosen_spanish_reading: la costa
  alternative_spanish_readings:
  - la isla
  - la región costera
  rationale: El POB opta por el valor amplio de ámbito marítimo/costero en el uso profético. «La costa» preserva esa amplitud y evita restringir el sentido a una isla literal.
  doctrine_reference: Ninguna; decisión léxica-contextual.
- issue: Colectivo singular del participio סֹחֵר
  english_pob_reading: the merchants of Sidon
  chosen_spanish_reading: los mercaderes de Sidón
  alternative_spanish_readings:
  - el mercader de Sidón
  - el comercio de Sidón
  rationale: El hebreo puede leerse de forma colectiva. La revisión inglesa ya explicita el plural, y el español lo expresa de forma natural sin perder la referencia al oficio mercantil.
  doctrine_reference: Ninguna; decisión sintáctico-semántica.
- issue: Sentido de מִלְאֻךְ
  english_pob_reading: have filled you
  chosen_spanish_reading: te han llenado
  alternative_spanish_readings:
  - te llenaron
  - fueron tu provecho
  rationale: La lectura verbal es la más directa desde la forma hebrea. No se adopta una paráfrasis económica («fueron tu provecho/recurso») porque el texto base no lo exige; se conserva el posible eco comercial sin explicitarlo como significado principal.
  doctrine_reference: Ninguna; decisión textual-léxica.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente pasó de formas singulares a plurales para reflejar mejor el sentido colectivo del hebreo y ajustó la participialidad a una cláusula relativa más natural. El español sigue esa decisión revisada: usa «los mercaderes» y «los que cruzan el mar», manteniendo además el valor verbal directo de מִלְאֻךְ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto, pero este versículo no lo contiene.
  - Se usa «mercaderes» en coherencia con el sentido colectivo del hebreo y la revisión inglesa.
  - Se evita «SEÑOR» y se conserva un registro bíblico claro y contemporáneo.
  - La puntuación y el vocativo se adaptan al español moderno sin alterar el paralelismo del hebreo.
