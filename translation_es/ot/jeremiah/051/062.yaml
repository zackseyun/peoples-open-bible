translation:
  language: es
  text: 'y dirás[a]: «Oh, Yahvé, tú mismo has hablado acerca de este lugar, para cortarlo[b], de modo que no haya habitante en él, desde hombre hasta bestia; porque será desolaciones perpetuas[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entonces dirás». La forma hebrea funciona como continuación de mandato o instrucción.
    reason: lexical_alternative
  - marker: b
    text: O «para destruirlo». Literalmente, «para cortarlo». El verbo hebreo conserva la imagen de «cortar» y aquí implica destrucción decisiva.
    reason: lexical_alternative
  - marker: c
    text: O «desolaciones eternas». El hebreo usa un plural con sentido de ruina duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dirás
  alternatives_spanish:
  - entonces dirás
  - y dirás tú
  lexicon: HALOT
  rationale: La forma con prefijo conjuntivo en una secuencia de instrucción se vierte de manera natural en español como continuación imperativa, «y dirás». Conserva el valor de mandato narrativo sin endurecerlo innecesariamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrama en la forma editorial española estándar del proyecto, «Yahvé», en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: אַתָּה
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tú
  - tú en persona
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Tú mismo» preserva esa fuerza enfática en español de modo natural.
- source_word: דִבַּרְתָּ אֶל
  english_pob_choice: have spoken concerning
  chosen_spanish: has hablado acerca de
  alternatives_spanish:
  - has hablado a
  - has hablado contra
  lexicon: HALOT
  rationale: En contexto judicial, el verbo עם אֶל puede expresarse como «hablar acerca de» sin forzar una idea hostil que el contexto inmediato no exige explícitamente. «Acerca de» conserva el referente del lugar.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  lexicon: HALOT
  rationale: «Lugar» es la correspondencia normal de מָקוֹם y funciona con naturalidad en español bíblico contemporáneo.
- source_word: לְהַכְרִיתוֹ
  english_pob_choice: to cut it off
  chosen_spanish: para cortarlo
  alternatives_spanish:
  - para destruirlo
  - para extinguirlo
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de כרת («cortar»), que el inglés POB también retuvo. En español, «cortarlo» mantiene la metáfora y deja que los otros miembros del versículo aclaren el alcance destructivo.
- source_word: לְבִלְתִּי הֱיוֹת בּוֹ יוֹשֵׁב
  english_pob_choice: so that no inhabitant will be in it
  chosen_spanish: de modo que no haya en él habitante
  alternatives_spanish:
  - para que no haya en él ningún habitante
  - de modo que no haya quien habite en él
  lexicon: HALOT
  rationale: La construcción final expresa propósito o resultado. «No haya en él habitante» reproduce con concisión el sentido de ausencia total de pobladores y mantiene el sustantivo verbal de יֹשֵׁב.
- source_word: לְמֵאָדָם וְעַד בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: desde hombre hasta bestia
  alternatives_spanish:
  - de hombre a bestia
  - desde el hombre hasta el animal
  lexicon: HALOT
  rationale: Se conserva la fórmula merística hebrea en una forma española igualmente reconocible. «Hombre» refleja אָדָם en su fuerza genérica masculina, y «bestia» mantiene el paralelismo tradicional del contraste humano/animal.
- source_word: שִׁמְמֹת עוֹלָם
  english_pob_choice: everlasting desolations
  chosen_spanish: desolaciones perpetuas
  alternatives_spanish:
  - desolaciones eternas
  - perpetuas desolaciones
  lexicon: HALOT
  rationale: El plural hebreo se refleja con «desolaciones». Para עוֹלָם, «perpetuas» comunica duración continua de manera idiomática en español y conserva la fuerza durativa del texto.
- source_word: תִּהְיֶה
  english_pob_choice: it will become
  chosen_spanish: será
  alternatives_spanish:
  - se volverá
  - llegará a ser
  lexicon: HALOT
  rationale: En español, con un predicativo nominal final («desolaciones perpetuas»), «será» suena más natural que «se volverá», sin perder el sentido de estado futuro resultante.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrama. La decisión española mantiene el nombre divino transliterado según la convención editorial del proyecto, evitando la sustitución por un título que ocultaría la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de depopulación total «de hombre hasta bestia»
  english_pob_reading: from man to beast
  chosen_spanish_reading: desde hombre hasta bestia
  alternative_spanish_readings:
  - de humano a animal
  - desde personas hasta animales
  rationale: Se preserva la merisma hebrea sin suavizarla. «Hombre» mantiene la fuerza del אָדָם genérico masculino que el proyecto prefiere conservar cuando la forma fuente lo hace.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Sentido de la acción verbal לְהַכְרִיתוֹ
  english_pob_reading: to cut it off
  chosen_spanish_reading: para cortarlo
  alternative_spanish_readings:
  - para destruirlo
  - para arrancarlo
  rationale: La lectura preferida retiene la metáfora de «cortar» antes que explicarla como «destruir», para no perder la huella léxica del verbo hebreo. El contexto ya explicita que la finalidad es la ruina completa del lugar.
  doctrine_reference: HALOT; English POB lexical note on decisive destruction
translation_notes:
  revision_awareness: 'Se revisó el inglés POB y el expediente de auditoría: la traducción española sigue la misma línea óptima-equivalente, conserva el nombre divino como Yahvé, retiene la imagen verbal de כרת («cortar»), reproduce la merisma «desde hombre hasta bestia» y refleja el plural intensivo de שִׁמְמֹת עוֹלָם con «desolaciones perpetuas». No se detectaron revisiones posteriores que alteraran esas decisiones.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se preservó la alternancia de imágenes concretas («cortarlo», «desde hombre hasta bestia») sin explicarlas en el cuerpo principal.
  - La puntuación en comillas angulares sigue la convención editorial española.
  - El orden de los elementos reproduce la progresión del hebreo sin calco excesivo.
