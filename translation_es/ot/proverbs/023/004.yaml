translation:
  language: es
  text: No te fatigues para llegar a ser rico[a]; desiste de tu propio entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te fatigues para hacerte rico; desiste de tu propia sabiduría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No te
  lexicon: HALOT
  rationale: La partícula negativa con valor prohibitivo se expresa de forma natural en español con 'No' al inicio del mandato.
- source_word: תִּיגַע
  english_pob_choice: wear yourself out
  chosen_spanish: te fatigues
  alternatives_spanish:
  - te desgastes
  - te afanes hasta agotarte
  lexicon: HALOT
  rationale: El verbo יגע comunica esfuerzo agotador; 'te fatigues' conserva la idea de cansancio intenso sin sonar tan mecánico como 'te afanes'.
- source_word: לְהַעֲשִׁיר
  english_pob_choice: to get rich
  chosen_spanish: para hacerte rico
  alternatives_spanish:
  - para llegar a ser rico
  - para ganar riqueza
  lexicon: HALOT
  rationale: El infinitivo de Hifil expresa la meta de enriquecerse; 'hacerte rico' transmite bien la finalidad de la acción en español.
- source_word: מִבִּינָתְךָ
  english_pob_choice: cease from your own understanding
  chosen_spanish: de depender de tu propia prudencia
  alternatives_spanish:
  - de tu propia comprensión
  - de tu propio entendimiento
  - de tu propia sabiduría
  lexicon: HALOT
  rationale: בינה apunta a entendimiento/prudencia. Aquí el hebreo es elíptico, y en español la frase se vuelve clara al explicitar la idea de dependencia, sin cambiar el sentido advertido por el contexto sapiencial.
- source_word: חֲדָל
  english_pob_choice: cease from
  chosen_spanish: deja de
  alternatives_spanish:
  - cesa de
  - abandona
  lexicon: HALOT
  rationale: El imperativo de חדל pide dejar de hacer algo. 'Deja de' es la forma más natural y fiel para el mandato prohibitivo en español.
theological_decisions:
- issue: Sentido del segundo hemistiquio
  english_pob_reading: A warning against self-directed, wisdom-based striving for wealth.
  chosen_spanish_reading: Una advertencia contra depender de la propia prudencia al buscar riqueza.
  alternative_spanish_readings:
  - Una exhortación general a dejar la sabiduría propia
  - Un llamado a cesar la propia comprensión
  rationale: Proverbios no condena la sabiduría en sí; por eso conviene mantener la tensión interpretativa del hebreo, entendiendo que se reprueba la autosuficiencia prudencial en la búsqueda de riqueza, no la prudencia verdadera.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue de cerca el ajuste final del audit trail: en el primer colon se conserva la prohibición de fatigarse para enriquecerse, y en el segundo se opta por una formulación española que haga inteligible el hebreo elíptico sin borrar la tensión sapiencial documentada. Se evita mecanizar ''cease from'' como un calco opaco y se explicita la idea de prudencia propia, coherente con la lectura revisada del POB.'
  spanish_consistency_notes:
  - Se usa 'rico' como equivalente directo del objetivo de enriquecerse, en línea con la decisión inglesa 'get rich'.
  - '''Prudencia'' funciona aquí como término amplio para בינה/entendimiento, sin convertirlo en una condena de la sabiduría bíblica.'
  - La nota a pie conserva la alternativa 'sabiduría' para reflejar la variación lexical documentada en el audit trail.
