translation:
  language: es
  text: siendo hijos del Dios Altísimo, grandísimo y vivo[a], que dirige el reino para nosotros y para nuestros antepasados del mejor modo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que guía u ordena el reino para nosotros y para nuestros antepasados en la mejor disposición».
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὺς
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  - hijos e hijas
  lexicon: BDAG
  rationale: En español, ‘hijos’ conserva la filiación explícita sin forzar una marcación masculina tan rígida como ‘hijos varones’. Dado que el contexto es corporativo y la fórmula filial ya está marcada por el participio, ‘hijos’ comunica la relación de pertenencia con naturalidad y sin neutralizar indebidamente el texto.
- source_word: τοῦ ὑψίστου μεγίστου ζῶντος θεοῦ
  english_pob_choice: of the Most High, greatest, living God
  chosen_spanish: del Altísimo, el más grande, Dios vivo
  alternatives_spanish:
  - del Altísimo, grandísimo, Dios vivo
  - del Altísimo, el mayor, Dios vivo
  - del Altísimo, grandísimo y vivo Dios
  lexicon: LEH
  rationale: Se conserva la acumulación de epítetos divinos, pero en español se ordena de modo idiomático. ‘Altísimo’ traduce ὑψίστου; ‘el más grande’ mantiene μεγίστου como superlativo; ‘Dios vivo’ refleja ζῶντος θεοῦ sin convertirlo en una frase menos natural como ‘vivo Dios’.
- source_word: κατευθύνοντος
  english_pob_choice: who directs
  chosen_spanish: que dirige
  alternatives_spanish:
  - que guía
  - que ordena
  - que encamina
  lexicon: LEH
  rationale: ‘Dirige’ reproduce el sentido de conducción/providencia gubernativa que el POB entendió en ‘directs’. En español permite conservar tanto la idea de guía como la de administración soberana del reino.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la soberanía
  lexicon: LEH
  rationale: ‘Reino’ es la equivalencia más directa y natural en español para βασιλεία en este contexto. Otras opciones desplazan el foco hacia el ejercicio del poder o hacia la institución; ‘reino’ preserva mejor el referente político-teológico del texto.
- source_word: ἡμῖν τε καὶ τοῖς προγόνοις ἡμῶν
  english_pob_choice: for us and for our forefathers
  chosen_spanish: para nosotros y para nuestros antepasados
  alternatives_spanish:
  - para nosotros y para nuestros padres
  - para nosotros y para nuestros mayores
  - para nosotros y para nuestros forefathers
  lexicon: LEH
  rationale: ‘Antepasados’ traduce πρόγονοι con un registro claro y natural en español. ‘Forefathers’ sería poco idiomático; ‘padres’ estrecharía demasiado el sentido; ‘mayores’ sería ambiguo.
- source_word: ἐν τῇ καλλίστῃ διαθέσει
  english_pob_choice: in the best order
  chosen_spanish: en el mejor orden
  alternatives_spanish:
  - en la mejor disposición
  - con el mejor arreglo
  - en el mejor gobierno
  lexicon: LEH
  rationale: ‘Orden’ expresa bien la idea de disposición o arreglo providencial sin añadir una interpretación demasiado específica. Se mantiene la superlación de καλλίστῃ mediante ‘mejor’.
theological_decisions:
- issue: Filialidad corporativa del pueblo respecto de Dios
  english_pob_reading: being sons of the Most High, greatest, living God
  chosen_spanish_reading: siendo hijos del Altísimo, el más grande, Dios vivo
  alternative_spanish_readings:
  - siendo hijos e hijas del Altísimo, el más grande, Dios vivo
  - siendo niños del Altísimo, el más grande, Dios vivo
  rationale: El griego usa υἱοὺς, un término filial explícito. Se mantiene la fuerza teológica de pertenencia/covenantidad sin sustituirla por una neutralización que borre el vocabulario del texto. ‘Siendo’ conserva el participio sin introducir causalidad adicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Providencia divina sobre el reino
  english_pob_reading: who directs the kingdom for us and for our forefathers
  chosen_spanish_reading: que dirige el reino para nosotros y para nuestros antepasados
  alternative_spanish_readings:
  - que guía el reino para nosotros y para nuestros antepasados
  - que ordena el reino para nosotros y para nuestros antepasados
  - que gobierna el reino para nosotros y para nuestros antepasados
  rationale: ‘Dirige’ conserva la lectura providencial del participio presente sin fijarlo a un evento pasado ni volverlo más teológicamente intrusivo de lo que permite el griego. Así se mantiene la idea de gobierno continuo de Dios sobre el reino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que ajustó el inglés de ‘since we are’ a ‘being’ para reflejar mejor el participio griego sin añadir causalidad. Por eso el español comienza con ‘siendo’, que reproduce la construcción participial de modo más cercano y evita una subordinada causal o explicativa no explícita en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero aquí el texto griego usa θεός y no el tetragrámaton; por eso se traduce ‘Dios’.
  - Se preservó la acumulación de títulos divinos sin simplificarla excesivamente, para respetar el tono elevado del griego.
  - ‘Reino’ se eligió como equivalente estable de βασιλεία en coherencia con el resto del proyecto, sin introducir ‘reinado’ o ‘soberanía’ como lectura principal.
