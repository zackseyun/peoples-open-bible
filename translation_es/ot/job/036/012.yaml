translation:
  language: es
  text: Pero si no escuchan, perecerán por la espada y morirán sin entendimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por falta de conocimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una condición con matiz adversativo respecto del versículo anterior. En español, «Pero si» conserva mejor ese giro que un simple «Y si».
- source_word: לֹא יִשְׁמְעוּ
  english_pob_choice: they do not listen
  chosen_spanish: no escuchan
  alternatives_spanish:
  - no oyen
  - no obedecen
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, escuchar y obedecer. «Escuchan» mantiene esa amplitud sin cerrar prematuramente el sentido a «obedecen».
- source_word: בְּשֶׁלַח
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - con una arma
  - por una arma arrojadiza
  - por un dardo
  lexicon: HALOT
  rationale: El término puede referirse a un instrumento de destrucción. En español, «espada» es la forma natural y suficientemente amplia en este contexto de juicio, manteniendo la fuerza idiomática del hebreo.
- source_word: יַעֲבֹרוּ
  english_pob_choice: they will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán de largo
  - perecerán
  lexicon: HALOT
  rationale: עָבַר aquí funciona idiomáticamente como muerte o desaparición. «Pasarán» conserva la imagen verbal de tránsito que el inglés POB intenta retener con «pass away».
- source_word: וְיִגְוְעוּ
  english_pob_choice: and they will die
  chosen_spanish: y morirán
  alternatives_spanish:
  - y expirarán
  - y perecerán
  lexicon: HALOT
  rationale: גוע denota morir o expirar. «Morirán» es claro, natural y conserva el paralelismo con la cláusula anterior.
- source_word: כִּבְלִי דָעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - por falta de conocimiento
  - sin entendimiento
  lexicon: HALOT
  rationale: La construcción admite un matiz de condición o causa. «Sin conocimiento» sigue de cerca la forma hebrea y deja abierta la alternativa causal, sin resolverla de manera excesiva en el texto principal.
theological_decisions:
- issue: Cómo reflejar el valor de שׁמע en un contexto de advertencia divina
  english_pob_reading: they do not listen
  chosen_spanish_reading: no escuchan
  alternative_spanish_readings:
  - no oyen
  - no obedecen
  rationale: El contexto exhorta a responder al mensaje de Dios. «Escuchan» conserva la amplitud semántica de oír y atender, evitando reducir el verbo a una mera percepción auditiva o a una obediencia más estrecha de lo que el hebreo exige.
  doctrine_reference: Translation philosophy §3
- issue: Si la frase final expresa causa o estado
  english_pob_reading: without knowledge
  chosen_spanish_reading: sin conocimiento
  alternative_spanish_readings:
  - por falta de conocimiento
  rationale: La construcción hebrea permite tanto una lectura de estado como una de causa. La redacción principal mantiene la formulación más cercana al hebreo, mientras que la nota preserva la posibilidad causal indicada por el texto y el audit trail en inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto hebreo y la traducción inglesa auditada coinciden en lo esencial: advertencia condicional, juicio por la espada, y muerte en estado de carencia de conocimiento. No se requieren cambios textuales; la única tensión relevante es la posibilidad de traducir כִּבְלִי דָעַת como causa («por falta de conocimiento») o como estado («sin conocimiento»), resuelta en el texto principal con nota alternativa.'
  spanish_consistency_notes:
  - Se usó «espada» para בְּשֶׁלַח por ser la equivalencia española más natural en este contexto judicial, aunque el hebreo puede ser más amplio.
  - Se prefirió «escuchan» para mantener la ambigüedad de שׁמע entre oír y obedecer.
  - No se introdujo terminología eclesiástica tradicional que desplace el sentido hebreo del versículo.
