    reason: lexical_alternative
  - marker: b
    text: O, «un escape» o «sobrevivientes». El término se refiere a los preservados a través del juicio; «remanente» destaca el contexto postexílico del pueblo restaurado.
    reason: lexical_alternative
  revision_rationale: 'Se reemplazó la cláusula central por una formulación idiomática y fiel al hebreo: «has refrenado tu castigo por debajo de nuestras iniquidades» expresa que Dios no los trató según toda la medida de su culpa, sin caer en el español confuso de «nos has retenido menos». También se añadieron notas ancladas para preservar la alternativa auditada sobre la misericordia divina y para mantener la alternativa lexical de פְּלֵיטָה. La puntuación con raya conserva mejor la oración suspendida que continúa en el siguiente versículo.'
