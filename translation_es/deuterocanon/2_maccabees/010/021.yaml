translation:
  language: es
  text: ¡Adiós! En el año ciento cuarenta y ocho[a], el día veinticuatro de Dioscorintio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Fecha del cómputo seléucida, expresada en el texto griego como «el año ciento cuarenta y ocho».
    reason: cultural_note
  - marker: b
    text: Dioscorintio es el nombre de un mes macedonio, conservado por transliteración.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Paz!
  alternatives_spanish:
  - ¡Adiós!
  - ¡Hasta luego!
  - ¡Salud!
  lexicon: LSJ
  rationale: La forma griega es una fórmula epistolar de despedida. En español, «¡Paz!» comunica un cierre breve y digno sin volverla una exhortación literal a estar fuerte; conserva el valor de despedida y resulta natural en un registro bíblico.
- source_word: ἔτους ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: In the one hundred forty-eighth year
  chosen_spanish: En el año ciento cuarenta y ocho
  alternatives_spanish:
  - En el año 148
  - Año ciento cuarenta y ocho
  lexicon: LSJ
  rationale: La construcción genitiva griega funciona como fórmula de datación. En español conviene explicitar «En el año» para mantener la función cronológica y la lectura fluida, sin alterar el contenido numérico.
- source_word: Διὸς Κορινθίου
  english_pob_choice: Dioscorinthius
  chosen_spanish: Díos Corintio
  alternatives_spanish:
  - Dioscorintio
  - el mes Díos Corintio
  - Dío(s) Corintio
  lexicon: LSJ
  rationale: El griego presenta un nombre propio de mes macedonio. En vez de reemplazarlo por un equivalente interpretativo, se conserva como transliteración en español. La separación gráfica ayuda a leer el compuesto sin borrar su carácter calendárico propio.
- source_word: τετράδι καὶ εἰκάδι
  english_pob_choice: on the twenty-fourth day
  chosen_spanish: el día veinticuatro
  alternatives_spanish:
  - el cuarto y vigésimo día
  - el día vigésimo cuarto
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente significa «el cuarto y vigésimo». En español, la forma natural y fiel es «el día veinticuatro», que preserva el valor del fechamiento sin calco incómodo.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el pasaje griego y la lectura inglesa auditada coinciden en lo esencial, con solo ajustes de formulación natural en español.
  spanish_consistency_notes:
  - Se conserva el orden de saludo + fecha del original.
  - Se evita sustituir el nombre del mes por una explicación dentro del texto principal.
  - La fecha se expresa de manera idiomática en español, manteniendo el dato cronológico exacto.
