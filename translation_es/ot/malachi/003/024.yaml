translation:
  language: es
  text: Y hará volver los corazones de los padres a los hijos[a], y los corazones de los hijos a sus padres, no sea que yo venga y hiera la tierra con destrucción total.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con anatema»; tradicionalmente, «con una maldición». El término hebreo alude a algo puesto bajo interdicto y destinado a destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב
  english_pob_choice: And he will turn
  chosen_spanish: Y hará volver
  alternatives_spanish:
  - Y volverá
  - Y restaurará
  - Y hará regresar
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver/volver atrás o restaurar. En español, «hará volver» conserva la idea relacional de reorientar los afectos sin sobretraducirlo como una restauración más amplia que el contexto no exige.
- source_word: לֵב
  english_pob_choice: hearts
  chosen_spanish: el corazón
  alternatives_spanish:
  - el corazón interior
  - la mente
  - los corazones
  lexicon: HALOT
  rationale: En hebreo, «corazón» incluye voluntad, afecto e ինտención. En español, el singular colectivo «el corazón» funciona bien con el paralelismo y evita sonar excesivamente abstracto; el sentido distributivo se mantiene por la estructura de los dos miembros.
- source_word: אָבוֹת
  english_pob_choice: fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de los padres varones
  - de los progenitores
  - de los antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «padres», no un término general de ancestros. Mantengo esa precisión generacional y masculina, consistente con la lectura auditada del POB inglés, sin neutralizarla a «progenitores».
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: En esta construcción idiomática, עַל expresa orientación relacional. En español, «a» es la forma natural y fiel para «el corazón de los padres a los hijos».
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los descendientes
  - los hijos e hijas
  lexicon: HALOT
  rationale: El plural puede significar «hijos» o de modo más general «hijos/descendientes». Aquí el paralelismo familiar inmediato favorece «los hijos», que conserva además el contraste generacional de manera directa.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus padres varones
  - a sus antepasados
  - a sus padres de familia
  lexicon: HALOT
  rationale: El sufijo pronominal exige marcar posesión. «Padres» reproduce la relación inmediata y mantiene la reciprocidad del paralelismo; «antepasados» ampliaría innecesariamente el alcance.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  - porque no
  lexicon: HALOT
  rationale: פֶּן introduce advertencia de consecuencia indeseable. «No sea que» es un equivalente natural y solemne en español bíblico contemporáneo, sin caer en un giro arcaizante forzado.
- source_word: אָבוֹא
  english_pob_choice: I come
  chosen_spanish: yo venga
  alternatives_spanish:
  - yo venga a
  - yo llegue
  - yo venga
  lexicon: HALOT
  rationale: Después de la partícula de prevención, el subjuntivo en español expresa adecuadamente la eventualidad amenazante. «Yo venga» conserva la primera persona singular del hebreo y el tono de advertencia profética.
- source_word: וְהִכֵּיתִי
  english_pob_choice: and strike
  chosen_spanish: y hiera
  alternatives_spanish:
  - y golpee
  - y hiera de muerte
  - y castigue
  lexicon: HALOT
  rationale: El verbo הכה puede significar golpear, herir o atacar. «Hiera» comunica el acto de juicio con suficiente fuerza y evita un término demasiado coloquial; además se coordina naturalmente con el subjuntivo anterior.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  - el suelo
  lexicon: HALOT
  rationale: Aunque el sentido profético puede ser territorial, el español «la tierra» resulta natural y abarca el valor de אֶרֶץ sin restringirlo artificialmente a una unidad política moderna.
- source_word: חֵרֶם
  english_pob_choice: with a ban of destruction
  chosen_spanish: con un anatema de destrucción
  alternatives_spanish:
  - con destrucción total
  - con una maldición
  - con un ban de destrucción
  lexicon: HALOT
  rationale: חֵרֶם designa algo puesto bajo interdicto y consagrado a destrucción. «Anatema de destrucción» preserva la carga técnico-teológica del término mejor que «maldición», que sería más estrecha y potencialmente engañosa. «Ban» se evita por resultar menos transparente en español.
theological_decisions:
- issue: Valor teológico de חֵרֶם al cierre de Malaquías
  english_pob_reading: with a ban of destruction
  chosen_spanish_reading: con un anatema de destrucción
  alternative_spanish_readings:
  - con destrucción total
  - con una maldición
  - con un ban de destrucción
  rationale: 'El cierre del libro no usa el término ordinario para «maldición», sino una noción de juicio por interdicto: algo apartado para destrucción bajo la sentencia divina. «Anatema de destrucción» preserva esa gravedad y evita suavizar el final profético. La alternativa tradicional «maldición» se reconoce como opción, pero no se adopta porque reduce el peso técnico del hebreo.'
  doctrine_reference: 'Principio POB: primacía del texto original y preservación del peso teológico del léxico hebreo; no sustituir un término cargado por un equivalente devocional más común sin base textual.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la confirmación de alta concordancia sin revisiones pendientes; la redacción española sigue la misma decisión clave para חֵרֶם, pero la vierte con un equivalente más transparente para el lector hispanohablante.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece y no se introduce.
  - Se conservó la reciprocidad familiar del paralelismo con «padres» e «hijos» sin neutralizar el género del hebreo.
  - Se evitó «SEÑOR» o una paráfrasis explicativa para no ocultar el peso del cierre profético.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura hebrea de dos miembros y cláusula de advertencia.
