    issue: La frase 'has vuelto su corazón atrás' es poco natural y no expresa bien el causativo hebreo.
    rationale: הֲסִבֹּתָ es hifil causativo ('has hecho volver/has hecho regresar'), y אֲחֹרַנִּית aquí expresa retorno. En español, 'volver algo atrás' aplicado al corazón suena torpe y potencialmente espacial en vez de relacional/espiritual.
  - severity: low
