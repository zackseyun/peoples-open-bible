translation:
  language: es
  text: No se hará impuro por ellos cuando mueran[a], ni siquiera por su padre o por su madre, por su hermano o por su hermana;[b] porque la consagración de su Dios está sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se hará impuro por ellos a su muerte».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo nezer; en el contexto nazareo, designa la señal o estado de consagración o separación a Dios, simbolizado por el cabello sobre su cabeza.
    reason: cultural_note
lexical_decisions:
- source_word: לְאָבִיו ... וּלְאִמּוֹ ... לְאָחִיו ... וּלְאַחֹתוֹ
  english_pob_choice: not even for his father or his mother, for his brother or his sister
  chosen_spanish: ni siquiera por su padre o por su madre, por su hermano o por su hermana
  alternatives_spanish:
  - por su padre, o por su madre, por su hermano, o por su hermana
  - con respecto a su padre ... madre ... hermano ... hermana
  lexicon: HALOT
  rationale: Los complementos preposicionales van antepuestos en hebreo para dar énfasis. En español, 'ni siquiera por...' conserva ese énfasis y suena natural. Mantengo los parentescos en singular y con concordancia de género para reflejar el hebreo con precisión.
- source_word: לֹא יִטַּמָּא
  english_pob_choice: He shall not make himself unclean
  chosen_spanish: No se hará impuro
  alternatives_spanish:
  - No se contaminará
  - No se defile
  lexicon: HALOT
  rationale: 'El verbo es reflexivo en este contexto ritual: el nazareo no debe causar en sí mismo impureza cultual. ''Hacerse impuro'' preserva la idea reflexiva y evita una lectura moralizante de ''contaminarse'' o ''defilarse''.'
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a causa de ellos
  - en razón de ellos
  lexicon: HALOT
  rationale: El pronombre retoma a los parientes mencionados. 'Por ellos' funciona en español como equivalente breve y natural dentro de la expresión de causa o motivo de la impureza ritual.
- source_word: בְּמֹתָם
  english_pob_choice: at their death
  chosen_spanish: al morir
  alternatives_spanish:
  - cuando mueran
  - a su muerte
  - por su muerte
  lexicon: HALOT
  rationale: La frase nominal hebrea señala la circunstancia de la muerte. 'Al morir' conserva la temporalidad del evento de forma concisa y fluida en español.
- source_word: נֵזֶר
  english_pob_choice: the consecration
  chosen_spanish: la consagración
  alternatives_spanish:
  - la separación
  - la dedicación nazarea
  - la corona
  lexicon: HALOT
  rationale: En el contexto nazareo, נֵזֶר designa el estado/signo de consagración o separación a Dios. 'Consagración' comunica ese valor cultual con claridad en español, sin reducirlo a un objeto material.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios
  - el Dios de él
  lexicon: HALOT
  rationale: El sufijo posesivo hebreo debe conservarse. 'Su Dios' mantiene la relación personal y pactal que el texto expresa.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: is on his head
  chosen_spanish: está sobre su cabeza
  alternatives_spanish:
  - está en su cabeza
  - reposa sobre su cabeza
  lexicon: HALOT
  rationale: La imagen concreta se conserva con 'está sobre su cabeza'. 'Sobre' reproduce bien el sentido de señal visible vinculada al cabello del nazareo, sin añadir interpretación excesiva al texto principal.
theological_decisions:
- issue: Naturaleza de la impureza en la ley nazarea
  english_pob_reading: Render the prohibition in ritual/cultic terms rather than moral terms.
  chosen_spanish_reading: 'Formular la prohibición en términos rituales: ''hacerse impuro'''
  alternative_spanish_readings:
  - '''contaminarse'''
  - '''mancharse'''
  rationale: El contexto trata de impureza por cadáver, no de culpa moral. La traducción evita importar una carga ética que el pasaje no está afirmando.
  doctrine_reference: 'Principio de traducción: no introducir implicaciones doctrinales que el texto no declara.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés. No se registran revisiones aplicadas en el paquete fuente; el pasaje presenta alta concordancia entre las decisiones auditadas y el hebreo masorético.
  spanish_consistency_notes:
  - Se mantiene 'consagración' para נֵזֶר en contexto nazareo.
  - Se evita 'Señor' como sustituto de Yahvé, aunque este versículo no contiene el Tetragrámaton.
  - Se usa lenguaje ritual ('impuro') y no moralizante.
  - Se conservan los parentescos en singular y la referencia posesiva 'su Dios'.
