translation:
  language: es
  text: Mis enemigos me pisotean todo el día[a], porque muchos luchan contra mí con soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Oh, Altísimo!»; la última palabra hebrea también puede leerse como un vocativo dirigido a Dios, en lugar de describir la actitud o posición exaltada de los atacantes; algunos también la entienden como «orgullosamente».'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁאֲפוּ
  english_pob_choice: trample on
  chosen_spanish: aplastan
  alternatives_spanish:
  - pisotean
  - oprimen
  - arremeten contra
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción violenta y hostil; en el contexto poético, «aplastan» comunica bien la imagen de agresión continua sin volverlo demasiado literal o extraño en español.
- source_word: שׁוֹרְרַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - mis atacantes
  - mis foes
  lexicon: HALOT
  rationale: El sustantivo denota oponentes hostiles. «Mis enemigos» es claro, natural y mantiene el tono de lamentación del salmo.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - durante todo el día
  lexicon: HALOT
  rationale: La locución idiomática se vierte con la expresión española más natural y directa, conservando la idea de continuidad.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque de
  lexicon: HALOT
  rationale: Aquí introduce la razón del lamento; «porque» expresa de modo claro la relación causal en español.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  - varios
  lexicon: HALOT
  rationale: Es un adjetivo cuantitativo simple; «muchos» es la opción más idiomática y fiel.
- source_word: לֹחֲמִים לִי
  english_pob_choice: fight against me
  chosen_spanish: luchan contra mí
  alternatives_spanish:
  - pelean contra mí
  - combaten contra mí
  - guerrean contra mí
  lexicon: HALOT
  rationale: El participio expresa hostilidad continua. «Luchan contra mí» mantiene la fuerza bélica sin sonar demasiado técnico.
- source_word: מָרוֹם
  english_pob_choice: proudly
  chosen_spanish: con soberbia
  alternatives_spanish:
  - con altivez
  - desde lo alto
  - orgullosamente
  lexicon: HALOT
  rationale: Dado el contexto y la recepción auditada del POB inglés, el término puede entenderse adverbialmente como actitud de orgullo/altivez. «Con soberbia» conserva ese matiz y evita resolver la ambigüedad hacia una lectura vocativa que no domina el contexto.
theological_decisions:
- issue: Sentido de מָרוֹם al final del verso
  english_pob_reading: proudly
  chosen_spanish_reading: con soberbia
  alternative_spanish_readings:
  - desde lo alto
  - ¡Oh Altísimo!
  - altivamente
  rationale: El hebreo final es comprimido y admite varias lecturas. En la línea principal se conserva la lectura adverbial, que en español puede expresarse con naturalidad como «con soberbia». Se mantiene la tensión interpretativa sin convertir el verso en una invocación explícita a Dios.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés, que prefirió una imagen de agresión continua y leyó מָרוֹם de manera adverbial. La versión española conserva esa decisión general, pero la expresa con un verbo más natural en español («aplastan») y con un adverbio de actitud («con soberbia») que mantiene abierta la ambigüedad textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige explícitamente; este versículo no lo contiene.
  - Se mantiene «enemigos» para שׁוֹרְרַי, en línea con el valor hostil del término.
  - La frase final conserva la ambigüedad de מָרוֹם mediante una nota, evitando elegir sin necesidad entre lectura adverbial y vocativa.
  - Se prefirió un español poético claro y contemporáneo, sin depender de fórmulas tradicionales que oscurezcan el sentido original.
