translation:
  language: es
  text: Y se encontró en ella un hombre pobre, pero sabio, y él libró la ciudad con su sabiduría; y nadie recordó a aquel hombre pobre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וּמָצָא בָהּ
  english_pob_choice: there was found in it
  chosen_spanish: se encontró en ella
  alternatives_spanish:
  - se halló en ella
  - fue hallado en ella
  lexicon: HALOT
  rationale: El hebreo usa מצא en forma impersonal/indefinida; en español, la pasiva refleja con «se encontró» comunica bien que apareció o fue hallado alguien en la ciudad sin introducir un sujeto explícito.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: אִישׁ designa a un varón o hombre; «hombre» conserva el valor léxico directo y el tono sobrio del texto sapiencial.
- source_word: מִסְכֵּן
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - menesteroso
  lexicon: HALOT
  rationale: El adjetivo expresa pobreza o baja condición social/económica. «Pobre» es la equivalencia más natural y directa en español.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: En Eclesiastés, חָכָם pertenece al vocabulario sapiencial estándar. «Sabio» conserva ese campo semántico mejor que opciones más explicativas.
- source_word: וּמִלַּט הוּא אֶת הָעִיר
  english_pob_choice: and he delivered the city
  chosen_spanish: y él libró la ciudad
  alternatives_spanish:
  - y él salvó la ciudad
  - y él rescató la ciudad
  lexicon: HALOT
  rationale: מלט en piel significa librar, rescatar o salvar. «Libró la ciudad» mantiene el sentido de rescate sin cargarlo con una formulación excesivamente interpretativa.
- source_word: בְּחָכְמָתוֹ
  english_pob_choice: by his wisdom
  chosen_spanish: con su sabiduría
  alternatives_spanish:
  - por medio de su sabiduría
  - mediante su sabiduría
  lexicon: HALOT
  rationale: La preposición ב puede expresar medio/instrumento. «Con su sabiduría» es idiomático en español y preserva el valor instrumental; «por medio de» queda como alternativa más explícita.
- source_word: וְאָדָם
  english_pob_choice: yet no one
  chosen_spanish: y nadie
  alternatives_spanish:
  - y ningún hombre
  - y ninguna persona
  lexicon: HALOT
  rationale: אָדָם aquí funciona genéricamente. En español, «nadie» expresa con naturalidad la ausencia de recuerdo sin perder el alcance universal del hebreo, y evita una lectura masculina exclusiva innecesaria.
- source_word: זָכַר
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - tuvo presente
  lexicon: HALOT
  rationale: זכר significa recordar, tener presente o hacer memoria. «Recordó» conserva la relación con el acto de memoria y mantiene el contraste con el olvido social del hombre.
- source_word: הָאִישׁ הַמִּסְכֵּן הַהוּא
  english_pob_choice: that poor man
  chosen_spanish: aquel hombre pobre
  alternatives_spanish:
  - ese hombre pobre
  - aquel pobre hombre
  lexicon: HALOT
  rationale: La secuencia definida y demostrativa requiere una referencia específica. «Aquel hombre pobre» conserva el énfasis deíctico; el orden elegido evita que «pobre» suene meramente emotivo o idiomático.
theological_decisions:
- issue: Valor genérico de אָדָם en una cláusula negativa
  english_pob_reading: no one
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - ningún hombre
  - ninguna persona
  rationale: El hebreo usa אָדָם de manera genérica; la POB en inglés pasó de «no man» a «no one» para naturalidad contemporánea. En español, «nadie» transmite el mismo alcance universal con máxima naturalidad, sin ocultar que el original habla de la falta de memoria de cualquier ser humano.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested terms for אָדָם'
translation_notes:
  revision_awareness: La edición inglesa revisó la cláusula final de «no man» a «no one» por naturalidad contemporánea, manteniendo intacto el resto del análisis. La redacción española sigue ese mismo ajuste semántico con «nadie», sin perder la fuerza genérica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - «Sabio/sabiduría» conserva el léxico sapiencial recurrente de Eclesiastés.
  - La nota a pie de página marca la alternativa idiomática, no una variante textual.
