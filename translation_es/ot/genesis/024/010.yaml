    reason: lexical_alternative
  - marker: c
    text: 'O: «diez camellos de entre los camellos de su amo».'
    reason: previous_rendering
  - marker: d
    text: 'O: «con todo tipo de cosas buenas de su amo en su mano».'
    reason: previous_rendering
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras relevantes del texto, y se ajustó su contenido para reflejar con fidelidad las alternativas y redacciones previas del expediente inglés. También se cambió 'partió' por 'fue' para conservar más de cerca el valor básico de וילך en la narración. Se mantuvo 'esclavo', 'amo', 'Aram-naharaim' y 'Nacor' por ser opciones defendibles y fieles al enfoque del proyecto.
