  text: בִּ/ימֵ֞י שַׁמְגַּ֤ר בֶּן עֲנָת֙ בִּ/ימֵ֣י יָעֵ֔ל חָדְל֖וּ אֳרָח֑וֹת וְ/הֹלְכֵ֣י נְתִיב֔וֹת יֵלְכ֕וּ אֳרָח֖וֹת עֲקַלְקַלּֽוֹת־׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/005/006.yaml
  text: In the days of Shamgar son of Anath[a], in the days of Jael, the highways were deserted[b], and travelers went by roundabout paths.
