review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del sentido hebreo y sigue correctamente el audit trail inglés en «Yahvé» y «la isla de Caftor». Sin embargo, la apertura «porque del día que viene» no es español natural ni expresa bien el valor causal de עַל הַיּוֹם הַבָּא; debe ser «a causa del día que viene» o equivalente. Además, la nota al pie [a] está mal anclada: en inglés la alternativa corresponde a «the remnant of the island of Caphtor», pero en español se colocó sobre «filisteos», creando una incoherencia semántica. También conviene mejorar «todo sobreviviente que ayuda» por una forma más idiomática que conserve כֹּל שָׂרִיד עֹזֵר.'
  spanish_quality_summary: 'La redacción actual tiene dos problemas importantes de legibilidad: «porque del día que viene» suena a calco incorrecto, y «todo sobreviviente que ayuda» es entendible pero tosco. El resto es claro y digno. Una revisión menor produce un español mucho más natural sin alejarse del hebreo.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» está correcto; el etnónimo «filisteos» está bien; «remanente» preserva שְׁאֵרִית; «isla» sigue la revisión inglesa para אִי. No hay conflicto doctrinal, solo ajustes de sintaxis y de anclaje de nota.'
  issues:
