translation:
  language: es
  text: 'Yahvé habló a Moisés[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente se vierte ''el SEÑOR''. Entre las traducciones posibles están ''Yahvé'' y ''Jehová''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce un nuevo acto narrativo de habla divina. En español, 'habló' conserva bien el carácter formal de una intervención verbal y sigue de cerca el valor de 'spoke' en el audit trail inglés, sin volver la fórmula innecesariamente rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del texto hebreo. 'Yahvé' es la forma española adoptada por el proyecto para יְהוָה, en lugar de sustituirlo por un título como 'el SEÑOR'.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' es la equivalencia natural y directa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente adaptado en español bíblico; 'Moisés' es la forma estándar y plenamente inteligible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La construcción infinitiva funciona como fórmula introductoria de discurso. 'Diciendo' conserva la estructura hebrea y reproduce el valor de enlace del inglés 'saying' de manera natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión del POB inglés preserva el Tetragrama como nombre propio, no como sustituto reverencial. En español, 'Yahvé' mantiene esa misma decisión teológica y auditiva; 'el SEÑOR' ocultaría el nombre revelado, y 'Jehová' no corresponde a la norma terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado y con la evaluación de alta concordancia; no se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino 'Yahvé' conforme a la política del proyecto.
  - La fórmula verbal 'habló ... diciendo' conserva el giro narrativo hebreo sin añadir contenido.
  - Se usa 'Moisés' como forma española establecida del nombre propio.
