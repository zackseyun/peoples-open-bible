    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: «y aquel hombre no pereció solo por su iniquidad», o, de manera más literal, «aunque era un solo hombre, no pereció solo en su iniquidad».'
    reason: alternative_reading
