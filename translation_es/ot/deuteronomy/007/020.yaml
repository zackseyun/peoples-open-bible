review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: adición enfática («Además»), envío activo por parte de Yahvé, agente enviado «entre ellos», y resultado hasta la muerte de los que quedan y se esconden. También preserva correctamente el nombre divino como «Yahvé» y mantiene en nota la alternativa figurada para הַצִּרְעָה. Sin embargo, «la avispa» no es la mejor equivalencia para הַצִּרְעָה dado el audit trail inglés, que escogió específicamente «the hornet» y distinguió «hornet» de términos más genéricos; en español, «el avispón» preserva mejor esa especificidad léxica.'
  spanish_quality_summary: 'El español es claro y natural, de registro bíblico moderno y digno. «De delante de ti» funciona, aunque suena algo rígido; no obstante, sigue siendo inteligible y fiel al hebreo. El principal problema de calidad es léxico-semántico: «avispa» puede sonar demasiado general y reducir la precisión del referente. El resto de la redacción es fluida y bien puntuada.'
  glossary_alignment: Alinea correctamente «Yahvé», «Dios», y el tratamiento general del pasaje. La nota léxica conserva la tensión interpretativa correctamente. Se recomienda ajustar הַצִּרְעָה de «la avispa» a «el avispón» para corresponder mejor a la decisión documentada de «the hornet» y evitar un equivalente demasiado amplio.
  issues:
  - severity: medium
    issue: «la avispa» es demasiado general para הַצִּרְעָה
    rationale: El expediente inglés eligió «the hornet» como sentido léxico principal, no un insecto genérico. En español, «avispa» puede abarcar varias especies y no transmite tan bien la especificidad de «hornet». «El avispón» se ajusta mejor a la decisión léxica auditada, manteniendo además la lectura literal principal.
  revised_spanish_text: Además, Yahvé tu Dios enviará el avispón[a] entre ellos, hasta que perezcan incluso los que queden y los que se escondan de delante de ti.
  revised_footnotes:
  - marker: a
    text: O posiblemente, «el terror o pánico»; algunos entienden «el avispón» en sentido figurado como temor enviado por Dios más que como un insecto literal.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente el referente de הַצִּרְעָה de «la avispa» a «el avispón» para reflejar con mayor precisión la decisión léxica documentada en el POB inglés («the hornet»). Se conserva la estructura, el tono, el nombre divino y la nota sobre la posible lectura figurada.
