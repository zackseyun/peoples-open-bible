translation:
  language: es
  text: Y Josué debilitó las fuerzas de Amalec y de su pueblo con el filo de la espada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «por el filo de la espada». El hebreo dice literalmente «por la boca de la espada», un modismo para la derrota mediante combate armado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹשׁ
  english_pob_choice: weakened
  chosen_spanish: debilitó
  alternatives_spanish:
  - venció
  - derrotó
  - quebrantó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar debilitar o prevalecer sobre el enemigo. En español, «debilitó» conserva la fuerza semántica de reducción de poder sin añadir necesariamente la idea de aniquilación total. Mantiene mejor el matiz del texto fuente que «venció» o «derrotó», que suenan más conclusivos.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Convención bíblica en español
  rationale: El nombre propio bíblico se adapta a la forma establecida en español, «Josué», que es plenamente reconocible y fiel a la referencia del original.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: Convención bíblica en español
  rationale: El nombre propio se vierte como «Amalec», forma habitual en español bíblico. Conserva la identidad del referente sin necesidad de transliteración inglesa.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - sus tropas
  - su ejército
  lexicon: HALOT
  rationale: עַם significa «pueblo» o «gente». En este contexto bélico, «su pueblo» sigue de cerca la forma hebrea y evita sobreinterpretar el término como «ejército» o «tropas».
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - por el filo de la espada
  - con la boca de la espada
  - con la punta de la espada
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «por la boca de la espada», un modismo para derrota por combate armado. El POB inglés fijó «with the edge of the sword» como equivalente formal; en español, «con el filo de la espada» conserva esa formalidad y comunica el valor idiomático sin calco extraño.
translation_notes:
  revision_awareness: El borrador sigue la última revisión del POB inglés, que prefirió una equivalencia más cercana para el verbo hebreo y una formulación más formal para לְפִי חָרֶב. Se ha mantenido esa orientación en español, pero adaptando el nombre propio al uso bíblico español («Josué», «Amalec»).
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino; no aplica una decisión sobre YHWH aquí.
  - Se mantuvo «espada» en singular, conforme al hebreo y al singular idiomático del inglés auditado.
  - La nota al pie preserva la alternativa formal e informa del hebraísmo literal, ya que el español también podría oscurecer el modismo sin explicación.
