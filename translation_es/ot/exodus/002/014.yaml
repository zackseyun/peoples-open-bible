revisions:
- from: 'Pero él respondió[a]: «¿Quién te puso por príncipe y juez sobre nosotros? ¿Acaso dices: “¿Vas a matarme como mataste al egipcio?”». Entonces Moisés tuvo miedo y dijo: «Ciertamente el asunto se ha dado a conocer».'
  to: 'Pero él respondió[a]: «¿Quién te puso por gobernante y juez sobre nosotros? ¿Acaso dices: “¿Vas a matarme como mataste al egipcio?”». Entonces Moisés tuvo miedo y dijo: «Ciertamente el asunto se ha sabido».'
  rationale: Se reemplaza «príncipe» por «gobernante» para reflejar mejor שַׂר en contexto y alinearse con la decisión inglesa auditada de evitar matiz monárquico. Se ajusta «se ha dado a conocer» a «se ha sabido» para representar de manera más directa el valor resultativo de נוֹדַע הַדָּבָר en español natural. Se conserva la estructura de interrogación y la nota alternativa ya documentada.
  reviewer_model: gpt-5.4
