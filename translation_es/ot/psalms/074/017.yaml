translation:
  language: es
  text: Tú estableciste todos los límites de la tierra[a]; verano e invierno, tú los formaste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fijaste» o «pusiste» todos los límites de la tierra.
    reason: lexical_alternative
  - marker: b
    text: O «los modelaste». El pronombre «los» se refiere a «verano e invierno».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִ֭צַּבְתָּ
  english_pob_choice: established
  chosen_spanish: estableciste
  alternatives_spanish:
  - pusiste
  - fijaste
  - estableciste
  lexicon: HALOT
  rationale: El verbo hiphil de נצב expresa la acción de hacer que algo quede firme o puesto en su lugar. «Estableciste» comunica tanto la fijación como la permanencia de los límites, en un español natural y solemne.
- source_word: כָּל גְּבוּל֣וֹת אָ֑רֶץ
  english_pob_choice: all the boundaries of the earth
  chosen_spanish: todos los límites de la tierra
  alternatives_spanish:
  - todas las fronteras de la tierra
  - todos los bordes de la tierra
  lexicon: HALOT
  rationale: גְּבוּלֹות refiere a límites o fronteras; en este contexto de orden creador, «límites» suena más natural que «fronteras» y conserva el sentido cósmico de la expresión. «Tierra» mantiene la referencia a la tierra como mundo habitado, no a una entidad política.
- source_word: קַ֥יִץ וָ֝חֹ֗רֶף
  english_pob_choice: summer and winter
  chosen_spanish: verano e invierno
  alternatives_spanish:
  - verano y invierno
  - estío e invierno
  lexicon: HALOT
  rationale: Son los términos ordinarios para las estaciones opuestas del año. «Verano e invierno» preserva el paralelismo y la idea de las estaciones como un par completo.
- source_word: יְצַרְתָּ/ם
  english_pob_choice: you formed them
  chosen_spanish: los formaste
  alternatives_spanish:
  - los modelaste
  - los hiciste
  lexicon: HALOT
  rationale: יצר implica formar o modelar. «Formaste» sigue de cerca ese valor concreto sin reducirlo a una creación más general. El pronombre se entiende como referido a «verano e invierno».
- source_word: אַתָּה ... אַתָּה
  english_pob_choice: You ... you
  chosen_spanish: Tú ... tú
  alternatives_spanish:
  - Tú ... Tú
  lexicon: HALOT
  rationale: La repetición del pronombre en hebreo es enfática. En español conviene conservarla explícitamente para mantener el énfasis en la acción directa de Dios.
theological_decisions:
- issue: Alcance de «límites de la tierra»
  english_pob_reading: A cosmic statement about God's ordering of the world
  chosen_spanish_reading: Una afirmación sobre cómo Dios ordenó el mundo creado
  alternative_spanish_readings:
  - Una referencia a fronteras territoriales de pueblos o países
  rationale: La unión con «verano e invierno» orienta el verso hacia el orden de la creación y no hacia límites políticos. Por eso «límites de la tierra» se entiende en sentido cósmico o mundial.
  doctrine_reference: Creación y providencia divina
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura de óptima equivalencia sin cambios recientes; no se documentan revisiones que alteren el sentido base. La decisión española sigue de cerca esa estabilidad textual y semántica.
  spanish_consistency_notes:
  - Se preservó la repetición enfática del pronombre con «Tú ... tú» para reflejar el hebreo.
  - Se eligió «límites» en vez de «fronteras» para evitar una lectura política ajena al contexto de creación.
  - Se usó «formaste» para mantener el valor concreto de יצר sin sobretraducirlo como «creaste».
