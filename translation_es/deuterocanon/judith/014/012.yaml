translation:
  language: es
  text: Pero cuando los hijos de Asur los vieron, enviaron aviso a sus jefes; y estos fueron a los generales, a los comandantes de mil[a] y a cada uno de sus gobernantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «comandantes de mil»; la expresión conserva el valor numérico del compuesto χιλιάρχους.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ υἱοὶ Ἀσσοὺρ
  english_pob_choice: the sons of Asshur
  chosen_spanish: los hijos de Asur
  alternatives_spanish:
  - los asirios
  - los hijos de Assur
  lexicon: LSJ
  rationale: Sigo de cerca la expresión transparente del griego, pero adapto el nombre a la forma española habitual Asur. 'Hijos' preserva el valor formal y étnico de υἱοὶ sin reducirlo a una simple etnónimo interpretativo.
- source_word: ὡς εἶδον αὐτούς
  english_pob_choice: when they saw them
  chosen_spanish: cuando los vieron
  alternatives_spanish:
  - así que los vieron
  - tan pronto como los vieron
  lexicon: BDAG
  rationale: El valor temporal de ὡς con aoristo se conserva con 'cuando'. No fuerzo la inmediatez de 'tan pronto como', porque el texto la sugiere pero no la exige.
- source_word: διεπέμψαν
  english_pob_choice: they sent word
  chosen_spanish: enviaron aviso
  alternatives_spanish:
  - enviaron palabra
  - mandaron aviso
  - enviaron mensaje
  lexicon: LSJ
  rationale: El verbo puede implicar el despacho de personas o mensajes. En español, 'enviaron aviso' comunica con naturalidad la acción de notificar sin añadir mensajeros explícitos que el griego no menciona.
- source_word: ἐπὶ τοὺς ἡγουμένους αὐτῶν
  english_pob_choice: to their leaders
  chosen_spanish: a sus líderes
  alternatives_spanish:
  - a sus jefes
  - a los que los dirigían
  lexicon: BDAG
  rationale: ἡγούμενοι denota quienes dirigen o están al frente. 'Líderes' es claro y suficientemente amplio para el contexto militar-administrativo.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  lexicon: LSJ
  rationale: En este contexto militar, 'generales' es la equivalencia más natural y precisa en español.
- source_word: χιλιάρχους
  english_pob_choice: commanders of thousands
  chosen_spanish: comandantes de mil
  alternatives_spanish:
  - jefes de mil
  - centuriones
  - comandantes de mil hombres
  lexicon: LSJ
  rationale: Conservo la fuerza numérica del compuesto griego. 'Comandantes de mil' evita el anacronismo de títulos romanos y mantiene la estructura del original sin sonar excesivamente técnica.
- source_word: ἐπὶ πάντα ἄρχοντα αὐτῶν
  english_pob_choice: to every one of their rulers
  chosen_spanish: a cada uno de sus gobernantes
  alternatives_spanish:
  - a todos sus gobernantes
  - a cada uno de sus jefes
  lexicon: BDAG
  rationale: El singular distributivo con πᾶς se refleja mejor con 'a cada uno'. 'Gobernantes' reproduce el matiz amplio de ἄρχοντα, que puede abarcar autoridades de distinto rango.
theological_decisions:
- issue: Ethnic designation and naming of Asshur
  english_pob_reading: the sons of Asshur
  chosen_spanish_reading: los hijos de Asur
  alternative_spanish_readings:
  - los asirios
  - los hijos de Assur
  rationale: No hay una cuestión doctrinal aquí, pero sí una decisión de transparencia textual. Mantengo la forma filial del griego y la adaptación española del nombre, evitando sustituirla por un etnónimo interpretativo.
  doctrine_reference: No aplica; decisión lexical-textual.
translation_notes:
  revision_awareness: El inglés auditado pasó de 'their generals' a 'the generals' para evitar una posesión no explícita. La versión española sigue ese ajuste con 'a los generales', sin añadir posesivo. También se mantuvo la solución del inglés para χιλιάρχους, pero con una forma española más directa ('comandantes de mil') que conserva el número del original.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y no hay términos divinos en este versículo.
  - '''Asur'' sigue el nombre propio del dominio asirio; no se interpreta como nombre teológico.'
  - '''Gobernantes'' se usa en sentido amplio para ἄρχοντα, sin reducirlo a un cargo específico no atestiguado en el texto.'
