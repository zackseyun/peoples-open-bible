translation:
  language: es
  text: Mira ahora[a], porque Yahvé te ha escogido para edificar una casa para el santuario. Sé fuerte[b] y hazlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Considera ahora» o «Presta atención ahora». El imperativo inicial pide atención reflexiva, no solo visión física.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «una casa para el santuario», es decir, el edificio del templo como lugar santo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Considera ahora
  - Presta atención ahora
  - Mira bien ahora
  lexicon: HALOT
  rationale: El imperativo de ראה aquí funciona como llamado a la atención, no como mera percepción visual. «Mira ahora» conserva la inmediatez y la fuerza exhortativa del hebreo en un español natural.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ahora mismo
  lexicon: HALOT
  rationale: La partícula temporal refuerza la urgencia del mandato inicial; «ahora» es la equivalencia más directa y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino propio y no una sustitución titulada. En español del POB, el equivalente establecido de Yahweh es «Yahvé», preservando el nombre del pacto.
- source_word: בָּחַר בְּךָ
  english_pob_choice: has chosen you
  chosen_spanish: te ha escogido
  alternatives_spanish:
  - te escogió
  - te ha elegido
  lexicon: HALOT
  rationale: בחר expresa elección divina para una tarea. El perfecto compuesto español comunica una elección ya realizada con vigencia presente, en paralelo al inglés POB.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - a edificar
  lexicon: HALOT
  rationale: «Edificar» es idiomático y digno en este contexto de construcción sagrada; mantiene el valor de finalidad del infinitivo hebreo.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un edificio
  - un templo
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal «casa» para no desplazar la formulación bíblica hacia «templo» antes de tiempo. El contexto ya aclara que se trata del edificio sagrado.
- source_word: לַמִּקְדָּשׁ
  english_pob_choice: for the sanctuary
  chosen_spanish: para el santuario
  alternatives_spanish:
  - para el lugar santo
  - como santuario
  lexicon: HALOT
  rationale: מקדש señala el lugar santo o santuario. «Para el santuario» mantiene la relación de finalidad sin borrar la tensión entre «casa» y su función sacra.
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Esfuérzate
  - Ten ánimo
  lexicon: HALOT
  rationale: La exhortación imperativa pide firmeza y resolución. «Sé fuerte» reproduce de forma natural el mandato directo del hebreo.
- source_word: וַעֲשֵׂה
  english_pob_choice: and do it
  chosen_spanish: y hazlo
  alternatives_spanish:
  - y actúa
  - y cúmplelo
  lexicon: HALOT
  rationale: El verbo עשה es amplio y aquí remite a llevar a cabo la tarea encomendada. «Hazlo» expresa la carga de ejecución de manera breve y fiel al contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. La política del POB evita el sustituto «SEÑOR»; en español, «Yahvé» preserva el nombre propio del Dios del pacto y sigue la convención del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: «Una casa para el santuario» frente a «templo»
  english_pob_reading: a house for the sanctuary
  chosen_spanish_reading: una casa para el santuario
  alternative_spanish_readings:
  - un templo
  - una casa santuario
  rationale: El hebreo dice literalmente «casa» y añade «para el santuario». Mantener ambas piezas evita sustituir el idiomatismo por la interpretación tradicional «templo» y conserva la estructura del original.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios sustanciales en la última revisión; se conserva la línea de traducción aprobada con ajustes mínimos para naturalidad del español y coherencia terminológica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del POB para el nombre divino.
  - Se conserva «casa» en paralelo con el hebreo, evitando reemplazarlo por «templo» en el cuerpo principal.
  - La nota sobre «santuario» se ancla solo en la frase correspondiente y no introduce interpretaciones adicionales.
  - «Sé fuerte» y «hazlo» reflejan el par imperativo final con estilo claro y bíblico, sin arcaísmo innecesario.
