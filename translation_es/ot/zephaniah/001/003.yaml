    reason: lexical_alternative
  revision_rationale: Se corrige el aparato de notas para cumplir la exigencia de marcadores únicos y anclajes claros. Se sustituye ‘tropezaderos’ por ‘tropiezos’, que conserva la concisión de la frase hebrea y la relación abierta con ‘los impíos’, pero en un español mucho más natural. Se elimina el ‘yo’ inicial por innecesario, se aligera la sintaxis, y se resuelve אֲדָמָה con ‘suelo’ en el texto principal, dejando ‘tierra’ como alternativa en nota para preservar la posible resonancia intertextual. También se cambia ‘cortaré … de sobre la faz’ por ‘quitaré de la faz … al hombre’, que expresa con claridad el efecto de juicio sin perder el sentido de exclusión total del original.
