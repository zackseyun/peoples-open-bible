translation:
  language: es
  text: Y todo lo que toque la persona inmunda[a] será inmundo; y la persona que lo toque será inmunda hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y toda persona que lo toque será inmunda hasta la tarde». Hebreo nephesh literalmente significa «alma», pero a menudo se refiere a una persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And everything
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y todo aquello
  - Y todo lo que
  lexicon: HALOT
  rationale: כֹּל con la conjunción expresa una afirmación totalizadora. En español, «Y todo» conserva esa amplitud de forma natural y bíblica sin añadir contenido.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - lo que
  lexicon: HALOT
  rationale: La partícula relativa enlaza la totalidad con la cláusula siguiente. «Que» es la forma más natural en español aquí.
- source_word: יִגַּע בּוֹ
  english_pob_choice: touches
  chosen_spanish: toque
  alternatives_spanish:
  - entre en contacto con
  - toque con
  lexicon: HALOT
  rationale: נגע implica tocar o entrar en contacto. «Toque» comunica el contacto ritual de manera directa y natural en español.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean person
  chosen_spanish: el inmundo
  alternatives_spanish:
  - el impuro
  - la persona inmunda
  - el que está inmundo
  lexicon: HALOT
  rationale: En la legislación ritual, el adjetivo funciona sustantivado. «El inmundo» conserva esa fuerza categorial sin introducir una perífrasis excesiva. Se evita «impuro» porque en español bíblico y eclesial «inmundo» sigue marcando mejor la categoría ritual, aunque suene más marcado.
- source_word: יִטְמָא
  english_pob_choice: shall become unclean
  chosen_spanish: será inmundo
  alternatives_spanish:
  - se volverá inmundo
  - quedará inmundo
  lexicon: HALOT
  rationale: El verbo expresa entrar en un estado de impureza ritual. En español, «será inmundo» funciona como equivalente legal-resultativo y mantiene el tono normativo del texto.
- source_word: וְהַנֶּפֶשׁ
  english_pob_choice: and the person
  chosen_spanish: y la persona
  alternatives_spanish:
  - y el alma
  - y el ser
  - y el individuo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse a «persona» en contextos legales y rituales. «Persona» evita el posible malentendido de «alma» en español moderno.
- source_word: הַנֹּגַעַת
  english_pob_choice: who touches it
  chosen_spanish: que lo toque
  alternatives_spanish:
  - que la toque
  - que entre en contacto con él
  lexicon: HALOT
  rationale: El participio femenino singular concuerda con «persona». El objeto implícito remite al inmundo o a lo tocado; «lo» mantiene la referencia general sin sobreespecificar indebidamente.
- source_word: תִּטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será inmunda
  alternatives_spanish:
  - quedará inmunda
  - se volverá inmunda
  lexicon: HALOT
  rationale: El resultado legal de la acción de tocar se expresa bien con «será inmunda», que suena natural en español y conserva la consecuencia ritual.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: La fórmula temporal de la legislación de pureza se traduce con «hasta la tarde», opción clara y tradicionalmente inteligible en español.
theological_decisions:
- issue: Lenguaje de impureza ritual versus culpa moral
  english_pob_reading: Render טמא/יטמא as 'unclean' rather than 'defiled' or 'sinful.'
  chosen_spanish_reading: Traducir טמא/יטמא con «inmundo» en lugar de «contaminado», «defilado» o «pecador».
  alternative_spanish_readings:
  - impuro
  - contaminado
  - pecaminoso
  rationale: El pasaje trata de impureza ritual por contacto, no de culpa moral. «Inmundo» mantiene la categoría legal-ritual sin moralizarla. Aunque «impuro» sería comprensible, «inmundo» conserva mejor el registro bíblico y la fuerza del término en este contexto.
  doctrine_reference: Principio de primacía del texto original; distinguir impureza ritual de pecado moral.
translation_notes:
  revision_awareness: El texto sigue de cerca el auditable inglés POB y el hebreo masorético. No hay revisiones aplicadas en el antecedente inmediato; se preserva la estructura causal/resultado del verso y la equivalencia de estado ritual. Se ajustó el sujeto sustantivado de הַטָּמֵא a «el inmundo» para mayor naturalidad y fidelidad al campo léxico ritual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el término ritual «inmundo» para טמא/טמא, coherente con la necesidad de distinguir impureza ritual de inmoralidad.
  - «Persona» se usa para נֶפֶשׁ en contexto legal-ritual, siguiendo el valor contextual señalado en el audit trail inglés.
  - «Hasta la tarde» mantiene la fórmula temporal breve y reverente, sin expandirla a una glosa interpretativa.
