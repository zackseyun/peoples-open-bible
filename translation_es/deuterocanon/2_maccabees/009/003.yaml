translation:
  language: es
  text: Pero, mientras estaba en Ecbátana[a], le llegó noticia de lo que había ocurrido a Nicanor y a los que acompañaban a Timoteo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: κατʼ Ἐκβάτανα puede significar «en Ecbátana» o «en la región de Ecbátana»; por eso no se cierra aquí el matiz local.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «los que estaban alrededor de Timoteo» o «el grupo de Timoteo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντι δὲ αὐτῷ
  english_pob_choice: while he was
  chosen_spanish: mientras estaba
  alternatives_spanish:
  - cuando estaba
  - así que, estando
  lexicon: LSJ
  rationale: El participio en genitivo absoluto expresa circunstancia temporal; en español, «mientras estaba» comunica de forma natural la simultaneidad sin perder el valor circunstancial.
- source_word: κατʼ Ἐκβάτανα
  english_pob_choice: at Ecbatana
  chosen_spanish: en Ecbátana
  alternatives_spanish:
  - cerca de Ecbátana
  - en la región de Ecbátana
  lexicon: LSJ
  rationale: La preposición κατά con topónimo admite matiz locativo o de región. Aquí se traduce de manera directa y sobria como «en», con nota para conservar la alternativa espacial documentada.
- source_word: προσεπέσε
  english_pob_choice: news came to him
  chosen_spanish: le llegó noticia
  alternatives_spanish:
  - le sobrevino la noticia
  - le llegó el informe
  lexicon: LSJ
  rationale: El verbo sugiere la llegada repentina de algo al sujeto; en este contexto el objeto es un informe sobre sucesos, por lo que «le llegó noticia» reproduce bien la fuerza idiomática.
- source_word: τὰ κατὰ Νικάνορα
  english_pob_choice: what had happened to Nicanor
  chosen_spanish: lo que había ocurrido a Nicanor
  alternatives_spanish:
  - las cosas referentes a Nicanor
  - los sucesos acerca de Nicanor
  lexicon: LSJ
  rationale: La construcción τὰ κατά + acusativo designa los asuntos o sucesos relativos a alguien. En español, «lo que había ocurrido a Nicanor» conserva la referencia a los acontecimientos sin endurecer la frase.
- source_word: τοὺς περὶ Τιμόθεον
  english_pob_choice: those with Timothy
  chosen_spanish: a los que estaban con Timoteo
  alternatives_spanish:
  - al grupo de Timoteo
  - a los hombres de Timoteo
  lexicon: LSJ
  rationale: La expresión οἱ/τοὺς περὶ + nombre personal alude al grupo o acompañantes de esa persona. En español, «los que estaban con Timoteo» mantiene el sentido colectivo sin añadir estructura militar que el griego no explicita.
translation_notes:
  revision_awareness: El inglés auditado pasó de «near Ecbatana» a «at Ecbatana» para acercarse más a κατʼ Ἐκβάτανα; en español se optó por «en Ecbátana» con nota, para reflejar la decisión revisada sin perder la alternativa regional atestiguada por el griego.
  spanish_consistency_notes:
  - Se conserva «Ecbátana» con tilde para acomodar la acentuación natural del español.
  - Se mantiene el nombre propio «Timoteo» como forma española estándar de Τιμόθεον.
  - Se evita traducir doctrinalmente con «Señor» u otros equivalentes no presentes en el texto; el versículo es puramente narrativo.
