translation:
  language: es
  text: 'Así Moisés los envió a la guerra, mil de cada tribu: a ellos, y a Finees hijo de Eleazar, el sacerdote, a la guerra, con los utensilios santos[a] y las trompetas para la señal de guerra[b] en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los utensilios del santuario» o «los objetos sagrados».
    reason: lexical_alternative
  - marker: b
    text: O «las trompetas para la señal» o «las trompetas de alarma».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo hebreo expresa el envío en un relato narrativo. «Envió» es natural en español y conserva el valor directo de שלח sin añadir matiz excesivo.
- source_word: אֶלֶף לַמַּטֶּה
  english_pob_choice: a thousand from each tribe
  chosen_spanish: mil de cada tribu
  alternatives_spanish:
  - mil por tribu
  - mil para cada tribu
  lexicon: HALOT
  rationale: La construcción distributiva indica un contingente aportado por cada tribu. «Mil de cada tribu» reproduce esa distribución con claridad y sin mecanicismo.
- source_word: לַצָּבָא
  english_pob_choice: to the war
  chosen_spanish: a la guerra
  alternatives_spanish:
  - para la guerra
  - al ejército
  lexicon: HALOT
  rationale: Aquí צבא apunta al ámbito de la campaña bélica. «A la guerra» conserva el movimiento/dirección del hebreo y evita convertirlo en una referencia institucional al ejército.
- source_word: אֹתָם ... אֹתָם
  english_pob_choice: them ... them
  chosen_spanish: a ellos ... a ellos
  alternatives_spanish:
  - a éstos ... a ellos
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo. En español, «a ellos» mantiene la referencia y permite reflejar la apposición del grupo enviado.
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Phinehas son of Eleazar the priest
  chosen_spanish: Finees hijo de Eleazar, el sacerdote
  alternatives_spanish:
  - Finees, hijo de Eleazar, el sacerdote
  lexicon: HALOT
  rationale: «Finees» sigue una transliteración española estándar de פנחס y «el sacerdote» preserva el apposicional hebreo. La coma ayuda a leer la identificación sin alterar el contenido.
- source_word: וּכְלֵי הַקֹּדֶשׁ
  english_pob_choice: with the holy vessels
  chosen_spanish: con los vasos santos
  alternatives_spanish:
  - con los vasos del santuario
  - con los objetos santos
  lexicon: HALOT
  rationale: כְּלֵי הַקֹּדֶשׁ puede leerse como utensilios/vasos del ámbito santo. «Vasos santos» es breve, reverente y mantiene el sentido cultual; en español «vasos» sigue siendo una opción legítima para objetos sagrados rituales.
- source_word: וַחֲצֹצְרוֹת הַתְּרוּעָה
  english_pob_choice: the trumpets for the battle cry
  chosen_spanish: las trompetas de la señal
  alternatives_spanish:
  - las trompetas del toque
  - las trompetas del alarido
  - las trompetas de alarma
  lexicon: HALOT
  rationale: תְּרוּעָה admite el valor de señal sonora, alarma o grito. Aquí la función es militar y litúrgica; «de la señal» conserva la amplitud semántica sin forzar «batalla» en el sustantivo español.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - a su cargo
  - en su poder
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto. El antecedente singular más próximo es Finees, por lo que «en su mano» comunica bien la custodia material de los objetos y trompetas.
theological_decisions:
- issue: Relación entre Finees, los objetos sagrados y la expedición militar
  english_pob_reading: Phinehas accompanies the force as priestly representative carrying sacred objects and signal trumpets, without expanding the text into later doctrinal claims about holy war.
  chosen_spanish_reading: Finees acompaña a la fuerza como representante sacerdotal, llevando los vasos santos y las trompetas de señal, sin convertir el versículo en una formulación doctrinal posterior sobre la guerra santa.
  alternative_spanish_readings:
  - Finees solo observa la marcha
  - Los objetos santos son meramente accesorios sin función cultual
  rationale: El hebreo une explícitamente a Finees con los objetos santos y las trompetas dentro de la campaña. La traducción conserva esa vinculación cultual-militar sin añadir elementos interpretativos que el texto no dice.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la repetición enfática de «a ellos» y la relación entre Finees, los vasos santos y las trompetas. Se ajustó «the trumpets for the battle cry» a «las trompetas de la señal» para preservar la amplitud semántica de תְּרוּעָה en un español natural.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantuvo «Finees» como transliteración estándar coherente con el nombre propio en español bíblico de esta serie.
  - «Vasos santos» conserva la terminología cultual del original sin sustituirla por lenguaje eclesiástico posterior.
  - La repetición pronominal se preserva para reflejar el énfasis del hebreo.
