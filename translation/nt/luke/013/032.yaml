id: LUK.13.32
reference: Luke 13:32
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Πορευθέντες εἴπατε τῇ ἀλώπεκι ταύτῃ· Ἰδοὺ ἐκβάλλω δαιμόνια καὶ ἰάσεις ⸀ἀποτελῶ σήμερον καὶ αὔριον, καὶ τῇ τρίτῃ τελειοῦμαι.
translation:
  text: And he said to them[a], “Go and tell that fox, ‘Look, I cast out demons and accomplish healings today and tomorrow, and on the third day I am brought to completion.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I reach my goal,' 'I am perfected,' or 'I finish my course.' The Greek can denote being brought to completion, likely referring to the completion of Jesus's appointed mission.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλώπεκι
  chosen: fox
  alternatives:
  - that sly fox
  lexicon: BDAG
  rationale: The noun literally denotes a fox. The metaphorical force is preserved by the literal animal term rather than making the insult explicit in translation. 'That fox' keeps the demonstrative ταύτῃ and the contemptuous tone.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse marker drawing attention to what follows. 'Look' is natural modern English and preserves the deictic force without archaic tone.
- source_word: ἐκβάλλω δαιμόνια
  chosen: I cast out demons
  alternatives:
  - I drive out demons
  lexicon: BDAG
  rationale: A standard expression in the Gospels for exorcism. 'Cast out' is both idiomatic and familiar, preserving the force of ἐκβάλλω without unnecessary paraphrase.
- source_word: ἰάσεις ἀποτελῶ
  chosen: accomplish healings
  alternatives:
  - perform healings
  - complete cures
  lexicon: BDAG
  rationale: ἰάσεις is 'healings/cures' and ἀποτελῶ carries the sense of bringing about or accomplishing. 'Accomplish healings' preserves the verbal distinction from the previous clause better than flattening both actions into generic 'do' language.
- source_word: σήμερον καὶ αὔριον
  chosen: today and tomorrow
  alternatives:
  - for today and tomorrow
  lexicon: BDAG
  rationale: A temporal pair that can be idiomatic for a short, definite period. The straightforward rendering preserves both the literal wording and the possible idiomatic sense.
- source_word: τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on the third
  lexicon: BDAG
  rationale: The dative with the ordinal is temporal. 'On the third day' is the clearest idiomatic English rendering and fits the likely temporal sense.
- source_word: τελειοῦμαι
  chosen: I am brought to completion
  alternatives:
  - I reach my goal
  - I am perfected
  - I finish my course
  lexicon: BDAG
  rationale: The present passive of τελειόω can mean to be brought to completion, perfected, or finished. Here it likely refers to the completion of Jesus's appointed work rather than moral improvement. 'I am brought to completion' preserves the passive form and the theological openness of the expression better than an overly interpretive paraphrase.
