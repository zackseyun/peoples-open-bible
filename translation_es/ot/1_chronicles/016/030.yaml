    issue: «כָּל הָאָרֶץ» se tradujo como «todos los habitantes de la tierra»
    rationale: El hebreo dice literalmente «toda la tierra», y en este contexto poético cósmico la frase abarca la tierra misma, no solo sus habitantes. La expansión añade una interpretación antropocéntrica ausente del original.
  - severity: medium
    issue: La nota al pie está anclada a «Tiemblen»/«delante de él» en lugar de a la cláusula final sobre תִּמּוֹט
    rationale: La auditoría inglesa preserva alternativas léxicas para «it shall not be moved» («no vacilará», «no será sacudido»). La nota española actual documenta otra expresión distinta y no refleja el principal punto léxico preservado por la POB.
  - severity: low
    issue: «No será movido» suena algo calcado en español contemporáneo
    rationale: Es entendible y fiel, pero el español natural preferiría a menudo «no será sacudido» o «no vacilará». Aun así, puede conservarse si se acompaña con nota que aclare la imagen hebrea de firmeza.
  revised_spanish_text: ¡Tiemblen delante de él, toda la tierra! Sí, el mundo está establecido; no será movido[a].
