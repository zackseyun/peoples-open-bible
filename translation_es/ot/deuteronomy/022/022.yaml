  language: en
  yaml_path: translation/ot/deuteronomy/022/022.yaml
  text: If a man is found lying with a woman married to a husband[a], then both of them shall die—the man who lay with the woman, and the woman[b]. So you shall purge the evil from Israel.
  footnotes:
