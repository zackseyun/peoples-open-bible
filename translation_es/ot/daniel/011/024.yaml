translation:
  language: es
  text: 'En un tiempo de seguridad entrará en las partes más ricas de la provincia[a], y hará lo que no hicieron sus padres ni los padres de sus padres: esparcirá entre ellos despojo, botín y bienes[b]; y contra fortalezas ideará sus planes[c], pero solo hasta un tiempo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pacíficamente» o «inesperadamente» entrará en las partes más ricas de la provincia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les repartirá despojo, botín y posesiones».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «maquinará contra fortalezas»; o «hasta el tiempo señalado».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּשַׁלְוָה
  english_pob_choice: In a time of security
  chosen_spanish: En un tiempo de seguridad
  alternatives_spanish:
  - en paz
  - tranquilamente
  - inesperadamente
  lexicon: HALOT
  rationale: שַׁלְוָה puede expresar calma, bienestar o seguridad. En este contexto político-militar, «en un tiempo de seguridad» conserva la idea de un entorno sin alarma y también la sorpresa oportunista del ataque, sin volverlo excesivamente interpretativo.
- source_word: וּבְמִשְׁמַנֵּי מְדִינָה
  english_pob_choice: into the richest parts of the province
  chosen_spanish: a las partes más ricas de la provincia
  alternatives_spanish:
  - a las partes más fértiles de la provincia
  - a las partes prósperas del reino
  - a los lugares más ricos de la provincia
  lexicon: HALOT
  rationale: מִשְׁמַנִּים es literalmente «lo graso/rico» y funciona idiomáticamente para zonas fértiles o acomodadas. «Partes más ricas» comunica bien el valor idiomático en español sin forzar un calco de «grasas». מְדִינָה se entiende como «provincia» en sentido administrativo.
- source_word: יָבוֹא
  english_pob_choice: he will come into
  chosen_spanish: vendrá a
  alternatives_spanish:
  - entrará en
  - vendrá a entrar en
  - invadirá
  lexicon: HALOT
  rationale: El verbo básico es «venir/entrar». «Vendrá a» mantiene el movimiento sin añadir una connotación militar más fuerte que la forma verbal por sí sola no exige.
- source_word: וְעָשָׂה אֲשֶׁר לֹא עָשׂוּ
  english_pob_choice: and he will do what neither ... did
  chosen_spanish: y hará lo que no hicieron
  alternatives_spanish:
  - y hará lo que no habían hecho
  - y ejecutará lo que no hicieron
  lexicon: HALOT
  rationale: La construcción comparativa se conserva de manera directa. «Hará» mantiene la sencillez y el énfasis en la acción extraordinaria frente a sus predecesores.
- source_word: אֲבֹתָיו וַאֲבוֹת אֲבֹתָיו
  english_pob_choice: his fathers nor his fathers’ fathers
  chosen_spanish: sus padres ni los padres de sus padres
  alternatives_spanish:
  - sus padres ni sus antepasados
  - sus padres ni sus abuelos
  lexicon: HALOT
  rationale: El hebreo repite explícitamente «sus padres» y «los padres de sus padres». «Los padres de sus padres» conserva la repetición retórica y evita nivelar la expresión a un solo término más genérico.
- source_word: בִּזָּה וְשָׁלָל וּרְכוּשׁ
  english_pob_choice: plunder, spoil, and goods
  chosen_spanish: despojo, botín y bienes
  alternatives_spanish:
  - botín, saqueo y posesiones
  - presa, botín y propiedades
  lexicon: HALOT
  rationale: Los tres sustantivos forman una acumulación cercana pero no idéntica. «Despojo, botín y bienes» preserva la serie y permite un español natural; «bienes» comunica רְכוּשׁ como propiedad/posesiones sin sonar arcaico.
- source_word: לָהֶם יִבְזוֹר
  english_pob_choice: he will scatter among them
  chosen_spanish: entre ellos esparcirá
  alternatives_spanish:
  - les distribuirá
  - los repartirá entre ellos
  - les prodigará
  lexicon: HALOT
  rationale: בזר significa esparcir/dispersar. «Esparcirá entre ellos» conserva la imagen verbal del original y, en este contexto, deja ver la distribución de los despojos sin perder fuerza literaria.
- source_word: וְעַל מִבְצָרִים יְחַשֵּׁב מַחְשְׁבֹתָיו
  english_pob_choice: and against fortresses he will devise his plans
  chosen_spanish: y contra fortalezas ideará sus planes
  alternatives_spanish:
  - y contra fortalezas maquinara sus planes
  - y contra fortalezas planea sus planes
  - y contra fortalezas trazaría sus planes
  lexicon: HALOT
  rationale: La construcción cognada «pensar pensamientos/planes» expresa ideación o planificación deliberada. «Ideará sus planes» suena natural en español y conserva la intención estratégica. «Fortalezas» traduce מִבְצָרִים con el matiz militar adecuado.
- source_word: וְעַד עֵת
  english_pob_choice: but only until a time
  chosen_spanish: pero solo hasta cierto tiempo
  alternatives_spanish:
  - pero solo por un tiempo
  - hasta el tiempo señalado
  lexicon: HALOT
  rationale: La expresión hebrea es indefinida en sí misma; no añade explícitamente «señalado» o «apuntado». «Hasta cierto tiempo» preserva la limitación temporal sin resolverla teológicamente más de lo que el texto dice.
theological_decisions:
- issue: Si la limitación temporal debe explicitarse como tiempo señalado/apuntado o mantenerse indefinida
  english_pob_reading: but only until a time
  chosen_spanish_reading: pero solo hasta cierto tiempo
  alternative_spanish_readings:
  - hasta el tiempo señalado
  - pero solo por un tiempo
  rationale: El hebreo עַד עֵת no lleva un modificador explícito equivalente a «señalado». Mantener «cierto tiempo» preserva la tensión interpretativa y evita introducir una especificación providencial que el versículo no formula de manera directa.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: 'Se siguió el estado de alta concordancia del audit trail inglés (veredicto: agree; acuerdo 0.95) sin cambios sustantivos. La redacción española mantiene la misma estructura semántica y conserva las alternativas relevantes documentadas por la POB inglesa, incluyendo la ambigüedad temporal final.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el contexto lo exija; este versículo no lo requiere.
  - «Provincia» se conserva para מְדִינָה por coherencia con el registro administrativo del texto.
  - Se mantuvo la serie acumulativa «despojo, botín y bienes» para reflejar la repetición hebrea.
  - El final «hasta cierto tiempo» preserva la indefinición del hebreo y del inglés POB, sin añadir «señalado» al texto principal.
