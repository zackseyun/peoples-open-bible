translation:
  language: es
  text: Entonces me llevó por el camino de la puerta del norte[a] hasta delante de la casa, y miré, y he aquí, la gloria de Yahvé llenó la casa de Yahvé[b], y caí sobre mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a través de la puerta del norte».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; se mantiene «casa» para reflejar la expresión de Ezequiel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Entonces me trajo
  - Y me llevó
  lexicon: HALOT
  rationale: 'El hebreo es causativo de בוא con sufijo de 1ª persona singular: indica que alguien hizo llegar al hablante. En español, «llevar» expresa con naturalidad el movimiento guiado; «trajo» sería posible, pero aquí «me llevó» conserva mejor la imagen de conducción en la visión.'
- source_word: דֶּרֶךְ שַׁעַר הַצָּפוֹן
  english_pob_choice: by way of the north gate
  chosen_spanish: por el camino de la puerta del norte
  alternatives_spanish:
  - a través de la puerta del norte
  - por la puerta del norte
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser «camino» o indicar la ruta tomada. Se eligió una construcción natural en español que conserva el valor de itinerario. «Puerta del norte» mantiene el orden del hebreo y la terminología arquitectónica de la visión.
- source_word: אֶל פְּנֵי הַבַּיִת
  english_pob_choice: to the front of the house
  chosen_spanish: hasta delante de la casa
  alternatives_spanish:
  - ante la casa
  - frente a la casa
  - a la frente de la casa
  lexicon: HALOT
  rationale: פְּנֵי literalmente es «rostro/cara», pero aquí funciona idiomáticamente como «frente de». En español, «delante de la casa» evita una calca dura y conserva el sentido direccional. Se mantiene «casa» en vez de «templo» para reflejar el lenguaje de Ezekiel.
- source_word: וָאֵרֶא
  english_pob_choice: and I looked
  chosen_spanish: y miré
  alternatives_spanish:
  - y vi
  - y observé
  lexicon: HALOT
  rationale: En secuencia con וְהִנֵּה, el verbo introduce una nueva percepción visual. «Miré» reproduce bien el acto de fijar la atención, como en la traducción inglesa auditada.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y allí estaba
  lexicon: HALOT
  rationale: La interjección marca sorpresa y solemnidad en la visión. «He aquí» es una forma española reconocible y fiel para ese efecto discursivo.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenaba
  alternatives_spanish:
  - estaba llena
  - había llenado
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es participial/predicativa («lleno»), en español la escena fluye mejor con un verbo: «la gloria... llenaba la casa». Así se preserva el valor resultativo sin sonar rígido.'
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé Dios
  - la gloria de Yahvé
  lexicon: HALOT
  rationale: כָּבוֹד se traduce de manera estándar como «gloria» en este contexto visionario y cultual. YHWH se vierte «Yahvé» según el criterio del proyecto, manteniendo el nombre divino y evitando la sustitución por un título.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del SEÑOR
  - el templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de Yahvé». Se preserva «casa» para reflejar la dicción de Ezequiel, en lugar de suavizarla sistemáticamente con «templo», aunque el referente sea el complejo del templo.
- source_word: וָאֶפֹּל אֶל פָּנָי
  english_pob_choice: and I fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y caí de bruces
  - y me postré
  lexicon: HALOT
  rationale: Es un modismo hebreo de postración. «Caí sobre mi rostro» mantiene la imagen corporal literal y la reverencia del gesto; «me postré» explicaría el sentido, pero perdería la forma expresiva del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la decisión doctrinal y auditada del proyecto, se translitera como «Yahvé» en vez de sustituirlo por un título, para preservar el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish target mapping → Yahvé'
- issue: Lenguaje de «casa» en la visión del templo
  english_pob_reading: house / house of Yahweh
  chosen_spanish_reading: casa / casa de Yahvé
  alternative_spanish_readings:
  - templo / templo de Yahvé
  - casa del Señor
  rationale: La POB inglesa retiene «house» para no borrar la terminología reiterada de Ezequiel. En español se conserva la misma elección; aunque el referente sea el templo, «casa» refleja mejor la redacción del texto fuente y evita imponer una normalización interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) con apoyo del audit trail inglés. No hubo revisiones aplicadas en el registro inglés más reciente; la redacción española conserva las decisiones auditadas sobre «Yahvé», «casa» y el orden narrativo de la visión, ajustando solo la sintaxis para naturalidad en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «casa» en el lenguaje del santuario, en línea con el inglés auditado.
  - Se mantiene el tono visionario con «y he aquí» y la imagen literal de postración.
