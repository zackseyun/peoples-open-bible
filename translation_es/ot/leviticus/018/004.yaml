translation:
  language: es
  text: Harán mis juicios[a], y guardarán mis estatutos, para andar en ellos. Yo soy Yahvé, el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para vivir conforme a ellos». El hebreo dice literalmente «para andar en ellos», un modismo que describe la conducta ordenada según los mandamientos de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  - mis decretos
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a decisiones o disposiciones judiciales; en español, «juicios» conserva el matiz jurídico sin borrar la distinción frente a חֻקּוֹת. Se evita uniformar ambos términos como simples «mandamientos».
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall do
  chosen_spanish: harán
  alternatives_spanish:
  - cumplirán
  - practicarán
  - obedecerán
  lexicon: HALOT
  rationale: La forma básica de עשה es «hacer»; en un contexto legal/ético, «harán» mantiene cercanía léxica al hebreo y conserva el paralelismo con «guardarán». Se evita una paráfrasis más interpretativa como «cumplirán».
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis prescripciones
  lexicon: HALOT
  rationale: חֻקָּה designa disposiciones establecidas; «estatutos» reproduce con precisión el campo jurídico-normativo y distingue este término de מִשְׁפָּטִים.
- source_word: תִּשְׁמְרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - conservarán
  lexicon: HALOT
  rationale: שׁמר incluye la idea de guardar/vigilar. «Guardarán» conserva el valor de custodia obediente y suena natural en español bíblico contemporáneo.
- source_word: לָלֶכֶת בָּהֶם
  english_pob_choice: to walk in them
  chosen_spanish: para andar en ellos
  alternatives_spanish:
  - para vivir conforme a ellos
  - para caminar en ellos
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «andar/caminar» como metáfora de conducta. «Andar en ellos» preserva la imagen idiomática y la tensión ética sin explicitarla demasiado en el cuerpo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado en el texto hebreo como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de 2mp indica posesión plural; en español latinoamericano, «su Dios» conserva la referencia colectiva con un registro más amplio y natural que «vuestro».
theological_decisions:
- issue: Relación entre los dos términos legales, מִשְׁפָּטַי y חֻקֹּתַי
  english_pob_reading: my judgments ... my statutes
  chosen_spanish_reading: mis juicios ... mis estatutos
  alternative_spanish_readings:
  - mis ordenanzas ... mis estatutos
  - mis reglas ... mis decretos
  rationale: Se preserva la distinción semántica del hebreo y del POB inglés entre un término de carácter judicial («juicios») y otro de carácter normativo/prescriptivo («estatutos»), sin resolver la tensión en un término genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve lexical distinctions where the source distinguishes them
- issue: Sentido de לָלֶכֶת בָּהֶם
  english_pob_reading: to walk in them
  chosen_spanish_reading: para andar en ellos
  alternative_spanish_readings:
  - para vivir conforme a ellos
  - para seguirlos
  rationale: La metáfora hebrea de caminar/andar como forma de vida se mantiene explícita. No se desplaza al sentido interpretativo «vivir conforme a ellos» en el texto principal, aunque esa sea una glosa válida.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en forma transliterada, siguiendo la política del proyecto, en lugar de sustituirlo por un título o por una forma tradicional posterior.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió «do» frente a «carry out» para תַּעֲשׂוּ, y refleja esa opción con «harán» en un registro más cercano al paralelo hebreo. También conserva la distinción entre מִשְׁפָּטַי y חֻקֹּתַי, y mantiene el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «estatutos» para חֻקֹּתַי y «juicios» para מִשְׁפָּטַי, evitando nivelación terminológica.
  - «Andar en ellos» conserva la imagen hebrea y puede glosarse en nota sin sustituirla en el texto principal.
  - «su Dios» traduce el plural posesivo de 2mp de modo natural para español latinoamericano.
