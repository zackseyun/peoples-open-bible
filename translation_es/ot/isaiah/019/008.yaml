review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: pescadores en duelo, quienes echan anzuelo en el Nilo, y quienes extienden red sobre las aguas. También conserva correctamente la nota léxica sobre יְאֹר como «Nilo». Sin embargo, «se entristecerán» debilita el verbo וְאָבְלוּ, que en contexto de duelo corresponde mejor a «harán duelo» o «estarán de duelo», y el cierre «languidecerán» es aceptable pero el paralelismo del hebreo favorece una formulación más claramente de decaimiento severo.'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. La puntuación y la sintaxis funcionan bien. La principal mejora necesaria es fortalecer el segundo verbo de aflicción para no reducir el matiz de mourning/duelo a mera tristeza. También conviene armonizar el último verbo con el inglés auditado y con la fuerza del hebreo, usando una expresión más vívida y natural en español.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Nilo» está bien justificado. Las decisiones léxicas principales son adecuadas, salvo que «se entristecerán» no preserva plenamente el valor de אבל ‘hacer duelo / lamentarse’, y «languidecerán» como nota alternativa no debe convertirse en la opción principal si se puede expresar mejor el valor fuerte de אֻמְלָלוּ.
  issues:
  - severity: medium
    issue: «se entristecerán» debilita וְאָבְלוּ
    rationale: El hebreo אבל expresa duelo o luto, no solo tristeza emocional general. «Harán duelo» o «estarán de duelo» preserva mejor el campo semántico y el paralelismo con el primer verbo.
  - severity: low
    issue: El verbo final puede representarse con más fuerza que «languidecerán»
    rationale: אֻמְלָלוּ comunica marchitarse, decaer o consumirse. «Se consumirán» o «se debilitarán» transmite mejor la severidad que el inglés POB quiso reflejar con «will waste away», sin perder naturalidad.
  revised_spanish_text: Y los pescadores se lamentarán[a], y todos los que echan un anzuelo en el Nilo harán duelo[b]; los que extienden una red sobre las aguas se consumirán.
