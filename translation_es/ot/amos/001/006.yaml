translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones[a] de Gaza, y por cuatro, no lo revocaré[b], porque llevaron al destierro a un pueblo entero[c], para entregarlo a Edom».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fórmula hebrea «por tres ... y por cuatro» expresa acumulación o plenitud de culpa, no un conteo estrictamente literal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no lo haré volver atrás»; en esta fórmula de juicio, el sentido es que Yahvé no revocará el juicio anunciado.'
    reason: lexical_alternative
  - marker: c
    text: O «una cautividad completa»; es decir, deportaron a toda una población o a un contingente entero de cautivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Nota de equivalencia terminológica del proyecto
  rationale: Se sigue la convención del proyecto para el nombre divino, manteniendo el Tetragrámaton visible en español y evitando la sustitución por una máscara litúrgica.
- source_word: פִּשְׁעֵי
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - rebeldías
  - crímenes
  lexicon: HALOT
  rationale: «Transgresiones» conserva el peso moral y de ruptura del término hebreo פשע sin reducirlo a una categoría puramente política o jurídica.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  alternatives_spanish:
  - Gaza (la ciudad)
  lexicon: Nombre propio geográfico
  rationale: Se mantiene el nombre propio estándar del lugar.
- source_word: עַל שְׁלֹשָׁה ... וְעַל אַרְבָּעָה
  english_pob_choice: For three ... and for four
  chosen_spanish: Por tres ... y por cuatro
  alternatives_spanish:
  - Por tres ... aun por cuatro
  - Por tres ... y aun por cuatro
  lexicon: HALOT
  rationale: La fórmula numérica escalonada se conserva en forma natural en español para expresar plenitud o exceso de culpa, no un conteo literal.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke it
  chosen_spanish: no lo revocaré
  alternatives_spanish:
  - no lo volveré atrás
  - no me retractaré de ello
  - no lo haré retroceder
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no lo/la devolveré atrás»; el inglés POB optó por un objeto neutro. En español, «revocar» comunica bien la irreversibilidad del juicio y mantiene el objeto implícito sin añadir «castigo» en el texto principal.
- source_word: הַגְלוֹתָם
  english_pob_choice: they carried into exile
  chosen_spanish: llevaron al destierro
  alternatives_spanish:
  - exiliaron
  - deportaron
  lexicon: HALOT
  rationale: «Llevaron al destierro» conserva el movimiento de traslado y la tonalidad profética. «Destierro» funciona bien en español bíblico sin sonar burocrático.
- source_word: גָּלוּת שְׁלֵמָה
  english_pob_choice: a whole people
  chosen_spanish: un pueblo entero
  alternatives_spanish:
  - una cautividad completa
  - una comunidad entera
  lexicon: HALOT
  rationale: «Un pueblo entero» refleja de manera más literal la totalidad expresada por גָּלוּת שְׁלֵמָה y mantiene la idea de una deportación completa.
- source_word: לְהַסְגִּיר
  english_pob_choice: to hand them over
  chosen_spanish: para entregarlo
  alternatives_spanish:
  - para ponerlo en manos de
  - para entregarlos
  lexicon: HALOT
  rationale: «Entregarlo» reproduce bien la idea de pasar a una autoridad ajena. Se usa singular neutro porque el antecedente colectivo es «un pueblo entero».
- source_word: לֶאֱדוֹם
  english_pob_choice: to Edom
  chosen_spanish: a Edom
  alternatives_spanish:
  - para Edom
  lexicon: Nombre propio geográfico
  rationale: Se conserva el nombre propio de la nación receptora del cautiverio.
theological_decisions:
- issue: Alcance de לֹא אֲשִׁיבֶנּוּ en la fórmula de juicio
  english_pob_reading: The LORD will not revoke the announced punishment / will not turn it back.
  chosen_spanish_reading: Yahvé no revocará el juicio anunciado, aunque el hebreo deja el objeto implícito.
  alternative_spanish_readings:
  - no lo revocará
  - no se retractará de ello
  - no lo volverá atrás
  rationale: El hebreo es deliberadamente elíptico; el español puede conservar esa tensión sin explicitar «castigo» en el texto principal. La nota permite recordar que el sentido es irreversible juicio en el marco de Amós 1–2.
  doctrine_reference: Amós 1–2; principio de mantener la elipsis cuando el contexto ya fija el referente
- issue: Alcance de גָּלוּת שְׁלֵמָה
  english_pob_reading: a whole people / an entire population into exile
  chosen_spanish_reading: un pueblo entero llevado al destierro
  alternative_spanish_readings:
  - una cautividad completa
  - toda una población
  rationale: La frase subraya la totalidad del traslado forzado. «Pueblo entero» preserva la amplitud colectiva sin sobreespecificar el matiz administrativo de «deportación».
  doctrine_reference: Amós 1:6; nota lexical sobre גָּלוּת שְׁלֵמָה
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que hizo más literal la elipsis de לֹא אֲשִׁיבֶנּוּ («I will not revoke it») y ajustó גָּלוּת שְׁלֵמָה a «a whole people». En español se conservó la elipsis con «no lo revocaré» y se reflejó la totalidad con «un pueblo entero», manteniendo la transparencia del juicio sin añadir un objeto explícito en el texto principal.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como forma principal para יְהוָה, conforme al estándar del proyecto.
  - Se usa «transgresiones» para פִּשְׁעֵי y no un término más débil como «faltas».
  - Se mantiene la fórmula escalonada «por tres... y por cuatro» por su valor retórico profético.
  - «Llevaron al destierro» evita un tecnicismo moderno y conserva el tono bíblico.
  - El sujeto implícito del segundo hemistiquio permanece colectivo y se expresa con pronombre singular neutro («lo») por concordancia con «un pueblo entero».
