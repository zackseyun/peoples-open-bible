translation:
  language: es
  text: Y sobre la compañía de la tribu de los hijos de Aser estaba Pagiel hijo de Ocrán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hueste», «división» o «ejército» para «compañía»; el hebreo denota un contingente organizado dentro del orden del campamento de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y encima de
  - Y al frente de
  lexicon: HALOT
  rationale: La preposición indica relación de autoridad u organización dentro del orden del campamento; «sobre» conserva ese valor de gobierno o supervisión. Se mantiene la conexión conjuntiva con el versículo anterior mediante «Y».
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - hueste
  - división
  - ejército
  lexicon: HALOT
  rationale: En el contexto del orden de marcha del campamento, el término designa un contingente organizado. «Compañía» es natural en español y conserva la idea de una unidad ordenada sin forzar un matiz militar excesivo.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - cetro
  - vara
  lexicon: HALOT
  rationale: Aquí el sustantivo se refiere a la unidad tribal de Israel, no a un objeto físico. «Tribu» expresa el sentido contextual de manera clara y fiel.
- source_word: בְּנֵי אָשֵׁר
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Aser
  alternatives_spanish:
  - los hijos varones de Aser
  - los descendientes de Aser
  lexicon: HALOT
  rationale: Se conserva la construcción literal del hebreo, que funciona como designación tribal. «Hijos» mantiene la forma de la fuente y es transparente en este contexto.
- source_word: פַּגְעִיאֵל
  english_pob_choice: Pagiel
  chosen_spanish: Pagiel
  lexicon: conventional transliteration
  rationale: Los nombres propios se transliteran de forma estándar para preservar la identificación del personaje.
- source_word: בֶּן עָכְרָן
  english_pob_choice: son of Ocran
  chosen_spanish: hijo de Ocrán
  alternatives_spanish:
  - hijo de Ocran
  - ben Ocrán
  lexicon: HALOT
  rationale: La construcción patronímica se vierte naturalmente como «hijo de». Se conserva el nombre propio en transliteración con acento gráfico adaptado al español para la pronunciación y legibilidad.
translation_notes:
  revision_awareness: El texto base en inglés no presenta revisiones ni cambios de última hora; el borrador español sigue de cerca el hebreo y el audit trail inglés, manteniendo la estructura administrativa del pasaje.
  spanish_consistency_notes:
  - Se usa «Aser» como forma española estándar del nombre tribal.
  - Se conserva «Ocrán» con acento gráfico para facilitar la lectura en español.
  - «Compañía» se emplea en sentido organizativo, no como agrupación militar moderna.
  - La sintaxis mantiene el encabezamiento «Y sobre...» para reflejar la continuidad con la lista de capitanes del contexto inmediato.
