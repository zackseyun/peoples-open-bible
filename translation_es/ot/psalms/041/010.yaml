translation:
  language: es
  text: Aun mi amigo cercano[a], en quien confié, el que comía mi pan[d][b], alzó contra mí su talón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el hombre de mi paz', un modismo para alguien que estaba en paz conmigo; es decir, un amigo cercano o aliado de confianza.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''el que compartía mi pan''. El hebreo dice literalmente ''el que comía mi pan'', evocando la mesa compartida y la confianza.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'ha hecho grande un talón contra mí', un modismo hebreo para una acción traidora u hostil.
    reason: lexical_alternative
  - marker: d
    text: Citado en Juan 13:18 en relación con la traición de Judas a Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: 'Introduce una idea enfática de adición: no solo un enemigo cualquiera, sino alguien especialmente cercano y confiable.'
- source_word: אִישׁ שְׁלוֹמִי
  english_pob_choice: my close friend
  chosen_spanish: el hombre de mi paz
  alternatives_spanish:
  - mi amigo íntimo
  - mi amigo cercano
  - mi aliado
  lexicon: HALOT
  rationale: Se conserva la imagen literal hebrea 'hombre de mi paz' para no borrar la tensión idiomática; en español suena marcada pero comprensible y permite la nota explicativa.
- source_word: אֲשֶׁר בָּטַחְתִּי בוֹ
  english_pob_choice: in whom I trusted
  chosen_spanish: en quien confié
  alternatives_spanish:
  - en quien confiaba
  - en quien puse mi confianza
  lexicon: HALOT
  rationale: '''Confié'' reproduce bien el valor relacional de בטח ב, con una construcción natural en español y sin añadir matices no presentes en el hebreo.'
- source_word: אוֹכֵל לַחְמִי
  english_pob_choice: who ate my bread
  chosen_spanish: el que comía de mi pan
  alternatives_spanish:
  - el que comió mi pan
  - el que compartía mi pan
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la mesa y la confianza. El participio se expresa de forma relativa y continua en español, siguiendo el valor descriptivo del hebreo.
- source_word: הִגְדִּיל עָלַי עָקֵב
  english_pob_choice: has lifted up his heel against me
  chosen_spanish: alzó contra mí su talón
  alternatives_spanish:
  - levantó contra mí su talón
  - elevó su talón contra mí
  lexicon: HALOT
  rationale: Se preserva el cuerpo-partícula idiomático ('talón') y la fuerza hostil ('contra mí'). 'Alzó' comunica el gesto sin desactivar el hebraísmo; 'talón' mantiene la imagen de traición.
theological_decisions:
- issue: Resonancia mesiánica y citación en Juan 13:18
  english_pob_reading: Translate the verse in its immediate psalmic sense without importing explicit messianic interpretation into the main text.
  chosen_spanish_reading: Traducir en sentido inmediato del salmo, sin introducir en el texto principal una interpretación mesiánica explícita.
  alternative_spanish_readings:
  - Dar forma al verso según la redacción de la cita del NT
  - Usar un lenguaje más abiertamente cristológico en la línea principal
  rationale: El hebreo presenta primero la traición sufrida por el salmista a manos de un compañero de confianza. La alusión posterior en Juan 13:18 es importante para la lectura canónica, pero no debe imponerse en la línea principal de la traducción.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se aplicaron cambios posteriores; la redacción mantiene de forma auditable la imagen hebrea de cercanía, confianza, comida compartida y traición.'
  spanish_consistency_notes:
  - Se conservó 'Dios'/'Yahvé' en la norma del proyecto, pero este versículo no contiene ninguno de esos términos.
  - '''Talón'' se mantiene literalmente para preservar el modismo hebreo; no se suaviza a una abstracción.'
  - La puntuación y el orden sintáctico buscan naturalidad en español sin borrar el paralelismo del original.
