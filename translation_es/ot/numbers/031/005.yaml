translation:
  language: es
  text: 'Así que, de entre los millares de Israel[a], mil por tribu fueron asignados[b]: doce mil armados para la guerra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Millares de Israel» puede referirse no solo al número, sino también a las unidades clánicas o militares mayores de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «fueron entregados», «fueron puestos a disposición» o «fueron reclutados»; el verbo hebreo puede expresar que fueron dados o asignados para el servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּסְרוּ
  english_pob_choice: were assigned
  chosen_spanish: fueron asignados
  alternatives_spanish:
  - fueron entregados
  - fueron puestos a disposición
  - fueron convocados
  lexicon: HALOT
  rationale: El nifal expresa una acción pasiva de ser puestos/entregados para el servicio militar. «Fueron asignados» conserva la pasividad y suena natural en español; «fueron entregados» sería más literal pero puede sonar demasiado fuerte o ambiguo.
- source_word: מֵאַלְפֵי יִשְׂרָאֵל
  english_pob_choice: from the thousands of Israel
  chosen_spanish: de entre los millares de Israel
  alternatives_spanish:
  - de entre los miles de Israel
  - de entre las divisiones de Israel
  - de entre los clanes de Israel
  lexicon: HALOT
  rationale: «אַלְפֵי» puede referirse literalmente a «millares» y también a unidades mayores de organización. «Millares» mantiene la forma numérica del hebreo y deja abierta la posible referencia organizativa sin forzarla.
- source_word: אֶלֶף לַמַּטֶּה
  english_pob_choice: a thousand from each tribe
  chosen_spanish: mil por tribu
  alternatives_spanish:
  - mil de cada tribu
  - mil para cada tribu
  - mil por cada tribu
  lexicon: HALOT
  rationale: El valor distributivo de לַמַּטֶּה queda claro en «por tribu». Esta fórmula es breve, idiomática y fiel al reparto uno por tribu.
- source_word: שְׁנֵים עָשָׂר אֶלֶף
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce mil hombres
  - doce mil en total
  lexicon: HALOT
  rationale: Es un cardinal directo que resume el total de la fuerza reunida.
- source_word: חֲלוּצֵי צָבָא
  english_pob_choice: armed for war
  chosen_spanish: armados para la guerra
  alternatives_spanish:
  - equipados para la batalla
  - preparados para la guerra
  - listos para el combate
  lexicon: HALOT
  rationale: «חֲלוּצֵי» comunica gente equipada/preparada para acción militar. «Armados para la guerra» conserva el matiz bélico con claridad y sin añadir elementos no presentes en el hebreo.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente, que no requirió cambios. Se mantiene el enfoque de equivalencia óptima del POB inglés, conservando la posible ambigüedad de מֵאַלְפֵי יִשְׂרָאֵל y la fuerza militar de חֲלוּצֵי צָבָא.
  spanish_consistency_notes:
  - Se preserva «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; este versículo no lo contiene.
  - «Millares» mantiene la posible tensión entre cifra literal y unidad organizativa, en paralelo al audit trail inglés.
  - Se evita «siervos» o vocabulario eclesiástico ajeno al campo militar del pasaje.
  - La puntuación con dos puntos reproduce bien la estructura resumidora del hebreo y del inglés auditado.
