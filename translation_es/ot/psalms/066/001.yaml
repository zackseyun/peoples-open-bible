    issue: «Griten a Dios» es semántica y estilísticamente débil para הָרִיעוּ.
    rationale: Aunque «gritar» preserva la fuerza vocal, en español sugiere simplemente vociferar o gritarle a alguien. El hebreo en contexto de alabanza denota una aclamación fuerte y jubilosa. «Aclamen» conserva mejor el valor cultual sin añadir más de lo que el contexto ya aporta.
  - severity: low
