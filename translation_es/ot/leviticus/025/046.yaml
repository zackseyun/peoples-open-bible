review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del POB inglés: transmisión hereditaria, posesión duradera, trabajo exigido, y prohibición de tratar con dureza a los hermanos israelitas. Sin embargo, hay dos problemas relevantes: la nota [a] contiene un anglicismo grave (''bequeatharlos'') y la cláusula ''para poseerlos como heredad perpetua'' desplaza un poco la estructura fuente, donde la idea principal es ''heredarlos como posesión / como propiedad hereditaria'' más que ''poseerlos''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita una reparación menor para naturalidad y precisión jurídica en español. 'Entregarlos como herencia' es aceptable, aunque 'dejarlos en herencia' suena más idiomático; y 'como posesión hereditaria permanente' representa mejor לָרֶשֶׁת אֲחֻזָּה לְעֹלָם que 'poseerlos como heredad perpetua'. La nota [a] es inaceptable en su forma actual por mezcla de inglés y español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conservan bien 'hijos de Israel' y 'hermanos'. El tratamiento de la esclavitud/trabajo forzado mantiene la dureza del original. No intervienen términos como Yahvé, Mesías, Cristo, Espíritu, etc.
  issues:
  - severity: high
    issue: La nota [a] contiene el anglicismo 'bequeatharlos'.
    rationale: Es un error lingüístico claro y rompe la legibilidad y dignidad del texto. Debe reemplazarse por una alternativa española natural como 'legarlos' o 'dejarlos en herencia'.
  - severity: medium
    issue: '''Para poseerlos como heredad perpetua'' no representa de la manera más natural y precisa la secuencia legal hebrea לָרֶשֶׁת אֲחֻזָּה לְעֹלָם.'
    rationale: El hebreo enfatiza herencia + posesión hereditaria permanente. En español, 'para heredarlos como posesión hereditaria permanente' o equivalente conserva mejor ambos componentes sin forzar 'poseerlos'.
  - severity: low
    issue: '''Podrán entregarlos como herencia'' es comprensible, pero menos idiomático que ''podrán dejarlos en herencia''.'
    rationale: No es un error de fidelidad, pero una formulación más natural mejora la lectura legal en español sin perder fuerza.
  revised_spanish_text: Podrán dejarlos en herencia a sus hijos después de ustedes[a], para heredarlos como posesión hereditaria permanente; de ellos podrán exigir trabajo. Pero sobre sus hermanos, los hijos de Israel[b], ningún hombre dominará a su hermano con dureza.
  revised_footnotes:
