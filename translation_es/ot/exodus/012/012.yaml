revisions:
- from: Porque yo pasaré por la tierra de Egipto en esta noche[a], y heriré a todo primogénito en la tierra de Egipto, desde el hombre hasta la bestia[b]; y sobre todos los dioses de Egipto ejecutaré juicios. Yo soy Yahvé[c].
  to: Porque yo pasaré por la tierra de Egipto en esta noche[a], y heriré a todo primogénito en la tierra de Egipto, desde el hombre hasta la bestia[b]; y contra todos los dioses de Egipto ejecutaré juicios. Yo soy Yahvé[c].
  rationale: Se corrige la nota [a] para alinearla con el hebreo y con la auditoría inglesa, eliminando una alternativa engañosa asociada al motivo de «pasar por alto». También se cambia «sobre todos los dioses» por «contra todos los dioses» para reflejar mejor la dirección hostil de los juicios en español natural. El resto del texto puede mantenerse.
  reviewer_model: gpt-5.4
