translation:
  language: es
  text: No harán así con Yahvé su Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo 'así' remite a las instrucciones inmediatamente anteriores sobre cómo deben destruirse los lugares de culto de las naciones; Israel no debe tratar a Yahvé de esa manera.
    reason: cross_reference
  - marker: b
    text: Hebreo YHWH, a menudo traducido como 'el SEÑOR'; aquí se traduce 'Yahvé'.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No deben
  - No han de
  lexicon: HALOT
  rationale: La negación simple reproduce con naturalidad la fuerza prohibitiva del hebreo en un mandato legal. En español, una prohibición breve es más idiomática que añadir auxiliares que podrían alargar innecesariamente la frase.
- source_word: תַעֲשׂוּן
  english_pob_choice: you shall do
  chosen_spanish: harán
  alternatives_spanish:
  - deben hacer
  - deberán hacer
  lexicon: HALOT
  rationale: Aunque el hebreo es 2mp, el español jurídico-bíblico puede expresar la prohibición de forma impersonal o con sujeto implícito. 'No harán' conserva la brevedad del original y su tono normativo sin forzar un calco poco natural.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de tal modo
  lexicon: HALOT
  rationale: '''Así'' mantiene la referencia anafórica al contexto inmediato: el modo descrito en el versículo anterior. Es la opción más concisa y transparente en español.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - con respecto a Yahvé
  lexicon: HALOT
  rationale: El dativo/preposición ל en este contexto marca relación respecto del trato dado a YHWH. En español, 'a Yahvé' conserva la relación directa y evita reemplazar el nombre divino por una forma de ocultamiento.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: 'El sufijo 2mp indica posesión de pacto: ''su Dios''. En español, el posesivo de tercera persona plural funciona de manera amplia y reverente; ''de ustedes'' sonaría más explícito pero menos fluido en registro bíblico.'
theological_decisions:
- issue: Renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La política española del proyecto exige 'Yahvé' para יהוה, siguiendo el texto fuente y evitando la convención de ocultamiento con mayúsculas. Se conserva así el nombre de pacto como dato audible del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance contextual de la prohibición
  english_pob_reading: A direct prohibition against treating Yahweh as the nations treat their gods
  chosen_spanish_reading: Una prohibición directa de hacer eso con Yahvé su Dios
  alternative_spanish_readings:
  - Una prohibición solo contra destruir objetos de culto yahvista
  - Una prohibición general contra toda imitación de ritos paganos
  rationale: '''Así'' mantiene la compacidad del hebreo y remite al contexto anterior sin explicarlo dentro del versículo. La nota aclara la referencia retroactiva al trato dado a los santuarios de las naciones.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente sin cambios sustantivos en el sentido. La única adaptación es la normalización al español del nombre divino según la terminología del proyecto y la conservación del valor anafórico de כֵּן mediante 'así'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme al estándar español del proyecto.
  - Se mantiene un registro breve y jurídico, apropiado para un mandato legal del Deuteronomio.
  - '''su Dios'' reproduce la relación de pacto sin sobreexplicarla en el texto principal.'
  - La nota a aclara el antecedente contextual de 'así' sin recargar el versículo.
