    rationale: La consonante hebrea פ con dagesh corresponde mejor a p/f según convención adoptada, pero la secuencia -קָה se representa mejor con «cá/ca» o «kah» conservando la terminación. «Apéca» además oscurece la relación con la alternativa documentada «Aphakah» y con el topónimo base Afec/Aphek.
