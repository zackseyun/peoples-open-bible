translation:
  text: The disciples said to Jesus[a], "We know that you will depart from us. Who
    will be great over us?" Jesus said to them, "Wherever you are, you are to go to
    James the Just—this one[f][e][d][c][b], for whose sake heaven and earth came into
    being."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ⲛⲁⲃⲱⲕ: rendered as "depart"; alternatives "go" or "leave" are possible
      depending on whether movement or separation is emphasized.'
    reason: lexical_alternative
  - marker: b
    text: 'ⲉⲧⲉⲣⲉⲛⲁⲣⲛⲟϭ ⲉϩⲣⲁⲓ ⲉϫⲛⲁⲛⲟⲛ: translated as "be great over us." Some take
      ⲣⲛⲟϭ idiomatically as "rule"; we avoid importing political language not present
      in the Coptic.'
    reason: lexical_alternative
  - marker: c
    text: 'ⲡⲙⲁ ⲉⲧⲉⲣⲉⲁⲛⲧⲱⲧⲛⲉⲓ ⲙⲙⲁⲩ: literally, "the place where you yourselves have
      come." Many modern renderings smooth this to "wherever you are." We preserve
      the relative clause and reflexive emphasis.'
    reason: alternative_reading
  - marker: d
    text: 'ⲁⲡⲡⲉ ("heaven"): Lycopolitan-style spelling in NH II; equivalent to standard
      Sahidic ⲁⲡⲉ/ⲧⲁⲡⲉ.'
    reason: dialect_note
  - marker: e
    text: 'James the Just as a leader: see Acts 15 and Galatians 1–2 for later early
      Christian context; Hegesippus (via Eusebius, Hist. Eccl. 2.23) uses the sobriquet
      "the Just."'
    reason: cross_reference
  - marker: f
    text: Or 'Where you yourselves have come,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉ
  chosen: said
  alternatives:
  - spoke
  lexicon: Crum; Layton (grammar, narrative formula)
  rationale: Standard Sahidic narrative verb introducing direct speech; simple and
    unmarked fits Thomas’s terseness.
- source_word: ⲡⲙⲁⲑⲏⲧⲏⲥ
  chosen: disciples
  alternatives:
  - learners
  - students
  lexicon: Crum (Greek loan); Layton
  rationale: Greek loanword mathetes in Coptic typically rendered "disciples" in early
    Christian texts; other options over-interpret.
- source_word: ⲁⲛⲟⲛⲥⲟⲟⲩⲛ
  chosen: we know
  alternatives:
  - we recognize
  - we understand
  lexicon: Crum (ⲥⲟⲟⲩⲛ 'to know')
  rationale: Direct, cognitive verb; "know" preserves the plain register.
- source_word: ⲛⲧⲟⲕⲛⲁⲃⲱⲕ
  chosen: you will depart
  alternatives:
  - you will go
  - you will leave
  lexicon: Crum (ⲃⲱⲕ 'to go'); Layton (future with ⲛⲁ)
  rationale: Context implies leaving the group rather than merely moving; "depart"
    carries that nuance without adding ecclesial tone.
- source_word: ⲛⲧⲛⲁⲛⲟⲛ
  chosen: from us
  alternatives:
  - away from us
  lexicon: Layton (prepositions; ⲛⲧ = from)
  rationale: Prepositional compound indicates source/origin; rendered minimally.
- source_word: ⲛⲓⲙ ⲡⲉ
  chosen: who
  alternatives:
  - which one
  - who is it
  lexicon: Layton (interrogatives)
  rationale: Thomas’s compact interrogative; "who" suffices; adding "is it" would
    overfill the line.
- source_word: ⲉⲧⲉⲣⲉⲛⲁⲣⲛⲟϭ ⲉϩⲣⲁⲓ ⲉϫⲛⲁⲛⲟⲛ
  chosen: will be great over us
  alternatives:
  - will rule over us
  - will be the leader over us
  lexicon: Crum (ⲛⲟϭ 'great'; ⲣⲛⲟϭ 'become/be great'); Layton (relative ⲉⲧⲉⲣⲉ + future)
  rationale: Preserves Thomas’s metaphor of greatness rather than importing the political
    term "rule." The preposition ⲉϩⲣⲁⲓ marks superiority/overness.
- source_word: ⲡⲙⲁ
  chosen: the place
  alternatives:
  - the spot
  - where
  lexicon: Crum (ⲙⲁ 'place')
  rationale: Concrete noun is kept; its use opens the unusual clause and we retain
    the strangeness.
- source_word: ⲁⲛⲧⲱⲧⲛ
  chosen: you yourselves
  alternatives:
  - you (plural)
  - you in person
  lexicon: Layton (reflexive/intensive pronouns)
  rationale: Reflexive intensifier; keeping it signals emphasis rather than dropping
    nuance.
- source_word: ⲉⲓ ⲙⲙⲁⲩ
  chosen: have come
  alternatives:
  - have arrived
  - came
  lexicon: Crum (ⲉⲓ 'come')
  rationale: Perfect aspect suits the disciples’ present state; "arrived" is possible
    but more idiomatic than necessary.
- source_word: ⲉⲣⲉⲛⲧⲱⲧⲛ ⲛⲁ ⲃⲱⲕ
  chosen: you are to go
  alternatives:
  - let yourselves go
  - go
  lexicon: Layton (jussive ⲉⲣⲉ + subject + ⲛⲁ + infinitive); Crum (ⲃⲱⲕ)
  rationale: Jussive directive with mild obligation; "are to" captures instruction
    without heavy imperative.
- source_word: ϣⲁ
  chosen: to
  alternatives:
  - toward
  lexicon: Crum (ϣⲁ 'to, toward')
  rationale: Destination preposition; "to" is sufficient in English.
- source_word: ⲓⲁⲕⲱⲃⲟⲥ
  chosen: James
  alternatives:
  - Jacob
  lexicon: Crum (loanwords); general Greek background
  rationale: Standard English name for Iakobos in NT context; "Jacob" would be misleading
    here.
- source_word: ⲡⲇⲓⲕⲁⲓⲟⲥ
  chosen: the Just
  alternatives:
  - the Righteous
  lexicon: Crum (loanword from Greek dikaios)
  rationale: Title-like sobriquet; "Just" keeps compactness and tradition; "Righteous"
    is acceptable but more abstract.
- source_word: ⲡⲁⲓ
  chosen: this one
  alternatives:
  - he
  lexicon: Crum (demonstratives)
  rationale: Thomas often uses deictic emphasis; we preserve the demonstrative for
    rhetorical focus.
- source_word: ⲁⲡⲡⲉ
  chosen: heaven
  alternatives:
  - the sky
  lexicon: Crum (ⲁⲡⲉ/ⲁⲡⲡⲉ 'heaven'); dialectal note
  rationale: Lycopolitan-style gemination in NH II; semantic value is standard "heaven."
- source_word: ⲡⲕⲁϩ
  chosen: earth
  alternatives:
  - the land
  - ground
  lexicon: Crum (ⲕⲁϩ 'earth, soil, land')
  rationale: Cosmic pairing with "heaven"; "earth" matches idiom.
- source_word: ϣⲱⲡⲉ
  chosen: came into being
  alternatives:
  - came to be
  - were made
  lexicon: Crum (ϣⲱⲡⲉ 'happen, come to be')
  rationale: Preferred Thomasine creation verb; avoids implying a specific agent beyond
    the clause’s causative "because of him."
- source_word: ⲉⲧⲃⲉ ⲛⲧⲟϥ
  chosen: for whose sake
  alternatives:
  - because of him
  - on account of him
  lexicon: Crum (ⲉⲧⲃⲉ 'because of, for the sake of')
  rationale: Relative construction in English keeps link to the antecedent "James
    the Just"; preserves causative nuance.
textual_note: 'No lacunae are marked in Dilley’s NH II page 34 for this logion. Orthography
  shows a Lycopolitan feature in ⲁⲡⲡⲉ (heaven), with gemination, but the semantics
  are standard Sahidic. The clause ⲡⲙⲁ ⲉⲧⲉⲣⲉⲁⲛⲧⲱⲧⲛⲉⲓ ⲙⲙⲁⲩ ⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁⲃⲱⲕ is syntactically
  unusual in English; it is a relative-plus-jussive sequence: “the place where you
  yourselves have come—let you go…,” which we render as “Where you yourselves have
  come, you are to go…,” keeping the reflexive intensifier (ⲁⲛⲧⲱⲧⲛ) and the mild directive
  (ⲉⲣⲉ … ⲛⲁ + infinitive). The question uses ⲣⲛⲟϭ with ⲉϩⲣⲁⲓ (over) rather than a
  direct governance verb; we preserve the metaphor of “greatness over” rather than
  paraphrasing to “rule.” No conjectural restorations are indicated by Dilley for
  this saying.'
