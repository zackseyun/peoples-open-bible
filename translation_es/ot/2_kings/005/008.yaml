    rationale: En español sugiere que Eliseo envió al rey para que hablara, no que envió un mensaje al rey. El hebreo וַיִּשְׁלַח אֶל־הַמֶּלֶךְ לֵאמֹר expresa envío de comunicación al rey.
  - severity: medium
    issue: La nota [a] no refleja bien la alternativa léxica documentada
    rationale: El texto principal ya dice «había rasgado sus vestidos», pero la nota empieza con «O ‘había rasgado sus vestidos’». La alternativa debería distinguir otra posibilidad como «había rasgado sus vestiduras» o explicar «ropa»/«vestidos».
  - severity: low
    issue: «Que él venga a mí» es fiel pero algo menos natural que una forma con matiz exhortativo
    rationale: No es incorrecto, pero «Que venga a mí» o «Por favor, que venga a mí» suenan más fluidos. Aun así, mantener «él» puede ayudar a marcar el referente y sostener la nota explicativa.
