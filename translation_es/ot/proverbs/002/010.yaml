translation:
  language: es
  text: Porque la sabiduría[a] entrará en tu corazón, y el conocimiento será agradable para tu alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando la sabiduría entra en tu corazón» o «cuando la sabiduría entre en tu corazón».'
    reason: alternative_reading
  - marker: b
    text: Hebreo «alma»; también «ser», «yo» o «vida», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce la base explicativa de la afirmación anterior. «Porque» conserva la relación lógica de explicación con un español natural y sobrio.
- source_word: תָב֣וֹא
  english_pob_choice: will enter
  chosen_spanish: entrará
  alternatives_spanish:
  - vendrá
  - entrará
  lexicon: HALOT
  rationale: El verbo בוא con el complemento «en tu corazón» pide la idea de entrada. El futuro español refleja bien el valor promissivo del proverbio.
- source_word: חָכְמָ֣ה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente directo y mantiene el término clave del libro de Proverbios sin sobreinterpretación.
- source_word: בְלִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu mente
  - en tu interior
  lexicon: HALOT
  rationale: El hebreo לֵב designa el centro interior de la persona, incluyendo pensamiento y voluntad. «Corazón» conserva el trasfondo antropológico bíblico y es claro en español.
- source_word: וְדַעַת
  english_pob_choice: and knowledge
  chosen_spanish: y el conocimiento
  alternatives_spanish:
  - y el saber
  - y la comprensión
  lexicon: HALOT
  rationale: «Conocimiento» reproduce היטב דַעַת y mantiene la distinción sapiencial frente a otros términos como «entendimiento».
- source_word: לְנַפְשְׁךָ
  english_pob_choice: to your soul
  chosen_spanish: para tu alma
  alternatives_spanish:
  - a tu alma
  - para tu vida
  - para ti
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. Aquí «alma» preserva la correspondencia poética con «corazón» y sigue de cerca la lectura auditada en inglés.
- source_word: יִנְעָם
  english_pob_choice: will be pleasant
  chosen_spanish: será agradable
  alternatives_spanish:
  - será dulce
  - te deleitará
  - será placentero
  lexicon: HALOT
  rationale: El verbo נעם expresa agradabilidad o dulzura. «Será agradable» conserva el predicado sin intensificarlo más allá del hebreo.
theological_decisions:
- issue: Antropología bíblica en לֵב y נֶפֶשׁ
  english_pob_reading: Retain 'heart' and 'soul' in the main text
  chosen_spanish_reading: Mantener «corazón» y «alma» en el texto principal
  alternative_spanish_readings:
  - mente e interior
  - intelecto y vida
  - corazón y ser interior
  rationale: El versículo usa el lenguaje antropológico hebreo habitual para la persona interior. Traducirlo como «mente» o «interior» reduciría indebidamente el campo semántico. «Corazón» y «alma» conservan la textura literaria y teológica del original.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Relación lógica de כִּי con el contexto anterior
  english_pob_reading: For
  chosen_spanish_reading: Porque
  alternative_spanish_readings:
  - Pues
  - Cuando
  rationale: Aunque «cuando» es posible en ciertos contextos de כִּי, aquí el valor explicativo encaja mejor con la secuencia exhortativa-promisoria del pasaje. «Porque» mantiene esa conexión sin forzar un matiz temporal.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no muestra cambios revisados: la decisión base permanece estable y de alta concordancia, por lo que la redacción española sigue directamente esa lectura sin introducir ajustes no respaldados por el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo «corazón» para לֵב y «alma» para נֶפֶשׁ, en consonancia con la antropología bíblica del pasaje.
  - Se prefirió «Porque» como equivalente funcional de כִּי para expresar la relación explicativa natural en español.
  - Se evitó «Cristo» u otra terminología no pertinente; el versículo no contiene vocabulario mesiánico ni divino directo.
  - La puntuación reproduce el paralelismo hebreo con una coma antes de la segunda cola poética.
