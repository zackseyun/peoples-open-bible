  text: וּ/זְכַרְתֶּם שָׁ֗ם אֶת דַּרְכֵי/כֶם֙ וְ/אֵת֙ כָּל עֲלִיל֣וֹתֵי/כֶ֔ם אֲשֶׁ֥ר נִטְמֵאתֶ֖ם בָּ֑/ם וּ/נְקֹֽטֹתֶם֙ בִּ/פְנֵי/כֶ֔ם בְּ/כָל רָעוֹתֵי/כֶ֖ם אֲשֶׁ֥ר עֲשִׂיתֶֽם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/043.yaml
  text: There you will remember your ways and all your deeds by which you defiled yourselves[b][a], and you will loathe yourselves in your own sight for all the evils that you have done.
  footnotes:
  - marker: a
    text: Or 'you will feel disgust with yourselves' / 'you will be sickened by yourselves.' The Hebrew verb expresses strong self-abhorrence.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in your faces'; the sense is 'in your own sight' or 'in your own eyes.'
    reason: lexical_alternative
