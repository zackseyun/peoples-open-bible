  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios» para אֱלֹהִים es correcto; no aparecen términos sensibles como Yahvé/Mesías/esclavo. «Campamento» preserva bien el juego semántico con Mahanaim. La transliteración «Mahanaim» concuerda con la política de nombres propios.'
