review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: caso legal condicional, consumo involuntario de algo consagrado, adición de un quinto y entrega al sacerdote. Sin embargo, algunas elecciones españolas no preservan bien la naturalidad ni el matiz documentado: «sobre ello» calca demasiado עָלָיו y suena antinatural con «añadir»; «cosa santa» es comprensible pero poco idiomática en español bíblico actual y puede sonar extraña donde el contexto apunta a algo consagrado reservado para uso sacerdotal.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero tiene calcos poco naturales: «sobre ello» y, en menor grado, «cosa santa». Para español eclesial legible y digno, conviene «añadirá un quinto a ello» o mejor «le añadirá un quinto», y «algo santo/consagrado» o «una cosa sagrada». Dado el historial léxico inglés, la mejor reparación mínima es conservar la amplitud semántica con «algo santo» y mejorar la sintaxis de restitución.'
  glossary_alignment: No hay conflicto con glosario mayor. «Sacerdote» está bien para כֹּהֵן. No aparecen términos como Yahvé/Mesías/etc. La decisión de mantener «un hombre» concuerda con la rationale auditada. La traducción de קֹדֶשׁ como «cosa santa» necesita ajuste estilístico más que doctrinal; «algo santo» preserva mejor la amplitud sin sonar tan torpe.
  issues:
  - severity: medium
    issue: «sobre ello» es un calco poco natural de עָלָיו con יסף
    rationale: En español, «añadir X sobre ello» suena forzado en este contexto legal. El sentido es adición al principal, mejor expresado como «añadirá un quinto[a] a ello» o «le añadirá un quinto».
  - severity: medium
    issue: «cosa santa» suena poco idiomático en español bíblico contemporáneo
    rationale: Aunque literalmente defendible, la expresión resulta rígida y extraña. «Algo santo» mantiene la amplitud de קֹדֶשׁ en ambas ocurrencias sin sobreespecificar.
  - severity: low
    issue: La nota c ya no refleja bien la mejor solución española
    rationale: La nota debe explicar la alternativa literal heredada del inglés auditado, pero la formulación principal revisada debe ser natural en español.
  revised_spanish_text: Y si un hombre[a] come inadvertidamente[b] algo santo, entonces le añadirá un quinto[c] y dará lo santo al sacerdote.
  revised_footnotes:
  - marker: a
    text: O «cualquiera» / «una persona»; el hebreo dice «un hombre» (אִישׁ), una formulación legal masculina singular que puede funcionar de modo genérico.
    reason: lexical_alternative
  - marker: b
    text: O «por error» / «en error».
    reason: lexical_alternative
  - marker: c
    text: Lit. «añadirá su quinta parte sobre ello»; es decir, añadirá un quinto al valor principal.
    reason: previous_rendering
  revision_rationale: Se revisa para eliminar el calco antinatural «sobre ello» y para mejorar la idiomaticidad de קֹדֶשׁ en español sin perder su amplitud semántica. «Algo santo ... lo santo» preserva el vínculo léxico entre ambas ocurrencias y sigue siendo suficientemente amplio para alimento o propiedad consagrada. «Le añadirá un quinto» comunica con claridad la restitución requerida.
