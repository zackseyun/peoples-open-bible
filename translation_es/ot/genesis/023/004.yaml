translation:
  language: es
  text: Soy forastero y residente temporal[a] entre ustedes. Denme un sitio de sepultura[b] entre ustedes, para que pueda sepultar a mi muerto[c] fuera de mi vista[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice 'forastero y residente temporal'; גֵּר y תוֹשָׁב forman un par que subraya la falta de pertenencia plena y de posesión de tierra.
    reason: lexical_alternative
  - marker: b
    text: O 'propiedad de sepultura'. El hebreo incluye la idea de una tenencia o posesión, no solo de un lugar físico para cavar una tumba.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'mi muerto'. El hebreo usa un modismo singular para un difunto familiar, sin nombrarlo aquí.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, 'de delante de mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּר
  english_pob_choice: foreigner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero
  - foráneo
  lexicon: HALOT
  rationale: גֵּר señala a alguien fuera de su tierra y sin estatus pleno de pertenencia. 'Forastero' comunica bien esa condición de ajenidad en español moderno y evita la rigidez técnica de 'extranjero'.
- source_word: וְתוֹשָׁב
  english_pob_choice: sojourner
  chosen_spanish: residente temporal
  alternatives_spanish:
  - morador temporal
  - estante
  lexicon: HALOT
  rationale: תוֹשָׁב complementa גֵּר al destacar residencia sin posesión ni estatus nativo. 'Residente temporal' conserva esa idea en español claro; 'sojourner' no tiene un equivalente idiomático natural en español.
- source_word: עִמָּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - con ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: En este contexto la relación es comunitaria y local. 'Entre ustedes' transmite mejor la presencia social de Abraham que un simple 'con ustedes'.
- source_word: תְּנוּ לִי
  english_pob_choice: Give me
  chosen_spanish: Denme
  alternatives_spanish:
  - Concédanme
  - Entréguenme
  lexicon: HALOT
  rationale: El imperativo de נתן es directo. 'Denme' es natural y fiel; 'concédanme' suena más formal e interpretativo.
- source_word: אֲחֻזַּת קֶבֶר
  english_pob_choice: a burial site
  chosen_spanish: una posesión funeraria
  alternatives_spanish:
  - un sitio de sepultura
  - una propiedad sepulcral
  lexicon: HALOT
  rationale: אֲחֻזָּה puede implicar tenencia o posesión, no solo un lugar físico. 'Posesión funeraria' preserva esa dimensión legal y patrimonial que el audit trail subraya, sin reducirlo a un mero 'sitio'.
- source_word: וְאֶקְבְּרָה
  english_pob_choice: so that I may bury
  chosen_spanish: para que pueda sepultar
  alternatives_spanish:
  - para sepultar
  - y sepultaré
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad. 'Para que pueda sepultar' comunica el valor volitivo/purpose de manera fluida en español.
- source_word: מֵתִי
  english_pob_choice: my dead
  chosen_spanish: a mi muerto
  alternatives_spanish:
  - a mi difunto
  - a mi fallecido
  lexicon: HALOT
  rationale: El hebreo usa un participio singular con sufijo posesivo, un modismo para un difunto familiar. 'Mi muerto' conserva la literalidad del giro; el artículo y la preposición en español lo vuelven natural.
- source_word: מִלְּפָנַי
  english_pob_choice: out of my sight
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - fuera de mi vista
  - de mi presencia
  lexicon: HALOT
  rationale: La expresión es literalmente 'de delante de mí'. Se mantiene la imagen espacial del hebreo y se evita suavizarla demasiado con una paráfrasis.
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'burial property' hacia 'burial site' por naturalidad, pero mantuvo la idea de tenencia. En español se optó por conservar explícitamente la dimensión de posesión mediante 'posesión funeraria', porque el término permite reflejar mejor אֲחֻזָּה sin perder legibilidad. No se siguió mecánicamente la última revisión inglesa; se ponderó el hebreo y el matiz legal del contexto.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - '''Forastero'' y ''residente temporal'' mantienen la tensión semántica del par גֵּר/תוֹשָׁב.'
  - '''Posesión funeraria'' prioriza el matiz de propiedad/tenencia indicado por אֲחֻזָּה.'
  - Se preserva la imagen espacial de מִלְּפָנַי con 'de delante de mí' para no borrar la literalidad del hebreo.
