translation:
  language: es
  text: 'Isaías les dijo: «Así dirán a su señor: “Así dice Yahvé: ‘No tengas miedo por las palabras que has oído, con las cuales los siervos[a] del rey de Asiria me han blasfemado’”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jóvenes del rey de Asiria». El término hebreo puede designar jóvenes, pero aquí probablemente se refiere a ayudantes u oficiales reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El hebreo narrativo wayyiqtol de אמר se expresa de forma natural y fiel con el pasado simple español «dijo».
- source_word: אֲדֹנֵיכֶם
  english_pob_choice: your master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: HALOT
  rationale: Aquí אדון se refiere a Ezequías como superior humano de los mensajeros. «Señor» conserva la relación de autoridad sin confundirlo con el título divino, y funciona mejor en español bíblico que «amo» o «dueño».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé» en el texto principal, en vez de una sustitución por «SEÑOR».'
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  lexicon: HALOT
  rationale: El jussivo negativo de ירא se vierte con una exhortación clara y natural en español. «No tengas miedo» comunica con precisión la amonestación de ánimo en este contexto.
- source_word: מִפְּנֵי הַדְּבָרִים
  english_pob_choice: because of the words
  chosen_spanish: por las palabras
  alternatives_spanish:
  - a causa de las palabras
  - por las cosas
  lexicon: HALOT
  rationale: La expresión idiomática indica la causa del temor. Dado que דְּבָרִים aquí son palabras o dichos, «por las palabras» preserva la referencia concreta y evita una paráfrasis más amplia.
- source_word: שָׁמַעְתָּ
  english_pob_choice: you have heard
  chosen_spanish: has oído
  alternatives_spanish:
  - oíste
  lexicon: HALOT
  rationale: El perfecto hebreo se traduce con presente perfecto español para mantener la relevancia actual de lo escuchado dentro del discurso de consuelo.
- source_word: גִּדְּפוּ
  english_pob_choice: have blasphemed
  chosen_spanish: han blasfemado
  alternatives_spanish:
  - han injuriado
  - han ultrajado
  lexicon: HALOT
  rationale: En este contexto dirigido contra Yahvé, גדף no es solo insulto humano; «blasfemado» conserva la gravedad teológica que el POB inglés destacó.
- source_word: נַעֲרֵי מֶלֶךְ אַשּׁוּר
  english_pob_choice: the servants of the king of Assyria
  chosen_spanish: los siervos del rey de Asiria
  alternatives_spanish:
  - los jóvenes del rey de Asiria
  - los servidores del rey de Asiria
  - los asistentes del rey de Asiria
  lexicon: HALOT
  rationale: Aunque נַעֲרִים puede significar «jóvenes», en contexto de corte puede designar ayudantes o subordinados. «Siervos» sigue la elección semántica del POB inglés y mantiene la relación funcional con el rey asirio.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  lexicon: HALOT
  rationale: Se conserva el pronombre objeto directo para mantener explícito el agravio personal contra Yahvé.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide una representación audible y transparente del Nombre. «Yahvé» mantiene esa decisión y evita ocultar el nombre con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de גִּדְּפוּ cuando el objeto es Dios
  english_pob_reading: have blasphemed me
  chosen_spanish_reading: han blasfemado me
  alternative_spanish_readings:
  - han injuriado me
  - han ultrajado me
  rationale: El verbo no expresa mera grosería sino afrenta sacrílega contra Yahvé. «Han blasfemado» conserva esa carga teológica; en español, la construcción con objeto directo explícito mantiene el énfasis del hebreo en «me».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Valor de נַעֲרֵי מֶלֶךְ אַשּׁוּר
  english_pob_reading: the servants of the king of Assyria
  chosen_spanish_reading: los siervos del rey de Asiria
  alternative_spanish_readings:
  - los jóvenes del rey de Asiria
  - los asistentes del rey de Asiria
  rationale: Se preserva la tensión léxica entre «jovenes» y función cortesana. «Siervos» es el mejor equivalente funcional y mantiene la referencia a subordinados del monarca asirio sin reducirlos a edad biológica.
  doctrine_reference: HALOT; nota lexical del POB en inglés
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura y decisiones del POB en inglés, sin cambios textuales relevantes detectados en la última revisión; se conservó la misma resolución para el Nombre divino, la gravedad de גדף y la ambigüedad de נערים, adaptadas a español natural y transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto del Nombre divino para mantener transparencia textual.
  - «Siervos» reproduce la función cortesana del hebreo en línea con la decisión inglesa, aunque la nota conserva la alternativa semántica «jóvenes».
  - Se mantiene el pronombre explícito «me» para reflejar el agravio directo contra Yahvé.
  - La puntuación con comillas interiores sigue el estilo español y conserva la cita en cascada del original.
