revisions:
- from: Cuando miro tus cielos[a], la obra de tus dedos, la luna y las estrellas, que tú has puesto en su lugar—
  to: Cuando miro tus cielos[a], la obra de tus dedos, la luna y las estrellas, que has puesto en su sitio—
  rationale: Se mantiene la estructura y las decisiones principales del borrador, pero se ajusta «has puesto en su lugar» a «has puesto en su sitio» para evitar un matiz posesivo no explícito y lograr un español más natural y fiel al valor de כּוֹנָנְתָּה. También se elimina el pronombre sujeto innecesario y se pule la nota al pie.
