translation:
  language: es
  text: 'La sanguijuela tiene dos hijas: «Da[a], da». Tres cosas nunca se sacian; cuatro nunca dicen: «¡Basta![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Más, más». La petición puede entenderse como un clamor literal de «Da, da» o, de modo más interpretativo, como «Más, más».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Es suficiente». El hebreo final se entiende aquí como un modismo de suficiencia, no como «riqueza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲלוּקָה
  english_pob_choice: The leech
  chosen_spanish: La sanguijuela
  alternatives_spanish:
  - La leech
  - La sanguijuela
  lexicon: HALOT
  rationale: עֲלוּקָה designa una sanguijuela. En español, «sanguijuela» comunica el referente natural y conserva el valor imagético del proverbio. El ל inicial se entiende como una construcción temática que en español fluye de modo natural con artículo definido.
- source_word: שְׁתֵּי בָנוֹת
  english_pob_choice: has two daughters
  chosen_spanish: tiene dos hijas
  alternatives_spanish:
  - tiene dos hijas
  - dos hijas
  lexicon: HALOT
  rationale: El hebreo es nominal y el inglés suplió «has»; en español también conviene suplir un verbo para una sintaxis natural. «Hijas» mantiene la imagen literal sin interpretarla como «crías» o «deseos».
- source_word: הַב הַב
  english_pob_choice: Give, give
  chosen_spanish: Da[a], da[b]
  alternatives_spanish:
  - ¡Da, da!
  - Más, más
  lexicon: HALOT
  rationale: La forma breve e imperativa se conserva con «da». Se evita «Más, más» en el texto principal porque el inglés POB preserva la petición literal y deja la lectura interpretativa como alternativa. Se separan las dos posibilidades en notas distintas para no perder la tensión léxica entre demanda literal e intensificación semántica.
- source_word: שָׁלֹשׁ הֵנָּה לֹא תִשְׂבַּעְנָה
  english_pob_choice: Three things are never satisfied
  chosen_spanish: Tres cosas nunca se sacian
  alternatives_spanish:
  - Tres cosas nunca quedan satisfechas
  - Tres cosas nunca se satisfacen
  lexicon: HALOT
  rationale: 'La fórmula sapiencial numérica se expresa con «Tres cosas». El verbo refleja bien el sentido de insaciabilidad: «no se sacian» es idiomático en español y conserva el matiz de apetito/inagotabilidad.'
- source_word: אַרְבַּע לֹא אָמְרוּ הוֹן
  english_pob_choice: four never say, “Enough”
  chosen_spanish: 'cuatro nunca dicen[c]: «¡Basta!»'
  alternatives_spanish:
  - 'cuatro nunca dicen: «Es suficiente»'
  - 'cuatro nunca dicen: «Basta»'
  lexicon: HALOT
  rationale: הוֹן aquí funciona idiomáticamente como una exclamación de suficiencia, no como «riqueza». «¡Basta!» comunica con claridad la idea de límite/suficiencia en español, manteniendo el paralelismo con la nota de alternativa del inglés POB.
theological_decisions:
- issue: Sentido idiomático de הוֹן como suficiencia, no como riqueza
  english_pob_reading: four never say, “Enough”
  chosen_spanish_reading: 'cuatro nunca dicen: «¡Basta!»'
  alternative_spanish_readings:
  - 'cuatro nunca dicen: «riqueza»'
  - 'cuatro nunca dicen: «es suficiente»'
  rationale: 'Se sigue la lectura contextual del POB: el último vocablo no se toma como el sustantivo común «riqueza», sino como una expresión idiomática de suficiencia. En español, «¡Basta!» conserva mejor la idea de límite alcanzado sin introducir una palabra semánticamente ajena al proverbio.'
  doctrine_reference: Proverbios sapienciales; no aplica una doctrina específica
translation_notes:
  revision_awareness: El inglés POB fue revisado solo en puntuación final; el contenido semántico y las decisiones léxicas permanecen estables. La traducción española sigue esa lectura estable y preserva la alternativa interpretativa en notas donde el hebreo admite más de una manera de oír el proverbio.
  spanish_consistency_notes:
  - Se mantiene «sanguijuela» como referente principal para עֲלוּקָה, en lugar de un equivalente más interpretativo.
  - Se usa «hijas» para conservar la imagen del hebreo y del audit trail inglés, sin convertirlas en metáfora explicativa.
  - Se distingue entre la demanda literal «da» y la lectura intensiva «más» mediante notas separadas.
  - Se traduce הוֹן por la idea de suficiencia («¡Basta!») y no por «riqueza».
  - La puntuación española sigue el ritmo proverbial con comillas y signo de exclamación interno en la cita final.
