translation:
  language: es
  text: 'Ahora, mi señor, vive Yahvé y vive tu alma: puesto que Yahvé te ha impedido incurrir en culpa de sangre y vengarte con tu propia mano[a], ahora sean como Nabal[b] tus enemigos y los que buscan mal contra mi señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'salvarte con tu propia mano'.
    reason: lexical_alternative
  - marker: b
    text: '''Como Nabal'' probablemente alude al hombre Nabal por nombre, aunque el nombre también evoca la palabra hebrea ''necio''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  lexicon: HALOT
  rationale: En este diálogo respetuoso Abigail se dirige a David con un tratamiento deferente. 'Mi señor' conserva la cortesía del título sin introducir connotaciones de dominio esclavista que 'mi amo' tendría en español.
- source_word: חַי יְהוָה וְחֵי נַפְשְׁךָ
  english_pob_choice: as Yahweh lives and as your soul lives
  chosen_spanish: vive Yahvé y vive tu alma
  alternatives_spanish:
  - vive Yahvé y vive tu alma
  - por la vida de Yahvé y por la vida de tu alma
  lexicon: HALOT
  rationale: La fórmula hebrea es juratoria y se expresa naturalmente en español con 'vive ... y vive ...'. 'Tu alma' refleja de modo más literal נֶפֶשׁ, mientras que la lectura idiomática de 'tu vida' sería posible pero menos cercana al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: DOCTRINE.md Contested terms
  rationale: Se mantiene el nombre divino con la transliteración definida por el proyecto, en lugar de sustituirlo por un título genérico.
- source_word: מְנָעֲךָ
  english_pob_choice: has kept you from
  chosen_spanish: te ha guardado de
  alternatives_spanish:
  - te ha retenido de
  - te ha impedido
  lexicon: HALOT
  rationale: El verbo expresa impedir o contener. 'Te ha guardado de' es natural en español y conserva la idea de prevención divina.
- source_word: מִבּוֹא בְדָמִים
  english_pob_choice: from bloodguilt
  chosen_spanish: de caer en sangre
  alternatives_spanish:
  - de derramar sangre
  - de incurrir en culpa de sangre
  lexicon: HALOT
  rationale: El hebreo apunta al acto de entrar en derramamiento de sangre con su carga moral. 'Caer en sangre' mantiene la imagen verbal y deja abierta la fuerza ética; 'incurrir en culpa de sangre' sería más explícito pero menos fluido en el texto principal.
- source_word: וְהוֹשֵׁעַ יָדְךָ לָךְ
  english_pob_choice: and from avenging yourself with your own hand
  chosen_spanish: de vengarte con tu propia mano
  alternatives_spanish:
  - de salvarte con tu propia mano
  - de hacerte justicia con tu propia mano
  lexicon: HALOT
  rationale: En este contexto la expresión apunta a la represalia personal. 'Vengarte con tu propia mano' recoge bien el sentido contextual y evita una traducción demasiado literal que oscurezca la idea.
- source_word: יִהְיוּ כְנָבָל
  english_pob_choice: let ... be like Nabal
  chosen_spanish: sean como Nabal
  alternatives_spanish:
  - sean como Nabal
  - sean como un necio
  lexicon: HALOT
  rationale: Se conserva el nombre propio porque el referente inmediato es el hombre Nabal; al mismo tiempo, el eco semántico de 'necio' queda implícito sin sustituir el nombre por el común.
- source_word: אֹיְבֶיךָ וְהַמְבַקְשִׁים אֶל אֲדֹנִי רָעָה
  english_pob_choice: your enemies and those who seek evil against my lord
  chosen_spanish: tus enemigos y los que buscan mal contra mi señor
  alternatives_spanish:
  - tus enemigos y los que buscan mal contra mi señor
  - tus enemigos y los que procuran daño a mi señor
  lexicon: HALOT
  rationale: La expresión hebrea 'buscar mal' se conserva en español porque tiene buena transparencia bíblica y mantiene la relación semántica con רָעָה. 'Contra mi señor' expresa el objeto del daño de manera natural.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se sigue el criterio del proyecto de transliterar el Tetragrámaton en lugar de ocultarlo tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la expresión sobre la mano de David
  english_pob_reading: from avenging yourself with your own hand
  chosen_spanish_reading: de vengarte con tu propia mano
  alternative_spanish_readings:
  - de salvarte con tu propia mano
  - de hacerte justicia con tu propia mano
  rationale: El contexto narrativo indica que Abigail habla del intento de represalia personal de David. La traducción principal prioriza el valor contextual de venganza, mientras que la alternativa más literal queda preservada en nota.
  doctrine_reference: 1 Samuel 25:26; audit trail lexical note on וְהוֹשֵׁעַ יָדְךָ לָךְ
translation_notes:
  revision_awareness: Se ajustó la formulación para anclar correctamente las notas al texto español con marcadores visibles [a] y [b], evitando notas sin ancla. La redacción mantiene el sentido del juramento, la prevención de sangre y la alusión nominal a Nabal conforme al expediente auditado en inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יהוה.
  - Se conserva 'mi señor' como tratamiento respetuoso y no como título divino.
  - Se mantiene el nombre propio 'Nabal' y no se sustituye por 'necio' en el cuerpo principal.
  - La expresión 'buscar mal' reproduce la formulación bíblica sin intensificarla indebidamente.
  - La nota [a] queda anclada a 'vengarte con tu propia mano' y la nota [b] a 'Nabal'.
