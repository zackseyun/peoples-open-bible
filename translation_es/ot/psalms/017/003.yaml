review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la lectura del POB en casi todo el versículo: ''has examinado mi corazón'', ''me has visitado de noche'', ''me has probado'' y la resolución final a partir de זַמֹּתִי. Sin embargo, ''no hallaste nada'' cambia injustificadamente el tiempo respecto del hebreo/perfecto inglés (''find nothing'') y rompe la serie de perfectos dirigidos a Dios en segunda persona. Además, ''que mi boca no se extravíe'' debilita y desplaza el sentido de עבר con ''boca'': la idea no es desviarse sino sobrepasar/transgredir en el hablar.'
  spanish_quality_summary: 'El español es claro y digno, pero requiere dos ajustes para mayor fidelidad y naturalidad bíblica: mantener la serie verbal con ''no encuentras nada'' o equivalente, y reemplazar ''no se extravíe'' por una formulación más cercana al sentido ético de sobrepasar/transgredir en el hablar. El resto del registro es bueno y legible.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Las decisiones léxicas principales son adecuadas. La excepción relevante es בַּל יַעֲבָר פִּי, donde conviene 'no transgreda' o 'no sobrepase' en vez de 'no se extravíe' para reflejar mejor el valor de עבר y la rationale documentada del POB.
  issues:
  - severity: medium
    issue: '''no hallaste nada'' usa un tiempo verbal inconsistente con la línea principal'
    rationale: El hebreo בַל תִּמְצָא y el POB inglés 'find nothing' presentan el resultado actual de la prueba dentro de la serie de perfectos dirigidos a Dios. 'No hallaste' suena como pasado narrativo aislado y desajusta el paralelismo con 'has examinado / has visitado / has probado'.
  - severity: medium
    issue: '''mi boca no se extravíe'' no refleja con suficiente precisión בַּל יַעֲבָר פִּי'
    rationale: עבר con 'mi boca' apunta a no pasar más allá, no sobrepasar, no transgredir en el habla. 'Extravíe' introduce la idea de perder el camino, que no es la imagen léxica del hebreo ni la decisión documentada del POB.
  - severity: low
    issue: La nota al pie puede afinarse para corresponder exactamente a la formulación revisada
    rationale: Si el texto principal usa 'no transgreda', la nota debe conservar la alternativa más literal 'mi boca no pasará más allá' y explicar que se refiere a no sobrepasarse al hablar.
  revised_spanish_text: Tú has examinado mi corazón; me has visitado de noche; me has probado y no encuentras nada[a]. He resuelto que mi boca no transgreda.
