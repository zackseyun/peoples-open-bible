translation:
  language: es
  text: Conozco tus obras. Mira[a], he puesto delante de ti una puerta abierta, que nadie puede cerrar, porque tienes poca fuerza, y has guardado mi palabra, y no has negado mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». El griego funciona como llamado de atención; la traducción principal usa «Mira» por ser más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  - He conocido
  lexicon: BDAG
  rationale: οἶδα es perfecto en forma pero presente en sentido. «Conozco» comunica el valor presente y resulta natural en español, manteniendo la fórmula recurrente de Apocalipsis sin volverla mecánica.
- source_word: τὰ ἔργα
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus obras hechas
  - lo que haces
  - tus hechos
  lexicon: BDAG
  rationale: «Obras» conserva el plural concreto y la fórmula apocalíptica. «Tus» mantiene la segunda persona singular del griego.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  - He aquí
  lexicon: BDAG
  rationale: Es un marcador discursivo de atención. «Mira» reproduce bien la función de llamada inmediata en español contemporáneo; «He aquí» sería más tradicional pero menos natural.
- source_word: δέδωκα ἐνώπιόν σου θύραν ἠνεῳγμένην
  english_pob_choice: I have set before you an open door
  chosen_spanish: he puesto delante de ti una puerta abierta
  alternatives_spanish:
  - he colocado delante de ti una puerta abierta
  - te he puesto delante una puerta abierta
  - he abierto delante de ti una puerta
  lexicon: BDAG
  rationale: Aunque δέδωκα es literalmente «he dado», con θύραν ἐνώπιόν σου el sentido idiomático es que la puerta ha sido puesta delante de la persona. «He puesto delante de ti» conserva el perfectivo y evita una traducción torpe. «Puerta abierta» refleja de modo natural la imagen, sin perder que la participio indica el estado resultante de estar abierta.
- source_word: ἣν οὐδεὶς δύναται κλεῖσαι αὐτήν
  english_pob_choice: which no one is able to shut
  chosen_spanish: que nadie puede cerrar
  alternatives_spanish:
  - que nadie es capaz de cerrar
  - que nadie puede echar llave
  - que ninguno puede cerrar
  lexicon: BDAG
  rationale: δύναται expresa capacidad; «puede» es natural y fiel. Para θύρα, «cerrar» es el equivalente idiomático español más transparente. El pronombre relativo «que» evita rigidez y mantiene la relación con la puerta.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la declaración anterior. «Porque» es claro y directo en español.
- source_word: μικρὰν ἔχεις δύναμιν
  english_pob_choice: you have little strength
  chosen_spanish: tienes poca fuerza
  alternatives_spanish:
  - tienes poca fortaleza
  - tienes poca potencia
  - tienes poca capacidad
  lexicon: BDAG
  rationale: δύναμις puede ser «poder» o «fuerza». En este contexto pastoral, «fuerza» comunica mejor la limitada capacidad real sin introducir matices políticos de «poder».
- source_word: ἐτήρησάς μου τὸν λόγον
  english_pob_choice: you have kept my word
  chosen_spanish: has guardado mi palabra
  alternatives_spanish:
  - has guardado mi palabra fielmente
  - has obedecido mi palabra
  - has conservado mi palabra
  lexicon: BDAG
  rationale: τηρέω significa guardar, observar, conservar. «Guardar» mantiene la amplitud semántica y es un equivalente bíblico claro en español. «Palabra» traduce λόγος de manera sobria y fiel.
- source_word: οὐκ ἠρνήσω τὸ ὄνομά μου
  english_pob_choice: have not denied my name
  chosen_spanish: no has negado mi nombre
  alternatives_spanish:
  - no has repudiado mi nombre
  - no has renegado de mi nombre
  - no has negado mi Nombre
  lexicon: BDAG
  rationale: ἀρνέομαι es «negar, repudiar». «Negar mi nombre» conserva el paralelismo con el inglés POB y con el uso bíblico de «nombre» como representación de la persona y lealtad a ella.
theological_decisions:
- issue: Significado de la 'puerta abierta'
  english_pob_reading: Rendered literally as 'an open door' without specifying whether it refers to mission opportunity, access, protection, or entrance into the kingdom.
  chosen_spanish_reading: Traducida literalmente como «puerta abierta», sin precisar si alude a oportunidad de misión, acceso, protección o entrada al reino.
  alternative_spanish_readings:
  - oportunidad misionera
  - acceso a la salvación o al reino
  - oportunidad providencial
  rationale: La imagen es teológicamente rica pero no queda explicada de forma explícita dentro del versículo. La traducción debe preservar esa tensión en lugar de resolverla interpretativamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor aspectual de los tiempos perfectivos
  english_pob_reading: Used English present perfects ('I have set,' 'you have kept,' 'have not denied') to reflect completed action with present relevance.
  chosen_spanish_reading: Se usaron perfectos compuestos en español («he puesto», «has guardado», «no has negado») para reflejar acción cumplida con relevancia presente.
  alternative_spanish_readings:
  - pretérito simple («puse», «guardaste», «no negaste»)
  - presentes atemporales
  rationale: Los perfectos griegos y la relación causal del verso favorecen un español que conserve la acción ya realizada y todavía vigente. Los compuestos suenan naturales en este contexto y mantienen mejor el matiz de resultado presente.
  doctrine_reference: Translation philosophy §4 (Preserve aspect and ongoing significance where possible)
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que prefirió «an open door» sobre «an opened door» por naturalidad, manteniendo la fuerza del participio griego. En español, «puerta abierta» ya es la forma natural equivalente y conserva el estado resultante indicado por el participio ἠνεῳγμένην.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «Mesías/Cristo» según contexto, pero aquí no se usa ningún título cristológico.
  - «Guardar mi palabra» conserva el paralelismo con el audit trail inglés y evita explicitar obediencia donde el griego permite una gama más amplia.
  - «Negar mi nombre» preserva la fórmula bíblica estable sin convertir «nombre» en una paráfrasis de autoridad o reputación.
