id: 1SA.5.3
reference: 1 Samuel 5:3
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֤מוּ אַשְׁדּוֹדִים֙ מִֽ/מָּחֳרָ֔ת וְ/הִנֵּ֣ה דָג֗וֹן נֹפֵ֤ל לְ/פָנָי/ו֙ אַ֔רְצָ/ה לִ/פְנֵ֖י אֲר֣וֹן יְהוָ֑ה וַ/יִּקְחוּ֙ אֶת דָּג֔וֹן וַ/יָּשִׁ֥בוּ אֹת֖/וֹ לִ/מְקוֹמֽ/וֹ־׃
translation:
  text: When the Ashdodites rose early the next day, behold, Dagon had fallen facedown on the ground before the ark of Yahweh. So they took Dagon and put him back in his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early. 'Rose early' is natural modern English and preserves the temporal emphasis without sounding archaic.
- source_word: אַשְׁדּוֹדִים
  chosen: the Ashdodites
  alternatives:
  - the people of Ashdod
  - the men of Ashdod
  lexicon: HALOT
  rationale: The gentilic plural refers to inhabitants of Ashdod. 'Ashdodites' is concise and accurate; 'the people of Ashdod' is possible but less direct.
- source_word: מִמָּחֳרָת
  chosen: the next day
  alternatives:
  - on the morrow
  - the following day
  lexicon: HALOT
  rationale: This temporal expression means the following day. 'The next day' is idiomatic modern English and fits the translation philosophy better than the archaic 'on the morrow.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention to a surprising sight. 'Behold' preserves the narrative force and shock better than flatter alternatives.
- source_word: נֹפֵל
  chosen: had fallen
  alternatives:
  - was fallen
  - lay fallen
  lexicon: HALOT
  rationale: Although formally a participle, in context it describes the discovered state resulting from a prior action. English past perfect naturally conveys that Dagon was already down when they saw him.
- source_word: לְפָנָיו אַרְצָה
  chosen: facedown on the ground
  alternatives:
  - on its face to the ground
  - prostrate on the ground
  lexicon: HALOT
  rationale: The combination of 'before him/its face' with 'earthward' describes a face-down posture. 'Facedown on the ground' is vivid, natural, and preserves the humiliating image.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  chosen: before the ark of the LORD
  alternatives:
  - in front of the ark of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is straightforwardly spatial here. 'Before the ark of the LORD' is the standard and clearest rendering. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּקְחוּ אֶת־דָּגוֹן
  chosen: they took Dagon
  alternatives:
  - they picked up Dagon
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' 'They took Dagon' is sufficiently clear in context; English readers will infer lifting or handling.
- source_word: וַיָּשִׁבוּ אֹתוֹ לִמְקוֹמוֹ
  chosen: put him back in his place
  alternatives:
  - returned him to his place
  - set him back in his place
  lexicon: HALOT
  rationale: שׁוב in Hiphil means cause to return/put back. 'Put him back in his place' is idiomatic and captures the action of restoring the idol to its pedestal or customary position. 'Him' reflects the masculine pronominal suffix used for Dagon as a named deity/image.
