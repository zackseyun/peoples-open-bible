theological_decisions:
- issue: Opening sentence compressed in the OCR witness
  chosen_reading: The Lord gave me favor because I obeyed my father
  alternative_readings:
  - The Lord showed mercy to me in obedience to my father
  - The Lord was with me because of obedience to my father
  rationale: The surviving Greek segment 'μοι Κύριος ἐν ὑπακοῇ πατρός μου' is elliptical in the OCR layer. The chosen rendering supplies the minimal implied verb needed for coherent English while preserving the causal relation between divine favor and filial obedience.
- issue: Reference of 'two contrary passions'
  chosen_reading: sexual immorality and the love of money are the two passions in view
  alternative_readings:
  - a broader pair of unnamed vices is intended
  - the phrase generalizes beyond the two named vices
  rationale: The immediate context explicitly warns against πορνεία and φιλαργυρία, then explains their effects, and finally summarizes with 'for he is enslaved to two contrary passions.' The most natural reading is that the summary points back to those two named vices.
