translation:
  language: es
  text: La mano de Yahvé estuvo sobre Elías[a], y él se recogió la ropa a la cintura y corrió delante de Acab hasta la entrada de Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «la mano de Yahvé vino sobre Elías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. En español, «Yahvé» conserva el valor propio del Tetragrámaton y evita el reemplazo por una forma de máscara litúrgica.
- source_word: וְיַד יְהוָה הָיְתָה אֶל
  english_pob_choice: the hand of Yahweh was on
  chosen_spanish: la mano de Yahvé estuvo sobre
  alternatives_spanish:
  - la mano de Yahvé vino sobre
  - el poder de Yahvé estuvo sobre
  lexicon: HALOT
  rationale: La expresión hebrea se entiende como influencia o poder divino sobre Elías. «Estuvo sobre» mantiene la idiomaticidad sin añadir más de lo que el hebreo dice; «vino sobre» sería posible, pero el verbo hebreo es simplemente «estuvo/era».
- source_word: וַיְשַׁנֵּס
  english_pob_choice: he tucked up
  chosen_spanish: se recogió la ropa a la cintura
  alternatives_spanish:
  - se ciñó los lomos
  - se arremangó
  lexicon: HALOT
  rationale: El hebreo describe el gesto de alzar/asegurar la vestimenta para correr. En español, «se recogió la ropa a la cintura» comunica la acción con claridad natural y evita una frase demasiado arcaica sin perder el contenido corporal del gesto.
- source_word: מָתְנָיו
  english_pob_choice: his loins
  chosen_spanish: la cintura
  alternatives_spanish:
  - los lomos
  - la cintura de sus lomos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus lomos», en español «cintura» comunica mejor el punto del cuerpo implicado en la acción de recoger la ropa para correr. Se evita una literalidad poco natural sin borrar el trasfondo idiomático.
- source_word: וַיָּרָץ לִפְנֵי אַחְאָב
  english_pob_choice: ran ahead of Ahab
  chosen_spanish: corrió delante de Acab
  alternatives_spanish:
  - corrió delante de Ahab
  - corrió antes que Acab
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial del hebreo y es natural en español bíblico moderno. Se conserva el nombre «Acab» según la forma habitual en español para el rey.
- source_word: עַד בֹּאֲכָה יִזְרְעֶאלָה
  english_pob_choice: as far as the entrance to Jezreel
  chosen_spanish: hasta la entrada de Jezreel
  alternatives_spanish:
  - hasta llegar a Jezreel
  - hasta el acceso a Jezreel
  lexicon: HALOT
  rationale: La construcción apunta al punto de llegada o acceso a un lugar. «Entrada» refleja ese matiz y resulta más clara en español que una traducción demasiado literal de la construcción verbal.
theological_decisions:
- issue: Naturaleza de la acción de Yahvé sobre Elías
  english_pob_reading: The phrase is rendered as divine empowerment without specifying whether the effect was miraculous strength, prophetic urgency, or both.
  chosen_spanish_reading: La frase se vierte como empoderamiento divino sin precisar si fue fuerza milagrosa, urgencia profética o ambas.
  alternative_spanish_readings:
  - La mano de Yahvé vino sobre Elías
  - El poder de Yahvé se manifestó en Elías
  rationale: El hebreo usa un modismo de agencia divina, pero no define el modo exacto de la acción. La redacción española preserva esa tensión teológica en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica en vez de decidir más allá del texto.
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada del POB inglés que mantiene la expresión idiomática de la mano de Yahvé y la nota cultural sobre el gesto de recoger la ropa para correr, sin forzar una paráfrasis explicativa dentro del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, en coherencia con el criterio del proyecto.
  - Se usa «Acab» como forma española estable del nombre del rey.
  - «Entrada de Jezreel» conserva el matiz locativo sin sobreinterpretar el hebreo.
  - La nota al pie cubre la alternativa literal de la primera cláusula, como en el POB inglés.
