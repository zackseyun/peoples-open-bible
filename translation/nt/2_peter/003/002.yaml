theological_decisions:
- issue: Relation of 'your' in τῶν ἀποστόλων ὑμῶν
  chosen_reading: '''your'' modifies ''apostles'''
  alternative_readings:
  - '''the commandment given to you by the apostles'''
  rationale: The word order most naturally links ὑμῶν with ἀποστόλων. This yields the sense of the apostles recognized by or sent to the audience, without implying possession in a modern proprietary sense.
  doctrine_reference: Translation philosophy §3, §5
- issue: Syntactic relation of τοῦ κυρίου καὶ σωτῆρος
  chosen_reading: The commandment is from/belongs to the Lord and Savior, mediated through the apostles
  alternative_readings:
  - The apostles are characterized as belonging to the Lord and Savior
  rationale: 'The nearest and most coherent attachment is to ἐντολῆς. This preserves the chain: prophetic words and apostolic commandment, the latter sourced in the Lord and Savior.'
  doctrine_reference: Translation philosophy §1, §3
