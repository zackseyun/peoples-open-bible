id: JOS.22.22
reference: Joshua 22:22
source:
  edition: WLC
  text: אֵל֩ אֱלֹהִ֨ים יְהוָ֜ה אֵ֣ל אֱלֹהִ֤ים יְהוָה֙ ה֣וּא יֹדֵ֔עַ וְ/יִשְׂרָאֵ֖ל ה֣וּא יֵדָ֑ע אִם בְּ/מֶ֤רֶד וְ/אִם בְּ/מַ֨עַל֙ בַּֽ/יהוָ֔ה אַל תּוֹשִׁיעֵ֖/נוּ הַ/יּ֥וֹם הַ/זֶּֽה׀׀׀׀־־־׃
translation:
  text: 'The Mighty One[a], God, Yahweh! The Mighty One, God, Yahweh! He knows, and Israel itself will know: if it was in rebellion, or if in unfaithfulness against Yahweh[b], do not save us this day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the divine invocation twice: ''El, God, the LORD; El, God, the LORD,'' an emphatic oath-like appeal.'
    reason: cultural_note
  - marker: b
    text: Or 'if in trespass' / 'if in unfaithfulness' for 'in breach of faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל אֱלֹהִים יְהוָה
  chosen: The Mighty One, God, the LORD
  alternatives:
  - God of gods, the LORD
  - Mighty God, the LORD
  - God, God, the LORD
  lexicon: HALOT
  rationale: The sequence is an emphatic divine invocation repeated twice. אֵל is rendered 'The Mighty One' to preserve its force as a singular title rather than collapsing it into the following אֱלֹהִים. יְהוָה follows the project default as 'the LORD.'
- source_word: הוּא יֹדֵעַ
  chosen: He knows
  alternatives:
  - he is knowing
  lexicon: HALOT
  rationale: Straightforward Qal participial/verbal sense expressing present knowledge; idiomatic English is 'He knows.'
- source_word: וְיִשְׂרָאֵל הוּא יֵדָע
  chosen: and Israel itself will know
  alternatives:
  - and Israel, he will know
  - and Israel shall know
  lexicon: HALOT
  rationale: 'The pronoun הוּא adds emphasis; ''itself'' captures the emphatic force without awkwardness. The imperfect is naturally future here: Israel will come to know/recognize.'
- source_word: אִם בְּמֶרֶד
  chosen: if it was in rebellion
  alternatives:
  - if in rebellion
  - if by rebellion
  lexicon: HALOT
  rationale: מֶרֶד denotes rebellion or revolt. Supplying 'it was' makes the English conditional natural while preserving the elliptical Hebrew oath-like structure.
- source_word: וְאִם בְּמַעַל
  chosen: or if in breach of faith
  alternatives:
  - or if in trespass
  - or if in unfaithfulness
  lexicon: HALOT
  rationale: מַעַל often denotes an act of unfaithfulness or breach of trust, especially covenantal infidelity. 'Breach of faith' preserves that covenantal nuance better than the more generic 'trespass.'
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - in the LORD
  lexicon: HALOT
  rationale: Given the context of rebellion/unfaithfulness, the preposition is best rendered relationally/adversatively as 'against the LORD.' The divine name follows project default 'the LORD.'
- source_word: אַל תּוֹשִׁיעֵנוּ
  chosen: do not save us
  alternatives:
  - may you not save us
  - do not deliver us
  lexicon: HALOT
  rationale: A jussive-like negative appeal addressed to God. 'Save' is the most direct rendering of the Hiphil of ישׁע here; 'deliver' is possible but less transparent to the lexical root.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: '''This day'' preserves the solemn register of the Hebrew better than the more colloquial ''today.'''
