- from: Porque solo el sabio y el que se domina[a] es valiente, señor de las pasiones.
  to: Porque solo el sabio y dueño de sí mismo, el hombre[a], es valiente, dueño de las pasiones.
  rationale: Se restablece la decisión auditada sobre el masculino singular genérico mediante «el hombre» con nota, se da a σώφρων una expresión española natural y ética («dueño de sí mismo») y se aclara κύριος en sentido no divino con «dueño de las pasiones». La frase resultante es más fiel a la estructura y al razonamiento léxico-teológico del expediente.
