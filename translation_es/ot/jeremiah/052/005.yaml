translation:
  language: es
  text: Así, la ciudad estuvo bajo asedio[a] hasta el año undécimo del rey Sedequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la ciudad estaba en asedio» o «la ciudad entró en asedio». El modismo hebreo significa que la ciudad permaneció sitiada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: was under siege
  chosen_spanish: estuvo sitiada
  alternatives_spanish:
  - entró en sitio
  - estuvo en sitio
  - fue sitiada
  lexicon: HALOT
  rationale: 'El hebreo usa un verbo de movimiento con el sustantivo de sitio para expresar el estado resultante; en español, la forma más natural y fiel es un pasivo/resultativo: ''estuvo sitiada''. Evita un calco como ''entró en sitio'', que sería menos idiomático.'
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la ciudad amurallada
  lexicon: HALOT
  rationale: Se conserva el sustantivo genérico del hebreo sin sustituirlo por un nombre propio, aunque el referente histórico sea Jerusalén. 'La ciudad' mantiene la formulación del texto fuente.
- source_word: בַּמָּצוֹר
  english_pob_choice: under siege
  chosen_spanish: sitiada
  alternatives_spanish:
  - bajo sitio
  - en sitio
  - asediada
  lexicon: HALOT
  rationale: מָצוֹר designa el asedio o sitio militar. 'Sitiada' comunica bien el estado de bloqueo y es más natural en español que 'bajo sitio'; 'asediada' también sería posible, pero 'sitiada' reproduce mejor el lenguaje de sitio del texto.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - a
  lexicon: HALOT
  rationale: Marca límite temporal; 'hasta' es la equivalencia directa y natural en español.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: the eleventh year
  chosen_spanish: el año undécimo
  alternatives_spanish:
  - el undécimo año
  - año once
  lexicon: HALOT
  rationale: La construcción hebrea con 'año' funciona idiomáticamente como ordinal. 'El año undécimo' conserva la forma temporal del original y suena natural en español bíblico contemporáneo.
- source_word: לַמֶּלֶךְ
  english_pob_choice: of King
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey de
  - para el rey
  lexicon: HALOT
  rationale: En fórmulas de datación, ל indica relación posesiva/temporal. En español, 'del rey' expresa esa relación de manera clara y breve.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  - Zedequías
  lexicon: HALOT
  rationale: Se usa la transliteración bíblica habitual en español, 'Sedequías', coherente con el nombre personal estándar y reconocible para lectores de habla hispana.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'was under siege' frente a 'came under siege' por naturalidad y precisión de estado; la versión española sigue esa misma lectura resultativa con 'estuvo sitiada'.
  spanish_consistency_notes:
  - Se mantiene 'rey' sin mayúscula interna para un uso editorial normal en español.
  - No se sustituye 'Sedequías' por una forma más clásica menos común, para preservar legibilidad y consistencia con el uso bíblico hispano.
  - '''Sitiada'' se eligió en lugar de ''asediada'' para reflejar el campo semántico de מָצוֹר y la continuidad del estado descrito.'
