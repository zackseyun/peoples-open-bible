translation:
  language: es
  text: 'Habla a los hijos de Israel, diciendo: Si[a] una mujer concibe y da a luz a un varón[b], entonces será inmunda siete días[c]; será inmunda como en los días de su impureza menstrual.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando una mujer concibe». La partícula hebrea de caso puede verterse como «si» o «cuando» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «da a luz a un varón».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, una impureza ritual asociada con la menstruación.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la designación del pueblo del pacto con una forma directa y transparente en español. Aunque «los israelitas» es más fluido, «los hijos de Israel» refleja con mayor precisión la construcción hebrea y mantiene la decisión de género gramatical del texto fuente.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una hembra
  lexicon: HALOT
  rationale: En este contexto legal, el sentido genérico es «mujer». «Esposa» sería demasiado específico y «hembra» suena no idiomático en español bíblico contemporáneo.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula introduce una cláusula de caso legal. «Si» reproduce bien la condición normativa; «cuando» también es posible, pero aquí «si» expresa mejor la formulación jurídica.
- source_word: תַזְרִיעַ
  english_pob_choice: conceives
  chosen_spanish: concibe
  alternatives_spanish:
  - queda embarazada
  - produce semilla
  lexicon: HALOT
  rationale: El verbo tiene trasfondo de «sembrar/engendrar», pero en este contexto de parto el sentido natural es concepción. «Concibe» comunica el valor sin volverlo torpe.
- source_word: וְיָלְדָה זָכָר
  english_pob_choice: and gives birth to a male child
  chosen_spanish: y da a luz a un varón
  alternatives_spanish:
  - y da a luz a un hijo varón
  - y pare un varón
  lexicon: HALOT
  rationale: «Dar a luz» es la forma normal en español y conserva la referencia al sexo masculino de זָכָר. Se evita «hijo» porque el hebreo subraya principalmente el sexo del nacido.
- source_word: וְטָמְאָה
  english_pob_choice: then she shall be unclean
  chosen_spanish: entonces será inmunda
  alternatives_spanish:
  - entonces quedará inmunda
  - entonces será ritualmente inmunda
  lexicon: HALOT
  rationale: Se mantiene «inmunda» para reflejar el término de pureza ritual sin añadir de entrada una explicación interpretativa. «Será ritualmente inmunda» sería más explicativo, pero el hebreo simplemente afirma el estado de impureza.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - durante siete días
  lexicon: HALOT
  rationale: Corresponde de manera directa a la duración expresada en hebreo.
- source_word: כִּימֵי
  english_pob_choice: as in the days of
  chosen_spanish: como en los días de
  alternatives_spanish:
  - como durante los días de
  - igual que en los días de
  lexicon: HALOT
  rationale: La comparación se expresa de forma clara y natural en español. Se conserva la relación temporal-comparativa del hebreo.
- source_word: נִדַּת דְּוֺתָהּ
  english_pob_choice: her menstrual impurity
  chosen_spanish: su impureza menstrual
  alternatives_spanish:
  - su menstruación
  - la impureza de su menstruación
  lexicon: HALOT
  rationale: Se preserva la categoría ritual de «impureza» y el matiz menstrual del sustantivo. «Su impureza menstrual» mantiene la fuerza legal del hebreo mejor que una paráfrasis más libre.
- source_word: תִּטְמָא
  english_pob_choice: she shall be unclean
  chosen_spanish: será inmunda
  alternatives_spanish:
  - quedará inmunda
  - se contaminará
  lexicon: HALOT
  rationale: Se repite el mismo estado de impureza al final del versículo, como en el hebreo, para conservar el énfasis legal y la redundancia deliberada del original.
theological_decisions:
- issue: Naturaleza de טמא en legislación de pureza
  english_pob_reading: unclean
  chosen_spanish_reading: inmunda
  alternative_spanish_readings:
  - ritualmente inmunda
  - ceremonialmente inmunda
  rationale: El hebreo usa el lenguaje técnico de impureza sin añadir el adjetivo explicativo. En español, «inmunda» reproduce ese valor legal-ritual de manera sobria; el contexto determina que no se trata de suciedad moral.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderizado de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina plural del hebreo para no neutralizar el rasgo formal del texto fuente. Aunque el referente incluye al pueblo del pacto en su conjunto, la decisión prioriza la transparencia hacia la expresión original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y no hubo revisiones aplicadas en el pasaje base; la concordancia de revisión indica que el estado textual quedó sin cambios respecto del último pase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «inmunda» para reflejar el léxico de pureza ritual sin sobreexplicar en el cuerpo principal; la nota aclara el valor cultural-ritual.
  - «Los hijos de Israel» conserva la forma constructa hebrea y la decisión de género gramatical documentada en el audit trail.
  - Se evita traducir mecánicamente desde el inglés cuando el español natural exige una formulación distinta, por ejemplo «da a luz» en vez de una calca del inglés.
