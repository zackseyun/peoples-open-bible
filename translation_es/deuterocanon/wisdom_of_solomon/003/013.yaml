- from: Porque dichosa es la estéril[a], la inmaculada, que no conoció lecho[b] en transgresión; tendrá fruto en la visita de las almas[c].
  to: Porque dichosa es la estéril[a], la sin mancha, que no conoció lecho[b] en transgresión; tendrá fruto en la visitación de las almas[c].
  rationale: Se ajusta ἀμίαντος a «sin mancha» para evitar la sobrecarga mariológica de «inmaculada» y se cambia «visita» por «visitación» para reflejar mejor el registro bíblico y la ambigüedad de ἐπισκοπή. Se mantiene el resto del texto, que es fiel al griego y al razonamiento del POB inglés.
