translation:
  language: es
  text: Y Yahvé Dios tomó al hombre y lo puso en el huerto de Edén[a][b] para que lo trabajara y lo guardara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo puso allí para cultivarlo y guardarlo’. Los verbos hebreos pueden llevar los sentidos de ‘trabajar/cultivar’ y ‘guardar/proteger/velar’.
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido ‘lo puso’ también puede significar ‘lo hizo reposar’ o ‘lo asentó’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El tetragrámaton se transcribe en el texto español como ‘Yahvé’ para preservar el nombre divino propio, siguiendo la política del proyecto y evitando la sustitución por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En la secuencia יְהוָה אֱלֹהִים, ‘Dios’ comunica con naturalidad el título genérico divino junto al nombre propio ‘Yahvé’.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la humanidad
  lexicon: HALOT
  rationale: El referente es el individuo ya formado y colocado, no la humanidad en general; por eso ‘el hombre’ refleja mejor el contexto específico.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recibió
  lexicon: HALOT
  rationale: El verbo en este contexto narrativo significa simplemente ‘tomó’; ‘tomó’ es natural en español y no añade matices no requeridos por el hebreo.
- source_word: וַיַּנִּחֵהוּ
  english_pob_choice: placed him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo asentó
  - lo hizo reposar
  lexicon: HALOT
  rationale: La Hifil de נוח puede significar ‘hacer reposar’ o ‘poner/colocar’. En el movimiento hacia el huerto, ‘lo puso’ es la opción más natural y mantiene abierta la posible resonancia de descanso sin forzarla.
- source_word: בְּגַן עֵדֶן
  english_pob_choice: in the garden of Eden
  chosen_spanish: en el huerto de Edén
  alternatives_spanish:
  - en el jardín de Edén
  lexicon: HALOT
  rationale: ‘Huerto’ comunica mejor en español el espacio cultivado del relato y conserva la referencia propia a Edén; ‘jardín’ sería posible, pero ‘huerto’ evita una imagen demasiado ornamental.
- source_word: לְעָבְדָהּ
  english_pob_choice: to work it
  chosen_spanish: para que lo trabajara
  alternatives_spanish:
  - para cultivarlo
  - para servirlo
  - para labrarlo
  lexicon: HALOT
  rationale: עבד puede significar ‘trabajar’, ‘cultivar’ o ‘servir’. Como el objeto es el huerto, ‘trabajar’ conserva amplitud sin reducirlo solo a agricultura; se expresa en subjuntivo final para una traducción fluida en español.
- source_word: וּלְשָׁמְרָהּ
  english_pob_choice: and to keep it
  chosen_spanish: y lo guardara
  alternatives_spanish:
  - y lo cuidara
  - y velara por él
  - y lo protegiera
  lexicon: HALOT
  rationale: שמר abarca ‘guardar’, ‘vigilar’ y ‘proteger’. ‘Guardar’ mantiene esa amplitud; en español, ‘lo guardara’ resulta natural y conserva el paralelo con ‘trabajara’.
theological_decisions:
- issue: Posible matiz de descanso en וַיַּנִּחֵהוּ
  english_pob_reading: The verb rendered 'placed him' can also mean 'caused him to rest' or 'settled him.'
  chosen_spanish_reading: ‘Lo puso’ es la lectura principal; la posible resonancia de ‘hacerlo reposar/establecerlo’ queda implícita sin decidirla en el texto principal.
  alternative_spanish_readings:
  - lo hizo reposar
  - lo asentó
  - lo estableció
  rationale: La escena describe una colocación en el huerto. Traducir de forma explícita ‘reposar’ impondría un matiz secundario que el contexto inmediato no exige; sin embargo, la nota mantiene la tensión semántica documentada por el audit trail.
  doctrine_reference: Preservar la tensión léxica sin resolverla artificialmente.
- issue: Alcance de ‘trabajar’ y ‘guardar’ en el huerto
  english_pob_reading: The verse describes the man's vocation in the garden as working and keeping it, without importing later theological categories.
  chosen_spanish_reading: El texto principal habla de trabajar y guardar el huerto, sin convertir esos verbos en categorías teológicas posteriores.
  alternative_spanish_readings:
  - cultivarlo y custodiarlo
  - servirlo y vigilarlo
  rationale: El hebreo admite tanto sentidos agrícolas como de custodia. La traducción principal conserva esa amplitud y evita cerrar el pasaje como si exigiera de entrada una lectura sacerdotal o exclusivamente agrícola.
  doctrine_reference: Preservar la tensión teológica y lexical tal como la permite el texto.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la versión española mantiene la misma solución de equivalencia óptima, preservando las alternativas léxicas documentadas en notas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se mantiene ‘Dios’ para אֱלֹהִים en la combinación fija con el nombre divino.
  - ‘Huerto’ se emplea para בְּגַן como equivalente natural y digno en español.
  - ‘Trabajara’ y ‘guardara’ reflejan el valor final-infinitivo de לְ + verbo en español fluido, sin perder la amplitud semántica.
  - Las notas a y b corresponden a alternativas léxicas reales del hebreo y no a paráfrasis libres.
