translation:
  language: es
  text: Y se reunieron conmigo todos los que alguna vez fueron conmovidos por la palabra de Yahvé[a], el Dios de Israel, mientras yo estaba de duelo por la transgresión, y me senté afligido hasta el sacrificio de la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente “la palabra del Señor de Israel”. La traducción sigue el sentido probable, apoyado por el contexto paralelo, de “Yahvé, el Dios de Israel”.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se juntaron
  alternatives_spanish:
  - se reunieron
  - se congregaron
  lexicon: LSJ
  rationale: El verbo pasivo/deponente expresa que fueron atraídos a reunirse con Esdras. 'Se juntaron' conserva el movimiento colectivo de forma natural en español sin añadir matices eclesiásticos no presentes en el griego.
- source_word: ἐπεκινοῦντο
  english_pob_choice: were stirred
  chosen_spanish: fueron movidos
  alternatives_spanish:
  - fueron despertados
  - fueron impulsados
  lexicon: LSJ
  rationale: El sentido es una incitación interior o un ser conmovidos por la palabra divina. 'Fueron movidos' mantiene la fuerza receptiva y evita una paráfrasis psicológica excesiva.
- source_word: τῷ ῥήματι Κυρίου τοῦ Ἰσραήλ
  english_pob_choice: by the word of the Lord, the God of Israel
  chosen_spanish: por la palabra de Yahvé, el Dios de Israel
  alternatives_spanish:
  - por la palabra del Señor, el Dios de Israel
  - por la palabra de Yahvé de Israel
  lexicon: LSJ
  rationale: El texto griego transmite literalmente 'la palabra del Señor de Israel', pero el contexto bíblico y el propio aparato inglés entienden que el referente es el Dios de Israel. En español se mantiene 'Yahvé' según la terminología del proyecto, y se explicita 'el Dios de Israel' para preservar el sentido probable sin borrar la tensión textual.
- source_word: πενθοῦντος
  english_pob_choice: while I was mourning
  chosen_spanish: mientras yo estaba de duelo
  alternatives_spanish:
  - mientras yo lloraba
  - cuando yo estaba en duelo
  lexicon: LSJ
  rationale: El genitivo absoluto indica acción simultánea. 'Estaba de duelo' comunica bien el estado de luto o aflicción y evita sonar demasiado literal o ceremonioso.
- source_word: ἀνομίᾳ
  english_pob_choice: lawlessness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la anarquía
  - la iniquidad
  - la injusticia
  lexicon: LSJ
  rationale: Aunque ἀνομία tiene el matiz de falta de ley, en este contexto de confesión del pecado resulta natural y fiel traducirlo como 'maldad'. Se evita 'iniquidad' por ser más tradicional pero menos transparente para el español actual.
- source_word: ἐκαθήμην περίλυπος
  english_pob_choice: I sat grieved
  chosen_spanish: me senté afligido
  alternatives_spanish:
  - me quedé afligido
  - permanecí afligido sentado
  lexicon: LSJ
  rationale: La combinación expresa postura sentada y estado emocional continuo. 'Me senté afligido' preserva ambas dimensiones con español fluido y digno.
- source_word: δειλινῆς θυσίας
  english_pob_choice: the evening sacrifice
  chosen_spanish: el sacrificio de la tarde
  alternatives_spanish:
  - el sacrificio vespertino
  - la ofrenda de la tarde
  lexicon: LSJ
  rationale: '''Sacrificio de la tarde'' es claro en español y mantiene la referencia cultual regular. Se evita ''ofrenda'' porque el griego usa θυσία, con fuerza de sacrificio.'
theological_decisions:
- issue: Título divino Κυρίου τοῦ Ἰσραήλ
  english_pob_reading: the Lord, the God of Israel
  chosen_spanish_reading: Yahvé, el Dios de Israel
  alternative_spanish_readings:
  - el Señor, el Dios de Israel
  - Yahvé de Israel
  rationale: El griego es comprimido y podría leerse de manera más literal como 'el Señor de Israel', pero el contexto paralelo apoya entenderlo como el Dios de Israel. El texto principal usa 'Yahvé' conforme a las normas del proyecto, mientras la nota preserva la alternativa más literal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé / Lord; source-priority with parallel witness'
- issue: ἀνομία como pecado comunitario
  english_pob_reading: lawlessness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - iniquidad
  - transgresión
  - falta de ley
  rationale: En este pasaje la palabra describe la culpa colectiva ante Dios, no una reflexión jurídica abstracta. 'Maldad' mantiene el peso moral sin introducir un tecnicismo menos natural en español.
  doctrine_reference: Lexical force of ἀνομία in confessional contexts
translation_notes:
  revision_awareness: 'Se siguió de cerca el audio-trail inglés: se conservó la ambigüedad del sintagma divino mediante una nota, pero en el texto español se prefirió la terminología del proyecto (''Yahvé'') y una formulación natural. No se introdujeron ampliaciones doctrinales fuera del apoyo del paralelo hebreo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en el texto principal conforme al estándar del proyecto, no como máscara tipográfica sino como elección terminológica.
  - '''Sacrificio de la tarde'' mantiene θυσία sin sustituirlo por una palabra más general; conserva la referencia cultual regular.'
  - '''Me senté afligido'' procura reflejar tanto la postura como el estado emocional expresado por περίλυπος.'
  - Se evitó 'iniquidad' para ἀνομία porque en español actual puede sonar heredado y menos transparente que 'maldad'.
