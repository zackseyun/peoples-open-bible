translation:
  language: es
  text: ¿Qué quieren decir al aplastar a mi pueblo y moler los rostros de los pobres?[a] declara el Señor Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «moler el rostro de los pobres». La imagen hebrea es una metáfora vívida de opresión despiadada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מ/ל/כם
  english_pob_choice: What do you mean by
  chosen_spanish: ¿Qué quieren decir con
  alternatives_spanish:
  - ¿Por qué
  - ¿Qué es para ustedes que
  lexicon: HALOT
  rationale: El hebreo es un giro idiomático de reprensión; en español, «¿Qué quieren decir con...?» transmite la censura directa sin volverlo una paráfrasis excesiva.
- source_word: תְּדַכְּא֣וּ
  english_pob_choice: crushing
  chosen_spanish: aplastar
  alternatives_spanish:
  - oprimir
  - destrozar
  lexicon: HALOT
  rationale: El verbo comunica violencia concreta. «Aplastar» conserva mejor la imagen física que una abstracción como «oprimir».
- source_word: עַמִּ֔/י
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: La posesión divina y el sentido pactual se preservan de forma directa con «mi pueblo».
- source_word: וּ/פְנֵ֥י
  english_pob_choice: and ... the faces of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - los rostros de
  - la cara de
  lexicon: HALOT
  rationale: En español, el singular «rostro» resulta más natural y fiel al valor idiomático de פנים en este contexto metafórico.
- source_word: עֲנִיִּ֖ים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los afligidos
  - los necesitados
  lexicon: HALOT
  rationale: En este contexto social de abuso, «los pobres» comunica con claridad el grupo oprimido al que alude el hebreo.
- source_word: תִּטְחָ֑נוּ
  english_pob_choice: grinding
  chosen_spanish: moler
  alternatives_spanish:
  - triturar
  - pulverizar
  lexicon: HALOT
  rationale: El verbo literal es «moler»; mantenerlo preserva la metáfora vívida de violencia y humillación.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: HALOT
  rationale: «Declara» funciona bien como fórmula profética en español moderno y conserva el tono formal del oráculo.
- source_word: אֲדֹנָ֥/י יְהוִ֖ה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, Dios
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor, Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene «Yahvé» para el nombre divino conforme a la norma del proyecto, y «Dios» para אֲדֹנָי en la combinación titular.
- source_word: צְבָאֽוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» es una forma clara y reverente en español para el título divino צְבָאוֹת.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה en la fórmula profética final
  english_pob_reading: the Lord GOD of hosts
  chosen_spanish_reading: Yahvé, Dios de los ejércitos
  alternative_spanish_readings:
  - el Señor, Dios de los ejércitos
  - Yahvé de los ejércitos
  rationale: La política del proyecto pide «Yahvé» para יהוה; en esta combinación, el orden natural en español conserva el título compuesto sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la traducción ya no contiene marcadores de nota no anclados. Se ajustó además la formulación final para reflejar el nombre divino como Yahvé, conforme a la directriz del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo el tono profético de reprensión con una pregunta directa.
  - Se evitó «SEÑOR» como máscara del nombre divino.
  - La metáfora de violencia física se preservó con verbos concretos («aplastar», «moler»).
  - «Mi pueblo» conserva la relación pactual del hebreo.
  - «Dios de los ejércitos» expresa el título final de modo natural y reverente en español.
