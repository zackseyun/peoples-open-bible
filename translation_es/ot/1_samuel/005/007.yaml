translation:
  language: es
  text: 'Cuando los hombres de Asdod vieron que así era, dijeron: «El arca del Dios de Israel no debe permanecer[a] con nosotros, porque su mano es pesada[b] contra nosotros y contra Dagón, nuestro dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no debe quedarse con nosotros». El verbo hebreo puede significar «sentarse», «habitar» o «permanecer».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su mano es pesada contra nosotros», un modismo para una fuerte presión o juicio divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vieron
  alternatives_spanish:
  - Y ... vieron
  - Entonces ... vieron
  lexicon: HALOT
  rationale: La secuencia verbal hebrea avanza la narración; en español, 'Cuando' reproduce con naturalidad la relación temporal y mantiene el flujo del relato sin perder la consecutividad.
- source_word: אַנְשֵׁי אַשְׁדּוֹד
  english_pob_choice: the men of Ashdod
  chosen_spanish: los hombres de Asdod
  alternatives_spanish:
  - los habitantes de Asdod
  - la gente de Asdod
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente 'hombres de'. Se conserva el masculino plural por fidelidad léxica y porque el referente narrativo puede ser representativo o cívico, no una neutralización obligatoria.
- source_word: כִּי כֵן
  english_pob_choice: that it was so
  chosen_spanish: que así era
  alternatives_spanish:
  - que era así
  - que eso era así
  - que esta era la situación
  lexicon: HALOT
  rationale: La expresión remite a la situación observada en el contexto previo. 'Que así era' es natural en español y conserva el carácter demostrativo sin sobreexplicarlo.
- source_word: לֹא יֵשֵׁב
  english_pob_choice: must not remain
  chosen_spanish: no debe permanecer
  alternatives_spanish:
  - no debe quedarse
  - no debe estar
  - no debe habitar
  lexicon: HALOT
  rationale: יַשַׁב puede significar 'sentarse, habitar, permanecer'. Con el arca como sujeto, 'permanecer' preserva la idea de continuidad de presencia; 'no debe' refleja la fuerza exhortativa/declarativa de los hablantes.
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the ark of the God of Israel
  chosen_spanish: el arca del Dios de Israel
  alternatives_spanish:
  - el arca del Dios de Israel
  - el arca del Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación formal del objeto sagrado y la relación de pertenencia ('de Israel'), preservando el contraste con 'Dagón, nuestro dios' al final del versículo.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona plural se traduce de manera directa. 'Con nosotros' es la forma más natural y precisa en este contexto.
- source_word: קָשְׁתָה יָדוֹ
  english_pob_choice: his hand is heavy
  chosen_spanish: su mano pesa duramente
  alternatives_spanish:
  - su mano pesa sobre nosotros
  - su mano es pesada
  - su mano aprieta con dureza
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora antropomórfica de la 'mano' divina como presión/juzgamiento. 'Pesa duramente' mantiene la imagen de peso y añade la fuerza adversativa sin borrar el tropo.
- source_word: עָלֵינוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - en contra de nosotros
  lexicon: HALOT
  rationale: En un contexto de juicio, 'contra nosotros' expresa mejor la hostilidad del impacto que un más literal 'sobre nosotros'.
- source_word: וְעַל דָּגוֹן אֱלֹהֵינוּ
  english_pob_choice: and against Dagon our god
  chosen_spanish: y contra Dagón, nuestro dios
  alternatives_spanish:
  - y contra nuestro dios Dagón
  - y sobre Dagón, nuestro dios
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'contra nosotros' y la perspectiva filistea 'nuestro dios', sin introducir una glosa polémica como 'ídolo' que el hebreo no emplea.
theological_decisions:
- issue: La metáfora de la 'mano' divina como juicio
  english_pob_reading: his hand is heavy against us
  chosen_spanish_reading: su mano pesa duramente contra nosotros
  alternative_spanish_readings:
  - su mano es pesada contra nosotros
  - su mano aprieta con dureza contra nosotros
  - su mano pesa contra nosotros
  rationale: Se mantiene la imagen corporal del texto hebreo para no diluir la agencia divina ni sustituir la metáfora por una explicación. La adición de 'duramente' intensifica el efecto adversativo sin reinterpretarlo.
  doctrine_reference: Translation philosophy §3, §6
- issue: Mantenimiento de la voz de los filisteos al llamar a Dagón 'nuestro dios'
  english_pob_reading: and against Dagon our god
  chosen_spanish_reading: y contra Dagón, nuestro dios
  alternative_spanish_readings:
  - y contra Dagón, nuestro dios
  - y contra Dagón, su dios
  rationale: Se conserva la autoidentificación de los hablantes y su manera de referirse a Dagón. No se introduce 'ídolo' o una corrección doctrinal en el texto principal, porque el hebreo presenta esa afirmación como discurso de los filisteos.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés POB, que prefirió ''it was so'' por sobre ''this was so'' para mayor naturalidad. Aquí se refleja esa misma elección con ''que así era'', manteniendo la relación temporal y el sentido observacional. También se preservan las decisiones estables del audit trail: ''remain'' como ''permanecer'', la metáfora de la mano pesada y la referencia a Dagón como ''nuestro dios''.'
  spanish_consistency_notes:
  - Se usa 'Asdod' como forma española habitual del topónimo.
  - '''Dagón'' conserva la acentuación española para el nombre propio.'
  - '''Arca'' se mantiene en minúscula por tratarse del sustantivo común dentro de la oración.'
  - La puntuación reproduce el discurso directo con comillas angulares, adecuada para edición bíblica en español.
  - Se preserva la metáfora de la mano sin convertirla en paráfrasis explicativa.
