translation:
  language: es
  text: Así, todos los días de Mahalalel fueron ochocientos noventa y cinco años, y murió.
  philosophy: formal
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En la fórmula genealógica resumida, el verbo expresa el total de la vida transcurrida. «Fueron» conserva la estructura simple y el valor de suma total sin introducir matices innecesarios.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - la totalidad de los días de
  - toda la vida de
  lexicon: HALOT
  rationale: Se mantiene la fórmula hebrea de manera transparente. «Todos los días de» reproduce el giro genealógico con claridad en español y conserva la repetición característica del texto.
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  lexicon: transliteración onomástica
  rationale: Se conserva el nombre propio en transliteración estándar, como marca identificatoria del linaje.
- source_word: חָמֵשׁ וְתִשְׁעִים שָׁנָה וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  english_pob_choice: eight hundred and ninety-five years
  chosen_spanish: ochocientos noventa y cinco años
  alternatives_spanish:
  - ochocientos y noventa y cinco años
  - noventa y cinco años y ochocientos años
  lexicon: HALOT
  rationale: El hebreo presenta primero la unidad y luego la centena; en español se ordena naturalmente como número compuesto, sin alterar el valor. Se evita repetir «años» para no cargar la frase, siguiendo el equivalente idiomático de la POB inglesa.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - entonces murió
  - y falleció
  lexicon: HALOT
  rationale: Se conserva la fórmula solemne de cierre de Génesis 5. «Murió» refleja con sobriedad el final biográfico sin suavizar el verbo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la forma del número para mayor naturalidad («eight hundred and ninety-five years») sin cambiar el sentido. En español se siguió la misma decisión de naturalidad formal, ordenando el número de manera idiomática y manteniendo la fórmula genealógica íntegra.
  spanish_consistency_notes:
  - Se usa pretérito simple en toda la oración para reflejar la secuencia narrativa hebrea.
  - No se añade artículo antes de «Mahalalel» para conservar el estilo genealógico conciso.
  - Se mantiene la clausula final con «y murió» como fórmula recurrente en Génesis 5.
