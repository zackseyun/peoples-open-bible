translation:
  language: es
  text: Entonces el sacerdote ofrecerá el holocausto y la ofrenda de cereal sobre el altar[a], y el sacerdote hará expiación por él, y quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘y quedará purificado’. El hebreo expresa más literalmente el estado resultante: ‘y quedará limpio’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלָה
  english_pob_choice: shall offer up
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará subir
  - presentará
  lexicon: HALOT
  rationale: En el contexto sacrificial, el hiphil de עלה no es solo ‘subir’, sino realizar la acción cultual de presentar la ofrenda. En español, ‘ofrecerá’ comunica bien el acto ritual sin sonar forzado.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda totalmente quemada
  lexicon: HALOT
  rationale: ‘Holocausto’ es el equivalente bíblico tradicional en español para la ofrenda completamente consumida por fuego. Mantiene la referencia sacrificial específica del hebreo.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la oblación de cereal
  lexicon: HALOT
  rationale: Para Leviticus, מִנְחָה designa aquí una ofrenda ritual concreta ligada al cereal; ‘ofrenda de cereal’ conserva ese valor técnico de forma clara y entendible en español.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: El sufijo direccional con מזבח indica colocación hacia/sobre el altar. ‘Sobre el altar’ reproduce bien la relación espacial y el uso ritual.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: shall make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará propiciación por él
  - realizará expiación en favor de él
  lexicon: HALOT
  rationale: ‘Hacer expiación’ es la formulación técnica más cercana al verbo כפר y preserva la tensión teológica del rito sin sustituirla por una explicación interpretativa.
- source_word: וְטָהֵר
  english_pob_choice: and he shall be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y será limpio
  - y será purificado
  lexicon: HALOT
  rationale: El hebreo expresa el estado resultante. ‘Quedará limpio’ comunica el resultado de la acción sacrificial y evita convertir el verbo en una explicación procesual.
theological_decisions:
- issue: Naturaleza de la limpieza ritual final
  english_pob_reading: ritual cleanness
  chosen_spanish_reading: limpieza ritual
  alternative_spanish_readings:
  - pureza moral
  - purificación interior
  rationale: En Levítico 14 el marco es la restauración cultual tras la impureza ritual, no una declaración principal sobre moralidad. ‘Limpio’ y ‘limpieza ritual’ preservan esa categoría bíblica sin sobreexplicar el texto.
  doctrine_reference: La traducción debe respetar el sentido ceremonial del pasaje y no desplazarlo hacia categorías morales ajenas al contexto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y confirma las decisiones estables del pasaje: ofrenda cultual, expiación y estado final de limpieza ritual. No se requiere revisión adicional respecto al acuerdo alto señalado en el informe.'
  spanish_consistency_notes:
  - Se mantuvo la terminología sacrificial técnica con equivalentes naturales en español.
  - ‘Holocausto’ se usó como término bíblico establecido para הָעֹלָה.
  - La nota al pie preserva la alternativa ‘purificado’ sin desplazar la lectura principal de ‘limpio’.
  - Se evitó la mayúscula devocional en ‘altar’ porque el hebreo no requiere ese tratamiento en español.
  - La sintaxis conserva el encadenamiento ritual del original sin añadir elementos explicativos.
