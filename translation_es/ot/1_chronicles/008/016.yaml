  - los descendientes de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְּנֵי expresa filiación masculina; «los hijos de» conserva la precisión del registro genealógico sin forzar una generalización como «descendientes».
- source_word: בְרִיעָה
