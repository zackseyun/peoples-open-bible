review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: los pecados devastan las casas de los pecadores y los pecadores perecen en el día del juicio. También conserva correctamente el valor de εἰς τὸν αἰῶνα como modificador de «perecerán». Sin embargo, hay un problema de alineación con la política terminológica del proyecto en «del Señor» para Κυρίου, ya que no hay una justificación suficientemente fuerte para apartarse del valor por defecto «Yahvé».'
  spanish_quality_summary: El español es claro, natural y digno. «Asolarán», «casas», «pecadores» y «perecerán» funcionan bien. La colocación de «para siempre» al final mantiene la relación con «perecerán», aunque sigue siendo algo ambigua; aun así es aceptable. El principal ajuste necesario es terminológico, no estilístico.
  glossary_alignment: Hay buena correspondencia con las decisiones léxicas del POB salvo en Κυρίου. El borrador defiende «Señor» por tratarse de griego κύριος, pero las directrices del proyecto piden «Yahvé» en el texto principal y solo admitir excepciones bien documentadas. Aquí no consta una carve-out litúrgica ni una razón contextual suficiente para mantener «Señor».
  issues:
  - severity: medium
    issue: Uso de «del Señor» en lugar de «de Yahvé» para Κυρίου
    rationale: Las directrices del proyecto establecen «Yahvé» como valor por defecto en el texto principal. La explicación dada en el borrador no basta para justificar la excepción, y nada en el expediente auditado exige conservar «Señor» aquí.
  - severity: low
    issue: Orden de marcadores de notas [a][b] no refleja el expediente inglés
    rationale: 'En el inglés auditado las notas aparecen en orden invertido por motivos heredados, pero en español conviene que el anclaje siga el lugar real: la nota léxica sobre «asolarán» debe ir con esa palabra y la de «para siempre» con esa frase. Esto mejora coherencia interna del registro español.'
  revised_spanish_text: Porque los pecados asolarán[a] las casas de los pecadores, y los pecadores perecerán en el día del juicio de Yahvé para siempre[b].
  revised_footnotes:
