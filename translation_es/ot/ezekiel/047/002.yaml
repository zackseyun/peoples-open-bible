    text: O «el agua borboteaba» o «el agua fluía»; el verbo hebreo sugiere un flujo pequeño que emerge, no una corriente grande.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde el hombro derecho»; aquí «hombro» se refiere al lado o flanco de la estructura.
    reason: lexical_alternative
  revision_rationale: Se corrigen las notas para que correspondan a las mismas decisiones léxicas documentadas en el POB inglés, y se anclan en las palabras correctas del texto español. También se ajusta la redacción para mejorar la naturalidad en español y reflejar mejor el sentido de un flujo pequeño emergente en מְפַכִּים.
