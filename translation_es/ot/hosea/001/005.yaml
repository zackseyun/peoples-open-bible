translation:
  language: es
  text: Y en aquel día romperé el arco de Israel en el valle de Jezreel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quebraré el arco de Israel'; el 'arco' representa la fuerza militar de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula profética introduce un hecho futuro. En español, una simple conjunción inicial mantiene el enlace narrativo y la proyección temporal sin forzar una construcción artificial como 'y sucederá que'.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión fija profética se conserva con una formulación natural en español. 'Aquel' mantiene mejor la distancia/formulación solemne del hebreo que 'ese'.
- source_word: וְשָׁבַרְתִּי
  english_pob_choice: I will break
  chosen_spanish: romperé
  alternatives_spanish:
  - quebraré
  - destrozaré
  lexicon: HALOT
  rationale: '''Romperé'' reproduce directamente el verbo y conserva el paralelismo con el objeto concreto. ''Destrozaré'' añade intensidad no exigida por el hebreo; ''quebraré'' es posible, pero menos natural aquí.'
- source_word: קֶשֶׁת יִשְׂרָאֵל
  english_pob_choice: the bow of Israel
  chosen_spanish: el arco de Israel
  alternatives_spanish:
  - el arco de Israel
  - el arco militar de Israel
  - la fuerza militar de Israel
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta del arma como en el hebreo y en la POB inglesa. 'Arco' es el equivalente natural en español; la lectura metonímica de poder militar queda sugerida sin explicitarse en el texto principal.
- source_word: בְּעֵמֶק
  english_pob_choice: in the Valley of
  chosen_spanish: en el valle de
  alternatives_spanish:
  - en el Valle de
  - en la hondonada de
  lexicon: HALOT
  rationale: '''Valle'' corresponde al sustantivo hebreo y funciona con naturalidad en español. No se requiere mayúscula obligatoria en el texto corrido; la forma común es suficiente.'
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del topónimo, como en la POB inglesa. 'Yizreel' sería más cercano al hebreo, pero 'Jezreel' es la forma asentada y legible para lectores bíblicos en español.
theological_decisions:
- issue: Si traducir el 'arco' literalmente o explicitar su sentido militar
  english_pob_reading: Retain the literal image 'the bow of Israel' in the main text
  chosen_spanish_reading: Conservar la imagen literal 'el arco de Israel' en el texto principal
  alternative_spanish_readings:
  - la fuerza militar de Israel
  - el poder bélico de Israel
  rationale: El hebreo usa una imagen concreta que funciona metonímicamente para la capacidad militar. Mantenerla evita interpretar de más y preserva la fuerza profética; el sentido militar queda disponible para el lector sin ser impuesto en la línea principal.
  doctrine_reference: 'Principio de equivalencia óptima: conservar la imagen del texto fuente cuando la metáfora es clara y no exige paráfrasis.'
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia y sin cambios recientes; no se requieren ajustes de revisión aparte de la adaptación natural al español.
  spanish_consistency_notes:
  - Se usa 'Jezreel' como topónimo transliterado de forma estándar.
  - Se mantiene el futuro simple ('romperé') para reflejar el anuncio profético.
  - Se preserva la imagen concreta del arma para no diluir la metáfora metonímica.
