review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: preparación para el combate, fuerza, derrota de los enemigos y su colocación debajo del salmista. Sin embargo, «a los que se levantan contra mí» está en presente y no preserva bien el valor participial contextual de enemigos que se alzaron/levantaron contra él en el marco narrativo del salmo. Además, «hiciste caer debajo de mí» suena algo rígido en español y puede mejorarse sin perder la imagen de sometimiento.'
  spanish_quality_summary: El español es en general claro y digno. «Me ceñiste de fuerza» es una opción válida y bastante natural en registro bíblico moderno. La principal mejora estilística es reemplazar «hiciste caer debajo de mí a los que se levantan contra mí» por una formulación más fluida y más fiel al aspecto contextual, evitando el presente «se levantan».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. Las decisiones «fuerza» para חַיִל y «batalla» para לַמִּלְחָמָה están bien alineadas. La excepción relevante es verbal/aspectual: conviene «los que se levantaron contra mí» para conservar mejor la referencia hostil contextual.'
  issues:
  - severity: medium
    issue: Uso de presente en «los que se levantan contra mí»
    rationale: Aunque el hebreo tiene un participio, en este contexto poético-narrativo español suena más natural y fiel expresar a los opositores como quienes se levantaron contra el salmista, no como una acción habitual o presente.
  - severity: medium
    issue: «Hiciste caer debajo de mí» resulta algo forzado
    rationale: La combinación transmite la idea, pero en español suena menos idiomática que «pusiste debajo de mí» o «derribaste debajo de mí». Conviene una redacción que conserve tanto la causatividad de תַּכְרִיעַ como la metáfora espacial de תַּחְתָּי.
  revised_spanish_text: Me ceñiste de fuerza para la batalla; pusiste debajo de mí a los que se levantaron contra mí.
  revision_rationale: Se mantiene la imagen hebrea de ceñir con fuerza y la metáfora espacial de sometimiento, pero se corrige el presente «se levantan» a «se levantaron» para una referencia contextual más natural en español, y se mejora la fluidez de la segunda cláusula con «pusiste debajo de mí», que expresa bien la derrota y subordinación sin la rigidez de «hiciste caer debajo de mí».
