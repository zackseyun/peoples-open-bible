translation:
  language: es
  text: Bienaventurados[a] somos, Israel[b], porque conocemos lo que agrada a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichosos» o «felices»; el griego comunica más plenamente un estado de bendición o favor que una simple emoción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cosas agradables a Dios nos son conocidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοί
  english_pob_choice: blessed
  chosen_spanish: dichosos
  alternatives_spanish:
  - bienaventurados
  - benditos
  - felices
  lexicon: BDAG
  rationale: En español, «dichosos» comunica un estado de favor o dicha recibida sin sonar tan eclesiástico como «bienaventurados» ni tan emotivo como «felices». Mantiene la idea de bendición/privilegio que el griego expresa.
- source_word: ἐσμεν
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: BDAG
  rationale: El presente de εἰμί se refleja de manera directa con «somos»; en español suena natural y conserva la afirmación de estado.
- source_word: Ἰσραήλ
  english_pob_choice: O Israel
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  lexicon: BDAG
  rationale: Se conserva el valor vocativo con «oh», que marca la dirección de la exhortación o proclamación, en lugar de tratar el nombre como simple aposición.
- source_word: τὰ ἀρεστὰ
  english_pob_choice: what is pleasing
  chosen_spanish: las cosas que son agradables
  alternatives_spanish:
  - lo que agrada
  - las cosas agradables
  - las cosas que agradan
  lexicon: BDAG
  rationale: El neutro plural substantivado pide una expresión que preserve pluralidad de referentes. «Las cosas que son agradables» evita estrechar el sentido a un solo objeto y mantiene la amplitud del griego.
- source_word: τοῦ θεοῦ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - ante Dios
  lexicon: BDAG
  rationale: Con ἀρεστός, el complemento natural en español es «agradable a Dios», que refleja la relación de aprobación o agrado divina mejor que un genitivo literal calcado.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: El dativo se expresa idiomáticamente con el pronombre átono «nos», más natural que repetir una preposición innecesaria.
- source_word: γνωστά
  english_pob_choice: is known
  chosen_spanish: nos son conocidas
  alternatives_spanish:
  - son conocidas para nosotros
  - han sido hechas conocidas
  lexicon: BDAG
  rationale: La concordancia con el plural neutro se conserva con «son conocidas», y el dativo se incorpora en «nos». No se introduce pasiva explícita («han sido hechas conocidas») porque el griego no la exige.
theological_decisions:
- issue: Alcance de «las cosas agradables a Dios»
  english_pob_reading: The verse states that Israel is blessed because God's pleasing will or requirements are known to them.
  chosen_spanish_reading: La versículo afirma que Israel es dichoso porque le son conocidas las cosas que agradan a Dios.
  alternative_spanish_readings:
  - '...porque le es conocida la voluntad de Dios.'
  - '...porque le son conocidas las cosas de la ley de Dios.'
  rationale: El griego habla de «las cosas agradables a Dios» y no nombra explícitamente «ley» ni reduce el contenido a un solo referente. En el contexto de Baruc puede resonar con instrucción/covenio, pero la traducción debe preservar esa amplitud y no resolverla de antemano.
  doctrine_reference: Preservar la tensión léxica y teológica del texto sin estrechar el alcance del original.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado coinciden con alta concordancia; no se registran revisiones aplicadas. La redacción española sigue la decisión inglesa de no estrechar τὰ ἀρεστὰ τοῦ θεοῦ a «ley», manteniendo la amplitud del original.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para θεός.
  - Se preserva el vocativo con «oh Israel».
  - Se evita «Cristo» y cualquier terminología no presente en el versículo.
  - «Dichosos» mantiene el registro bíblico sin forzar un calco de «blessed».
  - La construcción «nos son conocidas» conserva el valor del dativo y del plural neutro griego.
