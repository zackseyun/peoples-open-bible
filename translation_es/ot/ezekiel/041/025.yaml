  text: וַ/עֲשׂוּיָ֨ה אֲלֵי/הֶ֜ן אֶל דַּלְת֤וֹת הַֽ/הֵיכָל֙ כְּרוּבִ֣ים וְ/תִֽמֹרִ֔ים כַּ/אֲשֶׁ֥ר עֲשׂוּיִ֖ם לַ/קִּיר֑וֹת וְ/עָ֥ב עֵ֛ץ אֶל פְּנֵ֥י הָ/אוּלָ֖ם מֵ/הַ/חֽוּץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/041/025.yaml
  text: And cherubim and palm trees were made on them[a], on the doors of the nave, just as they were made on the walls[c][b]; and there was a wooden canopy before the front of the vestibule outside.
  footnotes:
  - marker: a
    text: Or 'were carved on them' for the passive verb 'were made,' since the context is decorative temple work.
    reason: lexical_alternative
  - marker: b
    text: Or 'the doors of the temple hall' or 'the sanctuary.' The Hebrew הֵיכָל here refers to the main hall of the temple building.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'wooden canopy' is uncertain; it may refer to a wooden projection, overhang, or similar architectural feature at the front of the vestibule.
    reason: lexical_alternative
