  to: no a muchos pueblos de habla oscura y lengua difícil[a], cuyas palabras no entenderás; ciertamente, si yo te hubiera enviado a esos pueblos, te escucharían.
  rationale: Se corrige la discordancia gramatical («cuyas palabras») y se mejora la naturalidad del español al evitar la repetición innecesaria de «ellos» y referir «a esos pueblos», sin cambiar el sentido del hebreo ni las decisiones léxicas del POB inglés.
