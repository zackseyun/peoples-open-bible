translation:
  language: es
  text: Y cuando esto sucedió y había transcurrido algún tiempo, el sol resplandeció aunque estaba nublado[a], y se encendió un gran fuego, de modo que todos se maravillaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras estaba nublado». La expresión griega ἐπινεφὴς ὤν describe una condición de nubes; aquí se entiende en sentido concesivo: el sol resplandeció a pesar de la nubosidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἐγένετο
  english_pob_choice: And when this happened
  chosen_spanish: Y cuando esto sucedió
  alternatives_spanish:
  - Y cuando esto tuvo lugar
  - Ahora bien, cuando esto ocurrió
  lexicon: LSJ
  rationale: La expresión introduce el siguiente episodio con valor temporal narrativo; en español, «cuando esto sucedió» conserva el giro idiomático sin volverlo más pesado de lo necesario.
- source_word: χρόνος διῆλθεν
  english_pob_choice: some time had passed
  chosen_spanish: había transcurrido algún tiempo
  alternatives_spanish:
  - había pasado un tiempo
  - transcurrió algún tiempo
  lexicon: LSJ
  rationale: La frase griega señala un lapso indefinido. «Había transcurrido algún tiempo» mantiene ese carácter impreciso y la relación temporal de pluscuamperfecto del inglés de trabajo.
- source_word: ὅ τε ἥλιος ἀνέλαμψεν
  english_pob_choice: and the sun shone out
  chosen_spanish: el sol resplandeció
  alternatives_spanish:
  - el sol brilló
  - el sol salió con resplandor
  lexicon: LSJ
  rationale: ἀνέλαμψεν sugiere un resplandor repentino o destacado; «resplandeció» comunica ese brillo emergente con dignidad narrativa.
- source_word: ἐπινεφὴς ὤν
  english_pob_choice: though it was clouded over
  chosen_spanish: aunque estaba nublado
  alternatives_spanish:
  - aunque había nubes
  - estando cubierto de nubes
  lexicon: LSJ
  rationale: La frase participial describe condiciones nubosas y, en contexto, tiene fuerza concesiva. «Aunque estaba nublado» preserva esa tensión sin forzar un calco.
- source_word: ἀνήφθη
  english_pob_choice: was kindled
  chosen_spanish: se encendió
  alternatives_spanish:
  - fue encendido
  - se prendió
  lexicon: LSJ
  rationale: El pasivo de ἀνάπτω aquí se refiere al inicio del fuego. «Se encendió» es natural en español y conserva el matiz pasivo del evento.
- source_word: πυρὰ μεγάλη
  english_pob_choice: a great fire
  chosen_spanish: un gran fuego
  alternatives_spanish:
  - un fuego grande
  - una gran hoguera
  lexicon: LSJ
  rationale: πυρά puede designar fuego o pira; en este contexto, la referencia a un fuego repentino y extraordinario favorece «un gran fuego» como equivalente directo.
- source_word: ὥστε θαυμάσαι πάντας
  english_pob_choice: so that everyone marveled
  chosen_spanish: de modo que todos se maravillaron
  alternatives_spanish:
  - hasta el punto de que todos se admiraron
  - de manera que todos quedaron asombrados
  lexicon: LSJ
  rationale: La construcción de resultado con infinitivo se expresa bien con «de modo que». «Se maravillaron» mantiene la amplitud semántica de θαυμάσαι y el alcance universal de πάντας.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y ninguna revisión sustantiva aplicada; se conserva la lectura concesiva de ἐπινεφὴς ὤν y el valor resultativo de ὥστε + infinitivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente contextual.
  - Se usa «se maravillaron» para reflejar el resultado universal de πάντας sin introducir matices de sorpresa más fuertes que los atestiguados.
  - El registro es narrativo y sobrio, evitando arcaísmos innecesarios como «acaeció» o «vino a suceder».
