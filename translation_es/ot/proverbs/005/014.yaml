translation:
  language: es
  text: Casi estuve en toda clase de mal, en medio de la asamblea y congregación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «casi estuve en completa ruina» o «casi estuve en todo mal». La expresión hebrea es breve y puede subrayar tanto el mal moral como la ruina o desastre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  english_pob_choice: almost
  chosen_spanish: casi
  alternatives_spanish:
  - por poco
  - apenas
  lexicon: HALOT
  rationale: En esta construcción con היה, el hebreo expresa proximidad, no duración. «Casi» reproduce de forma natural esa idea de cercanía al desastre o al mal.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: caí
  alternatives_spanish:
  - estuve
  - era
  lexicon: HALOT
  rationale: Aunque el inglés POB conserva el simple pasado, en español «casi caí» comunica mejor la idea retrospectiva de haber estado a punto de llegar a esa situación. La lectura del contexto sapencial apunta a una caída o ruina moral cercana.
- source_word: בְכָל רָע
  english_pob_choice: in every kind of evil
  chosen_spanish: en todo mal
  alternatives_spanish:
  - en toda clase de mal
  - en completa ruina
  - en todo tipo de mal
  lexicon: HALOT
  rationale: La expresión hebrea es compacta y ambigua entre mal moral y ruina/desastre. «En todo mal» conserva la amplitud sin decidir demasiado por una sola interpretación; «caí» ya sugiere el matiz de ruina cercana.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de la
  - entre
  lexicon: HALOT
  rationale: «En medio de» es el equivalente idiomático más natural en español y mantiene la imagen espacial/pública del hebreo.
- source_word: קָהָל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - congregación
  lexicon: HALOT
  rationale: «Asamblea» conserva el matiz formal de קהל y permite emparejarlo con el término siguiente sin borrar la duplicación semántica del hebreo.
- source_word: וְעֵדָה
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - comunidad
  - asamblea
  lexicon: HALOT
  rationale: Se preserva el par casi sinónimo del hebreo con dos sustantivos distintos en español. «Congregación» funciona bien junto a «asamblea» y evita colapsar ambos términos en uno solo.
theological_decisions:
- issue: Ambigüedad entre mal moral y ruina/desastre en בְכָל רָע
  english_pob_reading: The Hebrew phrase is compact and may emphasize either moral evil or disastrous ruin.
  chosen_spanish_reading: La frase puede leerse como «en todo mal», con posible trasfondo de caída o ruina.
  alternative_spanish_readings:
  - casi caí en completa ruina
  - casi estuve en todo mal
  rationale: El hebreo admite ambas direcciones semánticas, y el contexto de Proverbios permite una advertencia moral y también de desastre personal. La redacción española conserva esa tensión al no explicitar excesivamente una sola opción.
  doctrine_reference: Proverbios 5:14; sabiduría sapiencial sobre las consecuencias del pecado
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustanciales; el audit trail inglés indica que no se necesitaron revisiones posteriores. Se mantuvo la ambigüedad semántica principal de בְכָל רָע en una nota, en paralelo con la nota alternativa del POB inglés.
  spanish_consistency_notes:
  - Se usó «asamblea» y «congregación» para reflejar el doblete hebreo קָהָל / וְעֵדָה sin fusionarlo.
  - Se prefirió «casi» para כִּמְעַט por ser la equivalencia natural en español con idea de proximidad.
  - El verbo «caí» es una decisión interpretativa moderada para expresar la cercanía a una ruina o caída, sin eliminar la amplitud de «todo mal».
