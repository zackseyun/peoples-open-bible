translation:
  language: es
  text: Y los puso bajo custodia en la casa del capitán de la guardia[a], en la casa de la prisión[c][b], el lugar donde José estaba preso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El título ‘capitán de la guardia’ traduce una expresión hebrea que más literalmente podría renderizarse ‘jefe de los verdugos’ o ‘jefe de los matadores’.
    reason: lexical_alternative
  - marker: b
    text: O ‘en la casa del capitán de la guardia, a la casa de la prisión’.
    reason: previous_rendering
  - marker: c
    text: O ‘en la prisión’, o más formalmente ‘en la casa de detención’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: he put
  chosen_spanish: los puso
  alternatives_spanish:
  - los colocó
  - los entregó
  lexicon: HALOT
  rationale: En este contexto custodial, נתן funciona idiomáticamente como ‘poner’ o ‘destinar’ a alguien a una situación de detención. ‘Los puso’ conserva la acción sin volverla más literal de lo que el español natural permite.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los dos
  lexicon: Pronombre de objeto directo
  rationale: El pronombre retoma a los dos oficiales mencionados antes; en español basta ‘los’ para mantener la referencia directa y natural.
- source_word: בְּמִשְׁמַר
  english_pob_choice: in custody
  chosen_spanish: bajo custodia
  alternatives_spanish:
  - bajo guardia
  - en detención
  lexicon: HALOT
  rationale: מִשְׁמָר puede expresar custodia, vigilancia o detención. ‘Bajo custodia’ comunica bien el sentido legal y de vigilancia, y suena más natural en español que una repetición rígida de ‘en custodia’.
- source_word: בֵּית שַׂר הַטַּבָּחִים
  english_pob_choice: the house of the captain of the guard
  chosen_spanish: la casa del capitán de la guardia
  alternatives_spanish:
  - la casa del jefe de los verdugos
  - la casa del jefe de los ejecutores
  lexicon: HALOT
  rationale: El título hebreo es tradicionalmente aplicado al cargo de Potifar. Aunque la raíz puede aludir a ‘matadores/cocineros/verdugos’, el contexto narrativo favorece ‘capitán de la guardia’ como título estable y comprensible en español.
- source_word: אֶל בֵּית הַסֹּהַר
  english_pob_choice: in the prison house
  chosen_spanish: en la casa de la cárcel
  alternatives_spanish:
  - en la prisión
  - en la casa de prisión
  lexicon: HALOT
  rationale: בֵּית הַסֹּהַר es una expresión compuesta que designa la prisión. ‘Casa de la cárcel’ conserva el carácter de compuesto hebreo y sigue siendo entendible, aunque suene menos moderno que ‘prisión’.
- source_word: מְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el recinto
  lexicon: HALOT
  rationale: Introduce una aclaración apposicional sobre la prisión. ‘El lugar’ mantiene la función explicativa de forma clara y directa.
- source_word: אֲשֶׁר יוֹסֵף אָסוּר שָׁם
  english_pob_choice: where Joseph was confined
  chosen_spanish: donde José estaba preso
  alternatives_spanish:
  - donde José estaba confinado
  - donde José estaba encarcelado
  lexicon: HALOT
  rationale: אָסוּר significa literalmente ‘atado/bound’, y por extensión ‘preso/confinado’. ‘Estaba preso’ es idiomático en español y conserva la idea de detención; se evita suavizarlo excesivamente con un verbo más general.
theological_decisions:
- issue: Léxico del título שַׂר הַטַּבָּחִים
  english_pob_reading: the captain of the guard
  chosen_spanish_reading: el capitán de la guardia
  alternative_spanish_readings:
  - el jefe de los verdugos
  - el jefe de los ejecutores
  rationale: No se atenúa ni se redefine el cargo con una fórmula puramente etimológica. Se mantiene la lectura funcional del POB porque encaja con el escenario carcelario y con el uso tradicional del título en la narración de Génesis.
  doctrine_reference: N/A
- issue: Valor de אֶל con el sintagma de la prisión
  english_pob_reading: in the prison house
  chosen_spanish_reading: en la casa de la cárcel
  alternative_spanish_readings:
  - a la casa de la cárcel
  - en la prisión
  rationale: El hebreo usa un movimiento hacia el lugar, pero el resultado es la localización final. En español, ‘los puso... en’ comunica bien ese ingreso sin forzar una duplicación torpe de preposiciones.
  doctrine_reference: N/A
- issue: Participio אָסוּר
  english_pob_reading: was confined
  chosen_spanish_reading: estaba preso
  alternative_spanish_readings:
  - estaba confinado
  - estaba encarcelado
  rationale: Se conserva la tensión entre el sentido literal ‘atado’ y el sentido contextual de prisión. ‘Preso’ expresa la condición de José sin perder el matiz de restricción.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción española sigue el mismo encadenamiento locativo del hebreo: custodia + casa del capitán de la guardia + casa de la cárcel + aclaración del lugar. Se evita una traducción excesivamente mecánica de las preposiciones, pero se conserva la progresión espacial del texto. El audit trail inglés fue usado como contexto para identificar el valor custodial de נתן, מִשְׁמַר y אָסוּר, y para mantener el título tradicional del oficial.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aparece.
  - Se mantiene ‘capitán de la guardia’ como término estable para שַׂר הַטַּבָּחִים.
  - ‘Casa de la cárcel’ se usa como equivalente transparente de בית הסוהר, aunque ‘prisión’ sería una opción válida y más natural.
  - ‘Preso’ traduce el estado de José con naturalidad española y conserva la fuerza de confinamiento.
