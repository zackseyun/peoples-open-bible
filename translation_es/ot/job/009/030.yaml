translation:
  language: es
  text: Si yo me lavara con nieve y limpiara mis manos con lejía,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con jabón»; el término hebreo se refiere con más precisión a un agente de limpieza alcalino, como la lejía.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Incluso si
  lexicon: HALOT
  rationale: Introduce una condición hipotética en el discurso de Job. «Si» es la forma más natural y directa en español para mantener el valor condicional del hebreo.
- source_word: הִתְרָחַצְתִּי
  english_pob_choice: I washed myself
  chosen_spanish: me lavara
  alternatives_spanish:
  - me bañara
  - me limpiara
  lexicon: HALOT
  rationale: El hitpael de רחץ es reflexivo. En español, «me lavara» conserva la reflexividad y suena natural en una construcción condicional. «Bañara» sería más restrictivo y «limpiara» desplaza demasiado el sentido corporal del verbo.
- source_word: בְּמוֹ שָׁלֶג
  english_pob_choice: with snow
  chosen_spanish: con nieve
  alternatives_spanish:
  - con nieve pura
  - en nieve
  - con agua de nieve
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa medio o instrumento. «Nieve» es la forma más natural en español; aunque «nieve» evoca el material y no el agua resultante, el hebreo no lo explicita, así que se evita añadir interpretación.
- source_word: וַהֲזִכּוֹתִי
  english_pob_choice: and cleansed
  chosen_spanish: y limpiara
  alternatives_spanish:
  - y purificara
  - y dejara limpio
  lexicon: HALOT
  rationale: El hiphil de זכה expresa hacer limpio o puro. «Limpiara» mantiene el paralelismo con «lavara» y comunica bien la acción de dejar limpio; «purificara» sería posible, pero puede inclinarse más hacia lo ritual/moral que el contexto inmediato exige.
- source_word: בְּבֹר
  english_pob_choice: with lye
  chosen_spanish: con lejía
  alternatives_spanish:
  - con jabón
  - con sosa
  - con álcali
  lexicon: HALOT
  rationale: El término hebreo designa un agente de limpieza alcalino, no el jabón moderno. «Lejía» es la equivalencia española más cercana y entendible para ese tipo de sustancia; «jabón» sería menos preciso.
- source_word: כַּפָּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «mis palmas», en español «mis manos» es más natural en este contexto de limpieza. Conserva el sentido sin sonar artificioso.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y toma como guía la traducción POB inglesa, sin depender mecánicamente de ella. Se mantiene la condición hipotética, el paralelismo de lavado/limpieza y la referencia a un agente alcalino de limpieza. No hubo revisiones aplicadas en el pass más reciente, y el cotejo de control mostró alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «lejía» para בֹּר, porque el POB inglés ya documenta el valor de un agente alcalino y el español necesita una equivalencia precisa y legible.
  - Se evita «SEÑOR» u otros equivalentes no pertinentes, ya que este versículo no contiene el nombre divino.
  - Se conserva el paralelismo verbal con dos imperfectos de valor hipotético («lavara» / «limpiara»), acorde con la condicional hebrea.
  - Se elige «nieve» sin expandir a «agua de nieve», porque el hebreo no explicita esa interpretación.
