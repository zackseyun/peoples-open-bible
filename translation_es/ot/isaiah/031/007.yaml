translation:
  language: es
  text: Porque en aquel día cada hombre rechazará sus ídolos de plata y sus ídolos de oro[a][b], que sus manos hicieron para ustedes[c], como un pecado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrojará» o «despreciará». El verbo hebreo puede expresar una fuerte repudiación o desprecio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «cada hombre»; el singular es distributivo, es decir, cada persona individualmente.
    reason: lexical_alternative
  - marker: c
    text: O «que sus propias manos hicieron para ustedes mismos».
    reason: lexical_alternative
  - marker: d
    text: 'O «para pecado» / «como pecado». El hebreo final es breve y funciona de manera apposicional: los ídolos son tratados como cosas pecaminosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva explicativa o causal del hebreo. En español, «Porque» abre naturalmente la declaración y mantiene la relación con lo anterior sin sobretraducción.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión profética se vierte de manera idiomática y solemne. «En aquel día» mantiene el valor temporal-esjatológico de la fórmula hebrea.
- source_word: יִמְאָסוּן
  english_pob_choice: will reject
  chosen_spanish: rechazará
  alternatives_spanish:
  - arrojará
  - despreciará
  - desechará
  lexicon: HALOT
  rationale: El verbo comunica una repudiación fuerte. «Rechazará» preserva ese valor sin forzar una imagen física que el hebreo no exige explícitamente en la cláusula principal.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El singular distributivo se conserva. «Hombre» refleja la forma masculina del hebreo y «cada» expresa el sentido distributivo individual.
- source_word: אֱלִילֵי כַסְפּוֹ / וֶאֱלִילֵי זְהָבוֹ
  english_pob_choice: his idols of silver / his idols of gold
  chosen_spanish: sus ídolos de plata / sus ídolos de oro
  alternatives_spanish:
  - sus ídolos de plata / y sus ídolos de oro
  - los ídolos de su plata / los ídolos de su oro
  lexicon: HALOT
  rationale: La construcción en hebreo expresa ídolos hechos de esos metales. «Sus ídolos de plata» y «sus ídolos de oro» conserva el paralelismo y la claridad natural en español.
- source_word: אֲשֶׁר עָשׂוּ לָכֶם יְדֵיכֶם
  english_pob_choice: which your hands have made for you
  chosen_spanish: que sus manos hicieron para ustedes
  alternatives_spanish:
  - que sus propias manos hicieron para ustedes
  - que ustedes mismos hicieron con sus manos
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la manufactura humana. El hebreo dirige la frase al pueblo en plural («para ustedes»); el posesivo («sus manos») evita una expansión reflexiva no requerida por el texto base.
- source_word: חֵטְא
  english_pob_choice: as sin
  chosen_spanish: como pecado
  alternatives_spanish:
  - como un pecado
  - para pecado
  - en pecado
  lexicon: HALOT
  rationale: El sustantivo final es breve y condenatorio. «Como pecado» preserva el carácter predicativo/apposicional sin introducir matices sacrificiales o explicativos que no están en el hebreo.
theological_decisions:
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: Se mantiene el singular masculino distributivo del hebreo, siguiendo el valor observado en la traducción inglesa auditada. «Cada hombre» comunica que la respuesta idolátrica será individual, no solo colectiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de חֵטְא al final del versículo
  english_pob_reading: as sin
  chosen_spanish_reading: como pecado
  alternative_spanish_readings:
  - como un pecado
  - para pecado
  rationale: El final del versículo no desarrolla una idea de ofrenda por el pecado, sino una condena directa de los ídolos como algo pecaminoso. «Como pecado» conserva la aspereza del hebreo y la lectura apposicional sin doctrinalizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió el artículo en «as a sin» para reflejar mejor חֵטְא. En español se optó por «como pecado» para conservar la concisión apposicional del hebreo y evitar introducir un artículo que volviera más interpretativa la frase final.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantiene el paralelismo plata/oro con sintaxis natural en español.
  - Se evitó suavizar el verbo de rechazo a «desechar» o «arrojar» en el texto principal, pero esas opciones quedan documentadas en nota.
  - No se neutralizó «אִישׁ» en el texto principal, siguiendo la decisión auditada de conservar el masculino distributivo.
