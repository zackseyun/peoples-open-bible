revisions:
- from: Y ahora también el tiempo nos llama a la demostración del relato de la prudencia racional[a].
  to: Y ahora también el tiempo nos llama a la demostración del relato del autodominio racional[a].
  rationale: 'Se reemplaza «prudencia racional» por «autodominio racional» para reflejar mejor la decisión auditada sobre σώφρονος λογισμοῦ como ideal ético-racional compuesto: razón en ejercicio que gobierna los impulsos. Se conserva «relato» para ἱστορίας, en línea con la revisión inglesa de «account», y se mantiene la sintaxis general del borrador por ser fiel y natural.'
