revisions:
- from: Y destruiré al habitante de Asdod[a], y al que sostiene el cetro de Ascalón; volveré mi mano[b] contra Ecrón, y perecerá el remanente de los filisteos —dice el Señor Yahvé[c].
  to: Y extirparé al habitante de Asdod, y al que sostiene el cetro[a] de Ascalón; volveré mi mano[b] contra Ecrón, y perecerá el remanente de los filisteos —dice el Señor Yahvé.
  rationale: Se corrigen las notas para que coincidan con los segmentos correctos del texto y con el rastro auditado del hebreo. Se reemplaza 'destruiré' por 'extirparé' para preservar mejor el valor de כרת. Se elimina la nota teológica redundante sobre 'Yahvé'. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
