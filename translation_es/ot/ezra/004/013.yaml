review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del arameo: aviso formal al rey, condición sobre la reconstrucción de la ciudad y sus muros, tríada fiscal distinguida, y resultado final de perjuicio económico para los reyes. Sin embargo, «no darán» no preserva tan bien como «no pagarán» el valor idiomático fiscal de לָא יִנְתְּנוּן en este contexto administrativo, y «sea dado a conocer» suena menos natural que la fórmula oficial española «sepa el rey» o «sea sabido del rey / hágase saber al rey».'
  spanish_quality_summary: 'El texto es comprensible, pero tiene cierta rigidez calca en «sea dado a conocer» y una leve torpeza en «son terminados». Para un español eclesial moderno y digno, conviene una formulación más idiomática: «sepa el rey» y «quedan terminados» o «son completados». También «reedificada» puede funcionar, pero «reconstruida» es más natural sin pérdida de sentido.'
  glossary_alignment: No hay términos teológicos del glosario principal implicados. La tríada fiscal está bien diferenciada como «tributo, impuesto ni peaje», y se conserva correctamente el plural «los reyes».
  issues:
  - severity: medium
    issue: Fórmula oficial poco natural en «sea dado a conocer al rey»
    rationale: Aunque es semánticamente cercana a יְדִיעַ לֶהֱוֵא לְמַלְכָּא, en español suena forzada. La correspondencia oficial se expresa con más naturalidad y dignidad mediante «sepa el rey» o «hágase saber al rey».
  - severity: medium
    issue: «No darán» es menos idiomático que «no pagarán» en contexto tributario
    rationale: El arameo usa literalmente «dar», pero tanto la POB inglesa como el español administrativo natural requieren el equivalente idiomático «pagar» cuando se habla de tributos, impuestos y peajes.
  - severity: low
    issue: «Son terminados» suena poco natural en español bíblico moderno
    rationale: El sentido de finalización de יִשְׁתַּכְלְלוּן se expresa de manera más fluida con «quedan terminados» o «son completados».
  revised_spanish_text: Ahora, sepa el rey que, si esta ciudad es reconstruida y sus muros quedan terminados, no pagarán tributo, impuesto ni peaje, y al final dañará los ingresos de los reyes.[a]
  revised_footnotes:
  - marker: a
    text: O «y finalmente causará pérdida a los reyes». La expresión aramea es concisa, y el matiz exacto de la pérdida se infiere del contexto de tributo, impuesto y peaje no pagados.
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula oficial a un español más natural («sepa el rey»), se corrige el verbo fiscal a «no pagarán» para reflejar el uso idiomático en contexto tributario, se mejora la fluidez de la cláusula sobre los muros, y se añade la nota léxica alternativa preservada por la auditoría inglesa sobre la concisión de la expresión final aramea.
