translation:
  language: es
  text: Luchó con el ángel y prevaleció[a]; lloró y buscó su favor. En Betel lo encontró[b], y allí habló con nosotros—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «peleó con él» / «contendió con él» / «imploró su favor».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «con nosotros»; algunos entienden «con él», suavizando el cambio de persona. El texto principal conserva la lectura masorética.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשַׂר
  english_pob_choice: strove
  chosen_spanish: luchó
  alternatives_spanish:
  - contendió
  - se esforzó
  - luchó en combate
  lexicon: HALOT
  rationale: El verbo en el contexto de Jacob evoca el combate/forcejeo de Génesis 32. En español, "luchó" comunica bien el enfrentamiento activo sin introducir una noción moral ajena. "Contendió" es posible, pero suena menos natural; "se esforzó" debilita demasiado la imagen.
- source_word: מַלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - un mensajero
  - el mensajero
  lexicon: HALOT
  rationale: Aquí el referente es el ser celestial de la escena de Jacob, no un mensajero humano. "Ángel" es la equivalencia natural y auditable en español para este contexto.
- source_word: וַיֻּכָל
  english_pob_choice: prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - venció
  - superó
  - triunfó
  lexicon: HALOT
  rationale: '"Prevaleció" conserva el matiz de salir adelante o resultar vencedor en el encuentro, como en el POB inglés. "Venció" es viable, pero "prevaleció" mantiene mejor la resonancia narrativa con Génesis 32.'
- source_word: בָּכָה
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - se lamentó
  lexicon: HALOT
  rationale: El hebreo describe un llanto simple en la narración. "Lloró" es la correspondencia directa y clara en español.
- source_word: וַיִּתְחַנֶּן לוֹ
  english_pob_choice: sought his favor
  chosen_spanish: buscó su favor
  alternatives_spanish:
  - le rogó
  - le imploró
  - suplicó su favor
  lexicon: HALOT
  rationale: El hitpael de חנן expresa pedir favor, gracia o misericordia. "Buscó su favor" mantiene el vínculo semántico con gracia/favor sin escoger de antemano una paráfrasis más interpretativa. "Le rogó" sería natural, pero perdería la conexión léxica con favor/gracia que el POB inglés preserva.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: HALOT
  rationale: Se usa la forma toponímica habitual en español bíblico, "Betel", que es clara y ampliamente reconocible.
- source_word: יִמְצָאֶנּוּ
  english_pob_choice: he found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - lo halló
  - lo encontró allí
  lexicon: HALOT
  rationale: La forma verbal permite entender que el sujeto volvió a encontrar al mismo referente del relato previo. "Lo encontró" es natural en español y conserva la relación personal sin expandir más de lo necesario.
- source_word: וְשָׁם יְדַבֵּר עִמָּנוּ
  english_pob_choice: and there he spoke with us
  chosen_spanish: y allí habló con nosotros
  alternatives_spanish:
  - y allí habló con él
  - y allí nos habló
  lexicon: HALOT
  rationale: Se conserva el plural de la Masorética, como hace el POB inglés, porque el texto enlaza la experiencia de Jacob con Israel como pueblo. "Con nosotros" mantiene esa tensión sin armonizarla hacia "con él". "Nos habló" sería idiomático, pero cambia el énfasis del original.
theological_decisions:
- issue: Mantenimiento del plural final "con nosotros"
  english_pob_reading: retain 'with us' in the main text
  chosen_spanish_reading: con nosotros
  alternative_spanish_readings:
  - con él
  rationale: 'La lectura masorética en primera persona plural es difícil, pero significativa: hace que la experiencia de Jacob se proyecte sobre la comunidad del pacto. Se preserva la tensión en vez de resolverla, siguiendo la filosofía de traducción del POB.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la secuencia narrativa, el valor de "prevaleció", el matiz de favor/gracia en el verbo final y el plural difícil de "con nosotros" sin armonizarlo. No se detectaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa "Betel" como forma estable del topónimo.
  - Se mantiene "el ángel" en singular con artículo definido por el contexto narrativo.
  - '"Con nosotros" se conserva en la cláusula final para reflejar la lectura masorética y la continuidad comunitaria.'
  - La puntuación con punto y coma reproduce la cesura retórica del original inglés y permite una lectura fluida en español.
