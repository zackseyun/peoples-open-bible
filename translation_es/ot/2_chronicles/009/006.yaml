translation:
  language: es
  text: Pero no creí sus palabras hasta que vine y mis propios ojos lo vieron; y he aquí, ni siquiera la mitad de la grandeza[a] de tu sabiduría se me había contado. Has superado el informe que oí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la abundancia de tu sabiduría».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Has excedido el informe que oí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  english_pob_choice: I did not believe
  chosen_spanish: no creí
  alternatives_spanish:
  - no confié
  - no pude creer
  lexicon: HALOT
  rationale: El hiphil de אמן aquí expresa considerar verdadero o creíble lo dicho. En español, «creí» reproduce con naturalidad la aceptación de un testimonio; «confié» sugeriría más bien dependencia personal que asentimiento a un informe.
- source_word: לְדִבְרֵיהֶם
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - sus informes
  lexicon: HALOT
  rationale: דבר puede significar «palabra(s)», «dicho(s)» o «asunto(s)». «Sus palabras» mantiene cercanía formal con el hebreo y funciona bien en español sin perder el matiz de lo que se había escuchado.
- source_word: וַתִּרְאֶינָה עֵינַי
  english_pob_choice: my own eyes saw it
  chosen_spanish: mis propios ojos lo vieron
  alternatives_spanish:
  - mis ojos lo vieron
  - lo vi con mis propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es enfática y marca verificación directa. En español, «mis propios ojos lo vieron» conserva esa fuerza idiomática y el énfasis de primera mano.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - e indudablemente
  lexicon: HALOT
  rationale: הִנֵּה introduce atención vívida y sorpresa. «Y he aquí» preserva mejor esa carga discursiva que una simple coordinación más plana.
- source_word: חֲצִי
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - medio
  lexicon: HALOT
  rationale: Es un cuantificador simple; «la mitad» es la equivalencia natural y clara en español.
- source_word: מַרְבִּית חָכְמָתֶךָ
  english_pob_choice: the greatness of your wisdom
  chosen_spanish: la grandeza de tu sabiduría
  alternatives_spanish:
  - la abundancia de tu sabiduría
  - tu gran sabiduría
  lexicon: HALOT
  rationale: מַרְבִּית denota aumento, abundancia o grandeza. «La grandeza de tu sabiduría» comunica la magnitud sin volver la frase artificial; además, mantiene la relación semántica con el reporte previo.
- source_word: הֻגַּד לִי
  english_pob_choice: had been told to me
  chosen_spanish: me había sido contada
  alternatives_spanish:
  - me había sido dicho
  - me habían contado
  lexicon: HALOT
  rationale: El hophal de נגד expresa pasivo de «decir/contar». En español, «me había sido contada» refleja la pasividad y encaja con el sustantivo implícito de la noticia previa, aunque suene ligeramente más literario que «me habían contado».
- source_word: יָסַפְתָּ עַל
  english_pob_choice: You have surpassed
  chosen_spanish: Has sobrepasado
  alternatives_spanish:
  - Has excedido
  - Has añadido a
  lexicon: HALOT
  rationale: יסף con על aquí comunica ir más allá de lo previamente oído. «Has sobrepasado» es idiomático en español y conserva el sentido comparativo del texto.
- source_word: הַשְּׁמוּעָה
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el reporte
  - el informe
  - la fama
  lexicon: HALOT
  rationale: 'שְׁמוּעָה se refiere a algo oído: noticia, reporte o informe. «La noticia» funciona de forma natural en español y evita la carga negativa que «rumor» podría introducir; se mantiene la neutralidad del dato oído.'
- source_word: אֲשֶׁר שָׁמָעְתִּי
  english_pob_choice: that I heard
  chosen_spanish: que oí
  alternatives_spanish:
  - que había oído
  lexicon: HALOT
  rationale: La cláusula relativa es simple y directa. «Que oí» preserva el vínculo con «la noticia» y es natural en español contemporáneo.
translation_notes:
  revision_awareness: La versión inglesa auditada es de filosofía optimal-equivalence y no presenta revisiones aplicadas; el texto español sigue esa misma lectura, conservando el énfasis de verificación ocular y el contraste entre lo oído y lo constatado.
  spanish_consistency_notes:
  - Se usa «sabiduría» para חָכְמָה conforme al uso estable del proyecto.
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - «He aquí» se conserva para reflejar הִנֵּה sin perder naturalidad en español.
  - La frase final evita «rumor» para no introducir una connotación más negativa que la del hebreo.
