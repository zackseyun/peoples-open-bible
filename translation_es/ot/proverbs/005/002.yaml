translation:
  language: es
  text: para que guardes la discreción[a], y tus labios[b] guarden el conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Discreción'' resume el valor prudente de מְזִמּוֹת; también puede entenderse como ''prudencia'' o ''buen juicio''.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'tus labios'; el hebreo conserva la imagen corporal para sugerir un habla que custodia o expresa conocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹר
  english_pob_choice: so that you may keep
  chosen_spanish: para que guardes
  alternatives_spanish:
  - para guardar
  - a fin de que guardes
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad; en español, 'para que' comunica con naturalidad la relación de propósito y mantiene el valor verbal de שׁמר como 'guardar'. El subjuntivo 'guardes' corresponde al contexto exhortativo.
- source_word: מְזִמּוֹת
  english_pob_choice: discretion
  chosen_spanish: la discreción
  alternatives_spanish:
  - la prudencia
  - el buen juicio
  - los planes
  lexicon: HALOT
  rationale: En Proverbios, מזמות puede referirse a discreción prudente o a planes reflexivos. 'La discreción' conserva el sentido positivo elegido por el POB inglés y es idiomático en español, sin cargar el término con la idea negativa de 'maquinaciones'.
- source_word: וְדַעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - la sabiduría práctica
  - el entendimiento
  lexicon: HALOT
  rationale: דעת se traduce con mayor transparencia como 'conocimiento'. En español, el artículo definido y el sustantivo mantienen la conexión léxica con el campo sapiencial de Proverbios y evitan ampliar demasiado el matiz hacia 'entendimiento'.
- source_word: שְׂפָתֶיךָ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tu habla
  - tu boca
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo. 'Tus labios' refleja con precisión el texto fuente y, en español, sigue implicando el habla como medio que custodia el conocimiento.
- source_word: יִנְצֹרוּ
  english_pob_choice: may guard
  chosen_spanish: vigilen
  alternatives_spanish:
  - guarden
  - custodien
  - preserven
  lexicon: HALOT
  rationale: נצר comparte el campo semántico de guardar/velar. 'Vigilen' evita repetir 'guardar' dos veces en la misma línea, conserva la idea protectora y suena natural en español poético, mientras que el plural concuerda con 'labios'.
translation_notes:
  revision_awareness: El texto en inglés del POB ya resuelve la finalidad con 'so that you may' y anota la literalidad de 'your lips'. Esta versión española conserva esa misma estructura de propósito, mantiene la imagen concreta de los labios y ajusta solo lo necesario para que el verso suene natural en español sin perder el paralelismo sapiencial.
  spanish_consistency_notes:
  - Se mantiene 'discreción' para מְזִמּוֹת, en continuidad con el POB inglés y con el contexto sapiencial positivo.
  - Se conserva el paralelismo verbal entre 'guardes' y 'vigilen' para reflejar el doble campo semántico de שמר / נצר.
  - '''Conocimiento'' se usa de forma estable para דעת, sin intensificarlo a ''entendimiento'' salvo necesidad contextual.'
  - Se preserva la literalidad de 'labios' por la nota auditada del POB inglés y por la fuerza poética del hebreo.
