translation:
  language: es
  text: 'Hesbón y todas sus ciudades que están en el altiplano[a]: Dibón, Bamot-baal y Bet-baal-meón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que están en la llanura' o 'que están en la meseta'. El término hebreo se refiere a la región elevada y nivelada de la Transjordania.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Heshbón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español bíblico es natural adaptar la transliteración a Hesbón, manteniendo la referencia geográfica sin traducirla.
- source_word: וְכָל עָרֶיהָ
  english_pob_choice: and all its cities
  chosen_spanish: y todas sus ciudades
  alternatives_spanish:
  - y todas las ciudades de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a Hesbón como ciudad; en español, 'sus ciudades' comunica con naturalidad la relación posesiva que el hebreo expresa.
- source_word: אֲשֶׁר בַּמִּישֹׁר
  english_pob_choice: that are on the plateau
  chosen_spanish: que están en el altiplano
  alternatives_spanish:
  - que están en la llanura
  - que están en la meseta
  lexicon: HALOT
  rationale: En este contexto transjordano, מִישׁוֹר alude a la región elevada y nivelada del territorio; 'altiplano' conserva la idea geográfica mejor que una simple 'llanura'.
- source_word: דִּיבוֹן
  english_pob_choice: Dibon
  chosen_spanish: Dibón
  alternatives_spanish:
  - Dibon
  lexicon: HALOT
  rationale: Nombre propio de lugar; se adapta a la ortografía española habitual con acento gráfico para facilitar la lectura.
- source_word: וּבָמוֹת בַּעַל
  english_pob_choice: Bamoth-baal
  chosen_spanish: Bamot-baal
  alternatives_spanish:
  - Bamot Baal
  - Bamot de Baal
  lexicon: HALOT
  rationale: La expresión funciona como topónimo compuesto, no como sintagma común; se conserva la forma del nombre propio sin convertirla en 'lugares altos de Baal'.
- source_word: וּבֵית בַּעַל מְעוֹן
  english_pob_choice: and Beth-baal-meon
  chosen_spanish: y Bet-baal-meón
  alternatives_spanish:
  - y Beth-baal-meón
  - y Casa de Baal-meón
  lexicon: HALOT
  rationale: También es un topónimo compuesto. 'Bet-' refleja בֵּית como parte fija del nombre de lugar, en vez de traducirlo como 'casa de'.
translation_notes:
  revision_awareness: El texto inglés auditado usa equivalencia óptima y resuelve מִישֹׁר como 'plateau'; la versión española sigue esa decisión semántica con 'altiplano' sin añadir glosa porque el verso ya es comprensible en contexto geográfico. No se detectaron revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de nombres propios como transliteraciones hispanizadas y no como traducciones descriptivas.
  - Se evita 'SEÑOR' u otra sustitución teológica, ya que el versículo no contiene el tetragrámaton ni una referencia divina explícita.
  - '''Altiplano'' se usa para conservar la idea de región elevada y relativamente llana indicada por מִישֹׁר en el contexto transjordano.'
