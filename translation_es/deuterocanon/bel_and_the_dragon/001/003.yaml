translation:
  language: es
  text: Y había un ídolo entre los babilonios, cuyo nombre era Bel, y se gastaban cada día doce artabas[a] de harina fina en él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una artaba era una antigua medida de áridos; el equivalente moderno exacto variaba según la región y la época.
    reason: cultural_note
  - marker: b
    text: O «para él», reflejando el pronombre griego masculino; el texto principal conserva «en él» porque el referente inmediato es el ídolo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴδωλον
  english_pob_choice: idol
  chosen_spanish: ídolo
  alternatives_spanish:
  - imagen
  - imagen de culto
  lexicon: BDAG
  rationale: El término señala un objeto de adoración idolátrica; «ídolo» conserva la fuerza polémica del griego mejor que una forma más neutral como «imagen».
- source_word: τοῖς Βαβυλωνίοις
  english_pob_choice: among the Babylonians
  chosen_spanish: entre los babilonios
  alternatives_spanish:
  - para los babilonios
  - de los babilonios
  lexicon: BDAG
  rationale: El dativo indica pertenencia o ámbito dentro del pueblo; «entre los babilonios» comunica de manera natural que el ídolo estaba en medio de ese pueblo.
- source_word: ᾧ ὄνομα Βὴλ
  english_pob_choice: whose name was Bel
  chosen_spanish: cuyo nombre era Bel
  alternatives_spanish:
  - llamado Bel
  - al que se llamaba Bel
  lexicon: BDAG
  rationale: La construcción relativa se vierte de forma idiomática en español con «cuyo nombre era». «Bel» se translitera como nombre propio.
- source_word: ἐδαπανῶντο
  english_pob_choice: were spent
  chosen_spanish: se gastaban
  alternatives_spanish:
  - se expendían
  - se consumían
  lexicon: BDAG
  rationale: El verbo expresa gasto o expendio de recursos; la pasiva refleja española conserva el foco en la cantidad ofrecida al ídolo.
- source_word: εἰς αὐτόν
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - para él
  lexicon: BDAG
  rationale: Aunque el antecedente inmediato es neutro («ídolo»), el pronombre griego es masculino por «Bel». En español se puede mantener esa tensión con «él», sin resolverla del todo a favor de una simple impersonalidad.
- source_word: ἑκάστης ἡμέρας
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - todos los días
  lexicon: BDAG
  rationale: Es una equivalencia directa y natural de la expresión temporal genitiva.
- source_word: σεμιδάλεως
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: LSJ
  rationale: «Flor de harina» es una expresión española tradicional y precisa para harina muy fina, sin añadir especificación innecesaria.
- source_word: ἀρτάβαι δώδεκα
  english_pob_choice: twelve artabas
  chosen_spanish: doce artabas
  alternatives_spanish:
  - doce medidas
  - doce bushels
  lexicon: LSJ
  rationale: Se conserva «artabas» para mantener la especificidad histórica de la medida antigua, evitando una equivalencia moderna aproximada.
theological_decisions:
- issue: Pronombre masculino griego αὐτόν frente al antecedente neutro εἴδωλον
  english_pob_reading: Render the idol as 'it' in English, while noting the alternative 'for him' from the masculine pronoun.
  chosen_spanish_reading: Conservar «en él» en el texto principal, manteniendo la tensión entre el objeto idolátrico y la posible personificación asociada al nombre Bel.
  alternative_spanish_readings:
  - en ello
  - sobre él
  - para él
  rationale: El texto griego permite oír tanto el referente material del ídolo como la personificación implícita por el masculino. El español puede conservar esa ambigüedad sin imponer una lectura doctrinal o antropomórfica no explícita en la cláusula.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El griego de Swete presenta ἑκάστης ἡμέρας con ἐδαπανῶντο εἰς αὐτόν; la redacción española sigue la lectura auditada del POB inglés, que mantiene la referencia al ídolo y la medida antigua, y conserva la tensión del pronombre masculino sin suavizarla a una simple impersonalidad.
  spanish_consistency_notes:
  - Se prefirió «ídolo» en vez de «imagen» para preservar el tono polémico del término griego.
  - «Bel» se dejó transliterado como nombre propio, conforme al uso del POB inglés.
  - «Artabas» se mantuvo sin conversión a unidades modernas para no introducir una equivalencia aproximada.
  - La expresión «flor de harina» ofrece una solución natural y tradicional para σεμιδάλεως sin perder precisión.
