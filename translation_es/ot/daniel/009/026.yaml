base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/026.yaml
  text: And after the sixty-two weeks[a], an anointed one will be cut off and will have nothing. And the city and the sanctuary the people of the coming ruler will destroy. Its end will come with a flood, and until the end there will be war[d][c][b]; desolations are decreed.
  footnotes:
  - marker: a
    text: Or 'Messiah will be cut off.' The Hebrew reads 'an anointed one,' and interpreters differ on whether this refers specifically to the Messiah.
    reason: alternative_reading
  - marker: b
    text: Or 'and there will be nothing for him,' or 'and no one will be for him.' The Hebrew clause is terse and difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'the people of a coming prince.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his end will come with a flood.' The referent of 'his/its' is debated.
    reason: alternative_reading
