id: 1KI.20.33
reference: 1 Kings 20:33
source:
  edition: WLC
  text: וְ/הָ/אֲנָשִׁים֩ יְנַחֲשׁ֨וּ וַֽ/יְמַהֲר֜וּ וַ/יַּחְלְט֣וּ הֲ/מִמֶּ֗/נּוּ וַ/יֹּֽאמְרוּ֙ אָחִ֣י/ךָ בֶן הֲדַ֔ד וַ/יֹּ֖אמֶר בֹּ֣אוּ קָחֻ֑/הוּ וַ/יֵּצֵ֤א אֵלָי/ו֙ בֶּן הֲדַ֔ד וַֽ/יַּעֲלֵ֖/הוּ עַל הַ/מֶּרְכָּבָֽה־־־׃
translation:
  text: Now the men were watching for an omen[a], and they quickly seized on it from him and said, “Ben-hadad is your brother.” And he said, “Come, take him.” Then Ben-hadad came out to him[c][b], and he had him come up into the chariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were divining” / “were taking it as an omen.” The Hebrew verb can refer to omen-seeking; here it likely means they were alert for a favorable sign in Ahab’s words.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression rendered “seized on it from him” is difficult; the sense is that they quickly latched onto Ahab’s wording as a favorable concession.
    reason: lexical_alternative
  - marker: c
    text: 'Or “he brought him up into the chariot.” The Hebrew verb is causative: Ahab caused Ben-hadad to come up into the chariot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְנַחֲשׁוּ
  chosen: were watching for an omen
  alternatives:
  - were divining
  - were taking it as an omen
  - were watching closely for a sign
  lexicon: HALOT
  rationale: The verb נחשׁ in the Piel can denote divination/omen-seeking. In this narrative context the men are trying to detect a favorable cue in Ahab’s words, not performing formal occult ritual. 'Watching for an omen' preserves the lexical sense while fitting the scene better than a wooden 'were divining.'
- source_word: וַיְמַהֲרוּ
  chosen: quickly
  alternatives:
  - hurried
  - made haste
  lexicon: HALOT
  rationale: 'This adverbial rendering keeps the sequence natural in English: they quickly acted on the perceived favorable sign.'
- source_word: וַיַּחְלְטוּ הֲמִמֶּנּוּ
  chosen: seized on it from him
  alternatives:
  - caught it from him
  - took it as definite from him
  - snatched the word from him
  lexicon: HALOT
  rationale: The difficult verb חלט here likely means to grasp or seize upon Ahab’s statement as decisive evidence. 'Seized on it from him' communicates that they latched onto his wording ('brother') as advantageous. The object is implicit, supplied by context.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your kinsman
  lexicon: HALOT
  rationale: Literal 'your brother' is best; it reflects the diplomatic fiction or courtesy the servants exploit from Ahab’s words.
- source_word: בֹּאוּ קָחֻהוּ
  chosen: Come, take him
  alternatives:
  - Go, bring him
  - Come, fetch him
  lexicon: HALOT
  rationale: A direct imperative sequence. 'Take him' is concise and natural, likely meaning to bring Ben-hadad into Ahab’s presence.
- source_word: וַיַּעֲלֵהוּ עַל הַמֶּרְכָּבָה
  chosen: he had him come up into the chariot
  alternatives:
  - he brought him up into the chariot
  - he caused him to get up into the chariot
  - he lifted him up onto the chariot
  lexicon: HALOT
  rationale: The Hiphil of עלה is causative. 'Had him come up into the chariot' preserves the causative nuance without implying physical lifting. 'Into the chariot' fits royal-vehicle context better than 'onto,' though either is possible idiomatically.
- source_word: הַמֶּרְכָּבָה
  chosen: the chariot
  alternatives:
  - his chariot
  lexicon: HALOT
  rationale: The Hebrew has the definite article, not an explicit possessive. In context it is naturally Ahab’s chariot, but the translation keeps the form of the source.
