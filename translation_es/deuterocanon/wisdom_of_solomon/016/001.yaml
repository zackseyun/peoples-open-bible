translation:
  language: es
  text: Por tanto, fueron justamente castigados por cosas semejantes[a], y fueron atormentados por una multitud de criaturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por cosas parecidas' o 'por medios semejantes'; el griego subraya que el castigo correspondía a la ofensa.
    reason: lexical_alternative
  - marker: b
    text: El término griego puede abarcar ampliamente animales que se arrastran o criaturas; 'criaturas' preserva ese alcance.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa con naturalidad la conclusión inferida del contexto anterior, conservando la fuerza lógica del griego sin sonar demasiado coloquial.
- source_word: διʼ ὁμοίων
  english_pob_choice: by similar things
  chosen_spanish: por cosas semejantes
  alternatives_spanish:
  - por cosas similares
  - por medios semejantes
  - por cosas parecidas
  lexicon: LSJ
  rationale: Mantiene la correspondencia entre ofensa y castigo sin precisar indebidamente el referente. 'Cosas semejantes' conserva la amplitud de ὁμοίων.
- source_word: ἐκολάσθησαν
  english_pob_choice: were punished
  chosen_spanish: fueron castigados
  alternatives_spanish:
  - fueron punidos
  - fueron disciplinados
  - fueron corregidos
  lexicon: LSJ
  rationale: El verbo es punitivo en este contexto; 'castigados' comunica mejor el sentido judicial que 'disciplinados' o 'corregidos'.
- source_word: ἀξίως
  english_pob_choice: justly
  chosen_spanish: justamente
  alternatives_spanish:
  - merecidamente
  - con justicia
  - de manera justa
  lexicon: LSJ
  rationale: Expresa la adecuación moral del castigo. 'Justamente' es natural en español y preserva la idea de retribución merecida.
- source_word: πλήθους
  english_pob_choice: a multitude of
  chosen_spanish: una multitud de
  alternatives_spanish:
  - muchos
  - gran cantidad de
  - una gran multitud de
  lexicon: LSJ
  rationale: Conserva el matiz de abundancia del genitivo sin reducirlo a un simple 'muchos'.
- source_word: κνωδάλων
  english_pob_choice: creatures
  chosen_spanish: criaturas
  alternatives_spanish:
  - animales
  - seres
  - bestias
  lexicon: LSJ
  rationale: El término griego es amplio; la revisión inglesa corrigió una restricción excesiva a 'creeping creatures'. 'Criaturas' refleja mejor la amplitud semántica sin cerrar la referencia a reptiles u otras especies.
- source_word: ἐβασανίσθησαν
  english_pob_choice: were tormented
  chosen_spanish: fueron atormentados
  alternatives_spanish:
  - fueron afligidos
  - sufrieron tormentos
  - fueron torturados
  lexicon: LSJ
  rationale: '''Atormentados'' preserva la intensidad del sufrimiento sin volverlo excesivamente forense o técnico como ''torturados''.'
theological_decisions:
- issue: Correspondencia retributiva entre pecado y castigo
  english_pob_reading: The punishment is rendered as fittingly corresponding to the means ('by similar things') without expanding the principle beyond the verse.
  chosen_spanish_reading: El castigo se presenta como correspondencia justa y semejante, sin ampliar el principio más allá del enunciado del versículo.
  alternative_spanish_readings:
  - por las mismas cosas
  - por los mismos medios
  - con el mismo tipo de instrumentos
  rationale: '''Cosas semejantes'' conserva la relación de similitud del griego y evita introducir una paráfrasis más interpretativa que el texto no exige. Se preserva la tensión teológica de una retribución proporcionada.'
  doctrine_reference: Preservar la tensión teológica; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'creeping creatures' a 'creatures' para reflejar con mayor precisión κνωδάλων. La redacción española sigue esa revisión y evita restringir el campo semántico a reptiles o bichos rastreros.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' según el proyecto, pero en este versículo no aparecen nombres divinos.
  - '''Por tanto'' reproduce la inferencia lógica de διὰ τοῦτο con estilo natural en español.'
  - '''Cosas semejantes'' y ''criaturas'' conservan la amplitud semántica indicada por el audit trail inglés.'
