revisions:
- from: Pero yo[a] he confiado en tu amor constante; mi corazón se gozará en tu salvación. Cantaré a Yahvé, porque me ha tratado con abundancia.
  to: Pero yo[a] he confiado en tu amor constante; mi corazón se gozará en tu salvación[b]. Cantaré a Yahvé, porque me ha colmado de bienes.
  rationale: Se corrige la cláusula final para un español más idiomático y más fiel al valor benéfico de גָמַל עָלַי, y se añade la nota léxica requerida para preservar la amplitud semántica de יְשׁוּעָה según el rastro auditado en inglés. El resto del verso puede mantenerse.
