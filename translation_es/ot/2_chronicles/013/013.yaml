    text: Or 'the ambush force' or 'the men in ambush.' The Hebrew noun can denote the ambush as a tactic or the troops lying in wait.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'Jeroboam.' The form 'Yarobam' more directly reflects the Hebrew name יָרָבְעָם.
    reason: lexical_alternative
