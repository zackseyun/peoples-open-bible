review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: llamado de atención a Judá, Jerusalén y al rey; fórmula profética con Yahvé; doble prohibición de temer/desfallecer; causa en vista de la gran multitud; y contraste posesivo de que la batalla pertenece a Dios. Sin embargo, hay un problema de nota: la nota [a] está anclada en «Y dijo[a]» pero su contenido comenta la cláusula final «porque la batalla no es de ustedes, sino de Dios», así que no preserva correctamente la relación entre ancla y nota del rastro de auditoría inglés.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Escuchen», «todo Judá», «los habitantes de Jerusalén», y «Así dice Yahvé» funcionan bien. «Ni se desanimen» es aceptable y readable, aunque algo más suave que «no se acobarden / no se desalienten». No exige cambio. El ajuste necesario es técnico-editorial: mover la nota al segmento pertinente o eliminarla; dado que la nota inglesa preserva una alternativa léxica real («belongs to God»), conviene conservarla y anclarla donde corresponde.'
  glossary_alignment: 'Se respeta bien la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהִים → «Dios». No hay conflicto con términos doctrinales principales. «Josafat» es forma española estándar. La nota debe reflejar la alternativa léxica documentada, idealmente como «o: “porque la batalla no les pertenece a ustedes, sino que pertenece a Dios”».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: El marcador aparece en «Y dijo[a]», pero la nota explica la cláusula final sobre la pertenencia de la batalla. Las instrucciones exigen que el marcador aparezca en la palabra o frase relevante.
  - severity: low
    issue: El contenido de la nota no expresa claramente la alternativa léxica preservada por el inglés.
    rationale: La nota actual repite esencialmente la misma redacción del texto principal. El rastro inglés distingue la alternativa «belongs to God», por lo que en español conviene reflejar esa opción de forma más explícita.
  revised_spanish_text: 'Y dijo: «Escuchen, todo Judá y los habitantes de Jerusalén, y el rey Josafat: Así dice Yahvé para ustedes: “No teman ni se desanimen por causa de esta gran multitud, porque la batalla no es de ustedes, sino de Dios[a]”».'
  revised_footnotes:
