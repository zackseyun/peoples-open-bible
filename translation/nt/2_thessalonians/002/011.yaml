theological_decisions:
- issue: Divine agency in judicial hardening
  chosen_reading: God sends them a working of delusion
  alternative_readings:
  - God permits a working of delusion to come upon them
  - God gives them over to delusion
  rationale: The Greek explicitly states God as the subject of πέμπει ('sends'). The translation should not weaken this to mere permission, though interpreters may explain the mode of divine action differently. Preserving the direct wording maintains the theological tension of divine judgment in response to human rejection of the truth, in keeping with the translation philosophy not to resolve tensions the text itself leaves standing.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
