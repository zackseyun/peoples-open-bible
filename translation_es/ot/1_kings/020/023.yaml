base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/023.yaml
  text: And the servants of the king of Aram said to him[a], “Their gods are gods of the hills; therefore they were stronger than we were. But if we fight against them on the plain, surely we will be stronger than they are.”
  footnotes:
