  glossary_alignment: No hay términos teológicos de alta sensibilidad aquí. La revisión propuesta mejora la alineación con la decisión léxica documentada para γερουσία («consejo de ancianos») y mantiene la alternativa institucional en nota. «Pueblo» para ἔθνος es aceptable como excepción contextual frente a «nación», dado que aquí funciona como destinatario colectivo y no como concepto político fuerte.
