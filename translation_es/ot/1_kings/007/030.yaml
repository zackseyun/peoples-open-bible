translation:
  language: es
  text: Y la plataforma[a] tenía cuatro ruedas de bronce y ejes de bronce, y sus cuatro esquinas tenían soportes[c] para ellas; debajo de la pila, los soportes estaban fundidos, cada uno junto al adorno de guirnalda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘base’ para ‘plataforma’ (hebreo מְכוֹנָה), refiriéndose a la estructura con ruedas debajo de la pila.
    reason: lexical_alternative
  - marker: b
    text: El término final puede referirse a guirnaldas o festones decorativos; ‘adorno de guirnalda’ refleja ese sentido probable.
    reason: lexical_alternative
  - marker: c
    text: Hebreo כְּתֵפֹת significa literalmente ‘hombros’; aquí probablemente se refiere a piezas de apoyo salientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹפַנֵּי נְחֹשֶׁת
  english_pob_choice: bronze wheels
  chosen_spanish: ruedas de bronce
  alternatives_spanish:
  - ruedas de cobre
  lexicon: HALOT
  rationale: אוֹפַנִּים designa ruedas, y נְחֹשֶׁת en este contexto arquitectónico/ritual se entiende mejor como bronce que como cobre. 'Ruedas de bronce' conserva el sentido técnico y suena natural en español.
- source_word: לַמְּכוֹנָה הָאַחַת
  english_pob_choice: the one stand
  chosen_spanish: el único soporte
  alternatives_spanish:
  - el soporte
  - la base
  lexicon: HALOT
  rationale: מְכוֹנָה aquí se refiere a la estructura que sostiene la pila. 'Soporte' transmite bien la función en español; 'único' refleja el valor del numeral con artículo en la descripción del objeto.
- source_word: סַרְנֵי נְחֹשֶׁת
  english_pob_choice: bronze axles
  chosen_spanish: ejes de bronce
  alternatives_spanish:
  - barras de bronce
  - varillas de bronce
  lexicon: HALOT
  rationale: En el contexto de ruedas, סַרְנִים se entiende mejor como piezas axiales o de eje. 'Ejes' conserva la función mecánica y mantiene la claridad en español.
- source_word: פַעֲמֹתָיו
  english_pob_choice: its four corners
  chosen_spanish: sus cuatro esquinas
  alternatives_spanish:
  - sus cuatro soportes
  - sus cuatro pies
  lexicon: HALOT
  rationale: La revisión inglesa optó por 'corners' en vez de 'feet' para reflejar mejor el término estructural. 'Esquinas' preserva esa decisión y resulta más natural en una descripción de un objeto metálico.
- source_word: כְּתֵפֹת
  english_pob_choice: supports
  chosen_spanish: soportes
  alternatives_spanish:
  - hombros
  - salientes
  - piezas laterales
  lexicon: HALOT
  rationale: Literalmente significa 'hombros', pero aquí describe piezas de apoyo salientes. 'Soportes' comunica función sin perder el valor arquitectónico del término.
- source_word: מִתַּחַת לַכִּיֹּר
  english_pob_choice: beneath the basin
  chosen_spanish: debajo de la pila
  alternatives_spanish:
  - debajo de la fuente
  - debajo del lavabo
  lexicon: HALOT
  rationale: כִּיּוֹר se refiere a una pila o lavabo ritual; 'pila' es una opción tradicional y clara en español bíblico, adecuada al contexto del templo.
- source_word: יְצֻקוֹת
  english_pob_choice: were cast
  chosen_spanish: fueron fundidos
  alternatives_spanish:
  - fueron vaciados
  - fueron moldeados
  lexicon: HALOT
  rationale: En metalurgia, la forma pasiva de יצק se expresa naturalmente como 'fueron fundidos'. Mantiene la idea técnica de piezas fabricadas por vaciado de metal.
- source_word: מֵעֵבֶר אִישׁ
  english_pob_choice: each beside
  chosen_spanish: uno junto a cada
  alternatives_spanish:
  - cada uno junto a
  - a cada lado de
  lexicon: HALOT
  rationale: El giro indica distribución individual relativa a otro elemento. 'Uno junto a cada' conserva el valor distributivo sin imponer una geometría más precisa que la que el hebreo exige.
- source_word: לֹיּוֹת
  english_pob_choice: wreathwork
  chosen_spanish: adorno de guirnalda
  alternatives_spanish:
  - guirnalda
  - adornos de festón
  lexicon: HALOT
  rationale: El término raro probablemente alude a ornamentación tipo guirnalda o festón. 'Adorno de guirnalda' comunica la idea decorativa y permite reflejar la ambigüedad del hebreo.
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa que prefirió ‘corners’ frente a ‘feet’ para פַעֲמֹתָיו, y mantiene la descripción técnica del soporte con ruedas, ejes, esquinas y piezas de apoyo, sin suavizar la terminología arquitectónica.
  spanish_consistency_notes:
  - Se conserva ‘bronce’ para נְחֹשֶׁת en armonía con la terminología POB inglesa.
  - Se evita ‘SEÑOR’ u otras sustituciones no pertinentes; este versículo es puramente descriptivo y no plantea cuestiones del Nombre divino.
  - ‘Pila’ se usa por claridad bíblica y técnica en español, en lugar de un término más moderno que desdibuje el contexto del templo.
