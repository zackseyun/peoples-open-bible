translation:
  language: es
  text: Ellos rechazaron sus estatutos y su pacto que había hecho con sus padres, y sus testimonios con los que los había amonestado.[c] Siguieron tras la vaciedad[a] y se volvieron vacíos[b], y tras las naciones que estaban alrededor de ellos, respecto de las cuales Yahvé les había mandado que no hicieran como ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «vaciedad» también puede significar «vacío», «inutilidad» o, por implicación en este contexto, «ídolos».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo hace un juego de palabras con términos relacionados: «fueron tras la vaciedad» y «se volvieron vacíos»; es decir, quedaron vacíos o inútiles como aquello que siguieron.'
    reason: lexical_alternative
  - marker: c
    text: O «sus testimonios que había testificado contra ellos» / «sus advertencias con las que los había advertido».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְאֲסוּ
  english_pob_choice: They rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - despreciaron
  - rechazaron por completo
  lexicon: HALOT
  rationale: מָאַס expresa rechazo o desdén. «Rechazaron» conserva la fuerza de la negativa del pacto sin añadir un matiz emocional más fuerte que el hebreo.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: חֹק/חֻקִּים se refiere a disposiciones normativas. «Estatutos» mantiene el sentido legal-covenantal y se articula bien con «pacto» y «testimonios».
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su tratado
  lexicon: HALOT
  rationale: בְּרִית en este contexto de relación de Yahvé con Israel puede verterse como «pacto»; en español bíblico es claro y conserva el peso relacional y jurídico.
- source_word: כָּרַת
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - había cortado
  - había establecido
  lexicon: HALOT
  rationale: El hebreo literalmente dice «cortar» un pacto, pero en español «había hecho» comunica con naturalidad la acción pactal sin perder el referente al acto de concertar el pacto.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: La forma hebrea es literalmente masculina plural. «Sus padres» conserva la expresión fórmula del pacto; no se generaliza a «antepasados» sin necesidad textual.
- source_word: עֵדְוֺתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus advertencias
  - sus declaraciones testimoniales
  lexicon: HALOT
  rationale: עֵדוֹת puede designar testimonios de carácter pactal. «Testimonios» preserva la conexión léxica con el hebreo y deja que el verbo siguiente precise su función admonitoria.
- source_word: הֵעִיד בָּם
  english_pob_choice: he had warned them with
  chosen_spanish: los había amonestado
  alternatives_spanish:
  - les había testificado contra ellos
  - los había advertido solemnemente
  lexicon: HALOT
  rationale: El hifil de עוּד puede implicar advertir solemnemente o dar testimonio con valor de amonestación. «Amonestado» comunica bien esa fuerza en español; la idea instrumental de las «advertencias/testimonios» queda integrada de manera más natural que una construcción muy literal.
- source_word: הַהֶבֶל
  english_pob_choice: emptiness
  chosen_spanish: la vaciedad
  alternatives_spanish:
  - la vacuidad
  - la vaciedad de lo vano
  - la vanidad
  lexicon: HALOT
  rationale: הֶבֶל denota vacío, fugacidad, inutilidad. «Vaciedad» expresa bien la falta de sustancia y evita, en este contexto, la ambigüedad moderna de «vanidad» como orgullo.
- source_word: וַיֶּהְבָּלוּ
  english_pob_choice: became empty
  chosen_spanish: se volvieron vacíos
  alternatives_spanish:
  - se hicieron vacíos
  - se volvieron vanos
  - quedaron vacíos
  lexicon: HALOT
  rationale: 'El hebreo hace juego sonoro con הֶבֶל: siguieron lo vacío y se vaciaron. «Se volvieron vacíos» mantiene la relación semántica y la paronomasia en una forma española clara.'
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico גּוֹיִם se refiere a las naciones vecinas. «Las naciones» es la opción más natural y precisa en español.
- source_word: סְבִיבֹתָם
  english_pob_choice: that were around them
  chosen_spanish: que estaban alrededor de ellos
  alternatives_spanish:
  - a su alrededor
  - que los rodeaban
  lexicon: HALOT
  rationale: El sufijo pronominal indica proximidad circundante. La relativa «que estaban alrededor de ellos» conserva el matiz descriptivo del hebreo y fluye bien en español.
- source_word: צִוָּה יְהוָה
  english_pob_choice: the LORD had commanded
  chosen_spanish: Yahvé había mandado
  alternatives_spanish:
  - Yahvé había ordenado
  - el SEÑOR había mandado
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la política del proyecto. «Había mandado» refleja bien צִוָּה y mantiene el tiempo previo respecto de la desobediencia narrada.
- source_word: לְבִלְתִּי עֲשׂוֹת כָּהֶם
  english_pob_choice: not to do as they did
  chosen_spanish: no hacer como ellas hacían
  alternatives_spanish:
  - no hacer como ellos
  - no actuar como ellas
  lexicon: HALOT
  rationale: La construcción prohibitiva expresa no imitar las prácticas de las naciones. En español, «no hacer como ellas hacían» conserva la comparación explícita del hebreo; el referente se adapta al antecedente «las naciones».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Conforme al estándar del proyecto, se vierte «Yahvé» para preservar el nombre pactal de Dios en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: contested terms for יְהוָה / YHWH'
- issue: Juego de palabras entre הֶבֶל y וַיֶּהְבָּלוּ
  english_pob_reading: They went after emptiness and became empty
  chosen_spanish_reading: Siguieron tras la vaciedad y se volvieron vacíos
  alternative_spanish_readings:
  - Siguieron tras la vacuidad y se vaciaron
  - Fueron tras lo vano y se volvieron vanos
  rationale: Conviene preservar en español la relación semántica y el juego de palabras del hebreo. «Vaciedad / vacíos» transmite bien la idea de seguir lo sin sustancia y terminar sin sustancia.
  doctrine_reference: 'Poética hebrea: paronomasia de הֶבֶל / הבל'
translation_notes:
  revision_awareness: La versión inglesa más reciente suaviza la antigua literalidad «with which he had warned them» y resuelve el juego de הֶבֶל con «emptiness/empty». La presente redacción española sigue esa revisión al usar una formulación natural para «amonestado» y una pareja semántica «vaciedad / vacíos» que conserva el paralelismo y el juego de palabras del hebreo. También ajusta el final para reflejar la prohibición de imitación de las naciones de forma idiomática y fiel.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene la tríada legal-covenantal «estatutos / pacto / testimonios» como en el hebreo y el audit trail en inglés.
  - Se evita «Cristo» y otras sustituciones no pertinentes; no hay términos cristológicos en el versículo.
  - «Sus padres» se conserva literalmente por la fórmula pactal, con nota para la posible lectura como «antepasados».
  - La paronomasia de הֶבֶל se refleja con «vaciedad / vacíos» para no perder la tensión semántica y poética.
