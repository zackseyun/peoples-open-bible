translation:
  text: And when Achior saw all that the God of Israel had done[a], he believed in God greatly, and he circumcised the flesh of his foreskin[b], and was joined to the house of Israel to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he trusted God greatly.' The Greek uses πιστεύω language, which can emphasize belief, faith, or trust depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'was added to the house of Israel.' The phrase describes Achior's incorporation into the people of Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδών
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main actions. 'When ... saw' gives natural English while preserving the temporal-causal force.
- source_word: πάντα ὅσα ἐποίησεν
  chosen: all that ... had done
  alternatives:
  - everything that ... did
  - all the things that ... had done
  lexicon: BDAG
  rationale: The idiom means the totality of God's acts just narrated. 'All that ... had done' is idiomatic and sufficiently formal.
- source_word: ὁ θεὸς τοῦ Ἰσραήλ
  chosen: the God of Israel
  lexicon: BDAG
  rationale: Standard genitival title; no reason to paraphrase.
- source_word: ἐπίστευσεν τῷ θεῷ σφόδρα
  chosen: he believed in God greatly
  alternatives:
  - he had great faith in God
  - he believed God deeply
  - he trusted God greatly
  lexicon: BDAG
  rationale: The verb is πιστεύω, and the project's default for πίστις-family terms favors 'faith/believe.' The dative object is naturally rendered 'in God' in English here, expressing conversion-like trust. σφόδρα intensifies the action; 'greatly' preserves the adverb, though somewhat literal.
- source_word: περιέτεμετο
  chosen: he circumcised
  alternatives:
  - he was circumcised
  lexicon: BDAG
  rationale: Middle voice here can be rendered in English as an active with reflexive sense in context. Since the following object specifies his own foreskin, 'he circumcised' is concise and faithful without overexplaining.
- source_word: τὴν σάρκα τῆς ἀκροβυστίας αὐτοῦ
  chosen: the flesh of his foreskin
  alternatives:
  - his foreskin's flesh
  - the flesh of his uncircumcision
  lexicon: BDAG
  rationale: A formal rendering preserves the concrete wording of the Greek and avoids euphemistic paraphrase.
- source_word: προσετέθη
  lemma: προστίθημι
  chosen: was joined
  alternatives:
  - was added
  - attached himself
  lexicon: BDAG
  rationale: Passive form from προστίθημι in covenant/community contexts often means being added to a people. 'Was joined' is natural English and conveys incorporation into Israel.
- source_word: πρὸς τὸν οἶκον Ἰσραήλ
  chosen: to the house of Israel
  alternatives:
  - to the household of Israel
  - to Israel
  lexicon: BDAG
  rationale: '''House of Israel'' is a standard biblical expression and should be preserved rather than flattened.'
- source_word: ἕως τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  lexicon: BDAG
  rationale: Conventional English equivalent for the Greek idiom, preserving the narrator's present-time perspective.
