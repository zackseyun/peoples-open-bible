translation:
  language: es
  text: Entonces Joram cruzó a Zair[a], con todos los carros que tenía consigo. Y se levantó de noche y atacó a Edom, que lo había rodeado, y a los comandantes de los carros; pero el pueblo huyó a sus tiendas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'a Seir'; el nombre hebreo צָעִירָה es difícil, y algunos lo entienden como una variante relacionada con Seir/Edom más que como el topónimo distinto Zair.
    reason: alternative_reading
  - marker: b
    text: '''Huyó a sus tiendas'' es un modismo hebreo que significa que se dispersaron y regresaron a sus hogares.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: pasó a
  alternatives_spanish:
  - cruzó a
  - pasó hacia
  lexicon: HALOT
  rationale: עבר puede significar pasar o cruzar. En español, 'pasó a' conserva el movimiento narrativo y militar sin añadir demasiado sobre la ruta exacta.
- source_word: צָעִירָה
  english_pob_choice: Zair
  chosen_spanish: Zair
  alternatives_spanish:
  - Seir
  - Zehir
  lexicon: HALOT
  rationale: La vocalización masorética se toma aquí como nombre propio. Se mantiene 'Zair' en el texto principal y la posibilidad de leerlo como una forma relacionada con Seir se deja en nota.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - la fuerza de carros
  - la caballería
  lexicon: HALOT
  rationale: רֶכֶב designa aquí el conjunto de carros de guerra. 'Carros' es la forma más directa y natural en español para este contexto.
- source_word: קָם לַיְלָה
  english_pob_choice: arose by night
  chosen_spanish: se levantó de noche
  alternatives_spanish:
  - se alzó de noche
  - se levantó por la noche
  lexicon: HALOT
  rationale: La expresión idiomática indica acción nocturna. 'Se levantó de noche' mantiene el sentido del hebreo y funciona con naturalidad en español narrativo.
- source_word: וַיַּכֶּה
  english_pob_choice: struck
  chosen_spanish: atacó
  alternatives_spanish:
  - hirió
  - golpeó
  - derribó
  lexicon: HALOT
  rationale: נכה es amplio, pero en este pasaje el resultado militar exige más que 'golpeó'. 'Atacó' comunica la acción bélica sin forzar una derrota total explícita.
- source_word: אֱדוֹם הַסֹּבֵיב אֵלָיו
  english_pob_choice: Edom, which had surrounded him
  chosen_spanish: a Edom, que lo había rodeado
  alternatives_spanish:
  - a los edomitas que lo rodeaban
  - a Edom, que lo cercaba
  lexicon: HALOT
  rationale: El participio con artículo describe a Edom como rodeándolo. La cláusula relativa española conserva la imagen militar del cerco.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: a los jefes de los carros
  alternatives_spanish:
  - a los comandantes de los carros
  - a los oficiales de los carros
  lexicon: HALOT
  rationale: שָׂרִים son jefes o comandantes. 'Jefes de los carros' conserva la relación constructa y resulta claro en español, sin sustituir el término por una categoría más moderna que el texto no exige.
- source_word: וַיָּנָס הָעָם לְאֹהָלָיו
  english_pob_choice: the people fled to their tents
  chosen_spanish: el pueblo huyó a sus tiendas
  alternatives_spanish:
  - la gente huyó a sus tiendas
  - el pueblo se dispersó y volvió a sus hogares
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'sus tiendas' para respetar el modismo militar. 'Pueblo' traduce הָעָם de forma amplia, sin reducirlo a 'tropas' más de lo que el hebreo permite.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última pasada; la revisión más reciente indica que no hubo cambios necesarios. La versión española sigue ese mismo criterio, conservando las decisiones léxicas principales y la nota alternativa sobre צָעִירָה.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce רֶכֶב como 'carros' por el contexto militar; 'caballería' se evitó para no introducir un anacronismo interpretativo.
  - Se mantiene la imagen hebrea de 'sus tiendas' en lugar de normalizarla como 'sus hogares'.
