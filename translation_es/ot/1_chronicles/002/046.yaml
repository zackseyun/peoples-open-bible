translation:
  language: es
  text: Y Efá, la concubina de Caleb, dio a luz a Harán, a Moza y a Gazez; y Harán[a] engendró a Gazez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Harán llegó a ser padre de Gazez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּילֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - esposa secundaria
  lexicon: HALOT
  rationale: El término hebreo designa a una mujer con estatus marital reconocido pero subordinado. En español, «concubina» comunica esa relación con la misma fuerza lexical que la traducción inglesa auditada.
- source_word: יָֽלְדָ֛ה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En un registro genealógico, la acción de una mujer se expresa de forma natural y precisa con «dio a luz». Evita la dureza de «parió» y no confunde el sujeto femenino con el verbo masculino «engendró».
- source_word: הֹלִ֥יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - llegó a ser padre de
  lexicon: HALOT
  rationale: El hifil de ילד en genealogías señala la paternidad activa. «Engendró» conserva la fuerza genealógica y evita una paráfrasis más larga.
- source_word: עֵיפָה
  english_pob_choice: Ephah
  chosen_spanish: Efá
  alternatives_spanish:
  - Efa
  lexicon: transliteración onomástica
  rationale: Se translitera el nombre propio según la práctica del proyecto. «Efá» mantiene la vocalización breve y es legible en español bíblico moderno.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: transliteración onomástica
  rationale: Nombre propio ya asentado en español bíblico; se conserva la forma tradicional y clara «Caleb».
- source_word: חָרָן
  english_pob_choice: Haran
  chosen_spanish: Harán
  alternatives_spanish:
  - Haran
  lexicon: transliteración onomástica
  rationale: Se añade tilde para acomodar la prosodia española y distinguir el nombre propio en lectura pública, sin alterar la transliteración.
- source_word: מוֹצָא
  english_pob_choice: Moza
  chosen_spanish: Moza
  alternatives_spanish:
  - Motsa
  lexicon: transliteración onomástica
  rationale: Se sigue la transliteración convencional del expediente inglés auditado, que ya opta por «Moza».
- source_word: גָּזֵז
  english_pob_choice: Gazez
  chosen_spanish: Gazez
  alternatives_spanish:
  - Gazez
  lexicon: transliteración onomástica
  rationale: Nombre propio conservado de forma consistente en ambas menciones del versículo.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: La coordinación genealógica simple se expresa con «y». No se usa «e» porque los nombres siguientes no comienzan con sonido /i/.
- source_word: אֶת
  english_pob_choice: '[not translated separately]'
  chosen_spanish: '[no se traduce por separado]'
  alternatives_spanish:
  - marcador de objeto directo implícito
  lexicon: partícula hebrea
  rationale: Como en la traducción inglesa auditada, el marcador de objeto directo no tiene equivalente directo en español y se refleja por el orden de palabras.
translation_notes:
  revision_awareness: El expediente inglés no muestra revisiones sustantivas ni problemas textuales; el texto hebreo masorético y la traducción inglesa coinciden de manera alta. La nota alternativa sobre Harán se conserva porque el hebreo permite tanto una lectura verbal genealógica como una formulación más explicativa en español.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Caleb» por ser forma bíblica asentada en español, mientras otros nombres se transliteran con ajuste gráfico mínimo.
  - Se evita «SEÑOR» o terminología teológica ajena al versículo, ya que el texto es puramente genealógico.
  - La puntuación en serie de nombres sigue el orden del original y la cadencia natural del español bíblico moderno.
