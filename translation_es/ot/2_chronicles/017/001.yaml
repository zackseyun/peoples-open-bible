translation:
  language: es
  text: Y Josafat su hijo llegó a ser rey en su lugar, y afianzó su poder sobre Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se fortaleció sobre Israel». El verbo hebreo es reflexivo y puede expresar fortalecerse, establecerse o consolidarse.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «Israel» se refiere al reino del norte, en contraste con Judá.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a reinar
  - comenzó a reinar
  lexicon: HALOT
  rationale: En español, «reinó» comunica la entronización y el ejercicio inicial del cargo de manera natural y digna. Mantiene el valor sucesorio del verbo hebreo sin añadir una perífrasis innecesaria.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma bíblica española más reconocible y estable. Conserva la identificación del personaje sin transliteración demasiado rígida.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: La relación filial explícita es importante para la sucesión dinástica; «su hijo» la expresa con naturalidad y fidelidad.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» reproduce bien la noción de sucesión real y es idiomático en español. Evita sobreespecificar la relación política más allá del hebreo.
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se estableció
  - cobró fuerza
  lexicon: HALOT
  rationale: El hitpael es reflexivo; «se fortaleció» conserva esa fuerza reflexiva y el sentido de consolidación/potenciación sin interpretar excesivamente.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - en relación con
  lexicon: HALOT
  rationale: El auditrack inglés revisó la opción hacia una idea de dominio/fortalecimiento sobre el ámbito referido, no de hostilidad. En español, «sobre» preserva esa relación sin cargar el verso con una oposición que el contexto no exige.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el reino de Israel
  - el reino del norte
  lexicon: Contexto histórico del libro de Crónicas
  rationale: Se conserva el término fuente. El contexto histórico sugiere el reino del norte, pero el texto principal no lo amplía, para no perder la forma original.
theological_decisions:
- issue: Referente de «Israel» en el contexto de la monarquía dividida
  english_pob_reading: Israel refers to the northern kingdom in political opposition to Judah.
  chosen_spanish_reading: Israel se refiere al reino del norte en contraste político con Judá.
  alternative_spanish_readings:
  - Israel como el pueblo de Israel en sentido amplio
  - Israel como territorio, de forma general
  rationale: La lectura histórica contextual es la más probable en Crónicas. Se mantiene en el texto principal la forma «Israel» y se deja la aclaración implícita en la nota, sin convertirla en una expansión interpretativa del versículo.
  doctrine_reference: Contexto histórico-canónico de 2 Crónicas; distinción entre Judá e Israel en la monarquía dividida
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que prefirió una relación de fortalecimiento «over Israel» en vez de una lectura de hostilidad. Por eso el español usa «sobre Israel» y no «contra Israel».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto para el Tetragrámaton, aunque este versículo no lo contiene.
  - Se usa «Josafat» como forma española estándar para el nombre propio.
  - Se conserva la estructura breve y cronística del hebreo sin añadir explicaciones al cuerpo del texto.
