id: 2TH.1.3
reference: 2 Thessalonians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐχαριστεῖν ὀφείλομεν τῷ θεῷ πάντοτε περὶ ὑμῶν, ἀδελφοί, καθὼς ἄξιόν ἐστιν, ὅτι ὑπεραυξάνει ἡ πίστις ὑμῶν καὶ πλεονάζει ἡ ἀγάπη ἑνὸς ἑκάστου πάντων ὑμῶν εἰς ἀλλήλους,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/003.yaml
  text: We ought always to give thanks to God for you[a], brothers, as is fitting, because your faith is growing abundantly and the love of each and every one of you for one another is increasing[c][b],
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can address the whole believing community inclusively.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제[a] 여러분, 우리는 여러분에 대하여 마땅한 일로서 언제나 하나님께 감사드려야 합니다. 여러분의 믿음[b]이 크게 자라며, 여러분 각자 모두가 서로에게 베푸는 사랑이 풍성해지고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수 호격이지만 바울의 용법상 회중 전체를 대표적으로 부르는 경우가 많다. DOCTRINE.md의 「성별 정확성 우선」 원칙에 따라 본문에서는 「형제」를 유지한다.
    reason: cultural_note
  - marker: b
    text: 또는 「신실함」. 헬라어 πίστις는 「믿음」, 「신뢰」, 「신실함」을 함께 가리킬 수 있으나 기본 번역은 「믿음」이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστεῖν ὀφείλομεν
  english_pob_choice: We ought ... to give thanks
  chosen_korean: 감사드려야 합니다
  alternatives_korean:
  - 감사할 의무가 있습니다
  - 감사하지 않을 수 없습니다
  lexicon: BDAG
  rationale: ὀφείλομεν은 도덕적·목회적 의무를 가리킨다. 합쇼체 격식과 하나님을 대상으로 한 경어를 함께 살려 「감사드려야 합니다」로 옮긴다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  - 형제들
  lexicon: BDAG
  rationale: DOCTRINE.md의 성별 정확성 원칙에 따라 본문에서는 「형제」를 유지하고, 회중 전체를 가리키는 대표적 용법은 각주로 보충한다.
- source_word: καθὼς ἄξιόν ἐστιν
  english_pob_choice: as is fitting
  chosen_korean: 마땅한 일로서
  alternatives_korean:
  - 마땅한 바와 같이
  - 합당한 일로서
  lexicon: BDAG
  rationale: 도덕적 적절성을 가리키는 ἄξιον의 정합성을 「마땅한 일로서」로 자연스럽게 표현한다.
- source_word: ὑπεραυξάνει
  english_pob_choice: is growing abundantly
  chosen_korean: 크게 자라며
  alternatives_korean:
  - 매우 자라며
  - 풍성하게 자라며
  lexicon: BDAG
  rationale: 합성동사의 강조적 의미를 「크게 자라며」로 옮겨 단순한 증가 이상의 폭발적 성장을 표현한다.
- source_word: πλεονάζει
  english_pob_choice: is increasing
  chosen_korean: 풍성해지고 있기
  alternatives_korean:
  - 넘쳐나고 있기
  - 더해지고 있기
  lexicon: BDAG
  rationale: ὑπεραυξάνει와 짝을 이루는 점층적 표현으로 「풍성해지고 있다」가 자연스럽다.
- source_word: ἑνὸς ἑκάστου πάντων ὑμῶν
  english_pob_choice: of each and every one of you
  chosen_korean: 여러분 각자 모두가
  alternatives_korean:
  - 여러분 한 사람 한 사람 모두가
  - 여러분 모두 각자가
  lexicon: BDAG
  rationale: 헬라어의 강조적 중복(ἑνός + ἑκάστου + πάντων)을 한국어 강조 표현 「각자 모두」로 살린다.
- source_word: εἰς ἀλλήλους
  english_pob_choice: for one another
  chosen_korean: 서로에게 베푸는
  alternatives_korean:
  - 서로를 향한
  - 서로에 대한
  lexicon: BDAG
  rationale: 사랑의 상호 방향성을 「서로에게 베푸는」으로 자연스럽게 옮긴다.
theological_decisions:
- issue: ἀδελφοί를 회중 전체 호칭으로 본문에서 어떻게 표시할 것인가
  chosen_reading: 형제 (각주로 회중 전체 대표 용법 보충)
  alternative_readings:
  - 형제자매
  rationale: DOCTRINE.md는 성별 정확성을 본문에서 유지하고 포용적 의미는 각주로 보충하도록 지시한다.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: πίστις 번역
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  - 신뢰
  rationale: 기본 번역은 「믿음」이며, 박해 정황상 「신실함」의 음영이 함께 작동할 수 있어 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith'
