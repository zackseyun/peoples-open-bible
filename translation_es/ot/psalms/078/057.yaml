translation:
  language: es
  text: Pero ellos volvieron atrás y obraron traicioneramente como sus padres; se apartaron como un arco engañoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «como un arco flojo» o «como un arco defectuoso»: es decir, un arco en el que no se puede confiar para disparar con precisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּגוּ
  english_pob_choice: turned back
  chosen_spanish: se volvieron atrás
  alternatives_spanish:
  - retrocedieron
  - se apartaron
  - volvieron atrás
  lexicon: HALOT
  rationale: סוּג expresa retirada o regreso atrás de un curso previo. «Se volvieron atrás» conserva el movimiento de retroceso con buen español natural y sin introducir un matiz técnico ajeno al contexto.
- source_word: וַיִּבְגְּדוּ
  english_pob_choice: acted treacherously
  chosen_spanish: obraron traicioneramente
  alternatives_spanish:
  - actuaron traicioneramente
  - fueron infieles
  - traicionaron
  lexicon: HALOT
  rationale: בגד comunica traición o infidelidad moral. «Obraron traicioneramente» mantiene el peso verbal y la carga ética, y evita suavizar el término con una formulación menos fuerte.
- source_word: כַּאֲבוֹתָם
  english_pob_choice: like their fathers
  chosen_spanish: como sus padres
  alternatives_spanish:
  - como sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». Se conserva ese parentesco masculino explícito, en vez de neutralizarlo a «antepasados», para respetar la forma del texto fuente.
- source_word: נֶהְפְּכוּ
  english_pob_choice: turned aside
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se desviaron
  - se volvieron aparte
  - fueron torcidos
  lexicon: HALOT
  rationale: En este contexto pasivo/reflexivo de הפך, la idea es desviarse o apartarse en paralelo con la imagen del arco. «Se apartaron» es directo y natural en español, y conserva la relación con el verbo anterior sin sobrecargar el verso.
- source_word: כְּקֶשֶׁת רְמִיָּה
  english_pob_choice: like a deceitful bow
  chosen_spanish: como un arco engañoso
  alternatives_spanish:
  - como un arco falaz
  - como un arco defectuoso
  - como un arco flojo
  lexicon: HALOT
  rationale: 'קשת es «arco». רמיה puede implicar engaño, flojedad o falta de confiabilidad. «Arco engañoso» sigue la decisión principal del POB inglés y conserva la ambigüedad útil: un arco que no cumple de manera fiable lo que promete.'
theological_decisions:
- issue: Infidelidad moral sin explicitar más de lo que dice el verso
  english_pob_reading: Render the verbs in morally charged terms without expanding into explicit covenant terminology not stated in the verse.
  chosen_spanish_reading: Mantener verbos de traición y desviación sin añadir una explicación doctrinal explícita.
  alternative_spanish_readings:
  - fueron infieles a Dios
  - quebraron el pacto
  - apostataron
  rationale: El contexto del salmo es de deslealtad del pueblo, pero este verso en sí habla de traición y desvío. La traducción conserva esa tensión sin añadir objeto explícito ni resolverla con terminología doctrinal que el hebreo aquí no formula.
  doctrine_reference: Preservar la tensión textual; no importar afirmaciones doctrinales no expresadas por el versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir un equivalente más directo de נֶהְפְּכוּ (‘se apartaron’) en vez de una paráfrasis más marcada. La imagen final del arco se mantiene con la ambigüedad lexical documentada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino cuando aparezca en otros versículos del proyecto; este versículo no lo contiene.
  - Se usó un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Traicioneramente» conserva la fuerza de בגד mejor que una neutralización como «infielmente».
  - La nota al pie preserva la alternativa lexical documentada para רְמִיָּה.
