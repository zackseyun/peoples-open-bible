    reason: lexical_alternative
  - marker: b
    text: Literally 'have come'; idiomatically, 'have come to pass' or 'have happened.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb literally means 'sprout' or 'spring up,' using plant-growth imagery for events not yet visible.
    reason: lexical_alternative
