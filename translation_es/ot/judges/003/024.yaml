translation:
  language: es
  text: 'Cuando él salió[a], sus servidores vinieron y vieron que las puertas del aposento alto estaban aseguradas. Entonces dijeron: “Sin duda está haciendo sus necesidades en el aposento interior fresco”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “cubriendo sus pies”, un eufemismo hebreo para hacer sus necesidades.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא יָצָא
  english_pob_choice: When he had gone out
  chosen_spanish: Cuando él salió
  alternatives_spanish:
  - Y él salió
  - Ahora bien, cuando salió
  lexicon: HALOT
  rationale: El hebreo introduce la acción de salida como antecedente temporal de la llegada de los servidores. En español, "cuando él salió" conserva la relación temporal natural sin añadir información ajena al texto.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus sirvientes
  - sus esclavos
  lexicon: HALOT
  rationale: En este contexto de la casa real, "servidores" comunica bien la función de asistentes del rey. "Esclavos" es posible léxicamente, pero no es el foco narrativo aquí.
- source_word: וַיִּרְאוּ
  english_pob_choice: came and looked
  chosen_spanish: entraron y miraron
  alternatives_spanish:
  - vinieron y vieron
  - entraron y vieron
  lexicon: HALOT
  rationale: El hebreo expresa una llegada seguida de inspección. "Entraron y miraron" comunica en español la secuencia narrativa que el inglés POB resolvió con "came and looked".
- source_word: דַּלְתוֹת הָעֲלִיָּה
  english_pob_choice: the doors of the upper room
  chosen_spanish: las puertas del aposento alto
  alternatives_spanish:
  - las puertas del cuarto alto
  - las puertas del piso alto
  lexicon: HALOT
  rationale: '"Aposento alto" es una expresión natural y fiel para עֲלִיָּה en español bíblico actual. Mantiene la referencia arquitectónica sin volverla innecesariamente técnica.'
- source_word: נְעֻלוֹת
  english_pob_choice: were locked
  chosen_spanish: estaban cerradas
  alternatives_spanish:
  - estaban aseguradas
  - estaban con llave
  lexicon: HALOT
  rationale: 'El participio indica un estado: las puertas se hallaban cerradas/aseguradas. En español, "estaban cerradas" es claro y suficientemente cercano; "con llave" podría sugerir un detalle no explícito.'
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Sin duda
  alternatives_spanish:
  - Ciertamente
  - Seguramente
  lexicon: HALOT
  rationale: La partícula introduce la inferencia de los servidores. "Sin duda" transmite bien esa conclusión asumida en español contemporáneo.
- source_word: מֵסִיךְ ... אֶת רַגְלָיו
  english_pob_choice: he is relieving himself
  chosen_spanish: está aliviando su cuerpo
  alternatives_spanish:
  - está haciendo sus necesidades
  - está cubriéndose los pies
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo literal que alude a la eliminación corporal. En el texto principal, "aliviando su cuerpo" mantiene el pudor idiomático; la nota preserva el sentido literal del hebreo."
- source_word: חֲדַר הַמְּקֵרָה
  english_pob_choice: the cool inner room
  chosen_spanish: la habitación fresca interior
  alternatives_spanish:
  - el aposento fresco interior
  - la cámara fresca interior
  lexicon: HALOT
  rationale: La frase denota un cuarto privado asociado con frescura/ventilación. "Habitación fresca interior" expresa el valor funcional del hebreo con buen español.
translation_notes:
  revision_awareness: El texto español sigue de cerca la solución auditada del POB inglés y conserva la misma decisión eufemística principal, pero la reformula con español natural. No se detectaron revisiones posteriores en el expediente que requirieran ajuste.
  spanish_consistency_notes:
  - Se mantiene "aposento alto" para עֲלִיָּה, conforme a uso bíblico claro y consistente.
  - Se evita "SEÑOR" o terminología teológica no pertinente; el verso es narrativo y no contiene nombres divinos.
  - '"Estaban cerradas" conserva el estado resultante de נְעֻלוֹת sin sobreespecificar el mecanismo de cierre.'
  - La nota al pie preserva la tensión entre el eufemismo literal y el sentido contextual, como en el audit trail inglés.
