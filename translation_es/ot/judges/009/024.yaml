    rationale: Aunque comprensible, en español natural suena más claro ‘la violencia cometida contra’, que conserva el sentido de חמס sin paráfrasis excesiva.
  - severity: low
    issue: ‘Sea puesta sobre’ es fiel pero algo tieso
    rationale: ‘Sea cargada sobre’ mantiene el valor judicial de imputación y resulta más natural en español, sin borrar la imagen original. La nota puede explicar el hebraísmo literal.
