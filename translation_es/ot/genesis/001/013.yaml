translation:
  language: es
  text: Y hubo tarde[a], y hubo mañana—el tercer día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y hubo tarde y hubo mañana, día tercero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: and there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y fue
  - y había
  lexicon: HALOT
  rationale: El verbo היה en esta fórmula narrativa de cierre expresa la llegada/ocurrencia de una etapa del día; en español, «hubo» reproduce con naturalidad el valor de acontecimiento sin sonar forzado. Mantiene el paralelismo del refrán y evita un calco menos idiomático como «y fue» o un imperfecto que debilitaría la culminación narrativa.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: tarde
  alternatives_spanish:
  - atardecer
  - noche
  lexicon: HALOT
  rationale: En el refrán creador, עֶרֶב puede abarcar el tramo vespertino o el inicio del anochecer. «Tarde» conserva esa amplitud y permite una lectura fluida en español; «atardecer» es posible, pero suena más descriptivo y algo más específico que el hebreo en esta fórmula.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - amanecer
  - día siguiente
  lexicon: HALOT
  rationale: בֹּקֶר designa la mañana como contraparte de עֶרֶב. «Mañana» preserva el paralelismo directo con el hebreo y con el refrán inglés de la POB; «amanecer» desplazaría el énfasis hacia el momento inicial de la luz.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  lexicon: HALOT
  rationale: «Día» es la correspondencia normal y directa de יוֹם en esta secuencia numerada de la creación.
- source_word: שְׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: El ordinal modifica a «día»; en español, «tercer» es la forma apocopada natural ante sustantivo masculino singular. Conserva el valor ordinal simple del hebreo sin añadir interpretación.
theological_decisions:
- issue: Cómo traducir el refrán de los días de la creación sin fijar una cronología interpretativa
  english_pob_reading: And there was evening, and there was morning—the third day.
  chosen_spanish_reading: 'Y hubo tarde, y hubo mañana: el tercer día.'
  alternative_spanish_readings:
  - 'Y hubo tarde y hubo mañana: día tercero.'
  - 'Y hubo tarde, y hubo mañana: un tercer día.'
  rationale: La frase hebrea funciona como marcador literario de la secuencia creadora. La traducción escogida mantiene el refrán sin resolver debates sobre duración literal, función litúrgica o estructura literaria de los días. «El tercer día» es la forma más natural en español y no impone una lectura doctrinal específica.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en la traducción.
translation_notes:
  revision_awareness: El texto inglés de la POB ya había optado por una formulación óptima-equivalente y señaló como alternativa más literal «And there was evening and there was morning, day third». La versión española conserva el refrán, pero ajusta el léxico para que suene natural en español sin perder la repetición hebrea ni la ambigüedad temporal del original.
  spanish_consistency_notes:
  - Se preservó el paralelismo repetido de וַיְהִי... וַיְהִי mediante «y hubo... y hubo...».
  - Se evitó «SEÑOR» u otra terminología de sustitución, porque no aparece aquí el Tetragrámaton.
  - «Tarde» se eligió por amplitud semántica; no pretende anular la posible lectura de atardecer, que queda sugerida en la nota.
  - «El tercer día» mantiene la naturalidad del español y el valor ordinal sin volver explícita una cronología específica.
