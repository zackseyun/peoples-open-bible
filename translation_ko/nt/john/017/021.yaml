theological_decisions:
- issue: 하나됨 기도의 핵심 보존(상호 내주)
  chosen_reading: 「내 안에 계시고… 우리 안에 있게」 — 요한적 상호 내주 어법 보존
  alternative_readings:
  - 「우리와 함께 있게」(단순 동맹화)
  rationale: '17:21-23의 「~ 안에」 정형 표현은 요한 신학의 상호 내주(in-dwelling) 어법이며, 단순한 「함께」로 풀면 신학적 무게가 사라진다. 한국어로도 「~ 안에」를 일관되게 유지.'
  doctrine_reference: 'DOCTRINE.md: 요한적 상호 내주 보존'
