translation:
  text: |-
    1 And it happened after these things, and behold, I heard a voice, and I saw a might fixed upon me. And a voice was heard from on high and said to me:
    
    2 “Baruch, Baruch, why are you troubled?
    
    3 Does one who sets out on a road fail to find it? Or can one who sails on the sea find rest unless he reaches the harbor?
    
    4 Or if a treasure is given to someone, does he not take confidence from it, so that he is no longer shaken?
    
    5 Or if someone sows the earth, unless he loses instead of his fruits, is he afterward ruined by famine?
    
    6 Or if someone plants a vineyard, unless he takes from it fruit for nourishment, does not the one who planted it expect to take fruit from it?
    
    7 Or does a woman who is pregnant, if she gives birth without pains, expect a dead child in her womb?
    
    8 Or one who builds a house …”
