translation:
  language: es
  text: 'Y comieron parte de los productos de la tierra al día siguiente de la Pascua: panes sin levadura y grano tostado[a][b], precisamente en ese día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de los productos antiguos de la tierra". El hebreo puede referirse al producto o rendimiento de la tierra; algunos entienden que el contexto sugiere provisión almacenada de la cosecha anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "grano parchado". El hebreo alude a grano preparado mediante tostado o parchado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  english_pob_choice: And they ate
  chosen_spanish: Y comieron
  alternatives_spanish:
  - Entonces comieron
  - Y ellos comieron
  lexicon: WLC/HALOT
  rationale: El wayyiqtol narra una acción sucesiva; 'Y comieron' conserva la secuencia narrativa sin sobrecargar con un adverbio interpretativo.
- source_word: מֵעֲבוּר הָאָרֶץ
  english_pob_choice: some of the produce of the land
  chosen_spanish: de los productos de la tierra
  alternatives_spanish:
  - de la producción de la tierra
  - de la cosecha de la tierra
  - de algunos de los productos de la tierra
  lexicon: HALOT
  rationale: עֲבוּר designa el producto/rendimiento de la tierra. 'Productos de la tierra' es natural en español y mantiene el sentido agrícola; 'de algunos de' queda implícito por el contexto y la partícula distributiva no exige explicitarse siempre.
- source_word: מִמָּחֳרַת הַפֶּסַח
  english_pob_choice: on the day after the Passover
  chosen_spanish: al día siguiente de la Pascua
  alternatives_spanish:
  - el día después de la Pascua
  - a la mañana siguiente de la Pascua
  lexicon: HALOT
  rationale: La frase marca tiempo. 'Al día siguiente de la Pascua' es claro y fiel al valor temporal de מָחֳרַת.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - tortas sin levadura
  - pan sin levadura
  lexicon: HALOT
  rationale: En contexto pascual, מַצּוֹת se expresa con naturalidad como 'panes sin levadura', una forma bíblica clara y ampliamente comprensible.
- source_word: וְקָלוּי
  english_pob_choice: and roasted grain
  chosen_spanish: grano tostado
  alternatives_spanish:
  - grano asado
  - grano parched
  lexicon: HALOT
  rationale: קָלוּי refiere grano tostado/parchado por calor. 'Grano tostado' comunica bien la preparación y evita un calco menos natural.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en aquel mismo día
  - precisamente en este día
  lexicon: HALOT
  rationale: El modismo enfatiza precisión e inmediatez solemne. 'En este mismo día' preserva la fuerza deictica del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo WLC y toma en cuenta el ajuste del POB inglés que añadió 'some of' para reflejar con mayor naturalidad מֵעֲבוּר. En español, esa precisión queda absorbida por el sintagma 'de los productos de la tierra', sin introducir una explicitud innecesaria en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'Pascua' para פֶּסַח por ser el equivalente bíblico natural en español.
  - Se evita 'SEÑOR' o sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - '''Panes sin levadura'' conserva el registro bíblico y la referencia cultual precisa.'
  - '''Grano tostado'' traduce el sentido básico sin perder la alternativa lexical documentada en la nota.'
