  text: Todos los días de Noé sumaron novecientos cincuenta años, y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּֽהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En esta fórmula genealógica, el verbo hebreo funciona como copulativo/existencial que resume la duración total de la vida. «Fueron» conserva la cadencia del original y su valor de suma biográfica sin sonar forzado en español.
- source_word: כָּל יְמֵי נֹחַ
  english_pob_choice: all the days of Noah
  chosen_spanish: todos los días de Noé
  alternatives_spanish:
  - toda la vida de Noé
  - la totalidad de los días de Noé
  lexicon: HALOT
  rationale: Mantengo el hebraísmo «días» porque es la fórmula bíblica habitual para el total de la vida de una persona. En español, «todos los días de Noé» es claro y suficientemente literal.
- source_word: תְּשַׁע מֵאוֹת שָׁנָה וַחֲמִשִּׁים שָׁנָה
  english_pob_choice: nine hundred and fifty years
  chosen_spanish: novecientos cincuenta años
  alternatives_spanish:
  - novecientos y cincuenta años
  lexicon: HALOT
  rationale: El hebreo expresa la cifra en dos miembros coordinados; en español se naturaliza como una sola suma cardinal. «Novecientos cincuenta años» comunica con precisión el total sin añadir material ajeno.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y él murió
  - entonces murió
  lexicon: HALOT
  rationale: El verbo singular retoma a Noé de manera obvia en el contexto. En español, el pronombre sujeto no es necesario; omitirlo mantiene fluidez y preserva el cierre narrativo conciso del hebreo.
theological_decisions:
- issue: Fórmula de cierre genealógico y muerte de Noé
  english_pob_reading: and he died
  chosen_spanish_reading: y murió
  alternative_spanish_readings:
  - y él murió
  - entonces murió
  rationale: No hay tensión doctrinal especial en el versículo; la decisión principal es estilística y discursiva. Se preserva el tono formular del relato genealógico sin introducir énfasis interpretativos que el hebreo no exige.
