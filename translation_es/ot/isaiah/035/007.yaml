  to: El arenal ardiente se convertirá en un estanque[a], y la tierra sedienta en manantiales de agua; en la guarida de chacales[b], donde se echan, habrá hierba, cañas y juncos[c].
  rationale: 'Se hacen reparaciones menores: se corrige la alternativa no estándar «miraje» a «espejismo» y se mejora «donde se recuestan» a «donde se echan» para reflejar mejor el hebreo רבץ en contexto animal. El resto del verso conserva fielmente el sentido, la imaginería y las notas del POB.'
