  to: Y deportó[a] a toda Jerusalén, y a todos los oficiales, y a todos los valientes guerreros, diez mil cautivos, y a todos los artesanos y a los herreros[b]; no quedó nadie, sino los más pobres del pueblo de la tierra.
  rationale: 'Se conserva la traducción general del borrador, pero se corrigen dos puntos para ajustarla mejor al hebreo y al rastro de auditoría del POB inglés: (1) se añade la nota léxica requerida sobre «herreros», porque הַמַּסְגֵּר puede ser más amplio que el oficio de herrero; (2) se afina la cláusula final a «los más pobres del pueblo de la tierra» para reflejar mejor el partitivo hebreo y la formulación del POB inglés. No se requiere adjudicación adicional.'
