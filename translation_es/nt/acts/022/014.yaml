translation:
  language: es
  text: 'Y dijo: «El Dios de nuestros padres te ha designado para conocer su voluntad, para ver al Justo[a], y para oír una voz de su boca»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Justo» funciona aquí como título de Jesús en Hechos (cf. 3:14; 7:52). En el texto griego, δίκαιος expresa rectitud o justicia; algunas tradiciones rinden la expresión como «el Justo y Santo».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: The God of our fathers
  chosen_spanish: El Dios de nuestros padres
  alternatives_spanish:
  - El Dios de nuestros antepasados
  lexicon: BDAG
  rationale: Mantiene la expresión pactal tradicional y reproduce con fidelidad el genitivo plural masculino πατέρων. «Antepasados» es posible, pero atenúa la forma concreta del griego y pierde el eco bíblico.
- source_word: προεχειρίσατό
  english_pob_choice: has appointed
  chosen_spanish: te ha designado
  alternatives_spanish:
  - te ha elegido
  - te ha nombrado
  lexicon: BDAG
  rationale: «Designado» comunica con naturalidad la idea de selección para una tarea o comisión. En español conserva mejor que «elegido» el matiz funcional que sigue en los infinitivos de propósito, sin borrar que también puede implicar elección previa.
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa el propósito de llegar a conocer; «conocer» es la opción más directa y digna en español. «Saber» sería posible, pero suena más abstracto y menos relacional en este contexto.
- source_word: τὸ θέλημα αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su propósito
  - su querer
  lexicon: BDAG
  rationale: «Voluntad» es el equivalente natural y doctrinalmente estable para θέλημα en este contexto. «Propósito» explicita la dirección, pero estrecha un poco el rango semántico.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para contemplar
  lexicon: BDAG
  rationale: «Ver» conserva el sentido básico del infinitivo y evita elevar el tono sin necesidad. «Contemplar» sería más interpretativo y más literario de lo que exige el griego.
- source_word: τὸν δίκαιον
  english_pob_choice: the Righteous One
  chosen_spanish: al Justo[a]
  alternatives_spanish:
  - al Justo y Santo
  - al Justo
  lexicon: BDAG
  rationale: En Hechos, la expresión funciona como título cristológico. En español, «el Justo» preserva el sentido léxico de δίκαιος y permite el uso titular sin forzar un calco poco natural; el artículo sustantivado mantiene la referencia personal.
- source_word: ἀκοῦσαι φωνὴν
  english_pob_choice: to hear a voice
  chosen_spanish: para oír una voz
  alternatives_spanish:
  - para escuchar una voz
  lexicon: BDAG
  rationale: «Oír una voz» refleja con precisión el objeto indefinido φωνή y mantiene el paralelismo con la secuencia de infinitivos. «Escuchar» es posible, pero aquí «oír» es más sobrio y más cercano al valor básico del verbo.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su propia boca
  - desde su boca
  lexicon: BDAG
  rationale: El griego es concreto, pero en español «de su boca» comunica la misma imagen con naturalidad. «Desde su boca» suena algo más idiomático en algunos registros, pero puede debilitar la vinculación directa con el habla que la imagen pretende.
theological_decisions:
- issue: Cómo reflejar el título cristológico τὸν δίκαιον
  english_pob_reading: Rendered as the title 'the Righteous One' referring to Jesus
  chosen_spanish_reading: al Justo, como título referido a Jesús
  alternative_spanish_readings:
  - al Justo y Santo
  - al justo
  rationale: El contexto de Hechos usa esta expresión como designación reconocible de Jesús. En español, sustantivar el adjetivo con mayúscula inicial no siempre es necesario; la claridad cristológica queda suficientemente expresada por el contexto, mientras que la nota preserva el valor titular sin convertirlo en mero adjetivo.
  doctrine_reference: Hechos 3:14; Hechos 7:52; afirmaciones cristológicas de la traducción
- issue: Si conviene conservar la imagen concreta de «su boca»
  english_pob_reading: from his mouth
  chosen_spanish_reading: de su boca
  alternative_spanish_readings:
  - de él
  - desde su boca
  rationale: La imagen corporal en el griego subraya que la revelación es verbal y directa. En español, mantener «de su boca» conserva esa concreción sin necesidad de una explicación adicional.
  doctrine_reference: Principio de fidelidad imagística en el texto fuente
translation_notes:
  revision_awareness: 'Coincido con la revisión reciente de alta concordancia: no se requieren cambios respecto del sentido base del pasaje. La única decisión sensible es la forma española del título τὸν δίκαιον; se ha mantenido la equivalencia léxica y la referencia cristológica, con una nota que conserva la alternativa documentada.'
  spanish_consistency_notes:
  - 'Se conservó el orden natural del español: introducción narrativa, vocativo de comisión y tres infinitivos de propósito coordinados.'
  - Se evitó «SEÑOR» para θεός, porque el texto griego aquí dice explícitamente ὁ θεός y no κύριος.
  - Se mantuvo «nuestros padres» para reflejar el genitivo masculino plural y el idiomático pacto bíblico.
  - Se usó «designado» para προεχειρίσατό porque expresa comisión/selección sin perder la fuerza funcional del verbo.
  - Se preservó la imagen concreta «de su boca» como calco semántico legítimo y comprensible en español.
