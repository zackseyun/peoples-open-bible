translation:
  language: es
  text: Y salieron los hijos de Amón[a] y se formaron para la batalla[b] a la entrada de la ciudad[c], mientras los reyes que habían venido estaban aparte, en el campo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los amonitas». El hebreo dice más literalmente: «los hijos de Amón».'
    reason: lexical_alternative
  - marker: b
    text: O «se pusieron en orden de batalla». El modismo hebreo describe la formación de tropas en orden de combate.
    reason: lexical_alternative
  - marker: c
    text: 'O «a la puerta de la ciudad», aunque la palabra hebrea es más general: «entrada/abertura» y no el término usual para «puerta».'
    reason: lexical_alternative
  - marker: d
    text: Es decir, los reyes aliados estaban apostados aparte de las fuerzas amonitas, en el campo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - vinieron afuera
  lexicon: HALOT
  rationale: יצא en narrativa militar se traduce de manera natural con 'salieron'; preserva el movimiento desde la ciudad sin añadir matices que el hebreo no exige.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal, como en el POB inglés, para no borrar la forma étnica subyacente. 'Amonitas' sería idiomático, pero menos transparente al texto fuente.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  english_pob_choice: drew up for battle
  chosen_spanish: dispusieron la batalla
  alternatives_spanish:
  - se arreglaron para la batalla
  - se formaron para la batalla
  - ordenaron la batalla
  lexicon: HALOT
  rationale: ערך con מלחמה es un modismo militar de ordenar fuerzas en formación. 'Dispusieron la batalla' conserva la idea de preparación táctica mejor que un simple 'pelearon'.
- source_word: פֶּתַח הָעִיר
  english_pob_choice: at the entrance of the city
  chosen_spanish: a la entrada de la ciudad
  alternatives_spanish:
  - en la puerta de la ciudad
  - en la abertura de la ciudad
  lexicon: HALOT
  rationale: פּתח significa 'entrada/abertura'. 'Entrada de la ciudad' sigue de cerca el hebreo y evita imponer 'puerta' como si fuera el término usual para gate.
- source_word: וְהַמְּלָכִים אֲשֶׁר בָּאוּ
  english_pob_choice: while the kings who had come
  chosen_spanish: mientras los reyes que habían venido
  alternatives_spanish:
  - y los reyes que habían venido
  lexicon: HALOT
  rationale: El waw contrasta la posición de los aliados con la de los amonitas; 'mientras' expresa mejor esa fuerza circunstancial que un simple 'y'.
- source_word: לְבַדָּם
  english_pob_choice: by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - solos
  - separados
  lexicon: HALOT
  rationale: El término indica separación respecto de las fuerzas amonitas, no necesariamente soledad numérica. 'Aparte' comunica esa ubicación separada con naturalidad en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo de batalla
  lexicon: HALOT
  rationale: שׂדה aquí designa el campo fuera de la ciudad, sin más especificación. 'En el campo' respeta la literalidad revisada en el POB inglés y evita añadir 'abierto'.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió simplemente 'in the field' frente a 'in the open field' por mayor precisión léxica. En español se reflejó con 'en el campo'.
  spanish_consistency_notes:
  - Se mantuvo 'hijos de Amón' para conservar la forma hebrea literal, coherente con el POB inglés.
  - Se evitó 'SEÑOR' o vocabulario eclesiástico no presente en el versículo.
  - '''Campo'' se usa en sentido militar/topográfico, no agrícola.'
