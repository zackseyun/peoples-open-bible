translation:
  language: es
  text: Porque ¿quién tendrá compasión de ti[a], Jerusalén? ¿Quién se lamentará por ti? ¿Quién se apartará para preguntar por tu bienestar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿quién se compadecerá de ti ... quién tendrá lástima de ti ... quién se detendrá para preguntar por tu bienestar?»
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues bien
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduces la razón o explicación de la sentencia previa; «Porque» conserva esa fuerza causal/explanatoria en español natural.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿quién será?
  - ¿quién podría?
  lexicon: HALOT
  rationale: El interrogativo se repite tres veces para conservar el énfasis retórico del hebreo; «quién» es la correspondencia directa y natural.
- source_word: יַחְמֹל
  english_pob_choice: will have compassion
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - se compadecerá
  - sentirá piedad
  - tendrá lástima
  lexicon: HALOT
  rationale: חמל expresa compasión/piedad. «Tener compasión» comunica bien el sentido emocional del verbo sin volverlo demasiado técnico.
- source_word: עָלַיִךְ
  english_pob_choice: on you
  chosen_spanish: de ti
  alternatives_spanish:
  - sobre ti
  - por ti
  lexicon: HALOT
  rationale: Aunque el hebreo usa la preposición 'sobre', en español el verbo «tener compasión» suele construirse de manera natural con «de»; mantiene el sentido relacional sin calco innecesario.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso normal en español bíblico.
- source_word: יָנ֣וּד
  english_pob_choice: will mourn
  chosen_spanish: se lamentará
  alternatives_spanish:
  - moverá la cabeza en señal de duelo
  - se dolerá
  - se lamentará por ti
  lexicon: HALOT
  rationale: נוד puede implicar duelo, lamento o gesto de conmiseración. «Se lamentará» conserva el valor de duelo/compasión que la POB inglesa resume como 'mourn', sin imponer una imagen demasiado literal en español.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - para ti
  - a favor de ti
  lexicon: HALOT
  rationale: Aquí expresa interés o solidaridad con Jerusalén; «por ti» es idiomático y recoge el matiz de lamentación a favor de ella.
- source_word: יָס֔וּר
  english_pob_choice: will turn aside
  chosen_spanish: se desviará
  alternatives_spanish:
  - se apartará
  - se detendrá
  - hará un desvío
  lexicon: HALOT
  rationale: סור significa apartarse o desviarse del camino. «Se desviará» conserva esa imagen de interrumpir el trayecto para atender la situación de Jerusalén.
- source_word: לִשְׁאֹל
  english_pob_choice: to ask
  chosen_spanish: para preguntar
  alternatives_spanish:
  - a preguntar
  - para inquirir
  lexicon: HALOT
  rationale: Infinitivo de finalidad; «para preguntar» es claro y natural en español, y preserva la intención de informarse.
- source_word: לְשָׁלוֹם
  english_pob_choice: about your welfare
  chosen_spanish: por tu bienestar
  alternatives_spanish:
  - por tu paz
  - por tu bienestar
  - sobre tu bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם aquí apunta a bienestar, no solo a ausencia de guerra. «Bienestar» expresa esa amplitud semántica con claridad en español.
translation_notes:
  revision_awareness: La revisión auditada no introdujo cambios; la redacción española se ajusta al hebreo con el mismo valor retórico de las tres preguntas y conserva la ambigüedad compasivo-lamentativa de יָנוּד mediante «se lamentará».
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio estándar en español.
  - Se usa «Yahvé» para el Tetragrámaton solo cuando aparece explícitamente en el texto fuente; aquí no aplica.
  - Se conserva la repetición interrogativa triple para reflejar el paralelismo hebreo.
  - «Bienestar» se eligió como equivalente idiomático de שָׁלוֹם en esta pregunta de cortesía/interés.
