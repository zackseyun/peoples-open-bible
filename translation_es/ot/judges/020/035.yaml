revisions:
- from: Yahvé hirió a Benjamín delante de Israel, y los hijos de Israel destruyeron aquel día a veinticinco mil cien hombres de Benjamín, todos estos que empuñaban la espada.
  to: Yahvé abatió a Benjamín ante Israel, y los hijos de Israel destruyeron aquel día a veinticinco mil cien hombres de Benjamín, todos estos, hombres que sacaban espada.
  rationale: Se ajusta «hirió» a «abatió» para reflejar mejor el sentido militar de נָגַף; se pule «delante de Israel» a «ante Israel» por mayor naturalidad; y se reemplaza la clausura final por una formulación más idiomática y más cercana a שֹׁלֵף חָרֶב sin sobreparafrasear.
