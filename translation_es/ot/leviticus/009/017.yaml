translation:
  language: es
  text: Entonces presentó la ofrenda vegetal, tomó de ella un puñado[a] y la quemó sobre el altar, además del holocausto de la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'llenó su mano de ella', un modismo para tomar una porción de la ofrenda vegetal en la mano para quemarla sobre el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: presented
  chosen_spanish: presentó
  alternatives_spanish:
  - trajo
  - ofreció
  - acercó
  lexicon: HALOT
  rationale: En contextos sacrificiales, קרב en causativo expresa llevar/presentar la ofrenda ante Yahvé. 'Presentó' conserva el sentido ritual sin sobrecargar el verbo con una paráfrasis.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda
  - la oblación
  lexicon: HALOT
  rationale: Se mantiene el sentido cultual específico de מִנְחָה. 'Ofrenda vegetal' es la opción tradicional de la POB en español para reflejar la ofrenda de cereal/grano sin perder el campo semántico sacrificial.
- source_word: וַיְמַלֵּא כַפּוֹ מִמֶּנָּה
  english_pob_choice: filled his hand from it
  chosen_spanish: llenó su mano de ella
  alternatives_spanish:
  - tomó un puñado de ella
  - llenó su palma con parte de ella
  - tomó de ella para el fuego
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. En español, 'llenó su mano de ella' conserva la imagen concreta del original y evita convertir la acción en una interpretación demasiado explícita.
- source_word: וַיַּקְטֵר
  english_pob_choice: burned
  chosen_spanish: la hizo arder
  alternatives_spanish:
  - la quemó
  - la ofreció en humo
  - la hizo humear
  lexicon: HALOT
  rationale: El verbo קטר en el contexto sacrificial implica quemar/ofrecer por fuego. 'La hizo arder' mantiene el acto físico y deja visible el carácter cultual sin imponer una solución demasiado técnica.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: '''Sobre el altar'' sigue de cerca el hebreo y suena natural en español bíblico.'
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además del
  alternatives_spanish:
  - aparte de
  - además de
  - sin contar
  lexicon: HALOT
  rationale: La preposición indica adición respecto de otra ofrenda ya prescrita. 'Además del' comunica con claridad la relación de suma en español actual.
- source_word: עֹלַת הַבֹּקֶר
  english_pob_choice: the morning burnt offering
  chosen_spanish: el holocausto de la mañana
  alternatives_spanish:
  - la ofrenda quemada de la mañana
  - el holocausto matutino
  - el holocausto de la mañana
  lexicon: HALOT
  rationale: עֹלָה se rinde aquí como 'holocausto', término cultual establecido y más preciso que una simple descripción. 'De la mañana' refleja el genitivo temporal del hebreo.
theological_decisions:
- issue: Traducir מִנְחָה con terminología cultual específica
  english_pob_reading: the grain offering
  chosen_spanish_reading: la ofrenda vegetal
  alternative_spanish_readings:
  - la ofrenda de grano
  - la oblación
  rationale: El versículo trata de una ofrenda sacrificial concreta, no de un regalo general. 'Ofrenda vegetal' preserva la distinción ritual sin sustituirla por un término más eclesiástico o más genérico.
  doctrine_reference: Levítico 2; Levítico 9:17
- issue: Renderizar עֹלָה como 'holocausto'
  english_pob_reading: the morning burnt offering
  chosen_spanish_reading: el holocausto de la mañana
  alternative_spanish_readings:
  - la ofrenda quemada de la mañana
  - el holocausto matutino
  rationale: En el marco levítico, עֹלָה designa la ofrenda totalmente consumida por el fuego. 'Holocausto' conserva esa fuerza sacrificial clásica y evita diluir el carácter total de la ofrenda.
  doctrine_reference: Levítico 1; Levítico 9:17
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la solución auditada en inglés, sin cambios de alcance doctrinal; se mantiene la relación aditiva de מִלְּבַד y el carácter idiomático de וַיְמַלֵּא כַפּוֹ מִמֶּנָּה.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' implícito en el marco levítico sin insertarlo en este versículo porque el hebreo aquí no lo nombra explícitamente.
  - Se usa 'ofrenda vegetal' y 'holocausto' de manera consistente con la terminología cultual de la POB en español.
  - El orden de cláusulas sigue el hebreo para reflejar la secuencia ritual del acto.
