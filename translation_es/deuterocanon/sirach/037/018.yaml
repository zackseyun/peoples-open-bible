translation:
  language: es
  text: Pero con uno cuyo corazón es como tu corazón[a], si tropiezas[b], también se verá afectado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su corazón es como tu corazón». También puede entenderse como «uno de ánimo semejante al tuyo», pero se conserva «corazón» para mantener el giro hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es terso: literalmente, «si tropiezas, le llega a él». La idea es que tu tropiezo o desgracia también repercute en esa persona.'
    reason: alternative_reading
lexical_decisions:
- source_word: אך
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - Y
  lexicon: HALOT
  rationale: El hebreo introduce una contraposición; «Pero» conserva la función adversativa de forma natural en español.
- source_word: עם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - respecto de
  - en relación con
  lexicon: HALOT
  rationale: La preposición abre una relación personal y concreta; «con» reproduce la economía sintáctica del hebreo sin sobreexplicar.
- source_word: לבבו כלבבך
  english_pob_choice: whose heart is like your heart
  chosen_spanish: cuyo corazón es como tu corazón
  alternatives_spanish:
  - que piensa como tú
  - de ánimo semejante al tuyo
  - quien es de tu misma manera de pensar
  lexicon: HALOT
  rationale: Se conserva «corazón» para mantener la antropología hebrea del interior personal, no reduciéndola a «mente». «Como» comunica la comparación directa del original.
- source_word: אם תכשל
  english_pob_choice: if you stumble
  chosen_spanish: si tropiezas
  alternatives_spanish:
  - si caes
  - si fallas
  - si yerres
  lexicon: HALOT
  rationale: «Tropezar» preserva la metáfora física y puede abarcar una falla moral o práctica, como en la lectura inglesa de POB.
- source_word: יגיע אליו
  english_pob_choice: he will be affected also
  chosen_spanish: él también será afectado
  alternatives_spanish:
  - también le alcanzará
  - también le llegará
  - también le afectará
  lexicon: HALOT
  rationale: El hebreo es breve e implícito; «será afectado» refleja la idea de que la consecuencia del tropiezo repercute en esa persona, sin resolver en exceso el sujeto implícito.
theological_decisions:
- issue: Antropología de לב/לבב
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  - ánimo
  rationale: «Corazón» preserva la textura bíblica del inner self y evita una reducción psicológica moderna que el hebreo no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Consecuencia implícita de יגיע אליו
  english_pob_reading: he will be affected also
  chosen_spanish_reading: él también será afectado
  alternative_spanish_readings:
  - también le alcanzará
  - también le llegará
  - también le afectará
  rationale: La línea es tersa y deja implícita la forma exacta de la repercusión. «Será afectado» mantiene esa amplitud sin convertirla en paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Correspondencia con el paralelo griego sobre la mutabilidad del corazón
  english_pob_reading: Hebrew primary, Greek parallel as fallback/check
  chosen_spanish_reading: Se sigue el hebreo, sin hacer depender la redacción del paralelo griego.
  alternative_spanish_readings:
  - Ajustar la frase a la imagen griega del corazón cambiante
  - Incorporar explícitamente el tema de la lengua
  rationale: El expediente auditado indica prioridad del hebreo con apoyo del griego. Por eso no se introducen elementos de la versión griega que no están en el hebreo base.
  doctrine_reference: DOCTRINE.md §Source hierarchy
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: la clausula final pasó de una construcción impersonal («it will reach him») a una personal y natural («he will be affected also»). La versión española sigue ese ajuste, evitando una solución demasiado literal que oscurecería el sentido. También se respetó la prioridad del hebreo indicada por el expediente, sin incorporar el léxico de la paralela griega más allá de su función de verificación.'
  spanish_consistency_notes:
  - Se mantiene «corazón» como término antropológico básico, coherente con el uso POB de preservar el hebreo idiomático.
  - «Tropezas» conserva la metáfora moral/práctica sin volverla explícitamente doctrinal.
  - La cláusula final queda deliberadamente abierta; no se especifica quién o qué «afecta» más allá de la repercusión relacional indicada por el texto.
  - El registro es bíblico y sobrio, apto para lectura eclesial en español neutro.
