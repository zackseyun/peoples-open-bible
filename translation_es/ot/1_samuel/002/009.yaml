translation:
  language: es
  text: Él guarda los pies de sus fieles[a], pero los impíos son silenciados[b] en tinieblas, porque no por la fuerza prevalece un hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual hebrea también puede leerse en singular, 'su fiel'; se adopta el plural porque encaja con el paralelismo poético y el sentido colectivo probable.
    reason: textual_variant
  - marker: b
    text: O 'quedan en silencio' / 'son eliminados'; el verbo hebreo puede denotar quedar callado, ser acallado o quedar suprimido.
    reason: lexical_alternative
  - marker: c
    text: '''Un hombre'' reproduce el singular masculino hebreo usado aquí con sentido genérico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵי
  english_pob_choice: the feet of
  chosen_spanish: los pies de
  alternatives_spanish:
  - los pasos de
  lexicon: HALOT
  rationale: Mantiene la imagen concreta del hebreo y sigue la decisión auditada de preservar 'feet' en vez de una paráfrasis más interpretativa.
- source_word: חסידו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - su fiel
  - sus piadosos
  - sus santos
  lexicon: HALOT
  rationale: La forma consonántica admite lectura singular, pero el sentido poético colectivo es el adoptado en el audit trail inglés; 'sus fieles' comunica lealtad de pacto sin cargar el término con matices eclesiásticos de 'santos'.
- source_word: יִשְׁמֹר
  english_pob_choice: he guards
  chosen_spanish: guarda
  alternatives_spanish:
  - cuida
  - vigila
  - mantiene
  lexicon: HALOT
  rationale: '''Guarda'' conserva el valor protector y es natural en español para este verbo de vigilancia/protección.'
- source_word: וּרְשָׁעִים
  english_pob_choice: but the wicked
  chosen_spanish: pero los impíos
  alternatives_spanish:
  - y los impíos
  - pero los malvados
  lexicon: HALOT
  rationale: Aunque la partícula coordinante es literalmente 'y', el contraste discursivo del verso exige en español un adversativo; 'impíos' respeta el registro bíblico y la oposición moral del hebreo.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la oscuridad
  lexicon: HALOT
  rationale: '''Oscuridad'' reproduce el campo semántico de חֹשֶׁךְ con español claro y digno; la forma singular es idiomática y mantiene el sentido de ocultamiento/jucio.'
- source_word: יִדָּמּוּ
  english_pob_choice: are silenced
  chosen_spanish: son silenciados
  alternatives_spanish:
  - quedan callados
  - son acallados
  - quedan en silencio
  lexicon: HALOT
  rationale: El nifal de דמם puede significar callarse o quedar en silencio; 'son silenciados' conserva la pasividad y la fuerza de juicio que el audit trail inglés quiso captar, sin perder la alternativa semántica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la base explicativa del contraste anterior; 'porque' es la conjunción causal más natural en español aquí.
- source_word: לֹא בְכֹחַ
  english_pob_choice: not by strength
  chosen_spanish: no por la fuerza
  alternatives_spanish:
  - no por poder
  - no mediante la fuerza
  - no por la fortaleza
  lexicon: HALOT
  rationale: '''Fuerza'' traduce כֹחַ de manera directa y comprensible; la preposición ''por'' refleja adecuadamente el medio o instrumento negado.'
- source_word: יִגְבַּר
  english_pob_choice: does ... prevail
  chosen_spanish: prevalece
  alternatives_spanish:
  - vence
  - triunfa
  - se impone
  lexicon: HALOT
  rationale: '''Prevalece'' expresa la idea de resultar vencedor o superior sin añadir una imagen bélica no explicitada por el verbo.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino genérico del hebreo, conforme a la decisión auditada de no neutralizar el término cuando funciona proverbially.
theological_decisions:
- issue: Número y lectura de חסידו
  english_pob_reading: 'collective/plural sense: ''his faithful ones'''
  chosen_spanish_reading: 'plural colectivo: ''sus fieles'''
  alternative_spanish_readings:
  - 'singular: ''su fiel'''
  - '''sus piadosos'''
  rationale: Aunque la forma puede leerse en singular, la paralelística del poema y la lectura adoptada por el POB inglés favorecen el plural colectivo. En español, 'sus fieles' preserva esa amplitud sin introducir una connotación litúrgica ajena.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor adversativo de וּרְשָׁעִים
  english_pob_reading: but the wicked
  chosen_spanish_reading: pero los impíos
  alternative_spanish_readings:
  - y los impíos
  - mas los impíos
  rationale: El hebreo usa una conjunción que en español debe reflejar el contraste lógico. 'Pero' comunica mejor la antítesis entre los fieles protegidos y los impíos abatidos.
  doctrine_reference: Translation philosophy §2, §5
- issue: Sentido de יִדָּמּוּ
  english_pob_reading: are silenced
  chosen_spanish_reading: son silenciados
  alternative_spanish_readings:
  - quedan callados
  - quedan en silencio
  - son acallados
  rationale: El verbo puede referirse a callarse, quedar en silencio o ser acallados. 'Son silenciados' preserva la pasividad y permite la lectura de juicio implícita en el contexto sin borrar la tensión semántica.
  doctrine_reference: Translation philosophy §2, §5
- issue: Masculino genérico de אִישׁ
  english_pob_reading: '''A man'' renders the Hebrew masculine singular used generically here.'
  chosen_spanish_reading: '''un hombre'' como genérico representativo'
  alternative_spanish_readings:
  - '''una persona'''
  - '''alguien'''
  rationale: Se conserva la forma masculina singular del original porque funciona como enunciado proverbial general. No se neutraliza para no perder el paralelismo léxico y gramatical del hebreo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje inglés auditado sin cambios sustantivos respecto del último pase revisado (''unchanged: true''). Se conservaron las mismas decisiones de número para חסידו, el valor adversativo de la segunda cola, y el sentido de יִדָּמּוּ como silenciamiento/stilling, ajustándolas al español con equivalentes naturales y transparentes.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto, pero este versículo no contiene el nombre divino explícito.
  - '''Fieles'' evita tanto ''santos'' como ''piadosos'' para no importar un matiz no requerido por el hebreo.'
  - '''Impíos'' conserva el contraste ético y el registro bíblico del término רְשָׁעִים.'
  - '''Prevalece'' es más idiomático que ''se fortalece'' y preserva la fuerza gnómica del cierre.'
  - Los marcadores [a], [b] y [c] aparecen exactamente donde corresponde en el texto español.
