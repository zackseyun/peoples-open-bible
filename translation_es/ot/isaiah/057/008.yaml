base_translation:
  language: en
  yaml_path: translation/ot/isaiah/057/008.yaml
  text: Behind the door and the doorpost you set up your memorial[a]; for, departing from me, you uncovered yourself and went up; you made your bed wide, and you made an agreement for yourself with them; you loved their bed[c][b]; you saw a hand.
  footnotes:
  - marker: a
    text: Or 'you placed your symbol/remembrance.' The Hebrew 'memorial' may refer to an idolatrous token set up in secret.
    reason: lexical_alternative
  - marker: b
    text: Or 'you cut a covenant for yourself with them.' The Hebrew uses covenant-making language, though the noun 'covenant' is not stated explicitly.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'you looked on a hand.' The phrase is obscure; possible senses include 'you looked on a monument/marker' or a sexual euphemism.
    reason: alternative_reading
