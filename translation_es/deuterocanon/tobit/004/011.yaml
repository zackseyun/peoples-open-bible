translation:
  language: es
  text: Porque la limosna es un buen don para todos los que la hacen delante del Altísimo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda»; la palabra griega puede denotar un don en general y, en algunos contextos, una ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῶρον
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - ofrenda
  lexicon: BDAG
  rationale: El griego puede significar tanto un don como una ofrenda. En español, «don» conserva la amplitud semántica de «gift» sin forzar aquí un matiz cultual que el contexto no exige.
- source_word: ἐλεημοσύνη
  english_pob_choice: almsgiving
  chosen_spanish: limosna
  alternatives_spanish:
  - dar a los pobres
  - caridad
  lexicon: BDAG
  rationale: El término designa específicamente dar a los necesitados. «Limosna» mantiene esa concreción y suena natural en español bíblico; «caridad» sería más amplio y menos preciso.
- source_word: πᾶσι τοῖς ποιοῦσιν αὐτήν
  english_pob_choice: for all who do it
  chosen_spanish: para todos los que la hacen
  alternatives_spanish:
  - para todos los que la practican
  - para todos los que la realizan
  lexicon: BDAG
  rationale: La frase griega habla de quienes «la hacen». En español, «la hacen» sigue de cerca la acción concreta y evita añadir el matiz habitual de una práctica habitual que no está explícito en el griego.
- source_word: ἐνώπιον τοῦ ὑψίστου
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en la presencia del Altísimo
  lexicon: BDAG
  rationale: «Delante de» o «ante» reproduce bien la relación espacial-relacional de ἐνώπιον. Se conserva el título divino reverente «Altísimo» para ὁ ὕψιστος, que en español transmite la misma dignidad teológica.
theological_decisions:
- issue: Cómo presentar la afirmación de que la limosna es un «buen don»
  english_pob_reading: A straightforward commendation of almsgiving’s value/benefit, without expanding it into meritorious salvation or a cultic sacrifice.
  chosen_spanish_reading: Una afirmación directa del valor de la limosna, sin convertirla en una doctrina de mérito salvífico ni en una ofrenda cultual explícita.
  alternative_spanish_readings:
  - La limosna como una ofrenda meritoria
  - La limosna como sacrificio religioso
  rationale: El griego afirma que la limosna es un buen don para quienes la hacen delante del Altísimo. La traducción mantiene esa valoración positiva y evita añadir una elaboración doctrinal que no está explicitada en el texto.
  doctrine_reference: Preservar la tensión teológica del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que prefirió «do it» en lugar de «practice it» para reflejar más directamente el participio griego; por eso se traduce con una forma simple y concreta: «la hacen».'
  spanish_consistency_notes:
  - Se usa «Altísimo» como equivalente reverente de ὁ ὕψιστος, en continuidad con el tratamiento del título divino en el proyecto.
  - Se evita «SEÑOR» porque aquí el griego no usa κύριος, sino un título distinto.
  - «Limosna» conserva el sentido específico de ἐλεημοσύνη sin diluirlo en «caridad».
