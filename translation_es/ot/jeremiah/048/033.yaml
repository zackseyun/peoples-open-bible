  text: וְ/נֶאֶסְפָ֨ה שִׂמְחָ֥ה וָ/גִ֛יל מִ/כַּרְמֶ֖ל וּ/מֵ/אֶ֣רֶץ מוֹאָ֑ב וְ/יַ֨יִן֙ מִ/יקָבִ֣ים הִשְׁבַּ֔תִּי לֹֽא יִדְרֹ֣ךְ הֵידָ֔ד הֵידָ֖ד לֹ֥א הֵידָֽד־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/033.yaml
  text: Joy and gladness have been taken away from the fruitful field and from the land of Moab[a]; I have made wine cease from the winepresses. No one will tread with shouting[c][b]; the shouting is not shouting.
  footnotes:
  - marker: a
    text: Or 'fruitful field.' The Hebrew karmel here refers to fertile, cultivated land, not the proper name Carmel.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shout here is the cry associated with grape-treading or harvest celebration.
    reason: cultural_note
  - marker: c
    text: 'The final clause is elliptical in Hebrew: literally, ''shout, shout—not shout,'' meaning the expected joyful vintage cry has ceased.'
    reason: lexical_alternative
