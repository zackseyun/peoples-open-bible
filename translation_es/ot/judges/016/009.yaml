    rationale: La expresión es poco idiomática en español y no comunica con claridad ni el participio «el que está al acecho» ni el sentido colectivo contextual que el inglés resolvió como «the ambush».
  - severity: medium
    issue: «estaba» para יֹשֵׁב
    rationale: Aunque no es falso, pierde el matiz contextual de estar apostado/esperando que la auditoría inglesa consideró importante en contexto de emboscada.
  - severity: high
    issue: «no se supo de dónde venía su fuerza» añade información
    rationale: El hebreo dice literalmente que su fuerza no fue conocida / no se conoció. Añadir «de dónde venía» interpreta el sentido narrativo, pero va más allá del texto fuente y del POB auditado.
  - severity: medium
    issue: Nota b omite parte de la alternativa preservada
    rationale: La nota inglesa conserva la comparación completa «when it smells fire». La nota española actual solo cita «como se rompe un hilo de estopa», perdiendo la porción significativa y peculiar del hebreo.
