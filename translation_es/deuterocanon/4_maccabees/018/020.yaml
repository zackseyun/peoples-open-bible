translation:
  language: es
  text: ¡Cuán amarga fue aquel día —y, sin embargo, no amarga—, cuando el amargo tirano griego, después de encender fuego en los crueles calderos y, en furor hirviente, llevando a los siete muchachos a la catapulta[a] y de nuevo a sus tormentos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al potro» o «a un instrumento de tortura». La palabra griega normalmente denota una catapulta o máquina semejante, pero aquí probablemente se refiere a un artefacto usado para tormento.
    reason: lexical_alternative
  - marker: b
    text: '«Y, sin embargo, no amarga» preserva la paradoja griega: el día fue amargo por el sufrimiento, pero no lo fue en cuanto al honor y la fidelidad asociados con la perseverancia de los mártires.'
    reason: theological_note
lexical_decisions:
- source_word: πικρᾶς
  english_pob_choice: bitter
  chosen_spanish: amarga
  alternatives_spanish:
  - dolorosa
  - aflictiva
  lexicon: LSJ
  rationale: Conserva el juego de palabras con πικρὸς y mantiene la repetición retórica del pasaje. «Amarga» suena natural en español y reproduce el valor afectivo del original mejor que opciones más abstractas.
- source_word: ἡμέρας
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - tiempo
  - ocasion
  lexicon: LSJ
  rationale: Es el referente temporal concreto del griego y mantiene la imagen directa del texto.
- source_word: ὁ πικρὸς Ἑλλήνων τύραννος
  english_pob_choice: the bitter Greek tyrant
  chosen_spanish: el amargo tirano griego
  alternatives_spanish:
  - el cruel tirano griego
  - el severo tirano de los griegos
  lexicon: LSJ
  rationale: «Griego» reproduce Ἑλλήνων de manera natural en español, y «amargo» mantiene la repetición de πικρ- con el adjetivo inicial. Se evita «de los griegos» porque el orden natural del español favorece el adjetivo étnico.
- source_word: πῦρ φλέξας
  english_pob_choice: after kindling fire
  chosen_spanish: después de encender fuego
  alternatives_spanish:
  - habiendo encendido fuego
  - tras prender fuego
  lexicon: LSJ
  rationale: La construcción temporal del participio se expresa con una frase natural en español sin perder el valor de anterioridad.
- source_word: λέβησι ὠμοῖς
  english_pob_choice: in his cruel cauldrons
  chosen_spanish: en los crueles calderos
  alternatives_spanish:
  - en las crueles calderas
  - en los salvajes calderos
  lexicon: LSJ
  rationale: «Calderos» es un equivalente directo de λέβης y funciona bien en registro literario. «Crueles» traduce ὠμοῖς en el sentido de instrumentos de tortura, no de crueldad moral propia del objeto.
- source_word: ζέουσινν θυμοῖς
  english_pob_choice: in boiling rage
  chosen_spanish: en hirviente furor
  alternatives_spanish:
  - con furia hirviente
  - en furia hirviente
  lexicon: LSJ
  rationale: Se conserva la imagen del hervor y la energía de la frase griega. «Furor» comunica mejor que una simple «ira» el tono violento y sostenido del contexto.
- source_word: ἀγαγὼν
  english_pob_choice: bringing
  chosen_spanish: llevar
  alternatives_spanish:
  - trayendo
  - conduciendo
  lexicon: LSJ
  rationale: En español, el participio se vierte de forma natural con un infinitivo contextualizado dentro de la frase narrativa. «Llevar» mantiene el movimiento secuencial.
- source_word: ἐπὶ τὸν καταπέλτην
  english_pob_choice: to the catapult
  chosen_spanish: al catapulta
  alternatives_spanish:
  - al catapulta de tortura
  - al artefacto de tormento
  lexicon: LSJ
  rationale: Se conserva el término del griego que la POB inglesa retuvo como «catapult», evitando sobreinterpretar el instrumento. En español, se mantiene el préstamo conceptual con artículo masculino por el uso del término técnico en la tradición editorial del texto.
- source_word: τὰς βασάνους
  english_pob_choice: his tortures
  chosen_spanish: sus tormentos
  alternatives_spanish:
  - sus torturas
  - sus suplicios
  lexicon: LSJ
  rationale: «Tormentos» expresa bien la violencia del plural griego y suena más natural en español que una repetición demasiado técnica de «torturas».
- source_word: τοὺς ἑπτὰ παῖδας
  english_pob_choice: the seven boys
  chosen_spanish: a los siete muchachos
  alternatives_spanish:
  - a los siete niños
  - a los siete jóvenes
  lexicon: LSJ
  rationale: «Muchachos» conserva la referencia juvenil sin imponer «hijos», que el griego no dice explícitamente. Mantiene el tono narrativo y humano del pasaje.
theological_decisions:
- issue: Paradoja retórica de καὶ οὐ πικρᾶς
  english_pob_reading: and yet not bitter
  chosen_spanish_reading: y, sin embargo, no amarga
  alternative_spanish_readings:
  - y no amarga
  - aunque no amarga
  rationale: 'Se preserva la tensión del original: el día es amargo por el sufrimiento, pero no se deja reducir a una sola valoración emocional. «Sin embargo» conserva el giro paradójico sin explicarlo de más.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Sentido de καταπέλτης en contexto de martirio
  english_pob_reading: catapult
  chosen_spanish_reading: catapulta
  alternative_spanish_readings:
  - rampa de tormento
  - ingenio de tortura
  rationale: Se mantiene el valor léxico básico del término griego, tal como hace la POB inglesa, para no convertir la inferencia contextual en una certeza textual. El contexto sugiere un instrumento de tormento, pero el texto conserva el nombre más cercano al original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La POB inglesa revisó Ἑλλήνων τύραννος desde «tyrant of the Greeks» a «Greek tyrant» para naturalidad, y conservó catapult en el texto principal con nota de sentido contextual. Este borrador español sigue esa revisión: usa «tirano griego» en el cuerpo y mantiene «catapulta» con un anclaje de nota, evitando residuos ingleses y respetando la paradoja de «sin embargo, no amarga».'
  spanish_consistency_notes:
  - Se evitó cualquier residuo inglés en el texto principal; todo el enunciado está íntegramente en español.
  - Se mantuvo la repetición de amarg- para reflejar el juego retórico del griego y la POB inglesa.
  - 'Se eligieron términos de registro bíblico-literario pero no arcaizante: «muchachos», «tormentos», «furor».'
  - El sustantivo técnico «catapulta» se dejó en singular con artículo masculino para concordar con el uso interno del borrador y la tradición de mencionar el ingenio sin reinterpretarlo de inmediato.
