review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la primera mitad del versículo: «Te has vuelto cruel conmigo» transmite adecuadamente תֵּהָפֵךְ לְאַכְזָר לִי, y «con la fuerza de tu mano» preserva bien בְּעֹצֶם יָדְךָ sin desantropomorfizar. El problema principal está en תִשְׂטְמֵנִי: «me opones» no es español correcto para ‘you oppose me’; debe ser «te opones a mí / te me opones» o, más naturalmente, «estás contra mí». Dado que el inglés auditado fijó ‘oppose me’ como texto principal, conviene una forma española natural que conserve esa fuerza sin pasar al alternativo ‘me atacas’ como texto principal.'
  spanish_quality_summary: La calidad general es buena, pero «me opones» es agramatical y afecta seriamente la legibilidad. También la nota [b] («tu poder») no corresponde bien al inglés POB, que no puso alternativa para ‘your hand’; además choca con la decisión teológica de conservar la imagen concreta. Las demás notas son aceptables, aunque la [a] puede modernizarse levemente y la [c] debe anclarse al verbo corregido.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí importa la política de preservar imágenes concretas: «tu mano» debe mantenerse sin promover «tu poder» como alternativa destacada. La aspereza teológica del lamento se conserva mejor con «tu mano» y un verbo hostil natural como «estás contra mí».'
  issues:
  - severity: high
    issue: «me opones» es incorrecto en español
    rationale: El verbo «oponer» no funciona así en este contexto para significar ‘you oppose me’. La forma natural sería «te opones a mí», «te me opones» o una reformulación equivalente como «estás contra mí».
  - severity: medium
    issue: La nota [b] ofrece «tu poder» como alternativa a «tu mano»
    rationale: El expediente inglés y la decisión teológica insisten en conservar la imagen antropomórfica concreta. Presentar «tu poder» como alternativa léxica aquí debilita esa decisión y no está respaldado por las notas inglesas.
  - severity: low
    issue: La nota [a] usa «tornado», comprensible pero menos natural en español actual
    rationale: Puede mantenerse como alternativa, pero «te has vuelto despiadado» suena más natural para un español bíblico moderno y digno.
  revised_spanish_text: Te has vuelto cruel conmigo[a]; con la fuerza de tu mano, estás contra mí[b].
