translation:
  language: es
  text: "Moisés hizo una serpiente de bronce y la puso sobre el poste[a]. Y sucedió que, si la serpiente mordía a un hombre[c], y él miraba a la serpiente de bronce[d], vivía."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: "O 'serpiente de cobre'. El término hebreo para el metal puede referirse a cobre o a bronce."
    reason: lexical_alternative
  - marker: c
    text: "Hebreo: 'un hombre', usado aquí en sentido representativo para cualquier persona mordida."
    reason: lexical_alternative
  - marker: d
    text: Este episodio se retoma tipológicamente en Juan 3:14–15.
    reason: cross_reference
lexical_decisions:
- source_word: נְחַשׁ
  english_pob_choice: serpent
  chosen_spanish: serpiente
  alternatives_spanish:
  - culebra
  lexicon: HALOT
  rationale: En español bíblico, 'serpiente' preserva el tono literario y solemne del relato mejor que 'culebra', que suena más coloquial. Además, mantiene la correspondencia con la opción inglesa documentada.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: '''Bronce'' es la equivalencia natural en español bíblico para el metal trabajado aquí. Se conserva la alternativa ''cobre'' como posibilidad semántica del hebreo, pero ''bronce'' es la forma más idiomática y estable.'
- source_word: הַנֵּס
  english_pob_choice: the pole
  chosen_spanish: el asta
  alternatives_spanish:
  - la estaca
  - la señal
  - el estandarte
  lexicon: HALOT
  rationale: El contexto indica un objeto vertical donde se monta la figura; 'asta' comunica bien esa función en español y evita que 'estandarte' sugiera un uso militar o simbólico ajeno al pasaje. Se mantiene la nota de alternativas porque el hebreo puede abarcar también 'standard' o 'banner'.
- source_word: וְהָיָה
  english_pob_choice: And it happened
  chosen_spanish: Y sucedía que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurría que
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se vierte con una apertura fluida y natural. 'Y sucedía que' conserva el valor de transición resultativa sin sonar excesivamente arcaica.
- source_word: אִם נָשַׁךְ הַנָּחָשׁ אֶת אִישׁ
  english_pob_choice: if the serpent bit a man
  chosen_spanish: si la serpiente mordía a un hombre
  alternatives_spanish:
  - si la serpiente mordía a cualquiera
  - si la serpiente mordía a una persona
  lexicon: HALOT
  rationale: Se conserva el singular representativo del hebreo con 'a un hombre', siguiendo la decisión inglesa de mantener la forma masculina singular cuando funciona genéricamente. El imperfecto 'mordía' refleja con naturalidad la cláusula condicional narrada en español.
- source_word: וְהִבִּיט אֶל
  english_pob_choice: and he looked at
  chosen_spanish: y él miraba a
  alternatives_spanish:
  - y él miró a
  - y él contemplaba a
  lexicon: HALOT
  rationale: '''Miraba a'' reproduce el acto de mirar sin añadir la resonancia devocional de ''miró hacia''. El pronombre explícito ''él'' sigue de cerca la sintaxis del hebreo y hace clara la referencia al sujeto representativo.'
- source_word: וָחָי
  english_pob_choice: he lived
  chosen_spanish: vivía
  alternatives_spanish:
  - quedaba vivo
  - vivía y no moría
  lexicon: HALOT
  rationale: '''Vivía'' expresa el resultado narrativo inmediato en forma natural dentro de la cláusula condicional en español. Aunque ''quedaba vivo'' también es posible, ''vivía'' es más breve y mantiene el paralelismo con la economía del hebreo.'
theological_decisions:
- issue: Lectura representativa de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  - a cualquiera
  rationale: Se conserva el singular masculino representativo por fidelidad a la forma del hebreo, sin convertirlo en un plural o en una generalización más explícita de lo que el texto dice. El sentido inclusivo queda implícito por el contexto narrativo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Posible carga tipológica de 'mirar'
  english_pob_reading: looked at
  chosen_spanish_reading: miraba a
  alternative_spanish_readings:
  - miró a
  - miraba hacia
  rationale: Se evita anticipar en el cuerpo del texto una lectura tipológica posterior. La redacción permanece en el plano narrativo inmediato del hebreo, dejando la resonancia canónica para notas o referencias cruzadas.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto fuente ni las decisiones principales; el acuerdo de auditoría fue alto, con solo observaciones menores sobre matiz léxico y claridad contextual. No se requiere ajuste sustancial respecto del borrador inglés auditado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se conserva 'serpiente de bronce' como fórmula estable y transparente para נְחַשׁ נְחֹשֶׁת.
  - '''Asta'' se usa aquí por claridad contextual; se explica su posible valor alternativo en nota.'
  - El tiempo verbal español se ajustó para sonar natural en narrativa condicional sin abandonar la estructura del hebreo.
