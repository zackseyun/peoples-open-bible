translation:
  language: es
  text: Yahvé ha oído mi súplica[a]; Yahvé recibirá mi oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aceptará mi oración»; el verbo hebreo literalmente significa «tomar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: Doctrinal default / name rendering
  rationale: El hebreo usa el nombre propio del pacto YHWH; en español, el proyecto pide «Yahvé» como equivalente directo y visible, no el sustituto «SEÑOR». «Jehová» queda como alternativa histórica, pero no es la forma principal del proyecto.
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - oyó
  - ha escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa con relevancia presente; «ha oído» comunica esa perfección con naturalidad en español. «Ha escuchado» es posible, pero «oír» encaja mejor con la construcción directa del hebreo en este contexto.
- source_word: תְּחִנָּה
  english_pob_choice: plea
  chosen_spanish: súplica
  alternatives_spanish:
  - plegaria
  - petición
  - ruego
  lexicon: HALOT
  rationale: El término denota un ruego insistente por favor o misericordia. «Súplica» conserva ese tono urgente y reverente en español, aunque «plea» del inglés POB también podría equivaler a «ruego» o «petición».
- source_word: תְּפִלָּה
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - petición
  lexicon: HALOT
  rationale: Es el término más general y estándar para «prayer». «Oración» mantiene la simetría hebrea con una segunda palabra distinta de «súplica», como hace la traducción inglesa.
- source_word: לָקַח
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - aceptará
  - tomará
  lexicon: HALOT
  rationale: Aunque el verbo literalmente es «tomar», en este giro con «mi oración» el sentido idiomático es recibir/aceptar. «Recibirá» preserva la fuerza futura del imperfecto sin imponer un tecnicismo culto innecesario.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene la decisión doctrinal y auditada de representar el Tetragrámaton con un nombre visible y no con un título sustitutivo. «Yahvé» es la forma estándar del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: contested terms, יְהוָה / YHWH'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no requirió cambios en la revisión más reciente; se conserva la equivalencia óptima ya aprobada, con el mismo contraste léxico entre «súplica» y «oración», y con la nota alternativa sobre לָקַח.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se diferencia «súplica» de «oración» para reflejar el paralelismo hebreo.
  - La nota al pie conserva la alternativa semántica de לָקַח sin sobreexplicar el texto principal.
  - El registro es moderno y digno, apto para publicación eclesial en español neutral.
