translation:
  language: es
  text: 'Yahvé Dios está observando[a], y en verdad se mueve a compasión por nosotros, tal como Moisés lo dejó claro en el cántico que da testimonio abiertamente[c], diciendo[b]: «Y se moverá a compasión por sus esclavos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es consolado… será consolado». El verbo griego puede abarcar sentidos como consolar, exhortar o mover a compasión; aquí el contexto y la cita del Cántico de Moisés favorecen la idea de compasión o de inclinación misericordiosa.
    reason: lexical_alternative
  - marker: b
    text: La cita evoca Deuteronomio 32:36, donde se dice que Yahvé se mueve respecto de sus siervos o esclavos.
    reason: cross_reference
  - marker: c
    text: O «que da testimonio de frente». El giro griego κατὰ πρόσωπον expresa la idea de manera directa o abierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ Κύριος ὁ θεὸς
  english_pob_choice: The Lord God
  chosen_spanish: El Señor Dios
  alternatives_spanish:
  - Yahvé Dios
  - el Señor Dios
  lexicon: LXX/GK
  rationale: Conserva la combinación nominativa habitual en español para κύριος + θεός en esta fórmula, sin introducir una paráfrasis. Aunque la política general favorece «Yahvé» para el nombre divino, aquí la base griega usa κύριος en una cita bíblica y la forma «Señor Dios» mantiene la cadencia del texto y la referencia reverente.
- source_word: ἐφορᾷ
  english_pob_choice: is watching
  chosen_spanish: está observando
  alternatives_spanish:
  - mira
  - está mirando
  - vigila
  lexicon: LSJ
  rationale: «Está observando» conserva el aspecto presente y la acción continua, con una naturalidad idiomática en español cercana a «is watching». Evita tanto la frialdad de «ve» como el matiz más protector de «vigila».
- source_word: ταῖς ἀληθείαις
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - en las verdades
  - con verdad
  lexicon: LSJ
  rationale: La dative plural es idiomática; en español conviene una expresión adverbial natural. «En verdad» comunica bien el sentido adverbial sin forzar el plural literal.
- source_word: παρακαλεῖται
  english_pob_choice: is being moved to compassion
  chosen_spanish: es movido a compasión
  alternatives_spanish:
  - es consolado
  - es exhortado
  - se le conmueve a compasión
  - se ablanda
  lexicon: LSJ
  rationale: La forma pasiva y la cita deuteronómica favorecen la idea de ser conmovido hacia la misericordia/compasión, no la de recibir consuelo. «Es movido a compasión» preserva esa tensión y la conexión intertextual con el versículo citado.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: LSJ
  rationale: «Tal como» expresa con claridad la comparación entre la afirmación presente y la cita mosaica.
- source_word: διὰ τῆς κατὰ πρόσωπον ἀντιμαρτυρούσης ᾠδῆς
  english_pob_choice: through the song that testifies openly
  chosen_spanish: en el cántico que da testimonio abiertamente
  alternatives_spanish:
  - por el cántico que testifica abiertamente
  - en la oda que testifica de frente
  - en el cántico que da contra-testimonio abiertamente
  lexicon: LSJ
  rationale: «Cántico» encaja mejor que «canción» o «oda» en el registro bíblico español. «Da testimonio abiertamente» recoge el valor de ἀντιμαρτυρούσης sin sobrerrepresentar la oposición; «abiertamente» traduce el valor idiomático de κατὰ πρόσωπον.
- source_word: Μωσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Name standard
  rationale: Nombre propio estándar en español bíblico.
- source_word: δούλοις
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: LSJ
  rationale: Se conserva la fuerza lexical de δοῦλοις conforme a la pauta del proyecto para este término. «Esclavos» mantiene la relación de pertenencia y dependencia del original, que la versión inglesa trató de transparentar.
- source_word: παρακληθήσεται
  english_pob_choice: will be moved to compassion
  chosen_spanish: será movido a compasión
  alternatives_spanish:
  - será consolado
  - se compadecerá
  - será aliviado
  lexicon: LSJ
  rationale: La misma familia verbal de παρακαλέω en la cita se traduce con la misma solución semántica que en la cláusula anterior, para conservar la correspondencia interna del pasaje y el vínculo con Deuteronomio 32:36.
theological_decisions:
- issue: Sentido de παρακαλεῖται / παρακληθήσεται en la cita mosaica
  english_pob_reading: The verbs are rendered with the sense of divine compassion or relenting toward God's people.
  chosen_spanish_reading: Los verbos se traducen con el sentido de compasión divina, no como consuelo recibido por Dios.
  alternative_spanish_readings:
  - es consolado / será consolado
  - es exhortado / será exhortado
  - se le mueve a compasión / se le moverá a compasión
  rationale: El contexto de la cita, junto con la alusión a Deuteronomio, apunta a la idea de que Dios se vuelve hacia su pueblo con compasión o se apiada de él. Traducirlo como «consuelo» suavizaría indebidamente el matiz y borraría la tensión del pasivo griego.
  doctrine_reference: Mantener la tensión del original; primacía del texto fuente sobre la tradición receptiva
- issue: Renderización de δούλοις en la cita
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  - sus servidores
  rationale: La guía del proyecto favorece «esclavos» cuando δοῦλος expresa relación servil/bajo dominio de manera saliente. En una cita bíblica formal, el término conserva la transparencia del vínculo de pertenencia sin diluirlo en una equivalencia más suave.
  doctrine_reference: 'Términos discutidos: δοῦλος = esclavo / siervo, según contexto'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una oscilación editorial entre «slaves» y «servants» en la cita final, pero la fijación más reciente restituye «slaves» por fidelidad al δοῦλοις griego y a la política de términos disputados. También confirma que παρακαλεῖται / παρακληθήσεται se entienden en clave de compasión/relenting, no de consuelo. La traducción española sigue esa decisión y mantiene el paralelismo verbal. '
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara tipográfica, pero aquí no se usa «Yahvé» porque la formulación griega y la cita bíblica favorecen la fórmula compuesta «Señor Dios» en un registro bíblico natural.
  - «Cántico» se usa para ᾠδή en lugar de «oda» por registro litúrgico-bíblico más natural en español.
  - La nota c fue formulada como alternativa estilística; sin embargo, el texto principal ya opta por «abiertamente», que recoge adecuadamente κατὰ πρόσωπον.
