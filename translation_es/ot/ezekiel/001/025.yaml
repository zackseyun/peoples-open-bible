translation:
  language: es
  text: Y hubo un sonido[a] desde encima de la expansión[b] que estaba sobre sus cabezas; cuando se detenían, dejaban caer sus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una voz desde encima de la expansión». El hebreo קוֹל puede significar «sonido» o «voz»; se mantiene «sonido» en el texto principal porque la cláusula todavía no especifica habla articulada.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «firmamento» para «expansión».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And there was
  chosen_spanish: Y hubo
  alternatives_spanish:
  - Y aconteció
  - Y hubo entonces
  lexicon: HALOT
  rationale: El wayyiqtol de היה introduce la aparición de un fenómeno; «hubo» conserva la ocurrencia narrativa en un español natural, sin forzar la fórmula arcaica «aconteció».},{
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto base; la lectura coincide con el estado más reciente del expediente en inglés.
  spanish_consistency_notes:
  - Se mantuvo la ambigüedad de קוֹל con una nota, pues el español «voz» puede sugerir habla más directamente que «sonido».
  - Se optó por «firmamento» como equivalente tradicional de רָקִיעַ, aunque el inglés POB prefirió «expanse»; en español, este término sigue siendo comprensible en registro bíblico.
  - «Bajaban sus alas» refleja תְּרַפֶּינָה de manera natural; «las dejaban caer» también sería posible, pero menos directo en este contexto.
