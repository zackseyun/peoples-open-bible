translation:
  language: es
  text: Yahvé ruge desde Sion y da su voz desde Jerusalén[a]; y se estremecen los cielos y la tierra; Yahvé es refugio para su pueblo, y fortaleza para los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pronuncia su voz». El hebreo dice literalmente «da su voz», un giro idiomático para hablar con fuerza o estruendo.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: «para el pueblo de Israel» o «para los israelitas». El hebreo dice literalmente «para los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יהוה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH. En español, 'Yahvé' conserva el nombre propio del pacto sin reemplazarlo por un título genérico.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sion
  alternatives_spanish:
  - de Sion
  - desde el monte Sion
  lexicon: HALOT
  rationale: La preposición hebrea marca procedencia y el contexto poético sugiere movimiento/emanación desde Sion; 'desde' conserva bien esa fuerza en español.
- source_word: יִשְׁאָג
  english_pob_choice: roars
  chosen_spanish: ruge
  alternatives_spanish:
  - brama
  - ruge como león
  lexicon: HALOT
  rationale: El verbo expresa un rugido intenso, frecuentemente leonino; 'ruge' transmite con naturalidad la imagen vívida del hebreo.
- source_word: וּמִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'desde Sion' y el valor de procedencia del hebreo.
- source_word: יִתֵּן קוֹלוֹ
  english_pob_choice: gives his voice
  chosen_spanish: da su voz
  alternatives_spanish:
  - emite su voz
  - alza su voz
  - pronuncia su voz
  lexicon: HALOT
  rationale: La construcción hebrea es literal 'dar su voz', un giro idiomático para hablar con poder o estruendo. 'Da su voz' preserva la imagen sin volverla rígida.
- source_word: וְרָעֲשׁוּ
  english_pob_choice: quake
  chosen_spanish: se estremecen
  alternatives_spanish:
  - tiemblan
  - vacilan
  - se sacuden
  lexicon: HALOT
  rationale: Para el par cósmico 'los cielos y la tierra', 'se estremecen' comunica bien la sacudida universal; en una nota se puede conservar la alternativa 'tiemblan' si se desea una correspondencia más directa.
- source_word: שָׁמַיִם וָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  lexicon: HALOT
  rationale: Se preserva el plural hebreo de שָׁמַיִם con 'los cielos', manteniendo el alcance cósmico del texto.
- source_word: מַחֲסֶה
  english_pob_choice: a refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - asilo
  - lugar de refugio
  lexicon: HALOT
  rationale: '''Refugio'' es la equivalencia más natural y teológicamente estable para este sustantivo de protección.'
- source_word: לְעַמּוֹ
  english_pob_choice: for his people
  chosen_spanish: para su pueblo
  alternatives_spanish:
  - para su gente
  - para su pueblo
  lexicon: HALOT
  rationale: El לְ introduce beneficio o relación de provecho; 'para su pueblo' expresa de forma idiomática ese valor en español.
- source_word: וּמָעוֹז
  english_pob_choice: a stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - baluarte
  - alcázar
  - fortín
  lexicon: HALOT
  rationale: '''Fortaleza'' conserva el sentido de lugar/garantía de protección y encaja bien con ''refugio'' en paralelo poético.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israel
  - para los hijos de Israel, es decir, el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo con 'hijos', que en español puede sonar más natural que 'hijos varones' y sigue siendo transparente respecto del hebreo. La alternativa idiomática queda implícita en nota.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se evita la sustitución por un título en mayúsculas, manteniendo el nombre del pacto según la política del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título nacional בן־ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los niños de Israel
  - el pueblo de Israel
  rationale: El hebreo es masculino plural y el POB inglés preserva esa forma. En español, 'hijos de Israel' mantiene la referencia genealógico-covenantal sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El control de revisión más reciente indicó 'unchanged' y el cotejo cruzado señaló 'high_agreement' con solo observaciones menores; por eso no se introdujeron cambios sustantivos respecto del trazado inglés, solo ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se preservó el paralelismo 'desde Sion / desde Jerusalén' y el doble complemento protector 'refugio / fortaleza'.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino explícito del hebreo.
  - '''Los cielos y la tierra'' conserva el plural hebreo y el tono cósmico del pasaje.'
  - '''Hijos de Israel'' mantiene la forma masculina del original; la nota ofrece la alternativa idiomática en español.'
