translation:
  language: es
  text: Entonces Josué lo bendijo y dio Hebrón a Caleb hijo de Jefuné como herencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bendijo a Caleb'; el hebreo dice literalmente 'lo bendijo', y Caleb es el referente claro por el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵהוּ
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - bendijo a Caleb
  lexicon: HALOT
  rationale: El hebreo lleva un sufijo pronominal de tercera persona masculina singular, por lo que el sentido inmediato es 'lo bendijo'. En español, el pronombre átono 'lo' preserva la referencia pronominal sin añadir el nombre en la línea principal; el contexto ya identifica claramente a Caleb.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josua
  lexicon: Convención bíblica española
  rationale: Se conserva el nombre propio bíblico estándar en español, con la forma más reconocible y natural para lectores hispanohablantes.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - otorgó
  lexicon: HALOT
  rationale: נתן significa 'dar'; 'dio' es la equivalencia más directa y mantiene el tono de asignación legal de la tierra sin añadir interpretación.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: Convención bíblica española
  rationale: Se emplea la transliteración bíblica habitual en español para el topónimo.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה
  english_pob_choice: to Caleb son of Jephunneh
  chosen_spanish: a Caleb hijo de Jefuné
  alternatives_spanish:
  - a Caleb, hijo de Jefuné
  - para Caleb hijo de Jefuné
  lexicon: Convención bíblica española
  rationale: El לְ marca destinatario indirecto; 'a Caleb' reproduce esa relación de manera natural en español. 'Hijo de Jefuné' conserva la fórmula genealógica sin sobrecargarla con artículos innecesarios.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - como posesión
  lexicon: HALOT
  rationale: נַחֲלָה designa la porción hereditaria de tierra. 'Herencia' comunica bien el valor de lote asignado y evita la rigidez de 'posesión'; 'heredad' es posible, pero menos natural en español contemporáneo.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría inglesa: se mantiene la referencia pronominal del hebreo, el verbo principal de asignación y el valor de herencia de נַחֲלָה sin ampliar el contenido.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - Se usa 'Josué' y 'Hebrón' con las formas bíblicas estándar en español.
  - '''Herencia'' conserva el sentido de asignación territorial/covenantal de נַחֲלָה.'
