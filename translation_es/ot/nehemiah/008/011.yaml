translation:
  language: es
  text: 'Y los levitas estaban calmando[a] a todo el pueblo, diciendo: «Guarden silencio, porque el día es santo; no se entristezcan[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban aquietando» o «estaban haciendo callar».
    reason: lexical_alternative
  - marker: b
    text: O «no se aflijan», «no hagan duelo» o «no estén tristes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַ/לְוִיִּם
  english_pob_choice: And the Levites
  chosen_spanish: Y los levitas
  alternatives_spanish:
  - Y los levitas ministeriales
  lexicon: HALOT
  rationale: El hebreo designa al grupo levítico de manera colectiva. «Levitas» es el equivalente natural y reconocido en español, y conserva la referencia a la clase/tribu sin añadir matices no presentes en el texto.
- source_word: מַחְשִׁים
  english_pob_choice: were quieting
  chosen_spanish: estaban calmando
  alternatives_spanish:
  - estaban aquietando
  - estaban haciendo callar
  - estaban callando
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «estaban calmando» transmite mejor la acción continua y el efecto de apaciguar a la multitud que un pasado puntual como «silenciaron».
- source_word: לְכָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a todo el pueblo reunido
  - a toda la gente
  lexicon: HALOT
  rationale: «Pueblo» refleja bien la comunidad reunida en contexto litúrgico y mantiene la amplitud distributiva de כָּל.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Marcador normal de introducción de cita directa; «diciendo» es la solución española más directa y sobria.
- source_word: הַסּוּ
  english_pob_choice: Be still
  chosen_spanish: Callen
  alternatives_spanish:
  - Guarden silencio
  - Cállense
  - Hush
  lexicon: HALOT
  rationale: El imperativo pide silencio o contención. En español, «Callen» preserva el tono breve y autoritativo del mandato sin sonar demasiado coloquial.
- source_word: כִּי הַיּוֹם קָדֹשׁ
  english_pob_choice: for the day is holy
  chosen_spanish: porque el día es santo
  alternatives_spanish:
  - porque el día es sagrado
  - porque este día es santo
  lexicon: HALOT
  rationale: «Santo» reproduce mejor la carga bíblica de קָדֹשׁ que «sagrado». Se evita añadir «este» porque el texto hebreo, en este punto, habla simplemente de «el día».
- source_word: וְאַל תֵּעָצֵבוּ
  english_pob_choice: do not be grieved
  chosen_spanish: no se entristezcan
  alternatives_spanish:
  - no se aflijan
  - no estén tristes
  - no se lamenten
  lexicon: HALOT
  rationale: El verbo admite el sentido de estar apenado, afligido o triste. «No se entristezcan» conserva el valor afectivo sin forzar el contexto hacia duelo ritual más específico de lo que el hebreo exige.
theological_decisions:
- issue: Valor de קָדֹשׁ aplicado al día
  english_pob_reading: holy
  chosen_spanish_reading: santo
  alternative_spanish_readings:
  - sagrado
  rationale: En español bíblico, «santo» mantiene mejor la densidad teológica y pactal de קָדֹשׁ. «Sagrado» puede sonar más general y menos directamente bíblico.
  doctrine_reference: Santificación del tiempo en el culto comunitario
- issue: Matiz de תֵּעָצֵבוּ en el contexto de escucha de la ley
  english_pob_reading: do not be grieved
  chosen_spanish_reading: no se entristezcan
  alternative_spanish_readings:
  - no se aflijan
  - no se lamenten
  rationale: El contexto inmediato es el llanto del pueblo al oír la ley; por eso el verbo se entiende como prohibición de tristeza/aflicción. «No se entristezcan» expresa el estado emocional sin introducir de antemano un duelo formal.
  doctrine_reference: Respuesta correcta a la palabra de Dios y orden del culto
translation_notes:
  revision_awareness: El texto hebreo presenta un participio durativo en מַחְשִׁים; por eso se prefirió una forma progresiva en español. También se evitó añadir «este» antes de «día», en línea con la revisión inglesa más cercana al hebreo. La decisión sobre קָדֹשׁ sigue la lectura estable del POB de «holy» y la expresa con «santo» en español.
  spanish_consistency_notes:
  - Se conserva «levitas» como término técnico ya asentado en español bíblico.
  - Se usa «santo» para קָדֹשׁ en coherencia con el valor teológico del POB.
  - Se evita una traducción excesivamente literal de הַסּוּ; el imperativo español debe sonar natural y autoritativo.
  - «No se entristezcan» mantiene el matiz emocional sin convertirlo en un término de duelo más fuerte que el hebreo.
