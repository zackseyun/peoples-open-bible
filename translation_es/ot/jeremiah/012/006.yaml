base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/006.yaml
  text: For even your brothers and your father’s house—even they have dealt treacherously with you[a]; even they have called out loudly after you. Do not trust them[b], though they speak good things to you.
  footnotes:
