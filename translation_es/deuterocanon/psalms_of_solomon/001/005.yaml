translation:
  language: es
  text: 'Fueron exaltados hasta las estrellas; dijeron: «Ciertamente no caerán».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑψώθησαν
  english_pob_choice: were exalted
  chosen_spanish: fueron exaltados
  alternatives_spanish:
  - fueron levantados
  - fueron alzados
  lexicon: BDAG
  rationale: El aoristo pasivo de ὑψόω conserva una pasiva real; «fueron exaltados» mantiene la idea de elevación y el matiz de autoengrandecimiento que el contexto sugiere, más que una mera subida física.
- source_word: ἕως τῶν ἄστρων
  english_pob_choice: to the stars
  chosen_spanish: hasta las estrellas
  alternatives_spanish:
  - a las estrellas
  - hasta los astros
  lexicon: LSJ
  rationale: ἕως con genitivo indica extensión hasta un límite alto. En español, «hasta las estrellas» reproduce con naturalidad la hipérbole y conserva la imagen poética.
- source_word: εἶπαν
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - declararon
  - afirmaron
  lexicon: BDAG
  rationale: Es el verbo narrativo simple de habla; «dijeron» es la opción más directa y fiel, sin añadir solemnidad interpretativa.
- source_word: Οὐ μὴ πέσωσιν
  english_pob_choice: We will certainly not fall
  chosen_spanish: No caerán ciertamente
  alternatives_spanish:
  - Ciertamente no caerán
  - No caeremos nunca
  lexicon: BDAG
  rationale: Οὐ μή expresa negación enfática. En español, «no caerán ciertamente» conserva esa fuerza; además, el verbo está en tercera persona plural, por lo que se evita la primera persona de algunas traducciones inglesas previas.
theological_decisions:
- issue: 'Tono de la afirmación: arrogancia presuntuosa o simple estabilidad'
  english_pob_reading: 'Rendered as emphatic boast: ''We will certainly not fall.'''
  chosen_spanish_reading: 'Afirmación enfática y orgullosa: «No caerán ciertamente».'
  alternative_spanish_readings:
  - 'Lectura más neutra: «No caerán»'
  - 'Énfasis más tradicional: «Ciertamente no caerán»'
  rationale: El contexto y la negación enfática οὐ μή favorecen un tono de confianza presumida, no una mera descripción de seguridad. La redacción española mantiene esa fuerza sin añadir una condena explícita que no está en la cláusula.
  doctrine_reference: Tensión literaria de orgullo humano frente a estabilidad aparente; sin formulación doctrinal añadida.
translation_notes:
  revision_awareness: 'La revisión reciente corrigió un problema gramatical importante en el antecedente inglés: πέσωσιν es tercera persona plural, no primera persona. Por eso el español evita cualquier lectura en primera persona y mantiene el discurso indirecto/narrativo con concordancia plural. También se tuvo en cuenta que la revisión prefirió «exalted» por el contexto de orgullo; en español se conservó «exaltados» para reflejar ese matiz.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o equivalentes no pertinentes; no hay tetragrámaton en este versículo.
  - 'Se conserva el plural narrativo de la segunda cola: «dijeron: No caerán ciertamente».'
  - «Estrellas» se prefiere a «astros» por claridad y porque el paralelismo poético no exige tecnicismo.
  - El registro es bíblico y digno, pero no arcaizante.
