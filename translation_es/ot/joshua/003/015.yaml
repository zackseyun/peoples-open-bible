review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura hebrea: cláusula temporal, llegada al Jordán, repetición de «los sacerdotes que llevaban el arca», y la nota parentética sobre el nivel del río en tiempo de siega. Sin embargo, hay desajustes importantes: «se mojaron» debilita נִטְבְּלוּ («fueron metidos/dipados»), y la nota [a] está anclada en «Jordán» cuando el contenido de la nota corresponde a «en el borde del agua».'
  spanish_quality_summary: El español es generalmente legible, pero la puntuación y el anclaje de notas necesitan corrección. «Por todos sus márgenes» suena menos natural y menos preciso que «sobre todos sus márgenes» o mejor «sobre todas sus orillas/riberas» para reflejar el desbordamiento. La nota [c] es innecesaria y no responde a una ambigüedad real creada por el español.
  glossary_alignment: No hay términos del glosario mayor en juego salvo consistencia narrativa. Se preserva bien «arca», «sacerdotes» y «Jordán». Conviene mantener un equivalente más fuerte para נִטְבְּלוּ, como «se hundieron» o «se metieron», evitando el debilitamiento de «se mojaron».
  issues:
  - severity: high
    issue: La nota [a] está colocada en «Jordán», pero su contenido explica «en el borde del agua».
    rationale: La disciplina del proyecto exige que cada nota esté anclada exactamente en la frase pertinente. Tal como está, el lector entiende erróneamente que la variante afecta «Jordán».
  - severity: medium
    issue: «Se mojaron» debilita נִטְבְּלוּ.
    rationale: El hebreo describe que los pies entraron en el agua en su borde, no solo que quedaron mojados. «Se hundieron» o «entraron» conserva mejor la acción física sin exagerar a inmersión total.
  - severity: medium
    issue: La nota [c] es innecesaria.
    rationale: «Todos los días de la siega» ya comunica adecuadamente כֹּל יְמֵי קָצִיר; la nota no añade una alternativa significativa preservada por el inglés ni resuelve ambigüedad nueva en español.
  - severity: low
    issue: «Por todos sus márgenes» es menos natural y menos preciso para la imagen de crecida.
    rationale: La frase hebrea expresa que el Jordán estaba lleno sobre sus riberas/orillas. «Sobre todas sus orillas» suena más idiomático y preserva mejor la imagen de desborde.
  revised_spanish_text: Y cuando los que llevaban el arca llegaron hasta el Jordán, y los pies de los sacerdotes que llevaban el arca se hundieron en el borde del agua[a] (ahora bien, el Jordán estaba lleno sobre todas sus orillas[b] todos los días de la siega),
  revised_footnotes:
