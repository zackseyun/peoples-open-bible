translation:
  language: es
  text: 'Entonces Yahvé habló a Moisés[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR». Entre las renderizaciones alternativas figuran «Yahvé» y «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then spoke
  chosen_spanish: Entonces habló
  alternatives_spanish:
  - Y habló
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר avanza la narración; en español, «entonces» conserva bien la secuencia y «habló» respeta el verbo hebreo de habla, manteniendo la diferencia con לֵאמֹר, que introduce el discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del texto hebreo. «Yahvé» es la forma española estándar para transliterar יְהוָה en este proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español, «a» es la equivalencia natural y directa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio en su forma española habitual y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - al decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se rinde con «diciendo» para señalar que sigue la cita directa, sin convertirla en una paráfrasis.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. La decisión mantiene el nombre personal de Dios en español con una forma auditable y no sustitutiva.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés confirma alta concordancia y sin cambios en la última revisión; la versión española conserva esa misma lectura, con ajuste normal de orden y morfología para el español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma consistente para יְהוָה.
  - Se prefirió «habló» sobre «dijo» para conservar el verbo hebreo דבר, siguiendo la distinción del original entre el verbo de habla y la fórmula לֵאמֹר.
  - La puntuación reproduce la apertura de discurso del hebreo con dos puntos al final.
