translation:
  language: es
  text: 'Entonces dije[a]: «Ahora los filisteos descenderán contra mí en Gilgal, y no he buscado el favor de Yahvé». Así que me obligué[b] y ofrecí el holocausto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no he buscado el favor de Yahvé»; literalmente, «no he implorado el rostro de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: O «me contuve». El verbo hebreo puede expresar contenerse o dominarse a sí mismo; aquí probablemente significa que Saúl se obligó a actuar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: So I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Así que dije
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo y conclusión en el razonamiento de Saúl; «Entonces dije» conserva esa secuencia de modo natural en español.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - en este momento
  - pues ahora
  lexicon: HALOT
  rationale: Adverbio temporal de urgencia y situación inmediata; «Ahora» es la opción más breve y idiomática.
- source_word: יֵרְדוּ
  english_pob_choice: will come down
  chosen_spanish: descenderán
  alternatives_spanish:
  - bajarán
  - vendrán abajo
  lexicon: HALOT
  rationale: El verbo literalmente expresa descenso; en el movimiento militar hacia Gilgal, «descenderán» conserva la dirección sin convertirlo en una paráfrasis agresiva.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar en español bíblico.
- source_word: אֵלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - hacia mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque literalmente significa «a mí», en este contexto militar el español requiere una expresión hostil como «contra mí».
- source_word: הַגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - a Gilgal
  - en el Gilgal
  lexicon: HALOT
  rationale: Nombre de lugar transliterado; con el verbo de movimiento y el contexto de enfrentamiento, «en Gilgal» resulta claro y natural.
- source_word: וּפְנֵי יְהוָה
  english_pob_choice: the favor of Yahweh
  chosen_spanish: el favor de Yahvé
  alternatives_spanish:
  - el rostro de Yahvé
  - la presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la decisión auditada de entender el modismo פנֵי יְהוָה con חִלִּיתִי como «buscar/implorar el favor». En español, «el favor de Yahvé» comunica el sentido del giro sin perder la tensión idiomática documentada en la nota inglesa.
- source_word: לֹא חִלִּיתִי
  english_pob_choice: I have not sought
  chosen_spanish: no he buscado
  alternatives_spanish:
  - no he implorado
  - no he suplicado
  lexicon: HALOT
  rationale: El verbo con «rostro/favor» tiene valor de rogar o buscar favor. «No he buscado» reproduce la forma verbal de manera sobria; la nota preserva que el hebreo dice literalmente «no he tratado el rostro de Yahvé».
- source_word: וָאֶתְאַפַּק
  english_pob_choice: So I forced myself
  chosen_spanish: Así que me forcé
  alternatives_spanish:
  - Así que me contuve
  - Así que me dominé
  lexicon: HALOT
  rationale: El hitpael de אפק puede significar contenerse o forzarse a actuar. Dado el contexto, «me forcé» conserva la idea de actuar bajo presión; se mantiene la tensión con la alternativa de «me contuve» documentada por el audit trail.
- source_word: וָאַעֲלֶה
  english_pob_choice: and offered up
  chosen_spanish: y ofrecí
  alternatives_spanish:
  - y presenté
  - y elevé
  lexicon: HALOT
  rationale: Con el sustantivo cultual siguiente, עלה funciona como fórmula sacrificial. En español, el verbo simple «ofrecí» es claro y suficiente en combinación con el objeto «el holocausto».
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio completo
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el término preciso para עֹלָה en contexto sacrificial y conserva el valor técnico del rito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto: transliterar el Tetragrama como el nombre propio divino «Yahvé», evitando la sustitución por un título y preservando la identificación del pacto.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Modismo «buscar el favor / entretejer el rostro» de Yahvé
  english_pob_reading: I have not sought the favor of Yahweh
  chosen_spanish_reading: no he buscado el favor de Yahvé
  alternative_spanish_readings:
  - no he implorado el rostro de Yahvé
  - no he aplacado el rostro de Yahvé
  rationale: La lectura auditada reconoce la tensión entre la expresión literal («no he tratado el rostro») y su sentido idiomático («buscar el favor»). En español se conserva el sentido claro, y la nota preserva la alternativa literal para no borrar la observación lexical.
  doctrine_reference: HALOT / audit trail of 1 Samuel 13:12
- issue: Verbo hitpael וָאֶתְאַפַּק
  english_pob_reading: So I forced myself
  chosen_spanish_reading: Así que me forcé
  alternative_spanish_readings:
  - Así que me contuve
  - Así que me dominé
  rationale: 'Se conserva la tensión semántica del verbo: puede ser auto-contención o auto-impulso forzado. El contexto favorece la idea de actuar bajo presión, por lo que «me forcé» es la mejor equivalencia funcional, sin eliminar la alternativa documentada.'
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: Se revisó el pasaje contra el paquete fuente y el audit trail inglés; no se detectaron cambios necesarios respecto de la lectura aprobada más reciente. Se preservó la decisión teológica de Yahvé para el Tetragrama y la tensión léxica del modismo con פְנֵי יְהוָה y del hitpael וָאֶתְאַפַּק.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - «Holocausto» se mantiene como término técnico sacrificial para עֹלָה.
  - Se prefirió un español natural pero sobrio, sin suavizar el valor idiomático o sacrificial del hebreo.
  - Las notas al pie conservan la alternativa literal donde el hebreo lo warrantiza, en especial en la expresión «el rostro de Yahvé».
