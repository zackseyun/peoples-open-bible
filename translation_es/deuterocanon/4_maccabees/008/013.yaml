  - severity: medium
    issue: ‘los guardias’ es más genérico que οἱ δορυφόροι.
    rationale: En contexto cortesano, δορυφόροι denota los guardaespaldas/escoltas del tirano. ‘Guardias’ no es falso, pero pierde matiz de función personal y regia.
  - severity: medium
    issue: ‘sacaron’ no refleja tan bien προέθεσαν como ‘pusieron delante’ o ‘dispusieron’.
    rationale: El verbo griego describe poner delante/exhibir los instrumentos; ‘sacaron’ puede sugerir simplemente extraerlos, no presentarlos ante los presentes.
  - severity: low
    issue: ‘ganchos de garra’ suena un poco forzado en español.
    rationale: La frase es comprensible, pero ‘ganchos con garra’ o ‘garfios’ sería más natural. Aun así, no es un error grave y puede mantenerse si se desea conservar la cercanía al inglés auditado.
