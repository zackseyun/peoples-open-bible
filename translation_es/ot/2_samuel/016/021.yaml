    text: Or 'you have become odious to your father'; Hebrew literally evokes becoming foul or offensive.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the hands of all who are with you will be strengthened,' an idiom for being encouraged or emboldened.
    reason: lexical_alternative
