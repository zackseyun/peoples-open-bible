review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura exhortativa del griego: εὐλογεῖτε + vocativo ἱερεῖς + objeto τὸν κύριον; luego ὑμνεῖτε καὶ ὑπερυψοῦτε αὐτὸν εἰς τοὺς αἰῶνας. Conserva correctamente «sacerdotes», «el Señor» y «para siempre». También mantiene el matiz hímnico de ὑμνεῖτε mediante «cantad himnos».'
  spanish_quality_summary: 'La principal dificultad es de naturalidad y precisión idiomática: «exaltadlo muy por encima» suena calcado y en español sugiere una comparación espacial no presente de forma natural en esta fórmula litúrgica. «Exaltadlo en gran manera» o «exaltadlo grandemente» expresa mejor la intensificación de ὑπερυψοῦτε. Además, «Bendecid» es fiel, pero para una meta de español latinoamericano moderno y legible conviene «Bendigan».'
  glossary_alignment: La decisión «Señor» para κύριος está bien justificada en este contexto griego deuterocanónico y no requiere «Yahvé». «Sacerdotes» y «himnos» también se ajustan al proyecto. No hay conflicto doctrinal serio; la revisión es estilística y léxica menor para mejorar el español sin perder la fuerza litúrgica.
  issues:
  - severity: medium
    issue: «exaltadlo muy por encima» es una formulación poco natural en español
    rationale: Aunque intenta reflejar la intensificación de ὑπερυψοῦτε, en español suena demasiado literal y puede sugerir un contraste espacial. Una expresión adverbial como «en gran manera» comunica mejor la fuerza intensiva en registro bíblico claro.
  - severity: low
    issue: «Bendecid» suena más peninsular/arcaizante que neutral latinoamericano
    rationale: El mandato plural «Bendecid» es comprensible y fiel, pero la guía pide español neutral latinoamericano y moderno. «Bendigan» mantiene el valor exhortativo y la fuerza litúrgica con mejor legibilidad general.
  - severity: low
    issue: La nota [a] omite explícitamente el vocativo «sacerdotes» de la alternativa inglesa
    rationale: La alternativa más exacta al conjunto sería «Alaben al Señor, sacerdotes». Así se preserva mejor el alcance de la variante documentada en el POB inglés.
  revised_spanish_text: Bendigan al Señor[a], sacerdotes; canten himnos[b] y exáltenlo en gran manera para siempre.
