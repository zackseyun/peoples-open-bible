translation:
  language: es
  text: Los pastos de la soledad silvestre gotean[a], y los collados se ciñen con regocijo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rebosan»; el verbo hebreo puede describir humedad que destila o cae en abundancia.
    reason: lexical_alternative
  - marker: b
    text: O «Los collados se ciñen con gozo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעֲפוּ
  english_pob_choice: drip
  chosen_spanish: destilan
  alternatives_spanish:
  - gotean
  - derraman
  - overflow
  lexicon: HALOT
  rationale: El verbo hebreo sugiere un fluir gota a gota o una humedad que va destilando. «Destilan» conserva la imagen poética de abundancia húmeda sin forzar la idea de un desbordamiento total.
- source_word: נְאוֹת
  english_pob_choice: pastures
  chosen_spanish: praderas
  alternatives_spanish:
  - pastos
  - mejores de pastoreo
  - meadowlands
  lexicon: HALOT
  rationale: En este paralelo poético con el desierto, «praderas» comunica bien tierras de pastoreo y evita una repetición demasiado técnica o rústica. Mantiene el contraste entre esterilidad y fecundidad.
- source_word: מִדְבָּר
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - desierto agreste
  - estepa
  - soledad
  lexicon: HALOT
  rationale: Aunque el término puede abarcar una estepa o región no cultivada, aquí «desierto» funciona en español como contrapunto poético comprensible frente a «praderas», sin imponer necesariamente la idea de arena.
- source_word: גִיל
  english_pob_choice: rejoicing
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  - júbilo
  lexicon: HALOT
  rationale: Como sustantivo, גִיל expresa gozo exultante. «Alegría» es claro y natural en español; se conserva la personificación mediante el complemento que sigue.
- source_word: גְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: los collados
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: HALOT
  rationale: «Collados» reproduce el relieve menor y poético del hebreo sin elevarlo innecesariamente a «montes». Encaja con el campo visual del verso.
- source_word: תַּחְגֹּרְנָה
  english_pob_choice: gird themselves with
  chosen_spanish: se ciñen de
  alternatives_spanish:
  - se visten de
  - se adornan con
  - se ciñen con
  lexicon: HALOT
  rationale: חָגַר significa literalmente ceñir o atar alrededor. «Se ciñen de» preserva la metáfora original y la personificación poética mejor que una paráfrasis más suave como «se visten de».
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético y coincide sustancialmente con la pauta inglesa auditada: imagen de abundancia húmeda para יִרְעֲפוּ y personificación de los collados ceñidos con alegría. No se requieren revisiones adicionales según el informe más reciente.'
  spanish_consistency_notes:
  - Se conserva un tono poético sobrio y publicable.
  - Se evita «SEÑOR» o ajustes teológicos ajenos al verso, porque el hebreo aquí no contiene el Tetragrámaton ni un título divino explícito.
  - La metáfora de vestidura/ceñimiento se mantiene abierta mediante nota alternativa, como en el inglés auditado.
