id: 2CH.1.5
reference: 2 Chronicles 1:5
source:
  edition: WLC
  text: וּ/מִזְבַּ֣ח הַ/נְּחֹ֗שֶׁת אֲשֶׁ֤ר עָשָׂה֙ בְּצַלְאֵל֙ בֶּן אוּרִ֣י בֶן ח֔וּר שָׂ֕ם לִ/פְנֵ֖י מִשְׁכַּ֣ן יְהוָ֑ה וַ/יִּדְרְשֵׁ֥/הוּ שְׁלֹמֹ֖ה וְ/הַ/קָּהָֽל־־׃
translation:
  text: And the bronze altar that Bezalel son of Uri[a], son of Hur, had made was there before the tabernacle of Yahweh, and Solomon and the assembly sought it there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Solomon and the assembly sought it there,' taking the suffix to refer to the bronze altar; the Hebrew suffix is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִזְבַּח הַנְּחֹשֶׁת
  chosen: And the bronze altar
  alternatives:
  - Now the bronze altar
  - And the altar of bronze
  lexicon: HALOT
  rationale: מִזְבַּח is 'altar'; נְחֹשֶׁת in this cultic furnishing context is best rendered 'bronze' in modern English rather than the older traditional 'brass.' The prefixed conjunction is carried as 'And' to preserve narrative continuity.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that ... had made
  alternatives:
  - which ... made
  lexicon: HALOT
  rationale: The relative clause identifies the altar. English past perfect ('had made') fits the prior action relative to the narrative setting.
- source_word: בְּצַלְאֵל בֶּן אוּרִי בֶן חוּר
  chosen: Bezalel son of Uri, son of Hur
  alternatives:
  - Bezalel the son of Uri, the son of Hur
  rationale: Personal names are transliterated by standard convention per translation philosophy. 'Son of' is retained rather than flattened into a genealogy shorthand.
- source_word: שָׂם
  chosen: was there
  alternatives:
  - had been placed
  - stood
  - was set
  lexicon: HALOT
  rationale: Literally 'had set/placed,' but the subject is the altar and no explicit agent is supplied here. 'Was there' communicates the stative result in natural English without over-specifying agency. The following phrase 'before the tabernacle' completes the location.
- source_word: לִפְנֵי מִשְׁכַּן יְהוָה
  chosen: before the tabernacle of the LORD
  alternatives:
  - in front of the tabernacle of the LORD
  - before the dwelling place of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial, 'before/in front of.' מִשְׁכָּן is the tabernacle/dwelling. 'Tabernacle' is the established and accurate cultic term. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: וַיִּדְרְשֵׁהוּ
  chosen: sought him there
  alternatives:
  - inquired of him there
  - sought it
  - consulted him
  lexicon: HALOT
  rationale: דרשׁ with a pronominal suffix can mean 'seek/inquire of.' Given the masculine suffix and the broader biblical idiom of seeking the LORD, the object is best understood as the LORD rather than the altar. 'There' is supplied in English to connect the seeking with the altar's location and the preceding context. Because the referent could be taken differently, the alternative is preserved in a footnote.
- source_word: שְׁלֹמֹה וְהַקָּהָל
  chosen: Solomon and the assembly
  alternatives:
  - Solomon and the congregation
  lexicon: HALOT
  rationale: קָהָל denotes the assembled community. 'Assembly' is clear modern English and fits the public worship setting better than the more tradition-bound 'congregation' here.
