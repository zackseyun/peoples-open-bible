translation:
  language: es
  text: 'Ahora Abimelec no se había acercado a ella[a], y dijo: «Señor, ¿acaso matarás aun a una nación[b] justa?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión idiomática hebrea que implica que Abimelec no había tenido relaciones sexuales con Sara.
    reason: cultural_note
  - marker: b
    text: O «pueblo». El hebreo גּוֹי es un término colectivo para un pueblo o nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲבִימֶלֶךְ ... וַיֹּאמַר
  english_pob_choice: Now Abimelech ... so he said
  chosen_spanish: Ahora Abimelec ... y dijo
  alternatives_spanish:
  - Entonces Abimelec ... dijo
  - Pero Abimelec ... y dijo
  lexicon: WLC/HALOT
  rationale: La secuencia narrativa de los waw consecutivos se expresa de manera natural en español con «Ahora ... y dijo», manteniendo el avance del relato sin volverlo rígido o artificioso.
- source_word: קָרַב אֵלֶיהָ
  english_pob_choice: had not come near her
  chosen_spanish: no se había acercado a ella
  alternatives_spanish:
  - no se había aproximado a ella
  - no había tenido relaciones con ella
  lexicon: HALOT
  rationale: El giro hebreo es un eufemismo idiomático. «No se había acercado a ella» conserva la forma cercana al original y permite que la implicación sexual se entienda por el contexto, como en el POB inglés.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: Aquí el hablante se dirige a Dios en el sueño. En español, «Señor» es el equivalente más natural y reverente; «mi Señor» suena más forzado y añade un posesivo que no está en la función del título.
- source_word: הֲגוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: גוֹי conserva un sentido colectivo. «Nación» preserva mejor esa amplitud corporativa que una referencia reducida al individuo, y sigue de cerca la decisión auditada en inglés.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: también
  alternatives_spanish:
  - aun
  - incluso
  lexicon: HALOT
  rationale: En esta pregunta retórica, «también» comunica la ampliación del alcance de la acusación. En español, «incluso/aun» también serían posibles, pero «también» mantiene la fluidez y el paralelismo con la pregunta.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justa
  alternatives_spanish:
  - recta
  - inocente
  lexicon: HALOT
  rationale: En español, «justa» conserva el campo semántico de צַדִּיק y la conexión bíblica con la justicia/rectitud, sin estrecharlo únicamente a la inocencia legal.
- source_word: תַּהֲרֹג
  english_pob_choice: will you kill
  chosen_spanish: matarás
  alternatives_spanish:
  - asesinarás
  - darás muerte
  lexicon: HALOT
  rationale: El imperfecto interrogativo se vierte de forma directa con «matarás». «Asesinarás» añade una valoración que el hebreo no explicita, y «darás muerte» sería más arcaizante.
theological_decisions:
- issue: Alcance colectivo de גּוֹי
  english_pob_reading: Render גּוֹי as 'nation' and preserve the corporate sense without narrowing it to Abimelech alone.
  chosen_spanish_reading: Traducir גּוֹי como «nación» y conservar el sentido corporativo, sin reducirlo solo a Abimelec.
  alternative_spanish_readings:
  - pueblo
  - gente
  - familia
  rationale: La petición de Abimelec habla en términos colectivos. «Nación» mantiene la tensión textual entre la situación del rey y la responsabilidad del grupo, sin resolverla en una interpretación más estrecha que la del hebreo.
  doctrine_reference: Preservar la tensión textual y el alcance corporativo del juicio o la inocencia; consistencia terminológica con la decisión auditada.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el cotejo indicó alta concordancia y no hubo correcciones aplicadas. Esta versión española sigue de cerca la decisión auditada en inglés, manteniendo el eufemismo de קָרַב אֵלֶיהָ, el sentido colectivo de גּוֹי y la pregunta retórica de tono acusatorio.'
  spanish_consistency_notes:
  - Se mantiene «Abimelec» como forma estándar en español para el nombre propio.
  - Se usa «Señor» para אֲדֹנָי en una alocución directa a Dios, conforme al contexto onírico.
  - «Nación» preserva el valor colectivo de גּוֹי.
  - «Justa» conserva el campo semántico de צַדִּיק sin perder naturalidad en español.
