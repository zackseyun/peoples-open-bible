  to: Puso las varas que había pelado en los abrevaderos, en los canales de abrevadero[a] donde venía el rebaño a beber, delante del rebaño[b]; y se aparearon[c] cuando venían a beber.
  rationale: Se corrige un error de sentido importante («de donde»), se mejora la naturalidad contextual de la segunda expresión locativa, y se reordenan/anclan las notas en los lugares correctos. También se elimina una nota redundante y se preservan las alternativas léxicas documentadas por el POB inglés.
