translation:
  language: es
  text: Por esta razón, un hombre dejará a su padre y a su madre y se unirá a su esposa.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se apegará a su esposa». El verbo griego puede destacar una unión o apego muy estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνεκεν τούτου
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por este motivo
  - Por eso
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación causal o conclusiva del texto griego, sin debilitar el enlace explicativo que introduce la cita.
- source_word: καταλείψει
  english_pob_choice: will leave
  chosen_spanish: dejará
  alternatives_spanish:
  - abandonará
  - se irá de
  lexicon: BDAG
  rationale: El futuro simple comunica la acción futura de abandonar el hogar paterno. 'Dejará' es la opción más natural y fiel en este contexto.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: En la cita matrimonial el sujeto queda especificado como masculino por el paralelo con 'su esposa'; por eso conviene mantener 'un hombre' y no neutralizarlo.
- source_word: τὸν πατέρα αὐτοῦ καὶ τὴν μητέρα
  english_pob_choice: his father and mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a su padre y madre
  - a su padre y a su madre
  lexicon: BDAG
  rationale: El español expresa de forma natural ambos objetos con el posesivo repetido. Mantiene la simetría del griego y la claridad relacional del hogar de origen.
- source_word: προσκολληθήσεται
  english_pob_choice: be joined to
  chosen_spanish: se unirá a
  alternatives_spanish:
  - se apegará a
  - se adherirá a
  - se pegará a
  lexicon: BDAG
  rationale: '''Se unirá a'' transmite la fuerte unión matrimonial del verbo sin sonar rígido ni demasiado coloquial. ''Se pegará'' sería demasiado literal y podría sonar impropio en español.'
- source_word: πρὸς τὴν γυναῖκα αὐτοῦ
  english_pob_choice: to his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  lexicon: BDAG
  rationale: Aunque γυναῖκα puede significar 'mujer', aquí el contexto matrimonial exige 'esposa' para evitar ambigüedad en español y preservar el sentido relacional del pasaje.
theological_decisions:
- issue: Lenguaje masculino singular en la cita de Génesis aplicada al matrimonio
  english_pob_reading: a man ... his wife
  chosen_spanish_reading: un hombre ... su esposa
  alternative_spanish_readings:
  - una persona ... su cónyuge
  - un ser humano ... su pareja
  rationale: La fuente griega y el audit trail inglés conservan el masculino singular porque el contexto cita una configuración marital hombre-mujer. En español debe mantenerse esa especificidad sin generalizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio necesario en el pasaje base; por eso la redacción española sigue de cerca la lectura auditada sin introducir expansiones ni suavizaciones.
  spanish_consistency_notes:
  - Se mantuvo el registro formal y claro, apto para lectura eclesial amplia.
  - Se prefirió 'esposa' por el contexto matrimonial, aunque el griego literalmente diga 'mujer'.
  - '''Se unirá a'' conserva la fuerza relacional de προσκολληθήσεται sin recurrir a un calco duro.'
