id: EXO.12.13
reference: Exodus 12:13
source:
  edition: WLC
  text: וְ/הָיָה֩ הַ/דָּ֨ם לָ/כֶ֜ם לְ/אֹ֗ת עַ֤ל הַ/בָּתִּים֙ אֲשֶׁ֣ר אַתֶּ֣ם שָׁ֔ם וְ/רָאִ֨יתִי֙ אֶת הַ/דָּ֔ם וּ/פָסַחְתִּ֖י עֲלֵ/כֶ֑ם וְ/לֹֽא יִֽהְיֶ֨ה בָ/כֶ֥ם נֶ֨גֶף֙ לְ/מַשְׁחִ֔ית בְּ/הַכֹּתִ֖/י בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: And the blood shall be a sign for you on the houses where you are[a]. When I see the blood, I will pass over you[b], and no plague will be among you to destroy, when I strike the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will spare you' or 'I will protect you.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and no plague will be among you for the destroyer,' taking 'destroyer' as a substantive.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context has future/resultative force; 'shall be' preserves the directive-promissory tone in natural English.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite noun referring to the previously specified sacrificial blood; retained literally.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition marks benefit/reference; 'for you' is idiomatic and conveys that the sign functions on Israel's behalf.
- source_word: לְאֹת
  chosen: a sign
  alternatives:
  - as a sign
  - for a sign
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or marker. 'A sign' is the clearest modern rendering.
- source_word: עַל הַבָּתִּים
  chosen: on the houses
  alternatives:
  - upon the houses
  lexicon: HALOT
  rationale: Literal spatial rendering fits the Passover blood applied to the houses.
- source_word: אֲשֶׁר אַתֶּם שָׁם
  chosen: where you are
  alternatives:
  - in which you are
  - where you are staying
  lexicon: HALOT
  rationale: Relative clause plus adverb שָׁם identifies the houses occupied by the Israelites. 'Where you are' is concise and faithful.
- source_word: וְרָאִיתִי אֶת־הַדָּם
  chosen: When I see the blood
  alternatives:
  - and I will see the blood
  - for I will see the blood
  lexicon: HALOT
  rationale: Though formally coordinate, the clause functions temporally in English sequence. 'When I see' best conveys the sense without woodenness.
- source_word: וּפָסַחְתִּי עֲלֵכֶם
  chosen: I will pass over you
  alternatives:
  - I will spare you
  - I will pass by you
  lexicon: HALOT
  rationale: פסח in this context is the key verb behind Passover. 'Pass over' preserves the traditional and lexical connection. 'Spare' captures an interpretive effect but is less transparent to the Hebrew.
- source_word: וְלֹא יִהְיֶה בָכֶם נֶגֶף
  chosen: and no plague will be among you
  alternatives:
  - and no blow will be on you
  - and no affliction will come upon you
  lexicon: HALOT
  rationale: נֶגֶף denotes a plague/striking blow. 'Among you' reflects בָכֶם naturally in context, indicating it will not occur in their midst.
- source_word: לְמַשְׁחִית
  chosen: to destroy
  alternatives:
  - for destruction
  - as a destroyer
  lexicon: HALOT
  rationale: 'The phrase is difficult: ל plus מַשְׁחִית can be taken as result/purpose (''for destruction'') or as a substantive (''destroyer''). Here it is rendered adverbially/purposively with the preceding plague: ''no plague will be among you to destroy.'' This avoids importing a distinct personal agent not explicit in the Hebrew syntax of this verse.'
- source_word: בְּהַכֹּתִי
  chosen: when I strike
  alternatives:
  - when I smite
  - in my striking
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב conveys temporal circumstance. 'When I strike' is clear modern English.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: the land of Egypt
  alternatives:
  - in the land of Egypt
  lexicon: HALOT
  rationale: With the temporal infinitive phrase, English idiom prefers 'strike the land of Egypt.' The locative sense remains intact.
