translation:
  language: es
  text: 'Pero Esaú dijo[a]: «Tengo mucho, mi hermano; que sea tuyo lo que es tuyo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengo suficiente, mi hermano; que sea tuyo lo que te pertenece».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; aquí, como en el POB inglés, «pero» refleja bien el matiz de contraste suave con la oferta de Jacob, y «dijo» es la traducción directa y natural de אמר.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: Convención transliterativa estándar
  rationale: Se conserva el nombre propio con la forma española habitual, sin añadir equivalencias interpretativas.
- source_word: יֶשׁ לִי רָב
  english_pob_choice: I have plenty
  chosen_spanish: Yo tengo mucho
  alternatives_spanish:
  - Yo tengo bastante
  - Tengo abundancia
  - Yo tengo suficiente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica posesión de abundancia. «Tengo mucho» preserva la fuerza de רָב sin imponer la idea de mera suficiencia; «bastante» o «suficiente» suavizan demasiado el término.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  - hermano
  lexicon: HALOT
  rationale: El vocativo con sufijo afectivo se mantiene de forma natural en español. «Hermano mío» conserva la calidez relacional del original.
- source_word: יְהִי לְךָ אֲשֶׁר לָךְ
  english_pob_choice: let what is yours be yours
  chosen_spanish: sea tuyo lo que es tuyo
  alternatives_spanish:
  - déjate lo que es tuyo
  - que sea tuyo lo que te pertenece
  - sea tuyo lo que pertenece a ti
  lexicon: HALOT
  rationale: El jussivo de היה funciona aquí como una concesión/petición amable para que Jacob conserve lo suyo. «Sea tuyo lo que es tuyo» sigue de cerca la estructura y evita añadir la idea de «quedarse» que no está explícita.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audit trail inglés, manteniendo el matiz de abundancia en יֶשׁ לִי רָב y la cláusula final como concesión simple, sin introducir una noción adicional de permanencia. Se conserva la alternativa léxica documentada para la posible lectura de suficiencia.
  spanish_consistency_notes:
  - Se usa «Esaú» como forma estable del nombre propio.
  - Se mantiene «mucho» para רָב por su valor de abundancia, no mera suficiencia.
  - La cláusula final se formula con orden natural en español, pero sin desplazar el sentido concesivo del hebreo.
  - La nota a pie de página preserva la alternativa de traducción equivalente a la del POB inglés.
