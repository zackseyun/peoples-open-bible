  to: Pero Yahvé no había dicho que borraría el nombre de Israel de debajo del cielo[a], por eso los salvó por medio de Jeroboam hijo de Joás[b].
  rationale: Se ajusta el conector a 'por eso' para reflejar mejor la progresión lógica/narrativa del hebreo sin introducir un contraste adversativo excesivo. Se cambia 'de debajo de los cielos' a 'de debajo del cielo' por mayor naturalidad idiomática en español manteniendo el mismo sentido. Se conservan las decisiones léxicas principales y la nota sobre el modismo instrumental.
