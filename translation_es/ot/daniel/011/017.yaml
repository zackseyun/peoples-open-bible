translation:
  language: es
  text: Él se decidirá a venir con la fuerza de todo su reino, y habrá términos justos[a] con él; y actuará. Le dará la hija de mujeres[b] para destruir eso[c], pero ella no se mantendrá firme[d], y no será para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «y rectos estarán con él», o «habrá un acuerdo con él». La expresión hebrea es difícil y puede aludir a personas con él o a términos/arreglos equitativos.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «la hija de mujeres», probablemente una referencia a una hija real dada en matrimonio; muchos entienden aquí una alianza matrimonial política.'
    reason: cultural_note
  - marker: c
    text: El sufijo femenino de «para destruir eso» puede referirse a la mujer o a un antecedente femenino como un reino, plan o alianza.
    reason: lexical_alternative
  - marker: d
    text: 'También: «pero no permanecerá», «pero no prevalecerá» o «pero no tendrá éxito». El verbo femenino puede referirse a la mujer o al plan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשֵׂם פָּנָיו
  english_pob_choice: he will set his face
  chosen_spanish: pondrá su rostro
  alternatives_spanish:
  - se dispondrá decididamente
  - dirigirá su atención
  lexicon: HALOT
  rationale: La imagen hebrea de orientar el rostro expresa determinación firme. «Poner su rostro» conserva esa fuerza figurada sin perder naturalidad en español; «disponerse decididamente» explicita la intención, pero debilita la imagen del texto.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - entrar
  - ir
  lexicon: HALOT
  rationale: El infinitivo es amplio; «venir» reproduce la idea básica de movimiento sin introducir la lectura militar específica de «invadir».
- source_word: בְּתֹקֶף
  english_pob_choice: with the strength
  chosen_spanish: con la fuerza
  alternatives_spanish:
  - con poder
  - con vigor
  lexicon: HALOT
  rationale: La palabra denota fuerza o poder efectivo. «Con la fuerza» es fiel y fluido en castellano.
- source_word: כָּל מַלְכוּתוֹ
  english_pob_choice: of his whole kingdom
  chosen_spanish: de todo su reino
  alternatives_spanish:
  - de su reino entero
  - de toda su monarquía
  lexicon: HALOT
  rationale: «Todo su reino» comunica la totalidad de recursos y dominio con una construcción natural en español.
- source_word: וִישָׁרִים עִמּוֹ
  english_pob_choice: upright terms will be with him
  chosen_spanish: con él habrá términos rectos
  alternatives_spanish:
  - con él habrá condiciones rectas
  - con él habrá un acuerdo justo
  lexicon: HALOT
  rationale: El hebreo es difícil y puede referirse a personas rectas o a condiciones/acuerdos equitativos. Dado que la revisión inglesa prefirió «terms», traduzco de manera relacional y diplomática con «términos rectos», preservando la ambigüedad del contexto.
- source_word: וְעָשָׂה
  english_pob_choice: and he will act
  chosen_spanish: y hará
  alternatives_spanish:
  - y actuará
  - y lo llevará a cabo
  lexicon: HALOT
  rationale: El verbo es muy general. «Y hará» es breve y mantiene la apertura semántica del hebreo sin concretar indebidamente la acción.
- source_word: וּבַת הַנָּשִׁים
  english_pob_choice: the daughter of women
  chosen_spanish: la hija de mujeres
  alternatives_spanish:
  - una hija de mujeres
  - la hija de las mujeres
  lexicon: HALOT
  rationale: La traducción literal conserva la expresión hebrea y su rareza. En este contexto puede aludir a una mujer dada en matrimonio político, pero el texto no obliga a explicitarlo en la línea principal.
- source_word: יִתֶּן לוֹ
  english_pob_choice: he will give him
  chosen_spanish: la entregará
  alternatives_spanish:
  - se la dará
  - la dará a él
  lexicon: HALOT
  rationale: Aunque el inglés conserva el doble objeto de forma literal, el contexto sugiere que se trata de una entrega/matrimonio político. «La entregará» expresa ese acto sin añadir más de lo que el pasaje permite.
- source_word: לְהַשְׁחִיתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para arruinarla
  - para corromperla
  lexicon: HALOT
  rationale: 'El sufijo femenino singular es ambiguo: puede referirse a la mujer o a un antecedente femenino implícito como un plan o reino. El español «destruirla» mantiene esa ambigüedad mejor que una referencia explícita masculina o neutra.'
- source_word: וְלֹא תַעֲמֹד
  english_pob_choice: but she will not stand
  chosen_spanish: pero ella no se mantendrá
  alternatives_spanish:
  - pero no subsistirá
  - pero no prevalecerá
  lexicon: HALOT
  rationale: «No se mantendrá» reproduce la idea de no permanecer firme o no sostenerse. Evita decidir entre la mujer y la empresa, decisión que el hebreo también deja abierta.
- source_word: וְלֹא ל֥וֹ תִהְיֶה
  english_pob_choice: and she will not be for him
  chosen_spanish: y no será para él
  alternatives_spanish:
  - y no le pertenecerá
  - y no estará de su parte
  lexicon: HALOT
  rationale: La fórmula hebrea es relacional y ambigua entre posesión, pertenencia y apoyo. «No será para él» preserva esa tensión mejor que una opción más interpretativa.
theological_decisions:
- issue: Ambigüedad de la expresión final sobre la mujer o el plan/resultado
  english_pob_reading: The feminine verb may refer to the woman or to the scheme; the translation preserves this ambiguity.
  chosen_spanish_reading: 'La referencia permanece ambigua: puede aludir a la mujer o al resultado/plan asociado a ella.'
  alternative_spanish_readings:
  - puede referirse solo a la mujer
  - puede referirse al plan o alianza
  rationale: El hebreo usa formas femeninas singulares que no resuelven con certeza el referente. La traducción española conserva la ambigüedad para no cerrar una tensión textual documentada.
  doctrine_reference: Principio de fidelidad textual y respeto a la ambigüedad gramatical del original
- issue: Sentido de וִישָׁרִים עִמּוֹ
  english_pob_reading: upright terms will be with him; the phrase may refer either to persons with him or to fair terms/arrangements.
  chosen_spanish_reading: «Términos rectos» como posible acuerdo o condiciones equitativas, sin excluir la lectura de personas rectas como acompañantes.
  alternative_spanish_readings:
  - personas rectas con él
  - un acuerdo justo con él
  rationale: La revisión inglesa favoreció un sentido diplomático. El español principal adopta esa línea, pero deja visible la posibilidad de una lectura personal o relacional dada la dificultad del hebreo.
  doctrine_reference: Principio de mantener abiertas las alternativas léxicas cuando el original es deliberadamente difícil
- issue: La entrega de la hija de mujeres en contexto político
  english_pob_reading: likely referring to a royal daughter given in marriage; many understand this historically as a political marriage alliance.
  chosen_spanish_reading: Una entrega matrimonial o política sugerida, sin explicitarla como interpretación cerrada en el texto principal.
  alternative_spanish_readings:
  - matrimonio político
  - entrega de una princesa
  rationale: El texto permite una alusión histórica a una alianza matrimonial, pero la línea principal no debe exceder la evidencia lexical. La nota o el aparato pueden señalar la probabilidad histórica sin transformar la traducción en paráfrasis.
  doctrine_reference: Principio de no sobreinterpretar cuando el dato lingüístico admite varias lecturas
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que cambió «upright ones» por «upright terms»; por eso el texto principal adopta «términos rectos» en vez de «personas rectas», aunque se conserva en la nota la posibilidad de leerlo como acompañantes. Asimismo, se mantiene la ambigüedad gramatical de los femeninos finales y la referencia cultural de «la hija de mujeres» sin sobreexplicación en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se prefiere «Mesías» solo para משיח/Χριστός cuando corresponda; aquí no aplica.
  - Se conserva un registro bíblico moderno y digno, evitando calcos innecesarios.
  - No se introduce terminología eclesiástica ajena al hebreo; se prioriza la literalidad controlada.
  - Los corchetes de nota se colocan solo donde la ambigüedad o la variante lo exigen.
