translation:
  language: es
  text: Y será como una gacela[a] perseguida, y como ovejas sin quien las reúna; cada hombre[b] se volverá a su propio pueblo, y cada uno huirá a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como una gacela ahuyentada'; el participio hebreo puede significar 'ahuyentada', 'echada fuera' o 'perseguida', no sólo 'cazada'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'cada hombre' en sentido distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y acontecerá
  - Y acontecerá que
  - Y sucederá
  lexicon: HALOT
  rationale: El waw consecutivo con היה introduce aquí el resultado futuro de la escena profética. En español, 'Y será' reproduce bien el valor prospectivo sin añadir explicaciones innecesarias.
- source_word: כִּצְבִי מֻדָּח
  english_pob_choice: like a hunted gazelle
  chosen_spanish: como una gacela perseguida
  alternatives_spanish:
  - como una gacela cazada
  - como una gacela ahuyentada
  - como una gacela expulsada
  lexicon: HALOT
  rationale: צְבִי nombra una gacela; 'gacela' es el equivalente claro y natural. מֻדָּח expresa ser impulsada/echada fuera o perseguida; 'perseguida' conserva la imagen de fragilidad y huida sin forzar el texto hacia una sola matiz interpretativa.
- source_word: וּכְצֹאן
  english_pob_choice: and like sheep
  chosen_spanish: y como ovejas
  alternatives_spanish:
  - y como rebaño
  - y como ganado menor
  lexicon: HALOT
  rationale: צֹאן puede ser ganado menor en conjunto, pero 'ovejas' es la imagen más transparente en español y encaja con el verbo de reunir del miembro siguiente.
- source_word: וְאֵין מְקַבֵּץ
  english_pob_choice: with no one to gather them
  chosen_spanish: sin quien las reúna
  alternatives_spanish:
  - sin nadie que las junte
  - sin un reunidor
  - y no hay quien las reúna
  lexicon: HALOT
  rationale: La construcción existencial expresa ausencia de alguien que reúna. 'Sin quien las reúna' suena natural en español y mantiene la idea de dispersión de las ovejas.
- source_word: אִישׁ אֶל עַמּוֹ יִפְנוּ
  english_pob_choice: each man will turn to his own people
  chosen_spanish: cada hombre se volverá a su propio pueblo
  alternatives_spanish:
  - cada uno volverá a su propio pueblo
  - cada hombre se volverá hacia su pueblo
  lexicon: HALOT
  rationale: אִישׁ conserva el singular masculino distributivo; por eso se mantiene 'cada hombre' en la primera mención. יִפְנוּ expresa volverse/dirigirse hacia; 'se volverá' transmite el giro de orientación hacia su pueblo.
- source_word: וְאִישׁ אֶל אַרְצוֹ יָנוּסוּ
  english_pob_choice: and each will flee to his own land
  chosen_spanish: y cada uno huirá a su propia tierra
  alternatives_spanish:
  - y cada hombre huirá a su propia tierra
  - y cada uno escapará a su propia tierra
  lexicon: HALOT
  rationale: נוּס significa huir; 'huirá' es directo y fiel. אַרְצֹו aquí es 'su tierra', no simplemente 'país', porque el hebreo habla del territorio propio de origen o pertenencia.
theological_decisions:
- issue: Renderizado del distributivo masculino אִישׁ
  english_pob_reading: Render first occurrence as 'each man' and second distributively as 'each'
  chosen_spanish_reading: Conservar 'cada hombre' en la primera ocurrencia y 'cada uno' en la segunda
  alternative_spanish_readings:
  - cada persona
  - todos
  - cada uno
  rationale: El hebreo usa אִישׁ en sentido distributivo masculino singular. Mantener 'cada hombre' preserva esa forma gramatical y evita aplanar el dato lingüístico. En la segunda cláusula, 'cada uno' conserva el sentido distributivo sin sonar forzado en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión disponible no introdujo cambios sustantivos; el borrador mantiene el acuerdo mayoritario del audit trail inglés y conserva la tensión léxica de מֻדָּח con una opción española natural pero no reductiva.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como principio de consistencia del proyecto cuando el texto fuente lo requiera; aquí no aplica.
  - '''gacela'' se conservó para צְבִי por naturalidad moderna y porque el contexto de vulnerabilidad depende de esa imagen.'
  - Se mantuvo la distribución masculina de אִישׁ con 'cada hombre'/'cada uno' para reflejar la sintaxis hebrea.
  - '''tierra'' se eligió para אַרְץ en lugar de ''país'' porque el término es más amplio y más fiel al hebreo.'
