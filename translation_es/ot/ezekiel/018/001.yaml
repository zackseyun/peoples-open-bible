    issue: Orden y formulación algo calcados en «a mí»
    rationale: Aunque «a mí» traduce literalmente אֵלַי, en esta fórmula profética el español suena más natural con «vino a mí la palabra de Yahvé» que con «vino la palabra de Yahvé a mí». La versión revisada preserva el sentido y mejora la legibilidad.
