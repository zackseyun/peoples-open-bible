    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para un español más natural y fiel al matiz del hebreo: «se embrutece» refleja mejor נִבְעַר que el calco «es hecho necio», y «fundidor» encaja mejor que «metalúrgico» en el contexto de imágenes fundidas. Se mantiene el resto del sentido y la nota léxica sobre רוּחַ.'
