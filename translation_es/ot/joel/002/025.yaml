    issue: ‘langosta enjambre’ es poco natural en español
    rationale: Aunque intenta reflejar ‘swarming locust’, en español bíblico legible resulta más natural ‘la langosta migratoria’ o simplemente ‘la langosta’. Aquí conviene una formulación que distinga el término sin sonar forzada.
  - severity: medium
    issue: Faltan las notas clave preservadas por el inglés POB
    rationale: El inglés documenta (1) la incertidumbre sobre los cuatro términos hebreos de langosta y (2) la posible lectura ‘contra ustedes’ para בכם. Esas notas deben preservarse en español por fidelidad al audit trail.
  - severity: low
    issue: La nota sobre ‘restauraré’ no es necesaria aquí
    rationale: La alternativa léxica existe, pero el POB inglés no la elevó a nota; en cambio sí anotó otras ambigüedades más relevantes para el lector.
  - severity: low
    issue: La nota sobre ‘mi gran ejército’ desplaza una prioridad documental mayor
    rationale: ‘Ejército’ está bien sustentado en el rationale y no requiere nota en el texto, mientras que la ambigüedad preposicional sí fue señalada por el POB inglés.
