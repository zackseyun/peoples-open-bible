revisions:
- from: ¿No se ha alzado su cordel de tienda dentro de ellos? Mueren[a], y no en sabiduría[b].
  to: ¿No se les arranca[a] su cordel de tienda desde dentro? Mueren[b], y no en sabiduría.
  rationale: Se ajusta el verbo principal para reflejar mejor la remoción del cordel de tienda, se mejora la naturalidad de la frase preposicional y se corrigen los anclajes de las notas para que expliquen exactamente las expresiones correspondientes del texto.
