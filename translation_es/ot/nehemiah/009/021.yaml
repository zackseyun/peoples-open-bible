translation:
  language: es
  text: Durante cuarenta años los sustentaste en el desierto; no les faltó nada. Sus ropas[a] no se gastaron, ni se les hincharon[b] los pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vestidos no se gastaron».
    reason: lexical_alternative
  - marker: b
    text: O «sus pies no se hincharon». Compárese Deuteronomio 8:4.
    reason: cross_reference
lexical_decisions:
- source_word: כִּלְכַּלְתָּם
  english_pob_choice: you sustained them
  chosen_spanish: los sustentaste
  alternatives_spanish:
  - los proveíste
  - los mantuviste
  - los apoyaste
  lexicon: HALOT
  rationale: כִּלְכַּל en este contexto expresa sostener y proveer de manera continua. «Sustentaste» conserva la idea de mantenimiento providencial sin reducirla solo a alimentación.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la soledad del desierto
  lexicon: HALOT
  rationale: En español bíblico, «desierto» comunica bien el espacio de peregrinación de Israel; aquí es una alternativa natural y clara a «wilderness».
- source_word: לֹא חָסֵרוּ
  english_pob_choice: they lacked nothing
  chosen_spanish: no les faltó nada
  alternatives_spanish:
  - no carecieron de nada
  - nada les faltó
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para suficiencia total. «No les faltó nada» suena natural en español y preserva la negación absoluta.
- source_word: שַׂלְמֹתֵיהֶם
  english_pob_choice: their clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: שַׂלְמָה refiere a vestimenta, a menudo prenda exterior. «Vestidos» conserva el valor colectivo y algo más concreto que «ropa».
- source_word: לֹא בָלוּ
  english_pob_choice: did not wear out
  chosen_spanish: no se gastaron
  alternatives_spanish:
  - no se desgastaron
  - no se deterioraron
  lexicon: HALOT
  rationale: בָלָה describe desgaste o deterioro físico. En español, «no se gastaron» comunica de forma natural el hecho aplicado a la ropa.
- source_word: וְרַגְלֵיהֶם לֹא בָצֵקוּ
  english_pob_choice: and their feet did not swell
  chosen_spanish: ni se les hincharon los pies
  alternatives_spanish:
  - y no se les hincharon los pies
  - ni se les inflaron los pies
  lexicon: HALOT
  rationale: בָצֵק aquí alude a hincharse o inflarse. «Se les hincharon los pies» es claro en español y mantiene el sentido físico literal.
theological_decisions:
- issue: La provisión divina durante el éxodo/desierto
  english_pob_reading: you sustained them in the wilderness
  chosen_spanish_reading: los sustentaste en el desierto
  alternative_spanish_readings:
  - los proveíste en el desierto
  - los mantuviste en el desierto
  rationale: La frase conserva la acción continua de Dios como proveedor fiel durante los cuarenta años, sin convertirla solo en provisión alimentaria ni en una formulación más genérica.
  doctrine_reference: Providencia divina; fidelidad de Yahvé en el desierto
- issue: Preservación corporal y física del pueblo
  english_pob_reading: their feet did not swell
  chosen_spanish_reading: ni se les hincharon los pies
  alternative_spanish_readings:
  - ni se les inflamaron los pies
  - ni se les entumecieron los pies
  rationale: El texto describe una preservación corporal concreta. La traducción mantiene el sentido literal sin alegorizarlo ni suavizarlo.
  doctrine_reference: Cuidado providencial de Yahvé; Dt 8:4
- issue: Negación absoluta de carencia
  english_pob_reading: they lacked nothing
  chosen_spanish_reading: no les faltó nada
  alternative_spanish_readings:
  - nada les faltó
  - no carecieron de nada
  rationale: La negación absoluta del hebreo se conserva como afirmación total de suficiencia, evitando una lectura parcial o solo material.
  doctrine_reference: Suficiencia de la provisión divina
translation_notes:
  revision_awareness: Se mantiene el sentido ya consolidado en el audit trail inglés, con equivalentes naturales en español y sin introducir reinterpretaciones doctrinales. No hubo revisiones aplicadas en el contexto inglés reciente; por eso la redacción sigue de cerca la lectura aprobada de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la traducción española del libro, pero en este versículo no aparece el Tetragrámaton de forma explícita en el texto base.
  - «Sustentaste» conserva la fuerza de provisión continua de כלכל.
  - «Desierto» se prefiere aquí por claridad idiomática en español; «wilderness» queda cubierto semánticamente.
  - «Vestidos» mantiene el plural colectivo de שַׂלְמֹתֵיהֶם.
  - La nota b preserva la alternativa lexical y la referencia cruzada a Deuteronomio 8:4.
