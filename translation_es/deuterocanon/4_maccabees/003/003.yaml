translation:
  language: es
  text: Nadie puede arrancar la ira del alma de ustedes[a], pero es posible ayudar con la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «es posible hacer buen uso de la ira» o «encauzar la ira hacia el bien». El griego dice literalmente «ayudar a la ira».
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμόν
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - pasión
  lexicon: LSJ
  rationale: θύμος puede significar ira, enojo o impulso apasionado. En español, "ira" conserva la fuerza moral y afectiva del término sin sonar excesivamente coloquial, y funciona bien en un contexto ético como éste.
- source_word: ἐκκόψαι
  english_pob_choice: cut ... out
  chosen_spanish: cortar ... de
  alternatives_spanish:
  - cortar ... fuera de
  - quitar
  - arrancar
  lexicon: LSJ
  rationale: El verbo expresa literalmente cortar hacia fuera o cortar fuera. "Cortar ... de" mantiene la imagen de excisión sin volverla demasiado pesada en español.
- source_word: ψυχῆς
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - ser interior
  lexicon: LSJ
  rationale: ψυχή puede ser alma, vida o self. Aquí la imagen interior del pasaje se expresa con claridad natural en español mediante "alma".
- source_word: τῷ θυμῷ
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el ímpetu airado
  - la pasión
  - el enojo
  lexicon: LSJ
  rationale: Se repite θύμος en dativo. Reproducirlo otra vez como "la ira" conserva la repetición léxica del griego y evita suavizar la frase interpretativamente.
- source_word: βοηθῆσαι
  english_pob_choice: it is possible to help
  chosen_spanish: ayudar con
  alternatives_spanish:
  - socorrer
  - asistir a
  - prestar ayuda a
  lexicon: LSJ
  rationale: βοηθέω significa ayudar o prestar ayuda. "Ayudar con" mantiene la rareza del giro griego y deja visible la tensión retórica de la cláusula final.
theological_decisions:
- issue: Sentido de τῷ θυμῷ δυνατὸν βοηθῆσαι
  english_pob_reading: It is possible to help with anger, retaining the terse and somewhat surprising Greek expression.
  chosen_spanish_reading: Es posible ayudar con la ira, sin resolver el giro en una paráfrasis como "dirigir la ira al bien" o "moderar la ira".
  alternative_spanish_readings:
  - es posible hacer buen uso de la ira
  - es posible encauzar la ira hacia el bien
  - es posible moderar la ira
  rationale: El griego es breve y llamativo. Traducirlo de modo más liso introduciría una conclusión interpretativa que no está explícita en la frase. Conviene preservar la tensión textual para que la lectura sea auditable.
  doctrine_reference: Preservar la tensión teológica/literaria sin resolverla prematuramente.
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa más reciente al naturalizar la expresión final como «ayudar con la ira», pero conserva en la nota la alternativa más literal y la posibilidad interpretativa ya documentada en el audit trail.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo léxico con el griego: θυμόν/θυμῷ se traduce de forma consistente como «ira».'
  - Se conserva la imagen corporal de ἐκκόψαι con «cortar ... de» para no diluir el verbo en «quitar» o «remover».
  - El tono es moderno y digno, sin recurrir a fórmulas litúrgicas no justificadas por el texto.
