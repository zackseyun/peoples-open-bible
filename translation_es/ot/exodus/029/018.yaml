translation:
  language: es
  text: Y harás arder[a] todo el carnero sobre el altar. Es un holocausto para Yahvé, un aroma agradable, una ofrenda de alimento[b] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «harás subir en humo». El hebreo usa un verbo sacrificial técnico para hacer que la víctima suba en humo sobre el altar.
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda hecha por fuego». El hebreo designa una categoría sacrificial de ofrenda consumida por fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטַרְתָּ
  english_pob_choice: And you shall burn
  chosen_spanish: Y harás arder
  alternatives_spanish:
  - y lo quemarás
  - y lo ofrecerás en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, הִקְטִיר expresa hacer subir en humo la víctima sobre el altar. «Harás arder» conserva el valor cultual sin sonar excesivamente técnico o mecánico en español.
- source_word: כָּל
  english_pob_choice: the whole
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - entero
  lexicon: HALOT
  rationale: El hebreo enfatiza que el carnero se ofrece completo, no solo una parte. En español, «todo el carnero» comunica bien esa totalidad.
- source_word: הָאַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho del rebaño
  - carnero
  lexicon: HALOT
  rationale: אַיִל denota un carnero, no un cordero genérico. «Carnero» es el equivalente natural y preciso en español.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - sobre el altar
  lexicon: HALOT
  rationale: La terminación direccional indica la esfera del acto sacrificial; en español, «sobre el altar» expresa de modo idiomático el lugar donde se consume la ofrenda.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un sacrificio totalmente quemado
  lexicon: HALOT
  rationale: El término técnico tradicional en español para עֹלָה es «holocausto». Es más fiel al uso sacrificial bíblico que una paráfrasis descriptiva.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino «Yahvé» conforme a la política del proyecto. En este contexto de dedicación sacrificial, «para Yahvé» refleja adecuadamente la orientación del ofrecimiento.
- source_word: רֵיחַ נִיחוֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: un aroma agradable
  alternatives_spanish:
  - un aroma placentero
  - un aroma agradable
  lexicon: HALOT
  rationale: La fórmula fija no debe reducirse a una impresión meramente sensorial; en español, «aroma agradable» comunica la aceptación cultual sin introducir matices indebidos.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda que se quema
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda quemada
  lexicon: HALOT
  rationale: אִשֶּׁה alude a una ofrenda consumida por fuego. Dado que el verbo ya expresa el acto de quemar, «ofrenda que se quema» conserva la idea sin depender de un tecnicismo menos transparente para lectores españoles.
- source_word: הוּא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Es
  - Esto es
  lexicon: HALOT
  rationale: El pronombre funciona copulativamente dentro de la fórmula sacrificial. En español, una repetición explícita de «Es» evita la torpeza de un «ello» y mantiene la estructura del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La tradición textual del proyecto exige traducir directamente el Tetragrámaton con «Yahvé». Esto preserva la identidad del nombre del pacto, evita el reemplazo litúrgico y mantiene la trazabilidad al hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula sacrificial fija רֵיחַ נִיחוֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: un aroma agradable
  alternative_spanish_readings:
  - un aroma de apaciguamiento
  - un aroma sosegante
  rationale: Se conserva el valor de aceptación cultual sin sugerir que el olor ‘calma’ a Dios de manera antropomórfica. La frase española mantiene la tensión entre lo sensorial y lo ritual.
  doctrine_reference: Levítico 1–7; Éxodo 29:18
- issue: אִשֶּׁה como categoría sacrificial
  english_pob_reading: a food offering
  chosen_spanish_reading: una ofrenda que se quema
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda de fuego
  rationale: En español, «ofrenda que se quema» comunica el carácter consumido por el fuego sin introducir la categoría interpretativa de ‘alimento’ de manera más fuerte de lo que el contexto inmediato requiere.
  doctrine_reference: Levítico 2:2; Números 28:2
translation_notes:
  revision_awareness: 'La forma española sigue el sentido consolidado del texto hebreo y del audit trail inglés: quema total del carnero, holocausto, nombre divino Yahvé y la fórmula sacrificial fija de «aroma agradable». Se ajustó «food offering» a una expresión española más transparente sin perder el valor cultual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - «Holocausto» se usa como término técnico consagrado para עֹלָה.
  - Se evitó traducir mecánicamente «food offering» como «ofrenda de alimento» porque en español sonaba menos natural y podía oscurecer el sentido ritual.
  - La cadencia de la frase intenta conservar la fórmula cultual sin forzar un calco sintáctico del hebreo.
