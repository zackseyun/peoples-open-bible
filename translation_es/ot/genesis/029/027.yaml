  text: מַלֵּ֖א שְׁבֻ֣עַ זֹ֑את וְ/נִתְּנָ֨ה לְ/ךָ֜ גַּם אֶת זֹ֗את בַּ/עֲבֹדָה֙ אֲשֶׁ֣ר תַּעֲבֹ֣ד עִמָּדִ֔/י ע֖וֹד שֶֽׁבַע שָׁנִ֥ים אֲחֵרֽוֹת־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/029/027.yaml
  text: Complete this one's bridal week[c][b][a], and we will give you this one also in return for the work that you will do with me for another seven years.
  footnotes:
  - marker: a
    text: Hebrew 'Complete the week of this one'; the phrase refers to the customary bridal or wedding week.
    reason: cultural_note
  - marker: b
    text: Or 'and she will be given to you also' / 'and this one also will be given to you.' The Hebrew form is formally third feminine singular, but the sense in context is Laban's promise to give the other daughter as well.
    reason: lexical_alternative
  - marker: c
    text: Or 'that you will work for me.' The Hebrew verb can mean 'serve' or 'work' depending on context.
    reason: lexical_alternative
