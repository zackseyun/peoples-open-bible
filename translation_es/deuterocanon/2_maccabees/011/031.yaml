translation:
  language: es
  text: para que los judíos puedan hacer uso de sus propias provisiones[a] y leyes, tal como antes; y nadie de ellos será en manera alguna hostigado respecto de las cosas hechas por ignorancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus propios gastos»; el término griego puede referirse a gastos, provisiones o arreglos prácticos de la vida judía.
    reason: lexical_alternative
  - marker: b
    text: O «por las cosas hechas por ignorancia». La frase griega es amplia y puede referirse a actos cometidos sin saberlo o sin pleno conocimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: χρῆσθαι
  english_pob_choice: may make use of
  chosen_spanish: puedan valerse de
  alternatives_spanish:
  - puedan usar
  - puedan hacer uso de
  lexicon: LSJ
  rationale: El infinitivo expresa la concesión de poder servirse de algo. «Valerse de» conserva la idea amplia de aprovechar o servirse de, sin limitarla a un uso técnico o ritual.
- source_word: τοῖς ἑαυτῶν δαπανήμασιν
  english_pob_choice: their own provisions
  chosen_spanish: sus propias provisiones
  alternatives_spanish:
  - sus propios gastos
  - sus propios recursos
  - su propia alimentación
  lexicon: LSJ
  rationale: δaπανήμασιν puede referirse a gastos, provisiones o arreglos prácticos. «Provisiones» mantiene la amplitud del término y sigue la revisión inglesa que evitó restringirlo solo a alimento.
- source_word: νόμοις
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - costumbres
  - observancias legales
  lexicon: LSJ
  rationale: «Leyes» preserva el sentido jurídico-religioso directo del griego. «Costumbres» debilitaría la fuerza normativa del sustantivo.
- source_word: καθὰ καὶ τὸ πρότερον
  english_pob_choice: just as before
  chosen_spanish: tal como antes
  alternatives_spanish:
  - como también antes
  - como anteriormente
  lexicon: LSJ
  rationale: La expresión remite a la práctica previa. «Tal como antes» es natural en español y conserva la comparación con el estado anterior.
- source_word: παρενοχληθήσεται
  english_pob_choice: shall ... be harassed
  chosen_spanish: será ... hostigado
  alternatives_spanish:
  - será molestado
  - será perturbado
  - será importunado
  lexicon: LSJ
  rationale: El futuro pasivo indica una interferencia molesta o presión indebida. «Hostigado» comunica con claridad una acción oficial o social de acoso/interferencia.
- source_word: περὶ τῶν ἠγνοημένων
  english_pob_choice: concerning the things done in ignorance
  chosen_spanish: en cuanto a las cosas hechas por ignorancia
  alternatives_spanish:
  - por las cosas hechas sin saberlo
  - respecto de las cosas cometidas en ignorancia
  - acerca de las cosas inadvertidas
  lexicon: LSJ
  rationale: La frase griega es amplia y no precisa si se trata de infracciones, omisiones o actos involuntarios. «Hechas por ignorancia» mantiene esa amplitud y evita resolver la ambigüedad.
theological_decisions:
- issue: Alcance de la cláusula de no hostigamiento sobre las cosas hechas por ignorancia
  english_pob_reading: A general protection from harassment regarding actions committed in ignorance
  chosen_spanish_reading: Una protección general contra el hostigamiento respecto de las cosas hechas por ignorancia
  alternative_spanish_readings:
  - Protección respecto de faltas involuntarias
  - Protección respecto de infracciones cometidas sin conocimiento
  rationale: El griego no especifica con precisión si la ignorancia es jurídica, ritual o factual, ni delimita el tipo exacto de actos. Se conserva la formulación amplia para no cerrar una tensión textual real.
  doctrine_reference: Preservar la tensión interpretativa del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que amplió «food provisions» a «provisions» por mayor exactitud léxica. La versión española evita restringir δαπανήμασιν a alimento y mantiene la amplitud de «provisiones». También se conservó la vaguedad de περὶ τῶν ἠγνοημένων sin convertirla en una categoría jurídica más estrecha.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se emplea «leyes» y no un término litúrgico más interpretativo, en continuidad con el valor legal del griego.
  - «Por ignorancia» preserva el matiz de actos hechos sin pleno conocimiento, sin especificar culpa técnica.
