revisions:
- from: Allí, Dios, el que vela sobre todo[a], el santo antepasado entre los santos, habiendo oído la súplica legítima, azotó al que había sido grandemente enaltecido por la insolencia y la audacia[b].
  to: Allí, el Dios que vela sobre todos, el santo padre ancestral entre los santos[a], habiendo oído la súplica legítima, azotó al que estaba muy engreído por la insolencia y la audacia[b].
  rationale: Se reubicó la nota de ambigüedad en la frase correcta («entre los santos»), se restauró la nota lexical sobre προπάτωρ conforme a la auditoría inglesa, se mejoró la dignidad y naturalidad de la expresión española para el título divino raro, y se ajustó la descripción del orgullo castigado para reflejar mejor el sentido peyorativo de ἐπηρμένον en contexto.
