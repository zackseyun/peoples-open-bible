revisions:
- from: 'Jehonadab le dijo: “Acuéstate en tu cama y finge estar enfermo. Cuando tu padre venga a verte, dile: ‘Por favor, que venga Tamar, mi hermana, y me prepare comida, y que prepare el plato[a] delante de mí, para que yo lo vea y coma de su mano[b].’”'
  to: 'Jonadab le dijo: “Acuéstate en tu cama y finge estar enfermo. Cuando tu padre venga a verte, dile: ‘Por favor, que venga Tamar, mi hermana, y me prepare comida, y que prepare la comida[a] ante mis ojos, para que yo la vea y coma de su mano.’”'
  rationale: Se corrigió el nombre propio a la forma española habitual ‘Jonadab’; se reemplazó ‘el plato’ por ‘la comida[a]’ para reflejar mejor הַבִּרְיָה como preparación especial y mejorar la naturalidad; se ajustó ‘delante de mí’ a ‘ante mis ojos’ para representar más directamente לְעֵינַי; y se eliminó la nota sobre ‘de su mano’ por ser innecesaria en español.
