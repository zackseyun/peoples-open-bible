translation:
  language: es
  text: ¡Ah[a], espada de Yahvé, ¿hasta cuándo no te aquietarás? Recógete en tu vaina[b][c]; reposa y estate quieta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «¡Ay!», con matiz de lamento o de aflicción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «reúnete / recógete en tu vaina»; la imagen es la de una espada volviendo a su funda.
    reason: lexical_alternative
  - marker: c
    text: O «funda»; «vaina» es la forma más natural y precisa en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh!
  - ¡Ay de ti!
  lexicon: HALOT
  rationale: La interjección expresa lamento o exclamación angustiada. «¡Ah!» mantiene el matiz de lamentación sin convertir el verso en una amenaza formal de «¡ay de…!».
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - arma
  lexicon: HALOT
  rationale: El sustantivo es literal y está personificado como instrumento del juicio divino. «Espada» es el equivalente natural y preciso en español.
- source_word: לַיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Yahvé
  - para Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: 'El lamed expresa relación/posesión: la espada pertenece a Yahvé como su instrumento. Se usa el nombre divino «Yahvé» según el criterio del proyecto, no una máscara devocional.'
- source_word: עַד אָנָה
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: Es el idiomatismo normal de lamento y pregunta por duración. «¿Hasta cuándo?» conserva la fuerza retórica y la brevedad poética.
- source_word: לֹא תִשְׁקֹטִי
  english_pob_choice: will you not be quiet
  chosen_spanish: no te aquietarás
  alternatives_spanish:
  - no estarás quieta
  - no descansarás
  - no estarás en reposo
  lexicon: HALOT
  rationale: El verbo transmite quietud/reposo; como se dirige a una espada en femenino singular, «aquietarte» comunica el cese de actividad de forma natural en español y conserva la personificación.
- source_word: הֵאָסְפִי
  english_pob_choice: Put yourself back / Gather yourself
  chosen_spanish: Métete
  alternatives_spanish:
  - Vuelve
  - Regrésate
  - Recógete
  lexicon: HALOT
  rationale: El imperativo reflexivo apunta al movimiento de volver al interior de la vaina. «Métete» refleja el gesto con naturalidad española sin perder la imagen corporal.
- source_word: תַּעְרֵךְ
  english_pob_choice: your sheath / scabbard
  chosen_spanish: tu vaina
  alternatives_spanish:
  - tu funda
  - tu vaina de espada
  - tu escarcela
  lexicon: HALOT
  rationale: El sustantivo designa la funda/vaina de la espada. «Vaina» es el término común y fiel; «escarcela» sería más técnico o arcaizante.
- source_word: הֵרָגְעִי
  english_pob_choice: rest
  chosen_spanish: reposa
  alternatives_spanish:
  - descansa
  - aplácate
  - quédate en calma
  lexicon: HALOT
  rationale: El imperativo expresa cesar la agitación y asentarse. «Reposa» mantiene la relación semántica con quietud y armoniza con el paralelismo poético.
- source_word: וָדֹמִּי
  english_pob_choice: be still
  chosen_spanish: estate quieta
  alternatives_spanish:
  - calla
  - quédate quieta
  - permanece en silencio
  lexicon: HALOT
  rationale: דמם suele comunicar silencio o inmovilidad. «Estate quieta» conserva el paralelismo con «reposa» y se entiende con naturalidad en español; el femenino concuerda con «espada».
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto exige traducir יהוה como «Yahvé». Aquí el texto habla de la espada como instrumento de Yahvé; por eso se conserva el nombre propio divino y no una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Personificación de la espada como interlocutora femenina
  english_pob_reading: Second feminine singular forms addressed to the sword
  chosen_spanish_reading: tratamiento femenino singular coherente con «espada»
  alternative_spanish_readings:
  - tratamiento neutro
  - concordancia masculina por español genérico
  rationale: Las formas verbales del hebreo son femeninas singulares. En español se mantiene la concordancia femenina para no borrar una señal gramatical importante del original.
  doctrine_reference: Gramática del texto fuente; concordancia verbal y retórica poética
translation_notes:
  revision_awareness: 'Se tomó como base el último estado auditado del inglés: la revisión más reciente cambió «Return to your sheath» por una forma más reflexiva («Put yourself back into your sheath»). La versión española refleja ese énfasis con un imperativo reflexivo («Métete en tu vaina») y mantiene la secuencia poética final («reposa y estate quieta»).'
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la terminología del proyecto para el Tetragrama.
  - Se respeta la personificación de «espada» con concordancia femenina singular.
  - «Vaina» se usa como equivalente natural de sheath/scabbard, evitando arcaísmos.
  - La puntuación reproduce la invocación inicial y la pregunta retórica del hebreo.
