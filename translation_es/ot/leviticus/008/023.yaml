translation:
  language: es
  text: Y lo degolló[a], y Moisés tomó algo de su sangre y la puso sobre el lóbulo de la oreja derecha de Aarón, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la punta de la oreja derecha de Aarón».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁחָט
  english_pob_choice: he slaughtered it
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo indica degollar o sacrificar ritualmente; «degolló» conserva la acción concreta sin suavizarla. «Sacrificó» es posible, pero pierde la imagen física del acto; «mató» es demasiado genérico.
- source_word: מִדָּמוֹ
  english_pob_choice: some of its blood
  chosen_spanish: algo de su sangre
  alternatives_spanish:
  - de su sangre
  - una parte de su sangre
  lexicon: HALOT
  rationale: La preposición מִן con sangre sugiere una porción tomada, no la totalidad. «Algo de su sangre» refleja bien esa cantidad indefinida y sigue la decisión inglesa sin calcarla de manera rígida.
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: the lobe of Aaron’s right ear
  chosen_spanish: el lóbulo de la oreja derecha de Aarón
  alternatives_spanish:
  - la punta de la oreja derecha de Aarón
  - el borde de la oreja derecha de Aarón
  lexicon: HALOT
  rationale: El término apunta al extremo externo de la oreja; en español, «lóbulo» es la equivalencia más natural y precisa en este rito. Se conserva la alternativa interpretativa de «punta» como matiz posible, pero no se adopta en el texto principal.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - del lado derecho
  lexicon: HALOT
  rationale: En español, la formulación normal es «oreja derecha», «mano derecha» y «pie derecho»; «del lado derecho» sería más perifrástico y menos idiomático.
- source_word: בֹּהֶן יָדוֹ
  english_pob_choice: the thumb of his right hand
  chosen_spanish: el pulgar de su mano derecha
  alternatives_spanish:
  - el dedo pulgar de su mano derecha
  lexicon: HALOT
  rationale: בֹּהֶן se refiere al pulgar en la mano; «pulgar» es el equivalente claro y exacto. Se evita una redundancia innecesaria en español, aunque la forma ampliada sigue siendo posible.
- source_word: בֹּהֶן רַגְלוֹ
  english_pob_choice: the big toe of his right foot
  chosen_spanish: el dedo gordo de su pie derecho
  alternatives_spanish:
  - el primer dedo de su pie derecho
  - el pulgar del pie derecho
  lexicon: HALOT
  rationale: Para el pie, בֹּהֶן designa el dedo mayor. En español, «dedo gordo» comunica con naturalidad la especificidad anatómica; «pulgar del pie» puede sonar más técnico o menos corriente, aunque expresa la relación por analogía.
- source_word: וַיִּתֵּן עַל
  english_pob_choice: put it on
  chosen_spanish: la puso en
  alternatives_spanish:
  - la aplicó sobre
  - la colocó sobre
  lexicon: HALOT
  rationale: La construcción es directa y ritual; «la puso en» reproduce bien la simplicidad del hebreo y evita añadir una interpretación técnica que el texto no explicita.
theological_decisions:
- issue: Aplicación ritual de sangre a las extremidades de Aarón
  english_pob_reading: Render descriptively without importing symbolic interpretation
  chosen_spanish_reading: Describir el acto ritual sin explicar su simbolismo en el texto principal
  alternative_spanish_readings:
  - Introducir explícitamente la idea de consagración
  - Ampliar con una nota interpretativa sobre ordenación sacerdotal
  rationale: El versículo narra la acción ritual concreta. Aunque el contexto tiene peso teológico, la traducción no debe insertar una explicación que el hebreo de este versículo no formula. Se preserva así la tensión interpretativa para el lector y para notas contextuales posteriores.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto inglés quedó confirmado como estable, con una sola nota alternativa sobre תְּנוּךְ אֹזֶן. La redacción española sigue ese mismo nivel de cautela y mantiene la alternativa en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «Aarón» y «Moisés» con ortografía española estándar y acento en nombres bíblicos habituales.
  - Se conservó el registro ritual con verbos concretos y sin paráfrasis explicativa.
  - La nota al pie se ancla únicamente en «degolló» porque la alternativa afecta la interpretación de תְּנוּךְ אֹזֶן.
