translation:
  language: es
  text: Pero Sihón no permitió a Israel pasar por su territorio[a]. Así que Sihón reunió a todo su pueblo[b] y salió al encuentro de Israel en el desierto. Vino a Jahaz[c] y peleó contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no permitió que Israel pasara por su frontera».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo su pueblo»; el texto no dice explícitamente «ejército», aunque el contexto militar implica una fuerza armada.'
    reason: lexical_alternative
  - marker: c
    text: Jahaz también se escribe «Jahzah» en algunas traducciones inglesas.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא נָתַן
  english_pob_choice: did not allow
  chosen_spanish: no permitió
  alternatives_spanish:
  - no dejó
  - no dio permiso para
  lexicon: HALOT
  rationale: La construcción expresa negación de permiso para el tránsito. En español, «no permitió» comunica de forma natural esa idea sin forzar un calco de «dar».},{
theological_decisions:
- issue: Naturaleza del enfrentamiento bélico
  english_pob_reading: fought against Israel
  chosen_spanish_reading: peleó contra Israel
  alternative_spanish_readings:
  - luchó contra Israel
  - hizo guerra contra Israel
  rationale: El hebreo culmina explícitamente en combate hostil. «Peleó contra Israel» conserva la fuerza adversativa sin introducir un giro más solemne de lo necesario.
  doctrine_reference: Narrative war context; no doctrinal issue.
translation_notes:
  revision_awareness: 'Se siguió la secuencia narrativa del texto hebreo y del POB inglés revisado: negación de paso, reunión del pueblo, salida al encuentro en el desierto, llegada a Jahaz y combate. Se evitó añadir «ejército» porque el hebreo dice «todo su pueblo».'
  spanish_consistency_notes:
  - Se preserva «Yahvé» para el nombre divino en la serie, pero este versículo no lo contiene.
  - Se mantuvo «territorio» como opción natural para גְבֻל, aunque se señala la alternativa literal «frontera» en nota.
  - «Jahaz» se usa como transliteración estándar y se anota la variante ortográfica.
