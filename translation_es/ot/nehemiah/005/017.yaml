translation:
  language: es
  text: Ahora bien, los judíos[a] y los oficiales, ciento cincuenta hombres, y los que vinieron a nosotros de las naciones que nos rodeaban[b], estaban a mi mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «los judeanos».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «a mi mesa» sugiere que Nehemías les proveía comida como parte de su hospitalidad y administración.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En este contexto narrativo de Nehemías, el término puede referirse al pueblo judío en general. 'Los judíos' es el equivalente natural en español y conserva la amplitud del referente; 'los judeanos' es una alternativa posible, pero menos idiomática.
- source_word: וְהַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los delegados
  - los prefectos
  - los gobernantes
  lexicon: HALOT
  rationale: El término designa autoridades subordinadas o administradores. 'Oficiales' comunica bien la función administrativa sin sobreespecificar un título persa.
- source_word: מֵאָה וַחֲמִשִּׁים אִישׁ
  english_pob_choice: a hundred and fifty men
  chosen_spanish: ciento cincuenta hombres
  alternatives_spanish:
  - ciento cincuenta hombres
  lexicon: HALOT
  rationale: La expresión numérica es directa. 'Hombres' mantiene el matiz formal y de sexo gramaticalmente marcado que aporta אִישׁ.
- source_word: וְהַבָּאִים אֵלֵינוּ
  english_pob_choice: and those who came to us
  chosen_spanish: y los que venían a nosotros
  alternatives_spanish:
  - y los que habían venido a nosotros
  - y los que venían hacia nosotros
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí de modo sustantivo para personas visitantes. En español, 'los que venían a nosotros' reproduce mejor el valor de movimiento/arribo sin forzar una explicación adicional en el texto principal.
- source_word: מִן הַגּוֹיִם
  english_pob_choice: from the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de las naciones
  - de entre los pueblos
  lexicon: HALOT
  rationale: '''Naciones'' es el equivalente más cercano y no introduce el término interpretativo ''gentiles''. ''De entre'' ayuda a expresar que procedían del conjunto circundante.'
- source_word: אֲשֶׁר סְבִיבֹתֵינוּ
  english_pob_choice: that were around us
  chosen_spanish: que estaban alrededor de nosotros
  alternatives_spanish:
  - que nos rodeaban
  - circundantes
  lexicon: HALOT
  rationale: La frase es geográfica y relacional; 'alrededor de nosotros' conserva la orientación espacial del hebreo con naturalidad en español.
- source_word: עַל שֻׁלְחָנִי
  english_pob_choice: were at my table
  chosen_spanish: estaban a mi mesa
  alternatives_spanish:
  - estaban en mi mesa
  - estaban en mi banquete
  lexicon: HALOT
  rationale: La expresión literal 'sobre/ a mi mesa' es un modismo de hospitalidad y provisión. 'A mi mesa' preserva la imagen sin añadir explicación al cuerpo del versículo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada no muestra cambios recientes: el pase más reciente indica que no hubo modificaciones y el resumen de revisión confirma alta concordancia. La presente redacción sigue ese estado estable y mantiene las decisiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se conserva 'naciones' en lugar de 'gentiles' para no cargar el texto con una etiqueta teológica no exigida por el hebreo.
  - Se mantiene 'mesa' en sentido idiomático de provisión/hospitalidad, como en la nota cultural del POB en inglés.
  - El orden de los miembros de la frase sigue de cerca el hebreo y el POB inglés para preservar la enumeración.
  - Se usa 'judíos' como forma principal, con nota de alternativa 'judeanos' porque el término admite esa oscilación semántica en Nehemías.
