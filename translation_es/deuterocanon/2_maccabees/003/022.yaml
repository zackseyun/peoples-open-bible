- from: Así pues, invocaban al Señor todopoderoso para que guardara con toda seguridad intacto[a] lo que había sido confiado a quienes lo habían encomendado.
  to: Así pues, invocaban al Señor todopoderoso para que guardara a salvo y con toda seguridad lo que había sido confiado a quienes lo habían confiado[a].
  rationale: Se suaviza una construcción española dura («con toda seguridad intacto») y se refuerza la coherencia léxica del campo semántico de depósito/custodia usando «confiado» en ambos participios. Se conserva el sentido del English POB y del griego, añadiendo una nota para la alternativa más explícita sobre los depositantes.
