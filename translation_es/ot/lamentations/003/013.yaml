lexical_decisions:
- source_word: הֵבִיא
  english_pob_choice: drove
  chosen_spanish: hizo que… penetraran
  alternatives_spanish:
  - envió
  - hizo entrar
  - arrojó
  lexicon: HALOT
  rationale: El hebreo en hifil expresa causación violenta; en español, "hizo que… penetraran" comunica mejor esa fuerza que un simple "trajo" o "envió". Mantiene la imagen de impacto y penetración del contexto poético.
- source_word: בְּכִלְיוֹתַי
  english_pob_choice: into my kidneys
  chosen_spanish: en mis entrañas
  alternatives_spanish:
  - en mis riñones
  - en mis partes internas
  - en mis entrañas más profundas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "riñones", en español "riñones" suena demasiado anatómico y puede desviar la imagen poética. "En mis entrañas" conserva el valor corporal e interior del hebreo y resulta más natural en español bíblico contemporáneo.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: las flechas de
  alternatives_spanish:
  - los hijos de
  - los miembros de
  - las puntas de
  lexicon: HALOT
  rationale: La expresión hebrea literal "hijos de" se refiere idiomáticamente a las flechas. En español, mantenerla de forma literal oscurecería el sentido; por eso se da su equivalente poético directo, "las flechas de", que preserva la referencia al objeto del aljaba.
- source_word: אַשְׁפָּתוֹ
  english_pob_choice: his quiver
  chosen_spanish: su aljaba
  alternatives_spanish:
  - su carcaj
  - su quiver
  lexicon: HALOT
  rationale: אַשְׁפָּה designa el estuche de flechas. "Aljaba" es el término español bíblico y literario más natural; "carcaj" es posible, pero menos tradicional en registros bíblicos en español.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés. La principal decisión fue resolver en español la metáfora hebrea de "hijos de su aljaba" con un equivalente comprensible, sin perder la referencia a las flechas que el propio contexto exige. No se registraron revisiones textuales adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se prefirió "aljaba" como equivalente natural de אַשְׁפָּה.
  - Se evitó "riñones" en el texto principal para no volver áspera la imagen poética en español; la nota conserva la literalidad hebrea.
  - Se tradujo la causación del hifil con una construcción verbal que preserve el acto de hacer penetrar, no una mera cercanía o envío.
