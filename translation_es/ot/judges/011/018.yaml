revisions:
- from: Entonces fue por el desierto y rodeó la tierra de Edom y la tierra de Moab[a], y llegó a la parte oriental de la tierra de Moab, y acamparon al otro lado del Arnón[b]; no entraron en el territorio de Moab, porque el Arnón era el límite de Moab.
  to: Entonces fue por el desierto y rodeó la tierra de Edom y la tierra de Moab[a], y llegó a la parte oriental de la tierra de Moab, y acamparon al otro lado del Arnón[b]; pero no entraron en el territorio de Moab, porque el Arnón era el límite de Moab.
  rationale: Se corrige la nota [b] para que preserve una alternativa real y útil, en conformidad con la auditoría inglesa y la disciplina de notas. También se añade 'pero' para reflejar con más claridad el contraste narrativo del original y del English POB, sin cambiar el sentido.
