    rationale: La nota [a] explica la pareja 'de un lado y de otro lado', pero está puesta en 'mesas'. La nota cultural sobre 'el hombro de la puerta' debería anclarse en la frase que traduce לְכֶתֶף הַשָּׁעַר, no en 'aquel lado'.
