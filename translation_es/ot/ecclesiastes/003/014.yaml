translation:
  language: es
  text: Sé que todo lo que Dios hace permanecerá para siempre; no hay nada que añadirle, ni nada que quitarle. Dios lo ha hecho para que teman[a] delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que estén sobrecogidos delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Reconozco
  alternatives_spanish:
  - Sé
  - Conozco
  lexicon: HALOT
  rationale: El perfecto de ידע expresa una convicción ya establecida. En español, «reconozco» comunica bien esa comprensión firme y resultante, con un tono natural y digno; «sé» también sería posible, pero suena más general y menos observacional en este contexto.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo conocido, no una causalidad principal. «Que» reproduce mejor la función subordinante en español.
- source_word: כָּל אֲשֶׁר יַעֲשֶׂה הָאֱלֹהִים
  english_pob_choice: whatever God does
  chosen_spanish: todo lo que Yahvé hace
  alternatives_spanish:
  - cualquier cosa que Dios haga
  - todo cuanto Dios hace
  lexicon: HALOT
  rationale: La construcción hebrea universaliza la acción divina. Se eligió «todo lo que Yahvé hace» para mantener la amplitud sin volver la frase artificiosa; se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «Dios», en esta serie el proyecto pide «Yahvé» como representación principal del nombre divino. Aquí la referencia al agente divino es inequívoca y el contexto no exige ocultar el nombre.
- source_word: הוּא יִהְיֶה לְעוֹלָם
  english_pob_choice: will endure forever
  chosen_spanish: permanecerá para siempre
  alternatives_spanish:
  - durará para siempre
  - será para siempre
  lexicon: HALOT
  rationale: La secuencia expresa permanencia duradera. «Permanecerá para siempre» conserva el valor de duración y suena más natural en español que una traducción más literal de ser/existir eternamente.
- source_word: עָלָיו אֵין לְהוֹסִיף
  english_pob_choice: there is nothing to add to it
  chosen_spanish: no hay nada que añadirle
  alternatives_spanish:
  - no se puede añadir nada a ello
  - no hay nada para añadir sobre ello
  lexicon: HALOT
  rationale: El hebreo usa una idiomática de imposibilidad de añadir. «Añadirle» mantiene el referente del objeto anterior y evita una perífrasis demasiado pesada.
- source_word: וּמִמֶּנּוּ אֵין לִגְרֹעַ
  english_pob_choice: and there is nothing to take from it
  chosen_spanish: ni nada que quitarle
  alternatives_spanish:
  - ni se le puede quitar nada
  - ni nada puede ser tomado de ello
  lexicon: HALOT
  rationale: גרע expresa quitar o disminuir. El paralelismo con la cláusula anterior queda claro con «quitarle», que es idiomático y fiel al sentido.
- source_word: וְהָאֱלֹהִים עָשָׂה
  english_pob_choice: God has done it
  chosen_spanish: Yahvé lo ha hecho
  alternatives_spanish:
  - Dios lo ha hecho
  - Yahvé lo hizo
  lexicon: HALOT
  rationale: El perfecto comunica una acción ya cumplida con efecto presente. Se mantiene el objeto implícito con «lo» para reflejar el neutro de la acción previamente descrita.
- source_word: שֶׁיִּרְאוּ
  english_pob_choice: so that they may fear
  chosen_spanish: para que teman
  alternatives_spanish:
  - para que tengan temor
  - para que reverencien
  - para que estén sobrecogidos
  lexicon: HALOT
  rationale: Se conserva «teman» como equivalente directo de ירא en relación con Dios, manteniendo la tensión teológica que el POB inglés preserva al preferir «fear». «Teman» es claro, sobrio y bíblicamente reconocible en español.
- source_word: מִלְּפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La locución hebrea describe estar en la presencia de Dios. «Delante de él» conserva la imagen relacional sin recargar el castellano.
theological_decisions:
- issue: Traducción del nombre divino
  english_pob_reading: God / him
  chosen_spanish_reading: Yahvé / él
  alternative_spanish_readings:
  - Dios / él
  - SEÑOR / él
  rationale: El paquete del proyecto indica que יהוה/YHWH se traduzca como «Yahvé» en el texto principal, y aquí el contexto de Eclesiastés permite esa identificación. En la cláusula final se mantiene el pronombre «él» para respetar el eco relacional del hebreo sin repetir el nombre.
  doctrine_reference: Project-level Spanish terminology defaults
- issue: Sentido de ירא
  english_pob_reading: fear before him
  chosen_spanish_reading: teman delante de él
  alternative_spanish_readings:
  - reverencien delante de él
  - estén sobrecogidos delante de él
  - tengan temor delante de él
  rationale: Se conserva «teman» para no suavizar la carga lexical y teológica del verbo. La POB inglesa mantuvo «fear» en el cuerpo y solo anotó la alternativa idiomática de «stand in awe»; en español se preserva esa misma tensión semántica.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El contexto de auditoría inglesa muestra alta concordancia y ningún cambio reciente aplicado. Esta versión española sigue el sentido del hebreo con la misma resolución principal que la POB inglesa, ajustando solo la forma para naturalidad y las convenciones terminológicas del proyecto (especialmente el nombre divino).
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de las dos cláusulas negativas con «no hay nada que añadirle / ni nada que quitarle».
  - Se conservó el tono sobrio de Eclesiastés sin explicitar de más la referencia implícita del objeto en la primera mitad.
  - La elección de «teman» preserva la ambigüedad reverencial/temorosa documentada en el audit trail.
  - Se usó puntuación española y se evitó la máscara «SEÑOR» conforme al estándar del proyecto.
