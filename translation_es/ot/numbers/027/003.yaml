translation:
  language: es
  text: Nuestro padre murió en el desierto[a], y no estaba entre la asamblea de los que se juntaron contra Yahvé en la compañía de Coré, sino que murió en su propio pecado[b], y no tuvo hijos varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el yermo». El hebreo מִדְבָּר se refiere a la región despoblada del éxodo; «desierto» es una equivalencia española natural, aunque «yermo» también es posible.
    reason: lexical_alternative
  - marker: b
    text: O «en su pecado», «por su pecado» o «a causa de su pecado». El hebreo no especifica el pecado concreto; solo afirma que su muerte no fue parte de la rebelión de Coré.
    reason: alternative_reading
lexical_decisions:
- source_word: אָבִינוּ
  english_pob_choice: Our father
  chosen_spanish: Nuestro padre
  alternatives_spanish:
  - Nuestro antepasado
  lexicon: HALOT
  rationale: El contexto son las hijas hablando de su padre inmediato; en español, «padre» es la correspondencia natural y suficiente, mientras que «antepasado» ampliaría injustificadamente el vínculo.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  - está muerto
  lexicon: HALOT
  rationale: 'El perfecto hebreo en este recuerdo narrativo se expresa mejor como pasado simple en español: «murió». Evita un presente de estado que no refleja bien la línea narrativa.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: Aunque la POB inglesa prefiere «wilderness» para el trasfondo del éxodo, en español «desierto» comunica de forma clara el mismo ámbito geográfico y bíblico. «Yermo» o «estepa» serían menos naturales aquí.
- source_word: בְּתוֹךְ הָעֵדָה
  english_pob_choice: among the congregation
  chosen_spanish: entre la asamblea
  alternatives_spanish:
  - en medio de la asamblea
  - entre la congregación
  lexicon: HALOT
  rationale: «בְּתוֹךְ» expresa inclusión en medio de un grupo. «Asamblea» mantiene el valor colectivo de עֵדָה sin cargar una terminología eclesial más fuerte que el hebreo; «congregación» también es posible, pero en este contexto «asamblea» fluye mejor en español.
- source_word: הַנּוֹעָדִים עַל יְהוָה
  english_pob_choice: of those who gathered themselves against Yahweh
  chosen_spanish: de los que se juntaron contra Yahvé
  alternatives_spanish:
  - de los que se reunieron contra Yahvé
  - de los que se congregaron contra Yahvé
  - de los que se alzaron contra Yahvé
  lexicon: HALOT
  rationale: El participio nifal con עַל aquí indica una reunión hostil. «Se juntaron» conserva la idea reflexiva/colectiva sin sonar forzado; «contra Yahvé» expresa la dirección adversativa del sintagma.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrámaton se vierte como «Yahvé» para preservar el nombre divino personal, no como sustituto titulado.'
- source_word: בַּעֲדַת קֹרַח
  english_pob_choice: in the company of Korah
  chosen_spanish: en la compañía de Coré
  alternatives_spanish:
  - en la asamblea de Coré
  - con la compañía de Coré
  lexicon: HALOT
  rationale: «Compañía» distingue este grupo específico de la «asamblea» anterior y conserva el matiz de facción asociada con Coré. «Coré» es la forma española estable del nombre propio.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - pues
  - sino
  lexicon: HALOT
  rationale: 'En español, la relación correctiva del hebreo se expresa con mayor precisión mediante «sino que» tras una negación previa: no murió como parte de la rebelión de Coré, sino por otra causa distinta.'
- source_word: בְחֶטְאוֹ
  english_pob_choice: in his own sin
  chosen_spanish: en su propio pecado
  alternatives_spanish:
  - por su propio pecado
  - a causa de su propio pecado
  - en su pecado
  lexicon: HALOT
  rationale: 'La preposición בְ admite un valor causal o de esfera. «En su propio pecado» mantiene la correspondencia más cercana al inglés POB y conserva la tensión interpretativa: el texto no especifica el pecado concreto.'
- source_word: וּבָנִים לֹא הָיוּ לוֹ
  english_pob_choice: and he had no sons
  chosen_spanish: y no tuvo hijos
  alternatives_spanish:
  - y no tenía hijos
  - y no le nacieron hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «no hubo hijos para él». En español, «no tuvo hijos» es idiomático y fiel. «Hijos» preserva mejor el dato genealógico/legal del pasaje que una neutralización.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto, no una sustitución de título. Esto sigue la doctrina del proyecto y conserva la transparencia respecto del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre la muerte personal y la rebelión de Coré
  english_pob_reading: he died in his own sin
  chosen_spanish_reading: murió en su propio pecado
  alternative_spanish_readings:
  - murió por su propio pecado
  - murió a causa de su propio pecado
  - murió en su pecado
  rationale: 'La formulación conserva la distinción explícita del texto: el padre no perteneció al grupo de Coré, pero su muerte tampoco queda moralmente vaciada. El español mantiene esa tensión sin especificar el pecado, como exige el hebreo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Elección entre asamblea y congregación
  english_pob_reading: congregation / assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - reunión
  rationale: «Asamblea» refleja bien עֵדָה y evita imponer una lectura eclesial más técnica. En español permite distinguir claramente este grupo del de Coré sin perder el sentido colectivo.
  doctrine_reference: 'DOCTRINE.md: Context-sensitive rendering of עֵדָה'
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «but he died for his own sin» a «but he died in his own sin» para acercarse más al hebreo y evitar sobreinterpretar la causalidad. En español se refleja esa revisión con «sino que murió en su propio pecado», preservando la relación correctiva y la ambigüedad causal/esférica del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se prefiere «asamblea» para עֵדָה y «compañía» para עֲדַת קֹרַח, manteniendo dos términos distintos donde el hebreo distingue el grupo general del grupo de Coré.
  - «Hijos» se conserva por la relevancia hereditaria del pasaje; no se neutraliza a «descendencia».
  - La puntuación reproduce el flujo del hebreo con una coordinación inicial y una corrección posterior mediante «sino que».
