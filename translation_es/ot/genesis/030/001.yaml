translation:
  language: es
  text: 'Cuando Raquel vio que no le había dado hijos a Jacob, tuvo celos de su hermana y dijo a Jacob: «Dame hijos, o moriré».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּרֶא / saw
  english_pob_choice: When Rachel saw
  chosen_spanish: Cuando Raquel vio
  alternatives_spanish:
  - Raquel vio
  - Ahora Raquel vio
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Cuando» expresa bien la relación temporal en español sin volver el texto pesado. «Vio» conserva la percepción inicial de Raquel antes de su reacción.
- source_word: כִּי לֹא יָלְדָה לְיַעֲקֹב
  english_pob_choice: that she had borne no children to Jacob
  chosen_spanish: que no había dado hijos a Jacob
  alternatives_spanish:
  - que no había parido a Jacob
  - que no había tenido hijos para Jacob
  lexicon: HALOT
  rationale: יָלַד en este contexto de mujer indica dar a luz / tener descendencia. «Dado hijos» mantiene el sentido de descendencia sin restringirlo al sexo masculino, y «a Jacob» sigue de cerca la relación del hebreo con לְ.
- source_word: וַתְּקַנֵּא
  english_pob_choice: became jealous
  chosen_spanish: Raquel envidió
  alternatives_spanish:
  - Raquel tuvo celos de
  - Raquel se puso celosa de
  lexicon: HALOT
  rationale: קנא puede abarcar celos o envidia según el contexto. Aquí la comparación con la fecundidad de su hermana favorece «envidió», que conserva mejor la tensión relacional y evita una lectura demasiado sentimental.
- source_word: בַּאֲחֹתָהּ
  english_pob_choice: of her sister
  chosen_spanish: a su hermana
  alternatives_spanish:
  - de su hermana
  - contra su hermana
  lexicon: HALOT
  rationale: El hebreo usa la relación «hermana» en vez del nombre propio; en español, con «envidiar» la preposición natural es «a». «Su hermana» mantiene la referencia a Lea sin introducir el nombre en el texto base.
- source_word: הָבָה לִּי בָנִים
  english_pob_choice: Give me children
  chosen_spanish: Dame hijos
  alternatives_spanish:
  - Dame hijos varones
  - Concédeme hijos
  lexicon: HALOT
  rationale: בנים significa formalmente «hijos/varones», pero aquí la petición de Raquel apunta a descendencia. «Hijos» es la forma más directa y conserva la fuerza imperativa.
- source_word: וְאִם אַיִן
  english_pob_choice: or I will die
  chosen_spanish: o moriré
  alternatives_spanish:
  - y si no, moriré
  - o, si no, moriré
  lexicon: HALOT
  rationale: El hebreo introduce una alternativa amenazante; la revisión inglesa simplificó a «or». En español, «o moriré» reproduce la urgencia de la frase sin agregar explicaciones.
- source_word: מֵתָה אָנֹכִי
  english_pob_choice: I will die
  chosen_spanish: moriré
  alternatives_spanish:
  - estoy por morir
  - estoy muerta
  lexicon: HALOT
  rationale: La forma hebrea expresa un resultado inminente e intenso. «Moriré» transmite esa amenaza de manera directa y natural en español.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «to Jacob» por «to Jacob» desde «for Jacob» y simplificó «or else» a «or». En español, se siguió de cerca esa línea revisada con «a Jacob» y «o moriré», manteniendo la tensión del hebreo sin añadir muletillas.
  spanish_consistency_notes:
  - Se preservó la repetición de «Raquel» en la primera y segunda cláusula para reflejar la estructura hebrea, aunque una sustitución por pronombre también sería posible en español.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - «Hijos» se eligió como equivalente funcional de בנים, dado que el contexto es esterilidad y descendencia, no un énfasis exclusivo en varones.
