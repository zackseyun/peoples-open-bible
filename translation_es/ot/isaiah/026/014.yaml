translation:
  language: es
  text: Los muertos no viven; las sombras[a] no se levantan. Por tanto, los has castigado[b] y los has destruido, y has hecho perecer todo recuerdo de ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los espíritus de los muertos»; el hebreo רְפָאִים se refiere aquí a los muertos del inframundo, no al antiguo pueblo llamado Rephaim.
    reason: lexical_alternative
  - marker: b
    text: O «los has llamado a cuentas»; el verbo hebreo puede significar «visitar» en juicio o en misericordia, pero aquí el contexto favorece el castigo.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «has destruido toda memoria de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵתִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los muertos mismos
  lexicon: HALOT
  rationale: El sustantivo plural sustantivado se expresa con naturalidad en español como «los muertos», preservando el sentido colectivo e idiomático del hebreo sin añadir matices ajenos.
- source_word: בַּל יִחְיוּ
  english_pob_choice: do not live
  chosen_spanish: no viven
  alternatives_spanish:
  - no vivirán
  - no vivirán nunca
  lexicon: HALOT
  rationale: «בל» en poesía formula una negación enfática; el presente español transmite bien la condición general e irreversible que el verso afirma, sin forzar una temporalidad futura más explícita que la del hebreo.
- source_word: רְפָאִים
  english_pob_choice: the shades
  chosen_spanish: los [b]
  alternatives_spanish:
  - las sombras
  - los difuntos del Seol
  - los rephaim
  lexicon: HALOT
  rationale: El hebreo alude aquí a los muertos del inframundo, no al grupo étnico llamado Refaítas/Rephaim. En español, «los difuntos» o «las sombras» podrían servir; se deja la ambigüedad controlada para no imponer una imagen interpretativa no explicitada en el texto base.
- source_word: בַּל יָקֻמוּ
  english_pob_choice: do not rise
  chosen_spanish: no se levantan
  alternatives_spanish:
  - no resucitan
  - no se alzan
  lexicon: HALOT
  rationale: «קום» puede ser «levantarse» o «alzarse»; «no se levantan» mantiene el paralelismo con «no viven» y conserva la sobriedad poética del hebreo. «Resucitan» sería más interpretativo.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: «Por tanto» expresa la relación consecuencial formal del hebreo y funciona bien en registro bíblico contemporáneo.
- source_word: פָּקַדְתָּ
  english_pob_choice: have punished
  chosen_spanish: los has castigado
  alternatives_spanish:
  - los has visitado
  - los has llamado a cuentas
  lexicon: HALOT
  rationale: En contexto de juicio, פקד adquiere el valor de intervenir contra alguien; «castigar» comunica la decisión divina sin perder la posibilidad semántica de «llamar a cuentas» que se preserva en la nota.
- source_word: וַתַּשְׁמִידֵם
  english_pob_choice: destroyed them
  chosen_spanish: los has destruido
  alternatives_spanish:
  - los has aniquilado
  - los has arrasado
  lexicon: HALOT
  rationale: שׁמד indica destrucción fuerte. «Destruir» es fiel, claro y suficientemente intenso para el paralelo poético.
- source_word: וַתְּאַבֵּד כָּל זֵכֶר לָמוֹ
  english_pob_choice: you have made all memory of them perish
  chosen_spanish: has hecho perecer todo recuerdo de ellos
  alternatives_spanish:
  - has borrado todo recuerdo de ellos
  - has hecho desaparecer toda memoria de ellos
  lexicon: HALOT
  rationale: אבד con «זכר» expresa la pérdida o desaparición del recuerdo. «Hacer perecer todo recuerdo» conserva la fuerza verbal del hebreo y evita reducir el giro a una mera formulación nominal.
theological_decisions:
- issue: Sentido de רְפָאִים
  english_pob_reading: the underworld dead ('the shades')
  chosen_spanish_reading: los muertos del inframundo / del Seol, sin identificarlo con un pueblo histórico
  alternative_spanish_readings:
  - los Refaítas
  - las sombras
  - los difuntos
  rationale: El paralelo con «los muertos» y con los verbos «vivir»/«levantarse» muestra que el término apunta a los muertos en la región de los muertos. La traducción principal deja abierta esa referencia sin introducir una identificación étnica incorrecta.
  doctrine_reference: Afirmar el sentido contextual; no resolver la imaginería del Seol más allá de lo que el verso exige
- issue: Alcance de la negación de vivir/levantarse
  english_pob_reading: a statement of these judged oppressors' irreversible downfall within the poem
  chosen_spanish_reading: una afirmación poética de ruina irreversible bajo juicio
  alternative_spanish_readings:
  - una negación universal de toda resurrección
  - una descripción puramente física de muerte final
  rationale: El verso habla de enemigos juzgados dentro del poema; por eso la traducción no debe convertirlo en una tesis universal sobre la resurrección. Se preserva la tensión bíblica sin expandirla doctrinalmente.
  doctrine_reference: Preservar la tensión teológica; no convertir poesía de juicio en doctrina totalizante
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el inglés auditado se mantiene estable con acuerdo alto y solo observaciones menores, especialmente en el tratamiento léxico de רְפָאִים y פקד.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se prefirió «los muertos» por naturalidad idiomática y fidelidad al sustantivo plural hebreo.
  - Se evitó «resucitan» para no cargar el verso con una afirmación doctrinal que el contexto poético no formula explícitamente.
  - Se conservó el paralelismo hebreo con dos miembros negativos seguidos de dos verbos de juicio y una clausula final de olvido total.
  - La nota sobre רְפָאִים evita la identificación con el pueblo antiguo Rephaim, siguiendo el contexto inmediato.
