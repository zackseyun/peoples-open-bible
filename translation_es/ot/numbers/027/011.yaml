translation:
  language: es
  text: Y si su padre no tiene hermanos, entonces darán su herencia a su pariente más cercano[a] de su clan, y él la poseerá[b]. Esto será para los hijos de Israel[c] un estatuto de juicio[d], tal como Yahvé mandó a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pariente de sangre más cercano»; el hebreo combina la idea de parentesco consanguíneo con la de cercanía jurídica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y él la heredará».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hijos de Israel», una designación pactual estándar para el pueblo de Israel.'
    reason: cultural_note
  - marker: d
    text: 'O: «una ordenanza de juicio» o «una ordenanza legal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes varones
  - consanguíneos
  lexicon: HALOT
  rationale: En el contexto legal de la sucesión, el sentido directo es el de hermanos del padre. «Hermanos» reproduce con naturalidad ese valor familiar y mantiene la precisión de género que el hebreo expresa.
- source_word: לְאָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - para su padre
  lexicon: HALOT
  rationale: 'La construcción hebrea requiere en español una formulación idiomática: «si no tiene hermanos su padre» comunica el referente posesivo sin forzar el orden de palabras.'
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión hereditaria
  lexicon: HALOT
  rationale: En un marco jurídico de traspaso patrimonial, «herencia» expresa bien la sucesión de derechos y bienes. «Heredad» sería posible, pero suena más marcado o tradicional.
- source_word: שְׁאֵרוֹ הַקָּרֹב אֵלָיו
  english_pob_choice: his nearest relative
  chosen_spanish: su pariente más cercano
  alternatives_spanish:
  - su pariente de sangre más cercano
  - su consanguíneo más cercano
  lexicon: HALOT
  rationale: El hebreo combina idea de pariente de sangre con cercanía relativa. «Pariente más cercano» conserva ambas capas de forma natural; la alternativa más literal puede resultar pesada en español.
- source_word: מִמִּשְׁפַּחְתּוֹ
  english_pob_choice: from his clan
  chosen_spanish: de su clan
  alternatives_spanish:
  - de su familia
  - de su parentela
  lexicon: HALOT
  rationale: «Clan» refleja mejor el grupo de parentesco amplio propio del orden tribal israelita que «familia», demasiado estrecho en español moderno.
- source_word: וְיָרַשׁ אֹתָהּ
  english_pob_choice: and he shall possess it
  chosen_spanish: y él la poseerá
  alternatives_spanish:
  - y la heredará
  - y él la heredará
  - y tomará posesión de ella
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «possess it» para evitar repetición, el verbo hebreo ירשׁ aquí conserva fuerza de posesión hereditaria. «La poseerá» es fiel y legalmente claro en español.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación covenantal masculina del hebreo. «Hijos de Israel» es una fórmula bíblica reconocible en español y no neutraliza el género del original.
- source_word: לְחֻקַּת מִשְׁפָּט
  english_pob_choice: a statute of judgment
  chosen_spanish: una estatuta de juicio
  alternatives_spanish:
  - una estatuto de juicio
  - una ordenanza legal
  - una ordenanza de juicio
  lexicon: HALOT
  rationale: La frase une la idea de decreto vinculante con la de decisión/orden jurídico. «Estatuta» conserva el paralelismo con el hebreo חֻקַּת y evita sustituirlo por un término más interpretativo; «juicio» mantiene el componente forense.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se vierte el Tetragrámaton con la forma española asentada en el proyecto, «Yahvé», para preservar el nombre propio divino en vez de ocultarlo con un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: 'El texto hebreo usa el nombre propio divino, no un título genérico. En español del proyecto, «Yahvé» cumple la misma función que «Yahweh» en inglés: conservar el nombre del pacto y no reemplazarlo por «Señor».'
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Expresión legal לְחֻקַּת מִשְׁפָּט
  english_pob_reading: a statute of judgment
  chosen_spanish_reading: una estatuta de juicio
  alternative_spanish_readings:
  - una ordenanza de juicio
  - una disposición legal
  rationale: La expresión hebrea conserva una tensión entre decreto normativo y decisión jurídica. La traducción busca dejar visibles ambos componentes sin reducirlos a una sola categoría administrativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en sus decisiones principales: «brothers» → «hermanos», «his nearest relative from his clan» → «su pariente más cercano de su clan», «sons of Israel» → «hijos de Israel», y el nombre divino se preserva como Yahvé. Se adopta una forma más idiomática en español para el orden inicial y una literalidad moderada en el cierre jurídico. También se conserva la tensión léxica de חֻקַּת מִשְׁפָּט mediante una expresión legal marcada con nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino.
  - «Hijos de Israel» conserva el valor covenantal masculino del hebreo.
  - «Clan» se usa para el grupo de parentesco amplio, no «familia».
  - La forma verbal «poseerá» refleja ירשׁ sin perder el matiz sucesorio.
  - Se evita suavizar la fórmula jurídica final; se deja una alternativa en nota para capturar la ambigüedad del hebreo.
