translation:
  language: es
  text: Entonces saldrá un retoño[a][b] del tocón de Isaí, y un vástago[c] de sus raíces[d] dará fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y saldrá un retoño del tocón de Isaí». El hebreo puede traducirse simplemente con «y»; «entonces» refleja el avance del contexto de juicio hacia una esperanza renovada.
    reason: lexical_alternative
  - marker: b
    text: O «brote» o «vara» para el hebreo חֹטֶר.
    reason: lexical_alternative
  - marker: c
    text: O «rama» o «renuevo» para el hebreo נֵצֶר. Algunas lecturas cristianas ven aquí un sentido mesiánico, pero el texto principal conserva el sentido vegetal ordinario.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «sus raíces», con sufijo masculino singular; algunas traducciones suavizan la imagen como si se refiriera de manera impersonal al árbol o al linaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then ... will come out
  chosen_spanish: Entonces saldrá
  alternatives_spanish:
  - Y saldrá
  - Entonces brotará
  lexicon: BDB / HALOT
  rationale: El verbo יצא expresa salida o surgimiento. «Saldrá» conserva el movimiento de aparición de la imagen vegetal; «entonces» refleja bien la transición desde el juicio previo hacia la esperanza renovada, como en el audit trail inglés.
- source_word: חֹטֶר
  english_pob_choice: shoot
  chosen_spanish: retoño
  alternatives_spanish:
  - vástago
  - renuevo
  - ramita
  lexicon: HALOT
  rationale: חֹטֶר designa un brote joven que emerge de un tronco o tocón. «Retoño» comunica con naturalidad la imagen botánica en español y evita la connotación de vara o bastón que tendría «vara» en otros contextos.
- source_word: מִגֵּזַע
  english_pob_choice: from the stump
  chosen_spanish: del tronco
  alternatives_spanish:
  - del tocón
  - del tronco cortado
  - del cepo
  lexicon: HALOT
  rationale: גֵּזַע puede referirse al tocón o stock de un árbol talado. «Tronco» es claro y natural en español; aunque «tocón» refleja más estrictamente la idea de lo que queda tras cortar, «tronco» mantiene dignidad literaria y la metáfora de la línea dinástica.
- source_word: יִשָׁי
  english_pob_choice: Jesse
  chosen_spanish: Isaí
  alternatives_spanish:
  - Jesse
  lexicon: Nombre propio bíblico tradicional en español
  rationale: En español bíblico, el nombre se traduce convencionalmente como «Isaí», forma reconocible y asentada en la tradición hispana.
- source_word: וְנֵצֶר
  english_pob_choice: branch
  chosen_spanish: vástago
  alternatives_spanish:
  - rama
  - brote
  - renuevo
  lexicon: HALOT
  rationale: נֵצֶר puede significar brote, vástago o rama joven. «Vástago» preserva el paralelismo con «retoño» y sugiere tanto crecimiento vegetal como continuidad genealógica, sin imponer una formulación doctrinal explícita en el texto principal.
- source_word: מִשָּׁרָשָׁיו
  english_pob_choice: from his roots
  chosen_spanish: de sus raíces
  alternatives_spanish:
  - de sus raíces
  - de sus raíces de él
  lexicon: HALOT
  rationale: El hebreo tiene un sufijo masculino singular. «Sus raíces» reproduce con naturalidad la relación posesiva y conserva la referencia a Isaí en la imagen del árbol, sin necesidad de forzar «de él» en español.
- source_word: יִפְרֶה
  english_pob_choice: will bear fruit
  chosen_spanish: dará fruto
  alternatives_spanish:
  - fructificará
  - será fructífero
  - brotará
  lexicon: HALOT
  rationale: פרה significa dar fruto o ser fecundo. «Dará fruto» completa la imagen vegetal con un español claro y sobrio, muy cercano al valor léxico del verbo hebreo.
theological_decisions:
- issue: Alcance mesiánico de la imagen vegetal
  english_pob_reading: Translate the verse in its immediate botanical and dynastic sense without importing an explicit messianic title into the text.
  chosen_spanish_reading: Traducir la imagen en su sentido botánico y dinástico inmediato, sin introducir un título mesiánico explícito en el texto principal.
  alternative_spanish_readings:
  - Rezar con mayúscula («Vástago») para señalar un título mesiánico
  - Usar una formulación más interpretativa que identifique directamente al Mesías
  rationale: Aunque la tradición cristiana lee este pasaje de manera mesiánica, el hebreo presenta primero una imagen de continuidad del linaje de Isaí. Mantener minúsculas y un lenguaje vegetal ordinario preserva la tensión hermenéutica y deja que la significación canónica emerja por contexto.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
- issue: Sufijo posesivo masculino en «sus raíces»
  english_pob_reading: Preserve the masculine possessive in the main text as 'his roots.'
  chosen_spanish_reading: Conservar el posesivo masculino implícito en «sus raíces».
  alternative_spanish_readings:
  - Hacer explícito «de él»
  - Suavizar a «de sus raíces» sin referencia posesiva marcada
  rationale: El hebreo usa un sufijo masculino singular. En español, «sus raíces» mantiene la referencia sin perder naturalidad; la masculinidad queda preservada por el antecedente («Isaí») y por la estructura posesiva del hebreo, aunque el español no lo marque de forma visible.
  doctrine_reference: Principio de fidelidad gramatical de la POB
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una lectura botánica y dinástica sin mayúscula mesiánica en el texto principal, con notas que preservan alternativas léxicas. La presente redacción española sigue esa misma orientación y no requiere revisión adicional respecto del pasaje base.
  spanish_consistency_notes:
  - 'Se conserva la metáfora vegetal con equivalentes naturales en español: retoño / vástago / raíces / dar fruto.'
  - 'Se mantiene la forma tradicional española del nombre propio: Isaí.'
  - No se introduce en el texto principal una capitalización que convierta «vástago» en título.
  - Las notas distinguen entre alternativas botánicas legítimas sin borrar el posible trasfondo mesiánico reconocido por la tradición cristiana.
