translation:
  language: es
  text: Egipto es una becerra hermosa; la destrucción[a] desde el norte ha venido, ha venido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un tábano desde el norte»; el sustantivo hebreo es raro, y algunos lo entienden más ampliamente como «destrucción desde el norte».
    reason: alternative_reading
lexical_decisions:
- source_word: עֶגְלָה
  english_pob_choice: heifer
  chosen_spanish: becerra
  alternatives_spanish:
  - novilla
  - vaquilla
  lexicon: HALOT
  rationale: El hebreo designa una cría hembra de bovino. En español, «becerra» conserva bien la imagen femenina y el carácter poético del original sin sonar demasiado técnico.
- source_word: יְפֵה פִיָּה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - de hermosa apariencia
  lexicon: HALOT
  rationale: La duplicación adjetival intensifica la belleza de Egipto. «Hermosa» transmite esa valoración de forma natural y digna en español.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre propio estándar del país/personificación nacional.
- source_word: קֶרֶץ
  english_pob_choice: destruction / biting fly (as a textual-theological ambiguity in the audit trail)
  chosen_spanish: destrucción
  alternatives_spanish:
  - tábano
  - mosca picadora
  - insecto picador
  lexicon: HALOT
  rationale: La revisión más reciente del POB inglés favorece «destruction» para reflejar mejor el sentido adoptado en el texto publicado, aunque el audit trail conserva la posibilidad de una imagen concreta de insecto. En español se sigue la lectura revisada y se mantiene la nota de alternativa.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  - procedente del norte
  lexicon: HALOT
  rationale: La expresión direccional es natural en español y conserva la carga profética habitual en Jeremías.
- source_word: בָּא בָא
  english_pob_choice: has come, it has come
  chosen_spanish: ha venido, ha venido
  alternatives_spanish:
  - viene, viene
  - ha llegado, ha llegado
  lexicon: HALOT
  rationale: La repetición se conserva para reflejar el énfasis hebreo. «Ha venido» suena idiomático en español y mantiene la seguridad de la amenaza profética.
theological_decisions:
- issue: Ambigüedad de קֶרֶץ en una imagen de juicio
  english_pob_reading: The published English revision reads 'destruction from the north,' while the audit trail records the earlier concrete insect image as an alternative.
  chosen_spanish_reading: destrucción del norte
  alternative_spanish_readings:
  - tábano del norte
  - mosca picadora del norte
  - insecto picador del norte
  rationale: Se sigue la lectura revisada del POB inglés, pero se preserva en nota que el hebreo es raro y que existe una interpretación concreta alternativa. Esto evita borrar la tensión léxica documentada en el expediente.
  doctrine_reference: Jeremiah 46:20; lexical-theological audit trail for קֶרֶץ
- issue: Personificación poética de Egipto como hembra bovina
  english_pob_reading: Egypt is a beautiful heifer
  chosen_spanish_reading: Egipto es una becerra hermosa
  alternative_spanish_readings:
  - Egipto es una novilla hermosa
  - Egipto es una vaquilla hermosa
  rationale: Se conserva la personificación femenina y la imaginería animal del oráculo sin suavizarla a una abstracción. No hay problema doctrinal; la decisión es poética y semántica.
  doctrine_reference: Jeremiah 46:20
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente que cambió la interpretación de קֶרֶץ de una imagen concreta de insecto a «destrucción», pero sin perder la nota alternativa documentada en el audit trail. Se conservó la repetición final («ha venido, ha venido») para reflejar el énfasis del hebreo.
  spanish_consistency_notes:
  - Se usa «Egipto» como nombre propio estándar, siguiendo el patrón POB para topónimos.
  - Se evita introducir mayúsculas innecesarias en «del norte», ya que la expresión funciona como marcador direccional en el verso.
  - «Becerra» preserva mejor el género del hebreo que «becerro», que sería masculino.
  - La nota de pie vincula la ambigüedad léxica directamente con el término raro sin añadir interpretaciones externas.
