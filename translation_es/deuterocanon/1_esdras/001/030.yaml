translation:
  language: es
  text: Y en toda Judea hicieron duelo[a] por Josías; y Jeremías el profeta lamentó por Josías, y los dirigentes, junto con las mujeres, seguían lamentándolo hasta este día[b]; y se dispuso que esto se hiciera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa aquí un verbo de duelo (ἐπένθησαν) distinto del verbo de lamento de la cláusula siguiente; por eso se traduce «hicieron duelo» aquí y luego «lamentó».
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en 2 Crónicas 35:24–25 menciona que todo Judá y Jerusalén hicieron duelo por Josías y que Jeremías entonó un lamento por él; 1 Esdras aquí amplía la descripción con dirigentes y mujeres lamentándolo «hasta este día».
    reason: cross_reference
lexical_decisions:
- source_word: ἐν ὅλῃ τῇ Ἰουδαίᾳ
  english_pob_choice: throughout all Judea
  chosen_spanish: en toda Judea
  alternatives_spanish:
  - por toda Judea
  - en toda la Judea
  lexicon: LSJ
  rationale: La construcción indica alcance total dentro del territorio; en español, «en toda Judea» comunica esa amplitud de manera natural sin sobrecargar el sintagma.
- source_word: ἐπένθησαν
  english_pob_choice: they mourned
  chosen_spanish: hicieron duelo
  alternatives_spanish:
  - menguaron
  - lloraron
  - se lamentaron
  lexicon: LSJ
  rationale: El verbo denota duelo por un muerto; «hicieron duelo» conserva el matiz funerario y evita confundirlo con mera tristeza general.
- source_word: ἐθρήνησεν
  english_pob_choice: lamented
  chosen_spanish: lamentó
  alternatives_spanish:
  - entonó un lamento
  - se lamentó
  - cantó un lamento
  lexicon: LSJ
  rationale: θρηνέω es más específico que πένθω y puede implicar lamento expresado; «lamentó» preserva esa distinción sin añadir detalles no explicitados.
- source_word: ὑπὲρ Ἰωσείου
  english_pob_choice: over Josiah
  chosen_spanish: por Josías
  alternatives_spanish:
  - sobre Josías
  - acerca de Josías
  lexicon: LSJ
  rationale: En contexto de duelo, ὑπέρ puede expresar motivo o referente del lamento; «por Josías» suena natural en español y mantiene la relación funeraria.
- source_word: οἱ προκαθήμενοι
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los principales
  - los que estaban al frente
  lexicon: LSJ
  rationale: El término apunta a personas prominentes o en autoridad; «jefes» es amplio y suficientemente sobrio para el registro bíblico.
- source_word: σὺν γυναιξὶν
  english_pob_choice: together with the women
  chosen_spanish: junto con las mujeres
  alternatives_spanish:
  - con las mujeres
  - junto a las mujeres
  lexicon: LSJ
  rationale: «Junto con» conserva la idea de acompañamiento y coordinación del duelo sin introducir una relación jerárquica.
- source_word: ἐθρηνοῦσαν
  english_pob_choice: kept lamenting
  chosen_spanish: seguían lamentándolo
  alternatives_spanish:
  - lamentaban
  - continuaban lamentándolo
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua o habitual; «seguían lamentándolo» reproduce esa duración y mantiene el objeto directo implícito del duelo.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - aún hoy
  lexicon: LSJ
  rationale: Es un giro idiomático de continuidad hasta el presente del narrador; «hasta este día» es la forma bíblica y clara en español.
- source_word: ἐξεδόθη τοῦτο γενέσθαι ἀεί
  english_pob_choice: this was ordained to be done forever
  chosen_spanish: se dispuso que esto se hiciera para siempre
  alternatives_spanish:
  - se decretó que esto se hiciera continuamente
  - se estableció que esto fuera una costumbre perpetua
  - fue ordenado que esto se hiciera para siempre
  lexicon: LSJ
  rationale: ἐξεδόθη admite el sentido de decreto o disposición formal, pero el griego no precisa el agente; «se dispuso» conserva esa vaguedad y «para siempre» refleja ἀεί sin exagerar la forma administrativa.
theological_decisions:
- issue: Cómo traducir el cierre sobre la permanencia del lamento sin convertirlo en una afirmación más técnica de ley o ritual de lo que el griego exige
  english_pob_reading: this was ordained to be done forever
  chosen_spanish_reading: se dispuso que esto se hiciera para siempre
  alternative_spanish_readings:
  - se decretó que esto se hiciera continuamente
  - se estableció como costumbre perpetua
  rationale: El texto sugiere una formalización duradera del duelo, pero no identifica con precisión la autoridad ni el mecanismo. La formulación española mantiene esa tensión y evita fijar indebidamente un marco jurídico o litúrgico más fuerte.
  doctrine_reference: Preservar la tensión textual sin resolverla; no sobreinterpretar la permanencia como mandato doctrinal explícito.
translation_notes:
  revision_awareness: Se ha seguido el griego como texto base, con el paralelo hebreo/MT solo como control de nombres y del marco de duelo; el cierre se mantiene deliberadamente abierto entre decreto formal y costumbre establecida, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando el texto lo requiera; aquí no aparece.
  - «Josías» y «Jeremías» siguen la forma española estándar y el paralelo del entorno textual.
  - Se distinguen con intención léxica «hicieron duelo» y «lamentó», reflejando dos verbos griegos distintos.
  - El tiempo imperfecto en «seguían lamentándolo» intenta conservar el valor durativo de ἐθρηνοῦσαν.
