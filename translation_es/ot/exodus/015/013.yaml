revisions:
- from: En tu amor constante has guiado al pueblo que redimiste[a]; en tu fuerza los has conducido hasta tu morada santa[b].
  to: En tu amor constante has llevado al pueblo que redimiste[a]; en tu fuerza los has guiado a tu santa morada[b].
  rationale: 'La revisión conserva el sentido del borrador pero corrige la coherencia entre texto y decisiones léxicas: נחה se refleja como ''has llevado'' y נהל como ''has guiado'', manteniendo una distinción natural en español. También se cambia ''hasta'' por ''a'' para ajustarse mejor a אֶל sin sobreinterpretar, y se pule el orden ''tu santa morada'' por mayor naturalidad.'
