translation:
  language: es
  text: No muestres parcialidad contra ti mismo[a], y no tropieces hasta tu propia caída.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo transmitido también puede leerse más literalmente: ‘y no tropieces en tu tropiezo’, mientras que el paralelo griego dice: ‘y no te avergüences ante tu caída’.'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ λάβῃς πρόσωπον / אַל תִּשָּׂא פָנֶיךָ
  english_pob_choice: Do not show partiality
  chosen_spanish: No muestres parcialidad
  alternatives_spanish:
  - No levantes el rostro
  - No favorezcas
  - No seas parcial
  lexicon: HALOT; LSJ
  rationale: El hebreo usa un modismo literal de ‘levantar el rostro’, pero el sentido idiomático es hacer acepción de personas o mostrar parcialidad. El paralelo griego, μὴ λάβῃς πρόσωπον, confirma una lectura idiomática. ‘No muestres parcialidad’ conserva el valor ético sin calco innecesario.
- source_word: עַל נַפְשֶׁךָ / κατὰ τῆς ψυχῆς σου
  english_pob_choice: against yourself
  chosen_spanish: contra ti mismo
  alternatives_spanish:
  - a costa de ti mismo
  - respecto de ti mismo
  - contra tu propia vida
  lexicon: HALOT; BDAG
  rationale: נפש aquí se refiere al propio yo/vida de manera reflexiva. En español, ‘contra ti mismo’ expresa con naturalidad la paradoja del mandato y sigue el valor reflexivo del hebreo y del griego.
- source_word: וְאַל תִּכָּשֵׁל / μὴ ἐντραπῇς
  english_pob_choice: and do not stumble
  chosen_spanish: y no tropieces
  alternatives_spanish:
  - y no te avergüences
  - y no vaciles
  - y no caigas
  lexicon: HALOT; BDAG
  rationale: La tradición hebrea apunta a כשל, ‘tropezar’, mientras que el griego dice ‘no te avergüences’. Como el audit trail inglés revisó la cláusula hacia ‘stumble’ por fidelidad a la forma hebrea, el español sigue ese camino con ‘no tropieces’, sin borrar la tensión del paralelo griego.
- source_word: לְמִכְשׁוֹלֶיךָ / εἰς πτῶσίν σου
  english_pob_choice: to your own downfall
  chosen_spanish: para tu propia caída
  alternatives_spanish:
  - hacia tu propio tropiezo
  - para tu ruina
  - para tu caída
  lexicon: HALOT; LSJ
  rationale: מכשול y πτῶσις comparten la imagen de caída/tropiezo. ‘Para tu propia caída’ mantiene la metáfora y comunica con claridad el resultado negativo en español.
theological_decisions:
- issue: Relación entre el hebreo de ‘tropezar’ y el griego de ‘avergonzarse’
  english_pob_reading: The main text follows the sense supported by the Greek parallel for coherence, while the latest revision reverts to 'stumble' to reflect the Hebrew more accurately.
  chosen_spanish_reading: 'El texto principal sigue el hebreo visible en la tradición publicada: ‘no tropieces’.'
  alternative_spanish_readings:
  - no te avergüences
  - no te sonrojes
  rationale: El expediente muestra una tensión textual real entre el hebreo transmitido y el paralelo griego. El español conserva la lectura hebrea en el cuerpo, sin borrar que el griego ofrece ‘avergonzarse’; esta tensión puede anotarse como variante o apoyo paralelo, pero no se resuelve mediante una paráfrasis neutralizante.
  doctrine_reference: Crítica textual / paralelismo hebreo-griego
- issue: Sentido de ‘caída’ final
  english_pob_reading: to your own downfall
  chosen_spanish_reading: para tu propia caída
  alternative_spanish_readings:
  - para tu ruina
  - para tu perdición
  rationale: ‘Caída’ respeta la metáfora de tropiezo/fall y evita cargar el verso con una interpretación más fuerte que el léxico permite. ‘Ruina’ o ‘perdición’ son posibles, pero exceden la imagen básica del texto.
  doctrine_reference: Sabiduría bíblica / advertencia moral
translation_notes:
  revision_awareness: El expediente inglés pasó de una formulación centrada en ‘be ashamed’ a otra que retoma ‘stumble’ por mayor fidelidad al hebreo transmitido. La traducción española adopta esa revisión, pero mantiene en nota la alternativa avalada por el griego para no borrar la tensión textual.
  spanish_consistency_notes:
  - Se usa ‘parcialidad’ para el modismo hebreo de נשא פנים, evitando un calco literal como ‘levantar el rostro’.
  - Se mantiene ‘caída’ como imagen final coherente con מכשול/πτῶσις.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otros términos no presentes en el pasaje.
  - El tono es proverbial y exhortativo, con español natural y de registro bíblico contemporáneo.
