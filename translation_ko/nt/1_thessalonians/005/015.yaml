id: 1TH.5.15
reference: 1 Thessalonians 5:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁρᾶτε μή τις κακὸν ἀντὶ κακοῦ τινι ἀποδῷ, ἀλλὰ πάντοτε τὸ ἀγαθὸν ⸀διώκετε εἰς ἀλλήλους καὶ εἰς πάντας.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/015.yaml
  text: See to it that no one repays evil for evil to anyone[b][a], but always pursue what is good toward one another and toward all people.
  footnotes:
  - marker: a
    text: Or 'lest anyone repay evil for evil to anyone.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'one another ... all people' likely moves from fellow believers to everyone more broadly.
    reason: cross_reference
translation:
  language: ko
  text: 누구도 다른 사람에게 악으로 악을 갚지 않도록 살피십시오[a]. 도리어 서로에게나[b] 모든 사람에게 언제나 선한 것을 추구하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「어떤 사람도 다른 사람에게 악으로 악을 갚지 못하도록」.
    reason: lexical_alternative
  - marker: b
    text: 「서로에게 ... 모든 사람에게」 구절은 신앙 공동체 동료에서 더 넓은 사람들로 확장됨을 가리킬 가능성이 크다.
    reason: cross_reference
lexical_decisions:
- source_word: ὁρᾶτε μή
  english_pob_choice: See to it that no one
  chosen_korean: ~ 살피십시오
  alternatives_korean:
  - 주의하여 보십시오
  - 조심하십시오
  lexicon: BDAG
  rationale: ὁράω 명령형의 「살펴 주의함」 의미. 「살피다」가 자연스럽다.
- source_word: κακὸν ἀντὶ κακοῦ ... ἀποδῷ
  english_pob_choice: repays evil for evil
  chosen_korean: 악으로 악을 갚지
  alternatives_korean:
  - 악에 악으로 보응하지
  - 악을 악으로 되갚지
  lexicon: BDAG
  rationale: 한국 교회 전통의 「악으로 악을 갚다」 정형.
- source_word: τὸ ἀγαθὸν διώκετε
  english_pob_choice: pursue what is good
  chosen_korean: 선한 것을 추구하십시오
  alternatives_korean:
  - 선한 것을 따라가십시오
  - 선을 좇으십시오
  lexicon: BDAG
  rationale: διώκω의 「쫓음·추구」. 「추구」가 합쇼체 산문에서 자연스럽다.
