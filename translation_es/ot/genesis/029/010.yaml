revisions:
- from: Y aconteció que, cuando Jacob vio a Raquel[a], la hija de Labán, hermano de su madre, y el rebaño de Labán, hermano de su madre, Jacob se acercó y quitó la piedra de sobre la boca del pozo, y dio de beber al rebaño de Labán, hermano de su madre.
  to: Y cuando Jacob vio a Raquel[a], la hija de Labán, hermano de su madre, y el rebaño de Labán, hermano de su madre, Jacob se acercó y rodó la piedra de la boca del pozo, y dio de beber al rebaño de Labán, hermano de su madre.
  rationale: Se simplifica la fórmula inicial a «Y cuando» para reflejar mejor el hebreo narrativo sin rigidez arcaizante, y se cambia «quitó la piedra de sobre» por «rodó la piedra de» para conservar la imagen concreta del verbo גלל y alinearse mejor con la decisión léxica documentada en el POB. Se mantiene la triple repetición de parentesco y la nota correspondiente.
