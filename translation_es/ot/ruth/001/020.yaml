    rationale: Aunque es idiomático, este giro puede entenderse como ‘me ha causado mucha amargura’ o ‘me ha hecho pasar un mal rato’, mientras que el audit trail inglés revisó precisamente hacia «has made me very bitter» para reflejar más directamente el hebreo y conservar el vínculo con el nombre Mara.
  - severity: low
    issue: La nota al pie puede formularse de manera más natural en español
    rationale: «Se relaciona con» es aceptable, pero «significa algo como» transmite mejor la intención explicativa del inglés POB y resulta más clara para lectura bíblica general.
  - severity: low
