review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y la trayectoria del POB inglés: fórmula legal duradera, datación calendárica, mandato de autoaflicción/auto-humillación, prohibición de trabajo y aplicación tanto al nativo como al residente foráneo. Sin embargo, hay dos desajustes importantes: la nota [a] no preserva la alternativa literal inglesa, porque repite «se humillarán» en vez de reflejar «se afligirán» o equivalente; y «ni el nacido en la tierra ni el forastero...» expresa la última cláusula de forma menos fiel que la construcción inclusiva hebrea («tanto... como...» / «sea... o...»).'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay mejoras de naturalidad y precisión: «en el séptimo mes» suena más natural que «en el mes séptimo»; «ningún trabajo» comunica mejor מְלָאכָה en español contemporáneo que «ninguna obra»; «el nativo» o «el nacido en el país» es más idiomático que «el nacido en la tierra». También conviene corregir la nota [a], cuya redacción actual es errónea y confusa.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones clave concuerdan bastante bien con el POB: «ordenanza permanente» para לְחֻקַּת עוֹלָם es aceptable; «se humillarán» conserva la amplitud de תענו את־נפשתיכם; «forastero que reside entre ustedes» es defendible para הַגֵּר הַגָּר בְּתוֹכְכֶם, aunque «residente foráneo» también sería válido en nota. La principal falta de alineación es que la nota léxica no conserva la alternativa literal documentada por el POB inglés.'
  issues:
  - severity: high
    issue: La nota [a] repite «se humillarán» en lugar de dar la alternativa más literal.
    rationale: El POB inglés documenta explícitamente la alternativa literal «you shall afflict yourselves». La nota española actual no preserva esa información y además resulta internamente contradictoria.
  - severity: medium
    issue: La cláusula final usa «ni... ni...» en vez de una formulación inclusiva directa.
    rationale: El hebreo enumera las dos categorías sujetas al mandamiento, no una negación coordinada independiente. «Tanto el nativo como el forastero...» o «sea el nativo o el forastero...» refleja mejor el alcance legal.
  - severity: medium
    issue: «Ninguna obra» y «nacido en la tierra» suenan menos naturales o precisos en español bíblico actual.
    rationale: «Trabajo» expresa mejor מְלָאכָה en este contexto legal-sabático, y «nativo» es una equivalencia más idiomática para הָאֶזְרָח que «nacido en la tierra».
  - severity: low
    issue: «En el mes séptimo» es menos natural que «en el séptimo mes».
    rationale: Ambas opciones son fieles, pero la segunda fluye mejor en español general sin pérdida de sentido.
  revised_spanish_text: 'Y esto será para ustedes una ordenanza permanente: en el séptimo mes[a], el día diez del mes, se humillarán, y no harán ningún trabajo, tanto el nativo como el forastero que reside[b] entre ustedes.'
  revised_footnotes:
