translation:
  language: es
  text: ¿Le das al caballo su fuerza? ¿Revistes su cuello de crin[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «de trueno», siguiendo una antigua tradición interpretativa de רַעְמָה; aquí se vierte «crin» porque la imagen inmediata es la de revestir el cuello del caballo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִתֵּן
  english_pob_choice: Do you give
  chosen_spanish: ¿Le das
  alternatives_spanish:
  - ¿Puedes darle
  - ¿Le darás
  lexicon: HALOT
  rationale: La pregunta retórica en segunda persona singular se conserva mejor con una forma directa y natural en español. 'Le das' mantiene el desafío implícito sin añadir modalización ajena al hebreo.
- source_word: לַסּוּס
  english_pob_choice: the horse
  chosen_spanish: al caballo
  alternatives_spanish:
  - al caballo
  - a un caballo
  lexicon: HALOT
  rationale: El artículo definido hebreo permite un sustantivo definido en español. 'Al caballo' conserva el valor genérico de la especie en el contexto poético.
- source_word: גְּבוּרָה
  english_pob_choice: strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su fuerza
  - su vigor
  - su poder
  lexicon: HALOT
  rationale: '''Fuerza'' comunica de manera clara la capacidad física del caballo en este contexto. El posesivo ''su'' refleja que la cualidad pertenece al caballo.'
- source_word: הֲתַלְבִּישׁ
  english_pob_choice: Do you clothe
  chosen_spanish: ¿Le vistes
  alternatives_spanish:
  - ¿Le vistes
  - ¿Lo vistes
  - ¿Lo cubres
  lexicon: HALOT
  rationale: El verbo hebreo sugiere 'vestir/clothear'. En español, 'vestir' aplicado al cuello conserva la metáfora de adornar sin volverla demasiado literal.
- source_word: צַוָּארוֹ
  english_pob_choice: its neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - el cuello
  - su cuello
  lexicon: HALOT
  rationale: El español suena más natural con 'el cuello' dentro de la construcción 'vestir el cuello con...'. La referencia al caballo queda clara por el contexto inmediato.
- source_word: רַעְמָה
  english_pob_choice: a mane
  chosen_spanish: una crin
  alternatives_spanish:
  - una crin
  - una melena
  lexicon: HALOT
  rationale: Aunque la POB inglesa prefirió 'mane', en español 'crin' es el equivalente más preciso para el pelo del cuello del caballo. Se evita 'melena' por su uso más amplio y menos técnico.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran acuerdo alto y sin revisiones aplicadas; por eso se mantiene la lectura principal de 'crin' frente a la tradición alternativa 'truenos', explicándola solo en nota.
  spanish_consistency_notes:
  - Se conserva el tono de pregunta retórica en segunda persona singular.
  - Se evita 'SEÑOR' o lenguaje teológico innecesario porque el versículo no contiene el nombre divino.
  - Se elige 'crin' como término zoológico más preciso en español para la imagen del caballo.
