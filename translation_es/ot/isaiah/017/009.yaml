  text: בַּ/יּ֨וֹם הַ/ה֜וּא יִהְי֣וּ עָרֵ֣י מָעֻזּ֗/וֹ כַּ/עֲזוּבַ֤ת הַ/חֹ֨רֶשׁ֙ וְ/הָ֣/אָמִ֔יר אֲשֶׁ֣ר עָזְב֔וּ מִ/פְּנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָיְתָ֖ה שְׁמָמָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/017/009.yaml
  text: In that day his fortified cities will be like the deserted places of the forest and the treetop[a], which they abandoned because of the sons of Israel[b]; and it will be a desolation.
  footnotes:
  - marker: a
    text: Or 'the upper branch' / 'the summit bough.' The Hebrew term refers to the topmost part of a tree.
    reason: lexical_alternative
  - marker: b
    text: Or 'which they abandoned because of the sons of Israel.' The Hebrew expression may indicate retreat from before Israel's presence.
    reason: alternative_reading
