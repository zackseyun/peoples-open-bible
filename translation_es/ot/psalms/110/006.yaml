translation:
  language: es
  text: Él juzgará entre las naciones[a]; las llenará de cadáveres; aplastará la cabeza[d] sobre una vasta tierra[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llenará de cadáveres»; el hebreo es breve y no expresa de manera explícita el objeto de «llenará».
    reason: lexical_alternative
  - marker: b
    text: O «un jefe» o, en sentido más amplio, «cabezas»; el hebreo tiene el singular «cabeza».
    reason: alternative_reading
  - marker: c
    text: O «sobre la tierra vasta» o «sobre una vasta extensión de tierra»; אֶרֶץ puede significar «tierra», «territorio» o «tierra/earth».
    reason: alternative_reading
  - marker: d
    text: O «la cabeza sobre una vasta tierra».
    reason: previous_rendering
lexical_decisions:
- source_word: יָדִין
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - hará juicio
  - ejercerá juicio
  lexicon: HALOT
  rationale: El imperfecto qal 3ms expresa acción futura en este contexto poético. «Juzgará» conserva el sentido judicial sin añadir más de lo que el hebreo dice.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - contra las naciones
  lexicon: HALOT
  rationale: La preposición ב en este marco se entiende naturalmente como «entre», es decir, en medio de las naciones donde ejerce juicio.
- source_word: מָלֵא גְוִיּוֹת
  english_pob_choice: he will fill them with corpses
  chosen_spanish: las llenará de cadáveres
  alternatives_spanish:
  - las llenará de cuerpos
  - las llenará de muertos
  lexicon: HALOT
  rationale: El hebreo es elíptico y no expresa objeto directo explícito. En español se aclara con «las» refiriéndose a las naciones, y «cadáveres» preserva el tono bélico y la fuerza del término.
- source_word: גְוִיּוֹת
  english_pob_choice: corpses
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos muertos
  - cuerpos
  lexicon: HALOT
  rationale: «Cadáveres» comunica de manera directa el estado sin vida y conserva la crudeza del hebreo mejor que opciones más suaves.
- source_word: מָחַץ
  english_pob_choice: he will crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - quebrará
  - triturará
  - golpeará
  lexicon: HALOT
  rationale: El verbo denota un golpe violento que destroza o aplasta. «Aplastará» es natural en español y transmite bien la imagen guerrera.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  - un jefe
  - cabezas
  lexicon: HALOT
  rationale: Se conserva el singular concreto del hebreo sin resolverlo interpretativamente como «jefe» o plural colectivo en el texto principal.
- source_word: עַל אֶרֶץ רַבָּה
  english_pob_choice: over a broad land
  chosen_spanish: sobre una tierra amplia
  alternatives_spanish:
  - sobre una gran tierra
  - sobre la tierra vasta
  - en una tierra amplia
  lexicon: HALOT
  rationale: «Tierra» mantiene la ambigüedad de אֶרֶץ entre territorio y tierra en general; «amplia» reproduce el alcance extenso de רַבָּה sin sobreinterpretar hacia «mundo» o «tierra» en sentido global.
theological_decisions:
- issue: Sentido y alcance de la singular «cabeza»
  english_pob_reading: Retain the singular concrete expression 'the head' without identifying it in translation.
  chosen_spanish_reading: Mantener «la cabeza» sin identificarla como «jefe» en el texto principal.
  alternative_spanish_readings:
  - un jefe
  - las cabezas
  rationale: El hebreo usa el singular concreto, y la traducción no debe resolver la tensión interpretativa. Se preserva la imagen para dejar abierto el alcance teológico y literario del versículo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance de אֶרֶץ
  english_pob_reading: Translate as 'land' rather than 'earth' in the main text.
  chosen_spanish_reading: Traducir como «tierra» en el texto principal.
  alternative_spanish_readings:
  - tierra
  - mundo
  - la tierra
  rationale: אֶרֶץ puede significar territorio o tierra en sentido amplio. «Tierra» evita decidir prematuramente entre territorio local o extensión global.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que favorece mantener la estructura verbal explícita («llenará») y conservar la relación de עַל con una formulación preposicional natural en español. También se preservó la tensión interpretativa del singular «cabeza» y de אֶרֶץ sin resolverla en exceso.
  spanish_consistency_notes:
  - Se usó «Yahvé» como estándar del proyecto no porque aparezca explícitamente en este versículo, sino como pauta general para pasajes con el nombre divino; aquí no corresponde insertar un equivalente divino ausente en el hebreo.
  - Se mantuvo el tono bélico del verso con «cadáveres» y «aplastará», evitando suavizar la violencia del texto.
  - Las notas a pie están ancladas directamente en el texto con [a], [b] y [c], y cada marcador aparece exactamente una vez en la traducción.
