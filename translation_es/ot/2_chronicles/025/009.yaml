translation:
  language: es
  text: 'Amasías dijo al hombre de Dios[a]: «Pero, ¿qué se hará con los cien talentos que he dado a la tropa de Israel?» El hombre de Dios respondió[b]: «Yahvé puede darte mucho más que esto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cien talentos»; el versículo anterior especifica que eran talentos de plata.'
    reason: cross_reference
  - marker: b
    text: 'O: «Yahvé tiene suficiente para darte mucho más que esto». La expresión hebrea enfatiza la capacidad de Yahvé para proveer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el enviado de Dios
  lexicon: HALOT
  rationale: Conservo el título hebreo básico sin especificar el oficio más de lo que el texto lo hace. «El hombre de Dios» reproduce la forma léxica y mantiene la amplitud funcional que el POB documenta para este sintagma.
- source_word: וּמַה לַּעֲשׂוֹת
  english_pob_choice: But what should be done
  chosen_spanish: Pero, ¿qué se hará
  alternatives_spanish:
  - ¿Y qué haremos?
  - Pero, ¿qué hay que hacer?
  lexicon: HALOT
  rationale: La pregunta expresa qué acción debe tomarse respecto de una situación ya planteada. «¿Qué se hará» mantiene el valor interrogativo e impersonal sin introducir sujeto que el hebreo no explicita.
- source_word: מְאַת הַכִּכָּר
  english_pob_choice: the hundred talents
  chosen_spanish: los cien talentos
  alternatives_spanish:
  - los cien talentos de plata
  - los cien medidas
  lexicon: HALOT
  rationale: כִּכָּר se refleja naturalmente como «talentos», una unidad de peso. Sigo el POB al no añadir «de plata» en este versículo, porque eso pertenece al contexto inmediato anterior y no está en la forma presente del texto.
- source_word: גְדוּד יִשְׂרָאֵל
  english_pob_choice: the troops of Israel
  chosen_spanish: la tropa de Israel
  alternatives_spanish:
  - las tropas de Israel
  - la banda de Israel
  lexicon: HALOT
  rationale: גְדוּד designa una unidad o fuerza militar. «La tropa de Israel» conserva el singular colectivo que el hebreo permite y evita forzar una lectura más específica que «ejército» o «banda».
- source_word: יֵשׁ לַיהוָה לָתֶת לְךָ
  english_pob_choice: Yahweh is able to give you
  chosen_spanish: Yahvé puede darte
  alternatives_spanish:
  - Yahvé tiene para darte
  - Yahvé es capaz de darte
  lexicon: HALOT
  rationale: La construcción hebrea comunica capacidad o disponibilidad para dar. «Puede darte» transmite esa fuerza de posibilidad/capacidad de forma natural en español y conserva la amplitud semántica del original.
- source_word: הַרְבֵּה מִזֶּה
  english_pob_choice: much more than this
  chosen_spanish: mucho más que esto
  alternatives_spanish:
  - muchísimo más que esto
  - mucho más de esto
  lexicon: HALOT
  rationale: «Mucho más que esto» expresa la comparación de abundancia sin exagerar ni reinterpretar el alcance del hebreo. Mantiene el matiz de excedencia que el POB documenta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el Tetragrama: «Yahvé». Así se preserva el nombre divino propio en lugar de una sustitución titular, coherente con la práctica POB documentada.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrama directamente. La forma española del proyecto es «Yahvé», que preserva el nombre propio divino y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La respuesta divina como capacidad, no como simple posesión
  english_pob_reading: The LORD is able to give you much more than this.
  chosen_spanish_reading: Yahvé puede darte mucho más que esto.
  alternative_spanish_readings:
  - Yahvé tiene para darte mucho más que esto.
  - Yahvé es capaz de darte mucho más que esto.
  rationale: La expresión hebrea subraya la capacidad de dar. «Puede darte» mantiene esa idea de suficiencia/capacidad sin reducirla a una afirmación meramente cuantitativa.
  doctrine_reference: HALOT, construcción existencial con יֵשׁ + לָתֶת
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado auditado del POB en inglés: mantiene «man of God» como título, conserva «talentos» sin importar «plata» desde el versículo previo, y reproduce la afirmación divina como capacidad de dar. No se detectaron cambios necesarios respecto del análisis de revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה según el estándar del proyecto.
  - Se mantiene el título «el hombre de Dios» en vez de «profeta» para no sobreespecificar.
  - «Tropa» se eligió como singular colectivo para גְדוּד, en armonía con el uso militar del contexto.
  - La puntuación y la apertura/cierre de comillas siguen convención española moderna y lectura pública clara.
