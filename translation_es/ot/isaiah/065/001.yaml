translation:
  language: es
  text: 'Me dejé buscar por los que no preguntaban[a]; me dejé encontrar por los que no me buscaban. Dije: «Heme aquí[b], heme aquí», a una nación que no invocaba mi nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «fui buscado ... fui hallado». Las formas nifal hebreas pueden leerse como pasivos simples, aunque el contexto sugiere la auto-manifestación de Dios a quienes no lo buscaban.'
    reason: lexical_alternative
  - marker: b
    text: Pablo cita este versículo en Romanos 10:20 con referencia a los gentiles; por eso «nación» aquí puede entenderse en ese sentido más amplio dentro del canon.
    reason: cross_reference
lexical_decisions:
- source_word: נִדְרַשְׁתִּי
  english_pob_choice: I let myself be sought
  chosen_spanish: me dejé buscar
  alternatives_spanish:
  - fui buscado
  - me permití ser buscado
  - me dejé consultar
  lexicon: HALOT
  rationale: El verbo hebreo en nifal admite un valor pasivo simple, pero el contexto enfatiza la disponibilidad o auto-manifestación de Dios. «Me dejé buscar» conserva esa tensión entre pasivo y reflexivo de modo natural en español, sin borrar el matiz teológico.
- source_word: לְלֹא שָׁאָלוּ
  english_pob_choice: by those who did not ask
  chosen_spanish: por los que no preguntaban
  alternatives_spanish:
  - a los que no preguntaban
  - por los que no inquirían
  lexicon: HALOT
  rationale: La idea básica de שאל aquí es «preguntar / pedir / inquirir». «Preguntaban» es más natural en español contemporáneo y comunica bien la ausencia de búsqueda o petición; el complemento con «por» mantiene la relación con el pasivo/reflexivo anterior.
- source_word: נִמְצֵאתִי
  english_pob_choice: I let myself be found
  chosen_spanish: me dejé encontrar
  alternatives_spanish:
  - fui encontrado
  - me hice encontrar
  lexicon: HALOT
  rationale: Se preserva el paralelismo con el primer verbo y el mismo matiz de auto-disponibilidad divina. «Me dejé encontrar» suena natural en español y evita endurecer el nifal como mero pasivo cuando el contexto sugiere una acción de revelación.
- source_word: לְלֹא בִקְשֻׁנִי
  english_pob_choice: by those who did not seek me
  chosen_spanish: por los que no me buscaban
  alternatives_spanish:
  - a los que no me buscaban
  - por los que no me procuraban
  lexicon: HALOT
  rationale: בקשׁ se traduce de forma directa como «buscar». El imperfecto en español mantiene la idea de una acción no realizada; «me buscaban» conserva el objeto pronominal y la relación con el sujeto implícito.
- source_word: הִנֵּנִי הִנֵּנִי
  english_pob_choice: Here I am, here I am
  chosen_spanish: Heme aquí, heme aquí
  alternatives_spanish:
  - Aquí estoy, aquí estoy
  - Estoy aquí, estoy aquí
  lexicon: HALOT
  rationale: Se conserva la repetición enfática. «Heme aquí» es una fórmula tradicional pero clara y suficientemente fiel al valor de disponibilidad inmediata del hebreo, sin convertirla en una paráfrasis explicativa.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma simple con «a» en español, que resulta natural antes del sustantivo de destino relacional.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gentilidad
  lexicon: HALOT
  rationale: «Nación» conserva el valor léxico básico de גוי sin resolver anticipadamente la carga intertextual hacia los gentiles. En español, además, funciona bien con la construcción relativa que sigue.
- source_word: לֹא קֹרָא בִשְׁמִי
  english_pob_choice: that did not call on my name
  chosen_spanish: que no invocaba mi nombre
  alternatives_spanish:
  - que no llamaba a mi nombre
  - que no llamaba por mi nombre
  - que no era llamado por mi nombre
  lexicon: HALOT
  rationale: קרא con ב + שם suele expresar invocar o llamar sobre/por el nombre. «Invocaba mi nombre» preserva el sentido cultual y relacional del hebreo mejor que una simple «llamaba», que en español puede sonar demasiado general.
theological_decisions:
- issue: Cómo reflejar el matiz del nifal en los dos primeros verbos
  english_pob_reading: The English POB preserves the tension with 'I let myself be sought / found,' while noting that simple passives are possible.
  chosen_spanish_reading: «Me dejé buscar / me dejé encontrar»
  alternative_spanish_readings:
  - «fui buscado / fui encontrado»
  - «me hice buscar / me hice encontrar»
  rationale: La forma elegida mantiene abierta la posibilidad de lectura pasiva y, al mismo tiempo, expresa la iniciativa de revelación divina que el contexto sugiere. No resuelve la tensión reduciéndola a un mero pasivo, ni la amplía innecesariamente con una paráfrasis causal.
  doctrine_reference: Isaías 65:1; Romanos 10:20; política de equivalencia óptima
- issue: Alcance de גוי y la conexión paulina
  english_pob_reading: Render 'nation' in the main text and note the Gentile-oriented canonical use in Romans 10:20.
  chosen_spanish_reading: «nación» en el texto principal, con nota sobre la aplicación de Pablo a los gentiles.
  alternative_spanish_readings:
  - «gentiles»
  - «pueblo»
  rationale: El hebreo dice literalmente «nación». Traducir directamente «gentiles» resolvería demasiado pronto el sentido; mantener «nación» respeta el dato lexical y deja la lectura canónica para la nota.
  doctrine_reference: Romanos 10:20; Isaías 65:1; principio de tensión textual/canónica
- issue: Sentido de «invocar mi nombre»
  english_pob_reading: '''that did not call on my name'' keeps the active relation to God rather than a passive label.'
  chosen_spanish_reading: «que no invocaba mi nombre»
  alternative_spanish_readings:
  - «que no llamaba mi nombre»
  - «que no era llamado por mi nombre»
  rationale: La construcción hebrea con ב + שם aquí apunta a la acción del sujeto hacia Dios. «Invocar» en español conserva el carácter religioso y relacional, evitando confundirlo con una designación nominal pasiva.
  doctrine_reference: HALOT על קרא + שם; Isaías 65:1
translation_notes:
  revision_awareness: Se revisó el pasaje reciente del expediente y se mantuvo sin cambios sustantivos; la opción española sigue de cerca la solución auditada en inglés, conservando la tensión nifal pasivo/reflexiva y la nota canónica sobre Romanos 10:20.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparece el nombre divino en otros contextos del proyecto; aquí no aparece explícitamente el tetragrámaton en el hebreo del versículo.
  - «Heme aquí» se usa de forma consistente para הִנֵּנִי en registros bíblicos de disponibilidad enfática.
  - «Nación» se conserva como equivalente principal de גוי, reservando «gentiles» para la nota interpretativa.
  - «Invocar mi nombre» refleja el valor cultual-relacional de קרא בְּשֵׁם sin desplazarlo a una fórmula menos precisa.
