source:
  edition: WLC
  text: אַלּוֹנִים֙ מִ/בָּ֔שָׁן עָשׂ֖וּ מִשּׁוֹטָ֑יִ/ךְ קַרְשֵׁ֤/ךְ עָֽשׂוּ שֵׁן֙ בַּת אֲשֻׁרִ֔ים מֵ/אִיֵּ֖י כתים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/027/006.yaml
  text: They made your oars of oaks from Bashan[c][b][a]; they made your deck of ivory from the coasts of Kittim.
  footnotes:
  - marker: a
    text: Or 'they made your planks/boards of ivory.' The Hebrew term may refer more specifically to the ship's planking than to its deck.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''ivory, daughter of Ashurim.'' Many understand this to refer to ivory inlaid in cypress or boxwood from Kittim.'
    reason: alternative_reading
  - marker: c
    text: '''Kittim'' likely refers to Cyprus or nearby western maritime regions.'
    reason: cultural_note
  ai_draft:
