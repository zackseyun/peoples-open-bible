translation:
  language: es
  text: Si no recogiste[a] en tu juventud, ¿cómo hallarías en tu vejez?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo griego aquí es textualmente difícil en este testimonio; la traducción sigue el sentido probable: «recoger» o «reunir».'
    reason: textual_variant
lexical_decisions:
- source_word: ἐν νεότητι
  english_pob_choice: in your youth
  chosen_spanish: en tu juventud
  alternatives_spanish:
  - cuando eras joven
  - siendo joven
  lexicon: LSJ
  rationale: Expresa de manera natural la etapa de la vida señalada por el griego, conservando el paralelismo con 'en tu vejez'.
- source_word: οὐ συναγίοχας
  english_pob_choice: you did not gather
  chosen_spanish: no recogiste
  alternatives_spanish:
  - no juntaste
  - no acumulaste
  lexicon: LSJ
  rationale: 'El verbo transmitido es inusual y el sentido probable pertenece a la familia de συνάγω: reunir o recoger. ''Recogiste'' es un equivalente natural en español que mantiene la imagen de reunir algo sin precisar innecesariamente el objeto.'
- source_word: πῶς ἂν εὕροις
  english_pob_choice: how then would you find
  chosen_spanish: ¿cómo encontrarás algo?
  alternatives_spanish:
  - ¿cómo podrías encontrar?
  - ¿cómo hallarías entonces?
  lexicon: LSJ
  rationale: La pregunta potencial se vierte con futuro de posibilidad en español para conservar el valor retórico y la consecuencia implícita. 'Algo' reproduce la elipsis del griego sin añadir un objeto específico.
- source_word: ἐν τῷ γήρᾳ σου
  english_pob_choice: in your old age
  chosen_spanish: en tu vejez
  alternatives_spanish:
  - cuando seas viejo
  - en tus años de vejez
  lexicon: LSJ
  rationale: '''Vejez'' es el término natural y directo para γῆρας, y mantiene el contraste temporal con ''juventud''.'
theological_decisions:
- issue: Objeto implícito del verbo de reunir/encontrar
  english_pob_reading: Leave the object of 'gather/find' implicit rather than supplying 'wisdom,' 'wealth,' or 'provisions.'
  chosen_spanish_reading: Dejar implícito el objeto de 'recoger/encontrar' sin suplir 'sabiduría', 'riqueza' ni 'provisiones'.
  alternative_spanish_readings:
  - Suplir 'sabiduría' desde el contexto cercano
  - Suplir 'provisiones' desde un sentido proverbial material
  rationale: El griego no expresa ningún objeto. Mantener la elipsis evita imponer una lectura más estrecha que la del texto y preserva la fuerza proverbial de la pregunta.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tratamiento de la forma verbal poco común συναγίοχας
  english_pob_reading: Translate the probable sense 'gather' while documenting the textual/lexical uncertainty in a footnote.
  chosen_spanish_reading: Traducir el sentido probable 'recoger' y señalar en nota la dificultad textual/lexical.
  alternative_spanish_readings:
  - juntar
  - acumular
  rationale: La forma griega es extraña y el testimonio está marcado con discrepancia mayor. Una nota permite transparentar la incertidumbre sin ocultar el sentido probable.
  doctrine_reference: 'PHILOSOPHY.md: preserve source uncertainty honestly'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; se mantiene la lectura de equivalencia óptima con el mismo manejo cauteloso de la forma verbal inusual.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'en tu juventud' / 'en tu vejez'.
  - Se conservó la elipsis del objeto, como en el inglés auditado y en el griego.
  - El marcador de nota [a] aparece en el verbo principal para transparentar la dificultad textual.
