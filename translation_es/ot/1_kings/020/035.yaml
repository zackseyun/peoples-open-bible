translation:
  language: es
  text: 'Ahora un hombre de entre los hijos de los profetas dijo por la palabra de Yahvé[b] a su compañero[a]: «Por favor, golpéame». Pero el hombre se negó a golpearlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de la compañía de los profetas” o “de los discípulos de los profetas”. La expresión hebrea dice literalmente “hijos de los profetas”, una fórmula común para un grupo profético.
    reason: lexical_alternative
  - marker: b
    text: O “por palabra de Yahvé” o “por mandato de Yahvé”. La frase hebrea puede expresar autorización o mandato divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ אֶחָד
  english_pob_choice: Now a certain man
  chosen_spanish: Ahora un hombre
  alternatives_spanish:
  - Y un hombre
  - Un hombre cierto
  lexicon: HALOT
  rationale: La construcción narrativa introduce a un individuo sin necesidad de recargar el español con un calco de "one". "Ahora" refleja el וְ inicial como avance narrativo, y "un hombre" mantiene la presentación indefinida y natural.
- source_word: מִבְּנֵי הַנְּבִיאִים
  english_pob_choice: from the sons of the prophets
  chosen_spanish: de entre los hijos de los profetas
  alternatives_spanish:
  - de entre la compañía de los profetas
  - de entre los discípulos de los profetas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal "hijos de los profetas" para mantener transparencia textual, tal como hace la POB inglesa, sin resolver de antemano la naturaleza del grupo.
- source_word: רֵעֵהוּ
  english_pob_choice: his companion
  chosen_spanish: su compañero
  alternatives_spanish:
  - su amigo
  - su colega
  lexicon: HALOT
  rationale: '"Compañero" transmite adecuadamente la relación contextual sin imponer una cercanía afectiva más fuerte que la que exige el hebreo.'
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la orden de Yahvé
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: '"Por la palabra de Yahvé" preserva el giro idiomático de autorización profética y sigue la convención del proyecto para יְהוָה como "Yahvé".'
- source_word: הַכֵּינִי נָא
  english_pob_choice: Please strike me
  chosen_spanish: Por favor, hiéreme
  alternatives_spanish:
  - Por favor, golpéame
  - Te ruego que me hieras
  lexicon: HALOT
  rationale: '"Herir"/"hiere" mantiene la fuerza de נכה y funciona bien en español bíblico contemporáneo. "Por favor" representa נָא de manera clara y natural; "golpear" sería más general y menos preciso en este contexto.'
- source_word: וַיְמָאֵן
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - se rehusó
  lexicon: HALOT
  rationale: '"Se negó" expresa con claridad la negativa voluntaria del verbo sin sonar artificial en español moderno. Conserva la fuerza narrativa de la negativa.'
- source_word: לְהַכֹּתוֹ
  english_pob_choice: to strike him
  chosen_spanish: a herirlo
  alternatives_spanish:
  - a golpearlo
  - a pegarle
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica de הכה con una forma natural en español. "Herirlo" enlaza con "hiéreme" y evita suavizar el acto con un simple "golpear".
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: "Yahvé" en el texto principal, en lugar de sustituirlo por "SEÑOR". Esto preserva el nombre personal de Dios revelado en el pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión de autorización profética בִּדְבַר יְהוָה
  english_pob_reading: by the word of Yahweh
  chosen_spanish_reading: por la palabra de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - por la orden de Yahvé
  rationale: La frase conserva el doble valor posible de palabra/mandato sin forzar una paráfrasis. En este contexto la autorización viene a través de la palabra divina pronunciada por el profeta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas al texto con [a] y [b] en los lugares correspondientes, y se mantuvo la lectura fuente-base sin añadir glosas no sustentadas.
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió "herir"/"hiere" para mantener cohesión léxica con נכה en ambos miembros de la oración.
  - '"Hijos de los profetas" se conserva como expresión transparente, con alternativa explicativa en nota.'
