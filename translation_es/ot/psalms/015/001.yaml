translation:
  language: es
  text: Salmo de David[a]. Yahvé[b], ¿quién podrá morar en tu tienda? ¿Quién podrá habitar en tu santo monte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo «de David» puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «tienda»; el hebreo dice literalmente «tienda», con posible resonancia del santuario como lugar de la presencia de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Poema
  lexicon: HALOT
  rationale: En la forma de encabezado poético, ‘salmo’ es el equivalente natural y preciso en español; conserva el género literario sin añadir interpretación.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: ‘De David’ mantiene la ambigüedad del hebreo ל, que puede indicar autoría, asociación o dedicación, sin resolverla indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como ‘Yahvé’ según el criterio doctrinal del proyecto; se evita sustituir el nombre por un título y se conserva el nombre propio del pacto.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿qué persona?
  lexicon: HALOT
  rationale: La interrogación en español se expresa naturalmente con ‘¿quién’, que corresponde al valor personal de la pregunta ética del verso.
- source_word: יָגוּר
  english_pob_choice: may sojourn
  chosen_spanish: podrá morar
  alternatives_spanish:
  - podrá sojornar
  - podrá residir
  - podrá alojarse
  lexicon: HALOT
  rationale: El verbo hebreo sugiere habitar como residente/huésped. En español, ‘morar’ comunica una residencia reverente y literaria; ‘sojornar’ sería más técnico, pero menos natural en lectura pública. Se conserva la tensión entre estancia y permanencia sin reducirla a una simple visita.
- source_word: בְּאָהֳלֶךָ
  english_pob_choice: in your tent
  chosen_spanish: en tu tienda
  alternatives_spanish:
  - en tu tabernáculo
  - en tu tienda de campaña
  lexicon: HALOT
  rationale: ‘Tienda’ refleja el sentido básico de אֹהֶל y evita imponer la terminología eclesiástica de ‘tabernáculo’; en español bíblico, también puede evocar el lugar de la presencia divina.
- source_word: יִשְׁכֹּן
  english_pob_choice: may dwell
  chosen_spanish: podrá habitar
  alternatives_spanish:
  - podrá morar
  - podrá establecerse
  lexicon: HALOT
  rationale: ‘Habitar’ traduce bien שׁכן y permite un paralelismo natural con ‘morar’, manteniendo el contraste poético del hebreo.
- source_word: בְּהַר קָדְשֶׁךָ
  english_pob_choice: on your holy mountain
  chosen_spanish: en tu santo monte
  alternatives_spanish:
  - sobre tu monte santo
  - en tu montaña santa
  lexicon: HALOT
  rationale: ‘Santo monte’ conserva el orden y la concentración del sintagma hebreo, y ‘monte’ mantiene el valor de הַר sin rebajarlo a ‘colina’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se preserva el nombre personal divino en transliteración, de acuerdo con la política del proyecto y con el valor del texto hebreo; no se sustituye por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad de לְדָוִד
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo permite más de una relación semántica. ‘De David’ mantiene la tensión documental sin fijar autoría exclusiva ni finalismo devocional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather than resolve it'
- issue: Matiz de יָגוּר / יִשְׁכֹּן
  english_pob_reading: may sojourn / may dwell
  chosen_spanish_reading: podrá morar / podrá habitar
  alternative_spanish_readings:
  - podrá sojornar / podrá establecerse
  - podrá residir / podrá morar
  rationale: Se conserva la distinción funcional entre una estancia de huésped y una residencia estable, aunque en español la pareja ‘morar/habitar’ comunica mejor el paralelismo y la dignidad poética.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, source-language nuance before stylistic smoothing'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no requirió cambios; esta propuesta mantiene la misma segmentación y decisiones principales del audit trail inglés, adaptándolas al español con equivalencia óptima y sin perder la ambigüedad documentada del encabezado ni la imaginería concreta de la ‘tienda’ y el ‘santo monte’.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología base del proyecto.
  - Se conserva la ambigüedad de לְדָוִד con «de David» y su nota alternativa.
  - «Tienda» se elige para בְּאָהֳלֶךָ y se evita «tabernáculo» en el texto principal para no introducir terminología no exigida por el hebreo.
  - La pareja «morar/habitar» mantiene un paralelismo natural en español y reproduce la diferencia semántica general entre sojourn/dwell sin forzar un tecnicismo.
  - La puntuación reproduce una lectura poética clara para uso litúrgico o devocional en español.
