translation:
  language: es
  text: 'Y en el séptimo día: siete toros, dos carneros y catorce corderos de un año, sin defecto[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin mancha». El hebreo indica integridad sacrificial o ausencia de defecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y el ... día
  - En el ... día
  lexicon: HALOT
  rationale: La secuencia introductoria enlaza este versículo con los anteriores del calendario sacrificial. «Y en el séptimo día» conserva ese encadenamiento, con una preposición natural en español.
- source_word: הַשְּׁבִיעִי
  english_pob_choice: seventh
  chosen_spanish: séptimo
  alternatives_spanish:
  - sétimo
  lexicon: HALOT
  rationale: Ordinal directo y normal en español para modificar «día».
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  - toros jóvenes
  lexicon: HALOT
  rationale: En listas sacrificiales, el hebreo פָּרִים nombra ganado macho adulto ofrecido en sacrificio. «Toros» mantiene la fuerza zoológica y cultual; «novillos» añadiría una matización de edad no explicitada aquí.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - moruecos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español estándar de אַיִל en contextos sacrificiales.
- source_word: כְּבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos machos
  - borregos
  lexicon: HALOT
  rationale: El término designa corderos para sacrificio; «corderos» es natural y suficientemente preciso en español. No se explicita el sexo porque el hebreo no lo marca aquí de forma independiente.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: one-year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  - de un año de edad
  lexicon: HALOT
  rationale: La expresión hebrea idiomática literalmente «hijos de un año» indica animales de un año. «De un año» es breve, claro y fiel; evita la rigidez de un calco literal.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - catorce en número
  lexicon: HALOT
  rationale: Número cardinal directo sin necesidad de ampliación.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - sin imperfección
  lexicon: HALOT
  rationale: El término sacrificial תָּמִים / תְּמִימִים expresa integridad y ausencia de defecto. «Sin defecto» conserva el sentido cultual de manera clara y idiomática en español; «sin mancha» sería posible, pero menos literal en este contexto.
theological_decisions:
- issue: Integridad sacrificial de los animales
  english_pob_reading: without blemish
  chosen_spanish_reading: sin defecto
  alternative_spanish_readings:
  - sin mancha
  - perfectos
  rationale: El hebreo describe animales aptos para sacrificio por su ausencia de defecto físico o ritual. «Sin defecto» evita sobrecargar el texto con una noción moral de «perfección» y mantiene el valor cultual.
  doctrine_reference: Levítico 22:20-21; Deuteronomio 17:1
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto base y no requiere revisiones respecto de la auditoría inglesa; se mantiene la misma decisión léxica central para תְּמִימִם con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo o un equivalente lo exijan; aquí no aparece el Tetragrámaton.
  - 'Se usa terminología sacrificial consistente con el resto de la sección: «toros», «carneros», «corderos», «sin defecto».'
  - Se evita introducir precisiones de edad o sexo no expresadas explícitamente por el hebreo en este versículo.
