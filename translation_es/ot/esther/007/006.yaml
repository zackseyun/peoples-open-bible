translation:
  language: es
  text: 'Y Ester dijo[a]: «¡Un adversario y un enemigo: este malvado Amán!» Y Amán quedó aterrorizado ante el rey y la reina.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Un hombre, un adversario y un enemigo: este malvado Amán». El hebreo es abrupto y elíptico, lo que intensifica la acusación de Ester.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶסְתֵּר / Esther
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: N/A (nombre propio)
  rationale: Se mantiene el nombre propio bíblico en su forma usual en español, 'Ester', sin añadir adaptación innecesaria. Es transparente y ampliamente reconocible en contexto bíblico.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: HALOT
  rationale: El hebreo introduce de manera abrupta un sustantivo común ('hombre'), y la POB inglesa preserva esa brusquedad con una alternativa más formal. En español, 'un hombre' conserva mejor la fuerza nominativa que 'persona' y no diluye el golpe acusatorio.
- source_word: צַר
  english_pob_choice: foe
  chosen_spanish: adversario
  alternatives_spanish:
  - enemigo
  - opositor
  - hostil
  lexicon: HALOT
  rationale: '''צַר'' expresa hostilidad/oposición activa. ''Adversario'' funciona bien en español para mantener un término distinto de ''enemigo'', preservando la duplicación semántica del hebreo.'
- source_word: וְאוֹיֵב
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - foe
  lexicon: HALOT
  rationale: '''אוֹיֵב'' es el término directo para enemigo. Se conserva como palabra distinta de ''adversario'' para no aplanar la acusación doble del original.'
- source_word: הָמָ֥ן הָ/רָ֖ע הַ/זֶּ֑ה
  english_pob_choice: this evil Haman
  chosen_spanish: este malvado Amán
  alternatives_spanish:
  - este impío Amán
  - este perverso Amán
  - Amán, este malvado
  lexicon: HALOT
  rationale: La construcción hebrea es appositiva y enfática. 'Este malvado Amán' conserva la cercanía demostrativa y la condena moral, manteniendo la tensión del original sin sobreadornar el sintagma.
- source_word: נִבְעַת
  english_pob_choice: was terrified
  chosen_spanish: quedó aterrorizado
  alternatives_spanish:
  - se aterrorizó
  - estuvo aterrorizado
  - se llenó de terror
  lexicon: HALOT
  rationale: El nifal expresa haber sido sobrecogido repentinamente por terror. 'Quedó aterrorizado' comunica bien el impacto súbito y mantiene la intensidad del verbo hebreo.
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La expresión idiomática indica estar en la presencia de. 'Delante de' es natural en español narrativo y conserva el valor espacial/relacional del hebreo.
- source_word: הַמֶּלֶךְ וְהַמַּלְכָּה
  english_pob_choice: the king and the queen
  chosen_spanish: el rey y de la reina
  alternatives_spanish:
  - el rey y la reina
  - ante el rey y la reina
  lexicon: HALOT
  rationale: Se conserva la coordinación de la pareja real. La repetición de 'de' en 'delante de' + 'de la reina' evita un giro pesado y mantiene la relación con la presencia ante ambos.
theological_decisions:
- issue: La fuerza de la acusación doble en hebreo (צַר / אוֹיֵב)
  english_pob_reading: A foe and an enemy
  chosen_spanish_reading: Un adversario y un enemigo
  alternative_spanish_readings:
  - Un enemigo y un adversario
  - Un adversario y un opositor
  rationale: No se fusionan los dos términos en una sola idea. El hebreo acumula dos sustantivos de hostilidad para intensificar la acusación de Ester; la traducción conserva esa duplicación con dos equivalentes distintos en español.
  doctrine_reference: 'Principio de equivalencia formal/semántica: conservar repeticiones y paralelismos del texto fuente cuando portan énfasis retórico.'
- issue: La lectura abrupta y eliptica del hebreo en la acusación de Ester
  english_pob_reading: The Hebrew is abrupt and elliptical, heightening Esther's accusation.
  chosen_spanish_reading: La hebrea es abrupta y elíptica, lo cual intensifica la acusación de Ester.
  alternative_spanish_readings:
  - El hebreo es más formal y completo
  - El hebreo presenta una frase corta y contundente
  rationale: Se deja ver en la puntuación y en la brevedad de la frase que el original no desarrolla una oración plenamente explicativa. Esto evita suavizar la violencia retórica del momento.
  doctrine_reference: Atención al valor retórico y sintáctico del original, no solo al contenido proposicional.
translation_notes:
  revision_awareness: Se siguió la revisión del inglés POB que prefirió 'A foe and an enemy' sobre una formulación con 'hostile', para conservar mejor la doble acusación de איש צר ואויב. También se mantuvo la observación auditada de que el hebreo es abrupto y elíptico, por lo que la sintaxis española evita explicitar demasiado la frase.
  spanish_consistency_notes:
  - Se usa 'Ester' como nombre propio bíblico estándar en español.
  - Se mantiene 'Amán' con tilde en la forma española habitual.
  - 'Se preserva la duplicación hostil del hebreo con dos términos distintos: ''adversario'' y ''enemigo''.'
  - 'Se evita traducir el participio como simple adjetivo para conservar el impacto narrativo: ''quedó aterrorizado''.'
