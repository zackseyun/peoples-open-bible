translation:
  language: es
  text: Y su red[a] llegará a ser para ti un refugio de fuerza,[b] y sus cordones, vestiduras de oro fino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «sus cadenas serán para ti un abrigo de fuerza, y sus ramas, una vestidura de gloria». Esto difiere notablemente del hebreo conservado, que dice «su red ... sus cordones ... vestiduras de oro fino».'
    reason: alternative_reading
  - marker: b
    text: La imaginería hebrea presenta lo que al principio parece restrictivo como algo que finalmente resulta protector y honorable.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיְתָה לְךָ
  english_pob_choice: will become for you
  chosen_spanish: se te convertirá
  alternatives_spanish:
  - será para ti
  - te llegará a ser
  lexicon: BHSA / HALOT
  rationale: 'La construcción expresa resultado y transformación: algo que al principio parece restrictivo llega a ser provechoso. «Se te convertirá» comunica bien ese cambio sin perder el matiz de destino.'
- source_word: רִשְׁתָּהּ / αἱ πέδαι
  english_pob_choice: its net
  chosen_spanish: '[n]'
  alternatives_spanish:
  - su red
  - sus lazos
  - sus cadenas
  lexicon: HALOT / LXX παράλληλο
  rationale: El hebreo trae «red», mientras que el griego paralelo lee «fetters/cadenas». Para reflejar la tensión textual sin borrar la diferencia, se deja una marca en el texto y se explica en nota; la elección principal mantiene la imagen de red del hebreo con una formulación española natural en contexto.
- source_word: מְכוֹן עֹז / σκέπην ἰσχύος
  english_pob_choice: a strong refuge
  chosen_spanish: refugio de fuerza
  alternatives_spanish:
  - refugio fuerte
  - amparo de fuerza
  - fortaleza segura
  lexicon: HALOT
  rationale: «מְכוֹן» sugiere un lugar establecido o asiento, y con «עֹז» apunta a seguridad/fuerza. «Refugio de fuerza» conserva el valor protector y la densidad nominal del hebreo, sin imponer una expresión más interpretativa que el original.
- source_word: חַבְלֹתֶיהָ / οἱ κλάδοι αὐτῆς
  english_pob_choice: its cords
  chosen_spanish: sus cordones
  alternatives_spanish:
  - sus cuerdas
  - sus ligaduras
  - sus lazos
  lexicon: HALOT
  rationale: «חבל» puede ser cuerda, cordón o banda. «Cordones» preserva la imagen del tejido/red y permite un paralelo fluido con el primer miembro.
- source_word: בִּגְדֵי כָתֶם / στολὴν δόξης
  english_pob_choice: garments of fine gold
  chosen_spanish: vestiduras de oro fino
  alternatives_spanish:
  - ropas de oro fino
  - vestidos de oro puro
  - manto de gloria
  lexicon: HALOT
  rationale: El hebreo habla de vestiduras/garments y de «כתם», oro fino o selecto. «Vestiduras de oro fino» mantiene la imagen elevada del hebreo y, al mismo tiempo, es suficientemente natural y digna en español.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en un pasaje con imaginería divergente
  english_pob_reading: Translate the extant Hebrew as primary, while preserving the Greek alternative imagery in a footnote.
  chosen_spanish_reading: Traducir el hebreo como base principal y señalar en nota la lectura griega alternativa («cadenas/fetters», «shelter of strength», «robe of glory»).
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «cadenas ... abrigo de fuerza ... manto de gloria»'
  - Fusionar ambas tradiciones en una sola redacción
  rationale: En Sirácides, cuando el hebreo está disponible y es sólido, se toma como texto base. Aquí el griego no solo varía en léxico sino también en imagen; por eso la solución más transparente es seguir el hebreo en el texto principal y documentar la alternativa griega en nota, sin borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek parallel as actual input/consistency check.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y el análisis de acuerdo de fuentes indica alta concordancia global, sin cambios aplicados en la última pasada; por eso la redacción española sigue de cerca el hebreo atestiguado, mientras registra la alternativa griega en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando el contexto lo requiera, pero aquí no aparece el nombre divino.
  - «Refugio de fuerza» conserva la densidad nominal del hebreo y evita suavizarlo a una paráfrasis más genérica.
  - La nota distingue claramente la lectura hebrea y la griega para que el lector vea la tensión textual sin confusión.
