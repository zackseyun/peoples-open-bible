    rationale: 'La nota inglesa documenta una alternativa sobre la segunda mitad: ''he who is devious in his ways''. La nota española actual sobre ''anda/camina'' es posible, pero menos necesaria y no conserva la alternativa fuente más significativa.'
  revised_spanish_text: El que anda en integridad teme a Yahvé, pero aquel cuyos caminos son torcidos[a] lo desprecia[b].
