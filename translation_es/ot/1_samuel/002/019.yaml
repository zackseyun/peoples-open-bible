revisions:
- from: Y su madre le hacía una túnica pequeña y se la llevaba de año en año[a][b], cuando subía con su marido para ofrecer el sacrificio anual.
  to: Y su madre le hacía un manto pequeño[a] y se lo llevaba de año en año[b], cuando subía con su marido para ofrecer el sacrificio anual.
