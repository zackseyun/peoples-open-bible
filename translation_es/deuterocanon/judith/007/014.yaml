translation:
  language: es
  text: Y acamparemos contra ellos de guardia[a], para que no salga de la ciudad ni un solo hombre. Y ellos, sus mujeres y sus hijos se consumirán en el hambre, y antes de que la espada venga sobre ellos, quedarán tendidos en las calles de sus viviendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedarán derramados en las plazas de su habitación». El griego πλατεῖαι puede significar calles anchas o plazas públicas, y καταστρωθήσονται puede implicar ser arrojados o extendidos sobre el suelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβαλοῦμεν
  english_pob_choice: we will encamp
  chosen_spanish: acamparemos
  alternatives_spanish:
  - haremos campamento
  - nos acamparemos
  lexicon: LSJ
  rationale: El verbo griego expresa la acción militar de acampar o establecer campamento. En español, «acamparemos» mantiene el sentido bélico con naturalidad; «haremos campamento» suena más explicativo y menos directo.
- source_word: ἐπʼ αὐταῖς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - junto a ellos
  lexicon: LSJ
  rationale: El contexto es de sitio y bloqueo militar; por eso la preposición se entiende adversativamente. «Contra ellos» comunica mejor la hostilidad y la posición de asedio que una versión más literal pero menos clara.
- source_word: εἰς προφυλακὴν
  english_pob_choice: as a guard
  chosen_spanish: como guardia
  alternatives_spanish:
  - como vigilancia
  - para guardia
  - como centinela
  lexicon: LSJ
  rationale: 'La frase indica finalidad: el campamento funciona como fuerza de custodia o bloqueo. «Como guardia» conserva esa función militar sin sobreinterpretar el matiz.'
- source_word: τοῦ μὴ ἐξελθεῖν ἐκ τῆς πόλεως ἄνδρα ἕνα
  english_pob_choice: so that not one man may go out from the city
  chosen_spanish: para que no salga de la ciudad ni un solo hombre
  alternatives_spanish:
  - para impedir que salga de la ciudad ni un hombre
  - para que no salga ningún hombre de la ciudad
  lexicon: LSJ
  rationale: La construcción expresa prevención. «Ni un solo hombre» refleja bien ἄνδρα ἕνα y conserva el singular masculino del griego sin diluirlo en una generalización impersonal.
- source_word: τακήσονται
  english_pob_choice: will waste away
  chosen_spanish: se consumirán
  alternatives_spanish:
  - se derretirán
  - se agotarán
  - desfallecerán
  lexicon: LSJ
  rationale: El verbo se usa en sentido figurado de deterioro por hambre. «Se consumirán» transmite la idea de desvanecerse o desgastarse bajo la escasez con un registro bíblico natural en español.
- source_word: ἐν τῷ λιμῷ
  english_pob_choice: in the famine
  chosen_spanish: en el hambre
  alternatives_spanish:
  - por el hambre
  - a causa del hambre
  - en la hambruna
  lexicon: LSJ
  rationale: λιμός puede significar hambre/famine. Aquí, en el contexto de sitio, «en el hambre» conserva la construcción griega y el sentido de padecer esa condición; «hambruna» sería posible, pero añade un matiz más abstracto.
- source_word: ῥομφαίαν
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la hoja
  - el filo
  lexicon: LSJ
  rationale: Aunque ῥομφαία puede designar una espada grande, el equivalente español más claro y tradicional en contexto de juicio o violencia es «la espada».
- source_word: καταστρωθήσονται
  english_pob_choice: they will be laid low
  chosen_spanish: quedarán tendidos
  alternatives_spanish:
  - serán derribados
  - serán esparcidos
  - quedarán postrados
  lexicon: LSJ
  rationale: El verbo puede sugerir ser arrojados o extendidos en el suelo. «Quedarán tendidos» comunica el resultado visible de caer y quedar echados, sin precisar demasiado la imagen corporal.
- source_word: ἐν ταῖς πλατείαις
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en las vías anchas
  lexicon: LSJ
  rationale: πλατεῖαι puede significar calles anchas o plazas públicas. «Calles» es la opción más natural en español y sigue de cerca el sentido general adoptado por el POB en inglés.
- source_word: τῆς οἰκήσεως αὐτῶν
  english_pob_choice: of their dwellings
  chosen_spanish: de sus viviendas
  alternatives_spanish:
  - de sus moradas
  - de sus hogares
  - de su habitación
  lexicon: LSJ
  rationale: οἴκησις significa morada, habitación o lugar de residencia. «Viviendas» preserva el matiz formal de lugar donde habitan, sin cargar el texto con un término más doméstico como «hogares».
theological_decisions:
- issue: Imagen de juicio por hambre y espada en un asedio
  english_pob_reading: They will waste away in the famine, and before the sword comes upon them, they will be laid low in the streets of their dwellings.
  chosen_spanish_reading: Se consumirán en el hambre, y antes de que la espada venga sobre ellos, quedarán tendidos en las calles de sus viviendas.
  alternative_spanish_readings:
  - desfallecerán por el hambre
  - morirán de hambre
  rationale: 'No hay una tensión doctrinal especial, pero sí una secuencia judicial fuerte: hambre primero, espada después. La traducción conserva ambos agentes de ruina sin suavizar la violencia del texto.'
  doctrine_reference: Judith 7:14; juicio histórico por sitio y hambre
- issue: Referencia masculina singular en una expresión inclusiva del grupo sitiado
  english_pob_reading: not one man may go out from the city
  chosen_spanish_reading: no salga de la ciudad ni un solo hombre
  alternative_spanish_readings:
  - no salga nadie de la ciudad
  - no salga de la ciudad ni una persona
  rationale: El griego dice literalmente «un hombre» en singular. Se mantiene esa forma en español para no borrar el detalle lexical, aunque el sentido global se refiere al bloqueo de toda salida.
  doctrine_reference: Principio de fidelidad formal a los detalles del original
translation_notes:
  revision_awareness: Se tomó en cuenta que el audit trail inglés ya resolvió el campamento militar como «encamp against them as a guard» y dejó una nota alternativa para πλατεῖαι / καταστρωθήσονται. La versión española conserva esa decisión principal, pero adapta la nota para reflejar la misma ambigüedad léxica en español. No se introdujeron cambios textuales de una revisión posterior; el estado final del expediente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Señor» o una paráfrasis devocional porque el texto es narrativo y militar, no litúrgico.
  - «Espada» se conserva como traducción estable de ῥομφαία para no perder el tono judicial.
  - «Viviendas» se usa por su cercanía al sustantivo abstracto οἴκησις, mientras que la nota amplía la posible referencia a plazas o calles anchas.
  - La frase «ni un solo hombre» mantiene el singular griego sin alterar el sentido colectivo del asedio.
