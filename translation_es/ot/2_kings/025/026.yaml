translation:
  language: es
  text: Entonces se levantaron todo el pueblo, desde el más pequeño hasta el más grande, y los jefes[a] de las tropas, y fueron a Egipto, porque tenían miedo de los caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los comandantes de las fuerzas» o «los capitanes de las tropas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en pie
  - se alzaron
  - partieron
  lexicon: HALOT
  rationale: El hebreo expresa una acción decisiva de levantarse y ponerse en marcha. En español, 'se levantaron' conserva la secuencia narrativa sin reducirlo solo a ponerse de pie ni anticipar demasiado el movimiento.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - el pueblo entero
  lexicon: HALOT
  rationale: '''Todo el pueblo'' reproduce de forma natural la colectividad total del hebreo. ''Gente'' suaviza demasiado el matiz colectivo y ''el pueblo entero'' suena más pesado.'
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - del más pequeño al más grande
  - del menor al mayor
  - desde el menor hasta el mayor
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de totalidad que abarca a todos sin limitarse necesariamente a la edad. 'Más pequeño' y 'más grande' mantienen la amplitud del contraste y suenan naturales en español.
- source_word: וְשָׂרֵי הַחֲיָלִים
  english_pob_choice: and the commanders of the forces
  chosen_spanish: y los jefes de las tropas
  alternatives_spanish:
  - y los comandantes de las fuerzas
  - y los capitanes de las tropas
  - y los oficiales del ejército
  lexicon: HALOT
  rationale: '''שָׂרֵי'' señala líderes o jefes, y ''הַחֲיָלִים'' aquí se refiere a fuerzas militares. ''Jefes de las tropas'' conserva el carácter militar sin imponer un tecnicismo moderno excesivo.'
- source_word: וַיָּבֹאוּ מִצְרָיִם
  english_pob_choice: went to Egypt
  chosen_spanish: fueron a Egipto
  alternatives_spanish:
  - vinieron a Egipto
  - partieron hacia Egipto
  lexicon: HALOT
  rationale: En español narrativo, 'fueron a Egipto' expresa bien el desplazamiento desde la perspectiva del narrador. 'Vinieron' resultaría deícticamente menos natural aquí.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de su huida; 'porque' es la forma más clara y directa en español contemporáneo.
- source_word: יָרְאוּ
  english_pob_choice: they were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - temían
  - estaban atemorizados
  lexicon: HALOT
  rationale: El verbo expresa temor real. 'Tenían miedo' comunica el sentido de forma natural y accesible en español, sin cargarlo con un registro más literario de lo necesario.
- source_word: מִפְּנֵי כַשְׂדִּים
  english_pob_choice: of the Chaldeans
  chosen_spanish: de los caldeos
  alternatives_spanish:
  - ante los caldeos
  - por causa de los caldeos
  lexicon: HALOT
  rationale: Se conserva 'caldeos' como etnónimo histórico tradicional en Reyes. El hebreo indica temor en presencia de ellos; en español, 'de los caldeos' es la forma idiomática y fiel.
theological_decisions:
- issue: Relación entre el temor y la causa de la huida
  english_pob_reading: because they were afraid of the Chaldeans
  chosen_spanish_reading: porque tenían miedo de los caldeos
  alternative_spanish_readings:
  - porque temían a los caldeos
  - por miedo de los caldeos
  rationale: 'No se amplía el texto a una interpretación moral o espiritual del miedo. Se mantiene la causalidad explícita del hebreo: huyeron a Egipto por temor a los caldeos.'
  doctrine_reference: Narrativa histórica; no hay afirmación doctrinal explícita.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y coincide sustancialmente con el flujo del audit trail en inglés: totalidad del pueblo, contraste idiomático de ''menor a mayor'', liderazgo militar, movimiento hacia Egipto y causalidad por temor a los caldeos. No se registran revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se prefirió 'los caldeos' en lugar de 'los babilonios' para mantener la terminología histórica del pasaje.
  - '''Se levantaron'' conserva el arranque narrativo sin convertirlo en una simple descripción estática.'
  - Se evitó 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
