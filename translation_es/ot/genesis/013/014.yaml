revisions:
- from: 'Yahvé dijo a Abram, después de que Lot se había separado de él: “Por favor, alza tus ojos y mira desde el lugar donde estás, al norte, al sur, al oriente y al occidente”.'
  to: 'Y Yahvé dijo a Abram, después de que Lot se separó de él: «Por favor, alza tus ojos y mira desde el lugar donde estás: hacia el norte y hacia el sur y hacia el oriente y hacia el occidente.»'
  rationale: Se añade la conjunción inicial para reflejar la continuidad narrativa del hebreo; se aligera la subordinada temporal sin alterar el sentido; se refuerza la direccionalidad de los cuatro puntos cardinales con «hacia» repetido; y se normaliza la puntuación y las comillas para un español más correcto y digno.
