translation:
  language: es
  text: Por esto, porque la orden del rey era urgente y el horno había sido calentado en extremo, la llama[a] del fuego mató a aquellos hombres que habían hecho subir[b] a Sadrac, Mesac y Abed-nego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llamarada del fuego»; el arameo שְׁבִיבָא puede traducirse «llama», «llamarada» o «brote ígneo».
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «habían hecho subir» tiene literalmente un sentido direccional ascendente; por sí mismo no especifica «arrojar».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל קֳבֵל דְּנָה
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - Por eso
  lexicon: HALOT
  rationale: La expresión aramea introduce consecuencia causal. «Por esto» conserva la relación causal de forma breve y natural en español, sin añadir matiz interpretativo.
- source_word: מִלַּת מַלְכָּא
  english_pob_choice: the king’s command
  chosen_spanish: la orden del rey
  alternatives_spanish:
  - la palabra del rey
  - el decreto del rey
  lexicon: HALOT
  rationale: En este contexto narrativo la referencia es al mandato que se está ejecutando. «Orden» comunica bien el valor de la palabra real como instrucción obligatoria.
- source_word: מַחְצְפָה
  english_pob_choice: urgent
  chosen_spanish: urgente
  alternatives_spanish:
  - apremiante
  - severa
  - apremiada
  lexicon: HALOT
  rationale: La noción aquí es la de algo presionante, apremiante, más que una dureza moral. «Urgente» sigue la revisión inglesa más reciente y evita sobrerregular la idea como «severa».
- source_word: וְאַתּוּנָא אֵזֵה יַתִּירָא
  english_pob_choice: the furnace had been heated exceedingly
  chosen_spanish: el horno había sido calentado en extremo
  alternatives_spanish:
  - el horno había sido calentado excesivamente
  - el horno estaba extremadamente caliente
  lexicon: HALOT
  rationale: «Horno» es el equivalente español natural para אַתּוּנָא. «Había sido calentado en extremo» conserva el resultado previo y la intensificación del adverbio arameo sin sonar forzado.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: those men
  chosen_spanish: aquellos hombres
  alternatives_spanish:
  - esos hombres
  - aquellos varones
  lexicon: HALOT
  rationale: El demostrativo remite a los ejecutores ya mencionados. «Aquellos hombres» mantiene la referencia anafórica y el tono narrativo.
- source_word: הַסִּקוּ
  english_pob_choice: brought up
  chosen_spanish: habían subido a
  alternatives_spanish:
  - habían llevado hacia arriba a
  - habían hecho subir a
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente y no especifica «arrojar». «Habían subido a» conserva ese sentido direccional, como en la nota inglesa, sin sobreinterpretar el acto.
- source_word: קַטִּל
  english_pob_choice: killed
  chosen_spanish: mató a
  alternatives_spanish:
  - mató
  - dio muerte a
  lexicon: HALOT
  rationale: Verbo narrativo de causar la muerte. «Mató a» es claro y directo en español contemporáneo.
- source_word: שְׁבִיבָא דִּי נוּרָא
  english_pob_choice: the flame of the fire
  chosen_spanish: la llama del fuego
  alternatives_spanish:
  - la llamarada del fuego
  - el resplandor del fuego
  lexicon: HALOT
  rationale: שְׁבִיבָא admite «llama», «brote» o «fulgor». «Llama del fuego» es una opción sobria y transparente; también deja abierta la alternativa semántica que la nota inglesa conserva.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Shadrac, Mesac y Abed-nego
  lexicon: HALOT
  rationale: Se usan las formas hispanizadas usuales de estos nombres propios bíblicos, con transliteración estable en castellano e inteligible para lectores eclesiales.
theological_decisions:
- issue: Relación causal del versículo con el mandato real previo
  english_pob_reading: Because of this, because the king’s command was urgent...
  chosen_spanish_reading: Por esto, porque la orden del rey era urgente...
  alternative_spanish_readings:
  - Por tanto, porque la orden del rey era urgente...
  - Por esto, ya que la orden del rey era urgente...
  rationale: 'Se mantiene la doble causalidad explícita del texto: la consecuencia de lo dicho antes y la explicación interna del versículo. No se suaviza la repetición causal para preservar la lógica narrativa.'
  doctrine_reference: Narración histórica; fidelidad al encadenamiento causal del texto
- issue: 'Valor de הַסִּקוּ: subir vs. arrojar'
  english_pob_reading: those men who brought up Shadrach...
  chosen_spanish_reading: aquellos hombres que habían subido a Sadrac...
  alternative_spanish_readings:
  - aquellos hombres que habían llevado a Sadrac...
  - aquellos hombres que habían arrojado a Sadrac...
  rationale: El audit trail inglés nota que el verbo tiene dirección ascendente y no significa por sí mismo «arrojar». Por eso se evita introducir «arrojado», que sería una interpretación no justificada por la forma verbal.
  doctrine_reference: Principio de no añadir contenido no explícito al texto fuente
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió «because» sobre «since» y «urgent» sobre «harsh». En español se reflejó esa revisión con una causalidad explícita («Por esto, porque...») y con «urgente» para מַחְצְפָה. También se respetó la nota de que הַסִּקוּ indica un movimiento ascendente sin añadir la idea de arrojar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Sadrac», «Mesac» y «Abed-nego» como formas hispanizadas consistentes con el uso bíblico tradicional en español.
  - Se conserva la diferencia entre «orden» y «llama» para evitar mezclar el mandato real con el efecto del fuego.
