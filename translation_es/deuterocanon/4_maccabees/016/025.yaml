translation:
  language: es
  text: Y aun más, al ver esto—que, después de morir por Dios, viven para Dios[a], así como Abraham, Isaac y Jacob, y todos los patriarcas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'viven a Dios'. El griego dice literalmente, 'viven a Dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι δὲ καὶ
  english_pob_choice: And even more
  chosen_spanish: Y aun más
  alternatives_spanish:
  - Y además
  - Y todavía más
  lexicon: LSJ
  rationale: Expresa con naturalidad el valor aditivo y enfático de la frase sin volverla pesada.
- source_word: ταῦτα ἰδόντες
  english_pob_choice: seeing this
  chosen_spanish: al ver esto
  alternatives_spanish:
  - viendo esto
  - al ver estas cosas
  lexicon: LSJ
  rationale: 'El participio se vierte de forma natural en español como una construcción temporal: ''al ver esto''. Mantiene el referente colectivo sin forzar el plural literal.'
- source_word: διὰ τὸν θεόν
  english_pob_choice: for God
  chosen_spanish: por Dios
  alternatives_spanish:
  - a causa de Dios
  - por causa de Dios
  lexicon: LSJ
  rationale: En contexto martirial, διὰ con acusativo expresa motivo o causa; 'por Dios' conserva esa fuerza de sacrificio por su causa y es idiomático en español.
- source_word: ἀποθανόντες
  english_pob_choice: after dying
  chosen_spanish: después de morir
  alternatives_spanish:
  - habiendo muerto
  - tras morir
  lexicon: LSJ
  rationale: El aoristo participial antecedente se refleja con una relación temporal clara y natural en español.
- source_word: ζῶσιν τῷ θεῷ
  english_pob_choice: they live to God
  chosen_spanish: viven para Dios
  alternatives_spanish:
  - viven a Dios
  - viven hacia Dios
  lexicon: LSJ
  rationale: Se conserva la relación con el dativo y la tensión del original. 'Para Dios' es la opción más natural en español, pero sigue abierta la posibilidad de entender 'to God' como relación dirigida a Dios, no como simple utilidad. No se borra la ambigüedad de vida en relación con Dios.
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: LSJ
  rationale: Marca la comparación con claridad y con un tono sobrio y bíblico.
- source_word: οἱ πατριάρχαι
  english_pob_choice: the patriarchs
  chosen_spanish: los patriarcas
  alternatives_spanish:
  - los padres
  - los antepasados
  lexicon: LSJ
  rationale: Es el equivalente histórico-religioso normal y preciso para las figuras ancestrales del texto.
theological_decisions:
- issue: Vida de los justos después de morir en relación con Dios
  english_pob_reading: they live to God
  chosen_spanish_reading: viven para Dios
  alternative_spanish_readings:
  - viven a Dios
  - viven con Dios
  rationale: La traducción conserva la afirmación de continuidad de vida sin resolver de antemano el modo metafísico. 'Para Dios' permite mantener la relación explícita con Dios y el matiz causal/motivacional del texto martirial.
  doctrine_reference: Preservar la tensión teológica del original sin sobreexplicar el estado postmortem.
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando la nota al pie no anclada. La redacción mantiene la secuencia del griego y la comparación final con Abraham, Isaac, Jacob y todos los patriarcas, sin añadir marcadores no usados en el texto.
  spanish_consistency_notes:
  - Se usa 'Dios' de manera consistente para θεός.
  - Se mantiene 'patriarcas' como término histórico-religioso estándar.
  - No se introduce 'Cristo' ni 'Mesías' porque no aparecen en este versículo.
  - La traducción evita resolver de forma excesiva la ambigüedad de ζῶσιν τῷ θεῷ.
