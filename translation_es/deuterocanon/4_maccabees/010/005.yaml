    issue: «al soportar amargamente» no transmite bien el valor contextual de ἐνέγκαντες
    rationale: Aunque literalmente el verbo puede significar ‘soportar’, el contexto con πικρῶς y παρρησία indica reacción hostil ante la valentía del mártir. En español, «soportar amargamente» suena rígido y no expresa con claridad el resentimiento.
  - severity: medium
    issue: «franqueza» debilita la fuerza de παρρησία
    rationale: παρρησία aquí no es solo habla franca, sino audacia valiente y sin temor. «Audacia» o «valentía al hablar» preserva mejor el matiz.
  - severity: low
