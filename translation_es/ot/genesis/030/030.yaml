    text: 'Hebreo: «a mi pie»; el giro probablemente significa «con mi llegada» o «por mi causa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿cuándo haré yo también algo para mi propia casa?»'
    reason: lexical_alternative
