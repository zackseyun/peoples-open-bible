base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/065.yaml
  text: At that time Solomon held the feast[a], and all Israel with him, a great assembly from Lebo-hamath to the Brook of Egypt, before Yahweh our God, seven days and seven days[b], fourteen days.
  footnotes:
