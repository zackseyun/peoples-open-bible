translation:
  language: es
  text: Y entre los habitantes de Jabés de Galaad encontraron cuatrocientas jóvenes vírgenes[a], que no habían conocido a un hombre por haberse acostado con varón; y las llevaron al campamento en Silo, que está en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «que no habían tenido relaciones sexuales con un hombre». El hebreo dice literalmente: «que no habían conocido a un hombre por haberse acostado con varón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - descubrieron
  lexicon: HALOT
  rationale: מצא en narración se expresa con naturalidad como 'encontraron' o 'hallaron'; 'encontraron' mantiene el movimiento narrativo directo del texto y es idiomático en español.
- source_word: מִיּוֹשְׁבֵי יָבֵישׁ גִּלְעָד
  english_pob_choice: among the inhabitants of Jabesh-gilead
  chosen_spanish: entre los habitantes de Jabés de Galaad
  alternatives_spanish:
  - de entre los habitantes de Jabés de Galaad
  - entre los moradores de Jabés de Galaad
  lexicon: HALOT
  rationale: La preposición hebrea marca selección dentro del grupo; 'entre' reproduce bien esa idea sin convertirla en simple procedencia. 'Habitantes' conserva el valor colectivo de יֹשְׁבֵי.
- source_word: נַעֲרָה
  english_pob_choice: young women
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachas
  - doncellas
  lexicon: HALOT
  rationale: Tras el numeral, נערה funciona de manera colectiva y, unido a בתולה, queda mejor resumido en español como 'jóvenes' para evitar una redundancia torpe y conservar el matiz de edad/sexo.
- source_word: בְתוּלָה
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas vírgenes
  - mujeres vírgenes
  lexicon: HALOT
  rationale: '''Vírgenes'' es la equivalencia directa de בתולה y preserva el dato de estado sexual. Se mantiene junto con ''jóvenes'' para reflejar ambos componentes del hebreo.'
- source_word: אֲשֶׁר לֹא יָדְעָה אִישׁ
  english_pob_choice: who had not known a man
  chosen_spanish: que no habían conocido varón
  alternatives_spanish:
  - que no habían tenido relaciones con un varón
  - que no conocían varón
  lexicon: HALOT
  rationale: ידע es eufemismo sexual; 'conocido varón' conserva el giro bíblico en español sin perder inteligibilidad. Se usa plural en la frase española para concordar con el grupo de jóvenes.
- source_word: לְמִשְׁכַּב זָכָר
  english_pob_choice: by lying with a male
  chosen_spanish: por acostarse con un varón
  alternatives_spanish:
  - mediante el acostarse con un varón
  - por yacer con un varón
  lexicon: HALOT
  rationale: La construcción hebrea es concreta y algo áspera; 'por acostarse con un varón' comunica la aclaración sexual sin borrar la literalidad de 'lying with a male'. 'Varón' traduce bien זָכָר en este contexto.
- source_word: וַיָּבִיאוּ אוֹתָם
  english_pob_choice: and they brought them
  chosen_spanish: y las llevaron
  alternatives_spanish:
  - y las trajeron
  - y las condujeron
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo es masculino plural, el referente son mujeres; en español debe concordar con femenino plural. 'Llevaron' es natural para el traslado al campamento.
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al campamento militar
  - hacia el campamento
  lexicon: HALOT
  rationale: אל con יעד se puede verter como destino ('al'). 'Campamento' traduce correctamente הַמַּחֲנֶה y suena más natural que un calco preposicional.
- source_word: שִׁלֹה
  english_pob_choice: Shiloh
  chosen_spanish: Silo
  alternatives_spanish:
  - Siló
  - Siloé
  lexicon: HALOT
  rationale: Como topónimo bíblico, en español eclesial es más reconocido 'Silo'. Se conserva la forma tradicional de transliteración establecida.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  english_pob_choice: which is in the land of Canaan
  chosen_spanish: que está en la tierra de Canaán
  alternatives_spanish:
  - que se encuentra en la tierra de Canaán
  - que está en la región de Canaán
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación geográfica de Silo; 'está en la tierra de Canaán' es claro y fiel al hebreo.
theological_decisions:
- issue: Tratamiento del eufemismo sexual y del lenguaje de pureza
  english_pob_reading: who had not known a man by lying with a male
  chosen_spanish_reading: que no habían conocido varón por acostarse con un varón
  alternative_spanish_readings:
  - que no habían tenido relaciones con un varón
  - que no habían conocido hombre
  rationale: El texto mantiene el eufemismo hebreo de 'conocer' y la aclaración explícita 'por acostarse con un varón', sin suavizarlo a una paráfrasis más moderna. Así se conserva tanto la restricción sexual como la formulación concreta del original.
  doctrine_reference: No aplica como doctrina; decisión de fidelidad léxica y semántica al eufemismo bíblico.
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió 'among the inhabitants' y condensó 'young women, virgins' en 'young virgins'. La redacción española sigue esa mejora al usar 'entre los habitantes' y combinar 'jóvenes vírgenes' para conservar נערה + בתולה sin una apposición pesada. También preserva la fuerza del eufemismo sexual mediante una solución cercana al hebreo y mantiene el destino geográfico con claridad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se usa 'Silo' como forma española habitual del topónimo שִׁלֹה.
  - '''Varón'' se emplea para reflejar זָכָר y el registro bíblico, en lugar de ''hombre'', para mantener el paralelismo con el hebreo.'
  - Se evita 'doncellas' porque en español puede sonar más arcaico y no añade precisión frente a 'jóvenes vírgenes'.
