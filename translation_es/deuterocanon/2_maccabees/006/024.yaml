translation:
  language: es
  text: Porque no es digno de nuestra edad fingir,[a] para que muchos de los jóvenes, suponiendo que Eleazar, a sus noventa años, ha pasado a costumbres extranjeras,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a maneras extranjeras»; el griego alude a adoptar prácticas no judías.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Ya que ... no
  lexicon: LSJ
  rationale: γάρ introduce la razón del dicho de Eleazar; en español, «Porque» conserva mejor la fuerza explicativa sin volver la frase artificial.
- source_word: τῆς ἡμετέρας ἡλικίας
  english_pob_choice: of our age
  chosen_spanish: de nuestra edad
  alternatives_spanish:
  - de nuestra edad avanzada
  - de nuestro tiempo de vida
  lexicon: LSJ
  rationale: ἡλικία aquí señala la etapa de la vida, especialmente la vejez. «Nuestra edad» preserva la referencia a la etapa vital y suena natural en español.
- source_word: ἄξιόν ἐστιν
  english_pob_choice: it is ... worthy
  chosen_spanish: no es digno
  alternatives_spanish:
  - no es propio
  - no es conveniente
  lexicon: LSJ
  rationale: ἄξιος expresa lo que corresponde moralmente o lo que merece una persona; «digno» conserva ese peso moral mejor que un simple «propio».
- source_word: ὑποκριθῆναι
  english_pob_choice: to pretend
  chosen_spanish: fingir
  alternatives_spanish:
  - simular
  - hacer de cuenta
  lexicon: LSJ
  rationale: En este contexto ὑποκρίνομαι tiene el sentido de actuar falsamente o representar una conducta. «Fingir» comunica esa idea de manera clara y directa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: LSJ
  rationale: La cláusula expresa el resultado buscado o temido. «Para que» es la forma más natural en español para este tipo de dependencia final.
- source_word: πολλοὶ τῶν νέων
  english_pob_choice: many of the young
  chosen_spanish: muchos de los jóvenes
  alternatives_spanish:
  - muchos jóvenes
  - gran número de los jóvenes
  lexicon: LSJ
  rationale: El plural masculino funciona de modo representativo. «Los jóvenes» mantiene el grupo social sin añadir el matiz exclusivo de varones donde el contexto no lo exige.
- source_word: ὑπολαβόντες
  english_pob_choice: supposing
  chosen_spanish: suponiendo
  alternatives_spanish:
  - pensando
  - creyendo
  lexicon: LSJ
  rationale: El participio indica una inferencia errónea a partir de la conducta aparente de Eleazar. «Suponiendo» conserva esa deducción.
- source_word: Ἐλεάζαρον τὸν ἐνενηκονταετῆ
  english_pob_choice: Eleazar at ninety years of age
  chosen_spanish: Eleazar, a sus noventa años
  alternatives_spanish:
  - Eleazar, de noventa años
  - Eleazar, ya de noventa años
  lexicon: LSJ
  rationale: La apposición destaca la avanzada edad del personaje. «A sus noventa años» es idiomático y mantiene el énfasis.
- source_word: μεταβεβληκέναι
  english_pob_choice: has changed over
  chosen_spanish: ha pasado
  alternatives_spanish:
  - ha cambiado
  - se ha vuelto
  lexicon: LSJ
  rationale: El perfecto infinitivo indica un cambio visto como ya consumado. «Ha pasado» funciona mejor que un calco y encaja con el complemento siguiente.
- source_word: εἰς ἀλλοφυλισμόν
  english_pob_choice: to foreign ways
  chosen_spanish: a costumbres extranjeras
  alternatives_spanish:
  - a maneras extranjeras
  - a formas de vivir extranjeras
  - a costumbres ajenas
  lexicon: LSJ
  rationale: ἀλλοφυλισμός alude a adoptar costumbres no judías. «Costumbres extranjeras» conserva la idea de prácticas ajenas al pueblo sin introducir un juicio doctrinal posterior.
theological_decisions:
- issue: ἀλλοφυλισμός en un contexto de fidelidad judía/covenantal
  english_pob_reading: foreign ways
  chosen_spanish_reading: costumbres extranjeras
  alternative_spanish_readings:
  - costumbres ajenas
  - formas de vivir extranjeras
  - vida extranjera
  rationale: La expresión se refiere a parecer que se abandona la identidad y práctica judías para adoptar formas gentiles. «Costumbres extranjeras» comunica esa ruptura sin cargar el texto con términos más interpretativos.
  doctrine_reference: Fidelidad a la identidad del pueblo y rechazo de la asimilación religiosa; traducción atenta al sentido histórico-literario del martirio.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, manteniendo la fuerza de γάρ como explicación, el valor moral de ἄξιόν ἐστιν y el matiz de ἀλλοφυλισμός como adopción de prácticas no judías. La versión española evita el calco literal de «pretender» porque en español bíblico actual «fingir» expresa mejor ὑποκριθῆναι en este contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este verso no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - Se mantiene un registro bíblico moderno y sobrio, con sintaxis española natural.
  - La nota al pie conserva la alternativa semántica documentada por el POB inglés.
