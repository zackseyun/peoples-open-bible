theological_decisions:
- issue: Identity of the one from the east
  chosen_reading: Leave the figure unnamed in the translation
  alternative_readings:
  - Cyrus
  - Abraham
  - an idealized conqueror raised by God
  rationale: The verse itself does not identify the person. Naming Cyrus or Abraham in the main text would import an interpretive conclusion not explicit in the Hebrew. The translation therefore preserves the text's open reference.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
