translation:
  language: es
  text: Ese día Yahvé engrandeció a Josué a los ojos de todo Israel, y lo temieron[a], como habían temido a Moisés todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo tuvieron en reverencia' / 'lo veneraron'; el verbo hebreo puede expresar temor, asombro o reverencia según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: La expresión temporal narrativa se vierte de forma natural con 'En aquel día'. Conserva la referencia puntual del hebreo sin sonar profética o arcaizante.
- source_word: גִּדַּל
  english_pob_choice: made ... great
  chosen_spanish: engrandeció
  alternatives_spanish:
  - hizo grande a
  - exaltó
  lexicon: HALOT
  rationale: 'El verbo piel expresa causación: Yahvé hizo que Josué fuera considerado grande. ''Engrandeció'' comunica esa elevación con buen español y sin perder el valor causativo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo, según el criterio del proyecto, en vez de sustituirlo por un título.
- source_word: בְּעֵינֵי כָּל יִשְׂרָאֵל
  english_pob_choice: in the eyes of all Israel
  chosen_spanish: a los ojos de todo Israel
  alternatives_spanish:
  - a la vista de todo Israel
  - ante todo Israel
  lexicon: HALOT
  rationale: La imagen idiomática hebrea se conserva en español con una construcción igualmente natural que expresa la percepción pública.
- source_word: וַיִּרְאוּ אֹתוֹ
  english_pob_choice: and they feared him
  chosen_spanish: lo temieron
  alternatives_spanish:
  - estuvieron reverentes ante él
  - le tuvieron reverencia
  lexicon: HALOT
  rationale: '''Temieron'' preserva la amplitud semántica de ירא entre temor, reverencia y sobrecogimiento. En contexto, se trata de un temor reverente ligado al reconocimiento de su autoridad.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: La comparación queda clara y sobria en español con 'como', que reproduce la relación de semejanza del hebreo sin exceso de énfasis.
- source_word: יָרְאוּ אֶת מֹשֶׁה
  english_pob_choice: they had feared Moses
  chosen_spanish: habían temido a Moisés
  alternatives_spanish:
  - temieron a Moisés
  - habían reverenciado a Moisés
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto expresa bien la comparación retrospectiva con la experiencia previa bajo Moisés, y conserva la misma raíz verbal que el primer miembro.
- source_word: כָּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - mientras vivió
  lexicon: HALOT
  rationale: Es el equivalente idiomático directo en español y mantiene el ritmo formulístico del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se conserva como nombre propio para evitar la sustitución litúrgica por un título y mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de ירא respecto de Josué
  english_pob_reading: feared him
  chosen_spanish_reading: lo temieron
  alternative_spanish_readings:
  - lo reverenciaron
  - estuvieron en temor reverente de él
  rationale: La comparación con Moisés y el marco narrativo favorecen un temor reverente, no mera intimidación ni simple respeto. 'Temer' preserva la tensión lexical sin suavizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permaneció estable tras la última pasada de control, con acuerdo alto-moderado y sin ajustes pendientes en el texto base.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה según la terminología del proyecto.
  - Se conserva la imagen idiomática hebrea 'a los ojos' para בְּעֵינֵי.
  - Se usa 'temieron' para ירא, en continuidad con el valor lexical documentado y sin reducirlo a mera cortesía.
