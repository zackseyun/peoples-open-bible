translation:
  language: es
  text: Señor Todopoderoso, Dios de Israel, escucha, te ruego, la oración de los muertos de Israel y de los hijos que pecan contra ti, los cuales no escucharon tu voz, la voz de su Dios, y los males[a] se nos han pegado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las calamidades se nos han pegado» o «los desastres se nos han pegado». El griego dice literalmente «los males se nos han pegado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: LSJ
  rationale: En el sistema del proyecto, el vocativo divino se vierte con el nombre propio Yahvé cuando el contexto griego corresponde al nombre divino, para no ocultarlo detrás de un título genérico.
- source_word: Παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Soberano de todo
  - Gobernante de todo
  lexicon: LSJ
  rationale: παντοκράτωρ expresa soberanía universal; 'Todopoderoso' es la forma española más natural y ampliamente comprensible para este título divino.
- source_word: ἄκουσον δὴ
  english_pob_choice: please hear
  chosen_spanish: escucha, te ruego
  alternatives_spanish:
  - escucha ahora
  - oye, por favor
  lexicon: LSJ
  rationale: δή intensifica la súplica; 'escucha, te ruego' conserva el tono implorante sin sonar mecánico.
- source_word: τῆς προσευχῆς
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la súplica
  lexicon: LSJ
  rationale: προσευχή se traduce de forma directa como 'oración', que es natural en español y fiel al sentido básico.
- source_word: τῶν τεθνηκότων Ἰσραήλ
  english_pob_choice: the dead of Israel
  chosen_spanish: de los muertos de Israel
  alternatives_spanish:
  - de los israelitas muertos
  - de los que han muerto en Israel
  lexicon: LSJ
  rationale: τεθνηκότων es un participio perfecto con sentido de 'los que han muerto'; 'muertos de Israel' mantiene la dureza y literalidad de la expresión griega sin interpretarla.
- source_word: υἱῶν τῶν ἁμαρτανόντων
  english_pob_choice: the sons who sin against you
  chosen_spanish: de los hijos que pecan contra ti
  alternatives_spanish:
  - de los hijos que han pecado contra ti
  - de los hijos pecadores
  lexicon: LSJ
  rationale: Se conserva 'hijos' por la fuerza léxica de υἱῶν. ἁμαρτανόντων, presente participial, se vierte como 'pecan' para reflejar la forma del griego y la relación continua con Dios.
- source_word: ἐναντίον σου
  english_pob_choice: before you
  chosen_spanish: contra ti
  alternatives_spanish:
  - delante de ti
  - en tu presencia
  lexicon: LSJ
  rationale: En contexto de pecado, ἐναντίον σου puede implicar ofensa dirigida a Dios; 'contra ti' comunica mejor esa fuerza relacional en español que un mero 'delante de ti'.
- source_word: οἳ οὐκ ἤκουσαν τῆς φωνῆς σου
  english_pob_choice: who did not listen to your voice
  chosen_spanish: los cuales no escucharon tu voz
  alternatives_spanish:
  - que no oyeron tu voz
  - que no obedecieron tu voz
  lexicon: LSJ
  rationale: '''Escuchar tu voz'' reproduce bien la imagen bíblica y deja abierta la idea de obediencia implícita en ἀκούω con genitivo.'
- source_word: θεοῦ αὐτῶν
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  - su Dios y Señor
  lexicon: LSJ
  rationale: La apposición se integra naturalmente como 'su Dios' en español; evita una construcción pesada y mantiene la referencia a Dios como poseedor relacional.
- source_word: ἐκολλήθη ἡμῖν τὰ κακά
  english_pob_choice: the evils have clung to us
  chosen_spanish: los males se nos han pegado
  alternatives_spanish:
  - las calamidades se nos han pegado
  - los males se nos han adherido
  lexicon: LSJ
  rationale: κολλάω conserva la imagen de algo que se pega o se adhiere. 'Males' permite en español tanto el sentido de desgracias/calamidades como el de males en general, dejando visible la tensión del griego.
theological_decisions:
- issue: Vocativo divino y nombre de Dios
  english_pob_reading: Lord Almighty, God of Israel
  chosen_spanish_reading: Yahvé, Dios de Israel, Todopoderoso
  alternative_spanish_readings:
  - Señor Todopoderoso
  - Señor, Dios de Israel
  rationale: Se mantiene el nombre divino Yahvé según la norma del proyecto, y se conserva el título de soberanía universal con un equivalente español directo. No se oculta el nombre detrás de una sustitución litúrgica.
  doctrine_reference: Name of God / divine title usage
- issue: Identidad de 'los muertos de Israel'
  english_pob_reading: A literal reference to deceased Israelites is retained in the main text.
  chosen_spanish_reading: Referencia literal a los muertos de Israel
  alternative_spanish_readings:
  - Israel como si estuviera muerto
  - los espiritualmente muertos de Israel
  rationale: El griego denota literalmente a quienes han muerto; la traducción conserva esa dureza sin convertirla en una metáfora interpretativa.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Force of τὰ κακά
  english_pob_reading: the evils have clung to us
  chosen_spanish_reading: los males se nos han pegado
  alternative_spanish_readings:
  - las calamidades se nos han pegado
  - los desastres se nos han adherido
  rationale: τὰ κακά puede abarcar males, calamidades o desastres. En español, 'males' retiene la amplitud semántica y la metáfora de adhesión del verbo.
  doctrine_reference: Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y el audit trail inglés: conserva el vocativo divino, la súplica intensificada por δή, el participio perfecto τεθνηκότων con sentido literal de muerte, el participio presente ἁμαρτανόντων en presente, la relación de ἀκούω con la voz de Dios, y la metáfora de κολλάω. Se evita suavizar las tensiones teológicas o sustituirlas por paráfrasis interpretativas.'
  spanish_consistency_notes:
  - Se usa Yahvé para el nombre divino en coherencia con el criterio general del proyecto.
  - Se mantiene 'hijos' para υἱῶν, sin neutralizar a 'hijos/hijas' o 'personas'.
  - Se preserva la metáfora verbal de 'pegarse' para κολλάω en lugar de una explicación abstracta.
  - La puntuación separa los segmentos como en una invocación y plegaria bíblica natural en español.
