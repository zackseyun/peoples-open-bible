translation:
  language: es
  text: Y sucedió[a], cuando Adoni-zedec, rey de Jerusalén, oyó que Josué había capturado Hai y la había consagrado a la destrucción, tal como había hecho con Jericó y con su rey, así hizo con Hai y con su rey; y que los habitantes de Gabaón habían hecho la paz con Israel y estaban entre ellos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había ocurrido». La fórmula hebrea introduce una nueva escena narrativa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «habían pactado paz con Israel».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa introductoria se expresa de modo natural en español con una apertura que marca el comienzo de una nueva escena sin sonar arcaica.
- source_word: כִשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - al oír
  - apenas oyó
  lexicon: HALOT
  rationale: El infinitivo constructo con כ indica circunstancia temporal; 'cuando ... oyó' conserva esa relación de manera clara y directa.
- source_word: אֲדֹנִי צֶדֶק
  english_pob_choice: Adoni-zedek
  chosen_spanish: Adoni-zedec
  alternatives_spanish:
  - Adonisedec
  - Adoni-zedek
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación gráfica española coherente con la pronunciación esperable y el uso bíblico en español, manteniendo el compuesto del hebreo.
- source_word: מֶלֶךְ יְרוּשָׁלַם
  english_pob_choice: king of Jerusalem
  chosen_spanish: rey de Jerusalén
  alternatives_spanish:
  - monarca de Jerusalén
  lexicon: HALOT
  rationale: La relación constructa se vierte de manera directa y natural en español.
- source_word: לָכַד
  english_pob_choice: had captured
  chosen_spanish: había tomado
  alternatives_spanish:
  - había capturado
  - había conquistado
  lexicon: HALOT
  rationale: Aunque 'capturado' refleja con precisión el campo militar, 'había tomado' funciona mejor en español bíblico y sigue implicando la toma de la ciudad sin exagerar el matiz.
- source_word: הָעַי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo bíblico para mejor lectura pública.
- source_word: וַיַּחֲרִימָהּ
  english_pob_choice: had devoted it to destruction
  chosen_spanish: la había consagrado a la destrucción
  alternatives_spanish:
  - la había destruido por completo
  - la había puesto bajo el anatema
  lexicon: HALOT
  rationale: Se mantiene el peso técnico de חרם sin recurrir a 'anatema', que sería más opaco para lectores generales; 'consagrada a la destrucción' conserva la idea de una destrucción bajo juicio con matiz sacral.
- source_word: כַּאֲשֶׁר ... כֵּן
  english_pob_choice: just as ... so
  chosen_spanish: como ... así
  alternatives_spanish:
  - tal como ... así
  - así como ... así
  lexicon: HALOT
  rationale: La correlación comparativa se reproduce con estructura española natural que preserva el paralelismo retórico.
- source_word: עָשָׂה לִירִיחוֹ וּלְמַלְכָּהּ
  english_pob_choice: he had done to Jericho and its king
  chosen_spanish: había hecho a Jericó y a su rey
  alternatives_spanish:
  - había tratado a Jericó y a su rey
  - había obrado contra Jericó y contra su rey
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo con una construcción breve y clara.
- source_word: הִשְׁלִימוּ
  english_pob_choice: had made peace with
  chosen_spanish: habían hecho paz con
  alternatives_spanish:
  - habían pactado paz con
  - habían hecho la paz con
  lexicon: HALOT
  rationale: El verbo puede expresar establecer relaciones de paz; 'habían hecho paz con' refleja fielmente la construcción sin forzar una frase idiomática más interpretativa.
- source_word: יֹשְׁבֵי גִבְעוֹן
  english_pob_choice: the inhabitants of Gibeon
  chosen_spanish: los habitantes de Gabaón
  alternatives_spanish:
  - los moradores de Gabaón
  - los que habitaban en Gabaón
  lexicon: HALOT
  rationale: '''Habitantes'' es la equivalencia natural del participio sustantivado y Gabaón es la forma castellana usual del topónimo.'
- source_word: וַיִּהְיוּ בְּקִרְבָּם
  english_pob_choice: and were among them
  chosen_spanish: y estaban entre ellos
  alternatives_spanish:
  - y estaban en medio de ellos
  - y vivían entre ellos
  lexicon: HALOT
  rationale: '''Entre ellos'' comunica bien el sentido relacional de בקרבם y deja abierta la lectura de integración dentro del grupo.'
theological_decisions:
- issue: Traducción de חרם en contexto de conquista
  english_pob_reading: had devoted it to destruction
  chosen_spanish_reading: la había consagrado a la destrucción
  alternative_spanish_readings:
  - la había destruido por completo
  - la había puesto bajo el anatema
  rationale: 'La frase conserva el carácter teológico y técnico del חרם: no es mera aniquilación militar, sino destrucción vinculada a juicio y consagración. ''Consagrada a la destrucción'' mantiene esa tensión mejor que una simple versión de ''destruida por completo''.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación de paz con Israel
  english_pob_reading: had made peace with Israel
  chosen_spanish_reading: habían hecho paz con Israel
  alternative_spanish_readings:
  - habían hecho la paz con Israel
  - habían pactado paz con Israel
  rationale: La redacción mantiene la sobriedad del hebreo y evita añadir un matiz diplomático no explícito en el texto. 'Hacer paz' conserva la forma del evento narrado.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se introdujeron cambios de sentido respecto de la revisión más reciente; los ajustes principales son de naturalidad española y de transliteración/terminología bíblica en castellano.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como convención general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene la distinción entre 'tomó' y la fórmula técnica de חרם mediante una expresión explícita de destrucción consagrada.
  - Se usa 'habían hecho paz' para respetar la concisión hebrea y la lectura auditada en inglés.
  - '''Gabaón'' y ''Hai'' siguen las formas españolas bíblicas habituales para topónimos.'
  - El paralelismo comparativo 'como ... así' preserva la estructura retórica del hebreo.
