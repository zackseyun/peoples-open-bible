  source_alignment_summary: 'El borrador español capta bien el sentido básico del hebreo y sigue la decisión auditada de traducir יְבָרֲכֶךָּ con sentido eufemístico como «maldecirá». También refleja adecuadamente וְגַע como «toca» conforme a la revisión inglesa. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en «tu mano», pero el contenido de la nota trata principalmente el uso eufemístico de «bendecir/maldecir», que corresponde a «te maldecirá». Además, «en tu rostro» es demasiado calcado e idiomáticamente menos natural que «en tu cara» para עַל פָּנֶיךָ.'
