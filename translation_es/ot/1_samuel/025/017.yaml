translation:
  language: es
  text: Ahora, sabe esto y considera qué deberías hacer, porque la calamidad ha sido decidida contra nuestro amo y contra toda su casa, y él es un hombre tan vil[a] que no se le puede hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hijo de indignidad»; tradicionalmente, «un hijo de Belial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce un cambio urgente en el discurso. «Ahora» reproduce la transición inmediata de manera natural en español; «Y ahora» también es posible, pero suena más pesada.
- source_word: דְּעִי
  english_pob_choice: know this
  chosen_spanish: sabe esto
  alternatives_spanish:
  - conoce esto
  - sé esto
  lexicon: HALOT
  rationale: El imperativo femenino singular va dirigido a Abigail. «Sabe esto» comunica la exhortación directa y conserva el valor de atención requerida por el contexto.
- source_word: וּרְאִי
  english_pob_choice: consider
  chosen_spanish: considera
  alternatives_spanish:
  - mira
  - ve
  lexicon: HALOT
  rationale: Aunque literalmente significa «ver», en esta combinación con «saber» y con el objeto siguiente, el valor es deliberativo. «Considera» refleja bien la evaluación prudente que se le pide a Abigail.
- source_word: מַה תַּעֲשִׂי
  english_pob_choice: what you should do
  chosen_spanish: qué debes hacer
  alternatives_spanish:
  - qué harás
  - qué has de hacer
  lexicon: HALOT
  rationale: El imperfecto expresa acción por decidir. «Debes hacer» comunica con naturalidad la urgencia práctica sin convertirlo en un mandato más fuerte de lo que el hebreo exige.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón inmediata de la exhortación anterior. «Porque» es la equivalencia más clara en español.
- source_word: כָלְתָה הָרָעָה
  english_pob_choice: disaster has been determined
  chosen_spanish: el mal ha sido determinado
  alternatives_spanish:
  - la calamidad está decidida
  - el desastre está sellado
  lexicon: HALOT
  rationale: El idiomático כָלְתָה expresa que el resultado está fijado o consumado. «El mal» conserva el término hebreo sin interpretarlo excesivamente; «ha sido determinado» retiene la idea de un desenlace establecido.
- source_word: אֶל אֲדֹנֵינוּ
  english_pob_choice: against our master
  chosen_spanish: contra nuestro señor
  alternatives_spanish:
  - contra nuestro amo
  - sobre nuestro señor
  lexicon: HALOT
  rationale: En este contexto אֶל con רעה tiene sentido hostil. «Señor» refleja el término de relación jerárquica del original; «contra» expresa la dirección adversa del mal.
- source_word: וְעַל כָּל בֵּיתוֹ
  english_pob_choice: and against all his household
  chosen_spanish: y contra toda su casa
  alternatives_spanish:
  - y contra toda su familia
  - y contra todo su hogar
  lexicon: HALOT
  rationale: «Casa» reproduce el hebreo בַּיִת en su sentido de casa/linaje/entorno doméstico. «Toda su casa» mantiene esa amplitud mejor que restringirla solo a familia o vivienda.
- source_word: בֶּן בְּלִיַּעַל
  english_pob_choice: such a worthless man
  chosen_spanish: un hombre tan vil
  alternatives_spanish:
  - un hombre tan inútil
  - un hombre tan perverso
  - un hijo de Belial
  lexicon: HALOT
  rationale: La expresión es idiomática y describe a una persona moralmente ruin. «Vil» conserva la fuerza degradante sin introducir una lectura como nombre propio; se evita «hijo de Belial» porque el contexto no requiere esa forma tradicional ni ayuda a la claridad española.
- source_word: מִדַּבֵּר אֵלָיו
  english_pob_choice: that one cannot speak to him
  chosen_spanish: que no se le puede hablar
  alternatives_spanish:
  - de modo que nadie puede hablarle
  - que no puede hablársele
  lexicon: HALOT
  rationale: 'La construcción expresa resultado: es el tipo de hombre con quien hablar resulta imposible. La pasiva impersonal en español suena natural y preserva el sentido general sin sobrecargarlo.'
theological_decisions:
- issue: בֶּן בְּלִיַּעַל como idiomática descalificación moral, no nombre propio
  english_pob_reading: worthless man
  chosen_spanish_reading: un hombre tan vil
  alternative_spanish_readings:
  - un hijo de Belial
  - un hombre perverso
  rationale: El hebreo funciona aquí como expresión idiomática de bajeza moral y obstinación, no necesariamente como un título demonológico o nombre propio. «Un hombre tan vil» conserva el desprecio moral del pasaje y evita trasladar una tradición posterior que el contexto no obliga a adoptar.
  doctrine_reference: Lexical/theological note on biblical idiom and translation restraint
translation_notes:
  revision_awareness: El texto inglés POB se mantiene sin revisiones posteriores relevantes; la decisión clave estable y auditada es traducir בֶּן בְּלִיַּעַל por un equivalente idiomático de desprecio moral, no por el tradicional «hijo de Belial».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «señor» para אֲדֹנֵינוּ por la relación de subordinación en la narración, coherente con el contexto; no se usó «amo» porque el español bíblico contemporáneo puede sonar más áspero sin aportar mayor precisión aquí.
  - Se usó «casa» para בַּיִת en sentido de casa/linaje/hogar extendido, equivalente a «household» en el audit trail inglés.
  - La nota de pie marca solo la alternativa semántica importante de וּרְאִי; no se añadió nota para בֶּן בְּלִיַּעַל porque la decisión está explicada en los datos de traducción y no requiere ancla adicional en el texto.
