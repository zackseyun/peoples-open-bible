review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y sentido básicos del griego: αὐτὸς δὲ = «Pero él», κρατήσας τῆς χειρὸς αὐτῆς = «la tomó de la mano», ἐφώνησεν λέγων = «llamó, diciendo», y ἔγειρε = «levántate». Sin embargo, la nota léxica para παῖς no preserva fielmente la alternativa documentada del POB inglés. El inglés auditado eligió «Child» con alternativa «Girl»; en español conviene reflejar esa amplitud con «Niña» en el texto y una nota que ofrezca «Niña»/«Hija» no es ideal, porque «hijo/hija» no es la alternativa destacada en la auditoría y puede desviar el valor léxico primario de παῖς aquí.'
  spanish_quality_summary: 'La redacción es natural, clara y digna en español. «Pero él la tomó de la mano y llamó, diciendo: “Niña, levántate”» suena bien, aunque «llamó» sin complemento puede sentirse un poco seco; aun así es aceptable por cercanía a ἐφώνησεν. La principal reparación necesaria está en la nota al pie, no en el cuerpo del texto.'
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo la fidelidad a παῖς. «Niña» es defendible contextual y estilísticamente, pero la nota debe conservar la alternativa semántica principal del registro auditado: «niña»/«hija» no reproduce bien la decisión inglesa «child / girl». Mejor: texto «Niña» con nota «O “Niña”. El griego παῖς puede significar “niño” o, en este contexto, “niña”».'
  issues:
  - severity: medium
    issue: La nota al pie para παῖς introduce «hijo/hija», que no es la alternativa léxica principal preservada en la auditoría inglesa.
    rationale: El POB inglés documenta «Child» con alternativa «Girl». En español, si el texto usa «Niña», la nota debe preservar la amplitud léxica general de παῖς sin desplazarla hacia «hijo/hija», que aquí puede sonar más relacional que vocativa.
  - severity: low
    issue: La nota comienza con «O “Niña”» aunque el texto principal ya dice «Niña».
    rationale: Tal formulación no aporta una alternativa real al lector. La nota debe explicar el rango léxico del griego y/o ofrecer una alternativa distinta, no repetir el texto principal.
  revised_spanish_text: 'Pero él la tomó de la mano y llamó[a], diciendo: «Niña, levántate».'
  revised_footnotes:
  - marker: a
    text: O «Niño». El griego παῖς puede significar «niño» o, en este contexto, «niña».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural en español. Se corrige únicamente la nota para alinearla con la evidencia léxica y la auditoría inglesa: παῖς tiene un sentido básico de «niño/niña», y aquí el contexto exige el femenino «niña». Se elimina la referencia a «hijo/hija», que no representa tan bien la decisión documentada.'
