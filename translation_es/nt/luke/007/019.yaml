translation:
  language: es
  text: 'Envió al Señor[a], diciendo: «¿Eres tú el que ha de venir, o debemos esperar a otro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que viene». La expresión griega puede leerse de modo más descriptivo, pero aquí probablemente funciona como título mesiánico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψεν
  english_pob_choice: He sent
  chosen_spanish: Lo envió
  alternatives_spanish:
  - Lo mandó
  - Le envió un mensaje
  lexicon: πέμπω
  rationale: El aoristo narra una acción puntual pasada. En español, «lo envió» conserva la concisión narrativa y permite que el complemento de destino se exprese con naturalidad en la frase siguiente.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al maestro
  lexicon: πρός + acusativo; κύριος
  rationale: La preposición con acusativo indica dirección hacia una persona. «Señor» mantiene el valor titular de κύριος que el POB inglés ya fijó para Jesús; «maestro» o «dueño» rebajan ese peso cristológico.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y dijo
  lexicon: λέγω
  rationale: El participio presenta el contenido del envío. «Diciendo» reproduce la relación verbal de modo directo y natural en español.
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú
  alternatives_spanish:
  - ¿Tú eres
  - ¿Eres usted
  lexicon: σύ + εἰμί
  rationale: Aunque literalmente es «tú eres», en discurso directo interrogativo el español requiere inversión o estructura interrogativa. «¿Eres tú?» es idiomático y conserva el contraste enfático del griego.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who is to come
  chosen_spanish: el que ha de venir
  alternatives_spanish:
  - el que viene
  - el Venidero
  lexicon: ἔρχομαι
  rationale: El participio sustantivado puede sonar como título mesiánico o como descripción. «El que ha de venir» preserva esa ambigüedad reverente en español sin imponer una formulación demasiado interpretativa; además evita una construcción menos natural como «el que está por venir».
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: ἤ
  rationale: Conjunción disyuntiva simple.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a alguien más
  - a otro distinto
  lexicon: ἄλλος
  rationale: El griego lo presenta como objeto de προσδοκῶμεν. En español, el régimen verbal exige la preposición «a». «A otro» es breve y fiel.
- source_word: προσδοκῶμεν
  english_pob_choice: should we expect
  chosen_spanish: esperaremos
  alternatives_spanish:
  - debemos esperar
  - hemos de esperar
  lexicon: προσδοκάω
  rationale: 'El presente indicativo en pregunta deliberativa puede expresarse en español con futuro interrogativo: «¿esperaremos...?». Esa forma conserva la deliberación y suena natural; «deberíamos esperar» añadiría un matiz modal no explícito.'
theological_decisions:
- issue: Título cristológico κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - dueño
  - maestro
  rationale: El POB inglés preserva «Lord» como título cristológico. En español, «Señor» es el equivalente natural y mantiene la carga reverencial sin diluir el sentido de κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de ὁ ἐρχόμενος como designación mesiánica o descripción
  english_pob_reading: the one who is to come
  chosen_spanish_reading: el que ha de venir
  alternative_spanish_readings:
  - el que viene
  - el esperado
  rationale: La construcción puede leerse descriptivamente, pero en este contexto funciona con fuerza de designación escatológica/mesiánica. «El que ha de venir» conserva la posibilidad de título sin forzar una mayúscula ni una paráfrasis más explicativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2, §3
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés: mantiene κύριος como «Señor», conserva el valor titular/escatológico de ὁ ἐρχόμενος sin sobremarcarlo, y traduce la pregunta deliberativa con una forma española natural («¿esperaremos a otro?») que respeta el matiz de προσδοκῶμεν.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, conforme al criterio doctrinal del proyecto.
  - Se evita «Cristo» porque el griego aquí no lo usa; el posible matiz mesiánico queda en la nota y en «el que ha de venir».
  - La preposición «a» en «a otro» responde al régimen natural del español con objeto directo animado.
