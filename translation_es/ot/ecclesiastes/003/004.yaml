translation:
  language: es
  text: Tiempo para llorar[a], y tiempo para reír; tiempo para hacer duelo[b], y tiempo para danzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «una temporada» en todo el versículo.'
    reason: lexical_alternative
  - marker: b
    text: «Hacer duelo» también puede traducirse «lamentarse» o «lamentar», especialmente en contextos de duelo formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: Tiempo
  alternatives_spanish:
  - Una temporada
  - Una ocasión
  lexicon: HALOT
  rationale: עֵת designa un tiempo, momento u ocasión. En español, «tiempo» conserva la repetición poética del hebreo y suena natural en la serie del versículo. «Temporada» resultaría más forzado en este contexto.
- source_word: לִבְכּוֹת
  english_pob_choice: to weep
  chosen_spanish: llorar
  alternatives_spanish:
  - llorar a lágrima viva
  - sollozar
  lexicon: HALOT
  rationale: El infinitivo de בכה puede expresarse como «llorar» en español sin perder el sentido. Aunque «llorar» es un poco más general que «weeping», aquí mantiene la paridad con el contraste poético y suena más idiomático que una forma más marcada.
- source_word: לִשְׂחוֹק
  english_pob_choice: to laugh
  chosen_spanish: reír
  alternatives_spanish:
  - reírse
  - burlarse
  lexicon: HALOT
  rationale: שׂחק aquí significa con claridad «reír». «Reír» es la opción más directa y sobria en español, y preserva el paralelismo con «llorar».
- source_word: סְפוֹד
  english_pob_choice: to mourn
  chosen_spanish: lamentar
  alternatives_spanish:
  - hacer duelo
  - llorar
  lexicon: HALOT
  rationale: ספד puede referirse al duelo o lamento, a menudo en contexto funerario. El inglés POB optó por «mourn» y anotó que también puede ser «lament». En español, «lamentar» conserva esa amplitud y deja visible la posible formalidad del duelo; «hacer duelo» sería más específico y podría estrechar innecesariamente el término.
- source_word: רְקוֹד
  english_pob_choice: to dance
  chosen_spanish: danzar
  alternatives_spanish:
  - bailar
  lexicon: HALOT
  rationale: רקד significa «danzar». «Danzar» mantiene un tono poético y elevado, acorde con la serie del versículo. «Bailar» sería perfectamente posible, pero es algo más coloquial.
theological_decisions:
- issue: Matiz de ‘mourn/lament’ en el duelo
  english_pob_reading: ‘Mourn’ may also be rendered ‘lament,’ especially in contexts of formal mourning.
  chosen_spanish_reading: «lamentar», con el sentido de duelo o lamento, sin reducirlo a un rito funerario específico.
  alternative_spanish_readings:
  - duelar
  - hacer duelo
  - guardar luto
  rationale: El hebreo ספד puede abarcar lamento por muerte y duelo formal. La elección «lamentar» preserva esa tensión semántica sin imponer una sola práctica cultural; además, deja abierta la lectura de duelo ritual que el inglés POB señaló como alternativa.
  doctrine_reference: Ecclesiastes 3:4; HALOT sobre ספד
translation_notes:
  revision_awareness: No se aplicaron revisiones al texto base inglés; el pasaje fue revisado y se mantuvo sin cambios en el control más reciente, con acuerdo alto entre los cotejos. La traducción española sigue de cerca el patrón poético del hebreo y respeta la alternativa léxica documentada para עֵת y ספד.
  spanish_consistency_notes:
  - Se mantuvo «tiempo» para עֵת por concordancia con la repetición del versículo y con el valor básico del sustantivo.
  - Se eligió «danzar» para conservar el registro poético del cierre.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - La puntuación reproduce el paralelismo coordinado del hebreo con dos miembros dobles.
