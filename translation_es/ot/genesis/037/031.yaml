review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa del hebreo: tomó la prenda de José, mató un macho cabrío y puso la prenda en la sangre. Sin embargo, «sumergieron» sobretraduce וַיִּטְבְּלוּ, que en este contexto se refleja mejor como «mojaron» o «empaparon»/«tiñeron al mojar», y el inglés auditado escogió explícitamente «dipped». Además, la nota léxica amplía indebidamente las alternativas con opciones menos fieles al valor de כְּתֹנֶת.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse con una formulación más precisa y menos fuerte en el verbo de inmersión. «Degollaron un macho cabrío» es comprensible y fiel al acto de sacrificar un animal; «tomaron la túnica de José» y «en la sangre» funcionan bien. La nota al pie debe restringirse a alternativas más cercanas y naturales, alineadas con la auditoría inglesa.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Túnica» alinea bien con כְּתֹנֶת y con la decisión POB. «Macho cabrío» preserva correctamente שְׂעִיר עִזִּים. El ajuste principal es mantener la consistencia léxica de וַיִּטְבְּלוּ con «mojaron» en vez de «sumergieron».
  issues:
  - severity: medium
    issue: «sumergieron» es demasiado fuerte para וַיִּטְבְּלוּ
    rationale: El hebreo aquí describe la acción de meter la túnica en sangre; la auditoría inglesa eligió «dipped». «Sumergieron» puede implicar inmersión completa y suena más marcada de lo necesario.
  - severity: medium
    issue: 'La nota léxica incluye alternativas poco adecuadas: «ropa», «manto» y «vestido»'
    rationale: La nota inglesa solo preserva alternativas cercanas como «robe» y «coat». En español, «ropa» es demasiado genérico, «manto» cambia el tipo de prenda y «vestido» puede inducir una imagen menos precisa. Conviene limitarla a alternativas equivalentes como «túnica», «túnica larga» o «ropa larga» si fuera necesario, pero aquí basta con «túnica», «manto/vestido» no refleja bien el rationale auditado.
  revised_spanish_text: Entonces tomaron la túnica de José[a], degollaron un macho cabrío y mojaron la túnica en la sangre.
  revised_footnotes:
  - marker: a
    text: O «túnica larga» o «ropa de vestir»; el término hebreo denota una prenda tipo túnica.
    reason: lexical_alternative
  revision_rationale: Se cambió «sumergieron» por «mojaron» para reflejar mejor el sentido de «dipped» y evitar una intensificación innecesaria del hebreo. También se corrigió la nota al pie para mantener alternativas léxicas más cercanas al valor de כְּתֹנֶת y al rationale documentado en la auditoría inglesa.
