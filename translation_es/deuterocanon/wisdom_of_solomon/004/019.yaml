review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: deshonra post mortem, oprobio duradero entre los muertos, juicio divino con sujeto implícito, devastación total y borrado de la memoria. Conserva adecuadamente πτῶμα/ἄτιμον/ὕβριν/ἐν νεκροῖς/διʼ αἰῶνος y la decisión teológica de no explicitar a Dios por nombre. Sin embargo, dos giros españoles no preservan de la mejor manera el valor idiomático del original: «sin voz» suena algo físico/abstracto frente a ἀφώνους = ‘mudos/sin poder hablar’, y «en dolor» es poco natural en español para ἐν ὀδύνῃ.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere pulido para sonar natural en español eclesial contemporáneo. «Los derribará de cabeza y sin voz» y «estarán en dolor» resultan poco idiomáticos. Una redacción más natural y fiel sería «los derribará de cabeza y los dejará mudos» o, mejor ajustada al patrón coordinado del inglés auditado, «los derribará de cabeza y mudos»; además «estarán con dolor» sigue siendo débil, por lo que «estarán en angustia» o «sufrirán dolor» expresa mejor el estado. También «hasta lo más extremo» es entendible pero algo rígido; «hasta el extremo» o «por completo» fluye mejor sin perder fuerza.
  glossary_alignment: No hay conflictos con los términos doctrinales del proyecto. No aparecen Yahvé/Mesías/etc. La decisión de mantener «él» para el sujeto implícito está bien alineada con la justificación inglesa. El léxico principal es correcto, pero conviene ajustar ἀφώνους y ἐν ὀδύνῃ a español más natural.
  issues:
  - severity: medium
    issue: «sin voz» para ἀφώνους
    rationale: Aunque comprensible, «sin voz» en español suele sugerir ausencia de voz física o metáfora, mientras que ἀφώνους aquí corresponde mejor a «mudos» o «sin poder hablar», preservando el efecto de quedar silenciados por el juicio.
  - severity: medium
    issue: «estarán en dolor» para ἐν ὀδύνῃ
    rationale: Es un calco poco idiomático en español. El sentido del griego se preserva mejor con «estarán en angustia» o «sufrirán dolor». Dado que el inglés auditado eligió ‘in pain’, «sufrirán dolor» comunica bien el estado sin sonar forzado.
  - severity: low
    issue: «hasta lo más extremo» suena rígido
    rationale: La frase reproduce la intensidad, pero en español natural «hasta el extremo» o «por completo» lee mejor. Es un ajuste estilístico menor, no un error de sentido.
