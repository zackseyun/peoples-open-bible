revisions:
- from: Se levanta cuando aún es de noche, y da comida a su casa, y porción[a] a sus doncellas.
  to: Se levanta cuando aún es de noche, y da comida a su hogar, y porción[a] a sus sirvientas.
  rationale: Se ajusta «a su casa» a «a su hogar» para reflejar mejor la referencia al conjunto doméstico alimentado, conforme al hebreo לְבֵיתָהּ y a la decisión auditada «household». Se cambia «doncellas» por «sirvientas» para comunicar con claridad el rol de servicio de נַעֲרֹתֶיהָ en español actual, evitando una lectura ambigua o demasiado arcaizante. Se conserva «porción» con nota porque reproduce bien el valor de חֹק como cuota o ración asignada.
