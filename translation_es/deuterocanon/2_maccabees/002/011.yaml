translation:
  language: es
  text: Y después de muchos años[a], cuando le agradó a Dios, Nehemías, enviado por el rey de Persia, envió a los descendientes de los sacerdotes que habían ocultado el fuego a buscar el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando pareció bien a Dios» o «cuando le agradó a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντων δὲ ἐτῶν ἱκανῶν
  english_pob_choice: after many years had passed
  chosen_spanish: y después de muchos años
  alternatives_spanish:
  - y después de un tiempo considerable
  - y después de que hubieran pasado muchos años
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto expresa tiempo transcurrido; en español, una cláusula temporal breve y natural transmite mejor el valor que una traducción rígida. 'Muchos años' conserva el matiz de ἱκανῶν sin sobrerregularlo como 'suficientes'.
- source_word: ὅτε ἔδοξεν τῷ θεῷ
  english_pob_choice: when it pleased God
  chosen_spanish: cuando le agradó a Dios
  alternatives_spanish:
  - cuando pareció bien a Dios
  - cuando Dios consideró oportuno
  lexicon: LSJ
  rationale: ἔδοξεν con dativo admite la idea de que algo 'pareció bien' o 'agradó' a Dios. 'Le agradó a Dios' es una forma natural en español y preserva la restricción del griego sin añadir una afirmación más fuerte que el texto.
- source_word: ἀποσταλεὶς Νεεμίας ἀπὸ τοῦ βασιλέως τῆς Περσίδος
  english_pob_choice: Nehemiah, having been sent by the king of Persia
  chosen_spanish: Nehemías, enviado por el rey de Persia
  alternatives_spanish:
  - Nehemías, habiendo sido enviado por el rey de Persia
  - Nehemías, enviado desde el rey de Persia
  lexicon: LSJ
  rationale: El participio aoristo pasivo indica una acción previa respecto del verbo principal; en español, 'enviado por' expresa claramente la comisión. 'Por el rey de Persia' sigue el agente implícito de ἀπό en este contexto.
- source_word: τοὺς ἐκγόνους τῶν ἱερέων
  english_pob_choice: the descendants of the priests
  chosen_spanish: a los descendientes de los sacerdotes
  alternatives_spanish:
  - a los hijos de los sacerdotes
  - a la descendencia de los sacerdotes
  lexicon: LSJ
  rationale: ἐκγόνοι significa 'descendientes' u 'offspring'; 'descendientes' es amplio y preciso, y evita restringir indebidamente el término a 'hijos'.
- source_word: τῶν ἀποκρυψάντων
  english_pob_choice: who had hidden it
  chosen_spanish: que habían ocultado el fuego
  alternatives_spanish:
  - que habían escondido el fuego
  - que lo habían ocultado
  lexicon: LSJ
  rationale: El participio remite a los sacerdotes del relato anterior que ocultaron el fuego sagrado. En español conviene explicitar el objeto por claridad narrativa; 'ocultado' mantiene un registro digno y fiel.
- source_word: ἔπεμψεν ἐπὶ τὸ πῦρ
  english_pob_choice: sent to get the fire
  chosen_spanish: mandó... que fueran a buscarlo
  alternatives_spanish:
  - envió... a buscar el fuego
  - mandó... a buscar el fuego
  lexicon: LSJ
  rationale: πέμπω con ἐπί + acusativo puede expresar enviar en busca de algo. En español, 'mandó... que fueran a buscarlo' reproduce el sentido de finalidad y hace natural la relación entre el sujeto y la misión de recuperación.
theological_decisions:
- issue: La voluntad o agrado divino en ὅτε ἔδοξεν τῷ θεῷ
  english_pob_reading: when it pleased God
  chosen_spanish_reading: cuando le agradó a Dios
  alternative_spanish_readings:
  - cuando pareció bien a Dios
  - cuando Dios consideró oportuno
  rationale: No se trata de una disputa doctrinal, pero sí de una decisión de matiz. 'Le agradó a Dios' conserva la idiomaticidad del griego y la reserva del texto sobre el modo exacto de la decisión divina, sin convertirla en una formulación más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 y 3
translation_notes:
  revision_awareness: El contexto inglés pasó de 'when it seemed good to God' a 'when it pleased God' en la revisión más reciente. La versión española adopta 'cuando le agradó a Dios' por ser la formulación más natural y fiel al valor idiomático del griego, manteniendo abierta la alternativa interpretativa documentada en nota.
  spanish_consistency_notes:
  - Se usa 'Dios' para τῷ θεῷ conforme al estándar POB en español.
  - '''Nehemías'' se conserva como nombre propio sin transliteración adicional.'
  - '''Descendientes'' mantiene el alcance genealógico amplio de ἐκγόνοι y evita una restricción indebida a ''hijos''.'
  - '''Ocultado el fuego'' explicita el objeto implícito por contexto narrativo, apoyado por la frase final del versículo.'
  - La formulación evita 'SEÑOR' y no introduce terminología eclesiástica no sustentada por el griego.
