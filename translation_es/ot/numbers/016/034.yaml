translation:
  language: es
  text: 'Y todo Israel que estaban alrededor de ellos huyeron[a] ante su grito, porque dijeron: «¡No sea que la tierra nos trague!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante su voz». El hebreo qōl puede significar «sonido», «voz» o «grito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todos los israelitas
  - Y la totalidad de Israel
  lexicon: HALOT
  rationale: Con יִשְׂרָאֵל como nombre colectivo, «todo Israel» conserva el sentido corporativo sin convertirlo en una paráfrasis étnica más explicativa de lo que el hebreo exige.
- source_word: אֲשֶׁר סְבִיבֹתֵיהֶם
  english_pob_choice: who were around them
  chosen_spanish: que estaba alrededor de ellos
  alternatives_spanish:
  - que estaban alrededor de ellos
  - que estaban a su alrededor
  lexicon: HALOT
  rationale: La cláusula relativa identifica al Israel que se hallaba cerca de Coré, Datán y Abiram. «Estaba alrededor de ellos» es natural en español y mantiene la ubicación cercana indicada por סְבִיבֹתֵי.
- source_word: נָסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fueron huyendo
  - escapó
  lexicon: HALOT
  rationale: נוס expresa huida apurada. «Huyó» preserva la urgencia narrativa de forma concisa y pública en español.
- source_word: לְ/קֹלָם
  english_pob_choice: at their cry
  chosen_spanish: ante su grito
  alternatives_spanish:
  - ante su voz
  - al oír su clamor
  lexicon: HALOT
  rationale: קול puede ser «voz», «sonido» o «grito». Dado el ajuste revisado del POB inglés hacia «cry», «grito» transmite mejor la reacción audible y el temor del contexto, sin cerrar indebidamente la ambigüedad del término hebreo.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: porque dijeron
  alternatives_spanish:
  - pues dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: כִּי introduce la razón de la huida. «Porque dijeron» es la equivalencia causal más directa y clara en español narrativo.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - Para que no
  - No vaya a ser que
  lexicon: HALOT
  rationale: פֶּן introduce una consecuencia temida. «No sea que» conserva el matiz preventivo y la tensión del discurso directo en español actual.
- source_word: תִּבְלָעֵנוּ
  english_pob_choice: swallow us up
  chosen_spanish: nos trague
  alternatives_spanish:
  - nos devore
  - nos haga desaparecer
  lexicon: HALOT
  rationale: בלע, en este contexto, alude a la tierra abriéndose y tragando personas. «Nos trague» es idiomático en español y mantiene la imagen concreta del texto.
- source_word: הָ/אָֽרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: HALOT
  rationale: Aunque «earth» puede ser «tierra» o «suelo», aquí conviene «la tierra» porque enlaza con la escena inmediata de la apertura de la tierra en el relato y su fuerza personificada.
theological_decisions:
- issue: Alcance de קולָם en el contexto del juicio
  english_pob_reading: at their cry
  chosen_spanish_reading: ante su grito
  alternative_spanish_readings:
  - ante su voz
  - al oír su clamor
  rationale: No se debe reducir קול a un simple «sonido» genérico, porque el contexto narrativo sugiere una manifestación audible intensa ligada al juicio. «Grito» sigue la revisión inglesa más precisa y conserva la tensión sin fijar más de lo que el hebreo asegura.
  doctrine_reference: Números 16:34; decisión lexical-contextual
- issue: Imagen de la tierra que traga
  english_pob_reading: Lest the earth swallow us up!
  chosen_spanish_reading: ¡No sea que la tierra nos trague!
  alternative_spanish_readings:
  - ¡No sea que la tierra nos devore!
  - ¡No vaya a ser que la tierra nos trague!
  rationale: La imagen debe permanecer corporal y concreta, como en el hebreo y en el juicio previo del pasaje. «Trague» comunica la acción de בלע sin suavizarla ni convertirla en un mero idiomático abstracto.
  doctrine_reference: Números 16:32-34; continuidad narrativa
translation_notes:
  revision_awareness: Se siguió el ajuste revisado del POB inglés en la frase de לְקֹלָם, prefiriendo una equivalencia que refleje mejor el contexto inmediato. La redacción española mantiene la escena narrativa y la imagen del juicio sin añadir explicaciones externas.
  spanish_consistency_notes:
  - Se usó «la tierra» para הָאָרֶץ, en continuidad con la escena de la tierra que se abre en el contexto inmediato.
  - Se mantuvo «todo Israel» como colectivo corporativo, en línea con el valor narrativo del hebreo.
  - Se evitó «SEÑOR» o fórmulas de sustitución porque el versículo no contiene el tetragrámaton ni un κύριος relevante.
  - 'Se conservó el registro reverente y directo de la cita: breve, concreto y apto para lectura litúrgica.'
