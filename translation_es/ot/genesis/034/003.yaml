translation:
  language: es
  text: Su alma se apegó a Dina[a], la hija de Jacob, y amó a la joven y habló al corazón de la joven[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su ser interior se apegó a Dina». El hebreo dice literalmente: «su alma se apegó a Dina».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habló al corazón de la joven», una expresión idiomática que puede significar hablar con ternura, amablemente o para darle ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּדְבַּק
  english_pob_choice: clung
  chosen_spanish: se apegó
  alternatives_spanish:
  - se pegó a
  - se unió a
  - se adherió a
  lexicon: HALOT
  rationale: דבק expresa adhesión intensa o pegamiento estrecho. En español, "se apegó" conserva la fuerza relacional sin sonar mecánico ni demasiado interpretativo.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser interior
  - él mismo
  lexicon: HALOT
  rationale: נפש puede significar alma, vida, persona o interioridad. "Su alma" preserva el giro hebreo y la intensidad afectiva del texto.
- source_word: בְּדִינָה
  english_pob_choice: to Dinah
  chosen_spanish: a Dina
  alternatives_spanish:
  - con Dina
  - hacia Dina
  lexicon: HALOT
  rationale: Con דבק + ב, el español natural requiere la preposición "a" para expresar el apego dirigido a Dina.
- source_word: בַּת יַעֲקֹב
  english_pob_choice: the daughter of Jacob
  chosen_spanish: la hija de Jacob
  alternatives_spanish:
  - la hija de Jacob que
  - Jacob, su hija
  lexicon: HALOT
  rationale: Mantiene la aposición hebrea de modo claro y fiel, sin convertirla en una forma más posesiva que el hebreo.
- source_word: וַיֶּאֱהַב
  english_pob_choice: he loved
  chosen_spanish: amó
  alternatives_spanish:
  - quería
  - se enamoró de
  lexicon: HALOT
  rationale: אהב es el verbo normal para amar. "Amó" conserva la afirmación directa sin introducir un matiz romántico más fuerte que el del hebreo.
- source_word: הַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  - la muchacha doncella
  lexicon: HALOT
  rationale: נערה puede referirse a una joven o muchacha. "La joven" es español contemporáneo, digno y no diminutivo.
- source_word: וַיְדַבֵּר עַל לֵב
  english_pob_choice: spoke to the heart of
  chosen_spanish: habló al corazón de
  alternatives_spanish:
  - habló al ánimo de
  - habló con ternura a
  - habló consoladoramente a
  lexicon: HALOT
  rationale: 'El idiomático דבר על־לב se refleja mejor con una construcción española igualmente literal y comprensible. "Habló al corazón de" preserva la imagen y deja abierta la gama de matices: consuelo, persuasión, ternura.'
- source_word: הַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia para la repetición del término, con consistencia terminológica en español.
theological_decisions:
- issue: Descripción de la atracción de Shequem sin suavizar el contexto narrativo de violencia previo
  english_pob_reading: Retain the verse's own description of Shechem's attachment and love without softening or excusing the wrongdoing narrated in the surrounding context.
  chosen_spanish_reading: Conservar la descripción del apego y del amor de Shequem sin suavizarla ni añadir una censura o romanticización que el versículo no explicita.
  alternative_spanish_readings:
  - Introducir un tono más condenatorio en la traducción
  - Convertir el pasaje en un lenguaje más romántico
  rationale: El hebreo informa de manera directa su apego, amor y discurso. La traducción debe reflejar eso sin absorber en el versículo un juicio moral que pertenece al contexto narrativo más amplio.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que prefirió una equivalencia más formal en la última cláusula: no se usa una paráfrasis como "con ternura", sino la imagen hebrea "habló al corazón de" en español natural.'
  spanish_consistency_notes:
  - Se usa "Dina" como forma española del nombre, en armonía con el texto fuente y la tradición bíblica castellana contemporánea.
  - Se mantiene "corazón" como equivalente de לֵב para conservar la metáfora semítica del centro interior de la persona.
  - La repetición de "la joven" reproduce la repetición hebrea de הַנַּעֲרָ sin introducir variación estilística innecesaria.
  - No se emplea "Cristo", "SEÑOR" ni terminología teológica ajena al versículo, ya que el texto no contiene esos términos.
