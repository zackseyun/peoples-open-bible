translation:
  language: es
  text: Caerán entre los muertos a espada. La espada es dada[a]; arrástrenla[b], y toda su multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una espada es asignada». La cláusula hebrea es breve y puede expresar que la espada ha sido destinada para juicio.'
    reason: alternative_reading
  - marker: b
    text: Es decir, Egipto personificado, junto con todo su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en medio de los
  lexicon: HALOT
  rationale: La expresión hebrea indica estar dentro del grupo; en español, «en medio de» conserva la idea espacial y de pertenencia al conjunto de los caídos sin sonar forzada.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: los heridos por la espada
  alternatives_spanish:
  - los muertos a espada
  - los caídos a espada
  lexicon: HALOT
  rationale: El sustantivo hebreo designa a los abatidos por arma de guerra. «Heridos por la espada» mantiene la imagen violenta y permite una lectura amplia de los caídos en combate, aunque en castellano también puede oírse como «muertos» implícitamente.
- source_word: יִפֹּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - caerán en combate
  lexicon: HALOT
  rationale: El imperfecto tiene valor futuro/profético; «caerán» es natural en español y conserva el tono predictivo.
- source_word: חֶרֶב נִתָּנָה
  english_pob_choice: The sword is given
  chosen_spanish: La espada es dada
  alternatives_spanish:
  - La espada está dada
  - Una espada es asignada
  - La espada ha sido entregada
  lexicon: HALOT
  rationale: Se conserva la construcción abrupta y pasiva del hebreo sin resolverla excesivamente. «Es dada» refleja la tersura oracular y mantiene la tensión interpretativa documentada en el inglés.
- source_word: מָשְׁכ֥וּ אוֹתָהּ
  english_pob_choice: drag her away
  chosen_spanish: arrástrenla
  alternatives_spanish:
  - arrástrenla lejos
  - llévenla arrastrando
  lexicon: HALOT
  rationale: El imperativo plural pide una acción enérgica; «arrástrenla» reproduce el mandato violento. El complemento «lejos» no aparece en el hebreo y se omite para no añadir más de lo debido.
- source_word: וְכָל הֲמוֹנֶיהָ
  english_pob_choice: and all her multitude
  chosen_spanish: y toda su multitud
  alternatives_spanish:
  - y todos sus muchos
  - y toda su muchedumbre
  - y todas sus hordas
  lexicon: HALOT
  rationale: «Multitud» es la opción más amplia y neutral para הָמוֹן. Se mantiene el posesivo femenino por la personificación de Egipto, tal como en el POB inglés.
theological_decisions:
- issue: Referente del pronombre femenino singular
  english_pob_reading: 'The pronoun refers to Egypt personified as a feminine entity: ''drag her away.'''
  chosen_spanish_reading: 'El pronombre femenino se refiere a Egipto personificado: «arrástrenla».'
  alternative_spanish_readings:
  - arrástrenlo
  - arrástrenla a ella
  rationale: El contexto de Ezequiel personifica a Egipto como figura femenina. Conservar el femenino preserva la sátira profética y la coherencia con la lectura auditada del POB inglés.
  doctrine_reference: Personificación profética en los oráculos contra las naciones.
- issue: Interpretación de la cláusula hebrea breve חֶרֶב נִתָּנָה
  english_pob_reading: Rendered literally as 'The sword is given.'
  chosen_spanish_reading: 'Se traduce literalmente: «La espada es dada».'
  alternative_spanish_readings:
  - La espada está asignada
  - Una espada ha sido dada
  rationale: La cláusula es comprimida y ambigua; una traducción literal preserva la tensión textual y evita decidir más de lo que el hebreo exige.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB inglés que cambió 'with' por 'and' en la cláusula final para reflejar más literalmente la conjunción hebrea waw (וְ). El español reproduce esa coordinación con «y».
  spanish_consistency_notes:
  - Se mantiene «espada» en todo el versículo para conservar el paralelismo.
  - Se preserva el femenino singular para el referente nacional personificado, en coherencia con el contexto de Egipto.
  - Se evita resolver la ambigüedad de חֶרֶב נִתָּנָה más allá de lo que permite el hebreo, siguiendo la nota auditada.
  - La puntuación separa las dos cláusulas principales de modo que el ritmo oracular quede claro en español.
