base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/033/020.yaml
  text: To son and wife[a], to brother and friend, do not give authority over yourself during your lifetime; and do not give your possessions to another[c][b], lest you regret it and have to plead for them.
  footnotes:
  - marker: a
    text: Or 'do not give control over yourself.' The Greek speaks of granting ἐξουσία, authority or power, over oneself.
    reason: lexical_alternative
  - marker: b
    text: Or 'your possessions' or 'your money.' The Greek χρήματα can refer broadly to property, goods, or money.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'lest, having regretted it, you be in need concerning them.' The sense is that after giving away your assets, you may have to ask for them back.
    reason: lexical_alternative
