translation:
  language: es
  text: Pues para todo asunto[a] hay un tiempo y un juicio, porque la maldad[b] del hombre pesa gravemente sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para todo propósito' o 'para todo asunto/afair'.
    reason: lexical_alternative
  - marker: b
    text: O 'el mal del hombre', o 'la miseria del hombre'; también puede entenderse como 'la aflicción de la humanidad es grande sobre él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación del dicho previo; en español, «Porque» reproduce bien la relación causal/discursiva sin forzar un giro más interpretativo.
- source_word: לְכָל חֵפֶץ
  english_pob_choice: for every matter
  chosen_spanish: para todo asunto
  alternatives_spanish:
  - para todo propósito
  - para todo asunto/negocio
  - para toda cosa
  lexicon: HALOT
  rationale: חֵפֶץ abarca propósito, asunto o materia. En este contexto de Eclesiastés, «asunto» conserva la amplitud semántica y suena natural en español, evitando reducirlo a «deleite» o «deseo».
- source_word: יֵשׁ עֵת
  english_pob_choice: there is a time
  chosen_spanish: hay un tiempo
  alternatives_spanish:
  - hay un momento
  - existe un tiempo
  lexicon: HALOT
  rationale: La cláusula existencial se traduce de forma directa. «Tiempo» preserva el término hebreo sin sobreespecificar una cita o cita fija.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and a judgment
  chosen_spanish: y un juicio
  alternatives_spanish:
  - y una justicia
  - y un fallo
  - y un orden
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, decisión legal, justicia u orden debido. «Juicio» conserva el núcleo semántico y la solemnidad del paralelo con «tiempo».
- source_word: רָעַת הָאָדָם
  english_pob_choice: the evil of man
  chosen_spanish: la maldad del hombre
  alternatives_spanish:
  - el mal del hombre
  - la miseria del hombre
  - el mal de la humanidad
  lexicon: HALOT
  rationale: El hebreo admite tanto «maldad/evil» como «miseria/trouble». Dado que la POB inglesa mantuvo «evil» en el texto principal y reservó la alternativa de «misery», en español se mantiene «maldad» para no borrar esa tensión lexical; «maldad» también encaja con la forma genitiva del hebreo.
- source_word: רַבָּה עָלָיו
  english_pob_choice: weighs heavily upon him
  chosen_spanish: pesa mucho sobre él
  alternatives_spanish:
  - pesa gravemente sobre él
  - cae con gran peso sobre él
  - le resulta muy pesada
  lexicon: HALOT
  rationale: La imagen idiomática expresa algo grande o pesado que recae sobre la persona. «Pesa mucho sobre él» transmite ese peso de manera natural en español y conserva la metáfora.
theological_decisions:
- issue: Sentido de רָעָה en contexto sapiencial
  english_pob_reading: evil
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - miseria
  - aflicción
  - tristeza
  - calamidad
  rationale: El hebreo es semánticamente amplio. Se mantiene una lectura literal y fuerte en el texto principal para no resolver la tensión; las opciones contextuales quedan abiertas para lectura exegética y eventual nota textual si el proyecto la requiere.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not flatten documented lexical range.'
- issue: Alcance genérico de הָאָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la persona
  rationale: La forma hebrea es singular genérica. «El hombre» preserva la representación formal del original y la decisión antropológica de la POB inglesa, sin neutralizar el género gramatical del texto fuente.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)''.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando todas las notas al pie no ancladas. La redacción principal ahora no contiene marcadores de nota, por lo que no se incluyen footnotes. También se evitó duplicar la apertura causal de כִּי y se mantuvo una sintaxis española fluida y verificable frente al hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo requiere.
  - Se mantuvo «juicio» para מִשְׁפָּט por coherencia con el rango legal/sapiencial documentado.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el hebreo.
  - La traducción evita calcos como «hay un tiempo» si no aportan claridad; aquí «hay un tiempo» es idiomático y fiel.
  - No se introdujeron notas al pie porque no hay marcadores anclados en el texto español final.
