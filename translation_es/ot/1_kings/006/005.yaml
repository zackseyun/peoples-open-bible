  - severity: medium
    issue: «una estructura alrededor»
    rationale: Es una reproducción demasiado cercana del orden inglés revisado, pero en español suena poco natural. Debe expresarse como estructura adosada/en torno al edificio sin perder la repetición de סָבִיב.
  - severity: low
    issue: «junto al muro» podría ser más preciso
    rationale: No es erróneo, pero «adosada al muro» comunica mejor la idea de una construcción anexada al muro, acorde con la nota léxica del inglés.
