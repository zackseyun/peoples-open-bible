translation:
  language: es
  text: Y roció con parte de ello sobre el altar siete veces[a], y ungió el altar y todos sus utensilios, y la fuente y su soporte[b], para consagrarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ello»; el hebreo dice literalmente «de él», en referencia al aceite de la unción mencionado en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «la pileta y su base».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּז
  english_pob_choice: He sprinkled
  chosen_spanish: esparció
  alternatives_spanish:
  - asperjó
  - roció
  lexicon: HALOT
  rationale: El verbo hebreo en contexto ritual describe la aplicación de un líquido en pequeñas porciones. «Esparció» comunica bien esa acción en español bíblico moderno; «asperjó» es más técnico y «roció» puede sonar menos ceremonial.
- source_word: מִמֶּנּוּ
  english_pob_choice: some of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de ella
  - de eso
  lexicon: HALOT
  rationale: La preposición מן con sufijo pronominal significa literalmente «de ello / de él». En español, después de un verbo como «esparcir», «de ello» conserva la referencia al aceite del contexto sin añadir la idea de cantidad que no aparece explícitamente.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Término estándar para מזבח en contexto sacrificial y cultual.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  lexicon: HALOT
  rationale: Equivalente directo y natural en español para la expresión adverbial de repetición ritual.
- source_word: וַיִּמְשַׁח
  english_pob_choice: and he anointed
  chosen_spanish: y ungió
  alternatives_spanish:
  - y lo consagró con aceite
  - y lo untó con aceite
  lexicon: HALOT
  rationale: משׁח en ritos cultuales se expresa con «ungir». Mantiene el valor ritual y la relación con el aceite mejor que una paráfrasis explicativa.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus instrumentos
  - todos sus implementos
  lexicon: HALOT
  rationale: «Utensilios» reproduce de forma clara y amplia el campo de כְּלִי para el equipo del santuario sin caer en un tecnicismo innecesario.
- source_word: הַכִּיֹּר
  english_pob_choice: the basin
  chosen_spanish: la batea
  alternatives_spanish:
  - la pileta
  - la vasija para lavar
  lexicon: HALOT
  rationale: כִּיּוֹר designa el recipiente de lavado del tabernáculo. «Batea» es comprensible y evita el arcaísmo de «laver»; «pileta» puede sonar demasiado regional o doméstico.
- source_word: כַּנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su soporte
  alternatives_spanish:
  - su base
  - su pedestal
  lexicon: HALOT
  rationale: כֵּן señala la pieza de apoyo del recipiente. «Soporte» es neutral y funcional en español, y preserva la idea de estructura portante.
- source_word: לְקַדְּשָׁם
  english_pob_choice: to consecrate them
  chosen_spanish: para consagrarlos
  alternatives_spanish:
  - para santificarlos
  - para hacerlos santos
  lexicon: HALOT
  rationale: קדשׁ aquí expresa la puesta aparte de objetos para uso sagrado. «Consagrar» comunica con precisión la dedicación cultual sin introducir un sentido doctrinal posterior.
theological_decisions:
- issue: Terminología cultual para objetos sagrados
  english_pob_reading: Use established but readable ritual language ('anointed,' 'consecrate') without importing later doctrinal meaning.
  chosen_spanish_reading: Usar lenguaje ritual claro («ungió», «consagrarlos») sin trasladar al texto una carga doctrinal posterior.
  alternative_spanish_readings:
  - usar «santificarlos»
  - usar «hacerlos santos»
  rationale: El versículo trata de la dedicación del altar y sus utensilios en un rito sacerdotal. «Consagrar» preserva el valor de apartar para uso santo y suena natural en español bíblico contemporáneo.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés y no requiere revisión adicional: mantiene la acción ritual, la referencia contextual al aceite y la alternativa léxica del recipiente de lavado con su soporte.'
  spanish_consistency_notes:
  - Se prefirió «ungió» para משׁח por coherencia con el lenguaje ritual del Pentateuco.
  - «Consagrarlos» mantiene el sentido de poner objetos aparte para uso sagrado, en paralelo con el inglés POB «to consecrate them».
  - «Batea» se eligió como equivalente moderno y comprensible de כִּיּוֹר, con nota alternativa para «pileta»/«base» donde el español crea una nueva ambigüedad.
