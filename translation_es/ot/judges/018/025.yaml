    rationale: La nota [a] está puesta tras «le dijeron» pero habla de «los danitas»/«los hijos de Dan»; la nota [b] explica «caigan sobre ustedes», mientras que la nota inglesa b era sobre la literalidad de «Do not let your voice be heard among us». Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: 'Inconsistencia de persona: «tu voz… ustedes».'
    rationale: El hebreo se dirige a una sola persona (2ms). «Caigan sobre ustedes» introduce plural innecesario y enturbia la amenaza individual.
  - severity: medium
    issue: «La vida de tu casa» es poco natural y no comunica bien el sentido colectivo.
    rationale: Aunque el hebreo usa singular נפש, el sentido es las vidas de los miembros de su casa. En español «la vida de tu casa» puede sonar abstracto o referirse al hogar como edificio/unidad.
  - severity: low
    issue: «Hombres amargados de alma» es algo rígido.
    rationale: No es infiel, pero «hombres de alma amarga» conserva mejor la imagen con español más fluido.
