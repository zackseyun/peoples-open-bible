translation:
  language: es
  text: 'Para los hijos de Dan[a], por sus generaciones, por sus clanes, por sus casas paternas, según el número de nombres, desde los veinte años en adelante, todo varón apto para salir a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el que es apto para salir a la guerra». El hebreo dice literalmente «todo el que sale al ejército / a la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי דָן
  english_pob_choice: For the sons of Dan
  chosen_spanish: Para los hijos de Dan
  alternatives_spanish:
  - De los hijos de Dan
  - Para los descendientes de Dan
  lexicon: HALOT
  rationale: En esta fórmula censal, el l/ prefijal introduce el encabezado tribal. «Hijos» conserva la correspondencia formal con el hebreo y mantiene el carácter masculino del registro censal, coherente con la función militar del pasaje.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus descendientes
  lexicon: HALOT
  rationale: En este contexto, תולדות no apunta solo a descendencia biológica, sino a divisiones genealógicas dentro de la tribu. «Por sus generaciones» conserva la estructura formulística y el valor de linaje del término.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  lexicon: HALOT
  rationale: «Clan» distingue bien מִשְׁפָּחָה del siguiente nivel, «casas paternas», y evita aplanar ambos términos en «familias». Mantiene la organización tribal técnica del texto.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - por sus casas de los padres
  - por sus casas ancestrales
  lexicon: HALOT
  rationale: Es una expresión técnica de organización de parentesco en Israel. «Casas paternas» preserva la relación de linaje y la estructura social mejor que una formulación más general.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - conforme al número de nombres
  - por número de nombres
  lexicon: HALOT
  rationale: La frase es idiomática para el conteo de individuos. «Número de nombres» sigue de cerca el hebreo sin volverlo oscuro en español y mantiene el carácter contable del censo.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - desde los veinte años y más
  - a partir de los veinte años
  lexicon: HALOT
  rationale: Es la fórmula estándar de edad para el censo. «En adelante» conserva el sentido y una cadencia natural en español, equivalente a «and upward».
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every male able to go out to war
  chosen_spanish: todo varón apto para salir a la guerra
  alternatives_spanish:
  - todo hombre apto para ir a la guerra
  - todo el que puede salir a la guerra
  lexicon: HALOT
  rationale: El hebreo usa lenguaje masculino y un modismo militar literal («salir a la guerra»). «Varón» conserva la referencia masculina explícita mejor que una forma genérica, y «apto» expresa la capacidad requerida sin borrar el modismo.
theological_decisions:
- issue: Referencia masculina en el censo militar
  english_pob_reading: every male able to go out to war
  chosen_spanish_reading: todo varón apto para salir a la guerra
  alternative_spanish_readings:
  - todo hombre apto para salir a la guerra
  - todo el que es apto para salir a la guerra
  rationale: El pasaje define a los varones militarmente elegibles de la tribu; neutralizar el sujeto borraría una tensión gramatical y funcional del hebreo. «Varón» mantiene la lectura masculina explícita, en línea con la revisión inglesa que sustituyó «man» por «male» para acercarse más al original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «every man able to go out to war» a «every male able to go out to war» para reflejar con mayor precisión el masculino del hebreo. La versión española sigue esa misma corrección con «todo varón», y conserva la fórmula censal completa sin ampliar ni suavizar el modismo militar.
  spanish_consistency_notes:
  - Mantuve «Yahvé» como norma general del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - 'Conservé la secuencia técnica de la fórmula censal: hijos → generaciones → clanes → casas paternas → número de nombres → edad → aptitud militar.'
  - Usé «varón» en vez de «hombre» para evitar una ambigüedad genérica en español y reflejar mejor el masculino explícito del hebreo.
