  text: para Jakin, el vigésimo primero; para Gamul, el vigésimo segundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/יָכִין
  english_pob_choice: for Jakin
  chosen_spanish: para Jakin
  alternatives_spanish:
  - a Jakin
  - correspondiente a Jakin
  lexicon: HALOT
  rationale: En este contexto de lista por sorteo o asignación, el לְ indica la porción asignada a la casa nombrada. En español, «para» comunica de manera natural esa asignación sin introducir una relación posesiva que el hebreo no exige.
- source_word: אֶחָד וְ/עֶשְׂרִים
  english_pob_choice: the twenty-first
  chosen_spanish: el vigésimo primero
  alternatives_spanish:
  - el veintiuno
  - uno y veinte
  lexicon: HALOT
  rationale: Aunque la forma hebrea es cardinal, en esta enumeración funciona con valor ordinal. «Vigésimo primero» preserva el orden de la lista y resulta más natural y fiel en español que una forma cardinal literal.
- source_word: לְ/גָמוּל
  english_pob_choice: for Gamul
  chosen_spanish: para Gamul
  alternatives_spanish:
  - a Gamul
  - correspondiente a Gamul
  lexicon: HALOT
  rationale: Se mantiene la misma relación de asignación marcada por לְ que en la primera cláusula. La transliteración del nombre conserva la decisión onomástica del texto base inglés y del hebreo.
- source_word: שְׁנַיִם וְ/עֶשְׂרִים
  english_pob_choice: the twenty-second
  chosen_spanish: el vigésimo segundo
  alternatives_spanish:
  - el veintidós
  - dos y veinte
  lexicon: HALOT
  rationale: La forma hebrea es cardinal en la superficie, pero aquí tiene función ordinal dentro de una lista secuencial. «Vigésimo segundo» expresa esa función sin perder el sentido del registro enumerativo.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa muestran un acuerdo alto y no presentan variantes textuales ni tensiones léxicas adicionales; por eso la redacción española sigue de cerca la estructura enumerativa sin añadir notas.
  spanish_consistency_notes:
  - Se conserva «Jakin» y «Gamul» como transliteraciones de nombres propios.
  - Se usa «para» para la asignación por lote/orden, consistente en ambas cláusulas.
  - Se opta por ordinales españoles («vigésimo primero», «vigésimo segundo») porque la función del hebreo en la serie es ordinal, no cardinal.
