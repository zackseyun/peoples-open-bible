translation:
  language: es
  text: Cuando Jacob llegó a Egipto, sus padres[a] clamaron a Yahvé, y Yahvé envió a Moisés y a Aarón, y ellos sacaron a sus padres de Egipto y los establecieron en este lugar.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus padres»; también puede entenderse como «sus antepasados».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los hicieron habitar en este lugar» o «los asentaron en este lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al tiempo que
  - Así como
  lexicon: HALOT
  rationale: La cláusula introduce un marco temporal histórico; «Cuando» es natural en español y conserva la relación temporal del relato.
- source_word: בָּא
  english_pob_choice: came into
  chosen_spanish: llegó a
  alternatives_spanish:
  - vino a
  - entró en
  lexicon: HALOT
  rationale: El verbo expresa llegada hacia Egipto. «Llegó a» suena natural en español y conserva el sentido direccional sin endurecer la frase.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio estándar.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - suplicaron
  lexicon: HALOT
  rationale: El verbo describe un clamor urgente de auxilio; «clamaron» mantiene el tono de súplica intensa mejor que un simple «llamaron».
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres/antepasados
  lexicon: HALOT
  rationale: Se conserva la referencia literal a «padres», que en este contexto histórico-covenantal funciona como designación de los antecesores del pueblo. La nota permite la alternativa «antepasados».
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir directamente el nombre divino como «Yahvé» en el texto principal, manteniendo la dirección de la súplica con la preposición «a».
- source_word: וַיִּשְׁלַח יְהוָה
  english_pob_choice: and Yahweh sent
  chosen_spanish: y Yahvé envió
  alternatives_spanish:
  - y Yahvé mandó
  - y Yahvé despachó
  lexicon: HALOT
  rationale: «Envío» reproduce con naturalidad el verbo hebreo שׁלח y conserva la idea de comisión divina.
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - a Moisés y Aarón
  lexicon: HALOT
  rationale: Se mantienen los nombres propios con el régimen preposicional natural del español para objetos directos personales.
- source_word: וַיּוֹצִיאוּ
  english_pob_choice: they brought ... out
  chosen_spanish: ellos sacaron
  alternatives_spanish:
  - ellos sacaron fuera
  - ellos hicieron salir
  lexicon: HALOT
  rationale: El plural refiere a Moisés y Aarón como agentes del éxodo. «Sacaron» conserva la fuerza de sacar fuera y resulta natural en español.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Después de «sacaron», «de Egipto» expresa adecuadamente el punto de salida sin redundancia innecesaria.
- source_word: וַיֹּשִׁבוּם
  english_pob_choice: settled them
  chosen_spanish: los establecieron
  alternatives_spanish:
  - los hicieron habitar
  - los asentaron
  lexicon: HALOT
  rationale: El causativo de ישׁב implica hacer habitar o establecer. «Los establecieron» es claro y conserva el sentido de asentamiento permanente.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en este sitio
  lexicon: HALOT
  rationale: «En este lugar» reproduce con fidelidad la deixis del hebreo y suena natural en un discurso público.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto español pide usar «Yahvé» en el texto principal para el Tetragrámaton. Se conserva el nombre del pacto, en vez de ocultarlo bajo una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia a אֲבֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus ancestros
  rationale: Se mantiene la formulación literal del hebreo, que enlaza retóricamente a la generación oyente con sus antecesores en la historia de la salvación; la alternativa «antepasados» queda señalada en la nota.
  doctrine_reference: Éxodo y memoria pactual en el discurso de Samuel; cf. la función histórica de «vuestros padres» en la narración bíblica
- issue: Acción de Moisés y Aarón
  english_pob_reading: they brought your fathers out of Egypt
  chosen_spanish_reading: ellos sacaron a sus padres de Egipto
  alternative_spanish_readings:
  - ellos los guiaron fuera de Egipto
  - los hicieron salir de Egipto
  rationale: La forma plural del verbo se conserva para reflejar a Moisés y Aarón como agentes humanos subordinados a Yahvé. «Sacaron» expresa la liberación histórica sin perder la atribución a los mediadores humanos.
  doctrine_reference: Narrativa del éxodo; mediación instrumental bajo acción divina
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que prefirió «out of Egypt» por ser más natural que «out from Egypt». En español se refleja con «de Egipto» tras «sacaron», manteniendo fluidez sin perder el valor direccional del hebreo. También se preserva la decisión auditada de traducir el nombre divino como Yahvé en el texto principal, conforme al criterio español del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se mantuvo el paralelismo histórico del verso con verbos directos y concretos: «llegó», «clamaron», «envió», «sacaron», «establecieron».'
  - Se evitó «SEÑOR» para no ocultar el nombre divino, y se evitó «Cristo» porque no aparece en el verso.
  - «Sus padres» conserva el tenor literal del hebreo; la nota ofrece «antepasados» para lectores que prefieran una equivalencia más inclusiva en sentido genealógico.
