review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca las decisiones auditadas en inglés: «será anulado», «acuerdo», «el Seol», y la imagen del azote que pasa. Sin embargo, hay un desajuste importante de notas: la nota [a] está anclada a «anulado» pero en realidad explica la alternativa para «azote arrollador» (שׁוֹט שׁוֹטֵף), mientras que la nota [b] sobre Seol sí corresponde. También conviene ajustar la segunda persona para coherencia interna y mejorar la naturalidad final.'
  spanish_quality_summary: El español es mayormente claro y digno, pero mezcla «tu» con «seréis», lo cual rompe la consistencia de tratamiento. Además, «un lugar para ser hollado» es comprensible pero menos idiomático y algo pesado; «un lugar de pisoteo» o «seréis pisoteados por él» serían opciones, aunque la primera preserva mejor la nominalidad hebrea. La mejor reparación mínima es mantener la imagen nominal y corregir la concordancia a segunda persona singular.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Seol» preserva la transliteración deseada; no hay conflicto con Yahvé/Mesías. «Pacto» para בְּרִית y «acuerdo» para חָזוּת son defendibles en contexto. «Azote arrollador» es aceptable para שׁוֹט שׁוֹטֵף, con la alternativa literal en nota. Se debe corregir únicamente la colocación del marcador de la nota [a] y la consistencia pronominal.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «anulado» pero explica una alternativa para «azote arrollador».
    rationale: Esto desinforma al lector y rompe la correspondencia exigida entre marcador y palabra/frase anotada. La nota lexical_alternative debe aparecer en la frase relevante del azote, no en כֻפַּר.
  - severity: medium
    issue: 'Inconsistencia de tratamiento: «tu ... tu ... seréis».'
    rationale: El verso usa segunda persona plural en hebreo, pero el borrador mezcla singular y plural. En español bíblico legible conviene uniformar. Dado que ya aparece «tu» dos veces, una reparación mínima es pasar el verbo final a singular; alternativamente todo podría ir en plural.
  - severity: low
    issue: «un lugar para ser hollado» suena algo forzado.
    rationale: Es entendible y bastante fiel, pero menos natural que «un lugar de pisoteo». Aun así, puede mantenerse si se busca conservar la imagen concreta de מִרְמָס sin parafrasear demasiado.
  revised_spanish_text: Y tu pacto con la muerte será anulado, y tu acuerdo con el Seol[b] no permanecerá; cuando pase el azote arrollador[a], serás para él un lugar para ser hollado.
