translation:
  language: es
  text: El necio deja salir todo su espíritu[a], pero el sabio lo retiene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su ánimo» o «su temperamento». El hebreo רוּחַ puede referirse al impulso interior, al desahogo emocional o al temperamento; también puede entenderse: «El necio da rienda suelta a todo su temperamento, pero el sabio lo calma y lo retiene».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo
  - cada
  lexicon: HALOT
  rationale: El cuantificador intensifica la idea de una descarga sin freno. «Todo» conserva esa totalidad de manera natural en español.
- source_word: ר֭וּח/וֹ
  english_pob_choice: his spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - temperamento
  - aliento
  lexicon: HALOT
  rationale: רוּחַ puede expresar espíritu, impulso interior, ánimo o temperamento. Se mantiene «espíritu» para conservar la imagen hebrea; el contexto sapiencial permite entender el sentido de impulso interior o desahogo emocional sin estrecharlo demasiado.
- source_word: יוֹצִ֣יא
  english_pob_choice: lets out
  chosen_spanish: lo saca
  alternatives_spanish:
  - lo deja salir
  - lo desahoga
  - lo ventila
  lexicon: HALOT
  rationale: El hiphil de יצא comunica hacer salir. «Lo saca» conserva la metáfora de expulsar o dejar salir lo que está dentro, sin volverla demasiado explicativa.
- source_word: כְסִ֑יל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְסִיל es el necio moral y práctico. «Neceo»/«insensato» son equivalentes posibles; «el necio» es breve y corresponde bien al registro proverbial.
- source_word: חָכָ֗ם
  english_pob_choice: a wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - la persona sabia
  lexicon: HALOT
  rationale: El sustantivo/adjetivo funciona aquí de manera genérica en el proverbio. «El sabio» reproduce mejor la forma proverbial compacta del hebreo que una ampliación explicativa.
- source_word: בְּ/אָח֥וֹר
  english_pob_choice: holds it back
  chosen_spanish: lo retiene
  alternatives_spanish:
  - lo detiene
  - lo guarda atrás
  - lo mantiene a raya
  lexicon: HALOT
  rationale: La expresión literal «en/atrás» apunta a la idea de mantener algo detrás, es decir, no dejarlo salir de inmediato. «Lo retiene» expresa bien esa contención en español.
- source_word: יְשַׁבְּחֶֽ/נָּה
  english_pob_choice: holds it back
  chosen_spanish: lo retiene
  alternatives_spanish:
  - lo calma
  - lo aquieta
  - lo apacigua
  lexicon: HALOT
  rationale: El verbo es difícil y en este contexto se entiende como calmar, aquietar o restringir el impulso mencionado. Dado el paralelismo con בְּאָחוֹר, «lo retiene» preserva el contraste central sin decidir en exceso entre ‘calmar’ y ‘reprimir’.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo directamente y toma el inglés POB como guía de sentido y de ambigüedad léxica. Se preserva la tensión de רוּחַ y del verbo final sin resolverla por completo, manteniendo una traducción breve y proverbial.
  spanish_consistency_notes:
  - Se usa «necio» para כְסִיל y «sabio» para חָכָם, en consonancia con el registro sapiencial.
  - Se evita «SEÑOR» o terminología eclesial no pertinente; el versículo no contiene el nombre divino.
  - Se mantiene «espíritu» en el cuerpo del texto para reflejar el campo semántico amplio de רוּחַ, con nota alternativa para «ánimo/temperamento».
