    issue: הַפְּסִילִים está en el texto principal como «ídolos».
    rationale: El inglés auditado escogió «carved images» para preservar el sentido léxico concreto, dejando «idols» como alternativa. En español conviene reflejar esa misma decisión con «imágenes talladas» o equivalente, ya que «ídolos» interpreta más de lo necesario en el texto base.
