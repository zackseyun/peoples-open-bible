translation:
  language: es
  text: ¿Quién ha creído nuestro mensaje[a], y a quién se ha revelado el brazo de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro informe» o «lo que hemos oído». El hebreo puede referirse a lo que se ha oído, informado o proclamado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha sido el que
  lexicon: HALOT
  rationale: El hebreo usa un interrogativo directo para una pregunta retórica; en español, «¿Quién…?» comunica con naturalidad la misma fuerza interrogativa.
- source_word: הֶאֱמִין
  english_pob_choice: has believed
  chosen_spanish: ha creído
  alternatives_spanish:
  - creyó
  - ha confiado
  lexicon: HALOT
  rationale: El verbo hiphil de אמן aquí significa creer/fiar. «Ha creído» conserva el valor perfecto y la fuerza retórica del original sin volverlo más interpretativo.
- source_word: לִשְׁמֻעָתֵנוּ
  english_pob_choice: our report
  chosen_spanish: nuestro reporta
  alternatives_spanish:
  - nuestro informe
  - nuestro mensaje
  - lo que hemos oído
  lexicon: HALOT
  rationale: שְׁמוּעָה puede abarcar lo oído, lo divulgado o el informe recibido. Se eligió un equivalente breve y formal que preserve la idea de testimonio proclamado; se documenta la alternativa semántica amplia en la nota.
- source_word: וּזְרוֹעַ
  english_pob_choice: the arm
  chosen_spanish: el brazo
  alternatives_spanish:
  - el brazo
  - la fuerza
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. En español, «brazo» mantiene mejor la imagen bíblica que una paráfrasis como «fuerza».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La norma del proyecto pide «Yahvé» para el Tetragrámaton. Se evita la sustitución por un título y se preserva el nombre divino personal.
- source_word: עַל מִי
  english_pob_choice: to whom
  chosen_spanish: a quién
  alternatives_spanish:
  - sobre quién
  - en quién
  lexicon: HALOT
  rationale: 'Aunque עַל puede significar «sobre/en», con נִגְלָתָה el español natural es una construcción de destinatario: «a quién se ha revelado».'
- source_word: נִגְלָתָה
  english_pob_choice: has been revealed
  chosen_spanish: se ha revelado
  alternatives_spanish:
  - fue revelado
  - ha sido revelado
  - se ha dado a conocer
  lexicon: HALOT
  rationale: El nifal de גלה expresa revelación pasiva. «Se ha revelado» conserva la pasividad y suena más idiomático en español que una pasiva perifrástica.
theological_decisions:
- issue: Metáfora del brazo de Yahvé
  english_pob_reading: Retain the metaphor 'the arm of Yahweh' in the main text
  chosen_spanish_reading: Retener «el brazo de Yahvé» como metáfora principal
  alternative_spanish_readings:
  - el poder de Yahvé
  - la fuerza de Yahvé
  rationale: La imagen del brazo es una metáfora bíblica teológicamente cargada para el poder salvífico y judicial de Yahvé. Mantenerla evita desactivar su resonancia intertextual.
  doctrine_reference: 'Translation philosophy §1, §5; Contested terms: יְהוָה → Yahweh'
- issue: Sentido de שְׁמוּעָה
  english_pob_reading: Render as 'our report' rather than the broader 'what we have heard'
  chosen_spanish_reading: Renderizar como «nuestro reporta» en una forma breve y proclive al registro bíblico
  alternative_spanish_readings:
  - nuestro informe
  - nuestro mensaje
  - lo que hemos oído
  rationale: El hebreo puede referirse a lo oído, reportado o proclamado. Se mantiene una forma de testimonio proclamado, pero se deja constancia de la amplitud semántica en nota para no borrar la tensión léxica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que volvió de «what we have heard» a «our report» para reflejar mejor לִשְׁמֻעָתֵנוּ. La versión española sigue esa decisión de sentido general, pero conserva en nota la amplitud semántica del hebreo para no eliminar alternativas legítimas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera coherente con la norma del proyecto para יהוה.
  - Se preserva la metáfora de «el brazo» y no se la sustituye por una paráfrasis abstracta.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - El registro es sobrio y bíblico sin caer en un calco rígido del inglés.
