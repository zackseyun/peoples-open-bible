- from: Y no mostraron lealtad[a] a la casa de Jerubaal, de Gedeón, conforme a todo el bien que él había hecho por Israel.
  to: Y no mostraron bondad a la casa de Jerubaal[a], Gedeón, conforme a todo el bien que él había hecho por Israel.
  rationale: Se cambió «lealtad» por «bondad» para reflejar mejor el valor contextual de חֶסֶד según la evidencia fuente y el audit trail inglés. Se corrigió «Jerubaal, de Gedeón» a «Jerubaal[a], Gedeón» para representar la doble denominación en aposición sin añadir una relación posesiva no presente en el hebreo. Se conservó «conforme a todo el bien» como una solución española natural y fiel.
