translation:
  language: es
  text: Entonces el sacerdote mojará su dedo en la sangre y rociará parte de la sangre siete veces delante de Yahvé[a], delante de la cortina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre divino aquí traduce el Tetragrama hebreo יְהוָה.
    reason: source_note
  - marker: b
    text: O «velo». El término hebreo se refiere a la cortina del santuario que separaba el espacio santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטָבַל
  english_pob_choice: Then ... shall dip
  chosen_spanish: Entonces ... mojará
  alternatives_spanish:
  - Entonces ... sumergirá
  - Y ... mojará
  lexicon: HALOT
  rationale: טבל describe una acción ritual de mojar o sumergir. En español, "mojar" comunica bien el gesto breve con el dedo; "entonces" refleja la secuencia narrativa/ritual del wayyiqtol.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: כהן en este contexto sacrificial designa al oficiante del rito. "Sacerdote" es el equivalente español más claro y directo.
- source_word: אֶצְבָּעוֹ
  english_pob_choice: his finger
  chosen_spanish: su dedo
  alternatives_spanish:
  - su dedo índice
  - el dedo de él
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo posesivo. "Su dedo" conserva la literalidad y la naturalidad en español sin especificar indebidamente cuál dedo.
- source_word: מִן הַדָּם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - de la sangre
  - dentro de la sangre
  lexicon: HALOT
  rationale: Tras "mojar", el sentido práctico es introducir el dedo en la sangre. En español, "en la sangre" expresa esa relación sin forzar una paráfrasis más amplia.
- source_word: וְהִזָּה
  english_pob_choice: and sprinkle some of the blood
  chosen_spanish: y rociará parte de la sangre
  alternatives_spanish:
  - y rociará la sangre
  - y esparcirá parte de la sangre
  lexicon: HALOT
  rationale: הזה en contexto ritual es rociar o asperjar. "Rociará" es claro y reverente; "parte de la sangre" hace explícito el objeto implícito que el español requiere para no sonar ambiguo.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - por siete veces
  - siete ocasiones
  lexicon: HALOT
  rationale: Equivalente directo y natural del numeral y el sustantivo plural.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición frontal o en presencia de. Se mantiene "Yahvé" por la política del proyecto para el nombre divino.
- source_word: אֵת פְּנֵי הַפָּרֹכֶת
  english_pob_choice: in front of the curtain
  chosen_spanish: en frente del velo
  alternatives_spanish:
  - delante del velo
  - en frente de la cortina
  lexicon: HALOT
  rationale: פָּרֹכֶת se refiere al velo/cortina del santuario. Se conserva "velo" para mantener la equivalencia tradicional y la referencia cultual; "en frente de" reproduce la relación espacial del hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La convención del proyecto en español es transliterarlo como "Yahvé", preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: פָּרֹכֶת como sanctuary curtain
  english_pob_reading: curtain
  chosen_spanish_reading: velo
  alternative_spanish_readings:
  - cortina
  - telón
  rationale: La palabra designa la separación cultual del santuario. "Velo" es comprensible en español bíblico y conserva la resonancia tradicional sin borrar el objeto arquitectónico.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el objeto de "sprinkle" se expresa explícitamente como "parte de la sangre". En español se reflejó esa aclaración con "rociará parte de la sangre" para no perder la precisión del ajuste editorial.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" conforme al estándar del proyecto para יְהוָה.
  - Se usa "sacerdote" para כהן en lenguaje sacrificial.
  - '"Rociará" conserva el verbo ritual y evita una paráfrasis excesiva.'
  - '"Velo" se eligió como equivalente culto y tradicional para פָּרֹכֶת, con nota alternativa anclada.'
