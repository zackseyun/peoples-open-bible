review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura del hebreo y conserva correctamente el cambio de plural a singular, la repetición de «volverás» para שוב, y la imagen de «las profundidades de la tierra». Sin embargo, «muchos males y calamidades» introduce una redundancia semántica menos natural en español y debilita la distinción contextual entre צָרוֹת («aflicciones/adversidades») y רָעוֹת («calamidades»). Además, «nos darás vida» suaviza un poco la fuerza restauradora de תְּחַיֵּנוּ frente a una opción como «nos reanimarás» o «nos devolverás la vida».
  spanish_quality_summary: El texto es legible y digno, pero puede mejorar en naturalidad y precisión poética. «Muchos males y calamidades» suena algo pesado y ambiguo en español e incluso puede sugerir mal moral pese a la nota. «Muchas aflicciones y calamidades» lee mejor y distingue mejor los dos términos hebreos. El resto del verso está bien logrado; «volverás y me sacarás» es comprensible, aunque «me harás subir» sería más literal, y «me sacarás» sigue siendo aceptable en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). La decisión teológica de evitar que רָעוֹת suene a mal moral debe reforzarse en el texto principal usando «aflicciones» para צָרוֹת y «calamidades» para רָעוֹת. La preservación de «volverás» para ambas ocurrencias de שוב y del cambio «nos ... me» está alineada con el expediente POB.
  issues:
  - severity: medium
    issue: «muchos males y calamidades» no distingue bien los dos sustantivos hebreos y en español puede sonar redundante o ambiguo
    rationale: צָרוֹת y רָעוֹת forman una pareja de adversidad sufrida; en español «males» junto a «calamidades» puede parecer duplicación poco elegante y «males» aún puede sugerir mal moral. «Aflicciones» o «adversidades» para צָרוֹת mejora la precisión y la legibilidad.
  - severity: low
    issue: La nota [b] no corresponde del todo al anclaje textual actual
    rationale: La nota [b] ofrece alternativas para צָרוֹת, pero el texto principal usa «males», que además compite con רָעוֹת. Si se revisa el texto a «aflicciones», la nota debe ajustarse para reflejar alternativas reales y la explicación contextual.
  - severity: low
    issue: «nos darás vida» es algo más débil que la idea de restauración implícita en תְּחַיֵּנוּ
    rationale: Aunque es aceptable, el hebreo sugiere reanimación/restauración después de gran aflicción. «Nos devolverás la vida» sería más fuerte, pero no es imprescindible corregirlo si se prioriza sobriedad. La reparación principal es léxica en la primera mitad del verso.
