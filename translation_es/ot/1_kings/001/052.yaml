translation:
  language: es
  text: 'Y dijo Salomón[a]: «Si él resulta ser un hombre digno, no caerá a tierra ni un solo cabello suyo[b]; pero si se halla en él algún mal, morirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un hijo de valor/fuerza». El hebreo es un modismo que, según el contexto, puede significar un hombre de valía, capacidad o valentía.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no caerá de su cabello a tierra», un modismo que significa que no le vendrá ningún daño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן־חַיִל
  english_pob_choice: a worthy man
  chosen_spanish: un hombre de valor
  alternatives_spanish:
  - un hombre digno
  - un hombre capaz
  - un hombre valeroso
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en este contexto, valora el carácter de la persona más que su fuerza militar. «Un hombre de valor» conserva la fuerza semántica de חַיִל sin reducirla a valentía bélica ni volverla demasiado abstracta.
- source_word: יִהְיֶה
  english_pob_choice: proves to be
  chosen_spanish: resulta ser
  alternatives_spanish:
  - es
  - llega a ser
  - se demuestra ser
  lexicon: HALOT
  rationale: El condicional no describe solo identidad, sino la evidencia de carácter bajo prueba. «Resulta ser» reproduce bien esa fuerza pragmática en español natural.
- source_word: מִשַּׂעֲרָתוֹ
  english_pob_choice: of his hairs
  chosen_spanish: ni un solo cabello suyo
  alternatives_spanish:
  - ni un cabello de su cabeza
  - ni uno de sus cabellos
  - ni un solo cabello de él
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo e idiomático para expresar preservación total. «Ni un solo cabello suyo» mantiene la imagen y su sentido idiomático en español sin sonar forzado.
- source_word: לֹא יִפֹּל ... אָרְצָה
  english_pob_choice: not one of his hairs will fall to the ground
  chosen_spanish: no caerá a tierra
  alternatives_spanish:
  - no caerá al suelo
  - no se le caerá a tierra ni un cabello
  - no caerá a tierra ni uno de sus cabellos
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de daño evitado por completo. En español, el verbo «caer» con «a tierra» comunica el mismo modismo de manera sobria, y la reiteración de «ni un solo cabello suyo» preserva la imagen completa.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - malicia
  - perversidad
  lexicon: HALOT
  rationale: En este contexto judicial, el sustantivo puede abarcar el mal moral o culpable. «Mal» mantiene la amplitud del hebreo sin estrecharlo a una sola forma de culpa.
- source_word: תִמָּצֵא ב֖וֹ
  english_pob_choice: is found in him
  chosen_spanish: se halla en él
  alternatives_spanish:
  - se encuentra en él
  - se descubre en él
  - está en él
  lexicon: HALOT
  rationale: La pasiva hebrea implica que el mal se descubre como presente en la persona. «Se halla en él» conserva esa pasividad y suena natural en español.
- source_word: וָמֵת
  english_pob_choice: he shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - deberá morir
  - morirá ciertamente
  - ha de morir
  lexicon: HALOT
  rationale: El hebreo presenta la consecuencia judicial del hallazgo del mal. «Morirá» preserva la sobriedad legal del enunciado sin introducir explicaciones que el texto no da.
theological_decisions:
- issue: El valor de la expresión בן־חיל en un juicio real
  english_pob_reading: a worthy man / a man of worth, capability, or valor depending on context
  chosen_spanish_reading: un hombre de valor
  alternative_spanish_readings:
  - un hombre digno
  - un hombre capaz
  - un hombre valeroso
  rationale: La frase hebrea no designa solo heroísmo militar; aquí funciona como evaluación moral y de fiabilidad ante el rey. «Un hombre de valor» deja abierta esa amplitud y evita imponer una sola connotación.
  doctrine_reference: Sabiduría bíblica sobre carácter y responsabilidad; juicio justo sin sobredimensionar el léxico bélico.
- issue: La fórmula de amenaza judicial frente al mal encontrado
  english_pob_reading: if evil is found in him, he shall die
  chosen_spanish_reading: si se halla en él mal, morirá
  alternative_spanish_readings:
  - si se encuentra maldad en él, morirá
  - si se descubre en él mal, morirá
  rationale: El texto presenta una sentencia condicional vinculada a la presencia de mal. «Mal» conserva la amplitud moral del hebreo y la dureza del veredicto, sin convertirlo en una descripción psicológica ni en una lista de delitos específicos.
  doctrine_reference: Justicia retributiva del texto narrativo; responsabilidad personal ante el juicio del rey.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron cambios de sentido respecto del original hebreo. La versión española conserva la estructura condicional, el modismo de preservación total y la sentencia judicial final, evitando tanto el calco duro como la paráfrasis expansiva.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «mal» sobre «maldad» para reproducir la amplitud semántica del hebreo רָעָה en contexto judicial.
  - Se usó una formulación idiomática natural («ni un solo cabello suyo») para conservar la imagen hebrea sin perder legibilidad.
  - La puntuación con comillas angulares sigue el uso tipográfico español y distingue claramente el discurso directo.
