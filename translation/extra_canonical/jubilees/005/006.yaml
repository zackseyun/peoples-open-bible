  from: angry[5:6], to strip them
  to: angry[5:6], so as to strip them
  rationale: In English, one cannot be 'angry to do something.' The Ge'ez verb here (yeśarwomu) functions as a result clause or an implicit command. Adding 'so as' (or 'commanding') clarifies the syntactic connection and makes the English natural.
