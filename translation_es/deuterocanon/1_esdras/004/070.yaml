revisions:
- from: Y escribió cartas a todos los gobernantes locales en Celesiria y Fenicia y a los que estaban en el Líbano[a], para traer madera de cedro del Líbano a Jerusalén, y para que edifiquen la ciudad con él.
  to: Y escribió cartas a todos los gobernantes locales[a] en Celesiria y Fenicia, y a los del Líbano, para traer madera de cedro del Líbano a Jerusalén, a fin de que edificaran la ciudad con él.
  rationale: 'Se reubica la nota al término correcto que traduce τοπάρχαις, se mejora la naturalidad temporal de la cláusula final con ''a fin de que edificaran'', y se aligera ''los que estaban en el Líbano'' a ''los del Líbano'' sin alterar el sentido. Se preservan las decisiones auditadas importantes: ''Celesiria'' como topónimo histórico y ''la ciudad'' como objeto explícito de la construcción.'
