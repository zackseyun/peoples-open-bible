    changes_summary: Changed 'stood aside' to 'stood aloof' for closer lexical accuracy to the sense of standing at a distance; changed 'his gate' to 'his gates' to reflect the plural in the source. Other wording retained.
translation:
  language: es
  text: En el día en que estuviste al margen[a], en el día en que extraños se llevaron su riqueza[b], y extranjeros entraron por sus puertas[c] y echaron suertes sobre Jerusalén, tú también fuiste como uno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estuviste a distancia' o 'estuviste apartado'. El hebreo expresa literalmente la idea de estar de pie enfrente o a cierta distancia, con sentido de desapego.
    reason: lexical_alternative
  - marker: b
    text: O 'su ejército' o 'su fuerza' para חֵיל; el término puede referirse a recursos, fuerza militar o riqueza. Aquí se entiende como saqueo de bienes.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente 'su puerta'; aquí se traduce 'sus puertas' de manera idiomática para la entrada en la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמָדְךָ מִנֶּגֶד
  english_pob_choice: you stood aloof
  chosen_spanish: estuviste al margen
  alternatives_spanish:
  - estuviste a distancia
  - estuviste apartado
  - estuviste al margen, sin intervenir
  lexicon: HALOT
  rationale: La imagen hebrea combina 'estar de pie' con la idea de distancia/oposición; el POB inglés opta por una lectura de desapego culpable. En español, 'estuviste al margen' comunica bien la postura de no intervenir sin volverla demasiado mecánica, y conserva la fuerza acusatoria del contexto.
- source_word: שְׁב֥וֹת זָרִ֖ים חֵיל֑וֹ
  english_pob_choice: strangers carried off his wealth
  chosen_spanish: extraños se llevaron su riqueza
  alternatives_spanish:
  - forasteros se llevaron su riqueza
  - extraños arrebataron su riqueza
  - forasteros saquearon su riqueza
  lexicon: HALOT
  rationale: זָרִים se distingue de נָכְרִים; por eso 'extraños' mantiene la variación léxica. חֵיל puede significar riqueza, fuerza o ejército; el contexto de saqueo favorece 'riqueza' como sentido más natural en español, con la misma tensión semántica que el inglés POB anota.
- source_word: וְנָכְרִים
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - alógenos
  - gente extranjera
  lexicon: HALOT
  rationale: El segundo término para los invasores se traduce diferente al primero para conservar el paralelismo hebreo. 'Extranjeros' es claro, digno y suficientemente distinto de 'extraños'.
- source_word: בָּאוּ שַׁעֲרוֹ
  english_pob_choice: entered his gates
  chosen_spanish: entraron en sus puertas
  alternatives_spanish:
  - entraron por sus puertas
  - entraron en sus portones
  - entraron en sus puertas de la ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo conserva una forma singular con sufijo, el contexto y la revisión del POB inglés favorecen el plural idiomático. En español, 'sus puertas' suena natural y preserva la referencia urbana/personificada.
- source_word: יַדּוּ גוֹרָל
  english_pob_choice: cast lots
  chosen_spanish: echaron suertes
  alternatives_spanish:
  - tiraron suertes
  - sortearon
  - repartieron por suerte
  lexicon: HALOT
  rationale: '''Echar suertes'' es el equivalente español tradicional y claro para el sorteo por destino/posesión. Mantiene la imagen bíblica sin añadir interpretación.'
- source_word: גַּם אַתָּה
  english_pob_choice: you too
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - aun tú
  - tú asimismo
  lexicon: HALOT
  rationale: La frase marca la inclusión de Edom en la culpa. 'Tú también' reproduce la acusación de manera natural y enfática.
- source_word: כְּאַחַד מֵהֶם
  english_pob_choice: like one of them
  chosen_spanish: como uno de ellos
  alternatives_spanish:
  - igual que uno de ellos
  - al modo de uno de ellos
  - como si fueras uno de ellos
  lexicon: HALOT
  rationale: La comparación señala equivalencia moral con los agresores. 'Como uno de ellos' conserva la fuerza del hebreo sin sobreexplicar.
theological_decisions:
- issue: La culpa por omisión en la postura de Edom
  english_pob_reading: Edom is condemned for culpable non-intervention that aligns him morally with Jerusalem's attackers.
  chosen_spanish_reading: Edom es condenado por mantenerse al margen de forma culpable, quedando moralmente alineado con los atacantes de Jerusalén.
  alternative_spanish_readings:
  - Edom solo fue un observador distante
  - Edom se limitó a presenciar los hechos
  - Edom fue neutral ante la invasión
  rationale: El cierre 'tú también eras como uno de ellos' muestra que la distancia no es neutralidad. La redacción española debe conservar esa dimensión ética y judicial, no solo la ubicación física.
  doctrine_reference: Responsabilidad moral por omisión; juicio profético sobre solidaridad con el mal
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del POB inglés en dos puntos: preferí un equivalente de ''stood aloof'' más cercano al matiz de distancia culpable, y opté por el plural ''sus puertas'' en vez del singular literal para reflejar mejor el contexto urbano y la decisión editorial revisada. También mantuve la distinción entre זָרִים y נָכְרִים mediante dos palabras españolas distintas.'
  spanish_consistency_notes:
  - He usado 'extraños' y 'extranjeros' para distinguir los dos grupos de invasores, conforme al contraste hebreo.
  - He preferido 'echar suertes' por ser la fórmula bíblica estable en español y fiel al idiomа de sorteo.
  - He mantenido 'Yahvé' solo donde el texto no lo requería aquí, ya que este versículo no contiene el nombre divino.
  - La sintaxis busca ser bíblica pero natural en español contemporáneo, sin recurrir a calcos rígidos.
