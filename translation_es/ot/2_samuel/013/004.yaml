translation:
  language: es
  text: 'Él le dijo[a]: «¿Por qué estás tan demacrado, hijo del rey, mañana tras mañana? ¿No me lo dirás?». Y Amnón le dijo: «Amo a Tamar[b], la hermana de mi hermano Absalón»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada mañana» o, más formalmente, «mañana por mañana».
    reason: lexical_alternative
  - marker: b
    text: O «Estoy enamorado de Tamar». El hebreo, de manera más literal, dice «Amo a Tamar».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué es que
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Es la pregunta causal directa del hebreo; en español, «¿Por qué?» conserva la fuerza interrogativa sin añadir explicación.
- source_word: כָּכָה דַּל
  english_pob_choice: so gaunt
  chosen_spanish: tan demacrado
  alternatives_spanish:
  - tan flaco
  - tan delgado
  - tan debilitado
  lexicon: HALOT
  rationale: דַּל aquí describe un aspecto físico de consumición o abatimiento visible. «Demacrado» comunica mejor ese deterioro corporal que «pobre», y mantiene la fuerza descriptiva del contexto.
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: son of the king
  chosen_spanish: hijo del rey
  alternatives_spanish:
  - príncipe
  - hijo del rey
  lexicon: HALOT
  rationale: «Hijo del rey» sigue de cerca la expresión hebrea y preserva el recurso retórico de dirigirse a él por su filiación real; «príncipe» sería más idiomático pero menos transparente.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning after morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición intensifica la recurrencia; «mañana tras mañana» conserva esa duplicación de manera natural en español.
- source_word: הֲלוֹא תַּגִּיד לִי
  english_pob_choice: Will you not tell me?
  chosen_spanish: ¿No me lo dirás?
  alternatives_spanish:
  - ¿Acaso no me lo dirás?
  - ¿No me dirás?
  lexicon: HALOT
  rationale: La partícula hebrea expresa expectativa y presión retórica. «¿No me lo dirás?» transmite esa urgencia de forma idiomática, sin forzar un tono arcaico.
- source_word: אֲנִי אֹהֵב
  english_pob_choice: I love
  chosen_spanish: yo la amo
  alternatives_spanish:
  - la amo
  - la quiero
  - estoy enamorado de ella
  lexicon: HALOT
  rationale: El verbo hebreo es el común אָהֵב, que por sí mismo dice «amar». En español, «amo» conserva la referencia léxica fuerte; el pronombre objeto explícito ayuda a naturalizar el orden hebreo sin perder el foco en Tamar.
- source_word: אֶת תָּמָר
  english_pob_choice: Tamar
  chosen_spanish: a Tamar
  alternatives_spanish:
  - Tamar
  lexicon: HALOT
  rationale: El marcador acusativo no se traduce, pero en español el objeto directo personal suele introducirse con «a». Eso mantiene claridad y sigue la relación verbal sin añadir contenido.
- source_word: אֲחוֹת אַבְשָׁלֹם אָחִי
  english_pob_choice: the sister of my brother Absalom
  chosen_spanish: la hermana de mi hermano Absalón
  alternatives_spanish:
  - la hermana de Absalón, mi hermano
  - mi hermano Absalón, su hermana
  lexicon: HALOT
  rationale: Se conserva la estructura relacional hebrea y la repetición de parentesco. La forma elegida es transparente y reproduce la carga de identificación familiar.
theological_decisions:
- issue: Cómo reflejar la declaración de afecto de Amnón sin convertirla en una interpretación psicológica mayor que la del hebreo
  english_pob_reading: I love Tamar
  chosen_spanish_reading: yo la amo
  alternative_spanish_readings:
  - la amo
  - estoy enamorado de ella
  - la deseo
  rationale: El verbo hebreo אָהֵב es el término ordinario para amar. Aunque el contexto narrativo revela deseo desordenado, la cláusula misma no exige intensificarla en la traducción principal. «Yo la amo» preserva la forma léxica y deja que el contexto haga su trabajo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La decisión revisada en el audit trail inglés favorece «gaunt» como equivalente más natural y conciso de דַּל en este contexto; por eso se adoptó «demacrado» en español. Se mantuvo la lectura principal del verbo אָהֵב como «amar», sin importar al texto principal la glosa interpretativa «estoy enamorado de».
  spanish_consistency_notes:
  - Se usa «Amnón» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se conserva «Yahvé» como terminología por defecto solo cuando el hebreo lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios como «acaso» o «no me lo dirás tú» salvo donde aporten claridad.
