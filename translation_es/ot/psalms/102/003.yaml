  text: אַל תַּסְתֵּ֬ר פָּנֶ֨י/ךָ מִמֶּ/נִּי֮ בְּ/י֪וֹם צַ֫ר לִ֥/י הַטֵּֽה אֵלַ֥/י אָזְנֶ֑/ךָ בְּ/י֥וֹם אֶ֝קְרָ֗א מַהֵ֥ר עֲנֵֽ/נִי־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/102/003.yaml
  text: Do not hide your face from me in the day of my distress[a]; incline your ear to me. In the day I call[c][b], answer me quickly.
  footnotes:
  - marker: a
    text: Or 'your presence' for 'your face'; the Hebrew idiom can refer to God's favorable presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'In the day of trouble for me'; Hebrew literally, 'in the day distress is to me.'
    reason: lexical_alternative
  - marker: c
    text: '''Answer me quickly'' could also be expressed ''hurry to answer me.'''
    reason: lexical_alternative
