translation:
  language: es
  text: 'A todos los que los hallaban los devoraban, y sus adversarios decían: «No somos culpables, porque pecaron contra Yahvé, la morada de la justicia[a], la esperanza de sus padres[b]—Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la morada de justicia». El hebreo נְוֵה puede denotar pasto, morada o lugar de habitación; aquí se ha preferido «morada» por naturalidad y por el registro del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «la expectativa de sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצְאֵיהֶם
  english_pob_choice: who found them
  chosen_spanish: los que los hallaban
  alternatives_spanish:
  - sus halladores
  - los que se encontraban con ellos
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para quienes se toparon con ellos; «los que los hallaban» conserva la idea de encuentro sin sonar forzado en español.
- source_word: אֲכָלוּם
  english_pob_choice: devoured them
  chosen_spanish: los devoraban
  alternatives_spanish:
  - los comían
  - los consumían
  lexicon: HALOT
  rationale: «Devoraban» mantiene la imagen destructiva y predatoria que el hebreo permite, y es más natural que un calco literal como «los comían».
- source_word: צָרֵיהֶם
  english_pob_choice: their adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus opresores
  lexicon: HALOT
  rationale: «Adversarios» conserva la hostilidad formal del término sin reducirlo solo a enemistad militar.
- source_word: לֹא נֶאְשָׁם
  english_pob_choice: We are not guilty
  chosen_spanish: No somos culpables
  alternatives_spanish:
  - No incurrimos en culpa
  - No se nos considera culpables
  lexicon: HALOT
  rationale: La primera persona plural en discurso directo expresa una afirmación de inocencia; «No somos culpables» es la equivalencia española más clara y natural.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La construcción introduce la base causal de la afirmación de inocencia; «porque» comunica bien ese valor en español.
- source_word: חָטְאוּ לַיהוָה
  english_pob_choice: they sinned against Yahweh
  chosen_spanish: pecaron contra Yahvé
  alternatives_spanish:
  - pecaron contra el Yahvé
  - ofendieron a Yahvé
  lexicon: HALOT
  rationale: «Pecaron contra» conserva el valor de ofensa dirigida a Yahvé; se mantiene el nombre divino según la terminología POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrama: «Yahvé» reproduce el nombre divino revelado, en lugar de sustituirlo por un título.'
- source_word: נְוֵה צֶדֶק
  english_pob_choice: the habitation of righteousness
  chosen_spanish: la morada de la justicia
  alternatives_spanish:
  - el lugar de justicia
  - la habitación de la justicia
  lexicon: HALOT
  rationale: «Morada» traduce bien נְוֵה en un registro natural y digno; «justicia» conserva la fuerza ética/judicial de צֶדֶק sin forzar una paráfrasis.
- source_word: מִקְוֵה אֲבוֹתֵיהֶם
  english_pob_choice: the hope of their fathers
  chosen_spanish: la esperanza de sus padres
  alternatives_spanish:
  - la expectativa de sus padres
  - la esperanza de sus antepasados
  lexicon: HALOT
  rationale: El sustantivo funciona aquí como título/apposición; «esperanza» es el equivalente más idiomático en español y mantiene el sentido relacional y confesional.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al criterio del proyecto, se translitera como «Yahvé» para preservar el nombre propio de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Estructura de las frases finales como títulos referidos a Yahvé
  english_pob_reading: the habitation of righteousness, the hope of their fathers—the LORD
  chosen_spanish_reading: la morada de la justicia, la esperanza de sus padres, Yahvé
  alternative_spanish_readings:
  - la morada de justicia y la esperanza de sus padres
  - la morada justa, la esperanza de sus padres
  rationale: La secuencia culmina en יהוה y, por la sintaxis, se entiende mejor como apposiciones/títulos que describen al mismo Yahvé. El español mantiene esa relación sin suavizar la tensión del cierre.
  doctrine_reference: Jeremiah 50:7 syntactic apposition; audit trail on נְוֵה צֶדֶק and מִקְוֵה אֲבוֹתֵיהֶם
translation_notes:
  revision_awareness: El rastro auditado en inglés pasó de «the pasture of righteousness» a «the habitation of righteousness» para reflejar mejor נְוֵה; en español se adoptó «la morada de la justicia» para sostener ese ajuste semántico sin perder la posibilidad de una alternativa marginal («la habitación de la justicia»). También se conservó la lectura apposicional de las expresiones finales y el cierre con el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para el Tetragrama.
  - Se prefirió «pecaron contra» para reproducir el valor direccional del hebreo חטא + ל.
  - «Morada» se eligió como equivalente principal de נְוֵה; «habitación» queda como alternativa en nota por la variación documentada.
  - No se introdujo vocabulario eclesiástico no sustentado por el hebreo; se conservó el tono sobrio y público del texto.
