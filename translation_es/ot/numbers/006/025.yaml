translation:
  language: es
  text: Yahvé haga resplandecer su rostro sobre ti y tenga gracia contigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Yahvé haga resplandecer su rostro hacia ti y te muestre favor".'
    reason: alternative_reading
lexical_decisions:
- source_word: יָאֵר
  english_pob_choice: may ... make ... shine
  chosen_spanish: haga resplandecer
  alternatives_spanish:
  - resplandezca
  - haga brillar
  - haga que brille
  lexicon: HALOT
  rationale: 'El verbo hifil expresa una acción causativa: no solo ''brillar'', sino ''hacer brillar'' o ''hacer resplandecer''. ''Haga resplandecer'' conserva esa fuerza volitiva y resulta natural en español bíblico actual.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, el equivalente de la política POB es 'Yahvé', manteniendo la referencia directa al Tetragrámaton sin sustituirlo por un título.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su presencia
  - su semblante
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su rostro'. 'Rostro' preserva la imagen corporal sin sonar tan coloquial como 'cara' ni tan arcaico como 'semblante'; además mantiene el valor poético de la bendición.
- source_word: אֵלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - hacia ti
  - para ti
  - sobre ustedes
  lexicon: HALOT
  rationale: La preposición apunta dirección benéfica hacia la persona bendecida. 'Sobre ti' corresponde bien al registro de la fórmula y reproduce la imagen de la luz que cae o se extiende sobre alguien.
- source_word: וִיחֻנֶּךָּ
  english_pob_choice: and be gracious to you
  chosen_spanish: y te conceda su gracia
  alternatives_spanish:
  - y sea bondadoso contigo
  - y te muestre favor
  - y tenga compasión de ti
  lexicon: HALOT
  rationale: El verbo חנן expresa mostrar favor/gracia. 'Conceda su gracia' comunica claramente la benevolencia divina en un español digno y evita estrechar el sentido a mera compasión. Se mantiene la tensión entre gracia y favor que el audit trail preserva.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La fuente hebrea nombra explícitamente a Dios con el Tetragrámaton. Siguiendo la política POB, se traslada ese nombre como 'Yahvé' en lugar de enmascararlo con un título litúrgico. Esto conserva la referencia al nombre del pacto revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH -> Yahweh'
- issue: Antropomorphic blessing idiom 'his face shine'
  english_pob_reading: Preserve the idiom literally in the main text
  chosen_spanish_reading: Preservar la imagen de 'su rostro resplandeciente'
  alternative_spanish_readings:
  - que muestre su favor
  - que haga resplandecer su presencia
  rationale: El hebreo emplea una imagen corporal para expresar favor divino. Traducirla literalmente en español conserva el peso poético y teológico del texto; el matiz de favor queda implícito por el contexto de bendición.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
- issue: Rendering of חנן in a blessing context
  english_pob_reading: and be gracious to you
  chosen_spanish_reading: y te conceda su gracia
  alternative_spanish_readings:
  - y te muestre favor
  - y sea misericordioso contigo
  rationale: En una fórmula de bendición, חנן suele expresar gracia/favor más que simple lástima o misericordia. 'Conceda su gracia' mantiene esa amplitud semántica y encaja con el registro solemne del verso.
  doctrine_reference: HALOT on חנן; blessing formula context
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió 'upon you' por un registro más formal; en español se reflejó como 'sobre ti', equivalente idiomático y de tono elevado, sin perder la imagen direccional del hebreo. También se mantuvo la preservación literal de 'su rostro' y el nombre divino 'Yahvé' conforme al audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יְהוָה, coherente con la política POB.
  - '''Rostro'' conserva la imagen antropomórfica en vez de interpretarla como ''presencia''.'
  - '''Conceda su gracia'' conserva el campo semántico de favor/gracia en un registro bíblico natural.'
  - La nota alternativa aclara la posible lectura de favor sin desplazar el texto principal.
