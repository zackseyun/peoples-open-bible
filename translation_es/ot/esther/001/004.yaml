translation:
  language: es
  text: mientras mostraba[a] las riquezas de la gloria de su reino y el esplendor de la gloria de su grandeza, por muchos días—ciento ochenta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando mostraba» o «al mostrar»; el infinitivo hebreo con ב puede señalar circunstancia temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהַרְאֹתוֹ
  english_pob_choice: while he displayed
  chosen_spanish: mientras mostraba
  alternatives_spanish:
  - cuando mostraba
  - al mostrar
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. «Mientras mostraba» conserva el valor durativo y el matiz circunstancial del hebreo, con un español natural y adecuado al registro narrativo.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: «Riquezas» refleja el sentido concreto de abundancia material y mantiene el paralelismo con los términos de prestigio real que siguen.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: HALOT
  rationale: «Gloria» conserva el registro elevado del sintagma «la gloria de su reino» y corresponde al valor semántico principal del hebreo en este contexto.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su dominio real
  lexicon: HALOT
  rationale: En el marco cortesano persa, «su reino» expresa de forma directa el dominio imperial visible cuya riqueza se exhibe.
- source_word: יְקָר
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - preciado valor
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Esplendor» comunica bien el valor, la magnificencia y el brillo ceremonial del término sin forzar un giro menos natural en español.
- source_word: תִּפְאֶרֶת
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - hermosura
  - belleza
  - adorno
  lexicon: HALOT
  rationale: Aunque la revisión inglesa ajustó el segundo miembro para mantener coherencia, en español «gloria» permite reflejar la acumulación retórica del hebreo y preservar el paralelismo con כְּבוֹד.
- source_word: גְּדוּלָּתוֹ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su magnitud
  lexicon: HALOT
  rationale: «Grandeza» es la correspondencia más directa y mantiene el tono de autoexaltación real que recorre la cláusula.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: HALOT
  rationale: El acusativo de duración se expresa naturalmente con «por» en español, y así se conserva el sentido de extensión temporal.
- source_word: שְׁמוֹנִים וּמְאַת יוֹם
  english_pob_choice: one hundred and eighty days
  chosen_spanish: ciento ochenta días
  alternatives_spanish:
  - cien y ochenta días
  lexicon: HALOT
  rationale: Se sigue el orden numérico idiomático del español para claridad, sin alterar la cantidad exacta del hebreo.
translation_notes:
  revision_awareness: La base inglesa fue revisada para preferir «the splendor of the glory of his greatness» en lugar de «the splendor of the honor of his greatness». En español se mantuvo el doble lenguaje de gloria/esplendor para respetar la acumulación honorífica del hebreo y la decisión editorial reciente del POB, evitando suavizar la reiteración retórica.
  spanish_consistency_notes:
  - Se usa «gloria» para כְּבוֹד y para תִּפְאֶרֶת, porque el hebreo acumula términos de prestigio real y la revisión inglesa favorece consistencia formal.
  - «Riquezas» y «reino» se mantienen en registro bíblico claro y no eclesiástico, acorde con el contexto persa.
  - La puntuación con dos puntos antes de la cifra ayuda a distinguir la duración general de la especificación exacta final.
