translation:
  language: es
  text: Porque te levanté[a] del polvo y te hice gobernante sobre mi pueblo Israel, y caminaste en el camino de Jeroboam, e hiciste pecar a mi pueblo Israel, provocándome a ira[b] por sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te exalté». El hebreo expresa elevación desde una condición baja a una posición de gobierno.
    reason: lexical_alternative
  - marker: b
    text: O «con sus pecados». El hebreo permite un matiz instrumental o causal en la preposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרִימֹתִיךָ
  english_pob_choice: I raised you up
  chosen_spanish: te levanté
  alternatives_spanish:
  - te exalté
  - te alcé
  lexicon: HALOT
  rationale: El hebreo expresa elevación desde una condición baja hacia una posición de gobierno. «Te levanté» conserva la imagen de ascenso y suena natural en español, sin perder el matiz de promoción a la realeza.
- source_word: מִן הֶעָפָר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - del polvo de la tierra
  - del barro
  lexicon: HALOT
  rationale: עָפָר se refiere aquí a la condición humilde de origen. «Polvo» mantiene la resonancia bíblica y la idea de bajeza sin volver el español pesado.
- source_word: וָאֶתֶּנְךָ נָגִיד
  english_pob_choice: and made you ruler
  chosen_spanish: y te puse como príncipe
  alternatives_spanish:
  - y te hice gobernante
  - y te establecí como líder
  lexicon: HALOT
  rationale: נָגִיד denota un jefe o gobernante designado. «Príncipe» puede sonar tradicional, pero aquí se usa en sentido funcional de autoridad establecida; se conserva la idea de cargo conferido. «Ruler» se refleja con una fórmula natural en español.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo, Israel
  - sobre Israel, mi pueblo
  lexicon: HALOT
  rationale: Se preserva el posesivo divino y el orden del miembro nominal. «Mi pueblo Israel» reproduce la relación de pertenencia sin añadir explicación.
- source_word: וַתֵּלֶךְ בְּדֶרֶךְ יָרָבְעָם
  english_pob_choice: and you walked in the way of Jeroboam
  chosen_spanish: y caminaste en el camino de Jeroboam
  alternatives_spanish:
  - y anduviste en el camino de Jeroboam
  - y seguiste el camino de Jeroboam
  lexicon: HALOT
  rationale: «Caminar en el camino» preserva el modismo bíblico de conducta habitual. Aunque «andar» también es posible, «caminar» mantiene una cadencia más cercana al registro del texto y no altera el sentido.
- source_word: וַתַּחֲטִא אֶת עַמִּי יִשְׂרָאֵל
  english_pob_choice: and caused my people Israel to sin
  chosen_spanish: y hiciste pecar a mi pueblo Israel
  alternatives_spanish:
  - y causaste que mi pueblo Israel pecara
  - y indujiste a mi pueblo Israel al pecado
  lexicon: HALOT
  rationale: El verbo en Hifil es claramente causativo. «Hiciste pecar» comunica esa causación de modo directo y natural. Se evita «causaste a pecar» por sonar menos idiomático.
- source_word: לְהַכְעִיסֵנִי
  english_pob_choice: provoking me to anger
  chosen_spanish: provocándome a ira
  alternatives_spanish:
  - irritándome
  - despertando mi ira
  lexicon: HALOT
  rationale: La forma verbal expresa provocar a una reacción de enojo divino. «Provocándome a ira» conserva el objeto personal y el sustantivo bíblico «ira»; es más solemne que «enojarme».
- source_word: בְּחַטֹּאתָם
  english_pob_choice: by their sins
  chosen_spanish: con sus pecados
  alternatives_spanish:
  - por sus pecados
  - mediante sus pecados
  lexicon: HALOT
  rationale: El complemento introduce el medio o esfera de la provocación. «Con sus pecados» es una solución española aceptable y evita un calco demasiado mecánico. Se mantiene el referente plural a los pecados del pueblo.
theological_decisions:
- issue: Referencia de «sus pecados»
  english_pob_reading: The phrase refers to the sins committed by the people of Israel as a result of Baasha's leadership.
  chosen_spanish_reading: La frase se refiere a los pecados del pueblo de Israel, producidos bajo el liderazgo de Baasa.
  alternative_spanish_readings:
  - Puede entenderse de modo más amplio como las prácticas pecaminosas asociadas con el camino de Jeroboam, incluyendo la participación de Baasa.
  - También podría leerse como una referencia colectiva a la maldad del sistema instaurado por Jeroboam.
  rationale: El antecedente inmediato es «mi pueblo Israel», por lo que el sufijo plural apunta naturalmente al pueblo. La redacción conserva la culpa de Baasa como instigador sin borrar la responsabilidad de quienes pecaron.
  doctrine_reference: Responsabilidad moral y causalidad secundaria en el pecado; cf. el uso causativo del Hifil en el texto hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «but» por «and» para reflejar mejor la conjunción hebrea. En español, se siguió ese ajuste con «y», evitando introducir una oposición no explicitada en el original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo donde aparece en el texto fuente; aquí no ocurre, por lo que no se introduce.
  - Se preserva el patrón causativo del hebreo con «hiciste pecar», en coherencia con la decisión inglesa de reflejar el Hifil.
  - «Príncipe» se usa en sentido de gobernante designado, no como título cortesano moderno.
  - La puntuación une las cláusulas como secuencia causal y narrativa, sin añadir contraste adversativo.
