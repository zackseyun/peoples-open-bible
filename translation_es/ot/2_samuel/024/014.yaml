translation:
  language: es
  text: 'Entonces David dijo a Gad: «Estoy en gran angustia. Caigamos, por favor, en la mano de Yahvé, porque abundan sus misericordias[a]; pero no caiga yo en la mano del hombre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque muchas son sus misericordias». También puede entenderse como «porque abundante es su compasión».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la mano del hombre»; es decir, bajo poder o control humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי מְאֹד
  english_pob_choice: I am in great distress
  chosen_spanish: Estoy en gran angustia
  alternatives_spanish:
  - Estoy en gran aflicción
  - Estoy en gran apuro
  lexicon: HALOT
  rationale: צַר con לִי expresa una situación personal de estrechez, aflicción o angustia. «Gran angustia» comunica bien el peso emocional en español sin perder la fuerza idiomática del hebreo.
- source_word: נִפְּלָה נָּא
  english_pob_choice: Let us fall, please
  chosen_spanish: Caigamos, por favor
  alternatives_spanish:
  - Permitamos, por favor, que caigamos
  - Caigamos, te ruego
  lexicon: HALOT
  rationale: La cohortativa de primera persona del plural pide una forma exhortativa inclusiva. «Caigamos» conserva el plural del hebreo, y «por favor» transmite נָא como súplica.
- source_word: בְיַד יְהוָה
  english_pob_choice: into the hand of Yahweh
  chosen_spanish: en la mano de Yahvé
  alternatives_spanish:
  - bajo la mano de Yahvé
  - en poder de Yahvé
  lexicon: HALOT
  rationale: «En la mano de» preserva la imagen idiomática de quedar bajo poder o control. Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: כִּי רַבִּים רחמיו
  english_pob_choice: for his mercies are many
  chosen_spanish: porque muchas son sus misericordias
  alternatives_spanish:
  - porque abundan sus misericordias
  - porque grande es su compasión
  lexicon: HALOT
  rationale: El hebreo dice literalmente «muchas son sus misericordias». En español, invertir el orden a «muchas son sus misericordias» suena natural y conserva tanto el plural como la abundancia expresada por רַבִּים.
- source_word: וּבְיַד אָדָם
  english_pob_choice: into the hand of man
  chosen_spanish: en la mano del hombre
  alternatives_spanish:
  - en manos humanas
  - bajo el poder del hombre
  lexicon: HALOT
  rationale: אָדָם aquí funciona como singular genérico en contraste con Yahvé. «El hombre» conserva ese contraste retórico y evita desdibujar la forma singular del hebreo.
- source_word: אַל אֶפֹּלָה
  english_pob_choice: let me not fall
  chosen_spanish: no caiga yo
  alternatives_spanish:
  - no me dejes caer
  - que yo no caiga
  lexicon: HALOT
  rationale: La negación con imperfecto de primera persona expresa una petición o deseo negativo. «No caiga yo» mantiene el matiz volitivo y la referencia a la primera persona singular del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar del proyecto lo vierte como «Yahvé». Esto preserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Contrast between divine power and human power in אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - ser humano
  rationale: El contraste del pasaje es entre la mano de Yahvé y la mano de אָדָם. En español, «el hombre» mantiene el paralelismo singular y la fuerza contrastiva del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם → man / humankind (context)'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión aprobada; no se identificaron cambios necesarios respecto del texto base en inglés, salvo la adaptación normativa al español con preservación del paralelismo, del plural hebreo de «misericordias» y del nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo el contraste Yahvé / el hombre para reflejar el hebreo.
  - «Misericordias» conserva el plural del original; no se redujo a singular.
  - La voz exhortativa en primera persona plural («Caigamos») preserva la cohortativa hebrea.
  - Se evitó la sustitución por «SEÑOR» para no enmascarar el nombre divino.
