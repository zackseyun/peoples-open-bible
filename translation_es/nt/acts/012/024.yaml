    issue: La nota al pie no corresponde a la alternativa auditada en inglés.
    rationale: 'La nota inglesa conserva una alternativa léxica para λόγος: «God''s message continued to grow and multiply». La nota española debería reflejar esa alternativa principal como «el mensaje de Dios seguía creciendo y multiplicándose», no introducir un doble cambio verbal («aumentando y extendiéndose») que altera la decisión léxica documentada sobre ἐπληθύνετο.'
  revised_spanish_text: Pero la palabra de Dios seguía creciendo y multiplicándose[a].
