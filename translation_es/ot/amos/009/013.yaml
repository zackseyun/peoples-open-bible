    reason: lexical_alternative
  - marker: b
    text: O ‘vino nuevo’.
    reason: lexical_alternative
  - marker: c
    text: La imagen es de una abundancia tan grande que el trabajo de una estación comienza antes de que haya terminado el de la anterior.
    reason: cultural_note
  revision_rationale: Se ajustó el llamado profético inicial a ‘Miren’ para un registro más natural y digno; se corrigieron las notas para que reflejen fielmente las alternativas auditadas; y se cambió ‘mosto’ por ‘vino dulce’ para alinearlo con la elección principal documentada para עָסִיס, preservando ‘vino nuevo’ como alternativa en nota. También se separaron correctamente la nota léxica y la nota cultural con marcadores distintos.
