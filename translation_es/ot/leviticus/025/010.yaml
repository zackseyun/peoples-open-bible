review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: consagrar/santificar el año cincuenta, proclamar libertad, designar ese año como jubileo, y el doble retorno a propiedad y familia. Sin embargo, hay dos problemas de alineación: (1) el verbo inicial está en segunda persona plural hebrea y debe reflejarse como ''ustedes consagrarán'' o una forma equivalente, no ''santificarán'' sin sujeto explícito, que en español se lee naturalmente como tercera persona plural; (2) las notas están mal ancladas: [a] aparece en ''año cincuenta'' pero explica דרור/libertad, y [d] aparece en ''familia'' aunque la nota inglesa ''to his clan'' corresponde a מִשְׁפַּחְתּוֹ, mientras que la nota ''property'' debe ir en propiedad y la nota cultural distributiva debe anclarse a ''cada uno'' solo una vez o en cada ocurrencia con marcadores distintos. Además, la nota b dice ''Hebreo: cada uno'', lo cual no es exacto; el hebreo es איש, literalmente ''hombre/varón'', con valor distributivo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero necesita ajustes para sonar natural y preciso. ''Santificarán'' sin pronombre es ambiguo en español; ''consagrarán'' encaja mejor con el inglés auditado y con el uso cultual. ''El año cincuenta'' es entendible, pero ''el quincuagésimo año'' suena más natural y exacto en registro bíblico-formal; aun así, ''el año cincuenta'' podría tolerarse. El punto y coma antes de ''y cada uno'' no es necesario, y la puntuación puede simplificarse. Las notas en español también deben pulirse: una no debe comenzar con comilla sobrante y varias deben corregir su contenido y anclaje.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto (no aparecen Yahvé, Mesías, etc.). 'Jubileo' está bien. 'Libertad' para דרור es adecuada. 'Propiedad' es aceptable para אֲחֻזָּה, con nota alternativa 'posesión' o mejor 'heredad' si se quisiera matizar tenencia heredada. La decisión 'cada uno' para איש es aceptable en español, pero la nota debe reconocer que el hebreo usa una forma masculina singular distributiva, no decir que el hebreo literalmente dice 'cada uno'.
  issues:
  - severity: high
    issue: El verbo inicial 'santificarán' no refleja claramente la segunda persona plural del hebreo.
    rationale: וְקִדַּשְׁתֶּם es 'ustedes consagrarán/santificarán'. En español, una forma en -rán sin sujeto expreso se interpreta normalmente como tercera persona plural, lo que desalinearía el mandato dirigido al pueblo.
  - severity: high
    issue: La nota [a] está anclada en 'año cincuenta' pero su contenido explica דרור ('libertad/liberación').
    rationale: Las notas deben anclarse exactamente al término relevante en el texto. Aquí induce error exegético y editorial.
  - severity: high
    issue: Las notas [c] y [d] no siguen correctamente la distribución del audit trail inglés ni sus referentes semánticos.
    rationale: La nota sobre propiedad/posesión debe ir en 'propiedad'; la nota sobre 'clan' debe ir en 'familia'. Además, la nota cultural del distributivo debe reformularse con exactitud.
  - severity: medium
    issue: 'La nota b dice ''Hebreo: cada uno'', lo cual es inexacto.'
    rationale: El hebreo usa איש, literalmente 'hombre/varón', aunque con valor distributivo. La nota debe explicarlo sin falsear la forma fuente.
  - severity: low
    issue: La puntuación y formulación pueden mejorarse para mayor naturalidad española.
    rationale: Eliminar el punto y coma y usar 'consagrarán' produce una lectura más natural y fiel al registro.
  revised_spanish_text: Y ustedes consagrarán el quincuagésimo año, y proclamarán libertad[a] en la tierra para todos sus habitantes. Será un jubileo para ustedes, y cada uno[b] volverá a su propiedad[c], y cada uno volverá a su familia[d].
  revised_footnotes:
