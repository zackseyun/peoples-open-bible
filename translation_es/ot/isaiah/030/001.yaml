translation:
  language: es
  text: ¡Ay de los hijos rebeldes, declara Yahvé, que ejecutan un plan, pero no de parte mía; que derraman una libación[a], pero no por mi Espíritu, para añadir pecado sobre pecado!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tejen un cubrimiento»; algunos entienden la expresión en un sentido más amplio, en contexto, como «hacen una alianza». El hebreo, según su vocalización, se lee más naturalmente como «derraman una libación».
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - Woe
  - ¡Ay de
  lexicon: HALOT
  rationale: En español profético, «¡Ay!» conserva el tono de lamentación y denuncia. Lo acompaño con la construcción completa «¡Ay de...» para mantener la fuerza oracular del hebreo sin sonar forzado.
- source_word: בָּנִים סוֹרְרִים
  english_pob_choice: rebellious children
  chosen_spanish: los hijos rebeldes
  alternatives_spanish:
  - los hijos obstinados
  - los hijos descarriados
  lexicon: HALOT
  rationale: «Hijos» conserva el vínculo filial/covenantal; «rebeldes» comunica mejor que «obstinados» la defianza activa del participio סוֹרְרִים.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: «Declara» mantiene la fórmula profética solemne. «Yahvé» sigue el principio del proyecto para יְהוָה y evita el masking con «SEÑOR».
- source_word: לַעֲשׂוֹת עֵצָה
  english_pob_choice: who carry out a plan
  chosen_spanish: que ejecutan un plan
  alternatives_spanish:
  - que llevan a cabo un plan
  - que hacen un plan
  lexicon: HALOT
  rationale: En contexto político, la idea es poner en obra una estrategia. «Ejecutan» conserva la fuerza de la acción concreta mejor que una traducción más estática.
- source_word: וְלֹא מִנִּי
  english_pob_choice: but not from me
  chosen_spanish: pero no de parte mía
  alternatives_spanish:
  - pero no de mí
  - pero no de mi parte
  lexicon: HALOT
  rationale: La preposición marca origen/procedencia. «De parte mía» suena natural en español y preserva el contraste con el plan que sí procede de Yahvé.
- source_word: וְלִנְסֹךְ מַסֵּכָה
  english_pob_choice: and who pour out a libation
  chosen_spanish: que derraman una libación[a]
  alternatives_spanish:
  - que vierten una libación
  - que tejen un cubrimiento
  - que hacen una alianza
  lexicon: HALOT
  rationale: Sigo la vocalización masorética, que apunta naturalmente a un derramamiento/ofrecimiento líquido. Mantengo la ambigüedad contextual documentada mediante la nota, sin resolverla por una paráfrasis política en el texto principal.
- source_word: וְלֹא רוּחִי
  english_pob_choice: but not by my Spirit
  chosen_spanish: pero no por mi Espíritu
  alternatives_spanish:
  - pero no por mi espíritu
  - pero no según mi Espíritu
  lexicon: HALOT
  rationale: Aquí רוּחַ denota la agencia del Espíritu divino. «Por mi Espíritu» comunica bien la idea de medio/impulso rector sin perder el peso teológico.
- source_word: לְמַעַן סְפוֹת
  english_pob_choice: so as to add
  chosen_spanish: para añadir
  alternatives_spanish:
  - a fin de añadir
  - para acumular
  lexicon: HALOT
  rationale: La construcción expresa resultado o propósito. «Añadir» es breve y conserva la progresión del hebreo.
- source_word: חַטָּאת עַל חַטָּאת
  english_pob_choice: sin to sin
  chosen_spanish: pecado sobre pecado
  alternatives_spanish:
  - pecado tras pecado
  - pecado a pecado
  lexicon: HALOT
  rationale: La repetición hebrea expresa acumulación de culpa. «Sobre» mantiene la imagen de acumulación y la cadencia idiomática en español.
theological_decisions:
- issue: Representación de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» conserva la referencia personal y pactal sin ocultarla tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְלִנְסֹךְ מַסֵּכָה
  english_pob_reading: retain the Masoretic sense 'pour out a libation' in the main text
  chosen_spanish_reading: mantener en el texto principal «derraman una libación»
  alternative_spanish_readings:
  - tejen un cubrimiento
  - hacen una alianza
  rationale: La vocalización masorética apunta de manera directa a una libación/oblación líquida. Como el contexto histórico puede sugerir una lectura política, se conserva la tensión textual y se documentan las otras posibilidades en la nota, sin reemplazar el sentido masorético en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto sigue de cerca la traducción inglesa auditada, pero ajusta el orden y la sintaxis para un español natural. Se preserva la ambigüedad documentada en וְלִנְסֹךְ מַסֵּכָה mediante nota, sin desplazarla al texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Espíritu» con mayúscula cuando refiere al Espíritu divino.
  - «Pecado sobre pecado» conserva la repetición hebrea como acumulación.
  - La nota [a] queda anclada solo en «libación» para no duplicar marcadores.
