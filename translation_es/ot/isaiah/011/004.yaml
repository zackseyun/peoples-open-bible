translation:
  language: es
  text: pero él juzgará a los pobres con justicia[a], y decidirá con equidad para los humildes de la tierra; golpeará la tierra con la vara de su boca[e][d][c][b], y con el aliento de sus labios hará morir al malvado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «y él juzgará». La conjunción puede leerse simplemente como «y», pero «pero» resalta el contraste con el versículo anterior: él no juzga por las apariencias.'
    reason: lexical_alternative
  - marker: b
    text: «Con justicia» también puede traducirse «con justicia/rectitud».
    reason: lexical_alternative
  - marker: c
    text: O «para los humildes de la tierra».
    reason: lexical_alternative
  - marker: d
    text: «Tierra» también puede traducirse «país».
    reason: lexical_alternative
  - marker: e
    text: O «hará morir al malvado». El singular hebreo puede leerse como singular representativo («el malvado») o como una figura individual.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁפַט
  english_pob_choice: but he will judge
  chosen_spanish: pero él juzgará
  alternatives_spanish:
  - y él juzgará
  lexicon: HALOT
  rationale: En este contexto real y judicial, שָׁפַט conserva la idea de juzgar/gobernar. El español «juzgará» mantiene el sentido forense. Traduzco la waw inicial como «pero» para reflejar el contraste con el versículo anterior, tal como hace el audit trail inglés.
- source_word: בְּצֶדֶק
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - con rectitud
  - en justicia
  lexicon: HALOT
  rationale: צֶדֶק puede abarcar justicia y rectitud. En español, «con justicia» comunica bien el valor moral-judicial. Se conserva la tensión entre justicia y rectitud, sin forzar un tecnicismo.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los necesitados
  lexicon: HALOT
  rationale: דַּלִּים designa a los de baja condición, pobres o sin poder social. «Los pobres» es la opción más natural y fiel en un contexto de juicio.
- source_word: וְהוֹכִיחַ
  english_pob_choice: and decide
  chosen_spanish: y decidirá
  alternatives_spanish:
  - y arbitra rá
  - y dará juicio
  - y reprenderá
  lexicon: HALOT
  rationale: En contextos judiciales, el hifil de יכח puede significar decidir, arbitrar o dictaminar, no solo reprender. «Decidirá» evita reducir el verbo a corrección verbal y mantiene el paralelismo con «juzgará».
- source_word: בְּמִישׁוֹר
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con rectitud
  - justamente
  - en equidad
  lexicon: HALOT
  rationale: מִישׁוֹר comunica llaneza, rectitud y equidad. «Con equidad» es idiomático en español y adecuado al marco judicial.
- source_word: לְעַנְוֵי אָרֶץ
  english_pob_choice: for the humble of the earth
  chosen_spanish: para los humildes de la tierra
  alternatives_spanish:
  - para los mansos de la tierra
  - para los afligidos de la tierra
  - para los humildes del país
  lexicon: HALOT
  rationale: עָנָו puede ser humilde, manso o afligido. «Humildes» preserva la dimensión ética-social sin cerrar indebidamente el matiz a solo interioridad o solo sufrimiento. «Tierra» conserva el alcance amplio de אֶרֶץ.
- source_word: וְהִכָּה אֶרֶץ
  english_pob_choice: he will strike the earth
  chosen_spanish: golpeará la tierra
  alternatives_spanish:
  - herirá la tierra
  - azotará la tierra
  lexicon: HALOT
  rationale: נכה significa golpear, herir o derribar. «Golpeará» es claro y mantiene la fuerza de la imagen. «Tierra» sigue el sentido amplio preferido en el audit trail.
- source_word: בְּשֵׁבֶט פִּיו
  english_pob_choice: with the rod of his mouth
  chosen_spanish: con la vara de su boca
  alternatives_spanish:
  - con el cetro de su boca
  - con la vara de su palabra
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, cetro o bastón. «Vara» conserva la imagen concreta de instrumento de juicio y encaja con la metáfora del habla como medio de sentencia. «Boca» sigue el hebreo literalmente y evita una paráfrasis expansiva.
- source_word: וּבְרוּחַ שְׂפָתָיו
  english_pob_choice: with the breath of his lips
  chosen_spanish: y con el aliento de sus labios
  alternatives_spanish:
  - y con el soplo de sus labios
  - y con el espíritu de sus labios
  lexicon: HALOT
  rationale: רוּחַ aquí es mejor como «aliento» por el paralelismo con boca y labios; en español conserva la imagen concreta del habla poderosa sin perder la posibilidad de ‘espíritu’ como sentido alterno, que sería demasiado abstracto en este contexto.
- source_word: יָמִית רָשָׁע
  english_pob_choice: he will put the wicked to death
  chosen_spanish: hará morir al malvado
  alternatives_spanish:
  - matará al malvado
  - dará muerte al malvado
  - hará morir a los malvados
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. «Hará morir» respeta la forma causativa y evita endurecer innecesariamente el tono con un español demasiado mecanicista. «Malvado» conserva el singular hebreo sin perder el valor genérico/representativo.
theological_decisions:
- issue: Valor de la conjunción inicial וְ en contraste con el versículo anterior
  english_pob_reading: but he will judge
  chosen_spanish_reading: pero él juzgará
  alternative_spanish_readings:
  - y él juzgará
  rationale: 'El audit trail inglés entiende que la conjunción introduce contraste con el v. 3: no juzga por apariencias. «Pero» hace visible ese contraste en español sin cambiar el contenido.'
  doctrine_reference: Contraste literario de Isaías 11:3-4
- issue: Sentido de אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra/país
  - el país
  rationale: Se conserva el alcance amplio de אֶרֶץ, coherente con el horizonte del pasaje. «Tierra» es la opción más abarcadora y mantiene la posibilidad cósmica sin excluir el uso territorial.
  doctrine_reference: Alcance semántico de אֶרֶץ
- issue: Interpretación de רָשָׁע
  english_pob_reading: the wicked (collective/generic)
  chosen_spanish_reading: al malvado
  alternative_spanish_readings:
  - a los malvados
  - al impío
  - al malvado/a los malvados
  rationale: Se conserva el singular hebreo, que puede funcionar como singular representativo o genérico. «Al malvado» deja abierta esa tensión textual sin resolverla artificialmente a plural o a una figura individualizada.
  doctrine_reference: Preservar tensión entre lectura colectiva y singular representativo
translation_notes:
  revision_awareness: 'Se siguió el pasaje final del audit trail inglés (latest_revision_pass: unchanged=true; cross_check status high_agreement). No se detectaron revisiones aplicadas; la redacción española preserva las decisiones léxicas y la tensión teológica documentadas, añadiendo notas donde el español introduce ambigüedad o donde el hebreo admite lecturas alternativas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se eligió «la tierra» para אֶרֶץ por coherencia con el alcance amplio del audit trail; no se usó «país» en el texto principal para no estrechar el sentido.
  - Se evitó «siervo» para דַּלִּים/עַנְוֵי por no corresponder al léxico del versículo.
  - Se evitó «Cristo/Mesías» porque el versículo no usa esos términos.
  - Se preservó la imagen de juicio verbal («vara de su boca», «aliento de sus labios») sin convertirla en mera metáfora de autoridad abstracta.
