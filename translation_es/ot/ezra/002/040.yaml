    rationale: El POB inglés usa «Kadmiel». En español, «Cadmiel» es posible, pero la decisión auditada habla de transliteración del nombre, no de adaptación fonética. «Kadmiel» preserva mejor la forma y evita inconsistencia dentro de la política de nombres.
  - severity: low
