translation:
  language: es
  text: 'Entonces Yahvé envió a Natán a David. Él vino a él y le dijo[a]: “Había dos hombres en una ciudad, uno rico y uno pobre.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Vivían dos hombres en una ciudad”. El hebreo dice más literalmente: “Había dos hombres en una ciudad”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח / sent
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En español, 'envió' reproduce con naturalidad el acto de mandar a alguien con una misión. 'Mandó' puede sonar un poco más general y 'despachó' es demasiado administrativo para el relato.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como 'Yahvé', en línea con la práctica POB y sin sustituirlo por un título. 'SEÑOR' ocultaría el Tetragrámaton; 'Jehová' no es la forma preferida del proyecto.
- source_word: אֶת נָתָן / Nathan
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: HALOT
  rationale: 'Los nombres propios se adaptan a la forma usual en español bíblico: ''Natán''. Es la forma reconocible y transparente para lectores en español.'
- source_word: אֶל דָּוִד / to David
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - contra David
  lexicon: HALOT
  rationale: La preposición indica destino/dirección en este contexto, por lo que 'a David' es la equivalencia natural. 'Contra David' introduciría una interpretación que el hebreo no exige aquí.
- source_word: וַיָּבֹא אֵלָיו / He came to him
  english_pob_choice: He came to him
  chosen_spanish: Él fue a él
  alternatives_spanish:
  - Él vino a él
  - Se le acercó
  lexicon: HALOT
  rationale: Se conserva la referencia explícita al movimiento hacia David. Aunque 'vino a él' sería más literal, en español puede sonar menos natural según el punto de vista narrativo; 'fue a él' mantiene transparencia y claridad.
- source_word: וַיֹּאמֶר לוֹ / and said to him
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo a él
  lexicon: HALOT
  rationale: '''Le dijo'' expresa de forma idiomática el complemento indirecto explícito del hebreo. Se evita el calco ''dijo a él'' por ser menos natural en español.'
- source_word: שְׁנֵי אֲנָשִׁים / two men
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  - dos personas
  lexicon: HALOT
  rationale: '''Hombres'' reproduce con exactitud el plural masculino del hebreo y conserva la referencia a dos individuos varones. ''Personas'' diluye ese dato; ''varones'' sería correcto pero más marcado.'
- source_word: הָיוּ / There were
  english_pob_choice: There were
  chosen_spanish: Había
  alternatives_spanish:
  - Habían
  lexicon: HALOT
  rationale: El existencial hebreo se expresa de manera natural con 'había' en español. 'Habían' sería incorrecto en este uso. La forma impersonal mantiene el valor descriptivo sin introducir 'vivían'.
- source_word: בְּעִיר אֶחָת / in one city
  english_pob_choice: in one city
  chosen_spanish: en una ciudad
  alternatives_spanish:
  - en una cierta ciudad
  - en la misma ciudad
  lexicon: HALOT
  rationale: '''En una ciudad'' comunica de modo natural la expresión hebrea y preserva su carácter indefinido. ''Una cierta ciudad'' añade más especificación de la que el texto da; ''la misma ciudad'' adelanta una relación no explicitada.'
- source_word: אֶחָד עָשִׁיר / one rich
  english_pob_choice: one rich
  chosen_spanish: uno rico
  alternatives_spanish:
  - uno era rico
  - un hombre rico
  lexicon: HALOT
  rationale: Se mantiene la construcción adjetival breve del hebreo dentro del paralelismo con 'uno pobre'. 'Uno rico' es comprensible en español en este contexto narrativo; las alternativas completan la elipsis pero interpretan más.
- source_word: וְאֶחָד רָאשׁ / and one poor
  english_pob_choice: and one poor
  chosen_spanish: y uno pobre
  alternatives_spanish:
  - y uno necesitado
  - y uno indigente
  lexicon: HALOT
  rationale: '''Pobre'' es la equivalencia más directa y natural para el contraste con ''rico''. ''Necesitado'' o ''indigente'' son posibles, pero menos inmediatos para el paralelismo simple del verso.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. En español POB se conserva el nombre propio 'Yahvé' para mantener la transparencia textual y la identidad del nombre revelado, en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto de revisión en inglés indica alta concordancia y ningún cambio sustantivo en el pasaje; la redacción española sigue ese mismo resultado, con ajustes idiomáticos mínimos para naturalidad y transparencia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar del proyecto.
  - Se usa 'Natán' como forma española bíblica del nombre propio.
  - Se evita 'SEÑOR' para no ocultar el nombre divino del hebreo.
  - La nota al pie conserva la alternativa de 'había' sin introducir una lectura más interpretativa como 'vivían'.
