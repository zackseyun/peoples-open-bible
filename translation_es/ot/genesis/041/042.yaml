translation:
  language: es
  text: Entonces Faraón quitó de su mano el anillo de sello[a] y se lo puso en la mano a José, y lo vistió con vestiduras de lino fino[b] y le puso al cuello un collar de oro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anillo»; el término hebreo puede designar un anillo en general, pero en este contexto real probablemente se refiere al anillo de sello del faraón, símbolo de autoridad delegada.
    reason: lexical_alternative
  - marker: b
    text: «Lino fino» traduce שֵׁשׁ, término para lino de alta calidad asociado con riqueza y honor.
    reason: cultural_note
  - marker: c
    text: O «cadena de oro» o «collarín de oro». La forma exacta del adorno para el cuello indicada por el término hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - sacó
  lexicon: HALOT
  rationale: El verbo expresa la acción de apartar o quitar un objeto. «Quitó» es natural en español y conserva el matiz de retirar algo de la mano en una escena ceremonial.
- source_word: טַבַּעְתּוֹ
  english_pob_choice: his signet ring
  chosen_spanish: el anillo de sello
  alternatives_spanish:
  - su anillo
  - su anillo de sello
  lexicon: HALOT
  rationale: En este contexto real y administrativo, el objeto no es un anillo cualquiera sino uno con función de sello y autoridad delegada. «Anillo de sello» conserva esa fuerza funcional.
- source_word: מֵעַל יָדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de encima de su mano
  - de sobre su mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sobre su mano», pero en español «de su mano» comunica de forma clara y natural la remoción del anillo.
- source_word: וַיִּתֵּן אֹתָהּ עַל יַד יוֹסֵף
  english_pob_choice: and put it on Joseph’s hand
  chosen_spanish: y lo puso sobre la mano de José
  alternatives_spanish:
  - y lo colocó sobre la mano de José
  - y se lo puso a José en la mano
  lexicon: HALOT
  rationale: El hebreo combina dar/poner con la localización «sobre la mano». «Lo puso sobre la mano de José» mantiene el gesto físico y la referencia espacial sin sonar forzado.
- source_word: וַיַּלְבֵּשׁ אֹתוֹ
  english_pob_choice: and he clothed him
  chosen_spanish: y lo vistió
  alternatives_spanish:
  - y lo revistió
  - y lo puso vestido
  lexicon: HALOT
  rationale: «Vestir» transmite bien la investidura formal. El verbo «clothed» de la POB inglesa conserva dignidad; en español, «lo vistió» es equivalente y natural.
- source_word: בִּגְדֵי שֵׁשׁ
  english_pob_choice: garments of fine linen
  chosen_spanish: vestiduras de lino fino
  alternatives_spanish:
  - ropas de lino fino
  - vestiduras de lino de calidad
  lexicon: HALOT
  rationale: שֵׁשׁ apunta a lino fino o de alta calidad asociado con honor. «Lino fino» conserva el valor social y material señalado por la traducción inglesa y la nota auditada.
- source_word: רְבִד הַזָּהָב
  english_pob_choice: a gold chain
  chosen_spanish: un collar de oro
  alternatives_spanish:
  - una cadena de oro
  - un collarín de oro
  lexicon: HALOT
  rationale: El término designa un adorno para el cuello cuya forma exacta es incierta. «Collar de oro» comunica el ornamento de honor sin fijar indebidamente su forma.
- source_word: עַל צַוָּארוֹ
  english_pob_choice: around his neck
  chosen_spanish: al cuello
  alternatives_spanish:
  - sobre su cuello
  - alrededor de su cuello
  lexicon: HALOT
  rationale: En español, con un adorno, «al cuello» es idiomático y preserva la localización sin la rigidez de un calco.
translation_notes:
  revision_awareness: El texto español sigue el pasaje hebreo y el audit trail inglés con acuerdo alto y sin revisiones aplicadas; se mantiene la misma decisión funcional para טַבַּעְתּוֹ como anillo de sello, שֵׁשׁ como lino fino y רְבִד como ornamento de honor para el cuello, evitando calcos innecesarios.
  spanish_consistency_notes:
  - Se usa «Faraón» y «José» como nombres propios establecidos.
  - Se mantiene «Yahvé» fuera del versículo porque el hebreo no contiene el nombre divino aquí.
  - «Anillo de sello» conserva la función real-administrativa señalada en la auditoría inglesa.
  - «Vestiduras de lino fino» mantiene el registro ceremonial y honorífico del texto.
  - «Un collar de oro» deja abierta la forma exacta del ornamento, como en la nota auditada inglesa.
