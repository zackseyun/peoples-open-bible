review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: fórmula profética, denuncia con הוֹי, ‘profetas necios’, seguimiento de su propio espíritu y ausencia de visión verdadera. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada, porque repite el texto principal en vez de dar la opción literal ‘que van/andan tras su propio espíritu’.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. ‘Así dice el Señor Yahvé’ y ‘¡Ay de los profetas necios…!’ funcionan bien. Solo requiere un ajuste menor en la nota al pie para que sea útil y exacta; además conviene cerrar tipográficamente ‘¡Ay de ...!’ con una formulación plenamente correcta en el texto revisado.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → ‘Yahvé’; אֲדֹנָי יְהוִה → ‘el Señor Yahvé’; רוּחַ → ‘espíritu’; נבל → ‘necios’. No hay conflicto doctrinal relevante. La única desalineación está en la nota, no en el texto principal.'
  issues:
  - severity: medium
    issue: La nota al pie a repite el texto principal en lugar de ofrecer la alternativa literal documentada.
    rationale: El English POB conserva como alternativa ‘who walk after their own spirit’ / literalmente ‘who go after their own spirit’. En español, la nota debería reflejar esa alternativa con ‘que andan tras su propio espíritu’ o ‘que van tras su propio espíritu’, no repetir ‘que siguen su propio espíritu’.
  - severity: low
    issue: La redacción del texto puede pulirse mínimamente para una puntuación española impecable.
    rationale: ‘¡Ay de los profetas necios[a], ...!’ es correcta, pero conviene mantener una forma final cerrada y estable en la revisión junto con la nota corregida.
  revised_spanish_text: 'Así dice el Señor Yahvé: ¡Ay de los profetas necios[a], que siguen su propio espíritu y no han visto nada!'
  revised_footnotes:
  - marker: a
    text: 'O: «que andan tras su propio espíritu»; el hebreo dice literalmente «que van tras su propio espíritu».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y bien alineado con el proyecto. Solo se corrige la nota al pie para que preserve la alternativa lexical documentada y el giro literal del hebreo, en lugar de repetir la traducción principal.
