translation:
  language: es
  text: Pero Josías no apartó su rostro de él[a]; más bien, se disfrazó para pelear contra él. No escuchó las palabras de Necao de la boca de Dios[b], y fue a pelear en el valle de Meguido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se apartó de él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la boca de Dios».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la llanura de Meguido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסֵב ... פָנָיו מִמֶּנּוּ
  english_pob_choice: did not turn his face away from him
  chosen_spanish: no apartó su rostro de él
  alternatives_spanish:
  - no se apartó de él
  - no volvió su rostro de él
  lexicon: HALOT
  rationale: La imagen hebrea incluye el giro del rostro; en español, «apartar su rostro de él» conserva esa concreción sin sonar forzado. Se prefirió «no apartó» sobre una paráfrasis más general para mantener la fuerza idiomática del texto.
- source_word: כִּי
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - al contrario
  lexicon: HALOT
  rationale: 'Aquí la partícula introduce una contraposición explicativa: en vez de apartarse, Josías hizo otra cosa. «Más bien» reproduce bien esa relación sin sobrerresolverla.'
- source_word: לְהִלָּחֵם בּוֹ
  english_pob_choice: to fight against him
  chosen_spanish: para pelear contra él
  alternatives_spanish:
  - para luchar contra él
  - para hacer guerra contra él
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Pelear contra él» es natural en español y conserva el sentido bélico de oposición directa que el contexto demanda.
- source_word: הִתְחַפֵּשׂ
  english_pob_choice: disguised himself
  chosen_spanish: se disfrazó
  alternatives_spanish:
  - se puso en disfraz
  - se ocultó bajo otro aspecto
  lexicon: HALOT
  rationale: El verbo hitpael señala que tomó una apariencia distinta. «Se disfrazó» es la equivalencia más clara y estable en español contemporáneo.
- source_word: שָׁמַע אֶל
  english_pob_choice: did not listen to
  chosen_spanish: no escuchó
  alternatives_spanish:
  - no hizo caso de
  - no obedeció a
  lexicon: HALOT
  rationale: «Escuchar» conserva la amplitud del hebreo entre oír, atender y obedecer, sin convertir de entrada el matiz en una orden explícita.
- source_word: דִּבְרֵי נְכוֹ
  english_pob_choice: the words of Neco
  chosen_spanish: las palabras de Necao
  alternatives_spanish:
  - el mensaje de Necao
  - las declaraciones de Necao
  lexicon: HALOT
  rationale: «Palabras» sigue de cerca el sustantivo hebreo y evita interpretar el contenido como «mensaje» más de lo que el texto exige.
- source_word: מִפִּי אֱלֹהִים
  english_pob_choice: from the mouth of God
  chosen_spanish: de la boca de Dios
  alternatives_spanish:
  - de parte de Dios
  - de la boca de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la metáfora corporal del hebreo, pero en español la preposición «de» expresa con naturalidad la procedencia. Se evita reemplazarla por una formulación más abstracta que aplane la imagen.
- source_word: וַיָּבֹא
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: HALOT
  rationale: En este contexto narrativo, «vino» reproduce el movimiento de acercamiento hacia el combate y suena más bíblico en español sin volverse arcaizante.
- source_word: בְּבִקְעַת מְגִדּוֹ
  english_pob_choice: in the Valley of Megiddo
  chosen_spanish: en el Valle de Meguido
  alternatives_spanish:
  - en la llanura de Meguido
  - en la depresión de Meguido
  lexicon: HALOT
  rationale: «Biq‘áh» puede ser valle o llanura; aquí se eligió «Valle de Meguido» como equivalente geográfico claro y tradicionalmente reconocible en español bíblico, sin forzar una precisión topográfica no explicitada por el término.
theological_decisions:
- issue: El origen divino de las palabras de Necao
  english_pob_reading: The main text preserves the chronicler's claim that Neco's words were 'from the mouth of God.'
  chosen_spanish_reading: 'El texto conserva la afirmación del cronista: las palabras de Necao procedían «de la boca de Dios».'
  alternative_spanish_readings:
  - de parte de Dios
  - según Dios
  rationale: No se suaviza ni se explica la afirmación para resolver la tensión interpretativa. La traducción conserva la formulación concreta del hebreo para que el lector perciba que el versículo atribuye a esas palabras un origen divino.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail inglés, incorporando el tono más formal de «rather» como «más bien» y manteniendo la construcción breve de propósito en «para pelear». También se conservó la afirmación teológica sin atenuarla, como en la revisión final inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del Tetragrámaton en el proyecto, pero aquí el hebreo no contiene יהוה; por eso no aparece en el texto.
  - «Dios» se mantiene para אֱלֹהִים, preservando la frase fija «de la boca de Dios» sin sustituirla por una paráfrasis.
  - «Meguido» sigue la ortografía española habitual para el topónimo; la nota ofrece «llanura» como alternativa donde el sustantivo hebreo lo permite.
