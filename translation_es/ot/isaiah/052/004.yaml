translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: Mi pueblo descendió primero a Egipto para residir allí como forastero, y Asiria lo[a] oprimió sin causa[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «lo oprimió». El singular puede referirse a «mi pueblo» como colectivo; por eso se conserva «lo» en vez de pluralizar automáticamente.
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «por nada», «gratuitamente» o «sin pago». La expresión hebrea puede apuntar a ausencia de causa, de compensación o de motivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: En español, el título compuesto se comunica de manera natural como «el Señor Yahvé», preservando la combinación de אֲדֹנָי + יְהוִה sin ocultar el nombre divino tras una convención como «SEÑOR». «Señor Dios» suaviza la presencia del nombre propio y pierde la tensión del compuesto.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: HALOT
  rationale: El contexto histórico y geográfico exige el nombre común del país. «Egipto» es la forma clara y fiel en español.
- source_word: יָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de ir «hacia abajo» para Egipto. «Descendió» conserva el movimiento y el registro digno; «bajó» sería más coloquial.
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo mío
  lexicon: HALOT
  rationale: La expresión de pacto se vierte naturalmente como «mi pueblo». Mantiene el valor colectivo y relacional del posesivo divino.
- source_word: בָרִאשֹׁנָה
  english_pob_choice: at first
  chosen_spanish: primero
  alternatives_spanish:
  - al principio
  - en un primer momento
  lexicon: HALOT
  rationale: Aquí marca la prioridad temporal del descenso a Egipto frente a la opresión posterior de Asiria. «Primero» conserva esa secuencia de manera breve y clara.
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: para habitar allí
  alternatives_spanish:
  - para sojornar allí
  - para residir allí como forasteros
  - para morar allí
  lexicon: HALOT
  rationale: Aunque «sojourn» tiene un valor técnico, «sojornar» suena poco natural en español bíblico actual. «Para habitar allí» comunica residencia temporal sin sobrecargar el verso; la idea de estancia forastera queda implícita por el contexto de Egipto. Se evita «morar» por su tinte más tradicional que explicativo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - ahí
  lexicon: HALOT
  rationale: Deictic locativo simple; «allí» es el equivalente más neutro y natural.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: El contexto se refiere al imperio/nación, no al nombre eponímico. «Asiria» es la forma estándar y transparente en español.
- source_word: בְּאֶפֶס
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - gratuitamente
  - por nada
  - sin motivo
  lexicon: HALOT
  rationale: La frase expresa la ausencia de razón o de base para la opresión. «Sin causa» conserva el sentido moral y jurídico del hebreo con buena naturalidad.
- source_word: עֲשָׁקוֹ
  english_pob_choice: oppressed them
  chosen_spanish: lo oprimió
  alternatives_spanish:
  - los oprimió
  - lo afligió
  - lo explotó
  lexicon: HALOT
  rationale: El hebreo lleva sufijo singular masculino, y el POB inglés notó esa forma singular como un colectivo que representa a Israel. En español, «lo oprimió» preserva esa observación textual mejor que pluralizar sin más. «Oprimió» sigue de cerca el valor de עשק, que denota opresión/injusticia económica o social.
theological_decisions:
- issue: Cómo rendir el nombre divino YHWH en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El proyecto español debe mostrar el nombre divino en vez de ocultarlo. «Yahvé» es el equivalente adoptado para יְהוָה; mantener «Señor» para אֲדֹנָי refleja el título reverencial y evita la redundancia o la sustitución tradicional por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si la cláusula final debe suavizar el singular pronominal de עֲשָׁקוֹ
  english_pob_reading: oppressed them / oppressed him
  chosen_spanish_reading: lo oprimió
  alternative_spanish_readings:
  - los oprimió
  rationale: El hebreo conserva un sufijo singular. Dado que «mi pueblo» puede funcionar como singular colectivo, la forma singular en español preserva la huella del texto fuente y la tensión documentada por el POB, aun si el referente es corporativo.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve source sense unless context demands smoothing'
translation_notes:
  revision_awareness: 'He seguido el último estado revisado del audit trail en cuanto a la cláusula final: la observación sobre el sufijo singular de עֲשָׁקוֹ se mantiene como tensión relevante, pero en español se conserva el singular pronominal para reflejar el dato fuente. También se conserva la decisión revisada del inglés de no forzar una pluralización meramente explicativa.'
  spanish_consistency_notes:
  - Usé «Señor Yahvé» para reflejar el compuesto אֲדֹנָי יְהוִה sin recurrir al masking tradicional.
  - Mantuve «mi pueblo» y no «mis pueblos» ni una paráfrasis colectiva.
  - «Descendió» reproduce el idiomático hebreo de bajar a Egipto con registro digno.
  - La nota de pie a pie sobre «sin causa» recoge las alternativas léxicas documentadas en el POB inglés.
  - No añadí vocabulario doctrinal no respaldado por el fuente; el verso permanece breve y sobrio.
