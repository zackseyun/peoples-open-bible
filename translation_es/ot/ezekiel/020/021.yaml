  rationale: Se corrigió el anclaje de la nota para que la referencia a Levítico 18:5 y la alternativa inclusiva recaigan sobre la cláusula de 'un hombre... vivirá por ellos'. También se distinguió 'juicios' de 'estatutos' para reflejar mejor מִשְׁפָּטַי frente a חֻקּוֹתַי, y se cambió 'consumir mi ira' por 'agotar mi ira' para mayor precisión y naturalidad conforme al hebreo y al audit trail inglés.
