    rationale: La nota inglesa está asociada al participio מְשֻׁלָּח y preserva alternativas como 'left unchecked' / 'left undisciplined'. El borrador en cambio pone una nota [a] sobre 'sabiduría' con contenido sobre 'reprensión', y una nota [b] sobre 'muchacho', que no es la alternativa principal preservada por el POB.
  - severity: low
