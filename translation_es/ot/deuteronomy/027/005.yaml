translation:
  language: es
  text: Y edificarás allí un altar para Yahvé tu Dios, un altar de piedras; no usarás hierro sobre ellas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no usarás un instrumento de hierro sobre ellas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנִיתָ
  english_pob_choice: you shall build
  chosen_spanish: edificarás
  alternatives_spanish:
  - y edificarás
  - construirás
  - deberás edificar
  lexicon: HALOT
  rationale: El perfecto con valor instruccional se expresa naturalmente en español con futuro. 'Edificarás' conserva el tono normativo y el eco de lenguaje cultual sin sonar forzado.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo simple; 'allí' es claro y solemne en español bíblico contemporáneo.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: Término estándar para el altar de sacrificio; no hay razón contextual para variar.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino como 'Yahvé' según la convención del proyecto. 'Para' comunica bien la dedicación del altar a Yahvé en este contexto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios de pacto
  lexicon: HALOT
  rationale: La forma con sufijo de 2ms expresa relación de pacto; 'tu Dios' es la correspondencia directa y natural.
- source_word: מִזְבַּח אֲבָנִים
  english_pob_choice: an altar of stones
  chosen_spanish: un altar de piedras
  alternatives_spanish:
  - un altar de piedra
  - un altar hecho de piedras
  lexicon: HALOT
  rationale: La construcción de estado constructo indica material. 'De piedras' mantiene la especificación sin convertirla en paráfrasis.
- source_word: לֹא תָנִיף
  english_pob_choice: you shall not wield
  chosen_spanish: no alzarás
  alternatives_spanish:
  - no levantarás
  - no usarás
  - no blandirás
  lexicon: HALOT
  rationale: El hifil de נוף aquí se refiere a mover o aplicar un instrumento sobre las piedras. 'Alzarás' conserva el matiz de levantar/brandir con suficiente naturalidad en español, sin introducir 'herramienta' que el hebreo no menciona explícitamente.
- source_word: עֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - encima de ellas
  - sobre esas piedras
  lexicon: HALOT
  rationale: El sufijo plural remite a las piedras; 'sobre ellas' refleja con precisión la relación espacial del mandato.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - un instrumento de hierro
  - herramienta de hierro
  lexicon: HALOT
  rationale: El sustantivo significa literalmente 'hierro'. En español puede dejarse el material como objeto de la prohibición, del mismo modo que el inglés POB deja la concreción instrumental implícita.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh / the LORD in audit context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto en español es reproducir el nombre divino como 'Yahvé', manteniendo visible el Tetragrámaton y evitando el ocultamiento tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en 'Yahvé tu Dios[a]' y manteniendo una sola nota con marcador presente en el texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la terminología proyectual.
  - '''Piedras'' traduce el plural hebreo sin imponer singular colectivo.'
  - '''Sobre ellas'' mantiene el referente plural de las piedras, no del altar en abstracto.'
  - No se añadió 'herramienta' en el texto principal para no sobreespecificar respecto del hebreo.
