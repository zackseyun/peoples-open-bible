translation:
  language: es
  text: Pues la esperanza del ingrato[a] se derretirá como escarcha invernal, y se irá como agua inútil[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del desagradecido». El adjetivo griego subraya la falta de gratitud.
    reason: lexical_alternative
  - marker: b
    text: La imagen puede sugerir agua que se va y resulta de ningún provecho porque no permanece.
    reason: cultural_note
lexical_decisions:
- source_word: ἀχαρίστου
  english_pob_choice: of the ungrateful
  chosen_spanish: del desagradecido
  alternatives_spanish:
  - del ingrato
  - del no agradecido
  - del desagradecido e ingrato
  lexicon: BDAG
  rationale: El genitivo adjetival apunta a una persona marcada por la falta de gratitud. 'Desagradecido' comunica bien ese rasgo moral en español actual y evita el matiz más frío o menos idiomático de 'no agradecido'.
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - confianza
  lexicon: BDAG
  rationale: '''Esperanza'' es el equivalente natural y directo en español para este contexto moral y poético.'
- source_word: χειμέριος πάχνη
  english_pob_choice: wintry frost
  chosen_spanish: escarcha invernal
  alternatives_spanish:
  - escarcha de invierno
  - rocío invernal
  - helada invernal
  lexicon: LSJ
  rationale: La imagen es de escarcha propia del invierno. 'Escarcha invernal' mantiene la metáfora con buena naturalidad en español y conserva el carácter visual del original.
- source_word: τακήσεται
  english_pob_choice: will melt
  chosen_spanish: se derretirá
  alternatives_spanish:
  - se derretirá por completo
  - se deshará
  - se derretirá y desaparecerá
  lexicon: BDAG
  rationale: El verbo expresa derretirse o deshacerse. 'Se derretirá' reproduce de manera directa la imagen del hielo o escarcha que pierde consistencia.
- source_word: ῥυήσεται
  english_pob_choice: will run off
  chosen_spanish: se escurrirá
  alternatives_spanish:
  - se correrá
  - se irá como agua
  - fluirá
  - se deslizará
  lexicon: LSJ
  rationale: El verbo sugiere fluir o correr away. 'Se escurrirá' refleja bien el movimiento del agua que se va y también puede insinuar que no queda disponible.
- source_word: ὕδωρ ἄχρηστον
  english_pob_choice: useless water
  chosen_spanish: agua inútil
  alternatives_spanish:
  - agua de ningún provecho
  - agua sin utilidad
  - agua inservible
  lexicon: BDAG
  rationale: '''Ἄχρηστον'' significa inútil o no utilizable. ''Agua inútil'' conserva la brevedad sentenciosa del griego; en español puede sonar a agua que no sirve para nada, lo cual encaja con la nota del POB sobre agua que se pierde y no permanece disponible.'
theological_decisions:
- issue: Alcance moral de ἀχαρίστου
  english_pob_reading: the ungrateful
  chosen_spanish_reading: el desagradecido
  alternative_spanish_readings:
  - el ingrato
  - el impío
  rationale: Se preserva el valor directo de ingratitud sin ampliar el sentido a 'impío', que introduciría una categoría más amplia que la expresada por el griego. El texto juzga una disposición moral concreta.
  doctrine_reference: Primacía del texto original; evitar ampliar categorías teológicas no presentes en el verso
translation_notes:
  revision_awareness: El texto griego y el paquete auditado en inglés están en alto acuerdo. La versión española sigue de cerca la imagen poética y conserva la tensión de ἀχαρίστου como falta de gratitud, sin expandirla a otras categorías morales. También respeta la observación del POB sobre el agua que se pierde y deja de ser útil.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Esperanza'' se conserva como término principal para ἐλπίς.'
  - '''Desagradecido'' se eligió por claridad moderna; la nota mantiene ''ingrato'' como alternativa válida.'
  - La metáfora de escarcha/agua se mantuvo sin paráfrasis doctrinal.
  - No se empleó 'Cristo' ni vocabulario cristológico, porque no aparece en el verso.
