translation:
  language: es
  text: Pilares de oro sobre una base de plata[a], y pies hermosos sobre el pecho de uno que se mantiene firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen griega es condensada y algo difícil: literalmente, «pies hermosos sobre pechos de uno firme/estable». La traducción toma εὐσταθοῦς de manera sustantiva («uno que se mantiene firme») y στέρνοις como la zona del pecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στύλοι
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  lexicon: LSJ
  rationale: El sustantivo designa soportes verticales. En español, "pilares" conserva la imagen proverbial y suena más natural que "columnas" en este paralelo poético.
- source_word: χρύσεοι
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro fino
  lexicon: LSJ
  rationale: El adjetivo griego puede expresar materialidad; "de oro" evita reducirlo a un mero color y mantiene el valor material de la imagen.
- source_word: βάσεως ἀργυρᾶς
  english_pob_choice: a silver base
  chosen_spanish: sobre una base de plata
  alternatives_spanish:
  - sobre una base plateada
  - sobre un cimiento de plata
  lexicon: LSJ
  rationale: La frase genitiva describe el soporte sobre el cual descansan los pilares. "Base" es el equivalente más directo de βάσις; "de plata" reproduce con claridad ἀργυρᾶς.
- source_word: πόδες
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - plantas
  - extremidades
  lexicon: LSJ
  rationale: El griego nombra literalmente los pies, y el español también permite conservar esa concreción sin perder el carácter figurado del dicho.
- source_word: ὡραῖοι
  english_pob_choice: beautiful
  chosen_spanish: hermosos
  alternatives_spanish:
  - bellos
  - graciosos
  - comos
  lexicon: LSJ
  rationale: El adjetivo expresa hermosura o belleza. "Hermosos" es natural en español moderno y mantiene el tono elogioso del paralelismo.
- source_word: στέρνοις
  english_pob_choice: the breast
  chosen_spanish: los pechos
  alternatives_spanish:
  - el pecho
  - el torso
  - el seno
  lexicon: LSJ
  rationale: El plural dativo se refiere al área del pecho/pechos. Se conserva la imagen corporal concreta; en español, el plural resulta más fiel al griego que un singular colectivo.
- source_word: εὐσταθοῦς
  english_pob_choice: one who stands firm
  chosen_spanish: uno que se mantiene firme
  alternatives_spanish:
  - el que está firme
  - el firme
  - el estable
  lexicon: LSJ
  rationale: El adjetivo funciona de manera substantival en el contexto. La versión española explicita ese valor sin borrar la idea de firmeza/estabilidad que el griego comunica.
theological_decisions:
- issue: Imagen corporal abrupta y sentido proverbial comprimido
  english_pob_reading: The Greek image is compressed and somewhat difficult; the English keeps the literal body imagery while interpreting εὐσταθοῦς as "one who stands firm."
  chosen_spanish_reading: Se conserva la imagen de los "pies" y los "pechos" junto con la explicación implícita de la persona que se mantiene firme.
  alternative_spanish_readings:
  - pies hermosos sobre el pecho de uno que se mantiene firme
  - pies hermosos sobre el torso del firme
  rationale: No hay una dificultad doctrinal, pero sí una tensión retórica en el hebraísmo/grecismo comprimido. Se preserva la rudeza imagética para no borrar la forma del original, siguiendo la lectura auditada en inglés.
  doctrine_reference: Poética sapiencial; no aplica una doctrina específica
translation_notes:
  revision_awareness: Se revisó el pasaje con el estado de revisión más reciente marcado como sin cambios. El control cruzado reporta acuerdo moderado y observaciones menores; por eso se mantiene la imaginería literal con una aclaración de la construcción griega en nota.
  spanish_consistency_notes:
  - Se conserva "Yahvé" como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió "pilares" frente a "columnas" para evitar un registro excesivamente arquitectónico.
  - Se evitó suavizar la expresión corporal del original, porque la audiencia POB valora la trazabilidad con el griego.
  - La nota a explica la tensión léxica de εὐσταθοῦς y στέρνοις sin resolverla por paráfrasis.
