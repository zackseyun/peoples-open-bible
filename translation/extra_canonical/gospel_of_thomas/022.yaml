  in the manuscript (ⲕⲁⲁⲥ ⲛⲛⲉⲡϩⲟⲟⲩⲧ · ⲣϩⲟⲟⲩⲧ · ⲛⲧⲉⲡⲥϩⲓⲙⲉ ⲣⲥϩⲓⲙⲉ), using ⲣ- for stative
