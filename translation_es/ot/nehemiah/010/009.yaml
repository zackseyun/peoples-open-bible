translation:
  language: es
  text: Maazías, Bilgai, Shemaías[a]; estos eran los sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se usa una transliteración española de los nombres hebreos; la tradición castellana también ofrece formas como «Semaías», pero aquí se prioriza la cercanía a la forma auditada del POB en inglés.
    reason: spanish_style_note
lexical_decisions:
- source_word: מַֽעַזְיָה
  english_pob_choice: Maaziah
  chosen_spanish: Maazías
  alternatives_spanish:
  - Maaziah
  - Maazía
  lexicon: nombre propio
  rationale: Se trata de un nombre personal, no de un término traducible. En español conviene una transliteración estable y legible; 'Maazías' conserva la forma bíblica y se adapta mejor a la ortografía española que la terminación inglesa.
- source_word: בִלְגַּי
  english_pob_choice: Bilgai
  chosen_spanish: Bilgai
  alternatives_spanish:
  - Bilgaiy
  - Bilgay
  lexicon: nombre propio
  rationale: Nombre propio hebreo en una lista de sacerdotes. Se mantiene transliterado sin traducción de sentido, siguiendo la práctica auditada del POB en inglés.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Shemaías
  alternatives_spanish:
  - Semaías
  - Shemaiah
  lexicon: nombre propio
  rationale: Nombre propio; la forma española bíblica tradicional 'Semaías' también es posible, pero 'Shemaías' conserva más de cerca la transliteración auditada del inglés POB y sigue siendo readable en español.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos hombres
  - eran estos
  lexicon: HALOT
  rationale: El demostrativo plural se expresa naturalmente con 'estos'. En español, el verbo copulativo puede quedar implícito o expresarse con claridad según el contexto; aquí 'estos eran' reproduce bien la identificación de la lista sin sobretraducir.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los sacerdotales
  lexicon: HALOT
  rationale: El hebreo tiene artículo definido; 'los sacerdotes' es la equivalencia directa y natural en español. 'Sacerdotes' mantiene el valor de grupo identificativo de la lista.
translation_notes:
  revision_awareness: El testimonio inglés revisado quedó sin cambios ('No changes needed'), y la concordancia general es alta; por eso la versión española sigue de cerca la identificación nominal y la estructura breve de la línea hebrea sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se preserva el orden enumerativo de los nombres seguido de la identificación grupal.
  - No se introducen mayúsculas especiales para oficios; 'los sacerdotes' se deja en minúscula conforme al uso normal en español.
  - La nota al pie se vincula solo a los nombres propios porque allí surge la principal decisión de transliteración frente a la tradición castellana.
