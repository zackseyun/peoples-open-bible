id: JHN.8.10
reference: John 8:10
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἀνακύψας δὲ ὁ Ἰησοῦς, καὶ μηδένα θεασάμενος πλὴν τῆς γυναικός, εἶπεν αὐτῇ,
    Ἡ γυνή, ποῦ εἰσιν ἐκεῖνοι οἱ κατήγοροί σου; Οὐδείς σε κατέκρινεν;
  language: Greek
translation:
  text: Then Jesus[a] straightened up, and seeing no one except the woman, said to
    her, "Woman, where are those accusers of yours? Has no one condemned you?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is part of the story of the woman caught in adultery (John 7:53–8:11),
      which is absent from the earliest Greek manuscripts. See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: ἀνακύπτω
  chosen: straightened up
  alternatives:
  - stood up
  - looked up
  - raised himself
  lexicon: BDAG
  rationale: Refers to Jesus raising his posture after bending down to write on the
    ground in the previous verses.
- source_word: θεάομαι
  chosen: seeing
  alternatives:
  - looking at
  - noticing
  lexicon: BDAG
  rationale: A participle indicating visual perception; 'seeing' captures the straightforward
    observation that the crowd had left.
- source_word: κατακρίνω
  chosen: condemned
  alternatives:
  - passed sentence on
  - judged
  lexicon: BDAG
  rationale: In a legal or quasi-legal context, this denotes passing a sentence of
    guilt or executing judgment.
