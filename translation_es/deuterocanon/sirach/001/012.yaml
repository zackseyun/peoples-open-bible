translation:
  language: es
  text: El temor de Yahvé alegra el corazón[a], y da gozo y favor y largos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Al que teme al Señor le irá bien al final, y en el día de su muerte será bendecido». El paralelo griego conserva una forma sustancialmente distinta de este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת יְהֹוָה
  english_pob_choice: the fear of the LORD
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - la reverencia a Yahvé
  lexicon: HALOT
  rationale: Se conserva el sustantivo 'temor' porque el hebreo יִרְאָה mantiene su fuerza plena de temor reverente; 'Yahvé' sigue el estándar del proyecto para el nombre divino en español, en lugar de ocultarlo con 'SEÑOR'.
- source_word: מְשַׂמַּחַת
  english_pob_choice: gladdens
  chosen_spanish: alegra
  alternatives_spanish:
  - hace alegre
  - goza
  lexicon: HALOT
  rationale: El sentido causativo se expresa de forma natural en español con 'alegra'. Mantiene el valor verbal sin forzar una perífrasis pesada.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  lexicon: HALOT
  rationale: '''Corazón'' es el equivalente español más natural y suficientemente fiel para el centro interior de la persona que expresa el hebreo.'
- source_word: וְנוֹתֶנֶת
  english_pob_choice: and gives
  chosen_spanish: y da
  alternatives_spanish:
  - y concede
  - y otorga
  lexicon: HALOT
  rationale: '''Da'' reproduce la coordinación simple del hebreo y su tono sapiencial sin añadir solemnidad innecesaria.'
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  lexicon: HALOT
  rationale: '''Gozo'' refleja bien el matiz de alegría plena y encaja con el paralelo de beneficios enumerados.'
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - encanto
  lexicon: HALOT
  rationale: '''Favor'' es el mejor equivalente en español para un beneficio concedido; evita cargar el verso con la resonancia teológica más específica de ''gracia''.'
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: length of days
  chosen_spanish: largura de días
  alternatives_spanish:
  - larga vida
  - longitud de días
  lexicon: HALOT
  rationale: Se conserva la forma idiomática semítica con 'largura de días', que es comprensible en español y más transparente al hebreo que 'larga vida'.
theological_decisions:
- issue: Primacía del testimonio hebreo frente al paralelo griego muy distinto
  english_pob_reading: Translate the extant Hebrew text as primary, while noting the Greek preserves a substantially different saying about the one who fears the Lord being blessed at the end and on the day of death.
  chosen_spanish_reading: Se traduce como texto principal el hebreo conservado; el griego se preserva en nota como testimonio alternativo sustancial sobre el destino final del que teme a Yahvé.
  alternative_spanish_readings:
  - El que teme al Señor tendrá bienestar al final y será bendecido el día de su muerte.
  - El temor de Yahvé gladdens the heart, and in the end it will be well with him.
  rationale: El expediente de Ben Sira da primacía al hebreo donde está disponible. Como aquí el paralelo griego presenta una formulación claramente distinta, no se armoniza con el texto hebreo; se documenta como variante importante para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando subsiste; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador se mantiene conforme al pasaje hebreo primario y documenta la variante griega sustancial en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto para יְהוָה.
  - '''Temor'' conserva la fuerza semántica plena del hebreo; no se suaviza a ''reverencia''.'
  - '''Favor'' evita desplazar el sentido sapiencial hacia una lectura doctrinal posterior de ''gracia''.'
  - '''Largura de días'' preserva el sabor idiomático hebreo y sigue siendo inteligible en español.'
