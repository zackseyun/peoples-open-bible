translation:
  language: es
  text: Y los que estaban en la torre de asedio salieron a la ciudad[a], y hubo una gran agitación en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran disturbio» o «un gran alboroto»; κίνημα puede indicar agitación o unrest en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήλοντο
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron fuera
  - se salieron
  lexicon: LSJ
  rationale: El aoristo medio expresa salida/movimiento hacia afuera. «Salieron» conserva la dirección y suena natural en español sin añadir matices de propósito.
- source_word: οἱ ἐν τῇ ἑλεπόλει
  english_pob_choice: those in the siege tower
  chosen_spanish: los que estaban en la torre de asedio
  alternatives_spanish:
  - los de la torre de asedio
  - los que estaban en el helepolo
  lexicon: LSJ
  rationale: ἑλέπολις designa una máquina de asedio, especialmente una torre de asedio. «Torre de asedio» comunica el referente militar con claridad y evita la transliteración innecesaria.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - ciudadela
  - poblado
  lexicon: LSJ
  rationale: πόλις se refiere aquí a la ciudad/área urbana dentro del contexto narrativo. «Ciudad» es el equivalente directo y más inteligible.
- source_word: κίνημα μέγα
  english_pob_choice: a great commotion
  chosen_spanish: una gran agitación
  alternatives_spanish:
  - un gran disturbio
  - un gran alboroto
  - una gran conmoción
  lexicon: LSJ
  rationale: κίνημα puede abarcar agitación, disturbio o unrest. «Agitación» mantiene la amplitud semántica y evita especificar más de lo que el griego exige.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - surgió
  - aconteció
  lexicon: LSJ
  rationale: En fórmula narrativa, γίνομαι introduce un evento. «Hubo» es breve, natural y fiel al valor idiomático del griego.
translation_notes:
  revision_awareness: El inglés auditado mantiene la lectura de la torre de asedio y opta por «a great commotion», con nota alternativa para κίνημα. La versión española conserva esa decisión y traslada la misma amplitud semántica con «agitación», dejando abierta la posibilidad de «disturbio» o «alboroto» mediante nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica no pertinente porque el versículo es narrativo y militar.
  - «Torre de asedio» se usa como equivalente explicativo de ἑλεπόλις, siguiendo el sentido del audit trail inglés.
  - 'La puntuación y el orden siguen el flujo narrativo del original: salida al interior de la ciudad y posterior agitación.'
