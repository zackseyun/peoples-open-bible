revisions:
- from: Él trajo al que viene del extremo de la tierra[a], al que golpea con poder[b],
  to: Él trajo al que es del extremo de la tierra[a], al que golpea poderosamente[b],
  rationale: Se elimina «viene» para no introducir una acción ausente del griego y se reemplaza «con poder» por «poderosamente» para reflejar mejor el adverbio κραταιῶς en español natural. Se conserva la estructura paralela del original y las notas de alternativa léxica.
  reviewer_model: gpt-5.4
