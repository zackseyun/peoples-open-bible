translation:
  language: es
  text: Los judíos que estaban en Susa también se reunieron el día catorce del mes de Adar, y mataron a trescientos hombres en Susa; pero no le echaron mano[a] al botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no extendieron su mano al botín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El verbo de קהל expresa reunirse como grupo de manera intencional. En español, «se reunieron» comunica con naturalidad esa reunión colectiva sin perder el matiz de acción conjunta.
- source_word: הַיְּהוּדִים
  english_pob_choice: The Jews
  chosen_spanish: Los judíos
  alternatives_spanish:
  - Los judeanos
  lexicon: HALOT
  rationale: En Ester, el término designa al pueblo judío como grupo étnico-religioso en el exilio persa. «Los judíos» es la forma clara y estándar en español, y evita una precisión geográfica innecesaria.
- source_word: אֲשֶׁר בְּשׁוּשָׁן
  english_pob_choice: who were in Susa
  chosen_spanish: que estaban en Susa
  alternatives_spanish:
  - que estaban en Susa/«en Susa»
  lexicon: HALOT
  rationale: La cláusula relativa delimita al subgrupo ubicado en la capital. «Que estaban en Susa» es idiomático y fiel al valor locativo del hebreo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - asimismo
  - incluso
  lexicon: HALOT
  rationale: «También» reproduce el valor aditivo de גַּם de forma natural en español, manteniendo la conexión con lo anterior.
- source_word: בְּיוֹם אַרְבָּעָה עָשָׂר לְחֹדֶשׁ אֲדָר
  english_pob_choice: on the fourteenth day of the month of Adar
  chosen_spanish: en el día catorce del mes de Adar
  alternatives_spanish:
  - el catorce del mes de Adar
  - el día catorce de Adar
  lexicon: HALOT
  rationale: Se conserva la estructura calendárica completa del hebreo. «Del mes de Adar» refleja con claridad la formulación original y evita una paráfrasis excesiva.
- source_word: וַיַּהַרְגוּ
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - derribaron
  lexicon: HALOT
  rationale: הרג es el verbo ordinario para matar. «Mataron» es directo, moderno y suficientemente preciso para este contexto narrativo.
- source_word: שְׁלֹשׁ מֵאוֹת אִישׁ
  english_pob_choice: three hundred men
  chosen_spanish: trescientos hombres
  alternatives_spanish:
  - trescientas personas
  - trescientos individuos
  lexicon: HALOT
  rationale: El sustantivo masculino singular אִישׁ tras el número se conserva con «hombres», siguiendo la precisión de género del hebreo y la decisión de POB de no neutralizar innecesariamente la referencia.
- source_word: וּבַבִּזָּה
  english_pob_choice: but on the plunder
  chosen_spanish: pero no pusieron mano en el botín
  alternatives_spanish:
  - pero no tocaron el botín
  - pero no se apropiaron del botín
  lexicon: HALOT
  rationale: בִּזָּה refiere al botín/plunder tomado en conflicto. En español, «botín» es el equivalente natural y fiel. La adversativa se explicita en el contexto para contrastar con la matanza.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  english_pob_choice: they did not lay a hand
  chosen_spanish: no pusieron mano
  alternatives_spanish:
  - no extendieron su mano
  - no alargaron la mano
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de «extender/enviar la mano». En español, «no pusieron mano» conserva el giro idiomático con la misma idea de no tomar posesión del botín; es natural y reconocible.
theological_decisions:
- issue: La referencia de Adar y el uso del nombre divino no están en este versículo, pero sí la precisión narrativa sobre la conducta de los judíos.
  english_pob_reading: The verse presents the Jews' action without theological comment; the final clause emphasizes restraint regarding plunder.
  chosen_spanish_reading: El versículo presenta la acción de los judíos sin comentario teológico; la última cláusula subraya su abstención respecto del botín.
  alternative_spanish_readings:
  - El versículo destaca solo su victoria militar
  - El versículo podría leerse como una aprobación de tomar botín
  rationale: No se introduce ninguna implicación doctrinal adicional. La redacción preserva el contraste narrativo entre matar y no tocar el botín, sin convertirlo en una afirmación ética más amplia de la que el texto explícitamente ofrece.
  doctrine_reference: Narrative ethics / restraint in warfare
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura auditada del inglés POB y del hebreo: mantiene la ubicación en Susa, la fecha completa de Adar, el número exacto de hombres y el modismo final sobre la mano/botín. No se detectaron revisiones aplicadas en el pasaje fuente; por eso no se introducen variantes textuales ni cambios de sentido.'
  spanish_consistency_notes:
  - Se mantiene «Susa» como topónimo estándar para la ciudad persa.
  - Se usa «botín» para בִּזָּה, en línea con el valor bélico del término.
  - Se conserva «hombres» para אִישׁ tras el numeral, siguiendo la precisión de género del hebreo.
  - La puntuación española separa con coma la cláusula temporal y con punto y coma el contraste final, facilitando la lectura sin alterar la sintaxis de origen.
