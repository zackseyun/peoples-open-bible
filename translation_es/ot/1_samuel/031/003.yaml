translation:
  language: es
  text: Y la batalla se volvió pesada contra Saúl, y los arqueros[a] lo encontraron, y quedó gravemente herido[b] por los arqueros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los arqueros, hombres con arco’. El hebreo usa una apposición explicativa que especifica a los arqueros.
    reason: alternative_reading
  - marker: b
    text: O ‘quedó en gran angustia/dolor por causa de los arqueros’. El verbo hebreo aquí es difícil y puede indicar dolor intenso, temblor o angustia, más que una herida física explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְבַּד
  english_pob_choice: grew heavy
  chosen_spanish: se volvió pesada
  alternatives_spanish:
  - se hizo más dura
  - se intensificó
  lexicon: HALOT
  rationale: El hebreo literalmente expresa ‘hacerse pesada’. En contexto bélico, conserva la imagen de presión creciente sobre Saúl sin perder naturalidad en español.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - el combate
  - la guerra
  lexicon: HALOT
  rationale: El contexto narra un enfrentamiento concreto; ‘batalla’ comunica bien el evento militar puntual.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: Con fuerza hostil dirigida a Saúl, ‘contra’ reproduce adecuadamente la relación adversativa.
- source_word: וַיִּמְצָאֻהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontraron
  alternatives_spanish:
  - lo alcanzaron
  - lo hallaron
  lexicon: HALOT
  rationale: El verbo significa ‘encontrar/hallar’; en escena de combate puede implicar dar con él o alcanzarlo. ‘Lo encontraron’ mantiene fidelidad y claridad.
- source_word: הַמּוֹרִים אֲנָשִׁים בַּקָּשֶׁת
  english_pob_choice: the archers, men with the bow
  chosen_spanish: los arqueros
  alternatives_spanish:
  - los hombres con arco
  - los tiradores, hombres con arco
  lexicon: HALOT
  rationale: El hebreo usa una apposición explicativa. En español, ‘arqueros’ comunica el sentido de forma natural; la expansión ‘hombres con arco’ no añade información indispensable y suena redundante.
- source_word: וַיָּחֶל
  english_pob_choice: he was greatly wounded
  chosen_spanish: quedó muy angustiado
  alternatives_spanish:
  - quedó gravemente herido
  - fue presa de gran dolor
  - tembló mucho
  lexicon: HALOT
  rationale: 'Este verbo es difícil y admite varias lecturas: dolor intenso, angustia, temblor o herida física. Dado el valor lexical incierto y el testimonio de la tradición textual/interpretativa, se preserva la ambigüedad principal con una lectura de angustia fuerte, sin cerrar indebidamente el sentido.'
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en extremo
  lexicon: HALOT
  rationale: Intensificador estándar; ‘muy’ es natural en español y mantiene el énfasis.
- source_word: מֵהַמּוֹרִים
  english_pob_choice: by the archers
  chosen_spanish: por causa de los arqueros
  alternatives_spanish:
  - por los arqueros
  - a manos de los arqueros
  lexicon: HALOT
  rationale: La preposición puede señalar origen o agencia. Aquí se evita fijar demasiado pronto una violencia física explícita y se conserva la causalidad compatible con la lectura difícil de וַיָּחֶל.
theological_decisions:
- issue: Naturaleza de וַיָּחֶל en el final del versículo
  english_pob_reading: he was greatly wounded
  chosen_spanish_reading: quedó muy angustiado
  alternative_spanish_readings:
  - quedó gravemente herido
  - fue muy afligido
  - tembló mucho
  rationale: El hebreo es difícil y no obliga inequívocamente a una herida física. La versión española conserva esa tensión semántica, evitando decidir más de lo que el verbo demuestra por sí solo.
  doctrine_reference: 1 Samuel 31:3; 1 Crónicas 10:3
- issue: Apposición de הַמּוֹרִים אֲנָשִׁים בַּקָּשֶׁת
  english_pob_reading: the archers, men with the bow
  chosen_spanish_reading: los arqueros
  alternative_spanish_readings:
  - los hombres con arco
  - los arqueros, hombres con arco
  rationale: La apposición hebrea aclara el término principal. En español, la forma simple evita redundancia y comunica el oficio sin perder el sentido del original.
  doctrine_reference: HALOT; WLC
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que eliminó la redundancia de ‘the archers, men with the bow’ a favor de ‘the archers’. La presente versión española conserva esa claridad, pero mantiene una nota para reflejar la apposición hebrea subyacente y la ambigüedad del verbo final.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término divino por defecto cuando corresponda; este versículo no lo contiene.
  - Se usa ‘arqueros’ para el grupo armado siguiendo el valor contextual del hebreo, sin introducir terminología eclesiástica.
  - Se preserva la ambigüedad de וַיָּחֶל en nota para no cerrar el sentido entre herida física y angustia intensa.
  - La puntuación y el orden responden al flujo narrativo del hebreo y a la lectura pública en español.
