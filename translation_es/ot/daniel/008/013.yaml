review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Daniel oye a un santo hablando, otro santo pregunta por la duración de la visión, e incluye el holocausto regular, la transgresión desoladora y la entrega del santuario y del צָבָא al pisoteo. También conserva correctamente la nota alternativa sobre לַפַּלְמוֹנִי. Sin embargo, estrecha indebidamente צָבָא a «ejército», mientras que el expediente inglés dejó deliberadamente «host»/«hueste» abierto. Además, «para ser pisoteados» concuerda en plural, cuando en español es más natural y más preciso con dos sustantivos singulares coordinados usar una formulación singular colectiva como «para ser pisoteado» o reestructurar la frase.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos mejoras importantes: «ejército» reduce una ambigüedad que conviene preservar, y la secuencia final suena más natural como «tanto el santuario como la hueste, para ser pisoteados» o mejor aún «la entrega tanto del santuario como de la hueste al pisoteo». También «ser santo» es aceptable, pero «santo» a secas suena más bíblico y natural en español sin necesariamente introducir la connotación eclesiástica que se quería evitar.'
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías. La principal desalineación terminológica está en צָבָא: el audit trail inglés preserva amplitud semántica, por lo que en español conviene «hueste» con nota explicativa, no «ejército». «Holocausto regular» y «transgresión desoladora» están bien alineados con las decisiones documentadas.'
