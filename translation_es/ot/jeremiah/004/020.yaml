translation:
  language: es
  text: Desastre sobre desastre se proclama[a], porque todo el país ha sido devastado. De repente mis tiendas han sido devastadas[b], mis cortinas en un instante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la tierra». El hebreo אֶרֶץ puede significar «tierra» o «país»; aquí el contexto favorece la tierra bajo juicio.
    reason: alternative_reading
  - marker: b
    text: «Mis cortinas» se refiere a las cortinas o lonas de una tienda; la línea usa la imagen de una morada destruida de repente.
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁבֶר
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - quebranto
  - ruina
  - destrucción
  lexicon: HALOT
  rationale: En la expresión repetida שׁבר על שׁבר, el hebreo comunica calamidad sucesiva más que una “rotura” literal. “Desastre” suena natural en español y conserva la fuerza de la crisis.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - tras
  - contra
  lexicon: HALOT
  rationale: 'En esta construcción poética, עַל expresa acumulación: un desastre se superpone a otro. “Sobre” refleja mejor esa idea en español que un simple “en” o “después”.'
- source_word: נִקְרָא
  english_pob_choice: is proclaimed
  chosen_spanish: se proclama
  alternatives_spanish:
  - se anuncia
  - se grita
  - se declara
  lexicon: HALOT
  rationale: El nifal funciona aquí con sentido pasivo/impersonal de anuncio público. “Se proclama” conserva el tono formal y audible del aviso.
- source_word: שֻׁדְּדָה
  english_pob_choice: is devastated
  chosen_spanish: ha sido devastada
  alternatives_spanish:
  - está devastada
  - ha sido arrasada
  - ha sido saqueada
  lexicon: HALOT
  rationale: Con “toda la tierra” como sujeto, el hebreo presenta un resultado consumado. “Ha sido devastada” expresa bien el daño total sin reducirlo solo a saqueo.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: the whole land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra del país
  - todo el país
  - toda la región
  lexicon: HALOT
  rationale: Aunque en Jeremías el contexto favorece “la tierra” como territorio juzgado, en español “toda la tierra” reproduce la amplitud del hebreo y mantiene abierta la posible resonancia más amplia. La nota aclara la preferencia contextual por “tierra” frente a una traducción universalizante.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  - de pronto
  lexicon: HALOT
  rationale: Adverbio de brusquedad temporal; “de repente” es claro, natural y conserva la irrupción inesperada del juicio.
- source_word: שֻׁדְּדוּ
  english_pob_choice: are devastated
  chosen_spanish: son devastadas
  alternatives_spanish:
  - han sido devastadas
  - son arrasadas
  - son saqueadas
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica que en la primera mitad del versículo para conservar el paralelismo. “Son devastadas” suena literal y poético en español.
- source_word: אֹהָלַי
  english_pob_choice: my tents
  chosen_spanish: mis tiendas
  alternatives_spanish:
  - mis carpas
  - mis tiendas de campaña
  lexicon: HALOT
  rationale: “Tendas”/“tiendas” expresa de manera directa la imagen de morada nómada o de campamento. “Tiendas” es la opción más natural y fiel en español bíblico.
- source_word: רֶגַע
  english_pob_choice: in a moment
  chosen_spanish: en un instante
  alternatives_spanish:
  - en un momento
  - al instante
  - de inmediato
  lexicon: HALOT
  rationale: Como complemento temporal, señala brevedad extrema. “En un instante” conserva la rapidez súbita mejor que una formulación más neutra.
- source_word: יְרִיעֹתַי
  english_pob_choice: my curtains
  chosen_spanish: mis cortinas
  alternatives_spanish:
  - mis lienzos
  - mis velos
  - mis paños
  lexicon: HALOT
  rationale: El término alude a las lonas o cortinas de la tienda, no a cortinas domésticas modernas. “Mis cortinas” mantiene la imagen y funciona en español; la nota aclara su sentido de telas de tienda.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the whole land
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra del país
  - todo el país
  - toda la región
  rationale: El contexto inmediato de Jeremías 4 apunta al juicio sobre la tierra de Judá, pero el hebreo permite también un alcance más amplio. La traducción principal mantiene la amplitud literal y la nota explica la preferencia contextual por ‘tierra’ como territorio castigado.
  doctrine_reference: Jeremías 4:19-20; uso semántico de אֶרֶץ
- issue: Valor metafórico de las imágenes de tienda
  english_pob_reading: my tents... my curtains refers to tent-curtains; the line uses the imagery of a dwelling suddenly destroyed
  chosen_spanish_reading: mis tiendas... mis cortinas conserva la imagen de una morada repentinamente destruida
  alternative_spanish_readings:
  - mis tiendas... mis lonas
  - mis carpas... mis cortinas de tienda
  rationale: El hebreo presenta lenguaje poético de habitación/campamento. En español se conserva la imagen concreta para no diluir la fuerza visual del colapso repentino.
  doctrine_reference: Poética profética; imaginería de juicio en Jeremías
translation_notes:
  revision_awareness: La traducción sigue de cerca el audit trail inglés, manteniendo el paralelismo, la repetición de שׁדד y la ambigüedad controlada de אֶרֶץ. No se introdujeron cambios de sentido respecto del consenso del último pase; solo se ajustó el español para fluidez y precisión poética.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios/Yahvé’ no aplicable en este versículo.
  - Se preservó la repetición verbal con ‘devastadas’ para reflejar el paralelo hebreo.
  - Se eligió ‘toda la tierra’ como forma amplia y bíblica, con nota contextual.
  - Las imágenes de tienda/cortina se conservaron sin domesticarlas a un entorno urbano moderno.
