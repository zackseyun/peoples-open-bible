    text: Or 'east of Ain.' The Hebrew phrase can be rendered more literally as a location eastward of Ain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'strike/touch the shoulder of the Sea of Kinnereth'; 'shoulder' here refers to the side or slope of the terrain by the sea.
    reason: lexical_alternative
