revisions:
- from: ¿Hasta cuándo habré de tomar consejo en mi alma[a], con tristeza en mi corazón todo el día? ¿Hasta cuándo mi enemigo se exaltará sobre mí[b]?
  to: ¿Hasta cuándo habré de deliberar en mi alma[a], con tristeza en mi corazón todo el día? ¿Hasta cuándo mi enemigo será exaltado sobre mí[b]?
  rationale: La revisión es menor y no doctrinal. Se ajusta la primera cláusula para un español más natural sin perder el matiz de deliberación interna de אָשִׁית עֵצוֹת בְּנַפְשִׁי, y se corrige la segunda para reflejar mejor el valor de יָרוּם en español. También se limpian las notas para cumplir el estándar editorial.
