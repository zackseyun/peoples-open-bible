  to: 'Y les dijo: «Vuelvan a sus tiendas con muchas posesiones, con muchísimo ganado, con plata y oro, con bronce[c] e hierro, y con muchísimas vestiduras. Repartan el botín[a] de sus enemigos con sus hermanos[b]».'
  rationale: Se ajustó el español para que suene natural y siga mejor el orden del mandato hebreo, se reemplazó el calco «dijo a ellos» por «les dijo», y se restauró la nota léxica sobre «bronce/cobre» presente en la auditoría inglesa.
