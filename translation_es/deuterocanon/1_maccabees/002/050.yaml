translation:
  language: es
  text: Y ahora, hijos[a], mostrad celo por la ley, y entregad vuestra vida por la alianza[b] de nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijos míos'. El griego τέκνα es una apelación familiar que puede referirse a los hijos en general.
    reason: lexical_alternative
  - marker: b
    text: O 'por causa de la alianza de nuestros padres' o 'por el bien de la alianza de nuestros padres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  lexicon: LSJ
  rationale: τέκνα es un vocativo familiar. En español, "hijos" conserva la apelación directa y natural de un padre a sus descendientes varones, sin volver la expresión fría o genérica como "descendencia" ni infantilizarla como "niños".
- source_word: ζηλώσατε
  english_pob_choice: be zealous for
  chosen_spanish: mostrad celo por
  alternatives_spanish:
  - sed celosos por
  - tened celo por
  - mostrad fervor por
  lexicon: LSJ
  rationale: El imperativo aoristo pide una entrega ardiente y sostenida. "Mostrad celo por" conserva el valor exhortativo y religioso del griego sin sonar forzado en español; "celosos" puede confundir por su sentido moderno.
- source_word: τῷ νόμῳ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torah
  - la instrucción
  lexicon: LSJ
  rationale: En el contexto macabeo, νόμος remite a la ley ancestral de Israel. "La ley" es claro y fiel; no se capitaliza para evitar una convención editorial no exigida por el griego, aunque el referente sea la Torá.
- source_word: δότε τὰς ψυχὰς ὑμῶν
  english_pob_choice: give your lives
  chosen_spanish: entregad vuestra vida
  alternatives_spanish:
  - dad vuestras vidas
  - entregad vuestras almas
  - entregaos
  lexicon: LSJ
  rationale: ψυχή aquí expresa la vida misma en un llamado al sacrificio. En español, "entregad vuestra vida" conserva el sentido singular y sacrificial; "almas" introduciría una antropología más estrecha que la del texto.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - por causa de
  - por el bien de
  lexicon: LSJ
  rationale: ὑπέρ en este contexto expresa entrega a favor de una causa. "Por" es la forma más natural y amplia en español para esta motivación sacrificial.
- source_word: διαθήκης
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  - el testamento
  lexicon: LSJ
  rationale: Aunque el POB inglés usa "covenant", en español "pacto" comunica mejor el carácter vinculante del término en un registro bíblico comprensible. "Alianza" es posible, pero "pacto" mantiene la fuerza jurídica y religiosa sin sonar demasiado técnico.
- source_word: πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  - de nuestros ancestros
  lexicon: LSJ
  rationale: El griego dice literalmente "de nuestros padres". Se conserva la formulación masculina y genealógica, coherente con la referencia ancestral del texto y con la decisión inglesa de no neutralizarla.
theological_decisions:
- issue: Valor de ψυχή en un contexto de martirio o sacrificio
  english_pob_reading: lives
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - almas
  - ser
  rationale: El llamado exhorta a la disposición al sacrificio, por lo que ψυχή se entiende como vida. Traducir "almas" podría sugerir una separación antropológica que el pasaje no necesita afirmar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Lenguaje ancestral masculino en πατέρων ἡμῶν
  english_pob_reading: of our fathers
  chosen_spanish_reading: de nuestros padres
  alternative_spanish_readings:
  - de nuestros antepasados
  rationale: El texto griego usa un lenguaje patriarcal explícito. Se preserva en español para mantener la referencia covenantal a los padres de Israel, sin neutralizarla indebidamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Término de alianza en διαθήκη
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - convenio
  rationale: En este contexto judío, διαθήκη designa una relación vinculante establecida en la historia de Israel. "Pacto" comunica bien ese peso jurídico y teológico en español contemporáneo.
  doctrine_reference: DOCTRINE.md §Lexical consistency / covenant terminology
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado, que quedó sin cambios: no se detectaron correcciones pendientes en la línea inglesa de referencia. La formulación española sigue de cerca la sintaxis y las decisiones léxicas auditadas, especialmente en τέκνα, ζηλώσατε, ψυχή y διαθήκη.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando el calco rígido pero sin añadir interpretaciones no respaldadas.
  - Se preservó la referencia masculina de 'nuestros padres' por fidelidad al griego y al audit trail inglés.
  - Se evitó 'almas' para ψυχή en favor de 'vida', siguiendo el contexto de exhortación al sacrificio.
  - '''Pacto'' se usa de forma consistente para διαθήκη en este versículo, compatible con el sentido de covenant en el contexto macabeo.'
