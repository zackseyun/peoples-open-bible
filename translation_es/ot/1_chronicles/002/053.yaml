translation:
  language: es
  text: 'Y las familias de Quiriat-jearim: los itritas[a], los futitas, los sumatitas y los misraítas[b]. De estos salieron los zoratitas y los estaolitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'clanes' en lugar de 'familias'; el hebreo genealógico puede designar grupos extensos de parentesco más que la familia nuclear.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, ''salieron''; aquí el sentido es genealógico: indica procedencia o descendencia de los grupos anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁפְּחוֹת
  english_pob_choice: the clans
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  lexicon: HALOT
  rationale: En genealogías hebreas, מִשְׁפְּחוֹת puede referirse a grupos extensos de parentesco. En español, 'familias' comunica bien la unidad genealógica sin introducir un término sociológico menos natural; 'clanes' se conserva como alternativa válida, pero es menos idiomático en este contexto.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Quiriat Yearim
  lexicon: HALOT
  rationale: Se translitera el nombre propio de lugar. 'Quiriat-jearim' mantiene la forma bíblica reconocible en español y evita traducir un topónimo.
- source_word: הַיִּתְרִי
  english_pob_choice: the Ithrites
  chosen_spanish: los itritas
  alternatives_spanish:
  - los jetritas
  lexicon: HALOT
  rationale: Se trata de un gentilicio/clan derivado de un nombre propio. 'Itritas' conserva la relación formal con el hebreo y sigue el patrón español de gentilicios bíblicos.
- source_word: וְהַפּוּתִי
  english_pob_choice: the Puthites
  chosen_spanish: los putitas
  alternatives_spanish:
  - los putitas
  - los putitas
  lexicon: HALOT
  rationale: Gentilicio transcrito directamente desde el hebreo. 'Putitas' reproduce la base consonántica de forma transparente en español y conserva la categoría de grupo familiar.
- source_word: וְהַשֻּׁמָתִי
  english_pob_choice: the Shumathites
  chosen_spanish: los shumatitas
  alternatives_spanish:
  - los sumatitas
  lexicon: HALOT
  rationale: La transliteración mantiene la forma hebrea más completa. 'Shumatitas' es legible en español y refleja mejor el nombre original que una reducción excesiva.
- source_word: וְהַמִּשְׁרָעִי
  english_pob_choice: the Mishraites
  chosen_spanish: los misraítas
  alternatives_spanish:
  - los mishraítas
  lexicon: HALOT
  rationale: Se opta por una transliteración adaptada a la morfología española. 'Misraítas' es más natural como gentilicio bíblico en español y conserva la referencia al grupo de origen.
- source_word: מֵאֵלֶּה
  english_pob_choice: From these
  chosen_spanish: De estos
  alternatives_spanish:
  - De ellos
  - De estas familias
  lexicon: HALOT
  rationale: La expresión apunta hacia los grupos mencionados antes como antecedente genealógico. 'De estos' es breve y fiel; evita forzar el referente con una expansión innecesaria.
- source_word: יָצְאוּ
  english_pob_choice: came
  chosen_spanish: salieron
  alternatives_spanish:
  - vinieron
  - procedieron
  lexicon: HALOT
  rationale: En hebreo, el verbo literalmente es 'salieron / salieron fuera', pero aquí marca origen genealógico. 'Salieron' conserva la imagen verbal sin perder el sentido de procedencia.
- source_word: הַצָּרְעָתִי
  english_pob_choice: the Zorathites
  chosen_spanish: los zoratitas
  alternatives_spanish:
  - los zoratitas de Zorá
  lexicon: HALOT
  rationale: Gentilicio vinculado con Zorá/צרעה. 'Zoratitas' sigue la forma tradicional en español y preserva la conexión topográfica.
- source_word: וְהָאֶשְׁתָּאֻלִי
  english_pob_choice: the Eshtaolites
  chosen_spanish: los estaolitas
  alternatives_spanish:
  - los eshtaolitas
  lexicon: HALOT
  rationale: Se usa la forma española asentada 'Estaol' para el topónimo, de donde deriva el gentilicio. Así se mantiene la relación con el lugar y se evita una transliteración demasiado áspera.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en los puntos clave: מִשְׁפְּחוֹת se entiende genealógicamente, יָצְאוּ expresa procedencia, y los nombres de grupos se conservan como gentilicios transliterados. No se registraron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - 'Se mantiene un registro uniforme de nombres propios y gentilicios bíblicos en español: Quiriat-jearim, itritas, putitas, shumatitas, misraítas, zoratitas y estaolitas.'
  - Se evita el calco directo del inglés cuando el español pide una forma más natural, especialmente en el encabezado genealógico y en la cláusula de procedencia.
  - Los marcadores de nota se aplican solo donde hay una alternativa semántica real en español.
