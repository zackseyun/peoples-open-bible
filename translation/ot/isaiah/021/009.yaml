id: ISA.21.9
reference: Isaiah 21:9
source:
  edition: WLC
  text: וְ/הִנֵּה זֶ֥ה בָא֙ רֶ֣כֶב אִ֔ישׁ צֶ֖מֶד פָּֽרָשִׁ֑ים וַ/יַּ֣עַן וַ/יֹּ֗אמֶר נָפְלָ֤ה נָֽפְלָה֙ בָּבֶ֔ל וְ/כָל פְּסִילֵ֥י אֱלֹהֶ֖י/הָ שִׁבַּ֥ר לָ/אָֽרֶץ־־׃
translation:
  text: And look[a], here comes a chariot, a man with a pair of horsemen. And he answered and said, “Fallen, fallen is Babylon[c][b], and all the carved images of her gods he has shattered to the ground.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pair of horsemen'; the Hebrew phrase is compressed and may describe the approaching force more idiomatically than the English can fully reproduce.
    reason: lexical_alternative
  - marker: b
    text: Or 'the idols of her gods.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'he has shattered,' with the subject left unstated; the agent may be understood from context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Look
  lexicon: HALOT
  rationale: Introduces a vivid deictic announcement. 'And look' preserves the discourse force in readable modern English better than the more archaic 'behold.'
- source_word: זֶה בָא
  chosen: here comes
  alternatives:
  - this comes
  - this is coming
  lexicon: HALOT
  rationale: 'The demonstrative plus participle-like verbal sense functions deictically: the watcher points out an approaching figure. ''Here comes'' captures the immediacy naturally in English.'
- source_word: רֶכֶב אִישׁ
  chosen: a chariot of men
  alternatives:
  - a chariot with a man
  - a troop in a chariot
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. Retaining 'a chariot of men' stays close to the source without over-resolving the syntax. It likely denotes a chariot-force or chariot crew rather than a single rider.
- source_word: צֶמֶד פָּרָשִׁים
  chosen: with a pair of horsemen
  alternatives:
  - a pair of horsemen
  - two horsemen
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair or yoke. 'With a pair of horsemen' preserves the appositional/additional sense while remaining idiomatic.
- source_word: וַיַּעַן וַיֹּאמֶר
  chosen: And he answered and said
  alternatives:
  - And he responded and said
  - And he spoke, saying
  lexicon: HALOT
  rationale: This is a common Hebrew speech-introduction formula. Keeping both verbs reflects the source text's style and avoids unnecessary smoothing.
- source_word: נָפְלָה נָפְלָה
  chosen: Fallen, fallen
  alternatives:
  - She has fallen, she has fallen
  - Babylon has fallen, has fallen
  lexicon: HALOT
  rationale: The repeated perfect gives an emphatic proclamation. 'Fallen, fallen' preserves the terseness and rhetorical force, and echoes the prophetic style later reflected in Revelation.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: פְּסִילֵי אֱלֹהֶיהָ
  chosen: the carved images of her gods
  alternatives:
  - the idols of her gods
  - the graven images of her gods
  lexicon: HALOT
  rationale: פְּסִילִים are carved images/idols. 'Carved images' is more concrete and source-near than the broader 'idols,' while remaining understandable.
- source_word: שִׁבַּר
  chosen: he has shattered
  alternatives:
  - he broke
  - he has broken in pieces
  lexicon: HALOT
  rationale: The verb conveys breaking/crushing. 'Has shattered' communicates decisive destruction with suitable force.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - down to the ground
  lexicon: HALOT
  rationale: Idiomatic English rendering of the directional phrase indicating complete overthrow.
