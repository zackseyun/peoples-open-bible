translation:
  language: es
  text: 'Entonces Moisés volvió a Yahvé y dijo[a]: «Señor, ¿por qué has tratado mal a este pueblo? ¿Por qué, entonces, me enviaste?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Por qué esto, me has enviado?»; es un giro enfático que significa «¿Por qué, entonces, me enviaste?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió atrás
  lexicon: HALOT
  rationale: שׁוּב en esta forma narrativa expresa el movimiento de volver o regresar. «Volvió» suena natural en español y conserva la idea de retornar para dirigirse a Yahvé.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino YHWH como «Yahvé», según el criterio del proyecto, en vez de ocultarlo con un título. La preposición אֶל se refleja con «a».
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Oh Señor
  lexicon: HALOT
  rationale: En el discurso directo de oración o queja, «Señor» comunica bien el tratamiento reverente y natural en español. «Mi Señor» sería más literal, pero menos idiomático aquí.
- source_word: הֲרֵעֹתָה
  english_pob_choice: have you done evil to
  chosen_spanish: has hecho mal a
  alternatives_spanish:
  - has hecho daño a
  - has causado mal a
  lexicon: HALOT
  rationale: El hifil de רעע tiene fuerza causativa de hacer mal o causar daño. «Has hecho mal a» conserva la acusación directa sin convertirla en una afirmación abstracta de mal moral contra Dios. El español permite mantener la tensión del hebreo.
- source_word: לָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo de Israel
  - esta gente
  lexicon: HALOT
  rationale: עָם aquí designa al colectivo de Israel. «Pueblo» es la equivalencia más natural y solemne en español bíblico contemporáneo.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Por qué, pues,
  - ¿Por qué, pues, de este modo,
  - ¿Por qué, entonces
  lexicon: HALOT
  rationale: La secuencia hebrea añade énfasis al simple «por qué». «Entonces» preserva esa carga enfática y refleja el sentido idiomático que el POB inglés resolvió como «Why then».
- source_word: שְׁלַחְתָּנִי
  english_pob_choice: you sent me
  chosen_spanish: me enviaste
  alternatives_spanish:
  - me mandaste
  - me has enviado
  lexicon: HALOT
  rationale: שׁלח en este contexto es «enviar». El pretérito perfecto simple («me enviaste») funciona bien en la pregunta retórica y mantiene la fuerza del reproche.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la línea del proyecto, se conserva el nombre propio divino como «Yahvé» en español, en vez de sustituirlo por un título. Esto mantiene la transparencia del original y la continuidad con la decisión teológica del POB inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del auditorio inglés, especialmente en la segunda pregunta: no se vierte de manera literal y torcida como «¿por qué esto?», sino como el valor idiomático enfático «¿por qué, entonces, me enviaste?». También se conserva la fuerza directa de הֲרֵעֹתָה con una expresión española natural que no atenúa la acusación del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino principal, coherente con el criterio del proyecto para יְהוָה.
  - «Señor» se usa solo como vocativo reverente en boca de Moisés, sin sustituir el nombre divino en la narrativa.
  - La expresión «hacer mal a» conserva la tensión del hebreo y evita una paráfrasis más suave que perdería el filo de la queja.
  - «Entonces» reproduce la fuerza enfática de לָמָּה זֶּה sin volver la frase extraña en español.
