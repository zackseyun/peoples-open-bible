- from: Den gracias al Señor de señores[a], porque para siempre es su amor constante.
  to: Den gracias al Señor de señores,[a] porque su amor fiel permanece para siempre.
  rationale: Se mantiene el fiel «Señor de señores» para el título divino. Se revisa la segunda mitad para lograr español más natural y para representar mejor el valor de חֶסֶד mediante «amor fiel», a la vez que se hace explícita la permanencia con «permanece para siempre», en línea con el POB inglés. La nota se ajusta para conservar la alternativa documentada sobre la fidelidad de pacto.
