review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: animal que anda sobre sus patas, dentro de los cuadrúpedos, declaración de impureza ritual, y consecuencia para quien toque el cadáver. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con el rastro POB: (1) טְמֵאִים הֵם לָכֶם es plural (''son impuros/inmundos para ustedes''), no singular ''es impuro''; y (2) la nota [b] está anclada en la cláusula de impureza, pero la explicación corresponde a ''su cadáver'', no a ''para ustedes''. Además, ''cadáver'' es aceptable, pero ''carcasa'' refleja mejor נְבֵלָה en contexto animal levítico.'
  spanish_quality_summary: El español es claro y legible, pero 'que andan sobre cuatro' suena algo elíptico; 'que andan en cuatro patas' o 'sobre cuatro patas' es más natural. 'Impuro' es comprensible, aunque en Levítico 'inmundo' suele preservar mejor la categoría ritual establecida; aun así, 'impuro' podría sostenerse. La corrección principal es de concordancia gramatical y de colocación de la nota.
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé o Mesías. En pureza ritual, el inglés POB prefirió 'unclean'; en español, 'impuro' es defendible pero menos tradicional/técnico que 'inmundo' en Levítico. Para נְבֵלָה, 'carcasa' se alinea mejor con la decisión inglesa 'carcass' que 'cadáver'.
  issues:
  - severity: high
    issue: Concordancia incorrecta en 'es impuro para ustedes'
    rationale: El hebreo טְמֵאִים הֵם לָכֶם es plural ('ellos son impuros/inmundos para ustedes'). Aunque 'todo animal' es singular distributivo al inicio, el predicado hebreo retoma en plural la clase de animales.
  - severity: high
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota explica בְּנִבְלָתָם ('su/s carcasa(s)' con singular colectivo), pero en el borrador [b] aparece después de 'para ustedes'.
  - severity: medium
    issue: '''Cadáver'' no refleja tan bien el contexto zoológico-legal como ''carcasa'''
    rationale: נְבֵלָה en Levítico se refiere a la carcasa de un animal muerto; 'cadáver' puede sonar más humano en español.
  - severity: low
    issue: '''Que andan sobre cuatro'' es menos natural en español'
    rationale: La idea se entiende, pero 'que andan en cuatro patas' comunica mejor la expresión hebrea sin pérdida de sentido.
  revised_spanish_text: Y todo animal que anda sobre sus patas[a], entre todos los animales que andan en cuatro patas, son inmundos para ustedes. Todo el que toque su carcasa[b] quedará inmundo hasta la tarde.
  revised_footnotes:
