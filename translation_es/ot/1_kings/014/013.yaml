translation:
  language: es
  text: Todo Israel hará duelo por él y lo enterrará[a], porque él solo, de la casa de Jeroboam, irá al sepulcro; pues en él se ha hallado algo bueno[b][c] hacia Yahvé, el Dios de Israel, en la casa de Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «él solo vendrá a Jeroboam, al sepulcro»; es decir, él solo de la casa de Jeroboam recibirá sepultura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una cosa buena» en lugar de «algo bueno».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hacia Yahvé»; puede referirse a una disposición o cualidad orientada a, o agradable en relación con, Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפְדוּ
  english_pob_choice: will mourn
  chosen_spanish: hará duelo
  alternatives_spanish:
  - llorará
  - lamentará
  lexicon: HALOT
  rationale: ספד expresa duelo por un muerto. «Hará duelo» comunica bien el lamento fúnebre en español moderno sin intensificar más de lo que el hebreo exige.
- source_word: וְקָבְרוּ אֹתוֹ
  english_pob_choice: and bury him
  chosen_spanish: lo enterrará
  alternatives_spanish:
  - lo sepultará
  - lo enterrarán
  lexicon: HALOT
  rationale: El verbo significa enterrar/sepultar. Mantengo el verbo en singular concordando con el sintagma colectivo «Todo Israel», como en español natural.
- source_word: כִּי זֶה לְבַדּוֹ
  english_pob_choice: because he alone
  chosen_spanish: porque él solo
  alternatives_spanish:
  - porque solo él
  - pues solo él
  lexicon: HALOT
  rationale: La construcción enfatiza exclusividad. «Él solo» preserva esa fuerza y suena natural en español.
- source_word: יָבֹא לְיָרָבְעָם אֶל קָבֶר
  english_pob_choice: of Jeroboam’s house will come to the grave
  chosen_spanish: de la casa de Jeroboam, irá al sepulcro
  alternatives_spanish:
  - de la casa de Jeroboam, vendrá al sepulcro
  - de la casa de Jeroboam, llegará al sepulcro
  lexicon: HALOT
  rationale: El hebreo literalmente dice que él solo «vendrá a Jeroboam, al sepulcro», una expresión idiomática que en contexto apunta a recibir sepultura. «Irá al sepulcro» conserva la imagen sin volverla extraña; la relación de linaje queda explicitada con «de la casa de Jeroboam».
- source_word: קָבֶר
  english_pob_choice: the grave
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - la tumba
  - la fosa
  lexicon: HALOT
  rationale: קבר puede ser tumba, sepulcro o fosa. «Sepulcro» conserva dignidad funeraria y encaja bien con el contexto de entierro, sin perder el sentido de tumba.
- source_word: יַעַן
  english_pob_choice: since
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: יַעַן introduce la causa. «Pues» funciona como causal explicativa y mantiene un registro sobrio y fluido.
- source_word: נִמְצָא בוֹ
  english_pob_choice: has been found in him
  chosen_spanish: se ha hallado
  alternatives_spanish:
  - se encontró
  - fue hallado
  lexicon: HALOT
  rationale: La pasiva niphal indica que algo fue encontrado en él. En español, la pasiva refleja «se ha hallado» conserva esa idea sin añadir agente.
- source_word: דָּבָר טוֹב
  english_pob_choice: something good
  chosen_spanish: algo bueno
  alternatives_spanish:
  - una cosa buena
  - un bien
  lexicon: HALOT
  rationale: La expresión es indefinida; «algo bueno» reproduce bien esa amplitud y evita concretar indebidamente a una sola obra o virtud.
- source_word: אֶל יְהוָה
  english_pob_choice: toward Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - con respecto a Yahvé
  lexicon: HALOT
  rationale: El hebreo usa אֶל con valor relacional, no necesariamente espacial. «Delante de Yahvé» comunica la orientación religiosa o la consideración ante Yahvé en español idiomático, sin traducir mecánicamente «hacia» donde sonaría forzado; se conserva Yahvé por la política terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se translitera como «Yahvé» en el texto principal para no ocultar el nombre divino.'
- source_word: בְּבֵית יָרָבְעָם
  english_pob_choice: in the house of Jeroboam
  chosen_spanish: en la casa de Jeroboam
  alternatives_spanish:
  - entre la casa de Jeroboam
  - dentro de la casa de Jeroboam
  lexicon: HALOT
  rationale: «Casa» conserva el matiz dinástico/linaje del hebreo בֵּית, coherente con el uso bíblico de la casa de Jeroboam.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la terminología del proyecto, se translitera como «Yahvé» en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de אֶל יְהוָה en la frase final
  english_pob_reading: toward the LORD; this may mean a disposition or quality directed toward, or pleasing in relation to, the LORD.
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - hacia Yahvé
  - ante Yahvé
  - con respecto a Yahvé
  rationale: La frase hebrea admite una relación orientada a Yahvé más que una localización. «Delante de Yahvé» deja abierta la posibilidad de disposición, orientación o evaluación favorable sin precisar más de lo que el texto garantiza.
  doctrine_reference: POB lexical note on relational force of אֶל
- issue: Sentido de la afirmación sobre la sepultura de Jeroboam
  english_pob_reading: he alone of Jeroboam’s house will come to the grave
  chosen_spanish_reading: él solo, de la casa de Jeroboam, irá al sepulcro
  alternative_spanish_readings:
  - él solo de la casa de Jeroboam llegará a la tumba
  - él solo de la casa de Jeroboam recibirá sepultura
  rationale: El hebreo literalmente es idiomático y puede implicar recepción de sepultura. La redacción española mantiene la literalidad suficiente y deja claro el sentido funerario sin perder la tensión del original.
  doctrine_reference: POB footnote a on burial idiom
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura estable del POB inglés y mantiene sus tres notas léxicas principales: el giro idiomático sobre la sepultura, la indefinición de דָּבָר טוֹב y la fuerza relacional de אֶל יְהוָה. Se ajusta el orden para un español más fluido, conservando el contenido auditado sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política terminológica del proyecto.
  - Se conserva «casa de Jeroboam» para reflejar el valor dinástico de בֵּית.
  - «Hará duelo» y «lo enterrará» mantienen el paralelismo funerario del hebreo.
  - La nota c se ancla en «delante de Yahvé» para señalar la alternativa relacional sin sobrecargar el texto principal.
