review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura legal del hebreo: כִּי como «Cuando», תַחְבֹּט con la imagen de golpear el olivo, y la asignación final «será para…». Sin embargo, «no volverás a pasar sobre él» suena poco natural en español para la acción agrícola de una segunda pasada, y «extranjero» debilita el matiz de גֵּר como residente forastero/forastero residente. Además, una nota al pie contiene un error claro («padreless»).'
  spanish_quality_summary: El español es mayormente claro, pero requiere pulido para sonar natural y digno. «No volverás a pasar sobre él» es torpe; «no lo repasarás» o equivalente expresa mejor la prohibición de una segunda pasada. Las notas necesitan corrección de estilo y exactitud, especialmente la nota c.
  glossary_alignment: No hay términos del glosario principal directamente implicados salvo la política de preservar matices léxicos. Conviene evitar «extranjero» como opción principal para גֵּר cuando el inglés auditado documenta «sojourner» con matiz legal-social; «forastero» funciona mejor en español general eclesial. «Huérfano» es aceptable para יָתוֹם en texto principal, con nota que preserve «sin padre» como alternativa más específica.
  issues:
  - severity: medium
    issue: 'Frase principal poco natural: «no volverás a pasar sobre él»'
    rationale: Aunque intenta reflejar «go over it again», en español suena forzado para cosecha de aceitunas. Una formulación como «no lo repasarás» comunica con más naturalidad la segunda pasada prohibida.
  - severity: medium
    issue: «Extranjero» como texto principal para גֵּר
    rationale: Puede sugerir solo alguien de otra nación y no el matiz legal de residente no nativo. «Forastero» preserva mejor la categoría social sin tecnicismo excesivo.
  - severity: high
    issue: 'Nota c defectuosa: «padreless»'
    rationale: Contiene una palabra incorrecta/no española y no refleja fielmente la alternativa inglesa «fatherless». Debe corregirse a «sin padre».
  - severity: low
    issue: Nota a desanclada semánticamente
    rationale: La nota ofrece una alternativa al verbo/prohibición de segunda pasada, pero el ancla actual en «olivo[a]» no es el lugar más natural. Debe anclarse en la frase prohibitiva.
  revised_spanish_text: Cuando golpees tu olivo, no lo repasarás[a]; será para el forastero[b], para el huérfano[c] y para la viuda.
