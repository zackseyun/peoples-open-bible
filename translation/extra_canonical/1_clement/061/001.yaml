id: 1CLEM.61.1
reference: 1 Clement 61:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Σύ, δέσποτα, ἔδωκας τὴν ἐξουσίαν τῆς βασιλείας αὐτοῖς διὰ τοῦ μεγαλοπρεποῦς καὶ ἀνεκδιηγήτου κράτους σου, εἰς τὸ γινώσκοντας ἡμᾶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην δόξαν καὶ τιμὴν ὑποτάσσεσθαι αὐτοῖς, μηδὲν ἐναντιουμένους τῷ θελήματί σου· οἷς δός, κύριε, ὑγίειαν, εἰρήνην, ὁμόνοιαν, εὐστάθειαν, εἰς τὸ διέπειν αὐτοὺς τὴν ὑπὸ σοῦ δεδομένην αὐτοῖς ἡγεμονίαν ἀπροσκόπως. . σὺ γάρ, δέσποτα, ἐπουράνιε βασιλεῦ τῶν αἰώνων, δίδως τοῖς υἱοῖς τῶν ἀνθρώπων δόξαν καὶ τιμὴν καὶ ἐξουσίαν τῶν ἐπὶ τῆς γῆς ὑπαρχόντων· σὺ, κύριε, διεύθυνον τὴν βουλὴν αὐτῶν κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου, ὅπως διέποντες ἐν εἰρήνῃ καὶ πραΰτητι εὐσεβῶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην ἐξουσίαν θεοῦ σου τυγχάνωσιν. 3. ὁ μόνος δυνάμενος ποιῆσαι ταῦτα καὶ περισσότερα ἀγαθὰ μεθ’ ἡμῶν, σοὶ ἐξομολογούμεθα διὰ τοῦ ἀρχιερέως καὶ προστάτου τῶν ψυχῶν ἡμῶν Ἰησοῦ Χριστοῦ, δι’ οὗ σοι ἡ δόξα καὶ ἡ μεγαλωσύνη καὶ νῦν καὶ εἰς γενεὰν γενεῶν καὶ εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
  pages:
  - 339
  - 341
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: You, Master, gave them the authority of rule through your magnificent and indescribable might, so that, knowing the glory and honor given to them by you, we might submit ourselves to them, opposing your will in nothing. Grant to them, Lord, health, peace, concord, and stability, so that they may administer without offense the leadership you have given them. For you, Master, heavenly King of the ages, give glory and honor and authority over the things on earth to the sons of men. You, Lord, direct their counsel according to what is good and pleasing before you, so that, administering in peace and gentleness, in a godly way, the authority you have given them, they may obtain your favor. To you, who alone are able to do these things and greater good things for us, we give thanks through the high priest and guardian of our souls, Jesus Messiah, through whom be the glory and the majesty to you both now and to all generations and unto the ages of ages. Amen.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Retains the stronger sense of absolute authority distinct from κύριε later in the prayer. 'Master' preserves the prayer's elevated register without collapsing both titles into the same English term.
- source_word: ἐξουσίαν τῆς βασιλείας
  chosen: the authority of rule
  alternatives:
  - royal authority
  - authority of kingship
  - sovereign power
  lexicon: LSJ
  rationale: The phrase denotes governing authority associated with reigning. 'The authority of rule' preserves both ἐξουσία and the βασιλεία-domain without over-specifying monarchy in a way the immediate referent may not require.
- source_word: κράτους
  chosen: might
  alternatives:
  - power
  - dominion
  - strength
  lexicon: BDAG
  rationale: In context of God's majestic bestowal of authority, 'might' fits the elevated doxological tone and avoids redundancy with nearby 'authority'.
- source_word: ὑποτάσσεσθαι
  chosen: submit ourselves
  alternatives:
  - be subject
  - submit
  lexicon: BDAG
  rationale: The middle/passive infinitive here is rendered with explicit reflexive force to preserve the voluntary posture urged in the prayer.
- source_word: μηδὲν ἐναντιουμένους
  chosen: opposing ... in nothing
  alternatives:
  - resisting ... in no way
  - contradicting ... in nothing
  lexicon: LSJ
  rationale: Keeps the participial nuance and the comprehensive force of μηδέν, while making clear that resistance to rulers is framed as resistance to God's will in this prayer context.
- source_word: ὑγίειαν
  chosen: health
  alternatives:
  - soundness
  - well-being
  lexicon: BDAG
  rationale: Straightforward and natural in a prayer for rulers; broad enough to include bodily and general welfare.
- source_word: ὁμόνοιαν
  chosen: concord
  alternatives:
  - unity
  - harmony
  lexicon: BDAG
  rationale: A traditional but still intelligible term that preserves the civic and communal nuance of like-minded order among rulers and peoples.
- source_word: εὐστάθειαν
  chosen: stability
  alternatives:
  - steadfastness
  - security
  lexicon: LSJ
  rationale: Best fits the political-administrative context of stable governance.
- source_word: διέπειν
  chosen: administer
  alternatives:
  - govern
  - direct
  lexicon: BDAG
  rationale: Captures orderly exercise of office without sounding overly modern or bureaucratic; suitable for repeated use in the chapter.
- source_word: ἡγεμονίαν
  chosen: leadership
  alternatives:
  - rule
  - governorship
  - authority
  lexicon: LSJ
  rationale: Distinguished from ἐξουσία by rendering it as the sphere or exercise of governing leadership entrusted by God.
- source_word: ἀπροσκόπως
  chosen: without offense
  alternatives:
  - without stumbling
  - blamelessly
  - without hindrance
  lexicon: BDAG
  rationale: The adverb can suggest conduct free from causing stumbling or giving offense. In a prayer for rulers' administration, 'without offense' preserves moral and relational nuance.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  chosen: to the sons of men
  alternatives:
  - to human beings
  - to mankind
  lexicon: BDAG
  rationale: Follows the gender-accurate policy and preserves the scriptural cadence of the phrase, which carries a traditional anthropological resonance.
- source_word: διεύθυνον τὴν βουλὴν αὐτῶν
  chosen: direct their counsel
  alternatives:
  - guide their purpose
  - straighten their plans
  lexicon: LSJ
  rationale: Maintains the prayer's request that God govern rulers' deliberations, not merely their actions.
- source_word: κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου
  chosen: according to what is good and pleasing before you
  alternatives:
  - according to the good and acceptable in your sight
  - toward what is good and well-pleasing before you
  lexicon: BDAG
  rationale: Preserves the God-centered moral standard and the biblical idiom 'before you' rather than reducing it to a generic ethical phrase.
- source_word: πραΰτητι
  chosen: gentleness
  alternatives:
  - meekness
  - mildness
  lexicon: BDAG
  rationale: Best contemporary equivalent that still carries moral weight in a paraenetic and political context.
- source_word: εὐσεβῶς
  chosen: in a godly way
  alternatives:
  - piously
  - godly
  lexicon: BDAG
  rationale: Avoids the potentially archaic adverb 'piously' while preserving explicit Godward devotion in the exercise of rule.
- source_word: θεοῦ σου τυγχάνωσιν
  chosen: they may obtain your favor
  alternatives:
  - they may attain your mercy
  - they may meet with your approval
  lexicon: LSJ
  rationale: τυγχάνω with a genitive commonly means obtain or attain. The phrase is rendered idiomatically as receiving divine favor, which fits the prayer's petitionary logic.
- source_word: ἐξομολογούμεθα
  chosen: we give thanks
  alternatives:
  - we confess
  - we praise
  lexicon: BDAG
  rationale: In liturgical-prayer context the verb can carry the sense of thankful praise/confession. 'We give thanks' fits the doxological movement here while remaining natural English.
- source_word: ἀρχιερέως
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard and theologically significant rendering, especially in early Christian mediation language.
- source_word: προστάτου
  chosen: guardian
  alternatives:
  - protector
  - patron
  - champion
  lexicon: LSJ
  rationale: Conveys protective oversight over souls without importing later patronage connotations too strongly.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as 'Messiah' where functioning as a title rather than a fixed name.
- source_word: μεγαλωσύνη
  chosen: majesty
  alternatives:
  - greatness
  - magnificence
  lexicon: BDAG
  rationale: Pairs naturally with 'glory' in doxological style and preserves elevated liturgical diction.
- source_word: εἰς γενεὰν γενεῶν ... εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: from generation to generation and unto the ages of ages
  alternatives:
  - for all generations and forever and ever
  lexicon: BDAG
  rationale: Keeps the Hebraic-scriptural cadence of the doubled expressions rather than flattening them into a single idiom.
theological_decisions:
- issue: Rendering of Χριστοῦ in the closing mediation formula
  chosen_reading: Jesus the Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The term functions as a title in a liturgical confession. Translating it preserves semantic transparency and aligns with project policy on titles.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of θεοῦ σου τυγχάνωσιν
  chosen_reading: they may obtain your favor
  alternative_readings:
  - they may obtain your mercy
  - they may attain acceptance with you
  rationale: The Greek points to receiving something from God in response to godly rule. 'Your favor' is broad enough to preserve the petition without over-defining the theological mechanism.
- issue: Christological force of ἀρχιερέως καὶ προστάτου τῶν ψυχῶν ἡμῶν
  chosen_reading: through the high priest and guardian of our souls, Jesus the Messiah
  alternative_readings:
  - through Jesus Christ our high priest and protector
  - through the high priest and shepherd of our souls
  rationale: The paired titles present Jesus as mediator and protector. 'Guardian' preserves προστάτης-language without importing the more specific pastoral metaphor of 'shepherd,' which the Greek does not use here.
