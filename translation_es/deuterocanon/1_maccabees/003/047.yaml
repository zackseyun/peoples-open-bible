translation:
  language: es
  text: Y ayunaron aquel día, y se vistieron de cilicio, y pusieron ceniza sobre sus cabezas, y rasgaron sus vestiduras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνήστευσαν
  english_pob_choice: they fasted
  chosen_spanish: ayunaron
  alternatives_spanish:
  - guardaron ayuno
  - hicieron ayuno
  lexicon: BDAG
  rationale: El verbo griego denota ayuno de manera directa. «Ayunaron» es la equivalencia más natural y fiel en español, y conserva el sentido ritual y religioso sin explicarlo de más.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: BDAG
  rationale: La expresión temporal se vierte con naturalidad como «aquel día». Mantiene la referencia puntual del griego sin sonar forzada en español.
- source_word: περιεβάλλοντο σάκκους
  english_pob_choice: put on sackcloth
  chosen_spanish: se vistieron de cilicio
  alternatives_spanish:
  - se cubrieron de cilicio
  - se pusieron cilicio
  lexicon: BDAG
  rationale: El gesto indica vestir una prenda de luto/aflicción. «Cilicio» es el equivalente español más asentado para σάκκος en este contexto, y «se vistieron de» expresa bien el acto de ponerse esa prenda.
- source_word: σποδὸν ἐπὶ τὰς κεφαλὰς αὐτῶν
  english_pob_choice: ashes on their heads
  chosen_spanish: ceniza sobre sus cabezas
  alternatives_spanish:
  - cenizas sobre sus cabezas
  - ceniza en sus cabezas
  lexicon: BDAG
  rationale: El griego presenta el sustantivo singular σποδός, que puede renderizarse literalmente como «ceniza». Conservé el singular para no borrar la forma del original y porque en español suena natural en este gesto ritual.
- source_word: διέρρηξαν τὰ ἱμάτια αὐτῶν
  english_pob_choice: tore their garments
  chosen_spanish: rasgaron sus vestiduras
  alternatives_spanish:
  - rasgaron sus ropas
  - rompieron sus vestiduras
  lexicon: BDAG
  rationale: «Vestiduras» preserva el registro elevado de ἱμάτια mejor que «ropa», y «rasgaron» reproduce con precisión el verbo de desgarrar como señal de duelo.
theological_decisions:
- issue: Conservar la secuencia corporal y ritual de duelo sin convertirla en resumen interpretativo
  english_pob_reading: 'Retain the concrete sequence: fasting, sackcloth, ashes on the head, tearing garments'
  chosen_spanish_reading: 'Conservar la secuencia concreta: ayuno, cilicio, ceniza sobre la cabeza, y el rasgado de vestiduras'
  alternative_spanish_readings:
  - resumirlo como «muestra de profundo dolor»
  - parafrasear como «expresaron su duelo»
  rationale: El griego enumera actos visibles y específicos de lamento. La traducción mantiene esa textura ritual para que el lector vea el gesto concreto, no solo su sentido general.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; preservar el sentido fuente sin paraphrase excesiva'
- issue: Decidir entre una forma plural más libre para σποδός y la forma singular más pegada al griego
  english_pob_reading: ashes on their heads
  chosen_spanish_reading: ceniza sobre sus cabezas
  alternative_spanish_readings:
  - cenizas sobre sus cabezas
  rationale: Aunque en español «cenizas» suena más idiomático, el singular «ceniza» refleja mejor la forma del original y no impide la inteligibilidad. Así se preserva una pequeña tensión lexical sin perder naturalidad.
  doctrine_reference: 'DOCTRINE.md: fidelidad lexical y transparencia textual'
translation_notes:
  revision_awareness: 'La base inglesa fue revisada desde una formulación más repetitiva hacia una secuencia más fluida sin perder elementos del original. La versión española sigue esa misma economía: conserva todos los actos del texto griego, pero evita repeticiones innecesarias y mantiene un registro bíblico claro.'
  spanish_consistency_notes:
  - Usé «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Mantuve el tono narrativo sobrio y la sintaxis coordinada del griego, sin añadir explicaciones sobre el significado del ayuno, el cilicio o la ceniza.
  - Elegí «vestiduras» en lugar de «ropa» para conservar un registro bíblico digno y coherente con la acción ritual descrita.
