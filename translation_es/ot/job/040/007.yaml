translation:
  language: es
  text: Ahora cíñete los lomos como un hombre[a]; yo te preguntaré, y tú me lo harás saber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prepárate como un guerrero». El hebreo dice literalmente: «cíñete los lomos como un hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָר
  english_pob_choice: gird up
  chosen_spanish: cíñete
  alternatives_spanish:
  - prepárate
  - ata tus lomos
  - ciñe tus lomos
  lexicon: HALOT
  rationale: El imperativo expresa la acción concreta de ceñirse para quedar listo; en español, «cíñete» conserva la imagen corporal y el valor de preparación sin sonar forzado. Mantiene mejor el tono directo del desafío divino que una paráfrasis más general como «prepárate».
- source_word: נָא
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - te ruego
  - por favor
  - vamos
  lexicon: HALOT
  rationale: La partícula añade urgencia en un contexto de desafío. «Ahora» comunica la inmediatez con naturalidad en español y evita suavizar el tono con una cortesía que no corresponde bien aquí.
- source_word: כְגֶבֶר
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como un guerrero
  - como un varón
  - como un hombre fuerte
  lexicon: HALOT
  rationale: Se conserva el sustantivo masculino singular y su fuerza idiomática. «Como un hombre» refleja con fidelidad la forma hebrea sin neutralizar el género ni desplazar innecesariamente el matiz hacia «guerrero».
- source_word: חֲלָצֶיךָ
  english_pob_choice: your loins
  chosen_spanish: tus lomos
  alternatives_spanish:
  - tu cintura
  - tus riñones
  - tus caderas
  lexicon: HALOT
  rationale: «Lomos» mantiene la metáfora corporal tradicional del hebreo y el paralelismo con la expresión idiomática «ceñirse». Aunque es menos usual que «cintura», preserva mejor la imagen del texto fuente.
- source_word: אֶשְׁאָלְךָ
  english_pob_choice: I will question you
  chosen_spanish: yo te preguntaré
  alternatives_spanish:
  - te interrogaré
  - te haré preguntas
  - te cuestionaré
  lexicon: HALOT
  rationale: En español, «preguntaré» comunica el valor directo del verbo con suficiente naturalidad. «Te cuestionaré» puede sonar más áspero o moderno de lo debido; «interrogaré» sugiere un matiz más judicial que el hebreo aquí no exige explícitamente.
- source_word: וְהוֹדִיעֵנִי
  english_pob_choice: and you shall make it known to me
  chosen_spanish: y tú me lo harás saber
  alternatives_spanish:
  - y me lo declararás
  - y me lo darás a conocer
  - y me responderás
  lexicon: HALOT
  rationale: 'El hiphil de ידע conserva su fuerza causativa: «hacer saber». «Me lo harás saber» preserva esa relación sin reducirla al simple «responderás», que pierde el matiz de informar o dar a conocer.'
theological_decisions:
- issue: Tratamiento del término masculino גבר sin neutralización
  english_pob_reading: like a man
  chosen_spanish_reading: como un hombre
  alternative_spanish_readings:
  - como un guerrero
  - como una persona fuerte
  rationale: La forma hebrea es masculina singular y funciona en un reto directo a Job. No hay base suficiente para neutralizarla ni para convertirla en «guerrero»; por ello se conserva la referencia masculina explícita, de acuerdo con la filosofía de traducción de precisión de género del texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva. La única tensión relevante es cómo expresar en español la imagen idiomática «gird up your loins» sin perder su concreción; se optó por «cíñete… tus lomos» para conservar la metáfora corporal y el tono desafiante. También se mantuvo el masculino singular de גבר y el valor causativo de הוֹדִיעֵנִי.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto cuando corresponde; este versículo no contiene el nombre divino.
  - «Lomos» se mantuvo por consistencia con la metáfora bíblica tradicional y con la imagen concreta del hebreo.
  - Se prefirió un orden verbal natural en español («yo te preguntaré, y tú me lo harás saber») sin perder el paralelismo del original.
