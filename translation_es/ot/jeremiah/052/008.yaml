translation:
  language: es
  text: Pero el ejército de los caldeos persiguió al rey y alcanzó a Sedequías en las llanuras[a] de Jericó, y todo su ejército[b] se dispersó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las estepas de Jericó».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y todo su ejército se dispersó de él»; en español, «ejército» funciona como colectivo singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  english_pob_choice: the army of the Chaldeans
  chosen_spanish: el ejército de los caldeos
  alternatives_spanish:
  - las fuerzas de los caldeos
  - el ejército de los babilonios
  lexicon: HALOT
  rationale: חֵיל designa aquí una fuerza militar, por lo que «ejército» transmite bien el valor colectivo. כַּשְׂדִּים se conserva como «caldeos», siguiendo el término étnico-político del hebreo; «babilonios» sería contextual, pero menos cercano al texto fuente.
- source_word: וַיִּרְדְּפ֤וּ
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - perseguió
  - fue tras
  lexicon: HALOT
  rationale: El verbo רדף en este contexto narrativo militar expresa persecución hostil. «Persiguió» es natural en español y mantiene el sentido de persecución armada.
- source_word: אַחֲרֵ֣י הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - tras el rey
  - después del rey
  lexicon: HALOT
  rationale: 'En español, la relación preposicional queda integrada de forma natural con el verbo de persecución: «persiguió al rey». Así se preserva el sentido sin calcado innecesario.'
- source_word: וַיַּשִּׂ֥יגוּ
  english_pob_choice: overtook
  chosen_spanish: alcanzó a
  alternatives_spanish:
  - dio alcance a
  - atrapó a
  lexicon: HALOT
  rationale: El verbo נשׂג aquí significa alcanzar en una persecución. «Alcanzó a» comunica ese logro de manera clara y fiel; «dio alcance a» también sería posible, pero algo más idiomático y menos directo.
- source_word: בְּעַרְבֹ֣ת יְרֵח֑וֹ
  english_pob_choice: in the plains of Jericho
  chosen_spanish: en las llanuras de Jericó
  alternatives_spanish:
  - en las estepas de Jericó
  - en la llanura de Jericó
  lexicon: HALOT
  rationale: עֲרָבוֹת se refiere a una región abierta de llanura/estepa. «Llanuras» es la opción más clara y natural en español sin perder el matiz geográfico; «estepas» es más técnica.
- source_word: וְכָל חֵיל֔/וֹ
  english_pob_choice: and all his army
  chosen_spanish: y todo su ejército
  alternatives_spanish:
  - y todas sus fuerzas
  - y toda su tropa
  lexicon: HALOT
  rationale: El sustantivo colectivo חֵיל con sufijo posee fuerza militar colectiva. «Ejército» mantiene bien el valor de conjunto; el singular concordante en español también evita una lectura fragmentaria.
- source_word: נָפֹ֖צוּ
  english_pob_choice: was scattered
  chosen_spanish: se dispersó
  alternatives_spanish:
  - fue dispersado
  - se desbandó
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, la frase se refiere al colectivo «ejército»; en español, «se dispersó» expresa con naturalidad la desintegración de la tropa en derrota. «Fue dispersado» sería más formal, pero menos fluido.
- source_word: מֵעָלָֽיו
  english_pob_choice: from him
  chosen_spanish: de su lado
  alternatives_spanish:
  - de él
  - lejos de él
  lexicon: HALOT
  rationale: La expresión indica separación respecto de Sedequías y su cercanía/posicionamiento. «De su lado» conserva la idea relacional y militar de apartarse de su apoyo o presencia; es una alternativa española aceptable a «from him» que suena más natural que «de él».
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la propuesta sigue el estado de alta concordancia y conserva la equivalencia óptima del texto inglés auditado, ajustada al español bíblico natural.
  spanish_consistency_notes:
  - Se mantiene «caldeos» para כַּשְׂדִּים en consonancia con el término fuente, sin sustituirlo por «babilonios».
  - Se traduce עֲרָבוֹת con «llanuras», dejando la alternativa «estepas» en nota por ser un matiz geográfico legítimo.
  - «Ejército» se usa como colectivo singular en español, coherente con el hebreo y con el uso idiomático del español.
  - Se evita una repetición excesivamente literal de la preposición hebrea en la persecución, integrándola en la construcción natural «persiguió al rey».
