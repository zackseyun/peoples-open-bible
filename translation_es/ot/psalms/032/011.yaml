translation:
  language: es
  text: Alegraos en Yahvé y regocijaos, justos; gritad de gozo, todos los rectos de corazón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שִׂמְח֬וּ
  english_pob_choice: Be glad
  chosen_spanish: Alegraos
  alternatives_spanish:
  - Regocijaos
  - Gozaos
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación de alegría activa. «Alegraos» conserva el mandato y suena natural en español bíblico contemporáneo.
- source_word: בַֽ/יהוָ֣ה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'La preposición ב expresa la esfera o ámbito de la alegría: la alegría se da «en» Yahvé. Se usa «Yahvé» como forma española del nombre divino, conforme al criterio del proyecto.'
- source_word: וְ֭/גִילוּ
  english_pob_choice: and rejoice
  chosen_spanish: y regocijaos
  alternatives_spanish:
  - y alegraos
  - y exultad
  lexicon: HALOT
  rationale: גִילוּ intensifica la alegría con matiz exuberante. «Regocijaos» mantiene esa elevación sin repetir exactamente el primer imperativo.
- source_word: צַדִּיקִ֑ים
  english_pob_choice: you righteous
  chosen_spanish: justos
  alternatives_spanish:
  - ustedes, los justos
  - los justos
  lexicon: HALOT
  rationale: En contexto vocativo, el hebreo se dirige a los destinatarios. En español, el vocativo plural se expresa de manera natural con «justos» sin añadir un pronombre innecesario.
- source_word: וְ֝/הַרְנִ֗ינוּ
  english_pob_choice: shout for joy
  chosen_spanish: gritad de gozo
  alternatives_spanish:
  - cantad de gozo
  - alzád un grito de gozo
  lexicon: HALOT
  rationale: רנן puede implicar un clamor jubiloso, ya sea gritado o cantado. «Gritad de gozo» conserva el impulso audible del verbo sin fijarlo exclusivamente como canto.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - cada uno de
  lexicon: HALOT
  rationale: El cuantificador abarca al conjunto entero de los destinatarios, por lo que «todos» es la correspondencia más clara y natural.
- source_word: יִשְׁרֵי לֵב
  english_pob_choice: upright in heart
  chosen_spanish: rectos de corazón
  alternatives_spanish:
  - los rectos de corazón
  - de corazón recto
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y refiere integridad interior. «Rectos de corazón» preserva el vínculo entre rectitud moral y corazón sin suavizarlo a mero sinceridad.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se mantiene la transliteración del nombre divino en español como «Yahvé», en línea con la política del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no presenta cambios de revisión y la evaluación cruzada muestra alto acuerdo; por tanto, la propuesta española sigue la lectura estable del verso sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el criterio del proyecto para יהוה.
  - Se eligieron verbos distintos para שִׂמְחוּ y גִילוּ a fin de respetar la progresión semántica del hebreo.
  - «Rectos de corazón» conserva el paralelismo idiomático con el hebreo y evita una paráfrasis más explicativa.
