review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido básico del arameo: Aríoc lleva a Daniel ante el rey con urgencia y afirma haber encontrado a un hombre de entre los exiliados de Judá que dará a conocer la interpretación al rey. Las decisiones principales («Entonces», «ante el rey», «He encontrado», «de Judá», «la interpretación», «dará a conocer») se alinean con la evidencia fuente y con la auditoría inglesa. Sin embargo, la nota al pie no preserva la alternativa significativa documentada en el POB inglés para דִּי יְהוּד, y en cambio añade una nota secundaria sobre «lo llevó» que no es necesaria.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Apresuradamente» es comprensible, aunque algo más pesado que «con prisa» o «de prisa»; no obstante, sigue siendo aceptable. La puntuación es correcta y la frase fluye bien. El principal ajuste necesario es editorial: reemplazar la nota al pie actual por una nota en «de Judá» que preserve las alternativas léxicas relevantes para lectores hispanos.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé/Mesías. La elección «de Judá» sigue adecuadamente la decisión lexical y teológica del POB para דִּי יְהוּד. Debe conservarse una nota con alternativas como «de los judíos» o «judeano», en vez de una nota sobre הַנְעֵל.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «lo llevó» en lugar de preservar la alternativa significativa en «de Judá».
    rationale: La auditoría inglesa documenta como alternativa relevante «of the Jews» / «Judean» para דִּי יְהוּד. Esa es la variación lexical/theológica que debe mantenerse para transparencia. La nota actual sobre «lo llevó / lo introdujo» no corresponde a la nota del POB inglés y no añade valor comparable.
  - severity: low
    issue: La nota actual sobre הַנְעֵל es innecesaria.
    rationale: «Lo llevó ante el rey» ya representa bien el verbo y la locución cortesana. Aunque «lo introdujo» es posible, no hay necesidad de destacar esa variante cuando el registro de auditoría prioriza otra alternativa más significativa.
  revised_spanish_text: 'Entonces Aríoc, apresuradamente, lo llevó ante el rey y le dijo: «He encontrado un hombre de entre los desterrados de Judá[a] que dará a conocer al rey la interpretación».'
  revised_footnotes:
  - marker: a
    text: O «de los judíos» o «judeano». El arameo identifica a Daniel como perteneciente al pueblo de Judá en el exilio.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacta la traducción principal porque es fiel y natural, pero se corrige la nota al pie para reflejar la alternativa léxica relevante documentada por el POB inglés en דִּי יְהוּד. Se elimina la nota innecesaria sobre «lo llevó» y se traslada la transparencia interpretativa al sintagma «de Judá».
