review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: distributivo de כָּל הַבְּכוֹר, nacimiento pasivo, distinción entre ganado/rebaño, consagración a Yahvé, y las dos prohibiciones sobre uso laboral y esquila. Sin embargo, ''varón'' para הַזָּכָר suena impropio con animales; el sentido fuente es sexo animal, mejor ''macho''. Además, la nota [b] está mal anclada: comenta יהוה pero aparece junto a ''buey''.'
  spanish_quality_summary: El texto es claro y digno, pero 'primogénito varón' resulta menos natural en español bíblico moderno que 'primogénito macho'. La sintaxis general es buena. La colocación de la nota [b] perjudica la legibilidad y la lógica editorial.
  glossary_alignment: Alinea correctamente Yahvé para יהוה, Dios para אֱלֹהֶיךָ, consagrar para תַּקְדִּישׁ, ganado/rebaño para בקר/צאן, buey para שׁוֹר, y esquilar para גזז. La principal excepción necesaria es cambiar 'varón' por 'macho' para reflejar mejor הַזָּכָר en contexto animal.
  issues:
  - severity: medium
    issue: '''Varón'' para animales'
    rationale: הַזָּכָר especifica el sexo masculino del animal. En español, 'varón' se asocia a humanos; 'macho' es más fiel y natural en contexto ganadero/cultual.
  - severity: medium
    issue: Nota [b] anclada en 'buey' en vez de en 'Yahvé'
    rationale: La nota explica el Tetragrámaton יהוה, por lo que debe ir anclada en 'Yahvé', no en una palabra posterior sin relación.
  - severity: low
    issue: Razón de la nota [a] podría armonizarse mejor
    rationale: La nota [a] preserva bien la alternativa, aunque su razón debería corresponder a alternativa léxica/de lectura; no afecta el texto principal.
  revised_spanish_text: Todo primogénito macho que nazca entre tu ganado y entre tu rebaño lo consagrarás a Yahvé[a] tu Dios. No trabajarás con el primogénito de tu buey, ni esquilarás el primogénito de tu rebaño.
  revised_footnotes:
  - marker: a
    text: 'O: «Todo el primogénito macho que nazca de tu ganado y de tu rebaño».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige ''varón'' a ''macho'' para reflejar el sexo animal con español natural y fiel. Se elimina la nota sobre YHWH mal ubicada junto a ''buey''; dado que el texto principal ya usa correctamente ''Yahvé'' según la norma del proyecto, no hace falta mantener una nota textual adicional aquí. Se conserva la nota alternativa sobre el distributivo y las preposiciones, anclada de forma coherente en ''Yahvé[a]'' no; mejor: un único anclaje disponible en el texto revisado para la variante global. No se requiere adjudicación adicional.'
