    text: Or 'consent to him.' The Hebrew verb can denote being willing, consenting, or yielding.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your eye shall not pity him,' a Hebrew idiom for withholding compassionate regard.
    reason: cultural_note
  - marker: c
    text: Or 'cover for him'—that is, hide him or conceal his guilt.
    reason: lexical_alternative
