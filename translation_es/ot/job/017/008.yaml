translation:
  language: es
  text: Los rectos se horrorizan ante esto, y el inocente se despierta contra el impío[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hipócrita». El hebreo חָנֵף puede designar a una persona impía o irreverente, y en algunos contextos se traduce tradicionalmente «hipócrita».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֹׁמּוּ
  english_pob_choice: are appalled
  chosen_spanish: se horrorizan
  alternatives_spanish:
  - se asombran
  - quedan pasmados
  lexicon: HALOT
  rationale: El verbo expresa reacción de estupor o conmoción ante algo impactante. «Se horrorizan» comunica con naturalidad en español la intensidad emocional que el POB inglés captó con «are appalled», sin debilitarla a un simple asombro.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: Es un sustantivo/adjetivo plural usado sustantivamente. «Los rectos» conserva la imagen moral de quienes andan en rectitud y evita ampliar innecesariamente el término.
- source_word: עַל זֹאת
  english_pob_choice: at this
  chosen_spanish: ante esto
  alternatives_spanish:
  - por esto
  - a causa de esto
  lexicon: HALOT
  rationale: La preposición עַל marca aquí la ocasión o motivo de la reacción. En español, «ante esto» expresa bien la respuesta emocional provocada por la situación.
- source_word: נָקִי
  english_pob_choice: the innocent
  chosen_spanish: el inocente
  alternatives_spanish:
  - el limpio
  - el libre de culpa
  lexicon: HALOT
  rationale: Designa a quien está libre de culpa. «El inocente» es la opción más clara y natural en español para este contexto moral.
- source_word: חָנֵף
  english_pob_choice: the godless
  chosen_spanish: el impío
  alternatives_spanish:
  - el hipócrita
  - el irreverente
  lexicon: HALOT
  rationale: El campo semántico incluye a la persona impía o irreverente; el inglés POB evitó restringirlo a «hypocrite». «El impío» mantiene el contraste ético-religioso del versículo y es más directo en español que «el irreverente».
- source_word: יִתְעֹרָר
  english_pob_choice: stirs himself up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se despierta
  - se alza
  lexicon: HALOT
  rationale: El valor reflexivo sugiere espabilarse o ponerse en acción. En este contexto de oposición, «se levanta» comunica una respuesta activa y mantiene la fuerza verbal sin sonar forzado.
- source_word: עַל חָנֵף
  english_pob_choice: against the godless
  chosen_spanish: contra el impío
  alternatives_spanish:
  - frente al impío
  - sobre el impío
  lexicon: HALOT
  rationale: Con un verbo de reacción, עַל se entiende adversativamente. «Contra» expresa con claridad la oposición implícita en el hebreo y en la lectura auditada del POB.
theological_decisions:
- issue: Renderización de חָנֵף
  english_pob_reading: the godless
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el hipócrita
  rationale: 'La contraposición del versículo es moral y religiosa: rectos/inocente frente a una figura impía. «El impío» preserva ese contraste amplio sin reducir el término a la idea más estrecha de hipocresía externa.'
  doctrine_reference: Principio de primacía del texto original y preservación del rango semántico contextual.
translation_notes:
  revision_awareness: El paquete auditado en inglés indica acuerdo alto y sin cambios en la revisión más reciente; no se requieren ajustes de revisión adicionales en español.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma general del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió un español sobrio y publicable, evitando calcos como «los upright» o «se agita a sí mismo».
  - Se conservó la tensión léxica de חָנֵף con una nota alternativa, siguiendo el criterio auditado del POB.
