base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/027.yaml
  text: For it is a witness between us and you[a], and between our generations after us, that we may perform the service of Yahweh before him with our burnt offerings, our sacrifices, and our peace offerings, so that your children may not say to our children in time to come[d][c][b], ‘You have no share in Yahweh.’
  footnotes:
  - marker: a
    text: 'Or ''For it is a witness''; the Hebrew כִּי can be read causally, but in context it introduces a corrective explanation: the altar was not for offerings on that site, but as a witness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our fellowship offerings' for 'our peace offerings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'tomorrow,' often used idiomatically for 'in the future' or 'in time to come.'
    reason: lexical_alternative
  - marker: d
    text: Or 'You have no portion in the LORD.'
    reason: lexical_alternative
