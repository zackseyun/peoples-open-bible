id: REV.11.15
reference: 'Revelation 11:15'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ ὁ ἕβδομος ἄγγελος ἐσάλπισεν· καὶ ἐγένοντο φωναὶ μεγάλαι ἐν τῷ οὐρανῷ ⸀λέγοντες· Ἐγένετο ἡ βασιλεία τοῦ κόσμου τοῦ κυρίου ἡμῶν καὶ τοῦ χριστοῦ αὐτοῦ, καὶ βασιλεύσει εἰς τοὺς αἰῶνας τῶν αἰώνων.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/015.yaml
  text: 'And the seventh angel sounded his trumpet[a], and there were loud voices in heaven, saying, “The kingdom of the world has become that of our Lord and of his Messiah[c][b], and he will reign forever and ever.”'
  footnotes:
  - marker: a
    text: Some manuscripts read 'the kingdoms of the world have become' or 'the kingdom of this world has become.' The SBLGNT text reads singular, 'the kingdom of the world has become.'
    reason: textual_variant
  - marker: b
    text: Or 'his Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally, 'to the ages of the ages,' an idiom meaning unending duration.
    reason: lexical_alternative
translation:
  language: ko
  text: '일곱째 천사가 나팔을 불었습니다. 그러자 하늘에서 큰 음성들이 있어 말하기를, 「세상 나라가 우리 주와 그분의 메시아의 것이 되었으니, 그분께서 영원무궁토록 다스리시리라」 하였습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ χριστοῦ αὐτοῦ
  english_pob_choice: his Messiah
  chosen_korean: 그분의 메시아
  alternatives_korean:
  - 그분의 그리스도
  lexicon: BDAG
  rationale: 'Χριστός가 칭호로 기능하는 곳에서는 「메시아」로 일관되게 옮긴다. 시편 2:2의 반향을 살린다.'
theological_decisions:
- issue: 일곱째 나팔의 왕권 선포 정형 보존
  chosen_reading: '「세상 나라가 우리 주와 그분의 메시아의 것이 되었으니, 그분께서 영원무궁토록 다스리시리라」'
  alternative_readings:
  - 세상 나라들이 우리 주와 그리스도의 것이 되었으니
  rationale: '단수 「세상 나라」(SBLGNT 본문)를 그대로 따르며, Χριστός를 칭호로 보존하여 시편 2:2와의 시적 반향을 한국어 운율에 그대로 담는다.'
  doctrine_reference: 'DOCTRINE.md: 본문 형식 + Χριστός 칭호 보존'
