review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del griego: Abraham recibió la circuncisión como señal y sello de una justicia asociada a la fe que ya tenía en estado de incircuncisión, con el fin de ser padre de todos los creyentes incircuncisos y para que la justicia les fuera contada también a ellos. Sin embargo, hay dos desajustes importantes con el expediente inglés y el texto fuente: (1) la nota [a] está invertida, porque el texto principal ya usa «justicia» y la alternativa documentada en inglés es «rectitud», no «justicia»; (2) la nota [c] usa singular («le fuera») cuando el griego αὐτοῖς y el texto español exigen plural («les fuera»).'
  spanish_quality_summary: El español es claro, natural y digno. «Señal», «sello», «fe», «mientras estaba incircunciso» y «padre de todos los que creen» son buenas decisiones. La frase final «para que también a ellos se les contara la justicia» es comprensible y fiel, aunque «fuera contada» armoniza mejor con la alternativa documentada y con el matiz pasivo del original. La redacción general no suena acartonada.
  glossary_alignment: Buena alineación terminológica en general. δικαιοσύνη puede verterse como «justicia» en este proyecto, pero debe preservarse la alternativa significativa en nota; aquí corresponde «rectitud» como alternativa española a la elección principal «justicia». λογίζομαι está bien como «contar», con alternativas «acreditar» y «contar». No hay conflictos con los términos doctrinales por defecto del proyecto.
  issues:
  - severity: medium
    issue: La nota [a] está equivocada.
    rationale: El texto principal ya traduce δικαιοσύνη como «justicia», así que una nota que diga «O “justicia”» es incoherente. Debe ofrecer una alternativa real, p. ej. «rectitud».
  - severity: medium
    issue: La nota [c] usa singular en vez de plural.
    rationale: 'El borrador dice «O “le fuera acreditada” o “le fuera contada”», pero αὐτοῖς y «a ellos» requieren plural: «les fuera...».'
  - severity: low
    issue: La glosa interna sobre δικαιοσύνη en las decisiones léxicas es inconsistente.
    rationale: Afirma que se mantiene una alternativa de «justicia»/«rectitud» en nota, pero la nota real no lo hace. Esto confirma la necesidad de corregir la nota, aunque no exige adjudicación mayor.
  revised_spanish_text: Y recibió la señal de la circuncisión como sello de la justicia de la fe que tenía mientras estaba incircunciso[a], para que fuera padre de todos los que creen mientras están incircuncisos, para que también a ellos se les contara la justicia[c][b].
  revised_footnotes:
  - marker: a
    text: O «rectitud» para δικαιοσύνη aquí y más adelante en el versículo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en incircuncisión»; es decir, mientras estaba incircunciso.
    reason: lexical_alternative
  - marker: c
    text: O «les fuera acreditada» o «les fuera contada».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para que coincidan con el texto principal, el expediente inglés y la gramática del griego: [a] ahora da una alternativa real para δικαιοσύνη, y [c] concuerda en plural con αὐτοῖς. El cuerpo del versículo puede mantenerse tal como está porque es fiel, claro y teológicamente sólido.'
