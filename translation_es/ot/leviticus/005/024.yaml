translation:
  language: es
  text: 'o cualquier cosa respecto de la cual juró falsamente: la restituirá íntegramente, y añadirá un quinto sobre ella. La dará a aquel a quien pertenece, en el día de su ofrenda por la culpa[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el día de su culpa». El término hebreo puede referirse tanto a la culpa misma como a la ofrenda por la culpa; aquí el texto principal sigue el contexto sacrificial.
    reason: alternative_reading
lexical_decisions:
- source_word: א֠וֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: Conserva la continuación disyuntiva de la lista legal sin añadir una matización que el hebreo no exige aquí.
- source_word: מִכֹּל אֲשֶׁר
  english_pob_choice: anything about which
  chosen_spanish: cualquier cosa respecto de la cual
  alternatives_spanish:
  - de cualquier cosa que
  - cualquier asunto respecto del cual
  lexicon: HALOT
  rationale: El hebreo abre una categoría amplia; «cualquier cosa respecto de la cual» mantiene el alcance legal y suena natural en español jurídico-bíblico.
- source_word: יִשָּׁבַע עָלָיו לַשֶּׁקֶר
  english_pob_choice: he swore falsely
  chosen_spanish: juró falsamente
  alternatives_spanish:
  - hizo un juramento falso
  - juró en falso
  lexicon: HALOT
  rationale: La construcción hebrea se refiere a jurar falsamente acerca de algo. «Juró falsamente» conserva la fuerza verbal y evita una paráfrasis excesiva.
- source_word: וְשִׁלַּם אֹתוֹ בְּרֹאשׁוֹ
  english_pob_choice: he shall repay it in full
  chosen_spanish: la restituirá por completo
  alternatives_spanish:
  - la pagará por entero
  - la devolverá íntegramente
  - la restituirá en su totalidad
  lexicon: HALOT
  rationale: El modismo «en/sobre su cabeza» expresa el monto principal. En español, «por completo» comunica la restitución íntegra sin perder el valor jurídico de reparación.
- source_word: וַחֲמִשִׁתָיו יֹסֵף עָלָיו
  english_pob_choice: and shall add a fifth to it
  chosen_spanish: añadirá un quinto sobre ella
  alternatives_spanish:
  - añadirá a ella la quinta parte
  - agregará un quinto a ella
  lexicon: HALOT
  rationale: «Un quinto» reproduce con claridad la fracción requerida. «Sobre ella» mantiene la relación con el objeto restituido y refleja la preposición hebrea sin sonar forzado.
- source_word: לַאֲשֶׁר הוּא לוֹ
  english_pob_choice: to the one to whom it belongs
  chosen_spanish: a aquel a quien pertenece
  alternatives_spanish:
  - al que es suyo
  - a su dueño
  lexicon: HALOT
  rationale: La frase hebrea es un idiomático de propiedad legítima. «A aquel a quien pertenece» conserva esa fuerza legal sin recurrir a una simplificación interpretativa.
- source_word: יִתְּנֶנּוּ
  english_pob_choice: He shall give it
  chosen_spanish: La dará
  alternatives_spanish:
  - Se la entregará
  - La entregará
  lexicon: HALOT
  rationale: נתן aquí implica entregar la restitución al titular correspondiente. «La dará» es fiel, breve y coherente con el registro legal del pasaje.
- source_word: בְּיוֹם אַשְׁמָתוֹ
  english_pob_choice: on the day of his guilt offering
  chosen_spanish: en el día de su ofrenda por la culpa
  alternatives_spanish:
  - en el día de su culpa
  - el día de su ofrenda por el delito
  - el día de su ofrenda por la culpa
  lexicon: HALOT
  rationale: אַשְׁמָה/אָשָׁם puede referirse a culpa o a la ofrenda vinculada con la culpa. En este contexto levítico sacrificial, «ofrenda por la culpa» preserva el sentido cultual que la POB inglesa documenta.
theological_decisions:
- issue: Sentido de אַשְׁמָתוֹ al final del versículo
  english_pob_reading: his guilt offering
  chosen_spanish_reading: su ofrenda por la culpa
  alternative_spanish_readings:
  - su culpa
  - el día de su culpa
  - su ofrenda por el delito
  rationale: En Levítico 5, la secuencia de restitución y sacrificio favorece entender אַשְׁמָה como la ofrenda asociada a la culpa, no solo como un estado interior o jurídico. «Ofrenda por la culpa» mantiene esa relación ritual sin borrar la ambigüedad léxica de fondo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se siguió de cerca el expediente inglés POB más reciente, que mantiene alta concordancia con la fuente hebrea y no registra revisiones aplicadas. La elección final conserva la estructura legal del original, el valor de restitución total, el quinto adicional y la ambigüedad cultual de אַשְׁמָתוֹ, resuelta en el texto principal según el contexto sacrificial.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «ofrenda por la culpa» para reflejar el campo semántico cultual de אַשָׁם/אַשְׁמָה, en línea con la nota inglesa.
  - 'La puntuación con dos puntos ayuda a reflejar la secuencia legal del hebreo: restitución completa, adición de un quinto y entrega al dueño legítimo.'
  - Se evitó «siervo» o lenguaje eclesiástico no presente en el original; el pasaje es estrictamente jurídico-restitutivo.
