translation:
  language: es
  text: Completa la semana nupcial de esta[a], y te la daremos también[b] a cambio del trabajo que trabajarás conmigo[c] por otros siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Completa la semana de esta». La expresión alude a la semana nupcial o de bodas, según la costumbre cultural del contexto.'
    reason: cultural_note
  - marker: b
    text: O «y también esta te será dada». La forma hebrea es formalmente tercera femenina singular, pero en contexto expresa la promesa de Labán de dar también a la otra hija.
    reason: lexical_alternative
  - marker: c
    text: O «que trabajarás para mí». El verbo hebreo puede significar «servir» o «trabajar», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלֵּא
  english_pob_choice: Complete
  chosen_spanish: Completa
  alternatives_spanish:
  - Cumple
  - Termina
  lexicon: HALOT
  rationale: El imperativo pide que Jacob concluya el período señalado. «Completa» conserva el mandato y suena natural en español contemporáneo.
- source_word: שְׁבֻעַ זֹאת
  english_pob_choice: this one's bridal week
  chosen_spanish: la semana nupcial de esta
  alternatives_spanish:
  - la semana de esta
  - la semana nupcial de esta mujer
  lexicon: HALOT
  rationale: שְׁבֻעַ es literalmente un período de siete, aquí idiomáticamente una semana; por el contexto matrimonial, «semana nupcial» comunica el valor cultural sin alejarse del hebreo. «Esta» mantiene el demostrativo de זֹאת sin añadir una palabra no requerida por el texto.
- source_word: וְנִתְּנָה לְךָ
  english_pob_choice: and we will give you
  chosen_spanish: te será dada
  alternatives_spanish:
  - y te la daremos
  - y será dada a ti
  lexicon: HALOT
  rationale: La forma hebrea es morfológicamente tercera femenina singular, pero en contexto funciona como promesa de Laban respecto de la otra hija. En español se conserva la pasiva/dativa natural «te será dada», que refleja la forma sin forzar un sujeto explícito.
- source_word: גַּם אֶת זֹאת
  english_pob_choice: this one also
  chosen_spanish: también esta
  alternatives_spanish:
  - esta también
  - también ésta
  lexicon: HALOT
  rationale: La referencia apunta a la otra hija. «También esta» mantiene la deixis breve y el énfasis de גַּם sin sobrerrepresentar el sustantivo implícito.
- source_word: בַּעֲבֹדָה
  english_pob_choice: in return for the work
  chosen_spanish: por el trabajo
  alternatives_spanish:
  - en pago por el trabajo
  - a cambio del trabajo
  lexicon: HALOT
  rationale: La preposición y el sustantivo expresan el precio o condición de la entrega. «Por el trabajo» es la forma más directa y natural en español para ese valor transaccional.
- source_word: תַּעֲבֹד עִמָּדִי
  english_pob_choice: that you will do with me
  chosen_spanish: harás conmigo
  alternatives_spanish:
  - servirás conmigo
  - trabajarás conmigo
  lexicon: HALOT
  rationale: עבד puede significar servir o trabajar. Aquí, por el contexto laboral, «harás conmigo» mantiene la relación con «trabajo» y evita la repetición dura de «trabajarás» sin perder el sentido de labor bajo Laban.
- source_word: עוֹד שֶׁבַע שָׁנִים אֲחֵרוֹת
  english_pob_choice: for another seven years
  chosen_spanish: por otros siete años
  alternatives_spanish:
  - por siete años más
  - por otros siete años adicionales
  lexicon: HALOT
  rationale: La expresión de duración queda bien en «por otros siete años», que conserva el valor aditivo de עוֹד y la idea de años adicionales de manera fluida en español.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el ajuste reciente del POB inglés: evitar añadir explícitamente ''woman'' donde el hebreo solo dice ''this one'', y mantener un verbo de trabajo/servicio natural en el segundo hemistiquio sin duplicar innecesariamente la idea de trabajo.'
  spanish_consistency_notes:
  - Se preservó Yahvé para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - Se evitó 'SEÑOR' como sustituto del nombre divino, en coherencia con la política del proyecto.
  - '''Trabajo'' y ''harás conmigo'' mantienen la relación semántica entre בַּעֲבֹדָה y תַּעֲבֹד עִמָּדִי sin introducir ''servir'' como obligación litúrgica o jerárquica.'
