translation:
  language: es
  text: Entonces la ira de Yahvé se encendió[a] contra Israel, y los entregó en mano de saqueadores, y los saquearon. Los vendió en mano de sus enemigos por todos lados[b][c], de modo que ya no pudieron mantenerse firmes ante sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ira de Yahvé ardió contra Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en mano de», un modismo que significa «bajo el poder de».'
    reason: cultural_note
  - marker: c
    text: O «sus enemigos en derredor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף / אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - la ira ... se inflamó
  lexicon: HALOT
  rationale: El hebreo usa una imagen vívida de ira que se enciende/arde. En español, «se encendió» conserva la metáfora de forma natural y digna, sin reducirla a una simple glosa como «se enojó».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio «Yahvé» conforme al criterio del proyecto, preservando el nombre divino en vez de sustituirlo por un título.
- source_word: וַיִּתְּנֵם בְּיַד
  english_pob_choice: he gave them into the hand of
  chosen_spanish: los entregó en manos de
  alternatives_spanish:
  - los puso en manos de
  - los entregó al poder de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para poner a alguien bajo el poder de otro. «Entregó en manos de» mantiene el giro fuente y es natural en español bíblico moderno.
- source_word: שֹׁסִים
  english_pob_choice: plunderers
  chosen_spanish: saqueadores
  alternatives_spanish:
  - despojadores
  - raptores
  lexicon: HALOT
  rationale: El participio nombra a quienes despojan o saquean; «saqueadores» comunica bien la acción y mantiene la relación léxica con el verbo siguiente.
- source_word: וַיָּשֹׁסּוּ
  english_pob_choice: who plundered them
  chosen_spanish: que los saqueaban
  alternatives_spanish:
  - y los saquearon
  - y los despojaban
  lexicon: HALOT
  rationale: Se conserva el vínculo verbal con «saqueadores» mediante una cláusula relativa en español, reflejando la repetición cognada del hebreo.
- source_word: וַיִּמְכְּרֵם
  english_pob_choice: He sold them
  chosen_spanish: Los vendió
  alternatives_spanish:
  - los entregó
  - los puso a merced de
  lexicon: HALOT
  rationale: «Vender» reproduce el valor literal del verbo hebreo y preserva la dureza de la imagen de juicio pactual que el texto presenta.
- source_word: אֹיְבֵיהֶם מִסָּבִיב
  english_pob_choice: their enemies all around
  chosen_spanish: sus enemigos por todos lados
  alternatives_spanish:
  - sus enemigos en derredor
  - sus enemigos de todos lados
  lexicon: HALOT
  rationale: «Por todos lados» expresa con naturalidad la idea de cercamiento y conserva la fuerza espacial del hebreo sin sonar arcaico.
- source_word: לַעֲמֹד לִפְנֵי
  english_pob_choice: to stand before
  chosen_spanish: resistir delante de
  alternatives_spanish:
  - mantenerse en pie ante
  - hacer frente a
  lexicon: HALOT
  rationale: En contexto bélico, la expresión significa sostenerse frente al enemigo. «Resistir delante de» conserva la referencia de «delante de» y comunica bien la incapacidad de mantenerse firmes.
theological_decisions:
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: Then the anger of Yahweh burned against Israel
  chosen_spanish_reading: Entonces la ira de Yahvé se encendió contra Israel
  alternative_spanish_readings:
  - Entonces Yahvé se airó contra Israel
  - Entonces la ira de Yahvé ardió contra Israel
  rationale: Se mantiene la imagen antropopática del texto, porque el hebreo presenta la ira como algo que se enciende. Esto evita suavizar o reinterpretar el juicio divino más allá de lo que el original dice.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto fuente sin paraphrasearlo indebidamente.'
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en la lectura principal: ira que se enciende, Yahvé como nombre divino, modismo de «en manos de», y enemigos «por todos lados». No se detectaron revisiones posteriores que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se conserva el modismo hebreo «en manos de» en una forma naturalizada en español.
  - «Saqueadores/saqueaban» preserva la conexión léxica del participio y el verbo cognado del hebreo.
  - «Resistir delante de» refleja la imagen de mantenerse firme ante el enemigo sin añadir contenido no presente en el texto.
