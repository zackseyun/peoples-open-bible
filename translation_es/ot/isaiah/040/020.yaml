translation:
  language: es
  text: El que es demasiado pobre para una ofrenda[a] escoge madera que no se pudra; busca para sí un artesano hábil para preparar un ídolo[b] que no se tambalee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El empobrecido escoge como ofrenda madera que no se pudra». El inicio hebreo es compacto y permite una ligera variación de construcción.'
    reason: alternative_reading
  - marker: b
    text: 'O: «imagen tallada» para «ídolo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְסֻכָּן
  english_pob_choice: He who is too poor
  chosen_spanish: Él que es demasiado pobre
  alternatives_spanish:
  - El pobre
  - El empobrecido
  - Quien es demasiado pobre
  lexicon: HALOT
  rationale: El hebreo describe a una persona reducida a pobreza; en español, «demasiado pobre» comunica bien esa condición sin volverla demasiado técnica. Mantiene el valor sustantivo del sujeto y la fuerza contextual del pasaje.
- source_word: תְּרוּמָה
  english_pob_choice: for an offering
  chosen_spanish: para una ofrenda
  alternatives_spanish:
  - como ofrenda
  - para una contribución
  - como contribución
  lexicon: HALOT
  rationale: «Ofrenda» conserva el matiz cultual de תְּרוּמָה y funciona naturalmente con la construcción española. «Contribución» sería posible, pero atenúa el tono religioso del contexto.
- source_word: עֵץ לֹא יִרְקַב
  english_pob_choice: wood that will not rot
  chosen_spanish: madera que no se pudra
  alternatives_spanish:
  - madera que no se corrompa
  - madera incorruptible
  - madera que no se descomponga
  lexicon: HALOT
  rationale: La imagen es concreta y material. En español, «que no se pudra» expresa con naturalidad la durabilidad buscada y preserva el contraste irónico del texto.
- source_word: יִבְחָר
  english_pob_choice: chooses
  chosen_spanish: escoge
  alternatives_spanish:
  - elige
  - selecciona
  lexicon: HALOT
  rationale: «Escoge» es claro, directo y suficientemente sobrio para el registro profético. Mantiene la acción habitual descrita en el hebreo.
- source_word: חָרָשׁ חָכָם
  english_pob_choice: a skilled craftsman
  chosen_spanish: un artesano hábil
  alternatives_spanish:
  - un artesano experto
  - un artífice sabio
  - un técnico diestro
  lexicon: HALOT
  rationale: «חָרָשׁ» es artesano o artífice; «חָכָם» aquí señala habilidad práctica más que sabiduría moral. «Artesano hábil» conserva ambas ideas sin sonar forzado.
- source_word: יְבַקֶּשׁ ל֔וֹ
  english_pob_choice: he seeks out for himself
  chosen_spanish: se busca para sí
  alternatives_spanish:
  - busca para sí
  - se procura
  - busca para sí mismo
  lexicon: HALOT
  rationale: El hebreo enfatiza la búsqueda intencional con beneficio personal. «Se busca para sí» refleja el valor de לוֹ sin añadir más de lo que el texto dice.
- source_word: לְהָכִין
  english_pob_choice: to prepare
  chosen_spanish: para preparar
  alternatives_spanish:
  - para hacer
  - para formar
  - para fabricar
  lexicon: HALOT
  rationale: «Preparar» sigue bien el audit trail inglés y permite que el artesano sea el agente de la confección del ídolo sin exagerar el aspecto técnico.
- source_word: פֶּסֶל
  english_pob_choice: an idol
  chosen_spanish: un ídolo
  alternatives_spanish:
  - una imagen tallada
  - una imagen esculpida
  - un ídolo tallado
  lexicon: HALOT
  rationale: En Isaías 40 el término participa de una crítica frontal a la idolatría; «ídolo» comunica esa fuerza teológica de forma directa y audible en español.
- source_word: לֹא יִמּוֹט
  english_pob_choice: that will not totter
  chosen_spanish: que no se tambalee
  alternatives_spanish:
  - que no se mueva
  - que no vacile
  - que no se derrumbe
  lexicon: HALOT
  rationale: '«Tambalearse» preserva la ironía del pasaje: el objeto fabricado debe ser estable, aunque sea un falso dios. «No se mueva» o «no vacile» son posibles, pero menos pictóricos.'
theological_decisions:
- issue: Cómo traducir פֶּסֶל en un contexto de polémica contra la idolatría
  english_pob_reading: an idol
  chosen_spanish_reading: un ídolo
  alternative_spanish_readings:
  - una imagen tallada
  - una imagen esculpida
  rationale: 'La intención profética no es neutral: el objeto manufacturado es objeto de crítica religiosa. «Ídolo» comunica mejor esa carga teológica que una expresión más descriptiva y menos polémica.'
  doctrine_reference: Isaías 40; crítica profética a la idolatría
- issue: Cómo reflejar la posible constricción inicial del hebreo («too poor for an offering» / «the impoverished one chooses as an offering wood that does not decay» )
  english_pob_reading: He who is too poor for an offering chooses wood that will not rot
  chosen_spanish_reading: Él que es demasiado pobre para una ofrenda escoge madera que no se pudra
  alternative_spanish_readings:
  - El empobrecido escoge como ofrenda madera que no se pudra
  - Quien es demasiado pobre para una ofrenda escoge madera que no se pudra
  rationale: El hebreo inicial es compacto y admite más de una constricción. La redacción elegida conserva la lectura principal del audit trail y deja visible el posible vínculo entre pobreza y ofrenda sin forzar una paráfrasis.
  doctrine_reference: Isaías 40:20; nota de ambigüedad sintáctica
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por dos ajustes menores: primero se mejoró el orden de palabras alrededor de «for himself», y luego se elevó el sujeto a «He who» para un registro más formal. La versión española sigue ese registro formal y conserva el énfasis en la búsqueda personal del artesano, sin debilitar la ironía del texto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando corresponda; en este versículo no aparece.
  - «Ídolo» se usa por la fuerza polémica del contexto, coherente con la práctica POB documentada en el audit trail inglés.
  - «Artesano hábil» conserva el valor técnico de חָכָם aplicado a la destreza, no a sabiduría moral.
  - La nota a marca la ambigüedad inicial sin sobrecargar el texto principal.
  - La nota b preserva la alternativa lexical documentada en inglés entre «idol» y «carved image».
