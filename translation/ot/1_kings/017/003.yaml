id: 1KI.17.3
reference: 1 Kings 17:3
source:
  edition: WLC
  text: לֵ֣ךְ מִ/זֶּ֔ה וּ/פָנִ֥יתָ לְּ/ךָ֖ קֵ֑דְמָ/ה וְ/נִסְתַּרְתָּ֙ בְּ/נַ֣חַל כְּרִ֔ית אֲשֶׁ֖ר עַל פְּנֵ֥י הַ/יַּרְדֵּֽן־׃
translation:
  text: Go from here and turn yourself eastward[a], and hide yourself by the Wadi Cherith[c][b], which is east of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the brook Cherith.' The Hebrew נחל can refer to a wadi, ravine, or brook-like watercourse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'which is before the Jordan'; the phrase likely means 'east of the Jordan' in this geographical context, though 'opposite the Jordan' is also possible.
    reason: lexical_alternative
  - marker: c
    text: Cherith may also be transliterated 'Kerith.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Leave
  - Depart
  lexicon: HALOT
  rationale: Imperative of הלך, a straightforward command to depart. 'Go' is the most natural and direct English equivalent.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - away from here
  lexicon: HALOT
  rationale: The preposition plus demonstrative points to Elijah's present location. 'From here' is idiomatic and sufficiently specific.
- source_word: וּפָנִיתָ לְּךָ קֵדְמָה
  chosen: turn yourself eastward
  alternatives:
  - turn east
  - go eastward
  lexicon: HALOT
  rationale: פנה with directional קֵדְמָה indicates changing direction toward the east. The reflexive nuance of לְּךָ is lightly represented by 'yourself,' though in English it mainly functions idiomatically. 'Eastward' preserves the directional adverb.
- source_word: וְנִסְתַּרְתָּ
  chosen: hide yourself
  alternatives:
  - conceal yourself
  - stay hidden
  lexicon: HALOT
  rationale: 'Niphal of סתר here has a reflexive/passive sense in context: Elijah is to place himself in hiding. ''Hide yourself'' is clear and close to the Hebrew.'
- source_word: בְּנַחַל
  chosen: by the Wadi
  alternatives:
  - by the brook
  - at the wadi
  - by the ravine
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or seasonal watercourse. 'Wadi' best reflects the geographic sense in a Levantine setting without overcommitting to a permanently flowing 'brook.' 'By' fits the preposition ב in natural English for location near a watercourse.
- source_word: כְּרִית
  chosen: Cherith
  alternatives:
  - Kerith
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention. 'Cherith' is the familiar and acceptable transliteration, though 'Kerith' is also possible.
- source_word: אֲשֶׁר עַל פְּנֵי הַיַּרְדֵּן
  chosen: which is east of the Jordan
  alternatives:
  - which is before the Jordan
  - which is opposite the Jordan
  - which is by the Jordan
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי can mean 'before,' 'in front of,' or 'opposite.' In this geographical context, the traditional and likely sense is that the wadi lies on the east side of the Jordan. Rendering it 'east of the Jordan' communicates the probable spatial meaning in clear English.
