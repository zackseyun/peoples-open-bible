translation:
  text: And they gathered themselves to them from the other nations of the land[a], and they were strengthened at the altar in its place; for they were in hostility toward them. All the nations on the land prevailed against them, and they offered sacrifices at the appointed time, and whole burnt offerings to the Lord[c][b], morning and evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined them.' The Greek verb can suggest that people from the other nations attached themselves to the returned community.
    reason: lexical_alternative
  - marker: b
    text: The Greek here is fuller than the approximate Hebrew parallel in Ezra 3:2, adding references to hostility from the nations of the land and to the regular offering of sacrifices morning and evening.
    reason: cross_reference
  - marker: c
    text: Or 'burnt offerings.' The Greek term can specifically denote offerings wholly consumed by fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν αὐτοῖς
  chosen: gathered themselves to them
  alternatives:
  - were gathered to them
  - joined them
  lexicon: LSJ
  rationale: The passive/middle form can suggest joining oneself to a group. 'Gathered themselves to them' preserves the Greek's reflexive nuance better than a simple passive, while remaining understandable.
- source_word: ἐκ τῶν ἄλλων ἐθνῶν τῆς γῆς
  chosen: from the other nations of the land
  alternatives:
  - from the other peoples of the land
  - from the surrounding nations
  lexicon: LSJ
  rationale: ἔθνη commonly means 'nations' or 'peoples.' 'Nations of the land' stays close to the Greek; 'surrounding nations' would over-interpret geography not explicit in the wording.
- source_word: κατωρθώθησαν
  chosen: were strengthened
  alternatives:
  - were set right
  - prospered
  - were established
  lexicon: LSJ
  rationale: The verb is difficult in context. Given the following phrase 'at the altar in its place' and the broader sense of successful establishment, 'were strengthened' best captures the idea that their position at the altar was made firm without overcommitting to a more technical reconstruction.
- source_word: ἐπὶ τὸ θυσιαστήριον ἐπὶ τοῦ τόπου αὐτῶν
  chosen: at the altar in its place
  alternatives:
  - upon the altar in its place
  - at the altar on its site
  lexicon: LSJ
  rationale: This likely refers to the altar being in its proper location. 'At the altar in its place' is idiomatic enough in English while preserving the repeated ἐπί structure and the locative emphasis.
- source_word: ἐν ἔχθρᾳ ἦσαν αὐτοῖς
  chosen: they were in hostility toward them
  alternatives:
  - they were hostile to them
  - they were at enmity with them
  lexicon: LSJ
  rationale: The phrase denotes enmity/hostility. 'In hostility toward them' keeps the nominal force of ἔχθρᾳ and avoids smoothing away the relational tension.
- source_word: κατίσχυσαν αὐτοὺς
  chosen: prevailed against them
  alternatives:
  - overpowered them
  - were stronger than them
  lexicon: LSJ
  rationale: The verb means to be strong against, overpower, or prevail over. 'Prevailed against them' is natural English and preserves the adversarial sense.
- source_word: κατὰ τὸν καιρὸν
  chosen: at the appointed time
  alternatives:
  - in due season
  - according to the time
  lexicon: LSJ
  rationale: The phrase refers to proper or prescribed timing for sacrifice. 'At the appointed time' communicates cultic regularity clearly.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  lexicon: LSJ
  rationale: The Greek specifically denotes offerings wholly consumed by fire. 'Whole burnt offerings' preserves that nuance better than the shorter traditional phrase.
- source_word: Κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The article is supplied for natural English in this context.
- source_word: τὸ πρωϊνὸν καὶ τὸ δειλινόν
  chosen: morning and evening
  alternatives:
  - in the morning and in the evening
  lexicon: LSJ
  rationale: This is the standard temporal pair for daily sacrifice. The concise rendering is natural and faithful.
