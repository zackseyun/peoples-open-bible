review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: advertencia contra toda injusticia y mandato individual respecto del prójimo. Conserva adecuadamente el distributivo singular en «a cada uno» y «su prójimo», y la nota alternativa para Προσέχετε es pertinente. Sin embargo, la redacción omite el objeto indirecto explícito de ἐνετείλατο αὐτοῖς («les mandó / les ordenó»), y «mandó a cada uno acerca de su prójimo» suena menos natural en español que una formulación con objeto indirecto más complemento temático.'
  spanish_quality_summary: La primera mitad, «Guárdense de toda injusticia», es clara y natural. El principal problema de legibilidad está en «y mandó a cada uno acerca de su prójimo», que en español resulta algo dura e incompleta semánticamente. «Les ordenó a cada uno respecto de su prójimo» o similar suena más idiomático y conserva mejor la estructura. También conviene quitar el marcador de nota del inicio de la cita y anclarlo directamente en la expresión relevante.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Injusticia» para ἀδίκου está bien justificado; «prójimo» preserva correctamente πλησίον en registro bíblico ético. No intervienen aquí términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: Falta el objeto indirecto explícito de ἐνετείλατο αὐτοῖς
    rationale: El griego dice literalmente que «les mandó / les dio mandato» y luego especifica distributivamente «a cada uno». En español, «mandó a cada uno acerca de su prójimo» no expresa con claridad ese «a ellos».
  - severity: medium
    issue: La frase «mandó a cada uno acerca de su prójimo» suena poco natural
    rationale: Aunque formalmente cercana, en español moderno eclesial suena más claro «les ordenó a cada uno respecto de su prójimo» o «les dio mandato a cada uno acerca de su prójimo».
  - severity: low
    issue: Ubicación poco natural del marcador de nota [a]
    rationale: El marcador aparece al inicio de la cita en vez de anclarse a la frase específica «Guárdense de toda injusticia», que es lo comentado por la nota.
  revised_spanish_text: 'Y les dijo: «Guárdense de toda injusticia[a]», y les ordenó a cada uno respecto de su prójimo.'
  revised_footnotes:
  - marker: a
    text: 'O: «Guárdense de toda cosa injusta» o «Estén en guardia contra todo lo injusto». El griego es breve y admite varias traducciones cercanas.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción central del imperativo cautelar («Guárdense de toda injusticia») y el singular distributivo («a cada uno», «su prójimo»), pero se corrige la segunda cláusula para reflejar mejor ἐνετείλατο αὐτοῖς ἑκάστῳ y para sonar natural en español. También se reubica la nota al segmento exacto que comenta.
