translation:
  language: es
  text: Antes del altar que es aceptado. Y en el quinto año hagan una remisión, para que ustedes lo remitan.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: בְּקָדְמֵ / በቅድመ
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Delante de
  - Antes del
  lexicon: preposición temporal/locativa
  rationale: El Ge'ez marca prioridad o anterioridad; en español, «Antes de» mantiene la relación sintáctica natural y el valor de precedencia sin añadir interpretación.
- source_word: מִזְבֵּחַ / ምሥዋዕ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ofrenda
  - sacrificio
  lexicon: altar
  rationale: 'Se sigue la revisión auditada que corrige la falsa lectura «ofrering/ofrenda»: el término ge''ez corresponde a «altar», no a una ofrenda.'
- source_word: זֶה יִתְקַבֵּל / ዘይትወከፍ
  english_pob_choice: that is accepted
  chosen_spanish: que es aceptado
  alternatives_spanish:
  - que es recibido
  - que es agradable
  lexicon: aceptar/recibir
  rationale: La forma pasiva expresa aceptación/recepción; «aceptado» conserva el valor semántico sin forzar una paráfrasis.
- source_word: release / ኅድገተ
  english_pob_choice: release
  chosen_spanish: liberación
  alternatives_spanish:
  - remisión
  - perdón
  - descanso
  lexicon: liberar / liberar
  rationale: En este contexto jubilar la idea es de una liberación o dejar libre. «Liberación» transmite bien el acto institucional, y el verbo correlativo «liberen» mantiene el eco del mandato.
- source_word: you may release it / ታሕድግዎ
  english_pob_choice: you may release it
  chosen_spanish: ustedes lo liberen
  alternatives_spanish:
  - ustedes lo dejen
  - ustedes lo suelten
  lexicon: liberar
  rationale: El audit trail señala una segunda persona plural; por eso se traduce en subjuntivo exhortativo. «Liberen» conserva la fuerza del mandato y evita la lectura errónea en tercera persona.
theological_decisions:
- issue: Naturaleza del «release» en el año quinto
  english_pob_reading: make a release, so that you may release it
  chosen_spanish_reading: hagan una liberación, para que ustedes lo liberen
  alternative_spanish_readings:
  - hagan un perdón, para que ustedes lo perdonen
  - hagan una remisión, para que ustedes lo remitan
  rationale: El texto apunta a una institución de liberación, no a un acto moral de perdón interpersonal. Por eso se evita «perdón», que introduciría una connotación distinta. La redacción conserva el carácter jurídico-social del jubileo.
  doctrine_reference: Levítico 25; Deuteronomio 15; tradición jubilar
- issue: Corrección de la lectura de ምሥዋዕ
  english_pob_reading: altar
  chosen_spanish_reading: altar
  alternative_spanish_readings:
  - ofrenda
  - sacrificio
  rationale: La revisión textual estableció que el ge'ez ምሥዋዕ significa «altar». Mantener «altar» evita una adulteración semántica y sigue la evidencia revisada.
  doctrine_reference: crítica textual y lexicografía ge'ez
translation_notes:
  revision_awareness: 'Se incorporó la revisión que corrige ምሥዋዕ como «altar» y la segunda cláusula como un mandato en segunda persona plural: «hagan una liberación, para que ustedes lo liberen». Se evitó traducir mecánicamente desde la versión inglesa anterior que decía «offering» y una forma de tercera persona. La redacción final busca reflejar el Ge''ez auditado y mantener el paralelismo del mandato.'
  spanish_consistency_notes:
  - Se usó «altar» conforme a la corrección textual; no se empleó «ofrenda» salvo en la nota alternativa.
  - Se prefirió «liberación»/«liberen» para conservar el sentido institucional del jubileo y la fuerza del imperativo plural.
  - Se mantuvo un registro sobrio y bíblico sin recurrir a fórmulas eclesiásticas ajenas al texto.
