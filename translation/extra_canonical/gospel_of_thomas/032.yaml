  source_review: state/reviews/gemini/phase9_nag_hammadi/extra_canonical/gospel_of_thomas/001/032.job-72054.json
  category: mistranslation
  tier: 3
  from: built on a mountain, made fast, cannot be toppled by human force
  to: built on a high mountain and fortified cannot fall
  rationale: 'The draft misparses multiple words. ⲉϥϫⲟⲥⲉ (masculine) modifies ⲧⲟⲟⲩ
    (mountain) and means ''high'' (stative of ϫⲓⲥⲉ), not ''made fast.'' ⲉⲥⲧⲁϫⲣⲏⲩ (feminine)
    modifies ⲡⲟⲗⲓⲥ (city) and means ''fortified/firm'' (stative of ⲧⲁϫⲣⲟ), not ''toppled.''
    Finally, ⲙⲛ̄ϭⲟⲙ ⲛ̄ⲥϩⲉ is the idiom ⲙⲛ̄-ϭⲟⲙ (''it is impossible'' / ''there is
    no power'') + ⲛ̄-ⲥ-ϩⲉ (''for it to fall'' - infinitive ϩⲉ), not ''by human force''
    (there is no Coptic word ⲥϩⲉ meaning ''person''). | Azure: The reviewer’s grammatical
    analysis is sound and the current English is not defensible from the Coptic. In
    Thomas 32, ⲉϥϫⲟⲥⲉ is a masculine stative agreeing with ⲧⲟⲟⲩ (''mountain''), so
    it means ''high,'''
