- from: 'Y dijo Aquis[a] a sus siervos: «Miren, ustedes ven a un hombre que actúa como loco. ¿Por qué lo traen a mí?»'
  to: 'Y dijo Aquis a sus siervos: «Miren, ustedes ven a un hombre que actúa como loco[a]. ¿Por qué lo traen ante mí?»'
