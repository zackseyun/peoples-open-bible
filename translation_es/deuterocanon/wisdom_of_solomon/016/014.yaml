  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritu» y «alma» preservan la decisión antropológica del POB; la nota alternativa con «aliento» y «vida» está bien justificada. No intervienen términos sensibles como Yahvé, Mesías o δοῦλος.
