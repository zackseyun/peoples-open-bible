translation:
  language: es
  text: Y haré de ti una gran nación, y te bendeciré, y engrandeceré tu nombre, y sé una bendición[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y serás una bendición''. La forma hebrea es imperativa (''sé''), pero algunos la entienden como el resultado de las promesas de Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶעֶשְׂךָ
  english_pob_choice: And I will make you
  chosen_spanish: Y haré de ti
  alternatives_spanish:
  - Y te haré
  - Y te convertiré en
  lexicon: HALOT
  rationale: עשה con objeto sufijado expresa aquí la acción divina de constituir a Abram como algo. En español, 'haré de ti' conserva bien el sentido constitutivo sin sonar forzado.
- source_word: לְגוֹי גָּדוֹל
  english_pob_choice: into a great nation
  chosen_spanish: una gran nación
  alternatives_spanish:
  - un gran pueblo
  - una nación grande
  lexicon: HALOT
  rationale: גוי puede rendirse como 'nación' o 'pueblo'. Aquí 'nación' sigue mejor el contexto de la promesa patriarcal y mantiene la correspondencia con la formulación auditada en inglés.
- source_word: וַאֲבָרֶכְךָ
  english_pob_choice: and I will bless you
  chosen_spanish: y te bendeciré
  alternatives_spanish:
  - y te daré bendición
  - y te colmaré de bendición
  lexicon: HALOT
  rationale: ברך en piel significa 'bendecir'. 'Te bendeciré' es la forma más directa y transparente en español.
- source_word: וַאֲגַדְּלָה שְׁמֶךָ
  english_pob_choice: and I will make your name great
  chosen_spanish: y engrandeceré tu nombre
  alternatives_spanish:
  - y haré grande tu nombre
  - y haré crecer tu fama
  lexicon: HALOT
  rationale: גדל significa 'hacer grande'. En español, 'engrandeceré tu nombre' conserva el paralelismo y la fuerza idiomática sin sustituir 'nombre' por una explicación interpretativa como 'fama'.
- source_word: וֶהְיֵה
  english_pob_choice: and be
  chosen_spanish: y sé
  alternatives_spanish:
  - y serás
  - para que seas
  lexicon: HALOT
  rationale: La forma es un imperativo masculino singular de היה. 'Sé' preserva la fuerza imperativa que el audit trail inglés defendió frente a una lectura meramente futura.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - un medio de bendición
  lexicon: HALOT
  rationale: El sustantivo es indefinido singular. 'Una bendición' refleja naturalmente el resultado o vocación de Abram sin suavizar la formulación del hebreo.
theological_decisions:
- issue: Fuerza de וֶהְיֵה בְּרָכָה
  english_pob_reading: 'imperatival: ''and be a blessing'''
  chosen_spanish_reading: 'imperatival: ''y sé una bendición'''
  alternative_spanish_readings:
  - y serás una bendición
  - para que seas una bendición
  rationale: Se conserva el imperativo del hebreo, como defendió el POB en inglés, porque la forma verbal no es un futuro simple. La lectura resultativa/predictiva queda implícitamente disponible, pero no se adopta en el texto principal para no borrar la tensión gramatical y teológica.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente al unir la cláusula final con la conjunción y evitar una pausa excesiva. También conserva la fuerza imperativa del cierre, reflejando el ajuste final del audit trail sin introducir puntuación que atenúe la secuencia del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero en este versículo el tetragrámaton no aparece explícitamente en el texto hebreo recibido.
  - '''nación'' se usa como equivalente estándar de גוי en este contexto patriarcal.'
  - '''bendecir'' y ''bendición'' se conservan para ברך / ברכה sin sustituirlos por ''favor'' u otra glosa interpretativa.'
  - '''nombre'' se mantiene literal para שֵׁם, siguiendo la decisión auditada de no reemplazarlo por ''reputación'' en el texto principal.'
