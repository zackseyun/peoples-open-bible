    reason: lexical_alternative
  revision_rationale: 'Se corrigieron dos calcos para lograr un español más fielmente publicable sin apartarse del hebreo ni del rastro auditado POB: «llamó tu nombre» -> «te dio el nombre» para expresar el valor idiomático de designación, y «al sonido de un gran tumulto» -> «al estruendo de un gran tumulto» para mejorar la naturalidad manteniendo la dualidad sonido/tumulto. Se conservaron «Yahvé», la imagen del olivo, «fruto y forma», y la ruina de las ramas.'
