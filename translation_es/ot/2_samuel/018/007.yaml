  text: וַ/יִּנָּ֤גְפוּ שָׁם֙ עַ֣ם יִשְׂרָאֵ֔ל לִ/פְנֵ֖י עַבְדֵ֣י דָוִ֑ד וַ/תְּהִי שָׁ֞ם הַ/מַּגֵּפָ֧ה גְדוֹלָ֛ה בַּ/יּ֥וֹם הַ/ה֖וּא עֶשְׂרִ֥ים אָֽלֶף־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/007.yaml
  text: 'There the people of Israel were defeated before the servants of David[b][a], and the slaughter there was great on that day: twenty thousand men.'
  footnotes:
