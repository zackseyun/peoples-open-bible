revisions:
- from: Y serán consternados y avergonzados a causa de Cus[a], su esperanza, y a causa de Egipto[c][b], su gloria.
  to: Y quedarán consternados y avergonzados a causa de Cus[a], su esperanza[b], y a causa de Egipto, su jactancia[c].
  rationale: Se ajusta תפארתם a «su jactancia» para seguir la decisión léxica principal del POB («their boast») y preservar el sentido de aquello en lo que se gloriaban. Se reubican las notas en las frases exactas a las que pertenecen. Se mejora la naturalidad de וְחַתּוּ con «quedarán consternados», manteniendo el valor futuro-resultativo del hebreo.
