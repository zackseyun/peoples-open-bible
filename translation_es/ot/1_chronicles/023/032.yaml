translation:
  language: es
  text: Y debían encargarse de la custodia de la tienda de reunión, de la custodia del lugar santo[a] y de la custodia de los hijos de Aarón, sus hermanos, para el servicio de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘santuario’. El término hebreo puede designar el lugar santo o, más ampliamente, el ámbito sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  english_pob_choice: they were to keep
  chosen_spanish: tenían a su cargo la custodia
  alternatives_spanish:
  - debían guardar
  - debían tener a su cargo
  - guardaban
  lexicon: HALOT
  rationale: En este contexto administrativo y cultual, שׁמר expresa una responsabilidad asignada. En español, 'tener a su cargo' comunica bien esa obligación establecida sin reducirla a un simple pasado narrativo. 'Custodia' preserva la idea de vigilancia/encargo y evita perder el matiz formal de la tarea.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: charge
  chosen_spanish: custodia
  alternatives_spanish:
  - cargo
  - responsabilidad
  - guarda
  lexicon: HALOT
  rationale: El término hebreo designa una obligación o encargo de vigilancia. 'Custodia' funciona con naturalidad en español bíblico y conserva la repetición formal del hebreo mejor que variar con sinónimos.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: tent of meeting
  chosen_spanish: tabernáculo de reunión
  alternatives_spanish:
  - tienda de reunión
  - tienda del encuentro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'tienda de reunión', en español bíblico 'tabernáculo de reunión' es una forma clara y reconocible para el recinto cultual. Mantiene el carácter técnico del lugar sin perder inteligibilidad.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el santuario
  - lo santo
  - el recinto santo
  lexicon: HALOT
  rationale: El hebreo puede referirse al ámbito sagrado o al lugar santo. 'Lugar santo' conserva esa ambigüedad cultual mejor que una traducción excesivamente específica, y evita borrar la tensión semántica documentada por el inglés POB.
- source_word: בְּנֵי אַהֲרֹן אֲחֵיהֶם
  english_pob_choice: the sons of Aaron their brothers
  chosen_spanish: los hijos de Aarón, sus hermanos
  alternatives_spanish:
  - los hijos de Aarón, que eran sus hermanos
  - los descendientes de Aarón, sus hermanos
  - los sacerdotes hijos de Aarón, sus hermanos
  lexicon: HALOT
  rationale: '''Hijos de Aarón'' conserva la fórmula genealógica y sacerdotal del hebreo. ''Sus hermanos'' mantiene la relación fraternal entre levitas y sacerdotes, sin suavizarla en una paráfrasis interpretativa.'
- source_word: לַעֲבֹדַת
  english_pob_choice: for the service of
  chosen_spanish: para el servicio de
  alternatives_spanish:
  - para la obra de
  - para el ministerio de
  - para la tarea de
  lexicon: HALOT
  rationale: En contexto de templo, עֲבֹדָה implica servicio ritual y administrativo. 'Servicio' preserva ese valor cultual de manera natural en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir יְהוָה como 'Yahvé'. 'Casa' refleja con fidelidad el hebreo בַּיִת; 'templo' sería una aclaración interpretativa no exigida por el texto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la doctrina del proyecto exige reflejarlo como nombre propio en español. 'Yahvé' preserva esa decisión y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de מִשְׁמֶרֶת en un listado levítico
  english_pob_reading: charge
  chosen_spanish_reading: custodia
  alternative_spanish_readings:
  - cargo
  - responsabilidad
  - guardia
  rationale: '''Custodia'' mantiene la idea de encargo vigilado y permite repetir la estructura hebrea sin endurecerla con calcos poco naturales. No se elimina la ambigüedad funcional del término, que puede abarcar vigilancia y responsabilidad asignada.'
  doctrine_reference: Lexical policy for administrative/cultic terms
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail inglés sin copiar mecánicamente su sintaxis. Se conserva la repetición de 'custodia' para מִשְׁמֶרֶת, se refleja la relación fraternal de 'los hijos de Aarón, sus hermanos', y se adopta 'Yahvé' conforme a la convención del proyecto. No se aplicaron revisiones posteriores en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con la política del proyecto.
  - Se usa 'custodia' para מִשְׁמֶרֶת en las tres ocurrencias para conservar la repetición del hebreo.
  - '''Lugar santo'' deja abierta la ambigüedad cultual documentada por el inglés POB.'
  - '''Casa de Yahvé'' refleja literalmente בֵּית יְהוָה sin introducir ''templo''.'
