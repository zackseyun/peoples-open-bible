translation:
  language: es
  text: Y no entrarás en casa de festín[a], para sentarte con ellos, para comer y para beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casa de banquete» o «casa de celebración». La expresión hebrea se refiere a un lugar donde la gente se reúne para comer y beber en un contexto festivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵית מִשְׁתֶּה
  english_pob_choice: a house of feasting
  chosen_spanish: casa de banquete
  alternatives_spanish:
  - casa de festín
  - casa de celebración
  - casa de banquete
  lexicon: HALOT
  rationale: La expresión hebrea designa una casa caracterizada por un banquete o fiesta. En español, «casa de banquete» conserva la imagen concreta y el matiz de reunión festiva; se evita una paráfrasis más amplia que debilite la forma del original.
- source_word: לֹא תָבֹוא
  english_pob_choice: you shall not enter
  chosen_spanish: no entrarás
  alternatives_spanish:
  - no debes entrar
  - no irás a entrar
  - no entrarás allí
  lexicon: HALOT
  rationale: El imperfecto 2ms funciona aquí como prohibición profética. «No entrarás» mantiene el tono solemne y normativo del mandato sin añadir elementos no presentes en el hebreo.
- source_word: לָשֶׁבֶת
  english_pob_choice: to sit
  chosen_spanish: para sentarte
  alternatives_spanish:
  - para sentarte a la mesa
  - para tomar asiento
  - para sentarte con ellos
  lexicon: HALOT
  rationale: El infinitivo expresa propósito tras entrar. En contexto de banquete, «sentarte» comunica de manera natural el acto de tomar lugar en la mesa sin introducir una interpretación más distante como «habitar».
- source_word: אוֹתָם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con ellos allí
  - junto a ellos
  - a su lado
  lexicon: HALOT
  rationale: Aunque la forma hebrea funciona formalmente como marcador de objeto, el audit trail inglés ya documenta el valor asociativo en este giro. En español, «con ellos» reproduce con claridad la participación social prohibida.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  english_pob_choice: to eat and to drink
  chosen_spanish: para comer y para beber
  alternatives_spanish:
  - para comer y beber
  - a comer y beber
  - para comer y beber
  lexicon: HALOT
  rationale: Conservo ambos infinitivos de propósito para reflejar el ritmo hebreo y la doble acción del festín. La repetición de «para» es aceptable en español bíblico claro y mantiene la estructura del original.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada explícitamente en «casa de banquete[a]» dentro del texto español.'
  spanish_consistency_notes:
  - Se mantuvo el mandato profético en segunda persona singular futura de prohibición, acorde al hebreo.
  - «Banquete» conserva el campo semántico de מִשְׁתֶּה sin desplazarlo a una explicación interpretativa excesiva.
  - La construcción de propósito con «para» reproduce de forma transparente la secuencia de infinitivos hebreos.
  - No se añadió ningún elemento doctrinal ajeno al versículo.
