translation:
  language: es
  text: Ciertamente ningún hombre puede redimir a un hermano[a], ni dar a Dios su rescate—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Verdaderamente, ningún hombre puede redimir a su hermano, ni dar a Dios su precio de rescate».'
    reason: alternative_reading
lexical_decisions:
- source_word: אָח
  english_pob_choice: a brother
  chosen_spanish: a un hermano
  alternatives_spanish:
  - su hermano
  - a cualquier hermano
  lexicon: HALOT
  rationale: אָח significa literalmente «hermano». En este contexto conserva una referencia representativa a un ser humano cercano, sin convertirlo en una posesión explícita con «su». «A un hermano» refleja bien la singularidad y el alcance general del dicho.
- source_word: פָדֹה יִפְדֶּה
  english_pob_choice: can redeem
  chosen_spanish: puede redimir
  alternatives_spanish:
  - redimirá ciertamente
  - podrá redimir de ninguna manera
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + imperfecto intensifica la negación de la capacidad de redimir. En español, «puede redimir» con «ningún hombre» y «ciertamente» comunica la imposibilidad real sin una repetición artificial.
- source_word: אִישׁ
  english_pob_choice: no man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular («hombre»). Se mantiene esa forma porque el POB inglés también conserva el valor de género léxico, al mismo tiempo que el contexto sigue siendo representativo de la humanidad en general.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere claramente al único Dios verdadero. En español, «a Dios» es la forma natural para expresar la dirección del pago de rescate.
- source_word: כָּפְרוֹ
  english_pob_choice: his ransom
  chosen_spanish: su rescate
  alternatives_spanish:
  - su precio de rescate
  - su precio de redención
  lexicon: HALOT
  rationale: כֹּפֶר denota un pago de rescate o rescate precio. «Rescate» es breve e idiomático en español y conserva la imagen económica-redentora sin introducir de más el lenguaje sacrificial.
- source_word: אָח לֹא
  english_pob_choice: Surely no man can redeem a brother
  chosen_spanish: Ciertamente ningún hombre puede redimir a un hermano
  alternatives_spanish:
  - Verdaderamente, ningún hombre puede redimir a un hermano
  - Un hermano no puede en absoluto redimir a otro hombre
  lexicon: HALOT
  rationale: 'La apertura hebrea es sintácticamente difícil y puede sonar adverbial o exclamativa. La traducción española sigue la lectura del POB: una afirmación enfática de imposibilidad, conservando «hermano» como término central.'
theological_decisions:
- issue: Sentido de כֹּפֶר frente a Dios
  english_pob_reading: ransom paid to God for a human life
  chosen_spanish_reading: un rescate pagado a Dios por una vida humana
  alternative_spanish_readings:
  - un precio de redención pagado a Dios
  - una ofrenda de expiación a Dios
  rationale: La frase presenta la imposibilidad de que el ser humano compre la liberación de la muerte mediante un pago a Dios. «Rescate» mantiene la imagen económica-redentora y no fuerza una teología sacrificial más específica que el versículo no desarrolla aquí.
  doctrine_reference: Mantener la tensión teológica del texto; no resolverla ni ampliarla más allá de la evidencia inmediata.
translation_notes:
  revision_awareness: El texto sigue la lectura auditada del POB inglés y conserva la tensión sintáctica de אָח/אִישׁ y כֹּפֶר sin suavizarla en exceso. No se introdujeron cambios textuales ni se asumieron variantes no documentadas.
  spanish_consistency_notes:
  - Se emplea «Dios» para אֱלֹהִים en este contexto monoteísta.
  - Se preserva «redimir»/«rescate» para mantener el campo léxico de liberación mediante pago.
  - «Ningún hombre» mantiene el valor masculino singular de אִישׁ sin perder el sentido representativo general.
  - La nota al pie ofrece la alternativa documentada para la ambigüedad de אָח y כֹּפֶר.
