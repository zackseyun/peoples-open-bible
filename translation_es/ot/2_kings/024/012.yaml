base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/012.yaml
  text: Then Jehoiachin king of Judah went out to the king of Babylon[a], he and his mother and his servants and his officials and his eunuchs; and the king of Babylon took him in the eighth year of his reign.
  footnotes:
