translation:
  language: es
  text: Que haya abundancia de grano en la tierra[a]; en la cima de los montes, su fruto ondee como el Líbano; y florezcan de la ciudad como la hierba de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un puñado de grano en la tierra». La frase hebrea es rara y puede subrayar tanto una cantidad pequeña hecha extraordinariamente fecunda como simplemente una gran abundancia de grano.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May there be
  chosen_spanish: Haya
  alternatives_spanish:
  - Que haya
  - Sea
  lexicon: HALOT
  rationale: El jussivo expresa deseo o súplica. «Haya» comunica bien esa fuerza optativa en español sin sobrecargar la frase.
- source_word: פִסַּת
  english_pob_choice: abundance of
  chosen_spanish: abundancia de
  alternatives_spanish:
  - un puñado de
  - plenty of
  lexicon: HALOT
  rationale: La palabra es rara y ambigua. En este contexto de bendición agrícola, la opción que mejor refleja el tono de fertilidad extraordinaria es «abundancia de», conservando la tensión lexical mediante nota.
- source_word: בַּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: Aquí el término alude al producto agrícola. «Grano» es la equivalencia natural y amplia en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el suelo
  lexicon: HALOT
  rationale: En un salmo real, «tierra» mantiene la referencia territorial y agrícola sin forzar un valor cosmológico.
- source_word: בְּרֹאשׁ הָרִים
  english_pob_choice: on the tops of the mountains
  chosen_spanish: en la cima de los montes
  alternatives_spanish:
  - en las cimas de los montes
  - sobre las cumbres de los montes
  lexicon: HALOT
  rationale: La imagen señala altura extrema y fertilidad inesperada. «En la cima de los montes» conserva la imagen de forma clara y natural.
- source_word: יִרְעַשׁ
  english_pob_choice: may its fruit wave
  chosen_spanish: ondee
  alternatives_spanish:
  - tiemble
  - se sacuda
  - flamee
  lexicon: HALOT
  rationale: El verbo literalmente implica sacudirse o temblar, pero en un cuadro de cosecha la imagen visible de movimiento se expresa mejor con «ondee», como el POB inglés usa «wave».
- source_word: פִּרְיוֹ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  lexicon: HALOT
  rationale: El sufijo singular colectivo se conserva con «su fruto», que mantiene la referencia al producto agrícola del verso.
- source_word: וְיָצִיצוּ
  english_pob_choice: and may they blossom
  chosen_spanish: y broten
  alternatives_spanish:
  - y florezcan
  - y reverdezcan
  - y retoñen
  lexicon: HALOT
  rationale: El verbo tiene sentido de brotar/florecer. «Broten» preserva la metáfora vegetal y permite el sujeto implícito sin añadir palabras ajenas al hebreo.
- source_word: מֵעִיר
  english_pob_choice: from the city
  chosen_spanish: desde la ciudad
  alternatives_spanish:
  - de la ciudad
  - a partir de la ciudad
  lexicon: HALOT
  rationale: «Desde la ciudad» reproduce el origen o punto de salida de la imagen en español de manera fluida y fiel.
- source_word: כְּעֵשֶׂב הָאָרֶץ
  english_pob_choice: like the grass of the earth
  chosen_spanish: como la hierba de la tierra
  alternatives_spanish:
  - como el pasto de la tierra
  - como la hierba del país
  lexicon: HALOT
  rationale: «Hierba» mantiene la comparación vegetal y es más amplia que «pasto». «De la tierra» conserva la forma formal del hebreo.
theological_decisions:
- issue: Sentido de פִסַּת בַּר
  english_pob_reading: an abundance of grain
  chosen_spanish_reading: abundancia de grano
  alternative_spanish_readings:
  - un puñado de grano
  rationale: La lectura del POB inglés sigue el flujo de bendición y fertilidad del verso. «Abundancia de grano» comunica bien esa lectura en español, mientras que la alternativa tradicional se preserva en nota porque la frase hebrea es rara y lexicalmente discutida.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas reales'
- issue: Sujeto implícito de וְיָצִיצוּ
  english_pob_reading: may they blossom from the city
  chosen_spanish_reading: y broten desde la ciudad
  alternative_spanish_readings:
  - y florezcan desde la ciudad
  - y ellos broten desde la ciudad
  rationale: El hebreo usa un verbo plural sin sujeto explícito. En español, dejarlo impersonal/plural implícito evita añadir «personas» y mantiene la ambigüedad poética del original.
  doctrine_reference: Claridad formal sin expandir el texto más allá del hebreo
- issue: Imagen de crecimiento vegetal aplicada a la ciudad
  english_pob_reading: from the city like the grass of the earth
  chosen_spanish_reading: desde la ciudad como la hierba de la tierra
  alternative_spanish_readings:
  - desde la ciudad como el pasto de la tierra
  - de la ciudad como la hierba de la tierra
  rationale: La comparación conserva la fuerza de expansión fecunda del verso y no requiere identificar explícitamente a los habitantes; la metáfora queda abierta como en el hebreo.
  doctrine_reference: Poética bíblica y respeto por la metáfora original
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se eliminó el artículo innecesario en la frase de abundancia y se evitó introducir un sujeto explícito en el verbo final. La redacción española sigue esa decisión al usar «Haya abundancia de grano» y «broten» sin añadir «personas» o un sujeto interpretativo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - Se eligió «grano» y no «trigo» para mantener la amplitud del término agrícola hebreo.
  - «Hierba» se prefirió a «pasto» para reflejar la comparación formal del hebreo y su tono poético.
  - Las notas mantienen la ambigüedad lexical donde el hebreo lo exige, en especial en פִסַּת בַּר.
