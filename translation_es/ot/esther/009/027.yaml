base_translation:
  language: en
  yaml_path: translation/ot/esther/009/027.yaml
  text: 'the Jews established and accepted for themselves[a], for their offspring, and for all who joined them, that it should not fail: to observe these two days according to what was written for them and at their appointed time[b], year after year.'
  footnotes:
  - marker: a
    text: Or 'all who attached themselves to them.' The Hebrew refers to those who joined or allied themselves with the Jews.
    reason: lexical_alternative
  - marker: b
    text: Or 'that it should not pass away' or 'that it should not be neglected.' The clause means the observance was not to lapse.
    reason: lexical_alternative
