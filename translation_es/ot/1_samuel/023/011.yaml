revisions:
- from: '¿Los hombres de Queila me entregarán en su mano? ¿Descenderá Saúl, como ha oído tu siervo? Yahvé, Dios de Israel, por favor, habla a tu siervo.” Y Yahvé dijo: “Descenderá.”'
