  to: Hijos míos[a], ahora no sean negligentes, porque Yahvé los ha elegido para estar ante él[b], para ministrarle y para ser sus ministros y los que ofrecen incienso[c].
  rationale: Se ajustó el español para mayor naturalidad y legibilidad eclesial sin apartarse del hebreo ni del razonamiento auditado. «No sean» armoniza con el objetivo de español latinoamericano neutral. «Estar ante él» evita una literalidad pesada en el texto principal, mientras la nota conserva la imagen hebrea «estar de pie delante de él». «Los que ofrecen incienso» comunica la función cultual de וּמַקְטִרִים de forma más idiomática en español, y la nota preserva la alternativa más literal.
