revisions:
- from: 'Habla a Aarón y a sus hijos y a todos los hijos de Israel[a], y diles: «Esta es la cosa que Yahvé ha mandado[b], diciendo»'
  to: 'Habla a Aarón y a sus hijos y a todos los hijos de Israel[a], y les dirás: «Este es el asunto que Yahvé ha mandado[b], diciendo»'
  rationale: Se revisa principalmente la expresión de זֶה הַדָּבָר para lograr un español más natural y digno sin perder el sentido fuente ni el rastro de auditoría. «Este es el asunto» representa bien la fórmula hebrea en contexto. También se ajusta «y diles» a «y les dirás» para reflejar más estrechamente la secuencia formal del hebreo. La nota b se corrige para ofrecer alternativas semánticamente más adecuadas.
