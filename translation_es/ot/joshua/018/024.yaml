review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: tres topónimos seguidos por la fórmula de resumen territorial, «doce ciudades con sus aldeas». Mantiene correctamente גָבַע como topónimo («Geba») y no lo interpreta como sustantivo común. También preserva bien חַצְרֵיהֶן con «sus aldeas». La única corrección necesaria es en el primer topónimo: el audit trail inglés revisado fijó «Chephar-ammoni», y en español conviene alinearlo como «Chefar-amoni» o equivalente cercano, evitando tanto la forma previa con h interna como el acento final no justificado por el hebreo ni por la documentación.'
  spanish_quality_summary: El español es claro y natural para una lista territorial. «Doce ciudades con sus aldeas» suena bien en registro bíblico moderno. Sin embargo, «Chefar-ammoní» introduce una acentuación poco natural y una transliteración menos alineada con la forma auditada; además, la nota actual explica más bien la decisión de transliterar que una alternativa léxica real. Conviene ajustar el topónimo y convertir la nota en una verdadera nota de variante de transliteración.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. En nombres propios, «Ofni» y «Geba» están bien. Para כְפַר העמני, la versión española debe seguir de cerca la decisión POB revisada «Chephar-ammoni», adaptada ortográficamente al español como «Chefar-amoni», con nota opcional de transliteración alternativa.
  issues:
  - severity: medium
    issue: El primer topónimo «Chefar-ammoní» no queda bien alineado con la revisión inglesa «Chephar-ammoni».
    rationale: El audit trail fijó una forma específica del topónimo. En español, «Chefar-amoni» conserva mejor esa base, evita una h no reflejada en el español y prescinde del acento final añadido sin apoyo claro en la evidencia.
  - severity: low
    issue: La nota al pie actual no presenta una alternativa concreta de transliteración.
    rationale: Dado que el motivo es lexical_alternative, la nota funciona mejor si documenta una variante posible del nombre, no solo la política general de transliteración.
  revised_spanish_text: 'Y Chefar-amoni[a], Ofni y Geba: doce ciudades con sus aldeas.'
  revised_footnotes:
  - marker: a
    text: Chefar-amoni también puede transliterarse «Chefar-haamoní» o de manera similar en algunas versiones.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el primer topónimo para alinearlo con la decisión auditada del POB («Chephar-ammoni») en una forma española más natural y consistente: «Chefar-amoni». También se reemplaza la nota por una variante de transliteración real, conforme al propósito de lexical_alternative. El resto del versículo está bien y no requiere cambios.'
