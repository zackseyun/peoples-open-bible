translation:
  language: es
  text: 'Los centinelas que rondan por la ciudad me encontraron: «¿Han visto al que mi alma ama?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los centinelas que patrullan la ciudad me encontraron».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «al que mi alma ama», una expresión poética recurrente en el Cantar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצָאוּנִי
  english_pob_choice: found me
  chosen_spanish: me encontraron
  alternatives_spanish:
  - me hallaron
  - dieron conmigo
  lexicon: HALOT
  rationale: El qal perfecto 3cp con sufijo de 1cs expresa hallazgo directo; «me encontraron» comunica con naturalidad el resultado puntual sin perder la fidelidad básica del verbo מצא.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: the watchmen
  chosen_spanish: los centinelas
  alternatives_spanish:
  - los guardias
  - los vigilantes
  lexicon: HALOT
  rationale: «Centinelas» conserva la función de vigilar y el matiz literario nocturno del contexto. «Guardias» suena más administrativo; «vigilantes» puede sonar más genérico.
- source_word: הַסֹּבְבִים
  english_pob_choice: who go about
  chosen_spanish: que andan rondando
  alternatives_spanish:
  - que recorren
  - que patrullan
  - que dan vueltas
  lexicon: HALOT
  rationale: El participio describe movimiento repetido o continuo alrededor de la ciudad. «Andan rondando» refleja ese giro descriptivo sin imponer demasiado la imagen moderna de patrulla.
- source_word: בָּעִיר
  english_pob_choice: the city
  chosen_spanish: por la ciudad
  alternatives_spanish:
  - en la ciudad
  - por la urbe
  lexicon: HALOT
  rationale: En español, con un verbo de desplazamiento como «andar rondando», la preposición «por» expresa mejor la circulación dentro del espacio urbano que un simple «en».
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  english_pob_choice: the one whom my soul loves
  chosen_spanish: al que ama mi alma
  alternatives_spanish:
  - al amado de mi alma
  - al que mi alma ama
  - a quien ama mi alma
  lexicon: HALOT
  rationale: Se mantiene el valor relacional del hebreo y la fórmula poética recurrente del Cantar. «Mi alma» preserva נֶפֶשׁ como sede del anhelo/afecto; «al que ama mi alma» evita reemplazarla por «corazón» y conserva la tensión poética.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  - mi interior
  lexicon: HALOT
  rationale: En español bíblico «alma» es la equivalencia más directa y reconocible para נֶפֶשׁ en esta expresión afectiva. Aunque el término puede abarcar la persona entera, aquí la formulación poética se conserva mejor con «alma».
- source_word: רְאִיתֶם
  english_pob_choice: Have you seen
  chosen_spanish: ¿Han visto
  alternatives_spanish:
  - ¿Han llegado a ver
  - ¿Vieron
  lexicon: HALOT
  rationale: La pregunta directa al plural masculino se expresa de forma natural con el presente perfecto interrogativo. «¿Han visto?» mantiene la inmediatez de la búsqueda mejor que un simple pasado.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo WLC y coincide sustancialmente con la solución inglesa auditada. Se ajustó «watchmen» a «centinelas» y «go about the city» a una construcción española más natural («andan rondando por la ciudad») sin alterar el sentido básico. También se mantuvo la fórmula poética «mi alma» para נַפְשִׁי.
  spanish_consistency_notes:
  - Se conserva el estilo poético directo del Cantar, con discurso citado y dos puntos.
  - No se traduce mecánicamente desde el inglés; se privilegia la sintaxis natural del español manteniendo los paralelismos del hebreo.
  - Se preserva la fórmula recurrente «al que ama mi alma» por su valor intertextual dentro del libro.
