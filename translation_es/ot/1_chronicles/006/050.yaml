revisions:
- from: E hicieron por sorteo, de la tribu de los hijos de Judá[a], y de la tribu de los hijos de Simeón, y de la tribu de los hijos de Benjamín, estas ciudades, que fueron llamadas por nombre.
  to: Y asignaron por sorteo, de la tribu de los hijos de Judá[a], y de la tribu de los hijos de Simeón, y de la tribu de los hijos de Benjamín, estas ciudades, que llamaron por nombre.
  rationale: Se reemplaza «hicieron» por «asignaron» para reflejar fielmente el valor distributivo de נתן en contexto de reparto por sorteo. Se cambia la pasiva «fueron llamadas» por el activo «llamaron» para seguir mejor la forma hebrea y mejorar la naturalidad del español. Se ajusta «E» a «Y» por norma ortográfica y fonética del español.
