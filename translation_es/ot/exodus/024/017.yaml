review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en los elementos principales: «apariencia», «gloria», «Yahvé», la comparación con fuego consumidor, la ubicación en la parte alta del monte y la designación «los hijos de Israel». Sin embargo, «a los ojos de» suena menos natural aquí que una formulación más idiomática como «ante los ojos de», que preserva mejor לְעֵינֵי en español eclesial claro. Además, la nota b repite la forma ya usada en el texto en vez de ofrecer solo alternativas reales.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere un ajuste menor de naturalidad y precisión editorial. «Como fuego consumidor» funciona, y «en la cima del monte» es una buena opción. El único punto de fluidez es «a los ojos de los hijos de Israel», que resulta algo rígido; «ante los ojos de» mantiene el énfasis visual con mejor legibilidad. La puntuación y el registro son adecuados.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; כְּבוֹד -> «gloria»; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel», en línea con la política de preservar el masculino plural. No hay conflicto teológico relevante. La nota léxica para «fuego devorador» es apropiada.'
  issues:
  - severity: medium
    issue: La expresión «a los ojos de» es poco idiomática en este contexto.
    rationale: Aunque semánticamente posible para לְעֵינֵי, en español bíblico contemporáneo «ante los ojos de» o «a la vista de» comunica mejor la visibilidad pública sin sonar forzado.
  - severity: low
    issue: La nota b incluye como alternativa la misma expresión del texto principal.
    rationale: Si el texto ya dice «los hijos de Israel», la nota no debe repetirla como alternativa; conviene ofrecer solo opciones verdaderamente alternativas, como «los israelitas» o, si se desea, «los hijos de Jacob» no aplica aquí. La alternativa documentada en inglés incluye también «los hijos de Israel» frente a otras posibilidades inglesas, pero en español eso genera redundancia editorial.
  revised_spanish_text: Y la apariencia de la gloria de Yahvé era como fuego consumidor en la cima del monte, ante los ojos de los hijos de Israel[a][b].
  revised_footnotes:
  - marker: a
    text: O «fuego devorador».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas».
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad de לְעֵינֵי con «ante los ojos de», sin perder el énfasis visual del hebreo. También se depuró la nota b para que contenga solo una alternativa real en español y no repita la misma formulación del texto principal.
