id: JHN.15.1
reference: 'John 15:1'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι ἡ ἄμπελος ἡ ἀληθινή, καὶ ὁ πατήρ μου ὁ γεωργός ἐστιν·
base_translation:
  language: en
  yaml_path: translation/nt/john/015/001.yaml
  text: I am the true vine[a], and my Father is the vinegrower.
  footnotes:
  - marker: a
    text: Or 'vinedresser.' The Greek γεωργός refers to one who cultivates the land; in the context of a vine, 'vinedresser' is a more specific rendering.
    reason: lexical_alternative
translation:
  language: ko
  text: 「내가 곧 참 포도나무이고, 내 아버지는 농부이십니다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「포도원 가꾸는 자」. 헬라어 γεωργός는 「땅을 일구는 자」를 가리키며, 포도나무 비유의 문맥에서는 더 구체적으로 「포도원 가꾸는 자」로 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_korean: 내가 곧
  alternatives_korean:
  - 내가 ~이다
  lexicon: BDAG
  rationale: 요한복음 특유의 「ἐγώ εἰμι」 정형 표현이다. 「곧」을 더해 강조적 1인칭의 무게를 한국어에서도 살리며, 비유적 자기-동일시의 선언적 어조를 유지한다.
- source_word: ἄμπελος ἡ ἀληθινή
  english_pob_choice: true vine
  chosen_korean: 참 포도나무
  alternatives_korean:
  - 진정한 포도나무
  lexicon: BDAG
  rationale: ἀληθινός는 요한 신학에서 「궁극적·하나님의 실재에 부합하는」 의미를 담는다. 「참」이 한국어에서 가장 자연스럽고 요한 어휘의 무게를 보존한다.
- source_word: γεωργός
  english_pob_choice: vinegrower
  chosen_korean: 농부
  alternatives_korean:
  - 포도원 가꾸는 자
  - 일구는 자
  lexicon: BDAG
  rationale: γεωργός는 본래 「땅을 일구는 자」. 본문 비유는 포도나무 농사이므로 「포도원 가꾸는 자」가 더 구체적이나, 「농부」가 한국어로 가장 자연스럽고 직접적이며, 각주로 대체 어휘를 보존한다.
- source_word: πατήρ μου
  english_pob_choice: my Father
  chosen_korean: 내 아버지
  alternatives_korean: []
  lexicon: BDAG
  rationale: 하나님과 예수의 인격적 관계를 가리키는 호칭이며, 한국어에서는 별도의 대문자 표지가 없으므로 문맥으로 신적 호칭임이 드러난다.
