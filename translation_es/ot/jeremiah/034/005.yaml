translation:
  language: es
  text: 'Morirás en paz[a]. Y así como se quemaban aromas por tus padres, los reyes anteriores que te precedieron, así quemarán aromas por ti, y harán duelo por ti, diciendo: «¡Ay, señor![b]» Porque yo he hablado la palabra, declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como se hacían quemas fúnebres por tus padres». El hebreo alude a quemas ceremoniales en honor de reyes difuntos, probablemente de especias o aromas, no a la cremación del cuerpo.'
    reason: cultural_note
  - marker: b
    text: 'O: «¡Ah, señor!». El hebreo presenta un clamor formal de lamento sobre un gobernante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  lexicon: HALOT
  rationale: La expresión preposicional hebrea indica la manera o circunstancia de la muerte. «En paz» conserva el giro idiomático y comunica una muerte no violenta o sin perturbación, sin añadir una glosa emocional que el texto no exige.
- source_word: תָּמוּת
  english_pob_choice: you will die
  chosen_spanish: morirás
  alternatives_spanish:
  - vas a morir
  - morirás ciertamente
  lexicon: HALOT
  rationale: El imperfecto qal en 2ms se vierte de forma natural al futuro español. «Morirás» es breve, claro y fiel al anuncio profético.
- source_word: וּכְמִשְׂרְפוֹת
  english_pob_choice: as spices were burned
  chosen_spanish: como se quemaban aromas
  alternatives_spanish:
  - como se hacían quemas fúnebres
  - como se quemaban especias
  lexicon: HALOT
  rationale: El sustantivo en este contexto real funerario apunta a un acto ceremonial de honra, no a la cremación del cuerpo. «Aromas» comunica de manera natural en español la idea de sustancias aromáticas quemadas en honor del difunto, manteniendo la referencia cultural sin endurecerla en un tecnicismo.
- source_word: אֲבוֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres/antecesores
  lexicon: HALOT
  rationale: En la línea siguiente el texto aclara que se trata de reyes anteriores, de modo que «padres» funciona como referencia hereditaria/ancestral en español. La opción es más transparente y suena natural, sin perder el vínculo de precedencia.
- source_word: הַמְּלָכִים הָרִאשֹׁנִים אֲשֶׁר הָיוּ לְפָנֶיךָ
  english_pob_choice: the former kings who were before you
  chosen_spanish: los primeros reyes que fueron antes de ti
  alternatives_spanish:
  - los reyes anteriores que estuvieron antes de ti
  - los antiguos reyes que precedieron a ti
  lexicon: HALOT
  rationale: 'La apposición explica quiénes son los «padres»: los reyes previos. «Los primeros reyes» conserva el paralelismo y «que fueron antes de ti» refleja la repetición enfática de precedencia.'
- source_word: כֵּן יִשְׂרְפוּ לָךְ
  english_pob_choice: so they will burn spices for you
  chosen_spanish: así quemarán aromas por ti
  alternatives_spanish:
  - así harán quemas aromáticas por ti
  - así quemarán especias por ti
  lexicon: HALOT
  rationale: El verbo en plural y el dativo expresan un rito honorífico de duelo real. El español necesita un objeto explícito para evitar la lectura errónea de cremación; «aromas» retoma la clase de material aromático implícito y «por ti» mantiene el sentido benefactivo de honor funerario.
- source_word: וְהוֹי אָדוֹן
  english_pob_choice: Alas, lord!
  chosen_spanish: ¡Ay, señor!
  alternatives_spanish:
  - ¡Ay, soberano!
  - ¡Ay, amo!
  lexicon: HALOT
  rationale: הוֹי es una exclamación de duelo. «Señor» aquí funciona como tratamiento respetuoso dirigido al rey difunto; se evita «Señor» con mayúscula para no confundirlo con el título divino.
- source_word: יִסְפְּדוּ לָךְ
  english_pob_choice: they will lament for you, saying
  chosen_spanish: te harán lamento, diciendo
  alternatives_spanish:
  - lamentarán por ti, diciendo
  - te entonarán un lamento, diciendo
  lexicon: HALOT
  rationale: El verbo alude a una lamentación formal, incluso ritualizada. «Te harán lamento» preserva el carácter ceremonial y poético del hebreo mejor que una simple reformulación de «mourn».
- source_word: כִּי דָבָר אֲנִי דִבַּרְתִּי
  english_pob_choice: For I have spoken the word
  chosen_spanish: Porque yo he hablado la palabra
  alternatives_spanish:
  - Porque yo he hablado
  - Porque he pronunciado la palabra
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del sustantivo y el verbo de la misma raíz דבר. «La palabra» conserva esa densidad retórica que el texto subraya.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el Nombre divino según el criterio del proyecto. «Declara» refleja bien la fórmula profética נְאֻם con un castellano sobrio y bíblico.
theological_decisions:
- issue: Naturaleza del "quemarán" funerario en contexto real
  english_pob_reading: ceremonial burning of spices/aromatics in honor of the king, not cremation of the body
  chosen_spanish_reading: quema ceremonial de aromas/aromáticos en honor del rey, no cremación del cuerpo
  alternative_spanish_readings:
  - quema fúnebre ceremonial
  - quema de especias aromáticas
  rationale: El contexto de 2 Reyes/Jeremías sobre honores funerarios reales pide evitar una lectura de cremación. «Aromas» mantiene la referencia a sustancias aromáticas y la función honorífica del rito.
  doctrine_reference: POB source-note on royal burial customs / cultural-historical note
- issue: Tratamiento de יהוה al final del versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo trae el Tetragrammaton de forma directa. El proyecto requiere transliteración del Nombre divino, por lo que se emplea «Yahvé» en lugar de un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אָדוֹן en la exclamación de duelo
  english_pob_reading: formal cry of lament over a ruler
  chosen_spanish_reading: exclamación de duelo dirigida al rey con tratamiento respetuoso
  alternative_spanish_readings:
  - ¡Ay, señor!
  - ¡Ay, soberano!
  rationale: En este contexto אָדוֹן no designa al Señor divino, sino al monarca llorado. En español, «señor» comunica el tratamiento respetuoso sin borrar el matiz funerario del lamento.
  doctrine_reference: Lexical-theological note on royal lament formulas
translation_notes:
  revision_awareness: Se incorporó el ajuste revisado en el audit trail inglés para explicitar el material quemado en el rito funerario y evitar la lectura de cremación. La versión española conserva esa aclaración mediante «aromas» y la nota cultural, manteniendo además la exclamación de duelo y la fórmula profética final.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se evita «SEÑOR» como sustituto del Nombre divino, pero se mantiene «señor» en minúscula dentro del lamento por ser un tratamiento dirigido al rey.
  - «En paz» refleja בְּשָׁלוֹם con naturalidad y sin sobreinterpretación.
  - La imagen de las quemas funerarias se traduce con vocabulario comprensible en español sin sugerir cremación.
  - Se preserva la repetición retórica de «palabra» / «he hablado» en el cierre.
