translation:
  language: es
  text: Y después de las sesenta y dos semanas[a], será cortado un ungido y no tendrá nada[b]. La ciudad y el santuario los destruirá el pueblo del gobernante que ha de venir[c]. Su fin vendrá con una inundación[d], y hasta el fin habrá guerra; desolaciones están decretadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Mesías será cortado'. El hebreo dice literalmente 'un ungido', y los intérpretes discrepan sobre si se refiere específicamente al Mesías.
    reason: alternative_reading
  - marker: b
    text: O 'y no habrá nada para él', o 'y nadie estará para él'. La cláusula hebrea es breve y difícil.
    reason: lexical_alternative
  - marker: c
    text: O 'el pueblo de un príncipe que ha de venir'.
    reason: lexical_alternative
  - marker: d
    text: O 'Su fin vendrá con una inundación'. El referente de 'su' es debatido.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Marca con claridad la secuencia temporal posterior a las sesenta y dos semanas sin sobrecargar el orden del hebreo.
- source_word: הַשָּׁבֻעִים שִׁשִּׁים וּשְׁנַיִם
  english_pob_choice: the sixty-two weeks
  chosen_spanish: las sesenta y dos semanas
  alternatives_spanish:
  - las sesenta y dos heptadas
  - las sesenta y dos sietes
  lexicon: HALOT
  rationale: Conserva la forma tradicional 'semanas' para שָׁבוּעַ, manteniendo legible el marco cronológico de Daniel sin forzar una paráfrasis más técnica en el texto principal.
- source_word: יִכָּרֵת
  english_pob_choice: will be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será arrancado
  lexicon: HALOT
  rationale: Preserva la fuerza pasiva del verbo y la imagen de una separación o supresión violenta o judicial. 'Será cortado' es más cercano al hebreo que 'morirá' o una explicación interpretativa.
- source_word: מָשִׁיחַ
  english_pob_choice: an anointed one
  chosen_spanish: un ungido
  alternatives_spanish:
  - un Mesías
  - un ungido de Dios
  lexicon: HALOT
  rationale: Mantiene la transparencia léxica del hebreo sin resolver en el texto principal la identificación debatida. 'Ungido' expresa el sentido básico del término y deja abierta la tensión exegética.
- source_word: וְאֵין לוֹ
  english_pob_choice: and will have nothing
  chosen_spanish: y no tendrá nada
  alternatives_spanish:
  - y no habrá nada para él
  - y no tendrá a nadie
  lexicon: HALOT
  rationale: La cláusula es breve y ambigua; en español, 'no tendrá nada' conserva la idea de desposesión o privación sin decidir si el énfasis recae en bienes, apoyo o derecho.
- source_word: הָעִיר וְהַקֹּדֶשׁ
  english_pob_choice: the city and the sanctuary
  chosen_spanish: la ciudad y el santuario
  alternatives_spanish:
  - la ciudad y el lugar santo
  - la ciudad y el templo
  lexicon: HALOT
  rationale: '''Santuario'' traduce bien הַקֹּדֶשׁ en paralelo con ''la ciudad'' y conserva el referente sagrado/templeario sin reducirlo sólo al edificio.'
- source_word: יַשְׁחִית
  english_pob_choice: will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - devastará
  - arruinará
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara para la acción destructiva sobre la ciudad y el santuario.
- source_word: עַם נָגִיד הַבָּא
  english_pob_choice: the people of the coming ruler
  chosen_spanish: el pueblo del gobernante que ha de venir
  alternatives_spanish:
  - el pueblo del príncipe que viene
  - el pueblo de un jefe que viene
  lexicon: HALOT
  rationale: '''Gobernante'' comunica el valor de נָגִיד sin importar una identificación específica. ''Que ha de venir'' refleja el participio atributivo del hebreo y conserva la idea de un personaje futuro.'
- source_word: וְקִצּוֹ בַשֶּׁטֶף
  english_pob_choice: Its end will come with a flood
  chosen_spanish: Su fin vendrá como por una inundación
  alternatives_spanish:
  - Su fin vendrá con una inundación
  - Y su fin será con un diluvio
  lexicon: HALOT
  rationale: '''Como por una inundación'' preserva la imagen intensa del hebreo sin decidir si el término es literal o metafórico. El antecedente del pronombre sigue siendo deliberadamente ambiguo.'
- source_word: וְעַד קֵץ מִלְחָמָה
  english_pob_choice: and until the end there will be war
  chosen_spanish: y hasta el fin habrá guerra
  alternatives_spanish:
  - y hasta el fin será guerra
  - y hasta el fin permanece la guerra
  lexicon: HALOT
  rationale: Suena natural en español y mantiene la continuidad de conflicto hasta el término señalado.
- source_word: נֶחֱרֶצֶת
  english_pob_choice: are decreed
  chosen_spanish: están decretadas
  alternatives_spanish:
  - son decretadas
  - están determinadas
  lexicon: HALOT
  rationale: La pasiva comunica una decisión firme ya fijada; en español, el plural femenino concuerda con 'desolaciones' y conserva el sentido de decreto irreversible.
- source_word: שֹׁמֵמוֹת
  english_pob_choice: desolations
  chosen_spanish: desolaciones
  alternatives_spanish:
  - devastaciones
  - ruinas
  lexicon: HALOT
  rationale: '''Desolaciones'' retiene la fuerza nominal y el carácter de devastación continuada o reiterada que sugiere el hebreo.'
theological_decisions:
- issue: Cómo tratar la identidad de מָשִׁיחַ en un pasaje de interpretación disputada
  english_pob_reading: Render as 'an anointed one' in the main text, with 'Messiah' in a note as an alternative.
  chosen_spanish_reading: Traducir 'un ungido' en el texto principal, con 'Mesías' como posibilidad anotada.
  alternative_spanish_readings:
  - un Mesías
  - el Mesías
  rationale: El hebreo no lleva artículo y el contexto ha sido interpretado de maneras distintas. Para no resolver la cuestión en la traducción principal, se conserva la formulación más transparente y se deja abierta la identificación mesiánica.
  doctrine_reference: Translate titles; preserve theological tension rather than resolving it in the main text.
- issue: Cómo traducir וְאֵין לוֹ sin decidir si habla de abandono, privación o falta de apoyo
  english_pob_reading: Render as 'and will have nothing' and preserve alternatives in a footnote.
  chosen_spanish_reading: Traducir 'y no tendrá nada' sin especificar el tipo de carencia.
  alternative_spanish_readings:
  - y no habrá nada para él
  - y nadie estará para él
  rationale: La frase es breve y ambigua. La versión elegida conserva la tensión interpretativa y evita una explicación teológica que no está exigida por el hebreo.
  doctrine_reference: Preserve theological tension rather than resolving it.
translation_notes:
  revision_awareness: No se registraron revisiones posteriores; el pasaje se mantiene estable en el último pase revisado, con alta concordancia con el auditor inglés y sólo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene 'ungido' en el texto principal para reflejar מָשִׁיחַ de manera léxica y no resolver la identificación en la traducción principal.
  - Se conserva 'santuario' para הַקֹּדֶשׁ en paralelo con 'la ciudad', evitando sustituirlo por un término más interpretativo como 'templo' salvo en nota.
  - Se usa 'gobernante' para נָגִיד como término neutral y moderno, coherente con el audito inglés 'ruler' y sin introducir 'príncipe' como opción obligatoria en el texto.
  - La puntuación divide las cláusulas de modo que el flujo del hebreo quede claro en español sin añadir conectores inexistentes.
