id: 2TI.2.4
reference: 2 Timothy 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐδεὶς στρατευόμενος ἐμπλέκεται ταῖς τοῦ βίου πραγματείαις, ἵνα τῷ στρατολογήσαντι ἀρέσῃ·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/004.yaml
  text: No one serving as a soldier gets entangled in the affairs of ordinary life, so that he may please the one who enlisted him.
translation:
  language: ko
  text: 군 복무 중인 사람은 누구도 일상의 일에[a] 얽매이지 않습니다. 자기를 모집한 분을 기쁘게 해 드리려 함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「민간의 일에」. 헬라어는 군 복무와 평범한 삶의 일을 대비한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατευόμενος
  english_pob_choice: serving as a soldier
  chosen_korean: 군 복무 중인 사람
  alternatives_korean:
  - 군인으로 복무하는 자
  - 종군하는 자
  lexicon: BDAG
  rationale: στρατεύομαι의 현재 분사는 「군 복무 상태에 있는」을 가리킨다. 「군 복무 중인 사람」이 자연스러운 한국어이다.
- source_word: ταῖς τοῦ βίου πραγματείαις
  english_pob_choice: the affairs of ordinary life
  chosen_korean: 일상의 일
  alternatives_korean:
  - 평상시의 사무
  - 민간의 일
  - 살림의 일들
  lexicon: BDAG
  rationale: τοῦ βίου는 「삶의·일상의」, πραγματεία는 「사무·일」. 군 복무와 대비되는 「일상의 일」이 자연스럽다.
- source_word: τῷ στρατολογήσαντι
  english_pob_choice: the one who enlisted him
  chosen_korean: 자기를 모집한 분
  alternatives_korean:
  - 그를 군에 부른 분
  - 자기를 징집한 분
  lexicon: BDAG
  rationale: στρατολογέω는 「군대에 모집함」을 뜻한다. 「모집한 분」이 자연스럽고 군 비유의 흐름을 살린다.
