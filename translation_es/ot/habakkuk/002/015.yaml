source:
  edition: WLC
  text: ה֚וֹי מַשְׁקֵ֣ה רֵעֵ֔/הוּ מְסַפֵּ֥חַ חֲמָתְ/ךָ֖ וְ/אַ֣ף שַׁכֵּ֑ר לְמַ֥עַן הַבִּ֖יט עַל מְעוֹרֵי/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/015.yaml
  text: Woe to him who makes his neighbor drink[a], pouring out your wrath and even making him drunk[c][b], in order to look on their nakedness.
  footnotes:
  - marker: a
    text: Or 'pouring out your venom'; the Hebrew term for 'wrath' can also carry the sense of heat or venom in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult; some understand this clause differently, such as 'adding your bottle' or smoothing the person shift to 'his wrath.'
    reason: alternative_reading
  - marker: c
    text: Or 'their private parts'; the Hebrew refers to exposed nakedness in a shameful sense.
    reason: lexical_alternative
