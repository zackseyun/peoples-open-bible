    text: Or 'You prepare a table before me.' The Hebrew verb can mean 'arrange' or 'prepare'; 'set' was chosen to preserve the meal-table imagery in natural English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you make fat/rich my head with oil,' an idiom of lavish refreshment or honor. 'You anoint my head with oil' expresses the likely sense in context.
    reason: lexical_alternative
