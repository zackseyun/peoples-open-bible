  to: 'Entonces el rey dijo: «¿Está la mano de Joab[a] contigo en todo esto?». Y la mujer respondió y dijo: «¡Por tu vida[b], mi señor el rey, nadie puede desviarse a la derecha ni a la izquierda[c] de nada de lo que ha dicho mi señor el rey, porque tu siervo Joab me ordenó esto, y él mismo puso en la boca de tu sierva todas estas palabras».'
