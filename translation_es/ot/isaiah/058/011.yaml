translation:
  language: es
  text: Yahvé te guiará siempre, y saciará tu alma en lugares áridos[a], y fortalecerá tus huesos[c]; y serás como un jardín bien regado, y como un manantial de aguas cuyas aguas no fallan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en regiones áridas» o «en parajes secos». El hebreo alude a condiciones abrasadas y resecas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cuyas aguas no mienten»; es decir, aguas que no fallan ni decepcionan.
    reason: lexical_alternative
  - marker: c
    text: O «refrescará tus huesos». El verbo hebreo es poco común aquí y puede expresar fortalecimiento o reanimación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָחֲךָ / יְהוָה
  english_pob_choice: will guide you / Yahweh
  chosen_spanish: Yahvé te guiará
  alternatives_spanish:
  - Yahvé te conducirá
  - Yahvé te llevará
  lexicon: HALOT
  rationale: נחה expresa aquí guiar o conducir; «guiar» conserva la idea de dirección continua y suena natural en español. Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - sin cesar
  lexicon: HALOT
  rationale: El adverbio comunica una acción ininterrumpida; «siempre» es idiomático en español y preserva la continuidad sin volverse forzado.
- source_word: וְהִשְׂבִּיעַ
  english_pob_choice: satisfy
  chosen_spanish: saciará
  alternatives_spanish:
  - satisfará
  - llenará
  lexicon: HALOT
  rationale: El verbo hiphil de שבע implica colmar plenamente una necesidad. «Saciará» mantiene la fuerza de plenitud y resulta natural con «alma».
- source_word: בְּצַחְצָחוֹת
  english_pob_choice: in parched places / in scorched places
  chosen_spanish: en lugares áridos
  alternatives_spanish:
  - en lugares secos
  - en regiones calcinadas
  - en parajes resecos
  lexicon: HALOT
  rationale: El término denota condiciones secas, abrasadas por el sol. «Lugares áridos» preserva la imagen ambiental amplia sin imponer una especificación más fuerte que el hebreo.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o persona. «Tu alma» conserva la profundidad antropológica y la correspondencia poética con la satisfacción divina.
- source_word: וְעַצְמֹתֶיךָ יַחֲלִיץ
  english_pob_choice: strengthen your bones / refresh your bones
  chosen_spanish: fortalecerá tus huesos
  alternatives_spanish:
  - reanimará tus huesos
  - refrescará tus huesos
  - dará vigor a tus huesos
  lexicon: HALOT
  rationale: חלץ en esta construcción es difícil, pero en contexto expresa vigorizar o renovar la fuerza corporal. «Fortalecerá tus huesos» comunica renovación física con claridad y sin perder la imagen concreta.
- source_word: כְּגַן רָוֶה
  english_pob_choice: like a well-watered garden
  chosen_spanish: como un jardín bien regado
  alternatives_spanish:
  - como un jardín regado en abundancia
  - como un jardín saturado de agua
  lexicon: HALOT
  rationale: רוה indica estar bien provisto de agua. «Bien regado» es una expresión natural en español y reproduce la imagen de fertilidad.
- source_word: וּכְמוֹצָא מַיִם
  english_pob_choice: like a spring of water
  chosen_spanish: como un manantial de aguas
  alternatives_spanish:
  - como una fuente de aguas
  - como un brote de agua
  lexicon: HALOT
  rationale: מוֹצָא puede ser salida, fuente u origen de agua. «Manantial» comunica con naturalidad el surgimiento continuo del agua en español.
- source_word: אֲשֶׁר לֹא יְכַזְּבוּ מֵימָיו
  english_pob_choice: whose waters do not fail
  chosen_spanish: cuyas aguas no fallan
  alternatives_spanish:
  - cuyas aguas no mienten
  - cuyas aguas no se agotan
  - cuyas aguas no engañan
  lexicon: HALOT
  rationale: כזב literalmente implica mentir o resultar falso; con aguas, la idea es un caudal que no decepciona ni se seca. «No fallan» conserva la fuerza idiomática del inglés POB y la metáfora de fiabilidad.
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrama, preservando el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - a ti
  rationale: La promesa es poética y habla de satisfacción interior y renovación integral; «alma» mantiene esa densidad sin reducir el término a un mero pronombre.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Imagen de las aguas que no fallan
  english_pob_reading: whose waters do not fail
  chosen_spanish_reading: cuyas aguas no fallan
  alternative_spanish_readings:
  - cuyas aguas no se agotan
  - cuyas aguas no mienten
  rationale: El hebreo usa un verbo de mentir o resultar falso; aplicado al agua, el sentido figurado es de una fuente confiable que no decepciona ni cesa. «No fallan» conserva esa tensión lexical entre falsedad y agotamiento.
  doctrine_reference: 'DOCTRINE.md: preserve lexical tension where documented'
translation_notes:
  revision_awareness: La redacción refleja la última revisión del audit trail, que prefirió una formulación más natural para בְּצַחְצָחוֹת en lugar de una traducción demasiado dura. Por eso se adoptó «lugares áridos» como equivalente amplio y publicable, manteniendo el resto de la estructura y las notas de ambigüedad lexical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la imagen concreta de «alma», «huesos» y «manantial/jardín» sin espiritualizarla en exceso.
  - «No fallan» refleja la metáfora hebrea de aguas confiables sin borrar la posibilidad alternativa de «no mienten».
  - Se evitó «SEÑOR» para no ocultar el Tetragrama.
  - La puntuación sigue el flujo poético del versículo con paralelismos claros en español.
