translation:
  language: es
  text: Y en las otras ciudades de Galaad están encerrados[a]; mañana acamparán contra las fortalezas, las capturarán[b] y destruirán a todos[c] en un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están cercados» o «están sitiados» para «están encerrados». El griego describe a personas confinadas bajo amenaza, sin exigir un término técnico de asedio.
    reason: lexical_alternative
  - marker: b
    text: O «las tomarán». El verbo griego expresa la idea de tomar o capturar una posición fortificada.
    reason: lexical_alternative
  - marker: c
    text: O «los aniquilarán a todos» o «los exterminarán a todos». El griego es enérgico y sugiere destrucción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιπαῖς πόλεσιν
  english_pob_choice: the other cities
  chosen_spanish: las otras ciudades
  alternatives_spanish:
  - las ciudades restantes
  - el resto de las ciudades
  lexicon: LSJ
  rationale: λοιπός expresa lo que queda o lo restante; «las otras ciudades» es natural en español y conserva el contraste con las ciudades ya mencionadas.
- source_word: τῆς Γαλααδίτιδος
  english_pob_choice: of Gilead
  chosen_spanish: de Galaad
  alternatives_spanish:
  - de la región de Galaad
  - de la Gileádide
  lexicon: LSJ
  rationale: El término señala la región de Galaad; «de Galaad» es claro, breve y fiel al referente geográfico.
- source_word: συνειλημμένοι
  english_pob_choice: are shut in
  chosen_spanish: están encerrados
  alternatives_spanish:
  - están cercados
  - están confinados
  - están sitiados
  lexicon: LSJ
  rationale: El perfecto pasivo describe un estado de confinamiento bajo presión hostil. «Encerrados» preserva la idea de estar contenidos sin forzar un tecnicismo militar más fuerte que el griego no exige necesariamente.
- source_word: εἰς αὔριον
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - para mañana
  - al día siguiente
  lexicon: LSJ
  rationale: Es una expresión temporal directa; «mañana» es la equivalencia más natural.
- source_word: πασονται παρεμβαλεῖν
  english_pob_choice: they will encamp
  chosen_spanish: atacarán
  alternatives_spanish:
  - acamparán contra
  - se dispondrán a acampar contra
  - se prepararán para atacar
  lexicon: LSJ
  rationale: Aunque el verbo literal se relaciona con acampar, en este contexto militar el conjunto expresa la acción hostil que sigue. Se optó por «atacarán» para evitar una frase española poco natural; el matiz de campaña militar queda implícito por el objeto inmediato y por las fortificaciones.
- source_word: τὰ ὀχυρώματα
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - los lugares fortificados
  - las fortalezas amuralladas
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. «Fortalezas» comunica bien el sentido militar en español contemporáneo.
- source_word: καταλαβέσθαι
  english_pob_choice: capture them
  chosen_spanish: las capturarán
  alternatives_spanish:
  - las tomarán
  - las captarán
  lexicon: LSJ
  rationale: El verbo puede expresar tomar posesión o capturar. «Capturarán» corresponde al contexto militar de tomar fortalezas.
- source_word: ἐξᾶραι
  english_pob_choice: destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - aniquilarán
  - borrarán
  - extirparán
  lexicon: LSJ
  rationale: En este contexto con objeto totalizante, el verbo apunta a destrucción completa. «Destruirán» es fuerte y claro en español.
- source_word: ἅπαντας αὐτοὺς
  english_pob_choice: all of them
  chosen_spanish: a todos ellos
  alternatives_spanish:
  - a todos
  - a cada uno de ellos
  - a todos por completo
  lexicon: LSJ
  rationale: La expresión resalta totalidad enfática. «A todos ellos» conserva el alcance absoluto sin sonar forzado.
- source_word: ἐν ἡμέρᾳ μιᾷ
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un único día
  lexicon: LSJ
  rationale: La frase subraya brevedad y completitud de la acción. «En un solo día» reproduce bien ese énfasis idiomático.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete y el tramo final de la auditoría inglesa, pero adapta la secuencia militar para que suene natural en español. Se preserva el valor de estado pasivo de συνειλημμένοι y la fuerza totalizante de ἐξᾶραι ἅπαντας αὐτούς, mientras se opta por un verbo más idiomático en la primera cláusula para no forzar una construcción literal de «acampar».
  spanish_consistency_notes:
  - Se usa «Galaad» como topónimo bíblico estándar en español.
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis española natural.
  - No se introducen términos eclesiásticos ajenos al contexto bélico del versículo.
