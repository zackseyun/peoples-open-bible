  lexicon: BDAG
  rationale: SBLGNT 본문은 여성형 πιστή. 사본 변형은 각주.
- source_word: ἐπαρκείτω αὐταῖς
  english_pob_choice: let her provide for them
  chosen_korean: 그가 그들을 돌봐야 합니다
  alternatives_korean:
