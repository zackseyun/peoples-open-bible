    text: 'O: «No me deleito en ti».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo, «como es bueno en sus ojos», un modismo que significa «como le parece bueno» o «como le parezca bien».
    reason: lexical_alternative
  revision_rationale: Se ajusta solo la cláusula final para expresar el modismo hebreo con español natural y publicable en el texto principal, dejando la formulación más literal en la nota. Se conserva el resto del borrador porque refleja adecuadamente el sentido del original y las decisiones del POB.
