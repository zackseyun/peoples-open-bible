  text: טְרֵפָה֙ לֹא הֵבֵ֣אתִי אֵלֶ֔י/ךָ אָנֹכִ֣י אֲחַטֶּ֔/נָּה מִ/יָּדִ֖/י תְּבַקְשֶׁ֑/נָּה גְּנֻֽבְתִ֣י י֔וֹם וּ/גְנֻֽבְתִ֖י לָֽיְלָה־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/039.yaml
  text: I did not bring to you an animal torn by beasts[a]; I myself bore the loss of it. You required it from my hand[b], whether stolen by day or stolen by night.
  footnotes:
