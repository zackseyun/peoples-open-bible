  - marker: b
    text: O 'las esposas extranjeras'. El contexto más amplio trata de matrimonios, aunque el hebreo aquí dice 'las mujeres extranjeras'.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] en la expresión que realmente traduce תְּנוּ תוֹדָה, se añadió la nota contextual [b] que el rastro inglés conserva para 'mujeres extranjeras', y se pulió levemente el arranque a 'Ahora, pues' para mayor naturalidad bíblica en español.
