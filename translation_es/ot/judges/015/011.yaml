revisions:
- from: 'Entonces bajaron tres mil hombres de Judá a la hendidura de la peña de Etam[a] y dijeron a Sansón: “¿No sabías que los filisteos dominan sobre nosotros? ¿Qué es esto que nos has hecho?” Él les respondió: “Como ellos me hicieron a mí, así les he hecho yo a ellos”.'
  to: 'Entonces bajaron tres mil hombres de Judá a la hendidura de la peña de Etam[a] y dijeron a Sansón: “¿No sabes que los filisteos dominan sobre nosotros? ¿Qué es esto que nos has hecho?”. Y él les dijo: “Como ellos me hicieron a mí, así les he hecho”.'
  rationale: Se ajusta la pregunta retórica al presente ('¿No sabes...?') para reflejar mejor la fuerza discursiva del hebreo y la decisión auditada en inglés. También se aligera la frase final para un español más natural, manteniendo intacta la reciprocidad del original. Se conserva la nota léxica sobre 'fisura'.
