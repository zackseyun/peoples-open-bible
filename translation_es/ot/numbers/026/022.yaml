translation:
  language: es
  text: 'Estas fueron las familias de Judá, según su número[a]: setenta y seis mil quinientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según los contados de ellas»; la expresión hebrea לִפְקֻדֵיהֶם se refiere a los que fueron enrolados o contados en el censo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estas fueron
  alternatives_spanish:
  - Estas son
  lexicon: HALOT
  rationale: El demostrativo plural introduce un resumen narrativo de censo; el pretérito en español conserva mejor el valor de recuento concluido.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En español, 'familias' comunica de manera natural las subdivisiones de un linaje tribal; 'clanes' es posible, pero menos habitual y más etnográfico.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio tribal estándar en español bíblico.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered of them
  chosen_spanish: conforme a los registrados de ellas
  alternatives_spanish:
  - según los contados de ellas
  - conforme a su registro
  lexicon: HALOT
  rationale: La fórmula censal procede de פקד en sentido de 'contar / registrar'. 'Registrados' preserva la idea de personas inscritas o contabilizadas sin volver la frase demasiado mecánica. Se usa el referente femenino plural de 'familias' en la concordancia española.
- source_word: שִׁשָּׁה וְשִׁבְעִים אֶלֶף
  english_pob_choice: seventy-six thousand
  chosen_spanish: setenta y seis mil
  alternatives_spanish:
  - seis y setenta mil
  lexicon: HALOT
  rationale: Se adopta el orden idiomático del español para expresar con precisión el total numérico.
- source_word: וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientos
  alternatives_spanish:
  - cinco cientos
  lexicon: HALOT
  rationale: Forma natural y exacta en español para la cifra final.
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste del audit trail inglés que prefería una fórmula más formal para לִפְקֻדֵיהֶם ('of them') en contexto censal. En español se optó por una equivalencia natural ('conforme a los registrados de ellas') que conserva el matiz administrativo de enrolamiento/contabilización sin perder legibilidad.
  spanish_consistency_notes:
  - Se mantiene el nombre propio tribal como 'Judá', no 'Juda'.
  - La cifra total se presenta en la forma estándar española, preservando exactamente el valor del hebreo.
  - El pie de nota conserva la ambigüedad censal documentada en el inglés POB.
