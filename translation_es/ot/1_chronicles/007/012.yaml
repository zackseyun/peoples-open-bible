  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: la versión inglesa ya opta por una lectura genealógica fluida (''were the sons of'' / ''was the son of''), mientras mantiene la nota sobre la dificultad de ''sons of Aher'' y la alternativa ''another''. No se registran revisiones aplicadas en el ciclo inglés más reciente.'
