translation:
  language: es
  text: Entonces hubo una hambruna en la tierra, y Abram bajó a Egipto para residir allí temporalmente[a], porque la hambruna era severa en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para residir allí como forastero»; el hebreo sugiere una estancia temporal, no un asentamiento permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Entonces hubo
  alternatives_spanish:
  - Y hubo
  - Había
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce un nuevo desarrollo narrativo. En español, 'Entonces hubo' conserva ese avance del relato de manera natural sin perder el valor eventivo.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez de alimentos
  lexicon: HALOT
  rationale: El hebreo puede designar una hambruna o gran escasez; el español 'hambre' aquí conserva mejor la fuerza semántica amplia y permite dejar visible la tensión de intensificación con 'pesada'. En contexto narrativo, comunica una crisis de alimentos sin forzar un tecnicismo poco natural.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: אֶרֶץ aquí es la tierra/territorio del relato, no la tierra como planeta. 'La tierra' preserva la resonancia bíblica y la repetición del hebreo.
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue
  lexicon: HALOT
  rationale: ירד conserva el movimiento 'hacia abajo', especialmente en la ida a Egipto. 'Bajó' reproduce esa imagen de forma natural en español.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  lexicon: HALOT
  rationale: El ending direccional se expresa naturalmente con 'a Egipto' en español.
- source_word: לָגוּר
  english_pob_choice: to sojourn there
  chosen_spanish: para habitar allí
  alternatives_spanish:
  - para morar allí
  - para residir allí temporalmente
  lexicon: HALOT
  rationale: גור indica residencia temporal como forastero. 'Habitar allí' es más claro y digno en español moderno que 'sojornar', y evita perder el matiz de permanencia no definitiva. La nota queda implícita en el verbo sin sobrecargar el texto principal.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo simple; 'allí' es natural y mantiene la referencia espacial.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la bajada de Abram. 'Porque' es la equivalencia directa y clara en español.
- source_word: כָבֵד
  english_pob_choice: severe
  chosen_spanish: pesada
  alternatives_spanish:
  - grave
  - severa
  - muy intensa
  lexicon: HALOT
  rationale: El hebreo literalmente es 'pesado'. Mantener 'pesada' conserva la metáfora original y la tensión lexical que el inglés POB traduce con 'severe' por equivalencia idiomática.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la escasez
  lexicon: HALOT
  rationale: La referencia vuelve al mismo sustantivo del inicio, y en español se mantiene la cohesión con 'el hambre' para no perder la repetición anafórica.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la región
  - en el país
  lexicon: HALOT
  rationale: Se repite para reproducir la insistencia del hebreo y conservar la estructura narrativa del verso.
translation_notes:
  revision_awareness: El inglés POB pasó de 'stay there for a while' a 'sojourn there' para ajustar לָגוּר con mayor precisión formal. La versión española sigue esa precisión semántica, pero elige 'habitar allí' por ser más idiomático y respetar el matiz de residencia temporal sin un tecnicismo raro. También se preservó la repetición final de 'en la tierra' y la metáfora de 'pesada' para כָבֵד.
  spanish_consistency_notes:
  - Se mantiene 'Abram' conforme al nombre en el texto fuente.
  - '''Yahvé'' no aparece en este versículo.'
  - Se conserva la imagen espacial de descenso hacia Egipto con 'bajó'.
  - Se evita 'SEÑOR' o traducciones litúrgicas no presentes en el verso.
