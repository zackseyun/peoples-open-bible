translation:
  language: es
  text: Se burla de los reyes, y los gobernantes son motivo de risa para él. Se ríe de toda fortaleza; amontona tierra[a] y la captura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «amontona tierra»; la imagen es la de levantar un terraplén o rampa de asedio para tomar una plaza fortificada.
    reason: cultural_note
lexical_decisions:
- source_word: יִתְקַלָּס
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - se mofa de
  - escarnece a
  lexicon: HALOT
  rationale: El hitpael expresa burla despectiva. «Se burla de» comunica bien el desprecio y suena natural en español sin perder la fuerza del verbo.
- source_word: רֹזְנִים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - dignatarios
  lexicon: HALOT
  rationale: El término apunta a altos oficiales o potentados. «Gobernantes» mantiene el sentido político general y evita un título demasiado monárquico o eclesiástico en español.
- source_word: מִשְׂחָק לוֹ
  english_pob_choice: are a laughingstock to him
  chosen_spanish: son motivo de risa para él
  alternatives_spanish:
  - son objeto de burla para él
  - son un hazmerreír para él
  lexicon: HALOT
  rationale: La expresión indica objeto de burla o risa despectiva. «Motivo de risa» conserva la idea sin introducir una equivalencia idiomática demasiado coloquial.
- source_word: מִבְצָר
  english_pob_choice: fortress
  chosen_spanish: fortaleza
  alternatives_spanish:
  - fortín
  - ciudad fortificada
  lexicon: HALOT
  rationale: Denota un lugar fortificado. «Fortaleza» es claro y natural en español, y sirve bien en singular colectivo tras «toda».
- source_word: יִשְׂחָק
  english_pob_choice: laughs at
  chosen_spanish: se ríe de
  alternatives_spanish:
  - se burla de
  - se mofa de
  lexicon: HALOT
  rationale: El qal expresa risa despectiva. «Se ríe de» conserva la imagen verbal del hebreo y no intensifica indebidamente el matiz.
- source_word: וַיִּצְבֹּר עָפָר
  english_pob_choice: he heaps up earth
  chosen_spanish: amontona tierra
  alternatives_spanish:
  - acumula polvo
  - levanta tierra
  lexicon: HALOT
  rationale: La imagen es la de acumular tierra para un asedio. «Amontona tierra» retiene la literalidad suficiente y resulta más natural que una traducción demasiado técnica en el texto principal.
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captures it
  chosen_spanish: la captura
  alternatives_spanish:
  - la toma
  - la apresa
  lexicon: HALOT
  rationale: El verbo significa capturar o tomar por fuerza, con sufijo femenino referido a la fortaleza/ciudad. «La captura» refleja bien el cierre militar del verso.
translation_notes:
  revision_awareness: 'Texto revisado a la luz del audit trail en inglés: se mantuvo el paralelismo entre la burla a reyes/gobernantes y la imagen militar del asedio, evitando una paráfrasis que explicitara «rampa de asedio» en el cuerpo del verso.'
  spanish_consistency_notes:
  - Se conservó un registro moderno y reverente, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - «Tierra» se usó para mantener la imagen concreta de עָפָר, con la nota explicativa para el trasfondo bélico.
  - No se introdujeron títulos tradicionales como «príncipes» porque «gobernantes» comunica mejor el rango sin sobrecarga cultural.
