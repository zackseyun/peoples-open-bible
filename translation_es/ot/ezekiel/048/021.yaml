translation:
  language: es
  text: Y lo que quede será para el príncipe, a ambos lados de la ofrenda santa y de la propiedad de la ciudad, junto a los veinticinco mil[a] de la ofrenda hasta el límite oriental, y al oeste junto a los veinticinco mil hasta el límite occidental, paralelo a las porciones para el príncipe. Y la ofrenda santa y el santuario del templo estarán en medio de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «veinticinco mil»; la unidad de medida se entiende por el contexto de las medidas de tierra en Ezequiel.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: And what remains
  chosen_spanish: Y lo que quede
  alternatives_spanish:
  - Y el resto
  - Y lo que permanece
  lexicon: HALOT
  rationale: El participio sustantivado expresa el remanente del reparto de tierras; «lo que quede» suena natural en español y conserva la idea de residuo sin añadir interpretación.
- source_word: לַנָּשִׂיא
  english_pob_choice: shall belong to the prince
  chosen_spanish: será para el príncipe
  alternatives_spanish:
  - pertenecerá al príncipe
  - será del príncipe
  lexicon: HALOT
  rationale: נָשִׂיא en Ezequiel funciona como título del dirigente. «Príncipe» conserva la terminología ya establecida en el libro; el dativo se vuelve idiomáticamente con «será para».
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on both sides
  chosen_spanish: a ambos lados
  alternatives_spanish:
  - de este lado y de aquel lado
  - a un lado y al otro
  lexicon: HALOT
  rationale: La expresión indica ubicación a ambos lados del lote sagrado; «a ambos lados» reproduce bien la relación espacial y es natural en español.
- source_word: לִתְרוּמַת הַקֹּדֶשׁ
  english_pob_choice: of the holy contribution
  chosen_spanish: de la ofrenda santa
  alternatives_spanish:
  - de la contribución santa
  - del aporte santo
  lexicon: HALOT
  rationale: תְּרוּמָה en este contexto es el terreno apartado como ofrenda. «Ofrenda santa» mantiene el matiz cultual de la palabra sin perder legibilidad.
- source_word: וְלַאֲחֻזַּת הָעִיר
  english_pob_choice: and of the city's property
  chosen_spanish: y de la propiedad de la ciudad
  alternatives_spanish:
  - y de la posesión de la ciudad
  - y del dominio de la ciudad
  lexicon: HALOT
  rationale: אֲחֻזָּה denota posesión/propiedad hereditaria. «Propiedad de la ciudad» comunica bien el sentido municipal del tramo de tierra.
- source_word: אֶל פְּנֵי חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף תְּרוּמָה
  english_pob_choice: alongside the twenty-five thousand of the contribution
  chosen_spanish: junto a los veinticinco mil de la ofrenda
  alternatives_spanish:
  - al lado de los veinticinco mil de la ofrenda
  - frente a los veinticinco mil de la ofrenda
  lexicon: HALOT
  rationale: La frase espacial marca adyacencia; «junto a» conserva el paralelo geométrico. No se añade «codos» porque el hebreo aquí no lo expresa de forma explícita, aunque el contexto lo presuponga.
- source_word: עַד גְּבוּל קָדִימָה
  english_pob_choice: as far as the eastern border
  chosen_spanish: hasta el límite oriental
  alternatives_spanish:
  - hasta la frontera oriental
  - hasta el borde oriental
  lexicon: HALOT
  rationale: קָדִימָה señala dirección al oriente. «Límite oriental» es claro y adecuado para una descripción de repartos territoriales.
- source_word: וְיָמָּה
  english_pob_choice: and westward
  chosen_spanish: y al oeste
  alternatives_spanish:
  - y hacia el oeste
  - y occidentalmente
  lexicon: HALOT
  rationale: Se trata de la dirección contraria; «al oeste» es más natural que una calca adverbial.
- source_word: עַל פְּנֵי חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: alongside the twenty-five thousand
  chosen_spanish: junto a los veinticinco mil
  alternatives_spanish:
  - en paralelo con los veinticinco mil
  - al lado de los veinticinco mil
  lexicon: HALOT
  rationale: Repite la relación espacial del primer miembro de la oración; se conserva el paralelismo con «junto a».
- source_word: עַל גְּבוּל יָמָּה
  english_pob_choice: toward the western border
  chosen_spanish: hasta el límite occidental
  alternatives_spanish:
  - hacia el límite occidental
  - hasta la frontera occidental
  lexicon: HALOT
  rationale: La expresión fija la extensión de ese lado. «Hasta el límite occidental» mantiene la precisión topográfica.
- source_word: לְעֻמַּת חֲלָקִים
  english_pob_choice: parallel to the portions
  chosen_spanish: en correspondencia con las porciones
  alternatives_spanish:
  - en paralelo con las porciones
  - frente a las porciones
  lexicon: HALOT
  rationale: לְעֻמַּת expresa alineación o correspondencia. «En correspondencia con» conserva el vínculo geométrico sin sonar demasiado técnico.
- source_word: וְהָיְתָה תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: And the holy contribution
  chosen_spanish: Y la ofrenda santa
  alternatives_spanish:
  - Y la contribución santa
  - Y el terreno santo
  lexicon: HALOT
  rationale: La cláusula declara la situación del lote sagrado; se repite «ofrenda santa» para mantener coherencia terminológica con תְּרוּמָה.
- source_word: וּמִקְדַּשׁ הַבַּיִת
  english_pob_choice: and the sanctuary of the temple
  chosen_spanish: y el santuario de la casa
  alternatives_spanish:
  - y el santuario del templo
  - y el santuario de la casa-templo
  lexicon: HALOT
  rationale: בַּיִת en Ezequiel 40–48 suele referirse al complejo del templo como «casa». «Casa» mantiene el término de la visión, aunque «templo» sería una aclaración posible.
- source_word: בְּתוֹכָהּ
  english_pob_choice: shall be in its midst
  chosen_spanish: estarán en medio de ella
  alternatives_spanish:
  - estará en medio de ella
  - estarán dentro de ella
  lexicon: HALOT
  rationale: El sufijo femenino remite al tramo/porción santa. «En medio de ella» preserva la localización central y permite el plural coordinado del sujeto en español.
theological_decisions:
- issue: איך traducir נָשִׂיא en el contexto escatológico de Ezequiel
  english_pob_reading: prince
  chosen_spanish_reading: príncipe
  alternative_spanish_readings:
  - dirigente
  - gobernante
  rationale: El libro de Ezequiel emplea נָשִׂיא como título técnico del líder del reparto territorial y del orden del templo. «Príncipe» mantiene la tradición terminológica interna del libro sin diluir el cargo.
  doctrine_reference: Ezequiel 44–48; uso consistente del נָשִׂיא en la visión del templo
- issue: Cómo verter תְּרוּמָה en la sección de reparto territorial
  english_pob_reading: holy contribution
  chosen_spanish_reading: ofrenda santa
  alternative_spanish_readings:
  - contribución santa
  - porción santa
  rationale: Aquí תְּרוּמָה no es una ofrenda ritual individual sino un territorio apartado para Yahvé. «Ofrenda santa» retiene la base cultual y evita convertirlo en mero sinónimo de ‘porción’ sin el matiz de consagración.
  doctrine_reference: Ezequiel 45:1-6; 48:8-20
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y el control de revisión más reciente, que no introdujo cambios textuales. La redacción española conserva la estructura paralela del hebreo, evita añadir la unidad de medida no explícita en este versículo y mantiene la terminología consistente de Ezequiel sobre el príncipe y la ofrenda santa.
  spanish_consistency_notes:
  - Se mantuvo «príncipe» para נָשִׂיא, coherente con el uso técnico de Ezequiel.
  - Se mantuvo «ofrenda santa» para תְּרוּמָה para conservar la repetición terminológica del pasaje.
  - Se eligió «casa» para הַבַּיִת por ser un término característico de la visión del templo en Ezequiel, sin perder claridad.
  - La nota al pie marca la medida implícita, siguiendo el criterio auditado del texto inglés.
