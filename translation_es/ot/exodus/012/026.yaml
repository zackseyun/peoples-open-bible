review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura temporal («Y cuando») y el sentido básico de la pregunta de los hijos. Sin embargo, «para ustedes» se aleja del dativo más directo de לָכֶם, y la nota al pie no preserva realmente una alternativa, sino que repite el mismo texto. Además, dado que el inglés auditado volvió a la formulación más literal «What is this service to you?», en español conviene una solución igualmente literal y natural, mejor como «para ustedes» -> «para ustedes» no es ideal; «qué es... para ustedes» suena aceptable pero menos cercano al valor relacional directo que «qué significa...», aunque este último sería más interpretativo que el texto inglés final. La mejor reparación mínima es mantener la literalidad con una nota alternativa verdaderamente formal/literal.
  spanish_quality_summary: El español es claro y legible, pero la nota es defectuosa porque no ofrece una variante real. También puede mejorarse la fluidez y precisión relacional del complemento final. «Sus hijos les digan» funciona bien en español neutro eclesial.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Servicio» refleja bien עֲבֹדָה. «Hijos» es aceptable para בְּנֵיכֶם, aunque el hebreo sea específicamente masculino plural; no exige cambio aquí. No hay términos teológicos sensibles adicionales.
  issues:
  - severity: medium
    issue: La nota al pie repite exactamente el mismo texto principal
    rationale: La nota marcada como alternativa léxica debe preservar una alternativa real; repetir «¿Qué es este servicio para ustedes?» no cumple la función documental requerida.
  - severity: medium
    issue: «para ustedes» no refleja tan bien el valor directo de לָכֶם como una alternativa más literal/formal
    rationale: Aunque es comprensible, «para ustedes» puede sonar más final que dativo relacional. Conviene conservar el texto principal si se desea naturalidad, pero la nota debe registrar una opción más formal como «a ustedes».
  revised_spanish_text: 'Y cuando sus hijos les digan[a]: «¿Qué es este servicio para ustedes?»'
  revised_footnotes:
  - marker: a
    text: 'O más formalmente: «¿Qué es este servicio a ustedes?»'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque transmite fielmente el sentido del hebreo y del inglés POB auditado con buena legibilidad en español. Se corrige la nota para que documente una alternativa real y más formal/literal para לָכֶם, en vez de repetir el mismo enunciado.
