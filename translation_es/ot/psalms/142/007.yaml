    reason: lexical_alternative
  - marker: b
    text: O «he sido rebajado muy bajo» o «estoy muy abatido». El hebreo expresa una reducción o debilidad severa.
    reason: lexical_alternative
  - marker: c
    text: O «de quienes me persiguen».
    reason: lexical_alternative
