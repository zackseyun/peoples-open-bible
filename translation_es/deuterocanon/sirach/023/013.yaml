translation:
  language: es
  text: No acostumbres tu boca a la ignorancia grosera[a], porque en ella hay una palabra de pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ignorancia soez»; el adjetivo puede subrayar un habla áspera, indecente o malhablada.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «porque en ella hay una palabra de pecado»; también puede significar «habla pecaminosa» o «habla que expresa pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαιδευσίαν
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - falta de disciplina
  - rudeza
  - incultura
  lexicon: LSJ
  rationale: El sustantivo puede denotar falta de educación o formación y, por extensión, conducta inculta o malhablada. En español, «ignorancia» conserva el núcleo del término base y permite que el adjetivo/expresión adyacente cargue con la idea de grosería o incorrección verbal que el contexto exige.
- source_word: ἀσυρῆ
  english_pob_choice: coarse
  chosen_spanish: grosería
  alternatives_spanish:
  - obscenidad
  - maleducación
  - falta de pudor
  - lenguaje soez
  lexicon: LSJ
  rationale: El adjetivo es raro y está vinculado al habla impropia. En vez de forzar un adjetivo español poco natural, se usa el sustantivo «grosería» como equivalente funcional de la expresión grosera/áspera, manteniendo el tono moral sin especificar más de lo que el griego requiere.
- source_word: μὴ συνεθίσῃς
  english_pob_choice: do not accustom
  chosen_spanish: No acostumbres
  alternatives_spanish:
  - No te habitúes
  - No te hagas costumbre
  - No te acostumbres
  lexicon: LSJ
  rationale: El verbo expresa hacer que algo se vuelva habitual. «No acostumbres» conserva bien la idea de formar un hábito deliberado en el habla, con tono admonitorio directo.
- source_word: τὸ στόμα σου
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu habla
  - tu lengua
  - tu boca
  lexicon: LSJ
  rationale: Se mantiene la metáfora corporal del griego. En español, «boca» resulta natural y fiel en un contexto de habla, sin sustituirla por una abstracción que diluya la imagen original.
- source_word: ἔστιν γὰρ ἐν αὐτῇ
  english_pob_choice: for in it there is
  chosen_spanish: porque en ella hay
  alternatives_spanish:
  - pues en ella hay
  - porque dentro de ella está
  - porque en ello hay
  lexicon: LSJ
  rationale: La frase introduce la razón del mandato. «En ella» retoma naturalmente la expresión previa y mantiene la referencia al ámbito del habla grosera/ignorante sin añadir interpretación innecesaria.
- source_word: λόγος ἁμαρτίας
  english_pob_choice: a word of sin
  chosen_spanish: una palabra de pecado
  alternatives_spanish:
  - habla pecaminosa
  - una palabra pecaminosa
  - expresión de pecado
  lexicon: LSJ
  rationale: 'La construcción es compacta y ambigua: puede significar habla caracterizada por el pecado o habla que lo expresa. «Una palabra de pecado» preserva esa densidad y la formulación breve del original mejor que una paráfrasis más explicativa.'
theological_decisions:
- issue: Carácter ético del lenguaje impropio
  english_pob_reading: The verse warns against habituating oneself to coarse, uncultivated speech because such speech contains or gives rise to sinful expression.
  chosen_spanish_reading: El versículo advierte contra habituar la boca a la grosería de la ignorancia, porque ese tipo de habla lleva consigo pecado o lo expresa.
  alternative_spanish_readings:
  - El énfasis podría ponerse más en la incultura social que en la ignorancia intelectual.
  - La última cláusula también podría entenderse como 'habla pecaminosa' en vez de 'palabra de pecado'.
  rationale: 'No hay un término doctrinalmente disputado, pero sí una tensión ética entre ignorancia, grosería y pecado en el habla. La traducción conserva esa relación sin resolverla de manera excesiva: el problema no es solo falta de formación, sino lenguaje moralmente degradado.'
  doctrine_reference: 'DOCTRINE.md: conservar la tensión lexical y moral cuando el original la presenta; no aplanar la ambigüedad con una paráfrasis interpretativa.'
translation_notes:
  revision_awareness: Tomé como base la redacción final del audit trail inglés («coarse ignorance») y el sentido compacto de «λόγος ἁμαρτίας», pero adapté la primera mitad al español de forma más natural mediante un sintagma nominal («la grosería de la ignorancia») para evitar un calco forzado. Conservo la ambigüedad del cierre con una nota literal.
  spanish_consistency_notes:
  - Se mantiene «pecado» para ἁμαρτία y no se sustituye por una paráfrasis moralizante.
  - Se usa «boca» para τὸ στόμα como metáfora corporal conservada en el original.
  - La nota a no repite el contenido de la nota b; una trata la alternativa léxica de ἀσυρῆ y la otra la ambigüedad de λόγος ἁμαρτίας.
