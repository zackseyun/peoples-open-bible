revisions:
- from: 'Y Ahab dijo[a]: «¿Por quién?» Y él dijo: «Así dice Yahvé: Por los jóvenes de los oficiales de las provincias». Entonces dijo: «¿Quién comenzará la batalla?» Y él dijo: «Tú».'
  to: 'Y Ahab dijo[a]: «¿Por quién?» Y él dijo: «Así dice Yahvé: Por los jóvenes de los funcionarios provinciales». Entonces dijo: «¿Quién comenzará la batalla?» Y él dijo: «Tú».'
  rationale: 'Se conserva plenamente el sentido del hebreo y del POB inglés, pero se mejora el español en dos puntos menores: «funcionarios provinciales» expresa mejor el valor administrativo de שׂרי המדינות, y la nota reemplaza el poco idiomático «retenedores» por términos naturales en español («auxiliares», «ayudantes»). No hay cambio doctrinal ni de sentido principal.'
