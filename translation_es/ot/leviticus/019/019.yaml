translation:
  language: es
  text: Ustedes guardarán mis estatutos. No aparearán su ganado con dos clases distintas; no sembrarán su campo con dos clases de semilla; y una prenda de material mezclado, shaatnez[a], no se pondrá sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo shaatnez es un término técnico para una tela mezclada prohibida; tradicionalmente se entiende como una mezcla de lana y lino. Compárese Deuteronomio 22:11.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֻקָּה designa mandatos fijados o prescritos. «Estatutos» conserva el valor jurídico y convencional, y corresponde bien al registro formal del texto.
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: HALOT
  rationale: שׁמר en contexto de pacto y ley expresa guardar, observar o custodiar. «Guardarán» mantiene el sentido de cumplimiento vigilante sin reducirlo a mera observancia externa.
- source_word: בְּהֶמְתְּךָ
  english_pob_choice: your livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su ganado doméstico
  lexicon: HALOT
  rationale: El sustantivo aquí se refiere al ganado o animales domésticos en contexto agrícola. «Ganado» es natural en español y conserva el marco pastoral, aunque es algo más concreto que «animales».
- source_word: תַרְבִּיעַ
  english_pob_choice: breed
  chosen_spanish: aparearán
  alternatives_spanish:
  - criarán
  - cruzarán
  lexicon: HALOT
  rationale: El verbo en hifil indica hacer aparear o reproducir animales. «Aparearán» comunica con precisión la acción prohibida sin introducir la connotación moderna y técnica de «cruzar».
- source_word: כִּלְאַיִם
  english_pob_choice: with two different kinds
  chosen_spanish: con dos clases distintas
  alternatives_spanish:
  - con especies mezcladas
  - con clases mezcladas
  lexicon: HALOT
  rationale: כִּלְאַיִם señala mezcla de especies o clases heterogéneas. En español, «dos clases distintas» expresa la idea de mezcla prohibida de forma clara y sin sobreespecificar más de lo que el hebreo exige en esta cláusula.
- source_word: שָׂדְךָ
  english_pob_choice: your field
  chosen_spanish: su campo
  alternatives_spanish:
  - su terreno
  - su parcela
  lexicon: HALOT
  rationale: שָׂדֶה es el campo cultivado. «Campo» es la correspondencia más directa y natural en español agrícola.
- source_word: תִזְרַע
  english_pob_choice: sow
  chosen_spanish: sembrarán
  alternatives_spanish:
  - esparcirán
  - sazonarán
  lexicon: HALOT
  rationale: זרע aquí es sembrar semilla. «Sembrarán» es el equivalente español preciso y natural para el contexto agrícola.
- source_word: כִּלְאָיִם
  english_pob_choice: with two kinds of seed
  chosen_spanish: con dos clases de semilla
  alternatives_spanish:
  - con semilla mezclada
  - con dos tipos de semilla
  lexicon: HALOT
  rationale: La repetición de כִּלְאַיִם exige mantener la idea de mezcla prohibida. «Dos clases de semilla» preserva la claridad del sentido agrícola sin imponer una terminología técnica innecesaria.
- source_word: בֶגֶד
  english_pob_choice: a garment
  chosen_spanish: una prenda
  alternatives_spanish:
  - una vestidura
  - una pieza de ropa
  lexicon: HALOT
  rationale: בֶגֶד puede referirse a una prenda o vestidura. «Prenda» suena natural en español moderno y mantiene el singular legal del texto.
- source_word: כִּלְאַיִם
  english_pob_choice: mixed material
  chosen_spanish: material mezclado
  alternatives_spanish:
  - tejido mezclado
  - mezcla de materiales
  lexicon: HALOT
  rationale: En la cláusula textil, כִּלְאַיִם apunta a un compuesto de materiales/fibras. «Material mezclado» conserva la vaguedad del hebreo y evita fijar en el texto principal una identificación que el pasaje no explicita aquí.
- source_word: שַׁעַטְנֵז
  english_pob_choice: shaatnez
  chosen_spanish: shaatnez
  alternatives_spanish:
  - tejido shaatnez
  - mezcla prohibida
  lexicon: HALOT
  rationale: שַׁעַטְנֵז es un tecnicismo raro y culturalmente marcado. Mantener la transliteración preserva el término fuente; el lector recibe la explicación en nota, como en el audit trail inglés.
- source_word: יַעֲלֶה עָלֶיךָ
  english_pob_choice: shall not come upon you
  chosen_spanish: no caerá sobre ustedes
  alternatives_spanish:
  - no se pondrá sobre ustedes
  - no les será puesto
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «subir sobre». «No caerá sobre ustedes» suena menos forzado que un calco y mantiene la idea de que esa prenda no debe llegar a vestirlos. Se conserva el tono legal-prohibitivo del original.
translation_notes:
  revision_awareness: La base inglesa fue revisada para reemplazar dos puntos por un punto después de la primera cláusula. En español se adopta una segmentación igualmente directa con oraciones coordinadas separadas por punto y coma, manteniendo el tono legal y la progresión de prohibiciones sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada solo cuando aparezca el nombre divino; aquí el verso usa posesivo de primera persona, así que «mis estatutos» sigue fielmente el hebreo.
  - Se eligió «shaatnez» en transliteración, en línea con la estrategia del POB inglés para preservar el tecnicismo sin forzar una identificación simplificada en el texto principal.
  - Se conservó el paralelismo de las tres prohibiciones agrícolas y textiles con puntuación sobria y moderna.
  - «Ustedes» traduce la segunda persona plural del hebreo y evita un singular incoherente en español.
