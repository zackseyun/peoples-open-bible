review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: causalidad de כִּי, temporalidad de עַד עָתָּה, el destino doble «reposo/herencia», el nombre divino Yahvé, y la fuerza de נֹתֵן como don divino vigente. Sin embargo, la concordancia pronominal no preserva fielmente el cambio del hebreo entre segunda persona plural («han llegado») y segunda persona singular en el posesivo («tu Dios») y destinatario («te da»).'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. No obstante, «Yahvé su Dios les da» suena menos ajustado al texto fuente por mezclar plural y tercera persona posesiva, cuando el hebreo dice literalmente «Yahvé tu Dios te da». Además, la nota al pie está bien formulada pero actualmente está anclada en «heredad» en vez de en «lugar de reposo», que es donde corresponde la alternativa léxica de מְנוּחָה.
  glossary_alignment: 'Alineación mayormente buena con los términos del proyecto: יְהוָה -> «Yahvé» correctamente; הַמְּנוּחָה -> «lugar de reposo» conforme a la decisión auditada; הַנַּחֲלָה -> «heredad» es aceptable en registro bíblico, aunque «herencia» también sería posible. El único desajuste importante no es terminológico sino gramatical: debe conservarse «tu Dios te da».'
  issues:
  - severity: high
    issue: Desajuste de persona gramatical en «Yahvé su Dios les da»
    rationale: El hebreo tiene sujeto de segunda persona plural en «han llegado», pero luego usa singular colectivo en «אֱלֹהֶיךָ ... לָךְ» = «tu Dios ... te da». El español del borrador cambia a tercera persona posesiva y plural de objeto, alterando una particularidad real del texto fuente.
  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica la alternativa de מְנוּחָה («reposo» / «lugar de reposo»), por lo que el marcador debe ir sobre «lugar de reposo», no sobre «heredad».
  revised_spanish_text: Porque aún no han llegado al lugar de reposo[a] y a la heredad que Yahvé tu Dios te da.
  revised_footnotes:
  - marker: a
    text: O «el reposo». El hebreo מְנוּחָה puede denotar tanto «reposo» en sentido abstracto como un «lugar de reposo»; aquí el contexto de la tierra favorece la lectura concreta.
    reason: lexical_alternative
