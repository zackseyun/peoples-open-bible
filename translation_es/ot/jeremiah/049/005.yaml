review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: anuncio solemne, terror impuesto por Yahvé, dispersión individual y ausencia de quien reagrupe al fugitivo. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro POB: (1) la nota [a] está anclada a «He aquí», pero en el inglés POB la nota textual difícil corresponde a la frase final distributiva אִישׁ לְפָנָיו, no a הִנְנִי; y (2) «será dispersado» en singular no concuerda con וְנִדַּחְתֶּם (2mp) y debilita el valor colectivo/plural del hebreo. Además, «desde todos tus alrededores» suena poco natural; el sentido idiomático es ‘de todas partes a tu alrededor’ / ‘de todos lados’.'
  spanish_quality_summary: 'El español es generalmente digno y entendible, pero tiene algunos tropiezos de naturalidad y precisión: «desde todos tus alrededores» es torpe; «cada hombre será dispersado» mezcla distributivo singular con un verbo singular que no refleja el plural hebreo; y la puntuación puede fluir mejor con una pausa tras la fórmula profética. «He aquí» es aceptable, aunque no requiere nota si no se preserva una alternativa documentada. El resto del registro es claro y eclesialmente legible.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «Yahvé» y en mantener «cada hombre» para אִישׁ. «Dios de los ejércitos» es aceptable para צְבָאוֹת en este proyecto. El problema principal no es glosario sino fidelidad sintáctica y manejo de notas: la alternativa debe ir sobre la frase difícil «cada hombre delante de sí / recto hacia adelante», y el verbo de נדח debe reflejar plural colectivo mejor que el singular actual.'
  issues:
  - severity: high
    issue: La nota [a] está puesta en «He aquí», pero la nota del POB corresponde a אִישׁ לְפָנָיו.
    rationale: La evidencia auditada muestra que la dificultad textual/lexical está en la frase distributiva final, no en הִנְנִי. Mantener una nota en «He aquí» altera el foco del aparato y omite la nota necesaria donde sí existe ambigüedad fuente.
  - severity: high
    issue: «cada hombre será dispersado» no refleja bien וְנִדַּחְתֶּם, que es plural.
    rationale: El hebreo dirige el juicio al grupo (‘serán expulsados/dispersados’), seguido por una frase distributiva (‘cada hombre…’). El singular español introduce un cambio de sujeto y número no sustentado por la fuente.
  - severity: medium
    issue: «desde todos tus alrededores» suena poco natural en español.
    rationale: Aunque intenta seguir מִכָּל סְבִיבַיִךְ, en español idiomático es mejor «de todas partes a tu alrededor» o «de todos lados a tu alrededor», que preserva el cerco amenazante sin rigidez.
  - severity: medium
    issue: La nota alternativa actual usa «antes de sí», formulación poco natural.
    rationale: Puede conservarse la dificultad con una redacción más clara en español, por ejemplo «cada hombre delante de sí» o «cada uno recto hacia adelante», explicando la huida caótica.
  revised_spanish_text: He aquí, yo traigo terror sobre ti de todas partes a tu alrededor, declara Yahvé Dios de los ejércitos, y serán expulsados, cada hombre delante de sí[a]; no habrá quien reúna al fugitivo[b].
  revised_footnotes:
  - marker: a
    text: O «cada uno recto hacia adelante» / «cada hombre delante de sí». La frase hebrea es tersa y puede describir una huida en pánico, en la que cada uno corre sin atender a los demás.
    reason: lexical_alternative
  - marker: b
    text: O «al errante» o «al que huye».
    reason: alternative_reading
  revision_rationale: 'Se corrige el número verbal para reflejar el plural hebreo de וְנִדַּחְתֶּם, se mejora la naturalidad de מִכָּל סְבִיבַיִךְ en español, y se reubican/restauran las notas según el rastro POB: la nota principal sobre la frase difícil אִישׁ לְפָנָיו va en esa expresión, y la alternativa para לַנֹּדֵד va en «fugitivo». Se conserva «Yahvé» conforme al glosario del proyecto y «cada hombre» para mantener el distributivo masculino del hebreo.'
