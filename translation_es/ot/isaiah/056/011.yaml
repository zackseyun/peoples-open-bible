translation:
  language: es
  text: Y los perros son voraces de apetito[a]; no conocen saciedad. Y ellos son pastores que no conocen discernimiento[b]; todos ellos se han vuelto a su propio camino, cada uno hacia su propio provecho, todos sin excepción[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'insaciables'; literalmente, 'fuertes/fieros de apetito'.
    reason: lexical_alternative
  - marker: b
    text: O 'no entienden' / 'no saben nada de discernimiento'.
    reason: lexical_alternative
  - marker: c
    text: O 'por todas partes' para 'todos sin excepción'; la frase hebrea es difícil y puede subrayar el alcance total de su corrupción.
    reason: alternative_reading
lexical_decisions:
- source_word: הַכְּלָבִים
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los perros (metáfora de líderes/atalayas)
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo en lugar de reemplazarla por una etiqueta interpretativa como 'líderes'. El contexto denuncia a dirigentes corruptos, pero la imagen de 'perros' debe permanecer visible en el texto principal.
- source_word: עַזֵּי נֶפֶשׁ
  english_pob_choice: greedy in appetite
  chosen_spanish: voraces de apetito
  alternatives_spanish:
  - fuertes de apetito
  - insaciables
  - ardientes de apetito
  lexicon: HALOT
  rationale: El giro combina fuerza/intensidad con apetito/alma. En español, 'voraces de apetito' comunica la idea de deseo devorador sin perder el matiz corporal y volitivo del hebreo.
- source_word: לֹא יָדְעוּ שָׂבְעָה
  english_pob_choice: they do not know satisfaction
  chosen_spanish: no conocen saciedad
  alternatives_spanish:
  - no conocen satisfacción
  - nunca tienen bastante
  - no conocen plenitud
  lexicon: HALOT
  rationale: '''Saciedad'' es una manera natural y fiel de expresar el idiomático ''no conocer'' + ''satisfacción''. Mantiene la imagen de apetito que nunca llega al colmo.'
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores (metáfora de gobierno)
  - líderes
  lexicon: HALOT
  rationale: El término hebreo es literalmente 'pastores'. Se conserva la imagen pastoril en vez de sustituirla por una explicación institucional, porque el versículo usa la metáfora para denunciar a quienes debían guiar al pueblo.
- source_word: לֹא יָדְעוּ הָבִין
  english_pob_choice: do not know understanding
  chosen_spanish: no conocen discernimiento
  alternatives_spanish:
  - no entienden
  - no saben entender
  - no conocen comprensión
  lexicon: HALOT
  rationale: El hebreo conserva la idea de 'no saber' con un infinitivo/abstracto de entendimiento. 'Discernimiento' transmite bien la capacidad moral e intelectual que se les niega.
- source_word: כֻּלָּם לְדַרְכָּם פָּנוּ
  english_pob_choice: all of them have turned to their own way
  chosen_spanish: todos ellos se han vuelto por su propio camino
  alternatives_spanish:
  - todos se han desviado por su camino
  - todos han tomado su propio rumbo
  lexicon: HALOT
  rationale: '''Volverse por su propio camino'' refleja de manera bastante directa la metáfora hebrea del camino, manteniendo el sentido de apartarse de la senda debida.'
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - uno por uno
  lexicon: HALOT
  rationale: En este contexto distributivo, 'cada uno' suena natural en español y preserva la referencia individual sin sobrecargar el verso con una forma marcadamente masculina.
- source_word: לְבִצְעוֹ
  english_pob_choice: to his own gain
  chosen_spanish: hacia su propio provecho
  alternatives_spanish:
  - hacia su propia ganancia
  - a su propio beneficio
  - hacia su propio lucro
  lexicon: HALOT
  rationale: בצע puede referirse a provecho o ganancia. 'Provecho' comunica el interés egoísta sin imponer de antemano una connotación más fuerte de injusticia que el hebreo no explicita aquí.
- source_word: מִקָּצֵהוּ
  english_pob_choice: every one without exception
  chosen_spanish: todos sin excepción
  alternatives_spanish:
  - cada uno desde cualquier extremo
  - todos por igual
  - desde todos los extremos
  lexicon: HALOT
  rationale: La frase es difícil. El español 'todos sin excepción' expresa bien la intensificación totalizante que la POB inglesa leyó en el cierre, sin decidir de forma cerrada una imagen espacial que el hebreo permite pero no obliga.
theological_decisions:
- issue: Preservar las metáforas de 'perros' y 'pastores' en lugar de sustituirlas por etiquetas eclesiales o políticas
  english_pob_reading: Retain both metaphors in the main text rather than replacing them with explicit institutional labels.
  chosen_spanish_reading: Conservar 'perros' y 'pastores' en el cuerpo del texto, dejando que el contexto identifique a los dirigentes denunciados.
  alternative_spanish_readings:
  - los líderes son voraces
  - los pastores/atala yas están corrompidos
  - los dirigentes son codiciosos
  rationale: El hebreo emplea imágenes encadenadas que forman parte del reproche profético. Traducirlas como etiquetas interpretativas reduciría la fuerza retórica y resolvería prematuramente una tensión que el texto deja abierta.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Cómo verter la última frase difícil de la línea final
  english_pob_reading: '''every one without exception''; the Hebrew phrase is difficult and may emphasize the total extent of their corruption.'
  chosen_spanish_reading: '''todos sin excepción'''
  alternative_spanish_readings:
  - '''desde todos los extremos'''
  - '''de una punta a otra'''
  - '''desde cualquier extremo'''
  rationale: La frase final es textualmente difícil. La opción elegida mantiene la lectura totalizante de la POB inglesa sin fingir una certeza espacial que el hebreo no proporciona con claridad.
  doctrine_reference: 'Principio de cautela textual: conservar la ambigüedad significativa cuando el original es difícil.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del auditorio en inglés, que retiró 'unjust' antes de 'gain' porque בֶּצַע aquí significa 'ganancia/provecho' sin especificar injusticia. También conserva la decisión revisada de no resolver excesivamente la frase קשה de מִקָּצֵהוּ, manteniendo una nota alternativa en el pie.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda; en este versículo no aparece explícitamente.
  - '''Pastores'' se mantiene como metáfora del hebreo רֹעִים, no como oficio eclesiástico técnico.'
  - '''Provecho'' fue elegido para לְבִצְעוֹ conforme a la revisión que eliminó la explicitación de injusticia.'
  - La puntuación conserva el paralelismo hebreo en dos grandes cola poéticos con cierre totalizante.
