translation:
  language: es
  text: Tu buey será sacrificado delante de tus ojos, pero no comerás nada de él; tu asno será arrebatado[a] de delante de ti y no te será devuelto; tu rebaño será entregado a tus enemigos, y no habrá quien te salve[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «robado» o «quitado por la fuerza» para «arrebatado»; el hebreo sugiere una toma violenta o robo.
    reason: lexical_alternative
  - marker: b
    text: O «no habrá quien te rescate» o «no tendrás un libertador»; el hebreo dice literalmente «y no hay para ti un salvador».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹרְךָ
  english_pob_choice: your ox
  chosen_spanish: tu buey
  alternatives_spanish:
  - tu ox
  - tu toro
  - tu ganado
  lexicon: HALOT
  rationale: שׁוֹר denota un bovino de labor; en español, «buey» comunica con naturalidad ese animal y conserva el valor concreto del sustantivo sin generalizarlo indebidamente a «ganado».
- source_word: טָבוּחַ
  english_pob_choice: will be slaughtered
  chosen_spanish: será sacrificado
  alternatives_spanish:
  - será degollado
  - será matado
  lexicon: HALOT
  rationale: El participio pasivo expresa matanza ritual o para consumo; «sacrificado» transmite el acto violento y encaja bien en español, aunque no necesariamente implique rito religioso.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: delante de tus ojos
  alternatives_spanish:
  - a la vista de tus ojos
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión idiomática señala que el hecho ocurre abiertamente ante la persona; «delante de tus ojos» conserva la fuerza humillante y es idiomática en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: any of it
  chosen_spanish: nada de él
  alternatives_spanish:
  - de él
  - algo de él
  lexicon: HALOT
  rationale: Tras «comer», el sentido es que no habrá ninguna porción aprovechable; «nada de él» expresa con claridad la negación total que el inglés resuelve con «any of it».
- source_word: חֲמֹרְךָ
  english_pob_choice: your donkey
  chosen_spanish: tu asno
  alternatives_spanish:
  - tu burro
  - tu mula
  lexicon: HALOT
  rationale: חֲמוֹר refiere al asno; «asno» es preciso, neutral y más fiel al registro bíblico que «burro», que puede sonar demasiado coloquial.
- source_word: גָּזוּל
  english_pob_choice: will be seized
  chosen_spanish: será arrebatado
  alternatives_spanish:
  - será robado
  - será quitado por la fuerza
  lexicon: HALOT
  rationale: El participio pasivo de גזל implica apoderarse violentamente o robar; «arrebatado» comunica la fuerza de la desposesión mejor que un simple «robado».
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  lexicon: HALOT
  rationale: La expresión literalmente significa «de delante de tu rostro/presencia»; «de delante de ti» mantiene la vividez espacial del hebreo sin sonar artificial.
- source_word: יָשׁוּב לָךְ
  english_pob_choice: will not be returned to you
  chosen_spanish: no te será devuelto
  alternatives_spanish:
  - no volverá a ti
  - no te lo devolverán
  lexicon: HALOT
  rationale: Aunque el hebreo usa un verbo activo («volverá»), el español natural para un animal tomado por la fuerza es la pasiva impersonal; «te será devuelto» conserva la idea de restitución negada.
- source_word: צֹאנְךָ
  english_pob_choice: your flock
  chosen_spanish: tu rebaño
  alternatives_spanish:
  - tu ganado menor
  - tus ovejas
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras como conjunto; «rebaño» preserva ese valor colectivo sin restringirlo a ovejas solamente.
- source_word: נְתֻנוֹת
  english_pob_choice: will be given
  chosen_spanish: será entregado
  alternatives_spanish:
  - será dado
  - será puesto en manos
  lexicon: HALOT
  rationale: El participio pasivo de נתן, en este contexto hostil, se vierte mejor como «entregado», que en español sugiere con naturalidad la acción de poner algo en poder de otro.
- source_word: לְאֹיְבֶיךָ
  english_pob_choice: to your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - a tus adversarios
  - a tus foes
  lexicon: HALOT
  rationale: אֹיֵב se traduce normalmente como «enemigo»; «a tus enemigos» es la forma más directa y clara en español.
- source_word: מוֹשִׁיעַ
  english_pob_choice: there will be no one to save you
  chosen_spanish: no habrá quien te salve
  alternatives_spanish:
  - no habrá salvador para ti
  - no tendrás quien te rescate
  lexicon: HALOT
  rationale: El sustantivo agente de ישׁע designa a quien salva o rescata; «quien te salve» conserva el valor personal y la fuerza del verbo sin forzar una lectura teológica que exceda el contexto inmediato.
theological_decisions:
- issue: Valor de «salvar» en el cierre del versículo
  english_pob_reading: there will be no one to save you
  chosen_spanish_reading: no habrá quien te salve
  alternative_spanish_readings:
  - no habrá quien te rescate
  - no habrá salvador para ti
  rationale: En este contexto de maldición pactual, el sustantivo מוֹשִׁיעַ se refiere al auxilio efectivo y temporal, no a una afirmación directa sobre salvación eterna. Aun así, «salvar» es la equivalencia léxica más directa de ישׁע y no debe suavizarse.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y concuerda con el auditrastro inglés de la POB en los puntos léxicos principales: sacrificio del buey, toma violenta del asno, entrega del rebaño y ausencia de rescatador. No se aplicaron revisiones posteriores al texto inglés base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» cuando el texto lo requiera en esta obra, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «asno» y «rebaño» por precisión y registro bíblico, sin recurrir a arcaísmos innecesarios.
  - La negación final conserva la tensión entre rescate temporal y salvación, sin teologizar más allá del contexto inmediato.
