translation:
  language: es
  text: Y al octavo día tomará para sí dos tórtolas o dos pichones, y vendrá delante de Yahvé[a], a la entrada de la tienda de reunión, y los entregará al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (tradicionalmente «el SEÑOR»; alternativamente «Yahvé»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  english_pob_choice: And on the eighth day
  chosen_spanish: Y al octavo día
  alternatives_spanish:
  - Y en el octavo día
  - Al octavo día
  lexicon: HALOT
  rationale: La secuencia legal del hebreo se expresa de forma natural en español con 'Y al octavo día', conservando el valor temporal y la continuidad con la instrucción previa.
- source_word: יִקַּח לוֹ
  english_pob_choice: he shall take for himself
  chosen_spanish: tomará para sí
  alternatives_spanish:
  - tomará
  - habrá de tomar para sí
  lexicon: HALOT
  rationale: '''Tomará'' refleja bien el futuro/instructivo del hebreo legal; ''para sí'' conserva el dativo לוֹ, que indica que el oferente las toma para su propio uso ritual.'
- source_word: שְׁתֵּי תֹרִים
  english_pob_choice: two turtledoves
  chosen_spanish: dos tórtolas
  alternatives_spanish:
  - dos tórtolas
  - dos torcazas
  lexicon: HALOT
  rationale: תֹרִים designa tórtolas; 'tórtolas' es el equivalente español más natural y reconocido para aves sacrificiales pequeñas.
- source_word: אוֹ שְׁנֵי בְּנֵי יוֹנָה
  english_pob_choice: or two young pigeons
  chosen_spanish: o dos pichones
  alternatives_spanish:
  - o dos palominos
  - o dos pichones de paloma
  lexicon: HALOT
  rationale: '''Hijos de paloma'' es idiomático en hebreo para aves jóvenes; en español, ''pichones'' transmite con naturalidad la edad juvenil sin perder la referencia aviar. ''Pichones de paloma'' explicita el sentido, pero es más pesado.'
- source_word: וּבָא לִפְנֵי יְהוָה
  english_pob_choice: and he shall come before Yahweh
  chosen_spanish: y vendrá delante de Yahvé
  alternatives_spanish:
  - y comparecerá delante de Yahvé
  - y se presentará delante de Yahvé
  lexicon: HALOT
  rationale: '''Delante de Yahvé'' conserva la preposición relacional de לִפְנֵי y el nombre divino conforme al estándar español del proyecto. ''Comparecerá'' y ''se presentará'' son posibles, pero menos directos para el hebreo simple.'
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada del tabernáculo de reunión
  - a la entrada de la tienda de encuentro
  lexicon: HALOT
  rationale: '''פֶּתַח'' es ''entrada''; ''אֹהֶל מוֹעֵד'' se vierte como ''tienda de reunión'' siguiendo la terminología del proyecto. ''Tabernáculo'' sería tradicional, pero menos transparente para el hebreo literal.'
- source_word: וּנְתָנָם אֶל הַכֹּהֵן
  english_pob_choice: and give them to the priest
  chosen_spanish: y los entregará al sacerdote
  alternatives_spanish:
  - y los dará al sacerdote
  - y los presentará al sacerdote
  lexicon: HALOT
  rationale: נתן aquí implica transferencia concreta de las aves; 'entregará' comunica con claridad la acción de ponerlas en manos del sacerdote. 'Presentará' podría suavizar indebidamente el acto directo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al estándar del proyecto en español, se mantiene el nombre propio 'Yahvé' para preservar la identidad del pacto sin ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La frase se ajusta al cambio de revisión del inglés POB que prefirió 'at the entrance' para reflejar mejor 'before Yahweh at the entrance of the tent of meeting'. En español se resolvió con 'vendrá delante de Yahvé, a la entrada de la tienda de reunión', preservando la relación espacial y cultual sin duplicar innecesariamente la preposición.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como equivalente de יְהוָה, coherente con las directrices del proyecto.
  - '''Tienda de reunión'' conserva la terminología establecida para אֹהֶל מוֹעֵד.'
  - '''Tórtolas'' y ''pichones'' reflejan las aves sacrificiales sin introducir tecnicismos ajenos al español bíblico actual.'
  - La construcción verbal futura mantiene el tono legal/instructivo del hebreo.
