translation:
  language: es
  text: Y ofrecerán un macho cabrío como ofrenda por el pecado[a], y dos corderos machos de un año como sacrificio de ofrendas de paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de purificación’ para ‘ofrenda por el pecado’.
    reason: lexical_alternative
  - marker: b
    text: O ‘ofrendas de comunión’ para ‘ofrendas de paz’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - prepararán
  lexicon: HALOT
  rationale: En contexto sacrificial, el hebreo literalmente dice 'hacer', pero la acción requerida es presentar una ofrenda. 'Ofrecerán' comunica el valor cultual de forma natural en español y sigue de cerca la decisión inglesa auditada.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: un macho cabrío de las cabras
  alternatives_spanish:
  - un macho cabrío
  - un macho de las cabras
  - un macho cabrío de cabra
  lexicon: HALOT
  rationale: La construcción hebrea especifica un macho dentro de la categoría de cabras. 'Macho cabrío de las cabras' conserva la especificación de sexo y especie sin perder el matiz del constructo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado o de purificación
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: La POB inglesa preserva la tensión entre 'sin offering' y la alternativa 'purification offering'. En español, 'ofrenda por el pecado' es la forma principal, con el matiz alternativo señalado en nota para no resolver indebidamente la discusión lexical.
- source_word: וּשְׁנֵי כְבָשִׂים
  english_pob_choice: and two male lambs
  chosen_spanish: y dos corderos machos
  alternatives_spanish:
  - y dos corderos
  - y dos machos corderos
  lexicon: HALOT
  rationale: כְבָשִׂים son corderos; el adjetivo 'machos' preserva la especificación implícita/explicada por la decisión inglesa. 'Corderos machos' es claro y sobrio en español.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: El idiomático hebreo indica animales de un año; 'de un año' es natural en español y suficientemente preciso.
- source_word: לְזֶבַח שְׁלָמִים
  english_pob_choice: for a sacrifice of peace offerings
  chosen_spanish: como sacrificio de ofrendas de paz
  alternatives_spanish:
  - como sacrificio de ofrendas de bienestar
  - como sacrificio de ofrendas de comunión
  lexicon: HALOT
  rationale: Se mantiene la categoría tradicional de 'ofrendas de paz', reflejando el plural hebreo שְׁלָמִים y la decisión inglesa de no sustituirla por una interpretación más estrecha como 'fellowship offerings'.
theological_decisions:
- issue: Sentido de חטאת en la legislación sacrificial
  english_pob_reading: sin offering, with a footnoted alternative purification offering
  chosen_spanish_reading: ofrenda por el pecado, con nota alternativa de ofrenda de purificación
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado
  rationale: La evidencia auditada muestra que la traducción estándar se conserva, pero se deja constancia de la alternativa purificatoria. En español, esto evita borrar la tensión lexical y mantiene la legibilidad litúrgica.
  doctrine_reference: Preservar la tensión lexical sin resolverla; fidelidad al texto fuente y transparencia de traducción.
- issue: Sentido de שְׁלָמִים
  english_pob_reading: peace offerings, with footnoted alternative fellowship offerings
  chosen_spanish_reading: ofrendas de paz, con nota alternativa de ofrendas de comunión
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: '''Ofrendas de paz'' corresponde mejor a la categoría source-near que la English POB decide mantener. La nota preserva la posibilidad interpretativa sin reemplazar el término bíblico por uno más explicativo.'
  doctrine_reference: Primacía del dato lingüístico original; mantener la categoría sacrificial sin domesticación teológica.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con la revisión auditada más reciente; se mantiene la decisión central de traducir el verbo cultual como ‘ofrecer’, conservar la categoría sacrificial de חטאת con alternativa anotada, y reflejar el plural de שְׁלָמִים sin reetiquetarlo como una expresión más interpretativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiere explícitamente; este versículo no lo contiene.
  - Se mantiene ‘ofrenda por el pecado’ como término principal, evitando sustituirlo por una explicación que borre la tensión lexical.
  - ‘Ofrendas de paz’ conserva la categoría bíblica y el plural del hebreo.
  - El artículo y la concordancia en español se ajustan a una formulación natural sin perder la estructura cultual del hebreo.
