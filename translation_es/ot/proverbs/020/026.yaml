base_translation:
  language: en
  yaml_path: translation/ot/proverbs/020/026.yaml
  text: A wise king winnows the wicked and turns the wheel over them[a][b].
  footnotes:
  - marker: a
    text: Or 'scatters the wicked'; the Hebrew verb can denote scattering, but here likely evokes winnowing imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and turns/causes a wheel to return over them'; likely an image drawn from threshing, hence 'drives the wheel over them.'
    reason: cultural_note
