translation:
  language: es
  text: Contra él rugen como leones jóvenes; alzan su voz. Hacen de su tierra una desolación; sus ciudades están quemadas[a], sin habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ciudades están arrasadas, sin habitante». La forma hebrea נצתה es difícil y puede entenderse como «quemadas» o, en sentido más general, «arruinadas/arrasadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָי/ו֙
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - ante él
  lexicon: HALOT
  rationale: 'El hebreo con עַל aquí es hostil: expresa acometida o amenaza dirigida contra la figura singular del contexto. En español, «contra él» comunica con naturalidad ese matiz de agresión mejor que una lectura neutral como «sobre él».'
- source_word: יִשְׁאֲג֣וּ
  english_pob_choice: roar
  chosen_spanish: rugirán
  alternatives_spanish:
  - bramarán
  - aullarán
  lexicon: HALOT
  rationale: Para el sonido de leones, «rugirán» es el equivalente más directo y vívido en español. Mantiene la imagen predatoria del original sin suavizarla.
- source_word: כְפִרִ֔ים
  english_pob_choice: young lions
  chosen_spanish: como leoncillos
  alternatives_spanish:
  - como jóvenes leones
  - como cachorros de león
  lexicon: HALOT
  rationale: «Leoncillos» conserva la idea de leones jóvenes y encaja bien con el paralelo poético. Evita la posible impresión de animales pequeños e inexpertos que podría sugerir «cachorros».
- source_word: נָתְנ֖וּ קוֹלָ֑/ם
  english_pob_choice: they raise their voice
  chosen_spanish: alzarán su voz
  alternatives_spanish:
  - darán su voz
  - levantarán su voz
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «dieron su voz», pero en español «alzar la voz» reproduce de manera natural la fuerza de un clamor fuerte y amenazante.
- source_word: וַ/יָּשִׁ֤יתוּ
  english_pob_choice: they make
  chosen_spanish: harán de
  alternatives_spanish:
  - pondrán
  - convertirán
  lexicon: HALOT
  rationale: 'El verbo aquí tiene valor causativo/resultativo: hacen que la tierra quede en un estado de desolación. «Harán de» expresa bien ese resultado en español sin añadir interpretación extra.'
- source_word: אַרְצ/וֹ֙
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: Se mantiene el posesivo singular del hebreo para conservar la personificación nacional en una figura masculina singular. «Tierra» es el equivalente más amplio y bíblicamente natural.
- source_word: לְ/שַׁמָּ֔ה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un horror
  lexicon: HALOT
  rationale: El sustantivo hebreo pide un equivalente nominal en español. «Una desolación» preserva la forma y el sentido de devastación, tal como hace la traducción inglesa.
- source_word: עָרָ֥י/ו
  english_pob_choice: his cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblados
  lexicon: HALOT
  rationale: Traducción directa del plural con sufijo posesivo; conserva la personificación singular del país como una sola entidad.
- source_word: נצתה
  english_pob_choice: are burned
  chosen_spanish: serán quemadas
  alternatives_spanish:
  - serán asoladas
  - serán arrasadas
  lexicon: HALOT
  rationale: Se sigue la decisión inglesa de preferir «burned» como sentido probable en este contexto. En español, «serán quemadas» comunica la imagen de destrucción por fuego y mantiene abierta la alternativa de devastación general.
- source_word: מִ/בְּלִ֥י יֹשֵֽׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin moradores
  - sin nadie que habite
  lexicon: HALOT
  rationale: La locución hebrea es una fórmula de despoblación. «Sin habitante» es breve, fiel y acorde con el paralelismo, aunque suena un poco más formal que otras opciones.
translation_notes:
  revision_awareness: La versión inglesa POB vigente se mantuvo sin cambios de revisión en el pasaje de referencia. El punto principal de atención sigue siendo la forma hebrea נצתה, cuyo sentido exacto admite más de una lectura; por eso se conserva la nota alternativa en español.
  spanish_consistency_notes:
  - Se conservó la personificación singular del sujeto mediante los posesivos «él / su» para reflejar el hebreo y el inglés POB.
  - Se evitó «SEÑOR» o cualquier sustitución litúrgica porque este versículo no contiene el Tetragrámaton.
  - Se mantuvo un registro bíblico moderno y claro, con preferencia por equivalentes naturales en español que no borren la imagen de ataque animal y devastación.
  - Se preservó la ambigüedad lexical de נצתה en una nota, tal como lo hace el audit trail inglés.
