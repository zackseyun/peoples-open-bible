translation:
  language: es
  text: Taré vivió setenta años y engendró[a] a Abram, a Nacor y a Harán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «llegó a ser padre de» o «fue padre de». El verbo genealógico hebreo no exige que los hijos nacieran en el orden exacto en que se mencionan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - llegó a vivir
  lexicon: HALOT
  rationale: En un aviso genealógico, חיה en wayyiqtol expresa que Taré alcanzó esa edad; «vivió» comunica de forma natural en español la idea temporal sin perder la sobriedad del registro.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  alternatives_spanish:
  - setenta años de edad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «setenta años». En español, «vivió setenta años» ya transmite la edad alcanzada, por lo que no hace falta añadir «de edad».
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, ילד señala el acto de llegar a ser padre más que el proceso biológico del nacimiento; «engendró» conserva esa fuerza genealógica. Se mantiene el verbo tradicional por ser preciso y transparente.
- source_word: אֶת ... אֶת ... וְאֶת
  english_pob_choice: Abram, Nahor, and Haran
  chosen_spanish: a Abram, a Nacor y a Harán
  alternatives_spanish:
  - Abram, Nacor y Harán
  lexicon: HALOT
  rationale: El marcador de objeto repetido subraya a cada hijo individualmente. En español, la repetición de «a» conserva mejor esa estructura que una simple enumeración sin preposición.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: tradicional transliteration
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: נָחוֹר
  english_pob_choice: Nahor
  chosen_spanish: Nacor
  alternatives_spanish:
  - Nahor
  lexicon: traditional transliteration adapted to Spanish
  rationale: En español bíblico, «Nacor» es la forma tradicional y comprensible; se adapta la transliteración al uso asentado en castellano sin cambiar el referente.
- source_word: הָרָן
  english_pob_choice: Haran
  chosen_spanish: Harán
  alternatives_spanish:
  - Haran
  lexicon: traditional transliteration adapted to Spanish
  rationale: Se adapta el nombre al español con acento gráfico para reflejar la pronunciación habitual en castellano bíblico.
theological_decisions:
- issue: Orden genealógico y relación con la cronología posterior
  english_pob_reading: The verse is rendered straightforwardly as a genealogical notice without specifying birth order beyond the literary listing.
  chosen_spanish_reading: 'El verso se presenta como una nota genealógica simple: Taré vivió setenta años y luego engendró a estos tres hijos, sin decidir el orden exacto de nacimiento.'
  alternative_spanish_readings:
  - 'Taré tuvo tres hijos en orden estricto: Abram, Nacor y Harán'
  - Taré comenzó a ser padre a los setenta años, y los tres nombres no implican secuencia
  rationale: El hebreo afirma el hecho genealógico, pero no resuelve por sí mismo las cuestiones cronológicas que surgen al comparar con otros pasajes. La traducción evita imponer una armonización y preserva la tensión textual documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica/textual en vez de resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés no introdujo cambios; esta propuesta sigue el texto auditado y conserva la nota sobre la flexibilidad del verbo genealógico y del orden de los nombres.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino por defecto en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «Abram» como forma del nombre en este pasaje, conforme al texto fuente.
  - Se elige «Nacor» por ser la forma española asentada y «Harán» con acento gráfico para naturalidad ortográfica.
  - La nota al pie en español conserva la alternativa léxica documentada por la POB inglesa sin añadir harmonización cronológica.
