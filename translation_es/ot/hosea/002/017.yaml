translation:
  language: es
  text: Y desde allí le daré sus viñas, y el valle de Acor[a] como una puerta de esperanza. Allí responderá[b] como en los días de su juventud, como en el día en que subió de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El valle de Acor recuerda el lugar asociado con el juicio de Acán (Jos. 7:24-26), convirtiendo un lugar de aflicción en una puerta de esperanza.
    reason: cross_reference
  - marker: b
    text: O «cantará»; el verbo hebreo puede denotar una respuesta y, en este contexto, puede implicar canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And ... I will give
  chosen_spanish: Y ... le daré
  alternatives_spanish:
  - Y ... le concederé
  - Entonces ... le daré
  lexicon: HALOT
  rationale: El verbo נתן se rinde de forma natural con «dar»; el futuro profético se mantiene en español con «daré». La conjunción inicial preserva el enlace discursivo con la promesa anterior.
- source_word: כְּרָמֶיהָ
  english_pob_choice: her vineyards
  chosen_spanish: sus viñas
  alternatives_spanish:
  - sus viñedos
  - sus parras
  lexicon: HALOT
  rationale: כֶּרֶם refiere normalmente a viña/viñedo; en español «viñas» es claro y cercano al término bíblico, sin perder el sentido agrícola de restauración.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: «Desde allí» conserva la referencia espacial y el movimiento desde el lugar mencionado, con buena fluidez en español.
- source_word: עֵמֶק עָכוֹר
  english_pob_choice: the Valley of Achor
  chosen_spanish: el valle de Acor
  alternatives_spanish:
  - el valle de Achor
  - el Valle de Acor
  lexicon: HALOT
  rationale: Se mantiene el topónimo aludido por Josué 7. En español, «Acor» es una transliteración natural y reconocible; puede escribirse con mayúscula por ser nombre propio.
- source_word: לְפֶתַח תִּקְוָה
  english_pob_choice: as a door of hope
  chosen_spanish: como una puerta de esperanza
  alternatives_spanish:
  - como una puerta de esperanza
  - para una puerta de esperanza
  lexicon: HALOT
  rationale: פֶּתַח es literalmente una abertura/entrada/puerta; «puerta de esperanza» conserva la metáfora sin endurecerla en una expresión arcaica. El ל se expresa con «como» para indicar función o resultado.
- source_word: וְעָנְתָה
  english_pob_choice: There she will answer
  chosen_spanish: Allí responderá[a]
  alternatives_spanish:
  - Allí contestará
  - Allí cantará
  lexicon: HALOT
  rationale: ענה en qal tiene el valor básico de responder/contestar. Se conserva «responderá» como núcleo léxico, dejando abierta la posibilidad de una respuesta en canto, tal como reconoce el audit trail inglés.
- source_word: שָּׁמָּה
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo se mantiene para señalar el lugar de la respuesta restaurada.
- source_word: כִּימֵי נְעוּרֶיהָ
  english_pob_choice: as in the days of her youth
  chosen_spanish: como en los días de su juventud
  alternatives_spanish:
  - como en sus días de juventud
  - como en los días de su mocedad
  lexicon: HALOT
  rationale: La expresión conserva el sentido temporal y relacional de los primeros tiempos de Israel; «juventud» es natural en español y fiel al hebreo.
- source_word: וּכְיוֹם עֲלֹתָהּ מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: as on the day when she came up from the land of Egypt
  chosen_spanish: como en el día en que subió de la tierra de Egipto
  alternatives_spanish:
  - como el día en que salió de la tierra de Egipto
  - como en el día de su salida de Egipto
  lexicon: HALOT
  rationale: עלה con מן expresa la subida/salida del éxodo. «Subió de la tierra de Egipto» conserva la imagen hebrea y su resonancia histórico-salvífica.
theological_decisions:
- issue: Sentido de ענה en un contexto de restauración
  english_pob_reading: '''There she will answer'' while allowing a possible singing nuance in context'
  chosen_spanish_reading: «Allí responderá» en el texto principal, con posibilidad implícita de respuesta celebrativa
  alternative_spanish_readings:
  - Allí cantará
  - Allí responderá cantando
  - Allí dará respuesta
  rationale: La raíz hebrea puede incluir el matiz de cantar o responder de modo responsivo, pero el sentido básico es «responder». Mantenerlo evita resolver la tensión léxica en una sola dirección y deja visible la ambigüedad productiva del hebreo.
  doctrine_reference: Translation philosophy §3; preserve lexical tension where the source allows multiple readings.
- issue: Valor tipológico del valle de Achor
  english_pob_reading: Achor recalls the place associated with Achan's judgment, turning trouble into hope
  chosen_spanish_reading: Se conserva la alusión al juicio de Acán sin explicarla en el versículo principal
  alternative_spanish_readings:
  - el valle del problema
  - el valle de la aflicción
  rationale: El texto hebreo nombra un lugar histórico concreto. Traducirlo como topónimo preserva la alusión bíblica y permite la lectura intertextual con Josué 7 sin reemplazar el nombre por una interpretación.
  doctrine_reference: Lexical/theological fidelity to intertextual allusion; Joshua 7 cross-reference tradition.
translation_notes:
  revision_awareness: La auditoría inglesa reciente ajustó «doorway of hope» a «door of hope» por mayor formalidad y cercanía al hebreo; la presente versión española usa «puerta de esperanza», equivalente natural de פתח y sin aumentar el grado de formalidad más allá de lo necesario. También se mantuvo el núcleo léxico de ענה como «responder» para conservar la tensión entre respuesta y posible canto.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías por defecto en el proyecto, pero este versículo no contiene esos términos.
  - «Acor» se usa como topónimo transliterado coherente con la tradición bíblica en español.
  - Se evita «siervo»/«esclavo» porque no aparece δοῦλος aquí.
  - La puntuación y el encabalgamiento buscan reproducir la cadencia profética sin sonoridad arcaizante excesiva.
