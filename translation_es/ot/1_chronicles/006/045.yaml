translation:
  language: es
  text: 'y de la tribu de Benjamín: Gueba con sus tierras de pastoreo, Alemet[a] con sus tierras de pastoreo, y Anatot con sus tierras de pastoreo; todas sus ciudades eran trece ciudades, según sus familias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Alemet»; el paralelo de Josué 21:18 lee «Almón».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִמַּטֵּה בִנְיָמִן
  english_pob_choice: and from the tribe of Benjamin
  chosen_spanish: y de la tribu de Benjamín
  alternatives_spanish:
  - y desde la tribu de Benjamín
  - y de Benjamín, su tribu
  lexicon: HALOT
  rationale: מַטֶּה en contextos de reparto tribal designa la tribu misma, no un bastón. En español, «de la tribu de Benjamín» reproduce naturalmente el valor de pertenencia y procedencia del listado.
- source_word: גֶּבַע
  english_pob_choice: Geba
  chosen_spanish: Gueba
  alternatives_spanish:
  - Geba
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo. «Gueba» refleja mejor la vocalización hebrea del nombre que una forma totalmente castellanizada, sin perder inteligibilidad.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - sus pastizales
  - sus tierras comunes
  lexicon: HALOT
  rationale: מִגְרָשׁ en listas levíticas alude al terreno abierto alrededor de la ciudad, de uso comunal y pastoril. «Tierras de pastoreo» comunica ese sentido sin reducirlo solo a pasto o a un tecnicismo oscuro.
- source_word: עָלֶמֶת
  english_pob_choice: Alemeth
  chosen_spanish: Alemet
  alternatives_spanish:
  - Alemeth
  - Almón
  lexicon: HALOT
  rationale: Se sigue la forma hebrea del pasaje mismo, que difiere del paralelo de Josué 21:18. «Alemet» mantiene la correspondencia con el texto de Crónicas.
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anatot
  lexicon: HALOT
  rationale: Nombre propio transliterado; en español bíblico es normal conservar la forma toponímica sin traducir.
- source_word: כָּל עָרֵיהֶם
  english_pob_choice: all their cities
  chosen_spanish: en total
  alternatives_spanish:
  - todas sus ciudades
  - todas las ciudades de ellos
  lexicon: HALOT
  rationale: La frase funciona aquí como resumen numérico del inventario anterior. En español, «en total» evita una repetición pesada y preserva la función de cierre cuantitativo sin eliminar el referente de las ciudades, que sigue explícito en «trece ciudades».
- source_word: שְׁלֹשׁ עֶשְׂרֵה עִיר
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - trece ciudad
  lexicon: HALOT
  rationale: La construcción hebrea usa singular tras el número, pero en español el plural es idiomático y fiel al sentido colectivo del conteo.
- source_word: בְּמִשְׁפְּחוֹתֵיהֶם
  english_pob_choice: according to their families
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - conforme a sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede referirse a familias extensas o clanes. «Según sus familias» conserva la relación distributiva sin forzar una reinterpretación como organización civil moderna.
theological_decisions:
- issue: La fórmula final resume una distribución tribal/levítica sin implicación doctrinal añadida.
  english_pob_reading: all their cities were thirteen cities according to their families
  chosen_spanish_reading: en total, trece ciudades, según sus familias
  alternative_spanish_readings:
  - todas sus ciudades eran trece ciudades según sus familias
  - 'todas ellas: trece ciudades, conforme a sus familias'
  rationale: No hay una tensión teológica específica en el verso; la decisión principal es mantener el carácter administrativo del registro. «Según sus familias» conserva la lógica de reparto por clanes/familias sin introducir interpretaciones eclesiales o simbólicas.
  doctrine_reference: Distribución tribal y herencia levítica en Josué 21 y Crónicas; sin carga doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés auditado está en estado final y sin cambios aplicados en la última pasada; la traducción española sigue la misma lectura, conservando la forma propia de Crónicas para el topónimo y el cierre numérico de la lista.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene «tribu» para מַטֶּה por el contexto de reparto tribal.
  - Los topónimos se transliteran de forma consistente y no se traducen.
  - «Tierras de pastoreo» se eligió para מִגְרָשׁ por ser claro y suficientemente amplio para el contexto levítico.
