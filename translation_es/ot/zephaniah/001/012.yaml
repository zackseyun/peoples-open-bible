translation:
  language: es
  text: 'Y sucederá en aquel tiempo: yo escudriñaré a Jerusalén con lámparas[a], y castigaré a los hombres que están asentados sobre sus heces, los que dicen en su corazón: «Yahvé no hará bien ni hará mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre sus heces». El hebreo usa imagen vinícola para personas que permanecen inmóviles y espiritualmente adormecidas; «heces» conserva el valor técnico de los residuos del vino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula profética introduce un evento futuro; «sucederá» mantiene el valor temporal sin calco rígido y suena natural en español bíblico contemporáneo.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - para entonces
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma directa. «Aquel» conserva la distancia deíctica del hebreo sin convertirla en «ese día», que introduciría otra fórmula.
- source_word: אֲחַפֵּשׂ
  english_pob_choice: I will search
  chosen_spanish: yo escudriñaré
  alternatives_spanish:
  - yo buscaré
  - yo examinaré
  lexicon: HALOT
  rationale: El verbo implica búsqueda minuciosa o inspección. «Escudriñaré» preserva la idea de examen cuidadoso con fuerza profética en español.
- source_word: בַּנֵּרוֹת
  english_pob_choice: with lamps
  chosen_spanish: con lámparas
  alternatives_spanish:
  - con linternas
  - a la luz de lámparas
  lexicon: HALOT
  rationale: Se conserva el instrumento concreto de la imagen. «Lámparas» es el equivalente más directo de נרות y mantiene la escena de búsqueda exhaustiva.
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: and I will punish
  chosen_spanish: y castigaré
  alternatives_spanish:
  - y visitaré juicio sobre
  - y tomaré cuenta de
  lexicon: HALOT
  rationale: En contexto judicial, פקד + על comunica visita punitiva. «Castigaré» expresa con claridad la fuerza forense del texto en español sin perder el carácter de juicio divino.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los varones
  lexicon: HALOT
  rationale: Se mantiene el masculino plural del hebreo. En español, «hombres» conserva la forma gramatical y el grupo referido en la ciudad.
- source_word: הַקֹּפְאִים עַל שִׁמְרֵיהֶם
  english_pob_choice: who are settled on their dregs
  chosen_spanish: que están asentados sobre sus heces
  alternatives_spanish:
  - que están reposando sobre sus lías
  - que se han asentado sobre su sedimento
  lexicon: HALOT
  rationale: La imagen vinícola se conserva de forma explícita. «Asentados» comunica la idea de reposo/estancamiento, y «heces» traduce el término técnico para los residuos del vino; se mantiene así la metáfora sin reducirla a una abstracción.
- source_word: הָאֹמְרִים בִּלְבָבָם
  english_pob_choice: who say in their hearts
  chosen_spanish: los que dicen en su corazón
  alternatives_spanish:
  - los que se dicen a sí mismos
  - los que piensan en su interior
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de pensamiento interior. «En su corazón» es natural en español bíblico y refleja la autoconvicción de la frase.
- source_word: לֹא יֵיטִיב יְהוָה וְלֹא יָרֵעַ
  english_pob_choice: Yahweh will not do good, nor will he do harm
  chosen_spanish: Yahvé no hará bien ni hará mal
  alternatives_spanish:
  - Yahvé no hará el bien ni el mal
  - Yahvé no beneficiará ni dañará
  lexicon: HALOT
  rationale: Se preserva el paralelismo verbal y el alcance práctico de la negación. «Hará bien / hará mal» sigue de cerca los verbos hebreos sin convertirlos en una afirmación metafísica sobre la naturaleza moral de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Project default / doctrinal name form
  rationale: Se mantiene el nombre divino según el criterio del proyecto para el Tetragrámaton. No se sustituye por «SEÑOR» porque la política de la serie exige una forma transparente del nombre.
theological_decisions:
- issue: Imagen del vino y la complacencia espiritual
  english_pob_reading: Preserve the metaphor explicitly as 'settled on their dregs' rather than replacing it with an interpretive abstraction like 'complacent.'
  chosen_spanish_reading: Conservar la metáfora de estar asentados sobre sus heces, sin sustituirla por una abstracción como «complacientes».
  alternative_spanish_readings:
  - complacientes
  - instalados en su seguridad
  - anquilosados en su rutina
  rationale: El hebreo usa una imagen vívida de sedimentación del vino para describir estancamiento moral. La versión española mantiene la figura para no perder la fuerza profética ni resolverla por paráfrasis.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve imagery unless Spanish requires clarification.'
- issue: Sentido de la afirmación sobre Yahvé
  english_pob_reading: The LORD will not do good, nor will he do harm.
  chosen_spanish_reading: Yahvé no hará bien ni hará mal.
  alternative_spanish_readings:
  - Yahvé no hace ni bien ni mal
  - Yahvé no interviene para bien ni para mal
  - Yahvé no recompensa ni castiga
  rationale: La frase expresa la convicción impía de que Dios no actúa con relevancia en la historia. La traducción conserva esa negación práctica sin añadir una tesis metafísica que el verso no formula.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail inglés, que prefirió una formulación más natural de la imagen vinícola («settled on their dregs») sin perder el carácter metafórico. La versión española refleja esa misma decisión: mantiene la imagen concreta y evita una abstracción interpretativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo de dos miembros finales: «no hará bien ni hará mal».'
  - La metáfora vinícola se traduce de modo explícito para sostener la tensión lexical sin suavizarla.
  - El tono es bíblico contemporáneo, no arcaizante, pero conserva dignidad y cadencia profética.
