translation:
  language: es
  text: 'Ellas les respondieron y dijeron[a]: «Sí, mira: él está delante de ti. Apresúrate ahora, porque hoy ha venido a la ciudad, pues hoy hay un sacrificio para el pueblo en el lugar alto[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Allí está delante de ti»; el hebreo usa una partícula afirmativa junto con una expresión deíctica.'
    reason: lexical_alternative
  - marker: b
    text: «Lugar alto» designa un sitio local de culto en una elevación.
    reason: cultural_note
lexical_decisions:
- source_word: וַתַּעֲנֶינָה
  english_pob_choice: They answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - replicaron
  lexicon: HALOT
  rationale: ענה en esta forma introduce una respuesta en diálogo. «Respondieron» conserva la secuencia narrativa y suena natural en español.
- source_word: וַתֹּאמַרְנָה
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y dijeron diciendo
  - y hablaron
  lexicon: HALOT
  rationale: La pareja narrativa hebrea «respondieron y dijeron» se conserva de manera transparente con «respondieron y dijeron».
- source_word: יֵּשׁ
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Hay
  - Existe
  lexicon: HALOT
  rationale: En este contexto de respuesta, יֵשׁ funciona como afirmación. «Sí» transmite mejor ese valor discursivo que un literal «hay».
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira bien
  - mira allí
  lexicon: HALOT
  rationale: הִנֵּה señala y llama la atención. «Mira» reproduce la deixis con español natural y sin arcaísmo.
- source_word: לְפָנֶיךָ
  english_pob_choice: ahead of you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes de ti
  - en frente de ti
  lexicon: HALOT
  rationale: La expresión literal es «ante/de delante de ti». «Delante de ti» comunica la posición espacial con claridad en español.
- source_word: מַהֵר
  english_pob_choice: Hurry
  chosen_spanish: Apresúrate
  alternatives_spanish:
  - Date prisa
  - Corre
  lexicon: HALOT
  rationale: El imperativo pide urgencia. «Apresúrate» mantiene fuerza verbal y evita el coloquialismo excesivo de «date prisa».
- source_word: הַיּוֹם בָּא לָעִיר
  english_pob_choice: he has come to the city today
  chosen_spanish: hoy ha venido a la ciudad
  alternatives_spanish:
  - hoy llegó a la ciudad
  - ha venido hoy a la ciudad
  lexicon: HALOT
  rationale: בא en perfecto narrativo refiere la llegada de Samuel ese día. «Ha venido» conserva el aspecto y suena natural en español.
- source_word: זֶבַח
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - un banquete sacrificial
  - una ofrenda sacrificial
  lexicon: HALOT
  rationale: El sustantivo designa un sacrificio; el componente de banquete no está explícito en esta cláusula y se deja implícito.
- source_word: לָעָם
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - para la gente
  - para el pueblo reunido
  lexicon: HALOT
  rationale: עם se refiere a la comunidad reunida. «Pueblo» preserva el registro bíblico sin forzar un sentido más específico.
- source_word: בַּבָּמָה
  english_pob_choice: at the high place
  chosen_spanish: en el lugar alto
  alternatives_spanish:
  - en el alto lugar
  - en el santuario de la altura
  lexicon: HALOT
  rationale: במה es un sitio de culto elevado. «Lugar alto» comunica el referente cultual en un español fluido; «alto lugar» suena menos natural.
theological_decisions:
- issue: Traducción de במה en contexto premonárquico de culto
  english_pob_reading: the high place
  chosen_spanish_reading: el lugar alto
  alternative_spanish_readings:
  - el alto lugar
  - el santuario de la altura
  rationale: Se conserva el término cultual sin introducir una valoración posterior negativa. «Lugar alto» mantiene la referencia histórica y la neutralidad exegética del texto.
  doctrine_reference: Historia del culto en Israel premonárquico; uso cultual de במה
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: mantiene la afirmación breve de יֵשׁ como «Sí», conserva el deíctico de הִנֵּה con un verbo de señalamiento natural, usa el aspecto perfecto para בָּא («ha venido») y refleja el final de la cláusula con «hay un sacrificio para el pueblo en el lugar alto» sin añadir banquetes o matices no explicitados.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la serie terminológica del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «pueblo» para עם por coherencia con el contexto narrativo y cultual.
  - «Lugar alto» se emplea de modo consistente como equivalente descriptivo de במה, con nota explicativa para evitar ambigüedad cultural.
