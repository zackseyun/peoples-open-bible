translation:
  language: es
  text: Y oyeron el sonido[a] de Yahvé Dios, caminando en el jardín en la brisa[b] del día, y el hombre[c] y su mujer se escondieron de la presencia de Yahvé Dios entre los árboles del jardín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la voz de Yahvé Dios'. El hebreo puede significar tanto 'sonido' como 'voz'.
    reason: lexical_alternative
  - marker: b
    text: O 'con el fresco del día'. Literalmente, 'en la brisa/viento del día'.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'el hombre'; alternativamente, 'Adán'.
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - voz/sonido
  lexicon: HALOT
  rationale: 'El hebreo קוֹל puede significar ''voz'' o ''sonido''. En español, ''voz'' conserva bien esa amplitud semántica y permite la misma tensión que el audit trail inglés: no obliga a decidir que necesariamente se trata de una voz articulada, pero sigue siendo natural en la frase ''oyeron la voz de Yahvé Dios''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio con la forma de proyecto 'Yahvé', no la sustitución titulada 'SEÑOR'. Esto preserva la transparencia respecto del Tetragrama y sigue el estándar terminológico indicado para español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En aposición con יְהוָה, el sentido estándar es 'Dios'. En español, 'Yahvé Dios' reproduce de forma natural la designación compuesta sin añadir artículo innecesario.
- source_word: מִתְהַלֵּךְ
  english_pob_choice: walking
  chosen_spanish: se paseaba
  alternatives_spanish:
  - andaba
  - caminaba
  - se movía
  lexicon: HALOT
  rationale: El hitpael participial expresa movimiento continuo o habitual dentro del jardín. 'Se paseaba' comunica ese desplazamiento reiterado de manera natural en español y conserva la concreción antropomórfica sin volverla abstracta.
- source_word: בַּגָּן
  english_pob_choice: in the garden
  chosen_spanish: en el jardín
  alternatives_spanish:
  - por el jardín
  lexicon: HALOT
  rationale: La preposición ב se traduce normalmente por 'en'. 'En el jardín' es la equivalencia más directa y clara.
- source_word: לְרוּחַ הַיּוֹם
  english_pob_choice: in the breeze of the day
  chosen_spanish: al viento del día
  alternatives_spanish:
  - a la brisa del día
  - en la brisa del día
  - al fresco del día
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, brisa o espíritu. Para mantener la transparencia del hebreo y la misma decisión de no interpretar en exceso el modismo, 'al viento del día' conserva el sustantivo físico; la preposición 'al' refleja el valor idiomático de la expresión sin convertirla en una explicación interpretativa.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el humano
  - Adán
  lexicon: HALOT
  rationale: Aquí el referente inmediato, junto con 'su mujer', apunta al individuo masculino concreto. 'El hombre' es la forma natural y fiel en español, y conserva la resonancia representativa del hebreo אָדָם sin forzar el nombre propio.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: and his wife
  chosen_spanish: y su mujer
  alternatives_spanish:
  - y su esposa
  - con su mujer
  lexicon: HALOT
  rationale: '''Mujer'' reproduce de forma directa el sustantivo hebreo con sufijo posesivo. Se evita ''esposa'' porque introduce un matiz más explicativo; ''su mujer'' sigue de cerca el relato y su estilo narrativo.'
- source_word: מִפְּנֵי
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de
  lexicon: HALOT
  rationale: La expresión hebrea tiene fuerza relacional y espacial. 'De la presencia de' preserva esa densidad mejor que un simple 'de' y suena idiomático en español.
- source_word: בְּתוֹךְ עֵץ הַגָּן
  english_pob_choice: among the trees of the garden
  chosen_spanish: entre los árboles del jardín
  alternatives_spanish:
  - en medio del árbol del jardín
  - en medio de los árboles del jardín
  lexicon: HALOT
  rationale: Aunque עֵץ está en singular morfológico, el contexto de esconderse exige un sentido colectivo en español. 'Entre los árboles del jardín' es la forma natural que comunica la escena sin perder la base hebrea.
theological_decisions:
- issue: La imagen antropomórfica de Yahvé 'paseándose' en el jardín
  english_pob_reading: Retain the concrete anthropomorphic language 'walking' without softening or allegorizing.
  chosen_spanish_reading: Conservar 'se paseaba' sin volver la frase abstracta ni interpretarla como una mera 'presencia'.
  alternative_spanish_readings:
  - se movía en el jardín
  - la presencia de Yahvé en el jardín
  rationale: El hebreo presenta a Dios en términos narrativos concretos. La traducción española conserva esa tensión teológica en vez de resolverla mediante una paráfrasis que diluya la escena.
  doctrine_reference: Translation philosophy §3
- issue: Valor de הָאָדָם en el contexto narrativo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - Adán
  - el humano
  rationale: La escena contrasta al hombre con 'su mujer', por lo que el referente individual es primario. 'El hombre' mantiene esa lectura y deja intacta la resonancia más amplia de אָדָם.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: El contexto de auditoría muestra acuerdo alto y sin cambios finales sustantivos en la revisión más reciente; la redacción española sigue de cerca la decisión inglesa establecida y conserva las mismas tensiones léxicas (קוֹל, רוּחַ, הָאָדָם) sin resolverlas interpretativamente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה y 'Dios' para אֱלֹהִים, incluso en la fórmula compuesta 'Yahvé Dios'.
  - '''Voz'' y ''sonido'' quedan abiertos en nota, siguiendo la ambigüedad del hebreo קוֹל.'
  - '''Al viento del día'' conserva la literalidad transparente de רוּחַ הַיּוֹם; la nota ofrece la alternativa idiomática ''el fresco del día''.'
  - '''Entre los árboles del jardín'' refleja el valor colectivo contextual de עֵץ sin crear una singularidad extraña en español.'
