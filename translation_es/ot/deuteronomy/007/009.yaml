    text: Hebreo חֶסֶד; suele abarcar amor leal, lealtad pactual, bondad misericordiosa o fidelidad. Aquí se ha vertido como “amor constante” para preservar tanto el matiz afectivo como la constancia del compromiso.
    reason: lexical_alternative
  - marker: c
    text: 'O: “por mil generaciones”. La expresión señala una duración inmensa de fidelidad pactual.'
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación pequeña pero importante: cambiar ''la fidelidad'' por ''el amor constante'' para representar mejor חֶסֶד según la evidencia léxica y el inglés auditado (''steadfast love''), además de mejorar la naturalidad del español en la construcción ''guardar el pacto y ...''. Se actualiza la nota correspondiente para reflejar ese ajuste.'
