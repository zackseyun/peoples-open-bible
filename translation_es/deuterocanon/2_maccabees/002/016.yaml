translation:
  language: es
  text: el único benefactor[a], el único justo y todopoderoso y eterno, el que salva a Israel de todo mal, el que hizo escogidos a los padres y los santificó[c][b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “proveedor” o “suministrador” para χορηγός.
    reason: lexical_alternative
  - marker: b
    text: O “de todo daño” o “de toda calamidad” para “de todo mal”.
    reason: lexical_alternative
  - marker: c
    text: O “los hizo santos” / “los consagró” para “los santificó”.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  english_pob_choice: only
  chosen_spanish: único
  alternatives_spanish:
  - solo
  - solamente
  lexicon: BDAG
  rationale: En esta cadena de epítetos divinos, “único” comunica exclusividad de forma natural en español y preserva el énfasis repetido del griego sin sonar redundante.
- source_word: χορηγός
  english_pob_choice: benefactor
  chosen_spanish: benefactor
  alternatives_spanish:
  - proveedor
  - suministrador
  - patrono
  lexicon: LSJ
  rationale: El término griego puede expresar quien provee o suministra lo necesario. “Benefactor” mantiene el registro solemne de la doxología y coincide con la revisión inglesa más reciente; “proveedor” sería más explicativo pero menos elevado.
- source_word: δίκαιος
  english_pob_choice: righteous one
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: BDAG
  rationale: Como adjetivo sustantivado aplicado a Dios, “justo” conserva la fuerza moral y judicial del griego. “Recto” sería posible, pero aquí es menos natural en una serie de títulos divinos.
- source_word: παντοκράτωρ
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - soberano sobre todo
  lexicon: BDAG
  rationale: “Todopoderoso” es el equivalente español más establecido para este título divino y mantiene el peso teológico del griego sin tecnicismo excesivo.
- source_word: αἰώνιος
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - de los siglos
  lexicon: BDAG
  rationale: En esta acumulación de atributos, “eterno” es la equivalencia más directa y clara en español.
- source_word: διασώζων
  english_pob_choice: saves
  chosen_spanish: salva
  alternatives_spanish:
  - rescata
  - libra
  - preserva
  lexicon: BDAG
  rationale: El participio presenta a Dios como quien trae a Israel fuera del peligro. “Salva” preserva el alcance soteriológico y coincide con la revisión inglesa final; “rescata” sería más concreto, pero menos alineado con el tono doxológico del contexto.
- source_word: ἐκ παντὸς κακοῦ
  english_pob_choice: from every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo mal y peligro
  - de todo daño
  - de toda calamidad
  lexicon: BDAG
  rationale: “Mal” mantiene la amplitud semántica de κακόν y reproduce bien la formulación bíblica tradicional sin reducirla solo a circunstancias adversas.
- source_word: ποιήσας
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - constituyó
  - dispuso
  - estableció
  lexicon: BDAG
  rationale: El aoristo participial expresa la acción divina sobre los antepasados. “Hizo” es directo y fiel al griego, sin introducir matices no presentes en el texto.
- source_word: ἐκλεκτούς
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: BDAG
  rationale: “Escogidos” conserva la relación verbal con ἐκλεκτός y su sentido de elección divina. “Electos” sería más técnico; “elegidos” es viable, pero menos transparente en este contexto.
- source_word: ἡγίασας
  english_pob_choice: sanctified
  chosen_spanish: los santificó
  alternatives_spanish:
  - los hizo santos
  - los consagró
  lexicon: BDAG
  rationale: “Santificó” reproduce el verbo con registro teológico claro y mantiene la idea de apartar para Dios. Se conserva el pronombre objeto para evitar ambigüedad y respetar la estructura del griego.
theological_decisions:
- issue: Cadena de epítetos divinos en forma nominal
  english_pob_reading: Treat the line as a series of titles describing God.
  chosen_spanish_reading: Tratar la línea como una serie de títulos que describen a Dios.
  alternative_spanish_readings:
  - 'Convertirla en una oración finita: “Él solo provee; él solo es justo...”'
  - Reformularla como una bendición más libre y sintética.
  rationale: El griego presenta una secuencia de frases nominales y participiales en aposición. Conservar esa estructura en español respeta el tono solemne y la acumulación retórica de atributos divinos.
  doctrine_reference: Principio de equivalencia óptima; preservar la forma cuando transporta contenido teológico y literario.
- issue: Distinción entre 'santificó' y 'consagró'
  english_pob_reading: Or 'made them holy' / 'consecrated them' for 'sanctified them.'
  chosen_spanish_reading: Mantener “los santificó” como traducción principal.
  alternative_spanish_readings:
  - los hizo santos
  - los consagró
  rationale: “Santificó” conserva el registro bíblico y la relación con la santidad como acto de Dios. Las alternativas son válidas, pero “santificó” enlaza mejor con la formulación doxológica y con la idea de apartamiento divino.
  doctrine_reference: Santidad como acto divino de separación y consagración; traducción reverente sin perder claridad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió “benefactor” para χορηγός y “saves” para διασώζων. También se respetó la decisión inglesa de mantener la serie de epítetos divinos y la tensión léxica entre “mal/daño/calamidad” y entre “santificó/hizo santos/consagró”.
  spanish_consistency_notes:
  - Se usa “Yahvé” como convención general del proyecto cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton explícito.
  - Se mantuvo “escogidos” para ἐκλεκτούς por coherencia con el lenguaje bíblico de elección.
  - No se añadió puntuación interpretativa que rompa la cadencia de la doxología griega.
  - Los marcadores de nota se colocan solo donde hay alternativa léxica real en el texto principal.
