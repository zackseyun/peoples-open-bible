    rationale: Aunque formalmente posible, en español suena rígido y poco idiomático para objetos como cama, asiento o superficie. «En que» o «sobre lo que» preserva el sentido con mejor legibilidad.
  - severity: low
    issue: Preposición «durante» menos natural que «en»
    rationale: El hebreo בְּנִדָּתָהּ expresa el estado en que ella se encuentra. «En su impureza menstrual» comunica mejor ese valor de estado y suena más natural en español bíblico-jurídico.
