base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/028/027.yaml
  text: And Ahaz lay down with his fathers[a], and they buried him in the city, in Jerusalem, for they did not bring him into the tombs of the kings of Israel. And Hezekiah his son reigned in his place.
  footnotes:
