  - severity: medium
    issue: La expresión «todo ser humano» debilita el sentido colectivo de כָּל אָדָם
    rationale: Aunque no es infiel, en este contexto suena más distributiva que colectiva. «Toda la humanidad» comunica mejor el valor genérico del hebreo y evita la discordancia verbal.
