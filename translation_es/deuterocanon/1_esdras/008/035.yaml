translation:
  language: es
  text: 'De los hijos de Joab: Abadías, hijo de Iezelus[a], y con él doscientos doce hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 8:12 dice algo distinto aquí, nombrando a un descendiente de Elam y contando setenta varones. Como 1 Esdras se traduce desde el testimonio griego, esta versión sigue el texto griego y no lo armoniza con el paralelo hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Ἰωάβ
  english_pob_choice: From the sons of Joab
  chosen_spanish: De los hijos de Joab
  alternatives_spanish:
  - De los descendientes de Joab
  - De la familia de Joab
  lexicon: LSJ
  rationale: υἱῶν se traduce de forma literal como «hijos» en listas genealógicas. En español, «hijos de» conserva el paralelismo formal del griego y el tono de catálogo; «descendientes» o «familia» suavizan el vínculo pero pierden esa forma directa.
- source_word: Ἀβαδίας
  english_pob_choice: Abadias
  chosen_spanish: Abadías
  alternatives_spanish:
  - Obadías
  lexicon: LSJ
  rationale: Se translitera la forma griega, no la equivalencia hebrea. «Abadías» refleja el testimonio primario griego de 1 Esdras; «Obadías» armoniza con el equivalente hebreo, pero no es la forma directa del texto base.
- source_word: Ἰεζήλου
  english_pob_choice: Iezelus
  chosen_spanish: Iezelus
  alternatives_spanish:
  - Jezelus
  - Jeziel
  lexicon: LSJ
  rationale: El nombre propio se mantiene en forma transliterada desde el griego. En 1 Esdras, el POB sigue el testimonio griego aunque difiera del paralelo hebreo, por lo que se conserva la forma «Iezelus».
- source_word: καὶ μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y acompañándolo
  - y junto con él
  lexicon: LSJ
  rationale: La frase preposicional es directa y funciona naturalmente en español como indicación de compañía en una lista de conteo. «Con él» reproduce el valor relacional sin añadir matices no presentes.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: LSJ
  rationale: «Hombres» es el equivalente más natural y fiel al griego en un registro de lista. «Varones» suena más técnico; «males» enfatiza biología de modo que no exige el contexto griego ἄνδρες.
- source_word: διακόσιοι δέκα δύο
  english_pob_choice: two hundred twelve
  chosen_spanish: doscientos doce
  alternatives_spanish:
  - doscientos y doce
  lexicon: LSJ
  rationale: Se expresa el valor numérico de manera estándar en español. «Doscientos doce» es la forma más natural y fiel; la variante con «y» es posible, pero menos idiomática en un recuento.
theological_decisions:
- issue: Seguimiento del texto griego frente al paralelo hebreo/MT
  english_pob_reading: The Hebrew parallel in Ezra 8:12 reads differently here... Because 1 Esdras is translated from the Greek witness, this draft follows the Greek text rather than harmonizing to the Hebrew parallel.
  chosen_spanish_reading: Este versículo sigue el testimonio griego de 1 Esdras y no armoniza con el paralelo hebreo de Esdras.
  alternative_spanish_readings:
  - Armonizar con el paralelo hebreo de Esdras 8:12
  - Traducir la forma del paralelo hebreo en lugar de la griega
  rationale: La nota auditada del inglés indica que el griego es la base primaria y que el paralelo hebreo difiere. En español conviene preservar esa tensión textual sin corregirla, para mantener la transparencia del proyecto.
  doctrine_reference: Principio textual de primacía del testimonio griego en 1 Esdras
- issue: Interpretación de ἄνδρες en un contexto de censo/lista
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - varones
  - males
  rationale: 'No hay carga teológica especial, pero sí una decisión semántica importante: el griego usa ἄνδρες, no ἄρσενες. «Hombres» preserva la forma del listado y evita una biologización innecesaria.'
  doctrine_reference: Precisión léxica en listas censales
translation_notes:
  revision_awareness: Se revisó el contexto auditado y no se requieren cambios respecto del testimonio griego base; la versión española conserva el orden de lista, los nombres propios transliterados y el contraste textual señalado en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Joab» como forma estable del nombre propio en español.
  - Se prefirió «Abadías» para reflejar la transliteración griega y no la equivalencia hebrea.
  - Se usó «hijos de» y no «descendientes de» para conservar el tono genealógico del griego.
  - Se conservó el número cardinal en forma plena, sin cifras.
  - La nota al pie se ancla en «Iezelus» para señalar la variante textual sin interrumpir la fluidez de la línea principal.
