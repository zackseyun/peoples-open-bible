translation:
  language: es
  text: Es dada para ser pulida[a], para ser tomada en la mano. Ha sido afilada —la espada— y está pulida, para ponerla en la mano[c] de un matador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'burnida' para 'pulida' (heb. מרט), destacando el resplandor de la preparación de la hoja.
    reason: lexical_alternative
  - marker: b
    text: O 'el matador'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'en la palma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: is given
  chosen_spanish: se lo da
  alternatives_spanish:
  - es dada
  - se entrega
  lexicon: HALOT
  rationale: El hebreo usa un wayyiqtol 3ms con sujeto implícito en un contexto oracular abrupto. En español, el impersonal reflejo 'se lo da' conserva la pasividad funcional sin introducir un sujeto innecesario y mantiene el flujo profético.
- source_word: לְמָרְטָה
  english_pob_choice: to be polished
  chosen_spanish: para ser pulida
  alternatives_spanish:
  - para ser burnida
  - para pulirla
  lexicon: HALOT
  rationale: מרט aquí se refiere al acabado de una espada, con el matiz de pulido/burnido. 'Pulida' es natural y fiel; 'burnida' sería posible pero menos transparente para un público amplio.
- source_word: לִתְפֹּשׂ
  english_pob_choice: to be grasped
  chosen_spanish: para ser asida
  alternatives_spanish:
  - para ser tomada
  - para ser agarrada
  lexicon: HALOT
  rationale: El infinitivo de תפש con בַּכָּף expresa ser tomada en la mano/palma. 'Asida' conserva el matiz de aprehensión formal y evita una coloquialidad excesiva.
- source_word: בַּכָּף
  english_pob_choice: in the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en la palma
  lexicon: HALOT
  rationale: כַּף es literalmente 'palma', pero en español 'en la mano' expresa mejor el uso práctico del arma. Se preserva la nota alternativa en pie de página porque la imagen hebrea es literalmente la palma.
- source_word: הוּחַדָּה
  english_pob_choice: is sharpened
  chosen_spanish: Es afilada
  alternatives_spanish:
  - está afilada
  - ha sido afilada
  lexicon: HALOT
  rationale: El hophal de חדד comunica estado resultante de afilado. 'Es afilada' reproduce la predicación breve y enérgica del original.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - espada
  lexicon: HALOT
  rationale: Aunque el hebreo carece de artículo, el contexto ya identifica la espada del oráculo; por eso 'la espada' funciona de modo natural en español y refleja el ajuste del POB inglés para la apposición.
- source_word: מֹרָטָּה
  english_pob_choice: is polished
  chosen_spanish: está pulida
  alternatives_spanish:
  - es pulida
  - está burnida
  lexicon: HALOT
  rationale: Se repite el mismo campo léxico de מרט para conservar la repetición retórica del hebreo. En español, 'está pulida' mantiene el paralelismo sin sonar redundante de forma extraña.
- source_word: לָתֵת אֹתָהּ
  english_pob_choice: to put it
  chosen_spanish: para ponerla
  alternatives_spanish:
  - para entregarla
  - para darla
  lexicon: HALOT
  rationale: נתן aquí, con el complemento 'en la mano', funciona como 'poner/colocar' más que como 'dar' en sentido simple. 'Ponerla' transmite el acto de transferir el arma a la mano del ejecutor.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en la palma de
  - en poder de
  lexicon: HALOT
  rationale: El idiomático 'en la mano de' conserva la imagen hebrea y el valor de transferencia o control. No se reemplaza por 'en poder de' para no borrar la metáfora corporal.
- source_word: הוֹרֵג
  english_pob_choice: a slayer
  chosen_spanish: un asesino
  alternatives_spanish:
  - un matador
  - uno que mata
  lexicon: HALOT
  rationale: El participio activo de הרג designa al que mata. 'Asesino' es comprensible y fuerte en español, aunque algo más acusatorio que 'slayer'; se conserva como opción de registro más directo. La alternativa 'matador' puede sonar ambigua en algunos contextos.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el ajuste auditado del POB inglés: pasividad no explícita para וַיִּתֵּן, repetición de מרט para conservar la intensidad retórica, y una formulación idiomática para בְּיַד / כַּף sin perder la imaginería corporal. También incorpora la revisión inglesa que favoreció una forma más formal para el agente final.'
  spanish_consistency_notes:
  - Se mantiene 'pulida' en ambas apariciones de מרט para reflejar la repetición del hebreo y la decisión auditada del POB.
  - '''La espada'' sigue la apposición del original y el ajuste revisado del inglés, aunque el hebreo carece de artículo.'
  - '''En la mano de'' conserva la imagen de כַּף / יָד; la nota a pie aclara la posibilidad literal de ''palma''.'
  - '''Asesino'' se usa para הוֹרֵג por su fuerza semántica, con nota alternativa para ''el asesino''/''slayer'' en el sentido más formal.'
