base_translation:
  language: en
  yaml_path: translation/ot/hosea/001/004.yaml
  text: Then Yahweh said to him[a], “Call his name Jezreel, for in a little while I will punish the house of Jehu for the bloodshed of Jezreel[b], and I will put an end to the kingdom of the house of Israel.”
  footnotes:
  - marker: a
    text: Or “for the blood of Jezreel” or “for the bloodguilt of Jezreel.” The Hebrew idiom literally reads “the bloods of Jezreel.”
    reason: lexical_alternative
  - marker: b
    text: Jezreel is both the child's symbolic name and the name of the place associated with Jehu's violent acts.
    reason: cultural_note
