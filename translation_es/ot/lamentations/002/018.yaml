base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/018.yaml
  text: 'Their heart cried out to the Lord[a], O wall of daughter Zion: let tears run down like a stream day and night; give yourself no relief[c][b]; let not the apple of your eye rest.'
  footnotes:
  - marker: a
    text: Or 'their hearts cried out to the Lord.' The Hebrew has singular 'heart' with a plural suffix, likely a collective expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'let tears flow like a wadi/torrent.' The Hebrew נחל can refer to a streambed or torrent valley.
    reason: lexical_alternative
  - marker: c
    text: Literally 'let not the daughter of your eye be still,' an idiom for the pupil/eye and thus for unceasing weeping.
    reason: lexical_alternative
