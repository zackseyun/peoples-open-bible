translation:
  language: es
  text: 'Entonces Hilquías y los que el rey había enviado fueron a Hulda la profetisa, la esposa de Shallum, hijo de Tokhat, hijo de Hasrah, guardián de las vestiduras[a]. Ella habitaba en Jerusalén, en el Segundo Barrio[b], y le hablaron así:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «encargado del vestuario». El hebreo dice literalmente «guardián de las vestiduras».
    reason: lexical_alternative
  - marker: b
    text: Hebreo mishneh, probablemente el nombre de un distrito de Jerusalén; tradicionalmente se traduce «el Segundo Barrio».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - anduvieron
  - se dirigieron
  lexicon: HALOT
  rationale: El hebreo narra movimiento en secuencia; en español, con sujeto plural por el contexto inmediato, 'fueron' transmite el desplazamiento sin forzar una calca del singular verbal hebreo.
- source_word: וַאֲשֶׁר הַמֶּלֶךְ
  english_pob_choice: and those whom the king had sent
  chosen_spanish: los que el rey había enviado
  alternatives_spanish:
  - los del rey
  - los servidores del rey
  lexicon: HALOT
  rationale: El hebreo es elíptico; el contexto previo identifica una delegación. La solución española sigue la lectura auditada del POB inglés y explicita la relación de envío sin añadir contenido innecesario.
- source_word: חֻלְדָּה הַנְּבִיאָה
  english_pob_choice: Huldah the prophetess
  chosen_spanish: Hulda la profetisa
  alternatives_spanish:
  - Hulda la profeta
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el femenino del título profético. 'Profetisa' es la forma natural y fiel en español para marcar el género gramatical del hebreo.
- source_word: אֵשֶׁת שַׁלֻּם
  english_pob_choice: the wife of Shallum
  chosen_spanish: la esposa de Shallum
  alternatives_spanish:
  - la mujer de Shallum
  lexicon: HALOT
  rationale: '''Esposa'' mantiene el valor relacional del constructo con registro digno y claro en español contemporáneo.'
- source_word: בֶּן תוקהת בֶּן חַסְרָה
  english_pob_choice: son of Tokhath, son of Hasrah
  chosen_spanish: hijo de Tokhat, hijo de Hasrah
  alternatives_spanish:
  - hijo de Tocaat, hijo de Hasra
  lexicon: HALOT
  rationale: Se transliteran los nombres propios de forma consistente. 'Tokhat' sigue de cerca la forma hebrea documentada sin inventar numeración léxica ni adaptar a una tradición ajena.
- source_word: שׁוֹמֵר הַבְּגָדִים
  english_pob_choice: keeper of the garments
  chosen_spanish: guardián de las vestiduras
  alternatives_spanish:
  - encargado de las vestiduras
  - guarda de la ropa
  lexicon: HALOT
  rationale: Se mantiene el sentido literal del oficio, como en el POB inglés, pero con una opción española más sobria y comprensible que 'ropa'. 'Vestiduras' conserva mejor el matiz formal del hebreo.
- source_word: וְהִיא יוֹשֶׁבֶת
  english_pob_choice: She lived
  chosen_spanish: Ella habitaba
  alternatives_spanish:
  - Ella vivía
  - Ella moraba
  lexicon: HALOT
  rationale: El participio hebreo expresa residencia continua. 'Habitaba' preserva la duratividad con un tono bíblico moderado, sin caer en arcaísmo excesivo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar, sin necesidad de expansión.
- source_word: בַּמִּשְׁנֶה
  english_pob_choice: in the Second Quarter
  chosen_spanish: en el Segundo Barrio
  alternatives_spanish:
  - en la segunda sección
  - en el Segundo Distrito
  lexicon: HALOT
  rationale: El término parece designar una zona específica de Jerusalén. 'Barrio' ofrece una equivalencia idiomática natural en español; se conserva la referencia a una subdivisión urbana y la ambigüedad histórica queda explicada en nota.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ כָּזֹאת
  english_pob_choice: 'and they spoke to her thus:'
  chosen_spanish: 'y le hablaron así:'
  alternatives_spanish:
  - 'y le hablaron de esta manera:'
  - 'y le dijeron así:'
  lexicon: HALOT
  rationale: La fórmula introduce el discurso siguiente. 'Así' reproduce con naturalidad el demostrativo hebreo כָּזֹאת en español actual y coincide con el registro formal del POB revisado.
theological_decisions:
- issue: Título profético femenino
  english_pob_reading: Huldah the prophetess
  chosen_spanish_reading: Hulda la profetisa
  alternative_spanish_readings:
  - Hulda la profeta
  rationale: No hay tensión doctrinal, pero sí una decisión de visibilidad de género. Se conserva el femenino explícito del original para no neutralizar la forma hebrea ni ocultar que una mujer ejerce función profética.
  doctrine_reference: Uso bíblico del profetismo femenino; cf. Jueces 4:4; Lucas 2:36
- issue: Identificación de la zona de Jerusalén
  english_pob_reading: the Second Quarter
  chosen_spanish_reading: el Segundo Barrio
  alternative_spanish_readings:
  - el Mishné
  - el Segundo Distrito
  rationale: El hebreo designa un sector urbano concreto y probablemente técnico. Se evita una transliteración opaca en el texto principal, pero se mantiene la reserva semántica para no afirmar más precisión histórica de la que el término garantiza.
  doctrine_reference: Principio de sobriedad textual; no doctrinal específico
translation_notes:
  revision_awareness: El inglés POB fue revisado en la cláusula final de 'like this' a 'thus' para un registro más formal. La versión española adopta un equivalente igualmente formal, 'así', y conserva la estructura del resto del versículo sin amplificaciones adicionales. Se tomó en cuenta la preferencia auditada por mantener 'keeper of the garments' en forma literal y por tratar b. mishneh como un topónimo/sector urbano probable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - 'Se mantiene la transliteración consistente de nombres propios hebreos: Hilquías, Hulda, Shallum, Tokhat, Hasrah.'
  - '''Vestiduras'' se usa de forma uniforme para preservar el matiz formal del cargo.'
  - La puntuación introduce la cita directa con dos puntos, siguiendo el registro bíblico en español.
