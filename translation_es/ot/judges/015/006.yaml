base_translation:
  language: en
  yaml_path: translation/ot/judges/015/006.yaml
  text: Then the Philistines said[a], “Who did this?” And they said, “Samson, the Timnite’s son-in-law[b], because he took his wife and gave her to his companion.” So the Philistines went up and burned her and her father with fire.
  footnotes:
