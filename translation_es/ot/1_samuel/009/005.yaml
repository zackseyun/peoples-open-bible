translation:
  language: es
  text: 'Cuando llegaron a la tierra de Zuf, Saúl dijo al joven que estaba con él: «Ven, volvamos, no sea que mi padre deje de ocuparse[a] de las burras y se preocupe por nosotros[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deje de preocuparse por las burras». El hebreo dice literalmente «deje/cesse de las burras», un modismo que significa dejar de estar ocupado con ellas.
    reason: lexical_alternative
  - marker: b
    text: O «se preocupe por nosotros» / «esté preocupado por nosotros». La preposición puede expresar el objeto de su preocupación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאוּ / בְּאֶרֶץ
  english_pob_choice: came into the land of Zuph
  chosen_spanish: llegaron a la tierra de Zuf
  alternatives_spanish:
  - entraron en la tierra de Zuf
  - vinieron a la tierra de Zuf
  lexicon: HALOT
  rationale: El hebreo expresa llegada a un lugar mediante בוא con preposición locativa; en español, «llegaron a» comunica naturalmente esa llegada sin forzar un calco. «Tierra de Zuf» mantiene el nombre geográfico transliterado según la práctica POB.
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - sirviente
  - ayudante
  lexicon: HALOT
  rationale: En este contexto se trata del acompañante de Saúl; «joven» preserva el sentido básico de edad/condición sin especificar una relación servil que el hebreo no exige aquí.
- source_word: לְכָה וְנָשׁוּבָה
  english_pob_choice: Come, let us return
  chosen_spanish: Ven, volvamos
  alternatives_spanish:
  - Vamos, regresemos
  - Ven, volvamos atrás
  lexicon: HALOT
  rationale: La forma imperativa más cohortativa funciona como exhortación breve. «Ven, volvamos» conserva el tono hortatorio y suena natural en español.
- source_word: יֶחְדַּל מִן הָאֲתֹנוֹת
  english_pob_choice: stop caring about the donkeys
  chosen_spanish: deje de ocuparse de las asnas
  alternatives_spanish:
  - deje de preocuparse por las asnas
  - deje de pensar en las asnas
  - deje de atender a las asnas
  lexicon: HALOT
  rationale: חדל con מִן presenta una cesación respecto del objeto. En español, «dejar de ocuparse de» reproduce bien la idea idiomática de cesar la atención sobre algo sin perder la fuerza verbal del hebreo. «Asnas» conserva el referente animal específico.
- source_word: דָאַג לָנוּ
  english_pob_choice: become anxious about us
  chosen_spanish: se preocupe por nosotros
  alternatives_spanish:
  - se angustie por nosotros
  - se aflija por nosotros
  - sienta preocupación por nosotros
  lexicon: HALOT
  rationale: דאג denota preocupación/anxiety. En español, «se preocupe por nosotros» expresa con claridad la inquietud del padre y mantiene la transición del objeto perdido hacia los buscadores.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail en inglés y no requiere revisión adicional según el pass más reciente; se conserva la tensión idiomática de חדל/מִן y דאג/לָנוּ mediante expresiones naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto, pero aquí el versículo no contiene el nombre divino.
  - «Zuf» se conserva como transliteración del topónimo, coherente con la política del proyecto.
  - Se evita «siervo» para נַעַר porque el contexto describe al acompañante de Saúl, no necesariamente su estatus servil.
