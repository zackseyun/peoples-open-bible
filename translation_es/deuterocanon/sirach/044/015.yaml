translation:
  language: es
  text: Su sabiduría es proclamada por la asamblea[a][b], y su alabanza es relatada por la congregación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de la Geniza de El Cairo lee: «Su sabiduría es repetida por la asamblea, y su alabanza es relatada por la congregación». El paralelo griego tiene: «Los pueblos contarán su sabiduría, y la asamblea declara su alabanza». El texto principal sigue aquí al hebreo como testigo principal, aunque la nota conserva el sujeto más amplio del griego («los pueblos»).'
    reason: alternative_reading
  - marker: b
    text: El rollo de Masada para esta sección es fragmentario en este versículo y solo conserva la frase final correspondiente a «su alabanza ... congregación/asamblea», no toda la línea.
    reason: textual_variant
lexical_decisions:
- source_word: חכמתם / σοφίαν αὐτῶν
  english_pob_choice: their wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - la sabiduría que poseen
  - su conocimiento sabio
  lexicon: HALOT; BDAG (σοφία)
  rationale: El sustantivo posesivo de primera línea en ambos testigos se rinde naturalmente como "su sabiduría". Mantiene el valor de posesión sin ampliar el sentido a una paráfrasis como "la sabiduría que poseen".
- source_word: תשנה / διηγήσονται
  english_pob_choice: is proclaimed / will recount
  chosen_spanish: será proclamada
  alternatives_spanish:
  - será repetida
  - será recitada
  - será contada
  lexicon: HALOT; LSJ (διηγέομαι)
  rationale: El hebreo y el griego coinciden en una comunicación pública de su sabiduría; en español, "será proclamada" conserva ese carácter público y evita la idea de mera repetición mecánica. También respeta la tensión entre el hebreo de "repetir/recitar" y el griego de "relatar".
- source_word: עדה / ἐκκλησία
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la comunidad
  - la congregación
  lexicon: HALOT; BDAG (ἐκκλησία)
  rationale: '"Asamblea" refleja con precisión el grupo reunido y funciona bien para עדה y ἐκκλησία sin importar una carga eclesiástica excesiva. En este verso se reserva "congregación" para קהל en la segunda cola, preservando el paralelo.'
- source_word: ותהלתם / τὸν ἔπαινον
  english_pob_choice: and their praise
  chosen_spanish: y su alabanza
  alternatives_spanish:
  - y su renombre
  - y la alabanza sobre ellos
  lexicon: HALOT; BDAG (ἔπαινος)
  rationale: '"Alabanza" corresponde de manera directa a תהלה y ἔπαινος. En contexto se trata de la alabanza pronunciada acerca de ellos, no de una cualidad abstracta; el español permite dejar esa relación implícita sin sobreexplicar.'
- source_word: יספר / ἐξαγγέλλει
  english_pob_choice: is recounted / declares
  chosen_spanish: será contada
  alternatives_spanish:
  - será declarada
  - será anunciada
  - será relatada
  lexicon: HALOT; BDAG (ἐξαγγέλλω)
  rationale: '"Contada" mantiene el campo semántico de ספר en sentido de relatar públicamente y suena natural en español bíblico moderno. Aunque el griego presenta un presente declarativo, el futuro en español armoniza con la primera cola y con el paralelismo poético.'
- source_word: קהל / ἐκκλησία
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - el pueblo reunido
  lexicon: HALOT; BDAG (ἐκκλησία)
  rationale: Para קהל, "congregación" conserva el matiz de un pueblo reunido y preserva la diferencia con "asamblea" en la primera cola. En español eclesial es inteligible sin depender de un tecnicismo litúrgico.
theological_decisions:
- issue: Relación entre los testigos hebreo y griego en la primera cola
  english_pob_reading: The main text follows the Hebrew as the primary witness here while noting the Greek's broader subject ('peoples').
  chosen_spanish_reading: El texto principal sigue el hebreo como testigo principal; la formulación española no introduce explícitamente el sujeto ampliado del griego ('los pueblos'), pero la nota preserva esa tensión textual.
  alternative_spanish_readings:
  - Los pueblos proclamarán su sabiduría
  - Su sabiduría será proclamada por los pueblos
  rationale: El hebreo presenta una voz pasiva impersonal con la asamblea como agente; el griego amplía el sujeto a "pueblos". La línea española mantiene el testigo hebreo como base, sin borrar el dato del paralelo griego, que queda documentado en la nota.
  doctrine_reference: Principio de crítica textual y prioridad del testigo base en pasajes poéticos deuterocanónicos
- issue: Valor de ἐκκλησία / קהל como término de comunidad reunida
  english_pob_reading: assembly / congregation
  chosen_spanish_reading: asamblea / congregación
  alternative_spanish_readings:
  - comunidad / asamblea
  - congregación / asamblea
  rationale: No hay razón para cristianizar o eclesializar el vocabulario del verso. Se conserva la distinción entre ambos términos hebreos con dos equivalentes españoles cercanos pero no idénticos.
  doctrine_reference: Léxico bíblico de la comunidad reunida sin anacronismo eclesiástico
translation_notes:
  revision_awareness: La formulación española sigue la decisión revisada del POB inglés de usar un verbo público fuerte para la primera cola ('proclaimed'), mientras conserva la segunda cola como acto de recuento/alabanza. También mantiene la distinción léxica entre 'assembly' y 'congregation' que el audit trail consideró importante.
  spanish_consistency_notes:
  - Se conserva el paralelismo poético con dos miembros coordinados por «y».
  - No se usa «Señor» ni terminología litúrgica ajena al texto.
  - «Asamblea» y «congregación» se distinguen deliberadamente para reflejar עדה y קהל.
  - El futuro perifrástico no se emplea; el futuro simple mantiene tono bíblico y lectura natural en español.
  - «Alabanza» evita introducir la idea de fama/renombre, aunque ese sentido permanece como posibilidad secundaria del contexto.
