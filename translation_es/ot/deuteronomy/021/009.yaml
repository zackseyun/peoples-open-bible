- from: Así purgarás la sangre inocente[a] de en medio de ti, porque harás lo recto ante los ojos de Yahvé.
  to: Así purgarás la sangre inocente[a] de en medio de ti, porque harás lo correcto ante los ojos de Yahvé.
  rationale: 'Se mantiene la estructura y el contenido del borrador porque son fieles al hebreo y al POB inglés, pero se hace una reparación menor para mejorar la legibilidad y la precisión editorial en español: «lo recto» se cambia a «lo correcto», y la nota al pie se corrige para reflejar exactamente la alternativa léxica documentada y su explicación contextual.'
