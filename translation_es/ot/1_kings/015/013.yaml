revisions:
- from: También apartó a Maacá, su madre,[a] de ser reina madre, porque había hecho una imagen abominable para Asherah[c][b]. Asa cortó su imagen y la quemó en el valle de Cedrón.
  to: También quitó a Maacá, su madre,[a] de ser reina madre, porque había hecho una imagen abominable para Asherah[c][b]. Asa cortó su imagen y la quemó en el valle de Cedrón.
  rationale: Se reemplaza 'apartó' por 'quitó' para expresar con más precisión la destitución de un cargo oficial en español natural, sin alterar el sentido ni la estructura del original. El resto del texto y las notas se mantienen sustancialmente igual porque ya preservaban bien el significado fuente y la justificación léxico-teológica documentada.
