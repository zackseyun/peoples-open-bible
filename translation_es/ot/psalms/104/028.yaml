translation:
  language: es
  text: Les das, y lo recogen; abres tu mano, y se sacian de bienes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se sacian de cosas buenas».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  english_pob_choice: you give
  chosen_spanish: das
  alternatives_spanish:
  - das
  - proveyes
  - concedes
  lexicon: HALOT
  rationale: El verbo נתן expresa la acción simple de dar. «Das» mantiene la forma directa y la segunda persona dirigida a Dios, sin añadir matices no presentes en el hebreo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: HALOT
  rationale: El ל con sufijo de 3mp funciona aquí como complemento indirecto. En español, «a ellos» expresa con naturalidad esa relación de destinatario.
- source_word: יִלְקֹטוּן
  english_pob_choice: they gather it
  chosen_spanish: ellos lo recogen
  alternatives_spanish:
  - ellos lo juntan
  - ellos lo recogen
  lexicon: HALOT
  rationale: לקט significa «recoger/gather». «Recogen» conserva la idea de reunir o tomar lo provisto, y el objeto «lo» se sobreentiende del contexto, como en el inglés POB.
- source_word: תִּפְתַּח
  english_pob_choice: you open
  chosen_spanish: abres
  alternatives_spanish:
  - abres
  - abres ampliamente
  lexicon: HALOT
  rationale: פתח es el verbo simple «abrir». Se evita «ampliamente» porque no está explícito en el hebreo.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano
  lexicon: HALOT
  rationale: La imagen antropomórfica de la mano de Dios debe conservarse literalmente, porque forma parte central de la metáfora de provisión.
- source_word: יִשְׂבְּעוּן
  english_pob_choice: they are filled
  chosen_spanish: se sacian
  alternatives_spanish:
  - se sacian
  - quedan satisfechos
  - quedan llenos
  lexicon: HALOT
  rationale: שבע puede significar «ser saciado / quedar lleno». «Se sacian» conserva la concreción alimentaria e imagética del texto mejor que una formulación más abstracta.
- source_word: טוֹב
  english_pob_choice: with good
  chosen_spanish: de bien
  alternatives_spanish:
  - de bien
  - con bien
  - con cosas buenas
  lexicon: HALOT
  rationale: טוב funciona sustantivamente como «bien/bueno». En español, «de bien» permite reflejar la compactación hebrea sin expandirla demasiado a «cosas buenas».
theological_decisions:
- issue: Imagen antropomórfica de la mano divina
  english_pob_reading: Retain the literal expression 'you open your hand'
  chosen_spanish_reading: Conservar «abres tu mano»
  alternative_spanish_readings:
  - proveyes generosamente
  - das abundantemente
  rationale: El hebreo usa una imagen concreta para la provisión sustentadora de Dios. Mantenerla en español preserva la poesía y la teología del salmo sin volverla abstracta.
  doctrine_reference: 'Translation philosophy: primacía del texto original y preservación del sentido llano'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término al que remite la nota.
  spanish_consistency_notes:
  - Se conservó la segunda persona singular dirigida a Dios, coherente con el hebreo.
  - Se mantuvo la imagen corporal de la mano para respetar el paralelismo poético.
  - «Bien» se dejó sin plural para reflejar la compactación de טוב y evitar expansión interpretativa.
