translation:
  language: es
  text: Así que le armaron a Absalón la tienda en la azotea, y Absalón se llegó a las concubinas de su padre a la vista[a] de todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de todo Israel» o «en plena vista de todo Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּטּוּ
  english_pob_choice: they pitched
  chosen_spanish: tendieron
  alternatives_spanish:
  - alzaron
  - montaron
  - armaron
  lexicon: HALOT
  rationale: El verbo נטה en este contexto describe extender o disponer una tienda. En español, «tender» conserva bien la imagen de extender una tienda sin volver la frase forzada.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la carpa
  - el pabellón
  lexicon: HALOT
  rationale: El artículo la hace definida. «Tienda» es el equivalente bíblico natural en español para este objeto temporal y encaja con el acto narrado.
- source_word: עַל הַגָּג
  english_pob_choice: on the roof
  chosen_spanish: sobre el techo
  alternatives_spanish:
  - en el techo
  - sobre la azotea
  lexicon: HALOT
  rationale: «Techo» comunica de forma directa la ubicación elevada y visible. «Sobre» mantiene la relación espacial del hebreo sin añadir una interpretación arquitectónica más específica que el texto no exige.
- source_word: וַיָּבֹא ... אֶל
  english_pob_choice: went in to
  chosen_spanish: entró a
  alternatives_spanish:
  - fue a
  - tuvo relaciones con
  lexicon: HALOT
  rationale: La construcción hebrea funciona como eufemismo sexual. En español, «entró a» preserva la forma idiomática y la sobriedad del registro sin explicitar más de lo que dice el texto.
- source_word: פִּלַגְשֵׁי אָבִיו
  english_pob_choice: his father's concubines
  chosen_spanish: las concubinas de su padre
  alternatives_spanish:
  - las concubinas de su padre
  - las mujeres secundarias de su padre
  lexicon: HALOT
  rationale: «Concubinas» refleja el término léxico y el contexto real/político del pasaje. Se mantiene la relación posesiva explícita para conservar el contraste familiar y dinástico.
- source_word: לְעֵינֵי כָּל יִשְׂרָאֵל
  english_pob_choice: in the sight of all Israel
  chosen_spanish: a la vista de todo Israel
  alternatives_spanish:
  - delante de todo Israel
  - en pleno vista de todo Israel
  - ante todo Israel
  lexicon: HALOT
  rationale: La expresión literal «a los ojos de» se vierte de manera natural como «a la vista de», preservando el sentido público y observado de la acción.
theological_decisions:
- issue: Eufemismo sexual en un contexto de afrenta pública y juicio sobre la casa real
  english_pob_reading: Retain the Hebrew euphemism as 'went in to' rather than making it either more clinical or more explicit.
  chosen_spanish_reading: Conservar el eufemismo narrativo con «entró a» en vez de volverlo clínico o explícito.
  alternative_spanish_readings:
  - tuvo relaciones con
  - yació con
  rationale: El pasaje registra una acción pública con carga moral y política. «Entró a» mantiene la sobriedad bíblica y deja visible la tensión del texto sin suavizarla ni exagerarla.
  doctrine_reference: Ética narrativa del texto bíblico; principio de equivalencia óptima y respeto del registro fuente.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se preservan la imagen de la tienda en el techo, el eufemismo sexual hebreo y la formulación pública final sin cambios revisables reportados.'
  spanish_consistency_notes:
  - Se mantiene «Israel» sin artículo, como nombre propio colectivo.
  - Se usa «concubinas» de manera consistente con el término léxico del pasaje.
  - El orden verbal español sigue la secuencia narrativa hebrea sin añadir explicaciones.
  - La nota a pie de página replica la alternativa espacial/pública documentada en el POB inglés.
