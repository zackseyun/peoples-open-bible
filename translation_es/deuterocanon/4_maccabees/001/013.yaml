lexical_decisions:
- source_word: Ζητοῦμεν
  english_pob_choice: let us examine
  chosen_spanish: examinemos
  alternatives_spanish:
  - inquiramos
  - investiguemos
  - busquemos
  lexicon: LSJ
  rationale: El verbo está en primera persona plural con fuerza exhortativa/discursiva; en español, «examinemos» reproduce bien la invitación a considerar el asunto, con naturalidad moderna y sin perder el matiz deliberativo.
- source_word: δὴ τοίνυν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - pues bien
  - por tanto
  - entonces
  lexicon: LSJ
  rationale: La combinación de partículas introduce transición e inferencia. «Así pues» comunica esa conexión discursiva en español fluido, sin sobrecargar la frase con partículas duplicadas.
- source_word: αὐτοκράτωρ
  english_pob_choice: master
  chosen_spanish: dueña de
  alternatives_spanish:
  - soberana de
  - con pleno dominio sobre
  - maestra de
  lexicon: LSJ
  rationale: En este contexto filosófico-ético, la idea es dominio efectivo sobre algo. «Dueña de» conserva la noción de autoridad/control sobre las pasiones con una construcción natural en español; «soberana» sería más política y menos idiomática aquí.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - las emociones
  - los impulsos
  - los sufrimientos
  lexicon: LSJ
  rationale: πάθη en este marco moral helenístico se refiere a las pasiones o impulsos desordenados, no simplemente a emociones neutrales. «Pasiones» preserva mejor el registro filosófico del texto.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - el pensamiento
  - la facultad de razonar
  lexicon: LSJ
  rationale: λογισμός designa la capacidad o ejercicio de razonar. «La razón» es breve, clara y fiel al valor conceptual que la POB inglesa expresa con «reason».
theological_decisions:
- issue: Relación antropológica y ética entre λογισμός y πάθη
  english_pob_reading: reason is master over the passions
  chosen_spanish_reading: la razón es dueña de las pasiones
  alternative_spanish_readings:
  - el juicio racional es soberano sobre las pasiones
  - la razón gobierna las pasiones
  - la mente tiene autoridad sobre las emociones
  rationale: La línea formula la tesis central del pasaje en términos del gobierno de la razón sobre las pasiones. «Dueña» conserva la imagen de dominio personal sin convertirla en lenguaje político ni suavizar πάθη en simples emociones.
  doctrine_reference: 'Filosofía moral helenística; antropología ética del texto. Principio POB: preservar la tensión conceptual original sin importar categorías posteriores.'
translation_notes:
  revision_awareness: La traducción sigue de cerca el griego de Swete 1909 y toma como contexto auditado la decisión inglesa de convertir Ζητοῦμεν en una exhortación natural («let us examine») y αὐτοκράτωρ en dominio efectivo («master over»). No se detectaron revisiones textuales posteriores que afecten el sentido.
  spanish_consistency_notes:
  - Se mantiene «razón» para λογισμός en coherencia con el registro filosófico del libro.
  - Se conserva «pasiones» para πάθη, evitando neutralizar el término como simples emociones.
  - Se evita «SEÑOR» u այլ terminología eclesiástica ajena al pasaje; no aplica el campo de Yahvé/κύριος aquí.
  - La puntuación y el tono son sobrios y publicables, adecuados a una edición bíblica en español.
