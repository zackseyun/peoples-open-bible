translation:
  language: es
  text: ¿Y quién es el hombre que ha plantado una viña y todavía no ha hecho uso de ella[a]? Que vaya y vuelva a su casa, no sea que muera en la guerra y otro hombre haga uso de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, ‘todavía no la ha dedicado’ o ‘todavía no ha empezado a usarla’. El verbo hebreo aquí se refiere al primer uso ordinario de la viña, probablemente al disfrutar de su fruto después de los años iniciales restringidos (compárese Levítico 19:23–25).
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי הָאִישׁ
  english_pob_choice: And who is the man
  chosen_spanish: ¿Y quién es el hombre
  alternatives_spanish:
  - ¿Y qué hombre
  - ¿Quién es el hombre
  lexicon: HALOT
  rationale: Conserva la pregunta introductoria de la excepción militar y mantiene el masculino específico del hebreo, que se refiere a combatientes varones.
- source_word: נָטַע כֶּרֶם
  english_pob_choice: has planted a vineyard
  chosen_spanish: ha plantado una viña
  alternatives_spanish:
  - plantó una viña
  - ha plantado un viñedo
  lexicon: HALOT
  rationale: ‘Viña’ expresa de manera natural el campo semántico de כרם en español bíblico y moderno; ‘viñedo’ puede sonar más técnico o agrícola y desplaza el foco del texto.
- source_word: וְלֹא חִלְּלוֹ
  english_pob_choice: has not yet made use of it
  chosen_spanish: no la ha usado aún
  alternatives_spanish:
  - no la ha dedicado aún
  - no ha empezado a usarla
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más reciente, que evita añadir ‘fruit’ y conserva el valor contextual de חִלל como ‘hacer uso inicial’ de la viña. En español, ‘usar’ es la opción más clara y no introduce una lectura cultual indebida.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  english_pob_choice: Let him go and return to his house
  chosen_spanish: Que vaya y vuelva a su casa
  alternatives_spanish:
  - Que se vaya y regrese a su casa
  - Déjenlo ir y volver a su casa
  lexicon: HALOT
  rationale: La secuencia yiqtol se vierte como mandato/instrucción. ‘Que vaya y vuelva’ suena natural en español y conserva el tono jurídico sin caer en calco duro.
- source_word: פֶּן יָמוּת בַּמִּלְחָמָה
  english_pob_choice: lest he die in the battle
  chosen_spanish: no sea que muera en la guerra
  alternatives_spanish:
  - para que no muera en la guerra
  - no vaya a morir en la guerra
  lexicon: HALOT
  rationale: ‘No sea que’ refleja היטב פֶּן como advertencia preventiva. ‘Guerra’ es más idiomático en español que ‘la batalla’, aunque se mantiene el sentido de conflicto bélico determinado.
- source_word: וְאִישׁ אַחֵר
  english_pob_choice: and another man
  chosen_spanish: y otro hombre
  alternatives_spanish:
  - y otro
  - y otro varón
  lexicon: HALOT
  rationale: Mantiene la explicitud de איש y la referencia masculina del hebreo, sin volverlo impersonal.
- source_word: יְחַלְּלֶנּוּ
  english_pob_choice: make use of it
  chosen_spanish: la use
  alternatives_spanish:
  - haga uso de ella
  - la disfrute
  - la comience a usar
  lexicon: HALOT
  rationale: La repetición de חִלְּלֹו / יְחַלְּלֶנּוּ se traduce de forma consistente con ‘usar’. En español, ‘la use’ comunica el sentido práctico sin añadir una explicación interpretativa en el texto principal.
theological_decisions:
- issue: Sentido de חִלל en relación con la viña
  english_pob_reading: has not yet made use of it / another man make use of it
  chosen_spanish_reading: no la ha usado aún / y otro hombre la use
  alternative_spanish_readings:
  - no la ha dedicado aún / y otro hombre la dedique
  - no ha empezado a usarla / y otro hombre empiece a usarla
  rationale: El hebreo no afirma profanación cultual en este contexto; el uso contextual es el primer aprovechamiento ordinario de la viña. Mantengo esa tensión semántica sin introducir ‘profanar’ ni ‘dedicar’ en el texto principal.
  doctrine_reference: Levítico 19:23–25
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al evitar añadir ‘fruto’ en el texto principal. El inglés anterior optaba por una explicación más interpretativa (‘enjoyed its fruit’), pero la revisión corrigió eso para ajustarse mejor al verbo hebreo. En español se reflejó esa corrección con ‘no la ha usado aún’ / ‘la use’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en esta traducción cuando corresponda; este versículo no lo contiene.
  - ‘Viña’ se emplea como equivalente estable de כרם en este pasaje.
  - Se mantuvo la referencia masculina explícita (‘hombre’) siguiendo el hebreo.
  - La nota al pie conserva la alternativa semántica documentada sin saturar el texto principal.
