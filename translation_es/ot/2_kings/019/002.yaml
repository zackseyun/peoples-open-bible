base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/002.yaml
  text: And he sent Eliakim[a], who was over the household, and Shebna the scribe, and the elders of the priests, clothed in sackcloth, to Isaiah the prophet[b], the son of Amoz.
  footnotes:
