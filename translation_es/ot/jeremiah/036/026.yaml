revisions:
- from: Entonces el rey mandó a Jerameel, hijo del rey[a], y a Seraías hijo de Azriel, y a Selemías hijo de Abdeel, para que se apoderaran de Baruc el escriba y de Jeremías el profeta[b]; pero Yahvé los ocultó.
  to: Entonces el rey mandó a Jerameel, hijo del rey[a], y a Seraías, hijo de Azriel, y a Selemías, hijo de Abdeel, prender a Baruc el escriba y a Jeremías el profeta; pero Yahvé los ocultó.
  rationale: Se revisa «para que se apoderaran de» a «prender a» para reflejar con mayor naturalidad y precisión el valor contextual de לָקַחַת en español. Se elimina la nota [b] porque no ofrece una alternativa real distinta del texto principal. También se añaden comas en las aposiciones patronímicas para mejorar la legibilidad sin alterar el sentido.
