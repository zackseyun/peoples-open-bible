translation:
  language: es
  text: 'Es un lazo para el hombre decir precipitadamente: «Es santo»[a], y sólo después considerar sus votos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «consagrar precipitadamente». El verbo hebreo es difícil; el proverbio advierte contra hablar o actuar impulsivamente respecto de lo que se ha apartado para Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: lazo
  alternatives_spanish:
  - trampa
  - red
  lexicon: HALOT
  rationale: El sustantivo expresa una trampa o lazo. «Lazo» funciona bien en español proverbial y conserva la imagen de quedar atrapado por la propia conducta imprudente.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  lexicon: HALOT
  rationale: Aquí el singular genérico apunta a un individuo humano en un dicho sapiencial. «El hombre» mantiene ese valor representativo sin neutralizar innecesariamente el sujeto.
- source_word: יָלַע
  english_pob_choice: to rashly say
  chosen_spanish: prometer precipitadamente
  alternatives_spanish:
  - decir apresuradamente
  - consagrar de forma impulsiva
  - proferir temerariamente
  lexicon: HALOT
  rationale: El verbo es difícil; el contexto de votos favorece una acción verbal impulsiva respecto de algo santo. Dado que la revisión inglesa volvió a «say, “It is holy,”», el español puede expresar esa palabra apresurada como una promesa o declaración precipitada ligada a lo santo.
- source_word: קֹדֶשׁ
  english_pob_choice: It is holy
  chosen_spanish: «Es santo»
  alternatives_spanish:
  - «Es cosa santa»
  - «Es algo santo»
  - «Es sagrado»
  lexicon: HALOT
  rationale: El hebreo se refiere a algo puesto aparte para Dios. «Es santo» es breve, natural y conserva la declaración literal sin sobreespecificar el objeto.
- source_word: וְאַחַר
  english_pob_choice: and only afterward
  chosen_spanish: y sólo después
  alternatives_spanish:
  - y después
  - y luego
  lexicon: HALOT
  rationale: 'La partícula marca la secuencia que el proverbio reprende: primero la palabra impulsiva, luego la reflexión. «Sólo después» intensifica esa tardanza culpable.'
- source_word: נְדָרִים
  english_pob_choice: his vows
  chosen_spanish: sus votos
  alternatives_spanish:
  - sus promesas
  - sus votos a Dios
  lexicon: HALOT
  rationale: El sustantivo significa «votos». En español, «votos» es más preciso y solemne que «promesas» en este contexto religioso.
- source_word: לְבַקֵּר
  english_pob_choice: to consider
  chosen_spanish: considerar
  alternatives_spanish:
  - examinar
  - reflexionar sobre
  - investigar
  lexicon: HALOT
  rationale: El verbo denota examinar o escrutar. «Considerar» comunica bien la revisión posterior de los votos con estilo natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «dedicate something as holy» por «say, “It is holy,”» para acercarse más al hebreo. La versión española sigue esa línea y evita una paráfrasis excesiva, manteniendo la tensión lexical del verbo difícil con una formulación natural.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y proverbial.
  - «Votos» se usa en sentido religioso, no como promesas genéricas.
  - La nota[a] está anclada en el texto para cumplir con la exigencia de correspondencia exacta entre marca y footnote.
