translation:
  language: es
  text: Me alegraré en Jerusalén y me deleitaré en mi pueblo[a]; no se oirá más en ella[b] el sonido del llanto ni el sonido del clamor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Jerusalén» y «sobre mi pueblo». La preposición hebrea es literalmente «en», pero algunas traducciones la entienden en sentido relacional.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «en ella», refiriéndose a Jerusalén como ciudad femenina personificada.
    reason: lexical_alternative
  - marker: c
    text: O «el sonido de un clamor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַלְתִּי
  english_pob_choice: I will rejoice
  chosen_spanish: Me alegraré
  alternatives_spanish:
  - Me regocijaré
  - Me gozaré
  lexicon: HALOT
  rationale: El verbo גיל expresa alegría, regocijo o exultación. En español, «me alegraré» comunica con naturalidad una alegría intensa en primera persona divina, manteniendo el valor prospectivo profético del contexto.
- source_word: בִירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  lexicon: HALOT
  rationale: La preposición ב se rinde de forma más directa como «en». Aunque puede entenderse relacionalmente como «sobre», el sentido locativo es el más inmediato y claro aquí.
- source_word: וְשַׂשְׂתִּי
  english_pob_choice: and delight
  chosen_spanish: y me deleitaré
  alternatives_spanish:
  - y me alegraré
  - y me gozaré
  lexicon: HALOT
  rationale: שׂושׂ se superpone con גיל, pero conserva matiz propio. «Me deleitaré» preserva una distinción lexical respecto de «me alegraré» y sigue siendo idiomático en español.
- source_word: בְעַמִּי
  english_pob_choice: in my people
  chosen_spanish: en mi pueblo
  alternatives_spanish:
  - sobre mi pueblo
  lexicon: HALOT
  rationale: Se mantiene la preposición «en» por fidelidad al hebreo, y «pueblo» comunica de manera natural la referencia colectiva. «Mi pueblo» conserva la relación de pertenencia expresada por el sufijo posesivo.
- source_word: יִשָּׁמַע
  english_pob_choice: be heard
  chosen_spanish: se oirá
  alternatives_spanish:
  - será oído
  lexicon: HALOT
  rationale: 'El nifal de שׁמע aquí es pasivo: «ser oído» o, más naturalmente en español, «se oirá». Esta opción conserva la referencia auditiva del texto sin rigidez.'
- source_word: בָּהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella, Jerusalén
  - en la ciudad
  lexicon: HALOT
  rationale: El pronombre femenino singular alude a Jerusalén personificada. «En ella» preserva esa personificación y evita despersonalizar la ciudad con un impersonal.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: más
  alternatives_spanish:
  - ya
  lexicon: HALOT
  rationale: Con la negación, עוֹד expresa continuación cesada. En español, «no se oirá más» transmite con naturalidad la idea de que cesará a partir de ese punto.
- source_word: קוֹל בְּכִי
  english_pob_choice: the sound of weeping
  chosen_spanish: la voz del llanto
  alternatives_spanish:
  - el sonido del llanto
  - la voz del llanto
  lexicon: HALOT
  rationale: קוֹל abarca «voz» o «sonido». Se eligió «voz del llanto» porque suena natural en español bíblico actual y mantiene la fuerza auditiva; «llanto» conserva el sentido de בְּכִי.
- source_word: וְקוֹל זְעָקָה
  english_pob_choice: or the sound of crying
  chosen_spanish: ni la voz del clamor
  alternatives_spanish:
  - ni el sonido del clamor
  - ni la voz del grito
  lexicon: HALOT
  rationale: זְעָקָה puede ser clamor, grito u արտcry. «Clamor» preserva la amplitud semántica del término y combina bien con el paralelo de «llanto»; se mantiene la coordinación negativa del hebreo como «ni».
theological_decisions:
- issue: Personificación femenina de Jerusalén
  english_pob_reading: Retain 'in her' for Jerusalem
  chosen_spanish_reading: Mantener «en ella» para Jerusalén
  alternative_spanish_readings:
  - en it
  - en la ciudad
  rationale: El pronombre femenino singular refleja la personificación literaria de Jerusalén. Conservarlo en español mantiene ese rasgo sin añadir interpretación extra.
  doctrine_reference: Translation philosophy §1, §6
- issue: Dos verbos de alegría con matiz distinto
  english_pob_reading: Use 'rejoice' and 'delight'
  chosen_spanish_reading: Usar «me alegraré» y «me deleitaré»
  alternative_spanish_readings:
  - usar «me alegraré» para ambos
  - usar «me regocijaré» y «me alegraré»
  rationale: El hebreo usa dos verbos próximos pero no idénticos. Diferenciarlos en español conserva la plenitud poética y evita aplanar la repetición.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje muestra alta concordancia con el texto fuente y solo presenta matices léxicos menores ya resueltos en la línea española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva la primera persona divina en futuro prospectivo, coherente con la promesa escatológica del contexto.
  - Se preserva la personificación de Jerusalén mediante el femenino singular («en ella»).
  - Se evita la calca rígida de «voz» donde el español pide fluidez, pero se mantiene el campo auditivo del hebreo.
