translation:
  language: es
  text: Porque les profetizan mentiras[a], con el fin de alejarlos de su tierra; y yo los expulsaré[b][c], y ustedes perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falsedad».
    reason: lexical_alternative
  - marker: b
    text: O «los enviaré lejos de su tierra».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo pasa a una agencia divina explícita: «yo los expulsaré, y ustedes perecerán».'
    reason: cross_reference
lexical_decisions:
- source_word: שֶׁקֶר
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - una mentira
  - falsedad
  lexicon: HALOT
  rationale: שׁקר expresa falsedad engañosa; en este contexto pluralizado por el uso natural del español, «mentiras» transmite con claridad el contenido engañoso de la profecía y evita una formulación demasiado abstracta como «falsedad».
- source_word: נִבְּאִים לָכֶם
  english_pob_choice: are prophesying to you
  chosen_spanish: profetizan para ustedes
  alternatives_spanish:
  - están profetizando para ustedes
  - actúan como profetas para ustedes
  lexicon: HALOT
  rationale: El participio hebreo presenta acción en curso; el español puede expresarlo con presente simple en un enunciado profético. «Para ustedes» conserva el complemento dativo del texto y el tono directo de la acusación.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: con el fin de
  alternatives_spanish:
  - para
  - a fin de
  lexicon: HALOT
  rationale: La expresión marca propósito. «Con el fin de» es natural y formal en español, y preserva el valor final sin añadir matices ajenos.
- source_word: הַרְחִיק אֶתְכֶם מֵעַל אַדְמַתְכֶם
  english_pob_choice: remove you from your land
  chosen_spanish: alejarlos de su tierra
  alternatives_spanish:
  - quitarlos de su tierra
  - hacerlos salir de su tierra
  lexicon: HALOT
  rationale: El hifil de רחק expresa hacer distante/alejar. «Alejarlos de su tierra» recoge la fuerza espacial del verbo y evita agregar «lejos» porque no aparece explícitamente. «Tierra» es una equivalencia natural para el contexto territorial-covenantal de אַדְמָה.
- source_word: אַדְמַתְכֶם
  english_pob_choice: your land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su suelo
  - su terreno
  lexicon: HALOT
  rationale: Aunque el hebreo tiene la idea de suelo/terreno, en este contexto de exilio el español «tierra» es la forma más natural y comunica la referencia territorial sin perder el valor de pertenencia.
- source_word: וְהִדַּחְתִּי אֶתְכֶם
  english_pob_choice: and I will drive you out
  chosen_spanish: y yo los expulsaré
  alternatives_spanish:
  - y yo los echaré
  - y yo los desterraré
  lexicon: HALOT
  rationale: נדח en hifil expresa expulsar o arrojar fuera. «Expulsaré» es fuerte, claro y mantiene la agencia divina explícita; «desterraré» podría sonar más interpretativo y menos directo.
- source_word: וַאֲבַדְתֶּם
  english_pob_choice: and you will perish
  chosen_spanish: y ustedes perecerán
  alternatives_spanish:
  - y ustedes morirán
  - y serán destruidos
  lexicon: HALOT
  rationale: אבד aquí denota perecer/ser arruinados. «Perecerán» conserva la gravedad del término sin especificar más de lo que el hebreo dice.
theological_decisions:
- issue: Tensión entre el engaño de los profetas y la acción judicial de Dios
  english_pob_reading: The false prophets speak lies with the result/purpose of the people's removal, and God then declares, 'I will drive you out, and you will perish.'
  chosen_spanish_reading: 'Los profetas mienten para promover el alejamiento del pueblo, y luego Yahvé declara: «yo los expulsaré, y ustedes perecerán».'
  alternative_spanish_readings:
  - Los profetas mismos son los agentes implícitos de la expulsión en toda la cláusula
  - Todo el proceso se puede leer como una sola acción de juicio sin distinguir entre mentira humana y decreto divino
  rationale: La sintaxis hebrea distingue el propósito engañoso de los profetas de la acción explícita en primera persona atribuida a Yahvé. La traducción conserva esa tensión en vez de fusionar las agencias.
  doctrine_reference: Preservar la tensión teológica y sintáctica del texto.
- issue: Uso de «Yahvé» en la acción divina implícita
  english_pob_reading: I will drive you out
  chosen_spanish_reading: yo los expulsaré
  alternative_spanish_readings:
  - el Señor los expulsará
  - Dios los expulsará
  rationale: Aunque el sujeto explícito del verbo es primera persona sin nombrar a Yahvé en este verso, el contexto inmediato de Jeremías atribuye la declaración a Yahvé. La redacción mantiene la primera persona y no añade un sustituto reverencial que el hebreo no emplea aquí.
  doctrine_reference: Convención POB sobre el nombre divino y fidelidad a la primera persona del hebreo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió el plural natural «mentiras» en lugar de «una mentira», y se evitó añadir «lejos» porque no está explícito en el hebreo. También se preservó la distinción entre el propósito engañoso de los profetas y la acción directa de Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino de referencia en las decisiones teológicas, pero en el texto del versículo el hebreo no nombra a Yahvé explícitamente; por eso se mantuvo la primera persona («yo los expulsaré»).
  - «Tierra» se emplea para אַדְמָה por naturalidad contextual, sin perder el matiz territorial.
  - No se tradujo mecánicamente «profetizan» como forma perifrástica porque el presente simple suena natural en español y conserva el valor aspectual en contexto.
