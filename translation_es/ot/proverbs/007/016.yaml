    issue: «colgaduras» para מַרְבַדִּים
    rationale: Aunque intenta comunicar telas decorativas, en español normalmente se entiende como cortinajes o paños colgantes. El contexto y la decisión inglesa «coverings» piden más bien cobertores/coberturas extendidos sobre el lecho.
  - severity: low
    issue: La nota al pie repite «colgaduras»
    rationale: Si se corrige el término principal, conviene armonizar la explicación de la nota para que describa mejor cobertores o piezas textiles del lecho, no telas colgantes.
