translation:
  language: es
  text: Ahora el resto de los hechos de Amon[a], lo que hizo—¿no están escritos en el Libro[b] de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'actos' para 'hechos'; el hebreo דִּבְרֵי significa literalmente 'palabras' o 'asuntos', pero en esta fórmula real se refiere a los actos registrados del rey.
    reason: lexical_alternative
  - marker: b
    text: '''Libro'' alude a un antiguo registro escrito, probablemente un rollo; la frase también podría verterse ''los anales de los reyes de Judá''.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora bien, el resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa 'resto' o 'lo que queda'. En esta fórmula real, 'Ahora, el resto de' mantiene el valor de transición y suena natural en español sin añadir contenido ajeno.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - deeds
  - palabras
  - asuntos
  lexicon: HALOT
  rationale: Aunque literalmente significa 'palabras' o 'asuntos', en esta fórmula historiográfica se refiere a las acciones registradas del rey. 'Hechos' conserva la referencia a sus actos de manera clara y natural en español.
- source_word: אָמ֖וֹן
  english_pob_choice: Amon
  chosen_spanish: Amon
  alternatives_spanish:
  - Amón
  lexicon: nombre propio
  rationale: Se translitera el nombre propio conforme al uso bíblico estándar en español. Se evita adaptar la forma a una vocalización ajena al texto base.
- source_word: אֲשֶׁ֣ר עָשָׂ֑ה
  english_pob_choice: what he did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - lo cual hizo
  - que hizo
  lexicon: HALOT
  rationale: La cláusula relativa especifica el contenido de los hechos registrados. 'Lo que hizo' conserva el sentido explicativo y la fluidez del español moderno.
- source_word: הֲ/לֹא הֵ֣ם
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están
  - ¿no se hallan
  lexicon: HALOT
  rationale: La pregunta retórica exige una respuesta afirmativa. En español, '¿no están...' transmite de forma natural esa expectativa sin perder el tono formal del resumen real.
- source_word: כְּתוּבִ֗ים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - inscritos
  lexicon: HALOT
  rationale: El participio pasivo 'escritos' es la correspondencia más directa y sobria. 'Registrados' sería más interpretativo; se conserva el valor literal del verbo sin perder la función archivística.
- source_word: עַל סֵ֛פֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque el soporte antiguo probablemente era un rollo, en español la expresión estable es 'en el Libro'. Se mantiene la referencia a un documento escrito de archivo.
- source_word: דִּבְרֵ֥י הַ/יָּמִ֖ים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los Anales
  - las memorias
  lexicon: HALOT
  rationale: La expresión designa un tipo de registro histórico real. 'Crónicas' es la equivalencia más reconocible y fiel en español, y evita una paráfrasis excesiva.
- source_word: לְ/מַלְכֵ֥י יְהוּדָֽה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - acerca de los reyes de Judá
  - para los reyes de Judá
  lexicon: HALOT
  rationale: El לְ aquí introduce asociación/titularidad del registro, no finalidad. 'De los reyes de Judá' reproduce con naturalidad el título del archivo histórico.
theological_decisions:
- issue: Fórmula regnal de cierre con cita de fuente histórica
  english_pob_reading: are they not written in the Book of the Chronicles of the Kings of Judah?
  chosen_spanish_reading: ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  alternative_spanish_readings:
  - ¿no están registrados en el Libro de las Crónicas de los reyes de Judá?
  - ¿no se hallan escritos en el Libro de las Crónicas de los reyes de Judá?
  rationale: No hay problema doctrinal directo; la decisión afecta el tono y la fidelidad historiográfica. Se preserva la forma retórica de la fuente y el carácter de archivo oficial sin introducir solemnidad ajena al hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones posteriores; el borrador español sigue esa lectura estable, manteniendo la fórmula regnal y la referencia archivística sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa 'Crónicas' de manera consistente con el valor archivístico de דִּבְרֵי הַיָּמִים.
  - Se mantiene 'reyes de Judá' en minúscula para el sustantivo común, siguiendo uso editorial bíblico en español.
  - Se preserva una pregunta retórica directa, acorde con el hebreo הֲלֹא y con la versión inglesa auditada.
