    rationale: La revisión inglesa final usa presente ('they are consumed') y deja el futuro como alternativa. El español invierte esa prioridad al poner 'serán consumidos' en el texto principal.
  - severity: high
    issue: Anclaje incorrecto de las notas al pie
    rationale: La nota [a] comenta la cláusula difícil de embriaguez, no 'espinos'; la nota [b] comenta el valor verbal de 'son/serán consumidos', no 'rastrojo seco'. Esto incumple la exigencia de que el marcador aparezca en la palabra o frase relevante.
  - severity: low
    issue: Puntuación mejorable en la repetición enfática
    rationale: '''Y como borrachos están borrachos'' es comprensible, pero una coma tras ''borrachos'' ayuda a la lectura sin alterar el sentido.'
