translation:
  language: es
  text: Después, prepararon para sí mismos y para los sacerdotes[a], porque los sacerdotes, los hijos de Aarón, estaban ocupados en ofrecer el holocausto y las porciones de grasa hasta la noche. Por eso los levitas prepararon para sí mismos y para los sacerdotes, los hijos de Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ellos» en ambas ocurrencias de «para sí mismos»; el pronombre hebreo no es explícitamente reflexivo, pero el contexto sugiere con fuerza que los levitas prepararon también su propia comida, además de la de los sacerdotes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Luego
  - Después
  lexicon: HALOT
  rationale: El adverbio temporal marca una acción subsiguiente; «Después de eso» conserva la secuencia narrativa de forma natural en español actual.
- source_word: הֵכִינוּ
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - hicieron listo
  - prepararon comida
  lexicon: HALOT
  rationale: El verbo hifil de כון indica preparar o disponer. «Prepararon» es lo bastante amplio para incluir la preparación implícita sin añadir un objeto no expresado en hebreo.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - para ellos
  - para sí
  lexicon: HALOT
  rationale: El pronombre no es reflexivo en forma, pero el contexto sugiere que los levitas prepararon provisiones también para su propio uso; «para sí mismos» hace explícita esa referencia sin forzar el sentido.
- source_word: וְלַכֹּהֲנִים
  english_pob_choice: and for the priests
  chosen_spanish: y para los sacerdotes
  alternatives_spanish:
  - y para los sacerdotes aarónicos
  - y para los clérigos
  lexicon: HALOT
  rationale: Es una frase dativa directa; «sacerdotes» mantiene la identificación funcional sin introducir terminología eclesial posterior.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón por la cual los levitas debían preparar para los sacerdotes; «porque» expresa claramente la causalidad.
- source_word: הַכֹּהֲנִים בְּנֵי אַהֲרֹן
  english_pob_choice: the priests, the sons of Aaron
  chosen_spanish: los sacerdotes, los hijos de Aarón
  alternatives_spanish:
  - los sacerdotes aarónicos
  - los sacerdotes, hijos de Aarón
  lexicon: HALOT
  rationale: Se conserva la aposición genealógica del hebreo. «Hijos de Aarón» preserva el lenguaje de linaje y pacto.
- source_word: בְּהַעֲלוֹת
  english_pob_choice: were occupied in offering up
  chosen_spanish: estaban ocupados en ofrecer
  alternatives_spanish:
  - estaban ofreciendo
  - estaban dedicados a ofrecer
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה en hifil significa ofrecer. «Estaban ocupados en ofrecer» refleja la acción en curso y la razón práctica de la demora.
- source_word: הָעוֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: la ofrenda quemada
  alternatives_spanish:
  - el holocausto
  - la ofrenda holocausta
  lexicon: HALOT
  rationale: Se prefiere «ofrenda quemada» por su transparencia y porque evita el término «holocausto», que en español moderno puede cargar asociaciones no deseadas o sonar menos claro. Conserva el valor sacrificial de עֹלָה.
- source_word: וְהַחֲלָבִים
  english_pob_choice: and the fat portions
  chosen_spanish: y las porciones de grasa
  alternatives_spanish:
  - y las grasas
  - y las porciones grasas
  lexicon: HALOT
  rationale: En contexto cultual, חֲלָבִים designa las porciones de grasa ofrecidas sobre el altar. «Porciones de grasa» comunica ese sentido ritual con precisión.
- source_word: עַד לָיְלָה
  english_pob_choice: until night
  chosen_spanish: hasta la noche
  alternatives_spanish:
  - hasta la noche cerrada
  - hasta anochecer
  lexicon: HALOT
  rationale: La frase expresa duración hasta la llegada de la noche. «Hasta la noche» es natural y fiel sin concretar indebidamente la hora exacta.
- source_word: וְהַלְוִיִּם
  english_pob_choice: So the Levites
  chosen_spanish: Así que los levitas
  alternatives_spanish:
  - Y los levitas
  - Por eso los levitas
  lexicon: HALOT
  rationale: La conjunción reanuda el hilo discursivo con resultado lógico; «Así que» expresa bien la consecuencia en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de 2 Crónicas 35:14 y coincide con el audit trail inglés: mantiene la secuencia temporal, la relación causal, la aposición «los hijos de Aarón» y el trasfondo sacrificial. No se requieren revisiones textuales adicionales según el control de concordancia proporcionado.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se usa «ofrenda quemada» como equivalente transparente de עֹלָה, en vez de un calco litúrgico menos claro.
  - «Porciones de grasa» conserva la especificidad sacrificial de חֲלָבִים.
  - La nota [a] se ancla en la primera ocurrencia de «para sí mismos» y se entiende para ambas por la repetición del mismo hebraísmo.
