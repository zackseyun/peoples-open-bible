translation:
  language: es
  text: 'Y ellos dijeron a Jeremías el profeta: «Por favor, que nuestra súplica[a] llegue delante de ti, y ruega por nosotros a Yahvé tu Dios, por todo este remanente, pues hemos quedado pocos de entre muchos, como tus ojos nos ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que nuestra súplica caiga delante de ti», un giro idiomático para presentar una petición fervorosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפָּל
  english_pob_choice: let ... fall / come before you
  chosen_spanish: llegue delante de ti
  alternatives_spanish:
  - caiga delante de ti
  - se presente delante de ti
  lexicon: HALOT
  rationale: El hebreo usa el verbo נפל en una expresión idiomática con תְחִנָּה y לִפְנֵי. En español, «llegue delante de ti» comunica el sentido de una petición que se presenta ante alguien sin forzar un calco de «caiga» que sonaría menos natural.
- source_word: תְחִנָּתֵנוּ
  english_pob_choice: our plea
  chosen_spanish: nuestra súplica
  alternatives_spanish:
  - nuestra petición
  - nuestra plegaria
  lexicon: HALOT
  rationale: תְּחִנָּה es una petición ferviente, hecha con ruego por favor o misericordia. «Súplica» conserva esa intensidad y funciona bien en registro bíblico en español.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: La construcción expresa ubicación relacional ante el destinatario de la petición. «Delante de ti» sigue de cerca la imagen hebrea y resulta idiomático en español.
- source_word: וְהִתְפַּלֵּל בַּעֲדֵנוּ
  english_pob_choice: and pray for us
  chosen_spanish: y ruega por nosotros
  alternatives_spanish:
  - y intercede por nosotros
  - y ora por nosotros
  lexicon: HALOT
  rationale: El hitpael de פלל aquí tiene el sentido de orar/interceder. «Ruega por nosotros» es natural en español y conserva el valor de petición a favor de otro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en el texto principal, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: Aquí el hebreo presenta al Dios de Israel como el Dios de Jeremías. En español, «tu Dios» refleja correctamente la relación referida por los hablantes.
- source_word: בְּעַד כָּל הַשְּׁאֵרִית הַזֹּאת
  english_pob_choice: for all this remnant
  chosen_spanish: por todo este remanente
  alternatives_spanish:
  - por todo este resto
  - por esta remanencia entera
  lexicon: HALOT
  rationale: «Remanente» preserva el término técnico y teológico de Jeremías para el grupo que queda después del juicio. «Por» expresa la intercesión a favor de ese grupo.
- source_word: נִשְׁאַרְנוּ
  english_pob_choice: we are left
  chosen_spanish: hemos quedado
  alternatives_spanish:
  - hemos sido dejados
  - permanecemos
  lexicon: HALOT
  rationale: El nifal de שׁאר comunica el estado de haber quedado. «Hemos quedado» es natural en español y mantiene la idea de saldo restante sin forzar una pasiva dura.
- source_word: מְעַט מֵהַרְבֵּה
  english_pob_choice: as few out of many
  chosen_spanish: pocos de entre muchos
  alternatives_spanish:
  - muy pocos de muchos
  - unos pocos de muchos
  lexicon: HALOT
  rationale: La comparación contrasta una cantidad reducida con una cantidad anterior mayor. «Pocos de entre muchos» conserva ese contraste con fluidez en español.
- source_word: כַּאֲשֶׁר עֵינֶיךָ רֹאוֹת אֹתָנוּ
  english_pob_choice: as your eyes see us
  chosen_spanish: como tus ojos nos ven
  alternatives_spanish:
  - tal como tú nos ves
  - como puedes vernos
  lexicon: HALOT
  rationale: La imagen de los ojos de Jeremías viendo al grupo se mantiene literal y comprensible. «Como tus ojos nos ven» preserva el detalle retórico del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea explícitamente el Tetragrámaton. Conforme a la política del proyecto, se conserva el nombre divino como «Yahvé» en la traducción principal, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conservación del vocabulario de remanente
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - resto
  - supervivientes
  rationale: «Remanente» mantiene la carga profética e histórica del término en Jeremías, sin diluir su peso teológico ni convertirlo en una expresión más genérica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: 'El contexto auditado en inglés revisó una traducción más literal con «fall before you» hacia «come before you» para mayor naturalidad, sin perder la imagen idiomática. La versión española sigue ese mismo equilibrio: conserva el esquema hebreo de petición presentada ante el destinatario, pero lo formula con un verbo natural en español.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» para יהוה de manera consistente con el proyecto.
  - «Remanente» se mantiene como término técnico profético.
  - No se usa «Cristo» ni vocabulario cristológico ajeno al pasaje.
  - La fórmula de intercesión se traduce con un verbo de ruego natural en español, sin borrar el matiz de petición a favor de otros.
