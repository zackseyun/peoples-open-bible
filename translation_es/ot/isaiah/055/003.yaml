  text: הַטּ֤וּ אָזְנְ/כֶם֙ וּ/לְכ֣וּ אֵלַ֔/י שִׁמְע֖וּ וּ/תְחִ֣י נַפְשְׁ/כֶ֑ם וְ/אֶכְרְתָ֤ה לָ/כֶם֙ בְּרִ֣ית עוֹלָ֔ם חַֽסְדֵ֥י דָוִ֖ד הַ/נֶּאֱמָנִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/055/003.yaml
  text: Incline your ear and come to me; hear[a], and your soul shall live; and I will make with you an everlasting covenant—the faithful covenant love promised to David.
  footnotes:
  - marker: a
    text: Or, 'the sure mercies of David' / 'the steadfast love promised to David.' The Hebrew phrase can be rendered in several ways because חֶסֶד carries senses such as covenant love, kindness, or mercy.
    reason: lexical_alternative
