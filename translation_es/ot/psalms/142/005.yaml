    rationale: La forma hebrea significa literalmente «de mí». El borrador explica la naturalidad en español, pero aquí conviene conservar más de cerca la imagen de que el refugio ha desaparecido de su lado o alcance, no solo que ya no existe «para» él.
  - severity: low
