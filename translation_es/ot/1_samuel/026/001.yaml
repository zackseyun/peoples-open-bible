translation:
  language: es
  text: 'Entonces los zifitas[a] vinieron a Saúl en Guibeá, diciendo: «¿No está David escondido en la colina de Hacila, que está frente al desierto[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres de Zif». El hebreo usa un gentilicio plural; «zifitas» resume la referencia de manera natural.
    reason: lexical_alternative
  - marker: b
    text: O «frente a Jesimón» o «frente a la tierra desolada». El hebreo puede entenderse como un sustantivo común («desierto / tierra desolada») o como el nombre regional «Jeshimón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vinieron
  alternatives_spanish:
  - Y ... vinieron
  - Entonces ... llegaron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la progresión discursiva y «vinieron» reproduce el movimiento básico con naturalidad en español.
- source_word: הַזִּפִים
  english_pob_choice: the Ziphites
  chosen_spanish: los zifitas
  alternatives_spanish:
  - los hombres de Zif
  - los habitantes de Zif
  lexicon: HALOT
  rationale: El plural gentilicio se refiere a la gente de Zif. «Zifitas» mantiene la identidad geográfica/étnica de forma breve y transparente.
- source_word: הַגִּבְעָתָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - a Guibeá
  - en Gibeá
  lexicon: HALOT
  rationale: La he direccional señala movimiento hacia el lugar, pero en español, con el verbo «vinieron a Saúl», «en Guibeá» expresa el escenario de forma fluida sin duplicar la dirección.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula introductoria del discurso directo; «diciendo» es la equivalencia transparente y directa.
- source_word: הֲלוֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está ...?
  alternatives_spanish:
  - ¿Acaso no está ...?
  - ¿No es verdad que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera confirmación; «¿No está ...?» conserva el tono formal sin volverlo demasiado coloquial.
- source_word: מִסְתַּתֵּר
  english_pob_choice: hiding
  chosen_spanish: escondiéndose
  alternatives_spanish:
  - ocultándose
  - está escondido
  lexicon: HALOT
  rationale: El hitpael expresa que David se mantiene oculto; «escondiéndose» conserva el matiz reflexivo y la acción en curso.
- source_word: בְּגִבְעַת הַחֲכִילָה
  english_pob_choice: on the hill of Hachilah
  chosen_spanish: en la colina de Hacila
  alternatives_spanish:
  - en el cerro de Hacila
  - sobre la colina de Hacila
  lexicon: HALOT
  rationale: גבעה es una elevación/hill; «colina» es natural en español y mantiene el sentido topográfico. Se conserva el nombre propio en forma hispanizada usual.
- source_word: עַל פְּנֵי הַיְשִׁימֹן
  english_pob_choice: which is before the wasteland
  chosen_spanish: que está frente al desierto
  alternatives_spanish:
  - que está delante del desierto
  - que está ante el desierto
  - que está frente a Jesimón
  lexicon: HALOT
  rationale: La expresión geográfica עַל־פְּנֵי se rinde con una relación espacial literal y natural en español. «Desierto» traduce el sentido común de הַיְשִׁימֹן, mientras que la alternativa toponímica se preserva en nota.
translation_notes:
  revision_awareness: Se siguió la revisión más literal del audit trail inglés para עַל־פְּנֵי, evitando una interpretación direccional como «al este de». También se mantuvo la opción topográfica general «desierto» para הַיְשִׁימֹן, dejando abierta la posible lectura toponímica en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - «Saúl», «David» y «Guibeá» se mantienen con grafía española habitual y consistente.
  - Se evita «SEÑOR» porque no corresponde al nombre divino en este versículo.
  - La puntuación del discurso directo sigue convenciones españolas modernas.
