translation:
  language: es
  text: Y salieron[a] los que atendían a Holofernes y todos sus servidores, y la llevaron a la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa literal: «los que dormían junto a Holofernes» o «los que yacían cerca de Holofernes». El participio griego puede leerse más literalmente como una referencia a personas que dormían o se acostaban cerca de él, pero aquí probablemente designa a los que estaban en su servicio inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - fueron afuera
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica salida o movimiento hacia afuera. «Salieron» es natural en español y conserva el sentido direccional sin añadir matices innecesarios.
- source_word: οἱ παρακαθεύδοντες Ὀλοφέρνῃ
  english_pob_choice: those attending Holofernes
  chosen_spanish: los que estaban al cuidado de Holofernes
  alternatives_spanish:
  - los que dormían junto a Holofernes
  - los que estaban cerca de Holofernes
  - los que atendían a Holofernes
  lexicon: LSJ
  rationale: El participio puede sugerir literalmente dormir o yacer junto a alguien, pero en este contexto la función parece ser la de personas asignadas a su custodia o proximidad. «Los que estaban al cuidado de Holofernes» transmite esa función de manera clara en español sin fijar indebidamente una imagen corporal o íntima.
- source_word: θεράποντες
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - servidores de confianza
  - criados
  lexicon: LSJ
  rationale: θεράπων puede abarcar servidor, asistente o atendiente. «Servidores» mantiene la idea de servicio personal y funciona bien junto con la primera expresión, evitando un término más técnico o demasiado doméstico.
- source_word: εἰσήγαγον
  english_pob_choice: they brought
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la introdujeron
  - la condujeron
  - la llevaron dentro
  lexicon: BDAG
  rationale: εἰσάγω significa llevar o introducir adentro. «La llevaron» es idiomático en español; el complemento «a la tienda» ya expresa el destino de entrada, por lo que no hace falta repetir «dentro».
- source_word: σκηνήν
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el campamento
  - la carpa
  - el pabellón
  lexicon: LSJ
  rationale: En este contexto militar, σκηνή es literalmente una tienda de campaña. «Tienda» es la forma más natural y precisa en español bíblico actual.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un acuerdo alto y no requieren cambios sustanciales. La principal decisión de estilo fue resolver el participio παρακαθεύδοντες en español con una expresión funcional que conserve la ambigüedad controlada del original sin forzar una lectura demasiado literal.
  spanish_consistency_notes:
  - Se usó «Holofernes» para el nombre propio, conforme a la práctica habitual del proyecto.
  - Se prefirió el pretérito simple («salieron», «llevaron») para reflejar la sucesión narrativa del griego aoristo.
  - «La tienda» se mantuvo como equivalente directo de σκηνή en contexto militar.
  - La nota al pie se vinculó únicamente al sintagma con mayor tensión léxica, sin añadir otras notas innecesarias.
