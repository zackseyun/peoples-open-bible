translation:
  language: es
  text: Asa hizo lo recto ante los ojos de Yahvé, como lo había hecho David su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'David su antepasado'; 'padre' aquí refleja ascendencia dinástica más que paternidad inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - actuó
  - obró
  lexicon: HALOT
  rationale: El verbo עשה en esta fórmula evaluativa real significa 'hacer/obrar'. En español, 'hizo' reproduce de manera natural la construcción bíblica sin perder el valor de acción concreta.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asa
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la convención habitual en español bíblico.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo correcto
  - lo justo
  - lo recto y bueno
  lexicon: HALOT
  rationale: יָשָׁר expresa rectitud, lo recto/upright. 'Lo recto' conserva el juicio moral del hebreo con una forma natural en español, sin ampliar el sentido a 'justicia' legal.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la presencia de
  - en la opinión de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se mantiene con una fórmula igualmente transparente en español. 'Ante los ojos de' preserva la metáfora de evaluación desde la perspectiva de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino, no el sustituto 'SEÑOR'. 'Yahvé' es la forma española estándar de la transliteración aprobada para el Tetragrámaton.
- source_word: כְּדָוִד
  english_pob_choice: as David
  chosen_spanish: como lo había hecho David
  alternatives_spanish:
  - como David
  - como había hecho David
  lexicon: HALOT
  rationale: El כ comparativo introduce una comparación de conducta; en español, la repetición de la acción en la segunda cláusula ('como lo había hecho David') hace explícita la comparación y suena natural en el registro bíblico.
- source_word: אָבִיו
  english_pob_choice: his father had done
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su ancestro
  - su padre
  lexicon: HALOT
  rationale: אָב puede abarcar padre o antepasado. Se mantiene 'padre' por fidelidad al texto y al giro dinástico, dejando la posible referencia ancestral para nota si fuera necesario. En español, el antecedente queda claro en la clausula comparativa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El versículo usa directamente el Tetragrámaton. La traducción española conserva el nombre propio divino en vez de sustituirlo por un título, alineándose con la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Dynastic use of 'father' for David
  english_pob_reading: retain 'father' in the main text as dynastic/ancestral language
  chosen_spanish_reading: mantener 'padre' en el texto principal como lenguaje dinástico/ancestral
  alternative_spanish_readings:
  - antepasado
  - ancestro
  rationale: En la fórmula real hebrea, אָב no requiere padre biológico inmediato; puede señalar antecesor en la línea dinástica. 'Su padre' conserva el paralelismo y la formulación del hebreo, mientras la posible lectura ancestral se puede aclarar en nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: El texto base y el repaso más reciente coinciden en mantener la lectura principal sin cambios sustanciales; la única decisión visible en español es fijar una formulación natural y reverente que conserve la metáfora hebrea y el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - La fórmula 'ante los ojos de' conserva la metáfora evaluativa del hebreo.
  - '''Lo recto'' refleja el valor moral de יָשָׁר sin introducir una interpretación más amplia.'
  - '''Padre'' se conserva en el texto principal para respetar el giro dinástico del hebreo.'
