theological_decisions:
- issue: Nature of the angels' judgment
  chosen_reading: the angels are judged
  alternative_readings:
  - the angels are condemned
  - the angels are punished
  rationale: The Ge'ez verb is judicial. The broader context implies punitive judgment, but the main text keeps the more textually explicit 'judged' and leaves stronger verdict language aside.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relationship between angelic action and the waters' change
  chosen_reading: the waters change in connection with the angels' judgment and ascent
  alternative_readings:
  - the waters are an instrument of punishment
  - the waters merely react symbolically
  rationale: The verse links cosmic waters to angelic judgment, but does not fully explain mechanism. The translation preserves the apocalyptic linkage without systematizing it.
