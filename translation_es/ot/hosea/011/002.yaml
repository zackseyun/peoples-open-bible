translation:
  language: es
  text: Cuanto más les llamaban[a], más se alejaban de ellos; seguían sacrificando a los baales y quemando incienso a los ídolos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así como los llamaban, así ellos se alejaban de ellos». El hebreo deja sin especificar el sujeto de «llamaban».'
    reason: alternative_reading
  - marker: b
    text: 'O: «a imágenes talladas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ לָהֶם
  english_pob_choice: they called to them
  chosen_spanish: les llamaban
  alternatives_spanish:
  - los llamaban
  - llamaban a ellos
  lexicon: HALOT
  rationale: El hebreo usa un perfecto qal plural con ל + sufijo, de sentido activo e indefinido. En español, «les llamaban» conserva la acción plural y evita decidir innecesariamente quién llama, manteniendo la ambigüedad auditada en el texto fuente.
- source_word: כֵּן
  english_pob_choice: the more
  chosen_spanish: cuanto más
  alternatives_spanish:
  - así como
  - tan ... como
  lexicon: HALOT
  rationale: Aquí כֵּן expresa correlación proporcional. «Cuanto más» reproduce de manera natural en español la construcción correlativa «cuanto más ... más ...», sin perder el paralelismo del hebreo.
- source_word: הָלְכוּ מִפְּנֵי הֶם
  english_pob_choice: they went away from them
  chosen_spanish: se alejaban de ellos
  alternatives_spanish:
  - se iban de su presencia
  - se apartaban de ellos
  lexicon: HALOT
  rationale: La expresión verbal con מן + פנים comunica retirada o apartamiento de la presencia de alguien. «Se alejaban de ellos» es idiomático en español y conserva la relación de rechazo señalada por el contexto.
- source_word: לַבְּעָלִים
  english_pob_choice: to the Baals
  chosen_spanish: a los baales
  alternatives_spanish:
  - a los Baales
  - a Baal
  lexicon: HALOT
  rationale: El plural hebreo apunta a las distintas deidades/cultos de Baal. «Baales» mantiene ese plural en español y evita reducirlo indebidamente a un nombre singular.
- source_word: יְזַבֵּחוּ
  english_pob_choice: they kept sacrificing
  chosen_spanish: seguían sacrificando
  alternatives_spanish:
  - sacrificaban
  - solían sacrificar
  lexicon: HALOT
  rationale: El imperfecto en este marco poético-profético sugiere acción repetida o habitual. «Seguían sacrificando» transmite bien el matiz iterativo sin sobreparafrasear.
- source_word: לַפְּסִלִים
  english_pob_choice: to idols
  chosen_spanish: a los ídolos
  alternatives_spanish:
  - a las imágenes talladas
  - a las imágenes esculpidas
  lexicon: HALOT
  rationale: פְּסִלִים son imágenes cultuales talladas. «Ídolos» es el equivalente natural en español; se preserva la idea material más específica en la nota correspondiente por si se desea mayor precisión.
- source_word: יְקַטֵּרוּן
  english_pob_choice: burning incense
  chosen_spanish: quemando incienso
  alternatives_spanish:
  - haciendo humo de incienso
  - ofreciendo incienso
  lexicon: HALOT
  rationale: El piel de קטר en contexto cultual denota hacer humo/ofrecer incienso. En español, «quemando incienso» expresa de forma clara y litúrgicamente comprensible la acción ritual sin alterar su sentido.
theological_decisions:
- issue: Sujeto no especificado de «les llamaban»
  english_pob_reading: Retain the Hebrew's indefinite plural without identifying the callers explicitly.
  chosen_spanish_reading: Mantener un plural indefinido sin precisar quién llamaba.
  alternative_spanish_readings:
  - Dios les llamaba
  - los profetas les llamaban
  - eran llamados
  rationale: El hebreo no identifica explícitamente el sujeto y el contexto admite más de una lectura. La traducción española conserva esa tensión en lugar de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con la revisión inglesa más reciente, que no introdujo cambios. La redacción española mantiene la ambigüedad del sujeto en la primera cola y la equivalencia lexical de פְּסִלִים como «ídolos», con la alternativa más específica en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando aparezca el Tetragrámaton; este versículo no contiene el nombre divino.
  - «baales» conserva el plural cultual del hebreo.
  - «íncienso» se emplea en sentido ritual, no culinario ni figurado.
