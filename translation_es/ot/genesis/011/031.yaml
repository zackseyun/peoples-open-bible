translation:
  language: es
  text: Terah tomó a Abram, su hijo, a Lot, hijo de Harán, su nieto[a], y a Sarai, su nuera, la esposa de Abram, su hijo; y salieron con ellos de Ur de los caldeos para ir a la tierra de Canaán. Llegaron hasta Harán y se establecieron allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Lot, hijo de Harán, hijo de su hijo»; es decir, Lot era nieto de Terah.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y llegaron a Harán y vivieron allí». El hebreo dice más literalmente: «Llegaron hasta Harán y se establecieron allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - llevó
  lexicon: HALOT
  rationale: לקח en este contexto narrativo expresa una acción de tomar o llevar a miembros de la familia para partir. «Tomó» conserva la simplicidad verbal del hebreo y de la decisión inglesa, sin añadir matices que el texto no exige.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - a su hijo
  lexicon: HALOT
  rationale: La relación filial de Abram con Terah se expresa de modo directo con «su hijo». En español, la aposición con coma mantiene la claridad genealógica sin volver rígida la sintaxis.
- source_word: לוֹט בֶּן הָרָן בֶּן בְּנוֹ
  english_pob_choice: Lot the son of Haran, his grandson
  chosen_spanish: Lot, hijo de Harán, hijo de su hijo
  alternatives_spanish:
  - Lot, hijo de Harán, su nieto
  - Lot, hijo de Harán, hijo del suyo
  lexicon: HALOT
  rationale: El hebreo presenta la cadena literal «hijo de Harán, hijo de su hijo». La redacción española conserva esa estructura para no borrar la identificación intermedia, que el inglés POB también preserva conceptualmente al explicar que es el nieto de Terah.
- source_word: כַּלָּתוֹ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  lexicon: HALOT
  rationale: כלה aquí designa la nuera de Terah. «Nuera» es el equivalente natural y preciso en español, sin perder la relación familiar.
- source_word: אֵשֶׁת אַבְרָם בְּנוֹ
  english_pob_choice: the wife of Abram his son
  chosen_spanish: esposa de Abram, su hijo
  alternatives_spanish:
  - la esposa de Abram, su hijo
  - la mujer de Abram, su hijo
  lexicon: HALOT
  rationale: La apposición hebrea aclara la identidad de Sarai dentro del grupo familiar. «Esposa de Abram» conserva la relación matrimonial; añadir «su hijo» mantiene la referencia a Terah sin depender de una reformulación excesiva.
- source_word: וַיֵּצְאוּ
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se fueron
  lexicon: HALOT
  rationale: יצא en contexto de viaje se traduce naturalmente por «salir». El plural del verbo se refleja con «salieron», respetando la forma masorética sin resolver por paráfrasis el asunto sintáctico.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: El sufijo plural exige «con ellos». Aunque la referencia es algo estrecha después de la lista de personas, mantenerlo así evita suavizar el giro hebreo documentado por el auditorio inglés.
- source_word: מֵאוּר כַּשְׂדִּים
  english_pob_choice: from Ur of the Chaldeans
  chosen_spanish: de Ur de los caldeos
  alternatives_spanish:
  - de Ur de los caldeos
  lexicon: HALOT
  rationale: «Ur de los caldeos» es la forma española clara y estándar para el topónimo. «Caldeos» reproduce el gentilicio tradicional sin necesidad de adaptar el nombre propio.
- source_word: לָלֶכֶת אַרְצָה כְּנַעַן
  english_pob_choice: to go to the land of Canaan
  chosen_spanish: para ir a la tierra de Canaán
  alternatives_spanish:
  - para dirigirse a la tierra de Canaán
  - para entrar en la tierra de Canaán
  lexicon: HALOT
  rationale: El infinitivo de finalidad con el sufijo direccional expresa propósito y destino. «Para ir a la tierra de Canaán» es fiel y natural en español; conserva el valor teleológico sin sobreinterpretarlo.
- source_word: וַיָּבֹאוּ עַד חָרָן
  english_pob_choice: they came as far as Haran
  chosen_spanish: Llegaron hasta Harán
  alternatives_spanish:
  - vinieron hasta Harán
  - llegaron a Harán
  lexicon: HALOT
  rationale: עַד marca límite o alcance, no solo llegada simple. «Hasta Harán» conserva ese matiz de extensión del camino que el inglés POB expresó con «as far as Haran».
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: they settled there
  chosen_spanish: se establecieron allí
  alternatives_spanish:
  - vivieron allí
  - se quedaron allí
  - habitaron allí
  lexicon: HALOT
  rationale: ישב en contexto de asentamiento migratorio suele indicar establecerse o habitar. «Se establecieron allí» comunica la permanencia implícita mejor que un simple «se quedaron».
theological_decisions:
- issue: Tratamiento del nombre divino en esta unidad
  english_pob_reading: No aparece el nombre divino en el versículo; la escena funciona como transición narrativa de desplazamiento familiar.
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica adicional; se mantiene la narración sin glosas religiosas ajenas al verso.
  alternative_spanish_readings:
  - Añadir una nota devocional sobre la providencia de Dios
  - Incluir 'SEÑOR' por tradición
  rationale: El texto hebreo de este versículo no contiene יהוה ni κύριος. Por fidelidad auditada al verso, no corresponde insertar títulos divinos ni lectura doctrinal implícita que no esté en el pasaje.
  doctrine_reference: Principio de transparencia textual y sobriedad exegética en pasajes narrativos
- issue: Sujeto y referente de 'salieron con ellos'
  english_pob_reading: The Hebrew has a plural verb and the awkward pronominal phrase 'with them'; the English retained it rather than smoothing it away.
  chosen_spanish_reading: «salieron con ellos» conserva el plural y el pronombre plural sin resolver artificialmente la referencia.
  alternative_spanish_readings:
  - «salieron juntos»
  - «partieron con su familia»
  rationale: El hebreo presenta una pequeña tensión sintáctica que el inglés POB decidió no borrar completamente. En español, «con ellos» mantiene la forma plural y evita una normalización que ocultaría el rasgo observado por el auditorio inglés.
  doctrine_reference: Coherencia con el testimonio masorético y respeto por la tensión textual
translation_notes:
  revision_awareness: 'He seguido el último estado revisado del texto inglés auditado, que restituyó «went out with them» y eliminó la expansión adversativa. La versión española conserva esa proximidad al hebreo: evita suavizar la secuencia con conectores no presentes, mantiene el plural verbal y refleja el valor de alcance de עַד con «hasta».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - «Canaán» y «Harán» se escriben con acento español estándar.
  - «nuera» y «esposa» se usan como términos familiares precisos, sin reemplazarlos por vocabulario eclesiástico.
  - La puntuación distribuye la larga enumeración de manera legible sin alterar la relación sintáctica del hebreo.
