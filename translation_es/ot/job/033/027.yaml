translation:
  language: es
  text: 'Él canta delante de los hombres y dice[a]: «He pecado y he pervertido lo que era recto, y no me fue recompensado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mira a los hombres»; el verbo inicial es raro y difícil, y algunos lo entienden con un sentido distinto de «canta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no me aprovechó». El hebreo también puede expresar que la maldad no trajo beneficio.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָשֹׁר
  english_pob_choice: sings
  chosen_spanish: canta
  alternatives_spanish:
  - mira
  - considera
  - declara
  lexicon: HALOT
  rationale: El verbo hebreo en esta forma es raro y difícil. Siguiendo la lectura auditada del POB inglés, se conserva una acción pública y expresiva en un contexto de confesión; en español, «canta» comunica ese matiz poético sin forzar una literalidad opaca. Las alternativas de ‘mirar’ o ‘considerar’ reflejan otra posible comprensión del verbo, pero encajan menos con el flujo inmediato de confesión pública.
- source_word: עַל אֲנָשִׁים
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - a los hombres
  - sobre los hombres
  lexicon: HALOT
  rationale: La preposición con personas se entiende idiomáticamente como presencia pública. «Delante de los hombres» conserva el sentido de confesión abierta y es natural en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Se mantiene el valor narrativo consecutivo con presente vívido, como en el POB inglés, apropiado para poesía y discurso directo.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pequé
  - he cometido pecado
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción completada en confesión personal. «He pecado» es la equivalencia más natural y digna en español bíblico contemporáneo.
- source_word: וְיָשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo que era recto
  alternatives_spanish:
  - lo recto
  - la rectitud
  - lo que era justo
  lexicon: HALOT
  rationale: La forma aquí funciona sustantivadamente. «Lo que era recto» preserva el valor moral del hebreo ישר sin cargarlo con un tecnicismo innecesario.
- source_word: הֶעֱוֵיתִי
  english_pob_choice: perverted
  chosen_spanish: he pervertido
  alternatives_spanish:
  - he torcido
  - he trastornado
  - he distorsionado
  lexicon: HALOT
  rationale: El hifil de עוה expresa hacer torcido o pervertir. Se sigue la decisión auditada del POB inglés por «perverted» y se mantiene en español un verbo formal y exacto, evitando suavizar la culpa.
- source_word: וְלֹא שָׁוָה לִי
  english_pob_choice: and it was not repaid to me
  chosen_spanish: y no me fue recompensado
  alternatives_spanish:
  - y no me aprovechó
  - y no me fue devuelto
  - y no se me pagó en igual medida
  lexicon: HALOT
  rationale: La cláusula puede expresar que el mal no produjo beneficio, o que no hubo retribución equivalente. En línea con la lectura teológica auditada del POB, «no me fue recompensado» preserva la idea de que la retribución quedó contenida, sin resolver en exceso la tensión semántica del hebreo.
theological_decisions:
- issue: Sentido final de la confesión y de la cláusula de no equivalencia/retribución
  english_pob_reading: The speaker acknowledges sin and also that full recompense was not exacted from him.
  chosen_spanish_reading: El hablante reconoce su pecado y afirma que no recibió la retribución correspondiente.
  alternative_spanish_readings:
  - El hablante dice que su pecado no le aprovechó.
  - El hablante afirma que lo torcido no le fue contado como corresponde.
  rationale: El contexto inmediato enfatiza rescate y misericordia divinos. La traducción española conserva esa dirección sin convertir la frase en una explicación doctrinal más amplia que la del versículo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla más allá del texto'
- issue: Verbo raro del inicio del versículo
  english_pob_reading: He sings before men
  chosen_spanish_reading: Él canta delante de los hombres
  alternative_spanish_readings:
  - Él mira a los hombres
  - Él se dirige a los hombres
  rationale: Se conserva una lectura poética y pública, como la adoptada en el POB inglés, porque el entorno de confesión directa favorece un acto expresivo ante testigos.
  doctrine_reference: Hebreo poético y discurso de confesión pública
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: la solución inglesa final pasó de ‘twisted’ a ‘perverted’ para הֶעֱוֵיתִי. En español se siguió esa preferencia formal con «he pervertido». También se respetó la decisión de mantener una lectura pública y confesional para el verbo inicial, y la ambigüedad final de שָׁוָה se dejó abierta en nota.'
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» solo cuando el versículo lo requiriera; aquí no aparece.
  - Se mantuvo un tono bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La confesión se expresó en primera persona perfecta española («He pecado», «he pervertido») para reflejar el perfecto hebreo sin rigidez.
  - Se preservó la ambigüedad semántica final mediante nota, en lugar de fijarla de manera excesivamente interpretativa.
