translation:
  language: es
  text: 'Mira[a], eres hermosa, mi amada; mira, eres hermosa: tus ojos son palomas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «tus ojos son como palomas». El hebreo expresa la imagen con una frase nominal breve: «tus ojos son palomas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  english_pob_choice: Look, you are
  chosen_spanish: Mira, eres
  alternatives_spanish:
  - Mira, tú eres
  - He aquí, eres
  - Observa, eres
  lexicon: HALOT
  rationale: La partícula deíctica/exclamativa pide una interpelación viva. «Mira» conserva el impulso de atención del hebreo con naturalidad en español; «he aquí» suena más marcado y arcaico, y «observa» es más pesado para este tono poético.
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  - atractiva
  lexicon: HALOT
  rationale: El adjetivo denota belleza/atractivo. «Hermosa» es claro, digno y suficientemente amplio para el registro poético del Cantar; «bella» también sería posible, pero «hermosa» fluye bien en español contemporáneo.
- source_word: רַעְיָתִי
  english_pob_choice: my beloved
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi amada mía
  - mi amor
  - mi querida
  - mi compañera
  lexicon: HALOT
  rationale: En el Cantar, el vocativo expresa intimidad amorosa. «Mi amada» conserva esa fuerza relacional y el valor nominal del término mejor que opciones más coloquiales o genéricas.
- source_word: עֵינַיִךְ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - los ojos tuyos
  lexicon: HALOT
  rationale: Correspondencia directa del constructo con sufijo de 2fs. No requiere paráfrasis.
- source_word: יוֹנִים
  english_pob_choice: doves
  chosen_spanish: palomas
  alternatives_spanish:
  - como palomas
  lexicon: HALOT
  rationale: 'El hebreo presenta un predicado nominal terso: «tus ojos [son] palomas». En español, «son palomas» preserva mejor la compresión poética que explicitar «como». «Como palomas» queda como alternativa interpretativa, pero debilita la metáfora directa del original.'
theological_decisions:
- issue: Metáfora nominal en la descripción amorosa
  english_pob_reading: your eyes are doves
  chosen_spanish_reading: tus ojos son palomas
  alternative_spanish_readings:
  - tus ojos son como palomas
  - tus ojos parecen palomas
  rationale: La POB inglesa preserva la metáfora compacta del hebreo. La versión española mantiene esa misma tensión poética sin suavizarla en una comparación explícita.
  doctrine_reference: Poética bíblica / fidelidad retórica al texto fuente
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la POB inglesa auditada. No se detectaron revisiones aplicadas; se mantuvo la repetición enfática y la metáfora nominal directa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí, pues el versículo no contiene el nombre divino.
  - Se mantuvo un registro poético natural, evitando «he aquí» por arcaísmo innecesario.
  - «Amada» refleja mejor el vocativo íntimo del Cantar que un término más eclesiástico o neutral.
