revisions:
- from: No jurarás falsamente por mi nombre, ni profanarás el nombre de tu Dios[a]. Yo soy Yahvé.
  to: No juren falsamente por mi nombre, y así profanarán el nombre de su Dios[a]. Yo soy Yahvé.
  rationale: Se revisa para restaurar la relación consecuencial entre el falso juramento y la profanación del nombre divino, tal como la documenta el POB en inglés y como lo permite naturalmente el hebreo en contexto. También se alinea la persona verbal con la 2ª plural del texto fuente y se conserva la terminología del proyecto, especialmente «Yahvé».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la prohibición de jurar por el nombre divino con falsedad y preserva correctamente «nombre», «tu Dios» y «Yahvé». Sin embargo, cambia de manera significativa la relación de la segunda cláusula: el hebreo וְחִלַּלְתָּ, en este contexto, expresa la consecuencia del falso juramento («y así profanas / profanando así»), mientras que «ni profanarás» lo convierte en una segunda prohibición coordinada. Además, el cambio a segunda persona singular no concuerda naturalmente con el hebreo 2mp inicial en la formulación legal del versículo.'
  spanish_quality_summary: El español es claro y digno, pero «No jurarás..., ni profanarás...» suena más a dos mandatos separados que a una sola prohibición con consecuencia ética. Una formulación como «No juren falsamente por mi nombre, y así profanarán el nombre de su Dios» o equivalente conserva mejor el sentido fuente y la fluidez. La nota al pie está bien orientada, aunque conviene ajustar «para falsedad» a una formulación más natural en español, como «para mentira» o mantenerla como literalidad explicada.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «su Dios»/«tu Dios» según persona, שֵׁם → «nombre». El principal desajuste no es glosarial sino sintáctico-semántico: וְחִלַּלְתָּ no debe recastarse como una prohibición independiente con «ni». También conviene alinear la persona verbal con la del hebreo legal plural («No juren...»), evitando la mezcla singular/plural introducida por el borrador.'
  issues:
  - severity: high
    issue: La segunda cláusula se tradujo como prohibición independiente («ni profanarás»).
    rationale: El hebreo vincula el falso juramento con la profanación del nombre divino; el inglés POB documenta explícitamente un valor consecuencial («and so profane»). «Ni profanarás» borra esa relación y altera el sentido.
  - severity: medium
    issue: Cambio de número/persona en la formulación principal.
    rationale: תִשָּׁבְעוּ es 2ª persona plural; el borrador usa singular («No jurarás»). Aunque el español bíblico a veces singulariza mandatos legales, aquí no hay razón documentada para hacerlo, y además la cláusula siguiente mezcla valores de modo poco estable.
  - severity: low
    issue: La literalidad de la nota «para falsedad» suena poco natural en español.
    rationale: Como nota de alternativa puede conservar una forma más literal, pero «para mentira» o «para falsedad» con mejor pulido explicativo evita rigidez innecesaria.
  revised_spanish_text: No juren falsamente por mi nombre, y así profanarán el nombre de su Dios[a]. Yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «No juren por mi nombre para mentira» o «para falsedad».'
    reason: lexical_alternative
  revision_rationale: Se revisa para restaurar la relación consecuencial entre el falso juramento y la profanación del nombre divino, tal como la documenta el POB en inglés y como lo permite naturalmente el hebreo en contexto. También se alinea la persona verbal con la 2ª plural del texto fuente y se conserva la terminología del proyecto, especialmente «Yahvé».
