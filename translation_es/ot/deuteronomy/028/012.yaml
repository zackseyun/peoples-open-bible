  to: Yahvé abrirá para ti su buen depósito[a], los cielos, para dar la lluvia de tu tierra en su tiempo y para bendecir toda la obra de tu mano. Prestarás a muchas naciones, pero tú no pedirás prestado.
  rationale: Se reemplaza 'granero' por 'depósito' para preservar mejor la amplitud semántica de אוֹצָר sin perder el ajuste contextual agrícola. Se elimina la nota innecesaria sobre 'para ti' y se restaura la alternativa léxica relevante, en línea con la auditoría inglesa del POB. No se requiere adjudicación adicional porque el ajuste es claro y menor.
