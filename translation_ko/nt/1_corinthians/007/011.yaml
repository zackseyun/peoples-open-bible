  text: ἐὰν δὲ καὶ χωρισθῇ, μενέτω ἄγαμος ἢ τῷ ἀνδρὶ καταλλαγήτω— καὶ ἄνδρα γυναῖκα μὴ ἀφιέναι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/011.yaml
  text: But if she does separate[a], let her remain unmarried[b], or else be reconciled to her husband—and a husband must not divorce his wife.
  footnotes:
  - marker: a
    text: 'Or ''But even if she does separate.'' The Greek can carry a slightly concessive force here.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''must not send away his wife.'' The verb can be rendered more literally as ''send away,'' though in this marital context it commonly refers to divorce.'
    reason: lexical_alternative
translation:
