translation:
  language: es
  text: Pero en cuanto a ti[a], levántate, ve a tu casa. Cuando tus pies entren en la ciudad, el niño morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cuando tus pies entren en la ciudad». El hebreo usa «tus pies» de forma idiomática para señalar el momento de llegada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתְּ
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Ahora bien, tú
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre independiente marca contraste y énfasis dirigido específicamente a la mujer. «Pero en cuanto a ti» conserva ese giro contrastivo sin perder naturalidad en español.
- source_word: ק֖וּמִי
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - alza(te)
  - ponte en pie
  lexicon: HALOT
  rationale: Es un imperativo de קום. «Levántate» comunica el mandato de manera clara y digna en español; aunque «arise» suena más solemne en inglés, en español «levántate» es la forma más natural y fiel.
- source_word: לְכִ֣י
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - parte
  lexicon: HALOT
  rationale: Imperativo de הלך. «Vete» expresa bien el movimiento de salida con un tono imperativo adecuado al contexto profético.
- source_word: לְבֵיתֵךְ
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu casa/hogar
  lexicon: HALOT
  rationale: בַּיִת puede significar casa o hogar. Aquí el sentido direccional es simple; «a tu casa» mantiene cercanía al hebreo y resulta idiomático en español.
- source_word: בְּבֹאָה
  english_pob_choice: When ... enter
  chosen_spanish: Cuando ... entren
  alternatives_spanish:
  - Al entrar
  - cuando llegues
  lexicon: HALOT
  rationale: La preposición ב con infinitivo constructo de בוא introduce una cláusula temporal. «Cuando» conserva la relación temporal de llegada en español.
- source_word: רַגְלַיִךְ
  english_pob_choice: your feet
  chosen_spanish: tus pies
  alternatives_spanish:
  - tus pasos
  - tú
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus pies» como idiomа de llegada. Se mantiene la imagen corporal porque el texto la usa deliberadamente.
- source_word: הָעִירָה
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la ciudad adentro
  lexicon: HALOT
  rationale: Con el sufijo direccional, el sentido es movimiento hacia/into la ciudad. En español basta «la ciudad» dentro de la cláusula «entren en la ciudad» para comunicar el valor direccional sin sobrecarga.
- source_word: וּמֵת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá entonces
  - ha de morir
  lexicon: HALOT
  rationale: En este contexto profético, el perfecto con waw expresa un resultado futuro. «Morirá» transmite la predicción con claridad natural en español.
- source_word: הַיָּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el muchacho
  lexicon: HALOT
  rationale: יֶלֶד puede ser niño, hijo o muchacho. Aquí el referente es un niño concreto; «niño» es preciso y natural en español.
theological_decisions:
- issue: Tono profético de mandato y anuncio de muerte
  english_pob_reading: The verse is a direct prophetic command followed by a predicted death.
  chosen_spanish_reading: El versículo se lee como un mandato profético directo seguido de una predicción de muerte.
  alternative_spanish_readings:
  - una simple instrucción narrativa
  - una advertencia condicionada
  rationale: El hebreo y el contexto del pasaje presentan una orden seguida de un futuro cierto, no una mera sugerencia. La traducción mantiene ese carácter performativo y profético.
  doctrine_reference: Profecía declarativa en narrativa histórica; cf. 1 Reyes 14:12
translation_notes:
  revision_awareness: 'Se revisó el ajuste de naturalidad en español frente al audit trail inglés: se mantuvo la imagen hebrea de «tus pies», se respetó el giro contrastivo de וְאַתְּ y se conservó el futuro profético sin suavizarlo. No se documentaron revisiones textuales en el pasaje fuente.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Señor» o equivalentes no presentes en el texto.
  - Se preservó el valor literal de la imagen corporal «tus pies» para no borrar el hebraísmo idiomático.
  - Se usó un español neutral y bíblico, evitando arcaísmos innecesarios.
