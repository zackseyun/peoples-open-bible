base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/047.yaml
  text: And the leaders of the people and of the priests also committed much impiety and lawlessness[a], beyond all the uncleannesses of all the nations, and they defiled the sanctuary of the Lord[c][b], which had been sanctified in Jerusalem.
  footnotes:
  - marker: a
    text: Or 'more than all the impurities of all the nations.' The Greek phrase expresses excess or surpassing, and ἀκαθαρσίαι can be rendered 'uncleannesses,' 'impurities,' or 'defilements.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of the Lord.' Greek ἱερόν can refer to the sanctuary or the temple precincts more broadly.
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally 'the sanctuary of the Lord, the one sanctified in Jerusalem.' The participle may describe the sanctuary as consecrated there.
    reason: lexical_alternative
