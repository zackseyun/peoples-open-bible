lexical_decisions:
- source_word: παραζηλοῦμεν τὸν κύριον
  english_pob_choice: provoking the Lord to jealousy
  chosen_korean: 주를 시기하시게 하다
  lexicon: BDAG
  rationale: 하나님의 언약적 시기를 자극하는 행위를 가리킨다. 「시기하시게 하다」가 본문의 강한 무게를 보존한다.
theological_decisions:
- issue: 10:22 παραζηλοῦμεν τὸν κύριον — 신 32:21 야훼-시기 반향
  chosen_reading: 주를 시기하시게 하다 (각주로 신 32:21 야훼 인용 배경 표시)
  alternative_readings:
  - 야훼를 시기하시게 하다 — κύριος를 야훼로 직역
  rationale: 본문 κύριος는 신약 문맥상 그리스도-주이면서 동시에 70인역 인용에서 야훼를 가리키는 이중적 무게를 지닌다. 한국어 본문은 「주」를 유지해 신약 호칭 일관성을 보존하되, 야훼-언약의 무게는 각주로 명시한다. 영어 POB의 「the Lord」 선택과 평행을 이룬다.
  doctrine_reference: 'DOCTRINE.md: glossary κύριος (= YHWH) — flag in theological_decisions when LXX quotation/allusion is present'
