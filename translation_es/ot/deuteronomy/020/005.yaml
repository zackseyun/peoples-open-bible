translation:
  language: es
  text: 'Entonces los oficiales hablarán al pueblo[a], diciendo: «¿Quién es el hombre que ha edificado una casa nueva y no la ha dedicado? Que vaya y vuelva a su casa, no sea que muera en la batalla y otro hombre la dedique».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inaugurarla». El verbo hebreo se refiere a comenzar formalmente el uso de la casa nueva, con sentido de dedicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁטְרִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los funcionarios
  - los inspectores
  lexicon: HALOT
  rationale: En el contexto administrativo y militar de Deuteronomio, שֹׁטְרִים designa funcionarios u ოფiciales designados. «Oficiales» conserva la función pública sin cargar una especificidad ajena al hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo reunido
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo». En español, «al pueblo» suena natural y conserva el referente colectivo sin convertirlo en un tecnicismo militar que el texto no expresa explícitamente.
- source_word: מִי הָאִישׁ
  english_pob_choice: Who is the man
  chosen_spanish: ¿Qué hombre es el que…?
  alternatives_spanish:
  - ¿Quién es el hombre que…?
  - ¿Quién es el hombre que ha…?
  lexicon: HALOT
  rationale: Se conserva el singular masculino y la formulación interrogativa. «¿Qué hombre es el que…?» resulta más idiomático en español bíblico moderno que una calca rígida, sin perder el énfasis individual del hebreo.
- source_word: בָּנָה בַיִת חָדָשׁ
  english_pob_choice: has built a new house
  chosen_spanish: ha edificado una casa nueva
  alternatives_spanish:
  - ha construido una casa nueva
  - ha levantado una casa nueva
  lexicon: HALOT
  rationale: «Casa» mantiene el valor directo de בַּיִת. «Edificado» es un verbo elevado pero natural en registro bíblico, y evita el tono demasiado coloquial de «construido» en este contexto legal.
- source_word: וְלֹא חֲנָכוֹ
  english_pob_choice: and has not dedicated it
  chosen_spanish: y no la ha dedicado
  alternatives_spanish:
  - y no la ha inaugurado
  - y no ha comenzado a usarla
  lexicon: HALOT
  rationale: «Dedicado» conserva la decisión del POB inglés y el sentido de חנך como poner formalmente en uso una casa. «Inaugurado» es una alternativa válida, pero «dedicado» mantiene mejor la repetición léxica del versículo.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  english_pob_choice: Let him go and return to his house
  chosen_spanish: Que vaya y vuelva a su casa
  alternatives_spanish:
  - Que se vaya y regrese a su casa
  - Debe ir y volver a su casa
  lexicon: HALOT
  rationale: Los imperfectos funcionan como instrucción. «Que vaya y vuelva» expresa con naturalidad el valor jussivo y conserva la estructura directiva del hebreo sin volverla demasiado explicativa.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español bíblico moderno, «para que no» comunica claramente la finalidad preventiva de פֶּן. «No sea que» sería posible, pero aquí la construcción resulta más fluida y directa.
- source_word: יָמוּת בַּמִּלְחָמָה
  english_pob_choice: he die in the battle
  chosen_spanish: muera en la batalla
  alternatives_spanish:
  - muera en la guerra
  - perezca en la batalla
  lexicon: HALOT
  rationale: «Batalla» refleja el carácter concreto del conflicto, como en el POB inglés. Se mantiene el vínculo militar inmediato del sustantivo hebreo con artículo, sin generalizar a «guerra».
- source_word: וְאִישׁ אַחֵר
  english_pob_choice: and another man
  chosen_spanish: y otro hombre
  alternatives_spanish:
  - y otro varón
  - y otro
  lexicon: HALOT
  rationale: Se preserva la referencia explícita a un individuo masculino. «Hombre» es la correspondencia más directa y mantiene la repetición del sujeto humano en el versículo.
- source_word: יַחְנְכֶנּוּ
  english_pob_choice: dedicate it
  chosen_spanish: la dedique
  alternatives_spanish:
  - la inaugure
  - la consagre
  lexicon: HALOT
  rationale: Se conserva «dedique» para mantener la coherencia con la primera ocurrencia de חנך y porque el verbo en este contexto es una dedicación formal de la casa, no una consagración cultual distinta.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso crítico es alto y mantiene la lectura existente, incluida la alternancia léxica de חנך como «dedicar» con posible matiz de «inaugurar».
  spanish_consistency_notes:
  - Se mantiene la repetición de «dedicar» para traducir חנך en ambas apariciones, como en el POB inglés.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - «Batalla» conserva la concreción militar del hebreo y del texto inglés auditado.
