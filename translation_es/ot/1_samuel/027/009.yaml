translation:
  language: es
  text: David atacó la región y no dejó con vida[a] ni a hombre ni a mujer, y tomó ovejas, ganado, asnos, camellos y ropa. Luego regresó y vino a Aquis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no permitió vivir ni a hombre ni a mujer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכָּה
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  - derribó
  lexicon: HALOT
  rationale: El hebreo Hifil de נכה puede expresar golpear o abatir. 'Golpeó' conserva la fuerza directa del verbo sin añadir detalles que el texto no explicita. 'Atacó' sería más interpretativo y 'hirió' sugiere con más claridad una lesión específica.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aquí אֶרֶץ puede referirse al territorio afectado. En español, 'la tierra' mantiene el sentido amplio de territorio sin forzar una lectura política moderna como 'el país'.
- source_word: וְלֹא יְחַיֶּה אִישׁ וְאִשָּׁה
  english_pob_choice: left alive neither man nor woman
  chosen_spanish: no dejó con vida ni a hombre ni a mujer
  alternatives_spanish:
  - no permitió vivir ni a hombre ni a mujer
  - no mantuvo con vida ni a hombre ni a mujer
  lexicon: HALOT
  rationale: El verbo חיה en Hifil implica 'dejar vivir' o 'mantener con vida'. La construcción española conserva la negación total y la pareja de género del hebreo. Se evita 'nadie' para no borrar la formulación explícita del texto.
- source_word: אִישׁ וְאִשָּׁה
  english_pob_choice: man nor woman
  chosen_spanish: hombre ni mujer
  alternatives_spanish:
  - varón ni mujer
  - persona alguna
  lexicon: HALOT
  rationale: '''Hombre ni mujer'' reproduce de forma clara la pareja sexual explícita del hebreo. ''Persona alguna'' suavizaría la precisión léxica; ''varón'' sonaría más técnico en español sin necesidad.'
- source_word: וְלָקַח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - capturó
  - apresó
  lexicon: HALOT
  rationale: לקח es el verbo básico 'tomar'. En contexto de botín, 'tomó' es breve y fiel. 'Se llevó' desplaza el foco al movimiento, y 'capturó/apresó' introducirían un matiz que el texto no exige.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  - ganado menor
  lexicon: HALOT
  rationale: Aunque צֹאן puede abarcar ganado menor en conjunto, la serie separa este término de בקר. 'Ovejas' es concreto y natural en español, y mantiene el carácter de la lista de botín.
- source_word: בָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - reses
  - vacuno
  lexicon: HALOT
  rationale: בקר designa bovinos. 'Ganado' funciona bien en una lista de bienes tomados y evita una tecnicidad excesiva. 'Reses' o 'vacuno' son posibles, pero menos fluidos aquí.
- source_word: חֲמֹרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - jumentos
  lexicon: HALOT
  rationale: '''Asnos'' es la equivalencia tradicional y precisa para חֲמֹרִים. ''Burros'' sería más coloquial; ''jumentos'' suena regional o arcaizante.'
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: HALOT
  rationale: '''Camellos'' es la equivalencia estándar en español para גְמַלִּים. ''Dromedarios'' sería más específico de una especie, pero el hebreo no distingue aquí.'
- source_word: וּבְגָדִים
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidos
  - vestiduras
  - prendas
  lexicon: HALOT
  rationale: En español, 'ropa' es natural para bienes saqueados y evita un registro demasiado litúrgico como 'vestiduras'. 'Prendas' sería posible, pero más abstracto.
- source_word: וַיָּשָׁב וַיָּבֹא
  english_pob_choice: Then he returned and came
  chosen_spanish: Luego regresó y vino
  alternatives_spanish:
  - Entonces regresó y llegó
  - Y regresó y vino
  lexicon: HALOT
  rationale: Se conservan los dos verbos secuenciales del hebreo. 'Regresó' refleja וַיָּשָׁב; 'vino' mantiene וַיָּבֹא con el movimiento hacia Aquis. 'Luego' ayuda a reproducir la secuencia narrativa sin añadir contenido.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Aquis, rey filisteo
  lexicon: standard transliteration adapted to Spanish
  rationale: Los nombres propios se adaptan a la forma habitual en español bíblico. 'Aquis' es la transliteración asentada y mantiene la referencia al personaje.
theological_decisions:
- issue: Forma de expresar la matanza implícita sin suavizarla
  english_pob_reading: The verse is translated plainly as describing David's lethal raid and plundering, including that he left no man or woman alive.
  chosen_spanish_reading: El texto se traduce de forma directa, diciendo que David no dejó con vida ni a hombre ni a mujer.
  alternative_spanish_readings:
  - David destruyó por completo la tierra y no dejó sobrevivientes
  - David mató a todos sin excepción
  rationale: La traducción debe conservar el carácter duro del relato sin exagerarlo. 'No dejó con vida' reproduce con fidelidad la fuerza del hebreo y evita tanto la atenuación como la amplificación interpretativa.
  doctrine_reference: Principio de primacía del texto original; no suavizar ni sensationalizar el lenguaje histórico.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios sustantivos respecto del análisis auditado. Se mantiene la equivalencia óptima con respeto a la fuerza verbal y al paralelismo del hebreo.'
  spanish_consistency_notes:
  - Se preserva la distinción entre אִישׁ y אִשָּׁה con una pareja sexual explícita en español.
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Aquis'' sigue la forma española establecida para el nombre propio.'
  - La lista de botín se mantiene concreta y en serie paralela, sin generalizar a un término global como 'posesiones'.
