  language: en
  yaml_path: translation/ot/leviticus/021/021.yaml
  text: No man from the offspring of Aaron the priest who has a defect shall come near to offer the food offerings of Yahweh[a]. A defect is in him[b]; he shall not come near to offer the bread of his God.
