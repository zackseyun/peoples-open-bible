revisions:
- from: Pero los hijos de Israel fueron fecundos y se multiplicaron, y se volvieron sumamente fuertes[a][b], de modo que la tierra se llenó de ellos.
  to: Pero los hijos de Israel fueron fecundos, pulularon[a], se multiplicaron y se volvieron sumamente fuertes[b], de modo que la tierra se llenó de ellos.
  rationale: La revisión restaura la secuencia completa de verbos del hebreo y preserva la imaginería distintiva de שׁרץ sin sacrificar legibilidad en español. «Pulularon» es suficientemente natural en registro bíblico moderno y evita duplicar «se multiplicaron». También se corrige la nota léxica para eliminar inglés incrustado y ajustar mejor el matiz semántico.
