review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: parientes/relatives, guirnaldas, plenitud de la juventud, los días restantes de las bodas, y Hades conservado. Sin embargo, omite explícitamente el contraste "instead of feasting and youthful ease" presente en ἀντὶ εὐωχίας καὶ νεωτερικῆς ῥᾳθυμίας, aunque esos elementos sí aparecen en las decisiones léxicas. Además, βρόχους se suaviza demasiado con «lazos», perdiendo parte de la fuerza de "nooses".'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas de calidad: la nota [a] está anclada en «parientes» cuando en realidad explica «Hades», y la oración queda incompleta en su contraste al faltar «en vez de banquetes y holganza juvenil». También conviene usar «Hades[a]» sin artículo para una lectura más natural en español de nombre propio transliterado.'
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto. La conservación de «Hades» está bien justificada. No hay términos como Yahvé/Mesías/etc. en juego. La principal desviación es léxica: «lazos» no refleja plenamente βρόχους/"nooses"; «lazos corredizos» o «nudos corredizos» preserva mejor la imagen sombría documentada por el POB.'
  issues:
  - severity: high
    issue: Falta en el texto principal el contraste «en vez de banquetes y holganza juvenil».
    rationale: El griego dice ἀντὶ εὐωχίας καὶ νεωτερικῆς ῥᾳθυμίας, y el POB inglés lo traduce explícitamente. Omitirlo recorta una parte significativa del paralelismo retórico del versículo.
  - severity: medium
    issue: La nota [a] está colocada sobre «parientes» pero trata sobre «Hades».
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase relevante. La nota debe anclarse en «Hades».
  - severity: medium
    issue: «Lazos» debilita la fuerza de βρόχους.
    rationale: El audit trail documenta que la imagen no es de simples cuerdas sino de lazos de ahorcamiento o constricción. En español, «lazos corredizos» conserva mejor el contraste con las guirnaldas sin sonar excesivamente técnico.
  - severity: low
    issue: «al Hades» suena menos natural que «Hades» en esta transliteración.
    rationale: 'Como préstamo/nombre propio del inframundo, en español suele leerse mejor sin artículo aquí: «viendo a Hades tendido a sus pies» o simplemente «viendo Hades...». La primera opción mantiene la personificación.'
  revised_spanish_text: Y sus parientes, con lazos corredizos ceñidos alrededor de sus cuellos en vez de guirnaldas, aunque en la plenitud de la juventud, pasaban en lamentos los días restantes de sus bodas, en vez de banquetes y holganza juvenil, ya viendo a Hades[a] tendido a sus pies.
