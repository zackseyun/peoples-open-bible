review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: μάτην = «En vano», vocativo directo a los hijos, sufrimientos de parto, y las preocupaciones comparativamente más pesadas de criarlos. Sin embargo, omite en el texto principal el matiz de ἐφʼ ὑμῖν («por ustedes/por vosotros»), presente en el análisis léxico inglés y español. También «las más graves» suena superlativo absoluto más que comparativo contextual; el griego χαλεπωτέρας pide mejor «más penosas» o equivalente comparativo.'
  spanish_quality_summary: El español es claro y digno, pero mezcla registro panhispánico con un voseo reverencial peninsular («vuestra», «vosotros») pese a pedirse español neutral latinoamericano/broadly church-readable. «Oh hijos» es aceptable, pero «hijos» sin «oh» también puede sonar natural; aquí puede conservarse el tono solemne con «oh». «Angustias de parto» es comprensible, aunque «dolores de parto» es más idiomático y concreto para ὠδῖνας.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario mayor en juego. La principal observación terminológica es de estilo objetivo: evitar «vuestra/vosotros» en favor de «ustedes/su» para un español neutral. También conviene reflejar explícitamente ἐφʼ ὑμῖν en el texto principal.'
  issues:
  - severity: medium
    issue: Falta en el texto principal el equivalente de ἐφʼ ὑμῖν.
    rationale: 'El griego expresa que estos sufrimientos fueron soportados con respecto a los hijos: «por ustedes / por causa de ustedes». El borrador lo registra en decisiones léxicas («por vosotros») pero no lo incorpora al versículo.'
  - severity: medium
    issue: Registro no neutral por uso de «vuestra/vosotros».
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. «Vuestra crianza» y la decisión «por vosotros» inclinan el texto hacia un registro peninsular/litúrgico no necesario.
  - severity: low
    issue: «Las más graves» debilita el valor comparativo de χαλεπωτέρας.
    rationale: En contexto contrasta los dolores de parto con preocupaciones aún más penosas; «más penosas» o «más graves» con anclaje comparativo explícito funciona mejor que un superlativo aislado.
  - severity: low
    issue: «Angustias de parto» es posible pero menos idiomático que «dolores de parto».
    rationale: ὠδῖνας refiere concretamente a los dolores/padecimientos del parto. «Dolores de parto» suena más natural y preciso en español general, mientras la alternativa puede quedar en nota.
  revised_spanish_text: En vano[a], oh hijos, soporté por ustedes muchos dolores de parto y las preocupaciones más penosas de criarlos.
