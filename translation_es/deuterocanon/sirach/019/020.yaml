  - severity: low
    issue: «Traspasa la ley» es posible, pero menos idiomático que «transgrede la ley».
    rationale: El inglés auditado eligió «transgresses the law» por su tono sapiencial y fuerza moral-legal. «Transgrede» reproduce mejor esa elección en español culto actual.
  revised_spanish_text: Mejor es el que carece, con entendimiento y temor[a], que el que abunda en prudencia y transgrede la ley.
