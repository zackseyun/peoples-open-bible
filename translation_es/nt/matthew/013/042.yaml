translation:
  language: es
  text: y los echarán en el horno de fuego. Habrá llanto y crujir de dientes allí.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: βαλοῦσιν
  english_pob_choice: they will throw
  chosen_spanish: los echarán
  alternatives_spanish:
  - los arrojarán
  - los lanzarán
  lexicon: BDAG
  rationale: El futuro activo de βάλλω expresa acción violenta de echar/arrojar. «Echarán» comunica bien la expulsión forzosa en español actual y mantiene la fuerza del verbo sin sonar artificial.
- source_word: εἰς τὴν κάμινον τοῦ πυρός
  english_pob_choice: the furnace of fire
  chosen_spanish: en el horno de fuego
  alternatives_spanish:
  - en el horno ardiente
  - en el horno ígneo
  lexicon: BDAG
  rationale: Se conserva la imagen concreta del sustantivo más el genitivo. «Horno de fuego» refleja con fidelidad la construcción griega sin convertirla en una paráfrasis interpretativa como «horno ardiente».
- source_word: ἐκεῖ
  english_pob_choice: There / In that place
  chosen_spanish: Allí
  alternatives_spanish:
  - En ese lugar
  - Ahí
  lexicon: BDAG
  rationale: El adverbio locativo se traduce de modo natural como «allí», manteniendo la referencia al lugar recién mencionado. En español, la repetición final «allí» conserva el énfasis locativo del griego.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - llanto y gemido
  - llanto amargo
  lexicon: BDAG
  rationale: «Llanto» es una equivalencia clara y natural para κλαυθμός. Aunque «llanto» puede abarcar dolor intenso, no sobreinterpreta el término como «lamento» o «gemido».
- source_word: βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: crujir de dientes
  alternatives_spanish:
  - rechinar de dientes
  - apretar los dientes
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con una fórmula ya comprensible en español. «Crujir de dientes» preserva el carácter idiomático y la severidad de la escena; «rechinar de dientes» también es posible, pero «crujir» mantiene buena naturalidad aquí.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Se conserva la simple coordinación del texto griego.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre de objeto directo plural se expresa naturalmente como «los» en español, sin necesidad de repetir el antecedente.
theological_decisions:
- issue: Imagen de juicio en «el horno de fuego»
  english_pob_reading: Retain the concrete metaphor of eschatological judgment without softening or over-specifying it.
  chosen_spanish_reading: Conservar la metáfora concreta del juicio escatológico sin suavizarla ni volverla más explícita de lo que dice el texto.
  alternative_spanish_readings:
  - el horno ardiente
  - el infierno de fuego
  - el fuego del infierno
  rationale: La expresión griega presenta una imagen dura y concreta. «Horno de fuego» respeta el tenor metáforico y evita sustituirlo por terminología doctrinal posterior o por una paráfrasis más interpretativa.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del original sobre la tradición de traducción.
- issue: Fórmula «llanto y crujir de dientes»
  english_pob_reading: Preserve the stock Matthean expression as a formula of anguish and judgment.
  chosen_spanish_reading: Mantener la fórmula mateana como expresión de angustia y juicio, sin restringirla solo al dolor o solo a la ira.
  alternative_spanish_readings:
  - llanto y rechinar de dientes
  - gemido y crujir de dientes
  - lamento y rechinar de dientes
  rationale: La frase funciona como fórmula estable en Mateo. «Llanto y crujir de dientes» conserva tanto la angustia como el carácter judicial sin reducir su alcance semántico.
  doctrine_reference: Preservar la tensión teológica del texto; no resolver de antemano si el gesto incluye solo dolor, solo rabia o ambos.
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del auditorio en inglés: se mantiene la construcción literal «furnace of fire» reflejada en español como «horno de fuego», y se reubica el adverbio locativo al final de la cláusula para corresponder al ἐκεῖ griego. También se preserva la fórmula fija «llanto y crujir de dientes» sin intensificarla innecesariamente.'
  spanish_consistency_notes:
  - Se usa «fuego» y no «llamas» para respetar el genitivo del griego.
  - Se prefirió «echarán» por su fuerza verbal y naturalidad en español bíblico contemporáneo.
  - Se mantuvo el adverbio final «allí» para reproducir el énfasis locativo del texto fuente.
  - No se introdujo «Cristo», «Señor» ni terminología doctrinal ajena al versículo.
