revisions:
- from: ¿A quién, entonces, le haréis semejante a Dios, y qué semejanza compararéis con él?
  to: ¿A quién[a], entonces, haréis semejante a Dios, y qué semejanza pondréis en comparación con él?
  rationale: Se ajusta la redacción para que el español sea más natural sin perder el sentido comparativo-retórico del hebreo. Se conserva «Dios» para אֵל, «semejanza» para דְּמוּת, y se mejora la segunda cláusula para reflejar mejor la idea de poner algo junto a Dios para compararlo. También se añade la nota alternativa ya sustentada por el rastro inglés.
  reviewer_model: gpt-5.4
