translation:
  language: es
  text: para guardarte de la mujer mala[b], de la lengua suave[a] de la mujer extranjera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la lengua halagadora’ (literalmente, ‘la lengua suave’).
    reason: lexical_alternative
  - marker: b
    text: O ‘la mujer extraña’; algunos entienden esto de manera más específica como ‘la adúltera’.
    reason: alternative_reading
lexical_decisions:
- source_word: לִשְׁמָרְךָ
  english_pob_choice: to keep you
  chosen_spanish: para guardarte
  alternatives_spanish:
  - para conservarte
  - para preservarte
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa propósito: ‘para guardarte’. ‘Guardar’ en español conserva el sentido de protección/vigilancia sin perder naturalidad. ‘Conservarte’ suena menos personal; ‘preservarte’ puede sonar más abstracto.'
- source_word: מֵאֵשֶׁת רָע
  english_pob_choice: from the evil woman
  chosen_spanish: de la mujer mala
  alternatives_spanish:
  - de la mujer malvada
  - de la mujer perversa
  - de la esposa mala
  lexicon: HALOT
  rationale: אֵשֶׁת es ‘mujer/mujer de’, y aquí el contexto sapiencial apunta a una mujer seductora o moralmente dañina, no necesariamente a ‘esposa’. ‘Mujer mala’ mantiene la fuerza del hebreo sin cargar el texto con una especificación interpretativa mayor.
- source_word: מֵחֶלְקַת לָשׁוֹן
  english_pob_choice: from the smooth tongue
  chosen_spanish: de la lengua suave
  alternatives_spanish:
  - de la lengua lisa
  - de la lengua halagadora
  - de la habla suave
  lexicon: HALOT
  rationale: חֶלְקַת literalmente comunica suavidad/lisura, aplicada a la lengua como habla seductora. ‘Lengua suave’ preserva la imagen hebrea y resulta idiomática en español. ‘Halagadora’ explicaría más el sentido, pero perdería la metáfora.
- source_word: נָכְרִיָּה
  english_pob_choice: the foreign woman
  chosen_spanish: la mujer extranjera
  alternatives_spanish:
  - la mujer extraña
  - la adúltera
  lexicon: HALOT
  rationale: El sentido léxico básico es ‘extranjera/foránea’. ‘Mujer extranjera’ sigue de cerca el hebreo y evita sustituir la palabra por una etiqueta interpretativa más cerrada. ‘Extraña’ es tradicional pero menos claro hoy; ‘adúltera’ es más interpretativo que el texto mismo.
theological_decisions:
- issue: Alcance de נָכְרִיָּה en Proverbios
  english_pob_reading: Render lexically as 'foreign woman' in the main text
  chosen_spanish_reading: ‘mujer extranjera’ en el texto principal
  alternative_spanish_readings:
  - ‘mujer extraña’
  - ‘adúltera’
  rationale: Se preserva la tensión entre el sentido léxico básico (‘extranjera’) y el uso sapiencial potencialmente cargado moralmente. El contexto de advertencia contra la seducción ilícita está en la imagen completa (‘lengua suave’), por lo que no es necesario resolver el término como ‘adúltera’ en el texto principal.
  doctrine_reference: Primacía del texto original y preservación de tensiones léxicas cuando el contexto no obliga a una sola paráfrasis.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registraron cambios y el cotejo final reporta alta concordancia (1.0).'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ implícito no aplicable en este versículo.
  - ‘Mujer’ se prefirió sobre ‘esposa’ para evitar una restricción no exigida por el hebreo.
  - Se conservó la metáfora de ‘lengua suave’ en lugar de una paráfrasis explicativa, con nota alternativa para la lectura idiomática.
