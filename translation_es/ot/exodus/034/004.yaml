translation:
  language: es
  text: Así talló dos tablas de piedra, como las primeras[a], y Moisés se levantó temprano por la mañana y subió al monte Sinaí, tal como Yahvé le había mandado, y tomó las dos tablas de piedra en su mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «labró» o «cortó» dos tablas de piedra como las primeras.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «en su mano»; el singular puede funcionar de manera idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְסֹל
  english_pob_choice: cut
  chosen_spanish: labró
  alternatives_spanish:
  - cortó
  - talló
  - esculpió
  lexicon: HALOT
  rationale: En este contexto el verbo describe la preparación de tablas de piedra. «Labró» comunica la acción de dar forma a la piedra con naturalidad en español y mantiene la fuerza material del verbo hebreo mejor que una paráfrasis más general.
- source_word: לֻחֹת אֲבָנִים
  english_pob_choice: stone tablets
  chosen_spanish: tablas de piedra
  alternatives_spanish:
  - tablas de piedra
  - losas de piedra
  - tabletas de piedra
  lexicon: HALOT
  rationale: «Tablas de piedra» es la forma clara y reconocible en español para las tablas del pacto. «Tabletas» puede sonar demasiado pequeño o moderno; «losas» pierde la referencia tradicional a las tablas. Se conserva el sustantivo concreto sin añadir tecnicismo.
- source_word: כָּרִאשֹׁנִים
  english_pob_choice: like the first ones
  chosen_spanish: como las primeras
  alternatives_spanish:
  - como las primeras
  - como las anteriores
  - igual que las primeras
  lexicon: HALOT
  rationale: El comparativo hebreo indica semejanza con las tablas previas. «Como las primeras» es conciso y exacto; el contexto ya deja claro a qué primeras se refiere.
- source_word: וַיַּשְׁכֵּם ... בַבֹּקֶר
  english_pob_choice: rose early in the morning
  chosen_spanish: se levantó temprano por la mañana
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó temprano en la mañana
  - se levantó temprano por la mañana
  lexicon: HALOT
  rationale: El giro hebreo es idiomático. «Se levantó temprano por la mañana» expresa el valor temporal y narrativo de forma natural en español, sin volverlo demasiado coloquial ni arcaico.
- source_word: וַיַּעַל אֶל הַר סִינַי
  english_pob_choice: went up Mount Sinai
  chosen_spanish: subió al monte Sinaí
  alternatives_spanish:
  - subió al monte Sinaí
  - ascendió al monte Sinaí
  - subió a monte Sinaí
  lexicon: HALOT
  rationale: «Subió al monte Sinaí» reproduce el movimiento ascendente con un español natural y reverente. «Ascendió» sería más formal, pero menos directo; «subió a» suena menos idiomático aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título sustitutorio. Conforme al criterio del proyecto, se mantiene «Yahvé» para preservar la referencia al nombre divino revelado.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֹתוֹ
  english_pob_choice: just as Yahweh had commanded him
  chosen_spanish: tal como Yahvé le había mandado
  alternatives_spanish:
  - tal como Yahvé le había mandado
  - como Yahvé le había mandado
  - justo como Yahvé le había mandado
  lexicon: HALOT
  rationale: «Tal como» refleja bien la conformidad exacta del hebreo. «Le había mandado» conserva el mandato personal y la secuencia verbal del pasado perfecto en español.
- source_word: וַיִּקַּח בְּיָדוֹ
  english_pob_choice: he took the two stone tablets in his hand
  chosen_spanish: tomó en su mano
  alternatives_spanish:
  - tomó en su mano
  - las tomó en su mano
  - las llevó en su mano
  lexicon: HALOT
  rationale: Se preserva el singular hebreo «en su mano», que puede sonar idiomático en español sin forzar un plural. El objeto directo se deja implícito en la siguiente frase para mantener la fluidez y la cadencia del versículo.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  english_pob_choice: the two stone tablets
  chosen_spanish: las dos tablas de piedra
  alternatives_spanish:
  - las dos tablas de piedra
  - las dos tablas de piedra
  - las dos tablas de piedra
  lexicon: HALOT
  rationale: La repetición del sintagma al final del versículo se conserva como referencia definida. «Tablas de piedra» mantiene el registro bíblico y la correspondencia directa con la hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  - Jehová
  rationale: El hebreo emplea el Tetragrama directamente; por coherencia con la política del proyecto y para no ocultar el nombre del pacto detrás de un título, se traduce como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: mantiene el orden narrativo natural, conserva el matiz idiomático de «en su mano» y evita volver la frase mecánica. No se introdujeron cambios doctrinales fuera de la equivalencia del nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Tablas de piedra» se mantiene de forma consistente para לֻחֹת אֲבָנִים.
  - Se conservó el paralelismo narrativo con dos cláusulas coordinadas y una referencia final explícita a las tablas.
  - Las notas a pie de página se anclan solo donde el español crea o preserva una alternativa relevante.
