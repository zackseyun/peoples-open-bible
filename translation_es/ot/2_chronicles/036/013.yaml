translation:
  language: es
  text: También se rebeló contra el rey Nabucodonosor[a], quien lo había hecho jurar por Dios; endureció su cerviz[b] y endureció su corazón de volver a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien lo había vinculado con un juramento delante de Dios». El hebreo puede subrayar tanto el acto de hacerle jurar como el marco solemne del juramento ante Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «endureció su cerviz», figura de resistencia obstinada.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: He also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: Conserva el valor aditivo del hebreo al inicio de la cláusula, con una forma natural en español bíblico contemporáneo.
- source_word: בַּמֶּלֶךְ נְבוּכַדְנֶאצַּר
  english_pob_choice: against King Nebuchadnezzar
  chosen_spanish: contra el rey Nabucodonosor
  alternatives_spanish:
  - contra el rey Nabucodonosor
  - contra Nabucodonosor, el rey
  lexicon: HALOT
  rationale: Con מָרַד, la preposición marca oposición/rebelión contra la autoridad real; 'contra el rey Nabucodonosor' conserva el sentido político y la fluidez española.
- source_word: מָרָד
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se levantó
  - se sublevó
  lexicon: HALOT
  rationale: Es el equivalente más directo y natural para la acción de rebelión política expresada por el verbo hebreo.
- source_word: אֲשֶׁר הִשְׁבִּיעוֹ בֵאלֹהִים
  english_pob_choice: who had made him swear by God
  chosen_spanish: quien lo había hecho jurar por Dios
  alternatives_spanish:
  - quien lo había puesto bajo juramento por Dios
  - quien lo había vinculado con un juramento delante de Dios
  lexicon: HALOT
  rationale: Mantiene la fuerza causativa de הִשְׁבִּיעוֹ y la referencia a Dios con una construcción natural en español. 'Por Dios' preserva la relación preposicional básica del texto sin sobreexplicar.
- source_word: וַיֶּקֶשׁ אֶת עָרְפּוֹ
  english_pob_choice: he stiffened his neck
  chosen_spanish: endureció su cerviz
  alternatives_spanish:
  - endureció su cuello
  - se volvió de cerviz dura
  lexicon: HALOT
  rationale: La imagen idiomática hebrea se conserva con 'cerviz', término bíblico español que mantiene el registro y la metáfora de obstinación.
- source_word: וַיְאַמֵּץ אֶת לְבָבוֹ
  english_pob_choice: hardened his heart
  chosen_spanish: obstinó su corazón
  alternatives_spanish:
  - endureció su corazón
  - fortaleció su corazón
  lexicon: HALOT
  rationale: '''Obstinó'' comunica el endurecimiento moral y volitivo del contexto. Se evita ''fortaleció'' porque en español podría sugerir valor positivo y diluir la carga ética del pasaje.'
- source_word: מִשּׁוּב
  english_pob_choice: from turning
  chosen_spanish: para no volver
  alternatives_spanish:
  - de volver
  - para no retornar
  lexicon: HALOT
  rationale: La frase refleja la idea de impedir el regreso/retorno a Yahvé de modo idiomático en español, y conserva el sentido preventivo que el inglés POB ajustó a 'from turning' en la revisión.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, preservando el nombre de pacto y evitando la convención de ocultarlo tras ''SEÑOR''.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Renderiza de forma estándar el constructo hebreo y mantiene la identificación pactual de Dios con Israel.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la política del proyecto exige su transliteración como 'Yahvé' en el texto principal. Esto preserva la transparencia textual y la distinción entre el nombre divino y un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión idiomática de obstinación en 'endureció su cerviz'
  english_pob_reading: 'Hebrew idiom: ''stiffened his neck,'' a figure for stubborn resistance.'
  chosen_spanish_reading: endureció su cerviz
  alternative_spanish_readings:
  - endureció su cuello
  - se volvió de cerviz dura
  rationale: La metáfora hebrea se conserva en una forma reconocible en español bíblico. 'Cerviz' mantiene el registro escritural y la imagen de resistencia obstinada sin convertirla en una paráfrasis.
  doctrine_reference: POB lexical idiom handling
- issue: Sentido de מִשּׁוּב en relación con la negativa a arrepentirse
  english_pob_reading: from turning
  chosen_spanish_reading: para no volver
  alternative_spanish_readings:
  - de volver
  - para no retornar
  rationale: La construcción española expresa prevención/impedimento del retorno, que corresponde mejor al giro hebreo y a la revisión inglesa que prefirió 'from turning' por fidelidad semántica. 'Volver' conserva la idea bíblica de retorno a Yahvé.
  doctrine_reference: POB revision note on מִן + infinitive
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'against turning' a 'from turning' para reflejar mejor el hebreo מִשּׁוּב como impedimento del regreso. La redacción española adopta esa misma dirección semántica con 'para no volver'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se conserva la metáfora de la cerviz para reflejar el hebraísmo con transparencia.
  - '''Dios de Israel'' se traduce de manera estándar para el constructo final sin añadir matices no presentes en el hebreo.'
  - '''Obstinó su corazón'' busca mantener la fuerza negativa del contexto sin neutralizarla con una expresión demasiado genérica.'
