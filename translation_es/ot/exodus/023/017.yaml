review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: «Tres veces en el año» para שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה, «ante» para אֶל־פְּנֵי, y «el Señor Yahvé» preserva correctamente la combinación הָאָדֹן יְהוָה conforme a la política del proyecto. La única desviación significativa es «se presentará» para יֵרָאֶה, que introduce un matiz más activo/reflexivo que «shall appear» y que el rationale inglés explícitamente evitó.'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, la nota [a] crea una explicación innecesariamente metalingüística y algo forzada («inclusiva en el sentido moderno») para un versículo donde el texto principal ya expresa bien la referencia masculina. Además, el anclaje de la nota sobre «ustedes» no corresponde idealmente al punto léxico debatido, que es «varón».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» y הָאָדֹן → «el Señor». «Varón» preserva bien זָכוּר. Se recomienda ajustar יֵרָאֶה a «aparecerá» para seguir mejor la decisión auditada de «shall appear» y evitar ampliar el sentido a comparecencia formal.'
  issues:
  - severity: medium
    issue: «se presentará» sobretraduce יֵרָאֶה
    rationale: El inglés auditado escogió «shall appear» y rechazó expresamente una opción más interpretativa como «present himself». En español, «se presentará» añade una noción de comparecencia voluntaria/formal no marcada en el hebreo.
  - severity: low
    issue: La nota [a] está anclada en «ustedes» en vez de en «varón»
    rationale: Si se conserva una nota léxica sobre כָּל זְכוּרְךָ, el marcador debe recaer sobre el término o frase relevante, no sobre «ustedes», que no es el foco principal de la explicación.
  - severity: low
    issue: La nota actual usa lenguaje explicativo innecesario
    rationale: La mención a lectura «inclusiva en el sentido moderno» no procede del rastro auditado inglés y puede sonar apologética más que traductológica. Es mejor una nota breve y directamente léxica, o ninguna nota si no es necesaria.
  revised_spanish_text: Tres veces en el año, todo varón[a] entre ustedes aparecerá ante el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «todo tu varón», es decir, todos los varones entre ustedes.'
