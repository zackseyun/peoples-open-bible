translation:
  language: es
  text: ¿Quién puso sabiduría en lo íntimo[a], o quién dio entendimiento a la mente?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «¿Quién puso sabiduría en las partes ocultas, o quién dio entendimiento al gallo?». Algunos entienden el segundo término como un ave (tradicionalmente «gallo», a veces «ibis») en vez de la mente.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién fue el que
  lexicon: HALOT
  rationale: Interrogativo natural para la pregunta retórica divina; conserva el tono directo del hebreo.
- source_word: שָׁת
  english_pob_choice: has put
  chosen_spanish: puso
  alternatives_spanish:
  - ha puesto
  - colocó
  lexicon: HALOT
  rationale: Verbo básico de poner/colocar; en español la forma simple funciona mejor en esta pregunta retórica y mantiene la brevedad del paralelismo.
- source_word: בַּטֻּחוֹת
  english_pob_choice: in the inward parts
  chosen_spanish: en las partes internas
  alternatives_spanish:
  - en las entrañas
  - en las partes ocultas
  lexicon: HALOT
  rationale: El término es oscuro. 'Partes internas' conserva el sentido corporal-metafórico sin reducirlo a 'riñones', que sería poco transparente en español moderno. Se mantiene la ambigüedad entre interior humano y partes ocultas.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: Término estándar y natural en español bíblico; corresponde directamente al hebreo.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: Conjunción simple que enlaza los dos miembros paralelos.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - concedió
  lexicon: HALOT
  rationale: Verbo común y preciso para el segundo miembro; mantiene el paralelismo con 'puso'.
- source_word: לַשֶּׂכְוִי
  english_pob_choice: to the mind
  chosen_spanish: a la mente
  alternatives_spanish:
  - al gallo
  - al ibis
  - al entendimiento
  lexicon: HALOT
  rationale: 'Sigue la lectura contextual adoptada por la POB inglesa: en paralelo con ''partes internas'' y con ''sabiduría/entendimiento'', ''mente'' expresa una facultad interna. Se preserva la lectura alternativa animal en nota para no borrar la tensión lexical.'
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: HALOT
  rationale: Equivalente habitual de בינה; mantiene el contraste semántico con 'sabiduría'.
theological_decisions:
- issue: 'Sentido de los dos términos difíciles: interior humano vs. ave'
  english_pob_reading: The verse speaks of God giving inner human faculties wisdom and understanding.
  chosen_spanish_reading: El versículo describe a Dios dando sabiduría y entendimiento como facultades internas.
  alternative_spanish_readings:
  - El versículo podría referirse al conocimiento instintivo dado a una ave, tradicionalmente el gallo o el ibis.
  rationale: La paralelismo interno favorece una lectura antropológica, pero la tradición de la lectura animal sigue siendo plausible. Por eso se mantiene la alternativa en nota, sin resolverla de manera excesiva.
  doctrine_reference: Translation philosophy §3; preservar la tensión léxica y teológica cuando el texto es deliberadamente ambiguo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y mantiene la ambigüedad documentada de בַּטֻּחוֹת / לַשֶּׂכְוִי, sin introducir términos eclesiásticos no respaldados por la fuente.
  spanish_consistency_notes:
  - Se usa 'Dios' implícitamente por el contexto del discurso, pero el versículo permanece en forma interrogativa retórica sin añadir sujeto explícito.
  - '''Mente'' se eligió para לַשֶּׂכְוִי porque la POB inglesa ya documenta esa lectura contextual; la nota conserva las alternativas zoológicas.'
  - '''Partes internas'' evita el literalismo de ''riñones'' y también evita una paráfrasis demasiado abstracta como ''interior'' sin soporte suficiente.'
