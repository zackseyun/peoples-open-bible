  yaml_path: translation/ot/2_kings/013/014.yaml
  text: Now Elisha had become sick with the illness from which he would die[a]. And Joash king of Israel went down to him and wept over him and said, “My father[b], my father! The chariots of Israel and its horsemen!”
  footnotes:
