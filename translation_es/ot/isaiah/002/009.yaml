translation:
  language: es
  text: Así, el hombre queda humillado, y cada persona es abatida; no les perdones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no los levantes». El verbo hebreo puede significar «levantar, cargar, llevar» y, en algunos contextos, «perdonar».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשַּׁח
  english_pob_choice: is bowed down
  chosen_spanish: queda humillado
  alternatives_spanish:
  - se abate
  - es humillado
  - queda abatido
  lexicon: HALOT
  rationale: El hebreo expresa un estado/resultante de estar inclinado o abatido. «Queda humillado» mantiene el valor pasivo-resultativo y el matiz de degradación humana sin sonar forzado en español.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם funciona de modo genérico y en paralelo con אִישׁ. «El hombre» conserva el valor genérico y la simetría poética del texto.
- source_word: וַיִּשְׁפַּל
  english_pob_choice: is brought low
  chosen_spanish: es abatida
  alternatives_spanish:
  - es humillada
  - queda humillada
  - es rebajada
  lexicon: HALOT
  rationale: El verbo שׁפל comunica ser hecho bajo o rebajado. «Es abatida» reproduce bien la idea de humillación y el paralelismo con la primera cola.
- source_word: אִישׁ
  english_pob_choice: each person
  chosen_spanish: cada persona
  alternatives_spanish:
  - cada hombre
  - el individuo
  lexicon: HALOT
  rationale: En este pareado poético, אִישׁ no añade simplemente repetición de «hombre», sino una referencia distributiva a cada individuo. «Cada persona» comunica ese sentido sin perder el paralelismo.
- source_word: וְאַל תִּשָּׂא לָהֶם
  english_pob_choice: do not forgive them
  chosen_spanish: no los perdones
  alternatives_spanish:
  - no los levantes
  - no los lleves
  - no les perdones
  lexicon: HALOT
  rationale: נשא con objeto personal puede significar «perdonar» por la idea de llevar/se cargar con la culpa. En este contexto de juicio, la lectura adoptada por la POB inglesa se expresa naturalmente en español como «no los perdones», preservando la tensión con la alternativa literal.
theological_decisions:
- issue: Sentido de נשא en la cláusula final
  english_pob_reading: A plea that God not forgive the people
  chosen_spanish_reading: Una súplica para que Dios no los perdone
  alternative_spanish_readings:
  - Una súplica para que Dios no los levante
  - Una afirmación de que no serán exaltados
  rationale: El hebreo admite tanto la idea de perdón como la de levantar/exaltar. En el marco inmediato de juicio contra la soberbia, la lectura de no perdón es la más coherente y coincide con la opción inglesa de la POB. Se conserva la alternativa literal para no borrar la tensión semántica.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La revisión más reciente no aplicó cambios: el texto de base quedó sin alteraciones y el consenso de revisión fue alto. La redacción española se ajusta directamente al sentido ya auditado, manteniendo la ambigüedad léxica relevante de נשא mediante nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo exige; este versículo no lo contiene.
  - Se mantiene el paralelismo poético entre אָדָם y אִישׁ con dos expresiones distintas en español.
  - «Perdones» traduce la lectura contextual adoptada, pero la nota preserva la alternativa literal de «levantar».
  - El tono es sobrio y bíblico, con español contemporáneo de registro eclesial amplio.
