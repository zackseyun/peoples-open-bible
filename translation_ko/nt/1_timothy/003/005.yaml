id: 1TI.3.5
reference: 1 Timothy 3:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: (εἰ δέ τις τοῦ ἰδίου οἴκου προστῆναι οὐκ οἶδεν, πῶς ἐκκλησίας θεοῦ ἐπιμελήσεται;)
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/005.yaml
  text: But if someone does not know how to manage his own household[c][b][a], how will he care for God’s church?
  footnotes:
  - marker: a
    text: Or 'the church of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lead' or 'preside over' his own household.
    reason: lexical_alternative
  - marker: c
    text: Or 'take care of' God's church.
    reason: lexical_alternative
translation:
  language: ko
  text: (누구든지 자기 집을 다스릴[b] 줄 모른다면 어떻게 하나님의 교회[a]를 돌볼[c] 수 있겠습니까?)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님의 회중」. 본 절은 사역 직무의 정립적 문맥이므로 「교회」를 본문에 둔다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「이끌」 「관리할」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「돌볼」 「보살필」.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ τις
  english_pob_choice: But if someone
  chosen_korean: 누구든지 ~ 한다면
  alternatives_korean:
  - 어떤 사람이 ~ 한다면
  lexicon: BDAG
  rationale: 가정의 일반화 표현.
- source_word: προστῆναι
  english_pob_choice: to manage
  chosen_korean: 다스릴
  alternatives_korean:
  - 이끌
  - 관리할
  lexicon: BDAG
  rationale: 4절 προϊστάμενον과 동일 어근. 일관되게 「다스리다」.
- source_word: ἐκκλησίας θεοῦ
  english_pob_choice: God’s church
  chosen_korean: 하나님의 교회
  alternatives_korean:
  - 하나님의 회중
  lexicon: BDAG
  rationale: ἐκκλησία는 빌립보서에서 「회중」 우선이었으나, 목회서신의 정립적 직무 문맥(감독·집사·교회의 기둥)에서는 「교회」의 제도적 의미가 본문에 강하게 드러난다. 본 절은 「교회」를 본문에 둠.
- source_word: ἐπιμελήσεται
  english_pob_choice: care for
  chosen_korean: 돌볼
  alternatives_korean:
  - 보살필
  - 관리할
  lexicon: BDAG
  rationale: ἐπιμελέομαι의 「(꾸준히) 돌보다·돌볼 책임을 지다」를 「돌보다」로 옮긴다.
theological_decisions:
- issue: ἐκκλησία를 「교회」로 옮긴 결정
  chosen_reading: 하나님의 교회
  alternative_readings:
  - 하나님의 회중
  rationale: 목회서신 3장 전체가 감독·집사·교회 직제를 다루는 제도적 문맥이므로, 본 번역은 ἐκκλησία를 「교회」로 옮긴다. 빌립보서(공동체적 회중) 흐름에서는 「회중」을 선호했으나, 목회서신에서는 EN POB의 강한 제도적 어감과 본문 문맥이 「교회」를 정당화한다. 15절 「살아 계신 하나님의 교회」도 동일하게 처리한다.
  doctrine_reference: 'Korean glossary: ἐκκλησία → 회중/교회 case-by-case; Pastorals often have institutional sense'
