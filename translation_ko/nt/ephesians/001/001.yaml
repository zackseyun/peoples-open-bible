id: EPH.1.1
reference: Ephesians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ τοῖς ἁγίοις τοῖς οὖσιν ⸂[ἐν Ἐφέσῳ]⸃ καὶ πιστοῖς ἐν Χριστῷ Ἰησοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/001.yaml
  text: 'Paul, an apostle of Messiah Jesus by the will of God, to the saints who are [in Ephesus] and faithful in Messiah Jesus:'
translation:
  language: ko
  text: '하나님의 뜻으로 말미암아 메시아 예수의 사도가 된 바울이, [에베소에][a] 있는 성도들 곧 메시아 예수 안에서 신실한 자들에게 편지합니다:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 초기 사본은 「에베소에」를 생략한다. 이 때문에 본 서신을 에베소 한 교회만이 아니라 더 넓은 회람용으로 이해하는 견해가 있다. SBLGNT는 이 어구를 대괄호로 두어 본문비평적 불확실성을 표시하므로 한국어 본문에서도 그대로 유지한다.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 사절
  - 보냄받은 자
  lexicon: BDAG
  rationale: 초기 그리스도교 직제·권위를 가리키는 「사도」가 한국 교회 전통에서 굳어진 정확한 등가어이며, 일반적 「사절」은 그 무게를 약화시킨다.
- source_word: Χριστοῦ Ἰησοῦ / ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus / in Messiah Jesus
  chosen_korean: 메시아 예수 / 메시아 예수 안에서
  alternatives_korean:
  - 그리스도 예수
  - 그리스도 예수 안에서
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다. 한국 전통의 「그리스도」 음역은 칭호성을 가리므로 피한다.
- source_word: '[ἐν Ἐφέσῳ]'
  english_pob_choice: '[in Ephesus]'
  chosen_korean: '[에베소에]'
  alternatives_korean:
  - 에베소에
  lexicon: BDAG
  rationale: 본문비평적 불확실성을 한국어 본문에서도 대괄호로 보존하고, 외래어 표기법보다는 한국 교회에서 굳어진 「에베소」를 채택한다.
- source_word: πιστοῖς
  english_pob_choice: faithful
  chosen_korean: 신실한 자
  alternatives_korean:
  - 믿는 자
  - 충성된 자
  lexicon: BDAG
  rationale: πιστός는 「믿음을 지킴」(faithful)과 「믿는 자」(believer) 두 의미를 모두 갖는다. 본문이 「성도」와 짝지어 충성·신실의 형용적 의미를 살리므로 「신실한 자」를 택하고, 「믿는 자」는 각주 대안으로 남길 수 있는 무게는 약하다.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_korean: 성도
  alternatives_korean:
  - 거룩한 자들
  lexicon: BDAG
  rationale: 바울 서신의 인사 정식에서 「성도」가 자연스러운 한국어 등가어이다.
theological_decisions:
- issue: 인사 정식의 Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 번역하도록 지시한다. 에베소서 인사에서도 칭호의 무게가 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title)'
- issue: ἐν Ἐφέσῳ의 본문비평적 위치
  chosen_reading: 한국어 본문에서도 대괄호로 보존
  alternative_readings:
  - 본문에서 제거
  rationale: SBLGNT가 이 어구를 대괄호로 두어 사본 증거의 분열을 시각적으로 표시한다. 한국어 본문에서도 대괄호를 유지하여 본문비평적 긴장을 그대로 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological/text-critical tension rather than resolve it.'
