translation:
  language: es
  text: Pero cuando Nicanor oyó el valor que tenían los que estaban con Judas, y su valentía en las luchas por su patria, era reacio a resolver el asunto[a] por derramamiento de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'decidir el caso con sangre' o 'llevar a cabo el juicio por derramamiento de sangre'. La frase griega τὴν κρίσιν διʼ αἵματος ποιήσασθαι es algo idiomática y también puede traducirse de manera más formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμως δὲ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: LSJ
  rationale: El giro concesivo/adversativo se expresa con una conjunción natural en español; aquí 'Pero' mantiene la transición sin endurecer el estilo.
- source_word: ἀκούων
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - al oír
  - oyendo
  lexicon: LSJ
  rationale: El participio se vierte temporalmente para mostrar la circunstancia que desencadena la reacción de Nicanor, con español fluido y fiel al valor contextual.
- source_word: ἀνδραγαθίαν
  english_pob_choice: valor
  chosen_spanish: valor
  alternatives_spanish:
  - bravura
  - heroísmo
  - denuedo
  lexicon: LSJ
  rationale: En contexto militar y de honor, 'valor' comunica bien la excelencia valiente sin introducir un matiz innecesariamente técnico o moderno.
- source_word: οἱ περὶ τὸν Ἰούδαν
  english_pob_choice: those around Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los que rodeaban a Judas
  - los compañeros de Judas
  - los de Judas
  lexicon: LSJ
  rationale: La expresión idiomática se vuelve natural en español como un grupo asociado a Judas; 'los que estaban con Judas' conserva la referencia relacional sin sobreinterpretar.
- source_word: ἐν τοῖς περὶ τῆς πατρίδος ἀγῶσιν
  english_pob_choice: in the struggles for their fatherland
  chosen_spanish: en las luchas por su patria
  alternatives_spanish:
  - en los combates por su patria
  - en las contiendas por su tierra natal
  - en las luchas por su país
  lexicon: LSJ
  rationale: '''Patria'' mantiene el tono patriótico de πατρίς mejor que ''país'', y ''luchas'' comunica bien ἀγῶσιν en este contexto bélico y nacional.'
- source_word: εὐψυχίαν
  english_pob_choice: courage
  chosen_spanish: valentía
  alternatives_spanish:
  - coraje
  - ánimo
  - denuedo
  lexicon: LSJ
  rationale: El término sugiere intrepidez o ánimo firme; 'valentía' es claro y idiomático en español, sin perder el sentido de firmeza de espíritu.
- source_word: ὑπευλαβεῖτο
  english_pob_choice: he was reluctant
  chosen_spanish: vacilaba
  alternatives_spanish:
  - era renuente
  - se mostraba reacio
  - tenía reparo
  lexicon: LSJ
  rationale: El verbo expresa reserva/cautela ante la acción; 'vacilaba' captura esa hesitación sin añadir miedo explícito que el contexto no exige.
- source_word: τὴν κρίσιν διʼ αἵματος ποιήσασθαι
  english_pob_choice: to settle the matter by bloodshed
  chosen_spanish: llevar a cabo la sentencia por medio de sangre
  alternatives_spanish:
  - resolver el asunto por derramamiento de sangre
  - decidir el caso con sangre
  - ejecutar el juicio mediante sangre
  lexicon: LSJ
  rationale: La construcción es idiomática y puede entenderse como una decisión/juicio realizado violentamente. 'Sentencia' refleja el campo judicial de κρίσις, y 'por medio de sangre' preserva el valor literal de διʼ αἵματος sin suavizarlo.
translation_notes:
  revision_awareness: Se corrige la validación anterior eliminando la nota [a], ya que no había anclaje en el texto. La redacción mantiene la decisión léxica sobre τὴν κρίσιν διʼ αἵματος ποιήσασθαι sin aparato adicional.
  spanish_consistency_notes:
  - Se usa 'patria' para πατρίς en concordancia con el tono nacional del pasaje.
  - Se evita 'Mesías'/'Cristo' porque no aparece en el versículo.
  - Se conserva el matiz de cautela de ὑπευλαβεῖτο con 'vacilaba', sin añadir un temor no explicitado.
