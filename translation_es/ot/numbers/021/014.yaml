translation:
  language: es
  text: 'Por tanto se dice en el Libro de las Guerras de Yahvé: «Waheb[b] en Suphah[a], y los wadis del Arnón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Waheb en la tormenta», si Suphah se toma como un sustantivo común y no como un nombre de lugar.'
    reason: alternative_reading
  - marker: b
    text: El hebreo de esta línea citada es oscuro; algunos entienden «Waheb» de otro modo, incluso como parte de una cláusula verbal y no como un nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La fórmula introduce una cita o explicación; «Por tanto» conserva el valor inferencial con un registro natural y digno en español.
- source_word: יֵאָמַר
  english_pob_choice: it is said
  chosen_spanish: se dice
  alternatives_spanish:
  - se ha dicho
  - dicen
  lexicon: HALOT
  rationale: El niphal impersonal funciona como introducción de una fuente citada; «se dice» reproduce bien la impersonalidad sin añadir sujeto.
- source_word: בְּסֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en un libro
  - en el rollo
  lexicon: HALOT
  rationale: La construcción apunta a una fuente escrita conocida; «Libro» es natural y mantiene el carácter de título o referencia textual.
- source_word: מִלְחֲמֹת יְהוָה
  english_pob_choice: of the Wars of Yahweh
  chosen_spanish: de las Guerras de Yahvé
  alternatives_spanish:
  - de las batallas de Yahvé
  - de las guerras de Yahvé
  lexicon: HALOT
  rationale: Se conserva el plural fuerte de מִלְחֲמֹת con «Guerras» y el nombre divino con el equivalente del proyecto, «Yahvé», evitando sustitución por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: La política terminológica del proyecto pide verter el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre propio divino.
- source_word: אֶת וָהֵב
  english_pob_choice: Waheb
  chosen_spanish: Waheb
  alternatives_spanish:
  - Vaheb
  - '[lo] dio'
  lexicon: HALOT
  rationale: El hebreo es oscuro; la POB inglesa opta por transliterar el probable nombre propio. En español se preserva «Waheb» para no forzar una lectura verbal conjectural.
- source_word: בְּסוּפָה
  english_pob_choice: in Suphah
  chosen_spanish: en Suphah
  alternatives_spanish:
  - en la tormenta
  - en la tempestad
  - en Sufá
  lexicon: HALOT
  rationale: Se mantiene la transliteración como posible topónimo, siguiendo la cautela del original auditado y evitando fijar prematuramente un sentido común.
- source_word: וְאֶת הַנְּחָלִים
  english_pob_choice: and the wadis
  chosen_spanish: y los wadis
  alternatives_spanish:
  - y los valles
  - y los torrentes
  - y los arroyos
  lexicon: HALOT
  rationale: En este contexto geográfico, «wadis» es el término más preciso para cauces estacionales; se conserva el valor técnico que la POB inglesa ya decidió.
- source_word: אַרְנוֹן
  english_pob_choice: the Arnon
  chosen_spanish: el Arnón
  alternatives_spanish:
  - Arnón
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico con artículo natural en español cuando corresponde a un río o sistema hidrográfico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La línea citada pertenece al título de una obra atribuida a Yahvé; el proyecto exige no ocultar el nombre divino bajo una sustitución titulada. «Yahvé» mantiene esa decisión en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el paquete auditado; el estado más reciente indica que no hubo cambios necesarios y la concordancia de revisión fue alta.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los topónimos/elementos oscuros («Waheb», «Suphah», «Arnón») para preservar la cautela del texto fuente.
  - Se usó «Yahvé» conforme a la terminología del proyecto y a la decisión auditada del texto inglés.
  - «wadis» se conservó como tecnicismo geográfico para reflejar la precisión del inglés POB y del hebreo נְחָלִים en contexto.
