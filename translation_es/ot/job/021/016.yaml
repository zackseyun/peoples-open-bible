- from: '[a]Mira: ¿no está su prosperidad en su propia mano? El consejo de los malvados está lejos de mí.'
  to: 'He aquí[a]: ¿no está su prosperidad en su propia mano? El consejo de los malvados está lejos de mí.'
  rationale: Se aplica una revisión menor para mejorar el registro litúrgico-formal y el anclaje de la nota, sin cambiar el sentido. «He aquí» representa bien הֵן en un español bíblico digno y armoniza con la revisión inglesa final («Behold»). La nota alternativa se mantiene y se ajusta para corresponder exactamente al texto revisado.
