translation:
  language: es
  text: Así Manasés desvió a Judá y a los habitantes de Jerusalén, para hacer lo malo más que las naciones que Yahvé había destruido de delante de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas» o «el pueblo de Israel». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּתַע
  english_pob_choice: led ... astray
  chosen_spanish: desvió
  alternatives_spanish:
  - los hizo errar
  - los extravió
  - los llevó por mal camino
  lexicon: HALOT
  rationale: El verbo en forma causativa expresa inducir a otros a apartarse del camino recto. En español, «desvió» conserva la idea de hacer que alguien se aparte o se extravíe sin sonar forzado.
- source_word: יְהוּדָה וְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: Judah and the inhabitants of Jerusalem
  chosen_spanish: Judá y a los habitantes de Jerusalén
  alternatives_spanish:
  - Judá y los que habitaban en Jerusalén
  - Judá y los residentes de Jerusalén
  lexicon: HALOT
  rationale: 'Se mantiene el objeto corporativo doble del hebreo: tanto Judá como, de manera específica, los habitantes de Jerusalén. «Habitantes» es una equivalencia natural y fiel de la construcción participial.'
- source_word: לַעֲשׂוֹת רָע
  english_pob_choice: to do ... evil
  chosen_spanish: para hacer más mal
  alternatives_spanish:
  - para obrar mal
  - para hacer lo malo
  lexicon: HALOT
  rationale: El infinitivo con לַ expresa finalidad; «hacer mal» conserva el modismo hebreo. Se añade «más» porque la comparación con «las naciones» pertenece al sentido completo de la cláusula siguiente.
- source_word: מִן הַגּוֹיִם
  english_pob_choice: more evil than the nations
  chosen_spanish: más mal que las naciones
  alternatives_spanish:
  - peor que las naciones
  - más maldad que las naciones
  lexicon: HALOT
  rationale: La preposición מִן introduce comparación. En español, «más mal que» reproduce esa relación de modo directo y sin suavizar la fuerza evaluativa del texto.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico se refiere a los pueblos circundantes; «las naciones» es la equivalencia más natural y menos cargada de matices posteriores.
- source_word: אֲשֶׁר הִשְׁמִיד יְהוָה
  english_pob_choice: whom Yahweh had destroyed
  chosen_spanish: que Yahvé había destruido
  alternatives_spanish:
  - a quienes Yahvé había destruido
  - que Yahvé había exterminado
  lexicon: HALOT
  rationale: «Destruyó» mantiene la fuerza de השמיד sin exagerar más allá del valor léxico básico. Se conserva el nombre divino «Yahvé» conforme al estándar del proyecto.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: HALOT
  rationale: En el contexto de expulsión o eliminación, la expresión hebrea se vierte naturalmente como «de delante de», que conserva el valor espacial/forense de la preposición idiomática.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo porque el texto enfatiza la fórmula representativa. «Hijos de Israel» preserva la forma auditable del original; una alternativa más idiomática puede verse en nota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, usando «Yahvé» como transliteración reverente y transparente, en vez de la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance moral de רָע en la cláusula final
  english_pob_reading: more evil than the nations
  chosen_spanish_reading: más mal que las naciones
  alternative_spanish_readings:
  - más maldad que las naciones
  - peor que las naciones
  rationale: Se preserva la evaluación moral fuerte del texto hebreo y su comparación explícita con otras naciones, sin rebajarla a una formulación demasiado abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada en la última pasada; por eso no se introducen cambios interpretativos adicionales. La redacción española sigue de cerca la decisión inglesa y el hebreo, manteniendo el paralelo entre Judá, Jerusalén, las naciones y los hijos de Israel.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «los hijos de Israel» en el texto principal para reflejar la forma hebrea, con nota alternativa más idiomática.
  - «Desvió» evita tanto la rigidez de «causó errar» como una paráfrasis más libre que diluya el causativo del verbo hebreo.
