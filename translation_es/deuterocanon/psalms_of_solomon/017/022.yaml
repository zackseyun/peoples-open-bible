translation:
  language: es
  text: El rey estaba[a] en iniquidad, y el juez en desobediencia[b], y el pueblo en pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego es una cláusula sin verbo expreso; se suministra «estaba» en español para claridad, siguiendo el contexto temporal pasado del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O «rebeldía» para ἀπειθείᾳ.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς
  english_pob_choice: king
  chosen_spanish: el rey
  alternatives_spanish:
  - el gobernante
  - el monarca
  lexicon: BDAG
  rationale: «Rey» es la equivalencia directa y natural para βασιλεύς; mantiene la concreción del título político sin ampliar indebidamente a «gobernante».
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - bajo
  - caracterizado por
  lexicon: BDAG
  rationale: La repetición de ἐν marca esfera o condición; «en» conserva la estructura paralela y el ritmo del griego.
- source_word: παρανομίᾳ
  english_pob_choice: lawlessness
  chosen_spanish: ilegalidad
  alternatives_spanish:
  - sin ley
  - iniquidad
  - transgresión
  lexicon: BDAG
  rationale: La raíz expresa conducta fuera de la ley u orden establecido. «Ilegalidad» preserva con claridad el matiz jurídico de lawlessness; «iniquidad» sería más tradicional pero menos preciso aquí.
- source_word: κριτὴς
  english_pob_choice: judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el magistrado
  lexicon: BDAG
  rationale: «Juez» es la traducción directa y más natural del oficio nombrado en el griego.
- source_word: ἀπειθείᾳ
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - rebeldía
  - rebeldía contra la autoridad
  lexicon: BDAG
  rationale: En este contexto cívico-moral, «desobediencia» conserva la idea de rechazo a la autoridad legítima o al orden debido sin introducir un matiz más fuerte del que exige el texto.
- source_word: λαὸς
  english_pob_choice: people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: BDAG
  rationale: «Pueblo» conserva el sentido colectivo del griego y encaja con la serie de tres miembros.
- source_word: ἁμαρτίᾳ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecaminosidad
  lexicon: BDAG
  rationale: «Pecado» es la correspondencia más directa y mantiene la brevedad del cierre paralelo.
theological_decisions:
- issue: Tense in a verbless clause
  english_pob_reading: The king was in lawlessness, and the judge in disobedience, and the people in sin.
  chosen_spanish_reading: El rey estaba en ilegalidad, y el juez en desobediencia, y el pueblo en pecado.
  alternative_spanish_readings:
  - El rey es en ilegalidad, y el juez en desobediencia, y el pueblo en pecado.
  - El rey está en ilegalidad, y el juez en desobediencia, y el pueblo en pecado.
  rationale: Sigo la revisión que entiende el contexto temporal como pasado histórico; «estaba» evita convertir la descripción en un presente gnómico.
  doctrine_reference: Contexto histórico narrativo del pasaje; no doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo sin cambios la decisión de considerar el contexto como pasado histórico. La traducción española adopta esa lectura y evita el presente de valor gnómico.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo tripartito del griego: rey / juez / pueblo.'
  - Se evita «SEÑOR» o formulaciones eclesiásticas ajenas al texto; no hay nombre divino en este versículo.
  - «Ilegalidad» se usa como equivalente funcional de lawlessness; si se prefiriera un registro más bíblico-tradicional, «iniquidad» sería una alternativa, pero con pérdida del matiz legal.
