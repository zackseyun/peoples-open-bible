  revision_rationale: 'Se corrigen dos errores sustanciales de fidelidad y terminología: ''enredamiento'' se reemplaza por ''comezón'' para reflejar el término específico נֶתֶק con una nota que preserva la alternativa tradicional y la incertidumbre, y ''lepra'' se reemplaza por ''enfermedad de la piel'' conforme al criterio documentado del POB para צָרַעַת. También se corrigen la ancla de la nota, la gramática de ''de la cabeza'' y la naturalidad de ''su apariencia es más profunda que la piel''.'
