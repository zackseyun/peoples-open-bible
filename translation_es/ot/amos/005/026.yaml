    rationale: 'El hebreo aquí se vierte mejor como acción acusatoria ya realizada o caracterizadora en pasado dentro del reproche profético, y así lo refleja el inglés POB: ''And you carried''. El futuro español cambia el matiz hacia predicción.'
  - severity: high
    issue: '''vuestros ídolos'' para צַלְמֵיכֶם'
    rationale: El sustantivo significa 'vuestras imágenes/estatuas'. 'Ídolos' es interpretativo y va más allá de la decisión inglesa auditada, que prefirió 'your images' precisamente para no sobreespecificar.
  - severity: medium
    issue: 'Registro pronominal no neutral: ''os habíais hecho para vosotros mismos'''
    rationale: Para español neutral latinoamericano, conviene evitar la combinación peninsular 'os/vosotros'. Además, el pluscuamperfecto es innecesario y recarga la frase.
  - severity: low
    issue: Transliteración 'Sicut' puede alejarse de la forma hebrea documentada
    rationale: Aunque es defendible una castellanización, 'Sicut' puede sugerir una adaptación excesiva. 'Sicut/Sikkut' sigue siendo incierto; no es un problema grave si se conserva la nota de incertidumbre.
