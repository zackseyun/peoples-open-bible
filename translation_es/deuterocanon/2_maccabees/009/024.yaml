translation:
  language: es
  text: para que[a], si sucede algo inesperado y sobreviene alguna dificultad, los que están en el país, sabiendo a quién se le han encomendado los asuntos, no se turben;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quién se le han dejado los asuntos». El perfecto pasivo griego puede enfatizar tanto que los asuntos han sido simplemente dejados como que han sido formalmente encomendados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: La partícula introduce finalidad; «para que» es la equivalente natural en español y conserva el valor purposivo sin volver la frase rígida.
- source_word: ἐάν τι παράδοξον ἀποβῇ
  english_pob_choice: if anything unexpected should happen
  chosen_spanish: si sucede algo inesperado
  alternatives_spanish:
  - si ocurre algo extraño
  - si sucede algo extraordinario
  lexicon: LSJ
  rationale: παράδοξον puede significar extraño, inesperado o extraordinario. Dado el contexto, «inesperado» comunica bien lo imprevisto sin cargar el tono en exceso. ἀποβῇ se vierte de forma idiomática como «sucede».
- source_word: προσπέλθῃ τι δυσχερές
  english_pob_choice: some difficulty should arise
  chosen_spanish: sobreviene alguna dificultad
  alternatives_spanish:
  - se presenta algo कठिन?
  - llega alguna situación difícil
  - surge algún problema
  lexicon: LSJ
  rationale: δυσχερές expresa algo difícil, penoso o problemático. «Sobreviene alguna dificultad» mantiene el paralelo con la cláusula anterior y conserva el matiz de una complicación que irrumpe.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - estando al tanto
  - porque saben
  lexicon: LSJ
  rationale: Es un participio circunstancial; «sabiendo» preserva la relación sintáctica y fluidez en español.
- source_word: οἱ κατὰ τὴν χώραν
  english_pob_choice: those in the country
  chosen_spanish: los que están en el país
  alternatives_spanish:
  - los habitantes del país
  - los que están en la región
  - los del territorio
  lexicon: LSJ
  rationale: χώρα aquí designa el territorio o país en general. «Los que están en el país» resulta claro y amplio, sin reducir indebidamente el alcance a una sola provincia.
- source_word: ᾧ καταλέλειπται τὰ πράγματα
  english_pob_choice: to whom the affairs have been entrusted
  chosen_spanish: a quienes han sido encomendados los asuntos
  alternatives_spanish:
  - a quienes se han dejado los asuntos
  - bajo cuya responsabilidad han quedado los asuntos
  lexicon: LSJ
  rationale: El perfecto pasivo subraya que los asuntos han sido dejados/encargados a alguien. «Encomendados» expresa bien la delegación de responsabilidad y conserva la posibilidad interpretativa entre «dejados» y «confiados».
- source_word: μὴ ἐπιταράσσωνται
  english_pob_choice: may not be thrown into confusion
  chosen_spanish: no se turben
  alternatives_spanish:
  - no se confundan
  - no se agiten
  - no se alboroten
  lexicon: LSJ
  rationale: ἐπιταράσσω intensifica la perturbación. «No se turben» conserva un registro digno y amplio, abarcando desorden interior y confusión pública sin exagerar.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; la traducción española sigue la misma lectura sin introducir cambios sustanciales. Se conserva la ambigüedad controlada del pasivo perfecto en ᾧ καταλέλειπται τὰ πράγματα mediante la nota.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y público propio de POB.
  - Se traduce χώρα de forma amplia como «país» para evitar restringir indebidamente el alcance.
  - Se conserva la nota sobre la ambigüedad entre «dejados» y «encomendados» para reflejar el valor del perfecto pasivo griego.
