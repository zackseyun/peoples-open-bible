base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/023/025.yaml
  text: I will set my jealousy against you[a], and they will deal with you in wrath. They will remove your nose and your ears, and your survivors will fall by the sword. They will take your sons and your daughters[b], and your remnant will be consumed by fire.
  footnotes:
  - marker: a
    text: Or 'cut off your nose and your ears.' The Hebrew verb more literally means 'remove,' while the context may imply mutilation.
    reason: lexical_alternative
  - marker: b
    text: Or 'your latter end' or 'what remains of you.' Here the Hebrew likely refers to those left after the initial devastation, hence 'your survivors' / 'your remnant.'
    reason: lexical_alternative
