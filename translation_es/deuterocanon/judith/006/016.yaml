translation:
  language: es
  text: Y convocó a todos los ancianos de la ciudad, y corrieron juntos a la asamblea todos sus jóvenes varones[a] y las mujeres; y pusieron a Ajior en medio de todo su pueblo, y Ozías le preguntó lo ocurrido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «jóvenes varones» refleja el griego πᾶς νεανίσκος, que aquí tiene sentido colectivo y masculino, en contraste con «las mujeres» (αἱ γυναῖκες).
    reason: preservar la distinción social explícita del original griego sin crear ambigüedad en español
lexical_decisions:
- source_word: συνεκάλεσεν
  english_pob_choice: called together
  chosen_spanish: llamó a todos
  alternatives_spanish:
  - convocó a todos
  - llamó juntos a todos
  lexicon: BDAG
  rationale: El verbo compuesto expresa reunir por convocatoria. En español, «llamó a todos» comunica la acción de reunir sin endurecer el estilo; el contexto ya especifica que se trata de los ancianos de la ciudad.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - mayores
  - líderes
  lexicon: BDAG
  rationale: Aquí el sentido es comunitario/institucional, no solo etario. «Ancianos» conserva la función de autoridad local que refleja el texto griego y el inglés POB.
- source_word: συνέδραμον
  english_pob_choice: ran together
  chosen_spanish: corrieron juntos
  alternatives_spanish:
  - se reunieron con prisa
  - acudieron juntos
  lexicon: BDAG
  rationale: El verbo sugiere apresurarse o correr en conjunto. «Corrieron juntos» preserva la urgencia narrativa mejor que un verbo más neutral como «se reunieron».
- source_word: νεανίσκος
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  lexicon: BDAG
  rationale: Aunque la forma griega es singular, el contexto es colectivo y social. En español, «jóvenes» funciona naturalmente para abarcar al grupo juvenil sin introducir una masculinidad innecesaria que el verso no insiste en aislar.
- source_word: ἐκκλησίαν
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - congregación
  lexicon: BDAG
  rationale: En Judith no se trata de la institución eclesial posterior, sino de una reunión del pueblo. «Asamblea» es transparente y evita anacronismo.
- source_word: ἔστησαν
  english_pob_choice: set
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - situaron
  lexicon: BDAG
  rationale: Con objeto personal y complemento locativo, el verbo significa colocar a alguien en un sitio. «Pusieron» es claro y natural en español.
- source_word: ἐν μέσῳ παντὸς τοῦ λαοῦ αὐτῶν
  english_pob_choice: in the midst of all their people
  chosen_spanish: en medio de todo su pueblo
  alternatives_spanish:
  - en medio de toda su gente
  - ante todo su pueblo
  lexicon: BDAG
  rationale: «En medio de» reproduce la imagen espacial. «Todo su pueblo» mantiene el carácter colectivo y el posible matiz de totalidad del griego.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le inquirió
  - le interrogó
  lexicon: BDAG
  rationale: El verbo introduce una pregunta sencilla. «Le preguntó» es la equivalencia más natural y fiel al tono narrativo.
- source_word: τὸ συμβεβηκός
  english_pob_choice: what had happened
  chosen_spanish: lo ocurrido
  alternatives_spanish:
  - lo que había sucedido
  - el hecho acontecido
  lexicon: BDAG
  rationale: La forma participial sustantivada apunta a lo que ha sucedido. «Lo ocurrido» es idiomático en español y conserva la referencia al hecho ya acontecido sin sobreexplicar.
theological_decisions:
- issue: Naturaleza de ἐκκλησίαν en Judith
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: El contexto es una reunión civil del pueblo, no la Iglesia como institución. «Asamblea» evita proyectar categorías eclesiales posteriores sobre el relato.
  doctrine_reference: Evitar anacronismo eclesiológico en literatura deuterocanónica
- issue: Alcance colectivo de νεανίσκος con πᾶς
  english_pob_reading: all their young men
  chosen_spanish_reading: todos sus jóvenes
  alternative_spanish_readings:
  - todos sus muchachos
  - todos sus jóvenes varones
  rationale: La construcción griega es colectiva y acompaña a otros grupos sociales. El español puede sonar más natural con «jóvenes», sin perder la inclusión del grupo entero que acude con urgencia.
  doctrine_reference: Coherencia semántica y concordancia grupal en narración histórica
- issue: Ubicación de Achior ante la comunidad
  english_pob_reading: in the midst of all their people
  chosen_spanish_reading: en medio de todo su pueblo
  alternative_spanish_readings:
  - ante todo su pueblo
  - en presencia de todo su pueblo
  rationale: El griego usa una imagen espacial de centralidad. «En medio de» la conserva mejor que una simple paráfrasis de presencia.
  doctrine_reference: Fidelidad a la imaginería narrativa del texto
- issue: Referencia al nombre divino
  english_pob_reading: no explicit divine-name issue in this verse
  chosen_spanish_reading: no aplica
  rationale: El versículo no contiene ni alude directamente al Tetragrámaton ni a κύριος como sustituto.
  doctrine_reference: No aplicable
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la coordinación para leer «their young men and women» de manera más natural. El español adopta esa misma coordinación inclusiva con «sus jóvenes y las mujeres», sin separar artificialmente los grupos ni añadir elementos ausentes en el griego. También se mantuvo el movimiento rápido de συνέδραμον con un verbo de carrera/acudir, conforme al audit trail.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el original lo requiera; este versículo no lo contiene.
  - Se mantiene «asamblea» para ἐκκλησίαν en sentido no eclesiástico.
  - Se usa «ancianos» para πρεσβύτεροι como término comunitario.
  - Se reserva «esclavo» para δοῦλος cuando aparezca; no aplica aquí.
  - Se opta por «lo ocurrido» para τὸ συμβεβηκός, en línea con el inglés POB «what had happened».
