base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/006.yaml
  text: In the ninth year of Hoshea[a], the king of Assyria captured Samaria and carried Israel away to Assyria, and settled them in Halah, and on the Habor, the river of Gozan[b], and in the cities of Media.
  footnotes:
  - marker: a
    text: Or 'exiled Israel to Assyria' or 'deported Israel to Assyria.' The Hebrew verb denotes forced removal into exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'and by the Habor, the river of Gozan.' The Hebrew may describe settlement along the Habor River in the region of Gozan.
    reason: lexical_alternative
