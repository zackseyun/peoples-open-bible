translation:
  language: es
  text: Y los que tienen entendimiento[a] resplandecerán como el fulgor[b] del firmamento[c], y los que hacen justos a los muchos[d], como las estrellas, para siempre y eternamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sabios» o «los que tienen discernimiento».
    reason: lexical_alternative
  - marker: b
    text: O «resplandor» o «brillantez».
    reason: lexical_alternative
  - marker: c
    text: «Firmamento» traduce el ámbito celestial extendido; el inglés auditado usa «expanse», y la tradición bíblica española suele decir «firmamento».
    reason: cultural_note
  - marker: d
    text: O «los que vuelven a los muchos a la justicia»; el hebreo puede entenderse también más literalmente como «los que hacen justos a los muchos» o «los que justifican a los muchos».
    reason: alternative_reading
lexical_decisions:
- source_word: הַמַּשְׂכִּלִים
  english_pob_choice: those who have insight
  chosen_spanish: los que tienen entendimiento
  alternatives_spanish:
  - los sabios
  - los que son prudentes
  - los que tienen discernimiento
  lexicon: HALOT
  rationale: El participio hebreo de שכל describe a personas caracterizadas por entendimiento o discernimiento. En español, «los que tienen entendimiento» conserva ese matiz participial y resulta natural y digno; «los sabios» es posible, pero suena más sustantivado y menos verbal.
- source_word: יַזְהִרוּ
  english_pob_choice: will shine
  chosen_spanish: resplandecerán
  alternatives_spanish:
  - brillarán
  - irradiarán
  - fulgurarán
  lexicon: HALOT
  rationale: El hifil de זהר expresa brillo o resplandor. «Resplandecerán» comunica esa luminosidad de modo claro y elevado, sin sonar demasiado técnico ni perder fuerza poética.
- source_word: כְּזֹהַר
  english_pob_choice: like the brightness
  chosen_spanish: como el fulgor
  alternatives_spanish:
  - como la brillantez
  - como el resplandor
  - como la luz
  lexicon: HALOT
  rationale: זֹהַר denota brillo, resplandor o fulgor. «Fulgor» conserva el valor luminoso y funciona bien en paralelo con «resplandecerán».
- source_word: הָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: el firmamento
  alternatives_spanish:
  - la expansión
  - la bóveda celeste
  - el expanse
  lexicon: HALOT
  rationale: Aunque la opción inglesa auditada usa «the expanse», en español «firmamento» es la forma más estable y comprensible para el lector bíblico, y sigue siendo una manera fiel de referirse al ámbito celeste extendido. Se evita «expansión», que en español moderno suena demasiado abstracta y poco natural aquí.
- source_word: וּמַצְדִּיקֵי
  english_pob_choice: those who make the many righteous
  chosen_spanish: los que hacen justos a los muchos
  alternatives_spanish:
  - los que justifican a los muchos
  - los que llevan a los muchos a la justicia
  - los que vuelven justos a los muchos
  lexicon: HALOT
  rationale: El hifil de צדק puede significar declarar justos, hacer justos o causar que sean justos. Se preserva la fuerza causativa con «hacen justos», evitando cerrar prematuramente el término en un sentido forense exclusivo y manteniendo la tensión lexical documentada por la base inglesa.
- source_word: הָרַבִּים
  english_pob_choice: the many
  chosen_spanish: a los muchos
  alternatives_spanish:
  - a muchos
  - a la multitud
  - a los numerosos
  lexicon: HALOT
  rationale: El artículo hebreo favorece una expresión definida. «A los muchos» conserva esa concreción y el peso apocalíptico de la frase.
- source_word: כַּכּוֹכָבִים
  english_pob_choice: like the stars
  chosen_spanish: como las estrellas
  alternatives_spanish:
  - como los astros
  lexicon: HALOT
  rationale: Similitud directa y transparente. «Estrellas» es la opción más clara y natural en español, sin perder el valor poético del símil.
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y eternamente
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre
  - por siempre y para siempre
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de duración perpetua. «Para siempre y eternamente» mantiene esa fuerza enfática en un español digno y publicable, sin depender de una fórmula litúrgica fija.
theological_decisions:
- issue: Sentido de מַצְדִּיקֵי הָרַבִּים
  english_pob_reading: those who make the many righteous
  chosen_spanish_reading: los que hacen justos a los muchos
  alternative_spanish_readings:
  - los que justifican a los muchos
  - los que llevan a los muchos a la justicia
  - los que vuelven justos a los muchos
  rationale: 'Se conserva la ambigüedad productiva del hebreo causativo: no se reduce el verbo a una categoría doctrinal posterior, pero tampoco se suaviza su fuerza transformadora. La elección española sigue de cerca la lectura inglesa revisada y mantiene abierta la tensión entre declarar justos y hacer justos.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó la frase de acción causativa de «lead the many to righteousness» a «make the many righteous». La presente redacción española sigue esa revisión y conserva el contraste poético entre el resplandor de los entendidos y el brillo estelar de los que hacen justos a los muchos.
  spanish_consistency_notes:
  - Se mantuvo «entendimiento» para הַמַּשְׂכִּלִים, en línea con la elección inglesa de insight y con el valor participial del hebreo.
  - Se evitó «SEÑOR» o equivalentes de sustitución del nombre divino, porque el versículo no contiene el tetragrámaton.
  - Se prefirió «hacer justos» sobre una paráfrasis más interpretativa, para conservar la tensión lexical del hifil de צדק.
  - El paralelismo poético se reflejó con dos miembros coordinados y una simetría clara en español.
