    issue: '''hombres malvados'' para ἄνδρες παράνομοι'
    rationale: παράνομοι significa 'sin ley', 'contrarios a la ley', 'ilegales/lawless'. 'Malvados' generaliza la maldad moral y elimina el matiz jurídico-retórico que el inglés POB preservó con 'lawless men'.
  - severity: medium
    issue: 'Nota b: ''para pedir contra él'''
    rationale: Aunque intenta reflejar una alternativa de ἐντυχεῖν κατʼ αὐτοῦ, esa formulación no suena idiomática en español. 'Para presentar una petición contra él' o 'para denunciarlo' sería más clara.
  revised_spanish_text: Y se reunieron contra él hombres pestilentes[a] de Israel, hombres sin ley, para presentar acusación contra él[b]; pero el rey no les prestó atención.
