  text: '하나님께서 이렇게 말씀하셨기 때문입니다: 「은혜의 때에 내가 네 말을 들었고, 구원의 날에 내가 너를 도왔다.」 보십시오, 지금이 은혜로 받으실 만한 때이며, 보십시오, 지금이 구원의 날입니다.'
