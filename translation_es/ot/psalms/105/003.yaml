translation:
  language: es
  text: Gloríense[a] en su santo nombre; alégrense los corazones de los que buscan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jáctense en su santo nombre». El verbo hebreo puede llevar el sentido de exultar o de hacer de alguien el objeto de la propia jactancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְהַלְלוּ
  english_pob_choice: Boast
  chosen_spanish: Alábense
  alternatives_spanish:
  - Gloríense
  - Exulten
  lexicon: HALOT
  rationale: El hitpael imperativo plural comunica una acción reflexiva de enorgullecerse o gloriarse en alguien. En español, 'alábense' conserva el matiz de exaltación y es natural en registro bíblico sin perder la referencia relacional del verbo.
- source_word: בְּשֵׁם קָדְשׁוֹ
  english_pob_choice: in his holy name
  chosen_spanish: en su santo nombre
  alternatives_spanish:
  - en el nombre de su santidad
  - en su nombre sagrado
  lexicon: HALOT
  rationale: La preposición ב con שֵׁם se rinde naturalmente con 'en'. 'Nombre' conserva el sentido hebreo de identidad/reputación revelada, y 'santo' reproduce קָדוֹשׁ/קָדְשׁוֹ de forma clara y fiel.
- source_word: יִשְׂמַח
  english_pob_choice: let ... rejoice
  chosen_spanish: gócese
  alternatives_spanish:
  - alégrese
  - pueda regocijarse
  lexicon: HALOT
  rationale: Aunque morfológicamente es imperfecto de 3ms, en poesía funciona como exhortación o deseo. 'Gócese' preserva el tono jussivo y encaja bien con el paralelismo del imperativo previo.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - los corazones
  - el ánimo
  lexicon: HALOT
  rationale: El singular hebreo mantiene un valor colectivo o representativo. En español, 'el corazón' reproduce el centro interior de la persona sin forzar una pluralización que el hebreo no exige explícitamente.
- source_word: מְבַקְשֵׁי יְהוָה
  english_pob_choice: those who seek Yahweh
  chosen_spanish: de los que buscan a Yahvé
  alternatives_spanish:
  - de los buscadores de Yahvé
  - de los que procuran a Yahvé
  lexicon: HALOT
  rationale: El participio constructo designa a personas caracterizadas por buscar a Yahvé. 'Los que buscan a Yahvé' es idiomático y preserva el aspecto continuo/definitorio del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme a la terminología POB y al dato original del Tetragrámaton, evitando la sustitución por un título.
theological_decisions:
- issue: Imperativo reflexivo y matiz de 'boast/glory' en הִתְהַלְלוּ
  english_pob_reading: Boast in his holy name
  chosen_spanish_reading: Alábense en su santo nombre
  alternative_spanish_readings:
  - Gloríense en su santo nombre
  - Exulten en su santo nombre
  rationale: El hebreo permite el matiz de exultar o gloriarse. En español, 'alábense' comunica la auto-exaltación orientada a Yahvé sin sonar impropio; mantiene la tensión entre alabanza y jactancia devota que la POB documenta.
  doctrine_reference: HALOT; POB lexical note on הִתְהַלְלוּ
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. La forma 'Yahvé' preserva el nombre pactual sin reemplazarlo por un título, en coherencia con la práctica POB y con el auditable source-based rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa cambió 'the heart' por 'the hearts' por acuerdo con el plural implícito de 'those who seek the LORD'; en español se optó por mantener el singular colectivo 'el corazón', porque el hebreo לֵב está en singular y funciona como sujeto colectivo/representativo en poesía. Se conservó, sin embargo, la lectura plural semántica de los buscadores mediante 'de los que buscan a Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el texto.
  - Se evita 'Señor' como sustituto del nombre divino.
  - El tono es poético y bíblico, pero con español contemporáneo inteligible.
  - La nota al pie preserva la alternativa semántica 'gloríense' documentada por la POB inglesa.
