lexical_decisions:
- source_word: עִדּוֹא
  english_pob_choice: Iddo
  chosen_spanish: Iddo
  alternatives_spanish:
  - Iddoa
  lexicon: HNp
  rationale: Nombre propio hebreo en lista genealógica. En español bíblico, la forma breve 'Iddo' es natural y fiel; la variante 'Iddoa' sería más letra por letra, pero añade una vocal final no necesaria en la transliteración habitual.
- source_word: גִנְּת֖וֹי
  english_pob_choice: Ginnethoi
  chosen_spanish: Ginnetói
  alternatives_spanish:
  - Ginnetón
  - Ginnetoi
  lexicon: HNp
  rationale: Nombre propio hebreo. Se translitera de la forma vocálica presente en este versículo; el acento gráfico ayuda a la lectura española. Se evita sustituirlo por una forma tradicional distinta ('Ginnetón') porque el hebreo aquí lee Ginnethoi.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abías
  - Abía
  lexicon: HNp
  rationale: Nombre propio hebreo. En español bíblico, 'Abías' es la forma más reconocible y readable; 'Abía' es posible pero menos establecida. Se conserva la identidad del nombre sin introducir una adaptación más allá de lo necesario.
