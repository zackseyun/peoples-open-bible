translation:
  language: es
  text: Y el rey Alejandro reunió grandes fuerzas y acampó frente a Demetrio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀλέξανδρος ὁ βασιλεὺς
  english_pob_choice: Alexander the king
  chosen_spanish: Y Alejandro el rey
  alternatives_spanish:
  - Y el rey Alejandro
  - Y Alejandro, el rey
  lexicon: LSJ
  rationale: Se conserva el orden del griego con apposición pospuesta al nombre, como en la versión inglesa de POB. En español, «Alejandro el rey» es comprensible y refleja la estructura sin convertirla en un título fijo distinto del original.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  - mustered
  lexicon: LSJ
  rationale: En contexto militar, el verbo expresa la concentración de recursos o tropas. «Reunió» transmite esa idea de forma natural en español sin añadir un matiz más técnico que el griego no exige.
- source_word: δυνάμεις μεγάλας
  english_pob_choice: great forces
  chosen_spanish: grandes fuerzas
  alternatives_spanish:
  - fuerzas numerosas
  - grandes ejércitos
  - un gran ejército
  lexicon: LSJ
  rationale: Se preserva el plural del griego con «fuerzas», y μεγάλας se vierte por «grandes» en sentido cuantitativo/militar. «Ejércitos» sería más interpretativo y perdería la flexibilidad del término griego.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - levantó el campamento
  - se acampó
  - campó
  lexicon: LSJ
  rationale: El verbo militar de campamento se expresa de manera directa y natural con «acampó». Mantiene el valor de instalación militar sin sobrecargar el castellano.
- source_word: ἐξ ἐναντίας
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - contra
  lexicon: LSJ
  rationale: La frase indica posición enfrentada, no necesariamente ataque directo. «Frente a» conserva la oposición espacial y es idiomática en español; «contra» sería más beligerante de lo que exige el texto.
- source_word: Δημητρίῳ
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrio
  lexicon: standard transliteration
  rationale: Se usa la transliteración habitual al español para el nombre propio griego.
translation_notes:
  revision_awareness: 'El texto griego y la auditable decisión inglesa coinciden en el sentido militar básico: reunir fuerzas y establecer campamento en posición opuesta; la redacción española sigue esa línea sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras terminologías no pertinentes, ya que el verso no contiene léxico divino.
  - Se mantuvo el plural «fuerzas» para reflejar δυνάμεις μεγάλας.
  - La frase preposicional «frente a Demetrio» conserva la orientación espacial del griego y el inglés POB.
