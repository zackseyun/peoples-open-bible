review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: contraste restrictivo inicial, comida delante de Yahvé en el lugar escogido, lista doméstica completa, inclusión del levita local y clausula final de gozo. También mantiene correctamente «Yahvé». Sin embargo, hay dos puntos mejorables: «dentro de tus puertas» suena poco natural en español actual aunque sea formalmente cercano, y la cláusula final con subjuntivo («pongas») no corresponde bien al futuro directivo del conjunto ni al hebreo.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero mezcla puntuación y giros algo tensos. «el levita que está dentro de tus puertas» es comprensible, aunque más natural y bíblico-legible sería «que está dentro de tus puertas[a]» manteniendo la nota, o bien una solución más idiomática; y «en todo aquello a lo que pongas la mano» suena forzado. Conviene simplificar a «en todo aquello a lo que pongas mano[b]» o mejor «en todo aquello a lo que eches mano[b]», pero eso cambia la imagen. La opción más fiel y legible es «en todo aquello a que pongas mano[b]». También mejora la enumeración usar «y» en vez de dos puntos y punto y coma excesivos.
  glossary_alignment: 'Alineación sólida con los términos del proyecto: יְהוָה -> «Yahvé» correctamente; no hay problema doctrinal con θεological defaults. La elección «esclavo/esclava» es defendible según la política de fuerza léxica. La preservación del idiomático «puertas» puede mantenerse con nota, pero conviene explicitar mejor en español mediante una nota bien anclada en el texto.'
  issues:
  - severity: medium
    issue: La expresión «dentro de tus puertas» resulta poco natural en español corriente.
    rationale: Aunque formalmente cercana al hebreo, en español moderno eclesial suena opaca sin apoyo. Dado que la nota ya explica el hebraísmo, conviene anclarla directamente en «puertas» y mantener la frase, pero con mejor integración sintáctica.
  - severity: medium
    issue: «en todo aquello a lo que pongas la mano» suena forzado y el subjuntivo no sigue bien el tono del mandato.
    rationale: El hebreo expresa el ámbito de todas las obras/empresas de la mano. La revisión inglesa buscó más cercanía al modismo, pero en español esta formulación queda pesada. Una forma más natural y todavía fiel es «en todo aquello a que pongas mano[b]».
  - severity: low
    issue: La puntuación con dos puntos y punto y coma no es la más fluida para esta lista.
    rationale: Los rayados o comas coordinadas suelen leerse mejor en español bíblico moderno. Un ajuste menor mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: 'Sino que lo comerás delante de Yahvé tu Dios, en el lugar que Yahvé tu Dios escoja: tú, tu hijo, tu hija, tu esclavo, tu esclava y el levita que está dentro de tus puertas[a]; y te alegrarás delante de Yahvé tu Dios en todo aquello a que pongas mano[b].'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «dentro de tus puertas», un hebraísmo para referirse a los que viven en tu comunidad local.'
    reason: cultural_note
  - marker: b
    text: 'Literalmente: «en todo el envío de tu mano»; es decir, en todo lo que haces o emprendes.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la fidelidad general del borrador, pero se ajustan dos puntos para mejorar el español sin perder cercanía al hebreo: se ancla la nota cultural en «puertas[a]» y se simplifica la cláusula final a «en todo aquello a que pongas mano[b]», que preserva mejor la imagen sin la torpeza de «a lo que pongas la mano».'
