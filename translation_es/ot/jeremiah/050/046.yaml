  text: At the sound of Babylon being captured[a], the earth trembles[b], and a cry is heard among the nations.
  footnotes:
  - marker: a
    text: Or 'At the sound of Babylon's capture.' The Hebrew can be rendered more formally with a finite verb ('Babylon is captured/has been taken') or more idiomatically as a verbal noun in English.
