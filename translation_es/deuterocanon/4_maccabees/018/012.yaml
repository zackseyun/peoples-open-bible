    issue: Ubicación poco natural de «en el fuego»
    rationale: El griego τοὺς ἐν πυρὶ modifica a los tres jóvenes. En español, aislarlo entre comas después de los nombres hace la frase más pesada y menos clara que una colocación continua sin comas.
  - severity: low
