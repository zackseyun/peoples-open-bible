translation:
  language: es
  text: Y si un hombre vende a su hija como esclava[a], no saldrá como salen los esclavos varones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como sierva». El hebreo אָמָה se refiere a una mujer en servidumbre vinculada por obligación legal; «esclava» se usa aquí para hacer explícito ese estatus.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ella no deja su servicio bajo los mismos términos que los esclavos varones.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula abre una cláusula legal condicional. «Y si» conserva el enlace del hebreo y suena natural en el español jurídico-bíblico.
- source_word: יִמְכֹּר
  english_pob_choice: sells
  chosen_spanish: vende
  alternatives_spanish:
  - vendiere
  - ha de vender
  lexicon: HALOT
  rationale: El verbo expresa una venta real y directa. En español, el presente simple comunica bien el caso legal general sin añadir matiz modal no presente en el hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y, en este contexto legal, apunta al varón cabeza de familia o padre. «Un hombre» mantiene esa referencia sin neutralizarla.
- source_word: בִּתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - su hija
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se expresa de forma directa como «su hija»; el artículo indefinido se añade por fluidez idiomática en español.
- source_word: לְאָמָה
  english_pob_choice: as a female slave
  chosen_spanish: como esclava
  alternatives_spanish:
  - como sierva
  - como criada
  - como esclava femenina
  lexicon: HALOT
  rationale: אָמָה designa a una mujer en estado de servidumbre vinculada a una compraventa o dependencia legal. Se prefiere «esclava» para preservar la fuerza jurídica del término, evitando suavizarlo con «sierva» o «criada».
- source_word: לֹא תֵצֵא
  english_pob_choice: she shall not go out
  chosen_spanish: no saldrá
  alternatives_spanish:
  - no saldrá libre
  - no se irá
  lexicon: HALOT
  rationale: «Salir» es el modismo jurídico hebreo para la liberación de servicio. En español, «no saldrá» conserva ese eco; el sentido de salida/liberación queda explícito por el contraste inmediato con la cláusula siguiente.
- source_word: כְּצֵאת
  english_pob_choice: as ... go out
  chosen_spanish: como salen
  alternatives_spanish:
  - como es liberada
  - como se van
  lexicon: HALOT
  rationale: La comparación reproduce el paralelismo verbal del hebreo entre תֵצֵא y צֵאת. «Como salen» mantiene la relación formal con el verbo anterior y el lenguaje legal de salida de servicio.
- source_word: הָעֲבָדִים
  english_pob_choice: the male slaves
  chosen_spanish: los esclavos varones
  alternatives_spanish:
  - los esclavos
  - los siervos
  lexicon: HALOT
  rationale: Aunque עֲבָדִים puede ser genérico, aquí el contraste con una hija vendida como אָמָה favorece distinguir a los varones. «Esclavos varones» hace visible esa distinción de sexo y estatus sin ocultar la dureza del término.
theological_decisions:
- issue: Terminología de esclavitud en la ley del pacto
  english_pob_reading: Use 'female slave' and 'male slaves' rather than 'maidservant/servants.'
  chosen_spanish_reading: Usar «esclava» y «esclavos varones» en vez de suavizar con «sierva», «criada» o «sirvientes».
  alternative_spanish_readings:
  - sierva
  - criada
  - sirvientes
  rationale: La filosofía de traducción privilegia el valor legal y social del estado de dependencia. En este precepto casuístico, la condición de esclavitud es parte del contenido normativo y no debe atenuarse con eufemismos tradicionales.
  doctrine_reference: Filosofía de traducción §1; decisión léxica sobre bonded-status rendering por analogía con δοῦλος
- issue: Valor jurídico de «salir»
  english_pob_reading: she shall not go out
  chosen_spanish_reading: no saldrá
  alternative_spanish_readings:
  - no quedará libre
  - no se irá
  rationale: «Salir» conserva el hebraísmo jurídico de quedar libre de servicio. En español, se deja esa expresión breve y se apoya su sentido en el contraste con la liberación de los esclavos varones.
  doctrine_reference: Uso legal de יָצָא / תֵצֵא en contextos de manumisión
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo y el audit trail inglés, sin depender mecánicamente del inglés. No hubo revisiones previas aplicadas en el paquete; la redacción española mantiene la tensión lexical de אָמָה y de la fórmula legal de «salir» para liberación.
  spanish_consistency_notes:
  - Se mantuvo «esclava» para אָמָה y «esclavos varones» para עֲבָדִים, preservando la distinción de género que el contexto legal sugiere.
  - Se evitó «SEÑOR» o lenguaje cultual innecesario, ya que este versículo no contiene el Tetragrámaton ni un caso de κύριος.
  - La puntuación sigue el estilo español y el periodo condicional queda con fluidez natural en una sola oración.
