translation:
  language: es
  text: 'Entonces el tío de Saúl dijo[a]: “Por favor, dime qué les dijo Samuel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «a ustedes» en plural, probablemente refiriéndose a Saúl y a su servidor juntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la escena; «entonces» conserva bien la sucesión temporal en español sin sonar mecánico.
- source_word: דּוֹד שָׁאוּל
  english_pob_choice: Saul’s uncle
  chosen_spanish: el tío de Saúl
  alternatives_spanish:
  - el hermano de su padre de Saúl
  - el tío de Saúl
  lexicon: HALOT
  rationale: דּוֹד en este contexto familiar indica «tío». En español, la construcción natural es «el tío de Saúl», que preserva el vínculo de parentesco sin sobreexplicarlo.
- source_word: הַגִּידָה נָּא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dime
  alternatives_spanish:
  - Te ruego que me digas
  - Dime, por favor
  lexicon: HALOT
  rationale: El imperativo enfático de נגד con נָא expresa ruego cortés. «Por favor» comunica esa insistencia con naturalidad; «dime» mantiene el tono directo.
- source_word: מָה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - lo que
  - qué cosa
  lexicon: HALOT
  rationale: Tras «dime», la interrogativa directa en español es «qué», que reproduce bien el objeto interrogativo del hebreo.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - le contó
  lexicon: HALOT
  rationale: אָמַר es el verbo básico «decir». «Dijo» es el equivalente natural y preciso en español.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El hebreo está en segunda persona plural. En español, «les» permite conservar ese plural en el complemento indirecto, en línea con la nota auditada de que Samuel habló a Saúl y a su servidor.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del audit trail inglés sin cambios sustanciales: se mantuvo el orden narrativo, el parentesco directo y el plural implícito de «a ustedes/les» en la cláusula final.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino.
  - Se conservó «Saúl» y «Samuel» con la ortografía bíblica usual en español.
  - Se mantuvo el plural implícito del hebreo en una nota, sin recargar el cuerpo del texto.
