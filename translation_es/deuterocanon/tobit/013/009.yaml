    issue: Los dos υἱοί se tradujeron como 'hijos' sin reflejar el sentido colectivo documentado por el POB.
    rationale: El expediente inglés justificó 'children' precisamente para evitar una restricción masculina no intencional. En español, mantener solo 'hijos' reintroduce esa posible ambigüedad y se aparta de la rationale auditada.
  - severity: medium
