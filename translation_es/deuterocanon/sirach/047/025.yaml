review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo primario y conserva correctamente la variante griega en nota. Sin embargo, la cláusula להדיחם מאדמתם exige objeto plural: «para expulsarlos de su tierra». El borrador usa singular («echarlo»), lo cual no es fiel ni al hebreo -ם ni al paralelo griego αὐτούς/τῆς γῆς αὐτῶν. También «un tropiezo» suena menos natural y menos preciso que «una piedra de tropiezo» o «un obstáculo» para מכשול en este contexto.'
  spanish_quality_summary: El español es generalmente claro, pero «dio a Efraín un tropiezo» suena extraño y «para echarlo de su tierra» produce una discordancia referencial innecesaria. «Su pecado se engrandeció mucho» es entendible, aunque «se hizo muy grande» o «creció mucho» sería más natural; no obstante, puede conservarse por cercanía semántica. «Se vendió a toda maldad» funciona bien y preserva la metáfora.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los nombres y categorías teológicas están bien manejados. La decisión singular «su pecado» concuerda con la primacía del hebreo y la nota preserva adecuadamente la lectura griega alternativa.
  issues:
  - severity: high
    issue: Objeto singular en «para echarlo de su tierra»
    rationale: El hebreo להדיחם/מאדמתם lleva sufijo plural («expulsarlos», «de su tierra»), y el griego paralelo también es plural. Cambiarlo a singular introduce un sentido no sustentado por la fuente.
  - severity: medium
    issue: «un tropiezo» es una formulación débil y poco idiomática para מכשול
    rationale: Aunque literalmente posible, en español bíblico y general «dar un tropiezo» suena raro. «Una piedra de tropiezo» preserva mejor la metáfora de מכשול y resulta más inteligible.
  - severity: low
    issue: La justificación del singular en la cláusula de expulsión contradice la morfología fuente
    rationale: La explicación teológica/lexical del borrador intenta defender una concordancia singular donde la evidencia textual disponible apunta a plural; conviene corregirla para no confundir al lector o al expediente.
  revised_spanish_text: Yahvé dio a Efraín una piedra de tropiezo[a], para expulsarlos de su tierra; y su pecado se engrandeció mucho, y se vendió a toda maldad.
  revised_footnotes:
  - marker: a
    text: 'LXX: «y sus pecados se multiplicaron grandemente ... y buscaron toda maldad, hasta que la venganza viniera sobre ellos». El testimonio hebreo aquí es más singular y más breve.'
    reason: alternative_reading
  revision_rationale: Se corrige el plural exigido por להדיחם/מאדמתם con «expulsarlos de su tierra», y se mejora מכשול a «piedra de tropiezo» para conservar la metáfora con mejor español. Se mantiene la lectura singular hebrea en la segunda mitad y la variante griega en nota, en línea con el expediente inglés.
