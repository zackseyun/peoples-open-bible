  glossary_alignment: 'No hay términos de glosario mayor en juego como Yahvé o Mesías. Sí aplica la preferencia del proyecto por preservar distinciones léxicas significativas: aquí conviene reflejar צְדָקָה como ''rectitud'' y מִשְׁפָּט como ''justicia'', lo que sigue mejor la rationale inglesa (''personal moral rectitude'' frente a ''judicial equity'') y produce español natural.'
