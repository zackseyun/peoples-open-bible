translation:
  language: es
  text: Que ofrezcan sacrificios de acción de gracias[a], y que cuenten[b] sus obras con cantos de alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios de agradecimiento». El hebreo se refiere a sacrificios caracterizados por la acción de gracias.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «declaren» o «narren» sus obras; el hebreo enfatiza relatar sus hechos en detalle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִזְבְּחוּ
  english_pob_choice: Let them offer
  chosen_spanish: Que ofrezcan
  alternatives_spanish:
  - Y que sacrifiquen
  - Que sacrifiquen
  lexicon: HALOT
  rationale: El imperfecto/jusivo 3mp funciona aquí como exhortación o deseo. En español, «Que ofrezcan» comunica bien la fuerza volitiva sin perder el matiz cultual del verbo.
- source_word: זִבְחֵי תוֹדָה
  english_pob_choice: sacrifices of thanksgiving
  chosen_spanish: sacrificios de agradecimiento
  alternatives_spanish:
  - sacrificios de acción de gracias
  - ofrendas de agradecimiento
  lexicon: HALOT
  rationale: La construcción de estado constructo expresa sacrificios caracterizados por תוֹדָה. «Agradecimiento» es natural en español y conserva el sentido de ofrenda de gratitud; «acción de gracias» también es posible, pero suena más litúrgica y menos directa.
- source_word: תוֹדָה
  english_pob_choice: thanksgiving
  chosen_spanish: agradecimiento
  alternatives_spanish:
  - acción de gracias
  - gratitud
  lexicon: HALOT
  rationale: En este contexto sacrificial, el término no es simplemente «alabanza», sino gratitud/ofrenda agradecida. «Agradecimiento» mantiene esa fuerza semántica de forma clara en español.
- source_word: וִיסַפְּרוּ
  english_pob_choice: and recount
  chosen_spanish: y que cuenten[b]
  alternatives_spanish:
  - y que declaren[b]
  - y que narren[b]
  lexicon: HALOT
  rationale: ספר en piel significa contar o relatar en detalle. «Cuenten» es natural y fiel; se usa con subordinación exhortativa para reflejar el mismo tono jussivo del primer hemistiquio.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: «Obras» es una equivalencia bíblica normal para los actos poderosos de Dios y funciona bien con «cuenten». «Hechos» también es posible, pero «obras» conserva mejor el registro bíblico y la amplitud del término.
- source_word: בְּרִנָּה
  english_pob_choice: with joyful singing
  chosen_spanish: con gritos de alegría
  alternatives_spanish:
  - con regocijo
  - con cantos jubilosos
  - con alegría
  lexicon: HALOT
  rationale: רִנָּה denota un clamor jubiloso, no necesariamente «canto» en sentido estricto. «Con gritos de alegría» preserva mejor el impulso sonoro y celebrativo que una versión más suavizada.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide en sustancia con la trayectoria auditada en inglés: exhortación a ofrecer sacrificios de תודה y a relatar las obras divinas con expresión jubilosa. Se optó por una formulación española natural que conserva el paralelo poético y el tono cultual.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos imperativos/jusivos en forma exhortativa con «Que… y que…».
  - Se traduce la idea cultual de תוֹדָה como «agradecimiento» para evitar reducirla a mera alabanza.
  - Se evita «SEÑOR» porque este verso no contiene el tetragrámaton ni una cita explícita del nombre divino; la referencia implícita a Dios se expresa por el posesivo «sus».
  - «Con gritos de alegría» reproduce el carácter jubiloso de רִנָּה sin imponer necesariamente una noción de canto que el hebreo no exige de forma exclusiva.
