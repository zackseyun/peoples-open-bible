translation:
  language: es
  text: 'El ángel le dijo al joven: «Hermano, hoy nos hospedaremos con Ragüel. Él es tu pariente, y tiene una hija llamada Sara».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παιδαρίῳ
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - muchacho joven
  - mozo
  lexicon: LSJ
  rationale: El diminutivo griego puede significar muchacho o joven, pero el contexto de viaje y posible matrimonio sugiere una persona suficientemente madura; «joven» comunica bien la edad y evita infantilizar a Tobías.
- source_word: Ἀδελφέ
  english_pob_choice: Brother
  chosen_spanish: Hermano
  alternatives_spanish:
  - hermano
  - amigo
  lexicon: LSJ
  rationale: Como vocativo directo, «Hermano» conserva el matiz fraternal de la dirección griega sin rebajarlo a un saludo genérico.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: LSJ
  rationale: Equivalente temporal natural y fiel al adverbio griego.
- source_word: αὐλισθησόμεθα
  english_pob_choice: we will lodge
  chosen_spanish: nos hospedaremos
  alternatives_spanish:
  - haremos noche
  - pasaremos la noche
  - nos alojaremos
  lexicon: LSJ
  rationale: El verbo se refiere a parar para la noche o pasar la noche en hospedaje; «nos hospedaremos» suena natural en español y mantiene la idea de alojamiento sin forzar un matiz de campamento.
- source_word: παρὰ Ῥαγουήλῳ
  english_pob_choice: with Raguel
  chosen_spanish: con Ragüel
  alternatives_spanish:
  - en casa de Ragüel
  - junto a Ragüel
  lexicon: LSJ
  rationale: La preposición con dativo expresa estar con/en compañía o en la casa de alguien. «Con Ragüel» sigue de cerca la lectura auditada en inglés y es idiomático en español; se conservó la grafía bíblica usual «Ragüel».
- source_word: συγγενής
  english_pob_choice: relative
  chosen_spanish: pariente
  alternatives_spanish:
  - consanguíneo
  - de la familia
  - de tu parentela
  lexicon: LSJ
  rationale: «Pariente» comunica claramente la relación de parentesco y evita arcaísmos como «consanguíneo» o «deudo».
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hija mujer
  lexicon: LSJ
  rationale: Término familiar directo y unívoco.
- source_word: ὄνομα Σάρρα
  english_pob_choice: named Sarah
  chosen_spanish: llamada Sara
  alternatives_spanish:
  - de nombre Sara
  - cuyo nombre es Sara
  lexicon: LSJ
  rationale: La construcción de nombramiento se vierte naturalmente como «llamada Sara», preservando el sentido sin sobrecargar la frase.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y coincide con el audit trail inglés en todos los elementos léxicos relevantes. Se ajustó la puntuación para que la oración fluya de manera natural en español, separando el anuncio de hospedaje de las afirmaciones de parentesco y de la hija llamada Sara.
  spanish_consistency_notes:
  - Se mantuvo «Ragüel» como forma española habitual del nombre propio.
  - Se evitó «Cristo/Señor» u այլ terminología no presente en el versículo.
  - La voz narrativa y el discurso directo se preservan con puntuación española estándar.
