review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura narrativa, la confesión de David, el uso de «Yahvé» para יהוה, la remoción del pecado y la declaración «no morirás». Sin embargo, la nota b introduce una alternativa española inadecuada («no serás muerto»), que no suena natural ni representa bien la alternativa inglesa/auditada. Además, «ha apartado tu pecado» es aceptable, pero «ha quitado tu pecado» se alinea mejor con el sentido documentado de remoción y con la nota léxica ya presente.
  spanish_quality_summary: El texto principal es claro y legible en español eclesial moderno. La única deficiencia notable está en la nota b, cuya formulación es poco idiomática. También conviene ajustar el verbo principal de perdón a una opción más natural y directa en español bíblico contemporáneo.
  glossary_alignment: Se respeta correctamente el estándar del proyecto para יהוה → «Yahvé». «He pecado», «contra Yahvé», «tu pecado» y «no morirás» concuerdan con el rastro léxico y teológico. Se recomienda «ha quitado» en lugar de «ha apartado» para הֶעֱבִיר por mayor naturalidad y mejor correspondencia con la explicación de remoción.
  issues:
  - severity: medium
    issue: La nota b usa «no serás muerto» como alternativa.
    rationale: Esa frase no es español natural y tampoco refleja bien la alternativa auditada, que contrasta «no morirás» con una lectura interpretativa de pena capital, no con una pasiva extraña.
  - severity: low
    issue: «Ha apartado tu pecado» es menos idiomático que «ha quitado tu pecado».
    rationale: Aunque semánticamente posible, «quitar» expresa con mayor claridad y naturalidad en español la idea de remover el pecado/guilt, y además armoniza con la nota explicativa existente.
