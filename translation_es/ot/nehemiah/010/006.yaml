  glossary_alignment: No hay términos teológicos del glosario principal en juego. En nombres propios, 'Harim' está bien. 'Obadías' encaja con el uso bíblico español. 'Meremot' debe mantenerse como forma española reconocible del nombre, sin innovaciones menos documentadas.
