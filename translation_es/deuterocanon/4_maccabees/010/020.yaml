revisions:
- from: Con gusto, por causa de Dios[a], nos mutilan los miembros de nuestro cuerpo.
  to: De buen grado, por causa de Dios[a], se nos mutilan los miembros del cuerpo.
  rationale: Se ajusta el adverbio a un registro más digno («De buen grado»), se conserva la fuerza devocional de ὑπὲρ τοῦ θεοῦ con la misma nota alternativa, y se mejora la naturalidad y fidelidad sintáctica con «se nos mutilan los miembros del cuerpo», que expresa mejor el sufrimiento pasivo con el objeto corporal explícito.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:20:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: disposición gozosa (ἡδέως), motivo devocional (ὑπὲρ τοῦ θεοῦ), referencia a los miembros del cuerpo (τὰ τοῦ σώματος μέλη) y mutilación (ἀκρωτηριαζόμεθα). Sin embargo, la sintaxis española elegida cambia innecesariamente la estructura y suena menos natural al decir «nos mutilan los miembros de nuestro cuerpo».'
  spanish_quality_summary: '«Con gusto» es comprensible, pero «de buen grado» encaja mejor en un registro digno de martirio. La frase verbal debe ajustarse para que el complemento corporal quede claro y natural en español: «nos dejan mutilar los miembros del cuerpo» no sería fiel; lo mejor es una pasiva refleja/analítica con el objeto explícito. «Somos mutilados en los miembros del cuerpo» sería demasiado torpe. La solución más clara y fiel es «de buen grado dejamos que nos mutilen los miembros del cuerpo», pero eso añade «dejamos que». Más literal y natural: «De buen grado, por causa de Dios[a], se nos mutilan los miembros del cuerpo».'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: θεοῦ se traduce correctamente como «Dios», no «Yahvé», porque el texto griego no contiene el nombre divino. La nota alternativa sobre ὑπὲρ está bien orientada. No hay otros términos glosados de primer nivel implicados.'
  issues:
  - severity: medium
    issue: Sintaxis española poco natural en «nos mutilan los miembros de nuestro cuerpo»
    rationale: Aunque comunica la idea, en español suena forzado y puede sugerir una construcción activa externa no presente de modo tan directo en el griego. Conviene reformular manteniendo la pasividad del sufrimiento y el objeto corporal explícito.
  - severity: low
    issue: «Con gusto» puede sonar algo coloquial en contexto martirial
    rationale: ἡδέως expresa disposición voluntaria y resuelta. «De buen grado» o «gustosamente» mantienen mejor un registro moderno pero digno.
  - severity: low
    issue: «Nuestro cuerpo» singular con «nos» plural es posible, pero «del cuerpo» suena más idiomático aquí
    rationale: El griego literalmente dice «los miembros del cuerpo». En español, repetir el posesivo no añade claridad y puede endurecer la frase.
  revised_spanish_text: De buen grado, por causa de Dios[a], se nos mutilan los miembros del cuerpo.
  revised_footnotes:
  - marker: a
    text: 'O: «por Dios»; la expresión griega puede entenderse como motivo o causa del sufrimiento.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el adverbio a un registro más digno («De buen grado»), se conserva la fuerza devocional de ὑπὲρ τοῦ θεοῦ con la misma nota alternativa, y se mejora la naturalidad y fidelidad sintáctica con «se nos mutilan los miembros del cuerpo», que expresa mejor el sufrimiento pasivo con el objeto corporal explícito.
