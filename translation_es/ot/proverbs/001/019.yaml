translation:
  language: es
  text: Así son los caminos de todo el que obtiene ganancia injusta[a]; ella les quita la vida a quienes la poseen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así son los caminos de todo el que es ávido de ganancia; ella les quita la vida a quienes la poseen»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: Such are
  chosen_spanish: Así son
  alternatives_spanish:
  - Tal es
  - De esta manera son
  lexicon: HALOT
  rationale: La partícula introduce una comparación resumidora con valor demostrativo. 'Así son' conserva ese enlace con lo anterior en un español natural y sobrio.
- source_word: אָ֭רְחוֹת
  english_pob_choice: the paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las rutas
  lexicon: HALOT
  rationale: El plural de 'camino/andanza' es el equivalente más claro y natural en español para la metáfora sapiencial.
- source_word: כָּל
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - todos los que
  lexicon: HALOT
  rationale: El valor distributivo se expresa bien con 'todo el que', que mantiene la referencia personal sin volverla abstracta.
- source_word: בֹּצֵעַ בָּצַע
  english_pob_choice: gains unjust profit
  chosen_spanish: se aprovecha con ganancia injusta
  alternatives_spanish:
  - es ávido de ganancia
  - gana injustamente
  - busca ganancia deshonesta
  lexicon: HALOT
  rationale: La combinación participio+sustantivo intensifica la idea de obtener beneficio de manera moralmente torcida. 'Se aprovecha con ganancia injusta' intenta conservar tanto el acto de lucro como su carácter ilícito sin perder claridad en español.
- source_word: נֶפֶשׁ
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - la persona
  - el ser
  lexicon: HALOT
  rationale: En este contexto sapiencial, נֶפֶשׁ apunta a la vida misma, no a un 'alma' inmortal. 'La vida' preserva mejor el sentido concreto del peligro descrito.
- source_word: בְּעָלָיו
  english_pob_choice: its possessors
  chosen_spanish: sus poseedores
  alternatives_spanish:
  - sus dueños
  - los que la poseen
  - sus propietarios
  lexicon: HALOT
  rationale: El sufijo retoma la ganancia injusta como antecedente. 'Poseedores' mantiene la relación posesiva y evita introducir un matiz legal moderno demasiado fuerte.
- source_word: יִקָּח
  english_pob_choice: it takes away
  chosen_spanish: le quita
  alternatives_spanish:
  - toma
  - se lleva
  - arranca
  lexicon: HALOT
  rationale: El verbo expresa despojo destructivo en una sentencia general. 'Le quita' conserva la fuerza de quitar/quitar la vida y resulta idiomático en español.
translation_notes:
  revision_awareness: La versión sigue de cerca el hebreo y la lectura auditada en inglés. Se mantuvo el giro resumidor inicial y se resolvió בֹּצֵעַ בָּצַע con una expresión española que conserve tanto la idea de beneficio como su carácter injusto. Se preservó la referencia de נֶפֶשׁ como 'vida'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones no presentes en el verso.
  - Se prefirió 'caminos' como metáfora sapiencial natural en español.
  - Se conservó el sujeto singular del verbo con una construcción impersonal en español que sigue el valor gnómico del hebreo.
