base_translation:
  language: en
  yaml_path: translation/ot/ezra/005/002.yaml
  text: Then Zerubbabel son of Shealtiel and Jeshua son of Jozadak arose and began to build the house of God that is in Jerusalem[a], and with them were the prophets of God[c][b], supporting them.
  footnotes:
  - marker: a
    text: Or 'the temple of God.' The Aramaic reads literally 'the house of God.'
    reason: lexical_alternative
  - marker: b
    text: Jeshua is the personal name form used here; compare the related name form 'Joshua' elsewhere.
    reason: lexical_alternative
  - marker: c
    text: Or 'helping them' or 'assisting them.' The participle conveys active support.
    reason: lexical_alternative
