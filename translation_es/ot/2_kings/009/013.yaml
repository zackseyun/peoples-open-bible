translation:
  language: es
  text: 'Entonces se apresuraron, y cada hombre tomó su manto y lo puso debajo de él sobre los peldaños desnudos[a], y tocaron el cuerno[b] y dijeron: «¡Jehú es rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre el remate de los peldaños» o «sobre el descansillo de la escalera»; la expresión hebrea es rara y su sentido preciso es incierto.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, un cuerno usado para señales; tradicionalmente se traduce «trompeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יְמַהֲר֗וּ
  english_pob_choice: Then they hurried
  chosen_spanish: Entonces se apresuraron
  alternatives_spanish:
  - Entonces corrieron
  - Luego se dieron prisa
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o apuro; «se apresuraron» conserva el valor verbal y la secuencia narrativa del waw consecutivo con un español natural.
- source_word: אִ֣ישׁ בִּגְד֔/וֹ
  english_pob_choice: each man took his garment
  chosen_spanish: cada hombre tomó su manto
  alternatives_spanish:
  - cada uno tomó su vestido
  - cada hombre tomó su prenda
  lexicon: HALOT
  rationale: אִישׁ aquí es distributivo; «cada hombre» reproduce ese valor. בגד puede ser «manto», «vestido» o «prenda»; «manto» es claro y encaja con el gesto de extender una prenda.
- source_word: וַ/יָּשִׂ֥ימוּ תַחְתָּ֖י/ו
  english_pob_choice: put it under him
  chosen_spanish: lo puso debajo de él
  alternatives_spanish:
  - lo colocó debajo de él
  - lo pusieron debajo de él
  lexicon: HALOT
  rationale: El sujeto es plural, pero el distributivo en español puede expresarse naturalmente con «cada hombre... lo puso», manteniendo la acción individual de aportar la prenda. «Debajo de él» sigue el sentido referencial de תחתיו respecto de Jehú sin añadir interpretación excesiva.
- source_word: אֶל גֶּ֣רֶם הַֽ/מַּעֲל֑וֹת
  english_pob_choice: on the bare steps
  chosen_spanish: sobre los peldaños desnudos
  alternatives_spanish:
  - sobre el desnudo tramo de la escalera
  - sobre el descanso de la escalera
  lexicon: HALOT
  rationale: La expresión es rara y su sentido preciso es incierto. «Peldaños desnudos» comunica bien la imagen de escalones sin cubrir y mantiene la cautela lexical del inglés POB; no resuelve de forma cerrada la ambigüedad del hebreo.
- source_word: וַֽ/יִּתְקְעוּ֙ בַּ/שּׁוֹפָ֔ר
  english_pob_choice: they blew the horn
  chosen_spanish: tocaron el cuerno
  alternatives_spanish:
  - sonaron el cuerno
  - trompetearon
  lexicon: HALOT
  rationale: שופר designa un cuerno de señal; «cuerno» preserva el referente concreto sin sustituirlo por «trompeta», y sigue la revisión inglesa que prefirió el término más cercano al hebreo.
- source_word: מָלַ֥ךְ יֵהֽוּא
  english_pob_choice: Jehu is king!
  chosen_spanish: ¡Jehú es rey!
  alternatives_spanish:
  - ¡Jehú reina!
  - ¡Jehú ha llegado a ser rey!
  lexicon: HALOT
  rationale: La proclamación formula el hecho de la entronización de manera directa; «es rey» mantiene la declaración breve y enfática del texto, como en la revisión inglesa final.
theological_decisions:
- issue: La proclamación real de Jehú
  english_pob_reading: Jehu is king!
  chosen_spanish_reading: ¡Jehú es rey!
  alternative_spanish_readings:
  - ¡Jehú reina!
  - ¡Jehú ha sido hecho rey!
  rationale: El texto celebra públicamente la entronización de Jehú sin desarrollar el modo de su investidura. «Es rey» conserva la fuerza declarativa inmediata del hebreo y no añade matices no explicitados por el verso.
  doctrine_reference: 2 Reyes 9:13; 1 Samuel 10:24 (aclamación real)
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que prefirió «horn» frente a «ram's horn» y «Jehu is king!» frente a «Jehu has become king!». La versión española sigue esa revisión final con «cuerno» y «¡Jehú es rey!», manteniendo también la cautela sobre גֶּרֶם הַמַּעֲלוֹת mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Jehú» con acento conforme al español.
  - Se mantiene el paralelismo narrativo del hebreo con verbos en pasado simple y una proclamación final breve.
  - «Cuerno» se conserva por fidelidad al shofar y no se sustituye por «trompeta» en el texto principal.
