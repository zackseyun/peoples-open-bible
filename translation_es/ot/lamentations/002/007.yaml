translation:
  language: es
  text: Yahvé ha rechazado su altar; ha abandonado[a] su santuario. Ha entregado las murallas de sus palacios en manos del enemigo[b]. Alzaron un clamor en la casa de Yahvé, como en el día de una fiesta señalada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha aborrecido su santuario». El verbo hebreo aquí es más fuerte que el anterior («ha rechazado») y conserva la intensificación retórica del verso.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la mano del enemigo», un giro idiomático que significa entregarlo al poder del enemigo.'
    reason: lexical_alternative
  - marker: c
    text: O «como en el día de una fiesta» o «como en el día de una festividad señalada».
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha descartado
  - ha apartado
  - ha abandonado
  lexicon: HALOT
  rationale: El verbo expresa rechazo o repudio en un contexto de juicio pactual. En español, 'ha rechazado' conserva bien la fuerza de la acción sin exagerarla. Se evita 'abandonado' aquí para mantener la diferencia con נִאֵר en la cláusula siguiente.
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: HALOT
  rationale: El hebreo tiene aquí un título divino, pero el marco doctrinal del proyecto pide 'Yahvé' para el Nombre divino cuando corresponde. En español, esto evita la sustitución por un título genérico y refleja el uso del Tetragrámaton en la línea del versículo.
- source_word: מִזְבְּחוֹ
  english_pob_choice: his altar
  chosen_spanish: su altar
  alternatives_spanish:
  - su altar
  lexicon: HALOT
  rationale: Renderización directa y natural del posesivo singular; no requiere expansión.
- source_word: נִאֵר
  english_pob_choice: has abandoned
  chosen_spanish: ha abandonado
  alternatives_spanish:
  - ha repudiado
  - ha despreciado
  - ha aborrecido
  lexicon: HALOT
  rationale: La POB inglesa revisada optó por 'abandoned' para este verbo, evitando duplicar 'rejected'. En español, 'ha abandonado' mantiene la intensificación de renuncia/repudio y distingue este verbo del anterior.
- source_word: מִקְדָּשׁוֹ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su santuario
  - su lugar santo
  lexicon: HALOT
  rationale: '''Santuario'' es el equivalente más natural y preciso en español para el recinto sagrado del templo. Conserva el sentido de espacio consagrado sin introducir una paráfrasis más amplia.'
- source_word: הִסְגִּיר בְּיַד אוֹיֵב
  english_pob_choice: has given ... into the hand of the enemy
  chosen_spanish: ha entregado ... en mano del enemigo
  alternatives_spanish:
  - ha dado ... en manos del enemigo
  - ha puesto ... en poder del enemigo
  lexicon: HALOT
  rationale: '''Entregar en mano de'' conserva el idiomatismo hebreo y la idea de someter algo al poder hostil. En español suena natural con el sustantivo singular ''mano'' del texto fuente.'
- source_word: חוֹמֹת
  english_pob_choice: the walls
  chosen_spanish: las murallas
  alternatives_spanish:
  - las murallas
  - los muros
  lexicon: HALOT
  rationale: '''Murallas'' expresa mejor en español el carácter defensivo y fortificado del término en este contexto de destrucción urbana. ''Muros'' también sería posible, pero ''murallas'' comunica con más fuerza la imagen poética.'
- source_word: אַרְמְנוֹתֶיהָ
  english_pob_choice: her palaces
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus palacios
  - sus fortalezas
  - sus alcázares
  lexicon: HALOT
  rationale: '''Palacios'' sigue la lectura estándar y respeta la personificación femenina de la ciudad. Aunque el término puede rozar lo fortificado, en español ''palacios'' es la opción más reconocible y fiel al uso poético.'
- source_word: קוֹל נָתְנוּ
  english_pob_choice: They raised a shout
  chosen_spanish: Alzaron un clamor
  alternatives_spanish:
  - Alzaron un grito
  - Hicieron un ruido
  - Prorrumpieron en voces
  lexicon: HALOT
  rationale: El hebreo idiomático literalmente dice 'dieron voz/sonido'. 'Alzaron un clamor' transmite el ruido hostil y ceremonial sin sonar artificial en español. Mantiene el tono de tumulto público.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa de Yahvé
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Yahvé'' preserva la expresión del original y evita sustituirla por ''templo'', aunque esa sea la referencia implícita. La forma es bíblica y clara para el lector en español.'
- source_word: כְּיוֹם מוֹעֵד
  english_pob_choice: as on the day of an appointed feast
  chosen_spanish: como en el día de una fiesta señalada
  alternatives_spanish:
  - como en el día de una fiesta señalada
  - como en el día de una fiesta fijada
  - como en el día de una fiesta de convocación
  lexicon: HALOT
  rationale: '''Fiesta señalada'' conserva la idea de זמן/appointed time sin cargar demasiado el texto con tecnicismos. En español expresa la ironía cultual: el templo suena como en una celebración solemne.'
theological_decisions:
- issue: Uso del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto pide transliterar el Tetragrámaton como 'Yahvé'. Esto preserva el Nombre propio de Dios y evita la sustitución tradicional por un título. En este versículo, además, la alternancia con 'Adonai' en el hebreo no exige ocultar el Nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distinción poética entre זָנַח y נִאֵר
  english_pob_reading: Different English verbs ('rejected' / 'abandoned') are used to preserve the rhetorical intensification.
  chosen_spanish_reading: 'Dos verbos distintos: ''ha rechazado'' / ''ha abandonado''.'
  alternative_spanish_readings:
  - usar el mismo verbo en ambas cláusulas
  - '''ha rechazado'' / ''ha despreciado'''
  rationale: El verso acumula dos verbos relacionados pero no idénticos para intensificar el juicio. Mantener dos soluciones distintas en español evita aplanar la repetición y respeta la tensión retórica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La POB inglesa fue revisada para usar 'abandoned' en נִאֵר, evitando duplicar 'rejected' para los dos verbos iniciales. La traducción española refleja esa distinción con 'ha rechazado' / 'ha abandonado'. También se conserva la nota idiomática de 'into the hand of the enemy' y la alternativa de 'appointed feast' como fiesta señalada/festividad señalada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה conforme al criterio del proyecto.
  - Se conserva 'casa de Yahvé' en vez de 'templo' para seguir de cerca la expresión hebrea.
  - Se evita 'siervo' o términos de tono eclesiástico no presentes en el texto.
  - '''Murallas'' se elige por su valor fortificado en el contexto; ''muros'' queda implícito como alternativa léxica válida.'
  - Se mantiene la diferenciación semántica entre los dos verbos del inicio del versículo.
