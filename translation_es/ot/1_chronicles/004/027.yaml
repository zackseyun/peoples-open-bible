revisions:
- from: Simeí tuvo dieciséis hijos y seis hijas[a], pero sus hermanos no tuvieron muchos hijos, y todas sus familias no se multiplicaron tanto como los hijos de Judá.
  to: Simeí tuvo dieciséis hijos y seis hijas[a], pero sus hermanos no tuvieron muchos hijos, y ninguno de sus clanes llegó a multiplicarse tanto como los hijos de Judá.
  rationale: Se revisa ‘familias’ a ‘clanes’ para reflejar mejor מִשְׁפָּחָה en un contexto genealógico, y se mejora la naturalidad del español con ‘ninguno de sus clanes llegó a multiplicarse tanto…’, que preserva la comparación de cantidad documentada en la POB inglesa. También se normaliza la nota al pie quitando comillas y puntuación sobrantes.
