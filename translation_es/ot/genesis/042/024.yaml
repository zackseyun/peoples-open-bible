translation:
  language: es
  text: Se apartó de ellos y lloró. Luego volvió a ellos y les habló, y tomó a Simeón de entre ellos y lo ató delante de sus ojos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסֹּב / מֵעֲלֵיהֶם
  english_pob_choice: turned away from them
  chosen_spanish: se apartó de ellos
  alternatives_spanish:
  - se volvió de ellos
  - se retiró de ellos
  - se apartó de su lado
  lexicon: HALOT
  rationale: El hebreo combina el giro físico con la separación de su presencia. «Se apartó de ellos» comunica bien esa retirada relacional y narrativa sin endurecer el español con un calco excesivo.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se echó a llorar
  - sollozó
  lexicon: HALOT
  rationale: En español, «lloró» es la forma natural y precisa para בכה en una narración. «Se echó a llorar» añade intensificación no explícita; «sollozó» sería demasiado específico.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a ellos
  lexicon: HALOT
  rationale: «Volvió» reproduce con naturalidad el valor de שוב y mantiene el avance narrativo. En este contexto suena menos pesado que «regresó».
- source_word: וַיְדַבֵּר אֲלֵהֶם
  english_pob_choice: spoke to them
  chosen_spanish: les habló
  alternatives_spanish:
  - habló con ellos
  - les dijo
  lexicon: HALOT
  rationale: El piel de דבר se rinde de manera directa con «habló». El dativo «les» conserva la relación verbal sin perder fluidez en español.
- source_word: וַיִּקַּח מֵאִתָּם אֶת שִׁמְעוֹן
  english_pob_choice: he took Simeon from among them
  chosen_spanish: tomó a Simeón de entre ellos
  alternatives_spanish:
  - tomó a Simeón de ellos
  - sacó a Simeón de entre ellos
  lexicon: HALOT
  rationale: «De entre ellos» expresa mejor que Simeón fue seleccionado fuera del grupo. «Tomó» sigue de cerca el hebreo sin convertir la acción en algo más interpretativo como «sacó».
- source_word: וַיֶּאֱסֹר אֹתוֹ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo encadenó
  lexicon: HALOT
  rationale: אַסר indica atar o sujetar con restricción concreta. «Lo ató» es claro y directo; «encadenó» introduciría un detalle no dado por el texto.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en su presencia
  lexicon: HALOT
  rationale: La expresión hebrea apunta a una acción visible para los hermanos. «Delante de sus ojos» conserva esa vividez idiomática en español y evita neutralizar el efecto narrativo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el orden verbal hebreo y refleja la secuencia marcada del versículo. En comparación con el inglés auditado, se optó por un español más natural y menos reiterativo, pero sin perder el matiz de retiro emocional, retorno, selección de Simeón y restricción pública ante los hermanos.
  spanish_consistency_notes:
  - Se mantiene «Simeón» como forma estándar en español bíblico.
  - Se evitó «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el Tetragrámaton ni un título divino.
  - Se preservó la sucesión narrativa por medio de «Se apartó... Lloró. Luego volvió...» para reflejar las acciones consecutivas del hebreo.
