translation:
  language: es
  text: Y le di a Isaac a Jacob y a Esaú, y le di a Esaú la región montañosa de Seír[a] para poseerla; pero[b] Jacob y sus hijos descendieron a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el monte Seír» o «las montañas de Seír».
    reason: lexical_alternative
  - marker: b
    text: O «y Jacob y sus hijos descendieron a Egipto». El hebreo usa simplemente «y»; el texto principal usa «pero» para hacer explícito el contraste.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - dí
  - daba
  - concedí
  lexicon: HALOT
  rationale: נתן aquí expresa acción divina de dar o asignar. En español, «di» mantiene la repetición verbal y la sencillez narrativa sin perder el sentido de concesión soberana.
- source_word: לְיִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: אֶת יַעֲקֹב וְאֶת עֵשָׂו
  english_pob_choice: Jacob and Esau
  chosen_spanish: Jacob y a Esaú
  alternatives_spanish:
  - Jacob y Esaú
  lexicon: N/A (marcador de objeto directo)
  rationale: El marcador אֶת no se traduce. En español, tras «di a Isaac», conviene explicitar la doble dirección con «a Jacob y a Esaú» para claridad sintáctica, sin añadir contenido.
- source_word: לְעֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado según uso bíblico en español.
- source_word: הַר שֵׂעִיר
  english_pob_choice: the hill country of Seir
  chosen_spanish: la región montañosa de Seír
  alternatives_spanish:
  - el monte Seír
  - las montañas de Seír
  - la serranía de Seír
  lexicon: HALOT
  rationale: הַר puede designar montaña o región montañosa. Como el contexto es territorial, «región montañosa» preserva la idea de una posesión geográfica más amplia que un solo pico, siguiendo la decisión inglesa sin calcarla de modo rígido.
- source_word: לָרֶשֶׁת
  english_pob_choice: to possess
  chosen_spanish: para poseer
  alternatives_spanish:
  - para heredar
  - para tomar posesión de
  lexicon: HALOT
  rationale: ירש puede implicar poseer/heredar tierra. «Para poseer» reproduce la función telica del infinitivo y mantiene la fuerza de asignación territorial; «heredar» sería posible, pero aquí puede sonar más interpretativo.
- source_word: וְיַעֲקֹב וּבָנָיו
  english_pob_choice: but Jacob and his sons
  chosen_spanish: pero Jacob y sus hijos
  alternatives_spanish:
  - y Jacob y sus hijos
  lexicon: N/A
  rationale: El hebreo usa פשוטamente וְ, pero el contraste discursivo entre Esaú y Jacob justifica un «pero» en español para hacer explícita la oposición narrativa, como en el audit trail inglés.
- source_word: יָרְדוּ מִצְרָיִם
  english_pob_choice: went down to Egypt
  chosen_spanish: descendieron a Egipto
  alternatives_spanish:
  - bajaron a Egipto
  - fueron a Egipto
  lexicon: HALOT
  rationale: ירד conserva el sentido direccional de descender/bajar. «Descendieron» respeta el matiz bíblico tradicional y sigue de cerca el verbo original, sin perder naturalidad en español.
theological_decisions:
- issue: Contraste narrativo final entre Esau y Jacob
  english_pob_reading: Use 'but' to reflect the narrative contrast between Esau's territorial inheritance and Jacob's descent to Egypt.
  chosen_spanish_reading: Usar «pero» para reflejar el contraste narrativo entre la asignación territorial de Esaú y el descenso de Jacob a Egipto.
  alternative_spanish_readings:
  - usar «y» de forma estrictamente literal
  - usar una simple yuxtaposición con coma
  rationale: El hebreo coordina con וְ, pero el sentido del pasaje contrapone dos trayectorias históricas. «Pero» hace audible el contraste sin alterar la información doctrinal ni añadir una conclusión ajena al texto.
  doctrine_reference: Principio POB de equivalencia óptima; contraste discursivo permitido cuando el hebreo lo presupone por contexto.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el pronombre redundante después de «to possess» para mayor naturalidad. En español se siguió esa misma sobriedad con «para poseer», sin pronombre objeto explícito. No se requieren otras correcciones textuales según el pasaje fuente y el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni un sustituto directo en el texto hebreo.
  - Se conserva «Esaú», «Jacob», «Isaac» y «Egipto» con transliteración/escritura usuales en español bíblico.
  - Se prefirió «descendieron» frente a «bajaron» para conservar el eco bíblico de ירד y la precisión verbal.
  - La estructura coordinada en español mantiene la repetición de «di» del hebreo, reforzando la simetría del versículo.
