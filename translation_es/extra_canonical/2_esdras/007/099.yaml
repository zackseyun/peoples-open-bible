translation:
  language: es
  text: '[de él], a quien sirven los vivos y de quien los gloriosos empiezan a recibir su recompensa. Este es el orden de las almas de los justos, como ahora se anuncia; [y estos son] los caminos de tormento antes descritos, que'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: '[eius], cui seruiunt uiuentes'
  english_pob_choice: '[him], whom the living serve'
  chosen_spanish: '[de él], a quien sirven los vivos'
  alternatives_spanish:
  - '[de él], a quien sirven los que viven'
  - '[de él], a quien sirven los vivientes'
  lexicon: Latin eius; cui serviunt viventes
  rationale: El latino abre con un genitivo pronominal dependiente de una cláusula relativa. En español, para conservar el sentido relacional y la referencia personal, se vierte naturalmente como "de él". "Viventes" puede ser "los vivos" o "los que viven"; elegí "los vivos" por fluidez y porque mantiene el contraste con los muertos implícito en el contexto.
- source_word: a quo incipiunt gloriosi mercedem recipere
  english_pob_choice: from whom the glorious begin to receive their reward
  chosen_spanish: de quien los gloriosos empiezan a recibir su recompensa
  alternatives_spanish:
  - de quien los gloriosos comienzan a recibir su recompensa
  - de quien los gloriosos empiezan a recibir la recompensa
  lexicon: Latin a quo incipiunt gloriosi mercedem recipere
  rationale: '"incipiunt" admite "empiezan" o "comienzan"; "empiezan" es más idiomático en español sin perder el valor incoativo. "mercedem" se traduce como "recompensa" porque expresa con claridad el premio debido; "merced" sería posible pero más arcaizante o ambiguo en español moderno.'
- source_word: Hic ordo animarum iustorum
  english_pob_choice: This is the order of the souls of the righteous
  chosen_spanish: Este es el orden de las almas de los justos
  alternatives_spanish:
  - Este es el orden de las almas de los rectos
  - Éste es el orden de las almas de los justos
  lexicon: Latin hic ordo animarum iustorum
  rationale: '"iustorum" se rinde como "los justos" siguiendo el valor jurídico-moral habitual de iustus. "Rectos" sería posible, pero aquí el paralelo con juicio/recompensa favorece "justos".'
- source_word: ut a modo adnuntiatur
  english_pob_choice: as it is now announced
  chosen_spanish: según se anuncia ahora
  alternatives_spanish:
  - como se anuncia ahora
  - según se anuncia desde ahora
  lexicon: Latin ut a modo adnuntiatur
  rationale: El audit trail revisó "now" a partir de "a modo". En español, "según se anuncia ahora" conserva el carácter presente del anuncio y suena natural. "Según" reproduce mejor el valor de correlación del latín que un simple "como".
- source_word: praedictae uiae cruciatus
  english_pob_choice: the previously described ways of torment
  chosen_spanish: los caminos de tormento antes descritos
  alternatives_spanish:
  - las vías de tormento antes descritas
  - los caminos del tormento antes descritos
  lexicon: Latin praedictae uiae cruciatus
  rationale: '"viae cruciatus" literalmente es "caminos de tormento" o "vías de tormento". Elegí "caminos" por mayor naturalidad y porque el POB inglés también opta por "ways". "Antes descritos" conserva la referencia anafórica a lo ya mencionado.'
theological_decisions:
- issue: Referencia al destinatario divino en un texto latino con pronombre enclítico/explicativo inicial
  english_pob_reading: '[him], whom the living serve'
  chosen_spanish_reading: '[de él], a quien sirven los vivos'
  alternative_spanish_readings:
  - '[a él], a quien sirven los vivos'
  - '[de él], a quien sirven los que viven'
  rationale: El texto latino usa un pronombre en genitivo al inicio, que en contexto remite al ser divino o supremo previamente identificado. En español conviene explicitar la función con "de él" para mantener la dependencia sintáctica y evitar una oración flotante. No se sustituye por "Señor" ni por un título litúrgico, porque el pasaje aquí no lo exige y el audit trail inglés conserva el pronombre.
  doctrine_reference: Nombre divino y referencia pronominal en contexto apocalíptico; fidelidad al antecedente textual sin masking terminológico.
- issue: Finalidad de la cláusula de tormento y su incompletitud textual
  english_pob_reading: '[and these are] the previously described ways of torment, which'
  chosen_spanish_reading: '[y estos son] los caminos de tormento antes descritos, que'
  alternative_spanish_readings:
  - '[y estas son] las vías de tormento antes descritas, que'
  - '[y estos son] los caminos del tormento antes descritos, que'
  rationale: Se mantiene la cláusula incompleta porque el latín continúa en el versículo siguiente. No se completa la frase en español con material inferido. El género plural de "caminos" permite seguir el antecedente implícito del inglés sin forzar una clausura inexistente.
  doctrine_reference: Integridad textual y continuidad de versículo en tradición apocalíptica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que restauró el material inicial omitido, ajustó la fuerza temporal de a modo y conservó la cláusula final incompleta para reflejar que el latín continúa en el versículo siguiente. La versión española sigue esa decisión textual y no cierra artificialmente la frase.
  spanish_consistency_notes:
  - Se usa "justos" para iustorum, en línea con el valor moral/jurídico del latín y con la preferencia POB por conservar el contraste ético.
  - '"Recompensa" traduce mercedem con un registro claro y bíblico, evitando el falso amigo "misericordia" y el arcaísmo excesivo de "merced".'
  - Se mantiene el corte sintáctico al final porque el pasaje está truncado en el testigo base; no se añade puntuación final cerrada más allá del punto y coma interno.
