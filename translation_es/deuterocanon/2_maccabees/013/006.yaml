translation:
  language: es
  text: Aquí todos empujan a la destrucción al hombre culpable de robo del templo[a], o a uno que ha cometido algunos otros males especialmente graves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrilegio». El término griego se refiere específicamente a violar o robar un templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνταῦθα
  english_pob_choice: Here
  chosen_spanish: Aquí
  alternatives_spanish:
  - Allí
  - En ese lugar
  lexicon: LSJ
  rationale: Mantiene la deixis inmediata del griego y su equivalente natural en español. En este contexto introductorio, «Aquí» conserva el valor situacional sin volverlo demasiado literal.
- source_word: ἱεροσυλίας
  english_pob_choice: temple robbery
  chosen_spanish: robo al templo
  alternatives_spanish:
  - sacrilegio
  - saqueo del templo
  lexicon: LSJ
  rationale: El griego apunta específicamente a robar o violar un templo. «Robo al templo» sigue de cerca ese núcleo concreto, mientras que «sacrilegio» sería más amplio y menos preciso.
- source_word: ἔνοχον
  english_pob_choice: guilty
  chosen_spanish: culpable
  alternatives_spanish:
  - responsable
  - liable
  lexicon: LSJ
  rationale: En un contexto judicial, ἔνοχος expresa estar culpable o sujeto a condena por un delito. «Culpable» es el equivalente más claro y natural en español.
- source_word: ὑπεροχὴν πεποιημένον
  english_pob_choice: has committed some other especially great evils
  chosen_spanish: ha cometido algún otro mal especialmente grave
  alternatives_spanish:
  - ha cometido otras maldades extraordinarias
  - ha perpetrado algún otro crimen muy grande
  lexicon: LSJ
  rationale: La expresión es idiomática y sugiere una clase de maldad sobresaliente o eminente. «Mal especialmente grave» conserva el énfasis intensivo sin forzar una paráfrasis demasiado libre.
- source_word: τινων ἄλλων κακῶν
  english_pob_choice: some other especially great evils
  chosen_spanish: algún otro mal
  alternatives_spanish:
  - otros males
  - algún otro crimen
  lexicon: LSJ
  rationale: κακά puede significar males, males morales o delitos. Aquí «mal» mantiene la amplitud moral del término, y el adjetivo «especialmente grave» preserva el matiz intensivo del conjunto.
- source_word: ἅπαντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  - cada uno
  lexicon: LSJ
  rationale: ἅπαντες es inclusivo y total. «Todos» es la opción más natural y suficientemente amplia en español.
- source_word: προωθοῦσιν εἰς ὄλεθρον
  english_pob_choice: pushes to destruction
  chosen_spanish: empujan a la destrucción
  alternatives_spanish:
  - arrastran a la ruina
  - arrojan a la destrucción
  lexicon: LSJ
  rationale: El verbo conserva una imagen física de empuje o impulso hacia un final fatal. «Empujan a la destrucción» transmite bien ese movimiento forzado y el resultado de ruina.
theological_decisions:
- issue: ἱεροσυλία como delito concreto frente a noción amplia de irreverencia religiosa
  english_pob_reading: temple robbery
  chosen_spanish_reading: robo al templo
  alternative_spanish_readings:
  - sacrilegio
  - profanación del templo
  rationale: 'La decisión sigue la lectura léxica concreta del POB inglés y del griego: no se trata solo de irreverencia religiosa general, sino de violación/robo de un lugar sagrado. En español, «robo al templo» evita diluir ese énfasis.'
  doctrine_reference: Transparencia léxica y primacía del texto original; evitar cargar el término con connotaciones eclesiales posteriores.
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó la cláusula final y evitó una traducción demasiado literal de ὑπεροχήν. Esta redacción española sigue esa revisión al usar una fórmula natural («mal especialmente grave») sin perder el valor intensivo del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «robo al templo» en lugar de «sacrilegio» en el cuerpo principal para reflejar el matiz léxico concreto del griego.
  - «Destrucción» traduce ὄλεθρον de manera directa y coherente con el tono judicial y fatal del pasaje.
