translation:
  language: es
  text: Que ruja el mar[a], y todo lo que lo llena, el mundo[b] y los que habitan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «y su plenitud» después de «el mar»; la expresión significa todo lo que está en el mar o lo llena.
    reason: lexical_alternative
  - marker: b
    text: O «el mundo habitado y sus habitantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעַ֣ם
  english_pob_choice: Let ... roar
  chosen_spanish: ¡Ruja!
  alternatives_spanish:
  - Que ruja
  - Ruja
  - ¡Resuene con estruendo!
  lexicon: HALOT
  rationale: El verbo expresa un sonido fuerte, rugiente o trueno. En español poético, el imperativo jussivo «¡Ruja!» conserva bien la fuerza volitiva del contexto sin volverse mecánico.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: Aunque el inglés usa «the sea», en español «mar» es la equivalencia natural y digna. Aquí mantiene el paralelismo poético con el resto del verso.
- source_word: וּמְלֹאוֹ
  english_pob_choice: and all that fills it
  chosen_spanish: y todo lo que lo llena
  alternatives_spanish:
  - y su plenitud
  - y todo lo que contiene
  - y todo lo que hay en él
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente «su plenitud». En español, «todo lo que lo llena» conserva el sentido de contenido total del mar sin perder fluidez. Se evita aplanar la imagen a una simple paráfrasis.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - el mundo habitado
  lexicon: HALOT
  rationale: «El mundo» reproduce la equivalencia breve e idiomática del POB en inglés. El matiz de mundo habitado queda reforzado por la cláusula siguiente.
- source_word: וְיֹשְׁבֵי בָהּ
  english_pob_choice: and those who dwell in it
  chosen_spanish: y los que habitan en él
  alternatives_spanish:
  - y sus habitantes
  - y los que viven en él
  lexicon: HALOT
  rationale: 'La construcción participial conserva un matiz verbal: no solo «habitantes», sino «los que habitan». En español, «los que habitan en él» es claro y mantiene ese valor.'
translation_notes:
  revision_awareness: Se sigue el pasaje hebreo de Salmos 98:7 y el audit trail inglés sin cambios relevantes; la revisión más reciente indicó que no eran necesarios ajustes.
  spanish_consistency_notes:
  - Se usa «mar» para יָם y «mundo» para תֵּבֵל, manteniendo el paralelismo poético.
  - Se conserva el matiz verbal de וְיֹשְׁבֵי con «los que habitan» en vez de «habitantes».
  - Las notas al pie preservan las alternativas léxicas documentadas en el POB inglés sin añadir interpretaciones ajenas al texto.
