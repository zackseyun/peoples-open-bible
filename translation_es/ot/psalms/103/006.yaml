  - severity: low
    issue: La nota al pie no preserva la alternativa principal del audit trail inglés
    rationale: El inglés conserva como alternativa 'does righteous acts and judgments for all the oppressed'. La nota española actual solo ofrece una variante de 'oprimidos', que no corresponde al contraste léxico más significativo documentado.
