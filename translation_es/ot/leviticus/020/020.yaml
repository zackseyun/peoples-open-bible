translation:
  language: es
  text: Si un hombre se acuesta con su tía, ha descubierto la desnudez de su tío[a]. Cargarán su pecado[b]; morirán sin hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit.: «ha descubierto la desnudez de su tío». Es un modismo levítico para la violación de un vínculo sexual prohibido dentro del parentesco.'
    reason: cultural_note
  - marker: b
    text: 'O: «Cargarán su culpa». El hebreo puede expresar tanto el pecado como la culpabilidad o responsabilidad que ellos cargan por él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y un hombre
  - Si alguien
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y el encabalgamiento legal pide una cláusula condicional. «Si un hombre» reproduce con naturalidad la fuerza casuística sin neutralizar el género ni volver la frase demasiado abstracta.
- source_word: אֲשֶׁר
  english_pob_choice: if
  chosen_spanish: Si
  alternatives_spanish:
  - que
  - quien
  lexicon: HALOT
  rationale: En esta fórmula jurídica, la partícula introduce un caso legal condicional. «Si» comunica mejor el valor de ley-caso que una traducción relativa literal.
- source_word: יִשְׁכַּב אֶת
  english_pob_choice: lies with
  chosen_spanish: se acuesta con
  alternatives_spanish:
  - tiene relaciones sexuales con
  - duerme con
  lexicon: HALOT
  rationale: שׁכב en este contexto es el modismo sexual estándar. «Se acuesta con» mantiene la sobriedad idiomática del hebreo sin volverse clínico ni explicativo.
- source_word: דֹּדָתוֹ
  english_pob_choice: his aunt
  chosen_spanish: su tía
  alternatives_spanish:
  - la esposa de su tío
  lexicon: HALOT
  rationale: El sustantivo designa a la esposa del tío, relación que en español normalmente se expresa como «tía». La identificación del parentesco queda reforzada por la siguiente cláusula con «su tío».
- source_word: עֶרְוַת דֹּדוֹ גִּלָּה
  english_pob_choice: he has uncovered his uncle’s nakedness
  chosen_spanish: ha descubierto la desnudez de su tío
  alternatives_spanish:
  - ha descubierto la desnudez de su tío paterno/tío
  - ha expuesto la desnudez de su tío
  lexicon: HALOT
  rationale: Se preserva el modismo levítico de «desnudez» en vez de parafrasearlo como simple acto sexual. Aunque la relación directa es con la tía, el texto formula la violación del vínculo kinship del tío, por eso se mantiene «su tío» en la segunda cláusula.
- source_word: חֶטְאָם יִשָּׂאוּ
  english_pob_choice: They shall bear their sin
  chosen_spanish: Cargarán su pecado
  alternatives_spanish:
  - Cargarán su culpa
  - Llevarán su pecado
  lexicon: HALOT
  rationale: חטא puede expresar pecado o la carga/culpabilidad asociada. «Cargarán su pecado» conserva la ambigüedad hebrea entre culpa y pecado, y reproduce con naturalidad la imagen de llevar una carga.
- source_word: עֲרִירִים
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - sin descendencia
  - estériles
  lexicon: HALOT
  rationale: El adjetivo indica quedar privado de descendencia. «Sin hijos» es la equivalencia breve y clara en español, sin añadir una explicación sobre la causa o el alcance exacto del castigo.
- source_word: יָמֻתוּ
  english_pob_choice: they shall die
  chosen_spanish: morirán
  alternatives_spanish:
  - morirán ciertamente
  - ellos morirán
  lexicon: HALOT
  rationale: 'El verbo es simple y directo. En combinación con עֲרִירִים, el español fluye mejor como una sola predicación final: «morirán sin hijos».'
theological_decisions:
- issue: Sentido de la sanción עֲרִירִים יָמֻתוּ
  english_pob_reading: they shall die childless
  chosen_spanish_reading: morirán sin hijos
  alternative_spanish_readings:
  - morirán sin descendencia
  - morirán y quedarán sin hijos
  rationale: El hebreo no especifica el mecanismo del castigo, sino el resultado/estado. «Morirán sin hijos» conserva la forma breve y evita resolver si la carencia de descendencia es previa, concomitante o resultante de la muerte.
  doctrine_reference: Preservar la tensión textual sin explicarla más allá del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pacto inglés auditado: mantiene el casuismo legal, preserva el modismo levítico de «desnudez», y conserva la ambigüedad de חטא sin decidir entre pecado y culpa. No se introdujeron cambios de sentido respecto del último pase, y la solución española se ajusta al mismo criterio de equivalencia óptima.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el lenguaje jurídico y el paralelo final «Cargarán su pecado; morirán sin hijos» para reflejar la secuencia hebrea breve.
  - «Tía» se usa en sentido relacional amplio conforme al propio contexto del versículo y a la nota aclaratoria.
  - No se reemplazó el modismo de «desnudez» por una paráfrasis sexual más explícita, para no borrar la formulación levítica documentada.
