translation:
  language: es
  text: Bel se inclina; Nebo se encorva. Sus ídolos[a] son para las bestias y para el ganado. Vuestras cargas son llevadas[c][b], cargadas como una carga para el fatigado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus imágenes». El término hebreo puede denotar imágenes fabricadas, pero en este contexto profético se refiere polémicamente a ídolos.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de «vuestras cargas son llevadas» es difícil; probablemente se refiere a las imágenes idolátricas llevadas como carga en procesión o transporte.
    reason: lexical_alternative
  - marker: c
    text: O «las cosas que lleváis son llevadas».
    reason: lexical_alternative
  - marker: d
    text: O «como una carga para el animal exhausto». La frase final puede señalar específicamente el cansancio del animal que lleva los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרַע
  english_pob_choice: bows down
  chosen_spanish: se ha inclinado
  alternatives_spanish:
  - se inclina
  - se ha postrado
  - se doblega
  lexicon: HALOT
  rationale: El verbo describe humillación y derrumbe en sentido profético. "Se ha inclinado" conserva la imagen corporal de abatimiento sin sonar demasiado mecánico en español.
- source_word: בֵּל
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Bél
  lexicon: Nombre propio
  rationale: Se conserva la transliteración del nombre de la deidad babilónica, como nombre propio transliterado y no traducido.
- source_word: קֹרֵס
  english_pob_choice: stoops
  chosen_spanish: se encorva
  alternatives_spanish:
  - se agacha
  - se inclina
  - se derrumba
  lexicon: HALOT
  rationale: El participio expresa hundimiento o curvatura. "Se encorva" mantiene la imagen de abatimiento físico que acompaña a "se ha inclinado".
- source_word: נְב֔וֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Néb o
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio de la deidad babilónica conforme al uso del texto fuente.
- source_word: עֲצַבֵּיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus esculturas
  lexicon: HALOT
  rationale: En este contexto profético y polémico, el término no es neutral; "ídolos" comunica la carga teológica y retórica que el inglés POB documenta.
- source_word: לַחַיָּה וְלַבְּהֵמָה
  english_pob_choice: for the beasts and the cattle
  chosen_spanish: para las bestias y para el ganado
  alternatives_spanish:
  - para los animales y el ganado
  - para las fieras y el ganado
  lexicon: HALOT
  rationale: La pareja nominal distingue categorías de animales de forma amplia. "Bestias" y "ganado" conserva el paralelismo y la concreción sin sobreinterpretar la distinción zoológica.
- source_word: נְשֻׂאֹתֵיכֶם
  english_pob_choice: your loads are borne
  chosen_spanish: Sus cargas son llevadas
  alternatives_spanish:
  - Sus cosas cargadas son llevadas
  - Sus bultos son transportados
  lexicon: HALOT
  rationale: La forma es difícil; el contexto sugiere objetos llevados como carga. Se conserva la pasiva y la imagen del transporte sin resolver indebidamente la ambigüedad sintáctica.
- source_word: עֲמוּסוֹת
  english_pob_choice: loaded
  chosen_spanish: cargadas
  alternatives_spanish:
  - cargados
  - cargada
  lexicon: HALOT
  rationale: El participio pasivo de עמס expresa estado de estar sobrecargado. "Cargadas" mantiene la noción de peso y acumulación en español natural.
- source_word: מַשָּׂא
  english_pob_choice: as a burden
  chosen_spanish: como un peso
  alternatives_spanish:
  - como una carga
  - como un fardo
  lexicon: HALOT
  rationale: '"Peso" en español transmite la carga física de modo claro y mantiene el juego de ironía: aquello que debía ser llevado resulta ser una carga. Se evita endurecer el verso con repeticiones excesivas de "carga".'
- source_word: לַעֲיֵפָה
  english_pob_choice: for the weary
  chosen_spanish: para el fatigado
  alternatives_spanish:
  - para el cansado
  - para el exhausto
  lexicon: HALOT
  rationale: La raíz indica agotamiento; "fatigado" conserva el registro digno y la idea de cansancio extremo. Se evita concretar más de lo que permite el hebreo, que puede referirse al portador agotado o al animal agotado.
theological_decisions:
- issue: Traducción de cultos e imágenes idolátricas
  english_pob_reading: their idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus imágenes
  - sus figuras
  rationale: El contexto profético es abiertamente polémico contra deidades falsas. "Ídolos" preserva esa evaluación teológica sin neutralizar el término.
  doctrine_reference: Isaías 46:1; filosofía de traducción §1, §6
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo consonante/vocalizado y el audit trail inglés; no hubo revisiones posteriores que alteraran el sentido. Se mantiene la ambigüedad notable de נְשֻׂאֹתֵיכֶם y de לַעֲיֵפָה, como indica el POB inglés.
  spanish_consistency_notes:
  - Se usa "ídolos" para עֲצַבִּים por coherencia con la carga polémica del pasaje.
  - Se mantiene la transliteración de los nombres divinos babilónicos, Bel y Nebo.
  - Se conserva la pasiva en "son llevadas" para reflejar la dificultad sintáctica de נְשֻׂאֹתֵיכֶם.
  - '"Fatigado" se eligió por registro y por amplitud semántica; en nota se preserva la alternativa del animal agotado.'
