translation:
  language: es
  text: Recuerden esto y avergüéncense[a]; tómenlo a pecho[b], transgresores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muéstrense varoniles», «sean fuertes» o «cobren ánimo» para la idea de «mantenerse firmes». El verbo hebreo es raro y transmite fortalecerse o afirmarse.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «traigan de vuelta sobre el corazón»; es decir, «llévenlo al corazón», «considérenlo bien» o «tómenlo muy en serio».
    reason: lexical_alternative
  - marker: c
    text: O «rebeldes».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden esto
  - Traigan a la memoria
  lexicon: HALOT
  rationale: Imperativo plural de זכר. En español, «recuerden» conserva el mandato directo y natural; el complemento «esto» se mantiene por el demostrativo siguiente.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - estas cosas
  lexicon: HALOT
  rationale: El demostrativo hebreo es singular y neutro en función referencial; «esto» preserva esa referencia inmediata sin añadir género innecesario.
- source_word: וְהִתְאֹשָׁשׁוּ
  english_pob_choice: be ashamed
  chosen_spanish: avergüéncense
  alternatives_spanish:
  - siéntanse avergonzados
  - muéstrense firmes
  - cobren ánimo
  lexicon: HALOT
  rationale: Aunque la base léxica es rara y la POB inglesa revisó su lectura, el contexto español permite una forma que refleje la revisión de sentido hacia vergüenza/avergonzamiento. Se evita «sean hombres» por ser más interpretativo y menos transparente.
- source_word: הָשִׁיבוּ
  english_pob_choice: take it to heart
  chosen_spanish: tráiganlo a su corazón
  alternatives_spanish:
  - háganlo entrar en su corazón
  - considérenlo bien
  lexicon: HALOT
  rationale: El hebreo literalmente expresa «hacer volver sobre el corazón». «Tráiganlo a su corazón» conserva la imagen idiomática mejor que una paráfrasis totalmente desmetaforizada.
- source_word: פוֹשְׁעִים
  english_pob_choice: you transgressors
  chosen_spanish: transgresores
  alternatives_spanish:
  - rebeldes
  - ustedes rebeldes
  lexicon: HALOT
  rationale: Participio activo plural de פשע. «Transgresores» mantiene el campo moral-jurídico y encaja con la forma vocativa del hebreo; el vocativo explícito en español se entiende por el contexto.
- source_word: עַל לֵב
  english_pob_choice: to heart
  chosen_spanish: a su corazón
  alternatives_spanish:
  - sobre el corazón
  - en la mente
  lexicon: HALOT
  rationale: La locución idiomática hebrea alude al asiento interior del pensar y decidir. «A su corazón» conserva la metáfora sin sonar forzado en español.
theological_decisions:
- issue: Valor del verbo raro הִתְאֹשָׁשׁוּ en el contexto
  english_pob_reading: The English POB revised from 'stand firm' to 'be ashamed' to better reflect the context.
  chosen_spanish_reading: avergüéncense
  alternative_spanish_readings:
  - manténganse firmes
  - cobren ánimo
  - muéstrense varoniles
  rationale: Dado el pass de revisión del POB inglés, el español sigue la lectura contextual de vergüenza/avergonzamiento en lugar de una exhortación a fortaleza. Se conserva la tensión con la rareza verbal sin normalizarla a una fórmula tradicional.
  doctrine_reference: Contexto profético de reprensión; prudencia exegética frente a un verbo raro
- issue: Vocativo final y fuerza moral de פוֹשְׁעִים
  english_pob_reading: you transgressors
  chosen_spanish_reading: transgresores
  alternative_spanish_readings:
  - rebeldes
  - ustedes rebeldes
  rationale: Se mantiene el carácter acusatorio y ético del término sin introducir una etiqueta más específica de lo que el hebreo exige. El español puede omitir el pronombre explícito y conservar la función vocativa.
  doctrine_reference: Lenguaje profético de denuncia y llamado al arrepentimiento
translation_notes:
  revision_awareness: La POB inglesa revisó 'stand firm' a 'be ashamed' para reflejar mejor הִתְאֹשָׁשׁוּ. Esta versión española sigue esa revisión contextual y, al mismo tiempo, preserva la metáfora hebrea de עַל־לֵב con una redacción natural en español.
  spanish_consistency_notes:
  - Se usa «Recuerden» para el imperativo plural, en paralelo con el hebreo.
  - Se evita «SEÑOR» o sustituciones teológicas no presentes en el versículo.
  - «Transgresores» mantiene el tono jurídico-moral del participio hebreo.
  - La nota de la frase idiomática conserva la literalidad subyacente y una opción interpretativa más natural para lectura pública.
