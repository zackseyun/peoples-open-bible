translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente en el sentido de τῇ ὄψει como un instrumento de percepción («por lo que ven» / «por la vista») y de τὰ βλεπόμενα como «las cosas visibles», procurando una redacción española fluida pero cercana al griego. La nota lexical conserva la tensión entre 'hermosas' y 'buenas' en καλὰ.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Creador» implícito en el referente de las obras, sin introducir «SEÑOR».
  - Se prefirió un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota al pie conserva la alternativa semántica de καλός, como en el audit trail inglés.
