    issue: Las notas al pie están mal distribuidas respecto del audit trail inglés.
    rationale: La nota lexical_alternative sobre el tiempo debe ir en la frase temporal, no en «Sarai». La nota alternative_reading debe acompañar «como esposa», porque explica que el hebreo dice «como esposa» aunque Agar también es llamada esclava.
  - severity: medium
    issue: Hay duplicación innecesaria de notas temporales.
    rationale: El borrador incluye dos notas para la misma construcción temporal (a y c), cuando el inglés solo preserva una alternativa significativa.
  - severity: low
