lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  - Y vino a ser
  lexicon: HALOT
  rationale: El wayyiqtol introduce una secuencia narrativa; en español, 'Entonces ... vino' conserva el valor discursivo de inicio de fórmula sin caer en un calco anticuado. 'Entonces' expresa la progresión, y 'vino' mantiene el movimiento hacia el profeta.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la voz
  - la palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, 'la palabra' es la equivalencia más precisa y estable. En español, el sustantivo femenino concuerda con 'palabra' y preserva la expresión profética recurrente sin suavizarla a 'mensaje'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El tetragrámaton se vierte con el nombre propio divino. En español, la forma editorial establecida del proyecto es 'Yahvé', que preserva el nombre personal de Dios frente a la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario de la palabra divina. En español, 'a' es la equivalencia natural y directa con el régimen verbal de 'vino'.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: Standard proper-name convention
  rationale: Aunque el hebreo conserva la forma Yirmeyahu, en español bíblico la forma tradicional 'Jeremías' es la lectura plenamente inteligible y fiel al referente histórico del profeta en un texto publicable.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce la cita o el contenido del mensaje. 'Diciendo' reproduce esa función en español de manera natural, manteniendo la fórmula profética breve y subordinada.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: La base hebrea usa el Tetragrámaton directamente. Para mantener la transparencia del texto fuente y evitar la sustitución tradicional por un título, se usa 'Yahvé', consistente con la convención proyectual en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética דְּבַר יְהוָה
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  rationale: La expresión profética es una fórmula técnica recurrente; 'palabra' conserva mejor su densidad teológica y literaria que 'mensaje'. La preposición 'de' refleja la posesión o procedencia divina sin añadir explicaciones.
  doctrine_reference: Uso profético del 'dabar Yahvé' en la narrativa profética
translation_notes:
  revision_awareness: El cotejo auditado en inglés muestra alta concordancia y no registra revisiones aplicadas; por ello, esta versión española sigue de cerca la fórmula hebrea sin introducir variantes textuales ni expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como 'Yahvé' conforme al estándar del proyecto en español.
  - Se traduce el nombre del profeta por la forma española tradicional 'Jeremías' para legibilidad, anotando la forma hebrea en nota.
  - La estructura breve de la fórmula profética se conserva sin añadir conectores innecesarios.
  - Se evita 'SEÑOR' como sustituto del Tetragrámaton, en continuidad con la política de transparencia del proyecto.
