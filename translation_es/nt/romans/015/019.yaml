translation:
  language: es
  text: por el poder de señales y prodigios[a], por el poder del Espíritu, de manera que, desde Jerusalén y en toda la región circundante hasta Ilírico, he proclamado plenamente el evangelio del Mesías[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el poder del Espíritu Santo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «he cumplido el evangelio del Mesías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δυνάμει
  english_pob_choice: by the power of
  chosen_spanish: por el poder de
  alternatives_spanish:
  - en el poder de
  - mediante el poder de
  lexicon: BDAG
  rationale: La frase expresa medio o agencia eficaz. «Por el poder de» es natural en español y conserva la idea de acción realizada gracias a una fuerza operante.
- source_word: σημείων καὶ τεράτων
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - milagros y prodigios
  lexicon: BDAG
  rationale: La pareja es una fórmula bíblica estable para actos extraordinarios que autentican la obra divina. «Señales y prodigios» conserva el paralelismo y la tonalidad bíblica sin perder claridad.
- source_word: πνεύματος
  english_pob_choice: the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del Espíritu Santo
  - del espíritu
  lexicon: BDAG
  rationale: El contexto paulino y la asociación con el poder divino apuntan al Espíritu Santo. Sin embargo, el griego no explicita «santo», así que la forma principal mantiene solo «Espíritu».
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de manera que
  alternatives_spanish:
  - así que
  - de modo que
  lexicon: BDAG
  rationale: Introduce un resultado. «De manera que» suena natural en español formal y conserva la relación lógica con lo anterior.
- source_word: ἀπὸ Ἰερουσαλὴμ καὶ κύκλῳ
  english_pob_choice: from Jerusalem and all around
  chosen_spanish: desde Jerusalén y en toda la región circundante
  alternatives_spanish:
  - desde Jerusalén y alrededor
  - desde Jerusalén y en derredor
  lexicon: BDAG
  rationale: κύκλῳ funciona adverbialmente con sentido de extensión geográfica amplia. La opción elegida explica el modismo en español sin volverlo demasiado literal o arcaico.
- source_word: μέχρι τοῦ Ἰλλυρικοῦ
  english_pob_choice: as far as Illyricum
  chosen_spanish: hasta Ilírico
  alternatives_spanish:
  - hasta el Ilírico
  - hasta la región de Ilírico
  lexicon: BDAG
  rationale: «Hasta» expresa el límite de alcance. «Ilírico» es la forma estándar en español bíblico y mantiene el topónimo histórico.
- source_word: πεπληρωκέναι
  english_pob_choice: I have fully proclaimed
  chosen_spanish: he proclamado plenamente
  alternatives_spanish:
  - he cumplido plenamente
  - he anunciado plenamente
  lexicon: BDAG
  rationale: Con «evangelio», πληρόω puede implicar llevarlo a plena difusión o expresión en una región. «He proclamado plenamente» refleja la lectura contextual preferida por el audit trail inglés, sin perder la idea de plenitud.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: En contexto paulino, «evangelio» es la traducción española estable y precisa.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Según la pauta del proyecto, Χριστός se vierte como «Mesías» cuando funciona como título. Aquí califica a «evangelio», por lo que el título es el mejor equivalente.
theological_decisions:
- issue: Referente de πνεύματος
  english_pob_reading: the Spirit, referring to the Holy Spirit
  chosen_spanish_reading: del Espíritu, referido al Espíritu Santo
  alternative_spanish_readings:
  - del espíritu en sentido general
  - del Espíritu Santo explícitamente
  rationale: El contexto de ministerio apostólico acompañado por señales y prodigios favorece la referencia al Espíritu Santo. La redacción principal respeta el griego sin añadir «Santo» al texto base.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Sentido de πεπληρωκέναι τὸ εὐαγγέλιον
  english_pob_reading: I have fully proclaimed the gospel of the Messiah
  chosen_spanish_reading: he proclamado plenamente el evangelio del Mesías
  alternative_spanish_readings:
  - he cumplido el evangelio del Mesías
  - he llevado plenamente el evangelio del Mesías
  rationale: El verbo puede significar no solo «cumplir» sino también llevar algo a plena expresión o difusión. La formulación elegida sigue la interpretación contextual preferida por el audit trail inglés, evitando una lectura demasiado rígida de «cumplir».
  doctrine_reference: 'Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail inglés, que prefirió «fully proclaimed» para πεπληρωκέναι en contexto. Por eso la versión principal adopta «he proclamado plenamente» en vez de una fórmula de «cumplido/realizado», manteniendo a la vez la referencia titular «Mesías» y la distinción entre «Espíritu» y «Espíritu Santo» como nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la terminología del proyecto.
  - Se evita sustituir automáticamente «Espíritu» por «Espíritu Santo» en el cuerpo principal; la expansión queda en nota.
  - «Señales y prodigios» conserva la pareja lexical convencional del texto bíblico.
  - La extensión geográfica se vierte con «desde... hasta...» para reproducir la amplitud retórica del griego.
  - El orden general sigue el flujo sintáctico del original sin calco innecesario.
