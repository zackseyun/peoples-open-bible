translation:
  language: es
  text: En el cuarto día[a], el líder[b] de los hijos de Rubén[c] fue Elizur, hijo de Sedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el cuarto día'; la construcción hebrea con la preposición ב puede expresarse de manera temporal en esta enumeración.
    reason: lexical_alternative
  - marker: b
    text: O 'jefe' o tradicionalmente 'príncipe' para נָשִׂיא; el hebreo designa a un dirigente tribal oficial.
    reason: lexical_alternative
  - marker: c
    text: O 'para los hijos de Rubén'; la preposición hebrea puede marcar relación o representación en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם / הָרְבִיעִי
  english_pob_choice: On the fourth day
  chosen_spanish: Al cuarto día
  alternatives_spanish:
  - En el cuarto día
  - El cuarto día
  lexicon: HALOT
  rationale: La construcción temporal hebrea con ב + יוֹם en esta enumeración se expresa naturalmente en español como 'al cuarto día'; mantiene el valor de secuencia narrativa sin sonar forzada.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - jefe tribal
  lexicon: HALOT
  rationale: '''Jefe'' comunica la función oficial de cabeza de una tribu sin introducir la connotación monárquica de ''príncipe''. En este contexto de tribus, preserva la idea de autoridad representativa.'
- source_word: לִבְנֵי רְאוּבֵן
  english_pob_choice: of the sons of Reuben
  chosen_spanish: de los hijos de Rubén
  alternatives_spanish:
  - para los hijos de Rubén
  - de los rubenitas
  lexicon: HALOT
  rationale: '''De los hijos de Rubén'' sigue de cerca la expresión hebrea y conserva el lenguaje genealógico-tribal. ''Hijos'' es más transparente en español bíblico que una paráfrasis como ''descendientes''.'
- source_word: אֱלִיצוּר
  english_pob_choice: Elizur
  chosen_spanish: Elizur
  alternatives_spanish:
  - Elizur
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado de forma estándar; no se traduce.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Construcción patronímica normal en español para identificación genealógica.
- source_word: שְׁדֵיאוּר
  english_pob_choice: Shedeur
  chosen_spanish: Sedeur
  alternatives_spanish:
  - Shedeur
  lexicon: transliteración estándar
  rationale: Se adapta el nombre propio a la ortografía española habitual, conservando la identificación del nombre hebreo.
