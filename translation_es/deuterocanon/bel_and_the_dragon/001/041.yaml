lexical_decisions:
- source_word: ἀναβοήσας
  english_pob_choice: crying out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: BDAG
  rationale: El participio aoristo expresa un grito o clamor enérgico. «Clamó» conserva la intensidad y funciona de manera natural en español bíblico sin volverlo más interpretativo de lo que permite el griego.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz alta
  alternatives_spanish:
  - en alta voz
  - con gran voz
  lexicon: BDAG
  rationale: La expresión griega es idiomática y señala intensidad audible. «Con voz alta» mantiene la idea de audibilidad y resulta claro en español; «en alta voz» también sería posible, pero suena más formularia.
- source_word: Μέγας εἶ
  english_pob_choice: Great are you
  chosen_spanish: Grande eres tú
  alternatives_spanish:
  - Tú eres grande
  - Grande eres
  lexicon: BDAG
  rationale: Se conserva el orden enfático del predicado primero, que en español suena bien como exclamación reverente. «Grande eres tú» refleja mejor el énfasis que una forma más plana como «Tú eres grande».
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí λειτουργa como título divino en vocativo. En español litúrgico y bíblico, «Señor» es la equivalencia natural y más fiel al uso devocional del griego.
- source_word: ὁ θεὸς
  english_pob_choice: the God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Se conserva el artículo explícito del griego con «el Dios», ya que el texto fuente lo marca y la revisión inglesa también lo restauró. Esto deja visible la aposición «Señor, el Dios».
- source_word: τοῦ
  english_pob_choice: of the
  chosen_spanish: de[l]
  alternatives_spanish:
  - del
  - de
  lexicon: BDAG
  rationale: El texto fuente conservado termina en una forma genitiva truncada. Para reflejar la incompletitud sin reconstruir el resto, se deja la preposición abierta en español. Se marca con nota para indicar que la secuencia continúa en la tradición o en la línea siguiente.
theological_decisions:
- issue: Tratamiento de κύριος como vocativo divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El contexto es una alabanza dirigida a Dios, no una simple forma de cortesía. «Señor» mantiene la fuerza teológica del vocativo y sigue la equivalencia estable del proyecto para κύριος cuando se refiere a Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
- issue: Respeto de la frase incompleta al final del verso
  english_pob_reading: Preserve the verse as an incomplete clause in English
  chosen_spanish_reading: Preservar la cláusula incompleta en español
  alternative_spanish_readings:
  - Completar con el contexto
  - Suavizar la incompletitud en una redacción fluida
  rationale: La transparencia textual exige no suplir palabras no atestiguadas. Por eso se mantiene el final truncado y se señala con nota que el versículo termina en una forma genitiva sin continuación en el extracto proporcionado.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy and transparency'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente restauró el artículo antes de ''God'' y mantuvo el versículo incompleto. Esta versión española refleja esa misma decisión: conserva la aposición explícita «Señor, el Dios» y no intenta completar el final de la línea. También se ajusta el tono para que la exclamación inicial y el vocativo resulten naturales en español.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en vocativo divino, en línea con el criterio del proyecto.
  - Se conserva «el Dios» para ὁ θεός, evitando diluir el artículo del original.
  - La incompletitud final se deja visible en vez de reconstruirla, siguiendo el principio de transparencia textual.
