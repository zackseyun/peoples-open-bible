translation:
  language: es
  text: Sus enemigos los oprimieron[a], y quedaron sometidos bajo su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo su poder» / «bajo su control»; literalmente, «bajo su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְחָצוּם
  english_pob_choice: oppressed them
  chosen_spanish: los oprimieron
  alternatives_spanish:
  - los apremiaron
  - los afligieron
  lexicon: HALOT
  rationale: La raíz לחץ en este contexto expresa presión hostil y dominación. «Oprimieron» conserva la fuerza de la acción enemiga sin sonar demasiado literal o arcaica en español.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los que los odiaban
  lexicon: HALOT
  rationale: «Enemigos» es la equivalencia directa y natural para אויב con sufijo pronominal, y mantiene el sentido militar y político del contexto.
- source_word: וַיִּכָּנְעוּ
  english_pob_choice: they were subdued
  chosen_spanish: quedaron sometidos
  alternatives_spanish:
  - fueron subyugados
  - fueron humillados
  lexicon: HALOT
  rationale: El nifal de כנע indica quedar bajo sujeción o ser sometido. «Quedaron sometidos» conserva la pasividad/resultatividad del verbo y su conexión con la frase siguiente.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  lexicon: HALOT
  rationale: La preposición básica significa «bajo/under». En español, «bajo su mano» reproduce bien la relación de subordinación sin recargar la frase.
- source_word: יָדָם
  english_pob_choice: their hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su poder
  - su control
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «mano», como hace el inglés POB, porque en hebreo la expresión idiomática alude a poder o control sin necesidad de explicitarlo en el texto principal.
translation_notes:
  revision_awareness: 'El texto coincide con la última revisión inglesa: no hubo cambios de contenido en el pasaje auditado. Se preserva la imagen hebrea de «mano» y se deja la alternativa idiomática en nota, siguiendo el enfoque del POB en inglés.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología ajena al verso, ya que no aparece el nombre divino aquí.
  - «Oprimieron» y «sometidos» mantienen la relación de presión externa y subyugación indicada por el hebreo.
  - La nota conserva la tensión entre la imagen concreta («mano») y el sentido idiomático («poder/control»).
