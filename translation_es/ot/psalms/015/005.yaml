translation:
  language: es
  text: No presta su dinero a interés[a], ni toma soborno[b] contra el inocente. El que hace estas cosas no será jamás sacudido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'usura'; el hebreo נֶשֶׁךְ puede designar el interés cobrado en un préstamo.
    reason: lexical_alternative
  - marker: b
    text: O 'no será jamás movido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפּוֹ
  english_pob_choice: his money
  chosen_spanish: su dinero
  alternatives_spanish:
  - su plata
  - su dinero/riqueza
  - su plata/riqueza
  lexicon: HALOT
  rationale: כֶּסֶף puede significar literalmente 'plata', pero en un contexto de préstamo e interés el sentido económico natural es 'dinero'. En español, 'su dinero' comunica con claridad la referencia poseída sin perder el trasfondo de riqueza/metal precioso cuando no es necesario explicitarlo.
- source_word: נָתַן בְּנֶשֶׁךְ
  english_pob_choice: lend ... at interest
  chosen_spanish: presta ... a interés
  alternatives_spanish:
  - da ... a usura
  - presta ... con interés
  lexicon: HALOT
  rationale: La construcción expresa la acción de prestar con cobro de interés. 'A interés' es la forma natural y fiel en español moderno; evita 'usura', que suele sugerir solo interés excesivo, reduciendo indebidamente el alcance léxico del hebreo נֶשֶׁךְ.
- source_word: שֹׁחַד
  english_pob_choice: a bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - cohecho
  - mordida
  lexicon: HALOT
  rationale: El sustantivo denota un pago corrupto para torcer la justicia. 'Soborno' es el término moral y jurídico más claro en español; 'cohecho' es más técnico y menos natural para lectura pública.
- source_word: עַל נָקִי
  english_pob_choice: against the innocent
  chosen_spanish: contra el inocente
  alternatives_spanish:
  - contra el inocente/culpable
  - para perjudicar al inocente
  - contra el inocente y sin culpa
  lexicon: HALOT
  rationale: נָקִי significa 'inocente, libre de culpa'. Con עַל tras 'tomar soborno', el sentido es recibirlo para actuar contra una persona inocente. 'Contra el inocente' conserva la dirección hostil y la escena judicial implícita.
- source_word: עֹשֵׂה אֵלֶּה
  english_pob_choice: The one who does these things
  chosen_spanish: El que hace estas cosas
  alternatives_spanish:
  - Quien hace estas cosas
  - El que practica estas cosas
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para caracterizar a una persona por sus actos. 'El que hace estas cosas' mantiene el singular genérico y suena natural en español bíblico contemporáneo.
- source_word: לֹא יִמּוֹט
  english_pob_choice: will never be shaken
  chosen_spanish: no será jamás sacudido
  alternatives_spanish:
  - no será jamás movido
  - no vacilará nunca
  - no será conmovido jamás
  lexicon: HALOT
  rationale: מוֹט en nifal expresa ser movido, tambalear o sacudirse. 'No será jamás sacudido' preserva la metáfora de estabilidad/seguridad; 'sacudido' comunica bien el resultado figurado sin sonar anticuado.
- source_word: לְעוֹלָם
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - nunca
  lexicon: HALOT
  rationale: En esta negación, לְעוֹלָם funciona idiomáticamente como 'nunca/jamás' en sentido enfático. 'Jamás' refuerza el carácter absoluto de la afirmación en un español natural y solemne.
theological_decisions:
- issue: Alcance ético de נֶשֶׁךְ (interés/usura)
  english_pob_reading: Render נֶשֶׁךְ as 'interest' without narrowing it to only excessive interest.
  chosen_spanish_reading: Traducir נֶשֶׁךְ como 'a interés' sin limitarlo a 'usura'
  alternative_spanish_readings:
  - usura
  - interés excesivo
  rationale: El contexto condena prestar con cobro de interés dentro de una ética de justicia pactual. 'Usura' en español moderno suele restringirse a interés abusivo o ilegal; 'a interés' conserva el rango semántico más amplio del hebreo sin imponer una teoría económica posterior.
  doctrine_reference: Principio de primacía del texto original y equivalencia óptima; lectura ética del Salmo 15 como descripción del justo.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran cambios aplicados y el control cruzado reporta alto acuerdo, por lo que se mantiene la formulación estable sin ajustes de contenido.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' y 'Yahvé' no son necesarios en este versículo.
  - Se preserva el paralelismo sintáctico del hebreo con dos cláusulas negativas y una sentencia final.
  - '''Soborno'' se usa como término ético-jurídico estándar, coherente con el contexto judicial de ''contra el inocente''.'
  - La nota de 'a interés' evita introducir una distinción moderna entre interés permitido y usura que el hebreo no explicita.
