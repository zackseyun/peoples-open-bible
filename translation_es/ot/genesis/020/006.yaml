  text: וַ/יֹּאמֶר֩ אֵלָ֨י/ו הָֽ/אֱלֹהִ֜ים בַּ/חֲלֹ֗ם גַּ֣ם אָנֹכִ֤י יָדַ֨עְתִּי֙ כִּ֤י בְ/תָם לְבָבְ/ךָ֙ עָשִׂ֣יתָ זֹּ֔את וָ/אֶחְשֹׂ֧ךְ גַּם אָנֹכִ֛י אֽוֹתְ/ךָ֖ מֵ/חֲטוֹ לִ֑/י עַל כֵּ֥ן לֹא נְתַתִּ֖י/ךָ לִ/נְגֹּ֥עַ אֵלֶֽי/הָ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/020/006.yaml
  text: Then God said to him in the dream[a], “Yes, I know that you did this in the integrity of your heart, and I also kept you from sinning against me[b]. Therefore I did not let you touch her.”
  footnotes:
  - marker: a
    text: Or “in a dream.” The Hebrew can be read indefinitely, though the article favors “in the dream” in this context.
    reason: lexical_alternative
  - marker: b
    text: “Touch her” is a restrained expression here referring to sexual contact.
    reason: lexical_alternative
