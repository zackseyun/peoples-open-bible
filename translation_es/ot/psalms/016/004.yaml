base_translation:
  language: en
  yaml_path: translation/ot/psalms/016/004.yaml
  text: The sorrows of those who hurry after another god will multiply[a]; I will not pour out their drink offerings of blood[b], nor will I lift up their names on my lips.
  footnotes:
  - marker: a
    text: Or 'their idols will multiply'; the Hebrew term can be associated with idols in some contexts, though here 'sorrows' better fits the sense of the line.
    reason: alternative_reading
  - marker: b
    text: Or 'with blood' for 'of blood.'
    reason: lexical_alternative
