revisions:
- from: Pero si no[a], nosotros testificaremos contra ti que había un joven contigo[b], y por eso despediste a las sirvientas lejos de ti.
  to: Pero si no, testificaremos[a] contra ti que había un joven contigo, y por eso enviaste lejos de ti a las sirvientas[b].
  rationale: Se corrige el anclaje de la nota forense para que recaiga sobre el verbo pertinente, y se mejora la naturalidad y fidelidad de ἐξαπέστειλας ἀπὸ σοῦ con «enviaste lejos de ti» en lugar de «despediste ... lejos de ti». También se elimina el sujeto explícito innecesario para un español más fluido.
