review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la providencia de Dios/Padre dirige la nave implícita del contexto, y Dios dio un camino en el mar y una senda segura en las olas. Sin embargo, la elección principal para διακυβερνᾷ como «la gobierna» debilita el matiz náutico que el inglés auditado preserva con «steers». Dado que el contexto inmediato es una embarcación, conviene una formulación española que conserve mejor la imagen de pilotaje/timón.'
  spanish_quality_summary: El español es claro, natural y digno. «Providencia», «Padre», «camino», «senda segura» y el paralelismo «en el mar / en las olas» están bien logrados. La única mejora necesaria es hacer más visible el colorido marítimo del verbo sin caer en tecnicismo torpe; «la guía» con nota, o mejor «la lleva el timón de tu providencia», serían opciones más libres, pero para conservar cercanía formal se prefiere «la dirige» con nota que explicite «pilotea / gobierna».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Providencia» para πρόνοια está bien alineado con la decisión teológica auditada. No hay nombres divinos ni títulos mesiánicos implicados. La revisión propuesta solo ajusta el verbo para respetar mejor la decisión léxica inglesa sobre διακυβερνᾷ.
  issues:
  - severity: medium
    issue: «la gobierna» para διακυβερνᾷ pierde parte del matiz náutico
    rationale: El verbo griego tiene sentido marítimo de gobernar/dirigir una nave. «Gobierna» en español se entiende, pero su lectura primaria es abstracta o política. El contexto pide una opción que sugiera mejor la conducción de una embarcación.
  - severity: low
    issue: La nota al pie repite la forma principal como alternativa
    rationale: La nota dice «O “la gobierna” / “la dirige”», pero «la gobierna» ya es el texto principal. Conviene reordenarla para que la alternativa relevante sea la más marcada náuticamente.
  revised_spanish_text: Pero tu providencia[a], Padre, la dirige, porque diste un camino aun en el mar, y una senda segura en las olas.
  revised_footnotes:
  - marker: a
    text: O «la gobierna» o «la pilotea»; el verbo griego tiene un matiz náutico, apropiado a la imagen del barco en el contexto.
    reason: lexical_alternative
  revision_rationale: Se cambia «la gobierna» por «la dirige» para sonar más natural en español contemporáneo y evitar una lectura principalmente política o abstracta, mientras la nota conserva explícitamente las alternativas con matiz náutico («la pilotea») y más literal («la gobierna»). El resto del versículo es fiel, claro y bien formulado.
