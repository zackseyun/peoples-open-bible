translation:
  language: es
  text: Un caballo es una falsa esperanza[a] para la salvación[b], y por su gran fuerza no puede salvar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una mentira para la salvación». El hebreo es muy compacto; la frase comunica que el caballo resulta engañoso o vano como medio de salvación.'
    reason: alternative_reading
  - marker: b
    text: «Salvación» también podría traducirse «liberación» o «victoria», según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁקֶר
  english_pob_choice: a false hope
  chosen_spanish: una falsa esperanza
  alternatives_spanish:
  - una mentira
  - vano
  - engañoso
  - una falsedad
  lexicon: HALOT
  rationale: El hebreo expresa falsedad, engaño o vacío de confianza. En español, «falsa esperanza» comunica bien que el caballo promete algo que no puede dar, sin volver demasiado abstracto el dicho.
- source_word: הַסּוּס
  english_pob_choice: a horse
  chosen_spanish: un caballo
  alternatives_spanish:
  - el caballo
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, el valor es genérico/proverbial. En español, el indefinido singular suena natural y conserva el sentido representativo de la clase.
- source_word: לִתְשׁוּעָה
  english_pob_choice: for deliverance
  chosen_spanish: para la liberación
  alternatives_spanish:
  - para salvación
  - para victoria
  lexicon: HALOT
  rationale: El término puede abarcar liberación, salvación o victoria. En este contexto de guerra y de rescate, «liberación» es claro y fiel, y evita cargar el texto con un matiz teológico no exigido por el verso.
- source_word: וּבְרֹב
  english_pob_choice: and by its great
  chosen_spanish: y por su gran
  alternatives_spanish:
  - y en la abundancia de su
  - y con su gran
  lexicon: HALOT
  rationale: La preposición con רֹב indica medio, circunstancia o abundancia. «Por su gran» reproduce de forma natural la fuerza explicativa de la frase.
- source_word: חֵילוֹ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - músculo
  - potencia
  lexicon: HALOT
  rationale: Con referencia al caballo, la idea es su capacidad física. «Fuerza» es la equivalencia más directa y transparente en español.
- source_word: לֹא יְמַלֵּט
  english_pob_choice: it cannot rescue
  chosen_spanish: no puede rescatar
  alternatives_spanish:
  - no puede librar
  - no puede salvar
  - no puede sacar con bien
  lexicon: HALOT
  rationale: El verbo מלט en piel significa rescatar, librar o sacar de peligro. «No puede rescatar» mantiene la incapacidad en el contexto y conserva la paralela con «liberación».
translation_notes:
  revision_awareness: 'Coincido con el nivel de acuerdo alto del control cruzado: no se requieren cambios sustanciales. Se mantuvo la decisión de traducir el hebreo de forma idiomática y representativa, sin perder la ambigüedad de תְשׁוּעָה entre liberación, salvación y victoria.'
  spanish_consistency_notes:
  - Se conservó el paralelismo del hebreo con una estructura breve y proverbial.
  - Se prefirió «liberación» sobre «salvación» para no importar un matiz más técnico de lo que el contexto exige.
  - «Rescatar» se mantuvo para reflejar el valor dinámico de יְמַלֵּט y su relación con la idea de librar de peligro.
  - El artículo hebreo en סּוּס no se reflejó como definido en español por tratarse de un enunciado genérico.
