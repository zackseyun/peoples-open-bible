translation:
  language: es
  text: ¿Tras quién ha salido el rey de Israel? ¿Tras quién vas[a]? Tras un perro muerto, tras una sola pulga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Contra quién ha salido el rey de Israel? ¿A quién persigues?». El hebreo repite literalmente «tras» con el sentido de persecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי מִי
  english_pob_choice: After whom
  chosen_spanish: ¿Tras quién
  alternatives_spanish:
  - ¿Después de quién
  - ¿En persecución de quién
  lexicon: HALOT
  rationale: Tras conserva la repetición retórica de אַחֲרֵי y en español puede expresar persecución sin perder la forma interrogativa del hebreo. 'Después de quién' suena más temporal; 'en persecución de quién' explicita demasiado el sentido.
- source_word: יָצָא
  english_pob_choice: has ... come out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido fuera
  - ha ido
  lexicon: HALOT
  rationale: El verbo hebreo significa 'salir / salir hacia fuera'. 'Ha salido' es natural en español y mantiene la idea de haber emprendido una salida o campaña sin agregar interpretación.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - Israel, su rey
  - el rey de Israel
  lexicon: HALOT
  rationale: Se conserva el título formal con el orden más natural en español. La forma mantiene la dignidad e ironía del cuestionamiento de David.
- source_word: אַתָּה רֹדֵף
  english_pob_choice: are you pursuing
  chosen_spanish: estás persiguiendo
  alternatives_spanish:
  - persigues
  - andas persiguiendo
  lexicon: HALOT
  rationale: '''Perseguir'' comunica el sentido hostil y sostenido de רדף mejor que ''correr tras'' o ''cazar''. El progresivo ''estás persiguiendo'' refleja bien el valor actual de la pregunta sin endurecerla artificialmente.'
- source_word: כֶּלֶב מֵת
  english_pob_choice: a dead dog
  chosen_spanish: un perro muerto
  alternatives_spanish:
  - un perro cadáver
  - un perro ya muerto
  lexicon: HALOT
  rationale: La expresión es una auto-humillación convencional. 'Perro muerto' conserva la literalidad y la fuerza del desprecio sin suavizar la imagen.
- source_word: פַּרְעֹשׁ אֶחָד
  english_pob_choice: a single flea
  chosen_spanish: una sola pulga
  alternatives_spanish:
  - una pulga
  - una única pulga
  lexicon: HALOT
  rationale: '''Una sola pulga'' comunica mejor que ''una pulga'' el énfasis de אֶחָד y mantiene el contraste de insignificancia buscado por el hebreo.'
- source_word: אַחֲרֵי ... אַחֲרֵי ... אַחֲרֵי
  english_pob_choice: After ... Whom ... After ... after ...
  chosen_spanish: Tras ... ¿Tras ...? ... Tras ... tras ...
  alternatives_spanish:
  - Después de ... ¿Después de ...? ... Después de ... después de ...
  lexicon: HALOT
  rationale: La repetición de אַחֲרֵי crea cadencia y sarcasmo. Se conserva con 'Tras' para sostener el paralelismo verbal y la intensidad retórica del hebreo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el último ajuste del auditorio inglés, que reforzó la repetición de 'After whom' en ambas preguntas. También conserva la cadena enfática final 'a dead dog... a single flea' sin suavizarla ni convertirla en paráfrasis.
  spanish_consistency_notes:
  - Se mantiene 'rey de Israel' de forma uniforme como título formal.
  - Se preserva 'perseguir' para רדף y no se sustituye por 'cazar' o 'ir tras' para evitar perder la hostilidad del contexto.
  - La repetición de 'Tras' al inicio de cada cola reproduce el ritmo interrogativo del hebreo.
  - '''Perro muerto'' y ''pulga'' se dejan literales por tratarse de expresiones de autohumillación e insignificancia ampliamente transparentes en español.'
