translation:
  language: es
  text: Pero el alma que está afligida por su gran miseria[a], que anda encorvada y debilitada, y los ojos que se van apagando, y el alma que tiene hambre, te darán gloria y rectitud[b], oh, Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la magnitud de su aflicción». La frase griega es condensada y puede referirse más literalmente a «la grandeza» de la aflicción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te darán gloria y justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - persona
  - ser
  lexicon: BDAG
  rationale: En español, 'alma' conserva el valor interior y personal repetido en el paralelismo poético del versículo. 'Persona' suavizaría demasiado la imagen; 'vida' no recoge bien la dimensión afectiva y orante.
- source_word: λυπουμένη
  english_pob_choice: is grieved
  chosen_spanish: está afligida
  alternatives_spanish:
  - está entristecida
  - está dolida
  - se lamenta
  lexicon: BDAG
  rationale: La forma participial expresa un estado continuo de dolor o aflicción. 'Está afligida' es natural en español y mantiene el peso emocional sin volverlo demasiado interpretativo.
- source_word: ἐπὶ τὸ μέγεθος
  english_pob_choice: over its great misery
  chosen_spanish: por su gran miseria
  alternatives_spanish:
  - por la magnitud de su aflicción
  - a causa de su grandeza
  - por su gran aflicción
  lexicon: BDAG
  rationale: La frase griega es comprimida y el contexto inmediato habla de debilidad, hambre y ojos que fallan. En español, 'por su gran miseria' comunica la idea de la aflicción intensa sin perder la tensión léxica del original.
- source_word: βαδίζει
  english_pob_choice: goes about
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - va
  - se mueve
  lexicon: BDAG
  rationale: '''Anda'' reproduce el sentido de ir de un lado a otro en una condición permanente y suena más natural en este lamento que un ''camina'' más literal.'
- source_word: κύπτον
  english_pob_choice: bent over
  chosen_spanish: encorvada
  alternatives_spanish:
  - inclinada
  - agachada
  - doblada
  lexicon: LSJ
  rationale: El participio describe una postura física de abatimiento; 'encorvada' conserva la imagen corporal y sugiere también quebranto interior.
- source_word: ἀσθενοῦν
  english_pob_choice: weak
  chosen_spanish: debilitada
  alternatives_spanish:
  - débil
  - enferma
  - flaqueante
  lexicon: BDAG
  rationale: '''Debilitada'' expresa el estado de desgaste y falta de fuerzas sin restringir indebidamente el sentido a enfermedad clínica.'
- source_word: οἱ ὀφθαλμοὶ οἱ ἐκλείποντες
  english_pob_choice: the eyes that are failing
  chosen_spanish: los ojos que se van apagando
  alternatives_spanish:
  - los ojos que fallan
  - los ojos que se debilitan
  - los ojos que se extinguen
  lexicon: LSJ
  rationale: '''Se van apagando'' comunica bien la idea de ojos que pierden vigor o luz por agotamiento. En español mantiene la imagen progresiva del participio.'
- source_word: ἡ ψυχὴ ἡ πεινῶσα
  english_pob_choice: the soul that is hungry
  chosen_spanish: el alma que tiene hambre
  alternatives_spanish:
  - el alma hambrienta
  - el alma que está hambrienta
  - el alma que padece hambre
  lexicon: BDAG
  rationale: Mantengo la repetición de 'alma' y la imagen concreta de hambre. 'Tiene hambre' es más idiomático que 'hambrienta' en un paralelismo orante y no altera el sentido.
- source_word: δώσουσίν σοι δόξαν
  english_pob_choice: will give you glory
  chosen_spanish: te darán gloria
  alternatives_spanish:
  - te ofrecerán gloria
  - te atribuirán gloria
  - te darán honor
  lexicon: BDAG
  rationale: Conserva la relación verbal directa entre el sujeto plural y Dios, y suena natural en español. 'Gloria' mantiene el registro cultual del texto.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - righteousness
  lexicon: BDAG
  rationale: Aunque el proyecto suele favorecer 'justicia' / 'rectitud' según contexto, aquí el paralelismo con 'gloria' y la posible alabanza a la conformidad de Dios con el bien hace que 'justicia' sea una buena opción española y preserve la alternativa anotada por el POB inglés.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Como vocativo dirigido a Dios, 'Señor' es la forma española más estable y reverente. En este cierre orante, su función litúrgica es clara.
theological_decisions:
- issue: Cómo traducir δικαιοσύνην en una súplica dirigida a Dios
  english_pob_reading: righteousness, with an alternative footnote 'justice'
  chosen_spanish_reading: justicia, con alternativa posible 'rectitud'
  alternative_spanish_readings:
  - rectitud
  - justicia divina
  rationale: El inglés POB conserva 'righteousness' en el texto y anota 'justice' como alternativa. En español, 'justicia' es una traducción legítima y natural para δικαιοσύνη en este contexto de alabanza/súplica; 'rectitud' queda como matiz posible, pero 'justicia' preserva mejor la equivalencia del par honor-justicia sin forzar el vocabulario.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; ''justice'' preserved as alternative where context allows'
translation_notes:
  revision_awareness: Se revisó la opción de κύριε como 'Señor' por tratarse de vocativo divino en oración, y se mantuvo la duplicación de ψυχή para conservar el paralelismo poético. La decisión sobre δικαιοσύνην sigue la alternativa española más natural ('justicia'), dejando abierta la matización de 'rectitud' en la nota.
  spanish_consistency_notes:
  - Se conservó 'alma' para ψυχή de forma consistente con el tono poético y lamentativo.
  - Se evitó 'SEÑOR' en mayúsculas de convención; el vocativo se normalizó como 'Señor'.
  - La sintaxis mantiene la acumulación de participios y relativas del griego sin volverla artificial en español.
  - Se usó 'gloria y justicia' para reflejar la alternativa auditada del POB y el rango semántico de δικαιοσύνη.
