translation:
  language: es
  text: ¡Reúnanse, sí, reúnanse, nación desvergonzada[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «nación no deseada» o «nación sin anhelo». El hebreo es difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְקוֹשְׁשׁוּ
  english_pob_choice: Gather yourselves together
  chosen_spanish: Congregaos y reuníos
  alternatives_spanish:
  - Reuníos
  - Juntaos
  - Agrupaos
  lexicon: HALOT
  rationale: El imperativo reflexivo en hebreo llama a la asamblea del pueblo; en español, «congregaos» y «reuníos» conservan el carácter exhortativo y comunitario sin perder el matiz de auto-convocación. Se evita una traducción mecánica que sugiera recoger paja, porque el contexto profético exige una llamada a juntarse.
- source_word: וָקֹשּׁוּ
  english_pob_choice: yes, gather
  chosen_spanish: y reuníos
  alternatives_spanish:
  - sí, reuníos
  - y congregaos
  - y juntaos
  lexicon: HALOT
  rationale: La segunda forma intensifica y repite la primera; el español puede reproducir esa insistencia con otra orden coordinada. Se mantiene la repetición de la exhortación sin introducir un énfasis ajeno al tono profético.
- source_word: הַגּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: «Nación» preserva mejor el valor colectivo y público del vocativo profético, y coincide con la decisión inglesa auditada.
- source_word: לֹא נִכְסָף
  english_pob_choice: shameless
  chosen_spanish: no deseada
  alternatives_spanish:
  - sin deseo
  - no anhelada
  - despreciada
  lexicon: HALOT
  rationale: El hebreo es difícil. Para el texto principal se opta por una versión más literal y sobria, «no deseada», que conserva la negación y el sentido básico de «no deseada / no anhelada» sin borrar la tensión semántica documentada en el audit trail. La alternativa interpretativa «shameless» del inglés queda representada en la nota.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue el mismo juicio general del auditor inglés, pero opta por una solución española más literal en la última expresión para no eliminar la ambigüedad hebrea documentada.
  spanish_consistency_notes:
  - Se conserva el tono profético breve e imperativo.
  - Se mantiene el vocativo directo con coma antes de «nación» por claridad en español.
  - La nota al pie preserva la dificultad del hebreo y la alternativa literal documentada en el POB inglés.
