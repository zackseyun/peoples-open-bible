translation:
  language: es
  text: Y las aguas prevalecieron en gran manera sobre la tierra[a], y quedaron cubiertos todos los montes altos debajo de todos los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «territorio» para «tierra» (hebreo אָרֶץ), según cuán ampliamente se entienda el alcance del diluvio en contexto.
    reason: alternative_reading
  - marker: b
    text: O «bajo todo el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְרוּ
  english_pob_choice: prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - se impusieron
  - cobraron fuerza
  - fueron más poderosas
  lexicon: HALOT
  rationale: גבר expresa la idea de volverse fuerte, imponerse o prevalecer. «Prevalecieron» conserva la imagen de dominio de las aguas sobre la tierra y suena natural y elevado en español bíblico.
- source_word: מְאֹד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - sobremanera
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: La repetición intensifica el verbo. «Muchísimo» comunica bien la intensificación en español actual sin perder el valor enfático de «muy, muy»; «sobremanera» sería más solemne pero menos natural.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra/país
  - sobre la tierra habitada
  - sobre el mundo
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/territorio». Dado el contexto inmediato del diluvio y la amplitud universal sugerida por «debajo de todos los cielos», «tierra» mantiene la tensión sin decidir de forma excesiva por una lectura geográfica moderna.
- source_word: וַיְכֻסּוּ
  english_pob_choice: were covered
  chosen_spanish: fueron cubiertos
  alternatives_spanish:
  - quedaron cubiertos
  - se cubrieron
  - cubrieron
  lexicon: HALOT
  rationale: El pasivo español refleja bien el resultado sobre los montes. «Fueron cubiertos» preserva la fuerza del hebreo sin introducir un sujeto explícito que cambie el foco narrativo.
- source_word: כָּל הֶהָרִים הַגְּבֹהִים
  english_pob_choice: all the high mountains
  chosen_spanish: todos los montes altos
  alternatives_spanish:
  - todos los montes elevados
  - todas las montañas altas
  - todos los montes encumbrados
  lexicon: HALOT
  rationale: הָרִים puede abarcar montes o montañas. «Montes» es una opción bíblica clara y natural en español; «altos» conserva el adjetivo simple del hebreo, sin introducir una metáfora ajena.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  english_pob_choice: under all the heavens
  chosen_spanish: debajo de todos los cielos
  alternatives_spanish:
  - bajo todos los cielos
  - bajo todo el cielo
  - debajo del cielo entero
  lexicon: HALOT
  rationale: שָׁמַיִם es plural y puede traducirse «cielos». «Debajo de todos los cielos» mantiene el plural del hebreo y la amplitud universal de la expresión, evitando reducirla a una fórmula singularizada.
theological_decisions:
- issue: Alcance de אָרֶץ en el relato del diluvio
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - suelo
  - mundo
  rationale: El hebreo admite varias lecturas según el alcance del diluvio en contexto. «Tierra» conserva la amplitud del texto sin forzar una decisión interpretativa más estrecha; además, permite mantener la tensión señalada por la nota inglesa entre «earth» y «land».
  doctrine_reference: 'Translation philosophy: preserve textual scope and tension rather than collapsing it into one interpretive option'
- issue: Sentido universal de la frase final
  english_pob_reading: under all the heavens
  chosen_spanish_reading: debajo de todos los cielos
  alternative_spanish_readings:
  - bajo todo el cielo
  - debajo del cielo entero
  rationale: La forma plural hebrea de שָׁמַיִם sugiere conservar «cielos» en español. Esto mantiene la resonancia de alcance universal sin perder la literalidad del plural.
  doctrine_reference: Source-language primacy; preserve morphology where it carries meaning
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene una revisión menor en la adverbialidad intensiva: pasó de una paráfrasis distributiva («more and more») a una forma más natural y formal («exceedingly»). En español, «muchísimo» sigue esa decisión de intensidad compacta y evita una acumulación adverbial poco idiomática. También se preservó la nota de alcance para אָרֶץ y la alternativa lexical para la expresión final.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita explícita de κύριος.
  - «Tierra» se usó como equivalente general de אָרֶץ, con nota de alcance interpretativo.
  - «Cielos» conserva el plural hebreo de שָׁמַיִם.
  - La voz pasiva en español («fueron cubiertos») reproduce el resultado del hebreo sin forzar un sujeto expreso.
  - «Montes» se eligió por naturalidad bíblica y registro, aunque «montañas» sigue siendo una alternativa viable.
