  source_alignment_summary: 'El borrador refleja bien el paralelismo hebreo y las decisiones léxicas principales: כְּבֹד = «gloria», אֱלֹהִים = «Dios», הַסְתֵּר = «ocultar», דָּבָר = «asunto», מְלָכִים = «reyes», חֲקֹר = «escudriñar». También preserva correctamente la coordinación de los dos hemistiquios sin imponer contraste teológico extra. Sin embargo, la formulación nominal «Gloria de Dios es...» suena menos natural en español que una estructura con artículo y verbo copulativo explícito, y conviene alinear mejor las notas con los dos puntos léxicos reales del inglés POB.'
  spanish_quality_summary: 'El español es comprensible y digno, pero algo rígido. «La gloria de Dios es ocultar un asunto» y «la gloria de los reyes es escudriñar un asunto» suena más natural y completo en español culto y mantiene el tono proverbial. Además, las notas deben anclarse de manera más clara: una para «gloria» y otra para el par verbal «ocultar/escudriñar», en vez de dejar la primera nota solo sobre «asunto».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» es correcto para אֱלֹהִים en este contexto. «Gloria» concuerda con la decisión auditada, con «honor» como alternativa válida en nota. «Escudriñar» es aceptable y fiel para חֲקֹר, aunque más elevado; aquí funciona bien en registro bíblico legible. «Asunto» conserva adecuadamente דָּבָר en ambos hemistiquios.
  issues:
  - severity: medium
    issue: La sintaxis inicial «Gloria de Dios es...» es poco idiomática en español.
    rationale: Aunque entendible, omite artículos donde el español proverbial normalmente los espera. «La gloria de Dios es...» mejora naturalidad y legibilidad sin alejarse del hebreo.
  - severity: medium
    issue: La distribución de las notas no refleja bien las alternativas del inglés POB.
    rationale: La nota sobre «honor» debe anclarse en «gloria», no en «asunto». La otra nota cubre las alternativas verbales «hide/investigate», por lo que conviene anclarla en el segmento verbal correspondiente.
  revised_spanish_text: La gloria[a] de Dios es ocultar un asunto[b], y la gloria[a] de los reyes es escudriñar un asunto[b].
  revised_footnotes:
  - marker: a
    text: O «honor» en ambos hemistiquios.
    reason: lexical_alternative
  - marker: b
    text: O «esconder un asunto» y «investigar un asunto».
    reason: lexical_alternative
  revision_rationale: 'La revisión hace el español más natural y completo mediante el uso de artículos, sin alterar el sentido ni el paralelismo del hebreo. También recoloca las notas para que correspondan exactamente a las decisiones léxicas documentadas en el POB inglés: «gloria/honor» y «ocultar-escudriñar» con sus alternativas.'
