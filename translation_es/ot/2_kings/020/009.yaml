translation:
  language: es
  text: 'Entonces Isaías dijo: «Esta será para ti la señal[a] de parte de Yahvé: que Yahvé hará lo que ha dicho. ¿Avanzará la sombra diez pasos, o retrocederá diez pasos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «diez grados». El hebreo literalmente significa «pasos» o «escalones», pero tradicionalmente se ha traducido «grados» en este contexto por el movimiento de la sombra en el dispositivo asociado con Acaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - la prueba
  - el signo
  lexicon: HALOT
  rationale: אוֹת denota un signo confirmatorio. En español, «señal» es natural, claro y mantiene el sentido de confirmación milagrosa para Ezequías.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: La expresión marca origen o procedencia. Según la terminología base del proyecto, יְהוָה se traduce «Yahvé» y no se enmascara como «SEÑOR».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de la señal; en español, «de que» funciona de modo natural después de «la señal» y conserva la función explicativa del hebreo.
- source_word: יַעֲשֶׂה יְהוָה אֶת הַדָּבָר אֲשֶׁר דִּבֵּר
  english_pob_choice: will do the thing that he has spoken
  chosen_spanish: Yahvé hará la cosa que ha dicho
  alternatives_spanish:
  - Yahvé cumplirá lo que ha dicho
  - Yahvé hará la palabra que ha hablado
  lexicon: HALOT
  rationale: דָּבָר puede ser «cosa», «asunto» o «palabra». En este contexto de cumplimiento concreto, «la cosa que ha dicho» conserva la referencia a un acto prometido sin sonar forzado en español.
- source_word: הָלַךְ הַצֵּל
  english_pob_choice: shall the shadow go forward
  chosen_spanish: ¿avanzará la sombra
  alternatives_spanish:
  - ¿irá hacia adelante la sombra
  - ¿seguirá adelante la sombra
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma perfecta, en esta pregunta de opción funciona idiomáticamente como propuesta de movimiento. «Avanzará» expresa bien el desplazamiento de la sombra.
- source_word: מַעֲלוֹת
  english_pob_choice: steps
  chosen_spanish: pasos
  alternatives_spanish:
  - grados
  - escalones
  lexicon: HALOT
  rationale: La palabra designa literalmente escalones o pasos. En español, «pasos» preserva la imagen de movimiento y evita la interpretación técnica de «grados» como medida abstracta.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - o si
  lexicon: HALOT
  rationale: En esta pregunta disyuntiva, «o» expresa de manera natural la alternativa entre dos movimientos posibles.
- source_word: יָשׁוּב
  english_pob_choice: shall it turn back
  chosen_spanish: retrocederá
  alternatives_spanish:
  - volverá atrás
  - se volverá
  lexicon: HALOT
  rationale: שׁוּב significa volver o retroceder. «Retrocederá» es idiomático en español y conserva la idea de inversión del movimiento de la sombra.
theological_decisions:
- issue: Nombre divino יהוה en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El proyecto exige representar el Tetragrámaton con «Yahvé» en el texto principal. Esto preserva la identidad del nombre divino y evita la convención de sustitución por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La fuente auditada coincide ampliamente con la traducción inglesa POB y no presenta cambios de revisión relevantes; se conserva la decisión léxica principal para מַעֲלוֹת como término de movimiento concreto, con nota alternativa tradicional para «grados».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - «Señal» se usa para אוֹת con sentido confirmatorio, en línea con el contexto narrativo.
  - «Pasos» traduce מַעֲלוֹת para conservar la imagen física de la sombra y su desplazamiento.
