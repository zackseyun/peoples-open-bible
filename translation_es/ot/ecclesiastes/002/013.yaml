  glossary_alignment: No hay conflicto con la terminología del proyecto. «Sabiduría», «necedad», «luz» y «oscuridad» son adecuados. «Ventaja» sigue correctamente la decisión léxica documentada para יתרון, con nota que preserva «provecho» y «ganancia».
