  source_alignment_summary: 'El borrador capta bien la estructura proverbial y las decisiones léxicas principales del griego: ἀπὸ como origen (''de''), ἀκαθάρτου como abstracto sustantivado (''lo impuro''), ψευδοῦς como abstracto (''la falsedad''), y ἀληθεύσει con sentido resultativo. Sin embargo, ''podrá ser hecho limpio'' y ''podrá volverse verdadero'' introducen un matiz de posibilidad (''podrá'') que no está en el futuro griego; el verso pregunta qué llegará a resultar, no qué podría resultar. Conviene reflejar el futuro/resultado de modo más directo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'ser hecho limpio' suena algo forzado en español natural, y 'volverse verdadero' es entendible aunque menos idiomático que una formulación más directa. Una leve revisión mejora fluidez sin perder el paralelismo ni la lógica proverbial.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. Las elecciones 'lo impuro' y 'la falsedad' están bien alineadas con el razonamiento léxico documentado. La nota sobre 'lo inmundo' como alternativa es adecuada. Solo debe ajustarse la expresión verbal para evitar el matiz modal no presente en el griego.
  issues:
  - severity: medium
    issue: Se añadió un matiz modal con 'podrá' en ambas cláusulas.
    rationale: καθαρισθήσεται y ἀληθεύσει son futuros, no potenciales. El español debe expresar resultado futuro/rhetórico, no mera posibilidad.
  - severity: low
    issue: '''ser hecho limpio'' suena poco natural en español bíblico contemporáneo.'
    rationale: Aunque refleja el pasivo, resulta más idiomático 'será limpiado' o 'llegará a ser limpio'. Dado el contexto no ritual, 'llegará a ser limpio' conserva mejor el valor resultativo sin tecnicismo innecesario.
  - severity: low
    issue: '''volverse verdadero'' es menos natural que una alternativa más directa.'
    rationale: Para ἀληθεύσει con sentido resultativo, 'llegará a ser verdadero' o 'resultará verdadero' suenan más claros en español y preservan la lógica paralela del proverbio.
