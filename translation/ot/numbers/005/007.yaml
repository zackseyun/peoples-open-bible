theological_decisions:
- issue: Meaning of אָשָׁם in a restitution context
  chosen_reading: non-sacrificial guilt/liability leading to restitution
  alternative_readings:
  - guilt offering
  rationale: The immediate context concerns confession, repayment of the principal, and addition of one-fifth to the injured party. This indicates civil/cultic liability expressed through restitution, not the sacrificial offering itself. The translation therefore avoids importing sacrificial terminology not demanded by this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve source-text plain sense.'
