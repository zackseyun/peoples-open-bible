review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: imperativo de petición («Da»), μισθὸν como «recompensa», εἰσάκουσον…δεήσεως como «Escucha… la oración», y τῶν ἱκετῶν σου como «de tus suplicantes». También preserva correctamente la ambigüedad de τοῖς ὑπομένουσίν σε mediante nota. Sin embargo, ἐμπιστευθήτωσαν en el texto principal queda mejor alineado con el inglés auditado y con el pasivo del griego si se traduce «que se confíe en tus profetas» o «que tus profetas sean creídos», no «que tus profetas sean confiables», que desplaza el foco hacia una cualidad intrínseca más que hacia el acto pasivo de recibir confianza.'
  spanish_quality_summary: El español es claro, digno y generalmente natural. «Da una recompensa… Escucha, Yahvé…» funciona bien. La principal mejora necesaria es estilístico-semántica en «que tus profetas sean confiables», que en español suena algo evaluativo y menos natural en una súplica que pide vindicación o recepción de los profetas. «Que se confíe en tus profetas» suena más idiomático y refleja mejor el valor pasivo.
  glossary_alignment: 'Buen ajuste al glosario del proyecto: «Yahvé» para la apelación divina, «Dios» no aparece, y no hay conflictos terminológicos mayores. La elección «esperan en ti» es aceptable, aunque el matiz más literal del inglés sería «esperan en ti/te esperan»; la nota ya cubre las alternativas. El punto a corregir es ἐμπιστευθήτωσαν: el borrador se aparta de la revisión inglesa final («be trusted») al preferir «sean confiables».'
  issues:
  - severity: medium
    issue: «que tus profetas sean confiables» no refleja óptimamente el pasivo de ἐμπιστευθήτωσαν
    rationale: El griego y la revisión inglesa final favorecen el sentido de recibir confianza o ser creídos/trusted. «Confiables» enfatiza una cualidad reconocida, posible pero menos directa y menos natural que una formulación pasiva en español.
  - severity: low
