source:
  edition: SBLGNT
  text: Νυνὶ δὲ Χριστὸς ἐγήγερται ἐκ νεκρῶν, ἀπαρχὴ τῶν ⸀κεκοιμημένων.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/020.yaml
  text: But now Messiah has been raised from the dead[c][b][a], the firstfruits of those who have fallen asleep.
  footnotes:
  - marker: a
    text: Or 'Christ has been raised from the dead.'
    reason: alternative_reading
  - marker: b
    text: '''Firstfruits'' evokes the first portion of a harvest offered to God, implying both priority and the guarantee of the full harvest to come.'
    reason: cultural_note
  - marker: c
    text: '''Those who have fallen asleep'' is a metaphor for the dead, especially in a resurrection context.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 이제 메시아께서 죽은 자들로부터 살아나셔서, 잠든 자들의 첫 열매가 되셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「첫 열매」는 추수의 첫 부분을 하나님께 드리는 구약 관습에서 온 표현으로, 우선성과 함께 「온전한 추수의 보증」을 함의한다.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπαρχὴ
  english_pob_choice: firstfruits
  chosen_korean: 첫 열매
  alternatives_korean:
  - 맏물
  - 초실
  lexicon: BDAG
  rationale: 글로사리 기본값.
- source_word: κεκοιμημένων
  english_pob_choice: those who have fallen asleep
  chosen_korean: 잠든 자들
  alternatives_korean:
  - 죽은 자들
  lexicon: BDAG
  rationale: 15:6과 일관.
theological_decisions:
- issue: 'ἀπαρχή(첫 열매)의 함의: 우선성 + 보증'
  chosen_reading: 잠든 자들의 첫 열매
  alternative_readings:
  - 잠자는 자들 중의 처음 익은 열매
  rationale: ἀπαρχή는 단순한 「먼저」가 아니라 「온전한 추수의 보증」이라는 구약적 함의를 갖는다. 본 절은 메시아의 부활이 잠든 모든 자들의 부활의 보증임을 천명한다. 「첫 열매」를 본문으로 두고 함의를 각주에 명시한다.
  doctrine_reference: 'DOCTRINE.md: preserve OT background imagery'
