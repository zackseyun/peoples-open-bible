    text: El hebreo זרה también puede traducirse como 'mujer ajena' o 'mujer extraña'; el griego paralelo dice 'mujer casada', lo que apoya el sentido más específico de la mujer de otro.
    reason: alternative_reading
  revision_rationale: Se corrige el verbo para que exprese 'mirar' en vez de 'apartar la mirada', se restituye 'rostro' conforme al hebreo y al griego paralelo, y se alinea el texto principal con la revisión auditada del inglés POB, dejando la especificación 'mujer casada/la mujer de otro' en nota en lugar del cuerpo del texto. 'Sirvienta' se mantiene por claridad y naturalidad.
