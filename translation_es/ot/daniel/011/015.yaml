base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/015.yaml
  text: Then the king of the north will come and heap up a siege ramp and capture a fortified city[a], and the forces of the south will not stand, nor his choice troops[b], for there will be no strength to stand.
  footnotes:
