    rationale: Los marcadores de nota deben aparecer exactamente en la palabra o frase pertinente. Tal como está, induce a error al lector y no cumple la disciplina de anclaje.
  - severity: low
    issue: «tú—oye» suena algo brusco en español
    rationale: El énfasis de σὺ puede mantenerse con «tú—escucha», que resulta más natural en oración sin perder fuerza.
