base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/010/038.yaml
  text: And we will bring the first of our dough[a], our contributions, the fruit of every tree, the new wine, and the oil to the priests, to the chambers of the house of our God, and the tithe of our land to the Levites; for they, the Levites[c][b], are the ones who collect the tithes in all the cities where we labor.
  footnotes:
  - marker: a
    text: Or 'our offerings'; the Hebrew term can denote a sacred contribution set apart for priestly use.
    reason: lexical_alternative
  - marker: b
    text: Or 'storerooms' for 'chambers.' The Hebrew refers to rooms in the temple complex, often used for storage.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all the cities of our service/work.' The Hebrew expression is somewhat compressed and may refer to the towns associated with the people's agricultural labor.
    reason: alternative_reading
