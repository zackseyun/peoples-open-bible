id: 2CH.22.1
reference: 2 Chronicles 22:1
source:
  edition: WLC
  text: וַ/יַּמְלִיכוּ֩ יוֹשְׁבֵ֨י יְרוּשָׁלִַ֜ם אֶת אֲחַזְיָ֨הוּ בְנ֤/וֹ הַ/קָּטֹן֙ תַּחְתָּ֔י/ו כִּ֤י כָל הָ/רִאשֹׁנִים֙ הָרַ֣ג הַ/גְּד֔וּד הַ/בָּ֥א בָֽ/עַרְבִ֖ים לַֽ/מַּחֲנֶ֑ה וַ/יִּמְלֹ֛ךְ אֲחַזְיָ֥הוּ בֶן יְהוֹרָ֖ם מֶ֥לֶךְ יְהוּדָֽה־־־׃פ
translation:
  text: Then the inhabitants of Jerusalem made Ahaziah[a], his youngest son, king in his place, because the raiding band that came with the Arabs into the camp had killed all the older sons. So Ahaziah son of Jehoram, king of Judah, became king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the troop that came among the Arabs into the camp.' The Hebrew phrase may be understood differently depending on how the preposition with 'Arabs' is taken.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלִיכוּ
  chosen: made ... king
  alternatives:
  - caused ... to reign
  - proclaimed ... king
  lexicon: HALOT
  rationale: Hiphil of מלך here denotes installing someone as king. 'Made ... king' is natural English and preserves the causative sense better than simply 'reigned.'
- source_word: יוֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those living in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The construct participle literally means 'the dwellers of Jerusalem.' 'Inhabitants' is idiomatic and suitably formal.
- source_word: בְנוֹ הַקָּטֹן
  chosen: his youngest son
  alternatives:
  - his youngest child
  - his small/young son
  lexicon: HALOT
  rationale: Though קטן literally means 'small' or 'young,' in contrast with 'all the older sons' later in the verse it clearly means the youngest among the sons.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition indicates succession/substitution. 'In his place' is the most natural expression for royal succession here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason Ahaziah was made king.
- source_word: כָל הָרִאשֹׁנִים
  chosen: all the older sons
  alternatives:
  - all the first ones
  - all the former ones
  - all the eldest
  lexicon: HALOT
  rationale: Literally 'all the first/earlier ones.' In context, referring to Jehoram's sons older than Ahaziah. Supplying 'sons' makes the referent explicit in English from the immediate context.
- source_word: הָרַג
  chosen: had killed
  alternatives:
  - killed
  - struck down
  lexicon: HALOT
  rationale: 'A past perfect fits the English sequence: the prior killing explains why Ahaziah was installed.'
- source_word: הַגְּדוּד
  chosen: the raiding band
  alternatives:
  - the troop
  - the band
  - the marauding band
  lexicon: HALOT
  rationale: גדוד often denotes a troop or raiding party. 'Raiding band' captures the military-plundering sense in this context.
- source_word: הַבָּא בָעַרְבִים
  chosen: that came with the Arabs
  alternatives:
  - that came among the Arabs
  - that came against the Arabs
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in an associative sense: the band came with the Arabs, as in the parallel context of invaders accompanying Arab groups.'
- source_word: לַמַּחֲנֶה
  chosen: into the camp
  alternatives:
  - to the camp
  - against the camp
  lexicon: HALOT
  rationale: Direction toward and entry into the camp is the likely sense in context of a raid.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: Summative notice of accession. 'Became king' avoids awkward repetition after 'made ... king' while preserving the accession sense.
- source_word: אֲחַזְיָהוּ בֶן יְהוֹרָם מֶלֶךְ יְהוּדָה
  chosen: Ahaziah son of Jehoram, king of Judah
  alternatives:
  - Ahaziah the son of Jehoram king of Judah
  lexicon: HALOT
  rationale: The appositional phrase identifies Ahaziah by lineage and kingdom. The punctuation clarifies that Jehoram is the king of Judah.
