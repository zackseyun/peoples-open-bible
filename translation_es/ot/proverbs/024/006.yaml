review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: כִּי como causal, תַּעֲשֶׂה ... מִלְחָמָה como modismo de hacer/guerrear, y וּתְשׁוּעָה como «victoria» en contexto militar. Sin embargo, «prudentes estrategias» desplaza el matiz de תַּחְבֻּלוֹת desde guía/consejo estratégico hacia planes en sí mismos, y «harás guerra» suena poco natural en español bíblico actual. También «está en la abundancia de consejeros» es entendible, pero algo rígido.'
  spanish_quality_summary: 'El español es claro, pero tiene dos puntos mejorables para legibilidad natural y digna: «con prudentes estrategias» suena algo técnico/pluralizado, y «harás guerra» resulta poco idiomático. Una formulación como «con sabia estrategia harás la guerra» conserva mejor el sentido y suena más natural. El resto es sólido, incluyendo «la victoria» y «consejeros».'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión «victoria» para תְשׁוּעָה concuerda con la justificación auditada. «Consejeros» representa bien el valor colectivo de רֹב יוֹעֵץ. La principal desviación está en תַּחְבֻּלוֹת: el inglés auditado privilegia «wise guidance», y en español conviene mantener más claramente el matiz de guía/estrategia sabia, no solo «estrategias».'
  issues:
  - severity: medium
    issue: «con prudentes estrategias» no preserva del todo el matiz de guía/consejo estratégico de בְתַחְבֻּלוֹת
    rationale: El hebreo denota dirección hábil, táctica o guía estratégica; «estrategias» solo capta el plan, no tan claramente la conducción o el consejo. «Sabia estrategia» o «sabia guía» se acerca mejor al expediente inglés y al campo semántico.
  - severity: medium
    issue: «harás guerra» es una expresión poco natural en español actual
    rationale: Aunque reproduce de cerca el modismo hebreo, en español suena dura y poco idiomática. «Harás la guerra» conserva la literalidad básica y mejora mucho la legibilidad sin añadir un posesivo no presente en el original.
  - severity: low
    issue: «está en la abundancia de consejeros» es algo rígido
    rationale: La frase es fiel, pero puede sonar calcada. No obstante, sigue siendo aceptable y cercana al POB; no requiere más cambio que mantenerla o, alternativamente, «está en muchos consejeros». Se prefiere conservar la estructura auditada.
  revised_spanish_text: Porque con sabia estrategia[a] harás la guerra, y la victoria[b] está en la abundancia de consejeros.
  revised_footnotes:
  - marker: a
    text: O «con estrategia» o «con sabia guía»; el hebreo se refiere a dirección hábil y planeación táctica.
    reason: lexical_alternative
  - marker: b
    text: O «liberación»; en este contexto bélico, el hebreo apunta más específicamente a «victoria».
    reason: lexical_alternative
