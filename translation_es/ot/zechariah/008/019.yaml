    reason: lexical_alternative
  - marker: c
    text: «Fiestas establecidas» traduce un término que suele referirse a tiempos fijados o festividades establecidas, especialmente observancias sagradas.
    reason: cultural_note
  revision_rationale: 'La revisión es pequeña pero necesaria para alinear el español con la decisión auditada del POB y con sus notas: se cambia «será» por «llegará a ser» para reflejar el matiz transformativo contextual y hacer que la nota [b] funcione correctamente como alternativa; se repite «mes» por claridad y simetría; y se sustituye «fiestas señaladas» por «fiestas establecidas» para una expresión más natural y cultualmente precisa en español.'
