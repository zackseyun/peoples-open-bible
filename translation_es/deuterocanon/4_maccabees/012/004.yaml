translation:
  language: es
  text: Ves el desenlace[a] de la locura de tus hermanos; pues por desobediencia fueron torturados[b] y han muerto. Pero tú, si no obedeces[c], también tú morirás antes de tiempo, después de ser miserablemente torturado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fin» o «resultado» de la locura de tus hermanos.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede referirse más específicamente a ser puestos en el potro de tortura.
    reason: cultural_note
  - marker: c
    text: O «si no eres persuadido»; aquí el sentido es la obediencia práctica, por eso se traduce «obedeces».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπονοίας
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - insensatez
  - necedad
  - demencia
  lexicon: LSJ
  rationale: En este contexto de reproche hostil, ἀπονοίας expresa juicio severo sobre la conducta de los hermanos. 'Locura' conserva ese tono condenatorio en español sin volver el texto más técnico de lo que permite el griego.
- source_word: τὸ τέλος
  english_pob_choice: the outcome
  chosen_spanish: el desenlace
  alternatives_spanish:
  - el fin
  - el resultado
  lexicon: LSJ
  rationale: La frase apunta a lo que les ha ocurrido como consecuencia de su conducta. 'Desenlace' comunica consecuencia y conclusión de manera natural en español, manteniendo la ambigüedad útil entre fin y resultado.
- source_word: ἀπείθειαν
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - falta de obediencia
  - rechazo a obedecer
  - incredulidad
  lexicon: BDAG
  rationale: El contexto causal contrasta la negativa de los hermanos con la respuesta exigida al destinatario. 'Desobediencia' es el equivalente directo y transparente en español.
- source_word: στρεβλωθέντες
  english_pob_choice: have been tortured
  chosen_spanish: fueron torturados
  alternatives_spanish:
  - fueron puestos en el potro
  - fueron quebrantados con tormento
  - fueron racked
  lexicon: LSJ
  rationale: El verbo puede aludir específicamente al potro de tortura, pero el sentido general de padecimiento violento es claro. En el cuerpo principal, 'torturados' preserva la referencia sin forzar un instrumento técnico; la nota aclara la posibilidad del potro.
- source_word: τεθήκασιν
  english_pob_choice: have died
  chosen_spanish: han muerto
  alternatives_spanish:
  - están muertos
  - han sido puestos a muerte
  lexicon: LSJ
  rationale: El perfecto expresa el estado resultante de la muerte. 'Han muerto' es la forma más natural y explícita en español.
- source_word: πεισθείης
  english_pob_choice: obey
  chosen_spanish: te dejas persuadir
  alternatives_spanish:
  - obedeces
  - cedas
  - te persuadas
  lexicon: BDAG
  rationale: El griego dice literalmente 'ser persuadido', pero en este contexto coercitivo la obediencia práctica es la fuerza del verbo. 'Te dejas persuadir' conserva el matiz literal y el valor pragmático exigido por el contexto.
- source_word: ταλαί
  english_pob_choice: miserably
  chosen_spanish: miserablemente
  alternatives_spanish:
  - desdichadamente
  - míseramente
  - pobre de ti
  lexicon: LSJ
  rationale: La forma intensifica la condición del que sufre y tiene tono de compasión o desprecio. 'Miserablemente' permite mantener esa intensificación en castellano.
- source_word: βασανισθεὶς
  english_pob_choice: after being miserably tortured
  chosen_spanish: después de ser miserablemente torturado
  alternatives_spanish:
  - tras ser atormentado miserablemente
  - después de sufrir tortura
  - tras ser torturado
  lexicon: BDAG
  rationale: El participio indica padecer tormento severo. Un giro temporal con 'después de ser' reproduce la relación participial y conserva la intensidad.
- source_word: πρὸ ὥρας
  english_pob_choice: before your time
  chosen_spanish: antes de tiempo
  alternatives_spanish:
  - prematuramente
  - antes de tu hora
  - antes de la hora
  lexicon: LSJ
  rationale: La expresión idiomática apunta a una muerte prematura. 'Antes de tiempo' es natural en español y mantiene el valor idiomático sin añadir precisión inexistente.
theological_decisions:
- issue: Matiz exhortativo de πεισθείης en un contexto de coerción
  english_pob_reading: '''If you do not obey'' captures the practical force of the verb, though the Greek literally says ''be persuaded.'''
  chosen_spanish_reading: '''si no te dejas persuadir'' conserva el verbo de persuasión y su fuerza pragmática de sumisión práctica.'
  alternative_spanish_readings:
  - si no obedeces
  - si no cedes
  - si no te persuades
  rationale: En español, 'obedecer' comunica bien el sentido, pero borraría la tensión entre persuasión y coerción presente en el griego. 'Te dejas persuadir' mantiene esa ambivalencia y deja visible la elección léxica del original.
  doctrine_reference: Preservar la tensión léxica original sin resolverla prematuramente; primacía del griego sobre la simplificación devocional.
- issue: Rhetorical condemnation of the brothers' conduct
  english_pob_reading: '''madness'' preserves the tyrant''s hostile rhetoric without endorsing it narratively.'
  chosen_spanish_reading: '''locura'' mantiene la evaluación áspera del hablante sin suavizarla a una neutralidad interpretativa.'
  alternative_spanish_readings:
  - insensatez
  - necedad
  - demencia
  rationale: La escena es discurso hostil directo. La traducción debe conservar el tono acusatorio del hablante y no convertirlo en una descripción neutra del narrador.
  doctrine_reference: Mantener la tensión retórica del texto fuente y no borrar la perspectiva del hablante.
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Swete y con el audit trail inglés: se mantuvo la evaluación hostil de ἀπονοίας, la causalidad de ἀπείθειαν, la intensidad de στρεβλωθέντες/βασανισθείς, y la ambigüedad pragmática de πεισθείης mediante una solución española que conserva persuasión y obediencia. No se introdujeron cambios textuales respecto del pasaje base.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en este texto.
  - Se prefirió una sintaxis española natural sin perder la secuencia semántica de las participios griegos.
  - Se conservaron las notas de alternativa donde el español podía ocultar una ambigüedad relevante del original.
