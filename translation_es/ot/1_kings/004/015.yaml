translation:
  language: es
  text: Ahimaás[a], en Neftalí; él también tomó a Basemat, la hija de Salomón[b], como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Neftalí» o «para Neftalí»; la preposición hebrea puede señalar el territorio asignado a Ahimaás en esta lista de oficiales de distrito.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tomó a Basemat, hija de Salomón, como esposa», un modismo estándar que significa que se casó con ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִימַעַץ
  english_pob_choice: Ahimaaz
  chosen_spanish: Ahimaaz
  alternatives_spanish:
  - Ahiماaz
  - Ajimaaz
  lexicon: HALOT
  rationale: Nombre propio; se translitera según la forma consagrada en español bíblico y en armonía con la convención del POB de conservar nombres propios sin traducirlos.
- source_word: בְּנַפְתָּלִי
  english_pob_choice: in Naphtali
  chosen_spanish: en Neftalí
  alternatives_spanish:
  - sobre Neftalí
  - para Neftalí
  lexicon: HALOT
  rationale: La preposición בְ con un nombre tribal/geográfico puede indicar la esfera o territorio asignado. 'En Neftalí' preserva el valor locativo de manera natural en español, sin decidir más de lo que exige el hebreo.
- source_word: גַּם הוּא
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - y él también
  lexicon: HALOT
  rationale: La partícula aditiva intensifica la inclusión de Ahimaaz en la lista de oficiales. 'Él también' conserva ese matiz de adición de forma clara y idiomática.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - tomó por esposa
  lexicon: HALOT
  rationale: El verbo es literalmente 'tomó', y en esta construcción matrimonial el sentido es que contrajo matrimonio. 'Tomó ... como esposa' mantiene la expresión hebrea con claridad y sin perder el valor idiomático.
- source_word: בָּשְׂמַת
  english_pob_choice: Basemath
  chosen_spanish: Basemat
  alternatives_spanish:
  - Basemat
  - Basmat
  lexicon: HALOT
  rationale: Nombre propio femenino; se translitera al español con una forma legible y consistente. 'Basemat' refleja bien la vocalización habitual sin introducir traducción.
- source_word: בַּת שְׁלֹמֹה
  english_pob_choice: daughter of Solomon
  chosen_spanish: la hija de Salomón
  alternatives_spanish:
  - hija de Salomón
  - la hija de Salomón
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación directa. El artículo definido ayuda a la fluidez del español y corresponde a la revisión inglesa más natural del texto auditado.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - para esposa
  - a mujer
  lexicon: HALOT
  rationale: Es un modismo matrimonial hebreo. 'Como esposa' comunica el valor de complemento de matrimonio de forma sobria y fiel; evita la rigidez de una calca como 'para mujer'.
theological_decisions:
- issue: Expresión matrimonial idiomática en לָקַח ... לְאִשָּׁה
  english_pob_reading: '''took ... as a wife'' as a standard idiom meaning he married her'
  chosen_spanish_reading: '''tomó ... como esposa'' como modismo que indica matrimonio'
  alternative_spanish_readings:
  - '''se casó con ...'''
  - '''tomó por esposa'''
  rationale: El hebreo usa el verbo 'tomar' con complemento de 'esposa' para expresar matrimonio. La traducción conserva el giro semítico sin ocultar el hecho matrimonial; así se mantiene la tensión entre literalidad y claridad.
  doctrine_reference: Ninguna; decisión idiomática y narrativa, no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la revisión inglesa auditada que separa mejor la aposición en 'la hija de Salomón' y mantiene el modismo matrimonial con claridad. Se conservó el valor locativo de בְנַפְתָּלִי sin forzar una interpretación administrativa explícita en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Neftalí' como forma española bíblica estándar para el tribu/lugar.
  - Se usa 'Basemat' para el nombre propio, manteniendo transliteración consistente.
  - Se evita 'SEÑOR' o equivalentes porque no hay tetragrámaton en este versículo.
  - Se mantiene el orden simple de la cláusula para reflejar la lista administrativa del contexto inmediato.
