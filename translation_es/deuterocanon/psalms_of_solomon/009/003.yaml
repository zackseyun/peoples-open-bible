translation:
  language: es
  text: para que seas vindicado[a], oh Dios, en tu rectitud[b] en medio de nuestros actos de iniquidad;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seas justificado, oh Dios».
    reason: lexical_alternative
  - marker: b
