revisions:
- from: Araunah se asomó y vio al rey y a sus servidores pasando junto a él[a]. Entonces Araunah salió y se inclinó ante el rey con el rostro en tierra.
  to: Araunah se asomó y vio al rey y a sus siervos pasando ante él[a]. Entonces Araunah salió y se inclinó ante el rey con el rostro en tierra.
  rationale: Se revisa «servidores» a «siervos» para seguir más de cerca la decisión léxica documentada para עֲבָדָיו. Se cambia «pasando junto a él» por «pasando ante él» para conservar mejor la ambigüedad del hebreo עֹבְרִים עָלָיו sin forzar la idea de mero sobrepaso lateral. La nota se simplifica para preservar la alternativa contextual documentada.
