id: GEN.47.17
reference: Genesis 47:17
source:
  edition: WLC
  text: וַ/יָּבִ֣יאוּ אֶת מִקְנֵי/הֶם֮ אֶל יוֹסֵף֒ וַ/יִּתֵּ֣ן לָ/הֶם֩ יוֹסֵ֨ף לֶ֜חֶם בַּ/סּוּסִ֗ים וּ/בְ/מִקְנֵ֥ה הַ/צֹּ֛אן וּ/בְ/מִקְנֵ֥ה הַ/בָּקָ֖ר וּ/בַ/חֲמֹרִ֑ים וַ/יְנַהֲלֵ֤/ם בַּ/לֶּ֨חֶם֙ בְּ/כָל מִקְנֵ/הֶ֔ם בַּ/שָּׁנָ֖ה הַ/הִֽוא־־־׃
translation:
  text: So they brought their livestock to Joseph[a], and Joseph gave them bread in exchange for the horses, the flocks, the herds, and the donkeys[b]; and he provided for them with bread in exchange for all their livestock during that year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he led them with bread.' The Hebrew verb can mean 'lead, guide, manage,' but here likely refers to sustaining or supplying them through the famine.
    reason: lexical_alternative
  - marker: b
    text: Or 'in exchange for all their livestock'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִקְנֵיהֶם / מִקְנֵהֶם
  chosen: their livestock / all their livestock
  alternatives:
  - their cattle
  - their property in animals
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired domestic animals/livestock broadly, not merely cattle. Rendering as 'livestock' fits both the initial summary and the concluding comprehensive phrase.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Though לֶחֶם can function more broadly as 'food,' the repeated term is literally 'bread' and in famine context can stand for grain-based sustenance. 'Bread' preserves the lexical form while remaining natural English.
- source_word: בַּסּוּסִים
  chosen: for the horses
  alternatives:
  - with the horses
  - in exchange for the horses
  lexicon: HALOT
  rationale: The preposition ב here marks the commodity given in exchange, not location or instrument. English requires an exchange sense; 'for the horses' is concise, while the full sentence clarifies the barter arrangement.
- source_word: מִקְנֵה הַצֹּאן
  chosen: the flocks
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: This construct refers to flock-animals collectively. 'Flocks' is idiomatic and preserves the collective sense better than the narrower 'sheep,' since צֹאן can include sheep and goats.
- source_word: מִקְנֵה הַבָּקָר
  chosen: the herds
  alternatives:
  - the cattle
  - the bovine livestock
  lexicon: HALOT
  rationale: This phrase refers to herd-animals, especially cattle. 'Herds' pairs naturally with 'flocks' and preserves the collective category.
- source_word: חֲמֹרִים
  chosen: the donkeys
  alternatives:
  - the asses
  lexicon: HALOT
  rationale: '''Donkeys'' is the clear modern English equivalent; ''asses'' is archaic and potentially distracting.'
- source_word: וַיְנַהֲלֵם
  chosen: he supplied them
  alternatives:
  - he led them
  - he sustained them
  - he guided them
  lexicon: HALOT
  rationale: From נהל, the verb can mean lead/manage/conduct. In this economic context, with bread as the means, the sense is that Joseph provisioned or sustained them through the year. 'He supplied them' captures the contextual force better than the overly literal 'led them.'
- source_word: בַּלֶּחֶם
  chosen: with bread
  alternatives:
  - by bread
  - with food
  lexicon: HALOT
  rationale: The preposition marks the means by which Joseph sustained them. 'With bread' is the most direct rendering and keeps the repeated noun visible.
- source_word: בְּכָל מִקְנֵהֶם
  chosen: in exchange for all their livestock
  alternatives:
  - for all their livestock
  - by means of all their livestock
  lexicon: HALOT
  rationale: The phrase summarizes the total barter transaction. Because English can sound ambiguous with a bare 'for,' the exchange sense is made explicit in the translation.
- source_word: בַּשָּׁנָה הַהִוא
  chosen: during that year
  alternatives:
  - in that year
  lexicon: HALOT
  rationale: Temporal phrase indicating the duration/period of this arrangement. 'During that year' is natural modern English.
