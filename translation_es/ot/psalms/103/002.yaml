translation:
  language: es
  text: Bendice a Yahvé[a], alma mía, y no olvides ninguno de sus beneficios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus tratos» o «sus recompensas»; el término hebreo puede referirse de manera amplia a lo que uno recibe de otro, pero aquí el contexto favorece el sentido positivo de «beneficios».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכִי
  english_pob_choice: Bless
  chosen_spanish: ¡Bendice!
  alternatives_spanish:
  - Alaba
  - Bendice
  lexicon: HALOT
  rationale: El imperativo femenino singular se dirige al alma del salmista. «Bendice» conserva el matiz relacional y de adoración del hebreo ברך mejor que un genérico «alaba».
- source_word: נַפְשִׁי
  english_pob_choice: O my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - mi ser interior
  lexicon: HALOT
  rationale: נפש aquí funciona como vocativo, una autoexhortación poética. En español, «alma mía» reproduce mejor esa apelación directa que «mi alma» sin vocativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Según el estándar español del proyecto, el nombre divino se vierte «Yahvé»; así se preserva el Tetragrámaton en vez de ocultarlo con un sustituto devocional.
- source_word: וְאַל
  english_pob_choice: and do not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - ni
  lexicon: HALOT
  rationale: La coordinación negativa hebrea se expresa de forma directa con «y no»; no hay indicio suficiente para introducir contraste con «pero».
- source_word: תִּשְׁכְּחִי
  english_pob_choice: forget
  chosen_spanish: olvides
  alternatives_spanish:
  - dejes de recordar
  - olvides
  lexicon: HALOT
  rationale: En español, el subjuntivo exhortativo «no olvides» comunica bien la prohibición/jussivo femenino singular.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: ninguno de
  alternatives_spanish:
  - todo
  - cada uno de
  lexicon: HALOT
  rationale: En este contexto, la idea totalizante se expresa con naturalidad en español mediante «ninguno de», evitando una literalidad menos idiomática como «todo sus beneficios».
- source_word: גְּמוּלָיו
  english_pob_choice: his benefits
  chosen_spanish: sus beneficios
  alternatives_spanish:
  - sus acciones recompensadas
  - sus recompensas
  - sus tratos
  lexicon: HALOT
  rationale: גמול puede abarcar trato, recompensa o beneficio. El contexto de alabanza y gratitud favorece «beneficios», que en español comunica de manera positiva lo recibido sin cargar el término con un sentido meramente transaccional.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. La política española del proyecto exige conservarlo como «Yahvé» en el texto principal, en lugar de sustituirlo por un equivalente devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto. La redacción mantiene el sentido fuente y evita introducir material no sustentado; además, se ajustó la puntuación final para que la nota no quede flotante.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma española del Nombre divino, conforme al criterio del proyecto.
  - Se preservó el vocativo poético con «alma mía» y el imperativo exhortativo con «¡Bendice!»/«no olvides».
  - «Beneficios» refleja el sentido positivo de גמול en este contexto sin borrar la posible amplitud semántica indicada por la nota.
