revisions:
- from: Y cada hombre engaña a su prójimo[a], y no hablan verdad; han enseñado a su lengua a hablar mentira[b]; se fatigan cometiendo iniquidad.
  to: Y cada hombre engaña a su prójimo[a], y no hablan verdad; han enseñado a su lengua a hablar falsedad; se fatigan cometiendo iniquidad[b].
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y alinearse mejor con la decisión léxica inglesa ''falsehood'': ''a hablar falsedad'' comunica el sentido de שֶׁקֶר con más dignidad y menos dureza calca que ''a hablar mentira''. Además, se ancló correctamente la nota [b] en la cláusula final, ya que la alternativa corresponde a ''se fatigan cometiendo iniquidad'' y no a la frase anterior.'
