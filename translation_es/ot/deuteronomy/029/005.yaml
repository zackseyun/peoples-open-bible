translation:
  language: es
  text: No comieron pan ni bebieron vino ni bebida fuerte[a], para que sepan que yo soy Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bebida fermentada» o «bebida intoxicante». El hebreo se refiere en sentido amplio a una bebida alcohólica fermentada, no necesariamente a una bebida específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  lexicon: HALOT
  rationale: En español, «pan» es el equivalente natural y concreto de bread, y mantiene el contraste con «vino» y «bebida fuerte» sin ampliar indebidamente el sentido a «alimento».
- source_word: אֲכַלְתֶּם
  english_pob_choice: you did not eat
  chosen_spanish: no han comido
  alternatives_spanish:
  - no comieron
  - no han comido
  lexicon: HALOT
  rationale: 'El hebreo perfecto recapitula una experiencia pasada. El presente perfecto español comunica bien esa retrospectiva: una acción efectivamente no realizada durante ese periodo.'
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: «Vino» es el equivalente directo y estándar, sin necesidad de explicación adicional.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - bebida fermentada
  - licor fuerte
  - bebida intoxicante
  lexicon: HALOT
  rationale: La expresión inglesa «strong drink» refleja un término hebreo amplio para bebida fermentada/intoxicante. «Bebida fuerte» conserva esa amplitud en español sin restringirlo a una clase específica como «cerveza» o «licor».
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: HALOT
  rationale: La finalidad del sintagma queda bien expresada con «para que», que es natural y conserva la relación de propósito.
- source_word: תֵּדְעוּ
  english_pob_choice: you might know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: HALOT
  rationale: 'En español, el subjuntivo presente tras «para que» expresa con naturalidad el propósito: «para que sepan». Mantiene la fuerza de resultado/intención del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El posesivo de segunda persona plural se expresa de forma reverente y natural como «su Dios» en español bíblico moderno dirigido a un colectivo.
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El pasaje identifica al Dios del pacto por su nombre propio. Se conserva ese valor teológico con «Yahvé», conforme al estándar del proyecto y sin ocultarlo tras un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido amplio de שֵׁכָר
  english_pob_reading: strong drink
  chosen_spanish_reading: bebida fuerte
  alternative_spanish_readings:
  - bebida fermentada
  - licor fuerte
  - bebida intoxicante
  rationale: No se precisa una bebida específica; el término abarca bebidas alcohólicas fermentadas en general. «Bebida fuerte» conserva la amplitud semántica y la tensión léxica documentada.
  doctrine_reference: HALOT lexical note for שֵׁכָר
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés y no se detectaron cambios pendientes: la lectura auditada permanece estable y de alta concordancia; el español sigue de cerca la estructura y las decisiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» según la política del proyecto.
  - «Bebida fuerte» conserva la amplitud de שֵׁכָר sin estrecharlo a una bebida moderna específica.
  - Se usó «su Dios» para reflejar el plural posesivo del hebreo con naturalidad en español.
  - La puntuación coordina la cadena negativa y la cláusula final de propósito sin añadir contenido interpretativo.
