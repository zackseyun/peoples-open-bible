id: LEV.5.5
reference: Leviticus 5:5
source:
  edition: WLC
  text: וְ/הָיָ֥ה כִֽי יֶאְשַׁ֖ם לְ/אַחַ֣ת מֵ/אֵ֑לֶּה וְ/הִ֨תְוַדָּ֔ה אֲשֶׁ֥ר חָטָ֖א עָלֶֽי/הָ־׃
translation:
  text: And it shall be[a], when he becomes guilty in one of these matters[b], that he shall confess what he has sinned in regard to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'incurs guilt' or 'is guilty.' The Hebrew verb emphasizes legal guilt/liability rather than merely an inward awareness of wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that he sinned upon/in regard to it,' referring back to one of the cases just listed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Then it shall be
  lexicon: HALOT
  rationale: Formulaic legal-transition language introducing the circumstance that follows. Retaining 'it shall be' preserves the formal legal cadence better than a more idiomatic omission.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  - that
  lexicon: HALOT
  rationale: In this legal context introducing a circumstance expected to occur, 'when' fits better than the more conditional 'if,' while still reflecting the Hebrew conjunction.
- source_word: יֶאְשַׁם
  chosen: becomes guilty
  alternatives:
  - incurs guilt
  - realizes his guilt
  - is guilty
  lexicon: HALOT
  rationale: The verb from אשם here denotes coming under guilt/liability. 'Becomes guilty' preserves the legal sense without over-interpreting it as inward realization, which some English versions import from context.
- source_word: לְאַחַת מֵאֵלֶּה
  chosen: in one of these matters
  alternatives:
  - for one of these things
  - in one of these
  lexicon: HALOT
  rationale: The phrase refers back to the preceding listed cases. 'Matters' makes the referent clear in natural English while staying close to the legal scope of the Hebrew.
- source_word: וְהִתְוַדָּה
  chosen: he shall confess
  alternatives:
  - then he shall confess
  - and he must confess
  lexicon: HALOT
  rationale: Hitpael of ידה here means confession. 'He shall confess' preserves the legal prescription and sequence.
- source_word: אֲשֶׁר חָטָא
  chosen: what he has sinned
  alternatives:
  - the sin that he committed
  - that in which he sinned
  lexicon: HALOT
  rationale: This relative clause specifies the content of the confession. 'What he has sinned' is slightly wooden but transparent to the Hebrew structure; smoother alternatives are possible but less direct.
- source_word: עָלֶיהָ
  chosen: in regard to it
  alternatives:
  - concerning it
  - over it
  - in it
  lexicon: HALOT
  rationale: The feminine singular suffix points back to the relevant matter/case. 'In regard to it' communicates the relational force clearly in English without forcing an overly literal preposition.
