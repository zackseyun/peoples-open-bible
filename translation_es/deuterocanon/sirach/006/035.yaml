translation:
  language: es
  text: Mira quién tiene entendimiento, y búscalo; y deja que tu pie desgaste su umbral[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Desea oír todo discurso divino, y no dejes que se te escapen proverbios de entendimiento». Los testigos hebreo y griego difieren de manera notable aquí, aunque ambos exhortan a buscar con empeño la sabiduría.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «tu pie desgaste su umbral», imagen de acudir repetidas veces a la casa de una persona sabia para aprender de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Observa
  - Ve
  lexicon: HALOT
  rationale: El imperativo pide atención y discernimiento. «Mira» conserva la fuerza directa y suena natural en español contemporáneo sin perder el tono sapiencial.
- source_word: מִי יָבִין
  english_pob_choice: who has understanding
  chosen_spanish: quién tiene entendimiento
  alternatives_spanish:
  - quién entiende
  - quién es entendido
  - quién es discerniente
  lexicon: HALOT
  rationale: «Tiene entendimiento» refleja la cualidad estable de la persona sabia, no solo un acto momentáneo de entender. Mantiene el campo semántico de discernimiento que también aparece en el paralelo griego.
- source_word: וְשַׁחֲרֵהוּ
  english_pob_choice: and seek him out
  chosen_spanish: y búscalo
  alternatives_spanish:
  - y búscalo diligentemente
  - y persíguelo
  - y ve en su busca
  lexicon: HALOT
  rationale: El hebreo sugiere una búsqueda insistente. «Búscalo» es breve y claro; el contexto de perseverancia queda reforzado por la imagen siguiente del pie que desgasta el umbral. El sentido de diligencia queda implícito, aunque no se sobrecarga la frase.
- source_word: וְתִשְׁחוֹק
  english_pob_choice: let ... wear out
  chosen_spanish: deja que ... desgaste
  alternatives_spanish:
  - haz que ... gaste
  - deja que ... gaste
  - haz que ... desgaste
  lexicon: HALOT
  rationale: La expresión es difícil en hebreo, pero la imagen contextual es la de visitas repetidas. «Desgaste» conserva la metáfora física y evita suavizarla a una paráfrasis abstracta.
- source_word: בְּסִפּוֹ
  english_pob_choice: his threshold
  chosen_spanish: su umbral
  alternatives_spanish:
  - su puerta
  - su dintel
  - su umbral de entrada
  lexicon: HALOT
  rationale: «Umbral» es la correspondencia más precisa y formal para סַף, y mantiene la imagen de frecuentar la casa del sabio.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  lexicon: HALOT
  rationale: Se conserva el singular hebreo, como en el inglés auditado, para mantener la imagen concreta e idiomática del tránsito repetido.
theological_decisions:
- issue: Manejo de la discrepancia entre el hebreo y el paralelo griego
  english_pob_reading: 'The Hebrew is primary, while the Greek parallel preserves a related wisdom exhortation: ''Desire to hear every divine discourse, and do not let proverbs of understanding escape you.'''
  chosen_spanish_reading: El texto principal sigue el hebreo disponible, mientras que el paralelo griego se registra como lectura alternativa de sabiduría afín.
  alternative_spanish_readings:
  - «Desea oír todo discurso divino, y no dejes que se te escapen proverbios de entendimiento»
  - «Anhela escuchar toda enseñanza divina, y no dejes escapar proverbios de sabiduría»
  rationale: La política del proyecto da prioridad al hebreo donde se conserva, pero el testimonio griego debe preservarse honestamente dada la marcada discrepancia. En español, esto se resuelve manteniendo el hebreo en el texto principal y documentando el griego como alternativa, sin fusionar indebidamente ambos testimonios.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando sobreviva, usando el paralelo griego como input real y preservando la incertidumbre con honestidad.'
translation_notes:
  revision_awareness: La última revisión indicó que no se necesitaban cambios; se ha mantenido la prioridad del hebreo con documentación explícita del paralelo griego, sin suavizar la imagen idiomática.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aplica ningún nombre divino explícito.
  - Se conserva el tono sapiencial y la metáfora concreta del pie y el umbral.
  - «Entendimiento» mantiene el campo semántico de discernimiento sin introducir terminología eclesiástica ajena al texto.
