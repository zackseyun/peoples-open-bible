lexical_decisions:
- source_word: מַלְכֵי הַצָּפוֹן
  english_pob_choice: the kings of the north
  chosen_spanish: los reyes del norte
  alternatives_spanish:
  - los reyes septentrionales
  - los monarcas del norte
  lexicon: HALOT
  rationale: La construcción hebrea es un genitivo simple; en español, «los reyes del norte» conserva esa relación sin añadir interpretación geográfica o histórica adicional.
- source_word: הַקְּרֹבִים וְהָרְחֹקִים
  english_pob_choice: both near and far
  chosen_spanish: tanto los cercanos como los lejanos
  alternatives_spanish:
  - los cercanos y los lejanos
  - tanto los próximos como los distantes
  lexicon: HALOT
  rationale: El par adjetival funciona como merismo de totalidad. «Tanto... como...» reproduce bien el paralelismo y su fuerza inclusiva en español natural.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: each one with his brother
  chosen_spanish: cada uno con su hermano
  alternatives_spanish:
  - uno tras otro
  - cada uno con el otro
  lexicon: HALOT
  rationale: La lectura inglesa revisada retiene la imagen literal de compañerismo/adyacencia. En español, «cada uno con su hermano» conserva la frase sin forzar una paráfrasis temporal que no está explícita en el hebreo.
- source_word: כָּל הַמַּמְלְכֹות הָאָרֶץ
  english_pob_choice: all the kingdoms of the earth
  chosen_spanish: todos los reinos de la tierra
  alternatives_spanish:
  - todos los reinos del país
  - todos los reinos del mundo
  lexicon: HALOT
  rationale: «Tierra» mantiene la amplitud universal que el contexto exige y corresponde al giro hebreo, sin reducirse a «país».
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the ground
  chosen_spanish: sobre la faz del suelo
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la superficie del suelo
  lexicon: HALOT
  rationale: Se distingue intencionalmente אֲדָמָה de אֶרֶץ. «Suelo» preserva la diferencia léxica con «tierra» y conserva el matiz de expresión fija de alcance mundial.
- source_word: שֵׁשַׁךְ
  english_pob_choice: Sheshach
  chosen_spanish: Sesaq
  alternatives_spanish:
  - Sesac
  - Sheshac
  lexicon: HALOT
  rationale: Se translitera el nombre en el texto principal, siguiendo la pauta del POB de preservar nombres opacos. «Sesaq» es una forma española legible y cercana al hebreo; la identificación con Babilonia queda para la nota.
- source_word: יִשְׁתֶּה אַחֲרֵיהֶם
  english_pob_choice: will drink after them
  chosen_spanish: beberá después de ellos
  alternatives_spanish:
  - beberá tras ellos
  - beberá luego de ellos
  lexicon: HALOT
  rationale: El verbo «beber» continúa la imagen del cáliz del contexto. «Después de ellos» mantiene la secuencia sin añadir elementos ausentes del verso.
theological_decisions:
- issue: Identidad de Sesaq / Sheshach
  english_pob_reading: Retain 'Sheshach' in the main text as a transliterated proper name, with Babylon noted in a footnote as the likely cryptographic reference.
  chosen_spanish_reading: Mantener «Sesaq» como nombre transliterado en el texto principal, con Babilonia en una nota como referencia críptica probable.
  alternative_spanish_readings:
  - Traducir directamente como «Babilonia» en el texto principal
  - Explicar el nombre dentro del texto como «el rey de Babilonia»
  rationale: El hebreo no dice בבל sino שֵׁשַׁךְ. Para no borrar la forma enigmática del texto fuente, se conserva el nombre transliterado y se documenta su probable referencia a Babilonia en nota.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names. Preserve theological tension rather than resolving it in the main text.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el cauce auditado del POB en inglés. Se adoptó la revisión más cercana a אִישׁ אֶל אָחִיו, pero en español se optó por una equivalencia natural («cada uno con su hermano») para no introducir una lectura temporal no explícita. Se mantuvo la distinción léxica entre אֶרֶץ y אֲדָמָה mediante «tierra» / «suelo», y se preservó el nombre opaco en transliteración con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se preserva la distinción entre «tierra» (אֶרֶץ) y «suelo» (אֲדָמָה).
  - Se transliteran los nombres propios opacos en lugar de resolverlos en el texto principal.
  - La puntuación en español separa los miembros coordinados sin alterar el paralelismo hebreo.
