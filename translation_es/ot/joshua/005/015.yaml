base_translation:
  language: en
  yaml_path: translation/ot/joshua/005/015.yaml
  text: Then the commander of Yahweh’s army said to Joshua[a], “Take your sandal off your foot[b], because the place where you are standing is holy.” And Joshua did so.
  footnotes:
