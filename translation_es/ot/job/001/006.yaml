translation:
  language: es
  text: Y hubo un día en que vinieron los hijos de Dios[a] para presentarse delante de Yahvé, y también vino entre ellos el Adversario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Dios» puede referirse a seres celestiales del consejo divino.
    reason: cultural_note
  - marker: b
    text: O, tradicionalmente, «Satanás». El hebreo tiene «el satan/adversario», con artículo, lo que aquí puede funcionar como título más que como nombre propio.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: Now there was a day
  chosen_spanish: Y aconteció un día
  alternatives_spanish:
  - Y sucedió un día
  - Un día
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una nueva escena; en español, «Y aconteció un día» conserva ese giro narrativo con un tono digno y cercano al registro bíblico, sin depender de una calca rígida.
- source_word: בְּנֵי הָאֱלֹהִים
  english_pob_choice: the sons of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los seres celestiales
  - los seres divinos
  lexicon: HALOT
  rationale: Se mantiene la expresión formal del hebreo. «Hijos» es una equivalencia natural y transparente en español, y preserva la ambigüedad teológica y la imaginería de corte divino sin interpretar de más en el texto principal.
- source_word: לְהִתְיַצֵּב
  english_pob_choice: to present themselves
  chosen_spanish: para presentarse
  alternatives_spanish:
  - para ponerse de pie
  - para comparecer
  lexicon: HALOT
  rationale: El hitpael aquí expresa comparecer o presentarse ante un superior. «Presentarse» comunica bien esa idea en español y evita la literalidad poco natural de «ponerse de pie».
- source_word: עַל יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» refleja la relación espacial/ceremonial de comparecencia ante una autoridad. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término español preferido por el proyecto para el tetragrámaton, manteniendo la transparencia frente al nombre divino hebreo.
- source_word: הַשָּׂטָן
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - Satanás
  - el acusador
  lexicon: HALOT
  rationale: 'El hebreo lleva artículo definido, por lo que en este contexto se conserva mejor como título o designación: «el Adversario». Así se preserva la tensión entre título y nombre propio sin resolverla prematuramente.'
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: HALOT
  rationale: «Entre ellos» expresa naturalmente la inclusión de Satanás en el grupo sin forzar una imagen espacial más marcada de la que exige el hebreo.
theological_decisions:
- issue: Título o nombre propio para הַשָּׂטָן
  english_pob_reading: the Adversary
  chosen_spanish_reading: el Adversario
  alternative_spanish_readings:
  - Satanás
  - el acusador
  rationale: El artículo hebreo sugiere una designación funcional en lugar de un nombre propio plenamente fijado. «El Adversario» conserva la fuerza semántica del término y la ambigüedad del texto, mientras que «Satanás» queda como lectura tradicional posible pero no impuesta por la traducción principal.
  doctrine_reference: Preservar la tensión lexical-teológica del texto fuente; primacía del hebreo sobre la tradición posterior.
- issue: Sentido de בְּנֵי הָאֱלֹהִים
  english_pob_reading: the sons of God may refer to heavenly beings in the divine council
  chosen_spanish_reading: los hijos de Dios puede referirse a seres celestiales de la corte divina
  alternative_spanish_readings:
  - los hijos de Dios
  - los seres celestiales
  rationale: La traducción principal conserva la expresión hebrea sin interpretar. En la nota se reconoce la posible referencia a seres celestiales del consejo divino, manteniendo abierta la lectura que el texto sugiere sin cerrarla en el cuerpo principal.
  doctrine_reference: Primacía del lenguaje fuente y preservación de la ambigüedad teológica documentada.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado más reciente del paquete fuente y del audit trail inglés: no hay revisiones aplicadas en el registro, y el consenso del control cruzado es alto. Se conservaron las tres tensiones principales documentadas: el giro narrativo inicial, la ambigüedad de בְּנֵי הָאֱלֹהִים y el valor titular de הַשָּׂטָן.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, coherente con el estándar del proyecto.
  - Se usó «el Adversario» en el texto principal para reflejar el artículo hebreo; «Satanás» queda en nota como lectura tradicional.
  - Se prefirió «los hijos de Dios» como equivalencia transparente y formal, con nota explicativa sobre su posible referencia celestial.
  - La puntuación y el orden sintáctico buscan una lectura pública natural en español sin perder la estructura del hebreo.
