  glossary_alignment: 'No hay términos teológicos sensibles aquí. La terminología militar principal está bien encaminada: δυνάμεις = «fuerzas» funciona bien; ἀπεκρόακεν puede expresarse como «había despedido» con nota léxica. El principal desajuste es ἐτροπώθη, que debe reflejar derrota con desbandada o huida, no solo derrota genérica.'
