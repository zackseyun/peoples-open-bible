translation:
  language: es
  text: 'Cuando Gaal vio al pueblo, le dijo a Zebul: «Mira, viene gente descendiendo de las cimas de los montes». Pero Zebul le dijo: «Estás viendo la sombra de los montes como hombres[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Ves la sombra de los montes como hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - percibió
  lexicon: HALOT
  rationale: El imperfecto consecutivo de ראה en narración se expresa de manera natural con «vio», que conserva la sencillez del hebreo sin añadir matices innecesarios.
- source_word: הָעָם / עָם
  english_pob_choice: the people / people
  chosen_spanish: el pueblo / gente
  alternatives_spanish:
  - las tropas / tropas
  - el ejército / ejército
  lexicon: HALOT
  rationale: עָם designa literalmente «pueblo» o «gente». En el contexto inmediato no se especifica militarmente, así que «pueblo» mantiene la ambigüedad del hebreo; en la cita de Gaal, «gente» suena más natural en español para un grupo que desciende.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira pues
  - Mira,
  lexicon: HALOT
  rationale: Como partícula de llamada en discurso directo, «Mira» comunica la atención inmediata del hebreo sin recurrir a un tono arcaico.
- source_word: יוֹרֵד
  english_pob_choice: are coming down
  chosen_spanish: viene gente bajando
  alternatives_spanish:
  - está bajando gente
  - desciende gente
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, עָם es colectivo; en español, la construcción «viene gente bajando» conserva el movimiento observado desde arriba y suena idiomática sin perder el valor visual del verbo.
- source_word: מֵרָאשֵׁי הֶהָרִים
  english_pob_choice: from the tops of the mountains
  chosen_spanish: de las cimas de los montes
  alternatives_spanish:
  - de las cumbres de los montes
  - de las cimas de las montañas
  lexicon: HALOT
  rationale: רֹאשׁ en plural constructo con montes señala la parte alta o cima. «Cimas de los montes» es claro y fiel, y «montes» resulta más bíblico y fluido que «montañas» en este contexto.
- source_word: צֵל הֶהָרִים
  english_pob_choice: the shadow of the mountains
  chosen_spanish: la sombra de los montes
  alternatives_spanish:
  - la sombra de las montañas
  - la sombra/penumbra de los montes
  lexicon: HALOT
  rationale: צֵל es literalmente «sombra»; esa elección preserva el contraste visual que Zebul plantea. Se mantiene «montes» por coherencia con la frase anterior.
- source_word: אַתָּה רֹאֶה כָּאֲנָשִׁים
  english_pob_choice: You are seeing ... as men
  chosen_spanish: estás viendo ... como hombres
  alternatives_spanish:
  - ves ... como hombres
  - estás viendo ... como si fueran hombres
  lexicon: HALOT
  rationale: 'La construcción expresa una percepción errónea: Zebul afirma que Gaal interpreta las sombras «como hombres». «Estás viendo» conserva el aspecto progresivo del inglés POB y el carácter de juicio perceptivo.'
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y aquí apunta a figuras masculinas aparentes; «hombres» respeta ese rasgo formal y la escena de combate.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto permanece en alto acuerdo con el control de calidad y sin ajustes necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «montes» de forma consistente para traducir הָרִים en este pasaje.
  - Se prefirió un español directo y literario, sin arcaísmos innecesarios, para conservar la vivacidad del intercambio entre Gaal y Zebul.
