translation:
  language: es
  text: Por tanto, la tierra[a] se lamenta, y se debilita todo el que habita en ella, junto con las bestias del campo y las aves de los cielos; incluso los peces del mar son quitados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tierra entera'. El hebreo אֶרֶץ puede significar tanto 'tierra' como 'país/territorio'; aquí 'tierra' se entiende mejor como la tierra de Israel en su contexto inmediato de juicio.
    reason: alternative_reading
  - marker: b
    text: O 'son arrebatados' o, más literalmente, 'son reunidos'. El sentido es que aun los peces son removidos bajo el juicio descrito.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאֱבַ֣ל
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - está de duelo
  - llora
  lexicon: HALOT
  rationale: El verbo expresa duelo o lamento; en español, 'se lamenta' conserva la personificación de la tierra sin convertirla en una mera descripción física como 'se seca' o 'se marchita'.
- source_word: הָ/אָ֗רֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aunque 'tierra' también puede abarcar 'land/earth', en este contexto profético se refiere al ámbito castigado de Israel. 'La tierra' mantiene la amplitud semántica y funciona bien en español bíblico.
- source_word: וְ/אֻמְלַל֙
  english_pob_choice: languishes
  chosen_spanish: se debilita
  alternatives_spanish:
  - languidece
  - se marchita
  - se consume
  lexicon: HALOT
  rationale: El valor básico es volverse débil o extenuado. 'Se debilita' es claro en español y preserva el sentido amplio sin forzar una imagen vegetal exclusiva.
- source_word: כָּל יוֹשֵׁ֣ב בָּ֔/הּ
  english_pob_choice: everyone who dwells in it
  chosen_spanish: todo el que habita en ella
  alternatives_spanish:
  - todos los habitantes de ella
  - cada uno que vive en ella
  lexicon: HALOT
  rationale: El participio con כָּל tiene fuerza colectiva. 'Todo el que habita en ella' suena natural y conserva la universalidad dentro del ámbito mencionado.
- source_word: בְּ/חַיַּ֥ת הַ/שָּׂדֶ֖ה
  english_pob_choice: along with the beasts of the field
  chosen_spanish: junto con las bestias del campo
  alternatives_spanish:
  - con los animales del campo
  - junto con los animales salvajes
  lexicon: HALOT
  rationale: '''Bestias del campo'' reproduce bien la categoría bíblica tradicional y mantiene el paralelismo con las aves y los peces.'
- source_word: וּ/בְ/ע֣וֹף הַ/שָּׁמָ֑יִם
  english_pob_choice: and the birds of the heavens
  chosen_spanish: y las aves de los cielos
  alternatives_spanish:
  - y las aves del cielo
  - y las aves del firmamento
  lexicon: HALOT
  rationale: '''Cielos'' conserva el plural hebreo y la elevación estilística del original. ''Aves'' es un equivalente natural y digno en español.'
- source_word: וְ/גַם
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - hasta
  lexicon: HALOT
  rationale: La partícula intensifica la progresión del juicio. 'Incluso' transmite mejor ese escalamiento que un simple 'también'.
- source_word: דְּגֵ֥י הַ/יָּ֖ם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - los peces del agua
  - los peces del océano
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural; mantiene la tríada terrestre, aérea y marina.
- source_word: יֵאָסֵֽפוּ
  english_pob_choice: are taken away
  chosen_spanish: son recogidos
  alternatives_spanish:
  - son arrebatados
  - son reunidos
  - son llevados
  lexicon: HALOT
  rationale: El nifal de אסף puede significar ser recogido/reunido o ser removido. 'Son recogidos' mantiene la ambigüedad del hebreo y deja abierta la idea de remoción bajo juicio, como refleja la nota inglesa sobre 'are gathered'.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra de Israel
  rationale: El contexto inmediato es un oráculo de juicio sobre Israel, no una afirmación cosmológica universal. 'La tierra' conserva la posibilidad de leer el territorio castigado y evita imponer una restricción que el hebreo no explicita con un término técnico adicional.
  doctrine_reference: Lectura profética contextual del juicio del pacto
translation_notes:
  revision_awareness: 'El pasaje mantiene la lectura ya confirmada por el audit trail inglés: personificación de la tierra, paralelismo de habitantes/animales/aves/peces, y la ambigüedad de יֵאָסֵפוּ como remoción o reunión. No se introdujeron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' no pertinente aquí porque el versículo no lo contiene.
  - Se usó 'cielos' para reflejar el plural hebreo y la dicción bíblica sin caer en un calco rígido.
  - '''Son recogidos'' preserva la ambigüedad de אסף mejor que una interpretación más definida como ''perecen''.'
