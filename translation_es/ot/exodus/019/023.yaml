revisions:
- from: 'Entonces Moisés dijo a Yahvé[a]: «El pueblo no puede subir al monte Sinaí, porque tú mismo nos advertiste, diciendo[b]: “Pon límites alrededor del monte y conságralo”».'
  to: 'Entonces Moisés dijo a Yahvé: «El pueblo no puede subir al monte Sinaí, porque tú mismo nos advertiste[a], diciendo: “Pon límites alrededor del monte y conságralo”[b]».'
  rationale: Se corrigen las notas para que queden ancladas donde corresponde y se preserve la alternativa léxica auditada en inglés. Se elimina la nota sobre «Yahvé» porque la decisión del proyecto ya establece esa forma en español y no necesita presentarse como variante en este versículo. El texto principal no requiere cambios de redacción, solo ajuste de aparatos.
