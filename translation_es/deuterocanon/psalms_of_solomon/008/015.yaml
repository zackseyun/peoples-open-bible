translation:
  language: es
  text: Por tanto, Dios les preparó un espíritu de extravío[a]; les dio a beber una copa de vino puro, hasta la embriaguez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La revisión textual aquí sigue la lectura subyacente πνεῦμα πλανήσεως, reflejada en la alusión a Isaías 19:14. Otra posibilidad de traducción: «un espíritu de engaño».'
    reason: textual_note_and_spanish_clarity
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: La frase introduce una conclusión inferida del contexto previo. «Por tanto» conserva bien el valor conclusivo y suena natural en español bíblico contemporáneo sin endurecer el estilo.
- source_word: ἐκέρασεν
  english_pob_choice: mixed
  chosen_spanish: les mezcló
  alternatives_spanish:
  - les preparó
  - les mezcló una bebida
  lexicon: LSJ
  rationale: κεράννυμι puede significar mezclar o preparar una bebida. Dado el paralelo con la copa de vino en la segunda cláusula, «les mezcló» conserva la imagen concreta del acto de juicio.
- source_word: πνεῦμα πλανήσεως / εὕρε πλανήσεως
  english_pob_choice: a spirit of delusion
  chosen_spanish: un espíritu de extravío
  alternatives_spanish:
  - un espíritu de engaño
  - un espíritu de delirio
  lexicon: LSJ
  rationale: El audit trail indica que la lectura correcta es πνεῦμα πλανήσεως, con eco explícito de Isaías 19:14. «Extravío» conserva la idea de desvío/errancia moral y espiritual que πλάνη puede tener, sin reducirla solo a engaño intelectual.
- source_word: ἐπότισεν αὐτούς
  english_pob_choice: he made them drink
  chosen_spanish: les dio a beber
  alternatives_spanish:
  - los hizo beber
  - les hizo beber
  lexicon: LSJ
  rationale: El verbo expresa que los hizo beber como acto impuesto de juicio. «Les dio a beber» es idiomático, solemne y mantiene la fuerza causativa sin exceso de literalidad.
- source_word: ποτήριον οἴνου ἀκράτου
  english_pob_choice: a cup of undiluted wine
  chosen_spanish: una copa de vino sin mezclar
  alternatives_spanish:
  - una copa de vino puro
  - una copa de vino no diluido
  lexicon: LSJ
  rationale: ἀκράτου significa vino no mezclado con agua. «Sin mezclar» preserva el sentido técnico y la imagen bíblica; «vino puro» podría sonar interpretativo, y «no diluido» es menos natural en español bíblico.
- source_word: εἰς μέθην
  english_pob_choice: to drunkenness
  chosen_spanish: para embriagarlos
  alternatives_spanish:
  - hasta la embriaguez
  - para que se embriagaran
  lexicon: LSJ
  rationale: La frase expresa resultado o finalidad de juicio. «Para embriagarlos» mantiene la dirección telética y suena más natural que un calco como «a la embriaguez».
theological_decisions:
- issue: Lectura de πνεῦμα frente al texto corrompido εὕρε
  english_pob_reading: a spirit of delusion
  chosen_spanish_reading: un espíritu de extravío
  alternative_spanish_readings:
  - una bebida de extravío
  - un brebaje de extravío
  rationale: El registro de revisión indica que εὕρε es un OCR erróneo por πνεῦμα y que el autor alude directamente a Isaías 19:14. Por eso el texto español sigue la lectura de espíritu, no una imagen de bebida en esta primera cláusula.
  doctrine_reference: Isaías 19:14; eco intertextual de juicio divino sobre el extravío
- issue: Relación entre juicio divino y la copa de vino
  english_pob_reading: he made them drink a cup of undiluted wine to drunkenness
  chosen_spanish_reading: les dio a beber una copa de vino sin mezclar, para embriagarlos
  alternative_spanish_readings:
  - les dio a beber una copa de vino puro, hasta la embriaguez
  - les hizo beber una copa de vino no diluido, para que se embriagaran
  rationale: 'Conserva la metáfora de juicio por embriaguez sin suavizarla. La segunda cláusula debe permanecer separada de la primera, porque el griego presenta dos imágenes coordinadas: espíritu de extravío y copa de vino fuerte.'
  doctrine_reference: lenguaje profético de juicio; paralelismo con Isaías 19:14
translation_notes:
  revision_awareness: El texto griego recibido presenta una corrupción en εὕρε πλανήσεως; el audit trail documenta que debe leerse como πνεῦμα πλανήσεως, en alusión directa a Isaías 19:14. Por ello la traducción evita seguir la forma corrupta y conserva la imagen de un espíritu de juicio/extravío. También se adopta «sin mezclar» para ἀκράτου, en lugar de calcos más duros o de una paráfrasis.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al paquete fuente y al estilo bíblico del proyecto.
  - Se mantiene «espíritu» en sentido moral-judicial, no como viento ni como simple estado psicológico.
  - «Vino sin mezclar» preserva la fuerza de ἀκράτου y evita sustituir la imagen por una explicación.
  - «Por tanto» refleja la conclusión inferida sin añadir contenido doctrinal ajeno al versículo.
