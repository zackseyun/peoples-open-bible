revisions:
- from: Así que los cinco reyes de los amorreos —el rey de Jerusalén, el rey de Hebrón, el rey de Jarmut, el rey de Laquis y el rey de Eglón— se reunieron[a] y subieron, ellos y todos sus ejércitos; y acamparon frente a Gabaón y lucharon contra ella.
  to: Entonces los cinco reyes de los amorreos —el rey de Jerusalén, el rey de Hebrón, el rey de Jarmut, el rey de Laquis y el rey de Eglón— se reunieron y subieron, ellos y todos sus ejércitos[a]; y acamparon contra Gabaón y lucharon contra ella.
  rationale: Se corrige la ubicación del marcador de nota para que ancle la alternativa léxica donde corresponde, se suaviza el conector inicial a 'Entonces' para reflejar mejor la narración hebrea, y se ajusta 'frente a' a 'contra' para mantener el matiz hostil de עַל en contexto. El resto del texto se conserva por ser fiel, claro y natural.
