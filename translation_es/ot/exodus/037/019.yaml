review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura repetitiva y el sentido general del hebreo: tres copas decoradas en cada rama, con un elemento redondeado y una flor, repetido en las seis ramas del candelabro. Sin embargo, falla en un punto léxico importante: כַּפְתֹּר no corresponde a «cáliz», sino a un adorno redondeado como «bulbo» o «botón». Además, el borrador introduce una nota sobre «rama/brazo» que no está respaldada por el POB inglés y reemplaza la nota inglesa sobre «bulb/knob» por una nota interpretativa no necesaria.'
  spanish_quality_summary: El español es claro y legible, pero «había» después de «Tres copas...» suena menos natural que una construcción más descriptiva en este contexto técnico. «Con cáliz y flor» resulta engañoso en español porque «cáliz» se asocia a la parte de la flor o a una copa litúrgica, no a un saliente redondeado del candelabro. También conviene reflejar la nota alternativa del inglés en el término del adorno redondeado.
  glossary_alignment: 'No hay términos teológicos mayores en este versículo. «Candelabro» para מְנֹרָה y «rama» para קָנֶה son adecuados. La desviación principal es כַּפְתֹּר: debe alinearse con la decisión documentada del POB inglés («bulb», alternativa «knob»), en español mejor «bulbo» con nota alternativa «botón».'
  issues:
  - severity: high
    issue: «cáliz» para כַּפְתֹּר es incorrecto o muy engañoso
    rationale: El hebreo describe un saliente ornamental redondeado del candelabro. El POB inglés documenta «bulb» con alternativa «knob». «Cáliz» cambia la imagen y puede confundirse con un vaso litúrgico o con el cáliz de una flor.
  - severity: medium
    issue: La nota [b] sobre «rama»/«brazo» no corresponde al aparato crítico inglés
    rationale: El POB inglés no preservó esa alternativa aquí. «Rama» funciona bien sin nota, y añadirla introduce ruido innecesario.
  - severity: medium
    issue: La nota [c] interpretativa sustituye una nota léxica más pertinente
    rationale: La nota inglesa b explica la alternativa de «bulb/knob». La nota actual sobre la repetición del patrón no añade información textual necesaria y omite la alternativa léxica documentada.
  - severity: low
    issue: «había en una rama» es comprensible, pero algo rígido
    rationale: Una formulación como «tenía» o «había ... en cada rama» puede sonar más natural en español técnico-descriptivo, manteniendo fidelidad al hebreo.
