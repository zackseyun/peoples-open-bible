translation:
  language: es
  text: Zérah el cusita[a] salió contra ellos con un ejército de mil miles[b] y trescientos carros de guerra, y llegó hasta Maresá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cusita» traduce el término etnogeográfico hebreo; tradicionalmente, «etíope».
    reason: lexical_alternative
  - marker: b
    text: «Mil miles» refleja literalmente la construcción hebrea אֶלֶף אֲלָפִים; también puede entenderse como «un millón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió a combatir
  - marchó
  lexicon: WLC / HALOT
  rationale: En contexto militar, יצא expresa salir para enfrentar al enemigo. «Salió» conserva el movimiento del hebreo sin recargarlo innecesariamente.
- source_word: אֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - hacia ellos
  - a ellos
  lexicon: WLC / HALOT
  rationale: La preposición indica avance hostil en este relato de batalla; «contra ellos» hace explícito ese valor contextual.
- source_word: זֶרַח הַכּוּשִׁי
  english_pob_choice: Zerah the Cushite
  chosen_spanish: Zérah el cusita
  alternatives_spanish:
  - Zérah el cuscita
  - Zérah el etíope
  lexicon: WLC / HALOT
  rationale: Se translitera el nombre propio y se vierte כּוּשִׁי como etnónimo directo. «Cusita» mantiene mejor la relación con Cush/Kush que la forma tradicional interpretativa «etíope».
- source_word: בְּחַיִל
  english_pob_choice: with an army
  chosen_spanish: con un ejército
  alternatives_spanish:
  - con una fuerza
  - con tropas
  lexicon: WLC / HALOT
  rationale: חַיִל aquí designa fuerza militar; «ejército» es la opción natural y precisa en español.
- source_word: אֶלֶף אֲלָפִים
  english_pob_choice: a thousand thousands
  chosen_spanish: mil millares
  alternatives_spanish:
  - un millón
  - mil miles
  lexicon: WLC / HALOT
  rationale: La expresión hebrea es literalmente acumulativa. «Mil millares» conserva la forma fuente mejor que normalizarla de inmediato a «un millón».
- source_word: וּמַרְכָּבוֹת שְׁלֹשׁ מֵאוֹת
  english_pob_choice: and three hundred chariots
  chosen_spanish: y trescientos carros de guerra
  alternatives_spanish:
  - y trescientos carros
  - y trescientos carruajes
  lexicon: WLC / HALOT
  rationale: מרכבות en contexto bélico se entiende como carros de guerra. Se añade «de guerra» para evitar ambigüedad en español.
- source_word: וַיָּבֹא עַד מָרֵשָׁה
  english_pob_choice: and he came as far as Mareshah
  chosen_spanish: y llegó hasta Maresá
  alternatives_spanish:
  - y vino hasta Maresá
  - y alcanzó Maresá
  lexicon: WLC / HALOT
  rationale: עַד con topónimo marca límite de avance. «Llegó hasta» preserva esa idea de extensión territorial mejor que un simple «a».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo WLC y el criterio auditado de la POB inglesa: mantener el movimiento militar de יצא/אֲלֵיהֶם, conservar el etnónimo Cushite mediante un equivalente directo en español, y preservar la forma acumulativa de אֶלֶף אֲלָפִים sin convertirla automáticamente en una cifra moderna.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo expresa el nombre divino; este versículo no lo contiene.
  - Se mantiene «Maresá» como forma toponímica española consistente con la transliteración del hebreo.
  - «Cusita» se eligió para reflejar el etnónimo hebreo sin sustituirlo por la forma tradicional interpretativa «etíope».
