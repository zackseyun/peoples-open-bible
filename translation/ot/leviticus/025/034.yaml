theological_decisions:
- issue: Force of עוֹלָם in Israel's land law
  chosen_reading: Rendered as 'permanent' rather than 'everlasting'
  alternative_readings:
  - everlasting possession
  - perpetual possession
  rationale: In this legal context, עוֹלָם denotes enduring, non-alienable status within Israel's covenantal order, not necessarily an abstract statement about metaphysical eternity. 'Permanent possession' preserves the legal force without importing a stronger claim than the text requires.
  doctrine_reference: Translation philosophy §1, §3, §6
