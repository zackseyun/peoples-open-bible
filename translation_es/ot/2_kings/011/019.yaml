  yaml_path: translation/ot/2_kings/011/019.yaml
  text: Then he took the commanders of hundreds[a], the Carites, the runners, and all the people of the land, and they brought the king down from the house of Yahweh and came by way of the gate of the runners to the king’s house[b], and he sat on the throne of the kings.
