base_translation:
  language: en
  yaml_path: translation/ot/exodus/032/012.yaml
  text: Why should the Egyptians say[a], ‘He brought them out with evil intent, to kill them in the mountains and to wipe them off the face of the earth’? Turn from your burning anger[c][b], and relent concerning the harm intended for your people.
  footnotes:
  - marker: a
    text: Or 'for evil' / 'with harmful intent' for 'with evil intent.' The Hebrew phrase בְּרָעָה expresses the motive the Egyptians would attribute to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'and to consume them' for 'and to wipe them off.' The Hebrew verb conveys complete destruction.
    reason: lexical_alternative
  - marker: c
    text: Or 'and relent concerning the disaster' / 'and change your mind about the calamity.' The Hebrew uses anthropopathic language in Moses' plea.
    reason: alternative_reading
