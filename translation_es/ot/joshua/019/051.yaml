translation:
  language: es
  text: Estas son las heredades que Eleazar el sacerdote, Josué hijo de Nun y los jefes de las casas paternas de las tribus de los hijos de Israel[a] repartieron por sorteo en Silo, delante de Yahvé, a la entrada de la tienda de reunión. Así terminaron de dividir la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; muchos traductores simplifican esta fórmula a «Israel» o «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּחָלֹת
  english_pob_choice: the inheritances
  chosen_spanish: las heredades
  alternatives_spanish:
  - las porciones
  - las asignaciones
  - las posesiones heredadas
  lexicon: HALOT
  rationale: נחלה aquí nombra las porciones territoriales heredadas/asignadas en el reparto de la tierra. «Heredades» conserva el valor de posesión recibida por herencia y el sentido técnico del reparto tribal mejor que un simple «porciones».
- source_word: נִחֲלוּ
  english_pob_choice: apportioned
  chosen_spanish: repartieron
  alternatives_spanish:
  - apportionaron
  - asignaron
  - distribuyeron
  lexicon: HALOT
  rationale: El verbo en este contexto expresa la acción administrativa de distribuir las porciones. «Repartieron» es natural en español y mantiene la idea de asignación por lotes sin perder el carácter concreto del acto.
- source_word: אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: Eleazar el sacerdote
  alternatives_spanish:
  - Eleazar el sumo sacerdote
  - Eleazar, el sacerdote
  lexicon: HALOT
  rationale: הכהן es simplemente «el sacerdote». En español bíblico «sacerdote» es claro y fiel; «sumo sacerdote» sería demasiado específico y añadiría un rango que el hebreo no expresa.
- source_word: וְרָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los clanes paternos
  - los jefes de las familias patriarcales
  lexicon: HALOT
  rationale: La expresión conserva la estructura social hebrea de «casas paternas». «Casas paternas» es transparente y más cercano al original que una simplificación a «familias».
- source_word: לְמַטּוֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: of the tribes of the sons of Israel
  chosen_spanish: de las tribus de los hijos de Israel
  alternatives_spanish:
  - de las tribus de Israel
  - de las tribus de los israelitas
  - de las tribus de los hijos de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» refleja directamente בְּנֵי יִשְׂרָאֵל y preserva la formulación hebrea. «Tribus» traduce מַטּוֹת con el valor étnico-administrativo esperado.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suertes
  - echando suertes
  - por lote
  lexicon: HALOT
  rationale: El hebreo alude a una distribución determinada por sorteo. «Por sorteo» es idiomático en español y comunica el procedimiento sin oscurecer el componente de azar controlado.
- source_word: בְּשִׁלֹה
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Shiloh
  - a Silo
  lexicon: HALOT
  rationale: El topónimo שִׁלֹה se adapta como «Silo», forma habitual en español bíblico y fácilmente reconocible, sin alterar el referente geográfico.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  - delante del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la convención del proyecto. «Delante de» reproduce bien la idea cultual de actuar en presencia del Dios del pacto.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la puerta de la tienda de reunión
  - a la entrada del tabernáculo de reunión
  - ante la entrada de la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» es una traducción transparente de אֹהֶל מוֹעֵד y evita introducir «tabernáculo» como término tradicional no explicitado aquí. «Entrada» corresponde a פתח.
- source_word: וַיְכַלּוּ
  english_pob_choice: So they finished
  chosen_spanish: Así terminaron
  alternatives_spanish:
  - Y terminaron
  - De modo que terminaron
  - Así concluyeron
  lexicon: HALOT
  rationale: El waw consecutivo introduce el cierre narrativo. «Así terminaron» mantiene el avance de la narración y el sentido resultativo de завершение del acto.
- source_word: מֵחַלֵּק אֶת הָאָרֶץ
  english_pob_choice: dividing the land
  chosen_spanish: de dividir la tierra
  alternatives_spanish:
  - de repartir la tierra
  - de aporcionar la tierra
  - de distribuir la tierra
  lexicon: HALOT
  rationale: El infinitivo expresa el proceso de dividir/repartir el territorio entre las tribus. «Dividir la tierra» sigue de cerca la imagen del hebreo y funciona bien en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La norma del proyecto pide «Yahvé» en el texto principal; se preserva así el nombre propio del pacto sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Gendered kinship expression בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: Se conserva la formulación masculina plural del hebreo, coherente con la filosofía de traducción del proyecto y con el paralelismo del texto. «Hijos de Israel» es transparente y no borra la forma original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Translation of אֹהֶל מוֹעֵד
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tienda del encuentro
  - tabernáculo de reunión
  rationale: «Tienda de reunión» reproduce el valor funcional/cultual del sintagma sin cargarlo con una terminología eclesiástica posterior. Se mantiene la transparencia del hebreo.
  doctrine_reference: HALOT / usage in Pentateuch and Joshua narrative context
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que corrigió el verbo de un valor más general («assigned») a uno más preciso del reparto territorial («apportioned»). Por eso se prefirió «repartieron»/«por sorteo» y no una formulación administrativa demasiado abstracta. También se respetó la preferencia auditada por mantener la estructura de «fathers’ houses» y la forma explícita «sons of Israel» en lugar de una simplificación total.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - Se mantiene «tienda de reunión» para אֹהֶל מוֹעֵד; no se alterna con «tabernáculo» dentro del versículo.
  - «Hijos de Israel» conserva la expresión hebrea donde el inglés auditado retuvo «sons of Israel».
  - El cierre narrativo «Así terminaron» preserva el sentido conclusivo de וַיְכַלּוּ.
  - «Heredades» y «repartieron por sorteo» mantienen el marco jurídico-territorial del pasaje sin introducir paráfrasis expansivas.
