translation:
  language: es
  text: Y vi que se había vuelto impura[a]; las dos siguieron el mismo camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se había contaminado». El hebreo puede leerse de manera más estática, pero el contexto sugiere una impureza contraída por su propia conducta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un camino para las dos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Entonces vi
  - Y contemplé
  lexicon: HALOT
  rationale: El wayyiqtol en primera persona introduce la observación profética en secuencia narrativa. «Y vi» conserva la coordinación y la percepción directa sin sobrecargar el español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo visto, no una causa. En español, «que» funciona como complemento natural y fiel.
- source_word: נִטְמָאָה
  english_pob_choice: she had become unclean
  chosen_spanish: se había vuelto impura
  alternatives_spanish:
  - había sido contaminada
  - se había contaminado
  lexicon: HALOT
  rationale: El nifal perfecto de טמא puede sonar pasivo o resultativo. «Se había vuelto impura» conserva el estado resultante sin perder la idea de contaminación moral/cúltica inherente al contexto; evita suavizar la carga del verbo.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - conducta
  lexicon: HALOT
  rationale: En sentido figurado, דֶּרֶךְ expresa modo de vida o conducta. «Camino» mantiene la metáfora bíblica y es claro en español.
- source_word: אֶחָד
  english_pob_choice: the same
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - el mismo
  lexicon: HALOT
  rationale: En combinación con «para las dos», אֶחָד comunica unicidad compartida. «Un solo» preserva la idea de una única vía común sin forzar la sintaxis española.
- source_word: לִשְׁתֵּיהֶן
  english_pob_choice: both of them
  chosen_spanish: para las dos
  alternatives_spanish:
  - para ambas
  - de las dos
  lexicon: HALOT
  rationale: La frase indica que el único camino era compartido por las dos hermanas. «Para las dos» refleja bien la relación distributiva y suena natural en español.
theological_decisions:
- issue: Defilement language in the allegory of Oholah and Oholibah
  english_pob_reading: Render the language as moral/cultic defilement without softening the sexual-infidelity metaphor.
  chosen_spanish_reading: Mantener el lenguaje de impureza/contaminación moral y cultual, sin rebajar la fuerza de la metáfora matrimonial y sexual.
  alternative_spanish_readings:
  - se había contaminado
  - había sido manchada
  rationale: El capítulo usa una imagen fuerte de infidelidad para describir deslealtad a Yahvé. «Se había vuelto impura» conserva la gravedad del texto y evita una paráfrasis moralmente diluida.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió un matiz más estativo en נִטְמָאָה («had become unclean») frente a una formulación más activa. En español se refleja con «se había vuelto impura», que mantiene ese valor resultativo sin perder la carga moral del pasaje. También se conserva la idea final de un camino compartido, con una sintaxis española más natural.
  spanish_consistency_notes:
  - Se usa «impura» para reflejar la impureza cultual/moral del verbo טמא en este contexto.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - «Camino» mantiene la metáfora bíblica de conducta compartida entre las dos hermanas.
