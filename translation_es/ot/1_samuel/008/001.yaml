translation:
  language: es
  text: Cuando Samuel envejeció[a], nombró a sus hijos jueces sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puso a sus hijos jueces para Israel». El verbo hebreo es literalmente «puso», y la preposición antes de «Israel» puede entenderse como «para» o «sobre», según cómo se conciba el nombramiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una circunstancia temporal. En español, «Cuando» comunica la relación temporal de manera natural sin forzar una calca idiomática.
- source_word: זָקֵן
  english_pob_choice: grew old
  chosen_spanish: envejeció
  alternatives_spanish:
  - fue viejo
  - se hizo viejo
  lexicon: HALOT
  rationale: El verbo expresa el paso a la vejez, no solo un estado estático. «Envejeció» conserva mejor ese matiz inceptivo en español actual.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - —
  lexicon: convención onomástica estándar
  rationale: Nombre propio transliterado según el uso habitual en español bíblico.
- source_word: וַיָּשֶׂם
  english_pob_choice: appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - estableció
  lexicon: HALOT
  rationale: El hebreo dice literalmente «puso/colocó». Dado que el contexto es un nombramiento funcional, «puso» mantiene la imagen verbal del hebreo y deja visible la base léxica; la noción de designación queda aclarada por el complemento «como jueces».
- source_word: אֶת בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: HALOT
  rationale: El hebreo especifica varones por el término «hijos»; en español, «hijos» puede ser genérico, pero aquí el referente es masculino. Se conserva la referencia genealógica natural en español sin añadir una marca innecesaria si el contexto ya la hace clara.
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - gobernantes
  - magistrados
  lexicon: HALOT
  rationale: El término designa la función judicial-política propia del libro de Samuel. «Jueces» reproduce el cargo con precisión y sin ampliar indebidamente el sentido.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - en Israel
  lexicon: HALOT
  rationale: La preposición puede entenderse en términos de esfera o autoridad. En este contexto de nombramiento, «sobre Israel» expresa bien la jurisdicción/función asignada.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético (WLC) y se alineó la lectura con el auditable English POB: fórmula temporal, valor inceptivo de «envejeció», verbo literal «puso» y la ambigüedad de לְיִשְׂרָאֵל reflejada en la nota.'
  spanish_consistency_notes:
  - Se prefirió «jueces» para mantener el cargo técnico del contexto de Samuel.
  - Se conservó «sobre Israel» en el texto principal, con la alternativa «para Israel» en nota para no perder la ambigüedad del preposición hebrea.
  - No se introdujo terminología confesional ajena al hebreo; el tono busca ser bíblico, claro y publicable en español neutro.
