base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/004/009.yaml
  text: And may the devout vindicate the judgment of their God when sinners are removed from before the righteous[a], one who speaks only to please men[c][b], with deceit.
  footnotes:
  - marker: a
    text: The Greek shifts from plural “sinners” to a singular participial description (“one speaking…”), likely characterizing the sinner generically; the wording is syntactically awkward in the transmitted text.
    reason: alternative_reading
  - marker: b
    text: Or “from the presence of the righteous one.”
    reason: lexical_alternative
  - marker: c
    text: Or 'And let the devout vindicate the judgment of their God when sinners are removed from before the righteous man, one speaking only to please a man with deceit.'.
    reason: previous_rendering
