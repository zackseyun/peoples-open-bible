revisions:
- from: Entonces los tres hombres valientes rompieron el campamento de los filisteos y sacaron agua del pozo de Belén que estaba junto a la puerta[a], y la llevaron y la trajeron a David. Pero él no quiso beberla; más bien[b], la derramó para Yahvé.
  to: Entonces los tres hombres valientes se abrieron paso por el campamento de los filisteos y sacaron agua del pozo de Belén que estaba junto a la puerta, y la llevaron y la trajeron a David. Pero él no quiso beberla; más bien[a], la derramó[b] a Yahvé.
  rationale: Se corrige el verbo principal a 'se abrieron paso por' para reflejar la idea militar de brecha/penetración en el campamento enemigo. Se restaura la nota léxica importante sobre el sufijo plural hebreo, que el borrador había reemplazado por una nota locativa no necesaria. También se ajusta 'para Yahvé' a 'a Yahvé' para seguir más de cerca לַיהוָה, dejando el matiz libacional en nota. No se requieren cambios doctrinales ni adjudicación adicional.
