translation:
  language: es
  text: Pero siendo mortal, fabrica una cosa muerta con manos inicuas; porque es mejor que las cosas que él venera[a], ya que él mismo una vez vivió, pero aquellas nunca vivieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "las cosas que él adora" para traducir con más literalidad τῶν σεβασμάτων αὐτοῦ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θνητὸς
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - sujeto a la muerte
  - destinado a morir
  lexicon: LSJ
  rationale: θνητός expresa la condición de estar sometido a la muerte. 'Mortal' es natural en español y conserva el contraste con el objeto inerte sin introducir paráfrasis.
- source_word: νεκρὸν
  english_pob_choice: a dead thing
  chosen_spanish: una cosa muerta
  alternatives_spanish:
  - un cadáver
  - algo muerto
  lexicon: LSJ
  rationale: El adjetivo funciona sustantivamente para lo que está muerto. 'Una cosa muerta' mantiene el tono polémico contra el ídolo y evita la imagen demasiado concreta de 'cadáver'.
- source_word: ἐργάζεται
  english_pob_choice: makes
  chosen_spanish: fabrica
  alternatives_spanish:
  - hace
  - produce
  - confecciona
  lexicon: LSJ
  rationale: En el contexto de fabricar ídolos, el verbo denota hacer o producir. 'Fabrica' comunica con claridad el trabajo artesanal implícito y suena natural en español.
- source_word: χερσὶν ἀνόμοις
  english_pob_choice: with lawless hands
  chosen_spanish: con manos inicuas
  alternatives_spanish:
  - con manos inicuas
  - con manos perversas
  - con manos sin ley
  lexicon: LSJ
  rationale: La frase es instrumental. ἀνόμοις puede significar 'sin ley' o 'impías'; 'inicuas' conserva la idea de acción contra la ley divina y mantiene un registro digno.
- source_word: κρείττων
  english_pob_choice: better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es superior
  - vale más
  lexicon: LSJ
  rationale: El comparativo expresa la superioridad del fabricante sobre el objeto idolátrico. 'Es mejor' es directo y suficientemente amplio para el contraste.
- source_word: τῶν σεβασμάτων αὐτοῦ
  english_pob_choice: the things he worships
  chosen_spanish: las cosas que él venera
  alternatives_spanish:
  - las cosas que él adora
  - los objetos que él venera
  - sus ídolos
  lexicon: LSJ
  rationale: σεβάσματα son cosas veneradas o adoradas. 'Venera' refleja el campo semántico de reverencia/adoración sin forzar de entrada el sustantivo 'ídolos', que sería más interpretativo aunque contextualmente posible.
- source_word: ἔζησεν
  english_pob_choice: once lived
  chosen_spanish: una vez vivió
  alternatives_spanish:
  - vivió
  - estuvo vivo alguna vez
  lexicon: LSJ
  rationale: El aoristo afirma que tuvo vida en algún momento. 'Una vez vivió' conserva el contraste temporal con los ídolos que nunca tuvieron vida.
- source_word: οὐδέποτε
  english_pob_choice: never did
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - nunca vivieron
  lexicon: LSJ
  rationale: El adverbio niega cualquier posesión pasada de vida por parte de aquellos objetos. 'Nunca' mantiene la brevedad y deja claro el contraste con el humano vivo.
theological_decisions:
- issue: Cómo traducir σεβάσματα en un contexto de crítica a la idolatría
  english_pob_reading: the things he worships
  chosen_spanish_reading: las cosas que él venera
  alternative_spanish_readings:
  - los ídolos
  - las cosas reverenciadas
  rationale: La lectura inglesa reciente preferida por la revisión es más directa y mantiene el sustantivo amplio. En español, 'las cosas que él venera' conserva el valor lexical de reverencia/adoración y evita reducir prematuramente el término a 'ídolos', aunque el contexto claramente lo implica.
  doctrine_reference: 'POB: primacía del idioma original con claridad moderna; anti-idolatría explícita sin sobreinterpretación'
- issue: Valor de θνητός frente al objeto muerto
  english_pob_reading: Yet being mortal
  chosen_spanish_reading: Pero siendo mortal
  alternative_spanish_readings:
  - Y siendo mortal
  - Aunque es mortal
  rationale: La concesión 'But/Yet' abre el contraste entre el ser humano perecedero y el ídolo inerte. 'Pero' reproduce ese giro sin añadir información ajena al texto.
  doctrine_reference: 'POB: contraste retórico del original preservado en español'
- issue: Sentido de χερσὶν ἀνόμοις
  english_pob_reading: with lawless hands
  chosen_spanish_reading: con manos inicuas
  alternative_spanish_readings:
  - con manos sin ley
  - con manos impías
  rationale: La expresión puede apuntar a ilegalidad moral y religiosa. 'Inicuas' comunica ambas dimensiones en español bíblico contemporáneo y evita un calco áspero.
  doctrine_reference: 'POB: mantener la fuerza ética del original sin traducir de modo rígido'
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde 'objects he worships' a 'things he worships' para un renderizado más directo de σεβασμάτων. La propuesta española sigue esa revisión usando una frase amplia ('las cosas que él venera') en lugar de restringirla a 'ídolos', aunque el contexto sigue siendo inequívocamente antiidolátrico.
  spanish_consistency_notes:
  - Se mantuvo 'mortal' para θνητός por consistencia con el uso POB y la oposición con lo inerte.
  - '''Una vez vivió'' conserva el matiz temporal del aoristo ἔζησεν.'
  - Se evitó 'SEÑOR' o terminología confesional no presente en el texto, porque aquí no aparece el Tetragrámaton ni κύριος.
  - '''Venera'' se escogió para σεβάσματα como término amplio y digno; la nota ofrece la alternativa más literal ''adora''.'
