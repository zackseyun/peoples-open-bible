translation:
  language: es
  text: Estos están entre los que se rebelan contra la luz[a]; no reconocen sus caminos[b], y no permanecen en sus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Estaban entre los rebeldes contra la luz». El verbo hebreo puede leerse en pasado («estaban»), pero en este contexto poético probablemente describe una clase de personas.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sus caminos ... sus sendas»; el sufijo se entiende normalmente como referido a «la luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Ellos
  lexicon: HALOT
  rationale: El demostrativo plural conserva el matiz de señalamiento o énfasis del pronombre independiente hebreo, mejor que un simple «ellos».
- source_word: הָיוּ
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - eran
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, en este contexto poético presenta una clase característica de personas. En español, el presente descriptivo («son») comunica mejor ese rasgo gnómico sin perder la idea de identificación de grupo.
- source_word: בְּמֹרְדֵי
  english_pob_choice: among those who rebel
  chosen_spanish: entre los que se rebelan
  alternatives_spanish:
  - entre los rebeldes
  - con los rebeldes
  lexicon: HALOT
  rationale: La construcción con ב + participio expresa pertenencia o inclusión dentro de un grupo. «Entre los que se rebelan» conserva el valor verbal de מרד y evita convertirlo solo en un sustantivo estático.
- source_word: אוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: El artículo ayuda en español a mantener la referencia conceptual casi personificada que tiene el hebreo, sin forzar una interpretación adicional.
- source_word: לֹא הִכִּירוּ
  english_pob_choice: do not recognize
  chosen_spanish: no reconocen
  alternatives_spanish:
  - no conocen
  - no admiten
  lexicon: HALOT
  rationale: הכיר puede significar reconocer, conocer o admitir. «No reconocen» encaja bien con «sus caminos» y preserva la noción de no percibir o no aceptar su dirección.
- source_word: דְרָכָיו
  english_pob_choice: its ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus caminos
  lexicon: HALOT
  rationale: Se conserva la relación con «la luz» como antecedente más natural. En español, «sus caminos» mantiene la imagen moral y el paralelismo con «sendas».
- source_word: וְלֹא יָשְׁבוּ
  english_pob_choice: and they do not stay
  chosen_spanish: y no permanecen
  alternatives_spanish:
  - y no se quedan
  - y no habitan
  lexicon: HALOT
  rationale: ישב aquí no es solo «sentarse», sino permanecer o habitar. «No permanecen» suena natural y conserva el valor durativo del hebreo.
- source_word: בִּנְתִיבֹתָיו
  english_pob_choice: in its paths
  chosen_spanish: en sus sendas
  alternatives_spanish:
  - en sus caminos
  - en sus veredas
  lexicon: HALOT
  rationale: נתיבות es un término poético para senda o camino trazado. «Sendas» preserva el paralelo poético y distingue este término de «caminos».
theological_decisions:
- issue: Referencia del sufijo posesivo en "sus caminos / sus sendas"
  english_pob_reading: The suffixes refer to "light," rendered as "its ways" and "its paths."
  chosen_spanish_reading: Los sufijos se entienden referidos a «la luz», por eso se traduce «sus caminos» y «sus sendas».
  alternative_spanish_readings:
  - «sus caminos» y «sus sendas» referidos a un antecedente personal implícito
  - «sus caminos» y «sus sendas» con personificación más fuerte de la luz
  rationale: El antecedente inmediato y gramatical es אוֹר, «luz», sustantivo masculino singular. En español, mantener «sus» evita imponer una personalización explícita que el hebreo no exige, pero sí deja la tensión poética de una luz con caminos y sendas.
  doctrine_reference: Preservar la tensión literaria y la primacía del texto original sobre una tradicionalización explicativa.
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca el hebreo de Job 24:13 y el audit trail inglés: mantiene la lectura descriptiva presente de la clase rebelde, conserva la relación posesiva con «la luz», y evita resolver en exceso la personificación poética del verso.'
  spanish_consistency_notes:
  - Se usa «luz» en lugar de una abstracción más interpretativa para conservar el campo semántico del hebreo.
  - «Caminos» y «sendas» se diferencian para reflejar el paralelismo poético entre דְרָכִים y נְתִיבוֹת.
  - Se mantiene un español moderno y digno, sin recurrir a fórmulas tradicionales que oculten el sentido del texto fuente.
