translation:
  language: es
  text: cualquier oración[a], cualquier súplica que se haga por cualquier hombre o por todo tu pueblo, Israel, sabiendo cada uno su propia aflicción y su propio dolor, y extendiendo las manos hacia esta casa—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por cualquier persona'. El hebreo usa אָדָם en sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל תְּפִלָּה
  english_pob_choice: whatever prayer
  chosen_spanish: cualquier oración
  alternatives_spanish:
  - toda oración
  - cualquier plegaria
  lexicon: HALOT
  rationale: כָּל con תְּפִלָּה introduce una referencia amplia e indefinida; en español, 'cualquier oración' preserva esa amplitud sin sonar rígido ni demasiado interpretativo.
- source_word: כָל תְּחִנָּה
  english_pob_choice: whatever plea
  chosen_spanish: cualquier súplica
  alternatives_spanish:
  - toda súplica
  - cualquier petición
  lexicon: HALOT
  rationale: תְּחִנָּה expresa una petición ferviente de favor o misericordia. 'Súplica' conserva ese matiz en español moderno y mantiene la distinción con 'oración'.
- source_word: אֲשֶׁר יִהְיֶה
  english_pob_choice: may be made
  chosen_spanish: que pueda ser hecha
  alternatives_spanish:
  - que haya
  - que se presente
  lexicon: HALOT
  rationale: La construcción relativa con היה introduce la oración como algo que llega a existir o se ofrece. 'Que pueda ser hecha' reproduce esa idea sin alejarse del valor verbal del hebreo.
- source_word: לְכָל הָאָדָם
  english_pob_choice: by any man
  chosen_spanish: por cualquier hombre
  alternatives_spanish:
  - por cualquier persona
  - para cualquier hombre
  lexicon: HALOT
  rationale: Se conserva la fuerza genérica del singular hebreo אָדָם con 'hombre', en línea con la decisión de POB de mantener el valor representativo masculino del texto base.
- source_word: וּלְכֹל עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: or by all your people Israel
  chosen_spanish: o por todo tu pueblo Israel
  alternatives_spanish:
  - y por todo tu pueblo Israel
  - o por todo tu pueblo, Israel
  lexicon: HALOT
  rationale: El paralelismo pasa del individuo al pueblo del pacto. 'O' refleja la distribución hebrea mejor que un 'y' simple, y 'tu pueblo Israel' sigue de cerca la estructura del original.
- source_word: אֲשֶׁר יֵדְעוּ אִישׁ
  english_pob_choice: each knowing
  chosen_spanish: cada uno conociendo
  alternatives_spanish:
  - cada cual conociendo
  - cuando cada uno conoce
  lexicon: HALOT
  rationale: La cláusula relativa describe a los que oran de manera distributiva. 'Cada uno conociendo' conserva el flujo sintáctico y el valor de איש distributivo.
- source_word: נִגְעוֹ
  english_pob_choice: his own affliction
  chosen_spanish: su propia aflicción
  alternatives_spanish:
  - su propia plaga
  - su propio golpe
  lexicon: HALOT
  rationale: נֶגַע puede abarcar plaga, golpe o aflicción. 'Aflicción' es suficientemente amplio para el contexto y evita reducir el término a una sola clase de sufrimiento.
- source_word: וּמַכְאֹבוֹ
  english_pob_choice: and his own pain
  chosen_spanish: y su propio dolor
  alternatives_spanish:
  - y su propio sufrimiento
  - y su propio padecimiento
  lexicon: HALOT
  rationale: מַכְאוֹב denota dolor o sufrimiento. 'Dolor' mantiene la relación cercana con 'aflicción' sin borrar la diferencia entre ambos sustantivos.
- source_word: וּפָרַשׂ כַּפָּיו
  english_pob_choice: and spreading out his hands
  chosen_spanish: y extendiendo sus manos
  alternatives_spanish:
  - y alzando sus manos
  - y desplegando sus palmas
  lexicon: HALOT
  rationale: La expresión es una postura de oración reconocible. 'Extendiendo sus manos' es natural en español y conserva la imagen corporal del hebreo sin volverla técnica o litúrgica.
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - a esta casa
  - en dirección a esta casa
  lexicon: HALOT
  rationale: En contexto de oración, אֶל marca orientación espacial. 'Hacia' comunica bien esa dirección física y simbólica.
theological_decisions:
- issue: אָדָם como genérico singular masculino
  english_pob_reading: by any man
  chosen_spanish_reading: por cualquier hombre
  alternative_spanish_readings:
  - por cualquier persona
  - por cualquier ser humano
  rationale: Se mantiene la fuerza genérica masculina del hebreo, siguiendo el principio de precisión de género cuando el texto usa una forma masculina representativa. Se preserva, sin embargo, una lectura comprensible para el lector moderno.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms: אָדָם adam'
- issue: Distinción entre oración y súplica
  english_pob_reading: whatever prayer, whatever plea
  chosen_spanish_reading: cualquier oración, cualquier súplica
  alternative_spanish_readings:
  - toda oración, toda súplica
  - cualquier plegaria, cualquier petición
  rationale: Se conserva el doblete hebreo תְּפִלָּה / תְּחִנָּה con dos términos españoles cercanos pero no idénticos, para no borrar la matización entre oración general y súplica insistente.
  doctrine_reference: HALOT; distinción semántica del paralelo hebreo
translation_notes:
  revision_awareness: Se ajustó la redacción para incluir el marcador de nota [a] en el texto principal, corrigiendo el fallo previo de validación por falta de anclaje. Se mantuvo la equivalencia óptima con el audit trail inglés y la distinción entre oración/súplica, aflicción/dolor, y la orientación hacia la casa.
  spanish_consistency_notes:
  - Se conservó el paralelismo doble 'cualquier oración, cualquier súplica'.
  - '''Casa'' se mantiene para הַבַּיִת, en continuidad con el uso del templo/santuario en este contexto.'
  - Se prefirió 'hacia' para la orientación de la oración, evitando una simple traslación direccional que sonaría menos natural en español.
