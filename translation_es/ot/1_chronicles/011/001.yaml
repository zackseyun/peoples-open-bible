review_pass:
  verdict: revise
  source_alignment_summary: 'La base del sentido está bien preservada: reunión corporativa de todo Israel con David en Hebrón, introducción del discurso y el modismo de parentesco mantenido literalmente. Sin embargo, «se reunieron con David» debilita la dirección de אֶל («a David») y «Mira» rebaja algo el registro formal que el rastro POB fijó como «Behold».'
  spanish_quality_summary: El borrador es legible y natural, pero puede mejorarse para mayor fidelidad y mejor registro bíblico en español. «Entonces todo Israel se reunió con David» es más idiomático que el orden actual, y «He aquí» o «Miren» serviría mejor que «Mira»; dado el tono digno y la singularidad del destinatario, «He aquí» encaja mejor. También conviene eliminar la nota de Hebrón, ya que no hay ambigüedad que requiera nota en español.
  glossary_alignment: No hay términos del glosario mayor en juego. El proyecto privilegia mantener modismos significativos cercanos a la fuente; por eso debe conservarse «tu hueso y tu carne». La decisión POB inglesa documenta preferencia por un registro algo más formal para הִנֵּה, lo cual en español favorece «He aquí» sobre «Mira».
  issues:
  - severity: medium
    issue: «con David» para אֶל דָּוִיד
    rationale: El hebreo marca movimiento hacia David. «Con David» suena más comitativo que direccional; «a David» preserva mejor la relación espacial y política del original sin volverse antinatural en español.
  - severity: medium
    issue: «Mira» para הִנֵּה
    rationale: Aunque comprensible, introduce un tono más coloquial y singular conversacional. El rastro POB revisó al inglés hacia un registro más formal («Behold»). En español bíblico legible, «He aquí» refleja mejor esa fuerza deíctica con dignidad.
  - severity: low
    issue: Nota al pie en «Hebrón[a]»
    rationale: La nota adjunta no explica Hebrón sino la alternativa idiomática del modismo de parentesco. Debe anclarse en la frase relevante, no en el topónimo, para evitar confusión.
  revised_spanish_text: 'Entonces todo Israel se reunió a David en Hebrón, diciendo: «He aquí, somos tu hueso y tu carne[a]».

