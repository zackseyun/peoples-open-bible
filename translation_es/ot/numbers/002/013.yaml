translation:
  language: es
  text: 'y su división, los censados de entre ellos: cincuenta y nueve mil trescientos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: and his division
  chosen_spanish: y su división
  alternatives_spanish:
  - y su ejército
  - y su host
  - y su contingente
  lexicon: HALOT
  rationale: En este contexto de censo y orden de campamento, צָבָא se refiere a la unidad organizada del grupo, no a una guerra en curso. «División» conserva la idea de contingente ordenado y evita el tono demasiado militar de «ejército» o el arcaísmo de «host».
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los enumerados de entre ellos
  - los mustrados de entre ellos
  - los registrados de entre ellos
  lexicon: HALOT
  rationale: פקד aquí expresa la gente incluida en el censo. «Los contados de ellos» mantiene la relación con el grupo de procedencia y conserva el sentido de personas censadas sin añadir más especificación que la fuente no exige.
- source_word: תִּשְׁעָה וַחֲמִשִּׁים אֶלֶף
  english_pob_choice: fifty-nine thousand
  chosen_spanish: cincuenta y nueve mil
  alternatives_spanish:
  - nueve y cincuenta mil
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «nueve y cincuenta mil», pero en español contemporáneo la cifra natural y exacta es «cincuenta y nueve mil».
- source_word: וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - y trescientos
  lexicon: HALOT
  rationale: Completa el total del censo. En español, la unión normal dentro de este número es «cincuenta y nueve mil trescientos», sin repetir una conjunción interna innecesaria.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una equivalencia óptima sin notas; el español sigue la misma línea, conservando el valor numérico exacto y la distinción organizativa de צָבָא y פְקֻדֵיהֶם sin intensificar indebidamente el matiz militar.
  spanish_consistency_notes:
  - Se usó «división» para צָבָא según el contexto censal y campamental.
  - Se evitó «ejército» por sobredeterminar el matiz bélico.
  - El total numérico se normalizó a la forma idiomática española, manteniendo el valor exacto.
