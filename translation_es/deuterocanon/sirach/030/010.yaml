translation:
  language: es
  text: No te rías con él[a], para que no compartas su dolor, y al final rechinarás los dientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No rías con él ... y al final rechinarás los dientes». El griego permite una formulación algo más formal, pero el sentido es el mismo: la risa indulgente ahora termina en aflicción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ συγγελάσῃς
  english_pob_choice: Do not laugh with him
  chosen_spanish: No te rías con él
  alternatives_spanish:
  - No te unas a su risa
  - No rías con él
  lexicon: LSJ
  rationale: El compuesto sugiere participar en la risa del otro. En español, «te rías con él» comunica con naturalidad la participación en esa risa, sin perder el matiz de complicidad o indulgencia que el contexto advierte.
- source_word: συνοδυνηθῇς
  english_pob_choice: share his pain
  chosen_spanish: compartas su dolor
  alternatives_spanish:
  - sufras con él
  - participes de su dolor
  lexicon: LSJ
  rationale: El verbo indica sufrir o dolerse junto con otro. «Compartas su dolor» conserva la idea de participación en la aflicción y suena idiomático en español actual.
- source_word: ἐπʼ ἐσχάτῳ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - al cabo
  - al fin
  - en el postrer momento
  lexicon: LSJ
  rationale: La expresión apunta al desenlace o resultado final. «Al final» expresa con claridad temporal la consecuencia advertida.
- source_word: γομφιάσεις
  english_pob_choice: you will gnash
  chosen_spanish: rechinarás
  alternatives_spanish:
  - crujirás
  - apretarás
  - rechinarás los dientes
  lexicon: LSJ
  rationale: Con «los dientes» el verbo expresa rechinar o crujirlos por angustia o frustración. El español permite omitir la repetición verbal y mantenerla implícita en la frase completa, aunque la forma usual completa también es válida.
- source_word: τοὺς ὀδόντας σου
  english_pob_choice: your teeth
  chosen_spanish: los dientes
  alternatives_spanish:
  - tus dientes
  lexicon: LSJ
  rationale: Es el objeto directo del modismo y se mantiene de forma transparente en español. La repetición posesiva puede quedar implícita por el verbo conjugado.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que prefirió «laugh with him» frente a una paráfrasis más explícita. La versión española conserva ese grado de literalidad natural, con un verbo pronominal idiomático («te rías») y el mismo encadenamiento causal y temporal.
  spanish_consistency_notes:
  - Se usa «dolor» para συνοδυν- siguiendo el valor de sufrimiento compartido; no se introduce una lectura doctrinal ajena.
  - Se evita «SEÑOR» u otra terminología no pertinente; el texto no contiene vocabulario divino ni cristológico.
  - El modismo final se mantiene concreto con «rechinarás los dientes», que es la expresión española más directa y fiel.
