translation:
  language: es
  text: y las cuatrocientas granadas para las dos celosías[a], dos hileras de granadas para cada celosía, para cubrir los dos capiteles en forma de cuenco[b] que estaban sobre los pilares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Celosías» también puede traducirse como «redes». El término hebreo se refiere al trabajo ornamental reticulado de los capiteles.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los dos cuencos de los capiteles». El hebreo usa esta imagen para las partes superiores redondeadas de los capiteles.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִמּוֹנִים
  english_pob_choice: pomegranates
  chosen_spanish: granados
  alternatives_spanish:
  - granadas ornamentales
  - pomegranadas
  lexicon: HALOT
  rationale: En este contexto ornamental, el hebreo designa la forma de la fruta representada decorativamente. «Granados» conserva la imagen básica y es natural en español; «granadas ornamentales» explicita el uso decorativo, pero añade más que el texto exige.
- source_word: אַרְבַּע מֵאוֹת
  english_pob_choice: four hundred
  chosen_spanish: cuatrocientos
  alternatives_spanish:
  - cuatrocientos exactos
  lexicon: HALOT
  rationale: Es un cardinal directo y debe conservarse sin expansión interpretativa.
- source_word: שְּׂבָכוֹת
  english_pob_choice: latticeworks
  chosen_spanish: celosías
  alternatives_spanish:
  - redes
  - rejas ornamentales
  lexicon: HALOT
  rationale: El término apunta a una obra reticulada u ornamental. «Celosías» comunica bien la idea de entramado decorativo en español sin perder la referencia arquitectónica; «redes» es posible, pero menos preciso en este contexto.
- source_word: שְׁנַיִם טוּרִים
  english_pob_choice: two rows
  chosen_spanish: dos hileras
  alternatives_spanish:
  - dos filas
  - dos líneas
  lexicon: HALOT
  rationale: טוּרִים indica disposición en filas o hileras. «Hileras» suena natural y preserva la ordenación lineal.
- source_word: לַשְּׂבָכָה הָאֶחָת
  english_pob_choice: for each latticework
  chosen_spanish: para cada celosía
  alternatives_spanish:
  - para la una celosía
  - para una celosía
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, el sentido es distributivo respecto de las dos estructuras. «Para cada celosía» expresa ese valor sin forzar una literalidad poco natural en español.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - para tapar
  - para recubrir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Cubrir» es la opción más directa y sobria; «recubrir» podría sonar más técnico de lo necesario.
- source_word: גֻּלּוֹת
  english_pob_choice: bowl-shaped
  chosen_spanish: cazoletas
  alternatives_spanish:
  - copas
  - formas redondeadas
  - boles
  lexicon: HALOT
  rationale: El hebreo describe formas redondeadas, tipo cuenco. «Cazoletas» permite conservar la imagen de concavidad/abultamiento sin recurrir a una perífrasis demasiado larga; mantiene mejor la relación con los capiteles.
- source_word: כֹּתָרוֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - coronas
  - capiteles de columna
  lexicon: HALOT
  rationale: En contexto arquitectónico se trata de los remates superiores de las columnas. «Capiteles» es el término preciso en español.
- source_word: עַל פְּנֵי הָעַמּוּדִים
  english_pob_choice: on top of the pillars
  chosen_spanish: sobre los pilares
  alternatives_spanish:
  - encima de los pilares
  - en la parte superior de los pilares
  lexicon: HALOT
  rationale: La ubicación espacial se entiende como la parte superior de las columnas/pilares. «Sobre» reproduce bien la relación sin sobrecargar la frase.
translation_notes:
  revision_awareness: El inglés auditado fue revisado mínimamente para naturalidad («on top of the pillars»); la presente versión española conserva el contenido y la estructura informativa del texto fuente, incluyendo la distribución de los granados y la imagen arquitectónica de los capiteles.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - 'Se optó por terminología arquitectónica consistente: «celosías», «hileras», «capiteles», «pilares».'
  - Se conservó la imagen concreta de los «granados» sin convertirla en una glosa interpretativa más amplia.
