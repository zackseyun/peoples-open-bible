translation:
  language: es
  text: porque me han abandonado y han hecho ofrendas[a] a otros dioses, para provocarme a ira con toda la obra de sus manos. Por eso mi ira se ha encendido contra este lugar, y no se apagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «han quemado incienso a otros dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּ֣חַת אֲשֶׁ֣ר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La locución introduce la causa o fundamento del juicio. «Porque» transmite de manera natural y fiel la relación causal sin volverla forzada en español.
- source_word: עֲזָבוּנִי
  english_pob_choice: they have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: «Abandonar» conserva la idea relacional y de ruptura del pacto mejor que un simple «dejar». Se mantiene el perfecto con relevancia presente.
- source_word: וַיְקַטְּרוּ
  english_pob_choice: have made offerings
  chosen_spanish: han hecho ofrendas
  alternatives_spanish:
  - han quemado incienso
  - han ofrecido incienso
  lexicon: HALOT
  rationale: Se sigue la decisión inglesa de no estrechar indebidamente el verbo a «incienso» en el texto principal. «Hacer ofrendas» comunica el acto cultual sin perder amplitud; la opción más específica queda reflejada en la nota.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses extraños
  - a dioses ajenos
  lexicon: HALOT
  rationale: Es la forma más directa y transparente para el lector español. «Otros dioses» preserva la oposición explícita a Yahvé.
- source_word: לְמַעַן הַכְעִיסֵנִי
  english_pob_choice: in order to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - a fin de provocarme a ira
  - para irritarme
  lexicon: HALOT
  rationale: «Para provocarme a ira» refleja el valor final/resultado de לְמַעַן y conserva la fuerza emotiva y judicial del hebreo. Se evita suavizarlo a lenguaje impersonal.
- source_word: בְּכֹל מַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: by all the work of their hands
  chosen_spanish: por todo el trabajo de sus manos
  alternatives_spanish:
  - mediante toda la obra de sus manos
  - con todo lo que han hecho
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática del hebreo, entendible en español. «Trabajo» mantiene la materialidad de las acciones/idolatrías producidas por ellos.
- source_word: וְנִצְּתָה
  english_pob_choice: has been kindled
  chosen_spanish: ha sido encendido
  alternatives_spanish:
  - ha sido encendida
  - se ha inflamado
  lexicon: HALOT
  rationale: Se conserva la metáfora del fuego para la ira divina. «Ha sido encendido» reproduce la imagen de un fuego iniciado, en paralelo con «no se apagará».
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi ira
  - mi enojo
  lexicon: HALOT
  rationale: «Furor» comunica bien la intensidad de חֵמָה/חֲמָה sin rebajar la fuerza del término. En español mantiene el tono solemne del juicio divino.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: against this place
  chosen_spanish: contra este lugar
  alternatives_spanish:
  - sobre este lugar
  - en este lugar
  lexicon: HALOT
  rationale: Aunque el hebreo usa una preposición locativa, el contexto de juicio en español se expresa con naturalidad mediante «contra». Mantiene el objeto del castigo sin perder fidelidad semántica.
- source_word: וְלֹא תִכְבֶּה
  english_pob_choice: and it shall not be quenched
  chosen_spanish: y no se apagará
  alternatives_spanish:
  - y no será apagado
  - y no se extinguirá
  lexicon: HALOT
  rationale: «Apagarse» conserva la metáfora del fuego de manera natural en español. Aunque «no se apagará» es algo más idiomático que «no será extinguido», sigue transmitiendo la irreversibilidad del juicio.
theological_decisions:
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: Retain the language of God being provoked to anger and his wrath being kindled
  chosen_spanish_reading: Conservar que Dios es provocado a ira y que su furor es encendido
  alternative_spanish_readings:
  - su juicio se activa
  - se desata su castigo
  rationale: El hebreo usa lenguaje relacional y afectivo para el juicio divino; la traducción española lo preserva en lugar de volverlo abstracto. Así se mantiene la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3
- issue: Imagen del fuego para el juicio divino
  english_pob_reading: Preserve the fire metaphor in 'has been kindled' and 'shall not be quenched'
  chosen_spanish_reading: Preservar la metáfora del fuego en «ha sido encendido» y «no se apagará»
  alternative_spanish_readings:
  - será destruido
  - permanecerá firme
  rationale: La frase hebrea presenta la ira como fuego que arde y no puede apagarse. La versión española conserva esa imagen para no debilitar la fuerza literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del audit trail, que ajustó la relación causal de לְמַעַן a una fórmula más directa («in order to provoke me to anger»). En español se reflejó como «para provocarme a ira», y se mantuvo la decisión de no estrechar וַיְקַטְּרוּ a «incienso» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito por economía del versículo, ya que aquí el hebreo usa la primera persona divina («me»).
  - 'Se conservó el paralelismo de juicio con lenguaje de fuego: «ha sido encendido / no se apagará».'
  - La elección «furor» se usó para mantener la intensidad del sustantivo hebreo sin añadir connotaciones ajenas.
