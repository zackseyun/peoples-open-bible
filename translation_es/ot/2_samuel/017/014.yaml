revisions:
- from: 'Entonces Absalón y todo hombre de Israel dijeron[a]: «El consejo de Husai el arquita es mejor que el consejo de Ahitofel». Porque Yahvé había determinado frustrar[b] el buen consejo de Ahitofel, para traer desgracia sobre Absalón.'
  to: 'Entonces Absalón y todos los hombres de Israel dijeron[a]: «El consejo de Husai el arquita es mejor que el consejo de Ahitofel». Porque Yahvé había determinado frustrar[b] el buen consejo de Ahitofel, para que Yahvé trajera calamidad[c] sobre Absalón.'
  rationale: La revisión conserva mejor el texto fuente al restaurar el segundo ‘Yahvé’ explícito, corrige la nota [a] para que refleje la alternativa realmente pertinente, mejora la naturalidad de ‘todos los hombres de Israel’, y añade una nota para הָרָעָה conforme al POB inglés y al contexto judicial del pasaje.
