  rationale: Se reubica y reescribe la nota [b] para que explique correctamente el pronombre de «la cubrirá», que es donde está la verdadera ambigüedad señalada por el POB inglés. Además, se suaviza «cace presa» a «cace alguna pieza» para un español más natural sin apartarse del sentido hebreo.
