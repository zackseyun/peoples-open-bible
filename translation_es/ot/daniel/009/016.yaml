translation:
  language: es
  text: Señor[a], conforme a todos tus actos de justicia, te ruego que tu enojo y tu ira se aparten de tu ciudad Jerusalén, tu santo monte; porque, a causa de nuestros pecados y de las iniquidades de nuestros padres[b], Jerusalén y tu pueblo son un oprobio para todos los que nos rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi Señor' u 'oh Señor'. El hebreo tiene אֲדֹנָי, un título/vocativo reverente dirigido a Dios, no el nombre divino יהוה.
    reason: lexical_alternative
  - marker: b
    text: ‘Nuestros padres’ se refiere a las generaciones anteriores/antepasados del pueblo, no solo a los padres inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Oh Señor
  lexicon: HALOT
  rationale: En este contexto de oración directa y confesional, el nombre divino se expresa con el término del proyecto para יהוה. Aunque אֲדֹנָי puede leerse como título vocativo, el audit trail en inglés usa 'Lord' como dirección a Dios; en español, 'Yahvé' evita la ocultación del nombre y mantiene la distinción entre nombre divino y título.
- source_word: כְּכָל
  english_pob_choice: according to all
  chosen_spanish: conforme a todos
  alternatives_spanish:
  - según todos
  - de acuerdo con todos
  lexicon: HALOT
  rationale: La preposición כ con כָּל marca medida o norma. 'Conforme a' conserva la idea de actuar en correspondencia con la totalidad de los actos justos de Dios sin sonar forzado en español.
- source_word: צִדְקֹתֶיךָ
  english_pob_choice: your righteous acts
  chosen_spanish: tus actos de justicia
  alternatives_spanish:
  - tus justicias
  - tu justicia
  - tus actos de rectitud
  lexicon: HALOT
  rationale: El plural hebreo sugiere acciones concretas más que una cualidad abstracta. 'Actos de justicia' preserva el plural y la fuerza concreta, y deja abierta la tensión entre justicia/rectitud que el inglés POB anotó.
- source_word: יָשָׁב נָא
  english_pob_choice: please let ... turn away
  chosen_spanish: te ruego que ... se aparten
  alternatives_spanish:
  - por favor, que ... se vuelvan atrás
  - te ruego que ... se retiren
  lexicon: HALOT
  rationale: El jussivo con נָא expresa súplica. Con 'enojo e ira' como sujetos, 'se aparten' comunica bien la idea de apartarse o retirarse sin forzar un calco de 'volver'.
- source_word: אַפְּךָ
  english_pob_choice: your anger
  chosen_spanish: tu enojo
  alternatives_spanish:
  - tu ira
  - tu furor
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal para la ira. 'Enojo' es claro y natural; se distingue de 'ira', que aparece para la segunda palabra del par.
- source_word: וַחֲמָתְךָ
  english_pob_choice: and your wrath
  chosen_spanish: y tu ira
  alternatives_spanish:
  - y tu furor
  - y tu indignación
  lexicon: HALOT
  rationale: Se mantiene la pareja intensificada del texto hebreo. 'Ira' conserva el registro elevado y la diferencia con 'enojo'.
- source_word: מֵעִירְךָ יְרוּשָׁלַם
  english_pob_choice: from your city Jerusalem
  chosen_spanish: de tu ciudad Jerusalén
  alternatives_spanish:
  - de Jerusalén, tu ciudad
  - fuera de tu ciudad Jerusalén
  lexicon: HALOT
  rationale: El מן indica el punto desde el cual debe apartarse la ira. La estructura posesiva se mantiene de modo natural en español.
- source_word: הַר קָדְשֶׁךָ
  english_pob_choice: your holy mountain
  chosen_spanish: tu monte santo
  alternatives_spanish:
  - tu montaña santa
  - el monte de tu santidad
  lexicon: HALOT
  rationale: La apposición identifica a Jerusalén con el monte santo de Sion. 'Monte santo' es la forma más natural y fiel en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. 'Porque' preserva el valor causal de forma directa y clara.
- source_word: בַחֲטָאֵינוּ
  english_pob_choice: through our sins
  chosen_spanish: a causa de nuestros pecados
  alternatives_spanish:
  - por nuestros pecados
  - debido a nuestros pecados
  lexicon: HALOT
  rationale: La preposición ב aquí es causal/instrumental. 'A causa de' expresa bien que la situación de vergüenza surge por nuestros pecados.
- source_word: וּבַעֲוֹנֹת אֲבֹתֵינוּ
  english_pob_choice: and the iniquities of our fathers
  chosen_spanish: y de las iniquidades de nuestros padres
  alternatives_spanish:
  - y de los pecados de nuestros padres
  - y de la culpa de nuestros padres
  lexicon: HALOT
  rationale: עָוֹן lleva la idea de iniquidad/culpa, no solo 'pecado'. 'Nuestros padres' conserva el sentido de generaciones previas y sigue el audit trail inglés.
- source_word: יְרוּשָׁלַם וְעַמְּךָ
  english_pob_choice: Jerusalem and your people
  chosen_spanish: Jerusalén y tu pueblo
  alternatives_spanish:
  - Jerusalén y tu gente
  - Jerusalén, junto con tu pueblo
  lexicon: HALOT
  rationale: La coordinación es directa y el paralelismo se conserva sin añadir explicaciones.
- source_word: לְחֶרְפָּה
  english_pob_choice: to a reproach
  chosen_spanish: son un oprobio
  alternatives_spanish:
  - son un reproche
  - están en oprobio
  lexicon: HALOT
  rationale: El lamed marca estado resultante. 'Oprobio' expresa mejor la vergüenza pública y el peso honor-shame del hebreo que una simple 'vergüenza'.
- source_word: לְכָל סְבִיבֹתֵינוּ
  english_pob_choice: to all those around us
  chosen_spanish: para todos los que nos rodean
  alternatives_spanish:
  - ante todos los de alrededor
  - para todas las naciones vecinas
  lexicon: HALOT
  rationale: La referencia apunta a los circundantes sin especificar etnia. 'Los que nos rodean' conserva amplitud y naturalidad.
theological_decisions:
- issue: Nombre divino frente a título vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Oh Señor
  rationale: El hebreo usa אֲדֹנָי como vocativo, pero el proyecto español normaliza יהוה como 'Yahvé'. Dado que el versículo es una oración a Dios y no hay ambigüedad con un señor humano, la forma con nombre divino es la más transparente y coherente con la política del proyecto.
  doctrine_reference: Terminología del proyecto POB para יהוה
- issue: Plural de צִדְקֹתֶיךָ y tensión justicia/rectitud
  english_pob_reading: your righteous acts
  chosen_spanish_reading: tus actos de justicia
  alternative_spanish_readings:
  - tus justicias
  - tu justicia
  - tus actos de rectitud
  rationale: El plural hebreo apunta a hechos concretos de justicia. 'Actos de justicia' mantiene el plural y no disuelve la tensión entre justicia, rectitud y actos salvíficos que el inglés documenta.
  doctrine_reference: Translation philosophy §3; tensión lexical sobre δικαιοσύνη por analogía
- issue: Confesión corporativa e intergeneracional
  english_pob_reading: our sins and the iniquities of our fathers
  chosen_spanish_reading: nuestros pecados y las iniquidades de nuestros padres
  alternative_spanish_readings:
  - nuestros pecados y los pecados de nuestros antepasados
  - nuestros pecados y la culpa de nuestros padres
  rationale: El texto une el pecado presente del pueblo con la iniquidad de generaciones previas. 'Padres' conserva la referencia a antepasados sin neutralizarla innecesariamente y mantiene la dimensión corporativa de la confesión.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del audit trail inglés: usa una cláusula causal directa con porque, conserva la estructura de súplica para el alejamiento de la ira divina, y refleja el estado resultante con un presente verbal simple (''son un oprobio'') en lugar de un perfecto compuesto. También mantiene la doble referencia a pecados presentes e iniquidades de los antepasados.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en todo el texto.
  - '''Actos de justicia'' conserva el plural hebreo de צִדְקֹתֶיךָ y evita reducirlo a una sola ''justicia''.'
  - '''Pecados'' y ''iniquidades'' se distinguen para reflejar חטאים / עוונות sin fusionarlos.'
  - '''Oprobio'' conserva el valor de vergüenza pública y reproche comunitario del hebreo.'
