translation:
  language: es
  text: 'Entonces Sadoc, el sacerdote, tomó el cuerno de aceite de la tienda[a] y ungió a Salomón. Entonces tocaron el cuerno de carnero[b], y todo el pueblo dijo: «¡Viva el rey Salomón!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del tabernáculo»; el hebreo dice simplemente «de la tienda».
    reason: alternative_reading
  - marker: b
    text: O «tocaron la trompeta»; el hebreo shofar es un cuerno-trumpeta, a menudo de carnero.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: Sadoc, el sacerdote
  alternatives_spanish:
  - Sadoc el sacerdote
  - Sadoc, el sumo sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se conserva la aposición del oficio. «El sacerdote» refleja directamente הַכֹּהֵן sin añadir el matiz de «sumo» que no está en el hebreo.
- source_word: קֶרֶן הַשֶּׁמֶן
  english_pob_choice: the horn of oil
  chosen_spanish: el cuerno de aceite
  alternatives_spanish:
  - el cuerno lleno de aceite
  - el frasco de aceite
  lexicon: HALOT
  rationale: «Cuerno» mantiene la imagen concreta del recipiente ritual. «De aceite» sigue el genitivo hebreo sin convertirlo en una paráfrasis más explicativa que el original.
- source_word: מִן הָאֹהֶל
  english_pob_choice: from the tent
  chosen_spanish: de la tienda
  alternatives_spanish:
  - del tabernáculo
  - de la tienda sagrada
  lexicon: HALOT
  rationale: Se conserva el sustantivo común «tienda», como en el hebreo, sin sustituirlo por un término técnico más específico que el texto no usa. En español, «de la tienda» fluye con naturalidad y sigue siendo fiel al matiz del audit trail inglés.
- source_word: וַיִּמְשַׁח
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - anotó
  - consagró con aceite
  lexicon: HALOT
  rationale: «Ungió» es el equivalente bíblico natural en español para el acto ritual de משׁח. Mantiene el sentido de investidura real sin explicitar más de lo que el verbo requiere.
- source_word: וַיִּתְקְעוּ בַּשּׁוֹפָר
  english_pob_choice: they blew the ram’s horn
  chosen_spanish: tocaron el cuerno
  alternatives_spanish:
  - tocaron el shofar
  - sonaron el cuerno de carnero
  lexicon: HALOT
  rationale: El hebreo dice literalmente שׁוֹפָר; el POB inglés opta por «ram’s horn» para aclarar el referente. En español, «cuerno» preserva la imagen básica y evita una sobreespecificación innecesaria en el texto principal; la nota explica la alternativa léxica.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo allí
  - la gente toda
  lexicon: HALOT
  rationale: «Todo el pueblo» reproduce la colectividad pública del hebreo y mantiene el registro solemne de la aclamación.
- source_word: יְחִי הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: Long live King Solomon!
  chosen_spanish: ¡Viva el rey Salomón!
  alternatives_spanish:
  - ¡Larga vida al rey Salomón!
  - ¡Que viva el rey Salomón!
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o aclamación. «¡Viva el rey Salomón!» es la fórmula española más natural y fiel al valor performativo del hebreo.
theological_decisions:
- issue: Specificidad de הָאֹהֶל en un contexto de unción real
  english_pob_reading: the tent
  chosen_spanish_reading: la tienda
  alternative_spanish_readings:
  - el tabernáculo
  - la tienda sagrada
  rationale: El texto hebreo usa el sustantivo común «tienda». Aunque el contexto probablemente es cultual, la traducción conserva la forma no técnica para no introducir una especificación que el original no hace. La nota permite ver la alternativa tradicional sin convertirla en el texto principal.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión sin cambios sustantivos: el audit trail inglés mantiene alta concordancia y no registra revisiones aplicadas. La redacción española sigue esa línea estable, preservando la imagen ritual, la secuencia narrativa y la aclamación real sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera sistemática solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo» porque el pasaje trata del rey Salomón, no de lenguaje mesiánico cristológico.
  - Se mantiene la distinción entre «ungió» (acto ritual) y una mera unción física cotidiana.
  - «Cuerno» en el texto principal conserva la concreción hebrea; la nota aclara la equivalencia con shofar.
  - «Tienda» reproduce la literalidad del hebreo y deja abierta la identificación cultual sin imponer un tecnicismo.
