id: ROM.16.1
reference: Romans 16:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Συνίστημι δὲ ὑμῖν Φοίβην τὴν ἀδελφὴν ἡμῶν, οὖσαν ⸀καὶ διάκονον τῆς ἐκκλησίας τῆς ἐν Κεγχρεαῖς,
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/001.yaml
  text: Now I commend to you Phoebe, our sister, who is also a deacon of the church in Cenchreae,
translation:
  language: ko
  text: 우리의 자매이며 겐그레아 회중[a]의 집사[b]인 뵈뵈를 여러분에게 천거합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「회중」은 헬라어 ἐκκλησία(특정 지역 신자들의 모임). 16장 전반에 일관된다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 διάκονος. 정형화된 「집사」로 옮긴다. 본문은 여성형 어미를 따로 두지 않고 동일 명사를 사용하므로, 본 직책이 여성에게도 적용됨을 그대로 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνίστημι
  english_pob_choice: I commend
  chosen_korean: 천거하다
  alternatives_korean:
  - 추천하다
  - 소개하다
  lexicon: BDAG
  rationale: 공식적 추천·소개. 「천거」가 공식성을 살린다.
- source_word: Φοίβην
  english_pob_choice: Phoebe
  chosen_korean: 뵈뵈
  lexicon: BDAG
  rationale: 정책 지시 음역.
- source_word: τὴν ἀδελφὴν ἡμῶν
  english_pob_choice: our sister
  chosen_korean: 우리의 자매
  lexicon: BDAG
  rationale: 직역. 여성 형식 그대로.
- source_word: διάκονον
  english_pob_choice: a deacon
  chosen_korean: 집사
  alternatives_korean:
  - 봉사자
  - 일꾼
  lexicon: BDAG
  rationale: 정책 지시 διάκονος→「집사」. 영어 POB의 「deacon」 결정과 일치. 직책의 함의를 보존하고 일반화된 「일꾼」으로 약화하지 않는다.
- source_word: τῆς ἐκκλησίας τῆς ἐν Κεγχρεαῖς
  english_pob_choice: the church in Cenchreae
  chosen_korean: 겐그레아 회중
  alternatives_korean:
  - 겐그레아 교회
  lexicon: BDAG
  rationale: '정책 지시: 16장의 ἐκκλησία는 대체로 지역적 모임을 가리키므로 「회중」으로 옮긴다.'
- source_word: Κεγχρεαῖς
  english_pob_choice: Cenchreae
  chosen_korean: 겐그레아
  lexicon: BDAG
  rationale: 정책 지시 음역.
theological_decisions:
- issue: 뵈뵈의 διάκονος 직책
  chosen_reading: 「집사」로 직책의 무게를 보존
  alternative_readings:
  - 「봉사자」 「일꾼」 등 일반화
  rationale: 본문은 διάκονος를 인칭 명사로 사용하며 교회 직책 함의가 분명한 문맥(겐그레아 회중의)에 둔다. 정책 글로사리와 영어 POB가 모두 「집사」(deacon)로 정한 결정에 부합한다. 여성 어미를 따로 두지 않은 본문의 형식이 여성에게도 동일 직책이 적용됨을 보여준다.
  doctrine_reference: 'DOCTRINE.md: διάκονος→집사; 본문의 직책 함의를 약화하지 말 것'
