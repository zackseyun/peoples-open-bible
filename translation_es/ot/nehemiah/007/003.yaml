revisions:
- from: 'Y dije a ellos[a]: «Las puertas de Jerusalén no se abrirán hasta que el sol esté caliente. Mientras aún estén de guardia, que cierren las puertas y las[a] aseguren[b]. Y se nombrarán centinelas[c] de entre los habitantes de Jerusalén, cada uno en su guardia y cada uno frente a su casa».'
  to: 'Y les dije: «Las puertas de Jerusalén no deben abrirse hasta que el sol esté caliente[a]. Mientras ellos aún estén de guardia, que cierren las puertas y las sujeten bien[b]. Y designen guardias[c] de entre los habitantes de Jerusalén, cada uno en su puesto de guardia y cada uno frente a su propia casa».'
  rationale: Se corrige el error formal de notas duplicadas, se mejora la naturalidad del español («les dije»), se restituye el carácter directivo del mandato («designen guardias»), se usa «guardias» para mantener mejor el campo semántico de מִשְׁמְרוֹת y la relación con la nota alternativa, y se ajusta «las sujeten bien» para reflejar mejor la acción concreta de asegurar/fijar las puertas después de cerrarlas. También se hace más idiomático «cada uno en su puesto de guardia».
