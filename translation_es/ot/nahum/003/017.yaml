translation:
  language: es
  text: Tus guardias[a] son como langostas, y tus escribas[b] como enjambres de langostas, posados en los muros[c] en un día frío. Sale el sol, y se van volando[d]; nadie sabe dónde están.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus coronados', 'tus príncipes' o 'tus consagrados' para este raro término hebreo.
    reason: lexical_alternative
  - marker: b
    text: O 'tus oficiales' o 'tus comandantes militares' para 'tus escribas'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo también puede significar 'en los cercados' o 'en las cercas', no necesariamente muros urbanos.
    reason: lexical_alternative
  - marker: d
    text: 'La última cláusula dice literalmente algo como: ''y no se conoce su lugar—¿dónde están?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְּזָרַיִךְ
  english_pob_choice: your guards
  chosen_spanish: tus guardias
  alternatives_spanish:
  - tus coronados
  - tus príncipes
  - tus consagrados
  lexicon: HALOT
  rationale: El término hebreo es raro y discutido. Siguiendo la lectura contextual del POB en la burla contra Nínive, se entiende mejor como un grupo de élite o protegido con función de custodia/guardia. 'Guardias' comunica esa función en español sin fijar indebidamente una etimología más específica.
- source_word: כָּאַרְבֶּה
  english_pob_choice: like locusts
  chosen_spanish: como langostas
  alternatives_spanish:
  - como la langosta
  lexicon: HALOT
  rationale: El símil es colectivo. En español, el plural 'langostas' transmite mejor la imagen de masa que el singular genérico.
- source_word: טַפְסְרַיִךְ
  english_pob_choice: your scribes
  chosen_spanish: tus escribas
  alternatives_spanish:
  - tus oficiales
  - tus comandantes militares
  - tus mariscales
  lexicon: HALOT
  rationale: Sigo la decisión léxica del POB de mantener 'scribes' como equivalente principal, porque preserva el valor lexical tradicional del préstamo y deja abierta la nota de alternativas administrativas o militares.
- source_word: כְּגֹב גֹּבָי
  english_pob_choice: like swarms of locusts
  chosen_spanish: como enjambres de langostas
  alternatives_spanish:
  - como un enjambre de saltamontes
  - como crías de langosta
  lexicon: HALOT
  rationale: La duplicación intensifica la imagen de multitud. 'Enjambres de langostas' expresa bien esa fuerza colectiva en español y mantiene el carácter figurado del hebreo.
- source_word: הַחוֹנִים
  english_pob_choice: settling
  chosen_spanish: posados
  alternatives_spanish:
  - acampados
  - asentados
  - reposando
  lexicon: HALOT
  rationale: En el contexto de insectos sobre murallas, 'posados' es el equivalente más natural y visual en español, sin perder la idea de instalarse o detenerse.
- source_word: בַּגְּדֵרוֹת
  english_pob_choice: on the walls
  chosen_spanish: en los muros
  alternatives_spanish:
  - en las cercas
  - en los cercados
  - en las murallas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a muros, cercas o cercados. En el contexto de una ciudad sitiada, 'muros' es una opción clara y fiel; 'murallas' sería posible, pero 'muros' preserva mejor la amplitud semántica de la nota inglesa.
- source_word: בְּיוֹם קָרָה
  english_pob_choice: on a cold day
  chosen_spanish: en día de frío
  alternatives_spanish:
  - en un día frío
  - en un día de frío
  lexicon: HALOT
  rationale: La expresión hebrea es temporal y literal. 'En día de frío' conserva la concisión del original y sigue siendo natural en español bíblico contemporáneo.
- source_word: שֶׁמֶשׁ זָרְחָה
  english_pob_choice: The sun rises
  chosen_spanish: Sale el sol
  alternatives_spanish:
  - El sol se levanta
  - El sol ha salido
  lexicon: HALOT
  rationale: La forma verbal hebrea describe el momento en que el calor del sol provoca la dispersión. 'Sale el sol' es una forma idiomática y clara en español para esa escena poética.
- source_word: וְנוֹדַד
  english_pob_choice: they fly away
  chosen_spanish: y se van volando
  alternatives_spanish:
  - y se alejan
  - y huyen
  - y se dispersan
  lexicon: HALOT
  rationale: El verbo puede significar huir, apartarse o alejarse. Como el referente figurado son langostas, 'se van volando' mantiene la imagen zoológica explícita que el POB quiso conservar.
- source_word: וְלֹא נוֹדַע מְקוֹמוֹ אַיָּם
  english_pob_choice: no one knows where they are
  chosen_spanish: nadie sabe dónde están
  alternatives_spanish:
  - 'su lugar no se conoce: ¿dónde están?'
  - no se sabe dónde está su lugar
  lexicon: HALOT
  rationale: La clausula final es idiomática y de desaparición. 'Nadie sabe dónde están' transmite el sentido completo de manera natural en español, preservando el anonimato del paradero sin forzar la sintaxis hebrea.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el trazado auditado del POB en inglés. No se reportan revisiones aplicadas en el expediente fuente; por eso el español conserva las mismas decisiones léxicas principales y las mismas ambigüedades documentadas, adaptándolas a una redacción publicable en español.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se mantiene la distinción entre imagen literal de langostas e imagen figurada de funcionarios/élites, sin suavizar la tensión léxica del hebreo.
  - '''Muros'' se usa como solución principal para בַּגְּדֵרוֹת, pero la nota deja abierta la opción más amplia de cercas/cercados.'
  - La finalización con 'nadie sabe dónde están' busca equivaler el cierre idiomático sin perder el matiz de desaparición repentina.
