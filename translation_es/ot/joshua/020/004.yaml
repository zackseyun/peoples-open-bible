  language: en
  yaml_path: translation/ot/joshua/020/004.yaml
  text: He shall flee to one of these cities and stand at the entrance of the city gate[a], and he shall speak his case in the hearing of the elders of that city. Then they shall take him into the city to themselves, and they shall give him a place[b], and he shall live with them.
  footnotes:
