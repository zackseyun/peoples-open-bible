translation:
  language: es
  text: 'Tú lo conoces todo; tú sabes, Señor, que no fue por insolencia ni por orgullo ni por ambición que hice esto: no postrarme[a] ante el orgulloso Amán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no inclinarme ante el orgulloso Amán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ πάντα γινώσκεις
  english_pob_choice: You know all things
  chosen_spanish: Tú lo conoces todo
  alternatives_spanish:
  - Tú sabes todo
  - Tú conoces todas las cosas
  lexicon: BDAG
  rationale: Conserva la amplitud total del conocimiento divino y el tono directo de oración. En español, "conocerlo todo" suena más natural y solemne que un calco rígido de "saber todas las cosas".
- source_word: σὺ οἶδας
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - tú conoces
  - tú estás al tanto
  lexicon: BDAG
  rationale: Se mantiene la repetición enfática de dos verbos de conocimiento en el griego, sin fusionarlos. "Sabes" distingue bien el segundo verbo y conserva la cadencia del original.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG / proyecto POB
  rationale: Aunque el inglés auditado usa "Lord", el contexto de oración dirige la apelación al nombre divino. Conforme al criterio del proyecto, se usa "Yahvé" en el texto principal en lugar de enmascarar el nombre con "SEÑOR". Aquí no depende de una cita griega de κύριος, sino de la dirección explícita de la plegaria al Dios de Israel.
- source_word: οὐκ ἐν ὕβρει
  english_pob_choice: not in insolence
  chosen_spanish: no fue por insolencia
  alternatives_spanish:
  - no fue por arrogancia
  - no fue por insolencia ni atrevimiento
  lexicon: LSJ
  rationale: '"Insolencia" reproduce bien la fuerza de ὕβρις: conducta altiva, ofensiva y desmedida. La frase causal "no fue por" funciona de manera natural para expresar el motivo negado por el griego.'
- source_word: οὐδὲ ἐν ὑπερηφανείᾳ
  english_pob_choice: or in pride
  chosen_spanish: ni por orgullo
  alternatives_spanish:
  - ni por altivez
  - ni por soberbia
  lexicon: LSJ
  rationale: Se distingue ὑπερηφανία de ὕβρις sin perder naturalidad. "Orgullo" es el equivalente más claro y amplio en español, y conserva el paralelismo con la primera negación.
- source_word: οὐδὲ ἐν φιλοδοξίᾳ
  english_pob_choice: or in ambition
  chosen_spanish: ni por ambición
  alternatives_spanish:
  - ni por afán de honor
  - ni por amor a la gloria
  lexicon: LSJ
  rationale: '"Ambición" comunica la orientación autoexaltada y de búsqueda de honor que el término puede implicar aquí. Se preserva la progresión de motivos rechazados.'
- source_word: ἐποίησα τοῦτο
  english_pob_choice: I did this
  chosen_spanish: hice esto
  alternatives_spanish:
  - actué así
  - procedí de esta manera
  lexicon: BDAG
  rationale: Mantiene la referencia simple y deíctica del griego. No se explica más de lo que el texto dice antes de llegar a la cláusula infinitiva.
- source_word: τὸ μὴ προσκυνεῖν
  english_pob_choice: refusing to bow down
  chosen_spanish: el no postrarme
  alternatives_spanish:
  - el no inclinarme
  - el negarme a postrarme
  lexicon: BDAG
  rationale: La forma con artículo infinitivo se expresa en español como un sustantivo verbal. "Postrarme" preserva la fuerza de προσκυνεῖν y, en este contexto, mantiene la referencia al acto de reverencia exigida ante Amán.
- source_word: τὸν ὑπερήφανον Ἁμάν
  english_pob_choice: the proud Haman
  chosen_spanish: ante el orgulloso Amán
  alternatives_spanish:
  - ante el soberbio Amán
  - ante el altivo Amán
  lexicon: LSJ
  rationale: Se conserva el epíteto moral del griego. "Orgulloso" encaja naturalmente con la acusación de ὑπερήφανος y evita perder la caracterización del personaje.
theological_decisions:
- issue: Motivo de la negativa a inclinarse ante Amán
  english_pob_reading: The verse presents the refusal as not arising from sinful self-exaltation but from another, unstated motive.
  chosen_spanish_reading: El versículo presenta la negativa como no nacida de insolencia, orgullo ni ambición, sin explicar todavía cuál fue el motivo positivo.
  alternative_spanish_readings:
  - La negativa fue puramente religiosa
  - La negativa fue principalmente política o personal
  rationale: El griego sólo niega tres motivos desordenados y no añade una explicación completa del motivo recto. La traducción conserva esa reserva para no resolver lo que el texto deja abierto.
  doctrine_reference: Preservar la tensión teológica sin suplir una motivación no explicitada por el texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto principal junto a la frase a la que remite. No se añadieron notas sin ancla.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de tres negaciones causales: insolencia, orgullo, ambición.'
  - Se usó "Yahvé" conforme al estándar del proyecto para el nombre divino en español.
  - Se preservó el epíteto "orgulloso" para Amán y el matiz de reverencia corporal en "postrarme".
  - La nota alternativa ofrece la opción de traducción literal del infinitivo articular sin duplicar contenido doctrinal.
