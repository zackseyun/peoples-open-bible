translation:
  language: es
  text: Y atacando de noche a los habitantes de Jamnia[a], incendió el puerto y la flota, de modo que los resplandores de la luz[b] se veían hasta Jerusalén, a una distancia de doscientos cuarenta estadios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un estadio era una unidad antigua de longitud; doscientos cuarenta estadios equivalen aproximadamente a 43–45 km.
    reason: cultural_note
  - marker: b
    text: 'Literalmente: ''los rayos/fulgores de la luz''. La traducción ''los resplandores de la luz'' conserva la imagen sin añadir de forma explícita la fuente del brillo, que en el contexto es el incendio del puerto y la flota.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς Ἰαμνίταις
  english_pob_choice: the people of Jamnia
  chosen_spanish: los habitantes de Jamnia
  alternatives_spanish:
  - los jamnitas
  - la gente de Jamnia
  lexicon: LSJ
  rationale: El dativo con ἐπιβαλών señala el objetivo del ataque. 'Habitantes de Jamnia' conserva el referente geográfico-étnico y suena natural en español; 'jamnitas' es posible, pero menos claro para lectores actuales.
- source_word: νυκτός ἐπιβαλών
  english_pob_choice: making a night attack
  chosen_spanish: atacando de noche
  alternatives_spanish:
  - haciendo un ataque nocturno
  - cayendo sobre ellos de noche
  lexicon: LSJ
  rationale: La combinación expresa un asalto súbito realizado en la noche. 'Atacando de noche' comunica el sentido militar y temporal con naturalidad en español.
- source_word: ἐνέπρησεν
  english_pob_choice: set ... on fire
  chosen_spanish: incendió
  alternatives_spanish:
  - prendió fuego a
  - quemó
  lexicon: LSJ
  rationale: El verbo significa prender fuego o consumir por incendio. 'Incendió' es preciso, compacto y adecuado para los dos objetos directos.
- source_word: τὸν λιμένα
  english_pob_choice: the harbor
  chosen_spanish: el puerto
  alternatives_spanish:
  - el embarcadero
  - el puerto marítimo
  lexicon: LSJ
  rationale: λιμήν puede significar 'puerto' o 'bahía/abrigo portuario'. 'Puerto' es el equivalente más natural y suficiente en este contexto narrativo.
- source_word: σὺν τῷ στόλῳ
  english_pob_choice: and the fleet
  chosen_spanish: y la flota
  alternatives_spanish:
  - junto con la flota
  - y la escuadra
  lexicon: LSJ
  rationale: στόλος aquí refiere al conjunto de naves. 'Flota' reproduce bien el sentido colectivo y mantiene el paralelismo con 'el puerto'.
- source_word: ὥστε ἐπιφαίνεσθαι
  english_pob_choice: so that ... was visible
  chosen_spanish: de modo que ... se veían
  alternatives_spanish:
  - de manera que ... aparecían
  - de modo que ... brillaban
  lexicon: LSJ
  rationale: La construcción expresa resultado. El pasivo/medio se vierte con una formulación natural en español, sin perder la relación causal con el incendio.
- source_word: τὰς αὐγὰς τοῦ φέγγους
  english_pob_choice: the rays of the light
  chosen_spanish: los resplandores de la luz
  alternatives_spanish:
  - los rayos de la luz
  - las claridades de la luz
  lexicon: LSJ
  rationale: El griego dice literalmente 'los rayos/fulgores de la luz'. En contexto, el español 'resplandores' conserva la imagen luminosa sin introducir una explicación demasiado interpretativa.
- source_word: εἰς τὰ Ἱεροσόλυμα
  english_pob_choice: as far as Jerusalem
  chosen_spanish: hasta Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - hacia Jerusalén
  lexicon: LSJ
  rationale: Tras la expresión de visibilidad, εἰς marca alcance o extensión. 'Hasta Jerusalén' reproduce ese valor de alcance espacial.
- source_word: σταδίων ὄντων διακοσίων τεσσεράκοντα
  english_pob_choice: it being two hundred forty stadia away
  chosen_spanish: a una distancia de doscientos cuarenta estadios
  alternatives_spanish:
  - estando a doscientos cuarenta estadios
  - siendo de doscientos cuarenta estadios
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto aporta una nota explicativa sobre la distancia. 'A una distancia de...' es fluida en español y conserva el dato sin sobreexplicar.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del texto inglés en dos puntos clave: mantiene la referencia literal a los ''rayos/fulgores de la luz'' en vez de una paráfrasis interpretativa, y conserva la nota explicativa final sobre la distancia con un equivalente español natural. También se ajustó ''Jamnites/people of Jamnia'' a una expresión geográfica clara y se prefirió ''puerto''/''flota'' por su correspondencia directa con λιμήν y στόλος.'
  spanish_consistency_notes:
  - Se usa 'Jamnia' como topónimo estable y 'habitantes de Jamnia' para la referencia étnico-geográfica.
  - '''Estadios'' se mantiene como unidad antigua, con nota cultural para evitar anacronismos.'
  - No se introduce 'SEÑOR' ni otras equivalencias teológicas, porque el versículo no contiene lenguaje divino explícito.
  - '''Resplandores de la luz'' preserva la ambigüedad imagística del griego sin convertirla en interpretación excesiva.'
