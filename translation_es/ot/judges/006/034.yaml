translation:
  language: es
  text: Entonces el Espíritu de Yahvé revistió[a] a Gedeón, y él tocó la trompeta[b], y Abiezer fue convocado tras él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu de Yahvé vino sobre Gedeón»; literalmente: «el Espíritu de Yahvé revistió a Gedeón».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, cuerno usado para dar señales.
    reason: cultural_note
  - marker: c
    text: 'O: «Abiezer fue convocado tras él» o «Abiezer se agrupó detrás de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֣וּחַ יְהוָ֔ה
  english_pob_choice: the Spirit of Yahweh / the Spirit of the LORD
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el viento de Yahvé
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, viento o aliento; aquí el contexto narrativo de empoderamiento favorece claramente ‘Espíritu’. Para יְהוָה se sigue el criterio del proyecto y se preserva el nombre divino como ‘Yahvé’.
- source_word: לָבְשָׁ֖ה אֶת גִּדְע֑וֹן
  english_pob_choice: clothed Gideon
  chosen_spanish: revistió a Gedeón
  alternatives_spanish:
  - vistió a Gedeón
  - cubrió a Gedeón
  - vino sobre Gedeón
  lexicon: HALOT
  rationale: לָבַשׁ significa literalmente ‘vestir/poner ropa’. En español, ‘revistió a Gedeón’ conserva la imagen metafórica de una acción envolvente sin sonar tan forzado como una traducción más literal palabra por palabra. Se evita ‘vino sobre’ porque borra la metáfora que el POB inglés preservó.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  english_pob_choice: he blew the trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - hizo sonar el cuerno
  - sopló el shofar
  - tocó el shofar
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno de señalización, frecuentemente de carnero. ‘Tocó la trompeta’ es idiomático y claro en español; en nota se conserva la especificidad cultural del shofar.
- source_word: וַיִזָּעֵק
  english_pob_choice: was summoned
  chosen_spanish: fue convocado
  alternatives_spanish:
  - fue llamado
  - fue reunido
  - se alistó
  lexicon: HALOT
  rationale: El nifal aquí tiene sentido pasivo/reflexivo de reunión o convocatoria. ‘Fue convocado’ preserva el matiz de respuesta colectiva a la señal de Gedeón, en línea con la revisión inglesa que prefirió una formulación más natural que mantuviera la pasividad.
- source_word: אֲבִיעֶזֶר
  english_pob_choice: Abiezer
  chosen_spanish: Abiezer
  alternatives_spanish:
  - la casa de Abiezer
  - los abiézeritas
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme a la política del proyecto.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - después de él
  - siguiéndolo
  - detrás de él
  lexicon: HALOT
  rationale: ‘Tras él’ conserva la direccionalidad y la idea de seguirle en apoyo, con un registro natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. En el español del POB se adopta ‘Yahvé’ para mantener visible el nombre del pacto, conforme al criterio doctrinal del proyecto, en lugar de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen verbal de ‘clothed Gideon’
  english_pob_reading: the Spirit of Yahweh clothed Gideon
  chosen_spanish_reading: el Espíritu de Yahvé revistió a Gedeón
  alternative_spanish_readings:
  - el Espíritu de Yahvé vino sobre Gedeón
  - el Espíritu de Yahvé cubrió a Gedeón
  rationale: Se preserva la tensión lexical del hebreo לָבַשׁ, que ofrece una metáfora de investidura o cobertura. La traducción no reduce de inmediato la imagen a un mero ‘venir sobre’, porque el POB inglés documenta precisamente esa elección como alternativa interpretativa.
  doctrine_reference: HALOT; audit trail lexical note
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘was called out’ por ‘was summoned’ para reflejar con más naturalidad el pasivo de וַיִזָּעֵק sin perder el sentido de convocatoria. La propuesta española sigue esa actualización con ‘fue convocado’, que mantiene la pasividad y el matiz de reunión en torno a Gedeón. También se respeta la decisión doctrinal revisada de usar el nombre divino en forma explícita.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene ‘Espíritu’ con mayúscula por referencia al Espíritu divino, no a un espíritu común.
  - ‘Tocó la trompeta’ es una solución idiomática; la nota preserva la especificidad de shofar.
  - Se evita ‘siervo’ u otras sustituciones no motivadas por el texto, y se conserva el carácter militar/convocatorio del pasaje.
