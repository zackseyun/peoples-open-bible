  - severity: low
    issue: Frase final algo pesada en español
    rationale: La combinación de objeto expreso y pronombres ('la impulsa y se la lleva') suena redundante y menos elegante en español bíblico contemporáneo.
  revised_spanish_text: No así los malvados[a]; más bien, son como paja que el viento se lleva.
