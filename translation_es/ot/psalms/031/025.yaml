review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura exhortativa del hebreo: imperativo plural חִזְקוּ + jussivo וְיַאֲמֵץ לְבַבְכֶם, y preserva correctamente «Yahvé» para יהוה. Sin embargo, la preposición en «esperan en Yahvé» no refleja tan fielmente el valor de ל con יחל como «esperan a Yahvé» o «esperan en Yahvé»; en este contexto la evidencia y el rastro inglés favorecen la idea de esperar/aguardar a Yahvé, con una nota sobre «poner la esperanza en». Además, la nota actual [a] está anclada en «Sean fuertes» pero explica la segunda cola, lo que desajusta el aparato crítico respecto del lugar relevante.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y precisión. «Sean fuertes» funciona, aunque «Sean fuertes» + «que su corazón sea valiente» es aceptable. El mayor problema de legibilidad/editorial es la nota mal ubicada y el giro «esperan en Yahvé», que en español puede leerse más como confianza estática que como espera expectante. Reubicar la nota y ajustar la preposición mejora fidelidad y fluidez.
  glossary_alignment: Se alinea bien con la política del proyecto en «Yahvé». No hay conflictos mayores de glosario. La decisión sobre יחל debe reflejar mejor la doble posibilidad «esperar / esperar con esperanza», idealmente con nota léxica en el participio y no en el imperativo inicial.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Sean fuertes», pero su contenido trata del matiz de la segunda cola/verbo siguiente.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a pensar que la alternativa afecta חִזְקוּ cuando en realidad comenta otro elemento.
  - severity: medium
    issue: «esperan en Yahvé» atenúa la imagen verbal de esperar/aguardar expresada por הַמְיַחֲלִים לַיהוָה.
    rationale: Con יחל + ל, el sentido básico aquí es esperar a/por Yahvé con esperanza. «En Yahvé» es posible como interpretación de confianza, pero se aparta del rastro auditado, que quiso conservar la imagen de esperar y dejar «hope» como alternativa en nota.
  - severity: low
    issue: La nota actual propone «cobren ánimo» como alternativa para [a], pero el rastro inglés preserva la alternativa principal en el participio «wait/hope».
    rationale: No es incorrecto notar el solapamiento entre fortaleza y valor en el paralelismo, pero la alternativa documentada y más significativa para el lector está en יחל, no en חזק/אמץ.
  revised_spanish_text: Sean fuertes, y que su corazón sea valiente, todos los que esperan[a] a Yahvé.
  revised_footnotes:
  - marker: a
    text: O «los que ponen su esperanza en Yahvé». El participio hebreo puede expresar tanto esperar como esperar con esperanza.
    reason: lexical_alternative
  revision_rationale: Se conserva la exhortación poética y el nombre divino «Yahvé», pero se corrige la ubicación y el contenido de la nota para reflejar la alternativa léxica documentada en הַמְיַחֲלִים. También se ajusta «esperan en Yahvé» a «esperan a Yahvé» para mantener mejor la imagen de espera expectante del hebreo y del rastro POB, mientras la nota preserva el matiz de esperanza/confianza.
