translation:
  language: es
  text: Existen muchos prodigios como estos[a], pero he visto solo unos pocos de sus obras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Hay muchas cosas ocultas, mayores que estas». El testimonio hebreo dice más brevemente: «Muchos prodigios como estos...», sin expresar de forma explícita «cosas ocultas».'
    reason: alternative_reading
  - marker: b
    text: El griego dice «hemos visto», mientras que el hebreo conservado lee «he visto».
    reason: textual_variant
lexical_decisions:
- source_word: רוב / πολλὰ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Una multitud de
  - Gran cantidad de
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego expresan abundancia cuantitativa, no un superlativo absoluto. «Muchos» conserva esa amplitud de forma natural en español sin exagerar el grado.
- source_word: נפלאות
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: HALOT
  rationale: El término designa obras extraordinarias que causan asombro. «Prodigios» suena digno y bíblico en español, y mantiene el sentido de obras admirables sin volverlo demasiado técnico.
- source_word: כאלה
  english_pob_choice: such
  chosen_spanish: tales
  alternatives_spanish:
  - como estos
  - de este tipo
  lexicon: HALOT
  rationale: Retoma las maravillas ya mencionadas. «Tales» es la forma española más directa y conserva la referencia comparativa del original.
- source_word: מעט
  english_pob_choice: only a few
  chosen_spanish: solo unos pocos
  alternatives_spanish:
  - pocos
  - apenas unos pocos
  lexicon: HALOT
  rationale: La restricción cuantitativa es importante. «Solo unos pocos» refleja bien que no se trata de una cantidad pequeña en abstracto, sino de una visión limitada frente a la totalidad de las obras divinas.
- source_word: ממעשיו
  english_pob_choice: of his works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - entre sus obras
  - de lo que ha hecho
  lexicon: HALOT
  rationale: 'El מן es partitivo: se ha visto una parte limitada del conjunto de las obras de Dios. «De sus obras» expresa esa relación de manera natural y fiel.'
- source_word: ἑωράκαμεν / ראיתי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - he visto
  - he visto yo
  lexicon: HALOT; Greek parallel
  rationale: Se sigue el testimonio hebreo en singular como texto principal, pero se usa un español de primera persona singular con perfecto, que suena natural y mantiene el valor acumulado de la experiencia. La variante griega en plural se documenta aparte.
theological_decisions:
- issue: Si incorporar en el texto principal la noción griega de «cosas ocultas» (ἀπόκρυφα) o atenerse al hebreo más breve
  english_pob_reading: Main text emphasizes the abundance of greater wonders rather than explicitly calling them 'hidden.'
  chosen_spanish_reading: El texto principal habla de la abundancia de prodigios, sin añadir explícitamente «ocultas».
  alternative_spanish_readings:
  - Hay muchas cosas ocultas, mayores que estas
  - Hay muchos prodigios ocultos, mayores que estos
  rationale: Cuando el hebreo está conservado, tiene prioridad como base principal. El griego aporta una ampliación real y significativa, pero no debe desplazar la formulación hebrea más breve. En español, la tensión se preserva mediante nota, no mediante una expansión no atestiguada en el cuerpo principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Diferencia de persona y número entre el hebreo («he visto») y el griego («hemos visto»).
  english_pob_reading: Use singular 'I have seen' in the main text.
  chosen_spanish_reading: Se mantiene la primera persona singular en el texto principal.
  alternative_spanish_readings:
  - hemos visto
  - hemos visto solo unos pocos de sus obras
  rationale: El hebreo conservado presenta la voz singular del hablante, y eso se respeta como lectura principal. La pluralidad griega es una variante relevante, pero secundaria; se documenta para transparencia textual.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que eliminó «greater than these» y «for» por no estar sustentados por el hebreo. Por eso el español principal sigue la formulación breve del hebreo, pero conserva la ampliación griega y la variante de persona/número en notas auditables.
  spanish_consistency_notes:
  - Se usa «prodigios» para נפלאות como opción digna y transparente; si en otros pasajes del POB se prefiere «maravillas», convendrá mantener consistencia contextual dentro de Sirácida.
  - Se mantiene «sus obras» para ממעשיו con valor partitivo.
  - El texto principal evita «ocultas» y «mayores que estas» por prioridad del hebreo, pero las notas conservan la tensión textual con el griego.
  - La puntuación separa con coma las dos cláusulas principales, como en un enunciado sapiencial breve.
