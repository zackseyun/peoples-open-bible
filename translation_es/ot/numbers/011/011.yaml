base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/011.yaml
  text: And Moses said to Yahweh[a], “Why have you treated your servant badly? And why have I not found favor in your eyes[c][b], that you have laid the burden of all this people on me?”
  footnotes:
  - marker: a
    text: Or “have you done evil to your servant?” The Hebrew verb is more literally “done bad/evil,” expressing Moses’ complaint.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “found favor in your eyes,” a common idiom for receiving favor from someone.
    reason: cultural_note
  - marker: c
    text: Hebrew “all this people,” with “people” singular as a collective noun.
    reason: lexical_alternative
