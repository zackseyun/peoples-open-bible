translation:
  language: es
  text: 'Pero Jeremías dijo[a]: «Eso es mentira; no me paso[b] a los caldeos[c]». Pero él no quiso escucharlo, e Irija apresó a Jeremías y lo llevó ante los oficiales[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Es falso».
    reason: lexical_alternative
  - marker: b
    text: O «no me voy con los caldeos» o «no estoy desertando a los caldeos». La imagen hebrea de «caer sobre» aquí expresa pasarse al bando enemigo, no una caída literal.
    reason: lexical_alternative
  - marker: c
    text: «Caldeos» designa a las fuerzas babilónicas.
    reason: cultural_note
  - marker: d
    text: O «a los príncipes»; el término hebreo puede referirse a gobernantes o altos oficiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶר
  english_pob_choice: That is a lie
  chosen_spanish: Eso es mentira
  alternatives_spanish:
  - Eso es falso
  - Es una mentira
  lexicon: HALOT
  rationale: La expresión hebrea funciona como refutación enfática. «Eso es mentira» reproduce bien el rechazo directo y suena natural en español moderno sin suavizar la acusación.
- source_word: אֵינֶנִּי נֹפֵל עַל הַכַּשְׂדִּים
  english_pob_choice: I am not defecting to the Chaldeans
  chosen_spanish: yo no me estoy pasando a los caldeos
  alternatives_spanish:
  - no estoy desertando a los caldeos
  - no me estoy yendo con los caldeos
  - no me estoy pasando al lado de los caldeos
  lexicon: HALOT
  rationale: El verbo con עַל en este contexto militar-político expresa pasarse al bando enemigo, no una caída literal. «Me estoy pasando» conserva el matiz de deserción/traición de forma idiomática en español.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los caldeos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo tradicional «caldeos», que corresponde al término hebreo y conserva la referencia histórica a la potencia babilónica en Jeremías.
- source_word: וְלֹא שָׁמַע אֵלָיו
  english_pob_choice: But he would not listen to him
  chosen_spanish: Pero él no le hizo caso
  alternatives_spanish:
  - Pero no lo escuchó
  - Pero no le prestó atención
  - Pero no quiso escucharle
  lexicon: HALOT
  rationale: La construcción comunica negativa obstinada, no solo incapacidad auditiva. «No le hizo caso» expresa bien la resistencia a Jeremías en un español claro y natural.
- source_word: וַיִּתְפֹּשׂ
  english_pob_choice: seized
  chosen_spanish: agarró
  alternatives_spanish:
  - apresó
  - sujetó
  - arrestó
  lexicon: HALOT
  rationale: El verbo describe una captura física inmediata. «Agarró» conserva la acción concreta sin introducir una lectura legal más específica que la hebrea.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  - los funcionarios
  lexicon: HALOT
  rationale: En Jeremías el término puede designar autoridades de alto rango; «oficiales» evita el posible falso sentido aristocrático de «príncipes» y mantiene la función de autoridad.
- source_word: וַיְבִאֵהוּ אֶל
  english_pob_choice: brought him to
  chosen_spanish: lo llevó a
  alternatives_spanish:
  - lo trajo a
  - lo condujo a
  lexicon: HALOT
  rationale: El causativo de בוא en este contexto narra traslado físico. «Lo llevó a» es directo y fluido en español, sin agregar matices innecesarios.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés actualizado: mantiene la simple conjunción narrativa «y» en lugar de inferir consecuencia, conserva la fuerza idiomática de «defecting» como pasarse al bando enemigo, y preserva la distinción entre el reclamo de Jeremías, la negativa de oírlo y la captura física por Iriya.'
  spanish_consistency_notes:
  - Se usó «caldeos» de manera consistente con la decisión inglesa de conservar el etnónimo histórico, en lugar de sustituirlo por «babilonios».
  - Se prefirió «oficiales» para הַשָּׂרִים por coherencia con el registro administrativo/político de Jeremías.
  - Se mantuvo una sintaxis narrativa breve y directa, acorde con el hebreo y con la edición POB en inglés.
  - Se evitó introducir lenguaje eclesiástico o interpretativo que no está en el original, especialmente en el verbo de deserción y en la designación de las autoridades.
