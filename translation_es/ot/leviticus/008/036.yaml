  to: Aarón y sus hijos hicieron todo lo que Yahvé había mandado por medio de Moisés[a].
  rationale: Se elimina la conjunción inicial para un español más natural, se conserva «hicieron» para עשה, se mantiene «Aarón y sus hijos» como formulación suficientemente precisa y natural en el contexto, se reemplaza «todas las cosas que» por «todo lo que» para mejorar la fluidez sin perder fidelidad, y se reancla la nota al segmento «por medio de Moisés», que es donde corresponde la alternativa literal hebrea.
