  chosen_spanish: Berías
  alternatives_spanish:
  - Bería
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se opta por «Berías» para conservar la terminación vocálica percibida en la pronunciación y seguir la adaptación habitual de nombres bíblicos en español.
