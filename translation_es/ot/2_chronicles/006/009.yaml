translation:
  language: es
  text: Sin embargo, tú no edificarás la casa[a]; más bien, tu hijo, que saldrá de tu propio cuerpo[b], edificará la casa para mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo»; hebreo «la casa», una designación común del templo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de tus lomos»; un modismo que indica descendencia corporal directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Solo
  - No obstante
  - Sin más
  lexicon: HALOT
  rationale: La partícula introduce una restricción o corrección respecto de la declaración anterior; «Sin embargo» conserva el giro adversativo sin sonar mecánico en español.
- source_word: תִבְנֶה הַבָּיִת
  english_pob_choice: build the house
  chosen_spanish: edificarás la casa
  alternatives_spanish:
  - construirás la casa
  - edificarás el templo
  - construirás un templo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido «la casa» para reflejar el hebreo y su uso habitual como designación del templo; «edificar» suena digno y bíblico en español contemporáneo.
- source_word: כִּי
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - porque
  - sino
  - en cambio
  lexicon: HALOT
  rationale: Después de la negación, la partícula introduce la afirmación contrastiva sobre el hijo; «más bien» expresa bien ese valor correctivo en español natural.
- source_word: בִנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - un hijo tuyo
  - tu descendiente
  lexicon: HALOT
  rationale: Es la referencia filial directa con sufijo de segunda persona masculina singular; «tu hijo» es la equivalencia más directa y clara.
- source_word: הַיּוֹצֵא מֵחֲלָצֶיךָ
  english_pob_choice: who will come from your own body
  chosen_spanish: que saldrá de tus entrañas
  alternatives_spanish:
  - que vendrá de tus lomos
  - que saldrá de tu propio cuerpo
  - que procederá de tus entrañas
  lexicon: HALOT
  rationale: La imagen hebrea alude al linaje físico directo. «Tus entrañas» conserva la fuerza semítica e idiomática del origen corporal; la elección evita una paráfrasis demasiado suave y mantiene la tensión léxica documentada por el POB inglés.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en favor de mi nombre
  - en honor de mi nombre
  - para honra de mi nombre
  lexicon: HALOT
  rationale: La expresión conserva la dedicación/representación vinculada al Nombre divino. «Para mi nombre» es literal y suficientemente idiomático en español bíblico.
theological_decisions:
- issue: 'Terminología del templo: ''la casa'''
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la morada
  rationale: El hebreo dice literalmente «la casa», y el POB inglés mantiene esa forma para respetar el idiomático del texto fuente. En español conviene conservarla en el cuerpo principal y no sustituirla por 'templo' sin necesidad de especificación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Idiomático de descendencia física
  english_pob_reading: from your own body
  chosen_spanish_reading: de tus entrañas
  alternative_spanish_readings:
  - de tu cuerpo
  - de tus lomos
  rationale: El hebreo indica descendencia biológica directa. «De tus entrañas» preserva la imaginería corporal del original sin perder inteligibilidad en español; no añade contenido doctrinal, solo reproduce la metáfora ancestral.
  doctrine_reference: Translation philosophy §6
- issue: Nombre divino y dedicación del templo
  english_pob_reading: for my name
  chosen_spanish_reading: para mi nombre
  alternative_spanish_readings:
  - en honor de mi nombre
  - para honra de mi nombre
  rationale: La frase apunta a dedicación y representación del Nombre de Dios. Se evita normalizarla a una formulación explicativa que debilite la conexión con el hebreo y con el lenguaje cultual del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés auditado revisó una redundancia pronominal y dejó estable la relación adversativa y el énfasis en la descendencia corporal. El español refleja esa misma estructura sin añadir pronombres innecesarios, manteniendo el contraste y la literalidad idiomática del hebreo.
  spanish_consistency_notes:
  - Se conserva «la casa» de forma consistente con la terminología POB para el templo.
  - Se mantiene el tratamiento de segunda persona singular con «tú/tu/tus».
  - Se usa «Yahvé» como terminología general del proyecto solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - No se sustituye el lenguaje de descendencia corporal por una paráfrasis suavizada; se preserva la tensión idiomática del hebreo.
