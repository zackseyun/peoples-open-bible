revisions:
- from: Después de haber también consagrado estas cosas en una columna[a], y de haber establecido un lugar de oración en el sitio del banquete, partieron ilesos, libres y rebosantes de alegría, siendo resguardados con seguridad por tierra, mar y ríos, por la orden del rey[b].
  to: Después de haber también inscrito estas cosas en una estela[a], y de haber establecido un lugar de oración en el sitio del banquete, partieron ilesos, libres y rebosantes de alegría, siendo llevados a salvo por tierra, mar y ríos, por mandato del rey[b].
  rationale: 'Se revisa el texto para seguir la decisión principal documentada para ἀνιερώσαντες: en contexto con στήλῃ, el sentido básico en el texto principal debe reflejar la inscripción pública, no la consagración como primera opción. También se mejora ἀνασωζόμενοι con una formulación más idiomática en español (''siendo llevados a salvo''), manteniendo la nota alternativa de preservación segura. ''Por mandato del rey'' suena más natural y autoritativo que ''por la orden del rey''.'
  reviewer_model: gpt-5.4
