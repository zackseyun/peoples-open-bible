    text: Literalmente, «los nacidos». El hebreo no usa el sustantivo ordinario para «hijos», aunque todos los nombres enumerados son masculinos.
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza «los nacidos que tuvo» por «los hijos que le nacieron» para lograr un español más natural sin perder el sentido posesivo-existencial de אֲשֶׁר הָיוּ לוֹ. La nota conserva la precisión léxica central del POB: el hebreo literalmente dice «los nacidos» y no el término usual para «hijos».'
