translation:
  language: es
  text: Y ahora te muestro[a] los diez talentos de plata que deposité con Gabael, hijo de Gabrias, en Rages de Media[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hago saber» o «te doy a conocer» para ἐπιδεικνύω; el verbo griego puede enfatizar llamar la atención sobre algo más que exhibirlo físicamente.
    reason: lexical_alternative
  - marker: b
    text: «Rages» también se escribe a menudo «Rhages» en transliteración inglesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδεικνύω
  english_pob_choice: am showing
  chosen_spanish: te muestro
  alternatives_spanish:
  - te lo hago saber
  - te doy a conocer
  - te señalo
  lexicon: LSJ
  rationale: El verbo griego puede significar mostrar, señalar o hacer notar. En español, «te muestro» conserva el matiz de atención directa y sigue la lectura dinámica del POB en inglés sin volverlo meramente informativo.
- source_word: τὰ δέκα τάλαντα τοῦ ἀργυρίου
  english_pob_choice: the ten talents of silver
  chosen_spanish: los diez talentos de plata
  alternatives_spanish:
  - los diez talentos de plata en moneda
  - los diez talentos de plata monetaria
  lexicon: LSJ
  rationale: Se conserva la unidad antigua «talentos» y el material «de plata» para mantener la transparencia histórica y la precisión del monto. «Plata» es la forma natural en español para el valor/metálico del dinero.
- source_word: παρεθέμην
  english_pob_choice: I deposited
  chosen_spanish: deposité
  alternatives_spanish:
  - confié
  - dejé en custodia
  - entregué en depósito
  lexicon: LSJ
  rationale: El contexto financiero favorece «deposité», que expresa el acto de poner dinero bajo resguardo. «Confié» sería más amplio y menos preciso; «deposité» mantiene la fuerza económica del verbo griego.
- source_word: Γαβαήλῳ
  english_pob_choice: Gabael
  chosen_spanish: Gabael
  alternatives_spanish:
  - Gabaael
  lexicon: LSJ
  rationale: Los nombres propios se transliteran. «Gabael» corresponde a la forma griega y coincide con la tradición de transliteración usada en el texto fuente en inglés.
- source_word: τῷ τοῦ Γαβρεία
  english_pob_choice: son of Gabrias
  chosen_spanish: hijo de Gabrias
  alternatives_spanish:
  - del linaje de Gabrias
  - de Gabrias
  lexicon: LSJ
  rationale: La construcción griega con artículo y nombre propio identifica filiación. En español, «hijo de Gabrias» es la equivalencia idiomática más clara y fiel.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  english_pob_choice: in Rages of Media
  chosen_spanish: en Rages de Media
  alternatives_spanish:
  - en Rhages de Media
  - en Rages en Media
  lexicon: LSJ
  rationale: Se mantiene la transliteración del topónimo y la relación geográfica en genitivo con «de Media». No se castellaniza el nombre para preservar la trazabilidad al griego.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el griego de Swete y el audit trail inglés; no se requieren cambios sustanciales. Se ha conservado la estructura simple, el valor monetario antiguo y la identificación geográfica tal como los refleja el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «talentos» como unidad antigua sin modernizarla.
  - Se conserva la transliteración «Gabael» y «Rages» para trazabilidad textual.
  - No se introduce terminología eclesiástica ajena al pasaje.
  - La puntuación española sigue el orden sintáctico natural sin alterar el contenido del original.
