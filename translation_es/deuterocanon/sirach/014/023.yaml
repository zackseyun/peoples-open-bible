review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del paralelo griego: alguien que mira por la ventana de la Sabiduría personificada y luego escucha junto a su entrada. Sin embargo, «por su ventana» queda algo menos preciso que «a través de / por la ventana» en combinación con «se asoma», y la nota al pie está mal anclada: el marcador [a] aparece en «ventana», pero la alternativa léxica afecta a «escuchará», no a «ventana».'
  spanish_quality_summary: El español es natural y legible, pero la segunda mitad suena más idiomática con «junto a su puerta» o «a su entrada» que con «a su puerta» tras una coma. Además, conviene recolocar la nota al verbo auditivo para evitar confusión. El conjunto requiere solo un ajuste menor.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La personificación femenina se conserva adecuadamente con «su». La elección «escuchará» para יְצוֹתֵת concuerda con el audit trail; la alternativa «espiará» en la nota no es la mejor formulación para el inglés «eavesdrop», y sería preferible «escuchará a escondidas» u «oirá a escondidas».
  issues:
  - severity: medium
    issue: Marcador de nota al pie colocado en la palabra equivocada
    rationale: La nota explica una alternativa para יְצוֹתֵת («escuchará / escuchará a escondidas»), pero el marcador [a] está en «ventana». Esto rompe la correspondencia exigida entre anclaje y nota.
  - severity: low
    issue: La alternativa de la nota «espiará» cambia de campo semántico
    rationale: El verbo base en hebreo y griego es auditivo en este hemistiquio. «Espiará» puede sugerir observar visualmente, mientras que la nota inglesa aclara un matiz de escuchar furtivamente.
  - severity: low
    issue: Ligera mejora de naturalidad en el segundo hemistiquio
    rationale: «Y a su puerta escuchará» es entendible, pero «y junto a su puerta escuchará» suena más natural en español sin alterar el sentido.
  revised_spanish_text: El que se asoma por su ventana, y junto a su puerta escuchará[a].
  revised_footnotes:
  - marker: a
    text: 'O: «escuchará a escondidas». El hebreo sugiere escuchar con atención, de cerca; el paralelo griego tiene simplemente «escuchará».'
