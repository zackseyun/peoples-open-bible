    text: O «brazos» o «fuerzas militares» para «fuerzas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el santuario, la fortaleza»; posiblemente «el santuario fortificado».'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el regular/continuo»; se refiere al holocausto diario continuo.'
    reason: lexical_alternative
  - marker: d
    text: O «la abominación que desola».
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la precisión cultual del español sin apartarse del hebreo ni del rastro de auditoría inglés: se simplificó la expresión de procedencia, se cambió «regular» por «continuo» para reflejar mejor התמיד en español bíblico, y se normalizó la puntuación de la nota b.'
