translation:
  language: es
  text: Porque mi pueblo es necio; no me conocen. Son hijos[a] necios, y no tienen entendimiento. Son sabios para hacer el mal, pero no saben hacer el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos». El hebreo dice literalmente «hijos», pero aquí funciona como colectivo para el pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del juicio anterior; en español, 'Porque' conserva mejor la fuerza causal/explicativa que el hebreo tiene aquí en contexto profético.
- source_word: אֱוִיל
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - foolish → necio/insensato
  - insensato
  lexicon: HALOT
  rationale: El término expresa necedad moral y espiritual, no solo falta de inteligencia. 'Necio' es natural en español bíblico y conserva bien esa carga.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Se mantiene la relación de pacto y pertenencia implícita en el hebreo; 'mi pueblo' es la forma más directa y fiel en español.
- source_word: אוֹתִי לֹא יָדָעוּ
  english_pob_choice: they do not know me
  chosen_spanish: no me conoce
  alternatives_spanish:
  - no me han conocido
  - no me reconocen
  lexicon: HALOT
  rationale: '''Conocer'' aquí es conocimiento relacional y de pacto. En español, ''no me conoce'' comunica de forma clara esa relación rota, aunque el sujeto colectivo tenga valor plural.'
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: Hijos
  alternatives_spanish:
  - Hijos e hijas
  - Sons
  lexicon: HALOT
  rationale: El hebreo usa el masculino plural como colectivo para el pueblo. 'Hijos' mantiene el eco literal sin restringir innecesariamente el sentido al varón; se deja la alternativa de 'children' en la nota por la tensión lexical.
- source_word: סְכָלִים
  english_pob_choice: foolish
  chosen_spanish: necios
  alternatives_spanish:
  - insensatos
  - tontos
  lexicon: HALOT
  rationale: En paralelo con אֱוִיל, el término refuerza la necedad con un matiz de torpeza moral. 'Necios' conserva el tono profético sin bajar el registro.
- source_word: וְלֹא נְבוֹנִים
  english_pob_choice: and they have no understanding
  chosen_spanish: y no tienen entendimiento
  alternatives_spanish:
  - y no son prudentes
  - y no son discernidores
  lexicon: HALOT
  rationale: נבון señala discernimiento/entendimiento. La forma española natural 'no tienen entendimiento' preserva la idea sin endurecer demasiado la sintaxis.
- source_word: חֲכָמִים הֵמָּה לְהָרַע
  english_pob_choice: They are wise to do evil
  chosen_spanish: Sabios son para el mal
  alternatives_spanish:
  - Sabios son para hacer el mal
  - Son hábiles para hacer el mal
  lexicon: HALOT
  rationale: 'La construcción es irónica: sabiduría aplicada al mal. ''Sabios son para el mal'' mantiene la brevedad y el contraste, aunque la preposición ''para'' deja implícito el uso práctico de esa sabiduría.'
- source_word: וּלְהֵיטִיב לֹא יָדָעוּ
  english_pob_choice: but they do not know how to do good
  chosen_spanish: pero para hacer el bien no saben
  alternatives_spanish:
  - pero no saben hacer el bien
  - pero no conocen el bien
  lexicon: HALOT
  rationale: El infinitivo con יָדַע expresa habilidad práctica. 'No saben' conserva ese matiz de incapacidad moral/práctica; 'para hacer el bien' hace explícito el contraste con el mal.
theological_decisions:
- issue: Conocimiento de Dios como conocimiento relacional/covenantal
  english_pob_reading: they do not know me
  chosen_spanish_reading: no me conoce
  alternative_spanish_readings:
  - no me han conocido
  - no me reconocen
  rationale: En el profeta, 'conocer' a Dios no es mera información sino reconocimiento y relación de pacto. La traducción simple preserva esa fuerza sin sobreexplicarla en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor colectivo del masculino plural בָּנִים
  english_pob_reading: children
  chosen_spanish_reading: Hijos
  alternative_spanish_readings:
  - hijos e hijas
  - niños
  rationale: El hebreo usa una forma masculina con valor colectivo. En español, 'hijos' mantiene la señal formal del texto y evita una paráfrasis que borre la textura lexical; la nota explica la posible lectura colectiva.
  doctrine_reference: Translation philosophy §4
- issue: Ironía de la sabiduría aplicada al mal
  english_pob_reading: They are wise to do evil
  chosen_spanish_reading: Sabios son para el mal
  alternative_spanish_readings:
  - Son sabios para hacer el mal
  - Son hábiles para hacer el mal
  rationale: El verso contrapone una supuesta sabiduría con el mal y la incapacidad para el bien. La traducción retiene la ironía sin suavizarla.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: 'La revisión inglesa reciente cambió ''stupid children'' por ''foolish children'' y ajustó ''wise in doing evil'' a ''wise to do evil'' para mayor cercanía formal y registro más digno. La versión española sigue esa dirección: evita un insulto coloquial y conserva la ironía moral del hebreo con un tono sobrio y publicable.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - '''Necio/necios'' se usa para reproducir el campo semántico de אֱוִיל/סְכָלִים sin oscilar hacia términos demasiado modernos o demasiado suaves.'
  - La nota de pie marca la alternativa 'hijos' porque el hebreo es literalmente masculino plural y el colectivo es interpretativo.
  - '''No me conoce'' se deja en presente para reflejar el estado continuo y la acusación profética vigente.'
