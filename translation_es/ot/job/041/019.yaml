lexical_decisions:
- source_word: יַחְשֹׁב
  english_pob_choice: regards
  chosen_spanish: considera
  alternatives_spanish:
  - estima
  - ve como
  - tiene por
  lexicon: HALOT
  rationale: חשׁב en este contexto expresa evaluación o valoración, no solo pensamiento interno. «Considera» comunica de forma natural la idea de que Leviatán trata esos materiales como de escaso valor.
- source_word: לְתֶבֶן
  english_pob_choice: as straw
  chosen_spanish: como paja
  alternatives_spanish:
  - como rastrojo
  - como tamo
  lexicon: HALOT
  rationale: תבן se refiere a paja o forraje seco. «Paja» es claro en español y conserva la imagen de algo liviano e insignificante.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - fierro
  lexicon: HALOT
  rationale: Es el metal estándar del hebreo bíblico; «hierro» es la equivalencia directa y digna en español.
- source_word: לְעֵץ רִקָּב֣וֹן
  english_pob_choice: as rotten wood
  chosen_spanish: como madera podrida
  alternatives_spanish:
  - como madera carcomida
  - como madera descompuesta
  lexicon: HALOT
  rationale: La construcción comunica literalmente «madera de podredumbre/decadencia». «Madera podrida» mantiene el sentido idiomático y la fuerza visual del hebreo.
- source_word: נְחוּשָׁה
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: נְחוּשָׁה puede referirse a cobre o bronce. En este contexto material/armamentístico, «bronce» es la opción más probable y coincide con la decisión auditada del POB inglés.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada están en alto acuerdo; no se registran revisiones aplicadas ni tensiones textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se conserva el paralelismo del hebreo con dos miembros coordinados por «y».
  - «Como» refleja adecuadamente el valor comparativo del ל hebreo en ambos sintagmas.
  - Se mantiene «bronce» en el texto principal, con nota de alternativa léxica por la ambigüedad bien documentada de נְחוּשָׁה.
