  to: Pero tú y tus hijos contigo guardarán[a] su sacerdocio para todo lo que atañe al altar y para lo que está dentro del velo[b]; y servirán. Yo doy su sacerdocio como un don de servicio[c], pero el que no está autorizado[d] y se acerque será condenado a muerte.
