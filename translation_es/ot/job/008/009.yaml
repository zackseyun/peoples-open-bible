translation:
  language: es
  text: Porque nosotros somos de ayer y no sabemos, porque nuestros días sobre la tierra son una sombra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «somos gente de ayer»; es decir, existimos desde hace muy poco y por eso nuestro conocimiento es limitado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación previa; «Porque» mantiene la relación explicativa y suena natural en español bíblico sin perder el vínculo causal del hebreo.
- source_word: תְמֹול
  english_pob_choice: of yesterday
  chosen_spanish: de ayer
  alternatives_spanish:
  - de hace un día
  - de ayer mismo
  lexicon: HALOT
  rationale: La expresión hebrea funciona como idiomática de reciente origen. «De ayer» conserva la imagen y la brevedad temporal, como en la decisión inglesa de mantener la metáfora cercana al hebreo.
- source_word: אֲנַחְנוּ
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - somos
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para reproducir el énfasis del hebreo: «nosotros» subraya la generalidad humana del argumento.'
- source_word: וְלֹא נֵדָע
  english_pob_choice: and do not know
  chosen_spanish: y no sabemos
  alternatives_spanish:
  - y no conocemos
  - y no entendemos
  lexicon: HALOT
  rationale: El imperfecto 1cp con negación de ידע se expresa de forma directa con «no sabemos». Evita intensificar el sentido más allá del hebreo.
- source_word: צֵל
  english_pob_choice: a shadow
  chosen_spanish: una sombra
  alternatives_spanish:
  - sombra
  - una sombra pasajera
  lexicon: HALOT
  rationale: «Una sombra» reproduce la imagen metafórica de transitoriedad e insustancialidad con el mismo valor figurado que la versión inglesa auditada.
- source_word: יָמֵינוּ
  english_pob_choice: our days
  chosen_spanish: nuestros días
  alternatives_spanish:
  - los días de nosotros
  - nuestro tiempo
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva sencilla del hebreo; «nuestros días» mantiene la referencia temporal concreta y poética.
- source_word: עֲלֵי אָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra aquí
  lexicon: HALOT
  rationale: «Sobre la tierra» corresponde bien al valor locativo de עֲלֵי אָרֶץ y preserva el registro poético. «Tierra» es más natural en español bíblico que «la tierra» en sentido de planeta, y evita ambigüedad con el suelo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el pasaje auditado de alta concordancia y conserva la estructura poética y la imagen de transitoriedad del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantiene el paralelismo causal con dos miembros introducidos por «Porque», reflejando el doble כִּי del hebreo.
  - No se suaviza la metáfora de la sombra ni se reemplaza por una explicación interpretativa en el cuerpo principal.
