translation:
  language: es
  text: 'Moisés dijo a Coré: «Tú y toda tu congregación, estén delante de Yahvé[a] mañana: tú, ellos y Aarón[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en presencia de Yahvé mañana».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tú y ellos y Aarón», una enumeración explícita de las partes que debían presentarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce la siguiente acción narrativa; en español, en esta frase breve, el simple ‘dijo’ comunica con naturalidad la secuencia sin sobrecargar la oración con un ‘y’ inicial innecesario.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Marca al destinatario directo del habla; ‘a’ es la equivalencia natural en español.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: La tradición bíblica en español usa normalmente ‘Coré’ para este nombre propio; conserva identificabilidad sin mecanizar la transliteración inglesa.
- source_word: אַתָּה וְכָל עֲדָתְךָ
  english_pob_choice: You and all your congregation
  chosen_spanish: Tú y toda tu congregación
  alternatives_spanish:
  - Tú y toda tu asamblea
  - Tú y toda tu comunidad
  lexicon: HALOT
  rationale: ‘עֵדָה’ designa al grupo reunido; ‘congregación’ preserva la referencia colectiva y sigue siendo idiomático en contexto bíblico.
- source_word: הֱיוּ
  english_pob_choice: be
  chosen_spanish: preséntense
  alternatives_spanish:
  - estén
  - comparezcan
  lexicon: HALOT
  rationale: En este contexto la orden no es meramente ontológica sino de comparecer/estar presentes ante Yahvé; ‘preséntense’ comunica bien la fuerza imperativa plural sin perder la idea de presencia.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: ‘לִפְנֵי’ significa ‘delante de/en presencia de’; se mantiene el nombre divino ‘Yahvé’ según el estándar del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: אַתָּה וָהֵם וְאַהֲרֹן
  english_pob_choice: you and they and Aaron
  chosen_spanish: tú, ellos y Aarón
  alternatives_spanish:
  - tú y ellos y Aarón
  - tú, ellos, y Aarón
  lexicon: HALOT
  rationale: La enumeración hebrea es explícita y enfática; la puntuación española conserva la lista de los comparecientes sin borrar la repetición del pronombre.
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Conforme a la terminología del proyecto, se conserva el nombre divino explícito en español como ‘Yahvé’ en vez de enmascararlo con ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del imperativo הֱיוּ en el contexto de comparecencia
  english_pob_reading: be
  chosen_spanish_reading: preséntense
  alternative_spanish_readings:
  - estén
  - aparezcan
  - comparezcan
  rationale: Aunque el verbo base es ‘ser/estar’, el contexto judicial-cultual requiere presencia efectiva ante Yahvé. ‘Preséntense’ evita una lectura demasiado abstracta y conserva la orden concreta de comparecer.
  doctrine_reference: Contexto narrativo-jurídico de Números 16
- issue: Enumeración enfática ‘tú y ellos y Aarón’
  english_pob_reading: you and they and Aaron
  chosen_spanish_reading: tú, ellos y Aarón
  alternative_spanish_readings:
  - tú y ellos y Aarón
  - tú, ellos, y Aarón
  rationale: La coordinación triple es deliberada. La traducción española mantiene la lista y la separación de los participantes, sin convertirla en una frase más fluida que borre el énfasis del hebreo.
  doctrine_reference: Nota sintáctica del hebreo bíblico
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura aprobada del inglés POB y conserva sus dos tensiones principales: el nombre divino explícito y la enumeración enfática de los participantes. No se detectaron revisiones aplicadas en el expediente inglés; por eso la redacción española se mantiene estable y auditable.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se elige ‘Coré’ como forma española bíblica habitual, pero se documenta la alternativa transliterada en nota.
  - ‘Congregación’ conserva el sentido colectivo de עֵדָה sin imponer un término eclesiástico más técnico que el hebreo.
  - La puntuación con dos puntos y la lista final preserva el énfasis del hebreo sin volver la frase artificial.
