translation:
  language: es
  text: Y entregaron los decretos del rey a los sátrapas del rey y a los gobernadores de Más allá del Río[a], y apoyaron[b] al pueblo y a la casa de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Más allá del Río» traduce la designación administrativa persa עֵבֶר הַנָּהָר, usada para la región occidental del Éufrates, no solo como referencia geográfica literal.
    reason: cultural_note
  - marker: b
    text: O «ayudaron» o «asistieron»; el verbo hebreo literalmente significa «levantaron» o «llevaron», aquí con el sentido de brindar apoyo.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «el templo de Dios»; el hebreo dice literalmente «la casa de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: they delivered
  chosen_spanish: y entregaron
  alternatives_spanish:
  - y dieron
  - y remitieron
  lexicon: HALOT
  rationale: En un contexto administrativo y oficial, «entregaron» comunica una transmisión formal de documentos con naturalidad en español, sin perder el valor básico de נתן.
- source_word: דָּתֵי הַמֶּלֶךְ
  english_pob_choice: the king’s decrees
  chosen_spanish: los decretos del rey
  alternatives_spanish:
  - las leyes del rey
  - los edictos del rey
  lexicon: HALOT
  rationale: «Decretos» refleja bien la fuerza de disposiciones oficiales persas. «Leyes» podría sonar demasiado amplio; «edictos» es posible, pero «decretos» resulta más claro y actual.
- source_word: אֲחַשְׁדַּרְפְּנֵי
  english_pob_choice: satraps
  chosen_spanish: los sátrapas
  alternatives_spanish:
  - los gobernadores provinciales
  - los funcionarios provinciales
  lexicon: HALOT
  rationale: «Sátrapas» es el equivalente histórico estándar para esta función persa y conserva la precisión del término técnico.
- source_word: פַחֲוֹת
  english_pob_choice: governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los prefectos
  - los administradores
  lexicon: HALOT
  rationale: «Gobernadores» es la opción más natural y fiel para פחה en este contexto administrativo.
- source_word: עֵבֶר הַנָּהָר
  english_pob_choice: Beyond the River
  chosen_spanish: del otro lado del río
  alternatives_spanish:
  - Más allá del río
  - la región al otro lado del río
  lexicon: HALOT
  rationale: La expresión persa administrativa se vierte de modo comprensible en español. Se mantiene el valor geográfico sin imponer una transliteración innecesaria en el texto principal.
- source_word: וְנִשְּׂאוּ
  english_pob_choice: they supported
  chosen_spanish: apoyaron
  alternatives_spanish:
  - sostuvieron
  - ayudaron
  - asistieron
  lexicon: HALOT
  rationale: El verbo hebreo literalmente puede significar «levantar» o «llevar», pero aquí el contexto exige apoyo práctico. «Apoyaron» conserva esa fuerza sin ser excesivamente interpretativo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pueblo»; «al pueblo» mantiene esa amplitud sin añadir identificación no explícita.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: «Casa de Dios» conserva la metáfora hebrea de manera transparente. «Templo de Dios» es una posible interpretación, pero la traducción principal retiene la expresión literal.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el registro y las decisiones del POB inglés: «delivered» > «entregaron», «Beyond the River» como término administrativo persa, y el cierre conserva la metáfora «house of God» con una nota alternativa para «templo». No se registraron revisiones sustantivas en el pasaje base.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva el plural técnico «sátrapas» y el singular colectivo «el pueblo» como en el hebreo.
  - La preposición «del otro lado de» evita una calca rígida y mantiene la designación administrativa reconocible en español.
  - Se eligió «casa de Dios» en el texto principal por fidelidad a la expresión hebrea, con nota para la alternativa tradicional «templo de Dios».
