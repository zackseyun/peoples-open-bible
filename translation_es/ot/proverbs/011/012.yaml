translation:
  language: es
  text: Quien desprecia a su prójimo[a] carece de sensatez[b], pero un hombre[c] de entendimiento guarda silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «a su amigo» o «a su compañero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «carece de corazón», un modismo hebreo para referirse a la falta de sensatez o entendimiento.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa lenguaje masculino singular de modo representativo.
    reason: theological_note
lexical_decisions:
- source_word: בָּז
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - menosprecia
  - mira con desprecio
  - desdén
  lexicon: HALOT
  rationale: El participio expresa tratar a otro con desdén o contemptuosa superioridad. «Desprecia» conserva esa fuerza moral en español y funciona bien en el paralelismo sapiencial.
- source_word: לְרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su amigo
  - a su compañero
  - a su vecino
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o prójimo. En este proverbio la relación ética es amplia, no solo de amistad íntima; «prójimo» comunica mejor el alcance social y moral del término.
- source_word: חֲסַר לֵב
  english_pob_choice: lacks sense
  chosen_spanish: carece de sensatez
  alternatives_spanish:
  - lacks heart
  - carece de corazón
  - carece de entendimiento
  - es insensato
  lexicon: HALOT
  rationale: El hebreo dice literalmente «falto de corazón», un modismo donde לֵב refiere la facultad de juicio y discernimiento. «Carece de sensatez» transmite el sentido idiomático sin perder la tensión semántica del original.
- source_word: תְּבוּנוֹת
  english_pob_choice: of understanding
  chosen_spanish: de entendimiento
  alternatives_spanish:
  - de discernimiento
  - de inteligencia
  - de perspicacia
  lexicon: HALOT
  rationale: Aunque el sustantivo está en plural formal, expresa la cualidad de discernir. «Entendimiento» es natural en español bíblico y preserva la idea sapiencial de juicio maduro.
- source_word: יַחֲרִישׁ
  english_pob_choice: keeps silent
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - calla
  - permanece callado
  - se mantiene en silencio
  lexicon: HALOT
  rationale: El verbo indica silencio deliberado, no mera ausencia de habla. «Guarda silencio» comunica mejor la contención intencional del sabio frente al desprecio.
theological_decisions:
- issue: Lenguaje masculino representativo en אִישׁ
  english_pob_reading: a man of understanding
  chosen_spanish_reading: un hombre de entendimiento
  alternative_spanish_readings:
  - una persona de entendimiento
  - quien tiene entendimiento
  rationale: El hebreo usa singular masculino representativo. Se conserva «hombre» porque aquí funciona como forma proverbial genérica y corresponde al valor del texto fuente, sin neutralizarlo innecesariamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El contexto de auditoría muestra alta concordancia y sin revisiones aplicadas; se mantiene el sentido del hebreo WLC con equivalencias españolas naturales y se conservan las tensiones léxicas relevantes: רֵעַ como prójimo/amigo, לֵב como sensatez/entendimiento y אִישׁ como masculino representativo.'
  spanish_consistency_notes:
  - Se prefirió «prójimo» por coherencia ética sapiencial y para evitar restringir רֵעַ a una amistad íntima.
  - Se evitó «corazón» en el cuerpo principal para no oscurecer el modismo hebreo en español moderno; la nota preserva la literalidad.
  - «Guarda silencio» mantiene la idea de silencio voluntario del sabio, en contraste con el desprecio del primer hemistiquio.
  - Se conservó «hombre» como equivalente del hebreo אִישׁ por su uso representativo en el proverbio.
