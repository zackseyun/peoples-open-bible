translation:
  language: es
  text: Pero los que estaban con Esdrin combatían por más tiempo y estaban agotados, así que Judas invocó al Señor para que se manifestara como aliado[a] y como guía de la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para que se mostrara como aliado y como guía en la batalla'. El griego προοδηγός puede enfatizar a quien va delante como guía.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δὲ περὶ τὸν Ἔσδριν
  english_pob_choice: those with Esdrin
  chosen_spanish: los que estaban con Esdrin
  alternatives_spanish:
  - los hombres alrededor de Esdrin
  - las fuerzas de Esdrin
  lexicon: LSJ
  rationale: La construcción περὶ + acusativo con nombre personal designa al grupo asociado con esa persona. 'Los que estaban con Esdrin' preserva esa relación sin forzar una estructura militar más específica de la que el griego exige.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: for a longer time
  chosen_spanish: desde hacía más tiempo
  alternatives_spanish:
  - por más tiempo
  - durante más tiempo
  lexicon: LSJ
  rationale: En contexto con μαχομένων, la frase expresa duración o continuidad del combate. 'Desde hacía más tiempo' comunica claramente una pelea prolongada en español natural.
- source_word: μαχομένων
  english_pob_choice: were fighting
  chosen_spanish: combatían
  alternatives_spanish:
  - estaban peleando
  - estaban combatiendo
  lexicon: LSJ
  rationale: El participio de μάχομαι en contexto militar pide un verbo de combate. 'Combatían' mantiene el aspecto continuo y un registro sobrio y digno.
- source_word: κατακόπων ὄντων
  english_pob_choice: were exhausted
  chosen_spanish: estaban agotados
  alternatives_spanish:
  - estaban exhaustos
  - estaban muy cansados
  lexicon: LSJ
  rationale: κατάκοπος denota cansancio extremo o agotamiento. 'Agotados' es fuerte pero natural, y evita debilitar la fuerza del término.
- source_word: ἐπικαλεσάμενος
  english_pob_choice: called on
  chosen_spanish: invocó
  alternatives_spanish:
  - llamó a
  - apeló a
  lexicon: LSJ
  rationale: Con τὸν κύριον en un contexto de súplica, el verbo indica invocar o llamar en oración. 'Invocó' conserva ese sentido devocional con precisión.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: LSJ
  rationale: En este contexto judío-griego, κύριος se refiere reverentemente a Dios. En español, 'el Señor' es la equivalencia estándar y más clara para ese uso.
- source_word: σύμμαχον
  english_pob_choice: an ally
  chosen_spanish: aliado
  alternatives_spanish:
  - ayudante
  - auxiliador
  lexicon: LSJ
  rationale: 'σύμμαχος tiene fuerza militar: alguien que combate al lado de otro. ''Aliado'' preserva bien esa relación de apoyo en batalla sin introducir matices ajenos.'
- source_word: προοδηγὸν
  english_pob_choice: the leader
  chosen_spanish: guía
  alternatives_spanish:
  - caudillo
  - quien va delante
  lexicon: LSJ
  rationale: El sustantivo puede significar uno que va delante como guía. 'Guía' transmite mejor en español la idea de ir al frente y orientar, mientras que 'lider' podría sonar demasiado moderno o institucional.
- source_word: φανῆναι
  english_pob_choice: to appear
  chosen_spanish: para que se manifestara
  alternatives_spanish:
  - para que apareciera
  - para mostrarse
  lexicon: LSJ
  rationale: El infinitivo expresa manifestación divina sin exigir necesariamente una visión visible. 'Se manifestara' mantiene esa tensión entre aparición y actuación perceptible.
- source_word: τοῦ πολέμου
  english_pob_choice: of the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - de la batalla
  - para la batalla
  lexicon: LSJ
  rationale: El genitivo se entiende con προοδηγόν como la función de ir delante en combate. 'En la batalla' suena natural en español y conserva el marco bélico inmediato.
theological_decisions:
- issue: Cómo traducir κύριος en una súplica judía
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: La petición de Judas es a Dios; por eso κύριος debe leerse reverentemente como 'el Señor'. Esta opción mantiene la resonancia bíblica sin ocultar el referente divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Mantener la tensión entre ayuda divina y manifestación
  english_pob_reading: to appear as an ally and as the leader of the battle
  chosen_spanish_reading: para que se manifestara como aliado y como guía en la batalla
  alternative_spanish_readings:
  - para que apareciera como aliado y como guía en la batalla
  - para mostrarse como aliado y guía en la batalla
  rationale: El griego pide una manifestación de Dios en ayuda militar, sin especificar si es visible o solo efectiva. 'Se manifestara' conserva esa tensión sin resolverla demasiado hacia lo literal o lo metafórico.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete (1909) y mantiene la lectura auditada del inglés POB: duración prolongada del combate, agotamiento, e invocación de la ayuda divina con la tensión abierta de φανῆναι. Se corrigió la anotación previa para anclar la única nota al lema ''aliado[a]'' dentro del texto.'
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος conforme al contexto devocional judío.
  - '''Aliado'' y ''guía'' conservan el campo bélico de σύμμαχος y προοδηγός sin introducir términos eclesiásticos ajenos.'
  - '''Se manifestara'' evita fijar indebidamente si la ayuda divina fue visible, simbólica o ambas cosas.'
  - '''Combatían'' y ''agotados'' mantienen el aspecto progresivo y la fuerza del original griego.'
