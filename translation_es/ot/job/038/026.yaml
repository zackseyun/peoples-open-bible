translation:
  language: es
  text: para hacer llover sobre una tierra donde no hay hombre[a], sobre un paraje silvestre en el que no hay ser humano
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde no hay hombre ... en el que no hay hombre». El hebreo usa dos términos relacionados pero distintos: אִישׁ («hombre») y אָדָם («ser humano, humanidad»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַמְטִיר
  english_pob_choice: to make it rain
  chosen_spanish: hacer llover
  alternatives_spanish:
  - causar que llueva
  - llover
  lexicon: HALOT
  rationale: El causativo hebreo expresa provocar lluvia. En español, «hacer llover» conserva esa fuerza causativa con naturalidad; «llover» solo perdería el matiz de causación.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición introduce la superficie o ámbito que recibe la lluvia. «Sobre» transmite bien la idea espacial sin sonar forzado.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - una tierra
  - un país
  - la tierra
  lexicon: HALOT
  rationale: Aquí no se trata del globo terráqueo sino de una extensión de terreno. «Una tierra» conserva el artículo indefinido y la referencia territorial.
- source_word: לֹא אִישׁ
  english_pob_choice: where no man is
  chosen_spanish: donde no hay hombre
  alternatives_spanish:
  - donde no hay varón
  - donde no hay nadie
  lexicon: HALOT
  rationale: אִישׁ es el término masculino singular usado en el hebreo. Mantengo «hombre» para no neutralizar la forma del original, y la construcción existencial «no hay» expresa con naturalidad el valor de presencia/ausencia.
- source_word: מִדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - un desierto
  - un desierto estéril
  - una tierra baldía
  lexicon: HALOT
  rationale: Aunque el término puede abarcar estepa o paraje deshabitado, en español bíblico «desierto» comunica bien el ámbito inhóspito y deshabitado. Se conserva el paralelismo poético con la primera cola.
- source_word: לֹא אָדָם בּוֹ
  english_pob_choice: in which there is no human
  chosen_spanish: en el que no hay humano
  alternatives_spanish:
  - en el que no hay hombre
  - en el que no hay persona
  - donde no hay ser humano
  lexicon: HALOT
  rationale: אָדָם aquí es genérico y abarca a la humanidad. «Humano» preserva ese sentido más amplio y mantiene la distinción con אִישׁ, tal como lo hace la traducción inglesa auditada.
theological_decisions:
- issue: Distinción entre אִישׁ y אָדָם
  english_pob_reading: 'The Hebrew uses two related but distinct terms: אִישׁ (''man'') and אָדָם (''human, humankind'').'
  chosen_spanish_reading: 'El hebreo usa dos términos relacionados pero distintos: אִישׁ («hombre») y אָדָם («humano»).'
  alternative_spanish_readings:
  - אִישׁ y אָדָם ambos como «hombre»
  - אִישׁ como «varón» y אָדָם como «humanidad»
  rationale: 'Conviene preservar la tensión léxica del hebreo: el primer término es más marcadamente masculino, mientras que el segundo puede abarcar a la humanidad en general. Traducir ambos igual borraría un rasgo visible del texto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia y sin cambios en la última revisión; por eso el borrador sigue de cerca la solución auditada, conservando la distinción entre אִישׁ y אָדָם y la causatividad de לְהַמְטִיר.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Conservo «hombre» para אִישׁ y «humano» para אָדָם, evitando una neutralización que borre la distinción del hebreo.
  - «Hacer llover» mantiene el valor causativo de לְהַמְטִיר mejor que un simple «llover».
