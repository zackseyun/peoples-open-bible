translation:
  language: es
  text: Y el hombre fue de la ciudad, de Belén de Judá, para residir temporalmente dondequiera que encontrara lugar. Y llegó a la región montañosa de Efraín, hasta la casa de Micaía, para seguir su camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacer su camino» o «mientras hacía su camino». El hebreo literalmente dice «para hacer su camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - partió
  - anduvo
  lexicon: HALOT
  rationale: El hebreo narra movimiento con וַיֵּלֶךְ. En español, 'salió' comunica naturalmente el inicio del desplazamiento desde el punto de partida, manteniendo el avance narrativo sin forzar un calco.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el hombre aquel
  lexicon: HALOT
  rationale: Se conserva el referente inmediato y genérico del hebreo. 'El hombre' es la opción más directa y publica-ble en español.
- source_word: מֵהָעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la ciudad
  - desde la ciudad
  lexicon: HALOT
  rationale: El hebreo expresa procedencia; 'de la ciudad' es natural en español y mantiene el punto de partida. 'Desde' también sería posible, pero no es necesario aquí.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem of Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén de Judá
  - de Belén, de Judá
  lexicon: HALOT
  rationale: Se usa 'Belén' como transliteración bíblica estable en español y se preserva el complemento geográfico 'de Judá' para distinguirla de otras menciones de Belén.
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar
  - para residir
  - para vivir
  lexicon: HALOT
  rationale: El verbo גור implica residir como forastero o de manera provisional. 'Habitar' conserva el sentido de residir sin imponer el matiz teológico de 'sojourn' en español moderno; se evita 'vivir' por ser demasiado general.
- source_word: בַּאֲשֶׁר יִמְצָא
  english_pob_choice: wherever he might find a place
  chosen_spanish: dondequiera que encontrara[a]
  alternatives_spanish:
  - dondequiera que hallara
  - donde pudiera encontrar lugar
  - allí donde encontrara
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y omite el objeto explícito en la superficie. El español requiere completar el sentido con la idea de un lugar implícito; se conserva la apertura indefinida con 'dondequiera que'.
- source_word: וַיָּבֹא
  english_pob_choice: he came
  chosen_spanish: Y llegó
  alternatives_spanish:
  - Y vino
  - Y fue
  lexicon: HALOT
  rationale: '''Llegó'' expresa bien el arribo al nuevo destino y encaja con el flujo narrativo del verso.'
- source_word: הַר אֶפְרַיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: la región montañosa de Efraín
  alternatives_spanish:
  - la región montañosa de Efraín
  - la montaña de Efraín
  - el monte Efraín
  lexicon: HALOT
  rationale: La expresión denota una región, no una montaña aislada. 'Región montañosa' preserva el sentido geográfico en español contemporáneo.
- source_word: עַד בֵּית מִיכָה
  english_pob_choice: as far as the house of Micah
  chosen_spanish: hasta la casa de Micaías
  alternatives_spanish:
  - hasta la casa de Micaías
  - hasta la casa de Micah
  lexicon: HALOT
  rationale: עַד marca alcance o límite. Se mantiene 'hasta' y se traduce el nombre como 'Micaías', forma española bíblica más usual y reconocible.
- source_word: לַעֲשׂוֹת דַּרְכּוֹ
  english_pob_choice: to continue his journey
  chosen_spanish: para seguir su camino
  alternatives_spanish:
  - para hacer su camino
  - para continuar su viaje
  - para irse por su camino
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hacer su camino', pero en español esa fórmula sería pesada. 'Seguir su camino' comunica el sentido idiomático sin perder la idea de continuar en ruta.
translation_notes:
  revision_awareness: El inglés POB revisó 'town' a 'city' para ajustarse más al hebreo עיר; por eso en español se mantiene 'ciudad'. También optó por una solución idiomática para לַעֲשׂוֹת דַּרְכּוֹ; el presente borrador conserva esa decisión con una nota de alternativa literal. En la frase de procedencia, se preserva Belén de Judá como topónimo distinguible y se evita aplanar el valor geográfico de הַר אֶפְרַיִם.
  spanish_consistency_notes:
  - Se mantiene el nombre propio bíblico 'Belén de Judá' para distinguirlo de otras referencias a Belén.
  - '''Región montañosa de Efraín'' sigue la lectura geográfica de הַר אֶפְרַיִם, no una montaña singular.'
  - '''Micaías'' conserva una forma española habitual del nombre, coherente con la tradición bíblica en español.'
  - La nota al pie marca la tensión entre el hebreo literal 'hacer su camino' y la solución idiomática adoptada en el texto principal.
