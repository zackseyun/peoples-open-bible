revisions:
- from: ¡Mira![a] Se han vuelto como rastrojo; el fuego los consume. No pueden librarse de la mano de la llama. No hay brasa para calentarse, ni fuego para sentarse frente a él.
  to: ¡Mira![a] Se han vuelto como rastrojo; el fuego los consume. No pueden librarse de la mano de la llama. No hay brasa para calentarse, ni fuego delante del cual sentarse.
  rationale: Se hizo una reparación menor de estilo y fidelidad idiomática en la última cláusula, cambiando «frente a él» por «delante del cual sentarse», que refleja mejor la imagen de sentarse ante un fuego de hogar. También se normalizó la puntuación inicial de la nota al pie. No se requieren cambios doctrinales ni léxicos de fondo.
