  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue adecuadamente el rastro auditado en puntos clave: אֶבֶן como referente comercial (''pesa''), אֵיפָה como ''efa'', לְמַעַן como propósito, y יְהוָה como ''Yahvé''. También conserva la idea de plenitud e integridad moral en ''completa y justa''. Sin embargo, la colocación del marcador [a] en ''Tendrás[a]'' no corresponde al referente léxico anotado, que es אֶבֶן/''pesa'', y crea un anclaje incorrecto. Además, la nota [b] sobre ''efa'' no está respaldada por una nota correspondiente en el POB inglés; no es errónea, pero no es necesaria aquí.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno y digno. No obstante, la ubicación de la nota [a] debe corregirse para anclarla a 'pesa', y conviene eliminar la nota cultural adicional sobre 'efa' para mantener el aparato más ceñido al audit trail. El resto del verso suena natural en español neutral e inteligible para iglesia amplia.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֵיפָה -> ''efa''; צדק -> ''justa''. ''Pesa'' es una buena solución contextual para אֶבֶן, siempre que la nota alternativa quede anclada a esa palabra. No hay conflictos teológicos ni terminológicos mayores.'
  issues:
  - severity: medium
    issue: El marcador [a] está colocado en 'Tendrás' en vez de en 'pesa'.
    rationale: La nota explica el hebreo אֶבֶן ('piedra'), que en contexto significa una pesa de piedra usada en el comercio. El anclaje debe ir sobre el término español que traduce ese sustantivo, no sobre el verbo.
  - severity: low
    issue: La nota [b] sobre 'efa' añade información no preservada en la auditoría inglesa.
    rationale: No es una adición grave, pero el encargo pide preservar alternativas significativas cuando el inglés las preservó o cuando el español introduce nueva ambigüedad. Aquí 'efa' ya es suficientemente claro con la transliteración, y la nota extra no es necesaria.
  revised_spanish_text: Tendrás una pesa[a] completa y justa; tendrás una efa completa y justa, para que se prolonguen tus días sobre la tierra que Yahvé tu Dios te da.
  revised_footnotes:
