translation:
  language: es
  text: Si se vuelven a él con todo su corazón y con toda su alma, para hacer verdad[a] delante de él, entonces se volverá a ustedes y ciertamente no esconderá su rostro de ustedes. Miren lo que hará con ustedes, y denle gracias con todo su cuerpo[b]; bendigan al Señor de la rectitud[c] y enaltezcan al Rey de los siglos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para obrar con fidelidad delante de él». El griego dice literalmente «hacer verdad» delante de él, una expresión semítica para vivir con verdad o fidelidad ante Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con todo su ser». El griego dice literalmente «con todo su cuerpo», probablemente expresando una gratitud total y encarnada.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «al Señor de la justicia».'
    reason: alternative_reading
  - marker: d
    text: 'O: «al Rey eterno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ἐπιστρέψητε ... τότε ἐπιστρέψει
  english_pob_choice: If you turn ... then he will turn
  chosen_spanish: Si se vuelven ... entonces se volverá
  alternatives_spanish:
  - Si regresan ... entonces regresará
  - Si vuelven ... entonces volverá
  lexicon: BDAG
  rationale: El verbo repetido ἐπιστρέφω conserva en español mejor el paralelismo reciproco con «volverse» que una mezcla de «regresar» y «volver». Mantiene la idea de retorno/restauración sin perder naturalidad.
- source_word: ἐν ὅλῃ καρδίᾳ ὑμῶν καὶ ἐν ὅλῃ τῇ ψυχῇ
  english_pob_choice: with all your heart and with all your soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - con su corazón entero y con toda su alma
  - con todo su corazón y con toda su alma
  lexicon: BDAG
  rationale: La fórmula expresa entrega total. «Con todo su corazón y con toda su alma» conserva el paralelismo bíblico y su tono solemne en español.
- source_word: ποιῆσαι ἐνώπιον αὐτοῦ ἀλήθειαν
  english_pob_choice: to do truth before him
  chosen_spanish: para hacer verdad
  alternatives_spanish:
  - para hacer la verdad
  - para obrar con fidelidad
  lexicon: BDAG
  rationale: Sigo la correspondencia léxica directa con ποιῆσαι ... ἀλήθειαν, reteniendo «verdad» como objeto verbal. Añadir «delante de él» expresa ἐνώπιον αὐτοῦ. «Obrar con fidelidad» aclara el sentido, pero atenúa la tensión semítica de la expresión.
- source_word: οὐ μὴ κρύψῃ τὸ πρόσωπον αὐτοῦ ἀφʼ ὑμῶν
  english_pob_choice: will certainly not hide his face from you
  chosen_spanish: ciertamente no esconderá su rostro de ustedes
  alternatives_spanish:
  - de ningún modo esconderá su rostro de ustedes
  - nunca esconderá su rostro de ustedes
  lexicon: BDAG
  rationale: «No esconderá su rostro» conserva la imagen bíblica de presencia/favor divino, y «ciertamente» refleja la fuerza enfática de οὐ μή.
- source_word: θεάσασθε
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: BDAG
  rationale: «Miren» funciona como imperativo de atención natural en español y mantiene el llamado a reconocer la acción de Dios sin elevar el tono a un arcaísmo innecesario.
- source_word: ἐξομολογήσασθε αὐτῷ
  english_pob_choice: give thanks to him
  chosen_spanish: denle gracias
  alternatives_spanish:
  - confiesen a él
  - alábenlo
  lexicon: BDAG
  rationale: En este contexto de bendición y exaltación, el verbo expresa acción de gratitud/predicación de alabanza, no confesión de pecado. «Denle gracias» es el equivalente más claro en español.
- source_word: ἐν ὅλῳ τῷ σώματι ὑμῶν
  english_pob_choice: with your whole body
  chosen_spanish: con todo su cuerpo
  alternatives_spanish:
  - con todo su cuerpo entero
  - con todo su ser
  lexicon: BDAG
  rationale: La revisión inglesa favorece «body» de forma explícita. «Con todo su cuerpo» preserva la referencia corporal sin diluirla en una paráfrasis espiritualizante.
- source_word: τὸν κύριον τῆς δικαιοσύνης
  english_pob_choice: the Lord of righteousness
  chosen_spanish: al Señor de la justicia
  alternatives_spanish:
  - al Señor de la rectitud
  - al Señor de la justicia y la rectitud
  lexicon: BDAG
  rationale: En español, «Señor de la justicia» comunica bien el título; aquí opté por «justicia» como rasgo del epíteto divino, manteniendo la alternativa de «rectitud» si se desea resaltar el matiz moral-covenantal.
- source_word: τὸν βασιλέα τῶν αἰώνων
  english_pob_choice: the King of the ages
  chosen_spanish: al Rey de los siglos
  alternatives_spanish:
  - al Rey eterno
  - al Rey por los siglos
  lexicon: BDAG
  rationale: «De los siglos» reproduce el plural αἰώνων y conserva el tono doxológico elevado. Evita reducir prematuramente el plural a un adjetivo como «eterno».
theological_decisions:
- issue: ἀλήθεια como ‘verdad’ en una expresión semítica de fidelidad
  english_pob_reading: to do truth before him
  chosen_spanish_reading: hacer verdad delante de él
  alternative_spanish_readings:
  - obrar con fidelidad delante de él
  - practicar la verdad delante de él
  rationale: La lectura inglesa preserva la rareza semítica de ‘do truth’. En español, «hacer verdad» mantiene esa tensión y no la aplana de inmediato a una interpretación más explicativa. «Obrar con fidelidad» es válido, pero interpreta más de lo que el griego obliga.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀλήθεια / truthfulness'
- issue: δικαιοσύνη en un título divino
  english_pob_reading: the Lord of righteousness
  chosen_spanish_reading: el Señor de la justicia
  alternative_spanish_readings:
  - el Señor de la rectitud
  - el Señor de la justicia
  rationale: Aquí δικαιοσύνη funciona como epíteto divino. Opto por «justicia» porque preserva la fuerza jurídica y moral del término en un registro litúrgico claro para el español, sin perder la relación con la rectitud del carácter de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: ἐξομολογέομαι en contexto de alabanza
  english_pob_reading: give thanks to him
  chosen_spanish_reading: denle gracias
  alternative_spanish_readings:
  - confiesen a él
  - alábenlo
  rationale: 'El contexto inmediato es una doxología: bendecir, exaltar, agradecer. Por eso la elección evita trasladar automáticamente el verbo a confesión de pecados. «Denle gracias» preserva la función de alabanza.'
  doctrine_reference: 'DOCTRINE.md Contested terms: ἐξομολογέομαι'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que corrigió la frase a una equivalencia más literal de ποιῆσαι ... ἀλήθειαν («do truth») y explicitó ἐν ὅλῳ τῷ σώματι ὑμῶν como «with all your body». Por eso el español conserva la rareza semítica de «hacer verdad» y mantiene «con todo su cuerpo» en vez de una paráfrasis como «con todo su ser».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando el hebreo subyacente lo exige; en este versículo no aparece.
  - Se mantiene «Señor» para κύριος dentro del título doxológico, coherente con el griego y con la formulación auditada en inglés.
  - «Hacer verdad» se conserva de manera deliberada para no perder el valor lexical del original ni ocultar la tensión interpretativa.
  - «Con todo su cuerpo» se eligió por fidelidad a la revisión más reciente del audit trail, aunque el español admite la lectura idiomática de gratitud total.
  - El paralelismo entre volverse ustedes / se volverá él se preserva para reflejar el eco verbal del griego.
