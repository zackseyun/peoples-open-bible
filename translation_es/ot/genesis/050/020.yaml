translation:
  language: es
  text: En cuanto a ustedes, ustedes intentaron hacerme mal contra mí, pero Dios lo tuvo pensado para bien, para hacer como en este día[a]—mantener con vida a muchas personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más explícita, 'tal como es hoy'. El modismo hebreo señala el resultado presente ahora evidente.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲשַׁבְתֶּם
  english_pob_choice: you intended
  chosen_spanish: ustedes pensaron
  alternatives_spanish:
  - ustedes intentaron
  - ustedes planearon
  - ustedes maquinaban
  lexicon: HALOT 2803
  rationale: חשב aquí expresa intención deliberada orientada a un resultado. En español, 'pensaron' evita forzar un matiz técnico ajeno al uso natural y permite mantener el paralelismo con el verbo aplicado a Dios. 'Intentaron' también sería posible, pero 'pensaron' conserva mejor el valor de cálculo/propósito implícito en el verbo hebreo.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - acerca de mí
  - respecto de mí
  - hacia mí
  lexicon: HALOT 5921
  rationale: Con חשב y un objeto hostil, על tiene fuerza adversativa. 'Contra mí' reproduce esa orientación hostil de manera natural en español.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - daño
  - perjuicio
  - maldad
  lexicon: HALOT 7451
  rationale: El contraste con 'bien' pide en español un término igualmente general y moralmente cargado. 'Mal' preserva la tensión ética sin sonar demasiado abstracto como 'maldad' ni suavizarse como 'daño'.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT 430
  rationale: Aquí el sustantivo es singular en sentido y se refiere inequívocamente al Dios de Israel en acción providencial. 'Dios' es la forma natural y fiel.
- source_word: חֲשָׁבָהּ
  english_pob_choice: intended it
  chosen_spanish: lo pensó
  alternatives_spanish:
  - lo intentó
  - lo planeó
  - lo ideó
  lexicon: HALOT 2803
  rationale: Se mantiene el mismo núcleo verbal que en la primera cola, pero en una forma más natural para el español y con el objeto clítico correspondiente. 'Lo' retoma la acción/realidad expresada por 'mal' y conserva la paralelización del texto.
- source_word: לְטֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para el bien
  - en bien
  - para beneficio
  lexicon: HALOT 2896
  rationale: La oposición hebrea entre רעה y טובה se refleja bien con 'mal' / 'bien'. 'Para bien' mantiene el sentido de propósito y resultado beneficioso.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  - para que
  lexicon: HALOT 4616
  rationale: La partícula introduce finalidad. En este contexto, 'para' es la solución más natural en español y conserva la relación de propósito sin añadir una subordinación innecesariamente pesada.
- source_word: עֲשֹׂה
  english_pob_choice: to do / to bring about
  chosen_spanish: hacer
  alternatives_spanish:
  - obrar
  - realizar
  - llevar a cabo
  lexicon: HALOT 6213
  rationale: The Hebrew עשה is broad. Aquí, tras 'para', el infinitivo funciona como verbo de finalidad; 'hacer' conserva la literalidad básica y permite mantener el nexo con la frase siguiente sin sobreinterpretar 'llevar a cabo'.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: what is happening this day
  chosen_spanish: lo que se ve en este día
  alternatives_spanish:
  - como en este día
  - como ocurre hoy
  - tal como se ve hoy
  lexicon: HALOT 3117 / 2088
  rationale: El hebreo apunta al resultado presente y visible. 'Lo que se ve en este día' hace explícita esa idea en español sin perder la referencia al presente observable. Es una solución equivalente a la nota inglesa sobre el giro idiomático.
- source_word: לְהַחֲיוֹת
  english_pob_choice: to keep alive
  chosen_spanish: mantener con vida
  alternatives_spanish:
  - dar vida a
  - conservar con vida
  - preservar la vida de
  lexicon: HALOT 2421
  rationale: El hiphil de חיה significa preservar la vida o mantener vivo. 'Mantener con vida' es claro, idiomático y respeta la fuerza causativa.
- source_word: עַם רָב
  english_pob_choice: many people
  chosen_spanish: mucha gente
  alternatives_spanish:
  - mucho pueblo
  - muchas personas
  - un pueblo numeroso
  lexicon: HALOT 5971 / 7227
  rationale: עַם aquí indica un colectivo humano amplio. 'Mucha gente' expresa bien la cantidad sin forzar una identidad étnica específica y suena natural en español contemporáneo.
theological_decisions:
- issue: Paralelismo entre la intención humana mala y la intención divina buena
  english_pob_reading: Retain the same core verb ('intended') for both the brothers and God
  chosen_spanish_reading: Conservar el mismo núcleo verbal ('pensaron' / 'lo pensó') para ambas acciones
  alternative_spanish_readings:
  - usar verbos distintos como 'maquinaron' para los hermanos y 'dispuso' para Dios
  - usar 'quiso' para Dios en lugar de repetir el verbo
  rationale: El hebreo pone en paralelo la acción humana y la divina sin borrar la tensión teológica. El español mantiene ese paralelismo con un mismo campo verbal de pensamiento/intención, de modo que los hermanos realmente quisieron el mal y Dios realmente orientó ese mismo acontecimiento para bien, sin sugerir que Dios sea autor moral del mal al modo de los hermanos.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: El alcance moral de רָעָה
  english_pob_reading: Translate as 'evil'
  chosen_spanish_reading: Traducir como 'mal'
  alternative_spanish_readings:
  - daño
  - perjuicio
  - desgracia
  rationale: En este contexto no se trata solo de un contratiempo, sino de una acción culpable contra José. 'Mal' conserva el peso moral y mantiene el contraste directo con 'bien'.
  doctrine_reference: HALOT 7451; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés al reflejar más literalmente la cláusula final hebrea, evitando una paráfrasis tipo 'para traer a cabo lo que está ocurriendo hoy'. Se conservó la tensión entre la intención mala de los hermanos y la intención buena de Dios.
  spanish_consistency_notes:
  - Se eligió 'Dios' sin artículo porque es la forma idiomática y reverente en español bíblico contemporáneo.
  - Se mantuvo el contraste léxico 'mal' / 'bien' para reflejar רעה / טובה.
  - La nota de pie marca la alternativa idiomática del modismo final y debe ir anclada en 'este día'.
