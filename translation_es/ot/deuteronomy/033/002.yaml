  rationale: Se corrige el anclaje de la nota [a] para que coincida con la frase comentada, se simplifica מֵרִבְבֹת קֹדֶשׁ a una formulación más natural y menos interpretativa ('de miríadas de santos') preservando en nota la alternativa abstracta, y se reemplaza 'fulgores ígneos' por 'rayos de fuego' para reflejar mejor la imagen del inglés auditado y la procedencia desde la mano derecha.
