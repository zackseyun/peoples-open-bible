base_translation:
  language: en
  yaml_path: translation/ot/isaiah/038/005.yaml
  text: 'Go and say to Hezekiah[a], ‘Thus says Yahweh, the God of David your father: I have heard your prayer; I have seen your tears. Behold[b], I will add fifteen years to your days.’'
  footnotes:
