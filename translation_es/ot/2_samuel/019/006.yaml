    text: Hebreo 'vida' / 'vidas' (nephesh), aquí con el sentido de vida física preservada del peligro, no de 'alma'.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene la fidelidad al hebreo y a la auditoría POB, pero mejora la naturalidad del español ('entró' por 'vino'), aclara נָשֶׁיךָ con 'esposas' en vez de 'mujeres', elimina una nota innecesaria sobre 'dijo', y añade la nota contextual sobre 'la casa' ya documentada en inglés. También se reubica la nota sobre nephesh al primer punto pertinente.
