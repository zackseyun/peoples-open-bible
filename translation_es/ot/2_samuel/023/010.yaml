translation:
  language: es
  text: Se levantó y abatió a los filisteos hasta que su mano se cansó y su mano se pegó a la espada[a]. Y Yahvé dio una gran victoria en aquel día, y el pueblo volvió tras él solo para despojar a los caídos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “se aferró a la espada” o “se le pegó la mano a la espada”. El hebreo permite una imagen física fuerte: la mano quedó adherida por cansancio o rigidez en la pelea.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “solo para despojar”, es decir, para quitar a los caídos sus armas y botín después de la batalla.
    reason: cultural_note
lexical_decisions:
- source_word: קָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El qal de קום en narrativa de batalla marca acción decidida. En español, “se levantó” comunica el inicio de la acción de manera natural y fiel, sin añadir interpretaciones.
- source_word: וַיַּךְ בַּפְּלִשְׁתִּים
  english_pob_choice: struck down the Philistines
  chosen_spanish: atacó a los filisteos
  alternatives_spanish:
  - hirió a los filisteos
  - golpeó a los filisteos
  lexicon: HALOT
  rationale: נכה en contexto militar puede implicar golpear con violencia y, a menudo, matar en combate. Dado el paralelismo con la escena bélica y para evitar una traducción demasiado pesada, “atacó” conserva el impulso narrativo, aunque “hirió” o “golpeó” siguen siendo posibles.
- source_word: עַד כִּי יָגְעָה יָדוֹ
  english_pob_choice: until his hand grew weary
  chosen_spanish: hasta que su mano se cansó
  alternatives_spanish:
  - hasta que su mano se fatigó
  - hasta que su mano quedó exhausta
  lexicon: HALOT
  rationale: יגע expresa cansancio o agotamiento. “Se cansó” es la forma española más natural y clara; mantiene el sentido progresivo o resultativo del hebreo sin sobreexplicar.
- source_word: וַתִּדְבַּק יָדוֹ אֶל הַחֶרֶב
  english_pob_choice: his hand clung to the sword
  chosen_spanish: su mano se pegó a la espada
  alternatives_spanish:
  - su mano se aferró a la espada
  - su mano quedó adherida a la espada
  lexicon: HALOT
  rationale: דבק significa adherirse, pegarse, aferrarse. “Se pegó” reproduce la imagen física fuerte del hebreo y permite tanto la lectura literal como la hiperbólica del agotamiento en batalla. “Se aferró” suaviza demasiado la imagen.
- source_word: וַיַּעַשׂ יְהוָה
  english_pob_choice: the LORD brought about
  chosen_spanish: Yahvé realizó
  alternatives_spanish:
  - Yahvé hizo
  - Yahvé llevó a cabo
  lexicon: HALOT
  rationale: Con תְּשׁוּעָה como objeto abstracto, עשה se expresa mejor en español con un verbo que preserve agencia divina sin sonar mecánico. “Realizó” comunica que Yahvé produjo efectivamente el resultado de salvación/victoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se adopta la forma POB “Yahvé” para el Tetragrámaton, conforme al criterio del proyecto, en lugar de la sustitución tradicional “SEÑOR”.
- source_word: תְּשׁוּעָה גְדוֹלָה
  english_pob_choice: a great victory
  chosen_spanish: una gran victoria
  alternatives_spanish:
  - una gran salvación
  - una gran liberación
  lexicon: HALOT
  rationale: En este contexto bélico inmediato, תְּשׁוּעָה remite al resultado concreto de la batalla. “Victoria” comunica ese sentido sin borrar que la acción procede de Yahvé.
- source_word: וְהָעָם יָשֻׁבוּ אַחֲרָיו
  english_pob_choice: the people returned after him
  chosen_spanish: y el pueblo volvió tras él
  alternatives_spanish:
  - y el pueblo regresó detrás de él
  - y la gente volvió después de él
  lexicon: HALOT
  rationale: La frase hebrea indica que el pueblo se reunió de nuevo tras la acción decisiva de él. “Volvió tras él” conserva la secuencia y evita añadir detalles militares no explícitos.
- source_word: אַךְ לְפַשֵּׁט
  english_pob_choice: only to strip the slain
  chosen_spanish: solo para despojar a los caídos
  alternatives_spanish:
  - solo para despojar a los muertos
  - solo para quitarles el botín
  lexicon: HALOT
  rationale: פשט aquí alude a despojar a los caídos de armas y botín tras la batalla. “Despojar a los caídos” es una forma natural en español que conserva la referencia al acto posterior al combate.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene la transliteración reverente “Yahvé” para preservar el nombre propio del pacto, siguiendo la práctica del POB y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de תְּשׁוּעָה en contexto militar
  english_pob_reading: a great victory
  chosen_spanish_reading: una gran victoria
  alternative_spanish_readings:
  - una gran salvación
  - una gran liberación
  rationale: Aunque תְּשׁוּעָה puede abarcar salvación o liberación, aquí el marco narrativo es bélico y el resultado inmediato es el triunfo en combate. “Victoria” comunica el hecho histórico sin perder la idea de que Yahvé fue el agente decisivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada en inglés. Se conserva la tensión léxica de תְּשׁוּעָה con una nota que mantiene las alternativas “salvación” y “liberación”, mientras que en el cuerpo se usa “victoria” por el contexto bélico. No se introducen cambios respecto del pase de revisión final reportado como sin modificaciones.
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió “pueblo” para הָעָם, manteniendo la referencia colectiva sin convertirla en un término militar técnico.
  - “Despojar a los caídos” conserva el valor de פשט sin recurrir a un vocabulario demasiado técnico o arcaico.
  - La estructura de la frase principal sigue el orden narrativo del hebreo, con ajustes mínimos para fluidez natural en español.
