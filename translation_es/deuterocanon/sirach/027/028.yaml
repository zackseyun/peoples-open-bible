translation:
  language: es
  text: La burla y el oprobio son para los soberbios[a], y la venganza le acechará como un león[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrogantes».
    reason: lexical_alternative
  - marker: b
    text: O «lo emboscará como un león».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπαιγμός
  english_pob_choice: mockery
  chosen_spanish: burla
  alternatives_spanish:
  - mofa
  - ridiculización
  - escarnio
  lexicon: LSJ
  rationale: El término griego expresa trato burlón o ridiculizador. «Burla» suena natural en español actual y conserva el sentido de menosprecio verbal sin intensificarlo más de lo que el griego exige.
- source_word: ὀνειδισμός
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  - insulto
  lexicon: LSJ
  rationale: La palabra apunta a reprensión, vituperio o deshonra pública. «Oprobio» mantiene con claridad la carga de vergüenza social y moral, más cercana al tono sapiencial del texto que «insulto».
- source_word: ὑπερηφάνων
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: LSJ
  rationale: El genitivo plural designa a personas soberbias o arrogantes. «Los soberbios» es una forma bíblica clara y bien asentada en español, y conserva la referencia a un grupo caracterizado por la altivez.
- source_word: ἐκδίκησις
  english_pob_choice: vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - el castigo
  - la retribución
  - la justicia
  lexicon: LSJ
  rationale: En este contexto sapiencial la palabra señala una respuesta retributiva amenazante. «La venganza» conserva la fuerza de advertencia y la imagen de persecución del verso, sin suavizarla a «justicia».
- source_word: ἐνεδρεύσει
  english_pob_choice: will lie in wait
  chosen_spanish: acechará
  alternatives_spanish:
  - estará al acecho de
  - emboscará
  - esperará al acecho
  lexicon: LSJ
  rationale: El verbo significa tender una emboscada o permanecer al acecho. «Acechará» reproduce bien la imagen depredadora del león y funciona con naturalidad en español.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - lo
  - a él
  lexicon: LSJ
  rationale: El griego usa singular masculino para individualizar al soberbio como representante del grupo. En español, «le» evita una repetición pesada y mantiene la referencia singular sin neutralizarla.
theological_decisions:
- issue: Cómo reflejar el valor proverbial de un singular dentro de un plural genérico
  english_pob_reading: Retain singular 'him'
  chosen_spanish_reading: Conservar un singular implícito mediante el clítico «le»
  alternative_spanish_readings:
  - los soberbios ... les
  - la venganza los acechará
  rationale: El griego pasa del plural de clase a un objeto singular, individualizando el aviso. El español mantiene esa tensión con «le», que apunta al soberbio singular sin convertirlo en plural ni perder el carácter proverbial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cómo verter ἐκδίκησις sin debilitar el tono de advertencia
  english_pob_reading: Render as 'vengeance'
  chosen_spanish_reading: «la venganza»
  alternative_spanish_readings:
  - «la retribución»
  - «el castigo»
  - «la justicia»
  rationale: La imagen del león acechando exige un término fuerte y retributivo. «La venganza» preserva la severidad del juicio implícito sin añadir un sujeto agente que el texto no nombra.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés, que prefirió una cláusula simple y natural («are for») en vez de una formulación posesiva más rígida, y mantuvo el singular pronominal. En español se reprodujo esa misma llaneza con «son para», evitando sobreexplicar la relación entre los términos de vergüenza y el grupo de los soberbios.
  spanish_consistency_notes:
  - Se mantuvo el tono sapiencial breve y proverbial del griego, sin ampliar el sujeto de «la venganza».
  - 'Se prefirió un español bíblico claro pero no arcaizante: «burla», «oprobio», «soberbios», «acechará».'
  - La nota de alternativa en a preserva la posibilidad de «los arrogantes», equivalente reconocido para ὑπερηφάνων.
  - La nota b conserva la alternativa verbal del verbo griego, útil porque «acechará» y «acechará como un león» pueden sentirse como una sola imagen compacta en español.
