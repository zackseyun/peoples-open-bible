translation:
  language: es
  text: Aunque cavaran hasta el Seol[a], desde allí mi mano los tomará; y aunque suban a los cielos, desde allí los haré bajar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos» para «Seol».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְתְּרוּ
  english_pob_choice: dig
  chosen_spanish: excavaran
  alternatives_spanish:
  - cavaran
  - horadaran
  - abrieran paso
  lexicon: HALOT
  rationale: 'El hebreo expresa una acción concreta de abrirse paso cavando; «excavaran» conserva la imagen física y funciona bien en español con valor concesivo. «Cavaran» es posible, pero «excavaran» suena más natural en este registro sin perder fuerza. '
- source_word: בִּשְׁאוֹל
  english_pob_choice: into Sheol
  chosen_spanish: en el Seol
  alternatives_spanish:
  - en la tumba
  - en el reino de los muertos
  lexicon: HALOT
  rationale: 'Se conserva «Seol» para mantener el término hebreo y su tensión conceptual, en lugar de reducirlo a «tumba» o explicarlo como «reino de los muertos». La preposición española «en» comunica el ámbito al que intentan penetrar. '
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  - yo
  lexicon: HALOT
  rationale: 'La traducción literal preserva el antropomorfismo y la imagen de alcance y captura divina. Sustituirlo por «yo» o «mi poder» suavizaría la concreción del hebreo. '
- source_word: תִקָּחֵם
  english_pob_choice: will take them
  chosen_spanish: los tomará
  alternatives_spanish:
  - los agarrará
  - los arrebatará
  - los apresará
  lexicon: HALOT
  rationale: '«Tomará» refleja el valor amplio de לקח sin cargar el verbo con una violencia mayor que la que exige el texto. Mantiene la idea de que no escaparán de la mano divina. '
- source_word: יַעֲלוּ
  english_pob_choice: climb up
  chosen_spanish: suban
  alternatives_spanish:
  - asciendan
  - subieran
  - trepen
  lexicon: HALOT
  rationale: 'En español, «suban» resulta natural y suficiente en una construcción concesiva; el matiz de ascenso deliberado queda reforzado por el paralelismo poético con el descenso posterior. «Asciendan» sería más elevado, pero menos directo. '
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: 'Se mantiene el plural hebreo con «los cielos», que reproduce la amplitud cósmica del contraste con Seol. «El cielo» estrecharía el paralelo; «los cielos» es transparente y bíblicamente reconocible. '
- source_word: אוֹרִידֵם
  english_pob_choice: I will bring them down
  chosen_spanish: los haré descender
  alternatives_spanish:
  - los bajaré
  - los traeré abajo
  - los derribaré
  lexicon: HALOT
  rationale: 'El causativo del hebreo se vierte con «haré descender», que respeta la idea de hacerlos bajar sin añadir una imagen de violencia no explicitada. «Los bajaré» sería más simple, pero menos fiel al matiz causativo. '
- source_word: אִם ... וְאִם
  english_pob_choice: Though ... and though
  chosen_spanish: Aunque ... y aunque
  alternatives_spanish:
  - Si ... y si
  - Aun si ... y aun si
  lexicon: HALOT
  rationale: 'Las cláusulas son concesivas, no condicionales ordinarias; «aunque» reproduce mejor el sentido de desafío imposible que «si». Mantiene el paralelismo y la fuerza retórica del hebreo. '
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: Se conserva el término técnico hebreo para no aplanar el alcance cosmológico del verso. «Seol» deja visible la tensión bíblica sin resolverla en categorías posteriores más cerradas.
  doctrine_reference: Preservar la tensión léxica y cosmológica del texto original; primacía del hebreo sobre la paráfrasis doctrinal.
translation_notes:
  revision_awareness: La redacción sigue el hebreo directamente y coincide con la decisión del POB en inglés de mantener el valor concesivo de la doble cláusula, el antropomorfismo de «mi mano» y la retención de Sheol como término técnico. No se incorporaron revisiones posteriores porque el registro más reciente indica que no hubo cambios.
  spanish_consistency_notes:
  - Se mantiene «Seol» con mayúscula inicial como transliteración técnica coherente con el tratamiento bíblico del término.
  - Se usa «los cielos» en plural para reflejar el hebreo, evitando singularizarlo a «el cielo».
  - «Aunque ... y aunque» conserva el paralelismo concesivo y la estructura retórica del original.
  - La primera persona divina se expresa en forma directa («mi mano», «yo los haré descender») sin sustituirla por perífrasis interpretativas.
