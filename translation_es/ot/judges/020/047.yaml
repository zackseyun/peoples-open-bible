translation:
  language: es
  text: Pero se volvieron y huyeron hacia el desierto[a], a la peña de Rimón[b], seiscientos hombres, y permanecieron en la peña de Rimón cuatro meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al desierto». El hebreo con terminación direccional puede indicar movimiento hacia la región desértica o entrada en ella.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la peña de Rimón»; también puede traducirse «Roca de Rimón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se dieron vuelta
  - volvieron
  lexicon: HALOT
  rationale: El verbo hebreo expresa un cambio de dirección. «Se volvieron» comunica con naturalidad ese giro en el movimiento, manteniendo la secuencia narrativa sin añadir matices no presentes en el texto.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - corrieron
  lexicon: HALOT
  rationale: נוס implica huir en contexto militar. «Huyeron» conserva la urgencia y el tono de fuga mejor que alternativas más suaves.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: toward the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - al desierto
  - hacia el desierto/into the desert
  lexicon: HALOT
  rationale: El sufijo direccional permite un sentido de movimiento hacia la región desértica. «Hacia el desierto» refleja bien ese valor direccional sin cerrar innecesariamente la relación espacial exacta con la peña.
- source_word: אֶל סֶלַע הָרִמּוֹן
  english_pob_choice: to the rock of Rimmon
  chosen_spanish: a la peña de Rimón
  alternatives_spanish:
  - a la roca de Rimón
  - a la peña de Rimón
  lexicon: HALOT
  rationale: סלע puede significar roca/peña/cantil. «Peña» es una opción castellana natural para un refugio rocoso y mantiene el carácter topográfico del nombre. Se conserva «de Rimón» para transparentar la construcción hebrea del topónimo.
- source_word: שֵׁשׁ מֵא֖וֹת אִ֑ישׁ
  english_pob_choice: six hundred men
  chosen_spanish: seiscientos hombres
  alternatives_spanish:
  - seiscientos varones
  - seiscientos hombres de guerra
  lexicon: HALOT
  rationale: Después de un numeral, אִישׁ cuenta varones adultos; «hombres» es la equivalencia idiomática y militar más directa en español.
- source_word: וַיֵּֽשְׁבוּ
  english_pob_choice: stayed
  chosen_spanish: permanecieron
  alternatives_spanish:
  - se quedaron
  - habitaron
  - vivieron
  lexicon: HALOT
  rationale: En este contexto de refugio temporal, ישב expresa permanecer. «Permanecieron» evita la idea de asentamiento permanente que podría sugerir «habitaron» o «vivieron».
- source_word: בְּסֶלַע רִמּוֹן
  english_pob_choice: at the rock of Rimmon
  chosen_spanish: en la peña de Rimón
  alternatives_spanish:
  - a la peña de Rimón
  - en la roca de Rimón
  lexicon: HALOT
  rationale: El ב puede traducirse flexiblemente según el sentido locativo. Aquí «en» refleja la ubicación en el refugio rocoso y mantiene continuidad con el nombre propio del lugar.
- source_word: אַרְבָּעָה חֳדָשִׁים
  english_pob_choice: four months
  chosen_spanish: cuatro meses
  lexicon: HALOT
  rationale: Expresión temporal directa; no requiere expansión.
translation_notes:
  revision_awareness: 'El inglés POB revisó la frase coordinada para eliminar un pronombre repetido y dejar un flujo más formal: «But six hundred men turned and fled toward the wilderness, to the rock of Rimmon, and stayed at the rock of Rimmon four months.» La presente versión española sigue esa misma línea de economía y fluidez, manteniendo el contraste inicial con «Pero» y evitando un pronombre innecesario en la segunda coordinación.'
  spanish_consistency_notes:
  - Se mantiene «Rimón» como forma hispanizada del topónimo, en continuidad con el tratamiento transparente del nombre propio en el contexto dado.
  - Se ha preferido «peña» a «roca» por naturalidad en español bíblico sin perder el sentido de refugio rocoso.
  - No se introdujo «SEÑOR» ni otras normalizaciones teológicas, porque el versículo no contiene el Nombre divino ni vocabulario que exija ese tratamiento.
