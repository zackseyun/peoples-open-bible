translation:
  text: Jesus said, “What you will hear in your ear—in the other ear proclaim it on
    your rooftops; for no one lights a lamp and puts it under a measuring basket,
    nor does one put it in a hidden place, but rather one puts it on the lampstand,
    so that those who enter and those who go out may see its light.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'POxy 1 reads: “What you will hear with your one ear, that …,” emphasizing
      one ear; the Coptic text uniquely continues “in the other ear.”'
    reason: textual_variant
  - marker: b
    text: 'Or: ‘under a bushel.’ The Coptic lexeme ⲙⲁⲁϫⲉ in this collocation denotes
      a covering or measuring basket.'
    reason: lexical_alternative
  - marker: c
    text: Cf. parallels in Matt 10:27; Luke 8:16; 11:33; Mark 4:21.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲧⲟϥⲛⲁⲥⲱⲧⲙ …
  chosen: what you will hear
  alternatives:
  - whoever will hear
  - the one who will hear
  lexicon: Layton, Coptic Grammar (relative converter ⲡⲉⲧⲉⲣⲉ- with prospective)
  rationale: The ⲡⲉⲧⲉⲣⲉ- relative clause with prospective ⲛⲁⲥⲱⲧⲙ plus enclitic object
    ⲉⲛⲧⲟϥ yields a neuter sense “that which you will hear,” not a personal “whoever.”
- source_word: ⲥⲱⲧⲙ
  chosen: hear
  alternatives:
  - listen
  lexicon: Crum s.v. ⲥⲱⲧⲙ
  rationale: Basic sense is ‘hear’; ‘listen’ would be acceptable dynamically but ‘hear’
    keeps Thomas’s concise diction.
- source_word: ⲙⲁⲁϫⲉ (with ⲡⲉⲕ-, ⲡⲕⲉ-)
  chosen: ear / the other ear
  alternatives:
  - earlobe
  - hearing
  lexicon: 'Crum s.v. ⲙⲁⲁϫⲉ (sense: ear)'
  rationale: First occurrence clearly denotes the physical ear with possessive ⲡⲉⲕ-;
    ⲡⲕⲉ ⲙⲁⲁϫⲉ is idiomatic ‘the other ear,’ a Thomasine oddity preserved literally.
- source_word: ⲧⲁϣⲉⲟⲉⲓϣ ⲛⲛⲧⲟϥ
  chosen: proclaim it
  alternatives:
  - announce it
  - preach it
  - cry it out
  lexicon: Crum s.v. ⲥⲟⲉⲓϣ; Lambdin on causative ⲧⲁ-
  rationale: Causative form ‘make it be cried out’ naturally renders ‘proclaim’; the
    following object pronoun ⲛⲧⲟϥ (‘concerning it/it’) justifies a direct object in
    English.
- source_word: ⲡⲱⲣ
  chosen: rooftops
  alternatives:
  - housetops
  - roofs
  lexicon: Crum s.v. ⲡⲱⲣ
  rationale: Plural with 2pl possessive (ⲡⲉⲧⲛ-) calls for ‘rooftops’; ‘housetops’
    is possible but more ecclesiastically colored.
- source_word: ⲙⲉⲣⲉⲗⲁⲁⲩ (impersonal jussive)
  chosen: (implicit) proclaim
  alternatives:
  - let them say
  - have it said
  lexicon: Layton, Coptic Grammar (impersonal prospective/jussive)
  rationale: Thomas uses an impersonal jussive ‘let them say’ to express a general
    imperative; English idiom collapses this to an imperative “proclaim.”
- source_word: ⲣⲟϩⲏⲃⲥ
  chosen: lamp
  alternatives:
  - lighted lamp
  lexicon: Crum s.v. ⲣⲟϩⲏⲃ
  rationale: Refers to a lamp as an object; the context supplies the act of lighting.
- source_word: ⲕⲱⲛⲧⲟϥ
  chosen: put/set it
  alternatives:
  - place it
  - set it down
  lexicon: Crum s.v. ⲕⲱ/ⲕⲱⲛ (to put, set)
  rationale: Repetitive verb throughout the sequence; ‘put/set’ fits all occurrences.
- source_word: ϩⲁ ⲙⲁⲁϫⲉ
  chosen: under a measuring-basket
  alternatives:
  - under a bushel
  - under a measure
  lexicon: 'Crum s.v. ⲙⲁⲁϫⲉ (secondary sense: measure, basket)'
  rationale: Context demands a covering measure; to avoid harmonizing to Synoptic
    ‘bushel’ (modios), ‘measuring-basket’ reflects the Coptic lexeme and preserves
    strangeness.
- source_word: ϩⲛⲙⲁ ⲉⲣⲉⲛⲧⲟϥ ϩⲱⲡ
  chosen: in a hidden place
  alternatives:
  - in concealment
  - in a secret place
  lexicon: Crum s.v. ϩⲱⲡ (hide; hiding-place)
  rationale: Nominal sense ‘a hidden place’ is idiomatic here.
- source_word: ⲗⲩⲭⲛⲓⲁ
  chosen: lampstand
  alternatives:
  - lamp-stand
  lexicon: Lambdin (Greek loans); Crum s.v. ⲗⲩⲭⲛⲓⲁ
  rationale: Greek loan with standard meaning ‘lampstand’ in the lamp saying.
- source_word: ⲟⲩⲟⲉⲓⲛ
  chosen: light
  alternatives:
  - brightness
  lexicon: Crum s.v. ⲟⲩⲟⲉⲓⲛ
  rationale: Common word for ‘light’; possessive suffix ⲡⲉϥ- indicates ‘its light.’
- source_word: ⲟⲩⲟⲛ ⲛⲓⲙ
  chosen: those who ... everyone
  alternatives:
  - anyone
  - all
  lexicon: Crum s.v. ⲟⲩⲟⲛ; ⲛⲓⲙ
  rationale: Indefinite universal; rendered with a natural English ‘those who’ construction.
- source_word: ⲃⲱⲕ ⲉϩⲟⲩⲛ / ⲉⲓ ⲉⲃⲟⲗ
  chosen: enter / go out
  alternatives:
  - come in / go out
  - go in / come out
  lexicon: Crum s.v. ⲃⲱⲕ; ⲉⲓ
  rationale: Paired directional verbs with prepositions; ‘enter’ with ⲉϩⲟⲩⲛ (‘inside’)
    and ‘go out’ with ⲉⲃⲟⲗ are the most precise.
textual_note: 'Sahidic with Greek loans and some impersonal-jussive syntax. No lacunae
  are marked by Dilley for this saying. Notable features: (1) Second-person shifts:
  singular possessive in “your ear” (ⲡⲉⲕⲙⲁⲁϫⲉ) but plural in “your rooftops” (ⲡⲉⲧⲛϫⲉⲛⲉⲡⲱⲣ),
  which we leave as ‘your’ in English. (2) The impersonal prospective/jussive ⲙⲉⲣⲉⲗⲁⲁⲩ
  (‘let them say’) functions as a general imperative; rendered as ‘proclaim’ for idiomatic
  clarity. (3) The lexeme ⲙⲁⲁϫⲉ appears first as ‘ear’ and later in the collocation
  ϩⲁ ⲙⲁⲁϫⲉ, a well-attested sense ‘(under a) measuring-basket’; the identical spelling
  is a known homograph. (4) Orthography includes Greek loans ἀλλά (ⲁⲗⲗⲁ) and ⲗⲩⲭⲛⲓⲁ;
  verbal repetition of ⲕⲱⲛⲧⲟϥ (‘put it’) is maintained. (5) We preserve Thomas’s odd
  phrasing “in your ear—in the other ear,” which heightens the riddle-like quality.'
