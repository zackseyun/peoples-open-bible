translation:
  language: es
  text: Zela[a], Haeleph, el jebuseo (es decir, Jerusalén), Gibeat, Kiriat—catorce ciudades con sus aldeas[c][b]. Esta fue la heredad de los hijos de Benjamín, según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el jebuseo, ella es Jerusalén''. El gentilicio se usa aquí como designación de lugar para Jerusalén.'
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones reflejan 'Haeleph' como 'Elef' y 'Gibeat' como 'Gibeá'.
    reason: alternative_reading
  - marker: c
    text: El texto hebreo dice solo 'Kiriat' en este versículo, no 'Kiriat-jearim'.
    reason: textual_variant
lexical_decisions:
- source_word: וְצֵלַע
  english_pob_choice: Zela
  chosen_spanish: Zela
  alternatives_spanish:
  - Zelá
  - Zelah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en vez de traducirse. Se conserva la forma breve y reconocible, evitando añadir vocalización no apoyada por el hebreo.
- source_word: הָאֶלֶף
  english_pob_choice: Haeleph
  chosen_spanish: Haelef
  alternatives_spanish:
  - Haeleph
  - Elef
  lexicon: HALOT
  rationale: También es topónimo. En español, la transliteración naturaliza la consonante final según la pronunciación esperable, pero se mantiene el artículo integrado en el nombre, como en la decisión inglesa.
- source_word: וְהַיְבוּסִי הִיא יְרוּשָׁלִַם
  english_pob_choice: the Jebusite (that is, Jerusalem)
  chosen_spanish: el jebuseo (es decir, Jerusalén)
  alternatives_spanish:
  - el jebuseo, es decir, Jerusalén
  - Jebús (es decir, Jerusalén)
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el jebuseo, ella es Jerusalén'. Se conserva el gentilicio como designación toponímica, y la aclaración parentética reproduce el valor explicativo de הִיא sin borrar la tensión entre etnónimo y lugar.
- source_word: גִּבְעַת
  english_pob_choice: Gibeath
  chosen_spanish: Gibeat
  alternatives_spanish:
  - Gibeá
  - Gibeah
  lexicon: HALOT
  rationale: Nombre propio de lugar. La forma española sigue de cerca el hebreo y evita importar la variante tradicional más conocida si no está explícita en el texto base.
- source_word: קִרְיַת
  english_pob_choice: Kiriath
  chosen_spanish: Kiriat
  alternatives_spanish:
  - Quiriat
  - Kiriath
  lexicon: HALOT
  rationale: El hebreo aquí dice solo קִרְיַת, sin el complemento 'jearim'. Se conserva como topónimo breve, sin expandirlo indebidamente.
- source_word: עָרִים אַרְבַּע עֶשְׂרֵה
  english_pob_choice: fourteen cities
  chosen_spanish: catorce ciudades
  alternatives_spanish:
  - catorce poblados
  - catorce villas
  lexicon: HALOT
  rationale: Es el resumen numérico de las localidades enumeradas. 'Ciudades' mantiene el valor convencional de עָרִים en listas de repartición territorial.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - con sus poblados
  - con sus asentamientos
  lexicon: HALOT
  rationale: En contextos de heredad territorial, חָצֵר puede referir aldeas o núcleos dependientes. 'Aldeas' es idiomático en español y conserva la idea de dependencias rurales sin sobretraducir.
- source_word: זֹאת נַחֲלַת
  english_pob_choice: This was the inheritance
  chosen_spanish: Esta fue la heredad
  alternatives_spanish:
  - Esta es la heredad
  - Este fue el reparto
  lexicon: HALOT
  rationale: La fórmula conclusiva del reparto tribal admite pasado narrativo en español. 'Heredad' reproduce mejor el sentido patrimonial y territorial que 'herencia' en este contexto.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los descendientes de Benjamín
  - la tribu de Benjamín
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea de filiación tribal. 'Hijos de Benjamín' es literal, claro y mantiene el lenguaje del reparto entre tribus.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en listas tribales designa subunidades de clan, no solo familia nuclear. 'Clanes' preserva mejor esa estructura social.
translation_notes:
  revision_awareness: El cotejo de revisión más reciente indica acuerdo alto y sin cambios sustantivos; se mantiene la lectura base sin introducir ampliaciones ni harmonizaciones. La versión española sigue de cerca el hebreo y el juicio auditado en inglés, preservando los topónimos y la nota explicativa sobre 'el jebuseo' como Jerusalén.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se mantiene 'heredad' por la fórmula territorial de reparto tribal.
  - Se conserva el gentilicio 'jebuseo' como designación toponímica, no como etnónimo autónomo, siguiendo la evidencia textual.
  - '''Clanes'' se emplea para מִשְׁפְּחֹתָם, coherente con el uso técnico del reparto tribal.'
