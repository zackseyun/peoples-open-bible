  yaml_path: translation/ot/1_kings/022/006.yaml
  text: Then the king of Israel gathered the prophets[a], about four hundred men, and said to them, “Should I go against Ramoth-gilead for battle, or should I refrain?” And they said, “Go up, and the Lord will give it into the hand of the king.”
  footnotes:
