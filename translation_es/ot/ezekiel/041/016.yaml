translation:
  language: es
  text: los umbrales, las ventanas en receso[a] y las galerías[b], todo alrededor por sus tres lados, frente al umbral, estaban revestidos de madera[c] todo alrededor, desde el piso hasta las ventanas; y las ventanas estaban cubiertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ventanas cerradas», «ventanas con postigos» o «ventanas enrejadas»; el hebreo probablemente describe un tipo arquitectónico fijo, no solo ventanas cerradas en ese momento.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido aquí «galerías» es raro y puede referirse a salientes, columnatas o pasarelas superiores.
    reason: lexical_alternative
  - marker: c
    text: O «un revestimiento de madera» o «forro de madera»; la expresión hebrea es rara y se refiere a una cobertura o panelado de madera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפִּים / הַסַּף
  english_pob_choice: the thresholds / the threshold
  chosen_spanish: los umbrales / el umbral
  alternatives_spanish:
  - los dinteles
  - los postes de la puerta
  - los umbrales de la entrada
  lexicon: HALOT
  rationale: סַף designa un elemento arquitectónico de acceso; en este contexto del templo, «umbral» conserva la concreción estructural y permite mantener la repetición del singular/plural del hebreo y del inglés POB.
- source_word: הַחַלּוֹנִים הָאֲטֻמוֹת
  english_pob_choice: the recessed windows
  chosen_spanish: las ventanas en receso
  alternatives_spanish:
  - las ventanas cerradas
  - las ventanas tapiadas
  - las ventanas enrejadas
  lexicon: HALOT
  rationale: אֲטֻמוֹת puede sugerir ventanas cerradas, pero el contexto arquitectónico apunta a un tipo fijo de abertura; «en receso» comunica mejor la forma espacial sin convertirlo en una simple acción de cerrar.
- source_word: הָאַתִּיקִים
  english_pob_choice: the galleries
  chosen_spanish: las galerías
  alternatives_spanish:
  - los saledizos
  - las cornisas
  - las pasarelas superiores
  lexicon: HALOT
  rationale: אַתִּיקִים es un término arquitectónico raro; «galerías» sigue la decisión del inglés POB y funciona en español como equivalente contextual, sin pretender precisar más de lo que el hebreo permite.
- source_word: סָבִיב לִשְׁלָשְׁתָּם
  english_pob_choice: all around on their three sides
  chosen_spanish: alrededor, por sus tres lados
  alternatives_spanish:
  - en torno, por los tres lados
  - alrededor de las tres
  lexicon: HALOT
  rationale: La frase señala la disposición espacial de los elementos, no necesariamente tres niveles. «Por sus tres lados» conserva la referencia estructural y evita sobreinterpretar la expresión.
- source_word: נֶגֶד הַסַּף
  english_pob_choice: opposite the threshold
  chosen_spanish: frente al umbral
  alternatives_spanish:
  - opuesto al umbral
  - delante del umbral
  lexicon: HALOT
  rationale: נֶגֶד indica oposición o frente espacial. «Frente al umbral» suena natural en español y mantiene la relación arquitectónica precisa.
- source_word: שְׂחִיף עֵץ
  english_pob_choice: were paneled with wood
  chosen_spanish: estaban revestidos de madera
  alternatives_spanish:
  - tenían un revestimiento de madera
  - estaban forrados de madera
  - tenían panelado de madera
  lexicon: HALOT
  rationale: שְׂחִיף es raro y denota una cobertura o revestimiento; «revestidos de madera» preserva el sentido material sin forzar un tecnicismo poco transparente en español.
- source_word: וְהָאָרֶץ
  english_pob_choice: from the floor
  chosen_spanish: desde el piso
  alternatives_spanish:
  - desde el suelo
  - desde la parte baja
  lexicon: HALOT
  rationale: En este entorno interior, אֶרֶץ no significa «tierra» sino la superficie inferior del edificio. «Piso» es la opción más clara y natural en español.
- source_word: עַד הַחַלּוֹנוֹת
  english_pob_choice: up to the windows
  chosen_spanish: hasta las ventanas
  alternatives_spanish:
  - hasta los ventanales
  - hasta la altura de las ventanas
  lexicon: HALOT
  rationale: Marca el límite vertical del revestimiento. «Hasta las ventanas» reproduce de modo sencillo y fiel la extensión indicada.
- source_word: וְהַחַלּוֹנוֹת מְכֻסּוֹת
  english_pob_choice: and the windows were covered
  chosen_spanish: y las ventanas estaban cubiertas
  alternatives_spanish:
  - y las ventanas estaban tapadas
  - y las ventanas quedaban cubiertas
  lexicon: HALOT
  rationale: מְכֻסּוֹת significa «cubiertas» sin especificar el material o el modo. Se conserva la indeterminación del hebreo y la del inglés POB.
translation_notes:
  revision_awareness: El texto español sigue el estado de revisión más reciente del POB en inglés, que permanece sin cambios tras la última pasada; por eso se conservan las mismas decisiones arquitectónicas y las notas alternativas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la terminología arquitectónica concreta («umbral», «galerías», «revestidos de madera») para reflejar el registro técnico del hebreo.
  - Se respeta la ambigüedad de אֲטֻמוֹת y de שְׂחִיף con notas al pie, en línea con el tratamiento auditado del inglés POB.
