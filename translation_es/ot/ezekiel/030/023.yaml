- from: Y esparciré a Egipto entre las naciones[a], y los dispersaré entre las tierras.
  to: Y esparciré a Egipto entre las naciones[a], y los dispersaré entre los países.
  rationale: Se conserva la fidelidad al hebreo y al POB en «Egipto» + pronombre plural, pero se mejora la naturalidad y claridad del español cambiando «entre las tierras» por «entre los países». También se pule la nota para una formulación más clara en español.
