translation:
  language: es
  text: Así David hizo como Dios le había mandado, y golpearon el campamento[a] de los filisteos desde Gabaón hasta Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘el campamento de los filisteos’; en contexto militar, ‘campamento’ puede funcionar metonímicamente para la fuerza armada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - obró
  - cumplió
  lexicon: HALOT
  rationale: Hacer es el verbo básico del hebreo עשה; en este contexto narrativo de obediencia, ‘hizo’ comunica con naturalidad que David ejecutó lo mandado sin añadir matices no presentes en el texto.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - según
  - tal como
  lexicon: HALOT
  rationale: La frase introduce conformidad con la orden divina. ‘Como’ es una equivalencia breve y natural en español para expresar esa correspondencia.
- source_word: צִוָּהוּ
  english_pob_choice: had commanded him
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había comandado
  lexicon: HALOT
  rationale: צוה expresa mando u orden. ‘Mandado’ conserva el carácter de una instrucción recibida; el pluscuamperfecto refleja que el mandato de Dios precede a la acción de David, como en el inglés POB.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo tiene artículo, aquí funciona como designación del Dios de Israel. En español, ‘Dios’ es la forma más idiomática y fiel al uso contextual.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: derrotaron
  alternatives_spanish:
  - hirieron
  - golpearon
  - abatieron
  lexicon: HALOT
  rationale: El verbo נכה en contexto militar puede significar golpear, derrotar o abatir. En español, ‘derrotaron’ comunica claramente el resultado bélico sin perder el sentido de acción contra el enemigo; además preserva el sujeto plural implícito en la forma verbal hebrea.
- source_word: מַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the camp of the Philistines
  chosen_spanish: el campamento de los filisteos
  alternatives_spanish:
  - el campamento filisteo
  - el ejército de los filisteos
  lexicon: HALOT
  rationale: מַחֲנֶה significa literalmente ‘campamento/campamento militar’. Se conserva ‘campamento’ para reflejar el término hebreo y la observación del POB inglés de que puede tratarse de una referencia metonímica a la fuerza militar.
- source_word: מִגִּבְעוֹן וְעַד גָּזְרָה
  english_pob_choice: from Gibeon as far as Gezer
  chosen_spanish: desde Gabaón hasta Gezer
  alternatives_spanish:
  - de Gabaón a Gezer
  - desde Gabaón y hasta Gezer
  lexicon: HALOT
  rationale: La construcción marca extensión espacial entre dos lugares. ‘Desde... hasta...’ es la correspondencia natural en español para מִן ... וְעַד, manteniendo el límite geográfico de la persecución o derrota.
theological_decisions:
- issue: Sujeto plural de וַיַּכּוּ
  english_pob_reading: 'plural subject: David and his men/forces'
  chosen_spanish_reading: plural implícito en ‘derrotaron’
  alternative_spanish_readings:
  - ‘derrotó’ con sujeto singular referido solo a David
  - ‘atacaron’
  rationale: La forma hebrea es plural, por lo que conviene reflejar en español que no se trata solo de David individualmente. ‘Derrotaron’ permite mantener el plural sin forzar una explicitación innecesaria del sujeto.
  doctrine_reference: Gramática hebrea y coherencia narrativa
translation_notes:
  revision_awareness: El texto inglés POB fue revisado para volver de ‘army’ a ‘camp’, acercándose más a מַחֲנֵה. La versión española sigue esa revisión con ‘campamento’, y mantiene el plural verbal con ‘derrotaron’ para respetar la forma hebrea.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para הָאֱלֹהִים según el uso contextual estándar del proyecto.
  - Se translitera Gibeon/Gezer como Gabaón/Gezer en español bíblico habitual; no se introduce nota adicional porque el topónimo está estable en español.
  - No se usa ‘SEÑOR’ para el nombre divino porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
