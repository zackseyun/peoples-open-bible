translation:
  language: es
  text: 'El Señor Yahvé ha jurado por sí mismo—oráculo de Yahvé, el Dios de los ejércitos[a]: Aborrezco la soberbia[b] de Jacob, y odio sus palacios[c]; y entregaré la ciudad y todo lo que la llena.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traducción tradicional: «el Dios de las huestes».'
    reason: lexical_alternative
  - marker: b
    text: O «la majestad de Jacob». El hebreo puede denotar tanto majestad/exaltación como orgullo arrogante; aquí el contexto de juicio favorece el sentido negativo.
    reason: lexical_alternative
  - marker: c
    text: O «sus ciudadelas». El término hebreo también puede referirse a fortalezas palaciegas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: The Lord GOD
  chosen_spanish: El Señor Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - El Señor Dios
  lexicon: HALOT
  rationale: 'Conserva el título compuesto: אֲדֹנָי como «Señor» y יְהוִה como el nombre divino «Yahvé», siguiendo la convención del proyecto de no ocultar el nombre propio divino.'
- source_word: נִשְׁבַּע ... בְּנַפְשׁוֹ
  english_pob_choice: has sworn by himself
  chosen_spanish: ha jurado por sí mismo
  alternatives_spanish:
  - ha jurado por su vida
  - jura por sí mismo
  lexicon: HALOT
  rationale: La expresión hebrea significa jurar por uno mismo. «Por sí mismo» transmite la fuerza del autojuramento divino en español natural.
- source_word: נְאֻם יְהוָה אֱלֹהֵי צְבָאוֹת
  english_pob_choice: oracle of Yahweh, the God of Armies
  chosen_spanish: oráculo de Yahvé, el Dios de los ejércitos
  alternatives_spanish:
  - declaración de Yahvé, el Dios de los ejércitos
  - oráculo de Yahvé, Dios de los ejércitos
  lexicon: HALOT
  rationale: «Oráculo» reproduce נְאֻם como fórmula profética; «Dios de los ejércitos» sigue la convención del proyecto para צְבָאוֹת y mantiene la imaginería militar.
- source_word: מְתָאֵב
  english_pob_choice: I abhor
  chosen_spanish: Yo aborrezco
  alternatives_spanish:
  - Yo detesto
  - Yo abomino
  lexicon: HALOT
  rationale: «Aborrecer» expresa una repulsión intensa y elevada, equivalente al valor fuerte del participio en este contexto de juicio.
- source_word: גְּאוֹן יַעֲקֹב
  english_pob_choice: the pride of Jacob
  chosen_spanish: la soberbia de Jacob
  alternatives_spanish:
  - el orgullo de Jacob
  - la majestad de Jacob
  lexicon: HALOT
  rationale: En este contexto de condena, la carga negativa de גָּאוֹן se deja visible con «soberbia»; se conserva la tensión semántica frente a la posible lectura de «majestad».
- source_word: וְאַרְמְנֹתָיו
  english_pob_choice: his citadels
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus citadeles
  - sus fortalezas
  lexicon: HALOT
  rationale: אַרְמוֹן puede significar «palacio» y, en lenguaje profético, denota los complejos de poder de la élite. «Palacios» es el equivalente más directo y publicable en español.
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: odio
  alternatives_spanish:
  - he odiado
  - rechazo
  lexicon: HALOT
  rationale: El perfecto expresa una postura asentada de Yahvé; el presente español comunica con naturalidad esa postura firme y continua.
- source_word: וְהִסְגַּרְתִּי
  english_pob_choice: and I will hand over
  chosen_spanish: y entregaré
  alternatives_spanish:
  - y lo pondré en manos de
  - y lo entregaré
  lexicon: HALOT
  rationale: En contextos de juicio, סגר en hifil puede equivaler a «entregar» o «poner en manos de» otro. «Entregaré» mantiene la concisión y la fuerza judicial sin añadir matices causales.
- source_word: עִיר וּמְלֹאָהּ
  english_pob_choice: the city and all that fills it
  chosen_spanish: la ciudad y todo lo que la llena
  alternatives_spanish:
  - la ciudad y todo lo que contiene
  - la ciudad y todo cuanto hay en ella
  lexicon: HALOT
  rationale: 'מְלֹא designa lo que llena un lugar: habitantes, bienes y contenido. «Todo lo que la llena» sigue de cerca la imagen hebrea y resulta natural en español.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh / GOD in the compound title 'The Lord GOD'
  chosen_spanish_reading: Yahvé dentro del título compuesto «El Señor Yahvé»
  alternative_spanish_readings:
  - Yahvé
  - Señor Yahvé
  rationale: Se preserva el nombre propio divino según la política del proyecto y se evita la sustitución por un título genérico. El compuesto mantiene la distinción entre אֲדֹנָי y יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de גְּאוֹן יַעֲקֹב
  english_pob_reading: 'negative: ''the pride of Jacob'''
  chosen_spanish_reading: 'negativo: «la soberbia de Jacob»'
  alternative_spanish_readings:
  - la majestad de Jacob
  - el orgullo de Jacob
  rationale: El contexto de juicio y aborrecimiento favorece la lectura negativa. Se conserva la tensión semántica porque el término puede significar exaltación/majestad en otros contextos.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se corrigió la falla anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. También se ajustó la segunda nota para anclarse en la palabra «soberbia» y se evitó cualquier nota sin marca visible.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se eligió «Dios de los ejércitos» como equivalente funcional de צְבָאוֹת, sin recurrir a «Señor» para ocultar el nombre divino.
  - Se mantuvo la coordinación simple del hebreo con «y entregaré», sin introducir un matiz causal adicional.
  - «Palacios» se usa aquí por ser más natural en español y porque el contexto sigue siendo el de la élite urbana y sus complejos de poder.
