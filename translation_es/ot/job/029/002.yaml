translation:
  language: es
  text: ¡Ojalá[a] fuera como en los meses de antaño, como en los días en que Dios me guardaba[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Quién me diera volver a estar como en los meses de antaño!». El hebreo comienza literalmente: «¿Quién me dará...?», y expresa un deseo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me cuidaba», «me protegía» o «velaba por mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתְּנֵנִי
  english_pob_choice: Oh, that I were
  chosen_spanish: ¡Oh, si yo fuera...!
  alternatives_spanish:
  - ¿Quién me diera...?
  - ¡Ojalá yo fuera...!
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática de deseo o lamento, no una pregunta literal. En español, «¡Oh, si yo fuera...!» conserva el valor optativo sin volver mecánicamente el «quién» del hebreo.
- source_word: כְיַרְחֵי קֶדֶם
  english_pob_choice: as in months gone by
  chosen_spanish: como en los meses de antaño
  alternatives_spanish:
  - como en los meses pasados
  - como en los meses de antiguo
  lexicon: HALOT
  rationale: יַרְחֵי es «meses» y קֶדֶם expresa tiempo anterior, no dirección espacial. «Antaño» comunica bien la referencia temporal retrospectiva y el tono poético.
- source_word: כִּימֵי
  english_pob_choice: as in the days
  chosen_spanish: como en los días
  alternatives_spanish:
  - como en los días de
  - tal como en los días
  lexicon: HALOT
  rationale: La partícula comparativa כ mantiene el paralelo con la frase anterior. «Como en los días» preserva la estructura y el ritmo del hebreo.
- source_word: אֱלֹוּהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Altísimo
  lexicon: HALOT
  rationale: אֱלֹוּהַ es la forma poética singular de «Dios» frecuente en Job. No hay base aquí para ampliar el título; «Dios» conserva la sobriedad del original.
- source_word: יִשְׁמְרֵנִי
  english_pob_choice: watched over me
  chosen_spanish: me guardaba
  alternatives_spanish:
  - me cuidaba
  - me protegía
  - me vigilaba
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, vigilar o proteger. «Me guardaba» mantiene la relación léxica directa con el verbo hebreo y la idea de cuidado protector; la nota recoge alternativas válidas.
theological_decisions:
- issue: La nostalgia por la protección divina pasada
  english_pob_reading: God watched over me
  chosen_spanish_reading: Dios me guardaba
  alternative_spanish_readings:
  - Dios me cuidaba
  - Dios me protegía
  - Dios me vigilaba
  rationale: El verso no formula una doctrina específica, sino un recuerdo de la protección providencial de Dios. «Me guardaba» conserva la amplitud del hebreo sin imponer una interpretación más fuerte que el texto.
  doctrine_reference: Job 29:2; traducción por equivalencia óptima
translation_notes:
  revision_awareness: La versión inglesa POB ya había resuelto el hebreo idiomático como un lamento optativo («Oh, that I were...»), con nota que preserva la alternativa más literal («Who will give me...?»). También dejó abierta la gama semántica de שׁמר («watched over me / kept me / guarded me»). La redacción española sigue esa decisión, manteniendo el deseo inicial y la ambigüedad protectora del verbo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para אֱלֹוּהַ, porque el hebreo no usa el tetragrámaton ni requiere mayúsculas devocionales aquí.
  - Se conserva el paralelismo poético con dos miembros comparativos («como en... / como en...»).
  - «Antaño» se usa por su valor temporal retrospectivo; no implica necesariamente una antigüedad remota, solo el pasado añorado.
