translation:
  language: es
  text: Que te envíe ayuda desde el santuario, y te sostenga desde Sión[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'te apoye' o 'te sustente' desde Sión.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''desde la santidad'' o ''desde el lugar santo''; aquí probablemente se refiere al santuario de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  english_pob_choice: May he send
  chosen_spanish: Que envíe
  alternatives_spanish:
  - Que mande
  - Que despache
  lexicon: HALOT
  rationale: El imperfecto qal 3ms funciona aquí como deseo/petición; en español, 'Que envíe' expresa bien ese valor jussivo sin introducir un futuro indicativo que debilite el tono oracional.
- source_word: עֶזְרְךָ
  english_pob_choice: you help
  chosen_spanish: tu ayuda
  alternatives_spanish:
  - ayuda para ti
  - ayuda
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 2ms puede entenderse como 'tu ayuda' o 'ayuda para ti'. En español, 'que envíe tu ayuda' suena menos natural aquí; por eso se opta por la forma idiomática 'Que envíe tu ayuda', manteniendo la relación semántica de ayuda destinada al receptor.
- source_word: מִקֹּדֶשׁ
  english_pob_choice: from the sanctuary
  chosen_spanish: desde el santuario
  alternatives_spanish:
  - desde la santidad
  - desde el lugar santo
  lexicon: HALOT
  rationale: קֹדֶשׁ puede ser abstracto ('santidad') o locativo ('lugar santo'). Dado el paralelismo con 'desde Sión', la lectura locativa encaja mejor; 'santuario' comunica de forma natural el lugar santo asociado a la presencia de Dios.
- source_word: וּמִצִּיּוֹן
  english_pob_choice: and sustain you from Zion
  chosen_spanish: y te sostenga desde Sión
  alternatives_spanish:
  - y te apoye desde Sión
  - y te mantenga desde Sión
  lexicon: HALOT
  rationale: Se conserva el nombre propio 'Sión'. El verbo סעד significa 'sostener, apoyar, sustentar'; 'sostenga' conserva el registro poético y la amplitud semántica sin forzar una sola matización.
- source_word: יִסְעָדֶךָּ
  english_pob_choice: sustain you
  chosen_spanish: te sostenga
  alternatives_spanish:
  - te apoye
  - te sustente
  lexicon: HALOT
  rationale: 'La raíz סעד tiene el sentido de sostener o apoyar. ''Sostenga'' es natural en español bíblico moderno y mantiene la idea de dar firmeza o soporte al destinatario. Como el hebreo es imperfecto en contexto de bendición, se vierte con valor de deseo: ''Que ... te sostenga''.'
theological_decisions:
- issue: Sujeto implícito de las acciones
  english_pob_reading: Rendered as lowercase 'he' in English, with the understood referent being the LORD from the surrounding context.
  chosen_spanish_reading: Se mantiene un sujeto implícito en el español mediante el subjuntivo exhortativo, sin insertar 'Yahvé' en el verso.
  alternative_spanish_readings:
  - Que Yahvé envíe tu ayuda desde el santuario, y te sostenga desde Sión.
  - Él envíe tu ayuda desde el santuario, y te sostenga desde Sión.
  rationale: El hebreo presenta verbos de 3ms sin sujeto explícito; el referente se toma del contexto previo. En español, el subjuntivo reproduce el carácter de petición/benedición sin añadir un nombre divino ausente del versículo mismo.
  doctrine_reference: 'Translation philosophy: primacía del texto original; no introducir sujetos explícitos que el hebreo no expresa.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto hebreo y el acuerdo crítico permanecen estables, con alta concordancia en el cotejo final.
  spanish_consistency_notes:
  - Se mantiene 'Sión' como nombre propio transliterado, conforme a la terminología del proyecto.
  - 'Se evita ''SEÑOR'' como sustituto: el verso no explicita el nombre divino, por lo que el español conserva el sujeto implícito.'
  - '''Santuario'' traduce la lectura locativa de קֹדֶשׁ en paralelo con ''Sión'', sin borrar la alternativa abstracta ''santidad''.'
