translation:
  language: es
  text: ¿No fue Acán hijo de Zéraj quien actuó infielmente en lo dedicado a destrucción[a], y vino la ira sobre toda la congregación de Israel? Y aquel hombre no pereció solo en su iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «respecto de las cosas dedicadas». El hebreo חֵרֶם se refiere a lo puesto bajo prohibición, dedicado a Dios para destrucción; tradicionalmente también puede expresarse como «anatema».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: «y aquel hombre no pereció solo por su iniquidad», o, de manera más literal, «aunque era un solo hombre, no pereció solo en su iniquidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue… quien…?
  alternatives_spanish:
  - ¿Acaso no fue…?
  - ¿No es cierto que fue…?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera asentimiento. En español, la estructura interrogativa con «¿No fue…?» conserva bien ese valor y suena natural en narrativa retrospectiva.
- source_word: עָכָן בֶּן־זֶרַח
  english_pob_choice: Achan son of Zerah
  chosen_spanish: Acan hijo de Zérah
  alternatives_spanish:
  - Acan, hijo de Zérah
  - Acan, el hijo de Zérah
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma breve y readable. «Hijo de» reproduce la relación filial del hebreo sin añadir formalidad innecesaria.
- source_word: מָעַל מַעַל
  english_pob_choice: acted unfaithfully
  chosen_spanish: actuó infielmente
  alternatives_spanish:
  - cometió una infidelidad
  - fue infiel
  lexicon: HALOT
  rationale: El juego verbal hebreo intensifica la idea de quebrantar lealtad/covenio. «Actuó infielmente» conserva esa fuerza sin recurrir a «trespasó», que en español bíblico puede sonar menos inmediato.
- source_word: בַּחֵרֶם
  english_pob_choice: in the matter of what was devoted to destruction
  chosen_spanish: en lo dedicado al anatema
  alternatives_spanish:
  - en lo consagrado al anatema
  - respecto de lo puesto bajo anatema
  lexicon: HALOT
  rationale: «חֵרֶם» designa lo puesto bajo prohibición/consagración para destrucción. «Anatema» preserva el término técnico tradicional y, con «dedicado», deja visible el sentido de consagración bajo juicio. Se evita «SEÑOR» o una perífrasis que borre la categoría lexical.
- source_word: וְעַל כָּל עֲדַת יִשְׂרָאֵל הָיָה קָצֶף
  english_pob_choice: and wrath came upon all the congregation of Israel
  chosen_spanish: y vino la ira sobre toda la congregación de Israel
  alternatives_spanish:
  - y cayó la ira sobre toda la asamblea de Israel
  - y hubo ira sobre toda la congregación de Israel
  lexicon: HALOT
  rationale: «קָצֶף» aquí es ira/indignación judicial, y el hebreo no explicita el sujeto. «Vino la ira» preserva la formulación abierta del texto y el sentido de irrupción de juicio; «congregación» mantiene el valor corporativo de עֲדָה.
- source_word: וְהוּא אִישׁ אֶחָד
  english_pob_choice: And that man did not perish alone
  chosen_spanish: Y aquel hombre no pereció solo
  alternatives_spanish:
  - Y, siendo un solo hombre, no pereció solo
  - Y ese hombre, siendo uno, no pereció solo
  lexicon: HALOT
  rationale: La hebraísmo subraya que era un solo individuo, pero el efecto de su culpa alcanzó a otros. En español, «aquel hombre» retoma a Acan sin sobreexplicar y deja audible la tensión interpretativa del cierre.
- source_word: לֹא גָוַע
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - murió
  - desapareció
  lexicon: HALOT
  rationale: «גוע» suele expresar morir en contexto solemne o perecer. «Pereció» mantiene el registro judicial del pasaje mejor que «murió».
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su iniquidad
  - a causa de su culpa
  lexicon: HALOT
  rationale: Se conserva la relación preposicional del hebreo y la carga moral/judicial de עָוֺן. «Iniquidad» mantiene el paralelismo con el inglés POB y con el tono bíblico del contexto.
theological_decisions:
- issue: ¿Debe nombrarse explícitamente la ira como ira divina?
  english_pob_reading: wrath came upon all the congregation of Israel, with divine wrath left implicit in the main text
  chosen_spanish_reading: vino la ira sobre toda la congregación de Israel, sin explicitar en el cuerpo del texto que se trata de la ira de Yahvé
  alternative_spanish_readings:
  - vino la ira de Yahvé sobre toda la congregación de Israel
  - la ira del Señor vino sobre toda la congregación de Israel
  rationale: El hebreo solo dice que 'ira/indignación' vino sobre la congregación. Dado que el contexto narrativo la entiende como juicio divino, pero el verso no lo expresa de manera explícita, la versión principal preserva esa sobriedad y evita añadir un sujeto no verbalizado.
  doctrine_reference: Principio POB de no expandir implícitos cuando el original puede sostenerse sin ellos
- issue: ¿Cómo reflejar el alcance corporativo de la culpa de Acán?
  english_pob_reading: And that man did not perish alone in his iniquity
  chosen_spanish_reading: Y aquel hombre no pereció solo en su iniquidad
  alternative_spanish_readings:
  - Y aquel hombre no pereció solo por su iniquidad
  - Y aquel hombre no quedó solo en su iniquidad
  rationale: El hebreo permite oír que la muerte/juicio de Acán no fue exclusivamente individual en sus consecuencias. La redacción elegida conserva la ambigüedad formal del original y la advertencia comunitaria, sin convertir el verso en una explicación doctrinal desarrollada.
  doctrine_reference: Lectura contextual de responsabilidad corporativa en Josué 22:20
translation_notes:
  revision_awareness: La versión inglesa pasó de una formulación más interpretativa del cierre ('he was not the only man who perished') a una más cercana al hebreo ('did not perish alone'). La traducción española sigue esa revisión y evita explicitar más de lo que el verso dice, manteniendo el matiz de consecuencias compartidas sin añadir sujeto o explicación externa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exijan; en este versículo no aparece el Tetragrámaton y la ira se deja implícita como en el texto fuente.
  - Se conserva «congregación» para עֲדָה por su valor corporativo y por coherencia con el registro bíblico del pasaje.
  - «Infielmente» se eligió para sostener el verbo intensivo de מָעַל מַעַל sin perder legibilidad en español.
  - «Anatema» mantiene la terminología técnica de חֵרֶם, en vez de reemplazarla por una paráfrasis que borraría la tensión lexical.
