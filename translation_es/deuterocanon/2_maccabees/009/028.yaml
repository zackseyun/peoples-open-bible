translation:
  language: es
  text: Así pues, el homicida y blasfemo[a], después de padecer lo peor, tal como había tratado a otros, llegó a un fin[b] muy lamentable en una tierra extranjera, entre los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego citado designa a alguien que habla contra Dios; 'blasfemo' conserva esa fuerza religiosa.
    reason: lexical_alternative
  - marker: b
    text: El texto griego visible termina en κατέ-, con un corte de línea; el sentido continúa con su conclusión o muerte.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνδροφόνος
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador de hombres
  lexicon: LSJ
  rationale: El compuesto designa a quien mata seres humanos. En español, 'homicida' mantiene la fuerza penal y moral del término sin sonar tan coloquial como 'asesino' ni tan explicativo como 'matador de hombres'.
- source_word: βλάσφημος
  english_pob_choice: blasphemer
  chosen_spanish: blasfemo
  alternatives_spanish:
  - blasfemador
  - injuriador de Dios
  lexicon: LSJ
  rationale: Aquí la crítica es religiosa, no solo verbal. 'Blasfemo' conserva el peso teológico del griego y coincide con la valoración del contexto.
- source_word: τὰ χείριστα παθών
  english_pob_choice: after suffering the worst things
  chosen_spanish: después de padecer las cosas más terribles
  alternatives_spanish:
  - habiendo padecido lo peor
  - después de sufrir las peores cosas
  lexicon: LSJ
  rationale: El participio se vierte con una cláusula temporal natural en español. 'Padecer' comunica el tono de sufrimiento, y 'las cosas más terribles' preserva el superlativo sin concretar indebidamente la naturaleza de los padecimientos.
- source_word: ὡς ἑτέρους διέθηκεν
  english_pob_choice: just as he had treated others
  chosen_spanish: tal como había tratado a otros
  alternatives_spanish:
  - como había obrado con otros
  - según había tratado a otros
  lexicon: LSJ
  rationale: El verbo puede implicar tratar, disponer o hacer pasar a otros por sufrimientos. 'Trató a otros' conserva la comparación retributiva de forma idiomática en español.
- source_word: ἐπὶ ξένης
  english_pob_choice: in a foreign land
  chosen_spanish: en una tierra extranjera
  alternatives_spanish:
  - en tierra extraña
  - en país extranjero
  lexicon: LSJ
  rationale: La frase expresa muerte lejos del hogar. 'Tierra extranjera' mantiene el matiz de extranjería y el tono patético del pasaje.
- source_word: ἐν τοῖς ὄρεσιν
  english_pob_choice: among the mountains
  chosen_spanish: entre los montes
  alternatives_spanish:
  - en los montes
  - entre las montañas
  lexicon: LSJ
  rationale: El plural con ἐν sitúa el hecho en terreno montañoso. 'Entre los montes' suena natural en español bíblico y conserva la imagen geográfica.
- source_word: οἰκτίστῳ μόρῳ
  english_pob_choice: a most pitiable end
  chosen_spanish: un fin muy digno de lástima
  alternatives_spanish:
  - un destino sumamente lamentable
  - una muerte muy miserable
  lexicon: LSJ
  rationale: μόρος puede significar fin, destino o muerte; οἰκτίστῳ intensifica el carácter compasivo/lamentable. 'Fin muy digno de lástima' reproduce mejor ese valor que una simple referencia a la muerte.
- source_word: κατέ-
  english_pob_choice: came to an ... end
  chosen_spanish: llegó a un fin[b]
  alternatives_spanish:
  - murió
  - alcanzó su fin
  lexicon: LSJ
  rationale: El testimonio griego citado termina con una ruptura de línea en κατέ-, pero el sentido continúa con la conclusión de la vida. 'Llegó a un fin' refleja con honestidad el carácter incompleto del segmento visible y la continuación contextual.
theological_decisions:
- issue: Retribución moral explícita
  english_pob_reading: 'The verse is rendered to preserve the explicit retribution: he suffered as he had treated others.'
  chosen_spanish_reading: 'La traducción mantiene explícita la correspondencia retributiva: padeció como había tratado a otros.'
  alternative_spanish_readings:
  - Una versión que solo informara su muerte sin la comparación retributiva.
  - Una formulación más libre que suavizara la justicia de retribución.
  rationale: La cláusula ὡς ἑτέρους διέθηκεν es teológicamente central. Por eso se conserva la comparación de acción y consecuencia, evitando borrar el énfasis en el juicio retributivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Valor de μόρος como muerte/fin
  english_pob_reading: a most pitiable end
  chosen_spanish_reading: un fin muy digno de lástima
  alternative_spanish_readings:
  - una muerte muy lamentable
  - un destino sumamente penoso
  rationale: El griego permite una amplitud entre destino, fin y muerte. Se prefirió 'fin' para no estrechar el sentido, mientras 'digno de lástima' conserva la carga afectiva del adjetivo.
  doctrine_reference: LSJ μόρος; DOCTRINE.md §Optimal equivalence
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó 'an utterly miserable end' a 'a most pitiable end' para acercarse más a οἰκτίστῳ μόρῳ y mantener un registro más formal. La versión española adopta esa misma dirección semántica con 'un fin muy digno de lástima'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió 'homicida' en vez de 'siervo' o una paráfrasis neutral para conservar la fuerza condenatoria del compuesto griego.
  - Se conservó la secuencia causal/retributiva sin suavizarla, siguiendo el audit trail inglés.
  - '''Entre los montes'' mantiene mejor la imaginería bíblica que una simple localización geográfica plana.'
