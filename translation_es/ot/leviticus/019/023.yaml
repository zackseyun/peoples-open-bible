translation:
  language: es
  text: Cuando entren en la tierra y planten cualquier árbol para alimento[a], considerarán su fruto como prohibido. Durante tres años, su fruto les será prohibido; no se comerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "incircunciso". El término se usa metafóricamente para el fruto que todavía no se permite comer durante los primeros tres años.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי תָבֹאוּ אֶל הָ/אָ֗רֶץ
  english_pob_choice: When you come into the land
  chosen_spanish: Cuando entren en la tierra
  alternatives_spanish:
  - Y cuando entren en la tierra
  - Cuando lleguen a la tierra
  lexicon: HALOT
  rationale: La cláusula introduce una circunstancia futura en una instrucción legal; en español, 'Cuando entren en la tierra' transmite bien el valor temporal e ingresivo de בוא + אֶל. 'La tierra' conserva la referencia pactal sin añadir especificaciones que el hebreo no da.
- source_word: וּ/נְטַעְתֶּם֙ כָּל עֵ֣ץ מַאֲכָ֔ל
  english_pob_choice: and plant any kind of tree for food
  chosen_spanish: y planten todo árbol frutal
  alternatives_spanish:
  - y planten cualquier árbol para alimento
  - y planten todo árbol para comer
  lexicon: HALOT
  rationale: עֵץ מַאֲכָל se refiere a árbol destinado a dar alimento, normalmente frutal. 'Todo árbol frutal' suena natural en español y preserva el sentido distributivo sin sugerir literalmente 'cada especie de árbol'.
- source_word: וַ/עֲרַלְתֶּ֥ם עָרְלָת֖/וֹ אֶת פִּרְי֑/וֹ
  english_pob_choice: you shall regard its fruit as forbidden
  chosen_spanish: considerarán su fruto como prohibido
  alternatives_spanish:
  - lo tratarán como incircunciso su fruto
  - considerarán su fruto como incircunciso
  lexicon: HALOT
  rationale: El hebreo usa el lenguaje de ערל/ערלה de modo metafórico para el fruto. La POB inglesa decidió expresar el sentido idiomático como 'forbidden'; en español, 'prohibido' comunica el estatus legal sin forzar una expresión extraña. Se conserva la referencia al fruto como objeto de esa condición.
- source_word: שָׁלֹ֣שׁ שָׁנִ֗ים
  english_pob_choice: For three years
  chosen_spanish: Durante tres años
  alternatives_spanish:
  - Por tres años
  - Tres años
  lexicon: HALOT
  rationale: '''Durante tres años'' refleja la duración del período inicial y suena natural en español jurídico-instructivo. Mantiene el énfasis temporal del hebreo.'
- source_word: יִהְיֶ֥ה לָ/כֶ֛ם עֲרֵלִ֖ים
  english_pob_choice: it shall be forbidden to you
  chosen_spanish: les será prohibido
  alternatives_spanish:
  - será prohibido para ustedes
  - les será incircunciso
  lexicon: HALOT
  rationale: El verbo hebreo es singular con valor colectivo. En español, un pasivo/impersonal breve como 'les será prohibido' conserva el sentido normativo y la referencia a ustedes sin crear una construcción forzada. Se evita 'incircunciso' en el cuerpo del texto porque la edición inglesa ya optó por el valor idiomático.
- source_word: לֹ֥א יֵאָכֵֽל
  english_pob_choice: it shall not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no deberá comerse
  - no lo comerán
  lexicon: HALOT
  rationale: El nifal tiene fuerza pasiva/impersonal; 'no se comerá' reproduce bien esa forma normativa en español. Es más natural que una prohibición activa y mantiene la impersonalidad del hebreo.
theological_decisions:
- issue: Si conservar o no el lenguaje metafórico de 'incircunciso' para el fruto
  english_pob_reading: The English POB chose 'forbidden' in the main text, with a note explaining that Hebrew literally says 'uncircumcised' metaphorically for fruit not yet permitted to be eaten during the first three years.
  chosen_spanish_reading: Usar 'prohibido' en el texto principal, sin perder la alusión legal-metafórica que el contexto ya comunica.
  alternative_spanish_readings:
  - incircunciso
  - no circuncidado
  - inmundo
  rationale: En español, 'incircunciso' aplicado al fruto suena más opaco que en inglés y puede distraer del mandato. Dado que la POB inglesa ya documentó el uso metafórico y decidió privilegiar la claridad idiomática, 'prohibido' conserva el efecto normativo sin alterar la fuerza del precepto. La nota permite recordar la metáfora hebrea.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó 'uncircumcised' por 'forbidden' para expresar con mayor naturalidad el valor idiomático de ערל/ערלים, manteniendo la repetición del concepto. Esta propuesta sigue esa revisión, pero la ajusta al español con una formulación normativa breve y natural.
  spanish_consistency_notes:
  - Se mantiene 'tierra' sin capitalizar como término técnico en el texto base, siguiendo el hebreo sin introducir glosa interpretativa.
  - 'Se conserva la estructura legal de dos miembros: condición inicial y mandato resultante.'
  - '''Fruto'' se mantiene singular colectivo, como en el hebreo y en la traducción inglesa.'
  - No se usa 'SEÑOR' ni 'Yahvé' porque este versículo no contiene el nombre divino.
  - El registro es sobrio y publicable, evitando giros arcaizantes.
