translation:
  language: es
  text: Y desafió a Israel, y Jonatán, hijo de Simeí[a], hermano de David, lo abatió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y el paralelo de 1 Crónicas 20:7 leen «Shimea» o «Shimeah» en lugar de «Shimei».
    reason: textual_variant
lexical_decisions:
- source_word: וַיְחָרֵף
  english_pob_choice: defied
  chosen_spanish: desafió
  alternatives_spanish:
  - afrentó
  - reprochó
  - insultó
  lexicon: HALOT
  rationale: En este contexto militar, חרף expresa un desafío hostil y ofensivo contra Israel. «Desafió» conserva la fuerza adversativa sin bajar el tono a una mera burla. «Insultó» o «reprochó» son posibles, pero menos precisos para la escena de combate.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  lexicon: HALOT
  rationale: El objeto directo es la entidad nacional «Israel». En español, «a Israel» mantiene la referencia colectiva sin expandir innecesariamente el referente a «los israelitas».
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió de muerte
  alternatives_spanish:
  - lo golpeó
  - lo hirió
  - lo mató
  lexicon: HALOT
  rationale: נכה puede significar «golpear» o «herir», pero aquí el contexto bélico implica un golpe mortal. «Lo hirió de muerte» preserva la imagen del golpe y comunica claramente el resultado letal sin reducirlo a una paráfrasis plana.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transcripción estándar
  rationale: Se usa la forma habitual en español bíblico, «Jonatán», por ser más natural y reconocible para la lectura eclesial.
- source_word: בֶּן שמעי
  english_pob_choice: the son of Shimei
  chosen_spanish: hijo de Simeí
  alternatives_spanish:
  - hijo de Shimea
  - hijo de Shimeah
  lexicon: transcripción basada en el hebreo
  rationale: El texto hebreo consonántico da שמעי, que se representa con naturalidad en español como «Simeí». Se conserva la forma del texto base y se refleja la variante conocida en la nota textual.
- source_word: אֲחִי דָוִד
  english_pob_choice: David’s brother
  chosen_spanish: hermano de David
  alternatives_spanish:
  - el hermano de David
  lexicon: HALOT
  rationale: La construcción de genitivo se vierte de manera natural como «hermano de David», manteniendo la identificación familiar sin rigidez sintáctica.
translation_notes:
  revision_awareness: La versión en inglés POB quedó confirmada sin cambios sustanciales en la última revisión; esta propuesta sigue de cerca su lectura, manteniendo el mismo sentido narrativo y la misma nota textual sobre la variante del nombre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se usa «Jonatán» y «Simeí» como formas españolas bíblicas habituales, en lugar de transliteraciones más crudas, para favorecer la legibilidad sin perder fidelidad al hebreo.
  - La frase verbal «lo hirió de muerte» conserva la fuerza del hebreo y evita una simplificación excesiva a «lo mató».
