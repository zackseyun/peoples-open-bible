lexical_decisions:
- source_word: προσηγόρευσαν
  english_pob_choice: called
  chosen_spanish: llamaron
  alternatives_spanish:
  - denominaron
  - llamaron con el nombre de
  lexicon: LSJ
  rationale: El verbo expresa acto de nombrar o llamar. «Llamaron» conserva la función designativa y suena natural en español sin añadir más sentido del que da el griego.
- source_word: οἱ περὶ τὸν Νεεμίαν
  english_pob_choice: the men around Nehemiah
  chosen_spanish: los hombres que estaban con Nehemías
  alternatives_spanish:
  - los que estaban con Nehemías
  - los compañeros de Nehemías
  lexicon: LSJ
  rationale: La expresión griega apunta a los asociados o acompañantes de Nehemías. «Los hombres que estaban con Nehemías» mantiene la referencia al grupo sin volverla innecesariamente interpretativa.
- source_word: διερμηνεύεται
  english_pob_choice: is translated
  chosen_spanish: se traduce
  alternatives_spanish:
  - se interpreta
  - significa
  lexicon: LSJ
  rationale: El verbo introduce la explicación del término extranjero. «Se traduce» reproduce con claridad esa función explicativa en español.
- source_word: Καθαρισμός
  english_pob_choice: Purification
  chosen_spanish: Purificación
  alternatives_spanish:
  - Cleansing
  - Limpieza ritual
  lexicon: LSJ
  rationale: El sustantivo denota purificación o limpieza ritual. «Purificación» conserva el valor nominal y es la opción más natural y fiel en español.
- source_word: καλεῖται
  english_pob_choice: it is called
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamado
  - se le llama
  lexicon: LSJ
  rationale: La fórmula pasiva de nombrar se expresa con naturalidad en español mediante «se llama».
- source_word: παρὰ τοῖς πολλοῖς
  english_pob_choice: by most people
  chosen_spanish: entre la mayoría
  alternatives_spanish:
  - por la mayoría
  - entre muchos
  lexicon: LSJ
  rationale: La frase señala el uso común entre la gente. «Entre la mayoría» conserva el sentido colectivo sin forzar una construcción menos idiomática.
- source_word: Νεφθί
  english_pob_choice: Nephi
  chosen_spanish: Neftí
  alternatives_spanish:
  - Nephi
  - Nefti
  lexicon: transliteration
  rationale: Se translitera el nombre griego con adaptación española sencilla. «Neftí» conserva la forma breve del original y evita una transliteración más técnica como «Nephthi».
- source_word: Νεφθάρ
  english_pob_choice: Nephthar
  chosen_spanish: Neftar
  alternatives_spanish:
  - Nefthar
  - Neftar
  lexicon: transliteration
  rationale: Se conserva el nombre como transliteración propia en español, manteniendo la distinción entre los dos nombres y su relación con la explicación etimológica del versículo.
