base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/009.yaml
  text: Then the inhabitants of the cities of Israel will go out and make fires with the weapons and burn them—the small shield and the large shield[a], the bow and the arrows[c][b], the hand-club and the spear—and they will make fires with them for seven years.
  footnotes:
  - marker: a
    text: Or, more literally, 'and kindle with the weapons'; the Hebrew verb in this clause is difficult, but the context indicates that the weapons are used as fuel for fire.
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes two kinds of shields here, likely a smaller shield (magen) and a larger body shield (tsinnah).
    reason: cultural_note
  - marker: c
    text: Or 'hand-staff.' The Hebrew expression is literally 'staff of hand' and likely refers to a handheld weapon in this military list.
    reason: lexical_alternative
