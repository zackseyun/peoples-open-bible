  rationale: Se mantiene el sentido fuente y la documentación POB, pero se reordena la cláusula para un español natural y claro. 'Ustedes ciertamente no morirán' preserva mejor la negación enfática y la contradicción directa del aviso previo, mientras que el plural hebreo queda visible sin una sintaxis forzada. También se reubican las notas a los elementos pertinentes.
