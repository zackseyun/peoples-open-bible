review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: negación correlativa, distinción entre «rey» y «tirano», futuro de capacidad, e imagen vívida de confrontación directa. También conserva correctamente el sentido punitivo de ἐκόλασας como «castigaste». Sin embargo, «respecto de aquellos a quienes castigaste» suena poco natural en español y no representa con suficiente claridad el valor de περὶ ὧν en este contexto, que el expediente inglés entendió como referencia a las personas castigadas. Conviene una formulación más idiomática como «por aquellos a quienes castigaste».'
  spanish_quality_summary: «Ni rey ni tirano podrá mirarte a la cara» es claro y digno. La nota al pie también transmite bien las alternativas del verbo raro. El punto débil es «respecto de aquellos a quienes castigaste», que resulta rígido y menos natural para lectura eclesial amplia. «Por aquellos a quienes castigaste» mantiene la idea de confrontación en relación con los castigados y mejora notablemente la fluidez.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Rey», «tirano» y «castigaste» son adecuados. El tratamiento pronominal con «mirarte» es natural y consistente con el registro. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La expresión «respecto de aquellos a quienes castigaste» es poco idiomática en español.
    rationale: Aunque intenta reflejar περὶ ὧν, en español suena forzada. El sentido contextual es confrontar a Dios por las personas castigadas; «por aquellos a quienes castigaste» expresa eso con más naturalidad y fidelidad funcional.
  revised_spanish_text: Ni rey ni tirano podrá mirarte a la cara[a] por aquellos a quienes castigaste.
  revised_footnotes:
  - marker: a
    text: O «sostener tu mirada» o «ponerse frente a ti»; el verbo griego expresa de manera vívida una confrontación directa.
    reason: lexical_alternative
