translation:
  language: es
  text: Cuando consideré estas cosas dentro de mí y reflexioné en mi corazón que hay inmortalidad en el parentesco con la sabiduría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la afinidad con la sabiduría». La frase griega puede expresar una relación estrecha y, sin decirlo explícitamente, sugerir una conexión causal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα λογισάμενος
  english_pob_choice: When I considered these things
  chosen_spanish: Cuando consideré estas cosas
  alternatives_spanish:
  - Habiendo razonado estas cosas
  - Cuando pensé estas cosas
  lexicon: LSJ
  rationale: λογίζομαι expresa considerar, razonar o reflexionar interiormente. En español, «consideré» conserva el sentido de deliberación mental sin sonar forzado.
- source_word: ἐν ἐμαυτῷ
  english_pob_choice: within myself
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - para mí mismo
  lexicon: LSJ
  rationale: La expresión marca una deliberación interior. «Dentro de mí» transmite bien la interioridad sin agregar matices ajenos al texto.
- source_word: φροντίσας ἐν καρδίᾳ μου
  english_pob_choice: and reflected in my heart
  chosen_spanish: y reflexioné en mi corazón
  alternatives_spanish:
  - y ponderé en mi corazón
  - y me detuve a pensar en mi corazón
  lexicon: LSJ
  rationale: φροντίζω aquí tiene el valor de pensar con cuidado o meditar. «Reflexioné» mantiene el paralelismo con λογισάμενος y «en mi corazón» conserva el lenguaje antropológico bíblico.
- source_word: ὅτι ἐστιν ἀθανασία
  english_pob_choice: that there is immortality
  chosen_spanish: que hay inmortalidad
  alternatives_spanish:
  - que existe inmortalidad
  - que la inmortalidad existe
  lexicon: LSJ
  rationale: ἀθανασία se traduce de manera directa por «inmortalidad». El giro existencial ἐστιν se expresa naturalmente en español con «hay».
- source_word: ἐν συγγενείᾳ σοφίας
  english_pob_choice: in kinship with wisdom
  chosen_spanish: en la afinidad con la sabiduría
  alternatives_spanish:
  - en el parentesco con la sabiduría
  - en la relación estrecha con la sabiduría
  - en el vínculo con la sabiduría
  lexicon: LSJ
  rationale: συγγένεια puede significar parentesco, afinidad o relación cercana. «Afinidad» conserva la fuerza relacional y evita sobreinterpretar el vínculo como una causalidad explícita.
theological_decisions:
- issue: Relación entre inmortalidad y sabiduría en ἐν συγγενείᾳ σοφίας
  english_pob_reading: there is immortality in kinship with wisdom
  chosen_spanish_reading: hay inmortalidad en la afinidad con la sabiduría
  alternative_spanish_readings:
  - hay inmortalidad por la afinidad con la sabiduría
  - hay inmortalidad en unión con la sabiduría
  rationale: El griego usa ἐν + sustantivo relacional, no una fórmula causal explícita. La traducción mantiene la conexión teológica entre sabiduría e inmortalidad sin resolver ni intensificar el mecanismo.
  doctrine_reference: Preservar la tensión teológica sin explicitar más de lo que dice el texto.
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego de Swete 1909 y coincide con el audit trail inglés: se mantiene el carácter reflexivo e interior de ταῦτα λογισάμενος / ἐν ἐμαυτῷ y φροντίσας ἐν καρδίᾳ μου, y se preserva la ambigüedad relacional de ἐν συγγενείᾳ σοφίας sin convertirla en una causalidad explícita.'
  spanish_consistency_notes:
  - Se usa «sabiduría» para σοφία de forma consistente con el registro bíblico en español.
  - Se evita «SEÑOR» u otro sustituto porque no aparece el tetragrámaton ni κύριος en este versículo.
  - «Inmortalidad» mantiene el sustantivo abstracto del griego sin suavizarlo a «vida eterna», que sería una interpretación más amplia.
  - El estilo busca ser digno y publicable, con sintaxis natural en español contemporáneo.
