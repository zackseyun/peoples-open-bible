base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/050/001.yaml
  text: Simon son of Yohanan the priest was great among his brothers and the glory of his people[a]; in his generation the house was repaired[b], and in his days the temple was strengthened.
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Simon son of Onias, the great priest'' (or ''high priest''). The Hebrew witness here reads ''Simon son of Yohanan the priest.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the house was attended to/restored.' The Hebrew verb can denote being cared for or repaired; the Greek parallel points specifically to building work on the house.
    reason: lexical_alternative
