  yaml_path: translation/ot/1_chronicles/019/003.yaml
  text: But the princes of the Ammonites said to Hanun[a], “Is David honoring your father in your sight because he has sent comforters to you? Have not his servants come to you in order to search out, to overthrow[b], and to spy out the land?”
  footnotes:
