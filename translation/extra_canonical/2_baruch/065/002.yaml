  from: These are the ninth black waters that you saw.
  to: For he committed much impiety, and he killed the righteous...
  rationale: This draft appears to be a misaligned and mistranslated fragment of 65:1,
    not 65:2. 2 Baruch 65:2 actually describes Manasseh's wicked deeds (e.g., 'For
