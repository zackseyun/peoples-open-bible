translation:
  language: es
  text: 'Tú eres justo, Yahvé, cuando presento una causa ante ti[a]; sin embargo, hablaría contigo[b] de asuntos de justicia: ¿Por qué prospera el camino de los impíos? ¿Por qué están tranquilos todos los que se conducen con traición[c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aunque contienda contigo»; el verbo hebreo puede expresar contienda o la exposición de un caso legal.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «juicios» o «justicia»; el plural probablemente se refiere a asuntos o casos relativos a la justicia.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «todos los traicioneros de traición», una expresión intensificada para quienes obran con gran perfidia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en justicia
  lexicon: HALOT
  rationale: El adjetivo predicado afirma la rectitud moral de Yahvé. En español, «justo» comunica bien la justicia moral y jurídica; «recto» es posible pero menos directo aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino YHWH: «Yahvé», preservando el nombre del pacto en lugar de enmascararlo como «SEÑOR».'
- source_word: כִּי אָרִיב אֵלֶיךָ
  english_pob_choice: when I bring a case before you
  chosen_spanish: cuando presento una causa ante ti
  alternatives_spanish:
  - aunque contienda contigo
  - cuando pleiteo contigo
  - cuando expongo mi caso ante ti
  lexicon: HALOT
  rationale: ריב puede expresar contender o sostener un caso legal. En el contexto de מִשְׁפָּטִים, «presento una causa ante ti» conserva la imagen forense sin volver irreverente la queja de Jeremías.
- source_word: אַךְ
  english_pob_choice: yet
  chosen_spanish: sin embargo
  alternatives_spanish:
  - pero
  - no obstante
  - y aun así
  lexicon: HALOT
  rationale: 'Marca transición concesiva: después de afirmar que Yahvé es justo, el profeta introduce su objeción. «Sin embargo» conserva bien ese contraste.'
- source_word: מִשְׁפָּטִים
  english_pob_choice: matters of justice
  chosen_spanish: asuntos de justicia
  alternatives_spanish:
  - juicios
  - materias de justicia
  - casos de justicia
  lexicon: HALOT
  rationale: El plural sugiere asuntos o casos relacionados con la justicia, no solo sentencias. «Asuntos de justicia» es natural en español y mantiene el alcance semántico.
- source_word: אֲדַבֵּר אוֹתָךְ
  english_pob_choice: I would speak with you
  chosen_spanish: te hablaría
  alternatives_spanish:
  - hablaría contigo
  - me dirigiría a ti
  - razonaría contigo
  lexicon: HALOT
  rationale: El hebreo expresa el acto de dirigirse a Dios; en español, «te hablaría» es claro y conserva el tono dialogal. La forma condicional refleja la intención/actitud del hablante en contexto.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  lexicon: HALOT
  rationale: Interrogativo directo de causa.
- source_word: דֶּרֶךְ רְשָׁעִים
  english_pob_choice: the way of the wicked
  chosen_spanish: el camino de los impíos
  alternatives_spanish:
  - la senda de los malvados
  - el proceder de los impíos
  lexicon: HALOT
  rationale: «Camino» conserva el hebraísmo de conducta o curso de vida. «Impíos» corresponde bien a רְשָׁעִים en un registro bíblico comprensible.
- source_word: צָלֵחָה
  english_pob_choice: prosper
  chosen_spanish: prospera
  alternatives_spanish:
  - tiene éxito
  - florece
  - avanza
  lexicon: HALOT
  rationale: El verbo indica éxito o prosperidad; «prospera» es la forma más directa y acorde con el problema teológico del verso.
- source_word: שָׁלוּ
  english_pob_choice: are at ease
  chosen_spanish: están en calma
  alternatives_spanish:
  - están seguros
  - viven tranquilos
  - están a gusto
  lexicon: HALOT
  rationale: La idea es quietud, seguridad o tranquilidad. «Están en calma» comunica esa ausencia de perturbación sin introducir de más la noción de paz ritual.
- source_word: בֹּגְדֵי בָגֶד
  english_pob_choice: who deal treacherously
  chosen_spanish: los que se conducen con traición
  alternatives_spanish:
  - los traidores
  - los infieles
  - los que actúan con perfidia
  lexicon: HALOT
  rationale: La construcción intensifica la idea de traición. «Se conducen con traición» conserva el valor verbal y la gravedad del hebreo, en lugar de reducirlo solo a un sustantivo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para el Tetragrámaton. «Yahvé» preserva la referencia explícita al nombre del pacto y evita el reemplazo tradicional por un título encubierto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión teológica en la queja de Jeremías
  english_pob_reading: legal complaint framed reverently
  chosen_spanish_reading: queja forense y reverente («cuando presento una causa ante ti» / «te hablaría» )
  alternative_spanish_readings:
  - «aunque contienda contigo»
  - «te reclamaría»
  rationale: El verso afirma primero la justicia de Dios y luego introduce una objeción sobre la prosperidad de los impíos. La traducción mantiene esa tensión sin suavizarla ni volverla una acusación irrespetuosa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail en inglés, conservando la tensión jurídica del verbo ריב, el plural de מִשְׁפָּטִים, y la expresión intensificada de בֹּגְדֵי בָגֶד. No se detectan revisiones posteriores que exijan cambios adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «justo» para צַדִּיק por su equilibrio entre justicia moral y derecho covenantal.
  - «Camino» mantiene el hebraísmo de conducta de vida.
  - «Impíos» y «traición» conservan un registro bíblico sin volver arcaico el español.
  - La nota [a] se ancla en «justo[a]» porque ahí está la alternativa interpretativa principal del predicado.
  - La nota [b] se ancla en «causa ante ti[b]» por la ambigüedad de מִשְׁפָּטִים.
  - La nota [c] se ancla en «traición[c]» por la intensificación del hebreo.
