translation:
  language: es
  text: Hijos e hijas estaban en cautiverio funesto[a], sus cuellos bajo sello[b], con una marca entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus cuellos bajo sello, con una marca entre las naciones». El griego es muy comprimido; la imagen puede evocar cautivos marcados públicamente o tratados como esclavos.
    reason: lexical_alternative
  - marker: b
    text: También podría entenderse de manera más general como «marcados» o «hechos conspicuos»; la formulación mantiene la extrañeza del original sin volverlo ininteligible en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ καὶ θυγατέρες
  english_pob_choice: Sons and daughters
  chosen_spanish: Hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - hijos e hijas varones y mujeres
  - niños y niñas
  lexicon: LSJ
  rationale: Conserva el paralelismo explícito y el género marcado del griego. «Hijos e hijas» es natural en español y mantiene la duplicación fuente sin reducirla a «descendencia» o «niños».
- source_word: αἰχμαλωσίᾳ πονηρᾷ
  english_pob_choice: in evil captivity
  chosen_spanish: en cautiverio malo
  alternatives_spanish:
  - en cautiverio cruel
  - en cautiverio grave
  - en cautiverio perverso
  lexicon: LSJ
  rationale: El audit trail inglés mantuvo el valor literal de πονηρᾷ como «evil». En español, «malo» conserva esa literalidad sin convertirlo en una explicación interpretativa como «cruel» o «grave». Se conserva así la tensión del texto, que podría ser moral o de severidad, sin resolverla más allá de la fuente.
- source_word: ἐν σφραγῖδι
  english_pob_choice: their necks in a seal
  chosen_spanish: su cuello en un sello
  alternatives_spanish:
  - su cuello bajo un sello
  - su cuello sellado
  - su cuello con un sello
  lexicon: LSJ
  rationale: El griego es condensado y el POB inglés optó por una formulación literal, no parafrástica. «En un sello» reproduce la preposición y la imagen sin eliminar la rareza del original. Se mantiene el singular colectivo de «cuello» como reflejo del griego, aunque en español puede sonar más natural el plural; aquí se preserva la forma fuente.
- source_word: ὁ τράχηλος αὐτῶν
  english_pob_choice: their necks
  chosen_spanish: su cuello
  alternatives_spanish:
  - sus cuellos
  - el cuello de ellos
  lexicon: LSJ
  rationale: El griego usa un sustantivo singular con referente plural; el POB inglés lo pluralizó por idiomatismo. En español, se eligió conservar el singular para sostener la compresión sintáctica del texto fuente y su relación con «en un sello».
- source_word: ἐν ἐπισήμῳ
  english_pob_choice: with a mark
  chosen_spanish: con una marca
  alternatives_spanish:
  - marcados
  - con una señal
  - con una señal visible
  lexicon: LSJ
  rationale: La decisión inglesa pasó de «branded» a «with a mark» en la revisión final para reflejar más literalmente ἐν ἐπισήμῳ. En español, «con una marca» preserva esa literalidad y evita introducir una imagen más interpretativa como «marcados a fuego».
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: LSJ
  rationale: «Entre las naciones» es una equivalencia transparente y de registro bíblico claro. «Entre» reproduce bien la localización pública y social del marcaje, en paralelo con el inglés final.
theological_decisions:
- issue: Naturaleza de «cautiverio malo/evil captivity»
  english_pob_reading: The English POB preserves the severity of πονηρᾷ without narrowing it to one interpretive sense such as moral evil or mere hardship.
  chosen_spanish_reading: Se mantiene «cautiverio malo» para no decidir entre «cruel», «grave» o «malo» en un sentido más libre.
  alternative_spanish_readings:
  - cautiverio cruel
  - cautiverio grave
  - cautiverio perverso
  rationale: El griego admite una carga de dureza o aflicción; la traducción española debe conservar esa tensión sin resolverla. Dado el paralelismo de humillación pública en el verso, «malo» funciona como equivalente literal, aunque poco idiomático, y queda sustentado por la nota.
  doctrine_reference: none
- issue: Imagen de sello/marca como humillación pública
  english_pob_reading: The POB notes that the compressed Greek imagery may evoke captives being publicly marked or treated as slaves.
  chosen_spanish_reading: Se conserva la imagen extraña de «su cuello en un sello, con una marca entre las naciones» sin convertirla en una explicación extensa.
  alternative_spanish_readings:
  - marcados públicamente
  - tratados como esclavos
  - branded among the nations
  rationale: El texto no desarrolla explícitamente la metáfora; por eso la versión española debe dejar visible la rareza y la posible vergüenza pública, no domesticarla. La nota recoge la alternativa interpretativa sin convertirla en la lectura principal.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del POB en inglés, que volvió a una traducción más literal: «evil captivity», «their necks in a seal», y «with a mark among the nations». La versión española refleja ese giro hacia mayor literalidad, evitando las soluciones más interpretativas de la versión anterior («cruel captivity», «marked with a seal», «branded»).'
  spanish_consistency_notes:
  - Se usó «entre las naciones» para mantener la fórmula bíblica estándar y el paralelismo con el inglés revisado.
  - Se evitó «SEÑOR»/«Yahvé» porque este verso no contiene el nombre divino.
  - Se mantuvo la imagen condensada del sello y la marca sin armonizarla con español más explicativo, para conservar la huella textual del griego.
