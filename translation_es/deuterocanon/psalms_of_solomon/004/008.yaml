translation:
  language: es
  text: Que Dios exponga las obras del que agrada a la gente[a], sus obras para burla y escarnio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del agradador de hombres».'
    reason: Alternativa más compacta que preserva la categoría ética específica del griego, aunque suena menos natural en español corriente.
lexical_decisions:
- source_word: ἀνακαλύψαι ὁ θεὸς
  english_pob_choice: May God expose
  chosen_spanish: Que Dios exponga
  alternatives_spanish:
  - Que Dios descubra
  - Que Dios dé a conocer
  lexicon: LSJ
  rationale: El infinitivo ἀνακαλύψαι funciona aquí con valor de ruego jussivo en un contexto imprecatorio. En español, «Que Dios exponga» conserva esa fuerza de súplica/maldición sin volverlo una simple afirmación futura.
- source_word: τὰ ἔργα
  english_pob_choice: the deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  lexicon: LSJ
  rationale: «ἔργα» alude a lo que la persona hace efectivamente. «Obras» mantiene el paralelismo bíblico y la posibilidad de carga moral, sin perder claridad en español.
- source_word: ἀνθρώπων ἀρεσκόν
  english_pob_choice: the man-pleaser
  chosen_spanish: del hombre complaciente
  alternatives_spanish:
  - del complaciente con los hombres
  - del que agrada a la gente
  - del hombre que busca agradar a los hombres
  lexicon: LSJ
  rationale: La tradición auditada favorece mantener la categoría ética compacta de «man-pleaser». En español, «hombre complaciente» conserva la idea de alguien definido por agradar a los hombres más que a Dios, aunque es menos idiomática que otras opciones más largas.
- source_word: ἐν καταγέλωτι
  english_pob_choice: for ridicule
  chosen_spanish: con ridículo
  alternatives_spanish:
  - en burla
  - para ridículo
  - con escarnio
  lexicon: LSJ
  rationale: El ἐν aquí expresa acompañamiento o modo. «Con ridículo» reproduce esa relación de manera breve y mantiene la pareja poética con el término siguiente.
- source_word: μυκτηρισμῷ
  english_pob_choice: derision
  chosen_spanish: escarnio
  alternatives_spanish:
  - burla
  - mofa
  - desprecio burlón
  lexicon: LSJ
  rationale: μυκτηρισμός connota burla despectiva y desdeñosa. «Escarnio» comunica bien esa carga en español y evita repetir simplemente «ridículo».
theological_decisions:
- issue: Fuerza imprecatoria/jussiva del verbo inicial
  english_pob_reading: May God expose
  chosen_spanish_reading: Que Dios exponga
  alternative_spanish_readings:
  - Dios expondrá
  - Dios exponga
  rationale: La forma griega no es un futuro simple, sino una petición o deseo dirigido a Dios. La traducción española debe preservar ese tono de imprecación/súplica.
  doctrine_reference: Salmos imprecatorios; estilo de súplica judicial ante Dios
- issue: Identidad ética de ἀνθρώπων ἀρεσκόν
  english_pob_reading: the man-pleaser
  chosen_spanish_reading: el hombre complaciente
  alternative_spanish_readings:
  - el que agrada a la gente
  - el complaciente con los hombres
  rationale: La revisión auditada insiste en conservar la categoría teológica/ética de «man-pleaser». En español, «hombre complaciente» mantiene el contraste implícito con agradar a Dios y evita diluir el término en una frase conversacional.
  doctrine_reference: ética bíblica de agradar a Dios antes que a los hombres
translation_notes:
  revision_awareness: La traducción sigue la revisión que preserva el término ético condensado «man-pleaser» y la estructura poética breve del segundo hemistiquio. Frente a la primera redacción inglesa más explicativa, se mantuvo la economía sintáctica del griego y se ajustó el modo verbal a una imprecación en español.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, sin recurso a «SEÑOR», porque el texto griego no contiene κύριος.
  - Se eligió «obras» para ἔργα por coherencia con el paralelismo y el registro moral del verso.
  - «Ridículo» y «escarnio» conservan dos términos distintos del original, evitando fusionarlos en una sola idea.
