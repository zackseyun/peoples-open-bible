translation:
  language: es
  text: 'En aquel día, habrá sobre las campanillas de los caballos[b]: «Santo a Yahvé»[a], y las ollas en la casa de Yahvé serán como los tazones[c] delante del altar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Santidad a Yahvé». La frase hebrea evoca la inscripción de la lámina de oro del sumo sacerdote en Éxodo 28:36.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo puede referirse a pequeños objetos metálicos que tintinean en el arreo; «campanillas» es el sentido más probable.
    reason: cultural_note
  - marker: c
    text: 'O: «tazones» o «vasijas». Son recipientes sagrados usados en el ritual del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se expresa de manera natural en español con fuerza deíctica y escatológica. «En aquel día» conserva el valor solemne y bíblico del giro sin caer en arcaísmo excesivo.
- source_word: מְצִלּוֹת הַסּוּס
  english_pob_choice: the bells of the horses
  chosen_spanish: las campanillas de los caballos
  alternatives_spanish:
  - los cascabeles de los caballos
  - las campanas de los caballos
  lexicon: HALOT
  rationale: El término hebreo probablemente designa pequeños objetos metálicos que tintinean en el arreo, no campanas grandes. «Campanillas» mantiene la imagen auditiva y la nota de objeto pequeño que la auditoría inglesa juzgó más probable.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: Holy to Yahweh
  chosen_spanish: Santo a Yahvé
  alternatives_spanish:
  - Santidad a Yahvé
  - Consagrado a Yahvé
  lexicon: HALOT
  rationale: La frase es una inscripción cultual fija y alude a Éxodo 28:36. «Santo a Yahvé» conserva la brevedad formulaica y la dedicación perteneciente al nombre divino, siguiendo el estándar del proyecto para יהוה.
- source_word: הַסִּירוֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - las vasijas
  - los calderos
  - las cazuelas
  lexicon: HALOT
  rationale: El hebreo apunta a recipientes de uso ritual/culto; en español «ollas» es claro y suficientemente amplio sin sobreinterpretar. Se evita «vasijas» por ser demasiado genérico y «calderos» por ser más específico de lo que el término exige.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa del Señor
  lexicon: HALOT
  rationale: «Casa de Yahvé» preserva la expresión hebrea y la connotación cultual sin sustituirla por un equivalente interpretativo. Se mantiene el nombre divino según la terminología del proyecto.
- source_word: כַּמִּזְרָקִים
  english_pob_choice: like the bowls
  chosen_spanish: como los tazones
  alternatives_spanish:
  - como los cuencos
  - como los bowls
  - como las fuentes
  lexicon: HALOT
  rationale: מִזְרָקִים son recipientes rituales usados ante el altar; «tazones» comunica bien la forma de recipiente en español moderno. «Cuencos» también sería posible, pero «tazones» resulta más natural y menos ambiguo en este contexto.
- source_word: לִפְנֵי הַמִּזְבֵּחַ
  english_pob_choice: before the altar
  chosen_spanish: delante del altar
  alternatives_spanish:
  - ante el altar
  - frente al altar
  lexicon: HALOT
  rationale: «Delante del altar» conserva el valor espacial literal de la preposición y suena natural en español. Se evita una mayor reinterpretación litúrgica.
theological_decisions:
- issue: La fórmula de santidad se aplica a objetos cotidianos y cultuales
  english_pob_reading: The verse portrays ordinary objects associated with daily life and temple service as bearing the same holiness designation and status as sacred temple vessels.
  chosen_spanish_reading: El versículo presenta objetos ordinarios y objetos del culto compartiendo la misma designación de santidad, borrando la antigua distinción entre lo común y lo sagrado.
  alternative_spanish_readings:
  - Es solo una imagen general de bendición sin implicación cultual específica
  - Es una referencia exclusivamente simbólica sin nivelación de categorías sagradas
  rationale: La inscripción «Santo a Yahvé» y la comparación de las ollas con los tazones delante del altar requieren mantener la tensión cultual del texto. La traducción no la diluye en una bendición genérica.
  doctrine_reference: Éxodo 28:36; santidad cultual en la literatura profética
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés que eliminó «inscribed», porque el hebreo no lo expresa explícitamente. También conserva la decisión auditada de traducir el término de los caballos como pequeños objetos tintineantes y de mantener la terminología cultual sin sobreparafrasear.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se mantiene el registro bíblico culto pero claro, evitando tanto arcaísmos innecesarios como equivalencias demasiado libres.
  - Los términos de culto («santo», «casa de Yahvé», «delante del altar») se alinean con la fuerza ritual del hebreo y con la auditoría inglesa.
