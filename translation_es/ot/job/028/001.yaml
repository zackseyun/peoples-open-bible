translation:
  language: es
  text: Ciertamente hay una mina para la plata[a], y un lugar donde refinan el oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una fuente para la plata». El hebreo מוֹצָא puede significar «fuente» o «lugar de origen»; aquí se eligió «mina» por el contexto de extracción de metales.
    reason: lexical_alternative
  - marker: b
    text: O «y un lugar donde funden el oro». El verbo puede denotar el refinado o la fundición de metales preciosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Porque
  - En verdad
  - Sin duda
  lexicon: HALOT
  rationale: En este inicio poético, כִּי funciona de modo enfático y no meramente causal; «Ciertamente» conserva ese tono asertivo sin forzar una relación de causa en español.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - se encuentra
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de forma natural y breve con «hay».
- source_word: לַכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: para la plata
  alternatives_spanish:
  - de la plata
  - de plata
  lexicon: HALOT
  rationale: El ל marca relación con מוֹצָא; «para la plata» conserva esa relación funcional sin convertirla en genitivo fijo. «Plata» es el metal más natural en español para כֶּסֶף.
- source_word: מוֹצָא
  english_pob_choice: a mine
  chosen_spanish: una mina
  alternatives_spanish:
  - una fuente
  - un lugar de origen
  - un lugar de salida
  lexicon: HALOT
  rationale: Aunque el término puede significar «fuente» o «origen», el contexto de minería y metales en Job 28 favorece «mina» como equivalencia concreta y transparente.
- source_word: וּמָקוֹם
  english_pob_choice: and a place
  chosen_spanish: y un lugar
  alternatives_spanish:
  - y un sitio
  - y una ubicación
  lexicon: HALOT
  rationale: «Lugar» reproduce el valor amplio de מָקוֹם y encaja con el paralelismo poético.
- source_word: לַזָּהָב
  english_pob_choice: for gold
  chosen_spanish: para el oro
  alternatives_spanish:
  - del oro
  - de oro
  lexicon: HALOT
  rationale: Se mantiene el mismo valor relacional del ל como en la primera cola; «oro» es la traducción normal y precisa de זָהָב.
- source_word: יָזֹקּוּ
  english_pob_choice: they refine
  chosen_spanish: refinan
  alternatives_spanish:
  - lo refinan
  - lo funden
  - lo purifican
  - lo smelten
  lexicon: HALOT
  rationale: El verbo זקק en este contexto apunta al proceso de refinar o fundir metales. En español, «refinan» es claro y suficientemente amplio, conservando el sujeto impersonal plural del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una formulación más literal («a place for gold that they refine») a una estructura más natural y fiel al hebreo («a place where they refine gold»). La versión española sigue esa misma decisión, usando una subordinada de lugar con verbo impersonal plural.
  spanish_consistency_notes:
  - Se usó «plata» para כֶּסֶף y «oro» para זָהָב de manera consistente con el léxico metalúrgico del versículo.
  - Se preservó el paralelismo de las dos colas hebreas con una estructura coordinada y compacta.
  - Se evitó «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
