id: MIC.5.6
reference: Micah 5:6
source:
  edition: WLC
  text: וְ/הָיָ֣ה שְׁאֵרִ֣ית יַעֲקֹ֗ב בְּ/קֶ֨רֶב֙ עַמִּ֣ים רַבִּ֔ים כְּ/טַל֙ מֵ/אֵ֣ת יְהוָ֔ה כִּ/רְבִיבִ֖ים עֲלֵי עֵ֑שֶׂב אֲשֶׁ֤ר לֹֽא יְקַוֶּה֙ לְ/אִ֔ישׁ וְ/לֹ֥א יְיַחֵ֖ל לִ/בְנֵ֥י אָדָֽם׀־־׃
translation:
  text: And the remnant of Jacob will be among many peoples like dew from Yahweh[a], like showers upon the grass[b], which do not wait for a man or delay for the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not hope for a man, nor wait for the sons of man.' The Hebrew verbs can both carry the sense of waiting or hoping; the line emphasizes that the dew and rain come apart from human agency.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of man,' a Hebrew expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it shall be
  - Then ... will be
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a future/resultative statement in prophetic discourse. 'Will be' gives clear modern English without archaic 'shall be.'
- source_word: שְׁאֵרִית יַעֲקֹב
  chosen: the remnant of Jacob
  alternatives:
  - Jacob's remnant
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually precise rendering for שְׁאֵרִית in prophetic literature, preserving the theological motif of a surviving covenant people. ''Jacob'' is retained as the covenantal name, not generalized to ''Israel,'' since the Hebrew is explicit.'
- source_word: בְּקֶרֶב עַמִּים רַבִּים
  chosen: among many peoples
  alternatives:
  - in the midst of many peoples
  - in the heart of many peoples
  lexicon: HALOT
  rationale: בקרב literally means 'in the midst of'; 'among' is a natural optimal-equivalence rendering. 'Peoples' rather than 'nations' better reflects עמים here as ethnic groups/populations rather than political states.
- source_word: כְּטַל מֵאֵת יְהוָה
  chosen: like dew from the LORD
  alternatives:
  - like dew from Yahweh
  - like dew from the LORD's hand
  lexicon: HALOT
  rationale: The simile compares the remnant's presence to dew whose source is divine. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved only as an alternative, not in the main text.
- source_word: כִּרְבִיבִים עֲלֵי עֵשֶׂב
  chosen: like showers upon the grass
  alternatives:
  - like abundant rain upon the grass
  - like rain showers on vegetation
  lexicon: HALOT
  rationale: רביבים denotes rain showers/downpours. 'Showers' is vivid and idiomatic; 'upon the grass' keeps the concrete image of עֵשֶׂב without overgeneralizing to all vegetation.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A relative pronoun is needed to connect the simile with the following clause. 'Which' fits the non-personal antecedent ('dew/showers') in English.
- source_word: לֹא יְקַוֶּה לְאִישׁ
  chosen: does not wait for a man
  alternatives:
  - does not hope for a man
  - does not depend on a man
  lexicon: HALOT
  rationale: The verb קוה can mean 'wait for' or 'hope for.' In this weather image, the point is that dew/rain does not await human agency, so 'wait for' best fits the context.
- source_word: וְלֹא יְיַחֵל לִבְנֵי אָדָם
  chosen: or delay for the sons of man
  alternatives:
  - or wait for the children of man
  - or hope in human beings
  lexicon: HALOT
  rationale: יחל overlaps semantically with קוה ('wait/hope'). To avoid awkward repetition while preserving the parallelism, 'delay for' conveys that the dew/showers do not tarry pending human action. 'Sons of man' is kept as a gender-accurate formal rendering of בני אדם.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered according to context. Here איש and בני אדם form a human-agency parallel; 'man' in the singular and 'sons of man' in the plural preserve the Hebrew's gendered representative style.
