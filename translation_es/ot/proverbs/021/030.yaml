translation:
  language: es
  text: No hay sabiduría, ni entendimiento, ni consejo contra[a] Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «delante de Yahvé» o «en presencia de Yahvé»; el hebreo puede expresar mera ubicación delante de alguien, aunque aquí probablemente indica oposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no hay ninguno
  lexicon: HALOT
  rationale: La negación existencial repetida en hebreo se vierte de forma natural en español con "no hay", conservando el paralelismo enfático de la serie de tres miembros.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - prudencia
  lexicon: HALOT
  rationale: '"Sabiduría" es el equivalente más directo y adecuado en Proverbios para חָכְמָה, sin perder el valor de habilidad práctica que el contexto sapiencial sugiere.'
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: '"Entendimiento" mantiene la distinción natural frente a "sabiduría" y refleja bien el campo semántico de תְּבוּנָה en literatura sapiencial.'
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - plan
  - asesoramiento
  lexicon: HALOT
  rationale: En español bíblico, "consejo" comunica con claridad la idea de deliberación o estrategia; en este contexto funciona mejor que un calco como "counsel".
- source_word: לְנֶגֶד
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - delante de
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: El audit trail inglés ya distingue que aquí la expresión no es meramente espacial. "Contra" expresa bien la oposición o el ponerse en frente de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español como "Yahvé", coherente con la convención del proyecto y con la decisión textual de no sustituirlo por un título.
theological_decisions:
- issue: Force of לְנֶגֶד יְהוָה
  english_pob_reading: against Yahweh
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - delante de Yahvé
  - en presencia de Yahvé
  rationale: La evidencia del inglés POB y la nota crítica indican que la frase puede sugerir presencia, pero aquí el sentido probable es oposición. "Contra Yahvé" preserva esa tensión sin perder la alternativa documentada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — לְנֶגֶד as opposition/presence'
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. Se mantiene el nombre divino transliterado en español para preservar el referente personal y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo en la revisión reciente, sin cambios necesarios respecto del sentido base: negación triple, tríada sapiencial y giro final de oposición o confrontación ante Yahvé. La versión española conserva esa estructura y mantiene la alternativa documentada en nota.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé», conforme al estándar del proyecto.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton del texto hebreo.
  - 'Se eligieron términos sapienciales comunes y transparentes en español: «sabiduría», «entendimiento» y «consejo».'
  - La nota a pie conserva la ambigüedad lexical de לְנֶגֶד sin neutralizarla.
