review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del griego: la condición de δουλεία no terminará en favor sino en ἀτιμία por acción del Señor/Dios. Conserva correctamente ''esclavitud'' para δουλεία y ''favor'' para χάρις en contexto no soteriológico. Sin embargo, ''se convertirá en favor'' y ''la convertirá en deshonra'' inclinan el sentido hacia transformación ontológica más que hacia resultado/estado asignado; además, el texto base griego usa κύριος, por lo que ''Señor'' es defendible, pero el proyecto prioriza ''Yahvé'' cuando κύριος remite al nombre divino, y aquí la expresión ''Κύριος ὁ θεὸς ἡμῶν'' funciona como designación divina plena, por lo que conviene alinear con la política del proyecto.'
  spanish_quality_summary: El español es claro y digno, pero 'convertirse en favor' suena algo poco idiomático y abstracto. 'No resultará en favor' y 'la hará una deshonra' o 'la pondrá en deshonra' suenan más naturales y reflejan mejor el contraste de resultado. También conviene evitar una nota alternativa demasiado calcada del inglés si el español puede ofrecer una alternativa más natural.
  glossary_alignment: 'Alinea bien con ''esclavitud'', ''favor'' y ''deshonra''. Requiere ajuste en el tratamiento de la designación divina: aquí debe preferirse ''Yahvé nuestro Dios'' para respetar la convención principal del proyecto cuando κύριος representa el nombre divino en una fórmula veterotestamentaria. No hay razón contextual fuerte para mantener ''Señor'' en el texto principal.'
  issues:
  - severity: medium
    issue: '''se convertirá en favor'' no refleja con naturalidad κατευθυνθήσεται εἰς χάριν'
    rationale: El verbo griego expresa orientación o resultado, no necesariamente transformación en 'favor' como sustancia. En español bíblico natural, 'resultará en favor' o 'terminará en favor' transmite mejor el desenlace.
  - severity: medium
    issue: '''la convertirá en deshonra'' sobreinterpreta θήσει αὐτήν εἰς ἀτιμίαν'
    rationale: 'τίθημι aquí es resultativo: ''hará de ello deshonra'' / ''la hará una deshonra''. ''Convertirá'' repite la imagen del primer verbo y puede sonar demasiado uniformado.'
  - severity: medium
    issue: Uso de 'el Señor nuestro Dios' en vez de 'Yahvé nuestro Dios'
    rationale: Aunque el texto inmediato es griego κύριος, en Judith esta fórmula divina remite al Dios de Israel y el proyecto indica usar 'Yahvé' en el texto principal en lugar de la convención de ocultamiento 'SEÑOR'. No se documenta aquí una excepción suficientemente fuerte para mantener 'Señor'.
  revised_spanish_text: Porque nuestra esclavitud[a] no resultará en favor, sino que Yahvé nuestro Dios la hará una deshonra.
  revised_footnotes:
  - marker: a
    text: O «Porque nuestra esclavitud no terminará en favor, sino que Yahvé nuestro Dios la hará una desgracia»
    reason: lexical_alternative
  revision_rationale: Se ajustó el verbo para expresar resultado más que transformación ('no resultará en favor'), se tradujo θήσει αὐτήν de manera más directa y natural en español ('la hará una deshonra'), y se alineó la designación divina con la convención principal del proyecto usando 'Yahvé'. La nota alternativa conserva la opción documentada de 'no terminará en favor' y una alternativa contextual para ἀτιμίαν.
