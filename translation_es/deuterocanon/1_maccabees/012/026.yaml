  spanish_quality_summary: El español es claro y natural, con tono bíblico moderno y legible. No obstante, «espías» carga más sospecha encubierta que el griego exige en este contexto de reconocimiento militar, mientras que «exploradores» suena más idiomático y fiel al matiz de scouts. Además, «su campamento» puede confundir el referente posesivo. La construcción «Así se están disponiendo» es aceptable, pero «Así se están desplegando» comunica mejor la disposición táctica/orden de batalla que sugiere τάσσονται.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La principal cuestión léxica es mantener el valor militar de κατασκόπους y τάσσονται conforme al audit trail. Se recomienda «exploradores» para κατασκόπους y una nota sobre «disponiendo/alineando» para τάσσονται, en continuidad con la justificación inglesa.
