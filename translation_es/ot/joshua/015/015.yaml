translation:
  language: es
  text: Desde allí subió contra los habitantes de Debir[a]. (Antes, el nombre de Debir era Quiriat-séfer.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quiriat-séfer puede significar «Ciudad del Libro» o «Ciudad de la escritura».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: he went up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - subió a
  - subió hacia
  - atacó
  lexicon: HALOT
  rationale: עלה significa literalmente “subir”, pero en contexto narrativo militar admite la idea de avanzar contra un lugar o un pueblo. En español, “subió contra” conserva tanto la imagen de ascenso como el matiz hostil del contexto, de modo más fiel que un simple “subió a” y sin volverlo demasiado interpretativo como “atacó”.
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - desde ese lugar
  - de allí
  lexicon: HALOT
  rationale: Es un adverbio de deixis espacial estándar. “Desde allí” comunica con naturalidad el punto de partida indicado por el hebreo y por la redacción inglesa auditada.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los moradores de
  - los que habitaban en
  lexicon: HALOT
  rationale: El participio plural designa a quienes habitan el lugar. “Habitantes” es la equivalencia más clara y directa en español, y mantiene la referencia colectiva sin añadir matices extra.
- source_word: דְּבִר
  english_pob_choice: Debir
  chosen_spanish: Debir
  alternatives_spanish:
  - Debir
  lexicon: toponym
  rationale: Es un nombre propio de lugar; se conserva transliterado. Se mantiene “Debir” para seguir la forma ya establecida en el texto base auditado.
- source_word: וְשֵׁם דְּבִר לְפָנִים
  english_pob_choice: Formerly the name of Debir was
  chosen_spanish: Antes, el nombre de Debir era
  alternatives_spanish:
  - y antes el nombre de Debir era
  - y el nombre de Debir antes era
  lexicon: HALOT
  rationale: לְפָנִים aquí tiene valor temporal (“antes”, “antiguamente”). La frase se vierte como inciso informativo en español, evitando una construcción rígida pero conservando el carácter parentético del hebreo.
- source_word: קִרְיַת סֵפֶר
  english_pob_choice: Kiriath-sepher
  chosen_spanish: Quiriat-sefer
  alternatives_spanish:
  - Kiriat-sefer
  - Ciudad del Libro
  lexicon: HALOT
  rationale: Se trata de un topónimo y se translitera en el texto principal. Se opta por “Quiriat-sefer” para adaptar de forma transparente la forma hebrea al español, manteniendo el valor nominal del lugar sin traducirlo dentro del cuerpo principal.
translation_notes:
  revision_awareness: 'La redacción inglesa auditada se mantuvo sin cambios en la última revisión, con alto acuerdo entre revisores. Esta versión española sigue la misma decisión principal: conservar el topónimo en el texto y explicar en nota la posible transparencia léxica de Quiriat-sefer.'
  spanish_consistency_notes:
  - Se conserva “Debir” como nombre propio principal en ambas apariciones.
  - Se mantiene el valor narrativo-militar de עלה con “subió contra”, en paralelo con la lectura auditada en inglés.
  - El inciso final se formula como información histórica entre paréntesis, siguiendo la estructura del hebreo y del inglés POB.
  - Se usa “Quiriat-sefer” en el cuerpo del texto y se reserva la posible traducción del nombre para la nota, sin sustituir el topónimo en línea.
