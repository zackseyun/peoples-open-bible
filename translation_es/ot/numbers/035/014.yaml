translation:
  language: es
  text: Asignarán[a] tres de las ciudades al otro lado del Jordán[b], y tres de las ciudades en la tierra de Canaán; serán ciudades de refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «darán» o «designarán»; el verbo hebreo es literalmente «dar», aquí con el sentido de asignar o establecer estas ciudades para este fin.
    reason: lexical_alternative
  - marker: b
    text: O «del otro lado del Jordán» o «más allá del Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְּנוּ / תִּתְּנ֖וּ
  english_pob_choice: you shall appoint
  chosen_spanish: Asignarán
  alternatives_spanish:
  - darán
  - designarán
  - asignarán
  lexicon: HALOT
  rationale: El hebreo נתן significa literalmente «dar», pero aquí funciona en un contexto legal-administrativo de asignación de ciudades para una finalidad específica. «Asignarán» comunica esa función con naturalidad en español y mantiene la fuerza de designación sin volverlo excesivamente técnico.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: del otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La expresión señala la relación geográfica respecto del Jordán sin fijar innecesariamente un punto de vista más explícito que el hebreo. «Del otro lado del Jordán» es claro, natural y conserva esa relatividad espacial.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en la tierra de Canaán
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra»; por eso se conserva en español para no reducir el alcance territorial del texto.
- source_word: עָרֵי מִקְלָט
  english_pob_choice: cities of refuge
  chosen_spanish: ciudades de refugio
  alternatives_spanish:
  - ciudades refugio
  - ciudades asilo
  lexicon: HALOT
  rationale: «Ciudades de refugio» es la forma establecida y fiel para el término legal de lugares designados para protección. «Ciudades asilo» podría sonar moderno y cargar asociaciones ajenas al texto.
- source_word: אֵת שְׁלֹשׁ הֶעָרִים ... וְאֵת שְׁלֹשׁ הֶעָרִים
  english_pob_choice: three of the cities ... and three of the cities
  chosen_spanish: tres de las ciudades ... y tres de las ciudades
  alternatives_spanish:
  - tres ciudades ... y tres ciudades
  - tres de las ciudades ... y tres de las ciudades
  lexicon: HALOT
  rationale: El hebreo usa el artículo definido con el sustantivo, lo que sugiere ciudades específicas dentro de un conjunto ya mencionado. «Tres de las ciudades» preserva mejor esa especificidad que «tres ciudades».
- source_word: תִּהְיֶינָה
  english_pob_choice: they shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  - serán
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa el estado resultante o la función establecida de estas ciudades. «Serán» transmite bien ese valor jurídico-funcional en español.
theological_decisions:
- issue: Terminología legal de protección
  english_pob_reading: cities of refuge
  chosen_spanish_reading: ciudades de refugio
  alternative_spanish_readings:
  - ciudades asilo
  - ciudades refugio
  rationale: No se reemplaza el término tradicional-jurídico por una paráfrasis moderna. «Refugio» mantiene la función de protección establecida por la ley sin introducir connotaciones extrañas.
  doctrine_reference: Números 35:9-15; Josué 20
- issue: Punto de referencia geográfico del Jordán
  english_pob_reading: beyond the Jordan
  chosen_spanish_reading: del otro lado del Jordán
  alternative_spanish_readings:
  - más allá del Jordán
  - across the Jordan
  rationale: La frase conserva la relación espacial sin absolutizarla ni explicitar una perspectiva que el hebreo no fija de manera rígida. Se mantiene la neutralidad geográfica del original.
  doctrine_reference: Números 35:14
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término correspondiente. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yordán» con mayúscula y forma española usual del topónimo.
  - Se prefirió «tierra de Canaán» por la presencia explícita de «land» en el hebreo y en el audit trail inglés.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una sustitución directa relevante.
  - Se conservó el término jurídico tradicional «ciudades de refugio» por ser la traducción estable y transparente del tecnicismo bíblico.
