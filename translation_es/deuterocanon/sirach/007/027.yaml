translation:
  language: es
  text: Con todo tu corazón honra a tu padre[a], y no olvides los dolores de parto de tu madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es más breve en la segunda línea («y la madre que te dio a luz, no ...»); el paralelo griego explicita el sentido como «no olvides los dolores de parto de tu madre».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל לִבְּךָ
  english_pob_choice: With all your heart
  chosen_spanish: Con todo tu corazón
  alternatives_spanish:
  - Con tu corazón entero
  - Con todo el corazón
  lexicon: HALOT
  rationale: Conserva el idiomático hebreo de entrega total y suena natural en español bíblico contemporáneo.
- source_word: כַּבֵּד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - da honra a
  - glorifica
  - trata con honor
  lexicon: HALOT
  rationale: En este contexto relacional, el verbo expresa dar el peso y el respeto debidos al padre; «honra» mantiene la fuerza y la idiomaticidad del mandato.
- source_word: לְאָבִיךָ
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre
  lexicon: HALOT
  rationale: Se conserva el destinatario directo e inequívoco del mandato sin generalizar el parentesco.
- source_word: וְאֵם
  english_pob_choice: and ... your mother
  chosen_spanish: y tu madre
  alternatives_spanish:
  - y la madre que te dio a luz
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego apuntan a la madre como segunda destinataria; en español conviene explicitarla de manera directa para evitar oscuridad innecesaria.
- source_word: יוֹלַדְתְּךָ
  english_pob_choice: your mother
  chosen_spanish: de parto
  alternatives_spanish:
  - que te dio a luz
  - que te engendró
  lexicon: HALOT
  rationale: El hebreo alude a la madre que te dio a luz; se preserva en español mediante una expresión natural que deja ver el vínculo con el nacimiento.
- source_word: אַל תִּשֶּׁה
  english_pob_choice: do not forget
  chosen_spanish: no olvides
  alternatives_spanish:
  - no descuides
  - no desatiendas
  lexicon: HALOT
  rationale: El paralelo griego aclara que el verbo apunta a no olvidar; «no olvides» es la equivalencia española más directa y fluida.
- source_word: μητρὸς ὠδῖνας
  english_pob_choice: the labor pains of your mother
  chosen_spanish: los dolores de parto de tu madre
  alternatives_spanish:
  - las penas de parto de tu madre
  - el trabajo de parto de tu madre
  lexicon: BDAG
  rationale: 'El griego hace explícito el contenido de la cláusula final: recordar el sufrimiento del parto. «Dolores de parto» reproduce bien el sentido y la imagen bíblica.'
theological_decisions:
- issue: Uso del hebreo como base con clarificación del paralelo griego
  english_pob_reading: Translate from the Hebrew as primary, while allowing the Greek parallel to clarify the compressed final clause as a call not to forget the mother's labor pains.
  chosen_spanish_reading: Se toma el hebreo como base, pero se deja que el griego aclare la cláusula final como una exhortación a no olvidar los dolores de parto de la madre.
  alternative_spanish_readings:
  - 'Una versión más opaca del hebreo: «y no olvides a la madre que te dio a luz».'
  - 'Una formulación más interpretativa: «y recuerda el sufrimiento de tu madre al darte a luz».'
  rationale: Sirácide conserva un hebreo breve y a veces comprimido; el griego paralelo ofrece una aclaración legítima y probablemente antigua. La traducción española debe ser fiel y a la vez inteligible, sin borrar la tensión textual entre ambas formas.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el griego paralelo para aclarar'
translation_notes:
  revision_awareness: 'El borrador final mantiene la decisión revisada del audit trail en favor de una lectura clara y source-grounded: hebreo como base, griego como aclaración legítima de la cláusula final. No se introducen cambios respecto del último pase revisado; se ajusta el español para reflejar con más naturalidad el vínculo entre «olvidar» y los dolores de parto.'
  spanish_consistency_notes:
  - «honra» conserva el mandato relacional sin sustituirlo por una fórmula eclesiástica menos directa.
  - Se evita «SEÑOR» o lenguaje de sustitución innecesario; el verso no contiene el Tetragrámaton.
  - «dolores de parto» mantiene la imaginería corporal explícita del griego.
  - La nota al pie marca la tensión textual entre el hebreo comprimido y la clarificación griega sin resolverla por completo en silencio.
