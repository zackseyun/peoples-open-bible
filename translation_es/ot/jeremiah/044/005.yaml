    rationale: «no [a]hacer» es un anclaje incorrecto y antinatural; el marcador debe ir unido a la frase relevante sin romper la sintaxis, por ejemplo después de «ofrendas[a]» o «hacer ofrendas[a]».
  - severity: medium
    issue: La nota no preserva suficientemente la alternativa léxica completa
    rationale: 'La nota dice solo «quemar incienso», pero la alternativa auditada incluye también el complemento y el valor verbal relevante en contexto: «no quemar incienso a otros dioses» o equivalente.'
  - severity: low
    issue: «Dioses ajenos» es menos directo que «otros dioses»
    rationale: Aunque es aceptable en registro bíblico, «otros dioses» refleja de manera más transparente el hebreo אֲחֵרִים y coincide mejor con el expediente inglés.
  revised_spanish_text: Pero no escucharon ni inclinaron su oído para volverse de su maldad, a fin de no hacer ofrendas[a] a otros dioses.
