translation:
  language: es
  text: entonces tus graneros se llenarán de abundancia, y tus lagares[a] rebosarán de vino nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estallarán con vino nuevo». El verbo hebreo literalmente sugiere romper o estallar hacia afuera, subrayando la abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלְאוּ
  english_pob_choice: will be filled
  chosen_spanish: serán llenados
  alternatives_spanish:
  - estarán llenos
  - serán colmados
  lexicon: HALOT
  rationale: 'El nifal imperfecto expresa resultado futuro/pasivo: los graneros llegan a ser llenados. «Serán llenados» conserva la fuerza verbal y suena natural en español.'
- source_word: אֲסָמֶיךָ
  english_pob_choice: your barns
  chosen_spanish: tus graneros
  alternatives_spanish:
  - tus almacenes
  - tus trojes
  lexicon: HALOT
  rationale: אֲסָם designa un lugar de almacenaje para grano o provisiones. «Graneros» comunica bien la imagen agrícola y es más transparente para el lector moderno que «almacenes».
- source_word: שָׂבָע
  english_pob_choice: with abundance
  chosen_spanish: de abundancia
  alternatives_spanish:
  - con abundancia
  - de sobra
  - de plenitud
  lexicon: HALOT
  rationale: El sustantivo expresa abundancia/saciedad. En español, «llenados de abundancia» reproduce la idea de provisión plena sin forzar una expresión como «llenados de saciedad».
- source_word: תִירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino fresco
  - mosto
  lexicon: HALOT
  rationale: תִירוֹשׁ suele referirse a vino nuevo o reciente, distinto del vino en general. «Vino nuevo» preserva esa distinción léxica y la imagen agrícola.
- source_word: יְקָבֶיךָ
  english_pob_choice: your vats
  chosen_spanish: tus lagares
  alternatives_spanish:
  - tus tinajas
  - tus cubas
  lexicon: HALOT
  rationale: יְקָב se asocia al lagar o depósito donde se recoge el producto de la prensa. «Lagares» mantiene el paralelismo agrícola y sugiere el lugar vinculado con la elaboración del vino.
- source_word: יִפְרֹצוּ
  english_pob_choice: will burst
  chosen_spanish: rebosarán
  alternatives_spanish:
  - estallarán
  - reventarán
  - desbordarán
  lexicon: HALOT
  rationale: Aunque el verbo literalmente transmite la idea de romperse o estallar, en contexto comunica abundancia que sale por encima del límite. «Rebosarán» preserva esa imagen de sobreabundancia en español sin sugerir destrucción.
theological_decisions:
- issue: Imagen de prosperidad concreta
  english_pob_reading: Render the verse as concrete agricultural abundance without softening it into a purely metaphorical blessing.
  chosen_spanish_reading: Mantener la imagen concreta de abundancia agrícola, sin convertirla en una generalidad espiritual ni suavizar su fuerza material.
  alternative_spanish_readings:
  - Convertirlo en una bendición general sin imágenes concretas
  - Espiritualizar la abundancia para evitar el lenguaje material
  rationale: El hebreo presenta graneros, lagares y vino nuevo como imágenes tangibles de provisión. La traducción española debe conservar ese cuadro sin resolver de antemano su alcance teológico ni su función sapiencial.
  doctrine_reference: Preservar la tensión teológica del texto sin interpretarla de manera reductiva.
translation_notes:
  revision_awareness: La revisión inglesa cambió «plenty» por «abundance» para un registro más formal y una correspondencia más precisa con la idea de plenitud/suficiencia; la redacción española sigue esa preferencia con «abundancia» y conserva el resto de la imagen agrícola concreta.
  spanish_consistency_notes:
  - Se mantuvo «vino nuevo» para תִירוֹשׁ, en línea con la distinción léxica del audit trail.
  - Se prefirió «lagares» para יְקָבֶיךָ porque en español bíblico conserva el campo semántico de prensa/deposito vinícola.
  - «Rebosarán» funciona como equivalente idiomático de יִפְרֹצוּ, preservando la abundancia sin perder la imagen de salida violenta o expansiva.
