translation:
  language: es
  text: Pero actué por causa de mi nombre[a], para que no fuera profanado[b] a los ojos de las naciones entre las cuales ellos estaban, ante cuyos ojos me di a conocer al sacarlos de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por amor de mi nombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «deshonrado» o «mancillado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַשׂ
  english_pob_choice: But I acted
  chosen_spanish: Pero actué
  alternatives_spanish:
  - Pero hice
  - Y actué
  lexicon: HALOT
  rationale: עשה es un verbo amplio (‘hacer’, ‘actuar’). En este contexto expresa la intervención decisiva de Yahvé, y en español ‘actué’ transmite mejor esa acción intencional que un simple ‘hice’. El conector adversativo ‘Pero’ conserva el contraste con el contexto previo.
- source_word: לְמַעַן שְׁמִי
  english_pob_choice: for the sake of my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por amor de mi nombre
  - por el bien de mi nombre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se refiere al honor y la reputación vinculados al nombre de Dios. ‘Por causa de mi nombre’ suena natural en español bíblico actual y mantiene la fuerza teológica sin sustituirla por una explicación más libre.
- source_word: לְבִלְתִּי הֵחֵל
  english_pob_choice: so that it should not be profaned
  chosen_spanish: para que no fuera profanado
  alternatives_spanish:
  - para que no fuera deshonrado
  - para que no fuera mancillado
  lexicon: HALOT
  rationale: 'חלל en este contexto tiene un sentido cultual y pactal: tratar lo santo como común o rebajarlo. ‘Profanado’ preserva mejor esa carga religiosa que ‘deshonrado’ o ‘mancillado’.'
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: in the sight of the nations
  chosen_spanish: a los ojos de las naciones
  alternatives_spanish:
  - en presencia de las naciones
  - ante las naciones
  lexicon: HALOT
  rationale: La imagen hebrea es visual y pública. ‘A los ojos de’ reproduce bien esa visibilidad, y en español mantiene el paralelismo con la frase posterior ‘ante cuyos ojos’.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto bíblico, ‘las naciones’ es la forma más natural y precisa para los pueblos no israelitas, sin introducir una etiqueta eclesiástica posterior como ‘gentiles’.
- source_word: אֲשֶׁר הֵמָּה בְתוֹכָם
  english_pob_choice: among whom they were
  chosen_spanish: entre las cuales ellos estaban
  alternatives_spanish:
  - en medio de las cuales ellos estaban
  - entre quienes vivían
  lexicon: HALOT
  rationale: La frase sitúa a Israel en medio de esas naciones. ‘Entre las cuales ellos estaban’ conserva el referente plural y la idea de presencia en medio de ellas sin añadir información no explicitada.
- source_word: אֲשֶׁר נוֹדַעְתִּי אֲלֵיהֶם
  english_pob_choice: before whose eyes I had made myself known to them
  chosen_spanish: ante cuyos ojos me di a conocer a ellos
  alternatives_spanish:
  - a quienes me hice conocido
  - a quienes me revelé
  lexicon: HALOT
  rationale: El nifal de ידע puede expresar ‘llegar a ser conocido’ o, en este contexto, el acto de darse a conocer. ‘Me di a conocer’ preserva la idea de auto-revelación sin sobrecargar el texto con una explicación interpretativa.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before whose eyes
  chosen_spanish: ante cuyos ojos
  alternatives_spanish:
  - a sus ojos
  - en su presencia
  lexicon: HALOT
  rationale: Repite el motivo de visibilidad pública. ‘Ante cuyos ojos’ mantiene el paralelismo con la primera cláusula y refleja bien la estructura hebrea.
- source_word: לְהוֹצִיאָם
  english_pob_choice: by bringing them out
  chosen_spanish: al sacarlos
  alternatives_spanish:
  - por sacarlos
  - cuando los saqué
  lexicon: HALOT
  rationale: El infinitivo de propósito/medio explica cómo Dios se dio a conocer. ‘Al sacarlos’ es una solución compacta y fiel al valor instrumental o circunstancial del hebreo.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: ‘Tierra de Egipto’ conserva el giro bíblico habitual. En combinación con ‘al sacarlos’, el español no necesita repetir ‘fuera de’ para expresar correctamente el movimiento de salida.
theological_decisions:
- issue: Motivación divina 'por causa de mi nombre'
  english_pob_reading: God acted for the public honor of his name among the nations, not for arbitrary self-interest.
  chosen_spanish_reading: Dios actuó movido por el honor público de su nombre entre las naciones, no por interés arbitrario.
  alternative_spanish_readings:
  - Dios actuó para cuidar su reputación
  - Dios actuó por el prestigio de su nombre
  rationale: En Ezequiel, ‘nombre’ designa el carácter revelado y el honor pactal de Yahvé. La traducción preserva esa densidad teológica sin reducirla a una mera reputación humana.
  doctrine_reference: Santificación del nombre de Dios; honor del nombre divino en Ezequiel 20:9
- issue: Sentido de חלל aplicado al nombre de Dios
  english_pob_reading: Rendered as 'profaned' to preserve the covenantal-sacral sense of dishonoring God's holy name before the nations.
  chosen_spanish_reading: ‘Profanado’ conserva el sentido sagrado y pactal de tratar como común o rebajar lo santo delante de las naciones.
  alternative_spanish_readings:
  - deshonrado
  - mancillado
  - contaminado
  rationale: El contexto es cultual y público. ‘Profanado’ es la mejor opción para mantener la idea de santidad vulnerada ante los pueblos, sin diluirla en un sentido meramente moral o social.
  doctrine_reference: Santidad del nombre de Yahvé; profanación del nombre en la literatura profética
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés, especialmente la reordenación de la cláusula relativa para reflejar con más claridad la estructura hebrea: ‘ante cuyos ojos me di a conocer a ellos’. Se mantuvo además el paralelismo visual (‘a los ojos… / ante cuyos ojos…’) y la tensión lexical de חלל con ‘profanado’.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como forma estándar para el nombre divino cuando aparezca en el contexto inmediato, sin usar ‘SEÑOR’ como máscara editorial.
  - ‘Las naciones’ se usa para גוים en sentido no israelita, coherente con el registro bíblico general del libro de Ezequiel.
  - Se mantiene ‘profanado’ para חלל por consistencia con el peso cultual del término.
  - La formulación ‘me di a conocer’ mantiene la idea de auto-revelación sin convertirla en paráfrasis doctrinal.
