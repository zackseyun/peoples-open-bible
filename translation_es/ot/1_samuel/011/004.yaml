translation:
  language: es
  text: Cuando los mensajeros llegaron a Gabaa de Saúl y hablaron estas palabras a oídos del pueblo, todo el pueblo alzó sus voces[a] y lloraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «levantó la voz y lloró». El hebreo usa un modismo literal, «alzaron/levantaron su(s) voz/voces», para expresar clamor o llanto público.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los enviados
  - los emisarios
  lexicon: HALOT
  rationale: En este contexto son hombres enviados con un mensaje, no seres celestiales. «Mensajeros» conserva el sentido humano directo que el audit trail inglés ya justificó.
- source_word: גִּבְעַת שָׁאוּל
  english_pob_choice: Gibeah of Saul
  chosen_spanish: Gabaa de Saúl
  alternatives_spanish:
  - Gabaa de Saúl
  - Saúl Gabaa
  lexicon: HALOT
  rationale: La expresión identifica la localidad asociada con Saúl. En español, «Gabaa de Saúl» mantiene la estructura del hebreo y evita una paráfrasis como «la Gabaa de Saúl» o una reordenación menos fiel.
- source_word: וַיְדַבְּרוּ הַדְּבָרִים
  english_pob_choice: spoke these words
  chosen_spanish: hablaron estas palabras
  alternatives_spanish:
  - dijeron estas palabras
  - expusieron estas palabras
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hablaron las palabras». «Hablaron estas palabras» conserva la concreción del giro sin sonar forzado en español.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: al oído del pueblo
  alternatives_spanish:
  - en el oído del pueblo
  - a oídos del pueblo
  - en presencia del pueblo
  lexicon: HALOT
  rationale: El hebreo usa el modismo «en los oídos de». La POB inglesa eligió una equivalencia idiomática de audición pública; en español, «al oído del pueblo» retiene mejor la imagen semítica, mientras el contexto sigue indicando proclamación pública. Se evita «en el oído» por sonar poco natural.
- source_word: וַיִּשְׂאוּ ... אֶת קוֹלָם
  english_pob_choice: lifted up their voices
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - alzaron sus voces
  - levantaron su voz
  - levantaron la voz
  lexicon: HALOT
  rationale: El hebreo es un modismo de clamor o lamento. Aunque el inglés revisado reflejó el plural del sufijo, en español «todo el pueblo alzó su voz» expresa el acto colectivo de manera natural y mantiene la unidad del clamor. La singular colectiva es idiomática en español y no borra la pluralidad del sujeto.
- source_word: וַיִּבְכּוּ
  english_pob_choice: and wept
  chosen_spanish: y lloró
  alternatives_spanish:
  - y lloraron
  - y se echaron a llorar
  lexicon: HALOT
  rationale: El verbo hebreo describe llanto de dolor. «Lloró» funciona como verbo colectivo con «todo el pueblo»; «lloraron» también sería posible, pero la forma singular colectiva sigue el ritmo de la imagen y resulta natural en español.
theological_decisions:
- issue: Expresión colectiva del lamento del pueblo
  english_pob_reading: all the people lifted up their voices and wept
  chosen_spanish_reading: todo el pueblo alzó su voz y lloró
  alternative_spanish_readings:
  - todo el pueblo alzó sus voces y lloró
  - todo el pueblo levantó la voz y lloró
  rationale: No hay una cuestión doctrinal, pero sí una decisión de representación del colectivo. El hebreo combina sujeto colectivo y lenguaje idiomático de clamor; en español se puede conservar como singular colectivo sin perder el sentido. Se evita convertir el texto en una mera paráfrasis emocional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y toma como contexto de auditoría la revisión inglesa que precisó el plural posesivo en «their voices». En español se preserva el modismo hebreo con un singular colectivo natural («alzó su voz») y se mantiene el valor de lamento público de todo el pueblo. No se introduce material ajeno al versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - «Gabaa» se mantiene como forma toponímica tradicional y transparente para גִּבְעָה.
  - Se conserva «mensajeros» para מַלְאָכִים, evitando la lectura angélica.
  - «Pueblo» traduce הָעָם de modo colectivo y coherente con el sujeto plural/singular idiomático.
  - La puntuación y el orden siguen una sintaxis española natural sin perder el paralelismo de las cláusulas hebreas.
