translation:
  language: es
  text: 'Entonces soñó aún otro sueño y lo contó a sus hermanos[a], y dijo: «Miren, he soñado aún otro sueño: el sol, la luna y once estrellas se inclinaban ante mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postraban ante mí». El verbo hebreo puede denotar una reverencia profunda; aquí se trata de homenaje más que de adoración religiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹם עוֹד חֲלוֹם אַחֵר
  english_pob_choice: Then he dreamed another dream
  chosen_spanish: Entonces soñó todavía otro sueño
  alternatives_spanish:
  - Y soñó otro sueño
  - Entonces tuvo otro sueño
  - Entonces soñó aún otro sueño
  lexicon: HALOT
  rationale: La combinación עוֹד + אַחֵר intensifica la repetición. En español, «todavía otro» conserva mejor ese matiz que un simple «otro», y «soñó... sueño» refleja el paralelismo cognado del hebreo sin sonar forzado.
- source_word: וַיְסַפֵּר אֹתוֹ לְאֶחָיו
  english_pob_choice: and told it to his brothers
  chosen_spanish: y lo contó a sus hermanos
  alternatives_spanish:
  - y se lo contó a sus hermanos
  - y lo relató a sus hermanos
  lexicon: HALOT
  rationale: סִפֵּר puede significar contar o relatar. «Lo contó» es natural y fiel al tono narrativo; «a sus hermanos» conserva el destinatario plural masculino del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Mira
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: En discurso directo plural, «Miren» transmite bien la función deíctica y atencional de הִנֵּה en un español actual y reverente, sin arcaísmo.
- source_word: חָלַמְתִּי חֲלוֹם עוֹד
  english_pob_choice: I have dreamed another dream
  chosen_spanish: he soñado todavía otro sueño
  alternatives_spanish:
  - soñé todavía otro sueño
  - he tenido todavía otro sueño
  - he soñado otro sueño más
  lexicon: HALOT
  rationale: Se conserva el giro cognado «soñar un sueño» en forma naturalizada. El pretérito perfecto en discurso directo puede funcionar como presente resultativo en español y sigue de cerca el hebreo.
- source_word: הַשֶּׁמֶשׁ וְהַיָּרֵחַ וְאַחַד עָשָׂר כּוֹכָבִים
  english_pob_choice: the sun, the moon, and eleven stars
  chosen_spanish: el sol, la luna y once estrellas
  alternatives_spanish:
  - el sol, la luna y los once estrellas
  - el sol, la luna y once astros
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural. «Estrellas» mantiene el sentido ordinario del hebreo y el orden enumerativo del texto.
- source_word: מִשְׁתַּחֲוִים לִי
  english_pob_choice: were bowing down to me
  chosen_spanish: se inclinaban ante mí
  alternatives_spanish:
  - se postraban ante mí
  - se postraban delante de mí
  - me rendían homenaje
  lexicon: HALOT
  rationale: El verbo hebreo puede indicar profunda reverencia u homenaje corporal. En este contexto onírico y familiar, «se inclinaban ante mí» comunica la postura de sumisión sin introducir un matiz cultual que el contexto no exige.
theological_decisions:
- issue: Sentido de מִשְׁתַּחֲוִים en la visión de José
  english_pob_reading: non-cultic obeisance ('bowing down to me')
  chosen_spanish_reading: se inclinaban ante mí
  alternative_spanish_readings:
  - se postraban ante mí
  - me adoraban
  rationale: El contexto inmediato trata de la futura superioridad de José en el ámbito familiar y social, no de adoración divina. Mantener una expresión de homenaje/sumisión preserva la tensión narrativa sin cargar el texto con culto religioso que no aparece aquí.
  doctrine_reference: 'Translation philosophy: no importar afirmaciones doctrinales que el texto no hace; preservar la tensión teológica sin resolverla más allá del pasaje.'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura hebrea y coincide sustancialmente con el audit trail inglés. Se conserva la repetición intensiva «todavía otro sueño» y la escena final como homenaje no cultual. No se introdujeron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Miren» para el imperativo plural de הִנֵּה, coherente con un registro bíblico moderno en español.
  - «Hermanos» mantiene el referente masculino plural del hebreo y del contexto narrativo.
  - «Se inclinaban ante mí» evita traducir automáticamente por «adoraban», preservando la ambigüedad controlada del verbo hebreo.
  - La repetición de «sueño» refleja el hebreo cognado y la insistencia narrativa del pasaje.
