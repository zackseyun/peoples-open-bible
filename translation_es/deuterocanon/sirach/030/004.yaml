translation:
  language: es
  text: Su padre ha muerto, y es como si no hubiera muerto, porque ha dejado tras de sí[a] a uno parecido a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ha dejado tras de sí a uno parecido a él». En el contexto, esto probablemente se refiere a un descendiente sobreviviente, probablemente un hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτελεύτησεν
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - ha fallecido
  - ha muerto ya
  lexicon: LSJ
  rationale: El verbo griego expresa que alguien ha llegado a su fin; en este contexto se refiere claramente a la muerte. «Ha muerto» es natural en español, directo y fiel al evento completo sin suavizarlo con eufemismo.
- source_word: ὁ πατήρ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre
  lexicon: LSJ
  rationale: Con αὐτοῦ, el valor es posesivo. «Su padre» reproduce esa relación de pertenencia de modo idiomático en español.
- source_word: ὡς οὐκ ἀπέθανεν
  english_pob_choice: as though he had not died
  chosen_spanish: es como si no hubiera muerto
  alternatives_spanish:
  - como si no muriera
  - como si no hubiese muerto
  lexicon: LSJ
  rationale: 'ὡς introduce comparación, no negación literal. En español, el subjuntivo pluscuamperfecto expresa bien la referencia retrospectiva: la situación se contempla como si la muerte no hubiese ocurrido.'
- source_word: ὅμοιον
  english_pob_choice: one like himself
  chosen_spanish: a uno parecido a él
  alternatives_spanish:
  - a alguien parecido a él
  - a uno semejante a él
  lexicon: LSJ
  rationale: El adjetivo funciona sustantivado y no trae un sustantivo explícito. «A uno parecido a él» conserva esa sobriedad y deja abierta la referencia implícita al descendiente sin añadir «hijo» en el texto principal.
- source_word: κατέλιπεν
  english_pob_choice: has left behind
  chosen_spanish: ha dejado tras él
  alternatives_spanish:
  - ha dejado detrás de él
  - ha dejado después de él
  lexicon: LSJ
  rationale: El sentido es de dejar a alguien que sigue viviendo después de uno. «Ha dejado tras él» es natural en español y preserva la idea de supervivencia/posteridad.
- source_word: μετʼ αὐτόν
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - después de él
  - detrás de él
  lexicon: LSJ
  rationale: La expresión es temporal y secuencial. «Tras él» mantiene brevedad y fluidez, y en español comunica que ese descendiente queda viviendo después de la muerte del padre.
theological_decisions:
- issue: Si especificar en el texto principal que el referido es un hijo/descendiente
  english_pob_reading: one like himself; the note clarifies that the context likely refers to surviving offspring, likely a son
  chosen_spanish_reading: uno parecido a él, sin especificar el parentesco en el cuerpo del texto
  alternative_spanish_readings:
  - un hijo parecido a él
  - un descendiente parecido a él
  rationale: El griego de esta línea no nombra explícitamente al hijo; por eso el texto principal evita añadir un sustantivo no expresado. La nota puede aclarar la probabilidad contextual de descendencia sobreviviente sin convertir la inferencia en afirmación textual.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve documented lexical/theological tension.'
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del control cruzado y no introduce cambios sustanciales respecto al análisis auditado; conserva la ambigüedad del griego en ὅμοιον mientras hace el español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» no aplicables aquí; no se introducen términos doctrinalmente cargados ajenos al verso.
  - Se evita «siervo»/«esclavo» porque no hay δοῦλος en el pasaje.
  - Se preserva el valor comparativo de ὡς con «es como si», sin convertirlo en negación literal.
  - La nota al pie queda vinculada al tramo «ha muerto[a]» para reflejar la alternativa lexical y la observación contextual sobre la descendencia.
