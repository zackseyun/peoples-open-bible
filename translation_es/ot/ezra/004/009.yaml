base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/009.yaml
  text: Then Rehum the commander[a], Shimshai the scribe, and the rest of their associates—the judges, the officials, the Tarpelites, the Persians, the Erechites, the Babylonians, the men of Susa (that is[b], the Elamites)—
  footnotes:
  - marker: a
    text: Or 'the Dinaites'; the Aramaic term דִּינָיֵא may be read as an ethnic group name in traditional translations, but here it is rendered 'the judges' because the form also suits an administrative title and fits the surrounding official context.
    reason: alternative_reading
  - marker: b
    text: Or 'the Apharsathchites'; the Aramaic term אֲפַרְסַתְכָיֵא is difficult and has often been transliterated as a people-group name. Here it is rendered 'the lesser officials' as a plausible administrative designation.
    reason: alternative_reading
