review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego: φρουροῦσι τὴν πόλιν = «los que guardaban/vigilaban la ciudad»; ἔγραψε δοῦναι = «escribió que se les diera»; κλήρους καὶ ὀψώνια = provisiones asignadas y paga. Sin embargo, «les escribió que» introduce destinatarios no expresados y suena menos natural que una formulación impersonal administrativa. Además, «lotes» en español moderno tiende a sugerir parcelas o bultos y no refleja tan bien el sentido de «porciones/asignaciones» que el inglés auditado quiso preservar con “allotments”.'
  spanish_quality_summary: 'La frase es comprensible, pero puede pulirse para sonar más natural y preciso en español eclesial moderno: «escribió que se les dieran» evita un dativo añadido y mantiene el tenor administrativo; «porciones asignadas» comunica mejor κλήρους en este contexto que «lotes». «Paga» es aceptable y natural para ὀψώνια.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos en este versículo. La revisión propuesta mantiene fidelidad léxica: φρουροῦσι = «vigilaban», κλήρους = «porciones asignadas», ὀψώνια = «paga».'
  issues:
  - severity: medium
    issue: «les escribió que» añade un destinatario no explícito en el griego
    rationale: ἔγραψε significa simplemente «escribió»; aunque el sentido administrativo permite inferir destinatarios, el español puede conservar mejor la estructura fuente con «escribió que se les dieran».
  - severity: medium
    issue: «lotes» no expresa con suficiente claridad el valor distributivo de κλήρους
    rationale: En español actual, «lotes» suele entenderse como parcelas, paquetes o conjuntos; el contexto con ὀψώνια favorece «porciones asignadas» o similar, que coincide mejor con la decisión auditada «allotments».
  - severity: low
    issue: «guardaban la ciudad» es fiel pero «vigilaban la ciudad» suena algo más idiomático en contexto de guardia
    rationale: φρουροῦσι denota custodiar/guardar; «vigilaban» conserva mejor el matiz de guardia sin perder sentido.
  revised_spanish_text: Y a todos los que vigilaban la ciudad,[a] escribió que se les dieran porciones asignadas y paga.
