  lexicon: transliteración estándar del nombre propio
  rationale: Se mantiene la transliteración del nombre propio. "Mehida" coincide con la forma inglesa auditada y resulta legible en español sin suponer significado no documentado.
- source_word: חַרְשָֽׁא
  english_pob_choice: Harsha
  chosen_spanish: Harsha
  alternatives_spanish:
  - Jarsha
  lexicon: transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio como transliteración. "Harsha" reproduce la forma auditada en inglés y respeta el valor nominal del hebreo sin intentar traducirlo.
theological_decisions:
- issue: La fórmula genealógica בְּנֵי en una lista de repatriados puede leerse corporativamente, no solo biológicamente.
  english_pob_reading: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew list formula בְּנֵי often denotes a family or clan line, not only immediate sons.
  chosen_spanish_reading: '"los hijos de" con sentido de linaje o clan.'
  alternative_spanish_readings:
  - '"los descendientes de"'
  - '"los miembros de la casa de"'
  rationale: 'Se preserva la tensión lexical: la expresión literalmente dice "hijos", pero en este contexto representa líneas familiares/clánicas. La nota alternativa evita perder el matiz corporativo sin abandonar la forma del texto.'
  doctrine_reference: Ninguna; decisión lexical e histórica sobre listas genealógicas del retorno.
