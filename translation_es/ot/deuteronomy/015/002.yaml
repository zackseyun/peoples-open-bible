translation:
  language: es
  text: 'Y este es el asunto de la remisión[a]: todo acreedor remitirá lo que haya prestado a su prójimo. No apremiará a su prójimo ni a su hermano[b], porque ha sido proclamada una remisión a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cancelación» o «liberación» para «remisión» (hebreo shemittá), la anulación formal de las deudas en el año sabático.
    reason: lexical_alternative
  - marker: b
    text: «Hermano» aquí se refiere a un miembro de la comunidad del pacto; algunas traducciones lo vierten de manera más interpretativa como «israelita» o similar.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: matter
  chosen_spanish: disposición
  alternatives_spanish:
  - asunto
  - materia
  - mandato
  lexicon: HALOT
  rationale: En este contexto legal, דְּבַר introduce la norma o estipulación que sigue. «Disposición» comunica bien una regulación concreta sin sonar tan abstracto como «materia» y sin forzar un tono excesivamente técnico.
- source_word: הַשְּׁמִטָּה / שְׁמִטָּה
  english_pob_choice: release
  chosen_spanish: remisión
  alternatives_spanish:
  - liberación
  - cancelación
  - perdón
  lexicon: HALOT
  rationale: El sustantivo refiere la anulación o liberación de deudas en el año sabático. «Remisión» es un término español natural en registro legal-religioso y conserva la idea de dejar caer una obligación; además permite mantener la posible tensión semántica con «cancelación» sin imponerla en el texto principal.
- source_word: שָׁמוֹט
  english_pob_choice: shall release
  chosen_spanish: remitirá
  alternatives_spanish:
  - dejará caer
  - dejará ir
  - condonará
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la obligación. En español, «remitirá» reproduce el acto normativo con tono jurídico y evita la repetición mecánica. Mantiene la fuerza de mandato del hebreo.
- source_word: בַּעַל מַשֵּׁה יָדוֹ
  english_pob_choice: every creditor
  chosen_spanish: todo acreedor
  alternatives_spanish:
  - todo poseedor de un préstamo
  - todo titular de un crédito
  - todo dueño del préstamo de su mano
  lexicon: HALOT
  rationale: El modismo designa al que tiene una reclamación por préstamo. «Acreedor» es el equivalente jurídico natural en español y preserva la función legal del término, mientras que la imagen de «su mano» queda implícita en el contexto y no exige una traducción literal poco idiomática.
- source_word: מַשֵּׁה
  english_pob_choice: has lent
  chosen_spanish: ha prestado
  alternatives_spanish:
  - ha dado en préstamo
  - ha hecho un préstamo
  - ha loanado
  lexicon: HALOT
  rationale: El verbo y su contexto apuntan al acto de prestar en crédito. «Ha prestado» es la formulación española más clara y fiel, y evita una nominalización pesada.
- source_word: בְּרֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su semejante
  - a su compañero
  lexicon: HALOT
  rationale: רֵעַ en este marco social-covenantal suele equivaler a «prójimo». En español, esta palabra conserva el valor relacional amplio y bíblico mejor que «vecino», que podría sonar demasiado local o restringido.
- source_word: לֹא יִגֹּשׂ
  english_pob_choice: shall not press
  chosen_spanish: No apremiará
  alternatives_spanish:
  - No exigirá pago
  - No acosará
  - No presionará
  lexicon: HALOT
  rationale: El verbo expresa presión para cobrar o reclamar una deuda. «Apremiará» mantiene el sentido de insistencia coercitiva con buena naturalidad en español, sin concretar demasiado el mecanismo de cobro.
- source_word: רֵעֵהוּ
  english_pob_choice: neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su semejante
  - a su vecino
  lexicon: HALOT
  rationale: Se conserva la misma equivalencia que para רֵעַ en la primera mitad del versículo para sostener coherencia terminológica.
- source_word: אָחִיו
  english_pob_choice: brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su pariente
  - a su hermano de raza
  - a su correligionario
  lexicon: HALOT
  rationale: El hebreo es literalmente «hermano». Se mantiene el término en español por fidelidad lexical y porque el contexto covenantal puede inferirse sin neutralizarlo.
- source_word: כִּי קָרָא
  english_pob_choice: has been proclaimed
  chosen_spanish: ha sido proclamada
  alternatives_spanish:
  - se ha proclamado
  - se ha anunciado
  - ha sido declarada
  lexicon: HALOT
  rationale: El valor impersonal del hebreo se expresa bien con una pasiva en español. «Ha sido proclamada» conserva el tono público y solemne de un anuncio oficial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  - en honor de Yahvé
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Nombre divino. «Para Yahvé» conserva la relación marcada por la preposición y sugiere la dedicación o referencia cultual de la remisión.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Conforme al criterio del proyecto, se traslada al español con la forma «Yahvé» para preservar el Nombre propio del pacto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lexical force of שְׁמִטָּה in the sabbatical-year setting
  english_pob_reading: release
  chosen_spanish_reading: remisión
  alternative_spanish_readings:
  - cancelación
  - liberación
  - condonación
  rationale: La idea no es solo una liberación general, sino la suspensión formal de las reclamaciones de deuda en el año sabático. «Remisión» conserva esa fuerza jurídico-religiosa sin borrar la tensión entre deuda, cancelación y liberación que el hebreo permite.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (source-language tensions preserved)
- issue: Treatment of אָחִיו in a covenantal legal context
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - prójimo
  - pariente
  - fellow israelita
  rationale: El hebreo usa el sustantivo masculino literal. Se mantiene «hermano» en el texto principal para no diluir la forma del original; el alcance comunitario queda sugerido por el contexto del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso alto del audit trail inglés, con ajustes para español natural: se eligió «disposición» para דְּבַר y «apremiará» para יִגֹּשׂ por claridad estilística, manteniendo intactas la fuerza jurídica de la remisión, la relación fraterna/covenantal y el Nombre divino en la forma requerida por el proyecto. No se incorporaron cambios de revisión posteriores porque el registro fuente indica que no hubo revisiones aplicadas y el último pase fue estable.'
  spanish_consistency_notes:
  - 'Se conserva una terminología uniforme: «remisión» para שְׁמִטָּה, «prójimo» para רֵעַ y «hermano» para אָח.'
  - Se evita el reemplazo de «Yahvé» por un título genérico, en conformidad con la norma del proyecto.
  - La puntuación y el orden sintáctico buscan una lectura bíblica clara sin calcar la estructura hebrea de forma artificial.
