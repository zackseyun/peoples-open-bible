translation:
  language: es
  text: Porque, como confiaron en ídolos sin vida[a], después de jurar con maldad no esperan sufrir daño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin vida» traduce el valor de αἴγνιοι, que puede entenderse también como «vanos», «vacíos» o «sin valor». El griego subraya la insustancialidad o irrealidad de los ídolos.
    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: «no esperan ser agraviados» o «no esperan castigo». El verbo griego es amplio y, en contexto, apunta a no temer retribución por jurar mal.'
    reason: alternative_reading
lexical_decisions:
- source_word: αἴγνιοι
  english_pob_choice: lifeless
  chosen_spanish: sin vida
  alternatives_spanish:
  - vanos
  - vacíos
  - sin poder
  lexicon: LSJ
  rationale: El adjetivo describe a los ídolos como carentes de vida real; «sin vida» expresa de forma natural en español esa insustancialidad y conserva el contraste implícito con el Dios vivo. «Vanos» o «vacíos» son posibles, pero menos concretos.
- source_word: πεποιθότες
  english_pob_choice: they trusted
  chosen_spanish: confiaron
  alternatives_spanish:
  - han confiado
  - pusieron su confianza
  lexicon: BDAG
  rationale: El participio perfecto expresa una confianza asentada. «Confiaron» es breve y idiomático en español, y mantiene la idea de una confianza ya establecida.
- source_word: εἰδώλοις
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  lexicon: BDAG
  rationale: En el contexto sapiencial, el término alude a objetos cultuales tratados como divinidades. «Ídolos» es la equivalencia más clara y fiel para la polémica antiidolátrica.
- source_word: κακῶς
  english_pob_choice: wickedly
  chosen_spanish: con maldad
  alternatives_spanish:
  - malvadamente
  - malamente
  - falsamente
  lexicon: LSJ
  rationale: El adverbio califica moralmente el juramento. «Con maldad» conserva el peso ético sin sonar excesivamente arcaico; «falsamente» sería más estrecho que el griego.
- source_word: ὀμόσαντες
  english_pob_choice: after swearing wickedly
  chosen_spanish: después de jurar con maldad
  alternatives_spanish:
  - habiendo jurado con maldad
  - tras jurar malvadamente
  lexicon: BDAG
  rationale: Se mantiene el valor temporal del participio y se evita añadir un sustantivo inexistente en el griego. «Jurar con maldad» reproduce el adverbio de manera directa y comprensible.
- source_word: ἀδικηθῆναι
  english_pob_choice: to be harmed
  chosen_spanish: sufrir daño
  alternatives_spanish:
  - ser agraviados
  - ser perjudicados
  - ser dañados
  lexicon: BDAG
  rationale: El infinitivo pasivo es amplio y puede abarcar daño, agravio o castigo. «Sufrir daño» preserva esa amplitud en español sin cerrarlo a una sola interpretación.
- source_word: οὐ προσδέχονται
  english_pob_choice: they do not expect
  chosen_spanish: no esperan
  alternatives_spanish:
  - no aguardan
  - no anticipan
  lexicon: BDAG
  rationale: El verbo expresa expectativa. «No esperan» es la forma más natural y clara en español, manteniendo el sentido de seguridad ilusoria.
theological_decisions:
- issue: Alcance de ἀδικηθῆναι en el contexto de idolatría y juramento
  english_pob_reading: The verse means that because they trust in powerless idols, they expect no harm or punishment even after swearing wickedly.
  chosen_spanish_reading: El verso comunica que, por confiar en ídolos sin vida, creen quedar a salvo y no esperan sufrir daño tras jurar con maldad.
  alternative_spanish_readings:
  - no esperan ser perjudicados por los mismos ídolos
  - no esperan castigo por su perjurio porque los ídolos no tienen poder
  rationale: El griego admite un alcance amplio para ἀδικηθῆναι. En el argumento antiidolátrico del libro, el sentido general es la falsa seguridad de quienes juran mal y creen que no habrá consecuencias porque los ídolos invocados carecen de poder real. «Sufrir daño» conserva esa amplitud y evita restringir indebidamente el pasaje.
  doctrine_reference: Preservar la tensión lexical y contextual sin resolverla más allá de lo que el texto permite.
translation_notes:
  revision_awareness: 'Se siguió la última revisión del audit trail: κακῶς ὀμόσαντες se reflejó como una acción temporal («después de jurar con maldad») sin añadir un sustantivo como «oaths/jurados». Se mantuvo la amplitud de ἀδικηθῆναι con una formulación española igualmente amplia («sufrir daño»), coherente con la decisión inglesa de no cerrar el sentido a «wronged» o «punished».'
  spanish_consistency_notes:
  - Se usó «ídolos» en lugar de una paráfrasis como «imágenes» para conservar la polémica religiosa del término.
  - «Sin vida» evita una traducción demasiado libre y mantiene la tensión entre inutilidad y irrealidad del término griego.
  - «Con maldad» y «después de jurar» conservan el carácter moral y temporal del participio sin sobreexplicar.
  - La puntuación busca una lectura fluida en español moderno, pero sin suavizar la dureza del argumento.
