translation:
  language: es
  text: No te jactes de mañana[a], porque no sabes qué producirá un día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «qué dará a luz» o «qué producirá» un día.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַלֵּל
  english_pob_choice: boast
  chosen_spanish: jactes
  alternatives_spanish:
  - te gloríes
  - te alabes a ti mismo
  lexicon: HALOT
  rationale: El hitpael de הלל aquí es reflexivo y expresa autoexaltación. En español, «jactarse» comunica de forma natural la presunción o autosatisfacción que el proverbio prohíbe, sin perder la fuerza admonitiva.
- source_word: בְּיוֹם מָחָר
  english_pob_choice: about tomorrow
  chosen_spanish: del día de mañana
  alternatives_spanish:
  - sobre el mañana
  - acerca del mañana
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'en el día de mañana', pero el sentido es prospectivo y temático. «Del día de mañana» mantiene la referencia a ese futuro cercano en un español natural y bíblicamente legible.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» expresa con claridad la base del aviso en español contemporáneo.
- source_word: תֵדַע
  english_pob_choice: you do not know
  chosen_spanish: no sabes
  alternatives_spanish:
  - no conoces
  - no puedes saber
  lexicon: HALOT
  rationale: ידע expresa falta de conocimiento real, no una imposibilidad abstracta. «No sabes» reproduce con sobriedad la afirmación hebrea.
- source_word: מַה יֵּלֶד יוֹם
  english_pob_choice: what a day may bring
  chosen_spanish: qué producirá un día
  alternatives_spanish:
  - qué dará a luz un día
  - qué traerá un día
  lexicon: HALOT
  rationale: ילד literalmente significa 'dar a luz' o 'producir'. «Qué producirá un día» conserva el valor metafórico de lo que el día llega a generar, de manera clara y fiel; las alternativas más literales quedan implícitas como trasfondo semántico.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y su nota léxica. No se requirieron cambios respecto de la equivalencia óptima propuesta: el español conserva la advertencia sapiencial, la referencia al mañana y la metáfora productiva de יֵּלֶד en una formulación natural.'
  spanish_consistency_notes:
  - Se prefirió «jactes» para mantener el tono proverbial y evitar una calca como «te gloríes», menos natural en este contexto.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - La nota [a] se ancla en la frase sobre lo que un día producirá para preservar la imagen verbal del hebreo.
