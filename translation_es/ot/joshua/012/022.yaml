lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: En esta lista de reyes derrotados, el hebreo usa la fórmula nominal concisa para cada entrada. En español, «el rey de» conserva el valor catalográfico y la relación con la ciudad sin forzar una perífrasis innecesaria.
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Cadés
  alternatives_spanish:
  - Kedés
  - Kedesh
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se adapta a la forma española habitual «Cadés» para lectura eclesial, manteniendo la identificación toponímica del texto.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno cada uno
  lexicon: HALOT
  rationale: El hebreo repite al final de cada entrada el conteo «uno». Se conserva esa forma breve en español para reproducir el ritmo de enumeración y el valor de recuento.
- source_word: יָקְנֳעָם
  english_pob_choice: Jokneam
  chosen_spanish: Jocneam
  alternatives_spanish:
  - Jokneam
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al español con grafía naturalizada «Jocneam» sin cambiar la referencia geográfica.
- source_word: לַ/כַּרְמֶל
  english_pob_choice: by Carmel
  chosen_spanish: junto a Carmel
  alternatives_spanish:
  - en Carmel
  - de Carmel
  - cerca de Carmel
  lexicon: HALOT
  rationale: El prefijo לַ con el topónimo puede indicar ubicación o asociación regional. «Junto a Carmel» preserva esa ambigüedad sin decidir de más entre «en» y «de», y corresponde al valor observado en la nota inglesa.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en alto grado; no se reportan revisiones aplicadas y no fue necesario introducir cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el patrón enumerativo breve «el rey de …, uno» para reflejar la estructura del hebreo.
  - Se evita «SEÑOR» u otra terminología teológica no pertinente porque el versículo no contiene lenguaje divino.
  - La nota alternativa preserva la misma ambigüedad espacial/regional documentada en el inglés, adaptada a una formulación española natural.
