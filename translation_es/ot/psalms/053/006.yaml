  text: שָׁ֤ם פָּֽחֲדוּ פַחַד֮ לֹא הָ֪יָה֫ פָ֥חַד כִּֽי אֱלֹהִ֗ים פִּ֭זַּר עַצְמ֣וֹת חֹנָ֑/ךְ הֱ֝בִשֹׁ֗תָה כִּֽי אֱלֹהִ֥ים מְאָסָֽ/ם׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/053/006.yaml
  text: There they were in great fear[a], where there was no fear; for God scattered the bones of the one encamping against you. You put them to shame[c][b], for God rejected them.
  footnotes:
  - marker: a
    text: Or, more literally, 'they feared a fear.' The Hebrew uses a cognate verb-noun expression for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one camping around you' / 'your besieger.' The Hebrew participle from 'encamp' is contextually hostile here.
    reason: lexical_alternative
  - marker: c
    text: The verse shifts from speaking about God ('God scattered') to directly addressing him ('You put them to shame'), a poetic change preserved in the translation.
    reason: alternative_reading
