lexical_decisions:
- source_word: ἐλεεινή
  english_pob_choice: Pitiful indeed
  chosen_spanish: Lamentable, en verdad
  alternatives_spanish:
  - Compasiva, en verdad
  - Miserable, en verdad
  lexicon: LSJ
  rationale: El adjetivo expresa algo digno de lástima o lamentación. «Lamentable» conserva el juicio emocional y funciona de manera natural en español con una construcción exclamativa/predicativa.
- source_word: τοῦ πλήθους
  english_pob_choice: of the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - del pueblo
  - de la gente
  lexicon: LSJ
  rationale: πλῆθος puede significar multitud o gran número de personas. «Multitud» mantiene mejor el matiz colectivo y formal del pasaje.
- source_word: παμμιγῆ
  english_pob_choice: complete
  chosen_spanish: completa
  alternatives_spanish:
  - total
  - enteramente compartida
  - absoluta
  lexicon: LSJ
  rationale: El adjetivo intensifica la idea de totalidad. «Completa» comunica esa intensificación sin sobreinterpretar el matiz exacto de composición o universalidad.
- source_word: πρόπτωσιν
  english_pob_choice: prostration
  chosen_spanish: postración
  alternatives_spanish:
  - caída hacia adelante
  - prostración
  - derrumbe
  lexicon: LSJ
  rationale: πρόπτωσις puede sugerir caída hacia delante o postración. «Postración» preserva el valor físico de caída reverente o abatida, y en español suena natural y solemne.
- source_word: τοῦ μεγάλως ἀγωνιῶντος ἀρχιερέως
  english_pob_choice: of the high priest, who was in great agony
  chosen_spanish: del sumo sacerdote, que estaba en gran agonía
  alternatives_spanish:
  - del sumo sacerdote, que estaba profundamente angustiado
  - del sumo sacerdote, que sufría gran angustia
  lexicon: LSJ
  rationale: ἀγωνιάω denota angustia intensa o agonía. «Gran agonía» conserva la fuerza del participio y la intensidad del adverbio μεγάλως.
- source_word: προσδο-
  english_pob_choice: expectation
  chosen_spanish: expectativa
  alternatives_spanish:
  - espera ansiosa
  - expectación
  - aprehensión
  lexicon: LSJ
  rationale: La línea griega está truncada tras προσδο-, probablemente inicio de un sustantivo relacionado con esperanza/expectativa. «Expectativa» es la opción más conservadora en español y refleja la incertidumbre textual.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de “collapse” a “prostration” para reflejar mejor πρόπτωσιν. La presente redacción sigue esa revisión y mantiene la terminación en guion largo para respetar la línea griega truncada.
  spanish_consistency_notes:
  - Se mantuvo «sumo sacerdote» como equivalente funcional de ἀρχιερεύς.
  - Se eligió «multitud» en vez de «pueblo» para conservar el referente colectivo visible en el contexto.
  - Se evitó «Cristo», «SEÑOR» o fórmulas litúrgicas no presentes en el griego.
  - Se conservó el corte final con raya larga porque el texto fuente está truncado.
