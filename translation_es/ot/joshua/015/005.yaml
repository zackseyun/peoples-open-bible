base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/005.yaml
  text: And the eastern border was the Salt Sea[a], as far as the end of the Jordan. And the border on the north side was from the tongue of the sea[c][b], from the end of the Jordan.
