base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/013/001.yaml
  text: Therefore[a], since the seven brothers despised pains even unto death[c][b], it is acknowledged everywhere that godly reason is master of the passions.
  footnotes:
  - marker: a
    text: Or 'despised pains up to death' or 'thought lightly of sufferings unto death.'
    reason: lexical_alternative
  - marker: b
    text: '''Godly reason'' could also be rendered ''pious reason'' or ''devout reason''; the Greek expression is a key theme in 4 Maccabees for reason shaped by reverence toward God.'
    reason: lexical_alternative
  - marker: c
    text: '''Passions'' refers to disordered drives or impulses in the book''s moral-philosophical argument, not merely feelings in general.'
    reason: cultural_note
