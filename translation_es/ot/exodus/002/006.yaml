translation:
  language: es
  text: 'La abrió y lo vio[a], al niño, y he aquí[b], un niño estaba llorando. Tuvo compasión[c] de él y dijo: «Este es uno de los hijos de los hebreos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La abrió y lo vio». El hebreo usa un sufijo masculino singular antes de identificarlo explícitamente como «el niño».'
    reason: lexical_alternative
  - marker: b
    text: «He aquí» traduce una partícula hebrea que dirige vívidamente la atención a lo que ella vio.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Se apiadó de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְתַּח
  english_pob_choice: She opened it
  chosen_spanish: La abrió
  alternatives_spanish:
  - La abrió ella
  - Abrió la cesta
  lexicon: HALOT
  rationale: El verbo significa simplemente ‘abrir’. En español se puede recuperar el objeto por contexto sin añadirlo explícitamente; ‘la’ hace natural la referencia a la canastilla/arca mencionada antes.
- source_word: וַתִּרְאֵהוּ
  english_pob_choice: saw him
  chosen_spanish: lo vio[a]
  alternatives_spanish:
  - lo vio
  - la vio
  lexicon: HALOT
  rationale: El sufijo masculino singular requiere un objeto pronominal en español. Se mantiene la referencia pronominal, y la nota explica que luego se identifica explícitamente como el niño.
- source_word: הַיֶּלֶד
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al hijo
  - al muchacho
  lexicon: HALOT
  rationale: יֶלֶד es un término general para niño/niña, pero aquí el referente ya se aclara como masculino. ‘Niño’ conserva amplitud y naturalidad sin anticipar demasiado la matiz de edad de נַעַר.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: La partícula introduce una escena llamativa. ‘Y he aquí’ conserva el golpe de atención del hebreo y su tono narrativo.
- source_word: נַעַר
  english_pob_choice: a boy
  chosen_spanish: un muchacho[b]
  alternatives_spanish:
  - un niño
  - un joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde niño hasta joven. ‘Muchacho’ en español da una impresión masculina y vivaz, y la nota preserva la ambigüedad de edad frente a ‘niño’ o ‘joven’.
- source_word: בֹּכֶה
  english_pob_choice: was crying
  chosen_spanish: estaba llorando
  alternatives_spanish:
  - lloraba
  - estaba sollozando
  lexicon: HALOT
  rationale: El participio expresa acción en curso. ‘Estaba llorando’ transmite bien el aspecto progresivo en español.
- source_word: וַתַּחְמֹל עָלָיו
  english_pob_choice: She had compassion on him
  chosen_spanish: Tuvo compasión[c] de él
  alternatives_spanish:
  - Sintió compasión por él
  - Se apiadó de él
  lexicon: HALOT
  rationale: חמל con עַל expresa compasión/piedad. ‘Tuvo compasión de él’ es idiomático y suficientemente cercano; la nota recuerda que también puede entenderse como ‘se apiadó’.
- source_word: מִיַּלְדֵי הָעִבְרִים
  english_pob_choice: one of the Hebrews’ children
  chosen_spanish: uno de los niños de los hebreos
  alternatives_spanish:
  - uno de los hijos de los hebreos
  - uno de los niños hebreos
  lexicon: HALOT
  rationale: La construcción con מן es partitiva (‘de entre / de’). ‘Uno de los niños de los hebreos’ conserva el sentido de pertenencia étnica y el valor partitivo de manera natural en español.
- source_word: הָעִבְרִים
  english_pob_choice: the Hebrews
  chosen_spanish: los hebreos
  alternatives_spanish:
  - el pueblo hebreo
  - los israelitas
  lexicon: HALOT
  rationale: עִבְרִים es la designación étnica ‘hebreos’. Se mantiene el término habitual y transparente en español.
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Éste es
  - Este
  lexicon: HALOT
  rationale: El demostrativo apunta directamente al niño frente a ella. ‘Este es’ es la forma más natural y fiel en discurso directo.
theological_decisions:
- issue: Compasión vs. piedad como matiz de חמל
  english_pob_reading: She had compassion on him
  chosen_spanish_reading: Tuvo compasión de él
  alternative_spanish_readings:
  - Se apiadó de él
  - Sintió compasión por él
  rationale: El hebreo describe una reacción interna de misericordia/piedad. ‘Tuvo compasión’ conserva el tono afectivo sin añadir una acción posterior que el versículo no afirma.
  doctrine_reference: Compasión divina y humana; cf. lenguaje bíblico de misericordia sin sobre-interpretación narrativa.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para recuperar el objeto pronominal (‘saw him’) y mantener la aposición (‘the child’). En español se refleja esa misma estructura con el pronombre objeto y la aclaración nominal, sin perder la fluidez narrativa.
  spanish_consistency_notes:
  - Se mantiene «hebreos» para הָעִבְרִים según el estándar del proyecto.
  - Se conserva «y he aquí» para וְהִנֵּה como partícula de énfasis narrativa.
  - No se introduce ‘Mesías’, ‘SEÑOR’ ni otra terminología no presente en el versículo.
