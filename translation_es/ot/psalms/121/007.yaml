translation:
  language: es
  text: Yahvé te guardará de todo mal; él guardará tu alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu vida' o 'tu ser'. El hebreo néfesh puede significar 'vida', 'ser/persona' o 'alma', según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: BDAG / HALOT (divine name convention in POB)
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre del pacto en español sin ocultarlo bajo un título genérico.
- source_word: יִשְׁמָרְךָ
  english_pob_choice: will keep you
  chosen_spanish: te guardará
  alternatives_spanish:
  - te mantendrá
  - te cuidará
  - te preservará
  lexicon: HALOT
  rationale: שׁמר admite la idea de guardar/proteger/vigilar. 'Guardará' conserva el matiz de protección continua y suena natural en español bíblico contemporáneo.
- source_word: מִכָּל רָע
  english_pob_choice: from all evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo maldad
  - de todo daño
  - de toda desgracia
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar mal moral o calamidad/daño. 'Mal' mantiene esa amplitud sin reducirla solo a peligro físico.
- source_word: יִשְׁמֹר
  english_pob_choice: he will keep
  chosen_spanish: guardará
  alternatives_spanish:
  - protegerá
  - mantendrá
  - preservará
  lexicon: HALOT
  rationale: Se conserva la repetición de שׁמר con el mismo verbo en español para reflejar el paralelismo y el énfasis del verso.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  - tu persona
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede significar vida, yo mismo, o alma, el texto auditado en inglés decidió 'soul' tras una revisión. En español, 'alma' reproduce de modo directo esa elección y mantiene el registro formal, sin cerrar por completo la amplitud antropológica del término.
theological_decisions:
- issue: Nombre divino en el versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente יהוה; la traducción española conserva el nombre propio del Dios del pacto conforme a la política del proyecto, en vez de sustituirlo por un título encubridor.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Sentido de נַפְשֶׁךָ
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - tu ser
  - tu persona
  rationale: La tradición auditada del proyecto terminó prefiriendo 'soul' en inglés. En español se mantiene 'alma' para reflejar esa decisión, reconociendo que el hebreo puede abarcar más que una dicotomía cuerpo/alma y no forzando una lectura más estrecha de la requerida.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto inglés muestra una evolución editorial de 'life' a 'soul' para נַפְשֶׁךָ, con acuerdo alto en revisión. Esta versión española refleja la lectura más reciente auditada ('soul' → 'alma') y conserva la repetición de שׁמר con el mismo verbo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יהוה en el texto principal.
  - Se conserva el mismo verbo ('guardará') para ambas ocurrencias de שׁמר.
  - '''Mal'' se usa con amplitud semántica, sin restringirlo a daño físico.'
  - No se añaden notas al pie porque la línea principal ya integra la decisión lexical auditada de manera clara.
