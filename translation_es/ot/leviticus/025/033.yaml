  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del sentido jurídico del hebreo ni del POB inglés: ''será liberada'' → ''quedará liberada''. También se pulió la nota [a] para español más limpio. No se requiere adjudicación adicional.'
