translation:
  language: es
  text: y para quitarles de encima el yugo, porque vieron que el reino de los griegos estaba reduciendo[a] a Israel a esclavitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente algo como «estaba esclavizando a Israel a esclavitud», con un verbo de esclavizar seguido de un complemento cognado para dar énfasis. En español se expresa de manera más natural como «estaba reduciendo a Israel a esclavitud», sin perder la fuerza del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἆραι
  english_pob_choice: to remove
  chosen_spanish: quitar
  alternatives_spanish:
  - levantar
  - sacudir
  - quitarse de encima
  lexicon: LSJ
  rationale: Infinitivo aoristo de αἴρω. En el contexto de un yugo, «quitar» es el equivalente más natural en español moderno para la acción de remover una carga opresiva. «Levantar» pondría énfasis en el movimiento físico ascendente más que en la acción liberadora. El artículo τό que precede al infinitivo en griego marca una cláusula sustantivada de propósito, que en español se vierte naturalmente con «para + infinitivo».
- source_word: ζυγόν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  - opresión
  lexicon: LSJ
  rationale: ζυγός significa literalmente «yugo» y funciona metafóricamente como símbolo de dominación opresiva. «Yugo» es el equivalente formal directo en español y la metáfora es igualmente clara e inteligible para el lector hispano. Suavizarlo a «carga» u «opresión» borraría la imagen concreta del original.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio
  - el poder
  - el imperio
  lexicon: LSJ
  rationale: βασιλεία puede denotar reinado o reino. Aquí designa la autoridad política de los griegos como potencia gobernante. «El reino» es el equivalente formal más directo y evita una interpretación excesiva hacia «el imperio», que implicaría categorías históricas distintas.
- source_word: καταδουλουμένους
  english_pob_choice: was enslaving
  chosen_spanish: estaba esclavizando
  alternatives_spanish:
  - esclavizaba
  - sometía a esclavitud
  - subyugaba
  lexicon: LSJ
  rationale: El verbo καταδουλόω intensifica δουλόω y significa someter completamente a esclavitud. El participio de presente indica aspecto imperfectivo/progresivo. «Estaba esclavizando» preserva ese aspecto en curso. «Esclavizaba» (imperfecto simple) también sería aceptable. Se rechaza «subyugaba» porque diluye la fuerza del lenguaje de servidumbre que el proyecto documenta como teológicamente significativa.
- source_word: δουλίαν
  english_pob_choice: to slavery (eliminado en la revisión inglesa)
  chosen_spanish: en esclavitud
  alternatives_spanish:
  - a esclavitud
  - en servidumbre
  - (omitido, siguiendo la revisión inglesa)
  lexicon: LSJ
  rationale: 'El acusativo δουλίαν funciona como acusativo cognado del verbo καταδουλουμένους, creando un énfasis deliberado mediante la repetición: «esclavizando a Israel en esclavitud». La decisión teológica del POB prescribe preservar este doble énfasis de esclavitud. Esta traducción española lo retiene mediante «en esclavitud» en lugar de seguir la revisión inglesa que lo omitió por considerarlo redundante en ese idioma.'
- source_word: Ἑλλήνων
  english_pob_choice: the Greeks
  chosen_spanish: los griegos
  alternatives_spanish:
  - el poder griego
  - el reino griego
  lexicon: LSJ
  rationale: Genitivo plural de Ἕλλην. La frase es literalmente «el reino de los griegos»; mantener «los griegos» evita una interpretación excesiva y conserva la designación étnico-política del original, igual que la decisión inglesa del POB.
theological_decisions:
- issue: 'El doble lenguaje de esclavitud: acusativo cognado καταδουλουμένους + δουλίαν'
  english_pob_reading: was enslaving Israel (revisado desde 'was enslaving Israel to slavery')
  chosen_spanish_reading: estaba esclavizando a Israel en esclavitud
  alternative_spanish_readings:
  - estaba esclavizando a Israel
  - reducía a Israel a esclavitud
  rationale: 'El griego utiliza deliberadamente el participio καταδουλουμένους junto con el acusativo cognado δουλίαν para crear un énfasis retórico: la servidumbre es total y no meramente metafórica. La decisión teológica del POB en inglés prescribe explícitamente «retener la doble imagen de esclavitud». Aunque la revisión inglesa (gpt-5.4) suprimió «to slavery» argumentando que el énfasis queda implícito en inglés por «was enslaving», esta traducción española diverge conscientemente de esa decisión y restaura «en esclavitud», pues: (1) la decisión teológica del proyecto lo fundamenta expresamente; (2) el español admite el giro cognado sin mayor torpeza gramatical; y (3) el principio de primacía del texto original prevalece sobre la adaptación estilística de la revisión inglesa.'
  doctrine_reference: 'DOCTRINE.md: δοῦλος / slavery-language principle under original-language primacy and contested terms'
translation_notes:
  revision_awareness: La revisión inglesa (gpt-5.4, 2026-04-23) eliminó la frase «to slavery» del texto inglés, argumentando que el énfasis del acusativo cognado griego queda suficientemente expresado por «was enslaving Israel» en inglés. Esta traducción española diverge conscientemente de esa decisión y restaura «en esclavitud» para preservar el doble énfasis de καταδουλουμένους + δουλίαν, en consonancia con la decisión teológica documentada del proyecto, que prescribe retener el lenguaje de esclavitud donde el original lo enfatiza deliberadamente. La divergencia se documenta en la decisión teológica y en la nota b.
  spanish_consistency_notes:
  - Este versículo no contiene referencias a YHWH, Χριστός ni πνεῦμα; los valores terminológicos por defecto del proyecto no son aplicables aquí.
  - «Israel» se mantiene sin traducir como nombre propio transliterado, igual que en el texto griego (τὸν Ἰσραήλ).
  - El término «yugo» (ζυγός) se renderiza con su equivalente metafórico directo en español sin suavizarlo a «opresión» o «carga», preservando la imagen concreta del original.
  - 'La filosofía de traducción es optimal-equivalence, siguiendo el POB inglés: se conservan metáforas e imágenes del original cuando el español las puede sostener con naturalidad.'
