  rationale: Se ajusta νύσσω a «pincha» por mayor naturalidad y precisión en español, se cambia «sentimiento» por «sensibilidad» para reflejar mejor αἴσθησις en este contexto, y se pule la nota [a] para un español más idiomático sin perder la explicación léxica.
