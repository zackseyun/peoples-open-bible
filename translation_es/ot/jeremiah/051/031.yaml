  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mensajero», «rey de Babilonia» y «su ciudad» están bien. «Ha sido capturada» es aceptable, aunque la nota debe distinguir mejor entre «capturada/tomada» y «desde un extremo/de extremo a extremo».
