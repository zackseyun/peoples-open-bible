translation:
  language: es
  text: y Hazor-Hadatá[a], y Queriot-Hezrón (esto es, Hazor)[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Hazor, Hadatá y Queriot-Hezrón; esto es, Hazor», si חֲדַתָּה se toma como un nombre de ciudad separado y no como parte del compuesto «Hazor-Hadatá».'
    reason: alternative_reading
  - marker: b
    text: «Queriot» también puede transliterarse como «Kiriot».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/חָצוֹר
  english_pob_choice: and Hazor
  chosen_spanish: y Hazor
  alternatives_spanish:
  - y Hatzor
  - y Jasor
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se conserva como transliteración estable. Se mantiene la conjunción inicial del hebreo.
- source_word: חֲדַתָּה
  english_pob_choice: -hadattah
  chosen_spanish: -Hadatá
  alternatives_spanish:
  - Datá
  - Nueva
  lexicon: HALOT
  rationale: La audición inglesa lo trata como parte del topónimo compuesto; en español conviene mantener el valor onomástico con transliteración aproximada. No se traduce como 'nueva' porque la POB inglesa documenta la lectura compuesta como preferente, aunque deja abierta la alternativa.
- source_word: וּ/קְרִיּוֹת
  english_pob_choice: and Kerioth
  chosen_spanish: y Queriot
  alternatives_spanish:
  - y Keriot
  - y Quiriot
  lexicon: HALOT
  rationale: Se conserva como nombre propio de lugar. 'Queriot' refleja una transliteración natural en español para קריות; no se traduce como 'ciudades' porque el contexto de lista toponímica favorece el topónimo.
- source_word: חֶצְרוֹן
  english_pob_choice: -hezron
  chosen_spanish: -Hesrón
  alternatives_spanish:
  - -Jezrón
  - -Hesron
  lexicon: HALOT
  rationale: Se mantiene como parte de un nombre compuesto. La forma 'Hesrón' es la transliteración más transparente y publicable en español para חֶצְרוֹן.
- source_word: הִיא
  english_pob_choice: that is
  chosen_spanish: esto es
  alternatives_spanish:
  - es decir
  - o sea
  lexicon: HALOT
  rationale: La partícula introduce una identificación explicativa. 'Esto es' preserva la función appositiva sin sobreactuar el pronombre literal.
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jasor
  lexicon: HALOT
  rationale: Se mantiene la misma transliteración del topónimo final, identificando el nombre que la cláusula explicativa glosa.
translation_notes:
  revision_awareness: Se siguió el trazado de la POB inglesa, que conserva la lectura compuesta 'Hazor-hadattah' y la identificación appositiva 'that is, Hazor', mientras deja abierta la alternativa de tratar חֲדַתָּה como un topónimo separado. No hubo revisiones posteriores que alteraran esa decisión.
  spanish_consistency_notes:
  - Se evitó traducir los nombres propios como sustantivos comunes para no borrar la tensión textual documentada.
  - Se usó puntuación española y se mantuvo el guion en los topónimos compuestos por consistencia editorial.
  - Se prefirió 'Queriot' sobre 'Keriot' por adaptación ortográfica natural al español, sin alterar la referencia al mismo lugar.
