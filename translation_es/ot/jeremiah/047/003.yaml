revisions:
- from: Al sonido del golpear de los cascos de sus caballos poderosos[a], al retumbar de sus carros, al estruendo de sus ruedas, los padres no vuelven hacia sus hijos a causa de la debilidad de sus manos.
  to: Al sonido del golpear de los cascos de sus caballos poderosos[a], al retumbar de sus carros, al estruendo de sus ruedas, los padres no se vuelven hacia sus hijos a causa del desvalimiento de sus manos.
  rationale: Se ajustó «no vuelven» a «no se vuelven» para un español más natural y fiel al sentido direccional del hebreo. Se cambió «debilidad» por «desvalimiento» para reflejar mejor el valor idiomático de מֵרִפְיוֹן יָדָיִם, en línea con la decisión lexical documentada en el POB inglés. Se mantuvo el resto porque representa bien la imaginería sonora y el paralelismo del verso.
  reviewer_model: gpt-5.4
