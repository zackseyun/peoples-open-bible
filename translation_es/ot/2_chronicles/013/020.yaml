revisions:
- from: Jeroboam ya no conservó su fuerza en los días de Abías[a], y Yahvé lo hirió, y murió.
  to: Jeroboam ya no mantuvo su poder en los días de Abías[a], y Yahvé lo hirió, y murió.
  rationale: Se revisa «conservó su fuerza» a «mantuvo su poder» para un español más natural y contextual sin perder la amplitud semántica de עָצַר כֹּחַ. Se simplifica la nota para mantener «hirió» como traducción principal y conservar alternativas que reflejan la indeterminación de נגף.
