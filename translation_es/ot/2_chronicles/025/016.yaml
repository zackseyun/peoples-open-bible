    rationale: La nota inglesa [a] documenta una alternativa para הַלְיוֹעֵץ / נְתַנּוּךָ (‘Have we appointed you as an adviser to the king?’), no para וַיְהִי (‘And it happened’). En español, el marcador debe ir junto a «¿Te hemos puesto…?» o no incluirse.
  - severity: medium
