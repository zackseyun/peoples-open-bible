translation:
  language: es
  text: Pero si el sacerdote la examina[a], y he aquí que no hay en ella pelo blanco, y no está más hundida que la piel, y está tenue, entonces el sacerdote lo aislará[b] por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la observa / la inspecciona». El hebreo usa un verbo de ver en un contexto técnico de diagnóstico sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «lo pondrá en cuarentena por siete días». El verbo hebreo expresa confinamiento temporal para observación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En este contexto condicional, la partícula introduce un caso nuevo en continuidad y contraste con el anterior; «Pero si» conserva ese matiz adversativo de forma natural en español.
- source_word: יִרְאֶנָּה
  english_pob_choice: examines it
  chosen_spanish: la examina
  alternatives_spanish:
  - la ve
  - la mira
  lexicon: HALOT
  rationale: En el contexto sacerdotal de Levítico 13, el verbo implica una inspección diagnóstica; «la examina» reproduce mejor esa función que un simple «la ve».
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: Es el término directo y tradicional para el funcionario que realiza la inspección ritual.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: Conserva la fórmula de observación repentina y destaca el hallazgo diagnóstico sin volverlo coloquial.
- source_word: אֵין בָּהּ שֵׂעָר לָבָן
  english_pob_choice: there is no white hair in it
  chosen_spanish: no hay en ella pelo blanco
  alternatives_spanish:
  - no tiene pelo blanco
  - no hay en ella cabellos blancos
  lexicon: HALOT
  rationale: «En ella» sigue el referente femenino del pasaje; «pelo blanco» mantiene la señal clínica sin añadir explicaciones innecesarias.
- source_word: וּשְׁפָלָה אֵינֶנָּה מִן הָעוֹר
  english_pob_choice: it is not deeper than the skin
  chosen_spanish: no está más hundida que la piel
  alternatives_spanish:
  - no está más baja que la piel
  - no parece más profunda que la piel
  lexicon: HALOT
  rationale: El hebreo indica una lesión «baja/sumida»; «más hundida que la piel» preserva la imagen física sin perder claridad en español.
- source_word: וְהִיא כֵהָה
  english_pob_choice: but it is dim
  chosen_spanish: sino que está oscura
  alternatives_spanish:
  - pero está apagada
  - sino que está tenue
  - pero es oscura
  lexicon: HALOT
  rationale: La forma hebrea describe una apariencia apagada o disminuida. En español, «oscura» comunica esa falta de viveza visual sin introducir un sentido ajeno; «sino que» refleja bien la corrección de la primera descripción por la segunda.
- source_word: וְהִסְגִּירוֹ
  english_pob_choice: then the priest shall isolate him
  chosen_spanish: entonces el sacerdote lo aislará
  alternatives_spanish:
  - entonces el sacerdote lo pondrá en aislamiento
  - entonces el sacerdote lo recluirá
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere a la persona examinada, no a la lesión. «Aislará» mantiene el sentido de observación/custodia sin cargar de tecnicismo innecesario.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: Es la expresión temporal directa y natural en español para el período de observación.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: se mantuvo la lectura diagnóstica de יִרְאֶנָּה, el valor de observación de וְהִנֵּה, la descripción física de la lesión como no hundida respecto de la piel, y la decisión revisada de כֵהָה como ''dim'' en inglés, aquí vertida como «oscura» para conservar naturalidad y cercanía semántica. También se preservó la referencia masculina del sufijo de וְהִסְגִּירוֹ para la persona examinada.'
  spanish_consistency_notes:
  - Se evitó usar «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo el registro ritual-jurídico propio de Levítico, con léxico claro y no modernizado en exceso.
  - Se respetó la referencia femenina del objeto examinado con «la/ella» hasta la cláusula final, donde el pronombre de objeto directo retoma a la persona aislada según el hebreo.
