revisions:
- from: En aquel tiempo[a], dice Yahvé, yo seré Dios para todas las familias de Israel, y ellas serán mi pueblo.
  to: En aquel tiempo[a], declara Yahvé, yo seré Dios para todas las familias de Israel, y ellos serán mi pueblo.
  rationale: 'La revisión hace dos reparaciones menores: usa ''declara Yahvé'' para reflejar mejor la fórmula profética נְאֻם יְהוָה, y sustituye ''ellas'' por ''ellos'' para evitar una concordancia artificiosa y mantener una fórmula de pacto más natural y reconocible en español. El resto del borrador puede mantenerse.'
