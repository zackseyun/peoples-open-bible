translation:
  language: es
  text: Entonces murió Elimelec[a], el esposo de Noemí, y quedaron ella y sus dos hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y murió Elimelec, el esposo de Noemí; y quedó ella y sus dos hijos.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces ... murió
  alternatives_spanish:
  - Y ... murió
  - Luego ... murió
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Entonces» comunica esa secuencia de manera natural sin volver el texto mecánico.
- source_word: אֱלִימֶלֶךְ
  english_pob_choice: Elimelech
  chosen_spanish: Elimelec
  alternatives_spanish:
  - Elimelech
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio, adaptado a la ortografía española usual con terminación en -ec para facilitar lectura y pronunciación.
- source_word: אִישׁ נָעֳמִי
  english_pob_choice: Naomi’s husband
  chosen_spanish: el esposo de Noemí
  alternatives_spanish:
  - el marido de Noemí
  - el hombre de Noemí
  lexicon: HALOT
  rationale: En este contexto constructo, אִישׁ indica la relación matrimonial. «Esposo» expresa con claridad el vínculo y evita la ambigüedad de «hombre».
- source_word: וַתִּשָּׁאֵר
  english_pob_choice: she was left
  chosen_spanish: ella quedó
  alternatives_spanish:
  - ella permaneció
  - ella fue dejada
  lexicon: HALOT
  rationale: El verbo comunica la idea de quedar tras una pérdida. «Quedó» suena natural en español y conserva el matiz de resto o supervivencia.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - ella misma
  lexicon: HALOT
  rationale: El pronombre explícito hebreo se conserva con el sujeto «ella»; no hace falta reforzarlo con una forma marcada en español.
- source_word: וּשְׁנֵי בָנֶיהָ
  english_pob_choice: with her two sons / and her two sons
  chosen_spanish: y sus dos hijos
  alternatives_spanish:
  - y sus dos hijos quedaron
  - ella y sus dos hijos
  lexicon: HALOT
  rationale: El hebreo identifica a los que quedaron junto con ella. La redacción española mantiene la coordinación explícita sin introducir «con» que el texto hebreo no tiene.
theological_decisions:
- issue: Término relacional para אִישׁ en contexto matrimonial
  english_pob_reading: Naomi’s husband
  chosen_spanish_reading: el esposo de Noemí
  alternative_spanish_readings:
  - el marido de Noemí
  - el hombre de Noemí
  rationale: 'No hay una tensión doctrinal aquí, pero sí una elección semántica: el contexto narrativo exige una relación conyugal, no solo la noción genérica de «hombre».'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó la frase para reflejar explícitamente el segundo sujeto del hebreo: «she and her two sons» en lugar de «with her two sons». La versión española sigue esa decisión al decir «y sus dos hijos», sin añadir una preposición inexistente en el hebreo.'
  spanish_consistency_notes:
  - Se usa «Noemí» con acento gráfico conforme al español.
  - Se mantiene la estructura narrativa simple y coordinada del hebreo, evitando un giro más interpretativo.
  - «Quedó» conserva mejor el matiz de supervivencia/remaining after loss que un simple «permaneció».
  - La nota ofrece una alternativa más formal que reproduce de cerca el orden hebreo sin convertirla en la forma principal.
