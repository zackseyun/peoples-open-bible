translation:
  language: es
  text: 'Por tanto, esto es lo que dice Yahvé[a] acerca de los hombres de Anatot que buscan tu vida[b], diciendo: «No profetices en nombre de Yahvé, no sea que mueras a manos nuestras[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Así dice Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los que buscan tu vida», un modismo que significa que intentan matarte.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para que no mueras a manos nuestras». La redacción hebrea es literalmente negativa, pero en contexto funciona como una amenaza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferencial del contexto inmediato con un conector natural en español, manteniendo la fuerza lógica del hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: esto es lo que dice Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Conserva la fórmula profética sin calco rígido; 'esto es lo que dice' comunica bien la introducción oracular en español moderno y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino, preservándolo en forma explícita en vez de ocultarlo tras 'SEÑOR'.
- source_word: עַל אַנְשֵׁי עֲנָתוֹת
  english_pob_choice: concerning the men of Anathoth
  chosen_spanish: acerca de los hombres de Anatot
  alternatives_spanish:
  - contra los hombres de Anatot
  - sobre los hombres de Anatot
  lexicon: HALOT
  rationale: '''עַל'' aquí introduce el objeto del oráculo; ''acerca de'' mantiene la amplitud de la preposición, mientras que ''hombres'' refleja con precisión el plural masculino constructo.'
- source_word: הַמְבַקְשִׁים אֶת נַפְשְׁךָ
  english_pob_choice: who are seeking your life
  chosen_spanish: que buscan tu vida
  alternatives_spanish:
  - que buscan quitarte la vida
  - que intentan matarte
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'buscar tu vida' conserva el giro literal, y en español también puede entenderse naturalmente como intento de matar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - con estas palabras
  lexicon: HALOT
  rationale: Marca de cita estándar; 'diciendo' mantiene la transición al discurso directo sin añadir interpretación.
- source_word: לֹא תִנָּבֵא
  english_pob_choice: Do not prophesy
  chosen_spanish: No profetices
  alternatives_spanish:
  - No hagas de profeta
  - No sigas profetizando
  lexicon: HALOT
  rationale: La forma verbal funciona como prohibición directa; 'profetices' reproduce el verbo con claridad y sin atenuar el mandato.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - con la autoridad de Yahvé
  lexicon: HALOT
  rationale: La locución española estable 'en nombre de' comunica autoridad representativa y mantiene la equivalencia funcional del hebreo.
- source_word: וְלֹא תָמוּת בְּיָדֵנוּ
  english_pob_choice: lest you die by our hand
  chosen_spanish: no sea que mueras a manos nuestras
  alternatives_spanish:
  - o morirás a manos nuestras
  - para que no mueras a manos nuestras
  lexicon: HALOT
  rationale: Se preserva el valor amenazante y la construcción de advertencia reflejada en la revisión del POB inglés, evitando una paráfrasis excesiva pero haciendo explícita la amenaza en español.
theological_decisions:
- issue: Renderizado del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa el Tetragrama directamente. Siguiendo la norma del proyecto y la traslación establecida para español, se mantiene el Nombre en forma explícita, no como máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la clausula final negativa como amenaza
  english_pob_reading: lest you die by our hand
  chosen_spanish_reading: no sea que mueras a manos nuestras
  alternative_spanish_readings:
  - o morirás a manos nuestras
  - y no morirás a manos nuestras
  rationale: El hebreo expresa literalmente una negación con valor de advertencia, pero el contexto es una amenaza. El español seleccionado conserva la forma de prevención/advertencia sin borrar la fuerza amenazante.
  doctrine_reference: Jeremiah 11:21 English revision note; warning-construction handling
- issue: Referencia masculina plural en אַנְשֵׁי עֲנָתוֹת
  english_pob_reading: the men of Anathoth
  chosen_spanish_reading: los hombres de Anatot
  alternative_spanish_readings:
  - la gente de Anatot
  - los habitantes de Anatot
  rationale: Se respeta el plural masculino explícito del hebreo en vez de neutralizarlo, manteniendo la precisión gramatical y la posible referencia a los varones implicados en la conspiración.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una formulación de advertencia más cercana al hebreo ('lest you die by our hand') frente a una amenaza más interpretativa. Por eso el español evita 'o morirás' y usa una construcción preventiva que conserva el tono formal y el valor amenazante del original.
  spanish_consistency_notes:
  - Se mantiene Yahvé de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva el masculino plural 'los hombres de Anatot' siguiendo la precisión gramatical del hebreo.
  - La nota final en el texto usa 'a manos nuestras' para reflejar la agencia humana del hebreo בְּיָדֵנוּ.
  - 'No se traduce mecánicamente desde el inglés: la cláusula final fue ajustada a la construcción de advertencia que el pasaje requiere en español.'
  - El marcador [a] acompaña la fórmula profética y [b] la expresión idiomática de 'buscar tu vida'.
