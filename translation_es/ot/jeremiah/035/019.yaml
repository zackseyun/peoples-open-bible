translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los ejércitos[a], el Dios de Israel: nunca le faltará a Jonadab, hijo de Recab, un hombre que esté delante de mí[b] todos los días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no le será cortado a Jonadab, hijo de Recab, un hombre que esté delante de mí todos los días».'
    reason: lexical_alternative
  - marker: b
    text: «Estar delante de mí» puede denotar servicio en la presencia de Dios; el texto no especifica un oficio particular.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce una conclusión profética; "Por tanto" conserva el valor concluyente y el tono formal sin sonar arcaico.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - de este modo dice
  lexicon: HALOT
  rationale: La fórmula mensajera profética se expresa naturalmente en español con "así dice", manteniendo el cadencioso registro oracular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma editorial POB en español, evitando la sustitución por un título y reflejando el tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: En español, "de los ejércitos" transmite de manera transparente el título sin perder el alcance amplio del hebreo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel, su pueblo
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa como identificación del Dios del pacto con Israel.
- source_word: לֹא יִכָּרֵת
  english_pob_choice: shall never lack
  chosen_spanish: nunca le faltará
  alternatives_spanish:
  - no será cortado
  - nunca será cortado
  lexicon: HALOT
  rationale: El nifal de כרת puede decir literalmente "ser cortado", pero aquí el giro idiomático con "un hombre" apunta a continuidad de linaje o representante; en español, "nunca le faltará" expresa esa idea sin borrar la tensión lexical.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - algún hombre
  - una persona
  lexicon: HALOT
  rationale: Se mantiene el singular masculino del hebreo, que aquí señala a un representante continuo de la línea de Jonadab.
- source_word: לְיוֹנָדָב בֶּן רֵכָב
  english_pob_choice: Jonadab son of Rechab
  chosen_spanish: a Jonadab hijo de Recab
  alternatives_spanish:
  - a Jonadab, hijo de Recab
  - para Jonadab hijo de Recab
  lexicon: HALOT
  rationale: Se conserva la estructura patronímica en forma natural para español bíblico; "hijo de Recab" sigue de cerca el hebreo y la tradición onomástica.
- source_word: עֹמֵד לְפָנַי
  english_pob_choice: standing before me
  chosen_spanish: que esté delante de mí
  alternatives_spanish:
  - que se mantenga delante de mí
  - sirviéndome en mi presencia
  lexicon: HALOT
  rationale: La expresión "delante de mí" preserva la literalidad de la imagen de presencia y servicio; el subjuntivo "esté" refleja la construcción del complemento de propósito/resultado después de "un hombre".
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - para siempre
  - continuamente
  lexicon: HALOT
  rationale: Se reproduce la frase temporal hebrea de manera literal, sin resolverla prematuramente en una sola paráfrasis como "para siempre".
theological_decisions:
- issue: Sentido de "estar delante de mí"
  english_pob_reading: An enduring promise that Jonadab's line will continue to have a representative in God's presence/service, without specifying a narrower institutional role.
  chosen_spanish_reading: Una promesa duradera de que la línea de Jonadab tendrá un representante en la presencia/servicio de Dios, sin precisar un oficio institucional más estrecho.
  alternative_spanish_readings:
  - Una promesa de servicio sacerdotal o de templo perpetuo para los recabitas
  - Una promesa general de descendencia bajo favor divino
  rationale: La expresión puede implicar servicio delante de Dios, pero el texto no define el cargo. Mantener "delante de mí" preserva la tensión teológica en vez de estrecharla a sacerdocio o diluirla en mera supervivencia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa al expresar la idea de continuidad con una construcción más natural que respeta el hebreo: "nunca le faltará... un hombre que esté delante de mí". También conserva la fórmula profética y el nombre divino según la convención editorial POB en español.'
  spanish_consistency_notes:
  - Se usó "Yahvé" como equivalente español consistente del nombre divino, en lugar de una sustitución por título.
  - Se mantuvo "delante de mí" para no cerrar el posible matiz de servicio en la presencia divina.
  - '"Todos los días" conserva la expresión temporal hebrea y evita una paráfrasis interpretativa como "para siempre".'
  - Se eligió "nunca le faltará" para reflejar el idiomatismo de לֹא יִכָּרֵת sin borrar su trasfondo literal de "ser cortado".
