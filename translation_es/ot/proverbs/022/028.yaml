translation:
  language: es
  text: No muevas el mojón antiguo[a] que pusieron tus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No quites un límite antiguo que tus padres establecieron». «Mojón antiguo» traduce aquí la idea de un marcador de límite; también puede entenderse como «límite» o «lindero».
    reason: lexical_alternative
  - marker: b
    text: «Tus padres» puede referirse más ampliamente a tus antepasados o mayores.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No has de
  lexicon: HALOT
  rationale: אַל con el imperfecto forma una prohibición; en español, «No» comunica de modo natural y fiel la fuerza prohibitiva sin arcaísmo innecesario.
- source_word: תַּסֵּג
  english_pob_choice: move
  chosen_spanish: muevas
  alternatives_spanish:
  - retires
  - desplaces
  - muevas de lugar
  lexicon: HALOT
  rationale: En el contexto de un límite territorial, el verbo expresa desplazar o alterar de sitio el mojón. «Muevas» conserva la idea de mover/desplazar sin añadir más de lo que el hebreo dice.
- source_word: גְּבוּל
  english_pob_choice: boundary marker
  chosen_spanish: linder
  alternatives_spanish:
  - límite
  - mojón
  - linde
  lexicon: HALOT
  rationale: El término puede referirse al límite o a la señal que lo marca. «Linder» es un español claro y relativamente neutral para un marcador de límite; «mojón» sería más concreto pero menos amplio regionalmente.
- source_word: עוֹלָם
  english_pob_choice: ancient
  chosen_spanish: antiguo
  alternatives_spanish:
  - viejo
  - de antiguo
  - ancestral
  lexicon: HALOT
  rationale: Aquí no significa eternidad, sino algo establecido desde hace mucho tiempo. «Antiguo» reproduce bien ese valor temporal durativo y evita una lectura metafísica.
- source_word: עָשׂוּ
  english_pob_choice: made
  chosen_spanish: pusieron
  alternatives_spanish:
  - hicieron
  - establecieron
  - colocaron
  lexicon: HALOT
  rationale: En el ámbito de linderos, el verbo «hacer» se concreta naturalmente como «poner/colocar». «Pusieron» expresa con claridad la acción de fijar el linde; «establecieron» queda como alternativa más interpretativa.
- source_word: אֲבוֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres/antepasados
  - tus mayores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus padres»; en español, «padres» puede sonar restrictivo, pero mantiene la forma masculina plural y la relación generacional. Dado el contexto proverbial, también puede abarcar a antepasados, pero se conserva la forma más cercana al texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo de Proverbios 22:28 y el rastro auditado en inglés. Se mantiene la prohibición, la imagen del límite territorial y la referencia a la generación anterior, sin suavizar la fuerza del mandato ni convertir el término en una abstracción.
  spanish_consistency_notes:
  - Se usó «antiguo» para עוֹלָם, no «eterno», porque el contexto es temporal y legal-proverbial.
  - Se prefirió «linder» para dar un equivalente amplio a גְּבוּל, aunque el campo semántico admite «mojón» en algunas regiones.
  - «Pusieron» refleja la colocación concreta de un linde mejor que una traducción demasiado general de עָשׂוּ.
  - La forma «tus padres» conserva la relación de filiación del hebreo; el pie de nota aclara su posible alcance amplio.
