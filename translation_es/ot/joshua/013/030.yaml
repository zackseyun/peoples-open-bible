translation:
  language: es
  text: 'Su territorio se extendía desde Mahanáim: todo Basán, todo el reino de Og, rey de Basán,[b] y todas las aldeas[a] de Jair que están en Basán, sesenta ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Havot-yair», transliteración tradicional del nombre hebreo de estos asentamientos.
    reason: lexical_alternative
  - marker: b
    text: O «desde Mahanáim, todo Basán».
    reason: previous_rendering
lexical_decisions:
- source_word: גְבוּלָם
  english_pob_choice: their territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - su frontera
  - su límite
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, גְבוּל se entiende como la extensión poseída, no solo la línea fronteriza. "Territorio" comunica mejor el área asignada que "frontera" o "límite".
- source_word: מִמַּחֲנַיִם
  english_pob_choice: from Mahanaim
  chosen_spanish: desde Mahanáim
  alternatives_spanish:
  - a partir de Mahanáim
  - desde Mahanaim
  lexicon: HALOT
  rationale: La preposición מִן señala el punto de inicio de la descripción territorial. "Desde" preserva ese valor de arranque; se mantiene el nombre propio transliterado como topónimo.
- source_word: כָּל הַבָּשָׁן
  english_pob_choice: all Bashan
  chosen_spanish: todo Basán
  alternatives_spanish:
  - todo el Basán
  - la totalidad de Basán
  lexicon: HALOT
  rationale: Se conserva la fuerza totalizadora de כָּל con una formulación natural en español. "Basán" respeta la transliteración del nombre geográfico.
- source_word: מַמְלְכוּת עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: all the kingdom of Og king of Bashan
  chosen_spanish: todo el reino de Og, rey de Basán
  alternatives_spanish:
  - todo el reino de Og, el rey de Basán
  - todo el dominio real de Og, rey de Basán
  lexicon: HALOT
  rationale: מַמְלְכוּת se rinde con "reino", que es la equivalencia más natural y fiel aquí. Se mantiene la apposición "rey de Basán" sin añadir artículos innecesarios.
- source_word: חַוֹּת יָאִיר
  english_pob_choice: the villages of Jair
  chosen_spanish: las aldeas de Jair
  alternatives_spanish:
  - las villas de Jair
  - las moradas de Jair
  - Havot-yair
  lexicon: HALOT
  rationale: חַוֹּת designa asentamientos/aldeas asociadas a Jair. "Aldeas" es claro y no impone una categoría urbana más fuerte que la del hebreo. Se conserva el nombre propio de Jair sin transliterar el compuesto como topónimo fijo en el texto principal.
- source_word: אֲשֶׁר בַּבָּשָׁן
  english_pob_choice: that are in Bashan
  chosen_spanish: que están en Basán
  alternatives_spanish:
  - que estaban en Basán
  - las cuales están en Basán
  lexicon: HALOT
  rationale: La relativa identifica la localización de las aldeas. "Que están" suena natural en un contexto geográfico y evita forzar un valor temporal innecesario.
- source_word: שִׁשִּׁים עִיר
  english_pob_choice: sixty cities
  chosen_spanish: sesenta ciudades
  alternatives_spanish:
  - sesenta poblaciones
  - sesenta pueblos
  lexicon: HALOT
  rationale: עִיר puede abarcar ciudad o población; "ciudades" mantiene la correspondencia tradicional del listado territorial sin sugerir necesariamente un tamaño moderno.
theological_decisions:
- issue: Valor de גְבוּל en contexto de heredad territorial
  english_pob_reading: their territory
  chosen_spanish_reading: su territorio
  alternative_spanish_readings:
  - su frontera
  - su límite
  rationale: El texto no está midiendo una línea fronteriza abstracta, sino describiendo la porción poseída. Traducirlo como "territorio" preserva el sentido de heredad y distribución tribal.
  doctrine_reference: Distribución de la tierra en Josué; sentido territorial de גְבוּל en listas de posesión
- issue: Tratamiento del nombre tradicional Havvoth-jair
  english_pob_reading: the villages of Jair
  chosen_spanish_reading: las aldeas de Jair
  alternative_spanish_readings:
  - Havot-yair
  - las poblaciones de Jair
  rationale: El hebreo aquí funciona como un sintagma común que describe asentamientos vinculados a Jair. En español, la traducción común es más transparente para el lector que conservar el compuesto transliterado en el cuerpo del texto; sin embargo, esa opción queda disponible como alternativa de lectura.
  doctrine_reference: Toponimia bíblica y transparencia traductológica
translation_notes:
  revision_awareness: El texto inglés reciente ajustó la puntuación para aclarar que la descripción del territorio comienza en Mahanáim y luego enumera la región, no dos elementos paralelos. La versión española sigue esa lectura con dos puntos después de Mahanáim. También se respeta la decisión del audit trail de traducir גְבוּל como territorio y חַוֹּת יָאִיר como villages/aldeas, manteniendo la alternativa transliterada en nota.
  spanish_consistency_notes:
  - Se usa "Basán" para el topónimo y "Mahanáim" para el lugar de inicio territorial, en línea con la política de transliteración.
  - Se mantiene la estructura enumerativa con "todo... todo... y..." para reflejar la amplitud inclusiva del hebreo.
  - Se emplea "aldeas" en vez de "ciudades" para חַוֹּת יָאִיר, pero se conserva "ciudades" al final para שִׁשִּׁים עִיר, siguiendo la distinción contextual del hebreo.
  - La puntuación con dos puntos reproduce la aclaración lógica del audit trail inglés y mejora la lectura en español.
