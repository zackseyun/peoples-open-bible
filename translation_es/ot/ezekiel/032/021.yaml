translation:
  language: es
  text: 'Los más poderosos entre los jefes[a] le hablarán desde lo profundo del Seol[b], con sus ayudantes[c]: «Han descendido; yacen inmóviles, los incircuncisos, muertos a espada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los poderosos entre los guerreros»; el hebreo es difícil y podría entenderse más literalmente como «los poderosos de los guerreros».'
    reason: lexical_alternative
  - marker: b
    text: Seol es el término hebreo para el ámbito de los muertos; no es idéntico en sentido a «infierno».
    reason: cultural_note
  - marker: c
    text: 'O: «con sus aliados». El hebreo puede indicar a los que lo acompañan en la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַבְּרוּ
  english_pob_choice: will speak
  chosen_spanish: le hablarán
  alternatives_spanish:
  - hablarán
  - dirán
  lexicon: HALOT
  rationale: El imperfecto profético se vierte de modo futuro en español. «Le hablarán» conserva el valor discursivo y la dirección de la խոսa al destinatario.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa naturalmente con el clítico indirecto «le» en español, manteniendo a Faraón como destinatario del discurso.
- source_word: אֵלֵי גִבּוֹרִים
  english_pob_choice: the mighty among the chiefs
  chosen_spanish: los más poderosos entre los jefes
  alternatives_spanish:
  - los poderosos entre los guerreros
  - los más fuertes entre los héroes
  - los poderosos entre los jefes
  lexicon: HALOT
  rationale: La construcción es difícil y la POB inglesa la entiende como una superlativa de guerreros/líderes humanos, no como seres divinos. «Los más poderosos entre los jefes» refleja ese sentido de élite y permite la ambigüedad controlada del hebreo sin volverlo técnico o mítico.
- source_word: מִתּוֹךְ שְׁאוֹל
  english_pob_choice: from the midst of Sheol
  chosen_spanish: desde en medio del Seol
  alternatives_spanish:
  - desde el interior del Seol
  - desde el medio del Seol
  lexicon: HALOT
  rationale: Se conserva «Seol» para no sustituir el concepto hebreo por «sepulcro» o «infierno». «Desde en medio de» reproduce la imagen espacial del hebreo y la inglesa.
- source_word: אֶת עֹזְרָיו
  english_pob_choice: with his helpers
  chosen_spanish: con sus ayudantes
  alternatives_spanish:
  - con sus aliados
  - junto con sus ayudantes
  - con sus auxiliares
  lexicon: HALOT
  rationale: La lectura asociativa de אֶת se expresa con «con». «Ayudantes» sigue la decisión inglesa y es más natural que «auxiliares» para un contexto bélico; «aliados» queda como alternativa viable si se desea resaltar la idea de acompañantes.
- source_word: יָרְדּוּ
  english_pob_choice: They have gone down
  chosen_spanish: Han descendido
  alternatives_spanish:
  - Han bajado
  - Descendieron
  lexicon: HALOT
  rationale: El perfecto comunica una acción ya cumplida en el ámbito de la muerte. «Han descendido» mantiene la imagen de descenso al mundo de los muertos.
- source_word: שָׁכְבוּ
  english_pob_choice: they lie still
  chosen_spanish: yacen inmóviles
  alternatives_spanish:
  - yacen
  - están tendidos
  - reposan
  lexicon: HALOT
  rationale: En contexto funerario, «yacer» reproduce el estado de muerte; «inmóviles» explicita la quietud que la POB inglesa quiso marcar con «lie still».
- source_word: הָעֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  - los de prepucio
  lexicon: HALOT
  rationale: Se conserva el término convencional español, que en Ezequiel lleva carga de vergüenza y de exclusión de pacto. No se suaviza el impacto lexical.
- source_word: חַלְלֵי חָרֶב
  english_pob_choice: slain by the sword
  chosen_spanish: muertos a espada
  alternatives_spanish:
  - caídos a espada
  - muertos por la espada
  - asesinados a espada
  lexicon: HALOT
  rationale: La expresión hebrea es un giro de muerte violenta. «Muertos a espada» es idiomático en español y preserva el tono bélico sin sobreexplicar.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol as the Hebrew realm of the dead, not hell
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - el sepulcro
  - el infierno
  - el reino de los muertos
  rationale: Se mantiene el término hebreo transliterado para evitar importar categorías doctrinales posteriores. «Seol» deja visible el trasfondo del Antiguo Testamento y la tensión semántica que el texto no resuelve por completo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Understanding אֵלֵי גִבּוֹרִים
  english_pob_reading: human warrior-chiefs in the underworld
  chosen_spanish_reading: jefes poderosos humanos en el Seol
  alternative_spanish_readings:
  - guerreros poderosos
  - dioses de los poderosos
  - jefes de guerra
  rationale: La POB inglesa opta por una lectura humana y contextual, no por una referencia a deidades. «Jefes» comunica liderazgo militar/político y «los más poderosos» conserva el matiz superlativo sin introducir mitología innecesaria.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que afinó la equivalencia de אֵלֵי גִבּוֹרִים hacia una formulación más precisa sin perder fluidez. En español se reflejó ese ajuste con «los más poderosos entre los jefes», manteniendo la escena de lamento/taunt en Seol y la cadena verbal de descenso y quietud.
  spanish_consistency_notes:
  - Se conserva «Seol» de forma consistente con la política POB de no sustituir el término hebreo por «infierno» o «sepulcro».
  - Se prefirió «incircuncisos» por ser el equivalente bíblico estándar y mantener la carga covenantal del texto.
  - Se mantuvo un registro sobrio y público, evitando arcaísmos innecesarios pero sin perder la solemnidad profética.
