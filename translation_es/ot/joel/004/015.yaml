translation:
  language: es
  text: El sol y la luna se oscurecen[a], y las estrellas retiran su brillo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''las estrellas recogen su brillo'', es decir, retiran o retienen su resplandor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - sol
  lexicon: HALOT
  rationale: Renderiza el cuerpo celeste con el artículo natural en español poético; mantiene la imagen cósmica sin añadir interpretación.
- source_word: וְיָרֵחַ
  english_pob_choice: and the moon
  chosen_spanish: y la luna
  alternatives_spanish:
  - y luna
  lexicon: HALOT
  rationale: Equivale de manera directa a יָרֵחַ en este paralelismo celestial; el artículo suena normal y claro en español.
- source_word: קָדָרוּ
  english_pob_choice: grow dark
  chosen_spanish: se oscurecen
  alternatives_spanish:
  - se ennegrecen
  - se vuelven oscuras
  - se obscurecen
  lexicon: HALOT
  rationale: El verbo expresa volverse oscuro; en español, 'se oscurecen' comunica bien el valor inceptivo sin volver la frase rígidamente pasiva.
- source_word: וְכוֹכָבִים
  english_pob_choice: and the stars
  chosen_spanish: y las estrellas
  alternatives_spanish:
  - y estrellas
  lexicon: HALOT
  rationale: Traducción directa del plural en un marco poético de juicio cósmico; el artículo favorece la naturalidad del español.
- source_word: אָסְפוּ
  english_pob_choice: withdraw
  chosen_spanish: retiran
  alternatives_spanish:
  - se recogen
  - se retraen
  - retiran su luz
  lexicon: HALOT
  rationale: אָסַף literalmente puede significar 'reunir/recoger'; aquí, con נָגְהָם, el sentido idiomático es retirar o replegar su resplandor. 'Retiran' preserva ese movimiento sin añadir más de lo que el hebreo dice.
- source_word: נָגְהָם
  english_pob_choice: their brightness
  chosen_spanish: su brillo
  alternatives_spanish:
  - su resplandor
  - su luz
  - su resplandor luminoso
  lexicon: HALOT
  rationale: נֹגַהּ designa brillo o resplandor; 'brillo' es conciso y fiel, y evita cargar la línea con una paráfrasis más explicativa.
theological_decisions:
- issue: Oscurecimiento cósmico como lenguaje profético de juicio
  english_pob_reading: Render the imagery straightforwardly as cosmic signs without specifying whether the language is literal, metaphorical, or apocalyptic-symbolic.
  chosen_spanish_reading: Presentar la imagen de manera directa, sin decidir si el oscurecimiento es literal, figurado o simbólico-apocalíptico.
  alternative_spanish_readings:
  - Interpretar el texto como oscurecimiento astronómico literal
  - Entenderlo como metáfora del juicio divino
  - Leerlo como simbolismo apocalíptico
  rationale: El hebreo formula la escena con brevedad poética y no resuelve la cuestión interpretativa. La traducción mantiene esa tensión teológica en vez de cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto en inglés y la revisión más reciente permanecen sin cambios, con acuerdo alto entre cotejos; no se requieren ajustes textuales adicionales para esta línea.
  spanish_consistency_notes:
  - Se preserva la simetría poética 'el sol / la luna / las estrellas' sin introducir perífrasis explicativas.
  - '''Se oscurecen'' conserva el valor de cambio de estado de קדר mejor que una pasiva rígida.'
  - '''Retiran su brillo'' refleja el matiz idiomático de אסף + נגה sin convertirlo en una interpretación doctrinal.'
  - 'La nota mantiene la alternativa semántica documentada en el audit trail: ''recogen/retraen su brillo'' con la idea de retener la luz.'
