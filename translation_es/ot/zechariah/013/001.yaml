translation:
  language: es
  text: En aquel día se abrirá una fuente[a] para la casa de David y para los habitantes de Jerusalén, para el pecado[b] y la impureza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantial» o «fuente de origen» para «fuente».
    reason: lexical_alternative
  - marker: b
    text: «Pecado» también puede entenderse por algunos como «ofrenda por el pecado», aunque aquí el contexto de limpieza favorece «pecado».
    reason: lexical_alternative
  - marker: c
    text: O «inmundicia»; el término hebreo puede referirse específicamente a impureza menstrual o más ampliamente a impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal en español suena natural como «En aquel día» y conserva el valor deíctico/escatológico del hebreo sin volverla arcaica.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - existirá
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «será», en español la construcción existencial con «haber» expresa con más naturalidad la aparición/provisión de la fuente abierta.
- source_word: מָקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - fuente de agua
  - surtidor
  lexicon: HALOT
  rationale: «מָקוֹר» puede significar manantial, fuente o origen. «Fuente» es la opción más amplia y natural para el lector español, y conserva la imagen de una provisión de agua para limpieza.
- source_word: נִפְתָּח
  english_pob_choice: opened
  chosen_spanish: abierta
  alternatives_spanish:
  - abierto
  - abierta y disponible
  lexicon: HALOT
  rationale: Se traduce como adjetivo pospuesto en concordancia con «fuente», manteniendo el sentido pasivo de que ha sido abierta o puesta a disposición.
- source_word: לְבֵית דָּוִיד
  english_pob_choice: for the house of David
  chosen_spanish: para la casa de David
  alternatives_spanish:
  - a la casa de David
  - en favor de la casa de David
  lexicon: HALOT
  rationale: El ל expresa beneficio/disponibilidad, no simple dirección. «Para» comunica mejor que la fuente está destinada a ellos.
- source_word: וּלְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and for the inhabitants of Jerusalem
  chosen_spanish: y para los habitantes de Jerusalén
  alternatives_spanish:
  - y para los que habitan en Jerusalén
  - y para los moradores de Jerusalén
  lexicon: HALOT
  rationale: «יֹשְׁבֵי» es un sustantivo participial colectivo; «habitantes» preserva el sentido grupal y suena idiomático en español.
- source_word: לְחַטָּאת
  english_pob_choice: for sin
  chosen_spanish: para pecado
  alternatives_spanish:
  - para el pecado
  - para ofrenda por el pecado
  - para expiación
  lexicon: HALOT
  rationale: Se conserva el sustantivo simple «pecado», como en la lectura principal inglesa. Aunque el término puede significar también «ofrenda por el pecado», el contexto de purificación favorece la idea de limpieza de pecado, no la mención de un sacrificio concreto.
- source_word: וּלְנִדָּה
  english_pob_choice: for impurity
  chosen_spanish: y para impureza
  alternatives_spanish:
  - y para inmundicia
  - y para impureza ritual
  - y para impureza menstrual
  lexicon: HALOT
  rationale: «נִדָּה» puede referirse a impureza ritual o, más específicamente, menstrual. «Impureza» conserva la amplitud semántica y evita especificar más de lo que exige el contexto.
theological_decisions:
- issue: Naturaleza de la fuente abierta y su función limpiadora
  english_pob_reading: Render the verse in terms of cleansing from sin and impurity without importing later doctrinal explanation into the main text.
  chosen_spanish_reading: La traducción mantiene la imagen de una fuente provista para purificar de pecado e impureza, sin explicitar en el texto principal un mecanismo sacrificial o cristológico.
  alternative_spanish_readings:
  - Una fuente de expiación será abierta
  - Una fuente abierta para el perdón de los pecados
  rationale: El hebreo habla de una fuente abierta con finalidad de limpieza, pero no identifica aquí el medio concreto. La versión española conserva esa tensión teológica y no resuelve el pasaje con explicaciones posteriores.
  doctrine_reference: Preservar la tensión teológica del texto profético.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del contexto inglés: «a fountain will be opened»; en español se optó por «habrá una fuente abierta» para conservar la pasiva resultativa de forma natural. No se introdujeron aclaraciones doctrinales ausentes del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «fuente» en lugar de «manantial» para reflejar la imagen de provisión abierta y accesible.
  - Se eligió «impureza» como equivalente amplio de נִדָּה, evitando restringir el sentido a «impureza menstrual».
  - Se tradujo לְחַטָּאת como «para pecado» sin añadir «ofrenda», siguiendo la decisión inglesa de preservar la ambigüedad contextual.
  - No se usó «SEÑOR» ni terminología litúrgica añadida; el versículo no contiene el Tetragrámaton ni un término mesiánico explícito.
