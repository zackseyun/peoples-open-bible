base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/014.yaml
  text: Then Jehoiada the priest brought out the commanders of hundreds who were appointed over the army[a], and said to them, “Bring her out between the ranks, and whoever follows after her, let him be put to death with the sword.” For the priest had said, “Do not put her to death in the house of Yahweh.”
  footnotes:
  - marker: a
    text: Or “to the outside of the rows”; the Hebrew phrase is difficult. It likely refers to taking Athaliah out through or between arranged ranks.
    reason: lexical_alternative
