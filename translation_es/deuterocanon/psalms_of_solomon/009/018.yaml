translation:
  language: es
  text: Y has puesto tu nombre sobre nosotros[a], oh Yahvé; y no cesará para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «has colocado tu nombre sobre nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no cesará por siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθου
  english_pob_choice: have placed / set
  chosen_spanish: has puesto
  alternatives_spanish:
  - has colocado
  - has puesto sobre
  lexicon: LSJ
  rationale: El aoristo de τίθημι se expresa de manera natural en español con un perfecto compuesto que comunica una acción ya realizada. «Has puesto» conserva la imagen concreta de colocar el nombre sin sobreexplicar el sentido.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre
  - tu nombre propio
  lexicon: LSJ
  rationale: Se mantiene el sustantivo «nombre» de forma literal, porque el texto griego presenta la imagen directamente y la posible carga de pertenencia del nombre se conserva para el lector sin resolverla en paráfrasis.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - sobre nosotros
  - en nosotros
  lexicon: LSJ
  rationale: «Sobre nosotros» preserva el valor preposicional elevado y visible del griego, y en español resulta más natural que una calca como «upon».
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Yahvé
  lexicon: LSJ
  rationale: Se usa «Yahvé» conforme al criterio del proyecto para יהוה. Aunque el vocativo griego dice Κύριε, el contexto de invocación divina en este corpus justifica reflejar el nombre divino en español en lugar de la convención de ocultarlo con «SEÑOR». El «oh» conserva el valor vocativo.
- source_word: οὐ καταπαύσεις
  english_pob_choice: it will not cease
  chosen_spanish: no cesará
  alternatives_spanish:
  - no cesará
  - no terminará
  lexicon: LSJ
  rationale: El verbo se vierte de modo idiomático con «cesará», manteniendo la negación simple. En español, el sujeto implícito puede referirse al nombre puesto sobre el pueblo, que es el elemento inmediatamente antecedente y coincide con la revisión auditada.
- source_word: τὸν αἰῶνα
  english_pob_choice: forever / never
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por la edad
  lexicon: LSJ
  rationale: El giro adverbial se traduce con «por siempre», una fórmula clara y digna en español que preserva el sentido durativo de αἰῶνα sin introducir una interpretación temporal extra.
theological_decisions:
- issue: Cómo reflejar el vocativo Κύριε en un texto donde el proyecto prefiere Yahvé para el nombre divino
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  - oh mi Señor
  rationale: Aunque el griego usa Κύριε, el propio protocolo del proyecto establece Yahvé como la forma principal para el nombre divino. Dado que el verso invoca a Dios directamente y no plantea una cita de otro pasaje donde Κύριος funcione como sustituto textual, se opta por Yahvé para ser transparente con la convención del corpus.
  doctrine_reference: Conventional rendering of the divine name in the project policy.
- issue: Si el final debe explicitar el objeto implícito del verbo o mantener la tensión literal
  english_pob_reading: it will not cease forever
  chosen_spanish_reading: no cesará por siempre
  alternative_spanish_readings:
  - no lo harás cesar por siempre
  - no dejarás que cese por siempre
  rationale: La auditoría inglesa identificó una posible lectura transitiva del verbo, pero la revisión posterior evitó introducir «it»/«lo» en inglés. En español, para no resolver indebidamente la ambigüedad y no añadir un objeto explícito que el texto griego no da de forma marcada en la superficie, se conserva una formulación impersonal y sobria que deja la relación semántica entre el nombre y el cese en tensión.
  doctrine_reference: Preserve theological tension rather than over-specify the implied object.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al usar un perfecto compuesto para ἔθου y una formulación que evita introducir la idea de «retirar» el nombre. También toma en cuenta la corrección posterior que apartó la lectura intransitiva de καταπαύσεις; por eso se traduce de modo sobrio, manteniendo el foco en el cese del nombre/estado implícito sin expandir el verbo con un objeto no explicitado en la línea griega.
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para el nombre divino como Yahvé.
  - Se conserva el carácter literal de «nombre» sin paráfrasis de pertenencia en el cuerpo del texto.
  - La estructura breve y paralela busca respetar el tono litúrgico del verso.
  - Las notas alternativas se limitan a variantes léxicas reales y no introducen doctrinas adicionales.
