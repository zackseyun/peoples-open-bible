translation:
  language: es
  text: para que te teman todos los días que vivan sobre la faz de la tierra[a][b][c] que tú diste a nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la faz de la tierra». El giro hebreo puede entenderse más ampliamente, pero aquí «tierra» se refiere contextualmente a la tierra que Dios dio a Israel.
    reason: lexical_alternative
  - marker: b
    text: O «mientras vivan».
    reason: lexical_alternative
  - marker: c
    text: 'O «a nuestros antepasados». Hebreo: «a nuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa bien la finalidad del ruego en español actual y conserva la fuerza purposiva del hebreo.
- source_word: יִרָאוּךָ
  english_pob_choice: they may fear you
  chosen_spanish: te teman
  alternatives_spanish:
  - te reverencien
  - sientan temor de ti
  lexicon: HALOT
  rationale: «Temer» en español bíblico puede sonar arcaico; «te teman» conserva la carga reverencial y el peso teológico del temor de Dios, sin suavizarlo a mera deferencia.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - todos sus días
  lexicon: HALOT
  rationale: Mantiene la totalidad temporal del hebreo con una frase natural en español.
- source_word: אֲשֶׁר הֵם חַיִּים
  english_pob_choice: that they live
  chosen_spanish: que vivan
  alternatives_spanish:
  - mientras vivan
  - en que viven
  lexicon: HALOT
  rationale: El relativo hebreo marca la duración de «todos los días»; «que vivan» es breve y fiel, y en este contexto equivale a «mientras vivan».
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the land
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la faz del suelo
  - en la tierra
  lexicon: HALOT
  rationale: Conserva la imagen idiomática de «faz» y, en español, «tierra» comunica de manera natural el ámbito habitado sin perder la referencia contextual al territorio dado.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra prometida
  lexicon: HALOT
  rationale: En este contexto no se trata de «suelo» físico sino del ámbito concedido por Dios; «tierra» es la forma más natural y suficientemente amplia para el pasaje.
- source_word: אֲשֶׁר נָתַתָּה
  english_pob_choice: that you gave
  chosen_spanish: que tú diste
  alternatives_spanish:
  - que has dado
  - la cual diste
  lexicon: HALOT
  rationale: El pasado simple en español refleja bien la acción completada de Dios en la historia de Israel.
- source_word: לַאֲבֹתֵינוּ
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  lexicon: HALOT
  rationale: Se mantiene la expresión del hebreo y su tono pactal; en español «padres» puede sonar más bíblico, pero aquí «nuestros padres» sigue siendo claro y fiel al original.
theological_decisions:
- issue: Temor de Dios como categoría teológica
  english_pob_reading: fear you
  chosen_spanish_reading: te teman
  alternative_spanish_readings:
  - te reverencien
  - te respeten
  rationale: La oración de Salomón pide una obediencia reverente ante Yahvé; «teman» conserva la densidad bíblica del temor del Señor, sin reducirla a respeto social.
  doctrine_reference: Translation philosophy §3, §6
- issue: Alcance de עַל פְּנֵי הָאֲדָמָה
  english_pob_reading: on the face of the land
  chosen_spanish_reading: sobre la faz de la tierra
  alternative_spanish_readings:
  - sobre la faz de la tierra de Israel
  - en la tierra
  rationale: El contexto de la frase siguiente («que tú diste a nuestros padres») inclina la expresión hacia la tierra heredada, pero el hebreo usa una imagen amplia; «faz de la tierra» preserva la metáfora sin restringirla más de lo debido.
  doctrine_reference: Translation philosophy §1
