translation:
  language: es
  text: Porque su enojo es por un momento; la vida está en su favor. El llanto puede quedarse durante la noche[a], pero por la mañana llega el júbilo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El llanto se aloja durante la noche»; el verbo hebreo alude literalmente a pasar la noche como huésped o inquilino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un grito de alegría» o «canto de alegría» para «júbilo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Ciertamente
  lexicon: HALOT
  rationale: Introduces una explicación o fundamento para lo anterior. En español, «Porque» comunica bien ese enlace causal/discursivo sin forzar un tono más enfático que el hebreo.
- source_word: רֶגַע
  english_pob_choice: for a moment
  chosen_spanish: por un momento
  alternatives_spanish:
  - por un instante
  - un momento
  lexicon: HALOT
  rationale: El sustantivo expresa una duración brevísima. «Por un momento» conserva la brevedad y encaja naturalmente con la cláusula nominal española.
- source_word: בְּאַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su enojo
  alternatives_spanish:
  - su ira
  - su furor
  - su indignación
  lexicon: HALOT
  rationale: אַף alude idiomáticamente a la ira/enojo. «Enojo» mantiene el sentido sin sobreelevar el registro; «ira» o «furor» intensifican más de lo que sugiere el contexto poético.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - hay vida
  - las vidas
  lexicon: HALOT
  rationale: Aunque la forma es plural, funciona como sustantivo abstracto «vida». El artículo ayuda a la fluidez española y mantiene el contraste con la brevedad del enojo y del llanto.
- source_word: בִּרְצוֹנוֹ
  english_pob_choice: in his favor
  chosen_spanish: en su favor
  alternatives_spanish:
  - por su favor
  - en su buena voluntad
  - en su beneplácito
  lexicon: HALOT
  rationale: רָצוֹן puede denotar favor, beneplácito o buena voluntad. «En su favor» reproduce bien la relación compacta del hebreo y conserva la idea de una disposición favorable de Dios.
- source_word: בָּעֶרֶב
  english_pob_choice: for the night
  chosen_spanish: durante la noche
  alternatives_spanish:
  - por la noche
  - en la noche
  - al anochecer
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «for the night» por la proximidad con «morning» y el verbo de hospedaje. En español, «durante la noche» conserva esa temporalidad sin sonar artificial con «quedarse».
- source_word: יָלִין
  english_pob_choice: may stay
  chosen_spanish: puede quedarse
  alternatives_spanish:
  - albergarse
  - pasar la noche
  - pernoctar
  lexicon: HALOT
  rationale: El verbo literalmente significa alojarse o pasar la noche. «Puede quedarse» da una equivalencia natural con el sujeto personificado «el llanto», sin perder la idea de permanencia nocturna.
- source_word: בֶּכִי
  english_pob_choice: weeping
  chosen_spanish: el llanto
  alternatives_spanish:
  - el llanto y el gemido
  - el llorar
  - el llorar amargo
  lexicon: HALOT
  rationale: El sustantivo denota llanto/llorando. «El llanto» suena natural en español poético y permite una construcción fluida con el verbo «quedarse».
- source_word: וְלַבֹּקֶר
  english_pob_choice: but rejoicing comes in the morning
  chosen_spanish: pero por la mañana llega el regocijo
  alternatives_spanish:
  - y por la mañana el regocijo
  - pero en la mañana viene el gozo
  - mas al amanecer llega el júbilo
  lexicon: HALOT
  rationale: El hebreo marca contraste entre noche y mañana. «Pero por la mañana» expresa bien la oposición, y «llega el regocijo» conserva la imagen dinámica del paralelismo.
- source_word: רִנָּה
  english_pob_choice: rejoicing
  chosen_spanish: el regocijo
  alternatives_spanish:
  - un grito de alegría
  - gozo jubiloso
  - canto de alegría
  lexicon: HALOT
  rationale: La palabra puede referirse a un grito o canto de alegría. «Regocijo» mantiene un registro bíblico sobrio y amplio; el matiz vocal queda disponible como alternativa.
theological_decisions:
- issue: Referente de los sufijos posesivos en «su enojo» y «su favor»
  english_pob_reading: The suffixes refer to God, continuing the psalmist's address about the LORD in context.
  chosen_spanish_reading: Los sufijos se entienden como referentes a Dios, en continuidad con el contexto del salmo.
  alternative_spanish_readings:
  - referencia ambigua al sujeto del poema
  - aplicación general a cualquier autoridad
  rationale: El paralelismo contrasta el enojo divino con el favor divino. La traducción conserva esa tensión teológica sin explicitar más de lo que dice el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en el sentido de vincular el llanto con la noche y la mañana, evitando una expresión que sugiriera solo la tarde. Se mantuvo el paralelismo temporal noche/mañana y la imagen de permanencia nocturna del verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo Yahvé implícito/no explícito, porque el verso usa sufijos posesivos y no el nombre divino en superficie.
  - Se prefirió «enojo» frente a «ira» para no intensificar indebidamente el término hebreo en un paralelismo poético.
  - «Regocijo» se escogió como término amplio y bíblico, compatible con la alternativa de un grito o canto de alegría.
