    rationale: La instrucción pide preservar alternativas significativas especialmente cuando el English POB las conservó. Aquí se priorizó una nota nueva sobre «watchtower» en vez de la alternativa auditada sobre «caves/dens», alterando el equilibrio documental.
  - severity: low
