translation:
  language: es
  text: 'y si juras: «Vive Yahvé»[b], en verdad, en justicia y en rectitud, entonces las naciones se bendecirán[a] en él[c] y en él se gloriarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entonces las naciones serán bendecidas en él». El verbo hebreo puede entenderse reflexivamente («se bendecirán») o, menos probablemente aquí, con un sentido pasivo.'
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula juratoria hebrea: «Vive Yahvé».'
    reason: cultural_note
  - marker: c
    text: El pronombre «él» es ambiguo en el contexto; puede referirse a Israel/Judá restaurado, aunque algunos lo entienden como referido a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִשְׁבַּעְתָּ
  english_pob_choice: and if you swear
  chosen_spanish: y si juras
  alternatives_spanish:
  - y juras
  - entonces jurarás
  lexicon: HALOT
  rationale: La forma hebrea entra en una secuencia condicional; en español, «si juras» expresa mejor esa relación que un futuro o un simple coordinado. Se conserva el valor de juramento sin añadir contenido no presente.
- source_word: חַי יְהוָה
  english_pob_choice: ‘As the LORD lives,’
  chosen_spanish: «Vive Yahvé»
  alternatives_spanish:
  - «Vive el Yahvé»
  - «Por la vida de Yahvé»
  lexicon: HALOT
  rationale: Se mantiene la fórmula juratoria breve y reconocible en español. «Vive Yahvé» reproduce la estructura idiomática del hebreo sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre propio divino y evita la sustitución por «SEÑOR».
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con verdad
  - verdaderamente
  lexicon: HALOT
  rationale: La preposición y el sustantivo forman una expresión adverbial de sinceridad/veracidad. «En verdad» conserva la estructura nominal paralela con las frases siguientes.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: in justice
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta al orden justo o a la justicia recta en el obrar. «En justicia» mantiene el paralelismo triádico y la fuerza legal/covenantal del término.
- source_word: וּבִצְדָקָה
  english_pob_choice: and in righteousness
  chosen_spanish: y en rectitud
  alternatives_spanish:
  - y en justicia
  - y en justicia recta
  lexicon: HALOT
  rationale: Para evitar una repetición demasiado plana de «justicia», se traduce צְדָקָה como «rectitud», una opción fiel al campo semántico de integridad/uprightness. Mantiene la distinción respecto a מִשְׁפָּט sin perder el tono ético.
- source_word: וְהִתְבָּרְכוּ
  english_pob_choice: then nations will bless themselves
  chosen_spanish: entonces las naciones se bendecirán
  alternatives_spanish:
  - entonces las naciones serán bendecidas
  - entonces las naciones se bendecirán unas a otras
  lexicon: HALOT
  rationale: El hitpael de ברך permite lectura reflexiva; en español, «se bendecirán» comunica mejor esa forma verbal que una pasiva simple. Se conserva la alternativa pasiva en nota por la ambigüedad heredada del texto.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - por él
  lexicon: HALOT
  rationale: Se traduce literalmente el pronombre con preposición para preservar la ambigüedad del referente que el inglés POB también deja abierta. «En él» es la forma natural en español y mantiene la tensión interpretativa.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Naciones» es el equivalente más estándar y sobrio para גּוֹיִם en este contexto profético. El artículo definido refleja el grupo colectivo del hebreo.
- source_word: יִתְהַלָּלוּ
  english_pob_choice: they will boast
  chosen_spanish: se gloriarán
  alternatives_spanish:
  - se jactarán
  - se alabará́n
  lexicon: HALOT
  rationale: El hitpael de הלל puede expresar gloriarse/boast. Se elige «se gloriarán» porque es natural en español bíblico y menos coloquial que «se jactarán», sin perder el matiz de autoexaltación o regocijo orgulloso.
theological_decisions:
- issue: Alcance del juramento «Vive Yahvé»
  english_pob_reading: 'Hebrew oath formula: ''As the LORD lives.'''
  chosen_spanish_reading: 'Fórmula juratoria: «Vive Yahvé»'
  alternative_spanish_readings:
  - «Por la vida de Yahvé»
  - «Tan cierto como que Yahvé vive»
  rationale: La frase no describe la vida de Dios, sino una fórmula estable de juramento. En español conviene conservar su carácter idiomático y breve, sin explicitar demasiado el contenido del juramento en el cuerpo del texto.
  doctrine_reference: Terminología del nombre divino y preservación de fórmulas bíblicas
- issue: Referente de «en él»
  english_pob_reading: The pronoun is rendered literally as 'in him' without specifying the referent beyond the Hebrew syntax.
  chosen_spanish_reading: Se mantiene «en él» sin resolver el referente.
  alternative_spanish_readings:
  - en Yahvé
  - en Israel/Judá restaurado
  rationale: El hebreo deja el pronombre masculino singular sin antecedente explícito en la misma cláusula, y el POB inglés conserva esa ambigüedad. La traducción española debe reflejarla para no cerrar indebidamente la lectura profética.
  doctrine_reference: Preservar tensión interpretativa documentada
- issue: Reflexivo versus pasivo en «se bendecirán»
  english_pob_reading: then nations will bless themselves
  chosen_spanish_reading: 'Lectura reflexiva principal: «se bendecirán»'
  alternative_spanish_readings:
  - serán bendecidas
  - se bendecirán unas a otras
  rationale: El hitpael hebreo favorece una lectura reflexiva, aunque existe una posibilidad menos probable de sentido pasivo. Se deja constancia de ambas sin ocultar la preferencia morfológica del texto original.
  doctrine_reference: Morfología hebrea y ambigüedad verbal
- issue: Gloriarse como equivalente de הלל
  english_pob_reading: they will boast
  chosen_spanish_reading: «se gloriarán»
  alternative_spanish_readings:
  - «se jactarán»
  - «se alabarán»
  rationale: El verbo en hitpael puede implicar vanagloria o gloriarse. «Se gloriarán» comunica dignidad retórica sin volver el registro innecesariamente áspero en español moderno.
  doctrine_reference: Lexical force of הלל in reflexive use
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con la revisión más reciente: no se requirieron cambios sustantivos respecto del sentido auditado. La versión española preserva la ambigüedad del pronombre, la forma reflexiva de ברך y la fórmula juratoria tradicional, con adaptación natural al español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden a este versículo ni al nombre divino aquí presente.
  - Se distinguió «justicia» de «rectitud» para reflejar el paralelismo hebreo מִשְׁפָּט / צְדָקָה.
  - La puntuación conserva el arranque condicional y el cierre explicativo, de acuerdo con el flujo sintáctico del hebreo.
