    text: 'O: «sirvamos en el servicio de Yahvé»; el hebreo repite la raíz de «servir» para enfatizar el servicio cultual.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sacrificios de comunión» u «ofrendas de paz».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «mañana», a menudo con sentido de «en el futuro» o «más adelante».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «No tienen porción en Yahvé».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto para mejorar la fidelidad semántica y la naturalidad del español: se reemplaza la construcción poco idiomática «sirvamos el servicio» por «realicemos el servicio»; se traslada el literal hebreo «mañana» a una nota y se expresa en el texto el sentido contextual «en el futuro»; se añade la alternativa «porción» para חֵלֶק, en línea con el rastro inglés; y se suaviza la expresión sobre las generaciones futuras para una lectura más natural.'
