    rationale: La nota b explica la posible lectura de הַקְּרִיּוֹת como 'las ciudades'. Debe marcar el topónimo en el texto principal, no el verbo posterior, para evitar ambigüedad exegética.
  - severity: medium
    issue: 'Error gramatical en la nota a: ''las palacios'''
    rationale: Debe ser 'los palacios'. El error afecta la corrección formal del aparato crítico.
  - severity: low
    issue: '''entre tumulto'' suena poco natural'
    rationale: No es infiel, pero 'en medio del tumulto' o 'en medio de tumulto' resulta más idiomático en español bíblico actual y expresa mejor el valor circunstancial de בְּשָׁאוֹן.
