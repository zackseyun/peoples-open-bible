translation:
  language: es
  text: Neftalí es una cierva suelta[b][a], que da palabras hermosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una cierva dejada en libertad». El hebreo presenta la imagen de una hembra de ciervo liberada para correr libremente.'
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula también puede entenderse de otras maneras en la interpretación antigua y moderna, por ejemplo: «que da dichos hermosos» o, con otro sentido propuesto para las últimas palabras, «que lleva hermosas crías».'
    reason: alternative_reading
lexical_decisions:
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  - Naftalí
  lexicon: HALOT
  rationale: Nombre propio de la tribu/persona; en español bíblico se translitera como Neftalí, forma clara y reconocible.
- source_word: אַיָּלָה
  english_pob_choice: doe
  chosen_spanish: cierva
  alternatives_spanish:
  - venada
  - cierva
  - gacela hembra
  lexicon: HALOT
  rationale: El término hebreo designa una hembra de ciervo. 'Cierva' preserva el rasgo femenino y suena natural en español contemporáneo, más que un calco rígido.
- source_word: שְׁלֻחָה
  english_pob_choice: let loose
  chosen_spanish: soltada
  alternatives_spanish:
  - soltada
  - liberada
  - dejada libre
  lexicon: HALOT
  rationale: La forma pasiva participial comunica una imagen de ser soltada para correr libremente. 'Soltada' reproduce esa fuerza breve y poética sin perder naturalidad.
- source_word: הַנֹּתֵן
  english_pob_choice: giving
  chosen_spanish: que da
  alternatives_spanish:
  - que da
  - dando
  - dadora
  lexicon: HALOT
  rationale: El participio masculino con artículo funciona de modo predicativo en poesía. En español, 'que da' mantiene la fluidez y permite conservar la tensión sintáctica del hebreo sin resolverla de más.
- source_word: אִמְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: El constructo plural de אמר refiere a expresiones dichas. 'Palabras' es la opción más natural y suficientemente amplia para el español.
- source_word: שָׁפֶר
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - hermosas
  - bellas
  - agradables
  lexicon: HALOT
  rationale: El término expresa belleza o agradable calidad. 'Hermosas' comunica bien la valoración estética en español sin cargar el verso con una tonalidad arcaizante.
theological_decisions:
- issue: Relación sintáctica entre la imagen de la cierva y la cláusula final
  english_pob_reading: '''Naphtali is a doe let loose, giving beautiful words.'' The clause is left broadly appositional/metaphorical, preserving the Hebrew poetic ambiguity.'
  chosen_spanish_reading: '''Neftalí es una cierva soltada, que da palabras hermosas.'' La cláusula se mantiene vinculada a la imagen, sin forzar si describe a Neftalí o continúa la metáfora de la cierva.'
  alternative_spanish_readings:
  - '''Neftalí es una cierva soltada, dando palabras hermosas.'''
  - '''Neftalí es una cierva soltada, que produce palabras hermosas.'''
  - '''Neftalí es una cierva soltada, que da hermosas crías.'''
  rationale: El hebreo es muy conciso y admite más de una relación sintáctica. La versión española conserva esa tensión interpretativa en lugar de resolverla de manera prematura, siguiendo el criterio de la POB de no borrar ambigüedades genuinas.
  doctrine_reference: Preservar ambigüedad literaria y lexical cuando el texto fuente la permite; no imponer una lectura dogmática donde el hebreo es poético y abierto.
translation_notes:
  revision_awareness: El audit trail inglés revisó la primera redacción de 'set free' a 'let loose' para reflejar con mayor literalidad y fluidez la pasiva participial de שְׁלֻחָה. La versión española adopta 'soltada', que conserva esa misma decisión de imagen dinámica y concisa. También mantiene la apertura interpretativa de הַנֹּתֵן אִמְרֵי שָׁפֶר sin cerrar la ambigüedad del sujeto o del complemento.
  spanish_consistency_notes:
  - Usar 'Neftalí' como forma del nombre propio.
  - Mantener 'cierva' para אַיָּלָה en este contexto poético.
  - Conservar un ritmo breve y paralelo, evitando expandir el verso más allá de lo necesario.
  - No sustituir la ambigüedad final por una paráfrasis explicativa en el cuerpo del texto; usar la nota para las alternativas.
