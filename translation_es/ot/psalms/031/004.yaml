- from: Porque tú eres mi roca y mi fortaleza[a][b]; por amor de tu nombre, tú me guiarás y me conducirás[c].
  to: Porque tú eres mi roca y mi fortaleza[b][a]; por causa de tu nombre, me guiarás y me conducirás[c].
