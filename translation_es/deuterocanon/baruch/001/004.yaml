    issue: '''en presencia de'' para ἐν ὠσίν'
    rationale: El griego idiomático apunta a que algo fue leído o dicho para que ciertos grupos lo oyeran. 'En presencia de' describe mera presencia física y debilita el sentido auditivo conservado por el inglés POB.
  - severity: medium
    issue: Falta una nota para la alternativa de υἱῶν τῶν βασιλέων
    rationale: El rastro inglés preserva la posibilidad 'the princes'. En español, 'príncipes' también es una alternativa relevante y debe conservarse en nota si se mantiene 'hijos de los reyes' en el texto principal.
  - severity: low
    issue: '''desde el más pequeño hasta el más grande'' suena algo rígido'
    rationale: No es incorrecto, pero 'desde el menor hasta el mayor' es más natural en español e igualmente fiel a la merisma del original.
