    reason: lexical_alternative
  revision_rationale: Se reemplaza «puse mi corazón» por «lo tomé a pecho» para expresar en español natural la reflexión interior e internalización del ejemplo observado. La nota preserva la alternativa literal hebrea documentada en la auditoría inglesa. Se mantiene «recibí instrucción» por su buena correspondencia con מוּסָר en contexto sapiencial.
