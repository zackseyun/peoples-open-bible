translation:
  language: es
  text: Y pondrás las dos piedras sobre las hombreras del efod, como piedras memoriales[a] para los hijos de Israel[b]; y Aarón llevará sus nombres delante de Yahvé sobre sus dos hombros, como memorial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «piedras conmemorativas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel», expresión de alianza que suele referirse al pueblo de Israel en su conjunto.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: And you shall set
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás allí
  lexicon: HALOT
  rationale: El hebreo usa un verbo de poner/colocar en imperativo; 'pondrás' conserva la acción directa y el mandato en segunda persona singular, con español natural y sobrio.
- source_word: שְׁתֵּי הָאֲבָנִים
  english_pob_choice: the two stones
  chosen_spanish: las dos piedras
  alternatives_spanish:
  - las dos piedras
  - ambas piedras
  lexicon: HALOT
  rationale: Se conserva el numeral y el sustantivo concreto sin añadir identificación mineral que el versículo no expresa aquí.
- source_word: כִּתְפֹת הָאֵפֹד
  english_pob_choice: the shoulder pieces of the ephod
  chosen_spanish: las hombreras del efod
  alternatives_spanish:
  - los hombros del efod
  - las partes de hombro del efod
  lexicon: HALOT
  rationale: En contexto de vestidura sacerdotal, כְּתֵפֹת no son hombros humanos sino piezas/soportes de la prenda; 'hombreras' comunica esa función en español sin perder la imagen corporal implícita.
- source_word: אַבְנֵי זִכָּרֹן
  english_pob_choice: memorial stones
  chosen_spanish: piedras de memorial[a]
  alternatives_spanish:
  - piedras de recuerdo
  - piedras conmemorativas
  lexicon: HALOT
  rationale: La construcción puede entenderse como 'piedras de memorial' o 'de recuerdo'. Se mantiene 'memorial' porque refleja el uso litúrgico y objetivo de la frase, y el pie de nota preserva la alternativa léxica.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel[b]
  alternatives_spanish:
  - para los hijos de Israel
  - para los israelitas
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación filial del hebreo ('hijos'), que en este contexto es una expresión de alianza y pertenencia; la nota explica el valor colectivo que en español podría quedar implícito.
- source_word: וְנָשָׂא ... אֶת שְׁמוֹתָם
  english_pob_choice: and Aaron shall bear their names
  chosen_spanish: y Aarón llevará sus nombres
  alternatives_spanish:
  - y Aarón cargará sus nombres
  - y Aarón portará sus nombres
  lexicon: HALOT
  rationale: '''Llevar'' transmite de manera natural la idea de נשׂא en un contexto sacerdotal de representación delante de Dios, sin perder la noción de carga/porte.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. ''Delante de'' conserva la relación espacial/ritual del hebreo לִפְנֵי.'
- source_word: עַל שְׁתֵּי כְתֵפָיו
  english_pob_choice: on his two shoulders
  chosen_spanish: sobre sus dos hombros
  alternatives_spanish:
  - encima de sus dos hombros
  - en sus dos hombros
  lexicon: HALOT
  rationale: Aquí el hebreo pasa de las piezas de la prenda a los hombros de Aarón; 'hombros' evita confusión y mantiene la duplicación enfática.
- source_word: לְזִכָּרֹן
  english_pob_choice: for remembrance
  chosen_spanish: para memorial
  alternatives_spanish:
  - para recuerdo
  - como memorial
  lexicon: HALOT
  rationale: '''Memorial'' preserva la conexión verbal con זִכָּרֹן del mismo versículo y funciona bien en registro bíblico; se evita neutralizarlo a un simple ''recuerdo''.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La convención del proyecto en español es 'Yahvé', manteniendo el nombre divino en lugar de ocultarlo bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Valor colectivo y covenantal de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - el pueblo de Israel
  - los israelitas
  rationale: Se conserva el lenguaje filial explícito del hebreo. Aunque en español puede sonar más natural 'pueblo de Israel', la forma elegida retiene la imagen de familia de pacto y la marca textual del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés muestra alta concordancia y sin revisiones sustantivas. Se preservaron las decisiones clave: el nombre divino como Yahvé, el valor concreto de las piedras y la expresión filial ''hijos de Israel'', trasladándolas a un español natural sin perder la tensión léxica del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con la terminología del proyecto para יְהוָה.
  - '''Memorial'' se usó dos veces para conservar la repetición lexical de זִכָּרֹן/לְזִכָּרֹן.'
  - '''Hombreras'' distingue claramente las piezas del efod de los hombros de Aarón en la segunda mitad del versículo.'
  - Se conservó el paralelismo entre 'delante de Yahvé' y 'para memorial' sin añadir explicación intratextual.
  - La puntuación refleja una sola oración coordinada, como en el hebreo.
