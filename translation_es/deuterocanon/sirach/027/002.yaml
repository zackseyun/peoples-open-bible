translation:
  language: es
  text: Entre las juntas de las piedras se fijará una clavija[a], y entre la venta y la compra[b] quedará encajado el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se clavará» o «quedará firmemente fijada»; la imagen es la de una clavija o estaca pequeña asentada entre las juntas de las piedras.
    reason: lexical_alternative
  - marker: b
    text: La imagen es que, así como una clavija queda metida entre las juntas de las piedras, así el pecado se introduce entre el vendedor y el comprador en una transacción.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνὰ μέσον
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre medio de
  lexicon: LSJ
  rationale: El griego indica posición intermedia entre dos elementos. «Entre» es la forma natural y precisa en español para conservar la imagen repetida del paralelo.
- source_word: ἁρμῶν λίθων
  english_pob_choice: joints of stones
  chosen_spanish: las juntas de las piedras
  alternatives_spanish:
  - las junturas de las piedras
  - las uniones de las piedras
  - las grietas de las piedras
  lexicon: LSJ
  rationale: ἁρμός remite a la unión o junta entre piedras en mampostería. «Juntas» preserva la imagen arquitectónica sin volverla demasiado técnica; «grietas» sería más interpretativo que el griego.
- source_word: παγήσεται
  english_pob_choice: will be driven in
  chosen_spanish: se fijará
  alternatives_spanish:
  - será clavado
  - se hincará
  - será puesto firmemente
  lexicon: LSJ
  rationale: El pasivo de πήγνυμι expresa quedar firmemente colocado. «Se fijará» mantiene la idea de quedar asentado en su lugar y es más natural en español que una expresión demasiado mecánica.
- source_word: πάσσαλος
  english_pob_choice: peg
  chosen_spanish: un clavo
  alternatives_spanish:
  - un clavo de madera
  - una estaca
  - un perno
  lexicon: LSJ
  rationale: El término designa un objeto de sujeción insertado con firmeza. «Clavo» transmite en español la idea de algo fijado entre piedras con claridad; «estaca» puede sonar demasiado grande en este contexto.
- source_word: πράσεως
  english_pob_choice: selling
  chosen_spanish: vender
  alternatives_spanish:
  - la venta
  - el vender
  lexicon: LSJ
  rationale: El sustantivo nombra el acto de vender. «Vender» conserva el paralelismo verbal con «comprar» y resulta idiomático en español.
- source_word: ἀγορασμοῦ
  english_pob_choice: buying
  chosen_spanish: comprar
  alternatives_spanish:
  - la compra
  - el comprar
  - la adquisición
  lexicon: LSJ
  rationale: El sustantivo nombra el acto de comprar. «Comprar» mantiene el contraste directo con «vender» y la concisión proverbial del griego.
- source_word: συντριβήσεται
  english_pob_choice: will be wedged in
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será aplastado
  - será quebrantado
  - quedará atascado
  lexicon: LSJ
  rationale: El audit trail inglés ya había corregido «crushed» hacia una idea de quedar trabado/atrapado entre dos cosas. En español, «será atrapado» conserva esa noción de quedar preso entre compra y venta, sin perder el tono proverbial.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el mal
  - la culpa
  - la falta
  lexicon: LSJ
  rationale: «Ἁμαρτία» conserva su fuerza moral y teológica como «pecado». En español, el artículo definido ayuda a personificar la realidad moral que queda atrapada entre las transacciones.
theological_decisions:
- issue: Cómo expresar la fuerza moral de ἁμαρτία en un proverbio comercial
  english_pob_reading: sin will be wedged in between selling and buying
  chosen_spanish_reading: el pecado será atrapado entre vender y comprar
  alternative_spanish_readings:
  - el pecado será aplastado entre vender y comprar
  - el pecado quedará atrapado en la transacción
  rationale: El texto no reduce el problema a mera falta comercial; mantiene la categoría ética amplia de pecado. «Será atrapado» conserva la imagen de quedar preso o implicado en el intercambio, en línea con la revisión inglesa que privilegia la idea de quedar encajado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación imagética entre la piedra y el comercio
  english_pob_reading: A peg will be driven in between the joints of stones, and sin will be wedged in between selling and buying.
  chosen_spanish_reading: Entre las juntas de las piedras se fijará un clavo, y entre vender y comprar será atrapado el pecado.
  alternative_spanish_readings:
  - Entre las juntas de las piedras se clavará un clavo, y entre vender y comprar quedará trabado el pecado.
  rationale: 'La comparación debe leerse como paralela: así como el objeto queda firmemente asentado entre piedras, así el pecado queda implicado entre las partes del intercambio. La formulación elegida preserva esa analogía sin añadir explicaciones ajenas al verso.'
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El texto inglés más reciente cambió «crushed» por «wedged in» para reflejar mejor la imagen de quedar encajado entre dos elementos. La versión española sigue esa revisión con «será atrapado», evitando una traducción demasiado literal como «será aplastado» y conservando el paralelismo entre la junta de piedras y el intercambio comercial.
  spanish_consistency_notes:
  - Se mantiene «pecado» para ἁμαρτία conforme al uso teológico normal de POB.
  - Se usa «entre» para reproducir el doble ἀνὰ μέσον del griego.
  - Se evita «Cristo»/terminología cristológica, no pertinente al pasaje.
  - La puntuación sigue el paralelismo poético del hebraísmo/gnomología del verso.
