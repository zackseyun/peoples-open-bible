  yaml_path: translation/ot/proverbs/023/031.yaml
  text: Do not look at wine when it is red[a], when it sparkles in the cup[b], when it goes down smoothly.
  footnotes:
  - marker: a
    text: Literally, 'when it gives its eye in the cup,' a Hebrew idiom for wine's attractive appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'when it goes along in straightness'; the sense here is that the wine goes down easily or smoothly.
    reason: lexical_alternative
