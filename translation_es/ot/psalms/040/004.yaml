translation:
  language: es
  text: Puso en mi boca un cántico nuevo, un cántico de alabanza[a] a nuestro Dios. Muchos verán y temerán[b], y confiarán en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'alabanza a nuestro Dios'.
    reason: previous_rendering
  - marker: b
    text: O 'quedarán sobrecogidos'. El verbo hebreo puede expresar temor, reverencia o asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He put
  chosen_spanish: Puso
  alternatives_spanish:
  - Puso
  - Colocó
  - Puso en
  lexicon: HALOT
  rationale: נתן en esta construcción con 'en mi boca' expresa una colocación concreta. 'Puso' conserva la imagen corporal y suena natural en español sin diluir la acción divina.
- source_word: בְּפִי
  english_pob_choice: in my mouth
  chosen_spanish: en mi boca
  alternatives_spanish:
  - en mis labios
  - en mi boca
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'en mi boca'. 'En mi boca' preserva la imagen; 'en mis labios' sería más idiomático, pero menos literal.
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - un canto nuevo
  - un cántico nuevo
  - una canción nueva
  lexicon: HALOT
  rationale: '''שִׁיר'' puede ser canto/cántico/canción. ''Cántico'' mantiene mejor el tono bíblico y litúrgico; ''nuevo'' modifica directamente a ''cántico''.'
- source_word: תְּהִלָּה לֵאלֹהֵינוּ
  english_pob_choice: a song of praise to our God
  chosen_spanish: una canción de alabanza a nuestro Dios
  alternatives_spanish:
  - una alabanza a nuestro Dios
  - un cántico de alabanza a nuestro Dios
  - una canción de alabanza a nuestro Dios
  lexicon: HALOT
  rationale: La frase funciona en aposición, especificando la clase o contenido del cántico nuevo. 'Canción de alabanza' refleja bien la idea de un himno de alabanza y evita una construcción poco natural como 'una alabanza'.
- source_word: יִרְא֣וּ רַבִּ֣ים
  english_pob_choice: Many will see
  chosen_spanish: Muchos verán
  alternatives_spanish:
  - Muchos verán
  - Verán muchos
  lexicon: HALOT
  rationale: 'El imperfecto aquí expresa consecuencia futura: otros observarán lo que Dios ha hecho. ''Muchos verán'' mantiene la sencillez y el énfasis en la multitud.'
- source_word: וְ/יִירָ֑אוּ
  english_pob_choice: and fear
  chosen_spanish: y temerán
  alternatives_spanish:
  - y temerán
  - y estarán en awe
  - y reverenciarán
  lexicon: HALOT
  rationale: ירא puede significar temor, reverencia o sobrecogimiento. 'Temerán' conserva la tensión teológica del texto mejor que suavizarlo a 'reverenciarán'.
- source_word: וְ֝/יִבְטְח֗וּ בַּ/יהוָֽה
  english_pob_choice: and will trust in Yahweh
  chosen_spanish: y confiarán en Yahvé
  alternatives_spanish:
  - y confiarán en Yahvé
  - y pondrán su confianza en Yahvé
  lexicon: HALOT
  rationale: בטח se traduce con 'confiar' o 'poner la confianza'. 'Confiarán' es natural y fiel. YHWH se rinde como 'Yahvé' según el criterio del proyecto para el nombre divino.
theological_decisions:
- issue: Nombre divino YHWH / יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El hebreo usa el Tetragrama directamente. En español, el proyecto pide 'Yahvé' como forma principal, evitando el ocultamiento mediante 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance of ירא in response to seeing God's work
  english_pob_reading: fear
  chosen_spanish_reading: temerán
  alternative_spanish_readings:
  - estarán en awe
  - reverenciarán
  - temerán
  rationale: El verso mantiene la secuencia ver → temer → confiar. 'Temerán' conserva la tensión entre temor y reverencia sin resolverla en un término más débil.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés donde תְּהִלָּה se entendió como 'a song of praise', reflejada aquí como 'una canción de alabanza'. También se mantiene la decisión auditada de traducir el Tetragrama con el nombre divino explícito, no con un sustituto reverencial.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה, coherente con el criterio del proyecto.
  - Se prefirió 'cántico'/'canción de alabanza' para conservar la relación apposicional entre 'cántico nuevo' y 'תְּהִלָּה'.
  - 'Se conservó el paralelismo verbal futuro: verán / temerán / confiarán.'
  - No se suavizó ירא a un equivalente meramente devocional; se dejó la tensión temerosa del hebreo.
