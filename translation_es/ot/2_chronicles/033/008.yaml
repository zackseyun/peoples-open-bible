translation:
  language: es
  text: Y no volveré a quitar el pie de Israel de sobre la tierra que designé para sus padres[a], con tal de que cuiden de hacer todo lo que les mandé, conforme a toda la ley, los estatutos y los juicios dados por medio de Moisés[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el pie de Israel», un modismo para la presencia o permanencia de Israel en la tierra.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por mano de Moisés».
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹסִיף לְהָסִיר
  english_pob_choice: I will no longer remove
  chosen_spanish: no volveré a quitar
  alternatives_spanish:
  - no quitaré otra vez
  - ya no haré salir
  lexicon: HALOT
  rationale: La combinación verbal expresa una acción futura negada con idea de repetición o continuación interrumpida. «No volveré a quitar» reproduce bien esa fuerza en español natural sin perder el matiz de reiteración negada.
- source_word: רֶגֶל יִשְׂרָאֵל
  english_pob_choice: the foot of Israel
  chosen_spanish: el pie de Israel
  alternatives_spanish:
  - el pie de Israel sobre la tierra
  - Israel
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «Pie» mantiene el idioma idiomático que alude a la permanencia/presencia de Israel en la tierra, en lugar de reemplazarlo por una paráfrasis más interpretativa.
- source_word: מֵעַל הָאֲדָמָה
  english_pob_choice: from upon the land
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de la tierra
  - fuera de la tierra
  lexicon: HALOT
  rationale: «De sobre» reproduce la preposición compuesta con mayor fidelidad que un simple «de». «Tierra» es la opción más natural en español para el contexto de heredad pactal.
- source_word: אֲשֶׁר הֶעֱמַדְתִּי
  english_pob_choice: that I appointed
  chosen_spanish: que establecí
  alternatives_spanish:
  - que designé
  - que hice estar
  lexicon: HALOT
  rationale: El causativo de עמד aquí apunta a asentar/establecer en un lugar. «Establecí» conserva la idea de fijación divina en la tierra sin sonar demasiado abstracto o forzado.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: for your fathers
  chosen_spanish: para sus padres
  alternatives_spanish:
  - para sus antepasados
  - a sus padres
  lexicon: HALOT
  rationale: Se mantiene la expresión covenantal «padres» por ser equivalente al hebreo y por conservar la línea histórico-familiar del texto.
- source_word: רַק אִם
  english_pob_choice: if only
  chosen_spanish: con tal de que
  alternatives_spanish:
  - solo si
  - si únicamente
  lexicon: HALOT
  rationale: La frase introduce una condición estricta. «Con tal de que» expresa bien la restricción en español moderno y preserva el carácter condicional fuerte del hebreo.
- source_word: יִשְׁמְרוּ לַעֲשׂוֹת
  english_pob_choice: they are careful to do
  chosen_spanish: cuiden de hacer
  alternatives_spanish:
  - se esfuercen por hacer
  - tengan cuidado de hacer
  lexicon: HALOT
  rationale: El verbo implica guardar/observar con diligencia, no solo realizar de modo mecánico. «Cuiden de hacer» comunica esa vigilancia obediente con naturalidad en español.
- source_word: כָּל אֲשֶׁר צִוִּיתִי/ם
  english_pob_choice: all that I commanded them
  chosen_spanish: todo lo que les mandé
  alternatives_spanish:
  - todo lo que les ordené
  - todo lo que les he mandado
  lexicon: HALOT
  rationale: «Mandar» es un equivalente directo y claro de צוה. Se conserva la referencia a los destinatarios del mandato con el pronombre dativo «les».
- source_word: לְכָל הַתּוֹרָה
  english_pob_choice: according to all the law
  chosen_spanish: conforme a toda la ley
  alternatives_spanish:
  - según toda la ley
  - de acuerdo con toda la ley
  lexicon: HALOT
  rationale: En este listado legal, «ley» es la equivalencia más clara de תורה para lectores actuales. «Conforme a» reproduce bien el valor normativo del lamed.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - las ordenanzas
  - los decretos
  lexicon: HALOT
  rationale: «Estatutos» mantiene una distinción útil frente a «ley» y «juicios», y sigue siendo una palabra reconocible en registros bíblicos en español.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las decisiones
  - las ordenanzas
  lexicon: HALOT
  rationale: «Juicios» conserva la fuerza jurídica del término hebreo y mantiene la tríada legal del verso. Aunque menos usual en español común, aquí es suficientemente transparente y fiel.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: given through Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática del hebreo, que puede entenderse como mediación. Dado que la POB inglesa preservó esa alternativa en nota, el español la deja en el texto principal por su valor source-grounded.
theological_decisions:
- issue: Condición real de permanencia en la tierra
  english_pob_reading: The verse states a real condition for continued dwelling in the land without importing broader theological conclusions beyond this covenantal context.
  chosen_spanish_reading: El versículo presenta una condición real para que Israel siga en la tierra, sin resolver debates teológicos más amplios fuera de este contexto pactal.
  alternative_spanish_readings:
  - Es una garantía incondicional de posesión permanente
  - Es una condición puramente retórica sin contingencia real
  rationale: El hebreo establece claramente la cláusula condicional («con tal de que»), así que la traducción debe preservar la tensión entre promesa y obediencia. No conviene suavizarla hacia una garantía absoluta ni hacia una mera figura retórica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El último pase de revisión indicó que no había cambios necesarios; se mantuvo el sentido del borrador base y se ajustó la formulación española para conservar la imagen idiomática y la condición pactal con un estilo publicable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma base del proyecto solo cuando apareciera el nombre divino explícito; en este versículo no aparece.
  - «Ley, estatutos y juicios» preserva la tríada legal del hebreo y la del inglés auditado.
  - La nota sobre «por mano de Moisés» conserva la alternativa lexical documentada por la POB inglesa.
  - Se evitó sustituir la imagen de «pie» por una paráfrasis interpretativa, para no borrar la tensión lexical documentada.
