translation:
  language: es
  text: Todos los días de su separación para Yahvé no se acercará[a] a un cadáver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "no entrará cerca"; el hebreo usa un verbo de venir/ir que aquí funciona como prohibición de aproximarse.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "un alma muerta"; es decir, un cadáver humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Durante todos los días de
  - A lo largo de todos los días de
  lexicon: HALOT
  rationale: La construcción hebrea marca la totalidad del período; en español, "Todos los días de" conserva la extensión completa sin volver la frase pesada.
- source_word: הַזִּירוֹ
  english_pob_choice: his separation
  chosen_spanish: su separación
  alternatives_spanish:
  - su nazareato
  - su voto de nazareo
  - su consagración
  lexicon: HALOT
  rationale: El sustantivo alude al estado o período de separación nazarea. "Su separación" mantiene la relación con la raíz y evita introducir "voto" en el texto principal, como en el POB inglés.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: La preposición expresa dedicación o pertenencia. Se conserva el nombre divino como "Yahvé" según la terminología del proyecto, y "para" comunica bien la consagración.
- source_word: עַל נֶפֶשׁ מֵת
  english_pob_choice: near a dead body
  chosen_spanish: a un cadáver
  alternatives_spanish:
  - a un cuerpo muerto
  - a una persona muerta
  lexicon: HALOT
  rationale: En contexto de pureza legal, la expresión hebrea designa un cadáver humano. "Cadáver" es natural en español y evita una traducción literal poco idiomática de "alma muerta".
- source_word: לֹא יָבֹא
  english_pob_choice: he shall not go near
  chosen_spanish: no se acercará
  alternatives_spanish:
  - no entrará
  - no irá
  lexicon: HALOT
  rationale: El hebreo usa un verbo de venir/entrar con la prohibición idiomática de aproximarse. "No se acercará" reproduce esa fuerza legal de manera clara y natural.
theological_decisions:
- issue: Terminología nazarea sin sobreinterpretar el sustantivo hebreo
  english_pob_reading: his separation
  chosen_spanish_reading: su separación
  alternative_spanish_readings:
  - su nazareato
  - su consagración
  - su voto de nazareo
  rationale: El hebreo nombra el estado o período de separación, no explícitamente un "voto". Mantener "su separación" conserva la tensión lexical y deja que el contexto de Números 6 identifique la institución nazarea.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento de YHWH
  english_pob_reading: the LORD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide Yahvé para יהוה en el texto principal. Aquí la dedicación del nazareo es explícitamente "para Yahvé", sin necesidad de máscara reverencial.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: ניֶפֶשׁ מֵת como expresión de impureza por contacto con un muerto
  english_pob_reading: a dead body
  chosen_spanish_reading: un cadáver
  alternative_spanish_readings:
  - un cuerpo muerto
  - una persona muerta
  rationale: La lectura inglesa aclara que se trata de un cuerpo humano muerto. "Cadáver" expresa con precisión la realidad ritual y legal sin introducir una paráfrasis doctrinal.
  doctrine_reference: Pureza ritual / contacto con los muertos en Núm 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la idea de período de separación, mantiene Yahvé en lugar de una máscara como "SEÑOR" y resuelve el giro ritual de נֶפֶשׁ מֵת con "cadáver" para claridad pública.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" conforme al estándar del proyecto para יהוה.
  - '"Separación" conserva la ambigüedad lexical documentada entre estado nazareo y consagración, sin añadir "voto" al texto principal.'
  - '"No se acercará" refleja una prohibición legal y es coherente con la sintaxis reverente y pública del conjunto.'
  - '"Cadáver" evita un calco semánticamente opaco y sigue la aclaración del audit trail sobre un cuerpo humano muerto.'
