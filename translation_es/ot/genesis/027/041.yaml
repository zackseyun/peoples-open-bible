  rationale: Se reemplaza «aborreció» por «odió» para alinearse mejor con la revisión final del English POB y con un español más natural y ampliamente legible. Se elimina la nota [d] por no corresponder a una alternativa textual o ambigüedad relevante según la política de notas. También se quita la coma en «Jacob mi hermano» para una formulación más directa y fiel.
