translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto quedó confirmado como estable. La versión española sigue ese estado de alta concordancia, manteniendo la secuencia territorial, la identificación explicativa de Chesalón y la lectura direccional de יָמָּה como occidente.
  spanish_consistency_notes:
  - 'Se mantiene la transliteración de topónimos de forma consistente: Baalá, Seir, Yearim, Chesalón, Bet-semes y Timná.'
  - 'Se conserva la progresión verbal del límite con un español natural: se volvió, pasó, descendió, pasó.'
  - La nota de pie de página se ancla en «occidente» para reflejar el valor idiomático de la dirección hebrea.
  - No se usa «SEÑOR» ni terminología teológica innecesaria, porque el versículo no la requiere.
