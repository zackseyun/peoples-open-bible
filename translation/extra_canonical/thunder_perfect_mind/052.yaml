translation:
  text: 'I am the one you have thought about[a],

    and you have mocked me.

    I am unlearned, and from me they learn.

    I am she whom you have scorned[g][f][e][d][c][b],

    and you think about me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Hidden” could also be rendered “concealed.”
    reason: lexical_alternative
  - marker: b
    text: “Unlearned” could be “ignorant” or “uneducated,” but those carry stronger
      pejorative tone.
    reason: lexical_alternative
  - marker: c
    text: “They learn from me” reflects the idiom “out from me”; some prefer “they
      are taught by me.”
    reason: lexical_alternative
  - marker: d
    text: “Scorned” can be translated “despised.”
    reason: lexical_alternative
  - marker: e
    text: The consult block reads “law / lawless,” which does not match this Coptic
      segment; this likely belongs to a different mapped line. The last ⲁⲛⲟⲕ ⲡⲉⲛ is
      truncated here.
    reason: alignment_note
  - marker: f
    text: Or 'and the one you have hidden.'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the one you have scorned,\nand the one you think about.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Layton; Lambdin (Coptic copular use)
  rationale: Thunder’s voice cadence hinges on repeated first-person copular statements;
    render explicitly as “I am” to preserve rhythm and authority.
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  chosen: think about
  alternatives:
  - consider
  - reflect on
  - imagine
  lexicon: Crum; Layton
  rationale: ⲙⲉⲉⲩⲉ with ⲉⲣⲟ- marks the object of thought (“about me”); “think about”
    is direct and colloquial without losing force.
- source_word: ϣⲟⲥⲧ
  chosen: hide
  alternatives:
  - conceal
  lexicon: Crum
  rationale: Basic sense is to conceal/keep hidden; “hide” is the simplest, strongest
    verb in English and pairs well antithetically with “think about.”
- source_word: ⲁⲧⲥⲃⲱ
  chosen: unlearned
  alternatives:
  - ignorant
  - uneducated
  lexicon: Crum
  rationale: ⲁⲧ- negates ⲥⲃⲱ (learned/wise/knowledgeable). “Unlearned” preserves the
    paradox without pejorative overtones of “ignorant.”
- source_word: ϫⲓⲥⲃⲱ ⲉⲃⲟⲗ ⲛ̄ⲧⲟⲟⲧ
  chosen: they learn from me
  alternatives:
  - they are taught by me
  - they study from me
  lexicon: Crum; Layton
  rationale: ϫⲓⲥⲃⲱ is intransitive “learn, acquire instruction”; the prepositional
    phrase literally “out from me” is idiomatic “from me.”
- source_word: ⲕⲁⲧⲁⲫⲣⲟⲛⲓ
  chosen: scorned
  alternatives:
  - despised
  lexicon: Greek loan (καταφρονέω) via Coptic lists
  rationale: Both are valid; “scorned” keeps harshness and fits the poetic meter;
    “despised” remains a viable alternative.
- source_word: ⲧⲛ̄ⲙⲉⲉⲩⲉ ⲉⲣⲟⲉⲓ
  chosen: you think about
  alternatives:
  - you consider
  - you reflect on
  lexicon: Crum; Layton
  rationale: Maintain the same verb as earlier for deliberate parallelism, with second-person
    plural subject preserved implicitly in English context.
parallelism_check: 'The rendering keeps clear antithetical couplets: (thought about
  // hidden), (unlearned // they learn from me), (scorned // think about). Repeated
  “I am” openings are preserved to sustain the anaphora and paradox cadence.'
voice_check: First-person declarative authority is retained with explicit “I am” clauses.
  The addressees remain second-person plural in context, and the shift to third-person
  “they” heightens the paradox without diluting the speaker’s voice.
alignment_risk_note: Alignment confidence is medium and the consult block (“law /
