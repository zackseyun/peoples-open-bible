translation:
  language: es
  text: Hizo diez lampadarios[a] de oro, según su diseño prescrito, y los colocó en el templo[b][c], cinco a la derecha y cinco a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según su ordenanza» o «según su patrón». El término hebreo puede denotar una norma, procedimiento o diseño prescrito.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cinco a la derecha y cinco a la izquierda»; según la orientación del templo, esto puede corresponder al lado sur y al lado norte.'
    reason: cultural_note
  - marker: c
    text: O «en la sala principal» o «en el santuario». El hebreo se refiere al edificio del templo propiamente dicho, no al complejo en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Hizo fabricar
  - Fabricó
  lexicon: HALOT
  rationale: El qal wayyiqtol de עשה expresa acción narrativa simple. En español, «hizo» comunica de forma natural y directa la acción de fabricar u ഒരുക്കar sin sobrecargar el texto.
- source_word: מְנֹרוֹת
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - menorás
  - lámparas
  lexicon: HALOT
  rationale: מְנוֹרָה designa un soporte para lámpara; en español bíblico-readable, «candelabros» transmite mejor la función del objeto que «lámparas». Se evita transliterar «menorás» porque la POB inglesa ya lo traduce y el contexto requiere un término funcional.
- source_word: הַזָּהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro puro
  lexicon: HALOT
  rationale: El sustantivo con artículo funciona atributivamente. «De oro» es la forma más natural en español y conserva la materialidad del texto sin añadir precisión no explicitada.
- source_word: עֶשֶׂר
  english_pob_choice: ten
  chosen_spanish: diez
  lexicon: HALOT
  rationale: Cardinal numérico directo; no presenta dificultad especial.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their prescribed design
  chosen_spanish: según su diseño prescrito
  alternatives_spanish:
  - conforme a su ordenanza
  - según su norma
  - según su patrón
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar norma, ordenanza, procedimiento o diseño prescrito. En este contexto de utensilios del templo, «diseño prescrito» comunica bien la idea de conformidad con una especificación establecida, sin reducirlo indebidamente solo a «ordenanza».
- source_word: וַיִּתֵּן
  english_pob_choice: and he placed
  chosen_spanish: y los colocó
  alternatives_spanish:
  - y los puso
  - y los situó
  - y los dispuso
  lexicon: HALOT
  rationale: נתן en contexto espacial se traduce naturalmente como colocar/poner. «Colocó» mantiene el sentido de ubicación precisa y suena más digno que «puso».
- source_word: בַּהֵיכָל
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en la sala principal
  - en el recinto del templo
  lexicon: HALOT
  rationale: הֵיכָל aquí refiere al edificio del templo, no al complejo total. «Templo» es suficientemente claro y fiel en español; se conserva la lectura amplia de la POB inglesa sin imponer una glosa más técnica en el texto principal.
- source_word: חָמֵשׁ מִיָּמִין
  english_pob_choice: five on the right side
  chosen_spanish: cinco a la derecha
  alternatives_spanish:
  - cinco del lado derecho
  - cinco al sur
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a la derecha». Se conserva el término direccional primario, como hace la POB inglesa, sin convertirlo en interpretación geográfica en el cuerpo del texto.
- source_word: וְחָמֵשׁ מִשְּׂמֹאול
  english_pob_choice: and five on the left
  chosen_spanish: y cinco a la izquierda
  alternatives_spanish:
  - y cinco del lado izquierdo
  - y cinco al norte
  lexicon: HALOT
  rationale: Se mantiene «izquierda» por fidelidad al hebreo. No se sustituye por una dirección cardinal en el texto principal, ya que el original usa la orientación relativa.
theological_decisions:
- issue: 'Orientación espacial del templo: derecha/izquierda frente a sur/norte'
  english_pob_reading: five on the right side ... five on the left ... these may correspond to the south and north sides depending on temple orientation
  chosen_spanish_reading: cinco a la derecha ... y cinco a la izquierda
  alternative_spanish_readings:
  - cinco al sur ... y cinco al norte
  - cinco del lado sur ... y cinco del lado norte
  rationale: El texto hebreo conserva orientación relativa, no cardinal. La redacción principal respeta esa forma, mientras que la nota permite la correspondencia posible con sur/norte sin convertirla en la traducción base.
  doctrine_reference: Exégesis descriptiva; orientación del santuario en la tradición del templo
- issue: Sentido de כְּמִשְׁפָּטָם en mobiliario cultual
  english_pob_reading: according to their prescribed design
  chosen_spanish_reading: según su diseño prescrito
  alternative_spanish_readings:
  - según su ordenanza
  - según su patrón
  - conforme a su norma
  rationale: En un contexto litúrgico-arquitectónico, el término no debe estrecharse a un simple juicio legal. «Diseño prescrito» preserva el componente de norma establecida y de arreglo conforme a una especificación autorizada.
  doctrine_reference: Lexicografía hebrea; terminología cultual del templo
translation_notes:
  revision_awareness: 'Se siguió el nivel de acuerdo alto del control cruzado y no se introdujeron cambios respecto del sentido auditado; la revisión más reciente indicó que no eran necesarios ajustes sustantivos. Se mantuvieron las tensiones interpretativas documentadas: el matiz de כְּמִשְׁפָּטָם y la orientación derecha/izquierda frente a sur/norte.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantuvo traducción funcional de מְנוֹרוֹת como «candelabros» para español natural y comprensible.
  - Se preservó la orientación relativa «derecha/izquierda» en el texto principal, con la alternativa geográfica solo en nota.
  - «Templo» se usa como equivalente sobrio de הֵיכָל, sin sobreglosar el ámbito del término.
