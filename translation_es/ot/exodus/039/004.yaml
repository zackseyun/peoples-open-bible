translation:
  language: es
  text: Le hicieron hombreras[a], unidas al efod; en sus dos extremos quedó unido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tirantes». El hebreo se refiere a las partes del efod que descansaban sobre los hombros y unían sus secciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפֹת
  english_pob_choice: shoulder pieces
  chosen_spanish: hombreras
  alternatives_spanish:
  - piezas para los hombros
  - hombreras de los hombros
  - tirantes
  lexicon: HALOT
  rationale: El término hebreo designa una parte construida del efod relacionada con los hombros. En español, «hombreras» comunica de modo natural una pieza que va sobre los hombros y evita la ambigüedad de «tirantes», que podría sugerir correas sueltas más que una sección del vestido.
- source_word: עָשׂוּ
  english_pob_choice: they made
  chosen_spanish: Le hicieron
  alternatives_spanish:
  - Lo hicieron
  - Lo fabricaron
  - Lo confeccionaron
  lexicon: HALOT
  rationale: El verbo básico עשה se vierte con «hacer». En contexto de manufactura del vestuario sagrado, «le hicieron» conserva la acción concreta de confección y mantiene el referente inanimado del efod en español natural.
- source_word: לוֹ
  english_pob_choice: for it
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - para ello
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se refiere al efod. En español, el dativo «le» refleja bien la relación de beneficio/pertenencia sin forzar un «a él» poco idiomático para un objeto.
- source_word: חֹבְרֹת
  english_pob_choice: joined to it
  chosen_spanish: unidas a él
  alternatives_spanish:
  - conectadas a él
  - adheridas a él
  - juntas a él
  lexicon: HALOT
  rationale: La raíz חבר expresa unión o conexión. «Unidas» preserva el vínculo semántico con el resto del versículo y suena natural en español para una pieza de vestimenta ensamblada.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - junto a
  lexicon: HALOT
  rationale: En español, la relación espacial con «sus dos extremos» se expresa con más naturalidad mediante «en» que con un calco como «sobre». El contexto describe el punto de ensamblaje de la pieza.
- source_word: שְׁנֵי קצוותו
  english_pob_choice: its two ends
  chosen_spanish: sus dos extremos
  alternatives_spanish:
  - sus dos puntas
  - sus dos bordes
  - sus dos orillas
  lexicon: HALOT
  rationale: «Extremos» traduce con precisión la idea de dos terminaciones o límites del efod y preserva mejor el paralelismo técnico de la construcción que «bordes».
- source_word: חֻבָּר
  english_pob_choice: it was joined
  chosen_spanish: fue unido
  alternatives_spanish:
  - fue adherido
  - fue conectado
  - quedó unido
  lexicon: HALOT
  rationale: El pasivo de חבר repite la idea de unión del miembro anterior. «Fue unido» mantiene esa repetición léxica y es claro en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La base inglesa sigue la revisión más reciente y no requiere cambios sustantivos. La versión española conserva el doble uso de la raíz de unión (חבר) mediante «unidas» / «fue unido» y adopta una solución idiomática para el objeto inanimado del sufijo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se conserva un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - Se mantiene la repetición de la idea de unión para reflejar el enlace léxico del hebreo.
