  rationale: 'La revisión corrige un error serio de español («estatuta» → «estatuto»), mejora la naturalidad sintáctica al inicio del versículo sin apartarse del hebreo, y restituye las notas del expediente inglés que faltaban. Se mantiene la terminología clave del proyecto: «Yahvé», «hijos de Israel», «clan», y la distinción legal de la herencia.'
