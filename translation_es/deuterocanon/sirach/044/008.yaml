translation:
  language: es
  text: Algunos de ellos dejaron un nombre[a], para relatar su alabanza en su heredad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea «en su heredad» puede significar también «entre sus descendientes» o «en su herencia». El paralelo griego enfatiza que su alabanza es relatada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יש מהם
  english_pob_choice: Some of them
  chosen_spanish: Algunos de ellos
  alternatives_spanish:
  - Hay entre ellos algunos
  - De ellos, algunos
  lexicon: HALOT
  rationale: El hebreo introduce un subconjunto de los antepasados mencionados; «Algunos de ellos» conserva ese valor partititivo con español natural.
- source_word: הניחו
  english_pob_choice: left behind
  chosen_spanish: dejaron
  alternatives_spanish:
  - dejaron atrás
  - han dejado
  - causaron que quedara
  lexicon: HALOT
  rationale: El verbo expresa que algo queda como resultado de la vida de esas personas. «Dejaron» mantiene la idea memorial sin sonar forzado en español.
- source_word: שם
  english_pob_choice: a name
  chosen_spanish: un nombre
  alternatives_spanish:
  - una fama
  - un renombre
  - una reputación
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica de «nombre», que aquí funciona como memoria/renombre. Evita borrar la concreción del hebreo.
- source_word: להשתענות
  english_pob_choice: to be praised / to recount their praise
  chosen_spanish: para contar sus alabanzas
  alternatives_spanish:
  - para ser alabados
  - para recordar sus alabanzas
  - para que se relate su alabanza
  lexicon: HALOT
  rationale: La forma hebrea es difícil; el paralelo griego apunta a la acción de relatar alabanzas. «Contar sus alabanzas» conserva ese matiz de recitación memorial sin convertirlo en una pasiva abstracta.
- source_word: בנחלתם
  english_pob_choice: in their inheritance
  chosen_spanish: en su heredad
  alternatives_spanish:
  - en su herencia
  - entre su heredad
  - en la heredad de ellos
  lexicon: HALOT
  rationale: «Heredad» comunica mejor el campo bíblico de herencia patrimonial y memorial. Mantiene la ambigüedad entre posteridad/posesión/ámbito heredado, como en la nota inglesa.
theological_decisions:
- issue: Lenguaje memorial de «nombre» e «heredad»
  english_pob_reading: Render concretely as 'a name' and 'inheritance' rather than abstracting fully to 'fame' and 'posterity.'
  chosen_spanish_reading: Traducir de manera concreta «un nombre» y «heredad», sin abstraerlos por completo a «fama» o «posteridad».
  alternative_spanish_readings:
  - Algunos dejaron renombre, para que se recuerden sus alabanzas entre sus descendientes.
  - Algunos dejaron reputación, para ser celebrados en su linaje.
  rationale: El versículo usa lenguaje memorial cargado bíblicamente. La opción elegida preserva esa textura y deja abierta la relación entre heredad, posteridad y memoria, en línea con la lectura hebrea principal y el paralelo griego.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió una formulación más cercana al hebreo para el segundo miembro («to recount their praise») y mantuvo el lenguaje de herencia de forma más formal. La versión española refleja esa decisión con «para contar sus alabanzas en su heredad».
  spanish_consistency_notes:
  - Se mantiene «nombre» en singular, como en el hebreo y el inglés auditado, para conservar el valor memorial del sustantivo.
  - «Heredad» se usa aquí de manera consistente con el campo semántico de herencia/posesión/posteridad sin cerrar indebidamente la ambigüedad.
  - La puntuación separa el primer miembro del relativo final para reflejar la cadencia breve del hebreo.
