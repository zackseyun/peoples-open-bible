  rationale: 'La revisión corrige primero un problema formal obligatorio: cada nota ahora tiene su marcador exacto en la frase correspondiente del texto. Además, «aparta a tu siervo de» expresa mejor el valor de restricción de חֲשֹׂךְ que «guarda… de», y «quedaré libre de culpa» refleja con más precisión el valor de וְנִקֵּיתִי según la documentación del POB, sin forzar una lectura exclusivamente ritual. Se conserva «se enseñoreen de mí» e «íntegro», que son fieles y legibles.'
