translation:
  language: es
  text: El que se desvía en su corazón será saciado con sus propios caminos, y el hombre bueno con lo que procede de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la segunda línea es difícil; el sentido probable es que el hombre bueno queda saciado con lo que procede de su propia conducta, en contraste con la persona que se desvía en su corazón.
    reason: alternative_reading
lexical_decisions:
- source_word: מִדְּרָכָיו
  english_pob_choice: with his own ways / from his ways
  chosen_spanish: con sus propios caminos
  alternatives_spanish:
  - de sus caminos
  - a partir de sus caminos
  lexicon: HALOT
  rationale: La preposición hebrea indica origen o fuente. En español, «con» conserva la idea de llenarse/saciarse por lo que esos caminos producen, sin perder naturalidad. Añadir «propios» mantiene el matiz de pertenencia explícito del pronombre.
- source_word: יִשְׂבַּע
  english_pob_choice: will be filled
  chosen_spanish: será saciado
  alternatives_spanish:
  - será lleno
  - quedará satisfecho
  lexicon: HALOT
  rationale: El verbo expresa quedar plenamente satisfecho o colmado. «Será saciado» conserva la imagen concreta del hebreo y funciona bien en ambos miembros del paralelismo.
- source_word: סוּג לֵב
  english_pob_choice: the one who turns away in heart
  chosen_spanish: El de corazón que se desvía
  alternatives_spanish:
  - el que se aparta en su corazón
  - el de corazón apóstata
  - el que se vuelve atrás en su corazón
  lexicon: HALOT
  rationale: סוּג implica desviarse o apartarse. Opté por una formulación breve y proverbial en español que preserve el énfasis interior de לֵב sin cargar el verso con una paráfrasis demasiado explicativa.
- source_word: וּמֵעָלָיו
  english_pob_choice: with what comes from himself
  chosen_spanish: con lo que procede de él
  alternatives_spanish:
  - de lo que sale de él
  - con lo que nace de su conducta
  - de sus obras
  lexicon: HALOT
  rationale: La segunda cola es difícil y el hebreo es elíptico. «Con lo que procede de él» mantiene la ambigüedad fuente/resultado y refleja la decisión del POB inglés de expresar el sentido sin sobreexplicar el giro preposicional.
- source_word: אִישׁ טוֹב
  english_pob_choice: a good man
  chosen_spanish: el hombre bueno
  alternatives_spanish:
  - un hombre bueno
  - el bueno
  - una buena persona
  lexicon: HALOT
  rationale: El hebreo usa masculino singular y un estilo proverbial. «El hombre bueno» preserva esa forma y mantiene la fuerza proverbial del texto.
theological_decisions:
- issue: 'La segunda cola es semánticamente difícil: ¿la bondad recibe de sus obras, o de sí mismo, o desde arriba?'
  english_pob_reading: The good man is satisfied from what proceeds from himself / from his deeds.
  chosen_spanish_reading: el hombre bueno queda saciado con lo que procede de él
  alternative_spanish_readings:
  - el hombre bueno queda saciado de sus obras
  - el hombre bueno queda saciado desde arriba
  - el hombre bueno queda saciado con lo que está sobre él
  rationale: Siguiendo el contexto auditado, la lectura más probable es que el justo queda satisfecho por lo que su propia conducta produce. La redacción española conserva esa relación de origen sin convertirla en una interpretación más cerrada de lo que permite el hebreo.
  doctrine_reference: Proverbios 14:14; cf. principio sapiencial de retribución moral en el marco del libro de Proverbios
translation_notes:
  revision_awareness: 'El español sigue la revisión inglesa más transparente: evita términos interpretativos demasiado fuertes como «apóstata» o «rebelde», preserva la imagen de saciarse/llenarse, y mantiene la dificultad de la segunda cola sin resolverla con una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí no aparecen.
  - Se prefirió «caminos» para mantener la metáfora ética del texto sapiencial.
  - «Se desvía» y «procede de él» conservan la tensión del hebreo sin introducir vocabulario doctrinal ajeno al verso.
