translation:
  language: es
  text: Y compró la porción del campo donde había instalado su tienda, de mano de los hijos de Hamor, padre de Siquem, por cien qesitah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo qesitah; una unidad o artículo de pago antiguo de valor exacto incierto, tradicionalmente vertido de diversas maneras como «piezas de dinero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֶן
  english_pob_choice: bought
  chosen_spanish: compró
  alternatives_spanish:
  - adquirió
  - compró para sí
  lexicon: HALOT
  rationale: קנה en este contexto de transacción de tierra expresa compra. «Compró» es natural en español y conserva el valor comercial del verbo sin añadir matices innecesarios.
- source_word: חֶלְקַת הַשָּׂדֶה
  english_pob_choice: the portion of the field
  chosen_spanish: la porción del campo
  alternatives_spanish:
  - el pedazo del campo
  - la parcela del campo
  lexicon: HALOT
  rationale: חלקה designa una porción o parcela definida. «Porción» mantiene la amplitud del hebreo sin forzar un término técnico agrícola o legal más específico de lo que exige el texto.
- source_word: אֲשֶׁר נָטָה שָׁם אָהֳלוֹ
  english_pob_choice: where he had pitched his tent
  chosen_spanish: donde había plantado su tienda
  alternatives_spanish:
  - donde había levantado su tienda
  - donde había puesto su tienda
  lexicon: HALOT
  rationale: Con אֹהֶל, נטה es el giro habitual para instalar una tienda. «Había plantado su tienda» comunica de manera viva y fiel la imagen de asentamiento temporal; «plantado» evita un calco pesado y sigue siendo transparente en español bíblico contemporáneo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de la mano de
  - de parte de
  lexicon: HALOT
  rationale: El hebreo conserva la expresión idiomática de procedencia o transferencia de posesión. «De mano de» reproduce esa fuerza con un español bíblico natural, sin perder el matiz transaccional.
- source_word: בְּנֵי חֲמוֹר
  english_pob_choice: the sons of Hamor
  chosen_spanish: los hijos de Hamor
  alternatives_spanish:
  - los hijos de Jamor
  - los descendientes de Hamor
  lexicon: HALOT
  rationale: El constructo se vierte directamente como filiación plural. Se mantiene «Hamor» por transliteración del nombre propio hebreo, siguiendo una forma reconocible y consistente.
- source_word: אֲבִי שְׁכֶם
  english_pob_choice: the father of Shechem
  chosen_spanish: padre de Siquem
  alternatives_spanish:
  - el padre de Siquem
  - padre de Shequem
  lexicon: HALOT
  rationale: La aposición identifica a Hamor como el padre de Siquem. «Siquem» es la forma española establecida del topónimo/personaje bíblico, más natural que una transliteración estricta.
- source_word: בְּמֵאָה קְשִׂיטָה
  english_pob_choice: for a hundred qesitahs
  chosen_spanish: por cien qesitás
  alternatives_spanish:
  - por cien kesitás
  - por cien piezas de dinero
  lexicon: HALOT
  rationale: קְשִׂיטָה es una unidad o artículo de pago antiguo de valor exacto incierto. La transliteración «qesitás» preserva el término fuente y evita una falsa precisión; el plural español se adapta a la suma indicada.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés, sin cambios respecto de la lectura base documentada; se mantiene la decisión de transliterar qesitah por su valor incierto y de conservar la imagen idiomática de la tienda.
  spanish_consistency_notes:
  - Se usa «Y» al inicio por continuidad narrativa y estilo bíblico en español.
  - Se conserva la distinción entre «Hamor» y «Siquem» como nombres propios transliterados/estabilizados en español.
  - «Qesitás» se mantiene sin equivalencia monetaria concreta para no sobreinterpretar el término hebreo.
  - La frase «de mano de» reproduce el giro transaccional del hebreo sin recurrir a una paráfrasis jurídica excesiva.
