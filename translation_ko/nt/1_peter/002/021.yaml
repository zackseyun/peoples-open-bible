id: 1PE.2.21
reference: 1 Peter 2:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ ἐκλήθητε, ὅτι καὶ Χριστὸς ἔπαθεν ὑπὲρ ὑμῶν, ὑμῖν ὑπολιμπάνων ὑπογραμμὸν ἵνα ἐπακολουθήσητε τοῖς ἴχνεσιν αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/021.yaml
  text: 'For you were called to this, because Messiah also suffered for you, leaving you an example so that you might follow in his steps.'
translation:
  language: ko
  text: '여러분이 바로 이것에 부르심을 받았습니다. 메시아께서도 여러분을 위하여 고난을 당하시면서 본을 끼치셨으니, 이는 여러분이 그분의 발자취를 따르도록 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκλήθητε
  english_pob_choice: you were called
  chosen_korean: 부르심을 받았습니다
  alternatives_korean:
  - 부름받았습니다
  lexicon: BDAG
  rationale: 신적 수동을 「부르심을 받다」로 살린다.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 칭호로서 「메시아」 유지.
- source_word: ὑπολιμπάνων ὑπογραμμόν
  english_pob_choice: leaving you an example
  chosen_korean: 본을 끼치셨으니
  alternatives_korean:
  - 본보기를 남기셨으니
  - 모범을 보이셨으니
  lexicon: BDAG
  rationale: ὑπογραμμός는 「밑에 쓴 글씨, 따라 쓰도록 주어진 본보기」 곧 글씨 교본의 모델. 「본을 끼치다」는 한국 성서 전통의 정착 표현으로 그 의미를 잘 담는다.
- source_word: ἐπακολουθήσητε τοῖς ἴχνεσιν αὐτοῦ
  english_pob_choice: follow in his steps
  chosen_korean: 그분의 발자취를 따르도록
  alternatives_korean:
  - 그분의 걸음을 좇도록
  - 그의 자취를 따라가도록
  lexicon: BDAG
  rationale: ἴχνος(발자국·자취)와 ἐπακολουθέω(뒤따르다)의 결합을 「발자취를 따르다」로 보존.
theological_decisions:
- issue: 2:21-25에서 사 53장 「고난받는 종」 메아리 보존
  chosen_reading: '2:22-24를 사 53장 직역에 가까운 어휘로 옮기며, 메시아의 부당한 고난을 본보기로 제시'
  alternative_readings:
  - 평이화하여 사 53장 메아리를 약화
  rationale: 베드로전서 2:22-24는 LXX 사 53장(특히 9, 12절)을 명백히 인유한다. 어휘 선택에서 그 메아리를 보존한다.
  doctrine_reference: 'DOCTRINE.md: OT 인용·심상 보존'
