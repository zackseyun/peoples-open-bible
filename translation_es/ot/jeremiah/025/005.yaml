translation:
  language: es
  text: 'diciendo[a]: «Por favor, vuélvanse, cada uno de su mal camino y de la maldad de sus obras, y habiten en la tierra que Yahvé les dio a ustedes y a sus padres, desde antiguo[b] y para siempre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al decir». El hebreo introduce aquí el contenido del mensaje con una fórmula subordinada.'
    reason: alternative_reading
  - marker: b
    text: Hebreo «desde antiguo y hasta siempre», un modismo que expresa la dádiva de la tierra a través del tiempo pasado y futuro.
    reason: cultural_note
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - diciendo así
  lexicon: HALOT
  rationale: El infinitivo introductorio hebreo funciona aquí como fórmula de encadenamiento del discurso. «Diciendo» conserva el valor narrativo y evita una paráfrasis más libre.
- source_word: שׁוּבוּ נָא
  english_pob_choice: Please turn back
  chosen_spanish: Por favor, volved
  alternatives_spanish:
  - Volved, por favor
  - Regresen, por favor
  lexicon: HALOT
  rationale: שׁוּב en contexto de llamado profético expresa retorno o vuelta moral. «Volved» conserva esa fuerza de arrepentimiento/retorno; «por favor» refleja la súplica de נָא.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El distributivo singular hebreo exige una referencia individual dentro del colectivo. En español, «cada uno» comunica bien esa distribución sin forzar el masculino genérico donde podría sonar menos natural.
- source_word: מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: from his evil way
  chosen_spanish: de su camino malo
  alternatives_spanish:
  - de su mal camino
  - de su senda mala
  lexicon: HALOT
  rationale: דֶּרֶךְ conserva la metáfora de conducta o curso de vida; «camino» es el equivalente natural en español. Se mantiene «malo» para reflejar la cualidad ética de הָרָעָה sin ampliar a una abstracción no exigida por el hebreo.
- source_word: וּמֵרֹעַ מַעַלְלֵיכֶם
  english_pob_choice: and from the evil of your deeds
  chosen_spanish: y de la maldad de sus obras
  alternatives_spanish:
  - y del mal de sus obras
  - y de la maldad de sus hechos
  lexicon: HALOT
  rationale: La construcción hebrea apunta literalmente a «la maldad de sus obras». «Maldad» preserva el sustantivo abstracto, y «obras» traduce מַעַלְלִים con un término natural y sobrio. Se usa «sus» por la alternancia hebrea entre singular distributivo y plural colectivo.
- source_word: וּשְׁבוּ
  english_pob_choice: and dwell
  chosen_spanish: y habitad
  alternatives_spanish:
  - y morad
  - y permaneced
  lexicon: HALOT
  rationale: El verbo יָשַׁב en contexto de posesión/ocupación de la tierra se entiende mejor como «habitar» que como simple «quedarse». «Habitad» conserva el matiz de residencia estable.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el suelo
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», el contexto de adjudicación territorial pide la traducción idiomática «en la tierra», como en el audit trail inglés revisado. «Tierra» refleja אֲדָמָה como territorio dado por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue la convención del proyecto para el Nombre divino. «Yahvé» preserva el Tetragrama como nombre propio y evita la sustitución por un título.
- source_word: לָכֶם וְלַאֲבֹתֵיכֶם
  english_pob_choice: to you and to your fathers
  chosen_spanish: a ustedes y a sus padres
  alternatives_spanish:
  - a ustedes y a sus antepasados
  - a ustedes y a sus padres
  lexicon: HALOT
  rationale: «Padres» conserva el lenguaje de alianza y herencia familiar del hebreo. «A ustedes» expresa el destinatario colectivo con una forma natural en español contemporáneo.
- source_word: לְמִן עוֹלָם וְעַד עוֹלָם
  english_pob_choice: from of old and forever
  chosen_spanish: desde hace mucho tiempo y para siempre
  alternatives_spanish:
  - desde antiguo y para siempre
  - desde la eternidad y para siempre
  lexicon: HALOT
  rationale: La expresión hebrea marca un arco temporal pasado y futuro. «Desde hace mucho tiempo» preserva el sentido retrospectivo sin imponer la fórmula más teológica de «desde la eternidad», y «para siempre» mantiene la proyección futura.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo nombra directamente a Yahvé. Se conserva el nombre propio en lugar de una sustitución reverencial, siguiendo la política del proyecto y la lectura auditada del inglés POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de שׁוּבוּ en un llamado profético
  english_pob_reading: Please turn back
  chosen_spanish_reading: Por favor, volved
  alternative_spanish_readings:
  - Arrepentíos, por favor
  - Regresen, por favor
  rationale: El contexto profético combina retorno físico y giro moral. «Volved» permite mantener esa tensión sin reducirla solo a un acto interior de arrepentimiento, mientras que la súplica de נָא queda en «por favor».
  doctrine_reference: Jeremiah 25:5 in prophetic repentance context
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión final prefirió «in the land» por naturalidad, y el español sigue esa misma decisión con «en la tierra». También se conservaron las elecciones auditadas para el Nombre divino y el giro temporal idiomático de לְמִן עוֹלָם וְעַד עוֹלָם, evitando una fórmula demasiado técnica donde el hebreo permite una lectura más natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se prefiere «tierra» para אֲדָמָה en sentido territorial, no «suelo».
  - «Volved» y «habitad» conservan el tono exhortativo y la forma plural del hebreo.
  - «Padres» se usa en sentido covenantal/familiar, no como referencia exclusiva a varones biológicos.
