translation:
  language: es
  text: Así David juró a Saúl. Entonces Saúl se fue a su casa[a], pero David y sus hombres subieron a la fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y David y sus hombres subieron a la fortaleza». El hebreo usa simplemente «y»; «pero» en el texto principal hace explícito el contraste narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo juramento
  - prestó juramento
  lexicon: HALOT
  rationale: El hebreo indica el acto de jurar o prestar juramento. En español, «juró» es natural, directo y conserva la fuerza narrativa del verbo sin añadir explicación innecesaria.
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - para Saúl
  - ante Saúl
  lexicon: HALOT
  rationale: La preposición ל marca aquí al destinatario del juramento. «A Saúl» refleja fielmente la relación semántica y suena idiomático en español.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa y familia
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, hogar o casa/familia. En este contexto narrativo, «su casa» mantiene la concreción hebrea y coincide con la lectura auditada en inglés.
- source_word: וְדָוִד וַאֲנָשָׁיו
  english_pob_choice: but David and his men
  chosen_spanish: pero David y sus hombres
  alternatives_spanish:
  - y David y sus hombres
  - mientras David y sus hombres
  lexicon: HALOT
  rationale: El hebreo lleva una simple conjunción, pero el contraste narrativo con el movimiento de Saúl queda mejor expresado en español con «pero», como en la decisión auditada del POB en inglés. «Sus hombres» corresponde a אֲנָשָׁיו en un contexto de seguidores armados.
- source_word: עָלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron hacia arriba
  - ascendieron
  lexicon: HALOT
  rationale: עלה significa literalmente «subir» o «ir hacia arriba». «Subieron» es la forma española más natural y conserva el movimiento direccional.
- source_word: הַמְּצוּדָה
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el refugio fortificado
  - el baluarte
  lexicon: HALOT
  rationale: מְצוּדָה designa una fortificación, bastión o lugar seguro fortificado. «Fortaleza» comunica bien la idea en español y es una alternativa legítima a «stronghold», sin perder el carácter militar/refugio del término.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se hicieron cambios y que el acuerdo con la auditoría inglesa es alto (1.0). Por ello, el español sigue de cerca la decisión de contraste narrativa («pero») y mantiene el sentido concreto de los términos hebreos sin expandir el contenido.
  spanish_consistency_notes:
  - Se mantiene «Saúl» y «David» con ortografía estándar en español.
  - «Juró» conserva el tono narrativo breve del hebreo.
  - «Fortaleza» se usa consistentemente para מְצוּדָה en un sentido militar/defensivo.
  - La conjunción adversativa en el flujo principal respeta la decisión auditada en inglés, y la nota preserva la alternativa literal.
