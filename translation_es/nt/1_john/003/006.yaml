translation:
  language: es
  text: Todo el que permanece en él no peca[a]; todo el que peca no lo ha visto ni lo ha conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Las formas presentes griegas también pueden entenderse como acción característica u habitual; por eso también podría traducirse: «no sigue pecando ... todo el que sigue pecando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ
  english_pob_choice: Everyone who
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Quienquiera que
  - Cada uno que
  lexicon: BDAG
  rationale: La construcción articular con πᾶς es genérica y universal. «Todo el que» expresa naturalmente esa amplitud en español sin perder el valor de categoría general de la frase.
- source_word: ἐν αὐτῷ μένων
  english_pob_choice: remains in him
  chosen_spanish: permanece en él
  alternatives_spanish:
  - permanece en él
  - habita en él
  - se mantiene en él
  lexicon: BDAG
  rationale: μένω en Juan conserva la idea relacional de permanecer. «Permanece en él» es una equivalencia clara y sobria; «habita» puede sonar más idiomático en tradición eclesial, pero «permanece» sigue más de cerca el valor verbal del texto.
- source_word: οὐχ ἁμαρτάνει
  english_pob_choice: does not sin
  chosen_spanish: no peca
  alternatives_spanish:
  - no sigue pecando
  - no está pecando
  lexicon: BDAG
  rationale: Aunque el inglés POB discutió el posible matiz aspectual del presente, la revisión más reciente optó por una forma más formal y precisa sin «keep on». En español, «no peca» conserva esa sobriedad y evita una paráfrasis iterativa no explicitada por el griego.
- source_word: ὁ ἁμαρτάνων
  english_pob_choice: everyone who sins
  chosen_spanish: todo el que peca
  alternatives_spanish:
  - todo el que sigue pecando
  - el que peca
  lexicon: BDAG
  rationale: El participio presente puede expresar acción característica, pero el texto griego no obliga a explicitar continuidad con una perífrasis. «Todo el que peca» mantiene el paralelismo con la primera cláusula y respeta la forma simple del original.
- source_word: οὐχ ἑώρακεν αὐτὸν
  english_pob_choice: has not seen him
  chosen_spanish: no lo ha visto
  alternatives_spanish:
  - no lo ha visto nunca
  - no lo ha llegado a ver
  lexicon: BDAG
  rationale: 'El perfecto expresa un estado resultante: no ha visto. «No lo ha visto» es la equivalencia natural en español y conserva el valor del perfecto sin sobreinterpretarlo.'
- source_word: οὐδὲ ἔγνωκεν αὐτόν
  english_pob_choice: nor known him
  chosen_spanish: ni lo ha conocido
  alternatives_spanish:
  - ni lo conoce
  - ni ha llegado a conocerlo
  lexicon: BDAG
  rationale: γινώσκω en Juan suele incluir conocimiento relacional. «Lo ha conocido» preserva esa relación personal y refleja el perfecto con una construcción española natural. «Ni» reproduce adecuadamente οὐδὲ en coordinación negativa.
theological_decisions:
- issue: Lectura del presente en «no peca» / «todo el que peca»
  english_pob_reading: The English audit trail notes the tension between a simple present rendering and a durative/characteristic reading, while the latest revision prefers the more formal simple present wording.
  chosen_spanish_reading: Se mantiene la forma simple «no peca» / «todo el que peca», que puede leerse como conducta característica sin añadir explícitamente «seguir» o «continuar».
  alternative_spanish_readings:
  - no sigue pecando / todo el que sigue pecando
  - no está pecando / todo el que está pecando
  rationale: La revisión inglesa más reciente retiró el «keep on» por no estar expresado de manera explícita por la forma verbal griega. El español sigue esa decisión y evita resolver demasiado el aspecto, conservando la tensión con 1 Juan 1:8–2:2 sin expandir el texto.
  doctrine_reference: Preservar la tensión teológica y la primacía del texto original; aspecto verbal no explicitado
- issue: Referencia implícita de «él / lo»
  english_pob_reading: The English translation leaves the referent as 'him' rather than specifying 'God' or 'the Son'.
  chosen_spanish_reading: Se conserva el pronombre implícito en «él / lo» sin identificar el referente de manera explícita.
  alternative_spanish_readings:
  - no peca contra Dios
  - no lo ha visto al Hijo
  - no lo ha conocido a Cristo
  rationale: El griego usa pronombres y el contexto inmediato de 1 Juan permite más de una identificación posible. La traducción española mantiene esa reserva para no resolver más de lo que el versículo afirma.
  doctrine_reference: Primacía del texto original; preservar ambigüedad referencial donde existe
translation_notes:
  revision_awareness: La versión inglesa de auditoría pasó de «does not keep on sinning / keeps on sinning» a «does not sin / sins» para ajustarse mejor a la forma verbal griega. Este borrador español sigue esa revisión reciente y evita añadir una perífrasis de continuidad que el texto no exige explícitamente.
  spanish_consistency_notes:
  - Se usó «permanece» para μένω, en línea con el valor relacional johánico y con la terminología bíblica común en español.
  - Se mantuvo la referencia pronominal con «él/lo» sin sustituirla por un nombre explícito, porque el original conserva la ambigüedad.
  - «Peca» se eligió como equivalente directo del presente griego, y la nota al pie preserva la alternativa aspectual sin imponerla en el texto principal.
  - La coordinación negativa «ni lo ha conocido» refleja bien οὐδὲ y mantiene el paralelismo con «no lo ha visto».
