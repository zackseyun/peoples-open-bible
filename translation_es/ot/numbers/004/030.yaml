  rationale: 'La traducción principal es sustancialmente fiel, pero requiere una reparación editorial: reubicar las notas a los términos que realmente comentan y eliminar notas secundarias no respaldadas por el rastro inglés. También se reemplaza la raya por dos puntos para una puntuación española más natural en este contexto enumerativo, sin alterar el sentido.'
