translation:
  language: es
  text: Y he aquí, siete otras vacas subieron tras ellas, flacas y muy feas de aspecto, y delgadas de carne. Nunca había visto otras semejantes a ellas en toda la tierra de Egipto, por su fealdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por su miseria'. La expresión hebrea intensifica cuán excepcionalmente horribles y miserables eran las vacas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí que
  lexicon: HALOT
  rationale: Conserva el marcador discursivo vívido que introduce el elemento siguiente del sueño. En español, 'he aquí' comunica bien la sorpresa narrativa sin sonar mecánico.
- source_word: פָּרוֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - reses
  - ganado
  lexicon: HALOT
  rationale: El contexto del sueño de Faraón requiere el sustantivo específico femenino plural; 'vacas' es preciso y natural en español.
- source_word: אֲחֵרוֹת
  english_pob_choice: other
  chosen_spanish: otras
  alternatives_spanish:
  - diferentes
  - las otras
  lexicon: HALOT
  rationale: Ajusta el adjetivo plural al sustantivo 'vacas' y mantiene la oposición entre el primer grupo y el segundo.
- source_word: עֹל֣וֹת אַחֲרֵי/הֶן
  english_pob_choice: came up after them
  chosen_spanish: subían después de ellas
  alternatives_spanish:
  - subieron después de ellas
  - venían detrás de ellas
  lexicon: HALOT
  rationale: El participio narrativo en español se expresa con una forma verbal continua o imperfectiva; 'subían después de ellas' conserva la imagen de ascenso y el orden temporal del sueño.
- source_word: דַּלּ֨וֹת
  english_pob_choice: poor
  chosen_spanish: flacas
  alternatives_spanish:
  - raquíticas
  - enjutas
  lexicon: HALOT
  rationale: La idea es de pobreza/escasez física y debilidad corporal. En español, 'flacas' comunica esa condición de manera directa y encaja con la descripción posterior de la carne.
- source_word: וְרָע֥וֹת תֹּאַר מְאֹ֖ד
  english_pob_choice: very ugly in appearance
  chosen_spanish: muy malas de aspecto
  alternatives_spanish:
  - muy feas de aspecto
  - muy desagradables de aspecto
  lexicon: HALOT
  rationale: '''Malas de aspecto'' conserva el valor evaluativo amplio del hebreo sin restringirlo solo a lo estético o moral. Se mantiene la tensión del original entre mala apariencia y condición miserable.'
- source_word: וְרַקּ֣וֹת בָּשָׂר
  english_pob_choice: thin in flesh
  chosen_spanish: delgadas de carne
  alternatives_spanish:
  - flacas de carne
  - raquíticas de carne
  lexicon: HALOT
  rationale: La expresión subraya la emaciación corporal. 'Delgadas de carne' es comprensible y mantiene el paralelismo con la frase anterior.
- source_word: לֹֽא רָאִ֧יתִי כָ/הֵ֛נָּה
  english_pob_choice: I had not seen any like them
  chosen_spanish: No he visto otras semejantes a ellas
  alternatives_spanish:
  - No había visto otras semejantes a ellas
  - No he visto ninguna como ellas
  lexicon: HALOT
  rationale: La forma española presente perfecto funciona bien como reporte vívido del discurso directo del sueño; 'otras semejantes a ellas' refleja la comparación plural.
- source_word: בְּ/כָל אֶ֥רֶץ מִצְרַ֖יִם
  english_pob_choice: in all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' reproduce la fórmula bíblica tradicional con estilo digno y claro.'
- source_word: לָ/רֹֽעַ
  english_pob_choice: for ugliness
  chosen_spanish: por su fealdad
  alternatives_spanish:
  - por su maldad
  - por su fealdad y miseria
  lexicon: HALOT
  rationale: El hebreo final intensifica la valoración global de las vacas. 'Fealdad' permite mantener el foco en la apariencia física, mientras evita la ambigüedad moral de 'maldad'.
theological_decisions:
- issue: Valor evaluativo de לָרֹעַ y de רָעוֹת תֹּאַר
  english_pob_reading: The Hebrew expression summarizes how exceptionally bad-looking and miserable the cows were; the English revision preferred 'for ugliness' over 'for badness' to avoid moral misunderstanding.
  chosen_spanish_reading: por su fealdad
  alternative_spanish_readings:
  - por su maldad
  - por su aspecto horrible
  rationale: En español, 'maldad' sugeriría un juicio moral impropio del contexto; 'fealdad' mantiene el valor evaluativo visual y evita perder la tensión ya presente entre aspecto y condición miserable.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'for badness' a 'for ugliness' por considerarlo más natural y menos ambiguo. La redacción española sigue ese mismo criterio, usando 'por su fealdad' para conservar el sentido evaluativo global sin deslizarse hacia un juicio moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'vacas' por precisión contextual en lugar de un término genérico como 'ganado'.
  - Se conservó el paralelismo físico entre 'flacas' y 'delgadas de carne' sin duplicar innecesariamente el mismo adjetivo.
  - Se evitó traducir mecánicamente el final hebreo con una construcción que sonara a moralidad; el contexto es de apariencia y condición corporal.
