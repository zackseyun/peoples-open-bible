translation:
  text: 13. Then, he does not come near a gathering of righteous men at all, but avoids them. He clings
    to the double‑minded and the empty, and he prophesies to them in a corner, and deceives them by speaking
    everything according to their desires, emptily; for he also answers the empty. For an empty vessel,
    placed together with empty ones, is not broken, but they agree with one another.
