translation:
  language: es
  text: Porque sepan que, si tramamos algún mal contra estas personas[a], o les causamos tristeza de cualquier manera[b], tendremos contra nosotros, para venganza en estos asuntos, de manera totalmente ineludible y para siempre, no a un hombre, sino a Dios Altísimo, el que gobierna sobre todo poder. Que estén bien[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "contra estos". El griego puede referirse de manera más breve a las personas ya mencionadas; aquí se explicita para claridad en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "les causamos tristeza del todo" / "les causamos tristeza en lo más mínimo". La frase griega después de "causar tristeza" es idiomática y refuerza el alcance del daño.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "Adiós" / "Fortalézcanse". La despedida griega ἐρρῶσθε es una fórmula epistolar convencional que también puede significar "estén bien" o "sean fuertes".'
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conozcan
  - sepan
  lexicon: BDAG
  rationale: El imperativo plural en contexto exhortativo y de advertencia se vierte de forma natural con 'saben' introduciendo la amonestación; 'sepan' sería también posible, pero 'saben' conserva mejor el tono directo del aviso solemne en español.
- source_word: κακοτεχνήσωμεν πονηρόν
  english_pob_choice: devise any evil
  chosen_spanish: intentamos cualquier maldad
  alternatives_spanish:
  - maquinamos algún mal
  - tramamos maldad alguna
  lexicon: LSJ
  rationale: La frase griega sugiere una acción deliberada y maquinada de hacer el mal. 'Intentamos cualquier maldad' mantiene la idea de un propósito malicioso, aunque en español 'maquinamos' o 'tramamos' también serían viables; se evitó una formulación demasiado rígida o arcaica.
- source_word: ἐπιλυπήσωμεν αὐτοὺς τὸ σύνολον
  english_pob_choice: cause them grief in any way at all
  chosen_spanish: les causamos tristeza en absoluto
  alternatives_spanish:
  - les causamos aflicción en lo más mínimo
  - los mortificamos en absoluto
  lexicon: BDAG
  rationale: Se preserva el sentido de causar dolor o aflicción emocional. 'Tristeza' refleja el efecto anímico, y 'en absoluto' intenta reproducir el intensificador idiomático τὸ σύνολον; la alternativa 'en lo más mínimo' captaría mejor la mínima medida, pero aquí se priorizó la cadencia del período.
- source_word: οὐκ ἄνθρωπον, ἀλλὰ τὸν ... θεὸν ὕψιστον
  english_pob_choice: not a man but God Most High
  chosen_spanish: no a un hombre, sino a Dios Altísimo
  alternatives_spanish:
  - no a un ser humano, sino a Dios Altísimo
  - no a un hombre, sino al Dios Altísimo
  lexicon: LSJ
  rationale: Se conserva el contraste enfático entre una oposición meramente humana y la oposición divina. 'Dios Altísimo' sigue de cerca el orden y el valor del título griego sin sustituirlo por fórmulas eclesiásticas ajenas al texto.
- source_word: τὸν πάσης δεσπόζοντα δυνάμεως
  english_pob_choice: the one who rules over all power
  chosen_spanish: el que domina todo poder
  alternatives_spanish:
  - el que gobierna todo poder
  - el soberano sobre todo poder
  lexicon: LSJ
  rationale: δεσπόζοντα expresa señorío o dominio efectivo. 'Domina todo poder' es una versión breve y fiel al participio, y mantiene la amplitud universal del objeto gobernado; 'gobierna' o 'soberano' serían posibles, pero menos cercanos al matiz de dominio.
- source_word: ἐπʼ ἐκδίκησιν τῶν πραγμάτων
  english_pob_choice: for vengeance in these matters
  chosen_spanish: para venganza en estos asuntos
  alternatives_spanish:
  - para la venganza de estas acciones
  - para vindicación de estos hechos
  lexicon: BDAG
  rationale: ἐκδίκησις puede implicar venganza o vindicación, y aquí el contexto de advertencia favorece 'venganza'. 'En estos asuntos' conserva la amplitud de τῶν πραγμάτων sin reducirla excesivamente a 'hechos'.
- source_word: κατὰ πᾶν ἀφεύκτως
  english_pob_choice: utterly without escape
  chosen_spanish: de manera totalmente inevitable
  alternatives_spanish:
  - sin escapatoria alguna
  - por completo sin evadirlo
  lexicon: LSJ
  rationale: La construcción intensifica la imposibilidad de evitar el juicio. 'De manera totalmente inevitable' expresa la fuerza total del giro; aunque 'sin escapatoria alguna' es más literal, la opción elegida funciona mejor en español contemporáneo sin perder la idea de inevitabilidad.
- source_word: διὰ παντὸς
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - continuamente
  - de continuo
  lexicon: BDAG
  rationale: En este contexto de amenaza judicial, el giro comunica duración indefinida y persistente. 'Para siempre' reproduce esa permanencia con naturalidad en español.
- source_word: ἐρρῶσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Adiós!
  alternatives_spanish:
  - ¡Estén bien!
  - ¡Fortalézcanse!
  lexicon: LSJ
  rationale: Es la despedida epistolar convencional. '¡Adiós!' transmite la clausura del discurso de manera breve y publicable; las alternativas más literales serían posibles, pero menos idiomáticas para una conclusión española breve.
theological_decisions:
- issue: Título divino y supremacía
  english_pob_reading: God Most High, the one who rules over all power
  chosen_spanish_reading: Dios Altísimo, el que domina todo poder
  alternative_spanish_readings:
  - Dios Altísimo, el soberano sobre todo poder
  - el Dios Altísimo, el que gobierna sobre todo poder
  rationale: El griego subraya que la oposición verdadera no es humana sino divina, y presenta a Dios como supremo sobre todo poder. La traducción mantiene ese énfasis sin suavizar el conflicto ni introducir un lenguaje dogmático ajeno al pasaje.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: el cambio de ''grieve them'' a ''cause them grief'' confirmó que ἐπιλυπήσωμεν debe reflejar una aflicción causada, no solo un sentimiento interno. También se conservó el cierre epistolar como despedida breve, en línea con la decisión inglesa de tratar ἐρρῶσθε como fórmula convencional.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada para יהוה cuando aparezca en otros pasajes; aquí el texto griego usa θεός, por lo que se traduce como 'Dios'.
  - Se conserva 'Altísimo' para ὕψιστον, siguiendo el título divino del texto y evitando paráfrasis devocionales más largas.
  - '''Poder'' traduce δυνάμεως de manera abstracta y amplia; no se restringe a ''poderes'' humanos ni a ''autoridades''.'
  - El registro busca ser publicable y eclesialmente legible, sin retroceder a fórmulas tradicionales que oculten la fuerza del original.
