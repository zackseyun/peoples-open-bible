translation:
  language: es
  text: 'Y clamó contra el altar por la palabra[a] de Yahvé, y dijo: «Altar, altar, así dice Yahvé: He aquí que nacerá un hijo para la casa de David, Josías por nombre; y sacrificará[b] sobre ti a los sacerdotes de los lugares altos que queman incienso sobre ti, y huesos humanos[c] serán quemados sobre ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la palabra de Yahvé» o «según la palabra de Yahvé». La frase indica autorización o comisión profética.
    reason: lexical_alternative
  - marker: b
    text: O «degollará sobre ti». El verbo hebreo tiene tono sacrificial, lo que puede subrayar intencionalmente la profanación del altar.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «huesos de אדם»; aquí אדם se usa de manera genérica, por eso «huesos humanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא עַל
  english_pob_choice: cried out against
  chosen_spanish: clamó contra
  alternatives_spanish:
  - proclamó contra
  - alzó la voz contra
  lexicon: HALOT
  rationale: En contexto profético, קרא con עַל expresa una proclamación enérgica dirigida contra el altar. «Clamó contra» conserva la fuerza pública y el matiz adversativo mejor que un simple «dijo».
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ es «altar» de forma directa y estándar. Se mantiene el sustantivo sin interpretaciones adicionales.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la palabra de Yahvé
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: La preposición בְּ puede expresar medio o agencia autorizada. «Por la palabra de Yahvé» conserva el sentido de comisión profética y evita un calco rígido.
- source_word: מִזְבֵּחַ מִזְבֵּחַ
  english_pob_choice: Altar, altar
  chosen_spanish: Altar, altar
  alternatives_spanish:
  - ¡Altar, altar!
  lexicon: HALOT
  rationale: Se conserva la repetición vocativa para reproducir el tono solemne y la personificación retórica del altar.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así ha dicho Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de manera reconocible en español. «Así dice Yahvé» conserva la cadencia oracular sin introducir una paráfrasis.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: «He aquí» transmite la fuerza de anuncio solemne y sigue siendo natural en registro bíblico en español.
- source_word: בֵן נוֹלָד לְבֵית דָּוִד
  english_pob_choice: a son will be born to the house of David
  chosen_spanish: nacerá un hijo para la casa de David
  alternatives_spanish:
  - nacerá un hijo en la casa de David
  - será nacido un hijo para la casa de David
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma pasiva, en anuncio profético futuro suena natural en español como futuro simple. «Un hijo» preserva el valor de בן sin forzar una traducción literal innecesaria.
- source_word: יֹאשִׁיָּהוּ שְׁמוֹ
  english_pob_choice: Josiah by name
  chosen_spanish: Josías por nombre
  alternatives_spanish:
  - su nombre será Josías
  - Josías es su nombre
  lexicon: HALOT
  rationale: La fórmula nominal se mantiene breve y solemne. «Por nombre» reproduce de modo sobrio la apposición del hebreo.
- source_word: וְזָבַח עָלֶיךָ
  english_pob_choice: he will sacrifice on you
  chosen_spanish: sacrificará sobre ti
  alternatives_spanish:
  - degollará sobre ti
  - inmolará sobre ti
  lexicon: HALOT
  rationale: Se conserva el registro sacrificial de זבח, que aquí intensifica la ironía del acto sobre el altar. «Sobre ti» refleja la relación espacial directa del hebreo.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  english_pob_choice: the priests of the high places
  chosen_spanish: a los sacerdotes de los lugares altos
  alternatives_spanish:
  - a los sacerdotes de los altos lugares
  - a los sacerdotes de los santuarios altos
  lexicon: HALOT
  rationale: «Lugares altos» es la expresión bíblica estable para בָּמוֹת. Se conserva la referencia cultual específica sin reemplazarla por un término más genérico.
- source_word: הַמַּקְטִרִים עָלֶיךָ
  english_pob_choice: who burn incense on you
  chosen_spanish: que queman incienso sobre ti
  alternatives_spanish:
  - que ofrecen incienso sobre ti
  - que hacen subir incienso sobre ti
  lexicon: HALOT
  rationale: קטר en contexto de altar se refiere a quemar incienso/ofrendas. «Queman incienso» es claro en español y preserva el acto cultual concreto.
- source_word: וְעַצְמוֹת אָדָם
  english_pob_choice: human bones
  chosen_spanish: huesos humanos
  alternatives_spanish:
  - los huesos de seres humanos
  - huesos de אדם
  lexicon: HALOT
  rationale: אָדָם aquí es genérico y no masculino específico. «Huesos humanos» conserva el sentido colectivo sin perder naturalidad en español.
- source_word: יִשְׂרְפוּ עָלֶיךָ
  english_pob_choice: will be burned on you
  chosen_spanish: serán quemados sobre ti
  alternatives_spanish:
  - serán quemados en ti
  - los quemarán sobre ti
  lexicon: HALOT
  rationale: La forma verbal es pasiva en español para reflejar el foco del hebreo en lo que ocurre con los huesos, no en el agente. «Sobre ti» mantiene el eco reiterado del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrama: «Yahvé» en el texto principal, preservando el nombre divino en lugar de una sustitución titulada.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El hebreo usa el Tetragrama y el POB inglés lo translitera como Yahweh. En español, la forma de proyecto es «Yahvé», que conserva el nombre propio divino sin sustituirlo por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor genérico de אָדָם en וְעַצְמוֹת אָדָם
  english_pob_reading: human bones
  chosen_spanish_reading: huesos humanos
  alternative_spanish_readings:
  - los huesos del hombre
  - huesos de seres humanos
  rationale: אָדָם es genérico aquí, no un varón individual. «Huesos humanos» comunica el alcance colectivo y evita introducir una lectura masculina que el hebreo no exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context)'
- issue: Registro sacrificial de זבח aplicado al castigo del altar
  english_pob_reading: he will sacrifice on you
  chosen_spanish_reading: sacrificará sobre ti
  alternative_spanish_readings:
  - inmolará sobre ti
  - degollará sobre ti
  rationale: El verbo conserva deliberadamente el matiz sacrificial, porque el texto describe la profanación del altar con sacerdotes de lugares altos. «Sacrificará» mantiene la ironía cultual que la POB inglesa resguarda.
  doctrine_reference: Lexical note from source audit trail on sacrificial tone of זבח
translation_notes:
  revision_awareness: Se corrigió la validación previa eliminando todas las notas al pie no ancladas en el texto. El draft actual no incluye marcadores de nota para evitar desajustes entre el texto y las footnotes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la repetición vocativa «Altar, altar» como recurso profético.
  - Se usa «lugares altos» para בָּמוֹת, consistente con el vocabulario bíblico en Reyes.
  - Se prefirió una construcción pasiva en «serán quemados» para reflejar el foco del hebreo.
  - «Huesos humanos» respeta el valor genérico de אָדָם y la claridad en español.
