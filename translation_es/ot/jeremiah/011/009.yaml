translation:
  language: es
  text: 'Y Yahvé me dijo: «Se ha hallado una conspiración[a] entre los hombres[b] de Judá y entre los habitantes de Jerusalén.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha descubierto un complot» o «se ha hallado una conspiración traicionera».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «entre el hombre de Judá»; el singular «hombre» funciona aquí de manera colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; en español, «Y ... dijo» conserva la secuencia sin añadir una relación causal o conclusiva que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton según la convención editorial del proyecto en español, evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: La preposición con sufijo se expresa de forma natural en español con el dativo «me» dentro de la cita directa.
- source_word: נִמְצָא
  english_pob_choice: has been found
  chosen_spanish: se ha hallado
  alternatives_spanish:
  - ha sido hallada
  - se encontró
  lexicon: HALOT
  rationale: El nifal perfecto expresa un hallazgo/descubrimiento con vigencia actual; «se ha hallado» conserva bien esa voz y el matiz de estado descubierto.
- source_word: קֶשֶׁר
  english_pob_choice: a conspiracy
  chosen_spanish: una conspiración
  alternatives_spanish:
  - un complot
  - una trama
  lexicon: HALOT
  rationale: En contexto profético-político, «conspiración» es la equivalencia más transparente y fiel al peso de קשר; se preserva el valor de traición implícito sin sobreespecificarlo.
- source_word: בְּאִישׁ יְהוּדָה
  english_pob_choice: among the men of Judah
  chosen_spanish: en los hombres de Judá
  alternatives_spanish:
  - entre los hombres de Judá
  - entre la gente de Judá
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, funciona colectivamente. «En los hombres de Judá» refleja el sujeto colectivo con naturalidad en español y mantiene el género/valor del sustantivo masculino del original.
- source_word: וּבְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and among the inhabitants of Jerusalem
  chosen_spanish: y entre los habitantes de Jerusalén
  alternatives_spanish:
  - y entre los que habitan Jerusalén
  - y entre los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado de ישב se traduce de manera natural por «habitantes», conservando el sentido colectivo y el registro bíblico claro en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto, conforme a la práctica editorial del POB en español, en lugar de sustituirlo por un título.
