id: LEV.22.2
reference: Leviticus 22:2
source:
  edition: WLC
  text: דַּבֵּ֨ר אֶֽל אַהֲרֹ֜ן וְ/אֶל בָּנָ֗י/ו וְ/יִנָּֽזְרוּ֙ מִ/קָּדְשֵׁ֣י בְנֵֽי יִשְׂרָאֵ֔ל וְ/לֹ֥א יְחַלְּל֖וּ אֶת שֵׁ֣ם קָדְשִׁ֑/י אֲשֶׁ֨ר הֵ֧ם מַקְדִּשִׁ֛ים לִ֖/י אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: Speak to Aaron and to his sons[a], that they keep themselves from the holy things of the sons of Israel, and not profane my holy name, which they sanctify for me[c][b]. I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'separate themselves from' or 'abstain from' the holy things of the sons of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Israel'' is the formal Hebrew expression; alternatively, ''the people of Israel'' or ''the Israelites.'''
    reason: lexical_alternative
  - marker: c
    text: That is, the holy things that the Israelites consecrate to the LORD.
    reason: cross_reference
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, the standard directive introducing divine speech to Moses. 'Speak' is the most direct and conventional rendering.
- source_word: וְיִנָּזְרוּ
  chosen: keep away
  alternatives:
  - separate themselves
  - abstain
  lexicon: HALOT
  rationale: 'Niphal of נזר here conveys separation or refraining with respect to sacred things. ''Keep away'' communicates the practical force in context: priests must refrain from handling holy offerings when disqualified. ''Separate themselves'' is more formal but less immediately clear in English.'
- source_word: מִקָּדְשֵׁי בְנֵי יִשְׂרָאֵל
  chosen: from the holy things of the sons of Israel
  alternatives:
  - from the holy offerings of the people of Israel
  - from the sacred gifts of the Israelites
  lexicon: HALOT
  rationale: The phrase refers to consecrated items belonging to or brought by Israel. 'Holy things' stays close to the Hebrew קָדְשֵׁי and preserves the cultic breadth; more specific renderings like 'offerings' are interpretive, though contextually plausible.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the formal covenant expression is retained as 'sons of Israel.' A more idiomatic alternative is possible, but the Hebrew phrase is a standard national designation and not merely a generic population label.
- source_word: יְחַלְּלוּ
  chosen: profane
  alternatives:
  - treat as common
  - defile
  lexicon: HALOT
  rationale: Piel of חלל in holiness contexts means to profane or desecrate. 'Profane' best matches the cultic and theological register of the verse.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'My holy name' is idiomatic English and preserves the covenantal significance of God's name.
- source_word: אֲשֶׁר הֵם מַקְדִּשִׁים לִי
  chosen: which they sanctify for me
  alternatives:
  - which they consecrate to me
  - that they set apart for me as holy
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the holy things Israel consecrates to God. 'Sanctify for me' preserves the lexical connection with holiness language in the verse, though 'consecrate to me' is a natural English alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
