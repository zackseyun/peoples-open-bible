translation:
  language: es
  text: Porque tú harás brillar mi lámpara[a]; Yahvé, mi Dios, alumbrará mi oscuridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «encenderás mi lámpara».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi oscuridad»; la expresión puede referirse a angustia, peligro o penumbra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del contexto poético inmediato. «Porque» es natural en español y conserva el valor causal/explicativo de «For».
- source_word: תָּאִיר
  english_pob_choice: light
  chosen_spanish: encenderás
  alternatives_spanish:
  - harás brillar
  - darás luz a
  - alumbrarás
  lexicon: HALOT
  rationale: El hiphil de אור expresa causar luz/encender. En español, «encenderás mi lámpara» mantiene la metáfora concreta sin sonar forzado; además, reproduce bien la imagen idiomática del texto.
- source_word: נֵרִי
  english_pob_choice: my lamp
  chosen_spanish: mi lámpara
  alternatives_spanish:
  - mi luz
  lexicon: HALOT
  rationale: «נֵר» es literalmente «lámpara». Mantener el sustantivo concreto preserva la imagen poética y evita reducirla a una abstracción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo el criterio del proyecto de traducir יְהוָה como «Yahvé» y no como una sustitución titular.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: La construcción posesiva es directa y natural en español. «Mi Dios» preserva el tono de invocación personal y de pacto.
- source_word: יַגִּיהַּ
  english_pob_choice: lights up
  chosen_spanish: alumbrará
  alternatives_spanish:
  - iluminará
  - hará brillar
  - resplandecerá
  lexicon: HALOT
  rationale: El causativo comunica hacer brillar/alumbrar. «Alumbrará» es claro y poético en español, y refleja el paralelismo con la primera cola.
- source_word: חָשְׁכִּי
  english_pob_choice: my darkness
  chosen_spanish: mis tinieblas
  alternatives_spanish:
  - mi oscuridad
  - la oscuridad que me rodea
  lexicon: HALOT
  rationale: Aunque el inglés conserva «my darkness», en español bíblico «tinieblas» es una forma natural y solemne para el campo semántico de oscuridad, angustia o peligro. El plural intensivo mantiene el matiz poético sin explicitar de más.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se preserva el nombre personal de Dios conforme al criterio doctrinal del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la clausula final sobre la oscuridad
  english_pob_reading: my darkness may refer to distress, danger, or gloom
  chosen_spanish_reading: mis tinieblas puede referirse a angustia, peligro o sombría opresión
  alternative_spanish_readings:
  - mi oscuridad
  - la oscuridad que me rodea
  rationale: La nota inglesa preserva la ambigüedad de חָשְׁכִּי. En español, «tinieblas» mantiene esa amplitud semántica sin cerrarla a una sola interpretación.
  doctrine_reference: POB lexical audit on חָשְׁכִּי
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con la auditoría inglesa; no se registran revisiones textuales ni cambios recientes relevantes. Se ha mantenido la metáfora concreta de la lámpara y la ambigüedad de las tinieblas, con adaptación española natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se conserva el paralelismo poético con dos miembros breves y equilibrados.
  - «Tinieblas» mantiene la amplitud semántica del hebreo y armoniza con el registro bíblico en español.
