translation:
  language: es
  text: 'Y yo vi, y supliqué el favor de Yahvé[a], y dije: «Basta, Yahvé,[b][c] de que tu mano pese sobre Israel por el ataque de las naciones[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «supliqué el rostro de Yahvé». La expresión griega conserva un modismo semítico de buscar el rostro, es decir, el favor o la presencia de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Basta ya, Yahvé», o «Sea suficiente, Yahvé». El imperativo griego Ἱκάνωσον puede entenderse más literalmente como una petición de suficiencia o cese.'
    reason: alternative_reading
  - marker: c
    text: Literalmente, «de que tu mano pese sobre Israel», conservando la imagen bíblica de presión o juicio divino.
    reason: cultural_note
  - marker: d
    text: 'O: «por la invasión de las naciones». El sustantivo ἐπαγωγή puede sugerir tanto el traer sobre alguien como el asalto de pueblos enemigos.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ ἐγὼ εἶδον
  english_pob_choice: And I saw
  chosen_spanish: Y yo vi
  alternatives_spanish:
  - Y vi
  - Y yo contemplé
  lexicon: LSJ
  rationale: El griego es una coordinación narrativa simple; «Y yo vi» conserva la primera persona enfática sin añadir interpretación.
- source_word: ἐδεήθην τοῦ προσώπου Κυρίου
  english_pob_choice: I entreated the face of the Lord
  chosen_spanish: supliqué ante el rostro del Señor
  alternatives_spanish:
  - imploré ante el rostro del Señor
  - suplicé ante la presencia del Señor
  lexicon: LSJ
  rationale: δέομαι expresa súplica intensa. «Ante el rostro del Señor» mantiene la imagen semítica de πρόσωπον sin volverla torpe en español; «rostro» preserva la referencia literal y «ante» conserva el valor relacional de la expresión.
- source_word: Ἱκάνωσον
  english_pob_choice: Enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Basta ya
  - Sea suficiente
  - Satisfecho, Señor
  lexicon: LSJ
  rationale: El imperativo pide cese o suficiencia. «Basta» es la forma natural y directa en español para una súplica urgente, y conserva la brevedad enfática del griego.
- source_word: τοῦ βαρύνεσθαι χεῖράς σου ἐπʼ Ἰσραήλ
  english_pob_choice: of your hand weighing heavily on Israel
  chosen_spanish: de tu mano que pesa sobre Israel
  alternatives_spanish:
  - de tu mano pesada sobre Israel
  - de tu mano que oprime a Israel
  lexicon: LSJ
  rationale: El griego conserva la imagen de la mano divina como peso/judicio. En español, «que pesa sobre Israel» mantiene la metáfora sin forzar una construcción genitiva literal; se prefirió el singular «mano» siguiendo la revisión inglesa más cercana al griego.
- source_word: ἐν ἐπαγωγῇ ἐθνῶν
  english_pob_choice: by the attack of the nations
  chosen_spanish: por el ataque de las naciones
  alternatives_spanish:
  - por la invasión de las naciones
  - a causa del asalto de las naciones
  - por la llegada de las naciones
  lexicon: LSJ
  rationale: ἐπαγωγή admite la idea de traer sobre alguien o de un asalto/invasión. «Ataque» en español comunica con claridad el contexto de hostilidad sin cerrar indebidamente la ambigüedad del término griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: LSJ
  rationale: Se conserva el vocativo reverencial tradicional para la oración dirigida a Dios en español bíblico contemporáneo.
theological_decisions:
- issue: Imagen del rostro del Señor en una súplica dirigida a Dios
  english_pob_reading: I entreated the face of the Lord
  chosen_spanish_reading: supliqué ante el rostro del Señor
  alternative_spanish_readings:
  - suplicé delante del Señor
  - imploré ante el rostro del Señor
  rationale: La frase no debe banalizarse a un simple «pedí». «Ante el rostro del Señor» conserva el sentido bíblico de buscar su favor/presencia, sin ocultar la literalidad del hebraísmo subyacente.
  doctrine_reference: 'DOCTRINE.md contested terms: πρόσωπον Κυρίου as a preserved Semitic idiom in prayer'
- issue: La mano de Yahvé en juicio o presión sobre Israel
  english_pob_reading: of your hand weighing heavily on Israel
  chosen_spanish_reading: de tu mano que pesa sobre Israel
  alternative_spanish_readings:
  - de tu mano que oprime sobre Israel
  - de tu mano pesada sobre Israel
  rationale: Se preserva la imagen de presión/jucio divino sin convertirla en una explicación teológica. La metáfora de la mano pesada permanece abierta, como en el griego y en el POB inglés.
  doctrine_reference: Biblical idiom of divine hand in judgment; preserve metaphor rather than flattening it
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que corrigió el singular de «hand» y afinó ἐπαγωγῇ como una relación más directa con el ataque de las naciones. En español se mantuvo el singular «mano» y se eligió «por el ataque de las naciones» para reflejar esa revisión sin perder la ambigüedad léxica del griego.
  spanish_consistency_notes:
  - Se conserva «Señor» para Κύριε, conforme al patrón de dirección reverente a Dios.
  - Se mantiene la metáfora de la mano pesada como imagen de juicio/presión divina, sin explicitarla excesivamente.
  - Se tradujo πρόσωπον con «rostro» para mantener la huella semítica visible en el texto español.
  - Las notas a pie distinguen entre la lectura literal y las opciones idiomáticas sin duplicar marcadores.
