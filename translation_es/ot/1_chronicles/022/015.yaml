translation:
  language: es
  text: 'Y contigo hay en abundancia obreros para la obra: canteros, y artesanos de piedra y madera, y todo hombre hábil[a] en toda clase de trabajo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y todo obrero hábil». El hebreo es literalmente masculino singular, «todo hombre hábil», usado aquí en sentido representativo para los trabajadores especializados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמְּךָ
  english_pob_choice: And with you
  chosen_spanish: Y contigo
  alternatives_spanish:
  - Y con respecto a ti
  - Y junto a ti
  lexicon: HALOT
  rationale: La preposición expresa compañía o cercanía directa; «contigo» mantiene la relación inmediata con Salomón y suena natural en español.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran número
  - muchos
  lexicon: HALOT
  rationale: La frase señala cantidad abundante; «en abundancia» conserva bien esa idea de plenitud de personas disponibles.
- source_word: עֹשֵׂי מְלָאכָה
  english_pob_choice: workers for the task
  chosen_spanish: obreros para la obra
  alternatives_spanish:
  - trabajadores para el trabajo
  - personas que hacen la obra
  lexicon: HALOT
  rationale: El participio con sustantivo indica personas dedicadas al trabajo de construcción; «obreros» y «obra» transmiten el sentido laboral y concreto sin sonar forzado.
- source_word: חֹצְבִים
  english_pob_choice: stonecutters
  chosen_spanish: canteros
  alternatives_spanish:
  - cortadores de piedra
  - talladores de piedra
  lexicon: HALOT
  rationale: En este contexto de construcción, el término se refiere a quienes labran o cortan piedra. «Canteros» es un equivalente natural y preciso en español.
- source_word: וְחָרָשֵׁי אֶבֶן וָעֵץ
  english_pob_choice: craftsmen of stone and wood
  chosen_spanish: artesanos de piedra y madera
  alternatives_spanish:
  - maestros de piedra y madera
  - obreros de piedra y madera
  lexicon: HALOT
  rationale: חָרָשׁ denota un trabajador hábil o artesano. «Artesanos de piedra y madera» preserva la idea de oficio especializado y la relación genitiva.
- source_word: וְכָל חָכָם
  english_pob_choice: and every skilled man
  chosen_spanish: y todo hombre hábil
  alternatives_spanish:
  - y todo obrero hábil
  - y toda persona hábil
  lexicon: HALOT
  rationale: Aquí חָכָם apunta a pericia práctica, no solo a sabiduría abstracta. Se mantiene «hombre» para reflejar el singular masculino representativo del hebreo, como en el POB inglés.
- source_word: בְּכָל מְלָאכָה
  english_pob_choice: in every kind of work
  chosen_spanish: en toda clase de trabajo
  alternatives_spanish:
  - en todo trabajo
  - para toda clase de obra
  lexicon: HALOT
  rationale: La preposición expresa ámbito o esfera de competencia; «en toda clase de trabajo» comunica la amplitud de habilidades requeridas de forma idiomática.
theological_decisions:
- issue: Lenguaje de género en חָכָם
  english_pob_reading: and every skilled man
  chosen_spanish_reading: y todo hombre hábil
  alternative_spanish_readings:
  - y todo obrero hábil
  - y toda persona hábil
  rationale: El hebreo usa una forma masculina singular con sentido representativo. Se conserva «hombre» para no neutralizar el rasgo gramatical documentado, siguiendo la política de exactitud de género del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'El texto español refleja la revisión más reciente del POB inglés: se conserva el singular masculino representativo en la cláusula final y se expresa la preposición final con una construcción más natural («en toda clase de trabajo» / «en toda clase de obra»), manteniendo la distinción entre canteros y artesanos especializados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el nombre divino; aquí no aplica.
  - «Obreros» y «obra» mantienen el campo semántico de trabajo constructivo sin repetir mecánicamente el sustantivo.
  - «Canteros» cubre el sentido de חֹצְבִים dentro del contexto de edificación.
  - La nota al pie conserva la alternativa lexical relevante y la tensión de género documentada en el inglés auditado.
