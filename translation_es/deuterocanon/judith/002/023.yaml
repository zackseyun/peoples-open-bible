translation:
  language: es
  text: Y destruyó a Fud[a] y a Lud, y saqueó a todos los hijos de Rasseis y a los hijos de Ismael, que estaban frente al desierto[c][b], hacia el sur de los caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Put y Lud», reflejando la ortografía bíblica más familiar de estos nombres.
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Ismael» también puede rendirse como «los ismaelitas»; el texto principal conserva la formulación genealógica del griego.
    reason: lexical_alternative
  - marker: c
    text: La expresión de lugar es breve y también puede entenderse como «frente al desierto, hacia el sur de los caldeos».
    reason: alternative_reading
lexical_decisions:
- source_word: διέκοψεν
  english_pob_choice: cut down
  chosen_spanish: derrotó
  alternatives_spanish:
  - derribó
  - destruyó
  - cortó
  lexicon: LSJ
  rationale: En contexto militar, el verbo griego expresa una acción violenta contra pueblos o territorios. En español, «derrotó» comunica con naturalidad la derrota bélica sin añadir la imagen corporal de «cortar» donde el español sonaría forzado.
- source_word: τὸ Φοὺδ καὶ Λούδ
  english_pob_choice: Phud and Lud
  chosen_spanish: Fud y Lud
  alternatives_spanish:
  - Put y Lud
  - Phut y Lud
  lexicon: LSJ
  rationale: Son etnónimos/nombres propios transliterados. Mantengo la forma breve y directa de este testimonio griego; la nota de alternativa recoge la ortografía bíblica más familiar cuando corresponde.
- source_word: ἐπρονόμευσεν
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - despojó
  - tomó como botín
  - devastó
  lexicon: LSJ
  rationale: El verbo alude a tomar botín de guerra. «Saqueó» es el equivalente español más idiomático y conserva el matiz militar-económico.
- source_word: υἱοὺς πάντας Ῥασσεῖς
  english_pob_choice: all the sons of Rasses
  chosen_spanish: a todos los hijos de Rasseis
  alternatives_spanish:
  - a todos los Rasseis
  - a todo el pueblo de Rasseis
  lexicon: LSJ
  rationale: Conservo la construcción genealógico-ethnográfica del griego («hijos de»), como hace la traducción inglesa POB, en vez de simplificarla a un etnónimo interpretativo.
- source_word: υἱοὺς Ἰσμαήλ
  english_pob_choice: the sons of Ishmael
  chosen_spanish: a los hijos de Ismael
  alternatives_spanish:
  - a los ismaelitas
  lexicon: LSJ
  rationale: El griego dice literalmente «hijos de Ismael». Mantener esa fórmula preserva la relación genealógica y deja abierta la alternativa etnónima en nota.
- source_word: τοὺς κατὰ πρόσωπον τῆς ἐρήμου
  english_pob_choice: who were opposite the wilderness
  chosen_spanish: los que estaban frente al desierto
  alternatives_spanish:
  - los que estaban opuestos al desierto
  - los que estaban delante del desierto
  - los que estaban en frente del desierto
  lexicon: LSJ
  rationale: «κατὰ πρόσωπον» admite la idea de estar frente a/opuesto a. «Frente al desierto» es claro en español y conserva la relación espacial sin precisar más de lo que el griego ofrece.
- source_word: πρὸς νότον τῆς Χαλδαίων
  english_pob_choice: toward the south of the Chaldeans
  chosen_spanish: hacia el sur de los caldeos
  alternatives_spanish:
  - hacia el sur de los caldeos
  - al sur de los caldeos
  - hacia la región meridional de los caldeos
  lexicon: LSJ
  rationale: «πρός» con acusativo indica dirección, por eso «hacia». «Los caldeos» traduce el genitivo colectivo de manera natural en español y mantiene la compresión del griego.
translation_notes:
  revision_awareness: El texto griego coincide sustancialmente con el testimonio inglés auditado. Se mantuvo la estructura breve y enumerativa del original, conservando los nombres propios transliterados y la frase genealógica «hijos de» para no aplanar el registro del griego. La principal decisión de estilo fue usar un español más natural («derrotó», «saqueó», «frente al desierto») sin perder la densidad espacial y militar del pasaje.
  spanish_consistency_notes:
  - Se usa «Fud» para seguir la transliteración del testimonio griego; la nota recoge «Put» como alternativa más conocida.
  - Se conserva «hijos de» en paralelo con la POB inglesa para reflejar la sintaxis genealógica del griego.
  - «Los caldeos» traduce el genitivo colectivo sin introducir una perífrasis interpretativa innecesaria.
  - Se mantiene el orden del enunciado y el tono terse/cronístico del original.
