translation:
  language: es
  text: También tendrán miedo de las alturas, y habrá terrores en el camino; el almendro florece, el saltamontes se arrastra[a], y la alcaparra desfallece[b], porque el hombre va a su casa eterna, y los dolientes[c] andan por la calle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el saltamontes se vuelve una carga». El hebreo es difícil; puede aludir tanto a un movimiento debilitado como a que hasta algo muy pequeño se vuelve pesado en la vejez.
    reason: lexical_alternative
  - marker: b
    text: O «el deseo desfallece». El hebreo dice literalmente «la alcaparra», probablemente una imagen ligada al apetito o al estímulo.
    reason: lexical_alternative
  - marker: c
    text: «Dolientes» puede incluir a plañideros profesionales que lamentaban públicamente a los muertos.
    reason: cultural_note
lexical_decisions:
- source_word: מִגָּבֹהַּ
  english_pob_choice: of heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - lo alto
  - de lugares altos
  lexicon: HALOT
  rationale: La imagen expresa temor ante la altura; «las alturas» mantiene el sustantivo concreto y suena natural en español sin perder el sentido idiomático.
- source_word: יִרָאוּ
  english_pob_choice: they are afraid
  chosen_spanish: temerán
  alternatives_spanish:
  - tienen miedo
  - temen
  lexicon: HALOT
  rationale: En este contexto gnómico, el futuro español comunica bien la descripción general de la vejez. «Temerán» conserva el valor de miedo del verbo hebreo.
- source_word: חַתְחַתִּים
  english_pob_choice: terrors
  chosen_spanish: terrores
  alternatives_spanish:
  - espantos
  - temores
  lexicon: HALOT
  rationale: «Terrores» reproduce el plural intensivo y el tono vívido del sustantivo hebreo.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en el camino
  lexicon: HALOT
  rationale: «Camino» preserva la imagen concreta de desplazamiento y funciona bien en español bíblico contemporáneo.
- source_word: יָנֵאץ הַשָּׁקֵד
  english_pob_choice: the almond tree blossoms
  chosen_spanish: el almendro florece
  alternatives_spanish:
  - el almendro brota
  - el almendro florece
  lexicon: HALOT
  rationale: El hebreo aquí se entiende tradicionalmente como una imagen de floración; «florece» es la forma más natural en español y conserva el cuadro poético.
- source_word: יִסְתַּבֵּל הֶחָגָב
  english_pob_choice: the grasshopper drags itself along
  chosen_spanish: la langosta se arrastra
  alternatives_spanish:
  - el saltamontes se arrastra
  - la langosta se arrastra
  lexicon: HALOT
  rationale: El verbo apunta a movimiento dificultoso o pesado; «se arrastra» mantiene la idea de debilitamiento. Se usa «langosta» como equivalente posible del insecto hebreo en este contexto.
- source_word: הָאֲבִיּוֹנָה
  english_pob_choice: the caper berry fails
  chosen_spanish: la alcaparra desfallece
  alternatives_spanish:
  - la alcaparra falla
  - el fruto de la alcaparra desfallece
  lexicon: HALOT
  rationale: Se conserva la referencia concreta del fruto/caper berry mediante «alcaparra», término español cercano y comprensible. «Desfallece» refleja la pérdida de vigor o eficacia sugerida por el contexto.
- source_word: כִּי הֹלֵךְ הָאָדָם
  english_pob_choice: because man is going
  chosen_spanish: porque el hombre va
  alternatives_spanish:
  - porque el hombre se va
  - porque el hombre camina
  lexicon: HALOT
  rationale: «El hombre» conserva el valor genérico singular de אָדָם. «Va» expresa de modo simple y solemne el avance hacia la muerte.
- source_word: בֵּית עוֹלָמוֹ
  english_pob_choice: his eternal house
  chosen_spanish: su casa eterna
  alternatives_spanish:
  - su hogar eterno
  - su morada eterna
  - su casa eterna
  lexicon: HALOT
  rationale: «Casa eterna» reproduce la metáfora hebrea de forma transparente. «Casa» mantiene la imagen más directa que «hogar» o «morada».
- source_word: הַסֹּפְדִים
  english_pob_choice: the mourners
  chosen_spanish: los que hacen duelo
  alternatives_spanish:
  - los dolientes
  - los plañideros
  lexicon: HALOT
  rationale: Para el participio, «los que hacen duelo» explicita la acción funeraria sin imponer de entrada una lectura profesionalizada; deja abierta la posible referencia cultural a los dolientes públicos.
theological_decisions:
- issue: Rendering of אָדָם as a generic singular
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El hebreo usa un singular representativo en un poema sobre la mortalidad. «El hombre» conserva esa forma concreta y coincide con la lectura de la POB inglesa sin neutralizar indebidamente el término.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (אָדָם), and Translation philosophy §4'
- issue: Public funeral lamenters implied by הַסֹּפְדִים
  english_pob_reading: mourners may include professional mourners
  chosen_spanish_reading: los que hacen duelo
  alternative_spanish_readings:
  - los dolientes
  - los plañideros
  rationale: La frase española mantiene el sentido básico de duelo y no obliga a decidir en el texto principal si se trata de dolientes familiares o profesionales. La posibilidad cultural se reserva para nota.
  doctrine_reference: English POB cultural note on הַסֹּפְדִים
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis del texto hebreo y la auditoría inglesa: conserva las imágenes encadenadas de temor, floración, insecto, fruto y muerte, y mantiene las ambigüedades documentadas en los puntos léxicos difíciles.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «El hombre» se emplea como singular genérico para אָדָם, coherente con el patrón del proyecto.
  - Se mantiene una diferenciación clara entre «camino» y «calle» para preservar las dos imágenes espaciales del verso.
  - «Los que hacen duelo» evita una sobreespecificación interpretativa en el texto principal, pero la nota deja abierta la lectura cultural de dolientes profesionales.
