translation:
  language: es
  text: Así se volvieron impuros por sus obras[a], y se prostituyeron por sus hechos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «fueron infieles por sus hechos». El hebreo usa una imagen sexualizada para la infidelidad moral y del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטְמְאוּ
  english_pob_choice: became unclean
  chosen_spanish: se contaminaron
  alternatives_spanish:
  - se hicieron impuros
  - quedaron contaminados
  - se mancharon
  lexicon: HALOT
  rationale: El hebreo expresa un estado/resultante de impureza. En español, «se contaminaron» comunica bien el resultado sin introducir necesariamente un agente externo, y suena natural en registro bíblico.
- source_word: בְּמַעֲשֵׂיהֶם
  english_pob_choice: by their deeds
  chosen_spanish: por sus obras
  alternatives_spanish:
  - por sus hechos
  - por sus acciones
  - mediante sus obras
  lexicon: HALOT
  rationale: «מַעֲשֶׂה» abarca obras/hechos/acciones. «Obras» mantiene la amplitud del término y conserva la relación causal/instrumental del hebreo, con buena resonancia en español bíblico.
- source_word: וַיִּזְנוּ
  english_pob_choice: prostituted themselves
  chosen_spanish: se prostituyeron
  alternatives_spanish:
  - fueron infieles
  - cometieron prostitución
  - fornicaron
  lexicon: HALOT
  rationale: Se preserva la imagen sexualizada del verbo para no borrar su fuerza metafórica de infidelidad idolátrica. «Se prostituyeron» es idiomático y conserva el matiz reflexivo del hebreo.
- source_word: בְּמַעַלְלֵיהֶם
  english_pob_choice: by their acts
  chosen_spanish: por sus hechos
  alternatives_spanish:
  - por sus obras
  - por sus prácticas
  - por sus acciones
  lexicon: HALOT
  rationale: «מַעֲלָל» se refiere a actos/hechos/prácticas, a menudo con carga moral. «Hechos» permite diferenciarlo de «obras» en la primera cláusula sin perder el sentido general.
theological_decisions:
- issue: Conservar o suavizar la metáfora sexual de זנה
  english_pob_reading: Retain the metaphor in the main text as 'prostituted themselves'
  chosen_spanish_reading: Conservar la metáfora en «se prostituyeron»
  alternative_spanish_readings:
  - fueron infieles
  - practicaron infidelidad espiritual
  - se apartaron con idolatría
  rationale: El verso describe corrupción moral y fidelidad rota en un marco de infidelidad del pacto. Mantener la metáfora evita resolver interpretativamente el texto y preserva la tensión del hebreo, tal como hace la versión inglesa de referencia.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El testimonio de revisión más reciente indica que no hubo cambios necesarios; esta redacción sigue de cerca la lectura auditada y conserva la misma decisión principal sobre la metáfora de זנה.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando corresponda al nombre divino, pero este versículo no lo contiene.
  - «Obras/hechos» mantiene la variación léxica del hebreo entre מַעֲשֵׂה y מַעֲלָל sin forzarlas a ser idénticas.
  - La nota al pie conserva la alternativa ética/covenantal documentada en el audit trail sin desplazarla al texto principal.
