review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: avance divino por el mar, con los caballos, y la imagen de una masa de muchas aguas. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece sobre «caballos» pero la nota explica la dificultad léxica de חֹמֶר, no de סוּסֶיךָ. Además, la nota omite la alternativa inglesa completa de ''masa/surgimiento de muchas aguas'' y por ello no preserva correctamente la incertidumbre léxica documentada.'
  spanish_quality_summary: 'El español es generalmente claro y digno. «Tú marchaste por el mar con tus caballos» suena natural. «Por el montón de muchas aguas» es comprensible, aunque algo rígido; sigue siendo aceptable por fidelidad poética. El problema principal de calidad es editorial: el marcador de nota está colocado en el sintagma equivocado, lo que induce a error al lector.'
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto en este versículo. La imaginería del guerrero divino se conserva sin suavizarse. Las decisiones léxicas principales («marchaste», «por el mar», «con tus caballos», «muchas aguas») son coherentes con el expediente inglés. Se debe corregir únicamente la ubicación de la nota para que la decisión sobre חֹמֶר quede bien documentada.
  issues:
  - severity: high
    issue: Marcador de nota al pie anclado en «caballos» en vez de en «montón».
    rationale: La nota explica la dificultad léxica de חֹמֶר ('montón/masa tumultuosa'), no de סוּסֶיךָ ('tus caballos'). Esto desaline­a la evidencia fuente, la auditoría inglesa y el texto español.
  - severity: medium
    issue: La nota al pie no refleja con suficiente precisión la alternativa documentada en inglés.
    rationale: El expediente inglés preserva la alternativa 'through the surging mass of many waters'. En español conviene explicitar 'masa agitada/tumultuosa de muchas aguas' para mantener la misma gama semántica.
  - severity: low
    issue: «Montón» puede sonar algo prosaico en español bíblico-poético.
    rationale: Aunque es una opción fiel para 'heap', algunos lectores podrían percibirla menos elevada que «masa» o «acumulación». No requiere cambio obligatorio porque el inglés revisado prefirió 'heap' y la frase sigue siendo inteligible.
  revised_spanish_text: Tú marchaste por el mar con tus caballos, por el montón[a] de muchas aguas.
  revised_footnotes:
  - marker: a
    text: O «por la masa agitada de muchas aguas». El término hebreo es difícil y puede designar una masa acumulada o tumultuosa de las aguas.
