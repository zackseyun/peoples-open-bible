translation:
  language: es
  text: Y no solo buscan maltratar a los que están sujetos a nosotros[a], sino que, al no poder soportar la prosperidad, incluso tratan de tramar contra sus propios benefactores;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al no poder soportar la abundancia» o «al no poder soportar la hartura»; el griego κόρον puede sugerir una prosperidad desbordante o una saciedad excesiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτεταγμένους
  english_pob_choice: those subject to us
  chosen_spanish: los que están sujetos a nosotros
  alternatives_spanish:
  - los subordinados a nosotros
  - los que están bajo nuestra autoridad
  - nuestros súbditos
  lexicon: BDAG
  rationale: ὑποτεταγμένους expresa personas colocadas bajo autoridad. ‘Los que están sujetos a nosotros’ conserva la relación de subordinación sin cargar el texto con un matiz político más fuerte que el griego exige.
- source_word: ζητοῦσι κακοποιεῖν
  english_pob_choice: seek to mistreat
  chosen_spanish: procuran hacer mal
  alternatives_spanish:
  - buscan hacer daño
  - buscan maltratar
  - tratan de hacer mal
  lexicon: BDAG
  rationale: La construcción indica que ‘buscan’ o ‘procuran’ causar daño. ‘Procuran hacer mal’ es natural en español y mantiene el sentido hostil sin añadir una intensidad no garantizada por el texto.
- source_word: κόρον
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - abundancia
  - hartura
  - saturación
  - satisfacción plena
  lexicon: LSJ
  rationale: κόρος puede significar saciedad, plenitud o exceso, y por extensión una situación de abundancia exitosa que no saben tolerar. ‘Prosperidad’ sigue la decisión del POB en inglés y comunica bien la idea moral del contexto.
- source_word: οὐ δυνάμενοι φέρειν
  english_pob_choice: unable to bear
  chosen_spanish: al no poder soportar
  alternatives_spanish:
  - al no poder tolerar
  - incapaces de soportar
  - al no poder endurecerse ante
  lexicon: BDAG
  rationale: φέρειν aquí tiene el valor de ‘soportar/endurar’. ‘Al no poder soportar’ reproduce de forma clara la imagen de incapacidad para resistir esa condición.
- source_word: τοῖς ἑαυτῶν εὐεργέταις
  english_pob_choice: their own benefactors
  chosen_spanish: sus propios benefactores
  alternatives_spanish:
  - quienes les han hecho bien
  - sus bienhechores
  - los que les han beneficiado
  lexicon: BDAG
  rationale: εὐεργέταις denota personas que hacen bien, benefactores. ‘Benefactores’ es fiel y reconocible en español bíblico, y ‘propios’ preserva el valor reflexivo de ἑαυτῶν.
- source_word: ἐπιχειροῦσι μηχανᾶσθαι
  english_pob_choice: attempt to scheme against
  chosen_spanish: tratan de maquinárselas contra
  alternatives_spanish:
  - intentan tramar contra
  - se empeñan en maquinar contra
  - procuran urdir contra
  lexicon: LSJ
  rationale: μηχανᾶσθαι implica idear o tramar, a menudo con intención hostil. ‘Maquinar’ comunica bien la trama; el giro ‘maquinárselas contra’ refleja la dirección adversativa explícita en el contexto.
translation_notes:
  revision_awareness: Concordancia alta con el texto fuente griego normalizado de Swete y con el seguimiento auditado en inglés; no se detectaron revisiones aplicadas en el pase más reciente. Se mantuvo la equivalencia óptima del POB inglés, especialmente en κόρος → ‘prosperidad’, con nota alternativa para preservar la tensión semántica.
  spanish_consistency_notes:
  - Se mantuvo ‘benefactores’ para εὐεργέταις por su fuerza lexical y su transparencia en registro bíblico.
  - ‘Prosperidad’ se eligió como equivalente principal de κόρος siguiendo el POB inglés; la nota conserva las alternativas ‘abundancia’ y ‘hartura’.
  - 'La sintaxis española conserva la coordinación del griego: primera cláusula de daño, segunda cláusula causal/participial, y luego la acción contra los benefactores.'
