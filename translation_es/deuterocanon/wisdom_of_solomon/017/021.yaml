- from: Pero sobre aquellos solos se impuso una noche pesada[a], imagen de la oscuridad que estaba a punto de recibirlos[b]; sin embargo, para sí mismos eran más pesados que la oscuridad.
  to: Pero solo sobre aquellos se impuso una noche pesada[a], imagen de la oscuridad que estaba a punto de recibirlos[b]; sin embargo, eran más opresivos para sí mismos que la oscuridad.
