    rationale: בְּיַד con יַחֲזִיק aquí no se refiere naturalmente a llevar a alguien de la mano, sino a sostener/apoyar la mano de los malhechores; el borrador cambia la imagen y puede sugerir acompañamiento benigno.
  - severity: low
