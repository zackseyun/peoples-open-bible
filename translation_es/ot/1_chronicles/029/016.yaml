translation:
  language: es
  text: Yahvé, nuestro Dios[a], toda esta abundancia[b] que hemos preparado para edificarte una casa para tu santo nombre es de tu mano[c], y todo es tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» traduce el nombre propio יְהוָה, no un título como «Señor».
    reason: source_note
  - marker: b
    text: 'O: «toda esta riqueza» o «todo este acopio»; el hebreo se refiere a la gran cantidad de materiales reunidos para el templo.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de tu mano es»; también puede expresarse «proviene de tu mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto en vez de una máscara litúrgica. En español bíblico actual, «Yahvé» comunica el Tetragrámaton con dignidad y sin sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  lexicon: HALOT
  rationale: En este contexto con Yahvé y un poseedor singular, el plural morfológico funciona como título singular deidad. «Nuestro Dios» es la equivalencia natural y fiel.
- source_word: כֹּל הֶהָמוֹן הַזֶּה
  english_pob_choice: all this abundance
  chosen_spanish: todo este abundante conjunto
  alternatives_spanish:
  - toda esta abundancia
  - todo este gran caudal
  - todo este tesoro
  lexicon: HALOT
  rationale: הֶהָמוֹן puede señalar gran cantidad, abundancia o riqueza acumulada. Como el contexto habla de materiales reunidos para el templo, «abundante conjunto» conserva la idea de suma/masa sin reducirla solo a dinero o a «multitud» de personas.
- source_word: הֲכִינֹנוּ
  english_pob_choice: we have prepared
  chosen_spanish: hemos preparado
  alternatives_spanish:
  - preparamos
  - hemos dispuesto
  lexicon: HALOT
  rationale: El verbo indica preparar o dejar listo. El perfecto hebreo se vierte con presente perfecto español para reflejar una acción completada con relevancia actual en la oración.
- source_word: לִבְנוֹת לְךָ בַיִת
  english_pob_choice: to build you a house
  chosen_spanish: para edificarte una casa
  alternatives_spanish:
  - para construirte una casa
  - para edificar una casa para ti
  - para construirte un templo
  lexicon: HALOT
  rationale: Se conserva בַּיִת como «casa», porque el texto usa ese término y el motivo teológico de la casa para el nombre divino es importante. «Edificarte» evita un calco torpe y mantiene el registro elevado.
- source_word: לְשֵׁם קָדְשֶׁךָ
  english_pob_choice: for your holy name
  chosen_spanish: para tu santo nombre
  alternatives_spanish:
  - para el nombre de tu santidad
  - para tu nombre sagrado
  lexicon: HALOT
  rationale: La construcción expresa dedicación al nombre de Dios. «Santo nombre» es una formulación clara, bíblica y fiel, que preserva el énfasis en la santidad del nombre divino.
- source_word: מִיָּדְךָ הִיא
  english_pob_choice: is from your hand
  chosen_spanish: proviene de tu mano
  alternatives_spanish:
  - es de tu mano
  - está de tu mano
  - sale de tu mano
  lexicon: HALOT
  rationale: La imagen hebrea «de tu mano» expresa procedencia y provisión divina. «Proviene de tu mano» comunica la relación idiomática sin perder la metáfora original.
- source_word: וּלְךָ הַכֹּל
  english_pob_choice: and all things are yours
  chosen_spanish: y todo es tuyo
  alternatives_spanish:
  - y todas las cosas son tuyas
  - y todo te pertenece
  lexicon: HALOT
  rationale: La frase afirma la posesión absoluta de Dios. «Todo es tuyo» conserva la concisión del hebreo y la fuerza de pertenencia total.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión POB de no ocultar el Nombre con un título. En español, «Yahvé» es la forma de referencia que mejor preserva el valor del Tetragrámaton en un registro bíblico contemporáneo.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre «tu santo nombre» y la casa preparada
  english_pob_reading: for your holy name
  chosen_spanish_reading: para tu santo nombre
  alternative_spanish_readings:
  - para el nombre de tu santidad
  - para tu nombre sagrado
  rationale: 'No se paraphrasea como si fuera simplemente un edificio religioso genérico. La frase conserva la orientación cultual y teológica: la casa se edifica en función del Nombre santo de Yahvé.'
  doctrine_reference: 1 Crónicas 29:16; nombre divino y dedicación del templo
- issue: Sentido de la clausula final de propiedad total
  english_pob_reading: and all things are yours
  chosen_spanish_reading: y todo es tuyo
  alternative_spanish_readings:
  - y todas las cosas son tuyas
  - y todo te pertenece
  rationale: Se mantiene la afirmación de propiedad total sin endurecerla en una formulación más interpretativa. La brevedad española refleja bien la fuerza absoluta del hebreo.
  doctrine_reference: 1 Crónicas 29:16; soberanía y posesión divina
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió una forma más directa para מִיָּדְךָ הִיא («is from your hand») y cerró con una fórmula de pertenencia total («all things are yours»). La versión española refleja esa misma dirección: «proviene de tu mano» y «todo es tuyo», manteniendo a la vez la imagen hebrea de la mano y el valor posesivo absoluto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «Casa» se conserva para בַּיִת, evitando sustituirlo por «templo» porque el texto mismo usa el término casa.
  - «Espíritu/espíritu» no aparece en este versículo; no aplica distinción adicional.
  - La puntuación y el orden sintáctico buscan una lectura pública natural en español, sin perder la estructura de alabanza y reconocimiento de provisión divina.
