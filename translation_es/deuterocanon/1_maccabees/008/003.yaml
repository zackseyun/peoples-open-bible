translation:
  language: es
  text: y lo que hicieron en la tierra de España[a], para obtener el control de las minas de plata y de oro de allí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los recursos de plata y oro de allí»; el griego puede referirse tanto a los metales mismos como a las minas de donde se obtenían.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χώρα
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - región
  - territorio
  lexicon: LSJ
  rationale: χώρα puede significar tierra, región o territorio. «Tierra» conserva el sentido geográfico amplio del POB en inglés y suena natural en español sin sugerir un estado nación moderno.
- source_word: Σπανίας
  english_pob_choice: Spain
  chosen_spanish: España
  alternatives_spanish:
  - Hispania
  lexicon: LSJ
  rationale: El genitivo con χώρα apunta al territorio occidental conocido. «España» es la forma geográfica natural para el lector hispanohablante; «Hispania» sería más transliterada, pero menos idiomática.
- source_word: κατακρατῆσαι
  english_pob_choice: gain control of
  chosen_spanish: tomar control de
  alternatives_spanish:
  - ganar control de
  - apoderarse de
  - dominar
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa propósito. «Tomar control de» transmite la idea de asegurar dominio sobre los recursos sin reducirla al matiz más brusco de «apoderarse de».
- source_word: μέταλλα
  english_pob_choice: mines
  chosen_spanish: minas
  alternatives_spanish:
  - metales
  - recursos minerales
  lexicon: LSJ
  rationale: Aunque μέταλλα puede referirse a metales o minas, el contexto económico y militar favorece la idea de explotaciones mineras. «Minas» preserva bien ese sentido en español.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - silver
  lexicon: LSJ
  rationale: En español bíblico y general, el nombre del metal se expresa naturalmente como «plata». Mantiene la correspondencia con el paralelo «oro» y el valor material del texto.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - gold
  lexicon: LSJ
  rationale: «Oro» es la equivalencia natural y directa del metal precioso en español.
- source_word: τοῦ ἐκεῖ
  english_pob_choice: there
  chosen_spanish: de allí
  alternatives_spanish:
  - allí
  - de ese lugar
  lexicon: LSJ
  rationale: La construcción con artículo y adverbio funciona idiomáticamente para ubicar las minas en esa región. «De allí» fluye con naturalidad en español y mantiene la referencia locativa.
translation_notes:
  revision_awareness: El texto griego y el auditable audit trail inglés están en alto acuerdo; no se requieren revisiones textuales. Se ha optado por una equivalencia óptima que conserve el sentido geográfico y económico sin sobretraducir ni suavizar la fuerza de κατακρατῆσαι.
  spanish_consistency_notes:
  - Se mantiene «España» para Σπανίας, siguiendo el equivalente geográfico natural en español.
  - Se conserva la ambigüedad de μέταλλα mediante la nota, ya que el POB en inglés documenta la alternativa entre «mines» y los «metals/resources» mismos.
  - El registro es sobrio y publicable, con sintaxis española natural y sin calcos innecesarios.
