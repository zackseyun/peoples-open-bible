  text: כִּ֣י הִנֵּֽה אָנֹכִי֩ מֵקִ֨ים רֹעֶ֜ה בָּ/אָ֗רֶץ הַ/נִּכְחָד֤וֹת לֹֽא יִפְקֹד֙ הַ/נַּ֣עַר לֹֽא יְבַקֵּ֔שׁ וְ/הַ/נִּשְׁבֶּ֖רֶת לֹ֣א יְרַפֵּ֑א הַ/נִּצָּבָה֙ לֹ֣א יְכַלְכֵּ֔ל וּ/בְשַׂ֤ר הַ/בְּרִיאָה֙ יֹאכַ֔ל וּ/פַרְסֵי/הֶ֖ן יְפָרֵֽק־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/011/016.yaml
  text: For behold[a], I am raising up a shepherd in the land who will not attend to the perishing, will not seek the scattered, will not heal the broken, will not sustain the healthy[c][b], but will eat the flesh of the fat ones and tear off their hooves.
  footnotes:
  - marker: a
    text: Or 'the young'; Hebrew הַנַּעַר can denote a young one/youth, though in this shepherding context many understand it as a straying or vulnerable member of the flock.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lost' / 'those being destroyed' for 'the perishing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the healthy one' for 'the standing.' The Hebrew is literally 'the one standing.'
    reason: lexical_alternative
