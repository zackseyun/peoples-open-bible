  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: contraste inicial, ubicación en Bet-sur/Betsura, permanencia de un grupo, abandono de la ley y los mandamientos, y la razón de que el lugar les servía de refugio. Sin embargo, la transliteración elegida y su tratamiento con nota no son ideales para el texto principal, y la cláusula final suena más natural en español con orden ajustado.'
  spanish_quality_summary: El español es claro y legible, pero «Bet-sur[a]» resulta gráficamente extraño en el cuerpo del texto por el guion y el anclaje dentro del topónimo. Además, la nota es innecesaria para un nombre propio corriente. «Porque para ellos era un refugio» es comprensible, pero «pues les servía de refugio» o «porque les servía de refugio» suena más idiomático y conserva bien el valor causal.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «La ley», «los mandamientos» y «refugio» están bien. «Abandonado» es una opción válida para καταλειπόντων, aunque «habían abandonado» frente a «habían dejado/abandonado» no requiere adjudicación adicional.
  issues:
  - severity: medium
    issue: 'Forma del topónimo en el texto principal: «Bet-sur[a]»'
    rationale: La grafía con guion y marcador incrustado dentro del nombre propio es poco natural en español bíblico legible. Dado que el inglés auditado usa Bethsura y el griego Βεθσούροις, una forma continua como «Betsura[a]» funciona mejor en español y evita una presentación artificiosa.
  - severity: low
    issue: Nota de transliteración prescindible
    rationale: El topónimo no crea una ambigüedad relevante y no necesita nota explicativa salvo política editorial específica. Si se conserva nota, el anclaje debe ir después del nombre completo, no dentro de él.
  - severity: low
    issue: Cláusula final algo rígida
    rationale: «Porque para ellos era un refugio» es correcto, pero «porque les servía de refugio» expresa de modo más natural que el lugar funcionaba como refugio para ellos, en línea con ἦν γὰρ αὐτοῖς φυγαδευτήριον.
  revised_spanish_text: Pero en Betsura[a] quedaron algunos de los que habían abandonado la ley y los mandamientos, porque les servía de refugio.
  revised_footnotes:
  - marker: a
    text: Betsura es la transliteración del griego Βεθσούροις, nombre de lugar conservado sin traducir.
    reason: source_note
  revision_rationale: Se ajusta el topónimo a una forma continua y más natural en español («Betsura»), se coloca correctamente el marcador de nota después del nombre completo, y se mejora la fluidez de la cláusula final con «les servía de refugio», sin alterar el sentido del original griego.
