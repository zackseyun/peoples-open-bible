  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered distributive language in אִישׁ ... אָחִיו
  chosen_reading: each man to his brother
  alternative_readings:
  - each one to another
  - everyone to his neighbor
  rationale: The Hebrew uses masculine representative language. Per the translation philosophy, gender-accurate rendering is preferred over flattening to gender-neutral English, while a footnote can clarify the broader social application.
