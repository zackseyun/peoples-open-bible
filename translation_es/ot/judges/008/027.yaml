revisions:
- from: Gedeón lo hizo un efod y lo colocó en su ciudad[a], en Ofra. Y todo Israel se prostituyó tras él allí[b], y vino a ser una trampa para Gedeón y para su casa.
  to: Gedeón lo convirtió en un efod[a] y lo colocó en su ciudad, en Ofra. Y todo Israel se prostituyó tras él allí,[b] y llegó a ser una trampa para Gedeón y para su casa.
  rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras relevantes en el texto. También se mejoró la naturalidad y precisión de 'lo hizo un efod' a 'lo convirtió en un efod', que refleja mejor el sentido resultativo del hebreo. Se mantuvo 'todo Israel se prostituyó' como singular colectivo, ajustando la nota alternativa sin alterar el sentido. El resto del versículo puede permanecer sustancialmente igual.
