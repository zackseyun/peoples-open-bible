  text: in these last days he has spoken to us in a Son, whom he appointed heir of all things, through whom he also made the ages.
translation:
  language: ko
  text: 이 마지막 날에는 아들을 통하여[a] 우리에게 말씀하셨습니다. 그분을 만유의 상속자로 세우셨고, 또한 그분을 통하여 세상들을[b] 지으셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐν υἱῷ는 관사가 없어 「한 아들 안에/아들로서」의 뉘앙스를 띠며, 1절의 ἐν τοῖς προφήταις(예언자들을 통하여)와 대조를 이룬다. 한국어에서는 「아들을 통하여」로 옮겨 대구를 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「영원들/시대들」. τοὺς αἰῶνας는 시간적 시대뿐 아니라 그 시대를 포함하는 피조 세계 전체를 가리키는 유대적 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν υἱῷ
  english_pob_choice: in a Son
  chosen_korean: 아들을 통하여
  alternatives_korean:
  - 한 아들 안에서
  - 아들로
  lexicon: BDAG
  rationale: 관사 없는 ἐν υἱῷ는 아들의 인격적·신분적 성격을 강조한다. 한국어에서 「한 아들 안에서」는 어색하므로, 1절의 「예언자들을 통하여」와의 구조적 대구를 살려 「아들을 통하여」로 옮긴다.
