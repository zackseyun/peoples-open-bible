translation:
  language: es
  text: Y vieron al Dios de Israel, y debajo de sus pies había algo como un pavimento de piedra de zafiro[a][b], como los mismos cielos en claridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «lapislázuli»; la identificación precisa de סַפִּיר en el mundo antiguo es incierta.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como la obra de un pavimento de zafiro»; imagen de una superficie trabajada, como de ladrillos o losas, debajo de sus pies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - contemplaron
  lexicon: HALOT
  rationale: ראה en qal wayyiqtol expresa percepción visual directa. «Vieron» es la opción natural y fiel en español, sin suavizar la afirmación narrativa.
- source_word: אֵת אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - a Dios de Israel
  - al Dios de Israel, el Dios de Israel
  lexicon: HALOT
  rationale: El objeto directo con אֵת se expresa naturalmente en español con la preposición «a». «Dios de Israel» preserva la especificidad del referente sin sustituirlo por una formulación más genérica.
- source_word: וְתַחַת רַגְלָיו
  english_pob_choice: and under his feet was
  chosen_spanish: y debajo de sus pies había
  alternatives_spanish:
  - y bajo sus pies estaba
  - y debajo de sus pies era
  lexicon: HALOT
  rationale: תחת significa «debajo/bajo». El hebreo es una construcción nominal; en español se completa con «había» para dar fluidez. Se conserva el lenguaje antropomórfico de «sus pies» por fidelidad al texto.
- source_word: כְּמַעֲשֵׂה לִבְנַת הַסַּפִּיר
  english_pob_choice: something like a pavement of sapphire stone
  chosen_spanish: algo como un pavimento de piedra de zafiro
  alternatives_spanish:
  - algo como una obra de pavimento de zafiro
  - algo como un enlosado de zafiro
  - algo como un pavimento de lapislázuli
  lexicon: HALOT
  rationale: מַעֲשֶׂה aquí comunica una superficie hecha o trabajada; «pavimento» expresa mejor la imagen espacial que «obra» en español. לִבְנָה puede sugerir ladrillo o losa; por eso «pavimento» evita reducirlo a una sola pieza. Se mantiene «piedra de zafiro» como equivalente tradicional y claro, con la alternativa mineral en nota.
- source_word: וּכְעֶצֶם הַשָּׁמַיִם
  english_pob_choice: like the very heavens
  chosen_spanish: como el mismo cielo
  alternatives_spanish:
  - como los mismos cielos
  - como el cielo mismo
  - como la esencia de los cielos
  lexicon: HALOT
  rationale: עֶצֶם aquí funciona como intensificador/comparativo, no como «hueso». «El mismo cielo» reproduce en español la idea de identidad o correspondencia intensificada, manteniendo la fuerza poética sin literalismo extraño.
- source_word: לָטֹהַר
  english_pob_choice: in clearness
  chosen_spanish: en pureza
  alternatives_spanish:
  - en claridad
  - en limpieza
  - en resplandor
  lexicon: HALOT
  rationale: טֹהַר puede referir pureza o claridad. Dado el contexto visual, «pureza» conserva la amplitud semántica del término y deja abierta la cualidad luminosa sugerida por la escena. «En claridad» es una alternativa posible, pero «pureza» enlaza mejor con la formulación hebrea.
theological_decisions:
- issue: Visión directa de Dios y lenguaje antropomórfico
  english_pob_reading: Retain the direct statement 'they saw the God of Israel' and the bodily language 'under his feet' without paraphrastic softening.
  chosen_spanish_reading: Mantener «vieron al Dios de Israel» y «debajo de sus pies» sin añadir aclaraciones interpretativas.
  alternative_spanish_readings:
  - vieron una manifestación del Dios de Israel
  - vieron donde estaba el Dios de Israel
  rationale: El hebreo afirma la visión y describe lo que había bajo sus pies. La traducción conserva esa tensión teológica en vez de resolverla con explicaciones que el texto no ofrece. Así se respeta tanto la literalidad como la honestidad auditiva del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto inglés auditado fue afinado para eliminar una segunda conjunción antes de la comparación final, dejando la última cláusula como una sola comparación fluida. La versión española sigue esa misma estructura: una descripción principal seguida de una comparación final sin duplicar conectores.'
  spanish_consistency_notes:
  - Se mantiene «Dios de Israel» y no «SEÑOR», conforme al texto hebreo אֱלֹהֵי יִשְׂרָאֵל.
  - Se usa «zafiro» en el texto principal con nota alternativa de «lapislázuli», siguiendo la cautela lexical del auditorio inglés.
  - Se conserva el lenguaje antropomórfico («sus pies») porque el hebreo lo presenta de forma explícita.
  - «Pureza» se eligió para לָטֹהַר por su amplitud semántica; en un registro más visual podría decirse «claridad», pero se deja esa opción en la decisión lexical.
