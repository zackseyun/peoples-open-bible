translation:
  language: es
  text: Y aconteció que, cuando volvió la espalda[a] para irse de Samuel, Dios le dio[b] otro corazón, y todas estas señales acontecieron aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se volvió para irse». El hebreo dice literalmente: «cuando volvió su hombro», un modismo para partir o retirarse.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios le dio un corazón diferente». El hebreo es literalmente: «Dios cambió para él otro corazón».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa hebrea con un giro natural en español, de registro digno y bíblico sin calco duro.
- source_word: כְּהַפְנֹתוֹ שִׁכְמוֹ
  english_pob_choice: when he turned his back
  chosen_spanish: cuando volvió la espalda
  alternatives_spanish:
  - cuando giró el hombro
  - cuando se volvió para irse
  lexicon: HALOT
  rationale: La POB inglesa decidió explicar el modismo como un gesto de partida. En español, 'volver la espalda' comunica el mismo valor idiomático con naturalidad, sin perder la idea de apartarse de Samuel.
- source_word: לָלֶכֶת מֵעִם שְׁמוּאֵל
  english_pob_choice: to go from Samuel
  chosen_spanish: para irse de Samuel
  alternatives_spanish:
  - para salir de junto a Samuel
  - para alejarse de Samuel
  lexicon: HALOT
  rationale: '''Irse de Samuel'' expresa bien el alejamiento y mantiene el movimiento del infinitivo sin sobreexplicar.'
- source_word: וַיַּהֲפָךְ ל֥וֹ אֱלֹהִים
  english_pob_choice: that God gave him another heart
  chosen_spanish: Dios le dio otro corazón
  alternatives_spanish:
  - Dios le dio un corazón diferente
  - Dios le cambió el corazón
  lexicon: HALOT
  rationale: La POB inglesa opta por una equivalencia que evita imponer una lectura doctrinal cerrada. En español, 'le dio otro corazón' preserva el cambio interior sin convertirlo explícitamente en regeneración o mero ánimo.
- source_word: לֵב אַחֵר
  english_pob_choice: another heart
  chosen_spanish: otro corazón
  alternatives_spanish:
  - un corazón distinto
  - un corazón nuevo
  lexicon: HALOT
  rationale: '''Otro corazón'' refleja de cerca el hebreo y mantiene la tensión entre alteración interior real y formulación no técnica.'
- source_word: וַיָּבֹאוּ כָּל הָאֹתוֹת הָאֵלֶּה
  english_pob_choice: all these signs came to pass
  chosen_spanish: todas estas señales acontecieron
  alternatives_spanish:
  - todas estas señales se cumplieron
  - todas estas señales sucedieron
  lexicon: HALOT
  rationale: '''Señales'' sigue la equivalencia de la POB inglesa para אֹתוֹת en este contexto; ''acontecieron'' mantiene el carácter de cumplimiento narrativo sin agregar matiz interpretativo no explícito en el verbo.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Expresión temporal natural en español, fiel y sobria.
theological_decisions:
- issue: Naturaleza del cambio interior de Saúl
  english_pob_reading: Render the phrase literally as a divinely given change of inner disposition without specifying regeneration, conversion, or merely psychological courage.
  chosen_spanish_reading: Dios le dio otro corazón
  alternative_spanish_readings:
  - Dios le dio un corazón nuevo
  - Dios lo transformó interiormente
  - Dios le dio valor para reinar
  rationale: 'La formulación conserva la ambigüedad teológica del hebreo y del audit trail inglés: hay un cambio real producido por Dios, pero el texto no obliga a definirlo como regeneración, conversión o simple valentía.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en los puntos principales: se prefiere una expresión idiomática para el gesto de partida (''volvió la espalda''), una formulación natural para la alteración interior (''le dio otro corazón'') y una clausula temporal formal (''aquel día'').'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, coherente con el valor singular del verbo y con la norma del proyecto.
  - '''Señales'' reproduce el valor narrativo de אֹתוֹת en este contexto; no se opta por ''prodigios'' porque el énfasis del versículo es el cumplimiento de indicios anunciados.'
  - '''Otro corazón'' conserva la tensión lexicográfica y teológica sin introducir léxico técnico posterior.'
