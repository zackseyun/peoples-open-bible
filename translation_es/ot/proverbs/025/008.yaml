revisions:
- from: No salgas apresuradamente a una disputa[a], no sea que al final, cuando tu prójimo[b] te avergüence, no sepas qué hacer.
  to: No salgas apresuradamente a una disputa[a], no sea que al final, cuando tu vecino[b] te avergüence, no sepas qué hacer.
  rationale: Se mantiene la traducción principal casi intacta por su fidelidad y buena legibilidad, pero se cambia «tu prójimo» por «tu vecino» para alinearse mejor con רֵעֶךָ según el expediente inglés. Además, se corrige la nota b para que el matiz legal recaiga sobre la contienda/pleito (לָרִיב) y no sobre «vecino», y se ajusta la razón de la nota a a una explicación léxica de la elipsis.
