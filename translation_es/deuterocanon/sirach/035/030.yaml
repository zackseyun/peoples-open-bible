translation:
  language: es
  text: Porque es mejor que tus hijos te supliquen[a] que tú mires a las manos de tus hijos varones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te pidan»; el verbo griego puede denotar pedir con insistencia o suplicar, no necesariamente mendigar en sentido literal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «mires a las manos de tus hijos varones», una imagen de depender de ellos para sustento o ayuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más conveniente
  - preferible
  lexicon: LSJ
  rationale: El comparativo expresa una valoración; «mejor» es la equivalencia natural y clara en español moderno.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: LSJ
  rationale: En este contexto doméstico, «hijos» comunica de forma natural la relación familiar. Aunque τέκνα es más amplio que υἱοί, el español no distingue con igual naturalidad entre ambos términos sin recargar el verso.
- source_word: δεηθῆναί
  english_pob_choice: should beg
  chosen_spanish: te pidan
  alternatives_spanish:
  - te rueguen
  - te imploren
  - te supliquen
  lexicon: LSJ
  rationale: El verbo puede significar pedir con insistencia o suplicar. En español, «pedir» mantiene la fuerza de solicitud sin volver la frase excesivamente áspera; la nota conserva la alternativa más intensa.
- source_word: ἐμβλέπειν
  english_pob_choice: should look to
  chosen_spanish: mirar
  alternatives_spanish:
  - volver la mirada a
  - depender de
  - mirar hacia
  lexicon: LSJ
  rationale: Con εἰς χεῖρας, la imagen es literalmente de mirar hacia las manos como fuente de ayuda. «Mirar a» conserva la metáfora corporal sin convertirla en paráfrasis abstracta.
- source_word: εἰς χεῖρας
  english_pob_choice: to the hands
  chosen_spanish: a las manos
  alternatives_spanish:
  - en las manos
  - de las manos
  lexicon: LSJ
  rationale: Se preserva la imagen concreta de las manos como lugar de provisión o apoyo, siguiendo de cerca el griego.
- source_word: υἱῶν
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - muchachos
  lexicon: LSJ
  rationale: Aunque υἱῶν es literalmente «hijos varones» / «hijos», el contexto repetido hace natural en español la repetición de «hijos». El contraste de género del griego queda atenuado por razones de fluidez, pero la nota puede señalar la imagen original si se desea.
theological_decisions:
- issue: Dependencia económica invertida entre padres e hijos
  english_pob_reading: The image of children begging from a parent is retained, and the hands of sons suggest depending on them for support.
  chosen_spanish_reading: Se conserva la imagen de los hijos pidiendo al padre, y de éste mirando a las manos de sus hijos como señal de dependencia de ellos para sustento.
  alternative_spanish_readings:
  - '...mirar a las manos de tus hijos como señal de esperar ayuda de ellos'
  - '...dependiendo de las manos de tus hijos'
  rationale: El griego usa una imagen concreta y relacional, no una abstracción; la traducción mantiene la tensión social y económica del proverbio sin explicitar más de lo que el texto ofrece.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4–5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren revisiones sustanciales. La principal decisión fue conservar la imagen concreta de «las manos» y reflejar en español la relación familiar inversa sin sobreexplicarla.
  spanish_consistency_notes:
  - Se prefirió «hijos» para ambas ocurrencias por naturalidad del español, aunque el griego distingue τέκνα de υἱῶν.
  - Se evitó «SEÑOR» o lenguaje litúrgico ajeno porque no aparece en este versículo.
  - La puntuación con «Porque» sigue la función explicativa de γάρ en el contexto del proverbio.
