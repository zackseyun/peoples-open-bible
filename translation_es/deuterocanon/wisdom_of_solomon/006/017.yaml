translation:
  language: es
  text: Pues su comienzo más verdadero es el deseo de instrucción[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su comienzo más seguro es un anhelo de disciplina/instrucción». El griego παιδεία puede incluir instrucción, formación o disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχὴ
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - inicio
  lexicon: BDAG
  rationale: ἀρχή expresa el punto inicial u origen. «Comienzo» conserva el valor de inicio concreto en un enunciado sapiencial y suena natural en español bíblico contemporáneo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento de lo dicho antes. «Porque» comunica bien la relación causal/explicativa en español sin perder fluidez.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: de ella
  alternatives_spanish:
  - su
  - de ella misma
  lexicon: BDAG
  rationale: El pronombre femenino remite a la Sabiduría personificada. «De ella» preserva la referencia personal y evita convertirla en un abstracto impersonal.
- source_word: ἡ ἀληθεστάτη
  english_pob_choice: the truest
  chosen_spanish: el más verdadero
  alternatives_spanish:
  - el más genuino
  - el más seguro
  lexicon: BDAG
  rationale: El superlativo intensifica la afirmación. «El más verdadero» refleja con fidelidad la forma superlativa de ἀληθής, aunque en español suene algo menos idiomático que otras opciones; se conserva la fuerza semántica del original.
- source_word: παιδείας
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la formación
  - la enseñanza
  lexicon: BDAG
  rationale: παιδεία abarca instrucción, formación y disciplina. «Instrucción» fue preferida en el texto principal por su amplitud y por encajar bien en el discurso sapiencial; puede incluir el sentido formativo sin restringirse a una escuela formal.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - aspiración
  - ardiente deseo
  lexicon: BDAG
  rationale: ἐπιθυμία designa deseo o anhelo. «Deseo» es el equivalente directo y no añade intensidad psicológica que el griego no exija.
theological_decisions:
- issue: Sabiduría personificada en femenino
  english_pob_reading: Retain feminine reference ('her')
  chosen_spanish_reading: Conservar la referencia femenina ('de ella')
  alternative_spanish_readings:
  - neutralizar con 'su' sin antecedente explícito
  - tratarla como 'ello'
  rationale: El griego usa un pronombre femenino que mira a la Sabiduría personificada. Mantener «de ella» preserva la personificación literaria y evita borrar una tensión importante del texto fuente.
  doctrine_reference: 'DOCTRINE.md: primacía del sentido del original y respeto por la personificación literaria'
- issue: Relación explicativa de γάρ
  english_pob_reading: for
  chosen_spanish_reading: «Porque» como enlace explicativo
  alternative_spanish_readings:
  - «pues»
  - «ya que»
  rationale: El versículo funciona como fundamento de la afirmación anterior; «Porque» transmite de forma clara la conexión lógica sin forzar un matiz doctrinal distinto.
  doctrine_reference: 'DOCTRINE.md: traducción fiel de conectores lógicos del original'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece anclado en el texto principal justo después de «instrucción». También se evitó dejar notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y solemne, sin calcar de manera rígida el orden del inglés.
  - Se prefirió «Sabiduría» implícita por el contexto, sin añadirla al verso porque el griego aquí usa pronombre y no el sustantivo.
  - Se respetó la ambigüedad de παιδεία mediante nota, en vez de reducirla a una sola acepción estrecha.
