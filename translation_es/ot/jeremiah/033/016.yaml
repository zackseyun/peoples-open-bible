base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/016.yaml
  text: 'In those days Judah will be saved[a], and Jerusalem will dwell securely[b]; and this is what she will be called: ‘Yahweh is our righteousness.’'
  footnotes:
  - marker: a
    text: Or, more formally, 'and this is the name by which she will be called.'
    reason: lexical_alternative
  - marker: b
    text: Jeremiah 23:6 applies the closely related title 'The LORD is our righteousness' to the coming Davidic king; here the grammar applies it to Jerusalem, likely echoing that earlier promise.
    reason: cross_reference
