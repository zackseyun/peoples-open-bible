translation:
  language: es
  text: Amram tomó a Jocabed[a], la hermana de su padre, por esposa, y ella le dio a luz a Aarón y a Moisés. Los años de la vida de Amram fueron ciento treinta y siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, 'la hermana de su padre', si el término de parentesco se entiende en su sentido más estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - la tomó por esposa
  lexicon: HALOT
  rationale: לקח en contexto matrimonial conserva la idea básica de 'tomar'; en español, 'tomó por esposa' sería más literal, pero 'tomó' mantiene el verbo de acción con naturalidad y permite expresar la relación con 'por esposa' más adelante en la frase.
- source_word: דֹּדָתוֹ
  english_pob_choice: his father’s sister
  chosen_spanish: la hermana de su padre
  alternatives_spanish:
  - su tía
  - su tía paterna
  lexicon: HALOT
  rationale: El inglés auditado precisó la relación como 'his father’s sister' para mayor exactitud léxica. En español, 'la hermana de su padre' transmite esa precisión sin introducir el término moderno 'tía', que puede sonar más interpretativo que el hebreo en este contexto genealógico.
- source_word: לְאִשָּׁה
  english_pob_choice: as his wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - como su esposa
  lexicon: HALOT
  rationale: La construcción hebrea indica relación matrimonial formal. 'Por esposa' conserva bien el sentido idiomático y evita una repetición pesada de posesivos en español.
- source_word: וַתֵּלֶד לוֹ
  english_pob_choice: and she bore to him
  chosen_spanish: y ella le dio a luz a
  alternatives_spanish:
  - y le dio a luz
  - y lo dio a luz
  lexicon: HALOT
  rationale: ילד en qal con dativo se expresa de manera natural en español con 'dar a luz'. Añadir 'a él' mediante 'le' refleja el dativo hebreo y mantiene el registro genealógico.
- source_word: וְאֶת מֹשֶׁה
  english_pob_choice: and Moses
  chosen_spanish: y a Moisés
  alternatives_spanish:
  - y Moisés
  lexicon: HALOT
  rationale: El marcador acusativo hebreo no se traduce, pero en español el objeto humano requiere la preposición 'a'.
- source_word: שְׁנֵי חַיֵּי עַמְרָם
  english_pob_choice: The years of Amram’s life
  chosen_spanish: Los años de la vida de Amram
  alternatives_spanish:
  - La duración de la vida de Amram
  - La vida de Amram duró
  lexicon: HALOT
  rationale: La construcción hebrea es una forma estándar de expresar la edad/longevidad total. 'Los años de la vida de Amram' conserva la forma semítica sin forzar una paráfrasis.
- source_word: שֶׁבַע וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  english_pob_choice: 137 years
  chosen_spanish: ciento treinta y siete años
  alternatives_spanish:
  - 137 años
  lexicon: HALOT
  rationale: El hebreo desglosa la cifra por componentes; en español, la forma completa en palabras mantiene el tono bíblico y es plenamente clara.
- source_word: יוֹכֶבֶד / אַהֲרֹן / מֹשֶׁה / עַמְרָם
  english_pob_choice: Jochebed / Aaron / Moses / Amram
  chosen_spanish: Jocabed / Aarón / Moisés / Amram
  alternatives_spanish:
  - Yocabed
  - Jochebed
  lexicon: N/A (nombres propios)
  rationale: Se usan las convenciones hispanas más reconocibles para los nombres bíblicos, preservando la identificación estándar en español.
theological_decisions:
- issue: Consanguinidad del matrimonio descrito en el versículo
  english_pob_reading: his father’s sister
  chosen_spanish_reading: la hermana de su padre
  alternative_spanish_readings:
  - su tía
  - su tía paterna
  rationale: El texto presenta el hecho genealógico sin comentario moral explícito. Se conserva la precisión de la relación de parentesco sin resolver la tensión que puede surgir al leerla a la luz de legislación posterior.
  doctrine_reference: Preservar la tensión textual y la primacía del hebreo sobre armonizaciones posteriores.
translation_notes:
  revision_awareness: Se siguió la última revisión del audit trail, que precisó דֹּדָתוֹ como 'his father’s sister'. En español se refleja esa precisión con 'la hermana de su padre' en lugar de un término más general como 'tía'.
  spanish_consistency_notes:
  - Se mantuvo 'Amram' sin adaptar el nombre, por consistencia con la tradición bíblica española y el patrón del proyecto.
  - Se empleó 'Aarón' y 'Moisés' con acento gráfico según uso español habitual.
  - Se evitó 'SEÑOR' o equivalentes porque no aparece el Tetragrámaton en este versículo.
  - La estructura nominal 'Los años de la vida de Amram' preserva el estilo genealógico del hebreo.
