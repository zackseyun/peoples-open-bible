  - marker: b
    text: 'Some manuscripts read ''an heir of God through Christ'' (or ''through Messiah'') instead of ''an heir through God.'''
    reason: textual_variant
translation:
  language: ko
  text: 그래서 너는 더 이상 노예가 아니라 아들[a]입니다. 그리고 아들이라면, 하나님을 통해 상속자이기도 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「아들」은 상속·입양 논리를 보존하기 위한 표현으로, 모든 신자에게 적용된다. 일부 사본은 「메시아를 통한 하나님의 상속자」로 읽는다.
    reason: lexical_alternative
