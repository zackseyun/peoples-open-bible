translation:
  language: es
  text: ¡Cuán precioso es tu amor leal[a], oh Dios! Los seres humanos[b] se refugian a la sombra de tus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amor leal» traduce חֶסֶד, término que también puede incluir lealtad de pacto, misericordia o amor fiel.
    reason: lexical_alternative
  - marker: b
    text: O «los hijos de hombre», es decir, los seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cuán...!
  alternatives_spanish:
  - ¡Qué...!
  - ¡Cuán grande...!
  lexicon: HALOT
  rationale: La partícula exclamativa hebrea expresa admiración, no pregunta. En español, «¡Cuán...!» conserva el tono poético y exclamativo con mayor cercanía al valor retórico del original.
- source_word: יָּקָר
  english_pob_choice: precious
  chosen_spanish: precioso
  alternatives_spanish:
  - valioso
  - querido
  lexicon: HALOT
  rationale: El adjetivo denota alto valor y también apreciación afectiva. «Precioso» reproduce bien la idea de algo de gran estima en un contexto poético.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu misericordia
  - tu fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד abarca amor de pacto, lealtad y misericordia. «Amor leal» mantiene la fuerza relacional y la permanencia del término sin reducirlo solo a «misericordia».
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Se trata de vocativo directo. «Oh Dios» refleja la apelación poética natural en español sin añadir contenido interpretativo.
- source_word: וּבְנֵי אָדָם
  english_pob_choice: the children of man
  chosen_spanish: los hijos de hombre
  alternatives_spanish:
  - los hijos de Adán
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: La expresión es colectiva y retiene la imagen hebrea. «Hijos de hombre» preserva el paralelo con אָדָם y la textura poética, aunque suena más literal que las opciones más idiomáticas; se mantiene por fidelidad al valor representativo del hebreo.
- source_word: בְּצֵל
  english_pob_choice: in the shadow
  chosen_spanish: a la sombra
  alternatives_spanish:
  - en la sombra
  - bajo la sombra
  - en el refugio
  lexicon: HALOT
  rationale: La preposición expresa cercanía protectora. «A la sombra» es natural en español y mantiene la metáfora de amparo.
- source_word: כְּנָפֶיךָ
  english_pob_choice: of your wings
  chosen_spanish: de tus alas
  alternatives_spanish:
  - de tus plumas
  - de tus alas protectoras
  lexicon: HALOT
  rationale: «Alas» comunica el mismo imagen aviar y protector que el hebreo, con naturalidad y transparencia en español.
- source_word: יֶחֱסָיוּן
  english_pob_choice: take refuge
  chosen_spanish: se refugian
  alternatives_spanish:
  - buscan refugio
  - hallan refugio
  - se acogen
  lexicon: HALOT
  rationale: El verbo חסה implica buscar/obtener refugio. «Se refugian» conserva la acción de ampararse en Dios con fluidez en español.
theological_decisions:
- issue: Tratamiento de חֶסֶד en un contexto de pacto y lealtad
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - fidelidad amorosa
  rationale: 'Se conserva la tensión semántica de חֶסֶד: amor, lealtad y misericordia a la vez. «Amor leal» evita reducir el término a una sola dimensión y permite una lectura de pacto sin volverlo técnico en exceso.'
  doctrine_reference: DOCTRINE.md §Translation philosophy; contested term חֶסֶד
- issue: Renderización colectiva de בְּנֵי אָדָם
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos de hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos de Adán
  rationale: El hebreo funciona de modo colectivo para toda la humanidad. La opción elegida conserva la imaginería original y evita una neutralización excesiva que borre la relación con אָדָם.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; contested term אָדָם
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «And the children of man take refuge...» a «The children of man take refuge...», eliminando la conjunción inicial por naturalidad. La versión española sigue esa línea y mantiene dos miembros poéticos sin añadir conectores innecesarios.
  spanish_consistency_notes:
  - Se preservó el vocativo directo con «oh Dios», en paralelo al inglés auditado.
  - Se mantuvo la metáfora espacial «a la sombra de tus alas» por corresponder al hebreo y al inglés PO B.
  - Se eligió un registro poético claro, sin sustituir la imagen de «alas» por una paráfrasis explicativa.
  - No se usó «SEÑOR» como máscara del nombre divino, pues aquí el hebreo usa אֱלֹהִים, no YHWH.
