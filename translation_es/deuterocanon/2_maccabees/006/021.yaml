revisions:
- from: Pero los que estaban encargados de la ofrenda ilícita[a], por su antiguo conocimiento del hombre, lo llamaban aparte en privado y lo exhortaban a traer carne que fuera conveniente para que él la usara, preparada por él mismo, y a fingir que estaba comiendo la carne de la ofrenda que había sido ordenada por el rey[b].
  to: Pero los que habían sido designados para el sacrificio ilícito[a], porque conocían al hombre desde hacía mucho tiempo, lo tomaban aparte en privado y lo instaban a traer carne que le era lícito usar, preparada por él mismo, y a fingir que estaba comiendo la carne del sacrificio que el rey había ordenado[b].
  rationale: La revisión conserva el sentido del original y del POB inglés, pero corrige giros poco naturales. «Habían sido designados» refleja bien τεταγμένοι; «sacrificio ilícito» alinea mejor con el contexto sacrificial; «porque conocían al hombre desde hacía mucho tiempo» expresa γνῶσις de forma idiomática; «lo tomaban aparte en privado» representa mejor la separación privada; y «que le era lícito usar» mantiene la amplitud de χρᾶσθαι sin sonar forzado. Se ajustan las notas para coincidir exactamente con el texto revisado.
