revisions:
- from: ¿Dónde están tus actos de amor leal[a] de antes, oh Señor[b], que juraste a David en tu fidelidad?
  to: ¿Dónde están tus actos de amor leal[a] de antaño, Señor, que juraste a David en tu fidelidad[b]?
  rationale: Se revisa para corregir la ubicación de la nota [b], que debe ir en «en tu fidelidad», y para mejorar la dignidad y naturalidad poética de «de antes» a «de antaño». Se mantiene «Señor» para אֲדֹנָי, «amor leal» para חֶסֶד en contexto pactal y «actos» para reflejar el plural hebreo de forma idiomática.
