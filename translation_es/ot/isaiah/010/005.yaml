translation:
  language: es
  text: ¡Ay de Asiria[a], vara de mi ira; el bastón en su mano[b] es mi indignación!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la mano de ellos». El texto masorético tiene un sufijo plural en בְיָדָם; algunas traducciones suavizan la imagen con «en su mano» o «en sus manos».'
    reason: textual_variant
  - marker: b
    text: También puede traducirse «en la mano de ellos».
    reason: previous_rendering
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: HALOT
  rationale: La interjección profética de amenaza/lamento se expresa de modo natural en español con «¡Ay de!». Mantiene el tono oracular de juicio sin introducir una paráfrasis explicativa.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - el imperio asirio
  lexicon: HALOT
  rationale: Es el nombre propio nacional del texto fuente; la transliteración tradicional en español es clara y fiel.
- source_word: שֵׁבֶט
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cetro
  - garrote
  lexicon: HALOT
  rationale: En este paralelismo con «bastón», «vara» conserva el valor de instrumento de golpe/disciplinario y evita la connotación real de «cetro».
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi enojo
  - mi furor
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal para la emoción divina; en español «ira» preserva la fuerza semántica y la solemnidad poética mejor que una forma más débil.
- source_word: וּמַטֶּה
  english_pob_choice: the staff
  chosen_spanish: el bastón
  alternatives_spanish:
  - la vara
  - el palo
  lexicon: HALOT
  rationale: Para mantener el paralelismo con «vara» y un registro claro en español, «bastón» comunica el segundo instrumento sin forzar un calco demasiado mecánico. El artículo naturaliza la construcción nominal.
- source_word: בְיָדָם
  english_pob_choice: in their hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - en la mano de ellos
  lexicon: HALOT
  rationale: El hebreo masorético tiene sufijo plural, pero la imagen en español resulta más fluida con un singular colectivo («su mano»), como en la tradición de lectura que suaviza la referencia sin borrar el dato textual. Se conserva la tensión mediante nota.
- source_word: זַעְמִי
  english_pob_choice: my wrath
  chosen_spanish: mi indignación
  alternatives_spanish:
  - mi ira
  - mi furor
  lexicon: HALOT
  rationale: El término hebreo expresa una cólera intensa; «indignación» mantiene el peso judicial y poético, y permite una variación léxica respecto de «ira» en el primer colon.
theological_decisions:
- issue: Asiria como instrumento de juicio divino
  english_pob_reading: Assyria is presented as the instrument of God's anger and wrath, without softening the metaphor.
  chosen_spanish_reading: Asiria aparece como vara y bastón de la ira/indignación de Yahvé, sin atenuar la metáfora.
  alternative_spanish_readings:
  - Asiria actúa solo por su propia política imperial
  - Asiria es un agente providencial sin carga de juicio
  rationale: 'La línea conserva la tensión teológica del hebreo y del audit trail inglés: Yahvé usa a una potencia pagana como instrumento de castigo, sin resolver la paradoja ni explicarla de más.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Presencia del nombre divino frente a sustitución reverencial
  english_pob_reading: The translation context preserves the divine name when the source warrants it.
  chosen_spanish_reading: La frase se entiende como palabra de Yahvé, por lo que se mantiene el lenguaje de posesión divina («mi ira», «mi indignación») sin sustituir el nombre en el verso mismo.
  alternative_spanish_readings:
  - usar «el Señor» como máscara reverencial
  - explicitar «Yahvé» en el verso
  rationale: El hebreo aquí no contiene el tetragrámaton, sino pronombres posesivos de primera persona. Por fidelidad al texto, el verso conserva esa enunciación directa de Dios sin añadir un nombre que no está presente.
  doctrine_reference: 'Default terminology note: YHWH -> Yahvé, but only when the source text contains or clearly invokes the divine name'
translation_notes:
  revision_awareness: El texto base inglés pasó por una oscilación entre «in their hands» e «in their hand» para reflejar mejor la forma hebrea. En español se ha optado por una solución idiomática en singular colectivo («en su mano») con nota textual, para preservar la lectura natural sin perder el dato masorético del plural.
  spanish_consistency_notes:
  - 'Se mantiene el patrón poético de dos cola con paralelismo semántico: «vara / bastón» y «ira / indignación».'
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton; los posesivos de primera persona ya señalan la voz divina.
  - «Asiria» se traduce como nombre propio geopolítico, no como cualidad simbólica.
  - La nota textual distingue claramente la forma masorética plural del ajuste idiomático español.
