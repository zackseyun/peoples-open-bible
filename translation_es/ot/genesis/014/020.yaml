translation:
  language: es
  text: Y bendito sea Dios Altísimo, que entregó a tus enemigos en tu mano. Y le dio[b] una décima parte[a] de todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, 'un diezmo de todo'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo no repite el sujeto de 'dio'; el contexto indica con más naturalidad que Abram dio a Melquisedec una décima parte de todo.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָרוּךְ
  english_pob_choice: And blessed be
  chosen_spanish: Y bendito sea
  alternatives_spanish:
  - Y bendito es
  - Bendito sea
  lexicon: HALOT
  rationale: La forma participial funciona en español como una bendición o aclamación desiderativa. 'Bendito sea' reproduce mejor la fuerza benedictoria que un simple presente indicativo, y la conjunción inicial conserva el encadenamiento del hebreo.
- source_word: אֵל עֶלְיוֹן
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - El Altísimo
  - Dios el Altísimo
  lexicon: HALOT
  rationale: אֵל se vierte como 'Dios' en español para mantener claridad y naturalidad; 'Altísimo' conserva el epíteto superlativo de עֶלְיוֹן. Se evita transliterar 'El' porque aquí funciona como título divino, no como nombre propio en el registro español común.
- source_word: מִגֵּן
  english_pob_choice: delivered
  chosen_spanish: entregó
  alternatives_spanish:
  - entregó en manos de
  - libró
  lexicon: HALOT
  rationale: El verbo expresa entregar/poner en poder de otro. 'Entregó' en español conserva bien la idea de dar los enemigos en poder de Abram sin introducir una lectura más interpretativa que 'libró'.
- source_word: צָרֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus enemigos hostiles
  lexicon: HALOT
  rationale: '''Enemigos'' comunica de manera directa y natural el plural constructo con sufijo posesivo, sin debilitar el matiz hostil del hebreo.'
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica concreta de la mano como esfera de poder. 'En tu mano' es la forma más transparente y fiel al hebreo idiomático; 'en tu poder' explicita la metáfora, pero la atenúa.
- source_word: וַיִּתֶּן
  english_pob_choice: And he gave
  chosen_spanish: Y le dio
  alternatives_spanish:
  - Y dio
  - Y él le dio
  lexicon: HALOT
  rationale: El wayyiqtol se vierte con secuencia narrativa simple. El complemento clítico 'le' permite una lectura natural en español y mantiene el destinatario explícito.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: HALOT
  rationale: En español, el dativo 'le' expresa adecuadamente el destinatario sin necesidad de repetir el sustantivo. El texto hebreo deja el referente implícito; el español igualmente lo deja apoyado en el contexto.
- source_word: מַעֲשֵׂר
  english_pob_choice: a tenth
  chosen_spanish: un diezmo
  alternatives_spanish:
  - una décima parte
  - un décimo
  lexicon: HALOT
  rationale: Aunque 'a tenth' es literalmente 'una décima parte', 'diezmo' es la forma bíblica española más precisa y reconocible para esta unidad proporcional. Aquí no se trata de una institución eclesial posterior, sino de la medida misma; por eso se evita 'tasa' o formulaciones más libres.
- source_word: מִכֹּל
  english_pob_choice: of everything
  chosen_spanish: de todo
  alternatives_spanish:
  - de todo cuanto había
  - de todo
  lexicon: HALOT
  rationale: La frase abarca el total de los bienes. 'De todo' es breve, natural y suficientemente amplio para reflejar el hebreo sin añadir especificaciones no presentes en el verso.
theological_decisions:
- issue: Identidad del sujeto implícito de וַיִּתֶּן
  english_pob_reading: 'Abram is the implied subject: ''And he gave him a tenth of everything.'''
  chosen_spanish_reading: 'Se entiende que Abram es el sujeto implícito: ''Y le dio un diezmo de todo.'''
  alternative_spanish_readings:
  - Melquisedec es el sujeto, aunque es menos probable en el contexto
  - '''Y se le dio un diezmo de todo'' como lectura impersonal'
  rationale: El hebreo no repite el sujeto, y el contexto narrativo favorece claramente a Abram como quien entrega el diezmo a Melquisedec. La traducción mantiene la referencia implícita, sin forzar el texto más allá de lo que el contexto sostiene.
  doctrine_reference: Preservar la tensión textual cuando existe una ambigüedad real, pero seguir el sentido contextual dominante sin ocultar que el hebreo es elíptico.
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase revisado: no se registraron cambios posteriores ni correcciones editoriales en el expediente en inglés. La versión española refleja esa estabilidad textual y mantiene las dos decisiones auditadas principales: la fórmula benedictoria y el sujeto implícito del verbo final.'
  spanish_consistency_notes:
  - Se usa 'Dios Altísimo' en lugar de 'El Altísimo' para mantener coherencia con el tratamiento POB de אֵל como título divino traducido.
  - Se conserva 'mano' en singular, como imagen idiomática bíblica, en vez de explicitar 'poder' en el texto principal.
  - '''Diezmo'' se usa como equivalente funcional de ''a tenth'', con la nota para la alternativa más literal ''un diezmo de todo''.'
  - La puntuación en dos cláusulas sigue la segmentación del hebreo y del inglés POB, separando la doxología y la acción narrativa.
