lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas y censales posexílicas, בְּנֵי puede designar un grupo familiar o clan. «Los hijos de» conserva la forma breve y directa del registro, y en español puede leerse de modo corporativo, sin forzar un sentido biológico estrecho.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Shefatías
  alternatives_spanish:
  - Sefatías
  - Shefatías
  lexicon: HALOT
  rationale: El nombre propio se translitera; se eligió una forma española estable y legible. «Shefatías» conserva la correspondencia fonética general y evita una adaptación innecesariamente interpretativa.
- source_word: שְׁלֹשׁ מֵאוֹת שִׁבְעִים וּשְׁנָיִם
  english_pob_choice: three hundred seventy-two
  chosen_spanish: trescientos setenta y dos
  alternatives_spanish:
  - trescientos y setenta y dos
  lexicon: HALOT
  rationale: La secuencia numérica hebrea se vierte con naturalidad en español moderno, manteniendo con precisión el total censal. Se omite «y» tras «trescientos» porque en español actual es la forma más idiomática.
translation_notes:
  revision_awareness: El texto base coincide plenamente con el hebreo masorético y con el audit trail en inglés; no se documentan revisiones textuales ni variantes relevantes para esta línea.
  spanish_consistency_notes:
  - Se mantiene el patrón de lista censal/genealógica con artículo inicial y nombre propio transliterado.
  - Se evita sustituir el valor corporativo de בְּנֵי por una paráfrasis más libre como «descendientes», porque el registro breve del verso favorece una equivalencia más directa.
  - El numeral se expresa según uso actual del español peninsular/latinoamericano neutral, sin alterar el valor exacto del conteo.
