translation:
  language: es
  text: 'Cuando llegó al hombre de Dios en el monte[a], se aferró a sus pies. Entonces Guehazí se acercó para apartarla, pero el hombre de Dios dijo: «Déjala, porque su alma está amarga dentro de ella[b], y Yahvé me lo ha ocultado y no me lo ha dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al monte». El hebreo puede leerse como localización o como movimiento hacia ese lugar.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «su alma es amarga para ella», un modismo que expresa una profunda aflicción interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el santo de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es un título profético establecido. En español, «el hombre de Dios» conserva la formulación literal y el tono bíblico sin sustituirla por una etiqueta interpretativa como «profeta».
- source_word: אֶל הָהָר
  english_pob_choice: at the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - al monte
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: El contexto narrativo sitúa a Eliseo en ese lugar; «en el monte» expresa presencia local de manera natural en español y evita forzar un matiz direccional que el pasaje no exige.
- source_word: וַתַּחֲזֵק בְּרַגְלָיו
  english_pob_choice: she took hold of his feet
  chosen_spanish: se agarró de sus pies
  alternatives_spanish:
  - tomó sus pies
  - se sujetó de sus pies
  - se aferró a sus pies
  lexicon: HALOT
  rationale: חזק con ב indica sujetar firmemente. «Se agarró de sus pies» transmite con naturalidad la acción física urgente del hebreo y mantiene la fuerza del gesto.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino cerca
  - se aproximó
  lexicon: HALOT
  rationale: El verbo de aproximación se vierte con la forma española más natural en la escena narrativa.
- source_word: לְהָדְפָהּ
  english_pob_choice: to push her away
  chosen_spanish: para apartarla
  alternatives_spanish:
  - para empujarla
  - para echarla a un lado
  - para rechazarla
  lexicon: HALOT
  rationale: El infinitivo expresa repelerla con fuerza. «Apartarla» comunica el acto de impedir su acceso sin sobrecargar el español con una redundancia innecesaria.
- source_word: הַרְפֵּה לָהּ
  english_pob_choice: Leave her alone
  chosen_spanish: Déjala
  alternatives_spanish:
  - Déjala en paz
  - Suéltala
  - Déjala tranquila
  lexicon: HALOT
  rationale: רפה aquí pide cesar la intervención. En español, «Déjala» es breve, imperativa y suficientemente fuerte; el contexto ya aclara que se le está diciendo a Guehazí que no la moleste.
- source_word: נַפְשָׁהּ
  english_pob_choice: her soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su interior
  - su ser
  lexicon: HALOT
  rationale: Se conserva el término antropológico «alma» para reflejar נפשׁ sin reducirlo a «vida» ni diluirlo en una explicación psicológica.
- source_word: מָרָה לָהּ
  english_pob_choice: is bitter within her
  chosen_spanish: está amarga dentro de ella
  alternatives_spanish:
  - está llena de amargura
  - está en amarga aflicción
  - le amargan las entrañas
  lexicon: HALOT
  rationale: El hebreo expresa una amargura interior. «Está amarga dentro de ella» mantiene la imagen idiomática y el peso emocional del original, en paralelo con la lectura auditada en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre propio divino en español en lugar de sustituirlo por un título.'
- source_word: הֶעְלִים מִמֶּנִּי
  english_pob_choice: has hidden it from me
  chosen_spanish: ha ocultado esto de mí
  alternatives_spanish:
  - me lo ha escondido
  - me lo ha ocultado
  - lo ha ocultado de mí
  lexicon: HALOT
  rationale: El verbo hiphil de עלם comunica ocultar/encubrir. «Ha ocultado esto de mí» es natural en español y conserva que el contenido revelado no fue dado a conocer a Eliseo.
- source_word: וְלֹא הִגִּיד לִי
  english_pob_choice: and has not told me
  chosen_spanish: y no me lo ha revelado
  alternatives_spanish:
  - y no me lo ha dicho
  - y no me lo ha comunicado
  - y no me lo hizo saber
  lexicon: HALOT
  rationale: En este contexto, el verbo complementa la idea de revelación divina retenida. «No me lo ha revelado» expresa con claridad el sentido de información no comunicada, sin perder el valor teológico del pasaje.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. En la convención española del proyecto se traduce como «Yahvé», preservando el nombre covenantal de Dios y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido de נַפְשָׁהּ en una expresión de angustia
  english_pob_reading: her soul is bitter within her
  chosen_spanish_reading: su alma está amarga dentro de ella
  alternative_spanish_readings:
  - está muy angustiada
  - su vida está amarga para ella
  - está llena de amargura
  rationale: Se mantiene «alma» para conservar la antropología bíblica del hebreo y la tensión emocional del enunciado. La frase «dentro de ella» ayuda a que la amargura se entienda como interior, no meramente circunstancial.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Relación entre ocultación divina y revelación no comunicada
  english_pob_reading: Yahweh has hidden it from me and has not told me
  chosen_spanish_reading: Yahvé ha ocultado esto de mí y no me lo ha revelado
  alternative_spanish_readings:
  - Yahvé me lo ha ocultado y no me lo ha dicho
  - Yahvé ha escondido esto de mí y no me lo ha comunicado
  rationale: El paralelismo hebreo une la idea de ocultar con la de no informar. En español, «no me lo ha revelado» hace explícita la dimensión de revelación sin añadir contenido ajeno al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión auditada del inglés POB en dos puntos clave: mantiene la localización simple de la escena («en el monte») y conserva el nombre divino como forma propia. También ajusta el gesto físico con un español natural («se agarró de sus pies») y preserva el paralelismo semántico entre ocultación y revelación no comunicada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto en español.
  - Se conserva «alma» para נַפְשָׁהּ por coherencia antropológica y para mantener la tensión idiomática.
  - «Hombre de Dios» se mantiene como título técnico bíblico, no como paráfrasis.
  - El registro es digno y bíblico, pero con sintaxis moderna para lectura pública.
  - Los marcadores de nota aparecen anclados solo donde hay una alternativa real en el texto.
