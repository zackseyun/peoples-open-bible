translation:
  language: es
  text: Sabrás que tu tienda está en paz[a], y cuando examines tu morada, no te faltará nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no te faltará nada». El verbo hebreo puede significar también «pecar», pero aquí probablemente expresa la idea de que nada estará faltando o perdido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: You will know
  chosen_spanish: Sabrás
  alternatives_spanish:
  - Y sabrás
  - Entonces sabrás
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto poético funciona con sentido prospectivo. «Sabrás» comunica la certeza de la promesa con naturalidad en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que se sabe, no una causa. En español, «que» reproduce mejor la sintaxis declarativa.
- source_word: שָׁלוֹם
  english_pob_choice: at peace
  chosen_spanish: está en paz
  alternatives_spanish:
  - está segura
  - está en bienestar
  - está en paz y a salvo
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם describe el estado de la tienda como íntegro, tranquilo y sin amenaza. «Está en paz» conserva el valor semántico central sin reducirlo solo a seguridad física.
- source_word: אָהֳלֶךָ
  english_pob_choice: your tent
  chosen_spanish: tu tienda
  alternatives_spanish:
  - tu casa
  - tu hogar
  lexicon: HALOT
  rationale: «Tienda» conserva la imagen literal hebrea y el ambiente antiguo del texto. La ampliación doméstica queda dada por el contexto.
- source_word: וּפָקַדְתָּ
  english_pob_choice: when you inspect
  chosen_spanish: cuando examines
  alternatives_spanish:
  - cuando inspecciones
  - cuando revises
  - cuando hagas recuento
  lexicon: HALOT
  rationale: פקד puede significar visitar, atender, examinar o hacer recuento. En paralelo con la cláusula final, «examines» comunica la acción de revisar el estado de la morada.
- source_word: נָוְךָ
  english_pob_choice: your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu vivienda
  - tu habitación
  - tu estancia
  lexicon: HALOT
  rationale: נוה designa una morada, habitar o residencia. «Morada» es un equivalente digno y amplio que funciona bien junto a «tienda».
- source_word: וְלֹא תֶחֱטָא
  english_pob_choice: you will not miss anything
  chosen_spanish: no te faltará nada
  alternatives_spanish:
  - no errarás en nada
  - no pecarás
  - no te faltará cosa alguna
  lexicon: HALOT
  rationale: Aunque חטא suele significar «pecar», aquí el contexto doméstico y de inspección favorece el sentido de «fallar/miss/lack». «No te faltará nada» preserva el sentido no moral que el audit trail documenta.
theological_decisions:
- issue: Sentido de וְלֹא תֶחֱטָא en contexto
  english_pob_reading: 'non-moral sense: ''you will not miss anything'''
  chosen_spanish_reading: 'sentido no moral: «no te faltará nada»'
  alternative_spanish_readings:
  - «no pecarás»
  - «no errarás»
  rationale: La secuencia habla de la paz e intactez de la tienda y de la morada al ser examinadas. En ese marco, traducir חטא con un sentido moral introduciría una afirmación ajena al flujo inmediato. «No te faltará nada» mantiene la idea de ausencia de carencia o pérdida.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de שָׁלוֹם aplicado a la tienda
  english_pob_reading: at peace
  chosen_spanish_reading: «está en paz»
  alternative_spanish_readings:
  - «está segura»
  - «está en bienestar»
  rationale: «Paz» aquí no es solo un estado interior, sino la condición completa de estabilidad, seguridad y plenitud de la tienda. La formulación elegida conserva esa amplitud sin borrar la imagen hebrea.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión más reciente del POB inglés, que pasó de «secure» a «at peace» para שָׁלוֹם y de «miss nothing» a «will not miss anything»; en español se mantuvo la lectura no moral de חטא y se optó por una formulación idiomática equivalente: «no te faltará nada».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece ningún tetragrámaton.
  - Se mantuvo «tienda» para אָהֳלֶךָ por fidelidad imagética, y «morada» para נָוְךָ por paralelismo y naturalidad.
  - Se evitó «pecarás» en el cuerpo principal porque la nota ya registra la alternativa moral documentada por el audit trail.
  - La puntuación conserva el paralelismo poético de dos miembros con una subordinada temporal en español natural.
