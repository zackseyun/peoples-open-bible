base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/017.yaml
  text: Pharaoh will not help him in the war with a great army and a large company[b][a], when they cast up a siege ramp and build a siege wall to cut off many lives.
  footnotes:
  - marker: a
    text: Or 'will not help him in the war with a great army and a large company.' The Hebrew expression 'do/make him' is idiomatic here for taking effective action on his behalf.
    reason: lexical_alternative
  - marker: b
    text: The siege terms may also be rendered 'siege mound' and 'siegework' or 'siege tower.'
    reason: lexical_alternative
