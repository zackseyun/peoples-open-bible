  source_alignment_summary: El borrador sigue correctamente el hebreo como texto principal y conserva en nota la fuerte divergencia del paralelo griego. La estructura concesiva, la idea de compulsión/restricción, la espera paciente ante los manjares y el resultado de descanso están bien representados. Sin embargo, «delicias» suena menos preciso que «manjares» para במטעמים en contexto de mesa, y la nota griega necesita una formulación más natural en español.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «estás oprimido» puede sugerir opresión social más que restricción o coacción circunstancial, y «espera las delicias» resulta algo extraño en español eclesial general. «Manjares» mejora la naturalidad y la precisión contextual. También conviene pulir la nota: «¿cuál de las dos voces escuchará el Señor?» suena más idiomático que «¿de qué voz escuchará el Dueño?».'
  glossary_alignment: 'No hay conflictos mayores con el glosario del proyecto. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La decisión principal pendiente es estilística-lexical: preferir «manjares» frente a «delicias» por fidelidad contextual a מטעמים.'
  issues:
  - severity: medium
    issue: «las delicias» no suena natural ni preciso para במטעמים en este contexto
    rationale: מטעמים se refiere a comidas selectas o sabrosas; en español bíblico-natural «manjares» comunica mejor el referente alimentario que «delicias», que puede sonar abstracto.
  - severity: medium
    issue: La nota del paralelo griego usa una formulación poco idiomática
    rationale: «¿de qué voz escuchará el Dueño?» es calcado e incómodo. Una forma como «¿cuál de las dos voces escuchará el Señor?» preserva el sentido y mejora la legibilidad.
  - severity: low
    issue: «estás oprimido» puede desviar el sentido hacia opresión social
    rationale: Aunque aceptable para coacción, en este contexto incierto «estás forzado» o «estás bajo presión» serían más transparentes. No es un error grave, pero conviene ajustar para mayor precisión.
  revised_spanish_text: Aun si estás forzado[a], espera los manjares con paciencia[b], y te traerá descanso.
