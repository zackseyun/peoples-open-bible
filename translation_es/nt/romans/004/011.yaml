source:
  edition: SBLGNT
  text: καὶ σημεῖον ἔλαβεν περιτομῆς, σφραγῖδα τῆς δικαιοσύνης τῆς πίστεως τῆς ἐν τῇ ἀκροβυστίᾳ, εἰς τὸ εἶναι αὐτὸν πατέρα πάντων τῶν πιστευόντων δι’ ἀκροβυστίας, εἰς τὸ ⸀λογισθῆναι αὐτοῖς τὴν δικαιοσύνην,
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/011.yaml
  text: And he received the sign of circumcision as a seal of the righteousness of the faith that he had while uncircumcised[a], so that he might be the father of all who believe while uncircumcised, so that righteousness might be counted to them also[c][b],
  footnotes:
