translation:
  language: es
  text: Y yo causaré angustia a la humanidad[a], y caminarán como los ciegos, porque han pecado contra Yahvé; su sangre será derramada como polvo[b], y su carne como estiércol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la humanidad’. El hebreo usa אָדָם en singular, pero con sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus entrañas’ / ‘sus vísceras’, reflejando una comprensión más específica del término hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲצֵרֹתִי
  english_pob_choice: I will bring distress
  chosen_spanish: causaré angustia
  alternatives_spanish:
  - traeré angustia
  - infligiré angustia
  lexicon: HALOT
  rationale: La forma causativa expresa que Yahvé mismo introduce la aflicción. ‘Causaré angustia’ conserva la agencia divina y el tono judicial sin sonar rígido en español.
- source_word: לָאָדָם
  english_pob_choice: on mankind
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - al hombre
  - a la raza humana
  lexicon: HALOT
  rationale: אָדָם es singular pero colectivo. ‘La humanidad’ comunica bien el sentido inclusivo y colectivo que la revisión inglesa buscó con ‘mankind’, sin perder el valor general del hebreo.
- source_word: וְהָלְכוּ
  english_pob_choice: they will walk
  chosen_spanish: caminarán
  alternatives_spanish:
  - irán
  - andarán
  lexicon: HALOT
  rationale: ‘Caminarán’ conserva la imagen concreta del verbo hebreo y encaja con el símil siguiente.
- source_word: כַּעִוְרִים
  english_pob_choice: like the blind
  chosen_spanish: como los ciegos
  alternatives_spanish:
  - como ciegos
  - como personas ciegas
  lexicon: HALOT
  rationale: ‘Los ciegos’ es una comparación natural en español y mantiene la imagen de desorientación bajo juicio.
- source_word: כִּי לַיהוָה חָטָאוּ
  english_pob_choice: because they have sinned against Yahweh
  chosen_spanish: porque han pecado contra Yahvé
  alternatives_spanish:
  - porque han pecado contra el Yahvé
  - pues han pecado contra Yahvé
  lexicon: HALOT
  rationale: חטא con ל expresa pecado cometido contra Yahvé; ‘pecado contra’ preserva la relación de ofensa personal y covenantal. Se mantiene ‘Yahvé’ según la norma del proyecto.
- source_word: וְשֻׁפַּךְ דָּמָם
  english_pob_choice: their blood will be poured out
  chosen_spanish: su sangre será derramada
  alternatives_spanish:
  - su sangre será vaciada
  - su sangre será vertida
  lexicon: HALOT
  rationale: ‘Derramada’ reproduce el campo semántico de שפך con דם y es la forma más natural y solemne en español.
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo de tierra
  - como polvo fino
  lexicon: HALOT
  rationale: עפר puede ser ‘polvo’ o ‘tierra suelta’; ‘polvo’ reproduce la imagen visual de dispersión y humillación del juicio.
- source_word: וּלְחֻמָם
  english_pob_choice: their flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - sus entrañas
  - sus vísceras
  lexicon: HALOT
  rationale: Aunque el hebreo es difícil y puede referirse a una parte interna del cuerpo, ‘su carne’ funciona como paralelo directo de ‘su sangre’ y evita un nivel anatómico demasiado técnico en el texto principal.
- source_word: כַּגְּלָלִים
  english_pob_choice: like dung
  chosen_spanish: como estiércol
  alternatives_spanish:
  - como excremento
  - como basura
  lexicon: HALOT
  rationale: גְּלָלִים denota excremento/estiércol. ‘Estiércol’ es claro y mantiene la fuerza degradante de la imagen.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto prescribe ‘Yahvé’ para יהוה. Se evita la sustitución reverencial por ‘SEÑOR’ porque aquí el nombre del pacto es explícito en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido colectivo de אָדָם
  english_pob_reading: mankind
  chosen_spanish_reading: la humanidad
  alternative_spanish_readings:
  - el hombre
  - la gente
  rationale: El hebreo singular tiene sentido colectivo. ‘La humanidad’ preserva el alcance general que la revisión inglesa señaló al pasar de ‘man’ a ‘mankind’.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
- issue: Imagen del juicio en la última cola
  english_pob_reading: their flesh like dung
  chosen_spanish_reading: su carne como estiércol
  alternative_spanish_readings:
  - sus entrañas como estiércol
  - su carne como excremento
  rationale: La comparación debe conservar su crudeza. ‘Estiércol’ mantiene la humillación y el desprecio del juicio sin suavizar el hebreo.
  doctrine_reference: HALOT; contextual judgment imagery
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó ‘man’ a ‘mankind’ para reflejar mejor el valor colectivo de אָדָם; por eso el español adopta ‘la humanidad’. Se mantuvo intacta la estructura de juicio del verso: angustia, marcha ciega, culpa contra Yahvé, derramamiento de sangre y degradación corporal.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente con la norma del proyecto para יהוה.
  - Se mantuvo un registro formal y bíblico, evitando calcos innecesarios pero conservando las imágenes físicas del hebreo.
  - ‘Angustia’ y ‘derramada’ conservan el tono judicial del original sin introducir interpretaciones adicionales.
