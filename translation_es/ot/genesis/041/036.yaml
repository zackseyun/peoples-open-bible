  to: Y ese alimento será una reserva[a] para la tierra, para los siete años de hambre que habrá en la tierra de Egipto, para que la tierra no perezca[b] por el hambre.
  rationale: Se cambia «provisión» por «una reserva» para reflejar mejor לְפִקָּדוֹן y alinearse con la decisión léxica auditada del inglés POB. Se ajusta la nota alternativa para evitar «almacén», que en español puede sugerir el lugar físico más que el contenido almacenado. El resto del versículo puede mantenerse.
