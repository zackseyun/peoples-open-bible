translation:
  language: es
  text: Mi ojo ha visto muchas cosas como estas, y mi oído ha escuchado cosas tan poderosas[a] como estas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más poderosas que estas», «más fuertes que estas» o «más impresionantes que estas»; el hebreo עַצֻּמוֹת y el griego ἰσχυρότερα pueden expresar cosas que superan a estas en fuerza o impresividad, aunque aquí se ha seguido la comparación inmediata «tan ... como estas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת / πολλὰ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - muchas cosas
  - numerosas cosas
  lexicon: HALOT / Swete LXX
  rationale: El hebreo y el griego expresan pluralidad abundante sin exigir un sustantivo explícito; en español, 'muchas' permite una frase natural y conserva el valor cuantitativo.
- source_word: כָּאֵלֶּה / τοιαῦτα
  english_pob_choice: such things
  chosen_spanish: cosas como estas
  alternatives_spanish:
  - cosas tales como estas
  - cosas así
  lexicon: HALOT / LSJ
  rationale: La comparación demostrativa no es solo 'estas', sino cosas del mismo tipo; 'como estas' refleja bien el matiz de tipo o clase presente en el hebreo y el griego.
- source_word: רַאֲתָה עֵינִי / ἑόρακα ἐν ὀφθαλμοῖς μου
  english_pob_choice: my eye has seen
  chosen_spanish: He visto
  alternatives_spanish:
  - mi ojo ha visto
  - mis ojos han visto
  lexicon: HALOT / LSJ
  rationale: El original usa el singular poético 'mi ojo'; en español, 'he visto' comunica el mismo hecho de forma natural y mantiene el paralelismo con el segundo hemistiquio sin sonar forzado.
- source_word: וְעַצֻּמוֹת / ἰσχυρότερα
  english_pob_choice: things as mighty as these
  chosen_spanish: cosas tan poderosas como estas
  alternatives_spanish:
  - cosas tan fuertes como estas
  - cosas más poderosas que estas
  lexicon: HALOT / LSJ
  rationale: La revisión inglesa prefirió la comparación 'as mighty as these' por el valor de כָּאֵלֶּה / τοιαῦτα; en español, 'tan poderosas como estas' preserva esa comparación sin imponer un 'más que' que el texto no exige.
- source_word: שָׂמְעָה אָזְנִי / ἀκήκοεν τὸ οὖς μου
  english_pob_choice: my ear has heard
  chosen_spanish: mi oído ha oído
  alternatives_spanish:
  - mi oído ha escuchado
  - he oído
  lexicon: HALOT / LSJ
  rationale: Se conserva el singular corporal del original ('mi oído') para reflejar el paralelismo poético. 'Ha oído' reproduce con fidelidad el aspecto perfecto; aunque repetitivo, es una repetición intencional del registro bíblico.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'stronger than these' a 'as mighty as these' para reflejar mejor el comparativo de כָּאֵלֶּה / τοιαῦτα. La redacción española sigue esa revisión y evita introducir un grado superlativo o de superioridad que el paralelismo no requiere.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos miembros con verbos perfectivos en primera persona singular.
  - Se conserva el lenguaje corporal singular ('mi oído') como rasgo poético, aunque en español resulta menos idiomático que un plural.
  - La nota de pie de página queda anclada exactamente en 'estas[a]' para evitar ambigüedad y cumplir la validación.
