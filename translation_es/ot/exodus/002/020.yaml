revisions:
- from: 'Y él dijo a sus hijas: «¿Dónde está él, pues? ¿Por qué han dejado a este hombre? Llámenlo, para que coma pan».'
  to: 'Y él dijo a sus hijas[a]: «¿Dónde está él, pues? ¿Por qué dejaron al hombre? Llámenlo, para que coma pan[b]».'
  rationale: Se ajusta הָאִישׁ a 'al hombre' para evitar una deixis añadida; se cambia 'han dejado' a 'dejaron' por mayor naturalidad narrativa; se conserva 'coma pan' por fidelidad al hebreo y al POB inglés, pero se añade la nota explicativa. También se mantiene '¿Dónde está él, pues?' como buena solución idiomática para וְאַיּוֹ. Se ancla la nota en 'pan' dentro del texto. El marcador [a] tras 'hijas' del texto revisado no sería correcto según la nota; debe entenderse que solo [b] corresponde al anclaje de la nota léxica.
