translation:
  language: es
  text: Su amor, su odio y sus celos[a] ya han perecido, y ya no tienen parte para siempre en nada de lo que se hace bajo el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su celo» o «su envidia» para «sus celos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַהֲבָתָם
  english_pob_choice: their love
  chosen_spanish: su amor
  alternatives_spanish:
  - su cariño
  - su afecto
  lexicon: HALOT
  rationale: אַהֲבָה nombra el amor como sustantivo abstracto; en español, «amor» es el equivalente natural y más directo, manteniendo el paralelismo con los otros sustantivos de la serie.
- source_word: שִׂנְאָתָם
  english_pob_choice: their hatred
  chosen_spanish: su odio
  alternatives_spanish:
  - su aversión
  - su enemistad
  lexicon: HALOT
  rationale: El sustantivo abstracto שִׂנְאָה se expresa con precisión mediante «odio», que conserva la fuerza semántica y la simetría con «amor».
- source_word: קִנְאָתָם
  english_pob_choice: their jealousy
  chosen_spanish: su celos
  alternatives_spanish:
  - su celo
  - su envidia
  - su celosía
  lexicon: HALOT
  rationale: קִנְאָה puede ser «celos», «celo» o «envidia» según contexto. Aquí, como pasión humana junto a amor y odio, «celos» preserva la lectura relacional/emocional adoptada por el POB inglés. Se mantiene la tensión léxica; en español moderno la forma natural es el plural «celos».
- source_word: כְּבָר אָבָדָה
  english_pob_choice: have already perished
  chosen_spanish: ya han perecido
  alternatives_spanish:
  - ya han desaparecido
  - ya se han perdido
  lexicon: HALOT
  rationale: «Perecido» conserva la fuerza de אָבַד mejor que «desaparecido» o «perdido». Se adapta el acuerdo verbal al sujeto compuesto en español para lograr naturalidad sin suavizar el verbo.
- source_word: וְחֵלֶק
  english_pob_choice: a share
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - heredad
  lexicon: HALOT
  rationale: En Eclesiastés, חֵלֶק puede ser la «porción» o «parte» de uno en la vida. «Parte» funciona bien con la construcción «tener parte en» y evita introducir un matiz más técnico de herencia.
- source_word: אֵין לָהֶם עוֹד
  english_pob_choice: they no longer have
  chosen_spanish: no tienen ya
  alternatives_spanish:
  - ya no tienen
  - no les queda
  lexicon: HALOT
  rationale: La construcción existencial hebrea se vierte de modo idiomático en español con «no tienen ya», que conserva la idea de cesación.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - jamás
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia más natural y clara para la permanencia absoluta que marca לְעוֹלָם en este contexto.
- source_word: בְּכֹל אֲשֶׁר נַעֲשָׂה
  english_pob_choice: in anything that is done
  chosen_spanish: en nada de lo que se hace
  alternatives_spanish:
  - en todo lo que se hace
  - en cualquier cosa que se haga
  lexicon: HALOT
  rationale: 'La formulación española debe mantener el alcance general del hebreo y la restricción negativa del contexto: «en nada de lo que se hace» refleja bien la exclusión de participación.'
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  - en la tierra
  lexicon: HALOT
  rationale: «Bajo el sol» es el equivalente establecido para el idioma característico de Eclesiastés y preserva el alcance terrenal del dicho.
theological_decisions:
- issue: Alcance de la afirmación sobre los muertos y las realidades terrenales
  english_pob_reading: The verse states that the dead no longer participate in or influence what is done in the earthly sphere 'under the sun.'
  chosen_spanish_reading: El versículo afirma que los muertos ya no participan en nada de lo que ocurre en la esfera terrenal «bajo el sol».
  alternative_spanish_readings:
  - El versículo enseña que los muertos no tienen ninguna conciencia en absoluto.
  - El versículo sostiene una negación total de toda actividad o existencia tras la muerte.
  rationale: 'Se conserva el límite explícito del contexto: «bajo el sol». Así no se expande la frase a una afirmación doctrinal más amplia de lo que el texto inmediato garantiza.'
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa más reciente no introdujo cambios y que el juicio de concordancia fue alto; por eso la redacción española sigue de cerca las decisiones léxicas auditadas del POB inglés, especialmente en קִנְאָה, חֵלֶק y el límite contextual de «bajo el sol».
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y actual, evitando arcaísmos innecesarios.
  - Se preservó la tripleta retórica amor/odio/celos para reflejar la acumulación del hebreo.
  - «Bajo el sol» se conservó como giro técnico de Eclesiastés.
  - Se evitó traducir יהוה o términos divinos aquí, pues el versículo no los contiene.
