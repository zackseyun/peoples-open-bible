translation:
  language: es
  text: Y el macho cabrío creció hasta volverse muy grande; y cuando tuvo fuerza, el gran cuerno fue quebrado, y en su lugar[b] subieron cuatro cuernos notables[a] hacia los cuatro vientos del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuatro notables’; el término hebreo describe algo visible o prominente, y el español aquí suministra ‘cuernos’ por el contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘bajo ella’; aquí el sentido es ‘en su lugar’ o ‘en vez de ella’.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְפִיר הָעִזִּים
  english_pob_choice: the male goat
  chosen_spanish: el macho cabrío de las cabras
  alternatives_spanish:
  - el macho cabrío
  - el macho de las cabras
  - el chivo
  lexicon: HALOT
  rationale: El hebreo especifica un macho cabrío, no solo un ‘goat’ genérico. En español, ‘macho cabrío’ preserva la especificidad zoológica; ‘de las cabras’ refleja el genitivo hebreo y mantiene el paralelismo con el resto del capítulo.
- source_word: הִגְדִּיל עַד מְאֹד
  english_pob_choice: grew exceedingly great
  chosen_spanish: creció hasta volverse muy grande
  alternatives_spanish:
  - creció extremadamente grande
  - se engrandeció muchísimo
  - llegó a ser muy grande
  lexicon: HALOT
  rationale: El hifil de גדל expresa llegar a ser grande o crecer en importancia/poder. ‘Creció hasta volverse muy grande’ conserva el intensificador עַד מְאֹד sin sonar rígido en español.
- source_word: וּכְעָצְמוֹ
  english_pob_choice: when he was strong
  chosen_spanish: cuando tuvo fuerza
  alternatives_spanish:
  - cuando fue fuerte
  - al estar en su fuerza
  - cuando estuvo poderoso
  lexicon: HALOT
  rationale: El sustantivo עצם aquí remite a fuerza o poder. ‘Tuvo fuerza’ conserva el sentido temporal de כ y evita una paráfrasis interpretativa más amplia.
- source_word: נִשְׁבְּרָה
  english_pob_choice: was broken
  chosen_spanish: fue quebrado
  alternatives_spanish:
  - fue roto
  - fue quebrantado
  - se rompió
  lexicon: HALOT
  rationale: El nifal de שבר es pasivo directo. ‘Quebrado’ mantiene la imagen literal del hebreo y la resonancia simbólica del cuerno.
- source_word: הַקֶּרֶן הַגְּדוֹלָה
  english_pob_choice: the great horn
  chosen_spanish: el gran cuerno
  alternatives_spanish:
  - el cuerno grande
  - el cuerno poderoso
  lexicon: HALOT
  rationale: ‘Cuerno’ conserva el símbolo apocalíptico de poder. ‘Gran’ reproduce bien el valor de grandeza/significación de גָּדוֹל.
- source_word: וַתַּעֲלֶנָה
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - brotaron
  - aparecieron
  - se levantaron
  lexicon: HALOT
  rationale: עלה en este contexto visionario puede indicar surgir o levantarse. ‘Subieron’ sigue de cerca la imagen espacial del hebreo y funciona bien con cuernos.
- source_word: חָזוּת אַרְבַּע
  english_pob_choice: four conspicuous horns
  chosen_spanish: cuatro cuernos notables
  alternatives_spanish:
  - cuatro cuernos visibles
  - cuatro cuernos conspicuos
  - cuatro cuernos prominentes
  lexicon: HALOT
  rationale: חָזוּת describe algo visible, prominente o conspicuo. Como el contexto ya provee ‘cuernos’, el español puede conservar solo el adjetivo, tal como hace el POB inglés al suplir el sustantivo por contexto.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: in its place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - debajo de ella
  - bajo ella
  - en vez de ella
  lexicon: HALOT
  rationale: Aunque literalmente significa ‘debajo de ella’, en contexto de reemplazo expresa ‘en su lugar’. Esa es la lectura idiomática que el inglés POB también documenta.
- source_word: לְאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  english_pob_choice: toward the four winds of heaven
  chosen_spanish: hacia los cuatro vientos del cielo
  alternatives_spanish:
  - hacia los cuatro vientos de los cielos
  - hacia las cuatro direcciones del cielo
  - hacia los cuatro puntos del cielo
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico de ‘cuatro vientos’, que en visión apocalíptica alude a las direcciones de la tierra/cielo. ‘Del cielo’ es una forma natural en español y mantiene el eco del hebreo.
theological_decisions:
- issue: Mantener el lenguaje simbólico sin interpretarlo dentro del verso
  english_pob_reading: Retain 'horn' and 'winds of heaven' as the vision's symbolic language without inserting historical interpretation.
  chosen_spanish_reading: Conservar ‘cuerno’ y ‘vientos del cielo’ como lenguaje visionario, sin introducir la identificación histórica en el texto principal.
  alternative_spanish_readings:
  - Interpretar el cuerno como rey o reino dentro de la traducción
  - Reemplazar ‘vientos’ por ‘direcciones’ en el texto principal
  rationale: El versículo forma parte de una visión apocalíptica. La traducción debe conservar la imaginería y dejar que la interpretación la provea el contexto del capítulo, no una glosa explicativa añadida al versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado está en filosofía optimal-equivalence, con acuerdo alto y sin revisiones aplicadas en el pass más reciente; la versión española sigue ese mismo equilibrio entre literalidad e inteligibilidad, conservando las decisiones léxicas y la imaginería visionaria del original.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - ‘Cuerno’ se conserva de forma literal por su valor simbólico en Daniel.
  - ‘Vientos del cielo’ mantiene el hebraísmo sin convertirlo en una mera glosa direccional en el texto principal.
  - La nota de pie sobre ‘cuatro notables’ preserva la alternativa documentada en el POB inglés y aclara que el sustantivo se sobreentiende por contexto.
