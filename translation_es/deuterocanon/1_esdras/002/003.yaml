  - marker: a
    text: 'El paralelo hebreo de Esdras 1:2 dice: «Yahvé, el Dios del cielo», en lugar de «el Señor de Israel, el Señor, el Altísimo». 1 Esdras conserva aquí la forma griega de la proclamación.'
    reason: alternative_reading
