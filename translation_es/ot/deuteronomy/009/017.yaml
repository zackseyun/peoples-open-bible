translation:
  language: es
  text: Así que agarré las dos tablas, las arrojé de mis dos manos y las hice pedazos[a] ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las quebré'. El verbo hebreo también puede traducirse de forma más simple como 'rompí' o 'quebré', mientras que 'las hice pedazos' destaca el efecto probable sobre las tablas de piedra en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְפֹּשׂ
  english_pob_choice: I took hold of
  chosen_spanish: tomé
  alternatives_spanish:
  - tomé en mis manos
  - agarré
  - tomé con firmeza
  lexicon: HALOT
  rationale: El hebreo expresa asir o tomar físicamente; en español, "tomé" comunica la acción sin añadir una violencia no explícita en el verbo mismo. En el contexto inmediato, las manos se mencionan enseguida, por lo que el matiz físico queda claro.
- source_word: בִּשְׁנֵי הַלֻּחֹת
  english_pob_choice: the two tablets
  chosen_spanish: las dos tablas
  alternatives_spanish:
  - las dos tablas de piedra
  - ambas tablas
  - las dos tablas del pacto
  lexicon: HALOT
  rationale: '"לֻחֹת" son tablas; el adjetivo "de piedra" no aparece en este versículo, aunque el contexto lo presupone. "Las dos tablas" mantiene la referencia directa y la dualidad del hebreo.'
- source_word: וָאַשְׁלִכֵם
  english_pob_choice: threw them
  chosen_spanish: las arrojé
  alternatives_spanish:
  - las tiré
  - las lancé
  - las eché
  lexicon: HALOT
  rationale: El verbo significa arrojar o lanzar. "Arrojé" es más formal que "tiré" y conserva bien el gesto deliberado del pasaje.
- source_word: מֵעַל שְׁתֵּי יָדַי
  english_pob_choice: from my two hands
  chosen_spanish: de mis dos manos
  alternatives_spanish:
  - desde mis dos manos
  - de ambas manos
  - de mis manos
  lexicon: HALOT
  rationale: El hebreo subraya la dualidad con "dos manos". "De mis dos manos" preserva ese énfasis mejor que reducirlo a "de mis manos" o "de ambas manos".
- source_word: וָאֲשַׁבְּרֵם
  english_pob_choice: shattered them
  chosen_spanish: las hice pedazos
  alternatives_spanish:
  - las quebré
  - las rompí
  - las destrocé
  lexicon: HALOT
  rationale: Aunque el verbo básico es "romper/quebrar", el contexto de tablillas arrojadas sugiere ruptura completa. "Las hice pedazos" expresa el resultado con naturalidad en español y corresponde al matiz intensificado que la POB inglesa captó con "shattered".
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante sus ojos
  - a la vista de ustedes
  - en presencia de ustedes
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica que ocurrió públicamente, a la vista de los oyentes. "Delante de ustedes" es natural en español y conserva el sentido sin introducir una imagen que el hebreo no exige literalmente.
translation_notes:
  revision_awareness: La revisión inglesa reciente indicó que no había cambios necesarios y la concordancia con el hebreo es alta; por eso esta versión española sigue de cerca la elección inglesa de sentido, pero ajusta el nivel de fuerza verbal para sonar natural en español.
  spanish_consistency_notes:
  - Se mantiene "tablas" para לֻחוֹת en coherencia con el versículo y con el uso bíblico común en español.
  - Se conserva la dualidad explícita de "dos manos" y "dos tablas" porque el hebreo la repite.
  - Se evita añadir "piedra" en el texto principal para no sobretraducir, aunque está implícito en el contexto.
  - '"Delante de ustedes" mantiene el valor público de לְעֵינֵיכֶם sin calco excesivo.'
