translation:
  language: es
  text: 'Y Balaam dijo a la asna[a]: «¡Te has burlado de mí![b] Si hubiera una espada en mi mano, ahora mismo te mataría[c]!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «asna»; el femenino está explícito en las formas hebreas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me has hecho burla». El verbo hebreo puede expresar trato burlón, abusivo o humillante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «te habría matado». El hebreo expresa un deseo contrario a la realidad con intención inmediata.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción; «Y ... dijo» conserva el encadenamiento hebreo de manera natural en español.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: לָאָתוֹן
  english_pob_choice: to the donkey
  chosen_spanish: a la asna
  alternatives_spanish:
  - a la burra
  - a la burra hembra
  lexicon: HALOT
  rationale: אָתוֹן es una asna, específicamente hembra; en español «asna» comunica el dato femenino con precisión y mantiene el matiz del hebreo.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acusación de Balaam; «Porque» es la equivalencia directa y clara en discurso directo.
- source_word: הִתְעַלַּלְתְּ בִּי
  english_pob_choice: you have made a mockery of me
  chosen_spanish: te has burlado de mí
  alternatives_spanish:
  - me has tomado el pelo
  - me has hecho burla
  - me has humillado
  lexicon: HALOT
  rationale: El hitpael de עלל puede expresar trato burlón o abusivo. «Te has burlado de mí» es idiomático en español y conserva la carga de humillación/mofa sin suavizarla demasiado.
- source_word: לוּ
  english_pob_choice: If only
  chosen_spanish: Si hubiera
  alternatives_spanish:
  - ¡Ojalá hubiera!
  - Si tan solo hubiera
  lexicon: HALOT
  rationale: Tras לוּ, el hebreo expresa un deseo contrario a la realidad; en español, la construcción condicional irrealis «Si hubiera» preserva esa fuerza.
- source_word: יֶשׁ חֶרֶב בְּיָדִי
  english_pob_choice: there were a sword in my hand
  chosen_spanish: hubiera una espada en mi mano
  alternatives_spanish:
  - tuviera una espada en mi mano
  - hubiese una espada en mi mano
  lexicon: HALOT
  rationale: Se conserva la imagen existencial del hebreo («hay/ existe una espada en mi mano») dentro de la irrealis española.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  lexicon: HALOT
  rationale: Equivalente léxico directo.
- source_word: כִּי עַתָּה
  english_pob_choice: right now
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - en este momento
  - de inmediato
  lexicon: HALOT
  rationale: Expresa la inmediatez enfática de la amenaza en un español natural y contundente.
- source_word: הֲרַגְתִּיךְ
  english_pob_choice: I would kill you
  chosen_spanish: te mataría
  alternatives_spanish:
  - te habría matado
  - te mataría ahora
  lexicon: HALOT
  rationale: En este contexto exclamativo, el verbo comunica intención inmediata y contrafáctica; «te mataría» es el equivalente más natural y fiel en español.
theological_decisions:
- issue: Tratamiento del animal con forma femenina explícita
  english_pob_reading: The English POB notes that the Hebrew uses a feminine form for the donkey and keeps the lexical note.
  chosen_spanish_reading: a la asna
  alternative_spanish_readings:
  - a la burra
  - a la burra hembra
  rationale: El hebreo marca el femenino de manera explícita; en español, «asna» preserva ese dato sin necesidad de nota explicativa en el cuerpo del texto.
  doctrine_reference: Precisión lexical y fidelidad al texto fuente
- issue: Valor del hitpael de עלל en una acusación enojada
  english_pob_reading: The English POB preserves the sense as mockery and notes alternative abusive/mockingly treatment.
  chosen_spanish_reading: te has burlado de mí
  alternative_spanish_readings:
  - me has humillado
  - me has tratado abusivamente
  rationale: 'No hay problema doctrinal, pero sí una tensión lexical: el verbo puede abarcar burla y trato abusivo. «Burlado» mantiene el matiz de mofa sin perder la intensidad de la queja.'
  doctrine_reference: Semántica verbal hebrea; notación de alternativa léxica
- issue: Irrealidad del deseo con לוּ y el verbo final
  english_pob_reading: The English POB notes a contrary-to-fact wish and immediate intent.
  chosen_spanish_reading: Si hubiera una espada en mi mano, ahora mismo te mataría
  alternative_spanish_readings:
  - ¡Ojalá hubiera una espada en mi mano; ahora mismo te mataría!
  - Si tuviera una espada en mi mano, te habría matado ahora mismo
  rationale: La estructura española reproduce la condición contrafactual y la amenaza inmediata. La primera cláusula no debe leerse como simple posibilidad real, sino como deseo imposible en el contexto.
  doctrine_reference: Aspecto/modo en hebreo; valor contrafactual de לוּ
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base; se mantiene la lectura óptima ya acordada por el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» como norma del proyecto cuando corresponda, pero este versículo no los contiene.
  - Se conservó el valor femenino de אָתוֹן con «asna», siguiendo la nota auditada sobre el hebreo.
  - La amenaza final se traduce con condicional irrealis para reflejar לוּ + verbo contrafáctico, sin suavizar la violencia del enunciado.
