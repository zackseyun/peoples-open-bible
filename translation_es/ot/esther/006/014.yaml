translation:
  language: es
  text: Mientras todavía hablaban con él, llegaron los eunucos[a] del rey y se apresuraron[b] a llevar a Amán al banquete que Ester había preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los oficiales del rey», ya que el término hebreo puede denotar también funcionarios de corte.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se dieron prisa» o «se apresuraron rápidamente a llevar a Amán»; el verbo hebreo aquí comunica urgencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדָם מְדַבְּרִים
  english_pob_choice: While they were still speaking
  chosen_spanish: Mientras aún estaban hablando
  alternatives_spanish:
  - Mientras todavía hablaban
  - Aún estaban hablando
  lexicon: HALOT
  rationale: La combinación adverbial + participio expresa acción en curso no terminada; «mientras aún estaban hablando» conserva ese valor progresivo con naturalidad en español.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La preposición עִם normalmente indica relación de compañía o interlocución; «con él» reproduce esa relación de manera directa y idiomática.
- source_word: סָרִיסֵי הַמֶּלֶךְ
  english_pob_choice: the king’s eunuchs
  chosen_spanish: los eunucos del rey
  alternatives_spanish:
  - los oficiales del rey
  - los funcionarios del rey
  - los cortesanos del rey
  lexicon: HALOT
  rationale: El término puede abarcar funcionarios de corte, pero su sentido básico es «eunucos». En el contexto persa de Ester, «eunucos del rey» mantiene la transparencia léxica sin borrar la posible amplitud semántica.
- source_word: הִגִּיעוּ
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - vinieron
  lexicon: HALOT
  rationale: El verbo indica alcanzar o presentarse en el lugar. «Llegaron» es natural en español narrativo y preserva el movimiento hacia la escena.
- source_word: וַיַּבְהִלוּ
  english_pob_choice: hurried
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - apresuraron
  - corrieron
  lexicon: HALOT
  rationale: Aquí la forma causativa expresa prontitud urgente para cumplir la acción. «Se apresuraron» refleja bien esa urgencia sin añadir el matiz de alarma o terror que el verbo puede tener en otros contextos.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: a llevar
  alternatives_spanish:
  - a traer
  - para llevar
  lexicon: HALOT
  rationale: En español, con un objeto persona y movimiento hacia el lugar del hablante/narrador, «llevar» funciona con naturalidad para traducir la finalidad de conducir a Amán al banquete.
- source_word: הַמִּשְׁתֶּה
  english_pob_choice: the banquet
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - el festín
  lexicon: HALOT
  rationale: «Banquete» es la opción más precisa y digna para el contexto cortesano de Ester, y corresponde al uso de la POB inglesa.
- source_word: אֲשֶׁר עָשְׂתָה אֶסְתֵּר
  english_pob_choice: that Esther had prepared
  chosen_spanish: que Ester había preparado
  alternatives_spanish:
  - que Ester había hecho
  - que Ester había dispuesto
  lexicon: HALOT
  rationale: Aunque עשה es literalmente «hacer», para un banquete el español pide «preparar». El pluscuamperfecto conserva la anterioridad del banquete respecto a la llegada de los eunucos.
translation_notes:
  revision_awareness: 'El texto coincide con la lectura base auditada: no se registran revisiones aplicadas en el paquete inglés y el cotejo final indicó alta concordancia sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «Ester» y «Amán» como formas españolas habituales de los nombres propios.
  - Se conserva el orden narrativo del hebreo y de la POB inglesa sin añadir elementos explicativos.
  - Se emplea «banquete» de forma consistente para מִשְׁתֶּה, evitando alternarlo con «fiesta» o «festín» en este versículo.
