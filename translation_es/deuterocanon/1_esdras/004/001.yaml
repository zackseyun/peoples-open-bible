translation:
  language: es
  text: Y el rey Darío hizo un gran banquete para todos los que estaban bajo su autoridad[a], y para toda su casa real, y para todos los nobles de Media y Persia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festín» para «banquete». El término griego denota una comida o entretenimiento formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοχὴν
  english_pob_choice: banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - festín
  - comida solemne
  - recepción
  lexicon: LSJ
  rationale: δοχή designa una comida o entretenimiento formal. «Banquete» conserva el carácter cortesano y festivo del acto, y es natural en español bíblico sin suavizar el matiz ceremonial.
- source_word: μεγάλην
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - solemne
  - magnífico
  lexicon: LSJ
  rationale: El adjetivo destaca la escala o importancia del evento. «Gran» reproduce bien la fuerza descriptiva del griego y se integra de forma natural con «banquete».
- source_word: τοῖς ὑπʼ αὐτόν
  english_pob_choice: who were under him
  chosen_spanish: los que estaban bajo su autoridad
  alternatives_spanish:
  - sus súbditos
  - los que estaban bajo él
  - los que dependían de él
  lexicon: LSJ
  rationale: La expresión griega es literalmente «los que están bajo él». En español, «bajo su autoridad» preserva la relación jerárquica sin reducirla solo a una categoría política o sonar demasiado literal.
- source_word: οἰκογενέσιν
  english_pob_choice: his household
  chosen_spanish: su casa
  alternatives_spanish:
  - su familia
  - los de su casa
  - su casa real
  lexicon: LSJ
  rationale: El término puede abarcar a los miembros de una casa o corte, no solo a la familia inmediata. «Su casa» es conciso y mantiene esa amplitud en contexto palaciego.
- source_word: μεγιστᾶσιν
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los grandes
  - los magnates
  - los principales
  lexicon: LSJ
  rationale: El vocablo se refiere a personajes de alto rango. «Los nobles» es la opción más clara y natural en español para figuras de élite de la corte.
- source_word: Μηδείας καὶ τῆς Περσίδος
  english_pob_choice: Media and Persia
  chosen_spanish: Media y Persia
  alternatives_spanish:
  - los medos y Persia
  - los reinos de Media y Persia
  lexicon: LSJ
  rationale: Son designaciones geográfico-políticas en genitivo. «Media y Persia» es la traslación más directa y estándar, manteniendo la referencia regional sin añadir interpretaciones.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente; no se aplicaron revisiones posteriores relevantes, y la traducción conserva la estructura y las relaciones jerárquicas del original sin añadir contenido.
  spanish_consistency_notes:
  - Se mantuvo «Darío» para Δαρεῖος, conforme al uso bíblico estándar en español.
  - 'Se preservó el orden coordinado del griego: rey, quienes estaban bajo su autoridad, su casa y los nobles de Media y Persia.'
  - Se evitó «SEÑOR» u otras formas de ocultamiento porque no aparece el tetragrámaton ni κύριος en este versículo.
