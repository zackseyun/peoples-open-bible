translation:
  language: es
  text: 'Y Judith les dijo: «Escúchenme, hermanos, tomen esta cabeza y cuélguenla en el parapeto[a] de su muralla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Parapeto» traduce ἐπάλξ; también puede entenderse como «almena». El término se refiere a la parte alta defensiva de una muralla.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατε δή μου
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escuchen, por favor
  lexicon: BDAG; LSJ
  rationale: El imperativo plural exige una exhortación directa. En español, «Escúchenme» concentra la fuerza de Ἀκούσατε μαζί con δή sin añadir un calco como «ahora» o «por favor» que no está explícito en el griego.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - paisanos
  - compatriotas
  lexicon: BDAG
  rationale: El vocativo masculino plural se mantiene como «hermanos», evitando expansión inclusiva no motivada por el texto y conservando el tono de apelación fraterna.
- source_word: λαβόντες
  english_pob_choice: take
  chosen_spanish: tomen
  alternatives_spanish:
  - habiendo tomado
  - agarren
  - reciban
  lexicon: BDAG
  rationale: 'El participio aoristo coordinado con el mandato principal se vierte de forma natural en español con un imperativo coordinado: «tomen ... y cuélguenla», preservando la secuencia de acciones.'
- source_word: τὴν κεφαλὴν ταύτην
  english_pob_choice: this head
  chosen_spanish: esta cabeza
  alternatives_spanish:
  - esta cabeza aquí
  - esta cabeza cortada
  lexicon: BDAG
  rationale: «Cabeza» reproduce κεφαλή sin añadir «cortada» o «severada», ya que ese detalle no aparece de forma explícita en la frase, aunque el contexto lo implique.
- source_word: κρεμάσατε
  english_pob_choice: hang it
  chosen_spanish: cuélguenla
  alternatives_spanish:
  - suspéndanla
  - péndanla
  lexicon: BDAG
  rationale: El verbo de mandato se traduce con el verbo concreto «colgar» en su forma imperativa plural, que transmite la acción física de modo directo y natural en español.
- source_word: ἐπὶ τῆς ἐπάλξεως
  english_pob_choice: on the battlement
  chosen_spanish: en el parapeto
  alternatives_spanish:
  - sobre la almena
  - en el baluarte
  - sobre el parapeto
  lexicon: LSJ
  rationale: ἐπάλξ puede designar el parapeto o parte superior defensiva de un muro. «Parapeto» es una opción precisa y clara en español; «almena» sería más restrictiva y «baluarte» desplaza el sentido.
- source_word: τοῦ τείχους ὑμῶν
  english_pob_choice: of your wall
  chosen_spanish: de su muro
  alternatives_spanish:
  - de su pared
  - de su muralla
  - de su muro de defensa
  lexicon: BDAG
  rationale: τεῖχος en contexto militar se refiere a un muro defensivo o muralla. «Muro» mantiene la literalidad básica; aunque «muralla» explicita el carácter defensivo, «muro» permite conservar la proximidad formal al griego.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del inglés POB sin cambios sustantivos: el único punto lexicalmente sensible es ἐπάλξεως, donde la alternativa «parapeto»/«battlement» se conserva como nota. No hubo revisiones textuales adicionales en el audit trail.'
  spanish_consistency_notes:
  - Se conserva el vocativo plural como «hermanos», coherente con el griego y con la decisión inglesa.
  - Se evita introducir «muralla» en el cuerpo principal para no sobre-especificar más allá de τεῖχος; la nota explica el matiz defensivo implícito.
  - Se mantiene un estilo bíblico moderno y directo, sin arcaísmos innecesarios.
