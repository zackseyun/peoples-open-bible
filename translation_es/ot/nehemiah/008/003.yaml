translation:
  language: es
  text: Y leyó de ella delante de la plaza que estaba frente a la Puerta del Agua, desde el amanecer[a] hasta el mediodía, en presencia de los hombres, las mujeres y los que podían entender[b]; y los oídos de todo el pueblo estaban atentos al Libro[c] de la Ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde la luz', literalmente; es decir, desde el amanecer.
    reason: lexical_alternative
  - marker: b
    text: O 'los que tenían entendimiento'; probablemente incluye a todos los suficientemente mayores para comprender la lectura.
    reason: lexical_alternative
  - marker: c
    text: '''Libro'' también puede rendirse como ''rollo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he read
  chosen_spanish: leyó
  alternatives_spanish:
  - proclamó
  - llamó
  lexicon: HALOT
  rationale: En este contexto el objeto es el escrito del cual se lee, por lo que en español el verbo natural y fiel es 'leyó', no 'proclamó' ni 'llamó'.
- source_word: בּוֹ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - en ella
  lexicon: HALOT
  rationale: El preposición con un texto se expresa de modo idiomático en español como 'de ella', manteniendo la relación con el libro/rollo sin calco extraño.
- source_word: לִפְנֵי הָרְחוֹב
  english_pob_choice: before the square
  chosen_spanish: delante de la plaza
  alternatives_spanish:
  - en frente de la plaza
  - ante la plaza
  lexicon: HALOT
  rationale: רְחוֹב designa un espacio abierto público; 'plaza' comunica bien la escena urbana y 'delante de' conserva la relación espacial.
- source_word: אֲשֶׁר לִפְנֵי שַׁעַר הַמַּיִם
  english_pob_choice: that was in front of the Water Gate
  chosen_spanish: que estaba frente a la Puerta del Agua
  alternatives_spanish:
  - que estaba delante de la Puerta del Agua
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar con una forma clara y reconocible en español.
- source_word: מִן הָאוֹר
  english_pob_choice: from daybreak
  chosen_spanish: desde el amanecer
  alternatives_spanish:
  - desde la luz
  - desde el alba
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'desde la luz', pero el sentido temporal es el comienzo del día; 'desde el amanecer' expresa esa referencia de forma natural sin perder precisión.
- source_word: עַד מַחֲצִית הַיּוֹם
  english_pob_choice: until midday
  chosen_spanish: hasta el mediodía
  alternatives_spanish:
  - hasta la mitad del día
  - hasta el mediodía
  lexicon: HALOT
  rationale: La frase señala el punto medio del día; 'mediodía' es la equivalencia española más clara y natural.
- source_word: נֶגֶד
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: Aquí marca a la audiencia congregada ante la lectura; 'en presencia de' comunica bien la relación pública y formal.
- source_word: הָאֲנָשִׁים וְהַנָּשִׁים
  english_pob_choice: the men and the women
  chosen_spanish: los hombres y de las mujeres
  alternatives_spanish:
  - los hombres y las mujeres
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente ambos grupos; en español se mantiene esa distinción sin diluirla.
- source_word: וְהַמְּבִינִים
  english_pob_choice: those who could understand
  chosen_spanish: los que podían entender
  alternatives_spanish:
  - los que entendían
  - los que tenían entendimiento
  lexicon: HALOT
  rationale: El participio comunica capacidad de comprensión; 'podían entender' refleja esa aptitud de manera natural y abierta, sin forzar una edad específica.
- source_word: וְאָזְנֵי כָל הָעָם
  english_pob_choice: the ears of all the people were attentive
  chosen_spanish: los oídos de todo el pueblo estaban atentos
  alternatives_spanish:
  - todo el pueblo escuchaba atentamente
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'los oídos' del hebreo, pero se completa con un predicado natural en español para que la frase sea publicable y comprensible.
- source_word: אֶל סֵפֶר הַתּוֹרָה
  english_pob_choice: to the Book of the Law
  chosen_spanish: al Libro de la Ley
  alternatives_spanish:
  - al rollo de la Ley
  - al libro de la Torá
  lexicon: HALOT
  rationale: '''סֵפֶר'' puede ser libro o rollo; la POB inglesa eligió ''Book''. En español ''Libro de la Ley'' es claro y conserva el valor del corpus normativo/covenantal de תּוֹרָה.'
theological_decisions:
- issue: Rendering of תּוֹרָה in a public covenant-reading context
  english_pob_reading: Law
  chosen_spanish_reading: Ley
  alternative_spanish_readings:
  - instrucción
  - Torá
  rationale: En Nehemías 8 el texto leído es el escrito normativo autorizado; 'Ley' comunica mejor ese valor histórico y literario que una transliteración o una paráfrasis más general.
  doctrine_reference: 'Translation philosophy: optimal equivalence; covenantal/public reading context.'
- issue: Preserving the explicit audience distinctions
  english_pob_reading: the men and the women and those who could understand
  chosen_spanish_reading: los hombres y de las mujeres y de los que podían entender
  alternative_spanish_readings:
  - los hombres y las mujeres y los que podían entender
  - los hombres, las mujeres y los que podían entender
  rationale: El hebreo distingue tres grupos; la traducción mantiene esa estructura para no suavizar la precisión del pasaje.
  doctrine_reference: Gender-accurate rendering and source-structure preservation.
translation_notes:
  revision_awareness: Revisión alineada con el texto hebreo y con el auditor de la POB en inglés; se corrigió la puntuación y se anclaron todos los marcadores de nota dentro del texto español. No se introdujeron lecturas nuevas ni se alteró la estructura semántica del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'Puerta del Agua' como nombre propio transparente y natural en español.
  - Se prefirió 'Ley' para תּוֹרָה conforme al contexto de lectura pública en Nehemías 8.
  - Se conservó la imagen hebrea de 'los oídos' por fidelidad estilística, con predicación natural en español.
  - Los marcadores [a], [b] y [c] aparecen exactamente en el texto y corresponden a sus respectivas notas.
