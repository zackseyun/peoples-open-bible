translation:
  language: es
  text: Cuando se puso el sol, Jonatán ordenó a los que estaban con él que permanecieran despiertos y junto a sus armas, para estar listos para la batalla durante toda la noche; y colocó centinelas alrededor del campamento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ ἔδυ ὁ ἥλιος
  english_pob_choice: When the sun had set
  chosen_spanish: Cuando se puso el sol
  alternatives_spanish:
  - Cuando el sol había bajado
  - Al ponerse el sol
  lexicon: LSJ
  rationale: La construcción indica el momento en que terminó la puesta del sol. «Cuando se puso el sol» es natural en español y conserva la idea de un hecho ya completado antes de la orden de Jonatán.
- source_word: ἐπέταξεν
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes a
  lexicon: LSJ
  rationale: El verbo expresa una orden con autoridad. «Ordenó» transmite bien el tono militar sin añadir matices innecesarios.
- source_word: τοῖς παρʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a los suyos
  - a los que iban con él
  lexicon: LSJ
  rationale: La frase griega señala a los acompañantes cercanos. «A los que estaban con él» mantiene esa relación sin volverla demasiado interpretativa.
- source_word: γρηγορεῖν
  english_pob_choice: to stay awake
  chosen_spanish: permanecieran despiertos
  alternatives_spanish:
  - velaran
  - estuvieran despiertos
  lexicon: LSJ
  rationale: Aquí el sentido básico es vigilia. Como el texto menciona aparte a los centinelas, «permanecieran despiertos» evita confundir esta orden con la acción posterior de vigilancia externa.
- source_word: εἶναι ἐπὶ τοῖς ὅπλοις
  english_pob_choice: remain at their weapons
  chosen_spanish: junto a sus armas
  alternatives_spanish:
  - sobre sus armas
  - en sus armas
  - alistados con sus armas
  lexicon: LSJ
  rationale: La expresión idiomática comunica disponibilidad armada. «Junto a sus armas» es idiomático en español y conserva la imagen concreta de tener las armas a mano.
- source_word: ἑτοιμάζεσθαι εἰς πόλεμον
  english_pob_choice: to be ready for battle
  chosen_spanish: estar listos para la batalla
  alternatives_spanish:
  - prepararse para la guerra
  - prepararse para la batalla
  lexicon: LSJ
  rationale: El infinitivo de propósito expresa preparación para el combate. «Estar listos para la batalla» es claro, breve y adecuado al contexto militar inmediato.
- source_word: διʼ ὅλης τῆς νυκτός
  english_pob_choice: through the whole night
  chosen_spanish: durante toda la noche
  alternatives_spanish:
  - toda la noche
  - a lo largo de toda la noche
  lexicon: LSJ
  rationale: La frase enfatiza la duración completa. «Durante toda la noche» preserva esa plenitud con español natural.
- source_word: ἐξέβαλεν προφύλακας
  english_pob_choice: he posted sentries
  chosen_spanish: colocó centinelas
  alternatives_spanish:
  - puso centinelas
  - destacó guardias adelantados
  lexicon: LSJ
  rationale: El giro militar griego alude a desplegar puestos de guardia. «Colocó centinelas» es preciso y fluido en español, sin perder el sentido de despliegue defensivo.
- source_word: κύκλῳ τῆς παρεμβολῆς
  english_pob_choice: around the camp
  chosen_spanish: alrededor del campamento
  alternatives_spanish:
  - en torno al campamento
  - alrededor de la tropa
  lexicon: LSJ
  rationale: παρεμβολή aquí se refiere al campamento militar. «Alrededor del campamento» traduce bien κύκλῳ y mantiene la referencia concreta al lugar.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el audit trail en inglés. No hubo revisiones aplicadas en el pass más reciente; la formulación española conserva la misma segmentación y el mismo sentido militar del original, con ajustes idiomáticos naturales para el español.
  spanish_consistency_notes:
  - Se conservó «Jonatán» como forma habitual del nombre en español bíblico.
  - Se prefirió «batalla» sobre «guerra» siguiendo el contexto táctico inmediato y el valor de πόλεμον en esta escena.
  - Se mantuvo un registro narrativo sobrio y directo, acorde con la prosa histórica del pasaje.
  - No se introdujeron notas al pie porque no hubo variantes textuales ni ambigüedades lexicográficas que exigieran alternativa explícita en esta línea.
