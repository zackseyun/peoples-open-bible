translation:
  language: es
  text: 'Para los hijos de Gad[a], por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo hombre apto para salir a la guerra[c][b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Gad». La expresión se refiere a los varones tribales que están siendo contados en el censo.'
    reason: cultural_note
  - marker: b
    text: O «según sus familias» para «por sus clanes».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «todo el que sale a la guerra» o «todo el que sale al servicio militar».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי גָד
  english_pob_choice: For the sons of Gad
  chosen_spanish: Para los hijos de Gad
  alternatives_spanish:
  - De los hijos de Gad
  - Para los descendientes de Gad
  lexicon: HALOT
  rationale: Conservo la fórmula tribal del hebreo y el valor colectivo masculino del contexto censal. «Hijos» reproduce el idioma bíblico sin diluirlo en una paráfrasis como «descendientes», y «Para» refleja bien la ל introductoria del encabezado.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por su genealogía
  lexicon: HALOT
  rationale: «Generaciones» mantiene la fórmula censal formal y la idea de descendencia/linaje. No la convierto en «genealogía» porque eso podría sonar a lista escrita más que a agrupación por linaje.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  lexicon: HALOT
  rationale: «Clanes» expresa mejor la subdivisión tribal que «familias» en español contemporáneo. Mantiene la distinción entre nivel tribal, clánico y doméstico.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por las casas paternas
  - por sus casas de padres
  lexicon: HALOT
  rationale: «Casas de sus padres» conserva la expresión técnica hebrea y la estructura patriarcal del censo. Evito «casas paternas» porque puede sonar menos transparente para lectores no especializados.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - de acuerdo con el número de nombres
  - por el número de nombres
  lexicon: HALOT
  rationale: La frase indica enumeración individual. «Según el número de nombres» es fiel y natural, y preserva la impresión de conteo nominal sin explicarla de más.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años en adelante
  alternatives_spanish:
  - desde los veinte años y más
  - de veinte años para arriba
  lexicon: HALOT
  rationale: Es la fórmula edad-militar estándar. En español, «de veinte años en adelante» transmite la idea con claridad y evita una literalidad extraña como «de hijo de veinte años».
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man able to go out to war
  chosen_spanish: todo el que salga a la guerra
  alternatives_spanish:
  - todo el que sale al servicio militar
  - todo el que pueda ir a la guerra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el que sale para ejército/guerra», y la POB inglesa mantuvo la fuerza militar. En español, «salga a la guerra» conserva el giro sin añadir una explicación interpretativa innecesaria; el contexto censal deja claro que se trata de varones aptos para servicio militar.
theological_decisions:
- issue: Alcance masculino implícito del censo
  english_pob_reading: The expression refers to the male tribal members being counted in the census.
  chosen_spanish_reading: La expresión se refiere a los varones de la tribu que están siendo contados en el censo.
  alternative_spanish_readings:
  - Los miembros de la tribu
  - La tribu en general
  rationale: El hebreo y la lectura POB restringen el referente al ámbito masculino/militar. No suavizo esto con lenguaje neutro porque borraría un rasgo contextual del texto.
  doctrine_reference: Números 1:2-3; marco censal y militar de Israel
- issue: Sentido militar de יֹצֵא צָבָא
  english_pob_reading: every man able to go out to war / military service
  chosen_spanish_reading: todo el que salga a la guerra
  alternative_spanish_readings:
  - todo el que salga al servicio militar
  - todo el apto para la guerra
  rationale: El término צָבָא aquí pertenece al registro de movilización. «A la guerra» mantiene la concreción bélica del texto, mientras que una versión más general como «servicio militar» explicaría el referente pero perdería la imagen del hebreo.
  doctrine_reference: Números 1:20-46; listas de aptos para guerra
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios en la última revisión (high_agreement, sin revisiones aplicadas). Esta propuesta española sigue esa lectura estable y conserva la misma estructura censal, incluyendo el alcance masculino y el matiz militar de la cláusula final.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera de este versículo porque no aparece ningún teónimo en el hebreo.
  - «Hijos»/«hijos de Gad» conserva la fórmula tribal tradicional sin sustituirla por un equivalente genérico.
  - «Clanes» y «casas de sus padres» distinguen correctamente los dos niveles de agrupación social del versículo.
  - La puntuación con dos puntos finaliza el encabezado de forma equivalente al flujo sintáctico del hebreo y del inglés POB.
