translation:
  language: es
  text: El hombre rico tenía muchísimas ovejas y ganado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre rico tenía muchísimas ovejas y ganado».'
