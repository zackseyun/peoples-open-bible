translation:
  language: es
  text: Y los hombres de la ciudad acamparon, y pelearon todo aquel día y toda aquella noche, y la ciudad fue entregada en las manos de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «en sus manos» con pronombre singular («de él»), no plural. Algunos traductores lo suavizan a «en sus manos» refiriéndolo al grupo, pero el texto base aquí conserva el singular.
    reason: alternative_reading
lexical_decisions:
- source_word: παρενέβαλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron campamento
  - se apostaron
  lexicon: LSJ
  rationale: El verbo griego tiene sentido militar de acampar o tomar posición. «Acamparon» conserva la acción concreta sin añadir una interpretación más específica que el texto no exige.
- source_word: οἱ ἄνδρες τῆς πόλεως
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los varones de la ciudad
  - los hombres de la ciudadela
  - los habitantes de la ciudad
  lexicon: LSJ
  rationale: ἄνδρες se refiere específicamente a hombres, no a un colectivo genérico. Se mantiene el matiz masculino y militar del grupo que combate.
- source_word: ἐπολέμησαν
  english_pob_choice: they fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - combatieron
  - hicieron guerra
  - lucharon
  lexicon: LSJ
  rationale: La forma verbal expresa entablar combate. «Pelearon» es natural en español y no fuerza el sentido hacia una guerra más amplia de la que el griego dice.
- source_word: ὅλην τὴν ἡμέραν ἐκείνην καὶ ὅλην τὴν νύκτα
  english_pob_choice: all that day and all that night
  chosen_spanish: todo aquel día y toda aquella noche
  alternatives_spanish:
  - todo ese día y toda esa noche
  - durante todo aquel día y toda aquella noche
  lexicon: LSJ
  rationale: Se conserva la repetición enfática de «todo/toda» y la secuencia temporal completa. «Aquel» refleja ἐκείνην con valor deíctico sin sonar artificial.
- source_word: παρεδόθη
  english_pob_choice: was delivered
  chosen_spanish: fue entregada
  alternatives_spanish:
  - fue entregada
  - fue puesta en manos
  - fue rendida
  lexicon: LSJ
  rationale: El pasivo admite «entregada» o «entregada en manos». Se elige una forma breve y fiel que preserve la pasividad y no introduzca un sujeto explícito.
- source_word: ἐν χερσὶν αὐτοῦ
  english_pob_choice: into his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus manos
  - en las manos de él
  - en sus manos[a]
  lexicon: LSJ
  rationale: El griego tiene singular αὐτοῦ, pero en español el posesivo puede mantenerse como «sus» sin perder la referencia. La nota registra que el original lee singular y que esta versión no pretende ocultar esa tensión numérica.
theological_decisions:
- issue: Desajuste numérico en la cláusula final
  english_pob_reading: retain the singular 'his hands'
  chosen_spanish_reading: conservar la referencia posesiva sin forzar el número explícito en el cuerpo principal
  alternative_spanish_readings:
  - en sus manos
  - en las manos de él
  - en su mano
  rationale: El texto griego presenta αὐτοῦ en singular tras sujetos plurales. En español, «sus manos» comunica la posesión de forma natural, mientras la nota deja constancia del singular griego para no borrar la tensión textual.
  doctrine_reference: Principios de transparencia textual y fidelidad al testimonio griego; sin implicación doctrinal directa
translation_notes:
  revision_awareness: 'La última revisión en inglés eliminó «against the city» porque no está en el griego y hacía la frase contradictoria. Esta versión española sigue esa decisión: solo dice que pelearon, sin añadir preposición ni objeto que el griego no expresa.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa.
  - Se usa «acamparon» como equivalente sobrio de παρενέβαλον en contexto militar.
  - «Pelearon» evita sobretraducir a una guerra más amplia y conserva el combate directo.
  - «Entregada en sus manos» suena natural en español, mientras la nota preserva el dato del singular griego.
  - No se introduce terminología eclesiástica ni interpretaciones ausentes del texto.
