translation:
  language: es
  text: Si un hombre engendra cien hijos y vive muchos años, aunque sean muchos los días de sus años, y su alma[a] no se sacia de lo bueno, y ni siquiera tiene sepultura, digo[b] que el niño nacido muerto[c] está mejor que él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «su alma»; «alma» también puede entenderse como «él mismo» o, en contexto, «apetito».
    reason: lexical_alternative
  - marker: b
    text: O «dije»; el perfecto hebreo puede traducirse aquí como una declaración pasada o como una fórmula discursiva presente.
    reason: lexical_alternative
  - marker: c
    text: O «el abortivo», «el aborto» o «el nacimiento prematuro/malogrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  lexicon: HALOT
  rationale: Introduce una condición hipotética; «Si» expresa de manera natural la estructura del hebreo sin añadir matiz concesivo que no domine la cláusula inicial.
- source_word: יוֹלִ֣יד אִ֣ישׁ מֵאָ֡ה
  english_pob_choice: a man fathers a hundred children
  chosen_spanish: un hombre engendra cien hijos
  alternatives_spanish:
  - un hombre tiene cien hijos
  - un hombre engendra un centenar de hijos
  lexicon: HALOT
  rationale: El hifil de ילד conserva la fuerza generativa; «engendra» refleja mejor el acto procreador que «tiene». «Cien hijos» mantiene la cifra literal del texto.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo presenta un singular masculino representativo. «Un hombre» preserva esa forma sin neutralizar indebidamente el referente.
- source_word: וְשָׁנִים רַבּוֹת יִחְיֶה
  english_pob_choice: and lives many years
  chosen_spanish: y vive muchos años
  alternatives_spanish:
  - y vive largos años
  - y vive por muchos años
  lexicon: HALOT
  rationale: Traducción directa y natural del valor temporal; conserva la idea de larga vida sin arcaísmo.
- source_word: וְרַב שֶׁיִּהְיוּ יְמֵי שָׁנָיו
  english_pob_choice: however many the days of his years may be
  chosen_spanish: aunque sean muchos los días de sus años
  alternatives_spanish:
  - y muchos sean los días de sus años
  - por muchos que sean los días de sus años
  lexicon: HALOT
  rationale: La construcción intensifica lo anterior. «Aunque» capta el matiz concesivo/intensificador, y «los días de sus años» conserva la imagen hebrea.
- source_word: וְנַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - él mismo
  - su apetito
  lexicon: HALOT
  rationale: «נפש» puede significar alma, vida, yo o apetito. Aquí se preserva la textura antropológica con «alma», sin reducirla a un mero pronombre.
- source_word: לֹא תִשְׂבַּע מִן הַטּוֹבָה
  english_pob_choice: is not satisfied with good
  chosen_spanish: no se sacia de lo bueno
  alternatives_spanish:
  - no queda satisfecha con lo bueno
  - no se llena de lo bueno
  - no disfruta del bien
  lexicon: HALOT
  rationale: «Saciarse» reproduce el verbo שבע con fuerza corporal y existencial. «Lo bueno» refleja el sustantivo con artículo en sentido amplio de lo bueno/enjundioso de la vida.
- source_word: וְגַם קְבוּרָה לֹא הָיְתָה לּוֹ
  english_pob_choice: and he does not even have burial
  chosen_spanish: y ni siquiera tiene sepultura
  alternatives_spanish:
  - y ni siquiera recibe sepultura
  - y ni siquiera le fue dada sepultura
  - y no tiene sepultura
  lexicon: HALOT
  rationale: «Sepultura» es el equivalente natural y digno de קבורה en español. «Ni siquiera» comunica el valor de גַם como intensificador de privación.
- source_word: אָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - dije
  - he dicho
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en Qohelet suele funcionar como fórmula discursiva presente. «Digo» mantiene ese presente en español.
- source_word: טוֹב מִמֶּנּוּ
  english_pob_choice: is better off than he
  chosen_spanish: es mejor que él
  alternatives_spanish:
  - está mejor que él
  - está mejor parado que él
  - es mejor tratado que él
  lexicon: HALOT
  rationale: En español, la comparación existencial puede expresarse con «es mejor que él» sin forzar una locución coloquial. Dado el contexto de condición de vida/muerte, se conserva la comparación de estado sin añadir interpretación excesiva.
- source_word: הַנָּפֶל
  english_pob_choice: the stillborn child
  chosen_spanish: el abortivo
  alternatives_spanish:
  - el nacido muerto
  - el niño malogrado
  - el natimorto
  lexicon: HALOT
  rationale: El hebreo puede referir a un aborto espontáneo, un nacimiento prematuro o un mortinato. «Abortivo» preserva la ambigüedad léxica reconocida por la POB inglesa, aunque suene más técnico; por eso se anota la alternativa interpretativa.
theological_decisions:
- issue: Valor antropológico de נֶפֶשׁ
  english_pob_reading: Rendered as 'his soul' rather than reducing it to 'he' or 'his appetite.'
  chosen_spanish_reading: «su alma» en vez de reducirlo a «él» o «su apetito».
  alternative_spanish_readings:
  - «su vida»
  - «él mismo»
  - «su apetito»
  rationale: En Qohelet, נפש conserva peso literario y antropológico. «Alma» mantiene esa densidad sin imponer una definición dogmática posterior, y evita perder la imagen del hambre interior por lo bueno.
  doctrine_reference: Translation philosophy §3, §6
- issue: Criterio para אָמַרְתִּי en discurso sapiencial
  english_pob_reading: I say
  chosen_spanish_reading: «digo» como fórmula discursiva presente.
  alternative_spanish_readings:
  - «dije»
  - «he dicho»
  rationale: El perfecto hebreo puede funcionar como marca de discurso vigente. En español, el presente transmite mejor la evaluación actual del hablante sin perder la referencia al acto enunciativo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su última revisión; esta propuesta española sigue de cerca sus decisiones léxicas y mantiene la ambigüedad documentada donde el hebreo la exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece en este pasaje.
  - Se preserva la imagen hebrea de «los días de sus años» en lugar de simplificarla a una mera duración.
  - «Sepultura» se usa como término bíblico claro y digno para קבורה.
