translation:
  language: es
  text: Los juicios[a] están preparados para los burladores, y los golpes para la espalda de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están listos para los burladores, y golpes para la espalda de los necios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכ֣וֹנוּ
  english_pob_choice: are prepared
  chosen_spanish: están preparados
  alternatives_spanish:
  - están listos
  - están establecidos
  - están dispuestos
  lexicon: HALOT
  rationale: El nifal de כון expresa algo puesto en condición de estar listo, firme o establecido. «Están preparados» reproduce bien la idea proverbial de una sanción ya dispuesta para quienes corresponden, sin perder naturalidad en español.
- source_word: לַ/לֵּצִ֣ים
  english_pob_choice: for scoffers
  chosen_spanish: para los burladores
  alternatives_spanish:
  - para los escarnecedores
  - para los mofadores
  lexicon: HALOT
  rationale: לץ designa a quienes se burlan con desprecio arrogante. «Burladores» comunica ese matiz de desprecio mejor que opciones más genéricas, y mantiene el registro sapiencial.
- source_word: שְׁפָטִ֑ים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - castigos
  - sentencias
  lexicon: HALOT
  rationale: Aunque משפט puede abarcar juicio legal o sentencia, aquí el paralelismo con los golpes sugiere una sanción punitiva. «Juicios» conserva el vínculo léxico con la raíz, y el contexto deja oír el sentido de castigo.
- source_word: וּ֝/מַהֲלֻמ֗וֹת
  english_pob_choice: beatings
  chosen_spanish: los golpes
  alternatives_spanish:
  - los azotes
  - las palizas
  - los azotes y golpes
  lexicon: HALOT
  rationale: El sustantivo se refiere a golpes o acciones de golpear. En español, «los golpes» es directo y fiel; evita cargar el verso con una intensidad no explicitada por el hebreo, aunque sigue dejando abierta la posibilidad de castigo corporal.
- source_word: לְ/גֵ֣ו
  english_pob_choice: for the back of
  chosen_spanish: para la espalda de
  alternatives_spanish:
  - para el cuerpo de
  - para la espalda
  lexicon: HALOT
  rationale: גֵו suele referirse a la espalda o al tronco/cuerpo. Dado el paralelo con golpes, «espalda» es la opción más concreta y natural; el singular conserva la correspondencia con el sustantivo hebreo singular.
- source_word: כְּסִילִֽים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los estúpidos
  lexicon: HALOT
  rationale: כסיל es un término sapiencial fijo para el necio moral, no simplemente una persona poco inteligente. «Necios» preserva ese valor tradicional y bíblico en español sin volverlo demasiado coloquial.
theological_decisions:
- issue: Naturaleza del paralelismo entre «juicios» y «golpes»
  english_pob_reading: Judgments are prepared ... and beatings ...
  chosen_spanish_reading: Los juicios están preparados ... y los golpes ...
  alternative_spanish_readings:
  - Los castigos están preparados ... y los golpes ...
  - Las sentencias están preparadas ... y los golpes ...
  rationale: El hebreo presenta un paralelismo punitivo; no conviene suavizarlo. «Juicios» mantiene la forma más cercana al término original y deja que el contexto determine su fuerza sancionadora, en línea con la decisión inglesa.
  doctrine_reference: Sabiduría bíblica proverbial; justicia retributiva en contexto sapiential.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó «backs» al singular «back» para reflejar más de cerca el sustantivo hebreo singular. En español se mantiene esa correspondencia con «la espalda» y se conserva el paralelismo proverbial sin ampliar el alcance del texto.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de máscara porque no aparece lenguaje divino en el versículo.
  - Se conservó el plural en «los juicios» para reflejar el hebreo plural y el uso proverbial del sustantivo.
  - Se eligió «necios» como término sapiencial estable, más acorde con el registro bíblico que «tontos» o «estúpidos».
  - El marcador de nota [a] se coloca solo en el primer hemistiquio porque la alternativa afecta a la cláusula completa y coincide con la nota inglesa de alternativa léxica.
