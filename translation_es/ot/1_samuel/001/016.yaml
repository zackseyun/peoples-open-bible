translation:
  language: es
  text: No consideres a tu sierva como una mujer vil[a], porque por la abundancia de mi queja[b] y de mi aflicción he hablado hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hija de Belial», un modismo para una mujer moralmente despreciable o de mala reputación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «por mi gran queja y aflicción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתֵּן
  english_pob_choice: Do not regard
  chosen_spanish: No consideres
  alternatives_spanish:
  - No mires
  - No tengas por
  - No juzgues como
  lexicon: HALOT
  rationale: En esta construcción, נתן con לִפְנֵי expresa la idea de tratar o estimar a alguien de cierta manera. «Consideres» comunica bien ese sentido en español sin volver la frase demasiado literal.
- source_word: אֲמָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  - tu doncella
  lexicon: HALOT
  rationale: El término es femenino y de estatus servil. «Sierva» conserva la humildad de la hablante y suena natural en registro bíblico; «esclava» sería posible, pero aquí puede sonar más duro de lo que exige el contexto.
- source_word: בַּת בְּלִיָּעַל
  english_pob_choice: a worthless woman
  chosen_spanish: una mujer vil
  alternatives_spanish:
  - una mujer inútil
  - una mujer perversa
  - una mujer despreciable
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y denota una persona moralmente despreciable o sin valor. «Mujer vil» conserva el peso despectivo de la frase sin traducirla mecánicamente como «hija de Belial».
- source_word: מֵרֹב
  english_pob_choice: out of the abundance of
  chosen_spanish: por la abundancia de
  alternatives_spanish:
  - a causa de la abundancia de
  - por lo mucho de
  - de tanto
  lexicon: HALOT
  rationale: La preposición y el sustantivo expresan causa e intensidad. «Por la abundancia de» mantiene la imagen de desborde interno y suena fluido en español.
- source_word: שִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi lamentación
  - mi meditación
  - mi angustia
  lexicon: HALOT
  rationale: Aquí el contexto es el discurso angustiado de Ana ante Elí. «Queja» refleja bien su habla dolida y es más natural que «meditación» en español.
- source_word: וְכַעְסִי
  english_pob_choice: my vexation
  chosen_spanish: mi vexación
  alternatives_spanish:
  - mi aflicción
  - mi irritación
  - mi congoja
  lexicon: HALOT
  rationale: «Vexación» reproduce con bastante precisión la carga de aflicción e inquietud del término hebreo y coincide con la revisión final del inglés POB. Aunque es menos común, resulta entendible en un registro bíblico digno.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - he estado hablando
  - hablé así
  lexicon: HALOT
  rationale: 'El perfecto hebreo se entiende como una acción que se extiende hasta el presente del hablante. El español con perfecto compuesto comunica bien esa continuidad: «he hablado».'
- source_word: עַד הֵנָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta aquí
  - hasta este punto
  lexicon: HALOT
  rationale: La expresión marca tiempo, no lugar. «Hasta ahora» es la equivalencia más natural y clara en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última forma revisada del POB en inglés y refleja el ajuste de 'provocation' a 'vexation'. Conserva la fuerza idiomática de בַּת בְּלִיָּעַל sin recurrir a una glosa tradicionalizante como «hija de Belial» en el texto principal, pero la documenta en nota. También mantiene el valor causal de מֵרֹב y el matiz de continuidad del perfecto hebreo con «he hablado».
  spanish_consistency_notes:
  - Se preservó el tratamiento humilde de la hablante con «tu sierva», coherente con el tono del relato.
  - «Vexación» se mantuvo por fidelidad a la revisión final del inglés POB y para evitar desplazar el foco hacia una idea de provocación activa.
  - La nota sobre «hija de Belial» resuelve la tensión idiomática sin introducir en el cuerpo del texto una construcción poco natural para lectores actuales.
