translation:
  language: es
  text: ¡Regocíjense en Yahvé[a], ustedes, justos[b], y den gracias al recordar[c] su santidad[d]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahweh». Se conserva aquí la forma española «Yahvé» como nombre divino del Tetragrámaton.'
    reason: source_note
  - marker: b
    text: 'O: «los justos». El hebreo usa un plural directo de apelación.'
    reason: alternative_reading
  - marker: c
    text: 'O: «ante la memoria de» o «ante la mención de». El sustantivo hebreo זֵכֶר puede significar recuerdo, memorial o mención.'
    reason: lexical_alternative
  - marker: d
    text: Muchas traducciones ponen «su santo nombre» por influencia de expresiones salmódicas similares, pero el hebreo aquí dice literalmente «su santidad».
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂמְחוּ
  english_pob_choice: Rejoice
  chosen_spanish: ¡Regocíjense!
  alternatives_spanish:
  - Alégrense
  - Gócense
  lexicon: HALOT
  rationale: Es un imperativo plural de alegría. «Regocíjense» conserva la fuerza exhortativa y suena natural y digno en español bíblico contemporáneo.
- source_word: צַדִּיקִים
  english_pob_choice: you righteous ones
  chosen_spanish: ustedes justos
  alternatives_spanish:
  - los justos
  - justos
  lexicon: HALOT
  rationale: El hebreo funciona como un llamado directo al grupo. «Ustedes justos» mantiene el valor vocativo y el plural sin agregar un sustantivo innecesario.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: La preposición ב marca la esfera u objeto del gozo. Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto.
- source_word: וְהוֹדוּ
  english_pob_choice: and give thanks
  chosen_spanish: y den gracias
  alternatives_spanish:
  - y alaben
  - y confiesen
  lexicon: HALOT
  rationale: En este contexto salmódico, ידה en hifil expresa acción de gracias. «Den gracias» comunica bien el mandato y evita perder el matiz de agradecimiento.
- source_word: לְזֵכֶר
  english_pob_choice: at the remembrance of
  chosen_spanish: por
  alternatives_spanish:
  - al recordar
  - en memoria de
  - ante el recuerdo de
  lexicon: HALOT
  rationale: זֵכֶר puede significar recuerdo, memorial o mención. En español, una construcción breve como «por» permite conservar la ambigüedad entre dar gracias por el recuerdo/mención de su santidad sin imponer una sola paráfrasis.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holiness
  chosen_spanish: su santidad
  alternatives_spanish:
  - su nombre santo
  - su santa presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su santidad», sin añadir «nombre». «Su santidad» preserva la lectura directa y evita importar un término no presente en el texto base.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton. Se usa «Yahvé» como forma española tradicional del nombre propio divino en el proyecto, manteniendo visibilidad del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre לְזֵכֶר y קָדְשׁוֹ
  english_pob_reading: to his holiness / at the remembrance of his holiness
  chosen_spanish_reading: por su santidad
  alternative_spanish_readings:
  - al recordar su santidad
  - en memoria de su santidad
  - por el recuerdo de su santidad
  rationale: El hebreo permite un campo semántico de recuerdo, memoria o mención. La preposición española «por» deja abierto si se trata de dar gracias por la santidad misma, por su recuerdo o por su mención, sin añadir «nombre» que no aparece en el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que subrayó la necesidad de no añadir «nombre» al hebreo de la segunda cola. Por eso la línea española evita expandir קָדְשׁוֹ y mantiene una formulación breve que conserve la ambigüedad semántica de לְזֵכֶר sin sobretraducir. También se respetó la decisión del proyecto de renderizar יהוה con un nombre propio visible en español.
  spanish_consistency_notes:
  - Se mantuvo el registro litúrgico moderno y digno, evitando calcos rígidos.
  - «Yahvé» se usó de forma consistente para יהוה.
  - Se prefirió «den gracias» frente a «alaben» para conservar el valor de acción de gracias de וְהוֹדוּ.
  - La cláusula final quedó deliberadamente abierta para no imponer «nombre» donde el hebreo no lo contiene.
