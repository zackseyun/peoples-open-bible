translation:
  language: es
  text: Ahora bien, procuren hacer una copia de estas cosas, y que le sea dada a Jonatán, y que sea colocada en el monte santo, en un lugar destacado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un lugar conspicuo». El griego sugiere una ubicación públicamente notoria o formalmente señalada.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Así pues
  - Entonces ahora
  lexicon: LSJ
  rationale: La combinación introduce una transición inferencial y exhortativa. «Ahora pues» conserva ese giro discursivo en un español natural y formal.
- source_word: ἐπιμελεῖσθε
  english_pob_choice: take care
  chosen_spanish: cuiden de
  alternatives_spanish:
  - se esfuercen por
  - procuren
  lexicon: LSJ
  rationale: El imperativo medio pide atención diligente al encargo. «Cuiden de» expresa la idea de hacerse cargo de manera clara sin sonar excesivamente arcaica.
- source_word: τοῦ ποιῆσαι
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - preparar
  - redactar
  lexicon: LSJ
  rationale: Con ἀντίγραφον, el infinitivo apunta a la confección de una copia escrita. «Hacer una copia» es la correspondencia más directa y natural.
- source_word: τούτων
  english_pob_choice: of these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de esto
  - de estas
  lexicon: LSJ
  rationale: El demostrativo plural remite al contenido precedente del documento. «Estas cosas» preserva el plural sin concretar indebidamente el referente.
- source_word: ἀντίγραφον
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - un duplicado
  - una transcripción
  lexicon: LSJ
  rationale: El término designa una copia escrita de un documento. «Copia» es la forma más clara y sobria en español.
- source_word: δοθήτω
  english_pob_choice: let it be given
  chosen_spanish: que se la entregue
  alternatives_spanish:
  - que le sea dada
  - entréguese
  lexicon: LSJ
  rationale: El pasivo imperativo expresa una orden formal. En español, «que se la entregue» mantiene el tono directivo y la referencia a la copia.
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Transliteración estándar al español
  rationale: Se adopta la forma habitual en español bíblico. Mantiene la identificación del nombre propio con lectura natural para el lector hispano.
- source_word: τεθήτω
  english_pob_choice: let it be placed
  chosen_spanish: que se la coloque
  alternatives_spanish:
  - que se la ponga
  - que se la deposite
  lexicon: LSJ
  rationale: El imperativo pasivo indica la colocación oficial del documento. «Coloque» conserva el valor formal de ubicación/deposito en un lugar determinado.
- source_word: ἐν ὄρει τῷ ἁγίῳ
  english_pob_choice: on the holy mountain
  chosen_spanish: en el monte santo
  alternatives_spanish:
  - sobre el monte santo
  - en la montaña santa
  lexicon: LSJ
  rationale: La frase remite al monte de Sion / el monte del templo. «Monte santo» reproduce bien la resonancia bíblica y la referencia topográfica.
- source_word: ἐν τόπῳ ἐπισήμῳ
  english_pob_choice: in a prominent place
  chosen_spanish: en un lugar visible
  alternatives_spanish:
  - en un lugar prominente
  - en un lugar conspicuo
  lexicon: LSJ
  rationale: ἐπίσημος aquí sugiere un sitio público o fácilmente notorio. «Lugar visible» comunica con claridad la idea de una ubicación destacada; se deja abierta la posible lectura de un lugar oficialmente señalado.
theological_decisions:
- issue: Ubicación de la copia en el monte santo como acto de archivo público y sagrado
  english_pob_reading: the holy mountain ... in a prominent place
  chosen_spanish_reading: en el monte santo, en un lugar visible
  alternative_spanish_readings:
  - en el monte santo, en un lugar conspicuo
  - en el monte santo, en un lugar oficialmente señalado
  rationale: El texto no desarrolla una doctrina, pero sí une santidad topográfica con visibilidad pública. La traducción conserva ambos matices sin resolver de manera cerrada si el énfasis es meramente espacial o también institucional.
  doctrine_reference: Topografía sagrada y memoria pública en textos del período macabeo; cf. categoría general de lugar santo en la historia de Israel.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no presenta revisiones aplicadas; por ello se mantiene la equivalencia óptima del inglés POB, pero reanclada directamente en el griego para las decisiones clave de imperativo, copia documental y localización pública del depósito.
  spanish_consistency_notes:
  - Se usa «Jonatán» como forma española habitual del nombre, en coherencia con la transliteración bíblica estándar.
  - Se evita «SEÑOR» o fórmulas de sustitución del nombre divino porque el versículo no contiene el tetragrámaton ni κύριος en ese lugar.
  - «Monte santo» se mantiene como equivalente idiomático de ἐν ὄρει τῷ ἁγίῳ, sin expandirlo a una explicación interpretativa dentro del texto principal.
