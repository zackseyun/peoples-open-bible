translation:
  language: es
  text: Así se completó toda la obra que Salomón había hecho para la casa de Yahvé. Entonces Salomón hizo entrar las cosas consagradas[a] de David su padre, la plata, el oro y todos los utensilios; los puso en las tesorerías de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "las cosas dedicadas por David su padre" o "las cosas consagradas de David su padre".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַם
  english_pob_choice: was finished
  chosen_spanish: se completó
  alternatives_spanish:
  - fue terminada
  - quedó concluida
  lexicon: HALOT
  rationale: El verbo en este contexto narrativo expresa la conclusión de la obra. En español, 'se completó' preserva el sentido resultativo de manera natural y digna.
- source_word: כָּל הַמְּלָאכָה
  english_pob_choice: all the work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - todo el trabajo
  - toda la labor
  lexicon: HALOT
  rationale: מְלָאכָה abarca el conjunto de la obra/proyecto. 'Obra' es más natural en un contexto de construcción sagrada y mantiene la amplitud del término.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para el templo de Yahvé
  - para la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'casa' y el nombre divino Yahvé según el criterio del proyecto. 'Para' refleja el valor final/relacional del lamed.
- source_word: וַיָּבֵא
  english_pob_choice: brought in
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - introdujo
  lexicon: HALOT
  rationale: El hiphil de בוא marca movimiento hacia adentro. En español, 'llevó' funciona con naturalidad y, en el contexto del versículo, comunica el traslado de los objetos al recinto del templo/tesoro.
- source_word: קָדְשֵׁי דָּוִיד אָבִיו
  english_pob_choice: the holy things of David his father
  chosen_spanish: las cosas consagradas de David su padre
  alternatives_spanish:
  - las cosas santas de David su padre
  - los objetos dedicados por David su padre
  lexicon: HALOT
  rationale: קדשׁ aquí designa bienes puestos aparte para uso sagrado. 'Consagradas' evita la rigidez de 'santas' y recoge mejor el valor de dedicación cultual; además preserva la alternativa semántica que la POB inglesa anotó.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el plata
  - la plata y el oro
  lexicon: HALOT
  rationale: כֶּסֶף en este contexto se refiere al metal precioso, no a moneda. 'La plata' es el equivalente claro y convencional en español.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  - el oro precioso
  lexicon: HALOT
  rationale: El sustantivo designa el metal precioso de forma directa; 'el oro' mantiene la enumeración del texto fuente.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para implementos/recipientes. 'Utensilios' transmite la amplitud funcional en un registro digno; 'vasos' podría sonar demasiado restringido al español litúrgico.
- source_word: נָתַן
  english_pob_choice: he put
  chosen_spanish: los puso
  alternatives_spanish:
  - los depositó
  - los colocó
  lexicon: HALOT
  rationale: En el contexto de guardar objetos en tesoros, נתן puede ser rendido naturalmente como 'poner'. 'Los puso' conserva la sencillez del hebreo y del inglés POB.
- source_word: בְּאֹצְרֹת
  english_pob_choice: into the treasuries
  chosen_spanish: en los tesoros
  alternatives_spanish:
  - en los almacenes
  - en las cámaras del tesoro
  lexicon: HALOT
  rationale: אֹצָר designa un depósito/tesorería. 'Tesoros' en plural refleja bien el hebreo y resulta transparente en español; el sentido de almacenamiento se entiende por el contexto.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se preserva la imagen de 'casa' y la designación divina distinta de la primera mitad del versículo, evitando homogeneizarla como 'templo'.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Señor
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo el estándar del proyecto en español, se emplea 'Yahvé' en lugar de una sustitución por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preserving the distinction between 'house of Yahweh' and 'house of God'
  english_pob_reading: Preserve both expressions as written
  chosen_spanish_reading: 'Preservar ambas expresiones: ''casa de Yahvé'' y ''casa de Dios'''
  alternative_spanish_readings:
  - uniformar ambas como 'templo'
  - uniformar ambas como 'casa del Señor'
  rationale: La variación del hebreo es significativa y no debe aplanarse. Mantener ambas fórmulas conserva la transparencia hacia el original y la diferencia de designación divina.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
- issue: Rendering קָדְשֵׁי דָּוִיד אָבִיו
  english_pob_reading: the holy things of David his father
  chosen_spanish_reading: las cosas consagradas de David su padre
  alternative_spanish_readings:
  - las cosas santas de David su padre
  - los objetos dedicados por David su padre
  rationale: La frase apunta a bienes apartados para uso sagrado. 'Consagradas' comunica mejor el matiz cultual en español que un literalismo de 'santas', y evita ambigüedad devocional.
  doctrine_reference: HALOT; lexical note in English POB footnote a
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo sin cambios en la última revisión registrada; la puntuación y la selección léxica española se ajustaron para ser fieles al hebreo, preservando la distinción entre 'casa de Yahvé' y 'casa de Dios' y expresando de manera natural el valor cultual de קָדְשֵׁי.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme al criterio del proyecto en español.
  - Se conservó la alternancia 'casa de Yahvé' / 'casa de Dios' para no nivelar el paralelismo del hebreo.
  - '''Consagradas'' se eligió para קָדְשֵׁי por su claridad cultual en español.'
  - '''Tesoros'' en plural refleja bien אֹצְרוֹת y suena natural en español bíblico contemporáneo.'
  - No se empleó 'Cristo', 'Señor' ni 'templo' donde el hebreo mantiene 'casa' y el nombre divino explícito.
