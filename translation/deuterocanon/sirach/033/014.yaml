translation:
  text: Opposite evil is good[a], and opposite death is life; so opposite a godly man is a sinner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the godly is the sinner.' The Greek can be read more generically without supplying 'man,' but the singular masculine form is retained in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέναντι
  chosen: opposite
  alternatives:
  - over against
  - facing
  - corresponding to
  lexicon: LSJ
  rationale: The repeated preposition structures the verse as a series of paired opposites. 'Opposite' is concise and natural in English while preserving the antithetical force better than the more wooden 'over against.'
- source_word: κακοῦ
  chosen: evil
  alternatives:
  - bad
  - wickedness
  lexicon: LSJ
  rationale: The genitive after ἀπέναντι denotes the opposing counterpart. 'Evil' best captures the moral contrast with 'good' in wisdom literature; 'bad' is too weak and 'wickedness' too abstract here.
- source_word: ἀγαθόν
  chosen: good
  alternatives:
  - what is good
  lexicon: LSJ
  rationale: A straightforward moral opposite to κακοῦ. The simple substantive adjective 'good' works idiomatically in English and preserves the aphoristic balance.
- source_word: θανάτου
  chosen: death
  lexicon: LSJ
  rationale: Literal and unambiguous in the antithetical pair with ζωή.
- source_word: ζωή
  chosen: life
  lexicon: LSJ
  rationale: Literal and unambiguous; the verse sets up a basic wisdom contrast.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Introduces the application of the preceding analogies. 'So' is natural modern English and keeps the proverbial flow.
- source_word: εὐσεβοῦς
  chosen: a godly man
  alternatives:
  - the godly
  - a devout man
  - a pious man
  lexicon: LSJ
  rationale: The adjective means 'godly/devout/pious.' Because the Greek is singular and paired with singular ἁμαρτωλός, the English keeps the singular. 'Godly' is more accessible than 'pious' and better reflects character rather than merely cultic devotion. 'Man' is supplied to make the singular personal reference explicit and follows the project's gender-accurate policy where the source is grammatically masculine and representative.
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - the sinner
  - a sinful man
  lexicon: LSJ
  rationale: Standard rendering for the noun/adjective used substantivally. The indefinite singular matches the balanced proverb structure in English.
