base_translation:
  language: en
  yaml_path: translation/ot/psalms/023/003.yaml
  text: He restores my soul[c][b][a]; he leads me in paths of righteousness for the sake of his name.
  footnotes:
  - marker: a
    text: Or 'He revives my life,' 'He refreshes me,' or 'He brings me back.' The Hebrew uses 'my soul' (nephesh), which can mean the whole self or life, not only the immaterial aspect of a person.
    reason: lexical_alternative
  - marker: b
    text: Or 'in right paths' or 'in paths of justice.'
    reason: lexical_alternative
  - marker: c
    text: '''For the sake of his name'' means for the honor of his own character and reputation.'
    reason: cultural_note
