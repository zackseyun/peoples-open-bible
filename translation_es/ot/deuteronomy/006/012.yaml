  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: una advertencia a no olvidar a Yahvé, identificado como quien sacó a Israel de Egipto. Conserva correctamente «Yahvé» para יְהוָה y mantiene «tierra de Egipto». Sin embargo, la construcción «para no olvidar» debilita ligeramente el valor de advertencia de פֶּן en comparación con una formulación más directa como «no sea que olvides».'
  spanish_quality_summary: 'El español es claro y natural, pero hay una inconsistencia importante: el texto lleva «Yahvé[a]» mientras la nota a pie explica una alternativa para «casa de esclavitud», de modo que el anclaje está en el lugar equivocado. Además, «Ten cuidado para no olvidar» suena menos bíblico y menos directo que «Ten cuidado, no sea que olvides».'
  glossary_alignment: Hay buena alineación con la terminología del proyecto en «Yahvé» y en el campo semántico de esclavitud. «Casa de esclavitud» es aceptable y refleja la revisión inglesa. La nota léxica sobre la alternativa literal «casa de esclavos» debe anclarse en esa frase, no en el nombre divino.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Yahvé» pero su contenido trata sobre «casa de esclavitud / casa de esclavos».
    rationale: Esto rompe la correspondencia obligatoria entre marcador y palabra o frase relevante, y puede confundir al lector sobre qué término se está aclarando.
  - severity: medium
    issue: «Ten cuidado para no olvidar» debilita el matiz admonitorio de פֶּן.
    rationale: Aunque es comprensible, la secuencia suena más final que preventiva. «Ten cuidado, no sea que olvides» o equivalente preserva mejor la advertencia solemne del hebreo.
  revised_spanish_text: Ten cuidado, no sea que olvides a Yahvé, que te sacó de la tierra de Egipto, de la casa de esclavitud[a].
