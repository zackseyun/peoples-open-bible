translation:
  language: es
  text: La insensatez está atada en el corazón de un muchacho[a]; la vara de la disciplina la alejará de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La insensatez está atada al corazón de un joven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: insensatez
  alternatives_spanish:
  - foolishness
  - necedad
  lexicon: HALOT
  rationale: El hebreo nombra una torpeza moral y sapiencial, no solo falta de inteligencia. "Insensatez" conserva ese peso ético en un español natural y digno, cercano a la fuerza de "folly" sin volverse arcaico.
- source_word: קְשׁוּרָה
  english_pob_choice: is bound up
  chosen_spanish: está ligada
  alternatives_spanish:
  - está atada
  - está unida
  lexicon: HALOT
  rationale: El participio pasivo expresa algo firmemente adherido. "Está ligada" comunica esa idea de unión estrecha de modo idiomático en español, sin perder la imagen de una condición arraigada.
- source_word: בְלֶב
  english_pob_choice: in the heart
  chosen_spanish: al corazón
  alternatives_spanish:
  - en el corazón
  - en el interior
  lexicon: HALOT
  rationale: Se conserva "corazón" como centro de pensamiento, voluntad y deseo en la antropología hebrea. En español, "al corazón" funciona bien con la expresión "ligada al corazón" y preserva la metáfora.
- source_word: נָעַר
  english_pob_choice: a boy
  chosen_spanish: un muchacho
  alternatives_spanish:
  - un joven
  - un chico
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y puede abarcar desde niño hasta joven. "Muchacho" es una opción natural, claramente masculina, y mantiene el referente juvenil sin neutralizarlo.
- source_word: שֵׁבֶט
  english_pob_choice: the rod
  chosen_spanish: la vara
  alternatives_spanish:
  - el bastón
  - la vara correctiva
  lexicon: HALOT
  rationale: En Proverbios el término remite al instrumento concreto de corrección. "Vara" preserva la imagen física con claridad en español; "vara de la disciplina" mantiene la relación con el sustantivo siguiente sin suavizar el texto.
- source_word: מוּסָר
  english_pob_choice: of discipline
  chosen_spanish: de la disciplina
  alternatives_spanish:
  - de corrección
  - de instrucción
  lexicon: HALOT
  rationale: '"מוּסָר" abarca formación correctiva y amonestación, no mera castigo. "Disciplina" expresa bien ese sentido formativo en castellano moderno y encaja naturalmente con la frase bíblica.'
- source_word: יַרְחִיקֶנָּה
  english_pob_choice: will drive it far
  chosen_spanish: la alejará
  alternatives_spanish:
  - la apartará
  - la hará huir lejos
  lexicon: HALOT
  rationale: El verbo causativo significa hacer que algo quede lejos. "La alejará" preserva la idea de separación efectiva en un español fluido; la noción de lejanía queda reforzada por el contexto y la imagen de la vara.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su corazón
  - lejos de él
  lexicon: HALOT
  rationale: El sufijo pronominal marca separación respecto del muchacho. "De él" es la forma directa y clara en español, manteniendo el paralelismo con el sujeto humano de la primera cláusula.
theological_decisions:
- issue: Cómo traducir la imagen corporal de corrección sin atenuarla ni absolutizarla
  english_pob_reading: Retain the concrete expression 'the rod of discipline' in the main text.
  chosen_spanish_reading: Mantener la imagen concreta de "la vara de la disciplina" en el texto principal.
  alternative_spanish_readings:
  - solo "la disciplina"
  - '"la corrección" sin "vara"'
  rationale: El hebreo menciona explícitamente שֵׁבֶט, así que la traducción debe conservar la imagen concreta. En español, "vara de la disciplina" transmite la fuerza del original sin convertirlo en una paráfrasis ni resolver la tensión ética del proverbio.
  doctrine_reference: Fidelidad al texto original; preservar la tensión del lenguaje sapiencial.
- issue: Si נָעַר debe hacerse neutro o conservar su forma masculina
  english_pob_reading: Use 'a boy' rather than a gender-neutral term.
  chosen_spanish_reading: Usar "un muchacho" como equivalente masculino natural.
  alternative_spanish_readings:
  - '"un joven"'
  - '"un menor"'
  rationale: La forma hebrea es masculina singular y el contexto proverbial mantiene un referente masculino. "Muchacho" conserva esa precisión gramatical y sigue siendo comprensible y publicable en español contemporáneo.
  doctrine_reference: Precisión gramatical y semántica; no neutralizar sin base textual.
translation_notes:
  revision_awareness: El auditor inglés informó una revisión final sin cambios y alta concordancia con el texto fuente. No se detectan revisiones pendientes que alteren esta propuesta; se mantiene la equivalencia óptima con preservación de la imagen concreta y la distinción sapiencial de la "insensatez".
  spanish_consistency_notes:
  - Se usa "vara" para שֵׁבֶט, en línea con la imagen concreta del hebreo.
  - Se mantiene "corazón" como centro interior, no se sustituye por "mente".
  - '"Muchacho" preserva el masculino singular de נָעַר sin sonar excesivamente arcaico.'
  - La nota al pie ofrece la alternativa lexical "atada" para reflejar el matiz de קְשׁוּרָה.
  - No se emplea "Cristo" ni terminología no pertinente al pasaje.
