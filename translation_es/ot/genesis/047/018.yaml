translation:
  language: es
  text: 'Cuando aquel año terminó, vinieron a él en el segundo año y le dijeron: «No lo ocultaremos de mi señor: el dinero se acabó, y el ganado le pertenece a mi señor. Nada queda delante de mi señor, salvo nuestros cuerpos y nuestra tierra».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּתֹּם / תַּם
  english_pob_choice: ended / is gone
  chosen_spanish: terminó / se acabó
  alternatives_spanish:
  - llegó a su fin
  - fue consumido
  lexicon: HALOT
  rationale: The Hebrew uses תמם for completion/exhaustion. En español, «terminó» naturaliza el cierre temporal del año, y «se acabó» conserva la idea de agotamiento para el dinero sin volverla mecánica.
- source_word: הַשָּׁנָה הַהִוא
  english_pob_choice: that year
  chosen_spanish: aquel año
  alternatives_spanish:
  - ese año
  - ese mismo año
  lexicon: HALOT
  rationale: «Aquel año» mantiene la deixis demostrativa del hebreo con un tono bíblico claro y fluido.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - al año siguiente
  - en el año siguiente
  lexicon: HALOT
  rationale: Se conserva la formulación temporal directa del hebreo sin explicitar de más la relación cronológica.
- source_word: לֹא נְכַחֵד
  english_pob_choice: We will not hide it
  chosen_spanish: No lo ocultaremos
  alternatives_spanish:
  - No lo esconderemos
  - No lo disimularemos
  lexicon: HALOT
  rationale: כחד en piel tiene el sentido de ocultar/encubrir. «Ocultar» preserva bien el valor léxico y «lo» retoma el asunto implícito del discurso.
- source_word: מֵאֲדֹנִי
  english_pob_choice: from my lord
  chosen_spanish: de mi señor
  alternatives_spanish:
  - ante mi señor
  - a mi señor
  lexicon: HALOT
  rationale: Se mantiene el singular reverencial del hebreo y el valor de procedencia/relación en la fórmula de deferencia.
- source_word: תַּם הַכֶּסֶף
  english_pob_choice: the money is gone
  chosen_spanish: el dinero se acabó
  alternatives_spanish:
  - la plata se acabó
  - el dinero se agotó
  lexicon: HALOT
  rationale: El hebreo puede aludir a «plata» o «dinero». Aquí «dinero» es más natural en español, y «se acabó» refleja el agotamiento económico. Se evita desplazar sin necesidad el sustantivo a «plata» porque el contexto ya es monetario en sentido amplio.
- source_word: וּמִקְנֵה הַבְּהֵמָה
  english_pob_choice: the livestock of the herds
  chosen_spanish: el ganado de las reses
  alternatives_spanish:
  - el ganado de los rebaños
  - el ganado de las manadas
  lexicon: HALOT
  rationale: מִקְנֶה + הַבְּהֵמָה apunta a las posesiones en animales, en sentido de ganado/cabezas de ganado. «Ganado de las reses» conserva la redundancia semítica de forma comprensible y evita suavizar demasiado el sustantivo.
- source_word: אֶל אֲדֹנִי
  english_pob_choice: belongs to my lord
  chosen_spanish: le pertenece a mi señor
  alternatives_spanish:
  - está en poder de mi señor
  - ha pasado a mi señor
  lexicon: HALOT
  rationale: La preposición אל con el posesivo expresa transferencia/destinación posesiva. «Le pertenece» comunica el resultado posesorio que el POB inglés explicitó.
- source_word: לֹא נִשְׁאַר לִפְנֵי אֲדֹנִי
  english_pob_choice: Nothing is left before my lord
  chosen_spanish: Nada ha quedado delante de mi señor
  alternatives_spanish:
  - Nada queda ante mi señor
  - Nada permanece en presencia de mi señor
  lexicon: HALOT
  rationale: Se mantiene la imagen espacial de לִפְנֵי («delante de») sin sustituirla por una paráfrasis interpretativa. «Ha quedado» reproduce bien el estado resultante.
- source_word: בִּלְתִּי אִם
  english_pob_choice: except
  chosen_spanish: salvo
  alternatives_spanish:
  - excepto
  - a menos que
  lexicon: HALOT
  rationale: «Salvo» funciona como excepción natural en español y preserva la fuerza restrictiva del hebreo.
- source_word: גְּוִיָּתֵנוּ
  english_pob_choice: our bodies
  chosen_spanish: nuestros cuerpos
  alternatives_spanish:
  - nuestras personas
  - nuestros cadáveres
  lexicon: HALOT
  rationale: גְּוִיָּה puede referirse al cuerpo físico, incluso al cadáver, pero aquí la frase contrapone lo que aún queda por entregar en vida. «Nuestros cuerpos» es claro y conserva la materialidad del hebreo. «Personas» sería menos literal.
- source_word: וְאַדְמָתֵנוּ
  english_pob_choice: our land
  chosen_spanish: nuestra tierra
  alternatives_spanish:
  - nuestro suelo
  - nuestra tierra cultivable
  lexicon: HALOT
  rationale: אדמה abarca tierra/suelo/terreno. «Nuestra tierra» es la opción más natural en este contexto de pérdida de propiedad y sustento.
theological_decisions:
- issue: Título deferencial para José
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi amo
  rationale: El hebreo presenta una fórmula de respeto en una súplica formal. «Mi señor» conserva la deferencia sin introducir una relación servil más fuerte de la que exige el texto.
  doctrine_reference: Pragmática del discurso bíblico; deferencia cortesana en el ANE
- issue: Lectura de «gente/cuerpos» como bien restante
  english_pob_reading: our bodies and our land
  chosen_spanish_reading: nuestros cuerpos y nuestra tierra
  alternative_spanish_readings:
  - nuestras personas y nuestra tierra
  - nuestros cuerpos y nuestro campo
  rationale: Se preserva la tensión del hebreo entre la persona viva y el cuerpo como lo último que puede ofrecerse. No se suaviza a una abstracción de «personas» porque el texto enfatiza la materialidad de la entrega final.
  doctrine_reference: Antropología bíblica; semántica de גְּוִיָּה
- issue: Valor económico de כסף
  english_pob_reading: the money is gone
  chosen_spanish_reading: el dinero se acabó
  alternative_spanish_readings:
  - la plata se acabó
  - la plata se agotó
  rationale: Aunque el hebreo puede usar «plata», el contexto inmediato trata del medio de pago disponible. «Dinero» evita una traducción arcaizante y comunica el sentido económico sin perder el trasfondo semántico.
  doctrine_reference: Semántica léxica; uso contextual de כסף
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado del POB inglés en este versículo: mantiene el cierre temporal («When that year ended»), la segunda referencia temporal («in the second year»), la confesión directa de no ocultarlo, la aclaración de que el dinero está agotado, la posesión del ganado por José, y la cláusula final de excepción con «our bodies and our land». No se incorporó nota textual porque el expediente muestra alta concordancia y ninguna variante problemática.'
  spanish_consistency_notes:
  - Se mantuvo «mi señor» como fórmula de respeto estable, consistente con el uso reverencial del hebreo y con la política de no ocultar el nombre divino cuando no aplica aquí.
  - Se prefirió «dinero» sobre «plata» por claridad contextual, aunque se documenta la alternativa léxica en las decisiones.
  - Se evitó «siervo» o vocabulario eclesiástico no pertinente; el versículo trata de negociación económica y deferencia cortesana.
  - «Nuestros cuerpos» conserva la concreción corporal del hebreo y la tensión antropológica sin añadir interpretación doctrinal.
  - La puntuación con dos puntos introduce la explicación, en línea con el valor explicativo del כִּי אִם en el hebreo y del POB inglés.
