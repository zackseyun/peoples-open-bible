id: T12P.LEV.01
reference: Testament of Levi 1
source:
  edition: Charles 1908 Greek Versions (page 92, Levi source-fix v2)
  text: Διαθήκη Λευὶ τοῦ τρίτου υἱοῦ Ἰακὼβ καὶ Λίας¹. I. ᾿Αντίγραφον λόγων² Λευί³, ὅσα διέθετο⁴ τοῖς υἱοῖς αὐτοῦ⁵ κατὰ πάντα ἃ⁶ ποιήσουσιν⁷, καὶ ὅσα συναντήσει αὐτοῖς *ἕως ἡμέρας κρίσεως⁸. 2. Ὑγιαίνων⁹ γὰρ¹⁰ ἦν ὅτε ἐκάλεσεν αὐτοὺς πρὸς ἑαυτόν· *ἀπεκαλύφθη δὲ¹¹ αὐτῷ ὅτι μέλλει ἀποθνήσκειν¹². *Καὶ ὅτε¹³ συνήχθησαν¹⁴, *εἶπεν πρὸς αὐτούς¹⁵.
  language: Greek
  source_pages:
  - 92
translation:
  text: 'A copy of the words of Levi[a], which he ordained for his sons concerning all that they would do, and what would happen to them until the day of judgment.


    For he was in sound health when he called them to himself; but it was revealed to him that he was about to die. And when they had gathered together, he said to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would befall them.' The Greek idiom literally suggests what would 'meet' them in the future.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντίγραφον
  chosen: A copy
  alternatives:
  - A record
  - A transcript
  lexicon: LSJ
  rationale: The term introduces the document as a written copy or record of Levi's words. 'A copy' preserves the testamentary/documentary heading style without overinterpreting the exact archival nuance.
- source_word: λόγων
  chosen: of the words
  alternatives:
  - of the sayings
  - of the speeches
  lexicon: LSJ
  rationale: '''Words'' is the broad and natural rendering in a heading formula and keeps the testament genre''s formal tone.'
- source_word: διέθετο
  chosen: ordained
  alternatives:
  - arranged
  - commanded
  - set forth
  lexicon: LSJ
  rationale: In testamentary context the verb can carry the sense of disposing, arranging, or prescribing. 'Ordained' preserves the solemn force of a patriarch's final dispositions better than the flatter 'said' or merely procedural 'arranged'.
- source_word: κατὰ πάντα ἃ ποιήσουσιν
  chosen: concerning all that they would do
  alternatives:
  - about everything they would do
  - with regard to all the things they would do
  lexicon: LSJ
  rationale: This phrase frames the testament as forward-looking instruction and prediction. 'Concerning all that they would do' is idiomatic while staying close to the Greek structure.
- source_word: συναντήσει αὐτοῖς
  chosen: would happen to them
  alternatives:
  - would meet them
  - would befall them
  lexicon: LSJ
  rationale: The idiom means events that will come upon them. 'Would happen to them' is clear modern English; 'befall' is possible but slightly more archaic.
- source_word: ἕως ἡμέρας κρίσεως
  chosen: until the day of judgment
  alternatives:
  - until judgment day
  lexicon: LSJ
  rationale: This preserves the eschatological phrase in elevated but readable English. 'Day of judgment' is more transparent and less colloquial than 'judgment day.'
- source_word: Ὑγιαίνων
  chosen: in sound health
  alternatives:
  - healthy
  - well
  lexicon: LSJ
  rationale: The participle emphasizes that Levi was not already visibly dying when he summoned them. 'In sound health' preserves that nuance with a slightly elevated register fitting the heading.
- source_word: ἀπεκαλύφθη
  chosen: it was revealed
  alternatives:
  - it was disclosed
  - it was made known
  lexicon: LSJ
  rationale: The passive suggests divine disclosure. 'It was revealed' preserves the revelatory tone common in testament literature.
- source_word: μέλλει ἀποθνήσκειν
  chosen: he was about to die
  alternatives:
  - he was going to die
  - he was soon to die
  lexicon: LSJ
  rationale: This is the straightforward force of the construction and keeps the solemn immediacy.
- source_word: συνήχθησαν
  chosen: they had gathered together
  alternatives:
  - they assembled
  - they were gathered
  lexicon: LSJ
  rationale: The aorist passive/middle here marks the sons' coming together in response to Levi's summons. 'Had gathered together' reads naturally in narrative sequence.
