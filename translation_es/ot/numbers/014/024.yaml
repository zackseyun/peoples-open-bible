translation:
  language: es
  text: Pero mi siervo Caleb[a], porque había con él un espíritu diferente[b] y me siguió plenamente[c], yo lo llevaré a la tierra adonde fue, y su descendencia la poseerá[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo». עֶבֶד puede expresar también «esclavo»; aquí se ha preferido «siervo» por el énfasis relacional y de lealtad en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «otro espíritu estaba con él»; el hebreo puede referirse a una disposición, actitud o espíritu distinto del resto de Israel.
    reason: alternative_reading
  - marker: c
    text: 'Hebraísmo: «me siguió plenamente» refleja literalmente la idea de «llenar detrás de mí», es decir, seguirme de todo corazón o por completo.'
    reason: lexical_alternative
  - marker: d
    text: O «la heredará». El verbo hebreo puede expresar tanto heredar como poseer la tierra prometida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַבְדִּי
  english_pob_choice: But my servant
  chosen_spanish: Pero mi siervo
  alternatives_spanish:
  - Y mi siervo
  - Pero mi esclavo
  lexicon: HALOT
  rationale: Se mantiene el matiz adversativo del contexto con «Pero». עֶבֶד puede ser «siervo» o «esclavo»; aquí «siervo» comunica con naturalidad la relación de lealtad y servicio a Dios, sin forzar el énfasis de estado servil.
- source_word: כָלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio en su forma habitual en español bíblico.
- source_word: עֵקֶב
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce de manera clara la razón de la afirmación divina.
- source_word: הָיְתָה רוּחַ אַחֶרֶת עִמּוֹ
  english_pob_choice: a different spirit was with him
  chosen_spanish: había en él un espíritu diferente
  alternatives_spanish:
  - tenía un espíritu diferente
  - un espíritu distinto estaba con él
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «había ... con él» un espíritu diferente. En español, «había en él» suena más natural y conserva la idea de una disposición/espíritu distinto, sin resolver si se trata del Espíritu Santo o de una actitud interior.
- source_word: וַיְמַלֵּא אַחֲרָי
  english_pob_choice: and he followed me fully
  chosen_spanish: y me siguió plenamente
  alternatives_spanish:
  - y me siguió de todo corazón
  - y me siguió por completo
  lexicon: HALOT
  rationale: El hebreo es idiomático; se vierte con un equivalente natural que preserva la fuerza de seguimiento total y leal. «Plenamente» mantiene la totalidad sin volver opaca la frase.
- source_word: וַהֲבִיאֹתִיו
  english_pob_choice: I will bring him
  chosen_spanish: yo lo llevaré
  alternatives_spanish:
  - yo lo introduciré
  - yo lo haré entrar
  lexicon: HALOT
  rationale: El verbo de movimiento se expresa con un futuro simple natural en español. «Llevaré» es fiel y claro, aunque menos literal que «introduciré».
- source_word: אֶל הָאָרֶץ אֲשֶׁר בָּא שָׁמָּה
  english_pob_choice: into the land where he went
  chosen_spanish: a la tierra donde fue
  alternatives_spanish:
  - a la tierra a la que fue
  - a la tierra donde entró
  lexicon: HALOT
  rationale: 'Se sigue de cerca la revisión inglesa que volvió al sentido más directo del hebreo: una tierra adonde él fue. «Donde fue» mantiene la referencia concreta al lugar al que llegó como explorador, sin sobreinterpretar «entró».'
- source_word: וְזַרְעֹו
  english_pob_choice: and his offspring
  chosen_spanish: y su descendencia
  alternatives_spanish:
  - y su linaje
  - y sus hijos
  lexicon: HALOT
  rationale: זֶרַע puede ser «descendencia», «linaje» o «semilla». «Descendencia» comunica la idea colectiva y promesa familiar de forma natural en español.
- source_word: יוֹרִשֶׁנָּה
  english_pob_choice: will possess it
  chosen_spanish: la poseerá
  alternatives_spanish:
  - la heredará
  - tomará posesión de ella
  lexicon: HALOT
  rationale: En contexto de promesa de tierra, «poseerá» refleja היטב el verbo hebreo en español bíblico actual. «Heredará» es una alternativa válida, pero «poseerá» conserva el énfasis en la posesión efectiva del territorio.
theological_decisions:
- issue: Sentido de «un espíritu diferente» en Caleb
  english_pob_reading: The phrase is left broad, referring to Caleb's distinct inner disposition or attitude of faithful loyalty, without specifying the Holy Spirit as the referent.
  chosen_spanish_reading: La frase queda amplia, referida a una disposición interior o espíritu distinto de fidelidad, sin identificar explícitamente al Espíritu Santo como referente.
  alternative_spanish_readings:
  - una actitud diferente
  - el Espíritu de Dios estaba con él de manera singular
  rationale: רוּחַ puede significar espíritu, disposición o actitud. El texto no identifica explícitamente al Espíritu Santo, por lo que conviene preservar la amplitud semántica en vez de cerrarla doctrinalmente.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefería «where he went» frente a una formulación más interpretativa, y se reflejó en español con «donde fue». También se preservó la amplitud deliberada de «different spirit» sin especificarlo como el Espíritu Santo, conforme al audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino en el texto cuando corresponde al sentido del Tetragrámaton; en este versículo la cita directa está en primera persona, por lo que no aparece de forma explícita.
  - Se prefirió «siervo» y no «esclavo» porque el audit trail inglés documenta esa elección contextual.
  - Se mantuvo «espíritu» en sentido amplio, sin mayúscula, para no resolver la ambigüedad lexical.
  - Se usó «poseerá» para la herencia de la tierra, manteniendo el valor de posesión/patrimonio territorial presente en el hebreo.
