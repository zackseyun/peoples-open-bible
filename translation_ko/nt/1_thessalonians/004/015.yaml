id: 1TH.4.15
reference: 1 Thessalonians 4:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦτο γὰρ ὑμῖν λέγομεν ἐν λόγῳ κυρίου, ὅτι ἡμεῖς οἱ ζῶντες οἱ περιλειπόμενοι εἰς τὴν παρουσίαν τοῦ κυρίου οὐ μὴ φθάσωμεν τοὺς κοιμηθέντας·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/015.yaml
  text: 'For this we say to you by a word from the Lord: that we who are living[a], who remain until the coming of the Lord[c][b], will certainly not precede those who have fallen asleep.'
  footnotes:
  - marker: a
    text: Or 'by the word of the Lord.' The Greek may refer either to a saying from the Lord Jesus or to a revelation given with the Lord's authority.
    reason: alternative_reading
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (Greek παρουσία).
    reason: lexical_alternative
  - marker: c
    text: '''Those who have fallen asleep'' is a metaphor for believers who have died.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 이것을 주의 말씀으로[a] 여러분에게 말합니다. 살아남아 있는 우리, 곧 주의 재림[b] 때까지 남은 자들은 잠든 자들[c]보다 결코 앞서지 못할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주께서 주신 말씀에 따라」. 헬라어는 주 예수의 말씀이나 주의 권위로 주어진 계시 모두를 가리킬 수 있다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 παρουσία는 본래 「임재·도래」를 가리킨다. 본 절은 잠든 자들과 살아남은 자들이 함께 만나는 사건이 명시되어 종말론적 강림(재림)이 본문의 일차적 의미이다.
    reason: lexical_alternative
  - marker: c
    text: 「잠든 자들」은 죽은 신자들에 대한 비유.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν λόγῳ κυρίου
  english_pob_choice: by a word from the Lord
  chosen_korean: 주의 말씀으로
  alternatives_korean:
  - 주의 말씀에 따라
  - 주께서 주신 말씀으로
  lexicon: BDAG
  rationale: 본 구절은 주의 권위 있는 계시·말씀에 근거한 선언임을 분명히 한다.
- source_word: οἱ ζῶντες οἱ περιλειπόμενοι
  english_pob_choice: we who are living, who remain
  chosen_korean: 살아남아 있는 우리, 곧 ... 남은 자들
  alternatives_korean:
  - 살아 있어 남은 자들인 우리
  - 살아 남아 있는 우리
  lexicon: BDAG
  rationale: 두 분사를 「살아 있음 + 남아 있음」으로 풀어 한국어 어순을 자연스럽게 한다.
- source_word: εἰς τὴν παρουσίαν τοῦ κυρίου
  english_pob_choice: until the coming of the Lord
  chosen_korean: 주의 재림 때까지
  alternatives_korean:
  - 주의 임재 때까지
  - 주께서 오실 때까지
  lexicon: BDAG
  rationale: 본 절은 잠든 자들과 살아 남은 자들이 함께 모이는 사건적 정황으로 종말론적 강림이 본문의 일차적 의미이다. 본 번역은 정책에 따라 본 절에서는 「재림」 어휘를 채택해 종말론적 무게를 분명히 살린다. theological_decisions 참조.
- source_word: οὐ μὴ φθάσωμεν τοὺς κοιμηθέντας
  english_pob_choice: will certainly not precede those who have fallen asleep
  chosen_korean: 잠든 자들보다 결코 앞서지 못할 것입니다
  alternatives_korean:
  - 잠든 자들에 앞서지 않을 것입니다
  - 잠든 자들에 결코 먼저 이르지 못할 것입니다
  lexicon: BDAG
  rationale: φθάνω + 대격의 「~보다 먼저 이름」을 「앞서다」로 자연스럽게 옮긴다. οὐ μή 강한 부정을 「결코 ... 못할」로 살린다.
theological_decisions:
- issue: παρουσία의 한국어 선택 — 본 절에서는 「재림」
  chosen_reading: 주의 재림 때까지
  alternative_readings:
  - 주의 임재 때까지
  - 주의 강림 때까지
  - 주께서 오실 때까지
  rationale: 본 절은 잠든 자들과 살아남은 자들이 종말에 함께 모이는 강림 사건을 가리키며, 4:16-17의 강한 종말론적 어휘(나팔 소리, 외침, 채어 올려짐)와 직접 연결된다. 본 번역의 παρουσία 정책은 (1) 종말론적 강림 자체에 초점이 명확한 4:15와 5:23에서는 「재림」을 채택하여 본문의 종말론적 무게를 한국어 독자에게 분명히 전달하고, (2) 인격적 임재의 의미가 우선적인 2:19에서는 「임재」를 보존한다. 이는 본문 어휘의 폭을 좁히는 결정이 아니라, 한국어 독자가 각 문맥의 강조를 분명히 들을 수 있도록 어휘를 선택하는 것이다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary — παρουσία case-by-case; DOCTRINE.md: Render eschatological language faithfully and clearly'
