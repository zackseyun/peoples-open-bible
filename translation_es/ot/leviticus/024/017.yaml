translation:
  language: es
  text: Y si un hombre hiere[a] a cualquier ser humano[b], ciertamente será puesto a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «golpea». Aquí el verbo se entiende como un golpe mortal por el contexto de la pena capital.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «toda vida de un ser humano». La expresión se refiere a una persona humana o vida humana, no a un «alma» inmortal en sentido moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ
  english_pob_choice: And if a man
  chosen_spanish: Y si un hombre
  alternatives_spanish:
  - Y un hombre
  - Si un hombre
  - Y quienquiera
  lexicon: HALOT
  rationale: Se conserva el masculino singular אִישׁ como «un hombre», siguiendo la decisión POB de no neutralizarlo sin base textual. La conjunción inicial וְ se refleja con «Y», y כִּי funciona aquí como condicional, por eso se traduce «si».
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - que
  lexicon: HALOT
  rationale: En este contexto legal casuístico, la partícula introduce una condición, por lo que «si» es la equivalencia natural y precisa.
- source_word: יַכֶּה
  english_pob_choice: strikes down
  chosen_spanish: hiere
  alternatives_spanish:
  - golpea
  - hiere mortalmente
  - mata
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «golpear/herir», y el contexto de pena de muerte muestra que el golpe es letal. «Hiere» conserva la imagen concreta sin sobreinterpretar con «mata», y el adverbio posterior deja claro el resultado jurídico.
- source_word: כָּל נֶפֶשׁ אָדָם
  english_pob_choice: any human being
  chosen_spanish: a cualquier ser humano
  alternatives_spanish:
  - a cualquier persona
  - a todo ser humano
  - a toda persona humana
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa a la persona viviente, no al alma inmaterial; אָדָם marca la referencia humana general. «Ser humano» comunica bien el referente sin perder la fuerza del hebreo legal.
- source_word: מוֹת יוּמָת
  english_pob_choice: he shall surely be put to death
  chosen_spanish: ciertamente será muerto
  alternatives_spanish:
  - seguramente será puesto a muerte
  - morirá sin falta
  - será puesto a muerte
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la sanción. «Ciertamente será muerto» preserva el tono jurídico y la pasiva del hebreo mejor que un giro más interpretativo como «será ejecutado».
theological_decisions:
- issue: Sentido de נֶפֶשׁ en una ley penal
  english_pob_reading: any human being, not specifically an immaterial 'soul'
  chosen_spanish_reading: cualquier ser humano, no un alma inmaterial
  alternative_spanish_readings:
  - cualquier persona
  - cualquier vida humana
  - cualquier alma
  rationale: La POB en inglés evitó «soul» por ser engañoso en inglés moderno. En español, «ser humano» mantiene la referencia a la persona viviente y evita una lectura espiritualizante ajena al contexto legal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — נֶפֶשׁ nephesh'
- issue: Conservación del masculino אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - quienquiera
  rationale: El hebreo usa el singular masculino, y la política POB indicada favorece conservar esa forma cuando el texto la presenta, incluso si la norma tiene alcance representativo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del auditorio inglés, que prefirió «any human being» para כָּל נֶפֶשׁ אָדָם. En español se optó por «ser humano» para mantener ese referente personal y evitar la abstracción de «vida»; también se conservó la imagen verbal concreta de נכה con una nota para el sentido letal. El resto del versículo mantiene el registro jurídico formal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Muerto» conserva la pasiva jurídica breve del hebreo; una alternativa como «puesto a muerte» se reservó en decisiones, pero no se adoptó por fluidez y fuerza legal.
  - Se mantiene «hombre» por la forma masculina singular del hebreo, coherente con el criterio POB documentado.
