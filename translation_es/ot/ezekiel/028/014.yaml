translation:
  language: es
  text: Tú eras un querubín ungido, protector[a], y yo te puse sobre el santo monte de Dios[b]; andabas en medio de piedras de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «querubín ungido que cubre», tradicionalmente «querubín ungido protector» o «querubín ungido cobertor».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo empieza con una forma femenina de «tú», mientras que los verbos y sufijos circundantes son masculinos; el sentido sigue siendo singular.
    reason: textual_variant
lexical_decisions:
- source_word: כְּר֔וּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  lexicon: HALOT
  rationale: En español, «querubín» es el equivalente natural y reconocido para el ser celestial del texto. Mantiene la imagen específica de la criatura del ámbito divino mejor que una paráfrasis general.
- source_word: מִמְשַׁ֖ח
  english_pob_choice: anointed
  chosen_spanish: ungido
  alternatives_spanish:
  - consagrado
  - ungido
  lexicon: HALOT
  rationale: El término se relaciona con unción y consagración. «Ungido» conserva mejor la fuerza lexical y la resonancia ritual que una expresión más abstracta.
- source_word: הַ/סּוֹכֵ֑ךְ
  english_pob_choice: guardian
  chosen_spanish: que cubre
  alternatives_spanish:
  - guardián
  - cubridora
  - protectora
  lexicon: HALOT
  rationale: La raíz sugiere cubrir, sombrear o resguardar. En español, «que cubre» refleja con mayor fidelidad el valor verbal del participio y deja abierta la imagen tradicional de cobertor/overshadowing sin imponer una lectura funcional demasiado interpretativa como «guardián».
- source_word: וּ/נְתַתִּ֗י/ךָ
  english_pob_choice: and I placed you
  chosen_spanish: y yo te puse
  alternatives_spanish:
  - y te coloqué
  - y te establecí
  lexicon: HALOT
  rationale: נתן en este contexto locativo se expresa naturalmente con «poner». Conserva el gesto de asignación o ubicación sobre el monte sin añadir matices que el hebreo no exige.
- source_word: בְּ/הַ֨ר קֹ֤דֶשׁ אֱלֹהִים֙
  english_pob_choice: on the holy mountain of God
  chosen_spanish: sobre el santo monte de Dios
  alternatives_spanish:
  - en el santo monte de Dios
  - sobre el monte santo de Dios
  lexicon: HALOT
  rationale: «Sobre» refleja bien la preposición locativa y la elevación imaginada. «Santo monte de Dios» conserva el orden hebraizante del sintagma y su solemnidad, mientras que «de Dios» mantiene el genitivo sin sustituirlo por una fórmula más eclesiástica.
- source_word: הָיִ֔יתָ
  english_pob_choice: you were
  chosen_spanish: eras
  alternatives_spanish:
  - fuiste
  - habías sido
  lexicon: HALOT
  rationale: El imperfecto/pasado descriptivo se rinde de forma más natural con «eras» en español, dentro de una descripción continua del estado y la ubicación del destinatario.
- source_word: בְּ/ת֥וֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - entre
  lexicon: HALOT
  rationale: «En medio de» preserva la imagen espacial vívida del hebreo y es la forma idiomática más clara en español.
- source_word: אַבְנֵי אֵ֖שׁ
  english_pob_choice: stones of fire
  chosen_spanish: piedras de fuego
  alternatives_spanish:
  - piedras ígneas
  - piedras ardientes
  lexicon: HALOT
  rationale: La expresión es deliberadamente extraña e imagética; «piedras de fuego» mantiene esa tensión sin suavizarla. Se evita «ígneas» por resultar más literario y menos transparente para lectura pública.
- source_word: הִתְהַלָּֽכְתָּ
  english_pob_choice: you walked
  chosen_spanish: andabas
  alternatives_spanish:
  - caminabas
  - ibas y venías
  lexicon: HALOT
  rationale: El hitpael puede sugerir andar de un lado a otro o caminar habitualmente. «Andabas» comunica el movimiento continuo con fluidez natural en español y conserva la imagen poética sin sobreespecificar repetición.
- source_word: אַ֨תְּ
  english_pob_choice: you
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú
  lexicon: HALOT
  rationale: Se conserva la referencia singular directa. La forma hebrea femenina inicial se trata como rasgo textual/ortográfico, no como cambio de referente, siguiendo el audit trail inglés.
theological_decisions:
- issue: Identidad del destinatario en la lamentación sobre Tiro
  english_pob_reading: Retain the exalted cherubic imagery without resolving whether it refers only metaphorically to the king of Tyre, to an Edenic/primal figure, or typologically beyond him.
  chosen_spanish_reading: Mantener la imaginería querúbica exaltada sin decidir si se refiere solo de modo metafórico al rey de Tiro, a una figura edénica/primal o tipológicamente más allá de él.
  alternative_spanish_readings:
  - Interpretarlo solo como metáfora real del rey de Tiro
  - Entenderlo como referencia exclusiva a un ser sobrenatural
  - Leerlo como una referencia tipológica explícita
  rationale: El hebreo emplea lenguaje sacro y elevado que permite más de una lectura. La traducción no debe cerrar una tensión teológica que el texto no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión sin cambios sustanciales: se conserva la imagen querúbica elevada, la localización sobre el monte santo y la expresión poética de las piedras de fuego, con atención a la variación de género en la forma pronominal inicial.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se sustituye por una fórmula reverencial distinta.
  - Se usa «querubín» como término técnico estable en lugar de una paráfrasis general.
  - Se conserva la tensión lexicográfica de סכך con una traducción verbal («que cubre») y una nota alternativa.
  - No se resuelve en la traducción principal la ambigüedad teológica sobre la identidad del destinatario.
