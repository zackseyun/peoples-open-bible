translation:
  language: es
  text: No hables para que lo oiga un necio[a], porque menospreciará la sabiduría[b] de tus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «en los oídos de un necio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el buen juicio»; el término hebreo puede abarcar sabiduría, discernimiento o sensatez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: al oído de
  alternatives_spanish:
  - en el oído de
  - en la escucha de
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'en los oídos de', un giro idiomático para hablar de modo que alguien oiga. En español, 'al oído de' conserva la imagen auditiva y suena natural en una advertencia proverbial.
- source_word: כְסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un tonto
  - un insensato
  lexicon: HALOT
  rationale: En Proverbios, כְסִיל designa una persona moralmente obtusa y resistente a la instrucción, no solo alguien con poca inteligencia. 'Necio' mantiene ese tono sapiencial y es más preciso que una simple referencia a torpeza mental.
- source_word: תְּדַבֵּר
  english_pob_choice: speak
  chosen_spanish: hables
  alternatives_spanish:
  - hables
  - digas
  lexicon: HALOT
  rationale: El verbo es el común 'hablar'. En español, la forma prohibitiva natural es 'No hables', que preserva la concisión del proverbio.
- source_word: יָבוּז
  english_pob_choice: he will despise
  chosen_spanish: menospreciará
  alternatives_spanish:
  - despreciará
  - hará caso omiso de
  lexicon: HALOT
  rationale: El verbo expresa desprecio despectivo. 'Menospreciará' comunica bien la valoración negativa y evita un tono demasiado coloquial.
- source_word: לְ/שֵׂכֶל
  english_pob_choice: the wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - el buen juicio
  - la prudencia
  - el sentido
  lexicon: HALOT
  rationale: Aunque שֵׂכֶל puede significar 'entendimiento', 'discernimiento' o 'buen juicio', el propio audit trail inglés revisó la opción hacia 'wisdom' por naturalidad y solemnidad. 'Sabiduría' conserva el peso sapiencial del proverbio sin forzar una glosa explicativa.
- source_word: מִלֶּיךָ
  english_pob_choice: of your words
  chosen_spanish: de tus palabras
  alternatives_spanish:
  - de tus dichos
  - de lo que dices
  lexicon: HALOT
  rationale: 'El sustantivo es plural y concreto: ''words/sayings''. ''Tus palabras'' mantiene la correspondencia directa y suena idiomático en español.'
translation_notes:
  revision_awareness: 'El contexto inglés revisó ''insight'' a ''wisdom'' para שֵׂכֶל; la versión española sigue esa revisión y mantiene el paralelismo proverbial con un término de sabiduría comprensible y formal. La puntuación y el orden responden al hebreo breve: prohibición + razón.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o cualquier sustitución teológica no presente en el texto.
  - '''Necio'' conserva el valor sapiencial tradicional de כְסִיל sin volverlo meramente insultante.'
  - '''Sabiduría'' se eligió como equivalente amplio de שֵׂכֶל en este contexto, en línea con la revisión del audit trail inglés.'
