translation:
  language: es
  text: ¿Se avergonzaron porque habían hecho una abominación? No, no se avergonzaron en absoluto; ni siquiera supieron sonrojarse. Por tanto, caerán entre los caídos; en el tiempo de su castigo[a] tropezarán, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el tiempo de su visitación». El hebreo puede indicar un momento en que Dios visita a las personas para juzgarlas o pedirles cuentas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִשׁוּ
  english_pob_choice: Were they ashamed
  chosen_spanish: ¿Se avergonzaron
  alternatives_spanish:
  - ¿Fueron avergonzados
  - ¿Sintieron vergüenza
  lexicon: HALOT
  rationale: El hebreo abre con una pregunta retórica de vergüenza/honor; el español natural es una interrogación con verbo pronominal. «Avergonzaron» conserva el campo semántico de בוש sin volverlo pasivo de manera innecesaria.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - cuando
  lexicon: HALOT
  rationale: 'La relación causal es la más directa en el contexto profético: la vergüenza sería esperable a causa de la abominación cometida.'
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo aborrecible
  lexicon: HALOT
  rationale: «Abominación» mantiene la fuerza moral-religiosa del término hebreo y coincide con el registro profético del juicio divino.
- source_word: עָשׂוּ
  english_pob_choice: they had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - habían cometido
  - hicieron
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien el valor de acción previa que fundamenta la pregunta retórica.
- source_word: גַּם בּוֹשׁ לֹא יֵבֹשׁוּ
  english_pob_choice: No, they were not ashamed at all
  chosen_spanish: No, no se avergonzaron en absoluto
  alternatives_spanish:
  - Ni aun se avergonzaron
  - De ningún modo se avergonzaron
  lexicon: HALOT
  rationale: La construcción intensiva se vierte con una negación enfática y «en absoluto», que reproduce la contundencia del hebreo sin sonar forzado.
- source_word: וְהִכָּלֵם
  english_pob_choice: to blush
  chosen_spanish: sonrojarse
  alternatives_spanish:
  - ruborizarse
  - sentir vergüenza
  lexicon: HALOT
  rationale: «Sonrojarse» expresa la señal visible de vergüenza y conserva la imagen corporal del original; en español moderno es más natural que una glosa más abstracta.
- source_word: לֹא יָדָעוּ
  english_pob_choice: they did not even know
  chosen_spanish: ni siquiera supieron
  alternatives_spanish:
  - ni siquiera conocieron
  - no sabían
  lexicon: HALOT
  rationale: «Saber» mantiene la idea de incapacidad moral/práctica, y el adverbio «ni siquiera» recoge la intensificación del contexto.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Conector inferencial formal y claro para introducir la consecuencia judicial.
- source_word: יִפְּל֣וּ בַ/נֹּפְלִ֗ים
  english_pob_choice: they will fall among the fallen
  chosen_spanish: caerán entre los que caen
  alternatives_spanish:
  - caerán con los caídos
  - caerán entre los caídos
  lexicon: HALOT
  rationale: Se conserva la duplicación hebrea con una formulación española idiomática que mantiene el juego entre «caer» y «los que caen».
- source_word: בְּ/עֵ֧ת פְּקֻדָּתָ֛/ם
  english_pob_choice: at the time of their punishment
  chosen_spanish: en el tiempo de su castigo
  alternatives_spanish:
  - en el tiempo de su visitación
  - cuando llegue el tiempo de su rendición de cuentas
  lexicon: HALOT
  rationale: «Castigo» explicita el sentido judicial en este contexto profético. Se conserva la alternativa de «visitación» en nota porque el hebreo permite un matiz de visita divina para juicio o rendición de cuentas.
- source_word: יִכָּשְׁל֖וּ
  english_pob_choice: they will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - vacilarán
  - caerán
  lexicon: HALOT
  rationale: «Tropezar» conserva la metáfora física del hebreo para el fracaso y juicio; en español suena natural junto a «caerán».
- source_word: אָמַ֥ר יְהוָֽה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - ha dicho Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme al criterio del proyecto, y la fórmula profética en presente es la más idiomática.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete fuente y la política del proyecto favorecen la transliteración del nombre del pacto en lugar de una sustitución reverencial. «Yahvé» es la forma establecida en el texto español del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: פקד como juicio/visita
  english_pob_reading: at the time of their punishment
  chosen_spanish_reading: en el tiempo de su castigo
  alternative_spanish_readings:
  - en el tiempo de su visitación
  - en el tiempo en que serán llamados a cuentas
  rationale: En este contexto de denuncia profética, la referencia es al momento en que Dios interviene para juzgar. «Castigo» comunica el sentido principal sin borrar que el hebreo puede incluir la idea de visita o rendición de cuentas; por eso se documenta la alternativa.
  doctrine_reference: Uso contextual de פקד en literatura profética y de juicio
translation_notes:
  revision_awareness: Se siguió el último pase revisado (sin cambios sustantivos) y se mantuvo el alto grado de acuerdo del control cruzado. La única decisión explícita de versión española fue hacer audible la alternativa de פקדה con una nota, preservando el sentido judicial principal en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo el paralelismo verbal de vergüenza con «avergonzaron / sonrojarse» para conservar la doble expresión hebrea.
  - «Abominación» se conservó como término profético fuerte y estable, sin suavizarlo.
  - La secuencia «caerán... tropezarán» reproduce el encadenamiento de juicio final con metáfora física.
  - No se introdujo lenguaje eclesiástico tradicional ajeno al hebreo; el registro es bíblico moderno y auditable.
