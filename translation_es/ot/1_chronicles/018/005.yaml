review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB en casi todo: conserva «Aram de Damasco», «ayudar», «Hadadezer», «rey de Zobá» y «veintidós mil hombres de Aram». También mantiene correctamente las dos notas del inglés, con anclajes presentes en el texto. El único desajuste significativo está en וַיַּךְ: «derribó» no refleja bien el valor militar de נכה cuando va seguido de una cifra de bajas; suena demasiado físico/individual y menos idiomático que una opción como «hirió de muerte» o «abatió».'
  spanish_quality_summary: El español es claro y legible, con registro digno. Sin embargo, «David derribó a veintidós mil hombres de Aram» suena poco natural en este contexto bélico y puede sugerir simplemente tumbarlos, no necesariamente darles muerte o infligir la derrota letal que la cifra implica. «Abatió» es más natural y preciso en español bíblico moderno sin sobreinterpretar. El resto del verso fluye bien.
  glossary_alignment: 'La terminología del proyecto está bien respetada en este caso: no hay nombres divinos ni términos teológicos sensibles; «Aram» en vez de «Siria» concuerda con la decisión léxica auditada; «Hadadezer» conserva la forma de Crónicas. No hay conflictos con el glosario principal.'
  issues:
  - severity: medium
    issue: «derribó» para וַיַּךְ en contexto de bajas militares
    rationale: Aunque intenta conservar cautela semántica, «derribó» en español moderno no es la mejor equivalencia para una acción bélica seguida por un número de hombres afectados. «Abatió» preserva la violencia militar y encaja mejor con una cifra de víctimas sin añadir más de lo que dice el hebreo.
  revised_spanish_text: Y Aram de Damasco[b][a] vino a ayudar a Hadadezer, rey de Zobá, y David abatió a veintidós mil hombres de Aram.
