translation:
  language: es
  text: Por tanto[a], he aquí, he extendido mi mano contra ti, y te daré como botín a las naciones. Te eliminaré de entre los pueblos y te destruiré de las tierras; te aniquilaré, y sabrás que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por despojo» o «como botín para las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la consecuencia judicial del oráculo anterior; «por tanto» conserva el valor inferencial y el tono profético solemne.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - observa
  lexicon: HALOT
  rationale: Mantiene la deixis profética de anuncio enfático sin volver la frase coloquial.
- source_word: נָטִיתִי אֶת יָדִי עָלֶיךָ
  english_pob_choice: I have stretched out my hand against you
  chosen_spanish: he extendido mi mano contra ti
  alternatives_spanish:
  - he alargado mi mano contra ti
  - he tendido mi mano contra ti
  lexicon: HALOT
  rationale: Conserva el modismo de juicio divino y el sentido de acción punitiva directa; «contra ti» expresa היטב la dirección hostil del hebreo.
- source_word: וּנְתַתִּיךָ לְבַג לַגּוֹיִם
  english_pob_choice: I will give you as plunder to the nations
  chosen_spanish: te daré como botín a las naciones
  alternatives_spanish:
  - te entregaré como saqueo a las naciones
  - te pondré como presa para las naciones
  lexicon: HALOT
  rationale: «Botín» comunica naturalmente la noción de despojo militar; se conserva la referencia a las naciones como agentes del saqueo.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto de juicio se refiere a naciones extranjeras; se evita «gentiles» por su carga eclesiástica posterior.
- source_word: וְהִכְרַתִּיךָ מִן־הָעַמִּים
  english_pob_choice: I will cut you off from the peoples
  chosen_spanish: te cortaré de entre los pueblos
  alternatives_spanish:
  - te eliminaré de entre los pueblos
  - te extirparé de entre los pueblos
  lexicon: HALOT
  rationale: «Cortar» conserva la fuerza del verbo כרת y la fórmula de expulsión/exterminio; «de entre» refleja היטב la preposición de separación.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las gentes
  lexicon: HALOT
  rationale: Se distingue de גּוֹיִם para preservar la variación léxica del hebreo y el matiz colectivo de grupos humanos.
- source_word: וְהַאֲבַדְתִּיךָ מִן־הָאֲרָצוֹת
  english_pob_choice: destroy you from the lands
  chosen_spanish: te destruiré de entre las tierras
  alternatives_spanish:
  - te haré perecer de entre las tierras
  - te haré desaparecer de las tierras
  lexicon: HALOT
  rationale: El hebreo usa el plural «tierras»/territorios; «de entre» conserva el movimiento de eliminación desde esos espacios.
- source_word: הָאֲרָצוֹת
  english_pob_choice: the lands
  chosen_spanish: las tierras
  alternatives_spanish:
  - los territorios
  - los países
  lexicon: HALOT
  rationale: «Tierras» es fiel al plural hebreo y funciona de manera natural en español sin reducirlo a «países».
- source_word: אַשְׁמִידְךָ
  english_pob_choice: I will annihilate you
  chosen_spanish: te aniquilaré
  alternatives_spanish:
  - te exterminaré
  - te destruiré por completo
  lexicon: HALOT
  rationale: «Aniquilar» reproduce la intensificación final de שׁמד después de los verbos previos de destrucción.
- source_word: וְיָדַעְתָּ כִּי אֲנִי יְהוָה
  english_pob_choice: and you will know that I am Yahweh
  chosen_spanish: y sabrás que yo soy Yahvé
  alternatives_spanish:
  - y conocerás que yo soy Yahvé
  - y sabrás que yo soy el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva la fórmula de reconocimiento de Ezequiel y el nombre divino según el estándar del proyecto: «Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo contiene el Tetragrámaton; se traduce con la forma prevista por el proyecto para mantener el nombre propio del pacto.
theological_decisions:
- issue: Fórmula de reconocimiento profético final
  english_pob_reading: and you will know that I am Yahweh
  chosen_spanish_reading: y sabrás que yo soy Yahvé
  alternative_spanish_readings:
  - y conocerás que yo soy Yahvé
  - y reconocerás que yo soy Yahvé
  rationale: 'En Ezequiel esta cláusula funciona como sello teológico del juicio: la acción punitiva revela la identidad de Yahvé. «Sabrás» conserva el valor epistemológico y judicial de la fórmula.'
  doctrine_reference: Ezequiel 25:7; fórmula recurrente de reconocimiento en Ezequiel
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, evitando la sustitución reverencial por un título y manteniendo la identidad del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: The English audit trail reports high agreement and no applied revisions; this Spanish draft therefore aligns closely with the source packet and the finalized English lexical decisions, while preserving the project’s mandated rendering of the divine name as Yahvé.
  spanish_consistency_notes:
  - Se mantuvo la variación léxica entre «naciones» y «pueblos» para reflejar גּוֹיִם / עַמִּים.
  - Se usó «tierras» para el plural hebreo אֲרָצוֹת, evitando singularizar el alcance territorial.
  - El verbo final «aniquilaré» preserva la intensificación de שׁמד después de varios verbos de destrucción.
  - La nota al pie queda anclada en «Por tanto[a]» para la alternativa de sentido de la primera cláusula inferencial.
