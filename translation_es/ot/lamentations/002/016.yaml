base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/016.yaml
  text: All your enemies open their mouths against you[a]; they hiss and gnash their teeth. They say, “We have swallowed you up! Surely this is the day we hoped for; we have found it[b], we have seen it.”
  footnotes:
  - marker: a
    text: Hebrew 'hiss'; the verb can also be rendered 'whistle,' but here it expresses derision from enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'We have devoured her.' Hebrew 'swallowed her up' is a vivid metaphor for total destruction.
    reason: lexical_alternative
