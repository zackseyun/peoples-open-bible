revisions:
- from: Pues había entrado en la llamada Persépolis, y había intentado saquear el templo[a] y tomar control de la ciudad; por eso, cuando las multitudes se lanzaron, acudieron a la defensa de las armas[b], y ocurrió que Antioquio, puesto en fuga por los habitantes del lugar, hizo una retirada vergonzosa.
  to: Pues había entrado en la llamada Persépolis, e intentó saquear el templo[a] y apoderarse de la ciudad; por eso, cuando las multitudes se lanzaron, recurrieron a la defensa armada[b], y sucedió que Antíoco, puesto en fuga por los habitantes del lugar, hizo una retirada vergonzosa.
  rationale: Se revisa para hacer el español más natural y fiel al sentido del griego sin perder el rastro lexical del POB. «Apoderarse de la ciudad» expresa mejor el dominio buscado. «Recurrieron a la defensa armada» comunica con claridad el recurso a las armas y evita un calco confuso. También se aligera la secuencia verbal con «e intentó», manteniendo la anterioridad principal en «había entrado».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:03:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia principal del griego: entrada previa en Persépolis, intento de saquear el templo, intento de dominar la ciudad, reacción de la población, derrota de Antíoco y retirada deshonrosa. Sin embargo, presenta dos desajustes importantes de expresión: «tomar control de» suena calcado y menos idiomático que una opción española natural para συνέχειν en contexto político-militar; y sobre todo «acudieron a la defensa de las armas» no representa bien ἐπὶ τὴν τῶν ὅπλων βοήθειαν ἐτράπησαν en español, donde la frase resulta poco natural y oscurece el sentido de recurrir a la defensa armada.'
  spanish_quality_summary: 'El texto es mayormente legible, pero tiene anglicismos o giros poco naturales para español bíblico moderno: «tomar control de» y especialmente «defensa de las armas». También conviene simplificar el tiempo verbal con «intentó» tras «había entrado», ya que el griego no exige dos pluscuamperfectos seguidos en español. El resto —«la llamada Persépolis», «puesto en fuga», «retirada vergonzosa»— es adecuado y digno.'
  glossary_alignment: No hay términos del glosario mayor con conflicto directo. La decisión cultual para ἱεροσυλεῖν como «saquear el templo» es aceptable, y la nota alternativa preserva bien el matiz sacrílego. No hay cuestiones teológicas mayores ni nombres divinos/títulos mesiánicos en juego.
  issues:
  - severity: medium
    issue: «acudieron a la defensa de las armas» es español poco natural y semánticamente torpe
    rationale: El griego indica que recurrieron a la ayuda de las armas, es decir, a la defensa armada. La formulación actual suena calcada y puede entenderse como defender las armas mismas, no valerse de ellas para defenderse.
  - severity: medium
    issue: «tomar control de la ciudad» suena calco del inglés
    rationale: Aunque comprensible, en español bíblico y narrativo resulta más natural «apoderarse de la ciudad» o «adueñarse de la ciudad», lo que además refleja bien el valor de συνέχειν en contexto de dominio militar-político.
  - severity: low
    issue: «había intentado» después de «había entrado» recarga innecesariamente la frase
    rationale: El griego marca claramente la anterioridad de la entrada con pluscuamperfecto, pero ἐπεχείρησεν es aoristo. En español, «había entrado ... e intentó» fluye mejor y preserva la relación temporal.
  revised_spanish_text: Pues había entrado en la llamada Persépolis, e intentó saquear el templo[a] y apoderarse de la ciudad; por eso, cuando las multitudes se lanzaron, recurrieron a la defensa armada[b], y sucedió que Antíoco, puesto en fuga por los habitantes del lugar, hizo una retirada vergonzosa.
  revised_footnotes:
