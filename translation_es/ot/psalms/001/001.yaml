    text: O «burladores».
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el buen núcleo del borrador pero corrige dos puntos para acercarlo más al hebreo y al expediente POB: «está» refleja mejor עָמָד dentro de la secuencia andar/estar/sentarse, y «asiento» mejora la naturalidad y precisión de מוֹשָׁב frente a «silla». También se añaden las alternativas léxicas auditadas para la beatitud inicial y para «escarnecedores».'
