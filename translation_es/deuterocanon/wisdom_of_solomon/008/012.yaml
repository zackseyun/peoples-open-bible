translation:
  language: es
  text: Cuando estoy en silencio[a], me esperarán; y cuando hablo, prestarán atención; y cuando hablo más largamente, se pondrán la mano sobre la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El gesto de ponerse la mano sobre la boca indica silencio contenido, reserva respetuosa o asombro reverente ante el hablante.
    reason: cultural_note
lexical_decisions:
- source_word: σιγῶντά
  english_pob_choice: when I am silent
  chosen_spanish: Cuando estoy en silencio
  alternatives_spanish:
  - mientras estoy en silencio
  - estando en silencio
  lexicon: LSJ
  rationale: El participio presente con με funciona de manera adverbial y temporal; en español, «cuando estoy en silencio» comunica con naturalidad la situación sin volverla demasiado mecánica.
- source_word: περιμενοῦσιν
  english_pob_choice: they will wait for me
  chosen_spanish: me esperarán
  alternatives_spanish:
  - esperarán por mí
  - me aguardarán
  lexicon: LSJ
  rationale: El verbo expresa esperar/aguardar a alguien; «me esperarán» es directo y idiomático en español, conservando la idea de expectativa respetuosa.
- source_word: φθεγγομένῳ
  english_pob_choice: when I speak
  chosen_spanish: cuando hablo
  alternatives_spanish:
  - cuando pronuncio palabra
  - cuando digo algo
  lexicon: LSJ
  rationale: El dativo participial de φθέγγομαι aquí paraleliza el acto de hablar; «cuando hablo» reproduce el sentido sin una expresión más marcada que sería menos natural.
- source_word: προσέξουσιν
  english_pob_choice: they will pay attention
  chosen_spanish: prestarán atención
  alternatives_spanish:
  - me atenderán
  - me escucharán con atención
  - harán caso
  lexicon: LSJ
  rationale: La idea es de atención cuidadosa o considerar con atención; «prestarán atención» conserva el matiz de escucharlo/heed with care de manera clara.
- source_word: λαλοῦντος ἐπὶ πλεῖον
  english_pob_choice: when I speak at greater length
  chosen_spanish: cuando hablo con mayor extensión
  alternatives_spanish:
  - cuando hablo más
  - cuando sigo hablando
  - cuando hablo más ampliamente
  lexicon: LSJ
  rationale: La construcción indica hablar más o por más tiempo, sin valor condicional. «Con mayor extensión» mantiene el aumento cuantitativo del discurso y evita un giro condicional.
- source_word: χεῖρα ἐπιθήσουσιν ἐπὶ στόμα αὐτῶν
  english_pob_choice: they will lay a hand on their mouth
  chosen_spanish: pondrán la mano sobre su boca
  alternatives_spanish:
  - se llevarán la mano a la boca
  - se pondrán la mano sobre la boca
  lexicon: LSJ
  rationale: La singular χεῖρα se vierte naturalmente como «la mano»; la expresión conserva el gesto convencional de silencio o respeto reverente sin perder la cercanía al griego.
translation_notes:
  revision_awareness: La base inglesa fue revisada para reflejar más de cerca la construcción participial de λαλοῦντος ἐπὶ πλεῖον, evitando el matiz condicional de una versión anterior. La traducción española sigue esa lectura revisada con una formulación temporal y no condicional.
  spanish_consistency_notes:
  - Se mantiene «hablar» para φθέγγομαι/λαλέω según el paralelismo del versículo, evitando una sobretraducción estilística.
  - Se conserva el gesto culturalmente marcado de la mano sobre la boca para no diluir la imagen corporal del texto griego.
  - El texto es de tono formal pero natural, apto para lectura pública y estudio.
