revisions:
- from: Y ahora, en cuanto al asunto que Achior habló en tu consejo, hemos oído sus palabras, porque los hombres de Betulia lo[a] preservaron, y él les informó de todo lo que había hablado ante ti[b].
  to: Y ahora, en cuanto al asunto que Ajor habló en tu consejo, hemos oído sus palabras, porque los hombres de Betulia le perdonaron la vida[a], y él les informó de todo lo que había hablado en tu presencia[b].
  rationale: Se ajustó 'Achior' a 'Ajor' por naturalidad en español bíblico; se reemplazó 'lo preservaron' por 'le perdonaron la vida' para reflejar mejor el sentido contextual de περιεποίησαντο en español idiomático; y se hizo explícito 'en tu presencia' en la cláusula final, en línea con la explicación léxica ya documentada.
