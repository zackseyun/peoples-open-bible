- from: Entonces Judas ordenó a hombres que pelearan contra los que estaban en la ciudadela[a], hasta que hubiera purificado el santuario.
  to: Entonces Judas ordenó a unos hombres combatir a los que estaban en la ciudadela[a], hasta que hubiera purificado el santuario.
  rationale: Se ajusta la sintaxis para un español más natural y digno sin perder la literalidad esencial del griego ni la decisión léxica del POB. «A unos hombres combatir» preserva ἀνδράσιν sin sobredeterminar «soldados» y evita un calco torpe; «combatir» refleja bien πολεμεῖν. Se conserva la nota histórica sobre «Acra».
