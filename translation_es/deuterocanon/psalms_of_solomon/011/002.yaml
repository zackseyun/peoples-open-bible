    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en su visitación». El contexto favorece una visitación misericordiosa de Dios hacia Israel.
    reason: theological_note
  revision_rationale: 'Se cambia «visita» por «visitación» para conservar mejor el sustantivo griego ἐπισκοπή y su resonancia de intervención misericordiosa divina, en línea con la auditoría inglesa. Se simplifican y precisan las notas: la nota a mantiene la alternativa documentada para φωνή/εὐαγγελιζομένου; la nota b preserva las alternativas léxicas del inglés; la nota c aclara la fuerza contextual sin introducir una formulación equívoca sobre quién visita a quién.'
