translation:
  language: es
  text: 'Y dije en mi corazón: «Como le sucede al necio, así me sucederá también a mí. ¿Por qué, entonces, fui más sabio?». Y dije en mi corazón que también esto es vanidad[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vapor» o «aliento»; el hebreo הָבֶל es el término recurrente de Eclesiastés para lo que es pasajero, elusivo o frustrante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתִּי
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y me dije
  lexicon: HALOT
  rationale: La waw narrativa y el qatal expresan continuación del discurso; «Y dije» conserva el flujo hebreo de manera natural en español.
- source_word: בְּלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - para mí
  - dentro de mí
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para reflexión interior. «En mi corazón» mantiene la imaginería antropológica y el registro bíblico sin sonar forzado.
- source_word: כְּמִקְרֵה
  english_pob_choice: As happens
  chosen_spanish: Como le sucede
  alternatives_spanish:
  - Según le acontece
  - Como le ocurre
  lexicon: HALOT
  rationale: מִקְרֶה puede ser acontecimiento o lo que sobreviene. «Como le sucede» comunica la comparación de forma idiomática y sin cargar la frase con una lectura filosófica más fuerte de la necesaria.
- source_word: הַכְּסִיל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: En literatura sapiencial el término designa al que es moral e intelectualmente insensato. «Necio» es una equivalencia bíblica fiel y clara en español.
- source_word: גַּם אֲנִי יִקְרֵנִי
  english_pob_choice: so it will happen to me also
  chosen_spanish: así me sucederá también a mí
  alternatives_spanish:
  - también me ocurrirá
  - también me acontecerá
  lexicon: HALOT
  rationale: קָרָה expresa «suceder/acontecer/befallar». El futuro español refleja el imperfecto hebreo y mantiene clara la comparación con el necio.
- source_word: וְלָמָּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué, pues,
  lexicon: HALOT
  rationale: La partícula introduce una inferencia retórica. «Entonces» preserva el valor conclusivo que el audit trail señala en inglés.
- source_word: חָכַמְתִּי ... יוֹתֵר
  english_pob_choice: was I more wise
  chosen_spanish: fui más sabio
  alternatives_spanish:
  - era más sabio
  - resulté más sabio
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto se entiende como estado/resultado en la reflexión retórica. «Fui más sabio» evita insinuar un proceso de «hacerme» sabio que el texto no explicita.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese caso
  - por eso
  lexicon: HALOT
  rationale: Funciona de modo inferencial en la pregunta retórica; «entonces» lo expresa de forma directa en español.
- source_word: וְדִבַּרְתִּי
  english_pob_choice: And I said
  chosen_spanish: Y hablé
  alternatives_spanish:
  - Y dije
  - Y me expresé
  lexicon: HALOT
  rationale: El verbo es דבר, «hablar». Se conserva su valor léxico con «hablé», aunque el contexto interno hace que el inglés use «said». En español esto evita perder el matiz verbal del hebreo.
- source_word: שֶׁגַּם זֶה
  english_pob_choice: that this too
  chosen_spanish: que también esto
  alternatives_spanish:
  - que esto también
  - que incluso esto
  lexicon: HALOT
  rationale: La combinación שֶׁ + גַּם + זֶה introduce el contenido del juicio interior. «También esto» preserva la adición de גַּם.
- source_word: הָבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - aliento
  - futilidad
  lexicon: HALOT
  rationale: Se conserva el término tradicional del libro en español, que en Eclesiastés mantiene el alcance semántico de fugacidad, elusividad y frustración. No se reduce a «inutilidad» ni se sustituye por una sola metáfora física.
theological_decisions:
- issue: Traducción de הָבֶל en Eclesiastés
  english_pob_reading: vanity
  chosen_spanish_reading: vanidad
  alternative_spanish_readings:
  - vapor
  - aliento
  - futilidad
  - vaciedad
  rationale: El término es literariamente central y no doctrinalmente controvertido aquí. «Vanidad» conserva la resonancia temática clásica del libro y evita estrechar el campo semántico a una sola idea moderna.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la revisión auditada del inglés POB. En particular, se mantiene la corrección de la pregunta retórica como «fui más sabio» para reflejar mejor el perfecto hebreo en contexto, y se conserva «vanidad» con nota léxica alternativa, como hace el registro inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Se mantiene «necio» para הַכְּסִיל, en coherencia con la terminología sapiencial del proyecto.
  - Se conserva el registro bíblico natural de «en mi corazón» para la reflexión interior.
  - No se introduce paráfrasis explicativa adicional más allá de lo que el hebreo y el audit trail sostienen.
