revisions:
- from: los que dominan en sus reinos, y hombres ilustres por su poder; consejeros en su entendimiento[a], y videntes de todo en su profecía[b].
  to: gobernantes de la tierra en sus reinos[a], y hombres renombrados por su poder; consejeros en su entendimiento, y videntes de todo en su profecía[b].
  rationale: La revisión restaura el elemento 'de la tierra' exigido por la decisión textual documentada, mejora la naturalidad española con 'gobernantes', alinea la primera nota con el expediente inglés, y conserva el resto del versículo con fidelidad al hebreo y al apoyo griego.
  reviewer_model: gpt-5.4
