base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/009.yaml
  text: Is my inheritance to me a speckled bird of prey? Are the birds of prey against her all around? Go[a], gather all the beasts of the field[b]; bring them to devour.
  footnotes:
  - marker: a
    text: Or 'hyena.' Some interpreters take the repeated Hebrew word עַיִט here in connection with a predator such as a hyena, yielding a sense like 'Is my inheritance to me like a speckled hyena?' The main text follows the more common sense 'bird of prey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'Is my inheritance to me a speckled bird of prey? the bird of prey around her.' The singular 'bird of prey' may function collectively.
    reason: lexical_alternative
