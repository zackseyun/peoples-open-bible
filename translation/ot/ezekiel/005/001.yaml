id: EZK.5.1
reference: Ezekiel 5:1
source:
  edition: WLC
  text: וְ/אַתָּ֨ה בֶן אָדָ֜ם קַח לְ/ךָ֣ חֶ֣רֶב חַדָּ֗ה תַּ֤עַר הַ/גַּלָּבִים֙ תִּקָּחֶ֣/נָּה לָּ֔/ךְ וְ/הַעֲבַרְתָּ֥ עַל רֹאשְׁ/ךָ֖ וְ/עַל זְקָנֶ֑/ךָ וְ/לָקַחְתָּ֥ לְ/ךָ֛ מֹאזְנֵ֥י מִשְׁקָ֖ל וְ/חִלַּקְתָּֽ/ם־־׀־־׃
translation:
  text: And you[a], son of man, take for yourself a sharp sword; take it as a barber’s razor, and pass it over your head and over your beard[b]. Then take for yourself scales for weighing and divide the hair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'take it for yourself'; the Hebrew repeats 'take' where English more naturally says 'use it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'balances.' The Hebrew refers to scales used for weighing portions.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the familiar prophetic address and matches the Hebrew idiom literally. Although 'mortal' captures the sense in some contexts, here the traditional-literal rendering best preserves the repeated Ezekiel formula and the Hebrew wording. 'Adam' is rendered 'man' per doctrine guidance on אָדָם.
- source_word: חֶרֶב חַדָּה
  chosen: a sharp sword
  alternatives:
  - a sharpened sword
  lexicon: HALOT
  rationale: חֶרֶב is the ordinary word for 'sword,' and חַדָּה adds the sense 'sharp.' The phrase is kept straightforwardly literal.
- source_word: תַּעַר הַגַּלָּבִים
  chosen: a barber’s razor
  alternatives:
  - a razor of barbers
  - a barber’s blade
  lexicon: HALOT
  rationale: 'The construct phrase identifies the sword''s intended function by comparison: it is to serve as a barber''s razor. English idiom is improved by rendering the phrase naturally rather than woodenly.'
- source_word: תִּקָּחֶנָּה לָּךְ
  chosen: use it
  alternatives:
  - take it for yourself
  lexicon: HALOT
  rationale: The Hebrew repeats לקח with a feminine suffix referring back to the sword/razor image. In context the sense is not merely acquisition but taking it up for the shaving action. 'Use it' conveys the functional force in smooth English while staying close to the command sequence.
- source_word: וְהַעֲבַרְתָּ עַל רֹאשְׁךָ וְעַל זְקָנֶךָ
  chosen: on your head and on your beard
  alternatives:
  - over your head and over your beard
  - across your head and across your beard
  lexicon: HALOT
  rationale: The hiphil of עבר with עַל here describes passing the razor over the hair. English requires an implied shaving action; attaching the phrase to 'use it as a barber’s razor' communicates this without over-paraphrase.
- source_word: מֹאזְנֵי מִשְׁקָל
  chosen: scales for weighing
  alternatives:
  - weighing scales
  - balances
  lexicon: HALOT
  rationale: This is a standard expression for scales/balances used to weigh portions. 'Scales for weighing' is clear modern English and preserves the concrete image.
- source_word: וְחִלַּקְתָּם
  chosen: divide the hair
  alternatives:
  - apportion them
  - divide them
  lexicon: HALOT
  rationale: The suffix 'them' refers to the shaved hair implicitly produced by the preceding action and made explicit in the following verses. Supplying 'the hair' in English avoids ambiguity and reflects the contextual referent.
