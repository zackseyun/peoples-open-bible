    rationale: Aunque calca aceptablemente «abolishing», en español aplicado al miedo suena forzado. «Destruyendo» o «deshaciendo» comunica mejor el efecto de καταλύοντες sin perder fuerza.
  - severity: medium
    issue: «tormentos» debilita la concreción de βάσανοι
    rationale: El paquete fuente y las decisiones inglesas enfatizan torturas infligidas, no solo sufrimientos generales. «Torturas» preserva mejor la precisión léxica.
