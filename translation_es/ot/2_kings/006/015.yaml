base_translation:
  language: en
  yaml_path: translation/ot/2_kings/006/015.yaml
  text: When the servant of the man of God rose early and went out[a], behold, an army with horses and chariots was surrounding the city. And his servant said to him, “Alas[b], my master! What shall we do?”
  footnotes:
  - marker: a
    text: Or 'his servant said to him.' The Hebrew נַעַר can mean 'young man,' 'servant,' or 'attendant'; here 'young servant' preserves both the age-related and service-related nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the servant of the man of God'.
    reason: previous_rendering
