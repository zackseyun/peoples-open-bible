translation:
  language: es
  text: 'Y de los hijos de Bebai: Jehohanán[a][b], Hananías, Zabbai, Atlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «hijos de» puede referirse más ampliamente a miembros o descendientes de la línea familiar de Bebai.
    reason: lexical_alternative
  - marker: b
    text: Jehohanán suele simplificarse en algunas tradiciones como «Johanán».
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: La construcción hebrea es literal 'y de los hijos de', y en listas genealógicas funciona como expresión de pertenencia al linaje. En español, 'hijos de' preserva mejor la forma del original que 'descendientes', sin impedir el sentido de clan/familia.
- source_word: בֵּבָי
  english_pob_choice: Bebai
  chosen_spanish: Bebai
  lexicon: Nombre propio (transliteración estándar)
  rationale: Nombre propio familiar; se conserva por transliteración, como en el texto base inglés.
- source_word: יְהוֹחָנָן
  english_pob_choice: Jehohanan
  chosen_spanish: Jehohanan
  alternatives_spanish:
  - Johanán
  lexicon: Nombre propio (transliteración directa)
  rationale: Se mantiene la forma que refleja más plenamente el hebreo, incluyendo el elemento teofórico. En español, 'Jehohanan' es inteligible y más cercano al original que la simplificación a 'Johanán'.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananías
  lexicon: Nombre propio (transliteración estándar al español)
  rationale: En español bíblico es natural adaptar este nombre a 'Hananías', que conserva la forma y la pronunciación esperable en español sin perder la transparencia con el hebreo.
- source_word: זַבַּי
  english_pob_choice: Zabbai
  chosen_spanish: Zabbai
  alternatives_spanish:
  - Zabbay
  lexicon: Nombre propio (transliteración estándar)
  rationale: Se conserva la transliteración del nombre propio. La forma 'Zabbai' mantiene la equivalencia auditiva y la decisión documental del inglés.
- source_word: עַתְלָי
  english_pob_choice: Athlai
  chosen_spanish: Atlai
  alternatives_spanish:
  - Atlai
  lexicon: Nombre propio (transliteración directa)
  rationale: Se translitera directamente desde el hebreo. 'Atlai' reproduce de manera transparente la forma breve del nombre en español.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto fuente hebreo y con la revisión inglesa más reciente; no se registran cambios sustantivos en el audit trail. La única decisión relevante es la adaptación de nombres propios y la conservación de la expresión genealógica 'hijos de'.
  spanish_consistency_notes:
  - Se conserva la estructura enumerativa breve del hebreo.
  - Se mantiene 'hijos de' por su valor genealógico y para no diluir la forma del original.
  - Los nombres propios se transliteran de manera consistente y sin normalizarlos a formas eclesiásticas menos transparentes.
  - Se evita introducir título teológico o expansión interpretativa ajena a una lista nominal.
