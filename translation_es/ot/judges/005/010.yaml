translation:
  language: es
  text: 'Ustedes que montan asnas blancas, ustedes que se sientan sobre alfombras[a], y ustedes que van por el camino: hablen[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sillines', 'mantas para montar' o 'tapetes/alfombras'; el término hebreo es raro y su sentido exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: O 'cuenten' o 'relaten'; el verbo hebreo puede abarcar la idea de hablar y también de narrar o referir.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְבֵי
  english_pob_choice: you who ride
  chosen_spanish: ustedes que montan
  alternatives_spanish:
  - los que montan
  - ustedes que cabalgan
  lexicon: HALOT
  rationale: El participio plural en constructo funciona aquí como vocativo paralelo a los otros miembros de la línea. En español, 'ustedes que montan' conserva la dirección de segunda persona y la imagen concreta sin volverla rígida o impersonal.
- source_word: אֲתֹנוֹת
  english_pob_choice: donkeys
  chosen_spanish: asnas
  alternatives_spanish:
  - burras
  - asnas hembras
  - burros
  lexicon: HALOT
  rationale: El hebreo designa asnas, específicamente hembras. 'Asnas' mantiene esa precisión mejor que el genérico 'burros' y suena natural en español bíblico contemporáneo.
- source_word: צְחֹרוֹת
  english_pob_choice: white
  chosen_spanish: blancas
  alternatives_spanish:
  - brillantes
  - claras
  - de color blanco
  lexicon: HALOT
  rationale: El adjetivo apunta de manera directa al color blanco o a un brillo claro. 'Blancas' es la opción más transparente y fiel al sentido más probable en este contexto.
- source_word: יֹשְׁבֵי
  english_pob_choice: you who sit
  chosen_spanish: ustedes que se sientan
  alternatives_spanish:
  - los que se sientan
  - ustedes que están sentados
  lexicon: HALOT
  rationale: Se mantiene el paralelismo vocativo y la referencia a quienes están sobre algo. 'Se sientan' conserva la acción de sentarse sin fijar innecesariamente una escena estática.
- source_word: מִדִּין
  english_pob_choice: carpets
  chosen_spanish: tapetes
  alternatives_spanish:
  - alfombras
  - mantas para montar
  - sillines
  lexicon: HALOT
  rationale: La palabra es rara y su sentido exacto es incierto. Siguiendo el juicio del POB inglés, 'tapetes' mantiene la idea de una cubierta o acolchado sobre el que se sienta alguien, sin imponer una identificación demasiado específica.
- source_word: וְהֹלְכֵי
  english_pob_choice: and you who walk
  chosen_spanish: y ustedes que van
  alternatives_spanish:
  - y ustedes que caminan
  - y los que van
  lexicon: HALOT
  rationale: El participio completa la tercera clase de personas convocadas. 'Van' funciona de manera natural en español para quienes están en camino, preservando la amplitud del hebreo.
- source_word: דֶּרֶךְ
  english_pob_choice: the road
  chosen_spanish: el camino
  alternatives_spanish:
  - la ruta
  - el sendero
  - la senda
  lexicon: HALOT
  rationale: '''Camino'' reproduce con naturalidad el sustantivo hebreo y el tono poético de una vía recorrida por viajeros.'
- source_word: שִֽׂיחוּ
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - cuenten
  - relaten
  - hablen de ello
  lexicon: HALOT
  rationale: El imperativo plural de שׂיח puede incluir hablar, contar o relatar. 'Hablen' es amplio y fiel en una convocatoria poética; las alternativas más específicas quedan implícitas en la nota.
translation_notes:
  revision_awareness: El texto sigue de cerca el dictamen del pasaje fuente y el audit trail inglés, sin cambios de sentido respecto de la última revisión indicada como estable. Se preserva la ambigüedad léxica principal de מִדִּין en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene el paralelismo vocativo de tres grupos con segunda persona plural para reflejar el hebreo.
  - '''Asnas'' conserva la especificidad sexual del sustantivo hebreo sin sobrecargar el estilo.'
  - '''Tapetes'' se elige como solución intermedia para una voz rara e incierta, en continuidad con la decisión inglesa de ''carpets''.'
