translation:
  language: es
  text: No abandones a tu amigo ni al amigo de tu padre[a], y no vayas a la casa de tu hermano en el día de tu calamidad[b]; mejor es un vecino cercano que un hermano lejano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y al amigo de tu padre». El hebreo permite leer la conjunción de modo coordinado; en el texto principal se usa una sola prohibición con ‘ni’ para reflejar esa unidad con naturalidad en español.'
    reason: lexical_alternative
  - marker: b
    text: ‘Hermano’ también puede entenderse de manera más amplia como pariente cercano o consanguíneo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעֲךָ
  english_pob_choice: your friend
  chosen_spanish: tu amigo
  alternatives_spanish:
  - tu compañero
  - tu vecino
  lexicon: HALOT
  rationale: רֵעַ denota aquí una relación personal de amistad o alianza cercana. ‘Tu amigo’ conserva bien el sentido relacional del proverbio y suena natural en español.
- source_word: וְרֵעַ אָבִיךָ
  english_pob_choice: or your father’s friend
  chosen_spanish: ni al amigo de tu padre
  alternatives_spanish:
  - ni al amigo de tu padre
  - o al amigo de tu padre
  lexicon: HALOT
  rationale: La conjunción hebrea puede entenderse como coordinación bajo una sola prohibición. En español, ‘ni’ comunica con naturalidad la unión de ambos elementos dentro del mismo mandato negativo, sin forzar una segunda orden separada.
- source_word: אַל תַּעֲזֹב
  english_pob_choice: Do not forsake
  chosen_spanish: No abandones
  alternatives_spanish:
  - No dejes
  - No desampares
  lexicon: HALOT
  rationale: עָזַב expresa la idea de dejar o abandonar una relación o responsabilidad. ‘No abandones’ transmite bien la fuerza relacional sin sonar artificial.
- source_word: וּבֵית אָחִיךָ אַל תָּבוֹא
  english_pob_choice: and do not go to your brother’s house
  chosen_spanish: y no vayas a la casa de tu hermano
  alternatives_spanish:
  - y no entres en la casa de tu hermano
  - y no acudas a la casa de tu hermano
  lexicon: HALOT
  rationale: בוא puede significar ir, venir o entrar. Con ‘casa’, ‘no vayas a la casa’ es el equivalente más natural en español y mantiene la imagen de buscar ayuda en el ámbito familiar.
- source_word: בְּיוֹם אֵידֶךָ
  english_pob_choice: in the day of your calamity
  chosen_spanish: en el día de tu calamidad
  alternatives_spanish:
  - en el día de tu desastre
  - en el día de tu desgracia
  lexicon: HALOT
  rationale: אֵיד puede referirse a desastre, ruina o calamidad. ‘Calamidad’ conserva el tono sapiencial y la gravedad del término sin precisar indebidamente el tipo de aflicción.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor es
  alternatives_spanish:
  - más vale
  - es preferible
  lexicon: HALOT
  rationale: En la estructura comparativa del proverbio, ‘mejor es’ comunica de manera idiomática la comparación implícita entre dos alternativas.
- source_word: שָׁכֵן קָרוֹב
  english_pob_choice: a nearby neighbor
  chosen_spanish: un vecino cercano
  alternatives_spanish:
  - un vecino próximo
  - un vecino de cerca
  lexicon: HALOT
  rationale: שָׁכֵן es ‘vecino’ y קָרוֹב indica cercanía. ‘Vecino cercano’ conserva la idea física de proximidad que subraya el proverbio.
- source_word: מֵאָח רָחוֹק
  english_pob_choice: than a distant brother
  chosen_spanish: que un hermano lejano
  alternatives_spanish:
  - que un hermano distante
  - que un pariente lejano
  lexicon: HALOT
  rationale: אָח puede ser literalmente hermano o, en sentido amplio, pariente cercano. Mantener ‘hermano’ preserva el contraste de la imagen fuente; ‘lejano’ refleja la distancia relacional o práctica que el proverbio destaca.
theological_decisions:
- issue: Alcance de אָח (hermano) en el contraste final
  english_pob_reading: Retain 'brother' as the primary rendering rather than broadening to 'relative' or 'kinsman.'
  chosen_spanish_reading: Mantener ‘hermano’ como traducción principal, no ampliarlo a ‘pariente’ o ‘consanguíneo’.
  alternative_spanish_readings:
  - pariente
  - consanguíneo
  rationale: Aunque אָח puede abarcar más que un hermano literal, el proverbio funciona precisamente por el contraste entre la ayuda familiar esperada y la utilidad práctica de la cercanía. ‘Hermano’ conserva la imagen y la tensión retórica del texto fuente.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el último repaso del archivo fuente: no se registraron revisiones posteriores ni cambios requeridos, y el cotejo externo indicó alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el hebreo trae el nombre divino; este versículo no lo contiene.
  - ‘Hermano’ se conserva de forma consistente con la decisión auditada en inglés, sin ampliarlo en el texto principal.
  - ‘Calamidad’ refleja el valor sapiencial de אֵיד sin introducir matices no sustentados por el contexto.
  - La estructura proverbial en español conserva la comparación final con ‘mejor es… que…’ para mantener la fuerza del paralelismo hebreo.
