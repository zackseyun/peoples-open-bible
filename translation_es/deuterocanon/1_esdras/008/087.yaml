translation:
  language: es
  text: Yahvé de Israel, tú eres verdadero; pues hemos quedado como una raíz[a] hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como un remanente» o «como un remanente escapado», según el paralelo hebreo de Esdras 9:13. El griego aquí usa la imagen de «una raíz».'
    reason: alternative_reading
lexical_decisions:
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: El vocativo κύριε aquí funciona como invocación directa al Dios de Israel. En el sistema POB español, el Tetragrámaton se vierte como «Yahvé» en el texto principal; así se evita ocultar el nombre divino detrás de un título genérico. Aunque el inglés POB usa 'Lord' por convención, el auditable equivalente español para una invocación al Dios de Israel es el nombre divino.
- source_word: τοῦ Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - de Israel
  - de los israelitas
  lexicon: Genitive title construction
  rationale: El genitivo identifica al interlocutor como el Dios perteneciente a Israel. En español, «Dios de Israel» expresa con naturalidad la relación titulativa que en griego queda condensada en la fórmula vocativa. El añadido «Dios» está implícito por el contexto y hace la frase idiomática en español.
- source_word: ἀληθινὸς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - fiel
  - veraz
  - genuino
  lexicon: BDAG
  rationale: '«Verdadero» conserva la afirmación directa del griego sin desplazarla hacia un matiz más estrecho como «justo» o «fiel». En esta oración de reconocimiento, el sentido principal es que Dios es verdaderamente tal como se confiesa: verdadero en su ser y palabra.'
- source_word: κατελείφθημεν
  english_pob_choice: we have been left
  chosen_spanish: hemos quedado
  alternatives_spanish:
  - hemos sido dejados
  - nos han dejado
  lexicon: BDAG
  rationale: La forma aoristo pasiva expresa que el pueblo permanece como resultado de haber sido dejado. En español, «hemos quedado» comunica de modo natural ese estado resultante sin forzar una pasiva poco idiomática.
- source_word: ῥίζα
  english_pob_choice: a root
  chosen_spanish: como un raíz
  alternatives_spanish:
  - como una raíz
  - como un resto
  - como un tronco de raíz
  lexicon: LSJ
  rationale: Se conserva la imagen griega de una raíz superviviente, en lugar de armonizarla con el paralelo hebreo que habla de un remanente. La forma española más fiel es «como una raíz»; la lectura alternativa con «remanente» se deja en nota por la tensión textual documentada.
- source_word: ἐν τῇ σήμερον
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - todavía hoy
  - hasta el día de hoy
  lexicon: LSJ
  rationale: La expresión idiomática temporal se vierte de manera natural como «hasta este día», que preserva el sentido de continuidad hasta el presente.
theological_decisions:
- issue: Título divino en κύριε τοῦ Ἰσραήλ
  english_pob_reading: Lord of Israel
  chosen_spanish_reading: Yahvé, Dios de Israel
  alternative_spanish_readings:
  - Señor de Israel
  - Yahvé de Israel
  rationale: El griego emplea un vocativo directo al Dios de Israel. Dado el estándar del proyecto para el nombre divino, el texto principal usa «Yahvé»; «Dios de Israel» aclara la construcción de título relacional. Esto mantiene la referencia teológica sin esconder el nombre divino detrás de una sustitución genérica.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre el griego y el paralelo hebreo sobre la idea de supervivencia
  english_pob_reading: a remnant / an escaped remnant (footnote)
  chosen_spanish_reading: como una raíz
  alternative_spanish_readings:
  - como un remanente
  - como un resto escapado
  rationale: El testimonio griego usa explícitamente la metáfora de la raíz, mientras que el paralelo hebreo habla de un remanente. La lectura principal conserva el dato del griego; la nota recoge la alternativa basada en el hebreo para no borrar la tensión textual documentada.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego primario de 1 Esdras 8:87, a la vez que reconoce el paralelo hebreo aproximado en Esdras 9:13. Se mantiene la metáfora de la raíz en el texto principal y se documenta la alternativa «remanente» en nota, evitando armonizar de forma indebida. También se ajustó el español para que la invocación divina y la metáfora resulten publicables y naturales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - «verdadero» conserva la afirmación del griego sin introducir «justo» o «fiel» como opción principal.
  - La metáfora «raíz» se preserva deliberadamente; la alternativa hebrea queda solo en nota.
  - La puntuación y el orden verbal buscan un registro bíblico moderno, no arcaizante.
