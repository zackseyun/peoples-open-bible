translation:
  language: es
  text: Y le fue contado como justicia[a] de generación en generación para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contado», «considerado» o «acreditado». El hebreo usa el modismo habitual para algo que es tenido o reconocido como justicia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para generación y generación», un modismo que significa a través de todas las generaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּחָשֶׁב
  english_pob_choice: it was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue considerado
  - le fue acreditado
  - le fue tenido por
  lexicon: HALOT
  rationale: El hebreo pasivo de חשב en este contexto conserva la idea forense de ser considerado o contado en una evaluación. «Le fue contado» mantiene bien la pasividad y el valor idiomático sin forzar un tecnicismo contable en español.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo pronominal español expresa naturalmente el destinatario de la evaluación. «Le» evita redundancia y reproduce la relación personal del hebreo.
- source_word: לִצְדָקָה
  english_pob_choice: as righteousness
  chosen_spanish: por justicia
  alternatives_spanish:
  - como justicia
  - como rectitud
  - por rectitud
  lexicon: HALOT
  rationale: En español, con «ser contado» la construcción «por justicia» comunica la misma valoración idiomática que el hebreo ל + צְדָקָה. «Justicia» preserva la fuerza jurídica/covenantal de צְדָקָה mejor que una paráfrasis explicativa.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - para generación y generación
  - a través de todas las generaciones
  lexicon: HALOT
  rationale: La locución española asentada «de generación en generación» transmite el idioma hebreo sin perder el sentido de continuidad sucesiva a lo largo de los siglos.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - hasta la eternidad
  lexicon: HALOT
  rationale: «Para siempre» es la forma más natural y fiel en español para עַד עוֹלָם, manteniendo el alcance duradero sin introducir una formulación más abstracta de la necesaria.
theological_decisions:
- issue: Relación con Génesis 15:6 y la idiomática de justicia imputada/contada
  english_pob_reading: Retain the wording 'counted to him as righteousness' without importing later doctrinal explanation.
  chosen_spanish_reading: Mantener «le fue contado por justicia» sin ampliar a una explicación doctrinal posterior.
  alternative_spanish_readings:
  - le fue acreditado como justicia
  - le fue contado como un acto justo
  - le fue imputado por justicia
  rationale: La frase conserva la resonancia bíblica de justicia atribuida o reconocida sin convertirla en una formulación confesional más técnica que el salmo no explicita. «Por justicia» preserva la tensión entre valoración y estatus legal/covenantal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al evitar una pausa innecesaria antes de la última expresión temporal, reflejando en español una cadencia fluida y continua.
  spanish_consistency_notes:
  - Se usa «justicia» para צְדָקָה, coherente con el valor forense/covenantal del pasaje.
  - Se evita «Cristo» o terminología litúrgica no presente en el hebreo.
  - «De generación en generación» conserva el giro idiomático reconocido por la auditoría inglesa.
  - «Para siempre» corresponde a עַד עוֹלָם con registro natural y digno en español.
