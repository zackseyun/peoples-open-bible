translation:
  language: es
  text: El resto de los hechos de Joacim[a], y las abominaciones que hizo, y lo que fue hallado contra él[b]—he aquí, están escritos en el Libro de los reyes de Israel y de Judá. Y Joaquín su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los asuntos de Joacim». El hebreo דִּבְרֵי puede abarcar «hechos», «asuntos» o «palabras»; en este contexto histórico, «hechos» comunica mejor el resumen del reinado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo que fue hallado acerca de él». La frase hebrea וְהַנִּמְצָא עָלָיו puede entenderse más generalmente como asuntos descubiertos sobre Joacim; el contexto negativo favorece «contra él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora bien, el resto de
  lexicon: HALOT
  rationale: יׄתר introduce el material restante de un resumen histórico. «Ahora» conserva la función transicional de וְ en un español natural; «el resto de» sigue de cerca el valor de «the rest of» sin sobrerrepresentarlo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las cosas de
  - los asuntos de
  - las acciones de
  lexicon: HALOT
  rationale: En fórmulas regias, דִּבְרֵי abarca los hechos o asuntos de un reinado. «Hechos» es una opción idiomática y suficientemente amplia en español, sin reducirlo a «palabras».
- source_word: תֹּעֲבֹתָיו
  english_pob_choice: the abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - sus abominaciones
  - sus actos detestables
  - las cosas detestables
  lexicon: HALOT
  rationale: Se mantiene el sustantivo fuerte «abominaciones» para conservar el peso moral/cultual del hebreo. En español, el posesivo puede sonar redundante junto con la cláusula siguiente; por eso se sigue la decisión inglesa de hacer la frase más natural sin perder el referente.
- source_word: וְהַנִּמְצָא עָלָיו
  english_pob_choice: and what was found against him
  chosen_spanish: y lo que fue hallado contra él
  alternatives_spanish:
  - y lo que fue hallado acerca de él
  - y los cargos hallados contra él
  - y lo que se encontró respecto de él
  lexicon: HALOT
  rationale: La construcción puede referirse a asuntos descubiertos sobre Joacim, pero el contexto negativo favorece una lectura adversativa. «Contra él» reproduce esa tensión sin forzar una terminología jurídica que el hebreo no exige explícitamente.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - mira, están
  - en verdad, están
  - he aquí, allí están
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y enfática del hebreo. «Están» mantiene la referencia a los elementos escritos sin añadir interpretación.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: «Escritos» es la traducción directa y natural del participio pasivo, adecuada para la referencia documental.
- source_word: סֵפֶר מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the Book of the Kings of Israel and Judah
  chosen_spanish: el Libro de los reyes de Israel y de Judá
  alternatives_spanish:
  - el libro de los reyes de Israel y de Judá
  lexicon: HALOT
  rationale: Se conserva el valor de título de una fuente documental. Se mantiene «Libro» con mayúscula inicial por su función titular, y se respetan los nombres geográficos y regios en forma clara y sobria.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: El wayyiqtol introduce la sucesión real de modo breve. «Reinó» es la forma española más directa y asentada para este tipo de fórmula histórica.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  - su propio hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa de forma natural con «su hijo». No se añade énfasis ajeno al hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en su reemplazo
  lexicon: HALOT
  rationale: La preposición indica sucesión. «En su lugar» es idiomática en español y conserva la idea de reemplazo real sin expansión interpretativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado del texto inglés, especialmente la preferencia por «the abominations» sin posesivo expreso en inglés. En español se mantuvo la misma orientación: una frase natural, pero todavía suficientemente literal para reflejar el sufijo hebreo y la estructura del resumen real. No se incorporaron lecturas documentales adicionales fuera de la evidencia provista.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene explícitamente.
  - Se mantiene «Libro» como parte de un título documental, acorde con el formato del pasaje.
  - Se evitó «SEÑOR» y también «Cristo», ya que no aplican aquí.
  - La puntuación con rayas y comas busca reflejar el flujo del hebreo y la delimitación del inciso final de sucesión real.
