translation:
  language: es
  text: Y Yahvé nos dará fuerza e iluminará nuestros ojos, y viviremos bajo la sombra[a] de Nabucodonosor, rey de Babilonia, y bajo la sombra de Baltasar, su hijo, y les serviremos muchos días y hallaremos favor ante ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo la protección de» o «en el refugio de». El griego dice literalmente «bajo la sombra de», una metáfora que puede sugerir tanto amparo como sujeción.
    reason: lexical_alternative
  - marker: b
    text: O «hallaremos favor con ellos». El giro idiomático griego dice literalmente «hallar favor delante de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος / YHWH
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: uso canónico POB de YHWH
  rationale: El texto griego usa Κύριος en un contexto donde el nombre divino está en juego; la política del proyecto pide transparentar el nombre divino como «Yahvé» en el texto principal, en lugar de enmascararlo con «Señor».
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: BDAG
  rationale: ἰσχύς expresa capacidad, vigor o fuerza. «Fuerza» es natural en español y conserva el sentido de capacidad concedida por Dios.
- source_word: φωτίσει τοὺς ὀφθαλμοὺς ἡμῶν
  english_pob_choice: will enlighten our eyes
  chosen_spanish: iluminará nuestros ojos
  alternatives_spanish:
  - dará luz a nuestros ojos
  - enviará luz a nuestros ojos
  lexicon: BDAG
  rationale: La imagen es idiomática y alude a restauración de ánimo, claridad y vida. «Iluminará nuestros ojos» mantiene la metáfora con una sintaxis natural en español sin deshacer el giro original.
- source_word: ζησόμεθα
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - seguiremos con vida
  - sobreviviremos
  lexicon: BDAG
  rationale: El futuro de ζάω se traduce con el verbo simple «vivir». «Sobreviviremos» explicitaría demasiado la situación bajo dominio extranjero.
- source_word: ὑπὸ τὴν σκιὰν
  english_pob_choice: under the shadow of
  chosen_spanish: bajo la sombra de
  alternatives_spanish:
  - bajo la protección de
  - bajo el amparo de
  - a la sombra de
  lexicon: BDAG
  rationale: Se conserva la metáfora de «sombra», que puede sugerir protección y también subordinación. «Bajo la sombra de» refleja el paralelismo del griego y mantiene la tensión interpretativa documentada por POB.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezzar
  - Nabucodonosor
  lexicon: LSJ
  rationale: Se usa la forma bíblica establecida en español para el nombre propio, que es más reconocible y fiel a la tradición de transliteración hispana.
- source_word: Βαλτασὰρ
  english_pob_choice: Belshazzar
  chosen_spanish: Baltasar
  alternatives_spanish:
  - Beltsasar
  - Belshazzar
  lexicon: LSJ
  rationale: «Baltasar» es la forma tradicional y clara en español para este nombre, adecuada a la lectura bíblica y reconocible para el lector hispanohablante.
- source_word: δουλεύσομεν
  english_pob_choice: we will serve
  chosen_spanish: les serviremos
  alternatives_spanish:
  - seremos esclavos de ellos
  - les estaremos sujetos
  lexicon: BDAG
  rationale: El griego puede implicar servidumbre o sujeción política. Aquí, siguiendo el criterio auditado de POB, «serviremos» evita sobretraducir a esclavitud formal y respeta el marco de dependencia bajo reyes extranjeros.
- source_word: ἡμέρας πολλὰς
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - durante muchos días
  - por muchos días
  - largo tiempo
  lexicon: BDAG
  rationale: Es una expresión temporal directa; «muchos días» es transparente y suficientemente literal en español.
- source_word: εὑρήσομεν χάριν ἐναντίον αὐτῶν
  english_pob_choice: find favor before them
  chosen_spanish: hallaremos favor ante ellos
  alternatives_spanish:
  - hallaremos favor con ellos
  - obtendremos gracia ante ellos
  - ganaremos su favor
  lexicon: BDAG
  rationale: El giro idiomático del griego es literalmente «encontrar favor delante de». «Ante ellos» preserva la estructura y mantiene la formalidad del original, sin perder inteligibilidad en español.
theological_decisions:
- issue: El alcance de «bajo la sombra» respecto del dominio imperial
  english_pob_reading: Retain the metaphor 'under the shadow of' rather than interpret it explicitly as protection or domination.
  chosen_spanish_reading: Conservar «bajo la sombra de» sin resolverla como protección o como dominación exclusiva.
  alternative_spanish_readings:
  - bajo la protección de Nabucodonosor...
  - bajo el dominio de Nabucodonosor...
  - bajo el amparo de Nabucodonosor...
  rationale: 'La imagen griega admite ambas resonancias: refugio y sujeción. Mantener la metáfora preserva la tensión política y teológica del exilio sin interpretarla prematuramente.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: δουλεύσομεν en un contexto de exilio y subordinación política
  english_pob_reading: we will serve them
  chosen_spanish_reading: les serviremos
  alternative_spanish_readings:
  - seremos esclavos de ellos
  - les estaremos sujetos
  rationale: Aunque δουλεύω puede tener fuerza de esclavitud, el contexto aquí describe la conducta esperada bajo reyes imperiales. «Serviremos» mantiene el sentido de subordinación sin añadir una afirmación más fuerte de esclavitud que el contexto no exige de forma explícita.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος / doulos'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Baruc 1:12 y toma como guía el audit trail inglés de POB, especialmente la preservación de la metáfora «under the shadow of» y la decisión de traducir δουλεύσομεν como una relación de servicio más que de esclavitud explícita. Se adoptó el nombre divino como «Yahvé» conforme a la convención del proyecto en español, y se optó por formas hispanas bíblicamente establecidas para los nombres propios.
  spanish_consistency_notes:
  - Se mantuvo la metáfora de «sombra» para reflejar la ambigüedad semántica del griego.
  - «Yahvé» se usa como forma principal para Κύριος cuando remite al nombre divino.
  - «Serviremos» se eligió para no intensificar indebidamente la fuerza de δουλεύσομεν.
  - 'Los nombres propios siguen formas bíblicas estándar en español: Nabucodonosor y Baltasar.'
  - «Ante ellos» conserva la estructura idiomática del griego; la alternativa «con ellos» queda documentada en nota.
