  source_alignment_summary: 'El borrador sigue bien la estructura del griego: fórmula existencial proverbial (ἔστιν), participio de desliz/falta (ὀλισθάνων), contraste con una falta no deliberada (οὐκ ἀπὸ ψυχῆς) y pregunta retórica sobre pecar con la lengua (τίς οὐχ ἥμαρτεν ἐν τῇ γλώσσῃ αὐτοῦ;). Sin embargo, «no por el alma» no comunica en español el valor literal documentado ni el sentido idiomático; suena opaco y poco fiel al campo semántico de ἀπό + ψυχή. Conviene ajustar a una forma más transparente que preserve la rareza del original y dejar la alternativa idiomática en nota.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «no por el alma» resulta antinatural y confuso en español e interrumpe la comprensión. «No desde el alma» mantiene la literalidad mejor y sigue siendo comprensible con apoyo de nota. El resto —«Hay quien resbala» y «¿quién no ha pecado con su lengua?»— suena natural y adecuado para registro sapiencial.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Pecado» preserva correctamente la fuerza moral de ἥμαρτεν. «Lengua» conserva la metáfora corporal de γλῶσσα. La principal cuestión léxica es οὐκ ἀπὸ ψυχῆς: se debe evitar «por el alma», que no refleja bien ni la literalidad ni la explicación auditada.'
  issues:
