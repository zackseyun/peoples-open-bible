translation:
  language: es
  text: Y dejó a Lisias, un hombre distinguido y de la familia real, a cargo de los asuntos del rey, desde el río Éufrates hasta las fronteras de Egipto,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - lo dejó
  - lo nombró
  lexicon: LSJ
  rationale: El griego puede significar ‘dejó’ y, por contexto, implica asignación de responsabilidad. En español, ‘dejó’ conserva la forma verbal del original y permite que la función administrativa se entienda por la frase siguiente, sin añadir una explicitación no necesaria.
- source_word: ἄνθρωπον ἔνδοξον
  english_pob_choice: a distinguished man
  chosen_spanish: un hombre distinguido
  alternatives_spanish:
  - un hombre honrado
  - un hombre eminente
  - un hombre ilustre
  lexicon: LSJ
  rationale: ἔνδοξος expresa prestigio, honor o distinción. ‘Distinguido’ es natural en español y transmite estatus reconocido sin sobrerrepresentar con ‘glorioso’.
- source_word: ἀπὸ γένους τῆς βασιλείας
  english_pob_choice: of the royal family
  chosen_spanish: de la familia real
  alternatives_spanish:
  - de linaje real
  - de la estirpe real
  - de sangre real
  lexicon: LSJ
  rationale: La expresión señala pertenencia por linaje a la casa reinante. ‘Familia real’ comunica de manera clara y readable esa procedencia dinástica en español contemporáneo.
- source_word: ἐπὶ τῶν πραγμάτων τοῦ βασιλέως
  english_pob_choice: over the affairs of the king
  chosen_spanish: a cargo de los asuntos del rey
  alternatives_spanish:
  - sobre los asuntos del rey
  - encargado de los asuntos del rey
  - al frente de los asuntos del rey
  lexicon: LSJ
  rationale: πράγματα aquí se refiere a asuntos administrativos o de gobierno. ‘A cargo de’ expresa bien la comisión de autoridad en español sin sonar demasiado técnico ni forzado.
- source_word: ἀπὸ τοῦ ποταμοῦ Εὐφράτου
  english_pob_choice: from the Euphrates River
  chosen_spanish: desde el río Éufrates
  alternatives_spanish:
  - desde el Éufrates
  - desde el río Éufrates
  lexicon: LSJ
  rationale: El griego nombra explícitamente el río. ‘Desde el río Éufrates’ conserva la referencia geográfica con orden natural en español.
- source_word: ἕως τῶν ὁρίων Αἰγύπτου
  english_pob_choice: as far as the borders of Egypt
  chosen_spanish: hasta las fronteras de Egipto
  alternatives_spanish:
  - hasta los límites de Egipto
  - hasta la frontera de Egipto
  - hasta los confines de Egipto
  lexicon: LSJ
  rationale: ὅρια indica fronteras o límites territoriales. ‘Fronteras’ es la forma más clara y estándar en español para expresar el alcance geográfico del encargo.
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada del POB en inglés, que prefirió ‘a distinguished man’ por mayor precisión y naturalidad respecto de ἄνθρωπον ἔνδοξον. No se añadieron notas textuales porque el testimonio griego y el seguimiento editorial muestran alta concordancia y no presentan variantes relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton cuando aparezca en el contexto del libro, pero este versículo no lo contiene.
  - Se usa ‘familia real’ para γένος τῆς βασιλείας por claridad; no se optó por ‘linaje’ porque en español aquí suena más formal sin añadir matiz necesario.
  - Se conserva ‘Éufrates’ con tilde en español y el orden natural ‘río Éufrates’.
