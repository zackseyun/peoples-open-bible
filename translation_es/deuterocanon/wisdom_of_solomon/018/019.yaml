translation:
  language: es
  text: Porque los sueños que los inquietaban anunciaron esto[a][b], para que no perecieran sin saber por qué sufrían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dieron aviso previo de esto». El verbo griego puede llevar la idea de señalar algo antes como advertencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por lo que sufren». Es decir, «por qué sufrían».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ γὰρ ὄνειροι
  english_pob_choice: For the dreams
  chosen_spanish: Porque los sueños
  alternatives_spanish:
  - Porque los sueños que
  - Pues los sueños
  lexicon: LSJ
  rationale: ὄνειροι es simplemente «sueños» en plural; el artículo queda naturalmente incluido en español por el contexto. Se conserva el valor causal de γὰρ con «Porque».
- source_word: θορυβήσαντες
  english_pob_choice: that troubled
  chosen_spanish: que los inquietaban
  alternatives_spanish:
  - que los perturbaban
  - que los agitaban
  - que los alarmaban
  lexicon: LSJ
  rationale: El participio expresa causar perturbación o agitación. «Inquietaban» comunica ese efecto en español actual sin endurecer el tono ni introducir una idea demasiado fuerte de terror.
- source_word: τοῦτο προεμήνυσαν
  english_pob_choice: foretold this
  chosen_spanish: anunciaron esto
  alternatives_spanish:
  - advirtieron esto de antemano
  - dieron aviso previo de esto
  - predijeron esto
  lexicon: LSJ
  rationale: προμηνύω puede significar anunciar o advertir previamente. «Anunciaron esto» mantiene la brevedad del griego y evita cargar el verbo con una lectura demasiado profética cuando el contexto admite una advertencia anticipada.
- source_word: ἵνα μὴ
  english_pob_choice: so that they might not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - con el fin de que no
  - para que no llegaran a
  lexicon: Greek grammar
  rationale: La cláusula expresa propósito o resultado intencional. «Para que no» es la equivalencia más natural y clara en español.
- source_word: ἀγνοοῦντες
  english_pob_choice: without knowing
  chosen_spanish: sin saber
  alternatives_spanish:
  - sin conocer
  - sin darse cuenta de
  - en ignorancia de
  lexicon: LSJ
  rationale: El participio adverbial se vierte de modo natural con «sin saber», preservando la idea de desconocimiento sin sonar técnico o arcaizante.
- source_word: διʼ ὃ
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por lo cual
  - a causa de lo cual
  - el motivo por el cual
  lexicon: Greek grammar
  rationale: 'La expresión literalmente remite a la causa: «por qué». En español mantiene la relación causal y la pregunta implícita del sufrimiento.'
- source_word: κακῶς πάσχουσιν
  english_pob_choice: they were suffering
  chosen_spanish: sufrían
  alternatives_spanish:
  - padecían
  - estaban sufriendo
  - eran afligidos
  lexicon: LSJ
  rationale: La revisión inglesa redujo «badly» para evitar expansión innecesaria. En español, «sufrían» transmite adecuadamente πάσχω en el contexto de aflicción, sin añadir adverbios no requeridos.
- source_word: ἀπόλωνται
  english_pob_choice: they might not perish
  chosen_spanish: perecieran
  alternatives_spanish:
  - se perdieran
  - murieran
  - fueran destruidos
  lexicon: LSJ
  rationale: ἀπόλλυμι en este contexto tiene la fuerza de perecer o ser destruido. «Perecieran» conserva el registro solemne del libro y la gravedad del juicio implícito.
theological_decisions:
- issue: Función de los sueños como advertencia misericordiosa
  english_pob_reading: The dreams are presented as a merciful forewarning, so that the sufferers would not die ignorant of the reason for their affliction.
  chosen_spanish_reading: Los sueños se presentan como un anuncio previo misericordioso, para que los que sufren no perezcan sin saber la causa de su sufrimiento.
  alternative_spanish_readings:
  - Los sueños los advirtieron de antemano, para que no murieran sin entender por qué sufrían.
  - Los sueños los inquietaron y así previnieron su ruina.
  rationale: 'Se conserva la tensión del pasaje: la aflicción es real, pero el aviso evita una ignorancia total sobre su causa. «Anunciaron esto» permite leer tanto anuncio como advertencia, conforme al rango del verbo griego y a la decisión inglesa.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «badly» como expansión innecesaria y dejó simplemente «they were suffering». Esta traducción española sigue esa revisión: usa «sufrían» sin añadir adverbios, pero conserva la posibilidad semántica de aflicción mediante el verbo y el contexto.'
  spanish_consistency_notes:
  - Se mantiene «sueños» para ὄνειροι, en coherencia con el valor plural sencillo del sustantivo.
  - Se evita «SEÑOR» u այլ sustitución teológica no pertinente; este versículo no contiene el tetragrámaton ni κύριος en sentido divino.
  - «Perecieran» conserva el registro literario y la fuerza escatológica/judicial de Wisdom.
  - La forma «por qué» en español refleja la relación causal de διʼ ὃ y no introduce una pregunta explícita independiente.
