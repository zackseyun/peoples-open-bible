review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y conserva correctamente los tecnicismos principales: túnica, efod y la pieza del pecho. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con el rastro de auditoría inglés: (1) la nota [a] está anclada en «túnica», pero su contenido explica el verbo final וְאָפַדְתָּ לוֹ, así que el anclaje es incorrecto; y (2) «cinturón tejido» estrecha demasiado בְּחֵשֶׁב הָאֵפֹד, que en el inglés auditado se entendió como «band»/banda tejida, no necesariamente un cinturón completo. Además, la nota [b] exagera la literalidad al decir «el pecho», cuando חֹשֶׁן no significa simplemente eso.'
  spanish_quality_summary: El español es claro y digno, pero conviene mejorar la precisión cultual y la coherencia de notas. «Manto del efod» es aceptable, aunque «túnica[a]» con nota ajena confunde al lector. «Lo ceñirás» funciona bien para el verbo raro, y «banda hábilmente tejida» o «banda tejida con destreza» suena natural y más ajustado al audit trail que «cinturón tejido».
  glossary_alignment: 'La transliteración «efod» está bien alineada con la política del proyecto para términos técnicos. «Pectoral» es una buena decisión española para חֹשֶׁן, pero la nota debe reflejar la razón documentada: evitar la imagen de armadura de «coraza/placa», no presentar una falsa literalidad. No hay conflictos con Yahvé/Mesías u otros términos globales.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «túnica», pero comenta el verbo final «lo ceñirás».
    rationale: Las notas deben anclarse exactamente donde pertenece la alternativa léxica. Aquí induce a pensar que la alternativa afecta a «túnica», cuando en realidad explica וְאָפַדְתָּ לוֹ.
  - severity: medium
    issue: «Cinturón tejido» es más estrecho que el valor documentado de בְּחֵשֶׁב הָאֵפֹד.
    rationale: El audit trail inglés prefirió «woven band»/«skillfully woven band». «Cinturón» puede sonar como una prenda distinta y más específica de lo que exige el hebreo.
  - severity: medium
    issue: La nota [b] describe de forma inexacta la supuesta literalidad de חֹשֶׁן.
    rationale: La justificación auditada no fue «el pecho» literal, sino que «breastpiece» evita la lectura armamentística de «breastplate». La nota española debe reflejar esa razón y no introducir una etimología simplista.
  revised_spanish_text: Entonces tomarás las vestiduras y vestirás a Aarón con la túnica, el manto del efod, el efod y el pectoral[a]; y lo ceñirás[b] con la banda hábilmente tejida del efod.
  revised_footnotes:
  - marker: a
    text: Tradicionalmente se ha traducido «coraza» o «placa pectoral»; el hebreo denota más ampliamente una pieza del pecho, por eso se usa «pectoral».
    reason: lexical_alternative
  - marker: b
    text: O «y lo atarás sobre él con la banda tejida del efod». El verbo hebreo es raro y puede enfatizar el acto de ajustar o ceñir el efod sobre Aarón.
    reason: lexical_alternative
