translation:
  language: es
  text: Pero con un torrente avasallador acabará por completo con su lugar[a], y las tinieblas perseguirán a sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su lugar». El hebreo tiene un sufijo femenino singular, literalmente «su lugar de ella», probablemente personificando la ciudad bajo juicio; algunas traducciones lo expresan de manera más impersonal.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְשֶׁטֶף
  english_pob_choice: But with an overwhelming flood
  chosen_spanish: Pero con un torrente avasallador
  alternatives_spanish:
  - Y con un torrente
  - Pero con una inundación avasalladora
  lexicon: HALOT
  rationale: El hebreo combina la conjunción con la imagen de un caudal desbordado y destructivo. En español, «torrente avasallador» conserva la fuerza del cuadro sin sonar forzado; «pero» refleja el giro adversativo del contexto profético inmediato.
- source_word: עֹבֵר
  english_pob_choice: overwhelming
  chosen_spanish: avasallador
  alternatives_spanish:
  - desbordante
  - que pasa sobre
  - arrasador
  lexicon: HALOT
  rationale: Como participio que modifica al sustantivo, el sentido es de algo que pasa por encima o invade con violencia. «Avasallador» comunica bien la acción abrumadora del torrente y mantiene naturalidad en español.
- source_word: כָּלָה
  english_pob_choice: a complete end
  chosen_spanish: un fin completo
  alternatives_spanish:
  - un final completo
  - una destrucción total
  - un fin total
  lexicon: HALOT
  rationale: La expresión hebrea intensifica la idea de término absoluto. «Un fin completo» conserva esa intensidad con una formulación clara, cercana a la lectura inglesa pero idiomática en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: he will make
  chosen_spanish: hará
  alternatives_spanish:
  - hará que
  - llevará a cabo
  - producirá
  lexicon: HALOT
  rationale: El verbo básico «hacer» en este contexto puede sonar más rígido en español. «Hará» mantiene la sencillez del verbo hebreo y forma bien la expresión «hará un fin completo».
- source_word: מְקוֹמָהּ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su lugar de residencia
  - su ciudad
  lexicon: HALOT
  rationale: El sufijo hebreo es femenino singular, pero el pasaje fue revisado en inglés hacia un referente no personal. En español, «su lugar» preserva la referencia abierta sin forzar una personificación explícita; el matiz alternativo queda indicado en la nota.
- source_word: וְאֹיְבָיו
  english_pob_choice: and his enemies
  chosen_spanish: y a sus enemigos
  alternatives_spanish:
  - y sus enemigos
  - y a los enemigos de él
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva de forma natural con «a sus enemigos», manteniendo el contraste con el versículo anterior y la idea de hostilidad dirigida contra el sujeto implícito.
- source_word: יְרַדֶּף
  english_pob_choice: will pursue
  chosen_spanish: perseguirá
  alternatives_spanish:
  - irá persiguiendo
  - acechará
  - dará caza a
  lexicon: HALOT
  rationale: El piel de רדף expresa persecución activa. «Perseguirá» es directo, claro y suficientemente fuerte para el tono de juicio del texto.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - sombras
  - oscuridad de juicio
  lexicon: HALOT
  rationale: 'El sustantivo es concreto: oscuridad. En castellano, «la oscuridad» preserva el cuadro y evita sobreinterpretar la imagen con una glosa explicativa que el hebreo no exige en el verso principal.'
theological_decisions:
- issue: Referente del sufijo femenino en מְקוֹמָהּ
  english_pob_reading: '''its place'' for a non-personal referent, while preserving the formal sense of the verse'
  chosen_spanish_reading: '''su lugar'' mantiene un referente abierto y no impone una personificación que el texto puede suavizar'
  alternative_spanish_readings:
  - '''su lugar'' con personificación implícita (''su lugar'' de la ciudad/poder personificado)'
  - '''su ciudad'' si se explicita Nineveh'
  rationale: La revisión inglesa prefirió una referencia menos personal ('its place') aunque el hebreo permite un matiz femenino. En español, «su lugar» conserva la ambigüedad útil y sigue la decisión revisada sin perder la tensión interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El inglés POB fue revisado de «her place» a «its place» para reflejar mejor un referente no personal. La propuesta española sigue esa revisión principal con «su lugar», pero conserva en nota la posibilidad de la personificación implícita que deja ver el sufijo femenino del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando el contexto aluda al nombre divino; en este versículo no aparece el tetragrámaton de forma explícita en la superficie del texto.
  - Se evita el calco rígido de «end of its place» y se prefiere una sintaxis natural en español, sin añadir contenido no sustentado por el hebreo.
  - «Oscuridad» conserva el sustantivo concreto; no se expande a una glosa de juicio en el cuerpo principal para no perder la imagen original.
