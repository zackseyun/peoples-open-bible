translation:
  language: es
  text: No descubrirás la desnudez de tu hermana[a], sea la hija de tu padre o la hija de tu madre, nacida en el hogar o nacida fuera de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nacida en casa o nacida fuera’. El hebreo contrapone el nacimiento ‘en la casa/hogar’ con el nacimiento ‘fuera’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָן
  english_pob_choice: the nakedness of ... / their nakedness
  chosen_spanish: la desnudez de ... / su desnudez
  alternatives_spanish:
  - la vergüenza de ... / su vergüenza
  - las partes íntimas de ... / sus partes íntimas
  lexicon: HALOT
  rationale: En Levítico 18, עֶרְוָה funciona como un idiomatismo legal para la desnudez sexual prohibida. En español, ‘desnudez’ conserva mejor que ‘vergüenza’ el valor idiomático y jurídico, sin suavizar el sentido.
- source_word: אֲחוֹתְךָ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - la hermana tuya
  lexicon: HALOT
  rationale: Es un término de parentesco directo; se mantiene el singular masculino del destinatario, como en el hebreo.
- source_word: בַת אָבִיךָ
  english_pob_choice: your father's daughter
  chosen_spanish: la hija de tu padre
  alternatives_spanish:
  - tu hija de padre
  lexicon: HALOT
  rationale: La frase aposicional precisa una clase de hermana. ‘La hija de tu padre’ reproduce con claridad la precisión familiar del hebreo.
- source_word: בַת אִמֶּךָ
  english_pob_choice: your mother's daughter
  chosen_spanish: la hija de tu madre
  alternatives_spanish:
  - tu hija de madre
  lexicon: HALOT
  rationale: Es paralelo a ‘la hija de tu padre’; se conserva la simetría y la especificación legal.
- source_word: מוֹלֶדֶת
  english_pob_choice: born
  chosen_spanish: nacida
  alternatives_spanish:
  - nacido
  - engendrada
  lexicon: HALOT
  rationale: Aquí el adjetivo/participio indica procedencia por nacimiento. ‘Nacida’ es la forma más natural en español y conserva el contraste de origen.
- source_word: בַּיִת
  english_pob_choice: in the household
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el hogar
  - en la familia
  lexicon: HALOT
  rationale: Aunque el contexto inglés opta por ‘household’, el hebreo contrasta con ‘outside’; en español ‘en la casa’ refleja de manera directa la oposición terminológica del texto, con posibilidad de entenderse también en sentido doméstico/familiar.
- source_word: חוּץ
  english_pob_choice: outside it
  chosen_spanish: fuera de ella
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: La preposición marca el contraste con ‘en la casa’; ‘fuera de ella’ mantiene la referencia al ámbito anterior sin introducir una explicación ajena al texto.
- source_word: לֹא תְגַלֶּה
  english_pob_choice: You shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No destaparás
  - No revelarás
  lexicon: HALOT
  rationale: El hebreo usa la fórmula legal de prohibición con ‘descubrir’. En español, ‘descubrir’ conserva el idiomatismo bíblico y resulta idiomático en registro jurídico-bíblico.
- source_word: אוֹ ... אוֹ
  english_pob_choice: whether ... or
  chosen_spanish: sea ... o
  alternatives_spanish:
  - ya sea ... o
  - ya sea ... ya sea
  lexicon: HALOT
  rationale: La disyunción hebrea se expresa naturalmente con ‘sea ... o’, que conserva el valor distributivo de las dos posibilidades sin sobrecargar la frase.
theological_decisions:
- issue: Alcance de la relación prohibida
  english_pob_reading: The verse prohibits sexual relations with one's sister, including both a father's daughter and a mother's daughter, whether born within the household or outside it.
  chosen_spanish_reading: El versículo prohíbe la relación sexual con la propia hermana, abarcando tanto a la hija del padre como a la hija de la madre, nacida en la casa o nacida fuera de ella.
  alternative_spanish_readings:
  - Podría leerse como una distinción entre hermanas de padre, de madre o de distinto ámbito de nacimiento, sin alterar la prohibición general.
  rationale: La estructura hebrea amplía la categoría de ‘tu hermana’ con especificaciones parentales y de nacimiento. La traducción mantiene explícito ese alcance general sin introducir distinciones legales que el texto no formula de manera expresa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del repaso más reciente: no se detectaron cambios necesarios respecto del análisis inglés auditado. Se mantiene la estructura legal del hebreo, la prohibición idiomática de ‘descubrir la desnudez’ y la oposición ‘en la casa / fuera de ella’.'
  spanish_consistency_notes:
  - Se usa ‘desnudez’ para עֶרְוָה, en línea con el idiomatismo legal del pasaje.
  - Se conserva ‘descubrir’ como verbo técnico de la prohibición.
  - ‘Tu hermana’ mantiene el destinatario masculino singular implícito del hebreo.
  - La nota al pie preserva la alternativa léxica de ‘en casa/hogar’ frente a ‘en la casa’.
