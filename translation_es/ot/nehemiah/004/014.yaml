revisions:
- from: En el lugar donde oigan[a] el sonido del shofar, reúnanse allí junto a nosotros. Nuestro Dios peleará por nosotros.
  to: En el lugar donde oigan el sonido de la trompeta[a], reúnanse allí a nosotros. Nuestro Dios peleará por nosotros.
  rationale: Se cambia 'shofar' por 'trompeta' en el texto principal para seguir la decisión lexical del POB inglés y mejorar la naturalidad en español, conservando la especificidad en nota. Se mueve la nota al término pertinente. Se reemplaza 'junto a nosotros' por 'a nosotros' para no añadir una matización interpretativa ausente del hebreo y del audit trail. Aunque 'reúnanse allí a nosotros' es algo tenso en español, preserva mejor la direccionalidad explícita que introdujo el inglés POB que 'junto a/con nosotros'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: locación (''En el lugar donde''), percepción auditiva, reunión en el punto indicado, y la afirmación de que Dios peleará por el pueblo. También conserva correctamente el posesivo en ''Nuestro Dios'' y el valor fuerte de guerra divina en ''peleará por nosotros''. Sin embargo, ''junto a nosotros'' sobreinterpreta אֵלֵינוּ, que en el audit trail inglés se defendió específicamente como ''to us'' y no ''with us''; en español conviene una formulación direccional más directa.'
  spanish_quality_summary: El español es claro y legible, pero 'shofar' en el texto principal suena menos natural para una Biblia de lectura amplia cuando el inglés POB prefirió 'trumpet' en el texto y reservó la especificidad para nota. Además, la nota está anclada en 'oigan', cuando semánticamente corresponde al instrumento. Una reparación menor mejora fidelidad al audit trail y naturalidad lectora.
  glossary_alignment: 'No hay conflicto con los términos teológicos principales del proyecto. ''Nuestro Dios'' y ''peleará por nosotros'' están alineados. El punto lexical principal es קוֹל הַשּׁוֹפָר: el POB inglés eligió un término general en texto principal con alternativa específica en nota; en español conviene ''trompeta'' con nota sobre ''cuerno de carnero'' para seguir esa lógica documentada. También debe evitarse expandir אֵלֵינוּ a una cercanía interpretativa (''junto a nosotros'').'
  issues:
  - severity: medium
    issue: '''junto a nosotros'' sobretraduce אֵלֵינוּ'
    rationale: El hebreo y el audit trail inglés sostienen un movimiento direccional simple 'a nosotros'. 'Junto a nosotros' añade una matización de proximidad física/acompañamiento no exigida por el texto.
  - severity: medium
    issue: Uso de 'shofar' en el texto principal en vez de un equivalente español común
    rationale: El POB inglés optó por 'trumpet' en el texto y dejó la especificidad lexical en nota. En español, 'shofar' puede conservarse en nota, pero en el cuerpo principal 'trompeta' es más natural y mejor alineado con la decisión auditada.
  - severity: low
    issue: La nota [a] está colocada sobre 'oigan' en vez del término instrumenta
    rationale: La alternativa lexical explica 'shofar/cuerno de carnero', por lo que el anclaje debe ir en 'trompeta' o la frase del instrumento, no en el verbo de oír.
  revised_spanish_text: En el lugar donde oigan el sonido de la trompeta[a], reúnanse allí a nosotros. Nuestro Dios peleará por nosotros.
  revised_footnotes:
  - marker: a
    text: O «el sonido del cuerno de carnero». El hebreo shofar se refiere específicamente a un cuerno usado como trompeta.
    reason: lexical_alternative
  revision_rationale: Se cambia 'shofar' por 'trompeta' en el texto principal para seguir la decisión lexical del POB inglés y mejorar la naturalidad en español, conservando la especificidad en nota. Se mueve la nota al término pertinente. Se reemplaza 'junto a nosotros' por 'a nosotros' para no añadir una matización interpretativa ausente del hebreo y del audit trail. Aunque 'reúnanse allí a nosotros' es algo tenso en español, preserva mejor la direccionalidad explícita que introdujo el inglés POB que 'junto a/con nosotros'.
