id: 2TH.3.14
reference: 2 Thessalonians 3:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰ δέ τις οὐχ ὑπακούει τῷ λόγῳ ἡμῶν διὰ τῆς ἐπιστολῆς, τοῦτον σημειοῦσθε, ⸀μὴ ⸀συναναμίγνυσθαι αὐτῷ, ἵνα ἐντραπῇ·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/014.yaml
  text: And if anyone does not obey our word through this letter[a], take note of that person; do not associate with him[d][c][b], so that he may be ashamed.
translation:
  language: ko
  text: 만일 누구든지 이 편지를 통한 우리의 말[a]에 순종하지 않으면, 그 사람을 표시해 두고[b] 그와 어울리지 마십시오[c]. 그가 부끄러움을 느끼게 하기 위함입니다[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이 편지로」, 「이 편지에서」. 헬라어 διά + 속격은 가르침이 전달되는 수단을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「지목하라」, 「표시하라」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그와 가까이 지내지 마십시오」.
    reason: lexical_alternative
  - marker: d
    text: 목적은 교정적이다. 15절을 보면 그 사람을 여전히 「형제로서 권면」하라고 한다.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπακούει
  english_pob_choice: does not obey
  chosen_korean: 순종하지 않으면
  alternatives_korean:
  - 따르지 않으면
  - 듣지 않으면
  lexicon: BDAG
  rationale: ὑπακούω의 「권위에 순종/청종」 의미를 보존.
- source_word: τῷ λόγῳ ἡμῶν
  english_pob_choice: our word
  chosen_korean: 우리의 말
  alternatives_korean:
  - 우리의 가르침
  - 우리의 지시
  lexicon: BDAG
  rationale: 사도적 메시지/지시를 가리키는 λόγος. 「말」로 직역하되, 문맥상 권위적 가르침임이 분명하다.
- source_word: διὰ τῆς ἐπιστολῆς
  english_pob_choice: through this letter
  chosen_korean: 이 편지를 통한
  alternatives_korean:
  - 이 편지로
  - 이 편지에서
  lexicon: BDAG
  rationale: 한국어 흐름상 「이 편지를 통한」이 자연스럽다. 헬라어 정관사가 가리키는 「당장의 편지」를 「이 편지」로 명시.
- source_word: σημειοῦσθε
  english_pob_choice: take note of
  chosen_korean: 표시해 두고
  alternatives_korean:
  - 지목해 두고
  - 마음에 두고
  lexicon: BDAG
  rationale: 중간태 명령의 「식별·표시」 의미를 자연스럽게 옮긴다.
- source_word: τοῦτον
  english_pob_choice: that person
  chosen_korean: 그 사람
  alternatives_korean:
  - 그를
  lexicon: BDAG
  rationale: 지시사를 명확히.
- source_word: μὴ συναναμίγνυσθαι αὐτῷ
  english_pob_choice: do not associate with him
  chosen_korean: 그와 어울리지 마십시오
  alternatives_korean:
  - 그와 가까이 지내지 마십시오
  - 그와 친밀히 교류하지 마십시오
  lexicon: BDAG
  rationale: συναναμίγνυμι의 친밀한 교류 의미를 「어울리다」로 자연스럽게 옮긴다.
- source_word: ἐντραπῇ
  english_pob_choice: he may be ashamed
  chosen_korean: 부끄러움을 느끼게
  alternatives_korean:
  - 수치를 느끼게
  - 부끄러워하게
  lexicon: BDAG
  rationale: 교정적 회개로 이끄는 부끄러움. 모욕적 굴욕이 아님을 살린다.
theological_decisions:
- issue: 권징적 거리두기의 성격
  chosen_reading: 회복을 위한 사회적·교회적 거리두기 (15절과 함께 읽음)
  alternative_readings:
  - 형식적 출교
  - 단순 회피
  rationale: 15절의 「형제처럼 권면하라」가 본문 권징의 교정적 성격을 분명히 한다. 후대의 사법적 범주를 도입하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: ἐντραπῇ의 의도
  chosen_reading: 회개를 위한 교정적 부끄러움
  alternative_readings:
  - 공개적 굴욕 자체
  rationale: 목적절과 다음 15절의 문맥이 회복적 의도를 가리킨다.
  doctrine_reference: 'Do not import doctrinal claims the text does not make'
