  text: 「그러므로 사흘째 되는 날까지 무덤을 단단히 지키도록 명하십시오. 그렇지 않으면 그의 제자들이 와서 그를 훔쳐 가고 백성에게 ʻ그가 죽은 자들로부터 일어났다ʼ 하고 말할 것이며, 그 마지막 미혹이 처음 것보다 더 심할 것입니다.」
