revisions:
- from: Porque los montes serán sacudidos desde sus cimientos junto con las aguas, y las peñas se derretirán como cera[a] delante de tu rostro; pero a los que te temen, eres misericordioso.
  to: Porque los montes serán sacudidos desde sus cimientos junto con las aguas, y las peñas se derretirán como cera delante de tu rostro[a]; pero a los que te temen, les muestras gracia.
  rationale: Se conserva la estructura e imaginería del borrador, pero se corrige la última cláusula para expresar con español natural el favor dirigido «a ellos» y para alinearla mejor con la decisión inglesa «you are gracious». También se mueve la nota al sintagma correcto, ya que la alternativa comentada corresponde a «delante de tu rostro».
