translation:
  language: es
  text: Les arrancaré sus bandas mágicas[a] y libraré a mi pueblo de sus manos; ya no estarán más en sus manos como presa[b]. Entonces ustedes sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bandas', 'amuletos' o quizá 'velos'; el término hebreo es raro y su referente exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: O 'para caza' o 'para captura'; la expresión hebrea probablemente comunica estar sujeto a una captura depredadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַעְתִּי
  english_pob_choice: I will tear off
  chosen_spanish: Romperé
  alternatives_spanish:
  - Arrancaré
  - Romperé y arrancaré
  lexicon: HALOT
  rationale: El hebreo קָרַע puede expresar 'rasgar, romper, desgarrar'. En español, 'romper' comunica con naturalidad la acción de deshacer o anular el objeto, y en este contexto funciona bien con 'bandas' sin sonar forzado. 'Arrancaré' es posible, pero 'romperé' conserva mejor la idea general de ruptura del objeto.
- source_word: מִסְפְּחֹתֵיכֶם
  english_pob_choice: your magic bands
  chosen_spanish: sus bandas mágicas
  alternatives_spanish:
  - sus bandas
  - sus amuletos
  - sus velos
  lexicon: HALOT
  rationale: 'Se mantiene la incertidumbre léxica del término raro, pero se preserva la lectura contextual dada por la POB inglesa: objetos vinculados con prácticas engañosas o ocultistas. ''Bandas mágicas'' refleja esa función sin precisar más de lo que el hebreo permite. Se usa ''sus'' en español para concordar con el plural y con el sujeto plural implícito del discurso.'
- source_word: הִצַּלְתִּי
  english_pob_choice: I will deliver
  chosen_spanish: libraré
  alternatives_spanish:
  - rescataré
  - liberaré
  lexicon: HALOT
  rationale: נצל expresa sacar de un poder hostil. 'Libraré' comunica bien la liberación concreta de una situación de dominio, y suena natural en español bíblico contemporáneo. 'Rescataré' y 'liberaré' también son viables, pero 'libraré' mantiene la fuerza de 'deliver' sin perder claridad.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo
  lexicon: HALOT
  rationale: Expresión de pacto estándar; 'mi pueblo' es la forma más directa y estable en español bíblico.
- source_word: מִיֶּדְכֶן / בְּיֶדְכֶן
  english_pob_choice: from your hand / in your hand
  chosen_spanish: de tu mano / en tu mano
  alternatives_spanish:
  - de tu poder / en tu poder
  - de vuestra mano / en vuestra mano
  lexicon: HALOT
  rationale: Se conserva la metáfora de 'mano' para mantener la repetición retórica del hebreo y la imagen de control o dominio. Se opta por el singular 'tu' porque el discurso del versículo en español puede dirigirse de forma colectiva a un destinatario representativo sin perder la fuerza del original.
- source_word: לִמְצוּדָה
  english_pob_choice: as prey
  chosen_spanish: como presa
  alternatives_spanish:
  - para captura
  - como presa de caza
  - como botín
  lexicon: HALOT
  rationale: El contexto apunta a ser objeto de captura depredadora. 'Presa' transmite con naturalidad esa idea en español y conserva el matiz de victimización. 'Botín' sería menos exacto, y 'para captura' suena más explicativo que bíblico.
- source_word: וִידַעְתֶּן
  english_pob_choice: then you will know
  chosen_spanish: Entonces sabrás
  alternatives_spanish:
  - Y sabrás
  - Entonces sabréis
  lexicon: HALOT
  rationale: El hebreo aporta consecuencia; 'Entonces' expresa bien ese resultado. Se usa el singular 'sabrás' por la alternancia natural del discurso directo profético en español, manteniendo el tono de confrontación inmediata.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'La POB española debe seguir la convención del proyecto para el Tetragrama: ''Yahvé''. Es la forma castellana estable del nombre divino y preserva el valor de nombre propio frente a una sustitución por título.'
theological_decisions:
- issue: Renderización del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre divino como nombre propio, no como sustituto reverencial. 'Yahvé' es la forma editorial estándar del proyecto en español y corresponde a la decisión doctrinal de no ocultar el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Caracterización de מִסְפְּחֹתֵיכֶם
  english_pob_reading: magic bands
  chosen_spanish_reading: bandas mágicas
  alternative_spanish_readings:
  - bandas
  - amuletos
  - velos
  rationale: 'El contexto inmediato de Ezequiel 13 denuncia prácticas engañosas/ocultas. ''Bandas mágicas'' mantiene la cautela del inglés POB: sugiere función ritual o manipuladora sin afirmar más sobre la forma exacta del objeto.'
  doctrine_reference: English audit trail lexical decision for מִסְפְּחֹתֵיכֶם
- issue: Metáfora de 'mano' como dominio
  english_pob_reading: from your hand / in your hand
  chosen_spanish_reading: de tu mano / en tu mano
  alternative_spanish_readings:
  - de tu poder / en tu poder
  rationale: No se elimina la metáfora hebrea. 'Mano' conserva la imagen de poder/control y la repetición retórica del verso, importante para el efecto profético.
  doctrine_reference: HALOT semantic range for יד
- issue: Sentido de לִמְצוּדָה
  english_pob_reading: as prey
  chosen_spanish_reading: como presa
  alternative_spanish_readings:
  - para captura
  - como presa de caza
  rationale: Se evita suavizar el trasfondo depredador del término. 'Presa' reproduce la idea de ser cazado/capturado, tal como indica el audit trail inglés.
  doctrine_reference: HALOT semantic range for מצודה
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo y el rastro auditado en inglés sin cambios sustantivos respecto del sentido ya aprobado en la revisión más reciente; se mantienen la metáfora de la mano, la ambigüedad del objeto raro y el nombre divino según la norma editorial del proyecto.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se mantiene la metáfora corporal 'mano' en lugar de sustituirla por 'poder', para conservar la repetición hebrea.
  - '''Presa'' y ''bandas mágicas'' reflejan el tono concreto y la cautela semántica del audit trail inglés.'
  - El versículo se presenta en una sola línea fluida, apta para publicación, sin explicaciones intrusivas en el cuerpo principal.
