revisions:
- from: Porque la palabra está muy cerca de ti[a], en tu boca y en tu corazón, para que la cumplas.
  to: Porque la palabra está muy cerca de ti[a], en tu boca y en tu corazón, para que la hagas.
  rationale: Se reemplaza «la cumplas» por «la hagas» para reflejar con mayor fidelidad לַעֲשֹׂתוֹ y evitar una interpretación más estrecha que la del original y la del audit trail inglés. Aunque «hacer la palabra» es algo menos idiomático que «cumplirla», aquí preserva mejor la relación léxica y teológica entre «la palabra» y «hacerla» sin convertirla explícitamente en «mandamiento».
