  language: en
  yaml_path: translation/ot/joshua/018/019.yaml
  text: Then the border passed to the northern shoulder of Beth-hoglah[a], and the border ended at the northern tongue of the Salt Sea, at the southern end of the Jordan[b]. This is the southern border.
  footnotes:
