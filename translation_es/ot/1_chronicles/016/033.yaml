review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: temporalidad (''Entonces''), personificación poética de ''los árboles del bosque'', presencia divina ''delante de Yahvé'', y la razón causal ''porque viene a juzgar''. También conserva correctamente el alcance cósmico de הָאָרֶץ como ''la tierra'' y el nombre divino como ''Yahvé''. Sin embargo, hay un desajuste terminológico con la forma española documentada para יְרַנְּנוּ: el inglés POB eligió ''will sing for joy'', pero el español pone ''cantarán de gozo'', que es aceptable semánticamente aunque menos idiomático y algo más rígido que ''cantarán con alegría'' o ''cantarán de alegría''.'
  spanish_quality_summary: La frase es clara, digna y ampliamente legible. El punto principal a reparar es la naturalidad de 'cantarán de gozo', que suena algo calcada en español contemporáneo. Además, la nota [b] con 'está viniendo a juzgar la tierra' resulta menos natural en español bíblico que 'viene a juzgar la tierra' o 'está por venir a juzgar la tierra', y conviene ajustar la alternativa para sonar idiomática sin perder el matiz aspectual. La nota [c] con 'el país' es demasiado moderna/coloq. para este registro; 'la tierra' / 'el país' no es un error grave, pero 'la tierra' / 'la región' o simplemente mantener la explicación local sería más digno.
  glossary_alignment: Se alinea bien con la terminología del proyecto al usar 'Yahvé' para יְהוָה y 'la tierra' para הָאָרֶץ en contexto cósmico. No hay conflicto doctrinal relevante. El resto de las decisiones léxicas son generalmente fieles al expediente inglés y al hebreo.
  issues:
  - severity: medium
    issue: '''cantarán de gozo'' suena poco idiomático en español natural'
    rationale: Aunque transmite bien el sentido de יְרַנְּנוּ, en español moderno y digno suena más natural 'cantarán con alegría' o 'cantarán de alegría'. Esto mejora legibilidad sin perder la fuerza poética ni la alineación con 'sing for joy'.
  - severity: low
    issue: La nota [b] usa 'está viniendo a juzgar la tierra', formulación poco natural
    rationale: La nota pretende preservar la alternativa aspectual del hebreo, pero esa redacción es torpe en español. Conviene usar una alternativa más idiomática, como 'está por venir a juzgar la tierra' o explicar el valor de inminencia/certidumbre sin forzar una perífrasis extraña.
  - severity: low
    issue: La nota [c] con 'el país' rebaja el registro y no es la mejor alternativa para הָאָרֶץ
    rationale: Aunque semánticamente posible en ciertos contextos, 'el país' suena más contemporáneo-político que bíblico. 'La tierra' con explicación de sentido local ya basta, o se puede mencionar 'la región' si se desea explicitar la lectura más local.
  revised_spanish_text: Entonces los árboles del bosque cantarán de alegría[a] delante de Yahvé, porque viene[b] a juzgar la tierra[c].
  revised_footnotes:
