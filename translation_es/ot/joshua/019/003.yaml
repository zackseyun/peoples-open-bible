translation:
  language: es
  text: Hazar-shual[a], Balah y Ezem[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Hazar-shual es un nombre de lugar compuesto; literalmente, «asentamiento del zorro» o «aldea del zorro». Se conserva transliterado por tratarse de un topónimo.
    reason: lexical_alternative
  - marker: b
    text: Algunas versiones traducen «Baalah» en lugar de «Balah», y «Azem» en lugar de «Ezem». Estas son transliteraciones alternativas o armonizaciones con formas afines del nombre de lugar.
