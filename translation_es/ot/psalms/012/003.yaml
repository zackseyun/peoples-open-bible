translation:
  language: es
  text: Hablan vaciedades[a], cada hombre a su prójimo; con labios lisonjeros[b], con doble corazón hablan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «vaciedad»; el hebreo puede abarcar vaciedad, falsedad o inutilidad del habla.
    reason: lexical_alternative
  - marker: b
    text: 'O: «con labios suaves»; la imagen hebrea sugiere un habla lisa, halagadora y por eso engañosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  english_pob_choice: emptiness
  chosen_spanish: vanidad
  alternatives_spanish:
  - vacío
  - falsedad
  - mentira
  lexicon: HALOT
  rationale: שָׁוְא abarca lo vacío, falso o sin valor. En español, «vanidad» conserva bien la idea de vaciedad e inutilidad en el habla, sin reducir el sentido solo a una mentira factual.
- source_word: יְדַבְּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablan
  alternatives_spanish:
  - dicen
  - hablan
  lexicon: HALOT
  rationale: El verbo comunica el acto de hablar y aparece repetido en el verso. «Hablan» es natural en español y preserva el paralelismo verbal.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - todos
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo. «Cada hombre» conserva esa fuerza representativa mejor que una formulación más general.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su compañero
  - a su amigo
  lexicon: HALOT
  rationale: רֵעַ puede ser vecino, compañero o allegado. «Prójimo» comunica bien la relación interpersonal amplia y es comprensible en registro bíblico sin exigir una relación meramente local.
- source_word: שְׂפַת חֲלָקוֹת
  english_pob_choice: with flattering lips
  chosen_spanish: con labios lisonjeros
  alternatives_spanish:
  - con labios suaves
  - con labios lisos
  - con labios halagadores
  lexicon: HALOT
  rationale: La expresión literal es «labio de cosas suaves/suavidad». «Lisonjeros» transmite la idea de habla halagadora y engañosa de modo natural en español, manteniendo el matiz de suavidad seductora.
- source_word: בְּלֵב וָלֵב
  english_pob_choice: with a double heart
  chosen_spanish: con corazón y corazón
  alternatives_spanish:
  - con un doble corazón
  - con un corazón dividido
  - doblemente
  lexicon: HALOT
  rationale: La frase hebrea es casi literal «con corazón y corazón», una imagen de duplicidad interior. Se preserva la tensión del hebreo en español, en vez de reemplazarla de inmediato por una explicación interpretativa.
- source_word: יְדַבֵּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablan
  alternatives_spanish:
  - dicen
  - hablan
  lexicon: HALOT
  rationale: La repetición final de «hablan» refleja el cierre enfático del hebreo y mantiene la cadencia poética del verso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la elección inglesa auditada. Se evita paraphrasear «con corazón y corazón» hacia una equivalencia interpretativa, para conservar la imagen idiomática y su tensión de duplicidad interior.
  spanish_consistency_notes:
  - Se mantiene «hablan» dos veces para reflejar la repetición del hebreo.
  - «Prójimo» conserva el sentido relacional amplio de רֵעֵהוּ sin estrecharlo a un vecino literal.
  - Se usa «vanidad» como equivalente español de vaciedad/falsedad, en lugar de un calco más oscuro o de «mentira» que reduciría el campo semántico.
