translation:
  language: es
  text: Un burlador busca sabiduría y no la hay[a], pero el conocimiento le resulta fácil a quien tiene entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero no la encuentra». El hebreo dice literalmente: «y no hay / no la hay».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «al que tiene entendimiento». La expresión es gramaticalmente masculina singular, pero funciona de manera proverbial como referencia a la persona caracterizada por discernimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּקֶּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - busca
  - procura
  - anda en busca de
  lexicon: HALOT
  rationale: El qatal en proverbios expresa una verdad general; en español, el presente gnómico 'busca' comunica mejor el valor proverbial que un pasado. 'Busca' conserva el sentido activo de intentar obtener.
- source_word: לֵץ
  english_pob_choice: scoffer
  chosen_spanish: burlador
  alternatives_spanish:
  - burlador
  - mofador
  - escarnecedor
  lexicon: HALOT
  rationale: לֵץ describe a quien desprecia con burla arrogante. 'Burlador' es natural en español y transmite bien esa actitud; evita un arcaísmo innecesario.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: Render estándar y adecuado en Proverbios. Mantiene la dimensión moral y práctica del término.
- source_word: וָאָיִן
  english_pob_choice: and there is none
  chosen_spanish: y no la hay
  alternatives_spanish:
  - y no la hay
  - y no existe
  - pero no la encuentra
  lexicon: HALOT
  rationale: El hebreo es existencial, literalmente 'y no hay'. En español, 'no la hay' preserva esa fuerza con fluidez natural. Se conserva la tensión de la búsqueda frustrada sin añadir una interpretación distinta.
- source_word: וְדַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocimiento
  - saber
  lexicon: HALOT
  rationale: '''Conocimiento'' encaja bien con el paralelismo sapiencial y con el matiz de comprensión adquirida. ''Sabiduría'' ya traduce el primer cola, por lo que conviene diferenciar ambos términos.'
- source_word: לְנָבוֹן
  english_pob_choice: one who has understanding
  chosen_spanish: quien tiene entendimiento
  alternatives_spanish:
  - el que tiene entendimiento
  - una persona con entendimiento
  - el entendido
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular, usada proverbialmente. En español, 'quien tiene entendimiento' conserva el sentido representativo sin forzar el masculino 'hombre' cuando el contexto no lo exige en la formulación final.
- source_word: נָקָל
  english_pob_choice: comes easily
  chosen_spanish: le resulta fácil
  alternatives_spanish:
  - le resulta fácil
  - es fácil
  - se obtiene fácilmente
  lexicon: HALOT
  rationale: El término expresa facilidad o prontitud. 'Le resulta fácil' suena natural en español con el complemento de persona implícito y refleja la relación con el entendido.
theological_decisions:
- issue: Masculino representativo en la forma hebrea לְנָבוֹן
  english_pob_reading: one who has understanding
  chosen_spanish_reading: quien tiene entendimiento
  alternative_spanish_readings:
  - a un hombre entendido
  - al entendido
  - a quien entiende
  rationale: La revisión inglesa reciente prefirió una formulación más cercana al hebreo y menos marcada por género. En español, 'quien tiene entendimiento' comunica el valor proverbial y representativo sin perder la referencia a la persona caracterizada por discernimiento.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Valor existencial de וָאָיִן
  english_pob_reading: and there is none
  chosen_spanish_reading: y no la hay
  alternative_spanish_readings:
  - y no existe
  - pero no la encuentra
  rationale: La frase hebrea es literal y existencial. 'Y no la hay' mantiene esa tensión textual sin convertirla en una conclusión más interpretativa como 'pero no la encuentra'.
  doctrine_reference: DOCTRINE.md § Fidelity to source wording
translation_notes:
  revision_awareness: 'La redacción española sigue el contexto auditado del inglés POB y su revisión más reciente: conserva el presente gnómico para el primer cola y alinea el segundo con la formulación revisada ''one who has understanding'', evitando un masculino explícito en el cuerpo principal mientras mantiene la nota de la forma hebrea.'
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para חָכְמָה y 'conocimiento' para דַּעַת, preservando el paralelismo sapiencial.
  - Se evitó 'SEÑOR' u otra convención de sustitución innecesaria; el versículo no contiene el nombre divino.
  - La puntuación refleja la antítesis del proverbio con coma y 'pero' para una lectura natural en español.
  - La nota a marca la alternativa interpretativa documentada en el audit trail sin sobrecargar el texto principal.
