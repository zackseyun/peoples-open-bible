  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: כָּל distributivo con עֹרֵב y la fórmula clasificatoria לְמִינוֹ. ''Todo cuervo'' y ''según su especie'' comunican bien el sentido de la lista de aves impuras. Sin embargo, la nota léxica no preserva fielmente la alternativa documentada en el POB inglés, porque introduce formas impropias o no españolas (''raven'', ''corvo'') y mezcla familias léxicas distintas (''cuervo/corneja'') de manera confusa.'
  spanish_quality_summary: El texto principal es natural y legible en español eclesial moderno. 'Todo cuervo según su especie' suena idiomático en el contexto legal. La única reparación necesaria es la nota al pie, para que sea español natural y útil al lector.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La decisión principal, עֹרֵב -> 'cuervo', es defendible en español como equivalente natural de 'raven' con nota alternativa. 'Según su especie' también encaja bien con לְמִינוֹ.
  issues:
  - severity: medium
    issue: Nota al pie con alternativas no españolas o inadecuadas
    rationale: La nota dice "raven/corvo", pero 'raven' está en inglés y 'corvo' no es la opción normal en español bíblico general. Esto no preserva bien la racionalidad léxica del POB ni la legibilidad del proyecto.
  - severity: low
    issue: La nota mezcla 'cuervo/corneja' sin explicar claramente la alternativa principal
    rationale: El POB inglés conserva una alternativa simple ('crow'). En español conviene una alternativa clara y natural, p. ej. 'corneja', explicando que el hebreo puede abarcar más ampliamente a los córvidos.
  revised_spanish_text: todo cuervo[a] según su especie.
  revised_footnotes:
  - marker: a
    text: O 'toda corneja según su especie'. El término hebreo probablemente se refiere de manera amplia a la familia del cuervo, aunque 'cuervo' es la traducción estándar en español.
    reason: lexical_alternative
