translation:
  language: es
  text: Y se levantaron contra ellos desde la emboscada y los mataron; y muchos cayeron heridos[a], y los demás huyeron al monte, y se apoderaron de todos sus pertrechos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos cayeron como bajas». El griego τραυματίαι puede referirse a heridos o, en sentido más amplio, a bajas de combate.
    reason: lexical_alternative
  - marker: b
    text: O «su bagaje» o «su equipo». El griego σκεύη es un término amplio para objetos o equipo; aquí el contexto militar favorece pertrechos o pertenencias de campaña.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστησαν
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se levantaron contra
  lexicon: LSJ
  rationale: El griego conserva la imagen de levantarse, y en contexto bélico implica un ataque súbito. «Se levantaron» mantiene esa imagen en español; con «contra ellos» expresa el valor hostil del movimiento sin volverlo innecesariamente literal.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - contra
  lexicon: LSJ
  rationale: Con el verbo hostil del contexto, «contra ellos» comunica mejor la fuerza adversativa que un «sobre ellos» más mecánico.
- source_word: ἀπὸ τοῦ ἐνέδρου
  english_pob_choice: from the ambush
  chosen_spanish: desde la emboscada
  alternatives_spanish:
  - desde el escondite
  - desde la celada
  lexicon: LSJ
  rationale: «Emboscada» es el equivalente natural de ἐνέδρου en un relato militar. «Desde la emboscada» conserva la idea de que los atacantes salieron de un puesto oculto.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: los mataron
  alternatives_spanish:
  - los mataron a espada
  - los mataron
  lexicon: LSJ
  rationale: El verbo griego es el término normal para matar; «los mataron» es directo y fiel, sin arcaísmo.
- source_word: ἔπεσαν τραυματίαι πολλοί
  english_pob_choice: many fell wounded
  chosen_spanish: muchos cayeron heridos
  alternatives_spanish:
  - muchos cayeron como heridos
  - muchos cayeron como bajas
  lexicon: LSJ
  rationale: τραυματίαι puede significar heridos o bajas. «Cayeron heridos» mantiene tanto la caída en combate como el resultado físico, sin afirmar más de lo que el griego exige.
- source_word: οἱ ἐπίλοιποι
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - los restantes
  - el resto
  lexicon: LSJ
  rationale: «Los demás» es natural en español y reproduce el grupo remanente de los sobrevivientes.
- source_word: ἔφυγον εἰς τὸ ὄρος
  english_pob_choice: fled to the mountain
  chosen_spanish: huyeron al monte
  alternatives_spanish:
  - huyeron a la montaña
  - huyeron al monte
  lexicon: LSJ
  rationale: El singular griego «el monte/la montaña» se conserva mejor con «al monte». En español bíblico suena natural y no diluye la referencia concreta.
- source_word: τὰ σκεύη αὐτῶν
  english_pob_choice: their equipment
  chosen_spanish: sus pertrechos
  alternatives_spanish:
  - su equipo
  - sus bagajes
  - sus bienes
  lexicon: LSJ
  rationale: En contexto militar, σκεύη puede referirse a equipo, bagaje o pertenencias de campaña. «Pertenencias» sería demasiado general; «pertrechos» comunica mejor el despojo militar sin restringirlo a utensilios domésticos.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete 1909 y el auditable POB inglés. Se mantuvo la secuencia narrativa, sin suavizar el golpe militar ni desplazar el singular de «el monte». La principal decisión léxica en español fue elegir términos naturales que preservan la imagen bélica: «emboscada», «cayeron heridos» y «pertrechos».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología cultual no pertinente; el versículo no contiene nombres divinos ni títulos cristológicos.
  - «Monte» conserva el singular del griego; no se interpretó como «montes» o «montaña» para no diluir la imagen.
  - «Pertrechos» funciona mejor que «bienes» o «bagajes» por el marco militar y el acto de despojo.
