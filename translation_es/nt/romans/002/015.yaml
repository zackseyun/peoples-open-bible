    issue: La nota [b] no coincide con la alternativa documentada en el POB inglés.
    rationale: El inglés preserva como alternativa «their thoughts accuse or even defend them» frente al sentido más literal recíproco «one another». La nota española introduce «los excusan», que corresponde a otra alternativa léxica posible de ἀπολογέομαι, pero no a la alternativa específica que el audit trail quiso conservar aquí.
  revised_spanish_text: Ellos muestran que la obra de la ley está escrita en sus corazones[a], mientras su conciencia también da testimonio y sus pensamientos los acusan o incluso los defienden[b].
  revised_footnotes:
