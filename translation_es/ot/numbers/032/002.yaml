translation:
  language: es
  text: 'Entonces vinieron los hijos de Gad y los hijos de Rubén, y dijeron a Moisés, al sacerdote Eleazar y a los jefes[a] de la congregación, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los príncipes de la congregación'. El hebreo también puede entenderse como 'los jefes principales' o 'los líderes de la congregación'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹ֥אוּ
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: El verbo hebreo avanza la acción narrativa con la idea de ir a encontrarse o presentarse ante alguien. En español, 'se acercaron' comunica mejor la dirección hacia Moisés y los demás destinatarios que un simple 'vinieron', sin añadir interpretación excesiva.
- source_word: בְנֵי גָ֖ד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  - los descendientes de Gad
  lexicon: HALOT
  rationale: Se conserva la expresión filial literal del hebreo, que el texto inglés también preserva. 'Hijos de Gad' es transparente y mantiene la forma tribal del original.
- source_word: וּבְנֵי רְאוּבֵ֑ן
  english_pob_choice: and the sons of Reuben
  chosen_spanish: y los hijos de Rubén
  alternatives_spanish:
  - y los rubenitas
  - y los descendientes de Rubén
  lexicon: HALOT
  rationale: Se mantiene la construcción paralela con la del grupo anterior. 'Rubén' sigue la forma castellana usual del nombre propio bíblico.
- source_word: וַיֹּאמְר֤וּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - expusieron
  lexicon: HALOT
  rationale: El hebreo usa el verbo común de habla. 'Dijeron' es la correspondencia más directa y natural en español, y conserva la sencillez narrativa del original.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce los destinatarios del discurso. En español, 'a' es la opción directa y natural para marcar el objeto indirecto de la palabra.
- source_word: אֶלְעָזָ֣ר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: el sacerdote Eleazar
  alternatives_spanish:
  - Eleazar, el sacerdote
  - Eleazar el sacerdote
  lexicon: HALOT
  rationale: Se invierte el orden para sonar natural en español, pero se conserva la identificación oficial. 'Sacerdote' mantiene el valor del oficio sin necesidad de una glosa adicional.
- source_word: נְשִׂיאֵ֥י הָעֵדָ֖ה
  english_pob_choice: the leaders of the congregation
  chosen_spanish: los jefes de la congregación
  alternatives_spanish:
  - los líderes de la congregación
  - los principales de la congregación
  lexicon: HALOT
  rationale: נשיאים puede referirse a jefes, príncipes o líderes. 'Jefes' reproduce bien el peso de autoridad sin sonar arcaico. 'Congregación' conserva el término comunitario tradicional del Pentateuco.
- source_word: לֵאמֹֽר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron lo siguiente
  - con estas palabras
  lexicon: HALOT
  rationale: Como infinitivo de introducción del discurso, 'diciendo' es la forma más natural y fiel en español. Mantiene el valor formular de introducción sin añadir contenido.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'spoke to' a 'said to' para corresponder más de cerca a וַיֹּאמְרוּ; la versión española sigue esa decisión con 'dijeron'. También se preservó la transparencia de las designaciones tribales y del grupo destinatario, evitando una paráfrasis que diluyera el paralelismo hebreo.
  spanish_consistency_notes:
  - Se usa 'hijos de' de forma consistente para בְנֵי, en línea con la transparencia del POB.
  - Se mantiene 'congregación' para הָעֵדָה, conforme al registro pentateucal del término.
  - Se evita 'príncipes' como opción principal porque en español puede sugerir nobleza monárquica más que jefatura tribal.
