translation:
  language: es
  text: Entonces Balac, hijo de Zipor, rey de Moab, se levantó[a] y combatió contra Israel[b]. Envió y llamó a Balaam, hijo de Beor, para maldecirlos a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alzó». El verbo hebreo puede marcar el inicio de una acción decisiva, no solo el acto físico de ponerse de pie.
    reason: lexical_alternative
  - marker: b
    text: O «hizo guerra contra Israel» o «fue a la guerra contra Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en marcha
  lexicon: HALOT
  rationale: El verbo קום en narración puede señalar el inicio de una acción decisiva, no solo la acción física de ponerse de pie. «Se levantó» conserva esa fuerza narrativa en español y sigue de cerca la decisión inglesa de no reducirlo a mera postura.
- source_word: בָּלָק בֶּן צִפּוֹר
  english_pob_choice: Balak son of Zippor
  chosen_spanish: Balac, hijo de Zipor
  alternatives_spanish:
  - Balac hijo de Zipor
  lexicon: Convención de transliteración del proyecto
  rationale: Se transliteran los nombres propios de forma estándar en español. Se mantiene la relación filial con «hijo de» para reflejar la estructura hebrea.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: king of Moab
  chosen_spanish: rey de Moab
  alternatives_spanish:
  - monarca de Moab
  lexicon: Uso común bíblico en español
  rationale: «Rey de Moab» reproduce con naturalidad la construcción de estado y evita una paráfrasis innecesaria.
- source_word: וַיִּלָּחֶם בְּיִשְׂרָאֵל
  english_pob_choice: fought against Israel
  chosen_spanish: combatió contra Israel
  alternatives_spanish:
  - peleó contra Israel
  - hizo guerra contra Israel
  lexicon: HALOT
  rationale: La preposición ב con לחם expresa enfrentamiento hostil. «Combatió contra Israel» conserva el sentido adversativo y suena natural en español. Se evita suavizarlo como simple enfrentamiento neutral.
- source_word: וַיִּשְׁלַח וַיִּקְרָא
  english_pob_choice: He sent and called
  chosen_spanish: Envió y llamó
  alternatives_spanish:
  - Envió y mandó llamar
  - Envió y convocó
  lexicon: HALOT
  rationale: Se mantienen los dos verbos consecutivos del hebreo para respetar el ritmo y la secuencia de la acción. «Llamó» refleja bien el valor de קרא sin añadir un objeto no explicitado.
- source_word: לְבִלְעָם בֶּן בְּעוֹר
  english_pob_choice: Balaam son of Beor
  chosen_spanish: a Balaam, hijo de Beor
  alternatives_spanish:
  - a Balaam hijo de Beor
  lexicon: Convención de transliteración del proyecto
  rationale: Se conserva la forma de nombre propia de la tradición bíblica y la relación filial del original.
- source_word: לְקַלֵּל אֶתְכֶם
  english_pob_choice: to curse you
  chosen_spanish: para maldecirlos
  alternatives_spanish:
  - para maldeciros
  - para pronunciar maldición sobre ustedes
  lexicon: HALOT
  rationale: קלל aquí expresa la acción de invocar maldición. «Maldecirlos» es directo y fiel. Se usa pronombre de tercera persona plural en español porque el referente inmediato son Israel/Balac y el discurso está dirigido al pueblo en plural en el contexto de Josué 24.
theological_decisions:
- issue: Alcance de וַיִּלָּחֶם בְּיִשְׂרָאֵל en una retrospectiva histórica
  english_pob_reading: Retain the plain sense 'fought against Israel' as stated in Joshua's summary speech.
  chosen_spanish_reading: 'Mantener un verbo de combate explícito: «combatió contra Israel».'
  alternative_spanish_readings:
  - «hizo guerra contra Israel»
  - «actuó hostilmente contra Israel»
  rationale: El hebreo declara hostilidad militar con לחם + ב. No se atenúa el enunciado para armonizarlo con otros pasajes narrativos sobre Balaam y Balac. La traducción debe conservar la afirmación tal como aparece en Josué 24:9.
  doctrine_reference: Principios de fidelidad textual y no armonización interpretativa
- issue: Pronombre objeto en לְקַלֵּל אֶתְכֶם dentro del discurso de Josué
  english_pob_reading: to curse you
  chosen_spanish_reading: «para maldecirlos»
  alternative_spanish_readings:
  - «para maldecirlos a ustedes»
  - «para maldecir a ustedes»
  rationale: En español, el antecedente plural de segunda persona de אֶתְכֶם se expresa con claridad mediante un pronombre enclítico de tercera persona plural cuando el contexto ya identifica al pueblo destinatario. La elección evita una construcción menos natural y mantiene la referencia colectiva.
  doctrine_reference: Claridad referencial en discurso directo bíblico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que únicamente añadió la puntuación final y confirmó que la traducción subyacente estaba completa. La presente versión española incorpora esa terminación cerrada con punto final.
  spanish_consistency_notes:
  - Se conserva la transliteración Balac/Zipor/Beor/Balaam conforme a las convenciones del proyecto.
  - 'Se mantiene el paralelismo verbal del hebreo: «se levantó… y combatió… Envió y llamó…».'
  - Se evita sustituir el lenguaje de combate por una formulación más vaga, siguiendo el criterio auditado de no suavizar לחם + ב.
  - El tono es formal y publicable, con sintaxis española natural sin perder la estructura del original.
