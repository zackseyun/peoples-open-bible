translation:
  language: es
  text: 'Y Dios dijo[a]: «Esta es la señal de la alianza que yo doy entre mí y ustedes y entre toda criatura viviente que está con ustedes, por generaciones perpetuas[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que yo estoy dando». El hebreo usa un participio que literalmente significa «dando»; se conserva ese valor con «doy».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por generaciones eternas» o «a través de todas las generaciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / אמר
  english_pob_choice: And God said
  chosen_spanish: Y Dios dijo
  alternatives_spanish:
  - Entonces Dios dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y» conserva la secuencia sin sobrecargar el valor temporal. «Dijo» refleja el verbo de habla de forma natural y fiel.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto el referente es el Dios único que habla a Noé. «Dios» es la forma española clara y estándar.
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Esta
  lexicon: HALOT
  rationale: 'El demostrativo introduce e identifica lo que sigue; en español se requiere la cópula: «Esta es...». Mantiene la referencia inmediata a la señal del pacto.'
- source_word: אוֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - marca
  - señal visible
  lexicon: HALOT
  rationale: «אוֹת» puede ser «señal» o «marca». En español, «señal» comunica bien el valor visible y reconocible del arco como signo del pacto.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: En el español bíblico contemporáneo, «pacto» comunica con claridad el término de relación establecida. Se evita imponer «alianza» si no se busca una terminología eclesial más marcada.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  english_pob_choice: that I am giving
  chosen_spanish: que yo doy
  alternatives_spanish:
  - que yo estoy dando
  - que yo entrego
  lexicon: HALOT
  rationale: El participio hebreo significa literalmente «dando». Se conserva ese valor con «doy», siguiendo la revisión inglesa que prefirió acercarse más al hebreo. En español suena natural sin introducir «hacer» el pacto.
- source_word: בֵּינִי וּבֵינֵיכֶם וּבֵין
  english_pob_choice: between me and you and
  chosen_spanish: entre mí y ustedes, y entre
  alternatives_spanish:
  - entre yo y ustedes, y entre
  - entre mí y vosotros, y entre
  lexicon: HALOT
  rationale: Se preserva la estructura relacional del hebreo con la repetición de «entre». «Ustedes» mantiene el registro neutral latinoamericano y el destinatario plural.
- source_word: כָּל נֶפֶשׁ חַיָּה
  english_pob_choice: every living creature
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo ser vivo
  lexicon: HALOT
  rationale: «נֶפֶשׁ חַיָּה» abarca aquí la vida animal acompañante de Noé. «Ser viviente» conserva amplitud sin cargar «alma» con un sentido antropológico indebido.
- source_word: אֲשֶׁר אִתְּכֶם
  english_pob_choice: that is with you
  chosen_spanish: que está con ustedes
  alternatives_spanish:
  - que está con vosotros
  - que acompaña a ustedes
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los seres vivientes que están junto a Noé y su familia. «Está con ustedes» es idiomático y preciso.
- source_word: לְדֹרֹת עוֹלָם
  english_pob_choice: for perpetual generations
  chosen_spanish: por generaciones perpetuas
  alternatives_spanish:
  - por generaciones eternas
  - por todas las generaciones
  lexicon: HALOT
  rationale: Se conserva el valor de continuidad generacional junto con la permanencia de עוֹלָם. «Perpetuas» mantiene dignidad y evita una paráfrasis más extensa.
theological_decisions:
- issue: Alcance de נֶפֶשׁ חַיָּה
  english_pob_reading: every living creature
  chosen_spanish_reading: todo ser viviente
  alternative_spanish_readings:
  - toda criatura viviente
  - todo ser vivo
  rationale: En el contexto del pacto noájico se incluye la vida animal. Se evita «alma», porque en español puede sugerir un contenido antropológico no presente aquí.
  doctrine_reference: Preservar el sentido del contexto sin importar antropología ajena al pasaje
- issue: Relación del verbo נֹתֵן con el pacto
  english_pob_reading: that I am giving
  chosen_spanish_reading: que yo doy
  alternative_spanish_readings:
  - que yo estoy dando
  - que yo entrego
  rationale: Se mantiene la literalidad del participio hebreo y la revisión inglesa más cercana al original. No se traduce como «hago» para no desplazar el matiz de dar/ofrecer que trae el hebreo.
  doctrine_reference: 'Translation philosophy: fidelidad semántica y naturalidad española'
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «making» a «giving» para acercarse más a נֹתֵן. Esta versión española refleja esa corrección con «doy», sin perder la naturalidad del español ni forzar una expresión como «hacer un pacto» que el hebreo no exige aquí.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «pacto» para בְּרִית en coherencia con el registro bíblico español del proyecto.
  - Se prefiere «ser viviente» para נֶפֶשׁ חַיָּה a fin de evitar el falso amigo «alma» en este contexto.
  - Se mantiene el orden relacional con «entre... y entre...» para reflejar la triple preposición hebrea.
  - El registro es neutral latinoamericano con «ustedes» para el plural del destinatario.
