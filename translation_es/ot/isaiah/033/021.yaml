translation:
  language: es
  text: Pero allí el majestuoso Yahvé será para nosotros un lugar de ríos[a], de corrientes anchas[b], por donde no puede pasar ningún barco de remo[c], ni nave poderosa lo atravesará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «allí el majestuoso Yahvé será para nosotros un lugar de ríos y corrientes anchas»; el hebreo presenta dos términos acuáticos en paralelo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «anchos de manos», un modismo para aguas muy anchas.'
    reason: cultural_note
  - marker: c
    text: 'O: «embarcación de remos»; la frase hebrea se refiere a una nave usada en navegación activa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - Pero
  lexicon: HALOT
  rationale: La expresión introduce contraste fuerte; en español 'Pero' comunica bien la oposición sin sonar arcaico o forzado.
- source_word: אַדִּיר יְהוָה
  english_pob_choice: the majestic Yahweh
  chosen_spanish: Yahvé, en su majestad
  alternatives_spanish:
  - el majestuoso Yahvé
  - Yahvé majestuoso
  - Yahvé en majestad
  lexicon: HALOT
  rationale: אַדִּיר expresa grandeza, majestad y poder. En español, 'en su majestad' conserva el valor descriptivo sin convertirlo en un epíteto rígido o poco natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrámaton se vierte ''Yahvé'' para preservar el nombre divino personal, no una sustitución por título.'
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - en favor de nosotros
  lexicon: HALOT
  rationale: Marca beneficio o provecho; 'para nosotros' expresa con claridad la relación de favor y protección.
- source_word: מְקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - una región
  lexicon: HALOT
  rationale: '''Lugar'' mantiene la concreción del sustantivo sin perder la imagen metafórica del texto.'
- source_word: נְהָרִים יְאֹרִים
  english_pob_choice: of rivers, of broad streams
  chosen_spanish: de ríos, de anchos corrientes
  alternatives_spanish:
  - de ríos, de amplios canales
  - de ríos, de corrientes anchas
  lexicon: HALOT
  rationale: Los dos términos acuáticos se mantienen diferenciados. 'Corrientes' es más natural en español para יְאֹרִים, sin borrar la idea de abundancia y defensa.
- source_word: רַחֲבֵי יָדָיִם
  english_pob_choice: broad streams
  chosen_spanish: anchos corrientes
  alternatives_spanish:
  - corrientes amplias
  - corrientes muy anchas
  - anchas de manos
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de gran anchura. No se traduce literalmente 'de manos' en el texto principal porque sería opaco en español, pero se deja constancia en la nota.
- source_word: בַּל תֵּלֶךְ בּוֹ
  english_pob_choice: where no rowing ship can go
  chosen_spanish: por donde no pasará barco de remo
  alternatives_spanish:
  - por donde no irá embarcación de remo
  - en donde no puede ir barco de remo
  lexicon: HALOT
  rationale: La negación y la idea de tránsito por el agua se expresan con naturalidad. 'Barco de remo' comunica el tipo de nave sin caer en tecnicismo excesivo.
- source_word: אֳנִי שַׁיִט
  english_pob_choice: rowing ship
  chosen_spanish: barco de remo
  alternatives_spanish:
  - nave de remos
  - embarcación de remo
  - barco oarado
  lexicon: HALOT
  rationale: La frase denota una nave movida por remos o navegación activa. 'Barco de remo' es claro y accesible en español.
- source_word: וְצִי אַדִּיר
  english_pob_choice: and no mighty vessel
  chosen_spanish: ni nave poderosa
  alternatives_spanish:
  - ni gran nave
  - ni navío poderoso
  - ni nave imponente
  lexicon: HALOT
  rationale: '''צִי'' es una nave o embarcación; אַדִּיר mantiene la idea de poder e imponencia. ''Nave poderosa'' conserva el contraste con la protección inaccesible del lugar.'
- source_word: לֹא יַעַבְרֶנּוּ
  english_pob_choice: can pass through
  chosen_spanish: lo atravesará
  alternatives_spanish:
  - lo pasará
  - pasará por él
  - lo cruzará
  lexicon: HALOT
  rationale: El sufijo retoma el lugar acuático. 'Atravesará' expresa tránsito completo por el espacio acuático y funciona bien con la negación previa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide 'Yahvé' en el texto principal, preservando el nombre divino frente a sustituciones tradicionales.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de Yahvé como lugar protector de aguas intransitables
  english_pob_reading: the majestic Yahweh will be for us a place of rivers, of broad streams
  chosen_spanish_reading: Yahvé, en su majestad, será para nosotros un lugar de ríos, de anchos corrientes
  alternative_spanish_readings:
  - Yahvé, majestuoso, será para nosotros un lugar de ríos y corrientes anchas
  - allí Yahvé será para nosotros como un lugar de ríos y anchos canales
  rationale: El hebreo presenta a Yahvé mismo como el 'lugar' caracterizado por aguas defensivas. La versión mantiene la metáfora sin convertirla en mera comparación y conserva el tono de seguridad y protección.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se conserva la identificación de Yahvé como sujeto majestuoso, el paralelismo de dos imágenes acuáticas y la doble negación sobre las naves. Se evitó una traducción demasiado literal de «wide of hands» en el cuerpo del texto, trasladando esa aclaración a la nota cultural. También se mantuvo la diferencia entre la nave de remos y la nave poderosa, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «nave/barco de remo» para אֳנִי שַׁיִט y «nave poderosa» para וְצִי אַדִּיר.
  - Se conserva el paralelismo poético de las aguas con dos miembros coordinados.
  - La colocación de la nota b en «anchas corrientes» evita una calca opaca y preserva el dato idiomático del hebreo.
