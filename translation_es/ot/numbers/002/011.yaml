- from: Y su campamento, es decir, los registrados en él, fue de cuarenta y seis mil quinientos.
  to: Y su compañía, es decir, los registrados de ella, eran cuarenta y seis mil quinientos.
  rationale: Se reemplaza «campamento» por «compañía» para reflejar mejor el contingente tribal censado indicado por צְבָאוֹ y alinearse con la decisión auditada final en inglés. Se ajusta «en él» a «de ella» para expresar pertenencia al conjunto, y «fue de» a «eran» para un español más natural en un total de censo.
