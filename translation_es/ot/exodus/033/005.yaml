review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Yahvé, el mandato a Moisés, ''hijos de Israel'', ''duro de cerviz'', el condicional ''si yo subiera'', ''los consumiría'', el mandato de quitar los adornos y la preservación del antropomorfismo en ''sepa''. Sin embargo, hay desajustes menores con la auditoría inglesa y con la legibilidad española: la nota [a] está mal anclada y no corresponde al lugar significativo; el grupo de notas [c][b][d] está acumulado sobre ''adornos'' aunque [b] y [c] pertenecen a otras expresiones; y ''de encima de ustedes'' suena torpe en español. También conviene alinear mejor la nota del antropomorfismo con el valor literal hebreo ''y sabré qué haré con ustedes''.'
  spanish_quality_summary: El español es mayormente claro y digno, con buen registro bíblico moderno. 'Pueblo duro de cerviz' funciona bien. No obstante, 'quítense sus adornos de encima de ustedes' es poco natural; 'quítense de encima sus adornos' o 'quiten de sobre ustedes sus adornos' fluye mejor. La puntuación y estructura son adecuadas.
  glossary_alignment: 'La terminología del proyecto está bien observada: יְהוָה -> ''Yahvé''; בְּנֵי יִשְׂרָאֵל -> ''hijos de Israel''; idiomática ''duro de cerviz''; preservación del verbo ''saber'' para וְאֵדְעָה. No hay conflicto doctrinal importante. La principal corrección necesaria es de anclaje de notas y naturalidad de ''de encima''.'
  issues:
  - severity: medium
    issue: La nota [a] sobre Moisés es innecesaria y no corresponde a una alternativa significativa preservada por el inglés.
    rationale: El inglés ancla [a] a 'Moses' por una nota sobre 'sons of Israel', lo cual ya no tiene sentido en español. En el texto español la nota sobre Moisés introduce una observación trivial y no auditada por la evidencia fuente.
  - severity: medium
    issue: Las notas [b], [c] y [d] están ancladas todas en 'adornos', aunque sus contenidos pertenecen a otras frases.
    rationale: La disciplina de salida requiere que cada marcador aparezca en la palabra o frase pertinente. La alternativa sobre 'en medio de ustedes' debe anclarse allí; la de 'los destruiría' en 'los consumiría'; y la de 'joyas/adorno' en 'adornos'.
  - severity: low
    issue: La expresión 'de encima de ustedes' suena poco idiomática en español.
    rationale: Aunque intenta reflejar מֵעָלֶיךָ, en español resulta pesada. 'quítense de encima sus adornos' conserva el sentido de algo puesto sobre el cuerpo y mejora la legibilidad.
  - severity: low
    issue: La nota [e] puede alinearse mejor con el dato literal hebreo.
    rationale: La auditoría inglesa destaca específicamente que el hebreo dice 'y sabré qué haré con ustedes'. Conviene mantener esa formulación en la nota española.
  revised_spanish_text: 'Yahvé dijo a Moisés: «Di a los hijos de Israel: “Ustedes son un pueblo duro de cerviz. Si yo subiera en medio de ustedes[b] por un solo momento, los consumiría[c]. Así que ahora, quítense de encima sus adornos[d], para que yo sepa[e] lo que haré con ustedes”».'
