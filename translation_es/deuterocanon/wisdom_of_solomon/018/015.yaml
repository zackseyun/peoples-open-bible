translation:
  language: es
  text: tu palabra todopoderosa saltó desde el cielo[a], desde tronos reales[b], un guerrero implacable, en medio de la tierra condenada;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tu Palabra todopoderosa’; algunos lectores entienden aquí ‘Palabra’ como una referencia personificada o anticipatoria al agente divino de Dios, pero el griego también puede leerse más generalmente como la palabra eficaz de Dios.
    reason: alternative_reading
  - marker: b
    text: El griego usa una expresión plural, ‘tronos reales’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ παντοδύναμός σου λόγος
  english_pob_choice: your all-powerful word
  chosen_spanish: tu palabra todopoderosa
  alternatives_spanish:
  - tu palabra omnipotente
  - tu Palabra todopoderosa
  lexicon: LSJ
  rationale: παντοδύναμος expresa la idea de poder total; en español, 'todopoderosa' conserva esa fuerza de manera natural. λόγος se traduce como 'palabra' sin capitalizar en el texto principal para no adelantar una identificación cristológica que el griego inmediato no exige.
- source_word: ἀπʼ οὐρανῶν
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: LSJ
  rationale: El plural griego puede sonar literalmente 'de los cielos', pero en español bíblico actual 'desde el cielo' comunica con naturalidad el origen celestial y mantiene el sentido.
- source_word: ἐκ θρόνων βασιλείων
  english_pob_choice: from royal thrones
  chosen_spanish: desde tronos reales
  alternatives_spanish:
  - desde tronos de realeza
  - desde los tronos reales
  lexicon: LSJ
  rationale: Se conserva el plural de θρόνων y de βασιλείων con una forma española clara. 'Tronos reales' evita convertir el plural en singular y mantiene la imagen de procedencia regia.
- source_word: ἀπότομος πολεμιστής
  english_pob_choice: a relentless warrior
  chosen_spanish: un guerrero implacable
  alternatives_spanish:
  - un guerrero inexorable
  - un guerrero severo
  lexicon: LSJ
  rationale: ἀπότομος puede implicar dureza, severidad o falta de concesiones. 'Implacable' transmite mejor la energía de juicio y combate que una traducción más literal pero menos idiomática.
- source_word: εἰς μέσον τῆς ὀλεθρίας γῆς
  english_pob_choice: into the midst of the doomed land
  chosen_spanish: al medio de la tierra condenada
  alternatives_spanish:
  - en medio de la tierra condenada
  - al centro de la tierra condenada
  - en medio de la tierra de ruina
  lexicon: LSJ
  rationale: La construcción griega indica entrada hasta el centro de la escena; 'al medio de' preserva ese movimiento. 'Tierra condenada' refleja ὀλέθριος como algo sentenciado a destrucción, sin suavizar la nota de juicio.
- source_word: ἥλατο
  english_pob_choice: leaped
  chosen_spanish: saltó
  alternatives_spanish:
  - se lanzó
  - dio un salto
  - brincó
  lexicon: LSJ
  rationale: El verbo describe un impulso súbito. 'Saltó' es breve, enérgico y compatible con el registro poético del pasaje.
theological_decisions:
- issue: Si λόγος debe sugerir explícitamente el uso cristológico de 'la Palabra'
  english_pob_reading: Word with a footnote noting possible personified or anticipatory reference; lowercase in main text
  chosen_spanish_reading: palabra en minúscula, con nota sobre la posible personificación o lectura anticipatoria
  alternative_spanish_readings:
  - Palabra
  - Verbo
  rationale: El contexto inmediato habla del poder eficaz de Dios en juicio. Mantener 'palabra' evita imponer una identificación doctrinal no obligada por este verso, pero la nota conserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Cómo reflejar la imaginería militar y de juicio sin atenuarla
  english_pob_reading: a relentless warrior
  chosen_spanish_reading: un guerrero implacable
  alternative_spanish_readings:
  - un guerrero severo
  - un guerrero sin piedad
  rationale: La escena presenta intervención divina en términos bélicos y judiciales. 'Implacable' conserva la dureza del retrato sin añadir una crueldad que el léxico no exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: mantiene el orden apposicional del griego, evita una comparación implícita con ‘como’, y conserva el plural de ‘tronos reales’ y la imagen de un avance súbito hacia la tierra destinada a la destrucción.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el original remite al nombre divino; aquí el texto habla de ‘tu palabra’ y no requiere un reemplazo.
  - Se mantiene ‘palabra’ en minúscula en el texto principal por fidelidad al griego y para no resolver la tensión cristológica sin base explícita.
  - ‘Tronos reales’ preserva el plural del griego, aun cuando el español común podría tender a singularizarlo.
  - ‘Tierra condenada’ busca reproducir la carga de juicio de ὀλεθρίας sin convertirla en una paráfrasis amplia.
