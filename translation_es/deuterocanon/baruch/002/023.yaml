translation:
  language: es
  text: Haré cesar de las ciudades de Judá y de los alrededores[a] de Jerusalén la voz de alegría y la voz de gozo, la voz del novio y la voz de la novia, y toda la tierra será intransitable[b] a causa de sus habitantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «de fuera de Jerusalén» o «desde fuera de Jerusalén». Algunas versiones suavizan esto hacia una idea de «las calles de Jerusalén», pero el testimonio griego conservado no usa ese término.
    reason: alternative_reading
  - marker: b
    text: La última cláusula es difícil en griego. También puede entenderse como «toda la tierra quedará intransitable, sin habitantes» o «privada de habitantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκλείψειν ποιήσω
  english_pob_choice: I will cause ... to cease
  chosen_spanish: Haré que cesen
  alternatives_spanish:
  - Haré que terminen
  - Haré que falten
  lexicon: LSJ
  rationale: 'La construcción perifr&aacute;stica expresa causaci&oacute;n activa: no solo que algo deje de ocurrir, sino que Dios haga que cese. En español, «haré que cesen» preserva esa agencia divina sin sonar forzado.'
- source_word: ἐκ πόλεων Ἰούδα καὶ ἔξωθεν Ἰερουσαλήμ
  english_pob_choice: from the cities of Judah and from the outskirts of Jerusalem
  chosen_spanish: de las ciudades de Judá y de los alrededores de Jerusalén
  alternatives_spanish:
  - de las ciudades de Judá y de fuera de Jerusalén
  - de las ciudades de Judá y de la periferia de Jerusalén
  lexicon: LSJ
  rationale: ἔξωθεν indica «fuera de» o «alrededor de». «Alrededores» comunica el sentido espacial de manera natural en español y respeta la revisión inglesa que prefirió una formulación más precisa que «outside» sin introducir «calles», que no está en el griego.
- source_word: φωνὴν εὐφροσύνης καὶ φωνὴν χαρμοσύνης
  english_pob_choice: the sound of gladness and the sound of rejoicing
  chosen_spanish: la voz de alegría y la voz de gozo
  alternatives_spanish:
  - el sonido de alegría y el sonido de gozo
  - la voz de regocijo y la voz de alegría
  lexicon: LSJ
  rationale: φωνή puede ser «voz» o «sonido»; aquí la serie de ruidos festivos sugiere una expresión audible, y «voz» mantiene el paralelismo tradicional del pasaje en español. Las dos palabras griegas son casi sinónimas; «alegría» y «gozo» conservan la duplicación poética sin fusionarlas.
- source_word: φωνὴν νυμφίου καὶ φωνὴν νύμφης
  english_pob_choice: the sound of bridegroom and the sound of bride
  chosen_spanish: la voz del novio y la voz de la novia
  alternatives_spanish:
  - la voz del esposo y la voz de la esposa
  - el sonido del novio y el sonido de la novia
  lexicon: LSJ
  rationale: «Novio» y «novia» son los equivalentes naturales de νυμφίος y νύμφη en un contexto nupcial. Mantienen el paralelismo con el hebreo/profético sin añadir interpretaciones.
- source_word: ἔσται πᾶσα ἡ γῆ εἰς ἄβατον
  english_pob_choice: all the land will become impassable
  chosen_spanish: toda la tierra será un lugar impracticable
  alternatives_spanish:
  - toda la tierra será intransitable
  - toda la tierra quedará como un lugar por donde no se puede pasar
  lexicon: LSJ
  rationale: ἄβατος significa literalmente «no transitable» o «no caminable». «Impracticable»/«intransitable» preserva ese valor más específico que un simple «desolada». Se eligió una expresión comprensible en español que conserve la idea de terreno no atravesable.
- source_word: ἀπὸ ἐνοικούντων
  english_pob_choice: because of its inhabitants
  chosen_spanish: a causa de sus habitantes
  alternatives_spanish:
  - sin habitantes
  - de sus habitantes
  - por sus habitantes
  lexicon: LSJ
  rationale: La frase griega es difícil. «A causa de» mantiene la relación preposicional sin forzar una reconstrucción más interpretativa como «sin habitantes». Se deja visible la tensión del texto, como hace el audit trail inglés.
theological_decisions:
- issue: Si suavizar la fórmula de juicio para armonizarla con expresiones proféticas más conocidas
  english_pob_reading: Retain the Greek witness's 'from outside Jerusalem' and the difficult final phrase rather than importing a smoother traditional form.
  chosen_spanish_reading: Conservar «de los alrededores de Jerusalén» y «a causa de sus habitantes», sin reemplazarlos por una fórmula más lisa.
  alternative_spanish_readings:
  - de las calles de Jerusalén
  - sin habitantes
  - vacía de habitantes
  rationale: La prioridad es reflejar el testimonio griego disponible, no normalizarlo según fórmulas proféticas más familiares. La dificultad final se conserva para no borrar una tensión textual ya documentada.
  doctrine_reference: Principios POB de transparencia textual y fidelidad al testimonio recibido
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que hizo más natural ἔξωθεν Ἰερουσαλήμ mediante una referencia espacial cercana, pero mantiene la dificultad final del texto griego. La redacción española intenta reflejar esa decisión sin importar la variante inglesa anterior «from outside Jerusalem» ni convertir la cláusula final en una paráfrasis más lisa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Novio/novia» se usa por naturalidad y paralelismo nupcial, coherente con el valor de νυμφίος/νύμφη.
  - «A causa de sus habitantes» conserva la ambigüedad del final griego sin resolverla artificialmente.
  - No se usa «SEÑOR» como sustituto ni se introduce lenguaje eclesiástico ajeno al texto.
