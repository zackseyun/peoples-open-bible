review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura proverbial hebrea y conserva el paralelismo entre rico y pobre, así como 'tropieza' para מוּט/נָמוֹט y 'de amigo en amigo' para מֵרֵעַ אֶל רֵעַ. Sin embargo, 'es conducido' no preserva adecuadamente la fuerza de נִדְחָה, que en contexto expresa rechazo o expulsión más que simple traslado. Además, la nota actual no refleja la nota de alternativa/ambigüedad preservada en el rastro inglés y en cambio introduce una nota editorial innecesaria sobre la posición del ancla.
  spanish_quality_summary: El español es claro y legible, pero '[a]conducido' suena atenuado e incluso casi neutral, debilitando el contraste con 'lo sostiene'. También es poco natural la colocación del ancla antes de la palabra con una nota meramente técnica. Una revisión a 'es echado de amigo en amigo' o 'es expulsado de amigo en amigo' mejora fidelidad y fuerza proverbial. Conviene además usar una nota léxica real, no una nota de estilo editorial.
  glossary_alignment: No hay términos teológicos clave en este versículo. Las decisiones léxicas principales son en general adecuadas, salvo נִדְחָה, para la cual el proyecto inglés documenta 'is driven away' y alternativas de rechazo ('pushed away', 'cast off'). En español, 'echado' o 'expulsado' se alinean mejor que 'conducido'.
  issues:
  - severity: high
    issue: נִדְחָה se tradujo como 'es conducido'
    rationale: El hebreo y el POB inglés apuntan a ser rechazado, empujado o echado, no simplemente guiado o llevado. 'Conducido' debilita el sentido social negativo del proverbio.
  - severity: medium
    issue: La nota [a] actual es una nota editorial de anclaje, no una nota de traducción significativa
    rationale: El proyecto pide notas para alternativas o ambigüedades relevantes, no para explicar la colocación tipográfica del marcador. Además, se pierde la alternativa documentada 'de un amigo a otro' y la idea de rechazo repetido.
  - severity: low
    issue: La construcción '[a]conducido' resulta poco natural visualmente en español bíblico continuo
    rationale: Aunque técnicamente válida, la ancla antes del verbo se siente artificiosa; es mejor anclarla a la frase relevante o al segmento final.
  revised_spanish_text: Cuando un hombre rico tropieza, lo sostiene un amigo; pero cuando un hombre pobre tropieza, es echado de amigo en amigo[a].
  revised_footnotes:
  - marker: a
    text: O, 'de un amigo a otro'. El hebreo sugiere que al pobre lo van pasando o echando repetidamente, en lugar de recibir ayuda verdadera.
    reason: lexical_alternative
  revision_rationale: Se cambia 'es conducido' por 'es echado' para reflejar mejor נִדְחָה y el contraste con el apoyo que recibe el rico. Se elimina la nota editorial impropia y se la reemplaza por una nota léxica que preserva la alternativa documentada y la idea de rechazo repetido. No se requiere adjudicación adicional porque la corrección es directa y bien apoyada por el hebreo y el rastro inglés.
