  yaml_path: translation/ot/jeremiah/040/005.yaml
  text: But since he still had not gone back[a], he said, “Go back to Gedaliah son of Ahikam, son of Shaphan, whom the king of Babylon has appointed over the cities of Judah, and live with him among the people[c][b]; or go wherever it seems right in your eyes to go.” Then the captain of the guard gave him provisions and a gift and sent him away.
  footnotes:
