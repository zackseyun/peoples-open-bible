lexical_decisions:
- source_word: בְּנֵי שְׁמַעְיָה
  english_pob_choice: The sons of Shemaiah
  chosen_spanish: Los hijos de Semaías
  alternatives_spanish:
  - Los hijos de Semaías
  - Los descendientes de Semaías
  lexicon: HALOT
  rationale: La construcción en cadena marca relación filial/genealógica. «Los hijos de Semaías» conserva el tono de lista genealógica y sigue de cerca el valor del hebreo sin volverse rígido.
- source_word: עָתְנִי
  english_pob_choice: Othni
  chosen_spanish: Otni
  alternatives_spanish:
  - Othni
  - Otní
  lexicon: transliteración directa del hebreo
  rationale: Se conserva el nombre propio en forma transliterada. «Otni» refleja de manera cercana la vocalización hebrea y mantiene la consistencia de nombres bíblicos en español del proyecto.
- source_word: וּרְפָאֵל
  english_pob_choice: Rephael
  chosen_spanish: Refael
  alternatives_spanish:
  - Refael
  - Raphael
  lexicon: transliteración directa del hebreo
  rationale: Se prefiere una forma que refleje la vocalización hebrea y evite la adaptación tradicional «Raphael», que suaviza la conexión con el texto hebreo.
- source_word: וְעוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - Obed
  lexicon: transliteración bíblica establecida
  rationale: Nombre propio con forma ya asentada en español bíblico; no hay razón source-based para desviarse.
- source_word: אֶלְזָבָד
  english_pob_choice: Elzabad
  chosen_spanish: Elzabad
  alternatives_spanish:
  - Elzabad
  lexicon: transliteración bíblica establecida
  rationale: Se mantiene la transliteración directa del nombre propio.
- source_word: אֶחָיו
  english_pob_choice: whose brothers were
  chosen_spanish: cuyos hermanos eran
  alternatives_spanish:
  - sus hermanos eran
  - de quien eran hermanos
  lexicon: HALOT
  rationale: El hebreo tiene sufijo singular de 3.ª persona («sus/cuyos»), literalmente «sus hermanos». En español, «cuyos hermanos eran» reproduce la relación de pertenencia/parentesco y hace natural el enlace con la frase explicativa.
- source_word: בְּנֵי חָיִל
  english_pob_choice: capable men
  chosen_spanish: hombres capaces
  alternatives_spanish:
  - hombres valientes
  - hombres de valor
  - hombres aptos
  lexicon: HALOT
  rationale: חָיִל puede expresar fuerza, valor o capacidad. En este contexto genealógico/administrativo no hay señal obligatoria de militarismo; «hombres capaces» conserva la idea de competencia y aptitud para el servicio, evitando sobrecargar con «valientes».
- source_word: אֱלִיהוּ
  english_pob_choice: Elihu
  chosen_spanish: Elihu
  alternatives_spanish:
  - Elihu
  lexicon: transliteración bíblica establecida
  rationale: Nombre propio conservado en forma conocida y estable en español bíblico.
- source_word: וּסְמַכְיָהוּ
  english_pob_choice: Semakiah
  chosen_spanish: Semakías
  alternatives_spanish:
  - Semakiah
  - Semajías
  lexicon: transliteración directa del hebreo
  rationale: Se opta por una transliteración que preserve la forma hebrea y la acentuación española natural. Se evita la adaptación a un nombre más conocido porque el hebreo aquí apunta a la forma específica Masorética.
theological_decisions:
- issue: Sentido de בְּנֵי חָיִל
  english_pob_reading: capable men
  chosen_spanish_reading: hombres capaces
  alternative_spanish_readings:
