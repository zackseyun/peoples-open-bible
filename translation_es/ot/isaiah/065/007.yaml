translation:
  language: es
  text: Tus iniquidades y las iniquidades de tus padres, juntamente, dice Yahvé, porque quemaron incienso sobre los montes y me reprocharon en las colinas; así mediré su obra anterior[a] en su seno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su retribución" para פְעֻלָּתָם; el término hebreo puede referirse a una obra/acción o a lo que esa obra merece, aunque el modismo de retribución ya está expresado en la cláusula final.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "en su seno". El hebreo usa un modismo que significa pagar de manera directa y personal.
    reason: cultural_note
lexical_decisions:
- source_word: עֲוֺנֹתֵיכֶם
  english_pob_choice: your iniquities
  chosen_spanish: tus iniquidades
  alternatives_spanish:
  - tus pecados
  - tu culpa
  lexicon: HALOT
  rationale: עוֹן puede denotar iniquidad, culpa o la consecuencia de la culpa. Aquí, unido a la iniquidad de los padres y al contexto de retribución, conviene conservar el peso moral de "iniquidades" mejor que "pecados", que es más general y menos denso.
- source_word: וַעֲוֺנֹת אֲבוֹתֵיכֶם
  english_pob_choice: and the iniquities of your fathers
  chosen_spanish: y las iniquidades de tus padres
  alternatives_spanish:
  - y las iniquidades de vuestros padres
  - y las iniquidades de tus antepasados
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de forma transparente. "Padres" preserva el referente masculino plural explícito del hebreo y el vínculo con la historia del pueblo; "antepasados" suaviza demasiado ese matiz.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - a la vez
  lexicon: HALOT
  rationale: El adverbio subraya que ambas iniquidades quedan consideradas en una sola acción judicial. "Juntamente" suena natural en español y conserva la fuerza adverbial sin imponer una paráfrasis explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto, sin sustituirlo por un título. "Yahvé" sigue el criterio del proyecto para el Tetragrámaton y evita ocultar el nombre propio.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aunque formalmente es relativo, aquí introduce la causa del juicio. "Porque" expresa con naturalidad el valor causal que la traducción inglesa ya había identificado.
- source_word: קִטְּרוּ
  english_pob_choice: burned incense
  chosen_spanish: quemaron incienso
  alternatives_spanish:
  - ofrecieron incienso
  - echaron incienso
  lexicon: HALOT
  rationale: El piel de קטר se refiere al acto cultual de quemar incienso. "Quemaron incienso" es directo, idiomático y suficientemente culto para el registro bíblico.
- source_word: עַל הֶהָרִים וְעַל הַגְּבָעוֹת
  english_pob_choice: on the mountains and on the hills
  chosen_spanish: sobre los montes y... en las colinas
  alternatives_spanish:
  - sobre los montes y sobre las colinas
  - en los montes y en las colinas
  - en los lugares altos
  lexicon: HALOT
  rationale: 'El hebreo nombra montes y colinas de forma explícita; no conviene sustituirlo por "lugares altos". La preposición se adapta al español para que la segunda cláusula resulte natural: "me reprocharon en las colinas".'
- source_word: חֵרְפוּנִי
  english_pob_choice: reproached me
  chosen_spanish: me reprocharon
  alternatives_spanish:
  - me insultaron
  - me ultrajaron
  - me despreciaron
  lexicon: HALOT
  rationale: חרף puede significar reprochar, insultar o afrentar. "Reprocharon" conserva un tono formal y el peso del agravio sin intensificar innecesariamente el matiz.
- source_word: וּמַדֹּתִי
  english_pob_choice: so I will measure
  chosen_spanish: así mediré
  alternatives_spanish:
  - y mediré
  - por eso mediré
  lexicon: HALOT
  rationale: La waw aquí es consecutiva/resultativa. "Así mediré" comunica el efecto consecuente del motivo de juicio y fluye con naturalidad en español.
- source_word: פְעֻלָּתָם
  english_pob_choice: their deed
  chosen_spanish: su obra
  alternatives_spanish:
  - su hecho
  - su acción
  - su recompensa
  lexicon: HALOT
  rationale: פְּעֻלָּה puede ser obra, acción o paga/retribución. Aquí, el verbo "medir" y el modismo de retribución permiten entenderlo como lo que hicieron; "obra" mantiene esa referencia sin forzar la idea de recompensa ya expresada por el contexto.
- source_word: רִאשֹׁנָה
  english_pob_choice: former
  chosen_spanish: primera
  alternatives_spanish:
  - anterior
  - de antes
  - primigenia
  lexicon: HALOT
  rationale: En este contexto apunta a la obra previa, es decir, la conducta anterior que será retribuida. "Primera" conserva la posibilidad de "anterior" y encaja bien con "su obra".
- source_word: עַל חֵיקָם
  english_pob_choice: into their lap
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su regazo
  - en su pecho
  - en su falda
  lexicon: HALOT
  rationale: El hebreo usa un modismo de retribución directa y personal. "En su seno" refleja el sentido bíblico del modismo y mantiene el registro digno; "regazo" sería también posible, pero suena menos natural en este contexto.
theological_decisions:
- issue: Culpa intergeneracional y juicio
  english_pob_reading: The verse speaks of God judging the present audience together with the iniquities of their fathers because they share in the same pattern of idolatry and reproach.
  chosen_spanish_reading: El versículo presenta el juicio de Dios sobre las iniquidades actuales y las de los padres en una sola acción retributiva, porque ambos grupos quedan ligados por el mismo patrón de idolatría y afrenta.
  alternative_spanish_readings:
  - Dios castiga a los descendientes por los pecados de sus padres sin relación con su propia conducta.
  - El texto solo menciona una culpa heredada sin implicar la responsabilidad presente.
  rationale: 'La frase "tus iniquidades y las iniquidades de tus padres, juntamente" conserva la tensión del texto: no resuelve el problema teológico en abstracto, sino que deja ver una responsabilidad compartida y una retribución anunciada por Yahvé.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarla artificialmente.
- issue: Sentido de פְעֻלָּתָם en un contexto de juicio
  english_pob_reading: Rendered as 'their deed' rather than 'their recompense.'
  chosen_spanish_reading: Se traduce como "su obra" para no duplicar el sentido retributivo que ya expresa "así mediré en su seno".
  alternative_spanish_readings:
  - su recompensa
  - su salario
  - su pago
  rationale: El contexto ya presenta la retribución en la imagen de medir en el seno; por eso, traducir פְעֻלָּתָם como "recompensa" haría redundante el verso y oscurecería el valor más básico de obra/acción.
  doctrine_reference: Mantener la ambigüedad lexical sin sobreinterpretar el resultado punitivo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y su revisión final: conserva el orden hebreo de las acciones, evita introducir "lugares altos", mantiene el nombre divino como Yahvé y traduce el modismo final de manera comprensible en español sin perder su fuerza retributiva.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el Tetragrámaton, conforme al criterio del proyecto.
  - '"Iniquidades" conserva el peso moral de עוון mejor que "pecados" en este pasaje.'
  - '"Seno" reproduce el valor idiomático de חֵיק y puede leerse como equivalente funcional de "regazo" en el modismo de retribución.'
  - La puntuación refleja la causalidad y la secuencia del hebreo sin añadir explicaciones ajenas al versículo.
