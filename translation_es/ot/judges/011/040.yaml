- from: De año en año las hijas de Israel solían ir a lamentar[a] a la hija de Jefté el galaadita cuatro días en el año.
  to: De año en año las hijas de Israel solían ir a conmemorar[a] a la hija de Jefté el galaadita cuatro días en el año.
  rationale: Se cambió «a lamentar» por «a conmemorar» para ajustarse a la revisión auditada más reciente del POB inglés sobre לְתַנּוֹת. Se conservan en nota las alternativas interpretativas relevantes, incluyendo «lamentar». También se corrigió el no-español «recountar» por la opción idiomática «hablar de», que preserva la posibilidad de un sentido de relatar o hablar acerca de la hija de Jefté sin sobretraducir. No se requiere adjudicación adicional porque la incertidumbre léxica ya está documentada y puede manejarse con texto principal más nota.
