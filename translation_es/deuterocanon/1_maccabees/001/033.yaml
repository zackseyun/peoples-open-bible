translation:
  language: es
  text: Y fortificaron la ciudad de David con una muralla grande y fuerte, con torres fuertes, y llegó a ser para ellos una ciudadela[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y llegó a ser para ellos la Acra". El griego ἄκρα puede leerse como sustantivo común ("ciudadela", "fortaleza") o como el nombre histórico de la fortaleza seléucida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ᾠκοδόμησαν
  english_pob_choice: they fortified
  chosen_spanish: fortificaron
  alternatives_spanish:
  - construyeron
  - edificaron
  - reconstruyeron
  lexicon: LSJ
  rationale: Aunque οἰκοδομέω puede significar literalmente 'construir', el contexto militar y el resultado descrito justifican en español 'fortificaron', que expresa mejor la construcción de defensas sin perder el matiz de obra arquitectónica defensiva.
- source_word: τὴν πόλιν Δαυείδ
  english_pob_choice: the city of David
  chosen_spanish: la ciudad de David
  alternatives_spanish:
  - la ciudad de David
  lexicon: LSJ
  rationale: La expresión es un topónimo histórico estándar y se traduce de manera directa para conservar la referencia topográfica e histórica.
- source_word: τείχει μεγάλῳ καὶ ὀχυρῷ
  english_pob_choice: a great and strong wall
  chosen_spanish: con un gran y fuerte muro
  alternatives_spanish:
  - con un gran y fortificado muro
  - con una gran y sólida muralla
  - con un gran y fuerte muro
  lexicon: LSJ
  rationale: El dativo indica medio o acompañamiento en la construcción/fortificación. 'Muro' es natural en español; 'gran' y 'fuerte' conservan el doble énfasis del griego, mientras 'muralla' sería posible pero puede sonar más interpretativo que el término general 'muro'.
- source_word: πύργοις ὀχυροῖς
  english_pob_choice: with strong towers
  chosen_spanish: con fuertes torres
  alternatives_spanish:
  - con torres fortificadas
  - con torres sólidas
  lexicon: LSJ
  rationale: '''Fuertes torres'' reproduce la función defensiva del adjetivo ὀχυρός y mantiene el paralelismo con el miembro anterior sin forzar una repetición excesiva de ''fortificado''.'
- source_word: ἐγένετο αὐτοῖς εἰς ἄκραν
  english_pob_choice: it became a citadel for them
  chosen_spanish: llegó a ser para ellos una ciudadela
  alternatives_spanish:
  - llegó a ser para ellos una fortaleza
  - llegó a ser para ellos un acra
  lexicon: LSJ
  rationale: ἄκρα puede referirse a una altura fortificada o a una ciudadela. 'Ciudadela' comunica bien el sentido arquitectónico-militar en español y evita confundir al lector con un transliterado poco transparente en el texto principal.
translation_notes:
  revision_awareness: El texto inglés del POB pasó de 'they built' a 'they fortified' para reflejar mejor el contexto defensivo. La versión española sigue esa revisión con 'fortificaron'. También se preservó la alternativa histórica de ἄκρα en una nota, porque el griego admite tanto un sentido común como el nombre propio del recinto.
  spanish_consistency_notes:
  - Se mantuvo 'David' en genitivo como 'ciudad de David' por consistencia histórica y topográfica.
  - Se eligió 'fortificaron' en vez de 'construyeron' para reflejar el ajuste revisado del POB inglés y el contexto militar.
  - '''Ciudadela'' se usó como equivalente natural de ἄκρα; el posible nombre propio ''Acra'' se reservó para la nota.'
  - Se evitó 'SEÑOR' o terminología litúrgica ajena porque no hay aquí una decisión sobre el nombre divino ni un término cristológico.
