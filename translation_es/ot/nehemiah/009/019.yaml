translation:
  language: es
  text: Pero tú, en tus abundantes misericordias[a], no los abandonaste en el desierto. La columna de nube no se apartó de sobre ellos de día, para guiarlos en el camino, ni la columna de fuego de noche, para darles luz por el camino que debían seguir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tu gran compasión». El hebreo usa un sustantivo plural, literalmente «en tus muchas misericordias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַחֲמֶיךָ הָרַבִּים
  english_pob_choice: in your abundant mercies
  chosen_spanish: en tus abundantes misericordias
  alternatives_spanish:
  - en tu gran compasión
  - por tus muchas misericordias
  lexicon: HALOT
  rationale: El plural רַחֲמִים conserva la idea de ‘misericordias’ en plural, y הָרַבִּים añade la noción de abundancia/multiplicidad. ‘Abundantes misericordias’ reproduce esa tensión sin reducirla a un singular abstracto.
- source_word: עֲזַבְתָּם
  english_pob_choice: did not abandon them
  chosen_spanish: no los abandonaste
  alternatives_spanish:
  - no los dejaste
  - no los desamparaste
  lexicon: HALOT
  rationale: עָזַב expresa dejar, abandonar o forsake. ‘Abandonaste’ comunica bien la fidelidad pactal y mantiene un registro natural en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la estepa
  lexicon: HALOT
  rationale: Aquí ‘desierto’ es una opción clara y bíblica en español. Aunque ‘wilderness’ puede sugerir ‘desierto/tierras deshabitadas’, el contexto del éxodo permite ‘desierto’ sin perder el sentido.
- source_word: עַמּוּד הֶעָנָן
  english_pob_choice: the pillar of cloud
  chosen_spanish: la columna de nube
  alternatives_spanish:
  - el pilar de nube
  - la columna nubosa
  lexicon: HALOT
  rationale: El equivalente natural y transparente en español es ‘columna de nube’, que conserva la imagen del Éxodo y la simetría con ‘columna de fuego’.
- source_word: לֹא סָר מֵעֲלֵיהֶם
  english_pob_choice: did not depart from above them
  chosen_spanish: no se apartó de encima de ellos
  alternatives_spanish:
  - no se retiró de sobre ellos
  - no se movió de encima de ellos
  lexicon: HALOT
  rationale: מֵעֲלֵי־ implica la ubicación ‘sobre/encima de’. ‘De encima de ellos’ preserva la imagen espacial sin sonar forzado en español.
- source_word: בְּיוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT
  rationale: Expresión temporal idiomática y paralela a ‘de noche’.
- source_word: לְהַנְחֹתָם בְּהַדֶּרֶךְ
  english_pob_choice: to lead them in the way
  chosen_spanish: para guiarlos en el camino
  alternatives_spanish:
  - para conducirlos en el camino
  - para llevarlos por el camino
  lexicon: HALOT
  rationale: נחה en Hifil es ‘guiar/dirigir/conducir’. ‘Guiarlos en el camino’ comunica la función de guía y mantiene el paralelismo con la ruta del éxodo.
- source_word: עַמּוּד הָאֵשׁ
  english_pob_choice: the pillar of fire
  chosen_spanish: la columna de fuego
  alternatives_spanish:
  - el pilar de fuego
  - la columna ígnea
  lexicon: HALOT
  rationale: Mantiene la pareja estable con ‘columna de nube’ y la imagen tradicional, sin caer en un calco torpe.
- source_word: בַּלַּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: Paralelo idiomático natural a ‘de día’.
- source_word: לְהָאִיר לָהֶם
  english_pob_choice: to give them light
  chosen_spanish: para darles luz
  alternatives_spanish:
  - para alumbrarlos
  - para iluminarlos
  lexicon: HALOT
  rationale: אור en Hifil es ‘dar luz/iluminar’. ‘Darles luz’ es claro y conserva el sentido de iluminación providencial.
- source_word: וְאֶת הַדֶּרֶךְ אֲשֶׁר יֵלְכוּ בָהּ
  english_pob_choice: and the way in which they should go
  chosen_spanish: en el camino en que habían de ir
  alternatives_spanish:
  - y el camino por el que debían ir
  - en el camino que habían de tomar
  lexicon: HALOT
  rationale: La frase hebrea liga la luz con el camino que debían recorrer. ‘En el camino en que habían de ir’ mantiene ese vínculo y preserva la modalidad de obligación/inevitabilidad sin sobrerregularla.
theological_decisions:
- issue: Pluralidad de la compasión/misericordia divina
  english_pob_reading: Retained plural 'mercies' rather than collapsing to singular 'compassion.'
  chosen_spanish_reading: Conservar ‘misericordias’ en plural dentro de ‘abundantes misericordias’.
  alternative_spanish_readings:
  - en tu gran compasión
  - por tu gran misericordia
  rationale: El hebreo usa un plural significativo; en español, ‘misericordias’ permite reflejar esa riqueza sin perder legibilidad. Evita aplanar el matiz del original.
  doctrine_reference: Translation philosophy §5 and §6 (consistency of key terms and readable modern Spanish)
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: ‘in the way’ en lugar de ‘on the way’, y ‘to give them light in the way’ para no introducir un objeto adicional. En español se reflejó con ‘en el camino’ y ‘para darles luz en el camino’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ fuera del texto porque este versículo no contiene el Tetragrámaton ni un equivalente directo en el hebreo citado.
  - Se usa ‘columna de nube / columna de fuego’ de forma paralela y consistente con el lenguaje del Éxodo.
  - Se conserva el contraste temporal ‘de día / de noche’ y el vínculo espacial ‘de encima de ellos’ para respetar la imaginería hebrea.
  - ‘Camino’ traduce de manera uniforme הַדֶּרֶךְ sin convertirlo en un término más abstracto o más interpretativo.
