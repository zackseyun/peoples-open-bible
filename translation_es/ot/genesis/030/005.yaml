translation:
  language: es
  text: Bilha concibió y le dio a Jacob un hijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «quedó embarazada y dio a luz un hijo para Jacob».
