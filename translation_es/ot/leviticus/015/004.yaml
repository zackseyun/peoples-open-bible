translation:
  language: es
  text: Todo lecho sobre el cual se acueste el varón con flujo quedará impuro, y todo objeto[a] sobre el cual se siente quedará impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'artículo' o 'utensilio'. El hebreo puede referirse de manera amplia a un objeto, utensilio o recipiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּב
  english_pob_choice: bed
  chosen_spanish: lecho
  alternatives_spanish:
  - cama
  - cama de reposo
  - lecho de descanso
  lexicon: HALOT
  rationale: מִשְׁכָּב designa el lugar o superficie para acostarse. En español, 'lecho' conserva mejor el sentido amplio y formal del objeto para recostarse, sin reducirlo innecesariamente a una cama doméstica moderna.
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el varón con flujo
  alternatives_spanish:
  - el hombre con flujo
  - el que tiene flujo
  - el varón que padece flujo
  lexicon: HALOT
  rationale: El hebreo usa una forma masculina singular sustantivada para un hombre con flujo corporal. 'Varón con flujo' mantiene la referencia masculina explícita y evita neutralizar el sujeto.
- source_word: יִשְׁכַּב עָלָיו
  english_pob_choice: lies on which
  chosen_spanish: se acueste sobre el cual
  alternatives_spanish:
  - se tiende sobre el cual
  - se recueste sobre el cual
  - duerma sobre el cual
  lexicon: HALOT
  rationale: La cláusula relativa hebrea literalmente dice 'en/ sobre el cual se acuesta'. En español, 'se acueste sobre el cual' conserva la relación sintáctica y el valor general prescriptivo del texto legal.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará inmundo
  - será inmundo
  lexicon: HALOT
  rationale: טמא expresa estado de impureza ritual. 'Quedará impuro' comunica el resultado legal sin añadir una glosa explicativa como 'ceremonialmente', y evita el matiz moral que puede sugerir 'sucio' o 'contaminado'.
- source_word: הַכְּלִי
  english_pob_choice: vessel
  chosen_spanish: vasija
  alternatives_spanish:
  - recipiente
  - objeto
  - utensilio
  lexicon: HALOT
  rationale: 'כְּלִי es amplio: puede referirse a un artículo, utensilio o recipiente. En este contexto, ''vasija'' preserva la amplitud de un objeto utilizable para sentarse y mantiene un registro bíblico claro en español.'
- source_word: יֵשֵׁב עָלָיו
  english_pob_choice: he sits on which
  chosen_spanish: sobre la cual se siente
  alternatives_spanish:
  - sobre la que se sienta
  - en la cual se siente
  - sobre la cual se sienta
  lexicon: HALOT
  rationale: ישׁב con עַל significa sentarse sobre algo. El femenino 'la cual' concuerda con 'vasija' y preserva la relación relativa del hebreo sin forzar una paráfrasis.
theological_decisions:
- issue: Naturaleza de la impureza ritual
  english_pob_reading: ritual impurity expressed as 'unclean'
  chosen_spanish_reading: '''impuro'''
  alternative_spanish_readings:
  - '''inmundo'''
  - '''ceremoniamente impuro'''
  - '''contaminado'''
  rationale: El pasaje trata de impureza ritual levítica, no de culpa moral. 'Impuro' es la forma española más directa y clara para conservar la categoría legal sin agregar explicaciones interpretativas.
  doctrine_reference: Principio de primacía del texto original; distinguir pureza ritual de pecado moral.
- issue: Referencia masculina explícita
  english_pob_reading: 'explicitly male: ''the man with the discharge'' / ''he'''
  chosen_spanish_reading: '''el varón con flujo'' / ''se acueste'' / ''se siente'''
  alternative_spanish_readings:
  - '''la persona con flujo'''
  - '''quien tiene flujo'''
  - '''el que tiene flujo'''
  rationale: El hebreo usa formas masculinas singulares y el contexto inmediato es un varón con flujo corporal. La traducción mantiene esa referencia para no neutralizar el género gramatical y semántico del pasaje.
  doctrine_reference: 'Política de precisión de género: mantener la referencia masculina cuando el texto la da de manera explícita.'
translation_notes:
  revision_awareness: La revisión más reciente del texto base no introdujo cambios; el cotejo final indicó alta concordancia con observaciones menores. La versión española sigue esa línea sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'impuro' para טמא, evitando 'inmundo' por su posible carga moral y arcaica.
  - Se conserva la referencia masculina con 'varón' y la concordancia verbal en singular.
  - Se usó una estructura relativa natural en español para reflejar las dos cláusulas paralelas del hebreo.
  - '''Lecho'' y ''vasija'' preservan el registro bíblico y la amplitud semántica de los sustantivos hebreos.'
