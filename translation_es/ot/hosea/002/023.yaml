translation:
  language: es
  text: Y sucederá en aquel día,[a] declara Yahvé, que yo responderé a los cielos, y ellos responderán a la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país». El hebreo אֶרֶץ puede significar tanto «tierra» como «territorio/país»; aquí se usa «tierra» para conservar el paralelismo poético con «los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La forma verbal introduce un giro profético de futuro. «Sucederá» conserva el valor de transición de escena y suena natural en español contemporáneo sin perder el tono solemne.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es una expresión profética fija. «En aquel día» mantiene el registro bíblico y la fuerza temporal/escatológica del hebreo.
- source_word: אֶעֱנֶה
  english_pob_choice: I will answer
  chosen_spanish: responderé
  alternatives_spanish:
  - contestaré
  - daré respuesta
  lexicon: HALOT
  rationale: El verbo ענה aquí expresa respuesta en cadena entre Yahvé, los cielos y la tierra. «Responderé» conserva el paralelismo y evita interpretar de más la imagen de fertilidad.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de manera idiomática como declaración solemne. Se conserva el nombre divino «Yahvé» según la pauta del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio del pacto, no un sustituto como «Señor». Esta decisión sigue la norma doctrinal del proyecto para el Tetragrámaton.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos arriba
  - el cielo
  lexicon: HALOT
  rationale: «Cielos» reproduce mejor el plural hebreo y el encadenamiento poético con «la tierra». «El cielo» reduciría indebidamente el alcance de la imagen.
- source_word: וְהֵם
  english_pob_choice: and they
  chosen_spanish: y ellos
  alternatives_spanish:
  - y estos
  - y los cielos
  lexicon: HALOT
  rationale: El pronombre plural retoma a «los cielos». Se mantiene el pronombre para conservar la personificación y el efecto retórico del texto.
- source_word: יַעֲנוּ
  english_pob_choice: shall answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - darán respuesta
  lexicon: HALOT
  rationale: Se repite el mismo verbo clave para sostener la cadena de respuesta del verso. «Responderán» es la opción más directa y natural en español.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  lexicon: HALOT
  rationale: En español, «la tierra» mantiene el contraste poético con «los cielos». Aunque אֶרֶץ también puede significar «la tierra/territorio», aquí la pareja cósmica favorece esta elección.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción conserva el nombre personal de Dios en vez de sustituirlo por un título, siguiendo la política del proyecto y el testimonio del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La cadena repetida de ענה
  english_pob_reading: Retain 'answer' language as a poetic chain of response between God, the heavens, and the earth
  chosen_spanish_reading: Mantener «responder» como cadena poética de respuesta entre Yahvé, los cielos y la tierra
  alternative_spanish_readings:
  - explicar como 'dar lluvia a'
  - parafrasear como 'favorecer con fertilidad a'
  rationale: El hebreo repite el verbo tres veces para sostener una relación poética y teológica entre las partes del verso. Traducirlo de forma más explicativa resolvería prematuramente la metáfora agrícola y borraría la tensión literaria que el proyecto busca preservar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del inglés auditado: futuro profético con fórmula solemne, conservación del nombre divino, y repetición deliberada de «responder» para no resolver la imagen agrícola. No se detectaron revisiones aplicadas en el registro fuente, y el resumen de revisión indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «los cielos» en plural para reflejar el hebreo y mantener el contraste con «la tierra».
  - Se evitó «Señor» como sustitución del nombre divino, conforme al criterio del proyecto.
  - «Responder» se repite para conservar el paralelismo verbal del verso.
