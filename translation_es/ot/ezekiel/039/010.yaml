  yaml_path: translation/ot/ezekiel/039/010.yaml
  text: They will not carry wood from the field[a], nor cut it from the forests, for they will make fires with the weapons. They will plunder those who plundered them and loot those who looted them[b], declares the Lord Yahweh.
