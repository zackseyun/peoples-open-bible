revisions:
- from: Cuando Aarón y sus hijos hayan terminado de cubrir el santuario y todos los utensilios del santuario[a], cuando el campamento se ponga en marcha, después de eso vendrán los hijos de Coat para llevarlos; pero no tocarán las cosas santas, para que no mueran[b][c]. Estas son la carga de los hijos de Coat en la tienda de reunión.
  to: Cuando Aarón y sus hijos hayan terminado de cubrir el santuario y todos los utensilios del santuario[a], cuando el campamento se ponga en marcha, después de eso vendrán los hijos de Coat para llevarlos; pero no tocarán las cosas santas, no sea que mueran[b][c]. Esta es la carga de los hijos de Coat en la tienda de reunión.
  rationale: Se corrige una falla importante de español en la cláusula final («Estas son la carga» > «Esta es la carga») y se ajusta la advertencia a un giro más fiel y solemne («no sea que mueran»), manteniendo intactas las decisiones léxicas y teológicas principales del POB auditado.
