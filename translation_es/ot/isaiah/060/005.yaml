    issue: «será vuelta hacia ti» suena poco natural en español
    rationale: Aunque busca reproducir la pasiva de יֵהָפֵךְ, en español moderno eclesial esta construcción es tosca. «Se volverá hacia ti» preserva el sentido de giro/transferencia sin perder fidelidad.
