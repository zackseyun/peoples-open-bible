review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido principal del hebreo y sigue la línea auditada del POB inglés: enfatiza correctamente la impotencia de los ídolos al no poder hablar, caminar, dañar ni hacer bien. También conserva la nota léxica sobre כְּתֹמֶר מִקְשָׁה. Sin embargo, ''hay que cargarlos'' debilita un poco el matiz pasivo/inevitable de נָשׂוֹא יִנָּשׂוּא (''deben ser llevados'' / ''tienen que ser llevados'') y suena más impersonal que el original.'
  spanish_quality_summary: El español es claro, natural y de buen registro. No obstante, 'sembrado de pepinos' puede sonar algo estrecho frente al campo semántico de מִקְשָׁה, y 'deben ser llevados' encaja mejor con el tono bíblico y la construcción hebrea que 'hay que cargarlos'. El resto del verso fluye bien y es legible para un público eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones 'espantapájaros', 'no pueden hablar', 'no les teman', 'hacer daño' y 'hacer bien' están alineadas con la racionalidad léxica documentada. La principal mejora es ajustar נָשׂוֹא יִנָּשׂוּא a una formulación más fiel.
  issues:
  - severity: medium
    issue: '''hay que cargarlos'' para נָשׂוֹא יִנָּשׂוּא'
    rationale: La construcción hebrea intensifica que los ídolos son llevados pasivamente. 'Hay que cargarlos' expresa necesidad, pero introduce un sujeto impersonal y puede sonar más coloquial. 'Deben ser llevados' o 'tienen que ser llevados' preserva mejor la voz y el tono.
  - severity: low
    issue: '''sembrado de pepinos'' puede ser algo estrecho'
    rationale: מִקְשָׁה puede referirse a un melonar/pepinar o huerto de cucurbitáceas. 'Campo de pepinos' refleja mejor la decisión inglesa y suena algo más estable que 'sembrado', aunque el borrador no es incorrecto.
  - severity: low
    issue: Comillas innecesarias dentro del texto de las notas
    rationale: Las notas están bien en contenido, pero empiezan con comillas simples envolviendo toda la nota. Conviene normalizar la puntuación para el estilo editorial.
