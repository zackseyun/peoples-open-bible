id: 1TI.1.8
reference: 1 Timothy 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἴδαμεν δὲ ὅτι καλὸς ὁ νόμος ἐάν τις αὐτῷ νομίμως χρῆται,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/008.yaml
  text: Now we know that the law is good[a], if one uses it lawfully,
  footnotes:
  - marker: a
    text: Or 'if anyone uses it properly' or 'if someone uses it legitimately.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 누군가 율법을 법답게[a] 사용한다면 율법이 선하다는 것을 압니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「합당하게」 「정당하게」. 헬라어 νομίμως는 νόμος(율법)와 같은 어근으로, 율법을 율법답게 쓴다는 말놀이를 담고 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: we know
  chosen_korean: 압니다
  alternatives_korean:
  - 알고 있습니다
  lexicon: BDAG
  rationale: οἶδα 완료형의 현재적 지식 의미를 합쇼체 「압니다」로 옮긴다.
- source_word: καλὸς
  english_pob_choice: good
  chosen_korean: 선한
  alternatives_korean:
  - 좋은
  - 훌륭한
  lexicon: BDAG
  rationale: 율법의 도덕적·본래적 선함을 가리키므로 「선한」이 가장 자연스럽다.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_korean: 율법
  alternatives_korean:
  - 그 율법
  - 토라
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「율법」을 사용한다.
- source_word: ἐάν τις
  english_pob_choice: if one
  chosen_korean: 누군가
  alternatives_korean:
  - 어떤 사람이
  - 누가
  lexicon: BDAG
  rationale: 부정대명사 + 가정법의 일반적 가정. 「누군가」가 가장 자연스럽다.
- source_word: νομίμως
  english_pob_choice: lawfully
  chosen_korean: 법답게
  alternatives_korean:
  - 합법적으로
  - 정당하게
  - 합당하게
  lexicon: BDAG
  rationale: νόμος와 어근이 같은 부사. 한국어로 「법답게」가 그 어휘적 연결과 말놀이를 살린다. 「합법적으로」는 현대 법률적 함의가 강해 본문 어조에 맞지 않는다.
- source_word: χρῆται
  english_pob_choice: uses
  chosen_korean: 사용한다면
  alternatives_korean:
  - 쓴다면
  lexicon: BDAG
  rationale: 가정의 종속절을 「~한다면」으로 옮긴다.
