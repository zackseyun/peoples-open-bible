translation:
  text: And behold[a], today they have encamped against the citadel in Jerusalem, to capture it and the sanctuary, and they have fortified Beth-zur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  chosen: And look
  alternatives:
  - And behold
  - Look
  lexicon: LSJ
  rationale: ἰδού is a discourse marker drawing attention. 'And look' preserves the immediacy in readable modern English better than the more archaic 'behold.'
- source_word: παρεμβεβλήκασιν
  chosen: they have encamped against
  alternatives:
  - they have camped before
  - they have laid siege to
  lexicon: LSJ
  rationale: From παρεμβάλλω in military context, indicating setting camp in position against a place. 'Encamped against' preserves the military nuance without overstating it as a full siege if the verb itself does not explicitly say that.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: Straightforward temporal adverb; 'today' is the natural modern equivalent.
- source_word: ἐπὶ τὴν ἄκραν
  chosen: against the citadel
  alternatives:
  - against the Acra
  - at the citadel
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel/fortress; in Jerusalem it may refer specifically to the Acra. Main text uses the transparent common noun 'citadel' for readability, while the proper-name-like alternative 'Acra' is preserved in a footnote because the historical referent is specific.
- source_word: τοῦ καταλαβέσθαι αὐτὴν
  chosen: to take it
  alternatives:
  - to capture it
  - to seize it
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. καταλαμβάνω here is military seizure/capture; 'take it' is idiomatic and sufficiently forceful.
- source_word: τὸ ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: LSJ
  rationale: ἁγίασμα refers to the sacred sanctuary area. 'Sanctuary' is the most concise and natural rendering.
- source_word: τὴν Βεθσούραν
  chosen: Beth-zur
  alternatives:
  - Bethsura
  rationale: Place name transliterated per project philosophy. 'Beth-zur' follows standard English transliteration conventions more transparently than the more Hellenized 'Bethsura.'
- source_word: ὠχύρωσαν
  chosen: they have fortified
  alternatives:
  - they have made strong
  - they have strengthened the defenses of
  lexicon: LSJ
  rationale: The verb means to fortify or make secure. 'They have fortified' is the direct military equivalent in English.
