  - severity: medium
    issue: 'La relativa final puede sonar ambigua: «que pertenecían a la casa»'
    rationale: La formulación actual hace que el relativo modifique primariamente «cámaras laterales». Reordenar a «las cámaras laterales pertenecientes a la casa» preserva mejor la unidad del sintagma y la relación posesiva reflejada en el audit trail.
  revised_spanish_text: El ancho del muro que pertenecía a las cámaras laterales por fuera era de cinco codos[a], y lo que quedaba era el lugar de las cámaras laterales pertenecientes a la casa.
