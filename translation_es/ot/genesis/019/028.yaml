translation:
  language: es
  text: Y miró sobre Sodoma y Gomorra y sobre toda la tierra del llano, y vio, y he aquí, subía humo de la tierra como el humo de un horno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el humo de un horno de cocción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁקֵף
  english_pob_choice: looked out over
  chosen_spanish: miró hacia
  alternatives_spanish:
  - miró desde lo alto hacia
  - observó desde arriba
  lexicon: HALOT
  rationale: El verbo hebreo expresa mirar desde una posición elevada o con vista dominadora. En español, «miró hacia» conserva el acto de ver y evita una especificación más fuerte que el hebreo no exige en este versículo.
- source_word: עַל פְּנֵי
  english_pob_choice: over
  chosen_spanish: hacia
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente dice «sobre la faz de», pero en español «hacia» funciona de manera natural con el verbo «miró» y mantiene el enfoque espacial sin volver la frase pesada.
- source_word: סְדֹם וַעֲמֹרָה
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  lexicon: uso estándar de nombres propios
  rationale: Se conservan los nombres propios tradicionales en español bíblico.
- source_word: כָּל פְּנֵי אֶרֶץ הַכִּכָּר
  english_pob_choice: all the land of the plain
  chosen_spanish: toda la tierra del llano
  alternatives_spanish:
  - toda la región del llano
  - toda la tierra de la llanura
  lexicon: HALOT
  rationale: כִּכָּר designa aquí la zona baja o llana del valle del Jordán. «Llano» comunica bien la idea geográfica y mantiene un tono bíblico claro; «tierra» conserva el valor de אֶרֶץ como territorio.
- source_word: וַיַּרְא
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio claramente
  - observó
  lexicon: HALOT
  rationale: Es el equivalente directo y narrativamente sobrio de ראה.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» preserva la nota de sorpresa y vividez del marcador discursivo hebreo, con buena inteligibilidad en español bíblico contemporáneo.
- source_word: קִיטֹר
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - vapor
  - humareda
  lexicon: HALOT
  rationale: El sustantivo denota humo o vapor visible; «humo» es la opción más directa y transparente en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  lexicon: HALOT
  rationale: Aquí no se trata de «tierra» en sentido de suelo material solamente, sino del área devastada; por eso se conserva el sustantivo general «tierra».
- source_word: כְּקִיטֹר הַכִּבְשָׁן
  english_pob_choice: like the smoke of a furnace
  chosen_spanish: como el humo de un horno
  alternatives_spanish:
  - como el humo de un horno de fundición
  - como el humo de un horno grande
  lexicon: HALOT
  rationale: כִּבְשָׁן puede referirse a horno o kiln. En español, «horno» es el equivalente más natural y abarca la imagen de un fuego intenso con humo ascendente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y la solución inglesa POB: conserva la secuencia narrativa «miró... y vio; y he aquí», mantiene la imagen de humo ascendente y da una equivalencia natural para כִּבְשָׁן con nota alternativa. No se requieren cambios por la revisión más reciente, que quedó sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene «Sodoma y Gomorra» como nombres propios tradicionales.
  - Se usa «llano» para כִּכָּר por claridad geográfica y para evitar una perífrasis más interpretativa.
  - «He aquí» conserva el matiz de sorpresa del hebreo sin volver arcaico el registro.
  - La nota de pie preserva la alternativa léxica de כִּבְשָׁן sin imponerla en el texto principal.
