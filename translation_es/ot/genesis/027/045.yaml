source:
  edition: WLC
  text: עַד שׁ֨וּב אַף אָחִ֜י/ךָ מִמְּ/ךָ֗ וְ/שָׁכַח֙ אֵ֣ת אֲשֶׁר עָשִׂ֣יתָ לּ֔/וֹ וְ/שָׁלַחְתִּ֖י וּ/לְקַחְתִּ֣י/ךָ מִ/שָּׁ֑ם לָ/מָ֥ה אֶשְׁכַּ֛ל גַּם שְׁנֵי/כֶ֖ם י֥וֹם אֶחָֽד־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/027/045.yaml
  text: until your brother’s anger turns away from you[a], and he forgets what you have done to him. Then I will send and bring you from there[c][b]. Why should I be bereaved of both of you in one day?
  footnotes:
  - marker: a
    text: Or, more formally, 'until your brother’s anger turns back from you.' The Hebrew uses the verb 'turn/return' with 'anger' idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take you'; rendered 'bring you back' to reflect the context of Jacob’s return from exile.
    reason: lexical_alternative
  - marker: c
    text: '''Be bereaved of both of you in one day'' likely reflects Rebekah’s fear of losing both sons through the consequences of their conflict, not necessarily by identical means.'
    reason: cultural_note
