translation:
  language: es
  text: Y su nombre llegó hasta el rey[a], y toda nación hablaba de las formaciones de combate de Judas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, «su fama llegó hasta el rey». El griego dice literalmente: «su nombre llegó cerca del rey».'
    reason: lexical_alternative
  - marker: b
    text: La frase griega ὑπὲρ πᾶν παράταξιν es difícil. Puede significar que toda nación hablaba de Judas en relación con sus formaciones de combate o sus victorias. El nombre griego Ἰούδα aquí se refiere a Judas Macabeo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: reached
  chosen_spanish: llegó
  alternatives_spanish:
  - se acercó
  - alcanzó
  lexicon: LSJ
  rationale: El griego literalmente expresa acercamiento, pero en este contexto la idea es que la fama o el nombre de Judas/Judá llegó a oídos del rey. «Llegó» conserva la imagen de alcance y suena natural en español.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su reputación
  lexicon: LSJ
  rationale: Se mantiene «nombre» para reflejar el griego de manera transparente, aunque el sentido contextual sea de fama o renombre.
- source_word: ὑπὲρ πᾶν παράταξιν
  english_pob_choice: the battle lines of Judah
  chosen_spanish: las líneas de batalla
  alternatives_spanish:
  - las formaciones militares
  - el despliegue militar
  lexicon: LSJ
  rationale: παράταξις designa una formación o línea de combate. En español, «líneas de batalla» transmite ese sentido militar sin forzar una comparación extraña con ὑπέρ.
- source_word: ἐξηγεῖτο
  english_pob_choice: spoke of
  chosen_spanish: hablaban de
  alternatives_spanish:
  - contaban
  - relataban
  lexicon: LSJ
  rationale: El imperfecto medio puede significar «referir/contar». «Hablaban de» capta bien la acción iterativa y el sentido general de difusión pública.
- source_word: πᾶν ἔθνος
  english_pob_choice: every nation
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - cada nación
  - todas las personas
  lexicon: LSJ
  rationale: «Todas las naciones» preserva el valor distributivo del plural colectivo y suena idiomático en español bíblico contemporáneo.
- source_word: Ἰούδα
  english_pob_choice: Judah / Judas
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: LSJ
  rationale: La forma griega puede corresponder a Judas/Judá. Dado que el contexto de 1 Macabeos 3 identifica al líder macabeo, «Judá» sigue de cerca la forma griega y mantiene el vínculo con la tradición bíblica del nombre.
theological_decisions:
- issue: Nombre propio Ἰούδα en contexto macabeo
  english_pob_reading: Judah in the draft text, though the contextual referent is Judas Maccabeus
  chosen_spanish_reading: Judá
  alternative_spanish_readings:
  - Judas
  rationale: No hay diferencia doctrinal, pero sí de claridad histórica. Se eligió «Judá» como transliteración cercana a la forma griega y conforme al principio del proyecto de transparencia; se reconoce que «Judas» también sería contextual y puede emplearse en notas o revisión futura.
  doctrine_reference: Traducir títulos; transliterar nombres.
translation_notes:
  revision_awareness: Se siguió el pasaje base griego de 1 Macabeos 3:26 y se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para ἤγγισεν y aclaró la construcción difícil de παράταξις. La versión española conserva la literalidad útil de «nombre» y la referencia militar de παράταξις, sin reproducir una comparación confusa.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» sin intervenir, porque el versículo no los contiene.
  - Se evitó «Señor» como sustituto del nombre divino, conforme a la política del proyecto.
  - Se preservó la tensión entre literalidad y sentido contextual en «nombre», con nota explicativa.
  - Se eligió «Judá» en el texto principal por transparencia formal, aunque «Judas» sigue siendo una alternativa contextual válida.
