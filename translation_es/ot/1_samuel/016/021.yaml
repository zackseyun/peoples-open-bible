- from: Entonces David llegó a Saúl y se puso delante de él[a]; y Saúl lo amó mucho, y llegó a ser su escudero.
  to: Entonces David llegó a Saúl y estuvo ante él[a]; y Saúl lo amó mucho, y llegó a ser su escudero.
  rationale: Se ajusta «se puso delante de él» a «estuvo ante él» para reflejar mejor עמד לפני con un español más natural y digno. Se conserva «escudero» por su valor funcional e idiomático, pero se mejora la nota para representar con más precisión el sentido literal hebreo y las alternativas documentadas en el POB inglés.
