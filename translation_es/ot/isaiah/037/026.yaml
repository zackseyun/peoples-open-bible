  text: הֲ/לֽוֹא שָׁמַ֤עְתָּ לְ/מֵֽ/רָחוֹק֙ אוֹתָ֣/הּ עָשִׂ֔יתִי מִ֥/ימֵי קֶ֖דֶם וִ/יצַרְתִּ֑י/הָ עַתָּ֣ה הֲבֵאתִ֔י/הָ וּ/תְהִ֗י לְ/הַשְׁא֛וֹת גַּלִּ֥ים נִצִּ֖ים עָרִ֥ים בְּצֻרֽוֹת־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/026.yaml
  text: Have you not heard? Long ago I made it; from days of old I formed it. Now I have brought it to pass[a], that fortified cities should become ruined heaps.
  footnotes:
  - marker: a
    text: Literally, 'to make desolations, heaps, fortified cities.' The Hebrew near 'heaps' is difficult; the sense is that fortified cities are reduced to ruin-heaps.
    reason: lexical_alternative
