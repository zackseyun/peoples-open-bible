translation:
  language: es
  text: Estas eran sus moradas, según sus asentamientos dentro de su territorio[a], para los hijos de Aarón, de la familia de los coatitas; porque el lote era de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'según sus campamentos' o 'en sus aldeas' para 'según sus asentamientos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשְׁבוֹתָם
  english_pob_choice: their dwelling places
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus lugares de habitación
  - sus residencias
  lexicon: HALOT
  rationale: מוֹשָׁב / מוֹשְׁבוֹתָם designa lugares donde se habita. 'Moradas' preserva el sentido concreto de lugar habitado y suena natural en español bíblico contemporáneo, sin perder la referencia a residencia.
- source_word: לְטִירוֹתָם
  english_pob_choice: according to their settlements
  chosen_spanish: según sus asentamientos
  alternatives_spanish:
  - según sus campamentos
  - en sus aldeas
  lexicon: HALOT
  rationale: טִירָה puede referirse a asentamiento, campamento o aldea cercada. 'Asentamientos' mantiene la amplitud semántica documentada por la POB en inglés y evita fijar indebidamente una sola forma de poblamiento.
- source_word: בִּגְבוּלָם
  english_pob_choice: within their territory
  chosen_spanish: dentro de su territorio
  alternatives_spanish:
  - en su límite
  - dentro de su región
  lexicon: HALOT
  rationale: גְּבוּל suele significar frontera o territorio. En este contexto de repartición de tierras, 'dentro de su territorio' expresa con claridad el ámbito asignado.
- source_word: לִבְנֵי אַהֲרֹן
  english_pob_choice: for the sons of Aaron
  chosen_spanish: para los hijos de Aarón
  alternatives_spanish:
  - para los descendientes de Aarón
  - pertenecientes a los hijos de Aarón
  lexicon: HALOT
  rationale: Se conserva el giro genealógico y sacerdotal usual. 'Hijos de Aarón' es idiomático en español bíblico y corresponde de forma directa al hebreo.
- source_word: לְמִשְׁפַּחַת הַקְּהָתִי
  english_pob_choice: of the family of the Kohathites
  chosen_spanish: de la familia de los coatitas
  alternatives_spanish:
  - de la casa de los coatitas
  - del clan de los coatitas
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí identifica una subclan o grupo familiar amplio. 'Familia de los coatitas' mantiene la relación con el nombre gentilicio y resulta claro en español.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot was theirs
  chosen_spanish: el sorteo les pertenecía
  alternatives_spanish:
  - la suerte les correspondía
  - les tocó la suerte
  lexicon: HALOT
  rationale: El hebreo habla del reparto por suerte/lote. 'El sorteo les pertenecía' intenta reflejar el valor distributivo sin volverlo excesivamente idiomático. 'Sorteo' conserva la idea de asignación por designación, aunque 'lote' también sería posible en español bíblico; se evita aquí una formulación que sugiera solo un evento y no la porción adjudicada.
theological_decisions:
- issue: La frase final sobre el 'gōrāl' expresa asignación por sorteo, no simple posesión abstracta.
  english_pob_reading: for the lot was theirs
  chosen_spanish_reading: porque el sorteo les pertenecía
  alternative_spanish_readings:
  - porque el lote era de ellos
  - porque la suerte les correspondía
  rationale: 'El hebreo presenta una cláusula de asignación: la porción fue adjudicada a este grupo. En español, ''el sorteo les pertenecía'' preserva la idea de adjudicación sin borrar la relación con el reparto por suertes. Se evita espiritualizar o moralizar el término.'
  doctrine_reference: Josué 18–19; 1 Crónicas 24–26 (repartos y asignaciones por suerte)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'for the lot fell to them' por 'for the lot was theirs' para reflejar con más precisión el hebreo. La versión española evita un giro idiomático demasiado libre y mantiene la idea de adjudicación por suerte sin introducir causalidad adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en esta serie cuando el texto lo requiera, pero este versículo no lo contiene.
  - '''Hijos de Aarón'' y ''coatitas'' siguen la terminología genealógica usual de la POB en español.'
  - '''Sorteo'' se usa como equivalente funcional de ''lot'' en sentido distributivo; se evitaron opciones litúrgicas o eclesiásticas no requeridas por el hebreo.'
