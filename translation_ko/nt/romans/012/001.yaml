id: ROM.12.1
reference: Romans 12:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παρακαλῶ οὖν ὑμᾶς, ἀδελφοί, διὰ τῶν οἰκτιρμῶν τοῦ θεοῦ παραστῆσαι τὰ σώματα ὑμῶν θυσίαν ζῶσαν ἁγίαν ⸂εὐάρεστον τῷ θεῷ⸃, τὴν λογικὴν λατρείαν ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/001.yaml
  text: Therefore I urge you[a], brothers, by the mercies of God, to present your bodies as a living sacrifice[b], holy and pleasing to God—your reasonable worship.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the masculine form to address a mixed group.
    reason: alternative_reading
  - marker: b
    text: Or 'your spiritual worship' or 'your rational service'; the Greek phrase can carry senses of reasoned, fitting, or spiritual service/worship.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 그러므로 내가 하나님의 자비하심으로 여러분에게 권합니다. 여러분의 몸을 하나님께서 기뻐하시는 거룩한 산 제물로 드리십시오. 이것이 여러분의 합당한 예배입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「합당한 예배」(λογικὴν λατρείαν): 「λογικός」는 (1) 「이성에 부합하는, 합리적인」, (2) 「말씀에 부합하는」, (3) 「영적인, 비물질적인」 등 여러 의미를 지닌다. 본문은 「합당한」으로 옮기고 대안 「이성적인 예배」, 「영적 예배」를 모두 가능한 독법으로 둔다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκτιρμῶν
  english_pob_choice: mercies
  chosen_korean: 자비하심
  alternatives_korean:
  - 긍휼
  - 불쌍히 여기심
  lexicon: BDAG
  rationale: 9:15의 οἰκτίρω와 의미장 연결. 송영적 호소에 자연스러운 한국어.
- source_word: θυσίαν ζῶσαν
  english_pob_choice: living sacrifice
  chosen_korean: 산 제물
  alternatives_korean:
  - 살아 있는 제물
  lexicon: BDAG
  rationale: 전통적 한국어 신학 어휘.
- source_word: λογικὴν λατρείαν
  english_pob_choice: reasonable worship
  chosen_korean: 합당한 예배
  alternatives_korean:
  - 이성적인 예배
  - 영적 예배
  - 이치에 맞는 예배
  lexicon: BDAG
  rationale: λογικός의 다층 의미를 포괄하는 「합당한」을 채택하고 대안을 각주에 명시한다.
theological_decisions:
- issue: λογικὴν λατρείαν의 의미 — 「이성적인」, 「합당한」, 「영적인」 중 어느 쪽인가
  chosen_reading: 「합당한 예배」 (대안을 각주에 보존)
  alternative_readings:
  - 이성적인 예배
  - 영적 예배
  - 이치에 맞는 예배
  rationale: λογικός는 (1) 이성적/합리적, (2) 말씀(λόγος)에 부합하는, (3) 비물질적·영적의 의미를 모두 담는다. 「합당한」은 본문의 권면적 흐름(몸을 산 제물로 드리는 것이 「마땅한」 예배라는 결론적 호소)을 잘 살리며, 대안 의미는 각주에 보존한다.
  doctrine_reference: 'DOCTRINE.md: 다층 의미 보존'
