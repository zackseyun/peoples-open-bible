id: JOB.19.17
reference: Job 19:17
source:
  edition: WLC
  text: ר֭וּחִֽ/י זָ֣רָה לְ/אִשְׁתִּ֑/י וְ֝/חַנֹּתִ֗י לִ/בְנֵ֥י בִטְנִֽ/י׃
translation:
  text: My breath is repulsive to my wife[b][a], and I am loathsome to the sons of my own body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another understanding of the difficult Hebrew: “and my plea is to the sons of my body” or “I beg the sons of my body for favor.”'
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, “to the sons of my body.” The expression may refer to Job’s own children or, more generally, his close blood relatives.
    reason: cultural_note
lexical_decisions:
- source_word: רוּחִי
  chosen: my breath
  alternatives:
  - my spirit
  - my wind
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In this context, with the wife finding it offensive, the concrete sense 'breath' best fits the social and bodily imagery of Job's affliction.
- source_word: זָרָה
  chosen: is repulsive
  alternatives:
  - is strange
  - is offensive
  - is loathsome
  lexicon: HALOT
  rationale: The verb from זוּר conveys being strange/foreign or repellent in context. Here it describes Job's breath as alienating his wife, so 'is repulsive' brings out the relational revulsion implied by the context better than the more wooden 'is strange.'
- source_word: לְאִשְׁתִּי
  chosen: to my wife
  alternatives:
  - for my wife
  lexicon: HALOT
  rationale: The preposition ל marks the person affected. English idiom prefers 'to my wife' with a predicate of repulsion.
- source_word: וְחַנֹּתִי
  chosen: and I am loathsome
  alternatives:
  - and my plea for favor
  - and my supplication
  - and I am offensive
  lexicon: HALOT
  rationale: This form is difficult and has been understood either from a verbal idea related to being pitied/entreated or as expressing offensiveness/loathsomeness in parallel with the first colon. Given the immediate parallelism and the object 'to the sons of my body,' the sense 'I am loathsome' yields coherent English and matches the verse's theme of social revulsion. The alternative tradition connecting it with supplication is preserved in a footnote.
- source_word: לִבְנֵי
  chosen: to the sons of
  alternatives:
  - to the children of
  lexicon: HALOT
  rationale: בנים literally means 'sons.' Retaining 'sons' is more textually transparent and aligns with the gender-accurate philosophy, though the idiom may refer more broadly to offspring/household relations.
- source_word: בִטְנִי
  chosen: my own body
  alternatives:
  - my womb
  - my belly
  lexicon: HALOT
  rationale: בטן literally means belly/womb. In this idiom, 'sons of my body' communicates biological offspring or close blood relation. 'My own body' makes the idiom intelligible in English while preserving the physical kinship emphasis.
