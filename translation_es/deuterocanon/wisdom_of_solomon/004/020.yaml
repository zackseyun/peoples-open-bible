review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: futuro de llegada, deliberación sobre los pecados, y confrontación condenatoria por las propias malas obras. También preserva la distinción entre ἁμαρτήματα y ἀνομήματα. Sin embargo, «los convencerán» no comunica con suficiente claridad el valor judicial-moral de ἐλέγξει; en español suena más a persuasión que a convicción de culpa o exposición. Además, «obras sin ley» es comprensible pero algo calcado y menos natural que una opción española más idiomática que siga preservando el matiz de ἀνομήματα.'
  spanish_quality_summary: El texto es generalmente claro y legible, con buen tono bíblico moderno. «Vendrán con temor» y «razonando sobre sus pecados» funcionan bien. La principal debilidad de estilo y sentido está en «sus obras sin ley los convencerán frente a frente», donde tanto el sustantivo compuesto como el verbo elegido resultan algo duros o ambiguos para un lector hispano. Una leve revisión mejora naturalidad y precisión.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Se conserva «pecados» para ἁμαρτήματα y debe mantenerse un segundo término distinto para ἀνομήματα. Recomiendo «actos inicuos» aquí: es idiomático, mantiene un matiz moral-jurídico más fuerte que «pecados», y evita el calco «sin ley». Para ἐλέγξει, «los dejarán en evidencia» refleja bien la exposición/convicción de culpa sin sobretraducir a condena formal.'
  issues:
  - severity: medium
    issue: «los convencerán» debilita el sentido de ἐλέγξει
    rationale: En español moderno, «convencer» suele significar persuadir a alguien, no probarle su culpa ni dejarlo expuesto. El griego en este contexto tiene fuerza de reprobar, exponer o convencer de culpa.
  - severity: medium
    issue: «obras sin ley» suena calcado y poco idiomático
    rationale: Aunque intenta preservar la relación con ἀνόμημα, la expresión no fluye naturalmente en español bíblico general. Una opción como «actos inicuos» o «actos de maldad» suena más natural; «actos inicuos» además conserva mejor la intensificación frente a «pecados».
  - severity: low
    issue: La nota [b] explica bien ἐξ ἐναντίας, pero el anclaje parece recaer sobre «obras sin ley» en lugar de la frase confrontativa
    rationale: La explicación trata del giro «de enfrente» / confrontación directa. Idealmente la marca debe acompañar la expresión correspondiente en la cláusula, no necesariamente el sintagma nominal previo.
  revised_spanish_text: Vendrán con temor[a], razonando sobre sus pecados, y sus actos inicuos los dejarán en evidencia frente a frente[b].
