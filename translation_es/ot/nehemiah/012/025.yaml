  text: מַתַּנְיָ֧ה וּ/בַקְבֻּֽקְיָ֛ה עֹבַדְיָ֥ה מְשֻׁלָּ֖ם טַלְמ֣וֹן עַקּ֑וּב שֹׁמְרִ֤ים שֽׁוֹעֲרִים֙ מִשְׁמָ֔ר בַּ/אֲסֻפֵּ֖י הַ/שְּׁעָרִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/025.yaml
  text: Mattaniah[a], Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers, standing guard at the storehouses of the gates.
  footnotes:
  - marker: a
    text: Or 'keeping watch at the gathering places by the gates.' The Hebrew term behind 'storehouses' can more broadly denote places of gathering or collection.
    reason: lexical_alternative
