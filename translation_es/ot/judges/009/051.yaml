translation:
  language: es
  text: Pero había una torre fuerte en medio de la ciudad[a], y todos los hombres y las mujeres y todos los líderes[b] de la ciudad huyeron allí y se encerraron, y subieron al techo de la torre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “una torre fortificada”. La expresión hebrea combina literalmente “torre” con “fuerza”, subrayando su carácter defensivo.
    reason: lexical_alternative
  - marker: b
    text: O “todos los principales de la ciudad”. El hebreo dice literalmente “dueños/amos de la ciudad”, un modismo para los hombres principales o líderes de la ciudad, no necesariamente todos sus habitantes ni propietarios en sentido moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל עֹז
  english_pob_choice: a strong tower
  chosen_spanish: una torre fuerte
  alternatives_spanish:
  - una torre fortificada
  - una torre de fortaleza
  lexicon: HALOT
  rationale: מִגְדַּל es “torre” y עֹז añade la idea de fuerza o fortaleza defensiva. “Torre fuerte” conserva esa combinación con naturalidad en español sin convertirla en una paráfrasis excesiva.
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: in the middle of the city
  chosen_spanish: en medio de la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en el interior de la ciudad
  lexicon: HALOT
  rationale: בְּתוֹךְ señala el centro o mitad del espacio, no solo la localización general. “En medio de la ciudad” reproduce mejor esa fuerza espacial que un simple “dentro de la ciudad”.
- source_word: וַיָּנֻסוּ שָׁמָּה
  english_pob_choice: fled there
  chosen_spanish: huyeron allí
  alternatives_spanish:
  - corrieron allí
  - buscaron refugio allí
  lexicon: HALOT
  rationale: נוּס significa “huir”. “Huyeron allí” es directo y fiel; “buscaron refugio allí” explicita la intención, pero añade más de lo que el verbo por sí solo dice.
- source_word: כָּל הָאֲנָשִׁים וְהַנָּשִׁים
  english_pob_choice: all the men and women
  chosen_spanish: todos los hombres y las mujeres
  alternatives_spanish:
  - todas las personas, hombres y mujeres
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre hombres y mujeres, por lo que conviene mantener ambos términos. “Personas” suavizaría una distinción que el texto conserva.
- source_word: וְכֹל בַּעֲלֵי הָעִיר
  english_pob_choice: all the leaders of the city
  chosen_spanish: todos los dueños de la ciudad
  alternatives_spanish:
  - todos los líderes de la ciudad
  - todos los principales hombres de la ciudad
  lexicon: HALOT
  rationale: בַּעֲלֵי literalmente puede significar “dueños/amos/poseedores”, y el inglés POB preserva la tensión idiomática con una nota. En español, “dueños” mantiene la literalidad del giro hebreo; la nota explica que el sentido contextual apunta a los principales o dirigentes de la ciudad, no necesariamente a propietarios en sentido moderno.
- source_word: וַיִּסְגְּרוּ בַעֲדָם
  english_pob_choice: shut themselves in
  chosen_spanish: se encerraron
  alternatives_spanish:
  - se cerraron dentro
  - se atrancaron dentro
  lexicon: HALOT
  rationale: La frase hebrea expresa un cierre “para sí” o “detrás de sí”. “Se encerraron” transmite con naturalidad el resultado de quedar contenidos dentro, sin exigir un objeto explícito que el hebreo no da.
- source_word: וַיַּעֲלוּ עַל גַּג הַמִּגְדָּל
  english_pob_choice: they went up onto the roof of the tower
  chosen_spanish: subieron al techo de la torre
  alternatives_spanish:
  - subieron al terrado de la torre
  - subieron a la azotea de la torre
  lexicon: HALOT
  rationale: גַּג es literalmente “techo” o “azotea/terrado” según contexto. “Techo de la torre” es claro y mantiene el detalle arquitectónico del original; “azotea” podría sonar más urbana y menos neutra según región.
theological_decisions:
- issue: 'Alcance de בַּעֲלֵי הָעִיר: literalidad frente a interpretación social'
  english_pob_reading: '''all the leaders of the city'' with a note that the Hebrew idiom is ''owners/masters of the city'' and refers to leading men'
  chosen_spanish_reading: '''todos los dueños de la ciudad'' con nota que aclara el sentido idiomático de principales o dirigentes'
  alternative_spanish_readings:
  - '''todos los líderes de la ciudad'''
  - '''todos los principales hombres de la ciudad'''
  rationale: No hay una cuestión doctrinal, pero sí una tensión lexical con implicaciones históricas. La forma más auditable en español conserva el giro hebreo literal y, mediante nota, evita que el lector entienda “dueños” en sentido económico moderno. Esto preserva la fidelidad al texto base y la explicación contextual del POB inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión; el cotejo reporta alto acuerdo y no hay revisiones aplicadas. La versión española sigue ese estado estable, manteniendo las decisiones léxicas documentadas y la misma estructura semántica básica del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención POB para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva el paralelismo inclusivo 'hombres y mujeres' sin neutralizarlo en 'personas'.
  - '''Dueños'' se usa de manera controlada por su valor literal hebreo, no como afirmación sociológica moderna.'
  - '''Techo'' traduce גַּג de forma sobria y comprensible en español general, sin forzar ''azotea'' o ''terrado'' en el texto principal.'
