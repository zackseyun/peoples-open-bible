translation:
  language: es
  text: Y serás profanada[a] por ti misma, ante los ojos de las naciones, y sabrás que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás contaminada», «serás deshonrada», o «serás profanada en ti misma». El hebreo puede expresar profanación, contaminación o deshonra pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִחַלְתְּ
  english_pob_choice: you will be profaned
  chosen_spanish: serás profanada
  alternatives_spanish:
  - serás contaminada
  - serás deshonrada
  - serás tratada como común
  lexicon: HALOT
  rationale: El verbo en pasivo/reflexivo se entiende mejor aquí como profanación en sentido cultual y judicial, no solo como deshonra genérica. «Profanada» conserva la carga de santidad profanada que el contexto de Ezequiel favorece.
- source_word: בָּךְ
  english_pob_choice: through yourself
  chosen_spanish: en ti misma
  alternatives_spanish:
  - por ti misma
  - a través de ti misma
  lexicon: HALOT
  rationale: El hebreo con ב y sufijo femenino singular es breve e idiomático. «En ti misma» mantiene la referencia interna a Jerusalén y funciona con naturalidad en español; «por ti misma» o «a través de ti misma» introducirían una causalidad más interpretativa.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea resalta visibilidad pública. «Ante los ojos de» reproduce bien la imagen y permanece transparente en español.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En contexto profético, el término apunta a naciones extranjeras en conjunto. «Las naciones» es la opción más clara y menos cargada confesionalmente.
- source_word: וְיָדַעַתְּ
  english_pob_choice: and you will know
  chosen_spanish: y sabrás
  alternatives_spanish:
  - y conocerás
  - entonces sabrás
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético expresa resultado futuro. «Sabrás» es natural en español y conserva la fuerza conclusiva sin añadir un matiz no explicitado como «entonces».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton según la convención del proyecto. «Yahvé» evita la sustitución por un título y mantiene la decisión auditada en la fuente inglesa.
theological_decisions:
- issue: Sentido de חלל en este versículo
  english_pob_reading: judicial/cultic profanation of Jerusalem before the nations
  chosen_spanish_reading: profanación judicial y cultual de Jerusalén ante las naciones
  alternative_spanish_readings:
  - deshonra general ante las naciones
  - defilement/contaminación ritual sin énfasis cultual
  rationale: La lectura profanadora encaja mejor con el vocabulario de santidad e impureza en Ezequiel. Mantiene la tensión teológica de que el pecado del pueblo produce una desacralización pública delante de las naciones.
  doctrine_reference: Ezequiel 22; santidad profanada y juicio público
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «in yourself» a «through yourself» para reflejar mejor la preposición hebrea. En español se resolvió con «en ti misma», que conserva la referencia interna sin forzar una preposición causal. También se ajustó la colocación de la nota para anclar correctamente la alternativa léxica al término principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se eligió «profanada» en lugar de «deshonrada» para conservar la dimensión cultual del contexto.
  - Se evitó «Señor» como sustituto del nombre divino.
  - La segunda persona femenina singular se conservó de modo coherente con el sujeto implícito (Jerusalén).
