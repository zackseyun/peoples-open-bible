translation:
  language: es
  text: 'Y les dije: «Ustedes son santos para Yahvé, y los vasos son santos; y la plata y el oro son una ofrenda voluntaria para Yahvé, el Dios de sus padres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y les dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce el discurso directo de Esdras y marca secuencia narrativa. «Y dije» conserva la continuidad del relato sin añadir matiz temporal que el hebreo no exige.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - a ellos mismos
  lexicon: HALOT
  rationale: El pronombre masculino plural apunta a los destinatarios del discurso. «A ellos» mantiene la referencia plural de manera clara y formal.
- source_word: אַתֶּם
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  - Vos
  lexicon: HALOT
  rationale: El plural de segunda persona se expresa naturalmente en español con «ustedes» para un registro neutral y amplio.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: cosa santa para Yahvé
  alternatives_spanish:
  - santos para Yahvé
  - santos de Yahvé
  - consagrados a Yahvé
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ funciona como predicado de estado consagrado. «Cosa santa» conserva el sustantivo-adjetivo hebreo y evita perder la noción cultual de pertenencia; se eligió «para Yahvé» para expresar la relación de dedicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la convención del proyecto en español. «Yahvé» comunica el Tetragrámaton sin sustituirlo por un título.
- source_word: וְהַכֵּלִים קֹדֶשׁ
  english_pob_choice: and the vessels are holy
  chosen_spanish: y los vasos son santos
  alternatives_spanish:
  - y los utensilios son santos
  - y los vasos son cosa santa
  lexicon: HALOT
  rationale: En contexto de templo, כֵּלִים se refiere a objetos/implementos cultuales. «Vasos» es un término tradicional en español bíblico y sigue siendo inteligible; «santos» mantiene el paralelo con la primera cláusula.
- source_word: וְהַכֶּסֶף וְהַזָּהָב
  english_pob_choice: and the silver and the gold
  chosen_spanish: y la plata y el oro
  alternatives_spanish:
  - y el plata y el oro
  - y la plata y el oro
  lexicon: HALOT
  rationale: Se conservan ambos sustantivos con artículo, como en el hebreo, para mantener el balance formal de la lista de ofrendas.
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: ofrenda voluntaria
  alternatives_spanish:
  - ofrenda libre
  - ofrenda de buena voluntad
  lexicon: HALOT
  rationale: נְדָבָה expresa una ofrenda dada libremente, no por obligación. «Ofrenda voluntaria» comunica bien la idea cultual en español y preserva la fuerza de la elección libre.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: El dativo aquí indica destino/dedicación de la ofrenda. «Para Yahvé» es más natural en español que un calco literal, y conserva la noción de pertenencia.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de vuestros padres
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se mantiene la fórmula pactual tradicional con plural masculino. «Sus padres» preserva la referencia ancestral directa y la relación de pacto con el linaje de los destinatarios.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto usa explícitamente el Tetragrámaton; en la política del proyecto en español se conserva el nombre propio divino en vez de sustituirlo por un título. «Yahvé» sigue la convención establecida del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de קֹדֶשׁ aplicado a personas y objetos
  english_pob_reading: holy to Yahweh / the vessels are holy
  chosen_spanish_reading: cosa santa para Yahvé / los vasos son santos
  alternative_spanish_readings:
  - consagrados a Yahvé / los vasos son sagrados
  - santos para Yahvé / los vasos son santos
  rationale: El hebreo enfatiza consagración y pertenencia cultual, no solo cualidad moral. «Cosa santa» y «son santos» mantienen la tensión entre estado sacro y función dedicada sin diluirla.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (source-semantic precision)
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registraron cambios y la concordancia general fue alta. La redacción española procura reflejar esa estabilidad sin introducir ajustes no atestiguados por el texto fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo el paralelismo «cosa santa / santos» para conservar la repetición de קֹדֶשׁ en el hebreo.
  - «Ofrenda voluntaria» traduce נְדָבָה con el sentido cultual de don libre, sin suavizar la categoría sacrificial.
  - «El Dios de sus padres» preserva la fórmula pactual y la referencia plural masculina del texto fuente.
