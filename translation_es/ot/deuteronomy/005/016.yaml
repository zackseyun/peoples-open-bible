  to: Honra a tu padre y a tu madre, como Yahvé tu Dios te lo mandó, para que tus días se prolonguen y para que te vaya bien[a] sobre la tierra[b] que Yahvé tu Dios te da.
  rationale: Se corrigen los anclajes de las notas para que correspondan a las alternativas reales del inglés auditado y se ajusta la nota [a] para que ofrezca una alternativa española distinta del texto principal. El resto del versículo puede mantenerse, pues preserva adecuadamente el sentido del hebreo, la terminología del proyecto y la legibilidad en español.
