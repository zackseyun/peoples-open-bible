revisions:
- from: Porque vive el rey Nabucodonosor, de toda la tierra, y vive su dominio[a], él que te envió para la prosperidad de toda persona[b], porque no solo los hombres servirán por medio de ti[c] a él, sino que también las fieras del campo, el ganado y las aves del cielo vivirán para Nabucodonosor y toda su casa por tu fuerza.
  to: Porque vive el rey Nabucodonosor de toda la tierra, y vive su dominio[a], él que te envió para la prosperidad de todo ser viviente[b], porque no solo los hombres servirán a él por medio de ti, sino que también las fieras del campo, el ganado y las aves del cielo vivirán para Nabucodonosor y toda su casa por tu fuerza[c].
  rationale: Se revisa para ajustar mejor πάσης ψυχῆς al sentido documentado («todo ser viviente» en vez de «toda persona»), mejorar la naturalidad de «de toda la tierra» en español, y alinear la nota alternativa con la ambigüedad real de la cláusula final griega señalada en la auditoría inglesa.
