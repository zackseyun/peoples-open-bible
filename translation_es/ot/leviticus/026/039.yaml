    reason: lexical_alternative
  - marker: b
    text: «Con ellos» puede significar que las iniquidades de sus padres permanecen con ellos, o que ellos se consumen junto con esas iniquidades ancestrales que todavía los afectan.
    reason: alternative_reading
  revision_rationale: La revisión hace un ajuste mínimo de orden para que el español sea más natural y preserve mejor la ambigüedad de «con ellos», y además reincorpora las dos notas significativas ya respaldadas por la auditoría inglesa.
