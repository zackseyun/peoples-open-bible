translation:
  language: es
  text: Y descendió a la llanura de Damasco en los días de la siega del trigo, e incendió todos sus campos; entregó a la destrucción sus rebaños y sus manadas de ganado, saqueó sus ciudades y arrasó sus llanuras, y mató a todos sus jóvenes hombres con el filo de la espada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con la boca de la espada», un modismo que significa morir a espada.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se dirigió hacia abajo
  lexicon: BDAG
  rationale: El griego expresa movimiento hacia abajo; en español, 'descendió' conserva ese valor direccional con tono digno y natural para el registro bíblico.
- source_word: πεδίον Δαμασκοῦ
  english_pob_choice: the plain of Damascus
  chosen_spanish: la llanura de Damasco
  alternatives_spanish:
  - la planicie de Damasco
  - la llanura cerca de Damasco
  lexicon: LSJ
  rationale: πεδίον designa una llanura o terreno llano; el genitivo funciona mejor como designación geográfica. 'Llanura de Damasco' preserva la relación nominal sin sobreexplicar.
- source_word: ἐν ἡμέραις θερισμοῦ πυρῶν
  english_pob_choice: in the days of the wheat harvest
  chosen_spanish: en los días de la siega del trigo
  alternatives_spanish:
  - durante la siega del trigo
  - en tiempo de la cosecha del trigo
  lexicon: LSJ
  rationale: La expresión es idiomática para la temporada de cosecha. 'Siega del trigo' refleja con precisión πυρῶν y mantiene la imagen agrícola del texto.
- source_word: ἐνέπρησεν
  english_pob_choice: set ... on fire
  chosen_spanish: incendió
  alternatives_spanish:
  - prendió fuego a
  - quemó
  lexicon: LSJ
  rationale: El verbo indica prender fuego o quemar algo de forma causativa. 'Incendió' es natural en español y conserva la fuerza del acto destructivo.
- source_word: ἀγροὺς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos de cultivo
  - tierras
  lexicon: LSJ
  rationale: En este contexto agrícola, 'campos' comunica bien el sentido de tierras trabajadas y evita una repetición excesiva con 'llanuras' en la cláusula siguiente.
- source_word: τὰ ποίμνια καὶ τὰ βουκόλια
  english_pob_choice: their flocks and herds
  chosen_spanish: sus rebaños y sus vacadas
  alternatives_spanish:
  - sus rebaños y sus manadas de ganado
  - su ganado
  lexicon: LSJ
  rationale: La pareja distingue entre rebaños y ganado vacuno. 'Vacadas' mantiene la referencia a bovinos y conserva la distinción léxica del griego mejor que el genérico 'ganado'.
- source_word: ἔδωκεν εἰς ἀφανισμόν
  english_pob_choice: gave over to destruction
  chosen_spanish: entregó a la destrucción
  alternatives_spanish:
  - consignó a la destrucción
  - dejó para destrucción
  lexicon: LSJ
  rationale: La construcción griega es literalmente 'dio a destrucción'. 'Entregó a la destrucción' reproduce el giro idiomático sin debilitar la severidad del verbo.
- source_word: ἐσκύλευσεν
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - despojó
  - pilló
  lexicon: BDAG
  rationale: El verbo significa tomar botín; 'saqueó' es la equivalencia española directa y enérgica, bien ajustada al contexto militar.
- source_word: ἐξελίκμησεν
  english_pob_choice: stripped bare
  chosen_spanish: arrasó
  alternatives_spanish:
  - despojó por completo
  - dejó exhaustas
  lexicon: LSJ
  rationale: El verbo tiene la idea de barrer o dejar limpio/arruinado. 'Arrasó' comunica devastación total en español y funciona bien en paralelo con 'saqueó'.
- source_word: τὰ πεδία αὐτῶν
  english_pob_choice: their plains
  chosen_spanish: sus llanuras
  alternatives_spanish:
  - sus campos abiertos
  - sus tierras llanas
  lexicon: LSJ
  rationale: Se mantiene la distinción respecto de ἀγροὺς, que ya se tradujo como 'campos'. 'Llanuras' conserva el matiz geográfico del griego.
- source_word: ἐπάταξεν
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  lexicon: BDAG
  rationale: El verbo significa golpear o herir; en este contexto bélico, 'hirió' permite que la frase siguiente complete la idea de muerte con la espada, sin anticiparla demasiado.
- source_word: νεανίσκους
  english_pob_choice: young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus jóvenes varones
  - sus muchachos
  lexicon: BDAG
  rationale: El término puede referirse a jóvenes o muchachos. 'Sus jóvenes' conserva amplitud semántica y evita imponer una especificación innecesaria.
- source_word: ἐν στόματι ῥομφαίας
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - por la espada
  - con la boca de la espada
  lexicon: LSJ
  rationale: Se trata de un idiomático semitizante que indica muerte por espada. 'Con el filo de la espada' mantiene la imagen literal-reconocible en español y la equivalencia idiomática.
translation_notes:
  revision_awareness: 'El pasaje se vierte de manera estable respecto del contexto auditado en inglés: se conserva la secuencia de devastación agrícola y militar, la distinción entre campos/llanuras y la equivalencia idiomática de «la boca de la espada» mediante una nota. No se introducen cambios textuales ni interpretativos respecto del testimonio griego base.'
  spanish_consistency_notes:
  - Se prefirió 'Y' inicial para seguir el flujo narrativo continuo del contexto.
  - '''Llanura'' y ''llanuras'' distinguen πεδίον/πεδία sin forzar sinonimia.'
  - '''Campos'' se reservó para ἀγροὺς para evitar confusión con ''llanuras''.'
  - '''Sus jóvenes'' conserva el alcance de νεανίσκους sin endurecerlo a ''jóvenes varones''.'
  - La nota mantiene visible el giro literal del griego sin sacrificar la legibilidad del texto principal.
