translation:
  language: es
  text: Porque los labios del sacerdote deben guardar el conocimiento, y ellos deben buscar la instrucción[a] de su boca, porque él es el mensajero de Yahvé de los ejércitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ley» o «la enseñanza» para תּוֹרָה.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «el SEÑOR de los ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי כֹהֵן
  english_pob_choice: the lips of a priest
  chosen_spanish: los labios del sacerdote
  alternatives_spanish:
  - los labios de un sacerdote
  - los labios sacerdotales
  lexicon: HALOT
  rationale: El hebreo en constructo designa literalmente los labios del sacerdote. En español, 'los labios del sacerdote' conserva el sentido genérico y la referencia institucional sin añadir individualización ni suavizar la imagen.
- source_word: יִשְׁמְרוּ
  english_pob_choice: should guard
  chosen_spanish: deben guardar
  alternatives_spanish:
  - deberían guardar
  - guardarán
  - guarden
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una obligación o expectativa normativa en el contexto de reprensión profética. 'Deben guardar' conserva esa fuerza de deber sin convertirlo en mera profecía futura.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el saber
  - la comprensión
  lexicon: HALOT
  rationale: '''Conocimiento'' es la equivalencia natural y fiel para el contenido que los sacerdotes deben preservar: conocimiento fiel de Dios y de sus caminos, no simple información.'
- source_word: וְתוֹרָה
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar 'ley' o 'enseñanza', aquí el contexto de lo que se busca de la boca del sacerdote favorece 'instrucción', que comunica bien la función oral y autorizada del sacerdote sin estrechar el término a legislación.
- source_word: יְבַקְשׁוּ מִפִּיהוּ
  english_pob_choice: they should seek instruction from his mouth
  chosen_spanish: ellos deben buscar la instrucción de su boca
  alternatives_spanish:
  - de él deben buscar instrucción
  - de su boca deben buscar la instrucción
  lexicon: HALOT
  rationale: El hebreo tiene un sujeto plural implícito; 'ellos' preserva la referencia plural indefinida sin añadir un sustantivo como 'gente'. 'De su boca' mantiene la imagen de la enseñanza oral, y 'buscar' refleja bien יְבַקְשׁוּ.
- source_word: מַלְאַךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: HALOT
  rationale: Aquí el referente es el sacerdote; por eso 'mensajero' es la lectura adecuada y evita importar 'ángel', que en español sugeriría otro tipo de ser.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - el SEÑOR de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' según el criterio del proyecto para יהוה. 'De los Ejércitos' traduce צְבָאוֹת de forma transparente y conserva el título teológico/militar sin recurrir a 'hosts' ni a la forma tradicional de ocultamiento.
theological_decisions:
- issue: Traducción de יהוה
  english_pob_reading: the LORD / Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de los ejércitos
  rationale: El proyecto pide exponer el nombre divino como 'Yahvé' en el texto principal. Además, el título compuesto conserva la referencia a la soberanía divina sobre los ejércitos celestiales o cósmicos, sin mascar el nombre con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
- issue: Fuerza normativa de los verbos imperfectos
  english_pob_reading: should guard / should seek
  chosen_spanish_reading: deben guardar / deben buscar
  alternative_spanish_readings:
  - guardarán / buscarán
  - guarden / busquen
  rationale: El contexto es una reprensión de la responsabilidad sacerdotal; la traducción con 'deben' preserva la obligación implícita mejor que un futuro simple, y evita que el versículo se lea solo como predicción.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés, que corrigió el sujeto implícito a un plural indefinido ('ellos') en lugar de añadir 'people'. La versión española conserva ese plural indefinido con 'ellos' y mantiene la relación oral 'de su boca' como elemento clave del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - Se evita 'SEÑOR' como sustitución reverencial en el texto principal.
  - Se mantiene 'mensajero' para מַלְאַךְ por el contexto sacerdotal, no 'ángel'.
  - '''Conocimiento'' e ''instrucción'' conservan la distinción semántica del hebreo sin sobretraducción.'
