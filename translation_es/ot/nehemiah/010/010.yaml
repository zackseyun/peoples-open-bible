translation:
  language: es
  text: 'y los levitas: Jesúa hijo de Azanías, Binúi de los hijos de Henadad[a], Cadmiel[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los hijos de Henadad»; la frase puede identificar a Binúi como perteneciente al clan de Henadad.'
    reason: lexical_alternative
  - marker: b
    text: También se encuentra la grafía «Kadmiel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levitas eran
  - también los levitas
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma nominal con וְ sin verbo finito; en español, 'y los levitas' reproduce bien la continuidad de la lista. Se mantiene el plural definido como en el מקור, sin añadir verbo que el texto no tiene.
- source_word: וְיֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - y Jesúa
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma cercana al hebreo y útil para lectores hispanos. Como el encabezado ya introduce la enumeración con 'y los levitas', no hace falta repetir una conjunción antes del primer nombre en español.
- source_word: בֶּן אֲזַנְיָה
  english_pob_choice: son of Azaniah
  chosen_spanish: hijo de Azanías
  alternatives_spanish:
  - hijo de Azanía
  - el hijo de Azanías
  lexicon: HALOT
  rationale: La construcción genealógica hebrea se expresa de modo directo con 'hijo de'. Se conserva el nombre propio con terminación española naturalizada, sin alterar la relación filial del texto.
- source_word: בִּנּוּי
  english_pob_choice: Binnui
  chosen_spanish: Binúi
  alternatives_spanish:
  - Binnui
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma inteligible para español, ajustando la acentuación para lectura natural sin perder la referencia al hebreo.
- source_word: מִבְּנֵי חֵנָדָד
  english_pob_choice: from the sons of Henadad
  chosen_spanish: de los hijos de Henadad
  alternatives_spanish:
  - de entre los hijos de Henadad
  - de la familia de Henadad
  - de los descendientes de Henadad
  lexicon: HALOT
  rationale: El audit trail inglés preserva la ambigüedad entre adscripción claníca y filiación literal. En español, 'de los hijos de Henadad' mantiene la forma hebrea y deja abierta la posibilidad de pertenencia al clan, sin resolver indebidamente la relación.
- source_word: קַדְמִיאֵל
  english_pob_choice: Kadmiel
  chosen_spanish: Cadmiel
  alternatives_spanish:
  - Kadmiel
  lexicon: HALOT
  rationale: Se adopta la forma tradicionalmente más legible en español, 'Cadmiel', que refleja bien la transliteración del nombre hebreo y evita una grafía híbrida innecesaria.
theological_decisions:
- issue: Lista genealógica / adscripción claníca en מִבְּנֵי חֵנָדָד
  english_pob_reading: The phrase may identify Binnui as belonging to the Henadad clan.
  chosen_spanish_reading: La frase puede identificar a Binúi como perteneciente al clan de Henadad.
  alternative_spanish_readings:
  - La frase puede indicar que Binúi era de los hijos de Henadad
  - La frase puede identificar a Binúi como descendiente de Henadad
  rationale: 'Se conserva la tensión documentada por el inglés: no se decide entre filiación literal y pertenencia de clan. ''Perteneciente al clan'' expresa adecuadamente la posibilidad genealógica-social sin borrar la lectura más directa del hebreo.'
  doctrine_reference: N/A (nota genealógica y de pertenencia tribal/claníca)
translation_notes:
  revision_awareness: El pasaje fue revisado en el audit trail inglés sin cambios sustantivos; se mantiene la misma decisión de no suplir un verbo inexistente y de conservar la ambigüedad de מִבְּנֵי חֵנָדָד. No se detectan revisiones posteriores que obliguen a modificar la lectura española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usa una transliteración consistente para nombres propios hebreos en forma natural para español.
  - No se introduce puntuación interpretativa adicional fuera de la necesaria para la legibilidad de la lista.
