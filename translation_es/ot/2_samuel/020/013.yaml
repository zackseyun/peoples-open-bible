translation:
  language: es
  text: Tan pronto como fue retirado de la calzada[a], todos los hombres pasaron tras Joab para perseguir a Seba hijo de Bicri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del camino principal» / «de la carretera». El hebreo מְסִלָּה puede denotar una vía principal o una calzada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As soon as
  chosen_spanish: Tan pronto como
  alternatives_spanish:
  - Cuando
  - Después de que
  lexicon: HALOT
  rationale: La cláusula temporal expresa secuencia inmediata; «Tan pronto como» reproduce mejor la rapidez narrativa que un simple «cuando».
- source_word: הֹגָה
  english_pob_choice: he had been removed
  chosen_spanish: fue retirado
  alternatives_spanish:
  - fue apartado
  - fue movido
  lexicon: HALOT
  rationale: El pasivo Hophal indica que alguien fue hecho salir de la vía. «Retirado» es natural en español y conserva la idea de sacar un obstáculo del camino.
- source_word: מִן הַמְסִלָּה
  english_pob_choice: from the highway
  chosen_spanish: del camino
  alternatives_spanish:
  - de la carretera
  - de la calzada
  lexicon: HALOT
  rationale: Aunque el inglés POB preserva «highway» por el valor léxico de מְסִלָּה, en español «camino» comunica con claridad la vía inmediata por donde avanzaba la tropa sin cargar innecesariamente una distinción técnica. La nota mantiene la alternativa léxica.
- source_word: עָבַר
  english_pob_choice: passed on
  chosen_spanish: pasaron
  alternatives_spanish:
  - avanzaron
  - siguieron adelante
  lexicon: HALOT
  rationale: El verbo marca que reanudaron la marcha una vez despejado el obstáculo. En español, «pasaron» transmite el avance narrativo de forma fluida.
- source_word: כָּל אִישׁ
  english_pob_choice: every man
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - cada hombre
  - todo hombre
  lexicon: HALOT
  rationale: El hebreo es singular colectivo. En español, «todos los hombres» mantiene la referencia al grupo militar sin sonar forzado, y conserva el valor colectivo del original.
- source_word: אַחֲרֵי יוֹאָב
  english_pob_choice: after Joab
  chosen_spanish: tras Joab
  alternatives_spanish:
  - detrás de Joab
  - siguiendo a Joab
  lexicon: HALOT
  rationale: «Tras» expresa mejor el seguimiento en movimiento que un simple «después de». Mantiene la relación espacial/narrativa con Joab como cabeza de la columna.
- source_word: לִרְדֹּף
  english_pob_choice: to pursue
  chosen_spanish: para perseguir
  alternatives_spanish:
  - para ir en persecución de
  - para dar caza a
  lexicon: HALOT
  rationale: El infinitivo de propósito exige una finalidad clara. «Perseguir» es el equivalente natural y serio para un contexto militar.
- source_word: אַחֲרֵי שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: a Seba hijo de Bicri
  alternatives_spanish:
  - a Sheba hijo de Bicri
  - a Seba, hijo de Bicri
  lexicon: HALOT
  rationale: «Seba» refleja la adaptación habitual al español del nombre hebreo; «hijo de Bicri» preserva la estructura patronímica del texto.
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente sin cambios sustantivos; la solución española mantiene el mismo sentido y la misma decisión léxica central sobre מְסִלָּה, con ajuste natural de registro para publicación.
  spanish_consistency_notes:
  - Se conserva el nombre «Joab» sin hispanizar para mantener consistencia bíblica.
  - Se usa «Seba» para el nombre אישי לפי la forma española habitual y por coherencia eclesial legible.
  - No se emplea «SEÑOR» ni terminología teológica ajena al pasaje; el versículo es puramente narrativo.
  - La nota de pie de página marca la alternativa léxica más significativa del verso, equivalente a la del audit trail inglés.
