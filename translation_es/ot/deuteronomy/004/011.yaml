revisions:
- from: 'Y se acercaron y se pusieron al pie del monte[a], mientras el monte ardía en fuego hasta el corazón de los cielos: oscuridad, nube y espesa densa[b].'
  to: 'Y se acercaron y estuvieron al pie del monte, mientras el monte ardía con fuego hasta el corazón de los cielos[a]: oscuridad, nube y densa oscuridad[b].'
  rationale: Se corrige la ancla de la nota [a], se reemplaza «se pusieron» por «estuvieron» para reflejar mejor עמד, se mejora «ardía en fuego» a una formulación española más natural, y se sustituye la frase defectuosa «espesa densa» por «densa oscuridad», que distingue adecuadamente וַעֲרָפֶל de «oscuridad».
