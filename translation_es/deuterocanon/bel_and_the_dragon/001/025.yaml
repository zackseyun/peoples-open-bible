review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Daniel declara que rendirá reverencia a Κυρίῳ τῷ θεῷ μου y da la razón causal ὅτι οὗτός ἐστιν θεὸς ζῶν. Sin embargo, hay dos desajustes con el rastro auditado: (1) la nota al pie no preserva correctamente la alternativa inglesa documentada; el texto principal ya dice «Me postraré», por lo que la nota «O: “Me postraré”» no aporta la alternativa real, que es «adoraré»/«adorar». (2) El proyecto español establece por defecto Yahvé para el nombre divino; aquí el origen inmediato es κύριος, no el tetragrámaton explícito, así que no es obligatorio cambiarlo, pero conviene dejar constancia de que «el Señor» es aceptable en este contexto griego deuterocanónico.'
  spanish_quality_summary: El español es claro, natural y digno. «Me postraré ante el Señor mi Dios» suena bíblico y comprensible. «El Dios viviente» es correcto, aunque «el Dios vivo» también sería más idiomático en algunos contextos; no requiere cambio. La puntuación y el registro son buenos. La única reparación necesaria es la nota al pie defectuosa.
  glossary_alignment: 'La terminología está mayormente alineada: «Dios», «viviente», y la elección de «Me postraré» para προσκυνήσω siguen bien la filosofía de equivalencia óptima. «El Señor» para κύριος coincide con el English POB, y en este caso no exige sustituirse por «Yahvé» porque la fuente presentada es griega con κύριος, no una ocurrencia explícita de יהוה. No obstante, la nota léxica debe ajustarse para reflejar la alternativa documentada «adoraré / adorar».'
  issues:
  - severity: medium
    issue: La nota al pie a no conserva la alternativa léxica correcta.
    rationale: 'El English POB documenta la alternativa «I will worship the Lord my God». En español, el texto principal ya usa «Me postraré», así que la nota «O: “Me postraré”» es redundante y errónea. Debe indicar «O: “Adoraré al Señor mi Dios”» o equivalente, explicando que el verbo puede denotar tanto postración como adoración.'
  revised_spanish_text: 'Y Daniel dijo[a]: «Me postraré ante el Señor mi Dios, porque él es el Dios viviente».

    '
  revised_footnotes:
  - marker: a
    text: 'O: «Adoraré al Señor mi Dios». El verbo griego puede denotar tanto postrarse como adorar.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque representa fielmente προσκυνήσω como acto de reverencia corporal con sentido devocional. Solo se corrige la nota al pie para que preserve la alternativa léxica real auditada en inglés y no repita el mismo sentido ya presente en el texto principal.
