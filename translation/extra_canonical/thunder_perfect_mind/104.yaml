lexical_decisions:
- source_word: ⲥⲁϩⲟⲩⲛ
  chosen: draw near
  alternatives:
  - approach
  - come close
  lexicon: Coptic (Sahidic) common lexeme; cf. Crum s.v. ⲥⲁϩⲟⲩⲛ
  rationale: Imperative/participial sense of movement toward the speaker; preserves
    antithesis with “far.”
- source_word: ⲥⲁⲛⲃⲟⲗ
  chosen: far
  alternatives:
  - afar
  - at a distance
  lexicon: Coptic loan from Greek μακράν/vernacular; attested Sahidic usage
  rationale: Adjectival/participial descriptor of those at a distance; concise to
    pair with “draw near.”
- source_word: ⲛⲁⲩ
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: Coptic ⲛⲁⲩ ‘to see/look’; Crum s.v. ⲛⲁⲩ
  rationale: “Look” carries imperative feel and fits poetic cadence; avoids overly
    formal “behold.”
- source_word: ⲉⲣⲟⲓ
  chosen: toward me
  alternatives:
  - to me
  - at me
  lexicon: Coptic pronominal prepositional form ‘to/at me’
  rationale: Directional nuance retained with “toward,” matching ⲛⲁⲩ ‘look’ + goal.
- source_word: ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ
  chosen: Live
  alternatives:
  - bring forth a living one
  - live outwardly
  - be alive
  lexicon: Coptic ⲟⲛϩ ‘life/live’ + ⲉⲃⲟⲗ ‘out/ forth’; construction ambiguous between
    noun and verb
  rationale: Reads the phrase as an imperative to live; rendering as a simple verb
    avoids awkwardness while acknowledging ambiguity in notes.
- source_word: ⲣⲥⲱ
  chosen: awake
  alternatives:
  - wake
  - arise
  lexicon: Coptic ⲣⲥⲱ ‘to wake/awake’; Crum s.v. ⲣⲥⲱ
  rationale: Common imperative in exhortative contexts; pairs naturally with “live.”
- source_word: ⲥⲱⲧⲙ
  chosen: listen
  alternatives:
  - hear
  lexicon: Coptic ⲥⲱⲧⲙ ‘to hear/listen’
  rationale: “Listen” better matches vocative “hearers” (ⲁⲕⲣⲟⲁⲧⲏⲥ) and the rhetorical
    summons.
- source_word: ⲁⲕⲣⲟⲁⲧⲏⲥ
  chosen: hearers
  alternatives:
  - listeners
  - auditors
  lexicon: Greek loan ἀκροατής ‘hearer’
  rationale: “Hearers” preserves the Greek flavor and alliterative force of the address.
parallelism_check: Maintains the near/far antithesis (“You who draw near—and you who
  are far”) and a triad of imperatives (“look … Live … awake … listen”). Repetition
  of “look” and the directional “toward me” sustains the call-and-response rhythm
  typical of Thunder. No contradictory pair is smoothed; the near/far contradiction
  is explicit.
voice_check: Direct second-person imperatives with the first-person object (“toward
  me,” “listen to me”) preserve the authoritative, summoning voice of the speaker.
  While this block lacks an explicit “I am,” the first-person presence is clear and
  consistent with the poem’s voice.
alignment_risk_note: Alignment confidence is only medium, and the provided Coptic
  lines resemble the poem’s exhortatory opening (addressing hearers, near/far) rather
  than the consult’s “I am justice” line. The first line is partially garbled in OCR,
  and the phrase ⲛⲟⲩⲟⲛϩ ⲉⲃⲟⲗ is syntactically ambiguous (noun vs. verb). I have rendered
  the clear elements (near/far; look; listen; hearers; awake) and flagged ambiguity
  rather than force a match to the consult.
