  rationale: Se propone un ajuste menor para reflejar mejor el plural hebreo de מִמֹּקְשֵׁי y alinearse más estrechamente con la decisión auditada en inglés, sin perder naturalidad en español. 'Ni haya lazos para el pueblo' mantiene la sintaxis elíptica del versículo, suena bien en español bíblico moderno y evita la atenuación producida por el singular colectivo 'lazo'.
