translation:
  language: es
  text: Y cuando aceptó que ellos decían la verdad y los animó, les dio plena autorización, para que destruyeran a los que habían transgredido la ley de Dios en todo lugar bajo su reino, con audacia[a], sin ninguna autorización real ni inspección[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'abiertamente' o 'con confianza' para μετὰ παρρησίας.
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como 'sin ninguna autoridad real ni supervisión', subrayando la ausencia de intervención directa del rey en la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: τἀληθές
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - lo verdadero
  - que decían verdad
  lexicon: LSJ
  rationale: 'El neutro articulado funciona sustantivamente con λέγειν: no solo ''hablar verdaderamente'', sino reconocer como verdadero lo que decían. ''La verdad'' preserva esa fuerza nominal y es idiomático en español.'
- source_word: παραδεξάμενος
  english_pob_choice: accepted
  chosen_spanish: aceptó
  alternatives_spanish:
  - recibió
  - admitió
  - reconoció
  lexicon: LSJ
  rationale: El participio expresa que recibió su declaración como válida. 'Aceptó' conserva la idea de admitir o reconocer como verdadera su afirmación sin sobretraducir.
- source_word: παραινέσας
  english_pob_choice: encouraged them
  chosen_spanish: los animó
  alternatives_spanish:
  - los exhortó
  - los alentó
  - los aconsejó
  lexicon: LSJ
  rationale: El verbo puede significar exhortar o animar. En español, 'los animó' comunica el impulso favorable previo a la concesión sin el matiz más duro de 'exhortó'.
- source_word: ἄδειαν πάντων
  english_pob_choice: full permission
  chosen_spanish: plena autorización
  alternatives_spanish:
  - permiso completo
  - plena libertad
  - permiso en todo
  lexicon: LSJ
  rationale: ἄδεια es permiso/libertad, y πάντων intensifica el alcance. 'Plena autorización' mantiene la amplitud total del permiso con registro formal y claro.
- source_word: τοὺς παραβεβηκότας
  english_pob_choice: those who had transgressed
  chosen_spanish: los que habían transgredido
  alternatives_spanish:
  - los que habían violado
  - los transgresores
  lexicon: LSJ
  rationale: El participio perfecto de παραβαίνω señala a quienes ya han quebrantado la norma con efecto vigente. 'Habían transgredido' conserva ese valor perfecto y el tono jurídico-moral.
- source_word: τοῦ θεοῦ τὸν νόμον
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Yahvé
  - la ley divina
  lexicon: LSJ
  rationale: El griego usa θεοῦ en genitivo directo. En español, 'ley de Dios' reproduce la construcción sin perder el peso formal del genitivo. Se evita 'Yahvé' aquí porque el texto griego no nombra el Tetragrámaton, sino θεοῦ.
- source_word: ἐξολεθρεύσωσιν
  english_pob_choice: destroy
  chosen_spanish: destruyeran
  alternatives_spanish:
  - aniquilaran
  - exterminaran
  - arrasaran
  lexicon: LSJ
  rationale: El verbo es fuerte y denota destrucción total. 'Destruyeran' conserva la severidad sin introducir un término moderno más específico de lo que exige el griego.
- source_word: κατὰ πάντα τὸν ὑπὸ τῆς βασιλείας αὐτοῦ τόπον
  english_pob_choice: throughout every place under his kingdom
  chosen_spanish: por todos los lugares bajo su reino
  alternatives_spanish:
  - en cada lugar bajo su reino
  - por toda la extensión de su reino
  - en todo lugar sujeto a su reino
  lexicon: LSJ
  rationale: La frase expresa alcance distributivo en todo el territorio. 'Por todos los lugares bajo su reino' conserva la extensión de κατά πάντα y la relación espacial con la realeza.
- source_word: μετὰ παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con audacia
  alternatives_spanish:
  - con valentía
  - abiertamente
  - con confianza
  lexicon: LSJ
  rationale: παρρησία puede implicar libertad, franqueza y osadía. 'Con audacia' conserva el matiz de acción resuelta y pública sin reducirse solo a 'abiertamente'.
- source_word: ἄνευ πάσης βασιλικῆς ἐξουσίας καὶ ἐπισκέψεως
  english_pob_choice: without any royal authority or oversight
  chosen_spanish: sin ninguna autoridad ni supervisión real
  alternatives_spanish:
  - sin ninguna autorización ni inspección real
  - sin intervención ni supervisión del rey
  - sin autoridad real alguna ni inspección
  lexicon: LSJ
  rationale: Los dos sustantivos indican ausencia de participación oficial del rey. 'Autoridad' rinde ἐξουσία como potestad/autoridad; 'supervisión' rinde ἐπισκέψις como inspección o control, y 'real' aclara el adjetivo βασιλικῆς.
theological_decisions:
- issue: Violencia contra los transgresores de la ley
  english_pob_reading: Retain the text's direct statement that permission was given to destroy those who had transgressed the law of God, without softening the violence or adding justification beyond the Greek.
  chosen_spanish_reading: Mantener la afirmación directa de que se les dio autorización para destruir a los que habían transgredido la ley de Dios, sin suavizar el verbo ni añadir una justificación no presente en el texto.
  alternative_spanish_readings:
  - suavizar a 'castigar'
  - convertirlo en 'retirar' o 'eliminar'
  rationale: El griego usa ἐξολεθρεύσωσιν, un verbo fuerte de destrucción total. La traducción no debe atenuar esa severidad ni introducir una teología explicativa que el verso no explicita.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond source warrant.
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del audit trail inglés: se adoptó ''encouraged them'' frente a una opción más fuerte, y se mantuvo el resto de las decisiones léxicas y sintácticas por su correspondencia estrecha con el griego. También se incorporó la amplitud de ἄδειαν πάντων como ''plena autorización'' y el matiz final de ausencia de intervención real.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se usa 'ley' para νόμος y 'transgredido' para παραβεβηκότας, conservando el tono jurídico-moral.
  - '''Con audacia'' recoge el valor de παρρησία sin perder el sentido de libertad de acción.'
  - '''Autoridad real'' y ''supervisión real'' preservan el doble componente de ἐξουσία y ἐπισκέψις.'
