base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/033.yaml
  text: And Josiah removed all the abominations from all the lands that belonged to the sons of Israel[a], and he made all who were found in Israel serve Yahweh their God. All his days they did not turn away from following Yahweh[d][c][b], the God of their fathers.
  footnotes:
  - marker: a
    text: Or 'from all the territories of the people of Israel.' The Hebrew literally says 'from all the lands that belonged to the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he caused all who were found in Israel to serve the LORD their God.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the God of their fathers'; that is, the covenant God worshiped by their forefathers.
    reason: cultural_note
  - marker: d
    text: Or 'all who were found in Israel'.
    reason: previous_rendering
