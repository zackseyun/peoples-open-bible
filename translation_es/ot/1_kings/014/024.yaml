  spanish_quality_summary: El español es generalmente claro y digno, pero 'También había [a] en la tierra' es inaceptable como texto final porque queda elíptico y poco legible. El resto fluye bien. Conviene además pulir la nota para evitar 'prostitutos/as', que suena menos natural en registro bíblico, y mantener una formulación principal comprensible.
  glossary_alignment: 'Alinea correctamente Yahvé para יְהוָה y ''los hijos de Israel'' para בְּנֵי יִשְׂרָאֵל. La principal desviación está en קָדֵשׁ: el proyecto documentó una traducción principal equivalente a ''cult prostitutes'', con alternativas como ''male cult prostitute'' o ''temple prostitute'' en nota. En español debe aparecer una forma principal como ''prostitutos de culto'' con nota léxica; no puede quedar solo una nota sin ancla semántica visible.'
