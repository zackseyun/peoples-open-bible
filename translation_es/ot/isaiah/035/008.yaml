translation:
  language: es
  text: Y habrá allí una calzada y un camino; y será llamada el Camino Santo. El impuro no pasará por él, sino que será para ellos[a]; el que va por el camino, aun los insensatos, no se extraviará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo de difícil interpretación: «pero será para ellos» también puede entenderse como «y él estará con ellos» o «les pertenecerá».'
    reason: alternative_reading
  - marker: b
    text: O «no andará perdido» / «no errará».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַסְלוּל
  english_pob_choice: highway
  chosen_spanish: calzada
  alternatives_spanish:
  - camino elevado
  - carretera
  - vía
  lexicon: HALOT
  rationale: El hebreo apunta a una vía preparada o construida. «Calzada» comunica una vía hecha y apta para tránsito, sin caer en un tecnicismo excesivo ni en un calco duro. Conserva la imagen de un camino preparado.
- source_word: דֶּרֶךְ
  english_pob_choice: road / way
  chosen_spanish: camino
  alternatives_spanish:
  - vía
  - sendero
  - ruta
  lexicon: HALOT
  rationale: Aquí דֶּרֶךְ se repite con matices. «Camino» funciona bien en español para la referencia general y permite la continuación en «Camino Santo». Evita la repetición mecánica y mantiene el valor temático.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: Holy
  chosen_spanish: Santo
  alternatives_spanish:
  - Sagrado
  - de santidad
  lexicon: HALOT
  rationale: En construcción con «camino», «Santo» conserva el sentido consagrado a Dios. «Camino Santo» es natural en español y refleja la noción cultual del original.
- source_word: יִקָּרֵא לָהּ
  english_pob_choice: it shall be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - será nombrada
  - se le llamará
  lexicon: HALOT
  rationale: El nifal de קרא se expresa bien con pasiva en español. «Será llamada» conserva la fórmula nominal y deja claro que el nombre recae sobre el camino/calzada.
- source_word: טָמֵא
  english_pob_choice: the unclean
  chosen_spanish: el impuro
  alternatives_spanish:
  - el inmundo
  - la persona impura
  - el ceremonialmente impuro
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El impuro» preserva la amplitud cultual y moral sin restringirla de antemano. «Impuro» es claro y más sobrio que una perífrasis explicativa.
- source_word: יַעַבְרֶנּוּ
  english_pob_choice: shall not pass over it
  chosen_spanish: pasará por él
  alternatives_spanish:
  - cruzará por él
  - transitará por él
  - lo atravesará
  lexicon: HALOT
  rationale: «Pasará por él» reproduce bien עבר con el sufijo pronominal referido al camino y sugiere tránsito por la vía. La negación mantiene el alcance de exclusión del texto.
- source_word: וְהוּא לָמוֹ
  english_pob_choice: but it shall be for them
  chosen_spanish: sino que será para ellos
  alternatives_spanish:
  - y será para ellos
  - y él estará con ellos
  - y les pertenecerá
  lexicon: HALOT
  rationale: La cláusula es sintácticamente difícil. La lectura adoptada toma el pronombre como referido al camino y לָמוֹ como «para ellos», en continuidad con el contraste previo. «Sino que será para ellos» expresa con naturalidad la oposición y conserva la tensión sin resolverla de forma indebida.
- source_word: הֹלֵךְ דֶּרֶךְ
  english_pob_choice: whoever walks on the way
  chosen_spanish: el que va por el camino
  alternatives_spanish:
  - quien anda en el camino
  - el que camina por el camino
  - quien va por la vía
  lexicon: HALOT
  rationale: El participio expresa una categoría general de viajeros. «El que va por el camino» es idiomático en español y mantiene la referencia genérica sin sobrecargar el verso.
- source_word: אֱוִילִים
  english_pob_choice: fools
  chosen_spanish: los insensatos
  alternatives_spanish:
  - los necios
  - los tontos
  - los simples
  lexicon: HALOT
  rationale: «Insensatos» comunica el valor sapiencial de אֱוִילִים con dignidad literaria. Evita un tono demasiado coloquial y preserva la fuerza moral del término.
- source_word: לֹא יִתְעוּ
  english_pob_choice: shall not go astray
  chosen_spanish: no se extraviará
  alternatives_spanish:
  - no errará
  - no andará perdido
  - no se desviará
  lexicon: HALOT
  rationale: El verbo תעה puede expresar desviarse o extraviarse. En español, «no se extraviará» conserva el sentido de no perder el rumbo, coherente con la imagen del camino.
theological_decisions:
- issue: Alcance de la impureza en «el impuro no pasará por él»
  english_pob_reading: Retain the broad term 'the unclean' without narrowing it to ritual or moral impurity alone.
  chosen_spanish_reading: Mantener «el impuro» sin restringirlo a impureza ritual o moral exclusivamente.
  alternative_spanish_readings:
  - el ritualmente impuro
  - el moralmente impuro
  rationale: El hebreo permite resonancias cultuales y éticas. La traducción española preserva esa amplitud para no resolver una tensión que el texto profético deja abierta.
  doctrine_reference: Preservar la tensión teológica y semántica del texto.
- issue: Sentido de la cláusula difícil וְהוּא לָמוֹ
  english_pob_reading: 'Refer the pronoun to the road: ''but it shall be for them.'''
  chosen_spanish_reading: 'Referir el pronombre al camino: «sino que será para ellos».'
  alternative_spanish_readings:
  - y será para ellos
  - y él estará con ellos
  - les pertenecerá
  rationale: 'La sintaxis es comprimida y admite más de una lectura. La versión elegida sigue el contexto inmediato: el impuro no pasa, pero la vía pertenece a los destinatarios de la redención. Se conserva la ambigüedad básica sin forzar el texto.'
  doctrine_reference: Preservar la tensión teológica y semántica del texto.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la versión inglesa auditada permanece estable y la presente redacción española refleja ese estado, con atención especial a la cláusula sintácticamente difícil y a la alternancia léxica de דֶּרֶךְ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Camino Santo» conserva la mayúscula inicial por tratarse de un nombre del camino en el contexto profético.
  - Se evitó «SEÑOR» y se optó por un vocabulario cultual neutro y auditable.
  - «Impuro» y «insensatos» conservan el registro bíblico sin caer en arcaísmo excesivo.
  - La frase final mantiene la posibilidad de lectura alternativa mediante nota, sin duplicar la ambigüedad en el cuerpo principal.
