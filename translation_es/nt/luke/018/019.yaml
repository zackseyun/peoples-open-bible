translation:
  language: es
  text: 'Pero Jesús le dijo: «¿Por qué me llamas bueno? Nadie es bueno, sino uno: Dios.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En este contexto de respuesta correctiva, «Pero» conserva el matiz de contraste/discurso que la auditoría inglesa marcó con «But».
- source_word: εἶπεν ... ὁ Ἰησοῦς
  english_pob_choice: Jesus said
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús respondió
  - Jesús le habló
  lexicon: BDAG
  rationale: El griego usa λέγω en su sentido simple de «decir»; «le dijo» mantiene la relación directa con el interlocutor sin convertirla en una interpretación más fuerte como «respondió».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al hombre
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con el clítico indirecto «le» en español; así se preserva el referente explícito sin añadir «al hombre», que sería una expansión interpretativa.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: Aunque τί es formalmente «qué», en esta construcción idiomática con λέγεις ἀγαθόν el sentido natural en español es «¿Por qué me llamas bueno?».
- source_word: με λέγεις ἀγαθόν
  english_pob_choice: do you call me good
  chosen_spanish: me llamas bueno
  alternatives_spanish:
  - dices que soy bueno
  - me dices bueno
  lexicon: BDAG
  rationale: «Llamas bueno» conserva la fuerza directa del verbo λέγω con el predicado adjetival ἀγαθόν, de manera natural en español.
- source_word: ἀγαθόν / ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - moralmente bueno
  - bondadoso
  lexicon: BDAG
  rationale: «Bueno» reproduce de forma sobria y general el adjetivo; no se precisa «moralmente» porque eso estrecharía indebidamente el alcance del término.
- source_word: οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguno
  - Ninguna persona
  lexicon: BDAG
  rationale: «Nadie» es la negación universal más natural en español y conserva el alcance absoluto del griego.
- source_word: εἰ μὴ εἷς
  english_pob_choice: except one
  chosen_spanish: sino uno
  alternatives_spanish:
  - excepto uno
  - salvo uno
  lexicon: BDAG
  rationale: «Sino uno» refleja la construcción de excepción de manera idiomática en español y mantiene el énfasis en la singularidad absoluta.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios único
  - el único Dios
  lexicon: BDAG
  rationale: «Dios» comunica con claridad el referente sin sobrecargar la frase con una explicitación que el griego no añade aquí.
theological_decisions:
- issue: Posible tensión cristológica en la pregunta de Jesús
  english_pob_reading: The translation preserves Jesus’ question without paraphrasing it into either a denial or an explicit claim of deity.
  chosen_spanish_reading: La traducción conserva la pregunta de Jesús sin convertirla en una negación explícita ni en una afirmación directa de deidad.
  alternative_spanish_readings:
  - «¿Por qué me llamas bueno?», como si Jesús negara toda bondad en sentido absoluto.
  - Una paráfrasis que insinuara que Jesús acepta el título como prueba directa de deidad.
  rationale: La redacción sigue de cerca el griego y preserva la tensión teológica que el texto plantea, sin resolverla artificialmente en una sola dirección.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La versión castellana sigue el estado final del audit trail inglés, donde no hubo cambios aplicados y el revisor confirmó alto acuerdo.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «bueno» para ἀγαθός con consistencia entre ambas ocurrencias.
  - Se prefiere «Pero» para δὲ por la fuerza correctiva del contexto.
  - No se introdujeron notas al pie porque el verso no presenta una variante textual o ambigüedad que requiera anclaje explícito en español.
