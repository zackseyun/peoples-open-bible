id: 1JN.3.9
reference: 1 John 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ ἁμαρτίαν οὐ ποιεῖ, ὅτι σπέρμα αὐτοῦ ἐν αὐτῷ μένει, καὶ οὐ δύναται ἁμαρτάνειν, ὅτι ἐκ τοῦ θεοῦ γεγέννηται.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/009.yaml
  text: Everyone who has been born of God does not practice sin[a], because his seed remains in him; and he is not able to keep sinning[c][b], because he has been born of God.
  footnotes:
  - marker: a
    text: Or, more formally, 'does not do sin' / 'does not commit sin.' The Greek wording likely refers to the ongoing practice of sin rather than a single act.
    reason: lexical_alternative
  - marker: b
    text: Or 'abides in him.'
    reason: lexical_alternative
  - marker: c
    text: More literally, 'he cannot sin.' In context, the Greek present infinitive likely carries the sense 'keep sinning' or 'go on sinning.'
    reason: alternative_reading
translation:
  language: ko
  text: 「하나님께로부터 난 자마다 죄를 짓지 않으니」[a], 이는 그분의 씨가 그 사람 안에 머물기 때문입니다. 그리고 그는 죄를 지을 수 없습니다 — 하나님께로부터 났기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 현재 시제 ποιεῖ는 지속적·습관적 행위를 함의하므로, 「죄를 짓지 않는다」는 절대적 무죄가 아니라 「죄를 일상적·습관적으로 짓지 않는다」의 측면을 가리킨다. 본 절은 1:8-10(「우리에게 죄가 없다 하면 거짓말」)과 모순되지 않으며, 거듭난 자의 새로운 본성에서 죄가 더 이상 삶의 정상적 양식이 아님을 선언한다.
    reason: alternative_reading
lexical_decisions:
- source_word: γεγεννημένος ἐκ τοῦ θεοῦ
  english_pob_choice: born of God
  chosen_korean: 하나님께로부터 난 자
  alternatives_korean:
  - 하나님에게서 태어난 자
  lexicon: BDAG
  rationale: 완료 수동 분사 — 거듭남의 결정적 사건과 그 결과로 지속되는 상태. 「하나님께로부터 난 자」로 출원성을 분명히 한다.
- source_word: σπέρμα αὐτοῦ
  english_pob_choice: his seed
  chosen_korean: 그분의 씨
  alternatives_korean:
  - 하나님의 씨
  - 그분의 본성
  lexicon: BDAG
  rationale: σπέρμα는 신적 생명의 원리·새로운 본성의 함의. 「씨」를 그대로 옮겨 본문의 강한 은유를 보존한다.
- source_word: οὐ ποιεῖ / οὐ δύναται ἁμαρτάνειν
  english_pob_choice: does not practice / is not able to sin
  chosen_korean: 죄를 짓지 않으니 / 죄를 지을 수 없습니다
  alternatives_korean:
  - 죄를 계속 짓지 않으니
  lexicon: BDAG
  rationale: 현재 시제는 습관·지속을 함의. 한국어 「죄를 짓지 않는다」는 절대적 부정으로도 읽힐 수 있으나, 각주에서 헬라어의 현재 상상(aspectual)을 명시한다.
theological_decisions:
- issue: 「하나님께로부터 난 자마다 죄를 짓지 않는다」의 의미
  chosen_reading: 현재 시제의 지속·습관적 함의를 살리되 한국어는 단순 현재로 옮기고 각주로 보충
  alternative_readings:
  - 「죄를 계속 짓지 않는다」로 본문에 명시화
  - 「죄를 짓지 않을 수 있다」로 가능성으로 약화
  rationale: 헬라어 πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ ἁμαρτίαν οὐ ποιεῖ는 절대적 무죄(perfectionism)가 아니라 거듭난 자의 새로운 본성에서 죄가 더 이상 삶의 정상적·습관적 양식이 아님을 선언한다. 헬라어 현재 시제는 지속·반복의 양상(linear aspect)을 함의하므로 「practice sin/keep sinning」의 어조이다. 한국어 본문은 헬라어의 단호함과 직접성을 보존하기 위해 「죄를 짓지 않으니」로 직역하고, 각주에서 1:8-10과의 조화와 현재 시제의 상상적 함의를 설명한다. 본문 자체에서 「계속」, 「습관적으로」 같은 부사를 더하면 본문의 단호한 어조를 약화시키게 된다.
  doctrine_reference: DOCTRINE.md §5 — preserve textual tension; aspectual nuance in footnote
