translation:
  language: es
  text: 'Así dice el Señor Dios, Yahvé: haré cesar[a] la multitud de Egipto por mano[b] de Nabucodonosor, rey de Babilonia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «haré cesar»; el verbo está en causativo y expresa hacer que algo cese, ponerle fin o suspenderlo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la mano de», un modismo que significa «por medio de» o «mediante».'
    reason: lexical_alternative
  - marker: c
    text: También «Nebucadrezar», forma más cercana a la grafía hebrea del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética pide en español una apertura solemne y natural. «Así dice» conserva el valor de declaración directa y el tono profético sin forzar un calco del perfecto hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se conserva la combinación titular de אֲדֹנָי + el nombre divino. En español, «Señor Yahvé» evita la sustitución por «SEÑOR» y mantiene la decisión del proyecto de rendir יְהוָה como «Yahvé».
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: haré cesar
  alternatives_spanish:
  - pondré fin a
  - haré terminar
  lexicon: HALOT
  rationale: 'El hifil de שׁבת expresa causación: hacer cesar. «Haré cesar» reproduce mejor esa fuerza causal que un simple «pararé» y mantiene el registro bíblico.'
- source_word: הֲמוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - la masa
  lexicon: HALOT
  rationale: «Multitud» refleja bien el valor colectivo del sustantivo en un oráculo contra naciones. Evita restringirlo indebidamente a riqueza, aunque el término también puede tener otros matices según contexto.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - por la mano de
  lexicon: HALOT
  rationale: Se conserva el modismo instrumental hebreo con una construcción natural en español. «Por mano de» mantiene la agencia secundaria y el tono profético del original.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadrezar
  - Nabucodrézor
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y ampliamente reconocible, equivalente al nombre histórico del rey babilonio. La alternativa más cercana a la transliteración hebrea se reserva si el proyecto optara por mayor transparencia fonética.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y transparente. «Babilonia» es la forma usual en español para el reino, clara y fiel al referente histórico.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה en un título compuesto
  english_pob_reading: the Lord GOD / Yahweh in the doctrinal note
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Yahvé el Señor
  - el Señor Yahveh
  rationale: Aunque el audit trail inglés conserva la convención «Lord GOD», la política del proyecto pide traducir יְהוָה como «Yahvé». En español, «el Señor Yahvé» mantiene tanto el título soberano como el nombre del pacto sin recurrir a mayúsculas sustitutorias.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ningún cambio necesario en la revisión más reciente; por eso la propuesta sigue de cerca la solución inglesa, pero ajusta la forma del nombre divino y la sintaxis al español del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según el estándar del proyecto, incluso dentro de la fórmula profética.
  - «Nabucodonosor» se conserva como forma española establecida, con nota alternativa implícita en el aparato de decisiones.
  - «Multitud» y «por mano de» reproducen los matices semánticos y retóricos del hebreo sin sobrerinterpretar el pasaje.
