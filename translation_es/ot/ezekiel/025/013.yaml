translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: extenderé mi mano contra Edom[a], y cortaré de ella al hombre y al animal; la convertiré en desolación; desde Temán hasta Dedán caerán a espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hasta Dedán”. La expresión hebrea señala el alcance de la devastación desde Temán hasta Dedán.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: En español, la combinación fija respeta el título doble sin ocultar el nombre divino. 'Yahvé' sigue la convención del proyecto para יְהוָה, y 'Señor' reproduce אֲדֹנָי con la dignidad habitual del registro bíblico.
- source_word: וְנָטִתִי יָדִי
  english_pob_choice: I will stretch out my hand
  chosen_spanish: Extenderé mi mano
  alternatives_spanish:
  - Alargaré mi mano
  - Tendré extendida mi mano
  lexicon: HALOT
  rationale: La expresión mantiene la imagen idiomática de intervención en juicio. 'Extenderé' es natural en español y conserva el gesto intencional del hebreo.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré de él
  alternatives_spanish:
  - eliminaré de él
  - destruiré de él
  lexicon: HALOT
  rationale: '''Cortaré'' conserva el valor lexical e idiomático de כרת, evitando suavizarlo con un verbo más general como ''destruiré''. La construcción ''de él'' refleja el complemento pronominal de מִמֶּנָּה.'
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - las personas
  lexicon: HALOT
  rationale: En la pareja 'hombre y animal', 'el hombre' mantiene el paralelismo tradicional y la referencia a la población humana de Edom sin volverlo abstracto.
- source_word: בְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: el animal
  alternatives_spanish:
  - la bestia
  - el ganado
  lexicon: HALOT
  rationale: Aquí 'animal' suena más natural en español contemporáneo y preserva la pareja semítica 'hombre y animal'. 'Bestia' sería posible, pero en español suele sonar más marcado o peyorativo.
- source_word: וּנְתַתִּיהָ חָרְבָּה
  english_pob_choice: I will make it a desolation
  chosen_spanish: lo convertiré en una desolación
  alternatives_spanish:
  - lo haré desolado
  - lo dejaré en ruina
  lexicon: HALOT
  rationale: La frase nominal חָרְבָּה se conserva como 'desolación', preservando el sustantivo y la fuerza del juicio. 'Convertiré' refleja el valor causativo de la construcción.
- source_word: מִתֵּימָן
  english_pob_choice: from Teman
  chosen_spanish: desde Temán
  alternatives_spanish:
  - de Temán
  lexicon: HALOT
  rationale: Temán es nombre propio y se translitera. 'Desde' mantiene la idea de punto de partida geográfico.
- source_word: וּדְדָנֶה
  english_pob_choice: even to Dedan
  chosen_spanish: hasta Dedán
  alternatives_spanish:
  - e incluso hasta Dedán
  - y hasta Dedán
  lexicon: HALOT
  rationale: El hebreo marca extensión territorial; en español, 'hasta' comunica el alcance de manera clara. Se mantiene Dedán como topónimo transliterado.
- source_word: בַּחֶרֶב יִפֹּלוּ
  english_pob_choice: they will fall by the sword
  chosen_spanish: caerán a espada
  alternatives_spanish:
  - caerán por la espada
  - morirán a espada
  lexicon: HALOT
  rationale: '''Caerán a espada'' conserva la fórmula bíblica y su tono solemne. Es una equivalencia natural para el idiomatismo de juicio, sin reemplazarlo por una explicación más plana.'
theological_decisions:
- issue: Traducción del nombre divino en יהוה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / updated doctrine prefers Yahweh for יהוה
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: 'El español necesita distinguir entre אֲדֹנָי y יהוה sin crear una repetición torpe. ''Señor Yahvé'' conserva ambos elementos: título y nombre propio. Se evita la máscara ''SEÑOR'' porque el proyecto español sigue la convención de transparentar el nombre divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: 'Alcance del juicio: destrucción de población y animales, y devastación territorial'
  english_pob_reading: I will cut off from it man and beast, and I will make it a desolation
  chosen_spanish_reading: cortaré de él al hombre y al animal; lo convertiré en una desolación
  alternative_spanish_readings:
  - lo destruiré por completo
  - lo dejaré desolado
  rationale: 'La redacción española preserva la tensión del texto: no solo personas, sino también animales, y además la tierra queda en desolación. No se suaviza el alcance del juicio con un término genérico que borre la triple estructura del verso.'
  doctrine_reference: Ezequiel 25:13; juicio profético sobre Edom
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y la auditoría inglesa de POB. Se mantiene la estructura profética del verso, el paralelismo 'hombre y animal', la imagen de la mano extendida y la fórmula de caer a espada. La única nota textual/lexical preserva la alternativa de alcance geográfico ya documentada en la versión inglesa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto en español.
  - Se mantiene 'Señor' para אֲדֹנָי para conservar el contraste con el nombre divino.
  - '''Desolación'' traduce חָרְבָּה como sustantivo, no solo como adjetivo, para preservar la fuerza del juicio.'
  - Los topónimos Temán y Dedán se transliteran, no se traducen por 'sur' u otra equivalencia.
  - '''Caerán a espada'' conserva la fórmula bíblica y la tonalidad profética sin explicitar más de lo que el texto dice.'
