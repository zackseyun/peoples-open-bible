translation:
  language: es
  text: Y he aquí[a], extendí mi mano contra ti, disminuí tu porción[b] asignada, y te entregué al deseo[c] de los que te odian, las hijas de los filisteos[d], que se avergüenzan de tu camino indecente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira», «ve»; el hebreo introduce la escena con una partícula de atención enfática.
    reason: alternative_reading
  - marker: b
    text: O «tu porción debida», «tu cuota» o «tu parte asignada». El hebreo puede referirse a lo prescrito o asignado.
    reason: lexical_alternative
  - marker: c
    text: O «a la voluntad» o «al apetito» de los que te odian. Aquí נֶפֶשׁ expresa deseo o voluntad.
    reason: lexical_alternative
  - marker: d
    text: «Las hijas de los filisteos» preserva la personificación profética de pueblos o ciudades como hijas.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y behold
  lexicon: HALOT
  rationale: La expresión introduce una llamada de atención profética. «He aquí» conserva la fuerza deíctica y el tono formal del texto sin sonar mecánico en español.
- source_word: נָטִיתִי יָדִי עָלַיִךְ
  english_pob_choice: I stretched out my hand against you
  chosen_spanish: extendí mi mano contra ti
  alternatives_spanish:
  - extendí mi mano sobre ti
  - alzé mi mano contra ti
  lexicon: HALOT
  rationale: La imagen hebrea de extender la mano en juicio se mantiene, y «contra ti» refleja el sentido hostil del contexto. «Extendí» es natural en español y preserva el gesto sin sobreinterpretarlo.
- source_word: וָאֶגְרַע
  english_pob_choice: I reduced
  chosen_spanish: disminuí
  alternatives_spanish:
  - reduje
  - rebajé
  - recorté
  lexicon: HALOT
  rationale: El verbo expresa disminuir o quitar. «Disminuí» comunica bien la acción de reducir lo concedido y funciona con fluidez en español bíblico moderno.
- source_word: חֻקֵּךְ
  english_pob_choice: your allotted portion
  chosen_spanish: tu porción asignada
  alternatives_spanish:
  - tu porción debida
  - tu cuota
  - tu parte asignada
  lexicon: HALOT
  rationale: El término puede referirse a lo prescrito o asignado. «Porción asignada» conserva la amplitud semántica sin concretar indebidamente en comida, territorio o simple cuota.
- source_word: וָאֶתְּנֵךְ
  english_pob_choice: gave you over
  chosen_spanish: te entregué
  alternatives_spanish:
  - te di
  - te abandoné
  - te puse en manos de
  lexicon: HALOT
  rationale: En este contexto judicial, «entregar» comunica la idea de dejar a alguien bajo poder ajeno. El complemento «al deseo» completa la fuerza de la construcción.
- source_word: בְּנֶפֶשׁ שֹׂנְאוֹתַיִךְ
  english_pob_choice: to the desire of those who hate you
  chosen_spanish: al deseo de los que te odian
  alternatives_spanish:
  - a la voluntad de los que te odian
  - al apetito de los que te odian
  - en manos de los que te odian
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí expresa deseo, voluntad o apetito. «Deseo» es la opción más breve y natural en español para mantener la tensión del juicio sin perder el matiz interno del hebreo.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  english_pob_choice: the daughters of the Philistines
  chosen_spanish: las hijas de los filisteos
  alternatives_spanish:
  - las mujeres filisteas
  - las ciudades de los filisteos
  lexicon: HALOT
  rationale: Se conserva la personificación profética de pueblos o ciudades como «hijas». «Mujeres filisteas» suavizaría la figura; «hijas de los filisteos» preserva mejor el paralelismo literario.
- source_word: הַנִּכְלָמוֹת
  english_pob_choice: who are ashamed
  chosen_spanish: que se avergüenzan
  alternatives_spanish:
  - que están avergonzadas
  - que se sienten humilladas
  - que se ruborizan
  lexicon: HALOT
  rationale: El participio describe una reacción moral ante la conducta de Jerusalén. «Se avergüenzan» refleja bien el estado resultante y sugiere repulsión ética, no solo emoción pasajera.
- source_word: מִדַּרְכֵּךְ זִמָּה
  english_pob_choice: of your lewd way
  chosen_spanish: de tu camino de infamia
  alternatives_spanish:
  - de tu camino lascivo
  - de tu conducta obscena
  - de tu senda de perversidad
  lexicon: HALOT
  rationale: דֶּרֶךְ con זִמָּה expresa un curso de conducta marcado por deshonra moral y sexual. «Camino de infamia» conserva la carga vergonzosa y evita un español demasiado coloquial o excesivamente explícito.
theological_decisions:
- issue: Lenguaje de juicio divino e imagen corporal de la mano
  english_pob_reading: Retain the first-person divine judgment language and the sexual-moral metaphor without softening either element.
  chosen_spanish_reading: Mantener la primera persona divina y la imagen de juicio con la mano, sin diluir la metáfora moral y sexual.
  alternative_spanish_readings:
  - Parafrasear en lenguaje abstracto de castigo
  - Suavizar la imagen corporal de la mano
  - Generalizar la metáfora a simple maldad
  rationale: El pasaje pertenece a una alegoría profética sostenida sobre infidelidad del pacto. Traducir con nitidez la acción judicial y la metáfora moral preserva el peso del reproche sin añadir doctrina externa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tratamiento de la metáfora ‘hijas de los filisteos’
  english_pob_reading: The daughters of the Philistines preserves the prophetic personification of peoples or cities as daughters.
  chosen_spanish_reading: «Las hijas de los filisteos» conserva la personificación profética.
  alternative_spanish_readings:
  - «Las mujeres filisteas»
  - «Las ciudades de los filisteos»
  rationale: La personificación es parte del arte profético del texto. Mantenerla evita desactivar la imagen colectiva y respeta el paralelismo literario del hebreo.
  doctrine_reference: Translation philosophy §§2, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió «behold» por un registro más formal y mantuvo el resto del versículo sin cambios. La versión española conserva ese nivel formal con «he aquí» y mantiene la estructura sintáctica y el alcance semántico del original hebreo, atendiendo además al matiz de חֻקֵּךְ y de נֶפֶשׁ en el aparato auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino explícito; la primera persona divina se preserva por la voz del discurso.
  - Se eligió «porción asignada»/«porción» para חֻקֵּךְ en consonancia con la nota inglesa sobre lo prescrito o allotado.
  - Se conservó la personificación «hijas de los filisteos» en lugar de una equivalencia más interpretativa.
  - «Camino de infamia» busca retener el peso moral de זִמָּה sin desbordar el registro bíblico en español.
