translation:
  language: es
  text: Soy contado entre los que descienden a la fosa[a]; he llegado a ser como un hombre[b] sin fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que descienden al sepulcro». El hebreo dice literalmente «fosa» o «pozo», una imagen poética común de la muerte.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «como un hombre fuerte sin vigor», porque el sustantivo hebreo puede tener connotaciones de fuerza. Se mantiene «hombre» en el texto principal porque el contraste inmediato con «sin fuerza» ya comunica el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶחְשַׁבְתִּי
  english_pob_choice: I am counted
  chosen_spanish: se me ha contado
  alternatives_spanish:
  - soy contado
  - se me considera
  - se me cuenta
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser tenido por parte de un grupo. En español, «se me ha contado» conserva la idea de ser considerado o incluido, y el perfecto ayuda a reflejar el estado resultante del lamento.
- source_word: עִם
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - con
  - en medio de
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «con», en español «entre» expresa mejor la inclusión dentro de una clase de personas sin perder la relación grupal del contexto.
- source_word: יוֹרְדֵי בּוֹר
  english_pob_choice: those going down to the pit
  chosen_spanish: los que descienden al sepulcro
  alternatives_spanish:
  - los que descienden al pozo
  - los que bajan a la fosa
  lexicon: HALOT
  rationale: «בור» conserva la imagen poética de muerte o tumba. «Sepulcro» comunica esa imagen al lector español de forma digna y comprensible; se evita una paráfrasis excesiva, pero se mantiene la metáfora funeraria.
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: sepulcro
  alternatives_spanish:
  - pozo
  - fosa
  - abismo
  lexicon: HALOT
  rationale: En este contexto poético, el término apunta al ámbito de la muerte. «Sepulcro» es una equivalencia contextual en español que preserva la referencia funeraria; el POB inglés mantiene «pit» por la misma razón metafórica.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - he venido a ser
  - soy
  - llegué a ser
  lexicon: HALOT
  rationale: El perfecto hebreo señala un estado resultante. «He llegado a ser» expresa con claridad ese cambio de condición sin reducirlo a un simple pasado narrativo.
- source_word: כְּגֶבֶר
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como un varón
  - como un guerrero
  - como un fuerte
  lexicon: HALOT
  rationale: «גבר» normalmente significa «hombre» y puede sugerir vigor. Se conserva «hombre» porque el contraste con «sin fuerza» ya deja ver la ironía del verso, sin introducir una interpretación no exigida.
- source_word: אֵין אֱיָל
  english_pob_choice: without strength
  chosen_spanish: sin fuerza
  alternatives_spanish:
  - sin vigor
  - sin valor
  - sin poder
  lexicon: HALOT
  rationale: «איל» denota fuerza o vigor. «Sin fuerza» es la opción más directa y transparente en español, manteniendo la dureza de la expresión hebrea.
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo WLC y con el análisis auditado en inglés; no hay revisiones aplicadas en el registro inglés más reciente, y la traducción española sigue la misma línea de alta concordancia sin necesidad de ajustes.
  spanish_consistency_notes:
  - Se conserva el paralelismo del verso con dos miembros bien diferenciados.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton ni un sustituto divino en este versículo.
  - «Sepulcro» se usa aquí como equivalente contextual de la imagen funeraria, no como negación de la metáfora hebrea.
  - El orden y la puntuación buscan mantener la cadencia del lamento poético en español.
