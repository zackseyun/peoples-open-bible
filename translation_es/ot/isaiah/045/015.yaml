  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios», «el Dios de Israel» y «el Salvador» son apropiados. No aparece ningún caso que requiera «Yahvé», «Mesías», «esclavo» u otros términos sensibles del glosario. La decisión sobre la ocultación divina concuerda con la pauta de preservar la tensión teológica sin resolverla.
