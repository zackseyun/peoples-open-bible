translation:
  language: es
  text: 'La noticia[a] se oyó en la casa de Faraón: «Han venido los hermanos de José»; y pareció bien[b] a los ojos de Faraón y a los ojos de sus siervos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el reporte» o «el informe».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue agradable» o «les agradó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקֹּל
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el reporte
  - el informe
  - la voz
  lexicon: HALOT
  rationale: En este contexto, קוֹל no debe leerse de manera estrictamente acústica, sino como lo que se hizo oír en la casa de Faraón; el sentido es de información divulgada. "La noticia" comunica bien esa fuerza idiomática en español sin perder la referencia al mensaje escuchado.
- source_word: נִשְׁמַע
  english_pob_choice: was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue oída
  - se supo
  - llegó a oírse
  lexicon: HALOT
  rationale: El nifal de שׁמע conserva el valor pasivo/reflexivo de algo que llega a oírse. "Se oyó" mantiene la pasividad y resulta natural en español; no se convierte en una explicación como "se supo".
- source_word: בֵּית פַּרְעֹה
  english_pob_choice: in Pharaoh’s house
  chosen_spanish: en la casa de Faraón
  alternatives_spanish:
  - en la casa de Faraón
  - en el palacio de Faraón
  - en la corte de Faraón
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "casa de Faraón". "Casa" preserva el vínculo léxico y evita introducir "corte", que sería interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  - a saber
  lexicon: HALOT
  rationale: Se mantiene el marcador de discurso que introduce el contenido de la noticia. "Diciendo" es transparente y fiel a la función sintáctica hebrea.
- source_word: בָּאוּ
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - han llegado
  - llegaron
  lexicon: HALOT
  rationale: 'El perfecto hebreo expresa un hecho concluido con relevancia presente: los hermanos están ahora allí. "Han venido" conserva ese valor mejor que un pretérito simple.'
- source_word: אֲחֵי יוֹסֵף
  english_pob_choice: Joseph’s brothers
  chosen_spanish: los hermanos de José
  alternatives_spanish:
  - los hermanos de José
  - los hermanos de José
  lexicon: HALOT
  rationale: En español, la construcción posesiva natural es "de José". Se evita "José" como nombre adaptado distinto de la forma bíblica estándar en español.
- source_word: וַיִּיטַב
  english_pob_choice: it was pleasing
  chosen_spanish: fue agradable
  alternatives_spanish:
  - les agradó
  - fue bien visto
  - pareció bueno
  lexicon: HALOT
  rationale: טוב aquí expresa que algo fue favorable/agradable. "Fue agradable" conserva el juicio positivo sin sobrecargarlo con un sujeto explícito que el hebreo no da en esta cláusula.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a los ojos de
  - delante de
  - ante
  lexicon: HALOT
  rationale: Se conserva el hebraísmo idiomático "a los ojos de" porque el POB inglés también lo retiene y el español lo entiende bien. Evita reducir el giro a una paráfrasis más libre como "ante".
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus criados
  lexicon: HALOT
  rationale: עבד puede abarcar siervos, servidores o funcionarios de corte. Dado el registro bíblico y la fuerza del sustantivo, "siervos" es una opción directa y suficientemente amplia en español; no se fuerza "funcionarios" sin base explícita.
theological_decisions:
- issue: Valor del hebraísmo "en los ojos de" / "a los ojos de"
  english_pob_reading: it was pleasing in the eyes of Pharaoh and in the eyes of his servants
  chosen_spanish_reading: fue agradable a los ojos de Faraón y a los ojos de sus siervos
  alternative_spanish_readings:
  - fue agradable ante Faraón y ante sus siervos
  - les agradó a Faraón y a sus siervos
  rationale: El texto expresa una evaluación favorable usando la idiomática hebrea del "ojo" como sede de percepción/jucio. Mantener el giro conserva la textura del original y no borra el modo en que se formula la aprobación.
  doctrine_reference: Hebraísmo semántico; no implica una doctrina específica, sino fidelidad al modo de expresión del hebreo bíblico.
translation_notes:
  revision_awareness: El inglés POB revisó "news" a "report" por un registro más formal y ajustó "it was good" a "it was pleasing" para reflejar mejor la idiomática hebrea. La versión española sigue esa decisión semántica con "la noticia" / "fue agradable", conservando además el giro "a los ojos de" que el audit trail mantuvo como rasgo de transparencia textual.
  spanish_consistency_notes:
  - Se mantiene Faraón como forma bíblica española estándar para פַּרְעֹה.
  - Se usa José, no Joséf ni variantes, conforme al español bíblico habitual.
  - Se preserva el plural "hermanos" sin añadir matiz de parentesco extra.
  - '"Siervos" se elige por continuidad léxica con el campo semántico de עבד y por ser comprensible en registro bíblico.'
  - La puntuación reproduce el contenido citado entre comillas y el enlace narrativo con punto y coma, acorde con la estructura hebrea y el inglés auditado.
