translation:
  language: es
  text: Y caminaron en los estatutos de las naciones[a] que Yahvé había desposeído[b] de delante de los hijos de Israel[c], y en las prácticas que habían introducido los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según las costumbres de las naciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que Yahvé había echado de delante de» o «que Yahvé había expulsado de delante de».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hijos de Israel»; es decir, los israelitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: they walked
  chosen_spanish: caminaron
  alternatives_spanish:
  - anduvieron
  - siguieron
  - vivieron
  lexicon: HALOT
  rationale: El hebreo הלך conserva una metáfora de conducta; en español, 'caminaron' comunica ese valor de manera natural y mantiene la imagen ética del texto.
- source_word: בְּחֻקּוֹת
  english_pob_choice: in the statutes
  chosen_spanish: en los estatutos
  alternatives_spanish:
  - según los estatutos
  - en las costumbres
  - en las ordenanzas
  lexicon: HALOT
  rationale: חֻקּוֹת puede referirse a prácticas fijadas o prescritas. 'Estatutos' preserva mejor la formalidad del término y evita reducirlo demasiado a una mera costumbre.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En este contexto histórico, גּוֹיִם se refiere a los pueblos no israelitas del territorio. 'Naciones' es el equivalente más estándar y menos cargado teológicamente.
- source_word: אֲשֶׁר הוֹרִישׁ יְהוָה מִפְּנֵי
  english_pob_choice: whom Yahweh had dispossessed before
  chosen_spanish: que Yahvé había desposeído de delante de
  alternatives_spanish:
  - que Yahvé había echado de delante de
  - que Yahvé había expulsado de delante de
  - que Yahvé había arrojado de delante de
  lexicon: HALOT
  rationale: הוֹרִישׁ en hiphil puede significar 'desposeer' o 'expulsar'. 'Desposeído' conserva la idea de quitar posesión y tierra; 'de delante de' refleja bien מִפְּנֵי en sentido espacial.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión es literalmente 'hijos de Israel'. Se conserva así por fidelidad formal y porque es una designación étnica tradicional del hebreo bíblico.
- source_word: וּמַלְכֵי יִשְׂרָאֵל אֲשֶׁר עָשׂוּ
  english_pob_choice: and in the practices that the kings of Israel had introduced
  chosen_spanish: y en las prácticas que habían introducido los reyes de Israel
  alternatives_spanish:
  - y en lo que habían hecho los reyes de Israel
  - y en los actos que habían hecho los reyes de Israel
  - y en las costumbres que habían establecido los reyes de Israel
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica y requiere suavización en español. 'Prácticas' conserva el sentido de conducta/patrón seguido, y 'habían introducido' refleja adecuadamente la idea de instaurar o meter esas prácticas en Israel.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la convención de este proyecto, se conserva el nombre divino como 'Yahvé', en lugar de ocultarlo con una sustitución como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: הוֹרִישׁ יְהוָה מִפְּנֵי as dispossession rather than mere motion
  english_pob_reading: whom Yahweh had dispossessed before
  chosen_spanish_reading: que Yahvé había desposeído de delante de
  alternative_spanish_readings:
  - que Yahvé había expulsado de delante de
  - que Yahvé había echado de delante de
  rationale: 'Se mantiene la tensión entre expulsar y desposeer: el verbo permite ambos matices, pero en este contexto de herencia territorial ''desposeído'' comunica mejor la pérdida de posesión de la tierra.'
  doctrine_reference: HALOT, הוֹרִישׁ (Hiphil)
- issue: בְּנֵי יִשְׂרָאֵל como etnic designation
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma hebrea literal porque el contexto la usa como designación étnica fija. 'Los israelitas' sería natural, pero suaviza la textura del hebreo.
  doctrine_reference: HALOT, בְּנֵי יִשְׂרָאֵל
translation_notes:
  revision_awareness: La redacción refleja la revisión más reciente del contexto inglés, que cerró la última cláusula como 'the practices that the kings of Israel had introduced'. Por eso se optó por 'las prácticas que habían introducido los reyes de Israel', manteniendo el verbo de instauración y la idea de patrón conductual implícito en 'walked in'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'hijos de Israel' para conservar la forma hebrea literal y la terminología del proyecto.
  - '''Prácticas'' se usó como equivalente contextual de חֻקּוֹת en esta oración, sin forzar ''costumbres'' como lectura primaria.'
