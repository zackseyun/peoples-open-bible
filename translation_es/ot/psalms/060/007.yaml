translation:
  language: es
  text: Para que tus amados[a] sean librados, salva con tu diestra y respóndeme[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus amados»; la expresión hebrea es plural y afectuosa.
    reason: lexical_alternative
  - marker: b
    text: La revisión auditada adopta la lectura singular «respóndeme»; otras construals reflejadas en el aparato inglés leen «respóndenos».
    reason: textual_variant
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: So that
  chosen_spanish: Para que
  alternatives_spanish:
  - A fin de que
  - Para
  lexicon: HALOT
  rationale: La partícula expresa propósito o resultado. «Para que» conserva ese valor final de manera natural en español y mantiene el tono de súplica poética.
- source_word: יֵחָלְצוּן
  english_pob_choice: may be delivered
  chosen_spanish: sean librados
  alternatives_spanish:
  - sean rescatados
  - sean liberados
  lexicon: HALOT
  rationale: El nifal de חלץ comunica ser sacado de una situación peligrosa. «Ser librados» es idiomático en español bíblico moderno y conserva la idea de rescate sin exagerar el matiz.
- source_word: יְדִידֶיךָ
  english_pob_choice: your beloved ones
  chosen_spanish: tus amados
  alternatives_spanish:
  - tus amados/as
  - los que tú amas
  - tus queridos
  lexicon: HALOT
  rationale: El plural con sufijo de 2ms pide una forma plural. «Tus amados» expresa afecto de pacto y suena más directo en español que una perífrasis más larga.
- source_word: הוֹשִׁיעָה
  english_pob_choice: save
  chosen_spanish: salva
  alternatives_spanish:
  - sálvanos
  - líbranos
  - da salvación
  lexicon: HALOT
  rationale: El imperativo hifil de ישׁע pide acción salvadora directa. «Salva» reproduce bien la súplica y mantiene la fuerza verbal del original.
- source_word: יְמִינְךָ
  english_pob_choice: with your right hand
  chosen_spanish: con tu diestra
  alternatives_spanish:
  - con tu mano derecha
  - por tu diestra
  - con tu poder
  lexicon: HALOT
  rationale: La imagen antropomórfica de la diestra divina debe mantenerse. «Diestra» preserva el registro poético y la metáfora de poder activo mejor que una abstracción.
- source_word: וַעֲנֵנוּ / v. revisión inglesa
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - respóndenos
  - y respóndeme
  - y responde
  lexicon: HALOT
  rationale: La lectura masorética y la revisión inglesa final favorecen un singular. «Respóndeme» refleja esa decisión y evita imponer una lectura plural no sustentada por el estado final del texto auditado.
theological_decisions:
- issue: Imagen de la diestra divina
  english_pob_reading: Retain the anthropomorphic expression 'with your right hand' as a metaphor for God's saving power.
  chosen_spanish_reading: Mantener «con tu diestra» como metáfora de la acción poderosa de Dios.
  alternative_spanish_readings:
  - por tu poder
  - con tu fuerza
  rationale: La imagen bíblica tiene valor poético y teológico propio; no conviene abstractarla en la línea principal porque perdería concreción y resonancia intertextual.
  doctrine_reference: Translation philosophy §1, §6
- issue: Número de la última súplica
  english_pob_reading: Translate as singular 'answer me' following the final revision.
  chosen_spanish_reading: Usar singular «respóndeme».
  alternative_spanish_readings:
  - respóndenos
  rationale: La tradición de revisión del texto inglés finaliza en singular, y esa lectura queda reflejada en el español para mantener coherencia con el estado auditado más reciente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del contexto auditado, que cambió la última cláusula de «answer us» a «answer me» para ajustarse a la lectura singular. Se conservó la imagen de la diestra divina y el valor final de לְמַעַן sin suavizar la súplica poética.
  spanish_consistency_notes:
  - Se prefirió «diestra» para mantener un registro bíblico natural y la metáfora corporal.
  - «Librados» y «salva» distinguen bien entre el resultado deseado y la acción divina implorada.
  - Se evitó «SEÑOR» como máscara; el versículo no contiene el Tetragrámaton explícito en esta línea.
  - La nota del plural afectivo en «tus amados» ayuda a transparentar la forma hebrea sin recargar el verso.
