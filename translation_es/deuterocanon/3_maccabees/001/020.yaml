    rationale: El inglés auditado justificó «all-supreme» precisamente para conservar la retórica superlativa elevada. «Supremo» solo, aunque posible, reduce esa intensidad.
  - severity: low
    issue: «sin volver atrás hacia el santuario» es menos natural de lo deseable en español.
    rationale: La sintaxis suena rígida. Una leve reordenación mejora la legibilidad sin alterar el sentido.
