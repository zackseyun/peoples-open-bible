translation:
  language: es
  text: Y seiscientos hombres[a], armados con sus armas de guerra, estaban de pie a la entrada del portón; estos eran de los hijos de Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los danitas». Literalmente, «de los hijos de Dan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: And six hundred men
  chosen_spanish: Y seiscientos hombres
  alternatives_spanish:
  - Y ahora seiscientos hombres
  - Y seis cientos hombres
  lexicon: HALOT
  rationale: El hebreo une la cifra con אִישׁ como colectivo; en español, «hombres» comunica con naturalidad el conjunto de guerreros sin añadir nada al sentido.
- source_word: חֲגוּרִים
  english_pob_choice: armed
  chosen_spanish: ceñidos
  alternatives_spanish:
  - armados
  - ceñidos con
  lexicon: HALOT
  rationale: El participio significa literalmente «ceñidos»; como va unido a las armas, se mantiene el valor concreto de «ceñidos» sin perder el sentido militar que el contexto exige.
- source_word: כְּלֵי מִלְחַמְתָּם
  english_pob_choice: their weapons of war
  chosen_spanish: sus armas de guerra
  alternatives_spanish:
  - sus armas
  - su equipo de guerra
  - sus instrumentos de guerra
  lexicon: HALOT
  rationale: כְּלִי es amplio, pero aquí el campo militar favorece «armas»; «de guerra» conserva la redundancia semítica del original y el énfasis bélico.
- source_word: נִצָּבִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban apostados
  - estaban parados
  lexicon: HALOT
  rationale: El participio describe una posición sostenida. «Estaban de pie» mantiene el aspecto descriptivo del hebreo y su escena narrativa.
- source_word: פֶּתַח הַשָּׁעַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - en la entrada de la puerta
  - a la entrada del portón
  lexicon: HALOT
  rationale: 'Se conserva la doble referencia espacial del hebreo: «entrada» + «puerta». «Puerta» es la forma más transparente en español, aunque «portón» sería posible en algunos contextos.'
- source_word: אֲשֶׁר מִבְּנֵי דָן
  english_pob_choice: these were from the sons of Dan
  chosen_spanish: estos eran de los hijos de Dan
  alternatives_spanish:
  - quienes eran de los hijos de Dan
  - estos eran de los danitas
  lexicon: HALOT
  rationale: Se mantiene «hijos de Dan» porque el texto hebreo usa la expresión genealógica/tribal literal. «Danitas» sería una normalización interpretativa que la POB inglesa evitó en el cuerpo del texto.
theological_decisions:
- issue: Identidad tribal expresada como «hijos de Dan»
  english_pob_reading: these were from the sons of Dan
  chosen_spanish_reading: estos eran de los hijos de Dan
  alternative_spanish_readings:
  - estos eran danitas
  - estos pertenecían a Dan
  rationale: La lectura inglesa preserva la expresión literal «sons of Dan» en vez de reemplazarla por un etnónimo más interpretativo. En español se conserva esa misma literalidad para no borrar el tono genealógico/tribal del hebreo.
  doctrine_reference: Ninguna; decisión de fidelidad lexical y étnico-tribal
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó el guion largo por punto y coma para unir con más formalidad la cláusula identificadora. En español se adoptó un punto y coma equivalente, manteniendo la relación explicativa sin sobreadornar el ritmo.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Dan» en lugar de «danitas» en el texto principal, siguiendo la preferencia auditada por la forma literal.
  - «Armas de guerra» conserva la redundancia hebrea y evita especificar el tipo de equipo.
  - La puntuación con punto y coma reproduce la relación identificadora de la revisión inglesa.
