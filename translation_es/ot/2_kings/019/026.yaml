revisions:
- from: Por tanto, sus habitantes estaban [a] faltos de fuerza; estaban desmayados y avergonzados. Eran como la hierba del campo y la vegetación tierna, como la hierba de los tejados y [b] quemados antes de crecer.
  to: Por tanto, sus habitantes estaban [a] faltos de fuerza; estaban consternados y avergonzados. Eran como la hierba del campo y la vegetación tierna, como la hierba de los tejados y como vegetación [b] quemada antes de crecer.
