translation:
  language: es
  text: 'Y he aquí[a] un leproso se acercó y se postró ante él, diciendo: «Señor, si quieres, puedes limpiarme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira»; la partícula griega introduce una llamada de atención narrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: La partícula conserva fuerza deíctica y narrativa. «Y he aquí» suena natural en español bíblico contemporáneo y mantiene el efecto de atención sin omitirlo.
- source_word: λεπρὸς
  english_pob_choice: a leper
  chosen_spanish: un leproso
  alternatives_spanish:
  - un hombre con lepra
  - un hombre leproso
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refleja de forma directa y concisa. «Un leproso» corresponde bien al valor léxico y conserva la economía del griego.
- source_word: προσελθὼν
  english_pob_choice: came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  - se aproximó
  lexicon: BDAG
  rationale: El participio expresa movimiento hacia Jesús. «Se acercó» preserva con claridad la idea de aproximación sin perder naturalidad en español.
- source_word: προσεκύνει
  english_pob_choice: bowed down before
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - lo adoró
  - se arrodilló ante él
  - le rindió homenaje
  lexicon: BDAG
  rationale: El verbo puede implicar reverencia corporal y, según el contexto, adoración. «Se postró ante él» mantiene la acción física reverente sin resolver de antemano la cuestión teológica de si aquí debe entenderse como culto pleno.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: En español, «Señor» es la forma establecida para κύριος en este contexto cristológico y preserva el rango de respeto y posible carga cristológica.
- source_word: ἐὰν θέλῃς
  english_pob_choice: if you are willing
  chosen_spanish: si quieres
  alternatives_spanish:
  - si estás dispuesto
  - si lo deseas
  - si quieres hacerlo
  lexicon: BDAG
  rationale: «Si quieres» expresa de modo natural la voluntad requerida por el griego. Aunque menos explícito que «si estás dispuesto», mantiene la misma apelación sin sobrecargar el texto.
- source_word: δύνασαί
  english_pob_choice: you are able
  chosen_spanish: puedes
  alternatives_spanish:
  - eres capaz de
  - tienes poder para
  lexicon: BDAG
  rationale: El verbo señala capacidad/poder. En español, «puedes» transmite esa capacidad con naturalidad y sin rigidez, como equivalente óptimo al valor del verbo en la petición.
- source_word: καθαρίσαι
  english_pob_choice: to cleanse me
  chosen_spanish: limpiarme
  alternatives_spanish:
  - purificarme
  - hacerme limpio
  - sanarme
  lexicon: BDAG
  rationale: En este contexto, καθαρίζω incluye limpieza ritual y física asociada con la lepra. «Limpiarme» conserva esa resonancia bíblica y cultual mejor que limitarlo a «sanarme».
theological_decisions:
- issue: Alcance de προσκυνέω ante Jesús
  english_pob_reading: Rendered as reverential bodily action ('bowed down before him') rather than the more interpretively loaded 'worshiped him.'
  chosen_spanish_reading: «Se postró ante él» como gesto reverente, sin fijar de forma cerrada si implica adoración en sentido pleno.
  alternative_spanish_readings:
  - «Lo adoró»
  - «se arrodilló ante él»
  - «le rindió homenaje»
  rationale: El contexto permite una gama entre postración reverente y adoración. La formulación elegida conserva esa tensión y evita resolver demasiado pronto la cuestión semántica y cristológica.
  doctrine_reference: Principio POB de conservar tensiones léxicas y teológicas cuando el contexto no obliga a una sola opción.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió «a leper» por su mayor concisión y fidelidad directa a λεπρός. En español se refleja con «un leproso», sin añadir elementos explicativos que el texto no exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Señor» conserva la forma cristológica habitual para κύριος en el contexto del Evangelio.
  - «Limpiarme» se usa de manera consistente con el valor cultual/ritual de καθαρίζω en pasajes sobre lepra.
  - La puntuación y el diálogo siguen el estilo bíblico moderno y publicable en español latinoamericano.
