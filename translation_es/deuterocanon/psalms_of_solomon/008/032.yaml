    issue: δικαιοσύνης se vertió como «justicia» en el texto principal
    rationale: Aunque «justicia» es defendible, el expediente inglés documenta que aquí se quiso preservar el sentido más pleno de 'righteousness' frente a 'justice'. En español, «rectitud» representa mejor esa amplitud moral sin perder inteligibilidad, mientras «justicia» puede quedar como alternativa.
  revised_spanish_text: Porque tú eres el Dios de la rectitud[a], que juzgas a Israel con disciplina[b].
