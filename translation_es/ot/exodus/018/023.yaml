translation:
  language: es
  text: Si haces este asunto[a], y si Dios así te lo ordena, entonces podrás sostenerte[b], y también todo este pueblo[c] irá a su lugar[d] en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esta cosa' o 'este plan'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'estar de pie'; aquí, en contexto, 'sostenerte' o 'resistir'.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'todo este pueblo', usando un singular colectivo.
    reason: lexical_alternative
  - marker: d
    text: O 'volverá a su lugar'; la idea es que el pueblo irá, cada uno, a su propio lugar en paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: Introduce una condición directa y natural en español, conservando la relación condicional del hebreo.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este plan
  lexicon: HALOT
  rationale: דָּבָר puede ser 'palabra', 'asunto' o 'cosa'. Aquí se refiere al curso de acción propuesto; 'esta cosa' conserva la amplitud y la cercanía demostrativa sin sobreespecificar.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you do
  chosen_spanish: haces
  alternatives_spanish:
  - hagas
  - realizas
  lexicon: HALOT
  rationale: El imperfecto en contexto condicional se expresa naturalmente con 'si haces'. Mantiene la acción simple y directa del hebreo.
- source_word: וְצִוְּךָ אֱלֹהִים
  english_pob_choice: and God so commands you
  chosen_spanish: y Dios así te lo manda
  alternatives_spanish:
  - y Dios te lo manda
  - y Dios te lo ordena
  lexicon: HALOT
  rationale: '''Así te lo manda'' refleja la lectura condicional y la coordinación hebrea, sin convertir la cláusula en una simple autorización automática. ''Mandar'' preserva el peso de צוה mejor que ''instruir''.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: El referente es el Dios único de Israel; en español 'Dios' es la forma natural y fiel.
- source_word: וְיָכָלְתָּ עֲמֹד
  english_pob_choice: then you will be able to endure
  chosen_spanish: entonces podrás sostenerte
  alternatives_spanish:
  - entonces podrás permanecer en pie
  - entonces podrás resistir
  lexicon: HALOT
  rationale: עָמֹד literalmente es 'estar de pie', pero aquí expresa la capacidad de soportar la carga. 'Sostenerte' conserva la metáfora de mantenerse en pie y comunica la idea de resistir la carga.
- source_word: וְגַם כָּל הָעָם הַזֶּה
  english_pob_choice: and all this people also
  chosen_spanish: y también todo este pueblo
  alternatives_spanish:
  - y también todo este pueblo aquí
  - y también todo este pueblo, colectivamente
  lexicon: HALOT
  rationale: '''Pueblo'' en español funciona como colectivo natural y evita una construcción extraña. ''Todo este pueblo'' conserva el singular colectivo del hebreo y la cercanía demostrativa.'
- source_word: עַל מְקֹמֹו יָבֹא
  english_pob_choice: will go to their place
  chosen_spanish: irá a su lugar
  alternatives_spanish:
  - vendrá a su lugar
  - volverá a su lugar
  lexicon: HALOT
  rationale: בוא puede ser 'ir' o 'venir' según el punto de vista. Desde el contexto, la gente se aparta de Moisés para su propio destino; 'irá' es idiomático y fiel. 'Su lugar' mantiene el singular distributivo del hebreo de forma natural.
- source_word: בְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: '''En paz'' es la forma estándar y amplia, conservando la noción de bienestar y seguridad incluida en שָׁלוֹם.'
theological_decisions:
- issue: Relación entre el consejo de Jetro y la aprobación divina
  english_pob_reading: 'The verse is rendered as a two-part condition: Moses should do this only if God commands/approves it.'
  chosen_spanish_reading: 'La frase se mantiene como una condición doble: si Moisés hace esto, y si Dios así se lo manda, entonces el resultado será que podrá sostenerse y el pueblo irá en paz.'
  alternative_spanish_readings:
  - Si haces esta cosa, y Dios te manda, entonces podrás sostenerte...
  - Si haces esta cosa, y Dios te ordena...
  rationale: El hebreo une las cláusulas de manera condicional; 'y Dios así te lo manda' evita presentar el consejo como autorización independiente y refleja mejor la dependencia de la aprobación divina.
  doctrine_reference: Ex 18:23; cf. principios de discernimiento bajo autoridad divina
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió 'so' en 'God so commands you' para marcar mejor la matiz condicional. La versión española lo refleja con 'así te lo manda', manteniendo la subordinación de la cláusula divina y el tono formal-optativo del consejo.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים conforme al referente singular en el contexto.
  - '''Pueblo'' conserva el colectivo singular del hebreo y evita forzar pluralidad donde el texto no la marca.'
  - '''En paz'' mantiene la amplitud semántica de שָׁלוֹם sin añadir matices ajenos.'
  - '''Sostenerte'' intenta conservar la imagen de estar en pie sin perder la fuerza idiomática del contexto.'
