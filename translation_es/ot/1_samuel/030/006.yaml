translation:
  language: es
  text: Y David estuvo[a] muy angustiado, porque el pueblo hablaba de apedrearlo, pues el alma de todo el pueblo estaba amarga, cada hombre a causa de sus hijos y de sus hijas. Pero David se fortaleció en Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu de todo el pueblo estaba amargo», es decir, todo el pueblo estaba profundamente amargado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּ֨צֶר
  english_pob_choice: was greatly distressed
  chosen_spanish: estuvo muy angustiado
  alternatives_spanish:
  - estaba en gran angustia
  - estuvo muy afligido
  - se vio muy apurado
  lexicon: HALOT
  rationale: La construcción con לְדָוִד expresa una situación de angustia o apuro intenso; 'estuvo muy angustiado' comunica bien el estado resultante y conserva la intensidad de מְאֹד sin sonar artificial en español.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - excesivamente
  lexicon: HALOT
  rationale: Es un intensificador directo; 'muy' es la opción más natural en español para acompañar 'angustiado'.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  - las tropas
  lexicon: HALOT
  rationale: Se conserva el sustantivo colectivo del hebreo. 'El pueblo' mantiene la referencia amplia sin restringirla indebidamente a 'las tropas' o 'los hombres'.
- source_word: לְסָקְלוֹ
  english_pob_choice: of stoning him
  chosen_spanish: de apedrearlo
  alternatives_spanish:
  - para apedrearlo
  - de lanzarle piedras hasta matarlo
  lexicon: HALOT
  rationale: Después de 'hablaban', el infinitivo marca el acto de que estaban considerando; 'hablaba de apedrearlo' refleja esa deliberación, y 'apedrear' es el equivalente bíblico natural en español.
- source_word: מָרָה נֶפֶשׁ
  english_pob_choice: the soul ... was bitter
  chosen_spanish: amarga era el alma
  alternatives_spanish:
  - el espíritu ... estaba amargo
  - estaban muy amargados
  - amargado estaba el ánimo
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo con 'alma' y el adjetivo 'amarga' para no borrar la tensión léxica entre 'alma' y el matiz emocional de 'amarga'.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todos
  lexicon: HALOT
  rationale: '''Todo el pueblo'' reproduce el conjunto colectivo señalado por el hebreo y resulta idiomático en español bíblico actual.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El distributivo señala a cada miembro varón del grupo; 'cada hombre' conserva ese valor sin volver la frase genérica de más.
- source_word: עַל בָּנָיו וְעַל בְּנֹתָיו
  english_pob_choice: because of his sons and his daughters
  chosen_spanish: a causa de sus hijos y de sus hijas
  alternatives_spanish:
  - por sus hijos y sus hijas
  - a propósito de sus hijos y sus hijas
  lexicon: HALOT
  rationale: עַל expresa aquí el motivo del dolor. 'A causa de' preserva el valor causal con buena naturalidad en español.
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se animó
  - tomó valor
  - se esforzó
  lexicon: HALOT
  rationale: El hitpael es reflexivo/medio; 'se fortaleció' conserva la acción deliberada de David sin añadir una explicación no presente en el texto.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: Se adopta el nombre divino en la forma establecida para el proyecto, evitando la máscara 'SEÑOR' y manteniendo la referencia directa al Tetragrámaton.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su propio Dios
  lexicon: HALOT
  rationale: El posesivo simple es suficiente y natural en español; el hebreo no requiere un énfasis adicional.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce con el nombre divino 'Yahvé' para no ocultar el nombre del pacto con una convención litúrgica de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מָרָה נֶפֶשׁ
  english_pob_reading: the soul of all the people was bitter
  chosen_spanish_reading: amarga era el alma de todo el pueblo
  alternative_spanish_readings:
  - el espíritu de todo el pueblo estaba amargo
  - todo el pueblo estaba muy amargado
  rationale: Se conserva la tensión entre la imagen concreta 'alma' y el estado emocional de amargura. No se reduce a una simple paráfrasis psicológica, porque el hebreo preserva esa formulación idiomática.
  doctrine_reference: 'Lexical theology: soul/spirit distinction in biblical anthropology'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se mantuvo la imagen idiomática de 'el alma' y se evitó sustituir el nombre divino por una convención de máscara. No se introdujeron cambios respecto del sentido base del inglés auditado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה conforme a la norma del proyecto.
  - '''El pueblo'' conserva el sustantivo colectivo del hebreo sin convertirlo en una paráfrasis militar.'
  - La estructura 'hablaba de apedrearlo' preserva la intención deliberativa de לְסָקְלוֹ.
  - La nota al pie mantiene la alternativa lexical entre 'alma' y 'espíritu' sin borrar la tensión semántica.
