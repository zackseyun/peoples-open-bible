    issue: 'Apertura no idiomática: «porque del día que viene»'
    rationale: No es español natural y no reproduce bien la causalidad de עַל en contexto. «A causa del día que viene» expresa fielmente el valor causal documentado en el POB.
  - severity: high
    issue: Nota [a] anclada al segmento equivocado
    rationale: La nota dice «O “el remanente de la isla de Caftor”», pero está colocada sobre «filisteos». Debe anclarse donde aparece la frase alternativa correspondiente al final del versículo.
  - severity: medium
    issue: «todo sobreviviente que ayuda» es poco natural
    rationale: Aunque es cercano a la forma hebrea, en español resulta áspero. «Todo sobreviviente que preste ayuda» conserva la idea de helper/ayuda con mejor fluidez.
  - severity: low
    issue: Repetición pesada de «de» en «de Tiro y de Sidón»
    rationale: No es incorrecto, pero «de Tiro y Sidón» suena más limpio en español y preserva la procedencia/fuente documentada.
