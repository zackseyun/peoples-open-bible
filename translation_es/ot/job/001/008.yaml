base_translation:
  language: en
  yaml_path: translation/ot/job/001/008.yaml
  text: 'And Yahweh said to the Accuser[a], “Have you set your heart on my servant Job? For there is none like him on the earth: a blameless and upright man[b], one who fears God and turns away from evil.”'
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Have you considered my servant Job?' The Hebrew is literally, 'Have you set your heart on my servant Job?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Accuser' (or 'the Satan'); the term here carries the sense of a title or role rather than clearly functioning as a personal name.
    reason: alternative_reading
