    issue: «metalúrgico» para צוֹרֵף
    rationale: Aunque etimológicamente relacionado con metal, en español actual suele denotar a un especialista industrial o científico, no al artesano que fabrica imágenes. «artesano del metal» o «fundidor» comunica mejor el referente.
  - severity: medium
    issue: «es avergonzado» para הֹבִישׁ
    rationale: Es gramatical, pero poco idiomático en español bíblico moderno. «queda avergonzado» o «es puesto en vergüenza» suena más natural y conserva el valor pasivo/resultativo.
  - severity: medium
    issue: «es estúpido» para נִבְעַר
    rationale: Reproduce el inglés, pero en español puede sonar coloquial o abruptamente moderno. «es necio» conserva la fuerza sapiencial/profética y resulta más digno y legible para el público meta.
  - severity: low
    issue: Nota a con «bruto»
    rationale: «Bruto» en español puede sonar demasiado coloquial o ambiguo. «embrutecido» o «tosco» se acerca mejor a ‘brutish’, aunque la nota puede también explicar la alternativa causal sin insistir en una palabra menos adecuada.
  - severity: low
