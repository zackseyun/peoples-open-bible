revisions:
- from: 'Entonces Moisés dijo a Dios[a]: «He aquí, cuando yo vaya a los hijos de Israel y les diga: “El Dios de sus padres me ha enviado a ustedes”, y ellos me digan: “¿Cuál es su nombre?”, ¿qué les diré?»'
  to: 'Entonces Moisés dijo a Dios[a]: «He aquí, cuando yo venga a los hijos de Israel y les diga: “El Dios de sus padres me ha enviado a ustedes”, y ellos me digan: “¿Qué nombre tiene?”, ¿qué les diré?»'
  rationale: Se ajusta «vaya» a «venga» para reflejar mejor בָא según la decisión léxica auditada y la perspectiva de acercamiento del hebreo. Se afina «¿Cuál es su nombre?» a «¿Qué nombre tiene?» para acercarse más a la forma directa de מַה שְּׁמוֹ sin perder naturalidad en español. El resto del borrador es fiel y legible.
