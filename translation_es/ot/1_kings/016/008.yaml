translation:
  language: es
  text: En el año veintiséis de Asa, rey de Judá, Ela, hijo de Baasa, comenzó a reinar sobre Israel en Tirsa por dos años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּשְׁנַת עֶשְׂרִים וָשֵׁשׁ שָׁנָה
  english_pob_choice: In the twenty-sixth year
  chosen_spanish: En el año veintiséis
  alternatives_spanish:
  - En el vigésimo sexto año
  - Durante el vigésimo sexto año
  lexicon: HALOT
  rationale: La fórmula hebrea es una datación de reinado idiomática. En español, «En el año veintiséis» conserva la referencia cronológica sin una repetición poco natural de «año». Las alternativas más literales son posibles, pero esta forma suena más natural y sigue de cerca la función del original.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  - correspondiente a Asa, rey de Judá
  lexicon: HALOT
  rationale: La preposición de introduce en español la referencia al año de reinado de Asa. Se conserva el orden natural del título con una coma explicativa, sin añadir interpretaciones que el hebreo no expresa explícitamente.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - comenzó a reinar
  - reinó
  lexicon: HALOT
  rationale: En este encabezado de acceso al trono, el verbo hebreo comunica el inicio del reinado. «Llegó a ser rey» conserva el valor ingresivo que el inglés POB captó con «became king», evitando que «reinó» suene como una descripción global de la duración.
- source_word: אֵלָה
  english_pob_choice: Elah
  chosen_spanish: Elah
  alternatives_spanish:
  - Ela
  lexicon: Transliteración de nombre propio
  rationale: Se mantiene la transliteración del nombre propio. «Elah» sigue la forma usada por el POB en inglés y evita una castellanización no documentada.
- source_word: בֶן בַּעְשָׁא
  english_pob_choice: son of Baasha
  chosen_spanish: hijo de Baasa
  alternatives_spanish:
  - hijo de Baasa
  - el hijo de Baasa
  lexicon: HALOT
  rationale: La construcción filial es directa y no requiere ampliación. Se usa «Baasa» para la transliteración habitual en español, y «hijo de» mantiene el parentesco exacto sin matiz adicional.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  - en Israel
  lexicon: HALOT
  rationale: עַל con מלך indica dominio o ejercicio de autoridad. «Sobre Israel» reproduce de manera directa la relación de gobierno sin introducir «reino» ni otros elementos ausentes del hebreo.
- source_word: בְּתִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzah
  - en Tirsá
  lexicon: HALOT
  rationale: El hebreo marca ubicación. En español se usa la forma geográfica tradicional «Tirsa», ampliamente reconocible y natural, sin perder la referencia al lugar de su reinado/accesión.
- source_word: שְׁנָתָיִם
  english_pob_choice: for two years
  chosen_spanish: por dos años
  alternatives_spanish:
  - durante dos años
  - por un período de dos años
  lexicon: HALOT
  rationale: La forma dual indica duración de dos años. «Por dos años» es idiomático en español y corresponde bien al valor temporal del resumen regnal.
translation_notes:
  revision_awareness: Se corrigió el error de validación anterior eliminando el marcador de nota no anclado. No se requieren notas al pie para este versículo, porque el texto español puede expresar con claridad todas las decisiones relevantes sin introducir variantes textuales o ambigüedades doctrinales.
  spanish_consistency_notes:
