  spanish_consistency_notes:
  - Se mantiene «Camellos» al inicio con mayúscula solo por posición inicial de verso, no como nombre propio.
  - Se eligió «asnos» en vez de «burros» para conservar el registro bíblico y la equivalencia léxica.
  - La nota al pie preserva la alternativa literal en palabras para auditar la suma de los números hebreos.
