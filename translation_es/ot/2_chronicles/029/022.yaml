    issue: El verbo 'rociaron' debilita ויזרקו
    rationale: El expediente inglés aclara que el verbo denota una aplicación ritual fuerte de la sangre, no una aspersión ligera. En español, 'rociar' suele sugerir esparcir gotas finamente, por lo que no refleja bien la fuerza del rito.
  - severity: low
    issue: Falta la nota léxica sobre el verbo ritual de la sangre
    rationale: El POB inglés preservó una nota significativa sobre alternativas como 'sobre el altar' y 'contra el altar' y sobre la fuerza del verbo. Esa información conviene mantenerla en español para conservar la trazabilidad léxica.
