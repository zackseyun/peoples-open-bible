translation:
  language: es
  text: También ellos construyeron para sí lugares altos, pilares y postes de Aserá[a], en toda colina alta y debajo de todo árbol frondoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aseras' o 'postes sagrados'; el término hebreo se refiere a objetos de culto asociados con Aserá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְנוּ
  english_pob_choice: built
  chosen_spanish: se edificaron
  alternatives_spanish:
  - edificaron
  - construyeron
  lexicon: HALOT
  rationale: בנה significa 'construir/edificar'. En este contexto cultual, 'se edificaron' conserva la acción de levantar instalaciones de culto y permite el matiz reflexivo que expresa לָהֶם ('para sí').
- source_word: גַם הֵמָּה
  english_pob_choice: they too
  chosen_spanish: Ellos también
  alternatives_spanish:
  - también ellos
  - incluso ellos
  lexicon: HALOT
  rationale: La partícula añade continuidad y énfasis. 'Ellos también' suena natural en español y conserva la fuerza acumulativa del hebreo.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para su propio uso
  lexicon: HALOT
  rationale: El pronombre con la preposición tiene aquí valor reflexivo. 'Para sí' es conciso y fiel al sentido de uso propio o beneficio propio.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - altos lugares
  - santuarios en las alturas
  lexicon: HALOT
  rationale: '''Lugares altos'' comunica la categoría cultual de בָּמוֹת sin sonar forzado en español. Mantiene la referencia a sitios de culto ilícito.'
- source_word: מַצֵּבוֹת
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - piedras erguidas
  - estelas
  lexicon: HALOT
  rationale: El término designa objetos cultuales erigidos. 'Pilares' es breve y suficientemente claro en contexto; 'estelas' sería más técnico pero menos transparente aquí.
- source_word: אֲשֵׁרִים
  english_pob_choice: Asherah poles
  chosen_spanish: postes de Aserá
  alternatives_spanish:
  - aseras
  - postes sagrados
  lexicon: HALOT
  rationale: El hebreo plural suele referirse a objetos de culto asociados con Aserá, no necesariamente a la diosa misma. 'Postes de Aserá' conserva la relación nominal y hace explícita la naturaleza objetiva sin sustituirla por una formulación tradicional más vaga.
- source_word: עַל כָּל גִּבְעָה גְבֹהָה
  english_pob_choice: on every high hill
  chosen_spanish: sobre toda colina alta
  alternatives_spanish:
  - en toda colina alta
  - sobre cada colina elevada
  lexicon: HALOT
  rationale: '''Sobre toda colina alta'' mantiene la imagen topográfica y el tono estereotipado del texto. ''Colina'' es más natural que ''monte'' para גִּבְעָה.'
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: and under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - bajo todo árbol verde
  - debajo de todo árbol lozano
  lexicon: HALOT
  rationale: רַעֲנָן expresa frescura, lozanía o frondosidad. 'Frondoso' comunica bien la idea en español moderno y evita el calco literal de 'verde' cuando el rasgo relevante es la exuberancia del árbol.
theological_decisions:
- issue: 'Sentido de אֲשֵׁרִים: objeto cultual o deidad'
  english_pob_reading: cult objects associated with Asherah
  chosen_spanish_reading: postes de Aserá como objetos de culto asociados con la diosa
  alternative_spanish_readings:
  - aseras
  - imágenes de Aserá
  - Aserás
  rationale: El contexto enumera instalaciones y objetos de culto ('lugares altos', 'pilares'), por lo que la referencia más probable es a objetos rituales vinculados con Aserá. La traducción evita confundir el plural con el nombre de la diosa sin perder la asociación cultual.
  doctrine_reference: Lexical/theological note on ancient Near Eastern cult objects
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y coincide con la solución auditada en inglés: repetición enfática (''ellos también''), dativo reflexivo (''para sí'') y la enumeración de objetos de culto. Se mantiene la ambigüedad controlada de אֲשֵׁרִים mediante una nota, sin reducirlo a una traducción tradicional opaca.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - '''Aserá'' se mantiene como forma transliterada con acento para lectura española; el plural hebreo se explica en la nota.'
  - '''Lugares altos'' conserva el término técnico bíblico, pero con sintaxis española natural.'
  - '''Pilares'' y ''postes de Aserá'' mantienen la diferencia entre dos tipos de objetos cultuales en la lista.'
