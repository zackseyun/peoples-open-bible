translation:
  language: es
  text: 'Entonces respondió el joven[a] que estaba encargado de los segadores, y dijo: «Es una joven moabita, la que volvió con Noemí desde los campos de Moab[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el siervo»; נַעַר puede abarcar tanto la idea de juventud como la de servidor, pero aquí el contexto favorece la identificación como joven encargado.
    reason: lexical_alternative
  - marker: b
    text: O «del campo de Moab»; el singular hebreo puede entenderse de manera colectiva para la tierra agrícola de Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en narrativa introduce una respuesta oral; en español, «respondió» comunica bien la acción sin obligar a repetir «y dijo», que ya queda implícito en el discurso directo.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  lexicon: HALOT
  rationale: נַעַר puede significar joven o siervo. Aquí el contexto inmediato destaca su función entre los segadores, pero el sustantivo base sigue siendo etario/estatus; «el joven» mantiene esa amplitud sin imponer «siervo».
- source_word: הַנִּצָּב עַל הַקּוֹצְרִים
  english_pob_choice: who was set over the reapers
  chosen_spanish: que estaba encargado de los segadores
  alternatives_spanish:
  - que estaba puesto sobre los segadores
  - que estaba al frente de los segadores
  - que estaba de pie sobre los segadores
  lexicon: HALOT
  rationale: נצב con עַל en este contexto indica una posición asignada de supervisión. «Encargado de» expresa la relación de autoridad de forma natural en español y evita una imagen demasiado literal como «de pie sobre».
- source_word: הַקּוֹצְרִים
  english_pob_choice: the reapers
  chosen_spanish: los segadores
  alternatives_spanish:
  - los que segaban
  - los cosechadores
  lexicon: HALOT
  rationale: קוצר se refiere a quienes siegan la cosecha. «Segadores» es el equivalente más directo y mantiene el campo agrícola propio del pasaje.
- source_word: נַעֲרָה מוֹאֲבִיָּה
  english_pob_choice: a young Moabite woman
  chosen_spanish: una joven moabita
  alternatives_spanish:
  - una muchacha moabita
  - una joven de Moab
  lexicon: HALOT
  rationale: El adjetivo gentilicio מוֹאֲבִיָּה se vierte naturalmente como «moabita», preservando la identidad étnica/nacional. «Joven» conserva נַעֲרָה sin cargarlo con un matiz infantil.
- source_word: הִיא
  english_pob_choice: She is
  chosen_spanish: Es
  alternatives_spanish:
  - Ella es
  - Se trata de
  lexicon: HALOT
  rationale: El pronombre independiente funciona identificativamente. En español, el verbo copulativo sin pronombre explícito suena más natural y conserva la identificación directa.
- source_word: הַשָּׁבָה
  english_pob_choice: who returned
  chosen_spanish: la que volvió
  alternatives_spanish:
  - la que regresó
  - la que ha vuelto
  lexicon: HALOT
  rationale: שׁוב expresa retorno. «La que volvió» es fiel, fluido y mantiene la referencia narrativa a su regreso con Noemí.
- source_word: עִם נָעֳמִי
  english_pob_choice: with Naomi
  chosen_spanish: con Noemí
  alternatives_spanish:
  - junto con Noemí
  - acompañando a Noemí
  lexicon: HALOT
  rationale: La preposición de acompañamiento se expresa de manera simple y directa; no requiere expansión.
- source_word: מִשְּׂדֵה מוֹאָב
  english_pob_choice: from the fields of Moab
  chosen_spanish: desde los campos de Moab
  alternatives_spanish:
  - del campo de Moab
  - de la tierra de Moab
  lexicon: HALOT
  rationale: El singular hebreo puede funcionar colectivamente. «Campos» recoge la lectura regional/agropecuaria adoptada en la POB inglesa, y «desde» refleja bien el origen espacial del regreso.
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del control cruzado y no incorpora revisiones sustanciales: conserva la estructura narrativa, la identificación de la joven moabita y la nota sobre el singular colectivo de שְׂדֵה.'
  spanish_consistency_notes:
  - Se mantiene «Noemí» para la forma castellana tradicional del nombre propio, conforme al uso bíblico en español.
  - Se usa «Moabita/moabita» como gentilicio estable para מוֹאֲבִיָּה.
  - «Segadores» conserva el registro agrícola y corresponde al inglés POB «reapers».
