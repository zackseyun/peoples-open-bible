translation:
  language: es
  text: Y se pusieron en marcha con todas sus fuerzas, y llegaron y acamparon cerca de Emaús[a], en la región llana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega aquí es Ἀμμαοῦν, más directamente reflejada como «Ammaús». El texto principal usa la forma convencional española «Emaús».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆραν
  english_pob_choice: set out
  chosen_spanish: se pusieron en marcha
  alternatives_spanish:
  - partieron
  - salieron de camino
  - marcharón
  lexicon: LSJ
  rationale: El verbo describe el inicio de la marcha militar o el levantamiento del campamento. «Se pusieron en marcha» comunica ese desplazamiento sin añadir matices excesivos de velocidad o formación.
- source_word: σὺν πάσῃ τῇ δυνάμει αὐτῶν
  english_pob_choice: with all their forces
  chosen_spanish: con todas sus fuerzas
  alternatives_spanish:
  - con todo su ejército
  - con toda su fuerza
  lexicon: LSJ
  rationale: En contexto militar, δύναμις puede referirse a tropas o capacidad militar. «Fuerzas» conserva ese sentido colectivo y resulta natural en español.
- source_word: παρεβάλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon en
  - levantaron el campamento
  - se establecieron en campamento
  lexicon: LSJ
  rationale: El verbo se usa de manera estable en narrativa militar para tender campamento. «Acamparon» es claro y fiel; «levantaron el campamento» cambiaría la dirección de la acción.
- source_word: πλησίον
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  - próximo a
  - al lado de
  lexicon: LSJ
  rationale: Es un término espacial directo. «Cerca de» es idiomático y conserva la proximidad sin sobreinterpretarla.
- source_word: Ἀμμαοῦν
  english_pob_choice: Emmaus
  chosen_spanish: Ammaús
  alternatives_spanish:
  - Emaús
  lexicon: LSJ
  rationale: La forma griega dada en Swete es Ἀμμαοῦν, que el texto inglés de POB reflejó como «Ammaus» antes de normalizarse a «Emmaus» por convención. En español se conserva «Ammaús» en el texto principal para mantenerse más pegado a la forma griega, y se reconoce la forma convencional en nota.
- source_word: ἐν τῇ γῇ τῇ πεδινῇ
  english_pob_choice: in the plain country
  chosen_spanish: en la tierra de la llanura
  alternatives_spanish:
  - en la llanura
  - en la tierra llana
  - en la región de la llanura
  lexicon: LSJ
  rationale: La expresión apunta a una región llana o de planicie. «Tierra de la llanura» conserva el valor geográfico y el paralelismo nominal del griego sin sonar técnico de más.
translation_notes:
  revision_awareness: La revisión inglesa normalizó el topónimo a «Emmaus/Emaús» por convención, pero el expediente griego de base conserva Ἀμμαοῦν; el borrador español sigue la forma más cercana al original en el texto principal y señala la variante convencional en nota.
  spanish_consistency_notes:
  - Se ha mantenido el registro militar narrativo con verbos simples y directos.
  - «Fuerzas» traduce δύναμις en su sentido colectivo bélico, no como poder abstracto.
  - Se evitó «SEÑOR» o equivalentes de reverencia porque el versículo no contiene lenguaje divino.
  - La nota textual aclara la forma del topónimo sin sustituir la lectura principal basada en el griego.
