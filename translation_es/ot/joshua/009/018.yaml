    text: O 'les habían hecho juramento'. El hebreo también puede expresarse como 'habían jurado a favor de ellos', pero en español 'les habían jurado' es la forma más natural en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O 'toda la asamblea murmuró contra los líderes'.
    reason: lexical_alternative
  revision_rationale: Se corrigen calcos no idiomáticos ('a ellos') para un español natural sin perder el valor dativo de לָהֶם. También se ajustan las notas para que sus alternativas sean español genuino y no formulaciones forzadas. El resto del verso se mantiene por su buena fidelidad al hebreo y a las decisiones léxicas del POB.
