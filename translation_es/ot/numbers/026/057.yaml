translation:
  language: es
  text: 'Y estos fueron los levitas registrados[a] por sus clanes: de Gersón, el clan de los gersonitas; de Cohat, el clan de los coatitas; de Merari, el clan de los meraritas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los contados» o «los registrados». El hebreo se refiere a personas inscritas en el censo, no simplemente al acto abstracto de contar.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  english_pob_choice: the numbered Levites
  chosen_spanish: los levitas registrados
  alternatives_spanish:
  - los levitas contados
  - los levitas censados
  - los registrados de Leví
  lexicon: HALOT
  rationale: El hebreo se refiere a personas inscritas en el censo, no al acto abstracto de contar. «Registrados» conserva la idea de enrolamiento/censo y suena natural en español bíblico contemporáneo.
- source_word: הַלֵּוִי
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - de Leví
  - los levitas
  - de la tribu de Leví
  lexicon: HALOT
  rationale: En este contexto genealógico y censal, el singular con artículo funciona como designación tribal. «Levitas» comunica la pertenencia tribal sin forzar un singular personal.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en contexto tribal corresponde mejor a una subdivisión de clan que a la familia nuclear moderna. «Clanes» preserva ese nivel social.
- source_word: מִשְׁפַּחַת הַגֵּרְשֻׁנִּי
  english_pob_choice: the clan of the Gershonites
  chosen_spanish: el clan de los gersonitas
  alternatives_spanish:
  - la familia de los gersonitas
  - el clan de Gersón
  lexicon: HALOT
  rationale: El gentilicio hebreo señala el grupo descendiente; el plural «gersonitas» refleja la familia/clan como colectivo y encaja con el patrón censal.
- source_word: מִשְׁפַּחַת הַקְּהָתִי
  english_pob_choice: the clan of the Kohathites
  chosen_spanish: el clan de los coatitas
  alternatives_spanish:
  - la familia de los coatitas
  - el clan de Cohat
  lexicon: HALOT
  rationale: Se mantiene el mismo criterio gentilicio para evitar inconsistencia terminológica dentro de la lista de linajes levíticos.
- source_word: מִשְׁפַּחַת הַמְּרָרִי
  english_pob_choice: the clan of the Merarites
  chosen_spanish: el clan de los meraritas
  alternatives_spanish:
  - la familia de los meraritas
  - el clan de Merari
  lexicon: HALOT
  rationale: El gentilicio plural en español comunica bien el grupo descendiente de Merari y conserva la estructura enumerativa del hebreo.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: la nota [a] ahora aparece anclada en el texto español en «gersonitas[a]». Se mantuvo la lectura censal de פְקוּדֵי conforme al audit trail inglés y al hebreo, evitando una traducción abstracta.'
  spanish_consistency_notes:
  - Se usó «levitas» en minúscula por tratarse de un gentilicio tribal común en español.
  - Se eligieron «Gersón», «Cohat» y «Merari» para los nombres propios, manteniendo una transliteración breve y reconocible en español.
  - Se preservó la repetición de «el clan de los ...itas» para reflejar la estructura enumerativa del hebreo.
  - No se añadió nota teológica porque el versículo es una lista censal sin decisión doctrinal específica.
