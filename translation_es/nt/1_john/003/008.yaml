translation:
  language: es
  text: 'El que practica el pecado es del diablo[a][b], porque el diablo ha estado pecando desde el principio. Para esto se manifestó[c] el Hijo de Dios: para destruir las obras del diablo[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que hace el pecado» / «quien comete pecado». El participio presente sugiere una práctica continua o característica, más que un acto aislado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «es del diablo». El griego usa literalmente «de/desde» (ἐκ), expresando origen o alineación moral-espiritual.'
    reason: alternative_reading
  - marker: c
    text: 'O: «apareció». El griego enfatiza manifestación o revelación, no solo aparición visual.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «para deshacer las obras del diablo». El verbo literalmente significa «soltar/desatar» y por extensión puede expresar «deshacer» o «destruir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιῶν τὴν ἁμαρτίαν
  english_pob_choice: the one who practices sin
  chosen_spanish: el que practica el pecado
  alternatives_spanish:
  - el que hace pecado
  - quien comete pecado
  lexicon: BDAG
  rationale: El participio presente con objeto directo expresa una acción característica o habitual. «Practica el pecado» comunica mejor esa fuerza durativa que un simple acto puntual, y evita la dureza de «hace pecado».
- source_word: ἐκ τοῦ διαβόλου
  english_pob_choice: is from the devil
  chosen_spanish: es del diablo
  alternatives_spanish:
  - es del diablo en el sentido de origen moral
  - pertenece al diablo
  lexicon: BDAG
  rationale: «De» en español puede expresar origen o pertenencia, por lo que «es del diablo» conserva la metáfora de procedencia/alineación moral sin sugerir derivación ontológica literal.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: En este contexto funciona como designación personal establecida; «el diablo» es la forma idiomática y clara en español.
- source_word: ὅτι ἀπ’ ἀρχῆς
  english_pob_choice: because ... from the beginning
  chosen_spanish: porque ... desde el principio
  alternatives_spanish:
  - pues ... desde el principio
  - ya que ... desde el principio
  lexicon: BDAG
  rationale: «Porque» introduce la razón de la afirmación anterior, y «desde el principio» preserva la dicción joánica sin precisar más de lo que el texto dice.
- source_word: ἁμαρτάνει
  english_pob_choice: has been sinning
  chosen_spanish: peca
  alternatives_spanish:
  - ha estado pecando
  - sigue pecando
  lexicon: BDAG
  rationale: Aunque el inglés audita el matiz durativo con un progresivo perfecto, en español la simple presente «peca» puede transmitir naturalmente hábito o carácter continuo en este contexto, sin sobrecargar la frase.
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: se manifestó
  alternatives_spanish:
  - fue revelado
  - apareció
  lexicon: BDAG
  rationale: «Se manifestó» mantiene la idea de manifestación o puesta de manifiesto, más que una mera aparición visual. En español suena natural y conserva el énfasis joánico en la revelación de identidad y misión.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Es la traducción directa y estable del título cristológico, sin dilución interpretativa.
- source_word: ἵνα λύσῃ
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para deshacer
  - para desatar
  lexicon: BDAG
  rationale: λύω significa literalmente «soltar/desatar», pero con «las obras del diablo» el sentido es de romper, deshacer o destruir. «Destruir» comunica con claridad esa anulación decisiva.
- source_word: τὰ ἔργα τοῦ διαβόλου
  english_pob_choice: the works of the devil
  chosen_spanish: las obras del diablo
  alternatives_spanish:
  - las obras del diablo
  - las acciones del diablo
  lexicon: BDAG
  rationale: «Obras» conserva el plural y la relación posesiva del genitivo. Es suficientemente amplio para abarcar tanto las acciones como sus efectos.
theological_decisions:
- issue: Fuerza del lenguaje sobre el pecado en presente
  english_pob_reading: Habitual/characteristic action is reflected in English ('practices sin'; 'has been sinning')
  chosen_spanish_reading: Acción habitual o característica, no un acto aislado
  alternative_spanish_readings:
  - Una afirmación absoluta sobre cualquier pecado singular
  - Una descripción meramente ocasional
  rationale: En 1 Juan, los presentes verbales suelen señalar un patrón de vida. La traducción mantiene esa tensión teológica para no convertir el versículo en una negación simplista de la realidad del pecado en el creyente.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Sentido de «es del diablo»
  english_pob_reading: Moral-spiritual source/alignment, not ontological generation
  chosen_spanish_reading: Origen o alineación moral-espiritual, no generación ontológica
  alternative_spanish_readings:
  - Pertenencia al diablo en sentido jurídico
  - Paternidad literal del diablo
  rationale: La frase preserva la metáfora de procedencia y pertenencia propia del dualismo joánico, pero no debe sonar como si el diablo engendrara literalmente a las personas.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
- issue: Propósito de la manifestación del Hijo de Dios
  english_pob_reading: The Son of God was revealed in order to destroy/undo the devil's works
  chosen_spanish_reading: El Hijo de Dios se manifestó para destruir las obras del diablo
  alternative_spanish_readings:
  - El Hijo de Dios se manifestó solo para revelar las obras del diablo
  - El Hijo de Dios se manifestó para deshacer las obras del diablo
  rationale: La cláusula con ἵνα es final, y λύσῃ aquí implica una acción decisiva contra las obras del diablo. «Destruir» conserva esa fuerza sin reducirla a mera exposición.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y el dictamen fue de alto acuerdo entre revisiones. La redacción española mantiene la lectura auditada sin introducir nuevas resoluciones doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se conserva «diablo» de manera uniforme para διάβολος.
  - Se usa «pecado» en singular como objeto genérico, coherente con el griego.
  - «Se manifestó» mantiene el lenguaje joánico de manifestación, paralelo al inglés auditado «was revealed».
  - No se introduce «Cristo»; se conserva el título explícito «Hijo de Dios».
