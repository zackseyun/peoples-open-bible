translation:
  language: es
  text: Joab entregó a David el número del censo[a] del pueblo. Todo Israel ascendía a 1.100.000 hombres que sacaban la espada, y Judá a 470.000 hombres que sacaban la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «mil miles y cien mil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר מִפְקַד הָעָם
  english_pob_choice: the number of the census of the people
  chosen_spanish: el número del censo del pueblo
  alternatives_spanish:
  - el número del recuento del pueblo
  - el total del empadronamiento del pueblo
  - el número de los censados del pueblo
  lexicon: HALOT
  rationale: La cadena hebrea combina מִסְפַּר ('número, total') con מִפְקַד ('censo, recuento, empadronamiento'). En español, 'el número del censo del pueblo' conserva ambos elementos sin fundirlos en una sola noción y sigue siendo natural y transparente.
- source_word: וַיְהִי כָל יִשְׂרָאֵל
  english_pob_choice: All Israel was
  chosen_spanish: Todo Israel fue
  alternatives_spanish:
  - Todo Israel llegó a ser
  - Todo Israel resultó ser
  - Todo Israel ascendió a
  lexicon: HALOT
  rationale: El hebreo presenta una construcción resultativa/existencial que introduce el total. 'Todo Israel fue' mantiene la relación con el verbo copulativo implícito y suena natural en español.
- source_word: אֶלֶף אֲלָפִים וּמֵאָה אֶלֶף
  english_pob_choice: 1,100,000
  chosen_spanish: 1.100.000
  alternatives_spanish:
  - un millón cien mil
  - mil miles y cien mil
  lexicon: HALOT
  rationale: La cifra se expresa con numeración arábiga para claridad lectora. La forma española con separador de miles conserva el valor del hebreo literal 'mil de miles y cien mil' sin forzar una paráfrasis.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: HALOT
  rationale: En este contexto militar y censal, אִישׁ funciona de modo distributivo/colectivo. 'Hombres' refleja la población masculina implicada y preserva el matiz militar.
- source_word: שֹׁלֵף חֶרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: que desenvainaban la espada
  alternatives_spanish:
  - que sacaban la espada
  - portadores de espada
  - que blandían la espada
  lexicon: HALOT
  rationale: שֹׁלֵף describe literalmente el acto de sacar/desenvainar. 'Desenvainaban la espada' reproduce la imagen verbal con buen español y evita suavizarla a 'armados'.
- source_word: וִיהוּדָה
  english_pob_choice: and Judah was
  chosen_spanish: y Judá fue
  alternatives_spanish:
  - y Judá resultó ser
  - y Judá ascendió a
  lexicon: HALOT
  rationale: La conjunción introduce un total paralelo al de Israel. En español se completa con el verbo copulativo implícito para sostener la parataxis del hebreo.
- source_word: אַרְבַּע מֵאוֹת וְשִׁבְעִים אֶלֶף
  english_pob_choice: 470,000
  chosen_spanish: '470.000'
  alternatives_spanish:
  - cuatrocientos setenta mil
  lexicon: HALOT
  rationale: La cifra se expresa en formato numérico español para legibilidad, conservando exactamente el valor del hebreo.
theological_decisions:
- issue: Traducción de la fórmula del censo y el recuento militar sin despersonalizar el texto
  english_pob_reading: the number of the census of the people; All Israel was 1,100,000 men drawing the sword, and Judah was 470,000 men drawing the sword
  chosen_spanish_reading: el número del censo del pueblo; Todo Israel fue de 1.100.000 hombres que desenvainaban la espada, y Judá fue de 470.000 hombres que desenvainaban la espada
  alternative_spanish_readings:
  - el total del empadronamiento del pueblo
  - Todo Israel llegó a ser 1.100.000 hombres
  rationale: La versión española mantiene el sentido censal y militar del pasaje sin convertirlo en una descripción abstracta. Se conserva la referencia explícita a hombres aptos para la guerra, como hace el hebreo y como refleja la traducción inglesa.
  doctrine_reference: Uso histórico-literario del censo en 1 Crónicas 21
- issue: Posible ambigüedad numérica entre cifra literal y cifra expresada
  english_pob_reading: Literally, 'a thousand thousands and a hundred thousand.'
  chosen_spanish_reading: 1.100.000
  alternative_spanish_readings:
  - mil miles y cien mil
  - un millón cien mil
  rationale: El inglés documenta la cifra literal. En español se opta por el equivalente numérico legible, sin eliminar la nota de literalidad en la nota al pie.
  doctrine_reference: Precisión textual y equivalencia numérica
- issue: Conservación de la imaginería bélica de 'drawing the sword'
  english_pob_reading: drawing the sword
  chosen_spanish_reading: que desenvainaban la espada
  alternative_spanish_readings:
  - que sacaban la espada
  - que blandían la espada
  rationale: La imagen de desenvainar/sacar la espada conserva el valor léxico del participio hebreo y evita neutralizarlo a un mero 'soldados' o 'armados'.
  doctrine_reference: Fidelidad léxica al verbo participial hebreo
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo base y con la traducción inglesa auditada; no se documentan revisiones aplicadas en el contexto proporcionado. Se preserva la equivalencia numérica y la imaginería militar sin introducir armonizaciones externas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Judá' y 'Israel' como nombres propios tradicionales y transparentes.
  - Se emplea 'hombres' para אִישׁ en contexto militar/censal, en coherencia con el criterio del proyecto.
  - La nota al pie se ancla en la cifra de Israel porque allí el inglés POB documentó explícitamente la literalidad numérica.
