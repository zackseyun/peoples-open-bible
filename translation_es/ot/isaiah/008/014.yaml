translation:
  language: es
  text: Y él será un santuario, y una piedra de tropiezo[a] y una roca de tropiezo para las dos casas de Israel, un lazo y una trampa para el habitante de Jerusalén[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: O «una piedra contra la cual golpear». El hebreo אֶבֶן נֶגֶף se solapa con el lenguaje bíblico posterior sobre la piedra de tropiezo, pero aquí puede distinguirse de la frase siguiente, que habla más explícitamente de tropezar.
    reason: lexical_alternative
  - marker: b
    text: O «para quienes habitan en Jerusalén». El hebreo usa un participio singular con fuerza colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And he will become
  chosen_spanish: Y él será
  alternatives_spanish:
  - Y él llegará a ser
  - Y él se convertirá en
  lexicon: HALOT
  rationale: El hebreo expresa una predicación futura en contexto profético. En español, "será" comunica bien el resultado permanente sin añadir una idea de proceso más fuerte de la que exige el texto. Mantener el sujeto explícito preserva el referente contextual sin sobreinterpretarlo.
- source_word: לְמִקְדָּשׁ
  english_pob_choice: a sanctuary
  chosen_spanish: un santuario
  alternatives_spanish:
  - un lugar santo
  - un lugar sagrado
  lexicon: HALOT
  rationale: '"Santuario" es el equivalente más natural y fiel para מִקְדָּשׁ, conservando el sentido de lugar santo y la posible nota de protección, sin reducirlo solo a "refugio".'
- source_word: אֶבֶן נֶגֶף
  english_pob_choice: a stone of stumbling / a stone to strike against
  chosen_spanish: una piedra de tropiezo
  alternatives_spanish:
  - una piedra para golpear contra ella
  - una piedra de choque
  lexicon: HALOT
  rationale: El par hebreo con la siguiente expresión concentra la imagen de obstáculo. "Piedra de tropiezo" es una equivalencia estable en español bíblico y mantiene la metáfora sin forzar una paráfrasis mecánica.
- source_word: צוּר מִכְשׁוֹל
  english_pob_choice: a rock of offense / a rock to stumble over
  chosen_spanish: una roca de ofensa
  alternatives_spanish:
  - una roca de tropiezo
  - una roca para caer
  lexicon: HALOT
  rationale: Mִכְשׁוֹל apunta a algo que hace tropezar; "roca de ofensa" conserva el paralelismo tradicional del conjunto y la carga de escándalo/obstáculo reconocida en el uso bíblico posterior, sin borrar la tensión con la frase anterior.
- source_word: לִשְׁנֵי בָתֵּי יִשְׂרָאֵל
  english_pob_choice: to both houses of Israel
  chosen_spanish: para las dos casas de Israel
  alternatives_spanish:
  - para ambas casas de Israel
  - para los dos reinos de Israel
  lexicon: HALOT
  rationale: La forma dual/numérica del hebreo se conserva con "las dos casas de Israel". Aunque el referente histórico alude a las entidades divididas de Israel, el texto mismo habla en términos de "casas", y la traducción no debe resolver esa designación por una explicación más interpretativa.
- source_word: לְפַח
  english_pob_choice: a trap
  chosen_spanish: un lazo
  alternatives_spanish:
  - una trampa
  - una red
  lexicon: HALOT
  rationale: '"פַּח" puede referir un lazo o trampa; en español "lazo" mantiene el valor de mecanismo cazador y evita duplicar exactamente el término siguiente con un sinónimo demasiado general.'
- source_word: וּלְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - un anzuelo
  lexicon: HALOT
  rationale: '"מוֹקֵשׁ" comunica la idea de trampa que atrapa/engancha. Para no colapsar las dos imágenes hebreas, se invierte respecto de la palabra anterior y se conserva el paralelismo semántico con dos términos distintos en español.'
- source_word: לְיוֹשֵׁב יְרוּשָׁלִָם
  english_pob_choice: for the inhabitant of Jerusalem
  chosen_spanish: para el habitante de Jerusalén
  alternatives_spanish:
  - para los habitantes de Jerusalén
  - para quien habita en Jerusalén
  lexicon: HALOT
  rationale: El participio singular tiene fuerza colectiva, pero el singular del hebreo se conserva en español para reflejar la forma gramatical. "Habitante" suena natural y mantiene la posibilidad de valor representativo colectivo.
theological_decisions:
- issue: Referente de "él"
  english_pob_reading: The pronoun refers to the LORD, continuing the immediate context of Isaiah 8:13.
  chosen_spanish_reading: '"Él" se entiende como Yahvé, según el contexto inmediato, sin sustituir el pronombre por el nombre divino en el texto.'
  alternative_spanish_readings:
  - '"él" como referencia impersonal al mensaje profético'
  - '"Yahvé" explícito en la traducción'
  rationale: La cercanía con 8:13 favorece identificar al referente con Yahvé. Sin embargo, el hebreo mantiene el pronombre, y la traducción lo conserva para no sobrecargar el versículo con una explicitación que el texto no hace.
  doctrine_reference: Preservar el referente contextual sin resolver el pronombre más allá del hebreo
- issue: Paradoja entre santuario y juicio
  english_pob_reading: Retain both 'sanctuary' and 'stone/rock... trap/snare' in the main text without smoothing the tension.
  chosen_spanish_reading: Se mantiene en español la tensión entre refugio y tropiezo/juicio con términos distintos y coordinados.
  alternative_spanish_readings:
  - suavizar con "refugio" en vez de "santuario"
  - interpretar todo como reacción humana
  rationale: El hebreo yuxtapone protección y juicio respecto del mismo referente. Traducir ambos polos sin atenuarlos conserva la fuerza teológica del pasaje y evita neutralizar su paradoja.
  doctrine_reference: Preservar la tensión teológica del texto
- issue: '"Casa(s) de Israel" frente a explicación histórica'
  english_pob_reading: '"Both houses of Israel"'
  chosen_spanish_reading: '"las dos casas de Israel"'
  alternative_spanish_readings:
  - '"los dos reinos de Israel"'
  - '"ambas casas de Israel"'
  rationale: La lectura histórica de los reinos divididos es plausible, pero el texto habla literalmente de "casas". La traducción conserva esa forma para no sustituir el dato textual por una explicación interpretativa.
  doctrine_reference: No resolver una expresión histórica con una paráfrasis interpretativa
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó una traducción más interpretativa por formulaciones más formales: mantuve la estructura paralela, el doble binomio "piedra de tropiezo / roca de ofensa" y el singular "habitante de Jerusalén". También conservé la tensión entre santuario y juicio sin suavizarla, y reflejé el valor colectivo de "las dos casas de Israel" sin convertirlo en una explicación histórica más explícita.'
  spanish_consistency_notes:
  - Se usa "Yahvé" en el sistema del proyecto cuando el referente divino se explicita en notas o contexto, pero aquí el texto mantiene el pronombre "él" por fidelidad al hebreo y al audit trail inglés.
  - Se mantiene "santuario" como término cultual y protector, coherente con la terminología proyectual.
  - '"Piedra de tropiezo" y "roca de ofensa" reproducen la pareja semántica del texto sin fusionarla ni invertirla.'
  - Se conserva el singular "habitante" por transparencia formal, con nota sobre su fuerza colectiva.
