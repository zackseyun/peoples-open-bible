- from: Y lo degollará sobre el lado norte del altar, delante de Yahvé[a]; y los hijos de Aarón, los sacerdotes, arrojarán su sangre contra el altar, alrededor.
  to: Y lo degollará en el lado norte del altar, delante de Yahvé; y los hijos de Aarón, los sacerdotes, arrojarán[a] su sangre contra el altar por todos sus lados.
  rationale: Se reubica la nota al verbo «arrojarán» para que coincida con la decisión léxica documentada sobre וְזָרְקוּ. Se mejora la naturalidad de la frase locativa con «en el lado norte del altar» y se ajusta «alrededor» a «por todos sus lados» para expresar mejor סָבִיב en español claro y culto, sin alterar el sentido ritual del original.
