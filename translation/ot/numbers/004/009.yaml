id: NUM.4.9
reference: Numbers 4:9
source:
  edition: WLC
  text: וְ/לָקְח֣וּ בֶּ֣גֶד תְּכֵ֗לֶת וְ/כִסּ֞וּ אֶת מְנֹרַ֤ת הַ/מָּאוֹר֙ וְ/אֶת נֵ֣רֹתֶ֔י/הָ וְ/אֶת מַלְקָחֶ֖י/הָ וְ/אֶת מַחְתֹּתֶ֑י/הָ וְ/אֵת֙ כָּל כְּלֵ֣י שַׁמְנָ֔/הּ אֲשֶׁ֥ר יְשָׁרְתוּ לָ֖/הּ בָּ/הֶֽם׀־־־־־־׃
translation:
  text: Then they shall take a blue cloth and cover the lampstand for the light[a], along with its lamps, its tongs, its firepans, and all its oil vessels with which they minister to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cloth of blue' or 'a blue-purple cloth.' The Hebrew תְּכֵלֶת refers to the distinctive dyed fabric used in tabernacle furnishings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד תְּכֵלֶת
  chosen: a blue cloth
  alternatives:
  - a cloth of blue
  - a blue-purple cloth
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for garment/cloth; in this tabernacle context 'cloth' fits better than 'garment.' תְּכֵלֶת denotes the distinctive blue/blue-purple dyed material used in sanctuary textiles. 'Blue' is the most natural English rendering, while the more technical shade nuance is preserved as an alternative.
- source_word: מְנֹרַת הַמָּאוֹר
  chosen: the lampstand for the light
  alternatives:
  - the lampstand of the light
  - the light-giving lampstand
  lexicon: HALOT
  rationale: מְנוֹרָה is 'lampstand.' The genitive phrase הַמָּאוֹר literally means 'the light' or 'the lighting/illumination.' 'For the light' preserves the functional sense without over-paraphrasing; it likely distinguishes the sacred lampstand as the source of tabernacle illumination.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lamps/burners
  lexicon: HALOT
  rationale: נֵר commonly refers to a lamp or lamp-flame. Since the lampstand is already named, 'its lamps' is the clearest idiomatic rendering for the individual lamp units associated with it.
- source_word: מַלְקָחֶיהָ
  chosen: its tongs
  alternatives:
  - its snuffers
  - its wick-tongs
  lexicon: HALOT
  rationale: The term denotes an implement for handling wicks/flames on the lampstand. 'Tongs' is the broad, standard rendering; more specific functional glosses are possible but less certain.
- source_word: מַחְתֹּתֶיהָ
  chosen: its firepans
  alternatives:
  - its trays
  - its censers
  lexicon: HALOT
  rationale: מַחְתָּה often denotes a firepan or censer. In the lampstand context, the implement likely receives ashes or embers from tending the lamps. 'Firepans' is the conventional and contextually suitable rendering; 'censers' would misleadingly suggest incense use.
- source_word: כָּל כְּלֵי שַׁמְנָהּ
  chosen: all its oil vessels
  alternatives:
  - all its utensils for oil
  - all the vessels for its oil
  lexicon: HALOT
  rationale: כְּלִים are vessels/utensils; with שֶׁמֶן plus suffix, the phrase refers to containers or implements associated with the lampstand's oil. 'Oil vessels' is concise and natural.
- source_word: אֲשֶׁר יְשָׁרְתוּ לָהּ בָּהֶם
  chosen: with which they minister to it
  alternatives:
  - with which they serve it
  - with which they attend to it
  lexicon: HALOT
  rationale: שׁרת in cultic contexts often carries the sense 'minister/serve.' The plural verb has an indefinite subject ('they'), referring generally to those who perform the service. 'Minister to it' preserves the sacred-service nuance better than the flatter 'use for it,' while remaining understandable in modern English.
