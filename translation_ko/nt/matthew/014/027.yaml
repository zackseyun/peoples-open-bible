  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀εὐθὺς δὲ ἐλάλησεν ⸂αὐτοῖς ὁ Ἰησοῦς⸃ λέγων· Θαρσεῖτε, ἐγώ εἰμι· μὴ φοβεῖσθε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/014/027.yaml
  text: 'But immediately Jesus spoke to them[a], saying, “Take courage; it is I. Do not be afraid.”'
  footnotes:
  - marker: a
    text: Or more literally, “I am.” The Greek can function as simple self-identification here, though some readers hear a possible echo of the divine self-designation.
    reason: alternative_reading
translation:
  language: ko
  text: '예수님이 즉시 그들에게 말씀하셨습니다. 「안심하여라. 나다. 두려워하지 말라.」'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 14:27 「나다」(ἐγώ εἰμι) — 단순 신원 확인인가, 신적 자칭 환기인가
  chosen_reading: 「안심하여라. 나다. 두려워하지 말라.」
  alternative_readings:
  - 「나다 — 내가 곧 그분이다」 식의 신적 자칭 강조
  rationale: 본문의 ἐγώ εἰμι는 표면적으로는 「나다」(신원 확인)이나, 출 3:14 LXX 및 70인역 이사야 41-48장의 「내가 그니라」를 환기할 수 있는 신학적 무게가 있다. 본문 자체는 신원 확인의 평이한 어법이므로 「나다」로 옮기되, 14:33 「참으로 당신은 하나님의 아들이십니다」의 고백으로 그 신적 무게를 본문 안에서 드러나도록 둔다.
  doctrine_reference: 'DOCTRINE.md: §3 본문이 가진 의미 폭을 한 쪽으로 미리 닫지 않는다'
