source:
  edition: SBLGNT
  text: ὑμεῖς δέ, ἀδελφοί, οὐκ ἐστὲ ἐν σκότει, ἵνα ἡ ἡμέρα ὑμᾶς ὡς ⸀κλέπτης καταλάβῃ,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/004.yaml
  text: But you[a], brothers, are not in darkness[b], so that the day would overtake you like a thief.
  footnotes:
  - marker: a
    text: Or, with inclusive sense, 'brothers and sisters.'
    reason: lexical_alternative
  - marker: b
    text: That is, the day of the Lord in the immediate context.
