translation:
  language: es
  text: Y Abiyam se acostó con sus padres[a], y lo sepultaron en la ciudad de David[b]. Entonces Asa, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se acostó con sus padres», una fórmula usual para referirse a la muerte y sepultura entre los antepasados.'
    reason: cultural_note
  - marker: b
    text: En este versículo el hebreo dice «Abiyam»; en pasajes paralelos o relacionados aparece la variante «Abías».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - murió
  - se durmió
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de muerte y sepultura. En español, «se acostó» conserva la imagen verbal de manera comprensible sin reducirla a «murió» ni introducir la ambigüedad de «se durmió».
- source_word: אֲבִיָּם
  english_pob_choice: Abijam
  chosen_spanish: Abiyam
  alternatives_spanish:
  - Abijam
  - Abías
  lexicon: Nombres propios hebreos
  rationale: La forma consonántica y vocálica del hebreo en este versículo corresponde a una transliteración cercana a «Abiyam». Se preserva la forma del texto fuente en vez de armonizarla con pasajes paralelos donde aparece otra variante del nombre.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula funeraria tradicional. En español, «con sus padres» comunica mejor el parentesco/dinastía y suena más natural que la traducción literal «con sus padres» en sentido de convivencia; aquí se mantiene como fórmula de muerte y sepultura, no como referencia a acompañamiento físico.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: and they buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  - y fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo está en plural activo. «Lo sepultaron» conserva la acción de los agentes sin forzar una pasiva española; además, «sepultar» es un equivalente digno y bíblico para el acto funerario.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: Es el topónimo bíblico establecido y claro en español. No se traduce de forma explicativa ni se altera su forma tradicional de referencia.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: En la fórmula de sucesión, el hebreo marca la toma del trono. «Reinó» es natural en español bíblico y suficiente aquí; aunque «llegó a ser rey» expresa mejor el ingreso al cargo, la secuencia inmediata ya deja claro el cambio dinástico.
- source_word: אָסָא בְנ֖וֹ
  english_pob_choice: Asa his son
  chosen_spanish: Asa, su hijo
  alternatives_spanish:
  - su hijo Asa
  - Asa, el hijo de él
  lexicon: Hebreo bíblico
  rationale: Se conserva el orden hebreo de nombre + relación, pero se adapta a la sintaxis española con coma para fluidez. «Su hijo» mantiene la referencia pronominal al rey anterior sin ambigüedad.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en lugar de él
  lexicon: HALOT
  rationale: En contextos de sucesión real, el hebreo expresa reemplazo en el oficio. «En su lugar» es idiomático en español y conserva la idea de sustitución dinástica.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo la imagen idiomática «lay down with his fathers» y anotó la variante nominal «Abijam/Abijah». La versión española conserva la misma tensión: mantiene la fórmula funeraria sin reducirla a un simple «murió» y preserva la forma hebrea del nombre en el texto principal, con nota sobre la variante en pasajes paralelos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usa «sepultaron» para reflejar el acto funerario sin perder la voz activa plural del hebreo.
  - «En su lugar» conserva la lógica sucesoria de תַּחְתָּיו.
  - El nombre propio se translitera de forma consistente con la lectura hebrea del versículo, sin armonización con paralelos.
