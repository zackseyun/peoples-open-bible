translation:
  language: es
  text: El faraón no los escuchará[a], y yo pondré mi mano sobre Egipto y sacaré a mis huestes[b]—a mi pueblo[c], los hijos de Israel—de la tierra de Egipto con grandes juicios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no les hará caso».
    reason: alternative_reading
  - marker: b
    text: O «mis ejércitos» o «mis fuerzas organizadas». El hebreo puede denotar compañías ordenadas, a menudo con asociación militar.
    reason: lexical_alternative
  - marker: c
    text: 'O «a mi pueblo, los israelitas». Literalmente: «a mi pueblo, los hijos de Israel».'
    reason: lexical_alternative
  - marker: d
    text: O «mediante grandes actos de juicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁמַע אֲלֵכֶם
  english_pob_choice: will not listen to you
  chosen_spanish: no los escuchará a ustedes
  alternatives_spanish:
  - no les hará caso
  - no los oirá
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa escuchar/atender. En español, «escuchará a ustedes» conserva el sentido inmediato de prestar atención y la negativa del faraón a atender el mensaje.
- source_word: וְנָתַתִּי אֶת יָדִי בְּמִצְרָיִם
  english_pob_choice: I will lay my hand on Egypt
  chosen_spanish: pondré mi mano sobre Egipto
  alternatives_spanish:
  - extenderé mi mano contra Egipto
  - pondré mi mano contra Egipto
  lexicon: HALOT
  rationale: La expresión idiomática de intervención judicial divina se comunica de forma natural en español con «poner mi mano sobre». Mantiene la idea de acción decisiva sin añadir un calco innecesario.
- source_word: צִבְאֹתַי
  english_pob_choice: my hosts
  chosen_spanish: mis ejércitos
  alternatives_spanish:
  - mis huestes
  - mis anfitriones
  lexicon: HALOT
  rationale: El término puede referirse a compañías organizadas con matiz militar. Siguiendo la revisión inglesa más reciente, «ejércitos» conserva el plural organizado y el tono de fuerza sin perder la referencia corporativa.
- source_word: עַמִּי בְנֵי יִשְׂרָאֵל
  english_pob_choice: my people, the sons of Israel
  chosen_spanish: a mi pueblo, los hijos de Israel
  alternatives_spanish:
  - a mi pueblo, los israelitas
  - a mi pueblo, los hijos de Israel
  lexicon: HALOT
  rationale: 'Se conserva la estructura appositiva: «mi pueblo» especificado como «los hijos de Israel». «Hijos de Israel» sigue de cerca בְנֵי יִשְׂרָאֵל y mantiene la formulación tradicional del hebreo.'
- source_word: בִּשְׁפָטִים גְּדֹלִים
  english_pob_choice: with great judgments
  chosen_spanish: con grandes juicios
  alternatives_spanish:
  - mediante grandes actos de juicio
  - con poderosos juicios
  lexicon: HALOT
  rationale: שְׁפָטִים aquí denota actos judiciales ejecutados por Dios contra Egipto. «Grandes juicios» es directo, conserva el plural y mantiene la fuerza judicial del pasaje.
theological_decisions:
- issue: Imagen de צִבְאֹתַי aplicada a Israel
  english_pob_reading: my hosts
  chosen_spanish_reading: mis ejércitos
  alternative_spanish_readings:
  - mis huestes
  - mis hostes
  rationale: La imagen comunica a Israel como un cuerpo ordenado bajo la autoridad de Yahvé. «Ejércitos» preserva el matiz corporativo y potencialmente militar sin forzar una lectura exclusivamente bélica.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Mantenimiento de la expresión masculina plural בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva el paralelismo formal del hebreo y la precisión del término masculino plural, sin neutralizar la forma del texto fuente. La alternativa más idiomática queda implícita en el registro bíblico tradicional.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el contexto auditado en inglés, incluyendo la revisión más reciente que prefirió «hosts» para צִבְאֹתַי. Se ha mantenido la estructura hebrea appositiva y la pluralidad de «juicios» sin suavizar la fuerza judicial del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto base del proyecto cuando el nombre divino aparece explícitamente; aquí el verso no lo contiene.
  - Se mantiene «hijos de Israel» para בְנֵי יִשְׂרָאֵל por fidelidad formal y coherencia terminológica.
  - «Con grandes juicios» conserva el plural y la connotación forense/judicial del hebreo.
  - «Mis ejércitos» refleja el matiz colectivo-organizado de צִבְאֹתַי y armoniza con el audit trail inglés más reciente.
