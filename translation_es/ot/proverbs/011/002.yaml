  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la arrogancia trae consigo deshonra/vergüenza, en contraste con la sabiduría asociada a los humildes. Mantiene correctamente el presente gnómico, el paralelismo y la relación asociativa de וְאֶת como «con».'
  spanish_quality_summary: El español es claro y natural, pero «está la sabiduría» suena menos idiomático y algo calcado en español bíblico actual. «Hay sabiduría» conserva el sentido nominal y mejora la fluidez. Además, para קָלוֹן conviene «deshonra» en el texto principal porque preserva mejor el matiz de vergüenza pública/documentada por «disgrace», mientras que «vergüenza» puede sonar más interna o emocional.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Arrogancia», «humildes» y «sabiduría» están bien alineados con las decisiones léxicas auditadas. Se recomienda ajustar קָלוֹן a «deshonra» para acercarse más al valor de «disgrace».
  issues:
  - severity: medium
    issue: «vergüenza» debilita el matiz público de קָלוֹן
    rationale: La evidencia y la auditoría inglesa apuntan a «disgrace», es decir, vergüenza con dimensión de deshonra pública. «Vergüenza» en español puede leerse más como sentimiento interno; «deshonra» conserva mejor el contraste sapiencial.
  - severity: low
    issue: «con los humildes está la sabiduría» suena menos natural en español
    rationale: Aunque es comprensible y cercano al hebreo, «hay sabiduría» o «la sabiduría está con los humildes» fluye mejor. «Hay sabiduría con los humildes» mantiene el proverbio breve y natural sin perder fidelidad.
  revised_spanish_text: Cuando viene la arrogancia[a], viene también la deshonra, pero con los humildes hay sabiduría.
