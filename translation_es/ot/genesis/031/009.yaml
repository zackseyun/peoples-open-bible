translation:
  language: es
  text: Así que Dios tomó el ganado de su padre y me lo dio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo arrebató» o «lo quitó». El verbo hebreo puede expresar tanto quitar o arrebatar de una parte como transferir a otra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּל
  english_pob_choice: took away
  chosen_spanish: tomó ... y me lo dio
  alternatives_spanish:
  - arrebató
  - quitó
  - rescató
  - sacó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar quitar, arrancar o librar de algo. En este contexto el punto no es un rescate de peligro, sino la transferencia de la propiedad de Labán a Jacob. En español, 'tomó ... y me lo dio' conserva esa idea de traslado sin exagerar la violencia ni convertirlo en un término más técnico de rescate.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El sustantivo común aquí designa al agente divino de forma directa. 'Dios' es la equivalencia natural y fiel en español.
- source_word: מִקְנֵה
  english_pob_choice: livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los bienes
  - las reses
  - el rebaño
  lexicon: HALOT
  rationale: En el contexto pastoril de Jacob y Labán, מִקְנֶה se refiere a animales domésticos poseídos como riqueza. 'Ganado' comunica bien el sentido colectivo y económico en español; 'rebaño' sería demasiado estrecho y 'bienes' demasiado general.
- source_word: אֲבִיכֶם
  english_pob_choice: your father's
  chosen_spanish: de tu padre
  alternatives_spanish:
  - de vuestro padre
  - de su padre
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se dirige a Raquel y Lea como grupo, pero en español se puede resolver de manera natural con el singular posesivo porque se trata de un solo padre, Labán. Dado el registro bíblico en español neutral, 'tu padre' mantiene la referencia sin forzar un plural poco natural en este contexto directo de discurso.
- source_word: וַיִּתֶּן לִי
  english_pob_choice: gave it to me
  chosen_spanish: me lo dio
  alternatives_spanish:
  - me lo entregó
  - me lo concedió
  - me lo entregó a mí
  lexicon: HALOT
  rationale: El verbo נתן expresa aquí transferencia de posesión. 'Me lo dio' es la forma más natural y fiel en español para conservar el movimiento de dar a Jacob lo que antes pertenecía a Labán. El pronombre neutro 'lo' sigue la lectura colectiva singular del sustantivo previo.
theological_decisions:
- issue: Agencia divina en la prosperidad de Jacob
  english_pob_reading: The verse states directly that God removed Laban's livestock and gave them to Jacob.
  chosen_spanish_reading: El versículo afirma directamente que Dios quitó el ganado de Labán y se lo dio a Jacob.
  alternative_spanish_readings:
  - Dios bendijo a Jacob con el ganado de Labán
  - Dios permitió que Jacob recibiera el ganado de Labán
  rationale: La frase hebrea atribuye explícitamente la transferencia a la acción de Dios. La traducción mantiene esa agencia fuerte sin suavizarla en una formulación meramente providencial.
  doctrine_reference: Transferencia providencial / agencia divina explícita en la narrativa
- issue: Sentido colectivo singular de 'ganado'
  english_pob_reading: gave it to me
  chosen_spanish_reading: me lo dio
  alternative_spanish_readings:
  - me los dio
  - me las dio
  rationale: El precedente inglés revisado dejó claro que el referente es colectivo singular. En español, 'ganado' funciona naturalmente como colectivo y por eso el pronombre correcto es 'lo'.
  doctrine_reference: Colectivo singular y concordancia pronominal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'them' por 'it' para respetar el sentido colectivo singular de 'livestock'. La redacción española sigue esa misma lógica con 'el ganado' y el pronombre neutro singular 'lo'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y no 'Señor', conforme al hebreo אֱלֹהִים.
  - Se evita 'Cristo' u otro vocabulario ajeno al pasaje.
  - '''Ganado'' conserva el matiz pastoril y económico del sustantivo hebreo sin restringirlo a una especie concreta.'
  - La puntuación y el orden sintáctico buscan una lectura bíblica natural en español sin perder la estructura de transferencia del original.
