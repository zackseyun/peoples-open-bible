  rationale: Se corrige la nota [a] para que refleje una alternativa léxica real y se ancle en la cláusula pertinente. También se ajusta levemente la formulación del predicado con «corazón» para mejorar la legibilidad manteniendo la metáfora y el sentido del hebreo; aunque sigue siendo una construcción algo tensa en español, preserva mejor la estructura fuente que soluciones más libres.
