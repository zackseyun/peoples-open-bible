translation:
  language: es
  text: Porque no eres enviado a un pueblo de habla incomprensible y lengua difícil[a], sino a la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «profundos de labio y pesados de lengua», un modismo hebreo para referirse a un habla difícil de entender.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la explicación del encargo anterior. «Porque» conserva la fuerza causal/explicativa de כִּי en español natural y apropiado para registro profético.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es
  - no eres
  lexicon: HALOT
  rationale: 'La negación recae sobre la cláusula de destino; en español conviene integrarla en la construcción verbal: «no eres enviado».'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Con verbos de envío, el español idiomático usa «a». Mantiene la dirección del envío sin sobrecargar la frase.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: El término designa un colectivo étnico-lingüístico; «pueblo» transmite mejor ese sentido que «nación» en este contexto.
- source_word: עִמְקֵי שָׂפָה
  english_pob_choice: of obscure speech
  chosen_spanish: de habla oscura
  alternatives_spanish:
  - de habla profunda
  - de habla incomprensible
  - de lengua oscura
  lexicon: HALOT
  rationale: El hebreo es un modismo literal «profundos de labio», para hablar difícil de entender. «Habla oscura» comunica inteligibilidad deficiente sin calcar de modo torpe.
- source_word: וְכִבְדֵי לָשׁוֹן
  english_pob_choice: and difficult language
  chosen_spanish: y lengua difícil
  alternatives_spanish:
  - y lengua pesada
  - y lengua complicada
  - y lenguaje difícil
  lexicon: HALOT
  rationale: El paralelismo hebreo «pesados de lengua» expresa idioma difícil de entender. «Lengua difícil» conserva la tensión lexical y el ritmo paralelo con la primera frase.
- source_word: שָׁלוּחַ
  english_pob_choice: are being sent
  chosen_spanish: eres enviado
  alternatives_spanish:
  - estás siendo enviado
  - has sido enviado
  lexicon: HALOT
  rationale: El participio pasivo funciona en un contexto de comisión. En español, «eres enviado» suena más natural y mantiene el valor presente de la acción sin añadir matices no requeridos.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Se preserva la designación profética fija y su carga corporativa/covenantal, tal como en el inglés POB.
theological_decisions:
- issue: Mantenimiento del giro profético «casa de Israel»
  english_pob_reading: the house of Israel
  chosen_spanish_reading: la casa de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - la casa de Israel, es decir, Israel
  rationale: No se sustituye por una paráfrasis más moderna porque el hebreo emplea una fórmula estable de tradición profética con valor corporativo y covenantal. La forma española directa conserva esa resonancia.
  doctrine_reference: Uso canónico de fórmulas proféticas en el AT
- issue: Conservación del modismo hebreo de dificultad lingüística
  english_pob_reading: obscure speech and difficult language
  chosen_spanish_reading: habla oscura y lengua difícil
  alternative_spanish_readings:
  - habla incomprensible y lengua difícil
  - habla extraña y lengua pesada
  rationale: La frase no se reduce a un solo concepto; mantiene dos miembros en paralelo para reflejar el hebreo. «Habla oscura» y «lengua difícil» preservan la tensión entre literalidad e inteligibilidad sin borrar el modismo.
  doctrine_reference: Principios de traducción de modismos semíticos
translation_notes:
  revision_awareness: 'El inglés auditado traduce el modismo hebreo como «obscure speech and difficult language» y lo anota como «deep of lip and heavy of tongue». La versión española sigue esa decisión, pero ajusta la expresión a un paralelismo natural en español: «habla oscura y lengua difícil», conservando el sentido idiomático y la estructura de dos miembros.'
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y profético, evitando calcos demasiado rígidos.
  - «La casa de Israel» se conserva como fórmula estable, sin sustituirla por «el pueblo de Israel».
  - El verbo en pasiva se vierte de forma natural con «eres enviado», sin perder la fuerza presente del encargo.
  - La nota conserva el modismo literal del hebreo para transparentar la imagen subyacente.
