review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: transición discursiva («Y ahora»), partícula deíctica («he aquí»), perfecto ritual («he traído»), reconocimiento de Yahvé como dador, y las dos acciones finales de colocar la ofrenda y postrarse ante Yahvé. Sin embargo, hay dos desajustes importantes con el expediente auditado: (1) el hebreo/POB enfatiza mejor la idea técnica de «primicias» que «primeros frutos», y (2) la nota al pie inglesa está mal mapeada, pero sí preserva una alternativa léxica relevante sobre la expresión de las primicias; conviene trasladar esa alternativa de forma ordenada en español. Además, «te inclinarás» es aceptable, pero «te postrarás» refleja con más fuerza el gesto corporal de השתחוה.'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse para mayor naturalidad bíblica y precisión ritual. «Las primicias de la tierra» suena más idiomático y más reconocible en contexto cultual que «los primeros frutos de la tierra». «Te postrarás» comunica mejor la acción corporal que «te inclinarás» sin caer en la interpretación amplia «adorarás». La puntuación actual es correcta, aunque puede simplificarse levemente sin pérdida.
  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה y «Dios» en «Yahvé tu Dios». No hay conflicto con otras directrices terminológicas del proyecto. La principal mejora léxica es preferir «primicias» para רֵאשִׁית פְּרִי הָאֲדָמָה en este contexto.
  issues:
  - severity: medium
    issue: «los primeros frutos de la tierra» debilita el valor cultual de רֵאשִׁית פְּרִי הָאֲדָמָה
    rationale: Aunque es comprensible, en Deuteronomio 26 el referente es la ofrenda de primicias; «las primicias de la tierra» es más natural en español bíblico moderno y más ajustado al contexto ritual documentado por el POB.
  - severity: medium
    issue: Falta trasladar la alternativa léxica preservada en el expediente inglés sobre la expresión de las primicias
    rationale: La nota inglesa, aunque etiquetada con marcador confuso, conserva una alternativa textual significativa para la frase de las primicias. En español conviene incluir una nota clara anclada en «primicias» para preservar esa trazabilidad léxica.
  - severity: low
    issue: «te inclinarás» es menos específico que el valor corporal de השתחוה
    rationale: El verbo final describe postración/reverencia corporal. «Te postrarás» representa mejor el acto físico sin expandirlo a «adorarás».
  revised_spanish_text: Y ahora, he aquí, he traído las primicias[a] de la tierra que tú me has dado, Yahvé. Y la pondrás delante de Yahvé tu Dios, y te postrarás delante de Yahvé tu Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «los primeros frutos de la tierra» o «lo primero del fruto de la tierra».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para ajustar mejor el lenguaje ritual del hebreo y del POB auditado: «primicias» refleja mejor רֵאשִׁית פְּרִי הָאֲדָמָה que «primeros frutos»; se añade una nota con alternativas léxicas relevantes; y «te postrarás» expresa con mayor precisión el gesto corporal de השתחוה. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente controvertida.'
