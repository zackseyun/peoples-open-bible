lexical_decisions:
- source_word: καὶ οὐ μόνον
  english_pob_choice: And not only that
  chosen_spanish: Y no solo eso
  alternatives_spanish:
  - Y no solo
  - No solo eso
  lexicon: LSJ
  rationale: La frase funciona como continuación enfática de la argumentación previa; en español, «Y no solo eso» reproduce bien el enlace idiomático sin forzar una construcción literal poco natural.
- source_word: ἐπισκοπή
  english_pob_choice: there will be a visitation upon them
  chosen_spanish: habrá una visita sobre ellos
  alternatives_spanish:
  - habrá una visita de parte de Dios sobre ellos
  - habrá una inspección sobre ellos
  - habrá una visita de juicio sobre ellos
  lexicon: LSJ
  rationale: «ἐπισκοπή» puede significar visita, inspección u observación con posible carga judicial. «Visita» conserva el núcleo léxico y permite que el contexto sugiera la dimensión de juicio sin introducir una paráfrasis excesiva.
- source_word: ἀπεχθῶς
  english_pob_choice: with hostility
  chosen_spanish: con hostilidad
  alternatives_spanish:
  - de manera hostil
  - con aversión
  lexicon: LSJ
  rationale: El adverbio describe el modo de recibir; «con hostilidad» es natural en español moderno y mantiene la fuerza negativa del término griego.
- source_word: προσεδέχοντο
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - acogieron
  - dieron recepción a
  lexicon: LSJ
  rationale: El verbo básico es «recibir/aceptar»; aquí, al ir modificado por el adverbio hostil, «recibieron» conserva la ironía del acto sin suavizarlo como podría hacerlo «acogieron».
- source_word: τοὺς ἀλλοτρίους
  english_pob_choice: the strangers
  chosen_spanish: a los extraños
  alternatives_spanish:
  - a los forasteros
  - a los extranjeros
  - a los desconocidos
  lexicon: LSJ
  rationale: El término designa a quienes pertenecen a otro pueblo o ámbito. «Extraños» funciona en español bíblico y conserva la idea de alteridad; además evita el matiz excesivamente moderno o político de «extranjeros» en este contexto.
theological_decisions:
- issue: Valor judicial implícito de ἐπισκοπή
  english_pob_reading: there will be a visitation upon them
  chosen_spanish_reading: habrá una visita sobre ellos
  alternative_spanish_readings:
  - habrá una visita de juicio sobre ellos
  - habrá un castigo sobre ellos
  - Dios los visitará
  rationale: El texto griego no nombra explícitamente el castigo en esta cláusula, aunque el contexto lo sugiere. «Habrá una visita sobre ellos» preserva la ambigüedad lexical y deja que la lectura judicial emerja del contexto, en línea con el audit trail inglés.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La versión inglesa pasó de «inspection of them» a «visitation upon them» para reflejar mejor ἐπισκοπή en un contexto de juicio; también ajustó «foreigners» a «strangers». Esta propuesta española sigue esa revisión, pero elige «visita» para mantener la gama semántica de ἐπισκοπή y «extraños» como equivalente natural y eclesialmente legible de τοὺς ἀλλοτρίους.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - No se usa «Cristo» ni terminología cristológica; el pasaje es de Sabiduría.
  - «Visita» se mantiene sin explicitar «juicio» en el texto principal para no cerrar una ambigüedad que el griego permite.
  - «Extraños» preserva la alteridad humana del grupo referido sin introducir un matiz político ajeno al pasaje.
