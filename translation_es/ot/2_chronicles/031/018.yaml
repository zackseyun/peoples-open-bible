review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: conserva el valor administrativo de וּלְהִתְיַחֵשׂ, la especificidad de טַף como menores, la enumeración de esposas/hijos/hijas, el sentido de אֱמוּנָה como fidelidad confiable, y la idea reflexiva de יִתְקַדְּשׁוּ. Sin embargo, dos puntos requieren ajuste: (1) el inglés auditado ancla una nota a ''little ones'' y otra a la doble expresión de santidad; en español se omitió la nota sobre la repetición de santidad y se desplazó la única nota final a ''santos''; (2) ''como santos'' suena algo estático/categorial en español y refleja menos bien קֹדֶשׁ como ''santidad''/''lo santo'' que una formulación como ''en santidad''.'
  spanish_quality_summary: El español es claro y digno, pero 'registro genealógico' puede mantenerse sin problema y la frase final mejora en naturalidad y fidelidad con 'se consagraron en santidad'. Además, conviene conservar las tres notas del rastro inglés, con marcadores únicos y anclados en el texto correspondiente. 'Pequeños' es comprensible, aunque 'niños pequeños' o 'pequeñitos' serían más explícitos; no es un error.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Fidelidad'' para אֱמוּנָה está bien justificado. La decisión clave a corregir es יִתְקַדְּשׁוּ קֹדֶשׁ: mejor ''se consagraron en santidad'' que ''se consagraron como santos'', para conservar el sustantivo abstracto hebreo y evitar una lectura ontológica innecesaria.'
  issues:
  - severity: medium
    issue: Falta la nota sobre la doble expresión de santidad en יִתְקַדְּשׁוּ קֹדֶשׁ.
    rationale: El POB inglés preserva una nota importante sobre alternativas como 'en santidad' o 'se mantuvieron santos' y sobre el énfasis del verbo + sustantivo. El borrador español solo conserva dos notas y pierde esa justificación documentada.
  - severity: medium
    issue: '''Se consagraron como santos'' no refleja de la forma más natural ni más precisa el hebreo קֹדֶשׁ.'
    rationale: קֹדֶשׁ aquí funciona mejor como 'santidad/lo santo' que como el adjetivo o sustantivo personal 'santos'. En español, 'como santos' suena menos idiomático y puede sugerir estado identitario más que esfera o cualidad de santidad.
  - severity: low
    issue: La distribución de marcadores de notas no sigue plenamente el rastro inglés auditado.
    rationale: La nota a 'pequeños' está bien, pero 'fidelidad' también debe llevar su nota, y la cláusula final sobre consagración/santidad necesita su propio marcador. Esto mejora la trazabilidad editorial.
