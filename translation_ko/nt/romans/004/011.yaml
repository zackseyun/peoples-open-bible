id: ROM.4.11
reference: Romans 4:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ σημεῖον ἔλαβεν περιτομῆς, σφραγῖδα τῆς δικαιοσύνης τῆς πίστεως τῆς ἐν τῇ ἀκροβυστίᾳ, εἰς τὸ εἶναι αὐτὸν πατέρα πάντων τῶν πιστευόντων δι’ ἀκροβυστίας, εἰς τὸ ⸀λογισθῆναι αὐτοῖς τὴν δικαιοσύνην,
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/011.yaml
  text: And he received the sign of circumcision as a seal of the righteousness of the faith that he had while uncircumcised[a], so that he might be the father of all who believe while uncircumcised, so that righteousness might be counted to them also[c][b],
  footnotes:
  - marker: a
    text: Or "justice" for "righteousness" (δικαιοσύνη) here and later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Literally "in uncircumcision"; that is, while he was uncircumcised.
    reason: lexical_alternative
  - marker: c
    text: Or "credited" or "reckoned" to them.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 그는 할례의 표를 받았으니, 그것은 그가 무할례 중에 가졌던 믿음의 의의 인장이었습니다. 이는 그가 무할례 중에 믿는 모든 자의 아버지가 되어, 그들에게도 의가 여겨지게 하시려는 것이며,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_korean: 표
  alternatives_korean:
