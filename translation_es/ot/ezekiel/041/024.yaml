translation:
  language: es
  text: 'Y las puertas tenían dos hojas cada una[a], dos hojas giratorias: dos hojas para la primera puerta y dos hojas para la otra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dos hojas pivotantes' o 'dos hojas plegables'. El término hebreo describe hojas que giran, sin especificar el mecanismo exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּלָתוֹת / דֶּלֶת
  english_pob_choice: doors / door / leaves
  chosen_spanish: puertas / puerta / hojas
  alternatives_spanish:
  - paneles
  - hojas de puerta
  - secciones abatibles
  lexicon: HALOT
  rationale: 'En español, ''puertas'' funciona bien para el conjunto, y ''hojas'' expresa con naturalidad las piezas móviles individuales. ''Puerta'' en singular mantiene el reparto distributivo del hebreo: una puerta y la otra.'
- source_word: מוּסַבּוֹת
  english_pob_choice: turning
  chosen_spanish: giratorias
  alternatives_spanish:
  - pivotantes
  - plegables
  - abatibles
  lexicon: HALOT
  rationale: '''Giratorias'' comunica el rasgo de estar hechas para girar o moverse sobre un eje sin especificar de más el mecanismo. Conserva la tensión lexical del hebreo sin volverla demasiado técnica.'
- source_word: שְׁתַּיִם ... שְׁתַּיִם ... שְׁתַּיִם ... וּשְׁתֵּי
  english_pob_choice: two ... two ... two ... two
  chosen_spanish: dos ... dos ... dos ... dos
  alternatives_spanish:
  - dos ... dos ... dos ... dos
  lexicon: HALOT
  rationale: Se repite explícitamente 'dos' para reproducir el estilo de medición arquitectónica del hebreo y no suavizar la acumulación numérica.
- source_word: לַדְּלָתוֹת
  english_pob_choice: the doors had
  chosen_spanish: las puertas tenían
  alternatives_spanish:
  - para las puertas
  - pertenecían a las puertas
  lexicon: HALOT
  rationale: El prefijo ל se vierte de manera idiomática como posesión o pertenencia implícita. 'Tenían' suena natural en español y conserva la relación entre el todo y sus partes.
- source_word: לְדֶלֶת אֶחָת ... לָאַחֶרֶת
  english_pob_choice: for the one door ... for the other
  chosen_spanish: para una puerta ... para la otra
  alternatives_spanish:
  - para una hoja ... para la otra
  - para un lado ... para el otro
  lexicon: HALOT
  rationale: El singular con 'una' y luego 'la otra' mantiene el sentido distributivo del hebreo. 'Puerta' evita introducir una lectura demasiado técnica de 'hoja' donde el verso parece referirse al lado/elemento correspondiente de cada puerta.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la primera mención relevante de las hojas de las puertas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo numérico del hebreo con cuatro ocurrencias explícitas de 'dos'.
  - '''Puertas'' se reserva para el conjunto; ''hojas'' para las partes móviles, siguiendo la distinción del audit trail inglés.'
  - El español evita 'SEÑOR' u այլ terminología no pertinente, y no introduce lecturas doctrinales ajenas al versículo.
