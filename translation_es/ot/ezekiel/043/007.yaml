translation:
  language: es
  text: 'Y me dijo: «Hijo de hombre, este es el lugar de mi trono y el lugar de las plantas de mis pies, donde habitaré en medio de los hijos de Israel para siempre. Y la casa de Israel ya no contaminará mi santo nombre, ni ellos ni sus reyes, con su prostitución y con los cadáveres de sus reyes sobre sus lugares altos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «y con los cadáveres de sus reyes en su muerte». El vocablo hebreo final se lee tradicionalmente «sus lugares altos», que encaja con el contexto de contaminación cultual, pero algunos lo entienden en relación con «su muerte».'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hijo de hombre
  - ser humano
  lexicon: HALOT
  rationale: Mantiene la fórmula profética característica de Ezequiel y conserva la carga idiomática sin sustituirla por una paráfrasis explicativa.
- source_word: מְקוֹם כִּסְאִי
  english_pob_choice: the place of my throne
  chosen_spanish: el lugar de mi trono
  alternatives_spanish:
  - el lugar de mi asiento real
  - mi trono
  lexicon: HALOT
  rationale: La construcción posesiva se reproduce de manera natural en español, conservando la imagen espacial del trono.
- source_word: מְקוֹם כַּפּוֹת רַגְלַי
  english_pob_choice: the place of the soles of my feet
  chosen_spanish: el lugar de las plantas de mis pies
  alternatives_spanish:
  - el lugar de las suelas de mis pies
  - el lugar de mis pies
  lexicon: HALOT
  rationale: «Plantas de mis pies» expresa con naturalidad el hebreo literal y evita una interpretación como «estrado» o «reposapiés» que no está en el texto.
- source_word: אֲשֶׁר אֶשְׁכָּן שָׁם
  english_pob_choice: where I will dwell
  chosen_spanish: donde habitaré
  alternatives_spanish:
  - donde moraré
  - donde viviré
  lexicon: HALOT
  rationale: «Habitaré» comunica bien la permanencia divina en un registro bíblico natural; la referencia espacial ya queda expresada por «donde».
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the children of Israel
  chosen_spanish: en medio de los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre el pueblo de Israel
  lexicon: HALOT
  rationale: «En medio de» preserva el valor de בְּתוֹךְ con más fuerza que un simple «entre», manteniendo el matiz de presencia central.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia española más natural y fiel para la duración indefinida del hebreo.
- source_word: יְטַמְּאוּ
  english_pob_choice: shall no longer defile
  chosen_spanish: ya no profanará
  alternatives_spanish:
  - ya no contaminará
  - ya no mancillará
  lexicon: HALOT
  rationale: Para el objeto «mi santo nombre», «profanar» comunica mejor el matiz de trato sacrílego o impuro que una simple contaminación física.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  - el nombre de mi santidad
  lexicon: HALOT
  rationale: Conserva la expresión bíblica directa y el valor de pacto del «nombre» divino sin reinterpretarlo.
- source_word: הֵמָּה וּמַלְכֵיהֶם
  english_pob_choice: neither they nor their kings
  chosen_spanish: ni ellos ni sus reyes
  alternatives_spanish:
  - ellos y sus reyes
  - ni el pueblo ni sus reyes
  lexicon: HALOT
  rationale: La correlación negativa española transmite con claridad la coordinación hebrea bajo la negación precedente.
- source_word: בִּזְנוּתָם
  english_pob_choice: by their prostitution
  chosen_spanish: con su prostitución
  alternatives_spanish:
  - con su infidelidad sexual
  - con su fornicación
  lexicon: HALOT
  rationale: «Prostitución» mantiene la fuerza profética del término y su potencial metáfora de infidelidad idolátrica sin suavizarlo en exceso.
- source_word: וּבְפִגְרֵי מַלְכֵיהֶם
  english_pob_choice: and by the corpses of their kings
  chosen_spanish: y con los cadáveres de sus reyes
  alternatives_spanish:
  - y con los cuerpos muertos de sus reyes
  - y con los restos de sus reyes
  lexicon: HALOT
  rationale: «Cadáveres» preserva el sentido impuro del término hebreo פגר y encaja con el contexto de contaminación cultual.
- source_word: בָּמוֹתָם
  english_pob_choice: on their high places
  chosen_spanish: sobre sus lugares altos
  alternatives_spanish:
  - en sus lugares altos
  - sobre sus alturas
  lexicon: HALOT
  rationale: «Lugares altos» es la forma bíblica transparente en español para בָּמוֹת, y «sobre» refleja adecuadamente la preposición del hebreo.
theological_decisions:
- issue: Lectura del cierre sobre la contaminación ritual/cultual
  english_pob_reading: The verse refers to cultic and covenantal defilement through idolatrous prostitution and association with the corpses of their kings at their high places.
  chosen_spanish_reading: El versículo habla de una profanación cultual y de pacto mediante prostitución idolátrica y por los cadáveres de sus reyes sobre sus lugares altos.
  alternative_spanish_readings:
  - mediante los cadáveres de sus reyes en su muerte
  - mediante los cadáveres de sus reyes en sus lugares altos
  rationale: Se mantiene la lectura cultual dominante sin eliminar la ambigüedad final del hebreo. «Sobre sus lugares altos» deja abierta la relación exacta con el término final, acorde con el audit trail inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que favorece «on their high places» como «sobre sus lugares altos» por ser más natural en la preposición y mantiene la lectura cultual sin cerrar la alternativa interpretativa documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo presenta el nombre divino; aquí no aparece.
  - Se conserva «Hijo de hombre» por ser la fórmula vocativa estable de Ezequiel.
  - «Lugares altos» se mantiene como término bíblico técnico para בָּמוֹת, coherente con el registro profético.
  - «Profanar» se eligió para שֵׁם קָדְשִׁי porque el objeto es el nombre santo de Dios, no una impureza física ordinaria.
  - La nota al pie se ancla en el segmento final porque la ambigüedad textual recae en בָּמוֹתָם.
