revisions:
- from: Ellos harán brotar el recuerdo de tu gran bondad[a], y cantarán con gozo de tu justicia[b].
  to: Ellos harán brotar el recuerdo de tu bondad abundante[a], y cantarán con gozo de tu rectitud[b].
  rationale: 'Se revisa para alinear el español con las decisiones lexicales y teológicas ya auditadas en el POB: רַב se refleja mejor con «abundante» que con «gran», y וְצִדְקָתְךָ debe mantener una lectura principal equivalente a «righteousness», aquí «rectitud», con «justicia» como alternativa en nota. También se corrige la nota [a] para que preserve una alternativa real en vez de repetir el texto principal. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal dentro del rastro ya documentado.'
