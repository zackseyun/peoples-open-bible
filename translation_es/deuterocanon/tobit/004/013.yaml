  to: Y ahora, hijo[a], ama a tus hermanos, y no te envanezcas en tu corazón por encima de tus hermanos y de los hijos y las hijas de tu pueblo, para tomar una esposa de entre ellos. Porque en el orgullo hay ruina y mucho desorden, y en la inutilidad[b] hay disminución y gran necesidad; porque la inutilidad es madre del hambre.
