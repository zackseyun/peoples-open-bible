  rationale: 'Se hizo una reparación menor para que el español exprese con más claridad el contenido de la petición indirecta: «y dile que me dé» conecta naturalmente con «habla al rey Salomón» y preserva el sentido del hebreo mejor que «y que me dé» en este contexto. También se pulió la nota para reflejar el literal hebreo de forma más comprensible en español.'
