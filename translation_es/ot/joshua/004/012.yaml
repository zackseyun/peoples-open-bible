translation:
  language: es
  text: Y los hijos de Rubén[a], los hijos de Gad y la media tribu de Manasés cruzaron armados[c] delante de los hijos de Israel[b], tal como Moisés les había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los rubenitas, los gaditas y la media tribu de Manasés'. El hebreo dice más literalmente 'los hijos de Rubén ... los hijos de Gad ...'.
    reason: lexical_alternative
  - marker: b
    text: O 'los israelitas'. El hebreo dice más literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: c
    text: '''Armados'' traduce un término hebreo que puede denotar estar equipados o dispuestos para la batalla; algunos han propuesto un sentido más literal como ''formados en filas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - cruzaron al otro lado
  lexicon: HALOT
  rationale: El contexto narra el paso del Jordán; en español, 'cruzaron' comunica el movimiento de atravesar con naturalidad. 'Cruzaron al otro lado' sería más explícito, pero añade palabras no requeridas por el hebreo.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  lexicon: HALOT
  rationale: Se conserva la construcción literal de parentesco del hebreo ('hijos de') para mantener transparencia. 'Rubenitas' es idiomático, pero menos visible respecto al texto fuente.
- source_word: וּבְנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  lexicon: HALOT
  rationale: Se mantiene la misma solución que en la frase paralela anterior para uniformidad y fidelidad formal.
- source_word: וַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' refleja la expresión estable en español bíblico y conserva la estructura del hebreo. ''Mitad de la tribu'' es posible, pero menos idiomática.'
- source_word: חֲמֻשִׁים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados para la guerra
  - en orden de combate
  - en formación
  lexicon: HALOT
  rationale: El término hebreo puede sugerir preparación o disposición para la guerra; el contexto inmediato favorece 'armados' como traducción breve y clara. Otras opciones explicitan más la idea de preparación, pero pesan más de lo que el texto exige.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - frente a
  lexicon: HALOT
  rationale: '''Ante'' reproduce bien la relación espacial de ir delante de los demás en un registro digno y natural en español bíblico.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, siguiendo la preferencia de transparencia del registro POB. 'Israelitas' sería más idiomático, pero menos cercano a la formulación fuente.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: '''Tal como'' expresa conformidad con claridad y sin ampliar el sentido. ''Como'' puede sonar demasiado general en español.'
- source_word: דִּבֶּר אֲלֵיהֶם מֹשֶׁה
  english_pob_choice: Moses had spoken to them
  chosen_spanish: Moisés les había dicho
  alternatives_spanish:
  - Moisés les había hablado
  - Moisés les había hablado a ellos
  lexicon: HALOT
  rationale: En español, 'les había dicho' transmite mejor la instrucción previa implícita en el contexto narrativo. 'Había hablado' es más literal respecto a דבר, pero aquí resulta menos natural sin aportar ventaja decisiva.
translation_notes:
  revision_awareness: El inglés auditado eliminó la coma después de 'crossed over' para que 'armed' modifique con más naturalidad la manera del cruce. En español se reflejó esa decisión sin coma tras 'cruzaron', de modo que 'armados' se lea como modificador del verbo principal, no como inciso.
  spanish_consistency_notes:
  - Se mantuvo la fórmula 'hijos de' para las tribus y para Israel, en coherencia con la transparencia del hebreo.
  - Se eligió 'armados' como equivalente conciso de חֲמֻשִׁים, sin forzar el sentido etimológico más especulativo.
  - No se añadió puntuación que separe indebidamente 'cruzaron' de 'armados', para preservar la relación de modo indicada por la revisión inglesa.
