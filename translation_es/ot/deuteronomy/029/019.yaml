translation:
  language: es
  text: Yahvé no querrá perdonarlo, porque entonces la ira de Yahvé y sus celos arderán contra aquel hombre, y toda maldición[a] escrita en este libro recaerá sobre él, y Yahvé borrará su nombre de debajo de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda maldición jurada'; el término hebreo puede denotar una maldición invocada en contexto de juramento de pacto, no solo una maldición en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאבֶה
  english_pob_choice: will not be willing
  chosen_spanish: no querrá
  alternatives_spanish:
  - no estará dispuesto a
  - no consentirá a
  lexicon: HALOT
  rationale: אבה expresa voluntad o disposición, no simple capacidad. En español, 'no querrá' conserva esa fuerza volitiva de manera natural antes del infinitivo 'perdonarlo'.
- source_word: סְלֹחַ לוֹ
  english_pob_choice: to forgive him
  chosen_spanish: perdonarlo
  alternatives_spanish:
  - absolverlo
  - concederle perdón
  lexicon: HALOT
  rationale: סלח en contextos de pacto significa perdonar. 'Perdonarlo' es claro y fiel en español contemporáneo.
- source_word: יֶעְשַׁן אַף יְהוָה
  english_pob_choice: the anger of Yahweh ... will burn
  chosen_spanish: la ira de Yahvé ... arderán
  alternatives_spanish:
  - la ira de Yahvé ... humearán
  - la ira de Yahvé ... se encenderán
  lexicon: HALOT
  rationale: El hebreo usa una imagen vívida de ira que se enciende. 'Arderán' preserva la metáfora; aunque 'ira' es singular en español, el verbo en plural sigue la coordinación con 'su celo' y refleja el paralelismo del original.
- source_word: קִנְאָתוֹ
  english_pob_choice: his jealousy
  chosen_spanish: su celo
  alternatives_spanish:
  - su celosía
  - su celos
  lexicon: HALOT
  rationale: En lenguaje de juicio pactual, קנאה puede referir tanto celos como celo ardiente. 'Celo' evita una carga emocional negativa innecesaria en español y mantiene la idea de ardor pactual. La tensión entre 'celo' y 'celos' queda reconocida por el contexto.
- source_word: בָּאִישׁ הַהוּא
  english_pob_choice: against that man
  chosen_spanish: contra aquel hombre
  alternatives_spanish:
  - sobre aquel hombre
  - en aquel hombre
  lexicon: HALOT
  rationale: La preposición ב con verbos de hostilidad se vuelve idiomáticamente 'contra' en español. 'Aquel hombre' conserva la referencia masculina singular del hebreo.
- source_word: וְרָבְצָה בוֹ
  english_pob_choice: will settle on him
  chosen_spanish: recaerá sobre él
  alternatives_spanish:
  - se posará sobre él
  - reposará sobre él
  lexicon: HALOT
  rationale: רבץ literalmente es 'echarse/descansar', pero aplicado a maldición comunica permanencia y carga. 'Recaerá sobre él' expresa bien la idea de una maldición que se posa y permanece.
- source_word: כָּל הָאָלָה
  english_pob_choice: every curse
  chosen_spanish: toda la maldición
  alternatives_spanish:
  - toda maldición
  - cada maldición
  lexicon: HALOT
  rationale: El singular colectivo de אָלָה se puede expresar en español con 'toda la maldición' para conservar la fuerza totalizante sin perder naturalidad. La nota preserva la alternativa 'curse' / 'oath-curse' del audit trail.
- source_word: הַכְּתוּבָה בַּסֵּפֶר הַזֶּה
  english_pob_choice: written in this book
  chosen_spanish: escrita en este libro
  alternatives_spanish:
  - registrada en este libro
  - escrita en este rollo
  lexicon: HALOT
  rationale: סֵפֶר puede ser 'libro' o 'rollo'. 'Libro' es idiomático en español y mantiene la referencia deuteronómica sin necesidad de tecnicismo.
- source_word: וּמָחָה ... אֶת שְׁמוֹ
  english_pob_choice: will blot out his name
  chosen_spanish: borrará su nombre
  alternatives_spanish:
  - borrará su recuerdo
  - aniquilará su nombre
  lexicon: HALOT
  rationale: מחה con 'nombre' es un modismo de borrar memoria o posteridad. 'Borrará su nombre' conserva el idiomático bíblico en español; 'borrará' suena más natural que 'borrará de un plumazo' y mantiene la imagen de eliminar.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo de los cielos
  alternatives_spanish:
  - de debajo del cielo
  - de la tierra
  lexicon: HALOT
  rationale: La expresión fija hebrea se conserva de modo bastante literal para retener su alcance totalizante. 'Cielos' refleja el plural hebreo y evita aplanar la fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal como 'Yahvé', siguiendo el criterio del proyecto y evitando la sustitución por un título. Es la forma más reconocible y apta para español bíblico contemporáneo.
theological_decisions:
- issue: Metáfora del enojo divino
  english_pob_reading: Retain the image that Yahweh's anger and jealousy 'will burn' rather than flattening it to generic wrath.
  chosen_spanish_reading: Conservar que la ira y el celo de Yahvé 'arderán' contra aquel hombre.
  alternative_spanish_readings:
  - se encenderán contra aquel hombre
  - se desatarán contra aquel hombre
  rationale: El hebreo usa una metáfora corporal/ardiente para expresar juicio pactual. Mantener 'arderán' preserva la intensidad sin explicarlo en exceso ni convertirlo en una abstracción.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia masculina singular
  english_pob_reading: Render הָאִישׁ הַהוּא as 'that man.'
  chosen_spanish_reading: Renderizarlo como 'aquel hombre'.
  alternative_spanish_readings:
  - esa persona
  - aquel individuo
  rationale: El hebreo es masculino singular y se refiere al transgresor individual del pacto. Se conserva esa precisión en vez de neutralizarla.
  doctrine_reference: Translation philosophy §4
- issue: Covenant curse terminology
  english_pob_reading: Use 'every curse' in the main text, with oath-curse nuance preserved in a footnote.
  chosen_spanish_reading: Usar 'toda la maldición' en el texto principal, con la matización de 'maldición jurada' o 'maldición de pacto' preservada en nota.
  alternative_spanish_readings:
  - toda la maldición jurada
  - cada maldición
  rationale: En español, el singular colectivo suena más natural aquí y conserva el alcance total. La nota mantiene la tensión lexical de אָלָה en el contexto de pacto y juramento.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El Tetragrámaton se translitera como nombre propio, no se sustituye por título. Esto preserva la identidad personal del Dios del pacto y sigue la terminología del proyecto.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y refleja el audit trail inglés: mantiene el valor volitivo de אבה, conserva la metáfora ardiente del enojo divino, traduce קנאה con ''celo'' para evitar una carga psicológica no obligada, y preserva la fórmula totalizante de la maldición escrita en este libro. La forma final también toma en cuenta la revisión inglesa que prefirió ''burn'' sobre ''smoke'' por naturalidad, sin perder la imagen hebrea subyacente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el texto.
  - Se usa 'perdonarlo' para סלח y no 'absolverlo' ni 'pardonarlo'.
  - '''Celo'' se emplea para קנאה en este contexto de juicio pactual.'
  - '''Maldición'' conserva la posibilidad de lectura jurídica/covenantal indicada por el audit trail.'
  - '''Debajo de los cielos'' preserva la fórmula hebrea sin sustituirla por un equivalente interpretativo.'
