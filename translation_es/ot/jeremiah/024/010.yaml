revisions:
- from: Y enviaré contra ellos la espada[a], el hambre y la peste, hasta que sean consumidos de la tierra que di a ellos y a sus padres.
  to: Y enviaré contra ellos la espada[a], la hambruna y la peste, hasta que sean consumidos de la tierra que les di a ellos y a sus padres.
  rationale: Se ajusta רָעָב a «la hambruna» para reflejar mejor la tríada profética de juicio y la elección del inglés POB «the famine». También se mejora la naturalidad del español con «les di a ellos y a sus padres», manteniendo la fuerza del dativo hebreo y la mención específica de «padres». No se requiere adjudicación adicional porque son correcciones claras de precisión léxica y estilo.
