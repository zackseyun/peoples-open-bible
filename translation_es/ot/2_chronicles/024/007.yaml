base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/007.yaml
  text: For Athaliah[a], that wicked woman, and her sons had broken into the house of God and had also made all the holy things of the house of Yahweh for the Baals.
  footnotes:
  - marker: a
    text: Or 'had made all the holy things of the house of the LORD for the Baals.' The Hebrew verb can be rendered more literally as 'made,' but in context it likely means they appropriated or used the temple's sacred objects for Baal worship.
