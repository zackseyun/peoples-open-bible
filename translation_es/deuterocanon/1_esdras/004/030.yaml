revisions:
- from: y tomando la corona de la cabeza del rey y poniéndola sobre sí[a]; y lo golpeó con la mano izquierda.
  to: y tomando la corona de la cabeza del rey y poniéndosela; y golpeó al rey con la mano izquierda.[a]
  rationale: Se reemplaza «poniéndola sobre sí» por «poniéndosela», que expresa de manera natural en español el sentido reflexivo de αὐτῇ. Se explicita «al rey» en la segunda cláusula para reflejar mejor el griego. Se traslada la nota al verbo «golpeó» para preservar la alternativa léxica documentada por el inglés POB («slapped» / «abofeteó»), que es la nota realmente respaldada por la auditoría.
