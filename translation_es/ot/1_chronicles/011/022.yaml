translation:
  language: es
  text: Benaías, hijo de Joiadá, hijo de un hombre valiente, hombre de muchas hazañas, de Cabzeel, abatió[a] a los dos héroes de Moab. También descendió y abatió al león en medio del foso, en un día de nieve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֲרִיאֵל מוֹאָב es incierto. Puede entenderse como «los dos hijos de Ariel de Moab», «los dos Arieles de Moab» o «los dos héroes con aspecto de león de Moab».
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ חַיִל
  english_pob_choice: a mighty man
  chosen_spanish: un hombre valiente
  alternatives_spanish:
  - un hombre poderoso
  - un hombre de valor
  - un guerrero valiente
  lexicon: HALOT
  rationale: La expresión señala fuerza, valor y capacidad probada en contexto guerrero. En español, «un hombre valiente» comunica bien esa excelencia militar sin sonar forzado; «valiente» mantiene la cualidad personal que el hebreo resalta.
- source_word: רַב פְּעָלִים
  english_pob_choice: a man of many deeds
  chosen_spanish: hombre de muchas hazañas
  alternatives_spanish:
  - hombre de muchos hechos
  - hombre de grandes proezas
  - hombre de muchas obras
  lexicon: HALOT
  rationale: El hebreo alude literalmente a muchas acciones o hechos. «Hazañas» conserva el valor heroico y narrativo de los logros sin perder naturalidad en español.
- source_word: מִן קַבְצְאֵל
  english_pob_choice: from Kabzeel
  chosen_spanish: de Cabseel
  alternatives_spanish:
  - de Kabzeel
  - procedente de Cabseel
  lexicon: HALOT
  rationale: La preposición מִן indica origen; en español, «de» es la equivalencia más directa. Se translitera el topónimo como «Cabseel» para una forma hispana legible.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - golpeó
  - abatió
  lexicon: HALOT
  rationale: En español, «herir» puede abarcar el golpe decisivo en un relato de combate sin afirmar más de lo necesario. Mantiene la fuerza del verbo hebreo sin sobretraducirlo como «mató» cuando el texto solo dice que golpeó/derribó.
- source_word: שְׁנֵי אֲרִיאֵל מוֹאָב
  english_pob_choice: the two heroes of Moab
  chosen_spanish: a los dos héroes de Moab
  alternatives_spanish:
  - a los dos Arieles de Moab
  - a los dos hijos de Ariel de Moab
  - a los dos héroes llamados Ariel de Moab
  lexicon: HALOT
  rationale: 'El hebreo es ambiguo: אֲרִיאֵל puede leerse como nombre propio, como plural de valor descriptivo o como referencia a figuras leoninas. La revisión inglesa favorece el sentido de «héroes», y el español sigue ese juicio para evitar una literalidad oscura.'
- source_word: יָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se fue abajo
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia abajo; en el contexto del pozo, «descendió» es natural y preciso en español.
- source_word: הָאֲרִי
  english_pob_choice: the lion
  chosen_spanish: al león
  alternatives_spanish:
  - al león salvaje
  - al león
  lexicon: HALOT
  rationale: El sustantivo designa simplemente al león. Se conserva el artículo definido y la forma con objeto directo personal en español por claridad narrativa.
- source_word: בְּתוֹךְ הַבּוֹר
  english_pob_choice: in the midst of a pit
  chosen_spanish: en medio del foso
  alternatives_spanish:
  - dentro del foso
  - en el interior del pozo
  - en medio del pozo
  lexicon: HALOT
  rationale: «En medio de» preserva la imagen local del hebreo y se entiende naturalmente en español. «Foso» capta mejor el lugar de la acción que «pozo» en este contexto narrativo.
- source_word: בְּיוֹם הַשָּׁלֶג
  english_pob_choice: on a snowy day
  chosen_spanish: en día de nieve
  alternatives_spanish:
  - en un día de nieve
  - un día nevado
  - cuando había nieve
  lexicon: HALOT
  rationale: La frase literal se conserva con una sintaxis española sobria. «Día de nieve» mantiene el dato situacional sin añadir interpretación.
theological_decisions:
- issue: Ambigüedad de אֲרִיאֵל מוֹאָב
  english_pob_reading: the two heroes of Moab
  chosen_spanish_reading: los dos héroes de Moab
  alternative_spanish_readings:
  - los dos Arieles de Moab
  - los dos hijos de Ariel de Moab
  rationale: 'No se oculta la tensión textual: el hebreo admite varias lecturas. La revisión inglesa adopta la interpretación más probable en contexto; el español la sigue, manteniendo en notas la posibilidad de otras lecturas sin dogmatizar sobre el término.'
  doctrine_reference: Principio de transparencia textual y cautela exegética
translation_notes:
  revision_awareness: La versión inglesa revisada abandonó «the two sons of Ariel of Moab» a favor de «the two heroes of Moab» para reflejar mejor el sentido probable de אֲרִיאֵל y evitar una literalidad oscura. Esta propuesta española sigue esa revisión y conserva la incertidumbre textual en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la convención del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se translitera el nombre propio como «Benaía» y «Joiadá» para una forma española consistente y legible.
  - «Hirió» se mantiene para reflejar el verbo hebreo de golpe/abatimiento sin imponer necesariamente el resultado final.
  - «Foso» se eligió frente a «pozo» para conservar el matiz de un hoyo/trampa narrativo en el episodio.
  - La estructura del versículo se conserva con dos acciones principales unidas por «También», en línea con el hebreo y la tradición POB de claridad auditiva.
