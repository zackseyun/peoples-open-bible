translation:
  language: es
  text: ¿Volveremos a quebrantar tus mandamientos y a emparentarnos con los pueblos de estas abominaciones?[a] ¿No te airarías contra nosotros hasta consumirnos, sin que quedara remanente ni superviviente?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los pueblos que practican estas abominaciones». El hebreo dice más literalmente «con los pueblos de estas abominaciones» y probablemente se refiere a pueblos caracterizados por tales prácticas abominables.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin dejar remanente ni superviviente»; o «sin que quedara remanente ni escapado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנָשׁוּב
  english_pob_choice: Shall we again
  chosen_spanish: ¿Volveremos otra vez
  alternatives_spanish:
  - ¿Volveremos
  - ¿Regresaremos otra vez
  - ¿Volveremos a
  lexicon: HALOT
  rationale: שוב expresa volver o regresar; en este contexto retórico el sentido es reanudar una desobediencia ya conocida. «Volveremos otra vez» conserva ese valor iterativo de manera natural en español.
- source_word: לְהָפֵר
  english_pob_choice: break
  chosen_spanish: quebrantar
  alternatives_spanish:
  - violar
  - romper
  - infringir
  lexicon: HALOT
  rationale: פרר en contexto legal/covenantal es quebrantar o violar. «Quebrantar» mantiene el peso normativo del mandamiento sin sonar excesivamente técnico.
- source_word: מִצְוֺתֶיךָ
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus mandatos
  - tus órdenes
  lexicon: HALOT
  rationale: מִצְוָה se traduce bien como «mandamiento» en español bíblico y moderno. El sufijo de segunda persona singular se conserva con «tus».
- source_word: וּלְהִתְחַתֵּן
  english_pob_choice: and intermarry
  chosen_spanish: y a emparentarnos
  alternatives_spanish:
  - y a contraer matrimonio con
  - y a casarnos con
  - y a contraer alianzas matrimoniales con
  lexicon: HALOT
  rationale: El hitpael de חתן señala entrar en relaciones matrimoniales con otro grupo. «Emparentarnos» comunica el sentido grupal de entrar en parentesco por matrimonio; en contexto español puede sonar más amplio que «casarnos», que sería más individual.
- source_word: בְּעַמֵּי הַתֹּעֵבוֹת הָאֵלֶּה
  english_pob_choice: with the peoples of these abominations
  chosen_spanish: con los pueblos de estas abominaciones
  alternatives_spanish:
  - con los pueblos que practican estas abominaciones
  - con los pueblos abominables
  - con estos pueblos de abominaciones
  lexicon: HALOT
  rationale: 'La construcción hebrea es compacta: «pueblos de estas abominaciones». La versión española sigue de cerca esa relación genitiva sin añadir una expansión interpretativa innecesaria.'
- source_word: הֲלוֹא תֶאֱנַף בָּנוּ
  english_pob_choice: Would you not be angry with us
  chosen_spanish: ¿No te airarías contra nosotros
  alternatives_spanish:
  - ¿No te enojarías con nosotros
  - ¿No te enfurecerías contra nosotros
  lexicon: HALOT
  rationale: אנף denota airarse/mostrar ira. «Aira­rías» conserva un tono bíblico digno y la preposición «contra» refleja bien la dirección del enojo.
- source_word: עַד כַּלֵּה
  english_pob_choice: until you had consumed us
  chosen_spanish: hasta consumirnos
  alternatives_spanish:
  - hasta acabar con nosotros
  - hasta destruirnos completamente
  - hasta aniquilarnos
  lexicon: HALOT
  rationale: כלה expresa terminar, consumir o destruir por completo. «Hasta consumirnos» sigue de cerca la imagen verbal y funciona bien con el infinitivo en español.
- source_word: לְאֵין
  english_pob_choice: leaving no
  chosen_spanish: sin que quedara
  alternatives_spanish:
  - dejando sin
  - para que no quedara
  - de modo que no quedara
  lexicon: HALOT
  rationale: לְאֵין introduce el resultado de la destrucción total. «Sin que quedara» expresa con claridad el efecto resultante.
- source_word: שְׁאֵרִית
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - restante
  - residuo
  lexicon: HALOT
  rationale: שְׁאֵרִית es un término bíblico importante para lo que queda tras el juicio. «Remanente» preserva ese valor técnico y es reconocible en español bíblico.
- source_word: וּפְלֵיטָה
  english_pob_choice: or survivor
  chosen_spanish: ni superviviente
  alternatives_spanish:
  - ni escapado
  - ni rescatado
  - ni sobreviviente
  lexicon: HALOT
  rationale: פליטה puede referirse a escape o a quien escapa/sobrevive. En paralelo con «remanente», «superviviente» comunica con naturalidad que no quedaría nadie con vida.
theological_decisions:
- issue: Descripción de los pueblos en relación con «abominaciones»
  english_pob_reading: Render the phrase as referring to peoples identified by abominable practices, not as an essentialized ethnic slur.
  chosen_spanish_reading: «los pueblos de estas abominaciones» describe a los pueblos por sus prácticas abominables, no como una descalificación étnica esencializada.
  alternative_spanish_readings:
  - los pueblos que practican estas abominaciones
  - estos pueblos abominables
  rationale: La construcción hebrea es breve y puede sonar dura. Mantenerla sin expansión preserva el texto, mientras que el genitivo en español evita convertirla en un insulto ontológico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Conservación del lenguaje de «remanente»
  english_pob_reading: Keep 'remnant' in the main text.
  chosen_spanish_reading: Conservar «remanente» en la línea principal.
  alternative_spanish_readings:
  - supervivientes
  - los que quedaran
  rationale: «Remanente» mantiene la resonancia bíblica y teológica del término, especialmente en contextos de juicio y preservación.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo de forma cercana y también refleja la revisión del POB inglés que prefirió la construcción literal «the peoples of these abominations» frente a una expansión interpretativa. Se mantuvo la tensión entre «remanente» y la imagen total de destrucción, con una nota alternativa para la segunda expresión paralela.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto no requería el nombre divino aquí; este versículo se dirige directamente a Dios mediante «tus» y «te».
  - Se mantuvo un registro bíblico sobrio, pero con sintaxis natural en español moderno.
  - Se preservó la paralelía entre la pregunta retórica inicial y la consecuencia judicial final.
  - Se evitó traducir mecánicamente «intermarry» con un calco poco natural; «emparentarnos» conserva el valor grupal del hebreo.
