    rationale: El EN POB (vía doctrine-realignment) preservó «who also stripped him» para reflejar οἳ καὶ ἐκδύσαντες. La versión española debe espejarlo con «quienes también lo despojaron».
  revised_spanish_text: 'Jesús respondió: «Cierto hombre iba descendiendo de Jerusalén a Jericó, y cayó entre ladrones, quienes también lo despojaron, lo golpearon y se fueron, dejándolo medio muerto».'
