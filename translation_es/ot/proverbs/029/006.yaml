translation:
  language: es
  text: En la transgresión[a] del hombre malvado hay una trampa, pero el justo canta de gozo y se alegra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la transgresión del hombre malvado hay una trampa». El hebreo puede entenderse como que la trampa está contenida en su transgresión, o como que su transgresión la ocasiona.'
    reason: alternative_reading
  - marker: b
    text: 'O: «grita de gozo y está alegre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶשַׁע
  english_pob_choice: In the transgression
  chosen_spanish: En la transgresión
  alternatives_spanish:
  - Por la transgresión
  - A causa de la transgresión
  lexicon: HALOT
  rationale: La preposición ב con פשע admite un matiz locativo o instrumental. «En la transgresión» conserva la concisión hebrea y mantiene abierta la lectura de que la trampa está dentro de la propia culpa o que la culpa la produce.
- source_word: אִישׁ רָע
  english_pob_choice: an evil man
  chosen_spanish: el hombre malvado
  alternatives_spanish:
  - un hombre malo
  - un hombre impío
  lexicon: HALOT
  rationale: Se preserva el masculino singular y el contraste moral del proverbio. «Malvado» comunica con fuerza ética más natural que «malo» en español bíblico contemporáneo.
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: HALOT
  rationale: «Trampa» expresa de manera clara la imagen sapiencial de captura o enredo. Aunque «lazo» es posible, puede sonar más arcaico o demasiado técnico en español moderno.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - la persona justa
  lexicon: HALOT
  rationale: Como sustantivo adjetival, se traduce con el término establecido «el justo», que mantiene la oposición proverbial con el malvado.
- source_word: יָרוּן
  english_pob_choice: sings for joy
  chosen_spanish: canta de gozo
  alternatives_spanish:
  - grita de gozo
  - da gritos de alegría
  lexicon: HALOT
  rationale: El verbo puede implicar un clamor jubiloso. «Canta de gozo» reproduce el matiz vocal y celebrativo sin forzar un coloquialismo excesivo.
- source_word: וְשָׂמֵחַ
  english_pob_choice: and rejoices
  chosen_spanish: y se alegra
  alternatives_spanish:
  - y está contento
  - y se regocija
  lexicon: HALOT
  rationale: El participio añade una segunda expresión de alegría. «Se alegra» es natural y conserva el paralelismo con «canta de gozo».
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, especialmente la elección de un verbo de gozo más natural para יָרוּן y el mantenimiento de la doble expresión de alegría con וְשָׂמֵחַ. Se conserva además la ambigüedad interpretativa señalada en la nota alternativa sobre בְּפֶשַׁע.
  spanish_consistency_notes:
  - Se mantiene «el justo» para צַדִּיק en línea con la terminología sapiencial habitual y con el contraste antitético del proverbio.
  - «Transgresión» se usa de forma consistente para פשע, sin sustituirlo por una paráfrasis moral más amplia.
  - La pareja verbal «canta de gozo y se alegra» respeta el paralelismo intensivo del hebreo.
  - La nota a conserva la tensión semántica del sintagma preposicional sin resolverla artificialmente.
