translation:
  language: es
  text: Y cada hombre hirió a su hombre[a], y Aram huyó, e Israel los persiguió. Pero Ben-hadad, rey de Aram, escapó sobre un caballo con jinetes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cada hombre hirió a su hombre», es decir, cada uno hirió al hombre que tenía enfrente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «escapó sobre un caballo y con jinetes»; el hebreo también puede describir a Ben-hadad huyendo montado y acompañado de jinetes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - hirió de muerte
  lexicon: HALOT
  rationale: En contexto militar, נכה expresa un golpe violento que deja al enemigo derrotado. «Hirió» conserva la fuerza del acto sin afirmar más de lo que el hebreo exige; «derribó» y «hirió de muerte» serían más interpretativos.
- source_word: אִישׁ אִישׁוֹ
  english_pob_choice: each man ... his man
  chosen_spanish: cada hombre ... a su hombre
  alternatives_spanish:
  - cada uno ... a su adversario
  - cada hombre ... a su contraparte
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «un hombre su hombre», un giro de combate que señala al oponente enfrente de cada uno. En español se mantiene la textura repetitiva con «cada hombre... a su hombre», aunque la relación de oposición queda dada por el contexto.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Aram» para reflejar el hebreo y evitar el desplazamiento histórico de «Siria». En este versículo funciona como sujeto colectivo que huye.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - se retiró
  - escapó
  lexicon: HALOT
  rationale: El verbo describe una huida militar directa. «Huyó» es natural en español y conserva el sentido de fuga; el plural hebreo se entiende colectivamente con Aram como entidad.
- source_word: וַיִּרְדְּפֵם
  english_pob_choice: pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los siguió
  - los fue persiguiendo
  lexicon: HALOT
  rationale: רדף en contexto bélico se traduce de forma estándar como «perseguir». El objeto pronominal se expresa de modo directo en español con «los».
- source_word: וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se libró
  - logró escapar
  lexicon: HALOT
  rationale: En el marco de la batalla, el verbo comunica salvación por fuga o evasión. «Escapó» es breve, natural y no añade matiz teológico.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, ajustando la forma al uso español con una vocal átona más natural. La aspiración hebrea no se representa.
- source_word: עַל סוּס
  english_pob_choice: on a horse
  chosen_spanish: en un caballo
  alternatives_spanish:
  - a caballo
  - montado en un caballo
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, en español «en un caballo» refleja con transparencia la imagen de escape montado. Se evita sobrerinterpretar con «a caballo» si se quiere conservar la referencia explícita al animal.
- source_word: וּפָרָשִׁים
  english_pob_choice: with horsemen
  chosen_spanish: con jinetes
  alternatives_spanish:
  - con caballería
  - y jinetes
  lexicon: HALOT
  rationale: פָרָשִׁים son jinetes montados; «jinetes» es directo y más concreto que «caballería». El valor aditivo de la conjunción se expresa en español como acompañamiento con «con».
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés de POB. No se incorporaron revisiones textuales adicionales; el veredicto de alta concordancia indica que no había cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Aram» como nombre propio, coherente con la política POB y con el hebreo.
  - Se evitó «Siria» para no introducir una equivalencia histórica posterior.
  - Se usó «jinetes» en lugar de «caballería» para conservar la imagen concreta del hebreo plural.
  - 'Se preservó el paralelismo narrativo con coordinación simple: «y... y... Pero...».'
