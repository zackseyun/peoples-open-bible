  glossary_alignment: 'Se alinea bien con la terminología del proyecto: בני ישראל -> ''los hijos de Israel''; כהן -> ''sacerdote''; kinship term אבות preservado en ''casas paternas''. No hay términos divinos problemáticos en este versículo.'
