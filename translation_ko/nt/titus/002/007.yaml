id: TIT.2.7
reference: Titus 2:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: περὶ πάντα σεαυτὸν παρεχόμενος τύπον καλῶν ἔργων, ἐν τῇ διδασκαλίᾳ ⸀ἀφθορίαν, ⸀σεμνότητα,
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/007.yaml
  text: in every way presenting yourself as an example of good works[a]; in your teaching, purity, dignity[e][d][c][b],
  footnotes:
  - marker: a
    text: Or 'in all things.' The Greek phrase can also be rendered more formally as 'concerning all things' or 'in all things,' but here it most likely means 'in every way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a pattern' or 'a model' of good works.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the teaching' or 'in doctrine.'
    reason: lexical_alternative
  - marker: d
    text: Or 'purity' or 'integrity.'
    reason: lexical_alternative
  - marker: e
    text: Or 'seriousness' or 'gravity.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그대 자신을 모든 일에서[a] 선한 일의 본보기[b]로 보여 주십시오. 그대의 가르침[c]에서 순결[d]과 진중함[e]을,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 면에서」, 「모든 것에 관하여」. 헬라어 어구는 본문에서 「모든 일에서, 모든 방식으로」의 의미가 가장 자연스럽다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「모범」, 「본」. 헬라어 τύπος는 따라야 할 모형을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「가르침에서」, 「교훈에서」.
    reason: lexical_alternative
  - marker: d
    text: 또는 「순결」, 「온전함」. 헬라어 ἀφθορία는 부패되지 않음을 가리킨다.
    reason: lexical_alternative
  - marker: e
    text: 또는 「엄숙함」, 「위엄」.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ πάντα
  english_pob_choice: in every way
  chosen_korean: 모든 일에서
  alternatives_korean:
  - 모든 면에서
  - 모든 것에 관하여
  lexicon: BDAG
  rationale: περί + 대격은 「~에 관하여」가 기본이나 본문에서는 「모든 일/모든 방식으로」가 자연스럽다.
- source_word: σεαυτὸν παρεχόμενος τύπον
  english_pob_choice: presenting yourself as an example
  chosen_korean: 그대 자신을 ~ 본보기로 보여 주십시오
  alternatives_korean:
  - 그대 자신을 본으로 드러내십시오
  - 자신을 본으로 제시하십시오
  lexicon: BDAG
  rationale: παρέχομαι(중간태)는 「자기 자신을 ~로 내어 보이다」. 「본보기로 보여 주다」가 자연스럽다.
- source_word: καλῶν ἔργων
  english_pob_choice: good works
  chosen_korean: 선한 일
  alternatives_korean:
  - 좋은 일
  - 아름다운 일
  lexicon: BDAG
  rationale: 목회서신의 정형 표현. 「선한 일」로 일관되게 옮긴다.
- source_word: ἐν τῇ διδασκαλίᾳ
  english_pob_choice: in your teaching
  chosen_korean: 그대의 가르침에서
  alternatives_korean:
  - 가르침에 있어
  - 교훈에서
  lexicon: BDAG
  rationale: 정관사 + 문맥상 디도의 가르치는 행위. 「그대의 가르침」으로 인격적으로 살린다.
- source_word: ἀφθορίαν
  english_pob_choice: purity
  chosen_korean: 순결
  alternatives_korean:
  - 온전함
  - 부패하지 않음
  lexicon: BDAG
  rationale: ἀφθορία는 「부패하지 않음·온전함」. 가르침의 정직성·순수성을 가리킨다. 「순결」이 도덕적·교리적 무결의 어감을 잘 살린다.
- source_word: σεμνότητα
  english_pob_choice: dignity
  chosen_korean: 진중함
  alternatives_korean:
  - 위엄
  - 엄숙함
  - 품위
  lexicon: BDAG
  rationale: σεμνότης는 σεμνός의 추상명사. 2:2의 σεμνούς(품위 있고)와 구분하여 가르침의 무게감을 살리는 「진중함」을 택한다.
