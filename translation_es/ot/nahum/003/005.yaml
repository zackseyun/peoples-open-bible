translation:
  language: es
  text: He aquí, estoy contra ti, declara Yahvé de los ejércitos, y descubriré tus faldas sobre tu rostro[a], y mostraré a las naciones tu desnudez y a los reinos tu vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expondré tu desnudez». El hebreo usa la imagen de levantar las faldas de una mujer como metáfora de humillación pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Véase
  lexicon: HALOT
  rationale: La fórmula introduce una घोषणा profética solemne y llamativa. «He aquí» conserva mejor ese tono que opciones más coloquiales.
- source_word: אֵלַיִךְ
  english_pob_choice: I am against you
  chosen_spanish: estoy contra ti
  alternatives_spanish:
  - vengo contra ti
  - estoy en tu contra
  lexicon: HALOT
  rationale: El giro idiomático expresa hostilidad dirigida a Nínive; «estoy contra ti» es directo y natural en español.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - dice Yahvé de los ejércitos
  - oráculo de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como Yahvé según la política POB. «De los ejércitos» conserva el título militar/cósmico sin suavizarlo.
- source_word: וְגִלֵּיתִי
  english_pob_choice: I will uncover
  chosen_spanish: descubriré
  alternatives_spanish:
  - desnudaré
  - expondré
  lexicon: HALOT
  rationale: El verbo significa literalmente quitar la cobertura. En español, «descubriré» conserva la imagen concreta de desvelar públicamente.
- source_word: שׁוּלַיִךְ
  english_pob_choice: your skirts
  chosen_spanish: tus faldas
  alternatives_spanish:
  - tu orla
  - tu ruedo
  lexicon: HALOT
  rationale: Para español, «faldas» comunica de forma natural la parte baja de la vestidura en esta imagen de humillación pública.
- source_word: עַל פָּנָיִךְ
  english_pob_choice: over your face
  chosen_spanish: sobre tu rostro
  alternatives_spanish:
  - sobre tu cara
  - encima de tu rostro
  lexicon: HALOT
  rationale: Se conserva el movimiento visual de la prenda alzándose hasta cubrir el rostro, manteniendo la fuerza figurada del hebreo.
- source_word: וְהַרְאֵיתִי
  english_pob_choice: I will show
  chosen_spanish: mostraré
  alternatives_spanish:
  - haré ver
  - exhibiré
  lexicon: HALOT
  rationale: La causativa de ראה aquí significa hacer ver a otros; «mostraré» transmite bien la acción sin recargarla.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a las gentes
  lexicon: HALOT
  rationale: Se conserva el referente político-colectivo del término en contexto de juicio profético.
- source_word: מַעְרֵךְ
  english_pob_choice: your nakedness
  chosen_spanish: tu desnudez
  alternatives_spanish:
  - tu vergüenza desnuda
  - tu nakedness
  lexicon: HALOT
  rationale: El sustantivo apunta a la condición de estar expuesta sin cubrirse. «Desnudez» es la equivalencia natural y suficientemente concreta en español.
- source_word: וּמַמְלָכֹות
  english_pob_choice: the kingdoms
  chosen_spanish: a los reinos
  alternatives_spanish:
  - a los imperios
  - a los dominios
  lexicon: HALOT
  rationale: El paralelo con «las naciones» pide una referencia política amplia; «reinos» preserva esa amplitud con fidelidad.
- source_word: קְלוֹנֵךְ
  english_pob_choice: your shame
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu oprobio
  - tu deshonra
  lexicon: HALOT
  rationale: El término denota deshonra pública. «Vergüenza» funciona bien en español y mantiene el paralelismo con «desnudez».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la norma POB en español, se conserva el nombre propio «Yahvé» en lugar de la máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Equivalencia de la imagen de humillación sexualizada
  english_pob_reading: I will uncover your skirts over your face ... show the nations your nakedness ... shame
  chosen_spanish_reading: descubriré tus faldas sobre tu rostro ... mostraré a las naciones tu desnudez ... tu vergüenza
  alternative_spanish_readings:
  - desnudaré tu vergüenza públicamente
  - expondré tu desnudez
  rationale: La metáfora hebrea de levantar las faldas para humillar públicamente debe conservarse sin atenuación moralizante ni explicitación innecesaria. La formulación española mantiene la tensión lexicográfica y el carácter vergonzante del acto.
  doctrine_reference: Principio POB de preservar metáforas corporales y de deshonra cuando el original las usa para juicio público
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión menor que añadió los artículos definidos antes de «the nations» y «the kingdoms». En español, la estructura con artículos en los complementos preposicionales («a las naciones», «a los reinos») refleja de forma natural el plural definido del hebreo y no requiere nota adicional.
  spanish_consistency_notes:
  - Se mantiene Yahvé conforme al estándar español del proyecto.
  - Se prefirió «desnudez» frente a un eufemismo más débil para conservar la fuerza de la humillación.
  - «Faldas» se eligió por naturalidad idiomática en español, equivalente funcional de la prenda baja mencionada en el hebreo.
