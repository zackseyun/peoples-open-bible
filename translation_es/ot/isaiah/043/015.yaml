lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. En español, 'Yo soy' conserva esa autoidentificación explícita y suena natural en una cláusula nominal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: ''Yahvé'' como transliteración del nombre divino, en lugar de una sustitución por título.'
- source_word: קְדֹשְׁכֶם
  english_pob_choice: your Holy One
  chosen_spanish: tu Santo
  alternatives_spanish:
  - su Santo
  - tu Santo Uno
  - el Santo de ustedes
  lexicon: HALOT
  rationale: El hebreo funciona como título divino en relación de pertenencia. 'Tu Santo' conserva la fuerza titular y la relación de pacto; se prefiere el singular reverencial por dirigirse a Israel como entidad.
- source_word: בּוֹרֵא
  english_pob_choice: the Creator of
  chosen_spanish: el Creador de
  alternatives_spanish:
  - el que crea a
  - el que creó a
  lexicon: HALOT
  rationale: El participio tiene valor titular/característico. 'El Creador de' reproduce mejor ese valor que un pasado simple, manteniendo la construcción paralela con los otros títulos.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio estándar sin variación.
- source_word: מַלְכְּכֶם
  english_pob_choice: your King
  chosen_spanish: tu Rey
  alternatives_spanish:
  - su Rey
  - tu rey
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo identifica a Yahvé como rey de Israel. Se capitaliza por funcionar como título divino en paralelo con 'tu Santo' y 'el Creador de Israel'.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La traducción española mantiene el nombre propio divino sin reemplazarlo por un título, conforme a la práctica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Capitalización de títulos divinos
  english_pob_reading: Capitalize 'Holy One,' 'Creator,' and 'King' as titles for God
  chosen_spanish_reading: Capitalizar 'Santo', 'Creador' y 'Rey' como títulos divinos
  alternative_spanish_readings:
  - dejar en minúscula como sustantivos comunes
  rationale: En este contexto los términos están en aposición identificando a Yahvé. La mayúscula ayuda al lector español a percibir el paralelismo titular sin añadir contenido ajeno al hebreo.
  doctrine_reference: 'POB style decision: divine titulature in apposition'
translation_notes:
  revision_awareness: No hay cambios de revisión posteriores; el pasaje está en alta concordancia y la lectura inglesa fue estable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - 'Se mantiene el paralelismo nominal con tres títulos divinos: ''tu Santo'', ''el Creador de Israel'' y ''tu Rey''.'
  - Se evita 'Señor' para no ocultar el nombre propio divino.
  - La segunda persona singular ('tu') sigue la forma del hebreo con sufijo plural/2mp entendido colectivamente para Israel, en español reverencial y natural.
