- from: La riqueza y la fuerza levantan el corazón[a], y por encima de ambas está el temor de Dios. En el temor de Dios no hay carencia[b], y no hay que buscar con él ayuda.
  to: La riqueza y la fuerza levantan el corazón[a], y por encima de ambas está el temor de Dios. En el temor de Dios no hay carencia, y no hay que buscar ayuda junto con él.[b]
  rationale: Se conserva la mayor parte del borrador porque representa fielmente el sentido del hebreo y del paralelo griego. Solo se ajusta la última cláusula para expresar de manera natural y precisa que el temor de Dios es suficiente y no necesita ayuda o apoyo adicional 'junto con él'. Se ancla la nota b en esa cláusula, donde realmente aplica la alternativa léxica.
