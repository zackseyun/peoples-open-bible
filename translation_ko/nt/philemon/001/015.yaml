id: PHM.1.15
reference: Philemon 1:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τάχα γὰρ διὰ τοῦτο ἐχωρίσθη πρὸς ὥραν ἵνα αἰώνιον αὐτὸν ἀπέχῃς,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/015.yaml
  text: For perhaps he was separated from you for a time so that you might have him back forever,[a]
  footnotes:
  - marker: a
    text: Or 'he departed from you for a while.' The Greek passive 'was separated' may delicately avoid assigning direct blame and may also leave room for an implied divine purpose.
    reason: alternative_reading
translation:
  language: ko
  text: 어쩌면 그가 한동안 그대에게서 떨어진[a] 것은 이 때문일 것입니다—그대가 그를 영원히 돌려받도록 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「잠시 떠난」. 헬라어 수동태 「떨어졌다」는 누구를 직접 탓하는 것을 섬세하게 피하면서, 또한 함축적인 신적 목적의 여지를 남긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: τάχα
  english_pob_choice: perhaps
  chosen_korean: 어쩌면
  alternatives_korean:
  - 아마
  - 혹시
  lexicon: BDAG
  rationale: 바울의 조심스러운 추론의 어조를 「어쩌면」이 가장 자연스럽게 살린다.
- source_word: γὰρ
  english_pob_choice: for
  chosen_korean: ~것입니다
  lexicon: BDAG
  rationale: 설명적 γάρ. 한국어에서는 합쇼체 종결 「~것입니다」로 추론·설명의 무게를 자연스럽게 담아낸다.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_korean: 이 때문일
  alternatives_korean:
  - 이런 이유로
  - 이 까닭에
  lexicon: BDAG
  rationale: διὰ τοῦτο의 원인 지시를 한국어 어순으로 「이 때문일 것입니다」 종결과 결합해 자연스럽게 풀어낸다.
- source_word: ἐχωρίσθη
  english_pob_choice: was separated
  chosen_korean: 떨어진
  alternatives_korean:
  - 떠난
  - 분리된
  - 갈라진
  lexicon: BDAG
  rationale: 수동태 「떨어졌다」는 행위 주체를 명시하지 않아 오네시모의 책임도, 신적 섭리도 직접 말하지 않는 섬세한 어조. 「떨어진」이 그 모호함을 자연스럽게 보존한다. 「떠난」은 자발적 행위를 함의하므로 피한다.
- source_word: πρὸς ὥραν
  english_pob_choice: for a time
  chosen_korean: 한동안
  alternatives_korean:
  - 잠시
  - 한때
  lexicon: BDAG
  rationale: 관용적 「잠시 동안」. 「한동안」이 「영원히」와의 시간 대비를 자연스럽게 살린다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: ~도록 하기 위함입니다
  lexicon: BDAG
  rationale: 목적·결과를 가리킨다. 합쇼체 종결로 자연스럽게 마무리.
- source_word: αἰώνιον
  english_pob_choice: forever
  chosen_korean: 영원히
  alternatives_korean:
  - 영영
  - 영구히
  lexicon: BDAG
  rationale: ἀπέχῃς를 부사적으로 수식. 「잠시」와의 대비를 「영원히」가 분명히 살린다.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_korean: 그를
  lexicon: BDAG
  rationale: 오네시모를 가리키는 대격.
- source_word: ἀπέχῃς
  english_pob_choice: you might have him back
  chosen_korean: 돌려받도록
  alternatives_korean:
  - 다시 받도록
  - 되찾도록
  lexicon: BDAG
  rationale: ἀπέχω는 본 문맥에서 「온전히 되돌려 받다, 다시 소유하다」. 「돌려받다」가 빌레몬과 오네시모의 관계 회복을 자연스럽게 담는다.
theological_decisions:
- issue: 수동태 ἐχωρίσθη의 행위 주체
  chosen_reading: 수동태 「떨어진」을 유지하되 하나님이나 오네시모를 직접 행위 주체로 명시하지 않음
  alternative_readings:
  - 그가 떠났다 (자발적 행위)
  - 하나님이 그를 떨어뜨리셨다 (신적 섭리 명시)
  rationale: 바울의 표현은 의도적으로 절제되어 있으며, 신적 섭리를 함축할 수 있으나 명시하지 않는다. 본 번역은 그 신학적 긴장을 해소하지 않고 보존한다.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
