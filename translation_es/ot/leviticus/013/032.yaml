translation:
  language: es
  text: Y el sacerdote examinará la zona afectada el séptimo día, y he aquí, si la afección escamosa[a] no se ha extendido, y no hay cabello amarillo en ella, y el aspecto de la afección escamosa no es más profundo que la piel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la escama» o, en inglés arcaico, «scall», para el hebreo נֶתֶק, una afección escamosa específica del cuero cabelludo o de la barba tratada en esta sección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: examinará
  alternatives_spanish:
  - verá
  - inspeccionará
  lexicon: HALOT
  rationale: En el contexto sacerdotal de Levítico 13, ראה no es mera percepción visual, sino acto oficial de evaluación diagnóstica. «Examinará» conserva ese valor procedimental en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el ministro
  lexicon: HALOT
  rationale: כֹּהֵן se refiere aquí al funcionario sacerdotal autorizado para la inspección ritual; «sacerdote» es la equivalencia natural y fiel en español bíblico contemporáneo.
- source_word: הַנֶּגַע
  english_pob_choice: the diseased area
  chosen_spanish: la zona afectada
  alternatives_spanish:
  - la afección
  - la infección
  - la mancha
  lexicon: HALOT
  rationale: נֶגַע abarca un área golpeada o afectada, no necesariamente una categoría médica moderna. «Zona afectada» mantiene amplitud semántica y evita estrechar indebidamente el término.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: el séptimo día
  alternatives_spanish:
  - en el séptimo día
  lexicon: HALOT
  rationale: La frase marca el momento fijado para el reexamen. En español, la preposición está sobrentendida por el verbo «examinará» y la expresión nominal resulta natural.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: La fórmula introduce el resultado observado por el sacerdote. «Y he aquí» preserva el giro discursivo sin volverlo coloquial.
- source_word: לֹא פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no ha avanzado
  - no ha crecido
  lexicon: HALOT
  rationale: En el contexto de afecciones cutáneas, פשה expresa propagación. «Se ha extendido» comunica bien el movimiento sobre el área afectada.
- source_word: הַנֶּתֶק
  english_pob_choice: the scaly infection
  chosen_spanish: la afección escamosa
  alternatives_spanish:
  - la infección escamosa
  - la escama
  - la calva escamosa
  lexicon: HALOT
  rationale: נֶתֶק es una afección específica del cuero cabelludo o la barba descrita en este capítulo. «Afección escamosa» conserva el rasgo visible destacado por el inglés POB y evita el arcaísmo de «scall» o la imprecisión de «itch».
- source_word: וְלֹא הָיָה בוֹ שֵׂעָר צָהֹב
  english_pob_choice: and there is no yellow hair in it
  chosen_spanish: y no hay cabello amarillo en ella
  alternatives_spanish:
  - y no aparece cabello amarillo en ella
  - y no tiene cabello amarillo
  lexicon: HALOT
  rationale: La construcción hebrea señala la ausencia del signo diagnóstico dentro de la lesión. «Cabello amarillo» reproduce el dato cromático; «en ella» mantiene la referencia a la zona afectada.
- source_word: שֵׂעָר צָהֹב
  english_pob_choice: yellow hair
  chosen_spanish: cabello amarillo
  alternatives_spanish:
  - pelo amarillo
  - cabello amarillento
  lexicon: HALOT
  rationale: צָהֹב indica color amarillo. «Cabello amarillo» es la forma más directa y diagnóstica en español; «amarillento» suavizaría demasiado el rasgo.
- source_word: וּמַרְאֵה הַנֶּתֶק
  english_pob_choice: and the appearance of the scaly infection
  chosen_spanish: y la apariencia de la afección escamosa
  alternatives_spanish:
  - y el aspecto de la afección escamosa
  - y la apariencia de la escama
  lexicon: HALOT
  rationale: מַרְאֶה se refiere a lo visible, al aspecto observado. «Apariencia» conserva el lenguaje de inspección y armoniza con el registro clínico-ritual del pasaje.
- source_word: אֵין עָמֹק מִן הָעוֹר
  english_pob_choice: is not deeper than the skin
  chosen_spanish: no está más profunda que la piel
  alternatives_spanish:
  - no parece más profunda que la piel
  - no está hundida bajo la piel
  lexicon: HALOT
  rationale: La expresión compara la lesión con la superficie de la piel para evaluar si está deprimida o hundida. «Más profunda que la piel» sigue de cerca el valor diagnóstico del hebreo y del inglés POB.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española conserva el encuadre diagnóstico sacerdotal, el marcador discursivo «y he aquí» y la terminología específica de נֶתֶק como afección escamosa.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן en contexto levítico, no «cura» ni otras equivalencias eclesiásticas.
  - Se preserva la secuencia diagnóstica del pasaje sin introducir glosas interpretativas fuera del texto.
  - La nota al pie ancla la ambigüedad léxica de נֶתֶק sin sustituir el término en el cuerpo del texto.
  - «Piel» traduce הָעוֹר de forma natural y consistente con el registro anatómico del versículo.
