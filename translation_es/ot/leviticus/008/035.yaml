review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: permanencia continua a la entrada de la tienda del encuentro, duración de siete días, observancia de la משמרת de Yahvé, advertencia de muerte y explicación final en voz pasiva. Sin embargo, la decisión clave «la obligación de Yahvé» no preserva con suficiente fidelidad el matiz cultual de משמרת en la colocación שמר + משמרת, donde la idea es guardar/observar un encargo, servicio o prescripción confiada. Además, la nota [a] está anclada al sintagma equivocado: la alternativa documentada corresponde a תֵּשְׁבוּ (‘se quedarán/permanecerán’), no a «tienda del encuentro».'
  spanish_quality_summary: El español es claro y generalmente natural, con registro digno y legible. No obstante, «guardarán la obligación de Yahvé» suena poco idiomático y algo rígido en español eclesial; «guardarán el encargo de Yahvé» o «cumplirán el encargo de Yahvé» comunica mejor el deber ritual. También conviene corregir el anclaje de la nota para evitar confusión lectora.
  glossary_alignment: 'Se alinea bien con la política del proyecto en «Yahvé», «tienda del encuentro» y «día y noche». La principal desviación es terminológica en משמרת: «obligación» no reproduce tan bien como «encargo»/«servicio encomendado» el valor de ‘charge’ preservado en el audit trail inglés. La elección «permanecerán» es válida, pero la nota alternativa debe ir sobre ese verbo.'
  issues:
  - severity: high
    issue: «la obligación de Yahvé» para מִשְׁמֶרֶת יְהוָה
    rationale: Aunque expresa deber, pierde el matiz técnico de ‘encargo/cargo prescrito’ en el contexto sacerdotal. En esta colocación, el hebreo apunta más a guardar un encargo ritual confiado que a una obligación abstracta.
  - severity: medium
    issue: La nota [a] está colocada sobre «tienda del encuentro»
    rationale: La nota ofrece alternativas para תֵּשְׁבוּ (‘se quedarán/permanecerán’), no para אֹהֶל מוֹעֵד. Debe anclarse al verbo correspondiente en el texto español.
  - severity: low
    issue: «porque así me fue mandado» es aceptable pero algo menos natural que «porque así se me ha mandado» o «porque así se me mandó»
    rationale: No es un error de fidelidad; solo una cuestión de fluidez. Puede mantenerse si se prefiere un tono bíblico sobrio.
  revised_spanish_text: Y permanecerán[a] a la entrada de la tienda del encuentro día y noche por siete días, y guardarán el encargo de Yahvé, para que no mueran; porque así me fue mandado.
  revised_footnotes:
