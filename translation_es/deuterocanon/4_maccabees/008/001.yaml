translation:
  language: es
  text: Porque en la primera prueba fue vencido el notorio tirano[a], al no poder obligar al anciano a comer alimento impuro,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ilustre» o «prominente». El adjetivo griego puede ser positivo en otros contextos, pero aquí describe al tirano con sentido desfavorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπειδὴ γὰρ
  english_pob_choice: For since
  chosen_spanish: Porque, ya que
  alternatives_spanish:
  - Pues, ya que
  - Porque puesto que
  lexicon: LSJ
  rationale: La combinación griega es explicativa y causal. En español, «Porque, ya que» conserva ese vínculo doble sin sonar forzado; «pues» o «puesto que» serían posibles, pero aquí «ya que» expresa mejor la relación causal-temporal.
- source_word: κατὰ τὴν πρώτην πεῖραν
  english_pob_choice: in the first trial
  chosen_spanish: en la primera prueba
  alternatives_spanish:
  - en el primer intento
  - en la primera prueba o test
  - en la primera tentativa
  lexicon: LSJ
  rationale: πεῖρα puede significar intento, prueba o test. En este contexto de resistencia y coerción, «prueba» comunica bien el sentido de examen o prueba sufrida, y mantiene naturalidad en español.
- source_word: ἐνικήθη
  english_pob_choice: was defeated
  chosen_spanish: fue vencido
  alternatives_spanish:
  - fue derrotado
  - fue superado
  - quedó vencido
  lexicon: LSJ
  rationale: El pasivo de νικάω admite «vencer/derrotar». «Fue vencido» reproduce bien la idea de fracaso del tirano sin perder la pasividad del griego.
- source_word: περιφανὴς
  english_pob_choice: notorious
  chosen_spanish: notorio
  alternatives_spanish:
  - prominente
  - célebre
  - ilustre
  lexicon: LSJ
  rationale: El contexto vuelve negativa la prominencia del tirano. «Notorio» conserva esa visibilidad pública con carga desfavorable, como en el inglés auditado.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el gobernante
  - el déspota
  lexicon: LSJ
  rationale: «Tirano» preserva la fuerza moral y política del sustantivo griego, sin suavizarlo a «gobernante».
- source_word: μὴ δυνηθεὶς
  english_pob_choice: being unable
  chosen_spanish: al no poder
  alternatives_spanish:
  - puesto que no pudo
  - por no poder
  - siendo incapaz
  lexicon: LSJ
  rationale: El participio explica la causa de la derrota. «Al no poder» mantiene esa relación causal subordinada de manera natural en español.
- source_word: ἀναγκάσαι
  english_pob_choice: to compel
  chosen_spanish: obligar
  alternatives_spanish:
  - forzar
  - coaccionar
  - compeler
  lexicon: LSJ
  rationale: «Obligar» es la opción más clara y natural en español contemporáneo para la coerción ejercida por el tirano.
- source_word: γέροντα
  english_pob_choice: the old man
  chosen_spanish: al anciano
  alternatives_spanish:
  - al viejo
  - al hombre anciano
  - al viejo hombre
  lexicon: LSJ
  rationale: El contexto identifica a la persona ya conocida; «anciano» es más digno y natural que «viejo», sin perder la referencia a la edad avanzada.
- source_word: μαιροφαγῆσαι
  english_pob_choice: to eat defiling food
  chosen_spanish: a comer alimento impuro
  alternatives_spanish:
  - a comer carne impura
  - a comer alimento contaminado
  - a comer comida prohibida
  lexicon: LSJ
  rationale: El verbo raro apunta a ingerir comida que contamina ritualmente bajo la ley judía. «Alimento impuro» conserva la idea de impureza sin especificar más de lo que el griego exige.
theological_decisions:
- issue: Naturaleza de la comida prohibida en μαιροφαγῆσαι
  english_pob_reading: to eat defiling food
  chosen_spanish_reading: a comer alimento impuro
  alternative_spanish_readings:
  - a comer carne impura
  - a comer comida prohibida
  rationale: La frase debe mantener el énfasis en la impureza ritual y moral, no solo en el alimento material. «Alimento impuro» refleja bien esa dimensión sin añadir detalles no explicitados.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido; no se detectaron ajustes necesarios tras la pasada de control más reciente, que marcó el texto como sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías»/«Cristo» no aplica en este versículo.
  - Se conserva el matiz de coerción con «obligar» y la impureza ritual con «alimento impuro».
  - La puntuación española se ajusta para leer con fluidez y reflejar la subordinación causal del participio griego.
