translation:
  language: es
  text: El sacerdote que hace expiación con ella[a] la comerá. Se comerá en un lugar santo, en el atrio de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El sacerdote que la presenta como ofrenda por el pecado la comerá». El participio hebreo puede denotar de manera más específica que el sacerdote oficia el rito de la ofrenda por el pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  english_pob_choice: The priest
  chosen_spanish: El sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: כֹּהֵן designa al oficiante cultual; en español, «sacerdote» es la equivalencia natural y transparente para este contexto levítico.
- source_word: הַמְחַטֵּא אֹתָהּ
  english_pob_choice: who makes atonement with it
  chosen_spanish: que hace expiación con ella
  alternatives_spanish:
  - que purifica con ella
  - que la presenta como ofrenda por el pecado
  - que oficia con ella
  lexicon: HALOT
  rationale: El participio piel de חטא en este contexto sacrificial puede expresar la acción de expiar/purificar mediante la ofrenda. «Hace expiación con ella» conserva esa fuerza cultual sin imponer una paráfrasis más amplia que el hebreo no exige.
- source_word: יֹאכֲלֶנָּה
  english_pob_choice: shall eat it
  chosen_spanish: la comerá
  alternatives_spanish:
  - deberá comerla
  - podrá comerla
  lexicon: HALOT
  rationale: El imperfecto tiene valor prescriptivo en esta ley ritual. «La comerá» comunica la obligación/instrucción de manera natural en español y mantiene el objeto directo femenino de la ofrenda.
- source_word: בְּמָקוֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el lugar santo
  lexicon: HALOT
  rationale: «Lugar santo» preserva el sentido cultual de קָדֹשׁ y respeta la ausencia de artículo en מָקוֹם, que el inglés POB también reflejó con «a holy place».
- source_word: תֵּאָכֵל
  english_pob_choice: It shall be eaten
  chosen_spanish: Será comida
  alternatives_spanish:
  - deberá comerse
  - se comerá
  lexicon: HALOT
  rationale: La voz pasiva del nifal se refleja con una forma pasiva en español. «Será comida» mantiene el foco en la ofrenda, no en el comensal.
- source_word: בַּחֲצַר אֹהֶל מוֹעֵד
  english_pob_choice: in the court of the tent of meeting
  chosen_spanish: en el atrio de la tienda de reunión
  alternatives_spanish:
  - en el patio de la tienda de reunión
  - en el atrio del tabernáculo de reunión
  lexicon: HALOT
  rationale: «Atrio» traduce bien חֲצַר en lenguaje cultual y «tienda de reunión» conserva אֹהֶל מוֹעֵד de forma directa y comprensible sin sustituirlo por una terminología más tradicional que no está en el hebreo.
theological_decisions:
- issue: Sentido cultual de חטא en la frase participial
  english_pob_reading: Rendered functionally as the priest who officiates this offering 'for sin' / 'makes atonement with it'.
  chosen_spanish_reading: «Que hace expiación con ella» expresa la función ritual del sacerdote en la ofrenda por el pecado sin convertir el participio en una explicación más larga.
  alternative_spanish_readings:
  - que purifica con ella
  - que oficia con ella
  - que la presenta como ofrenda por el pecado
  rationale: En Levítico, el verbo puede abarcar la acción de expiar/purificar dentro del rito sacrificial. La traducción elegida conserva esa tensión semántica y evita tanto el calco duro como una expansión doctrinal innecesaria.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referencia de los pronombres femeninos
  english_pob_reading: The pronouns refer to the sacrificial animal/offering and are rendered as 'it.'
  chosen_spanish_reading: Los pronombres se refieren a la ofrenda/animal sacrificial, y se vierten en femenino según el antecedente español («ella»).
  alternative_spanish_readings:
  - la comerá ... será comida
  - lo comerá ... será comido
  rationale: En español, la concordancia con «ofrenda» exige femenino; esto mantiene la referencia natural al sustantivo implícito en el contexto ritual, sin forzar un neutro inexistente en español.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail en inglés muestra una revisión desde «offers it for sin» hacia «makes atonement with it» para reflejar mejor el participio hebreo. La versión española sigue esa revisión con «hace expiación con ella», manteniendo el énfasis cultual del original y la pasiva de la segunda cláusula. También conserva la observación sobre la ausencia de artículo en מָקוֹם con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Sacerdote», «expiación», «lugar santo» y «atrio» mantienen terminología cultual consistente con Levítico.
  - Se conserva la pasiva «Será comida» para respetar el foco del hebreo en la ofrenda.
