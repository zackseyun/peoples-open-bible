translation:
  language: es
  text: Escucha la voz de mis súplicas[a][b], cuando clamo a ti, cuando alzo mis manos hacia tu santo santuario interior[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «el sonido de mis súplicas»; קוֹל puede significar «voz» o «sonido».'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «mis ruegos»; תַּחֲנוּנִים expresa súplicas insistentes pidiendo favor o misericordia.'
    reason: lexical_alternative
  - marker: c
    text: 'O también: «tu santo santuario»; el hebreo דְּבִיר puede referirse más específicamente al recinto interior o santuario más interno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo qal 2ms pide una acción directa de Dios en oración. En español, «escucha» es natural, solemne y conserva el tono urgente de súplica.
- source_word: קוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - la voz
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido». Sigo la decisión inglesa revisada por «voice», que en español también comunica mejor la petición personal que «sonido».
- source_word: תַּחֲנוּנַי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis ruegos
  alternatives_spanish:
  - mis súplicas
  - mis ruegos de misericordia
  lexicon: HALOT
  rationale: תַּחֲנוּנִים son ruegos intensos pidiendo favor o misericordia. «Ruegos» es más natural en español; la fuerza de misericordia queda en el contexto inmediato de la oración.
- source_word: בְּשַׁוְּעִי
  english_pob_choice: when I cry
  chosen_spanish: cuando clamo
  alternatives_spanish:
  - cuando grito
  - al clamar
  lexicon: HALOT
  rationale: 'El infinitivo con בְּ funciona temporalmente: «cuando...». «Clamo» preserva la intensidad de שׁוע mejor que «llamo».'
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - a ti
  lexicon: HALOT
  rationale: La preposición direccional con sufijo de 2ms se expresa con naturalidad en español como «a ti» en contexto de oración.
- source_word: בְּנָשְׂאִי
  english_pob_choice: when I lift up
  chosen_spanish: cuando alzo
  alternatives_spanish:
  - cuando levanto
  - al alzar
  lexicon: HALOT
  rationale: El valor temporal del infinitivo con בְּ se conserva con «cuando». «Alzo» es la opción más idiomática para el gesto de oración.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos
  lexicon: HALOT
  rationale: La referencia corporal es literal y debe mantenerse sin paráfrasis.
- source_word: אֶל דְּבִיר קָדְשֶׁךָ
  english_pob_choice: toward your holy inner sanctuary
  chosen_spanish: hacia tu santuario interior santo
  alternatives_spanish:
  - hacia tu santuario interior
  - hacia tu santo santuario interior
  - hacia tu lugar santísimo
  lexicon: HALOT
  rationale: דְּבִיר señala el recinto interno, no solo el santuario en general. En español, «santuario interior» conserva la referencia espacial; «santo» mantiene קָדְשֶׁךָ sin desplazarlo hacia una terminología más técnica como «lugar santísimo» que podría sugerir una equivalencia ya interpretada.
theological_decisions:
- issue: Referencia cultual de דְּבִיר קָדְשֶׁךָ
  english_pob_reading: your holy inner sanctuary
  chosen_spanish_reading: tu santuario interior santo
  alternative_spanish_readings:
  - tu santuario interior
  - tu lugar santísimo
  - tu santo santuario
  rationale: El hebreo apunta a la cámara interior del santuario, pero el texto no obliga a escoger una formulación técnica posterior. Mantengo la imagen cultual concreta sin imponer un término interpretativo excesivo.
  doctrine_reference: 'Tradición de traducción: primacía del hebreo y preservación de imágenes cultuales'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar añadidos no explícitos («for help») y para preferir «the voice of my pleas for mercy». La presente redacción española sigue esa última decisión y evita introducir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde el texto lo exija; aquí no aparece el nombre divino.
  - Se conserva un registro de oración solemne y moderno, evitando calcos como «clamé a ti» o «súplicas» si entorpecen la fluidez.
  - No se usa «SEÑOR» como sustituto, porque el hebreo aquí no contiene יהוה sino una petición directa en segunda persona.
  - «Santuario interior» evita desplazar el término hacia una denominación litúrgica posterior que el hebreo no explicita.
