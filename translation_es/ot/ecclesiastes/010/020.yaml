translation:
  language: es
  text: Aun en tus pensamientos[a], no maldigas a un rey, y en tu dormitorio[b] no maldigas a un rico, porque un ave de los cielos[c] puede llevar el sonido, y un ser alado puede dar a conocer el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu mente».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «en las cámaras de tu lecho»; es decir, en la privacidad de tu dormitorio.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «ave de los cielos»; compárese el modismo detrás de la expresión «un pajarito me lo contó».'
    reason: cross_reference
lexical_decisions:
- source_word: בְּמַדָּעֲךָ
  english_pob_choice: in your thoughts
  chosen_spanish: en tus pensamientos
  alternatives_spanish:
  - en tu mente
  - en tu conocimiento
  - para tus adentros
  lexicon: HALOT
  rationale: מַדָּע puede referirse a conocimiento o a pensamiento/cognición. En este contexto prohibitivo, la lectura de interioridad es la más natural; «en tus pensamientos» conserva esa esfera mental sin convertirla en una paráfrasis más libre.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El hebreo no lleva artículo, así que «un rey» mantiene el valor genérico del proverbio y evita identificar a un monarca específico.
- source_word: תְּקַלֵּל
  english_pob_choice: curse
  chosen_spanish: maldigas
  alternatives_spanish:
  - maldigas gravemente
  - hables mal de
  - desprecies
  lexicon: HALOT
  rationale: קלל en esta forma intensiva expresa maldecir. «Maldigas» reproduce con mayor precisión la fuerza verbal que «hables mal de» o «desprecies».
- source_word: בְחַדְרֵי מִשְׁכָּבְךָ
  english_pob_choice: in your bedroom
  chosen_spanish: en tu dormitorio
  alternatives_spanish:
  - en los aposentos de tu lecho
  - en tu recámara
  - en tu alcoba
  lexicon: HALOT
  rationale: Literalmente alude a «las cámaras del lecho». Como expresión idiomática de privacidad, «dormitorio» comunica la idea en español actual sin perder el sentido de lugar íntimo.
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - una persona rica
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado y se refiere a una persona adinerada. «Un rico» es breve y mantiene el paralelismo con «un rey».
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: a bird of the heavens
  chosen_spanish: un ave de los cielos
  alternatives_spanish:
  - un ave del cielo
  - un pájaro del cielo
  lexicon: HALOT
  rationale: La expresión es literalmente «ave de los cielos». «Los cielos» conserva mejor el plural hebreo y el tono bíblico del giro sin volverlo artificial.
- source_word: יוֹלִיךְ אֶת־הַקּוֹל
  english_pob_choice: may carry the sound
  chosen_spanish: puede llevar la voz
  alternatives_spanish:
  - puede llevar el sonido
  - puede hacer llegar la voz
  - puede llevar el mensaje
  lexicon: HALOT
  rationale: קוֹל puede significar sonido o voz. En un proverbio sobre palabra dicha en secreto, «voz» mantiene la posible referencia a lo hablado y su transmisión indirecta.
- source_word: בַעַל הַכְּנָפַיִם
  english_pob_choice: a winged creature
  chosen_spanish: un ser alado
  alternatives_spanish:
  - un poseedor de alas
  - un alado
  lexicon: HALOT
  rationale: La expresión significa literalmente «dueño/poseedor de alas». «Ser alado» conserva la imagen figurada y funciona con naturalidad en español, sin sobreexplicar la metáfora.
- source_word: יַגֵּיד דָּבָר
  english_pob_choice: may report the matter
  chosen_spanish: puede dar a conocer el asunto
  alternatives_spanish:
  - puede reportar el asunto
  - puede divulgar la cosa
  - puede decirlo
  lexicon: HALOT
  rationale: נגד significa contar, declarar o informar. «Dar a conocer el asunto» refleja la idea de revelar lo dicho en privado; «asunto» mantiene דָבָר como cosa/materia sin volverlo demasiado abstracto.
theological_decisions:
- issue: Carácter proverbial y advertencia sobre la difusión de palabras secretas
  english_pob_reading: for a bird of the heavens may carry the sound, and a winged creature may report the matter
  chosen_spanish_reading: porque un ave de los cielos puede llevar la voz, y un ser alado puede dar a conocer el asunto
  alternative_spanish_readings:
  - porque un ave del cielo puede llevar el sonido, y un ser alado puede divulgar el asunto
  - pues un ave de los cielos puede llevar la voz, y un ave alada puede revelar el asunto
  rationale: 'El hebreo presenta una advertencia proverbial: aun lo dicho en privado puede llegar a oídos ajenos. La traducción mantiene el tono de posibilidad y de revelación indirecta sin convertirlo en una afirmación literal sobre aves que hablan.'
  doctrine_reference: Sabiduría proverbial; prudencia en el habla (cf. Proverbios 10:20; Lucas 12:3 por analogía temática)
translation_notes:
  revision_awareness: 'Coincide con el examen crítico más reciente: no se requirieron cambios frente al borrador previo; se preservó el sentido proverbial, la estructura paralela y la imaginería hebrea con español natural.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se optó por «un rico» para conservar el paralelismo con «un rey» y la sustantivación del adjetivo hebreo.
  - «Ave de los cielos» y «ser alado» conservan el doblete imagético sin forzar una equivalencia literal rígida.
  - No se usó «SEÑOR» ni lenguaje eclesiástico tradicional no requerido por la fuente.
