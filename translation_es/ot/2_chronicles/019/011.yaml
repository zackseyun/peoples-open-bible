review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la auditoría inglesa en la estructura general, los nombres, la distinción entre «asunto de Yahvé» y «asunto del rey», y el uso de «Yahvé». Sin embargo, varias elecciones españolas son poco naturales o menos fieles al sentido administrativo del texto: «está sobre ustedes» calca el hebreo de forma dura; «estarán como oficiales» es menos idiomático que «servirán como oficiales»; y «el bueno» suena extraño en español bíblico actual y no comunica bien el valor genérico/individual de הַטּוֹב.'
  spanish_quality_summary: 'El texto es legible, pero contiene calcos que afectan la naturalidad: «está sobre ustedes», «estarán como oficiales», y especialmente «con el bueno». También conviene mejorar la nota b, que actualmente repite exactamente la redacción principal como alternativa, sin aportar una verdadera opción. «Y he aquí» es aceptable, aunque formal; puede conservarse con nota.'
  glossary_alignment: 'Buena alineación con la glosa del proyecto: יְהוָה → «Yahvé» está correcto; «sacerdote principal» preserva la cautela frente a «sumo sacerdote»; «actúen» refleja bien וַעֲשׂוּ. Ajusto «está sobre ustedes» a «está a cargo de ustedes» para expresar supervisión de manera natural en español, y «el bueno» a «quien haga el bien» para representar mejor la ambigüedad/genérico del cierre sin sonar forzado.'
  issues:
  - severity: medium
    issue: «está sobre ustedes» suena calcado e incómodo en español
    rationale: עֲלֵיכֶם expresa autoridad o supervisión. En español neutro eclesial, «está a cargo de ustedes» o «está al frente de ustedes» comunica mejor el sentido administrativo sin perder fidelidad.
  - severity: medium
    issue: «estarán como oficiales» es menos idiomático que la opción documentada
    rationale: La cláusula nominal hebrea puede verterse de forma natural como función de servicio. La propia alternativa del borrador, «servirán como oficiales», refleja mejor la función de los levitas delante de los jueces.
  - severity: medium
    issue: «y que Yahvé esté con el bueno» suena antinatural y reduce la claridad del cierre
    rationale: Aunque הַטּוֹב permite una lectura genérica o individual, «el bueno» no es buena solución española aquí. «Quien haga el bien» o «el que hace el bien» conserva el sentido moral y la posible genericidad con mejor español.
  - severity: low
    issue: La nota b no ofrece una alternativa real
    rationale: Repite la redacción principal en lugar de documentar otra posibilidad, pese a que la auditoría inglesa sí preserva la alternativa individual/genérica.
