    text: Or 'from his dwelling place' or 'from his holy place.' The Hebrew reads simply 'from his place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the heights of the earth.' 'High places' may evoke elevated places associated with worship, but the phrase can also be understood more broadly as the earth's heights.
    reason: lexical_alternative
