translation:
  language: es
  text: porque oirán de tu gran nombre[a], y de tu mano poderosa y de tu brazo extendido, y él vendrá y orará hacia esta casa—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia del plural («oirán») al singular («él vendrá y orará»), probablemente pasando de los extranjeros en general a un extranjero representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces la razón explicativa de la oración anterior. «Porque» conserva bien el valor causal/explanatorio en español natural y bíblico.
- source_word: יִשְׁמְעוּן
  english_pob_choice: they will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - oirán hablar
  lexicon: HALOT
  rationale: El hebreo expresa recepción de la noticia. En español, con el complemento siguiente («de tu gran nombre») basta «oirán» para mantener la idea de enterarse de algo sin añadir un giro innecesario.
- source_word: שִׁמְךָ הַגָּדוֹל
  english_pob_choice: of your great name
  chosen_spanish: de tu gran nombre
  alternatives_spanish:
  - de tu nombre grande
  - acerca de tu gran nombre
  lexicon: HALOT
  rationale: Se conserva «nombre» como reputación y renombre revelado. «Gran» reproduce el adjetivo sin volverlo solemne de más, y la preposición «de» encaja con oír noticias sobre alguien.
- source_word: יָדְךָ הַחֲזָקָה
  english_pob_choice: your mighty hand
  chosen_spanish: tu mano poderosa
  alternatives_spanish:
  - tu mano fuerte
  - tu mano vigorosa
  lexicon: HALOT
  rationale: La imagen antropomórfica se mantiene. «Poderosa» comunica fuerza divina de manera natural en español y preserva el paralelismo con el brazo extendido.
- source_word: זְרֹעֲךָ הַנְּטוּיָה
  english_pob_choice: your outstretched arm
  chosen_spanish: tu brazo extendido
  alternatives_spanish:
  - tu brazo alzado
  - tu brazo tendido
  lexicon: HALOT
  rationale: «Brazo extendido» reproduce el idiomatismo hebreo de forma clara y reconocible en español, sin abstraerlo a «poder».
- source_word: וּבָא
  english_pob_choice: and he will come
  chosen_spanish: y él vendrá
  alternatives_spanish:
  - y vendrá
  - y vendrá él
  lexicon: HALOT
  rationale: Se conserva el singular del hebreo, que pasa de un plural general a un individuo representativo. El pronombre explícito ayuda a que el cambio de sujeto sea visible en español.
- source_word: וְהִתְפַּלֵּל
  english_pob_choice: and pray
  chosen_spanish: y orará
  alternatives_spanish:
  - y orará a Dios
  - y hará oración
  lexicon: HALOT
  rationale: «Orará» reproduce el verbo de oración sin añadir destinatario inexistente en el hebreo. Es un verbo culto pero plenamente natural en registro bíblico.
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - hacia este templo
  - a esta casa
  lexicon: HALOT
  rationale: «Hacia» conserva la orientación direccional de אֶל en un contexto de oración dirigida al templo, sin forzar la idea de entrada física.
theological_decisions:
- issue: Lenguaje antropomórfico para la acción divina
  english_pob_reading: Retain 'hand' and 'arm' literally in the main text
  chosen_spanish_reading: Conservar «mano» y «brazo» literalmente en el texto principal
  alternative_spanish_readings:
  - poder
  - fuerza
  - acción poderosa
  rationale: El hebreo usa imágenes concretas de mano y brazo para hablar de la intervención divina. Traducirlas por abstracciones borraría un rasgo literario y teológico importante del pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cambio de plural a singular
  english_pob_reading: 'Preserve the Hebrew shift: ''they will hear ... and he will come'''
  chosen_spanish_reading: 'Preservar el cambio hebreo: «oirán ... y él vendrá»'
  alternative_spanish_readings:
  - 'armonizar en plural: «oirán ... y vendrán»'
  - suavizar a impersonal
  rationale: El texto pasa de los extranjeros en general a un individuo representativo. Mantener la tensión numérica hace visible la estructura del hebreo y evita una nivelación interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se revisó el patrón de la fuente y el auditorio inglés: no hubo cambios posteriores en la solución inglesa; la versión española mantiene el paralelismo, la imagen corporal divina y el cambio de número sin armonizarlo.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparece el nombre divino; aquí el versículo no lo incluye explícitamente.
  - «Orará» se mantuvo como verbo de culto formal, coherente con el registro bíblico.
  - Se evitó «SEÑOR» como sustituto porque no hay aquí un caso de masking del nombre divino.
  - El pronombre explícito «él» marca en español el mismo cambio de sujeto que el hebreo hace visible en la secuencia verbal.
