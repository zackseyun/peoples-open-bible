  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios están bien adaptados al español. No aparecen términos sensibles del glosario general. La decisión sobre דַּבְּרִי שִׁיר debe reflejar la documentación del POB: el texto principal puede ser natural («canta una canción»), pero la nota debe conservar el dato de que el verbo hebreo es literalmente «habla/di».'
