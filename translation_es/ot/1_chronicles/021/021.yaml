translation:
  language: es
  text: Cuando David llegó a Ornan[a], Ornan miró y vio a David, y salió de la era y se postró delante de David con el rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró por completo delante de David». El hebreo describe una inclinación total, con el rostro en tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - acercó
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo expresa el acercamiento de David al lugar de Ornan. "Llegó" suena natural en español y conserva el movimiento hacia el punto de encuentro sin forzar una repetición de "vino".
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - ante
  lexicon: HALOT
  rationale: La preposición marca dirección hacia una persona. En español, "a" comunica de manera idiomática la llegada de David a Ornan.
- source_word: וַיַּבֵּט
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - observó
  - levantó la vista
  lexicon: HALOT
  rationale: El verbo hebreo denota dirigir la mirada. "Miró" mantiene la secuencia narrativa de "miró y vio" sin añadir un matiz no explícito como "levantó la vista".
- source_word: וַיַּרְא אֶת דָּוִיד
  english_pob_choice: saw David
  chosen_spanish: vio a David
  alternatives_spanish:
  - alcanzó a ver a David
  - divisó a David
  lexicon: HALOT
  rationale: '"Ver" es el equivalente básico y fiel de ראה. El español requiere la preposición personal "a" para mantener la referencia directa a David.'
- source_word: וַיֵּצֵא מִן הַגֹּרֶן
  english_pob_choice: went out from the threshing floor
  chosen_spanish: salió del era
  alternatives_spanish:
  - salió de la era
  - salió del sitio de la era
  lexicon: HALOT
  rationale: הַגֹּרֶן es la era o espacio de trillar. "Era" es un término bíblico y agrícola correcto en español; "del era" sigue la forma contracta del original, mientras que "de la era" sería la alternativa más corriente.
- source_word: הַגֹּרֶן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - el lugar de trilla
  lexicon: HALOT
  rationale: En español bíblico, "era" expresa bien el lugar de la trilla. Aunque "threshing floor" puede traducirse literalmente como "era de trillar", "era" es más breve y natural aquí.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down before
  chosen_spanish: se postró delante de
  alternatives_spanish:
  - se inclinó ante
  - adoró a
  lexicon: HALOT
  rationale: El hebreo describe una postración física. "Se postró delante de" conserva la fuerza corporal sin convertir automáticamente el acto en adoración religiosa.
- source_word: אַפַּיִם אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - boca abajo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea describe una postración completa. "Con el rostro en tierra" es una solución sobria y fiel que evita la literalidad extraña de "narices a tierra".
theological_decisions:
- issue: Si la postración de Ornan debe sonar como adoración o como reverencia cortesana
  english_pob_reading: bowed down before David
  chosen_spanish_reading: se postró delante de David
  alternative_spanish_readings:
  - adoró a David
  - le rindió homenaje
  rationale: El verbo hebreo puede describir tanto reverencia ante un superior humano como adoración según el contexto. Aquí el objeto es David y la escena es de deferencia; por eso conviene mantener la postración física sin introducir una afirmación de adoración que el texto no exige.
  doctrine_reference: Preservar la tensión lexical sin resolverla doctrinalmente; no añadir una lectura devocional ajena al contexto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y no se detectaron problemas de contenido. La redacción española mantiene la secuencia hebrea de mirar/ver/salir/postrarse y conserva la ambigüedad controlada del gesto de Ornan.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene "era" para הַגֹּרֶן, coherente con vocabulario agrícola bíblico y con la elección POB de "threshing floor".
  - La construcción "con el rostro en tierra" conserva la imagen corporal del hebreo sin sobrecargarla con lenguaje litúrgico.
