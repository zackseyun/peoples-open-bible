translation:
  language: es
  text: En cuanto a los sacrificios de mis ofrendas[a], sacrifican carne y la comen; pero Yahvé no los acepta[b]. Ahora recordará su iniquidad y castigará sus pecados; ellos volverán a Egipto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea es inusual; puede entenderse literalmente como 'los sacrificios de mis ofrendas', o también como 'mis dones sacrificiales'. Menos probablemente, podría aludir a 'mis sacrificios amados'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''no se complace en ellos'' / ''no está complacido con ellos''.'
    reason: lexical_alternative
  - marker: c
    text: '''Volverán a Egipto'' puede referirse a un retorno literal, o más ampliamente a un regreso a la esclavitud y al exilio bajo la imagen de Egipto.'
    reason: alternative_reading
lexical_decisions:
- source_word: זִבְחֵי הַבְהָבַי
  english_pob_choice: the sacrifices of my offerings
  chosen_spanish: los sacrificios de mis ofrendas
  alternatives_spanish:
  - mis ofrendas sacrificiales
  - los sacrificios de mis dones
  - los sacrificios de mis ofrendas de sacrificio
  lexicon: HALOT
  rationale: La construcción hebrea es inusual y el audit trail inglés la conserva de manera transparente. En español, 'los sacrificios de mis ofrendas' reproduce la relación de constructo sin suavizar la rareza del giro. Se evita resolver interpretativamente el hebreo difícil; se conserva el sentido base de ofrendas presentadas a Dios.
- source_word: יִזְבְּחוּ
  english_pob_choice: they sacrifice
  chosen_spanish: sacrifican
  alternatives_spanish:
  - ofrecen en sacrificio
  - sacrifican en ofrenda
  lexicon: HALOT
  rationale: El verbo qal imperfecto de זבח expresa sacrificio/ofrecimiento sacrificial. En español, el presente simple comunica bien el valor descriptivo del hebreo en este contexto profético.
- source_word: בָשָׂר וַיֹּאכֵלוּ
  english_pob_choice: flesh and eat it
  chosen_spanish: carne y la comen
  alternatives_spanish:
  - carne y la comen
  - carne y comen de ella
  - carne y la consumen
  lexicon: HALOT
  rationale: בָשָׂר significa literalmente 'carne'; en contexto sacrificial se refiere a la carne de la ofrenda. 'Carne y la comen' mantiene la concreción del hebreo y hace explícito el objeto en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la convención del proyecto. 'Yahvé' evita el sustituto 'SEÑOR' y refleja el tetragrámaton como nombre personal de Dios.
- source_word: לֹא רָצָם
  english_pob_choice: does not accept them
  chosen_spanish: no los acepta
  alternatives_spanish:
  - no se complace en ellos
  - no tiene agrado en ellos
  lexicon: HALOT
  rationale: En contexto sacrificial, רצה con sufijo expresa aceptación favorable de las ofrendas. 'No los acepta' comunica con claridad la negativa divina sin perder el sentido de aceptación cultual.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Pues ahora
  lexicon: HALOT
  rationale: Marca el giro hacia el juicio inminente; 'Ahora' es la forma más directa y natural en español.
- source_word: יִזְכֹּר עֲוֺנָם
  english_pob_choice: he will remember their iniquity
  chosen_spanish: recordará su iniquidad
  alternatives_spanish:
  - recordará su culpa
  - se acordará de su iniquidad
  lexicon: HALOT
  rationale: Se mantiene el verbo de 'recordar' para no borrar la fuerza judicial/covenantal del hebreo. 'Iniquidad' traduce adecuadamente עָוֹן en este contexto de culpa cargada de responsabilidad.
- source_word: וְיִפְקֹד חַטֹּאותָם
  english_pob_choice: and punish their sins
  chosen_spanish: y castigará sus pecados
  alternatives_spanish:
  - y visitará sus pecados
  - y pondrá sus pecados en cuenta
  lexicon: HALOT
  rationale: פקד en contextos de juicio puede significar castigar o tomar en cuenta para juicio. 'Castigará sus pecados' transmite bien el efecto judicial en español sin ocultar el paralelismo con 'recordará'.
- source_word: הֵמָּה מִצְרַיִם יָשׁוּבוּ
  english_pob_choice: they will return to Egypt
  chosen_spanish: ellos volverán a Egipto
  alternatives_spanish:
  - volverán a Egipto
  - ellos regresarán a Egipto
  lexicon: HALOT
  rationale: 'Se conserva ''Egipto'' en el texto principal para mantener la tensión interpretativa del hebreo: posible retorno literal, o imagen de esclavitud/exilio. El pronombre enfático ''ellos'' refleja הֵמָּה sin forzar la sintaxis española.'
theological_decisions:
- issue: Sentido de 'volverán a Egipto'
  english_pob_reading: they will return to Egypt
  chosen_spanish_reading: ellos volverán a Egipto
  alternative_spanish_readings:
  - volverán a Egipto como imagen de esclavitud
  - volverán al cautiverio bajo la imagen de Egipto
  rationale: El texto hebreo nombra Egipto directamente. La traducción principal conserva esa referencia geográfica sin decidir entre retorno literal, imagen de esclavitud o exilio, preservando así la tensión profética documentada en el audit trail.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético y coincide sustancialmente con el audit trail inglés. No se adoptaron revisiones textuales adicionales; se preservó la rareza de זִבְחֵי הַבְהָבַי en la nota léxica, y se mantuvo la tensión interpretativa de 'volverán a Egipto'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme a la convención del proyecto para el Tetragrámaton.
  - Se mantuvo el paralelismo verbal y la cadencia profética sin añadir explicación interpretativa al cuerpo del versículo.
  - '''Iniquidad'' y ''pecados'' se conservaron como dos términos distintos para respetar el paralelismo hebreo.'
  - Se prefirió 'acepta' sobre una paráfrasis más larga para mantener brevedad y fuerza cultual.
