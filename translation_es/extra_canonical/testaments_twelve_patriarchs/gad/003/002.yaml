base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/003/002.yaml
  text: Whatever the one who hates may do is abominable. If anyone does the law of the Lord, the hater does not praise him. If anyone fears the Lord and desires what is righteous, the hater does not love him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:48Z'
    unchanged: false
    changes_summary: Adjusted the opening clause for more natural English word order ('Whatever ... is abominable'). Replaced 'someone' with 'anyone' for a slightly more formal register. Kept 'the hater' consistently for ὁ μισῶν.
translation:
  language: es
  text: Cuanto haga el que odia[a] es abominable. Si alguien practica la ley del Señor, el que odia no lo elogia. Si alguien teme al Señor y desea lo que es justo[b], el que odia no lo ama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego ὁ μισῶν: ''el que odia'' como personificación del odio o tipo moral del odiador.'
    reason: lexical_alternative
  - marker: b
    text: O 'lo recto'; griego τὸ δίκαιον. El revision_pass inglés prefirió 'lo que es justo/recto' como rendición más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶν ... ἐὰν ποιῇ ὁ μισῶν
  english_pob_choice: Whatever the one who hates may do
  chosen_spanish: Cuanto haga el que odia
  alternatives_spanish:
  - Todo lo que hace el que odia
  - Lo que el que odia haga
  lexicon: LSJ
  rationale: '''Cuanto haga'' captura el subjuntivo eventual ἐὰν ποιῇ con un giro español natural y formal.'
- source_word: βδελυκτόν
  english_pob_choice: abominable
  chosen_spanish: abominable
  alternatives_spanish:
  - detestable
  - execrable
  lexicon: LSJ
  rationale: Termino fuerte moral-religioso; 'abominable' preserva mejor la severidad de la denuncia de Gad.
- source_word: ποιῇ τὸν νόμον Κυρίου
  english_pob_choice: does the law of the Lord
  chosen_spanish: practica la ley del Señor
  alternatives_spanish:
  - cumple la ley del Señor
  - hace la ley del Señor
  lexicon: LSJ
  rationale: '''Practicar'' es el verbo natural en español para ''hacer la ley'' como obediencia activa.'
- source_word: οὐκ ἐπαινεῖ
  english_pob_choice: does not praise him
  chosen_spanish: no lo elogia
  alternatives_spanish:
  - no lo alaba
  - no lo aprueba
  lexicon: LSJ
  rationale: '''Elogiar'' captura ἐπαινέω como reconocimiento positivo público.'
- source_word: φοβεῖται Κύριον
  english_pob_choice: fears the Lord
  chosen_spanish: teme al Señor
  alternatives_spanish:
  - reverencia al Señor
  lexicon: LSJ
  rationale: Idioma bíblico tradicional claro; no hay necesidad de suavizar el sentido pacto-moral.
- source_word: θέλει τὸ δίκαιον
  english_pob_choice: desires what is right
  chosen_spanish: desea lo que es justo
  alternatives_spanish:
  - quiere lo recto
  - anhela la justicia
  lexicon: LSJ
  rationale: Expresa inclinación moral; 'lo que es justo' mantiene el registro ético elevado.
translation_notes:
  revision_awareness: El revision_pass inglés cambió el orden de la cláusula inicial a 'Whatever ... is abominable' y reemplazó 'someone' por 'anyone' para registro más formal. En español 'Cuanto haga ... es abominable' fluye naturalmente, y 'alguien' (no 'cualquiera') mantiene un registro formal sin redundancia.
  spanish_consistency_notes:
  - '''el que odia'' como rendición consistente de ὁ μισῶν a lo largo del capítulo.'
  - '''practicar'' para ποιεῖ con la ley, en línea con ''practicar la justicia'' del verso 1.'
  - '''el Señor'' para Κύριος en mayúscula.'
