translation:
  language: es
  text: Cuando Judá la vio[a], pensó que era una prostituta, porque se había cubierto su rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la consideró una prostituta”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאֶהָ
  english_pob_choice: When Judah saw her
  chosen_spanish: Cuando Judá la vio
  alternatives_spanish:
  - Y Judá la vio
  - Judá la vio
  lexicon: HALOT
  rationale: El verbo ראה significa 'ver'. En español, 'Cuando Judá la vio' refleja con naturalidad la sucesión narrativa del waw consecutivo, sin perder el matiz temporal que introduce la escena siguiente.
- source_word: וַיַּחְשְׁבֶהָ
  english_pob_choice: he thought she was
  chosen_spanish: pensó que era
  alternatives_spanish:
  - la consideró como
  - la tuvo por
  lexicon: HALOT
  rationale: חשב expresa aquí un juicio mental de Judá sobre la identidad de Tamar. 'Pensó que era' comunica con claridad una percepción equivocada y evita una formulación demasiado literal o pesada en español.
- source_word: לְזוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  lexicon: HALOT
  rationale: זונה denota una prostituta. 'Prostituta' es el equivalente moderno claro y fiel; 'ramera' es más arcaico y 'mujer prostituta' resulta innecesariamente torpe.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón de la conclusión de Judá. 'Porque' expresa de forma directa y natural la causalidad en español.
- source_word: כִסְּתָה פָּנֶיהָ
  english_pob_choice: she had covered her face
  chosen_spanish: se había cubierto el rostro
  alternatives_spanish:
  - había cubierto su rostro
  - se cubrió el rostro
  lexicon: HALOT
  rationale: כסה significa 'cubrir' y פָּנֶיהָ, literalmente, 'su rostro/cara'. 'Se había cubierto el rostro' conserva el valor perfecto de antecedente causal y suena más natural en español que una repetición posesiva más literal.
translation_notes:
  revision_awareness: El texto base en inglés no presenta revisiones sustantivas; la consulta de control indica alta concordancia y sin cambios necesarios, por lo que se preserva el sentido directo del hebreo sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre propio estándar.
  - Se conserva la referencia corporal con «rostro» para reflejar פָּנֶיהָ sin volverla demasiado clínica.
  - No se introduce terminología eclesiástica o moralizante ajena al enunciado narrativo.
