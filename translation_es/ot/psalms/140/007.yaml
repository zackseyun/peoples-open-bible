translation:
  language: es
  text: 'Dije a Yahvé[a]: «Tú eres mi Dios». Yahvé, escucha la voz de mis súplicas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dije al SEÑOR». El perfecto hebreo puede leerse como una afirmación en pasado o como una confesión presente en la oración poética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - He dicho
  - Yo dije
  lexicon: HALOT
  rationale: El perfecto hebreo aquí se entiende como una afirmación pasada en el marco de la oración. «Dije» conserva ese valor temporal y suena natural en español sin perder la fuerza confesional del verbo.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino YHWH de manera directa. Siguiendo la terminología del proyecto, se conserva «Yahvé» en el texto principal para reflejar el nombre pactual, no un título sustitutivo.
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi poderoso
  - mi Divinidad
  lexicon: HALOT
  rationale: En la dirección a YHWH, אֵל expresa claramente la relación de pacto como «Dios». El sufijo de primera persona se mantiene con «mi».
- source_word: אָתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  - Tú
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. En español se conserva con «Tú eres», que expresa con naturalidad la confesión enfática del hebreo.
- source_word: הַאֲזִינָה
  english_pob_choice: listen
  chosen_spanish: escucha
  alternatives_spanish:
  - atiende
  - oye
  lexicon: HALOT
  rationale: El imperativo de אזן implica prestar oído de manera atenta. «Escucha» transmite bien esa petición en español contemporáneo y mantiene el carácter suplicante.
- source_word: קוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el clamor de
  - el sonido de
  lexicon: HALOT
  rationale: La imagen hebrea de «voz» para una súplica audible se conserva literalmente. No se aplana a «clamor» porque el original usa explícitamente קוֹל.
- source_word: תַּחֲנוּנָי
  english_pob_choice: my pleas
  chosen_spanish: mis súplicas
  alternatives_spanish:
  - mis ruegos
  - mis peticiones
  - mis plegarias
  lexicon: HALOT
  rationale: El término denota súplica intensa por favor o misericordia. «Súplicas» conserva el matiz devocional y formal del hebreo, con un tono natural en español bíblico moderno.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso contiene el Tetragrámaton. El proyecto pide mantener «Yahvé» como forma principal en español para preservar el nombre revelado de Dios y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «I say» a «I said» en la revisión posterior para ajustarse al perfecto hebreo. La presente versión española sigue esa decisión revisada con «Dije», y conserva la forma de confesión directa y la petición final sin añadir elementos no sustentados por el texto.
  spanish_consistency_notes:
  - Se mantiene la segunda persona singular dirigida a Dios con mayúscula reverencial en «Tú» y «Yahvé».
  - «Súplicas» conserva un registro bíblico claro y evita suavizar el peso de תַּחֲנוּנִים.
  - La coma y las comillas cierran la confesión directa de forma natural en español.
  - La nota al pie queda anclada en «Yahvé[a]» para ofrecer la alternativa documentada sin alterar el texto principal.
