  rationale: Se ajustó una expresión española más natural para el segundo par cognado, preservando la idea de saqueo intensificado sin calco torpe. También se mantuvo la metáfora de «volver tu mano» y la nota léxica sobre «ombligo de la tierra», con anclaje claro. Los cambios son menores y no requieren adjudicación adicional.
