translation:
  language: es
  text: El justo come hasta saciar su alma[a], pero al vientre de los impíos le falta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta saciar su apetito». El hebreo נֶפֶשׁ (néfesh) puede significar «alma», «vida», «yo» o «apetito», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - una persona justa
  - el hombre justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado en un proverbio general. En español, «el justo» mantiene la fuerza proverbial y evita imponer el matiz masculino de manera innecesaria, aunque el inglés POB lo explicitó como masculine singular por su política de género gramatical.
- source_word: אֹכֵל
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  - comerá
  lexicon: HALOT
  rationale: El participio expresa una acción habitual o gnómica. El presente simple en español comunica bien una verdad general sin añadir aspecto progresivo ni futuro.
- source_word: לְשֹׂבַע
  english_pob_choice: to the satisfaction of
  chosen_spanish: hasta quedar satisfecho
  alternatives_spanish:
  - hasta la saciedad
  - para satisfacción de
  lexicon: HALOT
  rationale: La construcción indica comer hasta alcanzar suficiencia o plena satisfacción. «Hasta quedar satisfecho» conserva la idea de plenitud sin sonar rígidamente literal en español.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su apetito
  - su vida
  - su ser
  lexicon: HALOT
  rationale: Se mantiene el término antropológico «alma» para reflejar נפשׁ, porque el contexto permite tanto la idea de interioridad como la de apetito. La alternativa «apetito» es real, pero se deja como lectura secundaria porque el POB inglés preservó «soul» y añadió la nota lexical.
- source_word: וּבֶטֶן
  english_pob_choice: but the belly
  chosen_spanish: pero el vientre
  alternatives_spanish:
  - pero el estómago
  - pero la barriga
  lexicon: HALOT
  rationale: «Vientre» es el equivalente literal y bíblicamente adecuado para בטן en un contraste sapiencial. «Pero» reproduce bien el valor adversativo del ו en este paralelismo antitético.
- source_word: רְשָׁעִים
  english_pob_choice: of the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los culpables
  lexicon: HALOT
  rationale: «Impíos» es un término bíblico natural para רְשָׁעִים y mantiene el sentido de perversidad moral y religiosa. También encaja con el registro sapiencial sin perder claridad.
- source_word: תֶּחְסָר
  english_pob_choice: lacks
  chosen_spanish: carece
  alternatives_spanish:
  - le falta
  - queda sin
  - está en necesidad
  lexicon: HALOT
  rationale: El verbo expresa carencia o deficiencia. «Carece» mantiene la concisión proverbial del hebreo y el contraste con la satisfacción del justo.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en relación con la comida
  english_pob_reading: The Hebrew word can mean 'soul,' 'life,' 'self,' or 'appetite'; the main text keeps 'soul' and footnotes the alternative.
  chosen_spanish_reading: su alma, con nota de que también puede entenderse como su apetito
  alternative_spanish_readings:
  - su apetito
  - su vida
  - su ser
  rationale: 'No se borra la tensión lexical: en español, como en inglés, el contexto de comer permite pensar en apetito, pero el término hebreo también conserva una dimensión interior más amplia. Por eso se mantiene «alma» en el texto y se ofrece la alternativa en nota.'
  doctrine_reference: Antropología bíblica; sentido de נֶפֶשׁ en literatura sapiencial
- issue: Contraste sapiencial entre el justo y los impíos
  english_pob_reading: A righteous man ... but the belly of the wicked lacks.
  chosen_spanish_reading: El justo ... pero el vientre de los impíos carece.
  alternative_spanish_readings:
  - El justo ... pero el vientre de los malvados carece.
  - El justo ... pero el estómago de los impíos carece.
  rationale: Se conserva el contraste moral fuerte del proverbio sin suavizarlo. «Impíos» mantiene el peso bíblico de רְשָׁעִים y el paralelismo antitético con «el justo».
  doctrine_reference: Sabiduría bíblica; retribución moral en Proverbios
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés y el informe de acuerdo: no hubo cambios sustanciales, pero se atendió la tensión léxica de נֶפֶשׁ para reflejarla claramente en español sin eliminarla.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término estándar solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se prefirió «impíos» como equivalente bíblico de רְשָעִים por consistencia sapiencial.
  - Se evitó «soul» calcado y se conservó una nota para la alternativa semántica de נֶפֶשׁ.
  - La puntuación reproduce el paralelismo antitético con coma y «pero» de manera natural en español.
