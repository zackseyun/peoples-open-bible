translation:
  language: es
  text: 'y si llegan a recapacitar[a] en la tierra donde fueron llevados cautivos, y se arrepienten[b] y te suplican en la tierra de sus captores[c], diciendo: «Hemos pecado, hemos obrado perversamente y hemos actuado con maldad»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘traer de vuelta al corazón’ o ‘tomarlo a corazón’.
    reason: lexical_alternative
  - marker: b
    text: O ‘volver’ / ‘volverse atrás’.
    reason: alternative_reading
  - marker: c
    text: O ‘en la tierra de los que los llevaron cautivos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיבוּ אֶל לִבָּם
  english_pob_choice: come to their senses
  chosen_spanish: llegan a recapacitar
  alternatives_spanish:
  - toman a pecho
  - vuelven en sí
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la idea de ‘traer de vuelta al corazón’; el sentido idiomático es que reconocen su estado y cobran conciencia interior. ‘Recapacitar’ comunica bien esa toma de conciencia con tono natural en español, sin perder el matiz interior del corazón.
- source_word: בָּאָרֶץ אֲשֶׁר נִשְׁבּוּ שָׁם
  english_pob_choice: in the land where they were taken captive
  chosen_spanish: en la tierra donde fueron llevados cautivos
  alternatives_spanish:
  - en la tierra donde fueron hechos cautivos
  - en la tierra donde fueron deportados
  lexicon: HALOT
  rationale: El nifal de שׁבה denota ser llevado cautivo. ‘Llevados cautivos’ refleja con claridad la pasividad del verbo y mantiene el lenguaje bíblico sin sobretraducirlo.
- source_word: וְשָׁבוּ
  english_pob_choice: repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - vuelven
  - se vuelven atrás
  lexicon: HALOT
  rationale: En este contexto, después del recuerdo interior y antes de la súplica, שׁוב funciona como giro relacional y penitencial hacia Dios. ‘Se arrepienten’ expresa bien esa vuelta del corazón en español bíblico actual; ‘vuelven’ quedaría más abierto y podría sonar demasiado físico.
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  english_pob_choice: plead with you
  chosen_spanish: te suplican
  alternatives_spanish:
  - te imploran
  - te ruegan
  lexicon: HALOT
  rationale: El hitpael de חנן expresa petición intensa de favor. ‘Suplicar’ conserva la fuerza de la petición humilde y se integra de manera natural en español.
- source_word: בְּאֶרֶץ שֹׁבֵיהֶם
  english_pob_choice: in the land of those who took them captive
  chosen_spanish: en la tierra de sus cautivadores
  alternatives_spanish:
  - en la tierra de los que los llevaron cautivos
  - en la tierra de sus captores
  lexicon: HALOT
  rationale: El participio שֹׁבֵי־הֶם significa ‘los que los cautivan / llevaron cautivos’. ‘Cautivadores’ conserva la relación posesiva del hebreo y evita ampliar innecesariamente el sentido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Marcador introductorio estándar de discurso; ‘diciendo’ es directo y natural.
- source_word: חָטָאנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos cometido pecado
  lexicon: HALOT
  rationale: Confesión básica del verbo חטא. ‘Hemos pecado’ es la forma más directa y fiel en español.
- source_word: וְהֶעֱוִינוּ
  english_pob_choice: acted perversely
  chosen_spanish: hemos obrado perversamente
  alternatives_spanish:
  - hemos cometido iniquidad
  - hemos hecho lo torcido
  lexicon: HALOT
  rationale: El hifil de עוה expresa torcer/desviar. ‘Obrado perversamente’ conserva el matiz de deformación moral que el POB inglés quiso resaltar con ‘perversely’.
- source_word: רָשָׁעְנוּ
  english_pob_choice: we have acted wickedly
  chosen_spanish: hemos actuado malvadamente
  alternatives_spanish:
  - hemos sido impíos
  - hemos hecho lo malo
  lexicon: HALOT
  rationale: Rשע denota maldad/culpa. ‘Actuado malvadamente’ mantiene el paralelismo con los verbos anteriores y expresa el cierre intensivo de la tríada confesional.
theological_decisions:
- issue: Alcance penitencial de וְשָׁבוּ
  english_pob_reading: repent
  chosen_spanish_reading: se arrepienten
  alternative_spanish_readings:
  - vuelven
  - regresan
  rationale: El contexto une conciencia interior, súplica y confesión; por eso la idea no es simple regreso físico sino conversión penitencial. ‘Se arrepienten’ evita ambigüedad y conserva la lectura teológica del retorno a Yahvé.
  doctrine_reference: Translation philosophy §3, §5
- issue: Imagen del corazón en וְהֵשִׁיבוּ אֶל לִבָּם
  english_pob_reading: come to their senses
  chosen_spanish_reading: llegan a recapacitar
  alternative_spanish_readings:
  - toman a pecho
  - vuelven en sí
  rationale: La metáfora hebrea del ‘corazón’ apunta a reconocimiento interior que desemboca en arrepentimiento. La elección comunica la idea sin borrar la imagen subyacente, que queda preservada en la nota.
  doctrine_reference: Translation philosophy §6, §5
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés que prefirió ‘repent’ frente a ‘return’ para וְשָׁבוּ, evitando una lectura meramente espacial. También conserva la nota del hebraísmo de ‘corazón’ en וְהֵשִׁיבוּ אֶל לִבָּם y la alternativa lexical para בְּאֶרֶץ שֹׁבֵיהֶם.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el Tetragrámaton aparece explícito; este versículo no lo contiene, por lo que no se introduce aquí.
  - 'Se mantiene una tríada confesional diferenciada: ‘pecado’ / ‘perversamente’ / ‘malvadamente’, sin nivelar los tres verbos en un solo término.'
  - ‘Cautivos’ y ‘cautivadores’ conservan la relación semántica del hebreo sin introducir vocabulario eclesiástico ajeno al texto.
