  to: 'Y dijo[a]: «Vuelve a meter tu mano en tu seno». Él volvió a meter su mano en su seno, y al sacarla de su seno, he aquí[b], había vuelto como su carne.'
  rationale: Se hace un ajuste menor para mejorar la naturalidad idiomática del mandato físico en español («meter» en vez de «poner») sin apartarse del sentido causativo-restaurativo de שוב. También se precisa la nota explicativa para que identifique con claridad que la mano volvió a su estado normal, manteniendo esa explicitación fuera del texto principal.
