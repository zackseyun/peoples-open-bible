- from: Ahora bien, estaba en el corazón de David, mi padre, edificar una casa para el nombre de Yahvé[a], el Dios de Israel.
  to: Ahora bien, estuvo en el corazón de David mi padre edificar una casa para el nombre de Yahvé[a], el Dios de Israel.
  rationale: Se ajusta la forma verbal para un español más natural y fiel al estado/intención pasada del hebreo, se suaviza la puntuación para mejorar el flujo, y se corrige la nota léxica para que exprese correctamente la alternativa «templo» frente al literal «casa».
