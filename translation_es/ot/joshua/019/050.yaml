translation:
  language: es
  text: Conforme al mandato de Yahvé, le dieron la ciudad que pidió, Timnat-seraj, en la región montañosa de Efraín. Él edificó[a] la ciudad y habitó en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reconstruyó» o «restauró». El verbo hebreo puede significar «edificó» o, según el contexto, «reconstruyó/restauró».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי יְהוָה
  english_pob_choice: At the command of Yahweh
  chosen_spanish: Conforme al mandato de Yahvé
  alternatives_spanish:
  - Por orden de Yahvé
  - Según el mandato de Yahvé
  - Al mandato de Yahvé
  lexicon: HALOT
  rationale: El hebreo es un modismo que literalmente dice 'según la boca de', pero aquí expresa dirección autorizada. 'Conforme al mandato de Yahvé' conserva la idea de autoridad y suena natural en español, manteniendo el nombre divino conforme al estándar del proyecto.
- source_word: נָתְנוּ ל֗וֹ
  english_pob_choice: they gave him
  chosen_spanish: le dieron
  alternatives_spanish:
  - se lo dieron
  - le concedieron
  lexicon: HALOT
  rationale: נתן con objeto indirecto significa sencillamente 'dar'. 'Le dieron' es directo y fiel; 'concedieron' introduce un matiz más interpretativo que el hebreo no exige.
- source_word: הָעִיר אֲשֶׁר שָׁאַל
  english_pob_choice: the city that he asked for
  chosen_spanish: la ciudad que había pedido
  alternatives_spanish:
  - la ciudad que pidió
  - la ciudad que había solicitado
  lexicon: HALOT
  rationale: שׁאל aquí tiene el sentido de pedir o solicitar. En español, 'había pedido' refleja bien la relación anterior entre la petición y la concesión de la ciudad, sin exceder el valor del verbo.
- source_word: תִּמְנַת סֶרַח
  english_pob_choice: Timnath-serah
  chosen_spanish: Timnat-seraj
  alternatives_spanish:
  - Timnat-Seraj
  - Timnat Seraj
  lexicon: HALOT
  rationale: Es un topónimo, por lo que se translitera. Se usa 'j' final para representar la fricativa final del hebreo en una forma española accesible y consistente con la transliteración de nombres bíblicos.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en la tierra montañosa de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: הַר puede referirse al territorio montañoso, no a un monte único. 'Región montañosa' comunica bien el sentido geográfico en español moderno sin perder precisión.
- source_word: וַיִּבְנֶה אֶת הָעִיר
  english_pob_choice: He built the city
  chosen_spanish: Él edificó la ciudad
  alternatives_spanish:
  - Él construyó la ciudad
  - Él levantó la ciudad
  lexicon: HALOT
  rationale: בנה significa 'construir/edificar'. 'Edificó' conserva el valor verbal y mantiene un registro digno y bíblico, sin imponer la lectura contextual de 'reconstruyó' que el hebreo no obliga.
- source_word: וַיֵּשֶׁב בָּהּ
  english_pob_choice: and lived in it
  chosen_spanish: y habitó en ella
  alternatives_spanish:
  - y vivió en ella
  - y se estableció en ella
  lexicon: HALOT
  rationale: ישׁב puede significar habitar, vivir o asentarse. 'Habitó' preserva el tono bíblico y sigue siendo comprensible en español actual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. El estándar del proyecto es transliterarlo como 'Yahvé' en español, preservando el nombre propio de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de וַיִּבְנֶה en contexto narrativo
  english_pob_reading: He built the city
  chosen_spanish_reading: Él edificó la ciudad
  alternative_spanish_readings:
  - Él construyó la ciudad
  - Él reconstruyó la ciudad
  rationale: La revisión inglesa reciente optó por 'built' y descartó 'rebuilt' por ajuste más cercano al verbo. En español, 'edificó' refleja ese mismo valor léxico sin añadir la idea de reconstrucción.
  doctrine_reference: 'DOCTRINE.md: Translation accuracy and lexical restraint'
translation_notes:
  revision_awareness: La última revisión inglesa corrigió 'rebuilt' a 'built' para alinearse más estrechamente con el verbo hebreo בנה. La versión española sigue esa decisión evitando 'reconstruyó' y usando 'edificó'. También se conservó el nombre divino como Yahvé según la norma del proyecto.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar para יְהוָה.
  - Se translitera Timnat-seraj para conservar el nombre propio hebreo sin traducirlo.
  - '''Edificó'' y ''habitó'' conservan un registro bíblico natural sin arcaísmo excesivo.'
  - La nota al pie marca únicamente la alternativa léxica relevante en 'había pedido'.
