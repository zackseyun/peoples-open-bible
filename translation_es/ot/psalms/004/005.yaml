    rationale: La nota inglesa b era 'Or “speak in your hearts”' con razón de rendering previo; en español el texto principal ya dice 'hablen...', y la nota propuesta solo repite una forma singular menos fiel. No aporta una alternativa útil y además introduce el problema del singular.
