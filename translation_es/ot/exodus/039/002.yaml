revisions:
- from: Y hizo el efod de oro[a], azul, púrpura, carmesí[b] y lino finamente torcido.
  to: Y hizo el efod de oro, azul, púrpura, escarlata[a] y lino fino retorcido[b].
  rationale: 'La revisión conserva fielmente la sintaxis y los materiales del hebreo, pero mejora dos puntos: usa «escarlata» como equivalente más directo y bíblicamente reconocible para תּוֹלַעַת שָׁנִי, y corrige «lino finamente torcido» a «lino fino retorcido» para representar tanto שֵׁשׁ («lino fino») como מָשְׁזָר («retorcido/torcido»). También elimina la nota innecesaria sobre «oro» y deja solo notas léxicas realmente útiles.'
