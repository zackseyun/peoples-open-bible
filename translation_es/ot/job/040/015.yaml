translation:
  language: es
  text: Mira ahora a Behemoth[a], que hice junto con usted; come hierba como un buey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bestia»; muchos intérpretes entienden «Behemoth» como el nombre o la designación de una criatura grande específica, mientras que otros lo identifican con el hipopótamo u otro animal grande.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira ahora
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre el referente. «Mira» comunica esa función de forma natural y directa en español sin perder el tono exhortativo.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - pues
  - ya
  lexicon: HALOT
  rationale: Aquí expresa inmediatez discursiva más que cortesía; «ahora» mantiene el flujo de la exhortación divina.
- source_word: בְהֵמוֹת
  english_pob_choice: Behemoth
  chosen_spanish: Behemot
  alternatives_spanish:
  - la bestia
  - behemot
  - Behemot
  lexicon: HALOT
  rationale: Se conserva el nombre/designación transliterada para no resolver prematuramente la identificación zoológica del término. «Behemot» respeta la fuerza literaria del pasaje.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: which I made
  chosen_spanish: al que hice
  alternatives_spanish:
  - que hice
  - el cual hice
  - que yo hice
  lexicon: HALOT
  rationale: El relativo se adapta al español con valor personal/animado para la criatura descrita. «Hice» refleja עשה en sentido simple de crear o hacer, sin añadir matices no presentes.
- source_word: עִמָּךְ
  english_pob_choice: along with you
  chosen_spanish: junto contigo
  alternatives_spanish:
  - conmigo contigo
  - con ustedes
  - al mismo tiempo que tú
  lexicon: HALOT
  rationale: La preposición comunica acompañamiento en el acto creador. «Junto contigo» preserva esa relación sin forzar una localización espacial.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - césped
  - forraje
  lexicon: HALOT
  rationale: En español, «hierba» cubre bien el sentido de vegetación comestible y evita una restricción innecesaria a césped o pasto. Mantiene la imagen de alimento vegetal del símil.
- source_word: כַּבָּקָר
  english_pob_choice: like an ox
  chosen_spanish: como un buey
  alternatives_spanish:
  - como un toro
  - como ganado
  - como un buey de labor
  lexicon: HALOT
  rationale: El comparativo sing. colectivo se expresa con «buey», que resulta idiomático y vívido en español. Se mantiene el carácter rústico y concreto de la imagen sin cargarla de precisión zoológica innecesaria.
- source_word: יֹאכֵל
  english_pob_choice: he eats
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  - se alimenta de
  - él come
  lexicon: HALOT
  rationale: El verbo describe la acción habitual del animal. En español, el presente simple «come» es natural y suficiente; el sujeto implícito ya queda claro por el contexto.
theological_decisions:
- issue: Identificación de בְהֵמוֹת
  english_pob_reading: Treat as a named/designated creature and transliterate as 'Behemoth' rather than identifying it in the main text with a specific animal.
  chosen_spanish_reading: Tratarlo como criatura/designación nombrada y transliterar «Behemot», no identificarla en el texto principal con un animal concreto.
  alternative_spanish_readings:
  - «la bestia»
  - «hipopótamo»
  - «gran bestia»
  rationale: El hebreo y el contexto poético favorecen conservar el término sin cerrar la cuestión zoológica. La transliteración preserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica/literaria cuando el original no la resuelve explícitamente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no se requieren cambios textuales adicionales; se mantiene la decisión de preservar Behemot como designación transliterada y la imagen concreta del símil.'
  spanish_consistency_notes:
  - Se mantiene «Behemot» de forma consistente con la elección inglesa de transliteración.
  - Se usa un registro sobrio y publicable, evitando arcaísmos innecesarios.
  - «Hierba» y «buey» conservan la imaginería cotidiana del hebreo sin sobreinterpretar la especie.
  - El pronombre relativo «al que» ayuda a la fluidez española y conserva la referencia animada del hebreo.
