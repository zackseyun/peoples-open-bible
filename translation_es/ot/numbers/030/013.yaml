base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/013.yaml
  text: But if her husband indeed annuls them on the day he hears[a], then nothing that came from her lips—whether her vows or her binding obligation upon herself—shall stand. Her husband has annulled them[c][b], and Yahweh will forgive her.
  footnotes:
  - marker: a
    text: Or 'whatever proceeded from her lips.' The Hebrew literally says 'all the outgoing of her lips,' a legal expression covering all spoken commitments.
    reason: lexical_alternative
  - marker: b
    text: Or 'the binding obligation by which she bound herself.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, rendered 'the LORD' in keeping with the translation's standard practice.
    reason: alternative_reading
