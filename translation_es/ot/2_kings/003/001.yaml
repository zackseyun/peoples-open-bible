- from: Entonces Joram hijo de Acab comenzó a reinar sobre Israel en Samaria, en el año dieciocho[a] de Josafat rey de Judá, y reinó doce años.
  to: Jehoram hijo de Acab llegó a ser rey sobre Israel en Samaria en el año dieciocho de Josafat rey de Judá[a], y reinó doce años.
  rationale: Se ajusta el nombre a 'Jehoram' para reflejar más fielmente יְהוֹרָם y alinearse con el expediente inglés. Se reemplaza 'comenzó a reinar' por 'llegó a ser rey' para distinguir con más claridad la accesión del posterior resumen de duración ('reinó doce años'). Se simplifica el inicio quitando 'Entonces' del texto principal y dejando la alternativa más formal con 'Y' en nota, lo que mantiene la continuidad narrativa sin sobreinterpretar. No se requiere adjudicación especial.
