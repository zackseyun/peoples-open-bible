translation:
  language: es
  text: Y si de veras escuchan[a] mis mandamientos que yo les mando hoy, para amar a Yahvé[b] su Dios y servirle con todo su corazón y con toda su alma[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «si escuchan con diligencia»; el giro también puede expresar «si obedecen cuidadosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: YHWH, tradicionalmente traducido «el SEÑOR»; aquí se conserva el nombre divino como «Yahvé».'
    reason: lexical_alternative
  - marker: c
    text: O «con toda su vida» o «con todo su ser» para «alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y sucederá que, si
  - Y será, si
  lexicon: HALOT
  rationale: La fórmula inicial introduce una prótasis condicional; en español, «Y si» conserva el enlace discursivo y la condición sin una perífrasis artificial como «será que».
- source_word: שָׁמֹעַ תִּשְׁמְעוּ
  english_pob_choice: you indeed listen
  chosen_spanish: escuchan de verdad
  alternatives_spanish:
  - escuchan con diligencia
  - obedecen diligentemente
  - escuchan atentamente
  lexicon: HALOT
  rationale: El hebreo intensifica el verbo de oír/escuchar con una repetición enfática. «Escuchan de verdad» preserva la fuerza intensiva y el matiz de respuesta obediente sin volver mecánicamente a «obedecer» en el cuerpo principal.
- source_word: אֶל מִצְוֺתַי
  english_pob_choice: to my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis mandatos
  lexicon: HALOT
  rationale: «Mandamientos» mantiene el registro de pacto y el carácter normativo de מִצְוֺת; en español es la opción más clara y tradicionalmente comprensible sin perder precisión.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo les mando hoy
  alternatives_spanish:
  - que yo les estoy mandando hoy
  - que yo les estoy ordenando hoy
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción en curso en el discurso. «Les mando hoy» conserva la actualidad del mandato y su marco temporal sin sonar forzado en español.
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: para amar
  alternatives_spanish:
  - a amar
  - con el fin de amar
  lexicon: HALOT
  rationale: La forma final expresa propósito. En español, «para amar» comunica naturalmente la relación de finalidad del infinitivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar la transliteración reverente «Yahvé» en el texto principal, en vez de sustituir el nombre por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El posesivo plural de segunda persona se expresa de forma natural con «su» en español latinoamericano; el contexto marca claramente que se dirige al pueblo.
- source_word: וּלְעָבְדוֹ
  english_pob_choice: and to serve him
  chosen_spanish: y servirle
  alternatives_spanish:
  - y servirlo
  - y adorarle
  lexicon: HALOT
  rationale: עבד abarca servicio devoto y obediencia de pacto. «Servirle» conserva amplitud semántica mejor que restringirlo a «adorarle».
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser interior
  - con todo su querer
  lexicon: HALOT
  rationale: «Corazón» es el equivalente establecido para לֵבָב y conserva la referencia al centro de voluntad, pensamiento y afecto.
- source_word: וּבְכָל נַפְשְׁכֶם
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda su alma
  alternatives_spanish:
  - y con toda su vida
  - y con todo su ser
  lexicon: HALOT
  rationale: «Alma» mantiene la fórmula bíblica tradicional y la resonancia teológica; en esta clase de pasajes también puede implicar «vida» o «ser», sentido que se deja abierto.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La política del proyecto para el Tetragrámaton es usar una transliteración del nombre divino en el texto principal. En español, «Yahvé» es la forma establecida para ese criterio editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza semántica de שָׁמֹעַ תִּשְׁמְעוּ
  english_pob_reading: you indeed listen
  chosen_spanish_reading: escuchan de verdad
  alternative_spanish_readings:
  - escuchan diligentemente
  - obedecen diligentemente
  - escuchan atentamente
  rationale: El hebreo incluye la idea de oír con atención y responder adecuadamente. El texto principal preserva «escuchar»; la obediencia implícita se deja sin sobretraducir, pero queda sugerida por el contexto del pacto y del mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Sentido de נֶפֶשׁ en la fórmula «con todo ... alma»
  english_pob_reading: with all your soul
  chosen_spanish_reading: con toda su alma
  alternative_spanish_readings:
  - con toda su vida
  - con todo su ser
  rationale: «Alma» mantiene la forma bíblica común y la continuidad con el paralelismo hebreo. Las alternativas aclaran el posible alcance existencial, pero no son necesarias en el texto principal.
  doctrine_reference: 'DOCTRINE.md: lexical notes on נֶפֶשׁ'
translation_notes:
  revision_awareness: 'El inglés POB ya pasó por revisión reciente sin cambios sustanciales, con acuerdo alto y solo observaciones menores. Esta versión española conserva las decisiones auditadas: traducción del Tetragrámaton como Yahvé, retención del énfasis de שמע mediante un verbo de escucha con nota, y mantenimiento de la fórmula covenantal «corazón/alma» sin expandirla innecesariamente.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente del nombre divino como «Yahvé», coherente con la terminología del proyecto.
  - Se evita reemplazar el valor intensivo de שמע por una paráfrasis excesiva; la nota preserva la alternativa «obedecer con diligencia».
  - «Corazón» y «alma» conservan la fórmula bíblica tradicional y funcionan bien en español eclesial amplio.
  - El plural de segunda persona se resuelve con «su» en estilo latinoamericano general, sin ambigüedad contextual.
