translation:
  language: es
  text: 'Entonces midió el ancho de la entrada de la puerta[a]: diez codos, y la longitud[b] de la puerta: trece codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entrada» o «portal» en vez de «puerta»; el hebreo שַׁעַר puede denotar la estructura del acceso como un todo, no solo la abertura.
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones interpretan esta segunda medida de manera más explicativa (por ejemplo, como la profundidad o el tramo del acceso), pero el hebreo dice simplemente «la longitud de la puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Él midió
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la acción siguiente en la secuencia de la visión. «Entonces» conserva la progresión narrativa de manera natural en español.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - breadth
  lexicon: HALOT
  rationale: En español, «ancho»/«ancho de» suena más natural y claro para una medida arquitectónica; mantiene el sentido dimensional horizontal sin volverlo técnico de más.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - abertura
  - acceso
  lexicon: HALOT
  rationale: El término designa la abertura o entrada de la puerta. «Entrada» es la opción más idiomática y fiel en español.
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - el portón
  lexicon: HALOT
  rationale: En este contexto arquitectónico de Ezequiel 40, el hebreo puede referir tanto la estructura de la puerta como el complejo de acceso. «Puerta» funciona bien en español y conserva la referencia sin forzar una glosa interpretativa como «portal» o «portón».
- source_word: עֶשֶׂר אַמּוֹת
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez codos de ancho
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para reflejar la medida original, tal como hace la POB en inglés con «cubits».
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - profundidad
  lexicon: HALOT
  rationale: «Longitud» corresponde de forma directa a la medida lineal indicada por el hebreo y mantiene el paralelismo con el primer dato dimensional.
- source_word: שְׁלֹשׁ עֶשְׂרֵה אַמּוֹת
  english_pob_choice: thirteen cubits
  chosen_spanish: trece codos
  alternatives_spanish:
  - trece codos de largo
  lexicon: HALOT
  rationale: Se vierte literalmente el número y la unidad, sin añadir una interpretación como «de largo», porque el hebreo dice simplemente la medida.
translation_notes:
  revision_awareness: El texto sigue el sentido y la estructura del registro en inglés de la POB, sin cambios de revisión señalados en el expediente más reciente; se mantiene la lectura literal de las dos medidas y se conserva la alternativa léxica de שַׁעַר en nota.
  spanish_consistency_notes:
  - Se mantiene «codos» para la unidad de medida, en paralelo con «cubits» en la POB inglesa.
  - Se usa «puerta» como término base y se deja constancia en nota de la posible amplitud semántica de שַׁעַר.
  - Se conserva la estructura con dos colones para reflejar las dos medidas separadas del hebreo.
