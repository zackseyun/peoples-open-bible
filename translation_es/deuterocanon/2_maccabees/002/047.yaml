lexical_decisions:
- source_word: ἔτι τε
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - y asimismo
  - y además
  lexicon: LSJ
  rationale: Conserva el valor aditivo de una lista en curso sin volver la frase pesada o excesivamente formal.
- source_word: τοὺς ... πολέμους
  english_pob_choice: the wars
  chosen_spanish: las guerras
  alternatives_spanish:
  - las campañas
  - los conflictos
  lexicon: LSJ
  rationale: πολέμους se refiere de manera amplia a guerras o conflictos militares; «guerras» es la equivalencia más directa y natural en español.
- source_word: πρὸς
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en contra de
  - frente a
  lexicon: LSJ
  rationale: En este contexto con πολέμους, πρὸς expresa oposición o hostilidad dirigida hacia un enemigo; «contra» comunica esa relación de manera clara.
- source_word: Ἀντίοχον τὸν Ἐπιφανῆ
  english_pob_choice: Antiochus Epiphanes
  chosen_spanish: Antíoco Epífanes
  alternatives_spanish:
  - Antíoco el Epífanes
  - Antíoco el Ilustre
  lexicon: LSJ
  rationale: Se conserva el nombre histórico transliterado, con adaptación al español para la forma usual de antropónimos y epítetos reales.
- source_word: τὸν τούτου υἱὸν Εὐπάτορα
  english_pob_choice: his son Eupator
  chosen_spanish: su hijo Eupátor
  alternatives_spanish:
  - su hijo Eupator
  - el hijo de este, Eupátor
  lexicon: LSJ
  rationale: Mantiene la relación filial y la identificación propia del nombre; la acentuación española ayuda a la lectura sin alterar el valor del nombre.
