translation:
  text: and your people experienced a marvelous journey[b][a], but they found a strange death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'underwent an astonishing journey.' The verb can carry the sense of experiencing or undergoing, not merely attempting.
    reason: lexical_alternative
  - marker: b
    text: Or 'they encountered an unfamiliar death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαός
  chosen: people
  alternatives:
  - nation
  lexicon: LSJ
  rationale: Standard rendering for a collective people; with possessive 'your' it naturally refers to God's people.
- source_word: παράδοξον
  chosen: extraordinary
  alternatives:
  - unexpected
  - marvelous
  - strange
  lexicon: LSJ
  rationale: The adjective denotes something contrary to expectation or astonishing. 'Extraordinary' captures the positive, wondrous sense in context better than the more ambiguous 'strange'.
- source_word: ὁδοιπορίαν
  chosen: journey
  alternatives:
  - travel
  - march
  - wayfaring
  lexicon: LSJ
  rationale: Refers to travel or a journey. 'Journey' is natural English and fits the wilderness/sea-crossing context without becoming archaic.
- source_word: πειράσῃ
  chosen: experienced
  alternatives:
  - attempted
  - underwent
  - proved
  lexicon: LSJ
  rationale: Although the verb can mean 'try/test,' with an accusative object here it is best taken as 'experience/undergo.' This avoids the misleading sense that the people merely attempted a journey.
- source_word: ξένον
  chosen: strange
  alternatives:
  - foreign
  - unfamiliar
  - extraordinary
  lexicon: LSJ
  rationale: The adjective means 'strange' or 'foreign.' In relation to death, 'strange death' preserves the Greek's starkness and the contrast with Israel's extraordinary journey.
- source_word: εὕρωσι
  chosen: found
  alternatives:
  - met with
  - encountered
  lexicon: LSJ
  rationale: A common idiom in Greek for coming upon or meeting with something. 'Found' is literal and idiomatic enough in English here.
- source_word: θάνατον
  chosen: death
  alternatives:
  - destruction
  lexicon: LSJ
  rationale: The ordinary meaning is 'death'; no need to generalize to 'destruction'.
- source_word: ἐκεῖνοι
  chosen: those men
  alternatives:
  - they
  - those ones
  lexicon: LSJ
  rationale: The demonstrative sets up a strong contrast with 'your people.' 'Those men' makes the contrast explicit in English, though the referent remains the Egyptians from context.
