  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas arquitectónicas son en general adecuadas: «vestíbulo», «cámaras laterales», «templo». La principal corrección es de notas y de leve naturalidad estilística, no de glosario doctrinal.'
