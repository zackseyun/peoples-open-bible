theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the doctrine's gender-accurate policy, the literal expression is preserved unless context clearly calls for a broader idiomatic rendering. Here the phrase functions as the covenant people designation, but the literal familial wording remains intelligible in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of אָדָם
  chosen_reading: every man
  alternative_readings:
  - all the people
  rationale: The doctrine specifies 'man / humankind (context)' for אָדָם. In this military context, the term contrasts human inhabitants with livestock and is distributive under כָּל; 'every man' preserves the singular collective force and the gender-accurate policy, while a broader alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md §Contested terms: אָדָם *adam*; §Translation philosophy 4'
