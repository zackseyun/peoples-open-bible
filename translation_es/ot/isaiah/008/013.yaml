translation:
  language: es
  text: A Yahvé de los ejércitos, a él lo reconocerán como santo[a]. Que él sea su temor[b], y que él sea su pavor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «a él santificarán». El hebreo significa reconocer o tratar a Yahvé como santo, no hacerlo santo.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa dos sustantivos paralelos: «temor» y luego un término más intenso, aquí traducido como «pavor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton, siguiendo la política del proyecto de no sustituirlo por un título como «el SEÑOR». «Yahvé» es la forma española estable y natural para el nombre revelado.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: El hebreo expresa el título compuesto de YHWH con צְבָאוֹת. En español, «de los ejércitos» conserva el alcance militar/celestial sin forzar un cultismo menos transparente como «huestes».
- source_word: אֹתוֹ תַקְדִּישׁוּ
  english_pob_choice: you shall regard him as holy
  chosen_spanish: a él lo santificaréis
  alternatives_spanish:
  - lo trataréis como santo
  - lo reconoceréis como santo
  - lo consideraréis santo
  lexicon: HALOT
  rationale: Se preserva la fuerza verbal del hiphil de קדשׁ. «Santificaréis» mantiene la relación con el original y con la tradición bíblica, mientras que el objeto enfático «a él» refleja el hebreo y evita entender que el ser humano hace santo a Dios.
- source_word: מוֹרַאֲכֶם
  english_pob_choice: your fear
  chosen_spanish: vuestro temor
  alternatives_spanish:
  - vuestro miedo
  - el objeto de vuestro temor
  - a quien temeréis
  lexicon: HALOT
  rationale: '«Temor» reproduce mejor el campo semántico del sustantivo hebreo que «miedo», y permite conservar la estructura predicativa breve del hebreo: él es el temor reverente/exclusivo del pueblo.'
- source_word: מַעֲרִצְכֶם
  english_pob_choice: your dread
  chosen_spanish: vuestro pavor
  alternatives_spanish:
  - vuestro terror
  - vuestro espanto
  - el objeto de vuestro pavor
  lexicon: HALOT
  rationale: Se distingue del primer término para conservar el paralelismo intensificado del hebreo. «Pavor» expresa un temor más fuerte que «temor» y refleja la progresión retórica sin aplastarla en un simple sinónimo.
- source_word: וְהוּא ... וְהוּא
  english_pob_choice: Let him be ... and let him be ...
  chosen_spanish: Él será ... y él será ...
  alternatives_spanish:
  - Que él sea ... y que él sea ...
  - Él es ... y él es ...
  lexicon: HALOT
  rationale: 'En español, la construcción nominal hebrea se expresa con naturalidad como futuro/copulativa exhortativa: «Él será...». Mantiene el carácter directivo del contexto sin introducir una perífrasis más explícita que el hebreo no requiere.'
theological_decisions:
- issue: Cómo expresar el nombre divino YHWH en el versículo
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: El texto hebreo usa directamente יְהוָה, no un título genérico. Por fidelidad al proyecto, se conserva el nombre propio «Yahvé». El complemento «de los ejércitos» refleja צְבָאוֹת sin ocultar el nombre divino detrás de una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor teológico de «santificar» a Yahvé
  english_pob_reading: you shall regard him as holy
  chosen_spanish_reading: a él lo santificaréis
  alternative_spanish_readings:
  - lo reconoceréis como santo
  - lo trataréis como santo
  - lo consideraréis santo
  rationale: 'La traducción mantiene la tensión teológica del hebreo: no implica que los humanos hagan a Dios santo, sino que lo reconozcan y traten como santo. «Santificaréis» preserva la fuerza del verbo y la relación con el texto fuente, y puede explicarse en nota para evitar una lectura causal equivocada.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #6 (readable modern Spanish, not flattening theological weight)'
- issue: Intensificación paralela de «temor» y «pavor»
  english_pob_reading: your fear ... your dread
  chosen_spanish_reading: vuestro temor ... vuestro pavor
  alternative_spanish_readings:
  - vuestro temor ... vuestro terror
  - vuestro miedo ... vuestro terror
  rationale: El hebreo emplea dos términos emparentados pero no idénticos. Se mantiene la distinción para conservar el paralelismo y la intensificación retórica. «Temor» / «pavor» funciona en español sin borrar esa progresión.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension where the source preserves it'
translation_notes:
  revision_awareness: 'Se tomó como base el paquete fuente canónico de Isaías 8:13 y el audit trail inglés POB, sin depender mecánicamente de la versión inglesa. Se conservaron las decisiones clave del proyecto: uso de «Yahvé» para יְהוָה, mantenimiento del título «de los ejércitos» para צְבָאוֹת, y una traducción que preserve la tensión entre «santificar» y «reconocer como santo». No hubo revisiones aplicadas en el paquete inglés, por lo que la presente versión sigue su lectura estable con adaptación idiomática al español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» por consistencia con el estándar del proyecto.
  - «Santificaréis» conserva el verbo fuerte del original y queda aclarado por nota para evitar malentendido causal.
  - Se distingue «temor» de «pavor» para no nivelar el paralelismo hebreo.
  - Se usa una sintaxis española natural sin diluir la estructura exhortativa del hebreo.
