revisions:
- from: Según la orden de Yahvé, los hijos de Israel partían[a], y según la orden de Yahvé acampaban. Todos los días en que la nube permanecía sobre el tabernáculo, permanecían acampados.
  to: Por mandato de Yahvé, los hijos de Israel parten[a], y por mandato de Yahvé acampan. Todos los días que la nube permanece sobre el tabernáculo, permanecen acampados.
  rationale: La revisión conserva el contenido del borrador pero fortalece la fidelidad al modismo עַל־פִּי con «por mandato de Yahvé», que en español transmite mejor la idea de dirección autoritativa. También usa presente gnómico para expresar la norma general del movimiento y del campamento de Israel en este contexto, manteniendo el paralelismo y la claridad. Se preservan «Yahvé», «los hijos de Israel» y «tabernáculo» conforme al proyecto.
