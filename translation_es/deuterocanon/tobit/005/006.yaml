translation:
  language: es
  text: 'Y el ángel le dijo: «Iré contigo, y conozco bien el camino[a], y me he alojado con Gabael, nuestro hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tengo experiencia en el camino», es decir, «conozco bien la ruta». El paralelo semítico amplía esta idea al conocimiento de los caminos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορεύσομαι
  english_pob_choice: I will go
  chosen_spanish: Iré
  alternatives_spanish:
  - Iré de viaje
  - Iré contigo
  lexicon: LSJ
  rationale: El futuro de πορεύομαι expresa ir o ponerse en camino. «Iré» reproduce con naturalidad la promesa de acompañar a Tobías sin añadir matices innecesarios.
- source_word: μετὰ σοῦ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - junto a ti
  lexicon: LSJ
  rationale: Con genitivo, μετά indica compañía. «Contigo» es la forma española más directa y natural en este contexto de acompañamiento.
- source_word: τῆς ὁδοῦ ἐμπειρῶ
  english_pob_choice: I am familiar with the way
  chosen_spanish: estoy familiarizado con el camino
  alternatives_spanish:
  - conozco bien el camino
  - tengo experiencia en el camino
  - estoy experimentado en el camino
  lexicon: LSJ
  rationale: ἐμπειρῶ sugiere experiencia probada o familiaridad práctica. «Estoy familiarizado con el camino» conserva esa idea mejor que una simple afirmación de conocimiento, y evita sobrerenderlo como una habilidad técnica.
- source_word: ὁδός
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la ruta
  - el sendero
  - la vía
  lexicon: LSJ
  rationale: ὁδός puede significar camino, ruta o vía. En español, «camino» es claro, idiomático y apto para un contexto de viaje real.
- source_word: παρὰ Γαβαὴλ
  english_pob_choice: with Gabael
  chosen_spanish: con Gabael
  alternatives_spanish:
  - en casa de Gabael
  - junto a Gabael
  lexicon: LSJ
  rationale: παρά con una persona puede implicar haber alojado o permanecido con ella. En español, «he posado con Gabael» comunica la relación de hospedaje sin forzar una especificación no dicha explícitamente por el griego.
- source_word: τὸν ἀδελφὸν ἡμῶν
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro pariente
  - nuestro compatriota
  lexicon: LSJ
  rationale: ἀδελφός significa literalmente hermano. Aunque el término puede abarcar parentesco amplio o solidaridad de pueblo, la traducción literal preserva la formulación del griego.
- source_word: ηὐλίσθην
  english_pob_choice: I have lodged
  chosen_spanish: he posado
  alternatives_spanish:
  - he pernoctado
  - me he alojado
  - he pasado la noche
  lexicon: LSJ
  rationale: αὐλίζομαι se usa para alojarse o pasar la noche. «He posado» es una forma breve y comprensible en español para expresar alojamiento en viaje, manteniendo el registro narrativo del pasaje.
theological_decisions:
- issue: Identidad del sujeto designado como ὁ ἄγγελος
  english_pob_reading: the angel
  chosen_spanish_reading: el ángel
  alternative_spanish_readings:
  - el mensajero
  rationale: El griego usa ὁ ἄγγελος, y en el contexto de Tobit la figura es un ser angelical. «El ángel» conserva la identificación tradicional del texto sin ocultar el sustantivo común.
  doctrine_reference: Tobit 5:4-6; uso narrativo de ángeles en la literatura deuterocanónica
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «I am familiar with the way» frente a «I know the way well» para reflejar mejor τῆς ὁδοῦ ἐμπειρῶ. En español, «estoy familiarizado con el camino» refleja esa misma corrección y mantiene la fuerza de experiencia práctica. También se conservó la nota alternativa para el matiz de experiencia en la ruta.
  spanish_consistency_notes:
  - Se usa «ángel» como sustantivo común, sin mayúscula innecesaria.
  - Se prefiere «camino» para ὁδός por naturalidad bíblica y claridad en español.
  - Se mantiene «nuestro hermano» para no debilitar la designación familiar del griego.
  - «He posado» conserva el tono de hospedaje del verbo de viaje sin añadir detalles como «en casa de» que el griego no exige explícitamente.
