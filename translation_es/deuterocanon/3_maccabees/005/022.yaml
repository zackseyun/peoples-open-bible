translation:
  language: es
  text: Y no pasaban el tiempo de la noche tanto en dormir, sino en idear toda clase de mofas[a] para los que parecían miserables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'escarnios' o 'burlas'; el griego ἐμπαιγμούς abarca actos de ridiculización, no solo bromas ligeras.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεχρίζαντο
  english_pob_choice: spend
  chosen_spanish: pasaban el tiempo
  alternatives_spanish:
  - gastaban el tiempo
  - empleaban el tiempo
  - pasaban la noche
  lexicon: LSJ
  rationale: El verbo griego, en este contexto con τὸν χρόνον τῆς νυκτός, expresa cómo ocupaban las horas de la noche. En español, 'pasaban el tiempo' comunica de manera natural ese uso de las horas sin forzar una valoración moral que el verbo por sí solo no exige.
- source_word: οὐχ οὕτως ... ὡς
  english_pob_choice: not so much ... as
  chosen_spanish: tanto ... sino
  alternatives_spanish:
  - no tanto ... como
  - no ... sino
  lexicon: Gramática griega
  rationale: La construcción comparativa correlative contrapone dos actividades. 'Tanto ... sino' en español mantiene la oposición y resulta fluido en un registro bíblico moderno.
- source_word: εἰς ὕπνον
  english_pob_choice: in sleep
  chosen_spanish: en dormir
  alternatives_spanish:
  - en el sueño
  - para dormir
  - durmiendo
  lexicon: LSJ
  rationale: La frase indica la esfera en que se invertía la noche. 'En dormir' conserva la referencia a la actividad de dormir y permite una comparación clara con la acción paralela de idear burlas.
- source_word: παντοίως
  english_pob_choice: every kind of
  chosen_spanish: toda clase de
  alternatives_spanish:
  - de toda clase de
  - de todas las maneras de
  - de cualquier tipo de
  lexicon: LSJ
  rationale: El adverbio intensifica la amplitud de lo que se maquinaba. 'Toda clase de' reproduce bien esa amplitud en español y suena natural con 'burlas'.
- source_word: μηχανᾶσθαι
  english_pob_choice: devising
  chosen_spanish: idear
  alternatives_spanish:
  - maquinar
  - tramarse
  - construir
  lexicon: LSJ
  rationale: El verbo denota contrivar o planear con intención. 'Idear' conserva la deliberación sin cargar el texto con una connotación conspirativa más fuerte de la que exige el pasaje.
- source_word: τοῖς ταλαιπώροις δοκοῦσιν
  english_pob_choice: for those who seemed miserable
  chosen_spanish: para los que parecían miserables
  alternatives_spanish:
  - para los que parecían desdichados
  - para los que eran tenidos por miserables
  - para aquellos a quienes veían miserables
  lexicon: LSJ
  rationale: La expresión presenta a las víctimas desde la perspectiva de quienes las observan. 'Parecían miserables' conserva el matiz perceptivo de δοκοῦσιν y la dureza de ταλαιπώροις, sin agregar información externa.
- source_word: ἐμπαιγμούς
  english_pob_choice: mockery
  chosen_spanish: burlas
  alternatives_spanish:
  - mofas
  - burlas crueles
  - escarnio
  lexicon: LSJ
  rationale: El sustantivo designa actos de ridiculización o escarnio. 'Burlas' es un equivalente natural y suficientemente amplio para abarcar el sentido hostil del término.
translation_notes:
  revision_awareness: El texto griego y el auditorio inglés coinciden estrechamente en el sentido general; la revisión inglesa reciente ajustó la relación del dativo hacia 'for those' para reflejar más directamente el griego. La versión española sigue ese valor relacional con 'para los que', manteniendo la perspectiva de los observadores sobre las víctimas. No hay variantes textuales relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra terminología de sustitución porque no aparece vocabulario divino en este versículo.
  - Se mantuvo un registro bíblico moderno y claro, con 'burlas' como equivalente natural de ἐμπαιγμούς.
  - '''Miserables'' conserva la dureza de ταλαιπώροις y permite la nota alternativa sobre ''escarnios'' o ''mofas''.'
