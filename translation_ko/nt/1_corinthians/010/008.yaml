  text: Nor should we commit sexual immorality[a], as some of them committed sexual immorality[b], and twenty-three thousand fell in one day.
  footnotes:
  - marker: a
    text: Or 'died' or 'were struck down'; the Greek says 'fell,' a common way of referring to death under judgment.
    reason: lexical_alternative
  - marker: b
    text: Numbers 25:9 reports twenty-four thousand. Paul here says twenty-three thousand fell 'in one day,' which may distinguish the number who died that day from the larger total, though the translation preserves Paul's wording without harmonization.
    reason: cross_reference
