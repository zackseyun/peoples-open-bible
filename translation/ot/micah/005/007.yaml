id: MIC.5.7
reference: Micah 5:7
source:
  edition: WLC
  text: וְ/הָיָה֩ שְׁאֵרִ֨ית יַעֲקֹ֜ב בַּ/גּוֹיִ֗ם בְּ/קֶ֨רֶב֙ עַמִּ֣ים רַבִּ֔ים כְּ/אַרְיֵה֙ בְּ/בַהֲמ֣וֹת יַ֔עַר כִּ/כְפִ֖יר בְּ/עֶדְרֵי צֹ֑אן אֲשֶׁ֧ר אִם עָבַ֛ר וְ/רָמַ֥ס וְ/טָרַ֖ף וְ/אֵ֥ין מַצִּֽיל׃
translation:
  text: And the remnant of Jacob will be among the nations[a], in the midst of many peoples, like a lion among the beasts of the forest, like a young lion among flocks of sheep, which, if it passes through, tramples and tears[b], and there is none to rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beasts of the forest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which, when it passes through, tramples and tears to pieces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it shall be
  - Then ... will be
  lexicon: HALOT
  rationale: The waw + qatal here introduces a future result in prophetic discourse. 'Will be' gives clear modern English while preserving the predictive force.
- source_word: שְׁאֵרִית יַעֲקֹב
  chosen: the remnant of Jacob
  alternatives:
  - the remainder of Jacob
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually appropriate rendering for שְׁאֵרִית in prophetic literature, carrying the covenantal-survivor sense without paraphrase.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם broadly means 'nations/peoples.' In this prophetic context 'nations' is the most natural and least interpretively loaded English rendering; 'Gentiles' would import a later Jewish/Christian contrast not required by the Hebrew.
- source_word: בְּקֶרֶב עַמִּים רַבִּים
  chosen: in the midst of many peoples
  alternatives:
  - among many peoples
  - in the heart of many peoples
  lexicon: HALOT
  rationale: בְּקֶרֶב is literally 'in the midst/middle of.' Retaining 'in the midst of' preserves the spatial imagery and poetic parallelism with 'among the nations.'
- source_word: כְּאַרְיֵה
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: HALOT
  rationale: Standard simile marker with the common term for lion. 'Like a lion' is idiomatic modern English.
- source_word: בְּבַהֲמוֹת יַעַר
  chosen: among the animals of the forest
  alternatives:
  - among the beasts of the forest
  lexicon: HALOT
  rationale: בְּהֵמוֹת can be rendered 'beasts' or 'animals.' 'Animals' is more accessible modern English; 'of the forest' preserves the genitive relation. 'Beasts' is preserved as an alternative because it is traditional and vivid.
- source_word: כִּכְפִיר
  chosen: like a young lion
  alternatives:
  - like a lion cub
  lexicon: HALOT
  rationale: כְּפִיר denotes a young, vigorous lion. 'Young lion' is the most idiomatic and common English equivalent in biblical contexts.
- source_word: בְּעֶדְרֵי צֹאן
  chosen: among flocks of sheep
  alternatives:
  - among sheepfolds
  - among the flocks
  lexicon: HALOT
  rationale: עֶדֶר is 'flock/herd'; with צֹאן the sense is specifically sheep/small livestock. 'Flocks of sheep' makes the prey image explicit in natural English.
- source_word: אֲשֶׁר אִם עָבַר
  chosen: which, if it passes through
  alternatives:
  - which, when it passes through
  - that, if it goes through
  lexicon: HALOT
  rationale: The relative particle plus אִם introduces a conditional or more generally contingent action. 'If it passes through' is formally close and preserves the open-ended force; 'when' would overstate certainty in English.
- source_word: וְרָמַס
  chosen: tramples
  alternatives:
  - treads down
  - crushes underfoot
  lexicon: HALOT
  rationale: רמס conveys trampling underfoot. 'Tramples' is concise, vivid, and natural in sequence with the following verb.
- source_word: וְטָרַף
  chosen: and tears
  alternatives:
  - and tears to pieces
  - and devours
  lexicon: HALOT
  rationale: טרף in predatory contexts denotes tearing prey. 'Tears' preserves the violent image without adding words not explicit in the Hebrew; 'tears to pieces' is a possible expansion but slightly interpretive.
- source_word: וְאֵין מַצִּיל
  chosen: and there is none to rescue
  alternatives:
  - with no one to deliver
  - and none can rescue
  lexicon: HALOT
  rationale: The idiom states the absence of any rescuer. 'Rescue' fits the immediate predatory imagery better than the more theological-sounding 'deliver,' while preserving the sense.
