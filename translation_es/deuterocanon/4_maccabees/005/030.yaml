translation:
  language: es
  text: Ni siquiera me sacarás los ojos y me derretirás las entrañas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis vísceras». El término griego se refiere a los órganos internos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδʼ ἂν
  english_pob_choice: You will not even
  chosen_spanish: Ni siquiera si
  alternatives_spanish:
  - No siquiera
  - Ni aun si
  - Y ni siquiera
  lexicon: LSJ
  rationale: La combinación intensifica la negación y, en este contexto, expresa desafío o imposibilidad enfática. En español, «ni siquiera si» conserva bien esa fuerza sin sonar forzado.
- source_word: ἐκκόψεις
  english_pob_choice: gouge out
  chosen_spanish: sacas
  alternatives_spanish:
  - arrancas
  - sacas fuera
  - extirpas
  lexicon: LSJ
  rationale: El verbo griego es literalmente «cortar fuera / sacar». En español, con «ojos» como objeto, «sacar» comunica la violencia de forma natural; «arrancar» o «extirpar» serían posibles, pero menos directos o menos idiomáticos aquí.
- source_word: τὰ ὄμματα
  english_pob_choice: my eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - mis ojos
  - mis pupilas
  lexicon: LSJ
  rationale: El sustantivo ordinario plural significa «ojos». Aunque el inglés POB puso posesivo explícito, el griego lo expresa con μου; en español, el posesivo puede omitirse por economía y naturalidad sin perder el sentido, pero se mantiene en la concordancia implícita del contexto.
- source_word: τὰ σπλάγχνα
  english_pob_choice: my inward parts
  chosen_spanish: las entrañas
  alternatives_spanish:
  - mis entrañas
  - mis vísceras
  - mis órganos internos
  lexicon: LSJ
  rationale: El término designa las entrañas o vísceras internas. «Entrañas» es la equivalencia española más fiel y transparente; «vísceras» es posible, pero más técnico; «órganos internos» atenúa el impacto imagístico del griego.
- source_word: τήξεις
  english_pob_choice: melt away / melt
  chosen_spanish: me derrites
  alternatives_spanish:
  - las derrites
  - las haces derretirse
  - las consumes
  lexicon: LSJ
  rationale: El verbo significa «fundir / derretir» y también puede implicar hacer que algo se consuma o se deshaga. En español, «derrites» conserva la imagen concreta de destrucción física. Se usa pronombre de objeto indirecto/acentuación estilística con «me» para reflejar la posesión del griego sin sobrecargar la frase.
theological_decisions:
- issue: Violencia corporal gráfica sin atenuación
  english_pob_reading: 'The English POB preserves the vivid bodily imagery: gouge out my eyes and melt my inward parts.'
  chosen_spanish_reading: 'La traducción conserva la crudeza corporal: sacar los ojos y derretir las entrañas.'
  alternative_spanish_readings:
  - atenuar la imagen con «dañar» o «lastimar»
  - usar solo «matar» o «destruir»
  rationale: El griego es deliberadamente gráfico y no meramente genérico. La versión española debe mantener la imaginería violenta, porque suavizarla borraría parte del sentido retórico del pasaje.
  doctrine_reference: Sin referencia doctrinal específica; fidelidad léxica al discurso martirial del texto
- issue: Posesivo explícito frente a posesivo implícito en español
  english_pob_reading: my eyes / my inward parts
  chosen_spanish_reading: «los ojos» y «las entrañas», con posesivo implícito en el contexto verbal
  alternative_spanish_readings:
  - «mis ojos» y «mis entrañas»
  - repetir posesivo explícito en ambos sustantivos
  rationale: El griego marca posesión con μου. En español, la posesión puede quedar suficientemente clara por la primera persona verbal («me sacas», «me derrites») y la referencia inmediata, sin repetir innecesariamente el posesivo.
  doctrine_reference: No aplica
- issue: Equivalente español para σπλάγχνα
  english_pob_reading: my inward parts / Or 'my entrails.' The Greek term refers to the internal organs.
  chosen_spanish_reading: «entrañas» como término principal, sin explicitar una glosa interpretativa en el texto principal
  alternative_spanish_readings:
  - «vísceras»
  - «órganos internos»
  - «entranas» con nota explicativa
  rationale: «Entrañas» es natural en español y mantiene la fuerza afectiva y corporal del término. La nota puede conservar la alternativa léxica para lectores que prefieran una glosa más anatómica.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó «away» para un registro más literal; por eso la redacción española evita cualquier adición equivalente de alejamiento o progresión y se mantiene en una formulación directa: «derrites».'
  spanish_consistency_notes:
  - Se prefirió «entrañas» por ser el equivalente español más vivo y fiel a σπλάγχνα, en lugar de «vísceras» o «órganos internos».
  - Se mantuvo el tiempo verbal en segunda persona singular («sacas», «derrites») para corresponder al futuro/gnómico de la amenaza en el griego y al tono directo del inglés auditado.
  - No se introdujo «Cristo», «SEÑOR» ni terminología doctrinal ajena al pasaje.
  - La nota al pie usa una alternativa léxica breve y transparente, acorde con el criterio POB de preservar opciones significativas.
