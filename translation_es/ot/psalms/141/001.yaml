translation:
  language: es
  text: Salmo de David. Yahvé[a], te invoco; ven pronto a mí. Presta oído a mi voz cuando te invoco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se vierte «SEÑOR». Alternativamente, «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, el término hebreo designa un salmo/canto poético. 'Salmo' es el equivalente español establecido y fiel al género literario.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל aquí marca asociación o adscripción en el encabezado. 'De David' conserva esa relación sin cerrar indebidamente la cuestión de autoría.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del hebreo, conforme a la terminología base del proyecto en español. 'Yahvé' preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: קְרָאתִיךָ
  english_pob_choice: I call to you
  chosen_spanish: te invoco
  alternatives_spanish:
  - te llamo
  - he clamado a ti
  lexicon: HALOT
  rationale: El perfecto en contexto de oración funciona como apelación viva y actual. 'Te invoco' comunica el acto de dirigirse a Dios con tono natural y reverente en español.
- source_word: חוּשָׁה לִּי
  english_pob_choice: hurry to me
  chosen_spanish: apresúrate a mí
  alternatives_spanish:
  - ven pronto a mí
  - date prisa en venir a mí
  lexicon: HALOT
  rationale: La forma imperativa expresa urgencia. 'Apresúrate a mí' conserva la petición de rapidez y la dirección hacia el hablante con registro poético.
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Da oído
  alternatives_spanish:
  - Escucha
  - Presta oído
  lexicon: HALOT
  rationale: La idea básica es oír con atención. 'Da oído' reproduce mejor la fuerza poética y la solemnidad del hebreo que un simple 'escucha'.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - el sonido de mi voz
  lexicon: HALOT
  rationale: El sustantivo es literalmente 'voz'. Se mantiene ese valor directo, dejando que el contexto de oración aporte el matiz de súplica.
- source_word: בְּקָרְאִי לָךְ
  english_pob_choice: when I call to you
  chosen_spanish: cuando te invoco
  alternatives_spanish:
  - mientras te invoco
  - al invocarte
  lexicon: HALOT
  rationale: La construcción temporal con ב se expresa de forma natural en español con 'cuando'. Se repite 'invocar' para conservar cohesión léxica con la primera cola del verso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton, y el proyecto español pide conservar el nombre divino en lugar de sustituirlo por un título. 'Yahvé' es la forma establecida en español del nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La propuesta sigue el texto hebreo directo y coincide con la auditoría inglesa de alta concordancia; no se detectan revisiones aplicadas en el registro fuente, por lo que se mantiene la estructura poética y la correspondencia semántica sin expansión interpretativa.
  spanish_consistency_notes:
  - 'Se preserva la secuencia breve de peticiones del versículo: invocación, urgencia y petición de atención.'
  - Se mantiene 'Yahvé' como terminología regular para יְהוָה en español, en línea con el estándar del proyecto.
  - '''Te invoco'' y ''cuando te invoco'' unifican el campo léxico de la oración sin introducir variación semántica innecesaria.'
