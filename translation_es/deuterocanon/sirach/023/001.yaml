translation:
  language: es
  text: Señor, Padre y Soberano[a] de mi vida, no me abandones a su consejo[b]; no permitas que caiga entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dueño» o «Maestro». El griego δέσποτα expresa autoridad fuerte y se distingue de κύριε, «Señor».
    reason: lexical_alternative
  - marker: b
    text: Lit. «en su consejo». El griego puede referirse a su consejo, plan, designio o deliberación; en español «a su consejo» expresa bien la idea de ser entregado a ello.
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: LSJ
  rationale: Vocativo dirigido a Dios. En español, «Señor» es la equivalencia natural y reverente para este uso; mantiene el valor de invocación divina sin necesidad de explicarlo más.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Papá
  lexicon: LSJ
  rationale: Es un vocativo directo a Dios. «Padre» conserva la relación filial y la forma litúrgica inteligible en español.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  - Maestro
  lexicon: LSJ
  rationale: Se distingue de κύριε en la misma cláusula. «Dueño» conserva la idea de autoridad y posesión sobre la vida, y evita aplanar ambos títulos en un solo «Señor».
- source_word: ζωῆς μου
  english_pob_choice: of my life
  chosen_spanish: de mi vida
  alternatives_spanish:
  - sobre mi vida
  - de mi existencia
  lexicon: LSJ
  rationale: La construcción genitiva se expresa de forma directa y natural como «de mi vida». Mantiene la relación entre los títulos y aquello sobre lo que ejercen señorío.
- source_word: μὴ ἐγκαταλίπῃς με
  english_pob_choice: do not abandon me
  chosen_spanish: no me abandones
  alternatives_spanish:
  - no me dejes
  - no me abandones
  lexicon: LSJ
  rationale: «Abandonar» transmite bien ἐγκαταλείπω con la fuerza de dejar desamparado o entregado a otros. En español suena más fuerte y fiel que un simple «dejar».
- source_word: ἐν βουλῇ αὐτῶν
  english_pob_choice: to their counsel
  chosen_spanish: a su consejo
  alternatives_spanish:
  - en su consejo
  - a su plan
  - a sus designios
  lexicon: LSJ
  rationale: El griego literalmente dice «en su consejo», pero el audit trail inglés decidió una equivalencia idiomática. En español, «a su consejo» comunica mejor la idea de ser entregado o dejado bajo su designio; «consejo» conserva la ambigüedad entre consejo, plan y designio.
- source_word: μὴ ἀφῇς με
  english_pob_choice: do not let me
  chosen_spanish: no permitas que
  alternatives_spanish:
  - no me dejes
  - no consientas que
  lexicon: LSJ
  rationale: ἀφίημι aquí tiene fuerza permisiva. «No permitas que» expresa con claridad la negativa a dejar que ocurra lo siguiente en español natural.
- source_word: πεσεῖν
  english_pob_choice: fall
  chosen_spanish: caiga
  alternatives_spanish:
  - caer
  - tropezar
  - desmoronarme
  lexicon: LSJ
  rationale: 'El infinitivo de πίπτω se vierte con el valor verbal implícito en español: «que caiga». Es claro y no añade interpretación innecesaria.'
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - among ellos
  - por ellos
  lexicon: LSJ
  rationale: La frase griega es comprimida y puede sugerir caer dentro de su esfera o en medio de ellos. «Entre ellos» refleja bien la decisión revisada del inglés («among them») y mantiene abierta la posibilidad de influencia o cercanía hostil.
theological_decisions:
- issue: 'Doble vocativo divino: κύριε y δέσποτα'
  english_pob_reading: Lord, Father and Master of my life
  chosen_spanish_reading: Señor, Padre y Dueño de mi vida
  alternative_spanish_readings:
  - Señor, Padre y Maestro de mi vida
  - Señor, Padre y Soberano de mi vida
  rationale: La oración acumula títulos y no conviene fusionarlos. «Señor» y «Dueño» distinguen dos términos griegos cercanos pero no idénticos; así se conserva la fuerza retórica y la diferencia léxica.
  doctrine_reference: 'DOCTRINE.md: translate titles; preserve lexical distinction where the source stacks distinct vocatives'
- issue: Valor de ἐν αὐτοῖς al final de la frase
  english_pob_reading: do not let me fall among them
  chosen_spanish_reading: no permitas que caiga entre ellos
  alternative_spanish_readings:
  - no permitas que caiga en ellos
  - no permitas que caiga por ellos
  rationale: El griego es breve y admite varias relaciones de esfera o agente. «Entre ellos» sigue la revisión inglesa y conserva la idea de caer en medio de su círculo o bajo su influencia, sin cerrar indebidamente la ambigüedad.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve genuine ambiguity'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió «among them» para ἐν αὐτοῖς. En español se siguió esa decisión con «entre ellos», manteniendo además la ambigüedad contextual del griego.
  spanish_consistency_notes:
  - Se preservó la distinción entre κύριε y δέσποτα con «Señor» y «Dueño», evitando aplanar ambos en una sola forma.
  - Se evitó traducir automáticamente βουλή como solo «plan» para no perder su amplitud de consejo, designio o deliberación.
  - Se mantuvo un tono reverente y bíblico, pero con español moderno y fluido.
  - Se usó «entre ellos» para reflejar la decisión revisada del inglés y la posible referencia a caer dentro de su esfera o en medio de su grupo.
