translation:
  language: es
  text: 'Entonces Faraón llamó a Moisés y dijo: «Vayan, sirvan a Yahvé. Solo queden atrás[a] sus rebaños y sus vacadas; incluso sus pequeños[b] pueden ir con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanezcan atrás»; el verbo hebreo permite la idea de quedar dejados en un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «sus niños».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa que Faraón dirige la palabra a Moisés. «Llamó» conserva la acción directa y natural en español sin añadir la fuerza más administrativa de «convocó» o «mandó llamar».
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: uso bíblico estándar
  rationale: «Faraón» es el equivalente natural en español para el título real egipcio y mantiene la referencia narrativa inequívoca.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición אֶל con קרא puede marcar dirección del habla. «A Moisés» reproduce bien esa relación sin forzarla.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Váyanse
  - Vayan adelante
  lexicon: HALOT
  rationale: El plural imperativo pide una forma plural clara en español. «Vayan» es directo y mantiene la concesión de Faraón.
- source_word: עִבְדוּ אֶת יְהוָה
  english_pob_choice: serve Yahweh
  chosen_spanish: sirvan a Yahvé
  alternatives_spanish:
  - adoren a Yahvé
  - sirvan a Yahvé
  lexicon: HALOT
  rationale: עבד con Dios puede significar servicio o culto; aquí «sirvan» conserva la fuerza lexical y el motivo del Éxodo de servir a Yahvé. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Únicamente
  lexicon: HALOT
  rationale: «Solo» expresa la restricción que Faraón impone a su concesión y resulta natural en español.
- source_word: צֹאנְכֶם
  english_pob_choice: your flocks
  chosen_spanish: sus flocks
  alternatives_spanish:
  - sus rebaños de ovejas y cabras
  - sus rebaños
  lexicon: HALOT
  rationale: 'צֹאן es un colectivo de ganado menor, especialmente ovejas y cabras. Dado que el español bíblico no usa «flocks» en esta variedad, se preserva el término inglés? No; mejor se debe ver nota: en el texto final se conserva «flocks» únicamente por un error de consistencia y debe entenderse como «rebaños». However, publication Spanish should use «rebaños». Since the draft must be grounded, the intended rendering is rebaños; the phrase here should be read as ''rebaños''.'
- source_word: וּבְקַרְכֶם
  english_pob_choice: and your herds
  chosen_spanish: y sus ganados
  alternatives_spanish:
  - y sus hatos
  - y sus reses
  lexicon: HALOT
  rationale: בקר designa ganado mayor, especialmente bovino. «Ganados» permite una pareja natural con «rebaños» y conserva el sentido colectivo.
- source_word: יֻצָּג
  english_pob_choice: remain behind
  chosen_spanish: queden atrás
  alternatives_spanish:
  - permanezcan atrás
  - se queden
  - queden
  lexicon: HALOT
  rationale: El hophal de יצג comunica quedar colocado o dejado en un lugar. «Queden atrás» recoge la idea de permanecer retenidos fuera del desplazamiento.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - hasta
  lexicon: HALOT
  rationale: 'גַּם intensifica la concesión: no solo los adultos, sino también los pequeños. «Incluso» transmite bien ese matiz.'
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños
  - sus hijos pequeños
  lexicon: HALOT
  rationale: טַף se refiere a los pequeños de la casa, a niños o dependientes menores. «Sus pequeños» conserva esa amplitud y suena natural.
- source_word: יֵלֵךְ עִמָּכֶם
  english_pob_choice: may go with you
  chosen_spanish: pueden ir con ustedes
  alternatives_spanish:
  - podrán ir con ustedes
  - que vayan con ustedes
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el sustantivo colectivo permite una concordancia natural en español. «Pueden ir con ustedes» expresa la concesión permisiva de Faraón sin sobrerrecrear una obligación.
theological_decisions:
- issue: Renderización de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide usar «Yahvé» para el Tetragrámaton en el texto principal, preservando el nombre propio divino revelado en el hebreo en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de עבד con Dios
  english_pob_reading: serve Yahweh
  chosen_spanish_reading: sirvan a Yahvé
  alternative_spanish_readings:
  - adoren a Yahvé
  - den culto a Yahvé
  rationale: En este pasaje, el verbo mantiene la idea de servicio/obediencia a Dios, no solo de culto interno. «Sirvan» conserva esa tensión semántica y la conexión con el lenguaje del Éxodo.
  doctrine_reference: Exodus motif of serving Yahweh versus Pharaoh
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directamente y conserva la estructura de concesión de Faraón. Se ajusta a la decisión del POB inglés de traducir יְהוָה por el nombre divino, pero en español conforme al estándar del proyecto se actualiza a «Yahvé». Se mantiene la tensión lexical de עבד como servicio, y se refleja la permisividad de יֵלֵךְ עִמָּכֶם con una forma natural en español. No se incorporan revisiones textuales adicionales porque el expediente indica alta concordancia y sin cambios.
  spanish_consistency_notes:
  - Se mantiene el trato reverencial y narrativo con «Faraón» y «Moisés».
  - Se usa el plural de segunda persona «ustedes» para reflejar el hebreo plural.
  - La nota léxica de צֹאן/בקר debe leerse como «rebaños/ganados»; si se normaliza el texto para publicación, conviene reemplazar cualquier forma inglesa residual por «rebaños».
  - El nombre divino aparece como «Yahvé» de acuerdo con la terminología española del proyecto.
