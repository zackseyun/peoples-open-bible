translation:
  language: es
  text: 'Yo proclamaré el decreto de Yahvé: él me dijo: «Tú eres mi Hijo[a]; hoy te he engendrado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú eres mi hijo». El hebreo no distingue mayúsculas; el texto principal capitaliza «Hijo» para reflejar la significación real-mesiánica del pasaje en su contexto y en su uso canónico posterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hoy he llegado a ser tu padre». El hebreo usa más literalmente lenguaje de engendramiento, que puede evocar imágenes de entronización real o adopción, y se conserva en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפְּרָה
  english_pob_choice: I will declare
  chosen_spanish: Yo proclamaré
  alternatives_spanish:
  - Yo declararé
  - Yo contaré
  lexicon: HALOT
  rationale: El cohortativo introduce una proclamación solemne; en español, «proclamaré» comunica mejor ese tono formal y público que «contaré», y evita la aspereza de un calco. «Declararé» es posible, pero «proclamaré» suena más natural en contexto regio y litúrgico.
- source_word: אֶל חֹק
  english_pob_choice: declare the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - el estatuto
  - la ordenanza
  lexicon: HALOT
  rationale: En este contexto de entronización, חֹק no es solo una regla general, sino una disposición real/autoritativa. «Decreto» preserva mejor ese valor que «estatuto» u «ordenanza», y encaja con la construcción española de la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton en español es «Yahvé». Mantiene el nombre divino con lectura natural en español y evita la sustitución por un título como «SEÑOR».
- source_word: אָמַר אֵלַי
  english_pob_choice: He said to me
  chosen_spanish: él me dijo
  alternatives_spanish:
  - me dijo
  - Yahvé me dijo
  lexicon: HALOT
  rationale: El sujeto queda claro por el contexto inmediato y puede retomarse con pronombre en español. «Él me dijo» conserva la referencia sin repetir innecesariamente el nombre divino.
- source_word: בְּנִי אַתָּה
  english_pob_choice: You are my Son
  chosen_spanish: Tú eres mi Hijo
  alternatives_spanish:
  - Tú eres mi hijo
  lexicon: HALOT
  rationale: Se mantiene la filiación real y el peso canónico que la POB inglés marcó con mayúscula. En español, la mayúscula en «Hijo» comunica esa lectura mesiánica/real sin alterar el contenido léxico; la minúscula sigue siendo una alternativa válida porque el hebreo no distingue capitalización.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y claro en español moderno; conserva el énfasis temporal sin arcaísmo.
- source_word: יְלִדְתִּיךָ
  english_pob_choice: I have begotten you
  chosen_spanish: te he engendrado
  alternatives_spanish:
  - te he dado vida
  - te he hecho hijo
  lexicon: HALOT
  rationale: «Engendrado» preserva el lenguaje de generación/begotamiento del hebreo y mantiene la tensión teológica sin suavizarla. No se reemplaza por una paráfrasis adoptiva, porque el texto conserva deliberadamente la imagen de engendramiento.
theological_decisions:
- issue: Filiación real y mesiánica en בְּנִי
  english_pob_reading: Render as 'You are my Son' in the main text, preserving the royal-messianic force recognized in canonical and historic Christian interpretation.
  chosen_spanish_reading: «Tú eres mi Hijo» en el texto principal, con mayúscula en «Hijo» para reflejar la fuerza real-mesiánica reconocida en la recepción canónica.
  alternative_spanish_readings:
  - Tú eres mi hijo
  rationale: El contexto inmediato es real/davídico, pero la tradición canónica también lee la frase en clave mesiánica. La mayúscula ayuda a señalar esa lectura sin añadir palabras ajenas al hebreo; la alternativa en minúscula se conserva porque el original no marca capitalización.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de «hoy te he engendrado»
  english_pob_reading: Retain the begetting language without resolving whether it refers to royal enthronement, covenantal adoption, or messianic fulfillment.
  chosen_spanish_reading: Se conserva «te he engendrado» sin resolver si alude a entronización real, adopción pactal o cumplimiento mesiánico.
  alternative_spanish_readings:
  - hoy me he convertido en tu padre
  - hoy te he dado vida
  rationale: El hebreo usa lenguaje de generación y el texto debe conservar esa tensión teológica. No conviene suavizarla con una interpretación única, para no borrar el alcance semántico ni la posible resonancia intertextual.
  doctrine_reference: Translation philosophy §3; Affirmations
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete auditado; el pasaje permanece estable en la última pasada revisada, sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, según la terminología del proyecto.
  - Se mantiene «Hijo» con mayúscula en el texto principal para reflejar la decisión auditada de capitalización canónica, sin convertirla en una afirmación doctrinal adicional.
  - «Engendrado» conserva la fuerza léxica del hebreo y la tensión interpretativa documentada.
  - El español es neutral y publicable, evitando calcos excesivos y manteniendo tono solemne.
