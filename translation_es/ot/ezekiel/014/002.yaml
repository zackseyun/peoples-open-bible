lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: En esta fórmula profética, וַיְהִי introduce la secuencia narrativa. En español, «vino» reproduce de manera natural la llegada de la palabra sin cargar una expresión más literal como «sucedió», que aquí añade formulación pero no sentido adicional.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: La construcción דְבַר יְהוָה es la fórmula profética estándar. «Palabra» conserva tanto la forma establecida como la fuerza revelatoria del término mejor que «mensaje», que sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Para el Tetragrámaton, el español del proyecto usa «Yahvé» como forma estable, reverente y legible. Mantiene el nombre propio divino y evita sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: El hebreo expresa dirección hacia el hablante. «A mí» es la equivalencia natural en español y conserva el destinatario personal de la palabra.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: En la introducción de discurso directo, לֵאמֹר funciona como conector formulaico. «Diciendo» reproduce esa transición de manera natural en español y mantiene el tono profético.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el nombre divino, no un título. En español se traslada como «Yahvé» para preservar la referencia al nombre personal de Dios y la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia y no requiere revisión sustantiva; el verso mantiene la fórmula profética estándar con la única decisión destacada de la representación del nombre divino.
  spanish_consistency_notes:
  - Se conserva el orden y la concisión de la fórmula hebrea.
  - «Yahvé» se usa de manera consistente con la política del proyecto para יהוה.
  - La coma final prepara la cita directa siguiente, como en la estructura del original.
