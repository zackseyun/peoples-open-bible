base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/027.yaml
  text: You shall make two rings of gold and put them on the two shoulder-pieces of the ephod[a], underneath, on its front side, opposite its seam[b], above the skillfully woven band of the ephod.
  footnotes:
  - marker: a
    text: Or 'its joining' or 'its attachment point' for 'its seam.' The Hebrew refers broadly to the place where the ephod is joined together.
    reason: lexical_alternative
  - marker: b
    text: Or 'the woven waistband of the ephod.' The Hebrew חֵשֶׁב denotes the ephod's specially made band or binding piece.
    reason: lexical_alternative
