id: EZR.5.14
reference: Ezra 5:14
source:
  edition: WLC
  text: וְ֠/אַף מָאנַיָּ֣/א דִֽי בֵית אֱלָהָ/א֮ דִּ֣י דַהֲבָ֣/ה וְ/כַסְפָּ/א֒ דִּ֣י נְבוּכַדְנֶצַּ֗ר הַנְפֵּק֙ מִן הֵֽיכְלָ/א֙ דִּ֣י בִֽ/ירוּשְׁלֶ֔ם וְ/הֵיבֵ֣ל הִמּ֔וֹ לְ/הֵיכְלָ֖/א דִּ֣י בָבֶ֑ל הַנְפֵּ֨ק הִמּ֜וֹ כּ֣וֹרֶשׁ מַלְכָּ֗/א מִן הֵֽיכְלָ/א֙ דִּ֣י בָבֶ֔ל וִ/יהִ֨יבוּ֙ לְ/שֵׁשְׁבַּצַּ֣ר שְׁמֵ֔/הּ דִּ֥י פֶחָ֖ה שָׂמֵֽ/הּ־־־־׃
translation:
  text: Also[a], the gold and silver vessels of the house of God, which Nebuchadnezzar had taken out from the temple that was in Jerusalem and brought them to the temple of Babylon—Cyrus the king took them out from the temple of Babylon and gave them to one named Sheshbazzar, whom he had appointed governor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and gave them to Sheshbazzar—his name—whom he had made governor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Aramaic connective/additive particle introducing an additional item in the report. 'Also' is natural English and preserves the additive force without over-translating.
- source_word: מָאנַיָּא
  chosen: vessels
  alternatives:
  - articles
  - utensils
  lexicon: HALOT
  rationale: Refers to temple objects/implements. 'Vessels' is the standard and suitably concrete rendering in cultic context.
- source_word: בֵית אֱלָהָא
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Kept here rather than harmonizing to 'temple' in order to preserve the source expression, while 'temple' is used for הֵיכְלָא later in the verse.
- source_word: דִּי דַהֲבָה וְכַסְפָּא
  chosen: gold and silver
  alternatives:
  - of gold and silver
  lexicon: HALOT
  rationale: 'Material genitives describing the vessels. English idiom naturally places the materials attributively: ''gold and silver vessels.'''
- source_word: הַנְפֵּק
  chosen: had taken out
  alternatives:
  - took out
  - removed
  lexicon: HALOT
  rationale: 'The verbal form narrates Nebuchadnezzar''s prior action relative to the surrounding report. English past perfect clarifies sequence: he had taken them from Jerusalem before bringing them to Babylon.'
- source_word: הֵיכְלָא
  chosen: temple
  alternatives:
  - palace
  - sanctuary
  lexicon: HALOT
  rationale: In this context the referent is the Jerusalem temple and the temple in Babylon. 'Temple' best matches the cultic setting; 'palace' would be misleading here.
- source_word: וְהֵיבֵל הִמּוֹ
  chosen: and brought them
  alternatives:
  - and carried them
  lexicon: HALOT
  rationale: Straightforward rendering of the verb plus 3mp pronoun object, referring back to the vessels.
- source_word: כּוֹרֶשׁ מַלְכָּא
  chosen: Cyrus the king
  alternatives:
  - King Cyrus
  lexicon: HALOT
  rationale: Both are acceptable; 'Cyrus the king' follows the Aramaic order more closely while remaining idiomatic English.
- source_word: וִיהִיבוּ לְשֵׁשְׁבַּצַּר
  chosen: and gave them to one named Sheshbazzar
  alternatives:
  - and gave them to Sheshbazzar
  - and delivered them to Sheshbazzar
  lexicon: HALOT
  rationale: The following שְׁמֵהּ explicitly notes 'his name,' so the English brings that into the phrase as 'one named Sheshbazzar' to avoid a wooden repetition while preserving the identification formula.
- source_word: שְׁמֵהּ
  chosen: named
  alternatives:
  - his name was
  - whose name was
  lexicon: HALOT
  rationale: Compresses the Aramaic naming formula into natural English without loss of meaning.
- source_word: פֶחָה
  chosen: governor
  alternatives:
  - prefect
  - provincial governor
  lexicon: HALOT
  rationale: Standard rendering for the Persian administrative title; accessible and accurate.
- source_word: שָׂמֵהּ
  chosen: had appointed
  alternatives:
  - appointed
  - made
  lexicon: HALOT
  rationale: 'The verb indicates official installation into office. Past perfect fits the sequence: Cyrus gave the vessels to Sheshbazzar, who had been appointed governor.'
