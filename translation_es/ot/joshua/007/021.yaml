base_translation:
  language: en
  yaml_path: translation/ot/joshua/007/021.yaml
  text: I saw among the spoil one beautiful cloak from Shinar[a], two hundred shekels of silver, and one bar of gold weighing fifty shekels. I coveted them and took them, and look, they are hidden in the ground inside my tent[c][b], with the silver underneath it.
  footnotes:
  - marker: a
    text: Hebrew literally 'a tongue of gold'; the phrase likely refers to a tongue-shaped piece, rendered here as 'bar of gold.' Traditional English versions often have 'wedge of gold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one fine robe from Shinar.' The Hebrew term can refer to a splendid outer garment or mantle.
    reason: lexical_alternative
  - marker: c
    text: 'The final pronoun is feminine singular, likely referring to the cloak: ''the silver underneath it.'''
    reason: lexical_alternative
