translation:
  language: es
  text: Y quitaré de su boca los nombres de los baales[a], y ya no se recordarán por nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ya no se mencionarán». El verbo hebreo puede significar tanto «ser recordados» como «ser mencionados», y en este contexto ambas ideas expresan el fin del culto a Baal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  english_pob_choice: And I will remove
  chosen_spanish: Y quitaré
  alternatives_spanish:
  - Y removeré
  - Y apartaré
  lexicon: HALOT
  rationale: El hifil de סור expresa hacer que algo se aparte o se quite. «Quitaré» comunica con naturalidad esa acción causativa en español y mantiene el tono profético de promesa.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - los nombres-títulos
  - las designaciones
  lexicon: HALOT
  rationale: El plural de שֵׁם conserva la referencia a los nombres invocados o asociados a estas deidades. «Los nombres» es directo y no introduce explicación excesiva.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los baales
  - los señores
  - los ídolos de Baal
  lexicon: HALOT
  rationale: En Oseas el plural se refiere a las deidades cananeas Baal. «Los Baales» preserva el referente propio y el valor polémico del texto, sin reducirlo a un sustantivo común como «señores».
- source_word: מִפִּיהָ
  english_pob_choice: from her mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de sus labios
  lexicon: HALOT
  rationale: «Boca» reproduce el hebreo idiomático y mantiene la imagen de la invocación verbal. El posesivo femenino singular concuerda con el contexto de la esposa simbólica.
- source_word: וְלֹא יִזָּכְרוּ עוֹד
  english_pob_choice: and they will no longer be remembered
  chosen_spanish: y nunca más se recordarán
  alternatives_spanish:
  - y ya no serán recordados
  - y nunca más se mencionarán
  lexicon: HALOT
  rationale: El nifal de זכר puede significar «ser recordado» o «ser mencionado». «Se recordarán» conserva la ambigüedad de memoria/mención; «nunca más» expresa la cesación total. No añadí un objeto explícito porque el hebreo permite esta forma impersonal/reflexiva en español.
- source_word: בִּשְׁמָם
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - con su nombre
  - bajo su nombre
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a la mención identificadora «por nombre». En español, «por nombre» refleja esa función de manera natural y cercana al giro del original.
theological_decisions:
- issue: Referencia de «los Baales»
  english_pob_reading: The phrase refers to pagan deities/idols associated with covenant unfaithfulness, not merely human 'lords' or 'masters.'
  chosen_spanish_reading: Se refiere a las deidades paganas Baal, en contraste con Yahvé, no solo a «señores» humanos.
  alternative_spanish_readings:
  - Podría leerse de modo más general como «señores» o «amos» por el valor léxico de בעל.
  - Podría suavizarse como «ídolos de Baal».
  rationale: En Oseas, el contexto de infidelidad del pacto y del culto idolátrico exige conservar el referente a las divinidades baalistas. «Los Baales» mantiene la tensión teológica entre Yahvé y los falsos dioses sin diluirla.
  doctrine_reference: Oseas 2; exclusividad del culto a Yahvé frente a la idolatría
- issue: Valor de יִזָּכְרוּ / יִזָּכֵרוּ
  english_pob_reading: The Hebrew verb can denote either being remembered or being mentioned, and in context both ideas support the end of Baal worship.
  chosen_spanish_reading: «Se recordarán» puede abarcar tanto «ser recordados» como «ser mencionados»; el contexto apunta al cese total de su invocación.
  alternative_spanish_readings:
  - «No se mencionarán más»
  - «No volverá a hacerse memoria de ellos»
  rationale: La forma hebrea permite una ambigüedad útil entre memoria y mención. La versión española preserva esa amplitud con una redacción natural, sin resolverla de manera innecesariamente estrecha.
  doctrine_reference: Uso bíblico de זכר; eliminación del culto idolátrico
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el cierre del audit trail inglés: se conserva la ambigüedad de זכר como memoria/mención, y se refleja la revisión que prefirió la forma idiomática «by name» sin posesivo explícito. También se mantiene el referente cultual preciso de «los Baales», conforme al contexto de Oseas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto, aunque este versículo no lo mencione explícitamente.
  - «Baales» se capitaliza como nombre propio colectivo de las deidades cananeas.
  - La construcción reflexiva «se recordarán» evita forzar un sujeto/agente inexistente en el hebreo.
  - «De su boca» preserva la imagen concreta de pronunciación/invocación presente en el texto fuente.
