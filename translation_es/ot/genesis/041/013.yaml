translation:
  language: es
  text: 'Y sucedió que, tal como él nos interpretó, así fue: a mí me restituyó a mi cargo[a], pero a él lo ahorcó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a mi puesto» o «a mi posición»; el modismo hebreo se refiere a la restitución a su antigua función oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y fue que
  lexicon: HALOT
  rationale: La forma narrativa introduce el cumplimiento del relato. «Sucedió que» conserva el valor de acontecimiento sin sonar arcaico en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - exactamente como
  lexicon: HALOT
  rationale: Expresa correspondencia exacta entre la interpretación y el resultado, con naturalidad en español.
- source_word: פָּתַר לָנוּ
  english_pob_choice: he interpreted for us
  chosen_spanish: él nos lo interpretó
  alternatives_spanish:
  - él lo interpretó para nosotros
  - él nos interpretó
  lexicon: HALOT
  rationale: En el contexto de sueños, פתר es «interpretar». El dativo hebreo queda bien reflejado con «nos lo» para mantener el sentido de interpretación dada a ellos.
- source_word: כֵּן הָיָה
  english_pob_choice: so it happened / so it was
  chosen_spanish: así fue
  alternatives_spanish:
  - así sucedió
  - y así fue
  lexicon: HALOT
  rationale: La frase hebrea enfatiza cumplimiento exacto. «Así fue» es breve, natural y conserva la fuerza de verificación.
- source_word: אֹתִי הֵשִׁיב
  english_pob_choice: me he restored
  chosen_spanish: a mí me restituyó
  alternatives_spanish:
  - me restituyó
  - a mí me restauró
  lexicon: HALOT
  rationale: El objeto adelantado en hebreo se conserva con el dativo enfático «a mí». «Restituir» comunica con precisión la reinstalación a un cargo previo.
- source_word: עַל כַּנִּי
  english_pob_choice: to my office
  chosen_spanish: a mi cargo
  alternatives_spanish:
  - a mi puesto
  - a mi estación
  lexicon: HALOT
  rationale: El hebreo es un modismo de reinstalación en una posición oficial. «Cargo» comunica bien el sentido funcional y administrativo en español.
- source_word: וְאֹתוֹ תָלָה
  english_pob_choice: but him he hanged
  chosen_spanish: pero a él lo colgó
  alternatives_spanish:
  - y a él lo colgó
  - pero lo colgó
  lexicon: HALOT
  rationale: Se conserva el contraste fuerte entre ambos destinos. «Colgó» traduce literalmente תלה en este contexto judicial; «pero a él» mantiene el paralelismo y el énfasis del objeto.
theological_decisions:
- issue: Énfasis en cumplimiento exacto de la interpretación
  english_pob_reading: just as he interpreted for us, so it was
  chosen_spanish_reading: tal como él nos lo interpretó, así fue
  alternative_spanish_readings:
  - como él nos lo interpretó, así sucedió
  - exactamente como él nos lo interpretó, así fue
  rationale: El hebreo subraya correspondencia precisa entre sueño/interpretación y desenlace. La redacción española preserva ese énfasis sin añadir interpretación doctrinal.
  doctrine_reference: Fidelidad narrativa al sentido del texto hebreo; no requiere desarrollo doctrinal específico.
translation_notes:
  revision_awareness: La redacción sigue el sentido del hebreo WLC y toma en cuenta la revisión auditada del inglés POB, especialmente la simplificación de la segunda mitad de la frase («so it was») para evitar redundancia y mantener la fuerza de cumplimiento. También conserva el contraste del objeto anticipado («a mí» / «a él») que el inglés POB marcaba con orden enfático.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos según la norma del proyecto; aquí no aparece el nombre divino.
  - Se mantiene el paralelismo hebreo con una estructura breve y solemne, evitando el calco excesivo pero sin suavizar el contraste final.
  - «Cargo» se eligió por el valor oficial del modismo; no se entiende como equivalencia exclusiva si el contexto exigiera «puesto» o «estación».
