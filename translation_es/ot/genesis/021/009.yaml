translation:
  language: es
  text: Y Sara vio al hijo de Agar la egipcia[a], que le había dado a Abraham, burlándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «riendo». El participio hebreo puede denotar reír, jugar o comportarse con burla; el contexto puede sugerir un matiz hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: And Sarah saw
  chosen_spanish: Y Sara vio
  alternatives_spanish:
  - Ahora Sara vio
  - Pero Sara vio
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa de forma directa. En español, «Y» conserva la secuencia sin añadir contraste interpretativo; «vio» refleja con naturalidad el verbo hebreo ראה.
- source_word: בֶּן הָגָר הַמִּצְרִית
  english_pob_choice: the son of Hagar the Egyptian
  chosen_spanish: al hijo de Agar la egipcia
  alternatives_spanish:
  - al hijo de Agar la egipcia, la mujer egipcia
  - al hijo de Agar, la egipcia
  lexicon: HALOT
  rationale: La cadena constructa y la aposición identifican al hijo por su madre. «La egipcia» reproduce el gentilicio hebreo de forma natural en español y mantiene la referencia a Agar sin añadir palabras innecesarias.
- source_word: אֲשֶׁר יָלְדָה לְאַבְרָהָם
  english_pob_choice: whom she had borne to Abraham
  chosen_spanish: a quien ella había dado a luz para Abraham
  alternatives_spanish:
  - a quien ella había dado a luz a Abraham
  - a quien ella había parido para Abraham
  lexicon: HALOT
  rationale: El relativo recuerda el nacimiento del hijo por Agar. «Había dado a luz» conserva el matiz de anterioridad respecto de la visión de Sara, y «para Abraham» sigue el valor relacional de ל en este contexto.
- source_word: מְצַחֵק
  english_pob_choice: mocking
  chosen_spanish: burlándose
  alternatives_spanish:
  - riendo
  - jugando
  - haciendo burla
  lexicon: HALOT
  rationale: La forma participial de צחק puede abarcar reír, jugar o burlarse. Dado el contexto inmediato y la revisión del POB en inglés hacia «mocking», «burlándose» recoge la fuerza más probable sin convertirla en un sustantivo abstracto ni perder el carácter verbal del hebreo.
theological_decisions:
- issue: Alcance interpretativo de מְצַחֵק
  english_pob_reading: mocking
  chosen_spanish_reading: burlándose
  alternative_spanish_readings:
  - riendo
  - jugando
  rationale: El hebreo permite más de una lectura léxica, pero el desarrollo narrativo favorece un matiz hostil. La traducción española mantiene esa dirección sin exagerarla más allá de lo que el participio admite por sí mismo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological and interpretive tension where the source remains open, but allow context to guide the preferred rendering.'
translation_notes:
  revision_awareness: La auditoría en inglés muestra una revisión desde «laughing» a «mocking» para reflejar mejor el contexto. La versión española sigue esa revisión, pero conserva la apertura léxica del hebreo mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Sara» sin h aspirada, conforme al uso natural en español.
  - Se mantiene «Agar» como forma bíblica estable en español.
  - «la egipcia» reproduce el gentilicio del hebreo sin añadir explicaciones innecesarias.
  - «burlándose» conserva el valor verbal del participio mejor que un nominal como «burla».
