translation:
  language: es
  text: 'Entonces Ismael hijo de Natanías salió de Mizpa a su encuentro[a], yendo y llorando. Cuando los encontró, les dijo: «Vengan a Gedalías, hijo de Ahicam».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «yendo, yendo y llorando», un giro idiomático que expresa una acción continuada mientras se acercaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... salió
  alternatives_spanish:
  - Y ... salió
  - Luego ... salió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «entonces» conserva la secuencia natural en español sin perder el valor discursivo.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarlos
  - a encontrarse con ellos
  lexicon: HALOT
  rationale: La construcción idiomática expresa salir al encuentro de alguien; «a su encuentro» mantiene la imagen hebrea con español natural.
- source_word: מִן הַמִּצְפָּה
  english_pob_choice: from Mizpah
  chosen_spanish: de Mizpa
  alternatives_spanish:
  - desde Mizpa
  - desde Mizpá
  lexicon: HALOT
  rationale: מִן marca origen. Se translitera el topónimo como «Mizpa» para consistencia con el español bíblico del proyecto.
- source_word: הֹלֵךְ הָלֹךְ
  english_pob_choice: going and weeping
  chosen_spanish: yendo
  alternatives_spanish:
  - caminando
  - avanzando
  lexicon: HALOT
  rationale: El infinitivo absoluto con participio intensifica o prolonga la acción; en español, «yendo» reproduce la continuidad sin sobrecargar la frase.
- source_word: וּבֹכֶה
  english_pob_choice: and weeping
  chosen_spanish: y llorando
  alternatives_spanish:
  - y llorando mucho
  - mientras lloraba
  lexicon: HALOT
  rationale: «Llorando» conserva el matiz solemne de בכה; la coordinación simple refleja el hebreo y evita un giro interpretativo excesivo.
- source_word: וַיְהִי כִּפְגֹשׁ אֹתָם
  english_pob_choice: When he met them
  chosen_spanish: Cuando los encontró
  alternatives_spanish:
  - Al encontrarlos
  - Y sucedió que, al encontrarlos
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa con naturalidad en español mediante «cuando los encontró», sin repetir innecesariamente la fórmula narrativa.
- source_word: בֹּאוּ אֶל
  english_pob_choice: Come to
  chosen_spanish: Vengan a
  alternatives_spanish:
  - Vengan hacia
  - Entren a
  lexicon: HALOT
  rationale: El imperativo con אֶל funciona como invitación o convocatoria. «Vengan a» es la equivalencia más directa y clara en español.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם
  english_pob_choice: Gedaliah son of Ahikam
  chosen_spanish: Gedalías, hijo de Ahicam
  alternatives_spanish:
  - Gedalías hijo de Ahicam
  - Guedalías, hijo de Ahicam
  lexicon: HALOT
  rationale: Se mantiene el patronímico directo con «hijo de». Los nombres propios se adaptan a una forma española reconocible y uniforme.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «going along and weeping» a «going and weeping» para acercarse más al hebreo; la versión española sigue esa corrección con una solución breve y natural que conserva la duratividad sin volver al calco pesado.
  spanish_consistency_notes:
  - Se conserva el patronímico «hijo de» de manera uniforme para los nombres propios.
  - Se translitera «Mizpa» conforme al uso del proyecto y no se traduce el topónimo.
  - El ritmo de la frase procura reflejar la secuencia narrativa y la continuidad de la acción sin introducir explicaciones ajenas al verso.
