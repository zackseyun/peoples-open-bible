translation:
  language: es
  text: Quemó la casa de Yahvé[a], la casa del rey, todas las casas de Jerusalén y toda casa grande[b]; todo lo quemó con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el templo de Yahvé». Hebreo: «la casa de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: O «cada casa grande» o «cada casa importante». La expresión hebrea puede referirse a casas notables por tamaño o prominencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹ֥ף
  english_pob_choice: He burned
  chosen_spanish: Quemó
  alternatives_spanish:
  - Y quemó
  - Incendió
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol de שׂרף introduce la acción narrativa; en español, el pretérito simple «quemó» reproduce con naturalidad la secuencia sin añadir matices no sustentados. «Incendió» podría sugerir una acción más técnica o intencional, pero no es necesario aquí.
- source_word: בֵּית יְהוָ֖ה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literal «casa de Yahvé», que el inglés POB también preserva. «Templo» sería una interpretación legítima, pero no la forma principal por tratarse de una equivalencia más específica que el hebreo no exige.
- source_word: בֵּית הַמֶּ֑לֶךְ
  english_pob_choice: the king's house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - el palacio del rey
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa del rey»; en español mantiene bien el paralelismo con «casa de Yahvé». «Palacio» es un glosa contextual posible, pero menos cercana a la forma del original.
- source_word: כָּל בָּתֵּי יְרוּשָׁלִַ֛ם
  english_pob_choice: all the houses of Jerusalem
  chosen_spanish: todas las casas de Jerusalén
  alternatives_spanish:
  - todas las casas en Jerusalén
  lexicon: HALOT
  rationale: El constructo se vierte de manera directa con «de Jerusalén». El plural hebreo y el distributivo se conservan sin necesidad de expansión interpretativa.
- source_word: כָּל בֵּ֥ית גָּד֖וֹל
  english_pob_choice: every great house
  chosen_spanish: toda casa grande
  alternatives_spanish:
  - toda casa importante
  - cada casa grande
  lexicon: HALOT
  rationale: La frase hebrea es distributiva y puede aludir a tamaño o prominencia. «Toda casa grande» mantiene esa amplitud semántica sin cerrarla a «importante» o «lujosa».
- source_word: שָׂרַ֥ף בָּ/אֵֽשׁ
  english_pob_choice: with fire
  chosen_spanish: la quemó con fuego
  alternatives_spanish:
  - la quemó en el fuego
  - la incendió con fuego
  lexicon: HALOT
  rationale: El hebreo remata con el verbo + complemento preposicional, reforzando el modo de la destrucción. En español, «la quemó con fuego» conserva esa intensificación y evita una repetición torpe al mismo tiempo que refleja el énfasis del original.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El POB en inglés usa «Yahweh» para el Tetragrámaton; en español, el equivalente adoptado en el proyecto es «Yahvé», que preserva el nombre propio divino sin la convención de máscara litúrgica. Se evita «SEÑOR» porque ocultaría el nombre revelado y perdería la decisión lexical del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: El inglés POB presenta alta concordancia con el hebreo y no requiere cambios sustanciales; la única decisión teológica explícita relevante es la del nombre divino. El cierre con «con fuego» se mantiene para reflejar el énfasis del complemento final, y en español se ajusta a una coordinación fluida sin añadir contenido.
  spanish_consistency_notes:
  - Se mantuvo la metáfora hebrea «casa de Yahvé» de forma consistente con el audit trail inglés.
  - Se conservó el paralelismo sintáctico entre «la casa de Yahvé» y «la casa del rey».
  - «Toda casa grande» preserva la ambigüedad de tamaño o importancia sin estrecharla.
  - Se evitó introducir «templo» en el texto principal para no desplazar la forma hebrea literal.
