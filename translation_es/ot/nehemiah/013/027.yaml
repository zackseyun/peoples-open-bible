translation:
  language: es
  text: ¿Acaso hemos de escucharles[a] y hacer todo este gran mal, actuando con infidelidad contra nuestro Dios, al casarnos con mujeres extranjeras[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedecerles». El verbo hebreo puede tener el sentido de atender o cumplir lo que se pide.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «al hacer habitar mujeres extranjeras»; en contexto, esto se refiere a tomarlas como esposas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנִשְׁמַע
  english_pob_choice: Should we then listen to you
  chosen_spanish: ¿Acaso nos será permitido escucharles
  alternatives_spanish:
  - ¿Debemos obedecerles
  - ¿Debemos escucharles
  lexicon: HALOT
  rationale: El nifal de שׁמע aquí es una pregunta retórica de si se debe atender o conceder lo pedido. En español, 'nos será permitido escucharles' conserva el matiz de heeding/compliance sin forzar 'obedecer' como única posibilidad.
- source_word: לָכֶם
  english_pob_choice: then ... to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - con respecto a ustedes
  lexicon: HALOT
  rationale: El dativo pronominal en este contexto funciona como objeto de la acción de escuchar/heeder. 'Les' mantiene la referencia directa y el tono retórico del reproche.
- source_word: לַעֲשׂוֹת אֵת כָּל
  english_pob_choice: and do all
  chosen_spanish: y hacer todo
  alternatives_spanish:
  - y cometer todo
  - y realizar todo
  lexicon: HALOT
  rationale: עָשָׂה es el verbo general 'hacer'; en este contexto moral, 'hacer todo' sigue de cerca la estructura hebrea y deja que 'mal' aporte la carga ética.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: this great evil
  chosen_spanish: este gran mal
  alternatives_spanish:
  - esta gran maldad
  - este gran mal cometido
  lexicon: HALOT
  rationale: '''Mal'' reproduce bien la amplitud moral de רעה sin volver el texto más técnico de lo necesario. ''Gran'' refleja הַגְּדוֹלָה y ''este'' conserva el deíctico.'
- source_word: לִמְעֹל
  english_pob_choice: acting unfaithfully
  chosen_spanish: actuando con infidelidad
  alternatives_spanish:
  - siendo infieles
  - obrando con deslealtad
  lexicon: HALOT
  rationale: מעל expresa quebranto de fidelidad, especialmente en marco pactal. 'Actuando con infidelidad' preserva ese valor relacional y evita reducirlo a una simple falta moral genérica.
- source_word: בֵּאלֹהֵינוּ
  english_pob_choice: against our God
  chosen_spanish: contra nuestro Dios
  alternatives_spanish:
  - respecto de nuestro Dios
  - ante nuestro Dios
  lexicon: HALOT
  rationale: Con מעל, la preposición se entiende naturalmente como ofensa dirigida contra Dios. 'Nuestro Dios' mantiene la inclusión comunitaria del pronombre hebreo.
- source_word: לְהֹשִׁיב נָשִׁים נָכְרִיּוֹת
  english_pob_choice: by marrying foreign women
  chosen_spanish: al tomar mujeres extranjeras
  alternatives_spanish:
  - al hacer habitar mujeres extranjeras
  - al casarnos con mujeres extranjeras
  lexicon: HALOT
  rationale: El causativo de ישב literalmente es 'hacer habitar/establecer', pero en este contexto apunta a incorporarlas al hogar como esposas. 'Al tomar mujeres extranjeras' conserva la literalidad suficiente y evita una paráfrasis demasiado interpretativa.
theological_decisions:
- issue: Sentido de מעל en un contexto de pacto
  english_pob_reading: covenantal unfaithfulness against God
  chosen_spanish_reading: infidelidad de pacto contra nuestro Dios
  alternative_spanish_readings:
  - simple maldad contra Dios
  - transgresión ritual contra Dios
  rationale: El verbo מעל suele implicar traición o infidelidad, no solo pecado genérico. 'Actuando con infidelidad contra nuestro Dios' preserva el peso pactal y la dimensión relacional del reproche.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en ''escucharles[a]'' y [b] en ''Dios[b]''.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהֵינוּ, conservando el pronombre posesivo 'nuestro'.
  - '''Mujeres extranjeras'' reproduce el orden y sentido del hebreo; el valor marital se deja indicado en nota.'
  - '''Actuando con infidelidad'' preserva el matiz de מעל como deslealtad/traición pactal.'
  - Se evitó 'SEÑOR' para el nombre divino, conforme a la pauta del proyecto.
