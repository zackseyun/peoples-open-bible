translation:
  language: es
  text: Ciertamente no entrarán en la tierra en la que levanté mi mano para establecerlos allí[a], excepto Caleb hijo de Jefone y Josué hijo de Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en la tierra en la que levanté mi mano para establecerlos en ella», un gesto de juramento que indica que juró dársela.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם אַתֶּם תָּבֹאוּ
  english_pob_choice: Surely you shall not come
  chosen_spanish: Ciertamente no entrarán
  alternatives_spanish:
  - Si ustedes entran
  - No entrarán
  lexicon: HALOT
  rationale: En este inicio enfático, אִם funciona idiomáticamente con valor de negación solemne en un contexto de juramento/jucio. En español, 'Ciertamente no' conserva la fuerza declarativa sin convertir el enunciado en una condición.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: El verbo de movimiento permite una expresión natural en español; 'en la tierra' comunica la incorporación o entrada al territorio sin sonar forzado.
- source_word: נָשָׂאתִי אֶת יָדִי
  english_pob_choice: I raised my hand
  chosen_spanish: levanté mi mano
  alternatives_spanish:
  - alzé mi mano
  - juré
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del gesto de juramento. 'Levanté mi mano' refleja el hebreo con claridad y evita sustituir de entrada la metáfora por el verbo interpretativo 'juré'.
- source_word: לְשַׁכֵּן אֶתְכֶם בָּהּ
  english_pob_choice: to settle you
  chosen_spanish: para establecerlos
  alternatives_spanish:
  - para hacerlos habitar allí
  - para asentarlos
  lexicon: HALOT
  rationale: El causativo de שכן expresa causar residencia o asentamiento. 'Establecerlos' es natural en español y mantiene la idea de darles asiento en la tierra.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - sino
  - salvo
  lexicon: HALOT
  rationale: La construcción exclusoria queda bien expresada con 'excepto', que introduce de modo claro la única excepción al juicio previo.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  english_pob_choice: Caleb son of Jephunneh
  chosen_spanish: Caleb hijo de Jefone
  alternatives_spanish:
  - Caleb hijo de Jephuné
  - Caleb, hijo de Jefone
  lexicon: transliteración estándar
  rationale: Se conserva el patronímico hebreo con transliteración castellana habitual. 'Hijo de' reproduce fielmente la estructura genealógica.
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: and Joshua son of Nun
  chosen_spanish: y Josué hijo de Nun
  alternatives_spanish:
  - y Josué, hijo de Nun
  - y Josué hijo de Nún
  lexicon: transliteración estándar
  rationale: '''Josué'' es la forma española establecida del nombre, y ''hijo de Nun'' preserva el patronímico sin introducir una paráfrasis.'
theological_decisions:
- issue: Valor de juramento en la fórmula con אִם al inicio
  english_pob_reading: Surely you shall not come into the land
  chosen_spanish_reading: Ciertamente no entrarán en la tierra
  alternative_spanish_readings:
  - Si ustedes entran en la tierra
  - No entrarán en la tierra
  rationale: El hebreo usa una forma idiomática que en contexto funciona como declaración solemne de juicio, no como condición abierta. 'Ciertamente no' preserva esa fuerza sin oscurecer el sentido del pronunciamiento divino.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantener el gesto de juramento sin borrar la imagen hebrea
  english_pob_reading: I raised my hand to settle you
  chosen_spanish_reading: levanté mi mano para establecerlos
  alternative_spanish_readings:
  - juré para establecerlos
  - levanté mi mano para asentarlos
  rationale: El texto hebreo menciona explícitamente el gesto de alzar la mano. La versión española conserva esa imagen y, a la vez, deja que el lector entienda su función juramentaria mediante el contexto y la nota.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; la redacción española sigue la lectura auditada principal y mantiene las tensiones léxicas relevantes, especialmente el valor idiomático de אִם y la imagen del juramento con la mano levantada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito en la teología del pasaje, aunque aquí no aparece el nombre en el versículo.
  - Se usa 'tierra' para אֶרֶץ en consonancia con el uso bíblico habitual en español y con el sentido territorial del contexto.
  - Se conserva la estructura patronímica con 'hijo de' para ambos nombres.
  - La nota al pie marca la imagen de juramento sin reemplazarla en el texto principal.
