base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/016.yaml
  text: And it happened[a], as he was speaking to him, that the king said to him, “Have we made you the king’s adviser? Stop! Why should they strike you down?” So the prophet stopped and said, “I know that God has determined to destroy you[c][b], because you have done this and have not listened to my counsel.”
  footnotes:
  - marker: a
    text: Or, 'Have we appointed you as an adviser to the king?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'why should they strike you?' The subject is an unspecified plural, likely referring to those who would punish him at the king’s command.
    reason: lexical_alternative
  - marker: c
    text: Or, 'God has purposed/planned to destroy you.' The Hebrew verb literally relates to counsel or planning.
    reason: lexical_alternative
