    rationale: Puede entenderse como un camino perteneciente al Jordán o situado junto al Jordán, mientras que el contexto y la decisión inglesa documentada apuntan a la ruta que llevaba hacia el Jordán.
  revised_spanish_text: Y los hombres los persiguieron por el camino hacia el Jordán, hasta los vados[a]; y cerraron la puerta tras ellos, apenas salieron los perseguidores tras ellos.
  revised_footnotes:
  - marker: a
    text: O «hasta los lugares de cruce», es decir, los vados del Jordán donde se podía pasar.
