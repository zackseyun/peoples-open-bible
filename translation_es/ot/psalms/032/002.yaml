translation:
  language: es
  text: Bienaventurado el hombre a quien Yahvé no le toma en cuenta la iniquidad[a], y en cuyo espíritu no hay engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «culpa» o «pecado». El hebreo עָוֹן puede abarcar iniquidad, culpa o el peso culpable del pecado según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente también puede decirse «doblez».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado es
  alternatives_spanish:
  - Dichoso es
  - Feliz es
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de bienaventuranza. «Bienaventurado» conserva mejor el tono solemne y declarativo que «feliz», y evita una reducción psicologizante.
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular masculino con valor genérico, como en el hebreo, sin neutralizar la forma. En español «el hombre» funciona de manera representativa y es fiel al audit trail inglés.
- source_word: יַחְשֹׁב ... לּוֹ
  english_pob_choice: count ... to whom
  chosen_spanish: le cuenta
  alternatives_spanish:
  - le imputa
  - le considera
  - le carga
  lexicon: HALOT
  rationale: «Contar» conserva la metáfora contable/jurídica del verbo חשב y su objeto indirecto. «Le cuenta» suena natural en español y evita un tecnicismo innecesario, sin perder la fuerza forense.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: el nombre divino se vierte como «Yahvé», no como una sustitución tipográfica. Así se preserva la referencia al Tetragrámaton.'
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» mantiene el peso moral del término y la relación con el lenguaje de perdón y cuenta/registro. «Culpa» o «pecado» son posibles, pero estrechan o desplazan el matiz.
- source_word: וְאֵין
  english_pob_choice: and ... there is no
  chosen_spanish: y ... no hay
  alternatives_spanish:
  - y no existe
  - y está ausente
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de forma natural en español con «no hay», sin forzar un verbo copulativo.
- source_word: בְּרוּחוֹ
  english_pob_choice: in whose spirit
  chosen_spanish: en cuyo espíritu
  alternatives_spanish:
  - en su espíritu
  lexicon: HALOT
  rationale: «En cuyo espíritu» reproduce el vínculo relativo y mantiene la referencia al poseedor genérico del versículo, con una solución idiomática en español.
- source_word: רְמִיָּה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - astucia
  lexicon: HALOT
  rationale: «Engaño» es el equivalente natural y sobrio de רְמִיָּה. «Guile» en inglés tiene una carga tradicional; en español «engaño» comunica la falta de sinceridad sin archaísmo.
theological_decisions:
- issue: Masculino genérico de אָדָם
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: El hebreo usa אָדָם en singular con fuerza representativa. Se conserva la forma masculina genérica en español, evitando una neutralización que borraría la correspondencia formal y la decisión auditada del POB inglés.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Metáfora forense de no imputar/no contar iniquidad
  english_pob_reading: does not count iniquity
  chosen_spanish_reading: no le cuenta iniquidad
  alternative_spanish_readings:
  - no le imputa iniquidad
  - no le carga pecado
  rationale: «Contar» preserva la imagen contable del hebreo חשב sin imponer una formulación doctrinal posterior. «Le cuenta» mantiene la misma estructura relacional y deja intacta la tensión entre registro contable y juicio moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'El audit trail inglés está en alta concordancia y no muestra revisiones aplicadas; la presente redacción sigue la lectura estable del texto fuente y conserva las dos tensiones léxicas documentadas: אָדָם como genérico masculino y עָוֹן / רְמִיָּה con opciones semánticas abiertas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se evita «Cristo», «SEÑOR» y otras sustituciones convencionales no requeridas por este versículo.
  - La frase «en cuyo espíritu» conserva la relación posesiva del hebreo sin añadir posesivos innecesarios.
  - «Engaño» se usa por claridad contemporánea, pero la nota preserva la alternativa tradicional «guile».
