translation:
  language: es
  text: Y él será un asno montés de hombre[a]; su mano será contra todos, y la mano de todos contra él; y habitará frente[a?] a todos sus hermanos[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un hombre asno montés”; el hebreo compara literalmente a la persona con un asno salvaje, una imagen de libertad indómita más que una simple afirmación de que es “salvaje”.
    reason: lexical_alternative
  - marker: b
    text: O “en presencia de” o “en oposición a”. La expresión hebrea puede indicar vivir frente a, delante de, o en desafío de todos sus hermanos.
    reason: lexical_alternative
  - marker: c
    text: “Hermanos” puede extenderse más allá de hermanos literales para abarcar parientes cercanos o pueblos emparentados.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּרֶא אָדָם
  english_pob_choice: a wild donkey of a man
  chosen_spanish: un asno salvaje de hombre
  alternatives_spanish:
  - un asno salvaje de un hombre
  - un asno montés de hombre
  - un hombre asno salvaje
  lexicon: HALOT
  rationale: פֶּרֶא nombra al asno salvaje / asno montés, no solo la idea abstracta de “salvaje”. En español, “asno salvaje de hombre” conserva la imagen metafórica sin suavizarla; “de hombre” sigue la relación constructiva y evita convertirlo en una descripción moral genérica.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם se refiere al individuo masculino, Ismael, no a la humanidad en general. “Hombre” mantiene esa referencia específica y la fuerza del paralelismo con el animal metáforico.
- source_word: יָדוֹ בַכֹּל
  english_pob_choice: his hand will be against everyone
  chosen_spanish: su mano será contra todos
  alternatives_spanish:
  - su mano contra todos
  - su mano estará contra todos
  - su mano estará en todo
  lexicon: HALOT
  rationale: “Mano” funciona idiomáticamente para acción hostil u oposición. En español, “será contra todos” comunica el valor adversativo del hebreo sin perder la imagen corporal.
- source_word: וְיַד כֹּל בּוֹ
  english_pob_choice: everyone's hand against him
  chosen_spanish: la mano de todos contra él
  alternatives_spanish:
  - la mano de todos será contra él
  - todos tendrán la mano contra él
  - todos contra él
  lexicon: HALOT
  rationale: La repetición paralela con la cláusula anterior se conserva con “mano” y con el movimiento recíproco de hostilidad. La forma posesiva explícita resulta natural en español y respeta el hebreo.
- source_word: וְעַל־פְּנֵי
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - en presencia de
  - opuesto a
  - sobre la faz de
  lexicon: HALOT
  rationale: El hebreo puede indicar estar delante, en presencia de o en oposición. “Frente a” mantiene la relación espacial-relacional sin estrecharla innecesariamente a una sola dirección o matiz.
- source_word: כָּל־אֶחָיו
  english_pob_choice: all his brothers
  chosen_spanish: todos sus hermanos
  alternatives_spanish:
  - todos sus parientes
  - toda su parentela
  - todos sus deudos
  lexicon: HALOT
  rationale: “Hermanos” es la glosa más literal y debe permanecer en el texto principal. El posible ensanchamiento a parientes o parentesco queda como matiz implícito, no como sustitución.
- source_word: יִשְׁכֹּן
  english_pob_choice: he will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - vivirá
  - residirá
  - se establecerá
  lexicon: HALOT
  rationale: שׁכן significa habitar, residir, establecerse. “Habitará” es natural en español bíblico y conserva el tono predictivo del verbo.
theological_decisions:
- issue: Caracterización de Ismael mediante פֶּרֶא אָדָם
  english_pob_reading: 'Retain the animal metaphor explicitly: ''a wild donkey of a man'''
  chosen_spanish_reading: 'Retener explícitamente la metáfora animal: “un asno salvaje de hombre”'
  alternative_spanish_readings:
  - un hombre salvaje
  - un hombre indómito
  rationale: El texto ofrece una caracterización vívida, no una etiqueta moral suavizada. Mantener la metáfora evita borrar la tensión léxica y conserva el sentido fuente de libertad indómita y conflicto.
  doctrine_reference: Principio de primacía del texto original; evitar importar juicios morales no expresados por el hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el sintagma metafórico. También se añadieron anclajes coherentes para las demás notas sin dejar marcadores sueltos. La redacción sigue de cerca el hebreo y el auditoría inglesa, manteniendo la metáfora y el paralelismo.
  spanish_consistency_notes:
  - Se usa “asno salvaje” para conservar la imagen de פֶּרֶא sin diluirla en “salvaje” abstracto.
  - Se mantiene “mano” en ambas cláusulas para reflejar el paralelismo hebreo.
  - “Frente a” preserva la ambigüedad espacial-relacional de עַל־פְּנֵי.
  - “Hermanos” queda en el texto principal; la ampliación a parientes queda solo en nota.
  - El registro es bíblico y sobrio, pero en español moderno natural, evitando calcos innecesarios.
