translation:
  language: es
  text: Mandé llamar a Eleazar[a], Iduel, Maasmán, Enaatán, Semaías, Jorib, Natán, Ennatán, Zacarías y Mesolabón, los líderes y hombres entendidos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres personales de este versículo se conservan en formas griegas difíciles de alinear exactamente con el paralelo hebreo de Esdras; por eso la transliteración sigue aquí el testimonio griego y no una armonización completa.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλα πρὸς
  english_pob_choice: I sent for
  chosen_spanish: envié por
  alternatives_spanish:
  - envié a
  - despaché a
  - mandé llamar a
  lexicon: BDAG
  rationale: La combinación expresa aquí una acción de enviar con destinatarios personales, con sentido de convocatoria. «Envié por» comunica de manera natural en español la idea de mandar a buscar a esas personas, más cercana al valor contextual que un simple «envié a».
- source_word: Ἐλεάζαρον καὶ Ἰδούηλον καὶ Μαασμὰν καὶ Ἐναατὰν καὶ Σαμαίαν καὶ Ἰώριβον, Ναθάν, Ἐννατάν, Ζαχαρίαν καὶ Μεσολαβών
  english_pob_choice: Eleazar, Iduel, Maasman, Enaathan, Shemaiah, Jorib, Nathan, Ennathan, Zechariah, and Mesholabon
  chosen_spanish: Eleazar, Iduel, Maasmán, Enaatán, Semaías, Jorib, Natán, Ennatán, Zacarías y Mesolabón
  alternatives_spanish:
  - Eleazar, Iduel, Maasma, Enaatán, Samaías, Iorib, Natán, Ennatán, Zacarías y Mesolabón
  - Eleazar, Iduel, Maasmán, Enaatán, Semaías, Jorib, Natán, Ennatán, Zacarías y Mesolabón
  lexicon: LSJ
  rationale: 'Los nombres propios se transliteran desde el griego, no se traducen. Se regularizan para lectura española: Iduel, Maasmán, Enaatán, Semaías, Jorib, Natán, Ennatán, Zacarías y Mesolabón, manteniendo la forma griega subyacente y reconociendo que algunos nombres son textualmente inciertos frente al paralelo hebreo.'
- source_word: τοὺς ἡγουμένους
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los principales
  - los caudillos
  lexicon: BDAG
  rationale: ἡγουμένους denota a los que encabezan o dirigen. En español, «jefes» es breve, natural y refleja bien la función de conducción social en este contexto; «líderes» sería posible pero menos concreto.
- source_word: ἐπιστήμονας
  english_pob_choice: men of understanding
  chosen_spanish: los hombres entendidos
  alternatives_spanish:
  - los expertos
  - los hombres de entendimiento
  - los instruidos
  lexicon: LSJ
  rationale: El término indica personas versadas o con discernimiento. «Hombres entendidos» conserva el matiz de capacidad y conocimiento sin convertirlo en un tecnicismo moderno ni debilitar el carácter personal del grupo.
theological_decisions:
- issue: Tratamiento de los nombres propios griegos frente al paralelo hebreo/MT
  english_pob_reading: English preserves Greek transliterations and notes that the names are difficult to align exactly with the Hebrew parallel.
  chosen_spanish_reading: El español conserva las formas griegas transliteradas y no intenta armonizarlas con el paralelo hebreo.
  alternative_spanish_readings:
  - Normalizar varios nombres según el paralelo hebreo
  - Harmonizar completamente con Ezra
  rationale: La evidencia primaria aquí es el griego de 1 Esdras; el paralelo hebreo funciona como control, no como sustituto. Mantener las formas griegas respeta la transmisión específica del texto y evita una reconstrucción no atestiguada.
  doctrine_reference: Transparencia textual y prioridad del testimonio fuente
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete como ancla primaria. No hubo revisiones aplicadas en el pasaje inglés auditado; se mantuvo la decisión óptima equivalente de traducir ἀπέστειλα πρὸς como una convocatoria («envié por») y de conservar la lista de nombres con transliteración española regularizada. La nota de variante textual se preserva en español para reflejar la tensión documentada entre el griego y el paralelo hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece en el pasaje.
  - «Hombres entendidos» mantiene el matiz antropológico masculino del griego, coherente con la lista de nombres masculinos.
  - La puntuación sigue el español editorial moderno; la coma final reproduce la continuación sintáctica del original.
