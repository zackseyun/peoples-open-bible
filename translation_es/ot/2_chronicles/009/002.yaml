translation:
  language: es
  text: Y Salomón le dijo todas sus palabras[a]; nada le quedó oculto a Salomón[b] que no le dijera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos sus asuntos»; el hebreo dice más literalmente: «todas sus palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hubo cosa oculta de Salomón que no le dijera»; hebreo más literal: «nada quedó oculto de Salomón que él no le dijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - le contó
  - le declaró
  - le respondió
  lexicon: HALOT
  rationale: El verbo נגד puede significar contar, declarar o decir. Dado que el contexto inmediato habla de «todas sus palabras/materias», la forma española más natural y fiel es «le dijo», que preserva el acto de comunicar sin forzar una paráfrasis interpretativa.
- source_word: אֶת כָּל דְּבָרֶיהָ
  english_pob_choice: all her words
  chosen_spanish: todas sus palabras
  alternatives_spanish:
  - todos sus asuntos
  - todas sus cosas
  - todas sus preguntas
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «cosa». El texto hebreo literal es «todas sus palabras», y el inglés POB mantuvo esa literalidad. En español conviene conservarla como base, sin imponer «preguntas», porque eso sería más interpretativo de lo que el hebreo exige.
- source_word: נֶעְלַם
  english_pob_choice: was hidden
  chosen_spanish: quedó oculto
  alternatives_spanish:
  - fue escondido
  - estuvo oculto
  - pasó inadvertido
  lexicon: HALOT
  rationale: El nifal de עלם expresa quedar oculto o escondido. «Quedó oculto» comunica bien el estado resultante y suena natural en español, preservando la metáfora de ocultamiento.
- source_word: דָּבָר
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - ningún asunto
  - ninguna palabra
  lexicon: HALOT
  rationale: Con la negación, el singular funciona idiomáticamente como «nada». Es la opción más clara y natural en español, equivalente al uso idiomático señalado por el inglés POB.
- source_word: מִשְּׁלֹמֹה
  english_pob_choice: from Solomon
  chosen_spanish: para Salomón
  alternatives_spanish:
  - de Salomón
  - a Salomón
  - ante Salomón
  lexicon: HALOT
  rationale: Aunque la preposición מִן puede leerse como «de / desde», el sentido contextual en la cláusula negativa es que nada se le ocultó a Salomón. En español, «para Salomón» expresa mejor la relación de conocimiento respecto de él y evita una torpeza sintáctica; el alternativo más literal «de Salomón» puede resultar oscuro.
- source_word: אֲשֶׁר לֹא הִגִּיד לָהּ
  english_pob_choice: that he did not tell her
  chosen_spanish: que no se lo dijera
  alternatives_spanish:
  - que no le dijera eso
  - que no se lo contara
  - que no lo declarara a ella
  lexicon: HALOT
  rationale: El relativo final expone que no hubo nada oculto que él no comunicara a ella. «Que no se lo dijera» conserva la repetición verbal del hebreo y la relación pronominal, sin añadir el matiz explicativo de «explicar» que el texto no requiere.
translation_notes:
  revision_awareness: Se siguió el cierre revisado del POB inglés, que prefirió la literalidad de «told her all her words» frente a una expansión como «answered all her questions». La versión española mantiene esa misma línea de fidelidad lexical, evitando interpretar «dijo» como «respondió» o «preguntas», aunque el contexto narrativo permita esa inferencia.
  spanish_consistency_notes:
  - Se preserva el nombre divino no pertinente en este versículo, por lo que no aplica la convención Yahvé.
  - Se mantiene «Salomón» como nombre propio sin sustituciones litúrgicas.
  - Se conserva la repetición verbal del hebreo («dijo» / «dijera») para reflejar la estructura del paralelismo.
  - «Nada» se usa con valor idiomático, no como pronombre absoluto aislado.
