translation:
  language: es
  text: El Nilo se llenará de ranas, y subirán y entrarán en tu casa, en tu dormitorio y en tu cama, y en las casas de tus siervos y de tu pueblo, y en tus hornos y en tus artesas de amasar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «artesas para amasar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁרַץ
  english_pob_choice: will swarm
  chosen_spanish: se llenará
  alternatives_spanish:
  - pululará
  - estará lleno de
  lexicon: HALOT
  rationale: שׁרץ expresa proliferación abundante y movimiento de muchos seres pequeños. En español, «se llenará» comunica bien la imagen de abundancia invasiva sin sonar forzado, y evita un calco poco natural.
- source_word: הַיְאֹר
  english_pob_choice: The Nile
  chosen_spanish: El Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En el contexto egipcio de Éxodo, יְאֹר se refiere al Nilo. Mantener el nombre propio en español conserva la precisión contextual del inglés POB.
- source_word: צְפַרְדְּעִים
  english_pob_choice: frogs
  chosen_spanish: ranas
  alternatives_spanish:
  - ranas del Nilo
  - sapos
  lexicon: HALOT
  rationale: El hebreo designa a los anfibios del relato de la plaga. «Ranas» es la equivalencia más natural y estable en español bíblico; «sapos» introduciría una especificación no exigida por el texto.
- source_word: וְעָלוּ
  english_pob_choice: will come up
  chosen_spanish: subirán
  alternatives_spanish:
  - vendrán arriba
  - saldrán
  lexicon: HALOT
  rationale: עלה describe el movimiento desde el Nilo hacia los espacios habitados. «Subirán» preserva la dirección espacial de manera breve y clara en español.
- source_word: וּבָאוּ
  english_pob_choice: enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - irán dentro
  lexicon: HALOT
  rationale: בוא con las frases preposicionales siguientes indica entrada en diversos lugares. «Entrarán» es la forma española más directa y mantiene la secuencia de invasión.
- source_word: בְּבֵיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu hogar
  - tu vivienda
  lexicon: HALOT
  rationale: En esta lista de espacios físicos, «casa» corresponde mejor al sentido concreto de la morada de Faraón que «hogar» o «vivienda».
- source_word: וּבַחֲדַר מִשְׁכָּבְךָ
  english_pob_choice: your bedroom
  chosen_spanish: tu dormitorio
  alternatives_spanish:
  - tu alcoba
  - la habitación donde duermes
  lexicon: HALOT
  rationale: La expresión significa literalmente el cuarto de acostarse o dormir. «Dormitorio» es un equivalente moderno claro y fiel, sin caer en arcaísmos.
- source_word: וְעַל מִטָּתֶךָ
  english_pob_choice: your bed
  chosen_spanish: tu cama
  alternatives_spanish:
  - sobre tu cama
  - encima de tu cama
  lexicon: HALOT
  rationale: Aunque על significa «sobre/upon», en la lista española el sentido queda incluido naturalmente con «tu cama». Esa elección evita una repetición pesada y sigue el uso del inglés POB.
- source_word: וּבְבֵית עֲבָדֶיךָ
  english_pob_choice: the houses of your servants
  chosen_spanish: las casas de tus siervos
  alternatives_spanish:
  - las casas de tus esclavos
  - la casa de tus siervos
  lexicon: HALOT
  rationale: El inglés POB eligió «servants» como equivalente contextual de עֲבָדֶיךָ. En español, «siervos» mantiene esa relación funcional en un registro bíblico natural; «esclavos» sería más literal pero desplazaría el matiz contextual del audit trail inglés.
- source_word: וּבְעַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - entre tu pueblo
  lexicon: HALOT
  rationale: עַם en este contexto señala al conjunto de la población. «Pueblo» es la correspondencia más estable en español y conserva la extensión colectiva del juicio.
- source_word: וּבְתַנּוּרֶיךָ
  english_pob_choice: your ovens
  chosen_spanish: tus hornos
  alternatives_spanish:
  - tus hornos de cocción
  - tus fogones
  lexicon: HALOT
  rationale: תַּנּוּר alude a hornos domésticos. «Hornos» es directo y sobrio; evita especificaciones innecesarias.
- source_word: וּבְמִשְׁאֲרוֹתֶיךָ
  english_pob_choice: your kneading bowls
  chosen_spanish: tus artesas de amasar
  alternatives_spanish:
  - tus cuencos de amasar
  - tus artesas
  lexicon: HALOT
  rationale: El término designa recipientes usados para preparar y amasar la masa. «Artesas de amasar» conserva el valor material y funcional; se mantiene la opción tradicional por ser comprensible en español bíblico y más precisa que «cuencos».
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo y el trazado del inglés POB, con una única nota léxica para la expresión final, donde el español admite dos opciones fieles: «artesas de amasar» y, de manera más general, «artesas». No se observan revisiones textuales aplicadas en el audit trail reciente.'
  spanish_consistency_notes:
  - Se mantiene «El Nilo» para הַיְאֹר conforme al contexto egipcio.
  - Se conserva el patrón verbal futuro plural («subirán y entrarán») para reflejar la sucesión de acciones del hebreo.
  - Se traduce עֲבָדֶיךָ como «tus siervos» siguiendo la decisión contextual del inglés POB, sin forzar «esclavos».
  - Se usa «dormitorio» para מִשְׁכָּב en un español moderno y claro, evitando arcaísmo.
  - La nota de pie de página marca la alternativa léxica tradicional para מִשְׁאֲרוֹת.
  - Se mantiene un registro bíblico pero natural, sin sacrificar la concreción doméstica de la lista.
