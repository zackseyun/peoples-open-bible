translation:
  language: es
  text: 'Entonces le informaron a Saúl, diciendo: «Mira,[a] el pueblo está pecando contra Yahvé al comer sobre la sangre[b]». Y él dijo: «Han actuado traicioneramente. Hagan rodar hacia mí hoy una gran piedra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «He aquí». La partícula hebrea llama la atención sobre el informe que sigue.
    reason: lexical_alternative
  - marker: b
    text: O, más explícitamente, «al comer carne con la sangre todavía dentro». El hebreo dice literalmente «al comer sobre/con la sangre», una expresión idiomática para consumir carne sin drenar debidamente la sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  english_pob_choice: Then they told
  chosen_spanish: Entonces lo dijeron
  alternatives_spanish:
  - Y se lo informaron
  - Entonces informaron
  lexicon: HALOT
  rationale: El verbo narrativo wayyiqtol de נגד introduce una acción sucesiva; «Entonces» mantiene el avance narrativo y «lo dijeron» conserva un español natural sin añadir matices no presentes.
- source_word: לְשָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - a Saul
  lexicon: HALOT
  rationale: Nombre propio con la preposición ל; en español requiere la preposición explícita «a» para el objeto indirecto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - que
  lexicon: HALOT
  rationale: La fórmula quotativa se conserva con «diciendo», que reproduce la estructura discursiva hebrea de manera clara en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Partícula deíctica de atención; «Mira» preserva el énfasis y suena natural en el discurso directo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: HALOT
  rationale: El colectivo definido se refiere al grupo de combatientes en contexto; «el pueblo» mantiene el referente corporativo y la tonalidad bíblica sin ser arcaizante.
- source_word: חֹטִאים לַיהוָה
  english_pob_choice: are sinning against Yahweh
  chosen_spanish: está pecando contra Yahvé
  alternatives_spanish:
  - peca contra Yahvé
  - está pecando contra Yahvé
  lexicon: HALOT
  rationale: חטא con ל expresa pecado contra alguien; en español «pecar contra» es la forma natural y mantiene la relación ofensiva. Se usa singular colectivo con «el pueblo».
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de renderizar el Tetragrámaton como «Yahvé», en lugar de neutralizarlo con «SEÑOR».
- source_word: לֶאֱכֹל עַל הַדָּם
  english_pob_choice: by eating over the blood
  chosen_spanish: al comer sobre la sangre
  alternatives_spanish:
  - al comer con la sangre
  - al comer sobre la sangre
  - al comer la carne con la sangre todavía dentro
  lexicon: HALOT
  rationale: Se conserva la imagen preposicional hebrea «sobre la sangre», como hace la revisión inglesa más cercana al texto. En español la expresión es algo abrupta, pero preserva la tensión idiomática y el lector puede inferir el sentido ritual.
- source_word: בְּגַדְתֶּם
  english_pob_choice: You have acted treacherously
  chosen_spanish: han actuado traicioneramente
  alternatives_spanish:
  - han obrado con traición
  - han sido infieles
  lexicon: HALOT
  rationale: בגד expresa perfidia/traición; «traicioneramente» conserva la gravedad moral y el carácter relacional del reproche mejor que «han transgredido».
- source_word: גֹּלּוּ
  english_pob_choice: Roll
  chosen_spanish: Traigan
  alternatives_spanish:
  - Roden
  - Traigan
  lexicon: HALOT
  rationale: El imperativo גלל con objeto concreto es literalmente «rodar/rodar una piedra», pero en español una orden más idiomática y comprensible en el contexto es «Traigan», sin perder la función práctica de mover la piedra. Se conserva la referencia a la piedra como objeto físico.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hasta mí
  alternatives_spanish:
  - a mí
  - hasta mí
  lexicon: HALOT
  rationale: La dirección verbal hacia el hablante se puede expresar con «hasta mí» para reflejar la llegada de la piedra al lugar indicado, manteniendo naturalidad en español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - hoy
  lexicon: HALOT
  rationale: Adverbio temporal directo; «hoy» transmite la urgencia sin expansión interpretativa.
- source_word: אֶבֶן גְּדוֹלָה
  english_pob_choice: a large stone
  chosen_spanish: una gran piedra
  alternatives_spanish:
  - una piedra grande
  - una piedra enorme
  lexicon: HALOT
  rationale: «Piedra» es más natural que «piedra grande» en una orden concreta, y «gran» conserva el tamaño notable sin sonar pesado. Se mantiene la concreción del objeto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: usar el nombre divino en forma explícita «Yahvé», evitando el sustituto litúrgico «SEÑOR».'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatic sense of eating over/with the blood
  english_pob_reading: by eating over the blood
  chosen_spanish_reading: al comer sobre la sangre
  alternative_spanish_readings:
  - al comer con la sangre
  - al comer la carne con la sangre todavía dentro
  rationale: 'Se preserva la tensión del hebreo y la revisión inglesa: no se expande demasiado en el texto principal, pero se deja la imagen idiomática que remite a la prohibición ritual.'
  doctrine_reference: Levítico 17:10-14; Deuteronomio 12:23-25
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se conserva el valor idiomático de עַל הַדָּם con una expresión literal en el texto principal y se mantiene el énfasis narrativo y moral del reproche de Saúl. Se ajustó la orden final al español para que fuera publicable y gramatical, sin perder la imagen física de la piedra.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se traduce חטא con ל como «pecar contra», no como una generalización neutral.
  - Se preserva la tensión entre literalidad e inteligibilidad en la expresión «sobre la sangre».
  - Se evita «SEÑOR» como sustituto del Tetragrámaton.
  - Se conserva el tono directo y severo de la reprensión de Saúl.
