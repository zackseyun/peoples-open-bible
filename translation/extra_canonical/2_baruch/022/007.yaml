  category: awkward_english
  from: Or does a woman who is pregnant, if she gives birth prematurely, does she
    not kill
  to: Or if a pregnant woman gives birth prematurely, does she not kill
  rationale: The repetition of the auxiliary verb 'does' ('does a woman... does she
    not') creates an awkward English construction. Restructuring the conditional clause
    improves readability while preserving the exact meaning.
