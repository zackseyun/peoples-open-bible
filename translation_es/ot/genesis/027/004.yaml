translation:
  language: es
  text: Prepárame manjares[a], como me gustan, y tráemelos, para que yo coma, a fin de que mi alma[b] te bendiga antes de morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delicias» o «comida sabrosa» para «manjares».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi alma te bendiga», un modismo que expresa a Isaac mismo en toda su persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשֵׂה
  english_pob_choice: Prepare
  chosen_spanish: Prepárame
  alternatives_spanish:
  - Hazme
  - Prepara para mí
  lexicon: HALOT
  rationale: El verbo hebreo עשה es amplio ('hacer'). En este contexto culinario, el imperativo español más natural es 'Prepárame', que conserva la idea de disponer o arreglar la comida para el hablante sin sonar mecánico.
- source_word: מַטְעַמִּים
  english_pob_choice: tasty food
  chosen_spanish: manjares
  alternatives_spanish:
  - comida sabrosa
  - delicias
  - alimentos sabrosos
  lexicon: HALOT
  rationale: El sustantivo designa comida especialmente preparada y agradable al gusto. 'Manjares' comunica bien esa calidad selecta o sabrosa en español bíblico contemporáneo; evita la posible dureza de un calco y mantiene el matiz de comida apreciada.
- source_word: כַּאֲשֶׁר אָהַבְתִּי
  english_pob_choice: just as I love
  chosen_spanish: como me gustan
  alternatives_spanish:
  - tal como los amo
  - como yo los quiero
  - según me agradan
  lexicon: HALOT
  rationale: La frase expresa preferencia personal. 'Como me gustan' es idiomático en español y conserva la idea de la comida preparada según el gusto de Isaac, sin exagerar el matiz afectivo del verbo hebreo.
- source_word: וְהָבִיאָה לִּי
  english_pob_choice: and bring it to me
  chosen_spanish: y tráemelos
  alternatives_spanish:
  - y llévalos a mí
  - y tráemelo
  lexicon: HALOT
  rationale: El plural español concuerda con 'manjares'. 'Tráemelos' mantiene la acción de llevar la comida al hablante de manera natural y directa.
- source_word: וְאֹכֵלָה
  english_pob_choice: that I may eat
  chosen_spanish: para que yo coma
  alternatives_spanish:
  - y comeré
  - a fin de comer
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o propósito; 'para que yo coma' comunica esa finalidad de modo claro. Se evita convertirla en una simple futura independiente, preservando la relación con la orden anterior.
- source_word: בַּעֲבוּר
  english_pob_choice: in order that
  chosen_spanish: a fin de que
  alternatives_spanish:
  - para que
  - con el fin de que
  lexicon: HALOT
  rationale: La partícula introduce propósito. 'A fin de que' es una equivalencia digna y precisa en español, adecuada al tono solemne de la escena de bendición.
- source_word: תְּבָרֶכְךָ נַפְשִׁי
  english_pob_choice: my soul may bless you
  chosen_spanish: mi alma te bendiga
  alternatives_spanish:
  - yo te bendiga
  - mi vida te bendiga
  lexicon: HALOT
  rationale: Se conserva el sujeto literal 'mi alma' para no borrar la expresión hebrea נַפְשִׁי, que en este contexto funciona como una idiomática referencia a la persona entera. 'Mi alma' mantiene la tensión léxica y la fuerza personal del acto de bendecir.
- source_word: בְּטֶרֶם אָמוּת
  english_pob_choice: before I die
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que yo muera
  - antes de mi muerte
  lexicon: HALOT
  rationale: La cláusula temporal se traduce de forma natural en español. 'Antes de morir' es breve, clara y fiel al sentido temporal del hebreo.
theological_decisions:
- issue: נַפְשִׁי como sujeto de 'bendecir'
  english_pob_reading: 'Hebrew: ''my soul may bless you,'' an idiom expressing Isaac himself in his full personal being.'
  chosen_spanish_reading: '''mi alma te bendiga'' mantiene el hebreo literal sin negar que se trata de Isaac mismo en su persona entera.'
  alternative_spanish_readings:
  - '''yo te bendiga'''
  - '''mi ser te bendiga'''
  rationale: La POB en inglés preserva la imagen hebrea y la explica como un modismo. El español conserva 'alma' para reflejar el texto fuente y no eliminar la tensión entre literalidad e idiomatismo; la nota aclara que se refiere a Isaac en su totalidad personal.
  doctrine_reference: Antropología bíblica; modismos del hebreo bíblico
- issue: Relación de propósito entre comer y bendecir
  english_pob_reading: that I may eat, so that my soul may bless you before I die.
  chosen_spanish_reading: '''para que yo coma, a fin de que mi alma te bendiga antes de morir'' mantiene dos pasos de finalidad encadenados.'
  alternative_spanish_readings:
  - '''para que coma y así te bendiga'''
  - '''para comer y bendecirte antes de morir'''
  rationale: El hebreo encadena el comer con el propósito final de bendecir. El español conserva esa progresión para no suavizar la estructura intencional del pasaje, importante narrativamente en la escena de la bendición.
  doctrine_reference: Narrativa patriarcal; bendición paterna en Génesis
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó la relación de cláusulas para reflejar mejor la secuencia del hebreo: preparar la comida, traerla, comer, y luego bendecir. El español sigue esa misma progresión y conserva el valor de propósito de וְאֹכֵלָה y בַּעֲבוּר sin reducirlos a una simple coordinación narrativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando corresponda en el proyecto, aunque este versículo no lo contiene.
  - Se usó 'alma' para נַפְשִׁי siguiendo la conservación del modismo hebreo; no se sustituyó por 'yo' en el texto principal.
  - '''Manjares'' evita un calco excesivamente moderno y preserva el valor de comida preparada con esmero.'
  - La puntuación respeta la progresión de propósito con comas y cláusulas finales claras, adecuada para lectura pública.
