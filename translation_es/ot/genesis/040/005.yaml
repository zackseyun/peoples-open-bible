review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura distributiva del hebreo, la construcción cognada «soñaron un sueño», la afiliación oficial al rey de Egipto y la referencia a la prisión. Sin embargo, «encerrados» queda algo colgante tras «que pertenecían...» y representa con menos precisión el participio relativo «que estaban confinados / presos». Además, «en una sola noche» tiende a intensificar más de lo necesario; el hebreo es más simplemente «en una noche / en la misma noche».
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la frase final suena algo forzada: «que pertenecían al rey de Egipto, encerrados...». Conviene explicitar el relativo para mejor fluidez. «La casa de la cárcel» es comprensible pero algo rígido; aun así, es defendible por su valor formal y está bien apoyado por nota. Se puede mejorar la naturalidad general sin perder textura hebrea.'
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. «Copero», «panadero», «rey de Egipto» y «sueño» están bien. La decisión sobre «casa de la cárcel» es aceptable como conservación formal. El ajuste principal es léxico-sintáctico en אֲסוּרִים: mejor «que estaban presos/confinados» que el participio suelto «encerrados».'
  issues:
  - severity: medium
    issue: 'Participio final mal integrado: «encerrados en la casa de la cárcel»'
    rationale: En español, después de «el copero y el panadero, que pertenecían...», el participio queda algo colgante y menos natural que una cláusula relativa completa. El hebreo usa un participio atributivo que aquí se representa mejor con «que estaban presos/confinados».
  - severity: low
    issue: «En una sola noche» puede sonar más enfático de lo necesario
    rationale: בְּלַיְלָה אֶחָד se puede verter de manera más directa como «en una misma noche» o «en una noche». «Sola» no es incorrecto, pero añade un matiz enfático que no hace falta.
  revised_spanish_text: 'Y ambos soñaron un sueño[a], cada hombre su propio sueño, en una misma noche, cada uno según la interpretación de su sueño: el copero y el panadero, que pertenecían al rey de Egipto[c], que estaban presos en la casa de la cárcel[d].'
  revised_footnotes:
