translation:
  language: es
  text: 'Entonces ella concibió otra vez y dio a luz una hija[a]. Y él le dijo: «Ponle por nombre Lo-ruhamah, porque ya no tendré compasión de la casa de Israel[b], como para perdonarlos jamás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo-ruhamah» reproduce el nombre hebreo; su sentido es algo como «no compadecida» o «sin misericordia».
    reason: lexical_alternative
  - marker: b
    text: 'O quizá: «porque ciertamente los quitaré de en medio» o «los llevaré lejos». El hebreo de la cláusula final es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  english_pob_choice: Then she conceived again
  chosen_spanish: Entonces ella concibió otra vez
  alternatives_spanish:
  - Entonces quedó embarazada otra vez
  - Concibió una vez más
  lexicon: HALOT
  rationale: וַתַּהַר es el wayyiqtol de הרה, ‘concebir/quedar embarazada’; עוֹד añade repetición. «Concibió otra vez» mantiene la secuencia narrativa y la repetición sin sonar forzado en español.
- source_word: וַתֵּלֶד בַּת
  english_pob_choice: and bore a daughter
  chosen_spanish: y dio a luz una hija
  alternatives_spanish:
  - y parió una hija
  - y tuvo una hija
  lexicon: HALOT
  rationale: ילד con בַּת indica el nacimiento de una hija. «Dar a luz» es natural en español y conserva la referencia al acto de parto.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: And he said to him
  chosen_spanish: Y él le dijo
  alternatives_spanish:
  - Entonces él le dijo
  - Y dijo a él
  lexicon: HALOT
  rationale: El hebreo expresa un destinatario masculino con לוֹ. En español se conserva con el clítico «le» sin explicitar indebidamente un sujeto distinto del que el contexto permite.
- source_word: קְרָא שְׁמָהּ
  english_pob_choice: Call her name
  chosen_spanish: Ponle por nombre
  alternatives_spanish:
  - Llámala
  - Llámala por nombre
  lexicon: HALOT
  rationale: Es una fórmula nominal de imposición de nombre. «Ponle por nombre» reproduce bien el valor idiomático y resulta más natural que un calco literal.
- source_word: לֹא רֻחָמָה
  english_pob_choice: Lo-ruhamah
  chosen_spanish: Lo-ruhama
  alternatives_spanish:
  - Lo-ruhamá
  - No-compadecida
  lexicon: HALOT
  rationale: Se translitera el nombre propio, como exige la práctica de POB para nombres, pero se adapta la acentuación al español con forma llana/ aguda según uso editorial. El nombre conserva su vínculo semántico con רחם (‘mostrar compasión’).
- source_word: לֹא אוֹסִיף עוֹד אֲרַחֵם
  english_pob_choice: I will no longer have compassion
  chosen_spanish: ya no volveré a mostrar compasión
  alternatives_spanish:
  - no seguiré mostrando compasión
  - ya no tendré más compasión
  lexicon: HALOT
  rationale: La combinación de לא + יסף + עוד + piel de רחם expresa cese de la acción. «Ya no volveré a mostrar compasión» conserva la fuerza de continuación interrumpida y mantiene la conexión léxica con el nombre de la hija.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la casa de Israelita
  - Israel
  lexicon: HALOT
  rationale: El hebreo usa la expresión covenantal «casa de Israel». Se conserva literalmente porque tiene peso histórico y teológico propio.
- source_word: כִּי נָשֹׂא אֶשָּׂא לָהֶם
  english_pob_choice: that I should ever forgive them
  chosen_spanish: de modo que yo los perdone
  alternatives_spanish:
  - de modo que ciertamente los perdone
  - pues ciertamente los perdonaría
  - porque los llevaré lejos
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto de נשׂא es difícil. En este contexto de retiro de compasión, «perdonar» sigue la lectura auditada por POB, mientras que la forma subordinada «de modo que» refleja el efecto/resultante sin suavizar la tensión del hebreo. La alternativa de ‘llevar lejos/quitar’ queda preservada en nota.
theological_decisions:
- issue: Nombre simbólico de la hija
  english_pob_reading: Transliterate as 'Lo-ruhamah' in the main text while expressing the meaning through the following clause about withheld compassion.
  chosen_spanish_reading: Transliterar como «Lo-ruhama» en el texto principal y dejar que la cláusula siguiente explique el sentido de compasión retirada.
  alternative_spanish_readings:
  - «No compadecida»
  - «No misericordia»
  rationale: La política del proyecto favorece transliterar nombres propios. El peso teológico del signo se conserva por la repetición de רחם como «compasión» y por la nota explicativa.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; preservar la relación léxica'
- issue: 'Cláusula final difícil: כִּי נָשֹׂא אֶשָּׂא לָהֶם'
  english_pob_reading: '''that I should ever forgive them.'' The Hebrew of the final clause is difficult.'
  chosen_spanish_reading: «de modo que yo los perdone» con nota de la lectura alternativa «quitarlos/llevarlos lejos».
  alternative_spanish_readings:
  - «para que yo los perdone»
  - «porque ciertamente los llevaré lejos»
  rationale: La lectura de perdón encaja con el contexto inmediato de compasión negada y con el valor de נשׂא como ‘llevar/soportar’ aplicado al quitar culpa. Pero el hebreo sigue siendo difícil; por eso se conserva la tensión con una nota alternativa en vez de resolverla sin aviso.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas y textuales'
translation_notes:
  revision_awareness: 'He seguido la última revisión inglesa: se mantuvo la secuencia narrativa («entonces... otra vez»), se conservó la referencia a la hija, se eligió un verbo de compasión consistente con el nombre simbólico, y se reflejó la dificultad del final con una lectura principal de perdón y una nota alternativa. También se evitó importar un sujeto explícito que el hebreo no formula en esta cláusula.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparezca explícitamente; aquí no aparece.
  - Se mantiene «casa de Israel» como expresión técnica del hebreo.
  - «Compasión» se mantiene para רוחם/רחם a fin de conservar el vínculo entre el nombre Lo-ruhamah y la cláusula explicativa.
  - El nombre propio se translitera en forma española breve, sin traducirlo dentro del texto principal.
