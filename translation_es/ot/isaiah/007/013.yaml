translation:
  language: es
  text: 'Y dijo[a]: «Oigan, por favor, casa de David: ¿Acaso les parece poco cansar a los hombres[b], como para que también cansen a mi Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces dijo».'
    reason: alternative_reading
  - marker: b
    text: «Hombres» traduce el plural masculino hebreo y contrasta a los seres humanos con Dios; alternativamente, «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso de manera estándar; en español, «Y dijo» conserva la secuencia narrativa sin añadir matices temporales que el hebreo no exige.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Listen, please
  chosen_spanish: Escuchen, por favor
  alternatives_spanish:
  - Oigan, por favor
  - Escuchen ahora
  lexicon: HALOT
  rationale: El imperativo plural con נָא expresa apremio/cortesía. «Escuchen, por favor» suena natural en español y mantiene tanto la apelación urgente como el tono de ruego.
- source_word: בֵּית דָּוִד
  english_pob_choice: house of David
  chosen_spanish: casa de David
  alternatives_spanish:
  - Casa de David
  lexicon: HALOT
  rationale: Aquí designa a la dinastía o colectividad davídica, no solo una casa física. «Casa de David» es la forma más fiel y comprensible en español bíblico.
- source_word: הַמְעַט מִכֶּם
  english_pob_choice: Is it too little for you
  chosen_spanish: ¿Acaso les parece poco
  alternatives_spanish:
  - ¿Les parece una cosa pequeña?
  - ¿Les parece demasiado poco?
  lexicon: HALOT
  rationale: La expresión es una fórmula retórica idiomática. «¿Acaso les parece poco?» conserva la fuerza evaluativa del hebreo con una construcción natural en español.
- source_word: הַלְאוֹת
  english_pob_choice: to weary
  chosen_spanish: cansar
  alternatives_spanish:
  - fatigar
  - agotar
  lexicon: HALOT
  rationale: La raíz לאה se repite en el verso; en español, «cansar» comunica bien la idea de fatigar o molestar persistentemente y permite conservar la repetición léxica en la segunda aparición.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: HALOT
  rationale: El plural masculino hebreo contrasta a los humanos con Dios. «A los hombres» preserva el contraste lexical y la fuerza gramatical del original.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - de modo que
  lexicon: HALOT
  rationale: 'En esta construcción introduce el contenido de la pregunta retórica: «... poco cansar a los hombres, que también...». «Que» es la solución más natural en español.'
- source_word: תַלְאוּ גַּם
  english_pob_choice: you also weary
  chosen_spanish: también cansen
  alternatives_spanish:
  - cansen además
  - aun cansen
  lexicon: HALOT
  rationale: Se conserva la repetición de la raíz con un verbo equivalente en español y el valor aditivo de גַּם con «también».
- source_word: אֶת אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  - el Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona es parte del texto y debe mantenerse. «Mi Dios» conserva el matiz personal y profético, sin diluirlo en una forma general.
theological_decisions:
- issue: Contraste humano/divino en אֲנָשִׁים vs. אֱלֹהָי
  english_pob_reading: men ... my God
  chosen_spanish_reading: los hombres ... mi Dios
  alternative_spanish_readings:
  - las personas ... mi Dios
  - los seres humanos ... mi Dios
  rationale: Se mantiene el contraste entre la esfera humana y la divina. En español, «los hombres» reproduce el valor masculino plural del hebreo y conserva el paralelismo con «mi Dios».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Posesivo de primera persona en אֱלֹהָי
  english_pob_reading: my God
  chosen_spanish_reading: mi Dios
  alternative_spanish_readings:
  - Dios
  - Dios mío
  rationale: 'El posesivo explícito es teológicamente y retóricamente significativo: expresa la relación personal del hablante con Dios y la acusación dirigida a la casa de David. Se conserva sin neutralizarlo.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Repetición de la raíz לאה
  english_pob_reading: weary ... weary
  chosen_spanish_reading: cansar ... cansen
  alternative_spanish_readings:
  - fatigar ... fatiguen
  - agotar ... agoten
  rationale: 'La repetición crea una escalada retórica: cansar a los hombres y luego también a mi Dios. «Cansar» permite reproducir esa repetición sin perder claridad en español.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con la traducción inglesa auditada. La única tensión principal es la forma idiomática de הַמְעַט מִכֶּם, que puede expresarse como pregunta retórica directa o como valoración de poca importancia; se eligió una formulación natural en español que conserva el sentido y la pregunta implícita.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton cuando aparezca; en este versículo no ocurre.
  - Se mantiene «casa de David» como designación dinástica, no como domicilio físico.
  - Se preserva el contraste masculino plural de «los hombres» frente a «mi Dios».
  - «Cansar» se usa de manera consistente para la raíz לאה en este verso, incluyendo la repetición interna.
