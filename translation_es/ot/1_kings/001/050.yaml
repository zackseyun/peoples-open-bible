revisions:
- from: Y Adonías temió[a] a Salomón, se levantó y se fue, y agarró los cuernos del altar.
  to: Y Adonías temió[a] a Salomón, se levantó, se fue y se aferró a los cuernos del altar.
  rationale: Se conserva la estructura y el sentido del original, pero se sustituye «agarró» por «se aferró a» para mejorar el registro bíblico y reflejar mejor el valor contextual de asirse a los cuernos del altar. También se simplifica levemente la puntuación de la serie verbal para una lectura más fluida en español.
