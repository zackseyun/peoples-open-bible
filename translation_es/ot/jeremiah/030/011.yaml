base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/030/011.yaml
  text: For I am with you—oracle of Yahweh—to save you[a]. For I will make a full end of all the nations where I have scattered you, but of you I will not make a full end. I will discipline you with justice[b], and I will by no means leave you unpunished.
  footnotes:
  - marker: a
    text: Or, 'declares the LORD.' The Hebrew prophetic formula נְאֻם יְהוָה is traditionally rendered this way.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will certainly not acquit you.' The Hebrew literally intensifies the verb 'clear/acquit' with a negation.
    reason: lexical_alternative
