review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: sujeto sustantivado (''El que envía''), lavado de ropa, lavado del cuerpo en agua, y reingreso permitido al campamento después. También conserva correctamente ''a Azazel'' con nota alternativa, en línea con la decisión inglesa de preservar la ambigüedad.'
  spanish_quality_summary: La redacción es clara y mayormente natural, pero hay dos ajustes recomendables. Primero, la nota [a] está anclada a 'macho cabrío', aunque la variante corresponde a 'Azazel'; el marcador debe ir sobre 'Azazel'. Segundo, 'lavará sus vestidos' es comprensible, pero 'ropa' o 'vestiduras' suena más natural o más bíblico-formal; además, repetir 'lavará' dos veces en secuencia es algo pesado. 'Lavará su ropa y bañará su cuerpo en agua' mejora la fluidez sin perder precisión ritual.
  glossary_alignment: No hay conflicto con los términos de proyecto. 'Azazel' está bien preservado. 'Campamento' es correcto para הַמַּחֲנֶה. 'Cuerpo' para בְּשָׂרוֹ sigue adecuadamente la racionalidad documentada del POB. El uso de 'macho cabrío' es aceptable aunque el inglés tenía el más simple 'goat'; no distorsiona el sentido.
  issues:
  - severity: medium
    issue: El marcador de nota [a] está puesto en 'macho cabrío' en vez de en 'Azazel'.
    rationale: La nota explica la lectura alternativa de לַעֲזָאזֵל ('para Azazel', remoción, 'chivo expiatorio'), no del sustantivo 'macho cabrío'. Debe anclarse al término correspondiente para fidelidad editorial.
  - severity: low
    issue: '''Lavará sus vestidos'' suena menos natural que ''lavará su ropa'' en español general.'
    rationale: Aunque 'vestidos' no es incorrecto, en español contemporáneo amplio puede sonar restringido o menos idiomático para la ropa en general. 'Ropa' conserva claridad y naturalidad.
  - severity: low
    issue: La secuencia 'lavará... y lavará...' resulta algo pesada.
    rationale: El hebreo distingue lavar la ropa y lavar/bañar el cuerpo. En español puede reflejarse mejor con 'lavará su ropa y bañará su cuerpo en agua', manteniendo la diferencia y mejorando el estilo.
  revised_spanish_text: El que envía el macho cabrío a Azazel[a] lavará su ropa y bañará su cuerpo en agua, y después podrá entrar en el campamento.
  revised_footnotes:
  - marker: a
    text: O «para Azazel»; el término hebreo es disputado. Puede entenderse como un nombre o designación propia, o interpretarse de modo más funcional como referido a la remoción o al llamado «chivo expiatorio».
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación de la nota para que ancle al término discutido 'Azazel' y se pule el español con formulaciones más naturales y fluidas, sin cambiar el sentido fuente ni las decisiones léxicas/theológicas del POB.
