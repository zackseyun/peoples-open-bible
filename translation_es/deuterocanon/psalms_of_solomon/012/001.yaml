translation:
  language: es
  text: Señor, libra mi alma[a] de un hombre sin ley y malvado, de una lengua sin ley y murmuradora, que habla falsedad y engaño[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida» o simplemente «a mí».
    reason: lexical_alternative
  - marker: b
    text: O «de una lengua sin ley y susurrante».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  - Maestro
  lexicon: BDAG
  rationale: El vocativo directo a Dios se expresa de forma natural y reverente como «Señor». En español bíblico, esto conserva la función de invocación sin introducir una perífrasis más arcaica o menos directa.
- source_word: ῥῦσαι
  english_pob_choice: deliver
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - sálvame
  lexicon: BDAG
  rationale: El imperativo pide una acción de liberación activa frente a un peligro. «Libra» comunica con naturalidad esa idea de sacar a alguien de una amenaza, y funciona bien en registro de oración.
- source_word: τὴν ψυχήν μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: BDAG
  rationale: «Alma» mantiene la dignidad y la interioridad del término griego ψυχή. Aunque puede traducirse como «vida» o «a mí», aquí la referencia orante favorece conservar el énfasis personal e interior.
- source_word: ἀνδρὸς παρανόμου καὶ πονηροῦ
  english_pob_choice: a lawless and wicked man
  chosen_spanish: un hombre sin ley y malvado
  alternatives_spanish:
  - un hombre transgresor y malvado
  - un hombre inicuo y perverso
  lexicon: BDAG
  rationale: ἀνήρ se mantiene como «hombre» porque el griego es específico. παράνομος expresa estar fuera o contra la ley; «sin ley» conserva el valor literal y teológico del término. πονηρός se vierte como «malvado», que en español transmite con claridad la malicia moral sin cargar el texto con arcaísmo.
- source_word: γλώσσης
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua
  - habla
  - boca
  lexicon: BDAG
  rationale: El griego usa la imagen concreta del órgano de la palabra. «Lengua» preserva esa metáfora en español y su carga poética.
- source_word: παρανόμου
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - ilegítima
  - transgresora
  lexicon: BDAG
  rationale: Aquí el adjetivo modifica «lengua». «Sin ley» deja visible el paralelismo con el hombre «sin ley» y evita diluir la conexión léxica del pasaje.
- source_word: ψιθυροῦ
  english_pob_choice: whispering
  chosen_spanish: susurrante
  alternatives_spanish:
  - murmuradora
  - de murmuración
  lexicon: BDAG
  rationale: El texto griego usa un adjetivo que describe la lengua como sibilante o de susurro. «Susurrante» conserva la imagen auditiva y sigue la corrección del audit trail que indica que funciona como adjetivo, no como sustantivo.
- source_word: λαλούσης ψευδῆ καὶ δόλια
  english_pob_choice: speaking falsehood and deceit
  chosen_spanish: que habla falsedad y engaño
  alternatives_spanish:
  - que habla mentiras y engaño
  - que dice cosas falsas y engañosas
  lexicon: BDAG
  rationale: El participio describe la actividad de la lengua. «Habla falsedad y engaño» mantiene el paralelismo compacto del griego, con dos objetos nominales que expresan tanto la mentira como la actitud dolosa sin sobreexplicar.
theological_decisions:
- issue: Cómo traducir κύριε en una oración dirigida a Dios sin ocultar el vínculo con el nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  - Yahvé
  rationale: En este versículo el vocativo funciona como oración directa. Aunque el proyecto prefiere «Yahvé» para יהוה en otros contextos, aquí el texto griego usa κύριε como invocación; en español, «Señor» preserva la forma de súplica y el eco bíblico sin afirmar más de lo que el griego muestra de modo inmediato.
  doctrine_reference: Sal 110:1; uso vocativo de κύριος en plegaria
- issue: Si ψυχή debe verterse como «alma», «vida» o «yo/me»
  english_pob_reading: '''My soul'' could also be rendered ''my life'' or simply ''me.'''
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - a mí
  rationale: La nota inglesa preserva la tensión semántica de ψυχή. En este contexto de oración poética, «mi alma» conserva la profundidad interior del término y deja abierta la posibilidad de entender también la vida o la persona entera, sin borrarlo con una simplificación.
  doctrine_reference: Gn 2:7; Sal 42:11; uso semántico de ψυχή
translation_notes:
  revision_awareness: 'El texto griego de 12:1 presenta ἀπὸ γλώσσης παρανόμου καὶ ψιθυροῦ como dos adjetivos coordinados que modifican a «lengua». Se siguió la corrección del audit trail frente a una lectura anterior que convertía ψιθυροῦ en sustantivo («whisperer»), por lo que la traducción española mantiene ambos rasgos como cualidades de la lengua: «sin ley y susurrante».'
  spanish_consistency_notes:
  - Se mantuvo «lengua» para γλώσσα por consistencia con el valor metafórico del órgano de la palabra.
  - Se evitó «SEÑOR» en mayúsculas porque el source griego usa κύριε como vocativo directo, no una convención de sustitución tipográfica del tetragrámaton.
  - Se preservó la pareja semántica «falsedad y engaño» para reflejar ψευδῆ καὶ δόλια sin intensificarla a una paráfrasis más interpretativa.
