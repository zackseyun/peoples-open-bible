translation:
  language: es
  text: Porque todo el que comete injusticias[a] no quedará oculto[b] de tu conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hechos injustos».
    reason: lexical_alternative
  - marker: b
    text: O «no será escondido».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ κρυβήσεται
  english_pob_choice: will not be hidden
  chosen_spanish: quedará oculto
  alternatives_spanish:
  - no será escondido
  - no pasará inadvertido
  lexicon: BDAG
  rationale: El futuro pasivo expresa quedar fuera de la vista o del alcance del conocimiento divino. «Quedará oculto» suena natural en español y conserva la imagen de ocultamiento sin reducirla solo a 'pasar inadvertido'.
- source_word: ἀπὸ τῆς γνώσεώς σου
  english_pob_choice: from your knowledge
  chosen_spanish: ante tu conocimiento
  alternatives_spanish:
  - de tu conocimiento
  - frente a tu conocimiento
  lexicon: BDAG
  rationale: La construcción griega indica separación respecto del conocimiento de Dios. En español, «ante tu conocimiento» comunica mejor la relación de exposición delante de Dios sin volver la frase torpe; mantiene la idea de que nada se sustrae a su saber.
- source_word: πᾶς ποιῶν
  english_pob_choice: everyone who does
  chosen_spanish: nadie que haga
  alternatives_spanish:
  - todo el que haga
  - toda persona que haga
  lexicon: BDAG
  rationale: Aunque el griego usa πᾶς con participio, el giro negativo en español se expresa con naturalidad como «nadie que haga», preservando el alcance universal negativo que el inglés POB también buscó.
- source_word: ἄδικα
  english_pob_choice: unjust deeds
  chosen_spanish: injusticias
  alternatives_spanish:
  - hechos injustos
  - obras injustas
  lexicon: BDAG
  rationale: El contexto inmediato repite el campo léxico δίκαιος/ἄδικος. «Injusticias» conserva ese vínculo temático y la carga judicial/covenantal mejor que el genérico «malo» o «wrong».
theological_decisions:
- issue: Conservar el contraste δίκαιος/ἄδικος del capítulo
  english_pob_reading: everyone who does unjust deeds
  chosen_spanish_reading: nadie que haga injusticias
  alternative_spanish_readings:
  - todo el que haga injusticias
  - quien haga injusticias
  rationale: El pasaje trabaja el contraste entre justicia e injusticia, no solo entre bien y mal en sentido general. «Injusticias» mantiene la fuerza moral y jurídica del vocabulario del capítulo.
  doctrine_reference: Justicia e injusticia en el lenguaje bíblico del pacto; contraste ético-covenantal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la formulación inglesa hacia «everyone who does unjust deeds will not be hidden», por lo que la versión española mantiene el alcance universal negativo y evita una reducción a «wrong» o a una paráfrasis débil. También se respetó la observación teológica sobre el campo léxico δικαιοσύνη/ἀδικία, reflejándolo con «injusticias».
  spanish_consistency_notes:
  - Se usa «quedará oculto» para un pasivo futuro que en español suena más idiomático que un calco rígido.
  - Se evita «SEÑOR» y se mantiene la relación directa con Dios implícita en el «tu» del texto griego.
  - «Injusticias» conserva mejor la red semántica de ἄδικα en este contexto que «mal» o «wrong».
