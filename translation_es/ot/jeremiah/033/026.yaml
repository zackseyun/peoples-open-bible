translation:
  language: es
  text: entonces yo también rechazaría el linaje de Jacob y de David, mi siervo[a], y no tomaría de su descendencia gobernantes sobre el linaje de Abraham, Isaac y Jacob. Porque restauraré su fortuna[b] y tendré compasión de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la simiente de Jacob»; y a lo largo del versículo, «simiente» en vez de «linaje» o «descendencia». זֶרַע es un singular colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «haré volver su cautiverio» / «haré volver a sus exiliados». El hebreo puede aludir específicamente al regreso del exilio o, de manera más amplia, a una restauración de la situación de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: then ... also
  chosen_spanish: entonces ... también
  alternatives_spanish:
  - también
  - además
  lexicon: HALOT
  rationale: En la apódosis condicional del contexto, גַּם añade una idea consecuencial; en español, «entonces ... también» conserva esa relación lógica mejor que un simple «también».
- source_word: זֶרַע יַעֲקֹב
  english_pob_choice: the offspring of Jacob
  chosen_spanish: el linaje de Jacob
  alternatives_spanish:
  - la descendencia de Jacob
  - la simiente de Jacob
  lexicon: HALOT
  rationale: זֶרַע funciona aquí como colectivo singular. «Linaje» preserva la idea colectiva y suena natural en español bíblico sin perder el valor genealógico.
- source_word: וְדָוִד עַבְדִּי
  english_pob_choice: and of David my servant
  chosen_spanish: y de David, mi siervo
  alternatives_spanish:
  - y David, mi siervo
  - y de David, mi siervo
  lexicon: HALOT
  rationale: Se mantiene el título pactal «mi siervo» para David. El «de» ayuda a reflejar la coordinación del hebreo con el sujeto colectivo anterior bajo el verbo de rechazo.
- source_word: אֶמְאַס
  english_pob_choice: I would ... reject
  chosen_spanish: rechazaría
  alternatives_spanish:
  - rechazaré
  - despreciaría
  lexicon: HALOT
  rationale: El imperfecto en el marco condicional previo requiere valor modal, no futuro simple. «Rechazaría» conserva la fuerza hipotética y evita endurecer el matiz con «despreciaría».
- source_word: מִקַּחַת
  english_pob_choice: not taking
  chosen_spanish: y no tomaría
  alternatives_spanish:
  - sin tomar
  - y no escogería
  lexicon: HALOT
  rationale: La construcción infinitiva expresa el resultado de ese rechazo. «No tomaría» reproduce el verbo לָקַח de manera directa y mantiene el paralelismo con el texto fuente.
- source_word: מִזַּרְעוֹ
  english_pob_choice: from his offspring
  chosen_spanish: de su descendencia
  alternatives_spanish:
  - de su linaje
  - de su simiente
  lexicon: HALOT
  rationale: El sufijo masculino singular se entiende mejor como referencia a David, según el contexto y el audit trail inglés. «Descendencia» es una opción natural para el colectivo genealógico.
- source_word: מֹשְׁלִים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - jefes
  lexicon: HALOT
  rationale: El participio plural designa personas con autoridad de gobierno. «Gobernantes» es un equivalente claro y adecuado para el español contemporáneo.
- source_word: אֶל זֶרַע אַבְרָהָם יִשְׂחָק וְיַעֲקֹב
  english_pob_choice: over the offspring of Abraham, Isaac, and Jacob
  chosen_spanish: sobre el linaje de Abraham, Isaac y Jacob
  alternatives_spanish:
  - para el linaje de Abraham, Isaac y Jacob
  - sobre la descendencia de Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Con משל, אֶל marca la esfera/objeto del gobierno. «Sobre» expresa correctamente la relación de autoridad; se conserva el colectivo singular de זֶרַע con «linaje».
- source_word: שְׁבוּת
  english_pob_choice: fortunes / captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - fortuna
  - destino
  - exilio
  lexicon: HALOT
  rationale: 'El audit trail inglés preserva la ambigüedad idiomática del hebreo: restauración de cautiverio o de fortuna. Aquí se opta por «cautiverio», una lectura legítima y textual; la alternativa se documenta en nota.'
- source_word: וְרִחַמְתִּים
  english_pob_choice: have compassion on them
  chosen_spanish: tendré compasión de ellos
  alternatives_spanish:
  - tendré misericordia de ellos
  - me compadeceré de ellos
  lexicon: HALOT
  rationale: רחם expresa compasión entrañable. «Tendré compasión de ellos» es natural en español y mantiene el tono afectivo de la misericordia divina.
theological_decisions:
- issue: Fuerza condicional del pasaje dependiente de Jeremías 33:25
  english_pob_reading: Render the main verbs modally ('would reject') as the apodosis of an unreal condition.
  chosen_spanish_reading: Reproducir el valor modal con «rechazaría» y «tomaría» en la apódosis hipotética.
  alternative_spanish_readings:
  - rechazaré
  - rechazo
  rationale: El hebreo continúa la condición irreal del versículo anterior; el español debe conservar esa dependencia lógica. Un futuro simple oscurecería la negación hipotética del pacto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente de «su descendencia»
  english_pob_reading: Take the suffix in מִזַּרְעוֹ as referring to David.
  chosen_spanish_reading: Mantener el referente en David con «su descendencia».
  alternative_spanish_readings:
  - la descendencia de Jacob
  - la descendencia de él
  rationale: El antecedente singular más cercano es David, y el contexto del pacto davídico exige preservar esa lectura específica en lugar de diluirla en una referencia nacional general.
  doctrine_reference: Translation philosophy §1, §5
- issue: Idiomática de שְׁבוּת
  english_pob_reading: I will restore their fortunes / I will bring back their exiles.
  chosen_spanish_reading: «Haré volver su cautiverio» mantiene la ambigüedad del hebreo y la decisión textual adoptada.
  alternative_spanish_readings:
  - restauraré su fortuna
  - haré volver sus exiliados
  rationale: El hebreo puede referirse tanto al retorno del exilio como a la restauración de la suerte. «Haré volver su cautiverio» preserva la tensión sin resolverla unilateralmente.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'Se integró la preferencia del último pase por una redacción más directa de la construcción infinitiva: «not taking» quedó reflejado como «y no tomaría», sin añadir explicación extra en el cuerpo del texto. Se mantuvo el valor modal de la apódosis y la referencia davídica del sufijo, conforme al audit trail inglés y al texto hebreo.'
  spanish_consistency_notes:
  - 'Se conservaron términos colectivos coherentes para זֶרַע: «linaje» / «descendencia» según el contexto sintáctico.'
  - Se mantuvo «mi siervo» para David por continuidad con el lenguaje pactal documentado.
  - Se evitó «SEÑOR»; no aparece el Tetragrámaton en este versículo.
  - La nota sobre שְׁבוּת preserva la ambigüedad fuente sin imponer una sola solución interpretativa.
