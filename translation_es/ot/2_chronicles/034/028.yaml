base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/028.yaml
  text: Behold[a], I am about to gather you to your fathers, and you will be gathered to your graves in peace[c][b], and your eyes will not see all the disaster that I am bringing on this place and on its inhabitants.’ And they brought back word to the king.
  footnotes:
  - marker: a
    text: Or 'to your ancestors.' The Hebrew reads 'to your fathers,' a common idiom for joining one’s forefathers in death.
    reason: lexical_alternative
  - marker: b
    text: '''In peace'' likely means that Josiah would be spared from seeing the coming disaster, as the next clause explains; it need not imply that his death itself would be without violence.'
    reason: cross_reference
  - marker: c
    text: Or 'to your graves'.
    reason: previous_rendering
