review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del hebreo: fórmula profética, anuncio inminente, entrega al poder de enemigos odiados y de aquellos de quienes se ha apartado su alma. Conserva correctamente la nota sobre la expresión final נָקְעָה נַפְשֵׁךְ מֵהֶם. Sin embargo, hay dos desajustes relevantes: (1) אֲשֶׁר שָׂנֵאת está mejor en presente relacional en este contexto de oráculo (''odias'') que en pretérito (''detestaste''); (2) נֹתְנָךְ se acerca más a ''te entrego/estoy entregándote'' que a ''te pongo'', que suena algo más débil y menos exacto para el acto de entrega judicial.'
  spanish_quality_summary: El español es legible y digno, pero 'yo te pongo en manos de' suena menos natural y menos preciso que 'yo te entrego en manos de'. Además, repetir 'aquellos' funciona, pero 'quienes' tras 'en manos de' da una lectura más fluida. 'He aquí' es aceptable en registro profético. La frase final 'de quienes tu alma se apartó' es clara y conserva bien la fuerza visceral.
  glossary_alignment: Buena alineación con la política del proyecto al usar 'Yahvé' explícitamente. 'el Señor Yahvé' es defendible para אֲדֹנָי יְהוִה, aunque algo redundante; no exige adjudicación mayor aquí. Se preserva 'alma' para נֶפֶשׁ y la nota léxica mantiene las alternativas documentadas. No hay conflicto doctrinal serio.
  issues:
  - severity: medium
    issue: Tiempo verbal de אֲשֶׁר שָׂנֵאת
    rationale: El hebreo perfecto en este contexto de caracterización relacional se vierte mejor en español como presente ('a quienes odias') que como pretérito ('detestaste'), en línea con el sentido del inglés POB y del oráculo vigente.
  - severity: medium
    issue: Renderizado de נֹתְנָךְ como 'te pongo'
    rationale: '''Dar/entregar'' refleja mejor el verbo נתן y el acto de entrega judicial. ''Poner en manos de'' se entiende, pero es menos directo y algo menos fiel al participio de inminencia.'
  - severity: low
    issue: Elección de 'detestar' frente a 'odiar'
    rationale: Aunque 'detestar' expresa repulsión, שׂנא se corresponde de manera más estándar y nítida con 'odiar'. Dado que el verso ya tiene un segundo verbo para la alienación visceral, 'odiar' evita mezclar matices.
  revised_spanish_text: 'Porque así ha dicho el Señor Yahvé: He aquí[a], yo te entrego en manos de quienes odias, en manos de quienes tu alma se apartó.'
  revised_footnotes:
