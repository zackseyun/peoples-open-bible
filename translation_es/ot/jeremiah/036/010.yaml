    issue: '''en el rollo'' para בַּסֵּפֶר'
    rationale: Aunque defendible como calco del hebreo, en español con 'leer' lo natural es 'leer del rollo' o 'leer en el rollo' solo cuando se indica localización dentro del texto. Aquí la idea es fuente del texto leído.
  - severity: high
    issue: '''en oído de todo el pueblo'' para בְּאָזְנֵי כָּל הָעָם'
    rationale: La frase no es español natural ni claramente inteligible. 'A oídos de todo el pueblo' preserva mejor el idiomatismo de audibilidad pública y mantiene la dignidad del registro.
