lexical_decisions:
- source_word: לְעָשִׁיר
  english_pob_choice: the rich man
  chosen_spanish: el hombre rico
  alternatives_spanish:
  - un hombre rico
  - para el rico
  lexicon: HALOT
  rationale: La construcción con ל + היה expresa posesión/existencia; en español, la forma natural y clara es una expresión nominal con artículo definido. «El hombre rico» conserva la referencia narrativa determinada por el contexto de contraste con el hombre pobre cercano.
- source_word: הָיָה
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - había
  - poseía
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «era/estaba», aquí funciona como posesión idiomática. «Tenía» reproduce de manera natural esa relación posesiva en español sin perder el valor existencial del original.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ganado menor
  lexicon: HALOT
  rationale: צֹאן designa colectivamente ganado menor, especialmente ovejas y cabras. Como el texto contrapone este término con בָקָר, «ovejas» es una representación idiomática y suficientemente específica en español.
- source_word: וּבָקָר
  english_pob_choice: and cattle
  chosen_spanish: y ganado
  alternatives_spanish:
  - y reses
  - y bueyes
  - y vacas
  lexicon: HALOT
  rationale: בָקָר se refiere a animales de pastoreo, comúnmente ganado mayor. «Ganado» mantiene el valor colectivo y evita restringir innecesariamente a un solo tipo de animal.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very many
  chosen_spanish: muchas
  alternatives_spanish:
  - muchísimas
  - en gran abundancia
  - muy numerosas
  lexicon: HALOT
  rationale: La combinación intensifica la cantidad. En español, el contexto admite una expresión breve y natural; el adverbio intensivo queda razonablemente reflejado por el plural cuantificable «muchas» en un inventario narrativo, sin sobrerrecargar el estilo.
translation_notes:
  revision_awareness: El pasaje hebreo es breve y estable; la versión inglesa POB también fue revisada sin cambios sustanciales. La principal decisión española consiste en conservar la posesión idiomática con «tenía» y reflejar los sustantivos colectivos con términos naturales en español.
  spanish_consistency_notes:
  - Se usa «el hombre rico» como referencia definida por el contexto narrativo, no como universalización indefinida.
  - Se evita «SEÑOR» o lenguaje cultual ajeno, ya que el texto no contiene el nombre divino ni un término teológico de ese tipo.
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis natural en español contemporáneo.
