translation:
  language: es
  text: Y los tomaré como mi pueblo, y seré su Dios, y sabrán que yo soy Yahvé su Dios, el que los sacó de debajo de las cargas[a] de Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de debajo de los trabajos forzados de Egipto».
    reason: lexical_alternative
  - marker: b
    text: 'O «el que los saca». El participio hebreo puede presentar a Yahvé como el libertador característico o el acto visto como definitorio; aquí se sigue la revisión auditada que lo entiende retrospectivamente: «los sacó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  english_pob_choice: I will take
  chosen_spanish: te tomaré
  alternatives_spanish:
  - te recibiré
  - te tomaré para mí
  lexicon: HALOT
  rationale: El verbo expresa aquí una acción futura de incorporación o asunción en relación de pacto. «Tomaré» conserva la fuerza de la iniciativa divina sin volverla demasiado interpretativa; el clítico «te» hace natural en español el objeto directo plural en segunda persona.
- source_word: לִי לְעָם
  english_pob_choice: to be my people
  chosen_spanish: para que seas mi pueblo
  alternatives_spanish:
  - como mi pueblo
  - para mí como pueblo
  lexicon: HALOT
  rationale: La construcción doble con לִי y לְעָם expresa pertenencia y relación de pacto. En español, «para que seas mi pueblo» comunica con claridad el resultado relacional sin perder el matiz de pertenencia. «Mi pueblo» evita una paráfrasis más amplia que diluya la fórmula.
- source_word: וְהָיִיתִי לָכֶם לֵאלֹהִים
  english_pob_choice: I will be your God
  chosen_spanish: seré tu Dios
  alternatives_spanish:
  - seré Dios para ti
  - llegaré a ser tu Dios
  lexicon: HALOT
  rationale: La fórmula de pacto en español se expresa con naturalidad y precisión como «seré tu Dios». Mantiene el paralelismo con «mi pueblo» y evita sobreexplicar una relación ya establecida por el hebreo.
- source_word: וִידַעְתֶּם
  english_pob_choice: you will know
  chosen_spanish: sabrás
  alternatives_spanish:
  - conocerás
  - llegarás a saber
  lexicon: HALOT
  rationale: El plural hebreo queda vertido en una forma singular colectiva adecuada al español bíblico y litúrgico neutral. «Sabrás» preserva el reconocimiento cognitivo/experiencial sin sonar rebuscado; «conocerás» podría sonar más relacional, pero aquí el objeto es una afirmación reconocible.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma española establecida en el marco POB y evita la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo posesivo relacional se traduce de forma directa como «tu Dios». En este contexto, el singular dirigido al grupo suena natural en español bíblico y mantiene la cercanía del pacto.
- source_word: הַמּוֹצִיא
  english_pob_choice: who brought you out
  chosen_spanish: el que te sacó
  alternatives_spanish:
  - el que te está sacando
  - el que te saca
  lexicon: HALOT
  rationale: El participio hebreo puede leerse como acción definitoria o como acto visto retrospectivamente desde el resultado prometido. Siguiendo la revisión auditada en inglés, el español adopta el pasado «sacó» porque el conocimiento esperado mira al acto ya realizado dentro de la promesa.
- source_word: מִתַּחַת
  english_pob_choice: from under
  chosen_spanish: de debajo de
  alternatives_spanish:
  - de bajo de
  - desde debajo de
  lexicon: HALOT
  rationale: «De debajo de» reproduce de manera clara la imagen espacial de sujeción y opresión. Es más idiomático en español que un calco rígido, pero mantiene la metáfora.
- source_word: סִבְלֹת
  english_pob_choice: the burdens
  chosen_spanish: las cargas
  alternatives_spanish:
  - las tareas forzadas
  - los trabajos forzados
  - los pesados fardos
  lexicon: HALOT
  rationale: «Cargas» conserva la imagen de peso/opresión sin reducir el término a una sola interpretación. Frente a «trabajos forzados», que es más explicativo, «cargas» permite abarcar tanto el peso literal como la servidumbre laboral.
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español. No requiere glosa adicional en el texto principal.
theological_decisions:
- issue: 'Fórmula de pacto: pueblo de Yahvé / Dios de Israel'
  english_pob_reading: And I will take you to be my people, and I will be your God.
  chosen_spanish_reading: Y te tomaré para que seas mi pueblo, y seré tu Dios.
  alternative_spanish_readings:
  - Y te tomaré como mi pueblo, y seré tu Dios
  - Y te tomaré para ser mi pueblo, y seré tu Dios
  rationale: La cláusula se mantiene como fórmula relacional de pacto sin introducir categorías posteriores. «Para que seas mi pueblo» conserva la finalidad y pertenencia sin convertirla en una explicación doctrinal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nombre divino y reconocimiento del sujeto hablante
  english_pob_reading: I am Yahweh your God
  chosen_spanish_reading: yo soy Yahvé, tu Dios
  alternative_spanish_readings:
  - yo soy Yahvé, vuestro Dios
  - yo soy el Yahvé, tu Dios
  rationale: Se preserva el nombre revelado en lugar de sustituirlo por un título. La coma tras «Yahvé» aísla la autoidentificación divina y hace claro que «tu Dios» retoma la relación de pacto.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
- issue: 'Participio en הַמּוֹצִיא: acción definida o presente característico'
  english_pob_reading: who brought you out
  chosen_spanish_reading: el que te sacó
  alternative_spanish_readings:
  - el que te saca
  - el que te está sacando
  rationale: Aunque el participio hebreo puede tener fuerza caracterizadora, la revisión textual auditada en inglés inclinó la lectura hacia el acto visto como ya realizado desde la perspectiva del conocimiento prometido. El español sigue esa decisión para no perder la relación entre promesa y reconocimiento.
  doctrine_reference: Applied revision note dated 2026-04-23T10:30:08Z
- issue: Sufrimiento/opresión expresado por סִבְלֹת
  english_pob_reading: burdens of Egypt
  chosen_spanish_reading: las cargas de Egipto
  alternative_spanish_readings:
  - los trabajos forzados de Egipto
  - las opresiones de Egipto
  rationale: «Cargas» preserva la metáfora hebrea y deja abierta la referencia tanto al peso de la servidumbre como al trabajo impuesto. No se estrecha el sentido a una sola lectura social o económica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada del inglés que cambió la idea de acción presente/continuada por un pasado visto desde el resultado («who brought you out»). También conserva el nombre divino como Yahvé y mantiene la fórmula de pacto sin convertirla en una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al criterio global del proyecto.
  - Se traduce la relación de pacto con «mi pueblo» / «tu Dios» para mantener el paralelismo hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Cargas» conserva la imagen de opresión sin fijar excesivamente el término en «trabajos forzados».
