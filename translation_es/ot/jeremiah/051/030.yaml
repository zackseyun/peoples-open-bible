translation:
  language: es
  text: Los guerreros de Babilonia han dejado de luchar; se sientan en las fortalezas. Se ha agotado su fuerza; han llegado a ser como mujeres[a]. Sus moradas fueron incendiadas; sus barras fueron quebradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «han llegado a ser mujeres»; es una burla hebrea por la pérdida de coraje en la batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ
  english_pob_choice: have stopped
  chosen_spanish: han dejado de
  alternatives_spanish:
  - han cesado
  - han parado
  lexicon: HALOT
  rationale: El verbo expresa cese de una acción ya en curso. En español, 'han dejado de' comunica con naturalidad la interrupción completa de luchar, sin perder el matiz perfectivo.
- source_word: גִבּוֹרֵי
  english_pob_choice: warriors
  chosen_spanish: guerreros
  alternatives_spanish:
  - hombres valientes
  - héroes
  lexicon: HALOT
  rationale: En contexto militar, el término apunta a combatientes. 'Guerreros' conserva la fuerza bélica y evita el arcaísmo de 'hombres valientes'.
- source_word: לְהִלָּחֵם
  english_pob_choice: fighting
  chosen_spanish: luchar
  alternatives_spanish:
  - pelear
  - combatir
  lexicon: HALOT
  rationale: El infinitivo indica la actividad cesada. 'Luchar' es la forma más natural en español para el acto de batalla y funciona bien con 'dejar de'.
- source_word: יָשְׁבוּ
  english_pob_choice: they sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - se han sentado
  - permanecen
  lexicon: HALOT
  rationale: El verbo describe su retraimiento pasivo en las defensas. La forma presente en español da viveza narrativa, siguiendo la elección inglesa de un cuadro inmediato.
- source_word: בַּמְּצָדוֹת
  english_pob_choice: in the strongholds
  chosen_spanish: en las fortalezas
  alternatives_spanish:
  - en los baluartes
  - en las plazas fuertes
  lexicon: HALOT
  rationale: El sustantivo designa lugares fortificados. 'Fortalezas' es claro en español y preserva el sentido defensivo sin tecnicismo excesivo.
- source_word: נָשְׁתָה
  english_pob_choice: has failed
  chosen_spanish: se ha agotado
  alternatives_spanish:
  - se ha desvanecido
  - se ha secado
  lexicon: HALOT
  rationale: La raíz denota secarse, agotarse o perder vigor. 'Se ha agotado' transmite bien la pérdida de energía o firmeza del valor en español.
- source_word: גְבוּרָתָם
  english_pob_choice: their strength
  chosen_spanish: su valor
  alternatives_spanish:
  - su fuerza
  - su valentía
  lexicon: HALOT
  rationale: Aquí la idea es tanto fuerza como coraje militar. 'Valor' recoge bien el matiz de bravura en combate, mientras mantiene la tensión poética del texto.
- source_word: הָיוּ לְנָשִׁים
  english_pob_choice: they have become like women
  chosen_spanish: han llegado a ser como mujeres
  alternatives_spanish:
  - se han vuelto mujeres
  - han quedado como mujeres
  lexicon: HALOT
  rationale: La construcción es una burla profética de cobardía o colapso en la guerra, no una afirmación literal sobre sexo o identidad. 'Como mujeres' conserva el comparativo explícito y la dureza retórica del hebreo.
- source_word: הִצִּיתוּ
  english_pob_choice: are set on fire
  chosen_spanish: han sido incendiadas
  alternatives_spanish:
  - han sido prendidas fuego
  - están ardiendo
  lexicon: HALOT
  rationale: Aunque el hebreo usa forma activa, el contexto deja implícito el agente y enfoca el resultado sobre Babilonia. La pasiva española es más idiomática y mantiene el cuadro de ruina.
- source_word: מִשְׁכְּנֹתֶיהָ
  english_pob_choice: her dwellings
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus viviendas
  - sus habitaciones
  lexicon: HALOT
  rationale: Se refiere a las residencias o lugares habitados de Babilonia. 'Moradas' es solemne y amplio, adecuado al tono profético.
- source_word: נִשְׁבְּרוּ
  english_pob_choice: are broken
  chosen_spanish: han sido quebradas
  alternatives_spanish:
  - han sido rotas
  - están quebradas
  lexicon: HALOT
  rationale: El pasivo perfecto expresa una acción consumada. 'Quebradas' conserva el registro bíblico sin depender de un calco rígido.
- source_word: בְרִיחֶיהָ
  english_pob_choice: her bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus cerrojos
  - sus travesaños
  lexicon: HALOT
  rationale: En el contexto de defensa urbana, se trata de las barras de cierre de puertas o portones. 'Barras' es directo y suficientemente preciso en español.
theological_decisions:
- issue: La comparación 'han llegado a ser como mujeres' en un contexto bélico
  english_pob_reading: a Hebrew taunt for loss of courage in battle
  chosen_spanish_reading: una burla profética por la pérdida de valor en combate
  alternative_spanish_readings:
  - han llegado a ser mujeres
  - se comportan como mujeres
  rationale: Se conserva la dureza del hebreo sin convertirla en una afirmación ontológica ni suavizarla. La comparación retórica comunica cobardía militar, tal como indica el audit trail inglés.
  doctrine_reference: Translation philosophy §4; mantener el golpe retórico del texto fuente sin distorsión literalizante ni eufemismo
translation_notes:
  revision_awareness: 'Revisado en continuidad con el último pase: no se introdujeron cambios sustantivos respecto al juicio de alta concordancia. Se mantuvo el valor retórico de la comparación final y la pasiva idiomática para el incendio de las moradas.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma POB, pero este versículo no contiene el nombre divino.
  - '''Guerreros'' y ''valor'' mantienen el registro militar del hebreo sin arcaísmo innecesario.'
  - 'La estructura verbal española conserva la sucesión de juicios: cese de la lucha, refugio, agotamiento, humillación, incendio y quebrantamiento.'
