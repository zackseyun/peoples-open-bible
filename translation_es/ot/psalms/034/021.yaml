translation:
  language: es
  text: Él guarda todos sus huesos[a][b]; ni uno de ellos está quebrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «custodia» o «preserva» todos sus huesos.
    reason: lexical_alternative
  - marker: b
    text: Esta línea es citada en Juan 19:36 en relación con la crucifixión de Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - cuida
  - preserva
  - vigila
  lexicon: HALOT
  rationale: El participio expresa la acción continua de proteger/guardar. «Guarda» comunica bien la idea de custodia activa en español sin perder naturalidad. «Preserva» sería posible, pero suena más estático; «vigila» enfatiza observación más que protección.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: El distributivo exige incluir el conjunto completo de los huesos. «Todos» es la forma más natural y clara en español.
- source_word: עַצְמוֹתָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - todos sus huesos
  - los huesos de él
  lexicon: HALOT
  rationale: «Huesos» es el equivalente directo de עצמות. El posesivo singular se conserva con «sus», en línea con la lectura del poema para un justo individual. «Todos sus huesos» ya queda cubierto por «todos».
- source_word: אַחַת
  english_pob_choice: not one
  chosen_spanish: ninguno
  alternatives_spanish:
  - ni uno
  - no uno
  lexicon: HALOT
  rationale: Aunque literalmente es «uno» femenino, el español idiomático para la negación distributiva es «ninguno». El sentido es que ni un solo hueso se quebrará.
- source_word: מֵהֵנָּה
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de estas
  - de esas
  lexicon: HALOT
  rationale: El partitivo indica uno salido del conjunto ya mencionado; «de ellos» reproduce bien esa relación en español.
- source_word: נִשְׁבָּרָה
  english_pob_choice: is broken
  chosen_spanish: se quebrará
  alternatives_spanish:
  - será quebrado
  - ha sido quebrado
  lexicon: HALOT
  rationale: El verbo שׁבר en nifal significa «ser roto/quebrado». En español, para una formulación proverbial y vigente, «se quebrará» transmite bien la pasiva/resultativa. La opción refleja la fuerza gnómica del hebreo sin sonar forzada.
theological_decisions:
- issue: Referente singular del sufijo y lectura inmediata del salmo
  english_pob_reading: Rendered as singular 'he/his,' referring to the righteous person in the psalm's immediate context.
  chosen_spanish_reading: Se mantiene el singular «él/sus», refiriéndolo al justo en el contexto inmediato del salmo.
  alternative_spanish_readings:
  - Se podría generalizar como «los huesos del justo»
  - Se podría explicitar una lectura cristológica en el texto principal
  rationale: El hebreo usa sufijos singulares y el contexto inmediato presenta al justo como sujeto del cuidado de Yahvé. La traducción conserva ese sentido directo sin introducir en el cuerpo del texto una interpretación posterior, aunque la cita neotestamentaria siga siendo compatible.
  doctrine_reference: Primacía del sentido original; conservar la tensión canónica sin resolverla en la traducción principal.
- issue: Cita posterior en Juan 19:36
  english_pob_reading: This line is cited in John 19:36 in connection with Jesus' crucifixion.
  chosen_spanish_reading: Se reconoce su posterior uso en Juan 19:36, pero no se incorpora en la línea principal.
  alternative_spanish_readings:
  - Añadir una nota de cumplimiento cristológico en el texto principal
  - Omitir toda referencia canónica posterior
  rationale: La línea hebrea en su propio contexto no exige una referencia explícita a Jesús; sin embargo, la tradición bíblica posterior sí la lee en ese marco. Mantenerla en nota preserva la transparencia del texto fuente y la recepción canónica.
  doctrine_reference: Relación entre sentido histórico y recepción canónica; lectura tipológica compatible sin eclipsar el sentido primero.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo y el audit trail inglés, sin cambios respecto de la lectura consensuada: preserva el sujeto singular, la negación distributiva y el valor gnómico del verbo final.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto cuando el texto base alude al cuidado divino implícito en el salmo, aunque aquí el versículo no lo nombra explícitamente.
  - Se evitó «Cristo» porque el verso, en su forma primaria, habla del justo del salmo; la referencia a Juan 19:36 queda en nota.
  - «Se quebrará» mantiene naturalidad en español y conserva la pasiva del nifal mejor que una forma demasiado literal como «será quebrado».
