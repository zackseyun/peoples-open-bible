base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/004.yaml
  text: Or if a person swears rashly with his lips to do evil or to do good—whatever a person may utter in an oath—and it is hidden from him[a], and he comes to know it and becomes guilty in one of these matters[b],
  footnotes:
  - marker: a
    text: Hebrew 'whatever a man may utter in an oath'; 'man' here is a representative singular for any person.
    reason: lexical_alternative
  - marker: b
    text: Or 'utters with his lips'; the Hebrew expression can emphasize verbal utterance itself, though the context suggests a rash or thoughtless oath.
    reason: lexical_alternative
