base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/010.yaml
  text: They put it into the hand of the workmen who were appointed over the house of Yahweh[b][a], and the workmen who were working in the house of Yahweh gave it for repairing and strengthening the house.
  footnotes:
