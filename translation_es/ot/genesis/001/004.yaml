revisions:
- from: Yahvé vio que la luz era buena[a], y Yahvé separó la luz de las tinieblas.
  to: Y Dios vio que la luz era buena[a], y Dios separó la luz de la oscuridad.
  rationale: Se reemplaza «Yahvé» por «Dios» porque el hebreo tiene אֱלֹהִים, no יהוה; así se preserva la evidencia fuente y la auditoría inglesa. Se ajusta «las tinieblas» a «la oscuridad» para reflejar mejor הַחֹשֶׁךְ en singular definido y alinearse con la decisión léxica documentada, sin perder naturalidad en español. Se conserva la repetición del sujeto, «vio», «era buena» y la nota léxica sobre «dividió / hacer una distinción».
  reviewer_model: gpt-5.4
