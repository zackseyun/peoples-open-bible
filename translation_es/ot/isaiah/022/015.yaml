  text: כֹּ֥ה אָמַ֛ר אֲדֹנָ֥/י יְהוִ֖ה צְבָא֑וֹת לֶךְ בֹּא֙ אֶל הַ/סֹּכֵ֣ן הַ/זֶּ֔ה עַל שֶׁבְנָ֖א אֲשֶׁ֥ר עַל הַ/בָּֽיִת־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/022/015.yaml
  text: 'Thus says the Lord Yahweh of hosts: Go[a], come to this steward, to Shebna[b], who is over the house:'
  footnotes:
  - marker: a
    text: Or 'Go in to this official, Shebna.' The Hebrew has two imperatives, 'Go, come,' which may function together idiomatically.
    reason: lexical_alternative
  - marker: b
    text: '''Who is over the house'' refers to a chief palace administrator or steward.'
    reason: cultural_note
