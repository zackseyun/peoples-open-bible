translation:
  language: es
  text: Aunque él me mate[a], no tendré esperanza; con todo, argumentaré mis caminos delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lectura tradicional: «Aunque él me mate, todavía esperaré en él». Esta frase refleja una lectura alternativa del hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - He aquí
  - En verdad
  lexicon: HALOT
  rationale: En este contexto introduce una relación concesiva, y «Aunque» reproduce esa fuerza de manera natural en español sin perder el tono elevado del verso.
- source_word: יִקְטְלֵנִי
  english_pob_choice: he slay me
  chosen_spanish: él me mate
  alternatives_spanish:
  - él me mate de muerte
  - él me hiera mortalmente
  lexicon: HALOT
  rationale: El verbo expresa matar o dar muerte; «mate» conserva el valor grave y solemne de «slay» sin endurecer innecesariamente el español.
- source_word: לֹא אֲיַחֵל
  english_pob_choice: I will not hope
  chosen_spanish: no esperaré
  alternatives_spanish:
  - no tendré esperanza
  - no aguardaré
  lexicon: HALOT
  rationale: La consonantal lectura con לֹא requiere negación. En español, «esperaré» comunica tanto esperar como confiar/esperar con la misma amplitud semántica que el hebreo יחל en este contexto, y mantiene la tensión textual documentada por la nota tradicional.
- source_word: אַךְ
  english_pob_choice: yet
  chosen_spanish: con todo
  alternatives_spanish:
  - pero
  - sin embargo
  - no obstante
  lexicon: HALOT
  rationale: Marca contraste con lo anterior. «Con todo» suena natural y conserva el giro adversativo de Job sin volverlo demasiado conversacional.
- source_word: דְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mi conducta
  - mi caso
  lexicon: HALOT
  rationale: La imagen literal de «caminos» es clara en español bíblico y preserva el color hebreo; además puede abarcar conducta o curso de vida sin explicitar de más.
- source_word: אֶל־פָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  - cara a cara con él
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «a su rostro». «Delante de él» transmite la presentación directa del caso ante Dios con naturalidad en español.
- source_word: אוֹכִיחַ
  english_pob_choice: I will argue
  chosen_spanish: argumentaré
  alternatives_spanish:
  - defenderé mi causa
  - probaré
  - rebatiré
  lexicon: HALOT
  rationale: El causativo tiene aquí un valor forense/de disputa. «Argumentaré» conserva esa idea de presentar y sostener una causa ante un juez, como refleja el entorno legal del libro de Job.
theological_decisions:
- issue: 'Lectura del segundo hemistiquio: negación del texto consonántico frente a la lectura tradicional de esperanza en Dios'
  english_pob_reading: 'Follow the MT as written: ''Though he slay me, I will not wait'' / footnote preserving the traditional reading ''yet will I hope in him.'''
  chosen_spanish_reading: 'Seguir la lectura consonántica: «no esperaré», con nota que preserve la lectura tradicional «todavía esperaré en él / en Dios».'
  alternative_spanish_readings:
  - todavía esperaré en él
  - aun así esperaré en él
  - sin embargo, esperaré en él
  rationale: El hebreo dado contiene לֹא («no»), no לוֹ («a él/en él»). Por fidelidad a la fuente, el texto principal sigue la negación; pero, como la lectura tradicional es teológicamente importante y muy conocida, se conserva en nota como alternativa.
  doctrine_reference: Principio de primacía del texto original y manejo de variantes interpretativas en la tradición de traducción
- issue: 'Alcance de אֲיַחֵל: esperar vs. esperar con esperanza'
  english_pob_reading: I will not hope
  chosen_spanish_reading: no esperaré
  alternative_spanish_readings:
  - no tendré esperanza
  - no aguardaré
  rationale: En español, «esperar» puede abarcar tanto aguardar como confiar/esperar con esperanza. Así se evita introducir una esperanza explícita donde el hebreo y la tradición textual aquí son tensos.
  doctrine_reference: Semántica léxica de יחל en contextos de expectativa
translation_notes:
  revision_awareness: He tenido en cuenta la última revisión del inglés POB, que corrigió 'wait' a 'hope' por precisión con אֲיַחֵל, pero la lectura consonántica del hebreo aquí sigue siendo la negación לֹא. Por eso el español principal conserva la negación y usa «esperar» para cubrir el valor semántico amplio de יחל, mientras la nota recoge la lectura tradicional positiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; aquí el pronombre «él» corresponde al contexto inmediato de Dios sin introducir el Tetragrámaton en el texto.
  - Se evita «siervo» o vocabulario devocional no presente en el hebreo; el verso es de alegato forense, por eso se prefieren formas jurídicas naturales en español.
  - La puntuación sigue la estructura concesiva y adversativa del hebreo y del audit trail inglés, con una pausa fuerte tras la primera cláusula.
