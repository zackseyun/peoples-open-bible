base_translation:
  language: en
  yaml_path: translation/ot/haggai/002/023.yaml
  text: On that day[a], declares Yahweh of Armies, I will take you, Zerubbabel son of Shealtiel, my servant, declares Yahweh, and I will make you like a signet ring, for I have chosen you[b], declares Yahweh of Armies.
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The image of a 'signet ring' suggests valued authority, ownership, and authentication; compare Jeremiah 22:24.
    reason: cross_reference
