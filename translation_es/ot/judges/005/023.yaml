base_translation:
  language: en
  yaml_path: translation/ot/judges/005/023.yaml
  text: Curse Meroz[a], said the angel of Yahweh; curse, utterly curse its inhabitants, because they did not come to the help of Yahweh[b], to the help of Yahweh against the mighty.
  footnotes:
