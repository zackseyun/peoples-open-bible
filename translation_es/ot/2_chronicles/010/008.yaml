revisions:
- from: Pero él abandonó el consejo de los ancianos que le habían dado[a], y consultó con los jóvenes que se habían criado con él, los cuales estaban delante de él.
  to: Pero él abandonó el consejo de los ancianos que le habían dado, y consultó con los jóvenes que se habían criado con él, que estaban delante de él[a].
  rationale: Se conserva sustancialmente la traducción, pero se corrige un problema importante de anclaje de nota para que la alternativa léxica documente el segmento hebreo correcto. También se suaviza la sintaxis relativa final para un español más natural y se pule la formulación de la nota.
