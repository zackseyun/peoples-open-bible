translation:
  language: es
  text: De ti proceden la victoria y la sabiduría, y tuya es la gloria, y yo soy tu siervo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu sirviente de la casa». El griego οἰκέτης se refiere específicamente a un sirviente del hogar; «siervo» se usa en el texto principal por estilo natural y digno en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρά σοῦ
  english_pob_choice: From you
  chosen_spanish: De ti proceden
  alternatives_spanish:
  - De ti vienen
  - Provienen de ti
  lexicon: LSJ
  rationale: La preposición παρά con genitivo expresa aquí origen/procedencia. En español, «de ti proceden» comunica bien la fuente de la victoria y la sabiduría sin forzar una construcción demasiado literal.
- source_word: νίκη
  english_pob_choice: victory
  chosen_spanish: victoria
  alternatives_spanish:
  - triunfo
  lexicon: LSJ
  rationale: «Victoria» es el equivalente directo y natural en español para νίκη, y preserva el sentido básico sin añadir matices no presentes en el griego.
- source_word: ἡ σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - conocimiento
  lexicon: LSJ
  rationale: σοφία se traduce de manera estándar por «sabiduría». No hay presión contextual para restringirlo a «prudencia» o «habilidad».
- source_word: σὴ ἡ δόξα
  english_pob_choice: yours is the glory
  chosen_spanish: tuya es la gloria
  alternatives_spanish:
  - la gloria es tuya
  - es tuya la gloria
  lexicon: LSJ
  rationale: La construcción posesiva enfática se conserva mejor con «tuya es la gloria», que mantiene la fuerza predicativa e idiomática en español.
- source_word: οἰκέτης
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  - criado
  lexicon: LSJ
  rationale: Aunque el audit trail inglés opta por «servant» por estilo, οἰκέτης designa específicamente a un sirviente de casa y puede implicar condición servil. En la política terminológica del proyecto, «esclavo» preserva mejor la fuerza léxica de δοῦλος/servil y evita suavizar indebidamente la relación de pertenencia y servicio; aquí se usa como opción más fuerte, con la conciencia de que el griego no dice explícitamente δοῦλος.
theological_decisions:
- issue: Identidad del tú al que se dirige la frase
  english_pob_reading: The verse is rendered as direct address without specifying the identity of 'you.'
  chosen_spanish_reading: La frase conserva el segundo singular sin identificar expresamente si el destinatario es Dios o el rey en el contexto narrativo.
  alternative_spanish_readings:
  - Dirigido a Dios
  - Dirigido al rey del contexto inmediato
  rationale: El griego mantiene la ambigüedad del referente. La versión española debe preservar esa tensión y no resolverla con una identificación que no está explícita en la cláusula.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: El texto se alinea con el estado revisado más reciente indicado por el audit trail inglés, sin cambios posteriores registrados y con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo sintáctico del griego: procedencia, posesión y autoidentificación final.'
  - Se evita introducir «Señor» o «Mesías», pues el versículo no contiene esos títulos.
  - La nota de alternativa se limita a la segunda parte del paralelismo para no fragmentar el ritmo del verso.
