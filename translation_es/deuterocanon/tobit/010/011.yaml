review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Ragüel se levanta, entrega a Sara y la mitad de sus bienes, bendice a la pareja y los despide con una bendición. Sin embargo, hay dos problemas importantes frente al expediente inglés y la evidencia fuente: (1) el español omite la alternativa léxica documentada para σώματα (''esclavos'') en nota, que el POB inglés preserva explícitamente; y (2) la nota [b] no corresponde al lugar ni al contenido del aparato inglés, pues convierte τέκνα en una nota cuando la nota inglesa b trata de la forma futura Εὐοδώσει. Además, la puntuación de ''le dio a Sara, su esposa'' deja algo abrupta la relación con ''a él''; en español es más claro ''le dio a su esposa Sara''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la puntuación con raya y punto y coma suena innecesariamente trabada. 'Siervos' es legible, aunque el proyecto pide explicar mejor las excepciones cuando no se usa 'esclavos'. 'Hijos' funciona bien para τέκνα. Una ligera reestructuración mejora naturalidad sin perder cercanía al griego.
  glossary_alignment: Alineación parcial. 'Dios', 'plata', 'ganado' y 'el Dios del cielo' están bien. La elección de 'siervos' para σώματα puede sostenerse por el expediente inglés, pero debe acompañarse de una nota con la alternativa 'esclavos' y su razón lexical. No hay conflicto con Yahvé/Mesías u otros términos por defecto del glosario.
  issues:
  - severity: high
    issue: La nota [b] está mal asignada y no preserva la alternativa documentada del inglés.
    rationale: En el POB inglés, la nota b pertenece a Εὐοδώσει ὑμᾶς ('The God of heaven will prosper you'), no a τέκνα. El borrador español mueve esa nota a [a] y usa [b] para un comentario distinto sobre 'hijos', alterando el aparato de traducción auditado.
  - severity: high
    issue: Falta una nota léxica para σώματα con la alternativa 'esclavos'.
    rationale: El expediente inglés preserva explícitamente la alternativa 'slaves' porque el griego literalmente dice 'bodies' dentro de una lista de bienes. El borrador español eligió 'siervos' en texto principal, pero no conserva la alternativa fuerte en nota, perdiendo una decisión lexical significativa.
  - severity: medium
    issue: La redacción 'le dio a Sara, su esposa' es menos natural y algo ambigua en español.
    rationale: Aunque busca cercanía al griego, en español suena más claro 'le dio a su esposa Sara' o 'le entregó a Sara, su esposa'. La revisión puede mantener fidelidad y mejorar fluidez.
  - severity: low
    issue: La puntuación con raya seguida de punto y coma resulta pesada.
    rationale: Una coma o dos puntos alrededor de la enumeración de bienes lee mejor en español moderno y digno.
  revised_spanish_text: 'Entonces Ragüel se levantó y le dio a su esposa Sara, y la mitad de sus bienes: siervos[a], ganado y plata; y, después de bendecirlos, los despidió, diciendo: «Que el Dios del cielo los prospere[b], hijos, antes de que yo muera».

    '
