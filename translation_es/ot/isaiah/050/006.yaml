translation:
  language: es
  text: Di mi espalda a los que golpean, y mis mejillas a los que arrancan la barba[a]; no escondí mi rostro de la afrenta ni de los escupitajos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que arrancan el pelo»; el hebreo no nombra explícitamente «la barba», aunque ese es el objeto más probable en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּוִי
  english_pob_choice: my back
  chosen_spanish: mi espalda
  alternatives_spanish:
  - mi cuerpo
  - mi torso
  lexicon: HALOT
  rationale: גֵּו puede referirse a la espalda o al cuerpo/torso; en el contexto de golpes, «mi espalda» es la opción más natural y específica en español, y sigue de cerca la decisión del POB en inglés.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - entregué
  - ofrecí
  - cedí
  lexicon: HALOT
  rationale: נתן expresa el acto simple de dar. «Di» conserva la directitud del hebreo y la voluntariedad del hablante sin añadir matices ajenos.
- source_word: לְמַכִּים
  english_pob_choice: to those who strike
  chosen_spanish: a los que golpean
  alternatives_spanish:
  - a los que hieren
  - a los que azotan
  - a los que pegan
  lexicon: HALOT
  rationale: El participio de נכה señala personas que infligen golpes. «Golpean» es claro, natural y cercano al hebreo; «azotan» sería más específico de latigazos de lo que exige el texto.
- source_word: וּלְחָיַי
  english_pob_choice: and my cheeks
  chosen_spanish: y mis mejillas
  alternatives_spanish:
  - y mi quijada
  - y mi rostro
  lexicon: HALOT
  rationale: לְחִי designa la zona de la mejilla/quijada. «Mejillas» comunica bien la humillación corporal y sigue el sentido del original y del POB inglés.
- source_word: לְמֹרְטִים
  english_pob_choice: to those who pull out the beard
  chosen_spanish: a los que arrancan la barba
  alternatives_spanish:
  - a los que arrancan el pelo
  - a los que despojan de la barba
  - a los que se arrancan pelos
  lexicon: HALOT
  rationale: מרט significa arrancar o arrancar de raíz, a menudo pelo. Aunque el hebreo no nombra explícitamente el objeto, en este contexto la barba es la inferencia más probable; por eso se la expresa en el texto principal, siguiendo la práctica del POB en inglés.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  lexicon: HALOT
  rationale: פָּנִים con sufijo de primera persona se refiere a la cara/rostro. «Rostro» mantiene un registro más digno y literario, adecuado para la humillación descrita.
- source_word: לֹא הִסְתַּרְתִּי
  english_pob_choice: I did not hide
  chosen_spanish: no escondí
  alternatives_spanish:
  - no oculté
  - no aparté
  lexicon: HALOT
  rationale: El hiphil de סתר significa esconder/ocultar. «No escondí» reproduce con sencillez el valor verbal del hebreo y la paralela decisión del POB en inglés.
- source_word: מִכְּלִמּוֹת
  english_pob_choice: from disgrace
  chosen_spanish: de la afrenta
  alternatives_spanish:
  - de la vergüenza
  - de la humillación
  - de la deshonra
  lexicon: HALOT
  rationale: כלמה abarca vergüenza, humillación y oprobio. «Afrenta» expresa bien el carácter público y vejatorio del agravio en español, sin perder la dimensión de deshonra social.
- source_word: וָרֹק
  english_pob_choice: and spitting
  chosen_spanish: ni del escupir
  alternatives_spanish:
  - ni del escupitajo
  - ni de la saliva
  lexicon: HALOT
  rationale: רֹק es saliva/escupitajo; en la construcción final, el sustantivo verbal «escupir» suena natural en español y conserva la concreción del insulto físico. Se une con «ni» para mantener el paralelismo negativo del hebreo.
theological_decisions:
- issue: Lectura mesiánica explícita en la traducción principal
  english_pob_reading: Keep the wording at the level of the Hebrew speaker without importing an explicit reference to the Messiah or to Jesus.
  chosen_spanish_reading: Mantener el dicho en primera persona del siervo, sin introducir explícitamente «Mesías» ni «Jesús» en el texto principal.
  alternative_spanish_readings:
  - Hacer la aplicación cristológica explícita en la redacción principal
  - Añadir «Mesías» como glosa interpretativa en el versículo
  rationale: Aunque este pasaje se usa cristológicamente en el Nuevo Testamento y en la tradición cristiana, el hebreo presenta la voz del siervo en primera persona. La traducción debe respetar ese nivel de sentido y reservar la aplicación doctrinal para notas o lectura canónica, no para el cuerpo del versículo.
  doctrine_reference: Hechos 8:32-35; 1 Pedro 2:23; principios de filosofía de traducción POB
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se mantiene la misma solución léxica y teológica, en concordancia con la aprobación de alta coincidencia del control cruzado.
  spanish_consistency_notes:
  - Se conserva el paralelismo de golpes, arrancar la barba y no esconder el rostro.
  - Se usa «afrenta» para כלמה y «escupir» para רֹק, manteniendo un registro sobrio y bíblico en español.
  - Se evita introducir formulaciones eclesiásticas tradicionales como «SEÑOR» o añadidos cristológicos en el texto principal.
  - La nota a pie de página preserva la alternativa semántica documentada para מרט sin debilitar la lectura principal.
