translation:
  language: es
  text: Pero Dios te perseguirá[a] rápidamente, porque estás cortando la lengua que canta las melodías de himnos divinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios te castigará rápidamente» / «Dios vendrá tras de ti rápidamente». El verbo griego puede expresar perseguir o ir tras alguien; en este contexto, implica juicio divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταχέως
  english_pob_choice: swiftly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - enseguida
  lexicon: LSJ
  rationale: En español, 'pronto' comunica la rapidez del acto divino sin sonar forzado; mantiene tanto el matiz de inmediatez como el de rapidez del juicio.
- source_word: μετελεύσεται
  english_pob_choice: will pursue
  chosen_spanish: te perseguirá
  alternatives_spanish:
  - te alcanzará
  - vendrá tras de ti
  - te seguirá
  lexicon: LSJ
  rationale: El verbo griego conserva la imagen de ir tras alguien, y el contexto es de juicio divino. 'Te perseguirá' reproduce esa imagen sin reducirla de entrada a 'castigará'.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: LSJ
  rationale: Es la correspondencia directa y natural en español para el sujeto divino.
- source_word: τὴν ... γλῶτταν
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua física
  - el órgano de la lengua
  lexicon: LSJ
  rationale: En español, 'lengua' es el equivalente natural de γλῶττα y mantiene la concreción corporal del acto de mutilación.
- source_word: τῶν θείων ὕμνων
  english_pob_choice: of divine hymns
  chosen_spanish: divinos
  alternatives_spanish:
  - sagrados
  - de Dios
  lexicon: LSJ
  rationale: '''Divinos'' conserva el registro elevado y la relación con lo sagrado sin alterar la estructura del griego.'
- source_word: μελῳδὸν
  english_pob_choice: that sings the melodies
  chosen_spanish: que entona
  alternatives_spanish:
  - que canta
  - melódica
  lexicon: LSJ
  rationale: Como adjetivo aplicado a la lengua, el griego expresa su función musical; en español, 'entona' comunica de forma idiomática la acción de cantar/hacer melodía.
- source_word: ἐκτέμνεις
  english_pob_choice: you are cutting out
  chosen_spanish: estás cortando
  alternatives_spanish:
  - estás arrancando
  - estás cercenando
  lexicon: LSJ
  rationale: El presente progresivo refleja la escena inmediata. 'Cortando' conserva el acto violento sin añadir más precisión que la que exige el contexto; la mención de 'la lengua' ya hace patente la mutilación.
theological_decisions:
- issue: Fuerza de la retribución divina en μετελεύσεται ὁ θεός
  english_pob_reading: God will pursue the persecutor in judgment
  chosen_spanish_reading: Dios te perseguirá pronto en juicio
  alternative_spanish_readings:
  - Dios te castigará pronto
  - Dios vendrá tras de ti pronto
  rationale: El griego presenta a Dios como quien va tras el agresor; la escena implica juicio, pero la traducción principal conserva la metáfora de persecución en lugar de convertirla en una abstracción.
  doctrine_reference: Mantener la tensión retórica y judicial del texto sin neutralizarla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta redacción sigue el consenso alto del control cruzado y conserva la imagen judicial de persecución, ajustándola al español natural.
  spanish_consistency_notes:
  - Se usa 'Dios' en lugar de una perífrasis reverencial, conforme al texto griego.
  - '''Lengua'' mantiene la concreción corporal de γλῶττα y evita suavizar la violencia.'
  - '''Entona'' busca conservar el sentido musical de μελῳδός sin una calca torpe.'
  - La nota textual en la nota al pie preserva la alternativa entre persecución y castigo, como en el inglés auditado.
