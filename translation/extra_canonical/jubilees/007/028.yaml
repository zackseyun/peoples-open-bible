  from: its fruit shall not be gathered from anything that is eaten
  to: the fruit of everything that is eaten shall not be gathered
  rationale: The Ge'ez phrase 'ferēhu la-kwellu za-yetbalā'' uses a standard anticipatory
    pronoun suffix ('ferēhu', its fruit) followed by the preposition 'la-' to mark
    the genitive ('of everything that is eaten'). The draft mistranslates 'la-' as
    'from' and separates the phrase, resulting in awkward English that obscures the
    meaning. It should be rendered 'the fruit of everything that is eaten'.
