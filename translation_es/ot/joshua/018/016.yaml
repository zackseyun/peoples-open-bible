    reason: lexical_alternative
  - marker: c
    text: En-rogel es un nombre de lugar; literalmente, «fuente de Rogel».
    reason: lexical_alternative
  revision_rationale: Se ajustó el aspecto verbal a pasado narrativo secuencial («descendió») para reflejar mejor la repetición de וירד; se precisó צָפוֹנָה como «en el extremo norte» para conservar la relación espacial del hebreo y del POB inglés; se añadió «por» para un español más natural en el recorrido del valle; y se sustituyó «costado meridional» por «ladera sur» como equivalente topográfico más claro de כֶּתֶף ... נֶגְבָּה. Los topónimos y la decisión de mantener «el jebuseo» se conservan.
