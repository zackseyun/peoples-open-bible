  text: וְ/זֹ֥את תּוֹרַ֖ת הַ/נָּזִ֑יר בְּ/י֗וֹם מְלֹאת֙ יְמֵ֣י נִזְר֔/וֹ יָבִ֣יא אֹת֔/וֹ אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/006/013.yaml
  text: 'And this is the law of the Nazirite: on the day the days of his separation are completed[b][a], he shall be brought to the entrance of the tent of meeting.'
  footnotes:
  - marker: a
    text: Or, more formally, 'he shall bring him to the entrance of the tent of meeting.' The Hebrew verb is active ('bring'), but the subject is not explicit in the verse.
    reason: lexical_alternative
  - marker: b
    text: '''The days of his separation'' may also be rendered ''the days of his Nazirite vow'' or ''the period of his consecration.'''
    reason: lexical_alternative
