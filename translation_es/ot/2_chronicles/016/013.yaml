revisions:
- from: Y Asa se acostó con sus padres y murió en el año cuarenta y uno de su reinado[a].
  to: Y Asa durmió con sus padres y murió en el año cuarenta y uno de su reinado[a].
  rationale: Se cambia 'se acostó' por 'durmió' para reflejar con mayor fidelidad y naturalidad en español la fórmula funeraria hebrea, manteniendo la duplicación original con 'murió'. Se ajusta la nota para explicar con más precisión la referencia a los antepasados.
  reviewer_model: gpt-5.4
