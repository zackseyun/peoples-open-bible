lexical_decisions:
- source_word: אֶלְיוֹעֵינַי
  english_pob_choice: Elioenai
  chosen_spanish: Elioenai
  alternatives_spanish:
  - Elyoenai
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera, no se traduce. Se conserva la forma convencional 'Elioenai', ya usada como equivalente estable del POB en inglés.
- source_word: יַעֲקֹבָה
  english_pob_choice: Jaakobah
  chosen_spanish: Jaakobah
  alternatives_spanish:
  - Jacobah
  - Yaakobah
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Jaakobah' mantiene más visible la forma hebrea que una adaptación más asimilada, y sigue siendo legible en español.
- source_word: יְשׁוֹחָיָה
  english_pob_choice: Jeshohaiah
  chosen_spanish: Jeshohaiah
  alternatives_spanish:
  - Yeshohaiah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la convención anglicada del POB con 'J' inicial, que en español sigue siendo una forma reconocible y bíblica.
- source_word: עֲשָׂיָה
  english_pob_choice: Asaiah
  chosen_spanish: Asaiah
  alternatives_spanish:
  - Asayah
  lexicon: HALOT
  rationale: Nombre propio transliterado con la forma bíblica convencional bien establecida en inglés; en español también resulta clara y natural en una lista genealógica.
- source_word: עֲדִיאֵל
  english_pob_choice: Adiel
  chosen_spanish: Adiel
  alternatives_spanish:
  - Adi'el
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma breve y estándar 'Adiel' por claridad y uso reconocible.
- source_word: יְשִׂימִיאֵל
  english_pob_choice: Jesimiel
  chosen_spanish: Jesimiel
  alternatives_spanish:
  - Yesimiel
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la representación convencional con 'J' inicial, coherente con el tratamiento de otros nombres del pasaje.
- source_word: בְּנָיָה
  english_pob_choice: Benaiah
  chosen_spanish: Benaiah
  alternatives_spanish:
  - Benayah
  lexicon: HALOT
  rationale: Nombre propio transliterado con la forma bíblica más difundida. Se mantiene 'Benaiah' por consistencia con la tradición textual usada en el POB.
- source_word: וְ / וַ / וִ / וּ prefixed to each name
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ','
  - —
  lexicon: HALOT
  rationale: La conjunción hebrea waw une nombres en serie. 'Y' preserva el estilo polisindético del original y reproduce la cadencia enumerativa sin omitir enlaces.
translation_notes:
  revision_awareness: El pasaje es una lista genealógica breve de nombres propios sin variantes textuales o notas léxicas adicionales en el paquete de fuente; por ello, la traducción sigue de cerca la enumeración hebrea y la auditoría inglesa sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantuvo el polisíndeton con 'y' antes de cada nombre, en paralelo al inglés POB y al waw hebreo.
  - No se añadieron acentos ni adaptaciones ortográficas dentro de los nombres propios, para respetar las formas bíblicas convencionales ya establecidas.
  - No hay notas al pie porque no se documentan variantes, tensiones léxicas ni decisiones teológicas que requieran alternativa visible en español.
