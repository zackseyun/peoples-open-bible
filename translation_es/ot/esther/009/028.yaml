    reason: lexical_alternative
  - marker: b
    text: Or 'from generation to generation, family by family, province by province, and city by city.' The Hebrew uses repeated singular nouns for distributive emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'their remembrance shall not cease from their descendants.'
    reason: lexical_alternative
