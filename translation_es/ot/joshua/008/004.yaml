  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato introductorio, llamada de atención, instrucción de emboscada, prohibición de alejarse y orden final de estar preparados. Sin embargo, «han de estar en emboscada» suena menos natural y menos preciso que una formulación verbal de acción/posición propia del contexto militar. Además, la nota b del español no preserva fielmente la alternativa documentada en inglés, que es «desde detrás de la ciudad», no simplemente «de la ciudad».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «estar en emboscada» resulta algo forzado en este contexto; «ponerse/tender una emboscada» o «estar al acecho» serían más idiomáticos. También conviene suavizar la repetición innecesaria de «ustedes» sin perder el énfasis. La puntuación y el registro son adecuados.
  glossary_alignment: No hay términos teológicos mayores en este versículo. El uso de «mandó», «Miren», «contra la ciudad», «detrás de la ciudad» y «listos» concuerda bien con las decisiones del POB. La principal corrección es estilístico-lexical para אֹרְבִים y la fidelidad de la nota alternativa sobre מֵאַחֲרֵי הָעִיר.
  issues:
  - severity: medium
    issue: «han de estar en emboscada» para אֹרְבִים
    rationale: Aunque transmite la idea general, en español suena poco natural y menos idiomático que una formulación como «deben ponerse en emboscada» o «van a tender una emboscada». El participio hebreo describe la función asignada en contexto militar; conviene una expresión más clara.
  - severity: medium
    issue: La nota b no refleja la alternativa preservada por el POB inglés
    rationale: El inglés documenta «Or “from behind the city”». La nota española actual dice «O “de la ciudad”», lo cual no comunica la alternativa relevante y puede confundir al lector.
  - severity: low
    issue: Redundancia de pronombres explícitos
    rationale: «Miren, ustedes... y todos ustedes...» es comprensible, pero en español amplio puede aligerarse ligeramente sin perder el énfasis colectivo final.
