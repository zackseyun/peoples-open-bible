  to: Y el rey de Asiria deportó a Israel a Asiria y los estableció en Halah[a], junto al río Habor, el río de Gozán,[b] y en las ciudades de los medos.
  rationale: Se ajusta «exilió» a «deportó» por mayor naturalidad y precisión histórica en español, manteniendo el mismo valor semántico principal del hebreo. También se reestructura la referencia al Habor para que suene natural en español y preserve la identificación del río. Se conservan las notas existentes con marcadores válidos en el texto revisado.
