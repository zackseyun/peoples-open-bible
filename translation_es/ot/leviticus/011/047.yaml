translation:
  language: es
  text: para distinguir entre lo impuro y lo limpio, y entre la criatura que puede comerse[a] y la criatura que no puede comerse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la criatura que es comestible ... y la criatura que no es comestible».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַבְדִּיל
  english_pob_choice: to distinguish
  chosen_spanish: para distinguir
  alternatives_spanish:
  - para separar
  - para hacer distinción
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad dentro de la instrucción legal. «Distinguir» conserva el sentido de discernimiento normativo mejor que un verbo meramente espacial como «separar».
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and between
  chosen_spanish: entre ... y entre ...
  alternatives_spanish:
  - entre ... y ...
  lexicon: HALOT
  rationale: El hebreo repite la estructura para marcar dos contrastes paralelos. En español puede mantenerse esa repetición para reflejar la simetría del texto.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean
  chosen_spanish: lo impuro
  alternatives_spanish:
  - lo inmundo
  - lo ritualmente impuro
  lexicon: HALOT
  rationale: En Levítico, טָמֵא es una categoría ritual; «impuro» comunica bien ese valor en español moderno. Se evita moralizar el término y se conserva la distinción cultual.
- source_word: הַטָּהֹר
  english_pob_choice: the clean
  chosen_spanish: lo limpio
  alternatives_spanish:
  - lo puro
  - lo ritualmente limpio
  lexicon: HALOT
  rationale: Emparejado con «impuro», «limpio» mantiene la terminología ritual. «Puro» es posible, pero aquí «limpio» refleja mejor el par técnico tradicional sin perder claridad.
- source_word: הַחַיָּה
  english_pob_choice: the creature
  chosen_spanish: la criatura
  alternatives_spanish:
  - el animal
  - la bestia
  lexicon: HALOT
  rationale: חַיָּה puede referirse a animal o criatura. «Criatura» es amplio y natural en español, y evita restringir innecesariamente el término.
- source_word: הַנֶּאֱכֶלֶת
  english_pob_choice: that may be eaten
  chosen_spanish: que puede comerse
  alternatives_spanish:
  - que se puede comer
  - que es comestible
  lexicon: HALOT
  rationale: El participio niphal expresa lo permitido/aptado para comer. «Puede comerse» transmite la permisibilidad normativa, no solo la posibilidad material.
- source_word: אֲשֶׁר לֹא תֵאָכֵל
  english_pob_choice: that may not be eaten
  chosen_spanish: que no puede comerse
  alternatives_spanish:
  - que no debe comerse
  - que no se puede comer
  lexicon: HALOT
  rationale: La cláusula contrapone lo permitido con lo prohibido. «No puede comerse» comunica bien la prohibición en español contemporáneo, sin cargar el verso con un tono excesivamente arcaico.
theological_decisions:
- issue: Terminología de pureza ritual en la ley levítica
  english_pob_reading: Render טָמֵא/טָהֹר as 'unclean'/'clean' in their cultic-legal sense rather than moralized terms.
  chosen_spanish_reading: Traducir טָמֵא/טָהֹר como «impuro»/«limpio» en sentido ritual-legal, no moral.
  alternative_spanish_readings:
  - «inmundo»/«puro»
  - «ritualmente impuro»/«ritualmente limpio»
  rationale: El versículo resume distinciones dietéticas establecidas por la ley divina. «Impuro/limpio» preserva la categoría ritual sin añadir una valoración ética que el texto no formula.
  doctrine_reference: Primacía del texto original; preservar las categorías cultuales sin importarles carga doctrinal ajena.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «living creature» por «creature» para hacer más natural el inglés sin perder el sentido de חַיָּה. En español, «criatura» ya funciona de manera natural y amplia, por lo que no se requiere una expansión equivalente.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo hebreo con dos miembros contrastivos.
  - Se evitó «SEÑOR» o formulaciones de sustitución, porque el versículo no contiene el tetragrámaton.
  - Se prefirió «criatura» frente a «animal» para no restringir indebidamente חַיָּה.
  - Se conservó el valor técnico de pureza ritual con «impuro/limpio».
