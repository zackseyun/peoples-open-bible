translation:
  language: es
  text: El doble de mal te alcanzará en tiempo de necesidad; en toda cosa buena, te alcanzará a ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Da al piadoso, y no apoyes al pecador». El hebreo conservado de este versículo difiere sustancialmente de ese contexto admonitorio; por transparencia, aquí se sigue el hebreo en el texto principal y se conserva la lectura griega en esta nota.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Dale
  lexicon: BDAG
  rationale: El imperativo griego pide una acción directa. «Da» es la forma más natural y fiel en español para este mandato breve, sin añadir un matiz específico que el texto no expresa.
- source_word: τῷ εὐσεβεῖ
  english_pob_choice: to the godly
  chosen_spanish: al piadoso
  alternatives_spanish:
  - al devoto
  - al hombre piadoso
  lexicon: BDAG
  rationale: El adjetivo griego señala a quien es reverente o piadoso. «Piadoso» comunica bien esa cualidad en español y mantiene el tono religioso-moral del original.
- source_word: μὴ ἀντιλάβῃ
  english_pob_choice: do not support
  chosen_spanish: no apoyes
  alternatives_spanish:
  - no sostengas
  - no auxilies
  - no ayudes
  lexicon: BDAG
  rationale: El verbo puede implicar agarrar para sostener o ayudar. «No apoyes» transmite con naturalidad la idea de brindar respaldo o sostén, sin sobreespecificar el tipo de ayuda.
- source_word: τοῦ ἁμαρτωλοῦ
  english_pob_choice: the sinner
  chosen_spanish: al pecador
  alternatives_spanish:
  - al culpable
  - al hombre pecador
  lexicon: BDAG
  rationale: El sustantivo singular conserva un valor tipológico o proverbial. «Pecador» es la correspondencia más directa y conserva esa fuerza de clase moral.
theological_decisions:
- issue: Prioridad entre el testimonio hebreo conservado y el paralelo griego cuando difieren ampliamente
  english_pob_reading: Use the Greek imperative instruction as the main text, with the divergent Hebrew preserved in a footnote
  chosen_spanish_reading: Seguir la instrucción imperativa griega en el texto principal y preservar la divergencia hebrea en una nota
  alternative_spanish_readings:
  - Traducir como texto principal el hebreo conservado aunque resulte contextual y temáticamente difícil
  rationale: En este caso el hebreo conservado difiere sustancialmente del griego y del flujo admonitorio de Sirácida 12:1–7. Para una edición transparente, el texto principal sigue el imperativo griego coherente con el contexto, sin ocultar el testimonio hebreo alternativo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva y desde el griego donde no; usar el paralelo como entrada de traducción real; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: El expediente muestra una revisión anterior que reemplazó el sentido griego por una traducción basada en el hebreo divergente; esta propuesta restaura el valor del paralelo griego como texto principal y mantiene la lectura hebrea en nota para transparencia textual.
  spanish_consistency_notes:
  - Se usa «piadoso» para εὐσεβής por ser natural y fiel en español contemporáneo.
  - Se evita «Señor» o equivalentes litúrgicos porque el versículo no contiene el nombre divino.
  - Se conserva el tono proverbial del singular «al pecador» sin pluralizar ni generalizar.
  - La nota al pie marca explícitamente la divergencia hebrea para no borrar la tensión textual documentada.
