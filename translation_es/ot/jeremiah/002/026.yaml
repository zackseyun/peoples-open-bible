revisions:
- from: 'Como la vergüenza de un ladrón cuando es hallado, así ha sido avergonzada la casa de Israel: ellos, sus reyes, sus oficiales, sus sacerdotes y sus profetas.'
  to: 'Como un ladrón se avergüenza cuando es hallado, así ha sido avergonzada la casa de Israel: ellos, sus reyes, sus oficiales, sus sacerdotes y sus profetas.'
  rationale: Se ajusta la primera frase para reflejar de manera más natural y fiel en español la comparación hebrea y la decisión auditada del POB, evitando una nominalización rígida. No se requieren cambios adicionales ni notas.
