    issue: La nota [c] está anclada en «campo» pero explica una alternativa para «ha chamuscado».
    rationale: La documentación inglesa preserva una alternativa léxica para לִהֲטָה («has scorched» / «has burned up»). En español, el marcador debe aparecer junto al verbo correspondiente para evitar confusión.
  - severity: low
    issue: La nota [b] debería anclarse directamente en «pastizales».
    rationale: La alternativa «lugares de pastoreo» corresponde a נְאוֹת, no al sintagma completo final del verso. Anclarla en el sustantivo mejora precisión editorial.
  - severity: low
