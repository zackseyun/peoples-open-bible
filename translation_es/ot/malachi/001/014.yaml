base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/014.yaml
  text: But cursed is the deceiver who has a male in his flock[a], and vows it, but sacrifices a blemished animal to the Lord. For I am a great King, says Yahweh of Armies[b], and my name is feared among the nations.
  footnotes:
  - marker: a
    text: Or, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'my name is revered among the nations.' The Hebrew term carries the sense of inspiring fear, awe, and reverence.
    reason: lexical_alternative
