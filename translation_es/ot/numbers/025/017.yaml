translation:
  language: es
  text: Hostiga a los madianitas y derríbalos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hostiga a los madianitas y derríbalos». El verbo hebreo צָר֖וֹר puede transmitir la idea de mostrar hostilidad o tratar como enemigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָר֖וֹר
  english_pob_choice: Harass / Treat ... as enemies
  chosen_spanish: Hostiga
  alternatives_spanish:
  - Trata como enemigos
  - Muestra hostilidad hacia
  - Sé hostil a
  lexicon: HALOT
  rationale: El imperativo de צרר puede expresar hostilidad activa o trato enemigo. «Hostiga» conserva la idea de acción hostil continua sin reducirla solo a una táctica militar ni suavizar el tono del mandato.
- source_word: הַמִּדְיָנִים
  english_pob_choice: the Midianites
  chosen_spanish: los madianitas
  alternatives_spanish:
  - los midianitas
  lexicon: HALOT
  rationale: Se usa el etnónimo español asentado para el pueblo de Madián, manteniendo la referencia étnica directa del hebreo.
- source_word: וְהִכִּיתֶם
  english_pob_choice: and strike them down
  chosen_spanish: y derríbalos
  alternatives_spanish:
  - y golpéalos
  - y hiérelos
  - y derrótalos
  lexicon: HALOT
  rationale: נכה en este contexto militar/judicial puede significar golpear, abatir o derrotar. «Derríbalos» comunica con naturalidad el sentido de violencia y derrota, sin especificar más de lo que el verbo exige.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: Hebrew grammar
  rationale: El pronombre de objeto retoma a los madianitas; en español se integra como clítico de objeto directo acorde con la sintaxis natural.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce separadamente]'
  lexicon: Hebrew grammar
  rationale: La partícula objeto del hebreo no tiene equivalente independiente en español; su función queda reflejada en la estructura verbal y el clítico.
theological_decisions:
- issue: Mandato divino de hostilidad y violencia sin atenuación interpretativa
  english_pob_reading: Harass the Midianites and strike them down
  chosen_spanish_reading: Hostiga a los madianitas y derríbalos
  alternative_spanish_readings:
  - Hostiga a los madianitas y golpéalos
  - Sé hostil a los madianitas y derríbalos
  rationale: La traducción conserva la dureza del mandato en dos acciones imperativas, sin añadir justificación teológica externa ni suavizar el alcance del hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último ajuste del audit trail inglés, que prefirió «Harass» para צָרוֹר por su mayor cercanía al imperativo hebreo. En español, «Hostiga» conserva ese énfasis de hostilidad activa y mantiene un registro natural y publicable.
  spanish_consistency_notes:
  - Se evitó «Señor» o «SEÑOR» porque este versículo no contiene el tetragrámaton ni un contexto de cita directa del nombre divino.
  - Se mantuvo un tono imperativo directo, acorde con la fuerza verbal del hebreo y con la lectura auditada en inglés.
  - «Derríbalos» se eligió por ser suficientemente fuerte para נכה sin convertir innecesariamente el verbo en «matar», que sería más específico de lo que el hebreo requiere.
