    reason: lexical_alternative
  - marker: d
    text: O 'en medio del país'. El hebreo 'tierra' también puede entenderse como 'país' según el contexto.
    reason: alternative_reading
  - marker: e
    text: O 'y que mi nombre sea llamado sobre ellos, y el nombre de mis padres Abraham e Isaac'.
    reason: previous_rendering
  revision_rationale: 'La revisión mantiene todas las decisiones principales del POB pero corrige tres detalles: 1) reordena la cláusula del nombre para que el sujeto compuesto sea claro y natural en español, en línea con la revisión inglesa auditada; 2) sustituye ''multiplíquense en gran manera'' por ''se multipliquen mucho'', más idiomático sin perder el sentido prolífico; 3) corrige la nota d para que sí presente una alternativa real al texto principal. También se ajusta la nota e al valor de ''previous_rendering'' documentado en el rastro inglés.'
