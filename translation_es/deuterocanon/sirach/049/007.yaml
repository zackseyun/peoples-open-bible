    rationale: 'El hebreo tiene cuatro verbos destructivos: לנתוש, לנתוץ, ולהאביד, להרוס. El borrador español solo presenta tres (''arrancar, destruir y arruinar''), lo que comprime indebidamente la comisión profética.'
