revisions:
- from: No te apartes[a] de un burlador, para que no se siente[b] como un acechador delante de ti.
  to: No te apartes ante un burlador,[a] para que no se ponga como uno que está al acecho delante de ti.
  rationale: Se ajusta «de» a «ante» para reflejar mejor מִפְּנֵי en este contexto de no ceder terreno ante el burlador. Se reemplaza «se siente» por «se ponga» para expresar de manera natural en español la idea hostil de colocarse como alguien al acecho, conforme a la revisión inglesa y al sentido probable del hebreo difícil. Se elimina la nota [b] por redundante, conservando una sola nota textual suficiente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: La primera cláusula refleja bien el hebreo אַל תָּזוּחַ... לֵץ con «No te apartes ... de un burlador», aunque «ante» encaja mejor que «de» con מִפְּנֵי y evita una lectura de simple alejamiento. La segunda cláusula sigue correctamente la revisión inglesa que entiende una acción reflexiva/hostil del burlador, no el literal difícil «lo siente». Sin embargo, «se siente como un acechador delante de ti» suena demasiado a sentarse físicamente y debilita la imagen de colocarse al acecho. El hebreo y la nota inglesa apuntan mejor a «se ponga/coloque como uno que está al acecho ante ti».
  spanish_quality_summary: El borrador es legible, pero «se siente como un acechador» resulta poco natural y potencialmente equívoco en español moderno. Además, la nota [b] es innecesaria y duplica la explicación ya dada en [a]. Una redacción más clara y digna sería «No te apartes ante un burlador, para que no se ponga como uno que está al acecho delante de ti».
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. «Burlador» es aceptable para לֵץ, aunque «escarnecedor» también sería posible; no hace falta cambiarlo. La decisión principal es estilística y de fidelidad semántica en לְהוֹשִׁיבוֹ / כְּאוֹרֵב.
  issues:
