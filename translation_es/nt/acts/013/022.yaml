review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador español transmite bien el sentido general del griego: la remoción de Saúl, el levantamiento de David para ellos como rey, el testimonio divino acerca de David, y la caracterización de David como hombre conforme al corazón de Dios que hará su voluntad. Sin embargo, la nota [a] está mal formulada porque presenta como alternativa literal exactamente la misma expresión ya usada en el texto. Además, la nota [b] atribuye la alternativa tradicional a una frase española poco idiomática ("tras mi propio corazón") en lugar de la formulación tradicional reconocible "un hombre según mi corazón" o similar. El resto del texto se alinea adecuadamente con las decisiones léxicas documentadas.’
  spanish_quality_summary: El español es claro, natural y digno. "Les levantó a David como rey" suena algo marcado pero sigue siendo comprensible y defendible por el valor idiomático bíblico de ἐγείρω. "He hallado" y "conforme a mi corazón" son lecturas sólidas y eclesialmente legibles. La principal necesidad de revisión está en la calidad y precisión de las notas, no en la redacción principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave aquí no activan defaults especiales salvo mantener un registro bíblico sobrio. Las decisiones "conforme a mi corazón" y "toda mi voluntad" son compatibles con el expediente inglés y con buen español. No se requiere ajuste terminológico mayor.
  issues:
  - severity: medium
    issue: La nota [a] es defectuosa
    rationale: ‘Dice: "O, más literalmente, ‘después de quitarlo’", pero esa es exactamente la redacción del texto principal. Una nota de alternativa debe aportar una variante real o explicar el matiz sin fingir una alternativa inexistente.’
  - severity: medium
    issue: La nota [b] formula mal la alternativa tradicional
    rationale: Presenta "tras mi propio corazón", que no es la forma tradicional reconocible en español bíblico. Si se quiere contrastar con la tradición, debe hablar de "según mi corazón" o explicar directamente el matiz de conformidad sin esa formulación extraña.
  - severity: low
    issue: La ancla de [a] puede mantenerse, pero la nota debe ser explicativa, no redundante
    rationale: El texto principal ya refleja bien μεταστήσας; la nota puede justificar por qué no se usó "deponerlo" o "removerlo", en vez de repetir la misma frase.
  revised_spanish_text: ‘Y después de quitarlo[a], les levantó a David como rey; y de él también dio testimonio y dijo: «He hallado a David, hijo de Isaí, un hombre conforme a mi corazón[b], que hará toda mi voluntad».’
  revised_footnotes:
  - marker: a
    text: O también, «después de deponerlo» o «después de removerlo». El participio griego expresa la remoción previa de Saúl del reinado.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «según mi corazón». El griego expresa conformidad con el corazón de Dios; muchas traducciones tradicionales usan una fórmula equivalente.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse, pero las notas necesitan corrección para que reflejen alternativas reales y expliquen con precisión el matiz griego sin introducir una formulación española poco idiomática o redundante.
