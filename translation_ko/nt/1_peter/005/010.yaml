id: 1PE.5.10
reference: 1 Peter 5:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς πάσης χάριτος, ὁ καλέσας ὑμᾶς εἰς τὴν αἰώνιον αὐτοῦ δόξαν ἐν Χριστῷ, ὀλίγον παθόντας αὐτὸς καταρτίσει, στηρίξει, σθενώσει, θεμελιώσει.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/010.yaml
  text: 'And the God of all grace, who called you into his eternal glory in Messiah, after you have suffered a little while, will himself restore, establish, strengthen, and ground you.'
translation:
  language: ko
  text: '모든 은혜의 하나님, 곧 메시아 안에서 자신의 영원한 영광으로 여러분을 부르신 분이, 여러분이 잠시 고난당한 후에 친히 여러분을 온전케 하시고, 굳게 세우시고, 강하게 하시고, 견고하게 하실 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ θεὸς πάσης χάριτος
  english_pob_choice: the God of all grace
  chosen_korean: 모든 은혜의 하나님
  alternatives_korean:
  - 만 가지 은혜의 하나님
  lexicon: BDAG
  rationale: 평이한 직역.
- source_word: εἰς τὴν αἰώνιον αὐτοῦ δόξαν ἐν Χριστῷ
  english_pob_choice: into his eternal glory in Messiah
  chosen_korean: 메시아 안에서 자신의 영원한 영광으로
  alternatives_korean:
  - 그리스도 안에서 그의 영원한 영광에로
  lexicon: BDAG
  rationale: 「메시아 안에서」 정형 유지. εἰς의 목표 의미를 「~으로」로 옮긴다.
- source_word: ὀλίγον παθόντας
  english_pob_choice: after you have suffered a little while
  chosen_korean: 잠시 고난당한 후에
  alternatives_korean:
  - 잠깐 고통을 겪은 후
  lexicon: BDAG
  rationale: 1:6의 ὀλίγον ἄρτι(잠시 동안)와 어휘 일관성.
- source_word: καταρτίσει, στηρίξει, σθενώσει, θεμελιώσει
  english_pob_choice: restore, establish, strengthen, and ground
  chosen_korean: 온전케 하시고, 굳게 세우시고, 강하게 하시고, 견고하게 하실
  alternatives_korean:
  - 완성하시고, 굳세게 하시고, 강건케 하시고, 기초를 놓으실
  lexicon: BDAG
  rationale: 네 동사의 점층적 리듬을 한국어로도 살린다. καταρτίζω는 「온전케 함」(어휘적으로 「수선·완비」), θεμελιόω는 「기초를 두어 견고하게 함」.
