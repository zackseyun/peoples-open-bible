    text: Or 'under the ban.' The Hebrew term refers to something devoted irrevocably to the LORD, here through destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the messengers'; contextually, these are the men Joshua had sent to spy out the land.
    reason: lexical_alternative
