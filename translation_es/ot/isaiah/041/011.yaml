translation:
  language: es
  text: He aquí[a], todos los que se enardecen contra ti serán avergonzados y humillados; llegarán a ser como nada, y los hombres que contienden contigo perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están airados contra ti» / «los que se enfurecen contra ti». El participio hebreo es literalmente «los que arden contra ti», un modismo para la ira.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Ciertamente
  - He aquí, presten atención
  lexicon: HALOT
  rationale: Como partícula discursiva de atención y certeza, se expresa naturalmente en español con 'He aquí', que conserva el tono profético y la fuerza de exhortación sin volverlo coloquial.
- source_word: יֵבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán puestos en vergüenza
  - serán humillados
  lexicon: HALOT
  rationale: בוש denota vergüenza o deshonra; 'serán avergonzados' transmite bien el resultado pasivo en un marco de reversión divina.
- source_word: וְיִכָּלְמוּ
  english_pob_choice: and humiliated
  chosen_spanish: y humillados
  alternatives_spanish:
  - y afrentados
  - y confundidos
  - y deshonrados
  lexicon: HALOT
  rationale: כלם intensifica el paralelo con בוש. 'Humillados' mantiene la distinción semántica sin sonar arcaico y preserva el movimiento de degradación pública.
- source_word: הַנֶּחֱרִים בָּךְ
  english_pob_choice: who are enraged against you
  chosen_spanish: los que se enardecen contra ti
  alternatives_spanish:
  - los que están airados contra ti
  - los que arden contra ti
  - los que se enfurecen contra ti
  - los que están incensados contra ti
  lexicon: HALOT
  rationale: El participio de חרה literalmente alude a 'arder', y la POB inglesa optó por captar la ira hostil. En español, 'se enardecen contra ti' conserva tanto la imagen de ardor como el matiz de hostilidad, sin perder claridad idiomática.
- source_word: יִהְיוּ כְאַיִן
  english_pob_choice: they will become as nothing
  chosen_spanish: llegarán a ser como nada
  alternatives_spanish:
  - serán como nada
  - se convertirán en nada
  - quedarán en nada
  lexicon: HALOT
  rationale: La construcción expresa nulidad o no-entidad. 'Llegarán a ser como nada' refleja el futuro y la comparación כ sin sonar forzado; mantiene la fuerza de desaparición ontológica/funcional.
- source_word: וְיֹאבְדּוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  - se perderán
  lexicon: HALOT
  rationale: אבד en qal suele significar perecer o perderse. 'Perecerán' es conciso e intransitivo, y conserva el cierre judicial del versículo.
- source_word: אַנְשֵׁי רִיבֶךָ
  english_pob_choice: the men who contend with you
  chosen_spanish: los hombres que contienden contigo
  alternatives_spanish:
  - los hombres de tu contienda
  - tus adversarios en pleito
  - los que litigan contigo
  lexicon: HALOT
  rationale: La construcción literal es 'hombres de tu disputa/contienda'. 'Los hombres que contienden contigo' mantiene el sustantivo masculino plural y el matiz de conflicto, sin desplazarlo a un término más técnico o más débil.
theological_decisions:
- issue: Tratamiento de la imagen verbal de חרה (ardor/ira)
  english_pob_reading: who are enraged against you
  chosen_spanish_reading: los que se enardecen contra ti
  alternative_spanish_readings:
  - los que arden contra ti
  - los que están airados contra ti
  - los que se enfurecen contra ti
  rationale: La decisión preserva la metáfora semítica de 'arder' en una forma española natural. No se neutraliza la intensidad hostil del hebreo ni se reduce a un simple estado emocional interno.
  doctrine_reference: DOCTRINE.md §Translation philosophy
- issue: Mantenimiento del paralelismo de vergüenza y humillación
  english_pob_reading: will be put to shame and humiliated
  chosen_spanish_reading: serán avergonzados y humillados
  alternative_spanish_readings:
  - serán avergonzados y afrentados
  - quedarán avergonzados y humillados
  rationale: Se conservan dos verbos distintos para respetar el paralelismo hebreo, evitando fusionarlos en uno solo y manteniendo la progresión retórica de deshonra pública.
  doctrine_reference: DOCTRINE.md §Translation philosophy
- issue: Forma masculina de אַנְשֵׁי
  english_pob_reading: the men who contend with you
  chosen_spanish_reading: los hombres que contienden contigo
  alternative_spanish_readings:
  - los que contienden contigo
  - tus adversarios
  rationale: Se retiene el masculino explícito porque el hebreo usa אַנְשֵׁי ('hombres de'), y no hay presión contextual suficiente para neutralizarlo. Esto sigue la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto español sigue de cerca el consenso alto del auditoría inglesa y no incorpora revisiones posteriores; se mantiene la distinción semántica entre בוש y כלם, la imagen de ardor en חרה y la fuerza judicial de אבד, sin cambios respecto del último pase registrado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» por norma del proyecto sólo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene un registro bíblico moderno y digno, evitando tanto arcaísmos rígidos como paráfrasis explicativas.
  - Se preserva el paralelismo hebreo con dos verbos de vergüenza y una cadencia de juicio final en la clausura del verso.
