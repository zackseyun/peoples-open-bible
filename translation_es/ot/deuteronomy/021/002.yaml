  to: entonces tus ancianos y tus jueces saldrán y medirán hasta las ciudades que están alrededor del hombre muerto[a].
  rationale: Se conserva la estructura procedimental y la redacción natural del borrador, pero se reemplaza «del muerto» por «del hombre muerto» para reflejar mejor הֶחָלָל como persona muerta violentamente/slain, en línea con la decisión léxica auditada en inglés, sin sobretraducir como «asesinado».
