translation:
  language: es
  text: Y cuando el hombre con el flujo quede limpio de su flujo, contará siete días para su limpieza, lavará sus vestidos y lavará su cuerpo en agua viva[a]; entonces quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'agua viva'; es decir, agua fresca o corriente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el hombre con el flujo
  alternatives_spanish:
  - el hombre con la descarga
  - el que tiene el flujo
  - el varón con el flujo
  lexicon: HALOT
  rationale: El participio sustantivado designa a la persona afectada por el flujo corporal tratado en este capítulo. 'Hombre' conserva el referente masculino del contexto, y 'flujo' comunica de forma natural el sentido médico-ritual sin sonar técnico en exceso.
- source_word: יִטְהַר
  english_pob_choice: is cleansed
  chosen_spanish: sea limpio
  alternatives_spanish:
  - sea purificado
  - quede limpio
  - esté limpio
  lexicon: HALOT
  rationale: En este contexto טהר expresa limpieza ritual, no ausencia de culpa moral. 'Sea limpio' mantiene el valor resultativo/ritual de la cláusula y evita una lectura moralizante.
- source_word: מִזּוֹבוֹ
  english_pob_choice: from his discharge
  chosen_spanish: de su flujo
  alternatives_spanish:
  - de su descarga
  - de su emisión
  - del flujo
  lexicon: HALOT
  rationale: '''Flujo'' es la opción más natural en español para este campo léxico y preserva el sentido corporal concreto del hebreo sin sobreexplicar.'
- source_word: וְסָפַר לוֹ
  english_pob_choice: he shall count
  chosen_spanish: contará
  alternatives_spanish:
  - deberá contar
  - ha de contar
  - cuente
  lexicon: HALOT
  rationale: El futuro simple reproduce bien la fuerza procedimental de la instrucción legal en español contemporáneo y conserva el tono normativo del texto.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - siete jornadas
  lexicon: HALOT
  rationale: Equivalencia directa y natural; no requiere ajuste.
- source_word: לְטָהֳרָתוֹ
  english_pob_choice: for his cleansing
  chosen_spanish: para su limpieza
  alternatives_spanish:
  - para su purificación
  - para quedar limpio
  - para su limpieza ritual
  lexicon: HALOT
  rationale: '''Limpieza'' comunica con claridad el proceso o estado buscado, pero en el contexto queda naturalmente entendido como limpieza ritual. ''Purificación'' es posible, aunque más formal.'
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - lavará sus prendas
  - lavará su ropa
  lexicon: HALOT
  rationale: '''Vestidos'' conserva un registro bíblico digno en español y corresponde bien al plural hebreo. ''Ropas'' o ''ropa'' también serían posibles, pero algo menos precisas para el tono del pasaje.'
- source_word: וְרָחַץ בְּשָׂרוֹ
  english_pob_choice: bathe his body
  chosen_spanish: lavará su cuerpo
  alternatives_spanish:
  - lavará su carne
  - se bañará
  - lavará su cuerpo entero
  lexicon: HALOT
  rationale: Aunque בשר es literalmente 'carne', en este contexto ritual el sentido claro en español es el cuerpo de la persona. 'Lavará su cuerpo' comunica el acto sin la aspereza de una literalidad excesiva.
- source_word: בְּמַיִם חַיִּים
  english_pob_choice: in living water
  chosen_spanish: en agua viva
  alternatives_spanish:
  - en agua corriente
  - en agua fresca
  - en agua viva (es decir, corriente)
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'agua viva'. Se conserva con fidelidad porque la traducción inglesa ya decidió no neutralizarla; en español 'agua viva' mantiene la imagen textual y deja abierta la explicación contextual de agua fresca o corriente.
- source_word: וְטָהֵר
  english_pob_choice: then he shall be clean
  chosen_spanish: entonces quedará limpio
  alternatives_spanish:
  - y será limpio
  - entonces será limpio
  - y quedará limpio
  lexicon: HALOT
  rationale: '''Quedará limpio'' expresa con naturalidad el resultado final del rito. Mantiene el valor de estado logrado más que el de una limpieza meramente higiénica.'
theological_decisions:
- issue: Término de pureza ritual vs. pureza moral
  english_pob_reading: Use 'cleansed/clean' in a ritual sense
  chosen_spanish_reading: Usar 'limpio/quedará limpio' en sentido ritual
  alternative_spanish_readings:
  - purificado/puro
  - limpio moralmente
  rationale: Levítico 15 trata impureza ritual por flujo corporal, no culpa ética. 'Limpio' y 'quedará limpio' preservan la categoría ritual sin añadir una carga moral que el texto no afirma.
  doctrine_reference: La traducción debe conservar el sentido ceremonial del pasaje y no importar juicios morales ajenos al contexto legal de Levítico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'fresh water' por 'living water' para ajustarse más de cerca al hebreo. En español se siguió esa preferencia y se conservó la imagen literal 'agua viva', con una nota breve que aclara su sentido práctico como agua fresca o corriente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el Tetragrámaton aparezca explícitamente; este versículo no lo contiene.
  - Se prefirió 'agua viva' por correspondencia directa con בְּמַיִם חַיִּים, coherente con la decisión revisada en el audit trail inglés.
  - '''Limpio'' se usa en clave ritual, no higiénica ni moral, para conservar la distinción levítica.'
  - Se evitó 'siervo' o vocabulario eclesiástico no pertinente; el hebreo presenta un procedimiento legal de purificación.
