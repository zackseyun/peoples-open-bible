translation:
  language: es
  text: Delante de los seres humanos están la vida y la muerte[a], y lo que él elija[b] se le dará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para los seres humanos están la vida y la muerte»; el hebreo puede leerse así, aunque el paralelo griego favorece «delante de».'
    reason: alternative_reading
  - marker: b
    text: 'O: «lo que él quiera» o «lo que él desee».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי אָדָם
  english_pob_choice: Before human beings
  chosen_spanish: Delante de los seres humanos
  alternatives_spanish:
  - Para los seres humanos
  - Ante los seres humanos
  - Delante del hombre
  lexicon: HALOT
  rationale: La frase hebrea admite una lectura direccional o de presentación, y el paralelo griego ἔναντι ἀνθρώπων apoya claramente el sentido de 'delante/ante'. 'Seres humanos' expresa el valor colectivo de אָדָם sin volverlo genérico masculino en exceso.
- source_word: חַיִּים וָמָוֶת
  english_pob_choice: life and death
  chosen_spanish: la vida y la muerte
  alternatives_spanish:
  - vida y muerte
  - las vidas y la muerte
  - la vida y la muerte
  lexicon: HALOT
  rationale: Es un merismo directo de alternativas opuestas. En español, el artículo definido suena natural y conserva la antítesis enfática del hebreo y del griego.
- source_word: אֲשֶׁר יַחְפֹּץ
  english_pob_choice: whichever he chooses
  chosen_spanish: lo que él quiera
  alternatives_spanish:
  - lo que él elija
  - lo que él desee
  - cualquiera que él escoja
  lexicon: HALOT
  rationale: חפץ puede expresar deseo, deleite o querer; el griego εὐδοκήσῃ también abarca querer o elegir con agrado. 'Lo que él quiera' comunica bien la amplitud volitiva sin introducir una concreción excesiva. Se mantiene el singular genérico del original.
- source_word: יִנָּתֵן לוֹ
  english_pob_choice: will be given to him
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dado
  - será dado a él
  - se le concederá
  lexicon: HALOT
  rationale: La pasiva de נתן se vierte de forma natural con 'se le dará', conservando la pasividad sin añadir un agente no explícito. 'Concederá' sería más interpretativo y menos directo.
theological_decisions:
- issue: Relación entre la elección humana y la concesión final
  english_pob_reading: The verse states that life and death are set before people and that what a person chooses will be given to him, without adding a doctrinal explanation of how divine sovereignty and human choice relate.
  chosen_spanish_reading: El versículo presenta la alternativa de vida y muerte ante los seres humanos y afirma que lo que él quiera se le dará, sin explicar cómo se relacionan la soberanía divina y la elección humana.
  alternative_spanish_readings:
  - Una lectura fuertemente determinista que haría explícita la causalidad divina
  - Una lectura de libre albedrío más fuerte que presentaría la autodeterminación humana como absoluta
  rationale: 'La traducción conserva la tensión del texto: hay una oferta real de alternativas y, a la vez, una pasiva final que no nombra al agente. No se resuelve teológicamente lo que el hebreo y el griego dejan abierto.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Tratamiento de אָדָם y de la referencia genérica posterior
  english_pob_reading: Use 'human beings' for לִבְנֵי אָדָם and retain the generic singular 'he ... him' for the following clauses.
  chosen_spanish_reading: Se usa 'seres humanos' para לִבְנֵי אָדָם y se conserva el singular genérico 'él ... se le' en las cláusulas siguientes.
  alternative_spanish_readings:
  - people ... what they want will be given to them
  - el hombre ... se le dará
  rationale: '''Seres humanos'' transmite el alcance colectivo inicial. Luego se mantiene el singular porque el hebreo y el griego pasan a una formulación singular genérica; pluralizarlo borraría esa señal gramatical.'
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El inglés POB fue revisado de 'desires' a 'chooses' para ajustar mejor el verbo hebreo. En español se optó por 'quiera' como equivalente natural y amplio de חפץ, manteniendo la tensión entre deseo y elección que observan el hebreo y el griego. También se preservó la lectura espacial/presentativa ('delante de') apoyada por el paralelo griego.
  spanish_consistency_notes:
  - Se mantiene 'seres humanos' para אָדָם con una formulación colectiva y digna.
  - Se conserva el singular genérico 'él' para respetar la gramática del texto fuente.
  - La pasiva 'se le dará' evita introducir un agente no explicitado.
  - El tono es sobrio y publicable, sin calcos innecesarios del inglés.
