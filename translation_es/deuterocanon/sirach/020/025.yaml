revisions:
- from: Mejor es un ladrón que uno que persiste en la mentira[a]; pero ambos heredarán destrucción.
  to: Mejor es un ladrón que quien persiste en mentir[a]; pero ambos heredarán destrucción.
  rationale: Se conserva el texto proverbial y fiel al griego, pero se corrige la nota al pie para que represente correctamente la alternativa formal documentada en la auditoría inglesa. Además, se ajusta levemente «uno que persiste en la mentira» a «quien persiste en mentir» por mayor naturalidad y mejor correspondencia con el participio griego durativo.
