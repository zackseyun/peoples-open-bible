review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el audit trail inglés: conserva la condicionalidad de וְכִי, el sentido de empobrecimiento de יָמוּךְ, el término literal «tu hermano», el marco relacional de עִמָּךְ, la fuerza idiomática de וְנִמְכַּר לָךְ como autoventa por necesidad, y la prohibición de tratarlo con estatus/labor de esclavo. La nota literal sobre עֲבֹדַת עָבֶד también refleja correctamente la alternativa preservada en inglés.'
  spanish_quality_summary: La redacción es en general clara y fiel, pero «se vende a ti» suena poco natural en español bíblico contemporáneo; «se vende a ti mismo» sería incorrecto, y la mejor opción idiomática es «se vende a ti» o «se te vende», pero dado el audit trail que explicita autoventa, en español resulta más natural «se vende a ti» solo con un pequeño ajuste de la cláusula inicial. Además, «empobrece contigo» suena algo rígido; «si tu hermano se empobrece estando contigo» o «si tu hermano se empobrece y se vende a ti» serían más naturales, pero conviene conservar el valor de עִמָּךְ. La mejora mínima es «si tu hermano se empobrece estando contigo y se vende a ti…».
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: «hermano» por אָחִיךָ, «esclavo» por עָבֶד en este contexto legal, y sin eufemismos como «siervo». No hay términos del glosario mayor en disputa aquí (Yahvé, Mesías, etc.).'
  issues:
  - severity: medium
    issue: «empobrece contigo» suena poco natural en español
    rationale: Aunque es formalmente cercano a עִמָּךְ, en español moderno la combinación puede resultar torpe o ambigua. «Estando contigo» preserva el valor relacional con mejor legibilidad.
  - severity: low
    issue: Anclaje doble de notas en «a ti[b][a]» es funcional pero algo pesado
    rationale: No es incorrecto porque ambas notas pertenecen a la misma frase, pero conviene mantenerlo solo si se preservan ambas notas. Aquí puede seguirse igual al no haber problema de fidelidad.
  revised_spanish_text: Y si tu hermano se empobrece estando contigo y se vende a ti[b][a], no lo harás servir como esclavo.
  revised_footnotes:
