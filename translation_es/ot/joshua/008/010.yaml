  doctrine_reference: No aplica
translation_notes:
  revision_awareness: El texto español sigue la revisión del POB inglés que ajustó el sujeto de «went up» para incluir explícitamente a Josué y a los ancianos de Israel. La solución española refleja esa misma precisión sintáctica con «él y los ancianos de Israel subieron».
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para הָעָם, evitando sustituirlo por «tropas» pese al contexto militar, porque el hebreo no restringe el sustantivo.
  - Se usó «subieron» en plural para concordar con «él y los ancianos de Israel», siguiendo la relación sujeto-verbo del hebreo.
  - Se prefirió «Hai» como forma castellana del topónimo, consistente con uso bíblico español y sin borrar el nombre propio del lugar.
