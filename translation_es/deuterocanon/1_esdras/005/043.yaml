review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: «jefes de las familias», «llegaron al templo de Dios en Jerusalén», «levantar la casa», y «según su capacidad» reflejan adecuadamente ἡγουμένων, πατριὰς, παραγίνεσθαι, ἱερὸν τοῦ θεοῦ, ἐγεῖραι, οἶκον y κατὰ τὴν αὐτῶν δύναμιν. La principal desviación es la nota de «prometieron» con alternativa «votaron», que en español es incorrecta para el sentido de εὔξαντο; debe ser «hicieron voto» o «prometieron solemnemente». Además, «en su lugar» es aceptable, pero «en su sitio» refleja mejor ἐπὶ τοῦ τόπου αὐτοῦ y coincide mejor con el rastro auditado en inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «Jefes de las familias» funciona mejor que un calco como «cabezas». La frase fluye bien. Sin embargo, la nota b contiene un falso amigo grave («votaron»), y conviene afinar «en su lugar» a «en su sitio» para mayor precisión espacial y naturalidad bíblica contemporánea.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto; no aparecen términos sensibles como Yahvé/Mesías/esclavo. La conservación de «casa» para οἶκον está bien justificada y alineada con la racionalidad auditada. La decisión sobre εὔξαντο debe ajustarse para preservar la tensión léxica sin introducir el sentido ajeno de «votar».
  issues:
  - severity: high
    issue: La nota al pie b usa «votaron» como alternativa para εὔξαντο.
    rationale: En español «votar» normalmente significa emitir un voto electoral o de decisión, no hacer un voto solemne. Esto introduce un sentido equivocado y no preserva fielmente la alternativa léxica del griego ni del inglés auditado («vowed»).
  - severity: medium
    issue: «En su lugar» es menos preciso que «en su sitio» para ἐπὶ τοῦ τόπου αὐτοῦ.
    rationale: La frase griega apunta al emplazamiento físico propio/original. «En su lugar» puede entenderse de forma más abstracta; «en su sitio» o «en su lugar original» expresa mejor la referencia espacial concreta y armoniza mejor con «on its site».
  revised_spanish_text: Y de entre los jefes[a] de las familias, cuando llegaron al templo de Dios en Jerusalén, prometieron[b] levantar la casa[c] en su sitio, según su capacidad.
