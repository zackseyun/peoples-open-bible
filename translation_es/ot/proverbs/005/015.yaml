translation:
  language: es
  text: Bebe agua de tu propia cisterna[a], y agua que fluye de tu propio pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y lo que fluye desde el interior de tu propio pozo». El participio hebreo puede verterse más literalmente sin suplir «agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵה
  english_pob_choice: Drink
  chosen_spanish: Bebe
  alternatives_spanish:
  - Bebe de
  - Toma
  lexicon: HALOT
  rationale: Es un imperativo directo de segunda persona masculina singular. "Bebe" conserva la fuerza del mandato sin añadir matices no presentes en el hebreo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: El sustantivo hebreo es plural morfológico, pero en español "agua" es la forma natural y precisa para el referente genérico. En la segunda cola se usa "aguas" para reflejar mejor el participio plural y la imagen poética.
- source_word: מִבּוֹרֶךָ
  english_pob_choice: from your own cistern
  chosen_spanish: de tu cisterna
  alternatives_spanish:
  - de tu pozo
  - de tu aljibe
  lexicon: HALOT
  rationale: בּוֹר designa un pozo, cisterna o excavación para recoger agua. "Cisterna" conserva el valor concreto del depósito y funciona bien en el paralelismo con "pozo". El posesivo "tu" expresa la exclusividad del sufijo, como en el inglés auditado.
- source_word: וְנֹזְלִים
  english_pob_choice: and flowing water
  chosen_spanish: aguas que fluyen
  alternatives_spanish:
  - y aguas fluyentes
  - y lo que fluye
  lexicon: HALOT
  rationale: El participio de נזל indica algo que fluye. "Aguas que fluyen" suena natural en español y mantiene la imagen sin perder la relación con el sustantivo implícito del paralelo hebreo.
- source_word: מִתּוֹךְ
  english_pob_choice: from within
  chosen_spanish: de
  alternatives_spanish:
  - desde dentro de
  - del interior de
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una preposición más directa. En español, "de tu propio pozo" comunica con naturalidad la procedencia indicada por מִתּוֹךְ sin sobrecargar la frase.
- source_word: בְּאֵרֶךָ
  english_pob_choice: your own well
  chosen_spanish: tu propio pozo
  alternatives_spanish:
  - tu fuente
  - tu manantial
  lexicon: HALOT
  rationale: בְּאֵר suele significar "pozo". "Propio" reproduce el énfasis de exclusividad del sufijo y mantiene el paralelismo con "tu cisterna". "Pozo" es más directo que "fuente" o "manantial" y corresponde mejor al término hebreo.
theological_decisions:
- issue: Mantener la metáfora del agua sin explicitarla como esposa en el texto principal
  english_pob_reading: Retain the literal water imagery in the main text
  chosen_spanish_reading: Conservar la imaginería literal del agua en el texto principal
  alternative_spanish_readings:
  - Beber de tu propia esposa
  - Satisfácete con tu esposa
  rationale: El hebreo usa una metáfora deliberada. Traducirla como comentario interpretativo iría más allá del texto fuente. Mantener la imagen preserva su fuerza literaria y deja que el contexto explique la aplicación moral.
  doctrine_reference: 'Principio POB: primacía del original y no parafrasear más allá de lo que el texto fuente justifica.'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó "within" por considerarlo menos natural. La redacción española sigue esa decisión con "de tu propio pozo", manteniendo el valor de procedencia de מִתּוֹךְ sin añadir una expresión redundante.
  spanish_consistency_notes:
  - Se conserva "cisterna" para בּוֹר y "pozo" para בְּאֵר, manteniendo la distinción léxica del hebreo.
  - Se usa "agua" en singular y "aguas" en plural solo donde ayuda al paralelismo poético español.
  - '"Tu propio" traduce el énfasis posesivo/exclusivo de ambos sufijos en el paralelismo.'
  - No se introduce una identificación explícita con la esposa en el texto principal, siguiendo la práctica de preservar la metáfora original.
