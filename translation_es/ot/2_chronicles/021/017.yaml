base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/017.yaml
  text: They came up against Judah and invaded it[a], and carried away all the possessions found in the king’s house, and also his sons and his wives, so that no son was left to him except Jehoahaz, the youngest of his sons.
  footnotes:
