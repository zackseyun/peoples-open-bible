base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/045.yaml
  text: But the people said to Saul[a], “Should Jonathan die, who has brought about this great deliverance in Israel? Far from it! As Yahweh lives, not one hair of his head shall fall to the ground, for he has worked with God this day.” So the people redeemed Jonathan[d][c][b], and he did not die.
  footnotes:
  - marker: a
    text: Or 'this great salvation' or 'this great victory.' The Hebrew יְשׁוּעָה can denote deliverance, salvation, or victory depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Far be it!' A strong expression of rejection; traditionally also rendered 'Certainly not' or 'May it never be.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'for with God he has acted/worked today.' The wording emphasizes that Jonathan's action was carried out in concert with divine aid or favor.
    reason: lexical_alternative
  - marker: d
    text: Or 'redeemed Jonathan' or 'rescued Jonathan.' The verb carries the sense of securing release from a claim or sentence.
    reason: lexical_alternative
