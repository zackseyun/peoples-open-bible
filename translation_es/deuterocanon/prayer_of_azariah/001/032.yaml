translation:
  language: es
  text: Bendito eres tú en el trono de tu reino[a], y sumamente alabado y altamente exaltado por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tu realeza» o «de tu reinado». La palabra griega βασιλεία puede significar «reino», «realeza» o «reinado».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Bendito sea
  lexicon: BDAG
  rationale: En una fórmula doxológica, «Bendito» conserva el valor de bendición declarativa del griego sin convertirlo en una exhortación. «Alabado» es posible, pero desplaza el matiz de bendición. «Bendito sea» introduciría una forma exhortativa que no está explícita en el griego.
- source_word: ἐπὶ θρόνου
  english_pob_choice: on the throne
  chosen_spanish: sobre el trono
  alternatives_spanish:
  - en el trono
  - entronizado sobre
  lexicon: LSJ
  rationale: «Sobre el trono» mantiene la imagen concreta de ubicación con una preposición natural en español. «En el trono» también es viable, pero suaviza un poco la imagen espacial. «Entronizado sobre» añade una verbalización que el griego no expresa.
- source_word: τῆς βασιλείας σου
  english_pob_choice: of your kingdom
  chosen_spanish: de tu reino
  alternatives_spanish:
  - de tu realeza
  - de tu reinado
  lexicon: LSJ
  rationale: «Reino» es la correspondencia más natural y transparente para βασιλεία en este contexto, donde la imagen del trono favorece la esfera real. «Realeza» y «reinado» comunican la soberanía, pero son menos directas en español bíblico común.
- source_word: ὑπερυμνητός
  english_pob_choice: greatly praised
  chosen_spanish: sumamente alabado
  alternatives_spanish:
  - grandemente alabado
  - altamente alabado
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de alabanza. «Sumamente alabado» preserva esa intensificación en un español natural y solemne. «Grandemente» o «altamente» también sirven, pero suenan algo más débiles o más administrativos en este registro.
- source_word: ὑπερυψωμένος
  english_pob_choice: highly exalted
  chosen_spanish: excelso
  alternatives_spanish:
  - sumamente exaltado
  - muy exaltado
  lexicon: BDAG
  rationale: «Excelso» comunica elevación suprema de manera breve y digna, adecuada al paralelismo doxológico. «Sumamente exaltado» es más literal, pero menos fluido; «muy exaltado» pierde fuerza.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Por los siglos» conserva el plural intensivo del giro griego y su solemnidad litúrgica. «Para siempre» es claro, pero menos resonante con el plural de αἰῶνες. «Por los siglos de los siglos» intensifica más allá del texto breve.
theological_decisions:
- issue: Dirección de la alabanza y imaginería del trono
  english_pob_reading: 'Direct second-person address to God: ''Blessed are you on the throne of your kingdom'''
  chosen_spanish_reading: 'Dirección directa a Dios en segunda persona: «Bendito eres tú sobre el trono de tu reino»'
  alternative_spanish_readings:
  - «Bendito eres tú, entronizado sobre el trono de tu reino»
  - «Bendito eres tú en el trono de tu reino»
  rationale: El griego dirige la bendición directamente a Dios y vincula esa bendición con el trono real. La redacción elegida conserva esa dirección sin añadir una perífrasis como «entronizado», que no aparece en el texto. «Sobre» mantiene mejor la imagen del trono que una simple locución locativa más neutra.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Intensificación de la alabanza y exaltación
  english_pob_reading: greatly praised and highly exalted forever
  chosen_spanish_reading: sumamente alabado y excelso por los siglos
  alternative_spanish_readings:
  - grandemente alabado y altamente exaltado para siempre
  - supremamente alabado y sumamente exaltado por los siglos
  rationale: El par griego usa dos participios adjetivales intensivos. «Sumamente alabado y excelso» reproduce la doble intensificación sin redundar con dos expresiones idénticas de exaltación. «Excelso» preserva la fuerza del segundo término con una sola palabra de registro elevado, adecuada al paralelismo poético.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se revisó el sustantivo βασιλεία para evitar una traducción excesivamente abstracta. La decisión final conserva el imaginario de trono/reino del griego y mantiene el tono doxológico de la cláusula completa, sin introducir una paráfrasis como «entronizado» que no está en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto subyacente lo exija; aquí el pasaje dirige la alabanza a Dios sin el tetragrámaton explícito, por lo que se usa «Dios» implícito en la segunda persona, no una sustitución nominal.
  - «Bendito» se usa como predicado de alabanza, no como mero «bendecido» pasivo, para conservar el valor litúrgico del griego.
  - «Por los siglos» conserva el plural enfático de αἰῶνες y encaja con el registro bíblico en español sin perder la idea de perpetuidad.
