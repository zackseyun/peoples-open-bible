translation:
  language: es
  text: Mientras aún vivas y haya aliento en ti, no te pongas en poder de nadie de carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te entregues a nadie» o «no te sometas a ninguna persona». El griego dice literalmente «a toda carne», es decir, «a cualquier persona humana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι ζῇς
  english_pob_choice: As long as you are still alive
  chosen_spanish: Mientras aún vivas
  alternatives_spanish:
  - Mientras sigas vivo
  - Tanto que aún vivas
  lexicon: LSJ
  rationale: ἕως ἔτι marca un límite temporal continuo; en español, «Mientras aún vivas» conserva la idea de duración y suena natural y sobria.
- source_word: πνοὴ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - soplo
  - espíritu
  lexicon: LSJ
  rationale: Aquí πνοή se refiere al aliento vital. «Aliento» comunica bien la imagen de vida en curso sin trasladar el término hacia «espíritu», que introduciría una lectura menos directa del griego.
- source_word: μὴ ἀλλάξῃς σεαυτὸν
  english_pob_choice: do not put yourself in the power of
  chosen_spanish: no te pongas en poder de
  alternatives_spanish:
  - no te entregues a
  - no te sometas a
  - no te dejes dominar por
  lexicon: LSJ
  rationale: El griego no suena naturalmente en español como «no cambies a ti mismo». La construcción expresa cederse o colocarse bajo el control de otro; «ponerse en poder de» mantiene la fuerza de sujeción que el audit trail inglés también busca captar.
- source_word: πάσῃ σαρκί
  english_pob_choice: any flesh
  chosen_spanish: ninguna carne
  alternatives_spanish:
  - ninguna persona
  - ningún ser humano
  - ningún mortal
  lexicon: LSJ
  rationale: Se conserva «carne» para respetar el término literal σάρξ, que el POB inglés también preserva. En español, «ninguna carne» resulta comprensible en este contexto admonitorio y mantiene la tensión entre literalidad e idiomatismo.
theological_decisions:
- issue: Tratamiento de σάρξ
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - persona
  - ser humano
  - mortal
  rationale: El texto usa σάρξ en un sentido humano general, pero el proyecto prefiere conservar el término corporal/literal cuando el contexto lo permite. Mantener «carne» preserva la aspereza semántica del original y evita suavizar la advertencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
- issue: Sentido de la advertencia sobre relación con otros
  english_pob_reading: do not put yourself in the power of any flesh
  chosen_spanish_reading: no te pongas en poder de ninguna carne
  alternative_spanish_readings:
  - no te entregues a nadie
  - no te sometas a nadie
  - no te pongas bajo el dominio de nadie
  rationale: La revisión inglesa corrigió la lectura hacia la idea de someterse al poder de otro. En español, «ponerse en poder de» expresa esa sujeción sin borrar el término literal «carne», conservando la tensión entre sentido idiomático y forma del griego.
  doctrine_reference: 'DOCTRINE.md: literal terms and idiomatic extensions'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «give yourself over to» a «put yourself in the power of» para precisar la fuerza de μὴ ἀλλάξῃς σεαυτὸν πάσῃ σαρκί. La versión española sigue esa revisión y conserva el valor literal de σάρξ como «carne», con una nota alternativa para la posible lectura idiomática.
  spanish_consistency_notes:
  - Se mantuvo la traducción de YHWH/κύριος fuera de este versículo porque no aparece en el texto fuente.
  - «Aliento» se eligió como equivalente natural de πνοή en un contexto de vida continua; no se usó «espíritu» para no introducir una ambigüedad teológica no presente explícitamente.
  - La frase final conserva el paralelismo de la advertencia y la economía del griego, sin añadir sujeto o complemento inexistentes.
