review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del arameo: orgullo interior, endurecimiento arrogante, descenso del trono y pérdida de gloria sin explicitar al agente. Sin embargo, la nota [b] está mal anclada y cambia el referente de la alternativa léxica: el texto fuente y el POB inglés ponen las alternativas en ''su gloria'', no en ''de su trono real''.'
  spanish_quality_summary: 'El español es claro y digno. ''Se ensoberbeció'', ''se endureció en arrogancia'' y ''le fue quitada'' son naturales y fieles. El único problema importante es de aparato crítico/nota: la marca [b] aparece tras ''trono real'' pero su contenido corresponde a ''su gloria''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Gloria' para וִיקָרֵהּ y 'espíritu' para רוּחַ están bien elegidos. La decisión de no explicitar a Dios como agente también sigue la justificación documentada.
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre 'trono real', pero su contenido ofrece alternativas para וִיקָרֵהּ ('honra', 'majestad').
    rationale: Esto desaline­a el aparato de notas con la evidencia fuente y con el POB inglés. Además puede hacer pensar erróneamente que las alternativas se refieren al trono, cuando pertenecen a 'su gloria'.
  - severity: low
    issue: La nota [b] omite repetir el sustantivo principal en la primera alternativa.
    rationale: 'En español suena más claro formularla como alternativas de ''su gloria'': ''O: «su honra» o «su majestad».'' Al mover la ancla a ''gloria'', queda plenamente clara.'
  revised_spanish_text: Pero cuando su corazón se ensoberbeció y su espíritu se endureció en arrogancia[a], fue derribado de su trono real, y su gloria[b] le fue quitada.
  revised_footnotes:
  - marker: a
    text: 'O: «su espíritu se hizo fuerte en presunción» o «su espíritu se volvió arrogante».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su honra» o «su majestad».'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal porque es fiel y natural, pero se corrige la ubicación de la nota [b] para que ancle correctamente en 'su gloria', que es donde pertenecen las alternativas léxicas documentadas para וִיקָרֵהּ.
