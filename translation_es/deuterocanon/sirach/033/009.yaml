translation:
  language: es
  text: Levanta a un adversario[a], y destruye a un enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este pasaje es textualmente incierto en los metadatos del proyecto ('major mismatch'); esta traducción sigue de cerca la redacción conservada en Swete sin intentar reconstruir otras tradiciones.
    reason: textual_variant
lexical_decisions:
- source_word: ἔξαρον
  english_pob_choice: Raise up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Alza
  - Haz surgir
  - Eleva
  lexicon: LSJ
  rationale: El imperativo griego admite la idea de levantar o hacer surgir. «Levanta» conserva la brevedad y la fuerza verbal del original sin añadir una interpretación más específica de la que el griego exige.
- source_word: ἀντίδικον
  english_pob_choice: an adversary
  chosen_spanish: un adversario
  alternatives_spanish:
  - un opositor
  - un acusador
  - un contendor
  lexicon: BDAG
  rationale: «Adversario» reproduce bien el sentido de oposición hostil o contenciosa y mantiene el paralelismo con «enemigo». Evita restringir indebidamente el término a un contexto estrictamente jurídico.
- source_word: ἔκτριψον
  english_pob_choice: wipe out
  chosen_spanish: destruye
  alternatives_spanish:
  - aniquila
  - borra
  - arrastra
  lexicon: LSJ
  rationale: Aunque el verbo puede literalmente sugerir «frotar fuera» o «desgastar», en este contexto hostil el valor resulta claramente destructivo. «Destruye» comunica con naturalidad la intensidad del mandato en español sin perder la severidad del griego.
- source_word: ἐχθρόν
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - un foe
  - un adversario
  - el enemigo
  lexicon: BDAG
  rationale: «Enemigo» es la correspondencia directa y natural para un término de hostilidad. Se conserva el artículo indefinido, como en la traducción inglesa, para reflejar el singular anartro del griego.
theological_decisions:
- issue: Texto griego con validación de discrepancia importante (major_mismatch)
  english_pob_reading: Translate the extant Swete Greek as a short pair of imperatives without importing wider context.
  chosen_spanish_reading: Traducir el griego transmitido por Swete como dos imperativos breves, sin reconstruir un trasfondo textual más amplio.
  alternative_spanish_readings:
  - Podría subyacer otra forma hebrea o griega en otras tradiciones textuales.
  - Podría intentarse una reconstrucción contextual más expansiva.
  rationale: Dado que el expediente marca una discrepancia importante, la versión española se mantiene deliberadamente pegada al testimonio griego atestiguado y no introduce conjeturas. La nota conserva la tensión textual documentada.
  doctrine_reference: Crítica textual / transmisión del texto
translation_notes:
  revision_awareness: El expediente auditado indica que no hubo revisiones aplicadas y que el último pase quedó sin cambios; por eso la propuesta se mantiene estable y cercana al griego transmitido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «adversario» y «enemigo» para conservar el paralelismo hostil del griego.
  - Se evitó «destruid» o una segunda persona plural, porque el griego presenta imperativos singulares.
  - No se añadió contexto narrativo o moral que no esté en la línea griega breve.
