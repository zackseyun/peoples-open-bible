review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: escribir la carta, ordenar que Urías sea puesto en el punto de mayor peligro, retirarse de detrás de él, y el resultado buscado de que sea herido y muera. También preserva correctamente la alternativa léxica para הַמִּלְחָמָה הַחֲזָקָה. Sin embargo, ''combate más intenso'' puede sonar algo abstracto y pierde un poco la idea de ''fighting/fiercest battle'' en contexto militar; ''lucha más encarnizada'' o ''combate más encarnizado'' comunica mejor el matiz contextual documentado.'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora pequeña de naturalidad y precisión militar. 'Retírense de detrás de él' es comprensible aunque algo rígido; aun así, es aceptable y preserva bien מֵאַחֲרָיו, por lo que no requiere cambio. La principal mejora recomendada es sustituir 'combate más intenso' por 'combate más encarnizado', que además armoniza mejor con la nota alternativa existente.
  glossary_alignment: No hay términos del glosario principal en disputa en este versículo. Los equivalentes elegidos son coherentes con el proyecto. Se mantiene adecuadamente la distinción entre 'sea herido' y 'muera', en línea con la decisión auditada de no colapsar וְנִכָּה וָמֵת en un solo verbo.
  issues:
  - severity: medium
    issue: '''del combate más intenso'' suena menos idiomático y menos vívido que la fuerza del hebreo y de la auditoría inglesa.'
    rationale: הַמִּלְחָמָה הַחֲזָקָה describe el punto más severo/fiero del enfrentamiento. En español bíblico natural, 'más encarnizado' comunica mejor ese valor contextual que 'más intenso', que puede percibirse más general o abstracto.
  revised_spanish_text: 'Escribió en la carta[a], diciendo: «Pongan a Urías al frente del combate más encarnizado; luego retírense de detrás de él, para que sea herido y muera».'
