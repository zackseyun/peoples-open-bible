translation:
  language: es
  text: 'Porque allí nuestros captores nos pedían palabras de una canción, y nuestros opresores[a], alegría: «Cántennos uno de los cantos de Sion».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros burladores»; el término hebreo es poco común y puede destacar tanto la opresión ofensiva como la burla despectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del rechazo del versículo anterior. En español, «Porque» conserva bien el valor causal/explanatorio sin sonar forzado.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo natural para referirse al lugar del cautiverio; mantiene la referencia espacial simple del hebreo.
- source_word: שְׁאֵלוּנוּ
  english_pob_choice: asked us for
  chosen_spanish: nos pedían
  alternatives_spanish:
  - nos preguntaban por
  - nos solicitaban
  lexicon: HALOT
  rationale: El verbo hebreo expresa pedir/exigir algo de alguien. «Nos pedían» comunica la demanda reiterada o insistente con naturalidad en español, sin perder la fuerza de la petición.
- source_word: שׁוֹבֵינוּ
  english_pob_choice: our captors
  chosen_spanish: nuestros captores
  alternatives_spanish:
  - quienes nos cautivaron
  - nuestros cautivadores
  lexicon: HALOT
  rationale: «Captores» expresa con precisión la idea de quienes los llevaron cautivos y corresponde bien al contexto del exilio.
- source_word: דִּבְרֵי שִׁיר
  english_pob_choice: words of song
  chosen_spanish: palabras de canto
  alternatives_spanish:
  - palabras de canción
  - canciones
  lexicon: HALOT
  rationale: Se conserva la estructura literal «palabras de...», pero se adapta «song» a «canto» para una formulación más natural y digna en español. Esto mantiene la transparencia del hebreo mejor que reducirlo a «canciones».
- source_word: וְתוֹלָלֵינוּ
  english_pob_choice: our tormentors
  chosen_spanish: nuestros atormentadores
  alternatives_spanish:
  - nuestros burladores
  - nuestros que se burlaban de nosotros
  lexicon: HALOT
  rationale: La raíz es rara y puede abarcar burla agresiva u opresión abusiva. «Atormentadores» conserva la amplitud del insulto y la violencia implícita, sin cerrar demasiado la ambigüedad lexical.
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - júbilo
  lexicon: HALOT
  rationale: «Alegría» es la equivalencia más natural y clara en español para la demanda de un tono festivo. Mantiene la idea de diversión/animación sin sonar arcaica.
- source_word: שִׁירוּ לָנוּ
  english_pob_choice: Sing for us
  chosen_spanish: Cántennos
  alternatives_spanish:
  - Canten para nosotros
  - Entónennos
  lexicon: HALOT
  rationale: El imperativo plural con ל aquí pide una interpretación performativa a favor de los oyentes. «Cántennos» es idiomático en español y conserva la dirección del canto hacia ellos.
- source_word: מִשִּׁיר צִיּוֹן
  english_pob_choice: one of the songs of Zion
  chosen_spanish: uno de los cantos de Sion
  alternatives_spanish:
  - una de las canciones de Sion
  - un canto de Sion
  lexicon: HALOT
  rationale: El valor partitivo de מִן se expresa con «uno de». «Cantos» conserva el plural de repertorio del hebreo y «Sion» mantiene el topónimo tradicional.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio óptimo-equivalente del POB en inglés. Se mantiene la ambigüedad léxica de תוֹלָלֵינוּ mediante una nota, y se conserva el giro partitivo de מִשִּׁיר צִיּוֹן con «uno de los cantos de Sion».
  spanish_consistency_notes:
  - Se usa «Sion» para el topónimo, en continuidad con la tradición bíblica en español y con el inglés auditado.
  - Se prefiere «canto(s)» para שִׁיר en este contexto, porque en español comunica mejor la idea de pieza vocal y preserva la transparencia del hebreo.
  - Se evita sustituir la ambigüedad de תוֹלָלֵינוּ por una opción demasiado cerrada; la nota conserva la alternativa «burladores».
