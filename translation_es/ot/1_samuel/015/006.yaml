translation:
  language: es
  text: 'Entonces Saúl dijo al quenita[a]: «Vayan, apártense, bajen de en medio de los amalecitas, no sea que los destruya junto con ellos[c][b]. Porque ustedes mostraron bondad con todos los hijos de Israel cuando subieron de Egipto». Y el quenita se apartó de en medio de los amalecitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Quenita» traduce el gentilicio hebreo en singular, que aquí funciona como referencia colectiva; también podría leerse como «los quenitas».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «todos los hijos de Israel», una expresión nacional estándar para el pueblo de Israel.
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo puede llevar la idea de ser quitado o barrido junto con otros en juicio; por eso la traducción opta por una forma explicativa en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֵּינִי / קֵינִי
  english_pob_choice: the Kenite / the Kenite
  chosen_spanish: el quenita
  alternatives_spanish:
  - los quenitas
  lexicon: HALOT
  rationale: El hebreo usa el singular gentilicio con sentido colectivo o representativo. En español, el singular 'el quenita' conserva mejor esa forma y permite que el cierre narrativo también mantenga la misma referencia colectiva.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Salgan
  lexicon: HALOT
  rationale: Es el imperativo inicial directo. 'Vayan' suena natural y conserva la fuerza exhortativa del hebreo.
- source_word: סֻּרוּ
  english_pob_choice: turn aside
  chosen_spanish: apártense
  alternatives_spanish:
  - desvíense
  - retírense
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse. 'Apártense' comunica con claridad el movimiento fuera del grupo amalecita y sirve bien al contexto militar.
- source_word: רְדוּ
  english_pob_choice: go down
  chosen_spanish: bajen
  alternatives_spanish:
  - desciendan
  lexicon: HALOT
  rationale: ירד conserva el sentido literal de bajar o descender. 'Bajen' es la forma más natural en español sin perder la imagen de movimiento hacia abajo.
- source_word: מִתּוֹךְ עֲמָלֵקִי
  english_pob_choice: from among the Amalekites
  chosen_spanish: de en medio de los amalecitas
  alternatives_spanish:
  - de entre los amalecitas
  - de en medio de Amalec
  lexicon: HALOT
  rationale: La expresión indica salir del centro o medio de un grupo. 'De en medio de los amalecitas' reproduce bien la imagen y la referencia colectiva del gentilicio.
- source_word: פֶּן אֹסִפְךָ עִמּוֹ
  english_pob_choice: lest I sweep you away with them
  chosen_spanish: no sea que los destruya junto con ellos
  alternatives_spanish:
  - no sea que los arrastre con ellos
  - no sea que los quite de en medio con ellos
  lexicon: HALOT
  rationale: אָסַף en este contexto puede implicar quitar de en medio o llevarse en juicio. En español, 'los destruya junto con ellos' expresa con naturalidad el riesgo de quedar incluido en la misma ruina sin reducir el verbo a un simple 'reunir'.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad leal
  - benevolencia
  - lealtad
  lexicon: HALOT
  rationale: Aunque el POB en inglés revisó de una lectura más interpretativa a 'kindness', en español 'bondad' comunica con sobriedad la conducta benévola mostrada a Israel. Se evita cargar el término con un matiz técnico no explicitado por el contexto inmediato.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todo el pueblo de Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Se preserva la formulación masculina explícita del hebreo en una expresión nacional convencional. 'Hijos de Israel' es claro y fiel al paralelismo bíblico.
- source_word: בַּעֲלוֹתָם מִמִּצְרָיִם
  english_pob_choice: when they came up from Egypt
  chosen_spanish: cuando subieron de Egipto
  alternatives_spanish:
  - cuando salieron de Egipto
  - cuando ascendieron de Egipto
  lexicon: HALOT
  rationale: עלה con Egipto es un idiomático de subida/exodo. 'Subieron de Egipto' conserva esa imagen y sigue de cerca la forma hebrea.
- source_word: וַיָּסַר
  english_pob_choice: turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se retiró
  lexicon: HALOT
  rationale: La acción del quenita responde al imperativo anterior con el mismo campo semántico de apartarse. 'Se apartó' es natural y mantiene la cohesión verbal.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - los amalecitas
  lexicon: HALOT
  rationale: El nombre propio final aparece como designación colectiva/territorial. 'Amalec' sigue de cerca el hebreo y permite conservar el contraste con 'los amalecitas' del segmento anterior.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto histórico-relacional
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - lealtad
  - amor leal
  - benevolencia
  rationale: El texto fundamenta la orden de Saúl en la conducta favorable de los quenitas hacia Israel en el éxodo. En español, 'bondad' ofrece una lectura sobria y comprensible del gesto sin convertirlo en un tecnicismo teológico ni introducir una precisión no requerida por el versículo.
  doctrine_reference: Consistencia lexical del AT; principio de claridad moderna sin sobreinterpretación
- issue: Preservación del plural masculino nacional בְּנֵי יִשְׂרָאֵל
  english_pob_reading: all the sons of Israel
  chosen_spanish_reading: todos los hijos de Israel
  alternative_spanish_readings:
  - todo el pueblo de Israel
  - todos los israelitas
  rationale: Se conserva la forma masculina del hebreo porque es una expresión nacional establecida y el texto la usa de manera explícita. No hay razón textual suficiente para neutralizarla en español.
  doctrine_reference: Fidelidad al número y género del original cuando son parte del texto recibido
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'kindness' frente a una lectura más interpretativa de חֶסֶד y ajustó la referencia final a 'the Amalekites' para mayor precisión. La versión española sigue esa línea de sobriedad lexical, manteniendo la relación entre el mandato inicial y la obediencia final con el mismo campo semántico de apartarse.
  spanish_consistency_notes:
  - Se mantiene 'Amalec' como nombre propio en el cierre y 'amalecitas' en el mandato, para reflejar el movimiento entre designación colectiva y territorial sin perder naturalidad.
  - '''Hijos de Israel'' se conserva de forma consistente como expresión nacional masculina explícita.'
  - La repetición de la raíz de apartarse se refleja con 'apártense' / 'se apartó' para preservar la cohesión del hebreo.
