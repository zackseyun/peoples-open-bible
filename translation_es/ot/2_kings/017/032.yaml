translation:
  language: es
  text: Temían a Yahvé, y nombraron para sí, de entre todo su pueblo[a], sacerdotes de los lugares altos[b], que les servían en las casas de los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de entre todas sus clases’; la expresión hebrea es idiomática y puede sugerir selección del pueblo en general sin la debida distinción.
    reason: lexical_alternative
  - marker: b
    text: Es decir, sacerdotes que servían en santuarios locales, no en el santuario central.
    reason: cultural_note
lexical_decisions:
- source_word: יְרֵאִים אֶת יְהוָה
  english_pob_choice: feared Yahweh
  chosen_spanish: Temían a Yahvé
  alternatives_spanish:
  - reverenciaban a Yahvé
  - tenían temor de Yahvé
  lexicon: HALOT
  rationale: El hebreo ירא con אֶת־YHWH expresa temor reverente, lealtad y reconocimiento religioso; en este contexto conserva bien la tensión entre esa reverencia y la práctica cultual desviada que sigue. 'Temían' mantiene la fuerza léxica y evita suavizarlo a 'reverenciaban', que sería más explicativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la pauta del POB en inglés. 'Yahvé' es la forma castellana transparente y evita sustituir el nombre por un título.
- source_word: מִקְצוֹתָם
  english_pob_choice: from among all their people
  chosen_spanish: de entre todo su pueblo
  alternatives_spanish:
  - de entre ellos mismos
  - de entre todas sus clases
  lexicon: HALOT
  rationale: La expresión es idiomática y no debe leerse de manera puramente espacial. 'De entre todo su pueblo' transmite la selección desde el conjunto, sin forzar la idea debatida de 'los más bajos' ni perder la amplitud sugerida por la revisión inglesa.
- source_word: כֹּהֲנֵי בָמוֹת
  english_pob_choice: priests of the high places
  chosen_spanish: sacerdotes de los lugares altos
  alternatives_spanish:
  - sacerdotes de las alturas
  - sacerdotes de los santuarios de los lugares altos
  lexicon: HALOT
  rationale: '''Lugares altos'' es la equivalencia habitual para בָּמוֹת en Reyes y conserva el sentido cultual de santuarios locales ilícitos. ''Sacerdotes'' refleja כֹּהֲנֵי sin rebajar el oficio a una función genérica.'
- source_word: וַיִּהְי֛וּ עֹשִׂ֥ים לָהֶ֖ם
  english_pob_choice: who were serving for them
  chosen_spanish: que les servían
  alternatives_spanish:
  - que ministraban para ellos
  - que estaban sirviéndoles
  lexicon: HALOT
  rationale: El participio con היה expresa una actividad continuada. 'Les servían' es natural en español y conserva el valor funcional/cultual sin añadir detalles no explícitos en el verbo hebreo.
- source_word: בְּבֵית הַבָּמֹת
  english_pob_choice: in the houses of the high places
  chosen_spanish: en las casas de los lugares altos
  alternatives_spanish:
  - en los santuarios de los lugares altos
  - en los templos de los lugares altos
  lexicon: HALOT
  rationale: '''Casas'' traduce בֵּית de forma relativamente literal; ''lugares altos'' mantiene la referencia técnica. Se evita ''templos'' porque introduce un equivalente demasiado interpretativo para el término hebreo.'
theological_decisions:
- issue: Mantener la tensión entre el temor a Yahvé y el culto ilegítimo
  english_pob_reading: They feared Yahweh, and they appointed for themselves... priests of the high places...
  chosen_spanish_reading: Temían a Yahvé, y se nombraron para sí sacerdotes de los lugares altos...
  alternative_spanish_readings:
  - Temían a Yahvé, pero se nombraron para sí...
  - Decían temer a Yahvé, y se nombraron para sí...
  rationale: El hebreo une ambas acciones con una simple 'y' y no explicita por sí mismo una concesión adversativa. Se conserva la yuxtaposición sin resolverla, dejando que el lector perciba la contradicción narrativa entre reverencia y práctica cultual desviada.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener la coordinación simple con ‘y’, clarificar מִקְצוֹתָם como una selección ‘de entre todo su pueblo’, y explicitar que los sacerdotes recién nombrados eran los que servían en las casas de los lugares altos.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ para el nombre divino, conforme al criterio del proyecto.
  - ‘Lugares altos’ mantiene la terminología técnica del culto en Reyes y evita sustituciones eclesiásticas tradicionales no exigidas por el hebreo.
  - ‘Servían’ se eligió para reflejar una función continuada sin sobretraducir el participio hebreo.
  - La nota a preserva la alternativa semántica del temor reverente sin borrar la ambigüedad lexical.
  - La nota b explica el trasfondo cultual de los lugares altos sin introducir interpretación doctrinal adicional.
