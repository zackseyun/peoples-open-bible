translation:
  text: He said[1], "Lord, there are many around the drinking trough[3][2], but there
    is nothing in the well."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:12:28Z'
  footnotes:
  - marker: '1'
    text: The text reads ⲡⲉϫⲁϥ ϫⲉ ⲡϫⲟⲉⲓⲥ ('He said, "Lord..."'). It is unclear whether
      Jesus is addressing God, or a disciple is addressing Jesus. Some scholars suggest
      it may be a continuation of Saying 73.
    reason: textual_variant
  - marker: '2'
    text: 'Coptic ⲧϫⲱⲧⲉ (Crum 792b: well, cistern). Translated here as ''drinking
      trough'' to distinguish it from the following word for well (ⲧϣⲱⲛⲉ).'
    reason: lexical_alternative
  - marker: '3'
    text: Coptic ⲗⲁⲁⲩ can mean 'anything' or 'anyone'. The phrase could also be translated
      'there is no one in the well,' which would shift the metaphor from a lack of
      water to a lack of people willing to go deep.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡϫⲟⲉⲓⲥ
  chosen: Lord
  rationale: The definite article is used here for the vocative in Coptic. The text
    literally reads 'He said, "Lord..."', leaving it ambiguous whether Jesus is addressing
    God, or a disciple is addressing Jesus.
  lexicon: Crum 783a
  alternatives:
  - The Lord
- source_word: ⲧϫⲱⲧⲉ
  chosen: drinking trough
  rationale: Crum defines ϫⲱⲧⲉ as 'well' or 'cistern'. It is translated here as 'drinking
    trough' to distinguish it from the following word for well (ϣⲱⲛⲉ), conveying the
    surface-level gathering place as opposed to the depth where water is drawn.
  lexicon: Crum 792b
  alternatives:
  - cistern
  - well
- source_word: ⲧϣⲱⲛⲉ
  chosen: well
  rationale: Crum defines ϣⲱⲛⲉ as 'well, cistern, pit'.
  lexicon: Crum 572a
  alternatives:
  - cistern
  - pit
- source_word: ⲗⲁⲁⲩ
  chosen: nothing
  rationale: With the negative existential ⲙⲛ̄, ⲗⲁⲁⲩ means 'nothing' or 'no one'.
    In the context of a well, 'nothing' (i.e., no water) is the most natural reading,
    though 'no one' is grammatically possible.
  lexicon: Crum 147b
  alternatives:
  - no one
theological_decisions:
- issue: Identity of the speaker and addressee
  chosen_reading: He said, "Lord..."
  rationale: The Coptic ⲡⲉϫⲁϥ (He said) introduces the quote, and ⲡϫⲟⲉⲓⲥ (the Lord)
    is vocative. We preserve the ambiguity of who is speaking to whom, rather than
    emending the text to 'The Lord said' or assuming a specific speaker.
  alternatives_noted:
  - The Lord said
drafter_notes: The previous draft ('The Lord said, “There are many sellers and buyers,
  but the solitary is in the storehouse.”') was a complete hallucination, likely confusing
  this saying with another text. The Coptic clearly describes a scene with many people
  around a water source but nothing inside it. The translation preserves the distinction
  between the two terms for water sources (ϫⲱⲧⲉ and ϣⲱⲛⲉ) and maintains the ambiguity
  of the speaker.
