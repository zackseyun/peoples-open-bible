revisions:
- from: La mano de los testigos será la primera sobre él para darle muerte[a], y después la mano de todo el pueblo[b]. Así purgarás el mal de en medio de ti.
  to: La mano de los testigos será la primera contra él para darle muerte, y después la mano de todo el pueblo[a]. Así purgarás el mal de en medio de ti[b].
  rationale: 'Se reemplaza ''sobre él'' por ''contra él'' para expresar con mayor fidelidad y naturalidad el sentido judicial de בּוֹ en este contexto. Además, se reubican las notas para que sus marcadores correspondan exactamente al lugar pertinente: la nota cultural al sintagma de ''la mano ... del pueblo'' y la alternativa léxica al cierre ''de en medio de ti''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura legal del hebreo y conserva la fórmula deuteronómica final con buena fidelidad. Sin embargo, en בּוֹ el valor punitivo/judicial queda mejor expresado en español con 'contra él' que con 'sobre él', ya que la propia auditoría inglesa justificó 'against him' para aclarar acción hostil legal y 'sobre él' suena menos natural y menos preciso en este contexto.
  spanish_quality_summary: El español es generalmente claro y digno, pero 'será la primera sobre él' resulta algo forzado. Cambiar a 'será la primera contra él' mejora naturalidad y precisión sin perder el idiomatismo de 'mano'. El resto del versículo, incluyendo 'purgarás el mal de en medio de ti', es sólido y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Testigos', 'darle muerte', 'purgarás' y 'el mal' concuerdan con las decisiones léxicas y teológicas auditadas. La revisión propuesta solo ajusta la preposición para alinearse mejor con la rationale documentada de בּוֹ.
  issues:
  - severity: medium
    issue: '''sobre él'' para בּוֹ en contexto punitivo'
    rationale: Aunque literalmente posible, en español jurídico y narrativo 'la mano ... contra él' comunica mejor la idea de acción penal hostil. Además, la auditoría inglesa explicó explícitamente que 'against him' aclara mejor el sentido que una opción más locativa.
  revised_spanish_text: La mano de los testigos será la primera contra él para darle muerte, y después la mano de todo el pueblo[a]. Así purgarás el mal de en medio de ti[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “la mano de los testigos... y la mano de todo el pueblo”, un modismo jurídico que asigna a los testigos la responsabilidad de iniciar la ejecución.'
    reason: cultural_note
  - marker: b
    text: 'O: “de entre ti”.'
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''sobre él'' por ''contra él'' para expresar con mayor fidelidad y naturalidad el sentido judicial de בּוֹ en este contexto. Además, se reubican las notas para que sus marcadores correspondan exactamente al lugar pertinente: la nota cultural al sintagma de ''la mano ... del pueblo'' y la alternativa léxica al cierre ''de en medio de ti''.'
