translation:
  language: es
  text: He visto esclavos[a] sobre caballos, y príncipes[b] que andan como esclavos por el suelo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos» para עֲבָדִים; se mantiene «esclavos» porque el verso enfatiza una inversión social marcada.
    reason: lexical_alternative
  - marker: b
    text: O «nobles» para שָׂרִים; el término se refiere a personas de alto rango o autoridad.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «sobre la tierra»; aquí la idea es que van sin montar, en contraste con los que van sobre caballos.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El perfecto hebreo de 1cs expresa una observación personal con vigencia experiencial. En español, «He visto» conserva mejor ese matiz que un pasado simple meramente narrativo.
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: HALOT
  rationale: El contexto subraya una inversión social tajante entre estatus bajo y alto. «Esclavos» conserva mejor la fuerza del término hebreo עֲבָדִים que el más suave «siervos».
- source_word: עַל סוּסִים
  english_pob_choice: on horses
  chosen_spanish: sobre caballos
  alternatives_spanish:
  - montados en caballos
  - a caballo
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «sobre caballos». En español, «sobre caballos» mantiene la cercanía formal; el sentido implícito es estar montados, sin añadir más de lo que el texto dice.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - nobles
  - oficiales
  - gobernantes
  lexicon: HALOT
  rationale: «Príncipes» es una equivalencia tradicional y comprensible para personas de alto rango o autoridad. Conserva mejor el contraste social con «esclavos» que opciones más específicas o más genéricas.
- source_word: הֹלְכִים
  english_pob_choice: walking
  chosen_spanish: que andan
  alternatives_spanish:
  - caminando
  - que van
  lexicon: HALOT
  rationale: El participio describe acción continua. «Que andan» suena natural en español y comunica el movimiento sin forzar una imagen demasiado técnica.
- source_word: כַּעֲבָדִים
  english_pob_choice: like slaves
  chosen_spanish: como esclavos
  alternatives_spanish:
  - al modo de esclavos
  - igual que esclavos
  lexicon: HALOT
  rationale: El כ comparativo indica semejanza, no identificación. «Como esclavos» es la forma más clara y natural de expresar esa comparación en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en tierra
  - por el suelo
  - a pie
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «on the ground» para aclarar el contraste con los caballos, el hebreo dice literalmente «sobre la tierra». En español, «sobre la tierra» conserva mejor el valor literal y sigue siendo inteligible en el contraste de estatus y desplazamiento.
translation_notes:
  revision_awareness: El pasaje fue revisado y el estado más reciente indica que no hubo cambios necesarios; el presente borrador sigue de cerca la lectura del texto hebreo y la solución aprobada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la terminología POB de «esclavos» para עֲבָדִים por la fuerza social del contraste.
  - Se conservó el paralelismo imagen-contraimagen entre los montados y los que van a pie/sobre la tierra, sin añadir explicación interpretativa al texto principal.
  - «Príncipes» se eligió como equivalente estable y readable para שָׂרִים, consistente con el audit trail inglés.
