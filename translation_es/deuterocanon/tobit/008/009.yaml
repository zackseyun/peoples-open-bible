translation:
  language: es
  text: Y ambos durmieron[a] toda la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y ambos durmieron la noche». El griego idiomático probablemente significa que durmieron durante toda la noche.'
