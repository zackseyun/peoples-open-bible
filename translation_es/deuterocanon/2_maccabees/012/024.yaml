  yaml_path: translation/deuterocanon/2_maccabees/012/024.yaml
  text: But Timothy himself[a], having fallen into the hands of those with Dositheus and Sosipater, begged with much cunning to be let go unharmed, because he had the parents of many of them, and of others their brothers[b], and it would happen that these would be disregarded.
  footnotes:
  - marker: a
    text: Or 'with much guile' or 'with much trickery'; the Greek γοητία here likely refers to crafty or deceptive pleading rather than literal sorcery.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek is compressed: Timothy argues that he has many of their parents and others'' brothers in his power, so if they kill him those relatives would be treated as of no account.'
    reason: cultural_note
