review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea de la POB inglesa en los puntos principales: compra del campo, identificación formal de Hanamel como «hijo de mi tío», localización de Hanamel en Anatot, pago por peso, y monto entendido como diecisiete siclos de plata. Sin embargo, el texto español actual dice «compré el campo de Hanamel», lo que en español suena posesivo y no expresa con suficiente claridad la relación transaccional de מֵאֵת («de parte de / de» como vendedor). Conviene explicitar «a Hanamel» o «se lo compré a Hanamel». Además, las notas están desalineadas con la auditoría inglesa: la nota [a] no debe ir sobre «hijo de mi tío», sino sobre el monto literal hebreo «siete siclos y diez plata», y la nota [b] debe conservar la alternativa de lectura sobre la relación de parentesco/localización.'
  spanish_quality_summary: El español es generalmente natural y digno. «Así compré» funciona, aunque «Entonces compré» o simplemente «Compré» también serían posibles; no es un problema grave. «Le pesé la plata» es comprensible, pero resulta algo menos idiomático que «le pesé la plata» ya usado; puede mantenerse. La mejora principal es evitar la ambigüedad de «el campo de Hanamel» y corregir el sistema de notas para que refleje el razonamiento documentado y no introduzca una nota innecesaria en «hijo de mi tío».
  glossary_alignment: 'La terminología está bien alineada: «campo» por שָׂדֶה, «plata» por כֶּסֶף, «siclos» por שְׁקָלִים, y se conserva «hijo de mi tío» en lugar de aplanarlo a «primo» en el texto principal. No hay términos teológicos sensibles en este versículo. La excepción necesaria es reordenar la sintaxis española para expresar mejor מֵאֵת como vendedor de la transacción.'
  issues:
  - severity: high
    issue: «Compré el campo de Hanamel» no expresa con suficiente precisión «compré el campo de/a partir de Hanamel».
    rationale: En español, «el campo de Hanamel» normalmente se entiende como posesión o identificación del campo, no como origen de la compra. El hebreo מֵאֵת marca al vendedor/fuente de la adquisición; la POB inglesa lo refleja con «from Hanamel». Debe decirse «se lo compré a Hanamel» o equivalente.
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado y no preserva la nota léxica principal de la POB inglesa.
    rationale: La auditoría inglesa coloca la nota a en «seventeen shekels of silver» para explicar el literal hebreo «seven shekels and ten silver». El borrador español mueve esa nota a «hijo de mi tío», perdiendo una decisión léxica importante del texto fuente/auditoría.
  - severity: medium
    issue: La nota [b] mezcla una alternativa válida con un anclaje textual impreciso.
    rationale: La POB inglesa conserva como alternativa «from Hanamel, my cousin, who was in Anathoth». En español debe mantenerse como nota de lectura alternativa relacionada con la identificación de Hanamel, no como sustituto de una nota léxica omitida.
  revised_spanish_text: 'Así le compré el campo a Hanamel, hijo de mi tío, que estaba en Anatot[b], y le pesé la plata: diecisiete siclos de plata[a].'
  revised_footnotes:
