- from: La voz de tu trueno estaba en el torbellino[a]; los relámpagos alumbraron el mundo; la tierra tembló y se estremeció.
  to: El sonido de tu trueno se oyó en el torbellino[a]; los relámpagos alumbraron el mundo; la tierra tembló y se estremeció.
  rationale: Se ajusta קוֹל a 'sonido' para seguir la decisión léxica auditada y mejorar la naturalidad del español con 'trueno'. También se cambia 'estaba en' por 'se oyó en' para expresar de manera más idiomática la presencia audible del trueno en el torbellino, sin alterar el sentido poético del hebreo. Se conserva la nota sobre la alternativa literal 'rueda'.
