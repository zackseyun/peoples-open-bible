    text: O «la harán servir». El verbo hebreo puede denotar servicio forzado; aquí el contexto apoya «la esclavizarán».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras fuente correctas, se eliminó la nota innecesaria sobre «Abram», se quitó «allí» por no estar explícito en el hebreo, y se mejoró גֵר con «forastera», que refleja mejor la residencia en tierra ajena. Se preservan las decisiones POB sobre «descendencia», «esclavizarán» y «afligirán».
