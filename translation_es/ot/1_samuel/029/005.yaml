  yaml_path: translation/ot/1_samuel/029/005.yaml
  text: Is this not David[a], of whom they sang to one another in the dances, saying, ‘Saul has struck down his thousands[b], and David his ten thousands’?”
  footnotes:
  - marker: a
    text: Or, more literally, 'they answered concerning him in the dances,' an idiom for responsive or antiphonal singing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten thousands'; the term can also be understood more generally as 'myriads.'
    reason: lexical_alternative
