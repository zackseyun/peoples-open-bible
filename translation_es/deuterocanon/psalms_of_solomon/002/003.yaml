translation:
  language: es
  text: porque los hijos de Jerusalén contaminaron las cosas santas de Yahvé; profanaron las ofrendas[a] de Dios con sus obras de iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «ofrendas» refleja el sentido cultual de δῶρα; más literalmente, «dones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθ' ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por lo cual
  - ya que
  - debido a que
  lexicon: BDAG
  rationale: La construcción griega introduce la causa del juicio; «porque» transmite de manera natural y directa el valor causal en español sin añadir matices no presentes en el texto.
- source_word: υἱοὶ Ἱερουσαλήμ
  english_pob_choice: sons of Jerusalem
  chosen_spanish: los hijos de Jerusalén
  alternatives_spanish:
  - los hijos varones de Jerusalén
  - los niños de Jerusalén
  - la gente de Jerusalén
  lexicon: BDAG
  rationale: Se conserva el plural masculino explícito del griego. En español, «hijos» mantiene la forma lexical básica y resulta publicable; «hijos varones» sería demasiado explicativo, y «gente» borraría la marca de género del original.
- source_word: ἐμίαναν
  english_pob_choice: defiled
  chosen_spanish: contaminaron
  alternatives_spanish:
  - mancharon
  - volvieron impuros
  - ensuciaron
  lexicon: BDAG
  rationale: Aunque «contaminaron» no es una traducción cultual perfecta en todos los contextos, aquí comunica bien la profanación ritual de objetos santos. Evita la ambigüedad de un término solo moral como «mancharon».
- source_word: τὰ ἅγια Κυρίου
  english_pob_choice: the holy things of the Lord
  chosen_spanish: las cosas santas del Señor
  alternatives_spanish:
  - los lugares santos del Señor
  - el santuario del Señor
  - las cosas sagradas del Señor
  lexicon: BDAG
  rationale: El neutro plural apunta a objetos o realidades sagradas, no necesariamente a un edificio. «Las cosas santas» preserva la amplitud semántica. Se traduce Κυρίου como «del Señor» en esta unidad porque el contexto inmediato no exige explicitar el nombre divino, y la fórmula española es idiomática; aun así, se mantiene la referencia al título divino sin reinterpretarlo.
- source_word: ἐβεβήλωσαν
  english_pob_choice: profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - desecraron
  - trataron como común
  - hicieron profano
  lexicon: BDAG
  rationale: «Profanaron» reproduce con precisión el contraste entre lo sagrado y lo común/impuro, y es el equivalente español más natural para el verbo cultual griego.
- source_word: τὰ δῶρα τοῦ θεοῦ
  english_pob_choice: the gifts of God
  chosen_spanish: las ofrendas de Dios
  alternatives_spanish:
  - los dones de Dios
  - las ofrendas ofrecidas a Dios
  - los regalos de Dios
  lexicon: BDAG
  rationale: El contexto templario favorece entender δῶρα como dones/obsequios cultuales, es decir, ofrendas. Aunque la correspondencia léxica más literal sería «dones», «ofrendas» evita en español la falsa impresión de regalos dados por Dios a humanos y conserva la realidad sacrificial que el auditorio habría entendido.
- source_word: ἐν ἀνομίαις
  english_pob_choice: with their lawless deeds
  chosen_spanish: con sus hechos impíos
  alternatives_spanish:
  - con sus obras de iniquidad
  - en sus actos de maldad
  - por sus iniquidades
  lexicon: BDAG
  rationale: «ἀνομίαις» denota acciones sin ley o contra la ley. «Hechos impíos» comunica el carácter moral y religioso de la culpa con un registro sobrio. Se evita «iniquidades» por ser más abstracto en español moderno y menos transparente para el lector.
theological_decisions:
- issue: Relación entre Κυρίου y el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: En este versículo la forma griega usa Κυρίου como título divino sin una cita directa que obligue a explicitar el nombre. Aunque el proyecto prefiere «Yahvé» para יהוה, aquí la forma española «el Señor» conserva el flujo del sintagma culto «las cosas santas del Señor» y sigue siendo reverente y transparente. No se introduce «Yahvé» porque el texto fuente inmediato no lo demanda de manera inequívoca.
  doctrine_reference: Divine name / reverential title usage in source-grounded translation
- issue: Sentido cultual de δῶρα
  english_pob_reading: the gifts of God
  chosen_spanish_reading: las ofrendas de Dios
  alternative_spanish_readings:
  - los dones de Dios
  - las ofrendas para Dios
  rationale: La revisión inglesa muestra tensión entre una traducción léxica («gifts») y la realidad cultual subyacente («offerings»). En español se resuelve a favor de la lectura sacrificial porque el contexto de profanación de lo santo exige un referente templario concreto. «Las ofrendas de Dios» puede sonar objetivamente ambiguo en español, pero mantiene la estructura genitiva del original y permite entender «de Dios» como pertenencia/dedicación a Dios.
  doctrine_reference: Sacrificial offering vocabulary in Second Temple context
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del texto inglés, que volvió de «offerings» a «gifts» por correspondencia léxica más cercana con δῶρα, pero también la revisión anterior que había reconocido el contexto templario y la lectura sacrificial. Por eso el español principal usa «ofrendas» para sostener la realidad cultual que el auditorio original habría entendido, mientras que la nota conserva la alternativa más literal («dones») para no borrar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se conserva el plural masculino «hijos» conforme al griego y a la decisión inglesa documentada.
  - Se mantiene el registro cultual con «profanaron» y «cosas santas».
  - No se usa «SEÑOR» en versales, ya que la serie española del proyecto prefiere una forma léxica explícita solo cuando el nombre divino hebreo está en juego de manera directa.
  - Se evita el calco «con iniquidades» en favor de una construcción natural en español que preserve el valor de conducta culpable.
