  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Greek Ἰουδαίων can refer to Jews as a people or to Judeans in a geo-ethnic sense.
    reason: lexical_alternative
  - marker: b
    text: '''Ethnarch'' is a historical political title, roughly a ruler or leader of a people.'
    reason: cultural_note
  - marker: c
    text: Or 'to preside over all of them' or 'to be in charge of them all.'
    reason: lexical_alternative
