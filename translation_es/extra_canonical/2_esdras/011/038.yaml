translation:
  language: es
  text: ¿No eres tú el que venció a las cuatro bestias que yo había hecho?
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Nonne tu es
  english_pob_choice: Are you not the one...
  chosen_spanish: ¿No eres tú el que...
  alternatives_spanish:
  - ¿Acaso no eres tú el que...
  - ¿No eres tú quien...
  lexicon: interrogación enfática
  rationale: El latín introduce una pregunta retórica con fuerte énfasis. En español, «¿No eres tú el que...?» reproduce bien el valor enfático sin forzar una estructura arcaica.
- source_word: superasti
  english_pob_choice: prevailed over
  chosen_spanish: prevaleciste sobre
  alternatives_spanish:
  - venciste sobre
  - triunfaste sobre
  - superaste
  lexicon: superare
  rationale: «Prevaleciste sobre» conserva la idea de superioridad/ dominio lograda en el verbo latino y evita reducirlo solo a supervivencia. También mantiene la conexión con el ajuste auditado en inglés, que corrigió la lectura hacia «prevailed over».
- source_word: quattuor animalibus
  english_pob_choice: the four beasts
  chosen_spanish: las cuatro bestias
  alternatives_spanish:
  - los cuatro animales
  - las cuatro criaturas
  lexicon: animalia / bestiae
  rationale: «Bestias» sigue el valor del contexto apocalíptico y la tradición textual del pasaje, sin suavizarlo a «animales», que en español puede sonar demasiado genérico y perder fuerza literaria.
- source_word: quae feceram
  english_pob_choice: that I had made
  chosen_spanish: que yo había hecho
  alternatives_spanish:
  - que yo había creado
  - que había formado
  lexicon: facere
  rationale: «Había hecho» es la equivalencia más directa y fiel al perfecto pluscuamperfecto latino. Mantiene la acción creadora/constructiva sin añadir una interpretación más teológica de la necesaria.
theological_decisions:
- issue: Identidad del hablante implícito en la pregunta
  english_pob_reading: The English audit trail treats the clause as a direct question without restoring the earlier misaligned speech frame.
  chosen_spanish_reading: La versión española conserva solo la pregunta del verso 11:38, sin reinsertar la fórmula previa de 11:37.
  alternative_spanish_readings:
  - Oír, y te hablaré...
  - 'El Altísimo te dice: ...'
  rationale: El aparato de revisión indica que la frase «Hear, and I will speak to you. The Most High says this to you» pertenece al verso anterior, no a este. Por fidelidad textual, no debe trasladarse aquí.
  doctrine_reference: Fidelidad textual y delimitación de perícopa
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del inglés auditado, que corrigió el error de división de versículos y fijó el sentido de superasti como «prevailed over». Por eso el español se apoya en la lectura revisada y no en la redacción anterior desplazada desde 11:37.
  spanish_consistency_notes:
  - Se mantiene «bestias» para conservar el registro apocalíptico del pasaje.
  - Se usa «prevaleciste sobre» para reflejar el valor de superasti y evitar una mera idea de supervivencia.
  - No se introduce «Cristo», «Señor» ni otras fórmulas no presentes en el latín de este verso.
