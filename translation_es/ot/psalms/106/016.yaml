review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: celos/envidia dirigidos a Moisés y Aarón, ubicación en el campamento, y la designación de Aarón en relación con Yahvé. También preserva correctamente יְהוָה como «Yahvé». Sin embargo, «tuvieron envidia» reduce algo el matiz de «estar celosos / tener celos» presente en קנא en este contexto, y la alternativa documentada para קְדוֹשׁ יְהוָה debe preservarse en nota, como en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y natural. No obstante, «Tuvieron envidia» suena algo menos directo y menos paralelo al inglés POB «were jealous» y al contexto de rivalidad en Números 16. «Tuvieron celos» o «estaban celosos» sería más cercano semánticamente; «tuvieron celos» suena natural en español bíblico moderno. La frase «el santo de Yahvé» es comprensible y digna, pero conviene conservar en nota la alternativa «consagrado/santo para Yahvé» para reflejar la ambigüedad documentada.
  glossary_alignment: Alineado con la terminología del proyecto en el uso de «Yahvé». No hay conflicto con otros términos clave. La decisión sobre קְדוֹשׁ יְהוָה debe seguir la racionalidad documentada incluyendo la alternativa en nota.
  issues:
  - severity: medium
    issue: «Tuvieron envidia» debilita el matiz de קנא
    rationale: En este contexto, el verbo expresa celos/envidia rival, no solo envidia genérica. «Tuvieron celos» preserva mejor la fuerza relacional y se acerca más a la decisión inglesa auditada («were jealous»).
  - severity: medium
    issue: Falta la nota de alternativa para קְדוֹשׁ יְהוָה
    rationale: La auditoría inglesa conserva la lectura alternativa «holy to the LORD». En español debe preservarse una nota equivalente, por ejemplo «Aarón, santo para Yahvé» o «consagrado a Yahvé», anclada en el texto.
  revised_spanish_text: Tuvieron celos de Moisés en el campamento, y de Aarón, el santo de Yahvé[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Aarón, santo para Yahvé».'
    reason: alternative_rendering_of_קְדוֹשׁ_יְהוָה
  revision_rationale: Se ajusta «tuvieron envidia» a «tuvieron celos» para reflejar mejor קנא en un contexto de rivalidad y mantener mayor cercanía con la decisión fuente. Se añade una nota con la alternativa documentada para קְדוֹשׁ יְהוָה, preservando la evidencia léxica y teológica de la auditoría inglesa.
