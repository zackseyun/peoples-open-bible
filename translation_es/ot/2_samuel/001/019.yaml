translation:
  language: es
  text: Tu gloria[a], oh, Israel, ha sido abatida sobre tus alturas[b]. ¡Cómo han caído los poderosos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צְבִי también puede traducirse 'hermosura' o 'esplendor'; algunos lo entienden en sentido más concreto como 'gacela'.
    reason: lexical_alternative
  - marker: b
    text: O 'tus lugares altos'. Aquí se prefiere 'tus alturas' para conservar el sentido topográfico sin implicar necesariamente un sentido cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּבִי
  english_pob_choice: Your glory
  chosen_spanish: Tu gloria
  alternatives_spanish:
  - Tu hermosura
  - Tu esplendor
  - Tu gacela
  lexicon: HALOT, BDB
  rationale: צְבִי puede significar belleza, esplendor o gloria, y en algunos contextos también gacela/ciervo. En este lamento dirigido a Israel, el sentido figurado de gloria nacional encaja mejor con el paralelismo poético y con el vocativo posterior, por lo que 'Tu gloria' conserva la fuerza retórica del texto.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  - ¡Israel!
  lexicon: Nombre propio / vocativo contextual
  rationale: El hebreo interpela a Israel directamente. 'Oh Israel' reproduce el valor vocativo en un registro natural y solemne para el español bíblico.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT, BDB
  rationale: La preposición indica ubicación directa del caído en relación con las alturas. 'Sobre' es la forma más natural y fiel en español para conservar la imagen espacial.
- source_word: בָּמוֹתֶיךָ
  english_pob_choice: your heights
  chosen_spanish: tus alturas
  alternatives_spanish:
  - tus montes
  - tus altos lugares
  - tus alturas altas
  lexicon: HALOT, BDB
  rationale: '''Alturas'' mantiene el sentido topográfico de בָּמוֹת sin cargar de antemano la asociación cultual que suele tener ''lugares altos'' en otras contextos. El posesivo se conserva por la segunda persona singular del hebreo.'
- source_word: חָלָל
  english_pob_choice: lies slain
  chosen_spanish: yace muerta
  alternatives_spanish:
  - yace asesinado
  - yace caído
  - está muerto
  lexicon: HALOT, BDB
  rationale: חָלָל designa a alguien muerto o herido de muerte. En español, 'yace muerta' conserva el estado de cadáver/caído en combate de manera idiomática y poética; la forma femenina se usa para concordar con 'gloria' en la metáfora personificada.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - cómo
  lexicon: HALOT, BDB
  rationale: Introduce la exclamación de lamento. '¡Cómo!' mantiene el tono elegíaco breve y solemne del hebreo.
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han sucumbido
  lexicon: HALOT, BDB
  rationale: El perfecto hebreo en este contexto de lamento se expresa naturalmente como presente perfecto en español. 'Han caído' conserva la fuerza del refrán poético.
- source_word: גִבּוֹרִים
  english_pob_choice: the mighty
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los héroes
  - los fuertes
  lexicon: HALOT, BDB
  rationale: גִבּוֹרִים puede significar poderosos, héroes o guerreros. 'Los valientes' comunica de manera natural en español el valor militar y heroico del término dentro de este canto fúnebre.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo poético y mantiene la estructura elegíaca reconocida en el audit trail inglés: vocativo a Israel, imagen topográfica de las alturas y refrán final sobre la caída de los poderosos. No se introdujeron cambios doctrinales ni emendaciones textuales.'
  spanish_consistency_notes:
  - Se conserva la segunda persona singular ('tu/tus') para reflejar el sufijo hebreo.
  - '''Alturas'' se usa consistentemente con el criterio POB de evitar importar automáticamente la carga cultual de ''lugares altos''.'
  - '''Los valientes'' se eligió por naturalidad poética en español, sin perder la amplitud semántica de גִבּוֹרִים.'
