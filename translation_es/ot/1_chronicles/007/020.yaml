review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura genealógica hebrea y la repetición de «su hijo», en línea con el texto fuente y la nota del POB en inglés. «Los hijos de Efraín» y la secuencia coordinada son fieles. Sin embargo, dos nombres propios no siguen de manera óptima la evidencia fuente/auditoría: שׁוּתָלַח se ha dado como «Shutélah», una transliteración innecesariamente anglicada para español, y אֶלְעָדָה se redujo a «Elada», mientras que el POB inglés documenta «Eleadah» y la forma española más transparente y cercana al hebreo es «Eleadá»/«Eleada».'
  spanish_quality_summary: El español es legible y digno. La puntuación con comas tras los nombres funciona, aunque no es indispensable. La principal mejora es normalizar las transliteraciones hacia formas más naturales en español y más cercanas al hebreo, evitando una grafía excesivamente dependiente del inglés. El resto del verso suena claro y apropiado para una genealogía.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. «Efraín» y «su hijo» concuerdan con las decisiones del proyecto. La cuestión clave es la consistencia de nombres propios: conviene evitar una transliteración híbrida anglo-española en «Shutélah» y reflejar mejor אֶלְעָדָה que «Elada».'
  issues:
  - severity: medium
    issue: «Shutélah» es una transliteración poco natural en español.
    rationale: Aunque el hebreo שׁוּתָלַח corresponde al inglés «Shuthelah», en español «Shutelá» reproduce mejor el nombre sin depender de la ortografía inglesa con h interna y terminación -lah.
  - severity: medium
    issue: «Elada» probablemente simplifica demasiado אֶלְעָדָה.
    rationale: La evidencia fuente y la auditoría inglesa apuntan a una forma con vocal media explícita («Eleadah»). En español, «Eleadá» preserva mejor la forma del nombre que «Elada», que puede borrar una sílaba relevante.
  revised_spanish_text: 'Los hijos de Efraín: Shutelá[a], y Bered, su hijo, y Tahat, su hijo, y Eleadá, su hijo, y Tahat, su hijo.'
  revised_footnotes:
  - marker: a
    text: En genealogías, la palabra hebrea traducida «hijo» puede señalar a un descendiente más remoto; aquí se conserva la forma literal «su hijo».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la estructura y la nota del borrador, pero se corrigen dos transliteraciones de nombres propios para ajustarlas mejor al hebreo fuente y a un español más natural: «Shutélah» → «Shutelá» y «Elada» → «Eleadá». No se requieren cambios en la sintaxis genealógica ni en «su hijo».'
