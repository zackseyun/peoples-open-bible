translation:
  language: es
  text: Antes de investigar[a], no censures[b]; examina primero, y después reprende.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de la segunda mitad es difícil. El testimonio griego dice: «Antes de oír, no respondas, y en medio de las palabras no interrumpas».'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo puede sugerir más literalmente «torcer» o «pervertir»; aquí se entiende como una advertencia contra el juicio adverso prematuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם / πρὶν ἢ
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes
  - Previo a
  lexicon: HALOT; Swete LXX
  rationale: Marca temporal simple y natural en español para introducir la prohibición anterior a la investigación o al oír. Conserva el orden lógico del proverbio.
- source_word: תַּחְקוֹר / ἀκοῦσαι
  english_pob_choice: you investigate
  chosen_spanish: investigar
  alternatives_spanish:
  - examinar
  - indagar
  lexicon: HALOT; LXX parallel
  rationale: El hebreo habla de 'investigar' o 'buscar con diligencia'; el griego paralelo dice 'antes de oír'. En español, 'investigar' mantiene la idea de conocer los hechos antes de responder y deja ver la cautela previa exigida por el texto.
- source_word: אַל תְּסַלֵּף / μὴ ἀποκρίνου
  english_pob_choice: do not find fault
  chosen_spanish: no hables contra él
  alternatives_spanish:
  - no encuentres दोष?
  - no perviertas
  - no lo juzgues mal
  lexicon: HALOT; Swete LXX
  rationale: El hebreo es difícil y puede sugerir torcer, pervertir o censurar prematuramente. El griego paralelo dice 'no respondas', por lo que en español se prioriza la advertencia contra contestar o censurar antes de tiempo. 'No hables contra él' conserva esa fuerza polémica sin fijar indebidamente una sola reconstrucción.
- source_word: בַּקֵּר
  english_pob_choice: examine
  chosen_spanish: examina
  alternatives_spanish:
  - investiga
  - inspecciona
  - averigua
  lexicon: HALOT
  rationale: '''Examina'' es idiomático, sobrio y coherente con la exhortación sapiencial a evaluar primero. Además, mantiene el paralelo con ''investigar'' sin sonar redundante en español.'
- source_word: לְפָנִים
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: HALOT
  rationale: Adverbio de prioridad temporal que en español se expresa naturalmente con 'primero'.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y más tarde
  lexicon: HALOT
  rationale: 'Preserva la secuencia del mandato: primero examinar, luego proceder a la corrección o respuesta.'
- source_word: תַּזִּיף / πιθανό sentido del paralelo griego
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - responde
  - interviene
  - corrige
  lexicon: HALOT; Swete LXX
  rationale: Aunque el griego sugiere 'no interrumpas / no respondas en medio de las palabras', el flujo del hebreo y la lectura de POB llevan a una acción verbal posterior de corrección. 'Reprende' retiene esa posibilidad admonitiva sin cerrar la tensión textual.
theological_decisions:
- issue: Tensión entre el hebreo difícil y el paralelo griego
  english_pob_reading: The Hebrew wording in the second half is difficult. The Greek witness reads, 'Before you hear, do not answer, and in the midst of words do not interject.'
  chosen_spanish_reading: Antes de investigar, no hables contra él; examina primero, y después reprende.
  alternative_spanish_readings:
  - Antes de oír, no respondas, y en medio de las palabras no interrumpas.
  - Antes de investigar, no respondas; examina primero, y después intervén.
  rationale: 'Se preserva la advertencia sapiencial central sin ocultar la dificultad textual. La frase principal sigue el sentido práctico del hebreo y del griego: evitar una respuesta prematura. Las alternativas se mantienen implícitas para reflejar que el segundo hemistiquio no es plenamente seguro en el hebreo transmitido.'
  doctrine_reference: Sabiduría práctica / prudencia en el juicio
- issue: Sentido de la reprensión posterior
  english_pob_reading: The translation gives its likely sense here as warning against premature adverse judgment.
  chosen_spanish_reading: '...y después reprende.'
  alternative_spanish_readings:
  - '...y después corrige.'
  - '...y después responde.'
  rationale: La forma escogida deja abierta la corrección posterior sin convertir el proverbio en mera prohibición de hablar. Así se conserva la estructura sapiencial de discernir antes de censurar.
  doctrine_reference: Ética sapiencial
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del expediente en estabilidad alta y sin cambios aplicados: no se detectan revisiones pendientes que exijan ajuste respecto del criterio POB ya aprobado.'
