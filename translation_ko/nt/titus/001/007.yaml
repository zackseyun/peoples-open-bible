id: TIT.1.7
reference: Titus 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δεῖ γὰρ τὸν ἐπίσκοπον ἀνέγκλητον εἶναι ὡς θεοῦ οἰκονόμον, μὴ αὐθάδη, μὴ ὀργίλον, μὴ πάροινον, μὴ πλήκτην, μὴ αἰσχροκερδῆ,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/007.yaml
  text: For an overseer must be above reproach as God's steward[a], not self-willed, not quick-tempered, not given to wine, not violent, not greedy for shameful gain[b],
  footnotes:
  - marker: a
    text: Or 'bishop.' The Greek term denotes one who oversees; 'overseer' avoids importing later church-office connotations that may attach to 'bishop.'
    reason: lexical_alternative
  - marker: b
    text: Or 'greedy for dishonest gain.' The Greek emphasizes profit sought in a morally disgraceful way.
    reason: lexical_alternative
translation:
  language: ko
  text: 감독[a]은 하나님의 청지기이므로 책망할 것이 없어야 합니다. 제 고집대로 하지 않고, 쉽게 분노하지 않으며, 술에 빠지지 않고, 폭력적이지 않으며, 부끄러운 이득을 탐하지 않고[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주교」. 헬라어 ἐπίσκοπος는 「감독하는 자」를 뜻하며, 후대의 교계 직제 의미를 피하기 위해 「감독」으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「부정직한 이득을 탐하지 않고」. 헬라어는 도덕적으로 수치스러운 방식으로 추구되는 이득을 강조한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίσκοπον
  english_pob_choice: overseer
  chosen_korean: 감독
  alternatives_korean:
  - 주교
  lexicon: BDAG
  rationale: 글로서리 기본값. 후대의 「주교」 함의를 피한다.
- source_word: ὡς θεοῦ οἰκονόμον
  english_pob_choice: as God's steward
  chosen_korean: 하나님의 청지기이므로
  alternatives_korean:
  - 하나님의 집사장으로서
  - 하나님의 살림 맡은 자로서
  lexicon: BDAG
  rationale: οἰκονόμος는 주인의 집안 살림을 위임받은 자. 「청지기」가 정립된 한국어 어휘. ὡς를 「~이므로」로 풀어 책망할 것이 없어야 하는 이유를 자연스럽게 연결한다.
- source_word: αὐθάδη
  english_pob_choice: self-willed
  chosen_korean: 제 고집대로 하지 않고
  alternatives_korean:
  - 자기 뜻대로 하지 않고
  - 독선적이지 않고
  lexicon: BDAG
  rationale: αὐθάδης는 「자기 마음대로 행하는·독단적인」 사람. 한국어 「제 고집대로」가 그 뉘앙스를 담는다.
- source_word: ὀργίλον
  english_pob_choice: quick-tempered
  chosen_korean: 쉽게 분노하지 않으며
  alternatives_korean:
  - 성마르지 않고
  - 노하기를 더디 하며
  lexicon: BDAG
  rationale: 분노에 쉽게 빠지는 기질. 「쉽게 분노하지 않다」가 자연스러운 합쇼체 표현.
- source_word: πάροινον
  english_pob_choice: given to wine
  chosen_korean: 술에 빠지지 않고
  alternatives_korean:
  - 술에 중독되지 않고
  - 술을 즐기지 않고
  lexicon: BDAG
  rationale: 술에 매여 사는 상태. 「술에 빠지다」가 한국어 관용 표현.
- source_word: πλήκτην
  english_pob_choice: violent
  chosen_korean: 폭력적이지 않으며
  alternatives_korean:
  - 구타하는 자가 되지 않으며
  - 손찌검하지 않으며
  lexicon: BDAG
  rationale: πλήκτης는 문자적으로 「때리는 자」. 현대적 어감으로 「폭력적」이 일반적 의미를 잘 담는다.
- source_word: αἰσχροκερδῆ
  english_pob_choice: greedy for shameful gain
  chosen_korean: 부끄러운 이득을 탐하지 않고
  alternatives_korean:
  - 부정한 이득을 탐하지 않고
  - 추한 이득을 탐하지 않고
  lexicon: BDAG
  rationale: αἰσχρός(수치스러운) + κέρδος(이득)의 합성어. 도덕적 수치를 동반한 이득 추구. 「부끄러운 이득」이 직역에 가깝고 자연스럽다.
