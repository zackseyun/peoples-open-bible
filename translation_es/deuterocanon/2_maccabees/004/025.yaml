translation:
  language: es
  text: Pero después de recibir las órdenes reales[a], llegó, sin traer nada digno del sumo sacerdocio[b], sino con los impulsos de un tirano cruel y la furia de una bestia bárbara[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «las órdenes del rey».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sin traer nada digno del sumo sacerdocio».'
    reason: lexical_alternative
  - marker: c
    text: 'El griego emplea dos términos cercanos para intensificar la violencia del personaje: «impulsos» y «furia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: after receiving
  chosen_spanish: después de recibir
  alternatives_spanish:
  - habiendo recibido
  - tras recibir
  lexicon: LSJ
  rationale: El aoristo participial indica una acción previa a la del verbo principal. «Después de recibir» expresa esa anterioridad de forma natural en español sin perder la relación narrativa.
- source_word: τὰς βασιλικὰς ἐντολάς
  english_pob_choice: the royal commands
  chosen_spanish: las órdenes reales
  alternatives_spanish:
  - las órdenes del rey
  - los mandatos reales
  lexicon: LSJ
  rationale: βασιλικάς califica ἐντολάς como mandatos de autoridad real. «Órdenes reales» mantiene el registro formal y el sentido de autoridad sin sobreespecificar el sujeto.
- source_word: παρεγίνετο
  english_pob_choice: he arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - se presentó
  lexicon: LSJ
  rationale: El verbo señala venir o presentarse en escena. «Llegó» es una solución sobria y natural en español narrativo.
- source_word: τῆς μὲν ἀρχιερωσύνης οὐδὲν ἄξιον φέρων
  english_pob_choice: bringing nothing worthy of the high priesthood
  chosen_spanish: no llevando nada digno del sumo sacerdocio
  alternatives_spanish:
  - no trayendo nada digno del sumo sacerdocio
  - sin llevar nada digno del sumo sacerdocio
  - no llevando nada que fuera digno del sumo sacerdocio
  lexicon: LSJ
  rationale: Se conserva la estructura participial con φέρων y el contraste de valor con ἄξιον. «Sumo sacerdocio» es una equivalencia natural y precisa para ἀρχιερωσύνης.
- source_word: ἀρχιερωσύνης
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - el sumo pontificado
  lexicon: LSJ
  rationale: En español bíblico, «sumo sacerdocio» comunica con claridad el cargo/estatus sin introducir una formulación eclesiástica ajena al contexto judío.
- source_word: θυμοὺς
  english_pob_choice: the passions
  chosen_spanish: los impulsos
  alternatives_spanish:
  - las pasiones
  - los arrebatos
  - los ímpetus
  lexicon: LSJ
  rationale: El plural θυμοί aquí expresa movimientos vehementes del ánimo, no solo «ira» en sentido único. «Impulsos» mantiene el plural y evita confundirlo con ὀργάς, que se traduce aparte.
- source_word: ὠμοῦ τυράννου
  english_pob_choice: of a cruel tyrant
  chosen_spanish: de un tirano cruel
  alternatives_spanish:
  - de un tirano despiadado
  - de un tirano brutal
  lexicon: LSJ
  rationale: ὠμός puede ser «cruel», «áspero» o «despiadado». Dado el ajuste revisado del POB inglés, «tirano cruel» reproduce con precisión y sin exceso la carga moral del adjetivo.
- source_word: θηρὸς βαρβάρου
  english_pob_choice: of a barbarous beast
  chosen_spanish: de una bestia bárbara
  alternatives_spanish:
  - de una bestia salvaje
  - de una bestia bárbara e incivil
  lexicon: LSJ
  rationale: Se conserva el paralelismo retórico con «tirano cruel». «Bestia bárbara» mantiene βάρβαρος como brutal/incivilizado, sin forzar una referencia étnica que el contexto no exige.
- source_word: ὀργὰς ἔχων
  english_pob_choice: having the rage
  chosen_spanish: las iras
  alternatives_spanish:
  - la ira
  - los ardores de ira
  - los accesos de ira
  lexicon: LSJ
  rationale: ἔχων rige dos acusativos coordinados; el español requiere una formulación más fluida. «Las iras» conserva el plural y el valor intensificado de ὀργάς, diferenciándolo de θυμοί.
theological_decisions:
- issue: Caracterización moral frente a simple crítica política
  english_pob_reading: 'The verse is rendered as a sharp ethical contrast: he possessed nothing fitting for the high priesthood, only tyrannical and beastlike violent dispositions.'
  chosen_spanish_reading: 'El versículo presenta un contraste moral fuerte: no llevaba nada digno del sumo sacerdocio, sino solo impulsos tiránicos y bestiales.'
  alternative_spanish_readings:
  - Una lectura más neutral que lo tome solo como crítica política
  - Una lectura atenuada que hable únicamente de conducta inadecuada
  rationale: El griego contrapone explícitamente la falta de lo «digno del sumo sacerdocio» con rasgos violentos e inhumanos. La redacción española conserva esa condena sin amplificarla más allá del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que sustituyó «savage tyrant» por «cruel tyrant» para reflejar con más precisión ὠμοῦ, manteniendo intacto el resto del encuadre retórico. También preserva la observación auditada sobre la duplicación enfática de θυμοί y ὀργάς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa pertinente.
  - Se usa «sumo sacerdocio» para ἀρχιερωσύνης en armonía con el registro bíblico-cultual del pasaje.
  - Se conserva el tono condenatorio del original sin introducir vocabulario devocional o eclesiástico ajeno al contexto judío helenístico.
