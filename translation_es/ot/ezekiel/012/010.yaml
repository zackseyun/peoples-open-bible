review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea general: imperativo introductorio, fórmula profética, título «el príncipe», «casa de Israel» y la referencia locativa a Jerusalén. También recoge adecuadamente la revisión inglesa que entiende הַמַּשָּׂא como «oráculo» y el referente singular de «en medio de ella». Sin embargo, la frase central queda incompleta en español: «Este oráculo sobre...» omite el valor relacional exigido por la cláusula nominal y no expresa bien el sentido de «concerns/is about».'
  spanish_quality_summary: El texto es legible, pero «Di a ellos» suena menos natural que «Diles» en español bíblico fluido, y «Este oráculo sobre el príncipe...» resulta gramaticalmente truncado. «El Señor Yahvé» es comprensible, pero para este proyecto conviene reflejar directamente אֲדֹנָי יְהוִה como «el Señor Dios, Yahvé» o equivalente que preserve tanto el título como el nombre divino sin sonar forzado. La puntuación y registro general son adecuados.
  glossary_alignment: 'Hay buena alineación con «Yahvé», «oráculo», «príncipe» y «casa de Israel». La principal corrección terminológica es la representación de אֲדֹנָי יְהוִה: el borrador conserva Yahvé, pero «el Señor Yahvé» no transmite con suficiente claridad el compuesto título+nombre. Además, la solución española debe expresar el vínculo semántico de הַמַּשָּׂא הַזֶּה con «trata de / es acerca de».'
  issues:
  - severity: high
    issue: La frase «Este oráculo sobre el príncipe...» es sintácticamente incompleta.
    rationale: El hebreo usa una cláusula nominal compacta que en traducción requiere un verbo o giro relacional; el inglés auditado añadió «concerns». En español, «este oráculo sobre» deja una construcción colgante y no comunica plenamente el sentido.
  - severity: medium
    issue: «Di a ellos» es menos natural que «Diles».
    rationale: Aunque es formalmente posible, en español corriente y bíblico fluido el imperativo con enclítico suena más natural sin perder fidelidad.
  - severity: medium
    issue: «el Señor Yahvé» no es la mejor solución para אֲדֹנָי יְהוִה en español del proyecto.
    rationale: Debe conservarse Yahvé, pero también el título אֲדֹנָי. «El Señor Dios, Yahvé» refleja mejor el compuesto y evita una yuxtaposición algo áspera.
  revised_spanish_text: 'Diles[a]: «Así dice el Señor Dios, Yahvé: Este oráculo[b] trata del príncipe en Jerusalén y de toda la casa de Israel que están en medio de ella».

