id: NUM.4.27
reference: Numbers 4:27
source:
  edition: WLC
  text: עַל פִּי֩ אַהֲרֹ֨ן וּ/בָנָ֜י/ו תִּהְיֶ֗ה כָּל עֲבֹדַת֙ בְּנֵ֣י הַ/גֵּרְשֻׁנִּ֔י לְ/כָל מַשָּׂאָ֔/ם וּ/לְ/כֹ֖ל עֲבֹדָתָ֑/ם וּ/פְקַדְתֶּ֤ם עֲלֵ/הֶם֙ בְּ/מִשְׁמֶ֔רֶת אֵ֖ת כָּל מַשָּׂאָֽ/ם־־־־׃
translation:
  text: All the service of the sons of the Gershonites shall be at the command of Aaron and his sons[a], for all their loads and for all their service; and you shall assign to them, as a duty[b], all their loads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the word of Aaron and his sons.' The Hebrew idiom is literally 'upon the mouth of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as a charge.' The Hebrew term can denote an assigned responsibility or obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  chosen: at the command of
  alternatives:
  - according to the mouth of
  - by the authority of
  - according to the word of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the mouth of' and commonly denotes action according to someone's command or direction. 'At the command of' is idiomatic modern English and preserves the authority sense.
- source_word: תִּהְיֶה
  chosen: shall be
  alternatives:
  - is to be
  - will be
  lexicon: HALOT
  rationale: Simple future/copular sense fits the administrative instruction. 'Shall be' preserves the directive tone without over-paraphrase.
- source_word: עֲבֹדַת
  chosen: service
  alternatives:
  - work
  - duty
  - ministry
  lexicon: HALOT
  rationale: In tabernacle/Levitical contexts עֲבֹדָה often denotes assigned service or labor. 'Service' best captures both labor and cultic duty in readable English.
- source_word: בְּנֵי הַגֵּרְשֻׁנִּי
  chosen: the sons of the Gershonites
  alternatives:
  - the sons of Gershon
  - the Gershonites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of the Gershonite.' In context it refers to the clan descended from Gershon. 'The sons of the Gershonites' preserves the filial/clan language while sounding natural in English.
- source_word: לְכָל מַשָּׂאָם
  chosen: for all their loads
  alternatives:
  - for all their carrying
  - for all their burdens
  lexicon: HALOT
  rationale: מַשָּׂא here refers concretely to what they carry in transport of tabernacle items. 'Loads' is concrete and natural; 'burdens' could sound metaphorical.
- source_word: וּלְכֹל עֲבֹדָתָם
  chosen: for all their service
  alternatives:
  - and for all their work
  - and for all their duty
  lexicon: HALOT
  rationale: Keeps the same rendering for עֲבֹדָה as earlier in the verse for consistency, while the prepositional phrase indicates the scope of Aaronic oversight.
- source_word: וּפְקַדְתֶּם עֲלֵיהֶם
  chosen: you shall assign to them
  alternatives:
  - you shall appoint over them
  - you shall charge them with
  - you shall muster over them
  lexicon: HALOT
  rationale: פקד in this construction can mean appoint, assign, or place in charge. Here the following object 'all their loads' suggests assigning responsibility rather than merely numbering or visiting.
- source_word: בְּמִשְׁמֶרֶת
  chosen: as a duty
  alternatives:
  - as a charge
  - for keeping
  - under guard
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes an assigned obligation, charge, or responsibility. 'As a duty' is clear modern English; 'as a charge' is possible but less immediately transparent.
- source_word: אֵת כָּל מַשָּׂאָם
  chosen: all their loads
  alternatives:
  - all their burden
  - everything they must carry
  lexicon: HALOT
  rationale: The direct object of the assignment is the totality of what they are to carry. Repeating 'all their loads' reflects the Hebrew repetition and keeps the transport sense concrete.
