translation:
  language: es
  text: y la tierra quede sometida delante de Yahvé[a], entonces después volverán y quedarán libres de obligación[b] para con Yahvé y para con Israel; y esta tierra será para ustedes como posesión delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» representa el nombre divino יְהוָה.
    reason: alternative_reading
  - marker: b
    text: O «sin culpa» o «inocentes» para con Yahvé y para con Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִכְבְּשָׁה
  english_pob_choice: is subdued
  chosen_spanish: será sometida
  alternatives_spanish:
  - será conquistada
  - será traída a sujeción
  lexicon: HALOT
  rationale: El nifal de כבש expresa que la tierra queda puesta bajo control o sujeción. «Será sometida» conserva el sentido pasivo/resultativo sin añadir más violencia que la que exige el hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática indica posición forense y relacional «delante de». Se mantiene «Yahvé» según la norma del proyecto para el nombre divino.
- source_word: וְאַחַר תָּשֻׁבוּ
  english_pob_choice: then afterward you may return
  chosen_spanish: y después volverán
  alternatives_spanish:
  - y luego podrán volver
  - y después regresarán
  lexicon: HALOT
  rationale: El marcador temporal pide una secuencia posterior. En español, «volverán» expresa bien el retorno autorizado; el matiz de permiso queda implícito por la condición previa en el contexto.
- source_word: וִהְיִיתֶם נְקִיִּים
  english_pob_choice: and be free of obligation
  chosen_spanish: y estarán libres de obligación
  alternatives_spanish:
  - y serán inocentes
  - y quedarán libres de culpa
  lexicon: HALOT
  rationale: נָקִי puede significar limpio, inocente o libre de responsabilidad. En este contexto de cumplimiento de un compromiso, «libres de obligación» comunica mejor la idea de quedar exentos de responsabilidad.
- source_word: מֵיְהוָה וּמִיִּשְׂרָאֵל
  english_pob_choice: to Yahweh and to Israel
  chosen_spanish: para con Yahvé y para con Israel
  alternatives_spanish:
  - delante de Yahvé y delante de Israel
  - respecto de Yahvé y de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo usa מן, con נָקִי el sentido es quedar sin carga o responsabilidad frente a alguien. «Para con» reproduce en español esa relación de obligación/responsabilidad de manera natural.
- source_word: וְהָיְתָה הָאָרֶץ הַזֹּאת לָכֶם
  english_pob_choice: and this land shall be yours
  chosen_spanish: y esta tierra será para ustedes
  alternatives_spanish:
  - y esta tierra será de ustedes
  - y esta tierra les pertenecerá
  lexicon: HALOT
  rationale: La predicación expresa posesión futura. «Será para ustedes» es natural y suficientemente cercano al hebreo sin sobreespecificar la clase jurídica de la posesión.
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como propiedad
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión o tenencia territorial con matiz de herencia. «Como posesión» es fiel y legible; «heredad» sería más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto de transliterar el Nombre divino como «Yahvé» en español, preservando el nombre personal del pacto en lugar de una sustitución titular.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La política del proyecto pide transliterar el Tetragrámaton como «Yahvé». Esto conserva la referencia al Nombre revelado y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of נְקִיִּים in covenant context
  english_pob_reading: free of obligation
  chosen_spanish_reading: libres de obligación
  alternative_spanish_readings:
  - sin culpa
  - inocentes
  rationale: Aquí el punto no es una declaración moral abstracta, sino quedar exentos de la responsabilidad adquirida por el compromiso. «Libres de obligación» comunica ese valor jurídico-relacional.
  doctrine_reference: Numbers 32:22 audit trail; HALOT on נָקִי
translation_notes:
  revision_awareness: El borrador sigue la última revisión auditada del inglés, que prefirió «free of obligation» sobre «clear of obligation» para expresar con más naturalidad la relación de responsabilidad. En español se refleja ese mismo ajuste con «libres de obligación» y con la preposición «para con» para mantener el matiz relacional del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto principal conforme a la terminología del proyecto.
  - «Delante de» reproduce לִפְנֵי en un registro bíblico natural, sin sustituirlo por fórmulas eclesiásticas más interpretativas.
  - «Tierra» se conserva para הָאָרֶץ, coherente con el contexto territorial del pasaje.
  - «Posesión» se usa de manera consistente para אֲחֻזָּה, sin ampliar a «heredad» fuera de necesidad contextual.
