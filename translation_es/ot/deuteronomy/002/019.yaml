base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/019.yaml
  text: When you come opposite the sons of Ammon[a], do not harass them or provoke them, for I will not give you any of the land of the sons of Ammon as a possession[c][b], because I have given it as a possession to the sons of Lot.
  footnotes:
  - marker: a
    text: Or 'the Ammonites' throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not attack them' for 'do not harass them.' The Hebrew may broadly forbid hostile action, not only formal siege.
    reason: lexical_alternative
  - marker: c
    text: Or 'as an inheritance' for 'as a possession.'
    reason: lexical_alternative
