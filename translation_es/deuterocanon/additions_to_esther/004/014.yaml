    rationale: No es incorrecto, pero no hace falta para marcar el vocativo. 'Yahvé' por sí solo mantiene dignidad y mejor legibilidad eclesial amplia.
  revised_spanish_text: Porque tú eres admirable[a], Yahvé, y tu rostro está lleno de gracia.
