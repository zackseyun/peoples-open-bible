  language: en
  yaml_path: translation/ot/jeremiah/009/014.yaml
  text: 'Therefore thus says Yahweh of Armies[a], the God of Israel: Behold, I am feeding this people wormwood[b], and I will make them drink poisoned water.'
  footnotes:
