id: 2CH.23.13
reference: 2 Chronicles 23:13
source:
  edition: WLC
  text: וַ/תֵּ֡רֶא וְ/הִנֵּ֣ה הַ/מֶּלֶךְ֩ עוֹמֵ֨ד עַֽל עַמּוּד֜/וֹ בַּ/מָּב֗וֹא וְ/הַ/שָּׂרִ֣ים וְ/הַ/חֲצֹצְרוֹת֮ עַל הַ/מֶּלֶךְ֒ וְ/כָל עַ֨ם הָ/אָ֜רֶץ שָׂמֵ֗חַ וְ/תוֹקֵ֨עַ֙ בַּ/חֲצֹ֣צְר֔וֹת וְ/הַ/מְשֽׁוֹרֲרִים֙ בִּ/כְלֵ֣י הַ/שִּׁ֔יר וּ/מוֹדִיעִ֖ים לְ/הַלֵּ֑ל וַ/תִּקְרַ֤ע עֲתַלְיָ֨הוּ֙ אֶת בְּגָדֶ֔י/הָ וַ/תֹּ֖אמֶר קֶ֥שֶׁר קָֽשֶׁר־־־־׃ס
translation:
  text: And she looked[a], and behold, the king was standing by his pillar at the entrance, and the officials and the trumpets were beside the king; and all the people of the land were rejoicing and blowing trumpets, and the singers with the instruments of song were leading the praise. Then Athaliah tore her clothes and said[b], “Conspiracy! Conspiracy!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the officials and the trumpets beside the king.'' Some translations render ''trumpeters'' for ''trumpets,'' taking the instruments metonymically for those playing them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were directing the praise' for 'were leading the praise.' The Hebrew expression is somewhat idiomatic in this musical setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: And she looked
  alternatives:
  - And she saw
  lexicon: HALOT
  rationale: The verb ראה commonly means 'see,' but in narrative sequence 'looked' works naturally in English before the deictic הִנֵּה and preserves the suddenness of perception.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retained as 'behold' to preserve the vivid, attention-directing force of the Hebrew narrative marker rather than flattening it away.
- source_word: הַמֶּלֶךְ עוֹמֵד
  chosen: the king was standing
  alternatives:
  - the king stood
  lexicon: HALOT
  rationale: The participle עוֹמֵד conveys a durative scene-setting sense; 'was standing' reflects the ongoing posture better than a simple preterite.
- source_word: עַל עַמּוּדוֹ
  chosen: by his pillar
  alternatives:
  - on his pillar
  - at his pillar
  lexicon: HALOT
  rationale: Although עַל often means 'on,' in this ceremonial setting the sense is locative association with the royal standing place/pillar. 'By his pillar' is idiomatic and fits the known coronation context.
- source_word: בַּמָּבוֹא
  chosen: at the entrance
  alternatives:
  - in the entrance
  - at the entryway
  lexicon: HALOT
  rationale: מָבוֹא denotes an entrance/entry place. 'At the entrance' is natural English and preserves the spatial reference.
- source_word: וְהַשָּׂרִים וְהַחֲצֹצְרוֹת עַל הַמֶּלֶךְ
  chosen: with the officials and the trumpets beside the king
  alternatives:
  - and the officials and the trumpeters by the king
  - and the captains and the trumpets by the king
  lexicon: HALOT
  rationale: The Hebrew text reads 'the officials and the trumpets,' not 'trumpeters.' This likely uses 'trumpets' metonymically for the ceremonial musicians or their presence. The translation keeps the MT wording as much as possible while making the relation clear with 'beside the king.' 'Officials' is preferred over 'captains' because שָׂרִים is broader than military commanders alone.
- source_word: וְכָל עַם הָאָרֶץ
  chosen: and all the people of the land
  alternatives:
  - and all the people of the הארץ
  - and all the populace of the land
  lexicon: HALOT
  rationale: A standard rendering of the phrase in Chronicles; it refers to the populace of the kingdom/land, not merely a local crowd.
- source_word: שָׂמֵחַ
  chosen: were rejoicing
  alternatives:
  - were glad
  - were celebrating
  lexicon: HALOT
  rationale: The adjective functions predicatively in context. 'Were rejoicing' captures active public celebration better than the stative 'were glad.'
- source_word: וְתוֹקֵעַ בַּחֲצֹצְרוֹת
  chosen: and blowing trumpets
  alternatives:
  - and sounding the trumpets
  lexicon: HALOT
  rationale: תקע with חצוצרות is the standard idiom for blowing/sounding trumpets. 'Blowing trumpets' is direct and natural.
- source_word: וְהַמְשׁוֹרֲרִים
  chosen: and the singers
  alternatives:
  - and the musicians
  lexicon: HALOT
  rationale: From שׁיר, this specifically denotes singers rather than musicians in general.
- source_word: בִּכְלֵי הַשִּׁיר
  chosen: with the instruments of song
  alternatives:
  - with musical instruments
  - with instruments for music
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construction and avoids over-paraphrase, while still being understandable.
- source_word: וּמוֹדִיעִים לְהַלֵּל
  chosen: were leading the praise
  alternatives:
  - were making known how to praise
  - were directing the praise
  - were giving the signal for praise
  lexicon: HALOT
  rationale: The Hiphil of ידע here likely means causing/directing/announcing in relation to praise. 'Leading the praise' best captures the functional sense in a musical-liturgical setting without wooden obscurity.
- source_word: וַתִּקְרַע ... אֶת בְּגָדֶיהָ
  chosen: Then Athaliah tore her clothes
  alternatives:
  - ripped her garments
  lexicon: HALOT
  rationale: The idiom of tearing garments signifies grief, outrage, or alarm. 'Tore her clothes' is clear modern English while preserving the action.
- source_word: קֶשֶׁר קָשֶׁר
  chosen: Conspiracy! Conspiracy!
  alternatives:
  - Treason! Treason!
  - Plot! Plot!
  lexicon: HALOT
  rationale: קֶשֶׁר denotes conspiracy/plot. 'Conspiracy' is the most direct lexical equivalent. 'Treason' is interpretive and more politically specific than the Hebrew requires.
