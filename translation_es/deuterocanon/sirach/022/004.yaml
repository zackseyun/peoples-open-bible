translation:
  language: es
  text: La hija prudente[a] obtendrá un marido, pero la que avergüenza es una aflicción para el que la engendró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: “heredará un marido”; se ha vertido “obtendrá un marido” para reflejar el sentido idiomático en contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - muchacha
  - doncella
  lexicon: LSJ
  rationale: Término familiar directo; en español 'hija' conserva con claridad la relación parental sin añadir matices no presentes en el griego.
- source_word: φρονίμη
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabia
  - sensata
  lexicon: LSJ
  rationale: '''Prudente'' comunica la sabiduría práctica y el buen juicio en un marco doméstico y social, con tono natural en español bíblico actual.'
- source_word: κληρονομήσει
  english_pob_choice: will obtain
  chosen_spanish: obtendrá
  alternatives_spanish:
  - heredará
  - poseerá
  - conseguirá
  lexicon: LSJ
  rationale: El griego dice literalmente 'heredará', pero con ἄνδρα como objeto la frase es idiomática. 'Obtendrá' preserva el resultado de adquirir marido sin forzar un castellano literal extraño.
- source_word: ἄνδρα
  english_pob_choice: a husband
  chosen_spanish: un marido
  alternatives_spanish:
  - un hombre
  - un esposo
  lexicon: LSJ
  rationale: En este contexto matrimonial, ἀνήρ se refiere al marido. 'Marido' es claro y natural en español; 'esposo' también sería posible, pero 'marido' mantiene mejor el valor relacional del pasaje.
- source_word: καταισχύνουσα
  english_pob_choice: one who brings shame
  chosen_spanish: la que avergüenza
  alternatives_spanish:
  - la que deshonra
  - la que causa vergüenza
  lexicon: LSJ
  rationale: 'El participio es activo: ella causa vergüenza. ''La que avergüenza'' conserva esa fuerza verbal mejor que una simple etiqueta adjetival.'
- source_word: εἰς λύπην
  english_pob_choice: is a grief to
  chosen_spanish: es una aflicción para
  alternatives_spanish:
  - es un dolor para
  - causa tristeza a
  lexicon: LSJ
  rationale: La expresión indica el resultado de producir dolor o tristeza. 'Aflicción para' suena idiomático en español y mantiene la relación de afectación.
- source_word: γεννήσαντος
  english_pob_choice: the one who fathered her
  chosen_spanish: el que la engendró
  alternatives_spanish:
  - su padre
  - el que la procreó
  lexicon: LSJ
  rationale: El participio masculino singular se conserva como referencia masculina y begetting-language explícita. 'El que la engendró' es fiel y natural en español, manteniendo el contraste del texto.
theological_decisions:
- issue: Referencia parental masculina en γεννήσαντος
  english_pob_reading: the one who fathered her
  chosen_spanish_reading: el que la engendró
  alternative_spanish_readings:
  - su padre
  - el padre que la engendró
  rationale: Se preserva la referencia masculina explícita del participio, sin neutralizarla. Esto sigue la línea de precisión de género del proyecto y evita suavizar la forma del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete 1909 y el audit trail inglés. No hubo revisiones aplicadas en el registro previo; la versión española conserva la tensión léxica de κληρονομήσει con una solución idiomática y mantiene la referencia masculina explícita de γεννήσαντος.
  spanish_consistency_notes:
  - Se usa 'hija' y 'marido' en un registro bíblico claro y contemporáneo.
  - Se mantiene una estructura paralela con contraste moral explícito, acorde al griego.
  - No se sustituyó el nombre divino ni términos cristológicos, pues el versículo no los contiene.
