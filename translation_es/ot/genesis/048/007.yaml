translation:
  language: es
  text: En cuanto a mí[a], cuando vine de Paddán, Raquel murió para mi pesar[b] en la tierra de Canaán, en el camino, cuando aún faltaba cierto trecho[c] para llegar a Efrata; y la enterré allí, en el camino a Efrata (es decir, Belén).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene simplemente ‘Paddán’; algunas versiones amplían a ‘Paddán-aram’ por armonización con otros pasajes, pero aquí se conserva la forma breve del texto.
    reason: lexical_alternative
  - marker: b
    text: O ‘Raquel murió sobre mí’, un modismo hebreo que puede enfatizar ya sea que murió cerca de Jacob o el peso personal que su muerte tuvo para él.
    reason: lexical_alternative
  - marker: c
    text: La expresión ‘cierto trecho’ traduce un modismo hebreo para un tramo de tierra que aún faltaba; la distancia exacta es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo
  - Ahora bien, yo
  lexicon: HALOT
  rationale: La forma hebrea introduce un cambio enfático y personal en el discurso de Jacob. ‘En cuanto a mí’ reproduce mejor ese giro tópico que un simple ‘y yo’.
- source_word: בְּבֹאִי
  english_pob_choice: when I came
  chosen_spanish: cuando vine
  alternatives_spanish:
  - al venir yo
  - cuando llegué
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa relación temporal; en español, ‘cuando vine’ es natural y mantiene el sentido temporal del hebreo.
- source_word: מִפַּדָּן
  english_pob_choice: from Paddan
  chosen_spanish: de Paddán
  alternatives_spanish:
  - de Paddán-aram
  lexicon: HALOT
  rationale: El texto hebreo dice solo ‘Paddán’, sin ampliar a ‘Paddán-aram’. La forma breve se conserva para no armonizar con otros pasajes.
- source_word: מֵתָה עָלַי
  english_pob_choice: died to my sorrow
  chosen_spanish: murió para mi dolor
  alternatives_spanish:
  - murió sobre mí
  - murió con gran pesar para mí
  - murió cerca de mí
  lexicon: HALOT
  rationale: La revisión inglesa prefirió ‘to my sorrow’ para captar el valor idiomático de עָלַי. En español, ‘para mi dolor’ conserva el impacto personal sin forzar una imagen espacial que aquí quedaría ambigua.
- source_word: בְּאֶרֶץ כְּנַעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Se mantiene la frase completa para reflejar fielmente la geografía narrativa del hebreo.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - de camino
  lexicon: HALOT
  rationale: ‘En el camino’ es la equivalencia natural en español para el contexto de viaje y conserva el valor locativo del hebreo.
- source_word: בְּעוֹד כִּבְרַת אֶרֶץ לָבֹא אֶפְרָתָה
  english_pob_choice: while there was still some distance to go to Ephrath
  chosen_spanish: cuando aún había una distancia de tierra por recorrer hasta Efrata
  alternatives_spanish:
  - cuando todavía faltaba un trecho para llegar a Efrata
  - mientras aún quedaba un tramo de tierra hasta llegar a Efrata
  lexicon: HALOT
  rationale: כִּבְרַת אֶרֶץ es un modismo que indica una distancia restante imprecisa. ‘Una distancia de tierra por recorrer’ conserva el componente de extensión/trecho sin inventar una medida exacta.
- source_word: וָאֶקְבְּרֶהָ
  english_pob_choice: and I buried her
  chosen_spanish: y la enterré
  alternatives_spanish:
  - y la sepulté
  lexicon: HALOT
  rationale: El verbo hebreo indica el acto de enterrar; ‘la enterré’ es claro y fiel en español contemporáneo.
- source_word: שָּׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Se conserva la referencia locativa inmediata con una forma natural en español.
- source_word: בְּדֶרֶךְ אֶפְרָת
  english_pob_choice: on the way to Ephrath
  chosen_spanish: en el camino de Efrata
  alternatives_spanish:
  - en el camino hacia Efrata
  - por el camino de Efrata
  lexicon: HALOT
  rationale: La construcción preposicional indica ubicación respecto de la ruta. ‘En el camino de Efrata’ mantiene la relación espacial sin sobreinterpretarla.
- source_word: הִוא בֵּית לָחֶם
  english_pob_choice: that is, Bethlehem
  chosen_spanish: es decir, Belén
  alternatives_spanish:
  - o sea, Belén
  - que es Belén
  lexicon: HALOT
  rationale: La cláusula apposicional identifica Efrata con Belén. ‘Es decir’ reproduce bien la función explicativa del hebreo.
theological_decisions:
- issue: Expresión idiomática מֵתָה עָלַי y su carga personal
  english_pob_reading: died to my sorrow
  chosen_spanish_reading: murió para mi dolor
  alternative_spanish_readings:
  - murió sobre mí
  - murió con gran pesar para mí
  rationale: La frase hebrea no debe reducirse a una mera nota espacial ni a una paráfrasis emocional libre. La opción elegida mantiene la dimensión de sufrimiento personal que la revisión inglesa destacó, sin borrar la tensión idiomática del original.
  doctrine_reference: Principios de fidelidad semántica y de claridad idiomática; no se formula una doctrina específica.
- issue: Identificación de Efrata con Belén
  english_pob_reading: that is, Bethlehem
  chosen_spanish_reading: es decir, Belén
  alternative_spanish_readings:
  - o sea, Belén
  - que es Belén
  rationale: La equivalencia geográfica funciona como glosa aclaratoria, no como afirmación doctrinal. Conviene conservarla como explicación para el lector sin desdibujar el topónimo hebreo.
  doctrine_reference: Uso narrativo de glosas explicativas en el texto bíblico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió la frase de מֵתָה עָלַי de una lectura más espacial (‘beside me’) a una idiomática de efecto personal (‘to my sorrow’). La versión española sigue esa adjudicación, evitando una traducción demasiado literal que ocultaría el sentido contextual. También se preservó el dato textual de ‘Paddán’ sin expandirlo a ‘Paddán-aram’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como nombre divino en otros contextos, pero este versículo no lo contiene.
  - Se mantiene ‘Efrata’ para el topónimo hebreo y ‘Belén’ como glosa explicativa final.
  - Se emplea ‘tierra de Canaán’ por coherencia con el registro bíblico del POB en español.
  - La puntuación reproduce una pausa narrativa larga para reflejar la estructura del hebreo y la glosa final explicativa.
