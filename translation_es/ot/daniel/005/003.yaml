review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y el contenido del arameo: traen los vasos de oro sacados del templo/casa de Dios en Jerusalén, y beben de ellos el rey, sus nobles, sus mujeres reales y sus concubinas. Sin embargo, la nota [a] repite la lectura principal en vez de ofrecer la alternativa documentada en la auditoría inglesa, que contrasta una formulación más activa con una más pasiva/enfocada en los vasos.'
  spanish_quality_summary: El español es claro, natural y digno. La puntuación con punto y coma es aceptable, aunque una coma también serviría. 'Sus esposas' y 'sus concubinas' es legible y apropiado en registro bíblico moderno. La principal reparación necesaria está en la fidelidad de la nota [a].
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. 'Dios', 'templo', 'nobles', 'concubinas' y la sintaxis general son adecuadas. 'Esposas' para שֵׁגְלָתֵהּ está bien sostenido por la nota alternativa a 'reinas'.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica de la auditoría inglesa.
    rationale: El texto principal dice 'que habían sacado', pero la nota también dice 'que habían sacado del templo', sin ofrecer la verdadera alternativa ('que habían sido sacados del templo' o equivalente pasivo). Así se pierde la justificación documentada sobre el foco en los vasos.
  revised_spanish_text: Entonces trajeron los vasos de oro que habían sacado del templo[a], la casa de Dios, que estaba en Jerusalén; y el rey y sus nobles[b], sus esposas y sus concubinas, bebieron de ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «que habían sido sacados del templo». El verbo arameo puede expresarse de manera más activa, pero la redacción alternativa en voz pasiva mantiene el foco en los vasos.'
    reason: lexical_alternative
  - marker: b
    text: «Sus esposas» traduce un término arameo que puede referirse a consortes reales; algunas traducciones ponen «sus reinas».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural en español. Se corrige la nota [a] para que refleje de verdad la alternativa documentada por la POB inglesa: una formulación pasiva que mantiene el foco en los vasos, frente a la redacción principal más activa.'
