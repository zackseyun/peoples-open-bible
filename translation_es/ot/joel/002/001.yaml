  text: תִּקְע֨וּ שׁוֹפָ֜ר בְּ/צִיּ֗וֹן וְ/הָרִ֨יעוּ֙ בְּ/הַ֣ר קָדְשִׁ֔/י יִרְגְּז֕וּ כֹּ֖ל יֹשְׁבֵ֣י הָ/אָ֑רֶץ כִּֽי בָ֥א יוֹם יְהוָ֖ה כִּ֥י קָרֽוֹב־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joel/002/001.yaml
  text: Blow a horn in Zion[a], and sound an alarm on my holy mountain; let all the inhabitants of the land tremble, for the day of Yahweh is coming—indeed, it is near.
  footnotes:
  - marker: a
    text: Or 'all the inhabitants of the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth' depending on context.
    reason: alternative_reading
