translation:
  language: es
  text: David los abatió desde el crepúsculo[a] hasta la tarde del día siguiente, y no escapó ni un solo hombre de entre ellos, excepto cuatrocientos jóvenes que montaron en los camellos y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Crepúsculo» conserva la ambigüedad del hebreo נֶשֶׁף, que puede referirse al comienzo del día o al de la noche; por eso el texto principal no fija «alba» ni «anochecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los derrotó
  alternatives_spanish:
  - los golpeó
  - los hirió
  - los derribó
  lexicon: HALOT
  rationale: En este contexto militar, נכה expresa una acción violenta de derrota. «Derrotó» comunica el resultado bélico con naturalidad en español y mantiene la fuerza del verbo sin caer en un arcaísmo como «hirió» o «golpeó».
- source_word: מֵהַנֶּשֶׁף
  english_pob_choice: from the twilight
  chosen_spanish: desde el crepúsculo
  alternatives_spanish:
  - desde el alba
  - desde el anochecer
  lexicon: HALOT
  rationale: נשף puede referirse al crepúsculo en cualquiera de sus extremos, y el contexto no obliga a fijar «alba» o «anochecer». «Crepúsculo» conserva esa ambigüedad lexical en un español claro.
- source_word: וְעַד הָעֶרֶב לְמָחֳרָתָם
  english_pob_choice: until the evening of the next day
  chosen_spanish: hasta la tarde del día siguiente
  alternatives_spanish:
  - hasta la tarde del siguiente día
  - hasta el anochecer del día siguiente
  lexicon: HALOT
  rationale: La expresión indica una duración que alcanza la tarde del día siguiente. «Tarde del día siguiente» transmite el valor temporal de manera idiomática en español y evita una construcción pesada.
- source_word: נִמְלַט מֵהֶם אִישׁ
  english_pob_choice: not a man of them escaped
  chosen_spanish: no escapó de ellos ni un hombre
  alternatives_spanish:
  - no escapó de ellos un solo hombre
  - no se salvó de ellos ningún hombre
  lexicon: HALOT
  rationale: El hebreo usa singular distributivo («un hombre»). La formulación elegida conserva esa fuerza totalizante y evita neutralizar el matiz con una pluralidad más libre.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - solamente
  lexicon: HALOT
  rationale: El modismo introduce la excepción al enunciado total. «Excepto» es la equivalencia moderna más clara y directa en español.
- source_word: אַרְבַּע מֵאוֹת אִישׁ נַעַר
  english_pob_choice: four hundred young men
  chosen_spanish: cuatrocientos jóvenes
  alternatives_spanish:
  - cuatrocientos muchachos
  - cuatrocientos hombres jóvenes
  lexicon: HALOT
  rationale: נַעַר puede abarcar muchacho, joven o joven servidor, pero aquí describe combatientes capaces de montar camellos y huir. «Jóvenes» mantiene la referencia a edad/condición juvenil sin sugerir ni niñez ni servidumbre.
- source_word: רָכְבוּ עַל הַגְּמַלִּים
  english_pob_choice: rode on the camels
  chosen_spanish: que montaban sobre los camellos
  alternatives_spanish:
  - que iban montados en los camellos
  - que cabalgaban sobre los camellos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ir «sobre» los camellos. «Montaban sobre los camellos» conserva la imagen sin sonar demasiado mecánica en español.
- source_word: וַיָּנֻסוּ
  english_pob_choice: and fled
  chosen_spanish: y huyeron
  alternatives_spanish:
  - y escaparon
  - y se dieron a la fuga
  lexicon: HALOT
  rationale: נס significa huir/fugarse. «Huyeron» distingue este verbo de נִמְלַט, que ya se expresó con «escapó».
translation_notes:
  revision_awareness: 'El testimonio inglés auditado mantiene una solución de alta coincidencia sin revisiones aplicadas. Esta versión española sigue el mismo perfil: preserva la duración temporal, la fuerza militar de נכה, el singular distributivo de «un hombre» y la ambigüedad lexical de נֶשֶׁף mediante «crepúsculo».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay referencia al nombre divino en el versículo.
  - «Huyeron» se reserva para וַיָּנֻסוּ, mientras «escapó» traduce נִמְלַט, manteniendo la distinción verbal.
  - «Jóvenes» funciona mejor que «muchachos» en un contexto de combatientes, y evita un matiz demasiado juvenil.
