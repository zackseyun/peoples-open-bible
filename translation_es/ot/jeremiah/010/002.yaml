    text: 'O: «No se aterren por las señales de los cielos ... porque las naciones se aterran por ellas».'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al pie en la cláusula a la que realmente corresponde. También se sustituyó «se espanten» por «se aterren» para reflejar mejor חתת y mantener un registro bíblico natural y sobrio en español. No se requieren cambios doctrinales ni una adjudicación adicional.
