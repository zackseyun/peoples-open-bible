translation:
  language: es
  text: David, con Sadoc de los hijos de Eleazar y Ahimelec de los hijos de Itamar, los dividió según sus cargos en su servicio.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֶּחָלְקֵם
  english_pob_choice: divided them
  chosen_spanish: los dividió
  alternatives_spanish:
  - los repartió
  - los organizó en divisiones
  lexicon: HALOT
  rationale: El verbo חלק con sufijo pronominal expresa la acción básica de dividir o repartir. En este contexto levítico-sacerdotal, «los dividió» mantiene la cercanía al hebreo y resulta natural en español.
- source_word: וְצָדוֹק
  english_pob_choice: with Zadok
  chosen_spanish: con Sadoc
  alternatives_spanish:
  - y Sadoc
  lexicon: HALOT
  rationale: La conjunción permite entender participación conjunta con David. En español, «con» reproduce mejor esa asociación funcional que un simple «y».
- source_word: מִן בְּנֵי אֶלְעָזָר
  english_pob_choice: from the sons of Eleazar
  chosen_spanish: de entre los hijos de Eleazar
  alternatives_spanish:
  - de los hijos de Eleazar
  - procedente de los hijos de Eleazar
  lexicon: HALOT
  rationale: מִן + בני indica procedencia o pertenencia a un linaje. «De entre» expresa con claridad la idea de pertenencia genealógica sin perder el matiz de selección dentro del grupo.
- source_word: וַאֲחִימֶלֶךְ
  english_pob_choice: and Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - y Ahimelec
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española estándar. El enlace conjuntivo ya queda implícito por la coordinación en la oración.
- source_word: מִן בְּנֵי אִיתָמָר
  english_pob_choice: from the sons of Ithamar
  chosen_spanish: de entre los hijos de Itamar
  alternatives_spanish:
  - de los hijos de Itamar
  - procedente de los hijos de Itamar
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el mismo valor genealógico de procedencia/pertenencia.
- source_word: לִפְקֻדָּתָם
  english_pob_choice: according to their offices
  chosen_spanish: según sus cargos
  alternatives_spanish:
  - según su asignación
  - conforme a sus funciones
  - según su nombramiento
  lexicon: HALOT
  rationale: פְּקֻדָּה puede abarcar idea de cargo, asignación u orden establecido. Dado el ajuste revisado del POB inglés hacia «offices», «cargos» comunica bien la función ordenada y asignada en el servicio sacerdotal.
- source_word: בַּעֲבֹדָתָם
  english_pob_choice: in their service
  chosen_spanish: en su servicio
  alternatives_spanish:
  - en su ministerio
  - para su servicio
  lexicon: HALOT
  rationale: עֲבֹדָה es servicio/trabajo, aquí servicio cultual. «En su servicio» conserva la referencia al ámbito de actuación sin importar un término eclesiástico más interpretativo.
translation_notes:
  revision_awareness: El texto inglés POB revisó «according to their appointment» a «according to their offices» para subrayar el sentido de función ordenada en el servicio sacerdotal. La versión española sigue ese ajuste con «según sus cargos», evitando reducir פקדה solo a una designación puntual y conservando la organización institucional del pasaje.
  spanish_consistency_notes:
  - Se usa «Sadoc» como forma española de Zadok, coherente con la tradición bíblica en español.
  - «Hijos de» se mantiene para בני, en paralelo a la estructura hebrea y al contexto genealógico.
  - «Cargos» traduce aquí la función ordenada de פקֻדָּה, en línea con el cierre revisado del POB inglés.
  - Se evita «ministerio» para no introducir un matiz eclesiástico posterior que el hebreo no exige.
