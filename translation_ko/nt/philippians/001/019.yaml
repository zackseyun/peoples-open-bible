id: PHP.1.19
reference: Philippians 1:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἶδα γὰρ ὅτι τοῦτό μοι ἀποβήσεται εἰς σωτηρίαν διὰ τῆς ὑμῶν δεήσεως καὶ ἐπιχορηγίας τοῦ πνεύματος Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/019.yaml
  text: For I know that this will turn out for my deliverance through your prayer and the provision of the Spirit of Jesus Messiah,
translation:
  language: ko
  text: 나는 이 일이 여러분의 간구와 예수 메시아의 영의 공급하심을 통하여 나의 구원[a]에 이르게 되리라는 것을 알고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「구출」 또는 「신원」. 헬라어 σωτηρία는 옥중 상황에서는 구체적 「풀려남」을, 동시에 종말론적 「구원」의 울림을 함께 가진다.
    reason: alternative_reading
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_korean: 알고 있습니다
  alternatives_korean:
  - 압니다
  lexicon: BDAG
  rationale: 완료형 οἶδα는 현재적 의미로 기능한다. 「알고 있습니다」가 바울의 확신과 합쇼체를 함께 담는다.
- source_word: τοῦτό
  english_pob_choice: this
  chosen_korean: 이 일
  alternatives_korean:
  - 이것
  - 이 상황
  lexicon: BDAG
  rationale: 단수 지시사가 바울의 현재 상황 전반을 가리키므로 「이 일」이 자연스럽다.
- source_word: ἀποβήσεται
  english_pob_choice: will turn out
  chosen_korean: 이르게 되리라
  alternatives_korean:
  - 귀결되리라
  - ~으로 끝나리라
  lexicon: BDAG
  rationale: ἀποβαίνω는 결과·귀결을 표현한다. 「이르게 되리라」가 자연스럽고 미래 종결의 함의를 살린다.
- source_word: σωτηρίαν
  english_pob_choice: deliverance
  chosen_korean: 구원
  alternatives_korean:
  - 구출
  - 신원
  - 풀려남
  lexicon: BDAG
  rationale: σωτηρία는 옥중 문맥에서 구체적 「구출」을 가리키면서 종말론적 「구원」의 울림을 함께 가진다. 한국어 「구원」이 양쪽의 신학적 깊이를 보존하며, 영어 POB는 옥중 함의를 강조하여 「deliverance」를 택했으나 한국어에서는 「구원」이 더 자연스럽고 풍부하다. 옥중 함의(「구출」)는 각주로 둔다.
- source_word: δεήσεως
  english_pob_choice: prayer
  chosen_korean: 간구
  alternatives_korean:
  - 기도
  - 청원
  lexicon: BDAG
  rationale: δέησις는 「청원·간구」의 어감이 강하다. 4절과 일관되게 「간구」로 옮긴다.
- source_word: ἐπιχορηγίας
  english_pob_choice: provision
  chosen_korean: 공급하심
  alternatives_korean:
  - 도우심
  - 보내주심
  lexicon: BDAG
  rationale: ἐπιχορηγία는 풍성히 공급·후원함을 의미한다. 「공급하심」이 그 능동적 제공의 함의를 자연스럽게 담는다.
- source_word: πνεύματος Ἰησοῦ Χριστοῦ
  english_pob_choice: the Spirit of Jesus Messiah
  chosen_korean: 예수 메시아의 영
  alternatives_korean:
  - 예수 메시아의 성령
  - 예수 그리스도의 영
  lexicon: BDAG
  rationale: 속격은 단순히 예수에 속한 영을 가리킨다. Χριστός는 본 번역의 원칙에 따라 「메시아」로 옮긴다. πνεῦμα는 「영」으로 옮기되, 본 문맥에서 신적 영이 분명하나 일반적 한국어 어감을 위해 「성령」 대신 「영」을 택한다(글로사리 원칙).
