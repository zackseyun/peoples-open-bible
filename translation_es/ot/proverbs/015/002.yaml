base_translation:
  language: en
  yaml_path: translation/ot/proverbs/015/002.yaml
  text: The tongue of the wise makes knowledge good[b][a], but the mouth of fools pours out folly.
  footnotes:
  - marker: a
    text: Or 'uses knowledge well,' 'adorns knowledge,' or 'makes knowledge attractive.' The Hebrew verb is causative ('makes good') and may refer either to the wise person's beneficial use of knowledge or to presenting it well.
    reason: lexical_alternative
  - marker: b
    text: Or 'bubbles forth' or 'gushes out.' The Hebrew verb pictures something spilling out in abundance.
    reason: lexical_alternative
