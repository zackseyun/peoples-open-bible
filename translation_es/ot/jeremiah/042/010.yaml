base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/042/010.yaml
  text: If you will indeed remain in this land[a], then I will build you up and not tear you down, and I will plant you and not uproot you[c][b]; for I relent concerning the harm that I did to you.
  footnotes:
  - marker: a
    text: Or 'If you truly stay in this land.' The Hebrew uses an infinitive absolute before the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will plant you and not pluck you up.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'I relent concerning the harm/disaster.' Older English versions often have 'repent of the evil,' where 'evil' means calamity, not moral wrongdoing.
    reason: lexical_alternative
