translation:
  language: es
  text: Hijo de hombre[a], Nabucodonosor, rey de Babilonia, hizo trabajar mucho a su ejército contra Tiro; toda cabeza quedó calva y todo hombro quedó pelado[c][b], y no hubo paga para él ni para su ejército de Tiro, por el trabajo que había realizado contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mortal» para «Hijo de hombre», un vocativo frecuente dirigido a Ezequiel; el hebreo dice literalmente «hijo de hombre».
    reason: lexical_alternative
  - marker: b
    text: O «gran trabajo» o «duro servicio».
    reason: lexical_alternative
  - marker: c
    text: La imagen de cada cabeza calva y cada hombro pelado probablemente refleja el esfuerzo físico del trabajo de asedio.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conserva la fórmula vocativa característica de Ezequiel y evita borrar el recurso literario. En español, «Hijo de hombre» es comprensible y mantiene la literalidad suficiente sin forzar una paráfrasis interpretativa.
- source_word: הֶעֱבִיד
  english_pob_choice: made his army labor
  chosen_spanish: hizo trabajar mucho a su ejército
  alternatives_spanish:
  - hizo servir a su ejército
  - causó que su ejército trabajara
  lexicon: HALOT
  rationale: 'El hiphil es causativo: no solo ‘trabajó’, sino que ‘hizo trabajar’. «Hizo trabajar mucho» refleja la intensidad de עֲבֹדָה גְדֹלָה y suena natural en español.'
- source_word: חֵילוֹ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - su fuerza
  - sus tropas
  lexicon: HALOT
  rationale: En este contexto bélico, חֵיל se refiere claramente a la fuerza militar. «Ejército» es la equivalencia más clara y readable en español.
- source_word: עֲבֹדָה גְדֹלָה
  english_pob_choice: labor greatly
  chosen_spanish: trabajar mucho
  alternatives_spanish:
  - gran trabajo
  - duro servicio
  lexicon: HALOT
  rationale: La frase expresa un servicio/labor intenso y oneroso. En español, una construcción verbal evita el calco rígido y comunica mejor la idea de esfuerzo prolongado y pesado.
- source_word: אֶל צֹר
  english_pob_choice: against Tyre
  chosen_spanish: contra Tiro
  alternatives_spanish:
  - hacia Tiro
  - para Tiro
  lexicon: HALOT
  rationale: El contexto de sitio militar exige una dirección hostil. «Contra Tiro» mantiene el valor bélico que la POB inglesa documenta.
- source_word: כָּל רֹאשׁ מֻקְרָח
  english_pob_choice: every head was made bald
  chosen_spanish: toda cabeza fue rapada
  alternatives_spanish:
  - toda cabeza quedó calva
  - toda cabeza fue hecha calva
  lexicon: HALOT
  rationale: La imagen describe el efecto físico del trabajo de asedio. «Fue rapada» expresa el resultado sin perder la pasiva del hebreo; además, en español es más natural que ‘hecha calva’.
- source_word: וְכָל כָּתֵף מְרוּטָה
  english_pob_choice: every shoulder was rubbed bare
  chosen_spanish: todo hombro fue despellejado
  alternatives_spanish:
  - todo hombro fue rozado en carne viva
  - todo hombro fue pelado
  lexicon: HALOT
  rationale: מְרוּטָה alude a estar rozado o desgastado hasta quedar desnudo. «Despellejado» comunica la abrasión intensa; aunque es fuerte, preserva la dureza de la imagen corporal en español.
- source_word: שָׂכָר
  english_pob_choice: pay
  chosen_spanish: paga
  alternatives_spanish:
  - salario
  - recompensa
  lexicon: HALOT
  rationale: El término denota compensación por trabajo. «Paga» es natural y suficientemente amplio; evita restringir indebidamente el sentido a un salario formal.
- source_word: מִצֹּר
  english_pob_choice: from Tyre
  chosen_spanish: procedente de Tiro
  alternatives_spanish:
  - de Tiro
  - desde Tiro
  lexicon: HALOT
  rationale: La idea es que no recibió compensación proveniente de Tiro. «Procedente de Tiro» explicita el origen de la paga sin añadir contenido nuevo.
- source_word: עַל הָעֲבֹדָה אֲשֶׁר עָבַד עָלֶיהָ
  english_pob_choice: for the labor that he had performed against it
  chosen_spanish: por el trabajo que había realizado contra ella
  alternatives_spanish:
  - por el servicio que había prestado contra ella
  - por la labor que había hecho sobre ella
  lexicon: HALOT
  rationale: La cláusula final explica la base de la remuneración ausente. «Había realizado» evita una repetición torpe y mantiene la referencia militar a Tiro en femenino («ella»).
theological_decisions:
- issue: Tratamiento del vocativo profético «hijo de hombre»
  english_pob_reading: Standard Ezekiel address formula; literal preservation of the Hebrew expression
  chosen_spanish_reading: Conservar «Hijo de hombre» como fórmula profética, sin sustituirla por una paráfrasis interpretativa
  alternative_spanish_readings:
  - Mortal
  - Ser humano
  rationale: No hay base para domesticar la fórmula en una traducción de auditoría directa. La preservación mantiene el eco recurrente de Ezequiel y su posible carga de humildad/condición humana sin decidirla unilateralmente.
  doctrine_reference: Ezequiel 2:1; 3:1; uso profético del vocativo
- issue: Valor militar de la preposición con צֹר
  english_pob_reading: against Tyre
  chosen_spanish_reading: contra Tiro
  alternative_spanish_readings:
  - hacia Tiro
  - para Tiro
  rationale: El contexto inmediato es el asedio de Nabucodonosor. Traducirlo de manera hostil refleja el sentido discursivo y no suaviza la imagen bélica.
  doctrine_reference: Ezequiel 29:18; contexto de juicio sobre Tiro
translation_notes:
  revision_awareness: La POB inglesa revisó la frase de ‘labor hard’ a ‘labor greatly’ para reflejar mejor עֲבֹדָה גְדֹלָה sin perder naturalidad. La versión española sigue esa preferencia mediante una construcción causativa e intensiva («hizo trabajar mucho») y conserva el resto del verso sin cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «Tiro» para צֹר, de forma consistente con el nombre bíblico en español.
  - Se usa «paga» para שָׂכָר, coherente con una compensación laboral concreta.
  - Se conserva la referencia femenina («ella») para volver a Tiro, siguiendo el antecedente del hebreo y la sintaxis española.
  - No se sustituye el lenguaje de daño físico por un eufemismo, porque la imagen de desgaste corporal es parte del sentido del texto.
