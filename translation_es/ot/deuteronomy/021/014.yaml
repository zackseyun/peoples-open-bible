translation:
  language: es
  text: Pero si sucede que no te agrada, entonces la dejarás ir libre[a]; no debes venderla en absoluto por dinero. No debes tratarla como mercancía[b], porque la has humillado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la dejarás ir a donde ella quiera», literalmente, «la enviarás para sí»; es decir, la dejarás ir para su propia disposición.
    reason: lexical_alternative
  - marker: b
    text: O, «No debes explotarla para ganancia». El verbo hebreo es raro y probablemente comunica tratarla como un objeto de uso económico.
    reason: lexical_alternative
  - marker: c
    text: O, «porque la has violado». El hebreo puede denotar aflicción, humillación o violencia sexual según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה אִם
  english_pob_choice: But if it happens that
  chosen_spanish: Pero si sucede que
  alternatives_spanish:
  - Y si
  - Ahora bien, si sucede que
  lexicon: HALOT
  rationale: La fórmula introduce una situación hipotética dentro de la ley. «Pero» conserva el giro concesivo/contrastivo del contexto, y «si sucede que» refleja el valor idiomático de וְהָיָה sin sonar forzado en español.
- source_word: לֹא חָפַצְתָּ בָּהּ
  english_pob_choice: you do not delight in her
  chosen_spanish: no la quieres
  alternatives_spanish:
  - ya no la deseas
  - no te complaces en ella
  lexicon: HALOT
  rationale: חפץ expresa gusto, deleite o deseo. En español, «no la quieres» comunica de manera natural la falta de inclinación afectiva, sin cargar de más el matiz ni sexualizarlo indebidamente. Se mantiene la tensión con la posibilidad de «desear».},{
theological_decisions:
- issue: Fuerza ética de la ley respecto de la mujer cautiva
  english_pob_reading: Restrict the man's power over the woman after sexual/marital union, without softening the coercive context or importing later doctrinal conclusions.
  chosen_spanish_reading: Restringir el poder del hombre sobre la mujer después de la unión marital/sexual, sin suavizar el contexto coercitivo ni introducir conclusiones doctrinales posteriores.
  alternative_spanish_readings:
  - Presentar el pasaje como un simple divorcio consensuado
  - Nombrar explícitamente la violación en el texto principal
  rationale: El hebreo regula su salida y prohíbe convertirla en objeto de venta porque ella ha sido ‘humillada/afligida’. La traducción debe conservar esa lógica moral y su gravedad, sin atenuarla ni precisar más de lo que el texto exige.
  doctrine_reference: Philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió el pasaje fuente con alta concordancia y sin cambios respecto del último pase; la versión inglesa también conserva las notas léxicas y la alternativa de lectura para עִנִּיתָהּ.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española normal del nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «mercancía» para reflejar el valor objetificante/económico del verbo raro, evitando suavizarlo con un verbo más general.
  - Se usa «humillado» como lectura principal, preservando la tensión con la alternativa «violado» en nota.
  - La traducción evita el calco «en dinero/plata» y prefiere «por dinero» como equivalente natural de בַּכָּסֶף.
