  text: 'Look[a], I am throwing her onto a bed, and those who commit adultery with her into great affliction[b], unless they repent of her works.'
  footnotes:
  - marker: a
    text: Or 'onto a sickbed.' The Greek says literally 'onto a bed'; in context many understand it as a bed of suffering or illness as judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'into great tribulation.' Here the phrase refers to severe affliction or distress.
    reason: lexical_alternative
translation:
  language: ko
  text: '보라, 내가 그 여자를 침상[a]에 던지고, 그 여자와 더불어 간음하는 자들도 큰 환난에 던지리라. 만일 그들이 그 여자의 행위를 회개하지 아니하면 그러하리라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「병상」. 헬라어는 「침상」이라 하나, 문맥상 심판의 고통이나 질병의 자리로 이해되어 왔다.'
    reason: lexical_alternative
