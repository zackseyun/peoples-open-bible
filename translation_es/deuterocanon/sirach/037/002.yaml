translation:
  language: es
  text: ¿No hay pesar que llega hasta la muerte, cuando un compañero como tu propia alma[a] se vuelve enemigo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “un compañero como tu propia alma”; el paralelo griego tiene “un compañero y amigo”. El texto principal conserva la imagen hebrea de amistad íntima.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ / הלא
  english_pob_choice: Is there not
  chosen_spanish: ¿No hay
  alternatives_spanish:
  - ¿No existe
  - ¿Acaso no hay
  lexicon: HALOT; Greek οὐχί
  rationale: Conserva la fuerza interrogativa retórica esperada por el hebreo y confirmada por el griego, en un español natural y directo.
- source_word: λύπη / דין
  english_pob_choice: grief
  chosen_spanish: pesar
  alternatives_spanish:
  - dolor
  - tristeza
  - aflicción
  lexicon: LSJ; HALOT
  rationale: El griego λύπη y el hebreo דין, en este contexto, apuntan a aflicción emocional; 'pesar' mantiene el tono sobrio y cabe bien antes de 'hasta la muerte'.
- source_word: ἕως θανάτου / מגיע אל מות
  english_pob_choice: reaches to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - que llega a la muerte
  - hasta el punto de la muerte
  - que alcanza la muerte
  lexicon: LSJ; HALOT
  rationale: La frase española reproduce la extensión/intensidad del hebreo y del griego sin sobrecargar la sintaxis.
- source_word: ἑταῖρος καὶ φίλος / רע כנפשך
  english_pob_choice: a companion as your own soul
  chosen_spanish: un compañero y amigo
  alternatives_spanish:
  - un compañero como tu propia alma
  - un compañero íntimo y amigo
  - un amigo como tu propia alma
  lexicon: LSJ; HALOT
  rationale: Para la lectura pública se prioriza la equivalencia funcional con el par griego ἑταῖρος καὶ φίλος, mientras la nota conserva la imagen hebrea más literal de la cercanía interior ('como tu propia alma').
- source_word: τρεπόμενος εἰς ἔχθραν / נהפך לצר
  english_pob_choice: turns into an enemy
  chosen_spanish: se vuelve enemistad
  alternatives_spanish:
  - se convierte en enemigo
  - se vuelve un enemigo
  - se transforma en hostilidad
  lexicon: LSJ; HALOT
  rationale: El griego habla de volverse 'hacia enemistad' y el hebreo de ser volteado/convertido a adversidad; 'se vuelve enemistad' mantiene la idea de un giro relacional hacia la hostilidad sin introducir una metáfora más fuerte que la fuente.
theological_decisions:
- issue: Tensión entre la forma hebrea literal y el paralelo griego sobre la relación íntima
  english_pob_reading: The main text reflects the shared sense of intimate friendship; the note preserves the Hebrew literally, 'a companion like your own soul.'
  chosen_spanish_reading: La nota preserva 'como tu propia alma' como alternativa literal, mientras el texto principal dice 'compañero y amigo'.
  alternative_spanish_readings:
  - '''un compañero como tu propia alma'''
  - '''un compañero, amigo íntimo'''
  rationale: No hay doctrina en disputa; la decisión es filológica. La versión principal sigue el sentido compartido por los testigos, y la nota retiene la imagen hebrea que el griego expresa de otra manera.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior anclando la nota [a] en el texto principal. La redacción española se ajustó para que el marcador aparezca exactamente donde corresponde y para mantener la decisión léxica del informe inglés: el texto principal privilegia el par relacional griego, mientras la nota conserva la literalidad hebrea.'
  spanish_consistency_notes:
  - Se usó 'pesar' para λύπη/Dין por su sobriedad y adecuación al lamento.
  - '''Hasta la muerte'' conserva la extensión intensiva de ἕως θανάτου / מגיע אל מות.'
  - '''Compañero y amigo'' es una solución de lectura pública; la nota explica la imagen hebrea más literal.'
  - '''Se vuelve enemistad'' evita imponer ''enemigo'' como sustantivo donde la fuente enfatiza el giro hacia hostilidad.'
