translation:
  language: es
  text: Y muchos entre ellos tropezarán[a]; caerán y serán quebrantados; serán atrapados y capturados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muchos tropezarán en ella» o «por ella», tomando el pronombre como referencia a la piedra o la trampa de la imagen inmediata.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָשְׁלוּ
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - se tambalearán
  - caerán en tropiezo
  lexicon: HALOT
  rationale: כשל expresa la idea de tropezar o trastabillar. «Tropezarán» conserva la imagen concreta y suena natural en español bíblico contemporáneo.
- source_word: בָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - sobre ellos
  - por ellos
  lexicon: HALOT
  rationale: La preposición con sufijo se entiende aquí en relación con el grupo afectado. «Entre ellos» comunica bien que muchos dentro del mismo pueblo serán los que tropiecen, sin forzar un sentido instrumental menos probable.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: HALOT
  rationale: El término significa «muchos». «Muchos» preserva la brevedad y la fuerza del hebreo.
- source_word: וְנָפְלוּ
  english_pob_choice: they will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - y caerán
  lexicon: HALOT
  rationale: נפל es «caer». En español, el verbo ya lleva la idea de descenso o ruina y funciona bien como parte de la cadena de juicios.
- source_word: וְנִשְׁבָּרוּ
  english_pob_choice: be broken
  chosen_spanish: serán quebrantados
  alternatives_spanish:
  - serán rotos
  - serán quebrados
  lexicon: HALOT
  rationale: El nifal de שבר pide pasivo. «Quebrantados» conserva la pasividad y la intensidad figurada del quebranto sin sonar mecánico.
- source_word: וְנוֹקְשׁוּ
  english_pob_choice: be snared
  chosen_spanish: serán atrapados en la trampa
  alternatives_spanish:
  - serán enredados
  - serán cazados
  lexicon: HALOT
  rationale: El verbo expresa la idea de caer en un lazo o trampa. La frase elegida mantiene la metáfora y evita una abstracción excesiva.
- source_word: וְנִלְכָּדוּ
  english_pob_choice: captured
  chosen_spanish: apresados
  alternatives_spanish:
  - capturados
  - tomados
  lexicon: HALOT
  rationale: לכד significa prender o capturar. «Apresados» comunica la culminación del proceso con un matiz de captura/coacción más natural en español que un simple calco.
theological_decisions:
- issue: 'Secuencia metafórica de juicio: tropezar, caer, quebrantarse, ser atrapados y apresados'
  english_pob_reading: Retain the concrete sequence of stumbling, falling, being broken, being snared, and being captured as judgment imagery without allegorical expansion.
  chosen_spanish_reading: Conservar la secuencia concreta de tropiezo, caída, quebranto, trampa y apresamiento como imagen de juicio, sin ampliar la metáfora.
  alternative_spanish_readings:
  - Interpretar la línea de forma más abstracta como ruina general
  - Espiritualizarla como caída moral sin imagen concreta
  rationale: El contexto inmediato presenta una imagen de tropiezo vinculada al juicio. La traducción conserva la progresión de acciones y no resuelve la tensión en una sola categoría abstracta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; se conservó la misma lectura y la misma nota alternativa sobre el pronombre de בָם. La versión española sigue esa decisión y mantiene la ambigüedad contextual sin resolverla de forma dogmática.
  spanish_consistency_notes:
  - Se usa «tropezarán» para כשל, en continuidad con la imagen de tropiezo del contexto.
  - «Entre ellos» refleja la lectura preferida del POB inglés; la nota preserva la alternativa posible con referencia a la imagen inmediata.
  - Se mantuvo una cadena verbal pasiva en español para los tres últimos miembros, respetando el paralelismo hebreo.
  - «Apresados» se eligió para diferenciar el cierre de la secuencia respecto de «atrapados en la trampa».
