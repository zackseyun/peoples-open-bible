translation:
  language: es
  text: 'Y les dije[a]: «El que tenga oro, quítenselo». Ellos me lo dieron, y yo lo arrojé al fuego, y salió este becerro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién tiene oro? Quítenselo / arránquenselo». El hebreo literalmente dice: «¿A quién le pertenece oro? Despréndanlo / quítenlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y les dije
  alternatives_spanish:
  - Entonces les dije
  - Y yo les dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce el discurso de Aarón; «Y les dije» conserva la secuencia narrativa sin sobreinterpretar el giro discursivo. El dativo plural «les» expresa con naturalidad el destinatario del habla.
- source_word: לְמִי זָהָב
  english_pob_choice: Whoever has gold
  chosen_spanish: El que tenga oro
  alternatives_spanish:
  - Quien tenga oro
  - Quien tiene oro
  - El que tiene oro
  lexicon: HALOT
  rationale: La expresión hebrea literal «¿a quién le pertenece oro?» se vierte de modo idiomático en español como una relativa de posesión. «El que tenga oro» preserva el valor indefinido y condicional del dicho, sin importar una precisión temporal innecesaria.
- source_word: הִתְפָּרָקוּ
  english_pob_choice: take it off
  chosen_spanish: quíteselo
  alternatives_spanish:
  - arránqueselo
  - despréndaselo
  - quítenselo
  lexicon: HALOT
  rationale: El hitpael de פרק aquí se refiere a quitarse ornamentos o joyas. «Quíteselo» es una solución natural y precisa en español; mantiene la idea de remover algo de la persona sin forzar una imagen demasiado gráfica. El pronombre enclítico requiere complemento implícito de objeto, que en el contexto es el oro/las joyas.
- source_word: וַיִּתְּנוּ לִי
  english_pob_choice: So they gave it to me
  chosen_spanish: Ellos me lo dieron
  alternatives_spanish:
  - Y me lo dieron
  - Entonces me lo dieron
  lexicon: HALOT
  rationale: El hebreo tiene sujeto plural e indirecto singular; el objeto directo singular implícito se recupera del contexto («oro»). «Me lo dieron» es la forma natural en español; el pronombre «lo» conserva la referencia al metal u objetos de oro como conjunto.
- source_word: וָאַשְׁלִכֵהוּ
  english_pob_choice: and I threw it
  chosen_spanish: yo lo arrojé
  alternatives_spanish:
  - lo eché
  - yo lo lancé
  - lo tiré
  lexicon: HALOT
  rationale: שׁלך significa arrojar/echar. «Arrojé» mantiene un registro digno y suficientemente literal; el pronombre singular refleja la referencia colectiva al oro como masa u objeto reunido.
- source_word: בָאֵשׁ
  english_pob_choice: into the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - en el fuego
  - dentro del fuego
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es «en», en español con un verbo de arrojar resulta más natural «al fuego», que conserva el movimiento sin alargar la frase.
- source_word: וַיֵּצֵא
  english_pob_choice: and this calf came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió de allí
  - apareció
  - se salió
  lexicon: HALOT
  rationale: El verbo יצא se expresa de manera simple con «salió». Se mantiene el efecto irónico y evasivo del relato sin añadir comentario interpretativo.
- source_word: הָעֵגֶל הַזֶּה
  english_pob_choice: this calf
  chosen_spanish: este becerro
  alternatives_spanish:
  - este ternero
  - este becerro de oro
  - este toro joven
  lexicon: HALOT
  rationale: עגל puede designar un becerro o un toro joven; en este contexto idolátrico «becerro» es la traducción más estable y reconocible en español bíblico. No se añade «de oro» porque el versículo no lo dice explícitamente.
theological_decisions:
- issue: La evasiva de Aarón al explicar el origen del ídolo
  english_pob_reading: Render the statement plainly without adding interpretive qualifiers such as 'miraculously' or 'supposedly.'
  chosen_spanish_reading: Traducir la afirmación de manera llana, dejando que el contexto exponga la evasión de Aarón.
  alternative_spanish_readings:
  - Añadir una glosa como «supuestamente» o «milagrosamente»
  - Parafrasear para marcar ironía en el texto principal
  rationale: El verso presenta las palabras de Aarón tal como él las dice; la traducción debe conservar la tensión narrativa sin insertar comentario. La ironía surge del contexto, no de una ampliación interpretativa en el texto principal.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó solo la cláusula final para una forma más natural sin cambiar el sentido. La versión española refleja ese mismo equilibrio: mantiene la secuencia narrativa y el cierre simple «salió este becerro» sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo»/«Mesías» porque no hay terminología correspondiente en el texto.
  - Se usa «becerro» para עגל conforme al uso bíblico consolidado en español y al contexto del becerro de oro.
  - Se conserva el objeto implícito con pronombres clíticos («me lo», «lo») para reflejar la estructura hebrea sin sobrecargar el español.
