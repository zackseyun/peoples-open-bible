translation:
  language: es
  text: 'Entonces el rey Darío escribió a todos los pueblos, naciones y lenguas que habitan en toda la tierra[b]: «Que abunde su paz[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que su paz se multiplique».'
    reason: lexical_alternative
  - marker: b
    text: «En toda la tierra» refleja el arameo; en contexto se refiere al alcance pleno del dominio imperial de Darío.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - En ese momento
  lexicon: HALOT
  rationale: Marca de avance narrativo; «Entonces» mantiene el flujo secuencial natural en español sin añadir interpretación temporal extra.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío, el rey
  - Darío el rey
  lexicon: HALOT
  rationale: El español natural antepone el título; conserva el valor de nombre real sin rigidez sintáctica.
- source_word: כְּתַב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - emitió por escrito
  lexicon: HALOT
  rationale: El verbo arameo indica acción de escribir; el contexto es una proclama real, pero el texto fuente aquí dice «escribió» más que un sustantivo técnico para decreto.
- source_word: לְכָל עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  english_pob_choice: to all the peoples, nations, and languages
  chosen_spanish: a todos los pueblos, naciones y lenguas
  alternatives_spanish:
  - a todos los pueblos, etnias y lenguas
  - a todos los pueblos, naciones y grupos lingüísticos
  lexicon: HALOT
  rationale: Conserva la tríada convencional de Daniel para el alcance imperial completo; «lenguas» mantiene la formulación típica y evita explicitar demasiado la interpretación.
- source_word: דִּי דארין
  english_pob_choice: that dwell
  chosen_spanish: que habitan
  alternatives_spanish:
  - que moran
  - que viven
  lexicon: HALOT
  rationale: «Habitan» refleja con claridad la cláusula relativa y conserva un registro digno, acorde con un edicto real.
- source_word: בְּכָל אַרְעָא
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - en todo el país
  - en todo el reino
  lexicon: HALOT
  rationale: «Tierra» sigue de cerca el alcance del arameo y la formulación formulística; no se restringe a «reino» para respetar el tono universalizado del texto.
- source_word: שְׁלָמְכוֹן
  english_pob_choice: your peace
  chosen_spanish: su paz
  alternatives_spanish:
  - vuestro bienestar
  - la paz de ustedes
  lexicon: HALOT
  rationale: El arameo usa un posesivo de segunda persona plural; en español, con el encabezado impersonal de un edicto, «su paz» conserva la referencia colectiva sin escoger una forma regional de tratamiento.
- source_word: יִשְׂגֵּא
  english_pob_choice: abound
  chosen_spanish: abunde
  alternatives_spanish:
  - se multiplique
  - crezca en abundancia
  lexicon: HALOT
  rationale: «Abunde» reproduce el valor de aumento/crecimiento en una fórmula de bendición; mantiene la fuerza idiomática que el POB inglés expresó con «abound».
theological_decisions:
- issue: Alcance imperial de «en toda la tierra»
  english_pob_reading: “In all the earth” reflects the Aramaic wording; in context it refers to the full extent of Darius’s imperial domain.
  chosen_spanish_reading: «En toda la tierra» conserva la redacción aramea y, por contexto, alude al dominio imperial de Darío.
  alternative_spanish_readings:
  - «en todo el reino»
  - «en todo su dominio»
  rationale: La frase aramea es universalizante; traducirla así evita estrechar el texto antes de tiempo, pero la nota aclara su referencia contextual al imperio.
  doctrine_reference: Daniel 6:26; uso formulístico imperial en Daniel
- issue: Fórmula de bienestar/shalom
  english_pob_reading: “May your peace be multiplied.”
  chosen_spanish_reading: «Que abunde su paz».
  alternative_spanish_readings:
  - «Que su paz se multiplique»
  - «Que se aumente su bienestar»
  rationale: La bendición mantiene la idea de incremento del bienestar/peace sin forzar una equivalencia única; el español de texto principal es idiomático y la alternativa tradicional se preserva en nota.
  doctrine_reference: Saludo real/edictal en contexto arameo; semántica de šlām
translation_notes:
  revision_awareness: 'Se respetó la lectura estable del inglés POB y su auditoría: se mantuvo la tríada fija de Daniel, el valor verbal simple de «escribió», y la ambigüedad controlada de «en toda la tierra» con nota contextual. No se introdujeron cambios textuales ni se requirió ajuste por revisión reciente, ya que el pass más reciente indicó alta concordancia y sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo/arameo lo exija; aquí no aparece.
  - Se conserva «lenguas» como parte de la fórmula tríadica de Daniel.
  - «Paz» traduce šlām como bienestar/shalom sin sobreactuar teológicamente.
  - La puntuación y las comillas siguen el uso editorial español.
  - No se emplea «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
