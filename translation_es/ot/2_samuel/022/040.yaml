translation:
  language: es
  text: Me armaste con fuerza para la batalla[a]; hiciste que los que se alzaban contra mí se inclinaran[b] y quedaran debajo de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Me ceñiste con fuerza para la batalla». El hebreo lleva la imagen de ceñir o equipar para la guerra; «me armaste» comunica ese sentido en español actual.
    reason: lexical_alternative
  - marker: b
    text: O «los hiciste doblarse» o «los hiciste postrarse». El verbo puede expresar más literalmente hacer que los adversarios se doblen o se inclinen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּזְרֵנִי
  english_pob_choice: You armed me
  chosen_spanish: Me armaste
  alternatives_spanish:
  - Me ceñiste
  - Me equipaste
  - Me ceñiste de armas
  lexicon: HALOT
  rationale: El verbo hebreo expresa la imagen de ceñir/equipar para la acción militar. En español, «me armaste» comunica con naturalidad la preparación para la guerra y conserva la fuerza del contexto bélico sin volver la frase artificial.
- source_word: חַיִל
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - valor
  - mientras
  - poder
  lexicon: HALOT
  rationale: Aquí חַיִל nombra la capacidad/energía otorgada para el combate. «Fuerza» expresa bien ese empoderamiento en español y mantiene la amplitud semántica sin restringirlo solo a «valor».
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a la contienda bélica. «Para la batalla» suena natural en español moderno y preserva el contexto militar inmediato.
- source_word: תַּכְרִיעַ
  english_pob_choice: you caused those who rose against me to bow
  chosen_spanish: hiciste que ... se inclinaran
  alternatives_spanish:
  - los humillaste
  - los sometiste
  - los hiciste doblar
  lexicon: HALOT
  rationale: El hiphil de כָּרַע tiene la idea de hacer doblar o inclinarse. «Hiciste que ... se inclinaran» conserva esa imagen corporal y evita sobreinterpretar el verbo como derrota total o humillación, aunque ambas puedan ser implicadas.
- source_word: קָמַי
  english_pob_choice: those who rose against me
  chosen_spanish: los que se levantaban contra mí
  alternatives_spanish:
  - mis adversarios
  - los que se alzaban contra mí
  - mis atacantes
  lexicon: HALOT
  rationale: La forma participial deriva de קוּם y apunta literalmente a quienes se levantan en oposición. «Los que se levantaban contra mí» retiene ese matiz hostil de insurgencia mejor que un sustantivo más general.
- source_word: תַּחְתֵּנִי
  english_pob_choice: beneath me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - bajo mis pies
  lexicon: HALOT
  rationale: La preposición indica posición inferior. «Debajo de mí» mantiene la imagen espacial de subordinación y funciona bien con «se inclinaran».
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés. Se adoptó un equivalente español natural para la imagen militar de «girding/equipping» y para el hiphil de כָּרַע, conservando la relación espacial «debajo de mí» y la oposición «los que se levantaban contra mí».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; en este versículo no aparece el nombre divino de forma explícita.
  - Se prefirió «batalla» frente a «guerra» por naturalidad en español sin perder el matiz bélico.
  - Se mantuvo la construcción verbal con sujeto explícito implícito de segunda persona singular en español.
  - Se conservó la imagen corporal de inclinación en lugar de sustituirla por una paráfrasis abstracta.
