translation:
  language: es
  text: Los hijos de Parosh[a], 2.172.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Parosh». El hebreo dice literalmente «los hijos de Parosh», una designación de clan en este registro.
