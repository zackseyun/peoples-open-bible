  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: orden real a Mardoqueo, servicio en la corte y entrega de regalos por motivo de los hechos anteriores. Sin embargo, «dones» no es la mejor equivalencia contextual para δόματα en este entorno cortesano; suena más abstracto o cargado de otros matices en español bíblico contemporáneo que el sentido sencillo de obsequios/presentes. La nota al pie también está defectuosa, porque ofrece como alternativa exactamente la misma frase ya usada en el texto.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero «dones» resulta menos natural que «regalos» o «presentes» en español eclesial general. Además, la nota [a] no funciona como nota de alternativa real. «Por causa de estas cosas» es fiel, aunque algo rígido; puede mantenerse por literalidad. El conjunto requiere una reparación menor.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «Mardoqueo», «rey» y «servir» están bien. La principal mejora léxica es δόματα -> «regalos» o «presentes» en vez de «dones», para preservar mejor el uso narrativo normal del griego y la legibilidad en español.
  issues:
  - severity: medium
    issue: «dones» para δόματα suena poco natural en contexto narrativo cortesano.
    rationale: Aunque etimológicamente posible, en español actual y eclesial «dones» suele sugerir capacidades, carismas o dádivas con matiz más abstracto. El griego aquí apunta sencillamente a regalos/presentes dados por el rey.
  - severity: medium
