base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/004/018.yaml
  text: And his wife the Jewess bore Jered the father of Gedor[a], Heber the father of Soco, and Jekuthiel the father of Zanoah. These are the sons of Bithiah daughter of Pharaoh[c][b], whom Mered took as wife.
  footnotes:
  - marker: a
    text: Or 'the Judean woman' or 'the Jewish woman' for 'the Jewess.'
    reason: lexical_alternative
  - marker: b
    text: '''Father of'' in Chronicles can also mean founder, ancestor, or clan chief associated with a place.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is difficult: the relation between ''his wife the Jewess'' and ''Bithiah daughter of Pharaoh'' is debated; some understand them as the same woman, others as different wives of Mered.'
    reason: alternative_reading
