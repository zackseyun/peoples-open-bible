translation:
  language: es
  text: y lo hizo rey sobre Galaad[a], sobre los asuritas, sobre Jezreel, sobre Efraín, sobre Benjamín y sobre todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''los asuritas''. Algunos lo entienden como ''Aser'', refiriéndose a la tribu o región de Aser.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּמְלִכֵהוּ
  english_pob_choice: and made him king
  chosen_spanish: y lo hizo rey
  alternatives_spanish:
  - y lo coronó rey
  - y lo constituyó rey
  - y lo hizo reinar
  lexicon: HALOT
  rationale: El verbo causativo de מלך expresa instalar o constituir a alguien como rey. En español, 'lo hizo rey' conserva ese valor causativo de manera natural y breve, sin convertirlo en un simple 'reinó' que perdería la idea de investidura.
- source_word: אֶל / עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - encima de
  - de
  lexicon: HALOT
  rationale: En este contexto de dominio territorial y político, 'sobre' comunica mejor la esfera de gobierno que 'a' o 'para'. Mantiene la relación de autoridad que el hebreo presenta con las preposiciones usadas junto al verbo de entronización.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible 'Galaad' para el nombre regional, manteniendo la referencia geográfica sin forzar una transliteración inglesa.
- source_word: הָאֲשׁוּרִי
  english_pob_choice: the Ashurites
  chosen_spanish: los asuritas
  alternatives_spanish:
  - los ashuritas
  - Aser
  - los aseritas
  lexicon: HALOT
  rationale: La forma hebrea es difícil. El texto masorético apunta a un gentilicio colectivo, por lo que 'los asuritas' conserva el valor étnico/territorial sin decidir prematuramente por la enmienda interpretativa 'Aser'.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: HALOT
  rationale: Se conserva la transliteración bíblica común en español para el topónimo, que resulta transparente y estable en lectura eclesial.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se adopta la forma habitual en español para el nombre tribal, más natural que una transliteración rígida.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Se usa la ortografía española tradicional del nombre tribal.
- source_word: יִשְׂרָאֵל כֻּלֹּה
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: כֻּלֹּה intensifica la totalidad. 'Todo Israel' transmite de forma concisa que no se trata de una parte sino del conjunto entero, sin añadir explicaciones ajenas al texto.
theological_decisions:
- issue: Alcance del gobierno de David sobre los territorios nombrados
  english_pob_reading: made him king over Gilead, over the Ashurites, over Jezreel, over Ephraim, over Benjamin, and over all Israel.
  chosen_spanish_reading: lo hizo rey sobre Galaad, sobre los asuritas, sobre Jezreel, sobre Efraín, sobre Benjamín y sobre todo Israel.
  alternative_spanish_readings:
  - lo hizo rey en Galaad...
  - lo puso como rey sobre...
  rationale: El versículo describe investidura real con alcance territorial y tribal. La formulación elegida conserva la fuerza política del hebreo sin introducir matices doctrinales o interpretativos ajenos.
  doctrine_reference: 2 Samuel 2:9; 2 Samuel 5:1-5
translation_notes:
  revision_awareness: El inglés POB está en acuerdo alto y no requirió revisiones en el pasaje base; la presente versión española sigue el mismo sentido auditado, adaptando solo la formulación al español y preservando la nota de lectura alternativa para הָאֲשׁוּרִי.
  spanish_consistency_notes:
  - Se usa 'Galaad' como forma española estable de Gilead.
  - Se mantiene 'todo Israel' para reflejar כֻּלֹּה sin sobreexplicar.
  - Se conserva la ambigüedad de הָאֲשׁוּרִי mediante nota, sin adoptar 'Aser' en el texto principal.
