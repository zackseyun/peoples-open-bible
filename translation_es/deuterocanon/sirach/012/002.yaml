    rationale: Aunque reproduce de cerca la sintaxis fuente, en español suena incompleta. El sentido es «si no de él, [la retribución vendrá] de Yahvé». Añadir «será» mejora la legibilidad sin añadir contenido ajeno sustantivo.
  - severity: low
    issue: La conjunción inicial antes de la cláusula condicional puede puntuarse mejor.
    rationale: «; y si no...» es comprensible, pero «—y si no de él, será de Yahvé» o «; si no de él, será de Yahvé» fluye mejor en español moderno y mantiene el contraste.
  revised_spanish_text: Haz el bien al justo[a], y hallarás retribución; si no de él, será de Yahvé.
