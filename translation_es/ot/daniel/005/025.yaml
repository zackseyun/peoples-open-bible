    rationale: En el POB inglés, la nota sobre transliteración se ancla en MENE y la nota sobre alternativa lexical se relaciona con «the inscription». En español conviene preservar esa lógica para reflejar el razonamiento documentado.
  - severity: low
    issue: «Y este es» debería concordar con un sustantivo femenino si se elige «inscripción»
    rationale: «Y esta es la inscripción» es más natural y correctamente concordado en español.
