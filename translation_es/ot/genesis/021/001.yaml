revisions:
- from: Ahora Yahvé visitó a Sara, como había dicho[a], y Yahvé hizo por Sara como había hablado.
  to: Yahvé visitó a Sara, como había dicho[a], y Yahvé hizo con Sara como había hablado.
  rationale: Se elimina ‘Ahora’ por ser innecesario y sonar a calco. Se cambia ‘hizo por Sara’ a ‘hizo con Sara’ para una expresión más idiomática en español que aún preserve el sentido de acción divina efectiva en favor de Sara. Se mantiene ‘visitó’ con nota, en línea con la decisión auditada del POB y el uso bíblico comprensible en español.
  reviewer_model: gpt-5.4
