translation:
  language: es
  text: Oh Yahvé, Dios de los ejércitos[a], restáuranos; haz resplandecer tu rostro[b], para que seamos salvos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las huestes».
    reason: lexical_alternative
  - marker: b
    text: O «y seremos salvos».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto sin sustituirlo por una máscara litúrgica. 'Yahvé' es el equivalente español adoptado por el proyecto para YHWH y mantiene la referencia directa del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí funciona en aposición a YHWH y nombra al Dios de Israel. 'Dios' es el equivalente natural y fiel en español.
- source_word: צְבָא֣וֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: El título divino tradicional 'of hosts' se vierte como 'de los ejércitos', que preserva la imagen de fuerzas celestiales/cósmicas y resulta claro en español moderno. 'Huestes' es posible, pero menos transparente para una lectura amplia.
- source_word: הֲשִׁיבֵ֑/נוּ
  english_pob_choice: restore us
  chosen_spanish: restáuranos
  alternatives_spanish:
  - devuélvenos
  - haznos volver
  lexicon: HALOT
  rationale: La forma causativa de שוב tiene fuerza de 'hacer volver / restaurar'. 'Restáuranos' comunica bien el pedido de renovación y retorno sin perder la dimensión relacional del contexto del salmo.
- source_word: הָאֵ֥ר
  english_pob_choice: make shine
  chosen_spanish: haz resplandecer
  alternatives_spanish:
  - haz brillar
  - haz que resplandezca
  lexicon: HALOT
  rationale: Se preserva el causativo de אור con un español natural. 'Haz resplandecer' mantiene la acción de provocar brillo/manifestación de favor.
- source_word: פָּ֝נֶ֗י/ךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu faz
  - tu presencia
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'face' como 'rostro' en lugar de interpretarla como 'presencia'. En español, 'rostro' comunica la idiomática bíblica con dignidad y claridad.
- source_word: וְ/נִוָּשֵֽׁעָה
  english_pob_choice: that we may be saved
  chosen_spanish: para que seamos salvos
  alternatives_spanish:
  - y seremos salvos
  - y seamos salvados
  lexicon: HALOT
  rationale: La forma niphal cohortativa/volitiva expresa finalidad o resultado deseado tras las peticiones anteriores. 'Para que seamos salvos' conserva ese matiz de dependencia orante mejor que una simple futura declarativa.
theological_decisions:
- issue: Título divino compuesto יְהוָה אֱלֹהִים צְבָאוֹת
  english_pob_reading: O Yahweh God of hosts
  chosen_spanish_reading: Oh Yahvé Dios de los ejércitos
  alternative_spanish_readings:
  - Oh Yahvé, Dios de los ejércitos
  - Oh Yahvé Dios de las huestes
  rationale: Se mantiene la secuencia vocativa del hebreo y el nombre del pacto 'Yahvé'. 'De los ejércitos' conserva la fuerza titular tradicional sin ocultar la imagen bélica/celestial presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor final de וְנִוָּשֵׁעָה
  english_pob_reading: that we may be saved
  chosen_spanish_reading: para que seamos salvos
  alternative_spanish_readings:
  - y seremos salvos
  - y quedaremos salvos
  rationale: La cadena de imperativos seguida por una forma volitiva en primera plural pide una traducción final de deseo/propósito, no una afirmación desnuda. Así se conserva la dependencia teológica de la súplica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la línea de auditoría en inglés; no se requieren revisiones adicionales. Se ha conservado la estructura vocativa, el nombre divino Yahvé y el valor volitivo final sin convertirlo en una simple afirmación futura.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para YHWH conforme al estándar del proyecto.
  - '''Dios'' se mantiene en aposición al nombre divino, no como título genérico independiente.'
  - '''De los ejércitos'' traduce el título צְבָאוֹת con claridad contemporánea; ''huestes'' queda como alternativa registrada.'
  - '''Rostro'' conserva la imagen hebrea literal de פָּנִים sin espiritualizarla.'
  - '''Salvos'' refleja el resultado pedido por el verbo final sin forzar una formulación doctrinalmente más específica.'
