revisions:
- from: Y derramó sobre ellos sus prostituciones[a], sobre todos los más escogidos hijos de Asiria, y con todos aquellos por los cuales se encendió de deseo[b]; con todos sus ídolos[c] se contaminó.
  to: Y prodigó sus prostituciones[a] sobre ellos, sobre todos los hijos más escogidos de Asiria; y con todos aquellos a quienes codició con pasión[b], con todos sus ídolos[c] se contaminó.
  rationale: Se ajusta la sintaxis para reflejar mejor que «ellos» son «todos los hijos más escogidos de Asiria» sin una repetición preposicional torpe. «Prodigó» reproduce mejor la idea de dar abundantemente que «derramó», que en este contexto puede sonar más físico que relacional. «A quienes codició con pasión» expresa de forma más idiomática y directa el valor erótico de עגב, manteniendo la fuerza del original y la decisión del POB de no suavizar la metáfora sexual. Se conservan «hijos de Asiria», «ídolos» con nota y «se contaminó» por claridad y fidelidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:02:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: mantiene la metáfora sexual explícita, conserva «hijos de Asiria», traduce גִּלּוּלִים como «ídolos» con nota, y expresa la contaminación resultante. Sin embargo, hay dos desajustes importantes: «sobre todos los más escogidos hijos de Asiria» duplica torpemente la relación preposicional y no refleja bien la estructura hebrea, y «por los cuales se encendió de deseo» suena poco natural y atenúa innecesariamente el valor directo de עָגְבָה (‘lujurió / codició / deseó apasionadamente’).'
  spanish_quality_summary: 'El texto es mayormente comprensible y digno, pero presenta giros poco naturales en español bíblico moderno: «sobre todos los más escogidos hijos de Asiria» y «por los cuales se encendió de deseo». También «se contaminó» es aceptable, pero «se contaminó a sí misma» o «se hizo impura» explicitaría mejor el matiz reflexivo; aun así, «se contaminó» puede mantenerse por fluidez. La revisión propuesta mejora naturalidad, precisión sintáctica y fuerza retórica sin paraprasear.'
  glossary_alignment: No hay conflicto con los términos de proyecto principales. El pasaje no contiene Yahvé/Mesías/etc. Se conserva correctamente el lenguaje sexual explícito. «Ídolos» con nota respeta la decisión documentada sobre גִּלּוּלִים. «Hijos de Asiria» preserva בני conforme a la pauta del proyecto.
  issues:
  - severity: medium
    issue: Construcción sintáctica torpe con «sobre todos los más escogidos hijos de Asiria»
    rationale: El hebreo dice que ella dio/lavishó sus prostituciones sobre ellos, es decir, sobre todos los escogidos hijos de Asiria. En español, repetir «sobre» antes del complemento explicativo vuelve la frase pesada y menos clara.
  - severity: medium
    issue: «Por los cuales se encendió de deseo» suena poco idiomático y menos directo que el hebreo
    rationale: עָגְבָה expresa deseo lujurioso fuerte. La formulación actual es comprensible, pero no es la opción más natural ni la más cercana a la fuerza léxica preservada por el inglés POB.
  - severity: low
    issue: La nota a sobre «fornicaciones» introduce una alternativa menos precisa/register-awkward
    rationale: «Fornicaciones» no es la mejor alternativa neutral y moderna para תַּזְנוּתֶיהָ en este contexto; «actos de prostitución» sí sirve, pero conviene no promover una opción menos clara.
