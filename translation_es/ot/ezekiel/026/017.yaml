translation:
  language: es
  text: 'Entonarán una lamentación sobre ti y te dirán: «¡Cómo has perecido, habitada desde los mares[a], la ciudad renombrada[b], que era fuerte en el mar, ella y sus habitantes[c], que imponían su terror sobre todos los que la habitaban!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: נוֹשֶׁבֶת מִיַּמִּים; puede entenderse como «habitada desde los mares», o, de forma más interpretativa, como abastecida o poblada desde regiones marítimas.'
    reason: lexical_alternative
  - marker: b
    text: O «la ciudad celebrada».
    reason: lexical_alternative
  - marker: c
    text: La ciudad está personificada en femenino en el hebreo.
    reason: theological_note
lexical_decisions:
- source_word: וְנָשְׂאוּ ... קִינָה
  english_pob_choice: they will raise a lament
  chosen_spanish: Harán un lamento
  alternatives_spanish:
  - Levantarán un lamento
  - Tomarán un lamento
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «hacer un lamento» comunica el acto de entonar una lamentación con naturalidad sin perder el tono poético.
- source_word: אָבַדְתְּ
  english_pob_choice: you have perished
  chosen_spanish: has perecido
  alternatives_spanish:
  - has sido destruida
  - has desaparecido
  lexicon: HALOT
  rationale: «Perecer» conserva el matiz de ruina y pérdida total que tiene אבד en el lamento profético.
- source_word: נוֹשֶׁבֶת מִיַּמִּים
  english_pob_choice: inhabited from the seas
  chosen_spanish: habitada desde los mares[a]
  alternatives_spanish:
  - habitada de los mares
  - poblada desde los mares
  - situada al borde del mar
  lexicon: HALOT
  rationale: Se preserva la dificultad del hebreo sin emendarla. «Desde los mares» mantiene la preposición de origen/relación que el texto presenta y deja abierta la ambigüedad documental que la POB inglesa también anotó.
- source_word: הָעִיר הַהֻלָּלָה
  english_pob_choice: the renowned city / the celebrated city
  chosen_spanish: la ciudad famosa[b]
  alternatives_spanish:
  - la ciudad renombrada
  - la ciudad celebrada
  lexicon: HALOT
  rationale: הֻלָּלָה remite a algo alabado o celebrado. «Famosa» funciona bien en español y puede abarcar tanto reputación como renombre, mientras que la nota conserva la alternativa más literal.
- source_word: חֲזָקָה בַיָּם
  english_pob_choice: was strong in the sea
  chosen_spanish: era fuerte en el mar
  alternatives_spanish:
  - era poderosa en el mar
  - era fuerte sobre el mar
  lexicon: HALOT
  rationale: «Fuerte» traduce חזק de manera directa; «en el mar» sigue la preposición hebrea y mantiene la imagen marítima propia de Tiro.
- source_word: הִיא וְיֹשְׁבֶיהָ
  english_pob_choice: she and her inhabitants
  chosen_spanish: ella y sus habitantes[c]
  alternatives_spanish:
  - ella con sus habitantes
  - ella y los que habitaban en ella
  lexicon: HALOT
  rationale: Se conserva la personificación femenina de la ciudad, coherente con el hebreo y con el tono poético del pasaje.
- source_word: נָתְנוּ חִתִּיתָם
  english_pob_choice: imposed their terror
  chosen_spanish: imponían su terror
  alternatives_spanish:
  - causaban su terror
  - extendían su terror
  lexicon: HALOT
  rationale: El giro נתן + חִתִּית expresa causar pavor. «Imponían su terror» comunica la fuerza activa del hebreo con un español natural y solemne.
- source_word: לְכָל יוֹשְׁבֶיהָ
  english_pob_choice: on all its inhabitants
  chosen_spanish: a todos sus habitantes
  alternatives_spanish:
  - sobre todos sus habitantes
  - ante todos sus habitantes
  lexicon: HALOT
  rationale: El referente final vuelve naturalmente a la ciudad personificada. «A todos sus habitantes» refleja el alcance universal del terror sin oscurecer la sintaxis.
theological_decisions:
- issue: Personificación de la ciudad
  english_pob_reading: Render the city with feminine personal language ('she and her inhabitants')
  chosen_spanish_reading: Mantener la ciudad como «ella» y no neutralizarla a «it»
  alternative_spanish_readings:
  - neutralizarla como «la ciudad y sus habitantes»
  - usar una forma impersonal
  rationale: El hebreo trata a la ciudad como sujeto femenino en un lamento poético. Mantener esa personificación preserva el efecto literario sin introducir doctrina adicional.
  doctrine_reference: Principio POB de fidelidad poética y consistencia con el género profético
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de forma directa y conserva la ambigüedad de נוֹשֶׁבֶת מִיַּמִּים que la POB inglesa ya marcó como difícil. También mantiene la personificación femenina y el final con el alcance del terror sobre los habitantes, sin suavizar el lamento.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; aquí no aparece, así que no se introduce.
  - Se conservó el tono elegíaco del hebreo con «Harán un lamento» y «has perecido».
  - Se mantuvo la referencia marítima con «en el mar» y «desde los mares» para no borrar la dificultad textual.
  - Se evitó «Cristo» u otra terminología no presente en el verso.
