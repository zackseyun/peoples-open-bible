translation:
  language: es
  text: Yahvé me poseyó[a] al principio de su camino, antes de sus obras de antaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé me creó» o «Yahvé me adquirió». El verbo hebreo puede tener más de un sentido, y este versículo ha sido central en debates históricos sobre la Sabiduría personificada y su relación con el Hijo.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del hebreo en forma transliterada. En español del POB, 'Yahvé' comunica el Tetragrámaton sin sustituirlo por un título ni adoptar una forma tradicional menos directa.
- source_word: קָנָנִי
  english_pob_choice: possessed me
  chosen_spanish: me poseyó
  alternatives_spanish:
  - me creó
  - me adquirió
  - me formó
  lexicon: HALOT
  rationale: '''Poseyó'' mantiene el rango semántico de קנה en el sentido de adquirir/poseer y evita resolver el verbo hacia ''crear''. ''Me poseyó'' también preserva la tensión histórica del pasaje sin inclinar la traducción hacia una lectura doctrinal específica.'
- source_word: רֵאשִׁית
  english_pob_choice: the beginning
  chosen_spanish: al comienzo
  alternatives_spanish:
  - al principio
  - en el comienzo
  - la primera parte
  lexicon: HALOT
  rationale: La expresión temporal española 'al comienzo' reproduce naturalmente el valor adverbial de רֵאשִׁית en esta construcción, sin introducir una abstracción innecesaria.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su vía
  - su curso
  lexicon: HALOT
  rationale: '''Camino'' es la equivalencia española más natural para דרך y mantiene la amplitud de sentido de modo, trayectoria u obra ordenada.'
- source_word: קֶדֶם
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes
  - con anterioridad a
  - previo a
  lexicon: HALOT
  rationale: Se expresa prioridad temporal de forma directa y idiomática en español, manteniendo la relación con las obras posteriores de Dios.
- source_word: מִפְעָלָיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus obras hechas
  - sus acciones
  lexicon: HALOT
  rationale: '''Obras'' es el equivalente más natural para מִפְעָלִים en un contexto de actividad creadora/activa de Dios y conserva la concisión del hebreo.'
- source_word: מֵאָז
  english_pob_choice: of old
  chosen_spanish: de antaño
  alternatives_spanish:
  - desde antiguo
  - de antiguo
  - desde hace mucho
  lexicon: HALOT
  rationale: '''De antaño'' expresa antigüedad remota en un español sobrio y literario, equivalente al matiz temporal de מֵאָז.'
theological_decisions:
- issue: Verbo קנה en un pasaje usado históricamente en debates cristológicos
  english_pob_reading: possessed me; footnote preserves created me / acquired me
  chosen_spanish_reading: me poseyó; la nota preserva 'me creó' / 'me adquirió'
  alternative_spanish_readings:
  - me creó
  - me adquirió
  - me poseyó
  rationale: Se mantiene en el texto principal una lectura que no resuelve el debate teológico ni fuerza un sentido de creación. La nota conserva la alternativa histórica 'me creó' para transparencia auditiva y para no borrar la tensión exegética presente en el hebreo y en la historia de interpretación.
  doctrine_reference: Translation philosophy §3; Credo Niceno (381 d.C.)
- issue: Relación de la personificación de la Sabiduría con lecturas cristológicas posteriores
  english_pob_reading: the verse has been central in historical debates about personified Wisdom and its relation to the Son
  chosen_spanish_reading: el versículo ha sido central en debates históricos sobre la Sabiduría personificada y su relación con el Hijo
  alternative_spanish_readings:
  - el versículo se refiere directamente al Hijo
  - el versículo sólo habla de Sabiduría personificada
  rationale: La redacción española evita cerrar el pasaje hacia una afirmación cristológica inmediata o hacia una exclusión de ella. Se conserva la tensión interpretativa documentada por el POB en lugar de resolverla desde la traducción.
  doctrine_reference: Historia de la interpretación; Cristología nicena
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo cruzado fue alto y no hubo objeciones pendientes. La presente redacción sigue el sentido del hebreo WLC y conserva la nota alternativa histórica documentada en el POB inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se prefiere 'Sabiduría personificada' en la nota teológica para mantener la terminología contextual del pasaje.
  - '''obras'' se mantiene plural para reflejar מִפְעָלָיו sin singularizar indebidamente.'
  - La puntuación y el orden sintáctico buscan una lectura natural en español sin perder la secuencia temporal del hebreo.
