translation:
  language: es
  text: Una lengua tercera[a] ha expulsado a mujeres valientes, y las ha privado del fruto de su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tercera» conserva la imagen literal de τρίτη. El sentido puede ser el de una lengua que interviene como tercera parte y separa a las personas; otras posibles lecturas son «lengua divisiva» o «lengua chismosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - lengua hablada
  lexicon: LSJ
  rationale: La imagen literal es “lengua”, y en español mantiene la personificación de la palabra dañina sin perder naturalidad. Evita un término más abstracto que diluiría la fuerza metafórica del griego.
- source_word: τρίτη
  english_pob_choice: third
  chosen_spanish: de tercero
  alternatives_spanish:
  - tercera
  - divisiva
  - chismosa
  lexicon: LSJ
  rationale: Conservo el valor literal de τρίτη, como hace la POB inglesa con “third”, porque el dicho parece aludir a una voz intrusa que entra como tercera parte. En español, “de tercero” suena algo más natural que “tercera” si se quiere sostener la imagen sin explicarla por completo en el texto principal.
- source_word: γυναῖκας ἀνδρείας
  english_pob_choice: strong women
  chosen_spanish: mujeres valientes
  alternatives_spanish:
  - mujeres fuertes
  - mujeres valerosas
  - mujeres nobles
  lexicon: LSJ
  rationale: ἀνδρείας apunta a valentía, fortaleza o bravura. “Valientes” expresa bien esa fuerza de carácter en español y evita el calco poco idiomático de “fuertes” si se entiende sobre todo la energía moral o social de la expresión.
- source_word: ἐξέβαλεν
  english_pob_choice: has driven out
  chosen_spanish: ha expulsado
  alternatives_spanish:
  - ha echado
  - ha arrojado fuera
  - ha desterrado
  lexicon: LSJ
  rationale: El verbo admite la idea de expulsar o echar fuera. “Ha expulsado” conserva la violencia relacional del pasaje y es claro en español contemporáneo.
- source_word: ἐστέρεσεν
  english_pob_choice: has deprived
  chosen_spanish: las ha privado
  alternatives_spanish:
  - las ha despojado
  - las ha dejado sin
  - las ha robado de
  lexicon: LSJ
  rationale: “Privar” reproduce bien el valor de causar pérdida o falta. En español suena sobrio y fiel, sin añadir una imagen más fuerte de robo que el griego no exige aquí.
- source_word: τῶν πόνων αὐτῶν
  english_pob_choice: the fruit of their labor
  chosen_spanish: del fruto de su trabajo
  alternatives_spanish:
  - de sus trabajos
  - de su labor
  - de los frutos de sus esfuerzos
  lexicon: LSJ
  rationale: πóνων son “penas/toiles/trabajos”; en español, “fruto de su trabajo” expresa de forma natural aquello de lo que son privadas, como resultado de su esfuerzo. Conserva la idea de producto o beneficio de la labor, coherente con la opción inglesa auditada.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el dictamen de concordancia fue alto; por eso mantengo la estructura y el sentido del inglés auditado, con ajuste español para naturalidad sin perder la literalidad significativa del griego.
  spanish_consistency_notes:
  - Se conserva la metáfora de la “lengua” para no suavizar el valor figurado del original.
  - “Mujeres valientes” sigue el matiz de ἀνδρείας sin forzar un calco masculino.
  - “Del fruto de su trabajo” comunica con naturalidad el complemento de πόνων αὐτῶν sin alejarse del sentido de labor/toil.
  - La nota al pie mantiene la alternativa interpretativa documentada en la POB inglesa y la adapta al español.
