translation:
  language: es
  text: Entonces el rey llamó a los gibeonitas y les habló[a]. Ahora bien, los gibeonitas no eran de entre los hijos de Israel, sino del remanente de los amorreos[b]; y los hijos de Israel les habían jurado[c]. Pero Saúl había procurado matarlos en su celo[d] por los hijos de Israel y de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les dijo». El hebreo dice literalmente: «y les dijo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del resto de los amorreos». El hebreo usa una expresión de lo que quedó o permaneció.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «les habían hecho juramento». El hebreo expresa la idea de haberles prestado juramento.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «matarlos en sus celos por Israel y Judá». El término hebreo puede significar «celo» o «celos», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo básico de קרא aquí implica llamar o hacer venir a la presencia; 'llamó' es natural en español y conserva la transparencia del acto sin añadir matiz innecesario.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se mantiene el referente indefinido del hebreo; no se introduce el nombre propio. 'El rey' es la equivalencia directa y clara.
- source_word: לַגִּבְעֹנִים
  english_pob_choice: the Gibeonites
  chosen_spanish: a los gibeonitas
  alternatives_spanish:
  - a los de Gabaón
  lexicon: HALOT
  rationale: El gentilicio plural se vierte con el etnónimo habitual en español. 'Gibeonitas' preserva la referencia histórica y literaria del texto.
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  english_pob_choice: spoke to them
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  lexicon: HALOT
  rationale: Después de 'llamó', 'les habló' suena natural en español y expresa adecuadamente la secuencia de acercamiento y discurso sin perder el sentido literal.
- source_word: וְהַגִּבְעֹנִים
  english_pob_choice: Now the Gibeonites
  chosen_spanish: Ahora bien, los gibeonitas
  alternatives_spanish:
  - Y los gibeonitas
  - Pues los gibeonitas
  lexicon: HALOT
  rationale: La waw introduce una explicación de fondo; 'Ahora bien' marca mejor esa transición en español que una simple 'Y'.
- source_word: לֹא מִבְּנֵי יִשְׂרָאֵל הֵמָּה
  english_pob_choice: were not from the sons of Israel
  chosen_spanish: no eran de entre los hijos de Israel
  alternatives_spanish:
  - no eran israelitas
  - no eran de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la relación semántica de origen/pertenencia del hebreo. 'De entre' evita una lectura puramente identitaria y mantiene el contraste con la frase siguiente.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - excepto que
  lexicon: HALOT
  rationale: 'En español, ''sino'' expresa con precisión la oposición correctiva del hebreo: no X, sino Y.'
- source_word: מִיֶּתֶר הָאֱמֹרִי
  english_pob_choice: from the remnant of the Amorites
  chosen_spanish: del remanente de los amorreos
  alternatives_spanish:
  - de lo que quedó de los amorreos
  - del resto de los amorreos
  lexicon: HALOT
  rationale: '''Remanente'' conserva la idea de lo que quedó y mantiene el tono bíblico sin oscurecer el sentido; ''amorreos'' corresponde al etnónimo del hebreo.'
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: and the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva la repetición del hebreo y la conexión léxica con la primera ocurrencia de בני ישראל en el versículo.
- source_word: נִשְׁבְּעוּ לָהֶם
  english_pob_choice: had sworn to them
  chosen_spanish: les habían jurado
  alternatives_spanish:
  - habían jurado ante ellos
  - les habían hecho juramento
  lexicon: HALOT
  rationale: '''Jurar'' en español puede implicar prestar juramento; aquí la forma con complemento indirecto comunica bien el vínculo de obligación ya establecido antes de la acción de Saúl.'
- source_word: וַיְבַקֵּשׁ שָׁאוּל
  english_pob_choice: But Saul had sought
  chosen_spanish: Pero Saúl había procurado
  alternatives_spanish:
  - Pero Saúl había buscado
  - Y Saúl procuró
  lexicon: HALOT
  rationale: '''Procurado'' refleja la intención deliberada del verbo sin sonar artificial. El pluscuamperfecto conserva la relación temporal previa a la escena principal.'
- source_word: לְהַכֹּתָם
  english_pob_choice: to strike them down
  chosen_spanish: matarlos
  alternatives_spanish:
  - abatirlos
  - golpearlos
  lexicon: HALOT
  rationale: Aunque 'golpear' sería más literal, el contexto exige el resultado letal; 'matarlos' comunica de forma directa la fuerza del infinitivo causativo en este contexto narrativo.
- source_word: בְּקַנֹּאתוֹ
  english_pob_choice: in his zeal
  chosen_spanish: en su celo
  alternatives_spanish:
  - por su celo
  - en su fervor
  lexicon: HALOT
  rationale: '''Celo'' conserva la ambigüedad controlada del hebreo בין zelo/jealousy, pero en este contexto nacional expresa mejor el fervor partidario que ''celos'' en español.'
- source_word: לִבְנֵי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: for the sons of Israel and Judah
  chosen_spanish: por los hijos de Israel y de Judá
  alternatives_spanish:
  - a favor de los hijos de Israel y de Judá
  - por Israel y Judá
  lexicon: HALOT
  rationale: La preposición con valor de causa/beneficio se vierte con 'por'. Se conserva la fórmula 'hijos de Israel' para mantener la repetición del hebreo y la distinción con Judá.
theological_decisions:
- issue: Valor de בני ישראל como designación nacional
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel
  rationale: Se mantiene el lenguaje genealógico/nacional del hebreo y la repetición interna del versículo. Aunque 'israelitas' sería más idiomático en algunos contextos, aquí diluiría la conexión verbal entre las dos apariciones de בני ישראל.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sentido de קנא en la motivación de Saúl
  english_pob_reading: zeal
  chosen_spanish_reading: celo
  alternative_spanish_readings:
  - celos
  - fervor
  rationale: El contexto es político y nacional, no emocional-romántico. 'Celo' preserva la intensidad moral del término sin imponer la idea de envidia o celos personales.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
- issue: Secuencia temporal del verbo principal sobre Saúl
  english_pob_reading: But Saul had sought
  chosen_spanish_reading: Pero Saúl había procurado
  alternative_spanish_readings:
  - Pero Saúl procuró
  - Y Saúl había buscado
  rationale: El pluscuamperfecto refleja que la acción de Saúl antecede al episodio narrado en el resto de la unidad. Esto respeta la organización temporal del hebreo y el flujo contextual del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo WLC y coincide con el auditor inglés en las decisiones clave: ''llamó'', ''les habló'', ''remanente de los amorreos'', ''les habían jurado'' y ''en su celo''. Se ajustó el español para mantener naturalidad sin perder la repetición léxica de בני ישראל ni la relación temporal del pluscuamperfecto. No se incorporaron revisiones textuales adicionales en esta pasada.'
  spanish_consistency_notes:
  - Se mantiene 'hijos de Israel' para reflejar de modo consistente בני ישראל en dos ocurrencias dentro del mismo versículo.
  - '''Celo'' se usa de forma coherente con el matiz de קנא aprobado en el auditor inglés, evitando ''celos'' por su asociación más restringida en español.'
  - '''Remanente'' y ''amorreos'' conservan la formulación étnica y narrativa del hebreo sin sustituirla por paráfrasis explicativa.'
  - Las notas al pie se limitan a alternativas lexicales ya documentadas por el contexto auditor y no añaden interpretaciones nuevas.
