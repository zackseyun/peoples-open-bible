  text: Y los días en que Salomón reinó en Jerusalén sobre todo Israel fueron cuarenta años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/הַ/יָּמִים
  english_pob_choice: And the days
  chosen_spanish: Y los días
  alternatives_spanish:
  - Ahora los días
  - Los días
  lexicon: HALOT
  rationale: Conservo la conjunción narrativa inicial con «Y», y traduzco הימים de modo literal como «los días», porque en este tipo de resumen real expresa la duración del reinado.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: en que
  alternatives_spanish:
  - que
  - durante los cuales
  lexicon: HALOT
  rationale: En español, «en que» expresa con naturalidad el valor temporal del relativo sin perder la estructura de cláusula relativa del hebreo.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: «Reinó» comunica de forma breve y estándar la acción de ejercer la realeza, como en los resúmenes regnales.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: standard proper-name convention
  rationale: Se usa la forma española tradicional y claramente reconocible del nombre propio.
- source_word: בִ/ירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa ב se rinde naturalmente con «en»; «Jerusalén» es la forma española estable del topónimo.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre toda Israel
  lexicon: HALOT
  rationale: Mantengo el sentido de dominio real de עַל con «sobre», y «todo Israel» preserva el referente colectivo nacional del hebreo.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Traducción directa y natural de la duración del reinado.
