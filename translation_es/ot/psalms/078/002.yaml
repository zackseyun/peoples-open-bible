translation:
  language: es
  text: Abriré mi boca en una parábola[a][d][b][c]; pronunciaré enigmas desde antiguo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un proverbio» o «en un dicho». El hebreo מָשָׁל puede denotar proverbio, parábola o dicho figurado.
    reason: lexical_alternative
  - marker: b
    text: O «dichos oscuros» o «acertijos».
    reason: lexical_alternative
  - marker: c
    text: O «desde tiempos antiguos».
    reason: lexical_alternative
  - marker: d
    text: Este versículo se cita en Mateo 13:35 en conexión con Jesús hablando en parábolas.
    reason: cross_reference
lexical_decisions:
- source_word: אֶפְתְּחָה
  english_pob_choice: I will open
  chosen_spanish: Abriré
  alternatives_spanish:
  - abriré mi boca
  - abriré mi boca para
  lexicon: HALOT
  rationale: La forma hebrea expresa una acción volitiva/futura en primera persona. En español, «Abriré» comunica de modo natural ese sentido, mientras que mantener explícitamente «mi boca» en el primer miembro queda cubierto por la siguiente frase y evita una repetición poco fluida.
- source_word: בְּמָשָׁל
  english_pob_choice: in a parable
  chosen_spanish: en una parábola
  alternatives_spanish:
  - con un proverbio
  - en un proverbio
  - en un dicho
  lexicon: HALOT
  rationale: מָשָׁל puede referirse a proverbio, parábola o dicho figurado. «Parábola» conserva el registro literario y figurado en español, y sigue de cerca la decisión auditada en inglés sin imponer el sentido técnico neotestamentario al hebreo.
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi habla
  - mi palabra
  lexicon: HALOT
  rationale: Se mantiene la expresión concreta del hebreo. En español, «mi boca» es natural y reproduce la imagen corporal del original mejor que una abstracción como «mi habla».
- source_word: אַבִּיעָה
  english_pob_choice: I will utter
  chosen_spanish: pronunciaré
  alternatives_spanish:
  - derramaré
  - expresar é
  - diré
  lexicon: HALOT
  rationale: El Hifil de נבע tiene el matiz de hacer brotar o manar, aplicado figuradamente al habla. «Pronunciaré» comunica en español la emisión verbal sin perder dignidad; «derramaré» sería más literal pero menos idiomático en este contexto.
- source_word: חִידוֹת
  english_pob_choice: riddles
  chosen_spanish: enigmas
  alternatives_spanish:
  - adivinanzas
  - enigmas oscuros
  - misterios
  lexicon: HALOT
  rationale: «Enigmas» es un equivalente directo y solemne para חִידוֹת. Aunque «riddles» se tradujo como «enigmas» en español aquí para evitar una connotación demasiado lúdica de «acertijos», se conserva el carácter enigmático del hebreo y la tensión lexical documentada en la nota inglesa.
- source_word: מִנִּי קֶדֶם
  english_pob_choice: from of old
  chosen_spanish: desde hace mucho tiempo
  alternatives_spanish:
  - desde antiguo
  - desde tiempos antiguos
  - de antaño
  lexicon: HALOT
  rationale: La frase señala antigüedad o tiempo remoto. «Desde hace mucho tiempo» es idiomático y claro en español, sin precisar indebidamente una época absoluta; mantiene el valor temporal amplio del hebreo.
theological_decisions:
- issue: Relación con la cita de Mateo 13:35 y el alcance de מָשָׁל / חִידוֹת
  english_pob_reading: The verse is rendered on its own Hebrew terms as 'parable' and 'riddles,' without harmonizing to the Greek citation's traditional 'things hidden.'
  chosen_spanish_reading: Se traduce el hebreo en sus propios términos como «parábola» y «enigmas», sin armonizarlo con una formulación neotestamentaria posterior.
  alternative_spanish_readings:
  - Abriré mi boca en proverbio; pronunciaré dichos oscuros desde antiguo.
  - Abriré mi boca en parábola; pronunciaré cosas ocultas desde tiempos antiguos.
  rationale: La decisión prioriza la evidencia del texto hebreo y conserva la tensión entre un habla figurada y un contenido enigmático. La referencia de Mateo es importante como eco intertextual, pero no debe reescribir el sentido primario del salmo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo WLC y la auditoría inglesa POB, sin cambios de revisión relevantes en la fuente aportada; se conserva la misma decisión de equivalencia óptima y la lectura de alto acuerdo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantiene «parábola» para מָשָׁל y «enigmas» para חִידוֹת, en correspondencia funcional con la auditoría inglesa.
  - Se evita «Cristo» porque no hay término griego Χριστός en el versículo.
  - La puntuación y el orden de notas siguen la convención de marcadores en el texto principal.
