translation:
  language: es
  text: 'Pero la vid les dijo: «¿He de dejar mi mosto[a], que alegra a Dios y a los hombres, e ir a mecerme sobre los árboles?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «mi mosto, que alegra a los dioses y a los hombres»; el hebreo usa אֱלֹהִים, formalmente plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַגֶּפֶן
  english_pob_choice: the vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  - la vid de uvas
  lexicon: HALOT
  rationale: En el habla bíblica, גֶּפֶן designa la vid como planta; «vid» es el equivalente natural y literario en español, y evita la expansión explicativa de «parra» o «vid de uvas».
- source_word: הֶחֳדַלְתִּי
  english_pob_choice: Should I stop my new wine
  chosen_spanish: ¿He de dejar…?
  alternatives_spanish:
  - ¿Debo cesar…?
  - ¿He dejado…?
  lexicon: HALOT
  rationale: La forma hebrea es una primera persona perfecta con valor deliberativo en contexto; en español, una pregunta retórica con «¿He de…?» conserva bien ese matiz sin añadir un verbo ajeno al hebreo.
- source_word: תִּירוֹשִׁי
  english_pob_choice: my new wine
  chosen_spanish: mi mosto
  alternatives_spanish:
  - mi vino nuevo
  - mi vino joven
  lexicon: HALOT
  rationale: תִּירוֹשׁ suele referirse al vino nuevo o mosto. «Mosto» preserva el carácter de bebida recién obtenida y evita la ambigüedad de «vino» en español, aunque «vino nuevo» sigue siendo una alternativa válida.
- source_word: הַמְשַׂמֵּחַ
  english_pob_choice: which gladdens
  chosen_spanish: que alegra
  alternatives_spanish:
  - que hace alegrar
  - que da alegría
  lexicon: HALOT
  rationale: El participio causativo pide una relativa breve y natural. «Que alegra» reproduce el valor de causar gozo sin recargar la frase.
- source_word: אֱלֹהִים וַאֲנָשִׁים
  english_pob_choice: God and men
  chosen_spanish: a Dios y a los hombres
  alternatives_spanish:
  - a Dios y a los seres humanos
  - a los dioses y a los hombres
  lexicon: HALOT
  rationale: En el texto hebreo אֱלֹהִים está en plural morfológico, pero la revisión del POB en inglés optó por «God»; en español se mantiene «Dios» por concordancia con esa decisión editorial y por ser la forma más inteligible para el lector, dejando abierta la tensión interpretativa en una nota.
- source_word: וְהָלַכְתִּי
  english_pob_choice: and go
  chosen_spanish: e ir
  alternatives_spanish:
  - y andar
  - y marcharme
  lexicon: HALOT
  rationale: «Ir» refleja el movimiento simple del hebreo sin añadir dirección o intensificación. La conjunción «e» evita el hiato ante «ir».
- source_word: לָנוּעַ
  english_pob_choice: to sway over
  chosen_spanish: a mecerme
  alternatives_spanish:
  - a moverme de un lado a otro
  - a ondular
  lexicon: HALOT
  rationale: El verbo נוע alude a moverse o balancearse. «Mecerme» conserva la imagen física de oscilación y funciona en español poético; aunque «sway over» también sugiere dominio, aquí se prioriza la imagen verbal del hebreo.
- source_word: עַל הָעֵצִים
  english_pob_choice: over the trees
  chosen_spanish: sobre los árboles
  alternatives_spanish:
  - encima de los árboles
  - por encima de los árboles
  lexicon: HALOT
  rationale: «Sobre los árboles» es la equivalencia directa y natural de עַל en esta imagen. Mantiene la espacialidad sin convertirla en una paráfrasis de realeza o gobierno.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la frase que describe al vino como algo que alegra a Dios/Dioses y a los hombres
  english_pob_reading: God and men
  chosen_spanish_reading: Dios y los hombres
  alternative_spanish_readings:
  - los dioses y los hombres
  - Dios y los seres humanos
  rationale: La tradición auditada del POB en inglés decidió conservar «God». Para el texto español, «Dios» respeta esa lectura editorial y sigue siendo idiomático; no obstante, el hebreo plural permite una tensión que no debe borrarse, por lo que se documenta la alternativa plural en la nota.
  doctrine_reference: Preservar la tensión textual sin imponer una corrección teológica moderna; primacía del hebreo y del audit trail editorial.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió una formulación más literal de «my new wine» y mantuvo «God» en la línea principal, pero el hebreo sigue mostrando la forma plural אֱלֹהִים. En español se ha optado por una línea principal fiel al audit trail y una nota que conserva la alternativa interpretativa.
  spanish_consistency_notes:
  - Se usa «vid» para גֶּפֶן como término bíblico natural y consistente con el registro literario.
  - «Mosto» se eligió por su cercanía semántica a תִּירוֹשׁ y por ser más preciso que «vino» en español.
  - Se mantuvo «Dios» en el texto principal por coherencia con la revisión inglesa, pero la nota preserva la alternativa «a Dios y a los hombres» como reflejo de la tensión del hebreo.
  - La puntuación y el estilo buscan una cadencia bíblica moderna sin calcos forzados.
