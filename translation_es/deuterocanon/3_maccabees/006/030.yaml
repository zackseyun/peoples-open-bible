translation:
  language: es
  text: Entonces el rey[a], después de hacer venir a la ciudad al encargado de los ingresos, ordenó que se suministraran vino y las demás provisiones adecuadas para el banquete a los judíos por siete días, decidiendo que en el mismo lugar donde habían esperado sufrir la destrucción, en ese lugar celebraran su liberación con toda alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «celebrar su salvación». El término griego puede significar liberación o salvación; aquí se refiere al regocijo por haber sido rescatados de la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐπὶ τῶν προσόδων
  english_pob_choice: the one in charge of the revenues
  chosen_spanish: el encargado de los ingresos
  alternatives_spanish:
  - el oficial de los ingresos
  - el recaudador
  - el tesorero
  lexicon: LSJ
  rationale: La expresión griega designa a un funcionario responsable de los ingresos/recaudación. «Encargado de los ingresos» conserva el sentido administrativo sin fijar un cargo técnico más específico de lo que el texto exige.
- source_word: προσκαλεσάμενος
  english_pob_choice: after summoning
  chosen_spanish: después de llamar
  alternatives_spanish:
  - habiendo llamado
  - después de convocar
  - llamando
  lexicon: BDAG
  rationale: El participio antecede a la acción principal; «después de llamar» comunica bien la secuencia en español natural.
- source_word: οἴνους
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vinos
  lexicon: LSJ
  rationale: Aunque el griego está en plural, en español «vino» funciona como sustantivo de masa en este contexto festivo y evita una pluralidad artificial.
- source_word: τὰ λοιπὰ πρὸς εὐωχίαν ἐπιτήδεια
  english_pob_choice: the other provisions suitable for feasting
  chosen_spanish: los demás provisiones adecuadas para el banquete
  alternatives_spanish:
  - los demás suministros adecuados para la celebración
  - las otras provisiones aptas para el banquete
  lexicon: LSJ
  rationale: «ἐπιτήδεια» son provisiones o suministros; «πρὸς εὐωχίαν» apunta a un banquete festivo. En español, «para el banquete» comunica el uso sin añadir matices ajenos.
- source_word: χορηγεῖν
  english_pob_choice: be supplied
  chosen_spanish: se suministraran
  alternatives_spanish:
  - se proveyeran
  - se facilitaran
  - se abastecieran
  lexicon: LSJ
  rationale: El infinitivo depende de la orden real y expresa provisión oficial. La pasiva impersonal en español preserva ese matiz administrativo.
- source_word: κρίνας
  english_pob_choice: deciding
  chosen_spanish: decidiendo
  alternatives_spanish:
  - juzgando
  - determinando
  - resolviendo
  lexicon: LSJ
  rationale: Aquí el participio introduce la resolución del rey; «decidiendo» es fiel y natural sin cargarlo de un matiz judicial más fuerte del que requiere el contexto.
- source_word: ἔδοξαν
  english_pob_choice: had expected
  chosen_spanish: habían pensado
  alternatives_spanish:
  - habían esperado
  - les había parecido
  - habían creído
  lexicon: LSJ
  rationale: En contexto se trata de la percepción de una destrucción inminente. «Habían pensado» conserva la idea de haberlo considerado/tenido por cierto sin volverla extraña en español.
- source_word: τὸν ὄλεθρον ἀναλαμβάνειν
  english_pob_choice: to meet destruction
  chosen_spanish: recibir la destrucción
  alternatives_spanish:
  - sufrir la destrucción
  - encontrar la destrucción
  - caer en la destrucción
  lexicon: LSJ
  rationale: El giro idiomático se expresa de modo natural en español. «Recibir la destrucción» mantiene la relación semántica con el resultado fatal esperado, sin sobreinterpretar.
- source_word: σωτήρια ἀγαγεῖν
  english_pob_choice: celebrate their deliverance
  chosen_spanish: celebraran su liberación
  alternatives_spanish:
  - celebraran su salvación
  - hicieran una celebración de liberación
  - celebraran su rescate
  lexicon: LSJ
  rationale: El sustantivo neutro plural tiene fuerza de rescate/liberación en este contexto narrativo. «Liberación» conserva la referencia al hecho de haber sido salvados de la destrucción, sin forzar terminología técnica religiosa.
- source_word: ἐν εὐφροσύνῃ πάσῃ
  english_pob_choice: with all rejoicing
  chosen_spanish: con toda alegría
  alternatives_spanish:
  - con todo regocijo
  - en toda alegría
  - con gran alegría
  lexicon: LSJ
  rationale: La frase intensifica el modo festivo. «Con toda alegría» es idiomático y refleja la plenitud de πάσῃ.
theological_decisions:
- issue: σωτήρια en un contexto narrativo de rescate
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: El contexto inmediato es la salida de una amenaza de muerte y la celebración correspondiente. «Liberación» mantiene el valor de rescate histórico sin imponer una terminología más doctrinal de lo que el pasaje reclama; «salvación» sigue siendo posible, pero en español puede sonar más teológico que narrativo aquí.
  doctrine_reference: 'Principio POB: primacía del original y de la función contextual del término; claridad moderna sin borrar la fuerza soteriológica.'
translation_notes:
  revision_awareness: El pasaje griego y la auditoría inglesa muestran alta concordancia; no hay revisiones aplicadas. La versión española sigue la misma lectura contextual de σωτήρια como rescate/liberación y conserva el orden narrativo del participio antecedente al mandato principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar de la serie, aunque este versículo no contiene el nombre divino.
  - Se usa «liberación» en lugar de «salvación» en el cuerpo para reflejar el contexto inmediato de rescate de la destrucción, pero se documenta la alternativa en nota.
  - Se evita calcar la pluralidad de «wine» con «vinos», porque en español suena antinatural en este contexto.
  - Se conserva un estilo bíblico claro y contemporáneo, sin recurrir a fórmulas eclesiásticas tradicionales no exigidas por el griego.
