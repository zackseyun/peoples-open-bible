translation:
  language: es
  text: 'Esto será tuyo de las cosas santísimas, del fuego[a]: toda ofrenda de ellos, toda ofrenda vegetal de ellos, toda ofrenda por el pecado[b] de ellos, y toda ofrenda por la culpa[c] de ellos, que me presentan[d]. Es cosa santísima para ti y para tus hijos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las cosas santísimas». El hebreo también puede entenderse literalmente como «del fuego»; en este contexto se trata de porciones apartadas de lo ofrecido por fuego.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «ofrenda de purificación».
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «ofrenda de reparación».
    reason: lexical_alternative
  - marker: d
    text: O «que me restituyen» o «que me devuelven». El verbo hebreo puede abarcar la idea de devolver o presentar; aquí el contexto sacrificial favorece «me presentan».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: from the most holy things
  chosen_spanish: de entre las cosas santísimas
  alternatives_spanish:
  - de entre las cosas más santas
  - de entre lo santísimo
  lexicon: HALOT
  rationale: La expresión hebrea funciona como superlativo cultual y describe la categoría de las porciones sacrificables, no un lugar. «Cosas santísimas» conserva el valor superlativo y evita confundirlo con el recinto del santuario.
- source_word: מִן הָאֵשׁ
  english_pob_choice: from the fire
  chosen_spanish: de entre el fuego
  alternatives_spanish:
  - del fuego
  - desde el fuego
  lexicon: HALOT
  rationale: Se mantiene la literalidad de la preposición y del sustantivo, porque el contexto sacrificial permite entender que se trata de porciones procedentes de lo ofrecido por fuego. «De entre el fuego» suena natural en español sin borrar la imagen cultual.
- source_word: קָרְבָּנָם
  english_pob_choice: every offering of theirs
  chosen_spanish: toda ofrenda de ellos
  alternatives_spanish:
  - todo sacrificio de ellos
  - toda presentación de ellos
  lexicon: HALOT
  rationale: «Ofrenda» es el equivalente más claro y abarcador para קָרְבָּן en este listado general de dones sacrificiales.
- source_word: מִנְחָתָם
  english_pob_choice: every grain offering of theirs
  chosen_spanish: toda ofrenda vegetal de ellos
  alternatives_spanish:
  - toda ofrenda de cereal de ellos
  - toda ofrenda de grano de ellos
  lexicon: HALOT
  rationale: En español, «ofrenda vegetal» comunica bien la ofrenda de cereal/grano sin sonar demasiado técnica. Se evita «grano» como único término para no perder el carácter ritual de la ofrenda.
- source_word: חַטָּאתָם
  english_pob_choice: every sin offering of theirs
  chosen_spanish: toda ofrenda por el pecado de ellos
  alternatives_spanish:
  - toda ofrenda por el pecado/purificación de ellos
  - toda ofrenda purificadora de ellos
  lexicon: HALOT
  rationale: Se conserva la tensión léxica entre «pecado» y «purificación». Aquí se traduce como ofrenda por el pecado, con nota alternativa para no borrar la posible fuerza ritual de purificación.
- source_word: אֲשָׁמָם
  english_pob_choice: every guilt offering of theirs
  chosen_spanish: toda ofrenda por la culpa de ellos
  alternatives_spanish:
  - toda ofrenda de reparación de ellos
  - toda ofrenda por la culpa/reparación de ellos
  lexicon: HALOT
  rationale: «Ofrenda por la culpa» mantiene el paralelismo con la serie sacrificial y deja abierta la dimensión de reparación que algunos estudiosos subrayan.
- source_word: אֲשֶׁר יָשִׁיבוּ לִי
  english_pob_choice: which they render to me
  chosen_spanish: que me presentan
  alternatives_spanish:
  - que me entregan
  - que me restituyen
  lexicon: HALOT
  rationale: El verbo הֵשִׁיב puede sugerir devolver, restituir o presentar. En esta lista cultual, «me presentan» evita estrechar el sentido a restitución económica y funciona bien con el conjunto de ofrendas enumeradas.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: It is most holy
  chosen_spanish: Será cosa santísima
  alternatives_spanish:
  - Será sumamente santo
  - Será santísimo
  lexicon: HALOT
  rationale: Como predicado de estado, «cosa santísima» es una fórmula natural y fiel; preserva el carácter sacro intensificado sin introducir un sentido espacial.
- source_word: לְךָ ... וּלְבָנֶיךָ
  english_pob_choice: for you and for your sons
  chosen_spanish: para ti y para tus hijos
  alternatives_spanish:
  - para ti y para tus descendientes
  - para ti y para tus hijos varones
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «sons», en español «hijos» puede leerse de modo genérico. Sin embargo, dado el contexto sacerdotal, se conserva la referencia masculina implícita por medio de la nota teológica y del contexto inmediato, evitando una fórmula demasiado dura en el cuerpo del texto.
theological_decisions:
- issue: Naturaleza de «מִקֹּדֶשׁ הַקֳּדָשִׁים» como categoría sacrificial y no como lugar
  english_pob_reading: most holy things
  chosen_spanish_reading: cosas santísimas
  alternative_spanish_readings:
  - santo de los santos
  - lo santísimo
  rationale: El hebreo aquí clasifica porciones ofrecidas; no alude al Lugar Santísimo. «Cosas santísimas» preserva la superlatividad cultual sin importar una referencia arquitectónica ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Alcance de «חַטָּאתָם» entre pecado y purificación
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado/purificación
  rationale: La POB inglesa mantiene «sin offering» con una nota alternativa de «purification offering». En español se conserva «por el pecado» en el texto principal, pero se anota la alternativa para no borrar la dimensión ritual de purificación.
  doctrine_reference: Lexical note policy; Translation philosophy §2
- issue: Referencia masculina de la línea sacerdotal
  english_pob_reading: for you and for your sons
  chosen_spanish_reading: para ti y para tus hijos
  alternative_spanish_readings:
  - para ti y para tus hijos varones
  - para ti y para tus descendientes
  rationale: El hebreo dice literalmente «tus hijos» y el contexto es el sacerdocio aarónico, transmitido por línea masculina. «Hijos» suena natural en español y puede funcionar como herencia familiar; la nota deja claro el alcance específico.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditable inglés: se mantiene la literalidad de «from the fire» sin ampliar a «reserved from the fire», y se conserva el registro formal de la relación cultual. También se respeta la decisión revisada de expresar el verbo final de manera más directa en vez de una paráfrasis más explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - Se mantiene «ofrenda» como término general para קָרְבָּן, y se distinguen las ofrendas específicas con adjetivos o complementos.
  - «Ofrenda vegetal» se emplea para מִנְחָה en este contexto sacerdotal, siguiendo el valor de ofrenda de cereal/grano.
  - La fórmula «cosa santísima» evita confundir la categoría ritual con el Lugar Santísimo.
  - La referencia de parentesco se deja en «hijos» por fidelidad al contexto sacerdotal masculino, sin neutralizarla a «descendientes» en el texto principal.
