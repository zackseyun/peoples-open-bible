    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'man according to his language,' a distributive expression meaning 'each according to his language.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the coastlands of the nations were divided'.
    reason: previous_rendering
