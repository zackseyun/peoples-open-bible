translation:
  language: es
  text: 'Así hablaron al rey de Asiria, diciendo: «Las naciones que tú has exiliado y asentado en las ciudades de Samaria no conocen la ley del dios de la tierra; por eso ha enviado leones entre ellos, y he aquí[a], los están matando[b], porque no conocen la ley del dios de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede expresarse «y miren» o «y vean», pero «y he aquí» refleja mejor en español el valor deíctico y el registro formal de la partícula hebrea.
    reason: lexical_alternative
  - marker: b
    text: El participio hebreo expresa una acción en curso; por eso se traduce «los están matando».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, el término designa a los grupos poblacionales trasladados por Asiria. «Las naciones» conserva el sentido colectivo y político sin cargar el término con asociaciones neotestamentarias.
- source_word: הִגְלִיתָ
  english_pob_choice: you have exiled
  chosen_spanish: has exiliado
  alternatives_spanish:
  - has deportado
  - has llevado cautivos
  lexicon: HALOT
  rationale: El verbo expresa una remoción forzada al destierro. «Exiliado» comunica bien esa coerción en español actual y mantiene la claridad del acto asirio.
- source_word: וַתּוֹשֶׁב
  english_pob_choice: and settled
  chosen_spanish: y establecido
  alternatives_spanish:
  - y asentado
  - y hecho habitar
  lexicon: HALOT
  rationale: El causativo de ישׁב indica que fueron colocados en un lugar de residencia. «Establecido» es una forma natural y fiel; «hecho habitar» sería más literal, pero menos fluido.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  english_pob_choice: in the cities of Samaria
  chosen_spanish: en las ciudades de Samaria
  alternatives_spanish:
  - en las ciudades samaritanas
  lexicon: HALOT
  rationale: Se conserva la referencia regional de la frase constructa sin reducirla solo a la ciudad principal. «Ciudades de Samaria» es claro y formal.
- source_word: מִשְׁפַּט
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - mandato
  - norma
  - decreto
  lexicon: HALOT
  rationale: Aunque el campo semántico puede abarcar costumbre o requisito, la revisión del POB inglés decidió «law» por el registro formal y por ajustarse al modo en que los hablantes presentan la exigencia cultual del dios local. «Ley» preserva bien esa fuerza normativa en español.
- source_word: אֱלֹהֵי הָאָרֶץ
  english_pob_choice: the god of the land
  chosen_spanish: el dios de la tierra
  alternatives_spanish:
  - el Dios de la tierra
  lexicon: HALOT
  rationale: Se mantiene «dios» en minúscula para reflejar la perspectiva de los hablantes citados, que interpretan a Yahvé como deidad territorial. En el contexto narrativo, el referente sigue siendo el Dios de Israel, pero la forma española conserva esa tensión.
- source_word: וַיְשַׁלַּח בָּם אֶת הָאֲרָיוֹת
  english_pob_choice: so he has sent lions among them
  chosen_spanish: por eso ha enviado leones entre ellas
  alternatives_spanish:
  - y envió leones entre ellos
  - por eso envió leones contra ellos
  lexicon: HALOT
  rationale: El verbo פשוטmente significa «enviar»; «entre ellas» reproduce de modo idiomático בָּם. Se mantiene el presente perfecto para reflejar el resultado vigente en el discurso reportado.
- source_word: וְהִנָּם
  english_pob_choice: behold
  chosen_spanish: y miren
  alternatives_spanish:
  - y he aquí
  - y vean
  lexicon: HALOT
  rationale: La partícula introduce una percepción vívida e inmediata. «Y miren» suena natural en español y conserva la fuerza de señalamiento; el matiz más solemne de «he aquí» también sería posible.
- source_word: מְמִיתִים אוֹתָם
  english_pob_choice: they are killing them
  chosen_spanish: los están matando
  alternatives_spanish:
  - los matan
  - los están dando muerte
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Los están matando» conserva el aspecto progresivo y la viveza del reporte; «los matan» sería más breve pero menos explícito en curso.
theological_decisions:
- issue: Capitalización de «dios» en la expresión reportada «el dios de la tierra»
  english_pob_reading: lowercase 'god' in the main text
  chosen_spanish_reading: minúscula en la frase principal
  alternative_spanish_readings:
  - «el Dios de la tierra»
  rationale: El texto cita la comprensión de los pueblos trasladados, que hablan de la deidad local en términos territoriales. La minúscula preserva esa perspectiva reportada sin negar que el referente, en la narrativa, es Yahvé.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la tensión narrativa
- issue: Valor de מִשְׁפַּט en el contexto cultual
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - costumbre
  - mandato
  - norma
  rationale: La revisión inglesa del POB prefirió «law» por el tono formal y por la idea de una exigencia cultual esperada del dios de la tierra. En español, «ley» transmite mejor esa normatividad sin suavizarla a mera costumbre.
  doctrine_reference: Léxico contextual y equivalencia funcional controlada
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que reemplazó «custom» por «law» para מִשְׁפַּט y elevó «behold» frente a «look». La versión española sigue esa decisión léxica principal con «ley» y opta por «y miren» como equivalente natural y vívido de וְהִנָּם, manteniendo además la minúscula en «dios» para reflejar la perspectiva de los hablantes citados.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Yahvé como «dios» en la cita reportada, sin capitalización devocional no marcada en el original.
  - Se conserva la estructura narrativa en una sola oración larga, acorde con el hebreo y el inglés auditado.
  - «Exiliado» y «establecido» sostienen un registro claro y formal sin perder la coerción del desplazamiento asirio.
  - Las notas se limitan a alternativas léxicas realmente presentes en el audit trail, sin introducir glosas ajenas.
