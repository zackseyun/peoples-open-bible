translation:
  language: es
  text: 'Pero ellos dijeron[a]: «¿Iba a tratar a nuestra hermana como a una prostituta?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Iba a hacer de nuestra hermana una prostituta?». El verbo hebreo es literalmente «hacer», pero aquí probablemente tiene el sentido de «tratar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But they said
  chosen_spanish: Pero ellos dijeron
  alternatives_spanish:
  - Y dijeron
  - Entonces dijeron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la respuesta de los hermanos; «pero» conserva el matiz adversativo frente a la reprensión de Jacob en el versículo anterior, y «dijeron» mantiene el valor narrativo simple sin añadir interpretación.
- source_word: הַכְזוֹנָה
  english_pob_choice: like a prostitute
  chosen_spanish: como a una prostituta
  alternatives_spanish:
  - como prostituta
  - como a una ramera
  lexicon: HALOT
  rationale: 'La secuencia interrogativa con כ expresa comparación: «como a una prostituta». Se prefiere «prostituta» por ser claro y contemporáneo; «ramera» sería más tradicional pero menos neutral en español actual.'
- source_word: יַעֲשֶׂה
  english_pob_choice: Should he treat
  chosen_spanish: Debía tratar
  alternatives_spanish:
  - Debía hacer
  - Habría de tratar
  lexicon: HALOT
  rationale: El verbo עשה literalmente significa «hacer», pero en este contexto de afrenta y deshonra el POB inglés documenta el sentido de «tratar». En español, «tratar a» comunica ese valor idiomático sin perder la tensión del original.
- source_word: אֶת
  english_pob_choice: our sister
  chosen_spanish: a nuestra hermana
  alternatives_spanish:
  - a nuestra hermana
  - nuestra hermana
  lexicon: HALOT
  rationale: La partícula de objeto directo se refleja naturalmente con la preposición «a» ante persona en español. No se traduce de manera independiente, pero ayuda a fijar la relación sintáctica.
- source_word: אֲחוֹתֵנוּ
  english_pob_choice: our sister
  chosen_spanish: nuestra hermana
  alternatives_spanish:
  - la hermana de nosotros
  lexicon: HALOT
  rationale: Se conserva el vínculo familiar y el énfasis en el honor de la hermana, central en la respuesta de los hermanos.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones; se mantiene la lectura adversativa de «But» y la opción lexical de «treat» como base para la equivalencia española.
  spanish_consistency_notes:
  - Se mantiene «nuestra hermana» para preservar el lazo de parentesco y la carga de honor/ofensa del contexto.
  - Se usa «prostituta» como equivalente moderno y claro de זונה, evitando un arcaísmo innecesario.
  - La pregunta retórica se conserva con orden natural del español y sin ampliar el sentido del verbo hebreo.
