  yaml_path: translation/ot/jeremiah/044/009.yaml
  text: Have you forgotten the evil deeds of your fathers[a], the evil deeds of the kings of Judah, the evil deeds of their wives, your own evil deeds, and the evil deeds of your wives[b], which they did in the land of Judah and in the streets of Jerusalem?
