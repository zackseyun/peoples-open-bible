  to: Se espantarán; dolores y dolores de parto los tomarán. Se retorcerán como mujer que da a luz. Cada hombre se quedará mirando a su prójimo; sus rostros serán rostros de llama[a].
  rationale: 'Se hicieron ajustes menores para reflejar mejor el hebreo y sonar más natural en español: «dolores de parto» por idiomaticidad y precisión contextual; «se quedará mirando» para conservar el matiz de estupor fijo de יִתְמָהוּ; y una leve mejora estilística de la nota al pie.'
