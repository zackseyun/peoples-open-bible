  to: Y he aquí[a], Amarías, el sacerdote principal, está a cargo de ustedes en todo asunto de Yahvé, y Zebadías, hijo de Ismael, el príncipe de la casa de Judá, en todo asunto del rey; y los levitas servirán como oficiales delante de ustedes. Esfuércense y actúen, y que Yahvé esté con quien haga el bien[b].
