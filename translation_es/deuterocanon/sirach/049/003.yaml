translation:
  language: es
  text: Dirigió su corazón a Dios[a], y en días de violencia mostró lealtad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «hacia el Señor» en lugar del hebreo «a Dios».
    reason: alternative_reading
  - marker: b
    text: O «mostró bondad»; el griego interpreta la frase con más claridad como «fortaleció la piedad/godliness».
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתם
  english_pob_choice: directed
  chosen_spanish: dirigió
  alternatives_spanish:
  - puso en orden
  - enderezó
  - fijó
  lexicon: HALOT
  rationale: El hebreo compuesto es algo incierto, pero el paralelo griego κατεύθυνεν apoya claramente la idea de orientar o dirigir. «Dirigió» conserva el movimiento intencional y suena natural en español.
- source_word: אל אל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - al Señor
  lexicon: HALOT
  rationale: El hebreo conservado dice «a Dios», mientras que el griego tiene «hacia el Señor». La traducción principal sigue el hebreo visible del testimonio base y deja la variante griega en nota.
- source_word: לבו
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: «Corazón» mantiene el término antropológico bíblico y no reduce indebidamente el sentido a lo mental.
- source_word: ובימי חמס
  english_pob_choice: in days of violence
  chosen_spanish: en días de violencia
  alternatives_spanish:
  - en días violentos
  - en días de iniquidad
  - en días de hombres violentos
  lexicon: HALOT
  rationale: «Violencia» refleja bien חמס y preserva el contraste moral-social. También deja espacio para la lectura griega de impiedad o ilegalidad sin imponerla en el cuerpo principal.
- source_word: עשה חסד
  english_pob_choice: showed loyalty
  chosen_spanish: mostró lealtad
  alternatives_spanish:
  - hizo bondad
  - mostró misericordia
  - practicó fidelidad
  - mostró bondad leal
  lexicon: HALOT
  rationale: La revisión inglesa optó por «showed loyalty» como una forma más natural y directa de חסד. En español, «mostró lealtad» preserva el valor de fidelidad pactal sin convertirlo en mera amabilidad interpersonal; también deja visible la tensión con la interpretación griega de piedad.
theological_decisions:
- issue: 'Final clause: loyalty/covenant fidelity versus piety/godliness'
  english_pob_reading: he showed loyalty
  chosen_spanish_reading: mostró lealtad
  alternative_spanish_readings:
  - mostró piedad
  - practicó devoción fiel
  - hizo misericordia
  rationale: El hebreo sugiere חסד, que puede abarcar lealtad pactal o bondad; el griego lo interpreta de manera más explícita como εὐσέβεια ('piedad'). La frase principal adopta «mostró lealtad» para conservar la fuerza relacional y devocional sin borrar la lectura religiosa que el paralelo griego aporta.
  doctrine_reference: 'Principio POB: mantener la tensión lexical-teológica documentada en las fuentes, usando el paralelo griego como testimonio real y no como simple paráfrasis.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que simplificó la segunda cláusula a «showed loyalty», pero mantiene la tensión con la tradición hebrea y la explicitación griega. La versión española evita una paráfrasis excesiva y conserva el paralelismo de dos miembros breves.
  spanish_consistency_notes:
  - Se usa «Dios» en el cuerpo principal conforme al hebreo, con nota para la variante griega «el Señor».
  - Se evita «SEÑOR» como máscara litúrgica porque aquí el testimonio base conservado es hebreo y el griego aporta una variante secundaria.
  - «Mostró lealtad» se prefiere a «hizo misericordia» para no reducir חסד a un acto meramente social; la nota deja constancia de la alternativa.
  - La puntuación reproduce un paralelismo breve y solemne apto para lectura bíblica pública.
