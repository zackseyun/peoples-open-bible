revisions:
- from: 'Los ancianos de Jabes le dijeron: «Danos siete días de respiro, y enviaremos mensajeros por todo el territorio de Israel. Entonces, si no hay nadie que nos salve, saldremos a ti»[a].'
  to: 'Los ancianos de Jabes le dijeron: «Danos siete días de respiro, y enviaremos mensajeros por todo el territorio de Israel. Entonces, si no hay nadie que nos salve, saldremos hacia ti[a]».'
  rationale: Se ajustó «saldremos a ti» a «saldremos hacia ti» para conservar mejor el sentido literal del hebreo en un español más natural, sin sobreinterpretar como capitulación en el texto principal. También se movió el marcador de nota para anclarlo exactamente a la frase explicada.
