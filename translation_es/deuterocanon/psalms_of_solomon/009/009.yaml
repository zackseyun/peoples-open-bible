translation:
  language: es
  text: El que hace justicia[a] atesora vida para sí con Yahvé[b], y el que hace injusticia es él mismo responsable de su alma[c] para destrucción[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «ante Yahvé» o «de parte de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: «Alma» también puede entenderse como «vida» o «sí mismo».
    reason: lexical_alternative
  - marker: d
    text: O «en ruina».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ποιῶν
  english_pob_choice: the one who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - quien hace
  - el que practica
  lexicon: BDAG
  rationale: La construcción participial substantivada se vierte naturalmente con un relativo personal en español. «El que hace» conserva la fuerza verbal sin añadir habitualidad más marcada que la del griego.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: Aquí el contraste moral encaja bien con «justicia», y además el audit trail documenta explícitamente la alternativa «does justice». En español, «justicia» comunica la misma fuerza ética sin perder el valor forense/covenantal posible del término.
- source_word: θησαυρίζει
  english_pob_choice: stores up
  chosen_spanish: atesora
  alternatives_spanish:
  - almacena
  - guarda
  - acumula
  lexicon: BDAG
  rationale: «Atesora» conserva la imagen de tesoro del verbo y sugiere acumulación con un matiz más bíblico y natural que un calco como «guarda».},{
theological_decisions:
- issue: Relación con el nombre divino en παρὰ Κυρίῳ
  english_pob_reading: with the Lord
  chosen_spanish_reading: con Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - de parte de Yahvé
  rationale: El texto griego usa κύριος; en este proyecto, cuando el audit trail inglés refleja la referencia divina, se emplea «Yahvé» en vez de la convención de ocultar el nombre. «Con Yahvé» sigue de cerca la lectura relacional elegida en inglés, sin forzar un valor distinto.
  doctrine_reference: Project default for יהוה / YHWH
- issue: Sentido de αἴτιος τῆς ψυχῆς ἐν ἀπωλείᾳ
  english_pob_reading: is himself responsible for his soul in destruction
  chosen_spanish_reading: es él mismo responsable de su alma en destrucción
  alternative_spanish_readings:
  - es culpable de la destrucción de su alma
  - es responsable de su propia ruina
  rationale: La cláusula griega es compacta y mantiene la responsabilidad personal más que el mecanismo de ruina. «Responsable de su alma en destrucción» conserva esa tensión sin explicitar más de lo que el texto dice.
  doctrine_reference: Preservation of moral agency and self-incurred judgment
- issue: Sentido de ψυχή
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - sí mismo
  rationale: En este contexto moral y escatológico, «alma» mantiene el peso del aviso. Se conserva la posibilidad semántica más amplia, pero sin diluir el tono religioso del dicho.
  doctrine_reference: Project default for ψυχή when religious/moral context predominates
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que ajustó la segunda cláusula para reflejar más directamente καὶ y la forma compacta de αἴτιος τῆς ψυχῆς ἐν ἀπωλείᾳ, evitando expandirla a una expresión causal más interpretativa que el griego no exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para κύριος cuando refiere al nombre divino.
  - Se usó «justicia» como opción válida y marcada, mientras la nota preserva la alternativa «justicia/rectitud» del campo semántico.
  - Se evitó «siervo» para δοῦλος porque aquí no aplica; el verso trata de agencia moral, no de estatus servil.
  - Se preservó la estructura coordinada de las dos mitades con «y», reflejando καὶ sin introducir contraste no presente en el griego.
