translation:
  language: es
  text: 'Entonces Yahvé se volvió hacia él y le dijo[a]: «Ve con esta fuerza tuya y salva a Israel de la mano de Madián[b]. ¿No te he enviado yo?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con esta fuerza tuya». El hebreo puede entenderse de modo instrumental o locativo, y el demostrativo añade énfasis.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de la mano de Madián», un modismo para la liberación del poder o control de Madián.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo conforme al criterio del proyecto; en español, «Yahvé» es la forma establecida para YHWH y evita la sustitución por un título masking como «el SEÑOR».
- source_word: וַיִּפֶן אֵלָיו
  english_pob_choice: turned to him
  chosen_spanish: se volvió hacia él
  alternatives_spanish:
  - se giró hacia él
  - miró hacia él
  lexicon: HALOT
  rationale: פנה expresa un giro o volverse hacia alguien. «Se volvió hacia él» mantiene la acción narrativa sin reducirla a mera mirada.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: En español, con destinatario explícito, «le dijo» suena natural y conserva el valor narrativo de אמר.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo de הלך se rinde con «Ve», directo y acorde a una comisión.
- source_word: בְּכֹחֲךָ זֶה
  english_pob_choice: in this strength of yours
  chosen_spanish: con esta fuerza tuya
  alternatives_spanish:
  - en esta fuerza tuya
  - con tu fuerza, esta
  lexicon: HALOT
  rationale: El hebreo puede leerse de modo instrumental o locativo, con el demostrativo enfatizando. En español, «con esta fuerza tuya» preserva el matiz instrumental y la fuerza enfática del demostrativo.
- source_word: וְהוֹשַׁעְתָּ
  english_pob_choice: and save
  chosen_spanish: y salva
  alternatives_spanish:
  - y librarás
  - y rescata
  lexicon: HALOT
  rationale: En contexto de comisión, la forma funciona como mandato coordinado. «Salva» reproduce la fuerza verbal y mantiene la sencillez del hebreo.
- source_word: מִכַּף מִדְיָן
  english_pob_choice: from the hand of Midian
  chosen_spanish: de la mano de Madián
  alternatives_spanish:
  - del poder de Madián
  - de la mano de Midián
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como idioma de poder o control. «Madián» sigue la forma española habitual del topónimo.
- source_word: הֲלֹא
  english_pob_choice: Have I not
  chosen_spanish: ¿No te he enviado yo?
  alternatives_spanish:
  - ¿Acaso no te he enviado?
  - ¿No fui yo quien te envió?
  lexicon: HALOT
  rationale: 'El hebreo introduce una pregunta retórica cuyo remate está en el verbo final. En español, se integra la pregunta completa para conservar el golpe retórico: la base de la autoridad del envío divino.'
- source_word: שְׁלַחְתִּיךָ
  english_pob_choice: sent you
  chosen_spanish: te he enviado
  alternatives_spanish:
  - te envié
  - te mandé
  lexicon: HALOT
  rationale: שׁלח conserva el sentido básico de enviar. El perfecto español con valor actual comunica adecuadamente la comisión divina ya dada.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto revelado en el hebreo, conforme al criterio del POB de no ocultarlo bajo un título genérico. «Yahvé» es la forma española de uso amplio para YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La comisión divina expresada con הוֹשַׁעְתָּ y שְׁלַחְתִּיךָ
  english_pob_reading: Go ... and save ... Have I not sent you?
  chosen_spanish_reading: Ve ... y salva ... ¿No te he enviado yo?
  alternative_spanish_readings:
  - Ve ... y librarás ... ¿No fui yo quien te envió?
  rationale: 'Se mantiene la fuerza de mandato y envío: el texto no solo narra una salida, sino una comisión autorizada por Yahvé. La pregunta retórica subraya que la misión procede de Dios.'
  doctrine_reference: Commissioning language in Judges 6:14; narrative authority of divine sending
translation_notes:
  revision_awareness: Se revisó la lectura inglesa y el hebreo directo. No se detectaron cambios sustanciales respecto del último pase; la decisión principal fue conservar en español la imagen de «la mano de Madián» y el matiz instrumental/locativo de בְּכֹחֲךָ זֶה mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «Madián» para el topónimo, conforme al uso bíblico español común.
  - «salva» mantiene la comisión verbal sin debilitarla en un simple futuro.
  - La puntuación respeta el estilo bíblico moderno en español con comillas angulares y pregunta retórica final.
