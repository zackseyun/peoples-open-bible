translation:
  language: es
  text: El rugido del león[a], la voz del león feroz, y los dientes de los leones jóvenes están quebrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «son arrancados» o «son extraídos». El verbo hebreo también puede expresar una remoción violenta, además de quebrarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲגַת
  english_pob_choice: roar
  chosen_spanish: rugido
  alternatives_spanish:
  - rugir
  - bramido
  lexicon: HALOT
  rationale: El sustantivo hebreo denota el rugir característico del león. En español, "rugido" conserva el valor nominal y la imagen poética con naturalidad.
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - felino
  lexicon: HALOT
  rationale: Término estándar para el león; no hay razón contextual para variar la referencia básica.
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: '"Voz" mantiene el paralelismo poético con "rugido" y la personificación de la imagen, como en la decisión inglesa.'
- source_word: שָׁחַל
  english_pob_choice: fierce lion
  chosen_spanish: león feroz
  alternatives_spanish:
  - león
  - león negro
  lexicon: HALOT
  rationale: El término es poético y puede intensificar la idea de fuerza o fiereza. "León feroz" conserva esa intensificación sin adoptar la conjetura más específica de "león negro".
- source_word: שִׁנֵּי
  english_pob_choice: the teeth of
  chosen_spanish: los dientes de
  alternatives_spanish:
  - los colmillos de
  lexicon: HALOT
  rationale: Construcción posesiva simple y directa; "dientes" reproduce con claridad el sustantivo plural del hebreo.
- source_word: כְפִירִים
  english_pob_choice: young lions
  chosen_spanish: leoncillos
  alternatives_spanish:
  - leones jóvenes
  lexicon: HALOT
  rationale: כפיר designa un león joven, vigoroso. "Leoncillos" comunica la juventud del animal y funciona bien en el paralelismo poético, aunque "leones jóvenes" queda como alternativa más literal.
- source_word: נִתָּעוּ
  english_pob_choice: are broken
  chosen_spanish: están quebrados
  alternatives_spanish:
  - son arrancados
  - son sacados
  lexicon: HALOT
  rationale: El verbo expresa remoción violenta o fractura de los dientes. "Están quebrados" es una forma española idiomática que conserva la idea de daño físico; las alternativas mantienen abierta la posibilidad de remoción literal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo poético y la equivalencia óptima ya aprobada en el audit trail inglés. Se preserva la triple imagen paralela (rugido / voz / dientes) y la tensión semántica de נִתָּעוּ, sin resolverla exclusivamente hacia una sola opción literal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo no contiene el nombre divino en este cola.
  - Se usó un registro poético sobrio y publicable, evitando calcos como «la voz del feroz león» que suenan menos naturales en español.
  - Se evitó «Cristo»/«Mesías» y otros términos teológicos no presentes en el versículo.
