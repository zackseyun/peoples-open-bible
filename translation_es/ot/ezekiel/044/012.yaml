translation:
  language: es
  text: Porque les sirvieron[a] delante de sus ídolos y se convirtieron en un tropiezo de iniquidad para la casa de Israel, por tanto he alzado mi mano contra ellos[b] —declara el Señor Yahvé[c]—, y llevarán su iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'les ministraron'. El pronombre hebreo 'les' es algo comprimido y puede referirse a los asociados con los ídolos o, por sentido, a los ídolos mismos.
    reason: alternative_reading
  - marker: b
    text: 'Hebraísmo de juicio: ''alzar la mano contra alguien'' conserva el gesto corporal que puede indicar acción judicial o juramento solemne; aquí el contexto favorece una declaración de juicio contra ellos.'
    reason: lexical_alternative
  - marker: c
    text: La fórmula profética אֲדֹנָי יְהוִה contiene explícitamente el nombre divino. Se vierte 'Señor Yahvé' para respetar la convención del proyecto y evitar la máscara tradicional 'SEÑOR'.
    reason: theological_note
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio con una forma natural en español y conserva el valor causal explícito del hebreo.
- source_word: יְשָׁרְתוּ
  english_pob_choice: they ministered
  chosen_spanish: les ministraron
  alternatives_spanish:
  - les sirvieron
  - les prestaron servicio
  lexicon: HALOT
  rationale: El verbo tiene un matiz cultual/ministerial; 'ministraron' mantiene mejor ese campo que el más general 'sirvieron'.
- source_word: אוֹתָם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estas imágenes
  lexicon: HALOT
  rationale: Conservar el referente pronominal sin sobrecargar la frase. El hebreo es comprimido; en español el dativo reproduce el servicio rendido en presencia de los ídolos.
- source_word: לִפְנֵי גִלּוּלֵיהֶם
  english_pob_choice: before their idols
  chosen_spanish: delante de sus ídolos
  alternatives_spanish:
  - en presencia de sus ídolos
  - ante sus ídolos
  - delante de sus ídolos repugnantes
  lexicon: HALOT
  rationale: '''Delante de'' expresa bien לִפְנֵי y mantiene un español claro. Se conserva ''ídolos'' como equivalente legible del término peyorativo sin introducir una glosa demasiado pesada en el texto principal.'
- source_word: וְהָיוּ
  english_pob_choice: and became
  chosen_spanish: y fueron
  alternatives_spanish:
  - y se hicieron
  - y llegaron a ser
  lexicon: HALOT
  rationale: Aquí el hebreo funciona como resultado de la conducta previa. 'Fueron' permite una construcción natural con el predicativo siguiente en español.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - para la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva 'casa de Israel', que tiene peso covenantal y no se reduce a 'Israel' sin más.
- source_word: לְמִכְשׁוֹל עָוֺן
  english_pob_choice: a stumbling block of iniquity
  chosen_spanish: un tropiezo de iniquidad
  alternatives_spanish:
  - un obstáculo de iniquidad
  - una piedra de tropiezo para iniquidad
  - un escándalo de culpa
  lexicon: HALOT
  rationale: '''Tropiezo'' conserva la imagen de bloqueo/caída del hebreo y de la tradición profética. ''Iniquidad'' mantiene la fuerza moral y jurídica del sustantivo hebreo, siguiendo la elección inglesa de no suavizarlo a ''sin'' o ''guilt''.'
- source_word: נָשָׂאתִי יָדִי עֲלֵיהֶם
  english_pob_choice: I have raised my hand against them
  chosen_spanish: he alzado mi mano contra ellos
  alternatives_spanish:
  - he levantado mi mano contra ellos
  - he alzado mi mano sobre ellos
  - he jurado contra ellos
  lexicon: HALOT
  rationale: Se conserva el gesto idiomático de juicio, con una preposición hostil natural en español. La imagen corporal queda intacta sin convertirla en paráfrasis abstracta.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene el valor formular profético de נְאֻם con 'declara'. El nombre divino se traduce según la pauta del proyecto como 'Yahvé', y la combinación con אֲדֹנָי se resuelve como 'Señor Yahvé' para evitar una forma redundante o confusa.
- source_word: וְנָשְׂאוּ עֲוֺנָם
  english_pob_choice: and they will bear their iniquity
  chosen_spanish: y llevarán su iniquidad
  alternatives_spanish:
  - y cargarán con su iniquidad
  - y llevarán su culpa
  - y sufrirán el castigo de su iniquidad
  lexicon: HALOT
  rationale: '''Llevarán'' preserva el idiomatismo hebreo de cargar/soportar culpa y sus consecuencias, manteniendo la tensión entre responsabilidad y castigo sin explicitarla en exceso.'
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה en la fórmula profética con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Se evita la convención de ocultarlo con 'SEÑOR' y se preserva la decisión del proyecto de usar 'Yahvé'. Con אֲדֹנָי, 'Señor Yahvé' comunica la fórmula reverencial sin perder el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa que ajustó el orden para que 'became a stumbling block of iniquity for the house of Israel' sonara más natural. En español se resolvió con 'fueron un tropiezo de iniquidad para la casa de Israel', manteniendo el mismo sentido relacional sin invertir la carga del predicado.
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' como expresión colectiva estable.
  - '''Iniquidad'' conserva la terminología moral/jurídica del hebreo y del POB inglés.'
  - '''Yahvé'' se usa para el Tetragrama según la norma del proyecto, incluso dentro de la fórmula ''Señor Yahvé''.'
  - '''Llevarán su iniquidad'' preserva el valor idiomático y evita explicar en exceso la consecuencia penal.'
