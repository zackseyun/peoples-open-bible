translation:
  language: es
  text: Entonces Sisac, rey de Egipto, subió contra Jerusalén y tomó las tesorerías de la casa de Yahvé[a] y las tesorerías de la casa del rey[b]. Tomó todo; también tomó los escudos de oro que Salomón había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé» para «la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «el palacio real» para «la casa del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: came up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - subió a atacar
  - avanzó contra
  lexicon: HALOT
  rationale: עלה con עַל en contexto militar expresa un movimiento ofensivo contra una ciudad. En español, «subió contra» conserva la imagen direccional del hebreo y el valor bélico sin volverlo demasiado interpretativo.
- source_word: שִׁישַׁק
  english_pob_choice: Shishak
  chosen_spanish: Sisac
  alternatives_spanish:
  - Sisaq
  - Shishak
  lexicon: Transliteración bíblica tradicional en español
  rationale: El nombre propio se adapta a la forma castellana más reconocible en biblias y estudios bíblicos. «Sisac» mantiene la referencia al mismo personaje histórico sin depender del inglés.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La construcción de estado constructo identifica directamente el cargo y el país. En español, la frase nominal simple es natural y fiel; el artículo es opcional según el ritmo de la oración.
- source_word: אֹצְרוֹת
  english_pob_choice: treasuries
  chosen_spanish: tesoros
  alternatives_spanish:
  - tesorerías
  - depósitos
  lexicon: HALOT
  rationale: Aquí el referente son los bienes almacenados y saqueados del templo y del palacio. «Tesoros» comunica bien el contenido material en español y evita la rigidez de «tesorerías», que suena demasiado institucional.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea «casa de Yahvé» en vez de sustituirla por una equivalencia eclesiástica. Esto mantiene el paralelismo con «la casa del rey» y sigue el criterio del proyecto para יְהוָה.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - el palacio
  lexicon: HALOT
  rationale: La traducción literal reproduce el paralelismo con «la casa de Yahvé». «Palacio» es posible, pero pierde la correspondencia formal con el hebreo que el texto resalta.
- source_word: אֶת הַכֹּל לָקָח
  english_pob_choice: He took everything
  chosen_spanish: Tomó todo
  alternatives_spanish:
  - Se llevó todo
  - lo tomó todo
  lexicon: HALOT
  rationale: La cláusula resumptiva enfatiza la totalidad del saqueo. «Tomó todo» es breve, natural y preserva la fuerza totalizante del hebreo sin añadir matices no presentes.
- source_word: מָגִנֵּי הַזָּהָב
  english_pob_choice: the gold shields
  chosen_spanish: los escudos de oro
  alternatives_spanish:
  - los escudos dorados
  - los escudos de oro fino
  lexicon: HALOT
  rationale: La expresión se refiere a los escudos ceremoniales hechos por Salomón. «Escudos de oro» es literal, claro y suficientemente preciso para el español bíblico.
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  english_pob_choice: that Solomon had made
  chosen_spanish: que Salomón había hecho
  alternatives_spanish:
  - que Salomón hizo
  - que Salomón había fabricado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la fabricación de los escudos ocurrió antes del saqueo narrado. «Había hecho» mantiene la relación temporal sin sobretraducir.
theological_decisions:
- issue: Rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera directa. Siguiendo la terminología del proyecto, se translitera como «Yahvé» en el cuerpo del texto para preservar el nombre de pacto sin enmascararlo mediante un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of אֹצְרוֹת in the plunder list
  english_pob_reading: treasuries
  chosen_spanish_reading: tesoros
  alternative_spanish_readings:
  - almacenes
  - tesorerías
  rationale: Aunque «treasuries» puede sugerir la institución del tesoro, en este pasaje el énfasis recae en los bienes acumulados y saqueados. «Tesoros» conserva ese contenido material sin introducir una abstracción administrativa ajena al contexto.
  doctrine_reference: 'Principio de transparencia léxica: no convertir el objeto del saqueo en una institución moderna'
- issue: Parallelism between the house of Yahvé and the house of the king
  english_pob_reading: the house of Yahweh / the king’s house
  chosen_spanish_reading: la casa de Yahvé / la casa del rey
  alternative_spanish_readings:
  - el templo de Yahvé / el palacio
  - la casa del SEÑOR / el palacio real
  rationale: Se conserva la simetría formal del hebreo. La repetición de «casa» es intencional y ayuda a que el lector perciba el contraste entre el santuario y la residencia real.
  doctrine_reference: 'Principio literario: mantener paralelismos semíticos cuando son semánticamente relevantes'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene el valor militar de וַיַּעַל, el paralelismo entre la casa de Yahvé y la casa del rey, la cláusula resumptiva de totalidad y el pluscuamperfecto para la acción de Salomón. No se detectaron revisiones aplicadas en el contexto inglés, por lo que la propuesta española sigue la lectura estable del texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrama.
  - Se conserva «casa» en ambos miembros paralelos para reflejar la estructura hebrea.
  - Se evita «Cristo» u otros términos teológicos no presentes en el verso.
  - «Tomó todo» mantiene la resumptiva enfática del hebreo sin expandir el sentido.
