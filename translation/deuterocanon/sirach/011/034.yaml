translation:
  text: Keep many out of your house[a], and do not bring every man into your home, for many lie in wait[b], and many are deceivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew witness is primary here, but the Greek parallel reads more like: ''Lodge an outsider, and he will throw you into turmoil and estrange you from what is yours.'' This likely reflects a different textual form or expansion of the warning.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew text in this verse includes bracketed wording in the cited edition, indicating some reconstruction or uncertainty in the surviving manuscript tradition.
    reason: textual_variant
lexical_decisions:
- source_word: מְנַע
  chosen: Keep ... out
  alternatives:
  - restrain
  - prevent
  - hold back
  lexicon: HALOT
  rationale: The imperative calls for excluding or withholding access. 'Keep ... out' is idiomatic modern English and fits the object 'many' with the following phrase about the house.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  - numerous people
  lexicon: HALOT
  rationale: Straightforward quantitative term; retained consistently in both clauses.
- source_word: מִתּוֹךְ בֵּיתֶךָ
  chosen: out of your house
  alternatives:
  - from within your house
  - from the midst of your household
  lexicon: HALOT
  rationale: The Hebrew literally points to exclusion from the interior of one's house. 'Out of your house' is natural English and preserves the domestic setting.
- source_word: וְלֹא כָל אִישׁ לְהָבִיא אֶל בַּיִת
  chosen: do not bring every man into your home
  alternatives:
  - do not bring just anyone into the house
  - do not admit every person into your house
  lexicon: HALOT
  rationale: The phrase warns against indiscriminate hospitality. 'Every man' preserves the masculine singular אִישׁ per the project's gender-accurate policy, while still functioning generically in wisdom style.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: Hebrew uses the masculine singular generic. Following doctrine, the translation keeps the gendered form rather than neutralizing it.
- source_word: אוֹרְבִים
  chosen: those who lie in wait
  alternatives:
  - ambushers
  - plotters
  lexicon: HALOT
  rationale: The participial sense suggests people lurking with harmful intent. 'Those who lie in wait' preserves the imagery better than the more compressed 'ambushers'.
- source_word: נוֹכְלִים
  chosen: deceivers
  alternatives:
  - tricksters
  - swindlers
  - schemers
  lexicon: HALOT
  rationale: The term denotes crafty, deceitful people. 'Deceivers' is broad enough to fit the wisdom context without over-specifying financial fraud.
- source_word: וְכֵן
  chosen: and so also
  alternatives:
  - and likewise
  - so too
  lexicon: HALOT
  rationale: This connective links the second class of dangerous people to the first. 'And so also' makes the parallel explicit in readable English.
- source_word: ἐνοίκισον ἀλλότριον
  chosen: kept in view as a warning against admitting an outsider
  alternatives:
  - settle a stranger
  - house a foreigner
  lexicon: BDAG
  rationale: The Greek parallel differs notably from the Hebrew, focusing on lodging an outsider and the resulting disruption. It supports the general sense of caution about whom one admits, but the Hebrew remains primary for the main text.
- source_word: διαστρέψει σε ἐν ταραχαῖς καὶ ἀπαλλοτριώσει σε τῶν ἰδίων σου
  chosen: preserved in footnote as an alternative expansion
  alternatives:
  - he will upset you in troubles and estrange you from your own people/things
  lexicon: BDAG
  rationale: The Greek contains a consequential warning absent from the extant Hebrew line. Because the Hebrew witness is primary yet marked with minor mismatch and bracketed phrases, the Greek is important to preserve as an alternative reading rather than import fully into the main text.
