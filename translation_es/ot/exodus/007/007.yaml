  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: las edades de Moisés y Aarón y la circunstancia temporal de su hablar con Faraón. También preserva bien el valor idiomático de בֶּן ... שָׁנָה como expresión de edad, y de בְּדַבְּרָם como circunstancia temporal. Sin embargo, el waw inicial está documentado en las decisiones como «y», pero el texto omitió ese conector; además, «hablaron a Faraón» es comprensible pero menos natural en español que «hablaron con Faraón» o «hablaron a Faraón» según matiz. Dado el hebreo אֶל y el inglés POB «to Pharaoh», puede mantenerse «a Faraón», pero conviene reparar la omisión del conector inicial.'
