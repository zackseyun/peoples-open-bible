base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/013.yaml
  text: For the seller will not return to what was sold[a], though they are still alive; for the vision concerning all its multitude will not turn back[e][d][c][b], and no one will strengthen his life in his iniquity.
  footnotes:
  - marker: a
    text: Or 'to the sale,' that is, to the property or possession that was sold.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'while still among the living, their life'—a compressed expression meaning that even if the parties remain alive, the seller will not recover what was sold.
    reason: lexical_alternative
  - marker: c
    text: Or 'against all its multitude.' The preposition can suggest direction toward the whole population under judgment.
    reason: alternative_reading
  - marker: d
    text: Or 'will not be revoked.' The sense is that the announced judgment will not be reversed.
    reason: alternative_reading
  - marker: e
    text: The Hebrew of the final clause is difficult. It likely means that no one will secure his life by means of his iniquity.
    reason: alternative_reading
