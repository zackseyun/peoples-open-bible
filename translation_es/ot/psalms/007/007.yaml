revisions:
- from: ¡Levántate[a], Yahvé, en tu ira; álzate[b] contra la furia de mis enemigos; despierta por mí[c]; has decretado juicio.
  to: Levántate, Yahvé, en tu ira; álzate[a] contra la furia de mis enemigos; despierta por mí[b]; has decretado juicio[c].
  rationale: 'La revisión conserva el buen texto base, pero corrige el aparato crítico para que coincida con la evidencia fuente y la auditoría inglesa: se elimina una alternativa interpretativa no apoyada (''levántate con poder''), se mejora la naturalidad de la nota sobre אֵלַי y se añade la nota faltante para la cláusula final מִשְׁפָּט צִוִּיתָ. También se suaviza la puntuación inicial para un español más sobrio y natural.'
