lexical_decisions:
- source_word: ⲁⲛⲟⲕ … ⲧⲉ
  chosen: I am
  alternatives:
  - it is I
  - I myself am
  lexicon: Crum; Layton, Coptic Grammar (copular construction)
  rationale: First-person copular identification; retaining explicit “I am” preserves
    the poem’s repeated self-identifications.
- source_word: ⲡⲟⲣⲛⲏ
  chosen: whore
  alternatives:
  - prostitute
  lexicon: LSJ (pornē); Crum (Greek loan in Coptic)
  rationale: Greek pornē denotes a woman who sells sex; ‘whore’ carries the stigma
    and starkness that heighten the paradox with “holy,” while remaining within the
    semantic range. ‘Prostitute’ is a viable, more clinical alternative.
- source_word: ⲥⲉⲙⲛⲏ
  chosen: holy one
  alternatives:
  - revered one
  - august one
  - holy
  lexicon: LSJ (semnē, ‘revered/august/holy’); Crum
  rationale: Adjectival noun use; rendering as ‘holy one’ preserves nominal parallel
    with ‘whore’ and the sacred/secular collision without flattening to a bare adjective.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - and also
  lexicon: Crum
  rationale: Simple coordinating conjunction; no idiomatic nuance here.
