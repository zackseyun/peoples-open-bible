    rationale: El hebreo expresa deseo/oración mediante jussivo, no una exclamación enfática. En español, el optativo puede expresarse con subjuntivo sin signos de admiración, lo que suena más natural y digno.
  - severity: low
    issue: «se alegre» es correcto, pero algo menos elevado que el tono poético del salmo
    rationale: La decisión léxica es defendible, pero «regocíjese» comunica mejor el matiz doxológico y mantiene el paralelismo solemne con la primera cláusula sin perder claridad.
  revised_spanish_text: Sea para siempre la gloria de Yahvé[a]; regocíjese Yahvé[b] en sus obras.
