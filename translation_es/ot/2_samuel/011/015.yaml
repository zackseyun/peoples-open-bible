translation:
  language: es
  text: 'Escribió en la carta[a], diciendo: «Pongan a Urías al frente del combate más encarnizado; luego retírense de detrás de él, para que sea herido y muera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «donde el combate sea más encarnizado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: He wrote
  chosen_spanish: Escribió
  alternatives_spanish:
  - Y escribió
  lexicon: HALOT
  rationale: La forma wayyiqtol narra una acción pasada consecutiva; en español la conjunción inicial puede omitirse para una lectura natural, conservando el valor narrativo de pasado.
- source_word: בַּסֵּפֶר
  english_pob_choice: in the letter
  chosen_spanish: en la carta
  alternatives_spanish:
  - en el libro
  - en el documento
  lexicon: HALOT
  rationale: En este contexto, סֵפֶר se refiere al mensaje escrito que David envía, por lo que 'carta' refleja mejor el sentido contextual que un genérico como 'libro' o 'documento'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La función es introducir el contenido citado; 'diciendo' conserva el valor quotativo sin añadir interpretación.
- source_word: הָבוּ
  english_pob_choice: Set
  chosen_spanish: Pongan
  alternatives_spanish:
  - Coloquen
  - Pongan allí
  lexicon: HALOT
  rationale: El imperativo plural exige una orden dirigida a otros. En español, 'poner' expresa de forma idiomática la asignación de Urías a una posición en el combate.
- source_word: אֶל מוּל פְּנֵי הַמִּלְחָמָה הַחֲזָקָה
  english_pob_choice: at the front of the hardest fighting
  chosen_spanish: al frente del combate más intenso
  alternatives_spanish:
  - en el frente de la batalla más fuerte
  - donde el combate sea más encarnizado
  lexicon: HALOT
  rationale: La expresión es idiomática y describe exposición directa al frente. 'Al frente del combate más intenso' conserva el sentido militar y evita calcos poco naturales.
- source_word: וְשַׁבְתֶּם מֵאַחֲרָיו
  english_pob_choice: then withdraw from behind him
  chosen_spanish: luego retírense de detrás de él
  alternatives_spanish:
  - y luego aléjense de detrás de él
  - entonces retrocedan de detrás de él
  lexicon: HALOT
  rationale: '''שׁוּב'' aquí implica retirarse o volver atrás; ''retírense'' comunica bien la retirada táctica. ''De detrás de él'' preserva la idea de abandonarlo en combate.'
- source_word: וְנִכָּה
  english_pob_choice: so that he may be struck down
  chosen_spanish: para que sea herido
  alternatives_spanish:
  - para que sea golpeado
  - para que caiga herido
  lexicon: HALOT
  rationale: El nifal de נכה expresa ser golpeado/herido. 'Herido' resulta natural en español y mantiene la violencia del ataque sin cerrar demasiado el matiz verbal.
- source_word: וָמֵת
  english_pob_choice: and die
  chosen_spanish: y muera
  alternatives_spanish:
  - y muera allí
  - y muera después
  lexicon: HALOT
  rationale: Se conserva el segundo verbo como resultado separado, reflejando la secuencia hebrea y la intención letal explícita del mandato.
theological_decisions:
- issue: La frase describe una orden de abandono táctico con intención homicida, sin suavizar la responsabilidad moral del mandato.
  english_pob_reading: then withdraw from behind him so that he may be struck down and die
  chosen_spanish_reading: luego retírense de detrás de él, para que sea herido y muera
  alternative_spanish_readings:
  - luego aléjense de detrás de él, para que sea herido y muera
  - luego vuelvan atrás y déjenlo expuesto, para que sea herido y muera
  rationale: 'La traducción mantiene los dos movimientos: retirar la cobertura y dejarlo vulnerable, con el resultado buscado de muerte. No se atenúa el carácter deliberado del acto.'
  doctrine_reference: Ética bíblica; responsabilidad moral humana; 6.º mandamiento
- issue: אָמַר/לֵאמֹר introduce un discurso directo que debe conservarse sin añadir explicaciones interpretativas.
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - y dijo
  rationale: '''Diciendo'' conserva la estructura discursiva del hebreo y evita convertir el verso en una paráfrasis narrativa más libre.'
  doctrine_reference: Hermenéutica textual
translation_notes:
  revision_awareness: La versión española sigue el ajuste revisado del audit trail en cuanto a un registro ligeramente más formal y mantiene la distinción entre la ubicación de Urías, la retirada de apoyo y el resultado buscado. También conserva la alternativa contextual de la frase militar mediante nota, como en el texto inglés auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo trae el nombre divino; aquí no aparece.
  - Se mantiene «Urías» como transliteración del nombre propio.
  - Se evita «SEÑOR» o vocabulario eclesiástico añadido, porque el verso es narrativo y militar.
  - Se conserva un español neutral y bíblico, con imperativos plurales naturales para la orden dada.
