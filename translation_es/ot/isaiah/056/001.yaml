translation:
  language: es
  text: 'Así dice Yahvé: Guarden la justicia y hagan la rectitud, porque mi salvación[a] está cerca de llegar, y mi justicia[b] ha de ser revelada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi liberación».
    reason: lexical_alternative
  - marker: b
    text: O «mi rectitud» o «mi vindicación».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética se conserva en un español natural y solemne. Se mantiene el nombre divino 'Yahvé' conforme al criterio del proyecto, en vez de ocultarlo con un título genérico.
- source_word: שִׁמְרוּ
  english_pob_choice: Keep
  chosen_spanish: Guardad
  alternatives_spanish:
  - Mantened
  - Observad
  lexicon: HALOT
  rationale: שמַר expresa vigilar, custodiar y observar con cuidado. 'Guardad' comunica bien la idea de mantener fielmente algo valioso y suena natural con 'la justicia'.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo justo
  lexicon: HALOT
  rationale: Aquí el término apunta al orden recto que debe ser preservado y practicado. 'La justicia' corresponde al sentido ético del verso y conserva el paralelismo con צְדָקָה.
- source_word: וַעֲשׂוּ
  english_pob_choice: do
  chosen_spanish: haced
  alternatives_spanish:
  - practicad
  - obrad
  lexicon: HALOT
  rationale: El verbo עשה mantiene una acción concreta y directa. 'Haced' reproduce la fuerza imperativa sin perder la concisión hebrea.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la justicia recta
  lexicon: HALOT
  rationale: Se distingue de מִשְׁפָּט para no nivelar los dos términos. 'Rectitud' comunica bien la idea de conducta conforme a lo recto y evita repetir 'justicia' en ambos miembros.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación. 'Porque' es la conexión más directa y clara en español.
- source_word: קְרוֹבָה
  english_pob_choice: is near
  chosen_spanish: cerca está
  alternatives_spanish:
  - está próxima
  - se acerca
  lexicon: HALOT
  rationale: '''Cerca está'' conserva el predicado de proximidad y suena sobrio y bíblico en español moderno.'
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi socorro
  lexicon: HALOT
  rationale: '''Salvación'' preserva la amplitud teológica del término, tal como en el audit trail inglés, sin reducirlo a una sola modalidad de rescate.'
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: de venir
  alternatives_spanish:
  - para venir
  - para llegar
  lexicon: HALOT
  rationale: La construcción española 'cerca está de venir' refleja la infinitiva de finalidad/proximidad del hebreo y resulta idiomática.
- source_word: וְצִדְקָתִי
  english_pob_choice: and my righteousness
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi rectitud
  - mi vindicación
  lexicon: HALOT
  rationale: En este miembro se preserva la posibilidad de sentido judicial y salvífico de צְדָקָה. 'Justicia' mantiene la continuidad con el primer miembro y deja abierta la tensión interpretativa documentada en el POB inglés.
- source_word: לְהִגָּלוֹת
  english_pob_choice: to be revealed
  chosen_spanish: ha de ser revelada
  alternatives_spanish:
  - será revelada
  - va a ser revelada
  - ha de manifestarse
  lexicon: HALOT
  rationale: El nifal de גלה indica quedar expuesto o manifestarse. 'Ha de ser revelada' conserva el matiz de futuro cierto y la pasividad del hebreo, con tono profético.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. 'Yahvé' mantiene el nombre covenantal sin sustituirlo por un título, y es la forma pedida para el texto español principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: Keep justice, and do righteousness
  chosen_spanish_reading: Guardad la justicia, y haced la rectitud
  alternative_spanish_readings:
  - Guardad la justicia, y haced justicia
  - Observad el derecho, y practicad la justicia
  rationale: Se mantiene la distinción entre ambos términos sin colapsarlos. 'Justicia' para מִשְׁפָּט y 'rectitud' para צְדָקָה preservan la dualidad ética y evitan repetir exactamente el mismo sustantivo en ambos miembros.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Sentido de יְשׁוּעָתִי en el segundo hemistiquio
  english_pob_reading: my salvation is near to come
  chosen_spanish_reading: mi salvación de venir
  alternative_spanish_readings:
  - mi liberación de venir
  - mi rescate de venir
  rationale: '''Salvación'' conserva el rango teológico amplio del término y evita estrecharlo a una sola lectura. La perífrasis ''cerca está de venir'' reproduce la inminencia del hebreo sin forzar una traducción demasiado literal.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido de צִדְקָתִי en el cierre
  english_pob_reading: my righteousness ... to be revealed
  chosen_spanish_reading: mi justicia ha de ser revelada
  alternative_spanish_readings:
  - mi rectitud ha de ser revelada
  - mi vindicación ha de ser revelada
  rationale: '''Justicia'' permite mantener la tensión documental del término en Isaías entre carácter justo, acción justa y vindicación salvadora. Se evita cerrar prematuramente el sentido a una sola interpretación.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y el expediente indica que no se requirieron cambios; esta versión española sigue el mismo marco interpretativo del audit trail inglés, conservando la fórmula profética, el nombre divino Yahvé y la tensión léxica entre justicia/rectitud y salvación/justicia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se distingue 'justicia' y 'rectitud' para reflejar מִשְׁפָּט y צְדָקָה sin fusionarlos.
  - Se conserva 'salvación' como término amplio y teológicamente cargado.
  - La nota [a] se ancla en 'justicia' y la nota [b] en 'revelada' para reflejar alternativas documentadas.
