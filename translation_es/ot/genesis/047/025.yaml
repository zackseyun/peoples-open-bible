    changes_summary: 'Changed ''Let us find favor'' to ''May we find favor'' for more natural rendering of the cohortative/request, and changed ''slaves'' to ''servants'' for a more formal and contextually suitable rendering of עֲבָדִים here. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y dijeron[a]: «Tú nos has mantenido con vida. Que hallemos favor ante los ojos de mi señor, y seremos esclavos de Faraón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que hallemos favor ante mi señor». La expresión hebrea es un modismo deferente que significa literalmente «en los ojos de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y dijeron
  lexicon: HALOT
  rationale: El waw consecutivo introduce el discurso directo narrativo; en español, «Y ellos dijeron» conserva el flujo del relato sin añadir matiz interpretativo.
- source_word: הֶחֱיִתָנוּ
  english_pob_choice: You have kept us alive
  chosen_spanish: Tú nos has mantenido con vida
  alternatives_spanish:
  - Tú nos has dado vida
  - Tú nos has salvado la vida
  lexicon: HALOT
  rationale: El hiphil de חיה expresa causar que vivan o preservarlos con vida. «Has mantenido con vida» comunica la acción causativa de modo natural y sin cargarla de un sentido más amplio que el hebreo no exige.
- source_word: נִמְצָא חֵן
  english_pob_choice: May we find favor
  chosen_spanish: Que hallemos favor
  alternatives_spanish:
  - Que encontremos favor
  - Ojalá hallemos favor
  lexicon: HALOT
  rationale: La forma imperfecta funciona aquí como petición/cohortativo. «Que hallemos» conserva la súplica deferente y evita convertirla en una afirmación indicativa.
- source_word: בְּעֵינֵי אֲדֹנִי
  english_pob_choice: in the eyes of my lord
  chosen_spanish: ante los ojos de mi señor
  alternatives_spanish:
  - en los ojos de mi señor
  - a los ojos de mi señor
  - ante mi señor
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se mantiene transparentemente con «ante los ojos de», que suena natural en español bíblico y preserva el giro de favor/deferencia. «Mi señor» refleja el singular posesivo y el tratamiento respetuoso, probablemente hacia José.
- source_word: וְהָיִינוּ
  english_pob_choice: and we will be
  chosen_spanish: y seremos
  alternatives_spanish:
  - y estaremos
  - y llegaremos a ser
  lexicon: HALOT
  rationale: En este contexto la forma verbal expresa compromiso/resultante promesa. «Seremos» comunica mejor la resolución que una perífrasis más explicativa.
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: El término designa personas en servidumbre vinculada y, en este contexto económico, la dureza del vínculo es parte del sentido. «Esclavos» conserva esa fuerza léxica, conforme a la decisión POB en inglés.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: de Faraón
  alternatives_spanish:
  - para Faraón
  - a Faraón
  lexicon: HALOT
  rationale: El complemento expresa pertenencia/relación de servicio. En español, «de Faraón» con «ser esclavos» comunica de manera idiomática la relación de sujeción, sin perder la referencia al destinatario del servicio.
theological_decisions:
- issue: Rendición de עֲבָדִים como «esclavos» y no «siervos»
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: El relato trata de una dependencia económica y jurídica real; suavizarlo a «siervos» diluiría la fuerza del hebreo y del audit trail inglés. «Esclavos» mantiene la tensión semántica documentada.
  doctrine_reference: Lexical force of עבד / δοῦλος in context; POB terminology policy
- issue: Mantenimiento del giro idiomático «ante los ojos de mi señor»
  english_pob_reading: in the eyes of my lord
  chosen_spanish_reading: ante los ojos de mi señor
  alternative_spanish_readings:
  - en los ojos de mi señor
  - a los ojos de mi señor
  - ante mi señor
  rationale: La frase hebrea es una petición deferente. Conservar el idiomismo ayuda a mostrar la estructura del original y su carga relacional, en vez de normalizarlo demasiado.
  doctrine_reference: Hebrew idiom of favor; narrative pragmatics
- issue: Interpretación volitiva de נִמְצָא חֵן
  english_pob_reading: May we find favor
  chosen_spanish_reading: Que hallemos favor
  alternative_spanish_readings:
  - Que encontremos favor
  - Ojalá hallemos favor
  rationale: La forma verbal funciona como ruego, no como simple indicativo. El español debe reflejar esa modalidad, manteniendo la petición respetuosa de los hablantes.
  doctrine_reference: Hebrew cohortative/request usage
translation_notes:
  revision_awareness: El audit trail inglés confirma una oscilación editorial entre «servants» y «slaves», con corrección final a «slaves» por fidelidad al término fuerte del original. La traducción española sigue esa decisión final y evita atenuarla. También se observó la preferencia final por una formulación de ruego («May we find favor»), por lo que el español usa una construcción volitiva natural («Que hallemos favor»).
  spanish_consistency_notes:
  - Se conserva «Faraón» como nombre propio tradicional ampliamente entendido en español.
  - Se usa «mi señor» para reflejar el singular respetuoso del hebreo, sin introducir «señor» como sustituto del nombre divino, ya que aquí no aplica el término YHWH.
  - La puntuación mantiene el discurso directo con comillas angulares, acorde con estilo bíblico en español.
