translation:
  language: es
  text: En aquella misma noche, Belsasar[a], el rey caldeo, fue matado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «En aquella noche Belsasar, el rey de los caldeos, fue matado».'
