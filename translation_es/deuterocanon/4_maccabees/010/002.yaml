translation:
  language: es
  text: 'Pero él gritó y dijo: «¿No saben que el mismo padre me[a] sembró entre los que mueren, y la misma madre me dio a luz, y fui criado en los mismos principios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me sembró entre los que mueren». El griego conserva una metáfora agrícola para la generación humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβοήσας
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: LSJ
  rationale: El participio expresa una alzada de voz intensa. «Gritó» conserva la fuerza retórica en español sin sonar excesivamente coloquial; «clamó» también sería posible, pero aquí se prefiere la inmediatez del acto de gritar.
- source_word: ἀγνοεῖτε
  english_pob_choice: do you not know
  chosen_spanish: ¿No saben?
  alternatives_spanish:
  - ¿No conocen?
  - ¿No entienden?
  lexicon: LSJ
  rationale: La pregunta es retórica y reprochadora. En español, «¿No saben?» reproduce bien la recriminación sin endurecerla artificialmente con una fórmula más literal pero menos natural.
- source_word: ἔσπειρεν
  english_pob_choice: sowed
  chosen_spanish: sembró
  alternatives_spanish:
  - sació
  - engendró
  lexicon: LSJ
  rationale: El verbo mantiene la metáfora agrícola de la procreación. «Sembró» es el equivalente natural y transparente en español; «engendró» perdería la imagen, y «plantó» sería menos directo en este contexto.
- source_word: τοῖς ἀποθανοῦσιν
  english_pob_choice: among those who die
  chosen_spanish: entre los que mueren
  alternatives_spanish:
  - entre los mortales
  - entre los que están muriendo
  lexicon: LSJ
  rationale: El participio presente apunta a quienes están bajo la condición de morir, no necesariamente a los ya muertos. «Entre los que mueren» conserva esa fuerza de mortalidad compartida y evita convertirlos en «los muertos».
- source_word: ἐγέννησεν
  english_pob_choice: gave birth to
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: LSJ
  rationale: El verbo subraya la acción materna de dar nacimiento. «Dio a luz» es claro y digno en español; «engendró» borraría la distinción entre padre y madre en la frase.
- source_word: ἀνετράφην
  english_pob_choice: I was brought up
  chosen_spanish: fui criado
  alternatives_spanish:
  - fui educado
  - fui criado y formado
  lexicon: LSJ
  rationale: El pasivo remite a crianza y formación. «Fui criado» es breve y natural; «fui educado» puede sonar más escolar que formativo, y la frase completa ya expresa el marco moral de la crianza.
- source_word: δόγμασιν
  english_pob_choice: principles
  chosen_spanish: principios
  alternatives_spanish:
  - enseñanzas
  - normas
  - doctrinas
  lexicon: LSJ
  rationale: En este contexto, δόγμασιν alude a convicciones o formación normativa compartida. «Principios» refleja bien el matiz adoptado por el texto inglés y evita un tono eclesiástico demasiado técnico.
theological_decisions:
- issue: Metáfora generativa en ἔσπειρεν
  english_pob_reading: Retain the generative metaphor with 'sowed me' rather than flattening to 'begot me.'
  chosen_spanish_reading: Conservar la metáfora con «sembró» en vez de reducirla a «engendró».
  alternative_spanish_readings:
  - engendró
  - me procreó
  rationale: La línea quiere subrayar origen común y mortalidad compartida mediante una imagen agrícola. «Sembró» mantiene esa tensión literaria y teológica; «engendró» explicaría la idea pero perdería la metáfora del griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de τοῖς ἀποθανοῦσιν
  english_pob_reading: Render as 'those who die' to express the class of mortals.
  chosen_spanish_reading: Traducirlo como «los que mueren» para expresar la clase de mortales.
  alternative_spanish_readings:
  - los moribundos
  - los muertos
  rationale: El participio presente describe a los que están sujetos a la muerte como condición humana. «Los que mueren» conserva esa amplitud sin convertir la frase en una referencia exclusiva a cadáveres o a un proceso inminente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó «planted» por «sowed» y «teachings» por «principles». La redacción española sigue esa decisión con «sembró» y «principios», y además conserva la metáfora generativa que el audit trail considera importante.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin aparecer en este versículo.
  - Se preserva el paralelismo padre/madre con vocabulario natural y no eclesiástico.
  - «Principios» refleja el matiz formativo de δόγμασιν, en coherencia con el inglés POB revisado.
  - La voz narrativa usa pasado simple para ajustar el discurso directo y la fluidez del español bíblico moderno.
