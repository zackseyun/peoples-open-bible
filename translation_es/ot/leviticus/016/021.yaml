translation:
  language: es
  text: Y Aarón pondrá ambas manos sobre la cabeza del macho cabrío vivo, y confesará sobre él todas las iniquidades de los hijos[a] de Israel, y todas sus transgresiones, todos sus pecados; y los pondrá sobre la cabeza del macho cabrío, y lo enviará al desierto por mano de un hombre designado para esta tarea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'el pueblo de Israel'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'por mano de un hombre preparado/dispuesto para ello'. La expresión hebrea es difícil y puede destacar preparación, designación o idoneidad para la tarea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrá
  alternatives_spanish:
  - impondrá
  - colocará
  - apoyará
  lexicon: HALOT
  rationale: En contexto ritual, סמך describe la acción de colocar o imponer las manos sobre la víctima. 'Pondrá' mantiene la acción concreta en español y permite que la frase 'ambas manos sobre la cabeza' exprese el rito sin volverlo demasiado técnico o rígido.
- source_word: שְׁתֵּי יָדוֹ
  english_pob_choice: both his hands
  chosen_spanish: ambas manos
  alternatives_spanish:
  - sus dos manos
  - las dos manos
  lexicon: HALOT
  rationale: La forma dual se expresa de manera natural en español con 'ambas manos'. Conserva el sentido distributivo sin sonar forzado.
- source_word: הַשָּׂעִיר הַחַי
  english_pob_choice: the live goat
  chosen_spanish: el macho cabrío vivo
  alternatives_spanish:
  - el cabrío vivo
  - el macho cabrío viviente
  lexicon: HALOT
  rationale: '''Macho cabrío'' distingue con precisión el animal sacrificial, y ''vivo'' reproduce el contraste ritual con el otro macho cabrío del pasaje. Se evita ''viviente'' por sonar menos natural en español actual.'
- source_word: וְהִתְוַדָּה עָלָיו
  english_pob_choice: confess over it
  chosen_spanish: confesará sobre él
  alternatives_spanish:
  - confesará sobre eso
  - confesará acerca de él
  lexicon: HALOT
  rationale: El verbo se traduce por 'confesar', y la preposición 'sobre' conserva la orientación ritual del acto. Aunque el español normalmente diría 'sobre él' para el animal, se mantiene esa formulación porque el texto describe una confesión realizada sobre la víctima.
- source_word: עֲוֺנֹת
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - culpas
  - maldades
  lexicon: HALOT
  rationale: '''Iniquidades'' preserva el peso moral y cultual de עָוֹן y permite distinguir este término de los otros dos del versículo.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial masculina del hebreo, que el POB inglés también preservó. 'Hijos de Israel' es entendible y mantiene la forma del original.
- source_word: פִּשְׁעֵיהֶם
  english_pob_choice: their transgressions
  chosen_spanish: sus transgresiones
  alternatives_spanish:
  - sus rebeliones
  - sus faltas
  lexicon: HALOT
  rationale: '''Transgresiones'' comunica ruptura o rebelión contra el pacto y mantiene la distinción con ''iniquidades'' y ''pecados''.'
- source_word: לְכָל חַטֹּאתָם
  english_pob_choice: all their sins
  chosen_spanish: todos sus pecados
  alternatives_spanish:
  - todas sus faltas
  - todos sus errores
  lexicon: HALOT
  rationale: Se mantiene el tercer término de la tríada con 'pecados', sin añadir una preposición interpretativa que no está en el hebreo. La acumulación 'todas... todos... todos' refleja el alcance total del texto.
- source_word: וְנָתַן אֹתָם
  english_pob_choice: put them
  chosen_spanish: las pondrá
  alternatives_spanish:
  - los pondrá
  - las colocará
  - los colocará
  lexicon: HALOT
  rationale: El antecedente colectivo son las iniquidades, transgresiones y pecados; en español el femenino plural 'las' puede referirse al conjunto de culpas implícitas. 'Pondrá' conserva el gesto ritual de transferir y depositar esas cargas sobre la cabeza del macho cabrío.
- source_word: וְשִׁלַּח
  english_pob_choice: send it away
  chosen_spanish: lo enviará
  alternatives_spanish:
  - lo mandará lejos
  - lo despedirá
  lexicon: HALOT
  rationale: '''Enviar'' transmite bien la acción de despachar fuera del campamento. Se evita ''despedirá'' por ambigüedad semántica en español contemporáneo.'
- source_word: בְּיַד אִישׁ עִתִּי
  english_pob_choice: by the hand of a man appointed for the task
  chosen_spanish: por mano de un hombre designado para esta tarea
  alternatives_spanish:
  - por mano de un hombre preparado para ello
  - a cargo de un hombre designado para ello
  - por mano de un hombre oportuno
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática 'por mano de' como equivalente de בְּיַד para indicar agencia. 'Designado para esta tarea' refleja la decisión del POB de captar el sentido funcional de עִתִּי sin fijarlo de manera excesiva en una sola acepción léxica.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto abierto
  - hacia el desierto
  - al yermo
  lexicon: HALOT
  rationale: La forma direccional exige movimiento hacia ese lugar; en español, 'al desierto' expresa el destino con naturalidad. 'Desierto' aquí reproduce el ámbito semidesolado del hebreo bíblico, equivalente funcional de 'wilderness'.
theological_decisions:
- issue: Preservación de la tríada de culpa y pecado
  english_pob_reading: iniquities / transgressions / sins
  chosen_spanish_reading: iniquidades / transgresiones / pecados
  alternative_spanish_readings:
  - culpas / rebeliones / pecados
  - iniquidades / rebeldías / faltas
  rationale: El hebreo acumula tres términos cercanos pero no idénticos para subrayar la totalidad de la culpa de Israel. La versión española conserva esa diferencia semántica para no aplanar el énfasis teológico del rito expiatorio.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6 (readable modern Spanish)
- issue: Conservación de la expresión filial masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina-filiativa del hebreo, siguiendo la práctica de precisión de género cuando el texto lo presenta así. Aunque el referente es corporativo, la formulación original no se neutraliza.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Destino del macho cabrío en el rito
  english_pob_reading: send it away into the wilderness
  chosen_spanish_reading: lo enviará al desierto
  alternative_spanish_readings:
  - lo enviará al yermo
  - lo mandará al desierto
  rationale: El movimiento expulsivo es central al rito del día de la expiación. 'Al desierto' conserva la dirección y la función simbólica de llevar fuera los pecados cargados sobre el animal.
  doctrine_reference: Levítico 16:21–22; Day of Atonement ritual context
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que consolidó la tríada como 'iniquidades / transgressions / sins' sin insertar una preposición interpretativa antes del último término. También conserva la solución auditada para בְּיַד אִישׁ עִתִּי como una fórmula funcionalmente equivalente a 'a man appointed for the task', manteniendo abierta la ambigüedad léxica documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología por defecto en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Pecados'' se usa para חַטֹּאתָם, reservando ''iniquidades'' y ''transgresiones'' para los otros dos términos de la tríada.'
  - La expresión 'por mano de' conserva el hebraísmo de agencia, consistente con el tratamiento del POB inglés.
  - '''Desierto'' se usa como equivalente bíblico de wilderness, no como mero paisaje geográfico moderno.'
