revisions:
- from: Las cosas de madera y las cosas cubiertas de oro y las cosas cubiertas de plata son como piedras del monte[a], y los que les sirven serán avergonzados.
  to: Los objetos de madera y los recubiertos de oro y los recubiertos de plata son como piedras del monte, y los que los sirven[a] serán avergonzados.
  rationale: 'Se hace una reparación menor de estilo y neutralidad dialectal: ''objetos'' suena más natural que ''cosas'' en esta serie, y ''los sirven'' evita el leísmo en un contexto de ídolos/objetos. Se conserva la decisión central de traducir θεραπεύοντες como ''sirven'', con la alternativa cultual en nota, y no se altera el sentido ni la estructura básica del versículo.'
