translation:
  language: es
  text: Y tomaron piedras enteras según la ley[a], y edificaron un altar nuevo como antes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "piedras sin labrar"; el griego dice "piedras enteras/completas", y la frase siguiente "según la ley" probablemente alude a las exigencias de la Torá para las piedras del altar.
    reason: lexical_alternative
  - marker: b
    text: O "como el anterior" o "según el modelo anterior".
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - tomaron
  - recogieron
  - adquirieron
  lexicon: LSJ
  rationale: El aoristo de λαμβάνω aquí expresa una acción concreta de tomar o conseguir materiales. "Tomaron" es natural en español y conserva la concreción del verbo sin añadir matices ajenos.
- source_word: λίθους ὁλοκλήρους
  english_pob_choice: whole stones
  chosen_spanish: piedras enteras
  alternatives_spanish:
  - piedras completas
  - piedras intactas
  - piedras sin labrar
  lexicon: LSJ
  rationale: Ὁλόκληρος significa entero, completo, intacto. "Piedras enteras" mantiene de cerca el valor léxico sin convertir la frase en una interpretación más específica como "sin labrar".
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: según la ley
  alternatives_spanish:
  - conforme a la ley
  - de acuerdo con la ley
  lexicon: LSJ
  rationale: La preposición con acusativo expresa conformidad con una norma. "Según la ley" es claro y idiomático en español, y conserva la referencia explícita a la norma toráica.
- source_word: ᾠκοδόμησαν
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  - reedificaron
  lexicon: LSJ
  rationale: El verbo significa construir o edificar. "Edificaron" suena digno y fiel; no se usa "reedificaron" porque el griego solo dice que edificaron, sin especificar de manera explícita una reconstrucción.
- source_word: θυσιαστήριον καινὸν
  english_pob_choice: a new altar
  chosen_spanish: un altar nuevo
  alternatives_spanish:
  - un nuevo altar
  - un altar fresco
  lexicon: LSJ
  rationale: θυσιαστήριον es "altar" y καινός señala novedad. "Un altar nuevo" sigue de cerca el orden y el sentido del griego.
- source_word: κατὰ τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - según lo anterior
  - conforme al modelo anterior
  lexicon: LSJ
  rationale: La frase remite a la correspondencia con el estado o forma previa. "Como antes" refleja de manera natural la comparación temporal sin sobreexplicar un "modelo" que no está formulado explícitamente.
theological_decisions:
- issue: Si la descripción de las piedras debe explicitar la implicación legal de la Torá
  english_pob_reading: Keep the main text as 'whole stones' and let 'according to the law' carry the legal reference.
  chosen_spanish_reading: Mantener "piedras enteras" en el texto principal y dejar que "según la ley" sostenga la referencia legal.
  alternative_spanish_readings:
  - piedras sin labrar
  - piedras no talladas
  rationale: El griego dice literalmente "piedras enteras/completas" y añade por separado la conformidad con la ley. Traducir el adjetivo como "sin labrar" haría explícita una implicación interpretativa que el texto no formula directamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo verter κατὰ τὸ πρότερον en relación con el altar anterior
  english_pob_reading: Render as 'as before'.
  chosen_spanish_reading: Renderizarlo como "como antes".
  alternative_spanish_readings:
  - como el anterior
  - según el modelo anterior
  rationale: La expresión apunta a continuidad con la forma previa de hacer o construir. "Como antes" es idiomático y conserva el sentido comparativo sin forzar una explicación más técnica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó "like the former one" por "as before" para reflejar con más naturalidad κατὰ τὸ πρότερον. En español se siguió esa misma orientación con "como antes", manteniendo el eco de continuidad sin añadir un sustantivo no explícito.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general de la serie, pero este versículo no contiene el nombre divino.
  - '"Ley" se usa para νόμος en sentido normativo/toráico, sin necesidad de capitalización.'
  - '"Altar" conserva el término cultual básico; no se amplía a "altar de sacrificio" porque el griego ya usa θυσιαστήριον.'
  - Se evitó "reedificaron" porque la revisión inglesa preserva solo "built" y el griego no especifica de forma explícita la idea de reconstrucción.
