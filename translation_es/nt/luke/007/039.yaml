base_translation:
  language: en
  yaml_path: translation/nt/luke/007/039.yaml
  text: Now when the Pharisee who had invited him saw this[a], he said to himself, “If this man were a prophet, he would know who and what sort of woman this is who is touching him[b], because she is a sinner.”
  footnotes:
  - marker: a
    text: Or 'who and what kind of woman this is.' The Greek stresses both her identity and her character/reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'that she is a sinner.' The clause may be heard either as the content of what he would know or as the reason for the woman's character.
    reason: lexical_alternative
