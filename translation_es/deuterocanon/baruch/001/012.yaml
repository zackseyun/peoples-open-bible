base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/001/012.yaml
  text: And the Lord will give us strength and enlighten our eyes[a], and we will live under the shadow of Nebuchadnezzar king of Babylon and under the shadow of Belshazzar his son[b], and we will serve them many days and find favor before them.
  footnotes:
  - marker: a
    text: Or 'under the protection of' or 'in the shelter of'; the Greek literally says 'under the shadow of,' a metaphor that can suggest both shelter and subjection.
    reason: lexical_alternative
  - marker: b
    text: Or 'find favor with them.' The Greek idiom is literally 'find favor before them.'
    reason: lexical_alternative
