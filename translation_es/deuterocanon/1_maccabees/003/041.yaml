review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran medida la revisión inglesa final: ἔμποροι = ''mercaderes'', τὸ ὄνομα αὐτῶν = ''su fama'', παρεμβολή = ''campamento'', εἰς παῖδας = ''como esclavos'', y la cláusula final aditiva está bien representada. Sin embargo, hay un problema de alineación documental en las notas: la nota [b] introduce ''como cautivos'' como alternativa, pero el rastro inglés preserva la discusión principal entre ''servants/slaves'' y la revisión final fijó ''slaves''; ''cautivos'' no refleja bien εἰς παῖδας. También conviene ajustar la nota [c], porque la alternativa inglesa documentada habla de ''foreign lands'', no de repetir ''la tierra de los extranjeros''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Mercaderes', 'grilletes', 'campamento' y 'se les añadieron' funcionan bien. La frase fluye correctamente. La única reparación necesaria es en las notas para evitar una alternativa menos fiel y para reflejar mejor la alternativa documentada en inglés de manera idiomática en español.
  glossary_alignment: No hay términos del glosario mayor en conflicto. 'Esclavos' es adecuado en este contexto de trata de personas. 'Mercaderes' y 'extranjeros' son consistentes con las decisiones léxicas documentadas. No intervienen Yahvé/Mesías/Cristo u otros términos de proyecto.
  issues:
  - severity: medium
    issue: La nota [b] ofrece 'como cautivos' como alternativa para εἰς παῖδας.
    rationale: '''Cautivos'' describe estado de captura, pero no el resultado de esclavización expresado por εἰς παῖδας en este contexto. La documentación inglesa preserva la tensión servants/slaves, no cautives.'
  - severity: low
    issue: La nota [c] no refleja con precisión la alternativa documentada 'foreign lands'.
    rationale: La nota actual repite casi la redacción principal. Conviene ofrecer una alternativa española equivalente a 'de tierras extranjeras' para corresponder al audit trail.
  revised_spanish_text: Y los mercaderes de la tierra oyeron su fama[a], y tomaron mucha plata y oro, y grilletes, y llegaron al campamento para tomar a los hijos de Israel como esclavos[b]. Y fuerzas de Siria y de la tierra de los extranjeros se les añadieron[c].
  revised_footnotes:
  - marker: a
    text: O 'su nombre'; literalmente, 'su nombre'. Aquí se entiende como su fama o la noticia sobre ellos.
    reason: lexical_alternative
  - marker: b
    text: O 'como siervos'. El contexto indica que serían tomados como propiedad humana; 'como esclavos' expresa ese sentido con mayor claridad.
    reason: lexical_alternative
  - marker: c
    text: O 'se les unieron fuerzas de Siria y de tierras extranjeras'.
    reason: alternative_reading
  revision_rationale: 'El texto principal puede mantenerse. Se revisan únicamente las notas para que reflejen mejor el sentido del griego y el audit trail inglés: [b] sustituye la alternativa imprecisa ''cautivos'' por ''siervos'' como alternativa documentable frente a ''esclavos'', y [c] formula la variante en español de manera más fiel a ''foreign lands''.'
