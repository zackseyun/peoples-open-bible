  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Josué quemó Hai, la dejó como un montón/ruina perdurable y desolada, y esa condición continuó hasta el tiempo del narrador. También preserva la nota alternativa para עוֹלָם. Sin embargo, «monte» no refleja fielmente תֵּל, que aquí es un montón o montículo de ruinas, no una montaña o cerro.'
  spanish_quality_summary: El español es claro y natural en general, pero «monte permanente» suena impropio y puede inducir a una imagen geográfica equivocada. «Montículo» o «montón de ruinas» encaja mejor con el hebreo y con un registro bíblico legible. El resto de la frase funciona bien en español moderno y digno.
  glossary_alignment: No hay términos teológicos mayores en juego. La transliteración «Hai» es aceptable en uso bíblico español. La decisión para עוֹלָם como «permanente» concuerda con la justificación del POB, y «una desolación» preserva bien שְׁמָמָה. La nota léxica alternativa debe mantenerse, pero anclada al término revisado.
