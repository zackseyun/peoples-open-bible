    text: 'Hebrew: “the kings of Assyria.” The plural likely refers to the Assyrian royal power or dynasty; some translations smooth it to the singular “king of Assyria” for immediate historical context.'
    reason: lexical_alternative
  - marker: b
    text: Or “the wadi/brook that was flowing through the land.”
    reason: lexical_alternative
