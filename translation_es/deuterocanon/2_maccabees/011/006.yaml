    reason: lexical_alternative
  revision_rationale: La revisión mantiene todas las decisiones de fondo del borrador, pero mejora la naturalidad y la precisión idiomática del español. «Los que estaban con Macabeo» comunica mejor el sentido grupal de οἱ περὶ τὸν Μακκαβαῖον, y el reordenamiento de los complementos evita una construcción entrecortada sin perder ninguno de los matices del griego.
