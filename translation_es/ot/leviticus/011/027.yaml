translation:
  language: es
  text: Y todo animal que anda sobre sus patas[a], entre todos los animales que andan en cuatro patas, son inmundos para ustedes. Todo el que toque su carcasa[b] quedará inmundo hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que se mueven en cuatro patas".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "su carcasa", con sustantivo singular y sufijo plural, de sentido colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And every animal
  chosen_spanish: Y todo animal
  alternatives_spanish:
  - Y cada animal
  - Y todo
  lexicon: HALOT
  rationale: El hebreo introduce otro miembro distributivo de la lista; en español, “todo animal” conserva el valor universal sin forzar una lectura personal de “todo el que”. La adición de “Y” reproduce el enlace discursivo.
- source_word: הוֹלֵךְ
  english_pob_choice: that walks
  chosen_spanish: que anda
  alternatives_spanish:
  - que camina
  - que va
  lexicon: HALOT
  rationale: El participio atributivo describe la clase de animal. “Anda” es natural en español y mantiene el movimiento habitual indicado por el hebreo.
- source_word: עַל כַּפָּיו
  english_pob_choice: on its paws
  chosen_spanish: sobre sus patas
  alternatives_spanish:
  - sobre sus garras
  - sobre las plantas de sus patas
  lexicon: HALOT
  rationale: כַּף puede referirse a la planta/mano/pie; en contexto animal, el inglés POB optó por “paws”. En español, “patas” comunica el referente zoológico de forma natural sin perder la imagen corporal.
- source_word: בְּכָל הַחַיָּה
  english_pob_choice: among all the animals
  chosen_spanish: entre todos los animales
  alternatives_spanish:
  - entre todas las criaturas vivientes
  - de entre todos los animales
  lexicon: HALOT
  rationale: Aquí חַיָּה designa animales terrestres en un contexto dietético. “Entre todos los animales” mantiene la referencia concreta y la fuerza distributiva.
- source_word: הַהֹלֶכֶת עַל אַרְבַּע
  english_pob_choice: that walk on four feet
  chosen_spanish: que andan sobre cuatro
  alternatives_spanish:
  - que caminan sobre cuatro patas
  - que se mueven en cuatro patas
  lexicon: HALOT
  rationale: La frase hebrea es colectiva y legal. En español, “andar sobre cuatro” es idiomático; “sobre cuatro” evita añadir “pies” donde el hebreo usa simplemente “cuatro”.
- source_word: טְמֵאִים הֵם לָכֶם
  english_pob_choice: they are unclean to you
  chosen_spanish: es impuro para ustedes
  alternatives_spanish:
  - son impuros para ustedes
  - les son impuros
  lexicon: HALOT
  rationale: En Levítico, טמא es una categoría ritual. “Impuro” preserva el campo semántico ceremonial en español; el singular concordado con el colectivo “todo animal” refleja el hebreo distributivo.
- source_word: כָּל הַנֹּגֵעַ
  english_pob_choice: Everyone who touches
  chosen_spanish: Todo el que toque
  alternatives_spanish:
  - Cualquiera que toque
  - Quien toque
  lexicon: HALOT
  rationale: La expresión es legal y distributiva. “Todo el que” es formal, claro y no introduce una restricción personal ajena al hebreo.
- source_word: בְּנִבְלָתָם
  english_pob_choice: their carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - sus cadáveres
  lexicon: HALOT
  rationale: נְבֵלָה designa el cadáver/carcasa de un animal muerto. “Cadáver” comunica la idea en español; el singular con posesivo refleja el sustantivo singular hebreo con sufijo plural colectivo.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - se contaminará ritualmente
  lexicon: HALOT
  rationale: El imperfecto jurídico expresa consecuencia normativa. “Quedará impuro” suena natural en español y mantiene el estado ritual resultante sin moralizarlo.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: El artículo hebreo sugiere una referencia concreta al momento del día; “la tarde” es la opción más natural y amplia en español para el cierre del período ritual.
theological_decisions:
- issue: Lenguaje de pureza ritual
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: En Levítico la categoría es cultual/ritual, no primordialmente moral. “Impuro” es transparente y suficientemente técnico en español bíblico contemporáneo.
  doctrine_reference: Pureza ritual levítica; טמא como estado ceremonial
- issue: Referencia colectiva de נִבְלָה con sufijo plural
  english_pob_reading: their carcass (singular noun with plural suffix, functioning collectively)
  chosen_spanish_reading: su cadáver
  alternative_spanish_readings:
  - sus cadáveres
  - el cadáver de ellos
  rationale: El hebreo usa un sustantivo singular con sufijo plural colectivo. En español, el singular posesivo preserva mejor esa construcción legal que un plural literal.
  doctrine_reference: Colectivos hebreos; concordancia semántica
- issue: Fórmula legal distributiva
  english_pob_reading: Everyone who touches
  chosen_spanish_reading: Todo el que toque
  alternative_spanish_readings:
  - Quien toque
  - Cualquiera que toque
  rationale: La ley se expresa de modo distributivo y general. “Todo el que” conserva el tono normativo y evita una lectura restrictiva o demasiado coloquial.
  doctrine_reference: Estilo jurídico de la Torá
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de “every one” a “every animal” por precisión léxica, ya que el hebreo se refiere a animales y no a personas. La versión española sigue esa corrección y conserva el paralelismo legal entre el animal impuro y la contaminación por contacto con el cadáver.
  spanish_consistency_notes:
  - Se mantiene “impuro” para טמא, conforme al registro ritual de Levítico.
  - Se traduce YHWH como “Yahvé” cuando corresponda; este versículo no lo contiene.
  - Se conserva el tono legal-distributivo con “Todo el que”.
  - Se usa “cadáver” para נְבֵלָה por claridad y por la equivalencia funcional con el inglés POB “carcass”.
