translation:
  language: es
  text: Por su poder dirige el relámpago[a][b], y hace que los destellos prevalezcan en lo alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Por su mandato aquieta la nieve, y apresura los relámpagos de su juicio». El hebreo y el griego difieren de manera notable en esta línea.'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo detrás de «dirige» es poco común e incierto en este contexto; también puede entenderse como «traza», «señala» o «designa».
    reason: lexical_alternative
lexical_decisions:
- source_word: גבורתו
  english_pob_choice: by his might
  chosen_spanish: por su poder
  alternatives_spanish:
  - por su fuerza
  - por su might
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza/poder. «Por» conserva el valor instrumental del hebreo y suena natural en español bíblico contemporáneo sin perder el matiz de agente eficaz.
- source_word: תתוה
  english_pob_choice: he directs
  chosen_spanish: dirige
  alternatives_spanish:
  - traza
  - señala
  - designa
  lexicon: HALOT
  rationale: El verbo es raro y algo incierto en este contexto. El audit trail inglés favorece una acción divina de conducción u ordenamiento sobre el fenómeno; «dirige» transmite esa idea con naturalidad y sin borrar la tensión léxica del hebreo.
- source_word: ברק
  english_pob_choice: the lightning
  chosen_spanish: el relámpago
  alternatives_spanish:
  - el rayo
  - la luz del rayo
  lexicon: HALOT
  rationale: «Relámpago» es un equivalente claro para el fenómeno de luz súbita en el cielo y encaja bien con la imagen poética del versículo. «Rayo» podría sonar a descarga o golpe; aquí el foco está en el destello.
- source_word: ותנצח
  english_pob_choice: he makes ... prevail
  chosen_spanish: hace que ... prevalezcan
  alternatives_spanish:
  - hace triunfar
  - los hace sobresalir
  - los hace imponerse
  lexicon: HALOT
  rationale: El hebreo comunica preeminencia/triunfo. La forma causativa en español conserva la fuerza activa divina y permite la concordancia con el plural del segundo miembro.
- source_word: זיקות
  english_pob_choice: the flashes
  chosen_spanish: los destellos
  alternatives_spanish:
  - las chispas
  - los fulgores
  - los relámpagos
  lexicon: HALOT
  rationale: El término puede referirse a destellos o chispas. «Destellos» es suficientemente amplio, poético y no sobreespecifica el fenómeno; mantiene la relación con ברק y con el paralelo griego ἀστραπαί.
- source_word: במרום
  english_pob_choice: on high
  chosen_spanish: en lo alto
  alternatives_spanish:
  - en las alturas
  - arriba
  - en el cielo
  lexicon: HALOT
  rationale: «En lo alto» reproduce el valor locativo/poético de «on high» y evita cerrar prematuramente el sentido a una cosmología concreta.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la línea de fenómenos meteorológicos
  english_pob_reading: Retain the Hebrew-based image 'marks out the lightning' in the main text, while allowing the Greek's more explicit sense of divine control to inform the clause's overall force.
  chosen_spanish_reading: Mantener en el texto principal la imagen hebrea de Dios que dirige el relámpago, mientras el paralelo griego se preserva como nota de variante significativa.
  alternative_spanish_readings:
  - Por su mandato hace cesar la nieve, y apresura los relámpagos de su juicio.
  - Por su orden aquieta la nieve, y da prisa a los relámpagos de su juicio.
  rationale: La consigna del proyecto da prioridad al testimonio hebreo cuando está disponible, pero aquí el griego ofrece una variante relevante y sustancial. El texto principal sigue el hebreo, mientras la nota documenta la lectura griega para no borrar la diferencia textual ni la tensión interpretativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde se conserva; usar el paralelo griego como entrada de traducción real.'
- issue: Término para el agente divino de control sobre la tormenta
  english_pob_reading: By his might he directs the lightning
  chosen_spanish_reading: Por su poder dirige el relámpago
  alternative_spanish_readings:
  - Con su poder dirige el relámpago
  - Por su fuerza dirige el relámpago
  rationale: No se introduce un vocablo cultual o tradicional que oculte el rasgo de poder operativo. «Poder» conserva la fuerza instrumental y verbaliza adecuadamente la acción divina sobre el fenómeno natural.
  doctrine_reference: 'PHILOSOPHY.md: mantener la fuerza lexical del original sin suavizarla con terminología eclesiástica no exigida por el texto.'
translation_notes:
  revision_awareness: El borrador sigue la decisión revisada del audit trail inglés de expresar תתוה de manera más natural como «dirige», y conserva el valor locativo poético de במרום con «en lo alto». También mantiene visible la tensión hebreo-griego mediante una nota, en lugar de armonizar las dos lecturas en el cuerpo principal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto; el versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «Relámpago» y «destellos» se mantienen diferenciados para reflejar el paralelismo hebreo.
  - La construcción «hace que ... prevalezcan» conserva el matiz causativo del hebreo sin sonar demasiado literal en español.
  - La nota griega usa «mandato» para reflejar προστάγματι y «juicio» para κρίματος, manteniendo la variante textual documentada en el audit trail.
