  glossary_alignment: Sin conflictos con la terminología troncal del proyecto. «Pectoral» para חֹשֶׁן está bien justificado. «Efod» conserva el término técnico apropiado. No hay asuntos de nombres divinos o títulos mesiánicos en este versículo.
