translation:
  language: es
  text: pues, como es juez, les quitó a su tiempo lo que les había dado. Y
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: iudex
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez recto
  - juez justo
  lexicon: iudex
  rationale: El latín nombra la función judicial sin añadir calificativo; por eso en español basta «juez». Evito «recto/justo» porque la revisión eliminó el adjetivo correspondiente del texto fuente de este verso.
- source_word: abstulit
  english_pob_choice: took away
  chosen_spanish: quitó
  alternatives_spanish:
  - arrebató
  - retiró
  - tomó
  lexicon: aufero
  rationale: «Quitó» comunica la privación ya dada en el contexto y mantiene un registro natural en español sin intensificar más de lo que exige el latín.
- source_word: a uobis
  english_pob_choice: from you
  chosen_spanish: a vosotros
  alternatives_spanish:
  - de vosotros
  - de ustedes
  lexicon: a/ab + ablativus
  rationale: El latín marca procedencia/separación; en español, «a vosotros» conserva la relación del objeto afectado por la acción. Si el registro editorial prefiere neutralidad panhispánica, «de ustedes» sería posible, pero aquí se conserva la dirección del original con la forma más directa.
- source_word: in tempore
  english_pob_choice: in due time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en su tiempo
  lexicon: tempus
  rationale: La idea no es solo cronología sino oportunidad determinada por el dador. «A su tiempo» refleja esa oportunidad sin añadir «debido» que no está en el latín.
- source_word: quod donauerat
  english_pob_choice: what he had given
  chosen_spanish: lo que os había dado
  alternatives_spanish:
  - lo que había dado
  - lo que os había concedido
  lexicon: dono
  rationale: «Donauerat» indica una donación previa; en español «dar» es suficiente y más natural. Se conserva el complemento de destinatario «os» porque el latín ya presenta el objeto directo afectado por la retirada.
theological_decisions:
- issue: La frase de juicio no incluye aquí el adjetivo «justo/recto»
  english_pob_reading: since he is a judge
  chosen_spanish_reading: pues, como es juez
  alternative_spanish_readings:
  - pues, como es un juez justo
  - pues, siendo juez recto
  rationale: La evidencia revisada muestra que el adjetivo no pertenece a este verso en la lectura base final. Por fidelidad textual, el español no debe reintroducir una valoración moral no atestiguada aquí.
  doctrine_reference: Fidelidad textual; no añadir epítetos no presentes en el testimonio base.
translation_notes:
  revision_awareness: 'La auditoría revisada corrige una desalineación previa: este verso corresponde a «iudex cum sit, abstulit a uobis in tempore quod donauerat», no al segmento siguiente. También se retiró el adjetivo «righteous/justo» del inglés en la revisión posterior, así que el español evita cualquier calificación no presente en el latín base.'
  spanish_consistency_notes:
  - «Y» final conserva el «Et» conclusivo del testimonio latino, que enlaza con la cláusula siguiente en la unidad mayor.
  - Se mantiene un español sobrio y eclesialmente legible sin recurrir a formulaciones tradicionales que oculten la estructura del original.
