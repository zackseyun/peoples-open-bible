translation:
  language: es
  text: Porque yo quiero amor leal[a] y no sacrificio, y el conocimiento de Dios más que holocaustos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordia» o «amor constante» para חֶסֶד, término que puede abarcar lealtad pactual, amor fiel y misericordia.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «de holocaustos»; aquí el hebreo expresa preferencia: «más que holocaustos» o «antes que holocaustos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del dicho anterior. «Porque» conserva bien el valor explicativo en español y suena natural en discurso directo divino.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia
  alternatives_spanish:
  - amor leal
  - amor constante
  - fidelidad pactual
  lexicon: HALOT
  rationale: El campo semántico incluye lealtad pactual, amor fiel y misericordia. En español, «misericordia» es una opción legítima y tradicional para esta raíz, aunque no agota la fuerza del término; por eso se deja nota de alternativas sin borrar la tensión lexical.
- source_word: חָפַצְתִּי
  english_pob_choice: I desire
  chosen_spanish: yo quiero
  alternatives_spanish:
  - yo deseo
  - yo me complazco en
  lexicon: HALOT
  rationale: El verbo expresa querer, deleitarse en o desear. «Yo quiero» comunica con claridad la preferencia divina en contraste con los sacrificios, sin volverlo mecánico ni demasiado abstracto.
- source_word: זָבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda sacrificial
  - víctima
  lexicon: HALOT
  rationale: Es el término general para sacrificio, en contraste con el segundo miembro más específico. «Sacrificio» preserva ese valor amplio.
- source_word: דַעַת אֱלֹהִים
  english_pob_choice: the knowledge of God
  chosen_spanish: el conocimiento de Dios
  alternatives_spanish:
  - conocer a Dios
  - el saber de Dios
  lexicon: HALOT
  rationale: La construcción nominal mantiene el paralelismo con «misericordia» y evita reducir el sentido a mera información. «Conocimiento de Dios» conserva la sintaxis y la carga relacional/covenantal.
- source_word: מֵעֹלֹות
  english_pob_choice: rather than burnt offerings
  chosen_spanish: más bien que holocaustos
  alternatives_spanish:
  - más que holocaustos
  - en vez de holocaustos
  lexicon: HALOT
  rationale: El prefijo מ en este contexto expresa comparación o preferencia. «Más bien que» comunica mejor la preferencia sin implicar necesariamente abolición total del sistema sacrificial.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas elevadas
  lexicon: HALOT
  rationale: Término cultual específico para ofrendas completamente quemadas. «Holocaustos» es el equivalente tradicional en español bíblico para este contexto sacrificial; se evita «SEÑOR» u otro ajuste ajeno porque aquí no aplica.
theological_decisions:
- issue: Si el versículo niega absolutamente el sacrificio o lo subordina a la fidelidad del pacto
  english_pob_reading: comparative preference for covenant loyalty and true knowledge of God over mere ritual sacrifice
  chosen_spanish_reading: preferencia comparativa por la misericordia/lealtad pactual y el verdadero conocimiento de Dios sobre la mera observancia ritual
  alternative_spanish_readings:
  - rechazo absoluto del sistema sacrificial
  - superioridad moral sin matiz comparativo
  rationale: 'La negación junto con la construcción comparativa con מ favorece una lectura de preferencia, no de abolición total. La traducción conserva esa tensión: Dios prefiere la realidad relacional y pactual a rituales vacíos, sin negar todo valor sacrificial en otros contextos.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete auditado; la lectura más reciente permanece sin cambios y con alto grado de acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, no «el SEÑOR», porque el texto hebreo usa el título genérico/divino y no el Tetragrama.
  - Se usa «holocaustos» como término cultual específico para עֹלוֹת, coherente con el registro bíblico en español.
  - La construcción «más bien que» preserva la comparación del hebreo sin convertirla en una abolición absoluta del sacrificio.
  - Se evita traducir חֶסֶד solo como «misericordia» sin nota, para no borrar su posible sentido de lealtad pactual.
