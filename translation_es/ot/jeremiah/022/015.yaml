translation:
  language: es
  text: ¿Reinas porque rivalizas por cedro? ¿Acaso no comió y bebió tu padre, e hizo justicia y rectitud? Entonces le iba bien[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «compites por cedro» o «estás afanado por el cedro». La expresión hebrea es rara y probablemente alude a la rivalidad real expresada en la construcción palaciega revestida de cedro.'
    reason: lexical_alternative
  - marker: b
    text: «Rectitud» también puede traducirse «lo que es justo».
    reason: alternative_reading
lexical_decisions:
- source_word: הֲתִמְלֹךְ
  english_pob_choice: Do you reign
  chosen_spanish: ¿Reinarás?
  alternatives_spanish:
  - ¿Reinas?
  - ¿Vas a reinar?
  lexicon: HALOT
  rationale: El hebreo usa imperfecto en pregunta retórica. En español, el futuro interrogativo expresa bien la censura desafiante sobre una pretensión de reinar. Mantiene el matiz de cuestionamiento de legitimidad o base del reinado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: 'Introduce la supuesta razón de reinar: la conducta ambiciosa descrita a continuación. ''Porque'' es natural y conserva la relación causal.'
- source_word: מְתַחֲרֶה
  english_pob_choice: compete
  chosen_spanish: compites
  alternatives_spanish:
  - rivalizas
  - te empeñas
  lexicon: HALOT
  rationale: La forma rara sugiere rivalidad o afán competitivo. 'Compites' conserva la fuerza de contienda/aspiración por el cedro sin añadir explicación interpretativa excesiva.
- source_word: בָאָרֶז
  english_pob_choice: in cedar
  chosen_spanish: en cedro
  alternatives_spanish:
  - con cedro
  - por cedro
  lexicon: HALOT
  rationale: La preposición con 'cedro' se mantiene de forma cercana al hebreo. En español, 'compites en cedro' resulta algo inusual, pero preserva la imagen condensada de lujo y construcción palaciega en cedro, sin explicitar más de lo que el texto ofrece.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu antepasado
  - tu padre Josías
  lexicon: HALOT
  rationale: Referencia directa y simple; el contexto histórico sugiere Josías, pero el texto no lo nombra aquí.
- source_word: הֲלוֹא
  english_pob_choice: Did not
  chosen_spanish: ¿Acaso no
  alternatives_spanish:
  - ¿No fue que
  - ¿No es cierto que
  lexicon: HALOT
  rationale: Formula una pregunta retórica que espera respuesta afirmativa. '¿Acaso no' suena natural en español y preserva la persuasión del hebreo.
- source_word: אָכַל וְשָׁתָה
  english_pob_choice: eat and drink
  chosen_spanish: comía y bebía
  alternatives_spanish:
  - comió y bebió
  - comer y beber
  lexicon: HALOT
  rationale: En español, el imperfecto encaja con el trasfondo de la vida ordinaria y estable del padre. Evita sugerir un mero listado puntual y refleja el modo de vida continuo.
- source_word: וְעָשָׂה מִשְׁפָּט וּצְדָקָה
  english_pob_choice: do justice and righteousness
  chosen_spanish: hacía justicia y rectitud
  alternatives_spanish:
  - hacía justicia y justicia recta
  - administraba justicia y rectitud
  lexicon: HALOT
  rationale: '''Justicia'' preserva מִשְׁפָּט y ''rectitud'' preserva צְדָקָה con distinción terminológica en español. ''Rectitud'' evita duplicar ''justicia'' y mantiene la tensión ética/covenantal del par.'
- source_word: אָז טוֹב לוֹ
  english_pob_choice: Then it was well with him
  chosen_spanish: Entonces le iba bien
  alternatives_spanish:
  - Entonces le fue bien
  - Así le iba bien
  lexicon: HALOT
  rationale: Expresa el resultado favorable de su conducta en un español fluido y natural. 'Le iba bien' conserva la idea resultativa y el estado de bienestar derivado.
theological_decisions:
- issue: Par mîšpāṭ / ṣĕdāqâ y su tensión semántica
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - justicia y justicia recta
  - justicia y lo recto
  rationale: En español, 'rectitud' permite distinguir צְדָקָה de מִשְׁפָּט sin diluir ambos en una sola noción. Aunque la tradición bíblica suele unirlos, aquí la distinción ayuda a conservar la tensión moral y covenental del hebreo sin traicionar el sentido.
  doctrine_reference: 'DOCTRINE.md: Contested terms principle on preserving theological tension; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el criterio óptimo del POB inglés. Se conserva la rareza de מְתַחֲרֶה con una solución española natural pero no explicativa; además, se mantiene la distinción entre מִשְׁפָּט y צְדָקָה mediante 'justicia' y 'rectitud', en diálogo con la nota inglesa que preserva la posibilidad alternativa de traducir el segundo término como 'justice/what is right'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; en este versículo no aparece.
  - Se evita 'Cristo' y vocabulario eclesiástico ajeno al pasaje.
  - Se mantiene el tono profético-retórico con preguntas directas y un cierre resultativo breve.
  - '''Rectitud'' funciona aquí como equivalente estable de צְדָקָה sin borrar su dimensión moral-covenantal.'
