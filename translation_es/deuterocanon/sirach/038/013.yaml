translation:
  language: es
  text: Porque hay un tiempo en que el éxito está en sus manos[a], pues él también suplicará a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «hay un tiempo en que el éxito también está en sus manos». El testimonio hebreo lee singular («sus manos»), y por eso el texto principal sigue ese testimonio.'
    reason: textual_variant
lexical_decisions:
- source_word: כי
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la razón o explicación de la afirmación anterior; «Porque» conserva el valor causal sin volverlo demasiado interpretativo.
- source_word: יש עתם
  english_pob_choice: there is a time
  chosen_spanish: hay un tiempo
  alternatives_spanish:
  - hay un momento
  - hay una ocasión
  - hay un tiempo señalado
  lexicon: HALOT
  rationale: La construcción hebrea expresa una existencia temporal indefinida; «hay un tiempo» mantiene esa apertura sin añadir «señalado» en ausencia de ese matiz explícito en el texto base.
- source_word: בידו
  english_pob_choice: in his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - bajo su control
  - a su alcance
  - en su poder
  lexicon: HALOT
  rationale: Conserva el hebraísmo de la agencia práctica en español natural. El posesivo plural en español resulta más idiomático en una formulación general, y la nota textual preserva la tensión entre singular hebreo y plural griego.
- source_word: מצלחת
  english_pob_choice: success
  chosen_spanish: prosperidad
  alternatives_spanish:
  - éxito
  - buen resultado
  - éxito favorable
  lexicon: HALOT
  rationale: El término apunta a buen resultado, prosperar o tener éxito. «Prosperidad» permite reflejar ese campo semántico amplio y se ajusta también al paralelo griego εὐοδία ('buen progreso, éxito').
- source_word: גם הוא
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - incluso él
  lexicon: HALOT
  rationale: Reproduce el énfasis de que el médico no solo actúa con habilidad, sino que además se dirige a Dios.
- source_word: אל אל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - hacia Dios
  - a Dios mismo
  lexicon: HALOT
  rationale: La repetición hebrea se entiende mejor aquí como una expresión idiomática de dirección a Dios. En español, «a Dios» es claro y sobrio, sin forzar una redundancia artificial.
- source_word: יעתיר
  english_pob_choice: will make supplication
  chosen_spanish: suplicará
  alternatives_spanish:
  - hará súplica
  - implorará
  - dirigirá súplica
  lexicon: HALOT
  rationale: El verbo implica ruego intenso o intercesión, no solo oración genérica. «Suplicará» comunica esa carga de manera más natural que una calca como «hará súplica».
- source_word: ἐν χερσὶν αὐτῶν
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus manos
  - en manos de ellos
  - bajo sus manos
  lexicon: BDAG
  rationale: Aunque el hebreo conserva singular («su mano»), el griego paralelo presenta plural. El español puede abarcar ambas posibilidades con «sus manos» dentro de una nota textual, evitando perder la variante griega.
theological_decisions:
- issue: Relación entre la pericia médica humana y la acción de Dios
  english_pob_reading: The verse affirms that the physician can have real success while still depending on God in prayer.
  chosen_spanish_reading: El versículo afirma que el médico puede tener verdadero buen resultado en su labor y, aun así, depender de Dios al suplicar.
  alternative_spanish_readings:
  - El versículo solo dice que a veces hay éxito médico.
  - El versículo puede leerse como una afirmación general sobre el éxito humano sin referencia especial a Dios.
  rationale: 'La redacción conserva la tensión del texto: la eficacia humana no elimina la dependencia de Dios. No se reduce ni a técnica autónoma ni a intervención milagrosa exclusiva.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta que el pase más reciente no introdujo cambios y que el cotejo final reportó alta concordancia con observaciones menores. La redacción española mantiene el sentido principal del hebreo, mientras la nota recoge la variante griega plural sin borrarla.
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para אל אל, siguiendo el criterio POB.
  - Se preserva la tensión singular/plural en la nota textual en vez de armonizarla silenciosamente.
  - «Suplicará» se eligió para reflejar el peso verbal de יעתיר sin caer en un registro arcaico excesivo.
  - «Prosperidad» intenta cubrir el valor semántico de מצלחת y el paralelo griego εὐοδία sin estrecharlo a mero éxito técnico.
