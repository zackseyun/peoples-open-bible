translation:
  language: es
  text: Joás hizo lo que era recto[a] ante Yahvé todos los días de Joiadá, el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «lo recto»; en esta fórmula evaluativa se expresa en español de manera más natural como «lo que era recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  lexicon: HALOT
  rationale: El verbo עשה en esta fórmula evaluativa se expresa naturalmente en español con «hacer/hizo». Mantiene la acción simple del hebreo sin añadir matices inexistentes.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo correcto
  - lo justo
  - lo que era recto
  lexicon: HALOT
  rationale: El adjetivo יָשָׁר significa ‘recto/upright’. En español, «lo recto» conserva la brevedad y el valor evaluativo del hebreo. «Lo correcto» sería más interpretativo y menos cercano a la forma nominal.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante
  alternatives_spanish:
  - a los ojos de
  - en los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y expresa evaluación desde el punto de vista de alguien. «Ante» comunica esa valoración de manera natural en español sin perder la idea de referencia divina. Se conserva el carácter relacional del hebreo aunque no se reproduzca literalmente la metáfora ocular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el Tetragrama: «Yahvé» como forma española del nombre divino. No se sustituye por «SEÑOR», para preservar el nombre propio del pacto.'
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - mientras vivió
  lexicon: HALOT
  rationale: La expresión temporal se traduce con una construcción directa y natural en español, manteniendo el alcance completo de la frase hebrea.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Joiadá
  alternatives_spanish:
  - Jehoiada
  lexicon: Onomastics
  rationale: Se adopta la forma española tradicional y ampliamente reconocible del nombre propio, manteniendo la identificación del personaje sin anglicismo innecesario.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote sacerdotal
  lexicon: HALOT
  rationale: כֹּהֵן designa el oficio de Jehoiada. En español, «el sacerdote» transmite con claridad la función sin ampliar ni suavizar el título.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La decisión mantiene el nombre personal de Dios tal como lo hace la base inglesa POB, evitando la sustitución tradicional por un título. En español, «Yahvé» es la forma más establecida y publica para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni revisiones textuales; el veredicto de revisión fue de alta concordancia y sin cambios. La presente redacción sigue ese estado estable, trasladando al español las mismas decisiones léxicas y teológicas sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando una paráfrasis explicativa.
  - La fórmula evaluativa se resolvió con una construcción idiomática española breve («hizo lo recto»).
  - Se preservó el nombre divino con la forma española «Yahvé», coherente con la política POB.
  - El nombre propio del sacerdote se normalizó a la forma usual «Joiadá» para facilitar lectura en español.
