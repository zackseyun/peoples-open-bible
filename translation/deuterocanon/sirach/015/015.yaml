id: SIR.15.15
reference: Sirach 15:15
source:
  edition: sefaria-ben-sira-kahana
  text: אִם תַּחְפֹּץ תִּשְׁמֹר מִצְוָה, וְתָבִינָה לַעֲשׂוֹת רְצוֹנוֹ.<br><small>(טו)</small> אִם תַּאֲמִין בּוֹ גַּם אַתָּה, תִּחְיֶה.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐὰν θέλῃς, συντηρήσεις ἐντολάς, καὶ πίστιν ποιῆσαι εὐδοκίας.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:15
translation:
  text: If you desire[a], you will keep the commandment, and to act faithfully is a matter of your good pleasure. If you trust in him[c][b], you too will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular 'commandment'; the Greek parallel reads plural 'commandments.'
    reason: textual_variant
  - marker: b
    text: The middle clause is difficult in the Hebrew. The Greek parallel reads, 'and to produce faith is of good pleasure,' reflecting either a different Vorlage or an interpretive rendering.
    reason: alternative_reading
  - marker: c
    text: Or 'If you believe in him, you too will live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם תַּחְפֹּץ
  chosen: If you desire
  alternatives:
  - If you choose
  - If you are willing
  lexicon: HALOT
  rationale: The Hebrew verb חפץ denotes desire or willing delight. 'If you desire' preserves the volitional force and matches the conditional structure without overinterpreting it as mere ability.
- source_word: תִּשְׁמֹר מִצְוָה
  chosen: you will keep the commandment
  alternatives:
  - you will keep the commandments
  - you will observe a commandment
  lexicon: HALOT
  rationale: The Hebrew reads singular מִצְוָה, so 'the commandment' best reflects the form while still allowing a collective sense. The Greek parallel has plural ἐντολάς, which suggests a broader sense, but the Hebrew witness is primary here.
- source_word: וְתָבִינָה
  chosen: and to act faithfully is a matter of
  alternatives:
  - and understanding
  - and you will understand
  - and discernment
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the Greek parallel appears to reflect a different Vorlage or interpretive rendering with πίστιν ποιῆσαι. Because the second colon is textually and semantically uncertain, the translation is guided by the Greek alongside the Hebrew. The chosen English captures the sense of faithful action rather than forcing a wooden rendering of a problematic Hebrew form.
- source_word: לַעֲשׂוֹת רְצוֹנוֹ
  chosen: your good pleasure
  alternatives:
  - his will
  - what pleases him
  - what you desire
  lexicon: HALOT
  rationale: The Hebrew consonantal text points toward 'to do his will,' but the Greek parallel εὐδοκίας suggests a sense tied to pleasure or willing disposition. Given the instability of the line and the close connection with the opening condition, the translation renders the clause as referring to the person's willing choice. This is documented as a theological/text-critical decision rather than treated as certain.
- source_word: אִם תַּאֲמִין בּוֹ
  chosen: If you trust in him
  alternatives:
  - If you believe in him
  - If you have faith in him
  lexicon: HALOT
  rationale: The verb אמן with ב conveys trusting or believing in someone. 'Trust in him' is idiomatic modern English and preserves the relational force better than the more abstract 'have faith in him.'
- source_word: תִּחְיֶה
  chosen: you too will live
  alternatives:
  - you will live
  - you shall live
  lexicon: HALOT
  rationale: The verb means 'live.' 'Too' reflects גַּם אַתָּה and preserves the emphatic inclusion of the addressee.
