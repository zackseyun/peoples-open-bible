revisions:
- from: 'Y Yahvé dijo a Josué: “Mira, he entregado en tu mano a Jericó, junto con su rey y los valientes guerreros”.'
  to: 'Y Yahvé dijo a Josué: «Mira, he entregado en tu mano a Jericó, junto con su rey y los poderosos guerreros[a]»'
  rationale: Se mantiene la traducción general del borrador porque es fiel y natural, pero se ajusta גִּבּוֹרֵי הֶחָיִל a 'los poderosos guerreros' para reflejar mejor la doble carga semántica de fuerza y capacidad militar. También se añade la nota léxica ya documentada en el POB inglés y se normaliza la puntuación/comillas al uso español.
  reviewer_model: gpt-5.4
