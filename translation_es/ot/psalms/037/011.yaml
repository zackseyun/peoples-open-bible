translation:
  language: es
  text: Pero los humildes heredarán la tierra y se deleitarán en abundante paz[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mansos».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra entera».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los afligidos
  lexicon: HALOT
  rationale: El hebreo designa a los que son bajos, humildes o modestos. «Los humildes» es claro y natural en español moderno, y conserva el sentido ético del salmo. «Los mansos» mantiene una posible resonancia intertextual, pero puede sonar más limitado o religioso en español; por eso queda como alternativa.
- source_word: יִירְשׁוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: El verbo ירשׁ expresa heredar y también poseer o tomar posesión. «Heredarán» conserva el futuro y el matiz de herencia/covenio mejor que un verbo más plano como «poseerán».
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En este salmo, el contexto favorece la posesión estable del territorio. En español, «la tierra» comunica de manera natural tanto el ámbito territorial como la resonancia bíblica de posesión pactal. Se evita «el mundo» porque ampliaría indebidamente el alcance.
- source_word: וְהִתְעַנְּגוּ
  english_pob_choice: and delight themselves
  chosen_spanish: y se deleitarán
  alternatives_spanish:
  - y se deleitarán en sí mismos
  - y disfrutarán
  lexicon: HALOT
  rationale: El hitpael comunica gozo intenso y disfrute. «Se deleitarán» reproduce bien el valor reflexivo sin volver la frase pesada; en español no hace falta explicitar «a sí mismos».
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en medio de
  lexicon: HALOT
  rationale: 'Aunque la preposición básica puede ser «sobre/en/encima de», en esta construcción con deleite y un sustantivo abstracto, «en» es la solución idiomática correcta en español: «se deleitarán en abundante paz».'
- source_word: רֹב
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - gran
  - plena
  lexicon: HALOT
  rationale: El sustantivo indica abundancia, plenitud o gran cantidad. Convertirlo en adjetivo («abundante») produce una construcción natural en español y mantiene la idea de plenitud.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más directa y reconocible. Aunque שָׁלוֹם también incluye bienestar integral, en esta línea poética «paz» conserva la concisión y el peso bíblico del término.
theological_decisions:
- issue: Resonancia intertextual con Mateo 5:5 («los mansos heredarán la tierra» / «los meek shall inherit the earth» en la tradición inglesa)
  english_pob_reading: The humble will inherit the land, with footnoted alternatives 'the meek' and 'the earth.'
  chosen_spanish_reading: Los humildes heredarán la tierra, con alternativas anotadas «los mansos» y «la tierra» como posibles matices tradicionales.
  alternative_spanish_readings:
  - Los mansos heredarán la tierra
  - Los humildes heredarán el país
  rationale: Se mantiene la prioridad del texto hebreo frente a una armonización automática con la formulación tradicional del NT. Al mismo tiempo, se preservan las alternativas relevantes porque el campo semántico de עֲנָוִים admite tanto «humildes» como «mansos», y אָרֶץ puede referir a «tierra» en sentido territorial o más amplio.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el juicio del POB inglés con acuerdo alto y sin revisiones aplicadas; se conserva la estructura poética y las dos alternativas lexicográficas documentadas, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se eligió «heredarán» en lugar de «poseerán» para conservar el matiz covenantal del verbo hebreo.
  - «Paz» se usa como traducción principal de שָׁלוֹם, sin ampliar a «bienestar» en el texto principal.
  - Las notas al pie usan marcadores únicos y aparecen ancladas en el texto principal según el formato requerido.
