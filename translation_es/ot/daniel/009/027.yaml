base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/027.yaml
  text: And he will make a firm covenant with the many for one week[a], and for half of the week he will put a stop to sacrifice and offering. And on the wing of abominations will come one who makes desolate[e][d][c][b], until the decreed end is poured out on the desolator.
  footnotes:
  - marker: a
    text: Or 'will confirm a covenant' or 'will strengthen a covenant.' The Hebrew verb means to make strong or cause to prevail.
    reason: lexical_alternative
  - marker: b
    text: Or 'sacrifice and grain offering.' The second term can refer more specifically to a grain offering.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'on the wing of abominations.' The phrase is difficult; alternatives include 'on the pinnacle of abominations' or 'upon a wing of abominations.'
    reason: alternative_reading
  - marker: d
    text: Or 'a desolator' / 'one causing desolation.'
    reason: lexical_alternative
  - marker: e
    text: Or 'will be poured out on the one made desolate' or 'on the desolate place.' The final clause is textually stable but syntactically difficult.
    reason: alternative_reading
