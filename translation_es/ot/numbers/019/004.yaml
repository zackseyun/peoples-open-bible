translation:
  language: es
  text: Entonces Eleazar, el sacerdote, tomará con su dedo algo de su sangre y asperjará algo de su sangre siete veces hacia el frente de la tienda de reunión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de la tienda de reunión». La frase hebrea indica orientación hacia el frente de la tienda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Luego ... tomará
  lexicon: HALOT
  rationale: En la secuencia ritual del hebreo, el waw consecutivo marca continuidad instructiva. «Entonces» comunica bien el paso siguiente sin sonar rígido; «tomará» mantiene el valor prescriptivo del futuro en español bíblico natural.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio, como en el texto inglés POB y en la tradición bíblica en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el ministro cultual
  lexicon: HALOT
  rationale: Aquí el título identifica el oficio de Eleazar. En español, «sacerdote» es claro y natural; no hace falta introducir una formulación más técnica.
- source_word: מִדָּמָהּ
  english_pob_choice: some of its blood
  chosen_spanish: algo de su sangre
  alternatives_spanish:
  - parte de su sangre
  - un poco de su sangre
  lexicon: HALOT
  rationale: El prefijo מִן es partitivo en este contexto. «Algo de su sangre» conserva esa parcialidad sin forzar un cuantificador más preciso de lo que el hebreo exige.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - con el dedo
  - usando su dedo
  lexicon: HALOT
  rationale: 'La frase es instrumental: la sangre se toma y se aplica mediante el dedo. «Con su dedo» sigue de cerca el valor del hebreo y evita una imagen demasiado libre.'
- source_word: וְהִזָּה
  english_pob_choice: and sprinkle
  chosen_spanish: y rociará
  alternatives_spanish:
  - y asperjará
  - y salpicará
  lexicon: HALOT
  rationale: En el acto ritual de purificación, «rociar» es un equivalente español comprensible y digno. «Asperjar» sería más técnico, pero menos accesible; «salpicar» sería demasiado coloquial.
- source_word: אֶל נֹכַח פְּנֵי
  english_pob_choice: toward the front of
  chosen_spanish: hacia el frente de
  alternatives_spanish:
  - delante de
  - frente a
  lexicon: HALOT
  rationale: La construcción indica orientación espacial hacia la parte frontal del santuario, no necesariamente delante en sentido general. «Hacia el frente de» preserva la precisión direccional.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo
  lexicon: HALOT
  rationale: Se conserva la designación cultual tradicionalmente traducida como «tienda de reunión», que refleja bien la función del lugar sin reemplazarla por una interpretación más cargada como «tabernáculo».
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  lexicon: HALOT
  rationale: La expresión numérica es directa y no requiere paráfrasis.
theological_decisions:
- issue: Direccionalidad de אֶל נֹכַח פְּנֵי
  english_pob_reading: toward the front of the tent of meeting
  chosen_spanish_reading: hacia el frente de la tienda de reunión
  alternative_spanish_readings:
  - delante de la tienda de reunión
  - frente a la tienda de reunión
  rationale: El hebreo no solo indica proximidad, sino orientación hacia la parte frontal del santuario. Mantener esa dirección evita sugerir una acción simplemente ‘delante’ sin el matiz espacial del original.
  doctrine_reference: Números 19:4; uso cultual del espacio sagrado
- issue: Función ritual de la sangre
  english_pob_reading: take some of its blood ... and sprinkle some of its blood
  chosen_spanish_reading: tomará con su dedo algo de su sangre y rociará algo de su sangre
  alternative_spanish_readings:
  - tomará parte de su sangre y la rociará
  - tomará su sangre y la rociará
  rationale: La repetición de la sangre en el hebreo subraya que es el medio ritual central. Conservé esa repetición en español para no borrar el énfasis litúrgico del texto.
  doctrine_reference: Ritos de purificación en Números 19
translation_notes:
  revision_awareness: 'La versión española sigue la revisión del audit trail que corrigió la relación instrumental de בְּאֶצְבָּעוֹ: no «con el dedo» de manera vaga ni «sobre el dedo», sino una formulación instrumental clara. También conserva la repetición de «su sangre» presente en el inglés POB y en el hebreo, y mantiene la orientación espacial de אֶל נֹכַח פְּנֵי con una nota que recoge la alternativa textual/lexical documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se prefirió «tienda de reunión» para אֹהֶל מוֹעֵד, consistente con el término técnico del proyecto.
  - Se mantuvo «sangre» con repetición explícita para respetar el énfasis del hebreo y del audit trail inglés.
  - «Rociará» se eligió como equivalente culto y natural de un acto ritual de asperjar/sprinkling en español.
