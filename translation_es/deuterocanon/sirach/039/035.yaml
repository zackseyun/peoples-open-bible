translation:
  language: es
  text: Ahora, con todo el corazón, canten con júbilo[a], y bendigan el nombre del Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «y bendigan el nombre del Señor». El testigo hebreo lee «el Santo».'
    reason: alternative_reading
lexical_decisions:
- source_word: עתה / καὶ νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT; BDAG
  rationale: El marcador temporal-discursivo introduce la exhortación final. «Ahora» transmite la inmediatez sin añadir una carga conjuntiva innecesaria. La opción hebrea primaria no exige reproducir explícitamente el «y» del griego.
- source_word: בכל לב / ἐν πάσῃ καρδίᾳ
  english_pob_choice: with all your heart
  chosen_spanish: con todo el corazón
  alternatives_spanish:
  - con el corazón entero
  - de todo corazón
  lexicon: HALOT; LSJ
  rationale: Expresa la idiomática de plena entrega afectiva y volitiva. En español, «con todo el corazón» es natural y conserva la fuerza totalizante de לב / καρδία.
- source_word: הרנינו / ὑμνήσαμεν
  english_pob_choice: sing for joy
  chosen_spanish: canten de júbilo
  alternatives_spanish:
  - alégrense con cantos
  - prorrumpan en gritos de alegría
  lexicon: HALOT; LSJ
  rationale: El verbo hebreo comunica júbilo vocal y celebración; el griego apoya el campo de canto/alabanza. «Canten de júbilo» preserva el matiz de expresión sonora sin reducirlo a una simple alegría interior.
- source_word: וברכו
  english_pob_choice: and bless
  chosen_spanish: y bendigan
  alternatives_spanish:
  - y alaben
  - y pronuncien bendición sobre
  lexicon: HALOT
  rationale: «Bendigan» conserva el idiomatismo bíblico de ברך en contexto doxológico. «Alaben» sería más general y perdería parte de la relación formal con la bendición dirigida al nombre divino.
- source_word: את שם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  - el Nombre
  lexicon: HALOT
  rationale: Se mantiene el sustantivo con valor reverencial y metonímico. En español, «el nombre» es claro y fiel; capitalizarlo no es necesario para expresar reverencia.
- source_word: הקדוש / Κυρίου
  english_pob_choice: the Holy One
  chosen_spanish: del Santo
  alternatives_spanish:
  - del Santo Uno
  - del Señor
  lexicon: HALOT; LSJ
  rationale: La tradición hebrea transmitida lee «el santo/ el Santo», mientras el griego paralelo explicita «del Señor». Para un español bíblico natural, «del Santo» conserva la prioridad del testigo hebreo y mantiene la diferencia titulativa con el paralelo griego, sin imponer el equivalente litúrgico «Señor» como máscara editorial.
theological_decisions:
- issue: 'Título divino final: hebreo הקדוש frente a griego Κυρίου'
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el Señor
  - el Santo Uno
  rationale: Siguiendo el criterio del proyecto para Sirácides, el texto principal en español debe reflejar el testigo hebreo conservado cuando existe. El griego paralelo ofrece una variante real y significativa («del Señor»), pero no debe reemplazar sin más la lectura hebrea. «El Santo» mantiene la tensión textual y es suficientemente claro en español devocional.
  doctrine_reference: 'PHILOSOPHY.md: Sirach from Hebrew where it survives; Greek parallel preserved as alternative reading'
translation_notes:
  revision_awareness: 'Se ha seguido el pass más reciente sin cambios sustantivos: la solución del audit trail en inglés sigue siendo válida, y la única tensión relevante para el español es la del título divino final, preservada mediante nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponde, pero aquí el testigo hebreo de Sirácides ofrece un título distinto («el Santo»), por lo que no se introduce «Yahvé».
  - «Bendigan» conserva el valor bíblico de ברך sin sustituirlo por un alabar genérico.
  - El marcador de nota [a] está anclado en la cláusula de variación textual para reflejar el paralelo griego sin recargar el texto principal.
