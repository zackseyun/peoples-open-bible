base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/007/029.yaml
  text: Do not fear this executioner[a], but, becoming worthy of your brothers, accept death[c][b], so that in mercy I may receive you back together with your brothers.
  footnotes:
  - marker: a
    text: Or 'this torturer.' The Greek δήμιος more precisely denotes an executioner, though the broader context includes torture.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in mercy' likely refers to divine mercy, but God is not explicitly named in the Greek of this clause.
    reason: alternative_reading
  - marker: c
    text: Or 'I may recover you' or 'I may receive you.' The wording expresses the mother's hope of being reunited with her son together with his brothers.
    reason: lexical_alternative
