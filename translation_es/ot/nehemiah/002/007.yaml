    issue: La designación regional «del Otro lado del Río» es poco idiomática y algo rígida.
    rationale: עֵבֶר הַנָּהָר es un término administrativo persa. El inglés auditado lo fija como «Beyond the River» con mayúsculas para marcar nombre regional. En español, «Más Allá del Río» comunica mejor ese valor de título que «del Otro lado del Río», que suena más direccional y menos establecido.
  - severity: low
