translation:
  language: es
  text: El extranjero no pasaba la noche fuera[a]; yo abría mis puertas al viajero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El forastero no pernoctaba afuera; yo abría mi puerta al caminante.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en la calle
  lexicon: HALOT
  rationale: El hebreo indica estar en el exterior, al aire libre. «Afuera» reproduce con naturalidad ese sentido en español y evita especificar innecesariamente «en la calle».
- source_word: יָלִין
  english_pob_choice: did not spend the night
  chosen_spanish: no pasaba la noche
  alternatives_spanish:
  - no se alojaba
  - no pernoctaba
  lexicon: HALOT
  rationale: לין expresa pasar la noche o alojarse. «No pasaba la noche» es claro y conserva el matiz temporal mejor que un simple «no estaba».
- source_word: גֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el extranjero
  - el residente forastero
  lexicon: HALOT
  rationale: En este contexto, גֵּר es una persona no nativa con posible vulnerabilidad social. «Forastero» comunica mejor esa condición general que «extranjero», que puede sonar demasiado técnico o nacional.
- source_word: דְּלָתַי
  english_pob_choice: my doors
  chosen_spanish: mis puertas
  alternatives_spanish:
  - mi puerta
  lexicon: HALOT
  rationale: El hebreo está en plural con sufijo de primera persona singular. «Mis puertas» refleja mejor la forma plural y mantiene la imagen de hospitalidad abierta.
- source_word: לָאֹרַח
  english_pob_choice: to the traveler
  chosen_spanish: al caminante
  alternatives_spanish:
  - al viajero
  - al viandante
  - al huésped
  lexicon: HALOT
  rationale: אֹרַח puede referirse aquí a una persona en camino. «Caminante» conserva la idea de alguien que transita y encaja bien con la imagen de abrir las puertas a quien llega.
- source_word: אֶפְתָּח
  english_pob_choice: I opened
  chosen_spanish: abría
  alternatives_spanish:
  - abrí
  - abriría
  lexicon: HALOT
  rationale: El imperfecto hebreo en esta autodefensa de Job puede expresar una práctica habitual. «Abría» comunica mejor esa conducta característica que un pretérito puntual.
translation_notes:
  revision_awareness: El texto en inglés muestra alto acuerdo y no registra revisiones aplicadas; esta versión sigue de cerca la lectura hebrea y conserva el paralelismo de hospitalidad sin introducir matices no respaldados.
  spanish_consistency_notes:
  - Se mantiene «forastero» para גֵּר conforme al valor social del término y en coherencia con otros pasajes donde POB evita reducirlo a un simple desconocido.
  - Se conserva el plural «mis puertas» por fidelidad a דְּלָתַי, aunque en español singular también sería idiomático.
  - «Abría» refleja el imperfecto con valor habitual; no se fuerza un pasado puntual.
  - La nota al pie ofrece la alternativa lexical principal sin duplicar indebidamente el sentido del texto base.
