  revision_rationale: 'Se conserva el texto principal porque refleja fielmente el hebreo y las decisiones del POB. Solo se corrige el aparato de notas: se elimina la nota redundante y se reubica la alternativa donde realmente corresponde, en la cláusula final completa.'
