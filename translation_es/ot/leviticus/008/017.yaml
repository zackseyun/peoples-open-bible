translation:
  language: es
  text: Pero el toro, junto con su cuero[a], su carne y su estiércol[b], lo quemó con fuego fuera del campamento, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su piel.'
    reason: lexical_alternative
  - marker: b
    text: O 'su excremento'; פֶּרֶשׁ se refiere de manera concreta a estiércol, no solo a desecho general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro joven
  lexicon: HALOT
  rationale: פָּר designa un toro/novillo sacrificial. En español, 'toro' es el equivalente más natural y directo; 'novillo' o 'toro joven' precisan la edad, pero esa información no está expresada en este versículo y no conviene importarla al texto principal.
- source_word: עֹרוֹ
  english_pob_choice: its hide
  chosen_spanish: su piel
  alternatives_spanish:
  - su cuero
  - su pellejo
  lexicon: HALOT
  rationale: עֹר puede significar piel o cuero. En español, 'su piel' es claro y amplio; 'cuero' suena más material y puede estrechar indebidamente el sentido, mientras que 'pellejo' resulta menos neutral.
- source_word: בְּשָׂרוֹ
  english_pob_choice: its flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su tejido
  lexicon: HALOT
  rationale: בָּשָׂר se traduce normalmente como 'carne'. En un contexto sacrificial, conserva el contraste con la piel y con el estiércol mejor que 'cuerpo' o un término técnico.
- source_word: פִּרְשׁוֹ
  english_pob_choice: its dung
  chosen_spanish: su estiércol
  alternatives_spanish:
  - sus excrementos
  - su desecho
  lexicon: HALOT
  rationale: פֶּרֶשׁ se refiere de manera concreta a excremento/estiércol. 'Estiércol' es fiel y transparente en español; 'excrementos' es posible, pero algo más clínico; 'desecho' pierde precisión.
- source_word: שָׂרַף בָּאֵשׁ
  english_pob_choice: he burned with fire
  chosen_spanish: lo quemó con fuego
  alternatives_spanish:
  - lo quemó en el fuego
  - lo incineró
  lexicon: HALOT
  rationale: La construcción hebrea expresa un quemar intensivo o completo. 'Lo quemó con fuego' sigue de cerca la forma hebrea sin sonar rígida; 'incineró' es demasiado técnico y 'en el fuego' debilita la fuerza idiomática.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera de la campamento
  lexicon: HALOT
  rationale: '''Fuera del campamento'' es la equivalencia natural y bíblica en español. ''Afuera'' es demasiado coloquial en este registro; ''campamento'' conserva el marco del desierto y del culto.'
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... had commanded
  chosen_spanish: tal como ... había mandado
  alternatives_spanish:
  - como ... había mandado
  - según ... había mandado
  lexicon: HALOT
  rationale: '''Tal como'' expresa bien la conformidad del acto con la orden. ''Mandado'' funciona con naturalidad en español bíblico contemporáneo y evita la rigidez de ''ordenado''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. El estándar del proyecto pide 'Yahvé' en el texto principal español, preservando el nombre personal de Dios sin sustituirlo por un título.
- source_word: וְאֶת ... וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: along with its hide, its flesh, and its dung
  chosen_spanish: junto con su piel, su carne y su estiércol
  alternatives_spanish:
  - y su piel y su carne y su estiércol
  lexicon: Hebrew grammar
  rationale: La serie repetida de objetos directos en hebreo enumera las partes del toro. 'Junto con' suaviza la acumulación en español sin perder la secuencia enumerativa ni añadir interpretación.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo contiene explícitamente el Tetragrámaton. Siguiendo la convención del proyecto, se translitera como 'Yahvé' para conservar el nombre de pacto de Dios y no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios necesarios y el acuerdo de control fue alto. La versión española sigue ese sentido estable, con ajuste terminológico al estándar español del proyecto ('Yahvé' y 'estiércol/piel').
  spanish_consistency_notes:
  - Se mantiene el tono cultual y narrativo breve del hebreo.
  - Se evitó introducir 'ofrenda por el pecado' en el texto principal porque ese dato proviene del contexto inmediato, no de este versículo en sí.
  - '''Toro'' se eligió para reproducir el sustantivo hebreo sin sobreespecificar edad.'
  - Los marcadores de nota se integran solo donde hay alternativas léxicas reales en español.
