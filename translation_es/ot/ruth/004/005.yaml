translation:
  language: es
  text: 'Entonces Booz dijo[a]: «El día que adquieras el campo de manos de Noemí, también adquieres a Rut la moabita, la esposa del muerto[b], para levantar el nombre del muerto sobre su heredad[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo puede leerse de forma más literal: «Adquirí» o «He adquirido» a Rut la moabita; muchos entienden aquí el sentido contextual de «también adquieres».'
    reason: textual_variant
  - marker: b
    text: 'O: «la esposa del difunto».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, para preservar la línea familiar del fallecido y su derecho dentro de la heredad recibida.
    reason: cultural_note
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: On the day
  chosen_spanish: El día en que
  alternatives_spanish:
  - Cuando
  - En el día en que
  lexicon: HALOT
  rationale: Conserva el valor temporal e idiomático del hebreo sin volver la frase forzada en español; además mantiene el marco jurídico de la negociación.
- source_word: קְנוֹתְךָ
  english_pob_choice: you acquire
  chosen_spanish: adquieras
  alternatives_spanish:
  - compres
  - compres/adquieras
  lexicon: HALOT
  rationale: קנה en este contexto es un acto legal de adquisición, no solo una compra comercial. «Adquieras» refleja ese matiz con naturalidad en español.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la parcela
  - la tierra
  lexicon: HALOT
  rationale: El referente inmediato es una porción concreta de propiedad en disputa; «campo» es fiel y claro en español, y evita la amplitud de «tierra».
- source_word: מִיַּד נָעֳמִי
  english_pob_choice: from the hand of Naomi
  chosen_spanish: de manos de Noemí
  alternatives_spanish:
  - de Noemí
  - de la mano de Noemí
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para transferencia de control/posesión. «De manos de» preserva esa imaginería legal sin sonar excesivamente literalista.
- source_word: וּמֵאֵת רוּת הַמּוֹאֲבִיָּה
  english_pob_choice: you also acquire Ruth the Moabite
  chosen_spanish: también adquieres a Rut la moabita
  alternatives_spanish:
  - y también adquieres a Rut la moabita
  - también recibes a Rut la moabita
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil y la lógica contextual apunta a que la adquisición del campo trae consigo la obligación respecto de Rut. En español se expresa de manera explícita, sin perder el vínculo legal del pasaje.
- source_word: אֵשֶׁת הַמֵּת
  english_pob_choice: the wife of the dead man
  chosen_spanish: la esposa del muerto
  alternatives_spanish:
  - la esposa del difunto
  - la mujer del muerto
  lexicon: HALOT
  rationale: «La esposa del muerto» reproduce de forma directa la construcción hebrea «mujer/esposa del muerto»; evita añadir la interpretación «viuda», que sería plausible pero más explicativa que el hebreo.
- source_word: קניתי
  english_pob_choice: you also acquire
  chosen_spanish: adquieres
  alternatives_spanish:
  - adquirí
  - he adquirido
  lexicon: HALOT
  rationale: La vocalización masorética sugiere primera persona singular, pero el contexto narrativo favorece el sentido dirigido al otro reclamante. El texto principal sigue la lectura contextual, mientras el fondo textual queda reconocido en la nota.
- source_word: לְהָקִים שֵׁם
  english_pob_choice: in order to raise up the name
  chosen_spanish: para levantar el nombre
  alternatives_spanish:
  - para establecer el nombre
  - para perpetuar el nombre
  lexicon: HALOT
  rationale: «Levantar el nombre» conserva la metáfora hebrea de restaurar/perpetuar la memoria y la línea del fallecido, sin reemplazarla por un equivalente más interpretativo.
- source_word: הַמֵּת
  english_pob_choice: the dead
  chosen_spanish: el muerto
  alternatives_spanish:
  - el difunto
  - el fallecido
  lexicon: HALOT
  rationale: Se mantiene la fuerza sustantivada del participio hebreo. «El muerto» suena más directo y conserva la repetición enfática del original.
- source_word: עַל נַחֲלָתוֹ
  english_pob_choice: on his inheritance
  chosen_spanish: sobre su heredad
  alternatives_spanish:
  - sobre su herencia
  - en su heredad
  lexicon: HALOT
  rationale: «Heredad» es preferible a «herencia» porque en español bíblico conserva mejor el trasfondo de posesión hereditaria y territorio familiar, y refleja el peso legal del término.
theological_decisions:
- issue: Lectura sintáctica/textual del verbo קניתי con Rut y la obligación de redención familiar
  english_pob_reading: 'Render the sense as addressed to the nearer redeemer: acquiring the field entails also acquiring Ruth as part of the obligation to preserve the dead man’s name.'
  chosen_spanish_reading: 'El texto principal expresa la idea contextual: al adquirir el campo, también se asume a Rut dentro de la obligación de preservar el nombre del muerto.'
  alternative_spanish_readings:
  - 'Lectura más literal: «yo adquirí a Rut la moabita»'
  - 'Conectarla de otro modo: «y desde Rut la moabita…»'
  rationale: La forma masorética conlleva una dificultad real, y la traducción no debe ocultarla. Sin embargo, el desarrollo narrativo hace que Booz describa la obligación vinculada a la redención del campo. Por eso la redacción principal sigue el sentido contextual, pero sin borrar la tensión textual.
  doctrine_reference: 'Filosofía de traducción #1, #3 y #5'
- issue: Nombre del muerto sobre su heredad como preservación de línea/familia
  english_pob_reading: That is, to preserve the deceased man’s family line and claim within his inherited property.
  chosen_spanish_reading: La frase se entiende como preservación del nombre y del derecho familiar dentro de la heredad.
  alternative_spanish_readings:
  - Preservar la descendencia del muerto
  - Mantener vivo el nombre del difunto
  rationale: «Levantar el nombre» en español puede sonar abstracto; la nota aclara que se trata de continuidad familiar y de reclamación dentro de la propiedad heredada, evitando una paráfrasis excesiva en el cuerpo del texto.
  doctrine_reference: Contexto jurídico-familiar de Rut 4
translation_notes:
  revision_awareness: El resumen de revisión indica high_agreement y no registró cambios respecto del pase más reciente; por eso este borrador mantiene la solución contextual para קניתי y conserva la tensión textual en la nota, sin introducir ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando no aparece en este versículo.
  - «Rut» y «Noemí» siguen la forma española bíblica habitual.
  - Se usa «heredad» de manera consistente con el trasfondo legal y territorial del pasaje.
  - La solución principal evita «viuda» porque el hebreo dice literalmente «la esposa del muerto».
