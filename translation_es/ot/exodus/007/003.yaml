review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y la auditoría inglesa: mantiene el contraste enfático («Pero yo»), la causatividad directa de אַקְשֶׁה («endureceré»), la idiomaticidad de «el corazón de Faraón», y la secuencia «multiplicaré mis señales y mis prodigios en la tierra de Egipto». También preserva correctamente la tensión teológica sin suavizarla a permiso.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno. La única reparación necesaria está en la nota al pie: «haré duro el corazón de Faraón» suena poco natural en español bíblico general; «haré que el corazón de Faraón se endurezca» expresa mejor la alternativa sin perder la fuerza causativa. Además, hay ruido no español en los metadatos de rationale («permiso» apareció mezclado con otra escritura), pero eso no afecta el texto bíblico principal.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. «Señales» para אֹתֹתַי y «prodigios» para מוֹפְתַי están bien justificadas y son buenas opciones en español.
  issues:
  - severity: medium
    issue: 'La nota al pie usa una alternativa poco natural: «haré duro el corazón de Faraón».'
    rationale: Aunque intenta reflejar la causatividad de Hifil, en español suena forzado. Una formulación como «haré que el corazón de Faraón se endurezca» conserva mejor el sentido y la legibilidad.
  - severity: low
    issue: Hay contaminación de metadatos en la explicación teológica («permiso» mezclado con otra escritura).
    rationale: No afecta el texto ni la nota publicable, pero conviene limpiarlo en el registro editorial.
  revised_spanish_text: Pero yo endureceré el corazón de Faraón[a], y multiplicaré mis señales y mis prodigios en la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: O «haré que el corazón de Faraón se endurezca» o «haré obstinado el corazón de Faraón». El verbo hebreo está en forma causativa y presenta el endurecimiento de manera directa.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que la alternativa causativa suene idiomática en español sin debilitar la fuerza del hebreo.
