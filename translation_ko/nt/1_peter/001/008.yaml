lexical_decisions:
- source_word: οὐκ ἰδόντες ἀγαπᾶτε
  english_pob_choice: Though you have not seen him, you love him
  chosen_korean: 보지 못하였으되 사랑하고
  alternatives_korean:
  - 보지 못했지만 사랑하며
  lexicon: BDAG
  rationale: 양보의 분사 구문을 「~으되 ~하고」 어미로 자연스럽게 옮긴다.
- source_word: ἀνεκλαλήτῳ
