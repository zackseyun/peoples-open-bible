translation:
  language: es
  text: El cuerno[a] de Moab es cortado, y su brazo es quebrado, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuerno» y «brazo» son metáforas de fuerza y poder.
