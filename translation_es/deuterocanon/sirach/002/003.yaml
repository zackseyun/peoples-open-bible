translation:
  language: es
  text: Aférrate a él y no te apartes, para que seas exaltado[a] en tu postrimería.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que crezcas o seas engrandecido en tu postrimería». El hebreo dice «llegar a ser grande», mientras que el paralelo griego tiene «ser aumentado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִדָּבֵק / κολλήθητι
  english_pob_choice: Cling
  chosen_spanish: Pégate a él
  alternatives_spanish:
  - Aférrate a él
  - Pégate estrechamente a él
  - Clávate en él
  lexicon: HALOT; LXX κολλάω
  rationale: El hebreo expresa adherencia cercana y persistente; el griego κολλήθητι confirma la imagen de unirse pegándose a alguien. En español, 'pégate a él' conserva la fuerza relacional y la idea de adhesión continua sin sonar anticuado.
- source_word: בּוֹ / αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  - a él mismo
  lexicon: HALOT; contexto de la exhortación; pronombre griego
  rationale: El pronombre masculino singular remite a Dios en el contexto inmediato. 'A él' preserva la referencia personal sin sobreexplicarla en el texto principal.
- source_word: וְאַל תָּסוּר / μὴ ἀποστῇς
  english_pob_choice: and do not turn away
  chosen_spanish: y no te apartes
  alternatives_spanish:
  - y no te desvíes
  - y no te retires
  - y no te vuelvas atrás
  lexicon: HALOT; BDAG/LSJ en el paralelo griego
  rationale: סור y ἀποστῆναι comunican apartarse o retirarse de una relación o camino. 'No te apartes' es natural en español y mantiene el matiz de desviarse o abandonar.
- source_word: לְמַעַן / ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT; NA/LSJ
  rationale: La cláusula expresa propósito o resultado. 'Para que' es la forma española más clara y directa para ese valor final.
- source_word: תִּגְדַּל / αὐξηθῇς
  english_pob_choice: be exalted
  chosen_spanish: seas engrandecido
  alternatives_spanish:
  - crezcas
  - seas aumentado
  - seas exaltado
  lexicon: HALOT; LXX αὐξάνω
  rationale: El hebreo dice literalmente 'ser grande' y el griego 'ser aumentado'. En este contexto sapiencial, 'engrandecido' preserva la idea de aumento o elevación sin fijarla solo en prosperidad material. Evita además resolver la tensión entre 'ser grande' y 'ser aumentado'.
- source_word: בְּאַחֲרִיתֶךָ / ἐπʼ ἐσχάτων σου
  english_pob_choice: in your latter end
  chosen_spanish: en tu postrimería
  alternatives_spanish:
  - al final
  - en tu último fin
  - en tu futuro
  lexicon: HALOT; LXX ἐσχάτων
  rationale: La expresión apunta al desenlace u outcome final de la vida. 'Postrimería' conserva la noción de final último con un registro digno y bíblico, sin reducirla a un simple 'futuro'.
theological_decisions:
- issue: Referente del mandato 'él'
  english_pob_reading: The pronoun refers to God, continuing the direct exhortation of the surrounding context.
  chosen_spanish_reading: El pronombre 'él' se entiende como referencia a Dios, en continuidad con la exhortación previa.
  alternative_spanish_readings:
  - Puede leerse de manera más genérica como referencia a la sabiduría o a la instrucción
  rationale: El contexto sapiencial inmediato dirige la respuesta del oyente hacia Dios; tanto el hebreo como el griego usan un pronombre masculino singular sin introducir otro antecedente. Mantener 'a él' deja visible la relación personal con Dios.
  doctrine_reference: Principio de transparencia referencial en la traducción POB
- issue: Alcance de la promesa final
  english_pob_reading: A promise of being raised up or honored in one's final outcome, not necessarily material prosperity.
  chosen_spanish_reading: La promesa se entiende como aumento o engrandecimiento en el desenlace final, no necesariamente prosperidad material.
  alternative_spanish_readings:
  - simple crecimiento
  - prosperidad al final de la vida
  rationale: El hebreo גדל y el griego αὐξηθῇς admiten crecimiento/aumento, pero el marco sapiencial y la frase sobre el final de la vida apuntan al resultado último. 'Engrandecido' conserva esa amplitud y no reduce el sentido a riqueza.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de base y el paralelo griego: coincide con la exhortación a adherirse a Dios, mantener la negativa a apartarse y conservar la ambigüedad controlada del resultado final (''engrandecido'' / ''crezcas''). No se introdujeron cambios posteriores en la tradición auditada inglesa; la única variación visible respecto al inglés POB es la adaptación natural de ''latter end'' como ''postrimería'' para un registro bíblico español.'
  spanish_consistency_notes:
  - Se usó 'a él' para mantener el referente personal divino sin sobrecargar el verso.
  - '''Apartes'' conserva el valor relacional y moral de סור / ἀποστῆς.'
  - '''Engrandecido'' permite reflejar tanto el hebreo ''ser grande'' como el griego ''ser aumentado'' sin cerrar la tensión lexical.'
  - '''Postrimería'' mantiene el peso escatológico o de desenlace final del sustantivo hebreo y del paralelo griego.'
  - La nota al pie ofrece la alternativa 'crezcas' para transparentar la variante semántica preservada por la POB inglesa.
