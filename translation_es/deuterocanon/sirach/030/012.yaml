translation:
  language: es
  text: Dobla[a] su cuello en su juventud, y quebranta sus lomos[b] mientras aún es pequeño, para que no se endurezca[c] y te cause amargura de alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «su cabeza», pero con este verbo la expresión se entiende mejor en español como «su cuello».
    reason: textual_variant
  - marker: b
    text: El hebreo dice «quebranta sus lomos», mientras que el paralelo griego dice «aplasta sus costados/costillas». El texto principal sigue el testimonio hebreo conservado.
    reason: textual_variant
  - marker: c
    text: Esta cláusula es difícil en el hebreo de la Guenizá de El Cairo; el paralelo griego apoya más claramente el sentido «para que no se endurezca».
    reason: alternative_reading
lexical_decisions:
- source_word: θλάσον / כוף
  english_pob_choice: Bend
  chosen_spanish: Doble
  alternatives_spanish:
  - Inclina
  - Baja
  - Somete
  lexicon: HALOT; BDAG
  rationale: El mandato conserva la imagen corporal de someter y humillar. «Doblar» reproduce en español la fuerza física del gesto sin volverlo abstracto ni suavizarlo en exceso.
- source_word: τὰς πλευρὰς αὐτοῦ / מתניו
  english_pob_choice: break his loins
  chosen_spanish: quebranta sus lomos
  alternatives_spanish:
  - quebranta sus costados
  - rompe sus flancos
  - quebranta sus caderas
  lexicon: HALOT; LXX parallel
  rationale: El hebreo extiende la imagen a los «lomos», mientras que el griego habla de «costados/costillas». Conservar «lomos» mantiene la lectura principal hebrea y la crudeza corporal del texto, dejando visible la tensión textual en la nota.
- source_word: בנערותו
  english_pob_choice: in his youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando es joven
  - mientras es joven
  lexicon: HALOT
  rationale: Es una frase temporal directa y natural en español, fiel al valor básico del hebreo.
- source_word: כשהוא קטן
  english_pob_choice: while he is still small
  chosen_spanish: mientras aún es pequeño
  alternatives_spanish:
  - cuando todavía es pequeño
  - mientras todavía es niño
  lexicon: HALOT
  rationale: «Pequeño» conserva el sentido concreto de edad temprana y evita introducir una interpretación más específica de «niño» que el texto no exige.
- source_word: σκληρυνθεὶς / למה ישקה
  english_pob_choice: lest he become stubborn
  chosen_spanish: para que no se endurezca
  alternatives_spanish:
  - para que no se vuelva obstinado
  - para que no se ponga duro
  lexicon: HALOT; Greek parallel
  rationale: La tradición hebrea es difícil, pero el paralelo griego apoya la idea de endurecimiento. «Endurecerse» permite mantener esa tensión semántica sin fijar demasiado una sola glosa interpretativa.
- source_word: ἀπειθήσῃ σοι / ומרה בך
  english_pob_choice: and rebel against you
  chosen_spanish: y te desobedezca
  alternatives_spanish:
  - y se rebele contra ti
  - y te sea rebelde
  - y actúe con rebeldía contra ti
  lexicon: BDAG
  rationale: La revisión inglesa suprimió «rebel against you» por no estar representado explícitamente en el hebreo. En español, «desobedecer» preserva la fuerza de la oposición filial sin añadir un matiz político o militar que el texto revisado no exige.
- source_word: מפח נפש
  english_pob_choice: bitterness of soul
  chosen_spanish: amargura de alma
  alternatives_spanish:
  - dolor de alma
  - angustia de alma
  - vexación del alma
  lexicon: HALOT
  rationale: La expresión hebrea apunta a una aflicción interior intensa. «Amargura de alma» conserva el giro antropológico y la densidad emocional del original.
theological_decisions:
- issue: Retener la imaginería corporal severa de la instrucción sapiencial
  english_pob_reading: Preserve the concrete bodily metaphors rather than softening them into abstract discipline.
  chosen_spanish_reading: Conservar la metáfora corporal severa en vez de convertirla en una exhortación genérica a disciplinar.
  alternative_spanish_readings:
  - Suavizar como «disciplínalo estrictamente»
  - Parafrasear para evitar la violencia aparente
  rationale: El texto fuente, en hebreo y griego, usa imágenes físicas fuertes. La traducción española debe dejar visible esa tensión, sin resolverla con una mitigación moderna que borre el tono sapiencial del pasaje.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que eliminó «and rebel against you» por no estar representado explícitamente en el hebreo. La redacción española sigue esa revisión y evita añadir «rebelarse» en el texto principal, aunque conserva la dureza del amonestamiento mediante «desobedezca» y una nota sobre la lectura difícil del hebreo y el apoyo del griego.
  spanish_consistency_notes:
  - Se usa «lomos» para mantener la correspondencia con el hebreo y la imaginería corporal tradicional del pasaje.
  - Se evita «Cristo/Mesías» porque no aplica a este versículo.
  - Se evita «SEÑOR» porque no hay Tetragrámaton ni κύριος en el texto.
  - La puntuación y el registro buscan ser publicables en español bíblico contemporáneo sin depender del castellano clásico.
