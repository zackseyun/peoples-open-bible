translation:
  language: es
  text: Y ni yo, ni mis hermanos, ni mis muchachos, ni los hombres de la guardia que estaban detrás de mí, nos quitábamos la ropa; cada uno tenía su arma en su mano derecha, aun para el agua.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo del último tramo es difícil: literalmente, «cada uno su shelaḥ el agua». Puede significar «cada uno tenía su arma en la mano derecha, aun para el agua» o «cada uno iba con su arma para el agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵין ... אֵין
  english_pob_choice: neither ... took off
  chosen_spanish: Y ni ... nos quitábamos
  alternatives_spanish:
  - Y no ... nos quitábamos
  - Ni ... nos quitábamos
  lexicon: HALOT
  rationale: El hebreo usa אֵין con participio para negar una acción continua. En español, la coordinación negativa con «ni» reproduce bien la acumulación de sujetos y el sentido durativo de no desvestirse; «nos quitábamos» evita un calco rígido y conserva la idea de una acción repetida o habitual.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis hermanos de sangre
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo. «Hermanos» es fiel y natural en español; no hay base suficiente para reducirlo a «compañeros».
- source_word: נְעָרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis muchachos
  - mis servidores
  - mis asistentes
  lexicon: HALOT
  rationale: נַעַר puede designar joven, sirviente o asistente. Aquí, como el audit trail inglés preserva la ambigüedad funcional sin forzar servidumbre, «mis jóvenes» conserva la forma léxica y sigue siendo comprensible en español.
- source_word: אַנְשֵׁי הַמִּשְׁמָר
  english_pob_choice: the men of the guard
  chosen_spanish: los hombres de la guardia
  alternatives_spanish:
  - los guardias
  - los hombres del turno de guardia
  - los hombres del centinela
  lexicon: HALOT
  rationale: מִשְׁמָר puede ser guardia, vigilancia o turno de guardia. «Los hombres de la guardia» mantiene el sentido de vigilancia armada y evita el término más idiomático «guardias» si se desea conservar la estructura del hebreo.
- source_word: אֲשֶׁר אַחֲרַי
  english_pob_choice: who were behind me
  chosen_spanish: que estaban detrás de mí
  alternatives_spanish:
  - que me seguían
  - que iban detrás de mí
  lexicon: HALOT
  rationale: La relación espacial es importante en el contexto. «Detrás de mí» reproduce de manera literal y clara el hebreo, sin decidir en exceso por «seguían»; el presente imperfectivo «estaban» comunica la disposición continua.
- source_word: פֹשְׁטִים בְּגָדֵינוּ
  english_pob_choice: took off our clothes
  chosen_spanish: nos quitábamos la ropa
  alternatives_spanish:
  - nos desvestíamos
  - nos quitábamos nuestros vestidos
  - nos despojábamos de la ropa
  lexicon: HALOT
  rationale: פשט con בגד implica quitarse prendas. «Nos quitábamos la ropa» es la forma natural y fiel en español, y evita un calco demasiado literal como «despojábamos», que en español suena más marcado.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: El distributivo hebreo se traduce mejor con «cada uno» en español actual. Preserva la función de אִישׁ sin introducir sesgo masculino innecesario en la expresión distributiva.
- source_word: שִׁלְחוֹ
  english_pob_choice: his weapon in his right hand
  chosen_spanish: su arma en su mano derecha
  alternatives_spanish:
  - su arma en la mano derecha
  - su lanza en su mano derecha
  - su arma al alcance de la mano
  lexicon: HALOT
  rationale: El término hebreo es difícil y el audit trail inglés opta por una lectura funcional de arma lista para usar. «Arma» permite mantener la apertura léxica sin precisar indebidamente el tipo de arma; «en su mano derecha» sigue la revisión inglesa que prefirió «in his right hand».
- source_word: הַמָּיִם
  english_pob_choice: even for water
  chosen_spanish: aun para el agua
  alternatives_spanish:
  - incluso para el agua
  - hasta para el agua
  - aun cuando iban por agua
  lexicon: HALOT
  rationale: La cláusula final es breve y difícil. «Aun para el agua» conserva la oscuridad relativa del hebreo y el matiz de perseverancia armada aun en una necesidad tan básica como el agua, sin imponer una paráfrasis más interpretativa.
theological_decisions:
- issue: La cláusula final presenta un texto hebreo difícil y admite más de una lectura práctica.
  english_pob_reading: each kept his weapon in his right hand, even for water
  chosen_spanish_reading: cada uno llevaba su arma en su mano derecha, aun para el agua
  alternative_spanish_readings:
  - cada uno mantenía su arma en la mano derecha, incluso cuando iba por agua
  - cada uno iba con su arma para el agua
  rationale: 'Se mantiene la lectura funcional adoptada en el texto inglés: la comunidad siguió armada incluso en circunstancias ordinarias. La traducción española conserva la tensión textual sin resolverla de modo excesivo ni borrar la ambigüedad del hebreo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que ajustó «at his right hand» a «in his right hand» por naturalidad. Por eso se eligió «en su mano derecha» y no una fórmula más literal pero menos natural. También se preserva la ambigüedad reconocida en la nota inglesa sobre el final difícil del versículo.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar la coordinación del hebreo y el encadenamiento narrativo.
  - Se evitó «SEÑOR» u otras sustituciones teológicas; no hay Tetragrámaton en este versículo.
  - «Arma» se prefirió a una identificación más concreta del objeto hebreo, porque el audit trail inglés lo deja abierto.
  - La puntuación con punto y coma reproduce la articulación del verso en dos miembros principales sin añadir contenido interpretativo.
