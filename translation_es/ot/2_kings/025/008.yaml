revisions:
- from: Y en el mes quinto[a], a siete del mes, era el año diecinueve del rey Nabucodonosor, rey de Babilonia; vino Nebuzaradán, el jefe de la guardia, servidor del rey de Babilonia, a Jerusalén.
  to: Y en el quinto mes, el séptimo día del mes —era el año diecinueve del rey Nabucodonosor, rey de Babilonia—, vino Nebuzaradán, el jefe de la guardia[a], servidor del rey de Babilonia, a Jerusalén.
  rationale: Se ajusta la datación a un español más natural y claro ('el séptimo día del mes'), se marca mejor el inciso cronológico, y se corrige el anclaje de la nota lexical para que aparezca en el cargo que realmente explica. Se conserva 'jefe de la guardia' y 'servidor' porque reflejan adecuadamente las decisiones documentadas del expediente inglés y el contexto cortesano.
