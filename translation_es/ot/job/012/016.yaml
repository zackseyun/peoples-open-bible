    text: O «la sabiduría sensata». El hebreo תּוּשִׁיָּה puede expresar sabiduría práctica, firme o efectiva; se eligió «sabiduría eficaz» para conservar ese matiz sin reducirla a una simple repetición de «sabiduría».
    reason: lexical_alternative
