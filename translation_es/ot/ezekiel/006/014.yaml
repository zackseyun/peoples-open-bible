translation:
  language: es
  text: Así extenderé mi mano contra ellos y haré de la tierra una desolación y una ruina, desde el desierto hasta Diblat[a], en todos sus asentamientos[b]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde el desierto hacia Diblata». El nombre del lugar es incierto; algunos entienden «desde el desierto hasta Diblata», y algunas propuestas textuales lo relacionan con Ribla.'
    reason: textual_variant
  - marker: b
    text: O «en todas sus moradas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטִיתִי
  english_pob_choice: I will stretch out
  chosen_spanish: extenderé
  alternatives_spanish:
  - estiraré
  - alargaré
  lexicon: HALOT
  rationale: En español, «extender la mano» comunica bien el gesto de acción judicial divina y suena natural en contexto profético. Se evita una repetición forzada de «estirar» y se conserva la idiomática del hebreo.
- source_word: יָדִי עֲלֵיהֶם
  english_pob_choice: my hand against them
  chosen_spanish: mi mano contra ellos
  alternatives_spanish:
  - mi mano sobre ellos
  lexicon: HALOT
  rationale: «Contra ellos» expresa correctamente el valor hostil de עַל en este contexto de juicio. «Sobre ellos» podría sonar espacialmente neutro y perder la carga adversativa.
- source_word: וְנָתַתִּי אֶת־הָאָרֶץ
  english_pob_choice: and make the land
  chosen_spanish: haré de la tierra
  alternatives_spanish:
  - convertiré la tierra en
  - pondré la tierra como
  lexicon: HALOT
  rationale: El hebreo usa נתן con complemento predicativo, con sentido causativo. «Haré de la tierra» reproduce bien ese valor sin calco duro y permite la predicación resultante.
- source_word: שְׁמָמָה וּמְשַׁמָּה
  english_pob_choice: a desolation and a waste
  chosen_spanish: una desolación y un desierto
  alternatives_spanish:
  - una desolación y una ruina
  - una devastación y un desierto
  lexicon: HALOT
  rationale: Se mantiene la doble intensificación del hebreo. «Desierto» funciona como equivalente natural de «waste» en castellano bíblico moderno, aunque «ruina» también sería posible. Se conserva la repetición semántica sin borrar la fuerza del doblete.
- source_word: מִמִּדְבַּר דִּבְלָתָה
  english_pob_choice: from the wilderness to Diblah
  chosen_spanish: desde el desierto hasta Diblat
  alternatives_spanish:
  - desde el desierto a Diblat
  - del desierto hasta Diblat
  lexicon: HALOT
  rationale: La frase es geográfica y textualmente incierta. Se conserva el sentido de extensión territorial con una preposición de límite clara en español. «Diblat» se usa como transliteración breve y legible del topónimo, sin pretender mayor certeza que la del texto.
- source_word: בְּכֹל מוֹשְׁבֽוֹתֵיהֶם
  english_pob_choice: throughout all their settlements
  chosen_spanish: en todos sus lugares de habitación
  alternatives_spanish:
  - en todos sus poblados
  - en todas sus moradas
  lexicon: HALOT
  rationale: «מוֹשָׁבוֹת» denota lugares de residencia o asentamiento. «Lugares de habitación» mantiene la referencia amplia sin restringirla a una forma urbana específica. La alternativa «poblados» sería más concreta de lo que exige el hebreo.
- source_word: וְיָדְע֖וּ כִּֽי אֲנִ֥י יְהוָה
  english_pob_choice: Then they will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé». Se conserva la fórmula de reconocimiento característica de Ezequiel, con sujeto explícito en español para claridad y énfasis.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se adopta la forma base del proyecto en español para el nombre divino, evitando la sustitución por un título y manteniendo la transparencia con el hebreo.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El proyecto pide transliterar el nombre divino en vez de ocultarlo tras una sustitución. «Yahvé» es la forma establecida en este corpus y preserva la identidad pactual señalada por la fórmula «yo soy Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Frase geográfica difícil מִמִּדְבַּר דִּבְלָתָה
  english_pob_reading: 'a geographic extent: ''from the wilderness to Diblah'''
  chosen_spanish_reading: 'un límite territorial: «desde el desierto hasta Diblat»'
  alternative_spanish_readings:
  - «desde el desierto hacia Diblat»
  - emendar el topónimo o convertirlo en fórmula de desolación
  rationale: La traducción conserva el valor más probable de extensión geográfica sin fingir certeza sobre la identificación exacta del lugar. El topónimo permanece opaco, como en el hebreo, y la redacción no borra la tensión textual.
  doctrine_reference: 'DOCTRINE.md: Textually uncertain place-names should be preserved when possible'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del texto inglés POB, que ajustó la frase del lugar de «toward Diblath» a «to Diblah» y mantuvo «Yahweh» para el nombre divino. La versión española conserva la misma cautela textual, pero adapta el topónimo a una forma breve y legible («Diblat») mientras mantiene la incertidumbre del original en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - 'Se mantiene el paralelismo de juicio: mano extendida, tierra devastada, conocimiento resultante.'
  - «Desolación y un desierto» conserva el doblete intensivo del hebreo.
  - El topónimo se translitera sin normalizarlo a una forma tradicional no atestiguada en el paquete fuente.
  - La fórmula final conserva el énfasis de reconocimiento característico de Ezequiel.
