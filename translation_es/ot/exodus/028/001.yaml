translation:
  language: es
  text: 'Y tú, haz que se acerquen a ti Aarón tu hermano y sus hijos con él, de entre los hijos[a] de Israel, para servir como sacerdotes para mí: Aarón, Nadab y Abiú, Eleazar e Itamar, hijos de Aarón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘de entre los israelitas’. El hebreo dice literalmente ‘de entre los hijos de Israel’, una designación estándar del pueblo del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you,
  chosen_spanish: Y tú,
  alternatives_spanish:
  - Y tú mismo,
  - Ahora tú,
  lexicon: HALOT
  rationale: El hebreo abre con un pronombre enfático; en español, ‘Y tú’ conserva el cambio discursivo y la fuerza de la exhortación sin añadir contenido.
- source_word: הַקְרֵב
  english_pob_choice: bring near
  chosen_spanish: haz venir
  alternatives_spanish:
  - acerca
  - presenta
  lexicon: HALOT
  rationale: El valor cultual de קרב en hifil es ‘hacer acercar / traer’. ‘Haz venir’ comunica el movimiento hacia Moisés de manera natural en español, manteniendo la acción concreta sin sobreinterpretarla como ordenación formal.
- source_word: אֵלֶיךָ
  english_pob_choice: to yourself
  chosen_spanish: hacia ti
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: La frase hebrea es literalmente direccional hacia la persona de Moisés. ‘Hacia ti’ preserva esa orientación; ‘a ti’ sería correcto pero menos pictórico.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano propio
  lexicon: HALOT
  rationale: Término de parentesco directo y sin matiz especial adicional; se conserva de manera sencilla y fiel.
- source_word: בָּנָיו אִתּוֹ
  english_pob_choice: his sons with him
  chosen_spanish: a sus hijos con él
  alternatives_spanish:
  - y a sus hijos
  - a sus hijos junto con él
  lexicon: HALOT
  rationale: Se mantiene el marcador de acompañamiento אִתּוֹ con ‘con él’, porque el hebreo no solo enumera hijos sino que los presenta unidos a Aarón en la convocatoria.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre los israelitas
  - tomados de entre los hijos de Israel
  lexicon: HALOT
  rationale: ‘De entre’ expresa היטב la selección dentro del pueblo. ‘Hijos de Israel’ sigue de cerca el hebreo y conserva la designación corporativa del pueblo del pacto.
- source_word: לְכַהֲנוֹ לִי
  english_pob_choice: to serve as priests for me
  chosen_spanish: para que me sirvan como sacerdotes
  alternatives_spanish:
  - para ministrar como sacerdotes para mí
  - para ser sacerdotes para mí
  lexicon: HALOT
  rationale: El infinitivo de כהן remite al ejercicio sacerdotal. ‘Me sirvan como sacerdotes’ conserva la función y evita una formulación demasiado abstracta. ‘Para mí’ queda reflejado en ‘me’.
- source_word: נָדָב וַאֲבִיהוּא אֶלְעָזָר וְאִיתָמָר
  english_pob_choice: Aaron, Nadab and Abihu, Eleazar and Ithamar
  chosen_spanish: Aarón, Nadab y Abiú, Eleazar e Itamar
  alternatives_spanish:
  - Aarón, Nadab y Abihú, Eleazar e Itamar
  lexicon: HALOT
  rationale: Se transliteran los nombres con formas españolas usuales y reconocibles; ‘Abiú’ sigue la tradición ortográfica castellana más extendida y legible, sin alterar la identidad referida.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: La construcción final identifica a los cuatro nombrados. Se usa una forma genitiva clara en español que conserva el vínculo genealógico explicitado por el hebreo.
theological_decisions:
- issue: Designación corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: from among the sons of Israel
  chosen_spanish_reading: de entre los hijos de Israel
  alternative_spanish_readings:
  - de entre los israelitas
  rationale: Se conserva la forma fuente ‘hijos de Israel’ para reflejar la designación pactal masculina plural del hebreo, siguiendo la preferencia del POB por mantener la forma del original cuando tiene peso lexical y corporativo. La alternativa más idiomática se reconoce sin desplazar el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente del pasaje en el POB inglés quedó sin cambios, con alta concordancia entre auditores. Esta versión española sigue esa lectura estable y no introduce variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma por defecto para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se conserva la literalidad funcional de ‘hijos de Israel’ para el valor corporativo del hebreo, con nota alternativa para ‘israelitas’.
  - Los nombres propios se adaptan a grafía española común sin alterar la secuencia ni la identidad de la lista.
