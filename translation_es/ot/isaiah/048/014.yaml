translation:
  language: es
  text: 'Reúnanse[a], todos ustedes, y escuchen: ¿quién entre ellos ha declarado estas cosas? Yahvé lo ama; ejecutará su propósito en Babilonia, y su brazo estará contra los caldeos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé lo ama; él llevará a cabo su propósito en Babilonia, y su brazo estará sobre los caldeos», entendiendo los pronombres como referidos a Yahvé y no a su agente escogido.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִקָּבְצוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Reúnanse
  alternatives_spanish:
  - Júntense
  - Reúnanse todos
  lexicon: HALOT
  rationale: El nifal imperativo plural pide una convocatoria a congregarse. En español, «Reúnanse» comunica bien la exhortación directa sin forzar una forma reflexiva artificial.
- source_word: כֻלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - todos ustedes juntos
  lexicon: HALOT
  rationale: La expresión refuerza la totalidad del grupo; «todos ustedes» es natural en español latinoamericano y conserva el énfasis inclusivo.
- source_word: וּשֲׁמָעוּ
  english_pob_choice: and listen
  chosen_spanish: y escuchen
  alternatives_spanish:
  - y oigan
  - y presten atención
  lexicon: HALOT
  rationale: El imperativo de שׁמע aquí pide atención obediente, no solo percepción auditiva. «Escuchen» mantiene la fuerza exhortativa en español actual.
- source_word: מִי בָהֶם
  english_pob_choice: who among them
  chosen_spanish: ¿quién entre ellos
  alternatives_spanish:
  - ¿cuál de ellos
  - ¿quién de ellos
  lexicon: HALOT
  rationale: La pregunta retórica busca identificar a uno dentro de un grupo. «Entre ellos» reproduce con naturalidad la relación interna del hebreo.
- source_word: הִגִּיד אֶת־אֵלֶּה
  english_pob_choice: has declared these things
  chosen_spanish: ha declarado estas cosas
  alternatives_spanish:
  - ha anunciado estas cosas
  - ha dado a conocer estas cosas
  lexicon: HALOT
  rationale: הגיד expresa declarar o anunciar con énfasis en hacer saber. «Ha declarado» conserva la fuerza formal del anuncio sin alejarse del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino como «Yahvé», preservando el nombre personal en vez de sustituirlo por un título.
- source_word: אֲהֵבוֹ
  english_pob_choice: loves him
  chosen_spanish: lo ama
  alternatives_spanish:
  - lo ha amado
  - tiene amor por él
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar estado resultante o amor establecido. «Lo ama» es la forma más natural en español y conserva la relación favorable entre Yahvé y el referido individuo.
- source_word: יַעֲשֶׂה חֶפְצוֹ
  english_pob_choice: he will carry out his purpose
  chosen_spanish: ejecutará su propósito
  alternatives_spanish:
  - cumplirá su propósito
  - hará lo que quiere
  lexicon: HALOT
  rationale: La combinación עשה + חפץ comunica llevar a cabo un plan o voluntad. «Ejecutará su propósito» retiene el sentido de acción eficaz y evita un «placer» arcaico o ambiguo.
- source_word: בְּבָבֶל
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - contra Babilonia
  - dentro de Babilonia
  lexicon: HALOT
  rationale: El prefijo ב se toma en su valor locativo inmediato, como ajustado en el auditorio inglés por la revisión más reciente. «En Babilonia» es la opción más fiel y clara en español.
- source_word: וּזְרֹעוֹ כַּשְׂדִּים
  english_pob_choice: and his arm will be against the Chaldeans
  chosen_spanish: y su brazo estará contra los caldeos
  alternatives_spanish:
  - y su brazo será sobre los caldeos
  - y su poder estará contra los caldeos
  lexicon: HALOT
  rationale: «Brazo» conserva la metáfora hebrea de fuerza o poder. «Estará contra» hace explícito el sentido adversativo implícito en el contexto y sigue la solución de la POB inglesa.
theological_decisions:
- issue: Referente de los pronombres singulares en la segunda mitad del verso
  english_pob_reading: The singular refers to the human agent raised up by the LORD (contextually Cyrus), who carries out the LORD's purpose against Babylon.
  chosen_spanish_reading: Los pronombres se entienden como referidos al agente humano suscitado por Yahvé, es decir, el que cumple el propósito de Yahvé en Babilonia y se enfrenta a los caldeos.
  alternative_spanish_readings:
  - Los pronombres se refieren al propio Yahvé, de modo que él ejecuta su propósito y su brazo es el suyo.
  - Los pronombres quedan deliberadamente ambiguos sin decidir el referente.
  rationale: El contexto inmediato de Isaías 48:14-15 favorece un individuo distinto de Yahvé, aunque el hebreo permite leer los pronombres de otra manera. Se conserva esa tensión sin nombrar explícitamente a Ciro dentro del verso.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla dogmáticamente
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «against Babylon» por «in Babylon» para reflejar mejor el prefijo ב; la redacción española sigue esa revisión con «en Babilonia» y mantiene la adversidad explícita solo en la cláusula paralela sobre los caldeos.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
  - Se mantiene «caldeos» como equivalente tradicional y transparente de כַּשְׂדִּים, sin sustituirlo por una glosa interpretativa.
  - «Brazo» conserva la metáfora bíblica de poder, en vez de explicitarla como «poder» en el texto principal.
