translation:
  language: es
  text: Porque nuestro corazón[a][b] se alegra en él, porque en su santo nombre hemos confiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque nuestro corazón se alegrará en él», si se toma el imperfecto hebreo como futuro en vez de presente habitual.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «nuestro corazón» está en singular, como expresión colectiva de la vida interior del pueblo.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En español, «porque» expresa con claridad la relación causal del segundo כִּי y mantiene el flujo poético del verso. «Pues» sería posible, pero aquí «porque» suena más natural y directo.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  lexicon: HALOT
  rationale: El sufijo masculino singular apunta al referente personal del contexto inmediato. «En él» conserva esa referencia personal y evita una lectura impersonal.
- source_word: יִשְׂמַח
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se gozará
  - se alegrará
  lexicon: HALOT
  rationale: El imperfecto hebreo admite valor habitual o futuro confiado; en español, el presente refleja bien la confesión continua sin forzar una temporalidad futura. «Se alegra» comunica el matiz afectivo de la raíz mejor que una opción más fría.
- source_word: לִבֵּנוּ
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  lexicon: HALOT
  rationale: Se preserva el singular colectivo hebreo con un sustantivo singular en español. «Nuestro corazón» mantiene la imagen de una interioridad unificada del pueblo; «nuestros corazones» suavizaría el rasgo idiomático del original.
- source_word: בְשֵׁם
  english_pob_choice: in ... name
  chosen_spanish: en ... nombre
  alternatives_spanish:
  - por ... nombre
  - mediante ... nombre
  lexicon: HALOT
  rationale: Con בָּטַח, la construcción apunta al ámbito u objeto de la confianza. «En su santo nombre» reproduce el paralelo inglés y conserva el valor relacional sin explicar en exceso la sintaxis hebrea.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: su santo
  alternatives_spanish:
  - su sagrado
  lexicon: HALOT
  rationale: «Santo» es la equivalencia normal y teológicamente precisa para el hebreo de santidad. «Sagrado» es posible, pero menos directo y menos consistente con el vocabulario bíblico habitual.
- source_word: בָטָחְנוּ
  english_pob_choice: we have trusted
  chosen_spanish: hemos confiado
  alternatives_spanish:
  - confiamos
  - confiamos en
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción ya realizada con vigencia presente. «Hemos confiado» conserva ese valor mejor que un simple presente o pasado. En español bíblico, «confiar en» expresa con naturalidad la idea de confiarse a alguien.
theological_decisions:
- issue: Referente de los pronombres masculinos singulares en בּוֹ y קָדְשׁוֹ
  english_pob_reading: The pronouns refer to the LORD addressed in the psalm's immediate context.
  chosen_spanish_reading: Los pronombres se refieren a Yahvé, aunque el versículo no repite el nombre divino explícitamente.
  alternative_spanish_readings:
  - Se refieren simplemente a Dios sin precisar el nombre del pacto
  - Se mantienen como referencias genéricas sin identificar el referente
  rationale: El contexto previo del salmo habla del Señor; por eso, en español conviene respetar la referencia personal. Dado el criterio del proyecto, no se sustituye por «SEÑOR» como máscara, sino por «Yahvé» en la explicación, sin introducir el nombre en el texto donde el hebreo no lo escribe. Esto preserva la primacía del texto original y la continuidad referencial.
  doctrine_reference: Primacía del texto original; nombre divino explícito solo cuando el hebreo lo expresa.
translation_notes:
  revision_awareness: El inglés POB mantiene el valor causal de כִּי, el pronombre masculino singular en referencia al Señor, el imperfecto de יִשְׂמַח como presente o futuro posible, el singular colectivo de לִבֵּנוּ y el perfecto de בָטַחְנוּ como acción cumplida con vigencia presente. No hubo revisiones aplicadas en el audit trail reciente, y la versión actual muestra alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo en la nota teológica, no en el cuerpo del versículo, porque el hebreo aquí usa pronombres y no el tetragrámaton explícito.
  - Se mantuvo «corazón» en singular para respetar el singular colectivo del hebreo.
  - Se prefirió «confiado» en el sentido de confianza religiosa, no «creído», para conservar el paralelo con el inglés auditado.
  - El orden causal doble se preservó con dos miembros iniciados por «porque», en correspondencia con los dos כִּי del hebreo.
