- from: Faraón no le ayudará en la guerra con un gran ejército y una gran multitud[a], cuando levanten un terraplén de asedio y construyan una muralla de asedio para cortar muchas vidas.
  to: Faraón no le ayudará en la guerra con un gran ejército y una gran compañía[a], cuando levanten un terraplén de asedio y construyan una muralla de asedio para quitar muchas vidas.
  rationale: Se ajusta «multitud» a «compañía» para reflejar mejor el matiz militar de קָהָל en armonía con el audit trail inglés, y se cambia «cortar muchas vidas» por «quitar muchas vidas» para evitar un calco poco natural, preservando a la vez la gravedad del hebreo.
