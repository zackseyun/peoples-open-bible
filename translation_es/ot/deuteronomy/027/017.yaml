review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: fórmula de maldición pactual, acto de mover un límite/marker de propiedad ajena, y respuesta litúrgica de todo el pueblo. Sin embargo, la nota al pie no preserva fielmente la lógica del inglés auditado: el texto principal ya usa «lindero», pero la nota dice «O tradicionalmente, “lindero”», lo cual no ofrece una alternativa real. Además, גְּבוּל aquí apunta al límite de propiedad y con frecuencia al marcador que lo señala; en español conviene hacer explícita esa concreción en la nota o en el texto.'
  spanish_quality_summary: El español es natural y digno. «Maldito el que desplaza el lindero de su prójimo» se entiende bien y mantiene el registro jurídico-litúrgico. No obstante, la nota necesita corrección para evitar contradicción interna. También puede mejorarse la precisión léxica con «mojón» como alternativa tradicional/concreta, mientras se conserva un texto principal claro.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Maldito», «prójimo» y «Amén» son adecuados. La decisión clave es גְּבוּל: el inglés POB eligió «boundary marker» con nota «landmark». En español, «lindero» funciona, pero la nota debe presentar una alternativa auténtica, idealmente «mojón», y explicar que el hebreo se refiere al límite de una propiedad o a la marca que lo señala.'
  issues:
  - severity: medium
    issue: La nota al pie es incoherente con el texto principal.
    rationale: El texto principal ya dice «lindero», pero la nota ofrece «O tradicionalmente, “lindero”». Eso no preserva la alternativa léxica del audit trail y crea una nota vacía.
  - severity: low
    issue: La concreción de גְּבוּל como marcador físico puede expresarse mejor en la nota.
    rationale: El inglés POB documenta que el término puede referirse al límite de propiedad o al marcador que lo designa. La nota española debe conservar esa explicación con una alternativa como «mojón».
  revised_spanish_text: 'Maldito[a] el que desplaza el lindero de su prójimo. Y todo el pueblo dirá: «Amén».'
  revised_footnotes:
  - marker: a
    text: O tradicionalmente, «mojón». El hebreo se refiere al límite de una propiedad o a la marca que lo señala.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural en español. Se corrige la nota al pie para que presente una alternativa léxica real y preserve la explicación documentada sobre גְּבוּל como límite de propiedad o marcador físico.
