translation:
  language: es
  text: 'Entonces dijo a Moisés[a]: «Sube a Yahvé, tú, Aarón, Nadab y Abiú, y setenta de los ancianos de Israel, y prostérnense desde lejos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Sube a Yahvé». El texto conserva esta formulación aunque el hablante es Yahvé; algunas traducciones la suavizan como «Sube a mí» o «ante Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo él
  - les dijo
  lexicon: HALOT
  rationale: El hebreo usa un verbo de decir en tercera persona sin sujeto explícito; en español se sobreentiende por el contexto. «Dijo» es la forma natural y directa para introducir el discurso.
- source_word: עֲלֵה
  english_pob_choice: Come up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Ven arriba
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba. En español, «Sube» conserva la orden literal y suena natural en una invitación a acercarse a la presencia divina.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - ante Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto. La preposición hebrea אֶל se vierte aquí con «a», que es la equivalencia más directa y idiomática en español.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - vos
  lexicon: HALOT
  rationale: El pronombre explícito funciona de modo enfático y marca a Moisés como destinatario principal. «Tú» reproduce esa cercanía y énfasis sin añadir matiz de respeto no presente en el hebreo.
- source_word: וְ/אַהֲרֹן נָדָב וַ/אֲבִיהוּא
  english_pob_choice: and Aaron, Nadab and Abihu
  chosen_spanish: Aarón, Nadab y Abiú
  alternatives_spanish:
  - y Aarón, Nadab y Abiú
  - con Aarón, Nadab y Abiú
  lexicon: HALOT
  rationale: Son nombres propios transliterados en forma usual española. La coordinación simple sigue la lista hebrea sin sobrecargarla.
- source_word: וְ/שִׁבְעִים מִ/זִּקְנֵי יִשְׂרָאֵל
  english_pob_choice: and seventy of the elders of Israel
  chosen_spanish: y setenta de los ancianos de Israel
  alternatives_spanish:
  - y setenta ancianos de Israel
  - y setenta entre los ancianos de Israel
  lexicon: HALOT
  rationale: 'La construcción con מִ indica selección partitiva: no son todos los ancianos, sino setenta tomados de entre ellos. «De los ancianos» conserva esa relación mejor que una frase más plana.'
- source_word: וְ/הִשְׁתַּחֲוִיתֶם
  english_pob_choice: and bow down
  chosen_spanish: y póstrense
  alternatives_spanish:
  - y adoren
  - y inclínense
  lexicon: HALOT
  rationale: El verbo denota postración reverente. «Póstrense» conserva la fuerza corporal del gesto y evita reducirlo a un sentido meramente interior o litúrgico. Se elige una forma impersonal/referencial para reflejar el plural hebreo en un español natural dentro del mandato.
- source_word: מֵ/רָחֹק
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - de lejos
  lexicon: HALOT
  rationale: La expresión indica separación espacial real. «Desde lejos» es claro, natural y mantiene el matiz de distancia en la acción de postrarse.
theological_decisions:
- issue: Nombre divino יְהוָה en la cita directa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva el nombre propio «Yahvé» según la terminología base del proyecto, en vez de sustituirlo por una mayúscula devocional o una forma tradicional no preferida aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tensión de que Yahvé habla de subir «a Yahvé»
  english_pob_reading: Retain 'to the LORD' in the main text
  chosen_spanish_reading: Mantener «a Yahvé» en el texto principal
  alternative_spanish_readings:
  - Sube a mí
  - Sube ante Yahvé
  rationale: El hebreo preserva la formulación explícita «a Yahvé» aunque el hablante parece ser Yahvé mismo. No se suaviza la tensión teológica/textual, porque el proyecto pide conservarla cuando el texto fuente la presenta así.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El paquete de auditoría en inglés indica alta concordancia, sin revisiones aplicadas en la última pasada. La redacción española sigue esa decisión estable y conserva la tensión textual de la orden divina sin normalizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «ancianos» para זִּקְנֵי, evitando el término eclesiástico más cargado «presbíteros» porque no está justificado por el hebreo ni por el audit trail.
  - «Póstrense» preserva el acto corporal de הִשְׁתַּחֲוִיתֶם; no se reemplaza sin más por «adoren» para no perder la tensión entre reverencia física y adoración.
