translation:
  language: es
  text: 'Porque así dice Yahvé[a], el Dios de Israel: «La tinaja[b] de harina no se agotará, y la vasija[c] de aceite no se agotará[d], hasta el día en que Yahvé dé lluvia sobre la superficie de la tierra[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» traduce el nombre divino YHWH, no un título genérico.
    reason: theological_note
  - marker: b
    text: O «jarra» para el recipiente de harina.
    reason: lexical_alternative
  - marker: c
    text: O «jarro» o «jarra» para el segundo recipiente.
    reason: lexical_alternative
  - marker: d
    text: O «no faltará» o «no disminuirá».
    reason: lexical_alternative
  - marker: e
    text: 'Hebreo: «sobre la superficie de la tierra».'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: El hebreo usa el nombre propio divino, no un título genérico. En español, la forma estable del proyecto es «Yahvé», que conserva el nombre del pacto y evita la sustitución por «SEÑOR».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel, su Dios
  lexicon: HALOT / construct chain
  rationale: La cadena constructa se expresa de manera directa y natural en español. «El Dios de Israel» identifica al Dios del pacto sin añadir elementos que el hebreo no exige.
- source_word: כַּד
  english_pob_choice: jar
  chosen_spanish: tinaja
  alternatives_spanish:
  - jarra
  - vasija
  lexicon: HALOT
  rationale: Designa un recipiente doméstico para harina. «Tinaja» evita la asociación exclusiva con agua que puede tener «jarra» y distingue mejor este recipiente del segundo vaso.
- source_word: קֶּמַח
  english_pob_choice: flour
  chosen_spanish: harina
  alternatives_spanish:
  - harina molida
  - sémola
  lexicon: HALOT
  rationale: El término hebreo refiere al producto molido del grano. «Harina» es la equivalencia clara y natural en español.
- source_word: לֹא תִכְלָה
  english_pob_choice: will not be used up
  chosen_spanish: no se agotará
  alternatives_spanish:
  - no se terminará
  - no se acabará
  - no será consumida
  lexicon: HALOT
  rationale: Expresa bien la idea de que la provisión no llegará a su fin. «Agotarse» comunica la disminución hasta el punto de agotamiento sin volverlo demasiado literal o torpe.
- source_word: וְצַפַּחַת
  english_pob_choice: jug
  chosen_spanish: vasija
  alternatives_spanish:
  - jarra
  - jarro
  - botella
  lexicon: HALOT
  rationale: El hebreo nombra un segundo recipiente, más pequeño o distinto del anterior. «Vasija» mantiene la diferencia funcional sin imponer una forma demasiado específica que el contexto no precisa.
- source_word: הַשֶּׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: En este contexto doméstico el español natural es «aceite». El hebreo no especifica «de oliva», por lo que no se añade esa precisión.
- source_word: לֹא תֶחְסָר
  english_pob_choice: will not run dry
  chosen_spanish: no disminuirá
  alternatives_spanish:
  - no faltará
  - no se secará
  - no se reducirá
  lexicon: HALOT
  rationale: El hebreo significa faltar/disminuir. A diferencia de la solución inglesa, en español «no disminuirá» conserva la fuerza semántica sin sugerir con demasiada literalidad un líquido que se seca.
- source_word: עַד י֧וֹם
  english_pob_choice: until the day
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día
  - hasta que llegue el día
  lexicon: HALOT
  rationale: La expresión temporal se integra con una cláusula natural en español, manteniendo el límite temporal explícito del hebreo.
- source_word: תתן יְהוָה גֶּשֶׁם
  english_pob_choice: the LORD gives rain
  chosen_spanish: Yahvé dé lluvia
  alternatives_spanish:
  - Yahvé envíe lluvia
  - Yahvé dé lluvia
  - Yahvé mande lluvia
  lexicon: HALOT
  rationale: El verbo נתן es literalmente «dar». En español, «dé lluvia» conserva la equivalencia verbal y funciona bien en esta promesa profética.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the ground
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la tierra
  - sobre la superficie del suelo
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de superficie/faz, pero en un español más natural y digno que «sobre la cara de la tierra». «Tierra» funciona mejor que «suelo» en este contexto amplio.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto es transliterar el nombre divino, no ocultarlo tras un sustituto reverencial. «Yahvé» es la forma acordada para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether to preserve the Hebrew surface idiom for the end of the verse
  english_pob_reading: on the face of the ground
  chosen_spanish_reading: sobre la superficie de la tierra
  alternative_spanish_readings:
  - sobre la faz de la tierra
  - sobre la tierra
  rationale: La imagen hebrea está bien atestiguada, pero en español «sobre la superficie de la tierra» comunica el sentido sin sonar forzado. Se preserva la referencia espacial amplia del original.
  doctrine_reference: Spanish style / source transparency
translation_notes:
  revision_awareness: 'El audit trail inglés muestra alta concordancia y sin cambios recientes sustantivos. Se mantuvieron las decisiones centrales: nombre divino como transliteración, vocabulario doméstico concreto para los recipientes y una equivalencia semántica para el verbo de provisión y la imagen final del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la diferencia entre los dos recipientes con términos distintos («tinaja» / «vasija»).
  - Se evitó introducir «aceite de oliva», ya que el hebreo dice solo «aceite».
  - La nota sobre «sobre la superficie de la tierra» preserva la metáfora hebrea sin volverla rígida.
