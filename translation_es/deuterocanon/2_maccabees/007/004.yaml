  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: una vez calentados los implementos implícitos del verso anterior, el rey ordena mutilar al hermano que había hablado por los demás, mientras los otros y la madre observan. Sin embargo, hay dos desajustes importantes con la evidencia y con la auditoría inglesa: (1) «estuvieron al instante enrojecidos» suena poco natural y no expresa bien que el objeto implícito fueron los recipientes/instrumentos puestos al rojo; (2) el texto principal usa «mutilarlo», mientras la revisión inglesa final optó por la lectura más específica «cut off his extremities», manteniendo esa especificidad en el texto y no solo en nota. También conviene hacer explícito en español que la orden fue a los verdugos: «ordenó que le cortaran… y que…».'
