translation:
  language: es
  text: Cuando entres en la viña de tu prójimo[a], podrás comer todas las uvas que desees[b], hasta quedar satisfecho; pero no pondrás nada en tu recipiente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si entras en la viña de tu prójimo». La partícula hebrea puede introducir una cláusula temporal o condicional; aquí se adopta «cuando» por ser la opción más natural en este contexto legal.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «según tu alma, tu saciedad», un hebraísmo que significa según tu deseo o apetito, hasta quedar satisfecho.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «vasija». El término hebreo es general y no especifica el tipo de recipiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto legal/casuístico, כִּי introduce una situación esperada. «Cuando» conserva ese matiz de circunstancia y resulta natural en español; «si» sigue siendo posible, pero suena más hipotético.
- source_word: תָבֹא
  english_pob_choice: you enter
  chosen_spanish: entres
  alternatives_spanish:
  - entres dentro
  - vayas a entrar
  lexicon: HALOT
  rationale: El verbo expresa la acción de entrar en un lugar. En español, «entres» con «cuando» reproduce bien la relación temporal sin añadir perífrasis innecesarias.
- source_word: בְּכֶרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - en la viña
  lexicon: HALOT
  rationale: כֶּרֶם designa una plantación de vid. «Viña» es el equivalente bíblico y natural en español; «viñedo» es correcto, pero menos tradicional en el registro bíblico.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor’s
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - de tu vecino
  - de tu compañero
  lexicon: HALOT
  rationale: רֵעַ puede ser compañero, prójimo o vecino. «Prójimo» mantiene amplitud relacional y evita restringirlo solo a la vecindad física.
- source_word: וְאָכַלְתָּ עֲנָבִים
  english_pob_choice: you may eat grapes
  chosen_spanish: podrás comer uvas
  alternatives_spanish:
  - comerás uvas
  - puedes comer uvas
  lexicon: HALOT
  rationale: En español, el valor de permiso legal se expresa con «podrás». «Uvas» traduce directamente עֲנָבִים y es más natural que «grapes» calzado.
- source_word: כְּנַפְשְׁךָ
  english_pob_choice: as your appetite desires
  chosen_spanish: hasta saciar tu apetito
  alternatives_spanish:
  - según tu deseo
  - según tu apetito
  - hasta quedar satisfecho
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta al deseo/apetito, no al alma en sentido teológico. «Hasta saciar tu apetito» comunica el límite de consumo y conserva el sentido idiomático de satisfacción.
- source_word: שָׂבְעֶךָ
  english_pob_choice: until you are satisfied
  chosen_spanish: saciar tu apetito
  alternatives_spanish:
  - quedar satisfecho
  - tu saciedad
  lexicon: HALOT
  rationale: שָׂבַע expresa saciedad. Unido a la frase anterior, «saciar tu apetito» suena natural y comunica que se permite comer hasta la satisfacción.
- source_word: כֶּלְיְךָ
  english_pob_choice: container
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - vessel
  - cesto
  lexicon: HALOT
  rationale: כְּלִי es un término general para utensilio o recipiente. «Recipiente» preserva esa generalidad mejor que especificar un tipo concreto como «cesto».
- source_word: לֹא תִתֵּן
  english_pob_choice: you shall not put any
  chosen_spanish: no pondrás nada
  alternatives_spanish:
  - no echarás nada
  - no meterás nada
  lexicon: HALOT
  rationale: נתן puede significar poner/colocar. «No pondrás nada» refleja el mandato de no recolectar para llevarse en el recipiente sin forzar el verbo hacia «dar».
translation_notes:
  revision_awareness: 'Se sigue de cerca el texto hebreo masorético y el auditrayecto inglés: se mantiene la ambigüedad temporal/condicional de כִּי en nota, se conserva el sentido idiomático de נֶפֶשׁ/שָׂבַע como apetito y saciedad, y se traduce כְּלִי con un término general en español sin concretarlo indebidamente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparece el Nombre divino; este versículo no lo contiene.
  - Se prefiere «prójimo» para רֵעַ por su amplitud semántica en español bíblico.
  - «Viña» mantiene el registro bíblico y no añade información ausente en el hebreo.
  - No se introduce una lectura moralizante ni una restricción adicional sobre la cantidad permitida; el límite queda expresado por la saciedad.
