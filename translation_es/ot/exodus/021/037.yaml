    text: Hebreo שֶׂה puede designar de manera más amplia una cabeza de ganado menor, incluida una oveja o una cabra; aquí se traduce «oveja» porque la cláusula de restitución con «cuatro ovejas» hace más natural esa opción en español.
    reason: lexical_alternative
  - marker: b
    text: O «pagará». El verbo hebreo puede llevar el sentido jurídico más pleno de hacer restitución o pagar compensación.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota legal para que recaiga sobre el verbo de restitución, no sobre «vende». También se suavizó la sintaxis con «los degüella o los vende» para concordar mejor con el antecedente doble «un buey o una oveja», y se cambió «compensará» por «restituirá» para reflejar con más precisión el sentido jurídico de יְשַׁלֵּם. Se mantuvo «buey», «oveja» y «cinco reses» como opciones fieles y naturales en español.
