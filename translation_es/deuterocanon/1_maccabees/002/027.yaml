translation:
  language: es
  text: 'Y Mattatías clamó en la ciudad a gran voz, diciendo: «Todo el que tenga celo por la ley y sostenga la alianza, salga en pos de mí».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέκραξεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: LSJ
  rationale: El verbo expresa un alzamiento público y enérgico de la voz. En español, «exclamó» conserva la fuerza del anuncio sin sonar excesivamente coloquial; «clamó» y «gritó» son posibles, pero la primera mantiene mejor el tono solemne del pasaje.
- source_word: ἐν τῇ πόλει
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - por la ciudad
  - en la población
  lexicon: LSJ
  rationale: La expresión es locativa y directa. «En la ciudad» reproduce de manera transparente la referencia espacial del griego.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con voz muy alta
  lexicon: LSJ
  rationale: La imagen concreta del dativo instrumental se puede expresar naturalmente en español con «con voz fuerte». «En voz alta» es idiomático, pero «con voz fuerte» mantiene mejor la concreción de la expresión griega.
- source_word: Πᾶς ὁ ζηλῶν τῷ νόμῳ
  english_pob_choice: Everyone who is zealous for the law
  chosen_spanish: Todo el que tenga celo por la ley
  alternatives_spanish:
  - Todo el que es celoso de la ley
  - Todo el que sea celoso por la ley
  lexicon: LSJ
  rationale: El participio ζηλῶν con dativo expresa ardor o celo dirigido a la ley. En español, «tener celo por la ley» conserva la fuerza religiosa y covenantal del original sin volverlo torpe. Se evita «celoso», que en español suena principalmente a sospecha o posesividad.
- source_word: νόμῳ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: En 1 Macabeos el referente es la ley judía/Torá. «La ley» es claro y natural en español; la mayúscula es posible, pero no necesaria aquí para preservar la lectura fluida.
- source_word: ἱστῶν διαθήκην
  english_pob_choice: upholds the covenant
  chosen_spanish: sostenga la alianza
  alternatives_spanish:
  - mantenga la alianza
  - defienda la alianza
  - permanezca fiel a la alianza
  lexicon: LSJ
  rationale: El participio de ἵστημι con διαθήκη comunica la idea de mantenerse firme en la alianza, no de fundarla. «Sostenga la alianza» reproduce esa fidelidad activa en un español sobrio y natural. Se prefiere «alianza» como equivalente bíblico habitual de διαθήκη y porque en español transmite la relación pactal con Dios con claridad.
- source_word: διαθήκην
  english_pob_choice: the covenant
  chosen_spanish: la alianza
  alternatives_spanish:
  - el pacto
  - la alianza de Dios
  lexicon: LSJ
  rationale: La forma griega remite a la alianza pactal con Dios en contexto judío. «Alianza» es el término más natural y teológicamente preciso en español para este contexto; «pacto» sería posible, pero menos consistente con el registro bíblico.
- source_word: ἐξελθέτω ὀπίσω μου
  english_pob_choice: let him come out after me
  chosen_spanish: salga detrás de mí
  alternatives_spanish:
  - que salga tras de mí
  - que me siga al salir
  - salga después de mí
  lexicon: LSJ
  rationale: ἐξελθέτω conserva la salida física, importante en la escena narrativa. «Salga detrás de mí» mantiene tanto el movimiento de salir como la idea de ir a continuación, reproduciendo de manera compacta el ὀπίσω μου del griego.
theological_decisions:
- issue: διαθήκη como relación pactal con Dios en contexto macabeo
  english_pob_reading: the covenant
  chosen_spanish_reading: la alianza
  alternative_spanish_readings:
  - el pacto
  - la alianza de Dios
  rationale: En 1 Macabeos, διαθήκη alude a la alianza de Israel con Dios. «Alianza» preserva el peso teológico y la relación obligante del término sin recurrir a una formulación más técnica de iglesia. No se añade nada fuera del contexto, pero sí se hace explícita la dimensión pactal que el pasaje presupone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological weight of key terms; readable modern Spanish.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión textual. La versión española sigue directamente el sentido del original, preservando la exhortación pública, el celo por la ley y la fidelidad a la alianza.
  spanish_consistency_notes:
  - Se usa «alianza» de manera consistente para διαθήκη en este contexto judío.
  - Se mantiene «ley» para νόμος, sin mayúscula obligatoria, porque el contexto ya determina su referencia.
  - «Exclamó» y «con voz fuerte» conservan el tono público y enérgico del griego sin caer en calco rígido.
