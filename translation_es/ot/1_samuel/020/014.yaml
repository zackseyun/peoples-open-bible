translation:
  language: es
  text: Y si aún estoy vivo, ¿no me mostrarás el amor fiel[a] de Yahvé, para que no muera?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la bondad fiel de Yahvé» o «el amor constante de Yahvé». La frase hebrea también puede entenderse como referencia más directa al amor leal propio de Yahvé, no solo a la fidelidad mostrada en su nombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y si no
  - Y en caso de que
  lexicon: HALOT
  rationale: La secuencia hebrea funciona de manera idiomática en este ruego juramentado, no como una negación simple más una condición. En español, 'Y si' comunica con naturalidad la continuación de la petición.
- source_word: עוֹדֶנִּי חָי
  english_pob_choice: I am still alive
  chosen_spanish: aún sigo vivo
  alternatives_spanish:
  - todavía estoy vivo
  - si aún vivo
  lexicon: HALOT
  rationale: עוֹד aporta la idea de continuidad temporal, y חָי expresa estar vivo. 'Aún sigo vivo' suena natural en español y conserva el valor aspectual.
- source_word: תַעֲשֶׂה עִמָּדִי
  english_pob_choice: show me
  chosen_spanish: me mostrarás
  alternatives_spanish:
  - me harás
  - tratarás conmigo
  - obrarás conmigo
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'hacer con/para conmigo', pero en este contexto con חֶסֶד el sentido idiomático es el de manifestar un trato leal. 'Mostrarás' transmite la acción relacional sin calco duro.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia leal
  alternatives_spanish:
  - amor fiel
  - lealtad amorosa
  - bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד en este pacto entre Jonatán y David combina afecto, lealtad y obligación pactal. 'Misericordia leal' intenta mantener esa tensión sin reducirlo solo a 'bondad' ni volverlo una paráfrasis excesiva. 'Misericordia' cubre el gesto favorable; 'leal' conserva el matiz covenantal.
- source_word: יְהוָה
  english_pob_choice: Yahweh’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del SEÑOR
  - de Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. Se conserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: וְלֹא אָמוּת
  english_pob_choice: that I may not die
  chosen_spanish: para que no muera
  alternatives_spanish:
  - y no muera
  - a fin de que no muera
  - para no morir
  lexicon: HALOT
  rationale: La cláusula expresa finalidad o resultado dentro del ruego de Jonatán. 'Para que no muera' refleja bien el hebreo y su relación con la petición anterior.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino. En español del proyecto, la forma establecida es 'Yahvé', que preserva el nombre propio y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of חֶסֶד יְהוָה
  english_pob_reading: Yahweh’s steadfast love
  chosen_spanish_reading: la misericordia leal de Yahvé
  alternative_spanish_readings:
  - la bondad de Yahvé
  - el amor constante de Yahvé
  - la fidelidad de Yahvé
  rationale: El contexto es de pacto entre Jonathan y David bajo la invocación de Yahvé. 'Misericordia leal' intenta preservar el contenido relacional y comprometido de חֶסֶד sin borrar la dimensión afectiva que el español necesita para ser natural.
  doctrine_reference: 'DOCTRINE.md: Contested terms — חֶסֶד (lexical nuance in covenant contexts)'
- issue: Purpose/result clause with וְלֹא אָמוּת
  english_pob_reading: that I may not die
  chosen_spanish_reading: para que no muera
  alternative_spanish_readings:
  - y no muera
  - para no morir
  - a fin de que no muera
  rationale: La frase final expresa la finalidad deseada por Jonatán dentro de la negociación. En español, 'para que no muera' preserva ese valor final sin introducir una lectura doctrinal ajena.
  doctrine_reference: Spanish syntactic clarity in purpose clauses
translation_notes:
  revision_awareness: La versión inglesa reciente simplificó la expresión de חֶסֶד a 'steadfast love' por considerarla más directa. En esta propuesta española se conserva esa amplitud semántica con 'misericordia leal', evitando tanto un calco rígido como una reducción a mera 'bondad'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del Tetragrámaton.
  - Se mantiene un tono bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - La cláusula final se vierte como propósito/resultando natural en español.
  - El marcador [a] corresponde a una alternativa de lectura temporal del inicio del versículo.
