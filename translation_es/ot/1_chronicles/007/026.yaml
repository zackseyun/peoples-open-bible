translation:
  language: es
  text: Ladán su hijo[a], Amihud su hijo, Elisama su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Ladán” sigue la transliteración directa del hebreo; “Laadán” es una posibilidad de transliteración alternativa a partir de la misma escritura.
