translation:
  language: es
  text: Pero en cuanto a mí[a], he instalado a mi rey en Sión, mi monte santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he puesto a mi rey»; algunos entienden el verbo como «he ungido a mi rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: La construcción con pronombre independiente funciona aquí de modo enfático y contrastivo frente a la rebelión de las naciones. «Pero en cuanto a mí» conserva mejor ese contraste que un simple «Y yo», y suena natural en español actual sin perder el peso discursivo.
- source_word: נָסַכְתִּי
  english_pob_choice: have installed
  chosen_spanish: he instalado
  alternatives_spanish:
  - he puesto
  - he establecido
  - he ungido
  lexicon: HALOT
  rationale: Sigo la lectura de instalación/entronización real adoptada en la POB inglesa. «He instalado» comunica la designación y colocación del rey sin confundir el verbo con el de ungir, y evita reducir el sentido a un rito específico.
- source_word: מַלְכִּי
  english_pob_choice: my king
  chosen_spanish: a mi rey
  alternatives_spanish:
  - mi rey
  - a mi Rey
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo posesivo directo. En español, con «instalar» el complemento directo suena natural con la preposición «a» cuando se refiere a persona; por eso «a mi rey» preserva claridad y fluidez. No se capitaliza «Rey» para no introducir una lectura interpretativa no exigida por el hebreo.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zión
  lexicon: HALOT
  rationale: «Sión» es la forma castellana establecida y plenamente reconocible para el nombre propio, manteniendo la transliteración tradicional en español.
- source_word: הַר קָדְשִׁי
  english_pob_choice: my holy mountain
  chosen_spanish: mi monte santo
  alternatives_spanish:
  - mi montaña santa
  - mi santo monte
  lexicon: HALOT
  rationale: El hebreo usa הַר, cuyo valor básico es «monte/montaña». «Monte santo» suena más natural y bíblico en español que una construcción más pesada, y reproduce la relación posesiva y adjetival sin añadir matices ajenos.
theological_decisions:
- issue: ¿Conviene traducir נָסַכְתִּי como «ungido» para reflejar una lectura mesiánica?
  english_pob_reading: royal installation/enthronement ('I have installed my king')
  chosen_spanish_reading: instalación/entronización real («he instalado a mi rey»)
  alternative_spanish_readings:
  - he ungido a mi rey
  - he establecido a mi rey
  rationale: 'La decisión sigue el audit trail de la POB: el verbo aquí se entiende mejor como colocación o entronización del rey en Sión. Mantener «he instalado» evita importar de inmediato la noción de unción ritual, que en hebreo suele expresarse con otro verbo, y conserva la tensión canónica para la lectura mesiánica sin imponerla en la superficie del versículo.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto sigue el estado más reciente del audit trail inglés, que no registra revisiones adicionales y fue confirmado por revisión de alta concordancia. No se introducen cambios no motivados por el original ni por la POB inglesa.
  spanish_consistency_notes:
  - Se preserva «Sión» como topónimo fijo y «Yahvé» no aparece en este versículo.
  - Se mantiene la primera persona divina explícita con «en cuanto a mí», acorde al contraste enfático del hebreo.
  - No se usa «Señor» ni «Cristo», porque el versículo no contiene esos términos y el nombre/ título no requiere sustitución interpretativa.
