    rationale: אֵי זֶה הַדֶּרֶךְ הָלָךְ pregunta por la vía seguida. En español amplio y natural, «¿Por qué camino se fue?» comunica mejor esa idea que «¿Qué camino tomó él?».
  - severity: low
