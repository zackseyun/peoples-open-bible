revisions:
- from: El rey Salomón impuso trabajo forzoso[a][b] sobre todo Israel, y el trabajo forzoso fue de treinta mil hombres.
  to: El rey Salomón reclutó trabajo forzoso[b][a] de todo Israel, y el trabajo forzoso fue de treinta mil hombres.
  rationale: Se cambió 'impuso' por 'reclutó' para reflejar mejor el matiz de conscripción del hebreo ויעל en este contexto administrativo, y 'sobre todo Israel' por 'de todo Israel' para conservar la idea de procedencia de la fuerza laboral. Se mantuvo 'trabajo forzoso' como equivalente claro y fiel de מַס. También se mejoró la nota alternativa para que suene natural en español contemporáneo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:47:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien que מַס es servicio laboral obligatorio y no impuesto monetario, y mantiene la cifra de treinta mil hombres. Sin embargo, 'sobre todo Israel' no refleja con precisión מִכָּל יִשְׂרָאֵל ('de/entre todo Israel') como fuente del contingente, sino que sugiere imposición sobre la nación. Además, 'impuso trabajo forzoso' es comprensible, pero el inglés auditado privilegia la idea de reclutar/levantar una leva laboral más que solo imponerla.
  spanish_quality_summary: 'El español es mayormente claro, pero ''sobre todo Israel'' suena menos natural y menos fiel al sentido de procedencia. También conviene ajustar la nota alternativa: ''levó'' no es la mejor opción en español general; ''levantó una leva laboral'' o ''reclutó una fuerza laboral'' sería más idiomático. La frase final funciona mejor como ''y el trabajo forzoso fue de treinta mil hombres'' o, con mayor claridad, ''y esa leva laboral fue de treinta mil hombres''.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Trabajo forzoso' es una buena equivalencia para מַס según el expediente inglés. La revisión propuesta mantiene esa elección y corrige solo la preposición y el matiz verbal para alinearse mejor con la evidencia fuente y la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: La expresión 'sobre todo Israel' no traduce con precisión מִכָּל יִשְׂרָאֵל.
    rationale: El hebreo indica la población de la cual se extrajo el contingente ('de todo Israel'), no primariamente el objeto sobre el cual recayó la carga. En español, 'sobre' cambia el enfoque y puede inducir un matiz distinto.
  - severity: low
    issue: '''Impuso trabajo forzoso'' atenúa el matiz de conscripción/levantamiento de una leva laboral.'
    rationale: Aunque no es incorrecto, el contexto administrativo y la decisión inglesa 'conscripted' favorecen un verbo como 'reclutó' o una construcción que explicite la leva de trabajadores.
  - severity: low
    issue: La nota alternativa usa 'levó', forma poco natural en español general contemporáneo.
    rationale: Para una Biblia de amplia legibilidad eclesial, conviene evitar formulaciones raras cuando una alternativa equivalente puede expresarse con naturalidad.
  revised_spanish_text: El rey Salomón reclutó trabajo forzoso[b][a] de todo Israel, y el trabajo forzoso fue de treinta mil hombres.
  revised_footnotes:
  - marker: a
    text: 'O: «levantó una leva laboral de todo Israel».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo מַס se refiere a servicio laboral obligatorio, no principalmente a un impuesto en dinero.
    reason: cultural_note
  revision_rationale: Se cambió 'impuso' por 'reclutó' para reflejar mejor el matiz de conscripción del hebreo ויעל en este contexto administrativo, y 'sobre todo Israel' por 'de todo Israel' para conservar la idea de procedencia de la fuerza laboral. Se mantuvo 'trabajo forzoso' como equivalente claro y fiel de מַס. También se mejoró la nota alternativa para que suene natural en español contemporáneo.
