base_translation:
  language: en
  yaml_path: translation/ot/nahum/001/003.yaml
  text: Yahweh is slow to anger and great in power[a], and he will by no means leave the guilty unpunished. Yahweh—his way is in the whirlwind and the storm, and clouds are the dust of his feet.
