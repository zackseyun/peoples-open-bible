translation:
  language: es
  text: un novillo[a], un carnero, un cordero macho[b] de un año, para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «un novillo, cría del ganado»; la expresión clasifica al animal como bovino del hato.
    reason: lexical_alternative
  - marker: b
    text: O «un cordero»; el término hebreo aquí se usa a menudo para un cordero macho en contextos sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: novillo
  alternatives_spanish:
  - toro
  - buey joven
  lexicon: HALOT
  rationale: פַּר designa un bovino macho para sacrificio. En español, «novillo» comunica con naturalidad un bovino joven y evita la dureza de «toro» o la ambigüedad de «buey».
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: '[a]'
  alternatives_spanish:
  - de la vacada
  - de la manada
  - del ganado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijo de ganado/de la vacada», una forma clasificatoria. Sigo la equivalencia auditable con una nota, porque en español «novillo» ya absorbe gran parte de esa información sin necesidad de una perífrasis pesada.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - ram
  - macho
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para el macho adulto de la oveja en un contexto sacrificial.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El término hebreo puede referirse a un cordero, y el contexto sacrificial distingue el sexo. «Cordero macho» preserva esa precisión sin sonar técnico en exceso.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica edad; «de un año» es la forma natural y fiel en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para una ofrenda quemada
  - como holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término consagrado en español bíblico para עֹלָה y mantiene la referencia al sacrificio completamente consumido por fuego. Se evita sustituirlo por una glosa menos tradicional pero menos exacta al género sacrificial.
translation_notes:
  revision_awareness: 'Coincide con el trazado de la POB inglesa: lista sacrificial concisa, con equivalentes precisos y una nota para el hebreo idiomático de בֶּן בָּקָר. No se detectaron revisiones aplicadas en el registro inglés reciente.'
  spanish_consistency_notes:
  - 'Se mantiene el orden del hebreo y de la POB inglesa: bovino, carnero, cordero, luego la finalidad sacrificial.'
  - 'Se usa terminología sacrificial estable en español: «holocausto» para עֹלָה.'
  - La nota sobre בֶּן בָּקָר conserva la tensión lexical entre literalidad y naturalidad, sin ocultarla.
