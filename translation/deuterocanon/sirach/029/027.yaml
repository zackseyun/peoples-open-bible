translation:
  text: Go out[a], sojourner, from the place of honor, for my brother has become my guest[b], and I need the lodging.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the honored place' or more literally 'from before the face of honor.' The Greek expression is unusual, and the sense is likely that the sojourner must leave a prominent or honored spot to make room for another guest.
    reason: lexical_alternative
  - marker: b
    text: The final phrase could also be rendered 'I need hospitality' or 'there is need of lodging.' The Greek emphasizes the necessity created by receiving another guest.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξελθε
  chosen: Go out
  alternatives:
  - Leave
  - Go away
  lexicon: LSJ
  rationale: A direct imperative from ἐξέρχομαι. 'Go out' preserves the blunt force of the command without adding interpretation.
- source_word: πάροικε
  chosen: sojourner
  alternatives:
  - resident alien
  - stranger
  - guest
  lexicon: LSJ
  rationale: πάροικος denotes one dwelling beside others, a temporary resident or outsider. 'Sojourner' preserves the social vulnerability and non-native status better than the more modern but technical 'resident alien.'
- source_word: ἀπὸ προσώπου δόξης
  chosen: from the place of honor
  alternatives:
  - from before honor
  - from the face/presence of glory
  - from an honored place
  lexicon: LSJ
  rationale: The literal phrase is awkward in English. In context of expelling one guest to make room for another, it most naturally refers to an honored position or prominent place in the house. 'Place of honor' gives the likely sense while remaining close to the imagery of 'before the face of honor.'
- source_word: ἐπεξενώταί
  chosen: has become my guest
  alternatives:
  - has lodged with me
  - has come as a guest to me
  - has been entertained by me
  lexicon: LSJ
  rationale: The perfect form from a ξεν- hospitality verb indicates that the brother is now in the state of being received as a guest. 'Has become my guest' captures the resulting situation clearly in modern English.
- source_word: ὁ ἀδελφός
  chosen: my brother
  alternatives:
  - the brother
  - my kinsman
  lexicon: LSJ
  rationale: Although the Greek has the article, English idiom in this context favors 'my brother,' whether literal brother or close kinsman/fellow. It reflects the possessive sense implied by the social setting.
- source_word: χρεία
  chosen: I need
  alternatives:
  - there is need of
  - there is a need for me
  lexicon: LSJ
  rationale: The noun means 'need' or 'necessity.' Rendering it verbally in English produces a natural sentence while preserving the sense of urgent necessity.
- source_word: τῆς ξενίας
  chosen: the lodging
  alternatives:
  - hospitality
  - guest-room
  - guest-space
  lexicon: LSJ
  rationale: ξενία can mean hospitality or lodging for a guest. Here the speaker is making room in the house, so 'the lodging' best fits the concrete need, while still tied to the hospitality domain.
