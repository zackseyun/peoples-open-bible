translation:
  language: es
  text: 'Entonces me dijo[a]: «Hijo de hombre, come lo que halles; come este rollo, y ve, habla a la casa de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que halles, come». La expresión hebrea puede entenderse de ambas maneras; el sentido es que Ezequiel debe consumir lo que se le ponga delante.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hijo humano
  - hijo de un hombre
  lexicon: HALOT
  rationale: Conserva la dirección literal del hebreo como apelativo profético y mantiene la imagen representativa sin convertirla en una paráfrasis abstracta. En español, «Hijo de hombre» es la forma más transparente y reconocible para este uso.
- source_word: אֵת אֲשֶׁר תִּמְצָא
  english_pob_choice: what you find
  chosen_spanish: lo que halles
  alternatives_spanish:
  - lo que encuentres
  - cualquier cosa que halles
  lexicon: HALOT
  rationale: La expresión hebrea funciona idiomáticamente como «lo que encuentres/halles». «Lo que halles» conserva la concisión y el sentido abierto del original sin añadir una generalización excesiva.
- source_word: אֱכֹל אֱכוֹל
  english_pob_choice: eat ... eat
  chosen_spanish: come ... come
  alternatives_spanish:
  - come, sí, come
  - come con insistencia
  lexicon: HALOT
  rationale: La repetición intensiva del imperativo se preserva en español repitiendo el verbo. «Come ... come» refleja mejor la fuerza enfática del hebreo que una sola orden con adverbio explicativo.
- source_word: הַמְּגִלָּה
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - pergamino
  - libro enrollado
  lexicon: HALOT
  rationale: «Rollo» es el equivalente natural en español para un escrito antiguo enrollado y evita la anacronía de «libro». Mantiene la imagen material del texto hebreo.
- source_word: וְלֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: HALOT
  rationale: Imperativo simple de movimiento; «ve» sigue con naturalidad la secuencia de mandatos y corresponde al valor básico del hebreo.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - declara
  - proclama
  lexicon: HALOT
  rationale: «Habla» es la equivalencia directa del verbo y evita introducir un matiz más interpretativo como «declara» o «proclama», que no está explícito en el verbo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de pertenencia y colectividad. «La casa de Israel» reproduce con fidelidad la fórmula covenantal sin suavizarla a «el pueblo de Israel».
theological_decisions:
- issue: Apelativo profético בֶּן אָדָם y su fuerza representativa
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - hijo humano
  rationale: La opción literal mantiene el tono vocativo del libro de Ezequiel y la tensión entre la pequeñez humana del profeta y su comisión divina. No se sustituye por una expresión genérica que diluya la forma establecida del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Preservación de la duplicación imperativa אֱכֹל אֱכוֹל
  english_pob_reading: eat ... eat
  chosen_spanish_reading: come ... come
  alternative_spanish_readings:
  - come con insistencia
  - come, sí, come
  rationale: La repetición no se reduce a un solo mandato para no perder la intensidad del original. En español, duplicar el imperativo es la manera más directa de conservar esa carga enfática.
  doctrine_reference: HALOT; principio de transparencia formal en mandatos enfáticos
translation_notes:
  revision_awareness: No se observaron revisiones posteriores que alteren el sentido base; se mantiene la lectura de alta concordancia del paquete fuente y se conservan las decisiones léxicas principales del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto hebreo nombra directamente el nombre divino; aquí no aparece.
  - Se mantiene «casa de Israel» por consistencia con el idiomatismo bíblico y con la política terminológica del proyecto.
  - Se evita «Cristo» y otras fórmulas no pertinentes al pasaje.
  - La puntuación reproduce el discurso directo de manera natural para lectura pública en español.
