translation:
  language: es
  text: Una esposa perversa es un yugo para bueyes que se sacude[a]; quien se aferra a ella es como el que agarra un escorpión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego βοοζύγιον σαλευόμενον es difícil y muy metafórico; probablemente se refiere a un yugo de bueyes que se tambalea o se sacude, y expresa la carga perturbadora de una esposa perversa.
    reason: lexical_alternative
lexical_decisions:
- source_word: βοοζύγιον
  english_pob_choice: yoke for oxen
  chosen_spanish: yugo para bueyes
  alternatives_spanish:
  - yugo de bueyes
  - yugo para oxen
  lexicon: LSJ
  rationale: El compuesto evoca de forma concreta el arreo de bueyes bajo un yugo. «Yugo para bueyes» conserva la imagen agrícola sin forzar una paráfrasis más interpretativa.
- source_word: σαλευόμενον
  english_pob_choice: shaking
  chosen_spanish: que se sacude
  alternatives_spanish:
  - sacudido
  - inestable
  - tambaleante
  lexicon: BDAG
  rationale: El participio comunica movimiento e inestabilidad. «Que se sacude» mantiene la imagen dinámica y resulta natural en español.
- source_word: γυνὴ πονηρά
  english_pob_choice: a wicked wife
  chosen_spanish: Una esposa perversa
  alternatives_spanish:
  - Una mujer perversa
  - Una mala esposa
  lexicon: LSJ
  rationale: En este contexto sapiencial doméstico, γυνή puede funcionar como «esposa» más que solo «mujer». «Perversa» conserva la carga moral fuerte de πονηρά mejor que «mala».
- source_word: ὁ κρατῶν αὐτῆς
  english_pob_choice: whoever takes hold of her
  chosen_spanish: quien la toma en sus manos
  alternatives_spanish:
  - quien se apodera de ella
  - quien la agarra
  lexicon: BDAG
  rationale: κρατέω admite la idea de tomar o asir con firmeza. «Toma en sus manos» sigue la imagen táctil del verso y evita endurecer el tono más de lo que pide el griego.
- source_word: δρασσόμενος
  english_pob_choice: grabs
  chosen_spanish: agarra
  alternatives_spanish:
  - se apodera
  - asir
  lexicon: LSJ
  rationale: El verbo expresa un agarrar súbito y manual. «Agarra» reproduce bien esa inmediatez y se enlaza con el símil del escorpión.
- source_word: σκορπίου
  english_pob_choice: a scorpion
  chosen_spanish: un escorpión
  alternatives_spanish:
  - un alacrán
  lexicon: LSJ
  rationale: «Escorpión» es transparente y estándar en español bíblico moderno; se mantiene el singular indefinido del original.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Sirácides 26:8 y el audit trail inglés. No se aplicaron cambios de revisión posteriores; la dificultad principal sigue siendo la metáfora inicial βοοζύγιον σαλευόμενον, mantenida de modo accesible en español sin suavizar su fuerza imagética.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se prefirió «esposa» por el contexto sapiencial doméstico, aunque «mujer» sigue siendo una alternativa válida.
  - «Escorpión» se mantuvo para coherencia zoológica y por ser más común que «alacrán» en registro bíblico transregional.
