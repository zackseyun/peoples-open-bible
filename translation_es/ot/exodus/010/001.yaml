revisions:
- from: 'Entonces Yahvé dijo a Moisés[a]: «Entra a Faraón, porque yo he endurecido su corazón y el corazón de sus siervos[b], para que ponga estas mis señales en medio de él».'
  to: 'Entonces Yahvé dijo a Moisés[a]: «Ve a Faraón, porque yo he endurecido su corazón y el corazón de sus siervos[b], para que yo ponga estas señales mías entre ellos».'
  rationale: Se revisa la orden a una formulación española natural («Ve a Faraón»), se hace explícito el sujeto de propósito («yo ponga»), y se alinea el texto principal con la decisión contextual del POB inglés para בְּקִרְבּוֹ («entre ellos»), preservando la literalidad singular en nota. También se mejora la fluidez de «estas señales mías» y se corrige la nota con el error tipográfico.
  reviewer_model: gpt-5.4
