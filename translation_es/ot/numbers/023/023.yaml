  text: כִּ֤י לֹא נַ֨חַשׁ֙ בְּ/יַעֲקֹ֔ב וְ/לֹא קֶ֖סֶם בְּ/יִשְׂרָאֵ֑ל כָּ/עֵ֗ת יֵאָמֵ֤ר לְ/יַעֲקֹב֙ וּ/לְ/יִשְׂרָאֵ֔ל מַה פָּ֖עַל אֵֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/023/023.yaml
  text: For there is no divination in Jacob[a], and no sorcery in Israel; at the proper time it will be said to Jacob and to Israel[b], ‘What God has done!’
