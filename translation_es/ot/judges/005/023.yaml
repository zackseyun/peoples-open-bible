    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the help of the LORD ... among the mighty'; the final phrase may also be understood as 'against the mighty' or 'with the mighty warriors.'
    reason: alternative_reading
