translation:
  language: es
  text: Le presentó el tributo a Eglón, rey de Moab[a]. Eglón era un hombre muy corpulento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regalo» o «presente». El hebreo minḥá puede significar ofrenda o don, pero aquí probablemente se refiere al tributo pagado por un pueblo sujeto a un gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: He presented
  chosen_spanish: Le presentó
  alternatives_spanish:
  - le llevó
  - le ofreció
  - lo presentó
  lexicon: HALOT
  rationale: En este contexto cortesano, el hifil de קרב expresa llevar algo ante un superior. «Le presentó» conserva esa fuerza de entrega formal mejor que un calco como «lo acercó» o «lo llevó».
- source_word: הַמִּנְחָה
  english_pob_choice: the tribute
  chosen_spanish: el tributo
  alternatives_spanish:
  - el regalo
  - la ofrenda
  - el presente
  lexicon: HALOT
  rationale: El contexto de Jueces 3 es político y refleja sujeción a un rey extranjero; por eso «tributo» comunica mejor el pago obligatorio que una traducción neutral como «regalo» u «ofrenda».
- source_word: לְעֶגְלוֹן מֶלֶךְ מוֹאָב
  english_pob_choice: to Eglon king of Moab
  chosen_spanish: a Eglón, rey de Moab
  alternatives_spanish:
  - a Eglón, el rey de Moab
  lexicon: n/a
  rationale: La preposición y la aposición se expresan de manera natural en español con «a Eglón, rey de Moab». Mantiene el nombre propio y el título sin sobrecargar la frase.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y se refiere específicamente a Eglón; «hombre» conserva esa referencia y evita diluirla con «persona».
- source_word: בָּרִיא
  english_pob_choice: fat
  chosen_spanish: gordo
  alternatives_spanish:
  - gordo de cuerpo
  - obeso
  - rechoncho
  lexicon: HALOT
  rationale: El término describe gordura corporal de manera directa. En español, «gordo» es la opción más directa y clara; aunque puede sonar más coloquial que otras, comunica bien la observación narrativa del texto.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - extremadamente
  lexicon: HALOT
  rationale: Es el intensificador común del hebreo; «muy» es el equivalente natural en español y preserva la fuerza sin exageración estilística.
- source_word: וְעֶגְלוֹן
  english_pob_choice: Now Eglon
  chosen_spanish: Ahora bien, Eglón
  alternatives_spanish:
  - Y Eglón
  lexicon: n/a
  rationale: La waw introductoria funciona como una pausa explicativa o parentética. «Ahora bien» reproduce mejor esa transición discursiva en español que un simple «y».
translation_notes:
  revision_awareness: Se siguió de cerca el contexto de sumisión política indicado por el inglés POB y su nota sobre minḥah; no se introdujeron cambios doctrinales ni variantes textuales, y la puntuación se adaptó al español natural manteniendo el quiebre discursivo del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no lo contiene.
  - Se mantiene «rey de Moab» como título descriptivo directo, sin recurso a formulaciones eclesiásticas no presentes en la fuente.
  - «Tributo» conserva la tensión política del pasaje y evita suavizar el sentido económico-coercitivo.
