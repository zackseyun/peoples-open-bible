translation:
  language: es
  text: 'Subirás como una tormenta; vendrás como una nube para cubrir la tierra[a]: tú y todas tus tropas[b], y muchos pueblos contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para cubrir la tierra'. El hebreo puede significar tanto 'tierra' como 'país/territorio', según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'tus alas'; aquí el término se refiere a las alas o divisiones militares de las fuerzas de Gog.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלִיתָ
  english_pob_choice: You will come up
  chosen_spanish: Subirás
  alternatives_spanish:
  - Ascenderás
  - Subirás/avanzarás
  lexicon: HALOT
  rationale: עלה tiene el sentido básico de ‘subir/ascender’; en un contexto de movimiento militar hacia un objetivo, ‘subirás’ conserva la imagen direccional sin volver la frase artificial en español.
- source_word: כַּשֹּׁאָה
  english_pob_choice: like a storm
  chosen_spanish: como una tempestad
  alternatives_spanish:
  - como un torbellino
  - como una tormenta
  lexicon: HALOT
  rationale: שֹׁאָה puede expresar tempestad, tormenta o devastación. ‘Tempestad’ mantiene el campo meteorológico y la fuerza de la comparación, con un registro natural y solemne en español.
- source_word: תָבֹוא
  english_pob_choice: you will come
  chosen_spanish: vendrás
  alternatives_spanish:
  - entrarás
  - llegarás
  lexicon: HALOT
  rationale: בוא se traduce de forma directa por ‘venir’ aquí, conservando la repetición verbal del hebreo y el paralelismo con la línea siguiente.
- source_word: כֶּעָנָן
  english_pob_choice: like a cloud
  chosen_spanish: como una nube
  alternatives_spanish:
  - como una nube espesa
  - como un nubarrón
  lexicon: HALOT
  rationale: ‘Nube’ reproduce de manera sencilla y fiel la imagen del símil; no se especifica más para no añadir matices que el hebreo no exige.
- source_word: לְכַסּוֹת הָאָרֶץ
  english_pob_choice: to cover the land
  chosen_spanish: para cubrir la tierra
  alternatives_spanish:
  - para cubrir el país
  - para cubrir el territorio
  lexicon: HALOT
  rationale: הָאָרֶץ puede significar ‘tierra’ o ‘país/territorio’. Opto por ‘tierra’ porque el español conserva bien la amplitud del término y la imagen de cobertura total, sin cerrar innecesariamente el alcance.
- source_word: אֲגַפֶּיךָ
  english_pob_choice: your troops
  chosen_spanish: tus destacamentos
  alternatives_spanish:
  - tus tropas
  - tus divisiones
  - tus alas
  lexicon: HALOT
  rationale: אגף literalmente significa ‘ala’, pero en lenguaje militar puede referirse a flancos o unidades desplegadas. ‘Destacamentos’ comunica el sentido militar de una fuerza organizada, preservando a la vez cierta cercanía con la imagen de división o ala.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchas gentes
  lexicon: HALOT
  rationale: עַמִּים se refiere a ‘pueblos’ más que a ‘naciones’ en sentido técnico. ‘Muchos pueblos’ mantiene la amplitud étnico-política del texto.
- source_word: אוֹתָךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con él
  - con ustedes
  lexicon: HALOT
  rationale: La partícula de acompañamiento se vierte naturalmente con ‘contigo’, que preserva la idea de alianza y compañía sin añadir elementos interpretativos.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - el territorio
  - la tierra/land
  rationale: El hebreo admite ‘tierra’ o ‘territorio’. En este oráculo contra Gog, el contexto inmediato sugiere la zona objeto del ataque, pero ‘la tierra’ permite conservar la amplitud del original sin forzar una referencia global ni introducir una precisión geopolítica innecesaria.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor militar de אֲגַפֶּיךָ
  english_pob_reading: your troops
  chosen_spanish_reading: tus destacamentos
  alternative_spanish_readings:
  - tus tropas
  - tus divisiones
  - tus alas
  rationale: El texto describe una coalición invasora. ‘Destacamentos’ conserva la idea de unidades militares agrupadas y evita el literalismo de ‘alas’, que en español podría oscurecer el sentido principal.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el patrón revisado del inglés POB: conserva los dos verbos de movimiento (‘subirás’, ‘vendrás’) y el infinitivo de finalidad (‘para cubrir’), evitando comprimir la comparación de modo que se pierda el paralelismo hebreo. También mantiene la referencia de acompañamiento final con una construcción natural en español.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como término por defecto para el Tetragrámaton cuando corresponda, pero este versículo no lo contiene.
  - Se mantuvo ‘pueblos’ para עַמִּים, coherente con el valor colectivo sin convertirlo en ‘naciones’ de forma interpretativa.
  - Se evitó ‘SEÑOR’ o equivalentes de sustitución porque no hay aquí un nombre divino a enmascarar.
  - La metáfora militar se conservó mediante ‘destacamentos’, que busca equilibrio entre transparencia lexical y claridad en español.
