- from: Porque tú eres el Dios de la justicia[a], que juzgas a Israel con disciplina[b].
  to: Porque tú eres el Dios de la rectitud[a], que juzgas a Israel con disciplina[b].
  rationale: Se ajusta δικαιοσύνης a «rectitud» para reflejar mejor la decisión léxica auditada de preservar el sentido amplio de 'righteousness' y no solo el matiz judicial de 'justice'. Se conserva la fluidez española y se mantiene «justicia» como alternativa en nota. El resto del versículo puede permanecer como está.
