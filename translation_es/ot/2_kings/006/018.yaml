translation:
  language: es
  text: 'Cuando bajaron contra él[a], Eliseo oró a Yahvé y dijo: «Por favor, hiere a esta nación con ceguera». Entonces los hirió con ceguera, conforme a la palabra de Eliseo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una confusión cegadora». El término hebreo puede referirse a una perturbación visual causada por Dios que les impide percibir correctamente, no necesariamente a una ceguera total o permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ אֵלָיו
  english_pob_choice: When they came down against him
  chosen_spanish: Cuando ellos descendieron contra él
  alternatives_spanish:
  - Cuando descendieron hacia él
  - Cuando bajaron hacia él
  lexicon: HALOT
  rationale: El verbo ירד se conserva con «descendieron/bajaron». El contexto hostil justifica «contra él» para reflejar el movimiento de ataque, no solo acercamiento espacial.
- source_word: וַיִּתְפַּלֵּל אֱלִישָׁע אֶל יְהוָה
  english_pob_choice: Elisha prayed to Yahweh
  chosen_spanish: Eliseo oró a Yahvé
  alternatives_spanish:
  - Eliseo oró al Yahvé
  - Eliseo intercedió ante Yahvé
  lexicon: HALOT
  rationale: התפלל se traduce con «orar» como verbo principal de petición a Dios. YHWH se rinde como «Yahvé» conforme al criterio terminológico del proyecto, preservando el nombre divino en lugar de ocultarlo con una sustitución litúrgica.
- source_word: הַךְ נָא
  english_pob_choice: Please strike
  chosen_spanish: Por favor, hiere
  alternatives_spanish:
  - Hiere, por favor
  - Te ruego, hiere
  lexicon: HALOT
  rationale: נכה admite «herir/golpear/azotar»; «hiere» mantiene la fuerza imperativa sin sonar excesivamente arcaico. «Por favor» conserva la partícula נָא como ruego cortés dentro de la oración.
- source_word: הַגּוֹי הַזֶּה
  english_pob_choice: this nation
  chosen_spanish: esta nación
  alternatives_spanish:
  - este pueblo
  - este grupo
  lexicon: HALOT
  rationale: גוי puede significar nación o pueblo. Aquí, por el sentido colectivo militar y nacional, «nación» es la equivalencia más directa y menos interpretativa.
- source_word: בַּסַּנְוֵרִים
  english_pob_choice: with blindness
  chosen_spanish: con ceguera
  alternatives_spanish:
  - con una ceguera
  - con un cegamiento
  lexicon: HALOT
  rationale: El término señala una incapacidad visual causada por Dios. «Ceguera» es la traducción más transparente en español; se conserva la posibilidad de una confusión visual intensa en la nota textual/lexical, sin diluir el sentido básico.
- source_word: וַיַּכֵּם
  english_pob_choice: So he struck them
  chosen_spanish: Entonces los hirió
  alternatives_spanish:
  - Y los hirió
  - Así los hirió
  lexicon: HALOT
  rationale: El sujeto está implícito en el contexto como Yahvé, respondiendo a la oración de Eliseo. «Entonces» refleja el valor consecutivo narrativo de la forma verbal.
- source_word: כִּדְבַר אֱלִישָׁע
  english_pob_choice: according to the word of Elisha
  chosen_spanish: conforme a la palabra de Eliseo
  alternatives_spanish:
  - según la palabra de Eliseo
  - como Eliseo había dicho
  lexicon: HALOT
  rationale: דבר conserva su sentido de «palabra/lo dicho». «Conforme a la palabra de Eliseo» mantiene el giro hebreo y la conexión entre la petición profética y su cumplimiento.
theological_decisions:
- issue: Cómo traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, no un título sustituto. La pauta del proyecto pide «Yahvé» en el texto principal para mantener transparencia y auditable fidelidad al nombre revelado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de בַּסַּנְוֵרִים
  english_pob_reading: blindness, with a note allowing blinding confusion
  chosen_spanish_reading: ceguera, con nota sobre posible cegamiento o confusión visual
  alternative_spanish_readings:
  - cegamiento
  - deslumbramiento
  rationale: La palabra designa una aflicción visual causada divinamente. «Ceguera» comunica el núcleo semántico; la nota preserva la tensión lexical que no necesariamente implica pérdida permanente de visión.
  doctrine_reference: Genesis 19:11; 2 Kings 6:18 lexical tradition
- issue: Quién ejecuta la acción en וַיַּכֵּם
  english_pob_reading: So he struck them
  chosen_spanish_reading: Entonces los hirió
  alternative_spanish_readings:
  - Entonces Él los hirió
  - Y los hirió
  rationale: Aunque el hebreo omite el sujeto explícito, el contexto lo atribuye a Yahvé en respuesta a la oración de Eliseo. La traducción lo deja implícito para no sobrecargar el verso, pero la decisión teológica se conserva en el análisis.
  doctrine_reference: Narrative context; divine agency in answer to prayer
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: el contexto auditado no mostró cambios necesarios y el control cruzado reportó alta concordancia. La presente redacción conserva la estructura y las decisiones léxicas principales del POB inglés, adaptándolas a un español natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «ceguera» en el texto y una nota para preservar la ambigüedad lexical de סַנְוֵרִים.
  - «Hirió» se escogió para נכה por su fuerza verbal y por ser más natural que «golpeó» en este contexto de aflicción divina.
  - La secuencia narrativa conserva el valor consecutivo de los waw consecutivos hebreos con «Cuando... entonces...».
