id: JOS.5.11
reference: Joshua 5:11
source:
  edition: WLC
  text: וַ/יֹּ֨אכְל֜וּ מֵ/עֲב֥וּר הָ/אָ֛רֶץ מִ/מָּֽחֳרַ֥ת הַ/פֶּ֖סַח מַצּ֣וֹת וְ/קָל֑וּי בְּ/עֶ֖צֶם הַ/יּ֥וֹם הַ/זֶּֽה׃
translation:
  text: 'And they ate some of the produce of the land on the day after the Passover: unleavened bread and roasted grain[b][a], on this very day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the old produce of the land.' The Hebrew term can denote the land's produce or yield; some understand the context to imply stored produce from the previous harvest.
    reason: lexical_alternative
  - marker: b
    text: Or 'parched grain.' The Hebrew refers to grain prepared by roasting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  chosen: And they ate
  alternatives:
  - and they ate
  - then they ate
  lexicon: HALOT
  rationale: Wayyiqtol of אכל, narrating the next event in sequence. 'And they ate' preserves the Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: מֵעֲבוּר הָאָרֶץ
  chosen: from the produce of the land
  alternatives:
  - from the yield of the land
  - from the old produce of the land
  lexicon: HALOT
  rationale: עֲבוּר here refers to the produce/yield of the land, not merely 'from across' or a generic 'food.' 'Produce' is idiomatic and fits the immediate contrast with manna in the following verse. 'Old produce' is possible in some translations, but the noun itself more basically denotes produce/yield; 'old' is interpretive and not explicit in this verse.
- source_word: מִמָּחֳרַת הַפֶּסַח
  chosen: on the day after the Passover
  alternatives:
  - from the morrow after the Passover
  - the next day after the Passover
  lexicon: HALOT
  rationale: The prepositional phrase marks time. 'On the day after the Passover' is clear modern English and preserves the temporal sense of מָחֳרַת.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: Standard rendering of מַצּוֹת in Passover context. 'Unleavened bread' is the clearest natural English equivalent.
- source_word: וְקָלוּי
  chosen: and roasted grain
  alternatives:
  - and parched grain
  - and roasted produce
  lexicon: HALOT
  rationale: קָלוּי denotes grain that has been roasted/parched. 'Roasted grain' is more immediately understandable to modern readers than 'parched grain' while remaining faithful to the lexical sense.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on that very day
  - on the selfsame day
  lexicon: HALOT
  rationale: This idiom emphasizes exactness or solemn immediacy. Because the narrative vantage point is retrospective but the Hebrew demonstrative is 'this,' 'on this very day' best preserves the form and emphasis. 'That very day' is possible in smoother English, but it weakens the deictic force of the Hebrew.
