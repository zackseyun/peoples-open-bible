translation:
  language: es
  text: Y de los levitas, divisiones en Judá pertenecían a Benjamín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y de los levitas, divisiones de Judá eran para Benjamín». El hebreo es muy comprimido, y la relación exacta entre «Judá» y «Benjamín» es elíptica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - Y desde
  - Y entre
  lexicon: HALOT
  rationale: La conjunción con מִן enlaza este cierre con la lista anterior y marca procedencia o pertenencia. En español, «Y de» conserva esa relación sin volver la frase pesada.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - la tribu de Leví
  lexicon: HALOT
  rationale: El término designa directamente a los levitas; «los levitas» es la forma natural y fiel en español.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - grupos
  - secciones
  - turnos
  lexicon: HALOT
  rationale: En este contexto administrativo, el sustantivo plural indica subdivisiones o repartos. «Divisiones» reproduce bien esa idea y mantiene la sobriedad del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - de Judá
  lexicon: HALOT
  rationale: El hebreo es muy elíptico; la POB inglesa entendió una relación locativa. «En Judá» conserva esa lectura sin añadir demasiada interpretación.
- source_word: לְבִנְיָמִין
  english_pob_choice: belonged to Benjamin
  chosen_spanish: pertenecían a Benjamín
  alternatives_spanish:
  - fueron asignadas a Benjamín
  - eran para Benjamín
  lexicon: HALOT
  rationale: El prefijo ל expresa relación o asignación. «Pertenecían a Benjamín» comunica la pertenencia/adscripción sugerida por la frase inglesa y evita forzar un verbo más técnico que no aparece en el hebreo.
theological_decisions:
- issue: Relación elíptica entre Judá y Benjamín
  english_pob_reading: The Hebrew is very compressed, and the exact relation between 'Judah' and 'Benjamin' is elliptical.
  chosen_spanish_reading: La relación exacta entre «Judá» y «Benjamín» queda implícita.
  alternative_spanish_readings:
  - Las divisiones de Judá estaban para Benjamín.
  - Las divisiones en Judá pertenecían a Benjamín.
  rationale: El hebreo es telegráfico y admite más de una relación sintáctica. La redacción española conserva la tensión sin resolverla de modo excesivo, mientras la nota mantiene abierta la alternativa reconocida por la POB inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta el control de revisión más reciente, que no introdujo cambios y confirmó un alto grado de acuerdo con la lectura anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Benjamín» como nombre propio bíblico estándar en español.
  - La frase se ha mantenido breve para reflejar la compresión del hebreo y no eliminar la ambigüedad documentada.
