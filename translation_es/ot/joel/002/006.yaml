- from: Delante de él los pueblos se estremecen[a]; todos los rostros palidecen.
  to: Delante de él los pueblos se retuercen[b][a]; todos los rostros palidecen.
  rationale: Se reemplaza «se estremecen» por «se retuercen» para acercarse mejor a la fuerza corporal de יָחִילוּ y al inglés auditado «writhe». Además, se restaura en español la nota explicativa del modismo hebreo final, ya presente en el POB inglés, para documentar que «palidecen» interpreta la expresión literal «juntan palidez».
