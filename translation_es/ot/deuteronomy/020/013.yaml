- from: Y Yahvé tu Dios lo entregará en tu mano[a], y herirás a todos sus varones con el filo de la espada.
  to: Yahvé tu Dios lo entregará en tu mano[a], y matarás a todos sus varones con el filo de la espada.
  rationale: Se quitó la conjunción inicial para una apertura más natural en español sin perder la secuencia del hebreo. Se cambió «herirás» por «matarás» porque el contexto militar y la expresión «con el filo de la espada» hacen explícita la acción letal ordenada en el original. Se mantuvo «Yahvé», «tu Dios», «en tu mano» y «sus varones» por fidelidad al texto fuente y a las decisiones léxicas del proyecto.
