review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: causal «porque», rebelión contra el mandato divino, ubicación en el desierto de Zin, la falta de reconocer la santidad de Dios ante el pueblo, y la identificación final de las aguas. Sin embargo, dos elementos no siguen fielmente el expediente inglés ni la evidencia fuente: la nota [a] introduce una alternativa direccional («al desierto de Zin») que no está respaldada aquí por בְּמִדְבַּר, y falta una nota para la alternativa del topónimo מֵי מְרִיבַת קָדֵשׁ, mientras que el borrador usa [b] para otra nota. Además, el anclaje de [b] en «sus ojos» no corresponde a la frase final del topónimo que el POB inglés documentó como alternativa.'
  spanish_quality_summary: El español es claro y digno. «porque ustedes se rebelaron contra mi mandato» y «delante de sus ojos» leen con naturalidad. «al no mostrarme como santo» es entendible, aunque «al no tratarme como santo» refleja mejor el matiz relacional de la decisión inglesa «by not treating me as holy» y suena más preciso en español bíblico actual. «Meribat-Cades» es posible, pero conviene conservar la nota alternativa sobre «Meribá de Cades» / «la contienda de Cades».
  glossary_alignment: No hay conflicto con la terminología global del proyecto. No aparecen Yahvé, Mesías, Cristo, δοῦλος, etc. «Congregación» para עֵדָה es coherente con el expediente inglés. «Cades» como forma española de Kadesh es aceptable. La principal corrección es de notas y de precisión léxica en «tratarme como santo».
  issues:
  - severity: medium
    issue: La nota [a] propone una lectura direccional («al desierto de Zin») no sustentada por el hebreo de este versículo.
    rationale: בְּמִדְבַּר צִן es locativo («en el desierto de Zin»), y el expediente inglés no preserva aquí una alternativa direccional. La nota introduce una ambigüedad nueva e innecesaria.
  - severity: medium
    issue: Falta una nota para el topónimo «Meribat-Cades» y el marcador [b] está anclado en la frase equivocada.
    rationale: El POB inglés conserva una nota sobre «Meribath-kadesh» como «Meribah of Kadesh» / «the strife of Kadesh». En español debe preservarse esa alternativa junto al topónimo final, no junto a «sus ojos».
  - severity: low
    issue: «al no mostrarme como santo» es menos preciso que la decisión auditada.
    rationale: La decisión inglesa enfatiza tratar/reconocer a Dios como santo. «al no tratarme como santo» comunica mejor ese valor que «mostrarme como santo», que puede sugerir mera exhibición.
  revised_spanish_text: porque ustedes se rebelaron contra mi mandato en el desierto de Zin, en la contienda de la congregación, al no tratarme como santo[a] en las aguas delante de sus ojos. Estas son las aguas de Meribat-Cades[b] en el desierto de Zin.
  revised_footnotes:
  - marker: a
    text: O «al no santificarme» / «al mostrarme como santo delante de sus ojos». El infinitivo hebreo es positivo en forma, pero el contexto indica que Moisés y Aarón no hicieron esto.
    reason: lexical_alternative
  - marker: b
    text: «Meribat-Cades» también puede traducirse «Meribá de Cades» o, más literalmente, «la contienda de Cades».
    reason: alternative_reading
  revision_rationale: Se elimina una nota no respaldada por la preposición locativa hebrea, se reubica la nota alternativa exigida para el topónimo final, y se ajusta «mostrarme» a «tratarme» para reflejar con más fidelidad la decisión léxica auditada sobre לְהַקְדִּישֵׁנִי sin perder naturalidad en español.
