id: PHP.4.18
reference: Philippians 4:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀπέχω δὲ πάντα καὶ περισσεύω· πεπλήρωμαι δεξάμενος παρὰ Ἐπαφροδίτου τὰ παρ’ ὑμῶν, ὀσμὴν εὐωδίας, θυσίαν δεκτήν, εὐάρεστον τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/018.yaml
  text: But I have received everything, and I abound. I am fully supplied, having received from Epaphroditus what came from you—a fragrant aroma, an acceptable sacrifice, pleasing to God.
translation:
  language: ko
  text: 나는 모든 것을 다 받았고[a], 풍성히 가지고 있습니다. 에바브로디도에게서 여러분이 보낸 것을 받아 가득 채워졌으니, 그것은 향기로운 냄새요, 받으실 만한 제물이며, 하나님을 기쁘시게 하는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀπέχω는 회계 어휘로 「영수하다·온전히 받았다」를 뜻한다. 빌립보 성도가 보낸 것이 부족함 없이 다 도착했음을 분명히 한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχω
  english_pob_choice: I have received
  chosen_korean: 모든 것을 다 받았고
  alternatives_korean:
  - 영수하였고
  - 모두 받아 두었고
  lexicon: BDAG
  rationale: 회계 어휘 ἀπέχω의 「온전히 영수함」을 「다 받았고」로 자연스럽게 살린다. 17절의 「계좌」와 비유적 연결을 유지하면서도 본문은 평이하게 둔다.
- source_word: πάντα
  english_pob_choice: everything
  chosen_korean: 모든 것을
  lexicon: BDAG
  rationale: 포괄적 「모든 것」으로 빌립보 성도가 보낸 일체를 가리킨다.
- source_word: περισσεύω
  english_pob_choice: I abound
  chosen_korean: 풍성히 가지고 있습니다
  alternatives_korean:
  - 넘치도록 가지고 있습니다
  - 풍족합니다
  lexicon: BDAG
  rationale: 본 번역의 περισσεύω 기본 옮김. 12절과 어휘 일관성을 유지한다.
- source_word: πεπλήρωμαι
  english_pob_choice: I am fully supplied
  chosen_korean: 가득 채워졌으니
  alternatives_korean:
  - 충만하게 되었으니
  - 가득 채워진 상태입니다
  lexicon: BDAG
  rationale: 완료 수동형의 「현재 상태로 채워져 있음」을 「가득 채워졌으니」로 살리며, 다음 분사구로 자연스럽게 연결한다.
- source_word: δεξάμενος
  english_pob_choice: having received
  chosen_korean: 받아
  alternatives_korean:
  - 받은 후로
  - 받음으로써
  lexicon: BDAG
  rationale: 부정과거 분사를 한국어 「~아 / ~받아」 연결로 매끄럽게 옮긴다.
- source_word: παρὰ Ἐπαφροδίτου
  english_pob_choice: from Epaphroditus
  chosen_korean: 에바브로디도에게서
  alternatives_korean:
  - 에바브로디도로부터
  - 에바브로디도의 손을 거쳐
  lexicon: BDAG
  rationale: 「에바브로디도」는 한국 교회 정착 표기. 「~에게서」가 직접 출처를 자연스럽게 표현하며, 그가 매개자임은 다음 절(「여러분이 보낸 것」)이 분명히 한다.
- source_word: τὰ παρ’ ὑμῶν
  english_pob_choice: what came from you
  chosen_korean: 여러분이 보낸 것
  alternatives_korean:
  - 여러분에게서 온 것
  - 여러분 측의 것
  lexicon: BDAG
  rationale: 자연스러운 한국어로 빌립보 성도가 실제 보낸 자임을 분명히 한다.
- source_word: ὀσμὴν εὐωδίας
  english_pob_choice: a fragrant aroma
  chosen_korean: 향기로운 냄새
  alternatives_korean:
  - 향기로운 제물
  - 향기로운 향기
  lexicon: BDAG
  rationale: 구약 제사 어휘(레 1:9 등)의 직접적 반향. 「향기로운 냄새」가 한국 교회의 정착된 정형어이며 제사적 울림을 그대로 보존한다.
- source_word: θυσίαν δεκτήν
  english_pob_choice: an acceptable sacrifice
  chosen_korean: 받으실 만한 제물
  alternatives_korean:
  - 기뻐 받으실 제물
  - 합당한 제물
  lexicon: BDAG
  rationale: 「받으실 만한」으로 δεκτός의 「하나님께 합당히 받아들여지는」 함의를 합쇼체 경어로 살린다.
- source_word: εὐάρεστον τῷ θεῷ
  english_pob_choice: pleasing to God
  chosen_korean: 하나님을 기쁘시게 하는 것
  alternatives_korean:
  - 하나님께서 기뻐하시는 것
  - 하나님의 마음에 드는 것
  lexicon: BDAG
  rationale: εὐάρεστος의 「하나님을 기쁘게 함」을 한국어 자연어 「기쁘시게 하는」으로 옮긴다. 합쇼체 경어 「-시-」를 보존한다.
theological_decisions:
- issue: 빌립보 성도의 물질적 후원에 대한 제사적 비유
  chosen_reading: '제사 어휘를 본문에 그대로 살려 「향기로운 냄새, 받으실 만한 제물, 하나님을 기쁘시게 하는 것」의 삼중 구조를 보존한다.'
  alternative_readings:
  - 감사의 일반적 표현으로 평탄화
  - 「하나님께서 기쁘게 받으시는 예물」로 동적 의역
  rationale: 바울이 의도적으로 구약 성전 제사 언어를 사용하여 후원을 예배로 격상시킨다. 한국 교회 정형어 「향기로운 냄새」 「제물」 「기쁘시게 하는 것」을 보존하면 신학적 무게가 그대로 전달된다.
  doctrine_reference: 'Translation philosophy §§1, 3, 6'
