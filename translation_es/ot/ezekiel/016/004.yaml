base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/004.yaml
  text: And as for your birth[a], on the day you were born your cord was not cut, and you were not washed with water for cleansing; you were not rubbed with salt[c][b], and you were not wrapped in cloths.
  footnotes:
  - marker: a
    text: Or 'to rub you clean' or 'to smooth you.' The Hebrew term is rare, and interpreters differ on whether it emphasizes cleansing or rubbing the newborn's skin.
    reason: lexical_alternative
  - marker: b
    text: That is, according to an ancient newborn-care practice, the infant was rubbed with salt.
    reason: cultural_note
  - marker: c
    text: Or 'you were not swaddled.'
    reason: lexical_alternative
