translation:
  language: es
  text: Como una nube se desvanece y desaparece[a], así el que desciende al Seol no sube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos» para «Seol».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלָה
  english_pob_choice: fades away
  chosen_spanish: se desvanece
  alternatives_spanish:
  - se consume
  - llega a su fin
  lexicon: HALOT
  rationale: El verbo expresa llegar a su término o desaparecer. Con "nube" como sujeto, "se desvanece" transmite en español la imagen natural de ir perdiéndose sin forzar una interpretación destructiva.
- source_word: עָנָן
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube de vapor
  - nubarrón
  lexicon: HALOT
  rationale: Es el sustantivo común para la imagen del símil. "Nube" mantiene la simplicidad y la claridad del paralelo poético.
- source_word: וַיֵּלַךְ
  english_pob_choice: and vanishes
  chosen_spanish: y desaparece
  alternatives_spanish:
  - y se va
  - y pasa
  lexicon: HALOT
  rationale: Aunque literalmente dice "y va", el contexto con "nube" y con כָּלָה pide una expresión de desaparición. "Desaparece" comunica el efecto del movimiento sin perder la naturalidad del español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: HALOT
  rationale: Introduce la comparación entre la nube y la condición humana. "Así" es la forma más directa y natural en español.
- source_word: יוֹרֵד
  english_pob_choice: the one who goes down
  chosen_spanish: el que desciende
  alternatives_spanish:
  - el que baja
  - quien desciende
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva. "El que desciende" conserva el valor genérico y la imagen vertical del texto hebreo.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término hebreo transliterado para no resolver prematuramente su alcance semántico. "Seol" mantiene la primacía del original y permite la misma amplitud conceptual que la traducción inglesa preserva con "Sheol".
- source_word: לֹא יַעֲלֶה
  english_pob_choice: does not come up
  chosen_spanish: no sube
  alternatives_spanish:
  - no volverá a subir
  - no asciende
  lexicon: HALOT
  rationale: La imagen opuesta a "desciende" es "sube". El presente gnómico español expresa la verdad general del símil con concisión y fidelidad al hebreo.
theological_decisions:
- issue: Traducción de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: La POB inglesa mantiene el término técnico para no reducirlo a una sola interpretación doctrinal. En español, "Seol" preserva la misma reserva exegética y evita imponer una equivalencia más estrecha que el hebreo no exige.
  doctrine_reference: Job 7:9; Translation philosophy §1, §3
- issue: Finalidad de la comparación con la nube
  english_pob_reading: As a cloud fades away and vanishes... so the one who goes down to Sheol does not come up.
  chosen_spanish_reading: Como una nube se desvanece y desaparece... así el que desciende al Seol no sube.
  alternative_spanish_readings:
  - Como una nube se consume y se va...
  - Así como una nube desaparece...
  rationale: El texto presenta una observación poética sobre la fugacidad de la vida y la irreversibilidad percibida de la muerte desde el punto de vista humano. La redacción española conserva ese tono sin convertirlo en una afirmación doctrinal más amplia sobre la resurrección.
  doctrine_reference: Job 7:9; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail inglés, manteniendo la metáfora de la nube, el valor genérico del participio y la transliteración de שְׁאוֹל. No se requieren revisiones adicionales respecto del pasaje base.
  spanish_consistency_notes:
  - Se usa "Seol" de forma consistente como transliteración técnica, en paralelo con la decisión inglesa de conservar "Sheol".
  - '"Desciende" / "sube" mantiene la imagen vertical del hebreo y evita suavizarla con paráfrasis.'
  - El símil se formula con un español natural y sobrio, adecuado para registro bíblico moderno sin arcaísmo innecesario.
