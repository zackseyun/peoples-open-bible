base_translation:
  language: en
  yaml_path: translation/ot/isaiah/026/009.yaml
  text: My soul has desired you in the night[a]; indeed, my spirit within me seeks you early. For when your judgments are in the earth[c][b], the inhabitants of the world learn righteousness.
  footnotes:
