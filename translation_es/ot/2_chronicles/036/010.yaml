revisions:
- from: Al comienzo del año[a], el rey Nabucodonosor mandó y lo llevó a Babilonia, junto con los vasos preciosos[b] de la casa de Yahvé, y nombró rey sobre Judá y Jerusalén a su hermano[c] Sedequías.
  to: Al volver el año[a], el rey Nabucodonosor envió y lo llevó a Babilonia, junto con los vasos preciosos[b] de la casa de Yahvé, e hizo rey sobre Judá y Jerusalén a Sedequías, su hermano[c].
  rationale: Se ajusta el texto para reflejar con mayor precisión el idiomatismo temporal hebreo, la fuerza simple de שָׁלַח como «envió», y una alternativa léxica más ceñida para כְּלֵי חֶמְדַּת. También se mejora ligeramente la fluidez sintáctica del español sin apartarse del orden ni del sentido fuente.
