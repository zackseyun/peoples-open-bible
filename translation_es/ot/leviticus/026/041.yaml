revisions:
- from: Yo también caminaré en oposición a ellos y los llevaré a la tierra de sus enemigos[a]; o entonces su corazón incircunciso será humillado[e][d][c][b], y entonces aceptarán el castigo por su iniquidad.
  to: Yo también andaré en oposición a ellos[a], y los llevaré a la tierra de sus enemigos;[b] o entonces[c] su corazón incircunciso[d] será humillado, y entonces aceptarán el castigo por su iniquidad.[e]
  rationale: Se ajusta una expresión española poco natural («caminaré en oposición») a «andaré en oposición», que preserva mejor el patrón verbal del capítulo y suena más idiomático. También se redistribuyen las notas al lugar semánticamente correspondiente y se corrige la nota sobre אוֹ אָז para mantener la disyunción difícil del hebreo. El resto del contenido se mantiene por ser fiel al sentido fuente y a la racionalidad lexical/theológica documentada.
