review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una afirmación proverbial sobre muchos que son socialmente elevados y famosos, en contraste con quienes reciben la revelación de los misterios. Sin embargo, hay un problema de anclaje de nota y una elección léxica mejorable en español para πραέσιν en vista del English POB.'
  spanish_quality_summary: La redacción es generalmente clara, pero «Muchos son [a] los altos y los renombrados» suena algo forzada por el artículo repetido y por colocar la nota en un lugar no correspondiente. «Mansos» es posible, pero «gentiles» no funciona como alternativa en español moderno porque normalmente significa otra cosa. «Apacibles» o «humildes» sirven mejor como alternativas de nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Misterios» alinea bien con μυστήρια. La principal cuestión terminológica es πραέσιν: el POB inglés privilegia ‘the gentle’; en español conviene acercarse más a esa decisión con «los apacibles», manteniendo «los mansos» y «los humildes» como alternativas en nota.'
  issues:
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota [a] explica πραέσιν, pero está anclada después de «Muchos son». Debe colocarse junto a la expresión española que traduce πραέσιν.
  - severity: medium
    issue: Alternativa de nota «los gentiles» es engañosa en español
    rationale: En español bíblico y general, «gentiles» suele entenderse como no judíos/paganos, no como ‘gentle’. Esto crea una ambigüedad indebida no presente en el original ni deseada por el English POB.
  - severity: low
    issue: «los altos y los renombrados» resulta algo tieso
    rationale: Aunque fiel, el doble artículo suena menos natural. «Hay muchos altos y renombrados» o «Muchos son altos y renombrados» fluye mejor sin pérdida de sentido.
