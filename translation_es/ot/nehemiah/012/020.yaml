translation:
  language: es
  text: para Sallai[a], Calai; para Amoc[b], Eber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Sallai, Calai; de Amoc, Eber». El hebreo con ל puede traducirse aquí como «para», «de» o «perteneciente a», señalando la asociación con la casa sacerdotal nombrada.
    reason: lexical_alternative
  - marker: b
    text: Eber también se encuentra como «Heber» en algunas versiones.
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/סַלַּי
  english_pob_choice: for Sallai
  chosen_spanish: para Salai
  alternatives_spanish:
  - de Salai
  - perteneciente a Salai
  lexicon: HALOT
  rationale: El prefijo ל en esta lista genealógica o de casas sacerdotales marca asociación; en español, «para» conserva el tono de encabezamiento/lista que tuvo el inglés POB y evita sobrecargar el sintagma. Se translitera el nombre como Salai, siguiendo la forma hebrea y manteniendo la relación con el original.
- source_word: קַלָּי
  english_pob_choice: Kallai
  chosen_spanish: Calai
  alternatives_spanish:
  - Kallai
  lexicon: HALOT
  rationale: Nombre propio transliterado desde el hebreo. En español, «Calai» refleja mejor la k/ק inicial con «c» ante a, y mantiene la pronunciación aproximada sin introducir una grafía inglesa innecesaria.
- source_word: לְ/עָמ֥וֹק
  english_pob_choice: for Amok
  chosen_spanish: para Amoc
  alternatives_spanish:
  - de Amoc
  - perteneciente a Amoc
  lexicon: HALOT
  rationale: Mismo valor asociativo del prefijo ל; se conserva «para» por consistencia con la primera mitad del versículo. El nombre se translitera como Amoc para reflejar el hebreo עָמ֥וֹק sin adaptar al patrón inglés.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Eber
  alternatives_spanish:
  - Heber
  lexicon: HALOT
  rationale: Se mantiene Eber porque es una transliteración cercana al hebreo y la forma inglesa POB ya documenta esta opción frente a la variante tradicional «Heber». En español, Eber resulta transparente y auditable.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto base y con la auditoría inglesa; no se detectaron cambios textuales relevantes. La principal decisión de revisión fue conservar la función asociativa del prefijo ל en una formulación española natural y mantener la transliteración directa de los nombres propios.
  spanish_consistency_notes:
  - Se usa «para» de manera consistente para reflejar el valor asociativo del ל en listas nominales, sin convertirlo en una equivalencia rígida en todo contexto.
  - Se transliteran los nombres propios de forma directa y auditable, evitando sustituciones por formas tradicionales que no corresponden al hebreo subyacente.
  - Se mantiene puntuación breve de lista, acorde con el formato del versículo.
