revisions:
- from: ¡Canta con alegría y regocíjate[a], hija de Sión[b], porque, mira, yo vengo, y habitaré en medio de ti, declara Yahvé[c].
  to: ¡Canta con alegría y regocíjate[a], hija de Sión[b], porque he aquí, yo vengo, y habitaré en medio de ti, declara Yahvé[c].
  rationale: 'La revisión hace tres ajustes menores pero importantes: ancla correctamente la nota cultural en «hija de Sión», mejora הִנְנִי a «he aquí» para un tono profético más fiel y natural, y normaliza la puntuación final. No hay cambio sustantivo de significado.'
