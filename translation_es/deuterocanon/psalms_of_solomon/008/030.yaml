lexical_decisions:
- source_word: ἰδοὺ δή
  english_pob_choice: Behold now
  chosen_spanish: He aquí ahora
  alternatives_spanish:
  - Mira ahora
  - Mira pues
  - He aquí
  lexicon: BDAG
  rationale: La expresión griega funciona como marcador enfático de atención. «He aquí ahora» conserva el tono solemne y exhortativo mejor que una forma más neutra, y suena natural en español bíblico sin perder el énfasis del original.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: BDAG
  rationale: El contexto es de invocación directa, por lo que el vocativo se expresa naturalmente con «oh Dios» en español.
- source_word: ἔδειξας
  english_pob_choice: you have shown
  chosen_spanish: nos has mostrado
  alternatives_spanish:
  - nos mostraste
  - nos has revelado
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto en español para comunicar una acción completa con relevancia presente en la oración. «Mostrar» sigue de cerca el verbo griego sin introducir una interpretación más fuerte como «revelar».
- source_word: τὸ κρῖμά σου
  english_pob_choice: your judgment
  chosen_spanish: tu juicio
  alternatives_spanish:
  - tu sentencia
  - tu decreto
  - tu veredicto
  lexicon: BDAG
  rationale: «Juicio» conserva el peso forense de κρῖμα y es un equivalente natural en español. Se evita estrecharlo indebidamente a «sentencia» o «decreto».
- source_word: ἐν τῇ δικαιοσύνῃ σου
  english_pob_choice: in your righteousness
  chosen_spanish: en tu justicia
  alternatives_spanish:
  - en tu rectitud
  - por tu justicia
  - en tu righteousness
  lexicon: BDAG
  rationale: Aunque el inglés mantiene «righteousness» como base, en español «justicia» comunica bien la doble carga moral y judicial de δικαιοσύνη en este contexto. Se conserva así la tensión documentada entre justicia y rectitud, sin obligar al lector a un tecnicismo menos idiomático.
theological_decisions:
- issue: δικαιοσύνη aplicada al juicio de Dios
  english_pob_reading: righteousness, with footnoted alternative justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia (con nota alternativa)
  rationale: En español, «justicia» es el término más transparente para este contexto de juicio divino y además preserva la dimensión jurídica de δικαιοσύνη. La alternativa «rectitud» es posible, pero suena menos inmediata en este verso; por eso no se fuerza como principal.
  doctrine_reference: 'DOCTRINE.md: contested terms table (δικαιοσύνη → righteousness; alternative: justice)'
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios requeridos y que el acuerdo con la fuente es alto; por ello se mantiene una solución breve, directa y cercana al griego, con la tensión δικαιοσύνη/justice preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» en vocativo sin máscara litúrgica adicional.
  - «Juicio» conserva el valor forense de κρῖμα.
  - «Justicia» se usa para δικαιοσύνη conforme al contexto, con alternativa «rectitud» en nota para preservar la tensión léxica documentada.
  - El orden y la puntuación siguen el carácter de una invocación poética en una sola cláusula.
