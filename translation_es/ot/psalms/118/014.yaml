revisions:
- from: Yah es mi fuerza y mi cántico[a], y se ha vuelto mi salvación.
  to: Yah, mi fuerza y canto[a], ha llegado a ser mi salvación.
  rationale: Se ajusta la primera cláusula para reflejar mejor la construcción nominal breve del hebreo y el tono poético del versículo. Se cambia «cántico» por «canto» por mayor naturalidad en el giro fijo, y «se ha vuelto» por «ha llegado a ser» para expresar con más precisión el valor resultativo de ויהי. La nota se conserva y se simplifica para claridad.
