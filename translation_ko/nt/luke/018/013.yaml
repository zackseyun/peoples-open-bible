translation:
  language: ko
  text: 그러나 그 세리는 멀찍이 서서 감히 눈을 들어 하늘을 쳐다보지도 못하고, 자기 가슴을 치며 이렇게 말했습니다. 「하나님, 죄인인 저에게 자비를 베풀어 주십시오.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἱλάσθητί
  english_pob_choice: be merciful
  chosen_korean: 자비를 베풀어 주십시오
  alternatives_korean:
  - 속죄해 주십시오
  - 화목케 하여 주십시오
  lexicon: BDAG
  rationale: ἱλάσκομαι는 단순한 자비를 넘어 속죄·화목의 제의적 함의를 띤다. 다만 한국어로 「속죄해 주소서」는 부자연스럽고, 자비의 호소가 본문 의도를 일차적으로 담는다. 함의는 신학적 각주의 대상.
