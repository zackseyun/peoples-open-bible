translation:
  language: es
  text: Alábenlo por[a] sus hechos poderosos; alábenlo conforme a[b] la abundancia de su grandeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «por medio de» o «en sus hechos poderosos»; el hebreo con ב puede expresar la base o esfera de la alabanza. Aquí se entiende naturalmente como el fundamento de la alabanza: «por sus hechos poderosos».'
    reason: lexical_alternative
  - marker: b
    text: O «según la abundancia de» o «en proporción a». El hebreo con כ expresa correspondencia o medida, no solo un motivo general de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  english_pob_choice: Praise him
  chosen_spanish: Alábenlo
  alternatives_spanish:
  - Aláben a él
  - Denle alabanza
  lexicon: HALOT
  rationale: El imperativo plural de הלל con sufijo de objeto de tercera persona masculina singular pide una exhortación directa a la comunidad. «Alábenlo» conserva el mandato plural y el objeto pronominal de forma natural en español.
- source_word: בִּגְבוּרֹתָיו
  english_pob_choice: for his mighty acts
  chosen_spanish: por sus hechos poderosos
  alternatives_spanish:
  - por sus hazañas poderosas
  - por sus obras poderosas
  - en sus hechos poderosos
  lexicon: HALOT
  rationale: גְּבוּרוֹת puede referirse a actos de poder o hazañas concretas. Con ב, el valor causal/basis-of-praise se expresa de manera idiomática en español con «por». «Hechos poderosos» mantiene el plural concreto y la fuerza del término sin volverlo abstracto.
- source_word: כְּרֹב
  english_pob_choice: according to the abundance of
  chosen_spanish: conforme a
  alternatives_spanish:
  - según la abundancia de
  - de acuerdo con
  - en proporción a
  lexicon: HALOT
  rationale: כ + רֹב expresa medida o correspondencia. «Conforme a» preserva la idea de correspondencia/proporción sin recargar el español; la plenitud semántica queda completada por «la abundancia de su grandeza».
- source_word: גֻּדְלוֹ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su magnitud
  - su grandeza abundante
  lexicon: HALOT
  rationale: De גדל, el sentido básico es grandeza o magnitud. «Grandeza» es la opción más directa y fiel; «majestad» sería una interpretación secundaria menos literal.
theological_decisions:
- issue: Doble base/medida de la alabanza
  english_pob_reading: 'The verse presents two complementary bases for praise: God''s mighty acts and the abundance of his greatness.'
  chosen_spanish_reading: 'El versículo presenta dos motivos complementarios para alabar: sus hechos poderosos y la abundancia de su grandeza.'
  alternative_spanish_readings:
  - 'El versículo presenta dos razones para alabar: sus hechos poderosos y su grandeza abundante.'
  - El versículo presenta primero la causa de la alabanza y luego su medida o correspondencia.
  rationale: 'El hebreo usa ב y כ con matices distintos: el primero aporta la base causal de la alabanza, y el segundo una idea de medida o correspondencia. La traducción mantiene esa tensión poética sin fundir ambos cola en una sola idea.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia y sin cambios necesarios en la última pasada; se conserva la distinción semántica de ב y כ observada en el audit trail inglés.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - Se mantiene el tono imperativo plural con «Alábenlo», acorde con el llamado litúrgico del salmo.
  - «Grandeza» conserva el núcleo semántico de גֻּדְלוֹ sin introducir una paráfrasis de «majestad».
