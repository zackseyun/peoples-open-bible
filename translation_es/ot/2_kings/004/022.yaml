translation:
  language: es
  text: 'Entonces ella llamó a su marido y dijo: «Por favor, envíame uno de los muchachos y una de las burras[a], para que corra al hombre de Dios y vuelva».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Burras» traduce un sustantivo hebreo específicamente femenino; algunas versiones lo expresan de forma más genérica como «asno», «burro» o simplemente «un asno».
    reason: lexical_alternative
  - marker: b
    text: O, «para que me apresure al hombre de Dios y vuelva». El verbo hebreo literalmente significa «correr» y expresa urgencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: Then she called
  chosen_spanish: Entonces ella llamó
  alternatives_spanish:
  - Y ella llamó
  - Luego llamó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo pide una progresión temporal natural en español. «Entonces» conserva la secuencia sin volver la frase rígida.
- source_word: אֶל אִישָׁהּ
  english_pob_choice: to her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - al hombre suyo
  lexicon: HALOT
  rationale: En este contexto doméstico, אִישׁ con sufijo posesivo se entiende como «marido». «Marido» es directo y acorde con el uso bíblico en español; «esposo» sería posible, pero algo más formal.
- source_word: שִׁלְחָה נָא לִי
  english_pob_choice: Please send me
  chosen_spanish: Por favor, envíame
  alternatives_spanish:
  - Te ruego que me envíes
  - Envíame, por favor
  lexicon: HALOT
  rationale: El imperativo con נָא expresa una solicitud cortés. «Por favor» comunica bien la petición, y el imperativo en español mantiene la fuerza del hebreo.
- source_word: אֶחָד מִן הַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: uno de los muchachos
  alternatives_spanish:
  - uno de los jóvenes
  - uno de los sirvientes
  lexicon: HALOT
  rationale: נַעַר puede abarcar muchacho/joven/ayudante. «Muchachos» preserva el valor léxico sin imponer «sirviente», que introduciría una precisión social no explícita aquí.
- source_word: וְאַחַת הָאֲתֹנוֹת
  english_pob_choice: and one of the female donkeys
  chosen_spanish: y una de las burras
  alternatives_spanish:
  - y una de las asnas
  - y una burra
  lexicon: HALOT
  rationale: אָתוֹן es explícitamente femenino. «Burra» mantiene la distinción de género, como la traducción inglesa auditada; «asna» también sería válida, pero «burra» es más natural en español actual.
- source_word: וְאָרוּצָה
  english_pob_choice: so that I may run
  chosen_spanish: para que yo pueda correr
  alternatives_spanish:
  - para que yo corra
  - y correré
  lexicon: HALOT
  rationale: El cohortativo expresa intención y propósito. «Para que yo pueda correr» refleja esa finalidad en español sin diluir el verbo específico «correr»; la nota puede dejar abierta la alternativa «apresurarme» si se desea resaltar urgencia.
- source_word: עַד אִישׁ הָאֱלֹהִים
  english_pob_choice: to the man of God
  chosen_spanish: hasta el hombre de Dios
  alternatives_spanish:
  - hasta donde está el hombre de Dios
  - al hombre de Dios
  lexicon: HALOT
  rationale: עַד conserva la idea de extensión hasta un punto/meta. «Hasta el hombre de Dios» reproduce esa dirección/límite y conserva el título fuente «hombre de Dios».
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el título hebreo tradicional literal. No se sustituye por «profeta» para no borrar la expresión fuente ni uniformarla con una categoría interpretativa.
- source_word: וְאָשׁוּבָה
  english_pob_choice: and return
  chosen_spanish: y volver
  alternatives_spanish:
  - y regresar
  - y volveré
  lexicon: HALOT
  rationale: El cohortativo continúa la intención de la hablante. «Volver» es breve y natural en español; «regresar» sería también posible, pero un poco más marcado según región.
theological_decisions:
- issue: Conservación del título hebreo «hombre de Dios»
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el profeta
  - el varón de Dios
  rationale: La POB inglesa retiene la forma literal para preservar la expresión fuente. En español se mantiene igual para no sustituir un título bíblico concreto por una glosa interpretativa.
  doctrine_reference: Profeta como título funcional en el relato; cf. uso bíblico de אישׁ האלהים.
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registran cambios necesarios y el pasaje mantiene alto acuerdo con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «hombre de Dios» de forma consistente como título literal, evitando alternar con «profeta».
  - Se preserva el matiz femenino explícito de הָאֲתֹנוֹת mediante «burras».
  - La combinación de imperativo cortés + propósito se expresa con «Por favor» y «para que yo pueda», respetando el tono del hebreo.
  - «Entonces» traduce la secuencia narrativa sin introducir interpretación adicional.
