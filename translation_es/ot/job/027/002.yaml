translation:
  language: es
  text: Tan cierto como que Dios vive[a], quien ha quitado mi justicia, y el Todopoderoso, quien ha amargado mi alma[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «Vive Dios»; la frase hebrea es una fórmula de juramento. También puede expresarse «Por la vida de Dios».
    reason: alternative_reading
  - marker: b
    text: O «ha amargado mi vida» o «me ha amargado»; נֶפֶשׁ puede significar «alma», «vida» o «yo» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אֵל
  english_pob_choice: As God lives
  chosen_spanish: ¡Vive Dios[a]!
  alternatives_spanish:
  - Por la vida de Dios
  - Vive el Dios vivo
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento idiomático; en español, «¡Vive Dios!» reproduce con naturalidad la fuerza juratoria sin convertirla en mera descripción. Mantiene el valor enfático de la expresión original.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común dentro del juramento; «Dios» conserva el sentido y la solemnidad sin transliteración innecesaria.
- source_word: הֵסִיר
  english_pob_choice: has taken away
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha retirado
  - ha removido
  lexicon: HALOT
  rationale: El hifil de סור expresa quitar o remover. «Ha quitado» es natural en español y conserva la idea de que algo debido fue retirado.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi derecho
  - mi reclamo legal
  - mi juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, derecho o causa legal. «Mi justicia» conserva la amplitud semántica y el tono de protesta de Job; las alternativas estrechan el alcance.
- source_word: וְשַׁדַּי
  english_pob_choice: and the Almighty
  chosen_spanish: y el Todopoderoso
  alternatives_spanish:
  - y Shaddai
  - y el Poderoso
  lexicon: HALOT
  rationale: Se traduce el título divino por su equivalente establecido en español bíblico. «Todopoderoso» preserva el paralelismo con «Dios» y la majestad del hebreo.
- source_word: הֵמַר
  english_pob_choice: has made ... bitter
  chosen_spanish: ha amargado
  alternatives_spanish:
  - ha hecho amarga mi vida
  - me ha amargado
  lexicon: HALOT
  rationale: El hifil de מרר significa hacer amargo o volver amargo. «Ha amargado» conserva la metáfora concreta y permite que el objeto «mi alma» exprese el sufrimiento interior.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí mismo
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. En este contexto poético y emotivo, «mi alma» mantiene el registro y la textura antropológica del hebreo, además de ser inteligible en español bíblico.
theological_decisions:
- issue: Fórmula de juramento con el nombre/título divino
  english_pob_reading: As God lives
  chosen_spanish_reading: ¡Vive Dios!
  alternative_spanish_readings:
  - Por la vida de Dios
  - Vive el Dios vivo
  rationale: La línea no describe a Dios, sino que usa una fórmula de juramento. La traducción española debe conservar esa función performativa; «¡Vive Dios!» es una equivalencia idiomática fuerte y reconocible.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; preserve idioms)'
- issue: Valor de מִשְׁפָּט en el reclamo de Job
  english_pob_reading: my justice
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi derecho
  - mi causa legal
  rationale: El contexto de Job es una protesta por trato injusto y por la privación de una causa legítima. «Mi justicia» conserva la amplitud entre justicia, derecho y reclamo sin reducir el término a un tecnicismo jurídico.
  doctrine_reference: 'DOCTRINE.md: Semantic range preservation'
translation_notes:
  revision_awareness: El audit trail inglés mantiene sin cambios la lectura óptima-equivalente y las notas alternativas para מִשְׁפָּט y נֶפֶשׁ. Esta versión española conserva esas tensiones semánticas sin neutralizarlas, y adapta la fórmula juratoria a una equivalencia idiomática natural en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» y «Todopoderoso» para los títulos divinos, de acuerdo con la política del proyecto de traducir títulos.
  - Se conserva «mi justicia» como término amplio, no reducido a «mi derecho», para reflejar el rango semántico de מִשְׁפָּט.
  - «Mi alma» se usa en sentido poético y antropológico, sin imponer una lectura doctrinal técnica ajena al verso.
  - La puntuación exclamativa refleja el tono de juramento del hebreo.
