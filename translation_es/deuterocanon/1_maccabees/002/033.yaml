translation:
  language: es
  text: 'Y les dijeron: «Hasta ahora[a], salgan y hagan según la palabra del rey[b], y vivirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse simplemente como «Hasta ahora». La expresión griega es terse y puede sonar como una última oportunidad antes de la obediencia forzada.
    reason: lexical_alternative
  - marker: b
    text: «La palabra del rey» puede entenderse también como «el mandato del rey» o «la orden del rey». Se conserva «palabra» para seguir de cerca el griego λόγος.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕως τοῦ νῦν
  english_pob_choice: Until now
  chosen_spanish: Hasta ahora
  alternatives_spanish:
  - Hasta el momento
  - Hasta este momento
  lexicon: LSJ
  rationale: La frase griega es breve y algo abrupta; en español, «Hasta ahora» conserva el límite temporal y el tono de ultimátum sin añadir explicación. Es más natural que una traducción más pesada y mantiene la ambigüedad de una última oportunidad.
- source_word: ἐξέλθοντες
  english_pob_choice: come out
  chosen_spanish: salgan
  alternatives_spanish:
  - salgan fuera
  - salgan de allí
  lexicon: LSJ
  rationale: Aunque el griego es participial, en este contexto funciona como una orden dirigida a personas que deben abandonar un lugar oculto o cerrado. «Salgan» comunica el imperativo de manera idiomática en español sin perder la fuerza directiva.
- source_word: ποιήσατε
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - obren
  - cumplan
  lexicon: LSJ
  rationale: El verbo griego es un imperativo amplio. «Hagan» conserva la amplitud semántica de ποιήσατε y encaja naturalmente con la frase siguiente, «según la palabra del rey».
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  english_pob_choice: according to the word of the king
  chosen_spanish: según la palabra del rey
  alternatives_spanish:
  - según el mandato del rey
  - conforme al decreto del rey
  lexicon: LSJ
  rationale: Se conserva «palabra» para reflejar de cerca λόγος, tal como hizo la POB en inglés. «Mandato» o «decreto» explicitan la idea, pero estrechan o desplazan el matiz del griego. «Según la palabra del rey» mantiene la transparencia lexical y la posible tensión entre palabra y orden.
- source_word: ζήσεσθε
  english_pob_choice: you will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - tendrán vida
  - seguirán con vida
  lexicon: LSJ
  rationale: El futuro de ζάω se traduce de forma directa con «vivirán». En español, esta forma también comunica la oferta implícita de perdón de la vida sin agregar elementos que no están en el texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «Until now» frente a «Up to now» por mayor naturalidad. La versión española adopta un equivalente igualmente natural, «Hasta ahora», manteniendo la concisión y el tono formal del griego.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un referente del nombre divino, sino del rey humano.
  - Se mantiene «palabra» en vez de sustituirla por una versión interpretativa más fuerte, para no borrar la amplitud de λόγος.
  - La estructura directa con comillas y dos cláusulas imperativas reproduce el carácter urgente del original.
