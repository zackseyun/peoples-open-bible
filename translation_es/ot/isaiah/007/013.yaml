- from: 'Y dijo[a]: «Escuchen, por favor, casa de David: ¿Acaso les parece poco[b] cansar a los hombres, que también cansen a mi Dios?»'
  to: 'Y dijo[a]: «Oigan, por favor, casa de David: ¿Acaso les parece poco cansar a los hombres[b], como para que también cansen a mi Dios?»'
  rationale: Se corrige la sintaxis española de la cláusula final para que suene natural y siga expresando la escalada retórica del hebreo. También se alinea la nota [b] con la auditoría inglesa, preservando la explicación léxica sobre «hombres» frente a una alternativa más inclusiva. El resto del versículo puede mantenerse con cambios mínimos.
