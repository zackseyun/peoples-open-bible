translation:
  language: es
  text: Las palabras de la boca de un sabio son favorables[a], pero los labios de un necio lo tragan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Las palabras de la boca de un sabio son gracia», entendiendo חֵן en un sentido más concreto como favor o gracia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - palabras dichas
  lexicon: HALOT
  rationale: El plural constructo de דָּבָר aquí se refiere a expresiones habladas. En español, 'palabras' es natural, formal y mantiene bien el paralelo poético.
- source_word: פִי
  english_pob_choice: of the mouth of
  chosen_spanish: de la boca de
  alternatives_spanish:
  - de la boca del
  - de su boca
  lexicon: HALOT
  rationale: La cadena constructa se conserva de modo idiomático en español con 'de la boca de', manteniendo la imagen concreta sin forzar una estructura extraña.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un sabio
  alternatives_spanish:
  - una persona sabia
  - el sabio
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado masculino singular se refleja con 'un sabio', que preserva género y número y funciona de manera natural en español.
- source_word: חֵן
  english_pob_choice: gracious
  chosen_spanish: gratas
  alternatives_spanish:
  - llenas de gracia
  - favorables
  - agradables
  lexicon: HALOT
  rationale: En este contexto, חֵן no se traduce mecánicamente como 'gracia' si eso oscurece el sentido predicativo. 'Gratas' expresa que las palabras resultan agradables o favorecidas, manteniendo la tensión entre gracia y favor sin reducirla a un término técnico eclesiástico.
- source_word: שִׂפְתוֹת
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - las palabras de
  - la boca de
  lexicon: HALOT
  rationale: Se conserva 'labios' por la simetría poética con 'boca' en el primer hemistiquio y por fidelidad a la imagen corporal del hebreo.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  lexicon: HALOT
  rationale: En literatura sapiencial, כְּסִיל designa al necio moral y espiritualmente torpe. 'Necio' es un equivalente reverente y clásico en español, sin perder la carga evaluativa.
- source_word: תְּבַלְּעֶנּוּ
  english_pob_choice: swallow him up
  chosen_spanish: lo tragan
  alternatives_spanish:
  - lo devoran
  - lo engullen
  - lo consumen
  lexicon: HALOT
  rationale: El verbo בלע conserva la metáfora vívida de 'tragar/engullir'. En español, 'lo tragan' comunica de forma natural que los labios del necio acaban destruyéndolo o absorbiéndolo, manteniendo la fuerza imagística del hebreo.
translation_notes:
  revision_awareness: El texto base inglés revisó 'from the mouth' por 'of the mouth' para acercarse más al hebreo. La versión española sigue esa decisión con 'de la boca de', manteniendo la cadena constructa y la imaginería corporal. También se preserva la metáfora de בלע con un verbo español igualmente vivo, sin convertirla en explicación.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y paralelo.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque no hay Tetragrámaton en este versículo.
  - '''Sabio'' y ''necio'' son consistentes con la terminología sapiencial bíblica en español.'
  - La nota al pie preserva la alternativa léxica de חֵן sin imponer una sola lectura cerrada.
