translation:
  language: es
  text: Mira[a], halla motivos de hostilidad contra mí; me considera su enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «halla hostilidades contra mí», «halla ocasiones contra mí» o posiblemente «halla quejas contra mí». El sustantivo hebreo es raro y depende del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención o énfasis. «Mira» comunica esa función de manera natural en español actual sin perder el impulso retórico del hebreo.
- source_word: תְּנוּאוֹת
  english_pob_choice: grounds for hostility
  chosen_spanish: motivos de hostilidad
  alternatives_spanish:
  - hostilidades
  - ocasiones de oposición
  - motivos de queja
  - pretextos de enemistad
  lexicon: HALOT
  rationale: El sustantivo es raro y su sentido depende del contexto. «Motivos de hostilidad» conserva la idea de razones o causas adversarias, y evita decidir demasiado fuertemente entre varias posibilidades léxicas.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: 'Con el matiz hostil del contexto, la preposición se expresa con claridad en español como adversativa: «contra mí».'
- source_word: יִמְצָא
  english_pob_choice: he finds
  chosen_spanish: halla
  alternatives_spanish:
  - encuentra
  - descubre
  - se fija en
  lexicon: HALOT
  rationale: Se conserva el núcleo léxico de «encontrar/hallar» sin convertirlo en una interpretación más fuerte como «inventar». «Halla» suena natural y mantiene la sobriedad del hebreo.
- source_word: יַחְשְׁבֵנִי
  english_pob_choice: he counts me
  chosen_spanish: me considera
  alternatives_spanish:
  - me cuenta
  - me estima
  - me juzga
  lexicon: HALOT
  rationale: חשב puede significar pensar, contar o considerar. En español, «me considera» transmite bien el valor evaluativo del verbo sin sonar extraño.
- source_word: לְאוֹיֵב לוֹ
  english_pob_choice: as his enemy
  chosen_spanish: su enemigo
  alternatives_spanish:
  - como su enemigo
  - por enemigo
  - como enemigo para él
  lexicon: HALOT
  rationale: La construcción expresa el estatus en que Job es tenido. En español, «su enemigo» es la forma más natural y fiel, especialmente tras «me considera».
theological_decisions:
- issue: Voz de la acusación sobre Dios sin resolverla doctrinalmente
  english_pob_reading: 'Render Elihu''s report of Job''s complaint without endorsing its theology: ''he finds grounds for hostility against me; he counts me as his enemy.'''
  chosen_spanish_reading: 'Reproducir la queja percibida por Job sin convertirla en una afirmación doctrinal del traductor: «halla motivos de hostilidad contra mí; me considera su enemigo».'
  alternative_spanish_readings:
  - halla ocasiones contra mí
  - inventa cargos contra mí
  - busca pretextos contra mí
  rationale: El verso registra la percepción de Job acerca de cómo Dios trata su caso. La traducción debe conservar la fuerza de la acusación sin endurecerla hacia una afirmación sobre Dios que el hebreo no obliga a formular. «Halla» mantiene la tensión entre descubrir y construir motivos, como en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente: no se registran cambios posteriores en el audit trail y el revisor indicó alto acuerdo. La redacción española sigue la lectura cautelosa de מצא y no introduce una interpretación más fuerte que «halla».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo corresponde explícitamente al nombre divino; aquí no aparece.
  - Se evita «SEÑOR» como sustitución automática porque el verso no contiene el tetragrámaton.
  - «Mira» se eligió como equivalente moderno de la partícula de atención, en lugar de «He aquí», por fluidez en español.
  - Se mantiene la tensión léxica de תְּנוּאוֹת con una opción principal y una nota de alternativas, siguiendo el tratamiento del POB en inglés.
