  text: וְ/שִׁלַּחְתִּ֨י לְ/בָבֶ֤ל זָרִים֙ וְ/זֵר֔וּ/הָ וִ/יבֹקְק֖וּ אֶת אַרְצָ֑/הּ כִּֽי הָי֥וּ עָלֶ֛י/הָ מִ/סָּבִ֖יב בְּ/י֥וֹם רָעָֽה׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/002.yaml
  text: And I will send strangers to Babylon[a], and they will winnow her and empty her land[c][b], for they will be against her from every side in the day of disaster.
  footnotes:
  - marker: a
    text: Or “foreigners” for “strangers.” The Hebrew refers to outsiders sent against Babylon.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered “winnow” can also be understood more generally as “scatter,” but the agricultural image is likely intentional.
    reason: lexical_alternative
  - marker: c
    text: “In the day of disaster” means the time when calamity falls on Babylon, not a day characterized by moral evil.
    reason: lexical_alternative
