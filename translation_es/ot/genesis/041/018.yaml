translation:
  language: es
  text: Y he aquí[a], siete vacas subían del Nilo, saludables de cuerpo[b] y hermosas de figura, y pastaban entre los juncos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del río»; en este contexto egipcio, el hebreo יְאֹר se refiere más naturalmente al Nilo.
    reason: lexical_alternative
  - marker: b
    text: O «de carne gruesa» o «bien alimentadas»; el hebreo describe literalmente que eran sanas o llenas de carne.
    reason: lexical_alternative
  - marker: c
    text: O «entre los carrizos», «entre los matorrales de pantano» o «en la hierba del pantano»; el hebreo alude a vegetación húmeda junto al Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, pues
  lexicon: HALOT
  rationale: Conserva el marcador discursivo de irrupción onírica y la fuerza de sorpresa. «Y he aquí» es natural en español bíblico sin perder la inmediatez del hebreo.
- source_word: מִן הַיְאֹר
  english_pob_choice: from the Nile
  chosen_spanish: del Nilo
  alternatives_spanish:
  - del río
  - del gran río
  lexicon: HALOT
  rationale: En el contexto egipcio, יְאֹר apunta específicamente al Nilo. Se mantiene la identificación contextual del POB inglés en lugar de una expresión genérica.
- source_word: עֹלֹת
  english_pob_choice: were coming up
  chosen_spanish: subían
  alternatives_spanish:
  - venían subiendo
  - ascendían
  lexicon: HALOT
  rationale: El participio describe movimiento en curso dentro del sueño. «Subían» comunica el aspecto progresivo con naturalidad en español.
- source_word: שֶׁבַע פָּרוֹת
  english_pob_choice: seven cows
  chosen_spanish: siete vacas
  alternatives_spanish:
  - siete reses
  - siete bovinos
  lexicon: HALOT
  rationale: פָּרוֹת son vacas, no el término más general para ganado. «Vacas» preserva precisión léxica y es idiomático.
- source_word: בְּרִיאוֹת בָּשָׂר
  english_pob_choice: healthy in flesh
  chosen_spanish: sanas de carne
  alternatives_spanish:
  - robustas de cuerpo
  - bien alimentadas
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal del hebreo sin reducirla solo a «gordas» o «bien alimentadas». «Sanas de carne» conserva la tensión entre salud y plenitud física.
- source_word: וִיפֹת תֹּאַר
  english_pob_choice: beautiful in form
  chosen_spanish: hermosas de aspecto
  alternatives_spanish:
  - bellas en forma
  - hermosas en apariencia
  lexicon: HALOT
  rationale: «תֹּאַר» refiere al porte o forma visible. «Hermosas de aspecto» suena natural y reproduce el valor visual de la frase hebrea.
- source_word: וַתִּרְעֶינָה
  english_pob_choice: and they grazed
  chosen_spanish: y pastaban
  alternatives_spanish:
  - y pacían
  - y se alimentaban
  lexicon: HALOT
  rationale: El verbo expresa el acto de pastar de animales. «Pastaban» es el equivalente español más directo y fluido.
- source_word: בָּאָחוּ
  english_pob_choice: in the reeds
  chosen_spanish: entre los juncos
  alternatives_spanish:
  - entre los carrizos
  - en la vegetación de los pantanos
  lexicon: HALOT
  rationale: El término apunta a vegetación húmeda de ribera, no a un simple «prado». «Entre los juncos» conserva el matiz de humedal nilótico; se prioriza la claridad sin borrar el entorno acuático.
translation_notes:
  revision_awareness: 'Se revisó a la luz del texto hebreo masorético y del auditorio de la POB en inglés; no hubo revisiones sustanciales en la última pasada (estado de alta concordancia). La traducción mantiene las decisiones auditadas: Nilo, movimiento progresivo, referencia precisa a vacas, y vegetación de humedal.'
  spanish_consistency_notes:
  - Se mantiene la convención POB de nombrar explícitamente «Yahvé» cuando corresponde; este versículo no contiene el tetragrámaton.
  - «He aquí» se usa como marcador narrativo reverencial y repentino, coherente con el valor de וְהִנֵּה.
  - «Sanas de carne» conserva la imagen corporal sin reemplazarla por una paráfrasis interpretativa excesiva.
  - La preposición y la imagen botánica final se ajustan al contexto nilótico del pasaje.
