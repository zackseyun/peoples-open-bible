translation:
  language: es
  text: una campana de oro y una granada[a], una campana de oro y una granada[b], en todo el ruedo de la túnica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el ruedo de la túnica, todo alrededor». El hebreo combina la preposición עַל («sobre/en») con un adverbio que significa «alrededor, todo alrededor».
    reason: lexical_alternative
  - marker: b
    text: «Granada» probablemente se refiere aquí a un adorno con forma de granada colocado entre las campanas.
    reason: cultural_note
lexical_decisions:
- source_word: פַּעֲמֹן
  english_pob_choice: bell
  chosen_spanish: campana
  alternatives_spanish:
  - cascabel
  - campanilla
  - campana ornamental
  lexicon: HALOT
  rationale: El término designa un pequeño objeto sonoro colgado del vestido sacerdotal. En español, «campana» es la equivalencia más natural y transparente; «campanilla» suena más pequeña o diminutiva y «cascabel» introduce otra imagen sonora.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  - de oro fino
  lexicon: HALOT
  rationale: La construcción hebrea expresa material; en español, «de oro» conserva esa relación de sustancia de manera clara y directa. «Dorada» podría sonar solo adjetival y menos precisa.
- source_word: רִמּוֹן
  english_pob_choice: pomegranate
  chosen_spanish: granada
  alternatives_spanish:
  - ornamento en forma de granada
  - granada ornamental
  lexicon: HALOT
  rationale: Mantengo el término básico del hebreo, como hace la POB inglesa, sin explicitar en el texto principal que puede tratarse de un adorno con forma de granada. Esa precisión queda en la nota.
- source_word: עַל
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «sobre», junto con «ruedo» y סָבִיב el sentido global es de disposición alrededor del borde. «Alrededor de» reproduce bien ese valor combinado en español.
- source_word: שׁוּלֵי
  english_pob_choice: hem
  chosen_spanish: ruedo
  alternatives_spanish:
  - borde
  - orilla
  - dobladillo
  lexicon: HALOT
  rationale: En vestiduras, el término apunta al borde inferior. «Ruedo» es una opción sobria y bíblica en español, equivalente funcional de «hem» sin perder la idea de contorno inferior del vestido.
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - túnica
  - ropa
  lexicon: HALOT
  rationale: Para la vestidura sacerdotal, «manto» comunica bien una prenda exterior amplia. «Robe» en inglés se traduce con naturalidad aquí, y «manto» evita una palabra demasiado general como «ropa».
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - por todos lados
  - en torno
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la idea de circundar completamente. «Todo alrededor» preserva esa fuerza sin sonar forzado en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y conserva la duplicación de «campana ... y una granada» para representar la secuencia repetida. La nota a mantiene la alternativa reconocida por la POB inglesa para עַל + סָבִיב, y la nota b conserva la observación cultural sobre רִמּוֹן sin imponerla al texto principal.
  spanish_consistency_notes:
  - Se usó «de oro» en vez de «dorada» para mantener el valor material del hebreo.
  - Se eligió «manto» para מְעִיל por ser una prenda exterior amplia y fácilmente reconocible en contexto sacerdotal.
  - Se mantuvo «granada» como translación principal del sustantivo hebreo y se aclaró su posible sentido ornamental en la nota.
  - «Todo alrededor» reproduce la intensificación de סָבִיב sin duplicar mecánicamente una segunda vez la misma preposición.
