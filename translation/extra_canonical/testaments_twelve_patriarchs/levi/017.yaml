theological_decisions:
- issue: Bracketed clause in verse 2 with possible secondary or interpolated character
  chosen_reading: 'Translated in the main text within brackets: ''[And in the days of his joy he will rise for the salvation of the world.]'''
  alternative_readings:
  - Omit as secondary gloss
  - Translate without brackets as fully integral text
  rationale: The Greek witness presented includes the clause in brackets, signaling textual uncertainty. In keeping with transparency, the wording is translated but visually marked rather than silently omitted or fully normalized.
  doctrine_reference: Preserve theological tension rather than resolve it; translate what is in the witness honestly and use notes for likely expansions.
- issue: Reference of the priestly succession and calendrical scheme
  chosen_reading: Render the sequence straightforwardly as prophetic priestly periods without harmonizing to a specific historical reconstruction
  alternative_readings:
  - Identify each priest explicitly with known historical high priests
  - Recast the passage as symbolic eras only
  rationale: The Greek text itself gives a schematic succession tied to jubilees and weeks. The translation preserves that structure and leaves historical identification to notes and later commentary rather than embedding it in the wording.
