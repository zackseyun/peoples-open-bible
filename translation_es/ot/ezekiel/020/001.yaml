  text: וַ/יְהִ֣י בַּ/שָּׁנָ֣ה הַ/שְּׁבִיעִ֗ית בַּֽ/חֲמִשִׁי֙ בֶּ/עָשׂ֣וֹר לַ/חֹ֔דֶשׁ בָּ֧אוּ אֲנָשִׁ֛ים מִ/זִּקְנֵ֥י יִשְׂרָאֵ֖ל לִ/דְרֹ֣שׁ אֶת יְהוָ֑ה וַ/יֵּשְׁב֖וּ לְ/פָנָֽ/י׀־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/001.yaml
  text: And it happened in the seventh year[a], in the fifth month, on the tenth day of the month, that some of the elders of Israel came to inquire of Yahweh[b], and they sat before me.
  footnotes:
  - marker: a
    text: Or 'some of the elders of Israel came.' The Hebrew reads more literally, 'men from the elders of Israel,' which may indicate representatives drawn from the elders.
    reason: lexical_alternative
  - marker: b
    text: '''To inquire of the LORD'' can also be rendered ''to seek the LORD'' or ''to consult the LORD''; here the sense is a formal seeking of divine guidance or response.'
    reason: lexical_alternative
