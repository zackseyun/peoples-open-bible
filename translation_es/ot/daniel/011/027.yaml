translation:
  language: es
  text: En cuanto a ambos, los reyes, sus corazones están inclinados al mal, y a la misma mesa dirán mentiras[a], pero no prosperará[b], porque el fin todavía es para el tiempo señalado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablarán falsedad» o «dirán mentiras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero no tendrá éxito». El verbo hebreo está en femenino singular, probablemente de manera impersonal, refiriéndose al plan o al resultado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque el fin aún es para el tiempo señalado». La expresión subraya que el desenlace aguarda un momento fijado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁנֵיהֶם
  english_pob_choice: As for both of them
  chosen_spanish: En cuanto a ambos[a]
  alternatives_spanish:
  - y ambos
  - ambos
  lexicon: HALOT
  rationale: La construcción con conjunción y numeral con sufijo retoma a los dos gobernantes ya mencionados. 'En cuanto a ambos' expresa bien el valor tópico del hebreo sin sonar forzado en español.
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - estos reyes
  - los monarcas
  lexicon: HALOT
  rationale: El sustantivo definido plural señala específicamente a los dos reyes en contexto. 'Los reyes' es directo y fiel; 'monarcas' sería más interpretativo y menos natural aquí.
- source_word: לְבָבָם לְמֵרָע
  english_pob_choice: their hearts are set on evil
  chosen_spanish: su corazón está inclinado al mal
  alternatives_spanish:
  - su corazón está dispuesto para el mal
  - su corazón tiende al mal
  lexicon: HALOT
  rationale: El hebreo dice literalmente que su corazón está 'para mal' o 'hacia hacer mal'. 'Está inclinado al mal' conserva la idea de intención asentada sin endurecer el idioma con un calco.
- source_word: וְעַל שֻׁלְחָן אֶחָד
  english_pob_choice: and at one table
  chosen_spanish: y a una sola mesa
  alternatives_spanish:
  - y en la misma mesa
  - y ante una sola mesa
  lexicon: HALOT
  rationale: La imagen es de convivencia diplomática o de banquete. 'A una sola mesa' mantiene el cuadro de compartir mesa y evita sobreexplicar el trasfondo.
- source_word: כָּזָב יְדַבֵּרוּ
  english_pob_choice: they will speak lies
  chosen_spanish: hablarán mentira
  alternatives_spanish:
  - dirán mentira
  - hablarán mentiras
  lexicon: HALOT
  rationale: כָּזָב denota mentira/falseedad. En español, el singular colectivo 'mentira' puede sonar más natural que el plural, y conserva la fuerza del engaño mutuo sin añadir matiz no presente en el hebreo.
- source_word: וְלֹא תִצְלָח
  english_pob_choice: but it will not succeed
  chosen_spanish: pero no prosperará[b]
  alternatives_spanish:
  - pero no tendrá éxito
  - pero no resultará
  lexicon: HALOT
  rationale: El verbo femenino singular tiene sentido impersonal, probablemente referido al plan o resultado de su engaño. 'No prosperará' mantiene bien el valor de fracaso de la trama y corresponde al margen del POB.
- source_word: כִּי עוֹד קֵץ
  english_pob_choice: for the end is still
  chosen_spanish: porque aún el fin es
  alternatives_spanish:
  - porque todavía el fin es
  - pues aún queda el fin
  lexicon: HALOT
  rationale: La partícula עוֹד conserva la idea de 'todavía/aún'. 'Aún el fin es' sigue de cerca la estructura hebrea y prepara la frase final sin añadir contenido.
- source_word: לַמּוֹעֵד
  english_pob_choice: for the appointed time
  chosen_spanish: para el tiempo señalado[c]
  alternatives_spanish:
  - para el tiempo fijado
  - para el tiempo nombrado
  lexicon: HALOT
  rationale: מוֹעֵד aquí no es una fiesta, sino un tiempo fijado o señalado. 'Tiempo señalado' comunica bien el carácter determinado del plazo y es idiomático en español.
theological_decisions:
- issue: Soberanía divina implícita en el tiempo fijado
  english_pob_reading: Retain the temporal statement without expanding it into explicit theological commentary.
  chosen_spanish_reading: Conservar la afirmación temporal sin explicitar que el plazo depende de Dios.
  alternative_spanish_readings:
  - para el tiempo señalado por Dios
  - para el tiempo que Dios ha fijado
  rationale: El versículo presupone un tiempo determinado, pero no nombra a Dios en esta cláusula. La redacción española preserva esa tensión teológica en vez de resolverla con una explicitación que el hebreo no exige.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se tomó en cuenta la lectura auditada del POB en inglés y su decisión de mantener el valor temporal y la referencia impersonal de תִצְלָח. No se detectaron revisiones posteriores que alteren la traducción base.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque el versículo no lo menciona explícitamente.
  - Se prefirió 'los reyes' y no 'monarcas' para conservar la correspondencia con el hebreo y el registro bíblico natural.
  - Se tradujo לְמֵרָע con una construcción idiomática ('inclinado al mal') sin perder la intención moral negativa.
  - Se usó 'tiempo señalado' para preservar el sentido de plazo fijado de מוֹעֵד sin introducir la idea de fiesta.
