translation:
  language: es
  text: Y les dije a los levitas que debían purificarse[a] y venir a guardar las puertas, para santificar el día de sábado. Recuerda también esto[b], Dios mío, y ten compasión de mí según la grandeza de tu amor fiel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se purificaran». El hebreo expresa una acción reflexiva o medio-ritual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Recuérdame también por esto, Dios mío». El hebreo puede entenderse como una petición benefactiva referida a Nehemías o al hecho recién mencionado.'
    reason: lexical_alternative
  - marker: c
    text: «Amor fiel» traduce el hebreo hesed, que suele referirse al amor leal, misericordioso y de pacto de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: And I told
  chosen_spanish: Y les dije
  alternatives_spanish:
  - Y les hablé
  - Y les ordené
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce la acción de Nehemías. En español, «les dije» comunica con naturalidad la introducción de la instrucción sin exagerarla como mandato formal, aunque el contexto sea administrativo.
- source_word: לַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  - a los levitas
  lexicon: HALOT
  rationale: El destinatario directo es el grupo levítico; en español se mantiene el dativo explícito exigido por la sintaxis de «decir a».
- source_word: אֲשֶׁר יִהְיוּ מִטַּהֲרִים
  english_pob_choice: that they should purify themselves
  chosen_spanish: que debían purificarse
  alternatives_spanish:
  - que debían limpiarse ceremonialmente
  - que estuvieran purificándose
  lexicon: HALOT
  rationale: El hitpael de טהר es reflexivo/medio. «Purificarse» conserva la auto-acción ritual; «debían» refleja el matiz de acción esperada o requerida que la construcción expresa.
- source_word: וּבָאִים
  english_pob_choice: and come
  chosen_spanish: y venir
  alternatives_spanish:
  - y entrar
  - y llegar
  lexicon: HALOT
  rationale: El participio de בוא continúa la serie de acciones de forma simple. «Venir» es lo más amplio y no añade la idea de entrada que el hebreo no exige aquí.
- source_word: שֹׁמְרִים הַשְּׁעָרִים
  english_pob_choice: to guard the gates
  chosen_spanish: a guardar las puertas
  alternatives_spanish:
  - a vigilar las puertas
  - a custodiar las puertas
  lexicon: HALOT
  rationale: שמר aquí expresa la función de custodiar/guardar. «Puertas» respeta el término concreto del texto; «guardar» mantiene la responsabilidad activa mejor que «vigilar».
- source_word: לְקַדֵּשׁ אֶת יוֹם הַשַּׁבָּת
  english_pob_choice: to keep the Sabbath day holy
  chosen_spanish: para santificar el día de reposo
  alternatives_spanish:
  - para consagrar el día de reposo
  - para mantener santo el día de reposo
  lexicon: HALOT
  rationale: קדשׁ significa hacer santo o apartar como santo. «Santificar» reproduce con precisión el valor verbal. «Día de reposo» es una equivalencia clara y bíblica para השבת en español, sin ocultar el referente sabático.
- source_word: גַּם זֹאת
  english_pob_choice: this also
  chosen_spanish: esto también
  alternatives_spanish:
  - también esto
  - esto asimismo
  lexicon: HALOT
  rationale: La adición enfática se conserva con «también». En la oración, «esto» apunta a la acción recién mencionada y prepara la petición de recuerdo.
- source_word: זָכְרָה לִּי
  english_pob_choice: Remember this also in my favor
  chosen_spanish: Recuerda también esto
  alternatives_spanish:
  - Recuérdame también por esto
  - Ten también esto en cuenta para mí
  lexicon: HALOT
  rationale: El hebreo permite el sentido benefactivo tanto hacia Nehemías como hacia el hecho recordado. Se traduce de modo abierto con «Recuerda también esto»; el beneficiario se explicita después en la súplica general, sin fijar de más una sola lectura.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: La vocación directa en segunda persona posesiva se conserva con la fórmula natural y reverente «Dios mío».
- source_word: וְחוּסָה עָלַי
  english_pob_choice: and spare me
  chosen_spanish: y ten compasión de mí
  alternatives_spanish:
  - y perdóname
  - y perdona mi vida
  lexicon: HALOT
  rationale: חוס en plegaria puede significar perdonar la vida, mostrar compasión o tener piedad. «Ten compasión de mí» mantiene la amplitud semántica y encaja con el tono de súplica.
- source_word: כְּרֹב חַסְדֶּךָ
  english_pob_choice: according to the greatness of your steadfast love
  chosen_spanish: según la grandeza de tu amor leal
  alternatives_spanish:
  - según la abundancia de tu amor constante
  - según la grandeza de tu fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד expresa amor de pacto, lealtad y misericordia. «Amor leal» busca conservar la fuerza relacional y la constancia del término sin reducirlo a mero afecto; «grandeza» corresponde a רֹב.
theological_decisions:
- issue: חסד en una petición de misericordia
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - amor de pacto
  - misericordia
  rationale: El contexto es una súplica basada en el carácter fiel y misericordioso de Dios. «Amor leal» intenta reproducir el peso relacional y pactal de חסד sin volverlo una abstracción ni un simple sentimiento.
  doctrine_reference: Translation philosophy §5; fidelidad de pacto y misericordia divina
- issue: זָכְרָה לִּי como petición benefactiva
  english_pob_reading: Remember this also in my favor
  chosen_spanish_reading: Recuerda también esto
  alternative_spanish_readings:
  - Acuérdate también de mí por esto
  - Recuerda también esto en mi favor
  rationale: 'La expresión hebrea admite dos asignaciones del beneficio: a Nehemías o a la acción mencionada. La redacción española mantiene esa tensión abierta en el cuerpo del texto, sin eliminarla con una paráfrasis demasiado explícita.'
  doctrine_reference: Translation philosophy §3; preservar ambigüedad lexical relevante
translation_notes:
  revision_awareness: Se revisó la redacción para mantener la tensión del hebreo en זָכְרָה לִּי y para evitar una calca demasiado rígida en לְקַדֵּשׁ. La formulación final conserva el valor ritual de טהר, el matiz benefactivo de la petición y la fuerza pactal de חסד según el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el verso contiene אֱלֹהִים, por lo que se mantiene «Dios».
  - Se prefirió «día de reposo» como equivalente bíblico claro de הַשַּׁבָּת en este contexto; «sábado» sería posible, pero menos alineado con la terminología bíblica del pasaje.
  - «Amor leal» se emplea como término consistente para חסד cuando el contexto destaca la fidelidad misericordiosa de Dios.
  - Se conserva un español sobrio y publicable, sin añadir explicaciones interpretativas dentro del cuerpo del versículo.
