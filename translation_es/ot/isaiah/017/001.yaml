revisions:
- from: 'Oráculo sobre Damasco: Mira[a], Damasco será removida[b] de ser ciudad, y se convertirá en un montón de ruinas.'
  to: 'Oráculo sobre Damasco: He aquí[a], Damasco dejará de ser ciudad[b], y se convertirá en un montón de ruinas.'
  rationale: 'La revisión conserva el sentido del hebreo y del POB inglés, pero corrige dos puntos de calidad en español: se reemplaza «Mira» por «He aquí» para mantener el tono profético solemne de הִנֵּה, y se sustituye el calco poco natural «será removida de ser ciudad» por «dejará de ser ciudad», que expresa de manera idiomática la pérdida de condición urbana documentada en la auditoría. Se mantienen «Oráculo», «Damasco» y «un montón de ruinas» como buenas decisiones.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:24:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: encabezamiento profético, anuncio enfático, pérdida de condición de ciudad y resultado en ruina. Sin embargo, dos elecciones no preservan bien la naturalidad ni del todo la fuerza del original en español: «Mira» resulta demasiado coloquial para הִנֵּה en este registro, y «será removida de ser ciudad» suena poco idiomático. El hebreo efectivamente expresa que Damasco dejará de ser ciudad; en español conviene explicitarlo en el texto principal, como ya hace la nota inglesa.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita una reparación de estilo y gramática. «Damasco» es un nombre de ciudad tratado normalmente como femenino implícito por concordancia con «ciudad», pero aquí lo más natural es evitar el giro pasivo forzado y decir «dejará de ser ciudad». «He aquí» encaja mejor con el tono solemne y profético que «Mira». «Un montón de ruinas» es correcto y fluido.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Oráculo» para מַשָּׂא está bien justificado. No aparecen términos del glosario mayor como Yahvé, Mesías, espíritu, etc. La revisión propuesta mantiene las decisiones léxicas auditadas y mejora su realización en español.
  issues:
  - severity: medium
    issue: «Mira» para הִנֵּה
    rationale: Aunque semánticamente posible, en un encabezamiento y anuncio profético solemne suena demasiado coloquial. «He aquí» preserva mejor la fuerza de atención del original y coincide con la nota ya prevista.
  - severity: high
    issue: «será removida de ser ciudad» es poco idiomático en español
    rationale: Intenta calcar la construcción hebrea/inglesa, pero produce una frase antinatural. El sentido documentado es que Damasco cesará de ser ciudad; «dejará de ser ciudad» expresa fielmente ese valor en español claro y digno.
  - severity: low
    issue: La nota b puede simplificarse tras ajustar el texto principal
    rationale: Si el texto principal ya dice «dejará de ser ciudad», la nota debe conservar la forma hebrea literal como apoyo, no repetir una glosa innecesariamente torpe.
  revised_spanish_text: 'Oráculo sobre Damasco: He aquí[a], Damasco dejará de ser ciudad[b], y se convertirá en un montón de ruinas.'
  revised_footnotes:
  - marker: a
    text: O «mira»; la partícula hebrea marca una llamada solemne de atención.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «será removida de una ciudad» o «será removida de ser ciudad»; es decir, dejará de existir como ciudad.'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del hebreo y del POB inglés, pero corrige dos puntos de calidad en español: se reemplaza «Mira» por «He aquí» para mantener el tono profético solemne de הִנֵּה, y se sustituye el calco poco natural «será removida de ser ciudad» por «dejará de ser ciudad», que expresa de manera idiomática la pérdida de condición urbana documentada en la auditoría. Se mantienen «Oráculo», «Damasco» y «un montón de ruinas» como buenas decisiones.'
