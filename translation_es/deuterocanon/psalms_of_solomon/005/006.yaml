review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la decisión adjudicada de leer παρὰ σοῦ como procedencia («de ti / de parte de ti») y mantiene bien la imagen de pesaje con «en la balanza». También conserva el singular representativo de ἄνθρωπος y el vocativo final. Sin embargo, la construcción española «el hombre y su porción de parte de ti están en la balanza» suena sintácticamente ambigua y poco natural, como si tanto el hombre como su porción procedieran de Dios de la misma manera. El griego permite entender que la porción proviene de Dios, no necesariamente que «el hombre» mismo sea modificado por la frase preposicional. Además, la nota [a] introduce «vienen de ti», que desplaza la relación y empeora la precisión.
  spanish_quality_summary: El texto es mayormente comprensible, pero «de parte de ti» en esa posición resulta pesado y algo forzado para español bíblico natural. «Su porción que viene de ti» o «su porción, que proviene de ti,» expresa mejor la procedencia sin ambigüedad. También conviene sustituir la nota [a], ya que la actual no preserva una alternativa léxica útil del inglés sino una reestructuración menos fiel. La nota [b] es débil porque «sobrepasar / exceder» es mera variación estilística; no añade una alternativa significativa.
  glossary_alignment: 'Alinea bien con las decisiones del proyecto: «el hombre» para ἄνθρωπος, «porción» para μερίς, «juicio» para κρίμα y «oh Dios» para ὁ θεός. No hay conflictos con terminología teológica mayor. El único ajuste necesario es estilístico-semántico en cómo se plasma παρὰ σοῦ.'
  issues:
  - severity: medium
    issue: Ubicación y formulación de «de parte de ti»
    rationale: Aunque semánticamente apunta a la procedencia correcta de παρὰ σοῦ, en español modifica torpemente toda la frase nominal y produce ambigüedad. Es más fiel y legible vincular la procedencia explícitamente a «su porción».
  - severity: medium
    issue: Nota [a] poco fiel y poco útil
    rationale: «Porque el hombre y su porción vienen de ti y están en la balanza» sugiere que tanto el hombre como su porción «vienen» de Dios, lo cual no es la mejor representación de la sintaxis y del sentido.
  - severity: low
    issue: Nota [b] innecesaria
    rationale: La alternancia «sobrepasar / exceder» no preserva una diferencia exegética sustancial ni resuelve ambigüedad nueva en español.
  revised_spanish_text: Porque el hombre y su porción, que viene de ti, están en la balanza; no añadirá para sobrepasar tu juicio, oh Dios.
  revision_rationale: Se ajusta la redacción para expresar con claridad natural que la porción procede de Dios, conforme al genitivo en παρὰ σοῦ y a la decisión auditada, sin dejar la frase ambigua ni forzada en español. Se eliminan las notas porque no aportan una alternativa exegética útil y, en el caso de [a], introducen una formulación menos fiel.
