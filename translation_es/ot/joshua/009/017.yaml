translation:
  language: es
  text: Entonces los hijos de Israel partieron y llegaron a sus ciudades el tercer día[a]. Ahora bien, sus ciudades eran Gabaón, Chefirá, Beerot y Quiriat-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - salieron de viaje
  lexicon: HALOT
  rationale: נסע en wayyiqtol expresa salida o desplazamiento. «Partieron» conserva el movimiento narrativo con naturalidad en español y sin añadir detalles no presentes, como campamento o itinerario.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La expresión hebrea es un etnónimo convencional y la traducción literal «hijos de Israel» mantiene la transparencia formal. «Israelitas» sería más idiomático, pero borra la forma fuente que la POB inglesa preserva.
- source_word: וַיָּבֹאוּ אֶל עָרֵיהֶם
  english_pob_choice: came to their cities
  chosen_spanish: llegaron a sus ciudades
  alternatives_spanish:
  - vinieron a sus ciudades
  - entraron en sus ciudades
  lexicon: HALOT
  rationale: בוא con אֶל significa llegar/venir a. «Llegaron a sus ciudades» es claro y fiel; evita sobretraducir con «entraron», que sugiere un matiz más específico.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - para el tercer día
  lexicon: HALOT
  rationale: La fórmula temporal narrativa hebrea se expresa naturalmente en español como «al tercer día». Mantiene la referencia temporal directa sin interpretación adicional.
- source_word: וְעָרֵי/הֶם
  english_pob_choice: Now their cities were
  chosen_spanish: Ahora bien, sus ciudades eran
  alternatives_spanish:
  - y sus ciudades eran
  - sus ciudades eran
  lexicon: HALOT
  rationale: La waw aquí introduce una cláusula explicativa/listativa. «Ahora bien» comunica ese giro discursivo en español mejor que una simple «y», sin alterar el sentido.
- source_word: גִּבְעוֹן
  english_pob_choice: Gibeon
  chosen_spanish: Gabaón
  alternatives_spanish:
  - Gibeón
  - Gibeon
  lexicon: HALOT
  rationale: Se usa la forma tradicional española ampliamente reconocible para el topónimo. Es una transliteración histórica estable, no una paráfrasis.
- source_word: הַכְּפִירָה
  english_pob_choice: Chephirah
  chosen_spanish: Chefirá
  alternatives_spanish:
  - Quefirá
  - Cefirá
  lexicon: HALOT
  rationale: El nombre propio se translitera de modo que refleje la forma hebrea y, a la vez, sea legible en español. «Chefirá» sigue de cerca la convención inglesa «Chephirah» sin forzar una adaptación eclesiástica.
- source_word: בְּאֵרוֹת
  english_pob_choice: Beeroth
  chosen_spanish: Beerot
  alternatives_spanish:
  - Béerot
  - Berot
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración transparente. «Beerot» refleja la vocalización y evita añadir una terminación española no presente en el hebreo.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Quiriat Yearim
  - Kiriat-jearim
  lexicon: HALOT
  rationale: La forma compuesta se mantiene con un guion para reflejar su estructura hebrea y la transliteración tradicional más inteligible en español.
translation_notes:
  revision_awareness: La base inglesa revisó la transliteración de la segunda ciudad desde una forma menos estándar a «Chephirah» por consistencia con כְּפִירָה. En español se optó por «Chefirá», manteniendo la transparencia del nombre propio y una forma legible; el resto del versículo se conservó sin cambios de sentido respecto del tramo final de la auditoría inglesa.
  spanish_consistency_notes:
  - Se preservó la fórmula etnónima literal «hijos de Israel» en el texto principal, siguiendo la preferencia de transparencia del registro fuente.
  - Los topónimos se mantuvieron como nombres propios transliterados; se eligieron formas españolas reconocibles sin sustituirlas por equivalentes tradicionales no sustentados por el texto.
  - La partícula discursiva inicial y la waw explicativa se reflejaron con marcadores naturales del español («Así que», «Ahora bien») para no perder la progresión narrativa.
