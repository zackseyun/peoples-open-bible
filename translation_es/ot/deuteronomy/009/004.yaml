revisions:
- from: 'No digas en tu corazón[a], cuando Yahvé tu Dios los expulse de delante de ti, diciendo: “Por causa de mi justicia Yahvé me ha hecho entrar para poseer esta tierra”, sino por la perversidad de estas naciones Yahvé las está desposeyendo delante de ti.'
  to: 'No digas en tu corazón[a], cuando Yahvé tu Dios los expulse de delante de ti, diciendo: «Por causa de mi justicia[b] Yahvé me ha traído para poseer esta tierra», mientras que por la maldad de estas naciones Yahvé los está desposeyendo delante de ti.'
  rationale: Se corrige la lógica contrastiva ('mientras que' en vez de 'sino'), la concordancia pronominal con el referente personal plural ('los'), y la naturalidad de הֱבִיאַנִי ('me ha traído'). También se añade una nota que preserva la alternativa formal documentada en la auditoría inglesa para la cláusula central de mérito propio.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: prohibición interior (''No digas en tu corazón''), circunstancia temporal (''cuando Yahvé...''), la falsa conclusión de mérito propio, y la causa real del juicio sobre las naciones. También mantiene correctamente ''Yahvé'' para יהוה y ''justicia'' para צִדְקָה. Sin embargo, ''sino por la perversidad...'' sobreinterpreta la relación lógica: el hebreo tiene waw + beth causal/contrastiva, no una construcción exclusiva tan fuerte como ''sino''. Además, ''me ha hecho entrar'' es comprensible pero menos natural que una formulación que preserve mejor ''ha traído/me introdujo'' en contexto de entrada en la tierra.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero puede mejorarse en naturalidad y precisión. ''No digas en tu corazón'' y ''de delante de ti'' son aceptables. ''Me ha hecho entrar'' suena algo forzado en español bíblico-natural; ''me ha traído para tomar posesión'' o ''me ha traído a poseer'' fluye mejor. ''Las está desposeyendo'' es léxicamente válido, pero con ''naciones'' el pronombre debe concordar en masculino: ''los está desposeyendo''.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> ''Yahvé'', אֱלֹהֶיךָ -> ''tu Dios'', צִדְקָה -> ''justicia'', הָאָרֶץ -> ''tierra''. También se conserva la conexión léxica ירשׁ / ''poseer'' ~ ''desposeer''. La excepción necesaria es ajustar la sintaxis contrastiva para no exceder el sentido del waw hebreo.'
  issues:
  - severity: high
    issue: Uso de 'sino' donde el hebreo expresa contraste causal, no exclusión estricta
    rationale: וּבְרִשְׁעַת introduce la causa verdadera en contraste con la falsa suposición de Israel, pero 'sino' en español puede sonar como negación-exclusión más fuerte de lo que el hebreo marca. 'Mientras que' o 'pero por la maldad...' preserva mejor la relación.
  - severity: medium
    issue: Pronombre femenino 'las' con antecedente masculino 'estas naciones'
    rationale: 'Aunque ''naciones'' es femenino en español, el objeto directo remite al pronombre hebreo masculino plural ''אותם/ם'' referido a los pueblos/gentiles; además la propia frase española habla de ''estas naciones'' pero el verbo ''desposeer'' con referente personal colectivo suena más natural en masculino genérico: ''los está desposeyendo''. Mantiene también la correspondencia con ''los expulse'' anterior.'
  - severity: medium
    issue: '''Me ha hecho entrar'' es menos natural que una alternativa más idiomática'
    rationale: Representa el hifil con precisión formal, pero en español resulta algo mecánico. 'Me ha traído para poseer esta tierra' conserva el sentido de entrada guiada por Yahvé sin endurecer la sintaxis.
  - severity: low
    issue: La nota al pie no preserva la alternativa documentada en la auditoría inglesa
    rationale: La nota inglesa registra específicamente la alternativa más formal equivalente a 'Por mi justicia... para heredar esta tierra'. En español conviene conservar esa alternativa lexical, no solo 'para ti mismo' para 'en tu corazón'.
  revised_spanish_text: 'No digas en tu corazón[a], cuando Yahvé tu Dios los expulse de delante de ti, diciendo: «Por causa de mi justicia[b] Yahvé me ha traído para poseer esta tierra», mientras que por la maldad de estas naciones Yahvé los está desposeyendo delante de ti.'
  revised_footnotes:
  - marker: a
    text: 'O: «para ti mismo». El hebreo usa un modismo de interioridad; la traducción principal conserva la imagen de «corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Por mi justicia Yahvé me ha traído para heredar esta tierra». El hebreo puede expresarse de manera más formal con «por» y «heredar», pero el texto principal usa un español más claro sin perder el sentido.'
    reason: lexical_alternative
  revision_rationale: Se corrige la lógica contrastiva ('mientras que' en vez de 'sino'), la concordancia pronominal con el referente personal plural ('los'), y la naturalidad de הֱבִיאַנִי ('me ha traído'). También se añade una nota que preserva la alternativa formal documentada en la auditoría inglesa para la cláusula central de mérito propio.
