translation:
  language: es
  text: Y al tercer día después de que yo di a luz[a], esta mujer también dio a luz. Y estábamos juntas; no había ningún forastero con nosotras en la casa; solo nosotras dos estábamos en la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no había ningún ajeno con nosotras en la casa». El hebreo puede referirse a alguien que no pertenecía al grupo o al hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Entonces ...
  - Y sucedió que ...
  lexicon: HALOT
  rationale: El waw consecutivo introduce la secuencia narrativa. En español, "Y" mantiene el avance del relato sin añadir una formulación más interpretativa.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - después de tres días
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera natural como "al tercer día", conservando el valor temporal del hebreo.
- source_word: לְלִדְתִּי
  english_pob_choice: after I gave birth
  chosen_spanish: después de que yo di a luz
  alternatives_spanish:
  - después de dar a luz
  - cuando yo di a luz
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa relación temporal respecto del parto de la hablante. "Después de que yo di a luz" conserva esa relación sin perder claridad en español.
- source_word: וַתֵּלֶד גַּם הָאִשָּׁה הַזֹּאת
  english_pob_choice: this woman also gave birth
  chosen_spanish: también esta mujer dio a luz
  alternatives_spanish:
  - esta mujer también dio a luz
  - la mujer también dio a luz
  lexicon: HALOT
  rationale: '"También" traduce גַּם, y "esta mujer" preserva el señalamiento deictico y la tensión acusatoria del contexto legal. "Dar a luz" es el equivalente natural de לָלֶדֶת aquí.'
- source_word: וַאֲנַחְנוּ יַחְדָּו
  english_pob_choice: And we were together
  chosen_spanish: Y estábamos juntas
  alternatives_spanish:
  - Y estábamos juntas allí
  - Y estábamos juntas las dos
  lexicon: HALOT
  rationale: יַחְדָּו significa "juntas / juntas entre sí". Dado el contexto de dos mujeres, "juntas" comunica bien la escena; el femenino plural es requerido por el referente.
- source_word: אֵין זָר אִתָּנוּ בַּבַּיִת
  english_pob_choice: there was no stranger with us in the house
  chosen_spanish: no había ningún extraño con nosotras en la casa
  alternatives_spanish:
  - no había ningún forastero con nosotras en la casa
  - no había nadie más con nosotras en la casa
  lexicon: HALOT
  rationale: זָר denota alguien ajeno al grupo o al hogar. "Extraño" conserva la fuerza léxica mejor que una paráfrasis más suave como "nadie más".
- source_word: זוּלָתִי שְׁתַּיִם אֲנַחְנוּ
  english_pob_choice: only the two of us
  chosen_spanish: sino solo las dos
  alternatives_spanish:
  - excepto solo nosotras dos
  - salvo solo las dos
  lexicon: HALOT
  rationale: 'זוּלָתִי introduce una exclusión: ninguna persona extra, únicamente las dos mujeres presentes. "Sino solo las dos" reproduce esa restricción de modo natural en español.'
- source_word: בַּבָּיִת
  english_pob_choice: were in the house
  chosen_spanish: estábamos en la casa
  alternatives_spanish:
  - estábamos en la casa allí
  - permanecíamos en la casa
  lexicon: HALOT
  rationale: La repetición de "en la casa" refuerza el escenario y la exclusividad de los presentes. "Casa" es más natural en español que una repetición rígida de la forma preposicional.
theological_decisions:
- issue: Preservación de la referencia a dos mujeres en un contexto legal
  english_pob_reading: the speaker states that only the two women were present; no male witness or outsider was there
  chosen_spanish_reading: dos mujeres estaban solas en la casa, sin tercero presente
  alternative_spanish_readings:
  - solo nosotras dos estábamos en la casa
  - no había nadie más en la casa
  rationale: El versículo funciona como testimonio en un litigio. Conviene mantener explícita la exclusión de terceros sin suavizarla, porque eso sostiene la lógica del caso y el peso del testimonio.
  doctrine_reference: Éxodo 23:1; Deuteronomio 19:15
- issue: Mantenimiento de la tensión léxica en זָר
  english_pob_reading: stranger / outsider
  chosen_spanish_reading: extraño
  alternative_spanish_readings:
  - forastero
  - foráneo
  - ajeno
  rationale: '"Extraño" preserva tanto la idea de persona no perteneciente al hogar como la ambigüedad suficiente para el contexto. No se reemplaza por "nadie más" para no borrar la huella léxica del hebreo.'
  doctrine_reference: HALOT, זָר
- issue: Expresión del parto en español
  english_pob_reading: after I gave birth
  chosen_spanish_reading: después de que yo di a luz
  alternative_spanish_readings:
  - después de parir
  - después de dar a luz
  rationale: '"Dar a luz" es claro y digno en español bíblico contemporáneo. Se evita un calco torpe de la construcción hebrea, pero se conserva el sentido temporal exacto.'
  doctrine_reference: Uso léxico general; cf. vernáculo bíblico español
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se detectaron revisiones sustantivas posteriores; el texto inglés mantiene la lectura óptima-equivalente estable. La versión española conserva la misma estructura narrativa y la alternativa léxica documentada para זָר.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma de proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa "dio a luz" / "dar a luz" para el parto, en concordancia con un español bíblico moderno y comprensible.
  - '"Extraño" se conserva para זָר, alineado con la nota inglesa sobre outsider/stranger.'
  - El femenino plural en "con nosotras" y "estábamos juntas" refleja correctamente el contexto de dos mujeres hablando.
