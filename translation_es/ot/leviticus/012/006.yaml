review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: tiempo de cumplimiento, aplicación tanto para hijo como para hija, obligación de traer dos animales, y presentación a la entrada del santuario al sacerdote. Sin embargo, hay dos desajustes importantes con la auditoría POB: (1) חַטָּאת fue cambiado en el texto principal de la opción auditada «sin offering» a «expiación», que ya no conserva el término sacrificial técnico del original; (2) la nota [a] está anclada a «purificación» pero el texto de la nota no da una alternativa real a esa palabra, sino una explicación confusa. También conviene mejorar el orden final en español para que suene más natural sin perder el sentido locativo/recipiente.'
  spanish_quality_summary: El español es generalmente claro y digno. «Cordero de un año», «holocausto», «tórtola» y «sacerdote» funcionan bien. «Tabernáculo de reunión» es comprensible, aunque «tienda de reunión» reflejaría más literalmente אֹהֶל; no es un error suficiente para rechazo. La frase «para expiación» es menos precisa y menos idiomática que «como ofrenda por el pecado» o similar en un catálogo sacrificial. El orden «a la entrada del tabernáculo de reunión, al sacerdote» puede pulirse para mayor naturalidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. La principal cuestión terminológica es cultual: לְחַטָּאת debe conservarse en el texto principal con un equivalente técnico reconocible, en línea con la decisión POB auditada, y dejar «ofrenda de purificación» como alternativa en nota. «Holocausto», «sacerdote» y «tabernáculo/tienda de reunión» son aceptables; «expiación» no sigue la decisión documentada.'
  issues:
  - severity: high
    issue: «para expiación» no preserva adecuadamente el término sacrificial técnico לְחַטָּאת
    rationale: 'La auditoría inglesa retiene «sin offering» en el texto principal por consistencia léxica y añade una nota con «purification offering». «Expiación» cambia de categoría: expresa efecto o función, no el nombre técnico de la ofrenda, y diluye el vínculo con חַטָּאת.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa léxica útil y queda mal anclada
    rationale: El texto principal ya dice «purificación», pero la nota [a] dice «O “purificación”». Eso no aporta variante. Debe suprimirse o rehacerse como nota explicativa distinta; dado que el inglés no exige nota aquí, lo mejor es eliminarla.
  - severity: low
    issue: El orden final puede mejorarse para fluidez en español
    rationale: «a la entrada del tabernáculo de reunión, al sacerdote» es comprensible, pero «al sacerdote, a la entrada del tabernáculo de reunión» o «al sacerdote en la entrada...» suena más natural y mantiene el doble אֶל del hebreo.
  revised_spanish_text: Y cuando se cumplan los días de su purificación, ya sea por un hijo o por una hija, traerá un cordero de un año para holocausto y un pichón de paloma o una tórtola como ofrenda por el pecado[a], al sacerdote, a la entrada del tabernáculo de reunión.
  revised_footnotes:
  - marker: a
    text: O «como ofrenda de purificación». El término hebreo puede denotar la ofrenda usada para quitar impureza ritual, no solo una ofrenda por transgresión moral.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «para expiación» por «como ofrenda por el pecado» para conservar el valor técnico de חַטָּאת en el texto principal, tal como documenta la auditoría POB, y se preserva la alternativa contextual «ofrenda de purificación» en nota. Se elimina la nota innecesaria sobre «purificación» y se ajusta el orden final para mejor fluidez en español sin perder el sentido del hebreo.
