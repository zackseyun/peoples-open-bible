translation:
  language: es
  text: Por eso, todos esperaban que la aparición fuera para bien[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos pensaban que la aparición era para bien». El griego puede entenderse de manera más estática («era») o más resultativa («fuera / sería»).'
    reason: alternative_reading
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: La conjunción inferencial introduce la conclusión a partir del signo previo. «Por eso» conserva la relación causal de manera natural en español contemporáneo y evita un tono excesivamente escolástico.
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - toda la gente
  lexicon: LSJ
  rationale: El griego se refiere de forma amplia a los presentes o al pueblo en general. «Todos» mantiene esa amplitud sin precisar indebidamente el grupo.
- source_word: ἥξιουν
  english_pob_choice: expected
  chosen_spanish: esperaban
  alternatives_spanish:
  - pensaban
  - suponían
  - consideraban
  lexicon: LSJ
  rationale: El imperfecto de ἀξιόω aquí expresa una expectativa o evaluación sostenida ante el fenómeno. «Esperaban» comunica bien esa expectativa continua en español.
- source_word: ἐπ᾽ ἀγαθῷ
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - como buen presagio
  - para beneficio
  - en favor
  lexicon: LSJ
  rationale: La expresión señala un resultado favorable o significado benéfico. «Para bien» es breve, natural y preserva la apertura semántica sin convertir el texto en una interpretación explícita de presagio.
- source_word: τὴν ἐπιφάνειαν
  english_pob_choice: the appearance
  chosen_spanish: la aparición
  alternatives_spanish:
  - la manifestación
  - el aparecimiento
  lexicon: LSJ
  rationale: Se trata del fenómeno visible mencionado en el contexto. «Aparición» es idiomático en español y evita cargar el término con el sentido técnico posterior de «epifanía».
- source_word: γενέσθαι
  english_pob_choice: would be
  chosen_spanish: fuera
  alternatives_spanish:
  - sería
  - llegara a ser
  - resultara
  lexicon: LSJ
  rationale: Con ἐπ᾽ ἀγαθῷ, el infinitivo expresa el estado o resultado atribuido al fenómeno. «Fuera» reproduce con sencillez la lectura más directa del griego y mantiene el registro formal.
theological_decisions:
- issue: Valor del signo celestial como favorable
  english_pob_reading: the appearance would be for good
  chosen_spanish_reading: la aparición fuera para bien
  alternative_spanish_readings:
  - la aparición sería para bien
  - la aparición resultara favorable
  rationale: No hay aquí una afirmación doctrinal desarrollada, sino la interpretación popular de un fenómeno. La redacción española conserva esa evaluación favorable sin convertirla en un juicio teológico más específico que el del texto.
  doctrine_reference: Interpretación del signo / providencia
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «would turn out for good» por «would be for good» para acercarse más directamente al griego y mantener un registro más formal. La versión española sigue esa orientación con «fuera para bien», que conserva la relación resultativa sin añadir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se evita «Epifanía» como tecnicismo litúrgico; el contexto habla de una aparición visible.
  - «Para bien» conserva la ambigüedad entre interpretación favorable y resultado beneficioso, igual que el pie de nota inglés.
  - Se mantiene un registro sobrio y bíblico, sin recurrir a giros arcaizantes innecesarios.
