review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: el siervo pone la mano bajo el muslo de Abraham y le jura respecto de ese asunto. También preserva correctamente la literalidad de תַּחַת יֶרֶךְ con nota cultural, en línea con la decisión auditada.'
  spanish_quality_summary: El español es claro y legible, pero hay dos ajustes importantes de fidelidad terminológica y naturalidad contextual. Primero, הָעֶבֶד fue decidido en la auditoría inglesa como 'the servant', y en este contexto narrativo 'el siervo' refleja mejor esa elección que 'el esclavo'. Segundo, para אֲדֹנָיו, 'su amo' comunica mejor la relación doméstica de autoridad que 'su señor', que en español bíblico puede sonar más elevado o ambiguo.
  glossary_alignment: El borrador se aparta de la racionalidad documentada en עֶבֶד al intensificarlo a 'esclavo' cuando la auditoría inglesa prefirió 'servant' por contexto. No hay conflicto con términos divinos mayores. La traducción de la fórmula del juramento y de 'asunto' está bien alineada.
  issues:
  - severity: medium
    issue: הָעֶבֶד se tradujo como 'el esclavo' en vez de un equivalente de 'the servant'.
    rationale: Aunque עֶבֶד puede significar 'esclavo', la auditoría inglesa documentó que aquí el énfasis recae en su función dentro de la casa de Abraham, no en la condición servil. 'El siervo' preserva mejor esa decisión contextual y sigue siendo natural en registro bíblico español.
  - severity: medium
    issue: אֲדֹנָיו se tradujo como 'su señor'.
    rationale: En contexto humano-doméstico, 'su amo' transmite con más precisión la autoridad del jefe de casa. 'Señor' en español puede sonar demasiado honorífico o crear resonancias confusas con usos religiosos.
  revised_spanish_text: Y el siervo puso su mano debajo del muslo de Abraham su amo y le juró acerca de este asunto[a].
  revised_footnotes:
  - marker: a
    text: '''Debajo del muslo'' es una traducción literal de la expresión hebrea para un gesto solemne de juramento; algunos la entienden de manera simbólica en relación con los lomos o con la descendencia del pacto.'
    reason: cultural_note
  revision_rationale: Se ajusta עֶבֶד a 'siervo' para seguir la decisión contextual auditada de 'servant' y se cambia 'su señor' por 'su amo' para reflejar mejor אֲדוֹן en un marco humano-doméstico. Se conserva la literalidad de 'debajo del muslo' y la nota cultural ya bien enfocada.
