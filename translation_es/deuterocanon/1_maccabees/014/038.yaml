translation:
  language: es
  text: Y el rey Demetrio lo nombró para el sumo sacerdocio, conforme a esto,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βασιλεὺς Δημήτριος
  english_pob_choice: King Demetrius
  chosen_spanish: el rey Demetrio
  alternatives_spanish:
  - Demetrio el rey
  lexicon: LSJ
  rationale: Conservo el orden natural del español con título antes del nombre, manteniendo el valor real del sujeto sin añadir matices que no están en el griego.
- source_word: ἔστησεν
  english_pob_choice: appointed / confirmed
  chosen_spanish: lo confirmó
  alternatives_spanish:
  - lo nombró
  - lo estableció
  lexicon: LSJ
  rationale: El verbo admite la idea de establecer o colocar a alguien en un cargo. Dado el contexto administrativo-político y la lectura auditada de la POB en inglés, 'confirmó' preserva la ratificación de la investidura sin sugerir que se crea el oficio desde cero.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - para él
  lexicon: LSJ
  rationale: En español, el complemento pronominal resulta más natural unido al verbo ('lo confirmó') que una reproducción rígida del dativo. El referente sigue siendo explícito por el contexto.
- source_word: τὴν ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - la dignidad de sumo sacerdote
  lexicon: LSJ
  rationale: La expresión nombra el cargo o dignidad sacerdotal suprema. 'Sumo sacerdocio' es claro y fiel en español eclesial, y conserva el carácter institucional del término.
- source_word: κατὰ ταῦτα
  english_pob_choice: accordingly
  chosen_spanish: según estas cosas
  alternatives_spanish:
  - conforme a esto
  - en conformidad con estas cosas
  - por consiguiente
  lexicon: LSJ
  rationale: La frase mira hacia lo precedente y puede sonar idiomática en español como 'según estas cosas'. Mantiene la referencia retrospectiva del griego sin eliminar la relación con las condiciones previas.
translation_notes:
  revision_awareness: La POB inglesa pasó de 'confirmed the high priesthood to him accordingly' a 'appointed him to the high priesthood accordingly' para acercarse más a ἔστησεν αὐτῷ τὴν ἀρχιερωσύνην. En español, 'lo confirmó en el sumo sacerdocio' conserva la noción de investidura/ratificación sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'rey' como título explícito y 'Demetrio' como nombre propio sin transliteraciones adicionales.
  - No se introduce 'Cristo', 'Señor' ni otras equivalencias ajenas al pasaje.
  - La construcción final reproduce la relación con lo anterior mediante una fórmula breve y sobria, adecuada a un registro bíblico moderno.
