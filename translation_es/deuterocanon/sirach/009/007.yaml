review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo principal de Sirácides 9:7 y preserva la divergencia griega en nota, en línea con el rastro de auditoría del POB inglés. 'Virgen' refleja bien בִּבְתוּלָה, y la estructura admonitoria con 'no sea que' transmite adecuadamente פֶּן. Sin embargo, 'mires' queda algo débil frente a אַל תִּתְבּוֹנֵן, que sugiere mirar fijamente o con atención sostenida; y 'castigos' no es la opción más natural ni más precisa aquí para עֲנָשֶׁיהָ en el sentido documentado de 'penas/penalidades/consecuencias'.
  spanish_quality_summary: El español es claro y legible, pero admite una mejora menor para sonar más preciso y digno sin volverse pesado. 'No mires' puede entenderse como una simple mirada casual; 'no fijes la mirada' representa mejor la advertencia sapiencial. Asimismo, 'castigos relacionados con ella' suena algo torpe; 'penas relacionadas con ella' o 'penas vinculadas con ella' conserva mejor la compresión semántica del hebreo y su ambigüedad contextual.
  glossary_alignment: No hay conflictos con la terminología nuclear del proyecto. La elección 'virgen' está bien alineada. La revisión propuesta ajusta matiz léxico, no terminología doctrinal. La nota alternativa griega también se mantiene adecuadamente.
  issues:
  - severity: medium
    issue: '''No mires'' debilita el matiz de אַל תִּתְבּוֹנֵן.'
    rationale: El verbo hebreo expresa una mirada atenta o fija, no solo una mirada cualquiera. En español bíblico natural, 'no fijes la mirada' comunica mejor esa intensidad.
  - severity: medium
    issue: '''castigos relacionados con ella'' suena menos natural y menos exacto que ''penas relacionadas con ella''.'
    rationale: עֹנֶשׁ se refiere a pena o penalidad; en este contexto moral-sapiencial, 'penas' preserva mejor la idea de consecuencias punitivas asociadas con involucrarse con ella, sin sugerir torpemente que ella misma es simplemente objeto de castigos.
  - severity: low
    issue: La nota b puede sonar un poco rígida con 'es comprimida'.
    rationale: En español más natural conviene 'es condensada' o 'es compacta', manteniendo la idea de una frase hebrea semánticamente comprimida.
  revised_spanish_text: No fijes la mirada en una virgen[a][b], no sea que quedes atrapado en las penas relacionadas con ella.
  revised_footnotes:
  - marker: a
    text: 'El griego dice: “No mires alrededor en las calles de una ciudad, y no andes errante en sus lugares desiertos”. Los testigos hebreo y griego conservados difieren de manera sustancial aquí.'
    reason: alternative_reading
  - marker: b
    text: 'O: “no sea que quedes atrapado en las penas vinculadas con ella”. La frase hebrea es condensada y puede referirse a las consecuencias asociadas con involucrarse con ella.'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y mejora la fidelidad léxica y la naturalidad del español: ''no fijes la mirada'' refleja mejor el sentido de mirada sostenida del hebreo, y ''penas relacionadas con ella'' comunica con más precisión y fluidez el valor de עֲנָשֶׁיהָ según la rationale inglesa documentada.'
