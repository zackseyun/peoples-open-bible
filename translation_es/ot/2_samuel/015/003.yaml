translation:
  language: es
  text: 'Entonces Absalón le dijo: «Mira, tu caso[a] es bueno y recto, pero no hay nadie de parte del rey para oírte[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus palabras». El hebreo דָּבָר puede significar «palabra», «asunto» o, en un contexto jurídico, «caso/reclamo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no hay oyente para ti de parte del rey», es decir, no hay nadie comisionado por el rey para oír el caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: Then Absalom said to him
  chosen_spanish: Entonces Absalón le dijo
  alternatives_spanish:
  - Y Absalón le dijo
  - Luego Absalón le dijo
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» preserva la secuencia de forma natural en español. El pronombre enclítico «le» refleja אֵלָיו.
- source_word: רְאֵה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: Es un imperativo que llama la atención del oyente. «Mira» conserva el tono directo sin arcaísmo.
- source_word: דְבָרֶךָ
  english_pob_choice: your claims
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu caso
  - tus reclamos
  - tus alegatos
  lexicon: HALOT
  rationale: En este contexto judicial, דָּבָר puede referirse al asunto o causa presentada. «Palabras» es la opción más literal en español, aunque se deja la tensión con el sentido forense que la nota explica.
- source_word: טוֹבִים
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenos
  - válidas
  - correctas
  lexicon: HALOT
  rationale: Concuerda con «palabras» en género femenino plural. Mantiene la valoración positiva del hebreo sin sobreespecificar.
- source_word: וּנְכֹחִים
  english_pob_choice: right
  chosen_spanish: rectas
  alternatives_spanish:
  - justas
  - correctas
  - derechas
  lexicon: HALOT
  rationale: «Rectas» conserva la imagen de lo derecho/upright y sugiere corrección moral o jurídica. En español fluye mejor junto con «buenas».
- source_word: וְשֹׁמֵעַ אֵין לְךָ מֵאֵת הַמֶּלֶךְ
  english_pob_choice: but there is no one from the king to hear you
  chosen_spanish: pero no hay quien te oiga por parte del rey
  alternatives_spanish:
  - pero no tienes quien te escuche de parte del rey
  - pero no hay oyente para ti de parte del rey
  - pero no hay nadie comisionado por el rey para oírte
  lexicon: HALOT
  rationale: El participio שֹׁמֵעַ apunta a alguien que oye una causa; «quien te oiga» conserva el valor funcional de escucha judicial. «Por parte del rey» traduce מֵאֵת הַמֶּלֶךְ como procedencia o comisión, sin forzar que el rey escuche personalmente.
theological_decisions:
- issue: Sentido judicial de דָּבָר y del oyente «de parte del rey»
  english_pob_reading: '"your claims are good and right," but there is no one from the king to hear you'
  chosen_spanish_reading: «tus palabras son buenas y rectas, pero no hay quien te oiga por parte del rey»
  alternative_spanish_readings:
  - «tu caso es bueno y recto, pero no hay quien te oiga por parte del rey»
  - «tus alegatos son buenos y rectos, pero no hay nadie comisionado por el rey para oírte»
  rationale: El contexto legal permite un sentido forense de דָּבָר. La redacción principal conserva la literalidad más inmediata y deja el matiz jurídico para la nota, siguiendo el audit trail inglés que también reconoce la tensión entre 'words' y 'case/claims'.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se mantuvo la solución del texto hebreo y del audit trail inglés: lenguaje narrativo simple, imperativo directo y una clausula final que preserva el matiz judicial de un oyente designado por el rey. No se introdujeron cambios doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se usó «Absalón» con acento gráfico conforme al uso español.
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton ni un sustituto divino.
  - Se prefirió «por parte del rey» para conservar la idea de comisión/origen sin añadir 'delegado' en el cuerpo principal.
  - La nota a aclara la tensión semántica de דָּבָר sin resolverla en exceso en el texto principal.
