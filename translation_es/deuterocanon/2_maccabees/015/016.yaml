translation:
  language: es
  text: Toma la santa espada[a], un regalo de Dios, con la cual harás pedazos a los adversarios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Recibe la santa espada, un regalo de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los enemigos» por «a los adversarios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λάβε
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  lexicon: LSJ
  rationale: El aoristo imperativo de λαμβάνω exige un mandato directo. En español, "toma" conserva la fuerza exhortativa y es más natural que un calco como "recibe", aunque este último sigue siendo posible.
- source_word: τὴν ἁγίαν ῥομφαίαν
  english_pob_choice: the holy sword
  chosen_spanish: la santa espada
  alternatives_spanish:
  - la espada santa
  - la espada sagrada
  lexicon: LSJ
  rationale: ῥομφαία designa una espada grande o filo de combate; "espada" es el equivalente natural en español. Para ἁγίαν, "santa" mantiene el registro religioso con la misma fuerza que "holy" en inglés y suena más idiomático que "sagrada" en esta fórmula.
- source_word: δῶρον
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - un don
  lexicon: LSJ
  rationale: 'El texto griego funciona en aposición: la espada es presentada como un obsequio procedente de Dios. "Un regalo" comunica con claridad esa relación; "don" es posible, pero en español puede sonar más abstracto o litúrgico.'
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: LSJ
  rationale: παρά con genitivo indica origen. "De Dios" es la forma más directa y natural en español; "de parte de Dios" añade una matización no necesaria aquí.
- source_word: δι' ἧς
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - con la cual
  - mediante la cual
  lexicon: LSJ
  rationale: 'El relativo es instrumental: la espada es el medio por el cual se realizará la acción. "Por la cual" expresa bien ese valor en español; "mediante la cual" sería más explícito pero menos ágil.'
- source_word: θραύσεις
  english_pob_choice: you will shatter
  chosen_spanish: quebrarás
  alternatives_spanish:
  - harás pedazos
  - destruirás
  lexicon: LSJ
  rationale: θραύω implica romper con fuerza. "Quebrarás" conserva el valor de ruptura violenta sin exagerar hacia destrucción total; "harás pedazos" es más vívido, pero menos sobrio.
- source_word: τοὺς ὑπεναντίους
  english_pob_choice: the adversaries
  chosen_spanish: a los adversarios
  alternatives_spanish:
  - a los enemigos
  - a los que se oponen
  lexicon: LSJ
  rationale: ὑπεναντίος significa opuesto u hostil. "Adversarios" preserva el tono formal del griego y evita reducirlo a un mero insulto general como "enemigos".
theological_decisions:
- issue: Valor de ἁγίαν aplicado al arma
  english_pob_reading: holy
  chosen_spanish_reading: santa
  alternative_spanish_readings:
  - sagrada
  rationale: El adjetivo indica que la espada está apartada y dada por Dios. "Santa" reproduce de forma transparente ese matiz y mantiene el registro reverente sin introducir una connotación cultual más estrecha que la del griego.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition; readable modern Spanish.'
- issue: Naturaleza de los adversarios
  english_pob_reading: adversaries
  chosen_spanish_reading: adversarios
  alternative_spanish_readings:
  - enemigos
  - oponentes
  rationale: El griego ὑπεναντίους expresa oposición/hostilidad. "Adversarios" mantiene esa tensión formal sin forzar una equivalencia absoluta con "enemigos"; así se conserva la amplitud semántica del original.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tension; avoid flattening source nuance.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que trata δῶρον como aposición: «un regalo de Dios» unido por comas, no como «como un regalo». También conserva el matiz instrumental de δι'' ἧς y la fuerza bélica de θραύσεις sin intensificarla innecesariamente.'
  spanish_consistency_notes:
  - Se mantiene "Dios" conforme al criterio del proyecto para θεός.
  - Se usa "santa" como equivalente más natural de ἁγίαν en este contexto, sin cambiar la referencia teológica.
  - La estructura con comas refleja la aposición señalada en el auditor inglés.
  - '"Adversarios" conserva el registro formal del griego y deja abierta la alternativa contextual de "enemigos".'
