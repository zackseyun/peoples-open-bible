translation:
  language: es
  text: Y alzaron los ojos y vieron, y he aquí, una procesión ruidosa[a] y mucho equipaje; y el novio salió a recibirlos, con sus amigos y sus hermanos, con panderos y músicos[b] y muchas armas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un bullicio», «una algarabía» o «un tumulto» para θροῦς. El término griego puede denotar un ruido o conmoción fuerte; aquí el contexto de boda favorece el sentido de una comitiva festiva.
    reason: lexical_alternative
  - marker: b
    text: O «con panderos e instrumentos musicales» para «con panderos y músicos» (μουσικῶν).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν τοὺς ὀφθαλμοὺς αὐτῶν
  english_pob_choice: they lifted up their eyes
  chosen_spanish: alzaron los ojos
  alternatives_spanish:
  - levantaron los ojos
  - alzaron la vista
  lexicon: LSJ
  rationale: Conserva el giro idiomático griego sin sonar forzado en español; 'alzaron los ojos' refleja la elevación de la mirada y permite coordinar naturalmente con el verbo siguiente.
- source_word: εἶδαν
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron con claridad
  - divisaron
  lexicon: LSJ
  rationale: Se traduce de forma directa para corresponder a la revisión inglesa que prefirió 'saw' sobre 'looked' y para mantener la coordinación natural en español con 'alzaron los ojos y vieron'.
- source_word: θροῦς
  english_pob_choice: a noisy procession
  chosen_spanish: un bullicio
  alternatives_spanish:
  - un tumulto
  - una algarabía
  - un ruido
  lexicon: LSJ
  rationale: En este contexto de boda, el término parece señalar más el ruido y la agitación festiva que una revuelta. 'Bullicio' preserva esa ambigüedad sonora y evita imponer una procesión explícita que el griego no nombra de manera inequívoca.
- source_word: ἀποσκευή πολλή
  english_pob_choice: much baggage
  chosen_spanish: mucho equipaje
  alternatives_spanish:
  - muchos bultos
  - mucha impedimenta
  - mucho bagaje
  lexicon: LSJ
  rationale: '''Equipaje'' es natural en español moderno y comunica el conjunto de objetos transportados. ''Bagaje'' o ''impedimenta'' son posibles, pero menos transparentes para lectura pública.'
- source_word: ὁ νυμφίος
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  lexicon: LSJ
  rationale: En español bíblico contemporáneo, 'novio' es claro y digno; 'esposo' sería posible, pero puede sonar menos específico del contexto nupcial inmediato.
- source_word: ἐξῆλθεν ... εἰς συνάντησιν αὐτῶν
  english_pob_choice: came out to meet them
  chosen_spanish: salió a recibirlos
  alternatives_spanish:
  - salió a encontrarlos
  - salió al encuentro de ellos
  lexicon: LSJ
  rationale: '''Salir a recibirlos'' expresa bien la acción y la finalidad del encuentro en español natural, conservando la idea de movimiento hacia el grupo que llega.'
- source_word: οἱ φίλοι αὐτοῦ καὶ οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his friends and his brothers
  chosen_spanish: sus amigos y sus hermanos
  alternatives_spanish:
  - sus compañeros y sus hermanos
  - sus amigos y sus parientes
  lexicon: LSJ
  rationale: '''Hermanos'' se mantiene de manera literal por fidelidad al texto; ''amigos'' conserva la pareja relacional del griego sin ampliarla indebidamente.'
- source_word: μετὰ τυμπάνων καὶ μουσικῶν
  english_pob_choice: with tambourines and musicians
  chosen_spanish: con panderos y músicos
  alternatives_spanish:
  - con tambores y músicos
  - con panderos y música
  - con tambores y instrumentos musicales
  lexicon: LSJ
  rationale: '''Panderos'' comunica bien τύμπανα en español bíblico actual y no fuerza el sentido a ''drums'' modernos. ''Músicos'' sigue la opción inglesa que tomó μουσικῶν como personas, manteniendo el matiz festivo del pasaje.'
- source_word: ὅπλων πολλῶν
  english_pob_choice: many weapons
  chosen_spanish: muchas armas
  alternatives_spanish:
  - muchas armas de guerra
  - muchos instrumentos de guerra
  lexicon: LSJ
  rationale: '''Armas'' corresponde de modo directo al sustantivo griego y preserva el dato llamativo del pasaje: la escena festiva incluye armamento abundante.'
theological_decisions:
- issue: La escena combina boda y armamento; conviene no suavizar el contraste.
  english_pob_reading: a noisy procession ... and many weapons
  chosen_spanish_reading: un bullicio ... y muchas armas
  alternative_spanish_readings:
  - una procesión ruidosa ... y muchas armas
  - un tumulto ... y muchas armas
  rationale: 'La traducción conserva la tensión del texto: un contexto festivo asociado con armas visibles. No se atenúa el contraste para evitar perder el elemento narrativo que explica la confusión de la escena.'
  doctrine_reference: Narrativa histórica de 1 Macabeos; fidelidad descriptiva al contexto militar y festivo.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'looked' por 'saw' para ajustarse mejor a εἶδαν; el español sigue esa revisión con 'vieron', y mantiene la decisión auditada de leer θροῦς en clave festiva sin ocultar su amplitud semántica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías'' y ''Cristo'' no aparecen aquí; no aplica una decisión terminológica especial.'
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios como 'levantaron sus ojos'.
