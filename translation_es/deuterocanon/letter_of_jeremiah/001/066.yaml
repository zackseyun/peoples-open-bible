translation:
  language: es
  text: No mostrarán señales en los cielos entre las naciones[a], ni brillarán como el sol, ni darán luz como la luna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cielo». El griego οὐρανός puede referirse al cielo o al firmamento; aquí el contexto habla de fenómenos celestes.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖά
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - portentos
  - augurios
  lexicon: LSJ
  rationale: σήμεῖον puede significar señal, signo o portento. En español, «señales» conserva la amplitud semántica sin forzar un matiz ominoso que el contexto no exige expresamente.
- source_word: ἐν ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  - en las naciones
  lexicon: LSJ
  rationale: ἔθνη en la LXX suele referirse a naciones o pueblos. «Entre las naciones» sigue de cerca el valor del griego y evita introducir un lenguaje eclesial posterior.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el firmamento
  - en el cielo/firmamento
  lexicon: LSJ
  rationale: οὐρανός puede significar cielo o firmamento. Dado el paralelo con el sol y la luna, «en los cielos» suena natural en español y mantiene el registro bíblico sin decidir innecesariamente entre cielo y cielo visible.
- source_word: οὐ μὴ δείξωσιν
  english_pob_choice: will certainly not show
  chosen_spanish: No mostrarán
  alternatives_spanish:
  - no mostrarán ciertamente
  - de ningún modo mostrarán
  - jamás mostrarán
  lexicon: LSJ
  rationale: La construcción οὐ μή con subjuntivo expresa negación enfática. En español, la forma simple negativa comunica con naturalidad esa fuerza, y el contexto ya aporta la certeza de la negación.
- source_word: λάμψουσιν
  english_pob_choice: shine
  chosen_spanish: brillarán
  alternatives_spanish:
  - resplandecerán
  - lustarán
  - fulgirán
  lexicon: LSJ
  rationale: El verbo se refiere a emitir brillo. «Brillarán» es el equivalente más natural y mantiene la comparación con el sol.
- source_word: φωτιοῦσιν
  english_pob_choice: give light
  chosen_spanish: darán luz
  alternatives_spanish:
  - iluminarán
  - proporcionarán luz
  - lucirán
  lexicon: LSJ
  rationale: El verbo indica proporcionar luz. «Dar luz» preserva la diferencia con «brillar» y suena idiomático en español.
- source_word: σελήνη
  english_pob_choice: moon
  chosen_spanish: la luna
  alternatives_spanish:
  - luna
  lexicon: LSJ
  rationale: Seλήνη designa la luna como cuerpo celeste; el artículo definido encaja con la comparación poética del pasaje.
theological_decisions:
- issue: Sujeto implícito de los verbos plurales
  english_pob_reading: The verse continues the polemic against idols, stating that they cannot perform heavenly signs or shine like celestial bodies.
  chosen_spanish_reading: El versículo continúa la polémica contra los ídolos, afirmando que no pueden producir señales celestes ni brillar como los astros.
  alternative_spanish_readings:
  - Una afirmación más general sobre falsos dioses sin mencionar explícitamente ídolos.
  - Una referencia a objetos de culto que se sobreentienden por el contexto inmediato.
  rationale: El griego conserva solo verbos plurales y el sujeto depende del contexto. En español se evita añadir un sujeto explícito para no exceder la evidencia textual, pero la formulación mantiene la referencia implícita de la diatriba del contexto.
  doctrine_reference: Preservar la tensión textual; no ampliar el referente más allá del contexto inmediato.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener el orden natural «en los cielos» y la serie negada de tres miembros, sin introducir interpretaciones ajenas al griego.
  spanish_consistency_notes:
  - Se usa «naciones» para ἔθνη, coherente con el valor de LXX y con la terminología del proyecto.
  - Se mantiene la negación enfática con una construcción natural en español, sin sobretraducir la partícula griega.
  - «Brillarán» y «darán luz» distinguen los dos verbos griegos, evitando fusionarlos en un solo matiz.
  - La nota sobre οὐρανός conserva la alternativa semántica cielo/firmamento sin forzar una decisión dogmática.
