translation:
  language: es
  text: 'Y Elías le dijo: «Eliseo, quédate[a] aquí, porque Yahvé me ha enviado a Jericó». Pero él respondió: «Vive Yahvé, y por tu vida, no te dejaré». Así llegaron a Jericó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Quédate» traduce el imperativo hebreo de «sentarse/quedarse/permanecer» según el contexto; aquí la petición es que Eliseo no continúe el trayecto con Elías.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁב נָא
  english_pob_choice: please stay
  chosen_spanish: quédate[a]
  alternatives_spanish:
  - por favor, quédate
  - permanece, por favor
  - quédate, te ruego
  lexicon: HALOT
  rationale: El imperativo de ישׁב aquí funciona como petición de no seguir el viaje; en español, «quédate» comunica de forma natural ese sentido situacional. La partícula נָא añade ruego/cortesía, que queda implícito en el tono de la frase y se explicita en la nota.
- source_word: פֹה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «aquí» es la equivalencia natural y transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envió ya
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte en español con pretérito perfecto compuesto para conservar la relevancia presente de la comisión de Elías.
- source_word: יְרִיחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Vive Yahvé
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: 'La fórmula de juramento se conserva con la vivacidad del hebreo: no se suaviza a una explicación, sino que se mantiene la expresión idiomática en español.'
- source_word: וְחֵי נַפְשְׁךָ
  english_pob_choice: and as you yourself live
  chosen_spanish: y vive tu propia vida
  alternatives_spanish:
  - y como vive tu vida
  - y por tu vida
  lexicon: HALOT
  rationale: נֶפֶשׁ en esta fórmula no requiere «alma» en español; el sentido es la vida de la persona. «Tu propia vida» preserva el paralelismo con la cláusula anterior y evita una lectura demasiado espiritualizada.
- source_word: אִם אֶעֶזְבֶךָּ
  english_pob_choice: I will not leave you
  chosen_spanish: que no te dejaré
  alternatives_spanish:
  - seguro que no te dejaré
  - no voy a dejarte
  lexicon: HALOT
  rationale: Se explicita en español la negación implícita de la construcción juramentaria con אִם. «Dejarte» encaja mejor con el contexto de desplazamiento que «abandonarte» o «desampararte».
- source_word: וַיָּבֹאוּ
  english_pob_choice: So they came
  chosen_spanish: Así llegaron
  alternatives_spanish:
  - Y llegaron
  - Entonces llegaron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Así llegaron» suena natural en español y conserva la secuencia narrativa.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio divino en español como «Yahvé» para no ocultarlo tras una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de juramento «Vive Yahvé»
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: Vive Yahvé
  alternative_spanish_readings:
  - Por la vida de Yahvé
  - Tan cierto como que Yahvé vive
  rationale: La estructura juramentaria hebrea se preserva con una fórmula breve y solemne en español. No se parafrasea a una expresión explicativa para mantener la fuerza retórica del original.
  doctrine_reference: Hebrew oath formula; no separate doctrine citation
- issue: נַפֶשׁ en la fórmula juramentaria
  english_pob_reading: and as you yourself live
  chosen_spanish_reading: y vive tu propia vida
  alternative_spanish_readings:
  - y como vive tu vida
  - y por tu vida
  rationale: En este contexto, נַפֶשׁ designa la vida de la persona, no una dicotomía antropológica que exija «alma». La traducción evita una carga doctrinal ajena al giro hebreo.
  doctrine_reference: Anthropological usage in oath formulas; contextual semantics
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registraron revisiones pendientes en el texto base inglés, y la traducción española mantiene esa lectura sin introducir cambios textuales o doctrinales adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene «Jericó» como nombre propio estándar.
  - Se evita «alma» en וְחֵי נַפְשְׁךָ porque el hebreo aquí es formulaico y antropológico, no metafísico.
  - La negación implícita de אִם se expresa en español con «que no te dejaré» para reflejar el juramento.
  - El tono general conserva solemnidad bíblica sin recurrir a arcaísmos innecesarios.
