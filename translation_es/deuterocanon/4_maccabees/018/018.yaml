lexical_decisions:
- source_word: ᾠδήν
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: LSJ
  rationale: El griego designa un poema o composición cantada; en español, «cántico» conserva el registro bíblico y la idea de canto solemne mejor que «canción», sin añadir una especificación que el término no exige.
- source_word: ἐδίδαξεν
  english_pob_choice: taught
  chosen_spanish: enseñó
  alternatives_spanish:
  - instruyó
  - enseñaba
  lexicon: LSJ
  rationale: «Enseñó» reproduce de manera directa el valor de instrucción del verbo y suena natural en español. «Instruyó» sería posible, pero suena algo más técnico.
- source_word: οὐκ ἐπελάθετο
  english_pob_choice: did not forget
  chosen_spanish: no olvidó
  alternatives_spanish:
  - no se olvidó de
  - no desatendió
  lexicon: LSJ
  rationale: El sentido básico es de memoria y no de simple descuido; «no olvidó» conserva la fuerza directa del verbo y encaja bien con el contexto.
- source_word: τὴν διδάσκουσαν
  english_pob_choice: which teaches
  chosen_spanish: el cual enseña
  alternatives_spanish:
  - que enseña
  - la que enseña
  lexicon: LSJ
  rationale: El participio femenino concuerda con «cántico» y personifica el canto como algo que enseña. «El cual enseña» mantiene esa referencia al canto como sujeto funcional en una formulación española fluida; «la que enseña» es también viable, pero aquí «el cual» evita una reasignación demasiado literal del género en la frase castellana.
- source_word: Ἐγὼ ἀποκτενῶ, καὶ ζῆν ποιήσω
  english_pob_choice: I kill, and I make alive
  chosen_spanish: Yo mato, y yo doy vida
  alternatives_spanish:
  - Yo mataré, y yo haré vivir
  - Yo doy muerte, y doy vida
  lexicon: LSJ
  rationale: El griego citado aquí usa presente/futuro en una declaración divina proverbial; «Yo mato, y yo doy vida» sigue la línea del audit trail inglés revisado y preserva el paralelismo breve. «Dar vida» comunica bien el causativo de ποιήσω en español sin sonar forzado.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Porque, en efecto
  lexicon: LSJ
  rationale: «Pues» conserva la función explicativa/inferencial de γάρ en español de manera natural y sobria.
theological_decisions:
- issue: Cita del cántico de Moisés y la afirmación de soberanía divina sobre la vida y la muerte
  english_pob_reading: which teaches, ‘I kill, and I make alive.’
  chosen_spanish_reading: 'el cual enseña: «Yo mato, y yo doy vida».'
  alternative_spanish_readings:
  - 'que enseña: «Yo mato, y yo doy vida»'
  - 'el cual enseña: «Yo mataré, y yo haré vivir»'
  rationale: La cita remite al Cántico de Moisés en Deuteronomio 32:39. Dado que el griego de este pasaje expresa la declaración con forma presente/futura y la tradición del eco bíblico suele oscilar entre presente y futuro, la versión española sigue el sentido actual/proverbial del texto base y conserva la soberanía divina sin armonizarla artificialmente con una sola forma castellana.
  doctrine_reference: Deuteronomio 32:39; doctrina de la soberanía de Dios sobre la vida y la muerte
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que ajustó la cita para reflejar más de cerca la forma verbal del griego. En español se eligió mantener una formulación proverbial en presente («Yo mato, y yo doy vida») porque comunica mejor el paralelismo y la fuerza del eco de Deuteronomio 32:39, sin perder la nota explicativa sobre la variación verbal.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» para el nombre propio conforme al estándar bíblico en español.
  - Se evitó «SEÑOR» porque aquí no aparece el tetragrámaton en el texto citado, sino una alusión a la declaración divina de Deuteronomio 32:39.
  - Se prefirió «cántico» por su registro bíblico y por mantener el matiz poético del sustantivo griego.
