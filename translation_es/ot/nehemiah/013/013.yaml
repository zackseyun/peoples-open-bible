base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/013/013.yaml
  text: And I appointed over the storerooms Shelemiah the priest[a], Zadok the scribe, and Pedaiah from the Levites, and Hanan son of Zaccur, son of Mattaniah, at their side, because they were considered faithful[c][b]; and it was upon them to distribute to their brothers.
  footnotes:
  - marker: a
    text: Or 'under their direction' for 'at their side'; the Hebrew idiom can indicate close association or subordinate service.
    reason: lexical_alternative
  - marker: b
    text: Or 'regarded as trustworthy' for 'considered faithful.'
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' renders the masculine Hebrew term; here it refers to their fellow members of the community.'
    reason: lexical_alternative
