translation:
  language: es
  text: Y acudirás a los sacerdotes levitas y al juez que esté en funciones en aquellos días[a], e inquirirás, y ellos te declararán la decisión en el caso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «la palabra del juicio». La expresión hebrea se refiere a la decisión judicial autorizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  english_pob_choice: And you shall come
  chosen_spanish: Y llegarás
  alternatives_spanish:
  - Y vendrás
  - Entonces llegarás
  lexicon: HALOT
  rationale: En una instrucción legal, el perfecto con prefijo expresa una acción futura/mandatada. «Llegarás» conserva la dirección hacia la autoridad competente sin sonar demasiado literal o arcaico.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los levíticos sacerdotes
  lexicon: HALOT
  rationale: La expresión identifica a los sacerdotes como pertenecientes a Leví. «Sacerdotes levitas» es natural en español y mantiene la identidad institucional sin sugerir que todos los levitas fueran sacerdotes.
- source_word: הַשֹּׁפֵט
  english_pob_choice: the judge
  chosen_spanish: al juez
  alternatives_spanish:
  - al magistrado
  lexicon: HALOT
  rationale: El sustantivo designa al oficial judicial; «juez» es el equivalente directo y más claro en este contexto legal.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  english_pob_choice: who is in office in those days
  chosen_spanish: que esté en funciones en aquellos días
  alternatives_spanish:
  - que estará en aquellos días
  - que esté allí en aquellos días
  - que esté sirviendo en aquellos días
  lexicon: HALOT
  rationale: La cláusula apunta al funcionario vigente de ese tiempo, no a una persona específica. «En funciones» explicita el sentido institucional con registro natural en español.
- source_word: וְדָרַשְׁתָּ
  english_pob_choice: and you shall inquire
  chosen_spanish: e inquirirás
  alternatives_spanish:
  - y buscarás instrucción
  - y investigarás
  lexicon: HALOT
  rationale: En este marco judicial, el verbo significa buscar una respuesta autorizada o un fallo. «Inquirir» conserva el matiz formal y legal.
- source_word: וְהִגִּידוּ לְךָ
  english_pob_choice: and they shall declare to you
  chosen_spanish: y ellos te declararán
  alternatives_spanish:
  - y ellos te dirán
  - y ellos te informarán
  lexicon: HALOT
  rationale: El hifil de נגד comunica una respuesta oficial y solemne. «Declararán» conserva mejor ese registro que un simple «dirán».
- source_word: דְּבַר הַמִּשְׁפָּט
  english_pob_choice: the decision in the case
  chosen_spanish: la decisión del caso
  alternatives_spanish:
  - el dicho del juicio
  - la sentencia del caso
  - la decisión judicial
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «la palabra/materia del juicio», pero en contexto se refiere a la resolución judicial autorizada. «Decisión del caso» transmite con claridad ese valor forense sin perder la relación con el hebreo.
translation_notes:
  revision_awareness: El texto español sigue el estado revisado más reciente del POB inglés, que prefirió «decision» en lugar de «verdict» para דְּבַר הַמִּשְׁפָּט. La redacción española adopta esa misma decisión semántica con «decisión del caso», manteniendo el tono jurídico y la precisión institucional del contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Sacerdotes levitas» evita la ambigüedad de «levíticos» como simple adjetivo étnico y mantiene la apposición institucional.
  - La nota al pie conserva la alternativa literal del hebreo sin desplazar la traducción principal del contexto judicial.
