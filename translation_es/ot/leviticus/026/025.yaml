translation:
  language: es
  text: Y traeré contra ustedes una espada que ejecuta la venganza del pacto[a], y serán reunidos dentro de sus ciudades. Entonces enviaré pestilencia en medio de ustedes, y serán entregados en manos del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que ejecuta la venganza pactual», «que toma venganza por el pacto» o, con más fluidez, «que venga el pacto». El hebreo dice literalmente «una espada que venga la venganza del pacto», una expresión enfática que vincula la espada con el juicio del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: And I will bring
  chosen_spanish: Y traeré
  alternatives_spanish:
  - Y haré venir
  - Y traeré sobre ustedes
  lexicon: HALOT
  rationale: El causativo hebreo expresa que Yahvé hace venir el juicio; «traeré» conserva esa causalidad con buen español bíblico actual.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - contra ustedes
  - sobre vosotros
  lexicon: HALOT
  rationale: El matiz hostil puede expresarse en español con «sobre ustedes» junto con el contexto de juicio; evita una repetición dura de «contra» y mantiene la imagen de carga/caída sobre ellos.
- source_word: חֶרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  lexicon: HALOT
  rationale: El hebreo es indefinido; «una espada» conserva esa indefinición y el valor de instrumento de guerra y juicio.
- source_word: נֹקֶמֶת נְקַם בְּרִית
  english_pob_choice: executing the vengeance of the covenant
  chosen_spanish: que ejecuta la venganza del pacto[a]
  alternatives_spanish:
  - que toma venganza del pacto
  - que ejecuta la venganza del pacto
  - avengando el pacto
  lexicon: HALOT
  rationale: Se conserva la fuerza intensiva de participio + sustantivo cognado sin suavizarla. «Ejecuta» comunica la acción judicial mejor que un simple «avenga» y mantiene visible la relación del castigo con el pacto.
- source_word: וְנֶאֱסַפְתֶּם
  english_pob_choice: and you will be gathered
  chosen_spanish: y serán reunidos
  alternatives_spanish:
  - y serán juntados
  - y serán congregados
  lexicon: HALOT
  rationale: El nifal es pasivo/reflexivo; «serán reunidos» preserva la forma pasiva y sugiere la presión del asedio sin interpretar demasiado.
- source_word: אֶל עָרֵיכֶם
  english_pob_choice: into your cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - a sus ciudades
  - dentro de sus ciudades
  lexicon: HALOT
  rationale: En español, «en sus ciudades» funciona naturalmente como destino y ubicación resultante del encierro; el contexto de asedio hace innecesario forzar «hacia/into».
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: Then I will send
  chosen_spanish: Entonces enviaré
  alternatives_spanish:
  - Y enviaré
  - Luego enviaré
  lexicon: HALOT
  rationale: «Entonces» expresa con claridad la secuencia judicial de los castigos, como en la revisión inglesa, sin añadir material interpretativo.
- source_word: דֶבֶר
  english_pob_choice: pestilence
  chosen_spanish: pestilencia
  alternatives_spanish:
  - plaga
  - epidemia
  lexicon: HALOT
  rationale: «Pestilencia» conserva el registro bíblico formal y la severidad de la palabra hebrea en el contexto de maldiciones del pacto.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - en su interior
  lexicon: HALOT
  rationale: «En medio de ustedes» reproduce la idea de propagación interna y conserva un tono bíblico natural en español.
- source_word: וְנִתַּתֶּם
  english_pob_choice: and you will be given
  chosen_spanish: y serán entregados
  alternatives_spanish:
  - y serán dados
  - y quedarán entregados
  lexicon: HALOT
  rationale: La pasiva hebrea indica sometimiento a poder enemigo; «serán entregados» comunica esa entrega forzada con claridad.
- source_word: בְּיַד אוֹיֵב
  english_pob_choice: into the hand of the enemy
  chosen_spanish: en mano del enemigo
  alternatives_spanish:
  - en manos del enemigo
  - a manos del enemigo
  - en poder del enemigo
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la «mano» como poder y dominio. «En mano del enemigo» mantiene la imagen bíblica sin excesiva modernización.
theological_decisions:
- issue: La frase «la venganza del pacto» y su fuerza judicial-covenantal
  english_pob_reading: The phrase refers to covenantal judgment executed by God in response to Israel's breach of the covenant.
  chosen_spanish_reading: La frase se entiende como juicio pactual ejecutado por Dios en respuesta a la ruptura del pacto.
  alternative_spanish_readings:
  - venganza en nombre del pacto
  - castigo por el pacto
  rationale: 'Se preserva la tensión teológica: no se diluye la idea de venganza/juicio, pero tampoco se convierte en una fórmula abstracta. El español mantiene el vínculo entre pacto quebrantado y sanción divina.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «executing the vengeance» frente a «avenging the vengeance» por ser más natural y exacto para נֹקֶמֶת נְקַם. En español se reflejó esa decisión con «que ejecuta la venganza», manteniendo la intensidad del hebreo y el enlace con el pacto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito por tratarse de primera persona divina sin necesidad de repetir el nombre.
  - Se conservó el singular «enemigo» en paralelo con el hebreo.
  - La metáfora de «mano» se preservó para mantener el idiomático bíblico y el tono judicial.
  - Se evitó «SEÑOR» o «Cristo» porque no corresponden al texto fuente de este verso.
