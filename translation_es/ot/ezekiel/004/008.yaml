review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Yahvé impone ataduras sobre Ezequiel, impidiéndole cambiar de costado hasta completar los días de su asedio simbólico. Sin embargo, hay pequeños desajustes con el rastro auditado: el texto principal dice «sobre ti», pero la versión presentada usa «he puesto cuerdas sobre ti» solo de forma implícita en decisiones léxicas, mientras el texto real dice «he puesto cuerdas sobre ti»? No: el texto real dice «he puesto cuerdas sobre ti», lo cual sí alinea. El problema principal es «no te volverás», que en español suena ambiguo y puede sugerir cambio de lealtad o regreso, no simplemente girarse corporalmente. También la nota [b] no corresponde exactamente al texto donde está anclada y debería aclarar mejor la literalidad hebrea. Además, «sitio» es posible, pero en español general contemporáneo «asedio» es más claro y evita ambigüedad con ‘lugar’; dado que el propio borrador siente necesidad de justificarlo
    en nota, conviene preferir la forma más transparente.'
  spanish_quality_summary: 'El español es mayormente legible y digno, pero presenta dos puntos mejorables para naturalidad y precisión: «no te volverás» no es la opción más clara para una acción física de girarse acostado; «no te darás vuelta» o «no te volverás de un costado al otro» serían más transparentes. «Tu sitio» es comprensible en registro bíblico, pero menos claro para lectores amplios de América Latina que «tu asedio». «Y he aquí» funciona, aunque es algo calcado; sigue siendo aceptable por solemnidad bíblica.'
  glossary_alignment: 'No hay conflictos con los términos teológicos troncales del proyecto. Las decisiones léxicas son en general consistentes con la POB. La principal cuestión es de claridad léxica: עֲבוֹתִים como «cuerdas» está bien; מְצוּרֶךָ puede verterse mejor como «tu asedio» que «tu sitio» para español neutral amplio, sin alterar la decisión teológica de conservar el posesivo y el referente simbólico.'
  issues:
  - severity: medium
    issue: «no te volverás» suena ambiguo para una acción corporal
    rationale: El hebreo describe cambiar de costado estando acostado. En español neutral, «volverse» puede entenderse como convertirse, regresar o cambiar de actitud. «No te darás vuelta» o «no podrás darte vuelta» comunica mejor el gesto físico.
  - severity: medium
    issue: «tu sitio» es menos claro que «tu asedio» en español contemporáneo amplio
    rationale: Aunque «sitio» tiene pedigree bíblico, para muchos lectores modernos significa principalmente ‘lugar’. «Asedio» expresa con más claridad מָצוֹר/מְצוּר en este contexto sin sobreinterpretar.
  - severity: low
    issue: La nota [b] no refleja con precisión la alternativa preservada en la auditoría inglesa
    rationale: La auditoría inglesa conserva como alternativa literal «from your side to your side». La nota española actual introduce «otro costado», que ya interpreta. Conviene una nota que refleje mejor la literalidad hebrea.
  revised_spanish_text: Y he aquí[a], he puesto cuerdas sobre ti, y no te darás vuelta de tu costado al otro[b] hasta que hayas cumplido los días de tu asedio.
