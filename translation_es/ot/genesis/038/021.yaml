base_translation:
  language: en
  yaml_path: translation/ot/genesis/038/021.yaml
  text: He asked the men of her place[a], saying, “Where is the cult prostitute who was at Enaim by the road?” But they said[b], “There has been no cult prostitute here.”
  footnotes:
  - marker: a
    text: Or, “temple prostitute.” The Hebrew term refers to a prostitute associated with cultic practice; “cult prostitute” is broader and avoids implying a specific temple structure.
    reason: lexical_alternative
  - marker: b
    text: Enaim is a place name; the Hebrew form is related to the word for “eyes” or possibly “springs.”
    reason: cultural_note
