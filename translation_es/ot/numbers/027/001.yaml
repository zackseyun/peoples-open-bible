base_translation:
  language: en
  yaml_path: translation/ot/numbers/027/001.yaml
  text: 'Then the daughters of Zelophehad son of Hepher[a], son of Gilead, son of Machir, son of Manasseh, from the clans of Manasseh son of Joseph, came near. And these were the names of his daughters: Mahlah, Noah, Hoglah, Milcah[b], and Tirzah.'
  footnotes:
  - marker: a
    text: 'Hebrew ''came near''; also possible: ''approached'' or ''drew near.'' The wording may suggest coming forward for a formal petition, which the following verses narrate.'
    reason: lexical_alternative
  - marker: b
    text: '''Noah'' here is the name of one of Zelophehad''s daughters, not the earlier male figure Noah in Genesis.'
    reason: cultural_note
