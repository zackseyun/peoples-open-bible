  text: Por tanto, se reconoce que la razón piadosa es ama de las pasiones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμολογουμένως
  english_pob_choice: it is agreed
  chosen_spanish: se reconoce
  alternatives_spanish:
  - se admite
  - es reconocido
  lexicon: LSJ
  rationale: El adverbio expresa algo concedido o reconocido de manera general. En español, «se reconoce» conserva esa idea de aceptación común sin sonar artificial ni demasiado literal.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: LSJ
  rationale: Marca una conclusión inferencial; «por tanto» reproduce con claridad el nexo lógico del argumento.
- source_word: δεσπότης
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  - maestro
  lexicon: LSJ
  rationale: En este contexto filosófico-moral, el término designa autoridad gobernante sobre las pasiones. «Señor» comunica dominio personal y rector sin reducirlo a propiedad física; se evita «Señor» con mayúscula por no tratarse aquí del título divino.
- source_word: τῶν παθῶν
  english_pob_choice: of the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - sobre las pasiones
  - de los impulsos
  - de los deseos
  lexicon: LSJ
  rationale: La referencia es a las pasiones/impulsos que la razón domina. «Pasiones» es la opción más precisa y transparente en español.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: godly reason
  chosen_spanish: el entendimiento piadoso
  alternatives_spanish:
  - la razón piadosa
  - el razonamiento piadoso
  - la razón devota
  lexicon: LSJ
  rationale: λoγισμός combina razón, reflexión y juicio práctico. «Entendimiento» es una solución natural en español que preserva la facultad racional sin sonar técnica. «Piadoso» mantiene el matiz de reverencia hacia Dios de εὐσεβής, como en el contexto de 4 Macabeos.
theological_decisions:
- issue: εὐσεβής como razón orientada a Dios, no mera racionalidad autónoma
  english_pob_reading: godly reason
  chosen_spanish_reading: entendimiento piadoso
  alternative_spanish_readings:
  - razón piadosa
  - razonamiento devoto
  rationale: El griego no describe una razón autosuficiente, sino una facultad moralmente ordenada por la reverencia a Dios. «Piadoso» comunica esa orientación religiosa sin convertir el texto en sermón ni perder la tensión filosófica.
  doctrine_reference: 4 Macabeos 6:31; traducción transparente que preserva la relación entre razón y piedad.
- issue: δεσπότης sin cargarlo con el título teológico «Señor»
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: El término en este pasaje describe dominio y gobierno sobre las pasiones. En español, «señor» expresa autoridad soberana de forma sobria; la mayúscula se evita para no confundirlo con el nombre/título divino.
  doctrine_reference: LSJ; contexto filosófico de 4 Macabeos
translation_notes:
  revision_awareness: El griego presenta una sentencia breve y proverbial. La versión española sigue la lógica inferencial de οὖν y conserva la tensión conceptual entre λογισμός y πάθη, sin suavizar el dominio de la facultad racional piadosa sobre las pasiones. No se han requerido correcciones textuales ni notas de variante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; aquí no aplica.
  - Se evita «Cristo» porque el pasaje no trata del Mesías ni de un título cristológico.
  - Se conserva un registro bíblico moderno y digno, con vocabulario comprensible para lectura eclesial.
  - Se traduce πάθη por «pasiones» para preservar el lenguaje moral-filosófico del libro.
