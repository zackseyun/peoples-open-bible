    text: Or 'the heights of the Arnon.' The Hebrew phrase may refer either to the high places associated with the Arnon region or, more generally, to its heights.
    reason: lexical_alternative
  - marker: b
    text: Or 'the masters/possessors of the high places of the Arnon.' The expression 'lords of' reflects the Hebrew בַּעֲלֵי more directly.
    reason: alternative_reading
