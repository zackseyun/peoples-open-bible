    rationale: No es imposible, pero para un espíritu en español bíblico natural 'vino con fuerza sobre' o 'irrumpió sobre' refleja mejor el embate repentino y evita una imagen algo extraña.
  - severity: low
    issue: Nota d redundante con el texto principal
    rationale: La nota 'O como día tras día' repite esencialmente la redacción principal y no añade alternativa útil; conviene reemplazarla por una aclaración del sentido habitual si se conserva nota en ese punto.
