  yaml_path: translation/ot/isaiah/024/016.yaml
  text: 'From the edge of the earth we hear songs: “Glory to the righteous one.” But I say[a], “I waste away, I waste away. Woe is me!” The treacherous deal treacherously[c][b]; with treachery the treacherous deal treacherously.'
  footnotes:
  - marker: a
    text: Or “From the wing of the earth” or “From the ends of the earth.”
    reason: lexical_alternative
  - marker: b
    text: Or “Beauty/Honor to the righteous,” taking the phrase collectively rather than as singular “the righteous one.”
    reason: alternative_reading
  - marker: c
    text: Hebrew רָזִי לִי is difficult. Traditionally understood as a cry of wasting away or emaciation; alternatively, some render it “My secret is mine” or “A mystery to me.”
    reason: alternative_reading
