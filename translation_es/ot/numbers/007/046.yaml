lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabro
  - chivo
  - macho de cabra
  lexicon: HALOT
  rationale: El hebreo nombra un macho de la especie caprina en contexto sacrificial. «Macho cabrío» conserva el sexo explícito y suena natural en español bíblico contemporáneo.
- source_word: עִזִּים
  english_pob_choice: goat
  chosen_spanish: cabrío / cabra (implícito en la construcción)
  alternatives_spanish:
  - de cabras
  - de cabríos
  lexicon: HALOT
  rationale: En la cadena constructa, el plural especifica la especie. En español no es necesario reproducir literalmente «de cabras» si la expresión «macho cabrío» ya comunica el sentido con claridad.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: 'El numeral está presente en el hebreo y se conserva para mantener el estilo inventarial de Números 7. Se integra con el sustantivo en español por gramática: «un(a)».'
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para la ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para pecado
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת funciona como término técnico de ofrenda. «Ofrenda por el pecado» preserva esa fuerza cultual en español sin reducirlo simplemente a «pecado».
theological_decisions:
- issue: Valor técnico de חַטָּאת en lista sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - pecado
  - sacrificio por el pecado
  rationale: La lectura cultual es la mejor correspondencia del hebreo en este contexto. «Ofrenda por el pecado» mantiene el sentido sacrificial sin añadir doctrinas ajenas al texto.
  doctrine_reference: Principio de primacía del texto original y preservación del término cultual técnico
