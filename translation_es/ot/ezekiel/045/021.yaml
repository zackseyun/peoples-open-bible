translation:
  language: es
  text: En el primer mes, el día catorce del mes, tendrán la Pascua[a], una fiesta de siete días[b]; se comerá pan sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la Pascua, una fiesta de siete días». En otros pasajes pueden distinguirse la Pascua y la Fiesta de los Panes sin Levadura, pero aquí el texto las presenta juntas.'
    reason: alternative_reading
  - marker: b
    text: 'O: «por siete días». La expresión hebrea es literalmente «semanas de días», un modismo que aquí significa un período de siete días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרִאשׁוֹן
  english_pob_choice: In the first month
  chosen_spanish: En el primer mes
  alternatives_spanish:
  - En el primero
  lexicon: HALOT
  rationale: En el contexto calendárico, la expresión denota el primer mes del año religioso/litúrgico; en español, ‘el primer mes’ comunica con naturalidad el valor temporal que el inglés POB ya explicitó por contexto.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - el catorceavo día del mes
  - en el día catorce del mes
  lexicon: HALOT
  rationale: La fórmula hebrea es una datación estándar. En español, ‘el día catorce del mes’ mantiene precisión y fluidez; se omite ‘en’ por economía estilística, sin perder el valor locativo-temporal.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: you shall have
  chosen_spanish: tendrán
  alternatives_spanish:
  - les corresponderá
  - habrá para ustedes
  lexicon: HALOT
  rationale: La construcción comunica prescripción/observancia para el pueblo. ‘Tendrán’ conserva el tono directivo de la forma verbal sin forzar una perífrasis más interpretativa.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua del Señor
  - la celebración de Pascua
  lexicon: HALOT
  rationale: En español bíblico, ‘Pascua’ es el equivalente natural y reconocido para la festividad; se evita añadir especificaciones no presentes en el hebreo.
- source_word: חָג
  english_pob_choice: a feast
  chosen_spanish: una fiesta
  alternatives_spanish:
  - una festividad
  - un banquete
  lexicon: HALOT
  rationale: ‘חָג’ designa una fiesta/celebración cultual. ‘Fiesta’ es la opción más clara y directa en español, manteniendo el sentido festivo sin cargarlo con ‘banquete’.
- source_word: שְׁבֻעוֹת יָמִים
  english_pob_choice: of seven days
  chosen_spanish: de siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: HALOT
  rationale: El hebreo usa literalmente una expresión idiomática ('semanas de días') que funciona como duración de siete días. ‘De siete días’ conserva la apposición y la relación con ‘una fiesta’.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan ázimo
  - panes ázimos
  - matzot
  lexicon: HALOT
  rationale: ‘Panes sin levadura’ es transparente y fiel en español. Se prefiere sobre ‘pan ázimo’ por claridad para lectores generales, aunque ambas opciones son válidas.
- source_word: יֵאָכֵל
  english_pob_choice: shall be eaten
  chosen_spanish: se comerán
  alternatives_spanish:
  - serán comidos
  - deberán comerse
  lexicon: HALOT
  rationale: El nifal admite pasiva en español, pero ‘se comerán’ suena más natural y bíblicamente idiomático. Mantiene la pasividad sin sonar artificial.
theological_decisions:
- issue: Relación entre la Pascua y la fiesta de siete días
  english_pob_reading: Render the verse so that Passover is identified with or immediately introduces a seven-day feast, without harmonizing away the wording.
  chosen_spanish_reading: ‘Tendrán la Pascua, una fiesta de siete días’ conserva la yuxtaposición del hebreo sin fundir los dos elementos en un solo título ni separarlos artificialmente.
  alternative_spanish_readings:
  - ‘Tendrán la Pascua, la fiesta de los panes sin levadura, de siete días’
  - ‘Tendrán la Pascua por siete días’
  rationale: El hebreo presenta la Pascua y la duración de siete días en aposición. La traducción mantiene esa tensión textual, evitando armonizarla con otras formulaciones bíblicas posteriores o paralelas.
  doctrine_reference: Preservar la tensión textual en vez de resolverla interpretativamente.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo directo y coincide sustancialmente con la auditoría inglesa. No se observan revisiones aplicadas en el historial más reciente; se conserva la presentación conjunta de Pascua y fiesta de siete días, sin armonización externa.
  spanish_consistency_notes:
  - Se emplea ‘Pascua’ para הַפָּסַח, en línea con el uso bíblico español estándar.
  - Se evita ‘SEÑOR’ o equivalentes porque no hay Tetragrámaton en este versículo.
  - ‘Panes sin levadura’ mantiene claridad para lectores amplios y refleja bien מַצּוֹת.
  - La pasiva impersonal ‘se comerán’ conserva el sentido del hebreo sin introducir obligación más fuerte que la del texto.
