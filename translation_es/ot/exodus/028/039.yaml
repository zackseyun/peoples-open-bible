translation:
  language: es
  text: Harás la túnica tejida en labor de cuadros, de lino fino[a]; harás un turbante de lino fino, y harás una faja, obra de bordador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Harás la túnica con un patrón de cuadros, de lino fino». El verbo hebreo probablemente se refiere a producir un tejido con diseño de cuadros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבַּצְתָּ / שִׁבַּצְתָּ
  english_pob_choice: weave ... in checker work
  chosen_spanish: en labor de cuadros
  alternatives_spanish:
  - con patrón de cuadros
  - en trabajo ajedrezado
  - con labor de tejido cuadriculado
  lexicon: HALOT
  rationale: El verbo en este contexto describe un acabado textil con patrón, no solo 'poner' o 'ajustar'. 'En labor de cuadros' transmite en español la idea de tejido o confección con diseño regular, sin perder el carácter artesanal del texto.
- source_word: הַכְּתֹנֶת
  english_pob_choice: the tunic
  chosen_spanish: la túnica
  alternatives_spanish:
  - la ropa interior larga
  - la vestidura
  - la camisa
  lexicon: HALOT
  rationale: כְּתֹנֶת designa una prenda ceñida de tipo túnica. 'Túnica' es el equivalente más natural y claro en español para esta vestidura sacerdotal.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  - lino fino y fino
  lexicon: HALOT
  rationale: En contexto tabernacular y sacerdotal, שֵׁשׁ se refiere a lino de calidad superior. 'Lino fino' conserva tanto el material como su carácter distinguido.
- source_word: מִצְנֶפֶת
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - tocado
  - envoltura para la cabeza
  - headdress
  lexicon: HALOT
  rationale: מִצְנֶפֶת es la cubierta sacerdotal para la cabeza. 'Turbante' es el equivalente más claro y usual en español contemporáneo, manteniendo la referencia a una prenda enrollada alrededor de la cabeza.
- source_word: אַבְנֵט
  english_pob_choice: sash
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  - sash
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'sash', en español 'cinturón' comunica de forma más natural una banda larga para ceñir la vestidura. 'Faja' o 'ceñidor' también son posibles, pero 'cinturón' resulta más transparente para el lector moderno.
- source_word: מַעֲשֵׂה רֹקֵם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de un bordador
  alternatives_spanish:
  - trabajo de bordado
  - obra de bordado
  - labor de un bordador
  lexicon: HALOT
  rationale: La expresión apunta a trabajo ornamental especializado. 'Obra de un bordador' mantiene el constructo y el énfasis en el artesano, de modo paralelo al inglés POB.
theological_decisions:
- issue: Descripción del atuendo sacerdotal sin suavizar el término técnico del texto
  english_pob_reading: The verse gives manufacturing instructions for priestly garments with patterned and embroidered textile work.
  chosen_spanish_reading: El versículo da instrucciones de confección para prendas sacerdotales con tejido de patrón y labor bordada.
  alternative_spanish_readings:
  - El versículo describe ornamentos sacerdotales de forma general.
  - El versículo manda ropa ceremonial sencilla.
  rationale: 'No hay una cuestión doctrinal disputada, pero sí un matiz cultual importante: el texto resalta la calidad, la técnica y la distinción del vestuario sacerdotal. La traducción conserva esos elementos sin banalizarlos.'
  doctrine_reference: Éxodo 28:39; vestiduras sacerdotales en el Pentateuco
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios necesarios, con alto acuerdo entre auditoría y revisión. No se introdujeron modificaciones respecto del sentido de fondo; solo se ajustó la formulación española para mayor naturalidad y fidelidad al valor textil de los términos hebreos.
  spanish_consistency_notes:
  - Se mantuvo 'lino fino' para שֵׁשׁ, coherente con el uso cultual del material.
  - Se tradujo מִצְנֶפֶת como 'turbante' por claridad contemporánea, en paralelo con la decisión inglesa.
  - Se eligió 'obra de un bordador' para reflejar la artesanía especializada de מַעֲשֵׂה רֹקֵם.
  - '''Labor de cuadros'' conserva la tensión textual sobre si el verbo describe tejido patrón o acabado decorado, sin forzar una sola explicación.'
