translation:
  language: es
  text: Me ha parecido bien[a] dar a conocer las señales y prodigios que el Dios Altísimo ha hecho por mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me pareció bien dar a conocer»; la expresión aramea es un modismo formal de aprobación o resolución real.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente «ha hecho conmigo»; el sentido es lo que Dios ha hecho en relación con Nabucodonosor o a favor de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָתַיָּא
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - las señales
  - los signos
  lexicon: HALOT
  rationale: El término arameo plural nombra actos visibles que funcionan como señales de la intervención divina. «Señales» es natural en español bíblico y mantiene el valor de hecho extraordinario con sentido revelador.
- source_word: וְתִמְהַיָּא
  english_pob_choice: and wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y prodigios
  - y maravillas
  lexicon: HALOT
  rationale: El par fijo con «señales» pide un término elevado para actos extraordinarios. «Prodigios» conserva el matiz de maravilla asombrosa y evita trivializar la fórmula.
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula que explica qué señales y prodigios se van a declarar.
- source_word: עֲבַד
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha hecho
  - realizó
  - obró
  lexicon: HALOT
  rationale: El verbo arameo significa «hacer»; «ha hecho» es la equivalencia más directa y natural en el contexto de proclamación. «Obró» sería posible, pero introduce una tonalidad más interpretativa.
- source_word: עִמִּי
  english_pob_choice: for me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo
  - para mí
  lexicon: HALOT
  rationale: El arameo dice literalmente «conmigo». En español, «ha hecho conmigo» conserva la base textual y deja explícita la relación personal. Se evita imponer «para mí» en el texto principal, aunque el sentido benefactivo esté presente.
- source_word: אֱלָהָא עִלָּיָא
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Dios Muy Alto
  lexicon: HALOT
  rationale: La forma aramea es un título de Dios; en español bíblico, «Dios Altísimo» reproduce con naturalidad la superlación del original. El orden con artículo mantiene la solemnidad y claridad.
- source_word: שְׁפַר קֳדָמַי
  english_pob_choice: It has seemed good to me
  chosen_spanish: Me ha parecido bien
  alternatives_spanish:
  - Me ha parecido bien
  - Pareció bien ante mí
  - He juzgado conveniente
  lexicon: HALOT
  rationale: La construcción aramea es una fórmula idiomática de aprobación/decisión. «Me ha parecido bien» conserva el valor idiomático sin calcar de modo rígido «delante de mí». El tiempo compuesto encaja con la proclamación solemne.
- source_word: לְהַחֲוָיָה
  english_pob_choice: to declare
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - dar a conocer
  - declarar
  - hacer saber
  lexicon: HALOT
  rationale: El infinitivo arameo significa «hacer conocer, declarar». «Dar a conocer» comunica bien la intención pública del decreto y suena más natural en español que un calco demasiado jurídico.
theological_decisions:
- issue: Título divino אֱלָהָא עִלָּיָא
  english_pob_reading: the Most High God
  chosen_spanish_reading: el Dios Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - Dios Altísimo
  rationale: Se conserva el título exaltado aplicado al Dios de Israel sin recurrir a una sustitución litúrgica. «Dios Altísimo» mantiene el sentido de soberanía suprema y evita perder la estructura titular del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate names)'
- issue: Sentido de עִמִּי en el resumen de la acción divina
  english_pob_reading: for me / with me
  chosen_spanish_reading: conmigo
  alternative_spanish_readings:
  - para mí
  - conmigo
  rationale: El texto arameo dice literalmente «conmigo», aunque el contexto muestra un valor benefactivo. El español principal conserva la forma de relación directa, mientras la nota permite ver el sentido equivalente a «para mí» sin borrar la tensión semántica.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve meaningful lexical tensions)'
- issue: Fórmula idiomática שְׁפַר קֳדָמַי
  english_pob_reading: It has seemed good to me
  chosen_spanish_reading: Me ha parecido bien
  alternative_spanish_readings:
  - Me ha parecido bien
  - Pareció bien ante mí
  rationale: La frase no expresa solo percepción, sino una decisión aprobatoria de tono regio. El español elegido preserva el valor idiomático y la dignidad proclamativa sin desfigurar el original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Idioms rendered by equivalent force)'
- issue: Par fórmula 'signs and wonders'
  english_pob_reading: the signs and wonders
  chosen_spanish_reading: las señales y prodigios
  alternative_spanish_readings:
  - las señales y prodigios
  - las señales y maravillas
  rationale: Se mantiene la pareja tradicional del texto con un léxico claro en español. «Prodigios» ayuda a conservar el registro elevado y la fuerza de lo extraordinario, sin diluir el carácter de acto portentoso.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; preserve paired terms)'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el tramo final aprobado en inglés: fórmula idiomática de aprobación + anuncio público de señales y prodigios + título divino exaltado + valor relacional de עִמִּי. No se introdujeron cambios doctrinales nuevos; las notas conservan las tensiones léxicas documentadas en la auditoría inglesa.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלָהָא y el título se vierte como «Altísimo» para preservar la elevación del original.
  - Se evita «SEÑOR» porque aquí el arameo no corresponde a un ocultamiento del nombre divino, sino al título explícito «Dios Altísimo».
  - «Señales y prodigios» mantiene el par lexical fijo sin reemplazarlo por una paráfrasis más libre.
  - «Conmigo» conserva la base textual de עִמִּי; la nota explica el sentido benefactivo que en español podría expresarse también con «para mí».
  - El tono general es solemne y apto para registro bíblico público, sin caer en calcos rígidos de estructura inglesa.
