translation:
  language: es
  text: ya sea tres años de hambruna[a], o tres meses de ser arrasado[b] delante de tus enemigos mientras la espada de tus enemigos te alcanza, o tres días de la espada de Yahvé, esto es, pestilencia en la tierra, con el ángel de Yahvé destruyendo en todo el territorio de Israel[c]. Ahora considera qué respuesta debo llevar al que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hambre generalizada' o 'escasez de alimentos'; el hebreo expresa una calamidad de provisión alimentaria a gran escala.
    reason: lexical_alternative
  - marker: b
    text: O 'ser consumido' o 'perecer delante de tus enemigos'; el participio hebreo puede denotar ruina o derrota en combate.
    reason: lexical_alternative
  - marker: c
    text: O 'plaga'; el término hebreo puede referirse a enfermedad epidémica enviada como juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez de alimentos
  lexicon: HALOT
  rationale: En español, 'hambre' puede expresar con naturalidad la calamidad de una carestía general; aquí evita un tecnicismo excesivo y sigue el valor de juicio nacional del hebreo. 'Famine' también sería posible, pero suena menos idiomático en español corriente.
- source_word: נִסְפֶּה
  english_pob_choice: being swept away
  chosen_spanish: ser arrasado
  alternatives_spanish:
  - ser consumido
  - perecer
  - ser destruido
  lexicon: HALOT
  rationale: El participio niphal expresa ser llevado a ruina o perderse por completo; 'ser arrasado' comunica bien la idea de devastación/ruina y mantiene la fuerza militar del contexto sin reducirlo solo a muerte física.
- source_word: מִפְּנֵי צָרֶיךָ
  english_pob_choice: before your foes
  chosen_spanish: delante de tus enemigos
  alternatives_spanish:
  - ante tus adversarios
  - frente a tus enemigos
  lexicon: HALOT
  rationale: La preposición espacial funciona idiomáticamente como derrota o huida en presencia del enemigo. 'Delante de tus enemigos' conserva la imagen; 'ante tus adversarios' sería posible pero más formal y menos natural aquí.
- source_word: חֶרֶב אוֹיְבֶיךָ
  english_pob_choice: the sword of your enemies
  chosen_spanish: la espada de tus enemigos
  alternatives_spanish:
  - la espada de tus adversarios
  lexicon: HALOT
  rationale: Se conserva la imagen bélica del constructo. 'Espada' es el equivalente normal y claro en español, y el posesivo marca la procedencia del peligro sin suavizar el tenor del texto.
- source_word: לְמַשֶּׂגֶת
  english_pob_choice: overtakes you
  chosen_spanish: te alcanza
  alternatives_spanish:
  - te da alcance
  - te persigue y te alcanza
  lexicon: HALOT
  rationale: El sentido es el de alcanzar/overtake en persecución. 'Te alcanza' es idiomático y directo en español, y evita sonar demasiado elaborado.
- source_word: חֶרֶב יְהוָה
  english_pob_choice: the sword of Yahweh
  chosen_spanish: la espada de Yahvé
  alternatives_spanish:
  - la espada de Yahweh
  - la espada del Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el uso editorial del nombre divino en español: ''Yahvé''. Mantener ''espada'' preserva la metáfora judicial y militar del hebreo.'
- source_word: דֶבֶר
  english_pob_choice: pestilence
  chosen_spanish: pestilencia
  alternatives_spanish:
  - plaga
  - epidemia
  lexicon: HALOT
  rationale: '''Pestilencia'' conserva el peso de juicio colectivo y la amplitud semántica de דבר en este contexto. ''Plaga'' sería viable, pero puede sonar más genérico; ''epidemia'' estrecha demasiado el sentido.'
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el valor léxico habitual de la expresión en narrativa bíblica. 'Ángel' es el equivalente más reconocido y no resuelve indebidamente la cuestión teológica sobre su identidad.
- source_word: מַשְׁחִית
  english_pob_choice: destroying
  chosen_spanish: destruyendo
  alternatives_spanish:
  - causando destrucción
  - devastando
  lexicon: HALOT
  rationale: El participio hiphil funciona verbalmente para la acción continua del ángel. 'Destruyendo' reproduce esa acción en curso sin añadir matices no presentes.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: por todo el territorio de Israel
  alternatives_spanish:
  - por todos los límites de Israel
  - en todo el territorio de Israel
  lexicon: HALOT
  rationale: '''Gevul'' puede ser ''frontera'' o ''territorio''; aquí el contexto pide extensión territorial completa. ''Por todo el territorio de Israel'' suena natural y conserva la idea de alcance total.'
- source_word: רְאֵה
  english_pob_choice: consider
  chosen_spanish: mira
  alternatives_spanish:
  - considera
  - ve
  lexicon: HALOT
  rationale: En este diálogo, la exhortación llama a decidir y responder. 'Mira' mantiene el tono directo y breve del hebreo, aunque 'considera' sería una opción más interpretativa.
- source_word: מָה אָשִׁיב ... דָּבָר
  english_pob_choice: what answer I should return
  chosen_spanish: qué respuesta debo llevar
  alternatives_spanish:
  - qué respuesta debo dar
  - qué palabra debo devolver
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa 'devolver una palabra', es decir, dar un informe o respuesta. 'Llevar' conserva bien el movimiento del mensajero; 'respuesta' expresa el valor idiomático en español natural.
- source_word: שֹׁלְחִי
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - a mi enviado
  - al que me mandó
  lexicon: HALOT
  rationale: La forma participial con sufijo de primera persona apunta al remitente de Gad. 'Al que me envió' es claro y fiel; 'mandó' sería posible pero menos formal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrámaton, y la política editorial pide no enmascararlo con 'SEÑOR'. En español se adopta la forma tradicional y church-readable 'Yahvé', consistente con el estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  rationale: Se conserva la expresión sin resolver la discusión sobre si se trata de un mensajero creado o una manifestación especial. El español mantiene la misma tensión teológica y el mismo valor narrativo que el inglés auditado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que sustituyó un guion por 'even' para reflejar mejor la relación apposicional entre 'the sword of Yahweh' y 'pestilence in the land'. En español se refleja con 'es decir', manteniendo esa aposición sin romper el flujo del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la política editorial del proyecto.
  - Se prefirió 'ángel' frente a 'mensajero' por consistencia con el uso bíblico establecido y porque no resuelve indebidamente la identidad del ser.
  - '''Espada'' se repite para conservar el paralelismo entre ''la espada de tus enemigos'' y ''la espada de Yahvé''.'
  - '''Territorio de Israel'' comunica mejor el alcance geográfico total que una traducción rígida de ''frontera''.'
