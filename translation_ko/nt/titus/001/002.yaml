id: TIT.1.2
reference: Titus 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐπ’ ἐλπίδι ζωῆς αἰωνίου, ἣν ἐπηγγείλατο ὁ ἀψευδὴς θεὸς πρὸ χρόνων αἰωνίων
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/002.yaml
  text: in the hope of eternal life[a], which the God who does not lie promised before the ages began
  footnotes:
  - marker: a
    text: Or, 'before time began.' The Greek literally speaks of 'before eternal/age-long times.'
    reason: lexical_alternative
translation:
  language: ko
  text: 영원한 생명의 소망 위에 — 거짓말하지 않으시는 하나님께서 영원한 시대들이 시작되기 전에[a] 약속하신 그 생명입니다 —
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「시간이 시작되기 전에」. 헬라어는 문자적으로 「영원한/오랜 시대들 이전에」라고 말한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in the hope of
  chosen_korean: 소망 위에
  alternatives_korean:
  - 소망 안에서
  - 소망을 따라
  lexicon: BDAG
  rationale: ἐπί + 여격은 근거·터의 의미를 가진다. 사도직이 그 위에 세워진 토대로서의 소망을 드러낸다.
- source_word: ζωῆς αἰωνίου
  english_pob_choice: eternal life
  chosen_korean: 영원한 생명
  alternatives_korean:
  - 영생
  lexicon: BDAG
  rationale: 「영원한 생명」이 헬라어 두 단어의 구조를 그대로 살리며, 「영생」은 한 단어로 축약된 전통 형태로 본문 흐름과 무게가 동일하다. 본문에서는 분석적 형태를 택한다.
- source_word: ὁ ἀψευδὴς θεὸς
  english_pob_choice: the God who does not lie
  chosen_korean: 거짓말하지 않으시는 하나님
  alternatives_korean:
  - 거짓이 없으신 하나님
  lexicon: BDAG
  rationale: 부정 접두 ἀ-가 강조하는 「거짓을 말하지 않으시는」 성품을 능동 동사형으로 자연스럽게 드러낸다.
- source_word: ἐπηγγείλατο
  english_pob_choice: promised
  chosen_korean: 약속하신
  alternatives_korean:
  - 약속해 두신
  lexicon: BDAG
  rationale: 부정과거 중간태로, 약속의 행위 자체를 가리킨다. 관형절로 자연스럽게 옮긴다.
- source_word: πρὸ χρόνων αἰωνίων
  english_pob_choice: before the ages began
  chosen_korean: 영원한 시대들이 시작되기 전에
  alternatives_korean:
  - 영원 전에
  - 만세 전에
  lexicon: BDAG
  rationale: 헬라어가 문자적으로 「영원한 시대들 이전에」라고 말하므로, 「만세 전」보다 분석적 표현을 택해 영어 POB의 「before the ages began」을 따른다. 각주로 「시간이 시작되기 전」을 둔다.
