translation:
  language: es
  text: Para el séptimo día[a], Dios ya había terminado su obra que había hecho, y descansó el séptimo día de toda su obra que había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «El séptimo día Dios terminó su obra». El hebreo suele traducirse así; «Para el séptimo día» expresa el sentido probable en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: had finished
  chosen_spanish: había terminado
  alternatives_spanish:
  - terminó
  - había concluido
  lexicon: HALOT
  rationale: כלה expresa completar o terminar. En español, el pluscuamperfecto 'había terminado' comunica que la obra ya estaba concluida al llegar el séptimo día, en armonía con la cláusula siguiente sobre el descanso. 'Terminó' sería más literal, pero en contexto podría sugerir una acción puntual sin aclarar bien la relación temporal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En Génesis 1–2, אֱלֹהִים lleva verbo singular y designa al único Dios verdadero. 'Dios' es la forma natural y fiel en español; no se requiere una perífrasis adicional.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: By the seventh day
  chosen_spanish: Para el séptimo día
  alternatives_spanish:
  - En el séptimo día
  - Al séptimo día
  lexicon: HALOT
  rationale: Aunque el hebreo admite la traducción literal 'en el séptimo día', el contexto inmediato sugiere la idea de que la obra estaba concluida al comenzar ese día. 'Para el séptimo día' expresa de manera natural ese sentido temporal sin negar la literalidad documentada en nota. La opción más literal queda preservada en la nota a.
- source_word: מְלַאכְתּוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su labor
  lexicon: HALOT
  rationale: מְלָאכָה abarca trabajo, labor u obra. En el relato de la creación, 'obra' suena más natural en español y mantiene el valor amplio del término, sin reducirlo a esfuerzo manual o a 'trabajo' en sentido moderno.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que había realizado
  - que había hecho
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio, 'hacer' o 'hacer/realizar'. 'Que había hecho' sigue de cerca el hebreo y conserva la amplitud del verbo sin restringirlo a fabricación material.
- source_word: וַיִּשְׁבֹּת
  english_pob_choice: he rested
  chosen_spanish: descansó
  alternatives_spanish:
  - cesó
  - reposó
  lexicon: HALOT
  rationale: שׁבת significa cesar, detenerse. En este contexto, el cese de la actividad creativa se expresa bien con 'descansó', que es claro y reverente en español, aunque implica más que simple recuperación física. 'Cesó' sería más técnico, pero menos idiomático.
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de toda
  alternatives_spanish:
  - de todo
  - de toda la
  lexicon: HALOT
  rationale: מן + כל indica separación respecto de la totalidad. 'De toda su obra' comunica la totalidad de la cual cesó, y fluye mejor en español que una repetición más pesada de 'de todo'.
- source_word: מְלַאכְתּוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su labor
  lexicon: HALOT
  rationale: La repetición mantiene el paralelismo del hebreo. Se conserva el mismo equivalente ('obra') para no borrar la repetición semántica del texto.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que había realizado
  - que había hecho
  lexicon: HALOT
  rationale: La cláusula relativa final se traduce de manera consistente con la primera aparición para respetar la estructura hebrea y su paralelismo.
theological_decisions:
- issue: Si el texto sugiere que Dios trabajó durante el séptimo día
  english_pob_reading: The main English text reads 'By the seventh day God had finished his work,' indicating completion by that day rather than ongoing work into it.
  chosen_spanish_reading: '''Para el séptimo día, Dios había terminado su obra'' indica que la obra ya estaba completa al llegar ese día, no que continuó trabajando durante él.'
  alternative_spanish_readings:
  - '''En el séptimo día Dios terminó su obra'' como traducción más literal'
  rationale: El hebreo literal puede sonar como si la terminación ocurriera dentro del séptimo día, pero el contexto inmediato también afirma que Dios descansó ese mismo día. El pluscuamperfecto y la expresión temporal elegida preservan el sentido contextual sin sobreinterpretar ni armonizar de forma indebida.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Naturaleza del 'descanso' divino
  english_pob_reading: he rested
  chosen_spanish_reading: descansó
  alternative_spanish_readings:
  - cesó
  - reposó
  rationale: El verbo hebreo subraya cesación de la actividad creadora. 'Descansó' comunica esa cesación de modo comprensible en español, sin implicar cansancio físico. La alternativa 'cesó' quedaría más cerca del matiz léxico, pero menos natural.
  doctrine_reference: HALOT; Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'El texto español sigue el mismo ajuste de sentido que el POB inglés: la obra está completa al llegar el séptimo día, y el descanso se entiende como cesación de la obra creadora. No se detectan revisiones posteriores que alteren la decisión principal.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהִים en singular, conforme al contexto de Génesis 1–2.
  - Se conservó 'obra' para מְלָאכָה en ambas apariciones para reflejar el paralelismo hebreo.
  - Se usó el pluscuamperfecto ('había terminado') para reflejar la relación temporal indicada por el contexto y la auditoría inglesa.
  - El marcador [a] aparece en el texto principal y en la nota correspondiente, conforme al sistema de notas del proyecto.
