translation:
  language: es
  text: Así, los sacerdotes, los levitas, algunos del pueblo, los cantores, los porteros y los servidores del templo[a] vivieron en sus ciudades, y todo Israel vivió en sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “los netinim”, término técnico para una clase asignada al servicio del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: En este contexto narrativo, ישׁב expresa tomar residencia. 'Habitaron' conserva el sentido de residencia asentada y suena más bíblico y natural en español que un calco como 'vivieron'.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כהנים designa el cuerpo cultual del templo; 'sacerdotes' es el equivalente directo y más claro en español bíblico.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: Es el término establecido para el grupo tribal/cultual de Leví. 'Levitas' preserva la distinción tradicional sin perder claridad.
- source_word: וּמִן הָעָם
  english_pob_choice: some of the people
  chosen_spanish: algunos del pueblo
  alternatives_spanish:
  - y algunos del pueblo
  - y de entre el pueblo
  lexicon: HALOT
  rationale: El מן es partitivo; 'algunos del pueblo' refleja mejor la idea de un subconjunto de la población laica que un simple 'del pueblo'.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores y músicos
  - los cantores
  lexicon: HALOT
  rationale: El participio nominal señala a los encargados del canto en el culto. 'Cantores' comunica bien esa función y evita ampliar indebidamente a 'músicos'.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de las puertas
  - los guardias de la puerta
  lexicon: HALOT
  rationale: En español bíblico, 'porteros' es un equivalente clásico y comprensible para quienes custodiaban o atendían las puertas; 'guardianes de las puertas' sería más explícito pero más pesado.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netinim
  - los sirvientes del templo
  lexicon: HALOT
  rationale: נתינים es un término técnico para una clase asignada al servicio del templo. 'Servidores del templo' comunica la función; se conserva la terminología técnica en nota para lectores que la conozcan.
- source_word: בְּעָרֵי/הֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus pueblos
  - en sus urbes
  lexicon: HALOT
  rationale: '''Ciudades'' mantiene el valor bíblico habitual de עיר en contextos geográficos y enlaza las dos cláusulas paralelas.'
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todo el Israel
  - y la totalidad de Israel
  lexicon: HALOT
  rationale: La fórmula colectiva se conserva de manera idiomática y breve. 'Todo Israel' mantiene el eco bíblico y la amplitud representativa del pueblo.
theological_decisions:
- issue: Término técnico הַנְּתִינִים
  english_pob_reading: the temple servants
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netinim
  - los dados
  rationale: La decisión prioriza la función cultual para el lector moderno, sin borrar el carácter técnico del término. Dado que no hay carga doctrinal fuerte aquí, se preserva el dato histórico mediante nota opcional sobre el nombre tradicional.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: el verbo de residencia se expresa de forma natural; el partitivo de מן se hace explícito con ''algunos''; y el término técnico נְתִינִים se vierte por función en el texto principal, conservando la denominación tradicional en nota.'
  spanish_consistency_notes:
  - Se mantiene 'levitas' para לוים y 'sacerdotes' para כהנים, sin mezclar con terminología eclesiástica posterior.
  - '''Cantores'' y ''porteros'' siguen un registro bíblico claro y consistente con el paralelismo del verso.'
  - '''Ciudades'' se repite en ambas cláusulas para reflejar la estructura hebrea y evitar una variación innecesaria.'
