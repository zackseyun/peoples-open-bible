translation:
  language: es
  text: Baal-hanán murió[a], y Hadad reinó en su lugar. El nombre de su ciudad era Pai, y el nombre de su esposa era Mehetabel, hija de Matred[b], hija de Mezahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 36:39 da el nombre de la ciudad como «Pau», mientras que Crónicas aquí lee «Pai».
    reason: textual_variant
  - marker: b
    text: La repetición de «hija de» puede implicar también «nieta de» en uso genealógico, pero aquí se mantiene más literalmente la redacción hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  lexicon: HALOT
  rationale: La forma wayyiqtol narra la secuencia histórica; en español, «murió» comunica de manera natural y directa el hecho de la muerte sin añadir explicaciones.
- source_word: בַּעַל חָנָן
  english_pob_choice: Baal-hanan
  chosen_spanish: Baal-hanán
  alternatives_spanish:
  - Baal Hanan
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración. El guion mantiene la convención española para nombres compuestos y ayuda a leerlo como una sola unidad onomástica.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinado en lugar de él
  - llegó a reinar en su lugar
  lexicon: HALOT
  rationale: מלך en este contexto de lista real expresa entronización/sucesión. «Reinó en su lugar» preserva esa relación de reemplazo de forma natural en español.
- source_word: הֲדַד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וְשֵׁם עִירוֹ
  english_pob_choice: The name of his city was
  chosen_spanish: El nombre de su ciudad era
  alternatives_spanish:
  - Y el nombre de su ciudad era
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se vuelve una construcción natural en español con «era», manteniendo el sentido identificador sin sobreexplicar la relación posesiva.
- source_word: פָּעִי
  english_pob_choice: Pai
  chosen_spanish: Pai
  alternatives_spanish:
  - Pau
  lexicon: HALOT
  rationale: Se adopta la forma de Crónicas, transliterada como nombre propio. La variante de Génesis queda reservada para la nota textual.
- source_word: וְשֵׁם אִשְׁתּוֹ
  english_pob_choice: and the name of his wife was
  chosen_spanish: y el nombre de su esposa era
  alternatives_spanish:
  - y el nombre de su mujer era
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal hebrea con una equivalencia directa y natural. «Esposa» es un equivalente claro y digno en español moderno.
- source_word: מְהֵיטַבְאֵל
  english_pob_choice: Mehetabel
  chosen_spanish: Mehetabel
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: בַּת מַטְרֵד בַּת מֵי זָהָב
  english_pob_choice: daughter of Matred, daughter of Mezahab
  chosen_spanish: hija de Matred, hija de Mezahab
  alternatives_spanish:
  - nieta de Mezahab
  lexicon: HALOT
  rationale: Se mantiene el paralelismo literal de בַּת con «hija de», porque el hebreo repite la fórmula genealógica sin resolver explícitamente el grado intermedio. Se conserva así la tensión genealógica que el inglés POB también dejó abierta.
- source_word: מֵי זָהָב
  english_pob_choice: Mezahab
  chosen_spanish: Mezahab
  alternatives_spanish:
  - Me-zahab
  lexicon: HALOT
  rationale: Se trata como nombre propio, no como una frase descriptiva, y por eso se translitera.
