translation:
  language: es
  text: Mis parientes me han fallado[a], y mis conocidos me han olvidado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis parientes han cesado, y los que me conocen me han olvidado»; o «Mis parientes cercanos han cesado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ
  english_pob_choice: have failed me
  chosen_spanish: han dejado de serlo
  alternatives_spanish:
  - han cesado
  - me han fallado
  - se han ido
  lexicon: HALOT
  rationale: El hebreo expresa cese o terminación. En español, 'han dejado de serlo' comunica con naturalidad que los parientes han dejado de cumplir su papel de cercanía y apoyo, sin perder el valor relacional del contexto. Evita un calco duro de 'han cesado' y conserva la tensión de abandono.
- source_word: קְרוֹבַי
  english_pob_choice: my relatives
  chosen_spanish: mis parientes
  alternatives_spanish:
  - mis parientes cercanos
  - mis deudos
  - mis kinsmen
  lexicon: HALOT
  rationale: '''קָרוֹב'' remite a cercanía y, por contexto, a vínculo familiar o de parentesco. ''Parientes'' es natural y fiel en español moderno; ''deudos'' sería más estrecho o funerario, y ''kinsmen'' no es idiomático.'
- source_word: וּמְיֻדָּעַי
  english_pob_choice: my acquaintances
  chosen_spanish: mis conocidos
  alternatives_spanish:
  - mis amigos
  - los que me conocían
  - mis allegados
  lexicon: HALOT
  rationale: La forma deriva del campo semántico de 'conocer' y señala personas conocidas por Job, no necesariamente amigos íntimos. 'Conocidos' preserva esa amplitud mejor que 'amigos', que intensifica indebidamente la cercanía.
- source_word: שְׁכֵחֽוּ/נִי
  english_pob_choice: have forgotten me
  chosen_spanish: me han olvidado
  alternatives_spanish:
  - se han olvidado de mí
  - me han dejado en el olvido
  - me han ignorado
  lexicon: HALOT
  rationale: El verbo significa 'olvidar'. 'Me han olvidado' reproduce de forma directa y sobria la pérdida de memoria/consideración. 'Ignorar' explicitaría una inferencia, no el lexema.
