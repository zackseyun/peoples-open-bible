review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: identifica a los avvitas como habitantes hasta Gaza, a los caftoritas como procedentes de Caftor, y mantiene la secuencia de destrucción y sustitución territorial. Sin embargo, no preserva de manera fiel el rastro de auditoría del POB en dos puntos: el texto principal usa «avvitas» donde la decisión inglesa principal fue «Avvim» con alternativa «Avvites», y la nota [a] repite la misma forma del texto en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El español es claro y legible. «En cuanto a» funciona bien; «que habitaban en aldeas hasta Gaza» es natural. No obstante, «y habitaron en su lugar» suena algo más débil que el hebreo idiomático de reemplazo; «y se establecieron en su lugar» expresa mejor la idea de asentamiento sucesorio sin perder naturalidad. También conviene capitalizar los etnónimos/topónimos transliterados de forma consistente.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. En nombres étnicos, conviene seguir más de cerca la decisión documentada del POB: forma principal transliterada «Avvim» con nota alternativa «avvitas». «Caftoritas» y «Caftor» son aceptables en español como adaptaciones legibles de los etnónimos/topónimos.'
  issues:
  - severity: medium
    issue: La forma principal «avvitas» no sigue la elección principal del POB auditado («Avvim»).
    rationale: El rastro inglés documenta «the Avvim» como elección principal y «the Avvites» solo como alternativa. En español, para preservar la lógica de auditoría, conviene usar «los Avvim» en el texto y relegar «los avvitas» a nota.
  - severity: high
    issue: La nota [a] no ofrece una alternativa real; duplica la lectura del texto principal.
    rationale: Si el texto dice «los avvitas[a]», la nota «O ‘los avvitas’» es inválida. Las notas deben preservar alternativas significativas y no repetir la misma forma.
  - severity: low
    issue: «Habitaron en su lugar» transmite residencia, pero no marca tan claramente el matiz de asentamiento sustitutivo de וַיֵּשְׁבוּ תַחְתָּם.
    rationale: «Se establecieron en su lugar» o «se asentaron en su lugar» comunica mejor la ocupación del territorio de los anteriores habitantes sin añadir interpretación excesiva.
  revised_spanish_text: En cuanto a los Avvim[a], que habitaban en aldeas[b] hasta Gaza, los caftoritas, que salieron de Caftor, los destruyeron y se establecieron en su lugar.
  revised_footnotes:
  - marker: a
    text: O «los avvitas».
    reason: lexical_alternative
  - marker: b
    text: «Aldeas» también puede traducirse «poblados» o «asentamientos»; el hebreo חֲצֵרִים puede referirse a lugares de habitación abiertos o no amurallados.
    reason: lexical_alternative
  revision_rationale: Se ajusta el etnónimo principal a «Avvim» para seguir la decisión documentada del POB y se corrige la nota [a] para que presente una alternativa verdadera («avvitas»). Además, se mejora «habitaron en su lugar» a «se establecieron en su lugar» para reflejar mejor el matiz de reemplazo y asentamiento del hebreo, manteniendo un español natural y digno. Se conserva «aldeas» con nota explicativa, en línea con la revisión inglesa auditada.
