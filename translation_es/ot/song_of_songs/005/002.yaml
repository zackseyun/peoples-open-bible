translation:
  language: es
  text: 'Yo dormía, pero mi corazón estaba despierto. El sonido[a] de mi amado, llamando: «Ábreme, hermana mía, amada mía, paloma mía, intachable mía[b], porque mi cabeza está llena de rocío, mis cabellos de las gotas de la noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La voz de mi amado». El hebreo קוֹל puede significar «sonido» o «voz» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «perfecta mía» o «inmaculada mía». El hebreo comunica integridad, inocencia o pureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֵׁנָה
  english_pob_choice: was asleep
  chosen_spanish: dormía
  alternatives_spanish:
  - estaba dormida
  - estaba durmiendo
  lexicon: HALOT
  rationale: El hebreo presenta un estado en primera persona con valor descriptivo; en español, «dormía» conserva la escena y suena más natural que un participio rígido. Mantiene la tensión poética con «mi corazón estaba despierto».
- source_word: לִבִּי עֵר
  english_pob_choice: my heart was awake
  chosen_spanish: mi corazón estaba despierto
  alternatives_spanish:
  - mi corazón estaba alerta
  - mi mente estaba despierta
  lexicon: HALOT
  rationale: «Corazón» preserva el hebreo לֵב como centro interior de la persona, no solo emoción. «Despierto» conserva el contraste directo con «dormía».
- source_word: קוֹל דּוֹדִי
  english_pob_choice: The sound of my beloved
  chosen_spanish: La voz de mi amado
  alternatives_spanish:
  - El sonido de mi amado
  - La voz de mi amado llamando
  lexicon: HALOT
  rationale: El hebreo קוֹל puede ser «sonido» o «voz». Aquí, junto con דוֹפֵק, el español puede legítimamente concretar la percepción como «voz», sin perder el carácter auditivo. Se mantiene la alternativa semántica documentada en nota.
- source_word: דוֹפֵק
  english_pob_choice: knocking
  chosen_spanish: tocaba a la puerta
  alternatives_spanish:
  - estaba tocando a la puerta
  - golpeaba a la puerta
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español, «tocaba a la puerta» transmite bien la escena y evita un calco áspero. El sustantivo «puerta» se explicita por el contexto implícito del llamado.
- source_word: פִּתְחִי לִי
  english_pob_choice: Open to me
  chosen_spanish: Ábreme
  alternatives_spanish:
  - Ábreme la puerta
  - Ábreme para mí
  lexicon: HALOT
  rationale: La combinación imperativa + לִי se expresa de forma natural como «Ábreme». El objeto se sobreentiende por el contexto y no requiere añadidura obligatoria.
- source_word: אֲחֹתִי
  english_pob_choice: my sister
  chosen_spanish: hermana mía
  alternatives_spanish:
  - mi hermana
  lexicon: HALOT
  rationale: Se conserva literalmente el término de afecto del Cantar. «Hermana mía» refleja mejor el orden enfático del hebreo y mantiene la cadencia poética.
- source_word: רַעְיָתִי
  english_pob_choice: my darling
  chosen_spanish: amiga mía
  alternatives_spanish:
  - amada mía
  - compañera mía
  lexicon: HALOT
  rationale: El término designa a la amada en una relación íntima. «Amiga mía» conserva una opción de cercanía afectiva que el español bíblico entiende bien, sin forzar «amor» como sustantivo abstracto.
- source_word: יוֹנָתִי
  english_pob_choice: my dove
  chosen_spanish: paloma mía
  alternatives_spanish:
  - mi paloma
  lexicon: HALOT
  rationale: La metáfora se mantiene literal. «Paloma mía» preserva el paralelismo con los demás apelativos y la colocación poética del hebreo.
- source_word: תַמָּתִי
  english_pob_choice: my blameless one
  chosen_spanish: perfecta mía
  alternatives_spanish:
  - sin defecto mía
  - inocente mía
  - intachable mía
  lexicon: HALOT
  rationale: El hebreo puede expresar completitud, integridad o ausencia de mancha. Dado que el POB inglés preserva la tensión entre «blameless / perfect / undefiled», «perfecta» es un equivalente tradicional y comprensible, con nota para mantener la alternativa semántica.
- source_word: שֶׁרֹּאשִׁי נִמְלָא טָל
  english_pob_choice: for my head is drenched with dew
  chosen_spanish: porque mi cabeza está llena de rocío
  alternatives_spanish:
  - porque mi cabeza está empapada de rocío
  - pues mi cabeza se ha llenado de rocío
  lexicon: HALOT
  rationale: Se conserva el sentido causal y la imagen corporal. «Está llena de rocío» es fiel al hebreo נִמְלָא y más natural en español que un calco con «drenched», que aquí no hace falta.
- source_word: קְוּצּוֹתַי
  english_pob_choice: my locks
  chosen_spanish: mis cabellos
  alternatives_spanish:
  - mis mechones
  - mis rizos
  lexicon: HALOT
  rationale: El hebreo se refiere a mechones o cabellos sueltos. En español, «cabellos» es claro y poético; «mechones» también sería posible, pero menos fluido en esta línea.
- source_word: רְסִיסֵי לָיְלָה
  english_pob_choice: the drops of the night
  chosen_spanish: las gotas de la noche
  alternatives_spanish:
  - las gotas nocturnas
  - el rocío de la noche
  lexicon: HALOT
  rationale: Se conserva la literalidad de la imagen. «Gotas de la noche» mantiene la apertura poética del hebreo y la relación con el rocío del verso.
theological_decisions:
- issue: Valor de תַמָּתִי en la cadena de apelativos
  english_pob_reading: my blameless one / my perfect one / my undefiled one
  chosen_spanish_reading: perfecta mía
  alternative_spanish_readings:
  - sin defecto mía
  - intachable mía
  - inmaculada mía
  rationale: No se debe borrar la tensión semántica del hebreo, que puede abarcar integridad, inocencia y pureza. «Perfecta» funciona como forma breve y tradicional en español, pero la nota preserva las alternativas para no clausurar el rango de sentido.
  doctrine_reference: Cantar de los Cantares 5:2; HALOT sobre תם/תמם
- issue: קוֹל דּוֹדִי como 'voz' o 'sonido'
  english_pob_reading: The sound of my beloved / The voice of my beloved
  chosen_spanish_reading: La voz de mi amado
  alternative_spanish_readings:
  - El sonido de mi amado
  rationale: El hebreo permite ambas posibilidades. Dado el contexto inmediato de un llamado/entrada y el verbo de golpear a la puerta, «voz» es un equivalente legítimo en español, pero la alternativa se conserva para no ocultar la ambigüedad original.
  doctrine_reference: Cantar de los Cantares 5:2; nota lexical del POB en inglés
translation_notes:
  revision_awareness: 'Se sigue el último pase sin cambios: no hay revisiones aplicadas al texto base inglés ni correcciones posteriores que obliguen a alterar la decisión de fondo. La versión española mantiene la misma ambigüedad relevante de קוֹל y תַמָּתִי mediante nota, pero adapta el verso a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva la metáfora de parentesco y afecto («hermana», «amiga», «paloma», «perfecta») sin suavizarla a fórmulas devocionales.
  - Se usa «amado» como equivalente coherente para דּוֹדִי, en lugar de alternar con «Cristo» u այլ terminología no motivada por el texto.
  - La puntuación y el encuadre de comillas buscan reproducir el cambio de narración a discurso directo sin añadir elementos ajenos al hebreo.
