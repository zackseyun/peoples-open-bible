translation:
  language: es
  text: Una gran necedad y falta de entendimiento fue Roboam[a], que hizo que el pueblo se rebelara[b] por su consejo, hasta que se levantó uno —no quede de él memoria—, Jeroboam hijo de Nabat, que pecó e hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido aquí es condensado y la división del versículo parece inestable; el paralelo griego conserva una formulación más amplia. Esa ampliación no se incorpora al texto principal porque no está explícita en la línea hebrea superviviente.
    reason: textual_variant
  - marker: b
    text: 'O: “dividió al pueblo por su consejo”. El hebreo es difícil; el griego apoya el sentido de defección o rebelión causada por la política de Roboam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רחב אולת
  english_pob_choice: a people’s folly / broad folly
  chosen_spanish: una gran necedad
  alternatives_spanish:
  - una necedad del pueblo
  - una necedad amplia
  lexicon: HALOT
  rationale: El hebreo transmitido es comprimido y difícil; el paralelo griego habla de ἀφροσύνη, 'necedad'. En español, 'gran necedad' comunica bien la intensidad sin forzar una reconstrucción que el testimonio no asegura.
- source_word: חסר בינה
  english_pob_choice: lacking understanding
  chosen_spanish: falta de entendimiento
  alternatives_spanish:
  - carente de entendimiento
  - sin discernimiento
  lexicon: HALOT
  rationale: La idea evaluativa es clara en hebreo y coincide con συνέσει en griego. 'Falta de entendimiento' suena natural en español y conserva el juicio sapiencial.
- source_word: רחבעם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: tradición bíblica hispana
  rationale: En español bíblico es la forma establecida y legible para el lector. Mantiene identificación inmediata sin cambiar el referente.
- source_word: הפריע בעצתו עם
  english_pob_choice: caused the people to revolt by his counsel
  chosen_spanish: hizo rebelar al pueblo por su consejo
  alternatives_spanish:
  - hizo que el pueblo se rebelara por su consejo
  - dividió al pueblo por su consejo
  lexicon: HALOT
  rationale: El verbo hebreo es difícil, pero el griego ἀπεστέτησεν apunta a la defección/rebelión del pueblo por su política. 'Hizo rebelar al pueblo' conserva el sentido causal y el matiz político.
- source_word: עד אשר קם
  english_pob_choice: until one arose
  chosen_spanish: hasta que se levantó uno
  alternatives_spanish:
  - hasta que surgió uno
  - hasta que apareció uno
  lexicon: uso hebreo/greco-sapiencial
  rationale: La fórmula es breve y puede sonar impersonal; 'se levantó' refleja bien el hebreo קם y sugiere aparición/irrupción de un personaje.
- source_word: אל יהי לו זכר
  english_pob_choice: may there be no remembrance of him
  chosen_spanish: no quede de él memoria
  alternatives_spanish:
  - no haya de él recuerdo
  - que no se recuerde de él
  lexicon: uso bíblico
  rationale: Es una fórmula desiderativa de desaparición de la memoria. 'No quede de él memoria' suena solemne y natural en español bíblico sin volverlo arcaico de más.
- source_word: ירבעם בן נבט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam hijo de Nebat
  lexicon: tradición bíblica hispana
  rationale: Se conserva el nombre en forma bíblica usual en español, y 'Nabat' sigue el patrón de transliteración del original griego/hebreo.
- source_word: חטא והחטיא את ישראל
  english_pob_choice: sinned and caused Israel to sin
  chosen_spanish: que pecó e hizo pecar a Israel
  alternatives_spanish:
  - que pecó y llevó a Israel a pecar
  - que pecó y causó que Israel pecara
  lexicon: HALOT
  rationale: El hebreo distingue entre el pecado propio y el causar pecado a otros; 'hizo pecar' preserva esa causalidad de forma clara y fiel. El griego también mantiene esa doble idea con ἐξήμαρτεν y el efecto sobre Israel.
theological_decisions:
- issue: Relación entre el hebreo comprimido y el paralelo griego
  english_pob_reading: The Hebrew witness here is compressed and the verse division appears unstable; the Greek parallel preserves a fuller wording, including 'and gave Ephraim a way of sin.' That fuller clause is not carried into the main text because it is not explicit in the surviving Hebrew line here.
  chosen_spanish_reading: La traducción sigue el núcleo común del hebreo y del griego, sin introducir en el texto principal la ampliación griega sobre Efraín.
  alternative_spanish_readings:
  - Incluir explícitamente 'y dio a Efraín un camino de pecado'
  - Seguir sólo el hebreo fragmentario
  rationale: El testimonio hebreo disponible es insuficiente para imponer la ampliación griega completa, pero el griego confirma el sentido general de culpa y desviación. La redacción española mantiene honestamente el núcleo compartido y deja fuera el añadido no atestiguado en el hebreo transmitido.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácida se conserva, usando el paralelo griego como insumo real cuando está presente; preservar la incertidumbre con honestidad.'
- issue: Sentido de la cláusula final sobre Jeroboam
  english_pob_reading: who sinned and caused Israel to sin
  chosen_spanish_reading: que pecó e hizo pecar a Israel
  alternative_spanish_readings:
  - que pecó y llevó a Israel a pecar
  - que pecó y causó que Israel pecara
  rationale: La formulación conserva tanto la transgresión personal como la responsabilidad causal sobre Israel, un rasgo importante del pasaje sapiencial. No se suaviza a un mero ejemplo negativo ni se intensifica más allá del texto.
  doctrine_reference: Sirácida 47:24; cf. 1 Reyes 14–15 sobre Jeroboam como agente de pecado colectivo.
- issue: Fórmula de memoria negativa
  english_pob_reading: may there be no remembrance of him
  chosen_spanish_reading: no quede de él memoria
  alternative_spanish_readings:
  - que no se recuerde de él
  - no haya de él recuerdo
  rationale: La frase mantiene el tono de maldición/borra-memoria que aparece en la tradición sapiencial. En español, 'no quede de él memoria' es solemne y comprensible sin añadir interpretación doctrinal.
  doctrine_reference: Uso bíblico de fórmulas de memoria y olvido; cf. Sal 34:16 y pasajes afines.
translation_notes:
  revision_awareness: 'La versión inglesa revisada abandonó una reconstrucción demasiado amplia (''from his offspring'') y volvió a un encuadre más cercano al hebreo: Roboam descrito por su necedad y falta de entendimiento, seguido por la cláusula sobre la rebelión del pueblo y la mención de Jeroboam. La draft española sigue esa última revisión y evita importar la ampliación griega sobre Efraín al texto principal, aunque la reconoce en la nota textual.'
  spanish_consistency_notes:
  - Se usa 'Roboam' como forma española bíblica estándar; 'Jeroboam hijo de Nabat' mantiene la identificación tradicional.
  - '''Necedad'' traduce con naturalidad ἀφροσύνη y אולת sin caer en un calco rígido.'
  - '''Hizo rebelar al pueblo'' conserva el valor causal de הפריע בעצתו עם y evita suavizarlo a una mera separación social.'
  - No se emplea 'SEÑOR' para el nombre divino porque este versículo no lo contiene.
  - La nota b deja abierta la alternativa 'dividió al pueblo' porque el hebreo es ambiguo y el griego admite la idea de defección.
