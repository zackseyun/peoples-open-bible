translation:
  language: es
  text: un platillo de oro de diez siclos[a], lleno de incienso[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'un platillo de oro, diez de oro, lleno de incienso'; 'siclos' se sobreentiende por la fórmula del inventario de ofrendas en este capítulo.
    reason: lexical_alternative
