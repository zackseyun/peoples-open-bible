translation:
  language: es
  text: ¡Alaben a Yah[a]! ¡Alaben, siervos de Yahvé[b]; alaben el nombre de Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hallelu-Yah», literalmente «Alaben a Yah», con la forma abreviada del nombre divino.'
    reason: lexical_alternative
  - marker: b
    text: O «esclavos de Yahvé»; el término hebreo puede denotar servicio o esclavitud, pero aquí «siervos» se ajusta mejor al contexto de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alaben ustedes!
  - ¡Den alabanza!
  - ¡Hallelu!
  lexicon: HALOT
  rationale: El imperativo plural piel de הלל expresa una convocatoria directa a alabar. «Alaben» conserva la fuerza exhortativa y funciona naturalmente en español bíblico contemporáneo. «Hallelu» sería transliteración, no traducción.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT
  rationale: La forma קצרה/abreviada del nombre divino merece conservarse como forma breve distinta de יְהוָה. «Yah» preserva la diferencia textual y la resonancia litúrgica de «Aleluya».
- source_word: עַבְדֵ֣י
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Aunque el término puede abarcar servicio o esclavitud, en este llamado de adoración el contexto hace más claro «siervos». «Esclavos» conserva fuerza léxica, pero en español aquí resultaría más duro y menos natural para la invocación litúrgica.
- source_word: יְהוָ֑ה / יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: «Yahvé», no el sustituto reverencial «SEÑOR». Esto preserva la identidad del nombre del pacto y la distinción frente a יָהּ en el mismo versículo.'
- source_word: אֶת שֵׁ֥ם יְהוָֽה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahvé
  - el nombre de Yahweh
  lexicon: HALOT
  rationale: La secuencia con אֶת introduce el objeto directo de la alabanza. «El nombre de Yahvé» reproduce con naturalidad la construcción y mantiene el énfasis bíblico en el nombre divino como objeto de alabanza.
theological_decisions:
- issue: Distinguir la forma breve del nombre divino (Yah) y el Tetragrámaton (Yahvé) en el mismo versículo
  english_pob_reading: Render יָהּ as 'Yah' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Render y distinguir «Yah» y «Yahvé»
  alternative_spanish_readings:
  - Render ambas formas como «Yahvé»
  - Render ambas formas como «el Señor»
  rationale: El hebreo diferencia deliberadamente la forma breve יָהּ y el nombre pleno יְהוָה. Mantener dos formas distintas en español evita borrar esa tensión lexical y conserva la estructura poética y litúrgica del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «the LORD» por «Yahweh» para mantener la coherencia con el nombre divino explícito del hebreo. La presente versión española sigue esa revisión mediante «Yahvé», conservando además la distinción con la forma breve «Yah» al inicio del versículo.
  spanish_consistency_notes:
  - Se mantiene la distinción sistemática entre «Yah» y «Yahvé».
  - Se evita «SEÑOR» como máscara del nombre divino, conforme al estándar del proyecto.
  - «Siervos» se usa por el marco de adoración del salmo, sin negar la posibilidad léxica de «esclavos».
  - La puntuación exclamativa conserva el paralelismo imperativo del hebreo.
