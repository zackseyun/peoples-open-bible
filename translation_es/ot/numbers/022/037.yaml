review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: pregunta retórica inicial, finalidad del envío, reproche por no acudir y pregunta final sobre la capacidad de honrar. Sin embargo, omite en el texto y notas dos matices preservados en el rastro POB inglés: el énfasis de שָׁלֹחַ שָׁלַחְתִּי (''ciertamente/de veras envié'') y la amplitud de כַּבְּדֶךָ (''honrarte'' con posible sentido de recompensa/estatus). Además, ''¿No te envié, de verdad, para llamarte?'' suena menos natural en español y puede leerse como modificación parentética del acto de enviar, no como énfasis verbal.'
  spanish_quality_summary: El español es comprensible y digno, pero 'te envié, de verdad' resulta algo forzado. Una formulación como '¿No te envié de veras a llamarte?' o '¿No te envié ciertamente a llamarte?' expresa mejor el énfasis hebreo. También conviene añadir notas, porque el inglés auditado las preserva y ayudan a evitar pérdida semántica. El resto del versículo lee con naturalidad.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Balac' y 'Balaam' son aceptables en español bíblico. 'Honrarte' concuerda con la decisión léxica POB para כבד, pero debe ir acompañado de una nota que preserve el posible matiz de recompensa o alto estatus. No hay términos teológicos sensibles adicionales.
  issues:
  - severity: medium
    issue: Expresión enfática poco natural en '¿No te envié, de verdad, para llamarte?'
    rationale: El infinitivo absoluto hebreo intensifica el verbo; en español 'de verdad' entre comas suena conversacional y algo torpe. 'De veras' o 'ciertamente' integrado al predicado expresa mejor el énfasis sin añadir urgencia ni repetición.
  - severity: medium
    issue: Faltan notas que preserven decisiones léxicas del audit trail inglés
    rationale: El inglés conserva alternativas significativas para el énfasis de שָׁלֹחַ שָׁלַחְתִּי, el literal 'ir' en vez de 'venir', y el alcance de 'honrarte'. El español debería mantener al menos las dos más relevantes, y preferiblemente también la alternativa literal de movimiento.
  - severity: low
    issue: '''viniste a mí'' es correcto pero crea una leve literalidad extraña en español'
    rationale: Aunque es fiel y entendible, 'viniste a mí' suena un poco calco. Sin embargo, sigue siendo aceptable y conserva bien la perspectiva de Balac, así que no requiere cambio obligatorio.
