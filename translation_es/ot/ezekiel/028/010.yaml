translation:
  language: es
  text: Morirás la muerte de los incircuncisos[a], a manos de extranjeros, porque yo he hablado —declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «las muertes de los incircuncisos morirás»; es un giro idiomático que significa que morirás de una manera semejante a la de los incircuncisos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹתֵי
  english_pob_choice: the death of
  chosen_spanish: la muerte de
  alternatives_spanish:
  - las muertes de
  - una muerte como la de
  lexicon: HALOT
  rationale: La forma hebrea plural constructa funciona idiomáticamente con el verbo siguiente para intensificar o especificar el modo de morir. En español, "la muerte de" transmite mejor la construcción idiomática sin sonar artificial, manteniendo el sentido de una muerte caracterizada por lo que sigue.
- source_word: עֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  - los hombres incircuncisos
  lexicon: HALOT
  rationale: Se conserva el valor sustantivado y la carga de vergüenza/covenantal del término. "Incircuncisos" es claro en español bíblico y mantiene el matiz identitario del hebreo.
- source_word: תָּמוּת
  english_pob_choice: you will die
  chosen_spanish: morirás
  alternatives_spanish:
  - morirás ciertamente
  - has de morir
  lexicon: HALOT
  rationale: El imperfecto qal con valor profético se expresa de manera natural como futuro directo. "Morirás" preserva la segunda persona singular y el anuncio de juicio.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - a mano de
  - a manos de
  lexicon: HALOT
  rationale: La locución hebrea marca agencia/instrumentalidad. En español, "por mano de" conserva la imagen vívida y es una equivalencia idiomática aceptable y comprensible.
- source_word: זָרִים
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - gente extranjera
  lexicon: HALOT
  rationale: En este contexto judicial, el término se refiere a personas de otra nación, no simplemente a desconocidos. "Extranjeros" es el equivalente más claro y neutral en español moderno.
- source_word: כִּי אֲנִי דִבַּרְתִּי
  english_pob_choice: for I have spoken
  chosen_spanish: porque yo he hablado
  alternatives_spanish:
  - pues yo he hablado
  - porque yo mismo he hablado
  lexicon: HALOT
  rationale: La frase introduce la base y certeza del juicio. El perfecto hebreo se conserva con el perfecto compuesto español; "yo" se mantiene para enfatizar la autoridad divina del hablante.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo de declaración solemne. "Declara" mantiene el registro oracular sin sobretraducir a una fórmula más interpretativa.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: "Yahvé" en el texto principal. Al tratarse de la combinación אֲדֹנָי + יהוה, se evita una forma redundante o confusa y se refleja la titularidad solemne con "el Señor"; el orden "Yahvé, el Señor" da cuenta de ambos elementos sin ocultar el nombre divino.'
theological_decisions:
- issue: Tratamiento del Tetragrámaton en la fórmula final
  english_pob_reading: the Lord GOD / Lord Yahweh
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé, el Dios
  rationale: El proyecto español exige usar "Yahvé" para יהוה. Como la expresión hebrea es אֲדֹנָי יְהוִה, la combinación se vierte de forma que conserve tanto el nombre divino como el título de soberanía, evitando la máscara convencional "SEÑOR" y sin perder la solemnidad de la fórmula profética.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y la auditoría inglesa: conserva la estructura idiomática de מוֹתֵי + תָּמוּת, el valor sustantivado de עֲרֵלִים y la agencia de בְּיַד זָרִים. La principal adaptación al estándar español del proyecto es la representación de יהוה como «Yahvé» y la resolución de אֲדֹנָי יְהוִה como «Yahvé, el Señor», manteniendo la fuerza profética y el tono de juicio.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara del nombre divino, conforme al estándar español del proyecto.
  - «Incircuncisos» conserva el matiz covenantal y vergonzante del hebreo.
  - «Por mano de» retiene la imagen instrumental del original sin volverse rígido en español.
  - La nota al pie explica el giro idiomático sin expandir indebidamente el texto principal.
