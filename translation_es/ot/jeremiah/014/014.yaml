revisions:
- from: 'Y Yahvé me dijo: «Los profetas profetizan mentiras en mi nombre. No los envié, ni les mandé, ni les hablé. Visión falsa, adivinación, vacío[a] y el engaño de su propio corazón es lo que ellos profetizan para ustedes».'
  to: 'Y Yahvé me dijo: «Los profetas profetizan mentiras en mi nombre. No los envié, ni les mandé, ni les hablé. Les profetizan una visión falsa, adivinación, vacío[a] y el engaño de su propio corazón».'
  rationale: Se corrige la cláusula final para reflejar con mayor fidelidad el dativo 'a ustedes/les' de לָכֶם y para producir un español más natural y directo. También se normaliza la nota léxica al español ('ídolo').
