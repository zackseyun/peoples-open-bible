translation:
  language: es
  text: Y los dispuso[a] como una multitud se despliega para la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los ordenó como una multitud es formada para la guerra». El verbo griego διέταξεν puede subrayar tanto la disposición ordenada como el acto de dar órdenes, y συντάσσεται es un término militar para tropas desplegadas o formadas en orden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέταξεν
  english_pob_choice: arranged
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - organizó
  - alineó
  lexicon: LSJ
  rationale: El verbo puede significar disponer, ordenar o dar instrucciones. En este contexto militar, «dispuso» conserva la idea de organizar las tropas sin reducirlo solo a mandar; también encaja con el paralelo de la formación de combate.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: Greek grammar
  rationale: El pronombre de objeto directo se expresa naturalmente en español con «los». El referente son las fuerzas mencionadas en el contexto inmediato.
- source_word: ὃν τρόπον
  english_pob_choice: in the way
  chosen_spanish: de la manera en que
  alternatives_spanish:
  - como
  - según la manera en que
  lexicon: LSJ
  rationale: La expresión introduce el modo de la acción. «De la manera en que» mantiene la función comparativa e idiomática del griego sin sonar rígido.
- source_word: πολέμου
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - de guerra
  - para batalla
  lexicon: LSJ
  rationale: El genitivo tiene valor militar y amplio. «Para la guerra» reproduce bien ese campo semántico en español y evita estrecharlo innecesariamente a una sola batalla.
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una muchedumbre
  - un gran número
  - un ejército
  lexicon: LSJ
  rationale: El sustantivo significa multitud o gran cantidad. «Una multitud» conserva la amplitud del término y evita introducir «ejército», que el griego no dice de forma explícita aquí.
- source_word: συντάσσεται
  english_pob_choice: is drawn up
  chosen_spanish: se organiza
  alternatives_spanish:
  - se dispone
  - se forma en orden de batalla
  - se alinea
  lexicon: LSJ
  rationale: En contexto militar, el verbo puede referirse a formar tropas o colocarlas en orden. «Se organiza» comunica la disposición militar de manera natural en español y deja abierta la imagen de formación.
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el paquete fuente y con el control de revisión más reciente; no se documentan cambios textuales ni divergencias sustantivas en la auditoría inglesa. La versión española mantiene la ambigüedad militar del original entre disponer/ordenar y formar en batalla.
  spanish_consistency_notes:
  - Se conserva «guerra» como equivalente amplio de πολέμου, en línea con la decisión inglesa.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no presente en el versículo.
  - La nota al pie marca la alternativa semántica principal de διέταξεν y συντάσσεται, tal como lo hizo la auditoría inglesa.
