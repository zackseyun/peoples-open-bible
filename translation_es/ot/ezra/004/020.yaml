  to: Y había reyes poderosos sobre Jerusalén[a], que gobernaban sobre todo Más Allá del Río, y a ellos se les pagaban tributo, impuesto y peaje[b].
  rationale: Se ajustó «estaban» a «había» para un español más idiomático al expresar la existencia de reyes con autoridad sobre Jerusalén, sin perder el valor de dominio indicado por la preposición. Se reformuló levemente la cláusula final para mejorar la fluidez natural. También se afinó la nota léxica para evitar la alternativa poco clara «costumbre» en español contemporáneo.
