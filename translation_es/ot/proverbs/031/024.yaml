translation:
  language: es
  text: Hace ropa de lino[a] y la vende; y suministra cinturones[c] al mercader[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'prendas de lino' o 'lino fino'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''al cananeo''; en este contexto probablemente significa ''al mercader'' o ''al comerciante''.'
    reason: lexical_alternative
  - marker: c
    text: O 'fajas' para la cintura.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָדִין
  english_pob_choice: linen garments
  chosen_spanish: ropa de lino
  alternatives_spanish:
  - prendas de lino
  - lino fino
  - un lienzo de lino
  lexicon: HALOT
  rationale: El hebreo puede referirse a una pieza o prenda de lino fino. En español, 'ropa de lino' mantiene el valor material y comercial sin obligar a decidir más de lo que el texto indica. 'Prendas de lino' sería más explícito, pero algo más pesado; 'lino fino' enfatiza la calidad, aunque pierde la idea de mercancía confeccionada.
- source_word: עָשְׂתָה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - hacía
  - hizo
  - produce
  lexicon: HALOT
  rationale: El perfecto hebreo describe una actividad característica de la mujer ideal, no solo una acción pasada única. En español, 'hace' conserva bien el valor habitual/iterativo del retrato poético.
- source_word: וַתִּמְכֹּר
  english_pob_choice: and sells them
  chosen_spanish: y la vende
  alternatives_spanish:
  - y las vende
  - y las vendía
  - y vende
  lexicon: HALOT
  rationale: El objeto implícito son las prendas de lino. Opto por singular colectivo ('la') porque 'ropa de lino' funciona naturalmente como sustantivo colectivo en español; 'las' sería posible si se entendiera un plural más concreto ('prendas').
- source_word: חֲגוֹר
  english_pob_choice: belts
  chosen_spanish: cinturones
  alternatives_spanish:
  - cintas
  - ceñidores
  - fajas
  lexicon: HALOT
  rationale: El término designa algo que se lleva ceñido a la cintura. 'Cinturones' es la equivalencia más clara y actual en español; 'fajas' o 'cintas' pueden sonar más restringidas o ambiguas.
- source_word: נָתְנָה
  english_pob_choice: supplies
  chosen_spanish: suministra
  alternatives_spanish:
  - da
  - provee
  - entrega
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'da', pero el contexto comercial sugiere provisión/abastecimiento. 'Suministra' comunica bien esa acción mercantil sin añadir contenido ajeno.
- source_word: לַכְּנַעֲנִי
  english_pob_choice: to the merchant
  chosen_spanish: al mercader
  alternatives_spanish:
  - al cananeo
  - al comerciante
  - al vendedor
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual de POB: aquí ''cananeo'' funciona metonímicamente como ''mercader''. ''Mercader'' conserva el matiz tradicional y comercial con buena naturalidad en español; ''comerciante'' sería equivalente, pero algo más moderno y menos evocador del juego etimológico.'
theological_decisions:
- issue: Lectura de לַכְּנַעֲנִי como etnónimo o como oficio
  english_pob_reading: '''to the merchant'' rather than ''to the Canaanite'' in context'
  chosen_spanish_reading: '''al mercader'' en vez de ''al cananeo'''
  alternative_spanish_readings:
  - al cananeo
  - al comerciante
  rationale: En este proverbio el contexto es de compraventa doméstica y no de identidad étnica. Por eso sigo la decisión auditada del POB de tomar el término como oficio/función comercial, evitando una lectura que oscurecería el sentido inmediato.
  doctrine_reference: Pr 31:24; uso contextual/metonímico de términos étnicos en lenguaje sapiencial
- issue: Valor aspectual del hebreo verbal en un retrato de hábitos
  english_pob_reading: present habitual ('makes', 'sells', 'supplies')
  chosen_spanish_reading: presente habitual ('hace', 'vende', 'suministra')
  alternative_spanish_readings:
  - pretérito ('hizo', 'vendió', 'suministró')
  - imperfecto descriptivo ('hacía', 'vendía', 'suministraba')
  rationale: El verso forma parte de una descripción de conducta habitual. El presente en español transmite bien el carácter proverbial y ejemplar del pasaje, sin convertirlo en una secuencia narrada del pasado.
  doctrine_reference: Proverbios 31:10-31; estilo sapiencial descriptivo
translation_notes:
  revision_awareness: El texto base en inglés del POB fue evaluado con acuerdo alto y no requirió cambios de revisión; esta propuesta sigue esa línea y solo ajusta el español para que exprese con naturalidad el mismo análisis léxico-contextual del original hebreo. Se preserva la tensión interpretativa de סָדִין y לַכְּנַעֲנִי mediante notas breves, sin forzar una sola solución donde el hebreo permite más de una.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque el versículo no contiene el nombre divino.
  - '''Mercader'' se usa como equivalencia contextual de לַכְּנַעֲנִי, en coherencia con la decisión auditada del POB.'
  - Se prefirió un español sobrio y publicable, evitando arcaísmos innecesarios y sin borrar las ambigüedades documentadas.
