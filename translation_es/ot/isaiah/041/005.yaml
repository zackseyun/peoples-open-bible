translation:
  language: es
  text: Las costas lejanas[a] han visto y temen; los confines de la tierra tiemblan. Se acercan y vienen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «las islas» o «las costas».

      '
    reason: lexical_alternative
  - marker: b
    text: 'Los dos verbos finales están estrechamente paralelos en hebreo, subrayando movimiento: «Se acercan y vienen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las tierras costeras lejanas
  lexicon: HALOT
  rationale: En este contexto profético, el término puede abarcar regiones marítimas o lejanas. «Las costas» comunica bien el alcance geográfico amplio sin reducirlo a islas literales.
- source_word: וְיִירָאוּ
  english_pob_choice: fear
  chosen_spanish: temen
  alternatives_spanish:
  - tienen miedo
  - están atemorizadas
  - temen con reverencia
  lexicon: HALOT
  rationale: El verbo expresa una reacción de temor. «Temen» es directo, formal y preserva la fuerza del hebreo sin añadir reverencia que el contexto no exige.
- source_word: קְצוֹת הָאָרֶץ
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - las partes más lejanas de la tierra
  lexicon: HALOT
  rationale: Es un modismo hebreo para las regiones más remotas del mundo. «Los confines de la tierra» es idiomático en español y mantiene el alcance universal.
- source_word: יֶחֱרָדוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se agitan
  - quedan aterrados
  lexicon: HALOT
  rationale: חרד combina temblor y alarma. «Tiemblan» conserva el componente físico y emocional sin intensificarlo demasiado.
- source_word: קָרְבוּ
  english_pob_choice: They draw near
  chosen_spanish: Se acercan
  alternatives_spanish:
  - Se aproximan
  - Se allegan
  lexicon: HALOT
  rationale: El verbo marca movimiento hacia un punto. «Se acercan» es natural en español y mantiene el paralelismo con el siguiente verbo.
- source_word: וַיֶּאֱתָיוּן
  english_pob_choice: and come
  chosen_spanish: y vienen
  alternatives_spanish:
  - y llegan
  - y acuden
  lexicon: HALOT
  rationale: El verbo poético de venir/llegar repite la idea de acercamiento para énfasis. «Y vienen» conserva esa brevedad paralela y la repetición intencional.
theological_decisions:
- issue: Respuesta de las naciones distantes
  english_pob_reading: The verse describes fearful reaction by distant nations to YHWH's evident action, without specifying repentance or worship.
  chosen_spanish_reading: El versículo describe una reacción de temor y estremecimiento de regiones lejanas, sin precisar si ese movimiento implica arrepentimiento, adoración o solo alarma.
  alternative_spanish_readings:
  - Las naciones responden con temor reverente.
  - Las naciones se congregan en solidaridad hostil.
  rationale: El hebreo y el registro auditado resaltan temor y temblor, pero no determinan de forma explícita la intención moral o cultual de la respuesta. La traducción conserva esa tensión y evita cerrar el sentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del inglés POB, que pasó de «are afraid» a «fear» para dar una forma más directa y formal al verbo. En español, «temen» conserva esa misma decisión de mayor literalidad y sobriedad.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como sustituto de Yahvé porque en este versículo el nombre divino no aparece explícitamente.
  - «Costas» se eligió como equivalente amplio de אִיִּים, manteniendo la amplitud geográfica profética.
  - Se preservó la repetición verbal final («se acercan y vienen») por su función enfática en el hebreo.
  - La puntuación refleja dos miembros principales con una clausula final breve, como en el texto fuente.
