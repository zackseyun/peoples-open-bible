review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la sintaxis espacial del hebreo, pero falla en dos puntos de alineación léxica importantes: הַמְּנֹרָה es un soporte cultual de luces, no una ''lámpara'', y בְּאֹהֶל מוֹעֵד corresponde a ''tienda de reunión/encuentro'', no a ''tabernáculo de reunión'' aquí, especialmente porque el mismo versículo luego distingue הַמִּשְׁכָּן como ''tabernáculo''. La nota al pie está mal anclada: el marcador [a] aparece en ''lámpara'' pero la nota trata נֹכַח (''frente a/opuesta a'').'
  spanish_quality_summary: El español es legible, pero 'la lámpara' reduce indebidamente el referente cultual, y repetir 'tabernáculo' para dos términos hebreos distintos en el mismo versículo enturbia la claridad. 'Colocó' suena un poco más preciso que 'Puso' en este contexto de disposición ritual, aunque 'puso' no sería incorrecto.
  glossary_alignment: Se debe mantener 'tabernáculo' para הַמִּשְׁכָּן y diferenciar אֹהֶל מוֹעֵד como 'tienda de reunión' para respetar la terminología del proyecto y del hebreo. Para הַמְּנֹרָה, 'candelabro' o 'menorá' son mejores que 'lámpara'; 'candelabro' es claro y ampliamente comprensible. No hay términos teológicos de alto riesgo adicionales.
  issues:
  - severity: high
    issue: הַמְּנֹרָה se tradujo como 'la lámpara'
    rationale: El hebreo designa el candelabro/lampstand del santuario, no una lámpara individual o portátil. 'Lámpara' empobrece y altera el referente cultual.
  - severity: high
    issue: בְּאֹהֶל מוֹעֵד se tradujo como 'en el tabernáculo de reunión'
    rationale: Esto borra la distinción con הַמִּשְׁכָּן, que el mismo versículo luego nombra como 'tabernáculo'. Conviene diferenciar 'tienda de reunión' y 'tabernáculo'.
  - severity: medium
    issue: La nota al pie está anclada en la palabra equivocada
    rationale: El marcador [a] aparece en 'lámpara', pero la nota explica la alternativa de נֹכַח ('frente a/opuesta a'), por lo que debe anclarse en esa frase.
  - severity: low
    issue: '''Puso'' es menos preciso que ''Colocó'' en contexto cultual'
    rationale: No es infiel, pero 'colocó' refleja mejor la colocación ordenada del mobiliario del santuario.
  revised_spanish_text: Colocó el candelabro en la tienda de reunión, frente[a] a la mesa, en el lado sur del tabernáculo.
  revised_footnotes:
  - marker: a
    text: O «opuesto a la mesa» o «de cara a la mesa». El hebreo נֹכַח puede indicar posición opuesta o delante de algo.
    reason: lexical_alternative
  revision_rationale: Se corrige 'lámpara' a 'candelabro' para reflejar con fidelidad הַמְּנֹרָה; se distingue 'tienda de reunión' de 'tabernáculo' para respetar los dos términos hebreos del versículo; y se reubica la nota al término que realmente comenta, נֹכַח. La redacción resultante es natural, precisa y consistente con la terminología del proyecto.
