  text: Entonces David llegó a Mahanayim, y Absalón cruzó el Jordán, él y todos los hombres de Israel con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El qal perfecto de בוא expresa movimiento hacia un destino. En español, "llegó" transmite con naturalidad la entrada en el lugar señalado por el texto sin añadir matices ajenos.
- source_word: מַחֲנָיְמָה
  english_pob_choice: to Mahanaim
  chosen_spanish: a Mahanayim
  alternatives_spanish:
  - a Mahanaim
  lexicon: HALOT
  rationale: El nombre propio lleva terminación direccional; en español se expresa con la preposición de destino "a". Se conserva el topónimo hebreo en una forma castellana común y legible.
- source_word: עָבַר אֶת־הַיַּרְדֵּן
  english_pob_choice: crossed the Jordan
  chosen_spanish: cruzó el Jordán
  alternatives_spanish:
  - pasó el Jordán
  - pasó al otro lado del Jordán
  lexicon: HALOT
  rationale: עבר con את y "el Jordán" indica cruce físico del río. "Cruzó el Jordán" es la formulación más clara y fiel en español contemporáneo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade explicitud y refuerza la aposición con la cláusula siguiente. En español basta "él"; "él mismo" sería demasiado enfático para el contexto.
- source_word: כָל־אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: 'La construcción hebrea es literalmente masculina singular colectiva: "cada hombre de Israel". En español, "todos los hombres de Israel" conserva el valor colectivo y el matiz masculino del original sin volverlo artificial.'
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal expresa compañía. "Con él" es la opción directa y exacta en español.
- source_word: וְ
  english_pob_choice: Then / and
  chosen_spanish: Entonces / y
  alternatives_spanish:
  - Luego / y
  - Y
  lexicon: HALOT
  rationale: El waw inicial avanza la narración; "Entonces" reproduce ese progreso temporal en español. El segundo wé se vierte naturalmente con "y".
translation_notes:
  revision_awareness: El texto inglés POB y la evidencia hebrea están en alto acuerdo; no se registraron variantes textuales ni revisiones aplicadas. La versión española sigue de cerca la secuencia narrativa y mantiene los referentes tal como aparecen en el hebreo.
  spanish_consistency_notes:
  - Se usa "Jordán" como nombre geográfico tradicional en español.
  - Se mantiene "Mahanayim" como topónimo transliterado, sin traducirlo.
  - No se introduce puntuación interpretativa adicional; la coma refleja la coordinación narrativa del hebreo.
