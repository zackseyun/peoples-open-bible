translation:
  language: es
  text: Las entrañas del necio son como una rueda de carreta[a], y su pensamiento es como un eje que gira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las entrañas del necio son como una rueda de carreta». El griego usa una imagen corporal para el estado interior del necio.
    reason: lexical_alternative
lexical_decisions:
- source_word: τροχὸς ἁμάξης
  english_pob_choice: a cartwheel
  chosen_spanish: una rueda de carreta
  alternatives_spanish:
  - una rueda de carro
  - una rueda de carreta
  lexicon: LSJ
  rationale: τροχός es «rueda» y ἁμάξης concreta el vehículo como carreta/carro. En español, «rueda de carreta» conserva la imagen rural y proverbial sin introducir una palabra demasiado marcada regionalmente; «carreta» evita la ambigüedad de «cartwheel» como acrobacia en español.
- source_word: σπλάγχνα
  english_pob_choice: the inward parts
  chosen_spanish: las entrañas
  alternatives_spanish:
  - las partes internas
  - el interior
  - las vísceras
  lexicon: LSJ
  rationale: σπλάγχνα nombra literalmente las vísceras o entrañas, con extensión figurada al interior humano. Aquí la imagen es corporal y no sentimental; «entrañas» preserva el golpe imagístico mejor que una paráfrasis abstracta.
- source_word: μωροῦ
  english_pob_choice: of a fool
  chosen_spanish: del necio
  alternatives_spanish:
  - del insensato
  - del tonto
  - del hombre necio
  lexicon: LSJ
  rationale: μωρός denota al necio o insensato en vocabulario sapiencial. «Necio» mantiene ese registro bíblico de sabiduría sin caer en un tono meramente coloquial.
- source_word: διαλογισμὸς
  english_pob_choice: thinking
  chosen_spanish: su pensamiento
  alternatives_spanish:
  - su razonamiento
  - su reflexión
  - su deliberación
  lexicon: LSJ
  rationale: διαλογισμός puede ser pensamiento, razonamiento o deliberación. «Pensamiento» es natural en español y conserva el singular abstracto del griego; el posesivo ayuda a unirlo con el sujeto implícito del verso.
- source_word: ὡς ἄξων στρεφόμενος
  english_pob_choice: like a turning axle
  chosen_spanish: como un eje que gira
  alternatives_spanish:
  - como un eje giratorio
  - como un eje en movimiento
  - como un eje que da vueltas
  lexicon: LSJ
  rationale: La participio στρεφόμενος indica giro continuo. «Eje que gira» reproduce la acción sin forzar un calco rígido; el español requiere normalmente explicitar la relación verbal.
theological_decisions:
- issue: Imagen corporal para el interior del necio
  english_pob_reading: The inward parts of a fool are like a cartwheel.
  chosen_spanish_reading: Las entrañas del necio son como una rueda de carreta.
  alternative_spanish_readings:
  - Las vísceras del necio son como una rueda de carreta.
  - El interior del necio es como una rueda de carreta.
  rationale: El verso usa imaginería física para describir el desorden interior del necio. «Entrañas» conserva la crudeza sapiencial del griego sin suavizar la metáfora hacia un abstracto psicológico.
  doctrine_reference: 'Sabiduría sapiencial: descripción moral del necio sin contenido doctrinal específico.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete y concuerda con el audit trail inglés: mantiene la imagen corporal de σπλάγχνα y la rotación continua de στρεφόμενος. Se evita una traducción mecánica desde el inglés «cartwheel», que en español podría sugerir una voltereta más que una rueda de vehículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantuvo el vocabulario sapiencial «necio» para μωρός, coherente con el registro del libro.
  - «Entrañas» y «eje que gira» preservan la imaginería concreta sin añadir interpretación psicológica excesiva.
