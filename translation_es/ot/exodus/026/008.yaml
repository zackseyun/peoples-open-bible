translation:
  language: es
  text: La longitud de cada cortina[a] será de treinta codos, y el ancho de cada cortina será de cuatro codos; las once cortinas tendrán una sola medida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la cortina, la una»; el hebreo usa esta forma distributivamente, es decir, cada cortina individual.'
    reason: lexical_alternative
  - marker: b
    text: O, «la misma medida». La frase hebrea dice literalmente «una medida», subrayando que las once cortinas fueron hechas con dimensiones idénticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - medida de largo
  lexicon: HALOT
  rationale: En contexto arquitectónico y en paralelo con רֹחַב, «longitud» comunica con naturalidad la dimensión lineal sin perder precisión técnica.
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - telón
  - paño
  - lona
  lexicon: HALOT
  rationale: En el tabernáculo se trata de una pieza textil de cobertura; «cortina» es claro, digno y reconocible en español bíblico contemporáneo.
- source_word: הָאַחַת / הָאֶחָת
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - la una
  - una cada una
  lexicon: HALOT
  rationale: El hebreo usa una forma distributiva; «cada» expresa mejor que se aplica a cada cortina individualmente.
- source_word: שְׁלֹשִׁים בָּאַמָּה
  english_pob_choice: thirty cubits
  chosen_spanish: treinta codos
  alternatives_spanish:
  - treinta en codos
  - treinta codo[s]
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codo» para mantener la transparencia respecto del texto fuente.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - ancho lateral
  lexicon: HALOT
  rationale: En español, «ancho» resulta más natural y directo que un calco más técnico, manteniendo la pareja semántica con «longitud».
- source_word: אַרְבַּע בָּאַמָּה
  english_pob_choice: four cubits
  chosen_spanish: de cuatro codos
  alternatives_spanish:
  - cuatro codos
  - cuatro en codos
  lexicon: HALOT
  rationale: La construcción española con «de» reproduce la medida de la dimensión de manera idiomática y fiel.
- source_word: מִדָּה אַחַת
  english_pob_choice: one measure
  chosen_spanish: una sola medida
  alternatives_spanish:
  - la misma medida
  - una medida
  lexicon: HALOT
  rationale: «Una sola medida» conserva el énfasis de uniformidad del hebreo y suena natural en español; evita perder la fuerza distributiva del original.
- source_word: לְעַשְׁתֵּי עֶשְׂרֵה יְרִיעֹת
  english_pob_choice: all eleven curtains shall have one measure
  chosen_spanish: las once cortinas tendrán una sola medida
  alternatives_spanish:
  - todas las once cortinas tendrán una sola medida
  - las once cortinas tendrán la misma medida
  lexicon: HALOT
  rationale: Se refleja la totalidad distributiva de «todas las once cortinas» en el inglés revisado, pero en español la forma más fluida y fiel es el sujeto plural simple con valor colectivo-distributivo.
translation_notes:
  revision_awareness: El inglés auditado añadió «all» antes de «eleven curtains» para aclarar el sentido distributivo; el español lo integra de manera natural con «las once cortinas», sin necesidad de un marcador adicional. Se mantuvo la equivalencia óptima y la referencia a las unidades antiguas.
  spanish_consistency_notes:
  - Se mantuvo «codos» para אַמָּה por consistencia con el proyecto.
  - Se usó «cortina» para יְרִיעָה, coherente con el contexto del tabernáculo.
  - «Una sola medida» preserva la idea de uniformidad del hebreo מִדָּה אַחַת.
