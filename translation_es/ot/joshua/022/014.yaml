  text: וַ/עֲשָׂרָ֤ה נְשִׂאִים֙ עִמּ֔/וֹ נָשִׂ֨יא אֶחָ֜ד נָשִׂ֤יא אֶחָד֙ לְ/בֵ֣ית אָ֔ב לְ/כֹ֖ל מַטּ֣וֹת יִשְׂרָאֵ֑ל וְ/אִ֨ישׁ רֹ֧אשׁ בֵּית אֲבוֹתָ֛/ם הֵ֖מָּה לְ/אַלְפֵ֥י יִשְׂרָאֵֽל־׃
