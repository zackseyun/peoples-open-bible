translation:
  language: es
  text: 'Y de los hijos de Bani: Mesulam, Maluc[a], Adaya, Yasub, Seal y Jeremot[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maluc» también se escribe «Maluc(h)» en algunas traducciones o tradiciones onomásticas.
    reason: lexical_alternative
  - marker: b
    text: «Jeremot» puede reflejar una vocalización variante o una forma distinta del nombre en algunas tradiciones.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de entre los hijos de
  - Y de los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, «de los hijos de» conserva la relación de pertenencia sin introducir una paráfrasis más interpretativa como «descendientes». El conector inicial se mantiene natural en español con «Y».
- source_word: בָּנִי
  english_pob_choice: Bani
  chosen_spanish: Bani
  alternatives_spanish:
  - Bání
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible del hebreo para mantener consistencia onomástica.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulán
  alternatives_spanish:
  - Mesullam
  - Meshullam
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma española más legible y pronunciable, sin cambiar la identidad del nombre hebreo. La forma inglesa auditable «Meshullam» se refleja en español como «Mesulán» para evitar una adaptación demasiado inglesa en un texto bíblico en español.
- source_word: מַלּוּךְ
  english_pob_choice: Malluk
  chosen_spanish: Maluc
  alternatives_spanish:
  - Malluk
  - Maluk
  lexicon: HALOT
  rationale: El nombre se vierte de manera cercana al consonántico hebreo con una ortografía española fluida. Se evita introducir una grafía inglesa innecesaria; la variante inglesa documentada queda representada por la transliteración directa.
- source_word: וַ/עֲדָיָה
  english_pob_choice: Adaiah
  chosen_spanish: Adaías
  alternatives_spanish:
  - Adaía
  - Adaiah
  lexicon: HALOT
  rationale: Nombre propio hebreo adaptado a una forma española habitual y fácilmente reconocible. La terminación -ías refleja mejor la pronunciación tradicional de nombres hebreos en español.
- source_word: יָשׁוּב
  english_pob_choice: Jashub
  chosen_spanish: Yasub
  alternatives_spanish:
  - Jasub
  - Jashub
  lexicon: HALOT
  rationale: Se refleja la yod inicial con «Y» para una transliteración más directa al español. La forma mantiene el nombre propio sin introducir una adaptación etimológica o explicativa.
- source_word: וּ/שְׁאָל
  english_pob_choice: Sheal
  chosen_spanish: Séal
  alternatives_spanish:
  - Sheal
  - Seal
  lexicon: HALOT
  rationale: Se conserva el vocalismo del hebreo con una forma española breve y legible. La tilde marca la sílaba tónica y evita ambigüedad de lectura en español.
- source_word: ירמות
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jeremot[h]
  - Yeremot
  lexicon: HALOT
  rationale: Se vierte el nombre con una forma española directa y sobria. Dado que el audit trail inglés señala una posible variante de vocalización o forma de nombre, se conserva la lectura principal sin ocultar la posibilidad de variantes onomásticas.
translation_notes:
  revision_awareness: El contexto auditado en inglés indica alta concordancia y no muestra revisiones aplicadas. El español se ajusta directamente al hebreo listado, manteniendo el paralelismo enumerativo y las variantes onomásticas documentadas en la nota inglesa para Malluk/Malluch y Jeremoth.
  spanish_consistency_notes:
  - Se mantiene la estructura de lista genealógica con dos puntos tras «Bani».
  - Se preserva la transliteración de nombres propios sin traducirlos ni expandirlos.
  - Se emplea español neutral y sobrio, con nombres adaptados solo cuando ello mejora la legibilidad sin perder la referencia hebrea.
