revisions:
- from: Sacó al pueblo que estaba en ella y los puso a trabajar con sierras[a], herramientas de hierro y hachas. Así hizo David con todas las ciudades de los hijos de Amón[b]. Luego David y todo el pueblo regresaron a Jerusalén.
  to: Sacó al pueblo que estaba en ella y los puso a trabajar con sierras[a], herramientas de hierro y hachas[b]. Así hizo David a todas las ciudades de los amonitas. Luego David y todo el pueblo regresaron a Jerusalén.
  rationale: Se corrige la cláusula final para reflejar fielmente לְכֹל como 'a todas' y para usar el etnónimo español natural 'los amonitas', en línea con la auditoría inglesa. También se afina la ubicación y redacción de la nota léxica sobre los instrumentos inciertos.
