translation:
  language: es
  text: Y murió en buena vejez, lleno de días[a], riquezas y honra; y Salomón su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «satisfecho de días» para el modismo hebreo «lleno de días».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: And he died
  chosen_spanish: Y murió
  alternatives_spanish:
  - Entonces murió
  - Y falleció
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente hecho en secuencia. «Y murió» conserva la fuerza narrativa simple sin añadir interpretación ni suavizar el verbo.
- source_word: בְּשֵׂיבָה טוֹבָה
  english_pob_choice: in a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - a buena vejez
  - en una buena vejez
  lexicon: HALOT
  rationale: La preposición con שֵׂיבָה describe la circunstancia de la muerte; «en buena vejez» reproduce de forma natural la evaluación positiva del hebreo y mantiene la idea de edad avanzada.
- source_word: שְׂבַע יָמִים
  english_pob_choice: full of days
  chosen_spanish: lleno de días
  alternatives_spanish:
  - satisfecho de días
  - harto de días
  lexicon: HALOT
  rationale: Es un modismo hebreo para una vida larga y cumplida. «Lleno de días» preserva la imagen original y evita una paráfrasis más explicativa.
- source_word: עֹשֶׁר וְכָבוֹד
  english_pob_choice: riches, and honor
  chosen_spanish: riquezas y honra
  alternatives_spanish:
  - riquezas y honor
  - riqueza y gloria
  lexicon: HALOT
  rationale: עֹשֶׁר apunta a riqueza material; כָבוֹד aquí expresa honor o prestigio social. «Honra» comunica bien ese valor en español y conserva el matiz de dignidad real.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En este contexto sucesorio, «reinó» es la forma breve y directa que corresponde al verbo hebreo en voz qal.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en vez de él
  lexicon: HALOT
  rationale: La expresión de sucesión con תחת y sufijo significa «en lugar de / en su lugar». «En su lugar» es la opción más natural en español para una sucesión real.
- source_word: שְׁלֹמֹה בְנוֹ
  english_pob_choice: Solomon his son
  chosen_spanish: Salomón su hijo
  alternatives_spanish:
  - su hijo Salomón
  lexicon: HALOT
  rationale: El orden hebreo se mantiene con naturalidad en español y deja clara la relación filial sin necesidad de reordenar la frase.
theological_decisions:
- issue: La frase idiomática «lleno de días» podría verterse de manera más interpretativa.
  english_pob_reading: '''full of days'' as a Hebrew idiom for a long, fulfilled life'
  chosen_spanish_reading: «lleno de días» como modismo hebreo para una vida larga y cumplida
  alternative_spanish_readings:
  - satisfecho de días
  - con los días cumplidos
  rationale: Se conserva la tensión literaria del modismo en vez de reemplazarlo por una explicación completa dentro del texto. La nota aclara el valor idiomático sin borrar la imagen original.
  doctrine_reference: Observación literaria/idiomática; no doctrinal
- issue: «כָבוֹד» puede sugerir «gloria», pero en este contexto real y humano conviene distinguir honor de gloria divina.
  english_pob_reading: '''honor'' rather than ''glory'' for a royal prosperity context'
  chosen_spanish_reading: «honra» en vez de «gloria»
  alternative_spanish_readings:
  - gloria
  - honor
  rationale: En el contexto de la vida y reinado de David, el término apunta al prestigio y la dignidad recibidos, no a la gloria divina. «Honra» mantiene ese matiz y evita una confusión teológica.
  doctrine_reference: Distinción semántica entre honor humano y gloria divina
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto español donde corresponde, de modo que la nota queda anclada al modismo «lleno de días». No se introdujeron cambios de sentido respecto del paquete fuente; solo se ajustó la presentación de la nota para cumplir la norma de anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «honra» para כָבוֹד por claridad contextual en un relato de realeza.
  - 'La sintaxis conserva el paralelismo de la fuente: muerte, duración/consumación de la vida, bienes, honra y sucesión.'
