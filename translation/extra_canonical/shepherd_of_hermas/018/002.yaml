translation:
  text: 'Now I say to you who lead the church and to the first-seaters: do not become like poisoners.
    Poisoners carry their drugs in boxes; but you carry your drug and your poison in your heart. You are
    encrusted and do not wish to cleanse your hearts and to bring your understanding together as one in
    a pure heart, so that you may receive mercy from the great King. Watch then, children, lest these
    dissensions of yours deprive you of life. How can you wish to train the Lord’s chosen ones when you
    yourselves do not have training? Train one another and be at peace among yourselves, so that I also,
    standing joyfully before the Father, may give an account on behalf of you all to your Lord.'
  philosophy: optimal-equivalence
