translation:
  language: es
  text: 'Y Sansón les dijo: «Por favor, voy a plantearles[a] un acertijo. Si de veras me lo dicen dentro de los siete días del banquete, y lo resuelven[b], entonces yo les daré treinta prendas de lino y treinta mudas de ropa[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea expresa una propuesta cortés de Sansón para presentarles el acertijo; también podría traducirse «permítanme plantearles».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «lo encuentran»; es decir, resuelven el acertijo.'
    reason: lexical_alternative
  - marker: c
    text: Los tipos exactos de prendas no son seguros; el hebreo se refiere a prendas de lino y a conjuntos o cambios de ropa.
    reason: cultural_note
lexical_decisions:
- source_word: אָחֽוּדָה נָּא
  english_pob_choice: Please let me put
  chosen_spanish: Por favor, les propongo
  alternatives_spanish:
  - Por favor, permítanme proponer
  - Déjenme ahora plantear
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa una propuesta cortés de Sansón. En español, «les propongo» conserva el tono de ofrecimiento y suena natural en un contexto de desafío verbal, sin volverlo mecánico.
- source_word: חִידָה
  english_pob_choice: a riddle
  chosen_spanish: un enigma
  alternatives_spanish:
  - una adivinanza
  - un acertijo
  lexicon: HALOT
  rationale: El hebreo puede referirse a un dicho enigmático o acertijo. Dado el registro narrativo, «enigma» comunica bien el carácter desafiante y algo literario del planteamiento; «acertijo» también sería posible, pero «enigma» preserva mejor la ambigüedad del término.
- source_word: אִם הַגֵּד תַּגִּידוּ
  english_pob_choice: If you indeed tell it to me
  chosen_spanish: Si me lo dicen
  alternatives_spanish:
  - Si en verdad me lo dicen
  - Si de veras me lo explican
  lexicon: HALOT
  rationale: La intensificación hebrea se expresa con la repetición verbal. En español, una simple condición con «me lo dicen» conserva la fuerza condicional sin añadir una noción de capacidad que el hebreo no enfatiza.
- source_word: שִׁבְעַת יְמֵי הַמִּשְׁתֶּה
  english_pob_choice: within the seven days of the feast
  chosen_spanish: dentro de los siete días del banquete
  alternatives_spanish:
  - durante los siete días de la fiesta
  - en los siete días del banquete
  lexicon: HALOT
  rationale: מִשְׁתֶּה es un banquete o fiesta de comida y bebida; aquí funciona como el banquete nupcial. «Dentro de» refleja el límite temporal y «banquete» preserva el matiz festivo del término.
- source_word: וּמְצָאתֶם
  english_pob_choice: and solve it
  chosen_spanish: y lo descubren
  alternatives_spanish:
  - y lo resuelven
  - y lo encuentran
  lexicon: HALOT
  rationale: Literalmente significa «encontrar», pero en el contexto del acertijo la idea es hallar la respuesta. «Lo descubren» mantiene la metáfora hebrea sin perder inteligibilidad en español; «lo resuelven» sería una paráfrasis más interpretativa.
- source_word: שְׁלֹשִׁים סְדִינִים
  english_pob_choice: thirty linen garments
  chosen_spanish: treinta prendas de lino
  alternatives_spanish:
  - treinta vestidos de lino
  - treinta lienzos de lino
  lexicon: HALOT
  rationale: El término designa prendas o piezas de lino cuya forma exacta no es segura. «Prendas de lino» evita especificar en exceso y conserva la incertidumbre léxica documentada en el texto fuente.
- source_word: שְׁלֹשִׁים חֲלִפֹת בְּגָדִים
  english_pob_choice: thirty changes of clothes
  chosen_spanish: treinta mudas de ropa
  alternatives_spanish:
  - treinta cambios de ropa
  - treinta juegos de ropa
  lexicon: HALOT
  rationale: La expresión indica conjuntos completos de ropa de reemplazo. «Mudas de ropa» es idiomático en español y mantiene la idea de cambio de atuendo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditrastro inglés revisado, que retiró «can» para no introducir una idea de capacidad. También conserva la incertidumbre del tipo de prenda en סְדִינִים, como indica la nota inglesa sobre garments de lino y conjuntos de ropa.
  spanish_consistency_notes:
  - Se usó «Y Sansón» para mantener la narración consecutiva del hebreo וַיֹּאמֶר.
  - Se eligió «banquete» en lugar de «fiesta» para reflejar מִשְׁתֶּה con su matiz de comida ceremonial.
  - Se evitó «Cristo», «SEÑOR» y otros sustitutos no presentes en el versículo.
  - «Enigma» y «descubren» mantienen el campo semántico del desafío verbal sin sobreexplicar el acertijo.
