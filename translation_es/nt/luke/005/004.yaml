translation:
  language: es
  text: 'Cuando hubo terminado de hablar, dijo a Simón: «Lleva la barca[a] a lo hondo y echen sus redes para una captura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a lo profundo». El griego dice literalmente «a la profundidad», y aquí se refiere al agua profunda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  - Después de que
  lexicon: BDAG
  rationale: Introduce el avance narrativo de forma natural en español sin cargar δέ con una conjunción más fuerte de la que requiere el griego.
- source_word: ἐπαύσατο λαλῶν
  english_pob_choice: he had finished speaking
  chosen_spanish: hubo terminado de hablar
  alternatives_spanish:
  - había terminado de hablar
  - dejó de hablar
  - cesó de hablar
  lexicon: BDAG
  rationale: La combinación expresa el cierre completo de la acción de hablar antes del siguiente dicho. «Hubo terminado» conserva bien la secuencia temporal y el matiz perfectivo del contexto narrativo.
- source_word: εἶπεν πρὸς τὸν Σίμωνα
  english_pob_choice: he said to Simon
  chosen_spanish: dijo a Simón
  alternatives_spanish:
  - le dijo a Simón
  - habló a Simón
  lexicon: BDAG
  rationale: «Decir a» corresponde de manera directa y sobria a λέγω + πρός, sin añadir una tonalidad más interpretativa que «le dijo».
- source_word: Ἐπανάγαγε
  english_pob_choice: Put out
  chosen_spanish: Sal
  alternatives_spanish:
  - Vayan mar adentro
  - Navega
  lexicon: BDAG
  rationale: En este contexto de pesca, el mandato apunta a mover la barca desde la orilla hacia aguas más profundas. «Sal» es una forma breve y natural en español para este tipo de instrucción náutica.
- source_word: εἰς τὸ βάθος
  english_pob_choice: into the deep water
  chosen_spanish: a lo hondo
  alternatives_spanish:
  - al profundo
  - a las profundidades
  - a lo profundo
  lexicon: BDAG
  rationale: El griego dice literalmente «a/into el depth», y en contexto se refiere a agua profunda. «A lo hondo» conserva la imagen espacial sin forzar una ampliación explicativa innecesaria en el texto principal.
- source_word: χαλάσατε
  english_pob_choice: let down
  chosen_spanish: echen
  alternatives_spanish:
  - bajen
  - suélten
  - dejen caer
  lexicon: BDAG
  rationale: Para redes desde una barca, «echen» comunica bien el acto de soltarlas o bajarlas al agua. Es más idiomático que una traducción demasiado mecánica de «bajen» o «dejen caer».
- source_word: τὰ δίκτυα ὑμῶν
  english_pob_choice: your nets
  chosen_spanish: sus redes
  alternatives_spanish:
  - vuestras redes
  - las redes de ustedes
  lexicon: BDAG
  rationale: En español bíblico natural y ampliamente comprensible, el posesivo de cortesía/plural «sus» funciona bien aquí y evita un giro rígido.
- source_word: εἰς ἄγραν
  english_pob_choice: for a catch
  chosen_spanish: para una pesca
  alternatives_spanish:
  - para una captura
  - para un buen pez
  lexicon: BDAG
  rationale: ἄγρα señala una captura/pesca en este contexto. «Para una pesca» preserva el sentido de propósito y resulta muy natural en español; «captura» podría sonar más general.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español, anclado en la frase correspondiente.'
  spanish_consistency_notes:
  - Se mantuvo «Simón» como nombre propio.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - «a lo hondo» conserva la ambigüedad controlada entre profundidad abstracta y agua profunda, resuelta en la nota.
  - El mandato se tradujo en forma plural «echen» siguiendo el plural de χαλάσατε y el poseedor plural «sus redes».
