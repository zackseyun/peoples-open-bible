lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Ahora ... vino
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce una secuencia profética estándar. En español, «Y ... vino» conserva la fluidez del giro sin volverlo artificial ni añadir contenido no presente en el hebreo.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר־יְהוָה, «la palabra» reproduce con precisión la referencia a una comunicación divina específica y mantiene la fórmula reconocible sin desplazarla a un término más interpretativo como «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino conforme a la política del proyecto: «Yahvé» como forma española estable y legible para יְהוָה, en vez de sustituirlo por un título como «Señor».'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de forma directa y natural en español con «a mí».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo. «Diciendo» conserva la estructura formularia del hebreo y es equivalente a la opción inglesa auditada.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: Se mantiene la traducción del nombre divino como nombre propio, no como sustitución honorífica. «Yahvé» es la forma española adoptada en el proyecto para preservar el valor confesional y textual del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética «la palabra de Yahvé vino a mí»
  english_pob_reading: The word of Yahweh came to me
  chosen_spanish_reading: La palabra de Yahvé vino a mí
  alternative_spanish_readings:
  - La palabra de Yahvé me llegó
  - Vino a mí la palabra de Yahvé
  rationale: Se conserva la fórmula profética clásica sin diluir su carácter revelatorio. El orden castellano elegido es natural y sigue de cerca la sintaxis fuente.
  doctrine_reference: Profetic formula in Ezekiel; no doctrinal divergence
translation_notes:
  revision_awareness: El contexto inglés auditado no muestra revisiones sustantivas; la última pasada indica que no fueron necesarios cambios y el consenso de revisión fue de alta concordancia. Por ello, la redacción española sigue de cerca las decisiones lexicográficas y teológicas ya validadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יְהוָה.
  - Se conserva la estructura formularia profética con «la palabra ... vino a mí, diciendo».
  - El estilo es sobrio y publicable, sin añadir marcadores o glosas que el hebreo no requiera.
