    text: O «el oprobio de Egipto», «la deshonra de Egipto» o «el reproche de Egipto». La expresión también puede referirse a la vergüenza pasada de Israel en Egipto, al reproche procedente de Egipto, o a una deshonra pactual ahora removida.
    reason: lexical_alternative
  - marker: b
    text: «Gilgal» suena como el verbo hebreo relacionado con «rodar lejos», creando un juego de palabras con «Hoy he hecho rodar lejos».
    reason: cultural_note
  revision_rationale: 'Se revisa para alinear mejor la traducción con la decisión léxica central del POB sobre גַּלּוֹתִי y para mejorar la naturalidad del español en la fórmula de nombramiento. También se corrigen los marcadores de nota: la nota léxica debe ir en la frase «he hecho rodar lejos» para explicar la relación con «Gilgal», y la nota sobre «el oprobio de Egipto» se conserva como alternativa léxica amplia sin cerrar la interpretación. La nota cultural se mantiene en «Josué», como en el POB inglés, ya que explica el juego con «Gilgal» que se desarrolla en la cita divina.'
