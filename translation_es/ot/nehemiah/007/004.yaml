translation:
  language: es
  text: Ahora la ciudad era ancha y grande[a], pero la gente dentro de ella era poca, y no había casas construidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y la ciudad era ancha y grande ... y la gente era poca en ella, y no había casas construidas». El hebreo es más formalmente coordinado; el texto principal suaviza la sintaxis para un español natural sin perder el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעִיר
  english_pob_choice: Now the city
  chosen_spanish: Ahora la ciudad
  alternatives_spanish:
  - Y la ciudad
  - Entonces la ciudad
  lexicon: HALOT
  rationale: El hebreo presenta una coordinación simple con waw; en español, "Ahora" funciona bien como apertura descriptiva de contexto sin forzar una coordinación innecesaria. Se conserva el referente literal "la ciudad".
- source_word: רַחֲבַת יָדַיִם
  english_pob_choice: wide
  chosen_spanish: ancha
  alternatives_spanish:
  - espaciosa
  - ancha de lados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica amplitud espacial. "Ancha" preserva el sentido físico de amplitud en un español natural y breve.
- source_word: וּגְדוֹלָה
  english_pob_choice: and large
  chosen_spanish: y grande
  alternatives_spanish:
  - y extensa
  - y de gran tamaño
  lexicon: HALOT
  rationale: Aquí גָּדוֹל describe tamaño, no prestigio. "Grande" mantiene la duplicación enfática junto con "ancha" sin sobreinterpretar la idea.
- source_word: וְהָעָם מְעַט
  english_pob_choice: but the people ... were few
  chosen_spanish: pero el pueblo ... era poco
  alternatives_spanish:
  - y el pueblo ... era poco
  - pero la gente ... era poca
  lexicon: HALOT
  rationale: Se conserva el contraste implícito con la ciudad grande. "Pueblo" sigue el valor colectivo del hebreo הָעָם; "era poco" reproduce la idea de escasez numérica.
- source_word: בְּתוֹכָהּ
  english_pob_choice: within it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en ella
  lexicon: HALOT
  rationale: La frase indica interioridad espacial. "Dentro de ella" es idiomático y conserva la imagen de habitantes en el interior de la ciudad.
- source_word: וְאֵין בָּתִּים בְּנוּיִם
  english_pob_choice: and no houses had been built
  chosen_spanish: y no había casas construidas
  alternatives_spanish:
  - y no se habían construido casas
  - y no había casas edificadas
  lexicon: HALOT
  rationale: El hebreo afirma inexistencia de casas "construidas"; no exige el prefijo "re-". "No había casas construidas" es fiel, natural y evita inferir más de lo que el texto dice.
theological_decisions:
- issue: Ausencia de casas construidas en el contexto postexílico
  english_pob_reading: and no houses had been built
  chosen_spanish_reading: y no había casas construidas
  alternative_spanish_readings:
  - y no se habían construido casas
  - y no había casas edificadas
  rationale: No hay una cuestión doctrinal directa; la decisión afecta la precisión histórica y lexical. Se mantiene una formulación simple que no introduce la idea de reconstrucción explícita, ya que el hebreo solo dice que no había casas construidas.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail inglés, que corrigió "had been rebuilt" a "had been built" para ajustarse mejor al hebreo, y por eso evita cualquier alusión a "reconstruidas".
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se eligió "casas construidas" en vez de "reconstruidas" para respetar la decisión revisada del inglés POB y la ausencia del prefijo hebreo equivalente a "re-".
  - '"Pueblo" conserva el colectivo הָעָם mejor que "gente" o "población" en este contexto descriptivo.'
