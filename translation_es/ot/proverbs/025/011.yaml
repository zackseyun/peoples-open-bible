translation:
  language: es
  text: Como manzanas[a] de oro en engastes[c] de plata es una palabra dicha a tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo תַּפּוּחַ nombra un fruto cuya identificación exacta no es segura; «manzanas» sigue la tradición de traducción más extendida y legible.
    reason: cultural_note
  - marker: b
    text: O «dicha apropiadamente»; literalmente, «dicha sobre sus ruedas», un modismo para hablar de forma oportuna y ajustada.
    reason: lexical_alternative
  - marker: c
    text: O «en tallados de plata» o «en filigrana de plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּפּוּחֵי
  english_pob_choice: apples
  chosen_spanish: manzanas
  alternatives_spanish:
  - frutos
  - peras
  - membrillos
  lexicon: HALOT, BDB
  rationale: El hebreo תַּפּוּחַ puede referirse a un fruto no identificado con total certeza; la tradición inglesa usa 'apples' como equivalente reconocible. En español, 'manzanas' conserva la imagen proverbial más natural y transparente sin forzar una identificación botánica absoluta.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT, BDB
  rationale: El término denota el material precioso de manera directa. En español, 'de oro' mantiene la cualidad material dentro de la imagen comparativa y suena más natural que una construcción literal rígida.
- source_word: בְּ/מַשְׂכִּיּוֹת
  english_pob_choice: in settings of
  chosen_spanish: en engastes
  alternatives_spanish:
  - en carvados
  - en filigrana
  - en adornos
  lexicon: HALOT, BDB
  rationale: מַשְׂכִּיּוֹת designa trabajo ornamental o piezas artísticas de adorno. 'Engastes' expresa bien la idea de una pieza preparada o montada dentro de una obra de plata, manteniendo el valor figurativo y evitando una traducción demasiado técnica o oscura.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  lexicon: HALOT, BDB
  rationale: Material precioso directo; 'plata' es el equivalente natural en español y conserva la simetría poética con 'oro'.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un dicho
  - una palabra
  - un asunto
  lexicon: HALOT, BDB
  rationale: En el contexto de un proverbio sobre el habla, 'palabra' comunica con claridad el referente verbal de דָּבָר y mantiene el paralelismo con lo dicho.
- source_word: דָּבֻר
  english_pob_choice: spoken
  chosen_spanish: dicha
  alternatives_spanish:
  - hablada
  - pronunciada
  lexicon: HALOT, BDB
  rationale: La forma pasiva participial se rinde de modo natural como 'dicha', que preserva el carácter breve y proverbial sin añadir explicaciones ajenas al texto.
- source_word: עַל אָפְנָיו
  english_pob_choice: at the right time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en el momento oportuno
  - apropiadamente
  lexicon: HALOT, BDB
  rationale: La expresión idiomática hebrea apunta a adecuación y oportunidad. 'A su tiempo' refleja bien el sentido de oportunidad sin perder la tensión interpretativa que la nota inglesa documenta.
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó la comparación para reflejar más de cerca el hebreo: primero la imagen de oro y plata, luego la afirmación sobre la palabra. La redacción española sigue esa misma estructura y conserva la idea idiomática de oportunidad con ''a su tiempo''.'
  spanish_consistency_notes:
  - Se mantuvo 'oro' y 'plata' para los metales preciosos, coherente con el paralelismo hebreo.
  - Se evitó 'SEÑOR' u otros términos teológicos porque el versículo no contiene lenguaje divino explícito.
  - '''A su tiempo'' preserva la ambigüedad útil entre oportunidad temporal y ajuste apropiado, acorde con la nota de alternativa.'
  - Se eligió una sintaxis comparativa directa con 'Como..., así es...' para respetar la estructura proverbial del hebreo.
