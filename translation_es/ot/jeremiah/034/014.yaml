  - severity: medium
    issue: Mezcla de distributivo plural con tratamiento singular repetido
    rationale: «Cada uno de ustedes ... a usted ... le haya servido ... de usted» es gramaticalmente posible, pero estilísticamente torpe en español. Se puede mantener la fidelidad con una redacción más fluida.
  - severity: low
