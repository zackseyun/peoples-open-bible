translation:
  language: es
  text: Teman a Yahvé, sus santos[a], porque a los que le temen no les falta nada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "sus consagrados". Hebreo: "sus santos" o "sus santos/consagrados".'
    reason: lexical_alternative
  - marker: b
    text: O "no carecen de nada".
    reason: lexical_alternative
lexical_decisions:
- source_word: יְר֣אוּ
  english_pob_choice: Fear
  chosen_spanish: Teman
  alternatives_spanish:
  - Reverencien
  - Tengan temor de
  lexicon: HALOT
  rationale: El imperativo plural de ירא pide en español un verbo fuerte y directo. 'Teman' conserva mejor la fuerza exhortativa y devocional que 'reverencien', que suaviza el mandato.
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El hebreo usa directamente el nombre divino. En el español de POB se mantiene 'Yahvé' para hacer visible el Tetragrámaton, no una máscara litúrgica.
- source_word: קְדֹשָׁיו
  english_pob_choice: his holy ones
  chosen_spanish: sus santos
  alternatives_spanish:
  - sus santos consagrados
  - sus seres santos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural con sufijo posesivo puede traducirse literalmente como 'santos'. En español bíblico, 'santos' mantiene la referencia al pueblo apartado de Dios, aunque 'santos' también puede sonar tradicional; aquí se conserva por transparencia y porque el auditorio lo entiende con naturalidad.
- source_word: אֵין מַחְסוֹר
  english_pob_choice: lack nothing
  chosen_spanish: no les falta nada
  alternatives_spanish:
  - no tienen ninguna falta
  - no carecen de nada
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y denota ausencia de necesidad o carencia. 'No les falta nada' suena natural en español y conserva el sentido completo sin arcaísmo.
- source_word: לִירֵאָיו
  english_pob_choice: for those who fear him
  chosen_spanish: a los que le temen
  alternatives_spanish:
  - para los que le temen
  - para quienes lo temen
  lexicon: HALOT
  rationale: El sustantivo verbal con sufijo se rinde con una subordinada natural en español. 'A los que le temen' mantiene el vínculo léxico con el imperativo inicial y la dirección personal del temor reverente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura auditada del proyecto para el Tetragrámaton es 'Yahweh'; en español se normaliza como 'Yahvé' por ser la forma coherente con la ortografía y pronunciación españolas del mismo nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de קְדֹשָׁיו
  english_pob_reading: his holy ones / his saints
  chosen_spanish_reading: sus santos
  alternative_spanish_readings:
  - sus santos [= sus consagrados]
  - sus personas santas
  rationale: 'No se borra la tensión entre ''holy ones'' y ''saints'': en español, ''santos'' conserva la ambivalencia entre categoría cultual y designación del pueblo apartado. Se evita ''santos'' como simple formulismo eclesiástico sin justificarlo, pero se retiene porque el contexto poético lo respalda.'
  doctrine_reference: 'DOCTRINE.md: Lexical transparency and ecclesial terminology'
- issue: Sentido de אֵין מַחְסוֹר
  english_pob_reading: lack nothing
  chosen_spanish_reading: no les falta nada
  alternative_spanish_readings:
  - no carecen de nada
  - no tienen carencia
  rationale: La frase hebrea expresa suficiencia total, no solo ausencia parcial de necesidad. 'No les falta nada' comunica esa plenitud en un español natural y bíblicamente claro.
  doctrine_reference: 'HALOT: מַחְסוֹר'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: el texto inglés permaneció sin cambios tras el último pase, y el veredicto general fue de alta concordancia con solo observaciones menores. No se requieren ajustes textuales adicionales en español más allá de las decisiones léxicas transparentes aquí registradas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la política española del proyecto para יהוה.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque el texto fuente lo presenta explícitamente.
  - '''Santos'' se usa en sentido bíblico de ''personas apartadas/consagradas'', no como denominación eclesiástica vacía.'
  - 'La estructura conserva el paralelismo: mandato + destinatarios + causal explicativa.'
