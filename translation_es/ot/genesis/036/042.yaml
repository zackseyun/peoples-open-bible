translation:
  language: es
  text: jefe Kenaz[a], jefe Teman, jefe Mibzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefe de clan» en cada caso de «jefe»; las versiones tradicionales suelen decir «duque».
