base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/004.yaml
  text: Then Moses called Mishael and Elzaphan[a], the sons of Uzziel, Aaron’s uncle, and said to them, “Come near[b]; carry your brothers away from before the sanctuary to outside the camp.”
  footnotes:
  - marker: a
    text: Hebrew 'your brothers' can refer more broadly to close male relatives; here it refers to Nadab and Abihu, who were their cousins.
    reason: lexical_alternative
  - marker: b
    text: Or 'from before the holy place.'
    reason: lexical_alternative
