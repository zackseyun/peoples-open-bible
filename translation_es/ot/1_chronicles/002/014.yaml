  rationale: Nombre propio; se translitera, no se traduce. En español bíblico conviene una forma sencilla y reconocible. "Netanel" conserva mejor la proximidad al hebreo que una adaptación fonética más libre.
- source_word: הָרְבִיעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - cuarto
  lexicon: HALOT
  rationale: El ordinal con artículo funciona aquí como marcador de orden en una lista genealógica. "El cuarto" mantiene la estructura del hebreo y su naturalidad en español.
- source_word: רַדַּי
  english_pob_choice: Raddai
  chosen_spanish: Radai
  alternatives_spanish:
  - Raddai
  lexicon: HALOT
  rationale: Nombre propio; se translitera. En español, la forma sin duplicación consonántica inicial resulta más fluida y sigue la convención transliterada habitual.
- source_word: הַחֲמִישִׁי
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - quinto
  lexicon: HALOT
  rationale: Paralelo de "el cuarto"; se conserva el artículo para reflejar la lista genealógica hebrea con claridad y simetría.
