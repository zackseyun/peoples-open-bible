revisions:
- from: 'Un oráculo: la palabra de Yahvé es contra la tierra de Hadrac[a], y Damasco es su lugar de reposo[d][c][b]; porque el ojo del hombre y de todas las tribus de Israel está vuelto hacia Yahvé.'
  to: 'Un oráculo: la palabra de Yahvé es contra la tierra de Hadrac[a], y Damasco es su lugar de reposo[d][b]; porque hacia Yahvé están vueltos el ojo del hombre[c] y el de todas las tribus de Israel.'
  rationale: La revisión mantiene todas las decisiones principales del source y del POB inglés, pero corrige una nota que sobreinterpretaba la ambigüedad del sufijo, mejora la naturalidad de la cláusula final sin abandonar «ojo», y alinea mejor la nota alternativa del encabezamiento con el audit trail inglés.
  reviewer_model: gpt-5.4
