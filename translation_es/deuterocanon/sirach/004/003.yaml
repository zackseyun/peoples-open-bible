translation:
  language: es
  text: No amargues las entrañas[a] del pobre, ni causes dolor al corazón del necesitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «las entrañas», es decir, el interior profundo o la vida emocional interna; el griego paralelo usa «corazón» como interpretación equivalente.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְמִיר
  english_pob_choice: embitter
  chosen_spanish: amargues
  alternatives_spanish:
  - amargues más
  - hagas más amarga
  - exasperes
  lexicon: HALOT
  rationale: El hebreo pide una acción que vuelve amarga o agria la condición interior; en español, "amargar" conserva mejor esa fuerza concreta que "entristecer" o "afligir". Mantiene la relación semántica con el paralelo griego, que habla de un corazón ya irritado o perturbado.
- source_word: מְעֵי
  english_pob_choice: inward parts
  chosen_spanish: el corazón
  alternatives_spanish:
  - las entrañas
  - el interior
  - las partes internas
  lexicon: HALOT
  rationale: Aunque el hebreo usa una imagen corporal concreta, el paralelo griego καρδίαν y el desarrollo poético del verso apuntan al centro emocional de la persona. En español, "corazón" es la forma más natural y fiel para expresar esa interioridad sin sonar forzado.
- source_word: דָךְ
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el pobre o abatido
  - el oprimido
  - el abatido
  lexicon: HALOT
  rationale: דך designa al quebrantado, pobre o abatido. "El pobre" reproduce con claridad la referencia social y humana del hebreo y mantiene el paralelismo con "el necesitado" del segundo hemistiquio.
- source_word: קֶרֶב
  english_pob_choice: heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el interior
  - el ser interior
  - el medio
  lexicon: HALOT
  rationale: El término se refiere al interior o centro de la persona; en este contexto, con el apoyo del griego καρδίαν, "corazón" comunica bien la vida afectiva e interior sin perder la fuerza del paralelismo poético.
- source_word: עָנִי
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el afligido
  - el humilde
  lexicon: HALOT
  rationale: עָנִי puede ser pobre, afligido o necesitado. "El necesitado" evita repetir exactamente "el pobre" y conserva la idea de dependencia y vulnerabilidad económica y social.
- source_word: תַּכְאִיב
  english_pob_choice: cause pain
  chosen_spanish: causes dolor
  alternatives_spanish:
  - hagas sufrir
  - lastimes
  - aflijas
  lexicon: HALOT
  rationale: El verbo causativo de כאב expresa hacer doler o causar dolor. "Causar dolor" es una correspondencia transparente y natural en español, con suficiente concreción para el mandato ético del verso.
theological_decisions:
- issue: Imagen hebrea concreta versus equivalente idiomático en español
  english_pob_reading: Preserve the first colon's concrete Hebrew image ('inward parts') while rendering the second colon idiomatically as 'heart.'
  chosen_spanish_reading: Unificar ambos hemistiquios con "corazón" para conservar la claridad y el paralelismo poético en español.
  alternative_spanish_readings:
  - '"entrañas" en el primer hemistiquio y "corazón" en el segundo'
  - '"interior" en ambos hemistiquios'
  rationale: La evidencia hebrea conserva una imaginería corporal muy concreta, pero en español "entrañas" en este contexto puede sonar arcaico o excesivamente crudo. Dado que el griego ya interpreta con καρδίαν y que la línea poética trata del sufrimiento interior del vulnerable, "corazón" ofrece una equivalencia pública, clara y fiel al sentido.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Representación de דך / עָנִי como dos matices de vulnerabilidad
  english_pob_reading: '''the poor'' / ''the needy'''
  chosen_spanish_reading: '"el pobre" / "el necesitado"'
  alternative_spanish_readings:
  - '"el pobre" / "el pobre"'
  - '"el abatido" / "el afligido"'
  rationale: El hebreo usa dos términos cercanos pero no idénticos. Mantener "pobre" y "necesitado" evita borrar el paralelismo y preserva el matiz social de cada miembro del verso, sin sobrecargar el español con sinónimos demasiado interpretativos.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se revisó el equilibrio entre el hebreo y el paralelo griego. La redacción final opta por un español claro y publicable que conserva el mandato ético y el paralelismo, sin depender mecánicamente del inglés auditado. No se identificaron cambios necesarios respecto de una lectura óptima de la evidencia base.
  spanish_consistency_notes:
  - Se mantuvo un registro reverente y bíblico, pero con español contemporáneo natural.
  - Se evitó "SEÑOR" y otros reemplazos no presentes en este versículo.
  - '"Corazón" se usa de forma consistente como centro interior/emocional, acorde con el paralelo griego.'
  - Se preservó la distinción entre "pobre" y "necesitado" para reflejar los dos términos hebreos cercanos pero no idénticos.
