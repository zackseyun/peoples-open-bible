translation:
  language: es
  text: Así los salvó[a] de la mano del que los odiaba, y los redimió[b] de la mano del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los libró» sería una posible alternativa para «los salvó»; el verbo hebreo puede denotar rescate de peligro.
    reason: lexical_alternative
  - marker: b
    text: «Los redimió» también podría traducirse «los rescató» o «los rescató mediante pago»; el hebreo lleva la idea de reclamar o liberar por intervención.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשִׁיעֵם
  english_pob_choice: saved them
  chosen_spanish: los salvó
  alternatives_spanish:
  - los libró
  - los rescató
  lexicon: HALOT
  rationale: יׁשׁע expresa rescate o salvación de un peligro real. «Salvar» en español conserva bien el sentido principal y la fuerza teológica del acto divino, sin perder naturalidad.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la «mano» como poder o dominio. En español, «de la mano de» mantiene esa imaginería y sigue siendo claro para el lector.
- source_word: שׂוֹנֵא
  english_pob_choice: the one who hated them
  chosen_spanish: el que los odiaba
  alternatives_spanish:
  - el odiador
  - el que los odia
  - los que los odiaban
  lexicon: HALOT
  rationale: El participio singular se vierte como una frase sustantiva singular. El pasado encaja con la secuencia narrativa del versículo y evita suavizar la referencia a un adversario concreto.
- source_word: וַיִּגְאָלֵם
  english_pob_choice: redeemed them
  chosen_spanish: los redimió
  alternatives_spanish:
  - los rescató
  - los reivindicó
  lexicon: HALOT
  rationale: גאל conserva el matiz de redención o reclamación mediante intervención. «Redimir» preserva mejor esa carga covenantal y poética que un verbo más genérico.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  - el opresor
  lexicon: HALOT
  rationale: El singular se mantiene en español con artículo definido, reflejando el paralelo con el primer miembro del verso y la figura hostil singular del hebreo.
theological_decisions:
- issue: Diferenciar los dos verbos de rescate sin fusionarlos en una sola idea
  english_pob_reading: Kept both as 'saved' and 'redeemed'
  chosen_spanish_reading: Se conservaron «salvó» y «redimió»
  alternative_spanish_readings:
  - «los libró... y los libró»
  - «los rescató... y los rescató»
  rationale: El hebreo usa dos verbos relacionados pero distintos. Mantener ambos en español preserva el paralelismo poético y evita borrar la matización entre salvación y redención.
  doctrine_reference: Salmo 106:10; filosofía de traducción de POB sobre paralelismo y precisión léxica
- issue: Decidir si explicitar el referente singular del enemigo/hater
  english_pob_reading: Singular hostile figure preserved
  chosen_spanish_reading: 'Se conservó el singular: «el que los odiaba» y «el enemigo»'
  alternative_spanish_readings:
  - 'pluralizar: «los que los odiaban» / «los enemigos»'
  rationale: El hebreo emplea participios singulares; en español se mantiene esa singularidad para no diluir la imagen de un poder opresor colectivo representado como figura singular.
  doctrine_reference: Psalms 106:10; criterio de fidelidad morfosintáctica
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se conservaron ambos verbos de rescate, la imaginería de «la mano de», y los singulares hostiles. No hubo revisiones posteriores que alteraran estas decisiones.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o perífrasis teológicas no presentes en el verso.
  - «Redimió» se mantiene como término más cargado que «rescató», en armonía con el valor de גאל.
  - La puntuación divide claramente los dos miembros paralelos del verso.
  - El pronombre objeto directo se coloca antes del verbo conforme al español natural y mantiene la referencia al pueblo de forma fluida.
