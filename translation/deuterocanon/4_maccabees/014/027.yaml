theological_decisions:
- issue: Meaning of σωτηρία in a martyrdom context
  chosen_reading: physical preservation/survival rather than spiritual salvation
  alternative_readings:
  - salvation
  rationale: The immediate context concerns the mother's response to the tortures of her children and whether she would seek their immediate rescue. Rendering σωτηρία as 'preservation' avoids importing soteriological claims the verse itself does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make.'
- issue: Force of φόβος θεοῦ
  chosen_reading: fear toward God, with reverential sense implicit
  alternative_readings:
  - reverence toward God
  - awe before God
  rationale: 'The Greek explicitly uses φόβος. Following the source text more closely preserves the moral and theological tension: maternal compassion is subordinated to piety.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
