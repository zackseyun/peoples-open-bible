translation:
  language: es
  text: Y avanzaron desde Nínive tres días de camino hasta el frente de la llanura de Baikteileth[a], y acamparon partiendo de Baikteileth, cerca del monte que está a la izquierda de la Alta Cilicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea griega de Swete, tal como se proporciona, se interrumpe en «ἐπʼ ἀρι-»; la traducción sigue la continuación estándar entendida como «a la izquierda de la Alta Cilicia».
    reason: textual_variant
lexical_decisions:
- source_word: ἐπῆλθον
  english_pob_choice: advanced
  chosen_spanish: avanzaron
  alternatives_spanish:
  - marcharon
  - fueron
  - se dirigieron
  lexicon: LSJ
  rationale: En contexto de desplazamiento de tropas o expedición, «avanzaron» comunica progreso ordenado sin añadir un matiz demasiado técnico que el griego no exige.
- source_word: ὁδὸν τριῶν ἡμερῶν
  english_pob_choice: a journey of three days
  chosen_spanish: un camino de tres días
  alternatives_spanish:
  - una jornada de tres días
  - un viaje de tres días
  lexicon: LSJ
  rationale: La expresión mide distancia por tiempo de viaje. «Un camino de tres días» conserva el valor idiomático con español natural; «jornada» también sería posible, pero puede sonar más literaria o regional.
- source_word: ἐπὶ πρόσωπον
  english_pob_choice: to the front of
  chosen_spanish: hasta la parte delantera de
  alternatives_spanish:
  - frente a
  - ante
  - hacia la parte frontal de
  lexicon: LSJ
  rationale: La imagen espacial literal del griego se conserva con una expresión clara en español. «Hasta la parte delantera de» evita suavizar el rasgo topográfico.
- source_word: πεδίου
  english_pob_choice: plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - el campo abierto
  lexicon: LSJ
  rationale: En un contexto geográfico, «llanura» es el equivalente más natural y preciso.
- source_word: Βαικτειλαίθ / Βαικτειλαὶθ
  english_pob_choice: Baikteileth
  chosen_spanish: Baikteileth
  alternatives_spanish:
  - Bekteileth
  - Baikteilat
  lexicon: transliteration
  rationale: Se conserva el nombre propio por transliteración, siguiendo la práctica del proyecto y la variación ortográfica del testimonio griego.
- source_word: ἐπεστρατοπέδευσαν
  english_pob_choice: they encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - establecieron campamento
  - acamparon militarmente
  - plantaron el campamento
  lexicon: LSJ
  rationale: «Acamparon» transmite de manera clara y sobria la acción de establecer campamento; el compuesto griego puede ser militar, pero el español no necesita forzar ese matiz si ya está claro por el contexto.
- source_word: ἀπὸ Βαικτειλαὶθ
  english_pob_choice: from Baikteileth
  chosen_spanish: desde Baikteileth
  alternatives_spanish:
  - de Baikteileth
  - a partir de Baikteileth
  lexicon: LSJ
  rationale: «Desde» reproduce bien ἀπό con valor de punto de partida o localización de procedencia en esta secuencia narrativa.
- source_word: πλησίον
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  - próximo a
  lexicon: LSJ
  rationale: «Cerca de» es la forma más natural y transparente en español contemporáneo.
- source_word: τοῦ ὄρους
  english_pob_choice: the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte
  lexicon: LSJ
  rationale: «Monte» suena más idiomático en español bíblico-geográfico que «montaña» y conserva la referencia topográfica del singular griego.
- source_word: τοῦ ἐπʼ ἀριστερὰς / τῆς ἄνω Κιλικίας
  english_pob_choice: that is at the left hand of upper Cilicia
  chosen_spanish: que está a la izquierda de la Alta Cilicia
  alternatives_spanish:
  - que está al lado izquierdo de la Alta Cilicia
  - que está a la izquierda de la Cilicia superior
  - al oeste de la Alta Cilicia
  lexicon: LSJ
  rationale: La frase griega conservada apunta a una localización direccional literal. «A la izquierda» mantiene esa imagen sin resolverla interpretativamente como «al oeste», y «Alta Cilicia» traduce τῆς ἄνω Κιλικίας con un registro geográfico natural en español.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: No aparece ninguna referencia al nombre divino en este versículo.
  chosen_spanish_reading: No se introduce ninguna forma teológica añadida.
  alternative_spanish_readings:
