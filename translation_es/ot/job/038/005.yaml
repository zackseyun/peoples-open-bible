translation:
  language: es
  text: ¿Quién puso sus medidas, si lo sabes, o quién extendió sobre ella un cordel[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una línea de medir» o «un cordel de medir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo para la pregunta retórica divina.
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - fijó
  - estableció
  lexicon: HALOT
  rationale: En español, 'puso' transmite bien la acción de asignar o determinar las medidas de algo en esta imagen de creación/arquitectura.
- source_word: מְמַדֶּיהָ
  english_pob_choice: its measurements
  chosen_spanish: sus medidas
  alternatives_spanish:
  - sus dimensiones
  - sus medidas exactas
  lexicon: HALOT
  rationale: '''Medidas'' comunica con naturalidad la idea de extensión cuantificada; conserva la imagen de medición sin sonar técnico en exceso.'
- source_word: כִּי תֵדָע
  english_pob_choice: if you know
  chosen_spanish: si tú sabes
  alternatives_spanish:
  - si lo sabes
  - pues tú sabes
  lexicon: HALOT
  rationale: 'Se sigue la revisión más literal del inglés auditado: una condición irónica/rhetórica. ''Tú'' conserva el énfasis del hebreo en el interlocutor.'
- source_word: נָטָה
  english_pob_choice: stretched
  chosen_spanish: extendió
  alternatives_spanish:
  - tendió
  - estiró
  lexicon: HALOT
  rationale: Para el gesto de trazar una línea de medición, 'extendió' es natural en español y preserva la acción espacial sin sonar demasiado coloquial.
- source_word: קָּו
  english_pob_choice: a line
  chosen_spanish: un cordel
  alternatives_spanish:
  - una línea
  - un cordón de medir
  - un cordel de medir
  lexicon: HALOT
  rationale: '''Cordel'' recupera mejor el valor concreto de instrumento de medida que ''línea'' en español, sin introducir una paráfrasis excesiva.'
- source_word: עָלֶיהָ
  english_pob_choice: upon it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre esto
  lexicon: HALOT
  rationale: Mantiene la relación espacial con la tierra implícita en el contexto, usando el femenino concordante con el antecedente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del auditable inglés: se prefirió una lectura literal de כִּי תֵדָע como condición (''si tú sabes'') en vez de una recreación idiomática más interpretativa. El español conserva esa literalidad sin añadir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el hebreo aquí no contiene el nombre divino en forma explícita.
  - Se preservó el paralelismo interrogativo de dos miembros.
  - '''Cordel'' se eligió como solución concreta y comprensible para קָּו; la nota conserva la alternativa más literal ''medidas exactas'' para מְמַדֶּיהָ.'
  - El pronombre femenino 'ella' sigue el antecedente implícito de la tierra en el contexto inmediato.
