revisions:
- from: Y expulsó de la tierra al resto de los[a] qedeshim que habían quedado en los días de Asa su padre.
  to: Y expulsó del país al resto de los prostitutos del culto[a] que habían quedado en los días de Asa su padre.
  rationale: Se reemplaza la transliteración opaca «qedeshim» por «prostitutos del culto», que comunica en español el sentido léxico documentado para קָדֵשׁ y coincide con la decisión principal de la POB inglesa. Se mantiene una nota breve para preservar la observación de que el término hebreo es masculino y refiere a práctica sexual cultual ilícita. También se ajusta «de la tierra» a «del país» para mayor naturalidad contextual en español bíblico contemporáneo.
