translation:
  language: es
  text: Y Jonatán y Simón y los que estaban con ellos se retiraron a Bet-basí[a] en el desierto, y reconstruyeron sus ruinas[b] y la fortificaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre de lugar transliterado; el griego presenta Βεθβασί. Se conserva la referencia geográfica sin traducir el topónimo.
    reason: source_note
  - marker: b
    text: También puede entenderse como «lo que había sido derribado de ella» o «sus partes demolidas». El español «sus ruinas» recoge el sentido contextual de restauración.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - se alejaron
  - se replegaron
  - se retiró
  lexicon: LSJ
  rationale: En un contexto narrativo de conflicto, ἐξεχώρησεν expresa salida o retirada desde un lugar. «Se retiraron» transmite una retirada sin cargarla con el matiz militar más fuerte de «se replegaron» ni con la idea de huida.
- source_word: οἱ μετʼ αὐτοῦ
  english_pob_choice: those with them
  chosen_spanish: los que estaban con ellos
  alternatives_spanish:
  - los que estaban con él
  - sus acompañantes
  lexicon: LSJ
  rationale: Aunque el griego tiene αὐτοῦ en singular, el sujeto coordinado incluye a Jonatán y Simón. En español, «con ellos» mantiene la referencia grupal de forma natural y sigue la decisión auditada del POB en inglés.
- source_word: Βεθβασί
  english_pob_choice: Beth-basi
  chosen_spanish: Bet-basí
  alternatives_spanish:
  - Beth-basi
  - Betbasi
  lexicon: LSJ
  rationale: Es un topónimo transliterado. «Bet-basí» adapta la forma al español y conserva la pronunciación aproximada sin traducir el nombre.
- source_word: τὴν ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/erial
  - que está en el desierto
  lexicon: LSJ
  rationale: ἔρημος suele corresponder a «desierto» o «desierto/soledad» en español bíblico. Aquí la frase funciona como ubicación identificadora del lugar, y «en el desierto» es claro y fiel.
- source_word: ᾠκοδόμησεν
  english_pob_choice: rebuilt
  chosen_spanish: reedificaron
  alternatives_spanish:
  - edificaron de nuevo
  - reconstruyeron
  lexicon: LSJ
  rationale: El contexto siguiente muestra que no se trata de construir por primera vez, sino de restaurar una estructura dañada. «Reedificaron» conserva esa fuerza de reconstrucción.
- source_word: τὰ καθηρημένα αὐτῆς
  english_pob_choice: its ruins
  chosen_spanish: sus ruinas
  alternatives_spanish:
  - lo derribado de ella
  - lo que había sido demolido en ella
  lexicon: LSJ
  rationale: La expresión plural neutra de καθαιρέω apunta a lo que fue derribado o demolido. «Sus ruinas» es una equivalencia natural en español y sigue la revisión inglesa que prefirió «ruins» frente a una fórmula más pesada.
- source_word: ἐστερέωσεν
  english_pob_choice: fortified
  chosen_spanish: la fortificaron
  alternatives_spanish:
  - la hicieron fuerte
  - la укрепaron
  - la aseguraron
  lexicon: LSJ
  rationale: En un contexto bélico, el verbo indica hacer más resistente o defensable un lugar. «La fortificaron» expresa bien esa idea y mantiene la relación con el sustantivo implícito del lugar.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al evitar un sujeto singular implícito en la segunda cláusula y al reflejar el plural neutro de τὰ καθηρημένα αὐτῆς con una solución plural en español («sus ruinas»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - «Bet-basí» se usa como transliteración consistente de Βεθβασί en esta perícopa.
  - Se prefirió «se retiraron» sobre «se replegaron» para evitar sobredeterminación militar no explicitada por el griego.
