translation:
  language: es
  text: Entonces Saúl convocó[a] a todo el pueblo para la guerra, para bajar a Queila, para sitiar a David y a sus hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reunió a todo el pueblo para la batalla». El verbo hebreo puede significar «hacer oír», y en este contexto probablemente se refiere a convocar o reunir al pueblo para una acción militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁמַּע
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - musterió
  - reunió
  lexicon: HALOT
  rationale: El hifil de שׁמע puede expresar hacer oír / hacer comparecer, y en contexto militar-administrativo implica reunir a la población para una acción de guerra. «Convocó» comunica bien esa iniciativa de reunir gente para un propósito militar sin forzar un calco técnico.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  - todas las tropas
  lexicon: HALOT
  rationale: Se conserva el alcance literal de «todo el pueblo». Aunque el contexto es militar, el hebreo no dice explícitamente «ejército»; por eso se evita reemplazarlo por una equivalencia más interpretativa.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para batalla
  - a la guerra
  lexicon: HALOT
  rationale: En español, «para la guerra» suena natural y conserva el sentido de finalidad militar. «Batalla» sería demasiado estrecho para la movilización general que expresa el texto.
- source_word: לָרֶדֶת
  english_pob_choice: to go down
  chosen_spanish: para descender
  alternatives_spanish:
  - para bajar
  - para ir a
  lexicon: HALOT
  rationale: Se mantiene la imagen direccional del hebreo con «descender», que es fiel y plenamente inteligible en español bíblico. No se suaviza a «ir a» para no perder la noción espacial.
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Queila
  alternatives_spanish:
  - Keila
  - Quelila
  lexicon: tradicional transliteration adapted to Spanish
  rationale: Se adapta la transliteración al español con ortografía fluida («Queila») sin alterar el referente geográfico. Esto favorece la lectura pública y la pronunciación hispana.
- source_word: לָצוּר
  english_pob_choice: to besiege
  chosen_spanish: para sitiar
  alternatives_spanish:
  - para asediar
  - para poner sitio a
  lexicon: HALOT
  rationale: «Sitiar» reproduce el sentido militar de «poner sitio» con naturalidad en español. Es equivalente al valor contextual de צור en este pasaje.
- source_word: אֶל דָּוִד וְאֶל אֲנָשָׁיו
  english_pob_choice: David and his men
  chosen_spanish: a David y a sus hombres
  alternatives_spanish:
  - contra David y contra sus hombres
  - hacia David y hacia sus hombres
  lexicon: HALOT
  rationale: Aunque אֶל literalmente es «a/toward», con «sitiar» el español expresa el objetivo del ataque sin repetir preposición. Se mantiene «a David y a sus hombres» porque el hebreo nombra el blanco de la acción y «sus hombres» conserva la formulación sencilla del original.
theological_decisions:
- issue: El verbo hebreo puede significar tanto 'hacer oír' como 'convocar/reunir' en un contexto militar.
  english_pob_reading: '''summoned'' with note that the verb can mean ''caused to hear'' and likely refers to calling the people together for military action.'
  chosen_spanish_reading: «convocó» en el texto principal, sin perder el matiz de movilización militar.
  alternative_spanish_readings:
  - hizo oír a todo el pueblo
  - musterió a todo el pueblo
  rationale: 'No hay disputa doctrinal, pero sí una tensión lexical importante: el hebreo es más amplio que «llamar». «Convocó» transmite la acción de reunir para la guerra y permite explicar en nota que el verbo hebreo subyace con el matiz de hacer comparecer / reunir.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés sin introducir una interpretación nueva. Se conservaron la movilización militar, el movimiento descendente a Queila y el asedio dirigido contra David y sus hombres. No se detectaron revisiones textuales relevantes en el expediente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «convocó» frente a «llamó» para evitar ambigüedad en un contexto militar.
  - «Queila» adapta el topónimo al español y se mantiene consistente con transliteración hispana estándar.
  - No se añadió lenguaje eclesiástico; el registro es narrativo y bíblico, de lectura pública.
