    rationale: Las notas deben preservar alternativas reales o aclaraciones necesarias. Si el texto dice 'Sus polluelos', no tiene sentido una nota que diga 'O “sus polluelos”'.
  - severity: high
    issue: '''los muertos'' debilita el matiz de חֲלָלִים.'
    rationale: El hebreo enfatiza personas muertas violentamente, no simplemente 'muertos'. 'Los caídos' preserva mejor la fuerza poética y el expediente inglés.
  - severity: medium
    issue: '''allí está él'' suena poco natural y sobreinterpreta el pronombre para un ave genérica.'
    rationale: El hebreo שָׁם הוּא puede representarse en español con 'allí está' sin añadir un 'él' marcado. El expediente inglés explicó que el referente es el ave en descripción genérica, no una personificación fuerte que exija 'él'.
  - severity: low
    issue: Falta una nota útil sobre la viveza de יְעַלְעוּ si se quiere conservar la alternativa auditada.
    rationale: El expediente inglés documenta 'suck up / lap up / gulp' como campo semántico vívido. En español, una nota en 'chupan' puede preservar esa amplitud mejor que la nota actual sobre 'polluelos'.
