review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: David da una orden de reunir a los גרים en la tierra de Israel y asigna trabajadores para labrar piedra destinada a la casa de Dios. Conserva adecuadamente «la tierra de Israel» y «la casa de Dios». Sin embargo, el anclaje de notas no sigue bien la lógica del inglés auditado: la nota sobre «el templo» debe anclarse a «la casa de Dios», mientras que la nota sobre alternativas de «piedras labradas» debe ir en esa frase, no en «reunir».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Mandó reunir», «canteros» y «piedras labradas» funcionan bien. La principal mejora necesaria está en las notas: una nota contiene el anglicismo no traducido «sojourners», impropio para una edición bíblica en español, y la colocación de los marcadores conviene ajustarse al referente correcto. También es preferible «residentes extranjeros» o «extranjeros residentes» como alternativa española plenamente traducida.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Dios» para אֱלֹהִים y «casa de Dios» para בֵּית הָאֱלֹהִים están bien alineados. «Extranjeros» para גרים es aceptable con nota explicativa. No intervienen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος.
  issues:
  - severity: medium
    issue: La nota [a] usa el anglicismo «sojourners».
    rationale: La política exige español legible y eclesial; dejar una alternativa en inglés dentro de la nota española rompe la calidad y no sirve al lector meta. Debe sustituirse por una opción española como «forasteros» o «residentes extranjeros».
  - severity: medium
    issue: Los marcadores de nota están mal distribuidos respecto al contenido auditado.
    rationale: En el texto inglés, la nota de identificación «That is, the temple» corresponde a «the house of God», no a «foreigners» o al verbo de reunir. En español, conviene anclar la nota del templo en «la casa de Dios» y la nota léxica de piedras en «piedras labradas».
  revised_spanish_text: Y David mandó reunir a los extranjeros[a] que estaban en la tierra de Israel, y puso a canteros para cortar piedras labradas[b] con el fin de edificar la casa de Dios[c].
  revised_footnotes:
  - marker: a
    text: O «los forasteros» o «los residentes extranjeros». El hebreo se refiere a no israelitas que vivían en la tierra.
    reason: lexical_alternative
  - marker: b
    text: O «piedras cortadas» o «piedras labradas».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el templo.
    reason: cross_reference
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrigen las notas para mantener español íntegramente traducido y para alinear mejor los marcadores con sus referentes semánticos y con el rastro de auditoría del POB inglés.
