id: PHP.4.5
reference: Philippians 4:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ ἐπιεικὲς ὑμῶν γνωσθήτω πᾶσιν ἀνθρώποις. ὁ κύριος ἐγγύς·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/005.yaml
  text: Let your graciousness be known to all people. The Lord is near.
translation:
  language: ko
  text: 여러분의 너그러움[a]이 모든 사람에게 알려지게 하십시오. 주께서 가까이 계십니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「온유함」 「관용」 「합당한 분별」. 헬라어 ἐπιεικές는 단지 부드러운 기질이 아니라, 자기 권리를 양보하면서 타인을 배려하는 너그럽고 합당한 태도를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「주께서 가까이 계신다」는 임재의 가까움일 수도, 재림의 임박일 수도, 두 의미 모두일 수도 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιεικές
  english_pob_choice: graciousness
  chosen_korean: 너그러움
  alternatives_korean:
  - 온유함
  - 관용
  - 합당한 분별
  lexicon: BDAG
  rationale: ἐπιεικές는 자기 권리를 양보하고 상대를 배려하는 윤리적 너그러움을 뜻한다. 「온유함」은 한국 교회 전통에서 πραΰτης와 겹쳐 쓰이며 기질에 치우치므로, 더 넓은 「너그러움」을 택해 영어 POB의 graciousness 결정을 한국어에서도 보존한다.
- source_word: γνωσθήτω
  english_pob_choice: be known
  chosen_korean: 알려지게 하십시오
  alternatives_korean:
  - 알려지게 하라
  - 드러나게 하십시오
  lexicon: BDAG
  rationale: 부정과거 수동 명령형을 합쇼체 사역 표현으로 옮겨 명령의 힘과 수동의 형식을 함께 살린다.
- source_word: πᾶσιν ἀνθρώποις
  english_pob_choice: to all people
  chosen_korean: 모든 사람에게
  alternatives_korean:
  - 모든 이에게
  - 만인에게
  lexicon: BDAG
  rationale: 포용적 보편 지시. 「모든 사람」은 자연스럽고 성별 중립적이다.
- source_word: ὁ κύριος
  english_pob_choice: The Lord
  chosen_korean: 주께서
  alternatives_korean:
  - 주님께서
  lexicon: BDAG
  rationale: 본 번역의 κύριος 기본 옮김. 합쇼체 문맥에서 「주께서」가 가장 자연스럽다.
- source_word: ἐγγύς
  english_pob_choice: near
  chosen_korean: 가까이 계십니다
  alternatives_korean:
  - 가까우십니다
  - 곧 오십니다
  lexicon: BDAG
  rationale: 헬라어가 의도적으로 열어 둔 공간적·시간적 모호성을 「가까이 계십니다」로 보존한다. 임재(곁에 계심)와 재림(곧 오심)의 양가성을 한국어에서도 어느 한쪽으로 좁히지 않는다.
theological_decisions:
- issue: ὁ κύριος ἐγγύς의 의미 범위
  chosen_reading: '공간·시간 양가성 보존: 「주께서 가까이 계십니다」'
  alternative_readings:
  - 곁에 계심(임재)
  - 곧 오심(재림)
  rationale: 헬라어 표현이 두 의미를 모두 자연스럽게 허용하므로, 본문에서는 긴장을 좁히지 않고 양쪽 해석의 가능성을 함께 살린다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
