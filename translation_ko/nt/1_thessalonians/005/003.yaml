id: 1TH.5.3
reference: 1 Thessalonians 5:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀ὅταν λέγωσιν· Εἰρήνη καὶ ἀσφάλεια, τότε αἰφνίδιος αὐτοῖς ἐφίσταται ὄλεθρος ὥσπερ ἡ ὠδὶν τῇ ἐν γαστρὶ ἐχούσῃ, καὶ οὐ μὴ ἐκφύγωσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/003.yaml
  text: When they say[a], “Peace and security,” then sudden destruction comes upon them, like labor pains upon a pregnant woman[c][b], and they will certainly not escape.
  footnotes:
  - marker: a
    text: Or “Peace and safety.”
    reason: lexical_alternative
  - marker: b
    text: Or “birth pains.”
    reason: lexical_alternative
  - marker: c
    text: 'Greek has an emphatic negation: “they will by no means escape.”'
    reason: lexical_alternative
translation:
  language: ko
  text: 사람들이 「평안과 안전[a]」이라고 말할 그때, 갑작스러운 멸망이 그들에게 임할 것이며, 마치 임산부에게 산고[b]가 닥치는 것 같아서 그들이 결코[c] 피하지 못할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「평화와 안녕」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「해산의 진통」.
    reason: lexical_alternative
  - marker: c
    text: 헬라어는 강조 부정 어법 「결코 피하지 못할 것이다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰρήνη καὶ ἀσφάλεια
  english_pob_choice: Peace and security
  chosen_korean: 평안과 안전
  alternatives_korean:
  - 평화와 안녕
  - 평강과 보장
  lexicon: BDAG
  rationale: 본 어구는 로마 제국의 정치적 표어를 반향할 가능성이 큰 짝지어진 표현. 「평안과 안전」이 한국어로 자연스럽다.
- source_word: αἰφνίδιος ... ὄλεθρος
  english_pob_choice: sudden destruction
  chosen_korean: 갑작스러운 멸망
  alternatives_korean:
  - 돌연한 파멸
  - 갑작스러운 파멸
  lexicon: BDAG
  rationale: ὄλεθρος의 「멸망·파멸」을 「멸망」으로 옮긴다. 한국 교회 전통의 표준 어휘.
- source_word: ὥσπερ ἡ ὠδὶν τῇ ἐν γαστρὶ ἐχούσῃ
  english_pob_choice: like labor pains upon a pregnant woman
  chosen_korean: 마치 임산부에게 산고가 닥치는 것 같아서
  alternatives_korean:
  - 해산의 진통이 잉태한 여인에게 임하듯이
  - 산통이 산모에게 다가오듯이
  lexicon: BDAG
  rationale: ὠδίν의 「산고」를 보존한다. 「임산부」는 현대 한국어로 자연스럽다.
