translation:
  language: es
  text: Pero cuando juraron que no sabían dónde estaba el hombre buscado,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dónde está el que se busca». El griego usa un participio sustantivado y, dentro del discurso referido, un presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δὲ μεθʼ ὅρκων φασκόντων
  english_pob_choice: when they swore
  chosen_spanish: cuando juraron
  alternatives_spanish:
  - mientras afirmaban con juramento
  - cuando afirmaban bajo juramento
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto con φασκόντων introduce una acción circunstancial. En español, «cuando juraron» transmite con naturalidad el acto solemne de hablar bajo juramento, preservando la fuerza de μεθʼ ὅρκων sin una perífrasis pesada.
- source_word: μὴ γινώσκειν
  english_pob_choice: did not know
  chosen_spanish: que no sabían
  alternatives_spanish:
  - que no conocían
  - que ignoraban
  lexicon: LSJ
  rationale: El infinitivo depende del verbo de decir y expresa el contenido de la afirmación. En español, la subordinada «que no sabían» refleja bien la negación del conocimiento sin añadir matices ajenos.
- source_word: ποῦ ποτʼ ἐστὶν
  english_pob_choice: where ... was
  chosen_spanish: dónde estaba
  alternatives_spanish:
  - dónde está
  - exactamente dónde estaba
  lexicon: LSJ
  rationale: Aunque el griego usa presente, en español el discurso indirecto en pasado pide normalmente «estaba». No se añade el matiz intensivo de ποτʼ en el texto principal porque no exige una ampliación idiomática.
- source_word: ὁ ζητούμενος
  english_pob_choice: the man being sought
  chosen_spanish: el hombre que se buscaba
  alternatives_spanish:
  - el que se buscaba
  - el hombre buscado
  lexicon: LSJ
  rationale: El participio sustantivado expresa a una persona buscada. «El hombre que se buscaba» conserva el sentido pasivo y resulta natural en español; «el hombre buscado» es posible, pero puede sonar más resumido y menos narrativo.
translation_notes:
  revision_awareness: El griego de 2 Macabeos 14:32 presenta una construcción circunstancial con juramento, seguida de una afirmación negada sobre el desconocimiento del paradero del buscado. No hubo revisiones aplicadas en el audit trail inglés; la redacción española busca conservar esa relación sintáctica y la tensión entre el presente griego del discurso indirecto y el pasado natural del español.
  spanish_consistency_notes:
  - Se usa «juraron» para μεθʼ ὅρκων siguiendo el valor idiomático de juramento explícito.
  - Se mantiene «se buscaba» para reflejar el participio sustantivado ζητούμενος con voz pasiva.
  - La nota a pie de página conserva la alternativa de presente («está») que el griego permite dentro del discurso referido.
