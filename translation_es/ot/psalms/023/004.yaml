translation:
  language: es
  text: Aunque camine por el valle de profunda oscuridad[a], no temeré mal alguno, porque tú estás conmigo; tu vara y tu bastón—ellos me consuelan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sombra de la muerte». El hebreo puede designar una oscuridad muy densa, con posibles matices de muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם כִּי
  english_pob_choice: Even though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Incluso si
  - Aun cuando
  lexicon: HALOT
  rationale: La construcción es concesiva; en español, «aunque» expresa de manera natural la relación de contraste sin añadir matices ajenos al hebreo.
- source_word: אֵלֵךְ
  english_pob_choice: I walk
  chosen_spanish: camine
  alternatives_spanish:
  - camino
  - fuera a caminar
  lexicon: HALOT
  rationale: El imperfecto hebreo en un contexto poético expresa una acción progresiva o general. En español, el subjuntivo en la cláusula concesiva con «aunque» comunica bien esa situación hipotética o general sin perder vividez.
- source_word: בְּגֵיא
  english_pob_choice: through the valley
  chosen_spanish: por el valle
  alternatives_spanish:
  - en el valle
  - a través del valle
  lexicon: HALOT
  rationale: «Por el valle» suena natural en español con un verbo de desplazamiento y mantiene la imagen del tránsito dentro del paisaje.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: profunda oscuridad
  alternatives_spanish:
  - oscuridad de muerte
  - sombra de muerte
  lexicon: HALOT
  rationale: La frase hebrea puede referirse a oscuridad muy intensa, con posibles resonancias de muerte. «Profunda oscuridad» sigue la decisión léxica principal del POB en inglés y evita fijar el sentido exclusivamente en la muerte; se preserva la alternativa tradicional en nota.
- source_word: לֹא אִירָא רָע
  english_pob_choice: I will fear no evil
  chosen_spanish: no temeré mal alguno
  alternatives_spanish:
  - no temeré el mal
  - no temeré ningún peligro
  lexicon: HALOT
  rationale: «Mal alguno» conserva la amplitud de רָע, que puede abarcar mal, daño o peligro, sin estrechar el poema a un solo matiz.
- source_word: כִּי אַתָּה עִמָּדִי
  english_pob_choice: for you are with me
  chosen_spanish: porque tú estás conmigo
  alternatives_spanish:
  - pues tú estás conmigo
  - porque tú me acompañas
  lexicon: HALOT
  rationale: «Porque» expresa claramente la base del temor vencido. «Estás conmigo» mantiene la cercanía personal del hebreo.
- source_word: שִׁבְטְךָ
  english_pob_choice: your rod
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu cetro
  lexicon: HALOT
  rationale: En el marco pastoril, la vara es el equivalente más natural de «rod». «Cetro» introduciría una imagen real que aquí no es primaria.
- source_word: וּמִשְׁעַנְתֶּךָ
  english_pob_choice: your staff
  chosen_spanish: tu bastón
  alternatives_spanish:
  - tu apoyo
  - tu vara de apoyo
  lexicon: HALOT
  rationale: Para el paralelo pastoril, «bastón» comunica bien la función de sostén. Aunque «staff» podría traducirse por «vara», aquí se distingue del término previo para conservar la paridad poética y la imagen de apoyo.
- source_word: יְנַחֲמֻנִי
  english_pob_choice: comfort me
  chosen_spanish: me consuelan
  alternatives_spanish:
  - me confortan
  - me dan ánimo
  lexicon: HALOT
  rationale: «Consolar» recoge el valor de alivio y fortaleza del verbo en este contexto. El plural verbal queda reflejado de manera natural con el sujeto compuesto «tu vara y tu bastón».
theological_decisions:
- issue: Sentido de צַלְמָוֶת en una expresión tradicional muy conocida
  english_pob_reading: deep darkness, with possible overtones of death
  chosen_spanish_reading: profunda oscuridad, con posibles resonancias de muerte
  alternative_spanish_readings:
  - sombra de muerte
  - oscuridad mortal
  rationale: La traducción principal sigue la decisión del POB en inglés de no fijar el término únicamente como una referencia a la muerte. La nota preserva la alternativa tradicional, útil por su peso litúrgico y por la historia interpretativa del versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre la vara y el bastón como instrumentos de consuelo
  english_pob_reading: your rod and your staff—they comfort me
  chosen_spanish_reading: tu vara y tu bastón me consuelan
  alternative_spanish_readings:
  - tu vara y tu cayado me consuelan
  - tu vara y tu apoyo me consuelan
  rationale: Se mantiene la lectura pastoral concreta del texto, sin espiritualizar prematuramente los objetos. El consuelo proviene de la presencia y guía del pastor, expresada mediante herramientas reales de cuidado.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente indicada: no se requieren cambios respecto del pass actual; la propuesta mantiene la decisión del inglés POB de traducir צַלְמָוֶת como «deep darkness» y conserva la alternativa tradicional en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el Tetragrámaton; aquí no aparece porque el versículo usa lenguaje de segunda persona hacia Dios.
  - Se distinguió la funcionalidad de «vara» y «bastón» para reflejar el paralelismo hebreo de שִׁבְטְךָ / מִשְׁעַנְתֶּךָ.
  - Se evitó «SEÑOR» y otras máscaras litúrgicas, conforme al criterio del proyecto.
  - 'La concordancia verbal de «me consuelan» sigue el sujeto plural del hebreo: «tu vara y tu bastón».'
