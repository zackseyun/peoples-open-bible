translation:
  language: es
  text: 'Entonces le dijeron: «¿Dónde está Sara, tu esposa?» Y él dijo: «Allí, en la tienda».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse como una respuesta puramente locativa: «Allí, en la tienda».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then they said
  chosen_spanish: Entonces le dijeron
  alternatives_spanish:
  - Y le dijeron
  - Luego le dijeron
  lexicon: HALOT
  rationale: El wayyiqtol marca continuación narrativa; «Entonces» conserva la secuencia con naturalidad en español. Se mantiene el dativo «le» para el destinatario implícito del diálogo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo de 3ms indica dirección hacia Abraham. En español, el complemento indirecto clítico resulta más natural que repetir «a él».
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se encuentra
  - ¿Dónde queda
  lexicon: HALOT
  rationale: La partícula interrogativa pide ubicación; en español normalmente se expresa con el verbo copulativo «estar» para una localización concreta.
- source_word: שָׂרָה
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre propio, sin cambiar la identidad del referente.
- source_word: אִשְׁתֶּךָ
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  - tu mujer y esposa
  lexicon: HALOT
  rationale: El sustantivo en estado constructo con sufijo de 2ms significa literalmente «tu mujer/esposa». «Esposa» preserva el vínculo conyugal y es claro en español moderno.
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces él dijo
  - Y respondió
  lexicon: HALOT
  rationale: Se conserva la repetición narrativa del verbo decir. «Él» explicita el sujeto retomado por el hebreo verbal, sin sobrecargar el texto.
- source_word: הִנֵּה
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: En este contexto locativo, הִנֵּה funciona deícticamente. «Allí» reproduce la respuesta breve y espacial sin arcaísmo.
- source_word: בָאֹהֶל
  english_pob_choice: in the tent
  chosen_spanish: en la tienda
  alternatives_spanish:
  - dentro de la tienda
  - en el campamento
  lexicon: HALOT
  rationale: אֹהֶל designa una tienda/carp. En este relato patriarcal, «tienda» es la equivalencia natural y precisa; «en la tienda» mantiene la concisión del hebreo.
translation_notes:
  revision_awareness: Se atendió la revisión del audit trail que prefirió conservar la concisión de הִנֵּה con una deíxis breve («There» → «Allí») en vez de suplir un sujeto verbal. El español mantiene esa brevedad y la estructura dialogal directa del hebreo, sin expandir innecesariamente la respuesta.
  spanish_consistency_notes:
  - Se usa «Sara» para el nombre propio, coherente con el uso español corriente.
  - Se eligió «tienda» para אֹהֶל por fidelidad contextual al entorno patriarcal y para conservar la imagen narrativa.
  - Se mantuvo la secuencia narrativa con «Entonces» y «Y», evitando una paráfrasis más explicativa.
