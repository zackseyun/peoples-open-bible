lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: We
  chosen_spanish: Nosotros
  alternatives_spanish:
  - Nosotros mismos
  - Nosotros
  lexicon: BDAG
  rationale: El pronombre explícito en griego aporta énfasis o contraste. En español, «Nosotros» conserva esa fuerza de sujeto expreso sin volver la frase pesada; «nosotros mismos» sobretraduciría el énfasis.
- source_word: ἀγαπῶμεν
  english_pob_choice: love
  chosen_spanish: amamos
  alternatives_spanish:
  - amamos
  - estamos amando
  lexicon: BDAG
  rationale: Aunque la forma griega puede leerse como presente, en este contexto la relación causal y el paralelismo con el amor divino favorecen un presente simple en español. «Amamos» mantiene la conexión léxica con ἀγαπάω/ἀγάπη y suena natural.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce causa; «porque» expresa con claridad que nuestro amor se fundamenta en el amor previo de Dios. «Pues» o «ya que» son posibles, pero menos directos.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, pero en español «él» basta para referirse a Dios en el contexto. «Él mismo» preservaría más explícitamente el énfasis, aunque haría la línea más pesada.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - primero
  - antes
  lexicon: BDAG
  rationale: 'La idea es de prioridad temporal: su amor precede al nuestro. «Primero» es la forma más natural y directa en español.'
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amó
  - ha amado
  lexicon: BDAG
  rationale: El aoristo comunica una acción decisiva ya realizada; en español, el pretérito perfecto simple «amó» lo expresa con fidelidad y sin añadir matices aspectuales no requeridos.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - nos
  - a nosotros
  lexicon: BDAG
  rationale: Objeto directo pronominal normal en español. «Nos» es conciso y mantiene la fluidez; «a nosotros» sería más enfático, pero menos natural aquí.
theological_decisions:
- issue: Objeto omitido de «amamos»
  english_pob_reading: 'Leave the object unstated: ''We love'''
  chosen_spanish_reading: 'Dejar el objeto implícito: «Nosotros amamos»'
  alternative_spanish_readings:
  - Nosotros lo amamos
  - Nosotros amamos a Dios
  rationale: El texto griego recibido no añade objeto explícito para ἀγαπῶμεν. Siguiendo la primacía del original, el español debe conservar esa apertura y no resolverla por la tradición textual posterior.
  doctrine_reference: Translation philosophy §1 (primacía del original), §3 (preservar la tensión textual)
- issue: Lectura textual variante sobre el objeto de 'amamos'
  english_pob_reading: Some manuscripts read, 'We love him because he first loved us.'
  chosen_spanish_reading: 'Algunos manuscritos leen: «Amamos a él porque él nos amó primero»'
  alternative_spanish_readings:
  - Amamos a Dios porque él nos amó primero
  - Nosotros lo amamos porque él nos amó primero
  rationale: La nota debe conservar la variante textual documentada sin incorporarla al texto principal. En español, la variante se expresa de forma literal y suficientemente clara, sin desplazar la lectura corta del SBLGNT.
  doctrine_reference: Crítica textual y fidelidad al testimonio manuscrito
translation_notes:
  revision_awareness: El borrador sigue la lectura breve del SBLGNT y mantiene la decisión auditada del POB inglés de no suplir el objeto de ἀγαπῶμεν en el texto principal. Se conserva la nota de variante textual en forma equivalente en español.
  spanish_consistency_notes:
  - Se usa «amó» para ἠγάπησεν, manteniendo el valor de acto decisivo pasado.
  - Se evita «Cristo» o «SEÑOR» porque el contexto refiere a Dios sin necesidad de sustitución terminológica.
  - «Porque» traduce la relación causal de ὅτι sin debilitarla.
  - El pronombre explícito inicial «Nosotros» conserva el énfasis del sujeto griego.
