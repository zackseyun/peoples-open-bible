translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Tan cierto como que vivo[a], ciertamente mi juramento que él menospreció y mi alianza que quebrantó, los pondré sobre su propia cabeza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: “mi juramento con maldición”; el hebreo puede designar un juramento que lleva una sanción de maldición por su violación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la conclusión inferencial del juicio, con un conector natural y solemne en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Conserva la fórmula profética clásica sin sonar forzada en español moderno.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé Dios
  - el Señor Dios Yahvé
  lexicon: HALOT
  rationale: Se conserva el título doble con el nombre divino explícito 'Yahvé', conforme al criterio del proyecto para יְהוָה.
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: ¡Vivo yo!
  alternatives_spanish:
  - Vivo yo
  - Tan cierto como que vivo
  lexicon: HALOT
  rationale: Expresa el juramento divino con la misma fuerza directa y solemne; el orden enfático funciona bien en español bíblico actual.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - de veras
  - sin duda
  lexicon: HALOT
  rationale: En contexto de juramento, la construcción no es condicional sino enfática; 'ciertamente' transmite bien esa certeza.
- source_word: אָֽלָתִי
  english_pob_choice: my oath
  chosen_spanish: mi juramento
  alternatives_spanish:
  - mi maldición-juramento
  - mi juramento sancionado con maldición
  lexicon: HALOT
  rationale: Se eligió 'juramento' como equivalente natural y claro; el matiz de maldición punitiva queda potencialmente disponible, pero no se hizo central en el texto principal.
- source_word: בָּזָה
  english_pob_choice: he despised
  chosen_spanish: menospreció
  alternatives_spanish:
  - despreció
  - tuvo en poco
  lexicon: HALOT
  rationale: '''Menospreció'' comunica el desprecio con tono bíblico natural y evita una repetición excesiva de ''despreciar''.'
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '''Pacto'' conserva el sentido jurídico-relacional del hebreo en un registro claro para español bíblico.'
- source_word: הֵפִיר
  english_pob_choice: he broke
  chosen_spanish: quebrantó
  alternatives_spanish:
  - rompió
  - violó
  lexicon: HALOT
  rationale: '''Quebrantó'' mantiene el peso formal de la infracción covenantal y suena natural en este contexto profético.'
- source_word: וּנְתַתִּיו
  english_pob_choice: I will place them
  chosen_spanish: los pondré
  alternatives_spanish:
  - los colocaré
  - los haré recaer
  lexicon: HALOT
  rationale: El verbo hebreo conserva una imagen concreta de poner/colocar; 'los pondré' sigue el auditable inglés revisado en plural.
- source_word: בְּרֹאשׁוֹ
  english_pob_choice: on his own head
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - en su cabeza
  - sobre la cabeza de él mismo
  lexicon: HALOT
  rationale: Reproduce el idiomatismo de responsabilidad y retribución, haciendo explícita la reflexividad con 'propia'.
theological_decisions:
- issue: Forma del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: La versión española no enmascara el Tetragrámaton; se sigue el criterio del proyecto de renderizar יְהוָה como 'Yahvé', manteniendo el título 'Señor' para אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אָלָה en contexto de juramento violado
  english_pob_reading: my oath
  chosen_spanish_reading: mi juramento
  alternative_spanish_readings:
  - mi maldición
  - mi juramento con maldición
  rationale: La cláusula se centra en la obligación jurada quebrantada; 'juramento' es la opción principal, mientras que el matiz de maldición queda como tensión léxica reconocida.
  doctrine_reference: HALOT / contexto inmediato de alianza y juramento
translation_notes:
  revision_awareness: 'Se integró la revisión más reciente del audit trail: el objeto final aparece en plural en español (''los pondré'') para reflejar tanto ''mi juramento'' como ''mi pacto'', en consonancia con la corrección inglesa de ''it'' a ''them''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה y 'Señor' para אֲדֹנָי, sin reemplazar por una convención de ocultamiento.
  - Se eligió 'pacto' para בְּרִית y 'juramento' para אָלָה para preservar la distinción léxica documentada.
  - El cierre 'sobre su propia cabeza' conserva el sentido idiomático de retribución personal sin explicitar una paráfrasis interpretativa adicional.
