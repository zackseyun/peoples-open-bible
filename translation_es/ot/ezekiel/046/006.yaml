translation:
  language: es
  text: Y el día de la luna nueva[a], habrá un novillo sin defecto, y seis corderos y un carnero; serán sin defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el día del mes»; en este contexto cultual, la expresión se refiere a la observancia de la luna nueva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/י֣וֹם הַ/חֹ֔דֶשׁ
  english_pob_choice: And on the day of the new moon
  chosen_spanish: Y en el día de la luna nueva
  alternatives_spanish:
  - Y en el día del mes
  - Y en el día de la festividad de la luna nueva
  lexicon: HALOT
  rationale: En contexto cultual, בְּיוֹם הַחֹדֶשׁ se refiere a la observancia de la luna nueva, no a cualquier día del mes. «Luna nueva» comunica bien el sentido calendárico y sacrificial en español actual.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: an unblemished young bull from the herd
  chosen_spanish: un becerro sin defecto
  alternatives_spanish:
  - un toro joven sin defecto
  - un becerro de la vacada sin defecto
  lexicon: HALOT
  rationale: La expresión sacrificial apunta a un animal joven del ganado vacuno. «Becerro» es natural en español bíblico y conserva la especificidad cultual; «sin defecto» traduce תְּמִימִם con claridad sacrificial.
- source_word: תְּמִימִם
  english_pob_choice: unblemished
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - perfecto
  lexicon: HALOT
  rationale: En legislación sacrificial, תמים describe animales aptos, libres de defecto. «Sin defecto» es la forma más clara y fiel en español, evitando la ambigüedad de «perfecto».
- source_word: וְ/שֵׁשֶׁת כְּבָשִׂם
  english_pob_choice: and six lambs
  chosen_spanish: y seis corderos
  alternatives_spanish:
  - y seis ovejas
  - y seis corderos machos
  lexicon: HALOT
  rationale: En listas sacrificiales, כְּבָשִׂים se entiende naturalmente como corderos. «Corderos» es la equivalencia más idiomática y clara en español.
- source_word: וָ/אַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho carnero
  - y un macho adulto
  lexicon: HALOT
  rationale: אַיִל corresponde al carnero sacrificial. «Carnero» es el término español directo y tradicional, sin perder precisión.
- source_word: יִהְיֽוּ
  english_pob_choice: they shall be unblemished
  chosen_spanish: serán sin defecto
  alternatives_spanish:
  - deberán ser sin defecto
  - han de ser sin defecto
  lexicon: HALOT
  rationale: El verbo plural funciona como predicación legal sobre el conjunto de animales. «Serán sin defecto» mantiene la estructura del hebreo y la fuerza prescriptiva sin añadir modalización no explicitada.
translation_notes:
  revision_awareness: 'Coincide con el criterio del POB inglés y con la evaluación de alta concordancia: se mantuvieron el valor cultual de «luna nueva», la terminología sacrificial y la predicación final sobre la integridad de los animales, sin añadir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Sin defecto» se usó de manera consistente para תמים en contexto sacrificial.
  - La coordinación «y ... y ...; serán sin defecto» preserva la lista hebrea y su cierre legal-prescriptivo.
