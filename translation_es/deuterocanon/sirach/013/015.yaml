revisions:
- from: Toda clase de carne se apega a su propia clase[a], y un hombre se une a la suya.
  to: Toda clase de carne se mantiene con su propia clase[a], y un hombre se une a su propia clase.
  rationale: Se reemplaza «se apega» por «se mantiene con» para reflejar mejor la elipsis hebrea y la decisión inglesa «keeps to», evitando un matiz afectivo excesivo. También se explicita «su propia clase» en la segunda cola para conservar el paralelismo y la claridad en español. Se mantiene «carne» por fidelidad al hebreo y al audit trail revisado.
