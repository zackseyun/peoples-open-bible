translation:
  language: es
  text: ¡Cuán temible eres, Elías![a] ¿Quién como tú puede jactarse?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¡Cuán glorificado eres, Elías, en tus maravillas; y quién es semejante a ti para jactarse!». El hebreo se lee más literalmente: «¡Cuán temible eres, Elías!», y esta traducción sigue ese testimonio.'
    reason: alternative_reading
lexical_decisions:
- source_word: מה נורא
  english_pob_choice: How fearsome
  chosen_spanish: ¡Cuán temible eres!
  alternatives_spanish:
  - ¡Cuán asombroso eres!
  - ¡Cuán terrible eres!
  - ¡Cuán glorioso eres!
  lexicon: HALOT
  rationale: El hebreo exclamativo expresa admiración sobrecogida ante lo imponente de Elías. «Temible» conserva mejor en español el matiz de asombro reverente y temor que opciones como «glorioso»; «asombroso» suaviza demasiado la fuerza de נורא.
- source_word: אתה
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - eres tú
  - fuiste
  lexicon: gramática hebrea
  rationale: El hebreo usa una construcción exclamativa nominal con pronombre independiente; en español, el verbo copulativo en presente expresa de forma natural la afirmación directa sin imponer pasado.
- source_word: אליהו
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: transliteración estándar bíblica
  rationale: En español bíblico, el nombre establecido y reconocido es «Elías».
- source_word: ואשר כמוך יתפאר
  english_pob_choice: And who like you can boast?
  chosen_spanish: ¿Y quién como tú puede jactarse?
  alternatives_spanish:
  - ¿Y quién es como tú para jactarse?
  - ¿Y quién puede gloriarse como tú?
  - ¿Y quién como tú puede gloriarse?
  lexicon: HALOT
  rationale: El hebreo transmite una pregunta retórica sobre la imposibilidad de igualar el motivo de jactancia. «Jactarse» reproduce con claridad el valor de יתפאר en este contexto y mantiene la fuerza retórica del original; «gloriarse» es posible pero menos directo en español actual.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la primera cola
  english_pob_reading: Translate the Hebrew exclamation as awe/fear ('How fearsome you are') while allowing the Greek to confirm the rhetorical second colon.
  chosen_spanish_reading: 'Se sigue el hebreo en la exclamación: «¡Cuán temible eres!», sin ocultar la intensidad reverente del término.'
  alternative_spanish_readings:
  - ¡Cuán glorioso eres, Elías!
  - ¡Cuán admirable eres, Elías!
  rationale: La prioridad textual aquí recae en el hebreo conservado. El paralelo griego aporta confirmación del tono exaltado, pero no debe sustituir el matiz específico de נורא, que en español se expresa mejor con «temible» o «sobrecogedor».
  doctrine_reference: Translation philosophy §1, primacía de la fuente original y uso auxiliar del paralelo griego
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al omitir añadidos innecesarios en la segunda cola y al conservar una pregunta retórica breve y directa. En español se mantuvo esa concisión, con «¿Y quién como tú puede jactarse?» como equivalente natural y fiel.
  spanish_consistency_notes:
  - Se usó «Elías» como forma bíblica estándar en español.
  - Se conservó la exclamación inicial con intensidad reverente, sin rebajarla a una simple admiración.
  - «Jactarse» se eligió para mantener el valor del verbo hebreo sin introducir un registro litúrgico ajeno.
  - El signo de interrogación de apertura se aplicó en la pregunta retórica por norma tipográfica española.
