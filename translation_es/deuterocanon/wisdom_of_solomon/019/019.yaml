- from: Pues las criaturas de la tierra fueron cambiadas en criaturas del agua[a], y las que nadan se pasaron a la tierra.
  to: Pues las criaturas de la tierra fueron cambiadas en criaturas acuáticas[a], y las que nadan pasaron a la tierra.
  rationale: Se ajusta «se pasaron a» a «pasaron a» para reflejar con mayor dignidad y precisión el movimiento expresado por μετέβαινεν. También se sustituye «criaturas del agua» por «criaturas acuáticas», que en español es más natural y literario sin perder el sentido ni la simetría del contraste entre tierra y agua. La nota se conserva con el mismo valor alternativo.
