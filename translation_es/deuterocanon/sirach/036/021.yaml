translation:
  language: es
  text: La garganta[a] prueba los alimentos de la caza; así un corazón inteligente examina[b] palabras falsas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «La garganta prueba los alimentos de la caza». También podría expresarse «el garguero», pero «garganta» es la opción más natural en español.'
    reason: lexical_alternative
  - marker: b
    text: El griego dado omite un verbo explícito en la segunda mitad de la comparación; «examina» se añade para completar el paralelismo de manera natural en español.
    reason: source_note
lexical_decisions:
- source_word: φάρυγξ
  english_pob_choice: throat
  chosen_spanish: cuello
  alternatives_spanish:
  - garganta
  - garguero
  - garguero del cuello
  lexicon: LSJ
  rationale: El término griego se refiere literalmente a la garganta/cuello. «Cuello» conserva la imagen corporal de modo natural en español, aunque «garganta» también sería posible; aquí se prefirió una forma más fluida en el refrán.
- source_word: γεύεται
  english_pob_choice: tastes
  chosen_spanish: prueba
  alternatives_spanish:
  - saborea
  - gusta
  - percibe por el gusto
  lexicon: BDAG
  rationale: El verbo expresa la acción de gustar o probar por el sentido del gusto. «Prueba» mantiene la comparación sensorial y suena natural en español, sin perder la fuerza proverbial.
- source_word: βρώματα
  english_pob_choice: food
  chosen_spanish: alimentos
  alternatives_spanish:
  - comidas
  - manjares
  - víveres
  lexicon: LSJ
  rationale: El plural griego designa cosas comestibles en general. «Alimentos» preserva el sentido amplio sin restringirlo indebidamente a carne o a una comida concreta.
- source_word: θήρας
  english_pob_choice: of the hunt
  chosen_spanish: de la caza
  alternatives_spanish:
  - de la cacería
  - de la caza obtenida
  - de la caza mayor
  lexicon: LSJ
  rationale: El genitivo cualifica los alimentos como obtenidos por caza. «De la caza» reproduce bien la relación compacta del griego y mantiene abierta la imagen de alimento cazado o presa.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - alma
  lexicon: LSJ
  rationale: En la literatura sapiencial, la καρδία es sede de entendimiento y juicio. «Corazón» conserva la antropología bíblica y la correspondencia con la imagen del cuerpo en la primera cola.
- source_word: συνετή
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - discreto
  - prudente
  - entendido
  lexicon: LSJ
  rationale: El adjetivo expresa capacidad de entender y juzgar bien. «Inteligente» comunica con claridad esa aptitud en español moderno, sin desviar el matiz sapiencial.
- source_word: λόγους ψευδεῖς
  english_pob_choice: false words
  chosen_spanish: palabras falsas
  alternatives_spanish:
  - palabras mentirosas
  - palabras engañosas
  - discursos falsos
  lexicon: LSJ
  rationale: La frase denota palabras caracterizadas por falsedad. «Palabras falsas» es una correspondencia formal y amplia, que no estrecha el sentido a declaraciones técnicas.
- source_word: '[implied comparison in οὕτως ... καρδία συνετή]'
  english_pob_choice: tests
  chosen_spanish: examina
  alternatives_spanish:
  - discierne
  - evalúa
  - prueba
  lexicon: LSJ
  rationale: El griego, tal como está, omite un verbo explícito en la segunda mitad de la comparación. «Examina» suministra de manera natural la acción correspondiente para completar el paralelismo proverbial, tal como el audit trail inglés suplió «tests».
theological_decisions:
- issue: 'Antropología sapiencial: καρδία como sede del juicio'
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  - alma
  rationale: Se mantiene «corazón» para conservar la imagen bíblica del órgano interior que piensa, discierne y juzga. En este contexto sapiencial no conviene reducirlo a «mente», porque se perdería la fuerza antropológica del proverbio.
  doctrine_reference: Sabiduría bíblica / antropología del AT
translation_notes:
