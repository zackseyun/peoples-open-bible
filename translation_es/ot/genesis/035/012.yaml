revisions:
- from: Y la tierra que di a Abraham y a Isaac[a], te la daré a ti[b]; y a tu descendencia después de ti daré la tierra.
  to: Y la tierra que di a Abraham y a Isaac[a] te la daré; y a tu descendencia[b] después de ti daré la tierra.
  rationale: 'Se hace una reparación menor: se elimina el énfasis redundante ''a ti'' para lograr un español más natural sin pérdida de sentido, y se reubica la nota [b] en ''descendencia'', que es el término que la nota explica. El resto del versículo permanece fiel al hebreo y al razonamiento del POB inglés.'
