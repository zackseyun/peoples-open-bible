  language: en
  yaml_path: translation/ot/song_of_songs/004/001.yaml
  text: Look[a], you are beautiful, my darling; look, you are beautiful. Your eyes are doves behind your veil[b]. Your hair is like a flock of goats streaming down from Mount Gilead.
  footnotes:
