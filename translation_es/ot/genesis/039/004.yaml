  to: Y José halló favor ante sus ojos y le sirvió, y lo puso a cargo de su casa[a][b], y todo lo que tenía lo puso en su mano[c].
  rationale: Se corrigió la ubicación y función de las notas para que cada una quede anclada en la frase que realmente explica. También se ajustó «lo puso sobre su casa» a «lo puso a cargo de su casa» por mayor naturalidad en español, manteniendo la nota alternativa más literal. La imagen hebrea «en su mano» se conserva en el texto principal, con su nota cultural en el lugar correcto.
