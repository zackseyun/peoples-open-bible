translation:
  language: es
  text: Entonces los marineros tuvieron miedo, y cada uno clamó a su dios. Echaron al mar la carga[a] que estaba en la nave, para aligerar la nave. Pero Jonás había bajado a las partes más recónditas de la embarcación[b], y se acostó y cayó en un sueño profundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los aparejos del barco» o «los artículos». El término hebreo es amplio; en este contexto, probablemente se refiere a la carga o al equipo que se arrojó por la borda para aligerar la embarcación.
    reason: lexical_alternative
  - marker: b
    text: O «los recovecos de la embarcación» o «la bodega de la nave».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽירְא֣וּ
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - se asustaron
  - les dio miedo
  lexicon: HALOT
  rationale: ירא expresa miedo ante peligro. 'Tuvieron miedo' es natural en español y conserva el sentido narrativo sin convertirlo en temor reverencial.
- source_word: הַמַּלָּחִים
  english_pob_choice: the sailors
  chosen_spanish: los marineros
  alternatives_spanish:
  - los navegantes
  - los marinos
  lexicon: HALOT
  rationale: מַלָּחִים designa a la tripulación de mar. 'Marineros' es claro en español y mantiene el registro marítimo del contexto.
- source_word: וַיִּזְעֲקוּ אִישׁ אֶל אֱלֹהָיו
  english_pob_choice: each cried out to his god
  chosen_spanish: cada uno clamó a su dios
  alternatives_spanish:
  - cada uno gritó a su dios
  - cada uno invocó a su dios
  lexicon: HALOT
  rationale: זעק comunica un clamor fuerte en angustia; 'clamó' conserva esa intensidad. אִישׁ se expresa naturalmente como 'cada uno'. El sufijo singular de אֱלֹהָיו pide 'su dios' y no un plural.
- source_word: וַיָּטִ֨לוּ אֶת הַכֵּלִים אֲשֶׁר בָּאֳנִיָּה אֶל הַיָּם
  english_pob_choice: They threw the cargo that was in the ship into the sea
  chosen_spanish: Echaron al mar la carga que estaba en la nave
  alternatives_spanish:
  - Arrojaron al mar la carga que estaba en la nave
  - Tiraron al mar la carga que estaba en la nave
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio; en este contexto marítimo, la carga es la opción más probable y natural, siguiendo la lectura auditada del POB inglés. 'Echaron al mar' refleja היטב la dirección del movimiento; 'nave' conserva el lenguaje marítimo sin forzar tecnicismo.
- source_word: לְהָקֵל מֵעֲלֵיהֶם
  english_pob_choice: to lighten it for them
  chosen_spanish: para aligerarla para ellos
  alternatives_spanish:
  - para hacerla más liviana para ellos
  - para quitarle peso para ellos
  lexicon: HALOT
  rationale: הקל significa 'aligerar, hacer más liviano'. El pronombre femenino 'la' concuerda con la idea implícita de la carga/embarcación. 'Para ellos' reproduce la benefacción indicada por מֵעֲלֵיהֶם sin añadir interpretación.
- source_word: וְיוֹנָה
  english_pob_choice: But Jonah
  chosen_spanish: Pero Jonás
  alternatives_spanish:
  - Y Jonás
  - Mas Jonás
  lexicon: HALOT
  rationale: La conjunción introduce contraste con la actividad de los marineros. 'Pero' es la forma más natural y clara en español. Se usa la forma española estándar 'Jonás'.
- source_word: יָרַד אֶל יַרְכְּתֵי הַסְּפִינָה
  english_pob_choice: had gone down into the innermost parts of the vessel
  chosen_spanish: había bajado a las partes más recónditas de la embarcación
  alternatives_spanish:
  - había descendido a los rincones más profundos de la nave
  - había bajado al fondo de la embarcación
  lexicon: HALOT
  rationale: ירד se expresa con 'había bajado' para el valor de escena de fondo. יַרְכְּתֵי denota zonas lejanas o internas; 'partes más recónditas' conserva la imagen espacial sin imponer la lectura técnica de 'bodega'. הַסְּפִינָה se vierte como 'embarcación' para mantener la variación náutica del hebreo y evitar reducirla automáticamente a 'barco' o 'nave'.
- source_word: וַיִּשְׁכַּב
  english_pob_choice: he lay down
  chosen_spanish: se recostó
  alternatives_spanish:
  - se acostó
  - se tendió
  lexicon: HALOT
  rationale: שׁכב puede referirse a echarse o recostarse. 'Se recostó' suena natural y prepara la acción siguiente sin añadir matices ajenos.
- source_word: וַיֵּרָדַם
  english_pob_choice: fell fast asleep
  chosen_spanish: cayó en un sueño profundo
  alternatives_spanish:
  - se durmió profundamente
  - cayó profundamente dormido
  lexicon: HALOT
  rationale: רדם expresa sueño profundo o sopor. 'Cayó en un sueño profundo' comunica tanto el ingreso repentino como la profundidad del sueño, manteniendo la fuerza del hebreo.
theological_decisions:
- issue: Referencia a dioses paganos en אֱלֹהָיו
  english_pob_reading: each cried out to his god
  chosen_spanish_reading: cada uno clamó a su dios
  alternative_spanish_readings:
  - cada uno clamó a sus dioses
  rationale: El sufijo singular de אֱלֹהָיו y el distributivo אִישׁ apoyan un referente individual y singular. El español en singular evita borrar esa señal y también evita sugerir un politeísmo colectivo genérico que no está exigido por el texto.
  doctrine_reference: monoteísmo bíblico; uso descriptivo de deidades paganas sin equipararlas con Yahvé
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘Yonah’ a ‘Jonah’ y luego fijó ‘Jonah’; también ajustó ‘to lighten it for themselves’ a ‘for them’ para reflejar mejor מֵעֲלֵיהֶם. La versión española sigue esa revisión al usar la forma estándar ‘Jonás’ y ‘para ellos’, sin perder la relación con el sujeto plural implícito.
  spanish_consistency_notes:
  - Se mantiene la distinción marítima con 'marineros', 'nave' y 'embarcación' para reflejar el campo léxico del hebreo.
  - '''Clamó'' conserva mejor la intensidad de זעק que un simple ''llamó''.'
  - '''Partes más recónditas'' preserva la imagen espacial de יַרְכְּתֵי sin cerrar la ambigüedad técnica.'
  - Las notas a y b mantienen alternativas reales sin sobrecargar el texto principal.
