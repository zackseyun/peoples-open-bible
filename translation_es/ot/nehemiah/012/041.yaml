translation:
  language: es
  text: 'y los sacerdotes: Eliaquim, Maaseías, Miniamín, Micaías, Elioenai, Zacarías y Hananías, con trompetas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con las trompetas». El hebreo también puede simplemente indicar que estos sacerdotes iban acompañados por las trompetas o estaban asignados a ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/כֹּהֲנִים
  english_pob_choice: and the priests
  chosen_spanish: y los sacerdotes
  alternatives_spanish:
  - y los clérigos
  - y los hombres sacerdotales
  lexicon: HALOT
  rationale: El hebreo usa el artículo más la forma plural común de כֹּהֵן; en español la equivalencia natural y fiel es 'los sacerdotes'. Se conserva el enlace narrativo con 'y'.
- source_word: אֶלְיָקִים
  english_pob_choice: Eliakim
  chosen_spanish: Eliaquim
  alternatives_spanish:
  - Eliacim
  - Eliakim
  lexicon: conventional Spanish biblical transliteration
  rationale: Se mantiene el nombre propio en transliteración bíblica española usual. 'Eliaquim' refleja bien la vocalización hebrea y es legible en español.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maaseías
  alternatives_spanish:
  - Maaseía
  - Maaseyah
  lexicon: conventional Spanish biblical transliteration
  rationale: Se translitera el nombre propio con adaptación gráfica española. La forma con acento mantiene la pronunciación llana esperable en español y distingue el final -ías que suele aparecer en nombres hebreos.
- source_word: מִנְיָמִין
  english_pob_choice: Miniamin
  chosen_spanish: Miniamín
  alternatives_spanish:
  - Mijamín
  - Miniamim
  lexicon: HALOT / conventional name transliteration
  rationale: Se conserva la forma cercana al hebreo consonántico con vocalización española. La tilde marca el acento final y evita una lectura errónea en español.
- source_word: מִיכָיָה
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Mikayá
  lexicon: conventional Spanish biblical transliteration
  rationale: Se adopta una transliteración española estable para el nombre propio, evitando la forma inglesa y manteniendo el valor nominal del texto.
- source_word: אֶלְיוֹעֵינַי
  english_pob_choice: Elioenai
  chosen_spanish: Elioenai
  alternatives_spanish:
  - Elyoenai
  - Elioenaí
  lexicon: conventional Spanish biblical transliteration
  rationale: El nombre se mantiene prácticamente idéntico por ser ya transparente y reconocible en español bíblico. No hay necesidad de forzar una adaptación adicional.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  - Zacaríah
  lexicon: conventional Spanish biblical transliteration
  rationale: Se usa la forma española tradicional y ampliamente inteligible del nombre propio, fiel al hebreo y natural en el registro bíblico.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Ananías
  alternatives_spanish:
  - Hananías
  - Hanania
  lexicon: conventional Spanish biblical transliteration
  rationale: Se adopta la forma española bíblica corriente. Aunque el inglés POB usa 'Hananiah', en español 'Ananías' es la forma más asentada y reconocible, sin cambiar la referencia personal.
- source_word: בַּ/חֲצֹצְרֽוֹת
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - con las trompetas
  - en las trompetas
  - tocando trompetas
  lexicon: HALOT
  rationale: 'El ב preposicional con el sustantivo plural se rinde de manera natural como acompañamiento/instrumental: ''con trompetas''. En español, el artículo es opcional y se omite para mayor fluidez; el sentido litúrgico-instrumental queda claro.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permanece en alto acuerdo con el texto fuente y la auditoría inglesa. Se corrigió el anclaje de la nota para que el marcador [a] aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefieren transliteraciones bíblicas españolas naturales para nombres propios, evitando calcos ingleses.
  - La preposición instrumental 'con' preserva la ambigüedad razonable del hebreo sin sobreinterpretar el contexto.
