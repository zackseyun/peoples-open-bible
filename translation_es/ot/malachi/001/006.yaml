translation:
  language: es
  text: 'Un hijo honra a su padre, y un siervo a su señor. Si, pues, yo soy padre, ¿dónde está mi honor[a]? Y si yo soy señor, ¿dónde está el temor que se me debe? dice Yahvé de los Ejércitos a ustedes, sacerdotes que desprecian mi nombre. Pero ustedes dicen: «¿En qué[b] hemos despreciado tu nombre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi honra».
    reason: lexical_alternative
  - marker: b
    text: O «¿Cómo hemos despreciado tu nombre?».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  english_pob_choice: A son
  chosen_spanish: Un hijo
  alternatives_spanish:
  - Un hijo varón
  - Un niño
  lexicon: HALOT
  rationale: בן es masculino singular y forma parte de un dicho paralelo con padre; en español, «hijo» conserva la relación familiar sin sonar artificial. Se evita «niño» porque no corresponde al valor relacional del proverbio.
- source_word: יְכַבֵּד
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - glorifica
  - da honor a
  lexicon: HALOT
  rationale: El verbo pi‘el de כבד aquí expresa dar honor o respeto. «Honra» es natural en español y mantiene el vínculo con כבוד del versículo.
- source_word: אָב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - progenitor
  - papá
  lexicon: HALOT
  rationale: El sentido es el de la relación paterna ordinaria; «padre» preserva la analogía profética sin coloquialismo.
- source_word: עֶבֶד
  english_pob_choice: a servant
  chosen_spanish: un siervo
  alternatives_spanish:
  - un esclavo
  - un servidor
  lexicon: HALOT
  rationale: Aunque el inglés POB revisó desde «slave» a «servant» por naturalidad contextual, el español «siervo» comunica subordinación personal sin el peso moderno de «esclavo». Se mantiene la tensión jerárquica del paralelismo con señor, sin introducir una dureza no explicitada por la forma final inglesa.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su dueño
  lexicon: HALOT
  rationale: En español, «señor» funciona como equivalente digno y directo de «master» en este proverbio; «amo» sonaría más servil y menos apropiado en registro bíblico, aunque sigue siendo una alternativa posible.
- source_word: כְבוֹדִי
  english_pob_choice: my honor
  chosen_spanish: mi honra
  alternatives_spanish:
  - mi gloria
  - mi honor
  lexicon: HALOT
  rationale: En este contexto relacional, כבוד se refiere al honor debido. «Honra» suena natural y evita una posible ambigüedad de «gloria», que aquí sería demasiado teológica y menos precisa para el paralelo.
- source_word: אֲדוֹנִים
  english_pob_choice: a master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: HALOT
  rationale: Aunque morfológicamente plural, funciona con sentido singular/intensivo junto a «yo soy». En español, repetir «señor» mantiene la lógica del paralelismo y la relación de autoridad.
- source_word: מוֹרָאִי
  english_pob_choice: the fear due me
  chosen_spanish: el temor que se me debe
  alternatives_spanish:
  - mi reverencia
  - el respeto debido a mí
  lexicon: HALOT
  rationale: מורא puede ser temor, respeto reverente o reverencia. «El temor que se me debe» conserva el valor concreto del sustantivo y explicita la obligación relacional, como en la nota inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto: el Tetragrámaton se rinde como «Yahvé» en el texto principal, en lugar de ocultarlo tras «SEÑOR».'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: El título expresa la imagen de huestes/armadas. «De los Ejércitos» es una forma reverente, transparente y habitual en español bíblico, sin depender del tradicionalismo de «huestes».
- source_word: הַכֹּהֲנִים
  english_pob_choice: O priests
  chosen_spanish: oh sacerdotes
  alternatives_spanish:
  - ustedes, sacerdotes
  - sacerdotes
  lexicon: HALOT
  rationale: «Sacerdotes» traduce directamente la vocación; se agrega «oh» para marcar el vocativo profético. Aunque el inglés usa «O priests», en español «oh» conserva mejor la interpelación directa.
- source_word: בּוֹזֵי
  english_pob_choice: who despise
  chosen_spanish: que desprecian
  alternatives_spanish:
  - que menosprecian
  - que desdeñan
  lexicon: HALOT
  rationale: El participio caracteriza a los sacerdotes de manera continua. «Desprecian» reproduce la fuerza del término y mantiene la relación con el verbo final «despreciado».
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  lexicon: HALOT
  rationale: «Nombre» conserva el valor bíblico de identidad, honra y representación pactual; no se parafrasea como «reputación» porque el texto repite el término literal.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: Yet you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Sin embargo, ustedes dicen
  lexicon: HALOT
  rationale: La conjunción introduce la objeción del pueblo en contraste con la acusación. «Pero» expresa bien el giro adversativo en español.
- source_word: בַּמֶּה
  english_pob_choice: How
  chosen_spanish: ¿En qué
  alternatives_spanish:
  - ¿Cómo
  - ¿De qué manera
  lexicon: HALOT
  rationale: La pregunta hebrea busca el modo o base de la acusación. En español, «¿En qué hemos...?» suena natural y permite mantener el intercambio forense del versículo.
- source_word: בָזִינוּ
  english_pob_choice: have we despised
  chosen_spanish: hemos despreciado
  alternatives_spanish:
  - hemos menospreciado
  - hemos desdeñado
  lexicon: HALOT
  rationale: 'Se conserva el mismo campo léxico que en «desprecian» para reproducir la ironía retórica del texto: los que desprecian el nombre preguntan cómo lo han despreciado.'
theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  - el SEÑOR de los ejércitos
  rationale: Se sigue la política del proyecto de traducir el Tetragrámaton como «Yahvé». צבאות se rinde de manera transparente como «de los Ejércitos», manteniendo el título militar-cósmico sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance of מוֹרָאִי
  english_pob_reading: the fear due me
  chosen_spanish_reading: el temor que se me debe
  alternative_spanish_readings:
  - mi reverencia
  - el respeto que se me debe
  - el temor debido a mí
  rationale: El contexto contrasta honor debido al padre con temor debido al señor. «El temor que se me debe» preserva la idea de reverencia obligatoria y evita reducir מורא a simple miedo emocional.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Social-status term עֶבֶד
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  - servidor
  rationale: Dado que la versión inglesa revisada ya optó por «servant» para mayor naturalidad contextual, «siervo» ofrece en español un término sobrio, relacional y reconocible, sin cargar la frase con una aspereza semántica que la revisión inglesa no retuvo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; revision pass MAL.1.6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «slave» a «servant» por naturalidad contextual, y el texto final retuvo esa decisión. La propuesta española sigue esa revisión con «siervo», evitando retroceder a una dureza no sostenida por la última pasarela editorial. También conserva el paralelismo honor/temor y la acusación retórica de «desprecian / hemos despreciado».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se conserva el campo léxico de «honra / desprecian / despreciado» para reflejar la repetición retórica del hebreo.
  - «Señor» se emplea para אֲדֹן/אֲדוֹנִים en este proverbio por claridad de relación de autoridad; no se usa como sustituto del nombre divino.
  - El estilo mantiene un registro bíblico digno y contemporáneo, sin calcos innecesarios.
