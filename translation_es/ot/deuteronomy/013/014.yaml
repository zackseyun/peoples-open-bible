  rationale: Se unificó el tratamiento pronominal al singular para mejorar la coherencia y la legibilidad en español, manteniendo fielmente el sentido del hebreo y del POB inglés. También se eliminó la nota [b] por innecesaria en español, conservando solo la nota léxica relevante sobre 'hijos de Belial'.
