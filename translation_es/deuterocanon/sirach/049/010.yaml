translation:
  language: es
  text: Y en cuanto a los doce profetas[a], que sus huesos florezcan desde su lugar[c][b]; pues curaron a Jacob, y lo restauraron con fe de esperanza[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: “que sus huesos florezcan desde su lugar”. El hebreo presenta una expresión más difícil, literalmente algo como “florezcan desde debajo de ellos”.'
    reason: textual_variant
  - marker: b
    text: El griego lee “consoló a Jacob”, mientras que el hebreo usa un verbo que el POB entiende como “curó”.
    reason: alternative_reading
  - marker: c
    text: 'La frase sobre el lugar difiere entre testigos: el griego tiene “desde su lugar”, mientras que el hebreo es más difícil y puede sugerir algo como “desde debajo de ellos”.'
    reason: textual_variant
  - marker: d
    text: 'El final del versículo difiere entre testigos: el hebreo puede sugerir “lo exaltó en fe de esperanza”, mientras que el griego lee “los libró en fe de esperanza”.'
    reason: textual_variant
lexical_decisions:
- source_word: שנים עשר הנביאים / τῶν ιβʹ προφητῶν
  english_pob_choice: the twelve prophets
  chosen_spanish: los doce profetas
  alternatives_spanish:
  - los doce profetas menores
  lexicon: HALOT / LSJ
  rationale: El hebreo y el griego dicen literalmente “los doce profetas”. En español, “menores” sería una etiqueta interpretativa posterior que el fuente no expresa.
- source_word: עצמתם / τὰ ὀστᾶ
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus restos
  lexicon: HALOT / LSJ
  rationale: Se conserva la concreción del cuerpo y del honor póstumo que evocan tanto el hebreo como el griego.
- source_word: פרחת / ἀναθάλοι
  english_pob_choice: may ... flourish
  chosen_spanish: que ... florezcan
  alternatives_spanish:
  - que ... broten
  - que ... reverdezcan
  lexicon: HALOT / LSJ
  rationale: “Florezcan” reproduce la imagen de renuevo y honor con un verbo natural en español, sin perder el matiz botánico/poético.
- source_word: מתחתם / ἐκ τοῦ τόπου αὐτῶν
  english_pob_choice: from their place
  chosen_spanish: desde su lugar
  alternatives_spanish:
  - desde donde yacen
  - desde su sepulcro
  lexicon: HALOT / LSJ
  rationale: “Desde su lugar” sigue de cerca el griego y evita forzar la imagen. La alternativa más explícita de sepultura sería interpretativa.
- source_word: החלימו / παρεκάλεσεν
  english_pob_choice: healed
  chosen_spanish: consolaron
  alternatives_spanish:
  - sanaron
  - curaron
  - restauraron
  lexicon: HALOT / LSJ
  rationale: Dado el desajuste mayor entre testigos, se adopta una forma que pueda abarcar el griego παρεκάλεσεν (“consoló/animó”) y el hebreo, sin imponer una lectura demasiado clínica. “Consolaron” mantiene una resonancia pastoral coherente con el contexto de memoria y alivio.
- source_word: יעקב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como aparece en la fuente; “Israel” sería una interpretación corporativa no explícita.
- source_word: וישגבהו / ἐλυτρώσατο αὐτοὺς
  english_pob_choice: restored him / delivered them
  chosen_spanish: lo restauraron
  alternatives_spanish:
  - los libraron
  - lo salvaron
  - lo levantaron
  lexicon: HALOT / LSJ
  rationale: La tradición textual presenta una discrepancia fuerte sobre el objeto y el verbo final. En español se opta por una solución que preserve la continuidad con Jacob en singular y la idea de reparación/restauración que permite el contexto, sin borrar la tensión textual documentada.
- source_word: באמונת תקוה / ἐν πίστει ἐλπίδος
  english_pob_choice: with faithful hope
  chosen_spanish: con fe de esperanza
  alternatives_spanish:
  - con esperanza fiel
  - con fe y esperanza
  - en fe de esperanza
  lexicon: HALOT / LSJ / Louw-Nida
  rationale: “Fe de esperanza” conserva la compactación semítica/grecolatina de la expresión, evitando ampliar el sintagma a una paráfrasis más libre. La preposición “con” hace natural el castellano y mantiene la relación instrumental o modal.
theological_decisions:
- issue: Tratamiento de la discrepancia hebreo-griego en el cierre del versículo
  english_pob_reading: 'The POB audit trail preserves the tension: the Hebrew may suggest ''exalted him in faithful hope,'' while the Greek reads ''delivered them in faith of hope.'''
  chosen_spanish_reading: 'Se conserva una formulación que no resuelve por completo la tensión: ''lo restauraron con fe de esperanza''.'
  alternative_spanish_readings:
  - '''los libraron con fe de esperanza'''
  - '''lo exaltaron en fe de esperanza'''
  - '''lo salvaron con esperanza fiel'''
  rationale: 'La frase final es notoriamente difícil y el expediente POB registra una divergencia real entre testigos. La versión española evita borrar esa dificultad con una armonización excesiva: mantiene la idea de restauración y la expresión condensada de fe/esperanza, dejando visible que el testimonio no es uniforme.'
  doctrine_reference: 'PHILOSOPHY.md: Sirach prioritizes the surviving Hebrew while using Greek as a clarifying witness where the text is difficult.'
- issue: 'Verbo aplicado a Jacob: singular o colectivo'
  english_pob_reading: English POB notes both a singular Jacob and a plural 'them' from the Greek, with revision awareness favoring a singular restoration for Jacob.
  chosen_spanish_reading: Se usa el singular 'lo' con Jacob, pero sin eliminar la posibilidad de sentido colectivo implícito.
  alternative_spanish_readings:
  - '''los restauraron'''
  - '''los libraron'''
  - '''restauraron a Jacob'''
  rationale: En español, el nombre propio singular exige concordancia clara, aunque el referente pueda abarcar al pueblo. La elección evita una discordancia gramatical y sigue la revisión posterior del POB que privilegia la lectura singular.
  doctrine_reference: 'PHILOSOPHY.md: maintain source tension while preserving intelligibility in the target language.'
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión más reciente del POB, que prefirió 'from their place' y ajustó el cierre para reflejar mejor la lectura singular de Jacob. La traducción española intenta honrar esa revisión sin borrar la discrepancia textual ya documentada entre el hebreo y el griego.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' como nombre propio, no 'Israel'.
  - Se evita 'Mesías' o terminología cristológica ajena al versículo.
  - Se conserva un tono poético y bíblico, pero con sintaxis española natural.
  - Las notas al pie reflejan la variante textual y la tensión lexical, no la resuelven artificialmente.
