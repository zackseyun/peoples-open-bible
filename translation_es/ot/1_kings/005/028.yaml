translation:
  language: es
  text: Él los envió al Líbano, diez mil al mes en turnos[a]; estarían un mes en el Líbano y dos meses en casa[b], y Adoniram estaba a cargo del trabajo forzado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por relevos» o «en grupos alternos» para la idea de «en turnos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su casa»; el sentido es que cada trabajador pasaba dos meses en su hogar entre períodos mensuales en el Líbano.
    reason: lexical_alternative
  - marker: c
    text: O «labor tributaria»; el término hebreo se refiere al trabajo compulsorio impuesto por el Estado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵם
  english_pob_choice: He sent them
  chosen_spanish: Él los envió
  alternatives_spanish:
  - Él los mandó
  - Él los despachó
  lexicon: HALOT
  rationale: El verbo hebreo שלח con sufijo de objeto directo expresa el envío simple de personas. «Envió» conserva el valor narrativo básico sin añadir matices de urgencia o formalidad no presentes en el texto.
- source_word: לְבָנוֹנָה
  english_pob_choice: to Lebanon
  chosen_spanish: al Líbano
  alternatives_spanish:
  - hacia el Líbano
  - para el Líbano
  lexicon: HALOT
  rationale: El ending direccional indica movimiento hacia ese lugar. En español natural, «al Líbano» comunica claramente la dirección sin sobretraducir.
- source_word: עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - diez millares
  lexicon: HALOT
  rationale: La cifra se vierte de forma directa e idiomática. «Diez mil» mantiene la exactitud del número y evita arcaísmos.
- source_word: בַּחֹדֶשׁ חֲלִיפוֹת
  english_pob_choice: a month in shifts
  chosen_spanish: al mes en turnos
  alternatives_spanish:
  - por mes en relevo
  - cada mes en alternancia
  lexicon: HALOT
  rationale: El sustantivo חֲלִיפוֹת expresa alternancia/sucesión. «En turnos» preserva el sistema rotativo con claridad natural en español; «al mes» refleja el sentido distributivo de בַּחֹדֶשׁ.
- source_word: חֹדֶשׁ יִהְיוּ בַלְּבָנוֹן
  english_pob_choice: they would be in Lebanon one month
  chosen_spanish: estarían un mes en el Líbano
  alternatives_spanish:
  - permanecerían un mes en el Líbano
  - un mes estarían en el Líbano
  lexicon: HALOT
  rationale: El singular «mes» funciona adverbialmente en un contexto de rotación laboral. «Estarían» expresa la duración prevista sin forzar una literalidad extraña.
- source_word: שְׁנַיִם חֳדָשִׁים בְּבֵיתוֹ
  english_pob_choice: and two months at home
  chosen_spanish: y dos meses en su casa
  alternatives_spanish:
  - y dos meses en casa
  - y dos meses en su hogar
  lexicon: HALOT
  rationale: Aunque literalmente es «en su casa», en este contexto se refiere al tiempo de descanso en el hogar de cada trabajador. Se mantiene el posesivo para reflejar el hebreo y la lectura contextual para sonar natural en español.
- source_word: וַאֲדֹנִירָם
  english_pob_choice: and Adoniram
  chosen_spanish: y Adoniram
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar según la tradición POB.
- source_word: עַל הַמַּס
  english_pob_choice: was over the forced labor
  chosen_spanish: estaba a cargo del trabajo forzado
  alternatives_spanish:
  - estaba sobre el trabajo forzado
  - era supervisor del trabajo obligatorio
  - estaba a cargo del servicio forzoso
  lexicon: HALOT
  rationale: מַס designa trabajo compulsorio impuesto por el Estado. «Trabajo forzado» conserva la fuerza coercitiva; «a cargo de» expresa la responsabilidad administrativa sin suavizar el contenido.
theological_decisions:
- issue: מַס como coerción estatal y no simple tributo
  english_pob_reading: forced labor
  chosen_spanish_reading: trabajo forzado
  alternative_spanish_readings:
  - labor tributaria
  - trabajo obligatorio
  - servicio forzoso
  rationale: El contexto describe una rotación de obreros para una tarea impuesta; no se trata de un impuesto monetario sino de servicio laboral obligatorio. «Trabajo forzado» evita neutralizar la coerción implícita en el término.
  doctrine_reference: Éxodo 1:11-14; 1 Reyes 12:4
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene la lectura de rotación laboral y ajusta la frase final a «at home» por su sentido colectivo. La versión española sigue esa revisión: conserva el posesivo hebreo en «su casa», pero lo entiende contextualmente como el hogar de cada trabajador, sin introducir explicaciones ajenas al versículo en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Adoniram» se translitera de forma uniforme sin adaptación a formas tradicionales castellanas.
  - «Trabajo forzado» se usa para מַס siguiendo la pauta POB de no suavizar el carácter coercitivo del término.
  - La puntuación con punto y coma reproduce la estructura de rotación y la cláusula final administrativa de manera legible en español.
