translation:
  language: es
  text: Y en todo monte alto y en todo collado encumbrado habrá arroyos, cauces de agua[a], en el día de gran matanza, cuando caigan las torres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canales de agua». El término hebreo es relativamente raro, y su matiz exacto puede ser «arroyuelos» o «arroyos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - y acontecerá
  - y habrá
  lexicon: HALOT
  rationale: El hebreo introduce una realidad futura/existencial; en español, «habrá» reproduce ese valor con naturalidad y sin rigidez.
- source_word: הַר גָּבֹהַ
  english_pob_choice: high mountain
  chosen_spanish: monte alto
  alternatives_spanish:
  - montaña alta
  - monte elevado
  lexicon: HALOT
  rationale: «Monte» es una solución bíblica y natural en español para topografía elevada; «alto» conserva el sentido de גָּבֹהַ sin sonar forzado.
- source_word: גִּבְעָה נִשָּׂאָה
  english_pob_choice: lofty hill
  chosen_spanish: collado encumbrado
  alternatives_spanish:
  - colina elevada
  - cerro encumbrado
  lexicon: HALOT
  rationale: נִשָּׂאָה expresa altura levantada/exaltada; «encumbrado» preserva esa elevación. «Collado» mantiene un término claro y bíblicamente comprensible.
- source_word: פְּלָגִים
  english_pob_choice: streams
  chosen_spanish: quebradas
  alternatives_spanish:
  - arroyos
  - corrientes
  lexicon: HALOT
  rationale: El término hebreo es raro y el inglés auditado preserva la idea de cursos de agua con nota de alternativa. En español, «quebradas» puede designar corrientes/canales de agua en un registro amplio, pero mantiene cierta indeterminación léxica; se conserva la posibilidad de otras lecturas en la nota.
- source_word: יִבְלֵי מָיִם
  english_pob_choice: channels of water
  chosen_spanish: cauces de aguas
  alternatives_spanish:
  - canales de agua
  - cursos de aguas
  - arroyos de aguas
  lexicon: HALOT
  rationale: La expresión intensifica la imagen de agua abundante; «cauces de aguas» conserva el carácter de curso/conducto y evita precisar demasiado el matiz raro del hebreo. El plural «aguas» sigue el estilo bíblico español.
- source_word: בְּיוֹם הֶרֶג רָב
  english_pob_choice: on the day of great slaughter
  chosen_spanish: en el día de gran matanza
  alternatives_spanish:
  - en el día de grande matanza
  - el día de mucha matanza
  lexicon: HALOT
  rationale: «Matanza» comunica con fuerza el lenguaje de juicio y violencia del pasaje. «Gran» reproduce רָב de modo directo y solemne.
- source_word: בִּנְפֹל מִגְדָּלִים
  english_pob_choice: when the towers fall
  chosen_spanish: cuando caigan las torres
  alternatives_spanish:
  - al caer las torres
  - cuando las torres caigan
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición funciona temporalmente; «cuando caigan» fluye bien en español. «Torres» conserva el sentido genérico de estructuras fortificadas sin añadir especificación.
theological_decisions:
- issue: Convivencia de fertilidad y juicio
  english_pob_reading: Retain both blessing imagery ('streams, channels of water') and judgment imagery ('day of great slaughter, when the towers fall') without resolving whether the verse emphasizes restoration after judgment or provision amid judgment.
  chosen_spanish_reading: Conservar tanto la imagen de abundancia de agua como la de matanza y caída de torres, sin decidir en la traducción si predomina restauración posterior al juicio o provisión en medio del juicio.
  alternative_spanish_readings:
  - Interpretarlo principalmente como restauración escatológica después del juicio divino
  - Interpretarlo principalmente como reversión militar donde los lugares altos se vuelven irrigados
  rationale: El hebreo yuxtapone fertilidad y destrucción sin explicitar la síntesis. La versión española preserva esa tensión, en línea con la filosofía de traducción auditada, sin importar una lectura teológica no exigida por el texto.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura auditada en inglés y no requiere cambios de última revisión; se mantiene la decisión de preservar la ambigüedad léxica de פְּלָגִים / יִבְלֵי מָיִם mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el nombre divino.
  - Se prefirió «matanza» a un eufemismo para mantener el tono de juicio del hebreo.
  - Se mantuvo un registro bíblico natural pero no arcaizante, con sintaxis fluida para lectura pública.
