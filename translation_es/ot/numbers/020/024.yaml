translation:
  language: es
  text: Aarón será reunido a su pueblo, porque no entrará en la tierra que he dado a los hijos de Israel, porque ustedes se rebelaron contra mi mandato[a] en las aguas de Meribá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «contra mi boca», es decir, contra mi mandato pronunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָסֵף
  english_pob_choice: will be gathered
  chosen_spanish: será reunido
  alternatives_spanish:
  - será juntado
  - será recogido
  lexicon: HALOT
  rationale: El niphal de אסף en contexto de muerte expresa ser reunido con los propios. En español, «será reunido» conserva el giro idiomático y el tono solemne mejor que reducirlo a «morirá».
- source_word: אֶל עַמָּיו
  english_pob_choice: to his people
  chosen_spanish: con su pueblo
  alternatives_spanish:
  - a su pueblo
  - con los suyos
  lexicon: HALOT
  rationale: La expresión hebrea acompaña el idiomatismo de muerte y pertenencia ancestral. «Con su pueblo» comunica bien esa reunión sin sonar forzado en español; la nota preserva la alternativa más literal «a su pueblo».
- source_word: יָבֹא אֶל הָאָרֶץ
  english_pob_choice: will not enter the land
  chosen_spanish: no entrará en la tierra
  alternatives_spanish:
  - no irá a la tierra
  - no entrará al país
  lexicon: HALOT
  rationale: «Entrará en la tierra» es un equivalente natural y preciso del verbo de movimiento con la preposición. Mantiene el sentido pactal sin añadir «prometida», que no aparece en el hebreo.
- source_word: אֲשֶׁר נָתַתִּי
  english_pob_choice: that I have given
  chosen_spanish: que he dado
  alternatives_spanish:
  - que di
  - que estoy dando
  lexicon: HALOT
  rationale: El perfecto divino expresa un don ya concedido con vigencia presente. «He dado» preserva esa fuerza sin volverlo un pasado simple menos enfático.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - al pueblo de Israel
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene la fórmula etnónima masculina del hebreo con «hijos de Israel», que es clara y fiel al giro original. No se neutraliza en el texto principal porque el formulario del hebreo es explícito.
- source_word: אֶת פִּי
  english_pob_choice: against my command
  chosen_spanish: contra mi palabra
  alternatives_spanish:
  - contra mi mandato
  - contra mi boca
  lexicon: HALOT
  rationale: Literalmente «mi boca», pero el hebreo idiomático remite a la palabra mandada por Dios. «Contra mi palabra» conserva la metáfora verbal y evita una expresión opaca como «contra mi boca»; «mandato» sería más interpretativo.
- source_word: לְמֵי מְרִיבָה
  english_pob_choice: at the waters of Meribah
  chosen_spanish: junto a las aguas de Meribá
  alternatives_spanish:
  - en las aguas de Meribá
  - a las aguas de Meribá
  lexicon: HALOT
  rationale: Se conserva el nombre propio Meribá y el referente acuático del episodio. «Junto a» refleja el marco locativo del acontecimiento sin desplazar el sentido a un lugar distinto.
theological_decisions:
- issue: Idiom of death 'gathered to his people'
  english_pob_reading: Preserve the idiom rather than interpret it merely as physical death
  chosen_spanish_reading: será reunido con su pueblo
  alternative_spanish_readings:
  - morirá
  - será llevado con sus antepasados
  rationale: La frase hebrea no solo informa la muerte; también evoca pertenencia y continuidad con el grupo propio. La traducción conserva el idiomatismo en vez de reducirlo a un hecho biológico, manteniendo la textura literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gendered ethnonym בני ישראל
  english_pob_reading: '''sons of Israel'' in the main text'
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: El hebreo es fórmula fija y masculinizada; la versión principal la mantiene en español para no borrar la forma del original. En una nota, puede reconocerse la equivalencia idiomática con «israelitas».
  doctrine_reference: Translation philosophy §4
- issue: Idiomatic sense of אֶת־פִּי
  english_pob_reading: against my command
  chosen_spanish_reading: contra mi palabra
  alternative_spanish_readings:
  - contra mi mandato
  - contra lo que dije
  rationale: La expresión literal «mi boca» en hebreo apunta a la palabra pronunciada por Dios. «Contra mi palabra» mantiene la imagen y a la vez comunica el sentido sin sobreinterpretar el término.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador coincide con el estado de alta concordancia del contexto auditado y solo ajusta el español para mayor naturalidad sin alterar las decisiones léxicas ni teológicas principales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Hijos de Israel» conserva la fórmula del hebreo y se acompaña de nota para la alternativa idiomática.
  - «Meribá» se conserva como nombre propio transliterado, sin traducirlo como disputa o contienda.
  - La preposición locativa se resuelve con naturalidad («junto a») sin perder el anclaje en el episodio de las aguas.
