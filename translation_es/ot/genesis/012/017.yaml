review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: Yahvé es el sujeto, Faraón y su entorno doméstico son afectados, el castigo consiste en נְגָעִים גְּדֹלִים, y la causa es Sarai, esposa de Abram. Sin embargo, ''a su casa'' no preserva con suficiente claridad el valor colectivo de בֵּיתוֹ en este contexto; en español suena a edificio y no a los miembros de la casa. Además, la nota al pie no refleja plenamente la alternativa inglesa ''struck Pharaoh and his household with great afflictions''.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión semántica. 'Grandes plagas' es aceptable, aunque 'plagas severas' suena más idiomático; sin embargo, no es necesario forzar ese cambio. El problema principal de legibilidad es 'a su casa', que en español moderno puede malentenderse. La puntuación y el registro general son adecuados.
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'Faraón', y la identificación de Sarai como esposa de Abram. La elección 'afligió' concuerda con la decisión léxica auditada. La única desalineación relevante con el razonamiento documentado es בֵּיתוֹ, que el inglés auditado justificó como 'household'; en español debe reflejarse como 'su casa' solo si el contexto no crea ambigüedad, pero aquí sí la crea, por lo que 'su casa' o mejor 'su familia y servidumbre' sería interpretativo; 'su casa' sin más no basta. 'Su household' en español bíblico natural se expresa mejor como 'su casa' solo cuando el contexto deja claro el sentido doméstico, pero aquí la preposición personal 'a su casa' agrava la lectura física. 'Su casa' sin 'a' tampoco resuelve del todo. 'Su familia' sería demasiado estrecho. 'Su casa real' añade interpretación. 'Su gente de casa' sería algo coloquial. La mejor opción breve y fiel es 'y a los de su casa'.
  issues:
  - severity: medium
    issue: '''y a su casa'' no representa con suficiente precisión וְאֶת בֵּיתוֹ'
    rationale: En este contexto בֵּיתוֹ se refiere a la casa/hogar en sentido de household, no al edificio. En español, 'afligió a Faraón y a su casa' puede sonar a que hirió una construcción o a una fórmula poco natural. 'Y a los de su casa' preserva el sentido colectivo y sigue siendo idiomático y sobrio.
  - severity: low
    issue: La nota al pie omite parte de la alternativa documentada para el verbo y la frase nominal
    rationale: El rastro inglés conserva como alternativa no solo 'grandes aflicciones' sino también la idea verbal 'hirió/asestó golpes'. Conviene que la nota española refleje mejor que el hebreo combina un verbo de herir/afligir con un sustantivo que puede significar aflicciones o plagas.
  revised_spanish_text: Pero Yahvé afligió a Faraón y a los de su casa con grandes plagas[a], por causa de Sarai, esposa de Abram.
  revised_footnotes:
  - marker: a
    text: 'O: «hirió a Faraón y a los de su casa con grandes aflicciones». El hebreo usa un verbo que puede significar «hirió» o «afligió», y un sustantivo que puede significar «aflicciones» o «plagas».'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'y a su casa' a 'y a los de su casa' para preservar claramente el sentido de household en español natural y evitar la lectura de edificio. También se amplía la nota al pie para reflejar con mayor fidelidad la alternativa léxica documentada en el POB inglés respecto al verbo y al sustantivo.
