translation:
  language: es
  text: Y yo los envié a Iddo, el principal en el lugar de Casifía, y puse en sus bocas palabras para hablar a Iddo y a sus hermanos, los servidores del templo[a] en el lugar de Casifía, para traernos ministros[b] para la casa de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los Nethinim», nombre tradicional de una clase reconocida de servidores del templo en Esdras-Nehemías.
    reason: lexical_alternative
  - marker: b
    text: Aquí «ministros» significa personas que sirven en el templo, no necesariamente titulares de un oficio religioso formal posterior.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֹוצִיאָה
  english_pob_choice: And I sent
  chosen_spanish: Y yo los envié
  alternatives_spanish:
  - Y yo los saqué
  - Y yo los despaché
  lexicon: HALOT
  rationale: El verbo hebreo en forma causativa expresa que Esdras los hizo ir con un encargo; en español, «enviar» comunica con naturalidad la comisión sin perder el sentido de dirección del original.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - contra
  lexicon: HALOT
  rationale: Con un verbo de envío y un objeto personal, la preposición funciona de modo idiomático como destino personal; «a» es la opción española más clara.
- source_word: אִדּוֹ הָרֹאשׁ
  english_pob_choice: Iddo, the chief
  chosen_spanish: Iddo, el principal
  alternatives_spanish:
  - Iddo, el jefe
  - Iddo, el cabeza
  lexicon: HALOT
  rationale: El hebreo literal «la cabeza» funciona como título de autoridad. «El principal» conserva el valor jerárquico sin sonar demasiado moderno ni introducir connotaciones militares o eclesiásticas.
- source_word: בְּכָסִפְיָא הַמָּקוֹם
  english_pob_choice: at the place Casiphia
  chosen_spanish: en el lugar de Casifía
  alternatives_spanish:
  - en Casifía, el lugar
  - en Casifía
  lexicon: HALOT
  rationale: Se mantiene la aposición hebrea con «el lugar» para reflejar que el texto no solo nombra un topónimo, sino que lo caracteriza como lugar.
- source_word: וָאָשִׂימָה בְּפִיהֶם דְּבָרִים
  english_pob_choice: and I put in their mouths words
  chosen_spanish: y puse en su boca palabras
  alternatives_spanish:
  - y puse palabras en su boca
  - y les dije qué decir
  lexicon: HALOT
  rationale: La imagen idiomática hebrea se conserva, pero se ajusta al singular colectivo natural en español («su boca») para referirse al grupo de enviados como una unidad, sin borrar la metáfora.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: para hablar
  alternatives_spanish:
  - para decir
  - para hablarles
  lexicon: HALOT
  rationale: La finalidad de las palabras dadas a los enviados queda clara con «para hablar»; es una equivalencia directa y sobria.
- source_word: אֶל אִדּוֹ אָחִיו
  english_pob_choice: to Iddo and his brothers
  chosen_spanish: a Iddo y a sus hermanos
  alternatives_spanish:
  - a Iddo, su hermano
  - a Iddo y a sus parientes
  lexicon: HALOT
  rationale: El contexto favorece entender a «sus hermanos» como un grupo asociado con Iddo; se conserva la pluralidad que el audit trail en inglés ya decidió hacer explícita.
- source_word: הַנְּתוּנִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netineos
  - los Nethinim
  lexicon: HALOT
  rationale: Se traduce funcionalmente la clase histórica de los נתינים para lectores españoles modernos. «Servidores del templo» comunica la función sin depender de una transliteración opaca; el término tradicional queda como alternativa.
- source_word: לְהָבִיא לָנוּ
  english_pob_choice: to bring us
  chosen_spanish: para traernos
  alternatives_spanish:
  - para llevarnos
  - para llevar a nosotros
  lexicon: HALOT
  rationale: El propósito se expresa de forma compacta y natural en español con «para traernos».
- source_word: מְשָׁרְתִים
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - servidores
  - asistentes
  lexicon: HALOT
  rationale: Se preserva la diferenciación con «servidores del templo» y, al mismo tiempo, se evita reducir el término a una simple categoría doméstica. «Ministros» aquí se entiende como personas que prestan servicio cultual, no como un oficio eclesiástico posterior.
- source_word: לְבֵית אֱלֹהֵינוּ
  english_pob_choice: for the house of our God
  chosen_spanish: para la casa de nuestro Dios
  alternatives_spanish:
  - para el templo de nuestro Dios
  - para la casa de nuestro Dios
  lexicon: HALOT
  rationale: «Casa de nuestro Dios» mantiene la expresión hebrea y su resonancia teológica; «templo» sería interpretativo aunque correcto.
theological_decisions:
- issue: Distinción entre הַנְּתוּנִים y מְשָׁרְתִים
  english_pob_reading: the temple servants ... ministers
  chosen_spanish_reading: los servidores del templo ... ministros
  alternative_spanish_readings:
  - los netineos ... servidores
  - los servidores del templo ... servidores
  rationale: 'La traducción distingue dos grupos: una clase histórica ligada al servicio del templo y otros auxiliares que Esdras desea conseguir. Mantener dos términos diferentes evita borrar la distinción del texto y de la nota auditada en inglés.'
  doctrine_reference: Translation philosophy §1, §5, §6
- issue: Uso de términos cultuales sin eclesiasticizar el pasaje
  english_pob_reading: ministers here means those who serve in the temple, not necessarily holders of a later formal religious office
  chosen_spanish_reading: ministros ... personas que prestan servicio cultual
  alternative_spanish_readings:
  - servidores
  - asistentes
  rationale: «Ministros» en español puede sugerir un cargo eclesiástico moderno; por eso se aclara que aquí designa servicio en el ámbito del templo, no un oficio cristiano posterior.
  doctrine_reference: Translation philosophy §5
- issue: Conservación de la expresión 'casa de nuestro Dios'
  english_pob_reading: for the house of our God
  chosen_spanish_reading: para la casa de nuestro Dios
  alternative_spanish_readings:
  - para el templo de nuestro Dios
  - para la casa de Dios
  rationale: Se preserva la formulación relacional y pactal del hebreo, en vez de sustituirla sin necesidad por un equivalente más interpretativo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El pasaje revisado en el audit trail inglés no recibió cambios en la última pasada; la versión española sigue esa lectura de alta concordancia, conservando la distinción entre el grupo llamado נתינים y los «ministros» solicitados para el servicio de la casa de Dios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo usa אֱלֹהֵינוּ, por lo que corresponde «nuestro Dios».
  - Se evita «SEÑOR» y también se evita transliterar innecesariamente términos que ya tienen equivalente funcional claro en español.
  - «Casifía» sigue la forma española habitual del topónimo, con acento gráfico para la lectura en español.
  - La metáfora «puse en su boca palabras» se conserva para respetar el hebreo, aunque el español podría decirse de modo más idiomático.
  - «Ministros» se usa en sentido funcional de servicio al templo, no como cargo institucional moderno.
