translation:
  language: es
  text: Combatió con valentía[a] y derrotó a Amalec[b], y libró a Israel de la mano de los que lo despojaban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'hizo valor/fuerza', un modismo militar que expresa valentía o éxito en combate.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'Amalec', nombre del pueblo amalecita; se mantiene la forma singular del original.
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene 'de la mano de su despojador', con singular que se entiende de manera colectiva respecto de Israel; en español se expresa naturalmente en plural con 'los que'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ חַיִל
  english_pob_choice: fought valiantly
  chosen_spanish: Combatió con valentía
  alternatives_spanish:
  - hizo proezas
  - mostró valor
  - actuó con valentía
  lexicon: HALOT
  rationale: El hebreo es un modismo que expresa vigor, valor o éxito militar, no literalmente 'hacer fuerza'. 'Combatió con valentía' conserva el sentido idiomático y el marco bélico del contexto.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de muerte
  - derrotó
  lexicon: HALOT
  rationale: נכה puede significar golpear o abatir. 'Hirió' mantiene la imagen verbal del golpe sin forzar una formulación más interpretativa como 'derrotó'.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - los amalecitas
  lexicon: HALOT
  rationale: El hebreo usa el nombre singular etnónimo/properio. 'Amalec' conserva mejor la forma del original; el lector entiende el colectivo por el contexto.
- source_word: וַיַּצֵּל
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - salvó
  - liberó
  lexicon: HALOT
  rationale: נצל en hifil significa rescatar o librar. 'Libró' es natural en español bíblico moderno y conserva la idea de sacar de peligro o control.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la opresión de
  lexicon: HALOT
  rationale: La expresión idiomática 'de la mano de' preserva la imagen hebrea de dominio o control y es inteligible en español.
- source_word: שֹׁסֵהוּ
  english_pob_choice: those who plundered it
  chosen_spanish: los que lo despojaban
  alternatives_spanish:
  - los que lo saqueaban
  - su despojador
  - los saqueadores
  lexicon: HALOT
  rationale: El participio indica quienes despojan o saquean. En español, el plural es natural para la fuerza colectiva del hebreo, y 'lo' concuerda con Israel como referente singular colectivo.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'them' por 'it' para concordar con el referente singular 'Israel'; la traducción española conserva ese acuerdo semántico con 'lo'. También se mantuvo la estructura narrativa breve y la imaginería de 'mano' del hebreo.
  spanish_consistency_notes:
  - Se usa 'Amalec' para el etnónimo singular, coherente con la práctica de conservar nombres bíblicos propios cuando el original lo hace.
  - '''Libró'' se mantiene para נצל, evitando ''salvó'' para no cargar el verso con una interpretación teológica adicional.'
  - La concordancia de 'lo' con 'Israel' respeta el referente singular colectivo del hebreo, aunque el sentido sea corporativo.
