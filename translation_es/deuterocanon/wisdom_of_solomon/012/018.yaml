revisions:
- from: Pero tú[a], siendo dueño de la fuerza, juzgas con mansedumbre, y con gran indulgencia nos gobiernas[b]; porque tuya es la capacidad cuando tú quieres.
  to: Pero tú, siendo dueño de la fuerza, juzgas con gentileza[a], y con gran moderación nos gobiernas; porque tuya es la capacidad[b] cuando quieres.
  rationale: Se corrigen los anclajes de notas para que correspondan al término explicado. Se sustituye «mansedumbre» por «gentileza» para reflejar mejor ἐπιείκεια, preservando la alternativa «clemencia» en nota. Se cambia «gran indulgencia» por «gran moderación» para representar mejor φειδώ como contención/mesura. Se mantiene «dueño de la fuerza» y «tuya es la capacidad» porque preservan la distinción léxica del griego y son comprensibles en español bíblico moderno. Se suaviza «cuando tú quieres» a «cuando quieres» por naturalidad.
