translation:
  language: es
  text: Que sean como paja delante del viento[a], y como tamo que una tempestad se lleva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como tamo que una tempestad roba» o «arrebata». El verbo hebreo literalmente significa «robar» y se usa de manera poética para expresar una remoción súbita.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  english_pob_choice: May they be
  chosen_spanish: Que sean
  alternatives_spanish:
  - Sean
  - Que lleguen a ser
  lexicon: HALOT
  rationale: En este contexto poético de deseo/comparación, el imperfecto hebreo funciona con fuerza modal. «Que sean» conserva bien ese valor exhortativo o desiderativo sin sonar tan imperativo como «Sean».
- source_word: כְּתֶבֶן
  english_pob_choice: like straw
  chosen_spanish: como paja
  alternatives_spanish:
  - como paja seca
  - como rastrojo
  lexicon: HALOT
  rationale: Para el español bíblico y moderno, «paja» comunica con claridad la imagen de algo ligero y vulnerable al viento. «Rastrojo» puede sugerir otra etapa agrícola y es menos directo aquí.
- source_word: לִפְנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: delante del viento
  alternatives_spanish:
  - en la cara del viento
  - ante el viento
  lexicon: HALOT
  rationale: «Delante del viento» reproduce la idea espacial del hebreo y la relación de exposición a su fuerza. «Ante el viento» sería posible, pero «delante» conserva mejor la imagen visual.
- source_word: וּכְמֹץ
  english_pob_choice: and like chaff
  chosen_spanish: y como tamo
  alternatives_spanish:
  - y como paja menuda
  - y como cascarilla
  lexicon: HALOT
  rationale: «מֹץ» es el residuo liviano separado del grano; en español «tamo» es un equivalente preciso y sobrio, aunque menos común. Se mantiene la imagen agrícola con buena correspondencia léxica.
- source_word: גְּנָבַתּוּ
  english_pob_choice: carries away
  chosen_spanish: se lleva
  alternatives_spanish:
  - roba
  - arrebata
  - se lo lleva robándolo
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «robar», y la POB inglesa preserva esa tensión al notar la alternativa «steals away». En español, «se lleva» comunica con naturalidad el efecto poético de arrastre o remoción, sin perder del todo la idea de sustracción implícita.
- source_word: סוּפָה
  english_pob_choice: a storm
  chosen_spanish: una tempestad
  alternatives_spanish:
  - un torbellino
  - una tormenta
  lexicon: HALOT
  rationale: «סוּפָה» puede abarcar tempestad/tormenta/torbellino. «Tempestad» conserva el tono elevado y la fuerza del cuadro poético; «tormenta» sería también válido, pero algo más general.
translation_notes:
  revision_awareness: El texto inglés POB vigente presenta la imagen comparativa con «straw» / «chaff» y mantiene una nota léxica para גְּנָבַתּוּ. La versión española conserva esa tensión entre naturalidad y literalidad, usando «se lleva» en el cuerpo y anotando el sentido literal de «robar» en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «paja» para כְּתֶבֶן y «tamo» para מֹץ para distinguir los dos miembros poéticos sin colapsarlos en un solo término.
  - «Tempestad» y no «torbellino» se prefirió por su amplitud semántica y por encajar bien con la imagen del arrastre del tamo.
