translation:
  language: es
  text: La riqueza del rico es su ciudad fortificada[a], y como un muro alto en su imaginación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su mente», «en su percepción» o «en su presunción». El hebreo se refiere a una imagen mental o a una manera de ver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - patrimonio
  lexicon: HALOT
  rationale: El hebreo denota posesiones o riqueza material. «Riqueza» suena natural en español moderno y conserva el sentido general del proverbio sin estrecharlo indebidamente.
- source_word: עָשִׁיר
  english_pob_choice: rich man’s
  chosen_spanish: del rico
  alternatives_spanish:
  - del hombre rico
  - del rico hombre
  - del adinerado
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «Del rico» mantiene la forma masculina singular general del hebreo y es idiomático en español, sin introducir una reescritura explicativa.
- source_word: קִרְיַת עֻזּוֹ
  english_pob_choice: his strong city
  chosen_spanish: su ciudad fuerte
  alternatives_spanish:
  - la ciudad de su fuerza
  - su ciudad fortificada
  - su ciudad-fortaleza
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «ciudad de su fuerza». «Su ciudad fuerte» conserva la metáfora de fortaleza urbana de modo claro y natural en español.
- source_word: וּכְחוֹמָה נִשְׂגָּבָה
  english_pob_choice: and like a high wall
  chosen_spanish: y como un muro alto
  alternatives_spanish:
  - y como un muro elevado
  - y como una muralla alta
  - y como un muro inaccesible
  lexicon: HALOT
  rationale: «חוֹמָה» es «muro» o «muralla»; «נִשְׂגָּבָה» expresa elevación y por extensión inaccesibilidad. «Muro alto» preserva la imagen sin sobrerinterpretar el matiz.
- source_word: בְּמַשְׂכִּיתוֹ
  english_pob_choice: in his imagination
  chosen_spanish: en su imaginación
  alternatives_spanish:
  - en su mente
  - en su percepción
  - en su orgullo
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una imagen, representación o figura mental. «En su imaginación» reproduce bien la dimensión subjetiva del hebreo y evita cargar el texto con una valoración más negativa de la que exige la palabra.
theological_decisions:
- issue: Valor semántico de בְּמַשְׂכִּיתוֹ
  english_pob_reading: The Hebrew term refers to a mental image or way of seeing.
  chosen_spanish_reading: el término se entiende como una imagen o representación mental del modo en que el rico ve su seguridad
  alternative_spanish_readings:
  - una lectura meramente espacial del muro
  - una traducción de tono moralizante como 'en su orgullo'
  rationale: El contexto contrasta seguridad real con seguridad percibida. La formulación española debe conservar esa tensión entre fortaleza aparente y percepción subjetiva, sin convertir el término en una condena psicológica más fuerte que la del hebreo.
  doctrine_reference: Sabiduría bíblica; precisión lexical sobre percepción humana
- issue: Correspondencia de género y forma general en el proverbio
  english_pob_reading: A rich man's wealth...
  chosen_spanish_reading: La formulación mantiene el singular masculino genérico del hebreo sin volverlo abstracto ni neutro
  alternative_spanish_readings:
  - La riqueza del ser humano
  - La riqueza de quien es rico
  rationale: El hebreo usa un sujeto singular masculino con fuerza proverbial general. En español, «del rico» preserva mejor esa forma y sigue siendo ampliamente inteligible.
  doctrine_reference: Principio de fidelidad formal en proverbios
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registraron cambios necesarios y el pasaje muestra alto acuerdo entre revisiones.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo «imaginación» para בְּמַשְׂכִּיתוֹ porque el POB inglés ya documenta la lectura mental/visual y el español la expresa naturalmente.
  - Se evitó «muralla» para no sobrecargar el paralelismo; «muro alto» reproduce mejor la concisión del hebreo.
  - No se introdujo «Cristo», «Señor» ni terminología doctrinal ajena al proverbio.
