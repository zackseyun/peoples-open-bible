  to: Y se mantuvo cerca de él, para entregárselo, para que reinara en lugar de su padre. Y le informaron todo lo que Demetrio había hecho, y la hostilidad con la que sus fuerzas le eran hostiles[a]; y permaneció allí muchos días.
