    reason: lexical_alternative
  revision_rationale: Se revisa para restaurar en español la imagen central del verbo hebreo חפר («cavar»), en línea con la decisión documentada del POB en inglés. «Y cavan por ella» conserva la metáfora intensa de buscar la muerte como si fuera un tesoro oculto, mientras mantiene un español suficientemente natural y digno. La nota sobre «y no está» se conserva porque refleja una alternativa literal ya documentada.
