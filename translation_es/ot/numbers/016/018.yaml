translation:
  language: es
  text: Entonces cada hombre tomó su brasero[a], y pusieron fuego en ellos y pusieron incienso sobre ellos, y se pusieron de pie a la entrada de la tienda de reunión, con Moisés y Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'incensario' para 'brasero'. El término hebreo designa un recipiente para llevar brasas encendidas usadas al ofrecer incienso.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ מַחְתָּתוֹ
  english_pob_choice: each man took his firepan
  chosen_spanish: cada hombre tomó su brasero
  alternatives_spanish:
  - cada uno tomó su incensario
  - cada hombre tomó su incensario
  lexicon: HALOT
  rationale: אִישׁ tiene valor distributivo aquí, y el posesivo singular indica que cada uno tomó su propio utensilio. En español, 'brasero' conserva la idea concreta de un recipiente para brasas ardientes; 'incensario' es una alternativa tradicional, pero puede sugerir el objeto ya destinado al incienso, mientras que el contexto primero destaca el recipiente para fuego.
- source_word: וַיִּתְּנוּ עֲלֵיהֶם אֵשׁ
  english_pob_choice: they put fire in them
  chosen_spanish: pusieron fuego en ellos
  alternatives_spanish:
  - pusieron fuego sobre ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'sobre ellos', con recipientes el sentido natural en español es colocar el fuego dentro. Se mantiene el paralelismo verbal con la siguiente acción para conservar el ritmo del texto.
- source_word: וַיָּשִׂימוּ עֲלֵיהֶם קְטֹרֶת
  english_pob_choice: they put incense on them
  chosen_spanish: pusieron incienso sobre ellos
  alternatives_spanish:
  - pusieron incienso en ellos
  lexicon: HALOT
  rationale: Se conserva 'sobre ellos' porque el incienso se coloca sobre las brasas encendidas dentro del brasero. 'Pusieron' refleja el verbo repetido del hebreo con consistencia léxica.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma para quemar
  lexicon: HALOT
  rationale: '''Incienso'' es el equivalente estándar en español para la sustancia aromática quemada en contexto cúltico.'
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: la entrada de la tienda de reunión
  alternatives_spanish:
  - la entrada del tabernáculo de reunión
  - la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: '''אֹהֶל מוֹעֵד'' se rinde como ''tienda de reunión'' para mantener el sentido cultual sin sustituirlo por terminología eclesial. ''Entrada'' reproduce bien פֶּתַח en español bíblico claro.'
- source_word: וּמֹשֶׁה וְאַהֲרֹן
  english_pob_choice: with Moses and Aaron
  chosen_spanish: con Moisés y Aarón
  alternatives_spanish:
  - y Moisés y Aarón
  lexicon: HALOT
  rationale: El hebreo añade estos nombres como un complemento de ubicación/acompamiento. 'Con' expresa con naturalidad que estaban presentes allí junto a la entrada.
theological_decisions:
- issue: Renderización del espacio cultual אֹהֶל מוֹעֵד
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tabernáculo de reunión
  - tienda del encuentro
  rationale: Se conserva la designación cultual tradicional de la unidad hebrea sin sustituirla por un término que oscurezca la imagen concreta de una tienda. 'Tienda de reunión' preserva el vínculo con el lugar donde Dios se encuentra con su pueblo.
  doctrine_reference: Éxodo 25–40; Números 16:18
- issue: Presencia de Moisés y Aarón al final de la cláusula
  english_pob_reading: with Moses and Aaron
  chosen_spanish_reading: con Moisés y Aarón
  alternative_spanish_readings:
  - y Moisés y Aarón
  rationale: La cláusula hebrea final funciona como una indicación de compañía/presencia en el lugar. 'Con' evita añadir una relación narrativa no explicitada y mantiene la observación espacial del texto.
  doctrine_reference: Números 16:18
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que prefirió 'put incense on them' a 'laid incense on them' para mantener consistencia con el verbo repetido. En español se reflejó esa consistencia con 'pusieron' en ambas acciones, sin perder el matiz ritual de colocar incienso sobre brasas dentro del recipiente.
  spanish_consistency_notes:
  - Se usó 'tienda de reunión' de manera uniforme para אֹהֶל מוֹעֵד.
  - Se mantuvo 'Moisés y Aarón' sin artículos, como nombres propios bíblicos estándar en español.
  - Se evitó 'SEÑOR' u otra sustitución, ya que no aparece el nombre divino en este versículo.
  - '''Brasero'' se eligió por claridad concreta, con ''incensario'' retenido en nota como alternativa válida.'
