translation:
  language: es
  text: ¡Oh naturaleza sagrada[a], y los afectos de los padres, y el amor filial hacia los padres, y la crianza, y las pasiones[b] indomables de las madres!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vínculo natural» para φύσις; el griego puede señalar tanto la naturaleza misma como el orden natural encarnado en los afectos familiares.
    reason: lexical_alternative
  - marker: b
    text: «Pasiones» aquí significa afectos o emociones poderosas, no necesariamente deseos desordenados.
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσις
  english_pob_choice: nature
  chosen_spanish: naturaleza
  alternatives_spanish:
  - vínculo natural
  - afecto natural
  lexicon: LSJ
  rationale: φύσις puede significar naturaleza u orden natural. En esta exclamación, «naturaleza» conserva el sentido directo y el tono elevado del original, mientras que las alternativas explicitan el vínculo familiar pero se alejan más del lexema.
- source_word: ἱερά
  english_pob_choice: sacred
  chosen_spanish: sagrada
  alternatives_spanish:
  - santa
  - consagrada
  lexicon: LSJ
  rationale: Como adjetivo atributivo de φύσις, «sagrada» mantiene el valor encomiástico de la expresión sin imponer un matiz cultual demasiado específico.
- source_word: φίλτρα γονέων
  english_pob_choice: the affections of parents
  chosen_spanish: afectos de los padres
  alternatives_spanish:
  - amor de los padres
  - ternuras de los padres
  lexicon: LSJ
  rationale: φίλτρα puede abarcar afectos, amores o vínculos entrañables. «Afectos» reproduce bien la fuerza emocional y evita un sentido extraño o demasiado literal como «encantos».
- source_word: γονεύσιν φιλοστόργε
  english_pob_choice: filial love toward parents
  chosen_spanish: amor filial hacia los padres
  alternatives_spanish:
  - ternura filial hacia los padres
  - afecto filial para con los padres
  lexicon: LSJ
  rationale: φιλοστόργος expresa afecto tierno y natural dentro de la familia. «Amor filial hacia los padres» hace explícita la relación marcada por el dativo y suena idiomático en español.
- source_word: τροφεῖα
  english_pob_choice: nurture
  chosen_spanish: crianza
  alternatives_spanish:
  - crianza y cuidado
  - nurtura
  lexicon: LSJ
  rationale: El término alude a la acción de criar, alimentar y formar a un hijo. «Crianza» es breve, natural en español y abarca la idea de formación y cuidado.
- source_word: μητέρων ἀδάμαστα πάθη
  english_pob_choice: the unconquerable passions of mothers
  chosen_spanish: pasiones indomables de las madres
  alternatives_spanish:
  - emociones indomables de las madres
  - afectos indomables de las madres
  lexicon: LSJ
  rationale: ἀδάμαστα significa invencibles, indomables o inconquistables; πάθη aquí denota emociones intensas o afectos fuertes. «Pasiones indomables» conserva la intensidad del griego sin sugerir necesariamente desorden moral.
theological_decisions:
- issue: 'Cómo entender el verso: afirmación doctrinal sobre el orden santificado de la familia o exclamación retórica sobre sus vínculos naturales'
  english_pob_reading: A rhetorical exclamation praising the sacredness and strength of natural family affections
  chosen_spanish_reading: Una exclamación retórica que ensalza lo sagrado y la fuerza de los afectos familiares naturales
  alternative_spanish_readings:
  - Una lamentación que invoca la fuerza de los vínculos parentales y maternos sin matiz de elogio
  - Una fórmula puramente devocional acerca de la familia
  rationale: La vocación inicial Ὦ y la serie de sintagmas nominales indican apostrofe exaltada. Traducir ἱερά como «sagrada» conserva la valoración del autor sin convertir el verso en una tesis doctrinal más fuerte de lo que el griego exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se detectaron revisiones textuales aplicadas en el paquete auditado; el griego base y la lectura inglesa se mantienen estables, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se prefirió «sagrada» sobre «santa» para evitar un matiz cultual excesivo y seguir la valoración encomiástica del griego.
  - «Pasiones» se conservó por su intensidad retórica, con nota aclaratoria para impedir una lectura moralizante no exigida por πάθη.
