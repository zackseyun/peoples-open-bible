  spanish_quality_summary: 'La redacción actual suena algo forzada y menos natural en español bíblico moderno: «en cuya mano hay» es perifrástico frente a «en su mano», y los signos de admiración no están motivados por el hebreo. Una formulación más fiel y legible es: «Un mercader, con balanzas de engaño en su mano, ama oprimir[a].»'
  glossary_alignment: 'No hay conflicto con glosario mayor salvo la elección de כְּנַעַן. Debe alinearse con la decisión contextual documentada: «mercader» en el texto principal, con nota que preserve «Canaán / cananeo». «Oprimir» está bien porque conserva el alcance de לַעֲשֹׁק; «balanzas de engaño» también es aceptable y fiel a מֹאזְנֵי מִרְמָה.'
