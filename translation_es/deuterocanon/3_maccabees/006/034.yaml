revisions:
- from: Y los que antes los habían consignado a destrucción y a ser devorados por aves[a], y los habían registrado con alegría, gimieron profundamente, cubriéndose de vergüenza[b], y su audacia de fuego fue totalmente apagada.
  to: Y los que antes los habían consignado a destrucción y a ser devorados por aves[a], y los habían inscrito con alegría, gimieron profundamente, cubriéndose de vergüenza[b], y su audacia ardiente fue totalmente apagada.
