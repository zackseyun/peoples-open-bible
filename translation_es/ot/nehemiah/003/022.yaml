translation:
  language: es
  text: Después de él, los sacerdotes[a], los hombres de la llanura, hicieron reparaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura» o «el distrito» para «la región circular/adyacente». El hebreo כִּכָּר puede denotar una llanura o un distrito circular; aquí el referente local exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Y después de él
  - Tras él
  lexicon: HALOT
  rationale: La expresión indica secuencia inmediata en la lista de reconstrucción. «Después de él» conserva el orden narrativo sin sobrecargar con una conjunción innecesaria en español.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones
  alternatives_spanish:
  - repararon
  - hicieron obras de reparación
  - restauraron
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo se usa idiomáticamente para la labor de reconstrucción del muro. «Hicieron reparaciones» mantiene ese valor de trabajo de obra sin sonar demasiado técnico o literal.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: El sustantivo plural definido designa sin ambigüedad al grupo sacerdotal. En español bíblico contemporáneo, «sacerdotes» comunica bien el término hebreo.
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: La construcción en hebreo es masculina plural y literalmente dice «hombres de». Se conserva esa forma para no neutralizar indebidamente el dato gramatical del texto.
- source_word: הַכִּכָּר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - el distrito
  - la región
  lexicon: HALOT
  rationale: כִּכָּר puede referirse a una llanura o a una zona circular. Dado el contexto de lista de reparadores y la preferencia inglesa por «the plain», «la llanura» es la opción más directa y natural en español, aunque el referente local exacto sigue incierto.
translation_notes:
  revision_awareness: 'El texto hebreo es breve y coincide ampliamente con la tradición auditada en inglés. La única decisión de alcance interpretativo es כִּכָּר: siguiendo la revisión inglesa más reciente, se mantiene «la llanura», pero se preserva en nota la incertidumbre del referente local y las alternativas semánticas.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología cristiana no presente en el hebreo.
  - «Sacerdotes» se usa para הַכֹּהֲנִים conforme al valor léxico estándar.
  - «Hicieron reparaciones» refleja el uso técnico de הֶחֱזִיקוּ en el catálogo de Nehemías 3.
  - La nota de pie de página se ancla en «la llanura» para conservar la ambigüedad documentada de כִּכָּר.
