  yaml_path: translation/ot/jeremiah/051/035.yaml
  text: “My violence and my flesh be upon Babylon,” says the inhabitant of Zion[b][a]. “And my blood be upon the inhabitants of Chaldea,” says Jerusalem.
  footnotes:
  - marker: a
    text: Or “and my body.” The Hebrew term is traditionally understood here as referring to bodily flesh, though some have proposed other derivations.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to the inhabitants of Chaldea”; the English renders the implied imprecatory sense in parallel with “be upon Babylon.”
    reason: lexical_alternative
