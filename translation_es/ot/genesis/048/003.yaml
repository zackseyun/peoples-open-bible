translation:
  language: es
  text: 'Y Jacob dijo a José: «Dios Todopoderoso[a] se me apareció en Luz, en la tierra de Canaán, y me bendijo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «El Shaddai». Tradicionalmente se vierte «Dios Todopoderoso»; el matiz exacto de Shaddai sigue siendo debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: En español, la coordinación narrativa ya queda implícita en el flujo del relato; «dijo» comunica con naturalidad la secuencia sin añadir una fórmula pesada. Se conserva la continuidad narrativa del waw consecutivo sin mecanicismo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a José
  - para José
  lexicon: HALOT
  rationale: La preposición normal en español para destinatario es «a». Mantiene la dirección del habla sin introducir matiz final ni beneficio.
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - El Shaddai
  - Dios Omnipotente
  - Mighty God
  lexicon: HALOT
  rationale: Se traduce el título divino en vez de transliterarlo, siguiendo el criterio POB. «Todopoderoso» es la equivalencia natural y reverente en español. Se evita «Omnipotente» por ser menos idiomático en este giro nominal.
- source_word: נִרְאָה
  english_pob_choice: appeared
  chosen_spanish: se me apareció
  alternatives_spanish:
  - apareció
  - fue visto por mí
  - se reveló a mí
  lexicon: HALOT
  rationale: El nifal expresa manifestación visible; en español, «se me apareció» conserva la relación personal del evento sin añadir una reflexión explicativa ajena al hebreo. «Se reveló» sería posible, pero va más allá de la forma verbal explícita.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: se me
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: HALOT
  rationale: La referencia pronominal se integra mejor en la construcción reflexiva del español «se me apareció». Así se mantiene la direccionalidad hacia Jacob de manera idiomática y precisa.
- source_word: בְּלוּז
  english_pob_choice: at Luz
  chosen_spanish: en Luz
  alternatives_spanish:
  - en la ciudad de Luz
  - en Betel
  lexicon: HALOT
  rationale: Para un topónimo, «en Luz» es la forma natural y fiel. No se añade la identificación con Betel porque el hebreo aquí nombra explícitamente a Luz.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en el país de Canaán
  lexicon: HALOT
  rationale: Se conserva «tierra» porque el constructo lo expresa explícitamente y porque en español mantiene el valor geográfico y pactal del hebreo con claridad.
- source_word: וַיְבָרֶךְ אֹתִי
  english_pob_choice: and blessed me
  chosen_spanish: y me bendijo
  alternatives_spanish:
  - y me bendecía
  - y él me bendijo
  lexicon: HALOT
  rationale: El perfecto narrativo se expresa con pasado simple. Se omite el pronombre explícito del sujeto porque el español lo recupera naturalmente del contexto inmediato, sin perder la referencia a Dios como sujeto del verbo.
theological_decisions:
- issue: Título divino אֵל שַׁדַּי
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - El Shaddai
  - Dios Omnipotente
  rationale: Se sigue la decisión auditada de traducir el título en lugar de transliterarlo. «Dios Todopoderoso» comunica el sentido tradicional sin ocultar el carácter titulado de la expresión. La alternativa transliterada se preserva como posibilidad reconocida, pero no entra al texto principal.
  doctrine_reference: Translation philosophy §2; Preserve theological tension where ambiguity is genuine (§3)
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustantivos; se mantiene el acuerdo alto del audit trail en una solución española directa y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, sin sustituirlo por «Señor».
  - Se conserva el título divino como traducción, no como transliteración, en consonancia con el criterio POB.
  - La forma verbal española mantiene el pasado narrativo y la relación personal «se me apareció» sin añadir explicaciones interpretativas.
