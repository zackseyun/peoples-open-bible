translation:
  language: es
  text: 'Y de Benjamín: Eliada, un guerrero valiente, y con él doscientos mil armados[a] con arco y escudo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que portaban arcos y escudos» o «equipados con arco y escudo». El participio hebreo describe a hombres provistos de esas armas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y de entre
  lexicon: HALOT
  rationale: La preposición introduce otro contingente en la lista militar. «Y de» conserva el enlace aditivo del hebreo y suena natural en español sin perder la relación de procedencia tribal.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio tribal; en español bíblico estándar lleva tilde por la pronunciación llana aguda adaptada.
- source_word: גִּבּוֹר חַיִל
  english_pob_choice: a mighty man of valor
  chosen_spanish: un hombre fuerte y valiente
  alternatives_spanish:
  - un guerrero valiente
  - un hombre poderoso y valiente
  - un valiente hombre de guerra
  lexicon: HALOT
  rationale: La expresión combina fuerza y valor militar. «Hombre fuerte y valiente» mantiene ambas dimensiones sin forzar la fórmula castellana tradicional, y evita una paráfrasis más interpretativa.
- source_word: אֶלְיָדָע
  english_pob_choice: Eliada
  chosen_spanish: Eliada
  alternatives_spanish:
  - Eliadá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma ya establecida por la tradición transliterada en español, sin traducir el nombre.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: 'Se conserva la conjunción para reflejar la estructura del catálogo: primero el jefe nombrado, luego la tropa asociada a él.'
- source_word: נֹשְׁקֵי
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - portando
  - equipados
  lexicon: HALOT
  rationale: El participio en este contexto militar describe a quienes van provistos de armas. «Armados» transmite el estado resultante de forma natural y fiel.
- source_word: קֶשֶׁת
  english_pob_choice: bow
  chosen_spanish: arco
  alternatives_spanish:
  - arcos
  lexicon: HALOT
  rationale: «Arco» es el equivalente directo. Aunque el hebreo pueda funcionar colectivamente, el español admite el singular genérico en la fórmula de equipo.
- source_word: וּמָגֵן
  english_pob_choice: and shield
  chosen_spanish: y escudo
  alternatives_spanish:
  - y escudos
  lexicon: HALOT
  rationale: «Escudo» corresponde al arma defensiva mencionada y, como en inglés, el singular puede tener valor colectivo dentro de la expresión de equipo.
- source_word: מָאתַיִם אָלֶף
  english_pob_choice: two hundred thousand
  chosen_spanish: doscientos mil
  alternatives_spanish:
  - doscientas mil
  lexicon: HALOT
  rationale: Número cardinal estándar. Se adapta a la concordancia implícita con «hombres»/«armados» sin añadir una palabra que el hebreo no explicita.
translation_notes:
  revision_awareness: El texto hebreo y el auditable inglés coinciden de forma alta; no se detectaron revisiones aplicadas. La versión española sigue la misma segmentación básica y conserva la ambigüedad del participio militar de נֹשְׁקֵי en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene el estilo de lista militar con puntuación breve y nombres propios transliterados.
  - Se evita introducir «seiscientos» o cualquier otro ajuste numérico, porque el hebreo y el inglés concuerdan en doscientos mil.
