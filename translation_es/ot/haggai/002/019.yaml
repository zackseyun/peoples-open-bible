translation:
  language: es
  text: ¿Todavía está la semilla en el granero? Aun la vid, la higuera, el granado y el olivo no han dado fruto. Desde este día en adelante los bendeciré[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «bendeciré», con el objeto implícito por el contexto; se explicita en español como «los» para claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֹוד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía queda
  lexicon: HALOT
  rationale: עוֹד en esta pregunta expresa continuidad hasta el presente; «todavía» comunica bien esa continuidad en español natural y conserva el matiz interrogativo.
- source_word: הַזֶּרַע
  english_pob_choice: the seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - el grano
  - la simiente
  lexicon: HALOT
  rationale: זֶרַע puede referirse a semilla o grano para siembra. «La semilla» preserva el sentido básico sin sobreespecificar y es claro en español moderno.
- source_word: בַּמְּגוּרָה
  english_pob_choice: in the storehouse
  chosen_spanish: en el granero
  alternatives_spanish:
  - en el almacén
  - en la granja
  lexicon: HALOT
  rationale: מְגוּרָה designa un lugar de almacenamiento de grano o productos. «Granero» es una equivalencia natural en español para un depósito agrícola y encaja bien con el contexto.
- source_word: וְעַד
  english_pob_choice: And as for
  chosen_spanish: Aun
  alternatives_spanish:
  - Y en cuanto a
  - Y aun
  lexicon: HALOT
  rationale: Aquí עַד introduce una extensión desde la semilla hacia los árboles frutales. «Aun» conserva el valor inclusivo/enfático que en inglés se captó con «Even» y evita una construcción más pesada.
- source_word: הַגֶּפֶן וְהַתְּאֵנָה וְהָרִמּוֹן וְעֵץ הַזַּיִת
  english_pob_choice: the vine, the fig tree, the pomegranate, and the olive tree
  chosen_spanish: la vid, la higuera, el granado y el olivo
  alternatives_spanish:
  - la vid, la higuera, la granada y el árbol de olivo
  - la vid, la higuera, el granado y el árbol de aceituna
  lexicon: HALOT
  rationale: Son términos agrícolas estándar. «Vid» es la forma natural de la planta de la uva; «higuera», «granado» y «olivo» son equivalentes idiomáticos claros en español. Se evita añadir «árbol» donde el español ya usa el nombre del árbol.
- source_word: לֹא נָשָׂא
  english_pob_choice: has not borne fruit
  chosen_spanish: no han dado fruto
  alternatives_spanish:
  - no han producido fruto
  - no han llevado fruto
  lexicon: HALOT
  rationale: נָשָׂא con plantas frutales expresa el resultado esperado de producir o llevar fruto. «No han dado fruto» es la equivalencia española más natural y conserva el sentido idiomático.
- source_word: מִן הַיּוֹם הַזֶּה
  english_pob_choice: From this day on
  chosen_spanish: Desde este día
  alternatives_spanish:
  - A partir de hoy
  - Desde hoy
  lexicon: HALOT
  rationale: La frase marca un punto de arranque presente y prospectivo. «Desde este día» mantiene el énfasis temporal del hebreo; el contexto ya implica la continuación hacia adelante.
- source_word: אֲבָרֵךְ
  english_pob_choice: I will bless you
  chosen_spanish: los bendeciré
  alternatives_spanish:
  - bendeciré
  - los voy a bendecir
  lexicon: HALOT
  rationale: El verbo está en primera singular futura y el objeto está implícito por el contexto. En español conviene explicitar el objeto con el pronombre clítico «los» para dejar claro el destinatario colectivo sin añadir contenido nuevo.
theological_decisions:
- issue: Objeto implícito de la promesa de bendición
  english_pob_reading: I will bless you
  chosen_spanish_reading: los bendeciré
  alternative_spanish_readings:
  - bendeciré
  - los voy a bendecir
  rationale: El hebreo no expresa el objeto, pero la profecía se dirige a la comunidad. En español, explicitar «los» comunica la referencia implícita sin alterar la teología del pasaje; simplemente hace audible el destinatario colectivo.
  doctrine_reference: 'Isaías/Hageo: promesa de bendición pactal a la comunidad restaurada'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el cierre revisado del texto fuente en inglés: la segunda cláusula se expresa de forma plural («no han dado fruto») para concordar naturalmente con la lista de plantas. También se conservó el giro temporal prospectivo («Desde este día»), equivalente al sentido de inicio marcado por el inglés revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; aquí no aparece, por lo que no se introduce.
  - Se mantiene «fruto» como complemento idiomático necesario con נָשָׂא en contexto agrícola.
  - «Vid» se prefiere a «parra» o «viña» por ser la equivalencia más directa y natural del hebreo en esta enumeración.
  - 'La nota al pie marca la única ampliación explícita respecto del hebreo: el objeto pronominal de «bendeciré».'
