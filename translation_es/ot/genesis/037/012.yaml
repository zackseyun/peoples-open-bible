translation:
  language: es
  text: Ahora sus hermanos fueron a pastorear el rebaño de su padre en Siquem[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Siquem». La preposición hebrea puede denotar ubicación dentro del lugar o en su cercanía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: El wayyiqtol de הלך introduce el siguiente hecho narrativo. En español, «fueron» comunica el desplazamiento de manera natural y conserva la progresión narrativa indicada por el waw consecutivo; «Ahora» queda implícito en el avance del relato.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  lexicon: HALOT
  rationale: El sustantivo se refiere a los hermanos de José; en español «sus hermanos» es claro y natural, y el contexto ya fija que son varones sin necesidad de explicitarlo.
- source_word: לִרְעוֹת
  english_pob_choice: to pasture
  chosen_spanish: a apacentar
  alternatives_spanish:
  - a pastorear
  - a cuidar el rebaño
  lexicon: HALOT
  rationale: רעה expresa aquí la acción de atender y alimentar el ganado. «Apacentar» conserva ese valor pastoral con registro digno en español bíblico contemporáneo; «pastorear» también sería posible, pero «apacentar» evita el matiz de oficio más que de acción.
- source_word: צֹאן
  english_pob_choice: flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, especialmente ovejas y cabras. «Rebaño» es el equivalente colectivo más idiomático en español y no sobreespecifica la especie.
- source_word: אֲבִיהֶם
  english_pob_choice: their father’s
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su padre de ellos
  lexicon: HALOT
  rationale: La construcción posesiva en hebreo se expresa de forma natural con «de su padre». El referente posesivo ya está claro por el contexto.
- source_word: בִּשְׁכֶם
  english_pob_choice: at Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Siquem, cerca de allí
  - a Siquem
  lexicon: HALOT
  rationale: El nombre propio se translitera como «Siquem». La preposición ב puede equivaler a «en» o «en la zona de/at»; aquí «en Siquem» reproduce de manera sobria la localización, dejando abierta la posibilidad de cercanía implícita en el uso hebreo.
translation_notes:
  revision_awareness: Se revisó el contexto de audit trail en inglés y no se detectaron cambios recientes que afecten la alineación semántica. La formulación española busca mantenerse fiel al hebreo y a la decisión inglesa de no sobretraducir la preposición de lugar.
  spanish_consistency_notes:
  - Se preservó el nombre propio «Siquem» de forma consistente con la política de transliteración.
  - Se eligió «apacentar» para mantener el matiz pastoral de רעה sin introducir una explicación interpretativa adicional.
  - El adverbio narrativo «Ahora» reproduce el avance discursivo señalado por la secuencia verbal sin añadir información al contenido proposicional.
