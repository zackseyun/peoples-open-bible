    rationale: Aunque intenta preservar la fuerza cultual, en español resulta extraño y menos natural que una formulación verbal o relativa. El griego apunta a comer algo que los haría religiosamente impuros/profanados; «comida que los profanara» comunica mejor ese efecto.
  - severity: low
