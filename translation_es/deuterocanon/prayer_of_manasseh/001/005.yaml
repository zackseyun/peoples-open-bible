translation:
  language: es
  text: ante quien todo[a] se estremece y tiembla a la presencia de tu poder, porque la majestad de tu gloria es insoportable[b], y la ira de tu amenaza contra los pecadores es imposible de soportar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todas las cosas'; literalmente, 'todo'.
    reason: lexical_alternative
  - marker: b
    text: O 'la majestad de tu gloria no puede ser resistida'.
    reason: lexical_alternative
  - marker: c
    text: O 'la ira de tu amenaza contra los pecadores es insostenible' o 'intolerable'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: before whom
  chosen_spanish: ante quien
  alternatives_spanish:
  - ante el cual
  - delante de quien
  lexicon: LSJ
  rationale: El relativo apunta a Dios desde el versículo anterior y rige la reacción temerosa que sigue. En español, 'ante quien' reproduce con naturalidad la relación de presencia reverente sin perder el valor relacional del relativo.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo[a]
  alternatives_spanish:
  - todas las cosas
  - todo lo creado
  lexicon: LSJ
  rationale: El plural neutro abarca la totalidad de las cosas creadas. 'Todo' conserva ese alcance cósmico en un español más fluido; se señala la variante en nota por la posibilidad de explicitar 'las cosas'.
- source_word: φρίσσει
  english_pob_choice: shudder
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se eriza de miedo
  lexicon: LSJ
  rationale: El verbo expresa una reacción física de temor. 'Tiembla' es natural y solemne en español; se complementa con 'se estremece' para mantener la intensificación del paralelismo.
- source_word: τρέμει
  english_pob_choice: tremble
  chosen_spanish: se estremece
  alternatives_spanish:
  - tiembla
  - se sacude
  lexicon: LSJ
  rationale: El par verbal intensifica el miedo. 'Se estremece' conserva el matiz corporal y evita una repetición plana de 'tiembla' sin borrar el paralelismo.
- source_word: ἀπὸ προσώπου
  english_pob_choice: at the presence of your power
  chosen_spanish: a la presencia de tu poder
  alternatives_spanish:
  - por la presencia de tu poder
  - delante de tu poder
  lexicon: LSJ
  rationale: La locución literalmente significa 'desde el rostro/presencia de'. En este contexto expresa la causa del temblor por la cercanía divina; 'a la presencia de' mantiene la imaginería y suena idiomático en español.
- source_word: τῆς δυνάμεώς σου
  english_pob_choice: your power
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu dominio
  lexicon: LSJ
  rationale: δύναμις denota la potencia divina. 'Poder' es el equivalente más directo y amplio en español, en línea con el valor léxico del griego.
- source_word: ἄστεκτος
  english_pob_choice: unendurable
  chosen_spanish: insoportable
  alternatives_spanish:
  - inalcanzable de soportar
  - imposible de resistir
  lexicon: LSJ
  rationale: El adjetivo comunica algo que no puede soportarse ni resistirse. 'Insoportable' es la opción más natural en español y preserva la fuerza sin suavizarla.
- source_word: μεγαλοπρεπία
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - magnificencia
  - esplendor
  lexicon: LSJ
  rationale: El término denota grandeza y magnificencia. 'Majestad' encaja bien con la descripción divina y mantiene el tono litúrgico sin apartarse del campo semántico.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: LSJ
  rationale: '''Gloria'' es la equivalencia estándar y más cargada teológicamente para δόξα en este contexto.'
- source_word: ἀνυπόστατος
  english_pob_choice: unbearable
  chosen_spanish: imposible de soportar
  alternatives_spanish:
  - insostenible
  - intolerable
  - insoportable
  lexicon: LSJ
  rationale: El adjetivo expresa lo que no puede sostenerse o soportarse. Se evita repetir 'insoportable' y se conserva la idea de imposibilidad de resistencia que también subyace en la nota inglesa 'cannot be withstood'.
- source_word: ὀργὴ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - cólera
  - enojo
  lexicon: LSJ
  rationale: En lenguaje de juicio divino, la palabra española más natural y sobria es 'ira'. Mantiene la gravedad sin introducir una formulación excesivamente técnica.
- source_word: ἀπειλῆς σου
  english_pob_choice: your threat
  chosen_spanish: tu amenaza
  alternatives_spanish:
  - tu advertencia
  - tu amenaza solemne
  lexicon: LSJ
  rationale: ἀπειλή significa amenaza o declaración amenazante. 'Amenaza' reproduce el tono severo del griego y coincide con el objetivo de no suavizar el sentido judicial.
- source_word: ἐπὶ ἁμαρτωλοὺς
  english_pob_choice: against sinners
  chosen_spanish: contra los pecadores
  alternatives_spanish:
  - sobre los pecadores
  - dirigida a los pecadores
  lexicon: LSJ
  rationale: Con acusativo, ἐπί indica dirección o blanco. 'Contra' comunica con claridad que la amenaza y la ira se orientan hacia los pecadores.
theological_decisions:
- issue: Lenguaje antropopático sobre la ira y la amenaza divinas
  english_pob_reading: 'Retain strong personal language: ''the wrath of your threat against sinners.'''
  chosen_spanish_reading: 'Conservar el lenguaje personal fuerte: ''la ira de tu amenaza contra los pecadores''.'
  alternative_spanish_readings:
  - la ira amenazante contra los pecadores
  - la amenaza airada contra los pecadores
  rationale: El griego atribuye explícitamente ὀργή y ἀπειλή a Dios. La traducción mantiene ese lenguaje judicial y relacional, sin convertirlo en un efecto impersonal ni resolver la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica del original; primacía del texto fuente sobre la tradición de suavización.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrige la frase causal sobre 'presence of your power' y evita la repetición incómoda de 'because'. La traducción española adopta 'a la presencia de tu poder' para reflejar con naturalidad ἀπὸ προσώπου, y conserva la fuerza paralela de las dos cláusulas finales sin nivelar la tensión semántica.
  spanish_consistency_notes:
  - Se mantiene 'gloria' para δόξα y 'majestad' para μεγαλοπρεπία, siguiendo la distinción conceptual del original.
  - Se evita 'Señor' o mascarillas litúrgicas donde el griego se refiere a la presencia/poder divinos en términos más directos.
  - La secuencia 'tiembla / se estremece' conserva el paralelismo intensivo de φρίσσει / τρέμει sin forzar un calco mecánico.
  - '''Contra los pecadores'' preserva el blanco de la amenaza con una preposición española clara y teológicamente sobria.'
