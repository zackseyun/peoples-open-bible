translation:
  language: es
  text: 'El que roba a su padre y a su madre y dice: «Esto no es transgresión», es compañero[a] de un hombre destructivo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es compañero con un destructor» / «es compañero de uno que destruye».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹזֵל
  english_pob_choice: robs
  chosen_spanish: roba
  alternatives_spanish:
  - hurta de
  - despoja a
  - le roba a
  lexicon: HALOT
  rationale: El participio qal de גזל expresa robo violento o apropiación injusta. «Roba» comunica bien la gravedad en español y mantiene un registro bíblico claro sin sonar artificial.
- source_word: אָבִיו וְאִמּוֹ
  english_pob_choice: his father and his mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a sus padres
  - a su padre y madre
  lexicon: HALOT
  rationale: El hebreo nombra a ambos por separado; conservar ambos sustantivos mantiene el énfasis retórico y la concreción del texto.
- source_word: וְאֹמֵר
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - mientras dice
  - y afirma
  lexicon: HALOT
  rationale: La simple coordinación reproduce bien la relación del participio con la acción verbal en español.
- source_word: אֵין פָּשַׁע
  english_pob_choice: It is no transgression
  chosen_spanish: No es transgresión
  alternatives_spanish:
  - No es delito
  - No es pecado
  - No hay transgresión
  lexicon: HALOT
  rationale: «Transgresión» conserva la dimensión moral del hebreo פָּשַׁע sin reducirla solo a una categoría legal. La omisión de «es» en español es idiomática y mantiene la brevedad sentenciosa.
- source_word: חָבֵר
  english_pob_choice: a companion
  chosen_spanish: compañero
  alternatives_spanish:
  - asociado
  - amigo
  lexicon: HALOT
  rationale: חָבֵר indica alguien unido o asociado. «Compañero» conserva esa relación sin añadir la carga afectiva de «amigo».
- source_word: לְאִישׁ מַשְׁחִית
  english_pob_choice: of a destructive man
  chosen_spanish: de un hombre destructor
  alternatives_spanish:
  - de un hombre que destruye
  - de un hombre destructivo
  - de un destructor
  lexicon: HALOT
  rationale: El sustantivo/participio מַשְׁחִית describe al que destruye o arruina. «Hombre destructor» conserva el valor agente y suena natural en español; «de» refleja bien la relación establecida por חָבֵר הוּא לְאִישׁ.
theological_decisions:
- issue: Cómo traducir פָּשַׁע en la negación «אֵין פָּשַׁע»
  english_pob_reading: It is no transgression
  chosen_spanish_reading: No es transgresión
  alternative_spanish_readings:
  - No es pecado
  - No es delito
  - No es falta
  rationale: El texto presenta el robo a los padres como moralmente excusable solo en la autojustificación del agresor. «Transgresión» mantiene el peso ético y la ambigüedad útil entre falta moral y ofensa contra norma divina.
  doctrine_reference: Ética bíblica; pecado y transgresión como ruptura de la voluntad de Dios.
- issue: Relación final entre el sujeto y el hombre destructor
  english_pob_reading: is a companion of a destructive man
  chosen_spanish_reading: es compañero de un hombre destructor
  alternative_spanish_readings:
  - es compañero con un destructor
  - es compañero de quien destruye
  - es compañero de un hombre que destruye
  rationale: La revisión inglesa prefirió «of» por naturalidad; en español, «compañero de» expresa de forma natural la asociación moral. No hace falta forzar una preposición más literal si oscurece la lectura.
  doctrine_reference: Sabiduría bíblica sobre asociación moral y complicidad en el mal.
translation_notes:
  revision_awareness: La traducción inglesa de trabajo fue revisada de «companion to a destructive man» a «companion of a destructive man» para reflejar mejor la relación de חָבֵר הוּא לְאִישׁ מַשְׁחִית. La versión española adopta la misma decisión relacional con la preposición natural «de», manteniendo la fuerza moral del cierre.
  spanish_consistency_notes:
  - He mantenido «transgresión» para פָּשַׁע, en línea con el registro moral del proverbio.
  - He usado «hombre destructor» para מַשְׁחִית, conservando el valor agente del participio.
  - He conservado la estructura proverbial breve y paralelística, sin expandirla a una paráfrasis explicativa.
  - La nota alternativa de la marca [a] preserva la ambigüedad de asociación personal o alianza con el destructor.
