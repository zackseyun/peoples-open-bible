translation:
  language: es
  text: Hija de Babilonia[a], devastada[b], bienaventurado[c] el que te devuelva la retribución que nos hiciste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hija Babilonia»; el hebreo usa una expresión personificante para la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «destruida» o «saqueada»; el término hebreo puede enfatizar la devastación sufrida o la ruina que le espera.
    reason: lexical_alternative
  - marker: c
    text: O «dichoso»; el hebreo usa una fórmula de bienaventuranza que aquí conserva también su fuerza imprecatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת בָּבֶל
  english_pob_choice: Daughter Babylon
  chosen_spanish: Hija Babilonia
  alternatives_spanish:
  - Hija de Babilonia
  - Oh hija Babilonia
  lexicon: HALOT
  rationale: El hebreo usa una aposición poética y personificante para la ciudad; «Hija Babilonia» conserva esa estructura breve y directa en español, sin añadir una preposición que suavice la imagen.
- source_word: הַשְּׁדוּדָה
  english_pob_choice: devastated one
  chosen_spanish: devastada
  alternatives_spanish:
  - destruida
  - saqueada
  - devastada y arruinada
  lexicon: HALOT
  rationale: El participio pasivo comunica el estado de ruina sufrido por Babilonia. «Devastada» mantiene el valor de violencia y desolación sin restringirlo solo a una futura condena.
- source_word: אַשְׁרֵי
  english_pob_choice: blessed is
  chosen_spanish: feliz
  alternatives_spanish:
  - bienaventurado
  - dichoso
  - bendito
  lexicon: HALOT
  rationale: Aquí el hebreo formula una bienaventuranza/imprecación. En español, «feliz» comunica el giro sentencioso, aunque menos litúrgico que «bienaventurado», y evita introducir una fórmula cristiana más marcada de lo que el hebreo exige.
- source_word: שֶׁיְשַׁלֶּם לָךְ
  english_pob_choice: who repays you
  chosen_spanish: el que te devuelva el pago
  alternatives_spanish:
  - el que te pague
  - el que te retribuya
  - el que te pague de vuelta
  lexicon: HALOT
  rationale: El verbo indica pagar/retribuir en un contexto de represalia justa. «Devuelva el pago» conserva la idea de devolución recíproca y mantiene la relación léxica con גְּמוּל.
- source_word: אֶת גְּמוּלֵךְ
  english_pob_choice: with the recompense
  chosen_spanish: el pago
  alternatives_spanish:
  - la recompensa
  - la retribución
  - lo que te corresponde
  lexicon: HALOT
  rationale: גְּמוּל es recompensa/retribución/pago debido. «El pago» es natural en español y conserva la noción de correspondencia retributiva sin perder el matiz jurídico del término.
- source_word: שֶׁגָּמַלְתְּ לָנוּ
  english_pob_choice: you dealt to us
  chosen_spanish: que nos hiciste
  alternatives_spanish:
  - que nos trataste
  - que nos dispensaste
  - que nos causaste
  lexicon: HALOT
  rationale: גמל puede significar tratar, hacer o retribuir, para bien o para mal. «Que nos hiciste» es breve y comprensible, y en contexto permite que el daño quede implícito sin sobretraducir el verbo.
theological_decisions:
- issue: Beatitud imprecatoria sobre el retribuidor de Babilonia
  english_pob_reading: Retain the beatitude as stated without softening it into mere prediction or removing its moral shock.
  chosen_spanish_reading: Mantener la bienaventuranza/imprecación tal como está formulada, sin convertirla en mera predicción ni suavizar su fuerza retributiva.
  alternative_spanish_readings:
  - El que te repague será feliz.
  - Dichoso el que te castigue por lo que hiciste.
  rationale: El hebreo expresa una verdadera fórmula de beatitud sobre el agente que ejecuta la retribución. La traducción debe conservar la tensión teológica de justicia retributiva e imprecación, en lugar de resolverla o domesticarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el criterio auditado de la POB en inglés; se conservan la aposición poética, el participio pasivo de ruina, la fórmula beatitudaria y la reciprocidad retributiva sin suavizar la tensión imprecatoria.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o lenguaje no presente en el versículo; no hay referencia al Tetragrámaton aquí.
  - Se mantiene la imagen personificada de Babilonia como ciudad-hija.
  - «Pago» y «devuelva» se usan para preservar la relación semántica entre גְּמוּל y גמל.
  - La puntuación y el orden están adaptados a un español publicable sin perder la estructura paralela del hebreo.
