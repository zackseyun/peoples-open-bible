translation:
  language: es
  text: Envía para ti[a] hombres, y que exploren[b] la tierra de Canaán, que yo estoy dando a los hijos[c] de Israel. Enviarás un hombre de cada tribu de sus padres; cada uno, un líder entre ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: ''por ti mismo'' o ''en tu propio interés''; el hebreo לְךָ conserva un matiz personal que no se resuelve del todo en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''reconozcan'', ''espíen'' o ''inspeccionen''. El verbo hebreo puede abarcar la idea de explorar la tierra con fines de reconocimiento.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''los hijos de Israel'', una expresión pactal y familiar para el pueblo de Israel.'
    reason: cultural_note
  - marker: d
    text: 'O: ''cada uno un jefe entre ellos'' o ''cada uno un príncipe entre ellos''; el término hebreo puede referirse a un líder o principal tribal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח לְךָ
  english_pob_choice: Send for yourself
  chosen_spanish: Envía para ti mismo
  alternatives_spanish:
  - Envía
  - Envía para ti
  - Envía por ti mismo
  lexicon: HALOT
  rationale: El imperativo se conserva con fuerza directiva, y לְךָ se mantiene de manera transparente como 'para ti mismo' en vez de omitirse, porque el hebreo lo expresa explícitamente y puede matizar el mandato como personal o con permiso directo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - agentes
  lexicon: HALOT
  rationale: אֲנָשִׁים es plural masculino de אִישׁ; aquí designa representantes varones de las tribus. 'Hombres' conserva mejor el rasgo de género y la referencia semántica del original.
- source_word: וְיָתֻרוּ
  english_pob_choice: let them scout out
  chosen_spanish: que ellos exploren
  alternatives_spanish:
  - que ellos reconozcan
  - que ellos espien
  - que ellos inspeccionen
  lexicon: HALOT
  rationale: El verbo תור en este contexto implica recorrer/reconocer/explorar la tierra. 'Exploren' conserva el valor de reconocimiento sin cargar de modo exclusivo la idea de espionaje.
- source_word: אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - Canaán
  - la tierra Canaán
  lexicon: HALOT
  rationale: La construcción con אֶרֶץ se refleja explícitamente como 'tierra', y el nombre propio se adapta a la forma castellana usual 'Canaán'.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  english_pob_choice: which I am giving
  chosen_spanish: que yo estoy dando
  alternatives_spanish:
  - que yo doy
  - que yo daré
  - que yo estoy por dar
  lexicon: HALOT
  rationale: El participio נֹתֵן sugiere una acción en curso o inminente; 'estoy dando' preserva mejor ese matiz aspectual que un presente simple.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los israelitas
  - a los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene el giro covenántico/familiar בני ישראל mediante 'hijos de Israel', que es más transparente al hebreo que la etnónima 'israelitas'.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד
  english_pob_choice: one man ... every one
  chosen_spanish: uno por cada tribu
  alternatives_spanish:
  - un hombre por cada tribu
  - cada uno un hombre
  - uno, uno por tribu
  lexicon: HALOT
  rationale: La repetición distributiva se traduce de forma natural como asignación individual por tribu, preservando el sentido sin sonar forzado en español.
- source_word: לְמַטֵּה אֲבֹתָיו
  english_pob_choice: from each tribe of his fathers
  chosen_spanish: por cada tribu de sus padres
  alternatives_spanish:
  - según la tribu de sus padres
  - de la tribu de sus padres
  - por la tribu de sus padres
  lexicon: HALOT
  rationale: מַטֶּה se rinde con 'tribu' y אֲבֹתָיו conserva la referencia ancestral/paterna. 'Por cada tribu de sus padres' comunica la distribución y la pertenencia genealógica.
- source_word: תִּשְׁלָחוּ
  english_pob_choice: You shall send
  chosen_spanish: Enviarás
  alternatives_spanish:
  - deberás enviar
  - enviaréis
  - ustedes enviarán
  lexicon: HALOT
  rationale: El imperfecto funciona como instrucción; 'Enviarás' preserva la forma directiva en español con un registro bíblico claro y moderno.
- source_word: כֹּל נָשִׂיא בָהֶם
  english_pob_choice: every one a leader among them
  chosen_spanish: cada uno un líder entre ellos
  alternatives_spanish:
  - cada uno un jefe entre ellos
  - cada uno un príncipe entre ellos
  - todos ellos líderes
  lexicon: HALOT
  rationale: נָשִׂיא puede significar líder, jefe o príncipe. 'Líder' es la opción más clara en español contemporáneo y conserva la cualificación honorífica del término.
theological_decisions:
- issue: Valor de לְךָ en el mandato divino
  english_pob_reading: Retained in the main text as 'for yourself'
  chosen_spanish_reading: Se mantiene como 'para ti mismo'
  alternative_spanish_readings:
  - omitirlo como partícula idiomática
  - renderizarlo como 'por tu cuenta'
  - poner 'para ti'
  rationale: 'Se preserva la tensión interpretativa del hebreo: el texto no dice solo ''envía'', sino ''envía para ti''. Mantenerlo evita resolver de antemano si es énfasis, permiso o implicación personal.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Expresión בני ישראל
  english_pob_reading: '''the sons of Israel'' in the main text'
  chosen_spanish_reading: '''los hijos de Israel'''
  alternative_spanish_readings:
  - '''los hijos de Israel'''
  - '''los israelitas'''
  - '''el pueblo de Israel'''
  rationale: Se conserva la forma idiomática masculina y covenantal del hebreo en vez de neutralizarla. En español, 'hijos de Israel' es comprensible y mantiene la textura del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española sigue la misma lectura óptima-equivalente y conserva las tensiones léxicas señaladas, especialmente לְךָ, וְיָתֻרוּ, בני ישראל y נָשִׂיא.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió 'hijos de Israel' para reflejar el hebreo בני ישראל y mantener consistencia covenantal.
  - '''Exploren'' se eligió por claridad contemporánea sin borrar la alternativa ''espíen'' que el audit trail preserva.'
  - '''Líder'' mantiene el rango semántico de נָשִׂיא sin introducir un tono eclesiástico ajeno.'
