review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: mantiene la súplica, conserva literalmente «los muertos de Israel», retiene «hijos» para υἱῶν y preserva la metáfora de κολλάω con «se nos han pegado». Sin embargo, omite en el texto principal Παντοκράτωρ, que sí está en la fuente y en la pista inglesa; relegarlo a nota no basta. Además, «Yahvé» para Κύριε aquí no está justificado por la evidencia inmediata, ya que el griego dice κύριε como título y no hay cita explícita del nombre divino. También conviene suavizar la aposición «tu voz, su Dios» a una forma española más natural sin perder el sentido.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos tropiezos importantes: falta «Todopoderoso» en la línea principal, y la secuencia «tu voz, su Dios» suena abrupta. «Escucha, te ruego» funciona, aunque «escucha, por favor» o «escucha, te rogamos» podrían sonar más naturales; no es imprescindible cambiarlo. El resto es legible y fiel.'
  glossary_alignment: Hay buena alineación en «Dios», «oración», «muertos», «hijos» y «males». La principal desviación del glosario/proyecto está en usar «Yahvé» para κύριε sin una base textual inmediata suficiente; el valor por defecto del proyecto para Yahvé aplica al Tetragrámaton, no automáticamente a cada κύριος griego. También debe aparecer «Todopoderoso» en el texto principal para Παντοκράτωρ.
  issues:
  - severity: high
    issue: Falta «Todopoderoso» en el texto principal
    rationale: 'Παντοκράτωρ forma parte del vocativo divino de la fuente: «Κύριε Παντοκράτωρ». El borrador lo traslada solo a nota, lo cual pierde contenido semántico presente en el versículo.'
  - severity: high
    issue: «Yahvé» para Κύριε no está suficientemente sustentado por la evidencia inmediata
    rationale: La fuente griega presenta κύριε, no el Tetragrámaton. Sin una razón documentada de cita/allusión al nombre divino en este lugar, lo más fiel es traducir el título como «Señor», no sustituirlo por «Yahvé».
  - severity: medium
    issue: La aposición «tu voz, su Dios» suena poco natural en español
    rationale: Aunque intenta reflejar θεοῦ αὐτῶν, en español resulta más claro «tu voz, la voz de su Dios» o reestructurar la frase de modo equivalente. La meta es preservar la relación sin dureza innecesaria.
  revised_spanish_text: Señor Todopoderoso, Dios de Israel, escucha, te ruego, la oración de los muertos de Israel y de los hijos que pecan contra ti, los cuales no escucharon tu voz, la voz de su Dios, y los males[a] se nos han pegado.
  revised_footnotes:
  - marker: a
    text: O «las calamidades se nos han pegado» o «los desastres se nos han pegado». El griego dice literalmente «los males se nos han pegado».
    reason: lexical_alternative
  revision_rationale: La revisión restituye «Todopoderoso» al texto principal para reflejar Παντοκράτωρ, cambia «Yahvé» por «Señor» porque la fuente inmediata tiene κύριε y no el nombre divino explícito, y mejora la naturalidad española de θεοῦ αὐτῶν con «la voz de su Dios». Se conserva la literalidad importante de «los muertos de Israel», «hijos» y la imagen de que «los males se nos han pegado».
