translation:
  language: es
  text: Se multiplicarán los dolores de los que se apresuran tras otro dios[a]; no derramaré sus libaciones de sangre[b], ni levantaré sus nombres en mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus ídolos se multiplicarán'; el término hebreo puede asociarse con ídolos en algunos contextos, aunque aquí 'dolores' encaja mejor con el sentido de la línea.
    reason: alternative_reading
  - marker: b
    text: O 'con sangre' para 'de sangre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְבּוּ
  english_pob_choice: will multiply
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - aumentarán
  - se acrecentarán
  lexicon: HALOT
  rationale: El qal imperfecto de רבה expresa aumento o multiplicación; en español, la forma pasiva refleja mantiene bien el valor resultativo y el tono poético futuro de la línea.
- source_word: עַצְּבוֹתָם
  english_pob_choice: The sorrows of those
  chosen_spanish: los dolores de los que
  alternatives_spanish:
  - las penas de los que
  - sus ídolos
  lexicon: HALOT
  rationale: La lectura de 'dolores' encaja mejor con la sintaxis y con la continuación del versículo. 'Penas' también sería posible, pero 'dolores' conserva mejor la fuerza lexical. La lectura alternativa 'ídolos' se preserva en nota por la ambigüedad léxica documentada.
- source_word: אַחֵר
  english_pob_choice: another god
  chosen_spanish: otro dios
  alternatives_spanish:
  - otro
  - otro más
  lexicon: HALOT
  rationale: En este contexto de apostasía e idolatría, el español necesita explicitar el referente implícito; 'otro dios' conserva la claridad sin exagerar el sentido.
- source_word: מָהָרוּ
  english_pob_choice: who hurry after
  chosen_spanish: de los que se apresuran tras
  alternatives_spanish:
  - de los que corren tras
  - de los que se dan prisa tras
  lexicon: HALOT
  rationale: El verbo מהר comunica prisa o apresuramiento; 'apresurarse tras' reproduce bien la imagen hebrea de una persecución afectiva o cultual.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Partícula negativa poética; 'no' es la equivalencia directa y natural en español.
- source_word: אַסִּיךְ
  english_pob_choice: I will not pour out
  chosen_spanish: no derramaré
  alternatives_spanish:
  - no ofreceré
  - no libaré
  lexicon: HALOT
  rationale: El hiphil de נסך alude a derramar una libación. 'Derramaré' conserva la imagen sacrificial con mayor naturalidad que 'libaré', que suena más técnico.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas de bebida
  - sus libaciones rituales
  lexicon: HALOT
  rationale: '''Libaciones'' es el término cultual más preciso y fiel al hebreo. Aunque ''ofrendas de bebida'' sería más explícito, suena más explicativo y menos directo.'
- source_word: מִדָּם
  english_pob_choice: of blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - con sangre
  - a partir de sangre
  lexicon: HALOT
  rationale: La preposición מן puede indicar material o procedencia; en español, 'de sangre' preserva la crudeza de la imagen y sigue de cerca la construcción hebrea. La alternativa 'con sangre' queda como posibilidad interpretativa ya documentada en la POB inglesa.
- source_word: אֶשָּׂא
  english_pob_choice: will I lift up
  chosen_spanish: levantaré
  alternatives_spanish:
  - alzaré
  - tomaré
  lexicon: HALOT
  rationale: נשא con 'nombres' y 'en mis labios' funciona como un modismo para mencionar o pronunciar. 'Levantaré' conserva la metáfora del hebreo sin perder inteligibilidad.
- source_word: שְׁמוֹתָם
  english_pob_choice: their names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ellos
  lexicon: HALOT
  rationale: Es el objeto directo de נשא; 'sus nombres' es la forma natural en español y mantiene abierta la referencia a los dioses ajenos o a sus asociados cultuales.
- source_word: עַל שְׂפָתָי
  english_pob_choice: on my lips
  chosen_spanish: en mis labios
  alternatives_spanish:
  - sobre mis labios
  - con mis labios
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para hablar o mencionar. 'En mis labios' suena natural en español y conserva la imagen del texto.
theological_decisions:
- issue: Objeto implícito de 'otro'
  english_pob_reading: another god
  chosen_spanish_reading: otro dios
  alternative_spanish_readings:
  - otro
  - otro ser
  rationale: El contexto del versículo condena la idolatría mediante la referencia a libaciones y al nombrar. Añadir 'dios' explicita el referente implícito sin introducir una lectura doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Sentido de עַצְּבוֹתָם
  english_pob_reading: sorrows
  chosen_spanish_reading: dolores
  alternative_spanish_readings:
  - penas
  - ídolos
  rationale: '''Dolores'' ofrece la mejor continuidad sintáctica con el resto del versículo: no se trata de una nueva afirmación sobre los ídolos, sino del aumento de la aflicción de quienes corren tras ellos. La alternativa ''ídolos'' se conserva como nota por la ambigüedad léxica documentada.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Imagen cultual de 'drink offerings of blood'
  english_pob_reading: their drink offerings of blood
  chosen_spanish_reading: sus libaciones de sangre
  alternative_spanish_readings:
  - sus libaciones con sangre
  - sus ofrendas de bebida de sangre
  rationale: La expresión preserva el carácter chocante del culto idolátrico sin suavizarlo. 'De sangre' es la traducción más cercana y menos interpretativa, aunque 'con sangre' sigue siendo una posibilidad semántica razonable.
  doctrine_reference: HALOT; Translation philosophy §3
translation_notes:
  revision_awareness: La versión española sigue la lectura más reciente del expediente inglés sin introducir cambios de sentido. Se conserva la tensión documentada en עַצְּבוֹתָם entre 'dolores' e 'ídolos' mediante nota, y se mantiene el lenguaje cultual de las libaciones con una equivalencia española directa y transparente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estándar del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Se prefirió 'libaciones' para נִסְכֵּי/הֶם por precisión cultual y coherencia con el expediente inglés.
  - '''En mis labios'' conserva el modismo hebreo de mencionar o pronunciar nombres.'
  - La puntuación con punto y coma ayuda a reflejar la estructura paralela del verso en español.
