translation:
  language: es
  text: Pero no invitó a Natán el profeta[a], a Benaías, a los valientes ni a Salomón su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no llamó a Natán el profeta, a Benaías, a los valientes ni a Salomón su hermano”. El verbo hebreo literalmente significa “llamar”, aquí en el sentido de invitar o convocar al banquete de Adonías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: El hebreo continúa la enumeración, pero el contraste con los invitados omitidos en el contexto inmediato justifica una conjunción adversativa en español. “Pero” comunica bien el giro respecto de quienes sí fueron invitados.
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  - Natán, profeta
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma hispana usual y el título profético de manera directa. La apposición sin coma es natural en español y sigue de cerca el hebreo.
- source_word: וּבְנָיָהוּ
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benaías
  - Benaya
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma hispana clara y reconocible. “Benaía” mantiene la proximidad fonética sin forzar la ortografía inglesa.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the mighty men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los hombres valientes
  - los guerreros
  lexicon: HALOT
  rationale: En este contexto militar/real, גִּבּוֹרִים designa hombres de guerra de élite. “Los valientes” conserva la fuerza semántica del término sin sonar rígido; “los guerreros” sería posible, pero pierde algo del matiz de excelencia y renombre.
- source_word: שְׁלֹמֹה אָחִיו
  english_pob_choice: Solomon his brother
  chosen_spanish: Salomón su hermano
  alternatives_spanish:
  - Salomón, su hermano
  - su hermano Salomón
  lexicon: HALOT
  rationale: Se sigue el orden hebreo con el nombre antes del parentesco, como en la lectura inglesa auditada. El posesivo “su” se entiende por el contexto como referido a Adonías.
- source_word: לֹא קָרָא
  english_pob_choice: did not invite
  chosen_spanish: no invitó
  alternatives_spanish:
  - no llamó
  - no convocó
  lexicon: HALOT
  rationale: קָרָא literalmente significa “llamar”, pero aquí el contexto del banquete hace que “invitar” sea la equivalencia idiomática precisa. Se evita una traducción demasiado literal que oscurezca la acción social descrita.
translation_notes:
  revision_awareness: 'El texto base muestra alta concordancia con la revisión más reciente: no se registran cambios sustantivos en el sentido del versículo. La decisión principal de estilo fue mantener una equivalencia óptima para el valor idiomático de קרא en el contexto del banquete.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se preserva la distinción entre nombre propio y título en “Natán el profeta”.
  - Se elige “los valientes” para גִּבּוֹרִים en coherencia con el matiz militar del pasaje, sin introducir terminología eclesiástica.
  - La nota al pie conserva la alternativa lexical relevante porque el hebreo permite tanto “llamar” como “invitar/convocar” según el contexto.
