  from: 'Then I lifted up my eyes and wept[a], and I said to them at that time, “Have mercy on me, you who will depart from me or be forgotten by me. But you, only go as far as the tombs of my fathers from the affliction of distress and the lamentation of sorrow, so that I may not be forgotten before you and after these things I may remember them.” And I, Baruch, went as far as the holy gate, and I sat down in humility and wept and said, “Oh that my eyes were springs and fountains of water, a fountain of tears. For how can I find rest concerning Zion and mourn for the grief? Because the people whom I nourished have been shaken in turmoil[b], and those who were formerly my glory and the vision of my eyes...”'
