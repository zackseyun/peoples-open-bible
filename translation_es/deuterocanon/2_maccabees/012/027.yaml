translation:
  language: es
  text: Pero después de la derrota y destrucción de éstos, marchó también contra Efrón, una ciudad fortificada, en la que había multitudes mezcladas[a]; y jóvenes fuertes, apostados delante de los muros, combatían vigorosamente[b], mientras allí había muchos depósitos de máquinas y proyectiles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gentes de toda clase/tribu estaban allí». El griego πάμφυλα πλήθη apunta a una población mezclada, no a un solo grupo étnico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «resistían con firmeza». El imperfecto indica una acción sostenida en combate.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «muchas reservas» o «muchos acopios» de máquinas y proyectiles. El griego παραθέσεις sugiere materiales bélicos acumulados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ τὴν τούτων τροπὴν καὶ ἀπώλειαν
  english_pob_choice: after the rout and destruction of these men
  chosen_spanish: después de la derrota y destrucción de éstos
  alternatives_spanish:
  - después del desorden y destrucción de éstos
  - tras el descalabro y ruina de éstos
  lexicon: LSJ
  rationale: τροπή en contexto militar expresa la derrota o huida del enemigo; en español, 'derrota' comunica bien ese sentido sin perder naturalidad. ἀπώλεια intensifica la pérdida; 'destrucción' conserva la fuerza del par.
- source_word: ἐπεστράτευσεν
  english_pob_choice: he marched also against
  chosen_spanish: marchó también contra
  alternatives_spanish:
  - hizo campaña también contra
  - avanzó también contra
  lexicon: LSJ
  rationale: El verbo indica emprender una expedición militar. 'Marchó contra' es natural en español y conserva el movimiento bélico.
- source_word: πόλιν ὀχυράν
  english_pob_choice: a fortified city
  chosen_spanish: una ciudad fortificada
  alternatives_spanish:
  - una ciudad fuerte
  - una fortaleza ciudad
  lexicon: LSJ
  rationale: ὀχυράν describe la defensiva fortaleza de la ciudad; 'ciudad fortificada' es preciso y idiomático.
- source_word: πάμφυλα πλήθη
  english_pob_choice: mixed multitudes
  chosen_spanish: multitudes mezcladas
  alternatives_spanish:
  - gentes de toda clase
  - multitudes de diversos pueblos
  lexicon: LSJ
  rationale: πάμφυλα sugiere personas de muchas clases o pueblos; 'multitudes mezcladas' preserva esa diversidad sin especificar más allá del griego.
- source_word: νεανίαι δὲ ῥωμαλέοι
  english_pob_choice: strong young men
  chosen_spanish: jóvenes fuertes
  alternatives_spanish:
  - jóvenes robustos
  - jóvenes vigorosos
  lexicon: LSJ
  rationale: νεανίαι son jóvenes varones; ῥωμαλέοι añade fuerza física. 'Jóvenes fuertes' transmite ambas ideas de manera clara.
- source_word: πρὸ τῶν τειχῶν καθεστῶτες
  english_pob_choice: stationed before the walls
  chosen_spanish: colocados delante de los muros
  alternatives_spanish:
  - apostados delante de los muros
  - puestos frente a los muros
  lexicon: LSJ
  rationale: El participio expresa estar puesto en posición militar. 'Colocados delante de los muros' mantiene el sentido sin sonar artificial.
- source_word: εὐρώστως ἀπεμάχοντο
  english_pob_choice: were fighting vigorously
  chosen_spanish: combatían vigorosamente
  alternatives_spanish:
  - resistían con firmeza
  - peleaban con vigor
  lexicon: LSJ
  rationale: El imperfecto indica acción continua; 'combatían vigorosamente' refleja esa persistencia e intensidad.
- source_word: ὀργάνων
  english_pob_choice: engines
  chosen_spanish: máquinas
  alternatives_spanish:
  - máquinas de guerra
  - artefactos
  lexicon: LSJ
  rationale: En contexto militar, ὀργάνων alude a máquinas de guerra. 'Máquinas' es breve y conserva el término general; la nota aclara el matiz bélico.
- source_word: βελῶν
  english_pob_choice: missiles
  chosen_spanish: proyectiles
  alternatives_spanish:
  - dardos
  - armas arrojadizas
  lexicon: LSJ
  rationale: βελῶν abarca armas lanzadas o disparadas. 'Proyectiles' preserva la amplitud mejor que una versión más específica.
- source_word: παραθέσεις
  english_pob_choice: stores
  chosen_spanish: depósitos
  alternatives_spanish:
  - reservas
  - almacenes
  - stockpiles
  lexicon: LSJ
  rationale: El contexto de máquinas y proyectiles sugiere acumulaciones de material bélico. 'Depósitos' expresa bien la idea de provisiones almacenadas.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota esté anclado exactamente en el texto español: [a], [b] y [c]. No se añadieron notas sin ancla ni marcadores adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable en este versículo.
  - Se tradujo ὀργάνων con un término general («máquinas») y se aclaró su matiz militar en nota para no sobreespecificar el griego.
  - Se conservó la distinción entre πολίς fortificada y los combatientes jóvenes delante de los muros.
  - El orden sintáctico español sigue de cerca el griego, pero con fluidez natural para lectura pública.
