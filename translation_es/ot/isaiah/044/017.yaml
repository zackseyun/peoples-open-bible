translation:
  language: es
  text: 'Y con el resto hace un dios[a], su imagen tallada; se postra ante ella y la adora, y ora[a] a ella y dice: «Líbrame[b], porque tú eres mi dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su ídolo», para «su imagen tallada».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa formas masculinas para el ídolo; en español el referente inmediato «imagen» hace natural la referencia femenina («ella»).
    reason: cultural_note
lexical_decisions:
- source_word: וּשְׁאֵרִיתוֹ
  english_pob_choice: And with the rest of it
  chosen_spanish: Y con el resto de ello
  alternatives_spanish:
  - Y con lo que queda de ello
  - Y con el remanente de ello
  lexicon: HALOT
  rationale: שְׁאֵרִית designa lo que queda/resta; el sufijo de 3ms remite al material sobrante del contexto previo. «Con el resto de ello» conserva el valor instrumental y la referencia al objeto ya mencionado.
- source_word: לְאֵל
  english_pob_choice: a god
  chosen_spanish: un dios
  alternatives_spanish:
  - para un dios
  - en un dios
  lexicon: HALOT
  rationale: Aquí אֵל no es el Dios verdadero sino una deidad fabricada o tratada como divina. En español, «hacer un dios» comunica naturalmente el resultado de la acción.
- source_word: עָשָׂה
  english_pob_choice: he makes
  chosen_spanish: hace
  alternatives_spanish:
  - hizo
  - fabrica
  lexicon: HALOT
  rationale: Aunque el verbo está en qatal, el contexto profético describe la acción de manera vívida y general. «Hace» preserva esa vivacidad y la secuencia de acciones del versículo.
- source_word: לְפִסְלוֹ
  english_pob_choice: his carved image
  chosen_spanish: su imagen tallada
  alternatives_spanish:
  - su ídolo
  - su imagen esculpida
  lexicon: HALOT
  rationale: פֶסֶל denota una imagen/ídolo tallado. «Imagen tallada» conserva la concreción del hebreo sin perder legibilidad; «ídolo» sigue siendo una alternativa válida, pero más interpretativa.
- source_word: יסגוד לוֹ
  english_pob_choice: he bows down to it
  chosen_spanish: se postra ante ella
  alternatives_spanish:
  - se inclina ante ella
  - rinde homenaje ante ella
  lexicon: HALOT
  rationale: סגד expresa postración en homenaje o adoración. «Se postra ante ella» mantiene la fuerza cultual y distingue esta acción de la siguiente, «la adora».
- source_word: וְיִשְׁתַּחוּ
  english_pob_choice: and worships
  chosen_spanish: y la adora
  alternatives_spanish:
  - y se inclina
  - y le rinde culto
  lexicon: HALOT
  rationale: שׁחה en contexto de culto puede traducirse como adorar. «La adora» evita repetición mecánica y conserva el sentido religioso del hebreo.
- source_word: וְיִתְפַּלֵּל אֵלָיו
  english_pob_choice: and prays to it
  chosen_spanish: y le ora
  alternatives_spanish:
  - y le ruega
  - y reza a ella
  lexicon: HALOT
  rationale: התפלל אל significa orar a. «Le ora» es una forma clara y digna en español; se mantiene el pronombre de objeto femenino por el referente inmediato «imagen», siguiendo el valor referencial del contexto.
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Sálvame
  - Rescátame
  lexicon: HALOT
  rationale: נצל pide libramiento o rescate. «Líbrame» es una equivalencia natural en español y conserva la ironía de pedir salvación a un ídolo.
- source_word: כִּי אֵלִי אָתָּה
  english_pob_choice: for you are my god
  chosen_spanish: porque tú eres mi dios
  alternatives_spanish:
  - pues tú eres mi dios
  - porque eres mi dios
  lexicon: HALOT
  rationale: כִּי introduce la razón de la súplica. «Mi dios» mantiene la afirmación idolátrica del hablante y su relación posesiva con la imagen.
theological_decisions:
- issue: Pronombre de referencia para la imagen/ídolo
  english_pob_reading: Use 'it' for the idol/image in English
  chosen_spanish_reading: Usar el referente femenino «ella» para «imagen» en español
  alternative_spanish_readings:
  - Usar «lo» para neutralizar el referente
  - Usar «él» para seguir el género gramatical hebreo
  rationale: En hebreo, los pronombres siguen el género gramatical de פֶסֶל/אֵל, pero en español el referente natural de «imagen» es femenino. Como el verso enfatiza el objeto fabricado y no una persona, «ella» evita personificar el ídolo y suena natural en español.
  doctrine_reference: §1 primacía del texto original; §6 legibilidad moderna sin arrastre de formas tradicionales
- issue: Tensión entre postración, adoración y oración
  english_pob_reading: bows down / worships / prays
  chosen_spanish_reading: «se postra / la adora / le ora»
  alternative_spanish_readings:
  - «se inclina / le rinde culto / le reza»
  - «se postra / le da culto / le suplica»
  rationale: El hebreo acumula tres verbos distintos para intensificar la ironía de la idolatría. Conviene conservar la triple progresión en español sin fusionarla en un solo verbo.
  doctrine_reference: Retórica poética de Isaías 44:17; principio de no aplanar tensiones léxicas
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el trazado del POB en inglés, sin depender mecánicamente de la redacción inglesa. Se conserva la secuencia verbal, la ironía del diálogo idolátrico y la alternativa léxica principal «imagen tallada» / «ídolo».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece.
  - Se mantiene «dios» en minúscula para el objeto idolátrico, en contraste con «Dios».
  - «Líbrame» se eligió como equivalente natural de נצל sin perder el matiz de rescate/deliverance.
  - Se mantiene la referencia femenina a «imagen» para evitar una traducción forzada por el género gramatical hebreo.
