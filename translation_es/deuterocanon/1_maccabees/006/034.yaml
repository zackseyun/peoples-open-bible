translation:
  language: es
  text: Y les mostraron a los elefantes la sangre de uvas y moras[a], para incitarlos al combate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la sangre de uvas y moras», una expresión vívida para su jugo rojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδειξαν
  english_pob_choice: they showed
  chosen_spanish: les mostraron
  alternatives_spanish:
  - les exhibieron
  - les presentaron
  lexicon: LSJ
  rationale: El verbo griego expresa una acción narrativa simple de ‘mostrar’. En español, ‘les mostraron’ conserva la relación dativa con los elefantes sin sonar artificial.
- source_word: τοῖς ἐλέφασιν
  english_pob_choice: the elephants
  chosen_spanish: a los elefantes
  alternatives_spanish:
  - los elefantes
  - para los elefantes
  lexicon: LSJ
  rationale: El dativo griego funciona como complemento indirecto de ἔδειξαν. En español conviene explicitarlo con ‘a los elefantes’ para mantener la dirección de la acción.
- source_word: αἷμα σταφυλῆς καὶ μόρων
  english_pob_choice: the blood of grapes and mulberries
  chosen_spanish: la sangre de uvas y moras
  alternatives_spanish:
  - el jugo de uvas y moras
  - la sangre de las uvas y de las moras
  lexicon: LSJ
  rationale: Se conserva ‘sangre’ para mantener la metáfora vívida del griego. ‘Moras’ traduce μόρων; ‘uvas’ explicita en plural natural el valor colectivo de σταφυλῆς.
- source_word: τοῦ παραστῆσαι
  english_pob_choice: to provoke
  chosen_spanish: para provocarlos
  alternatives_spanish:
  - para incitarlos
  - para estimularlos
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. En este contexto bélico y de adiestramiento, ‘provocarlos’ reproduce bien la idea de excitarlos para la acción.
- source_word: εἰς τὸν πόλεμον
  english_pob_choice: for battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - para la batalla
  - para el combate
  lexicon: LSJ
  rationale: ‘A la batalla’ suena natural en español y conserva la orientación hacia el enfrentamiento militar que expresa la frase griega.
translation_notes:
  revision_awareness: El texto griego es breve y estable; la versión inglesa POB mantiene una metáfora literal con nota. La redacción española conserva esa metáfora sin volverla meramente explicativa, y solo ajusta la sintaxis para que suene natural en español.
  spanish_consistency_notes:
  - Se mantiene el registro digno y claro propio de una edición bíblica pública.
  - Se conserva ‘sangre’ por fidelidad metafórica; no se sustituye por ‘jugo’ en el texto principal.
  - ‘Moras’ sigue la identificación léxica del griego μόρων; no se usa una equivalencia más vaga.
  - La preposición ‘a’ marca el dativo indirecto de forma transparente en español.
