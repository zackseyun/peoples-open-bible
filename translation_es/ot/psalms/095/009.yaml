lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - cuando
  - que
  lexicon: HALOT
  rationale: En el contexto inmediato del lugar nombrado en el versículo anterior, la partícula relativa funciona de manera locativa. «Donde» conserva esa relación espacial de forma natural en español.
- source_word: נִסּוּנִי
  english_pob_choice: tested me
  chosen_spanish: me pusieron a prueba
  alternatives_spanish:
  - me probaron
  - me testearon
  - me tentaron
  lexicon: HALOT
  rationale: נסה expresa la idea de someter a prueba. «Me pusieron a prueba» es idiomático y mantiene el sentido adversarial; además evita un calco duro de «testaron». Se conserva la fuerza del verbo sin suavizarla.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus padres». En español, «tus padres» transmite de manera directa la referencia a los antepasados del pueblo. Se evita «antepasados» porque pierde la huella verbal del original.
- source_word: בְּחָנוּנִי
  english_pob_choice: they tried me
  chosen_spanish: me tentaron
  alternatives_spanish:
  - me examinaron
  - me probaron
  - me pusieron a prueba
  lexicon: HALOT
  rationale: בחן está en el campo semántico de probar/examinar. Dado que el primer verbo ya se ha rendido como «me pusieron a prueba», aquí se elige «me tentaron» para reflejar la reiteración paralela con un matiz de desafío hostil, sin perder la tensión del texto. La opción «examinaron» es posible, pero suena demasiado neutral en español.
- source_word: גַּם
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - también
  - e incluso
  - y
  lexicon: HALOT
  rationale: 'En este contexto la partícula introduce un giro concesivo: a pesar de haber visto la obra de Yahvé, siguieron probándolo. «Aunque» expresa bien esa relación en español.'
- source_word: רָאוּ
  english_pob_choice: they had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español aclara la secuencia: primero vieron la obra de Dios y, aun así, lo pusieron a prueba. Esa relación temporal coincide con el sentido discursivo señalado en el audit trail.'
- source_word: פָעֳלִי
  english_pob_choice: my work
  chosen_spanish: mi obra
  alternatives_spanish:
  - mis obras
  - mi trabajo
  - mis actos
  lexicon: HALOT
  rationale: פעל designa obra/actividad/acción. «Mi obra» es fiel, sobrio y natural en español bíblico, y puede abarcar las obras poderosas de Yahvé en el éxodo y el desierto.
theological_decisions:
- issue: Fuerza concesiva del final del versículo
  english_pob_reading: they tested me and tried me, though they had seen my work
  chosen_spanish_reading: me pusieron a prueba y me tentaron, aunque habían visto mi obra
  alternative_spanish_readings:
  - me pusieron a prueba y me examinaron, y habían visto mi obra
  - me pusieron a prueba y me probaron, aun viendo mi obra
  rationale: 'La lectura principal mantiene el valor concesivo señalado en el auditoría inglesa: el pueblo no solo probó a Dios, sino que lo hizo pese a haber presenciado sus actos. «Aunque» conserva esa advertencia sin añadir contenido ajeno al texto.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Paralelismo de los dos verbos de prueba
  english_pob_reading: tested me and tried me
  chosen_spanish_reading: me pusieron a prueba y me tentaron
  alternative_spanish_readings:
  - me pusieron a prueba y me examinaron
  - me probaron y me tentaron
  rationale: El hebreo presenta dos verbos paralelos. En español conviene mantener dos expresiones distintas para no perder la intensificación poética. «Pusieron a prueba / tentaron» conserva la duplicación y el movimiento retórico del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene como lectura final el texto con verbo doble en paralelo y una cláusula concesiva: «tested me and tried me, though they had seen my work». La versión española sigue esa decisión y evita neutralizar la tensión del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición POB cuando el contexto remite al nombre divino, aunque aquí el versículo habla en primera persona de la obra de Dios; «mi obra» conserva la voz del texto sin introducir «SEÑOR».
  - «Pusieron a prueba» y «tentaron» distinguen dos verbos hebreos emparentados sin repetir mecánicamente la misma palabra.
  - «Habían visto» refleja la anterioridad marcada por el audit trail y mantiene la fuerza concesiva de «aunque».
