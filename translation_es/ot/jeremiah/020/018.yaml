translation:
  language: es
  text: ¿Por qué salí del vientre para ver aflicción y dolor[a], y que mis días terminen en vergüenza[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trabajo penoso y dolor».
    reason: lexical_alternative
  - marker: b
    text: O «y mis días se consuman en vergüenza».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה זֶּה
  english_pob_choice: Why did I
  chosen_spanish: ¿Por qué salí...
  alternatives_spanish:
  - ¿Por qué fue que salí...
  - ¿Por qué, pues, salí...
  lexicon: HALOT
  rationale: La pregunta retórica se conserva en español con «¿Por qué...?»; el matiz enfático de זֶּה queda absorbido en el tono de lamento, sin forzar una construcción artificial.
- source_word: מֵרֶחֶם
  english_pob_choice: from the womb
  chosen_spanish: del vientre
  alternatives_spanish:
  - del seno materno
  - de mi madre
  lexicon: HALOT
  rationale: «Vientre» reproduce con naturalidad la imagen hebrea de origen/ nacimiento. Evita añadir «materno», que no está explícito en el hebreo, aunque sería una aclaración posible.
- source_word: יָצָאתִי
  english_pob_choice: come out
  chosen_spanish: salí
  alternatives_spanish:
  - salí a la luz
  - salí del nacimiento
  lexicon: HALOT
  rationale: «Salí» es la forma más directa y natural en español para el movimiento de salida desde el vientre, manteniendo la imaginería concreta del verbo.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para experimentar
  - para sufrir
  lexicon: HALOT
  rationale: Se conserva el infinitivo de percepción «ver», que en este lamento admite el sentido experiencial sin explicitarlo en exceso.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: calamidad
  alternatives_spanish:
  - trabajo penoso
  - fatiga
  - afán
  lexicon: HALOT
  rationale: En contexto de lamentación, עָמָל no describe simplemente labor sino una carga dolorosa. «Calamidad» comunica bien la gravedad del sufrimiento; se mantiene una nota de alternativa implícita con la otra posibilidad léxica que el inglés POB dejó abierta.
- source_word: וְיָגֹן
  english_pob_choice: sorrow
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - aflicción
  - tristeza
  lexicon: HALOT
  rationale: «Dolor» conserva el peso emocional del término y se empareja bien con «calamidad» en español. Otras equivalencias siguen siendo posibles según matiz poético.
- source_word: וַיִּכְל֥וּ
  english_pob_choice: for my days to end
  chosen_spanish: para que mis días terminen
  alternatives_spanish:
  - y mis días se consuman
  - y mis días lleguen a su fin
  lexicon: HALOT
  rationale: 'La forma verbal plural con «mis días» se vierte de modo idiomático como resultado final: que mis días terminen. Esto preserva el sentido de consumación sin un calco forzado.'
- source_word: בְּבֹשֶׁת
  english_pob_choice: in shame
  chosen_spanish: en vergüenza
  alternatives_spanish:
  - con vergüenza
  - en deshonra
  lexicon: HALOT
  rationale: «Vergüenza» refleja el campo semántico de בֹּשֶׁת y mantiene el tono de lamento. «En vergüenza» sigue de cerca la preposición hebrea.
- source_word: יָמָי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días de mi vida
  - mi vida
  lexicon: HALOT
  rationale: Se conserva la concreción poética de «mis días», en lugar de expandirla a «mi vida», que sería menos literal.
translation_notes:
  revision_awareness: El inglés POB revisó la clausula final de «to have my days end» a «for my days to end»; en español se reflejó directamente con «para que mis días terminen», manteniendo la consumación final sin suavizar el lamento. También se integró la libertad léxica mostrada en el audit trail para עָמָל y יָגוֹן, pero se optó por un par español de fuerte tono lamentativo, acorde con el contexto.
  spanish_consistency_notes:
  - Se preservó el paralelismo poético entre la salida del vientre, la visión de calamidad/dolor y el final en vergüenza.
  - Se evitó «Señor» o fórmulas litúrgicas porque este versículo no contiene el nombre divino ni un título que lo requiera.
  - «Mis días» se mantuvo como expresión concreta del hebreo, sin convertirla en una paráfrasis abstracta de la vida.
