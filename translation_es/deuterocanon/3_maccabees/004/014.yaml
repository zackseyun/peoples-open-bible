translation:
  language: es
  text: y que todo el pueblo fuera inscrito nombre por nombre[a], no para el breve servicio previamente declarado conforme a su función, sino, siendo torturados con las crueldades ordenadas[b], para ser totalmente destruidos dentro del espacio de un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por nombre», es decir, de manera individualizada.
    reason: lexical_alternative
  - marker: b
    text: La frase griega sobre el propósito anterior es difícil; probablemente alude a un servicio laboral breve anunciado antes como pretexto, en contraste con el verdadero plan de exterminio.
    reason: source_note
lexical_decisions:
- source_word: ἀπογραφῆναι
  english_pob_choice: should be registered
  chosen_spanish: fuera inscrito
  alternatives_spanish:
  - fuera registrado
  - fuera enrolado
  lexicon: LSJ
  rationale: El infinitivo pasivo denota una inscripción oficial o censal. En español, «inscrito» comunica bien el acto administrativo sin sonar demasiado técnico; «registrado» y «enrolado» son alternativas posibles, pero la primera puede sonar más burocrática y la segunda más militar.
- source_word: πᾶν τὸ φῦλον
  english_pob_choice: the whole people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la nación
  - todo el pueblo entero
  - toda la gente
  lexicon: LSJ
  rationale: El contexto apunta al colectivo judío como conjunto. «Pueblo» conserva ese valor colectivo mejor que «nación» en español bíblico moderno, sin forzar una categoría política contemporánea.
- source_word: ἐξ ὀνόματος
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - nombradamente
  - uno por uno por nombre
  - nombre por nombre
  lexicon: LSJ
  rationale: La frase expresa una inscripción individualizada. «Por nombre» es idiomático en español y mantiene la fuerza distributiva de la expresión griega; la nota a aclara la posibilidad de leerlo más explícitamente.
- source_word: οὐκ εἰς τὴν ἔμπροσθεν βραχεῖ προδεδηλωμένην
  english_pob_choice: not for the previously declared brief service
  chosen_spanish: no para el breve servicio previamente declarado
  alternatives_spanish:
  - no para el breve servicio antes anunciado
  - no para el breve servicio mencionado de antemano
  lexicon: LSJ
  rationale: La frase es difícil y parece contrastar un pretexto anterior con el verdadero propósito. «Previamente declarado» sigue de cerca el valor de προδεδηλωμένην y conserva la referencia a una declaración anterior.
- source_word: τῶν ἔργων κατὰ τρόπον λατρείαν
  english_pob_choice: according to their function
  chosen_spanish: conforme a su función
  alternatives_spanish:
  - según su tarea
  - de acuerdo con su labor
  - conforme a su cometido
  lexicon: LSJ
  rationale: La combinación apunta a un servicio o labor según la asignación. «Función» refleja bien el singular más natural en español y evita reducir el sentido a trabajo manual únicamente.
- source_word: στρεβλούμεντας
  english_pob_choice: by being tortured
  chosen_spanish: siendo torturado
  alternatives_spanish:
  - mientras eran torturados
  - al ser torturados
  - siendo atormentados
  lexicon: LSJ
  rationale: El participio expresa tortura, con posible matiz de potro o tormento físico. «Siendo torturado» conserva la dureza del verbo; «atormentados» suaviza demasiado el acto físico.
- source_word: παρηγγελμέναις αἰκίαις
  english_pob_choice: with the ordered cruelties
  chosen_spanish: con las crueldades ordenadas
  alternatives_spanish:
  - con los tormentos ordenados
  - con las brutalidades mandadas
  - con las crueldades prescritas
  lexicon: LSJ
  rationale: El dativo señala crueldades mandadas u ordenadas oficialmente. «Crueldades ordenadas» preserva tanto la violencia como el carácter decretado; «prescritas» sería posible, pero menos natural en español aquí.
- source_word: τὸ τέλος ἀφανίσαι
  english_pob_choice: to be utterly destroyed
  chosen_spanish: para ser totalmente destruido
  alternatives_spanish:
  - para ser aniquilado por completo
  - para desaparecer por entero
  - para ser completamente exterminado
  lexicon: LSJ
  rationale: ἀφανίσαι implica hacer desaparecer, destruir; el artículo τὸ τέλος intensifica la destrucción total. «Totalmente destruido» mantiene la intensidad sin introducir un término más técnico que el griego no exige.
- source_word: μιᾶς ὑπὸ καιρὸν ἡμέρας
  english_pob_choice: within the space of a single day
  chosen_spanish: dentro del lapso de un solo día
  alternatives_spanish:
  - en el espacio de un solo día
  - dentro de una sola jornada
  - en el transcurso de un solo día
  lexicon: LSJ
  rationale: La frase concentra la destrucción en un período único de tiempo. «Dentro del lapso de un solo día» es formal, claro y fiel al valor temporal de ὑπὸ καιρὸν.
theological_decisions:
- issue: El sentido de φῦλον en este contexto
  english_pob_reading: the whole people
  chosen_spanish_reading: todo el pueblo
  alternative_spanish_readings:
  - toda la nación
  - toda la raza
  rationale: No conviene cargar el término con una noción moderna de nación-estado ni con una lectura étnica excesiva. «Pueblo» mantiene el alcance colectivo del pasaje y su referencia histórica concreta.
  doctrine_reference: No doctrinal; fidelidad semántica y contexto histórico-literario.
- issue: La relación entre el registro nominal y el propósito real
  english_pob_reading: not for the previously declared brief service ... but ... to be utterly destroyed
  chosen_spanish_reading: no para el breve servicio previamente declarado ... sino ... para ser totalmente destruido
  alternative_spanish_readings:
  - no para el servicio breve anunciado ... sino ... para ser exterminado
  - no para el servicio temporal ... sino ... para ser destruido
  rationale: El texto contrasta un pretexto administrativo con un plan de exterminio. La traducción debe conservar esa tensión sin suavizarla ni resolverla interpretativamente.
  doctrine_reference: No doctrinal; preservación de la ironía histórica y de la intención hostil del texto.
- issue: Intensidad de la violencia en στρεβλούμεντας / αἰκίαις
  english_pob_reading: by being tortured with the ordered cruelties
  chosen_spanish_reading: siendo torturado con las crueldades ordenadas
  alternative_spanish_readings:
  - siendo atormentado con los tormentos ordenados
  - siendo torturado con los castigos ordenados
  rationale: Conviene mantener la dureza de los dos términos sin disminuirlos a un lenguaje meramente general de sufrimiento. «Crueldades ordenadas» conserva el carácter oficial y brutal del castigo.
  doctrine_reference: No doctrinal; precisión léxica sobre violencia física.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se prefirió «pueblo» para φῦλον, «declarado» para προδεδηλωμένην, «función» para κατὰ τρόπον y una formulación temporal más formal para ὑπὸ καιρὸν. La versión española sigue esas decisiones, pero adapta la sintaxis para sonar natural y publicable en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Mesías»/«Cristo» no aplica en este versículo.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios.
  - La voz pasiva perifrástica en español se usa donde el griego presenta infinitivos participiales de sentido pasivo.
  - La nota a preserva la ambigüedad distributiva de ἐξ ὀνόματος sin duplicar la explicación en el cuerpo principal.
