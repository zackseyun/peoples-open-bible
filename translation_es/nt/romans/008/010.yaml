    text: Or 'the Spirit is life.' The Greek term can be read as referring either to the human spirit enlivened by God or to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'the body is subject to death' or 'the body is mortal.'
    reason: lexical_alternative
  - marker: c
