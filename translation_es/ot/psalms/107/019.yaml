translation:
  language: es
  text: Entonces clamaron a Yahvé en su angustia[a]; él los salvó de sus aflicciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino), tradicionalmente vertido «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: Then they cried out
  chosen_spanish: Entonces clamaron
  alternatives_spanish:
  - Y clamaron
  - Entonces gritaron
  lexicon: HALOT
  rationale: El verbo זעק expresa un clamor urgente de auxilio; «clamaron» conserva esa intensidad mejor que un verbo neutral. «Entonces» refleja el avance narrativo del waw-consecutivo y mantiene el ritmo refrán del salmo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: 'La preposición direccional se expresa naturalmente con «a» en español: «clamaron a Yahvé». Mantiene la relación de destino sin cargar el verso.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto. No se sustituye por un título como «el SEÑOR», porque el texto hebreo usa el nombre propio.
- source_word: בַּצַּר
  english_pob_choice: in their trouble
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su aflicción
  - en su apuro
  lexicon: HALOT
  rationale: צַר aquí denota una situación de opresión o estrechez; «angustia» es un equivalente español natural y solemnemente adecuado. «En su» absorbe el valor de לָהֶם de forma idiomática.
- source_word: מִמְּצֻקוֹתֵיהֶם
  english_pob_choice: from their distresses
  chosen_spanish: de sus aflicciones
  alternatives_spanish:
  - de sus angustias
  - de sus estrecheces
  lexicon: HALOT
  rationale: מְצוּקוֹת añade la idea de constricción severa, distinta de צַר. «Aflicciones» conserva el plural y la fuerza del término sin repetir exactamente «angustia».
- source_word: יוֹשִׁיעֵם
  english_pob_choice: he saved them
  chosen_spanish: él los salvó
  alternatives_spanish:
  - él los libró
  - él los rescató
  lexicon: HALOT
  rationale: El hifil de ישׁע se traduce de forma directa con «salvó», manteniendo la resonancia teológica del rescate divino y el paralelismo con la versión inglesa auditada.
theological_decisions:
- issue: Rendering of the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo contiene יְהוָה explícitamente. En español se preserva el nombre divino como «Yahvé», no una sustitución titular, para respetar el valor confesional y textual del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en su última pasada y fue confirmada con alto acuerdo; por eso el español sigue de cerca las decisiones léxicas ya justificadas, con adaptación natural al idioma meta y sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - 'Se conserva el patrón verbal breve y paralelo del salmo: clamor → salvación.'
  - «Angustia» y «aflicciones» distinguen, en español, los dos matices hebreos sin borrar la tensión léxica documentada.
  - Se mantiene el nombre divino «Yahvé» en el texto principal, con nota explicativa por tratarse del Tetragrámaton.
