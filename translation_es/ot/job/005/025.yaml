translation:
  language: es
  text: Sabrás que tu descendencia[a] será numerosa, y tus descendientes serán como la hierba de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «semilla»; el hebreo זַרְעֶךָ usa un término colectivo para la progenie.
    reason: lexical_alternative
  - marker: b
    text: O «del país»; el hebreo אֶרֶץ puede significar «tierra» o «país» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: You will know
  chosen_spanish: Sabrás
  alternatives_spanish:
  - Y sabrás
  - Llegarás a saber
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto poético expresa una certeza futura o resultativa. «Sabrás» comunica bien la garantía sin sonar forzado en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que se sabe, no una causalidad; por eso «que» es la opción más natural y fiel.
- source_word: רַב
  english_pob_choice: are many
  chosen_spanish: será numerosa
  alternatives_spanish:
  - será abundante
  - será mucha
  lexicon: HALOT
  rationale: Con זַרְעֶךָ como colectivo singular, el adjetivo expresa multiplicidad. En español, «numerosa» conserva la idea de abundancia de descendencia con naturalidad.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu semilla
  - tus hijos
  - tu linaje
  lexicon: HALOT
  rationale: El término hebreo puede ser literal o figurado; aquí el contexto familiar apunta a progenie. «Descendencia» mantiene el valor colectivo y la amplitud del término sin usar «semilla», que sería menos transparente para el lector actual.
- source_word: וְצֶאֱצָאֶיךָ
  english_pob_choice: your descendants
  chosen_spanish: tus descendientes
  alternatives_spanish:
  - tu posteridad
  - los que provengan de ti
  lexicon: HALOT
  rationale: Conserva el paralelismo con זַרְעֶךָ, pero distingue el segundo miembro con un término español claro y natural para progenie posterior.
- source_word: כְּעֵשֶׂב
  english_pob_choice: like the grass
  chosen_spanish: como la hierba
  alternatives_spanish:
  - como el pasto
  - como la hierba del campo
  lexicon: HALOT
  rationale: «עֵשֶׂב» designa vegetación herbácea; «hierba» es un equivalente amplio y digno en español bíblico. Se evita restringirlo innecesariamente a «pasto».
- source_word: הָאָרֶץ
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del país
  - del suelo
  lexicon: HALOT
  rationale: El hebreo puede significar «tierra» o «país». En esta comparación de abundancia general, «tierra» preserva bien la amplitud del hebreo; en español suena más natural que «de la tierra» en este giro fijo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y la lectura auditada en inglés, pero ajusta la sintaxis al español para que la primera cláusula resulte natural («Sabrás que...»). También conserva el paralelismo entre זַרְעֶךָ y צֶאֱצָאֶיךָ diferenciándolos como «descendencia» y «descendientes».
  spanish_consistency_notes:
  - Se usa «descendencia» para el término colectivo hebreo זֶרַע y «descendientes» para צֶאֱצָאִים, manteniendo distinción semántica.
  - Se traduce אֶרֶץ como «tierra» en el texto principal, con nota para la posible lectura «país/land».
  - La comparación queda en plural natural español con «serán como la hierba», en línea con la revisión auditada del inglés que añadió el verbo copulativo por fluidez.
