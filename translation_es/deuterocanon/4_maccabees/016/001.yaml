    rationale: El punto y coma tras "sus hijos" separa de manera antinatural la prótasis de la afirmación principal. En español aquí corresponde una coma.
  - severity: low
    issue: '"Señor de las pasiones" suena algo rígido'
    rationale: Aunque fiel, "dueño de las pasiones" o "amo de las pasiones" expresa mejor en español el valor predicativo de αὐτοκράτωρ en este contexto filosófico.
