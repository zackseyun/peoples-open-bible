translation:
  language: es
  text: 'Pesas diferentes y medidas diferentes: ambas son abominación para Yahvé[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ‘piedra y piedra, efa y efa’; es decir, pesas y medidas distintas usadas con engaño en el comercio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן
  english_pob_choice: weight
  chosen_spanish: pesa
  alternatives_spanish:
  - piedra
  - peso
  - peso-patrón
  lexicon: HALOT
  rationale: En contexto comercial, el hebreo literalmente ‘piedra’ alude a una piedra usada como peso en la balanza. ‘Pesa’ comunica de forma natural esa función en español sin perder el trasfondo mercantil.
- source_word: וָאֶבֶן
  english_pob_choice: a differing weight
  chosen_spanish: una pesa y una pesa
  alternatives_spanish:
  - pesas diferentes
  - una pesa distinta
  - doble pesa
  lexicon: HALOT
  rationale: La repetición refleja dos patrones no coincidentes para engañar en el comercio. En español, la duplicación simple conserva la estructura hebrea y deja visible la tensión de dos medidas/pesos no equivalentes.
- source_word: אֵיפָה
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - efa
  - medida de grano
  - medida seca
  lexicon: HALOT
  rationale: ‘Efa’ es el término técnico, pero el punto del proverbio es la inconsistencia fraudulenta en la medición. ‘Medida’ transmite el sentido ético y comercial con claridad para lectores modernos.
- source_word: וְאֵיפָה
  english_pob_choice: a differing measure
  chosen_spanish: una medida y una medida
  alternatives_spanish:
  - medidas diferentes
  - doble medida
  - una efa y otra efa
  lexicon: HALOT
  rationale: Como con ‘pesa’, la repetición simple deja oír el paralelismo hebreo y sugiere la práctica deshonesta de usar dos estándares distintos sin añadir interpretación excesiva.
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa detestable
  - algo aborrecible
  lexicon: HALOT
  rationale: ‘Abominación’ conserva la fuerza moral y teológica del término hebreo mejor que opciones más suaves. Mantiene el rechazo divino explícito en el proverbio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ según el criterio base del proyecto en español. Es la forma más estable y readable en español bíblico para el nombre divino, en lugar de sustituirlo por un título.
- source_word: גַּם שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambas
  alternatives_spanish:
  - las dos
  - ambas cosas
  - las dos a la vez
  lexicon: HALOT
  rationale: El hebreo enfatiza que los dos casos son igualmente detestables. ‘Ambas’ conserva esa inclusión y evita un giro más largo que debilitaría la sentencia proverbial.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español del POB se sigue la convención de transliterarlo como ‘Yahvé’ para mantener visible el nombre propio de Dios y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Intensidad moral de תּוֹעֲבָה
  english_pob_reading: an abomination
  chosen_spanish_reading: abominación
  alternative_spanish_readings:
  - cosa detestable
  - detestable
  rationale: La sentencia no solo desaprueba una práctica; la coloca bajo una fuerte repulsión divina. ‘Abominación’ preserva esa carga ética y teológica.
  doctrine_reference: Uso léxico consistente de תּוֹעֵבָה en el POB
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el control inglés; la principal adaptación al español consiste en conservar el paralelismo hebreo mediante duplicación y en usar la forma estándar del proyecto para el nombre divino, sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente con la política española del proyecto para יְהוָה.
  - Se eligieron sustantivos comerciales naturales (‘pesa’, ‘medida’) para evitar un literalismo opaco, pero se conservó el doblete hebreo en la nota.
  - ‘Abominación’ se usó como término técnico-teológico estable, sin suavizar la fuerza del proverbio.
