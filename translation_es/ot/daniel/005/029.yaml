review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del arameo: secuencia narrativa, directiva real de Belsasar, investidura de Daniel con púrpura, adorno de oro al cuello y proclamación de su rango como tercero en el reino. Sin embargo, las notas al pie no preservan fielmente las alternativas del rastro de auditoría inglés: la nota [a] introduce «les dio la orden», que no corresponde a la alternativa documentada, y la nota [b] se ancla en «cuello» aunque la alternativa inglesa relevante trata del rango («tercer gobernante en el reino» / «tercer gobernante en el reino/realm»), no del adorno.'
  spanish_quality_summary: El español es claro y natural. «Vistieron a Daniel de púrpura» y «proclamaron acerca de él» son aceptables, aunque «una cadena de oro» refleja mejor el término y mantiene mejor la conexión con la alternativa auditada. «Alrededor del cuello» es entendible, pero «alrededor de su cuello» suena ligeramente más completo. La frase final se lee bien; «tercer gobernante en el reino» es comprensible y digna.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. La transliteración «Belsasar» es idiomática en español bíblico. El problema principal no es terminológico sino de fidelidad a las notas y al detalle léxico: conviene usar «cadena de oro» en el texto principal o al menos conservar esa alternativa donde corresponde, y trasladar la nota [b] al sintagma de rango.'
  issues:
  - severity: medium
    issue: La nota [a] no coincide con la alternativa documentada en el English POB.
    rationale: La auditoría inglesa ofrece como alternativa «they dressed Daniel in purple», no una variante sobre el objeto indirecto de «dio la orden». La nota española actual introduce una posibilidad no documentada y desvía la atención del lugar léxico relevante.
  - severity: high
    issue: La nota [b] está aplicada al lugar equivocado y cambia el contenido de la alternativa auditada.
    rationale: La nota inglesa [b] explica la frase «the third ruler in the realm», pero en el borrador español [b] se coloca en «cuello» y comenta «cadena/collar». Eso altera la trazabilidad del aparato crítico y pierde la alternativa sobre el rango de Daniel.
  - severity: low
    issue: «Collar de oro» es posible, pero «cadena de oro» refleja mejor el matiz léxico y armoniza con la alternativa inglesa.
    rationale: El término arameo designa un adorno honorífico para el cuello; «cadena» mantiene mejor el vínculo con la evidencia y evita una posible lectura demasiado moderna o decorativa de «collar».
  revised_spanish_text: Entonces Belsasar dio la orden, y vistieron a Daniel de púrpura[a], le pusieron una cadena de oro alrededor de su cuello, y proclamaron acerca de él que sería el tercer gobernante en el reino[b].
