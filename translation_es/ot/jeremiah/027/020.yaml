translation:
  language: es
  text: la cual Nabucodonosor, rey de Babilonia, no tomó cuando deportó[a] a Jeconías, hijo de Joacim, rey de Judá, de Jerusalén a Babilonia, junto con todos los nobles[b] de Judá y de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando llevó al exilio».
    reason: lexical_alternative
  - marker: b
    text: O «oficiales» o «hombres principales».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא לְקָחָם
  english_pob_choice: did not take
  chosen_spanish: no tomó
  alternatives_spanish:
  - no había tomado
  - no se llevó
  lexicon: HALOT
  rationale: El hebreo narra una acción pasada concreta; en español, «no tomó» conserva la secuencia histórica sin introducir una anterioridad innecesaria. «No se llevó» podría sonar más idiomático, pero atenúa el paralelismo con el objeto directo implícito del contexto.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucodonosor
  lexicon: uso bíblico tradicional en español
  rationale: Se mantiene la forma ampliamente reconocible en español bíblico. La grafía con «b» y «d» refleja la transliteración estable habitual en castellano y evita una innovación innecesaria.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y natural en español. «Babilonia» conserva el valor geopolítico del reino sin añadir matices no presentes en el hebreo.
- source_word: בַּגְלוֹתוֹ
  english_pob_choice: when he exiled
  chosen_spanish: cuando llevó en cautiverio
  alternatives_spanish:
  - cuando exilió
  - al desterrar
  lexicon: HALOT
  rationale: El hebreo expresa el momento de la deportación/exilio. En español, «llevó en cautiverio» reproduce bien la idea de traslado forzado y evita que «exilió» suene demasiado abstracto. Se mantiene la relación temporal con «cuando».
- source_word: יְכָונְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Jeconías
  lexicon: uso onomástico bíblico en español
  rationale: Se adopta la forma española habitual del nombre real. La variante inglesa/hebrea se preserva en la nota porque el nombre tiene formas alternas documentadas.
- source_word: בֶן יְהוֹיָקִים
  english_pob_choice: son of Jehoiakim
  chosen_spanish: hijo de Joacim
  alternatives_spanish:
  - hijo de Jehoiaquim
  - hijo de Yoyaquim
  lexicon: uso onomástico bíblico en español
  rationale: «Joacim» es la forma establecida y más inteligible en español bíblico. Mantiene la identidad del personaje sin depender de una transliteración más técnica.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: Se conserva la designación regia sin amplificación. En contexto, funciona como aposición identificadora de Jeconías.
- source_word: מִירוּשָׁלִַם בָּבֶלָה
  english_pob_choice: from Jerusalem to Babylon
  chosen_spanish: de Jerusalén a Babilonia
  alternatives_spanish:
  - desde Jerusalén hasta Babilonia
  lexicon: HALOT
  rationale: La dupla direccional se expresa de forma natural con «de... a...». «Desde... hasta...» sería posible, pero aquí «de... a...» es más directo y fiel al movimiento geográfico.
- source_word: וְאֵת כָּל חֹרֵי יְהוּדָה וִירוּשָׁלִָם
  english_pob_choice: along with all the nobles of Judah and Jerusalem
  chosen_spanish: junto con todos los nobles de Judá y de Jerusalén
  alternatives_spanish:
  - junto con todos los oficiales de Judá y de Jerusalén
  - junto con todos los principales de Judá y de Jerusalén
  lexicon: HALOT
  rationale: «Nobles» capta bien el rango sociopolítico de חֹרִים en este contexto. Se evita «oficiales» porque restringe innecesariamente el grupo a cargos administrativos, y «principales» es más vago.
translation_notes:
  revision_awareness: 'El texto hebreo y el contexto auditado en inglés muestran alto acuerdo y no requieren revisión sustantiva. Se conservaron las decisiones nucleares del POB inglés: verbo de deportación temporal, nombre real estándar, y el valor sociopolítico de חֹרֵי. La única adaptación relevante es naturalizar los nombres propios al uso bíblico español sin perder trazabilidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Babilonia» se conserva como topónimo/reino sin artículo.
  - La frase relativa inicial se vertió con «la cual» para concordar con el antecedente femenino del contexto inmediato en español.
  - «Nobles» se eligió para mantener la fuerza social del hebreo sin sobrecargar la frase con explicaciones.
