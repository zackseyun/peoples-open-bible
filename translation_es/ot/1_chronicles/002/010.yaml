translation:
  language: es
  text: Ram engendró a Amminadab, y Amminadab engendró a Nasón, líder[a] de los hijos de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «príncipe de los hijos de Judá» o «jefe de los hijos de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró como padre de
  lexicon: HALOT
  rationale: En contexto genealógico, el hifil de ילד expresa la acción de engendrar o ser padre de. «Engendró» conserva el valor genealógico masculino y es natural en español bíblico sin recurrir a una paráfrasis más amplia.
- source_word: נְשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - príncipe
  - jefe
  - gobernante
  lexicon: HALOT
  rationale: El término puede significar príncipe, jefe o líder. En español, «líder» comunica con claridad el rango o condición destacada de Nasón entre los hijos de Judá, sin imponer una connotación monárquica que no está explícita en el hebreo.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - la tribu de Judá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Judá». Se mantiene esa formulación porque el pasaje es genealógico y tribal; «los hijos de Judá» conserva el enlace lineal y masculino del original.
- source_word: רָם / עַמִּינָדָב / נַחְשׁוֹן
  english_pob_choice: Ram / Amminadab / Nahshon
  chosen_spanish: Ram / Amminadab / Nasón
  alternatives_spanish:
  - Ram / Amminadab / Nahsón
  lexicon: HALOT
  rationale: Son nombres propios, por lo que se transliteran. Se usa «Nasón» para ajustar la forma española más extendida del nombre hebreo נַחְשׁוֹן, manteniendo reconocimiento lector sin traducir el nombre.
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia y no registra revisiones aplicadas; por ello, este borrador sigue de cerca la lectura auditada del POB en inglés, ajustando solo la idiomaticidad y la forma onomástica española donde corresponde.
  spanish_consistency_notes:
  - Se conserva el paralelismo genealógico del hebreo con dos verbos en pasado simple.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Hijos de Judá» se mantiene literal para respetar el marco tribal y genealógico.
  - La nota al pie conserva la alternativa léxica documentada para נְשִׂיא.
