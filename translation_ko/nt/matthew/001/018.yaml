lexical_decisions:
- source_word: γένεσις
  english_pob_choice: birth
  chosen_korean: 나심
  alternatives_korean:
  - 탄생
  - 태어나심
  - 기원
  lexicon: BDAG
  rationale: 여기서 γένεσις는 1:1의 「족보」와 결을 다르게 하여 출생 사건을 가리킨다. 한국어 「나심」은 합쇼체 서사 안에서 존칭과 사건성을 함께 담는다.
- source_word: μνηστευθείσης
  english_pob_choice: betrothed
  chosen_korean: 약혼한
  alternatives_korean:
  - 정혼한
  lexicon: BDAG
  rationale: 1세기 유대 관습의 약혼은 법적 결혼에 가까운 결속이었다. 「약혼」으로 옮기되 그 무게는 19절의 「이혼」(ἀπολῦσαι)이 드러내도록 한다.
- source_word: ἐκ πνεύματος ἁγίου
  english_pob_choice: from the Holy Spirit
  chosen_korean: 성령으로
  alternatives_korean:
  - 성령에 의하여
  - 성령으로부터
  lexicon: BDAG
  rationale: πνεῦμα ἅγιον의 정형 용법을 한국어 「성령」으로 옮긴다.
