base_translation:
  language: en
  yaml_path: translation/ot/numbers/028/006.yaml
  text: It is the regular burnt offering[a], made at Mount Sinai as a pleasing aroma[d][c][b], a food offering to Yahweh.
  footnotes:
  - marker: a
    text: Or 'continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'made/offered at Mount Sinai.' The Hebrew participle can be rendered more literally, but here likely refers to the offering as instituted there.
    reason: alternative_reading
  - marker: c
    text: Or 'a soothing aroma' or 'a sweet aroma.'
    reason: lexical_alternative
  - marker: d
    text: Traditionally 'an offering by fire to the LORD.'
    reason: lexical_alternative
