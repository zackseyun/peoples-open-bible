translation:
  language: es
  text: 'Entonces los hijos de José le hablaron a Josué, diciendo: «¿Por qué me has dado un solo lote y una sola porción[a] como herencia, aunque soy un pueblo numeroso, ya que Yahvé me ha bendecido hasta ahora?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y una sola porción/territorio'. El término hebreo puede designar una porción medida de tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  lexicon: HALOT
  rationale: El hebreo introduce el discurso con un verbo general de habla. En español, 'hablaron' conserva esa función narrativa de manera natural; 'dijeron' también es posible, pero 'hablaron' refleja mejor la introducción del diálogo antes de לֵאמֹר.
- source_word: בְּנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  - el pueblo de José
  lexicon: HALOT
  rationale: Se mantiene la designación tribal de forma cercana al hebreo. 'Hijos' es la equivalencia más directa de בְּנֵי y preserva la referencia corporativa a las tribus de José.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La forma introductoria del habla se vierte de modo idiomático con 'diciendo', que mantiene la relación con el verbo anterior sin añadir interpretaciones.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué es que
  lexicon: HALOT
  rationale: Se conserva la interrogación directa y breve del hebreo sin expansión innecesaria.
- source_word: נָתַתָּה לִּי
  english_pob_choice: have you given me
  chosen_spanish: me has dado
  alternatives_spanish:
  - me diste
  - me has asignado
  lexicon: HALOT
  rationale: El perfecto en discurso directo se expresa naturalmente en pretérito perfecto español. Se mantiene el singular 'me', que refleja la voz corporativa de la tribu hablando como una sola entidad.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como legado
  lexicon: HALOT
  rationale: En Josué, נַחֲלָה denota la porción de tierra asignada por herencia. 'Como herencia' comunica esa función sin forzar una paráfrasis más amplia.
- source_word: גּוֹרָל אֶחָד
  english_pob_choice: one lot
  chosen_spanish: una sola suerte
  alternatives_spanish:
  - una sola lotería
  - un solo lote
  lexicon: HALOT
  rationale: גוֹרָל se refiere al reparto determinado por sorteo. 'Suerte' es un equivalente bíblico claro en español; 'una sola' destaca la escasez expresada por el hebreo.
- source_word: וְחֶבֶל אֶחָד
  english_pob_choice: and one portion
  chosen_spanish: y una sola porción
  alternatives_spanish:
  - y una sola franja
  - y un solo territorio
  - y una medida
  lexicon: HALOT
  rationale: חֶבֶל puede indicar una porción medida de tierra o territorio. 'Porción' es natural en español y conserva la idea de una asignación territorial delimitada. La repetición de 'una sola' refleja el paralelismo intensivo del hebreo.
- source_word: וַאֲנִי עַם רָב
  english_pob_choice: though I am a numerous people
  chosen_spanish: aunque soy un pueblo numeroso
  alternatives_spanish:
  - siendo un pueblo numeroso
  - pues soy un pueblo numeroso
  - aunque somos un pueblo numeroso
  lexicon: HALOT
  rationale: El hebreo usa un singular corporativo ('yo') para la tribu, pero en español resulta más claro conservar la idea colectiva con 'pueblo numeroso'. 'Aunque' expresa bien el contraste implícito de la queja.
- source_word: עַד אֲשֶׁר עַד כֹּה
  english_pob_choice: since ... until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta aquí
  lexicon: HALOT
  rationale: La expresión hebrea está comprimida y alude al alcance de la bendición divina hasta el presente. 'Hasta ahora' recoge ese valor temporal con naturalidad y sin sobreinterpretar el giro idiomático.
- source_word: בֵּרְכַנִי
  english_pob_choice: has blessed me
  chosen_spanish: me ha bendecido
  alternatives_spanish:
  - me ha prosperado
  lexicon: HALOT
  rationale: Se mantiene el verbo estándar 'bendecir' para ברך. El sufijo singular se conserva en español, en coherencia con la auto-presentación corporativa de la tribu.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se adopta la forma española del nombre divino según el criterio del proyecto: ''Yahvé'' para יְהוָה. Esto preserva el nombre propio del pacto en lugar de sustituirlo por un título.'
theological_decisions:
- issue: El nombre divino יְהוָה en la cita de la bendición
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la tradición editorial de POB se evita la sustitución por un título; en español, 'Yahvé' comunica ese nombre propio con lectura natural y reconocible.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La voz singular de la tribu hablando en nombre colectivo
  english_pob_reading: though I am a numerous people
  chosen_spanish_reading: aunque soy un pueblo numeroso
  alternative_spanish_readings:
  - aunque somos un pueblo numeroso
  - pues soy un pueblo numeroso
  rationale: El hebreo combina un singular de representación con un sustantivo colectivo. Mantener 'soy' preserva la forma del original, mientras que 'pueblo numeroso' hace claro el referente tribal en español.
  doctrine_reference: Josué 17:14; uso corporativo del singular en el hebreo bíblico
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés: se conservó ''as an inheritance'' después de ''one lot and one portion'' por naturalidad, y se reflejó la corrección de עַד כֹּה como ''hasta ahora'' en vez de una paráfrasis más fuerte. También se mantuvo la decisión doctrinal de traducir יְהוָה como nombre propio divino y no como título.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, sin recurrir a fórmulas eclesiásticas que oculten el nombre divino.
  - '''Hijos de José'' preserva la terminología tribal y evita reemplazos más interpretativos.'
  - '''Suerte'' y ''porción'' se usaron para distinguir dos términos de reparto sin fusionarlos en una sola idea.'
  - La nota a pie de página se ancla en 'porción' para conservar la alternativa territorial documentada por el aparato inglés.
