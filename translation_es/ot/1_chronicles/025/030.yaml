translation:
  language: es
  text: para el vigésimo tercero[a], Mahaziot; sus hijos varones y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «para la vigésima tercera suerte, Mahaziot». El prefijo ל puede entenderse como indicación de asignación dentro de la serie de suertes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/שְׁלֹשָׁה וְ/עֶשְׂרִים
  english_pob_choice: for the twenty-third
  chosen_spanish: para el vigésimo tercero
  alternatives_spanish:
  - para el veintitrés
  - para el tres y veinte y tres
  lexicon: HALOT
  rationale: En este reparto por suertes, el prefijo ל expresa asignación («para» / «a»). El hebreo compuesto funciona idiomáticamente como ordinal, así que en español la forma natural y fiel es «vigésimo tercero».
- source_word: לְ/מַחֲזִיאוֹת
  english_pob_choice: Mahazioth
  chosen_spanish: Mahaziot
  alternatives_spanish:
  - Mahazioth
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera. Se opta por «Mahaziot» para seguir de cerca la forma consonántica hebrea y una adaptación española sobria, sin añadir consonantes finales no reflejadas por la grafía fuente.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos». Aunque el inglés POB eligió «his sons» por precisión de género, en español «hijos» conserva la referencia genealógica y evita una redundancia demasiado rígida; el contexto de lista familiar ya sostiene el matiz masculino.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos
  - y sus parientes
  lexicon: HALOT
  rationale: אחים significa «hermanos» en este contexto de registro familiar. Se mantiene el vínculo directo y se evita ampliar indebidamente a «parientes».
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Número cardinal simple; «doce» es la forma normal y exacta en español.
translation_notes:
  revision_awareness: El texto inglés POB no requirió revisión sustantiva y mantiene alta concordancia con el hebreo; se conserva su decisión de leer la expresión como ordinal de asignación en la secuencia de suertes.
  spanish_consistency_notes:
  - Se mantiene «Mahaziot» como transliteración breve y consistente para un nombre propio hebreo.
  - Se preserva el valor de asignación del prefijo ל mediante «para», coherente con la nota alternativa.
  - 'El orden sintáctico español sigue de cerca el hebreo, pero con fluidez natural: asignación → nombre → descendencia → total.'
