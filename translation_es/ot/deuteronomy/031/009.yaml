revisions:
- from: Entonces Moisés escribió esta ley y la entregó a los sacerdotes[a], los hijos de Leví[b], que llevaban el arca del pacto de Yahvé[c], y a todos los ancianos de Israel.
  to: Entonces Moisés escribió esta ley y la entregó a los sacerdotes[a], los hijos de Leví[b], que llevan el arca del pacto de Yahvé[c], y a todos los ancianos de Israel.
  rationale: Se ajusta «que llevaban» a «que llevan» para reflejar con mayor fidelidad el participio hebreo descriptivo. También se pule ligeramente la redacción de la nota c para un español más natural. No se requieren cambios adicionales.
