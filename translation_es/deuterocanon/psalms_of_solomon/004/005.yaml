translation:
  language: es
  text: De noche y en lugares ocultos[a] peca como si no fuera visto; con sus ojos habla[b] a toda mujer en un plan de maldad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en lugares escondidos».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «con sus ojos habla», imagen de una señal muda y sugerente.'
    reason: cultural_note
  - marker: c
    text: 'O: «en un complot de maldad» / «en una conspiración de maldad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν νυκτί
  english_pob_choice: At night
  chosen_spanish: De noche
  alternatives_spanish:
  - En la noche
  - Por la noche
  lexicon: BDAG
  rationale: La locución temporal griega se expresa con naturalidad en español como 'de noche', manteniendo el valor de tiempo y el matiz de acción bajo cobertura de la oscuridad.
- source_word: ἐν ἀποκρύφοις
  english_pob_choice: in secret places
  chosen_spanish: en lugares ocultos
  alternatives_spanish:
  - en lugares secretos
  - en lugares escondidos
  lexicon: BDAG
  rationale: El plural dativo sugiere ámbitos o sitios concretos y escondidos, no solo una idea adverbial; 'lugares ocultos' conserva ese sentido concreto sin sonar forzado.
- source_word: ἁμαρτάνει
  english_pob_choice: he sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete pecado
  - obra mal
  lexicon: BDAG
  rationale: El verbo denota pecado de manera directa; 'peca' conserva la fuerza moral del original con una forma breve y natural en español.
- source_word: ὡς οὐχ ὁρώμενος
  english_pob_choice: as though unseen
  chosen_spanish: como si no fuera visto
  alternatives_spanish:
  - como si nadie lo viera
  - como no visto
  lexicon: BDAG
  rationale: La comparación expresa su presunción de escapar a la vista. 'Como si no fuera visto' preserva esa idea con español idiomático.
- source_word: ἐν ὀφθαλμοῖς αὐτοῦ λαλεῖ
  english_pob_choice: with his eyes he speaks
  chosen_spanish: con sus ojos habla
  alternatives_spanish:
  - habla con los ojos
  - sus ojos hablan
  lexicon: BDAG
  rationale: La imagen corporal y silenciosa se mantiene literalmente en español, evitando aplanarla a una simple insinuación.
- source_word: πάσῃ γυναικί
  english_pob_choice: to every woman
  chosen_spanish: a toda mujer
  alternatives_spanish:
  - a cada mujer
  - con toda mujer
  lexicon: BDAG
  rationale: El sentido distributivo se conserva con 'a toda mujer', que resulta natural después de 'habla' y mantiene la amplitud del griego.
- source_word: ἐν συνταγῇ κακίας
  english_pob_choice: in a scheme of evil
  chosen_spanish: en un plan de maldad
  alternatives_spanish:
  - en una trama de maldad
  - en una conspiración de maldad
  lexicon: LSJ
  rationale: συνταγή apunta a una disposición, arreglo o plan; 'plan de maldad' comunica la intención deliberada sin perder el matiz de diseño perverso.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta modificar el contenido; se mantuvo la misma lectura básica, solo ajustada al español de destino para una publicación clara y fiel.
  spanish_consistency_notes:
  - Se conservó el contraste entre el ocultamiento nocturno y la conducta visible a los ojos de otros.
  - Se mantuvo la imagen corporal de 'habla con sus ojos' para no diluir la fuerza retórica del griego.
  - '''Maldad'' se eligió para traducir συνταγῇ κακίας con un sustantivo natural en español, sin convertirlo en una paráfrasis más abstracta.'
