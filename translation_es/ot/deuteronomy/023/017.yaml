review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en casi todos los segmentos: mantiene la residencia permitida del fugitivo, su elección personal del lugar, el modismo de ''tus puertas'' con nota explicativa, y la prohibición fuerte de oprimirlo. Sin embargo, ''donde le sea bueno'' no suena natural en español y no comunica con suficiente claridad el sentido de בַּטּוֹב לוֹ (''donde le parezca mejor'' / ''donde sea bueno para él'').'
  spanish_quality_summary: El texto es mayormente claro y fiel, con buen tono bíblico moderno. La principal debilidad es la frase 'donde le sea bueno', que resulta poco idiomática en español general y puede distraer o confundir. Una leve mejora estilística es preferir 'en uno de tus poblados[a]' solo si se quisiera abandonar el modismo, pero como la auditoría inglesa preserva 'gates', conviene mantener 'puertas' con nota. También es más natural decir 'donde mejor le parezca' o 'donde le parezca mejor'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, esclavo/siervo, etc. La elección 'no lo oprimirás' concuerda con la fuerza legal de לֹא תּוֹנֶנּוּ. Se preserva correctamente el masculino singular.
  issues:
  - severity: medium
    issue: La expresión 'donde le sea bueno' es poco natural en español.
    rationale: Aunque intenta seguir de cerca בַּטּוֹב לוֹ, en español amplio suena forzada y puede no entenderse como 'donde le parezca mejor' o 'donde sea bueno para él'.
  - severity: low
    issue: La nota a indica 'habitará contigo ... donde le parezca mejor', pero el texto principal usa una formulación menos clara que la alternativa anotada.
    rationale: 'La relación entre texto principal y nota queda desequilibrada: la nota ofrece una solución más idiomática que la línea principal.'
  revised_spanish_text: Vivirá contigo[a], en medio de ti, en el lugar que él escoja, dentro de una de tus puertas, donde le parezca mejor[b]; no lo oprimirás.
  revised_footnotes:
