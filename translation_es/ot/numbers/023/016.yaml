revisions:
- from: 'Yahvé se encontró con Balaam y puso una palabra en su boca[a], y le dijo: «Vuelve a Balac, y así hablarás».'
  to: 'Yahvé encontró a Balaam y puso una palabra en su boca[a], y le dijo: «Vuelve a Balac, y así hablarás».'
  rationale: Se ajusta el verbo principal a una forma más directa y natural en español, en línea con la revisión auditada del inglés («met Balaam»). Se corrige y mejora la nota alternativa para reflejar con español correcto las opciones léxicas documentadas sin introducir lecturas más fuertes que el hebreo.
