  category: mistranslation
  from: its evil and good seeds
  to: the seed of the evil and the good
  rationale: In the Syriac text, 'evil' and 'good' are plural substantives (d-bishe
    w-d-tabhe), meaning 'of the evil [ones] and of the good [ones]'. They are genitives
    modifying 'seed', not adjectives modifying 'seeds'. The current rendering changes
    the meaning to the moral quality of the seeds themselves rather than the people
    to whom the seed belongs.
