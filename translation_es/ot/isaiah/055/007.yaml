translation:
  language: es
  text: Que el impío[a] abandone su camino, y el hombre de iniquidad sus pensamientos; que vuelva a Yahvé, y él tendrá compasión de él; y a nuestro Dios, porque abundará en perdonar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el hombre de iniquidad»; hebreo: «el hombre de maldad / perversidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲזֹב
  english_pob_choice: forsake
  chosen_spanish: abandone
  alternatives_spanish:
  - deje
  - abandone por completo
  lexicon: HALOT
  rationale: El hebreo pide una renuncia voluntaria y moral, no solo una separación física. «Abandone» conserva la fuerza exhortativa de forsake sin sonar arcaico.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: impío
  alternatives_spanish:
  - malvado
  - malvado hombre
  - culpable
  lexicon: HALOT
  rationale: El sustantivo adjetival funciona de manera sustantivada en hebreo. «Impío» mantiene el valor moral y evita forzar el masculino «hombre» donde el hebreo ya está substantivado.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su conducta
  lexicon: HALOT
  rationale: «Camino» reproduce la metáfora bíblica habitual de la orientación de vida y conserva la imagen del texto original.
- source_word: אִישׁ אָוֶן
  english_pob_choice: the unrighteous man
  chosen_spanish: el hombre de iniquidad
  alternatives_spanish:
  - el hombre injusto
  - el hombre perverso
  - el hombre de maldad
  lexicon: HALOT
  rationale: 'Aunque la revisión inglesa prefirió una forma más natural, la construcción hebrea conserva valor composicional: «hombre de iniquidad» refleja איש + אָוֶן y mantiene el paralelismo con el miembro anterior. En español, esta forma es entendible y auditable, aunque más solemne.'
- source_word: מַחְשְׁבֹתָיו
  english_pob_choice: his thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus planes
  - sus intenciones
  - sus designios
  lexicon: HALOT
  rationale: El término puede abarcar pensamientos, planes o intenciones. «Pensamientos» conserva la interioridad contrapuesta a «camino» y sigue de cerca la elección auditada en inglés.
- source_word: וְיָשֹׁב
  english_pob_choice: let him return
  chosen_spanish: vuélvase
  alternatives_spanish:
  - que vuelva
  - que se vuelva
  - retorne
  lexicon: HALOT
  rationale: El hebreo שׁוּב expresa retorno/movimiento de vuelta. «Vuélvase» conserva la dirección relacional hacia Dios sin imponer de entrada la formulación técnica «arrepentirse».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención editorial del proyecto para el Tetragrámaton: «Yahvé», transliteración del nombre divino, en lugar de una sustitución por título.'
- source_word: וִירַחֲמֵהוּ
  english_pob_choice: and he will have compassion on him
  chosen_spanish: y él tendrá compasión de él
  alternatives_spanish:
  - y se compadecerá de él
  - y le mostrará misericordia
  lexicon: HALOT
  rationale: רָחַם expresa compasión/ternura misericordiosa. «Tendrá compasión de él» conserva el sentido personal y afectivo sin desplazarlo a una paráfrasis más amplia.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Traducción directa del posesivo plural. Mantiene la voz comunitaria del profeta y la relación de pacto implícita en la expresión.
- source_word: כִּי יַרְבֶּה לִסְלוֹחַ
  english_pob_choice: for he will abundantly pardon
  chosen_spanish: porque abundará en perdonar
  alternatives_spanish:
  - porque perdonará abundantemente
  - porque multiplicará el perdón
  - porque estará pronto a perdonar
  lexicon: HALOT
  rationale: El hifil de רבה intensifica la acción de perdonar. «Abundará en perdonar» preserva esa abundancia con un español natural y sin perder el matiz de plenitud.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. La convención del proyecto es transliterarlo como «Yahvé» para conservar el nombre personal del Dios del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Valor de וְיָשֹׁב: retorno relacional o arrepentimiento técnico'
  english_pob_reading: let him return
  chosen_spanish_reading: vuélvase
  alternative_spanish_readings:
  - que vuelva
  - arrepiéntase
  - retorne
  rationale: El contexto incluye abandonar el camino y los pensamientos malos, pero el verbo hebreo sigue siendo «volver/retornar». «Vuélvase» preserva la metáfora de regreso a Dios y deja abierta la carga penitencial sin reducir el sentido a una sola fórmula doctrinal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Mantenimiento de la tensión léxica entre רָשָׁע y אִישׁ אָוֶן
  english_pob_reading: the wicked ... the unrighteous man
  chosen_spanish_reading: el impío ... el hombre de iniquidad
  alternative_spanish_readings:
  - el malvado ... el hombre de maldad
  - el impío ... el hombre injusto
  rationale: El hebreo presenta dos expresiones emparentadas pero no idénticas. Se conserva esa duplicación semántica con dos formulaciones distintas en español, evitando borrar la fuerza paralela del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La traducción inglesa auditada pasó por una revisión que ajustó la primera cola de «wicked man» a «wicked» y la segunda a «unrighteous man» para reflejar mejor la sintaxis hebrea. Esta versión española busca conservar esa distinción semántica sin perder el paralelismo poético: usa un adjetivo sustantivado («el impío») y una construcción nominal más marcada («el hombre de iniquidad»). También sigue la decisión editorial del proyecto de verter יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en el texto principal.
  - 'Se preserva el paralelismo exhortativo con dos imperativos/jussivos: abandonar y volverse.'
  - «Pensamientos» se usa en sentido interno, no como mera ocurrencia mental aislada.
  - La cláusula final conserva la intensidad de רבה + לסלוח mediante una forma idiomática natural en español.
  - La nota al pie solo marca la primera expresión para señalar la alternativa composicional del hebreo sin saturar el versículo.
