translation:
  language: es
  text: El corazón del justo medita cómo responder[a], pero la boca de los impíos derrama cosas malas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pondera antes de responder». El verbo hebreo puede llevar la idea de meditar o ponderar, y la frase también puede traducirse más formalmente como «pondera para responder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En la literatura sapiencial hebrea, ‘corazón’ nombra el centro interior del pensar y deliberar. ‘Corazón’ conserva la imagen hebrea y funciona de manera natural en español.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - una persona justa
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente para un tipo humano representativo. ‘El justo’ es conciso, natural en español y mantiene el sentido genérico sin introducir género innecesario.
- source_word: יֶהְגֶּה
  english_pob_choice: considers
  chosen_spanish: medita
  alternatives_spanish:
  - considera
  - pondera
  - piensa
  lexicon: HALOT
  rationale: El verbo puede expresar murmurar, meditar o ponderar. En este contexto, unido a ‘para responder’, el sentido principal es una reflexión previa cuidadosa; ‘medita’ preserva esa deliberación y la opción de nota mantiene la tensión léxica.
- source_word: לַעֲנוֹת
  english_pob_choice: how to answer
  chosen_spanish: para responder
  alternatives_spanish:
  - cómo responder
  - qué responder
  lexicon: HALOT
  rationale: El infinitivo con ל indica relación o finalidad. En español, ‘para responder’ comunica la orientación del pensamiento sin añadir más contenido del que exige el hebreo; la alternativa ‘cómo responder’ queda recogida en la nota.
- source_word: וּפִי
  english_pob_choice: but the mouth
  chosen_spanish: pero la boca
  alternatives_spanish:
  - y la boca
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente ‘y’, el paralelismo antitético exige contraste. ‘Pero’ expresa mejor esa oposición retórica en español.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural sustantivado contrasta con ‘el justo’. ‘Los impíos’ es una equivalencia bíblica clara y digna en español; conserva la carga moral sin sonar excesivamente coloquial.
- source_word: יַבִּיעַ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - brota
  - desborda
  - lanza
  lexicon: HALOT
  rationale: La forma causativa sugiere hacer brotar o verter con abundancia. ‘Derrama’ es idiomático en español y conserva la imagen de habla que sale sin freno.
- source_word: רָעוֹת
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - maldades
  - cosas perversas
  - males
  lexicon: HALOT
  rationale: El plural puede referirse a cosas malas, nocivas o perversas. ‘Cosas malas’ conserva el plural y evita estrechar el sentido solo a maldad abstracta o solo a daño práctico.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de Proverbios 15:28 y el auditable inglés POB: mantiene la antítesis entre el justo y los impíos, conserva la imagen sapiencial de ‘corazón’ y resuelve el verbo יֶהְגֶּה con una equivalencia dinámica moderada (‘medita’) respaldada por una nota alternativa.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no hay tetragrámaton en este versículo.
  - ‘Los impíos’ se usa como término bíblico natural en español para רְשָׁעִים.
  - La nota a conserva la tensión entre ‘medita’, ‘considera’ y ‘pondera’ sin perder la lectura principal del versículo.
