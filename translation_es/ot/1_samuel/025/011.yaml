translation:
  language: es
  text: ¿Debo tomar mi pan[a], mi agua y la carne que he preparado para mis esquiladores, y dárselo a hombres que no conozco, de dónde son ellos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alimento» o «mi comida». «Pan» sigue más de cerca el hebreo לַחְמִי y mantiene la concreción del inventario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  english_pob_choice: Should I take
  chosen_spanish: ¿Debo tomar
  alternatives_spanish:
  - ¿Tomaré
  - ¿He de tomar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es qatal con waw, en esta pregunta retórica tiene valor deliberativo/futuro. En español, «¿Debo tomar» transmite mejor la indignación deliberativa que un futuro simple mecánico.
- source_word: לַחְמִי
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi comida
  - mi alimento
  lexicon: HALOT
  rationale: «Pan» conserva el valor literal y concreto de la provisión básica, igual que en el hebreo; además mantiene el paralelismo con agua y carne.
- source_word: מֵימַי
  english_pob_choice: my water
  chosen_spanish: mi agua
  alternatives_spanish:
  - mi bebida
  - mi suministro de agua
  lexicon: HALOT
  rationale: La traducción literal es la más fiel y natural en español, preservando el inventario concreto de bienes.
- source_word: טִבְחָתִי ... טָבַחְתִּי
  english_pob_choice: my meat that I have slaughtered
  chosen_spanish: mi carne, que he sacrificado
  alternatives_spanish:
  - mi carne, que he matado
  - mi carne, que he preparado
  lexicon: HALOT
  rationale: «Carne» conserva la referencia al alimento ya preparado; «he sacrificado» refleja el verbo טבח con su fuerza de inmolación/butchering mejor que una paráfrasis genérica. Se mantiene la repetición léxica del hebreo entre el sustantivo y el verbo.
- source_word: לְגֹזְזָי
  english_pob_choice: for my shearers
  chosen_spanish: para mis esquiladores
  alternatives_spanish:
  - para los que esquilan
  - para mis cortadores de lana
  lexicon: HALOT
  rationale: «Esquiladores» es el equivalente natural y específico en español para quienes realizan la esquila de ovejas. Conserva el contexto pastoral sin añadir explicaciones que el texto no da.
- source_word: לַאֲנָשִׁים
  english_pob_choice: to men
  chosen_spanish: a hombres
  alternatives_spanish:
  - a los hombres
  - a personas
  lexicon: HALOT
  rationale: El hebreo dice simplemente «a los hombres». En español, «hombres» reproduce la misma referencia masculina plural y el tono despectivo de la frase.
- source_word: אֲשֶׁר לֹא יָדַעְתִּי
  english_pob_choice: whom I do not know
  chosen_spanish: que no conozco
  alternatives_spanish:
  - a quienes no conozco
  - de quienes no sé
  lexicon: HALOT
  rationale: «Que no conozco» es idiomático y conserva el sentido relacional de ידע sin forzar una construcción más pesada.
- source_word: אֵי מִזֶּה הֵמָּה
  english_pob_choice: where they are from
  chosen_spanish: de dónde son
  alternatives_spanish:
  - de dónde vienen
  - de qué lugar son
  lexicon: HALOT
  rationale: La pregunta hebrea pide procedencia/origen. «De dónde son» es una forma natural en español y reproduce ese interrogante de origen mejor que una traducción demasiado literal.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios respecto al estado de alta concordancia; esta propuesta mantiene esa lectura y sólo adapta el registro al español, conservando la pregunta retórica, la lista concreta de provisiones y la referencia a la procedencia desconocida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto sólo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - 'Se conserva el paralelismo de bienes concretos: pan, agua y carne.'
  - El verbo «sacrificado» retiene la fuerza de טבח sin añadir una interpretación cultual que el contexto no exige.
  - No se suaviza el tono despectivo de «hombres» porque forma parte del sentido pragmático del verso.
