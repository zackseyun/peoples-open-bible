translation:
  language: es
  text: Y tengan cuidado de no dejar de cumplir esto[a]. ¿Por qué habría de aumentar el daño, en detrimento de los reyes[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean cuidadosos de no ser negligentes en llevar esto a cabo».'
    reason: lexical_alternative
  - marker: b
    text: Se conserva el plural «reyes», siguiendo el arameo, en vez de simplificarlo a «el rey»; probablemente alude de modo más amplio al interés real o a la dinastía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְהִירִין הֱוֹו
  english_pob_choice: be careful
  chosen_spanish: estén atentos
  alternatives_spanish:
  - sean cuidadosos
  - estén alertas
  - tengan cuidado
  lexicon: HALOT
  rationale: La combinación aramea tiene fuerza exhortativa de vigilancia/cautela. «Estén atentos» conserva ese matiz admonitorio en español natural; «tengan cuidado» también sería posible, pero suena menos solemne en este contexto administrativo.
- source_word: שָׁלוּ
  english_pob_choice: to neglect
  chosen_spanish: descuidar
  alternatives_spanish:
  - negligir
  - ser negligentes en
  - dejar de atender
  lexicon: HALOT
  rationale: El valor contextual es el de negligencia o falta de diligencia. «Descuidar» reproduce bien esa idea en español moderno sin introducir un matiz demasiado técnico.
- source_word: לְמֶעְבַּד
  english_pob_choice: doing
  chosen_spanish: hacer
  alternatives_spanish:
  - llevar a cabo
  - ejecutar
  - cumplir
  lexicon: HALOT
  rationale: El infinitivo complementa la prohibición de descuidar. «Hacer» es la forma más directa; en español, con el objeto implícito por contexto, resulta más natural que una perífrasis más pesada.
- source_word: עַל דְּנָה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta orden
  - este asunto
  - esto mismo
  lexicon: HALOT
  rationale: El demostrativo se refiere a la instrucción recién dada. «Esto» mantiene la referencia abierta y no especifica más de lo que el texto exige.
- source_word: לְמָה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habría de
  alternatives_spanish:
  - ¿por qué debería
  - ¿para qué habría de
  - ¿por qué razón habría de
  lexicon: HALOT
  rationale: La pregunta es retórica. «¿Por qué habría de…?» conserva el tono de advertencia y la modalidad potencial del arameo.
- source_word: יִשְׂגֵּא
  english_pob_choice: increase
  chosen_spanish: aumentar
  alternatives_spanish:
  - crecer
  - multiplicarse
  - agrandarse
  lexicon: HALOT
  rationale: El verbo expresa incremento o crecimiento. En español, «aumentar» es la opción más clara con «daño».
- source_word: חֲבָלָא
  english_pob_choice: the damage
  chosen_spanish: el daño
  alternatives_spanish:
  - el perjuicio
  - el mal
  - la pérdida
  lexicon: HALOT
  rationale: El término denota daño, perjuicio o detrimento. «Daño» mantiene la sencillez del original y funciona bien con el verbo «aumentar».
- source_word: לְהַנְזָקַת
  english_pob_choice: to the detriment of
  chosen_spanish: en detrimento de
  alternatives_spanish:
  - para perjuicio de
  - en perjuicio de
  - con daño para
  lexicon: HALOT
  rationale: La preposición con sustantivo de resultado expresa desventaja o perjuicio. «En detrimento de» reproduce con precisión el sentido relacional y es idiomático en español.
- source_word: מַלְכִין
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  - los monarcas
  - el rey
  lexicon: HALOT
  rationale: Se conserva el plural, como en el arameo. En español, «los reyes» mantiene la referencia plural y la posible amplitud política o dinástica que señaló la POB en inglés.
