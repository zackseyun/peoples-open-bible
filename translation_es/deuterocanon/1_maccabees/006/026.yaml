translation:
  language: es
  text: Y he aquí, hoy han acampado contra la ciudadela[a] en Jerusalén, para capturarla y el santuario, y han fortificado Bet-sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Acra», la ciudadela fortificada en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: LSJ
  rationale: ἰδού funciona como marcador discursivo de énfasis y atención. «He aquí» conserva un tono solemne y bíblico sin volver el español innecesariamente arcaico; el añadido «Y» sigue el enlace conjuntivo del griego.
- source_word: παρεμβεβλήκασιν
  english_pob_choice: they have encamped against
  chosen_spanish: han acampado contra
  alternatives_spanish:
  - han sitiado
  - han instalado su campamento frente a
  lexicon: LSJ
  rationale: El verbo expresa disposición militar de campamento en posición hostil. «Han acampado contra» mantiene la imagen militar sin afirmar con demasiada fuerza un asedio formal si el verbo por sí solo no lo exige.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: LSJ
  rationale: Adverbio temporal directo; «hoy» es la equivalencia natural en español contemporáneo.
- source_word: ἐπὶ τὴν ἄκραν
  english_pob_choice: against the citadel
  chosen_spanish: contra la ciudadela
  alternatives_spanish:
  - contra el Acra
  - frente a la ciudadela
  lexicon: LSJ
  rationale: ἄκρα puede referirse a una ciudadela o fortaleza; en Jerusalén probablemente alude al Acra. En el texto principal se usa «ciudadela» por claridad, mientras que la opción histórica específica se preserva en la nota.
- source_word: τοῦ καταλαβέσθαι αὐτὴν
  english_pob_choice: to capture it
  chosen_spanish: para capturarla
  alternatives_spanish:
  - para tomarla
  - para apoderarse de ella
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. «Capturarla» reproduce la fuerza militar de καταλαμβάνω y corresponde al ajuste más preciso del audit trail inglés.
- source_word: τὸ ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: LSJ
  rationale: ἁγίασμα designa el ámbito sagrado del templo. «Santuario» es la equivalencia más natural y fiel en español para este contexto.
- source_word: τὴν Βεθσούραν
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Beth-zur
  - Betsur
  lexicon: transliteración tradicional/toponímica
  rationale: Se conserva el nombre propio mediante transliteración. «Bet-sur» es una forma clara y breve en español; se evita la forma más anglicada, aunque puede mantenerse como alternativa reconocible.
- source_word: ὠχύρωσαν
  english_pob_choice: they have fortified
  chosen_spanish: han fortificado
  alternatives_spanish:
  - han reforzado
  - han hecho más fuerte
  lexicon: LSJ
  rationale: El verbo significa fortificar o hacer seguro en contexto militar. «Han fortificado» es la equivalencia directa y transparente.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada en su forma revisada final, conservando el registro solemne de «he aquí» y la precisión militar de «capturar». También atiende al valor histórico específico de ἄκρα, preservado como alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Santuario» se usa para ἁγίασμα; no se introduce «templo» para no desplazar el término técnico del griego.
  - Los topónimos se transliteran de manera breve y legible en español.
  - Se preserva la distinción entre el lugar fortificado de Jerusalén y Bet-sur, sin fusionarlos ni explicarlos de más en el texto principal.
