translation:
  language: es
  text: Pul, rey de Asiria, vino contra la tierra[a], y Menahem dio a Pul mil talentos de plata para que su mano estuviera con él[b] para fortalecer el reino en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra el país». «La tierra» probablemente se refiere a la tierra de Israel.'
    reason: cultural_note
  - marker: b
    text: 'O, de manera más idiomática: «para que lo apoyara en fortalecer el reino bajo su control». El hebreo dice literalmente: «para que su mano estuviera con él para fortalecer el reino en su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino sobre
  lexicon: HALOT
  rationale: En narrativa histórica, בוא expresa movimiento/arribo; «vino» mantiene naturalidad en español y refleja bien el avance del rey asirio.
- source_word: פ֤וּל
  english_pob_choice: Pul
  chosen_spanish: Pul
  alternatives_spanish:
  - Pul
  lexicon: Nombre propio
  rationale: Es un nombre propio, por lo que se translitera sin traducir.
- source_word: מֶֽלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: El constructo se vierte de forma directa como «rey de Asiria», preservando el oficio y la procedencia política.
- source_word: עַל הָאָרֶץ
  english_pob_choice: against the land
  chosen_spanish: contra la tierra
  alternatives_spanish:
  - contra el país
  - contra la tierra de Israel
  lexicon: HALOT
  rationale: Con עַל en contexto militar, el sentido es hostil; «contra la tierra» conserva la concisión del hebreo. No se explicita «de Israel» en el texto principal porque eso ya es inferencia contextual, no parte del enunciado.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - pagó
  - entregó
  lexicon: HALOT
  rationale: נתן en sentido básico es «dar». Aunque el contexto es tributo, «dio» conserva la forma léxica y deja que el contexto político haga el resto.
- source_word: אֶלֶף כִּכַּר כָּסֶף
  english_pob_choice: a thousand talents of silver
  chosen_spanish: mil talentos de plata
  alternatives_spanish:
  - mil talantos de plata
  - mil talentos de dinero
  lexicon: HALOT
  rationale: «Talentos» es el equivalente convencional de כִּכָּר en pesos/valor monetario; «plata» traduce fielmente כָּסֶף.
- source_word: לִהְיֹות יָדָיו אִתּוֹ
  english_pob_choice: so that his hand might be with him
  chosen_spanish: para que su mano estuviera con él
  alternatives_spanish:
  - a fin de que su mano estuviera con él
  - para apoyarlo
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la mano con él, porque el audit trail inglés ya preserva esa tensión literal/idiomática y el infinitivo siguiente la aclara sin necesidad de parafrasear.
- source_word: לְהַחֲזִיק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para sostener
  - para afirmar
  lexicon: HALOT
  rationale: El hiphil de חזק aquí expresa hacer firme/fortalecer. «Fortalecer» es claro en español y mantiene la idea de consolidación política.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino
  - la monarquía
  lexicon: HALOT
  rationale: «Reino» es la forma más directa y natural en español para ממלכה en este contexto histórico.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - bajo su control
  - en su poder
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «en su mano» para mantener la textura del original y la relación con la cláusula anterior.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última pasada; se mantuvo la estrategia de equivalencia óptima con preservación de imágenes idiomáticas y sin explicitar en el cuerpo principal la identificación contextual de «la tierra» con Israel.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - 'Se mantuvo la terminología política consistente: «rey», «reino», «mano» como hebraísmo controlado.'
  - No se introdujo «Cristo», «SEÑOR» ni otras sustituciones no respaldadas por el texto fuente.
