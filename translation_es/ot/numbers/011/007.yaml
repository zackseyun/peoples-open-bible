translation:
  language: es
  text: Ahora bien, el maná era como semilla de cilantro, y su apariencia era como la apariencia del bdélio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El bdélio es una resina o goma aromática; la identificación exacta del término hebreo es incierta, y algunos lo entienden como una sustancia semejante a una gema, como perla o cristal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמָּן
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - el maná
  lexicon: HALOT
  rationale: 'El sustantivo definido designa el alimento conocido del desierto. En español, el artículo natural es adecuado: «el maná».'
- source_word: כִּזְרַע גַּד
  english_pob_choice: like coriander seed
  chosen_spanish: como semilla de cilantro
  alternatives_spanish:
  - como semilla de coriandro
  - como semilla de gad
  lexicon: HALOT
  rationale: La partícula comparativa כִּ pide una comparación directa. Se vierte גַּד con el nombre de la planta identificable en español, «cilantro», para mantener claridad y concreción sin transliterar innecesariamente.
- source_word: וְעֵינוֹ
  english_pob_choice: and its appearance
  chosen_spanish: y su apariencia
  alternatives_spanish:
  - y su aspecto
  - y su mirada
  lexicon: HALOT
  rationale: עַיִן literalmente es «ojo», pero aquí el uso idiomático se refiere a la apariencia visible. «Apariencia» comunica con naturalidad el sentido del hebreo.
- source_word: כְּעֵין
  english_pob_choice: was like the appearance of
  chosen_spanish: como la apariencia de
  alternatives_spanish:
  - como el aspecto de
  - como la mirada de
  lexicon: HALOT
  rationale: Se conserva el paralelismo idiomático del hebreo repitiendo «apariencia», en lugar de reducirlo a un simple «como», para reflejar mejor la estructura visual del original.
- source_word: הַבְּדֹלַח
  english_pob_choice: bdellium
  chosen_spanish: el bedelio
  alternatives_spanish:
  - el bdelio
  - la resina aromática
  - la perla
  lexicon: HALOT
  rationale: Se mantiene el equivalente léxico tradicional «bedelio» para respetar la referencia concreta del término hebreo. Como su identificación exacta es incierta, se conserva el nombre transliterado tradicional en vez de sustituirlo por una explicación interpretativa en el texto principal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés de la POB: mantiene la comparación doble con עַיִן («apariencia») y conserva la incertidumbre léxica de בְּדֹלַח mediante una nota, sin reemplazar el término por una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se usa «maná» con artículo definido por tratarse de un referente conocido y específico.
  - Se eligió «cilantro» como equivalente más natural en español para גַּד, en línea con la identificación botánica asumida en la POB inglesa.
  - Se preserva «bedelio» como forma principal, porque el pasaje nombra un objeto cuya identificación exacta no es segura.
