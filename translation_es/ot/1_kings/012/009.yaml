translation:
  language: es
  text: 'Y les dijo: «¿Qué consejo dan ustedes, para que respondamos[a] a este pueblo, que me han hablado, diciendo[b]: “Aligera el yugo que tu padre puso sobre nosotros”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «devolvamos una respuesta», por el modismo hebreo «responder una palabra».'
    reason: lexical_alternative
  - marker: b
    text: «Yugo» conserva la metáfora de la carga y las obligaciones impuestas por el rey.
    reason: cultural_note
lexical_decisions:
- source_word: מָה אַתֶּם נוֹעָצִים
  english_pob_choice: What do you advise
  chosen_spanish: ¿Qué consejo dan ustedes?
  alternatives_spanish:
  - ¿Qué están aconsejando ustedes?
  - ¿Qué consejo me dan?
  lexicon: HALOT
  rationale: La forma participial pide consejo actual o en curso. «Qué consejo dan ustedes» conserva el sentido directivo y suena natural en español moderno sin diluir la apelación a la prudencia de los consejeros.
- source_word: וְנָשִׁיב דָּבָר
  english_pob_choice: that we may answer
  chosen_spanish: para que respondamos
  alternatives_spanish:
  - y podamos responder
  - para que devolvamos una respuesta
  lexicon: HALOT
  rationale: La construcción con שוב y דָּבָר funciona idiomáticamente como «responder/contestar». «Para que respondamos» mantiene la finalidad del hebreo sin volverla rígidamente literal.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo este
  lexicon: HALOT
  rationale: «Pueblo» preserva el singular colectivo y el tono algo distante del demostrativo hebreo. En español, el orden con «a este pueblo» fluye mejor que una calca del original.
- source_word: אֲשֶׁר דִּבְּרוּ אֵלַי לֵאמֹר
  english_pob_choice: who have spoken to me, saying
  chosen_spanish: que me ha hablado, diciendo
  alternatives_spanish:
  - que me habló, diciendo
  - que me han hablado, diciendo
  lexicon: HALOT
  rationale: El hebreo presenta al pueblo como colectivo singular en el discurso. En español, «me ha hablado» conserva esa cohesión colectiva y la cláusula de cita sin sobrecargar el verso.
- source_word: הָקֵל
  english_pob_choice: Lighten
  chosen_spanish: Aligera
  alternatives_spanish:
  - Haz más ligero
  - Atenúa
  lexicon: HALOT
  rationale: «Aligera» reproduce bien la idea de reducir la carga y mantiene la imagen concreta del original.
- source_word: מִן הָעֹל
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la carga
  - el yugo pesado
  lexicon: HALOT
  rationale: Se conserva la metáfora de «yugo», que en el contexto no es solo carga física sino dominación y obligación impuesta.
- source_word: אֲשֶׁר נָתַן אָבִיךָ עָלֵינוּ
  english_pob_choice: that your father put on us
  chosen_spanish: que tu padre puso sobre nosotros
  alternatives_spanish:
  - que tu padre impuso sobre nosotros
  - que tu padre echó sobre nosotros
  lexicon: HALOT
  rationale: «Puso sobre nosotros» refleja de manera directa la construcción נתן על y conserva la imagen concreta de una carga colocada encima del pueblo. «Impuso» sería más interpretativo.
theological_decisions:
- issue: La metáfora del yugo como opresión política y laboral
  english_pob_reading: '''Yoke'' is a metaphor for the heavy labor and obligations imposed by the king.'
  chosen_spanish_reading: «Yugo» se mantiene como metáfora de carga, dominación y obligaciones impuestas por el rey.
  alternative_spanish_readings:
  - «Carga» como equivalente más general
  - «Opresión» como interpretación del efecto
  rationale: El original usa un objeto concreto para expresar el peso del gobierno. Mantener «yugo» preserva la fuerza imagística y evita aplanar la metáfora antes de tiempo.
  doctrine_reference: Sabiduría bíblica sobre gobierno, carga y opresión; cf. 1 Ki 12:4 y 12:11
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se prefirió la formulación natural «that we may answer» frente a «so that we may answer», sin cambiar el contenido. La traducción española refleja ese mismo ajuste de naturalidad y conserva la metáfora del yugo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservó el singular colectivo «pueblo» para הָעָם, coherente con el auditable inglés POB.
  - Se evitó «siervo» u otro lenguaje eclesiástico no pertinente; el versículo trata de consejo político y carga fiscal/laboral.
