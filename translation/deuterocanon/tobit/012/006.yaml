theological_decisions:
- issue: Rendering God-directed εὐλογεῖτε
  chosen_reading: Bless God
  alternative_readings:
  - Praise God
  rationale: The source uses the blessing idiom rather than a generic praise verb. Retaining 'bless' preserves biblical-theological diction and avoids unnecessary interpretive smoothing.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Sense of ἐξομολογεῖσθε in this context
  chosen_reading: give thanks
  alternative_readings:
  - confess
  - praise
  rationale: Although the verb can involve confession or acknowledgment, here the context is public gratitude for God's deeds. 'Give thanks' best reflects the theological thrust of testimony and praise.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
