translation:
  language: es
  text: ¡Levántate, Yahvé! No permitas que el hombre[a] prevalezca; que las naciones sean juzgadas delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mortal»; el hebreo אֱנוֹשׁ suele resaltar la fragilidad o mortalidad humanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Alzate!
  - ¡Despierta!
  - ¡Levántate, pues!
  lexicon: HALOT
  rationale: El imperativo dirigido a Dios pide intervención activa. «Levántate» es natural en español y conserva el tono súplice y poético del hebreo sin volverlo arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la norma del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: no permitas que
  alternatives_spanish:
  - no dejes que
  - 'no'
  lexicon: HALOT
  rationale: 'La partícula con matiz de prohibición/jussivo se expresa con una construcción natural en español que preserva la súplica: no autorizar que ocurra la acción.'
- source_word: יָעֹז
  english_pob_choice: prevail
  chosen_spanish: prevalezca
  alternatives_spanish:
  - sea fuerte
  - triunfe
  - se imponga
  lexicon: HALOT
  rationale: El verbo comunica fuerza/ predominio en contexto de conflicto. «Prevalezca» transmite la idea de vencer o imponerse sin perder la base semántica de fuerza.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - el ser humano
  - el hombre mortal
  lexicon: HALOT
  rationale: Se conserva el singular representativo y la contraposición con Yahvé. «El hombre» sigue la decisión inglesa; la noción de fragilidad/mortalidad queda disponible en nota, porque el término hebreo puede resaltarla.
- source_word: יִשָּׁפְטוּ
  english_pob_choice: let ... be judged
  chosen_spanish: sean juzgadas
  alternatives_spanish:
  - sean llevadas a juicio
  - queden bajo juicio
  - se les haga justicia
  lexicon: HALOT
  rationale: El nifal expresa aquí la recepción de juicio. «Sean juzgadas» es breve, fiel y claramente pasivo, acorde con la escena judicial divina.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: Es la equivalencia más natural y estable en los Salmos para colectivos no israelitas, sin introducir una connotación eclesiástica ajena.
- source_word: עַל פָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con una fórmula española clara que mantiene la idea de comparecer en presencia de Dios para juicio.
theological_decisions:
- issue: Matiz antropológico de אֱנוֹשׁ
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el mortal
  - el hombre mortal
  rationale: Se mantiene el paralelismo y la fuerza representativa del singular. La posible resonancia de fragilidad humana no se pierde, pero tampoco se sobrecarga el verso con una expansión interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La elección preserva el nombre personal de Dios revelado a Israel, conforme a la política del proyecto, sin reemplazarlo por una sustitución litúrgica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2 (Divine name transparency)
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del paquete fuente, y armoniza con la revisión inglesa más reciente, que no requirió cambios. Se ha mantenido la tensión semántica de אֱנוֹשׁ sin diluirla, y se ha conservado el nombre divino Yahvé conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, no una sustitución reverencial.
  - Se mantiene el paralelismo breve de petición, prohibición y juicio.
  - «Las naciones» conserva el referente colectivo plural del hebreo.
  - La puntuación sigue el español actual con vocativo y punto y coma para claridad poética.
