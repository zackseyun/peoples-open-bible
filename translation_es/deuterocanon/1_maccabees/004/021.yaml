translation:
  language: es
  text: Pero cuando vieron estas cosas, se aterrorizaron mucho; y cuando también vieron el campamento de Judas en la llanura, preparado para la batalla[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preparado para el despliegue de combate» o «preparado para el orden de batalla»; el término griego indica de manera específica una formación militar desplegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδόντες
  english_pob_choice: when they saw
  chosen_spanish: cuando vieron
  alternatives_spanish:
  - cuando percibieron
  - cuando se dieron cuenta de
  lexicon: LSJ
  rationale: El participio aquí funciona temporalmente y en narrativa militar. «Cuando vieron» es natural en español y conserva la observación directa sin cargar indebidamente el verbo con una explicación mental más fuerte que el contexto exige.
- source_word: ἐδειλώθησαν σφόδρα
  english_pob_choice: they were greatly terrified
  chosen_spanish: se aterrorizaron mucho
  alternatives_spanish:
  - fueron presa de gran temor
  - se acobardaron muchísimo
  lexicon: LSJ
  rationale: El verbo expresa perder ánimo o volverse temerosos. «Se aterrorizaron mucho» transmite la intensidad y el efecto de desaliento bélico sin convertirlo en una mera debilidad moral.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en extremo
  lexicon: LSJ
  rationale: Adverbio de intensidad. «Mucho» es idiomático en español contemporáneo y suficiente para conservar el énfasis del griego.
- source_word: παρεμβολή
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campa
  lexicon: LSJ
  rationale: En contexto militar, el término designa el lugar o instalación de tropas. «Campamento» mantiene el sentido militar de forma clara y natural en español.
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el llano
  - en el campo
  lexicon: LSJ
  rationale: πεδίον se refiere a una extensión llana o llanura. «Llanura» refleja mejor el matiz topográfico que «campo», que en español puede sonar demasiado general.
- source_word: ἑτοίμην
  english_pob_choice: ready
  chosen_spanish: listo
  alternatives_spanish:
  - preparado
  - dispuesto
  lexicon: LSJ
  rationale: El adjetivo indica preparación inmediata. «Listo» es breve y comprensible en español, aunque «preparado» también sería viable; se conserva el sentido de disposición para la acción.
- source_word: εἰς παράταξιν
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - en formación de combate
  - para el despliegue
  - para el orden de batalla
  lexicon: LSJ
  rationale: παράταξις es un término militar para el orden desplegado de combate. «Para la batalla» comunica bien la finalidad militar; en nota se preserva la alternativa más técnica de la formación desplegada.
theological_decisions:
- issue: Tono militar de ἐδειλώθησαν
  english_pob_reading: they were greatly terrified
  chosen_spanish_reading: se aterrorizaron mucho
  alternative_spanish_readings:
  - se acobardaron muchísimo
  - fueron presa de gran temor
  rationale: 'No hay aquí una doctrina en disputa, pero sí una tensión lexical: el verbo puede sugerir cobardía o miedo intenso. Se eligió una forma que preserve el impacto narrativo y militar sin moralizar más de lo que el texto dice.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto con la revisión más reciente del expediente inglés; no se registran cambios de sustancia. La redacción española sigue de cerca el valor narrativo y militar del griego, manteniendo la ambigüedad útil de παράταξις mediante una nota léxica.
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo del griego: reacción al ver las cosas, luego al ver el campamento en la llanura.'
  - Se evita el calco rígido «fueron cobardizados» por ser poco natural en español; el verbo reflexivo comunica mejor el cambio de estado.
  - «Llanura» se prefiere a «campo» para no diluir el rasgo geográfico de πεδίον.
  - La nota mantiene la tensión entre traducción idiomática y precisión militar de παράταξις.
