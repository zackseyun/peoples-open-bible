translation:
  language: es
  text: Y al tiempo de ponerse el sol, Josué mandó, y los bajaron de los árboles y los arrojaron en la cueva donde se habían escondido, y pusieron grandes piedras sobre la entrada de la cueva hasta este mismo día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְעֵת בּוֹא הַשֶּׁמֶשׁ
  english_pob_choice: at the time of the sun’s going down
  chosen_spanish: al tiempo de ponerse el sol
  alternatives_spanish:
  - al atardecer
  - cuando el sol se estaba poniendo
  lexicon: HALOT
  rationale: Conserva la imagen temporal hebrea sin volverla rígida. 'Al tiempo de ponerse el sol' refleja con fidelidad el giro idiomático y mantiene el tono narrativo.
- source_word: צִוָּה יְהוֹשֻׁעַ
  english_pob_choice: Joshua commanded
  chosen_spanish: Josué mandó
  alternatives_spanish:
  - Josué ordenó
  - Josué dio la orden
  lexicon: HALOT
  rationale: El verbo expresa dar una orden. 'Mandó' es natural en español bíblico contemporáneo y conserva la fuerza directiva sin sonar artificial.
- source_word: וַיֹּרִידוּם
  english_pob_choice: they took them down
  chosen_spanish: los bajaron
  alternatives_spanish:
  - los descendieron
  - los hicieron bajar
  lexicon: HALOT
  rationale: El sentido es retirar los cuerpos de su lugar elevado. 'Los bajaron' transmite el movimiento descendente de forma clara y natural.
- source_word: מֵעַל הָעֵצִים
  english_pob_choice: from the trees
  chosen_spanish: de encima de los árboles
  alternatives_spanish:
  - de los árboles
  - de sobre los árboles
  lexicon: HALOT
  rationale: '''מֵעַל'' tiene la fuerza de ''de sobre/encima de''. ''De encima de los árboles'' preserva esa relación espacial mejor que un simple ''de los árboles''.'
- source_word: וַיַּשְׁלִכֻם
  english_pob_choice: threw them
  chosen_spanish: los echaron
  alternatives_spanish:
  - los arrojaron
  - los lanzaron
  lexicon: HALOT
  rationale: El verbo implica arrojar con movimiento decidido. 'Echaron' es suficientemente fuerte y fluido en español narrativo; 'arrojaron' sería más literal pero algo más pesado.
- source_word: הַמְּעָרָה
  english_pob_choice: the cave
  chosen_spanish: la cueva
  alternatives_spanish:
  - la gruta
  - la caverna
  lexicon: HALOT
  rationale: En contexto narrativo, 'cueva' es la equivalencia más natural y precisa en español para מְעָרָה.
- source_word: אֲשֶׁר נֶחְבְּאוּ שָׁם
  english_pob_choice: where they had hidden
  chosen_spanish: donde se habían escondido
  alternatives_spanish:
  - en donde se habían escondido
  - donde se habían ocultado
  lexicon: HALOT
  rationale: El hebreo indica que el lugar es la cueva en la que se ocultaron. 'Se habían escondido' reproduce bien el sentido reflexivo y la anterioridad; el 'allí' explícito del hebreo no se conserva porque en español resultaría redundante y el audit trail inglés ya lo trató como una nota de énfasis, no como exigencia del cuerpo principal.
- source_word: וַיָּשִׂמוּ אֲבָנִים גְּדֹלוֹת
  english_pob_choice: they placed large stones
  chosen_spanish: pusieron grandes piedras
  alternatives_spanish:
  - colocaron grandes piedras
  - pusieron piedras grandes
  lexicon: HALOT
  rationale: '''Pusieron'' y ''grandes piedras'' comunican de modo directo la acción de sellar la cueva con piedras voluminosas. No se necesita elevar el registro con ''grandes''/''macizas'' más allá del hebreo.'
- source_word: עַל פִּי הַמְּעָרָה
  english_pob_choice: over the mouth of the cave
  chosen_spanish: sobre la entrada de la cueva
  alternatives_spanish:
  - sobre la boca de la cueva
  - sobre el acceso de la cueva
  lexicon: HALOT
  rationale: '''פִּי'' es literalmente ''boca'', pero en español ''la entrada'' comunica la imagen sin forzar una metáfora que puede sonar menos natural. Mantiene la función de cierre y el sentido topográfico.'
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: to this very day
  chosen_spanish: hasta este mismo día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy mismo
  lexicon: HALOT
  rationale: Equivale al hebraísmo de duración persistente desde la perspectiva del narrador. 'Este mismo día' preserva el énfasis de 'עֶצֶם' y suena solemne en español.
translation_notes:
  revision_awareness: 'La redacción sigue el flujo revisado del POB inglés: mantiene la secuencia narrativa continua con ''y'', evita añadir un sujeto implícito al cierre y no expande el hebraísmo ''allí'' en el cuerpo principal porque el énfasis ya queda contenido en el verbo reflexivo y el contexto inmediato.'
  spanish_consistency_notes:
  - Se usa 'Josué' para el nombre propio conforme al texto fuente.
  - Se mantiene 'cueva' para מְעָרָה en coherencia narrativa.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
