translation:
  language: es
  text: Y Abisai, hermano de Joab, fue jefe de los Tres[a]. Blandió su lanza[b] contra trescientos caídos[c], y tuvo nombre[d] entre los Tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los Tres». En el pasaje paralelo (2 Samuel 23:18), algunas versiones traducen el grupo de modo distinto por dificultades textuales y contextuales relacionadas con «tres» y «treinta».'
    reason: textual_variant
  - marker: b
    text: 'O: «levantó su lanza»; o: «manejó su lanza».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo se refiere literalmente a «trescientos caídos» o «trescientos muertos».
    reason: lexical_alternative
  - marker: d
    text: El hebreo dice literalmente «tuvo nombre», es decir, «era renombrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - líder
  lexicon: HALOT
  rationale: En este contexto militar, רֹאשׁ expresa rango o mando, no la parte del cuerpo. 'Jefe' comunica la función de liderazgo de Abisai de manera natural en español.
- source_word: הַשְּׁלוֹשָׁה / בַּשְּׁלוֹשָׁה
  english_pob_choice: the Three / among the Three
  chosen_spanish: los Tres / entre los Tres
  alternatives_spanish:
  - los treinta
  - los tres guerreros
  lexicon: HALOT
  rationale: El hebreo apunta literalmente a 'los Tres'. Se conserva esa forma para respetar la redacción del texto base y la tensión textual que existe en pasajes paralelos.
- source_word: עוֹרֵר אֶת־חֲנִיתוֹ
  english_pob_choice: brandished his spear
  chosen_spanish: blandió su lanza
  alternatives_spanish:
  - levantó su lanza
  - manejó su lanza
  lexicon: HALOT
  rationale: El verbo hebreo sugiere una acción viva de agitar o empuñar con fuerza. 'Blandió' mantiene el sentido militar y suena natural en español, y 'lanza' es el equivalente habitual de חֲנִית.
- source_word: עַל שְׁלֹשׁ מֵאוֹת חָלָל
  english_pob_choice: against three hundred slain
  chosen_spanish: contra trescientos caídos
  alternatives_spanish:
  - sobre trescientos muertos
  - contra trescientos heridos de muerte
  lexicon: HALOT
  rationale: חָלָל designa a alguien caído o muerto en combate. 'Caídos' preserva la imagen de los muertos en batalla sin forzar una paráfrasis más explicativa que el hebreo.
- source_word: שֵׁם
  english_pob_choice: had a name
  chosen_spanish: tuvo nombre
  alternatives_spanish:
  - era reconocido
  - gozó de renombre
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo 'tener nombre', porque el POB inglés también lo retiene. En español, 'tuvo nombre' mantiene esa literalidad inteligible y deja oír la idea de renombre.
- source_word: אַבְשַׁי
  english_pob_choice: Abishai
  chosen_spanish: Abisai
  alternatives_spanish:
  - Abisái
  lexicon: convención onomástica
  rationale: Se sigue la transliteración española común del nombre propio.
- source_word: אֲחִי יוֹאָב
  english_pob_choice: the brother of Joab
  chosen_spanish: hermano de Joab
  alternatives_spanish:
  - el hermano de Joab
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve más natural en español con 'hermano de Joab', manteniendo fielmente la relación familiar.
theological_decisions:
- issue: Expresión idiomática de reputación
  english_pob_reading: had a name among the Three
  chosen_spanish_reading: tuvo nombre entre los Tres
  alternative_spanish_readings:
  - fue renombrado entre los Tres
  - gozó de renombre entre los Tres
  rationale: No se sustituye el hebraísmo por una explicación interpretativa en el texto principal. La frase deja ver la expresión original y su valor de fama o prestigio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético de 1 Crónicas 11:20 y conserva las mismas decisiones principales del POB inglés: ''los Tres'', la imagen idiomática de ''tener nombre'' y el matiz militar de ''brandished his spear''. No se introdujeron armonizaciones con pasajes paralelos en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - '''Tres'' se capitaliza para reflejar el nombre/grupo técnico del contexto heroico.'
  - '''Lanza'' se eligió como equivalente natural de חֲנִית en contexto bélico.'
