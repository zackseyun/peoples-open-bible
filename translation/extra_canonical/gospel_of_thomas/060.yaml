translation:
  text: '⟨They saw⟩ a Samaritan carrying a lamb[⟨They saw⟩], going into Judea. He
    said to his disciples, "That one around the lamb?"

    They said to him, "So that he may kill it and eat it."

    He said to them, "As long as it is alive, he will not eat it, but if he kills
    it and it becomes a corpse."

    They said, "Otherwise he will not be able to do it."

    He said to them, "You yourselves, seek a place for yourselves in rest[and they
    eat you][That one around the lamb?], so that you will not become a corpse and
    they eat you."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:57:45Z'
  footnotes:
  - marker: ⟨They saw⟩
    text: The manuscript lacks a main verb here, reading literally 'to a Samaritan.'
      Editors supply 'They saw' (ⲁⲩⲛⲁⲩ) to complete the sense.
    reason: textual_variant
  - marker: That one around the lamb?
    text: The Coptic is elliptical, literally 'That one around the lamb?' The disciples'
      response ('So that he may kill it...') indicates they understood it as a question
      about the man's intentions.
    reason: lexical_alternative
  - marker: and they eat you
    text: The Coptic uses an active third-person plural ('and they eat you'), which
      functions similarly to an English passive ('and you be eaten') but is more vivid.
    reason: register_note
lexical_decisions:
- source_word: ⲡⲏ
  chosen: That one
  rationale: The demonstrative pronoun 'that one' (masculine singular). The phrase
    is highly elliptical, literally asking 'That one around the lamb?'
  lexicon: Crum 254a
  alternatives:
  - Why is that person
  - That person
- source_word: ⲕⲱⲧⲉ
  chosen: around
  rationale: The compound preposition ⲙ ⲡⲕⲱⲧⲉ ⲛ- means 'around' or 'about'.
  lexicon: Crum 120b
  alternatives:
  - carrying around
- source_word: ⲡⲧⲱⲙⲁ
  chosen: corpse
  rationale: Greek loanword πτῶμα, meaning a fallen body or corpse.
  lexicon: BDAG 893
  alternatives:
  - carcass
  - dead body
- source_word: ϣⲁ
  chosen: be able
  rationale: The verb ϣⲁ means 'to be able' or 'to prevail'. Here it takes the feminine
    object pronoun ⲥ ('it'), referring to the general action of eating the lamb.
  lexicon: Crum 551a
  alternatives:
  - prevail
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  rationale: Greek loanword ἀνάπαυσις, a key theological term in Thomas denoting the
    ultimate spiritual state or destination.
  lexicon: BDAG 73
  alternatives:
  - repose
theological_decisions:
- issue: Handling of the elliptical question 'That one around the lamb?'
  chosen_reading: That one around the lamb?
  rationale: Rather than smoothing the text into a clear 'Why is that person carrying
    the lamb around?', the translation preserves the literal Coptic. This maintains
    the riddling, conversational tone of the exchange.
  alternatives_noted:
  - Why is that person carrying the lamb around?
drafter_notes: The translation preserves the elliptical and slightly disjointed nature
  of the dialogue, particularly Jesus's opening question and the hanging conditional
  clause ('but if he kills it...'). The active voice in the final warning ('and they
  eat you') is retained for its stark, visceral impact, characteristic of Thomasine
  diction.
