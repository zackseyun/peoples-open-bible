translation:
  language: es
  text: 'Y David dijo: «Vive Yahvé, que ciertamente Yahvé lo herirá[a], o le llegará su día para morir[b], o descenderá al combate y perecerá[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Yahvé lo herirá de muerte».
    reason: lexical_alternative
  - marker: b
    text: O, «le llegará su tiempo y morirá».
    reason: alternative_reading
  - marker: c
    text: O, «descenderá al combate y será barrido».
    reason: alternative_reading
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Vive Yahvé, en verdad
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne. En español, «Vive Yahvé» preserva la estructura breve e idiomática del juramento sin introducir una paráfrasis innecesaria. Mantiene el nombre divino revelado en el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, según la convención editorial del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma establecida en español para el Tetragrámaton.
- source_word: כִּי אִם
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - de veras
  lexicon: HALOT
  rationale: En este contexto de juramento, la expresión introduce el contenido enfático de la afirmación. «Ciertamente» reproduce bien esa fuerza asseverativa en español.
- source_word: יִגָּפֶנּוּ
  english_pob_choice: will strike him
  chosen_spanish: lo herirá
  alternatives_spanish:
  - lo golpeará
  - lo abatirá
  - lo herirá de un golpe
  lexicon: HALOT
  rationale: El verbo נָגַף transmite un golpe decisivo o un acto de herir/abatir. «Lo herirá» es natural en español y conserva la fuerza del juicio divino sin especificar más de lo que el hebreo dice.
- source_word: יוֹמוֹ יָבוֹא
  english_pob_choice: his day will come
  chosen_spanish: le llegará su día
  alternatives_spanish:
  - vendrá su día
  - su día llegará
  lexicon: HALOT
  rationale: La imagen idiomática del hebreo se expresa de manera natural en español con «le llegará su día», que conserva la idea del tiempo señalado para la muerte o el juicio.
- source_word: וָמֵת
  english_pob_choice: and he will die
  chosen_spanish: para morir
  alternatives_spanish:
  - y morirá
  - y llegue a morir
  lexicon: HALOT
  rationale: Tras «le llegará su día», el hebreo vincula el resultado con una forma breve. «Para morir» conserva la relación sintáctica y evita redundancia innecesaria en español.
- source_word: בַמִּלְחָמָה יֵרֵד
  english_pob_choice: he will go down into battle
  chosen_spanish: descenderá a la batalla
  alternatives_spanish:
  - bajará a la batalla
  - descenderá al combate
  - irá a la batalla
  lexicon: HALOT
  rationale: Se conserva el verbo de descenso presente en el hebreo. «A la batalla» mantiene el matiz militar sin forzar una localización más específica que la del original.
- source_word: וְנִסְפָּה
  english_pob_choice: and perish
  chosen_spanish: y perecerá
  alternatives_spanish:
  - y será destruido
  - y será arrebatado
  - y perecerá por completo
  lexicon: HALOT
  rationale: El verbo סָפָה expresa perecer, ser consumido o barrido. «Perecerá» mantiene esa tensión léxica distinta de «morir» y respeta la amplitud del término.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura editorial del POB es traducir el Tetragrámaton por el nombre propio divino. En español, «Yahvé» preserva esa decisión y evita la sustitución por un título eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó «his day will come and he will die» a «his day will come to die» para acercarse más al hebreo. La presente redacción española refleja ese ajuste con «le llegará su día para morir», manteniendo la naturalidad y la relación sintáctica del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se evitó «Cristo», «SEÑOR» y otros sustitutos no apoyados por el texto fuente.
  - Se preservó la distinción entre «morir» (מוּת) y «perecer» (סָפָה).
  - La puntuación con comillas angulares es adecuada para español bíblico editorial.
