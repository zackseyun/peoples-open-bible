translation:
  language: es
  text: 'Nuestros padres comieron el maná[a] en el desierto[b], tal como está escrito: «Les dio pan del cielo para comer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «en la región desierta».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: Our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: πατέρες conserva el sentido literal de “padres” y, en el marco de la apelación al éxodo, alude a los antepasados de Israel. En español, “nuestros padres” mantiene la forma idiomática y la cercanía al original; “nuestros antepasados” es posible, pero suaviza la forma masculina concreta del griego.
- source_word: τὸ μάννα
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - el maná del desierto
  lexicon: BDAG
  rationale: μάννα es el término establecido para el alimento del éxodo. En español, “maná” es la forma natural y reconocible; el artículo se conserva porque se trata de la provisión específica conocida por la audiencia bíblica.
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - lo comieron
  lexicon: BDAG
  rationale: El aoristo de ἐσθίω se expresa de manera directa con “comieron”. Es una forma natural en español y evita añadir explicaciones no presentes en el texto.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la soledad
  lexicon: BDAG
  rationale: ἔρημος puede significar “desierto” o “desierto/wilderness” según el contexto. Aquí el referente del éxodo permite “desierto” como equivalente claro y bíblicamente comprensible en español; “wilderness” en español sería menos idiomático.
- source_word: καθώς ἐστιν γεγραμμένον
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  lexicon: BDAG
  rationale: La fórmula citacional se reproduce con una expresión natural en español que conserva el valor comparativo de καθώς y el estado resultativo de γεγραμμένον como testimonio escrito vigente.
- source_word: Ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - pan de comida
  lexicon: BDAG
  rationale: ἄρτος normalmente significa “pan”. En la cita, el término funciona de manera genérica para la provisión divina; “pan” es la equivalencia más fiel y reconocible en español.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  lexicon: BDAG
  rationale: ἐκ se vierte naturalmente como “de / del” en esta construcción. En español bíblico, “del cielo” preserva el giro tradicional y la referencia a origen divino sin volverlo explicativo de más.
- source_word: ἔδωκεν αὐτοῖς φαγεῖν
  english_pob_choice: He gave them ... to eat
  chosen_spanish: les dio ... para comer
  alternatives_spanish:
  - les dio ... que comieran
  lexicon: BDAG
  rationale: La construcción con δίδωμι + dativo + infinitivo se refleja con “les dio ... para comer”, que conserva el sentido de propósito y la estructura de la cita sin forzar un giro más paraprástico.
theological_decisions:
- issue: La cita del maná debe mantenerse como afirmación histórica y escrituraria, sin anticipar la interpretación cristológica posterior del discurso
  english_pob_reading: Translate the statement as a historical/scriptural claim about God giving bread from heaven, without capitalizing or expanding it to imply the fuller christological meaning developed later in the discourse.
  chosen_spanish_reading: Traducir la frase como afirmación histórica y escrituraria sobre el pan dado por Dios, sin introducir aquí una lectura cristológica desarrollada ni capitalizaciones interpretativas.
  alternative_spanish_readings:
  - “Pan del cielo” con mayúsculas o formulación anticipatoria de Cristo
  - “Alimento del cielo” con énfasis teológico explícito
  rationale: En el contexto inmediato, los hablantes citan la Escritura acerca del maná del éxodo. La traducción debe preservar su cita y dejar que el desarrollo teológico del Evangelio emerja después, no incrustarse en esta línea.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se mantuvo la solución ya aprobada por el audit trail inglés, con ajustes naturales al español: “nuestros padres”, “maná”, “desierto”, y “tal como está escrito”. No se introdujeron cambios interpretativos ni capitalizaciones teológicas adicionales.'
  spanish_consistency_notes:
  - Se mantiene “maná” como transliteración estable y no se sustituye por un equivalente genérico.
  - “Del cielo” conserva el sentido de origen divino y la naturalidad del español bíblico.
  - “Tal como está escrito” reproduce la fórmula citacional sin añadir matices doctrinales.
  - Las notas a pie preservan las alternativas documentadas en el auditoría inglés y no añaden variantes no sustentadas.
