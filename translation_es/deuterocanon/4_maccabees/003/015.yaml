revisions:
- from: Y aun mientras ardía de sed[a][b], juzgó que sería un peligro[b] sumamente terrible para el alma si la bebida fuera considerada equivalente a sangre.
  to: Y aun mientras ardía de sed, razonó que sería un peligro sumamente terrible[a] para el alma si la bebida fuera considerada equivalente a sangre[b].
