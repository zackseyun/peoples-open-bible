- from: Todo primogénito que abre la matriz[a] me pertenece[b], y todo primogénito macho entre tu ganado[c], sea toro o oveja.
  to: Todo primer nacido de la matriz me pertenece[b],[a] y todo primogénito macho entre tu ganado[c], sea toro o oveja.
  rationale: Se ajusta el texto principal para alinearlo con la elección principal auditada del POB para פֶּטֶר רֶחֶם, dejando la formulación más literal en nota. También se mejora la naturalidad del español sin perder el alcance legal del versículo. Se conservan 'me pertenece', 'ganado' y la especificación de 'macho' por fidelidad al hebreo y a las decisiones léxicas auditadas.
