review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en la mayoría de los puntos: mantiene «Yahvé», expresa la separación punitiva de וְהִבְדִּילוֹ, conserva «de entre todas las tribus de Israel», y refleja correctamente las «maldiciones del pacto» escritas en el libro de la ley. La nota sobre אָלוֹת también preserva adecuadamente la alternativa de «maldiciones juramentadas».'
  spanish_quality_summary: El español es claro y digno, pero «para desastre» suena poco idiomático en español bíblico general. En este contexto, «para calamidad» comunica mejor el sentido de לְרָעָה como juicio ruinoso sin sugerir mal moral ni sonar forzado. El resto de la redacción es natural y bien formada.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé»; בְּרִית → «pacto»; תּוֹרָה → «ley». No hay conflicto con los términos doctrinales centrales. La única mejora recomendada es léxica/estilística en לְרָעָה.'
  issues:
  - severity: medium
    issue: «para desastre» es poco idiomático en español
    rationale: Aunque refleja la elección inglesa «for disaster», en español suena abrupto y menos natural que «para calamidad» o «para ruina». Dado que לְרָעָה aquí indica resultado de juicio, «para calamidad» preserva mejor el sentido y la legibilidad.
  revised_spanish_text: Y Yahvé lo apartará de entre todas las tribus de Israel para calamidad,[a] conforme a todas las maldiciones del pacto escritas en este libro de la ley.
  revised_footnotes:
