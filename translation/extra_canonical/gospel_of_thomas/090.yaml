translation:
  text: Jesus said[a], “Come to me; for my yoke is good, and my lordship is gentle[c][b];
    and you will find rest for yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word is ⲭⲣⲏⲥⲧⲟⲥ (from Greek χρηστός, “good/pleasant/kind”), not ⲭⲣⲓⲥⲧⲟⲥ
      (“Christ”). Hence “good,” not a title.
    reason: lexical_alternative
  - marker: b
    text: Rest renders the Greek loan ⲁⲛⲁⲡⲁⲩⲥⲓⲥ (ἀνάπαυσις). The codex shows minor
      orthographic uncertainty in the upsilon, but the reading is secure.
    reason: lacuna_or_restoration
  - marker: c
    text: 'Compare Matthew 11:28–30, but note Thomas’s different phrasing: “my lordship
      is gentle,” and “for yourselves” rather than “for your souls.”'
    reason: cross_reference
lexical_decisions:
- source_word: ⲉⲓⲛⲧⲱⲧⲛ ϣⲁⲁⲛⲟⲕ
  chosen: Come to me
  alternatives:
  - Come, you all, to me
  - Come toward me
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic
  rationale: ⲉⲓⲛⲧⲱⲧⲛ is 2pl imperative of “come”; ϣⲁⲁⲛⲟⲕ marks the goal “to me.” English
    plural force is left unmarked for idiomaticity.
- source_word: ⲟⲩⲭⲣⲏⲥⲧⲟⲥ
  chosen: good
  alternatives:
  - kind
  - pleasant
  - easy
  - well‑fitting
  - serviceable
  lexicon: Crum, Coptic Dictionary (loanword χρῆστος in Coptic usage)
  rationale: Spelled with eta (χρηστός), meaning “good/pleasant/kind,” not χριστός
    (“anointed/Christ”). “Good” avoids canonical cadence (“easy”) while preserving
    the core sense.
- source_word: ⲛⲁϩⲃ
  chosen: yoke
  alternatives: []
  lexicon: Crum, Coptic Dictionary
  rationale: Standard rendering of the agricultural and metaphorical term.
- source_word: ⲙⲛⲧϫⲟⲉⲓⲥ
  chosen: lordship
  alternatives:
  - mastery
  - dominion
  - rule
  lexicon: Crum, Coptic Dictionary
  rationale: Abstract noun from ϫⲟⲉⲓⲥ (“lord/master”); “lordship” preserves the social
    nuance more than “dominion.”
- source_word: ⲟⲩⲣⲙⲣⲁϣ
  chosen: gentle
  alternatives:
  - mild
  - tender
  - soft
  lexicon: Crum, Coptic Dictionary
  rationale: Predicate nominal “a gentle one”; “gentle” best fits idiomatic English
    for a quality of rule/lordship.
- source_word: ⲛⲧⲱⲧⲛⲛⲁϩⲉ
  chosen: you will find
  alternatives: []
  lexicon: Layton, Coptic Grammar
  rationale: Future construction with 2pl subject + ⲛⲁϩⲉ “to find.”
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  alternatives:
  - repose
  - relief
  lexicon: Crum, Coptic Dictionary (Greek loanword)
  rationale: Common Greek loan (ἀνάπαυσις) in Coptic meaning “rest/repose.” “Rest”
    is the most transparent.
- source_word: ⲛⲁⲛⲧⲱⲧⲛ
  chosen: for yourselves
  alternatives:
  - for you
  - for your own selves
  lexicon: Lambdin, Introduction to Sahidic Coptic
  rationale: Dative of advantage with ⲛⲁ- plus 2pl; explicitly marked in English to
    reflect the reflexive sense.
textual_note: 'Dialect/orthography: The manuscript shows Lycopolitan/Sahidic variation.
  Printed text reads ⲁⲙⲏⲉⲓⲧⲛ̄ ϣⲁⲣⲟⲉⲓ̂, which Dilley normalizes to Sahidic ⲉⲓⲛⲧⲱⲧⲛ
  ϣⲁⲁⲛⲟⲕ (“come to me”). Possessive/gender marking fluctuates in the exemplar: printed
  has ⲧⲁⲙⲛ︤ⲧ︥ϫⲟⲉⲓⲥ … ⲧⲉ, while the normalized text reads ⲡⲁⲙⲛⲧϫⲟⲉⲓⲥ … ⲡⲉ, aligning
  with the masculine possessive used for ⲡⲁⲛⲁϩⲃ. The Greek loan ⲁⲛⲁⲡⲁⲩⲥⲓⲥ is written
  with editorial braces/angles around upsilon in the diplomatic line (ⲁⲩⲁⲛⲁ{ⲩ}ⲡⲁ⟨ⲩ⟩ⲥⲓⲥ),
  but the reading is clear and normalized accordingly. No lacunae affect sense. No
  known POxy Greek fragment overlaps Saying 90.'
