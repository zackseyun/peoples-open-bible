base_translation:
  language: en
  yaml_path: translation/ot/isaiah/057/013.yaml
  text: When you cry out[a], let your gathered idols rescue you! But the wind will carry all of them off; a breath will take them away[c][b]. But whoever takes refuge in me will inherit the land and possess my holy mountain.
  footnotes:
  - marker: a
    text: Or 'your gathered ones,' possibly referring to idols, allies, or other objects of false trust.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wind' and 'breath/vapor' form a poetic pair emphasizing how easily these things vanish.
    reason: cultural_note
  - marker: c
    text: Or 'inherit the earth'; the Hebrew can mean either 'land' or 'earth,' though 'land' fits the Zion context well.
    reason: alternative_reading
