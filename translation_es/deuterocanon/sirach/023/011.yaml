translation:
  language: es
  text: El hombre que jura muchos juramentos se llenará de maldad[a], y el azote no se apartará de su casa. Si peca inadvertidamente, su pecado recae sobre él; y si lo menosprecia, ha pecado doblemente. Y si juró en vano[c], no será justificado[b], porque su casa se llenará de calamidades[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “la azotará un flagelo”; el griego μάστιξ puede denotar un látigo literal o, figuradamente, un azote de castigo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no será absuelto” / “no será declarado justo”. El verbo es forense y aquí expresa vindicación o absolución negada.'
    reason: lexical_alternative
  - marker: c
    text: 'O: “juró falsamente” / “hizo un juramento vacío”. La expresión griega literalmente habla de jurar “por vaciedad”.'
    reason: lexical_alternative
  - marker: d
    text: El término final es difícil; probablemente alude a males o penas impuestas que vendrán sobre la casa.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - La persona
  - Un ser humano
  lexicon: LSJ
  rationale: El griego presenta un singular masculino representativo; en español, "el hombre" conserva esa forma sin perder la referencia genérica del dicho sapiencial.
- source_word: πολύορκος
  english_pob_choice: who swears many oaths
  chosen_spanish: que jura muchos juramentos
  alternatives_spanish:
  - muy jurador
  - dado a muchos juramentos
  - que jura con frecuencia
  lexicon: LSJ
  rationale: La idea es la de una persona caracterizada por jurar repetidamente. En español, la cláusula relativa es más clara y natural que un adjetivo comprimido.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - ilegalidad moral
  - desorden contra la ley
  lexicon: LSJ
  rationale: '"ἀνομία" tiene peso moral y de ruptura con el orden debido; "maldad" comunica esa carga en español con buena fluidez, aunque "iniquidad" sigue siendo una alternativa posible.'
- source_word: μάστιξ
  english_pob_choice: scourge
  chosen_spanish: azote
  alternatives_spanish:
  - látigo
  - escarmiento
  - castigo
  lexicon: LSJ
  rationale: El término puede ser literal o figurado. "Azote" conserva la imagen de golpe/castigo y suena más natural que un calco pesado, sin perder la fuerza punitiva.
- source_word: πλημμελήσῃ
  english_pob_choice: he sins unintentionally
  chosen_spanish: peca inadvertidamente
  alternatives_spanish:
  - yerra sin querer
  - falla por inadvertencia
  - peca sin darse cuenta
  lexicon: LSJ
  rationale: La revisión inglesa entendió aquí un fallo no deliberado. "Peca inadvertidamente" mantiene esa lectura y preserva el contraste con el desprecio deliberado del inciso siguiente.
- source_word: ἁμαρτία αὐτοῦ ἐπʼ αὐτῷ
  english_pob_choice: his sin is upon him
  chosen_spanish: su pecado recae sobre él
  alternatives_spanish:
  - su pecado está sobre él
  - él carga con su pecado
  lexicon: LSJ
  rationale: La imagen concreta de responsabilidad personal se conserva con "recae sobre él", que en español expresa carga o imputación sin suavizar el giro griego.
- source_word: ὑπερίδῃ
  english_pob_choice: he disregards it
  chosen_spanish: lo menosprecia
  alternatives_spanish:
  - lo ignora
  - lo pasa por alto
  - lo desprecia
  lexicon: LSJ
  rationale: El verbo puede implicar mirar por encima o tratar algo como de poco peso. "Lo menosprecia" conserva la idea de restarle importancia, compatible con el aumento de culpa del contexto.
- source_word: ἥμαρτεν δισσῶς
  english_pob_choice: he has sinned doubly
  chosen_spanish: ha pecado doblemente
  alternatives_spanish:
  - ha pecado dos veces
  - ha cometido un doble pecado
  lexicon: LSJ
  rationale: '"Doblemente" reproduce bien el valor adverbial y la idea de culpa acumulada: no solo hubo fallo, sino además desprecio del fallo.'
- source_word: διὰ κενῆς ὤμοσεν
  english_pob_choice: he swore in vain
  chosen_spanish: juró en vano
  alternatives_spanish:
  - juró falsamente
  - hizo un juramento vacío
  - juró por nada
  lexicon: LSJ
  rationale: '"En vano" es la forma más idiomática en español y conserva la noción de un juramento vacío o sin base, sin restringirlo necesariamente a perjurio.'
- source_word: οὐ δικαιωθήσεται
  english_pob_choice: he will not be justified
  chosen_spanish: no será justificado
  alternatives_spanish:
  - no será declarado justo
  - no será absuelto
  - no será vindicado
  lexicon: LSJ
  rationale: Se mantiene el verbo forense del griego. En este contexto sapiencial, "justificado" comunica la negativa a recibir vindicación o absolución sin importar debates doctrinales posteriores.
- source_word: ἐπαγωγῶν
  english_pob_choice: calamities
  chosen_spanish: calamidades
  alternatives_spanish:
  - aflicciones
  - visitaciones
  - penas
  lexicon: LSJ
  rationale: El término es difícil y apunta a males impuestos que caen sobre la casa. "Calamidades" conserva ese alcance amplio y corresponde al ajuste final del audit trail inglés.
theological_decisions:
- issue: Sentido de δικαιωθήσεται en contexto sapiencial
  english_pob_reading: 'judicial/moral vindication: ''he will not be justified'''
  chosen_spanish_reading: 'vindicación o absolución negada: ''no será justificado'''
  alternative_spanish_readings:
  - no será absuelto
  - no será declarado justo
  - no será vindicado
  rationale: El pasaje trata de la culpa por juramentos vacíos y sus consecuencias. Mantener "justificado" respeta la formulación griega y su tono judicial sin trasladar categorías paulinas ajenas al contexto.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido del texto fuente sin importar lecturas doctrinales externas'
- issue: Relación entre el pecado del individuo y el daño sobre la casa
  english_pob_reading: the house will be filled with calamities
  chosen_spanish_reading: su casa se llenará de calamidades
  alternative_spanish_readings:
  - su casa se llenará de aflicciones
  - su casa se llenará de males
  rationale: La frase no solo describe castigo personal sino repercusión doméstica o familiar. "Calamidades" mantiene el carácter de males enviados o sobrevenidos sin especificar más de lo que el griego dice.
  doctrine_reference: 'DOCTRINE.md: consistencia del alcance del juicio en la unidad familiar/doméstica'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail más reciente: adopta la lectura de πλημμελήσῃ como fallo inadvertido, ὑπερίδῃ como desprecio o menosprecio, y ἐπαγωγῶν como calamidades. También conserva la tensión lexical de μάστιξ con una nota alternativa, y mantiene δικαιωθήσεται en sentido forense.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando corresponda; este versículo no lo contiene.
  - Se mantiene la preferencia del proyecto por un registro moderno y digno, evitando calcos innecesarios.
  - Se conserva la fuerza jurídica de "justificado" en vez de suavizarla a una mera idea de perdón.
  - Las notas usan marcadores únicos y cada uno aparece anclado en el texto principal.
