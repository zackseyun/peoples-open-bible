translation:
  language: es
  text: Has contado mi vagar[a]; pon mis lágrimas en tu odre[b]—¿acaso no están en tu libro?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “mis vagabundeos” o “mi errancia”. El hebreo puede referirse al andar errante o a la vida de fugitivo.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo alude a un recipiente de piel, es decir, un odre; no a una botella moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹדִי
  english_pob_choice: my wanderings
  chosen_spanish: mis andanzas
  alternatives_spanish:
  - mi vagar
  - mis peregrinaciones
  - mi errancia
  lexicon: HALOT
  rationale: נוד expresa movimiento errante, andar sin reposo o ser arrojado de un lado a otro. "Andanzas" comunica bien esa idea concreta en español, conserva el matiz de vida inestable del salmo y evita reducirla a una abstracción como "miseria".
- source_word: סָפַרְתָּה
  english_pob_choice: have counted
  chosen_spanish: has contado
  alternatives_spanish:
  - has numerado
  - has registrado
  - has llevado cuenta de
  lexicon: HALOT
  rationale: ספר significa contar o numerar; por extensión, registrar. "Has contado" es la equivalencia natural y mantiene la idea de atención cuidadosa sin perder el sentido básico del verbo.
- source_word: שִׂימָה
  english_pob_choice: put
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - ponte a
  - deposita
  lexicon: HALOT
  rationale: Es un imperativo de שים. "Pon" refleja de manera directa y clara la súplica del verso, con registro natural y digno en español.
- source_word: דִמְעָתִי
  english_pob_choice: my tears
  chosen_spanish: mis lágrimas
  alternatives_spanish:
  - mis llantos
  - mis sollozos
  lexicon: HALOT
  rationale: La forma hebrea es singular con sufijo, pero el sentido idiomático en español es plural. "Lágrimas" conserva la imagen concreta sin forzar la morfología española.
- source_word: בְּנֹאדֶךָ
  english_pob_choice: in your bottle
  chosen_spanish: en tu odre
  alternatives_spanish:
  - en tu odre de piel
  - en tu pellejo
  - en tu botella de cuero
  lexicon: HALOT
  rationale: נֹאד designa un recipiente de piel, no una botella moderna. "Odre" expresa con precisión el objeto antiguo y evita el anacronismo de "botella". Se mantiene el término tradicional más exacto en español bíblico.
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿acaso no
  alternatives_spanish:
  - ¿no es verdad que
  - ¿no están
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. "¿Acaso no" conserva el tono interrogativo y enfático mejor que una simple aseveración.
- source_word: בְּסִפְרָתֶךָ
  english_pob_choice: in your book
  chosen_spanish: en tu libro
  alternatives_spanish:
  - en tu registro
  - en tu rollo
  lexicon: HALOT
  rationale: ספרה aquí se entiende como un escrito o libro de registro. "Libro" es la opción más natural y fiel en español moderno, manteniendo la imagen de memoria escrita.
theological_decisions:
- issue: Imagen antropomórfica de Dios guardando lágrimas y llevando un registro
  english_pob_reading: Retain the concrete imagery without reducing it to metaphorical paraphrase
  chosen_spanish_reading: 'Conservar la imagen concreta: Dios cuenta las andanzas, guarda las lágrimas en un odre y las tiene en su libro'
  alternative_spanish_readings:
  - Dios recuerda mis sufrimientos
  - Dios tiene presentes mis penas
  rationale: El hebreo presenta imágenes poéticas concretas de la atención personal de Dios. La traducción mantiene esa fuerza sin despojar el verso de su tensión poética ni convertirlo en una mera paráfrasis abstracta.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica y poética en lugar de resolverla.
translation_notes:
  revision_awareness: Concordancia alta con el audit trail en inglés. Se revisó la imagen de נֹאד para evitar el anacronismo de “botella” y se optó por “odre”, más exacto para el objeto antiguo. Se mantuvo la pregunta retórica con fuerza enfática en español.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético y la imaginería concreta del verso.
  - Se usa un español neutral y publicable, con términos bíblicos comprensibles sin arcaizar en exceso.
  - '"Andanzas" mantiene la amplitud semántica de wanderings sin perder naturalidad.'
  - '"Odre" es el equivalente español más fiel al recipiente de piel del hebreo.'
