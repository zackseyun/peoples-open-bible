    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por sus cabezas' o 'por sus cráneos'; un modismo que significa contar a cada uno individualmente.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el principal error de alineación: la nota sobre el verbo genealógico raro ahora se ancla en ''se registraron[a]''. También se ajusta la fórmula etaria a ''de veinte años en adelante'' para mayor naturalidad sin perder el sentido de וָמַעְלָה, y se mantiene la nota idiomática de ''cabeza por cabeza'' correctamente anclada al final de la frase relevante.'
