translation:
  language: es
  text: Porque eran justos[a] y dueños de sí, y valientes y de ánimo noble[b], y amaban a sus hermanos, y tan devotos de su madre que, hasta la muerte, la obedecían guardando[c] la ley[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Justos» traduce el valor moral de δίκαιοι; también podría entenderse como «rectos».
    reason: lexical_alternative
  - marker: b
    text: «De ánimo noble» conserva la idea de μεγαλόψυχοι, literalmente «de gran alma»; «magnánimos» es otra posibilidad.
    reason: lexical_alternative
  - marker: c
    text: El griego φυλάσσοντας expresa «guardando» u «observando» fielmente; en este contexto legal-religioso esa idea es más natural que «manteniendo».
    reason: lexical_alternative
  - marker: d
    text: El griego tiene τὰ νόμιμα en plural; aquí se vierte «la ley» por naturalidad idiomática en español para el conjunto de las exigencias legales, aunque también puede entenderse como «los preceptos», «las leyes ancestrales» o «las ordenanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοί
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justos en sentido moral
  lexicon: LSJ
  rationale: En español, «justos» comunica con naturalidad la virtud moral y judicial que δίκαιοι expresa en la lista de virtudes. Se evita «righteous» calco y también «rectos» por ser menos idiomático aquí.
- source_word: σώφρονες
  english_pob_choice: self-controlled
  chosen_spanish: sensatos
  alternatives_spanish:
  - moderados
  - dueños de sí
  lexicon: LSJ
  rationale: El griego apunta a moderación disciplinada y juicio sobrio. «Sensatos» funciona bien en una lista de virtudes en español; «dueños de sí» sería más explícito, pero menos paralelo al ritmo del pasaje.
- source_word: ἀνδρεῖοι
  english_pob_choice: brave
  chosen_spanish: valientes
  alternatives_spanish:
  - courageosos
  - bravos
  lexicon: LSJ
  rationale: «Valientes» es la equivalencia más natural y fiel para la valentía que expresa el término.
- source_word: μεγαλόψυχοι
  english_pob_choice: noble-minded
  chosen_spanish: de ánimo noble
  alternatives_spanish:
  - magnánimos
  - de gran alma
  lexicon: LSJ
  rationale: La expresión griega sugiere grandeza de alma. «De ánimo noble» conserva el tono elevado sin sonar forzado; «magnánimos» también sería posible, pero puede sonar más abstracto en español moderno.
- source_word: φιλάδελφοι
  english_pob_choice: loving toward their brothers
  chosen_spanish: amantes de sus hermanos
  alternatives_spanish:
  - afectuosos con sus hermanos
  - amorosos con sus hermanos
  lexicon: LSJ
  rationale: Se conserva el matiz fraternal y masculino del término, como en el contexto narrativo, sin neutralizarlo. «Amantes de sus hermanos» reproduce bien la relación afectiva del compuesto, aunque suena algo más solemne que una paráfrasis moderna.
- source_word: φιλόμητρος
  english_pob_choice: devoted to their mother
  chosen_spanish: devotos de su madre
  alternatives_spanish:
  - amantes de su madre
  - afectuosos con su madre
  lexicon: LSJ
  rationale: El término expresa afecto leal y adherencia filial; «devotos de su madre» capta esa lealtad intensificada que el contexto enfatiza mejor que un simple «amantes».
- source_word: μέχρι θανάτου
  english_pob_choice: even to the point of death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta el punto de morir
  - aun hasta la muerte
  lexicon: LSJ
  rationale: La expresión española «hasta la muerte» transmite con sobriedad el extremo de la obediencia sin recargar el verso.
- source_word: τὰ νόμιμα
  english_pob_choice: the law
  chosen_spanish: los preceptos
  alternatives_spanish:
  - la ley
  - las disposiciones legales
  - los mandatos
  lexicon: LSJ
  rationale: El plural griego sugiere prescripciones concretas observadas fielmente. «Los preceptos» mantiene el valor plural y normativo mejor que un singular abstracto en español; por eso se aparta de la solución inglesa «the law».
- source_word: φυλάσσοντας
  english_pob_choice: keeping
  chosen_spanish: manteniendo
  alternatives_spanish:
  - guardando
  - observando
  lexicon: LSJ
  rationale: En este contexto, φυλάσσω implica observar fielmente normas. «Manteniendo» comunica continuidad y fidelidad; «observando» sería igualmente posible y quizá más jurídico.
- source_word: πείθεσθαι αὐτῇ
  english_pob_choice: they obeyed her
  chosen_spanish: obedecían
  alternatives_spanish:
  - se sometían a ella
  - la obedecían
  lexicon: LSJ
  rationale: El dativo personal con πείθομαι puede significar obedecer. En español, el verbo en la cláusula final hace natural la referencia a ella; el pronombre está recuperado por el contexto inmediato.
theological_decisions:
- issue: τὰ νόμιμα en un contexto de martirio judío
  english_pob_reading: the law
  chosen_spanish_reading: los preceptos
  alternative_spanish_readings:
  - la ley
  - las ordenanzas
  - los mandatos
  rationale: El griego es plural y alude a obligaciones legales concretas. «Los preceptos» preserva la pluralidad y el carácter normativo en español, evitando reducir demasiado el sentido a un singular genérico. Se mantiene la tensión entre ley/costumbre sin borrarla.
  doctrine_reference: Translation philosophy §1, §6
- issue: πείθεσθαι αὐτῇ y la obediencia filial
  english_pob_reading: they obeyed her
  chosen_spanish_reading: obedecían
  alternative_spanish_readings:
  - la obedecían
  - se sometían a ella
  - se dejaban persuadir por ella
  rationale: Aquí πείθομαι con dativo personal expresa obediencia, no mera persuasión. La forma verbal española conserva la fuerza filial y narrativa del pasaje, evitando suavizar la relación ni volverla un simple acuerdo emocional.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado de alta concordancia: no se requieren cambios frente al texto fuente y al audit trail inglés, pero la versión española ajusta τὰ νόμιμα al plural visible del griego y mantiene la obediencia filial de πείθεσθαι αὐτῇ sin suavizarla.'
  spanish_consistency_notes:
  - Se conserva el registro bíblico-digno sin caer en arcaísmos.
  - Se mantiene el plural normativo de τὰ νόμιμα en la nota, aunque el cuerpo usa una solución española idiomática.
  - La referencia filial se expresa con lenguaje masculino plural coherente con el contexto narrativo.
  - No se usa «SEÑOR» ni terminología eclesiástica ajena al pasaje.
  - El orden de virtudes sigue de cerca la secuencia griega y la traducción inglesa auditada.
