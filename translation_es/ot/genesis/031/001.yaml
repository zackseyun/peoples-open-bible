revisions:
- from: 'Y oyó las palabras de los hijos de Labán[a], diciendo: «Jacob ha tomado todo lo que pertenecía a nuestro padre, y de lo que pertenecía a nuestro padre ha hecho toda esta riqueza».'
  to: 'Y oyó las palabras de los hijos de Labán, diciendo: «Jacob ha tomado todo lo que pertenecía a nuestro padre, y de lo que pertenecía a nuestro padre ha adquirido toda esta riqueza[a]».'
  rationale: Se corrige el verbo para reflejar el sentido contextual de עָשָׂה como adquisición/ganancia, en línea con la auditoría inglesa y con un español natural. También se reubica el marcador de nota al término que realmente comenta, «riqueza».
