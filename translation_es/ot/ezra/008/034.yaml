  rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se ajusta בָּעֵת הַהִיא de «en aquel tiempo» a «en ese momento» para reflejar con mayor precisión el momento concreto de la verificación y registro. La nota literal se armoniza con esa mejora.
