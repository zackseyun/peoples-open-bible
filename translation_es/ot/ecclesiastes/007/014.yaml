    reason: lexical_alternative
  - marker: c
    text: 'O: «descubrir nada después de él», es decir, averiguar lo que sucederá en el futuro.'
    reason: alternative_reading
  revision_rationale: Se ajusta «sé alegre» a «alégrate» para una exhortación más natural y fiel al modismo hebreo; se reemplaza «no pueda descubrir» por «no descubra» para evitar añadir un matiz modal no explícito; y se pule «lo uno tanto como lo otro» a «tanto lo uno como lo otro» por mayor naturalidad en español.
