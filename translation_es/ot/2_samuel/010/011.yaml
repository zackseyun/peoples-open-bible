translation:
  language: es
  text: 'Él dijo[a]: «Si Aram es demasiado fuerte para mí, tú me ayudarás[b]; pero si los amonitas son demasiado fuertes para ti, yo iré a ayudarte[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si Aram prevalece contra mí … si los amonitas prevalecen contra ti».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tú serás para mí liberación» … «yo iré a librarte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / He said
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - dijo
  lexicon: WLC / HALOT
  rationale: Se conserva el verbo de habla introductorio sin añadir matices. El sujeto explícito en español mantiene la claridad narrativa sin forzar el hebreo.
- source_word: תֶּחֱזַק / יֶחֱזְקוּ
  english_pob_choice: is too strong / are too strong
  chosen_spanish: es demasiado fuerte / son demasiado fuertes
  alternatives_spanish:
  - prevalece sobre
  - vence a
  - es más fuerte que
  lexicon: HALOT
  rationale: חזק en este contexto militar expresa superioridad o dominio en combate. «Demasiado fuerte» reproduce bien la relación de fuerza sin elevarla a una paráfrasis más interpretativa.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se mantiene el nombre propio hebreo, como en el POB inglés, en lugar de sustituirlo por una designación geopolítica posterior.
- source_word: מִמֶּנִּי / מִמְּךָ
  english_pob_choice: for me / for you
  chosen_spanish: para mí / para ti
  alternatives_spanish:
  - contra mí / contra ti
  - más que yo / más que tú
  lexicon: HALOT
  rationale: Con חזק y un marco de combate, el sentido idiomático apunta a superioridad frente a la otra parte. En español, «demasiado fuerte para mí/ti» comunica esa relación de manera natural.
- source_word: וְהָיִתָה לִּי לִישׁוּעָה
  english_pob_choice: you shall help me
  chosen_spanish: entonces tú me ayudarás
  alternatives_spanish:
  - serás para mí salvación
  - serás para mí ayuda
  - vendrás en mi auxilio
  lexicon: HALOT
  rationale: La expresión hebrea literalmente habla de «ser para mí para salvación/deliverancia», pero en este contexto táctico la ayuda militar es el sentido inmediato. Se evita «salvación» por su posible carga teológica ajena al pasaje.
- source_word: לִישׁוּעָה
  english_pob_choice: help
  chosen_spanish: ayudar
  alternatives_spanish:
  - auxilio
  - rescate
  - salvación
  lexicon: HALOT
  rationale: Se sigue la decisión auditada del POB inglés de usar un equivalente práctico y contextual. «Ayudar» conserva la función de apoyo militar sin sobrerreligiosizar el término.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Es la forma idiomática habitual en español para el grupo étnico-político, coherente con el uso del POB inglés.
- source_word: וְהָלַכְתִּי לְהוֹשִׁיעַ לָךְ
  english_pob_choice: I will go to help you
  chosen_spanish: yo iré a ayudarte
  alternatives_spanish:
  - iré a rescatarte
  - iré a salvarte
  - iré en tu auxilio
  lexicon: HALOT
  rationale: הלך + infinitivo expresa movimiento con propósito. «Iré a ayudarte» refleja de forma natural la asistencia militar prevista, respetando la decisión inglesa de evitar «salvar» como equivalente principal.
theological_decisions:
- issue: Valor de לִישׁוּעָה en un contexto militar
  english_pob_reading: help / military aid, not salvation in a later doctrinal sense
  chosen_spanish_reading: ayudar / ayuda militar, no «salvación» como categoría doctrinal aquí
  alternative_spanish_readings:
  - salvación
  - rescate
  - auxilio
  rationale: El pasaje trata de coordinación de fuerzas en batalla. Traducir con «ayuda» evita importar una lectura soteriológica que el contexto no exige, manteniendo la tensión lexical del hebreo.
  doctrine_reference: Contextual semantics of יְשׁוּעָה in military narrative
- issue: Relación de fuerza expresada por חזק
  english_pob_reading: is too strong for / are too strong for
  chosen_spanish_reading: es demasiado fuerte para / son demasiado fuertes para
  alternative_spanish_readings:
  - prevalece sobre
  - vence a
  - domina a
  rationale: La frase conserva el sentido relacional de superioridad sin convertir el verbo en una victoria consumada. Eso preserva el carácter condicional del acuerdo entre los combatientes.
  doctrine_reference: Narrative military context; lexical force of חזק
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del POB inglés, que revisó la primera cláusula para preferir «you shall help me» por naturalidad. En español se adopta una estructura igualmente natural («tú me ayudarás») y se mantiene la segunda cláusula paralela con el mismo valor de apoyo militar. Se conserva la distinción entre Aram y los amonitas, y se evita trasladar «salvación» a una lectura teológica no apoyada por el contexto.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre propio, en paralelo con el inglés POB.
  - Se usa «amonitas» como etnónimo idiomático y no «hijos de Amón» en el cuerpo, reservando la forma más literal para nota.
  - «Ayudar» y «ayuda» se emplean de modo consistente para לִישׁוּעָה en este versículo.
  - La puntuación con comillas angulares sigue el uso español moderno y mantiene el discurso directo claro.
