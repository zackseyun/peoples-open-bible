translation:
  language: es
  text: Bendito eres tú, que me has dado sabiduría; y a ti te doy gracias, Soberano[a] de los padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amo de los padres». El griego δέσποτα expresa autoridad soberana y se distingue de κύριος («Señor»).
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  lexicon: BDAG
  rationale: En una doxología dirigida a Dios, «bendito» conserva el valor de alabanza y se lee con naturalidad en español. «Alabado» también es posible, pero suena menos idiomático para esta fórmula de bendición.
- source_word: ὃς ἔδωκάς μοι σοφίαν
  english_pob_choice: who have given me wisdom
  chosen_spanish: que me has dado sabiduría
  alternatives_spanish:
  - porque me has dado sabiduría
  - que me diste sabiduría
  lexicon: BDAG
  rationale: El relativo describe al destinatario y la acción ya realizada con relevancia presente; el perfecto español («has dado») refleja bien el aoristo en contexto de oración de agradecimiento. «Sabiduría» mantiene el sentido normal de σοφία.
- source_word: ὁμολογῶ
  english_pob_choice: I give thanks
  chosen_spanish: te doy gracias
  alternatives_spanish:
  - te confieso
  - te reconozco
  - te alabo
  lexicon: BDAG
  rationale: Aunque ὁμολογέω puede significar confesar o reconocer, aquí va con dativo en una oración y expresa agradecimiento explícito. «Te doy gracias» comunica mejor esa función devocional en español.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Se preserva la distinción léxica frente a κύριος evitando «Señor», que en español borra el matiz específico de δέσποτα. «Maestro» intenta reproducir autoridad personal y dependencia reverente sin sobrecargar el texto.
- source_word: τῶν πατέρων
  english_pob_choice: of the fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de nuestros padres
  - de los antepasados
  lexicon: BDAG
  rationale: El griego no dice «nuestros», así que no se añade. «Padres» conserva el plural masculino del original y refleja la referencia patrimonial a los patriarcas/antepasados varones.
theological_decisions:
- issue: Título divino δέσποτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: La decisión mantiene la diferencia entre δέσποτα y κύριος. En español, «Maestro» transmite autoridad y relación de subordinación sin usar «Señor», que sería el equivalente habitual de κύριος y borraría la tensión léxica documentada.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
- issue: Género de πατέρων
  english_pob_reading: the fathers
  chosen_spanish_reading: los padres
  alternative_spanish_readings:
  - los antepasados
  rationale: Se conserva el masculino plural explícito del griego. Neutralizar a «antepasados» suavizaría una forma significativa del texto y perdería transparencia.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y la lectura griega directa. No se detectaron revisiones posteriores que alteren el sentido; se mantuvo la distinción de δέσποτα frente a κύριος y se evitó añadir «nuestros» a τῶν πατέρων.
  spanish_consistency_notes:
  - Se mantuvo un registro de títulos divinos sin sustituir δέσποτα por el habitual «Señor».
  - El perfecto español («me has dado») refleja el valor contextual del aoristo griego en una oración de agradecimiento.
  - «Los padres» conserva la forma masculina del original y evita neutralización no documentada.
