translation:
  language: es
  text: antes que se oscurezca[a] el sol y la luz, la luna y las estrellas, y vuelvan las nubes después de la lluvia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «antes que se oscurezca el sol y la luz del día, la luna y las estrellas».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אֲשֶׁר לֹא
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - hasta que no
  - antes de que
  lexicon: HALOT
  rationale: La construcción temporal introduce el momento previo al cual se exhorta a actuar. «Antes que» comunica naturalmente ese valor de anterioridad en español y evita una formulación pesada o ambigua.
- source_word: תֶחְשַׁךְ
  english_pob_choice: grow dark
  chosen_spanish: se oscurezcan
  alternatives_spanish:
  - se hagan oscuras
  - se pongan oscuras
  - sean oscurecidos
  lexicon: HALOT
  rationale: El verbo qal expresa llegar a estar oscuro. En español, «se oscurezcan» conserva el sentido intransitivo de proceso sin forzar una pasiva ajena al hebreo.
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol
  lexicon: HALOT
  rationale: Equivalencia directa y natural.
- source_word: וְהָאוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  - la luz del día
  lexicon: HALOT
  rationale: «אוֹר» es literalmente «luz». Aquí, junto con sol, luna y estrellas, puede abarcar la luz en general; «la luz» mantiene la parquedad poética sin explicitar más de lo que el verso dice.
- source_word: וְהַיָּרֵחַ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  lexicon: HALOT
  rationale: Equivalencia directa.
- source_word: וְהַכּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - los astros
  lexicon: HALOT
  rationale: Equivalencia directa; «estrellas» preserva el paralelismo y la imaginería celeste.
- source_word: וְשָׁבוּ
  english_pob_choice: return
  chosen_spanish: vuelvan
  alternatives_spanish:
  - regresen
  - retornen
  lexicon: HALOT
  rationale: El verbo שׁוּב comunica volver o regresar. En español, «vuelvan» conserva el movimiento repetitivo y resulta idiomático en la frase poética.
- source_word: הֶעָבִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - las nubes
  lexicon: HALOT
  rationale: Equivalencia directa.
- source_word: אַחַר הַגָּשֶׁם
  english_pob_choice: after the rain
  chosen_spanish: después de la lluvia
  alternatives_spanish:
  - tras la lluvia
  - luego de la lluvia
  lexicon: HALOT
  rationale: La preposición temporal se vierte de forma natural como «después de». «Lluvia» conserva la imagen sin añadir interpretación.
theological_decisions:
- issue: Imaginería cósmica y su posible lectura como vejez o declive
  english_pob_reading: Retain the poetic imagery without explicating it as old age, judgment, or emotional decline in the main text.
  chosen_spanish_reading: Conservar la imaginería poética sin explicarla como vejez, juicio o decadencia anímica en el texto principal.
  alternative_spanish_readings:
  - Interpretarlo abiertamente como el inicio de la vejez
  - Entenderlo como un cuadro general de decadencia de la vida
  rationale: El hebreo presenta imágenes; no desarrolla su interpretación. La traducción española debe respetar esa tensión y no resolverla en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrige la validación anterior anclando la nota [a] en la palabra «oscurezcan» dentro del texto español, de modo que el marcador aparezca exactamente en span

    i sh_text. Se mantiene la lectura poética del hebreo y la equivalencia auditada del inglés POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma editorial habitual del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - 'Se conserva el orden imagístico del hebreo: sol, luz, luna, estrellas, nubes, lluvia.'
  - No se añade explicación interpretativa sobre la vejez en el texto principal.
  - El español evita un calco excesivo y mantiene un registro bíblico claro y publicable.
