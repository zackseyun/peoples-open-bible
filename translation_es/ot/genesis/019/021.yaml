translation:
  language: es
  text: 'Y le dijo: «Mira, te he concedido este favor[a] también en este asunto; no arrasaré la ciudad de la cual has hablado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «he levantado tu rostro», es decir, «te he mostrado favor» o «te he concedido tu petición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce la respuesta con fuerza de llamada de atención. «Mira» conserva ese valor discursivo en español natural y evita el arcaísmo de «He aquí», que en esta frase sonaría menos fluido.
- source_word: נָשָׂאתִי פָנֶיךָ
  english_pob_choice: I have granted you this favor
  chosen_spanish: te he concedido este favor
  alternatives_spanish:
  - he alzado tu rostro
  - te he mostrado favor
  - te he aceptado la petición
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de «levantar el rostro», pero en este contexto expresa haber mostrado favor o concedido lo pedido. «Te he concedido este favor» mantiene el sentido idiomático y el matiz de benevolencia personal sin oscurecer la comprensión en español.
- source_word: גַּם לַדָּבָר הַזֶּה
  english_pob_choice: this request also
  chosen_spanish: también
  alternatives_spanish:
  - también en este asunto
  - también respecto de esto
  - incluso acerca de esto
  lexicon: HALOT
  rationale: Aquí דָּבָר se refiere al asunto/petición mencionados en el contexto. El español puede expresarlo de forma implícita; «también» conserva la fuerza aditiva de גַּם y el sintagma «este favor» absorbe el referente implícito de manera natural.
- source_word: לְבִלְתִּי הָפְכִּי
  english_pob_choice: I will not overthrow
  chosen_spanish: no destruiré
  alternatives_spanish:
  - no derribaré
  - no trastornaré
  - no volcaré
  lexicon: HALOT
  rationale: El verbo hebreo transmite una inversión o catástrofe total de la ciudad. «No destruiré» comunica con claridad el resultado en español, aunque reconoce menos explícitamente la imagen de «dar vuelta»; por eso se mantiene la línea de sentido del contexto y no se atenúa el alcance del juicio.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Traducción directa del sustantivo definido; en español «la ciudad» es la forma más natural y fiel al singular hebreo.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: of which you have spoken
  chosen_spanish: de la cual has hablado
  alternatives_spanish:
  - de la que has hablado
  - acerca de la cual has hablado
  - que has mencionado
  lexicon: HALOT
  rationale: La construcción relativa preserva el tono formal del hebreo y la referencia a la ciudad mencionada por Lot. «De la cual has hablado» sigue de cerca la relación sintáctica sin volverlo rebuscado.
theological_decisions:
- issue: Cómo rendir el modismo hebreo de 'levantar el rostro' sin perder el sentido de favor concedido
  english_pob_reading: I have granted you this favor
  chosen_spanish_reading: te he concedido este favor
  alternative_spanish_readings:
  - he alzado tu rostro
  - te he mostrado favor
  rationale: 'No hay aquí una doctrina disputada, sino una decisión semántica con implicación relacional: el texto presenta a Dios/portavoz como quien concede gracia o favor a Lot. El español debe expresar el resultado comunicativo del modismo, no su literalidad opaca.'
  doctrine_reference: Exégesis lexical; cf. uso bíblico del favor concedido en contextos de petición
- issue: Alcance de לְבִלְתִּי הָפְכִּי respecto del destino de la ciudad
  english_pob_reading: I will not overthrow the city
  chosen_spanish_reading: no destruiré la ciudad
  alternative_spanish_readings:
  - no trastornaré la ciudad
  - no volcaré la ciudad
  rationale: El hebreo resalta una catástrofe de inversión/ruina total. «Destruiré» transmite correctamente el efecto en español, aunque suaviza la imagen verbal; se elige por claridad sin negar el trasfondo de ‘voltear’ o ‘trastornar’ presente en el verbo.
  doctrine_reference: Juicio divino en Génesis 19; fidelidad semántica al verbo הפך
translation_notes:
  revision_awareness: 'Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase «este favor[a]». La redacción sigue la revisión más reciente del inglés POB: «have granted» / «this favor», manteniendo el tono formal y la claridad del resultado negativo sobre la ciudad.'
  spanish_consistency_notes:
  - Se usó «Mira» para הִנֵּה, en línea con el valor discursivo y la preferencia POB por un inglés moderno equivalente.
  - Se evitó «SEÑOR» o «el Señor» porque el versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - Se mantuvo «favor» en el texto principal porque la nota ya explica el modismo, preservando la tensión entre literalidad e idiomaticidad.
  - «No destruiré» se eligió como equivalente español natural de «I will not overthrow», sin introducir una paráfrasis más amplia que el contexto no exija.
