revisions:
- from: 'Por la piedad[a] Isaac sufrió con firmeza. Y cada uno, mirando a los demás, todos juntos, alegres y muy valientes, dijeron: «Consagrémonos a Dios con todo el corazón, al que nos dio las almas[b], y empleemos nuestros cuerpos en la custodia[c] de la ley».'
  to: 'Por la piedad[a] Isaac resistió. Y todos, mirándose unos a otros, juntos, alegres y muy valientes, decían: «Consagrémonos a Dios con todo el corazón, al que nos dio nuestras almas[b], y empleemos nuestros cuerpos en la vigilancia[c] de la ley».'
  rationale: Se corrige la discordancia sintáctica principal, se afina ὑπέμεινεν con «resistió», se naturaliza «ψυχάς» con el posesivo necesario en español, y se sustituye «custodia» por «vigilancia» para mantener la metáfora de φυλακή en un español más claro y eclesialmente legible.
