translation:
  language: es
  text: Ciertamente no entraré en la tienda de mi casa[a][b]; ciertamente no subiré a la cama de mi reposo—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa una fórmula de juramento con “si” repetido: literalmente, “si entro ... si subo ...”, con el sentido contextual de “ciertamente no entraré ... ciertamente no subiré ...”.'
    reason: lexical_alternative
  - marker: b
    text: O “el lecho de mi alcoba” / “el lecho de mi descanso”; el hebreo emplea dos términos muy cercanos para un lugar de dormir en paralelismo poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Surely ... not
  chosen_spanish: Ciertamente no
  alternatives_spanish:
  - si no
  - de seguro no
  lexicon: HALOT
  rationale: 'En este juramento, אִם funciona como fórmula de autoimprecación: “si hago X” con el sentido de “seguramente no haré X”. En español, “Ciertamente no” comunica ese valor idiomático sin perder la fuerza del juramento.'
- source_word: אָבֹא
  english_pob_choice: I will enter
  chosen_spanish: entraré
  alternatives_spanish:
  - iré
  - entraré a
  lexicon: HALOT
  rationale: El imperfecto qal de בוא expresa aquí acción futura prometida. “Entraré” es natural en español y conserva la idea concreta de entrar.
- source_word: בְּאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la carpa
  - el tabernáculo
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente “tienda”. “Tienda” conserva la imagen hebrea y sigue siendo claro en español bíblico moderno.
- source_word: בֵּיתִי
  english_pob_choice: of my house
  chosen_spanish: de mi casa
  alternatives_spanish:
  - de mi hogar
  lexicon: HALOT
  rationale: בַּיִת con sufijo 1cs es literalmente “mi casa”. “Casa” mantiene el paralelismo con “tienda” mejor que “hogar”.
- source_word: אֶעֱלֶה
  english_pob_choice: I will go up
  chosen_spanish: subiré
  alternatives_spanish:
  - ascenderé
  - me subiré
  lexicon: HALOT
  rationale: עלה significa “subir/ir hacia arriba”. “Subiré” reproduce el movimiento espacial de forma natural en español.
- source_word: עַל
  english_pob_choice: onto
  chosen_spanish: al
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Con el verbo de movimiento, “al” transmite adecuadamente la dirección hacia el objeto en español fluido.
- source_word: עֶרֶשׂ
  english_pob_choice: the bed
  chosen_spanish: el lecho
  alternatives_spanish:
  - la cama
  - el catre
  lexicon: HALOT
  rationale: עֶרֶשׂ puede referirse a cama o lecho. “Lecho” conserva un tono más poético y digno, acorde con el paralelismo del verso.
- source_word: יְצוּעָי
  english_pob_choice: of my couch
  chosen_spanish: de mi cama
  alternatives_spanish:
  - de mi descanso
  - de mi lecho
  lexicon: HALOT
  rationale: El sustantivo designa el lugar de acostarse. “Mi cama” es claro en español; el paralelo con “lecho” mantiene la variación de dos términos cercanos sin hacer el texto oscuro.
translation_notes:
  revision_awareness: Se mantuvo la lectura aprobada del tramo como juramento idiomático con “Ciertamente no”, y se conservó el paralelismo de dos expresiones de descanso/dormir con notas alternativas; no hubo revisiones posteriores que alteraran el sentido.
  spanish_consistency_notes:
  - Se preserva el contraste entre “tienda” y “casa” para reflejar בְּאֹהֶל / בֵּיתִי.
  - Se optó por “lecho” en la línea paralela para mantener un registro poético coherente con el hebreo.
  - 'Las notas a y b reflejan las dos incertidumbres léxicas principales del verso: la fórmula de juramento y el par de términos para el lugar de dormir.'
