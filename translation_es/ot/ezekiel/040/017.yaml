translation:
  language: es
  text: Entonces me llevó al atrio exterior[a], y he aquí, había aposentos y un pavimento hecho para el atrio, todo alrededor, todo alrededor; treinta aposentos estaban junto al pavimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el pavimento». El hebreo dice literalmente «treinta aposentos al pavimento», indicando su relación con la zona pavimentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: 'La forma narrativa con waw consecutiva expresa avance secuencial; «Entonces» conserva esa progresión natural en español sin perder el movimiento de la visión. El sujeto implícito se mantiene como en el contexto profético: el guía de la visión llevó al profeta.'
- source_word: הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el atrio exterior
  alternatives_spanish:
  - el patio exterior
  - el atrio externo
  lexicon: HALOT
  rationale: חָצֵר en el contexto del templo se refiere al espacio arquitectónico del santuario; «atrio» es el término más natural y reverente en español bíblico para esta visión. «Exterior» conserva el contraste con el recinto interior.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y he aquí que
  lexicon: HALOT
  rationale: La fórmula deíctica introduce una observación visual en la visión profética. «Y he aquí» preserva el tono elevado y la función de señalar algo que aparece ante el profeta.
- source_word: לְשָׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - aposentos
  - cuartos
  lexicon: HALOT
  rationale: En contexto arquitectónico-templario, לשכות son dependencias o cuartos anexos. «Cámaras» mantiene el registro bíblico y evita una domesticación excesiva con «cuartos».
- source_word: וְרִצְפָה
  english_pob_choice: and a pavement
  chosen_spanish: y un pavimento
  alternatives_spanish:
  - y un empedrado
  - y un piso pavimentado
  lexicon: HALOT
  rationale: רִצְפָה denota una superficie pavimentada. «Pavimento» es el equivalente directo y formal; en español bíblico puede referirse tanto a la superficie como al conjunto pavimentado.
- source_word: עָשׂוּי לֶחָצֵר
  english_pob_choice: made for the court
  chosen_spanish: hecho para el atrio
  alternatives_spanish:
  - hecho para el patio
  - preparado para el atrio
  - construido para el atrio
  lexicon: HALOT
  rationale: 'El participio pasivo con ל expresa finalidad o relación: algo hecho/preparado para el atrio. «Hecho para el atrio» conserva la sintaxis sin añadir detalles constructivos que el hebreo no especifica.'
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around, all around
  chosen_spanish: todo alrededor, todo alrededor
  alternatives_spanish:
  - alrededor, alrededor
  - en derredor, en derredor
  lexicon: HALOT
  rationale: La repetición intensiva debe reflejarse en español para no suavizar el énfasis espacial del hebreo. «Todo alrededor, todo alrededor» reproduce la duplicación con claridad y naturalidad.
- source_word: שְׁלֹשִׁים לְשָׁכוֹת
  english_pob_choice: thirty chambers
  chosen_spanish: treinta cámaras
  alternatives_spanish:
  - treinta aposentos
  - treinta cuartos
  lexicon: HALOT
  rationale: El numeral es directo; se mantiene la misma palabra que para לְשָׁכוֹת para coherencia léxica dentro del versículo. No se introduce una equivalencia más doméstica que debilite el marco del templo.
- source_word: אֶל הָרִצְפָה
  english_pob_choice: were on the pavement
  chosen_spanish: estaban sobre el pavimento
  alternatives_spanish:
  - estaban junto al pavimento
  - estaban hacia el pavimento
  - estaban en el pavimento
  lexicon: HALOT
  rationale: La preposición אֶל en este contexto arquitectónico expresa relación espacial con la superficie pavimentada. «Sobre el pavimento» sigue de cerca la revisión inglesa más reciente y comunica ubicación/adscripción sin forzar una mera orientación.
theological_decisions:
- issue: Terminología arquitectónica del templo frente a vocabulario más cotidiano
  english_pob_reading: Uses 'outer court,' 'chambers,' and 'pavement' as architectural terms in the temple vision.
  chosen_spanish_reading: Usa «atrio exterior», «cámaras» y «pavimento» como términos arquitectónicos de la visión del templo.
  alternative_spanish_readings:
  - patio exterior / cuartos / piso
  - atrio externo / aposentos / pavimento
  rationale: El pasaje pertenece a una visión técnica del templo y requiere vocabulario estable y culto, no coloquial. Mantener términos arquitectónicos ayuda a preservar el carácter sagrado y descriptivo del texto sin interpretarlo de más.
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente al entender אֶל הָרִצְפָה como relación espacial/adscripción, no como orientación meramente abstracta. También conserva la repetición enfática de סָבִיב סָבִיב y el tono deíctico de וְהִנֵּה.
  spanish_consistency_notes:
  - Se mantiene «atrio» para חָצֵר en un contexto de templo, por consistencia con el registro bíblico arquitectónico.
  - Se usa «cámaras» para לְשָׁכוֹת en ambas ocurrencias del versículo.
  - «Pavimento» traduce רִצְפָה de forma uniforme y formal.
  - La repetición «todo alrededor, todo alrededor» preserva el énfasis hebreo sin condensarlo.
