  yaml_path: translation/deuterocanon/4_maccabees/014/019.yaml
  text: For even bees[a], around the time of making honeycomb, defend themselves against those who approach, and, as with iron, strike with their stinger those who come near their brood[c][b], and defend them to the death.
  footnotes:
  - marker: a
    text: Or 'at the season of wax-production' or 'at the time of comb-making'; the Greek refers specifically to the making of wax/comb, not merely honey in general.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the κέντρον'; in this context, 'stinger' is the natural sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'their brood,' using imagery of protecting offspring; the comparison is rhetorical rather than zoologically technical.
    reason: cultural_note
