translation:
  language: es
  text: Tu pompa[a] ha sido derribada hasta el Seol[b], junto con el sonido de tus arpas[c]; debajo de ti se extienden larvas, y los gusanos son tu cobertura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu majestad» o «tu orgullo» para גְּאוֹנֶךָ. El término hebreo puede denotar esplendor exaltado, así como orgullo arrogante.
    reason: lexical_alternative
  - marker: b
    text: Seol es el ámbito de los muertos; alternativamente, «la tumba» o «el reino de los muertos».
    reason: lexical_alternative
  - marker: c
    text: O «liras» o, de manera más general, «instrumentos de cuerda».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּרַד
  english_pob_choice: has been brought down
  chosen_spanish: ha sido derribada
  alternatives_spanish:
  - ha sido bajada
  - fue derribada
  lexicon: HALOT
  rationale: El hophal expresa descenso pasivo/causativo. «Ha sido derribada» comunica en español el hecho consumado de humillación, manteniendo el tono de sentencia del verso.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término hebreo en forma castellanizada para no reducir el concepto a «tumba» ni cargarlo con asociaciones doctrinales ajenas; preserva la referencia al ámbito de los muertos.
- source_word: גְּאוֹנֶךָ
  english_pob_choice: your pomp
  chosen_spanish: tu pompa
  alternatives_spanish:
  - tu majestad
  - tu orgullo
  lexicon: HALOT
  rationale: En este contexto de caída real, «pompa» refleja mejor el esplendor exterior y la dignidad ostentada que está siendo abatida. Mantiene la tensión entre esplendor y arrogancia sin resolverla de forma unilateral.
- source_word: הֶמְיַת
  english_pob_choice: the sound of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - el ruido de
  lexicon: HALOT
  rationale: El sustantivo denota sonido o ruido. Aquí se eligió «la voz de» para introducir naturalmente el complemento de las arpas en español, aunque reconoce una leve adaptación estilística respecto del hebreo.
- source_word: נְבָלֶיךָ
  english_pob_choice: your harps
  chosen_spanish: tus arpas
  alternatives_spanish:
  - tus instrumentos de cuerda
  - tus liras
  lexicon: HALOT
  rationale: «Arpas» es una equivalencia clara y tradicional para נבל, y funciona bien en el paralelismo con el sonido/suspensión del júbilo del rey.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: beneath you
  chosen_spanish: debajo de ti
  alternatives_spanish:
  - bajo ti
  - bajo tus pies
  lexicon: HALOT
  rationale: La locución espacial se vierte de manera natural como «debajo de ti» en español, manteniendo la imagen de localización funeraria.
- source_word: יֻצַּע
  english_pob_choice: are spread out
  chosen_spanish: se tenderán
  alternatives_spanish:
  - se extenderán
  - serán tendidos
  lexicon: HALOT
  rationale: El pasivo de יצע se relaciona con extender o tender como una cama o lecho. «Se tenderán» conserva esa imagen de extensión preparada bajo el caído.
- source_word: רִמָּה
  english_pob_choice: maggots
  chosen_spanish: gusanos
  alternatives_spanish:
  - larvas
  - mohos
  lexicon: HALOT
  rationale: Aunque «gusanos» es menos específico que «larvas» o «maggots», en español comunica con fuerza la imagen de corrupción cadavérica y se acopla bien al paralelismo con תולעה.
- source_word: וּמְכַסֶּיךָ
  english_pob_choice: and worms are your covering
  chosen_spanish: y gusanos serán tu cobertura
  alternatives_spanish:
  - y gusanos te cubrirán
  - y tu cobertura será de gusanos
  lexicon: HALOT
  rationale: Se conserva la idea de cobertura como predicado nominal. «Cobertura» es algo más formal, pero reproduce con fidelidad la construcción del hebreo y el efecto de envoltura fúnebre.
- source_word: תּוֹלֵעָה
  english_pob_choice: worms
  chosen_spanish: gusanos
  alternatives_spanish:
  - larvas
  - maggots
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia básica que para רִמָּה para sostener el paralelismo y el tono de descomposición del pasaje.
theological_decisions:
- issue: Renderización de שְׁאוֹל
  english_pob_reading: Sheol is the realm of the dead; alternatively, 'the grave' or 'the realm of the dead.'
  chosen_spanish_reading: Seol, como ámbito de los muertos
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: La decisión sigue el audit trail inglés al conservar el concepto hebreo sin equipararlo de modo simplista con «la tumba» ni con nociones posteriores de «infierno». En español, «Seol» preserva la carga conceptual y la ambigüedad controlada del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión del POB inglés que cambió «pride» por «pomp» para reflejar mejor גְּאוֹן en un contexto de esplendor real abatido. En español se refleja esa revisión con «pompa», evitando reducir el término a mera actitud moral.
  spanish_consistency_notes:
  - Se mantiene «Seol» de forma consistente para שְׁאוֹל, en línea con la decisión de no aplanar el concepto.
  - Se preserva el paralelismo de corrupción funeraria con «gusanos» en ambos miembros, como equivalente funcional de רִמָּה y תּוֹלֵעָה.
  - La frase «la voz de tus arpas» sigue de cerca el audit trail inglés, aunque introduce una leve naturalización sintáctica en español.
