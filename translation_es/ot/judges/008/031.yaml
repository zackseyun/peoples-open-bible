translation:
  language: es
  text: Y su concubina que estaba en Siquem también le dio un hijo[a], y le puso por nombre Abimelek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Abimelek: tradicionalmente escrito «Abimelec» o, en muchas versiones inglesas, «Abimelech».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִילַגְשׁוֹ
  english_pob_choice: And his concubine
  chosen_spanish: Y su concubina
  alternatives_spanish:
  - Y su segunda esposa
  - Y su amante
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ designa a una concubina, una mujer unida al varón sin el estatus pleno de esposa. «Concubina» conserva esa distinción social y jurídica sin suavizarla ni añadir connotaciones ajenas.
- source_word: אֲשֶׁר בִּשְׁכֶם
  english_pob_choice: who was in Shechem
  chosen_spanish: que estaba en Siquem
  alternatives_spanish:
  - que vivía en Siquem
  - que estaba en la ciudad de Siquem
  lexicon: HALOT
  rationale: La relativa identifica a la mujer por su ubicación. «Estaba en» refleja de forma natural el valor local de בְּ sin afirmar de manera más específica que «vivía».
- source_word: יָלְדָה לּוֹ
  english_pob_choice: bore him
  chosen_spanish: le dio un hijo
  alternatives_spanish:
  - le dio a luz un hijo
  - dio a luz para él
  lexicon: HALOT
  rationale: El hebreo expresa que ella le dio un hijo. En español, «le dio un hijo» conserva la relación con el destinatario y evita la aspereza de una versión demasiado técnica, mientras sigue siendo fiel al hecho narrado.
- source_word: גַם הִיא בֵּן
  english_pob_choice: also bore him a son
  chosen_spanish: también le dio un hijo
  alternatives_spanish:
  - ella también le dio un hijo
  - también le dio a él un hijo
  lexicon: HALOT
  rationale: 'גַם הִיא añade énfasis de inclusión: «también ella». En español, «también» basta para conservar ese matiz sin recargar la frase. Aunque בֵּן es literalmente «hijo/varón», aquí el sentido narrativo es simplemente que nació un hijo.'
- source_word: וַיָּשֶׂם אֶת שְׁמוֹ
  english_pob_choice: and he named him
  chosen_spanish: y le puso por nombre
  alternatives_spanish:
  - y lo nombró
  - y llamó su nombre
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático para «nombrar». «Le puso por nombre» es una equivalencia española tradicional y transparente, más fiel que «lo nombró» a la formulación hebrea y más natural que un calco rígido.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelek
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  - Abimélek
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio con acento español para lectura pública. La forma elegida refleja el hebreo y evita la grafía tradicional inglesa «Abimelech».
theological_decisions:
- issue: Término de parentesco y estatus social de la mujer
  english_pob_reading: concubine
  chosen_spanish_reading: concubina
  alternative_spanish_readings:
  - segunda esposa
  - amante
  rationale: El versículo no presenta una categoría moralizante ni suavizada, sino un estatus relacional concreto. «Concubina» preserva la tensión social del texto y evita reinterpretarla.
  doctrine_reference: Lexical fidelity; narrative historical description
translation_notes:
  revision_awareness: El texto griego/inglés de referencia no introduce cambios textuales ni notas doctrinales especiales; la edición revisada coincide en sentido con el hebreo masorético y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Siquem» como topónimo estándar en español bíblico.
  - Se prefiere «concubina» de manera consistente con el valor lexical de פִּילֶגֶשׁ.
  - Los nombres propios se transliteran con ortografía española cuando es posible y sin sustituirlos por títulos tradicionales.
