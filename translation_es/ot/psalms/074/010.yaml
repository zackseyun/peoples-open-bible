review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta la estructura básica de lamento y mantiene «tu nombre», pero no preserva fielmente varios detalles de la fuente y de la auditoría inglesa. El hebreo tiene una sola interrogación temporal inicial («¿Hasta cuándo...?»), seguida por «¿[Acaso] ... para siempre?», no una repetición explícita de «¿Hasta cuándo» en la segunda cola. Además, «revile» quedó sin traducir al español, y la alternancia léxica entre צָר y אוֹיֵב puede mantenerse mejor con «adversario» / «enemigo».
  spanish_quality_summary: 'La redacción actual suena poco natural en español bíblico moderno: «revile» no es español; «¿Hasta cuándo revile el adversario tu nombre para siempre?» es gramaticalmente incorrecto y pesado; y la nota al pie está mal formulada y anclada a una frase que no corresponde. Se necesita una reparación menor pero necesaria para legibilidad y corrección idiomática.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» es correcto para אֱלֹהִים. Se debe conservar «tu nombre». La distinción entre los dos términos de enemigo puede reflejarse en español con «adversario» y «enemigo».
  issues:
  - severity: high
    issue: Uso de «revile» en el texto español
    rationale: «Revile» es inglés, no español. Produce un error léxico y gramatical en la oración principal.
  - severity: high
    issue: La segunda pregunta no refleja bien la sintaxis hebrea ni la auditoría inglesa
    rationale: El hebreo dice «¿[Acaso] el enemigo despreciará/revilará tu nombre para siempre?», no «¿Hasta cuándo ... para siempre?». La duplicación de «¿Hasta cuándo» en la segunda cláusula distorsiona la forma del original y añade torpeza.
  - severity: medium
    issue: La nota al pie no corresponde exactamente a la alternativa inglesa auditada
    rationale: La nota inglesa ofrece la alternativa para «revile» como «blaspheme». En español debe presentarse como alternativa local al verbo de la segunda cláusula, no como una reformulación completa con «¿Hasta cuándo».
  - severity: low
    issue: Conviene distinguir los dos sustantivos paralelos de enemigo
    rationale: La auditoría inglesa diferencia צָר y אוֹיֵב. En español puede mantenerse con «adversario» y «enemigo» para reflejar el paralelismo sin aplanarlo.
  revised_spanish_text: ¿Hasta cuándo[a], oh Dios, reprochará el adversario? ¿Despreciará el enemigo tu nombre para siempre?
  revised_footnotes:
  - marker: a
    text: 'O: «¿Blasfemará el enemigo tu nombre para siempre?»'
    reason: lexical_alternative
  revision_rationale: Se corrige el error léxico grave («revile»), se ajusta la segunda cláusula a la sintaxis y sentido del hebreo y de la POB inglesa, y se preserva la alternativa léxica documentada para נאץ mediante una nota breve y natural en español. También se mejora el paralelismo distinguiendo «adversario» y «enemigo».
