translation:
  language: es
  text: 'Cuando el pueblo vio que Moisés tardaba en bajar del monte[a], el pueblo se reunió alrededor de Aarón y le dijo: «Levántate, haznos unos dioses que vayan delante de nosotros, porque este Moisés, el hombre que nos hizo subir de la tierra de Egipto, no sabemos qué ha sido de él».


    [a] O «un dios ... que vaya delante de nosotros». Algunos entienden אֱלֹהִים aquí en sentido singular porque el relato pronto se centra en una sola imagen de becerro, pero la forma hebrea y el verbo siguiente son plurales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dios ... que vaya delante de nosotros». Algunos entienden אֱלֹהִים aquí en sentido singular porque el relato pronto se centra en una sola imagen de becerro, pero la forma hebrea y el verbo siguiente son plurales.
    reason: alternative_reading
lexical_decisions:
- source_word: בֹשֵׁשׁ
  english_pob_choice: delayed
  chosen_spanish: tardaba
  alternatives_spanish:
  - se retrasaba
  - demoraba
  - tardaba mucho
  lexicon: HALOT
  rationale: El hebreo expresa demora en la bajada de Moisés. «Tardaba» comunica con naturalidad esa percepción del pueblo sin endurecer el registro con un tecnicismo.
- source_word: לָרֶדֶת
  english_pob_choice: to come down
  chosen_spanish: bajar
  alternatives_spanish:
  - descender
  - venir abajo
  lexicon: HALOT
  rationale: En español, «bajar del monte» es la forma natural y clara para el movimiento de Moisés desde la montaña.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  lexicon: HALOT
  rationale: «El monte» es una expresión bíblica natural en español y mantiene el referente definido del hebreo.
- source_word: וַיִּקָּהֵל ... עַל אַהֲרֹן
  english_pob_choice: gathered around Aaron
  chosen_spanish: se reunió alrededor de Aarón
  alternatives_spanish:
  - se congregó en torno a Aarón
  - se juntó alrededor de Aarón
  - se reunió contra Aarón
  lexicon: HALOT
  rationale: La idea es una reunión dirigida a Aarón. «Alrededor» preserva la escena y evita cargar de antemano una hostilidad que el hebreo no explicita en la preposición.
- source_word: ק֣וּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alza-te
  lexicon: HALOT
  rationale: El imperativo es abrupto y urgente. «Levántate» transmite bien esa fuerza en español bíblico y moderno.
- source_word: עֲשֵׂה לָנוּ
  english_pob_choice: make for us
  chosen_spanish: haznos
  alternatives_spanish:
  - haz para nosotros
  - fabrícanos
  - haznos para
  lexicon: HALOT
  rationale: El hebreo pide una acción a favor del grupo. «Haznos» conserva la concisión y la relación pragmática del mandato.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - un dios
  - Dios
  lexicon: HALOT
  rationale: La forma hebrea es plural y el verbo siguiente también es plural, así que el plural español respeta la gramática del texto. Se conserva la tensión narrativa con la imagen del becerro en la nota.
- source_word: אֲשֶׁר יֵלְכוּ לְפָנֵינוּ
  english_pob_choice: that will go before us
  chosen_spanish: que vayan delante de nosotros
  alternatives_spanish:
  - que irán delante de nosotros
  - para que vayan delante de nosotros
  - que nos precedan
  lexicon: HALOT
  rationale: «Vayan delante de nosotros» expresa con naturalidad la función guía solicitada. El subjuntivo refleja la petición y mantiene el valor funcional del relativo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - este hombre
  - ese hombre
  lexicon: HALOT
  rationale: «El hombre» reproduce la apposición hebrea y, junto con «este Moisés», conserva el matiz algo despectivo de la referencia.
- source_word: הֶעֱלָנוּ
  english_pob_choice: brought us up
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos hizo subir
  - nos llevó arriba
  lexicon: HALOT
  rationale: Aunque el verbo literal es «hacer subir», en el contexto del éxodo español fluido admite «nos sacó» para expresar el acto liberador desde Egipto sin perder el sentido direccional.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva la fórmula plena del hebreo. «Tierra de Egipto» mantiene el registro bíblico sin ser arcaizante.
- source_word: מֶה הָיָה לוֹ
  english_pob_choice: what has become of him
  chosen_spanish: qué le ha sucedido
  alternatives_spanish:
  - qué fue de él
  - qué ha sido de él
  - qué le pasó
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática y pide por el destino de Moisés. «Qué le ha sucedido» suena natural, formal y fiel a la intención.
theological_decisions:
- issue: האם אֱלֹהִים debe quedar en plural o singular
  english_pob_reading: 'plural: ''gods'''
  chosen_spanish_reading: 'plural: «dioses»'
  alternative_spanish_readings:
  - 'singular: «un dios»'
  - 'singular: «un dios que vaya delante de nosotros»'
  rationale: La morfología hebrea y el verbo plural siguiente sostienen claramente el plural. Aunque la escena terminará concentrándose en un solo ídolo, el español principal conserva la gramática del original y la tensión interpretativa queda documentada en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
- issue: Cómo reflejar el tono implícitamente despectivo de «זה משה האיש»
  english_pob_reading: this Moses, the man
  chosen_spanish_reading: «este Moisés, el hombre»
  alternative_spanish_readings:
  - «este Moisés»
  - «ese Moisés, el hombre»
  rationale: La apposición «el hombre» no es redundante; en español mantiene el gesto de señalar y rebajar a Moisés sin añadir explicaciones ajenas al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente en «delayed coming down» y «what has become of him», pero adapta los giros al español natural sin perder la gramática plural de אֱלֹהִים ni la construcción enfática de «este Moisés, el hombre».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no ocurre.
  - «Moisés», «Aarón» y «Egipto» se mantienen con las formas españolas estándar y reconocibles.
  - Se eligió «dioses» en el texto principal para respetar la morfología hebrea; la nota conserva la alternativa singular documentada por el POB inglés.
  - El imperativo y la petición se expresan en un español sobrio y bíblico, sin arcaísmos innecesarios.
