revisions:
- from: Si he pecado[a], ¿qué puedo hacerte, oh guardián de la humanidad[b]? ¿Por qué me has puesto como blanco[c] para ti, de modo que me he vuelto una carga para mí mismo?
  to: Si he pecado[a], ¿qué puedo hacerte, oh vigilante de la humanidad[b]? ¿Por qué me has hecho tu blanco[c], de modo que me he vuelto una carga para mí mismo[d]?
  rationale: La revisión mejora la fidelidad al hebreo y al audit trail del POB. 'Vigilante' conserva mejor la ambigüedad de נֹצֵר en un contexto de escrutinio divino. 'Tu blanco' es más idiomático que 'como blanco para ti' y coincide con la opción principal documentada, mientras la alternativa literal queda en nota. Además, se restituye la nota textual sobre la lectura alternativa de la cláusula final y se corrige la nota a para que aporte una verdadera alternativa.
