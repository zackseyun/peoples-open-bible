translation:
  language: es
  text: Si peco[a], tú me vigilas[b], y no me absolverás de mi iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si he pecado». El hebreo puede leerse con matiz perfecto, pero aquí se expresa la condición de manera vívida y abierta.'
    reason: alternative_reading
  - marker: b
    text: «Vigilar» aquí expresa escrutinio estrecho, no cuidado protector.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición real o hipotética sin resolverla de antemano; «si» conserva el valor condicional de אִם y encaja con el lamento de Job.
- source_word: חָטָ֥אתִי
  english_pob_choice: I sin
  chosen_spanish: yo pecara
  alternatives_spanish:
  - yo he pecado
  - yo pecase
  - yo pecara
  lexicon: HALOT
  rationale: En español, el subjuntivo en la prótasis condicional expresa mejor la hipótesis que el presente simple. Se evita fijar innecesariamente el tiempo del pecado y se mantiene la fuerza condicional del hebreo.
- source_word: וּשְׁמַרְתָּנִי
  english_pob_choice: you watch me
  chosen_spanish: tú me vigilas
  alternatives_spanish:
  - tú me guardas
  - tú me observas
  - tú me vigilas de cerca
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, vigilar u observar. Aquí el contexto es de escrutinio judicial, no de protección; «vigilar» comunica mejor esa vigilancia cercana.
- source_word: וּמֵעֲוֺנִי
  english_pob_choice: of my iniquity
  chosen_spanish: de mi iniquidad
  alternatives_spanish:
  - de mi culpa
  - por mi iniquidad
  - a causa de mi iniquidad
  lexicon: HALOT
  rationale: «Iniquidad» preserva el paralelo léxico con la frase final y mantiene el matiz moral/legal de עָוֹן sin reducirlo solo a «culpa» o solo a «castigo».
- source_word: לֹא תְנַקֵּנִי
  english_pob_choice: you will not acquit me
  chosen_spanish: no me absolverás
  alternatives_spanish:
  - no me declararás inocente
  - no me limpiarás
  - no me dejarás sin castigo
  lexicon: HALOT
  rationale: נקה en este contexto es forense. «Absolver» expresa la idea judicial de declarar libre de culpa mejor que una lectura puramente ritual como «limpiar».
theological_decisions:
- issue: Sentido forense de נקה
  english_pob_reading: 'forensic/judicial: ''you will not acquit me'''
  chosen_spanish_reading: 'forense/judicial: «no me absolverás»'
  alternative_spanish_readings:
  - «no me declararás inocente»
  - «no me limpiarás»
  - «no me dejarás sin castigo»
  rationale: 'El contexto es acusatorio y judicial: si Job peca, Dios lo vigila y no lo declara libre de culpa. «Absolver» conserva ese marco sin introducir una imagen purificadora predominante.'
  doctrine_reference: Job 10:14; HALOT נקה; marco judicial del discurso de Job
translation_notes:
  revision_awareness: El pasaje fue revisado y quedó sin cambios sustanciales en el último pase; la presente redacción sigue el acuerdo alto del control cruzado y mantiene la lectura forense de נקה y el valor de vigilancia de שׁמר.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - «Iniquidad» se conserva para reflejar el campo semántico legal-moral de עָוֹן.
  - Se mantiene una sintaxis española natural sin borrar la tensión entre pecado, vigilancia divina y absolución judicial.
