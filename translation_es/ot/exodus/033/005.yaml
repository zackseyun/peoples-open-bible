base_translation:
  language: en
  yaml_path: translation/ot/exodus/033/005.yaml
  text: And Yahweh said to Moses[a], “Say to the sons of Israel, ‘You are a stiff-necked people. If I were to go up in your midst for one moment, I would consume you. So now, take off your ornaments from upon you[e][d][c][b], that I may know what I will do to you.’”
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if I went up among you' or 'if I should go up in your midst.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I would destroy you.'
    reason: lexical_alternative
  - marker: d
    text: Or 'remove your jewelry from you' or 'lay aside your adornment.'
    reason: lexical_alternative
  - marker: e
    text: Hebrew 'and I will know what I should do with you'; the wording preserves the text's anthropomorphic expression rather than paraphrasing it as mere decision-making.
    reason: alternative_reading
