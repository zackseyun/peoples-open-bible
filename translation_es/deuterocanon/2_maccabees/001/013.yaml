    rationale: Aunque formalmente posible en ciertos registros, en español actual de lectura eclesial suena rígido. «Habían entrado» o «entraron» transmite mejor la circunstancia narrativa implícita en γενόμενος según la auditoría inglesa.
  - severity: low
    issue: La doble causalidad con «Porque ... porque» resulta algo pesada.
    rationale: No es incorrecta, pero «Porque ... ya que» mejora la fluidez sin alterar el sentido causal-instrumental del genitivo absoluto.
