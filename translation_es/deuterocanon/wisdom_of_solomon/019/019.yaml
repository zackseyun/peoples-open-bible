translation:
  language: es
  text: Pues las criaturas de la tierra fueron cambiadas en criaturas acuáticas[a], y las que nadan pasaron a la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las criaturas de la tierra fueron transformadas en criaturas acuáticas, y las que nadan cruzaron a la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χερσαῖα
  english_pob_choice: land creatures
  chosen_spanish: las criaturas de la tierra
  alternatives_spanish:
  - las criaturas terrestres
  - los seres de la tierra
  - las criaturas del suelo firme
  lexicon: LSJ
  rationale: El adjetivo/sustantivo griego designa lo perteneciente a la tierra firme. En español, «las criaturas de la tierra» conserva el contraste de hábitat con el agua sin sonar demasiado técnico o forzado.
- source_word: ἔνυδρα
  english_pob_choice: water creatures
  chosen_spanish: criaturas del agua
  alternatives_spanish:
  - criaturas acuáticas
  - seres del agua
  - animales acuáticos
  lexicon: LSJ
  rationale: La forma griega se refiere a seres vinculados con el agua. «Criaturas del agua» mantiene la correspondencia con «criaturas de la tierra» y evita introducir una terminología más científica que el texto no exige.
- source_word: μετεβάλλετο
  english_pob_choice: were changed
  chosen_spanish: fueron cambiadas
  alternatives_spanish:
  - fueron transformadas
  - cambiaban
  - eran cambiadas
  lexicon: LSJ
  rationale: El imperfecto medio/pasivo indica un cambio experimentado. «Fueron cambiadas» refleja ese hecho sin añadir connotaciones de metamorfosis total que el griego no especifica.
- source_word: νηκτά
  english_pob_choice: swimming creatures
  chosen_spanish: las que nadan
  alternatives_spanish:
  - criaturas nadadoras
  - seres que nadan
  - las nadadoras
  lexicon: LSJ
  rationale: El adjetivo sustantivado describe criaturas caracterizadas por nadar. «Las que nadan» conserva el valor descriptivo y suena natural en español, manteniendo el paralelismo con la primera cola.
- source_word: μετέβαινεν
  english_pob_choice: moved onto
  chosen_spanish: se pasaron a
  alternatives_spanish:
  - pasaron a
  - se trasladaron a
  - cruzaron a
  lexicon: LSJ
  rationale: El verbo expresa pasar de un ámbito a otro. «Se pasaron a» comunica el desplazamiento hacia la tierra con naturalidad en español y conserva la idea de transición.
- source_word: γῆς
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el suelo
  - la tierra seca
  lexicon: LSJ
  rationale: Dado el contraste explícito con el agua, «la tierra» funciona como equivalente natural en español y mantiene la oposición espacial del versículo.
theological_decisions:
- issue: Naturaleza del cambio descrito en la creación
  english_pob_reading: Describe un intercambio de hábitats de las criaturas sin precisar un mecanismo más allá del texto.
  chosen_spanish_reading: El versículo se traduce como una inversión o intercambio de ámbitos de vida, sin especificar si se trata de metamorfosis literal o de descripción fenomenológica.
  alternative_spanish_readings:
  - metamorfosis literal de las especies
  - descripción figurada del comportamiento de las criaturas
  rationale: El griego afirma que las criaturas terrestres fueron cambiadas en acuáticas y que las que nadan se trasladaron a la tierra. La traducción conserva esa imagen y su tensión sin imponer una explicación naturalista o alegórica que el texto no da.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «land animals/creatures of the water» a «land creatures/water creatures» para mayor correspondencia léxica. El español sigue esa dirección con «criaturas de la tierra» y «criaturas del agua», manteniendo la simetría semántica y el contraste de hábitats.
  spanish_consistency_notes:
  - Se mantiene «tierra»/«agua» como contraste central, evitando términos que introduzcan un matiz técnico innecesario.
  - La cola griega con participio sustantivado se vierte con una relativa breve («las que nadan») para conservar fluidez y paralelismo.
  - No se introduce «Cristo», terminología de pacto ni lenguaje doctrinal ajeno al versículo.
