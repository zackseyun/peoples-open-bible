translation:
  language: es
  text: Entonces también dieron a su padre vino para beber aquella noche, y la menor se levantó y se acostó con él; y él no supo cuándo ella se acostó ni cuándo se levantó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «él no supo de su acostarse ni de su levantarse».'
    reason: alternativa léxica más formal para las expresiones temporales finales
lexical_decisions:
- source_word: וַתַּשְׁקֶיןָ
  english_pob_choice: they gave ... to drink
  chosen_spanish: les dieron de beber
  alternatives_spanish:
  - hicieron beber
  - lo hicieron beber
  lexicon: HALOT
  rationale: El hiphil de שׁקה expresa causar a beber o dar de beber. En español, «dar de beber» conserva la fuerza causativa sin añadir la interpretación más fuerte de «emborrachar». Aunque el hebreo incluye «a su padre» como objeto, la construcción española natural requiere explicitar «les» para reflejar a las hijas como sujeto tácito del verbo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Marca continuidad narrativa con la noche anterior; «también» es la equivalencia más natural y directa en español.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa misma noche
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de forma idiomática como «aquella noche», que conserva la referencia deíctica sin sobrecargar la frase.
- source_word: אֶת אֲבִיהֶן יָיִן
  english_pob_choice: their father wine
  chosen_spanish: a su padre de beber vino
  alternatives_spanish:
  - vino a su padre
  - vino para su padre
  lexicon: HALOT
  rationale: El hebreo presenta al padre como receptor del vino causado a beber. En español, para sonar natural y mantener la relación semántica, se expresa con «darles de beber vino a su padre», aunque el orden se adapta a la sintaxis española.
- source_word: וַתָּקָם הַצְּעִירָה
  english_pob_choice: the younger arose
  chosen_spanish: la menor se levantó
  alternatives_spanish:
  - la más joven se levantó
  - la hija menor se levantó
  lexicon: HALOT
  rationale: הַצְּעִירָה significa «la menor / la más joven» en femenino. «La menor» es conciso y fiel; «se levantó» preserva la secuencia narrativa del verbo de acción.
- source_word: וַתִּשְׁכַּב עִמּוֹ
  english_pob_choice: lay with him
  chosen_spanish: se acostó con él
  alternatives_spanish:
  - se acostó con él sexualmente
  - durmió con él
  lexicon: HALOT
  rationale: El hebreo usa el idioma estándar para relación sexual. «Se acostó con él» es el equivalente español más reconocido y mantiene la sobriedad del original sin explicitar más de lo que el texto dice.
- source_word: וְלֹא יָדַע
  english_pob_choice: and he did not know
  chosen_spanish: y él no supo
  alternatives_spanish:
  - y él no sabía
  - y él no se dio cuenta
  lexicon: HALOT
  rationale: Aquí ידע denota falta de conciencia o conocimiento durante el acto. «No supo» funciona bien en español narrativo y conserva el valor cognitivo del verbo.
- source_word: בְּשִׁכְבָהּ
  english_pob_choice: when she lay down
  chosen_spanish: cuándo ella se acostó
  alternatives_spanish:
  - al acostarse ella
  - cuando ella se acostaba
  lexicon: HALOT
  rationale: El prefijo ב con infinitivo nominal tiene valor temporal. La POB inglesa preserva la ambigüedad formal con «when she lay down»; en español, «cuándo ella se acostó» mantiene esa relación temporal en estilo fluido.
- source_word: וּבְקֻמָהּ
  english_pob_choice: when she arose
  chosen_spanish: ni cuándo se levantó
  alternatives_spanish:
  - ni al levantarse
  - ni cuándo ella se levantó
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior y el sentido temporal. «Se levantó» mantiene la secuencia verbal y evita una construcción demasiado técnica.
theological_decisions:
- issue: Negro sexual implícito sin explicitar como una ampliación interpretativa
  english_pob_reading: lay with him / he did not know when she lay down or when she arose
  chosen_spanish_reading: se acostó con él; y él no supo cuándo ella se acostó ni cuándo se levantó
  alternative_spanish_readings:
  - durmió con él
  - tuvo relaciones con él
  - él no se dio cuenta de cuándo ella se acostó ni cuándo se levantó
  rationale: El texto hebreo usa el eufemismo estándar para relación sexual y, a la vez, un enunciado de desconocimiento. «Se acostó con él» preserva la forma idiomática sin hacer la interpretación más explícita que el texto no desarrolla. La traducción mantiene la tensión entre el eufemismo narrativo y la implicación sexual evidente.
  doctrine_reference: Fidelidad semántica al eufemismo hebreo y a la narración bíblica sin ampliación explicativa
- issue: Valor de ידע como conocimiento/conciencia
  english_pob_reading: he did not know
  chosen_spanish_reading: él no supo
  alternative_spanish_readings:
  - él no sabía
  - él no se dio cuenta
  rationale: En este contexto, ידע apunta a ausencia de conciencia durante la acción, no a ignorancia abstracta. «No supo» conserva la sobriedad narrativa y deja abierta la precisión expresada por la continuación temporal.
  doctrine_reference: Uso contextual de ידע en narración hebrea
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de sentido importantes; la principal adaptación fue la sintaxis española para expresar de forma natural la relación causativa de שׁקה y el paralelismo temporal final. No se introdujeron revisiones textuales ni variantes manuscritas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «la menor» para הַצְּעִירָה, consistente con el registro narrativo y el contraste fraternal.
  - Se prefirió «se acostó con él» como equivalente idiomático sobrio para el eufemismo sexual hebreo.
  - La nota al pie conserva la alternativa formal del inglés POB sin sobrecargar el texto principal.
