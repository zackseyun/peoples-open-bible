translation:
  language: es
  text: Ahora, ven[a]; por favor, déjame aconsejarte[b], y salva tu vida[c] y la vida de tu hijo Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un verbo básico de «ir», pero en este llamado directo funciona idiomáticamente como una invitación o llamado urgente; en español, «ven» comunica mejor ese valor pragmático.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «te aconsejaré consejo», una construcción cognada que significa «darte consejo» o «aconsejarte».
    reason: lexical_alternative
  - marker: c
    text: Aquí נפשׁ significa «vida», no «alma»; el contexto es la preservación de la vida ante un peligro real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce un cambio urgente en el discurso. «Ahora» transmite con naturalidad el valor discursivo de transición inmediata sin forzar una coordinación literal innecesaria.
- source_word: לְכִי
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ve
  lexicon: HALOT
  rationale: En una exhortación directa, el verbo hebreo funciona como una súplica o llamada urgente. «Ven» conserva bien la fuerza conversacional que la POB inglesa expresó con «come».
- source_word: אִיעָצֵךְ נָא עֵצָה
  english_pob_choice: please let me advise you
  chosen_spanish: te ruego, déjame aconsejarte
  alternatives_spanish:
  - permíteme aconsejarte, por favor
  - déjame darte consejo
  lexicon: HALOT
  rationale: El hebreo usa una construcción cognada de verbo + sustantivo para enfatizar el acto de aconsejar. En español, «aconsejarte» comunica esa idea de forma natural; «te ruego» refleja la súplica/politeness de נָא sin introducir una repetición forzada.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - ahora
  lexicon: HALOT
  rationale: Aquí expresa ruego e insistencia, más que tiempo. «Te ruego» es una opción reverente y natural en español bíblico contemporáneo, y conserva la urgencia interpersonal del original.
- source_word: וּמַלְּטִי
  english_pob_choice: and save
  chosen_spanish: y salva
  alternatives_spanish:
  - y libra
  - y rescata
  lexicon: HALOT
  rationale: El imperativo de מלט implica librar/preservar de un peligro mortal. «Salva» mantiene la fuerza práctica y se ajusta a la redacción inglesa auditada, sin perder la idea de rescate.
- source_word: נַפְשֵׁךְ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: HALOT
  rationale: En este contexto político y de peligro inmediato, נֶפֶשׁ se refiere a la vida misma, no a un alma inmaterial. «Tu vida» preserva la lectura contextual de la POB inglesa.
- source_word: וְאֶת נֶפֶשׁ בְּנֵךְ שְׁלֹמֹה
  english_pob_choice: and the life of your son Solomon
  chosen_spanish: y la vida de tu hijo Salomón
  alternatives_spanish:
  - y la vida de Salomón, tu hijo
  - y la vida de tu hijo, Salomón
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «tu vida» y conserva el nombre propio explícito. «La vida de tu hijo Salomón» suena natural en español y refleja fielmente el hebreo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el trazado auditado de la POB inglesa y del hebreo: conserva la secuencia discursiva, reproduce la invitación urgente con el valor idiomático de לְכִי, y mantiene la lectura contextual de נֶפֶשׁ como «vida». No se identificaron cambios de revisión necesarios respecto al pasaje base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene «Salomón» como nombre propio establecido.
  - Se evita «alma» para נֶפֶשׁ por el contexto de amenaza física y política.
  - La puntuación y el orden siguen una sintaxis natural para español bíblico moderno sin perder la estructura del original.
