translation:
  language: es
  text: Y fue con esplendor a Ptolemaida[a], y se encontró con los dos reyes; y les dio plata y oro, y muchos regalos a sus amigos[b], y halló favor ante ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gloria» o «con pompa»; la frase griega μετὰ δόξης denota una llegada con honor o magnificencia visible.
    reason: lexical_alternative
  - marker: b
    text: «Amigos» puede referirse más específicamente a asociados reales o cortesanos en un contexto helenístico de corte.
    reason: cultural_note
  - marker: c
    text: O «halló favor con ellos» o «ganó su favor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue de camino
  - viajó
  - procedió
  lexicon: LSJ
  rationale: El aoristo narrativo de movimiento se vierte de manera natural con «fue», que conserva la simplicidad del relato sin añadir matices no presentes en el griego.
- source_word: μετὰ δόξης
  english_pob_choice: with splendor
  chosen_spanish: con esplendor
  alternatives_spanish:
  - con gloria
  - con pompa
  - en estado
  lexicon: LSJ
  rationale: «Con esplendor» comunica la idea de una llegada pública y magnífica. Mantiene la fuerza de honor visible sin cargar el término con un matiz exclusivamente teológico.
- source_word: Πτολεμαΐδα
  english_pob_choice: Ptolemais
  chosen_spanish: Ptolemaida
  alternatives_spanish:
  - Ptolemais
  lexicon: convención onomástica
  rationale: Se usa la forma castellana habitual del topónimo, manteniendo la identificación histórica del lugar.
- source_word: ἀπήντησεν
  english_pob_choice: met
  chosen_spanish: salió al encuentro de
  alternatives_spanish:
  - se encontró con
  - se reunió con
  - fue a recibir a
  lexicon: LSJ
  rationale: El verbo puede implicar salir al encuentro. Aquí esa opción reproduce mejor el valor relacional y ceremonial del encuentro diplomático.
- source_word: τοῖς δυσὶν βασιλεῦσιν
  english_pob_choice: the two kings
  chosen_spanish: los dos reyes
  alternatives_spanish:
  - ambos reyes
  lexicon: LSJ
  rationale: La expresión directa «los dos reyes» refleja fielmente el artículo con numeral del griego y conserva la referencia específica del par ya conocido.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les entregó
  - les presentó
  lexicon: LSJ
  rationale: «Dar» es el verbo básico y suficiente; el contexto cortesano ya sugiere que se trata de una entrega formal de presentes.
- source_word: ἀργύριον καὶ χρυσίον
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  lexicon: LSJ
  rationale: La traducción literal de los materiales preserva el paralelismo y evita sustituir el valor concreto por una generalización monetaria.
- source_word: τοῖς φίλοις αὐτῶν
  english_pob_choice: to their friends
  chosen_spanish: a sus amigos
  alternatives_spanish:
  - a sus compañeros
  - a sus cortesanos
  - a sus allegados
  lexicon: LSJ
  rationale: Se mantiene el sentido base de φίλοι como «amigos», tal como permite el texto griego. La posible acepción cortesana queda mejor reservada para nota, no para el cuerpo del versículo.
- source_word: δόματα πολλά
  english_pob_choice: many gifts
  chosen_spanish: muchos dones
  alternatives_spanish:
  - muchos regalos
  - numerosos presentes
  lexicon: LSJ
  rationale: «Dones» conserva un registro digno y bíblico sin perder el sentido de obsequios numerosos; además refleja bien la redacción nominal del griego.
- source_word: εὗρεν χάριν ἐναντίον αὐτῶν
  english_pob_choice: found favor before them
  chosen_spanish: halló favor delante de ellos
  alternatives_spanish:
  - halló favor con ellos
  - ganó su favor
  lexicon: LSJ
  rationale: «Delante de ellos» reproduce con bastante cercanía el valor de ἐναντίον y mantiene el tono formal de la relación de corte. «Halló favor» conserva la idiomática bíblica sin suavizarla excesivamente.
translation_notes:
  revision_awareness: El texto español sigue la revisión del inglés que reordenó «many gifts to their friends» para reflejar con más naturalidad el griego; por eso se conserva «muchos dones a sus amigos» dentro de la misma secuencia sintáctica. También se tuvo en cuenta la oscilación auditada de μετὰ δόξης y del giro idiomático εὗρεν χάριν ἐναντίον αὐτῶν.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece el título en el texto.
  - Se prefirió «dones» a «regalos» por registro bíblico, pero sin desplazar el sentido concreto de obsequios.
  - Se usó «Ptolemaida» como forma castellanizada y reconocible para lectores hispanohablantes.
