translation:
  language: es
  text: 'Con respecto a Damasco: Hamat y Arpad quedan avergonzadas, porque han oído una mala noticia; se deshacen. Hay ansiedad como el mar[a]; no puede aquietarse.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: literalmente, «en/como el mar, ansiedad; no puede aquietarse». La línea puede significar o bien que su ansiedad es como el mar inquieto, o bien que hay ansiedad junto al mar y no puede ser calmado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדַמֶּשֶׂק
  english_pob_choice: Concerning Damascus
  chosen_spanish: Con respecto a Damasco
  alternatives_spanish:
  - Contra Damasco
  - De Damasco
  lexicon: HALOT
  rationale: El לְ inicial en un encabezado oracular introduce el tema del anuncio. En español, 'Con respecto a' preserva ese valor amplio mejor que una traducción estrictamente adversativa, aunque el contexto sea de juicio.
- source_word: בּוֹשָׁה
  english_pob_choice: are put to shame
  chosen_spanish: quedan avergonzadas
  alternatives_spanish:
  - son avergonzadas
  - quedan confundidas
  lexicon: HALOT
  rationale: El verbo comunica vergüenza pública o deshonra. 'Quedan avergonzadas' mantiene el matiz resultativo y encaja con el sujeto compuesto Hamat y Arpad.
- source_word: חֲמָת וְאַרְפָּד
  english_pob_choice: Hamath and Arpad
  chosen_spanish: Hamat y Arpad
  alternatives_spanish:
  - Jamat y Arpad
  lexicon: HALOT
  rationale: Son nombres propios geográficos; se transliteran de forma directa y estable para lectura e identificación histórica.
- source_word: שְׁמֻעָה רָעָה
  english_pob_choice: bad news
  chosen_spanish: una mala noticia
  alternatives_spanish:
  - una noticia desastrosa
  - un mal informe
  lexicon: HALOT
  rationale: La expresión señala un anuncio de calamidad. 'Una mala noticia' transmite bien el sentido natural sin añadir precisiones que el hebreo no exige.
- source_word: שָׁמְעוּ
  english_pob_choice: they have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  lexicon: HALOT
  rationale: 'El perfecto en español expresa el estado resultante: han recibido la noticia y ahora reaccionan ante ella.'
- source_word: נָמֹגוּ
  english_pob_choice: they melt away
  chosen_spanish: se derriten
  alternatives_spanish:
  - se desmayan
  - pierden el ánimo
  lexicon: HALOT
  rationale: El hebreo usa una imagen vívida de disolución o derretimiento, no solo desánimo. 'Se derriten' conserva esa fuerza poética.
- source_word: בַּיָּם
  english_pob_choice: like the sea
  chosen_spanish: como la del mar
  alternatives_spanish:
  - como el mar
  - en el mar
  lexicon: HALOT
  rationale: La construcción es difícil y admite varias lecturas. En español, 'como la del mar' conserva la comparación y deja abierta la ambigüedad entre una ansiedad semejante al mar y una ansiedad asociada al mar.
- source_word: דְּאָגָה
  english_pob_choice: anxiety
  chosen_spanish: ansiedad
  alternatives_spanish:
  - angustia
  - temor
  lexicon: HALOT
  rationale: El sustantivo denota preocupación, zozobra o temor. 'Ansiedad' es la equivalencia más natural y precisa en este contexto poético.
- source_word: הַשְׁקֵט לֹא יוּכָל
  english_pob_choice: it cannot be quiet
  chosen_spanish: no puede aquietarse
  alternatives_spanish:
  - no puede estar quieta
  - no puede calmarse
  lexicon: HALOT
  rationale: El infinitivo con יכול expresa incapacidad de llegar a estar quieto. 'Aquietarse' permite una frase idiomática en español y conserva la imagen de inquietud.
theological_decisions:
- issue: Ambigüedad poética de בַּיָּם ('like the sea' / 'in the sea')
  english_pob_reading: The line may mean either that their anxiety is like the restless sea, or that there is anxiety at the sea and it cannot be calmed.
  chosen_spanish_reading: Hay ansiedad como la del mar; no puede aquietarse.
  alternative_spanish_readings:
  - Hay ansiedad en el mar; no puede aquietarse.
  - Hay ansiedad como el mar; no puede aquietarse.
  rationale: La frase hebrea es difícil y el texto inglés preserva la tensión interpretativa. La redacción elegida mantiene la comparación con el mar sin cerrar por completo la posibilidad locativa, y conserva el ritmo poético del juicio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo consonante y la auditoría inglesa POB. No se requiere revisión adicional: el punto principal es la ambigüedad de בַּיָּם, que se conserva en español mediante una formulación que no la resuelve de manera excesiva.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; aquí no ocurre.
  - Se mantiene la transliteración de topónimos y la dicción profética sobria.
  - Se evita 'SEÑOR' y también se evita una traducción excesivamente interpretativa de la imagen del mar.
