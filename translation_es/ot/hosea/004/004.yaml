translation:
  language: es
  text: Sin embargo, que nadie contienda[a], ni nadie reprenda[b], porque tu pueblo es como los que contienden con un sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «litigue» o «dispute»; el hebreo ריב puede abarcar contienda, disputa o reclamación jurídica.
    reason: lexical_alternative
  - marker: b
    text: «Reprenda» refleja el sentido de corrección o reproche de יכח; en este paralelismo también puede traducirse «corrija» o «amoneste».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Y sin embargo
  lexicon: HALOT
  rationale: Expresa bien el giro adversativo fuerte del hebreo y suena natural en español bíblico contemporáneo.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  - alguien
  lexicon: HALOT
  rationale: Aunque el hebreo usa אִישׁ en singular genérico, en español una formulación impersonal evita una repetición torpe y conserva la fuerza universal de la prohibición.
- source_word: יָרֵב
  english_pob_choice: let no man contend
  chosen_spanish: contienda
  alternatives_spanish:
  - litigue
  - dispute
  - se enfrente
  lexicon: HALOT
  rationale: ‘Contender’ mantiene el valor de disputa o reclamación legal/interpersonal que el audit trail destaca.
- source_word: יוֹכַח
  english_pob_choice: reprove
  chosen_spanish: reprenda
  alternatives_spanish:
  - repruebe
  - corrija
  - amoneste
  lexicon: HALOT
  rationale: ‘Reprender’ recoge el sentido de corrección/reproche de יכח y funciona con el paralelismo de la línea poética.
- source_word: וְעַמְּךָ
  english_pob_choice: for your people
  chosen_spanish: porque tu pueblo
  alternatives_spanish:
  - y tu pueblo
  - pues tu pueblo
  - ya que tu pueblo
  lexicon: HALOT
  rationale: El hebreo introduce la razón de la prohibición; ‘porque’ explicita esa relación causal en español sin añadir contenido nuevo.
- source_word: כִּמְרִיבֵי
  english_pob_choice: are like those who contend
  chosen_spanish: es como los que contienden
  alternatives_spanish:
  - es como contenciosos
  - es como disputadores
  - es como quienes se enfrentan
  lexicon: HALOT
  rationale: La comparación se conserva de manera directa y el participio se vierte con un relativo natural en español.
- source_word: כֹהֵן
  english_pob_choice: a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - un sacerdote sacerdotal
  - el sacerdote
  lexicon: HALOT
  rationale: En español, ‘sacerdote’ es la equivalencia más natural y transparente para כֹהֵן en este contexto comparativo; ‘un’ mantiene el matiz genérico.
theological_decisions:
- issue: Naturaleza de la comparación final
  english_pob_reading: A simile describing the people's rebellious refusal of correction by comparing them to people who dispute priestly authority.
  chosen_spanish_reading: Una comparación que presenta al pueblo como rebelde al corrección, al asemejarlo a quienes contienden con un sacerdote.
  alternative_spanish_readings:
  - Una alusión más específica a la ley deuteronómica sobre resistir el juicio sacerdotal
  - Una imagen de pleito de pacto que califica al pueblo como opositor de los sacerdotes
  rationale: La traducción mantiene la simetría comparativa y no resuelve la tensión interpretativa entre una rebeldía general y una referencia legal más precisa.
  doctrine_reference: Preservar la tensión interpretativa sin sobreexplicarla en el texto principal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente ambas notas al texto español mediante los marcadores [a] y [b]. La redacción principal evita depender mecánicamente del inglés y conserva la ambigüedad lexical de ריב/יכח.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal entre ‘contienda’ y ‘reprenda’.
  - Se usa ‘pueblo’ en singular colectivo, coherente con el hebreo.
  - ‘Sacerdote’ se emplea como equivalente natural de כֹהֵן sin convertirlo en un término eclesiástico más cargado.
