translation:
  language: es
  text: 'Así dice el Señor Yahvé: Golpea tu mano[a] y da un pisotón[b], y di: «¡Ay!»[c] por causa de todas las malvadas abominaciones[d] de la casa de Israel, que caerán por la espada, por el hambre y por la peste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aplaude». El hebreo puede referirse a golpear la palma como un gesto enfático.
    reason: lexical_alternative
  - marker: b
    text: Lit. «golpea con tu pie» o «estampa tu pie»; el sentido es un gesto enfático de golpear el suelo con el pie.
    reason: lexical_clarification
  - marker: c
    text: El hebreo אָח puede traducirse «¡Ay!» o «¡Ah!»; aquí expresa lamento por el juicio venidero.
    reason: lexical_alternative
  - marker: d
    text: O «sobre todas las malvadas abominaciones de la casa de Israel».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español se distingue con ‘Señor’ para אֲדֹנָי y ‘Yahvé’ para el nombre del pacto, evitando la máscara ‘SEÑOR’ y conservando la diferencia que el POB auditado busca preservar.
- source_word: הַכֵּה בְכַפְּךָ
  english_pob_choice: Strike your hand
  chosen_spanish: Golpea tu mano
  alternatives_spanish:
  - Aplaude
  - Golpea con tu palma
  lexicon: HALOT
  rationale: נכה con כַּף aquí describe un gesto físico enfático. ‘Golpea tu mano’ conserva la fuerza del signo profético sin convertirlo necesariamente en un aplauso idiomático más interpretativo.
- source_word: וּרְקַע בְּרַגְלְךָ
  english_pob_choice: stamp your foot
  chosen_spanish: golpea tu pie
  alternatives_spanish:
  - zapatea
  - pisa con fuerza tu pie
  lexicon: HALOT
  rationale: רקע expresa golpear o estampar con el pie. ‘Golpea tu pie’ mantiene el paralelismo con ‘golpea tu mano’ y el carácter visible del acto; ‘zapatea’ sería más idiomático, pero algo menos literal.
- source_word: וֶאֱמָר אָח
  english_pob_choice: say, “Alas!”
  chosen_spanish: 'y di: «¡Ay!»'
  alternatives_spanish:
  - 'y di: «¡Ah!»'
  - 'y di: «¡Ay de mí!»'
  lexicon: HALOT
  rationale: אָח es una interjección de lamento en contexto profético. ‘¡Ay!’ comunica duelo o pesar en español con naturalidad; ‘¡Ah!’ es posible, pero menos explícito, y ‘¡Ay de mí!’ añade un sujeto que el hebreo no exige.
- source_word: אֶל כָּל תּוֹעֲב֥וֹת רָע֖וֹת
  english_pob_choice: because of all the evil abominations
  chosen_spanish: por causa de todas las abominaciones malas
  alternatives_spanish:
  - sobre todas las abominaciones malas
  - contra todas las abominaciones malas
  lexicon: HALOT
  rationale: אֶל tras la exclamación puede señalar el motivo o el objeto de la lamentación. ‘Por causa de’ hace claro en español el valor causal; ‘abominaciones’ retiene el peso cultual y moral de תּוֹעֲבוֹת, y ‘malas’ reproduce רָעוֹת sin suavizarlo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la casa de los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión pactual y colectiva ‘casa de Israel’, más cercana al hebreo que una simple referencia a ‘Israel’.
- source_word: אֲשֶׁר ... יִפֹּלוּ
  english_pob_choice: who will fall
  chosen_spanish: que caerán
  alternatives_spanish:
  - que van a caer
  - los cuales caerán
  lexicon: HALOT
  rationale: El relativo introduce a la colectividad de Israel como los que sufrirán el juicio. ‘Caerán’ preserva el futuro de juicio de יִפֹּלוּ con fluidez natural en español.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדֶּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: por la espada, por el hambre y por la peste
  alternatives_spanish:
  - por la espada, por la hambruna y por la peste
  - a espada, de hambre y de peste
  lexicon: HALOT
  rationale: Se mantiene la tríada profética de juicio. ‘Espada’ traduce la metonimia bélica; ‘hambre’ comunica bien רָעָב en español actual, aunque ‘hambruna’ también sería posible; ‘peste’ ofrece una equivalencia clara y solemne para דֶּבֶר.
theological_decisions:
- issue: Nombre divino en la fórmula profética אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El POB auditado distingue el nombre del pacto del título, y la política del proyecto pide Yahvé para יְהוָה. En español, ‘el Señor Yahvé’ conserva esa distinción sin recurrir a la convención de ‘SEÑOR’ como máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, incluyendo la decisión de mantener el gesto corporal enfático y el valor de lamento de אָח. No se adoptó la opción más interpretativa de ‘Aplaude’ en el texto principal, pero se dejó como alternativa de nota. La traducción del nombre divino se alineó con la directriz del proyecto para יְהוָה como ‘Yahvé’.
  spanish_consistency_notes:
  - Se preservó la tríada judicial ‘espada, hambre y peste’ con paralelismo preposicional claro en español.
  - ‘Casa de Israel’ se mantuvo como expresión pactual estable.
  - La interjección se normalizó como ‘¡Ay!’, evitando añadir contenido no presente en el hebreo.
