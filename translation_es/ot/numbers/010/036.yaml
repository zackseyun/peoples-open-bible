translation:
  language: es
  text: 'Y al reposar, solía decir: «Vuelve, Yahvé, a las miríadas de los millares de Israel[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las miríadas de los millares de Israel», una expresión enfática para los vastos números de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/נֻחֹה
  english_pob_choice: And when it came to rest
  chosen_spanish: Y al reposar[a]
  alternatives_spanish:
  - Y cuando reposó
  - Y cuando llegó a reposar
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula temporal con la idea de descanso o asentamiento. En español, «al reposar» conserva la relación temporal y el matiz de detenerse a descansar sin sonar forzado.
- source_word: יֹאמַר
  english_pob_choice: he would say
  chosen_spanish: dirá
  alternatives_spanish:
  - decía
  - solía decir
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa una acción habitual o repetida en este contexto. «Dirá» mantiene la forma verbal directa y natural en español, mientras que el valor iterativo queda apoyado por el contexto narrativo.
- source_word: שׁוּבָה
  english_pob_choice: Return
  chosen_spanish: Vuelve[b]
  alternatives_spanish:
  - Vuélvete
  - Regresa
  lexicon: HALOT
  rationale: El imperativo de שוב pide el retorno de Yahvé a la presencia de su pueblo. «Vuelve» es claro y fiel; «regresa» también sería posible, pero «vuelve» suena más sobrio y directo en una invocación litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton en la forma española establecida por el proyecto: «Yahvé», en vez de sustituirlo por un título.'
- source_word: רִבְבֹות
  english_pob_choice: myriads
  chosen_spanish: miríadas
  alternatives_spanish:
  - miriadas
  - decenas de miles
  lexicon: HALOT
  rationale: «Miríadas» reproduce el sentido de número muy grande y mantiene un registro elevado. En español, esta forma es transparente y corresponde bien al valor retórico del término.
- source_word: אַלְפֵי
  english_pob_choice: the thousands of
  chosen_spanish: los millares de
  alternatives_spanish:
  - los miles de
  - los grupos de
  lexicon: HALOT
  rationale: Aquí אֶלֶף conserva el valor numérico de «millares» dentro de la acumulación enfática del hebreo. «Millares» mantiene mejor el paralelismo con «miríadas» que opciones más libres.
- source_word: רִבְבֹות אַלְפֵי יִשְׂרָאֵל
  english_pob_choice: the myriads of the thousands of Israel
  chosen_spanish: las miríadas de los millares de Israel
  alternatives_spanish:
  - las incontables decenas de millares de Israel
  - las muchísimas multitudes de Israel
  lexicon: HALOT
  rationale: La acumulación hebrea de dos términos de gran número se conserva en español para no diluir la fuerza enfática del original. «Miríadas de los millares» refleja la construcción con la mayor fidelidad posible sin volverla opaca.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» sigue la convención del proyecto y preserva el nombre personal de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y ninguna revisión aplicada; por eso se conserva la estructura breve del hebreo y la acumulación enfática de términos de cantidad, ajustando solo la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - «Miríadas» y «millares» reproducen la tensión numérica del hebreo sin resolverla en una sola expresión más vaga.
  - El verbo principal se presenta en futuro simple («dirá») para reflejar el imperfecto habitual del hebreo en un estilo bíblico natural en español.
