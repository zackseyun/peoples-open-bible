translation:
  language: es
  text: ¿Y quién tomará de todo lo que has hecho, si no das?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λήψεται
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - tomará para sí
  lexicon: LSJ
  rationale: Conserva el futuro indicativo del griego y mantiene el enlace retórico con 5:4, donde λήψεται se usa con el sentido de 'tomar'. En español, 'tomará' es natural y puede abarcar la idea de tomar o recibir según el contexto.
- source_word: ἀπὸ πάντων ὧν ἐποίησας
  english_pob_choice: from all that you have made
  chosen_spanish: de entre todo lo que tú has hecho
  alternatives_spanish:
  - de entre todo lo que has hecho
  - de todo lo que tú has hecho
  - de entre todo lo que tú has creado
  lexicon: LSJ
  rationale: '''De entre'' refleja mejor ἀπὸ con un conjunto total, y ''todo lo que tú has hecho'' sigue de cerca ἐποίησας sin forzar una noción más técnica como ''crear''. Se conserva la amplitud de πάντων.'
- source_word: δῷς
  english_pob_choice: give
  chosen_spanish: das
  alternatives_spanish:
  - concedes
  - otorgas
  - das algo
  lexicon: LSJ
  rationale: El griego usa un aoristo subjuntivo en una cláusula condicional con εἰ μὴ; en español, 'si no das' comunica con claridad la condición absoluta sin añadir un objeto implícito que el texto griego no expresa explícitamente.
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó el objeto implícito ('it') para acercarse más al griego, que deja δῷς absoluto. La versión española también evita añadir un objeto, manteniendo la misma sobriedad sintáctica.
  spanish_consistency_notes:
  - Se preservó el paralelismo conceptual con el contexto inmediato de 'tomar' frente a 'dar'.
  - Se evitó 'recibirá' para no debilitar el eco léxico de λήψεται en el verso anterior del argumento.
  - Se mantuvo un español publicable y natural, sin introducir terminología eclesiástica ajena al griego.
