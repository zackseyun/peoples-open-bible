translation:
  language: es
  text: cuajada del ganado, y leche del rebaño, con la grasa de corderos, y carneros, hijos de Basán, y machos cabríos, con la grasa de los riñones del trigo[a]; y bebiste vino espumoso[b], la sangre de las uvas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la grasa de los riñones del trigo», un modismo para el trigo más fino o más rico.'
    reason: lexical_alternative
  - marker: b
    text: O «vino rojo»; el término hebreo puede sugerir vino intensamente fermentado o espumoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאַת
  english_pob_choice: curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - mantequilla
  - crema
  lexicon: HALOT
  rationale: El término designa un producto lácteo espeso; en español, «cuajada» comunica mejor esa consistencia pastoral sin importar una mantequilla moderna que sería menos probable históricamente.
- source_word: בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - del hato
  - de las reses
  lexicon: HALOT
  rationale: La expresión hebrea es colectiva y se refiere al ganado vacuno en conjunto. «Del ganado» es natural y conserva la referencia genérica.
- source_word: חֲלֵב צֹאן
  english_pob_choice: milk from the flock
  chosen_spanish: leche del rebaño
  alternatives_spanish:
  - leche del ganado menor
  - leche de ovejas
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor; «rebaño» conserva el sentido pastoral y no fuerza una especificación de ovejas que el hebreo no exige aquí.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - riqueza
  lexicon: HALOT
  rationale: En este contexto alimentario y poético, «grasa» mantiene la imagen concreta de abundancia. «Sebo» suena más técnico y «riqueza» sería demasiado interpretativo.
- source_word: כָּרִים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - carneros jóvenes
  - borregos
  lexicon: HALOT
  rationale: El término puede referirse a ovejas jóvenes o engordadas; «corderos» es claro y natural en español dentro de esta lista de provisiones.
- source_word: אֵילִים בְּנֵי בָשָׁן
  english_pob_choice: rams, offspring of Bashan
  chosen_spanish: carneros, hijos de Basán
  alternatives_spanish:
  - carneros de Basán
  - carneros, descendencia de Basán
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «hijos/descendencia de Basán»; «hijos de Basán» preserva la forma y sugiere animales criados en esa región fértil sin borrar el sabor original.
- source_word: עַתּוּדִים
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - chivos
  - cabras
  lexicon: HALOT
  rationale: El término suele designar cabríos machos. «Machos cabríos» mantiene la precisión léxica y el tono elevado del pasaje.
- source_word: חֵלֶב כִּלְיוֹת חִטָּה
  english_pob_choice: the fat of the kidneys of wheat
  chosen_spanish: la grasa de los riñones del trigo
  alternatives_spanish:
  - el sebo de los riñones del trigo
  - la mejor parte del trigo
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea casi al pie de la letra porque el inglés POB decidió no nivelarla. En español, la imagen resulta igualmente extraña pero auditable, y eso ayuda a preservar la intensidad poética del hebreo.
- source_word: דַם עֵנָב
  english_pob_choice: the blood of grapes
  chosen_spanish: la sangre de las uvas
  alternatives_spanish:
  - el jugo de las uvas
  - la sangre del racimo
  lexicon: HALOT
  rationale: La metáfora se conserva para no perder la fuerza poética. «Sangre de las uvas» refleja directamente la expresión hebrea y sugiere el color y la vida del mosto o del vino.
- source_word: חָמֶר
  english_pob_choice: foaming wine
  chosen_spanish: vino espumoso
  alternatives_spanish:
  - vino fermentado
  - vino rojo
  lexicon: HALOT
  rationale: El término puede evocar vino vivo, efervescente o en fermentación. «Vino espumoso» comunica esa vivacidad en español mejor que una simple traducción genérica.
theological_decisions:
- issue: Mantener la imaginería concreta de abundancia sin espiritualizarla
  english_pob_reading: The verse catalogs YHWH's provision in concrete foods and drink, not an abstract blessing paraphrase.
  chosen_spanish_reading: El versículo enumera provisiones concretas de comida y bebida, no una paráfrasis abstracta de prosperidad.
  alternative_spanish_readings:
  - provisión abundante
  - bendición material
  rationale: La traducción conserva la lista material y poética del hebreo. No se sustituye por una abstracción devocional, porque la fuerza del texto está precisamente en la abundancia tangible.
  doctrine_reference: Principio de primacía de la fuente original; preservar la tensión poética sin resolverla interpretativamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que restauró la imagen explícita de «the fat of the kidneys of wheat» y mantuvo «the blood of grapes» en aposición a «foaming wine». La versión española sigue esa decisión, evitando la paráfrasis «la mejor parte del trigo» y preservando la metáfora de la sangre de las uvas. También se reflejó la cadencia del listado poético y se evitó suavizar la imaginería agrícola.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente en el versículo; aquí no aparece.
  - Se eligió «Basán» con acento gráfico español.
  - Se preservó la metáfora «sangre de las uvas» por coherencia con el texto fuente y con el audit trail en inglés.
  - «Machos cabríos» traduce con precisión el matiz masculino de עַתּוּדִים.
  - La puntuación sigue la enumeración poética del hebreo y del inglés POB, con punto y coma antes de la cláusula final.
