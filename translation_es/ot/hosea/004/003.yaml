    reason: alternative_reading
  - marker: b
    text: O 'son arrebatados' o, más literalmente, 'son reunidos'. El sentido es que aun los peces son removidos bajo el juicio descrito.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para reflejar con más claridad la decisión documentada sobre הָאָרֶץ y su alternativa léxica. Se cambia 'son recogidos' por 'son quitados' para comunicar de forma natural en español la idea de remoción bajo juicio que el POB inglés auditó para יֵאָסֵפוּ, manteniendo en la nota la opción más literal 'reunidos'.
