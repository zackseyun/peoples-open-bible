  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: בְּחָכְמָה / וּבִתְבוּנָה se entienden correctamente como medio instrumental, יִבָּנֶה mantiene el valor gnómico de proverbio, בַּיִת se conserva como «casa», y יִתְכּוֹנָן se traduce adecuadamente en sentido de quedar establecido/afianzado. La única corrección necesaria es de anclaje y ajuste de notas para que correspondan a las decisiones léxicas documentadas y evitar ampliar de más «house» a «familia» en el texto de nota.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Con sabiduría se edifica una casa, y con entendimiento se establece» fluye bien en registro sapiencial. Sin embargo, la nota [a] puede afinarse para alinearse mejor con la explicación inglesa: «hogar» es aceptable como extensión, pero «familia» conviene presentarlo como «casa/familia» o «hogar doméstico» sin desplazar demasiado la imagen primaria. Además, la nota [b] debe anclarse al verbo correspondiente, no a «casa».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen nombres divinos ni términos teológicos sensibles. El uso de «sabiduría», «entendimiento», «casa» y «se establece» concuerda con el registro sapiencial y con las decisiones auditadas.
  issues:
  - severity: medium
    issue: El marcador [b] está anclado a «casa» en vez de al verbo «se establece».
    rationale: La nota [b] explica una alternativa léxica para יִתְכּוֹנָן («se hace firme» / «queda firme»), por lo que debe aparecer junto al segmento verbal relevante para cumplir la disciplina de notas.
  - severity: low
    issue: La nota [a] amplía demasiado «casa» a «familia» sin conservar suficientemente la imagen primaria de casa/hogar.
    rationale: El rastro inglés dice que «house» puede referirse a una vivienda y por extensión a un hogar o household. En español, «familia» puede mantenerse como extensión, pero conviene formular la nota de manera más estrechamente alineada con «casa / hogar / casa en sentido doméstico».
  revised_spanish_text: Con sabiduría se edifica una casa[a], y con entendimiento se establece[b].
  revised_footnotes:
  - marker: a
    text: O «un hogar»; «casa» puede referirse tanto a una vivienda física como, por extensión, al hogar o la casa en sentido doméstico.
    reason: lexical_alternative
  - marker: b
    text: O «se hace firme» / «queda firme». El verbo también puede expresar la idea de quedar afianzada o bien establecida.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Se corrige el uso de notas: [b] debe anclarse al verbo final, y la nota [a] se ajusta para alinearse mejor con la amplitud semántica documentada de בַּיִת sin sobreinterpretar.'
