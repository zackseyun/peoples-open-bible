  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la nube y el fuego permanecían delante del pueblo continuamente. También conserva la alternativa léxica sobre יָמִישׁ. Sin embargo, la formulación principal puede ajustarse mejor al matiz y al español natural.'
  spanish_quality_summary: «La columna de nube... no se apartaba de delante del pueblo» es comprensible, pero suena algo forzado. En español bíblico y general, «columna» aquí es posible, pero «pilar» conecta mejor con la decisión documentada del POB y con el uso más reconocible en este pasaje. Además, «de delante del pueblo» resulta menos natural que «de delante del pueblo» con «apartarse», pero la frase completa mejora más con una estructura simple y directa. «De día / de noche» es más idiomático y mantiene bien el paralelismo.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. La principal cuestión léxica es עַמּוּד, donde conviene alinear con el POB inglés usando «pilar» salvo razón fuerte en contra; aquí no la hay. La nota sobre יָמִישׁ se puede conservar con leve ajuste estilístico.
  issues:
  - severity: medium
    issue: Uso de «columna» en lugar de «pilar»
    rationale: Aunque «columna» no es incorrecto, el POB inglés documenta «pillar» como elección preferida, y en este contexto narrativo «pilar» es más cercano, más reconocible y más alineado con la imagen tradicional sin perder naturalidad.
  - severity: low
    issue: «Durante el día / durante la noche» es correcto pero menos idiomático que «de día / de noche»
    rationale: El hebreo usa expresiones adverbiales temporales paralelas. «De día y de noche» suena más natural y compacto en español, preservando bien el paralelismo.
  - severity: low
    issue: La redacción general puede simplificarse para mayor fluidez
    rationale: La combinación de «columna» + «durante» + «de delante» hace la oración un poco pesada. Un ajuste menor mejora legibilidad sin alterar el sentido.
  revised_spanish_text: El pilar de nube de día y el pilar de fuego de noche no se apartaba de delante del pueblo[a].
  revised_footnotes:
