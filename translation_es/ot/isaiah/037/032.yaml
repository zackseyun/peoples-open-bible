translation:
  language: es
  text: Porque de Jerusalén saldrá un remanente, y sobrevivientes del monte Sion. El celo[a] de Yahvé de los ejércitos hará esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «celos». El sustantivo hebreo puede significar «celo» o «celos»; aquí se entiende como el fervor comprometido de Yahvé para cumplir su promesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la relación explicativa o de fundamento del contexto anterior. En español, «Porque» conserva esa conexión causal/explicativa de forma natural y digna.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - de Jerusalén
  lexicon: HALOT
  rationale: La preposición מִן señala origen. «De Jerusalén» es natural en español y mantiene el valor de procedencia.
- source_word: תֵּצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - saldrá
  - vendrá
  lexicon: HALOT
  rationale: El qal imperfecto expresa futuro; «saldrá» reproduce el movimiento de salida sin calco innecesario.
- source_word: שְׁאֵרִית
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - el remanente
  - los que quedan
  - un resto
  lexicon: HALOT
  rationale: «Remanente» preserva el término profético técnico y el matiz de un grupo preservado tras el juicio.
- source_word: וּפְלֵיטָה
  english_pob_choice: and survivors
  chosen_spanish: y sobrevivientes
  alternatives_spanish:
  - y los que escapen
  - y escapados
  - y sobrevivientes
  lexicon: HALOT
  rationale: El paralelo no apunta a la abstracción «liberación», sino a personas que han quedado con vida. «Sobrevivientes» conserva el sentido personal y el vínculo con «remanente».
- source_word: מֵהַר צִיּוֹן
  english_pob_choice: from Mount Zion
  chosen_spanish: desde el monte Sion
  alternatives_spanish:
  - desde el monte de Sion
  - del monte Sion
  lexicon: HALOT
  rationale: La preposición de origen se expresa bien con «desde». «Monte Sion» mantiene la referencia geográfica y teológica reconocible en español.
- source_word: קִנְאַת
  english_pob_choice: The zeal of
  chosen_spanish: El celo de
  alternatives_spanish:
  - La celosa dedicación de
  - La pasión de
  - El celo de
  lexicon: HALOT
  rationale: 'El hebreo puede significar «celo» o «celos». Aquí la decisión sigue la lectura del POB inglés: la energía comprometida de Yahvé para cumplir su promesa. «Celo» preserva esa tensión sin reducirla a simple envidia.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración, conforme al estándar del proyecto, en lugar de ocultarlo con un título sustituto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: En español «Yahvé de los ejércitos» conserva el título divino con un campo semántico amplio y transparente; es una opción clara y fiel al hebreo de צְבָאוֹת.
- source_word: תַּעֲשֶׂה זֹּאת
  english_pob_choice: will do this
  chosen_spanish: hará esto
  alternatives_spanish:
  - hará esto
  - llevará esto a cabo
  - realizará esto
  lexicon: HALOT
  rationale: 'La cláusula verbal es directa: acción divina futura. «Hará esto» es fiel, breve y no añade matiz interpretativo innecesario.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. En coherencia con el proyecto, se conserva el nombre propio divino mediante transliteración, no una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de קִנְאַת en relación con Dios
  english_pob_reading: zeal
  chosen_spanish_reading: celo
  alternative_spanish_readings:
  - celos
  - ardor
  - celo
  rationale: Se preserva la tensión semántica del hebreo. «Celo» permite entender tanto el fervor activo de Yahvé como la posible cercanía de «celos» sin imponer una lectura psicológica reductiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it unnecessarily
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con la fuente era alto; por eso se mantiene una formulación directa y estable, con la nota léxica solo donde el hebreo conserva una ambigüedad real.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «monte Sion» y no una paráfrasis devocional más expansiva.
  - «Remanente» y «sobrevivientes» conservan el paralelismo hebreo sin fusionar los dos términos.
  - No se introduce «SEÑOR» ni «Cristo», ya que el texto no lo requiere.
