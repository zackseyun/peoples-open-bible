revisions:
- from: En los paneles de sus soportes y en sus marcos grabó querubines[a], leones y palmeras, según el espacio disponible para cada uno[b], con guirnaldas alrededor.
  to: En los paneles de sus soportes y en sus marcos grabó querubines, leones y palmeras, según el espacio disponible para cada uno[a], con guirnaldas por todo alrededor[b].
  rationale: Se elimina la nota defectuosa sobre 'querubines', porque no ofrecía una alternativa real. Se conserva la nota necesaria sobre la frase hebrea difícil כְּמַעַר אִישׁ. Además, se añade una nota léxica útil para לֹיֹת y se fortalece 'alrededor' a 'por todo alrededor' para reflejar mejor סָבִיב y el audit trail inglés.
