revisions:
- from: 'Le informaron[a], diciendo: «José todavía vive, y él es gobernante sobre toda la tierra de Egipto». Pero su corazón quedó entumecido, porque no les creía.'
  to: 'Le dijeron[a]: «José todavía vive, y él gobierna sobre toda la tierra de Egipto». Pero su corazón quedó entumecido, porque no les creyó.'
  rationale: Se ajustó «Le informaron, diciendo» a «Le dijeron» para lograr un español más natural sin perder el valor de וַיַּגִּדוּ + לֵאמֹר. Se cambió «él es gobernante» por «él gobierna» para expresar mejor el participio מֹשֵׁל en español idiomático, manteniendo la idea de autoridad sobre Egipto. Se cambió «no les creía» por «no les creyó» para reflejar mejor la reacción puntual del relato. Se conserva la nota sobre «su corazón quedó entumecido», que sigue siendo una opción fiel y legible para וַיָּפָג לִבּוֹ.
