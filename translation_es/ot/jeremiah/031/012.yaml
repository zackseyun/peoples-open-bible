revisions:
- from: Vendrán y cantarán de alegría en lo alto de Sion[a]; fluirán hacia la bondad de Yahvé, hacia el grano, el vino nuevo y el aceite fresco, y hacia los hijos del rebaño y del ganado. Su alma[c] será como un jardín bien regado, y no volverán a languidecer[d].
  to: Vendrán y aclamarán de alegría en lo alto de Sion, y fluirán[a] hacia la bondad[b] de Yahvé, hacia el grano, el vino nuevo y el aceite fresco, y hacia las crías del rebaño y del ganado. Su alma[c] será como un jardín bien regado, y no volverán a languidecer[d].
  rationale: La revisión corrige el anclaje erróneo de la nota sobre «bondad», restaura la alternativa léxica pertinente para וְנָהֲרוּ, mejora la naturalidad española de בְּנֵי צֹאן וּבָקָר con «las crías…», y refuerza el matiz jubiloso de רנן con «aclamarán de alegría». Se mantienen «Yahvé», «bondad» y «alma» conforme al proyecto y a la auditoría inglesa.
