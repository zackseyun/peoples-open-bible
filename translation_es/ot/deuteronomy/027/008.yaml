translation:
  language: es
  text: Y escribirás sobre las piedras todas las palabras de esta ley muy claramente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «claramente», «de forma que quede claro» o «para hacerlo claro». La expresión hebrea combina un verbo que significa «hacer claro/explicar» con un intensificador.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַבְתָּ
  english_pob_choice: And you shall write
  chosen_spanish: Y escribirás
  alternatives_spanish:
  - Y deberás escribir
  - Y luego escribirás
  lexicon: HALOT
  rationale: El perfecto con waw en contexto exhortativo/instructivo tiene fuerza de mandato futuro. «Escribirás» conserva esa fuerza sin sonar rígido en español; se mantiene la segunda persona singular.
- source_word: עַל הָאֲבָנִים
  english_pob_choice: on the stones
  chosen_spanish: sobre las piedras
  alternatives_spanish:
  - sobre las piedras
  - en las piedras
  lexicon: HALOT
  rationale: עַל indica ubicación «sobre/en». «Sobre las piedras» es la opción más natural en español para un acto de inscripción física y conserva el matiz espacial.
- source_word: כָּל דִּבְרֵי
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las palabras
  - cada palabra
  lexicon: HALOT
  rationale: דִּבְרֵי se traduce de manera directa como «palabras», y כָּל como «todas». Esta forma preserva la textura formal del hebreo mejor que una paráfrasis como «todo lo que dice».
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: of this law
  chosen_spanish: de esta ley
  alternatives_spanish:
  - de esta instrucción
  - de esta Torá
  lexicon: HALOT
  rationale: En contexto deuteronómico, תּוֹרָה funciona con fuerza legal/covenantal. «Ley» es la equivalencia más clara y estable en español, sin perder la referencia al documento pactal inmediato.
- source_word: בַּאֵר הֵיטֵב
  english_pob_choice: very clearly
  chosen_spanish: muy claramente
  alternatives_spanish:
  - claramente
  - bien claramente
  - de manera muy clara
  lexicon: HALOT
  rationale: El verbo בַּאֵר y el intensificador הֵיטֵב expresan la idea de hacer algo claro/explicarlo de forma marcada. «Muy claramente» reproduce la intensificación y mantiene la observación de que el texto debe quedar explícito y legible.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés está en alta concordancia con la fuente hebrea; no se registran revisiones aplicadas ni cambios pendientes. La traducción española sigue la misma lectura: mandato de escribir, sobre las piedras, todas las palabras de esta ley, con un adverbio intensivo que expresa claridad en la inscripción.'
  spanish_consistency_notes:
  - Se usa «ley» para תּוֹרָה conforme al contexto deuteronómico.
  - «Muy claramente» intenta recoger tanto la claridad como la intensificación del hebreo.
  - Se conserva el registro bíblico formal sin recurrir a formulaciones arcaizantes innecesarias.
