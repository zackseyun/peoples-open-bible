review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la reacción universal de temor ante Dios, la majestad insoportable de su gloria y la ira de su amenaza contra los pecadores. Sin embargo, hay dos desajustes menores pero significativos: (1) φρίσσει καὶ τρέμει se invierte semánticamente al poner primero ''tiembla'' y luego ''se estremece'', cuando el primer verbo griego tiene más bien el matiz de estremecerse/erizarse y el segundo el de temblar; y (2) las notas b/c/d fueron mal asignadas en el texto español, pues b en inglés corresponde a la primera cláusula de ἄστεκτος, mientras que c/d pertenecen a la segunda cláusula sobre la ira/amenaza.'
  spanish_quality_summary: El español es claro, digno y natural en registro eclesial amplio. 'Ante quien' y 'a la presencia de tu poder' son aceptables y solemnes. No obstante, 'todo tiembla y se estremece' suena algo menos preciso que 'todo se estremece y tiembla', y la anclación de notas al final crea confusión porque remite alternativas de una cláusula a otra. 'Imposible de soportar' es legible, aunque un poco más largo que 'intolerable' o 'insoportable'; puede mantenerse para evitar repetición.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Gloria', 'ira', 'pecadores' y 'poder' están alineados. La decisión de mantener 'amenaza' preserva correctamente la fuerza judicial de ἀπειλή.
  issues:
  - severity: medium
    issue: Orden menos fiel de los verbos de temor
    rationale: El griego presenta primero φρίσσει (estremecerse/shudder) y luego τρέμει (temblar). En español conviene reflejarlo como 'se estremece y tiembla' para preservar mejor la progresión poética y la decisión léxica documentada.
  - severity: high
    issue: Notas b/c/d ancladas incorrectamente
    rationale: La nota b en el expediente inglés corresponde a 'la majestad de tu gloria...', mientras que c y d corresponden a la cláusula 'la ira de tu amenaza...'. En el borrador español aparecen juntas al final de la segunda cláusula, lo que desinforma al lector sobre qué alternativas pertenecen a qué segmento.
  - severity: low
    issue: Razón de la nota d cambiada respecto al expediente
    rationale: La nota d inglesa era una huella de redacción previa ('previous_rendering'), no una alternativa léxica de la segunda cláusula. En español no conviene trasladarla como si fuera otra variante de ἀνυπόστατος; puede omitirse, ya que no aporta al lector español y además genera ruido.
  revised_spanish_text: ante quien todo[a] se estremece y tiembla a la presencia de tu poder, porque la majestad de tu gloria es insoportable[b], y la ira de tu amenaza contra los pecadores es imposible de soportar[c].
  revised_footnotes:
