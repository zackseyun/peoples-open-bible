translation:
  language: es
  text: El hombre que ama el placer[a] empobrecerá; el que ama el vino y el aceite[b] no se enriquecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Placer» traduce aquí el valor contextual de שִׂמְחָה; también puede significar «alegría» o «festividad». En este proverbio, el matiz más probable es el de una vida dedicada al disfrute.
    reason: lexical_alternative
  - marker: b
    text: «Aceite» probablemente alude al aceite de oliva y puede sugerir lujo, ungüento costoso o un estilo de vida opulento, no solo un alimento básico.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Quien
  - Una persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino proverbial con fuerza representativa. En español, «el hombre» conserva esa forma genérica y el tono sapiencial sin forzar una paráfrasis más amplia.
- source_word: מַחְסוֹר
  english_pob_choice: poor
  chosen_spanish: empobrecerá
  alternatives_spanish:
  - caerá en la pobreza
  - será pobre
  - vendrá a menos
  lexicon: HALOT
  rationale: El sustantivo expresa carencia o falta; el contexto proverbial requiere un resultado. «Empobrecerá» transmite el efecto de manera natural y mantiene la relación con la falta implícita del hebreo.
- source_word: אֹהֵב שִׂמְחָה
  english_pob_choice: who loves pleasure
  chosen_spanish: que ama el placer
  alternatives_spanish:
  - que ama la alegría
  - que ama la fiesta
  - amante del placer
  lexicon: HALOT
  rationale: שִׂמְחָה puede significar gozo, alegría o festividad, pero aquí el contexto sapiencial apunta a una vida entregada a la complacencia. «Placer» reproduce bien la intención admonitiva sin perder la conexión semántica con la raíz de alegría/festividad.
- source_word: אֹהֵב יַיִן וָשֶׁמֶן
  english_pob_choice: whoever loves wine and oil
  chosen_spanish: el que ama el vino y el aceite
  alternatives_spanish:
  - el que ama el vino y el aceite de oliva
  - el que ama el vino y el aceite fino
  lexicon: HALOT
  rationale: «Vino» traduce directamente יַיִן. Para שֶׁמֶן, «aceite» conserva la imagen hebrea y permite la alusión a lujo u ungüento costoso sin explicitar más de lo que el texto dice.
- source_word: לֹא יַעֲשִׁיר
  english_pob_choice: will not become rich
  chosen_spanish: no se enriquecerá
  alternatives_spanish:
  - no será rico
  - no prosperará
  - no llegará a ser rico
  lexicon: HALOT
  rationale: El hiphil de עשר expresa volverse rico o llegar a enriquecerse. «No se enriquecerá» sigue de cerca ese valor resultativo y evita ampliar el sentido a prosperidad general.
translation_notes:
  revision_awareness: 'Se siguió el sentido del hebreo de WLC y el juicio del POB inglés, conservando el tono proverbial y las dos ambigüedades principales: שִׂמְחָה como placer/alegría y שֶׁמֶן como aceite con posible matiz de lujo.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal con dos miembros coordinados: «ama... / ama...» y «empobrecerá / no se enriquecerá».'
  - Se evitó «SEÑOR» o terminología ajena, pues el versículo no contiene el nombre divino.
  - «Aceite» se dejó sin especificar como «aceite de oliva» en el texto principal para conservar la imagen hebrea; la precisión queda en la nota.
