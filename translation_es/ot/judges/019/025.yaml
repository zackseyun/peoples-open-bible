translation:
  language: es
  text: Pero los hombres no quisieron escucharlo, así que el hombre agarró a su concubina y la sacó afuera, a donde estaban ellos. Y la conocieron[a] y la maltrataron toda la noche hasta la mañana; luego la dejaron ir al alba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la conocieron», un eufemismo para violación sexual en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוּ
  english_pob_choice: were not willing
  chosen_spanish: no quisieron
  alternatives_spanish:
  - no estaban dispuestos
  - se negaron
  lexicon: HALOT
  rationale: אבה expresa voluntad o disposición. «No quisieron» conserva el matiz volitivo de rechazo sin añadir una causalidad psicológica que el hebreo no exige.
- source_word: לִשְׁמֹעַ לוֹ
  english_pob_choice: to listen to him
  chosen_spanish: escucharle
  alternatives_spanish:
  - obedecerle
  - oírle
  lexicon: HALOT
  rationale: שׁמע con ל puede ser escuchar, oír u obedecer. Aquí el contexto inmediato es una negativa a atender su ruego; «escucharle» mantiene la amplitud semántica sin forzar «obedecer».
- source_word: וַיַּחֲזֵק
  english_pob_choice: seized
  chosen_spanish: se aferró a
  alternatives_spanish:
  - se sujetó de
  - agarró
  lexicon: HALOT
  rationale: חזק comunica acción fuerte y coercitiva. «Se aferró a» intenta reflejar la intensidad del gesto; aunque el castellano puede sonar menos técnico que «apoderarse de», evita una formulación más interpretativa y sigue la fuerza del hebreo.
- source_word: פִּילַגְשׁוֹ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - su mujer secundaria
  lexicon: HALOT
  rationale: «Concubina» es el equivalente léxico habitual para פילגש y preserva la categoría social del texto.
- source_word: וַיֹּצֵא אֲלֵיהֶם הַחוּץ
  english_pob_choice: brought her out to them
  chosen_spanish: la sacó hacia ellos
  alternatives_spanish:
  - la sacó para entregarla a ellos
  - la hizo salir hacia ellos
  lexicon: HALOT
  rationale: יצא en hiphil es «sacar / hacer salir». El hebreo añade הַחוּץ, pero en español una repetición literal de «afuera» sería innecesariamente pesada; «hacia ellos» conserva la dirección del movimiento sin perder la violencia de la entrega.
- source_word: וַיֵּדְעוּ אֹתָהּ
  english_pob_choice: they knew her
  chosen_spanish: la conocieron
  alternatives_spanish:
  - tuvieron relaciones sexuales con ella
  - la violaron
  lexicon: HALOT
  rationale: ידע es el eufemismo hebreo para relación sexual. La traducción principal conserva el eufemismo fuente; el contexto de coerción deja clara la violencia, sin necesidad de explicitarla en el cuerpo del versículo.
- source_word: וַיִּתְעַלְּלוּ בָהּ
  english_pob_choice: abused her
  chosen_spanish: la abusaron
  alternatives_spanish:
  - la maltrataron
  - la ultrajaron
  lexicon: HALOT
  rationale: עלל en hitpael expresa trato degradante y abusivo. «La abusaron» es una forma directa y sobria que mantiene el sentido violento; «ultrajaron» sería posible, pero su registro puede sonar más jurídico o arcaizante.
- source_word: כָּל הַלַּיְלָה עַד הַבֹּקֶר
  english_pob_choice: all night until morning
  chosen_spanish: toda la noche hasta la mañana
  alternatives_spanish:
  - durante toda la noche hasta la mañana
  lexicon: HALOT
  rationale: La expresión temporal es directa. «Toda la noche hasta la mañana» conserva duración y secuencia con español natural.
- source_word: וַיְשַׁלְּחוּהָ
  english_pob_choice: they let her go
  chosen_spanish: la despidieron
  alternatives_spanish:
  - la dejaron ir
  - la soltaron
  - la enviaron de vuelta
  lexicon: HALOT
  rationale: שלח puede ser dejar ir, despedir o enviar. «La despidieron» refleja la acción de expulsarla/desecharla tras el abuso, con una fuerza que encaja con el contexto.
- source_word: בַּעֲלוֹת הַשָּׁחַר
  english_pob_choice: at the dawn
  chosen_spanish: al alba
  alternatives_spanish:
  - al amanecer
  - cuando despuntaba el alba
  lexicon: HALOT
  rationale: La construcción describe el levantarse de la aurora. «Al alba» es idiomático, conciso y fiel al valor temporal.
theological_decisions:
- issue: Eufemismo hebreo para violación sexual en וַיֵּדְעוּ אֹתָהּ
  english_pob_reading: The main text preserves the source idiom with a footnote explaining the euphemism; coercive context makes the violence unmistakable.
  chosen_spanish_reading: «La conocieron» con nota que explica el eufemismo y su sentido de violencia sexual en este contexto.
  alternative_spanish_readings:
  - «Tuvieron relaciones sexuales con ella»
  - «La violaron»
  rationale: Se conserva el eufemismo del hebreo en el texto principal para no borrar la forma fuente, mientras la nota aclara la carga semántica. «La violaron» explicita el resultado inferido por el contexto, pero en el cuerpo principal sustituiría el giro original.
  doctrine_reference: Lectura léxica y narrativa; sensibilidad al eufemismo bíblico y a la violencia sexual del pasaje.
translation_notes:
  revision_awareness: El contexto inglés revisado eliminó un redundante «outside» por considerarlo ya implícito en la idea de «brought her out». En español, la secuencia «la sacó hacia ellos» conserva el movimiento exterior sin añadir una redundancia innecesaria. Se mantuvo la estructura del versículo y la nota sobre el eufemismo, en línea con el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde aparezca el nombre divino; en este versículo no aplica.
  - Se evitó «obedecerle» para שׁמע porque el contexto inmediato es rechazo a escuchar un ruego, no una orden formal.
  - «Concubina» se mantuvo como término técnico estable.
  - El tratamiento de la violencia sexual se preservó con eufemismo en el texto y aclaración en nota, para no borrar la forma hebrea.
  - El registro busca ser publicable y sobrio, sin arcaísmos innecesarios.
