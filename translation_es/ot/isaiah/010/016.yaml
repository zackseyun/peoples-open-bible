    text: O «contra sus gordos», o «entre sus bien alimentados»; el hebreo usa una imagen de gordura para fuerza, prosperidad o élites robustas.
    reason: lexical_alternative
  - marker: b
    text: 'O «en lugar de su gloria», tomando «bajo» en sentido de sustitución: lo que reemplaza su esplendor es fuego.'
    reason: alternative_reading
  - marker: c
    text: «Su gloria» también puede entenderse como «su esplendor» o «su pompa».
    reason: lexical_alternative
  revision_rationale: Se reubicaron los marcadores de notas para que correspondan a las palabras pertinentes del texto, y se ajustó 'se encenderá un fuego' a 'se encenderá un ardor' para reflejar mejor יֵקַד יְקֹד sin perder legibilidad en español. Se conservaron 'Yahvé', 'de los ejércitos', 'delgadez' y 'sus gordos' por fidelidad al hebreo y al historial POB.
