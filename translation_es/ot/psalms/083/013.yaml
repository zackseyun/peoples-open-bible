lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - quien
  - los que
  lexicon: HALOT
  rationale: El relativo introduce a los enemigos del contexto previo; «quienes» suena natural en español y conserva el enlace sin añadir matices no presentes.
- source_word: אָמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - han dicho
  - decían
  lexicon: HALOT
  rationale: El perfecto qal en este marco poético-reportivo se vierte mejor con pasado simple en español.
- source_word: נִירֲשָׁה
  english_pob_choice: Let us take possession
  chosen_spanish: Tomemos para nosotros
  alternatives_spanish:
  - Tomemos posesión
  - Apodérmonos de
  lexicon: HALOT
  rationale: En este contexto hostil, «tomemos para nosotros» comunica la intención posesiva y de apropiación sin forzar «heredar», que en español sonaría demasiado benévolo.
- source_word: לָּנוּ
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  - como nuestro propio
  lexicon: HALOT
  rationale: La lamed con pronombre refuerza ventaja/posesión; «para nosotros» es la forma idiomática natural en español y mantiene el matiz de auto-beneficio.
- source_word: נְא֣וֹת
  english_pob_choice: pastures
  chosen_spanish: las praderas
  alternatives_spanish:
  - las moradas
  - los lugares de habitación
  - los pastos
  lexicon: HALOT
  rationale: «Praderas» conserva la imagen concreta del hebreo y su plural; además evita reducir la frase solo a un sentido cultual, que el texto no exige de manera exclusiva.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: El referente es el Dios de Israel; en español debe conservarse el singular teológico.
theological_decisions:
- issue: Sentido de נְאוֹת אֱלֹהִים
  english_pob_reading: the pastures of God
  chosen_spanish_reading: las praderas de Dios
  alternative_spanish_readings:
  - las moradas de Dios
  - los lugares de habitación de Dios
  rationale: La frase admite una lectura más concreta como pastos/praderas y otra más locativa como moradas o lugares de habitación. Se preserva la imagen abierta del hebreo sin resolverla en favor de un sentido únicamente templario.
  doctrine_reference: Translation philosophy §3, preservar la tensión léxica y teológica.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; por eso el borrador español mantiene la misma resolución semántica general del POB inglés, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se mantiene «Dios» en singular conforme al referente del salmo.
  - Se evita «heredemos»/«heredar» para no suavizar el matiz de apropiación hostil.
  - La nota al pie conserva la ambigüedad entre imagen agrícola y locativa, como en el audit trail inglés.
