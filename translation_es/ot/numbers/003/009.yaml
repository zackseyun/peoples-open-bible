    reason: lexical_alternative
  revision_rationale: La revisión corrige los anclajes de notas para que coincidan con los elementos explicados en el texto fuente y en el audit trail inglés. También reemplaza «están enteramente dados» por «han sido enteramente dados», que suena más idiomático y refleja mejor el participio pasivo enfático en español. Se elimina la nota innecesaria sobre el pronombre enfático, cuyo sentido ya queda suficientemente expresado por «ellos».
