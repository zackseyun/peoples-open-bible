translation:
  text: 'And when he had become useless to the others[a], he ordered him to be brought to the fire while still breathing and to be fried in the pan. And when the vapor from the pan had spread considerably, they encouraged one another, together with their mother, to die nobly[b], saying this:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was still alive.' The Greek intensifies that the torture continued before death had occurred.
    reason: lexical_alternative
  - marker: b
    text: Or 'the steam' or 'the smoke' from the pan. The Greek term can denote vapor or fumes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρηστον
  chosen: useless
  alternatives:
  - of no further use
  - unserviceable
  lexicon: LSJ
  rationale: The adjective means 'useless' or 'unserviceable.' In context it refers brutally to the tortured brother as no longer useful for further abuse or as an example to the others. 'Useless' preserves the stark dehumanizing force of the Greek.
- source_word: τοῖς λοιποῖς
  chosen: to the others
  alternatives:
  - for the rest
  - with respect to the others
  lexicon: LSJ
  rationale: The dative with the article and adjective naturally refers to the remaining brothers/others present. 'To the others' is concise and keeps the relational sense without over-specifying beyond the Greek.
- source_word: γενόμενον
  chosen: had become
  alternatives:
  - having become
  - being
  lexicon: LSJ
  rationale: The participle marks a resulting state prior to the next action. 'Had become' gives clear English sequence.
- source_word: ἐκέλευσεν
  chosen: he ordered
  alternatives:
  - he commanded
  - he gave orders
  lexicon: LSJ
  rationale: A straightforward narrative verb of command. 'Ordered' is idiomatic modern English and preserves the coercive force.
- source_word: τῇ πυρᾷ προσάγειν
  chosen: to be brought to the fire
  alternatives:
  - to be taken to the fire
  - to bring him to the fire
  lexicon: LSJ
  rationale: The infinitive depends on 'ordered.' The passive-like English 'to be brought' fits the implied object αὐτόν and the torture setting. 'Fire' is preferable to 'funeral pyre' here because the context is active burning/torture, not cremation.
- source_word: ἔτινουν
  chosen: while he was still breathing
  alternatives:
  - while still alive
  - still yet living
  lexicon: LSJ
  rationale: This adverb intensifies that the victim was not yet dead. 'While he was still breathing' vividly conveys the ongoing life implied in context and matches the cruelty of the scene.
- source_word: τηγανίζειν
  lemma: τηγανόν
  chosen: to be fried in the pan
  alternatives:
  - to be roasted in a frying pan
  - to be cooked on the pan
  lexicon: LSJ
  rationale: The verb is derived from τηγανόν/τηγάνον, a frying pan or flat pan. 'Fried in the pan' is the most direct rendering, preserving the gruesome specificity.
- source_word: τῆς ... ἀτμίδος
  chosen: the vapor
  alternatives:
  - the steam
  - the smoke
  lexicon: LSJ
  rationale: ἀτμίς denotes vapor/steam, though in this violent cooking context smoke-like fumes are also possible. 'Vapor' is broad enough to cover the sense without over-interpreting the exact physical phenomenon.
- source_word: ἐφʼ ἱκανὸν διδούσης
  chosen: had spread widely
  alternatives:
  - was giving off abundantly
  - was rising for a considerable time
  lexicon: LSJ
  rationale: The phrase indicates the pan was emitting vapor to a sufficient or considerable extent. 'Had spread widely' captures the result in natural English, though the underlying image is of abundant emission.
- source_word: παρεκάλουν
  chosen: they encouraged one another
  alternatives:
  - they exhorted one another
  - they urged one another
  lexicon: LSJ
  rationale: The verb can mean encourage, exhort, or urge. In this martyrdom context 'encouraged one another' preserves both mutual strengthening and exhortation.
- source_word: σὺν τῇ μητρὶ
  chosen: together with their mother
  alternatives:
  - with their mother
  - along with the mother
  lexicon: LSJ
  rationale: The phrase includes the mother in the mutual encouragement. 'Together with their mother' makes that inclusion explicit and natural.
- source_word: γενναίως τελευτᾷν
  lemma: γενναίως
  chosen: to die nobly
  alternatives:
  - to meet death bravely
  - to die courageously
  lexicon: LSJ
  rationale: γενναίως carries the sense of nobly, bravely, worthily; τελευτᾶν means to end life, die. 'Die nobly' preserves both courage and honor, fitting the martyrdom theme.
- source_word: λέγοντες οὕτως
  chosen: saying this
  alternatives:
  - speaking thus
  - saying as follows
  lexicon: LSJ
  rationale: A standard narrative transition to direct speech. 'Saying this' is simple and idiomatic.
