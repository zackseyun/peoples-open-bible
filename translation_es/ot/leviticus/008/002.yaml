translation:
  language: es
  text: Toma a Aarón y a sus hijos con él[a], y las vestiduras, y el aceite de la unción, y el toro del sacrificio por el pecado[b], y los dos carneros, y la cesta de panes sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sus hijos con Aarón». El hebreo incluye explícitamente la frase «con él».
    reason: alternative_reading
  - marker: b
    text: O, «el toro del sacrificio de purificación». El término hebreo puede referirse a la ofrenda asociada con el pecado y con la purificación ritual.
    reason: alternative_reading
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Toma y lleva
  lexicon: HALOT
  rationale: El imperativo de לקח pide una orden directa. «Toma» reproduce con naturalidad el mandato sin añadir un matiz de movimiento que el hebreo no exige por sí mismo.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española tradicional y ampliamente inteligible.
- source_word: בָּנָיו אִתּוֹ
  english_pob_choice: his sons with him
  chosen_spanish: sus hijos con él
  alternatives_spanish:
  - sus hijos
  - sus hijos con Aarón
  lexicon: HALOT
  rationale: Se conserva tanto «sus hijos» como la frase añadida «con él», que en hebreo no es redundante y acompaña explícitamente al grupo.
- source_word: הַבְּגָדִים
  english_pob_choice: the garments
  chosen_spanish: las vestiduras
  alternatives_spanish:
  - las prendas
  - los vestidos
  - las ropas
  lexicon: HALOT
  rationale: En este contexto sacerdotal, «vestiduras» comunica mejor el carácter ritual y digno del conjunto que «ropa» o «prendas», sin forzar un tecnicismo ajeno al texto.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite de ungir
  - el aceite para la unción
  lexicon: HALOT
  rationale: El constructo hebreo es literalmente «aceite de unción». «Aceite de la unción» conserva esa relación nominal y su sentido ritual.
- source_word: פַּר הַחַטָּאת
  english_pob_choice: the bull of the sin offering
  chosen_spanish: el novillo de la ofrenda por el pecado
  alternatives_spanish:
  - el novillo de la ofrenda por el pecado y la purificación
  - el novillo de la ofrenda de purificación
  lexicon: HALOT
  rationale: El hebreo designa el animal vinculado a חטאת. En español, «ofrenda por el pecado» mantiene la lectura sacrificial tradicional, mientras que «novillo» refleja con precisión el animal específico. Se evita «toro» porque el término hebreo puede abarcar un bovino joven sin exigir esa especificación.
- source_word: שְׁנֵי הָאֵילִים
  english_pob_choice: the two rams
  chosen_spanish: los dos carneros
  alternatives_spanish:
  - los dos rams
  - los dos machos de carnero
  lexicon: HALOT
  rationale: «Carneros» es la equivalencia natural en español para אילים en contexto sacrificial.
- source_word: סַל הַמַּצּוֹת
  english_pob_choice: the basket of unleavened bread
  chosen_spanish: la canasta de panes sin levadura
  alternatives_spanish:
  - la canasta de panes ázimos
  - la cesta de panes sin levadura
  lexicon: HALOT
  rationale: «Panes sin levadura» comunica de forma clara y bíblica el sentido de מַצּוֹת. «Canasta» es una opción natural en español, y no se precisa aquí una forma más técnica.
theological_decisions:
- issue: חטאת en contexto sacrificial
  english_pob_reading: the bull of the sin offering
  chosen_spanish_reading: el novillo de la ofrenda por el pecado
  alternative_spanish_readings:
  - el novillo de la ofrenda de purificación
  - el novillo de la ofrenda por el pecado y la purificación
  rationale: Se mantiene en el cuerpo principal la lectura sacrificial más extendida en español, sin ocultar que el término hebreo puede abarcar la ofrenda asociada tanto con el pecado como con la purificación ritual. La forma elegida conserva la tensión semántica documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión léxica en el término חטאת sin resolverla unilateralmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión inglesa revisada que prefirió «the bull of the sin offering»; en español se traslada esa misma estructura mediante «el novillo de la ofrenda por el pecado», manteniendo además la opción alternativa de purificación en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» como sustituto no presente en el hebreo.
  - Se mantiene «ofrenda por el pecado» como equivalente estable para חטאת en este contexto, sin borrar la alternativa ritual de purificación.
  - «Carneros» y «panes sin levadura» siguen la terminología bíblica usual y clara para lectores eclesiales en español.
