translation:
  language: es
  text: 'Y estas son las últimas palabras de David: oráculo[a] de David, hijo de Isaí, oráculo del hombre levantado en alto, el ungido del Dios de Jacob[b], y el dulce cantor de Israel[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declaración» o «dicho solemne» para נְאֻם; es una fórmula formal de discurso usada a menudo en pronunciamientos solemnes o proféticos.
    reason: lexical_alternative
  - marker: b
    text: O «el Mesías del Dios de Jacob». El hebreo dice literalmente «el ungido del Dios de Jacob»; aquí la expresión se refiere directamente a David, aunque conserva resonancia real-mesiánica.
    reason: alternative_reading
  - marker: c
    text: O «el agradable cantor de los cantos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Y estas son
  alternatives_spanish:
  - Ahora estas son
  - Y ahora son estas
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea abre una nueva sección. En español, 'Y estas son' mantiene la continuidad discursiva sin forzar un adverbio más explícito de 'ahora' que el hebreo no exige.
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - dichos
  - declaraciones
  lexicon: HALOT
  rationale: En este encabezado, 'palabras' comunica bien el valor genérico de דִּבְרֵי y suena natural en español para introducir el discurso final de David.
- source_word: הָאַחֲרֹנִים
  english_pob_choice: last
  chosen_spanish: las últimas
  alternatives_spanish:
  - las finales
  - las postreras
  lexicon: HALOT
  rationale: '''Últimas'' reproduce el sentido temporal de cierre del conjunto y es la opción más natural en español moderno.'
- source_word: נְאֻם
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - declaración
  - dicho solemne
  lexicon: HALOT
  rationale: '''Oráculo'' conserva el valor de fórmula solemne de habla y evita rebajar el tono profético-formal del hebreo.'
- source_word: בֶּן יִשַׁי
  english_pob_choice: son of Jesse
  chosen_spanish: hijo de Isaí
  alternatives_spanish:
  - hijo de Jesé
  - descendiente de Isaí
  lexicon: HALOT
  rationale: Se conserva el patronímico directo. 'Isaí' es la forma bíblica usual en español y corresponde al nombre propio hebreo.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el guerrero
  - el fuerte
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el hombre'. Aunque el contexto le da tono honorífico, 'el hombre' preserva la base léxica sin añadir un matiz no explícito.
- source_word: הֻקַם עָל
  english_pob_choice: raised on high
  chosen_spanish: levantado en alto
  alternatives_spanish:
  - exaltado
  - puesto en alto
  - ensalzado
  lexicon: HALOT
  rationale: La pasiva de קום con עַל expresa elevación. 'Levantado en alto' conserva la imagen y evita una abstracción excesiva; también mantiene la posible tensión entre elevación y designación honorífica.
- source_word: מְשִׁיחַ
  english_pob_choice: the anointed
  chosen_spanish: el ungido
  alternatives_spanish:
  - el mesías
  - el ungido de Dios
  lexicon: HALOT
  rationale: En este contexto el referente inmediato es David mismo, descrito como rey ungido. 'Ungido' preserva el sentido histórico y real sin convertirlo en un título cristológico explícito dentro del texto principal.
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Dios de Jacobo
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y tradicional. 'Jacob' es la forma bíblica estándar en español.
- source_word: וּנְעִים
  english_pob_choice: the sweet singer
  chosen_spanish: el dulce cantor
  alternatives_spanish:
  - el agradable cantor
  - el cantor suave
  lexicon: HALOT
  rationale: '''Dulce'' refleja el valor de ''pleasant/sweet'' y encaja con el tono poético. ''Cantor'' traduce el participio/adjetivo en apposición a David como figura musical.'
- source_word: זְמִרוֹת יִשְׂרָאֵל
  english_pob_choice: the songs of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de los cantos de Israel
  - de las canciones de Israel
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa que eliminó 'the songs of', el hebreo no dice explícitamente 'canciones de Israel' como complemento del apelativo principal, sino que David es presentado como 'el dulce cantor de Israel'. Por eso el español evita añadir 'canciones' en el texto principal. El complemento 'de Israel' conserva el vínculo nacional y poético con el original.
theological_decisions:
- issue: Cómo renderizar מְשִׁיחַ en un contexto referido a David sin diluir la resonancia real-mesiánica
  english_pob_reading: the anointed
  chosen_spanish_reading: el ungido
  alternative_spanish_readings:
  - el Mesías
  - el ungido de Yahvé
  rationale: 'La lectura inglesa distingue el referente histórico inmediato de David de la resonancia mesiánica secundaria. En español, ''el ungido'' mantiene esa misma tensión: nombra la unción real de David sin convertir el versículo en una identificación directa con el Mesías en el texto principal.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos con su sentido inmediato y preservar la tensión teológica sin resolverla artificialmente.'
- issue: Relación entre 'el dulce cantor de Israel' y la posible lectura expansiva 'de los cantos de Israel'
  english_pob_reading: the sweet singer of Israel
  chosen_spanish_reading: el dulce cantor de Israel
  alternative_spanish_readings:
  - el dulce cantor de los cantos de Israel
  - el agradable cantor de Israel
  rationale: La revisión del inglés corrigió una expansión que no estaba explícita en el hebreo. En español se sigue esa corrección para no introducir un complemento ajeno al texto. Así se mantiene el retrato poético de David como cantor representativo de Israel.
  doctrine_reference: 'Principio POB: no ampliar el contenido textual más allá de lo que el hebreo afirma de manera explícita.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente: se evitó expandir la frase final a ''los cantos de Israel'', porque el ajuste editorial del POB inglés observó que el hebreo describe a David como ''el dulce cantor de Israel'' y no como un cantor explícitamente ''de las canciones de Israel''. También se conservó el valor formal de נְאֻם como ''oráculo'' y la tensión de מְשִׁיחַ como ungido histórico con resonancia mesiánica secundaria.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Mesías'' no se emplea en el texto principal porque el referente inmediato es David; la nota preserva la alternativa.'
  - '''Ungido'' mantiene el paralelismo con el inglés POB ''the anointed'' y evita sobreinterpretación.'
  - '''Isaí'' y ''Jacob'' siguen las formas bíblicas habituales en español.'
  - Las notas a pie se anclan solo donde hay una alternativa real o una observación de estilo textual relevante.
