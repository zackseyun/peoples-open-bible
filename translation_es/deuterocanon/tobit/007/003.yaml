base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/007/003.yaml
  text: And Raguel asked them[a], “Where are you from, brothers?” And they said to him, “We are from the sons of Naphtali[b], the captives from Nineveh.”
  footnotes:
  - marker: a
    text: Or “from the descendants of Naphtali” or “from the tribe of Naphtali.” The Greek literally says “from the sons of Naphtali.”
    reason: lexical_alternative
  - marker: b
    text: Or “the exiles in Nineveh.” The Greek says “the captives,” emphasizing their deported status.
    reason: lexical_alternative
