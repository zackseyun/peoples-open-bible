review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: contraste narrativo («Pero»), énfasis aditivo («también»), provisión por parte de Faraón, la pareja cultual «sacrificios y holocaustos», y el destinatario «a Yahvé nuestro Dios». Sin embargo, «dar en nuestras manos» suena poco natural en español y no reproduce bien la idiomaticidad de בְּיָדֵנוּ. Además, el anclaje de la nota [a] está mal colocado al final de toda la oración en vez de junto a «Yahvé».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «debes dar en nuestras manos» resulta forzado; en español natural y fiel conviene «debes poner en nuestras manos» o «debes darnos». Dado que el proyecto valora conservar la imagen concreta, «poner en nuestras manos» es la mejor reparación. También conviene mover la nota al término relevante dentro del texto.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה → «Yahvé», זְבָחִים → «sacrificios», עֹלֹת → «holocaustos», אֱלֹהֵינוּ → «nuestro Dios». No hay conflicto teológico importante; la única corrección necesaria es estilístico-idiomática y de colocación de nota.'
  issues:
  - severity: medium
    issue: «dar en nuestras manos» es poco idiomático en español
    rationale: Aunque calca de cerca la combinación inglesa revisada, en español la construcción natural para conservar la imagen es «poner en nuestras manos». «Dar en nuestras manos» suena torpe y disminuye la legibilidad.
  - severity: low
    issue: La nota [a] está anclada al final de la cita en lugar de junto a «Yahvé»
    rationale: La nota explica específicamente la forma «Yahvé», así que el marcador debe aparecer en el término pertinente, conforme a la disciplina de notas del proyecto.
  revised_spanish_text: 'Pero Moisés dijo: «Tú también debes poner en nuestras manos sacrificios y holocaustos, y los ofreceremos a Yahvé[a] nuestro Dios».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé nuestro Dios». Se mantiene «Yahvé» como equivalente del nombre divino en el texto principal.'
    reason: source_note
  revision_rationale: Se cambia «dar en nuestras manos» por «poner en nuestras manos» para lograr un español natural sin perder la imagen concreta de בְּיָדֵנוּ. Se reubica la nota al término «Yahvé» porque allí pertenece semánticamente.
