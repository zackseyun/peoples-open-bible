revisions:
- from: Entonces, en la mañana, tan pronto como salga el sol, te levantarás temprano y te desplegarás contra la ciudad. Y mira, cuando él y la gente que está con él salgan hacia ti, le harás según lo que tu mano encuentre[a].
  to: Entonces, por la mañana, tan pronto como salga el sol, te levantarás temprano y te desplegarás contra la ciudad. Y mira, cuando él y la gente que está con él salgan a tu encuentro, harás con él como tu mano halle[a].
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni del rastro del POB inglés: ''por la mañana'' por idiomaticidad; ''salgan a tu encuentro'' para reflejar dirección hacia el interlocutor sin introducir ''contra''; y ''harás con él como tu mano halle'' para evitar la elipsis poco natural de ''le harás'' y conservar el idiomatismo final en una forma más legible en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:53:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: ''Entonces'' por וְהָיָה, la indicación temporal matutina, la prontitud al salir el sol, el mandato de levantarse temprano, el despliegue contra la ciudad, la marca de atención de וְהִנֵּה, y la conservación del idiomatismo final con nota explicativa. Sin embargo, hay un punto importante de alineación semántica en español: ''salgan hacia ti'' es posible, pero en este contexto de acción militar suena algo espacial y débil; ''salgan a tu encuentro'' refleja mejor יֹצְאִים אֵלֶיךָ sin introducir explícitamente ''contra ti'' y mantiene la revisión inglesa a ''to you''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero dos giros suenan poco naturales o incompletos en español bíblico moderno: ''en la mañana'' es comprensible, aunque ''por la mañana'' suele ser más natural; y sobre todo ''le harás'' queda demasiado elíptico en español, donde conviene explicitar el complemento con ''harás con él''. Además, ''según lo que tu mano encuentre'' conserva el hebraísmo, pero fluye mejor como ''como tu mano halle'', una formulación más idiomática en registro bíblico-legible.'
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de conservar el idiomatismo hebreo de כַּאֲשֶׁר תִּמְצָא יָדֶךָ con nota es coherente con el rastro auditado. La revisión propuesta mantiene esa filosofía mientras mejora la naturalidad del español.
  issues:
  - severity: medium
    issue: '''le harás'' suena incompleto en español'
    rationale: Aunque replica la brevedad hebrea, en español 'le harás' normalmente pide un complemento explícito. 'Harás con él' comunica mejor וְעָשִׂיתָ לּוֹ sin añadir sentido nuevo.
  - severity: medium
    issue: '''salgan hacia ti'' es menos natural en contexto narrativo-militar'
    rationale: אֵלֶיךָ se preserva mejor en español como movimiento dirigido al interlocutor. 'Salgan a tu encuentro' mantiene la dirección sin endurecerla a 'contra ti'.
  - severity: low
    issue: '''en la mañana'' es menos natural que ''por la mañana'''
    rationale: Ambas son válidas, pero 'por la mañana' suena más idiomático y ampliamente natural en español general.
  revised_spanish_text: Entonces, por la mañana, tan pronto como salga el sol, te levantarás temprano y te desplegarás contra la ciudad. Y mira, cuando él y la gente que está con él salgan a tu encuentro, harás con él como tu mano halle[a].
  revised_footnotes:
  - marker: a
    text: 'Hebraísmo: «como tu mano halle», es decir, conforme a lo que esté dentro de tu poder o de tu oportunidad.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni del rastro del POB inglés: ''por la mañana'' por idiomaticidad; ''salgan a tu encuentro'' para reflejar dirección hacia el interlocutor sin introducir ''contra''; y ''harás con él como tu mano halle'' para evitar la elipsis poco natural de ''le harás'' y conservar el idiomatismo final en una forma más legible en español.'
