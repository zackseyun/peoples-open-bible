translation:
  language: es
  text: 'Y su compañía[a], los registrados[b] de entre ellos: cuarenta y un mil quinientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ejército» o «su hueste»; el hebreo צָבָא puede denotar un contingente militar o una unidad organizada dentro del censo del campamento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los contados de ellos» o «los pasados en revista de entre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: And his company
  chosen_spanish: Y su compañía
  alternatives_spanish:
  - Y su ejército
  - Y su hueste
  lexicon: HALOT
  rationale: צָבָא puede referirse a una división organizada o contingente militar. «Compañía» comunica en español la idea de un grupo ordenado sin cargar de más el sentido bélico de «ejército», y mantiene el posesivo de tercera persona singular del hebreo.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los mustrados de ellos
  - los enumerados de ellos
  - sus contados
  lexicon: HALOT
  rationale: La expresión de פקד en contexto censal apunta a los que han sido contados o pasados revista. «Los contados de ellos» conserva la formulación breve y el valor de censo sin añadir explícitamente «hombres», que el hebreo aquí no menciona.
- source_word: אֶחָד וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty-one thousand five hundred
  chosen_spanish: cuarenta y un mil quinientos
  alternatives_spanish:
  - uno y cuarenta mil y quinientos
  lexicon: HALOT
  rationale: Se traslada el número al orden natural del español moderno sin cambiar el valor numérico. Es una modernización estilística, no interpretativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con el audit trail inglés: צָבָא se vierte como un grupo organizado del campamento, פקודי como los contados en un censo, y el número se expresa en orden natural del español. No se registran revisiones aplicadas en el pass de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada en este proyecto cuando aparezca el nombre divino, pero aquí no aparece.
  - Se conserva un registro breve y transparente de alternativas léxicas para reflejar la ambigüedad de צָבָא y פקוד en contexto censal.
  - 'El número se presenta con el estilo habitual del español: «cuarenta y un mil quinientos».'
