translation:
  language: es
  text: Ahora el resto de los hechos[a] de Zimri, y el complot que tramó[b]—¿no están escritos en el Libro de las Crónicas de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hechos». דִּבְרֵי puede abarcar palabras, asuntos o hechos; aquí el sentido es el conjunto de acciones registradas del rey.
    reason: lexical_alternative
  - marker: b
    text: Lit. «la conspiración que conspiró». El hebreo usa un sustantivo y un verbo de la misma raíz para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - En cuanto al resto de
  lexicon: HALOT
  rationale: En este tipo de fórmula regnal, יֶתֶר introduce el remanente de la historia del rey. «Ahora, el resto de» conserva la función de transición y suena natural en español bíblico contemporáneo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - palabras
  - asuntos
  lexicon: HALOT
  rationale: Aquí דִּבְרֵי no se refiere a palabras dichas, sino a los hechos o asuntos del rey. «Hechos» comunica bien el sentido de registro histórico sin perder la amplitud del hebreo.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  alternatives_spanish:
  - Zimrí
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio en forma transliterada. Se evita ajustar la ortografía a una forma tradicional no unificada, manteniendo transparencia textual.
- source_word: וְקִשְׁרוֹ
  english_pob_choice: and the conspiracy
  chosen_spanish: y la conspiración
  alternatives_spanish:
  - y su conspiración
  - y su complot
  - y su traición
  lexicon: HALOT
  rationale: קֶשֶׁר en contexto real tiene fuerza política de conspiración o complot. «Conspiración» reproduce mejor ese peso que una versión más general o más interpretativa.
- source_word: אֲשֶׁר קָשָׁר
  english_pob_choice: that he conspired
  chosen_spanish: que conspiró
  alternatives_spanish:
  - que tramó
  - que urdió
  lexicon: HALOT
  rationale: Se conserva el juego de raíz entre el sustantivo y el verbo cognado, tal como lo enfatiza el hebreo. «Que conspiró» mantiene la repetición sin agregar una paráfrasis ajena al texto.
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están?
  - ¿no se hallan?
  lexicon: HALOT
  rationale: La pregunta retórica en español requiere una forma natural. «¿No están» preserva la función retórica de הֲלֹא en la fórmula de archivo.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - escrito
  - registrados
  lexicon: HALOT
  rationale: El participio pasivo plural se expresa de modo natural con «escritos». En español suena más idiomático en esta pregunta retórica que «escrito» o «registrados».
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book of
  chosen_spanish: en el Libro de
  alternatives_spanish:
  - sobre el libro de
  - en el rollo de
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», la fórmula archivística en español se vierte naturalmente «en el Libro de». «Libro» respeta el valor de סֵפֶר como registro escrito.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los hechos de los días
  lexicon: HALOT
  rationale: El sintagma nombra un registro analesco. «Crónicas» es la equivalencia más estable y transparente en español para este título-formulario.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los monarcas de Israel
  lexicon: HALOT
  rationale: El lamed aquí es genitivo de pertenencia/título, no un dativo. «De los reyes de Israel» refleja la función del encabezado del registro.
theological_decisions:
- issue: Título del archivo histórico y terminología regnal
  english_pob_reading: the Book of the Chronicles of the Kings of Israel
  chosen_spanish_reading: el Libro de las Crónicas de los reyes de Israel
  alternative_spanish_readings:
  - el libro de los Anales de los reyes de Israel
  - el Libro de las Crónicas de los reyes de Israel
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión terminológica: mantener el carácter archivístico y el sentido de registro real. Se conserva «Crónicas» como equivalente tradicional de este formulario histórico, sin forzar una lectura canónica ajena al hebreo.'
  doctrine_reference: No aplica; decisión de formulación histórico-terminológica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una paráfrasis demasiado interpretativa («that he carried out») para volver a una forma más cercana al hebreo («that he conspired»). La versión española sigue esa decisión y conserva explícitamente la repetición léxica raíz-sustantivo/verbo con «la conspiración que conspiró».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva «Crónicas» por la fórmula histórica estable y por coherencia con el registro analesco del hebreo.
  - «Reyes de Israel» se mantiene en minúsculas internas por tratarse de un encabezado genitivo dentro de la frase, no de un título institucional autónomo.
