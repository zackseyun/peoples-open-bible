review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: acción narrativa pasada, sujeto Josué, objeto directo los sacerdotes, fórmula introductoria de habla, e imperativo plural dirigido a los sacerdotes. Sin embargo, «Suban del Jordán» debilita el matiz de salida desde dentro del río que expresa מִן הַיַּרְדֵּן en este contexto; el inglés auditado lo preserva con «out of the Jordan».'
  spanish_quality_summary: El español es claro y digno, pero «Suban del Jordán» suena algo incompleto o menos idiomático para describir salir del cauce. «Suban del río Jordán» todavía podría leerse como mera procedencia; «Salgan del Jordán» perdería el ascenso. La mejor reparación breve y natural es «Suban y salgan del Jordán» o, más elegantemente, «Salgan subiendo del Jordán», pero esta última suena forzada. La opción más fiel y legible es «Suban del interior del Jordán» aunque algo explícita. Una solución natural y suficientemente literal es «Suban y salgan del Jordán».
  glossary_alignment: No hay términos de glosario mayor en disputa. «Josué» y «sacerdotes» están bien. No aparece Yahvé ni otro término sensible. La decisión principal es semántica-contextual sobre מִן.
