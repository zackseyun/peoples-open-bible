translation:
  language: es
  text: ¿No fuiste tú la que secó el mar, las aguas del gran abismo[a], la que hizo de las profundidades del mar un camino para que cruzaran los redimidos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "las aguas del vasto abismo".
    reason: lexical_alternative
  - marker: b
    text: O "para que cruzaran los rescatados".
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Was it not
  chosen_spanish: ¿No eres tú...?
  alternatives_spanish:
  - ¿Acaso no eres tú...?
  - ¿No fuiste tú...?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera una respuesta afirmativa. En español, '¿No eres tú...?' conserva ese efecto directo y mantiene la segunda persona enfática.
- source_word: אַתְּ הִיא
  english_pob_choice: you
  chosen_spanish: tú / la que
  alternatives_spanish:
  - tú misma / la que
  - ustedes
  lexicon: HALOT
  rationale: El hebreo usa femenino singular enfático. En español no se marca género en la segunda persona singular; por eso se expresa con 'tú' y la relativa 'la que' para reflejar la forma femenina del contexto sin sobreexplicarla.
- source_word: הַמַּחֲרֶבֶת
  english_pob_choice: who dried up
  chosen_spanish: secó
  alternatives_spanish:
  - que secó
  - que dejó seco
  lexicon: HALOT
  rationale: '''Secó'' reproduce de manera natural el valor causativo aplicado al mar y mantiene la alusión al éxodo mejor que ''devastó'' o ''dejó seco''.'
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar Rojo
  lexicon: HALOT
  rationale: '''Mar'' es la equivalencia directa; no se explicita ''Rojo'' en el texto principal para no añadir una precisión que el hebreo no nombra de forma explícita.'
- source_word: מֵי תְּהוֹם רַבָּה
  english_pob_choice: the waters of the great deep
  chosen_spanish: las aguas del gran abismo
  alternatives_spanish:
  - las aguas del vasto abismo
  - las aguas del inmenso abismo
  lexicon: HALOT
  rationale: '''תְּהוֹם'' conserva el matiz de abismo/profundidad primordial. ''Gran abismo'' mantiene el tono elevado y la resonancia cósmica del hebreo.'
- source_word: הַשָּׂמָה
  english_pob_choice: who made
  chosen_spanish: la que hizo
  alternatives_spanish:
  - la que puso
  - la que colocó
  lexicon: HALOT
  rationale: '''Hizo'' es una solución idiomática en español para introducir la segunda cláusula relativa con complemento de resultado: ''un camino''.'
- source_word: מַעֲמַקֵּי יָם
  english_pob_choice: the depths of the sea
  chosen_spanish: las profundidades del mar
  alternatives_spanish:
  - los hondos lugares del mar
  - las profundidades del mar
  lexicon: HALOT
  rationale: '''Profundidades del mar'' es natural y fiel al plural constructo, preservando la imagen de los abismos marinos.'
- source_word: דֶּרֶךְ
  english_pob_choice: a way
  chosen_spanish: un camino
  alternatives_spanish:
  - una senda
  - un paso
  lexicon: HALOT
  rationale: '''Un camino'' mantiene la metáfora concreta y es claro en español moderno.'
- source_word: לַעֲבֹר
  english_pob_choice: to cross over
  chosen_spanish: para que cruzaran
  alternatives_spanish:
  - para pasar
  - para atravesar
  lexicon: HALOT
  rationale: La construcción final expresa finalidad en español. 'Cruzar' comunica bien la idea de pasar de un lado a otro sobre el mar abierto.
- source_word: גְּאוּלִים
  english_pob_choice: the redeemed
  chosen_spanish: los redimidos
  alternatives_spanish:
  - los rescatados
  - los rescatados por redención
  lexicon: HALOT
  rationale: '''Redimidos'' conserva el lenguaje técnico-teológico de גאל, más cercano al registro bíblico que ''rescatados''.'
theological_decisions:
- issue: Alusión al éxodo sin explicitar el mar como 'Rojo'
  english_pob_reading: Retain the historical sea-crossing imagery in direct language without making the referent explicit in the main text.
  chosen_spanish_reading: Conservar 'el mar' en el texto principal, sin añadir 'Rojo'
  alternative_spanish_readings:
  - Especificar 'el mar Rojo' en el texto principal
  - Generalizar la imagen como una mera liberación simbólica
  rationale: El hebreo evoca el éxodo y también la teología amplia de la redención. Mantener 'el mar' preserva ambas capas sin introducir una precisión interpretativa que el texto no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador se alinea con el estado de alta concordancia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene 'redimidos' para גְּאוּלִים, en coherencia con el registro bíblico-teológico del libro de Isaías.
  - Se conserva el paralelismo poético con dos relativas ('la que secó... la que hizo...'), respetando la estructura hebrea.
  - No se usa 'SEÑOR' ni 'Cristo' porque el versículo no los contiene.
  - El tono es formal y publicable, sin arcaísmos innecesarios.
