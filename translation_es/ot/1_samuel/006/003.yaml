revisions:
- from: 'Y dijeron[a]: «Si están enviando el arca del Dios de Israel, no la envíen vacía, porque ciertamente deben devolverle una ofrenda por la culpa[b]; entonces serán sanados, y se les hará saber por qué su mano no se ha apartado de ustedes».'
  to: 'Y dijeron[a]: «Si van a devolver el arca del Dios de Israel, no la devuelvan vacía, porque ciertamente deben devolverle una ofrenda por la culpa[b]; entonces serán sanados, y se les hará saber por qué su mano no se ha apartado de ustedes».'
  rationale: La revisión hace más natural y preciso en español el valor contextual de שׁלח como restitución del arca («devolver»), y corrige la nota [a] para que refleje una alternativa léxica real y no una variación aspectual no documentada. Se conserva intacta la referencia personal a Dios en «devolverle», la metáfora «su mano» y la terminología sacrificial principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:07:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: conserva la repetición de שלח, mantiene el referente personal de לּוֹ como Dios de Israel, traduce אָשָׁם en clave sacrificial y preserva la metáfora «su mano». Sin embargo, hay dos desajustes menores: el inglés auditado usa «sending away / send ... away», y en español conviene explicitar mejor ese matiz como «devolver / devolver» o «enviar de regreso»; además, la nota [a] actual («O “estaban enviando”») no corresponde a la alternativa documentada, que no trata del tiempo verbal sino del matiz léxico del verbo.'
  spanish_quality_summary: El español es claro y digno, pero «si están enviando» suena algo calco y menos natural en contexto narrativo que «si van a devolver» o «si devuelven». El resto del versículo es legible y eclesialmente apto. «Serán sanados» y «se les hará saber» funcionan bien. La puntuación y el registro son adecuados.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Dios» está bien; no aparece Yahvé en el texto fuente. La decisión «ofrenda por la culpa» es defendible y coherente con la auditoría inglesa, con alternativa «ofrenda de reparación» en nota. Se preserva correctamente «su mano» en vez de una paráfrasis interpretativa.
  issues:
  - severity: medium
    issue: El verbo principal שׁלח se vierte como «están enviando / no la envíen», pero el contexto y la auditoría inglesa apuntan más específicamente a devolver o enviar de regreso el arca.
    rationale: Aunque «enviar» no es incorrecto, en español «devolver» o «enviar de regreso» expresa mejor la situación de restitución desde custodia filistea y conserva la fuerza contextual de «send away».
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica relevante documentada en la auditoría inglesa.
    rationale: La nota actual ofrece «estaban enviando», que introduce una diferencia aspectual/temporal no sustentada por la nota inglesa. La alternativa pertinente debe referirse al matiz de «devolver / enviar de regreso / dejar ir», no al imperfecto.
  - severity: low
    issue: «Vacía» podría sonar levemente extraño con «arca» como objeto directo femenino.
    rationale: No es un error; la frase se entiende. En el contexto revisado con «devolverla», sigue siendo aceptable y natural, equivalente a «no la devuelvan vacía».
  revised_spanish_text: 'Y dijeron[a]: «Si van a devolver el arca del Dios de Israel, no la devuelvan vacía, porque ciertamente deben devolverle una ofrenda por la culpa[b]; entonces serán sanados, y se les hará saber por qué su mano no se ha apartado de ustedes».'
