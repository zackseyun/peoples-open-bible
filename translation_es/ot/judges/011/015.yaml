translation:
  language: es
  text: 'Y le dijo[a]: «Así dice Jefté: Israel no tomó la tierra de Moab ni la tierra de los hijos de Amón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la tierra de los amonitas». El hebreo dice literalmente: «la tierra de los hijos de Amón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y le habló
  - Y le dijo a él
  lexicon: HALOT
  rationale: El hebreo introduce un nuevo acto de habla en secuencia narrativa. En español, «le dijo» mantiene la relación dativa y suena natural sin perder el sentido básico de אמר.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así dice aquí
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética/declarativa «כֹּה אָמַר» se conserva con una forma solemne y vigente en español. «Así dice» reproduce mejor el efecto formular que un pasado simple.
- source_word: יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: Jefté
  alternatives_spanish:
  - Jefta
  - Jefté
  lexicon: standard onomastics
  rationale: Se usa la forma española tradicional y estable del nombre propio, ampliamente reconocible en español bíblico.
- source_word: לֹא לָקַח
  english_pob_choice: did not take
  chosen_spanish: no tomó
  alternatives_spanish:
  - no se apoderó de
  - no capturó
  lexicon: HALOT
  rationale: לקח aquí es el verbo general «tomar», y el contexto histórico-diplomático no exige una intensificación como «capturar» o «apoderarse de».
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  lexicon: HALOT
  rationale: «Tierra» conserva la repetición del hebreo y funciona bien para el sentido geográfico-político del pasaje.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moab
  lexicon: standard toponymy
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la construcción literal «hijos de Amón» para reflejar con precisión el hebreo. La alternativa idiomática «amonitas» queda implícitamente disponible, pero no se adopta en el texto principal porque el original no usa el etnónimo abreviado.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el auditoría inglesa fue de alta concordancia y no requirió revisiones sustantivas; la decisión principal en español fue mantener la fórmula solemne de citación y una equivalencia transparente para el etnónimo hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la estructura paralela «la tierra de Moab ni la tierra de los hijos de Amón» para reflejar el hebreo.
  - Se usa «Jefté» como forma española habitual del nombre propio, sin alterar el contenido semántico.
