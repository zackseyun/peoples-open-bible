  language: en
  yaml_path: translation/ot/1_chronicles/015/027.yaml
  text: Now David was clothed with a robe of fine linen[a], as were all the Levites who were carrying the ark, and the singers, and Chenaniah, the leader of the singing of the singers; and on David was a linen ephod.
