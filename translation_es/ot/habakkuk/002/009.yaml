  text: ה֗וֹי בֹּצֵ֛עַ בֶּ֥צַע רָ֖ע לְ/בֵית֑/וֹ לָ/שׂ֤וּם בַּ/מָּרוֹם֙ קִנּ֔/וֹ לְ/הִנָּצֵ֖ל מִ/כַּף רָֽע־׃
base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/009.yaml
  text: Woe to him who gains evil profit for his house[a], to set his nest on high[c][b], to escape from the grasp of disaster.
  footnotes:
  - marker: a
    text: Or 'unjust gain,' 'dishonest gain,' or 'wicked gain.' The Hebrew expression refers to profit acquired through wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his nest.' The image is of making oneself unreachable, like a bird nesting high above danger.
    reason: cultural_note
  - marker: c
    text: Literally 'from the palm/hand of harm'—that is, from the reach or power of disaster.
    reason: lexical_alternative
