translation:
  language: es
  text: Llamé a mis amantes[a]; ellos me engañaron. Mis sacerdotes y mis ancianos perecieron en la ciudad mientras buscaban alimento para sí mismos para recobrar la vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amantes» preserva la metáfora hebrea. En este contexto puede aludir a aliados políticos o a objetos de confianza mal depositada; el texto hebreo no obliga a especificar más en el versículo.
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: «porque buscaban alimento para sí mismos para recobrar la vida». El hebreo permite una relación más causal en la cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: Llamé
  alternatives_spanish:
  - Clamé
  - Llamé en voz alta
  lexicon: HALOT
  rationale: El qal perfecto de קרא admite 'llamar' o 'clamar'. 'Llamé' conserva la apelación directa y suena natural en español sin añadir intensidad no explicitada por el contexto.
- source_word: לַמְאַהֲבַי
  english_pob_choice: to my lovers
  chosen_spanish: a mis amantes
  alternatives_spanish:
  - a mis aliados
  - a los que me amaban
  lexicon: HALOT
  rationale: Se preserva la metáfora concreta de 'amantes' que el texto hebreo expresa. Aunque el referente puede aludir a aliados políticos, el texto no lo dice de forma explícita y no debe aplanarse en el cuerpo principal.
- source_word: רִמּוּנִי
  english_pob_choice: they deceived me
  chosen_spanish: me engañaron
  alternatives_spanish:
  - me traicionaron
  - me defraudaron
  lexicon: HALOT
  rationale: רמה en piel expresa engaño/decepción. 'Me engañaron' es la equivalencia más directa y clara en español para la queja del lamento.
- source_word: כֹּהֲנַי
  english_pob_choice: my priests
  chosen_spanish: mis sacerdotes
  alternatives_spanish:
  - mis sacerdotes del templo
  lexicon: HALOT
  rationale: כֹּהֲנַי se refiere de manera simple a los sacerdotes del pueblo. 'Sacerdotes' es el equivalente estándar y fiel.
- source_word: וּזְקֵנַי
  english_pob_choice: and my elders
  chosen_spanish: y mis ancianos
  alternatives_spanish:
  - y mis líderes
  - y mis viejos
  lexicon: HALOT
  rationale: זקנים aquí funciona como designación de los dirigentes mayores de la ciudad. 'Ancianos' conserva esa función social mejor que 'viejos'.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa e idiomática.
- source_word: גָּוָעוּ
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - murieron
  - expiraron
  lexicon: HALOT
  rationale: גוע denota morir, exhalar el último aliento, en registro poético. 'Perecieron' mantiene el tono de calamidad sin resultar demasiado clínico.
- source_word: כִּי בִקְשׁוּ אֹכֶל לָמוֹ
  english_pob_choice: while they sought food for themselves
  chosen_spanish: mientras buscaban alimento para sí mismos
  alternatives_spanish:
  - porque buscaban alimento para sí mismos
  - ya que buscaban alimento para sí mismos
  lexicon: HALOT
  rationale: כִּי puede ser causal o circunstancial. 'Mientras' refleja bien el trasfondo temporal/circunstancial que la revisión inglesa destacó, sin forzar una causalidad exclusiva.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - víveres
  lexicon: HALOT
  rationale: '''Alimento'' mantiene un registro algo más solemne y se adecua al contexto de escasez.'
- source_word: וְיָשִׁיבוּ אֶת נַפְשָׁם
  english_pob_choice: to restore their lives
  chosen_spanish: para reanimar sus vidas
  alternatives_spanish:
  - para restaurar sus vidas
  - para revivir sus vidas
  - para volver a darles vida
  lexicon: HALOT
  rationale: נפש aquí se refiere a la vida misma, no a una entidad separada del cuerpo. 'Reanimar' conserva la idea de devolver vigor/vida; el plural 'vidas' refleja naturalmente el sufijo plural del hebreo, como señaló la revisión inglesa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo la estructura general y ajustó 'life' a 'lives' para reflejar mejor el plural del hebreo. En español se conservó esa pluralidad con 'sus vidas'. También se mantuvo la ambigüedad de כִּי mediante 'mientras', sin cerrar indebidamente el matiz causal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto cuando no aparece el Tetragrámaton en este versículo, por lo que no se introduce aquí.
  - Se preserva 'amantes' como metáfora, siguiendo la decisión auditada en inglés; no se sustituye por 'aliados' en el texto principal.
  - '''Sacerdotes'' y ''ancianos'' mantienen el paralelismo social del hebreo.'
  - '''Perecieron'' y ''reanimar'' conservan el tono poético y la tensión semántica del lamento.'
