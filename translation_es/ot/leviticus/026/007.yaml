translation:
  language: es
  text: Ustedes perseguirán a sus enemigos[a], y caerán delante de ustedes a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caerán delante de ustedes por la espada». El hebreo permite más de una forma idiomática de expresar este giro en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְדַפְתֶּם
  english_pob_choice: you will pursue
  chosen_spanish: perseguirán
  alternatives_spanish:
  - los perseguirán
  - irán en persecución de
  lexicon: HALOT
  rationale: רדף expresa la idea de seguir en persecución, especialmente en contexto militar. «Perseguirán» conserva el valor léxico y el tono natural del español sin perder la imagen de combate.
- source_word: אֹיְבֵיכֶם
  english_pob_choice: your enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a quienes los odian
  - a sus adversarios
  lexicon: HALOT
  rationale: אויב es el término estándar para «enemigos». En español, el sufijo posesivo de segunda persona plural se refleja de forma natural con «sus» en un contexto de trato reverente o comunitario.
- source_word: וְנָפְלוּ
  english_pob_choice: and they will fall
  chosen_spanish: y caerán
  alternatives_spanish:
  - y serán derrotados
  - y se derrumbarán
  lexicon: HALOT
  rationale: נפל significa literalmente «caer». Se mantiene la imagen hebrea en lugar de sustituirla por una explicación interpretativa como «serán derrotados».
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - en su presencia
  lexicon: HALOT
  rationale: לפני con sufijo indica posición frontal o de enfrentamiento. «Delante de ustedes» reproduce bien el sentido espacial y militar en español.
- source_word: לֶחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - por medio de la espada
  lexicon: HALOT
  rationale: La construcción con ל + חרב puede expresar medio o resultado en contexto bélico. «A espada» es una forma española breve y natural que conserva el matiz instrumental/resultativo sin sobreexplicar.
translation_notes:
  revision_awareness: El texto hebreo es breve y coincide sustancialmente con la POB inglesa auditada. Se conservó la imaginería militar directa («perseguirán», «caerán», «a espada») y se evitó una paráfrasis explicativa que suavizara el valor literal de נפל o de לֶחָרֶב.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el destinatario plural, coherente con un registro bíblico claro en español moderno.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se preserva la imagen concreta de combate en lugar de convertirla en una abstracción como «serán vencidos».
