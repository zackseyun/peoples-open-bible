  text: Βλέπετε μὴ παραιτήσησθε τὸν λαλοῦντα· εἰ γὰρ ἐκεῖνοι οὐκ ⸀ἐξέφυγον ⸂ἐπὶ γῆς παραιτησάμενοι τὸν⸃ χρηματίζοντα, ⸀πολὺ μᾶλλον ἡμεῖς οἱ τὸν ἀπ’ οὐρανῶν ἀποστρεφόμενοι·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/025.yaml
  text: See to it that you do not refuse the one who is speaking[a]. For if those did not escape when they refused the one who warned them on earth[b], much less will we if we turn away from the one who warns from heaven.
  footnotes:
  - marker: a
    text: Or 'the one who gave divine warning on earth.' The Greek verb can denote divinely authorized instruction or warning.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'much more we, the ones turning away from the one from heaven'; the Greek leaves the verb 'escape' implied from the previous clause.
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분은 말씀하시는 분을 거부하지 않도록 주의하십시오. 만일 땅 위에서 경고하시는 분을 거부한 그들이 피하지 못하였다면, 하늘로부터 경고하시는 분에게서 돌아서는 우리는 얼마나 더 그러하겠습니까?
  philosophy: optimal-equivalence
