revisions:
- from: Ahora, por favor, cuídate[a], y no bebas vino ni bebida fuerte[b], ni comas cosa inmunda[c].
  to: Ahora, ten cuidado[a], por favor, y no bebas vino ni bebida fuerte[b], y no comas nada inmundo[c].
  rationale: Se reemplaza «cuídate» por «ten cuidado» para reflejar mejor el llamado a cautela del hebreo en un español más natural. Se ajusta «ni comas cosa inmunda» a «y no comas nada inmundo» para mejorar la fluidez y conservar la categoría ritual de טָמֵא. Se mantienen la coordinación hebrea con «y» y la nota cultural sobre «bebida fuerte».
