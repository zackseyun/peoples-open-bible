translation:
  language: es
  text: Ramot con sus tierras de pastoreo, y Anem[a] con sus tierras de pastoreo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Anem»; en la lista paralela de Josué 21:25 aparece «Aner».'
    reason: alternative_reading
lexical_decisions:
- source_word: רָאמוֹת
  english_pob_choice: Ramoth
  chosen_spanish: Ramot
  alternatives_spanish:
  - Ramoth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva transliterado. En español bíblico, «Ramot» es una forma natural y fiel al hebreo, manteniendo la referencia geográfica sin traducir el topónimo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - sus pastizales
  - sus tierras abiertas
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ denota el terreno abierto asociado a una ciudad; en el contexto de ciudades levíticas, «tierras de pastoreo» comunica bien el uso funcional de ese espacio en español moderno sin perder la idea de terreno anexo perteneciente a la ciudad.
- source_word: עָנֵם
  english_pob_choice: Anem
  chosen_spanish: Anem
  alternatives_spanish:
  - Aner
  lexicon: HALOT
  rationale: Se conserva el nombre propio según el texto masorético. La forma alternativa «Aner» se deja como posibilidad textual apoyada por el paralelo de Josué 21:25.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: grammatical conjunction
  rationale: El marcador de objeto directo no se traduce; la coordinación se expresa de forma natural en español con «y», manteniendo la estructura enumerativa del hebreo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una lista de ciudades con sus terrenos anexos. No se detectan revisiones aplicadas al inglés; se mantiene la lectura masorética de «Anem» y se conserva en nota la variante paralela «Aner».
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay términos divinos en este versículo.
  - Se preserva la transparencia toponímica con transliteración consistente.
  - «Tierras de pastoreo» se eligió como equivalente idiomático de מִגְרָשׁ en el marco levítico, sin introducir explicación adicional en el texto principal.
