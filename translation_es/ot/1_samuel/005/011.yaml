review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: convocatoria de todos los gobernantes filisteos, mandato de expulsar el arca, jussivo de retorno, pánico mortal en toda la ciudad, y preserva la metáfora «la mano de Dios». Sin embargo, presenta dos desajustes relevantes: ancla la nota [a] en «filisteos» cuando la alternativa léxica corresponde a «señores», y omite una nota sobre «la mano de Dios… muy pesada», que el rastro POB inglés preserva explícitamente como metáfora teológica significativa. Además, «estaba muy pesada» es comprensible pero menos idiomático que «pesaba muchísimo / con mucha fuerza»; conviene ajustar sin perder la metáfora.'
  spanish_quality_summary: El español es mayormente claro y digno. «Señores de los filisteos» funciona, aunque «jefes» o «gobernantes» serían más transparentes; no es necesario cambiarlo. «Saquen el arca» suena natural en contexto. «Pánico mortal» también es natural. La frase final mejora en español con «la mano de Dios pesaba muchísimo allí», que conserva el hebraísmo pero evita una construcción algo rígida.
  glossary_alignment: 'No hay conflicto con terminología de proyecto: אֱלֹהִים -> «Dios» está bien en este contexto; no aparece Yahvé, Mesías, δοῦλος, etc. La decisión de mantener «la mano de Dios» está alineada con la racionalidad teológica documentada y debe reforzarse con nota. El cambio al plural «nos… nuestro pueblo» sigue la revisión inglesa auditada, aunque el hebreo tenga singular; no requiere nueva corrección aquí.'
  issues:
