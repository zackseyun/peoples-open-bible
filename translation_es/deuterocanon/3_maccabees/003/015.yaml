  yaml_path: translation/deuterocanon/3_maccabees/003/015.yaml
  text: We considered that the nations inhabiting Coele-Syria and Phoenicia should be nurtured not by the force of the spear[a], but with gentleness and great kindness[b], having gladly done them good.
  footnotes:
  - marker: a
    text: Or 'nurtured' or 'fostered'; the Greek verb evokes rearing or nursing, using paternalistic imagery for the treatment of subject peoples.
    reason: lexical_alternative
  - marker: b
    text: Literally 'not by the force of the spear,' a military image for coercive rule.
    reason: cultural_note
