  rationale: La conjunción se rinde con «y». El nombre propio se adapta a la convención española como «Uziel», forma más natural y estable que una transliteración inglesa.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
