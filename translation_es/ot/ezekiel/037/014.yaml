  rationale: 'La revisión hace ajustes menores para reflejar mejor el hebreo y mejorar la naturalidad del español: ''en ustedes'' corresponde mejor a בכם, ''en su propia tierra'' expresa mejor el reasentamiento que ''sobre su propia tierra'', y se elimina el ''Yo'' enfático innecesario. Se conserva la terminología clave del proyecto y la nota lexical sobre רוּחַ.'
