base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/010/039.yaml
  text: And the priest[a], a son of Aaron, shall be with the Levites when the Levites collect the tithe, and the Levites shall bring up the tithe of the tithe to the house of our God[b], to the chambers of the storehouse.
  footnotes:
  - marker: a
    text: Or 'a tenth of the tithe.' The Hebrew expression is literally 'the tithe of the tithe,' referring to the portion the Levites themselves give from the tithe they receive.
    reason: lexical_alternative
  - marker: b
    text: Or 'treasury.' Here the sense is likely a storage area for tithes and offerings rather than a money treasury specifically.
    reason: lexical_alternative
