    rationale: «Abominación» ya transmite bien βδέλυγμα en español y no resuelve una ambigüedad creada por el texto meta. Mantener una nota aquí desplaza la atención de la verdadera cuestión léxica.
  revised_spanish_text: Hay una maldad que también es abominación, y hay un necio carente de sabiduría[a].
