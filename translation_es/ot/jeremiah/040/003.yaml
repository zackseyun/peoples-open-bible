base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/003.yaml
  text: And Yahweh has brought it about and has done just as he said[a], because you sinned against Yahweh and did not listen to his voice[b]; therefore this thing has happened to you.
  footnotes:
  - marker: a
    text: Or, 'did not obey his voice.' The Hebrew idiom 'listen to his voice' often carries the sense of obedience.
    reason: lexical_alternative
  - marker: b
    text: Or, 'this disaster has come upon you.' Hebrew 'this thing' can refer more specifically to the calamity just described.
    reason: lexical_alternative
