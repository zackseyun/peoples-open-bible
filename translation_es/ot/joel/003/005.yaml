translation:
  language: es
  text: Y sucederá que todo el que invoque el nombre de Yahvé[a] será librado; porque en el monte de Sion y en Jerusalén habrá escape[b], como Yahvé ha dicho[c], entre los sobrevivientes que Yahvé llama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien invoque el nombre del SEÑOR»; el hebreo usa el nombre divino Yahvé.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo פְלֵיטָה: puede significar «escape», «libramiento», «liberación» o, según el contexto, «sobrevivientes escapados/remanente».'
    reason: lexical_alternative
  - marker: c
    text: 'El versículo mantiene ambas realidades: quienes invocan a Yahvé y los sobrevivientes que Yahvé llama.'
    reason: theological_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un resultado futuro. «Sucederá» conserva ese valor discursivo en español natural y digno, sin caer en un calco arcaizante.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - quienquiera que
  - todos los que
  lexicon: HALOT
  rationale: La construcción distributiva pide una forma personal universal. «Todo el que» es clara, idiomática y conserva la amplitud del hebreo.
- source_word: יִקְרָא בְּשֵׁם יְהוָה
  english_pob_choice: calls on the name of Yahweh
  chosen_spanish: invoque el nombre de Yahvé
  alternatives_spanish:
  - clame al nombre de Yahvé
  - llame sobre el nombre de Yahvé
  lexicon: HALOT
  rationale: El verbo hebreo en esta expresión idiomática implica invocación/apelación cultual. «Invoque» expresa bien ese sentido en español, sin perder la referencia al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se traduce como «Yahvé» para preservar el nombre divino revelado, no una sustitución titular.
- source_word: יִמָּלֵט
  english_pob_choice: will be delivered
  chosen_spanish: será librado
  alternatives_spanish:
  - escapará
  - será salvado
  lexicon: HALOT
  rationale: El nifal de מלט puede significar escapar o ser rescatado. «Será librado» mantiene el valor de liberación/rescate y evita restringirlo demasiado a un escape meramente físico o a un tecnicismo soteriológico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la promesa anterior. «Porque» es la opción más directa y transparente en español.
- source_word: בְּהַר צִיּוֹן וּבִירוּשָׁלַם
  english_pob_choice: on Mount Zion and in Jerusalem
  chosen_spanish: en el monte de Sion y en Jerusalén
  alternatives_spanish:
  - sobre el monte Sion y en Jerusalén
  - en el monte de Sion y Jerusalén
  lexicon: HALOT
  rationale: En español, para un monte se usa más naturalmente «en» cuando se habla de ubicación de presencia o acontecimiento. Se mantiene la paralela referencia geográfica a Sion y Jerusalén.
- source_word: תִּהְיֶה פְלֵיטָה
  english_pob_choice: there will be escape
  chosen_spanish: habrá escape
  alternatives_spanish:
  - habrá libramiento
  - habrá liberación
  lexicon: HALOT
  rationale: La lectura nominal de פְלֵיטָה apunta a «escape/deliverancia». «Habrá escape» conserva la forma breve del sustantivo singular y sigue de cerca la revisión inglesa que evitó suplir un sujeto humano.
- source_word: כַּאֲשֶׁר אָמַר יְהוָה
  english_pob_choice: as Yahweh has said
  chosen_spanish: como Yahvé ha dicho
  alternatives_spanish:
  - tal como Yahvé dijo
  - como dijo Yahvé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una declaración divina vigente. «Ha dicho» refleja esa fuerza con naturalidad en español.
- source_word: וּבַשְּׂרִידִים אֲשֶׁר יְהוָה קֹרֵא
  english_pob_choice: among the survivors whom Yahweh calls
  chosen_spanish: y entre los sobrevivientes, a quienes Yahvé llama
  alternatives_spanish:
  - y entre el remanente, a quienes Yahvé llama
  - y entre los que quedan, a quienes Yahvé llama
  lexicon: HALOT
  rationale: שְׂרִידִים denota los que han quedado o sobrevivido. «Sobrevivientes» es transparente en español y conserva la tensión con el llamado divino sin resolverla en una sola categoría teológica.
theological_decisions:
- issue: Tensión entre la invocación humana y el llamado divino
  english_pob_reading: 'Main text preserves both: ''everyone who calls on the name of the LORD'' and ''among the survivors whom the LORD calls.'''
  chosen_spanish_reading: 'El texto principal conserva ambos polos: «todo el que invoque el nombre de Yahvé» y «entre los sobrevivientes, a quienes Yahvé llama».'
  alternative_spanish_readings:
  - Reducir la primera cláusula a una promesa exclusiva para un remanente predeterminado
  - Suavizar la última cláusula como mera aposición sin fuerza propia
  rationale: El hebreo presenta simultáneamente la respuesta humana y la acción soberana divina. La traducción española mantiene esa tensión sin explicarla de más ni atenuarla.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Valor de פְלֵיטָה en el contexto del día de Yahvé
  english_pob_reading: Rendered concretely as 'there will be escape' rather than the more abstract 'there will be deliverance.'
  chosen_spanish_reading: Se traduce concretamente como «habrá escape».
  alternative_spanish_readings:
  - habrá liberación
  - habrá salvación
  - habrá remanente
  rationale: El contexto inmediato habla de juicio y supervivencia. «Escape» conserva la concreción del sustantivo hebreo y se alinea con los «sobrevivientes» del final del versículo.
  doctrine_reference: Translation philosophy §3 Preserve lexical and theological tensions
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «there will be escape» para reflejar más de cerca פְלֵיטָה como sustantivo singular. En español se adoptó «habrá escape» por la misma razón, evitando introducir un sujeto explícito y manteniendo la relación con «sobrevivientes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - «Invoque el nombre de Yahvé» conserva el valor idiomático de llamar/invocar al nombre divino sin sustituirlo por una paráfrasis más débil.
  - Se usó «sobrevivientes» para שְׂרִידִים, en coherencia con el sentido concreto de los que quedan tras el juicio.
  - La puntuación separa claramente las dos mitades del versículo y preserva el paralelismo hebreo.
