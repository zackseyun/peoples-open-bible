    rationale: El inglés POB eligió 'desire' precisamente para evitar imponer demasiado la resonancia legal de 'covet'. En español, 'codiciar' también añade esa carga. 'Desees' conserva mejor el sentido interior amplio; 'codicies' debe quedar como alternativa en nota.
  - severity: medium
    issue: La nota sobre la imagen de ser capturado por sus pestañas/ojos falta en la segunda cláusula.
    rationale: 'El audit trail inglés preserva una nota importante: literalmente ''no dejes que ella te tome con/sus párpados''. Esa información pertenece a ''te dejes cautivar por sus pestañas'', no a ''corazón''.'
  - severity: low
    issue: La nota b actual sobre 'en tu corazón' es innecesaria y poco informativa en español.
    rationale: La expresión es natural y transparente en español bíblico; no introduce una ambigüedad nueva que requiera nota.
