translation:
  language: es
  text: Y lloré. Y cuando el sol se puso, fui, cavé y lo enterré.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔκλαυσα
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - sollocé
  - me puse a llorar
  lexicon: BDAG
  rationale: El aoristo de κλαίω expresa llanto. En español, «lloré» reproduce de forma natural y breve la fuerza emocional, sin añadir la intensidad más específica de «sollocé» ni una perífrasis innecesaria.
- source_word: ὅτε ἔδυ ὁ ἥλιος
  english_pob_choice: when the sun had set
  chosen_spanish: cuando se había puesto el sol
  alternatives_spanish:
  - cuando el sol se había puesto
  - al ponerse el sol
  lexicon: LSJ
  rationale: La frase marca el momento posterior a la puesta del sol. «Se había puesto el sol» conserva el valor de acción completada anterior al resto de la secuencia narrativa y suena natural en español.
- source_word: ᾠχόμην
  english_pob_choice: I went
  chosen_spanish: me fui
  alternatives_spanish:
  - fui
  - me aparté
  lexicon: BDAG
  rationale: El verbo indica irse o marcharse. En este contexto narrativo, «me fui» es idiomático y comunica el desplazamiento sin endurecer el español con un calco como «departí».
- source_word: ὀρύξας
  english_pob_choice: dug
  chosen_spanish: cavé
  alternatives_spanish:
  - excavé
  - habiendo cavado
  lexicon: LSJ
  rationale: El participio significa literalmente «habiendo cavado». Como el contexto de entierro hace evidente el acto, «cavé» refleja el contenido verbal sin introducir explícitamente «una tumba», que no está en el griego.
- source_word: ἔθαψα αὐτόν
  english_pob_choice: buried him
  chosen_spanish: lo enterré
  alternatives_spanish:
  - lo sepulté
  lexicon: BDAG
  rationale: La forma estándar y clara en español es «enterré». «Sepulté» es posible, pero es más formal y menos directo; «lo enterré» conserva la sencillez narrativa del original.
translation_notes:
  revision_awareness: 'El inglés POB retiró «a grave» por no estar explícito en el griego y dejó solo la secuencia «dug and buried him». En español se siguió la misma decisión: no se añadió «tumba» ni «fosa», aunque el contexto funerario la sugiere.'
  spanish_consistency_notes:
  - Se mantiene la voz narrativa en primera persona singular, con coordinación simple para reproducir la secuencia del griego.
  - No se introduce un objeto explícito para «cavé», porque el griego tampoco lo ofrece y el contexto ya lo hace inteligible.
  - «Y» al inicio de las dos cláusulas reproduce la concatenación narrativa del texto griego.
