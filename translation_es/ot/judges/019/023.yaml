review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: salida del dueño de la casa, apelación directa, prohibición moral, referencia causal a la entrada del huésped en la casa, y rechazo del acto vergonzoso. Sin embargo, dos elecciones no preservan con suficiente fidelidad la fuerza del original y del rastro POB: «salió a ellos» es un calco poco natural en español, y «no hagan algo malo» debilita el sentido ético de תָּרֵעוּ (‘no obren mal’ / ‘no actúen perversamente’). Además, «esta cosa vergonzosa» suena menos idiomático y menos preciso que una formulación como «esta infamia» o «este acto vergonzoso».'
  spanish_quality_summary: 'El texto es comprensible, pero presenta calcos y giros poco naturales para un español eclesial claro: «salió a ellos», «hagan algo malo» y «cosa vergonzosa». «Amo de la casa» es defendible, aunque puede sonar algo rígido; aun así, preserva bien la autoridad doméstica del hebreo y del POB. La revisión propuesta mejora naturalidad, dignidad y fuerza moral sin apartarse del texto fuente.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. La decisión «amo de la casa» se alinea suficientemente con «master of the house». La principal desalineación está en תָּרֵעוּ, donde el borrador suaviza indebidamente la prohibición moral; y en הַנְּבָלָה הַזֹּאת, donde la formulación española puede ser más precisa y natural. Se preserva correctamente «hermanos míos» para אַחַי y «por favor» para נָא.
  issues:
  - severity: medium
    issue: «salió a ellos» es un calco poco natural
    rationale: וַיֵּצֵא אֲלֵיהֶם significa ‘salió hacia ellos / salió a su encuentro’. En español general, «salió a ellos» no suena idiomático y entorpece la lectura.
  - severity: high
    issue: «no hagan algo malo» debilita la fuerza moral de תָּרֵעוּ
    rationale: El hebreo expresa una reprensión ética fuerte. «Hagan algo malo» suena vaga y coloquial; «no obren mal» o «no actúen perversamente» preserva mejor la intensidad del original y del POB.
  - severity: medium
    issue: «esta cosa vergonzosa» es poco idiomático y menos preciso
    rationale: הַנְּבָלָה הַזֹּאת denota un acto vergonzoso, infame, moralmente escandaloso. «Cosa vergonzosa» suena débil e impreciso en español bíblico moderno. Conviene «esta infamia» con nota, o «este acto vergonzoso».
  revised_spanish_text: 'Entonces el hombre, el amo de la casa, salió a su encuentro y les dijo: «No, hermanos míos, por favor no obren mal. Ya que este hombre ha entrado en mi casa, no hagan esta infamia[a]».'
  revised_footnotes:
