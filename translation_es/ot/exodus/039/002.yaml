translation:
  language: es
  text: Y hizo el efod de oro, azul, púrpura, escarlata[a] y lino fino retorcido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente «escarlata»; el hebreo תּוֹלַעַת שָׁנִי se refiere a material teñido de escarlata, aquí expresado como color/material dentro de una lista textil.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «lino fino torcido» o «lino fino torzal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: Y hizo
  alternatives_spanish:
  - Entonces hizo
  - Y confeccionó
  lexicon: HALOT
  rationale: El wayyiqtol continúa la narración con pasado simple. «Y hizo» conserva la secuencia y la sobriedad del hebreo sin cargar el texto con una paráfrasis.
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[marcador de objeto directo, no traducido]'
  alternatives_spanish:
  - —
  lexicon: Gramática hebrea
  rationale: Marca a הָאֵפֹד como objeto directo definido; en español no tiene equivalente natural.
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el efod sacerdotal
  lexicon: HALOT
  rationale: Es un término técnico sacerdotal; se conserva como préstamo asentado en español bíblico y se evita una paráfrasis que borre su carácter específico.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  - oro trabajado
  lexicon: HALOT
  rationale: En este contexto material, el español fluye mejor con «oro». El hebreo nombra el material del efod, no necesariamente una expresión idiomática distinta; por eso se mantiene el valor básico del sustantivo.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul tejido
  - azul púrpura
  lexicon: HALOT
  rationale: Es el tinte/material azul del tabernáculo; «azul» es fiel y natural en español. Se evita especificar «hilo» porque el hebreo aquí enumera materiales de confección sin repetir el sustantivo en cada elemento.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura teñida
  lexicon: HALOT
  rationale: La mejor correspondencia léxica en español para el color/material ceremonial es «púrpura».
- source_word: וְתוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - lana carmesí
  lexicon: HALOT
  rationale: El inglés POB opta por explicitar el sentido textil con «scarlet yarn», pero el hebreo base designa el material teñido de escarlata sin repetir un sustantivo explícito. En español, «carmesí» conserva el color/tejido de forma natural y evita introducir «hilo» sin una marca morfológica equivalente directa en esta formulación.
- source_word: וְשֵׁשׁ מָשְׁזָר
  english_pob_choice: and finely twisted linen
  chosen_spanish: y lino finamente torcido
  alternatives_spanish:
  - y lino fino torcido
  - y lino finamente trenzado
  - y lino finamente torcido/twido
  lexicon: HALOT
  rationale: «שֵׁשׁ» es lino fino, y «מָשְׁזָר» añade la idea de torcido/retorcido. «Lino finamente torcido» preserva ambos elementos con español claro y digno; «torcido» aquí traduce el trabajo de torsión del hilo/tejido, no una deformación.
theological_decisions:
- issue: Término técnico cultual sin sustitución explicativa
  english_pob_reading: the ephod
  chosen_spanish_reading: el efod
  alternative_spanish_readings:
  - el efod sacerdotal
  - el delantal sacerdotal
  rationale: Se conserva el tecnicismo porque el objeto pertenece al vocabulario ritual del tabernáculo y su forma/función se desarrollan en el contexto inmediato; traducirlo por perífrasis perdería precisión.
  doctrine_reference: Éxodo 28–39; vocabulario sacerdotal levítico
- issue: Materiales del santuario como lista de materias primas
  english_pob_reading: gold, blue, purple, scarlet yarn, and finely twisted linen
  chosen_spanish_reading: oro, azul, púrpura, carmesí y lino finamente torcido
  alternative_spanish_readings:
  - oro, azul, púrpura, escarlata y lino finamente torcido
  - oro, azul, púrpura, hilo escarlata y lino finamente torcido
  rationale: El verso enumera materiales para la confección del efod. Se evita forzar una teología del detalle donde el texto solo describe la artesanía del objeto; la traducción mantiene la lista material y su carácter sagrado sin añadir comentarios.
  doctrine_reference: Éxodo 39:1–2; Éxodo 28:6–8
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente (sin cambios, alta concordancia). La redacción española se ajusta al mismo contenido base y conserva las decisiones léxicas auditadas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la POB, pero este versículo no contiene el Tetragrámaton.
  - «Efod» se conserva como tecnicismo uniforme.
  - Se usa una lista de materiales en paralelo, sin añadir sustantivos implícitos que el hebreo no expresa de forma explícita.
