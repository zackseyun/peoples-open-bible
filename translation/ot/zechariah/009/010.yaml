theological_decisions:
- issue: Referent of the third-person singular in 'he will speak peace' and 'his rule'
  chosen_reading: The verse refers to the coming king of the preceding context, rendered with personal pronouns 'he' and 'his.'
  alternative_readings:
  - An impersonal rendering such as 'peace will be proclaimed' or 'dominion will extend'
  rationale: The shift from first person divine speech ('I will cut off') to third person singular naturally points to the king introduced in the immediately preceding verse. Retaining 'he' and 'his' preserves the messianic-royal portrait without importing later doctrinal detail beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Scope of the king's reign
  chosen_reading: Universal scope is retained in the geographic idioms without reduction to merely local Israelite rule.
  alternative_readings:
  - A hyperbolic but only regional reign
  rationale: The paired expressions 'from sea to sea' and 'from the River to the ends of the earth' present an intentionally expansive reign. The translation preserves that breadth while leaving the precise mode of fulfillment to interpretation.
