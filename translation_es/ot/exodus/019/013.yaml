    reason: alternative_reading
  - marker: b
    text: 'O: «seguramente atravesado». El verbo hebreo puede referirse a ser herido por un proyectil, probablemente flechas en este contexto.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «cuando se prolongue el yōḇēl»; probablemente se refiere a un toque prolongado de cuerno de carnero.'
    reason: cultural_note
  revision_rationale: 'Se ajusta el español para reflejar mejor las decisiones documentadas del POB y la semántica hebrea: se hace explícito el objeto en la prohibición de contacto, se reemplaza «atravesado» por una formulación que conserva la idea de ejecución por proyectil, se convierte el futuro final en permiso explícito, y se corrige la nota b para que esté plenamente en español. No se requieren cambios doctrinales ni adjudicación compleja.'
