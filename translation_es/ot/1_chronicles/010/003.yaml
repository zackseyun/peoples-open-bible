translation:
  language: es
  text: La batalla se hizo pesada contra Saúl, y los arqueros lo encontraron, y fue herido[a] por los arqueros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba en gran angustia por causa de los arqueros». El verbo hebreo puede entenderse como angustia severa más que como una herida física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְבַּד
  english_pob_choice: grew heavy
  chosen_spanish: se hizo pesada
  alternatives_spanish:
  - se volvió más intensa
  - apretó con fuerza
  lexicon: HALOT
  rationale: כבד expresa la idea básica de hacerse ‘pesado’; en contexto bélico, la imagen comunica que la presión de la batalla aumentó. ‘Se hizo pesada’ conserva esa metáfora con naturalidad en español.
- source_word: הַמִּלְחָמָה עַל שָׁאוּל
  english_pob_choice: The battle ... against Saul
  chosen_spanish: la batalla ... contra Saúl
  alternatives_spanish:
  - el combate ... contra Saúl
  - la lucha ... contra Saúl
  lexicon: HALOT
  rationale: עַל con sentido hostil se expresa bien con ‘contra’. ‘Batalla’ corresponde de modo directo a מִלְחָמָה y mantiene el tono narrativo.
- source_word: וַיִּמְצָאֻהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontraron
  alternatives_spanish:
  - lo alcanzaron
  - dieron con él
  lexicon: HALOT
  rationale: מצא puede significar ‘hallar/encontrar’; en un relato militar también sugiere alcanzar al personaje. ‘Lo encontraron’ es fiel y fluido sin añadir una interpretación excesiva.
- source_word: הַמּוֹרִים בַּקָּשֶׁת
  english_pob_choice: the archers
  chosen_spanish: los arqueros
  alternatives_spanish:
  - los que disparaban con el arco
  - los flecheros
  lexicon: HALOT
  rationale: La expresión literal es ‘los que tiran con el arco’; en español bíblico y moderno, ‘arqueros’ comunica bien el oficio/función sin perder el sentido.
- source_word: וַיָּחֶל
  english_pob_choice: he was wounded
  chosen_spanish: fue herido
  alternatives_spanish:
  - sufrió una grave angustia
  - quedó muy herido
  lexicon: HALOT
  rationale: 'El verbo presenta una dificultad lexical reconocida: puede leerse como herida física o como angustia severa. Siguiendo la lectura principal del POB inglés y el flujo narrativo inmediato, se eligió ‘fue herido’ sin intensificarlo más allá del hebreo.'
- source_word: מִן הַיּוֹרִים
  english_pob_choice: by the archers
  chosen_spanish: por los arqueros
  alternatives_spanish:
  - a causa de los arqueros
  - desde los que disparaban
  lexicon: HALOT
  rationale: מן puede marcar procedencia o agencia; en español, una pasiva natural pide ‘por’. Esto mantiene la relación causal/agencial del hebreo sin forzar una construcción menos idiomática.
theological_decisions:
- issue: Alcance de וַיָּחֶל (herida física vs. angustia severa)
  english_pob_reading: The POB English text reads 'he was wounded by the archers,' while its footnote preserves the alternative that he was in great anguish because of the archers.
  chosen_spanish_reading: fue herido por los arqueros
  alternative_spanish_readings:
  - estaba en gran angustia por causa de los arqueros
  - fue presa de gran angustia por los arqueros
  rationale: La evidencia contextual favorece una lectura física, pero el hebreo admite la alternativa de angustia severa. La traducción principal conserva la lectura narrativa más común, y la nota preserva la tensión sin resolverla artificialmente.
  doctrine_reference: 1 Samuel 31:3; paralelo narrativo y discusión lexical de חלל/חול en el hebreo bíblico
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'badly' porque exageraba el matiz del verbo; esta traducción siguió ese ajuste y no añadió intensificación no sustentada. También mantuvo la alternativa de angustia severa en nota, como en el POB inglés.
  spanish_consistency_notes:
  - Se usa 'Saúl' en todo el versículo para conservar la forma estable del nombre propio.
  - Se prefirió 'arqueros' como equivalente natural y registrable de הַמּוֹרִים בַּקָּשֶׁת.
  - La nota a pie de página se ancla en 'fue herido' porque allí aparece la tensión lexical principal.
  - No se usó 'SEÑOR' ni otros términos teológicos de sustitución, ya que este versículo no contiene el Tetragrámaton.
