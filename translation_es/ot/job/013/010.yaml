translation:
  language: es
  text: Ciertamente los reprenderá si, en secreto, muestran parcialidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «levantar rostros», un modismo hebreo que significa mostrar favoritismo o parcialidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹכֵחַ יוֹכִיחַ
  english_pob_choice: will surely rebuke
  chosen_spanish: ciertamente te reprenderá
  alternatives_spanish:
  - te reprenderá con seguridad
  - te corregirá ciertamente
  - sin duda te reprochará
  lexicon: HALOT
  rationale: El infinitivo absoluto más el verbo finito intensifica la acción; en español lo reflejo con «ciertamente» para conservar el énfasis. «Reprenderá» comunica mejor que «corregirá» el tono forense y admonitorio del contexto.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - los reprenderá
  - os reprenderá
  lexicon: HALOT
  rationale: El hebreo es plural, dirigido a Job y sus amigos. En español, el singular de tratamiento directo queda mejor con el destinatario implícito del discurso, pero para evitar perder el plural, se mantiene la forma de segunda persona en una redacción natural; la advertencia sigue dirigida al grupo en contexto.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La condicionalidad del hebreo se preserva con «si»; «cuando» haría demasiado segura la condición.
- source_word: בַּסֵּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: HALOT
  rationale: «En secreto» reproduce bien el valor adverbial de ocultamiento sin sobreinterpretar.
- source_word: פָּנִים
  english_pob_choice: partiality
  chosen_spanish: parcialidad
  alternatives_spanish:
  - favoritismo
  - acepción de personas
  lexicon: HALOT
  rationale: Dentro de la locución idiomática, פָּנִים no se vierte literalmente como «rostros». «Parcialidad» es un equivalente español claro y conserva el sentido ético/judicial del hebreo.
- source_word: תִּשָּׂאוּן
  english_pob_choice: you show
  chosen_spanish: muestras
  alternatives_spanish:
  - mostráis
  - haces
  - mostraran
  lexicon: HALOT
  rationale: En la expresión fijada נשׂא פנים, el verbo expresa la acción idiomática de mostrar favoritismo. «Muestras parcialidad» comunica el sentido de manera natural en español.
theological_decisions:
- issue: Traducción de la locución idiomática נשׂא פנים
  english_pob_reading: show partiality
  chosen_spanish_reading: mostrar parcialidad
  alternative_spanish_readings:
  - mostrar favoritismo
  - hacer acepción de personas
  - levantar el rostro
  rationale: La expresión hebrea es un modismo judicial y ético sobre trato sesgado. En español, «mostrar parcialidad» es claro y preserva la fuerza moral del reproche. Se evita la traducción literal «levantar el rostro» porque oscurecería el sentido en lectura pública.
  doctrine_reference: Translation philosophy §5; §6
translation_notes:
  revision_awareness: 'El texto sigue el paquete fuente hebreo y el audita inglés POB: mantiene la intensificación verbal, la condicionalidad de אִם, el sentido adverbial de בַּסֵּתֶר y la locución idiomática נשׂא פנים, sin introducir lecturas doctrinales ajenas ni suavizar el reproche.'
  spanish_consistency_notes:
  - Se usa «reprender» para conservar el tono admonitorio/forense del hebreo.
  - «En secreto» mantiene la adverbialidad de סתר.
  - «Parcialidad» refleja la locución fija sin caer en calcos literales.
  - La puntuación respeta el orden condicional del verso y la cadencia de advertencia.
