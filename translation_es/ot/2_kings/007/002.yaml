base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/002.yaml
  text: Then the officer on whose hand the king leaned answered the man of God and said[a], “Look, if Yahweh were making windows in heaven, could this thing happen?” And he said, “Look, you will see it with your own eyes[b], but you will not eat any of it.”
  footnotes:
  - marker: a
    text: Or 'if the LORD were opening floodgates in heaven.' The Hebrew literally says 'making windows in the heavens,' a metaphor for extraordinary provision from above.
    reason: lexical_alternative
  - marker: b
    text: Or 'Look, if the LORD were making windows in the heavens, could this thing happen?'.
    reason: previous_rendering
