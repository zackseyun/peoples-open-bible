translation:
  language: es
  text: 'Y esto es lo que harás por ellos para consagrarlos, para servirme como sacerdotes: toma un toro[a] del ganado y dos carneros sin defecto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «novillo». El hebreo dice literalmente «un toro, hijo del ganado», una expresión idiomática para un bovino del ganado.
    reason: lexical_alternative
  - marker: b
    text: O «sin mancha».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה הַדָּבָר
  english_pob_choice: And this is the thing
  chosen_spanish: Y esta es la cosa
  alternatives_spanish:
  - Y este es el asunto
  - Y esto es lo que
  lexicon: HALOT
  rationale: דָּבָר tiene un rango amplio; en este contexto de instrucción ritual, 'cosa' conserva la referencia concreta y directa del hebreo sin volverlo más abstracto de lo que permite la fuente. 'Asunto' suena más administrativo y 'lo que' pierde el sustantivo explícito.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - tú harás
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como instrucción. 'Harás' transmite el valor directivo de manera natural en español y mantiene el tono ordenado del pasaje.
- source_word: לְקַדֵּשׁ
  english_pob_choice: to consecrate
  chosen_spanish: para consagrarlos
  alternatives_spanish:
  - para santificarlos
  - para hacerlos santos
  lexicon: HALOT
  rationale: En contexto sacerdotal, קָדַשׁ apunta a apartar para uso sagrado. 'Consagrar' es la equivalencia más natural y reverente en español bíblico contemporáneo; 'santificar' puede sonar más técnico o ambiguo para lectores generales.
- source_word: לְכַהֵן לִי
  english_pob_choice: to serve as priests for me
  chosen_spanish: para que me sirvan como sacerdotes
  alternatives_spanish:
  - para ministrar como sacerdotes para mí
  - para ejercer el sacerdocio para mí
  lexicon: HALOT
  rationale: כהן expresa la función sacerdotal. 'Servir como sacerdotes' conserva la idea de desempeño de oficio sin introducir una formulación eclesiástica ajena; 'ejercer el sacerdocio' es posible, pero menos directo para una orden ritual concreta.
- source_word: פַּר אֶחָד בֶּן בָּקָר
  english_pob_choice: one bull from the herd
  chosen_spanish: un toro del ganado
  alternatives_spanish:
  - un novillo del ganado
  - un toro, hijo del ganado
  lexicon: HALOT
  rationale: פַּר designa un bovino macho para sacrificio. El inglés POB optó por una expresión idiomática; en español, 'toro del ganado' refleja bien el animal requerido, sin forzar el hebraísm​o literal 'hijo del ganado'. 'Novillo' también es posible, pero introduce una precisión de edad que el hebreo no exige de modo inequívoco en la forma principal.
- source_word: אֵילִם שְׁנַיִם
  english_pob_choice: two rams
  chosen_spanish: dos carneros
  alternatives_spanish:
  - dos borregos adultos
  - dos carneros machos
  lexicon: HALOT
  rationale: אֵיל significa 'carnero'. 'Carneros' es el equivalente directo y natural en español; 'borregos adultos' sería más explicativo pero menos fiel al término específico.
- source_word: תְּמִימִם
  english_pob_choice: unblemished
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - impecables
  lexicon: HALOT
  rationale: En sacrificios, תְּמִימִם señala animales libres de defecto. 'Sin defecto' es claro, formal y conserva la exigencia cultual; 'sin mancha' puede sonar más figurado y 'impecables' demasiado general.
theological_decisions:
- issue: Función sacerdotal en la consagración de Aarón y sus hijos
  english_pob_reading: to serve as priests for me
  chosen_spanish_reading: para que me sirvan como sacerdotes
  alternative_spanish_readings:
  - para ministrar como sacerdotes para mí
  - para ejercer el sacerdocio para mí
  rationale: La frase debe conservar la función institucional del sacerdocio sin sustituirla por un lenguaje eclesiástico posterior. 'Como sacerdotes' mantiene el oficio; 'para que me sirvan' refleja la relación de servicio dirigida a Yahvé sin suavizarla en exceso.
  doctrine_reference: Éxodo 29:1; consagración sacerdotal en contexto levítico.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail inglés, que prefirió una traducción más directa de הַדָּבָר. Por eso la versión española usa «la cosa» en lugar de una paráfrasis más interpretativa. También he conservado la equivalencia cultual de תְּמִימִם como «sin defecto», con nota alternativa, y he reflejado la función sacerdotal con lenguaje claro pero no eclesiástico.
  spanish_consistency_notes:
  - Usar «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, conforme a la norma del proyecto.
  - Mantener «sacerdotes» para לְכַהֵן en este contexto ritual; no sustituir por vocabulario litúrgico moderno más específico.
  - 'Conservar términos de sacrificio con su valor técnico: «consagrar», «sacerdotes», «sin defecto».'
  - La nota [a] va anclada en «toro» porque el hebreo contiene el giro idiomático «toro, hijo del ganado»; la nota [b] va en «sin defecto» para preservar la alternativa documentada del audit trail.
