id: 1KI.20.34
reference: 1 Kings 20:34
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֡י/ו הֶ/עָרִ֣ים אֲשֶׁר לָֽקַח אָבִ/י֩ מֵ/אֵ֨ת אָבִ֜י/ךָ אָשִׁ֗יב וְ֠/חוּצוֹת תָּשִׂ֨ים לְ/ךָ֤ בְ/דַמֶּ֨שֶׂק֙ כַּ/אֲשֶׁר שָׂ֤ם אָבִ/י֙ בְּ/שֹׁ֣מְר֔וֹן וַ/אֲנִ֖י בַּ/בְּרִ֣ית אֲשַׁלְּחֶ֑/ךָּ וַ/יִּכְרָת ל֥/וֹ בְרִ֖ית וַֽ/יְשַׁלְּחֵֽ/הוּ־־־־׃ס
translation:
  text: Then he said to him[a], “The cities that my father took from your father I will restore, and you may establish streets for yourself in Damascus, as my father established them in Samaria.” And I, in the treaty[c][b], will let you go.” So he made a treaty with him and let him go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marketplaces' or 'quarters'; the Hebrew word literally means 'streets/open places' and may refer here to commercial districts granted by treaty.
    reason: lexical_alternative
  - marker: b
    text: Or 'with this covenant I will let you go.' The Hebrew word can also be rendered 'covenant,' but here it refers to a political treaty.
    reason: alternative_reading
  - marker: c
    text: Literally 'cut a covenant/treaty with him,' a standard Hebrew idiom for formally making a binding agreement.
    reason: cultural_note
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city/town. 'Cities' fits the political-military context of territorial restoration between kings.
- source_word: לָקַח ... אָשִׁיב
  chosen: took ... I will restore
  alternatives:
  - captured ... I will return
  - took ... I will give back
  lexicon: HALOT
  rationale: The pair expresses seizure and reversal of possession. 'Restore' captures the diplomatic restitution of previously taken cities.
- source_word: וְחוּצוֹת
  chosen: streets
  alternatives:
  - marketplaces
  - quarters
  - bazaars
  lexicon: HALOT
  rationale: חוּצוֹת literally refers to streets/open places, but in this treaty context likely implies designated commercial or administrative districts. 'Streets' preserves the Hebrew form while remaining intelligible; the commercial nuance is preserved in a footnote.
- source_word: תָּשִׂים לְךָ בְדַמֶּשֶׂק
  chosen: you may establish for yourself in Damascus
  alternatives:
  - you shall make for yourself in Damascus
  - you may set up for yourself in Damascus
  lexicon: HALOT
  rationale: שׂוּם with חוּצוֹת means to set/place/establish such streets or districts. 'Establish' is natural English for creating recognized urban rights or quarters.
- source_word: כַּאֲשֶׁר שָׂם אָבִי בְּשֹׁמְרוֹן
  chosen: as my father established them in Samaria
  alternatives:
  - as my father made in Samaria
  - as my father set up in Samaria
  lexicon: HALOT
  rationale: The comparison points to a reciprocal arrangement previously enjoyed by Ben-hadad's father in Samaria. Supplying 'them' in English clarifies the object implied from חוּצוֹת.
- source_word: בַּבְּרִית
  chosen: by the treaty
  alternatives:
  - with this covenant
  - under the treaty
  - on these terms of covenant
  lexicon: HALOT
  rationale: בְּרִית here is a political pact between kings, best rendered 'treaty' in contemporary English rather than the more theologically loaded 'covenant,' though the latter remains a lexical alternative.
- source_word: אֲשַׁלְּחֶךָּ
  chosen: I will let you go
  alternatives:
  - I will send you away
  - I will release you
  lexicon: HALOT
  rationale: In context Ahab is dismissing/releasing Ben-hadad after concluding terms. 'Let you go' is idiomatic and accurate.
- source_word: וַיִּכְרָת לוֹ בְרִית
  chosen: he made a treaty with him
  alternatives:
  - he cut a covenant with him
  - he made a covenant with him
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' Because this is an interstate political agreement, 'made a treaty' communicates the sense clearly while preserving the covenantal idiom in alternatives.
- source_word: וַיְשַׁלְּחֵהוּ
  chosen: and let him go
  alternatives:
  - and sent him away
  - and released him
  lexicon: HALOT
  rationale: The verb repeats the earlier promise and narrates its fulfillment. 'Let him go' keeps the narrative flow and matches the diplomatic release context.
