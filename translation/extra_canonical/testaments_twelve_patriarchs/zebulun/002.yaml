theological_decisions:
- issue: Zebulun's claim of innocence despite admitting fault concerning Joseph
  chosen_reading: 'Render the tension directly: he says he did not know that he sinned, except in intention, and then names his ignorance concerning Joseph.'
  alternative_readings:
  - Smooth the passage into a simple claim of blamelessness except for Joseph
  - Treat 'except in intention' as a corruption and omit its force
  rationale: The Greek preserves a morally nuanced self-assessment rather than a flat contradiction. The translation keeps the tension visible for readers and future revision.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Embodied language of compassion and grief
  chosen_reading: Retain bodily terms such as 'inward compassion,' 'my liver was poured out,' and 'inward parts.'
  alternative_readings:
  - Replace with abstract emotional language such as 'my heart broke' or 'I was deeply moved'
  rationale: The testament's rhetoric is affective and embodied. Preserving this texture respects the Greek witness and avoids flattening the father's exhortative voice.
  doctrine_reference: PHILOSOPHY.md § original-language primacy; transparency in lexical decisions
