lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: HALOT
  rationale: La fórmula constructa plural introduce una lista genealógica; en español, «los hijos de» conserva el paralelismo y la concisión del hebreo, sin ampliar indebidamente a «descendientes».},{
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: HALOT
  rationale: Nombre propio; se translitera de manera estable. Se evita adaptar la acentuación si no hace falta para la identificación del nombre.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  alternatives_spanish:
  - Majlí
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la forma transliterada ya reconocible en castellano bíblico.
- source_word: וּ/מוּשִׁי
  english_pob_choice: and Mushi
  chosen_spanish: y Mushi
  alternatives_spanish:
  - y Musi
  lexicon: HALOT
  rationale: La conjunción más el nombre propio se traducen de forma directa. Se conserva «Mushi» como forma transliterada estándar para este nombre.
- source_word: בְּנֵ֖י יַעֲזִיָּהֽוּ
  english_pob_choice: The sons of Jaaziah
  chosen_spanish: Los hijos de Jaazías
  alternatives_spanish:
  - Los descendientes de Jaazías
  lexicon: HALOT
  rationale: Se preserva la misma fórmula genealógica del hebreo. «Jaazías» reproduce el nombre propio en una forma castellana clara y natural.
- source_word: בְנֽ/וֹ
  english_pob_choice: Beno / his son
  chosen_spanish: Beno
  alternatives_spanish:
  - su hijo
  - sus hijos
  lexicon: HALOT
  rationale: El texto consonántico y la revisión inglesa favorecen tomar בנו como nombre propio aquí. Se adopta «Beno» en el texto principal para reflejar la tradición textual transmitida en este versículo, dejando constancia de la alternativa pronominal en nota.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de «his son» a «Beno» para reflejar mejor בנו tal como está transmitido en este versículo. El español sigue esa decisión y conserva la ambigüedad textual en nota, sin suavizarla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para la fórmula genealógica de בְּנֵי, coherente con el registro bíblico y con el inglés auditado.
  - Se conserva «Beno» en el texto principal porque la revisión del POB lo trata como nombre propio en esta lectura.
  - La nota marca la variante textual sin sustituir el texto principal, para no borrar la dificultad del hebreo transmitido.
