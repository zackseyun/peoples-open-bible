translation:
  language: es
  text: y para la mujer en su impureza menstrual[a], y para el que tiene flujo, sea varón o mujer, y para un hombre que se acueste con una mujer impura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la mujer que menstrúa’; el hebreo describe aquí a la mujer en su estado menstrual.
    reason: lexical_alternative
  - marker: b
    text: ‘Impura’ en este versículo se refiere a impureza ritual bajo la ley levítica, no a impureza moral.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּוָה
  english_pob_choice: the woman in her menstrual impurity
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer que está enferma
  - la mujer que menstrúa
  lexicon: HALOT
  rationale: El hebreo nombra a la mujer como portadora de una condición de aflicción/pureza ritual. En español, el sustantivo general ‘la mujer’ evita añadir ‘enferma’, que no está en la revisión final inglesa, y deja que la frase siguiente precise la condición ritual.
- source_word: בְּנִדָּתָהּ
  english_pob_choice: in her menstrual impurity
  chosen_spanish: en su impureza menstrual
  alternatives_spanish:
  - en su menstruación
  - en su impureza
  lexicon: HALOT
  rationale: ‘Impureza menstrual’ expresa con precisión el campo ritual de נִדָּה. ‘Menstruación’ es más biológico pero menos explícito respecto de la categoría levítica; ‘impureza’ solo sería demasiado general.
- source_word: הַזָּב אֶת זוֹבוֹ
  english_pob_choice: the one who has a discharge
  chosen_spanish: el que tiene una descarga
  alternatives_spanish:
  - el que padece una descarga
  - el que tiene un flujo
  lexicon: HALOT
  rationale: La expresión hebrea funciona como categoría de estado. ‘Tiene una descarga’ conserva la generalidad del título sin restringirlo a varón, en línea con la aclaración inglesa ‘whether male or female’.
- source_word: לַזָּכָר וְלַנְּקֵבָה
  english_pob_choice: whether male or female
  chosen_spanish: sea varón o mujer
  alternatives_spanish:
  - ya sea varón o mujer
  - para varón y mujer
  lexicon: HALOT
  rationale: La formulación distributiva ‘sea varón o mujer’ reproduce bien el alcance de la legislación y suena natural en español bíblico contemporáneo.
- source_word: וּלְאִישׁ אֲשֶׁר יִשְׁכַּב עִם
  english_pob_choice: and for a man who lies with
  chosen_spanish: y para un hombre que se acueste con
  alternatives_spanish:
  - y para un hombre que yace con
  - y para un hombre que tiene relaciones con
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. ‘Que se acueste con’ conserva ese registro sin volverse demasiado explícito ni sonar rígido.
- source_word: טְמֵאָה
  english_pob_choice: an unclean woman
  chosen_spanish: una mujer impura
  alternatives_spanish:
  - una mujer inmunda
  - una mujer ritualmente impura
  lexicon: HALOT
  rationale: En español, ‘impura’ comunica mejor la categoría levítica que ‘inmunda’, que puede sonar excesivamente valorativa. Se deja ‘mujer’ explícita porque el adjetivo es femenino en el hebreo.
theological_decisions:
- issue: Pureza ritual vs. condena moral
  english_pob_reading: '''Unclean'' in this verse refers to ritual impurity under Levitical law, not moral uncleanness.'
  chosen_spanish_reading: ‘Impura’ se entiende como impureza ritual levítica, no como suciedad moral.
  alternative_spanish_readings:
  - ‘inmunda’
  - ‘contaminada’
  rationale: La legislación de Levítico distingue entre estados rituales y culpabilidad ética. ‘Impura’ mantiene esa distinción y evita moralizar el texto.
  doctrine_reference: Levítico 15; filosofía de traducción §1, §3, §6
- issue: Alcance distributivo del caso de descarga
  english_pob_reading: whether male or female
  chosen_spanish_reading: sea varón o mujer
  alternative_spanish_readings:
  - para varón y mujer
  - ya sea varón o mujer
  rationale: El hebreo amplía la categoría sin cambiar de referente. La traducción debe preservar ese alcance inclusivo de la ley sin interpretar el término como exclusivamente masculino.
  doctrine_reference: Levítico 15:2-18; coherencia léxica del POB
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó ‘who is sick in’ por ‘in’ para evitar añadir la idea de enfermedad; esta redacción española sigue esa revisión y no introduce ‘enferma’. También conserva la estructura distributiva de ‘whether male or female’ y el eufemismo sexual de ‘lies with’.
  spanish_consistency_notes:
  - Se usa ‘impura/impureza’ para el campo levítico de טְמֵאָה / נִדָּה, evitando ‘inmunda’ salvo cuando el estilo o una nota lo hagan necesario.
  - ‘Descarga’ mantiene la categoría general del hebreo sin masculinizar el caso; la aclaración ‘sea varón o mujer’ sostiene la amplitud del texto.
  - Se evita ‘SEÑOR’ o terminología eclesial ajena al verso; aquí no interviene el tetragrámaton ni כריסטός/Mesías.
