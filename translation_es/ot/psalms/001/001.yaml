translation:
  language: es
  text: Dichoso[a] el hombre[b] que no anda en el consejo de los impíos, ni está en el camino de los pecadores, ni se sienta en el asiento de los escarnecedores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bienaventurado»; también «Feliz», pero la bienaventuranza hebrea expresa un estado profundo de dicha o bendición, no solo una emoción pasajera.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «el hombre», en masculino singular representativo; aquí no limita el alcance al sexo masculino, sino que presenta al justo ejemplar.
    reason: cultural_note
  - marker: c
    text: O «burladores».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT
  rationale: La expresión hebrea es una exclamación de bienaventuranza. En español, «dichoso» conserva mejor el matiz de estado favorecido/afortunado que «feliz», y evita la resonancia eclesiástica más técnica de «bienaventurado», aunque esa sigue siendo posible.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el que
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y funciona de modo representativo/generic en la literatura sapiencial. «El hombre» mantiene esa forma y el paralelismo del verso.
- source_word: הָלַךְ
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: HALOT
  rationale: Se conserva la metáfora de conducta. «Anda» suena natural en español y mantiene la progresión caminar/detenerse/sentarse sin volverlo una paráfrasis de «vive».
- source_word: בַּעֲצַת
  english_pob_choice: in the counsel of
  chosen_spanish: en el consejo de
  alternatives_spanish:
  - según el consejo de
  - en la orientación de
  lexicon: HALOT
  rationale: «Consejo» refleja tanto consejo como guía/directriz de pensamiento y conducta, y corresponde bien al uso sapiencial del término.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: «Impíos» es un equivalente bíblico natural en español para los sustantivados plurales que describen a los que se apartan de Yahvé y de su justicia. Es idiomático y conserva la carga moral/religiosa del término.
- source_word: דֶרֶךְ
  english_pob_choice: the way of
  chosen_spanish: el camino de
  alternatives_spanish:
  - la senda de
  - la vía de
  lexicon: HALOT
  rationale: «Camino» mantiene la imagen concreta y la secuencia poética del verso. En español resulta claro y conserva la fuerza metafórica de conducta habitual.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - los que pecan
  lexicon: HALOT
  rationale: El sustantivo plural se traduce de forma directa y natural. «Pecadores» preserva el sentido de quienes practican el pecado, como en el hebreo sustantivado.
- source_word: עָמָד
  english_pob_choice: stand
  chosen_spanish: se detiene
  alternatives_spanish:
  - permanece
  - se para
  lexicon: HALOT
  rationale: La idea no es solo estar de pie, sino fijarse/establecerse en una trayectoria. «Se detiene» comunica bien ese asentamiento progresivo en la conducta y mantiene el paralelismo con andar y sentarse.
- source_word: מוֹשַׁב
  english_pob_choice: the seat of
  chosen_spanish: la silla de
  alternatives_spanish:
  - el asiento de
  - la reunión de
  lexicon: HALOT
  rationale: «Silla» preserva la imagen concreta del lugar donde uno se sienta. Aunque «asiento» también sería posible, «silla» reproduce bien la fuerza imagética del hebreo y la secuencia verbal.
- source_word: לֵצִים
  english_pob_choice: scoffers
  chosen_spanish: escarnecedores
  alternatives_spanish:
  - burladores
  - mofadores
  lexicon: HALOT
  rationale: «Escarnecedores» recoge el tono de desprecio burlón del término hebreo y es una opción tradicional pero aún comprensible. Mantiene mejor la severidad del término que «burladores» en este contexto sapiencial.
- source_word: יָשָׁב
  english_pob_choice: sit
  chosen_spanish: se sienta
  alternatives_spanish:
  - se posa
  - se establece
  lexicon: HALOT
  rationale: Se conserva la progresión concreta andar/detenerse/sentarse. «Se sienta» reproduce el cierre del movimiento descendente en la asociación con los burladores.
theological_decisions:
- issue: Beatitud y representación masculina genérica
  english_pob_reading: Blessed is the man
  chosen_spanish_reading: Dichoso el hombre
  alternative_spanish_readings:
  - Bienaventurado el hombre
  - Dichosa la persona
  rationale: El hebreo usa un masculino singular con valor representativo, no restrictivo. Se mantiene «el hombre» para respetar la forma del texto y se usa una nota para evitar una lectura exclusivista en español moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje concuerda plenamente con el auditor inglés: se conservaron la progresión verbal walk/stand/sit, el tono de beatitud, y la equivalencia de los sustantivos morales sin suavizar el contraste. No hubo revisiones posteriores en el paquete fuente, y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se emplea «Dios/Yahvé» según corresponda; aquí no aparece el Tetragrámaton.
  - Se preserva el paralelismo poético con tres negaciones y tres verbos de postura/movimiento.
  - «Impíos», «pecadores» y «escarnecedores» mantienen registros distintos para las tres categorías hebreas.
