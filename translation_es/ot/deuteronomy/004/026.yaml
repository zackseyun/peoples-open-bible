  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales («tierra», «Jordán», «destruidos») concuerdan con el expediente inglés y el hebreo. La fórmula «cielo y tierra» está bien conservada.
