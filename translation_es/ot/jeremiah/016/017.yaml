translation:
  language: es
  text: Porque mis ojos están sobre todos sus caminos[a]; no están ocultos de mí, y su iniquidad[b] no está escondida ante mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Porque mis ojos están sobre todos sus caminos.' Hebreo 'sus caminos'—es decir, su conducta o manera de vivir.
    reason: lexical_alternative
  - marker: b
    text: O 'su culpa' por 'su iniquidad'. El hebreo עָוֹן puede denotar la maldad cometida o la culpa asociada con ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza explicativa causal del hebreo y suena natural en español profético; 'Porque' comunica la relación con la cláusula precedente sin añadir interpretación.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi vista
  - yo veo
  lexicon: HALOT
  rationale: Mantiene la imagen antropomórfica de vigilancia divina, en línea con la decisión del POB en inglés de no abstraer a 'yo veo'.
- source_word: עַל
  english_pob_choice: are on
  chosen_spanish: están sobre
  alternatives_spanish:
  - vigilan
  - están fijados en
  lexicon: HALOT
  rationale: '''Están sobre'' reproduce la dirección atenta del hebreo con una construcción natural en español y conserva la imagen de observación enfocada.'
- source_word: כָּל דַּרְכֵיהֶם
  english_pob_choice: all their ways
  chosen_spanish: todos sus caminos
  alternatives_spanish:
  - todo lo que hacen
  - toda su conducta
  lexicon: HALOT
  rationale: '''Caminos'' preserva la metáfora hebrea y puede abarcar conducta o manera de vivir, como en el audit trail inglés; ''todos'' mantiene el alcance total.'
- source_word: לֹא נִסְתְּרוּ
  english_pob_choice: they are not hidden
  chosen_spanish: no están ocultos
  alternatives_spanish:
  - no han sido escondidos
  - no permanecen ocultos
  lexicon: HALOT
  rationale: '''Ocultos'' transmite el pasivo sin recargar el verso; el plural concuerda con ''caminos'' y conserva el matiz de exposición ante Dios.'
- source_word: מִלְּפָנַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi presencia
  - delante de mí
  lexicon: HALOT
  rationale: El inglés revisado optó por 'from me' por naturalidad; en español, 'de mí' expresa ese mismo sentido con sobriedad, sin perder la relación personal.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: '''Iniquidad'' conserva el peso moral y teológico de עָוֹן, como en el POB inglés; en español es más preciso que ''pecado'' o ''culpa'' en este contexto.'
- source_word: מִנֶּגֶד עֵינַי
  english_pob_choice: from before my eyes
  chosen_spanish: de delante de mis ojos
  alternatives_spanish:
  - de mi vista
  - ante mis ojos
  lexicon: HALOT
  rationale: '''De delante de mis ojos'' refleja con más transparencia la imagen espacial hebrea y mantiene el paralelismo con la línea anterior; ''ante mis ojos'' sería una opción más idiomática, pero algo menos visual.'
theological_decisions:
- issue: Imagen antropomórfica de la omnisciencia divina
  english_pob_reading: Preserve the concrete imagery of God's eyes being on their ways and their iniquity not being hidden from before his eyes.
  chosen_spanish_reading: Preservar la imagen concreta de que los ojos de Yahvé están sobre sus caminos y que su iniquidad no está escondida de delante de sus ojos.
  alternative_spanish_readings:
  - Parafrasear como 'yo lo sé todo de ellos'
  - '''Nada escapa a mi mirada'''
  rationale: El hebreo usa lenguaje corporal para expresar vigilancia y juicio moral. Mantener esa imaginería evita diluir la retórica profética y respeta la tensión literaria del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Renderización de עָוֹן
  english_pob_reading: their iniquity
  chosen_spanish_reading: su iniquidad
  alternative_spanish_readings:
  - su culpa
  - su pecado
  rationale: '''Iniquidad'' conserva mejor el peso jurídico-moral y covenantal de עָוֹן que ''pecado'' o ''culpa'' aislados; además, encaja con el paralelismo del verso, donde lo expuesto ante Dios es la falta misma.'
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El inglés POB pasó de 'hidden from before me' a 'hidden from me' por naturalidad; en español se siguió ese ajuste con 'no están ocultos de mí'. Se conservó 'de delante de mis ojos' en la cláusula final para reflejar la imagen hebrea de מִנֶּגֶד עֵינַי sin volverla opaca.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la redacción del versículo solo cuando el referente divino debe hacerse explícito; aquí el texto hebreo contiene pronombres de primera persona, por lo que la forma natural en español es mantener 'mis'/'mí' sin introducir el nombre.
  - '''Caminos'' se mantiene como traducción de דַּרְכֵיהֶם para conservar tanto la metáfora como el sentido de conducta.'
  - '''Iniquidad'' se usa de forma consistente para עָוֹן en este pasaje, siguiendo la decisión lexical del POB inglés.'
