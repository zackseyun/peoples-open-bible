base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/036/003.yaml
  text: 'Therefore prophesy and say[a], Thus says the Lord GOD: Because, indeed because they have made you desolate and have snapped at you from every side, so that you became a possession for the remnant of the nations, and you have come up on the lips of the tongue and in the slander of the people[b],'
  footnotes:
  - marker: a
    text: Or 'have pantingly pursued you,' 'have swallowed you up,' or 'have gasped after you'; the Hebrew verb is difficult and conveys hostile, predatory pressure from the surrounding nations.
    reason: lexical_alternative
  - marker: b
    text: Literally 'you came up on the lip of the tongue,' an idiom meaning that you became the subject of people's speech.
    reason: lexical_alternative
