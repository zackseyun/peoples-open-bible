revisions:
- from: 'Y le dijo a Jeroboam[a]: «Toma para ti diez pedazos, porque así dice Yahvé, el Dios de Israel: “Mira, estoy arrancando el reino de la mano de Salomón, y te daré diez tribus”».'
  to: 'Y le dijo a Jeroboam[a]: «Toma para ti diez pedazos, porque así dice Yahvé, el Dios de Israel: “Mira, estoy rasgando el reino de la mano de Salomón, y te daré diez tribus”».'
  rationale: Se reemplaza ‘arrancando’ por ‘rasgando’ para preservar con mayor precisión la raíz hebrea קרע y la coherencia simbólica con los pedazos del manto. También se ajusta la nota al pie para reflejar el mismo campo semántico de desgarro.
  reviewer_model: gpt-5.4
