    issue: La nota al pie está anclada en «Judas[a]», pero explica «Ἰησοῦ» = Josué.
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, el lector entiende que la nota comenta «Judas», no «Josué» o «en tiempos de Josué», lo que no preserva bien la evidencia fuente ni la práctica editorial requerida.
  - severity: low
