    rationale: El texto principal ya dice 'al otro lado del Jordán', y la nota [d] repite exactamente esa misma frase. Según el audit trail inglés, la alternativa debe contrastar con 'beyond'/'beyond the Jordan', por ejemplo 'más allá del Jordán' o, si se cambia el texto principal, entonces la nota puede dar la otra opción.
  - severity: low
