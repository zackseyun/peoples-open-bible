  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio en lugar de traducirlo. Se usa «Ahíra» para acomodar la lectura natural en español y mantener la forma reconocible del nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción genealógica se expresa de manera directa y natural en español con «hijo de», equivalente al valor relacional estándar del hebreo.
- source_word: עֵינָן
  english_pob_choice: Enan
  chosen_spanish: Enán
  alternatives_spanish:
  - Enan
  lexicon: Transliteración estándar del nombre propio
  rationale: Se preserva el nombre propio mediante transliteración. «Enán» refleja la pronunciación española natural sin alterar el referente.
