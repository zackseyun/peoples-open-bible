base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/005.yaml
  text: 'And behold[a], there was a wall outside the house, all around, and in the hand of the man was a measuring reed of six cubits, each cubit being a cubit and a handbreadth. And he measured the width of the structure: one reed[b], and the height: one reed.'
  footnotes:
  - marker: a
    text: 'Hebrew: ''six cubits by the cubit and a handbreadth,'' that is, using a long cubit of a regular cubit plus a handbreadth.'
    reason: cultural_note
  - marker: b
    text: Or 'the width of the building.'
    reason: lexical_alternative
