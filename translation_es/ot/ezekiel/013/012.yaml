translation:
  language: es
  text: 'Y mira[a], cuando caiga el muro, ¿no se les dirá: «¿Dónde está el revestimiento[b] con que lo recubrieron?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». La expresión introduce una escena vívida y deíctica.
    reason: lexical_alternative
  - marker: b
    text: O «blanqueo»; el término puede referirse a una capa aplicada sobre un muro, y en este capítulo la imagen conlleva la idea de un recubrimiento superficial engañoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y mira bien
  lexicon: HALOT
  rationale: La expresión introduce una escena vívida y deíctica. «Mira» conserva el llamado de atención de forma natural en español moderno, sin cargar el tono con un arcaísmo innecesario.
- source_word: נָפַל
  english_pob_choice: falls
  chosen_spanish: caiga
  alternatives_spanish:
  - cae
  - se derrumbe
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, el contexto presenta una situación futura o hipotética dentro de la pregunta retórica. El subjuntivo «caiga» expresa bien esa proyección en español.
- source_word: הַקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - la tapia
  lexicon: HALOT
  rationale: «Muro» funciona mejor en español para una construcción grande y refuerza la imagen metafórica del contexto profético. «Pared» sería posible, pero suena menos solemne aquí.
- source_word: הֲלוֹא
  english_pob_choice: will it not
  chosen_spanish: ¿no se les dirá?
  alternatives_spanish:
  - ¿acaso no se dirá?
  - ¿no dirán?
  lexicon: HALOT
  rationale: La partícula retórica espera respuesta afirmativa. En español, la pasiva impersonal «se les dirá» preserva el valor interrogativo sin introducir sujeto explícito.
- source_word: יֵאָמֵר אֲלֵיכֶם
  english_pob_choice: will it not be said to you
  chosen_spanish: se les dirá
  alternatives_spanish:
  - les dirán
  - se dirá a ustedes
  lexicon: HALOT
  rationale: El nifal hebreo se refleja bien con pasiva impersonal. «Se les dirá» mantiene la dirección hacia los oyentes y evita forzar un agente no presente en el texto.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde quedó?
  - ¿Dónde se encuentra?
  lexicon: HALOT
  rationale: Es una pregunta directa por la localización/presencia de algo desaparecido. «¿Dónde está?» es la forma más natural y fiel en español.
- source_word: הַטִּיחַ
  english_pob_choice: the plaster
  chosen_spanish: el enlucido
  alternatives_spanish:
  - el yeso
  - la capa de recubrimiento
  - el revoque
  lexicon: HALOT
  rationale: «טִיחַ» designa un material de recubrimiento aplicado a la pared. En español, «enlucido» es preciso y permite conservar la posibilidad contextual de una capa engañosa sin imponer desde el texto principal la interpretación de «blanqueo».
- source_word: אֲשֶׁר טַחְתֶּם
  english_pob_choice: with which you plastered it
  chosen_spanish: con que lo enlucieron
  alternatives_spanish:
  - con que lo revocaron
  - que ustedes le aplicaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de recubrir la pared con ese material. «Enlucieron» mantiene la relación material-acción y es idiomático en español; el objeto «lo» recupera claramente la referencia al muro.
theological_decisions:
- issue: Imagen profética de cobertura engañosa
  english_pob_reading: The term can refer to a coating spread over a wall, and in this chapter the image carries the sense of a deceptive surface treatment.
  chosen_spanish_reading: El término puede referirse a un recubrimiento aplicado a una pared; en este capítulo, la imagen sugiere un acabado superficial engañoso.
  alternative_spanish_readings:
  - blanqueo engañoso
  - capa de encubrimiento
  rationale: Mantengo en el texto principal un término técnico neutral («enlucido») y explicito la carga simbólica en la nota, para no borrar la tensión entre sentido literal y uso profético acusatorio.
  doctrine_reference: Ezequiel 13:10-16; cf. la denuncia profética del engaño religioso
- issue: Pasiva impersonal y destinatarios
  english_pob_reading: will it not be said to you
  chosen_spanish_reading: se les dirá
  alternative_spanish_readings:
  - les dirán
  - se dirá a ustedes
  rationale: La construcción impersonal conserva el tono oracular sin añadir un sujeto innecesario ni debilitar la reprensión dirigida a los destinatarios.
  doctrine_reference: Retórica profética hebrea
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés y no requiere revisión adicional; se conservó la fuerza retórica, la pasiva impersonal y la ambigüedad productiva del término de recubrimiento.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB, pero este versículo no contiene el nombre divino.
  - Se eligió «enlucido» para el término de recubrimiento, en continuidad con la decisión inglesa de conservar un sentido literal con resonancia metafórica.
  - Se usó puntuación interrogativa española completa para reflejar la pregunta retórica del hebreo.
