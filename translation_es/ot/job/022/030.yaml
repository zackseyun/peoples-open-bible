translation:
  language: es
  text: Él libra aun a uno que no es inocente[a], y será librado por la pureza de tus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él libra al inocente»; el hebreo de la primera línea es difícil, y algunos entienden la frase de otra manera.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «por la pureza de tus manos», un modismo de inocencia o pureza moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמַלֵּט
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - saca de peligro
  - libera
  lexicon: HALOT
  rationale: El piel de מלט expresa causar escape o entregar/liberar. «Libra» es natural en español bíblico y conserva la idea de sacar de una situación de peligro sin forzar una paráfrasis.
- source_word: אִי
  english_pob_choice: even one who is not
  chosen_spanish: aun a uno que no es
  alternatives_spanish:
  - al inocente
  - aun al inocente
  - a una isla
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual difícil adoptada por el POB inglés: la partícula se entiende de manera negativa/idiomática, no como «isla». «Aun a uno que no es» preserva la tensión del hebreo y evita resolver el problema interpretativo.'
- source_word: נָקִי
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - limpio
  - sin culpa
  - guiltless
  lexicon: HALOT
  rationale: «Inocente» comunica mejor en español la noción moral/judicial de estar libre de culpa, que es la fuerza principal de נָקִי en este contexto.
- source_word: וְנִמְלַט
  english_pob_choice: and he will be delivered
  chosen_spanish: y será librado
  alternatives_spanish:
  - y escapará
  - y será rescatado
  lexicon: HALOT
  rationale: El nifal de מלט puede ser pasivo o reflexivo; «será librado» mantiene el paralelismo con la primera cola y suena claro en español sin perder la idea de liberación.
- source_word: בְּבֹר
  english_pob_choice: through the cleanness
  chosen_spanish: por la pureza
  alternatives_spanish:
  - por la limpieza
  - mediante la pureza
  - a través de la pureza
  lexicon: HALOT
  rationale: El sentido idiomático aquí es la pureza/limpieza moral asociada con las manos. «Pureza» conserva la imagen y funciona bien en español; «por» refleja el valor instrumental del hebreo.
- source_word: כַּפֶּיךָ
  english_pob_choice: of your hands
  chosen_spanish: de tus manos
  alternatives_spanish:
  - de tus palmas
  - de tus manos abiertas
  lexicon: HALOT
  rationale: La forma dual/plural remite idiomáticamente a «manos». «Tus manos» es la equivalencia más natural en español y preserva la imagen hebrea de manos limpias como señal de inocencia.
theological_decisions:
- issue: 'Primera cola difícil: ¿inocente o no inocente?'
  english_pob_reading: Eliphaz claims that God can deliver even a person who is not innocent.
  chosen_spanish_reading: Él libra aun a uno que no es inocente.
  alternative_spanish_readings:
  - Él libra al inocente
  - Él libra aun al inocente
  - Él libra a una isla/territorio inocente
  rationale: Mantengo la lectura difícil que el POB inglés documenta, porque el hebreo y la tradición de traducción no son concluyentes. Así se preserva la tensión textual sin imponer una solución que el verso no garantiza.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/textual en lugar de resolverla arbitrariamente.'
- issue: Imagen idiomática de «la pureza de tus manos»
  english_pob_reading: Literally, 'through the cleanness of your hands,' an idiom for innocence or moral purity.
  chosen_spanish_reading: «por la pureza de tus manos» como modismo de inocencia o integridad moral.
  alternative_spanish_readings:
  - por la limpieza de tus manos
  - mediante la pureza de tus manos
  rationale: Conservo la metáfora de manos puras porque el hebreo la usa como imagen de integridad moral. No la sustituyo por una explicación en el texto principal para no borrar el valor figurado y judicial del modismo.
  doctrine_reference: Principio POB de conservar las imágenes y notas idiomáticas cuando son portadoras de tensión semántica.
translation_notes:
  revision_awareness: No se documentaron revisiones posteriores en el paquete fuente; la versión auditada más reciente indica que no fueron necesarios cambios. La propuesta española sigue esa estabilidad y conserva la ambigüedad principal del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «libra/será librado» para mantener el paralelismo verbal de מלט sin introducir un registro excesivamente técnico.
  - Se conserva la imagen corporal de «manos» y su nota idiomática, en vez de reemplazarla por una explicación interpretativa en el cuerpo del texto.
  - La nota a mantiene la alternativa interpretativa documentada; la nota b aclara el modismo sin neutralizar su fuerza figurada.
