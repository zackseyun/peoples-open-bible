translation:
  text: '5[a]. There is no spirit in them, because they are the work of hands; and you carry them on your shoulders. They are a burden to you, and from them there is no help for you, except great shame.

    6. Shame belongs to those who make them, and confusion of heart to those who worship them. Do not worship them." And his father said to him, "I too know, my son, but what can I do for a people who have set me

    7. before them? And if I speak to them rightly, they will kill me, for their souls cling to them

    8. so that they worship them and praise them. Be silent, my son, lest they kill you." And he told

    9. this matter to his two brothers, and they were angry with him, and he kept silent. And in the fortieth jubilee[b], in the second week, in its seventh year, Abram took for himself a wife, and her name was Sarai, the daughter of

    10. his father, and she became his wife. And Aran his brother took for himself a wife in the third year of the third week, and she bore him a son in the seventh year of this week, and he called

    11. his name Lot. And Nahor his brother took for himself a wife.

    12. And in the sixtieth year of the life of Abram, that is, in the fourth week, in its fourth year, Abram arose by night and burned the house of idols, and he burned everything that was in the house, and no person knew it.

    13. And they arose in the night and wanted to rescue their gods from the midst of the fire. And Aran ran

    14. to rescue them, and the fire blazed over him, and he was burned in the fire and died in Ur of the Chaldeans

    15. before Terah his father. And they buried him in Ur of the Chaldeans. And Terah went out from Ur of the Chaldeans, he and his sons, to go into the land of Lebanon and into the land of Canaan, and he settled in the land of Haran, and Abram lived with Terah his father in Haran

    16. two weeks of years. And in the sixth week, in its fifth year, Abram sat up through the night at the beginning of the seventh month to observe the stars from evening until dawn, to see what would be the character of the year with respect to the rains. And he was there alone, sitting and observing, and a word came into his heart, and he said,

    17. "All the signs of the stars and the signs of the sun and moon are all in the hand of the LORD. Why should I keep searching?

    18. If he wills, he causes it to rain morning and evening; and if he wills, he does not make it come down. And everything is in his hand."

    19. And he prayed in that night and said, "My God, God Most High, you alone are God to me, and you created everything, and everything that exists is the work of your hands. I have chosen you and your favor.

    20. Deliver me from the hand of evil spirits who rule over the thoughts of the heart of man, and do not let them lead me astray from following you, my God. And establish me and my seed forever, so that we may not go astray from now and forever."

    21. And he said, "Shall I return to Ur of the Chaldeans, where they seek my face so that I should return to them? Or what shall I do here in this place? Make straight before you the right path for me, and let it be done by the hand of your servant, and let me not walk in the error of my heart, my God." And he finished speaking and praying, and behold, there was sent

    22. the word of the LORD to him by my hand, saying, "Go out from your land and from your kindred and from your father''s house to the land that I will show you, and I will make you into a great and numerous nation.

    23. And I will bless you and make your name great, and you will be blessed in the earth, and in you all the nations of the earth will be blessed. And those who bless you I will bless, and those who curse you I will curse.

    24. And I will be God to you and to your son and to your son''s son and to all your seed. Do not fear from now and forever, through all the generations of the earth; I am your God." And the Lord God said to me,

    25. "Open his mouth and his ears, that he may hear and speak with his mouth in the language that is revealed, for it has ceased from the mouths of all the children of men from the day of the overthrow."

    26. And I opened his mouth and his ears and his lips, and I began to speak with him in Hebrew, in the language of creation. And he took the books of his fathers, and they were written in Hebrew, and he copied them and began from then on to study them. And I made known to him everything that he was unable to understand[c][d][b], and he studied them during the six rainy months.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'the daughter of his father' is textually difficult in context. The Ge'ez as segmented here appears to attach Sarai to Terah; some witnesses and interpreters understand the family relation differently.
    reason: textual_variant
    anchor_ref: '12:9'
  - marker: b
    text: '''Week'' here is calendrical shorthand for a week of years. Jubilees regularly counts time by jubilees, weeks, and years.'
    reason: cultural_note
    anchor_ref: '12:16'
  - marker: b
