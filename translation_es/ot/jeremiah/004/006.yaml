translation:
  language: es
  text: Levanten una señal[a] hacia Sion. Busquen refugio[b]; no se detengan, porque yo estoy trayendo calamidad[c] desde el norte, y gran destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estandarte».
    reason: lexical_alternative
  - marker: b
    text: O «Pónganse a salvo»; también puede entenderse como «Refúgiense».
    reason: lexical_alternative
  - marker: c
    text: «Calamidad» aquí se refiere a juicio o desastre, no a mal moral.
    reason: theological_note
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Raise
  chosen_spanish: Alzad
  alternatives_spanish:
  - Levantad
  - Izad
  lexicon: HALOT
  rationale: El imperativo plural de נשׂא con נֵס expresa levantar/izar una señal o estandarte. «Alzad» conserva la acción de elevar y funciona con naturalidad en español bíblico moderno.
- source_word: נֵס
  english_pob_choice: signal
  chosen_spanish: señal
  alternatives_spanish:
  - bandera
  - estandarte
  lexicon: HALOT
  rationale: En este contexto militar de alarma, el sustantivo funciona como aviso visible para convocar o advertir. «Señal» comunica la función sin forzar una imagen ceremonial de «bandera» o «estandarte».
- source_word: צִיּוֹנָה
  english_pob_choice: toward Zion
  chosen_spanish: hacia Sion
  alternatives_spanish:
  - a Sion
  - en dirección a Sion
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento o orientación hacia Sion; «hacia» preserva mejor ese valor que una mera aposición.
- source_word: הָעִיזוּ
  english_pob_choice: Take refuge
  chosen_spanish: Refugiaos
  alternatives_spanish:
  - Buscad refugio
  - Poneos a salvo
  lexicon: HALOT
  rationale: La forma hiphil de עוז en este contexto urgente se entiende como buscar amparo o refugio. «Refugiaos» mantiene el matiz de protección y la urgencia profética sin convertirlo en una explicación paraprástica.
- source_word: אַל תַּעֲמֹדוּ
  english_pob_choice: do not stand still
  chosen_spanish: no os detengáis
  alternatives_spanish:
  - no os quedéis quietos
  - no os paréis
  lexicon: HALOT
  rationale: La prohibición señala que no hay que retrasarse ni permanecer inmóvil. «No os detengáis» expresa con naturalidad la idea de no demorarse en español.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  lexicon: HALOT
  rationale: En lenguaje profético de juicio, רָעָה designa calamidad o desastre, no mal moral. «Calamidad» conserva esa fuerza judicial y evita sugerir que Dios produce mal ético.
- source_word: מֵבִיא
  english_pob_choice: am bringing
  chosen_spanish: estoy trayendo
  alternatives_spanish:
  - traigo
  - voy trayendo
  lexicon: HALOT
  rationale: El participio con אָנֹכִי presenta la acción como inminente y en curso. «Estoy trayendo» reproduce esa vivacidad y la agencia directa de Dios.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  - de la parte norte
  lexicon: HALOT
  rationale: La fórmula geográfica de Jeremías se mantiene con una preposición de procedencia clara en español. «Desde el norte» conserva bien la direccionalidad.
- source_word: שֶׁבֶר גָּדוֹל
  english_pob_choice: great destruction
  chosen_spanish: gran destrucción
  alternatives_spanish:
  - gran ruina
  - gran quebranto
  lexicon: HALOT
  rationale: שֶׁבֶר puede significar quebranto, ruina o destrucción. «Gran destrucción» sigue de cerca la lectura inglesa auditada y resulta idiomática en español.
theological_decisions:
- issue: רָעָה aplicada a la acción divina
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - desgracia
  - desastre
  - mal
  rationale: El verso presenta a Yahvé como quien trae juicio desde el norte. Traducir רָעָה como «calamidad» preserva la soberanía divina en el juicio sin atribuir a Dios mal moral.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión teológica sin importar una afirmación doctrinal ajena al contexto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, especialmente el ajuste de «Flee for safety» a «Take refuge», que favorece una forma española de refugio/protección en lugar de una paráfrasis de huida. También se mantuvo la decisión revisada de entender רָעָה como calamidad/disaster y no como mal moral.
  spanish_consistency_notes:
  - Se usa «Sion» sin tilde en concordancia con el uso bíblico español habitual y para uniformidad interna.
  - Se emplea «Yahvé» en el proyecto, pero en este versículo el sujeto está expresado por «yo»; no se añadió el nombre por no estar explícito en la superficie del texto.
  - «Refugiaos» y «no os detengáis» conservan el tono imperativo plural y la urgencia del contexto.
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene ni la implica directamente.
