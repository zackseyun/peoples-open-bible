translation:
  language: es
  text: Estos eran los jefes de las casas paternas[a] de los levitas, según sus generaciones, jefes[b]. Estos habitaban en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'casas paternas' traduce una unidad de clan o linaje; no se refiere solo al hogar de un padre individual.
    reason: cultural_note
  - marker: b
    text: Se conserva la repetición de 'jefes' para reflejar el énfasis del hebreo, que repite el mismo sustantivo al final del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי
  english_pob_choice: heads of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: En español, 'jefes de' expresa de manera natural la función de quienes están al frente de una unidad social o administrativa, y conserva bien el valor relacional del constructo hebreo sin perder el paralelismo de la repetición final de 'jefes'.
- source_word: הָאָבוֹת
  english_pob_choice: the fathers’ houses
  chosen_spanish: las casas paternas
  alternatives_spanish:
  - las casas de los padres
  - los linajes paternos
  lexicon: HALOT
  rationale: La expresión hebrea en Crónicas designa unidades clanicas o familiares de ascendencia, no simples viviendas. 'Casas paternas' es una forma transparente y fiel en español para esa estructura social.
- source_word: לַלְוִיִּם
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - para los levitas
  - entre los levitas
  lexicon: HALOT
  rationale: El ל prefijado marca pertenencia o clasificación dentro del registro genealógico. 'De los levitas' comunica de modo natural que estas casas paternas pertenecían a la tribu/orden levítica.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - según sus linajes
  lexicon: HALOT
  rationale: '''Generaciones'' mantiene el sentido genealógico de תּוֹלְדוֹת como líneas de descendencia. ''Según'' refleja bien la relación formal del hebreo sin añadir la idea más específica de registros escritos.'
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  lexicon: HALOT
  rationale: El sustantivo repetido al final funciona en aposición enfática. 'Jefes' evita una repetición mecánica de 'cabezas' en español y preserva la idea de prominencia y autoridad; la repetición queda visible en el final del verso.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - moraban
  lexicon: HALOT
  rationale: En este contexto יָשַׁב indica residencia. 'Habitaban' es elegante y suficientemente literal en español bíblico moderno, sin la tonalidad arcaica de 'moraban' ni la simplicidad menos marcada de 'vivían'.
- source_word: בִירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo locativo estándar.
translation_notes:
  revision_awareness: La base inglesa revisó 'chief men' a 'heads' para reflejar con más exactitud la repetición hebrea. El español sigue esa revisión al mantener 'jefes' al inicio y al final del verso, preservando el paralelismo enfático.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' como forma por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '''Casas paternas'' se mantiene como terminología técnica de Crónicas para unidades de linaje.'
  - Se evita 'SEÑOR' o fórmulas de sustitución donde no corresponde.
