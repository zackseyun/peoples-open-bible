translation:
  language: es
  text: Entonces Menahem exigió el dinero de Israel[a], de todos los hombres valientes, para dar al rey de Asiria cincuenta siclos de plata de cada hombre. Y el rey de Asiria se volvió y no permaneció allí en el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de todos los hombres poderosos' o 'de todos los hombres de recursos'. La expresión hebrea puede designar hombres de fuerza militar, de posición social o de medios económicos; el contexto tributario favorece la idea de hombres con recursos, aunque la revisión inglesa prefirió mantener 'valientes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  english_pob_choice: exacted
  chosen_spanish: les exigió
  alternatives_spanish:
  - recaudó
  - cobró
  - impuso
  lexicon: HALOT
  rationale: En este contexto fiscal, el verbo no describe solo ‘sacar’ dinero, sino obtenerlo por presión. ‘Exigir’ comunica mejor el sentido coercitivo que un verbo meramente neutral.
- source_word: הַכֶּסֶף
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  lexicon: HALOT
  rationale: Aquí כֶּסֶף designa la suma recaudada; ‘dinero’ fluye mejor en español. La mención posterior de ‘plata’ conserva la expresión de peso/metal en la cantidad especificada.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - sobre Israel
  - contra Israel
  - de Israel
  lexicon: HALOT
  rationale: La exacción recae sobre el pueblo; en español, ‘a Israel’ con ‘les exigió’ deja claro que el dinero fue pedido/arrancado al pueblo. Evita una construcción demasiado rígida.
- source_word: עַל כָּל גִּבּוֹרֵי הַחַיִל
  english_pob_choice: from all the mighty men of valor
  chosen_spanish: de entre todos los hombres poderosos de valor
  alternatives_spanish:
  - de entre todos los hombres valientes
  - de entre todos los hombres poderosos
  - de entre todos los hombres de riqueza
  lexicon: HALOT
  rationale: La frase hebrea puede referir a hombres valientes, prominentes o con recursos. Dado que la revisión inglesa favoreció ‘valor’, mantengo esa línea, pero ‘de entre’ deja abierta la selección social del grupo sin reducirlo solo a soldados.
- source_word: לָתֵת לְמֶלֶךְ אַשּׁוּר
  english_pob_choice: to give to the king of Assyria
  chosen_spanish: para dar al rey de Asiria
  alternatives_spanish:
  - para pagar al rey de Asiria
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte de forma directa. ‘Dar’ sigue de cerca el hebreo y funciona naturalmente en el marco de un tributo.
- source_word: חֲמִשִּׁים שְׁקָלִים כֶּסֶף
  english_pob_choice: fifty shekels of silver
  chosen_spanish: cincuenta siclos de plata
  alternatives_spanish:
  - cincuenta piezas de plata
  - cincuenta siclos de dinero
  lexicon: HALOT
  rationale: ‘Siclos de plata’ reproduce la unidad de peso y el material de la ofrenda/tributo de manera estándar y sobria en español bíblico.
- source_word: לְאִישׁ אֶחָד
  english_pob_choice: from each man
  chosen_spanish: por cada hombre
  alternatives_spanish:
  - de cada hombre
  - para cada hombre
  lexicon: HALOT
  rationale: La frase especifica la cuota individual. ‘Por cada hombre’ comunica con naturalidad la tasa impuesta sin sonar forzado.
- source_word: וַיָּשָׁב
  english_pob_choice: turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  lexicon: HALOT
  rationale: ‘Se volvió’ preserva la idea de retirada o cambio de dirección que el contexto demanda tras recibir el pago.
- source_word: וְלֹא עָמַד שָׁם בָּאָרֶץ
  english_pob_choice: did not remain there in the land
  chosen_spanish: no permaneció allí en la tierra
  alternatives_spanish:
  - no se quedó allí en la tierra
  - no se detuvo allí en la tierra
  lexicon: HALOT
  rationale: עָמַד aquí funciona idiomáticamente como ‘permanecer’. ‘No permaneció allí en la tierra’ conserva la fuerza narrativa y la claridad en español.
translation_notes:
  revision_awareness: La redacción española sigue el pasaje hebreo y toma en cuenta la revisión inglesa más reciente que cambió ‘wealth’ por ‘valor’ para גִּבּוֹרֵי הַחַיִל. Se preserva la ambigüedad relevante en una nota, pero el texto principal adopta la lectura más reciente del audit trail.
  spanish_consistency_notes:
  - He usado ‘Yahvé’ como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - ‘Asiria’ se mantiene como nombre propio geográfico/político estándar.
  - ‘Siclos de plata’ conserva la unidad de valor/metal sin modernizarla indebidamente.
  - Se evita ‘SEÑOR’ y también se evita ‘Cristo’ por no ser pertinentes aquí.
