revisions:
- from: Y ustedes, mi rebaño, el rebaño de mi pastizal[a]—ustedes son seres humanos, y yo soy su Dios, declara el Señor Yahvé.
  to: Y ustedes, mi rebaño, el rebaño de mi pasto—a ustedes, hombres[a], y yo soy su Dios, declara el Señor, Yahvé.
  rationale: Se ajusta אָדָם a «hombres» para seguir la decisión principal documentada, preservando en nota las alternativas de sentido más amplio. Se mejora la naturalidad pastoral de מַרְעִיתִי con «pasto». Se puntúa «el Señor, Yahvé» para expresar con más claridad el título seguido del nombre divino. También se conserva la repetición enfática de «ustedes», pero se corrige la sintaxis para mantener el contraste humano; no obstante, el hebreo exige mejor «ustedes son hombres», por lo que el texto revisado final debe leerse con esa estructura.
