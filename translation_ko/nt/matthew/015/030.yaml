  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ προσῆλθον αὐτῷ ὄχλοι πολλοὶ ἔχοντες μεθ’ ἑαυτῶν ⸂κωφούς, τυφλούς, χωλούς, κυλλούς⸃, καὶ ἑτέρους πολλούς, καὶ ἔρριψαν αὐτοὺς παρὰ τοὺς πόδας ⸀αὐτοῦ, καὶ ἐθεράπευσεν αὐτούς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/030.yaml
  text: 'And large crowds came to him[a], bringing with them the mute, the blind, the lame, the crippled, and many others, and they laid them at his feet[b], and he healed them.'
translation:
  language: ko
  text: '그리고 큰 무리가 그에게 나아왔는데, 자기들과 함께 말 못 하는 자들, 눈먼 자들, 다리 저는 자들, 손발 굽은 자들, 그리고 다른 많은 사람들을 데려와 그의 발 앞에 놓았고, 그가 그들을 고치셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「귀먹은 자들」. 헬라어 κωφός는 청각·언어 장애 모두를 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「불구가 된 자들」. 헬라어 κυλλός는 손발의 변형·장애 일반을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κωφούς
  english_pob_choice: the mute
  chosen_korean: 말 못 하는 자들
  alternatives_korean:
  - 귀먹은 자들
  - 벙어리들
  lexicon: BDAG
  rationale: 31절에서 「말한다」가 결과로 나오므로 본문에서는 「말 못 하는 자」가 더 적합하다. 청각 장애 가능성은 각주로 보존한다.
- source_word: χωλούς
  english_pob_choice: the lame
  chosen_korean: 다리 저는 자들
  lexicon: BDAG
  rationale: χωλός는 다리의 장애. 「다리 저는 자」가 자연스럽다.
- source_word: κυλλούς
  english_pob_choice: the crippled
  chosen_korean: 손발 굽은 자들
  alternatives_korean:
  - 불구가 된 자들
  lexicon: BDAG
  rationale: κυλλός는 손발의 변형·기능 상실. 「손발 굽은」이 시각적 묘사를 살린다.
