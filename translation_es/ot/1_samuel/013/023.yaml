translation:
  language: es
  text: Y salió una guarnición de los filisteos al paso de Micmás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un puesto avanzado de los filisteos salió al cruce de Micmás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - avanzó
  - salió hacia
  lexicon: HALOT
  rationale: El verbo wayyiqtol de יצא expresa movimiento de salida. En español, «salió» reproduce con naturalidad ese valor básico sin añadir una interpretación militar más fuerte de la que el hebreo exige.
- source_word: מַצַּב
  english_pob_choice: garrison
  chosen_spanish: guarnición
  alternatives_spanish:
  - destacamento
  - puesto
  - outpost
  lexicon: HALOT
  rationale: En este contexto militar, el sustantivo designa una fuerza apostada o un puesto militar. «Guarnición» conserva ese sentido con buena naturalidad en español y mantiene el singular del hebreo.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el nombre del pueblo, y el sentido posesivo del hebreo se expresa de forma natural en español con «de los filisteos».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia el
  lexicon: HALOT
  rationale: La preposición marca dirección. En español, «al» conserva esa dirección de forma simple y idiomática.
- source_word: מַעֲבַר
  english_pob_choice: the pass
  chosen_spanish: el paso
  alternatives_spanish:
  - el cruce
  - el desfiladero
  lexicon: HALOT
  rationale: El sustantivo indica un lugar de paso o cruce. «Paso» es la equivalencia más directa y natural en español; «cruce» queda como alternativa posible, reflejada en la nota.
- source_word: מִכְמָשׂ
  english_pob_choice: Michmash
  chosen_spanish: Micmás
  alternatives_spanish:
  - Mikmás
  lexicon: HALOT
  rationale: Se mantiene la transliteración del topónimo con la forma usual en español bíblico, «Micmás».
translation_notes:
  revision_awareness: El inglés auditado no presenta revisiones textuales ni cambios de traducción; el veredicto de revisión indica alta concordancia y sin cambios necesarios. La redacción española sigue de cerca el valor verbal y topográfico del hebreo, con una sola nota léxica para el posible matiz de מַעֲבַר.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y breve del hebreo.
  - «Filisteos» mantiene el plural de población del original.
  - «Micmás» se usa como forma española estándar del topónimo.
  - La nota alternativa preserva la ambigüedad entre «paso» y «cruce/puesto avanzado» sin sobreexplicar.
