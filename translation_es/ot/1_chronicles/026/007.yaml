translation_notes:
  revision_awareness: Se siguió la revisión inglesa que aclaró la sintaxis como una relación explicativa entre Elzabad y sus hermanos, para evitar ambigüedad en español. La frase se mantuvo genealógica y no se amplió más allá del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conservaron los nombres propios en transliteración bíblica sin domesticarlos a formas tradicionales distintas del hebreo.
  - La expresión relacional se resolvió con «cuyos hermanos eran» para reflejar el valor explicativo del hebreo y la auditoría inglesa.
