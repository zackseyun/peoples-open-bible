  lexicon: HALOT
  rationale: דְּבָרִים significa literalmente «palabras». «Palabras» mantiene la forma del hebreo y el vínculo con el discurso previo.
- source_word: אֶל כָּל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
