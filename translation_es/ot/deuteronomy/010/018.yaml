base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/010/018.yaml
  text: He executes justice for the fatherless and the widow[a], and loves the sojourner[c][b], giving him food and clothing.
  footnotes:
  - marker: a
    text: Or 'the orphan.' Hebrew יָתוֹם refers to one deprived of a father; 'fatherless' preserves the legal-social nuance of the Hebrew expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the resident foreigner' or 'the foreigner.' Hebrew גֵּר denotes a non-native living among Israel, not merely a passing stranger.
    reason: lexical_alternative
  - marker: c
    text: Literally 'bread and clothing.' 'Food and clothing' expresses the sense of basic provision in natural English.
    reason: lexical_alternative
