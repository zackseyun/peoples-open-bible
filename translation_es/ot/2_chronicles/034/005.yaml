translation:
  language: es
  text: Quemó los huesos de los sacerdotes sobre sus altares[a], y purificó Judá y Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''los altares''. La forma hebrea aquí es inusual; el sentido es que Josías quemó los huesos de los sacerdotes sobre los altares asociados con ellos.'
    reason: textual_variant
lexical_decisions:
- source_word: וְ/עַצְמוֹת
  english_pob_choice: the bones of
  chosen_spanish: los huesos de
  alternatives_spanish:
  - y los huesos de
  lexicon: HALOT
  rationale: עַצְמוֹת es el plural constructo de עֶצֶם, con sentido literal de 'huesos'. En español, iniciar la frase con 'y' no es necesario para reflejar el enlace verbal del hebreo, y 'los huesos de' expresa con naturalidad el constructo.
- source_word: כֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - sacerdotes
  lexicon: HALOT
  rationale: El sustantivo designa a sacerdotes. 'Sacerdotes' es el término español más claro y directo; el hebreo no añade aquí un calificativo explícito, aunque el contexto los presenta como vinculados a cultos ilícitos.
- source_word: שָׂרַף
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - incendió
  - quemó hasta consumir
  lexicon: HALOT
  rationale: El qal perfecto 3ms de שׂרף significa 'quemar'. 'Quemó' es una equivalencia natural y fiel en español; 'incendió' suena menos preciso en este contexto de acción deliberada sobre restos humanos.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  lexicon: HALOT
  rationale: La preposición expresa ubicación sobre la superficie de los altares. 'Sobre' reproduce mejor el valor espacial que 'en'.
- source_word: מִזְבְּחוֹתִים
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - los altares
  - sus altares de culto
  lexicon: HALOT
  rationale: La forma hebrea es inusual, pero el audit trail inglés la entiende como 'their altars' y conserva la referencia posesiva. En español, 'sus altares' refleja esa relación sin sobreespecificar. La nota conserva la alternativa textual de 'los altares'.
- source_word: וַיְטַהֵר
  english_pob_choice: and he cleansed
  chosen_spanish: y purificó
  alternatives_spanish:
  - y limpió ritualmente
  - y limpió
  lexicon: HALOT
  rationale: טהר en este contexto reformador expresa quitar la impureza cultual. 'Purificó' mantiene la dimensión ritual mejor que 'limpió', y es idiomático en español bíblico contemporáneo.
- source_word: אֶת יְהוּדָה וְאֶת יְרוּשָׁלִָם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: Judá y Jerusalén
  alternatives_spanish:
  - Judá y Yerushalén
  lexicon: HALOT
  rationale: Son objetos directos marcados por את. Se usan los nombres españoles convencionales, 'Judá' y 'Jerusalén', sin alterar el referente geográfico-político.
theological_decisions:
- issue: Naturaleza de la purificación
  english_pob_reading: cultic-moral cleansing of the land and city from idolatrous defilement
  chosen_spanish_reading: purificación cultual y moral de la tierra y la ciudad frente a la contaminación idolátrica
  alternative_spanish_readings:
  - purificación ceremonial solamente
  - limpieza física solamente
  rationale: El verbo טהר en este relato de reforma no describe solo aseo material ni un rito aislado, sino la remoción de contaminación asociada al culto falso. 'Purificó' permite conservar esa tensión sin reducirla.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sentido de 'sus altares'
  english_pob_reading: the altars associated with the priests
  chosen_spanish_reading: los altares asociados con los sacerdotes mencionados
  alternative_spanish_readings:
  - los altares
  - sus altares en sentido posesivo estricto
  rationale: La forma hebrea es textual y morfológicamente inusual. Siguiendo el audit trail inglés, se deja 'sus altares' en el texto y se anota la posibilidad de 'los altares' para no borrar la ambigüedad documentada.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés: mantener el acto de quemar los huesos, la referencia posesiva problemática de ''sus altares'' y el verbo de purificación cultual. No se introducen adiciones interpretativas fuera de lo indicado por el hebreo y por la nota textual inglesa.'
  spanish_consistency_notes:
  - Se prefirió 'purificó' para טהר por coherencia con el uso cultual bíblico en español.
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino; solo se trasladan los nombres propios y la acción verbal.
  - '''Jerusalén'' se mantiene como forma española estándar, sin transliteración.'
  - La nota al pie preserva la variante textual sin duplicar marcadores.
