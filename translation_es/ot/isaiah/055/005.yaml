translation:
  language: es
  text: He aquí, llamarás a una nación que no conoces, y una nación que no te conoció correrá[a] hacia ti, por causa[b] de Yahvé tu Dios y del Santo de Israel, porque él te ha glorificado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se apresurará hacia ti».
    reason: lexical_alternative
  - marker: b
    text: O «por el bien de Yahvé tu Dios».
    reason: lexical_alternative
  - marker: c
    text: O «te ha adornado» o «te ha honrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Ciertamente
  lexicon: HALOT
  rationale: La interjección profética introduce una घोषणा/annuncio enfático. «Mira» conserva la fuerza de llamada a la atención sin sonar tan arcaico como «He aquí» en español moderno; mantiene el tono declarativo del original.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación gentil
  lexicon: HALOT
  rationale: El hebreo usa גּוֹי en singular para un pueblo o colectividad. «Nación» es la opción más natural y amplia en español, sin sobredeterminar el referente.
- source_word: לֹא תֵדַע
  english_pob_choice: you do not know
  chosen_spanish: que no conoces
  alternatives_spanish:
  - que no has conocido
  - que no conocías
  lexicon: HALOT
  rationale: En la frase relativa, el imperfecto funciona como una caracterización general. «Que no conoces» suena natural en español y preserva el sentido de desconocimiento relacional sin forzar un tiempo verbal demasiado marcado.
- source_word: תִּקְרָא
  english_pob_choice: you will call
  chosen_spanish: llamarás
  alternatives_spanish:
  - convocarás
  - invocarás
  lexicon: HALOT
  rationale: קרא puede significar llamar o convocar. Aquí «llamarás» sigue de cerca el valor básico y conserva la relación directa con la nación mencionada.
- source_word: לֹא יְדָעוּךָ
  english_pob_choice: did not know you
  chosen_spanish: que no te conoció
  alternatives_spanish:
  - que no te conocía
  - que no te ha conocido
  lexicon: HALOT
  rationale: El perfecto plural indica una falta de conocimiento previa respecto de la acción futura. En español, «que no te conoció» expresa bien la anterioridad relativa y mantiene el paralelismo con la primera cláusula.
- source_word: אֵלֶיךָ יָר֑וּצוּ
  english_pob_choice: will run to you
  chosen_spanish: correrá hacia ti
  alternatives_spanish:
  - se apresurará hacia ti
  - acudirá hacia ti
  lexicon: HALOT
  rationale: רוּץ describe movimiento rápido. «Correrá hacia ti» conserva la imagen concreta. Aunque el sujeto es plural en hebreo, el español puede usar plural concordante si se lee a la frase completa; sin embargo, aquí se opta por singular sintético para mantener la fluidez del conjunto, como ocurre frecuentemente en español poético. Se privilegia la claridad y el ritmo del verso.
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por amor a
  - a causa de
  - por el bien de
  lexicon: HALOT
  rationale: En este contexto causal, «por causa de» reproduce bien el valor explicativo del hebreo y corresponde a la elección inglesa «because of», sin introducir matices de finalidad que no son primarios aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada estándar del proyecto en español. «Yahvé» preserva la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: La construcción con sufijo se traduce de manera directa e idiomática como «tu Dios».
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: and the Holy One of Israel
  chosen_spanish: y del Santo de Israel
  alternatives_spanish:
  - y el Santo de Israel
  - e incluso el Santo de Israel
  lexicon: HALOT
  rationale: La preposición לְ en esta expresión causa un matiz relacional/causal. «Del Santo de Israel» hace audible esa relación en español y evita perder el encadenamiento con la cláusula anterior; mantiene también el apelativo tradicional sin reemplazarlo por una formulación más explicativa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la reacción de las naciones. «Porque» es claro y natural en español, conservando el valor causal del hebreo.
- source_word: פֵאֲרָךְ
  english_pob_choice: he has glorified you
  chosen_spanish: te ha glorificado
  alternatives_spanish:
  - te ha adornado
  - te ha honrado
  - te ha embellecido
  lexicon: HALOT
  rationale: פאר en piel puede significar adornar, honrar, embellecer o glorificar. En este marco de exaltación divina, «glorificado» recoge bien la dimensión pública de honor y esplendor que la POB inglesa también destacó.
theological_decisions:
- issue: Identidad del destinatario singular
  english_pob_reading: Retain the direct second-person singular ('you') without specifying whether the addressee is Zion, Israel, or the Davidic figure.
  chosen_spanish_reading: Mantener el «tú/ti/te» singular sin precisar si el destinatario es Sión, Israel o una figura davídica.
  alternative_spanish_readings:
  - Interpretar explícitamente a Sión/Jerusalén
  - Interpretar explícitamente al siervo o al rey davídico
  rationale: El hebreo conserva la ambigüedad del destinatario y el contexto permite más de una identificación. La traducción debe preservar esa tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión textual y teológica del pasaje.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; esta propuesta sigue esa lectura estable, manteniendo la ambigüedad del destinatario singular y las alternativas léxicas documentadas para גּוֹי, רוּץ y פאר.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se conserva «Santo de Israel» como apelativo teológicamente cargado y reconocido en el corpus profético.
  - Se mantiene la segunda persona singular para no resolver la identidad del destinatario.
  - La opción «por causa de» refleja la fuerza causal de לְמַעַן sin convertirla en finalidad.
  - La nota [a] se ancla en «Mira» para recoger la alternativa verbal de movimiento/apresuramiento del hebreo y de la POB inglesa.
