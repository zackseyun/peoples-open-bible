revisions:
- from: Y proclamarán en ese mismo día una convocación santa[a]; no harán ningún trabajo de labor[b]. Será un estatuto perpetuo[c] en todas sus moradas, por sus generaciones.
  to: Y en ese mismo día proclamarán una convocación santa[a]; no harán ningún trabajo laborioso[b]. Es un estatuto perpetuo[c] en todos sus lugares donde habiten, por sus generaciones.
  rationale: 'Se revisa principalmente para corregir una expresión española poco natural (''trabajo de labor'') y para alinear mejor la formulación con la intención léxica documentada del POB inglés: prohibición de trabajo ordinario/servil, no de toda actividad. También se pulen las notas y la frase final para mayor claridad y naturalidad en español bíblico contemporáneo, sin apartarse del sentido del hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura legal del hebreo y refleja adecuadamente מִקְרָא קֹדֶשׁ y חֻקַּת עוֹלָם. Sin embargo, hay varios desajustes de forma y naturalidad: וּ/קְרָאתֶם es 2mp y conviene mantener el mandato directo con ''proclamarán/ustedes proclamarán'' o mejor una forma imperativa-futural española natural; בְּעֶצֶם הַיּוֹם הַזֶּה se expresa mejor como ''en ese mismo día'' o ''en ese mismo día exacto'', pero el mayor problema es כָּל מְלֶאכֶת עֲבֹדָה, donde ''trabajo de labor'' no es español natural ni comunica con claridad la idea documentada de trabajo ordinario/servil. También la combinación de pronombres de segunda persona con posesivos ''sus'' introduce una leve inconsistencia.'
  spanish_quality_summary: La redacción es comprensible y de registro bíblico adecuado, pero suena algo calcada en puntos clave. 'Ningún trabajo de labor' es poco idiomático; 'en todas sus moradas, por sus generaciones' también puede mejorarse a una fórmula más natural y estable en español bíblico contemporáneo. Conviene uniformar el tratamiento de segunda persona plural y pulir las notas para que no repitan opciones idénticas al texto principal.
  glossary_alignment: Sin conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. La principal cuestión léxica es mantener la decisión del POB sobre כָּל מְלֶאכֶת עֲבֹדָה evitando 'ningún trabajo' absoluto; en español funciona mejor 'ningún trabajo laborioso' o 'ningún trabajo ordinario'.
  issues:
  - severity: high
    issue: '''ningún trabajo de labor'' es antinatural y semánticamente torpe para כָּל מְלֶאכֶת עֲבֹדָה'
    rationale: La decisión inglesa busca expresar trabajo ordinario/servil, no una prohibición absoluta. 'Trabajo de labor' no es una expresión española clara; puede confundir o sonar redundante.
  - severity: medium
    issue: Inconsistencia pronominal entre verbos en segunda persona plural y posesivos 'sus'
    rationale: El hebreo usa 2mp de forma consistente ('para ustedes/vuestras'). En español neutral latinoamericano puede usarse 'ustedes' con posesivos explícitos como 'sus', pero aquí la mezcla suena menos cohesionada dentro de una fórmula legal.
  - severity: low
    issue: La nota [c] ofrece 'un estatuto perpetuo' como alternativa cuando ya es el texto principal
    rationale: Una nota de alternativa no debe repetir exactamente la lectura elegida; conviene conservar alternativas reales como 'estatuto permanente' o 'estatuto eterno'.
  - severity: low
    issue: La nota [b] necesita pulido idiomático y tipográfico
    rationale: El contenido es correcto, pero la redacción actual está entrecomillada de forma extraña y repite 'labor' innecesariamente.
  revised_spanish_text: Y en ese mismo día proclamarán una convocación santa[a]; no harán ningún trabajo laborioso[b]. Es un estatuto perpetuo[c] en todos sus lugares donde habiten, por sus generaciones.
  revised_footnotes:
