revisions:
- from: ¡Oh hombres[a], cómo no prevalece el rey, puesto que tan obedecido es! Y guardó silencio.
  to: Oh hombres[a], ¿cómo no prevalece el rey, puesto que se le obedece tanto? Y guardó silencio.
  rationale: Se ajustó la puntuación para reflejar mejor un vocativo seguido de pregunta retórica, y se reemplazó la construcción forzada «tan obedecido es» por la forma idiomática «se le obedece tanto», que conserva el valor intensivo y la idea de obediencia al rey. También se pulió la nota al pie para un español más natural y de mejor registro.
