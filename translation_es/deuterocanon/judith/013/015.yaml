translation:
  language: es
  text: 'Y adelantándose[a], sacó la cabeza de la bolsa y la mostró a ellos, y les dijo: «He aquí la cabeza de Holofernes, el comandante en jefe del ejército de Asur; y he aquí el dosel[b] en el que yacía en su embriaguez. Y Yahvé lo derribó por mano de una mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saliendo adelante»; el griego marca que Judith avanzó hacia delante antes de mostrar la cabeza.
    reason: lexical_alternative
  - marker: b
    text: O «mosquitero» o «cortina de cama», por la cubierta colgante sobre el lecho de Holofernes.
    reason: lexical_alternative
lexical_decisions:
- source_word: προελθοῦσα
  english_pob_choice: coming forward
  chosen_spanish: saliendo adelante
  alternatives_spanish:
  - presentándose
  - adelantándose
  lexicon: LSJ
  rationale: El participio expresa el movimiento de Judith hacia delante antes de mostrar la cabeza. «Saliendo adelante» conserva la acción narrativa y sugiere salida a escena sin añadir más que el griego.
- source_word: πήρας
  english_pob_choice: bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - bolsa de cuero
  - morral
  - bolsa/zurrón
  lexicon: LSJ
  rationale: La πήρα es un receptáculo para llevar objetos. «Bolsa» es claro y natural en español; evita un tecnicismo innecesario y funciona bien en el contexto inmediato.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - He aquí
  lexicon: BDAG
  rationale: La interjección pide atención enfática. «Miren» comunica la fuerza exhortativa en español actual mejor que un calco arcaizante, sin perder el énfasis.
- source_word: ἀρχιστρατήγου
  english_pob_choice: commander-in-chief
  chosen_spanish: comandante en jefe
  alternatives_spanish:
  - general en jefe
  - comandante supremo
  lexicon: LSJ
  rationale: El compuesto denota el rango militar más alto. «Comandante en jefe» reproduce con precisión la jerarquía y suena natural en español moderno.
- source_word: δυνάμεως
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - hueste
  lexicon: LSJ
  rationale: En contexto militar, δύναμις se refiere a una fuerza armada. «Ejército» transmite mejor esa referencia que un equivalente más genérico.
- source_word: Ἀσσούρ
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Assur
  - Asiria
  lexicon: LSJ
  rationale: Se conserva la forma transliterada del nombre propio griego, adaptada a la ortografía española. «Asur» mantiene la referencia nominal sin sustituirla por la etiqueta geopolítica «Asiria».
- source_word: κωνώπιον
  english_pob_choice: canopy
  chosen_spanish: dosel
  alternatives_spanish:
  - mosquitero
  - cortina de cama
  lexicon: LSJ
  rationale: El término puede referirse a una cubierta o colgadura sobre la cama. «Dosel» es una solución digna y comprensible en español; conserva la idea de cobertura suspendida, dejando abierta la posibilidad de otros matices.
- source_word: κατέκειτο
  english_pob_choice: was lying
  chosen_spanish: yacía
  alternatives_spanish:
  - estaba recostado
  - estaba tendido
  lexicon: BDAG
  rationale: El imperfecto describe el estado de Holofernes sobre el lecho. «Yacía» es sobrio y adecuado al registro literario; mantiene la imagen de reposo/reclinación.
- source_word: μέθαις
  english_pob_choice: drunkenness
  chosen_spanish: borracheras
  alternatives_spanish:
  - embriaguez
  - ebriedad
  - excesos de bebida
  lexicon: LSJ
  rationale: El plural griego sugiere episodios o condiciones de ebriedad. «En medio de sus borracheras» conserva el plural de manera natural en español y refleja el tono despectivo del pasaje.
- source_word: ἐπάταξεν
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo derribó
  - lo golpeó
  - lo hirió de muerte
  lexicon: LSJ
  rationale: El verbo expresa un golpe decisivo. «Lo hirió» preserva la acción directa sin exagerar con una glosa interpretativa; el contexto ya deja claro el resultado letal.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dios
  lexicon: BDAG
  rationale: Aquí κύριος remite al Dios de Israel. En español bíblico, «el Señor» es la forma más natural para esta cita narrativa y conserva la lectura reverente del título; se evita resolver aquí la referencia nominal explícita para no introducir una identificación que el flujo del versículo no formula en el griego.
- source_word: ἐν χειρὶ θηλείας
  english_pob_choice: by the hand of a woman
  chosen_spanish: por mano de una mujer
  alternatives_spanish:
  - por la mano de una mujer
  - por una mujer
  - a manos de una mujer
  lexicon: LSJ
  rationale: La expresión idiomática marca agencia/instrumentalidad y subraya el contraste de género. «Por mano de una mujer» conserva la construcción bíblica y el énfasis del griego sin volverla abstrusa.
theological_decisions:
- issue: Agencia divina en la muerte de Holofernes
  english_pob_reading: And the Lord struck him down by the hand of a woman
  chosen_spanish_reading: Y el Señor lo hirió por mano de una mujer
  alternative_spanish_readings:
  - Y el Señor lo entregó en manos de una mujer
  - Y una mujer lo hirió
  rationale: 'El griego atribuye la acción decisiva al Señor, pero también nombra a Judith como agente humano. La traducción conserva esa tensión: Dios actúa soberanamente y lo hace mediante una mujer, sin suavizar ni la agencia divina ni la humana.'
  doctrine_reference: Conservar la tensión teológica entre providencia divina e instrumento humano; κύριος → Señor
- issue: Énfasis deshonroso en ser vencido por una mujer
  english_pob_reading: by the hand of a woman
  chosen_spanish_reading: por mano de una mujer
  alternative_spanish_readings:
  - por la mano de una mujer
  - por una mujer
  rationale: El griego resalta de forma intencional la vergüenza de la derrota a manos de una mujer. «Por mano de una mujer» mantiene ese golpe retórico y evita diluir el matiz con una formulación demasiado neutral.
  doctrine_reference: Precisión de género y preservación del contraste retórico del original
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado más reciente del texto inglés auditable: refleja προελθοῦσα con una frase de movimiento previo («saliendo adelante»), traduce explícitamente ἔδειξεν con «se la mostró», mantiene la repetición enfática de Ἰδοὺ con una exhortación al lector, usa un término visible para κωνώπιον sin cerrar por completo la alternativa textual, y conserva la atribución final al Señor mediante una construcción idiomática en español.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en el sentido reverencial aplicado al Dios de Israel, coherente con el registro bíblico del pasaje.
  - «Asur» preserva el nombre propio griego Ἀσσούρ sin convertirlo en el nombre geopolítico «Asiria».
  - «Dosel» mantiene la ambigüedad razonable de κωνώπιον, que puede abarcar una cubierta/cortina de cama o un mosquitero, sin imponer una sola interpretación.
  - El plural de μέθαις se refleja con «borracheras» para no borrar la intensificación del original.
