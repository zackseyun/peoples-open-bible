    text: O, más literalmente, 'doce hermanos, hijos de nuestro padre'. El hebreo presenta una cláusula nominal; en español se expresa naturalmente con 'somos'.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, 'uno no está' o 'uno no es'. El hebreo puede indicar que el hermano está ausente, perdido o presumiblemente muerto.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'ya no existe' por 'ya no está' para reflejar fielmente el idiomatismo hebreo sin introducir una afirmación ontológica extraña al contexto. También se corrige la nota [a] para que corresponda al lugar donde aparece el marcador y explique adecuadamente la cláusula nominal hebrea.
