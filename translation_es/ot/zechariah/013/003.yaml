translation:
  language: es
  text: 'Y sucederá que, si un hombre aún profetiza[a], su padre y su madre, quienes lo trajeron al mundo, le dirán: «No vivirás, porque has dicho mentiras en nombre de Yahvé»; y su padre y su madre, quienes lo trajeron al mundo, lo traspasarán[b] cuando profetice.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si un hombre profetiza de nuevo». El hebreo עוֹד puede señalar acción continuada o renovada.
    reason: lexical_alternative
  - marker: b
    text: O «lo atravesarán» o «lo apuñalarán». El verbo hebreo denota perforar con un arma.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: Expresa la apertura circunstancial del hebreo con naturalidad en español, conservando el tono formal sin caer en un calco pesado.
- source_word: כִּי
  english_pob_choice: that if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - que si
  lexicon: HALOT
  rationale: Aquí introduce una circunstancia condicional; en español, 'si' comunica con claridad la idea del caso hipotético.
- source_word: יִנָּבֵא
  english_pob_choice: prophesies
  chosen_spanish: profetiza
  alternatives_spanish:
  - hace de profeta
  - habla proféticamente
  lexicon: HALOT
  rationale: Verbo estándar y natural para נבא en este contexto. No se incorpora la falsedad en el verbo mismo, porque el juicio sobre la falsedad aparece después.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y representativo; 'un hombre' preserva esa forma y funciona bien en español bíblico actual.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - de nuevo
  lexicon: HALOT
  rationale: '''Aún'' mantiene la idea de continuación pese al contexto de depuración profética.'
- source_word: יֹלְדָיו
  english_pob_choice: who bore him
  chosen_spanish: los que lo engendraron
  alternatives_spanish:
  - sus padres
  - los que lo dieron a luz
  lexicon: HALOT
  rationale: La expresión hebrea identifica concretamente a los progenitores como quienes lo dieron a luz/engendraron. 'Los que lo engendraron' conserva esa concreción mejor que un mero 'padres'.
- source_word: לֹא תִחְיֶה
  english_pob_choice: You shall not live
  chosen_spanish: No vivirás
  alternatives_spanish:
  - No deberás vivir
  - No seguirás con vida
  lexicon: HALOT
  rationale: Es una declaración judicial breve y tajante. 'No vivirás' preserva la severidad y suena natural en español.
- source_word: שֶׁקֶר דִּבַּרְתָּ
  english_pob_choice: you have spoken lies
  chosen_spanish: has hablado mentira
  alternatives_spanish:
  - has hablado mentiras
  - has hablado falsedad
  lexicon: HALOT
  rationale: '''Mentira'' en singular refleja bien el hebreo de verdad/falsedad y evita una pluralización innecesaria; mantiene el sentido de acusación directa.'
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - en el nombre de Yahvé
  - en nombre del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: ''Yahvé''. ''En nombre de'' conserva la fuerza representativa/covenantal de la fórmula.'
- source_word: וּדְקָרֻהוּ
  english_pob_choice: will pierce him through
  chosen_spanish: lo atravesarán
  alternatives_spanish:
  - lo herirán de muerte
  - lo traspasarán
  lexicon: HALOT
  rationale: דקר implica herir con arma de forma penetrante. 'Atravesarán' comunica el golpe violento sin suavizarlo, y resulta más natural en español que una traducción demasiado literal.
- source_word: בְּהִנָּבְאוֹ
  english_pob_choice: when he prophesies
  chosen_spanish: cuando profetice
  alternatives_spanish:
  - mientras profetiza
  - al profetizar
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con preposición queda bien expresada por 'cuando profetice', que es claro y fluido en español.
theological_decisions:
- issue: Severidad del castigo contra el falso profeta
  english_pob_reading: Retain the text's stark statement that his own parents will execute judgment on him for speaking lies in the name of the LORD.
  chosen_spanish_reading: Conservar la afirmación tajante de que sus propios padres lo ejecutarán/atravesarán por hablar mentira en nombre de Yahvé.
  alternative_spanish_readings:
  - Suavizarlo como rechazo social o desheredación
  - Hacer que el acto suene solo a herida y no a muerte
  rationale: El hebreo une una sentencia de muerte con una acción violenta real. La traducción debe preservar esa dureza profética sin mitigación interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - El SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se vierte 'Yahvé' para mantener visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la revisión final sin cambios: la elección principal sigue la lectura de continuidad de עוֹד como ''aún'', conserva la condena judicial y mantiene יְהוָה como ''Yahvé'' conforme al criterio del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se evitó 'Cristo' o terminología cristológica, no presente en el verso.
  - Se conservó el paralelismo entre la sentencia verbal ('No vivirás') y el acto violento ('lo atravesarán').
  - '''Profetiza/profetice'' se mantiene en una misma raíz verbal para reproducir la repetición del hebreo.'
