id: GEN.47.24
reference: Genesis 47:24
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/תְּבוּאֹ֔ת וּ/נְתַתֶּ֥ם חֲמִישִׁ֖ית לְ/פַרְעֹ֑ה וְ/אַרְבַּ֣ע הַ/יָּדֹ֡ת יִהְיֶ֣ה לָ/כֶם֩ לְ/זֶ֨רַע הַ/שָּׂדֶ֧ה וּֽ/לְ/אָכְלְ/כֶ֛ם וְ/לַ/אֲשֶׁ֥ר בְּ/בָתֵּי/כֶ֖ם וְ/לֶ/אֱכֹ֥ל לְ/טַפְּ/כֶֽם׃
translation:
  text: And at the harvest[a], you shall give a fifth to Pharaoh, and four-fifths shall be yours for seed for the field, for your food, for those in your households, and for food for your little ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and four hands'; an idiom meaning the remaining four parts, that is, four-fifths.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּתְּבוּאֹת
  chosen: at the harvest
  alternatives:
  - in the produce
  - when the crops come in
  lexicon: HALOT
  rationale: תְּבוּאָה refers to produce/yield/crop. With the prefixed ב and in this administrative context, an idiomatic temporal rendering ('at the harvest') communicates the sense of the time when produce is gathered without over-literal awkwardness.
- source_word: וּנְתַתֶּם חֲמִישִׁית לְפַרְעֹה
  chosen: you shall give a fifth to Pharaoh
  alternatives:
  - you must give one-fifth to Pharaoh
  lexicon: HALOT
  rationale: חֲמִישִׁית denotes one-fifth. 'A fifth' is natural English and preserves the taxation arrangement stated by Joseph.
- source_word: וְאַרְבַּע הַיָּדֹת
  chosen: and four-fifths
  alternatives:
  - and four parts
  - and the four portions
  lexicon: HALOT
  rationale: The idiom 'four hands' here denotes four parts out of five, i.e., the remaining four-fifths. Rendering the idiom by its sense is preferable in English, since 'four hands' would be opaque.
- source_word: יִהְיֶה לָכֶם
  chosen: shall be yours
  alternatives:
  - shall belong to you
  - shall be for you
  lexicon: HALOT
  rationale: This expresses possession/allocation of the remaining produce. 'Shall be yours' is concise and natural.
- source_word: לְזֶרַע הַשָּׂדֶה
  chosen: for seed for the field
  alternatives:
  - for sowing the field
  - for seed of the field
  lexicon: HALOT
  rationale: The phrase indicates retained grain for future planting. 'For seed for the field' stays close to the Hebrew while remaining readable.
- source_word: וּלְאָכְלְכֶם
  chosen: for your food
  alternatives:
  - for your eating
  - for you to eat
  lexicon: HALOT
  rationale: The noun form from אכל functions substantivally here. 'For your food' is idiomatic and fits the list of uses for the retained produce.
- source_word: וְלַאֲשֶׁר בְּבָתֵּיכֶם
  chosen: for those in your households
  alternatives:
  - for those in your houses
  - for what is in your houses
  lexicon: HALOT
  rationale: The relative phrase refers to the people belonging to their households, not household goods. 'Those in your households' makes the referent explicit in natural English.
- source_word: וְלֶאֱכֹל לְטַפְּכֶם
  chosen: and for food for your little ones
  alternatives:
  - and for your children to eat
  - and to feed your dependents
  lexicon: HALOT
  rationale: טַף commonly refers to little children/dependents. 'Little ones' preserves the familial sense without sounding overly technical. Repeating 'for food' reflects the Hebrew infinitive construction in smooth English.
