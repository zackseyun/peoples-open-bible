translation:
  language: es
  text: Azuba murió, y Caleb tomó a Efrat[a] por esposa, y ella le dio a luz a Hur.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «Caleb se casó con Efrat». El hebreo dice literalmente «Caleb tomó a Efrat», un modismo para el matrimonio.'
    reason: lexical_alternative
  - marker: b
    text: El nombre también puede aparecer como «Efrata» en formas relacionadas en otros pasajes, pero aquí el hebreo usa la forma breve אֶפְרָת.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT / מות
  rationale: El verbo básico de morir se rinde de forma directa con «murió», sin eufemismo, en línea con la transparencia del hebreo.
- source_word: עֲזוּבָה
  english_pob_choice: Azubah
  chosen_spanish: Azuba
  alternatives_spanish:
  - Azubah
  lexicon: Nombre propio
  rationale: 'Se translitera el nombre propio al español con adaptación gráfica mínima y naturalidad fonética: «Azuba».'
- source_word: וַיִּקַּח לוֹ
  english_pob_choice: took ... as his wife
  chosen_spanish: tomó a ... como su esposa
  alternatives_spanish:
  - se casó con ...
  - tomó a ... por esposa
  lexicon: HALOT / לקח
  rationale: El hebreo usa la idiomática «tomó» con objeto femenino para indicar matrimonio. En español, «tomó a X como su esposa» conserva la metáfora verbal y explicita el sentido marital.
- source_word: כָלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: Nombre propio
  rationale: Se conserva la forma tradicional y reconocible del nombre propio en español bíblico.
- source_word: אֶפְרָת
  english_pob_choice: Ephrath
  chosen_spanish: Efrata
  alternatives_spanish:
  - Efrat
  lexicon: Nombre propio
  rationale: El hebreo aquí presenta la forma corta אֶפְרָת. En español, «Efrata» reproduce bien la forma breve y evita introducir la variante ampliada «Efrata»/«Efrat» sin necesidad contextual.
- source_word: וַתֵּלֶד לוֹ
  english_pob_choice: she bore ... to him
  chosen_spanish: le dio a luz a ...
  alternatives_spanish:
  - parió a ...
  - tuvo a ...
  lexicon: HALOT / ילד
  rationale: «Dar a luz» es el equivalente natural y digno en español para el nacimiento de un hijo, manteniendo el valor verbal de ילד y la relación expresada por לֹו mediante «le».
- source_word: חוּר
  english_pob_choice: Hur
  chosen_spanish: Hur
  alternatives_spanish:
  - Jur
  lexicon: Nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustantivos y que el acuerdo con el control cruzado fue alto; esta versión mantiene esa lectura estable, con ajuste solo de presentación española y de transliteración natural.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente, sin necesidad de decisión especial.
  - Se conserva la relación idiomática de matrimonio en «tomó a ... como su esposa», en paralelo con la nota alternativa.
  - La forma breve de אֶפְרָת se refleja como «Efrata» para coherencia con el español bíblico.
  - No se agrega puntuación ni segmentación que altere el paralelismo simple del verso.
