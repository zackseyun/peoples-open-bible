  text: Or do you not know that all of us who were baptized into Messiah Jesus were baptized into his death?[a]
translation:
  language: ko
  text: 아니면 메시아 예수께로 세례 받은 우리 모두가 그분의 죽음 속으로 세례 받았다는 것을 여러분은 알지 못합니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβαπτίσθημεν
  english_pob_choice: were baptized
  chosen_korean: 세례 받은
  lexicon: BDAG
  rationale: 바울의 핵심 동사. 「세례 받다」 표준.
- source_word: εἰς Χριστὸν Ἰησοῦν
  english_pob_choice: into Messiah Jesus
  chosen_korean: 메시아 예수께로
  alternatives_korean:
