translation:
  language: es
  text: Miren[a], que yo los despertaré[b] del lugar donde ustedes los vendieron, y haré volver su recompensa sobre su propia cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». El hebreo introduce una declaración solemne con fuerza de llamada de atención.
    reason: lexical_alternative
  - marker: b
    text: O «los avivaré» o «los pondré en movimiento». El verbo hebreo puede significar despertar, avivar o suscitar acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look, I
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, yo
  - He aquí
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: La fórmula introduce una घोषणा solemne con fuerza deíctica. «Mira» conserva el llamado a prestar atención en español moderno sin caer en un arcaísmo innecesario.
- source_word: מְעִירָם
  english_pob_choice: am stirring them up
  chosen_spanish: los haré salir
  alternatives_spanish:
  - los despertaré
  - los agitaré
  - los despertaré y los pondré en movimiento
  lexicon: HALOT
  rationale: El verbo puede abarcar arremover, despertar o espolear, pero el contexto inmediato es el de sacarlos del lugar de su venta. «Los haré salir» comunica el efecto resultante sin restringir indebidamente el matiz verbal.
- source_word: מִן הַמָּקוֹם
  english_pob_choice: from the place
  chosen_spanish: del lugar
  alternatives_spanish:
  - desde el lugar
  - fuera del lugar
  lexicon: HALOT
  rationale: Es la expresión espacial directa y natural en español, manteniendo la relación de procedencia.
- source_word: אֲשֶׁר מְכַרְתֶּם אֹתָם שָׁמָּה
  english_pob_choice: where you sold them
  chosen_spanish: donde ustedes los vendieron
  alternatives_spanish:
  - a donde ustedes los vendieron
  - donde los habían vendido
  lexicon: HALOT
  rationale: El relativo con el adverbio direccional sostiene la idea de lugar de venta y destino. «Donde ustedes los vendieron» es idiomático y conserva la relación locativa sin añadir tiempo verbal no exigido por el hebreo.
- source_word: וַהֲשִׁבֹתִי
  english_pob_choice: I will return
  chosen_spanish: haré volver
  alternatives_spanish:
  - devolveré
  - repagaré
  - haré regresar
  lexicon: HALOT
  rationale: La causativa de שוב expresa hacer volver o traer de vuelta. «Haré volver» mantiene la imagen concreta de retorno y evita reducirla a un simple castigo abstracto.
- source_word: גְמֻלְכֶם
  english_pob_choice: your recompense
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su paga
  - su retribución
  - lo que merecen
  lexicon: HALOT
  rationale: «Recompensa» preserva el valor de retribución moral/judicial del término sin volverlo meramente comercial. Se conserva el sentido de correspondencia entre acción y retorno.
- source_word: בְּרֹאשְׁכֶם
  english_pob_choice: on your own head
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - sobre sus cabezas
  - encima de ustedes
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de retribución que cae de vuelta sobre el culpable. «Propia» refuerza el carácter reflexivo del giro y mantiene la imagen corporal del original.
theological_decisions:
- issue: Fuerza de la declaración divina inicial
  english_pob_reading: A solemn divine announcement with deictic force
  chosen_spanish_reading: Una proclamación solemne que llama la atención del oyente
  alternative_spanish_readings:
  - Una simple advertencia
  - Una exhortación neutral
  rationale: «Mira» conserva el impulso deíctico y la solemnidad profética sin borrar el tono directo del hebreo.
  doctrine_reference: Profecía y discurso divino directo
- issue: Naturaleza de מְעִירָם
  english_pob_reading: God actively rouses the dispersed people from the place of exile/sale
  chosen_spanish_reading: Dios los hace salir del lugar donde fueron vendidos
  alternative_spanish_readings:
  - Dios solo los despierta interiormente
  - Dios los incita militarmente
  rationale: El contexto inmediato de venta y desplazamiento favorece una acción efectiva de rescate/retorno. «Haré salir» evita limitar el verbo a una emoción interna o a una movilización bélica.
  doctrine_reference: Providencia y restauración del pueblo
translation_notes:
  revision_awareness: Se tomó en cuenta el estado más reciente de la auditoría inglesa, que permanece sin cambios y con acuerdo alto. La versión española procura conservar la imagen concreta de retribución y la ambigüedad útil del verbo hebreo sin mecanizar el inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando no aparece explícito en este versículo.
  - «Recompensa» se usa en sentido retributivo, no meramente positivo o comercial.
  - Se conserva el modismo hebreo de la cabeza como lugar de retribución para no perder la simetría judicial del pasaje.
