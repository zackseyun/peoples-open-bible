translation:
  language: es
  text: Y vieron un campamento fuerte de las naciones[a], armado, y caballería que lo rodeaba; estas fuerzas estaban entrenadas para la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fuerte campamento de los gentiles ... con jinetes rodeándolo».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή nombra un campamento o encampamiento de tropas. «Campamento» comunica con naturalidad ese sentido en español sin perder la referencia militar.
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos extranjeros
  lexicon: LSJ
  rationale: «De las naciones» sigue de cerca el griego y evita introducir una terminología más cargada confesionalmente. En 1 Macabeos el referente son pueblos no judíos.
- source_word: ἰσχυρὰν
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - mighty
  lexicon: LSJ
  rationale: «Fuerte» reproduce de manera clara la idea de una fuerza militar formidable sin sobredeterminar la imagen.
- source_word: τεθωρακισμένην
  english_pob_choice: armored
  chosen_spanish: armado
  alternatives_spanish:
  - acorazado
  - equipado con armadura
  lexicon: LSJ
  rationale: El participio perfecto indica que está provisto de armamento/armadura. En español, «armado» funciona naturalmente para un campamento o fuerza militar preparada para combate.
- source_word: ἵππον
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - jinetes
  - tropas de a caballo
  lexicon: LSJ
  rationale: Aunque literalmente relacionado con «caballo», aquí funciona colectivamente como fuerza montada. «Caballería» comunica mejor ese valor militar colectivo en español.
- source_word: κυκλοῦσαν
  english_pob_choice: surrounding
  chosen_spanish: rodeándolo
  alternatives_spanish:
  - circundándolo
  - rodeando
  lexicon: LSJ
  rationale: El participio expresa la disposición de la caballería alrededor del campamento. «Rodeándolo» es claro y mantiene la relación pronominal con el campamento.
- source_word: διδακτοὶ πολέμου
  english_pob_choice: trained for war
  chosen_spanish: entrenados para la guerra
  alternatives_spanish:
  - adiestrados para la guerra
  - instruidos en la guerra
  lexicon: LSJ
  rationale: La frase significa que fueron enseñados o entrenados en el arte de la guerra. «Entrenados para la guerra» preserva el sentido militar directo y resulta idiomático en español.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al coordinar las acciones con «y caballería rodeándolo», en lugar de introducir una relación instrumental explícita. También conserva la elección de «naciones» frente a «gentiles» como opción principal, dejando la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «naciones» como equivalente principal de ἐθνῶν, en continuidad con el audit trail inglés.
  - Se usa «caballería» para el valor colectivo de ἵππον, coherente con la lectura militar del contexto.
  - La coordinación de los participios se refleja con una estructura simple y fluida en español, sin añadir elementos no presentes en el griego.
