translation:
  language: es
  text: Y le dio autoridad para reunir fuerzas, y para fabricar armas, y para ser su aliado, y dijo que los rehenes que estaban en la ciudadela[a] debían ser entregados a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Acra», la ciudadela fortificada en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν ... ἐξουσίαν
  english_pob_choice: gave ... authority
  chosen_spanish: le dio autoridad
  alternatives_spanish:
  - le dio poder
  - le concedió permiso
  lexicon: BDAG
  rationale: ἐξουσία designa aquí una autoridad delegada o concedida en un contexto político-militar. «Autoridad» conserva ese matiz formal mejor que «poder», que en español puede sonar más genérico o físico.
- source_word: συναγαγεῖν δυνάμεις
  english_pob_choice: to gather forces
  chosen_spanish: reunir fuerzas
  alternatives_spanish:
  - agrupar tropas
  - movilizar fuerzas
  lexicon: LSJ
  rationale: δυνάμεις alude a fuerzas militares. «Reunir fuerzas» sigue de cerca la imagen verbal del griego y es natural en español sin perder el sentido militar.
- source_word: κατασκευάζειν ὅπλα
  english_pob_choice: to make weapons
  chosen_spanish: fabricar armas
  alternatives_spanish:
  - preparar armas
  - hacer armas
  lexicon: LSJ
  rationale: κατασκευάζειν puede implicar preparar o producir; con ὅπλα en este contexto, «fabricar armas» expresa bien la provisión o producción de armamento. «Armas» es el equivalente natural de ὅπλα en español.
- source_word: εἶναι αὐτῷ σύμμαχον
  english_pob_choice: for him to be his ally
  chosen_spanish: para ser su aliado
  alternatives_spanish:
  - para que fuera su aliado
  - para aliarse con él
  lexicon: LSJ
  rationale: σύμμαχος significa aliado. La construcción infinitiva se resuelve en español de manera directa con «para ser su aliado», manteniendo la relación concedida por la autoridad mencionada.
- source_word: τὰ ὅμηρα
  english_pob_choice: the hostages
  chosen_spanish: los rehenes
  alternatives_spanish:
  - los hostages
  - las prendas
  lexicon: LSJ
  rationale: ὅμηρα denota rehenes dados como garantía. «Rehenes» es el término claro y fiel en español; «prendas» sería más ambiguo y menos transparente.
- source_word: ἡ ἄκρα
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la Acra
  - la fortaleza
  lexicon: LSJ
  rationale: ἄκρα significa una fortaleza elevada o ciudadela. En español, «ciudadela» transmite el sentido común del sustantivo. La posibilidad específica de la Acra de Jerusalén se preserva en nota.
- source_word: παραδοῦναι
  english_pob_choice: should be handed over
  chosen_spanish: debían ser entregados
  alternatives_spanish:
  - debían ser puestos en manos de él
  - debían ser entregados a él
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la orden o disposición de entrega. «Debían ser entregados» conserva la fuerza directiva en un español idiomático.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete (1909) y mantiene la lectura ya confirmada por el audit trail inglés: autoridad concedida, reunión de fuerzas, fabricación de armas, alianza y entrega de rehenes. Se preserva en nota la alternativa específica «Acra» para ἄκρα, ya que el término puede referirse a la fortaleza de Jerusalén.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usa «rehenes» para ὅμηρα por ser el equivalente jurídico-histórico más transparente en español.
  - «Ciudadela» evita una transliteración innecesaria en el texto principal, pero la nota conserva la identificación histórica posible.
  - La puntuación reproduce la estructura seriada del original con una sola cláusula coordinada final introducida por «y dijo».
