review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura paralela del griego y conserva correctamente el contraste social entre δοῦλος/δεσπότῃ y δημότης/βασιλεῖ. Sin embargo, «recibieron por igual el mismo juicio» debilita el valor pasivo-penal de κολασθείς y suena menos fiel al sentido de castigo padecido. Además, «el común» no es una forma natural ni clara en español para δημότης en este contexto.
  spanish_quality_summary: El texto es comprensible, pero «el común» resulta poco idiomático en español eclesial general, y «recibieron ... el mismo juicio» suena algo forzado. Una redacción más natural y fiel sería «fueron castigados con el mismo juicio» y «el hombre común padeció lo mismo que el rey».
  glossary_alignment: Alinea bien con la guía del proyecto al usar «esclavo» para δοῦλος y «amo» para δεσπότῃ. «Juicio» para δίκη es defendible y está respaldado por la nota, aunque el verbo debe reflejar mejor κολασθείς. No hay conflictos con la terminología teológica principal del proyecto.
  issues:
  - severity: medium
    issue: κολασθείς está subrepresentado por «recibieron»
    rationale: El participio pasivo expresa que fueron castigados/chastised; «recibieron» con «juicio» deja demasiado abstracta la acción penal y pierde fuerza frente al griego y al English POB revisado («were punished»).
  - severity: medium
    issue: «el común» es poco natural para δημότης
    rationale: Aunque intenta preservar el contraste con «el rey», en español contemporáneo neutral «el común» no funciona bien como sustantivo personal. «el hombre común» o «la gente común» comunican mejor la idea de una persona ordinaria.
  revised_spanish_text: Y esclavo y amo fueron castigados con el mismo juicio[a], y el hombre común padeció lo mismo que el rey.
  revised_footnotes:
  - marker: a
    text: O «una pena igual»; el griego δίκη puede significar juicio, castigo o pena según el contexto.
    reason: lexical_alternative
  revision_rationale: Se ajustó el verbo para reflejar mejor el pasivo penal de κολασθείς y se reemplazó «el común» por una expresión natural y clara en español neutral que preserve el contraste social con «el rey». Se mantuvo «juicio» para δίκη con la nota léxica ya documentada.
