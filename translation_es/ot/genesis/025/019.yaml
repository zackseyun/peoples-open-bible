translation:
  language: es
  text: 'Ahora bien, estas son las generaciones de Isaac[a], hijo de Abraham: Abraham engendró a Isaac.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «relato» o «historia familiar» para «generaciones» (hebreo toledot), un término de encabezado recurrente en Génesis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: El hebreo usa ו con un demostrativo para abrir una nueva sección. «Ahora bien» conserva el valor discursivo de transición de manera natural en español, sin perder el carácter de encabezado.
- source_word: תּוֹלְדֹת
  english_pob_choice: generations
  chosen_spanish: generaciones
  alternatives_spanish:
  - relato
  - historia familiar
  - descendencia
  lexicon: HALOT
  rationale: En Génesis, תולדות funciona como término estructural recurrente. «Generaciones» preserva el formato tradicional del encabezado y su amplitud semántica mejor que una paráfrasis más estrecha.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español, sin necesidad de adaptación adicional.
- source_word: בֶּן אַבְרָהָם
  english_pob_choice: son of Abraham
  chosen_spanish: hijo de Abraham
  alternatives_spanish:
  - hijo de Abrahán
  - descendiente de Abraham
  lexicon: HALOT
  rationale: La construcción de parentesco se expresa de forma directa y formal con «hijo de Abraham», que mantiene la identificación genealógica explícita.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - dio origen a
  lexicon: HALOT
  rationale: El hifil de ילד aquí tiene fuerza genealógica de engendrar/father. «Engendró» conserva ese valor formal y preciso en español bíblico, con un registro más digno que una paráfrasis.
- source_word: אֶת יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: a Isaac
  alternatives_spanish:
  - Isaac
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת no se traduce; en español, la preposición «a» hace visible el objeto personal y suena natural en la construcción verbal.
theological_decisions:
- issue: Función literaria de תולדות en Génesis
  english_pob_reading: Translate תולדות with the formal structural term 'generations' rather than a more interpretive paraphrase.
  chosen_spanish_reading: Traducir תולדות con «generaciones», manteniendo el valor de encabezado estructural.
  alternative_spanish_readings:
  - relato
  - historia
  - descendencia
  rationale: La decisión conserva la fórmula recurrente de Génesis y evita reducir el término a solo «descendencia» o ampliar indebidamente a «relato». Así se respeta la estructura literaria del libro.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado auditado de la POB en inglés, pero ajusta el español para que el encabezado genealógico suene natural y mantenga la fuerza estructural del hebreo. No se introdujeron revisiones adicionales respecto del contexto de auditoría más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Isaac» como nombre propio estándar y «Abraham» sin cambios, en coherencia con la tradición bíblica en español.
  - Se prefirió «engendró» por su precisión genealógica y por preservar mejor la densidad del hifil hebreo que opciones más explicativas.
  - La nota al pie queda anclada en «generaciones», porque allí surge la principal alternativa semántica en español.
