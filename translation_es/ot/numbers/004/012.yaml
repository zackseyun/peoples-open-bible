  text: וְ/לָקְחוּ֩ אֶת כָּל כְּלֵ֨י הַ/שָּׁרֵ֜ת אֲשֶׁ֧ר יְשָֽׁרְתוּ בָ֣/ם בַּ/קֹּ֗דֶשׁ וְ/נָֽתְנוּ֙ אֶל בֶּ֣גֶד תְּכֵ֔לֶת וְ/כִסּ֣וּ אוֹתָ֔/ם בְּ/מִכְסֵ֖ה ע֣וֹר תָּ֑חַשׁ וְ/נָתְנ֖וּ עַל הַ/מּֽוֹט־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/012.yaml
  text: Then they shall take all the utensils of service with which they minister in the sanctuary[a], and put them in a blue cloth, and cover them with a covering of fine leather[b], and place them on the carrying frame.
  footnotes:
  - marker: a
    text: Hebrew תָּחַשׁ (tahash) is uncertain; it may refer to a particular animal skin or to a kind of fine or durable leather.
    reason: lexical_alternative
  - marker: b
    text: Or 'place them on the pole.' The Hebrew uses the singular 'pole/bar,' which may stand for the carrying apparatus.
    reason: lexical_alternative
