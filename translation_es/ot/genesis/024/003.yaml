translation:
  language: es
  text: y te haré jurar por Yahvé[a], el Dios de los cielos y el Dios de la tierra, que no tomarás para mi hijo una esposa de entre las hijas de los cananeos, entre quienes habito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por Yahvé». El texto principal sigue la convención del proyecto de verter el nombre divino יְהוָה como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַשְׁבִּיעֲךָ
  english_pob_choice: and I will make you swear
  chosen_spanish: y te haré jurar
  alternatives_spanish:
  - y te pondré bajo juramento
  - y te adjuraré
  lexicon: HALOT
  rationale: 'El hifil de שׁבע es causativo: no describe solo el acto de jurar, sino hacer que otro jure. «Te haré jurar» conserva esa fuerza causal en un español natural y digno.'
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el SEÑOR
  - por Yahvé
  lexicon: HALOT
  rationale: La preposición introduce la fórmula de juramento, y el nombre divino se vierte como «Yahvé» según el criterio del proyecto para יְהוָה, evitando el reemplazo por un título.
- source_word: אֱלֹהֵי הַשָּׁמַיִם וֵאלֹהֵי הָאָרֶץ
  english_pob_choice: the God of heaven and the God of the earth
  chosen_spanish: el Dios de los cielos y el Dios de la tierra
  alternatives_spanish:
  - el Dios del cielo y de la tierra
  - el Dios de los cielos y de la tierra
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de «el Dios de» en ambas expresiones, porque el texto enfatiza el alcance cósmico y no solo una fórmula resumida. «Cielos» mantiene el plural del hebreo.
- source_word: אֲשֶׁר לֹא תִקַּח
  english_pob_choice: that you shall not take
  chosen_spanish: que no tomarás
  alternatives_spanish:
  - que no debes tomar
  - que no hayas de tomar
  lexicon: HALOT
  rationale: Tras una fórmula de juramento, la cláusula expresa el contenido de la obligación. «No tomarás» conserva el valor solemne y jurídico sin sonar arcaico.
- source_word: אִשָּׁה לִבְנִי
  english_pob_choice: a wife for my son
  chosen_spanish: una esposa para mi hijo
  alternatives_spanish:
  - una mujer para mi hijo
  - una esposa para mi hijo
  lexicon: HALOT
  rationale: En contexto matrimonial, אִשָּׁה debe entenderse como «esposa», no como mero «mujer». «Para mi hijo» refleja la relación de destinatario que expresa el hebreo.
- source_word: מִבְּנוֹת הַכְּנַעֲנִי
  english_pob_choice: from the daughters of the Canaanites
  chosen_spanish: de entre las hijas de los cananeos
  alternatives_spanish:
  - de las hijas de los cananeos
  - de entre las mujeres cananeas
  lexicon: HALOT
  rationale: La expresión hebrea idiomática «hijas de» señala mujeres pertenecientes al grupo étnico. «De entre» ayuda a reproducir la selección excluyente del original, y «cananeos» mantiene el referente étnico explícito.
- source_word: אֲשֶׁר אָנֹכִי יוֹשֵׁב בְּקִרְבּוֹ
  english_pob_choice: among whom I dwell
  chosen_spanish: entre quienes habito
  alternatives_spanish:
  - entre quienes vivo
  - en medio de quienes habito
  lexicon: HALOT
  rationale: יֹׁשֵׁב comunica residencia continua; «habito» preserva ese sentido en registro formal. «Entre quienes» reproduce el valor relacional de בְּקִרְבּוֹ sin sobrecargar con una frase más literal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce como «Yahvé» para preservar el nombre de pacto y no ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés y adopta la revisión más reciente de estilo: «habito» comunica mejor la residencia continua que una forma perifrástica como «estoy habitando», manteniendo el valor participial hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «Hijas de los cananeos» se conserva como giro étnico idiomático, no como simple descripción biológica.
  - Se eligió «habito» para reflejar el participio hebreo de residencia continua en un español natural y publicable.
  - Se conserva la repetición de «el Dios de» para no comprimir indebidamente la estructura enfática del hebreo.
