lexical_decisions:
- source_word: שֹׁמּוּ
  english_pob_choice: Be appalled
  chosen_spanish: ¡Espántense!
  alternatives_spanish:
  - Queden asombrados
  - Horrorizaos
  - Queden consternados
  lexicon: HALOT
  rationale: El imperativo plural expresa sobresalto y horror; «espántense» comunica impacto emocional fuerte en un español natural, sin rebajar la intensidad profética.
- source_word: שָׁמַיִם
  english_pob_choice: O heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - ¡oh cielos!
  - cielos del cielo
  - firmamento
  lexicon: HALOT
  rationale: Se mantiene el vocativo plural dirigido a los cielos como testigos. En español, el vocativo puede ir sin «oh» y sigue siendo claro y solemne.
- source_word: עַל זֹאת
  english_pob_choice: at this
  chosen_spanish: por esto
  alternatives_spanish:
  - a causa de esto
  - ante esto
  - por tal cosa
  lexicon: HALOT
  rationale: El hebreo indica la ocasión o motivo de la reacción; «por esto» conserva la referencia deíctica y suena natural con verbos de alarma.
- source_word: וְשַׂעֲרוּ
  english_pob_choice: shudder
  chosen_spanish: tiemblen
  alternatives_spanish:
  - estremézcanse
  - se horrorizen
  - estremezcan
  lexicon: HALOT
  rationale: El verbo puede sugerir estremecimiento o bristling en horror; «tiemblen» reproduce un movimiento físico de temor sin añadir una imagen ajena al texto.
- source_word: חָרְב֥וּ מְאֹ֖ד
  english_pob_choice: be utterly desolate
  chosen_spanish: queden completamente desolados
  alternatives_spanish:
  - queden totalmente devastados
  - queden muy arrasados
  - se sequen del todo
  lexicon: HALOT
  rationale: La secuencia intensificada comunica ruina extrema. «Completamente desolados» preserva el valor metafórico de devastación sin forzar el sentido literal de «secarse» en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino explícito. «Declara Yahvé» reproduce la solemnidad del hebreo y sigue el estándar del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La fuente hebrea usa el nombre pactual directo; por ello se conserva como «Yahvé» en vez de sustituirlo por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
