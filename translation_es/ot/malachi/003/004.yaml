review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: וְעָרְבָה se entiende correctamente como resultado futuro/consecutivo; מִנְחַת se mantiene con amplitud como «ofrenda»; יְהוּדָה וִירוּשָׁלַ͏ִם están bien; y los dos sintagmas temporales preservan el paralelismo de antigüedad. La única mejora necesaria es la preposición con לַיהוָה: en este contexto evaluativo, «agradable a Yahvé» o «aceptable para Yahvé» expresa mejor la relación que «agradable para Yahvé».'
  spanish_quality_summary: El español es claro y digno. «Días de antaño» suena natural y poético. Sin embargo, «será agradable para Yahvé» resulta menos idiomático que «será agradable a Yahvé». Además, conviene simplificar «de Judá y de Jerusalén» a «de Judá y Jerusalén», más fluido sin pérdida de sentido.
  glossary_alignment: Se respeta la política del proyecto al usar «Yahvé» para יהוה y «ofrenda» para מִנְחָה con nota alternativa sobre especificidad cultual. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: Preposición poco idiomática en «será agradable para Yahvé»
    rationale: El hebreo לַיהוָה marca la relación hacia Yahvé; en español, con «agradable», la construcción más natural y precisa es «agradable a Yahvé». «Para Yahvé» no es incorrecto en todos los contextos, pero aquí suena menos directo y menos idiomático.
  - severity: low
    issue: Redundancia estilística en «de Judá y de Jerusalén»
    rationale: La repetición de «de» no distorsiona el sentido, pero «de Judá y Jerusalén» es más natural en español bíblico moderno y conserva igual claridad.
  revised_spanish_text: Entonces la ofrenda de Judá y Jerusalén será agradable a Yahvé[a][b], como en los días de antaño y como en los años antiguos.
