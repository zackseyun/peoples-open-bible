translation:
  language: es
  text: Y tenía ramas fuertes para los cetros de los que gobiernan, y su estatura se elevó entre las ramas densas[a]; se veía en su altura, en la abundancia de sus ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por encima del follaje denso». El hebreo probablemente se refiere a ramas gruesas o a vegetación densa; la traducción tradicional «por encima de las nubes» también es posible, pero parece menos probable en este contexto de la vid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטּוֹת עֹז
  english_pob_choice: strong branches
  chosen_spanish: ramas fuertes
  alternatives_spanish:
  - ramas vigorosas
  - varas fuertes
  - brazos fuertes
  lexicon: HALOT
  rationale: En el contexto de la alegoría de la vid, מַטּוֹת no se traduce de manera mecánica como ‘varas’ si el español perdería la imagen vegetal. ‘Ramas’ preserva el campo botánico, y ‘fuertes’ transmite עֹז como fuerza o vigor.
- source_word: אֶל שִׁבְטֵי מֹשְׁלִים
  english_pob_choice: for rulers’ scepters
  chosen_spanish: para los cetros de los que gobiernan
  alternatives_spanish:
  - para los cetros de los gobernantes
  - de modo apto para cetros de gobernantes
  lexicon: HALOT
  rationale: שֵׁבֶט puede significar ‘vara’, ‘cetro’ o ‘tribu’. Aquí, con מֹשְׁלִים, la idea real es de cetro o vara de mando; ‘los que gobiernan’ conserva el participio hebreo sin convertirlo en un título más rígido de lo que exige el texto. Se usa ‘para’ para reflejar la relación funcional expresada por אֶל sin introducir una paráfrasis excesiva.
- source_word: וַתִּגְבַּהּ קוֹמָתוֹ
  english_pob_choice: and its stature rose high
  chosen_spanish: y su estatura se elevó
  alternatives_spanish:
  - y su altura se alzó
  - y su talla creció
  - y su tronco se hizo alto
  lexicon: HALOT
  rationale: ‘Estatura’ mantiene el matiz de קוֹמָה como altura/porte, y ‘se elevó’ reproduce bien el movimiento verbal sin obligar al español a una construcción más técnica. El sufijo masculino singular se conserva como ‘su’, siguiendo el referente poético del arbusto/vid.
- source_word: עַל בֵּין עֲבֹתִים
  english_pob_choice: among the thick boughs
  chosen_spanish: entre las ramas densas
  alternatives_spanish:
  - entre las ramas espesas
  - entre el follaje denso
  - por encima de las nubes
  lexicon: HALOT
  rationale: El contexto de la vid favorece una referencia botánica. ‘Entre las ramas densas’ sigue de cerca el sentido probable de עֲבֹתִים y evita la lectura tradicional ‘nubes’, que el propio audit trail considera menos probable en este pasaje.
- source_word: וַיֵּרָא
  english_pob_choice: it was seen
  chosen_spanish: se la veía
  alternatives_spanish:
  - era visible
  - se veía
  - aparecía
  lexicon: HALOT
  rationale: El niphal expresa visibilidad/conspicuidad. ‘Se la veía’ suena natural en español y comunica el resultado de su altura sin forzar un sujeto explícito que el verso usa de forma poética.
- source_word: בְגָבְהוֹ
  english_pob_choice: in its height
  chosen_spanish: en su altura
  alternatives_spanish:
  - por su altura
  - en lo alto de ella
  - a causa de su altura
  lexicon: HALOT
  rationale: 'Se conserva el valor descriptivo del hebreo: la vid era visible precisamente por su altura. ‘En su altura’ sigue de cerca el original y es idiomático en español bíblico contemporáneo.'
- source_word: בְּרֹב דָּלִיֹּתָיו
  english_pob_choice: in the abundance of its branches
  chosen_spanish: en la abundancia de sus ramas
  alternatives_spanish:
  - con muchas ramas
  - en la multitud de sus ramas
  - en gran número de sus ramas
  lexicon: HALOT
  rationale: דָּלִיּוֹת son las ramas colgantes o brotes de la vid; ‘ramas’ es la opción española más clara y mantenida en el registro bíblico moderno. ‘Abundancia’ traduce רֹב con precisión y sin exagerar el matiz.
theological_decisions:
- issue: Imagen de la vid y posible lectura de ‘cetros’ versus ‘varas’
  english_pob_reading: The verse uses botanical imagery while evoking rulers’ scepters.
  chosen_spanish_reading: La versión española conserva la imagen botánica y, a la vez, mantiene la referencia real de ‘cetros’ en el ámbito del poder.
  alternative_spanish_readings:
  - ramas para varas de gobernantes
  - ramas fuertes para bastones de mando
  rationale: 'No se debe deshacer la tensión poética del texto: ramas de la vid que sirven para cetros reales. ‘Cetros’ preserva la dimensión regia del hebreo שִׁבְטֵי מֹשְׁלִים sin abandonar la metáfora de la vid.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del auditable inglés POB: se mantuvo ‘for rulers’ scepters’ sin la glosa ‘fit for’, y se respetó la revisión que favorece una relación más directa con el hebreo. La nota de alternativa sobre עֲבֹתִים conserva la tensión interpretativa entre follaje denso y la lectura tradicional de ‘nubes’.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo el registro de alegoría vegetal con ‘ramas’/‘rama(s)’ para evitar calcos demasiado literales como ‘varas’ cuando el contexto pide imagen de vid.
  - Se conservó ‘cetros’ para el campo real de שֵׁבֶט, en coherencia con la decisión inglesa.
  - La puntuación con dos segmentos semicolonizados sigue la cadencia del verso y facilita la lectura pública.
