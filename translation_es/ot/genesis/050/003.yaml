translation:
  language: es
  text: Se le cumplieron cuarenta días, porque así se cumplen los días del embalsamamiento[a]; y Egipto[b] lloró por él setenta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se completan los días del embalsamamiento».'
    reason: alternative_reading
  - marker: b
    text: Hebreo «Egipto», usado colectivamente por los egipcios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלְאוּ לּוֹ
  english_pob_choice: were completed for him
  chosen_spanish: fueron completados para él
  alternatives_spanish:
  - se cumplieron para él
  - se completaron para él
  lexicon: HALOT
  rationale: El verbo מלא expresa aquí la finalización de un período de tiempo. En español, una construcción pasiva conserva el foco en el lapso cumplido, como en el audit trail inglés, aunque 'se cumplieron' también sería posible.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: Forty days
  chosen_spanish: Cuarenta días
  alternatives_spanish:
  - Por cuarenta días
  - Los cuarenta días
  lexicon: HALOT
  rationale: Es una expresión numérica directa; se mantiene el orden natural del español sin añadir matiz ajeno.
- source_word: כִּי כֵּן
  english_pob_choice: for that is how
  chosen_spanish: porque así
  alternatives_spanish:
  - porque de esa manera
  - pues así
  lexicon: HALOT
  rationale: La combinación introduce la explicación del período de cuarenta días. 'Porque así' es breve y natural, y preserva el valor explicativo sin amplificarlo.
- source_word: יִמְלְאוּ יְמֵי הַחֲנֻטִים
  english_pob_choice: the days of embalming are completed
  chosen_spanish: se completan los días del embalsamamiento
  alternatives_spanish:
  - se cumplen los días del embalsamamiento
  - se completan los días del proceso de embalsamar
  lexicon: HALOT
  rationale: חֲנֻטִים se entiende en relación con el embalsamamiento/momificación en el contexto inmediato. 'Embalsamamiento' comunica el proceso de forma clara y bíblica, evitando una literalidad extraña como 'los días de los embalsamados'.
- source_word: וַיִּבְכּוּ אֹתוֹ
  english_pob_choice: wept for him
  chosen_spanish: lo lloró
  alternatives_spanish:
  - lloró por él
  - lo lamentó
  lexicon: HALOT
  rationale: בכה significa 'llorar'. En español, 'lloró por él' sería transparente, pero 'lo lloró' conserva la intensidad del duelo y funciona de manera idiomática en un registro bíblico sobrio.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: Se mantiene el topónimo singular del hebreo, que funciona colectivamente. En español, 'Egipto' preserva esa forma y deja implícita la referencia al pueblo en contexto; no se desambigua a 'los egipcios' sin necesidad textual.
- source_word: שִׁבְעִים יוֹם
  english_pob_choice: seventy days
  chosen_spanish: setenta días
  alternatives_spanish:
  - por setenta días
  - los setenta días
  lexicon: HALOT
  rationale: Expresión numérica directa, conservada en español llano y fiel.
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado y se mantuvo su lectura principal sin cambios relevantes; la única tensión lexical importante es el valor colectivo de 'Egipto' y la formulación del proceso de embalsamamiento, ambas preservadas con notas.
  spanish_consistency_notes:
  - Se usó 'Egipto' de manera consistente como nombre colectivo cuando el hebreo lo emplea así.
  - '''Embalsamamiento'' se eligió para representar חֲנֻטִים con claridad moderna sin perder el proceso funerario aludido.'
  - Se mantuvo un tono bíblico sobrio y una sintaxis directa, cercana a la del texto fuente.
