translation:
  language: ko
  text: 그리고 나는 죽은 자들, 곧 큰 자와 작은 자가 보좌 앞에 서 있는 것을 보았습니다. 그리고 책들이 펼쳐졌고, 또 다른 책이 펼쳐졌는데 그것은 생명책이었습니다. 그리고 죽은 자들은 그 책들에 기록된 것에 따라, 자기들의 행위에 따라 심판을 받았습니다.
  philosophy: optimal-equivalence
