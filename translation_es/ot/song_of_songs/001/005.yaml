    rationale: La nota actual explica 'pero' o 'aunque' como alternativas, pero si el texto principal adopta el contraste, la nota debe preservar 'y hermosa' como alternativa literal del hebreo.
  revised_spanish_text: Morena[a] soy, pero hermosa, hijas de Jerusalén, como las tiendas de Quedar, como las cortinas de Salomón.
