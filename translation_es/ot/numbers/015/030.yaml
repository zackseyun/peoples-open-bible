revisions:
- from: Pero la persona que actúa con mano alzada[a], sea nativo o forastero, está ultrajando a Yahvé, y esa persona será cortada de en medio de su pueblo.
  to: Pero la persona que actúa con mano alzada[a], sea natural del país o residente extranjero, ultraja a Yahvé, y esa persona será cortada de en medio de su pueblo.
  rationale: 'Se mantiene la fidelidad general del borrador, pero se ajusta el contraste legal entre הָאֶזְרָח y הַגֵּר para reflejar mejor el hebreo y el razonamiento del POB: ''natural del país'' / ''residente extranjero'' comunica con más precisión la oposición entre nativo y no nativo residente. También se simplifica ''está ultrajando'' a ''ultraja'' para un tono jurídico más natural en español, sin cambiar el sentido. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: sujeto jurídico impersonal (''la persona''), acción desafiante (''con mano alzada''), inclusión tanto del nativo como del residente no nativo, afrenta contra Yahvé, y la fórmula legal ''ser cortada'' sin resolver su alcance exacto. Sin embargo, dos elecciones debilitan la precisión del contraste legal y del matiz comunitario: ''forastero'' no expresa tan bien como ''residente extranjero'' o ''peregrino'' la categoría jurídica de גֵר, y ''nativo'' queda algo corto frente a ''nacido en el país'' o ''natural de la tierra/comunidad''.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para sonar más natural y exacto en registro bíblico-legal. 'Con mano alzada' funciona bien con nota. 'Está ultrajando a Yahvé' es aceptable, aunque 'ultraja a Yahvé' suena más directo en presente gnómico. 'Será cortada de en medio de su pueblo' es comprensible, pero 'será eliminada de entre su pueblo' sería demasiado interpretativo; conviene conservar 'cortada'. La mejora principal es terminológica en 'forastero'.
  glossary_alignment: 'Se alinea bien con ''Yahvé'' para יהוה y preserva la tensión teológica de ''ser cortada''. No hay conflicto con otras directrices mayores. La principal desviación frente al razonamiento auditado es גֵּר: ''forastero'' tiende a sugerir alguien de paso o ajeno sin el matiz de residencia bajo la ley; ''residente extranjero'' preserva mejor la categoría legal-covenantal. ''Nativo'' es tolerable, pero ''natural del país'' o ''nacido en el país'' haría mejor pareja con ese contraste.'
  issues:
  - severity: medium
    issue: גֵּר se vierte como 'forastero'
    rationale: En este contexto legal, גֵּר no es simplemente alguien de fuera, sino un no nativo residente dentro de la comunidad. 'Forastero' en español latino suele sonar más social o transitorio que jurídico-covenantal.
  - severity: low
    issue: הָאֶזְרָח se vierte como 'nativo'
    rationale: '''Nativo'' no es incorrecto, pero es menos preciso que una formulación que exprese nacimiento dentro de la comunidad/país, especialmente al ir en contraste con גֵּר.'
  - severity: low
    issue: Perífrasis progresiva 'está ultrajando'
    rationale: El hebreo presenta una afirmación legal general; en español bíblico-jurídico el presente simple ('ultraja') suele sonar más directo y proverbial, aunque esto es estilístico más que semántico.
  revised_spanish_text: Pero la persona que actúa con mano alzada[a], sea natural del país o residente extranjero, ultraja a Yahvé, y esa persona será cortada de en medio de su pueblo.
  revised_footnotes:
  - marker: a
    text: O 'presuntuosamente' o 'desafiantemente'; literalmente, 'con mano alzada'.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la fidelidad general del borrador, pero se ajusta el contraste legal entre הָאֶזְרָח y הַגֵּר para reflejar mejor el hebreo y el razonamiento del POB: ''natural del país'' / ''residente extranjero'' comunica con más precisión la oposición entre nativo y no nativo residente. También se simplifica ''está ultrajando'' a ''ultraja'' para un tono jurídico más natural en español, sin cambiar el sentido. No se requiere adjudicación adicional.'
