translation:
  language: es
  text: Él buscará las cosas ocultas de los proverbios[a], y se ocupará de los enigmas de las parábolas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas ocultas». El griego ἀπόκρυφα nombra lo oculto u oscuro en general; no obliga a entender aquí «significado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se moverá entre los enigmas de las parábolas» o «pasará su tiempo entre los enigmas de las parábolas». El verbo griego puede sugerir permanencia o trato habitual dentro de una esfera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόκρυφα
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los ocultos
  - los secretos
  - las obscuridades
  lexicon: LSJ
  rationale: ἀπόκρυφα es sustantivado y nombra aquello que está oculto u oscuro. En español, «las cosas ocultas» reproduce esa referencia concreta sin añadir la interpretación de «significado» que el audit trail inglés descartó en su revisión.
- source_word: παροιμιῶν
  english_pob_choice: of proverbs
  chosen_spanish: de los proverbios
  alternatives_spanish:
  - de los dichos
  - de las máximas
  lexicon: LSJ
  rationale: παροιμία alude de forma directa a proverbios o dichos sapienciales. «Proverbios» es la equivalencia más natural y transparente en español.
- source_word: ἐκζητήσει
  english_pob_choice: will seek out
  chosen_spanish: buscará
  alternatives_spanish:
  - buscará con empeño
  - indagará
  - examinará
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de buscar con diligencia. En español, «buscará» conserva el sentido básico y el contexto ya comunica la seriedad de la acción; añadir «con empeño» sería posible, pero menos sobrio.
- source_word: ἐν αἰνίγμασι
  english_pob_choice: with the riddles
  chosen_spanish: los enigmas
  alternatives_spanish:
  - en los enigmas
  - entre los enigmas
  - con los enigmas
  lexicon: LSJ
  rationale: La preposición ἐν expresa esfera o ámbito de actividad. En español, «se ocupará de los enigmas» comunica esa relación sostenida con naturalidad; «en los enigmas» sonaría menos idiomático aquí.
- source_word: παραβολῶν
  english_pob_choice: of parables
  chosen_spanish: de las parábolas
  alternatives_spanish:
  - de las comparaciones
  - de los dichos figurados
  lexicon: LSJ
  rationale: παραβολή puede abarcar comparación, figura o parábola. «Parábolas» preserva el tono literario sapiencial y es la opción más directa en español.
- source_word: ἀναστραφήσεται
  english_pob_choice: will occupy himself
  chosen_spanish: se ocupará
  alternatives_spanish:
  - andará entre
  - vivirá entre
  - se moverá entre
  lexicon: LSJ
  rationale: El verbo puede sugerir moverse en un ámbito o relacionarse habitualmente con algo, no solo conducta moral. «Se ocupará» expresa participación continua en el ámbito de los enigmas de manera idiomática y fiel.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «hidden things» frente a «hidden meaning» para reflejar ἀπόκρυφα de modo más directo. Por eso el español usa «cosas ocultas» y evita introducir la noción de «significado» de manera no explícita en el griego.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «las cosas ocultas de los proverbios» y «los enigmas de las parábolas».
  - Se evita una traducción demasiado literal de ἐν + dativo que suene extraña en español; la equivalencia elegida conserva el ámbito de actividad.
  - No se introducen términos doctrinales ajenos al pasaje; el verso pertenece a literatura sapiencial y el registro español permanece sobrio y neutro.
