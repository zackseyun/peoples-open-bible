translation:
  language: es
  text: Un caballo sin domar[a] resulta terco[b], y un hijo dejado sin freno resulta obstinado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no domado» o «no sometido» para ἀδάμαστος. La imagen es la de un caballo que no ha sido entrenado ni puesto bajo control.
    reason: lexical_alternative
  - marker: b
    text: Lit. «duro». Aquí σκληρός describe resistencia obstinada de carácter, no dureza física; por eso se traduce «terco».
    reason: lexical_alternative
  - marker: c
    text: El término raro προαλής puede entenderse también como «voluntarioso» o «presuntuoso». «Obstinado» refleja aquí la idea de un impulso adelantado y sin freno en el contexto del proverbio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵππος
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - corcel
  lexicon: LSJ
  rationale: 'El sentido ordinario es un animal de carga o montura: «caballo» es el equivalente natural y transparente en español. «Corcel» suena más elevado y no añade precisión contextual.'
- source_word: ἀδάμαστος
  english_pob_choice: unbroken
  chosen_spanish: no domado
  alternatives_spanish:
  - sin domar
  - no sometido
  - insubyugado
  lexicon: LSJ
  rationale: Para un caballo, el matiz no es solo «salvaje» sino no adiestrado ni sometido al yugo del entrenamiento; «no domado» preserva la imagen de domesticación/entrenamiento mejor que una paráfrasis más general.
- source_word: ἀποβαίνει
  english_pob_choice: turns out
  chosen_spanish: termina siendo
  alternatives_spanish:
  - resulta
  - acaba siendo
  - se muestra
  lexicon: LSJ
  rationale: El verbo expresa el resultado observable de la condición inicial. «Termina siendo» conserva el valor proverbial de desenlace sin forzar una traducción mecánica.
- source_word: σκληρός
  english_pob_choice: stubborn
  chosen_spanish: duro
  alternatives_spanish:
  - terco
  - obstinado
  - duro de trato
  lexicon: LSJ
  rationale: En español, el adjetivo funciona aquí para el carácter resistente/recio del caballo; «duro» mantiene el paralelo con la obstinación, aunque «terco» también sería posible. Se evita «duro» como mera dureza física mediante el contexto proverbial.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  - muchacho
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «hijo», en español «hijo» suena más natural y no pierde el referente masculino implícito del original.
- source_word: ἀνειμένος
  english_pob_choice: left unchecked
  chosen_spanish: dejado sin disciplina
  alternatives_spanish:
  - dejado suelto
  - sin freno
  - sin restricción
  lexicon: LSJ
  rationale: El participio apunta a una falta de sujeción/contención. «Dejado sin disciplina» hace explícita la dimensión pedagógica y parental del proverbio, sin introducir una interpretación ajena al contexto.
- source_word: ἐκβαίνει
  english_pob_choice: turns out
  chosen_spanish: termina siendo
  alternatives_spanish:
  - resulta
  - acaba siendo
  - se vuelve
  lexicon: LSJ
  rationale: Se conserva el paralelismo del primer miembro y el valor de resultado. «Termina siendo» comunica el desenlace caracterológico que el proverbio destaca.
- source_word: προαλής
  english_pob_choice: headstrong
  chosen_spanish: atrevido
  alternatives_spanish:
  - arrogante
  - presuntuoso
  - rebelde
  lexicon: LSJ
  rationale: El término es raro y sugiere una disposición impetuosa, adelantada y difícil de contener. «Atrevido» mantiene la idea de empuje desordenado sin cargar el verso con una connotación moral más fuerte de lo que el contexto exige; se preserva así la tensión entre audacia y falta de control.
theological_decisions:
- issue: Disciplina parental y formación del carácter
  english_pob_reading: A son left unchecked turns out headstrong; the proverb highlights the consequences of lax discipline.
  chosen_spanish_reading: Un hijo dejado sin disciplina termina siendo atrevido.
  alternative_spanish_readings:
  - un hijo sin freno termina siendo rebelde
  - un hijo dejado suelto termina siendo presuntuoso
  rationale: No hay una afirmación doctrinal explícita, pero sí una enseñanza sapiencial sobre la formación del carácter. La traducción mantiene el peso moral del proverbio sin intensificarlo a una condena absoluta.
  doctrine_reference: Sabiduría bíblica / disciplina familiar
- issue: Rareza léxica de προαλής
  english_pob_reading: Possible renderings include 'self-willed' or 'presumptuous'; 'headstrong' chosen for uncontrolled forwardness.
  chosen_spanish_reading: atrevido
  alternative_spanish_readings:
  - presuntuoso
  - rebelde
  - altanero
  rationale: El griego admite varios matices. En español conviene conservar la amplitud semántica sin fijar demasiado pronto un solo valor psicológico. «Atrevido» deja visible la idea de avance sin control y la tensión con la disciplina.
  doctrine_reference: Semántica sapiencial / prudencia interpretativa
translation_notes:
  revision_awareness: 'El texto griego del testimonio base es estable y el control cruzado informa alta concordancia, sin revisiones aplicadas; la propuesta española sigue de cerca el paralelismo del original y conserva las dos zonas léxicas de mayor tensión: ἀδάμαστος y προαλής.'
  spanish_consistency_notes:
  - Se mantiene «hijo» para υἱός conforme al singular masculino del griego.
  - Se evita «SEÑOR» u otras convenciones teológicas no pertinentes, dado que el verso no contiene el nombre divino.
  - Se conserva una estructura paralela breve y proverbial, adecuada al registro sapiencial.
  - Las notas al pie recogen las alternativas léxicas importantes sin saturar el cuerpo del texto.
