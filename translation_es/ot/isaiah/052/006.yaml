- from: 'Por tanto, mi pueblo conocerá mi nombre[a]; por tanto, en aquel día sabrán que yo soy el que habla: Aquí estoy.'
  to: 'Por tanto, mi pueblo conocerá mi nombre[a]; por tanto, en aquel día conocerá que yo soy él, el que habla: Aquí estoy.'
  rationale: Se ajusta la concordancia para mantener el sujeto colectivo singular 'mi pueblo' a lo largo del versículo y se refuerza la autoidentificación enfática de אֲנִי הוּא con 'yo soy él', preservando mejor la decisión léxica y teológica documentada en el inglés. La alternativa más idiomática 'yo soy el que habla' se conserva en nota, como en el POB inglés.
