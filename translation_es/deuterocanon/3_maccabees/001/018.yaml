translation:
  language: es
  text: para que los transgresores no se jacten en su ira[a], ni se regocijen en la arrogancia de su lengua, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Ira’ traduce aquí el matiz intenso de θυμός; la alternativa ‘enojo’ sería menos fuerte. El griego permite un campo semántico que va desde enojo hasta furor.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘en la arrogancia de su lengua’, un giro idiomático para hablar de lenguaje soberbio o insolente.'
    reason: cultural_note
lexical_decisions:
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que ... no
  alternatives_spanish:
  - a fin de que ... no
  - de modo que ... no
  lexicon: LSJ
  rationale: Mantiene el valor final/purposivo del griego con una construcción natural en español.
- source_word: καυχήσωνται
  english_pob_choice: might not boast
  chosen_spanish: se jacten
  alternatives_spanish:
  - se gloríen
  - presuman
  lexicon: BDAG
  rationale: ‘Jactarse’ conserva el matiz de autoexaltación y encaja bien con el tono moral del pasaje.
- source_word: οἱ παράνομοι
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los inicuos
  - los transgresores
  lexicon: LSJ
  rationale: Aunque el griego apunta a quienes actúan contra la ley, en español bíblico ‘impíos’ comunica de forma natural ese grupo contrario a Dios y a su orden; se evita una expresión demasiado jurídica que sonaría artificial en este contexto.
- source_word: ἐν θυμῷ αὐτῶν
  english_pob_choice: in their wrath
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su furia
  - en su enojo
  lexicon: BDAG
  rationale: ‘Ira’ preserva la intensidad del θυμός y permite una lectura solemne y clara. En español cubre el campo de indignación ardiente que el audit trail inglés expresó como ‘wrath.’
- source_word: ἀγαλλιάσωνται
  english_pob_choice: exult
  chosen_spanish: se regocijen
  alternatives_spanish:
  - exulten
  - se alegren intensamente
  lexicon: BDAG
  rationale: ‘Regocijarse’ expresa gozo intenso y mantiene el registro elevado sin sonar tan idiomático-cultista como ‘exultar’ en algunos contextos.
- source_word: ἐν ὑπερηφανίᾳ γλώσσης αὐτῶν
  english_pob_choice: in the arrogance of their tongue
  chosen_spanish: en la arrogancia de su lengua
  alternatives_spanish:
  - en el orgullo de su lengua
  - en la altivez de su habla
  lexicon: LSJ
  rationale: Se conserva la imagen literal de ‘lengua’ para no perder el idiomismo. En español la frase sigue siendo comprensible y refleja el juicio moral sobre la palabra soberbia.
- source_word: λέγοντες
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - al decir
  - mientras decían
  lexicon: BDAG
  rationale: La forma participial introduce la cita siguiente de manera directa y fluida en español.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó θυμός de ‘rage’ a ‘wrath’ por un registro más formal. Por eso el español adopta ‘ira’ en lugar de un término más coloquial, manteniendo la intensidad y el tono elevado del pasaje; el resto de la línea coincide estrechamente con el texto griego y con la auditoría inglesa.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo negativo: ‘para que ... no ... ni ...’ para reflejar ἵνα μὴ ... μηδὲ.'
  - Se mantuvo la imagen de ‘lengua’ en vez de ‘habla’ para respetar la metáfora del original.
  - ‘Impíos’ se eligió como equivalente español natural de οἱ παράνομοι en este contexto, sin borrar la relación con la ley implícita en el griego.
