  to: Pero los hijos de Israel actuaron infielmente respecto de las cosas consagradas a la destrucción[a], porque Acán, hijo de Carmi, hijo de Zabdi, hijo de Zéraj, de la tribu de Judá, tomó algo de las cosas consagradas a la destrucción; y la ira de Yahvé se encendió contra los hijos de Israel.
