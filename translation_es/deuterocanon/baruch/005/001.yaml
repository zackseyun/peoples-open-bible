translation:
  language: es
  text: Quítate, Jerusalén, la vestidura[a] de tu duelo y aflicción, y ponte para siempre el esplendor[b] de la gloria de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la túnica de tu duelo y aflicción».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la belleza de la gloria de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔκδυσαι
  english_pob_choice: Take off
  chosen_spanish: Quítate
  alternatives_spanish:
  - Sácate
  - Desnúdate de
  lexicon: LSJ
  rationale: El imperativo medio de ἐκδύω pide una acción de quitarse una prenda; en español, «quítate» preserva la imagen de vestirse/desvestirse sin sonar áspero. «Desnúdate de» sería más fuerte, pero puede resultar más marcado de lo que exige el contexto.
- source_word: στολή
  english_pob_choice: garment
  chosen_spanish: vestidura
  alternatives_spanish:
  - vestido
  - ropa
  - manto
  lexicon: LSJ
  rationale: «Vestidura» conserva la idea de una prenda singular y relativamente solemne, adecuada al tono profético. Evita reducir el término a una ropa genérica y mantiene el paralelo con «ponte».
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - aflicción
  - tristeza
  lexicon: LSJ
  rationale: El campo semántico apunta al estado de luto por pérdida. «Duelo» funciona bien en español moderno y conserva el matiz ceremonial/afectivo del lamento.
- source_word: κάκωσις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - opresión
  - humillación
  - desventura
  lexicon: LSJ
  rationale: La palabra puede abarcar maltrato, abatimiento o condición miserable. «Aflicción» es suficientemente amplia para no estrechar indebidamente la causa del sufrimiento, como hizo el POB inglés con «affliction».
- source_word: ἔνδυσαι
  english_pob_choice: put on
  chosen_spanish: ponte
  alternatives_spanish:
  - vístete de
  - cúbrete con
  lexicon: LSJ
  rationale: Como contraparte natural de «quítate», «ponte» es idiomático y conserva el mandato de revestirse. Mantiene la metáfora de cambio de ropa sin añadir explicación.
- source_word: εὐπρέπεια
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - belleza
  - hermosura
  - dignidad
  lexicon: LSJ
  rationale: «Esplendor» refleja la dignidad luminosa y elevada del término en contexto; además armoniza con el paralelismo con «gloria».
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: LSJ
  rationale: «Gloria» es la correspondencia directa y estable en español bíblico para δόξα, preservando su peso teológico.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  - que viene de Dios
  lexicon: LSJ
  rationale: La preposición παρά con genitivo expresa origen o procedencia. «De parte de Dios» comunica bien esa procedencia y evita que el español suene como si fuera solo un genitivo posesivo («gloria de Dios»), que podría oscurecer la fuente del don.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para la eternidad
  lexicon: LSJ
  rationale: «Para siempre» transmite la durabilidad permanente del giro griego con naturalidad en español contemporáneo.
theological_decisions:
- issue: Personificación de Jerusalén
  english_pob_reading: Address Jerusalem directly as a woman/city commanded to exchange garments of grief for divine glory.
  chosen_spanish_reading: Dirigir el mandato a Jerusalén en segunda persona, conservando la imagen de una ciudad/persona que se despoja de luto y se reviste de gloria.
  alternative_spanish_readings:
  - Tratar Jerusalén solo como entidad colectiva sin la imagen de vestiduras
  - Parafrasear el verso sin imperativos de vestirse/desvestirse
  rationale: El griego usa imperativos directos y una metáfora corporal clara. Mantener la personificación preserva el vigor profético y la continuidad con el texto fuente.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Origen de la nueva gloria
  english_pob_reading: Render τῆς παρὰ τοῦ θεοῦ δόξης as 'the glory from God,' indicating divine source rather than merely a God-like quality.
  chosen_spanish_reading: Traducir la gloria como procedente de Dios, no como simple cualidad abstracta, mediante «de parte de Dios».
  alternative_spanish_readings:
  - «la gloria de Dios»
  - «la gloria que viene de Dios»
  rationale: La construcción con παρά + genitivo señala procedencia. «De parte de Dios» mantiene visible la fuente del revestimiento nuevo y evita diluir el matiz de don recibido.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Coincide con el último pase de revisión indicado como sin cambios; se mantiene la lectura de alta concordancia con el griego de Swete 1909 y con la opción inglesa 'from God' para παρά + genitivo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa con κύριος.
  - Se usa «gloria» para δόξα y «esplendor» para εὐπρέπεια, evitando colapsar ambos términos en una sola palabra.
  - Se mantiene el paralelismo imperativo de despojarse/revestirse, importante para la imagen profética.
  - La nota b refleja una ambigüedad léxica real de κάκωσις sin imponer una interpretación demasiado concreta.
