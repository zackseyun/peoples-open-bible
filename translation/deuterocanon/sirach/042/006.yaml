translation:
  text: For a bad wife[a], a seal is good; and where hands are slack[c][b], open it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally reads something like 'slack/loose hands' where the Greek parallel has 'many hands.' The Greek-supported sense fits the proverb's warning about shared access and security.
    reason: textual_variant
  - marker: b
    text: The final Hebrew verb appears as 'open,' but the Greek parallel reads 'shut/lock.' The main text follows the clearer sense supported by the parallel source.
    reason: textual_variant
  - marker: c
    text: Or 'a bad woman' in both clauses using the broader sense of the Hebrew and Greek term for 'woman/wife.'
    reason: alternative_reading
lexical_decisions:
- source_word: אשה רעה
  chosen: a bad wife
  alternatives:
  - a wicked woman
  - an evil wife
  - a bad woman
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'a bad/evil woman/wife.' In wisdom literature and household-context sayings, אשה commonly means 'wife.' The Greek parallel has γυναικὶ πονηρᾷ, which can mean either 'woman' or 'wife'; the domestic context of securing property and the traditional reading favor 'wife.' 'Bad' is preferred over 'evil' as more natural modern English and sufficient for רעה here.
- source_word: חותם חסם
  chosen: a seal is good
  alternatives:
  - seal it with a seal
  - a seal—seal it
  - a seal is fitting
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat elliptical. The Greek parallel reads καλὸν σφραγίς, 'a seal is good,' which clarifies the sense. The doubled Hebrew expression with חותם and חסם points to sealing/shutting securely. The English keeps the aphoristic force rather than over-expanding into an imperative not explicit in the Hebrew wording.
- source_word: ומקום
  chosen: and where
  alternatives:
  - and in a place where
  - and wherever
  lexicon: HALOT
  rationale: The conjunction plus noun yields a locative transition. The Greek ὅπου supports a straightforward 'where.'
- source_word: ידים רפות
  chosen: many hands
  alternatives:
  - idle hands
  - slack hands
  - loose hands
  - weak hands
  lexicon: HALOT
  rationale: The Hebrew consonants as given suggest 'slack/loose hands,' but the Greek parallel reads χεῖρες πολλαί, 'many hands,' which gives a coherent proverb about shared access and security. Given the parallel source and the likelihood of textual instability here, 'many hands' is adopted in the main text as the clearer and better-supported sense, while the Hebrew-form alternative is preserved in a footnote.
- source_word: תפתח
  chosen: lock it up
  alternatives:
  - open
  - keep closed
  - shut
  lexicon: HALOT
  rationale: The extant Hebrew form literally looks like 'you will open,' which conflicts with the context and the Greek κλεῖσον, 'shut/lock.' This is best taken as a corrupt or miscopied reading in the Hebrew tradition; the proverb's sense clearly calls for securing access. 'Lock it up' renders the practical force in idiomatic English.
