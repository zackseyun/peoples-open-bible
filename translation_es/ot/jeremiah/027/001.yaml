translation:
  language: es
  text: Al comienzo del reinado de Joacim hijo de Josías, rey de Judá,[a] esta palabra vino a Jeremías de parte de Yahvé,[b] diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes señalan que la referencia a Joacim en este versículo resulta difícil en su contexto, ya que el material circundante apunta a Sedequías (véanse 27:3, 12).
    reason: textual_variant
  - marker: b
    text: 'Hebreo: «de Yahvé». El nombre divino יְהוָה se vierte aquí como «Yahvé», según la política del proyecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֵאשִׁית
  english_pob_choice: At the beginning of
  chosen_spanish: Al comienzo de
  alternatives_spanish:
  - Al inicio de
  - En el principio de
  lexicon: HALOT
  rationale: La frase marca el periodo inicial de un reinado. «Al comienzo de» transmite esa fuerza temporal con naturalidad en español y evita una calca innecesaria.
- source_word: מַמְלֶכֶת
  english_pob_choice: the reign of
  chosen_spanish: el reinado de
  alternatives_spanish:
  - el reino de
  - la realeza de
  lexicon: HALOT
  rationale: En este contexto, el sustantivo señala el periodo del gobierno real, no el territorio. «Reinado» conserva mejor el valor temporal y dinástico.
- source_word: יְהוֹיָקִם
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Jehoiaquim
  - Jehoiakim
  lexicon: N/A (nombre propio)
  rationale: Se usa la forma tradicional española más reconocible y eufónica. No afecta el contenido semántico del nombre propio.
- source_word: בֶּן יֹאושִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - hijo de Josiah
  lexicon: N/A (genealogical formula)
  rationale: La construcción filial se conserva de manera directa. «Josías» es la forma española establecida del nombre.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real más reino. «Rey de Judá» es exacto y natural en español bíblico contemporáneo.
- source_word: הָיָה הַדָּבָר הַזֶּה אֶל
  english_pob_choice: this word came to
  chosen_spanish: esta palabra vino a
  alternatives_spanish:
  - esta palabra llegó a
  - este mensaje vino a
  lexicon: HALOT
  rationale: Se conserva la fórmula profética típica. «Palabra» mantiene el peso revelatorio del hebreo דָּבָר sin suavizarlo a «mensaje».
- source_word: יִרְמְיָה
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: N/A (nombre propio)
  rationale: Forma española estándar del nombre del profeta.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: La política del proyecto pide «Yahvé» para el Tetragrámaton. «De parte de» explicita el valor de procedencia/comisión del hebreo מֵאֵת sin perder la referencia divina.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo[a],
  alternatives_spanish:
  - diciendo,
  lexicon: HALOT
  rationale: Se conserva la introducción a la cita directa porque el versículo siguiente continúa el discurso. El marcador remite a la nota sobre la mención de Yahvé en el hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la norma del proyecto para español, se traduce con «Yahvé» y no con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Possible contextual tension: reference to Jehoiakim in a passage whose surrounding context points to Zedekiah'
  english_pob_reading: Some interpreters note that this verse's reference to Jehoiakim appears difficult in context, since the surrounding material points to Zedekiah (see 27:3, 12).
  chosen_spanish_reading: Se conserva «Joacim» tal como lo da el hebreo; la tensión contextual se deja sin resolver en el texto.
  alternative_spanish_readings:
  - sustituir por Zedequías
  - armonizar el reinado con el contexto
  rationale: El testigo hebreo y el expediente inglés preservan la lectura de Jehoiakim/Joacim. No corresponde corregir el texto en la traducción; la dificultad se documenta aparte si se desea.
  doctrine_reference: Apoyo textual y coherencia audit trail / Jeremiah 27:3, 12
translation_notes:
  revision_awareness: El expediente inglés indica que no hubo cambios en la última revisión y que el juicio general fue de alta concordancia. No se aplicaron revisiones adicionales al producir esta redacción española.
  spanish_consistency_notes:
  - Se mantuvo la fórmula profética «esta palabra vino a» para conservar el paralelismo con el hebreo.
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme a la política del proyecto en español.
  - «Joacim» y «Jeremías» siguen las formas españolas habituales de los nombres propios bíblicos.
  - La puntuación deja abierta la continuación de la cita introducida por «diciendo».
