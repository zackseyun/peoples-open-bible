review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: marco temporal profético, verbo activo «llamarán», imagen de Jerusalén como «el trono de Yahvé», reunión de las naciones, repetición de Jerusalén y cierre sobre la obstinación del corazón. Sin embargo, hay dos desajustes de fidelidad: «se reunirán en ella» cambia el movimiento hacia Jerusalén por una localización interna, y «Ya no andarán más» duplica innecesariamente el valor de עוֹד.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta un detalle de puntuación/espaciado impropio en el anclaje de nota («reunirán [a]») y una nota b mal anclada semánticamente: su contenido explica «trono de Yahvé», pero el marcador está puesto al final sobre «Yahvé». La fluidez mejora con «se reunirán a ella[a]» o «hacia ella[a]» y con «Ya no andarán tras».'
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה y «naciones» para גוים. «Trono» preserva bien כִּסֵּא. La elección «obstinación» para שְׁרִרוּת es adecuada. Conviene alinear mejor la nota cultural con la frase «el trono de Yahvé[b]» y mantener el valor direccional de אֵלֶיהָ / לִירוּשָׁלָם.
  issues:
  - severity: high
    issue: «se reunirán en ella» debilita el sentido direccional del hebreo
    rationale: וְנִקְוּוּ אֵלֶיהָ y la repetición לִירוּשָׁלָם describen movimiento hacia Jerusalén. «En ella» suena estático o locativo; «a ella» o «hacia ella» preserva mejor la convergencia.
  - severity: medium
    issue: «Ya no andarán más» es redundante
    rationale: Tanto «ya no» como «más» expresan la idea de עוֹד. En español bíblico-natural basta «Ya no andarán tras» o «No andarán más tras», pero no ambas a la vez.
  - severity: medium
    issue: La nota b está anclada en un lugar poco preciso
    rationale: La nota explica la imagen completa «el trono de Yahvé», no solo el nombre divino al final de la oración. Debe anclarse junto a esa expresión para mayor claridad.
  - severity: low
    issue: Espaciado del marcador de nota a
    rationale: 'En el formato requerido, el marcador debe ir pegado a la palabra o frase relevante: «ella[a]», no «reunirán [a]».'
