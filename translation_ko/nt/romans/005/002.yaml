id: ROM.5.2
reference: Romans 5:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δι’ οὗ καὶ τὴν προσαγωγὴν ἐσχήκαμεν τῇ πίστει εἰς τὴν χάριν ταύτην ἐν ᾗ ἑστήκαμεν, καὶ καυχώμεθα ἐπ’ ἐλπίδι τῆς δόξης τοῦ θεοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/002.yaml
  text: through whom we also have obtained access by faith into this grace in which we stand[a], and we boast in the hope of the glory of God.
  footnotes:
  - marker: a
    text: Or "rejoice" or "exult".
    reason: lexical_alternative
translation:
  language: ko
  text: 그분을 통해 우리는 또한 믿음으로 우리가 서 있는 이 은혜 안으로 들어가는 통로를 얻었으며, 하나님의 영광을 바라는 소망 안에서 자랑합니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「기뻐합니다」, 「자랑스러워합니다」. 헬라어 καυχάομαι는 부정적 자기 자랑이 아닌 하나님 안에서의 확신에 찬 영광 표시를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαγωγὴν
  english_pob_choice: access
  chosen_korean: 들어가는 통로
  alternatives_korean:
  - 접근
  - 나아감
  lexicon: BDAG
  rationale: 하나님 앞으로 인도되어 들어가는 통로의 이미지를 살리되, 단순 「접근」보다 입장의 사실성을 드러낸다.
- source_word: χάριν
  english_pob_choice: grace
  chosen_korean: 은혜
  lexicon: BDAG
  rationale: 바울 신학의 기본 어휘로 「은혜」 유지.
- source_word: ἑστήκαμεν
  english_pob_choice: we stand
  chosen_korean: 서 있는
  alternatives_korean:
  - 서게 된
  - 견고히 선
  lexicon: BDAG
  rationale: 완료형은 현재의 지속 상태를 함의. 「서 있는」으로 자연스럽게 표현.
- source_word: καυχώμεθα
  english_pob_choice: we boast
  chosen_korean: 자랑합니다
  alternatives_korean:
  - 기뻐합니다
  - 뽐냅니다
  lexicon: BDAG
  rationale: 바울의 의도적 수사적 어휘. 단순 「기뻐」로 약화하지 않고 「자랑」을 유지한다.
- source_word: δόξης τοῦ θεοῦ
  english_pob_choice: the glory of God
  chosen_korean: 하나님의 영광
  lexicon: BDAG
  rationale: 속격 구문을 그대로 옮긴다.
