    rationale: El expediente inglés escogió «Abijah» precisamente frente a una variante más simplificada. En español, una forma más cercana y fiel es «Abías» solo si se opta por tradicionalización, pero aquí eso no está sustentado por el audit trail y desdibuja la forma específica presente en el versículo. Conviene usar «Abiya» como transliteración española cercana al hebreo.
