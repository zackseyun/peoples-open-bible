id: JOS.21.2
reference: Joshua 21:2
source:
  edition: WLC
  text: וַ/יְדַבְּר֨וּ אֲלֵי/הֶ֜ם בְּ/שִׁלֹ֗ה בְּ/אֶ֤רֶץ כְּנַ֨עַן֙ לֵ/אמֹ֔ר יְהוָה֙ צִוָּ֣ה בְ/יַד מֹשֶׁ֔ה לָֽ/תֶת לָ֥/נוּ עָרִ֖ים לָ/שָׁ֑בֶת וּ/מִגְרְשֵׁי/הֶ֖ן לִ/בְהֶמְתֵּֽ/נוּ־־׃
translation:
  text: And they spoke to them at Shiloh in the land of Canaan[a], saying, “Yahweh commanded through Moses to give us cities to dwell in[b], along with their pasturelands for our livestock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'their open land' or 'their common land'; the Hebrew refers to the land around the cities used for grazing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: they spoke
  alternatives:
  - they said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' preserves the narrative wording, while the following לֵאמֹר introduces the content of the speech.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: 'The preposition אֶל with pronominal suffix normally indicates direction toward a person: ''to them.'''
- source_word: בְּשִׁלֹה
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: For a place name of meeting, idiomatic English prefers 'at Shiloh,' though 'in Shiloh' would also be possible.
- source_word: בְּאֶרֶץ כְּנַעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' so it is retained rather than reduced to simply 'in Canaan.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering for the infinitive introducing direct discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave orders
  lexicon: HALOT
  rationale: צוה is the standard verb for commanding; 'commanded' is the most direct and natural rendering.
- source_word: בְיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' often means agency or mediation. 'Through Moses' communicates that Moses was the mediator of the command in clear modern English.
- source_word: לָתֶת לָנוּ
  chosen: to give us
  alternatives:
  - to assign to us
  lexicon: HALOT
  rationale: The infinitive of נתן with indirect object is straightforwardly 'to give us.' 'Assign' is interpretive and unnecessary.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עיר is commonly rendered 'city.' Although some locations may have been small by modern standards, 'cities' matches the Hebrew term and the established land-allotment context.
- source_word: לָשָׁבֶת
  chosen: to live in
  alternatives:
  - to dwell in
  - to inhabit
  lexicon: HALOT
  rationale: 'The infinitive of ישׁב here expresses purpose: cities for residence. ''To live in'' is natural modern English; ''dwell'' is more formal.'
- source_word: וּמִגְרְשֵׁיהֶן
  chosen: along with their pasturelands
  alternatives:
  - and their pasturelands
  - and their common lands
  - and their open lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in this allotment context refers to the open land around a city used for grazing. 'Pasturelands' best conveys the practical sense here.
- source_word: לִבְהֶמְתֵּנוּ
  chosen: for our livestock
  alternatives:
  - for our cattle
  - for our animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to domesticated animals. 'Livestock' is clear, contemporary, and fits the context of pasturelands.
