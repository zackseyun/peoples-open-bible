translation:
  language: es
  text: Matan y son matados, y no quebrantan la palabra del rey; y si salen victoriosos[a], le llevan al rey todo, y también todo lo demás que plotean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «si salen victoriosos».
    reason: alternative_reading
lexical_decisions:
- source_word: φονεύουσιν
  english_pob_choice: they kill
  chosen_spanish: matan
  alternatives_spanish:
  - matan
  - asesinan
  - dan muerte
  lexicon: BDAG
  rationale: En este contexto militar, 'matan' comunica con naturalidad el acto de dar muerte sin añadir la carga jurídica de 'asesinan'. Mantiene el paralelismo con la voz pasiva siguiente.
- source_word: φονεύονται
  english_pob_choice: are killed
  chosen_spanish: son matados
  alternatives_spanish:
  - son muertos
  - son asesinados
  - mueren
  lexicon: BDAG
  rationale: Se conserva la pasiva explícita del griego. 'Son matados' es menos elegante que 'son muertos', pero refleja con más transparencia la acción verbal y el paralelismo con 'matan'.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - orden
  - mandato
  - palabra
  lexicon: BDAG
  rationale: La POB inglesa retuvo 'word' para preservar el giro griego; en español, 'palabra del rey' suena natural y puede abarcar su orden o mandato sin perder la idiomaticidad.
- source_word: οὐ παραβαίνουσιν
  english_pob_choice: do not disobey
  chosen_spanish: no quebrantan
  alternatives_spanish:
  - no desobedecen
  - no transgreden
  - no violan
  lexicon: BDAG
  rationale: '''Quebrantar'' expresa bien la idea de infringir o pasar por alto una orden sin volver la frase demasiado legalista. Evita un calco rígido y conserva el sentido de lealtad al decreto real.'
- source_word: νικήσωσιν
  english_pob_choice: they are victorious
  chosen_spanish: salen victoriosos
  alternatives_spanish:
  - son victoriosos
  - vencen
  - triunfan
  lexicon: BDAG
  rationale: La cláusula condicional requiere una formulación natural en español. 'Salen victoriosos' conserva el matiz formal de victoria sin reducirlo al coloquial 'ganan'.
- source_word: κομίζουσιν
  english_pob_choice: they bring
  chosen_spanish: le llevan al rey
  alternatives_spanish:
  - llevan al rey
  - traen al rey
  - entregan al rey
  lexicon: BDAG
  rationale: El contexto es llevar el botín de vuelta al rey. 'Le llevan al rey' hace explícita la dirección del traslado y evita ambigüedad en español.
- source_word: προνομεύσωσιν
  english_pob_choice: they plunder
  chosen_spanish: plotean
  alternatives_spanish:
  - saquean
  - plotean
  - toman botín
  lexicon: LSJ
  rationale: El verbo griego se refiere a tomar botín en guerra. 'Plotean' no es un equivalente español adecuado; la forma correcta y natural sería 'saquean' o 'toman botín'.
- source_word: τὰ ἄλλα πάντα
  english_pob_choice: all the rest
  chosen_spanish: todo lo demás
  alternatives_spanish:
  - todo lo restante
  - las demás cosas
  - todo lo otro
  lexicon: BDAG
  rationale: La frase suma de manera totalizante lo adicional al botín nombrado. 'Todo lo demás' es la solución más idiomática y completa en español.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y se ajustó el registro al español. El último pase inglés prefirió una forma más formal para la cláusula condicional ('if they are victorious') y reformuló la cola final para reflejar con mayor naturalidad el griego; esta versión española intenta mantener esa formalidad sin perder fluidez. Se evitó un calco excesivo de 'word' y se conservó la pasiva del verbo de muerte.
  spanish_consistency_notes:
  - Se mantuvo un registro moderno y digno, sin usar 'Señor' para βασιλέως.
  - Se prefirió 'palabra del rey' por fidelidad idiomática al giro griego, con el sentido de mandato implícito.
  - La cláusula final se traduce de forma totalizante, incluyendo el complemento adicional del griego.
  - Se preservó la relación entre acción militar, obediencia real y botín sin añadir contenido ajeno al texto.
