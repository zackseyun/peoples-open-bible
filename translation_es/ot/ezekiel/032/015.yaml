translation:
  language: es
  text: Cuando yo haga de la tierra de Egipto una desolación[a], y la tierra quede desolada, vaciada de todo lo que la llena, cuando abata a todos los que habitan en ella, entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la tierra quede arrasada, vaciada de todo lo que la llena».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/תִתִּ/י
  english_pob_choice: When I make
  chosen_spanish: Cuando yo haga
  alternatives_spanish:
  - Cuando yo dé
  - En mi hacer
  lexicon: HALOT
  rationale: 'La construcción con ב + infinitivo funciona temporalmente: «cuando yo haga». En español, «hacer de» expresa de forma natural la causación de un estado resultante, sin perder la fuerza del hebreo.'
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - la tierra, Egipto
  - la tierra egipcia
  lexicon: HALOT
  rationale: La relación de constructo se vierte de forma natural como «la tierra de Egipto». «Tierra» conserva bien el valor geográfico y territorial del término hebreo.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - una ruina
  lexicon: HALOT
  rationale: Se conserva el sustantivo para mantener el valor nominal del hebreo, como en la decisión inglesa de «a desolation».
- source_word: וּ/נְשַׁמָּה
  english_pob_choice: and the land is desolated
  chosen_spanish: y la tierra quede desolada
  alternatives_spanish:
  - y la tierra sea devastada
  - y la tierra quede arrasada
  lexicon: HALOT
  rationale: El hebreo intensifica la idea previa de desolación. En español, «quede desolada» mantiene el estado resultante y evita una repetición innecesaria de sustantivos, sin perder la reiteración semántica.
- source_word: אֶרֶץ מִ/מְּלֹאָ/הּ
  english_pob_choice: the land is stripped of all that fills it
  chosen_spanish: vaciada de todo lo que la llena
  alternatives_spanish:
  - despojada de todo su lleno
  - privada de todo lo que contiene
  lexicon: HALOT
  rationale: La expresión hebrea habla de la tierra «de/por su plenitud». «Vaciada de todo lo que la llena» comunica el sentido idiomático de ser despojada de su contenido, conservando la imagen de vaciamiento.
- source_word: בְּ/הַכּוֹתִ֖/י
  english_pob_choice: when I strike down
  chosen_spanish: cuando hiera
  alternatives_spanish:
  - cuando golpee
  - cuando derribe
  lexicon: HALOT
  rationale: La forma temporal con ב se vierte como «cuando». «Hiera» expresa con sobriedad el golpe punitivo y su fuerza judicial en este contexto.
- source_word: כָּל י֣וֹשְׁבֵי בָ֑/הּ
  english_pob_choice: all who dwell in it
  chosen_spanish: a todos los que habitan en ella
  alternatives_spanish:
  - a todos sus habitantes
  - a todos los que viven en ella
  lexicon: HALOT
  rationale: 'El participio puede traducirse de forma relacional: «los que habitan». Se prefirió «habitan» por su registro digno y claro en español.'
- source_word: וְ/יָדְע֖וּ
  english_pob_choice: then they will know
  chosen_spanish: entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: 'La conjunción marca consecuencia: tras el juicio, el conocimiento resulta de él. «Entonces» explicita esa relación sin añadir contenido ajeno.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma española estable y legible para el nombre propio.'
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el nombre del pacto. La traducción conserva esa referencia personal al nombre divino, evitando la sustitución por un título y manteniendo la coherencia con el criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Repetición de la idea de desolación
  english_pob_reading: a desolation ... the land is desolated
  chosen_spanish_reading: una desolación ... la tierra quede desolada
  alternative_spanish_readings:
  - una ruina ... la tierra sea arrasada
  - un desierto ... la tierra quede vacía
  rationale: El hebreo refuerza la devastación con dos expresiones afines. Se preserva la reiteración mediante «desolación» / «desolada», sin borrar la tensión lexical entre sustantivo y predicado.
  doctrine_reference: Principio de fidelidad semántica y consistencia lexical del POB
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que prefirió mantener la repetición de la familia léxica de desolación en vez de suavizarla con una imagen distinta. En español se conservó esa consistencia: «desolación» / «desolada».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma española del nombre divino, conforme al criterio del proyecto.
  - Se preservó la repetición semántica de desolación para reflejar el paralelismo intensivo del hebreo.
  - 'La sintaxis española intenta seguir la secuencia temporal del original: acción divina, resultado del juicio, conocimiento final.'
