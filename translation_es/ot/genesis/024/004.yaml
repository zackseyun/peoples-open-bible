translation:
  language: es
  text: pero irás a mi tierra y a mis parientes[a], y tomarás esposa para mi hijo Isaac[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מוֹלַדְתִּי puede referirse a los parientes o al lugar de origen. Aquí el contexto favorece la referencia a la familia o clan de Abraham; también podría entenderse como «lugar de origen» o «tierra natal».
    reason: lexical_alternative
  - marker: b
    text: La construcción hebrea también puede expresarse más literalmente como «para mi hijo, para Isaac». La redacción española adopta la forma natural que conserva el mismo referente.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - porque
  - pues
  - sino
  lexicon: HALOT
  rationale: El valor adversativo del hebreo aquí continúa la prohibición del versículo anterior; en español, «pero» comunica con naturalidad esa contraposición sin perder la fuerza directiva del discurso.
- source_word: אֶל אַרְצִי
  english_pob_choice: to my land
  chosen_spanish: a mi tierra
  alternatives_spanish:
  - a mi país
  - a mi tierra natal
  lexicon: HALOT
  rationale: אַרְץ puede referirse a tierra, territorio o país. «Tierra» conserva el sentido geográfico sin introducir una noción moderna de Estado-nación.
- source_word: וְאֶל מוֹלַדְתִּי
  english_pob_choice: and to my kindred
  chosen_spanish: y a mi parentela
  alternatives_spanish:
  - y a mi familia
  - y a mis parientes
  - y a mi linaje
  - y a mi tierra natal
  lexicon: HALOT
  rationale: En este contexto, מוֹלֶדֶת/מוֹלַדְתִּי apunta al grupo de origen o parentesco del que debe provenir la esposa, no solo al lugar de nacimiento. «Parentela» preserva ese matiz colectivo y suena suficientemente formal en español.
- source_word: תֵּלֵךְ
  english_pob_choice: you shall go
  chosen_spanish: irás
  alternatives_spanish:
  - deberás ir
  - tú irás
  - tú deberás ir
  lexicon: HALOT
  rationale: El imperfecto funciona como mandato en discurso directo. «Irás» comunica la fuerza exhortativa/obligatoria con naturalidad en español.
- source_word: וְלָקַחְתָּ אִשָּׁה
  english_pob_choice: and take a wife
  chosen_spanish: y tomarás esposa
  alternatives_spanish:
  - y tomarás una esposa
  - y conseguirás esposa
  - y buscarás esposa
  lexicon: HALOT
  rationale: לקח se traduce de forma básica como «tomar». En contexto matrimonial, «tomar esposa» refleja el hebreo con mayor fidelidad que alternativas más interpretativas.
- source_word: לִבְנִי לְיִצְחָק
  english_pob_choice: for my son Isaac
  chosen_spanish: para mi hijo Isaac
  alternatives_spanish:
  - para mi hijo, Isaac
  - para mi hijo, para Isaac
  - para Isaac, mi hijo
  lexicon: HALOT
  rationale: El hebreo usa una construcción appositiva con preposición repetida; en español, «para mi hijo Isaac» preserva el sentido sin la redundancia que sonaría innecesaria en la lengua meta. Se mantiene el nombre propio en aposición al sustantivo «hijo».
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo, respetando la fuerza adversativa de כִּי, el sentido geográfico de אַרְץ y el matiz de parentesco de מוֹלַדְתִּי. Se tuvo en cuenta la revisión inglesa que prefirió un tono más formal para el término de parentesco; en español se optó por «parentela» por su capacidad de abarcar tanto la idea de clan como la de familia extensa. También se evitó una repetición artificial de la preposición ante Isaac, como permite la sintaxis española.
  spanish_consistency_notes:
  - Se usa «tierra» para אַרֶץ, consistente con el registro bíblico y sin forzar «país».
  - Se evita «SEÑOR» o equivalentes por no aparecer el Tetragrámaton en este versículo.
  - «Esposa» mantiene el valor marital específico de אִשָּׁה en este contexto.
  - «Tomarás» conserva el verbo básico de לקח sin añadir matices no presentes en el hebreo.
