translation:
  language: es
  text: 'Los gobernantes del país[b] lo recibieron con alegría[a]; le dijeron: «Bendito sea tu camino[c]. Vengan, entren en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salieron a recibirlo con alegría»; el griego expresa un encuentro o acogida jubilosa.
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra»; también puede entenderse más ampliamente como «de la tierra/el mundo», pero aquí el sentido local-político encaja mejor en el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «Bienvenido sea tu camino»; el adjetivo griego también puede expresar algo favorable o deseado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπάντησαν
  english_pob_choice: met
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo encontraron
  - salieron a recibirlo
  lexicon: LSJ
  rationale: El verbo expresa encuentro o recepción. En este contexto de bienvenida oficial, «lo recibieron» comunica el matiz de acogida mejor que un mero «lo encontraron».
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los líderes
  - los príncipes
  lexicon: LSJ
  rationale: ἄρχοντες remite a autoridades dirigentes. «Gobernantes» conserva con claridad el peso político del término en español.
- source_word: τῆς γῆς
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  lexicon: LSJ
  rationale: La frase puede entenderse como «de la tierra» o, en sentido más local, como «del país/territorio». Aquí «de la tierra» mantiene la amplitud del griego sin forzar una interpretación más restringida.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  lexicon: LSJ
  rationale: La expresión indica la manera del recibimiento. «Con alegría» es natural en español y preserva el sentido de χαρᾶς.
- source_word: Εὐκτὴ
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bienvenido
  - Dichoso
  lexicon: LSJ
  rationale: Εὐκτή significa algo deseado, propicio o agradable. Dado que califica «tu camino», «Bendito» conserva la fórmula de elogio y evita introducir «prosperidad», que sería más fuerte que el griego.
- source_word: ἡ ὁδός σου
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu ruta
  - tu senda
  lexicon: LSJ
  rationale: ὁδός puede ser camino, ruta o manera. «Tu camino» mantiene el alcance semántico y suena natural en español bíblico contemporáneo.
- source_word: δεῦτε
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Venid
  lexicon: LSJ
  rationale: Es una invitación imperativa. En español, «Ven» reproduce la brevedad y cercanía del griego.
- source_word: εἰσέλθατε
  english_pob_choice: enter
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  - entra adentro
  lexicon: LSJ
  rationale: El imperativo significa entrar. «Entra» resulta natural y fiel; se mantiene el paralelismo con la invitación anterior.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: LSJ
  rationale: La expresión indica una entrada pacífica o segura. «En paz» es la correspondencia más idiomática y clara en español.
theological_decisions:
- issue: Fórmula de aclamación sobre el camino
  english_pob_reading: Blessed is your way / Welcome is your way / Prosperous is your way
  chosen_spanish_reading: Bendito sea tu camino
  alternative_spanish_readings:
  - Bienvenido sea tu camino
  - Próspero sea tu camino
  rationale: El griego Εὐκτή expresa algo deseado o favorable. «Bendito sea tu camino» conserva la fuerza de aclamación sin convertir el adjetivo en una promesa de prosperidad material, que el texto no exige.
  doctrine_reference: No doctrinal issue; lexical-theological nuance of blessing and welcome
translation_notes:
  revision_awareness: Se tomó en cuenta el historial de revisión inglés que corrigió la primera idea de «prosperous/welcome» hacia una valoración más precisa de Εὐκτή. Por eso el español evita «próspero» y opta por una fórmula de bendición/aclamación. También se respetó el cierre del dicho con puntuación final.
  spanish_consistency_notes:
  - Se mantiene un español bíblico contemporáneo, claro y digno.
  - Se evita «SEÑOR» porque no hay aquí representación del nombre divino.
  - Se conserva la secuencia de saludo/invitación en dos miembros paralelos.
  - El registro de «Bendito sea» busca corresponder al tono aclamatorio del griego sin sobrerreligiosizar el término.
