translation:
  language: es
  text: 'Los hijos de Rubén, el primogénito de Israel, según sus generaciones, según sus clanes, según las casas de sus padres, conforme al número de nombres, cabeza por cabeza[a], todo varón desde los veinte años en adelante, todo el que sale a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «por sus cráneos/cabezas»; es un modismo que significa que cada individuo fue contado por separado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי רְאוּבֵן
  english_pob_choice: The sons of Reuben
  chosen_spanish: Los hijos de Rubén
  alternatives_spanish:
  - Los descendientes de Rubén
  lexicon: HALOT
  rationale: «Hijos» reproduce con transparencia בנים y encaja en el registro genealógico-tribal del pasaje. «Descendientes» sería posible, pero suaviza la relación textual directa.
- source_word: בְּכֹר יִשְׂרָאֵל
  english_pob_choice: the firstborn of Israel
  chosen_spanish: el primogénito de Israel
  alternatives_spanish:
  - el primero nacido de Israel
  - el primogénito de Israel, Israel
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor de título aplicado a Rubén y refleja bien la relación appositiva. Se prefiere sobre una paráfrasis más explicativa para no perder la fórmula tradicional y el matiz genealógico.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - conforme a sus generaciones
  lexicon: HALOT
  rationale: En contexto censal y genealógico, la frase ordena la enumeración por linajes o descendencia. «Según» mantiene la función organizadora sin forzar una idea documental ajena al hebreo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: «Clan» distingue bien מִשְׁפָּחָה del nivel superior «casas de sus padres» y refleja la estructura tribal del texto.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según las casas de sus padres
  alternatives_spanish:
  - según sus casas paternas
  - según las casas de sus antepasados
  lexicon: HALOT
  rationale: La expresión técnica se conserva de modo bastante literal para respetar la organización tribal del censo. «Casas de sus padres» es claro y auditable en español.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: conforme al número de nombres
  alternatives_spanish:
  - según el número de nombres
  - por el número de nombres
  lexicon: HALOT
  rationale: La frase alude al conteo de individuos inscritos por nombre. «Conforme a» mantiene el valor administrativo/formal del hebreo sin añadir explicaciones ajenas al texto.
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: head by head
  chosen_spanish: cabeza por cabeza
  alternatives_spanish:
  - uno por uno
  - por cabezas
  - individualmente
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «cabeza/cuellos» para reflejar el hebreo idiomático de conteo individual. «Cabeza por cabeza» suena natural en español y mantiene la tensión literal del original.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada varón
  lexicon: HALOT
  rationale: «Varón» reproduce el rasgo sexual explícito del hebreo y evita sustituirlo por un término más social o genérico.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - de veinte años para arriba
  - desde los veinte años o más
  lexicon: HALOT
  rationale: La fórmula fija de edad para servicio militar se expresa en español con naturalidad sin perder el valor idiomático de avance/umbral.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: everyone going out to war
  chosen_spanish: todo el que sale a la guerra
  alternatives_spanish:
  - todo el que sale al ejército
  - todo el que va a la guerra
  - todos los que salen a la guerra
  lexicon: HALOT
  rationale: Se mantiene el verbo de movimiento «sale» para conservar la cercanía al hebreo y al mismo tiempo hacer explícito en español el sentido militar del censo.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó el cierre desde «able to go out to war» a «going out to war» para acercarse más al hebreo. La versión española sigue esa decisión con «todo el que sale a la guerra», manteniendo el valor funcional del participio sin introducir capacidad modal que el texto no explicita.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el hebreo divino aparece en el versículo; aquí no aplica.
  - Se mantiene «primogénito» como término técnico de estatus, no como simple prioridad temporal.
  - La serie preposicional «según... según... según...» refleja la estructura escalonada del hebreo y ayuda a la lectura censal.
  - «Cabeza por cabeza» preserva la imagen idiomática documentada por la tradición de traducción del pasaje.
