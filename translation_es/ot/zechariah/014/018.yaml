base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/018.yaml
  text: And if the family of Egypt does not go up and does not come[c][b][a], then the plague will not be upon them—the plague with which Yahweh strikes the nations that do not go up to celebrate the Feast of Booths.
  footnotes:
  - marker: a
    text: Or, more literally, 'and does not come.' The Hebrew uses both 'go up' and 'come,' likely reinforcing the idea of pilgrimage to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text reads 'the plague will not be upon them—the plague with which the LORD strikes the nations.' This is difficult in context because the previous verse speaks of no rain; many understand Egypt to receive a plague instead, since it does not depend on rainfall in the same way.
    reason: alternative_reading
  - marker: c
    text: Traditionally, 'the Feast of Tabernacles.'
    reason: lexical_alternative
