base_translation:
  language: en
  yaml_path: translation/ot/genesis/012/005.yaml
  text: Abram took Sarai his wife[a], and Lot his brother’s son, and all their possessions that they had acquired, and the people whom they had acquired in Haran; and they set out to go to the land of Canaan[b], and they came to the land of Canaan.
  footnotes:
  - marker: a
    text: Or 'the persons they had acquired,' or more literally, 'the souls they had made' in Haran. The Hebrew idiom likely refers to members of the household gathered or obtained there.
    reason: lexical_alternative
  - marker: b
    text: Or 'they set out to go'.
    reason: previous_rendering
