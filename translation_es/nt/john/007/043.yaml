lexical_decisions:
- source_word: σχίσμα
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - cisma
  - ruptura
  lexicon: BDAG
  rationale: σχίσμα nombra una separación o fractura entre personas; «división» comunica bien la ruptura social en un español actual y evita el tecnicismo eclesiástico de «cisma», que aquí sería demasiado especializado.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: οὖν introduce una consecuencia narrativa o inferencial; «Así que» conserva ese valor de resultado con fluidez natural en español.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - surgió
  - se produjo
  lexicon: BDAG
  rationale: Con σχίσμα como sujeto, γίνομαι expresa que esa división llegó a existir. «Hubo» es la forma española más natural y sobria para este giro.
- source_word: ἐν τῷ ὄχλῳ
  english_pob_choice: in the crowd
  chosen_spanish: entre la multitud
  alternatives_spanish:
  - en la multitud
  - entre el gentío
  lexicon: BDAG
  rationale: ὄχλος se refiere aquí al grupo reunido de personas. «Entre la multitud» refleja mejor la idea de división interna dentro del grupo que un simple «en la multitud».
- source_word: δι’ αὐτόν
  english_pob_choice: because of him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a causa de él
  - debido a él
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por causa de él» mantiene ese valor causal de forma clara y bíblica en español, sin perder precisión.
theological_decisions:
- issue: Referente de αὐτόν
  english_pob_reading: him = Jesus
  chosen_spanish_reading: él = Jesús
  alternative_spanish_readings:
  - él
  rationale: El antecedente en el contexto es Jesús. No hace falta nombrarlo en el texto principal, pero el español deja intacto el referente pronominal.
  doctrine_reference: Preservar el referente contextual sin explicitarlo innecesariamente
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no hay cambios de sentido ni necesidad de ajustes textuales respecto al consenso auditado; se mantiene la lectura de resultado/consecuencia y el referente contextual de «él».'
  spanish_consistency_notes:
  - Se usa «división» para σχίσμα, evitando «cisma» por su carga eclesiástica especializada.
  - Se conserva «por causa de él» para mantener la relación causal explícita de δι’ αὐτόν.
  - La nota al pie sobre «multitud» preserva la alternativa semántica de ὄχλος sin recargar el texto principal.
