review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en gran parte del sentido: «me hizo jurar», «en mi sepulcro… allí me sepultarás» y la nota sobre «cavé» reflejan bien el hebreo y la auditoría inglesa. Sin embargo, falla de manera significativa en אֶעֱלֶה נָּא וְאֶקְבְּרָה, porque el texto español dice «te ruego que subas y sepultes a mi padre», cambiando el sujeto de la acción: en hebreo José pide permiso para subir él mismo y sepultar a su padre, no le pide al destinatario que suba y lo sepulte.'
  spanish_quality_summary: 'El español es en general claro y digno, pero la cláusula de petición suena incorrecta por el cambio de sujeto y por una construcción poco natural en contexto. También «Mira» es posible para הִנֵּה, pero en este registro «He aquí» o «Mira» ambos son defendibles; no exige cambio. Conviene reparar la petición con una formulación natural y fiel: «te ruego que me permitas subir para sepultar a mi padre; luego volveré».'
  glossary_alignment: 'No hay términos teológicos problemáticos en este versículo. El léxico funerario («sepulcro», «sepultar») es adecuado. La nota léxica debe conservar la alternativa documentada del inglés: además de «cavé para mí», conviene reflejar «o “lo labré para mí” / “lo excavé para mí”», porque la nota inglesa preserva la posibilidad de un contexto de tumba preparada más ampliamente, no solo repetir la lectura principal.'
  issues:
  - severity: high
    issue: Cambio de sujeto en «te ruego que subas y sepultes a mi padre»
    rationale: אֶעֱלֶה נָּא וְאֶקְבְּרָה expresa la petición de José de subir él y sepultar él a su padre. El borrador convierte al interlocutor en sujeto de «subas» y «sepultes», alterando el sentido básico del texto.
  - severity: medium
    issue: La formulación de la petición no representa bien el valor de permiso implícito
    rationale: 'La auditoría inglesa explicó correctamente que, por tratarse de una solicitud al faraón, el cohortativo requiere en español una idea de permiso: «permíteme subir» o equivalente. El borrador no lo refleja.'
  - severity: low
    issue: La nota al pie no preserva con precisión la alternativa documentada
    rationale: La nota actual repite prácticamente la lectura principal («cavé para mí») en vez de ofrecer una alternativa útil como «lo excavé/labré para mí», manteniendo la explicación de que el verbo literalmente significa «cavar» pero puede abarcar preparar una tumba.
  revised_spanish_text: 'Mi padre me hizo jurar[a], diciendo: «Mira, yo estoy muriendo. En mi sepulcro que cavé para mí en la tierra de Canaán, allí me sepultarás». Ahora, pues, te ruego que me permitas subir para sepultar a mi padre; luego volveré.'
  revised_footnotes:
  - marker: a
    text: O «lo labré para mí». El verbo hebreo literalmente significa «cavar», aunque en contextos funerarios puede referirse más ampliamente a preparar una tumba.
    reason: lexical_alternative
