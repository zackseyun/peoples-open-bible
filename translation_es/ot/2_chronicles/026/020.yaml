translation:
  language: es
  text: Azarías, el sacerdote principal, se volvió hacia él, y también todos los sacerdotes; y he aquí, estaba leproso[a] en su frente. Entonces lo apresuraron a salir de allí, y él mismo también se dio prisa para salir[c][b], porque Yahvé lo había herido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Leproso» traduce un término hebreo usado en las leyes sacerdotales de impureza para una afección grave de la piel; no corresponde necesariamente de manera exacta a la lepra médica moderna.
    reason: cultural_note
  - marker: b
    text: 'O: «lo expulsaron de allí». El verbo hebreo puede expresar una retirada urgente, con matiz de acción enérgica de los sacerdotes o de la prisa del momento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fue impulsado a salir». El hebreo puede destacar que fue empujado hacia la salida, aunque en el contexto probablemente significa que él mismo se apresuró a salir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן אֵלָיו
  english_pob_choice: turned toward him
  chosen_spanish: se volvió hacia él
  alternatives_spanish:
  - se giró hacia él
  - volvió el rostro hacia él
  - se volvió a él
  lexicon: HALOT
  rationale: פנה indica un giro o vuelta de orientación hacia una persona. En español, 'se volvió hacia él' expresa bien la reorientación física sin sonar forzado.
- source_word: עֲזַרְיָהוּ כֹהֵן הָרֹאשׁ
  english_pob_choice: Azariah the chief priest
  chosen_spanish: Azarías, el sacerdote principal
  alternatives_spanish:
  - Azarías, el sumo sacerdote
  - Azarías, el sacerdote jefe
  lexicon: HALOT
  rationale: כֹהֵן הָרֹאשׁ es literalmente 'sacerdote de cabeza' / 'principal'. 'Sacerdote principal' preserva el valor del hebreo sin importar el título técnico 'sumo sacerdote', que el texto no usa explícitamente.
- source_word: וְכָל הַכֹּהֲנִים
  english_pob_choice: and all the priests also
  chosen_spanish: y con él también todos los sacerdotes
  alternatives_spanish:
  - y todos los sacerdotes también
  - y todos los sacerdotes
  lexicon: HALOT
  rationale: La construcción añade al resto de los sacerdotes a la acción de Azarías. 'Con él también' refleja esa adición de manera natural en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: '''He aquí'' conserva el giro narrativo súbito y solemne del hebreo sin perder fluidez en español.'
- source_word: מְצֹרָע
  english_pob_choice: leprous
  chosen_spanish: leproso
  alternatives_spanish:
  - afectado por una afección cutánea
  - con lepra
  lexicon: HALOT
  rationale: '''Leproso'' mantiene la terminología tradicional del pasaje y la vinculación con el lenguaje sacerdotal de impureza; se evita una paráfrasis que diluya el término del hebreo.'
- source_word: בְּמִצְחוֹ
  english_pob_choice: on his forehead
  chosen_spanish: en su frente
  alternatives_spanish:
  - sobre su frente
  - en la frente
  lexicon: HALOT
  rationale: En español, 'en su frente' es la forma más directa y natural para indicar la localización visible del signo.
- source_word: וַיַּבְהִלֻהוּ מִשָּׁם
  english_pob_choice: they hurried him out of there
  chosen_spanish: lo apresuraron a salir de allí
  alternatives_spanish:
  - lo sacaron apresuradamente de allí
  - lo hicieron salir de allí con premura
  - lo expulsaron de allí
  lexicon: HALOT
  rationale: בהל en hifil expresa causar prisa o urgencia. 'Lo apresuraron a salir de allí' reproduce esa fuerza sin exagerar necesariamente una expulsión violenta.
- source_word: וְגַם הוּא נִדְחַף לָצֵאת
  english_pob_choice: and he himself also hastened to go out
  chosen_spanish: y él mismo también se dio prisa para salir
  alternatives_spanish:
  - y él también fue impulsado a salir
  - y él mismo también fue apremiado a salir
  lexicon: HALOT
  rationale: El hebreo subraya que él mismo participa en la retirada urgente. 'Se dio prisa para salir' comunica esa idea de modo claro, manteniendo la posible tensión con un matiz pasivo más fuerte que el contexto atenúa.
- source_word: כִּי נִגְּעוֹ יְהוָה
  english_pob_choice: because Yahweh had struck him
  chosen_spanish: porque Yahvé lo había herido
  alternatives_spanish:
  - porque Yahvé lo había golpeado
  - porque Yahvé lo había afligido
  - porque Yahvé lo había castigado
  lexicon: HALOT
  rationale: נגע aquí expresa una acción divina punitiva. 'Había herido' es una manera natural y fiel de conservar el sentido de golpe/aflicción sin suavizar el juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la transliteración del nombre divino por consistencia con la política del proyecto, en lugar de sustituirla por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La forma española del proyecto es 'Yahvé', que conserva el nombre propio de Dios en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Alcance de כֹהֵן הָרֹאשׁ
  english_pob_reading: chief priest
  chosen_spanish_reading: sacerdote principal
  alternative_spanish_readings:
  - sumo sacerdote
  - sacerdote jefe
  rationale: La frase hebrea dice literalmente 'sacerdote principal' o 'de cabeza'. 'Sumo sacerdote' introduciría un tecnicismo más fuerte que el presente en el hebreo de este verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de מְצֹרָע
  english_pob_reading: leprous
  chosen_spanish_reading: leproso
  alternative_spanish_readings:
  - afectado por una afección cutánea
  - con lepra
  rationale: Se conserva el lenguaje tradicional del contexto sacerdotal, sin forzar una equivalencia médica moderna estricta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, lexical note on impurity terms
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto del sentido base del texto hebreo y de la lectura inglesa POB; se ha ajustado únicamente la forma española para claridad, naturalidad y consistencia terminológica.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'sacerdote principal' para כֹהֵן הָרֹאשׁ, evitando 'sumo sacerdote' salvo evidencia textual específica.
  - '''Leproso'' mantiene la terminología cultual tradicional del pasaje.'
  - Las notas a pie preservan la doble posibilidad del hebreo en la salida urgente.
