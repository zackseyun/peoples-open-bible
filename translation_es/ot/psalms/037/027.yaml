translation:
  language: es
  text: Apártate del mal y haz el bien[a], y habita para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien, a la luz del tema recurrente del salmo: «y habita en la tierra para siempre» o «y vive seguro para siempre». El hebreo aquí no dice explícitamente «en la tierra».'
    reason: alternative_reading
lexical_decisions:
- source_word: סוּר
  english_pob_choice: Turn away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Aléjate
  - Desvía tu camino
  - Apártate de
  lexicon: HALOT
  rationale: El verbo expresa apartarse, desviarse o retirarse de algo. En español, «apártate» comunica de modo natural la fuerza volitiva del mandato y mantiene la idea de separación moral sin volverse demasiado literal o torpe.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - de la maldad
  - de lo que es malo
  lexicon: HALOT
  rationale: En este contexto ético, רָע se entiende mejor como «mal». «Del mal» conserva la relación preposicional y la carga moral del término, de manera más idiomática que una paráfrasis explicativa.
- source_word: וַעֲשֵׂה טוֹב
  english_pob_choice: and do good
  chosen_spanish: y haz el bien
  alternatives_spanish:
  - y practica el bien
  - y obra el bien
  - y haz lo bueno
  lexicon: HALOT
  rationale: La forma imperativa más natural en español es «haz el bien». Mantiene el paralelismo breve con el primer mandato y traduce טוֹב como sustantivo ético, no meramente como adjetivo abstracto.
- source_word: וּשְׁכֹן
  english_pob_choice: and dwell
  chosen_spanish: y habita
  alternatives_spanish:
  - y mora
  - y vive
  - y permanece
  lexicon: HALOT
  rationale: שׁכן expresa residir, habitar o establecerse. «Habita» conserva mejor que «vive» la idea de residencia estable, y «permanece» perdería el matiz espacial del verbo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para la era
  lexicon: HALOT
  rationale: עוֹלָם suele indicar duración indefinida o perdurable. «Para siempre» es la equivalencia más natural en español bíblico moderno y mantiene la concisión del hebreo.
theological_decisions:
- issue: Posible objeto implícito en «y habita para siempre»
  english_pob_reading: Render the clause directly as 'and dwell forever' without expanding the implied object; note the contextual possibility of 'dwell in the land forever.'
  chosen_spanish_reading: Traducir directamente «y habita para siempre», sin añadir «en la tierra» al texto principal.
  alternative_spanish_readings:
  - y habita en la tierra para siempre
  - y vivirás seguro para siempre
  - y permanece para siempre
  rationale: El hebreo no expresa explícitamente un objeto locativo en este versículo. Aunque el contexto del Salmo 37 sugiere la permanencia en la tierra y la seguridad duradera, incorporarlo al texto principal iría más allá de lo dicho. Por eso se conserva la formulación breve, dejando la expansión contextual para una nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión disponible indica que no hubo cambios respecto del último pase; por tanto, este borrador sigue de cerca la lectura aprobada y conserva la decisión principal de no explicitar el objeto locativo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - Se usa «habita» para conservar el valor de residencia estable de שׁכן.
  - Se evita «señor» o «mora» porque no reflejan con la misma claridad la forma verbal y el registro poético del hebreo.
  - La nota [a] preserva la tensión documental entre la lectura directa del hebreo y la lectura contextual del Salmo 37.
