translation:
  language: es
  text: 'Entonces Jonatán dijo a David: «Ven, y salgamos al campo». Así salieron ambos al campo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» comunica esa secuencia de manera natural en español sin perder el valor discursivo del hebreo.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española corriente del nombre propio, transparente para lectura eclesial en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional normal en español es «a»; expresa adecuadamente el movimiento de habla dirigido a David.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio estándar en español.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Vete
  lexicon: HALOT
  rationale: Aunque el hebreo admite literalmente «ve», en este contexto invitacional la forma española natural es «ven», porque Jonatán llama a David a acompañarlo.
- source_word: וְנֵצֵא
  english_pob_choice: and let us go out
  chosen_spanish: y salgamos
  alternatives_spanish:
  - y vamos a salir
  - y salimos
  lexicon: HALOT
  rationale: El cohortativo expresa propuesta/invitación; «salgamos» conserva esa fuerza volitiva de manera clara en español.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo abierto
  - el terreno
  lexicon: HALOT
  rationale: «שָׂדֶה» puede ser «campo» en español; aquí la escena narrativa pide un lugar abierto fuera, y «campo» mantiene la repetición del término sin sonar forzado.
- source_word: וַיֵּצְאוּ
  english_pob_choice: So ... went out
  chosen_spanish: Así salieron
  alternatives_spanish:
  - Y salieron
  - Entonces salieron
  lexicon: HALOT
  rationale: La waw narrativa introduce el resultado de la invitación; «Así» comunica bien la consecuencia inmediata en español.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: HALOT
  rationale: «שְׁנֵיהֶם» enfatiza la pareja formada por Jonatán y David; «ambos» es idiomático y preserva el énfasis conjunto.
- source_word: הַשָּׂדֶה
  english_pob_choice: into the field
  chosen_spanish: al campo
  alternatives_spanish:
  - en el campo
  - hacia el campo
  lexicon: HALOT
  rationale: Con un verbo de salida, el español natural es «al campo» para expresar el destino del movimiento; la repetición del lugar se conserva.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran un verso narrativo directo sin variantes textuales significativas ni decisiones doctrinales. La versión española sigue de cerca la secuencia y la invitación implícita del cohortativo, manteniendo la repetición de «campo» sin sobreinterpretación.
  spanish_consistency_notes:
  - Se usa «Jonatán» para el nombre propio, conforme al uso bíblico en español.
  - Se evita una calca como «ve, y vayamos» porque el contexto de invitación hace más natural «ven, y salgamos».
  - Se mantiene la repetición de «campo» para reflejar la insistencia del hebreo.
  - No se añaden notas de pie porque no hay alternativa textual ni ambigüedad teológica relevante que requiera anclaje.
