translation:
  language: es
  text: 'Artajerjes, rey de reyes, a Esdras el sacerdote, escriba de la ley[a] del Dios de los cielos: paz completa[b]. Y ahora—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escriba del decreto del Dios de los cielos», si דָּתָא se toma en el sentido administrativo más amplio de «decreto» y no de «ley».
    reason: lexical_alternative
  - marker: b
    text: La fórmula aramea es epistolar; también puede entenderse como «paz perfecta» o, de manera más idiomática, «saludos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֨רְתַּחְשַׁ֔סְתְּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjeses
  lexicon: nombre propio histórico transliterado
  rationale: Se translitera el nombre real al español con la forma habitual y reconocible 'Artajerjes', manteniendo el referente propio del texto arameo.
- source_word: מֶ֖לֶךְ מַלְכַיָּ֑א
  english_pob_choice: king of kings
  chosen_spanish: rey de reyes
  alternatives_spanish:
  - el rey, rey de reyes
  - rey supremo
  lexicon: título real superlativo
  rationale: La cadena constructa expresa un título superlativo; en español la fórmula natural y fiel es 'rey de reyes', sin añadir repeticiones innecesarias.
- source_word: לְ/עֶזְרָ֣א
  english_pob_choice: to Ezra
  chosen_spanish: a Esdras
  alternatives_spanish:
  - a Ezra
  lexicon: nombre propio bíblico
  rationale: En español bíblico es estándar la forma 'Esdras'; el dativo de destinatario se expresa naturalmente con 'a'.
- source_word: כָ֠הֲנָ/א
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - sacerdote
  lexicon: título sacerdotal definido
  rationale: El arameo está en forma determinada; se conserva con artículo en español dentro de la aposición a Esdras.
- source_word: סָפַ֨ר
  english_pob_choice: the scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - copista
  lexicon: oficio de escriba
  rationale: '''Escriba'' reproduce con precisión el oficio administrativo-religioso del término, y es el equivalente más asentado en español bíblico.'
- source_word: דָּתָ֜/א
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - decreto
  - estatuto
  lexicon: término legal-religioso arameo
  rationale: Siguiendo la decisión del POB inglés en este contexto, 'ley' expresa mejor la referencia a la instrucción divina asociada a Esdras, sin borrar la alternativa administrativa de 'decreto'.
- source_word: דִּֽי אֱלָ֧הּ שְׁמַיָּ֛/א
  english_pob_choice: of the God of heaven
  chosen_spanish: del Dios de los cielos
  alternatives_spanish:
  - del Dios del cielo
  - del Dios celestial
  lexicon: título divino
  rationale: Se conserva el título bíblico establecido en español, con 'cielos' en plural como refleja el arameo y como suele sonar más natural en el registro bíblico.
- source_word: גְּמִ֖יר
  english_pob_choice: complete
  chosen_spanish: paz completa
  alternatives_spanish:
  - paz perfecta
  - saludos
  lexicon: adjetivo de saludo epistolar
  rationale: La fórmula aramea es un saludo epistolar; 'paz completa' conserva el valor semántico del adjetivo sin reducirlo a un mero 'saludos' ni exagerarlo con formulaciones ajenas al texto.
- source_word: וּ/כְעֶֽנֶת
  english_pob_choice: And now—
  chosen_spanish: Y ahora—
  alternatives_spanish:
  - Y ahora
  - Y entonces ahora
  lexicon: conector discursivo arameo
  rationale: Se mantiene el giro transicional que introduce la continuación del decreto, y el guion largo señala que el enunciado sigue en el versículo siguiente.
theological_decisions:
- issue: Rendering דָּתָא in relation to Ezra and the God of heaven
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - decreto
  - estatuto
  rationale: En este encabezamiento dirigido a Esdras, la referencia apunta a la instrucción divina asociada con su oficio; 'ley' preserva el sentido religioso-legal que el POB inglés documenta, sin borrar la tensión semántica con 'decreto'.
  doctrine_reference: Principio POB de equivalencia óptima y nota lexical auditada
- issue: Formula epistolar גְּמִיר וּכְעֶנֶת
  english_pob_reading: complete peace. And now—
  chosen_spanish_reading: paz completa. Y ahora—
  alternative_spanish_readings:
  - paz perfecta. Y ahora—
  - saludos. Y ahora—
  rationale: La combinación se entiende como saludo formular y transición al cuerpo del mensaje; 'paz completa' preserva el adjetivo sin desfigurar el género epistolar, y el guion largo marca que la frase continúa.
  doctrine_reference: Principio POB de preservar el sentido fuente sin paráfrasis excesiva
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y coincide con la lectura auditada del POB inglés. No se requirieron cambios respecto del pase más reciente; se conservó la tensión lexical entre 'ley' y la alternativa 'decreto', y la fórmula de saludo se mantuvo con valor epistolar y transición discursiva.
  spanish_consistency_notes:
  - Se mantiene 'Artajerjes' como forma española estable del nombre propio.
  - Se usa 'Dios de los cielos' para conservar el título bíblico y el plural de 'cielos'.
  - '''Esdras el sacerdote, escriba...'' respeta la aposición del original.'
  - El guion largo final indica continuidad con el versículo siguiente.
  - La nota a preserva la alternativa léxica principal del POB inglés sin imponerla en el texto principal.
