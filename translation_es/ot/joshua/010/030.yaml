translation:
  language: es
  text: Yahvé también la entregó en manos de Israel, junto con su rey; y la pasó a filo de espada, junto con toda persona[a] que estaba en ella. No dejó en ella ningún sobreviviente, e hizo con su rey como había hecho con el rey de Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda alma que estaba en ella», un giro que significa a todos los habitantes de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: conservar el nombre propio en lugar de ocultarlo como título. «Yahvé» es la forma establecida en el español del POB y evita la máscara litúrgica «SEÑOR».'
- source_word: וַיִּתֵּן ... בְּיַד יִשְׂרָאֵל
  english_pob_choice: gave ... into the hand of Israel
  chosen_spanish: la entregó en manos de Israel
  alternatives_spanish:
  - la dio en manos de Israel
  - la puso en manos de Israel
  - la entregó al poder de Israel
  lexicon: HALOT
  rationale: El modismo hebreo נתן ביד expresa entregar a poder de alguien. «Entregó en manos de» conserva la imagen idiomática y su fuerza de dominio, con español natural.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: Marca continuidad con la narración anterior. «También» reproduce bien el valor discursivo de continuidad sin sobrecargar el estilo.
- source_word: אוֹתָהּ ... וְאֶת מַלְכָּהּ
  english_pob_choice: it and its king
  chosen_spanish: la ... su rey
  alternatives_spanish:
  - la ciudad ... su rey
  - ella ... su rey
  lexicon: HALOT
  rationale: El pronombre femenino alude a la ciudad ya mencionada. En español, «la» conserva esa referencia implícita; «su rey» mantiene la relación posesiva sin añadir una expansión innecesaria.
- source_word: וַיַּכֶּהָ
  english_pob_choice: he struck it
  chosen_spanish: la hirió
  alternatives_spanish:
  - la golpeó
  - la atacó
  - la derrotó
  lexicon: HALOT
  rationale: נכה puede abarcar golpear/herir/someter. «Hirió» conserva la crudeza bélica del verbo sin convertirlo en una interpretación más amplia como «derrotó».
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - por la espada
  - a la boca de la espada
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español para «el filo/edge de la espada». Mantiene la imagen hebrea y su sentido violento con buena idiomaticidad.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: toda persona que estaba en ella
  alternatives_spanish:
  - toda alma que estaba en ella
  - todas las personas que estaban en ella
  - cada ser viviente que estaba en ella
  lexicon: HALOT
  rationale: נפש aquí designa a los habitantes, no una afirmación doctrinal sobre el alma. «Persona» evita una lectura antropológica ajena al contexto y comunica el conjunto de habitantes con claridad.
- source_word: לֹא הִשְׁאִיר ... שָׂרִיד
  english_pob_choice: He left no survivor in it
  chosen_spanish: No dejó en ella sobreviviente
  alternatives_spanish:
  - No dejó en ella remanente
  - No dejó sobrevivientes en ella
  - No dejó en ella ningún sobreviviente
  lexicon: HALOT
  rationale: שָׂרִיד denota sobreviviente/remanente. «Sobreviviente» conserva el valor humano y bélico del término; el singular colectivo funciona de modo natural en español.
- source_word: וַיַּעַשׂ לְמַלְכָּהּ כַּאֲשֶׁר עָשָׂה לְמֶלֶךְ יְרִיחוֹ
  english_pob_choice: he did to its king just as he had done to the king of Jericho
  chosen_spanish: hizo con su rey como había hecho con el rey de Jericó
  alternatives_spanish:
  - trató a su rey como había tratado al rey de Jericó
  - le hizo a su rey como había hecho al rey de Jericó
  lexicon: HALOT
  rationale: El hebreo repite el verbo עשה en una fórmula comparativa. «Hizo con su rey» conserva esa estructura y el paralelismo con «como había hecho con el rey de Jericó», sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto de guerra
  english_pob_reading: every person
  chosen_spanish_reading: toda persona
  alternative_spanish_readings:
  - toda alma
  - toda vida
  rationale: Se mantiene el referente humano concreto del pasaje. «Persona» evita importar al verso una antropología doctrinal sobre el alma que el contexto no está afirmando.
  doctrine_reference: Principio de primacía del idioma fuente; evitar lecturas doctrinales no requeridas por el contexto.
- issue: Nombre divino frente a título en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio יהוה; por eso se conserva como nombre personal y no como título sustitutivo.
  doctrine_reference: Tetragrámaton / uso consistente del nombre divino en el POB.
translation_notes:
  revision_awareness: 'El presente borrador sigue la última pasada revisada como de alta concordancia, sin cambios sustanciales respecto del sentido auditado: conserva el nombre divino, el modismo de entrega en manos, el valor de נפש como personas, y la fórmula comparativa final con el rey de Jericó.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «en manos de» para el modismo hebreo נתן ביד, no una traducción desmetaforizada.
  - «Hirió» y no «derrotó» para no ampliar el verbo נכה más allá de lo atestiguado.
  - «Persona» para נפש preserva el valor referencial humano y evita «alma» en sentido doctrinal.
  - La repetición de «hizo» conserva el paralelismo final del hebreo.
