translation:
  language: es
  text: 'Ahora bien, en aquellos días los filisteos reunieron sus fuerzas para la guerra[a], para pelear contra Israel. Y Aquis dijo a David: «Bien sabes que tendrás que salir conmigo al campamento, tú y tus hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al campamento». El hebreo puede referirse al campamento mismo o, por extensión, a la fuerza militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיְהִי בַּיָּמִים הָהֵם
  english_pob_choice: Now in those days
  chosen_spanish: Ahora, en aquellos días
  alternatives_spanish:
  - Y aconteció en aquellos días
  - En aquellos días
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva escena. «Ahora, en aquellos días» conserva el valor de transición y suena natural en español bíblico contemporáneo.
- source_word: וַיִּקְבְּצוּ
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - convocaron
  lexicon: HALOT
  rationale: El verbo expresa la reunión/aglomeración de tropas. «Reunieron» mantiene el sentido amplio sin forzar un tecnicismo militar innecesario.
- source_word: מַחֲנֵיהֶם
  english_pob_choice: their forces
  chosen_spanish: sus campamentos
  alternatives_spanish:
  - sus fuerzas
  - sus ejércitos
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el sustantivo hebreo significa propiamente «campamento/encampment». «Sus campamentos» preserva la imagen concreta que el español puede expresar sin perder claridad.
- source_word: לַצָּבָא
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - como ejército
  lexicon: HALOT
  rationale: La frase indica propósito militar general. «Para la guerra» es directa y reproduce bien la amplitud del término.
- source_word: לְהִלָּחֵם בְּיִשְׂרָאֵל
  english_pob_choice: to fight against Israel
  chosen_spanish: para pelear contra Israel
  alternatives_spanish:
  - para luchar contra Israel
  - para guerrear contra Israel
  lexicon: HALOT
  rationale: La preposición marca hostilidad dirigida contra Israel. «Pelear contra Israel» es natural en español y conserva el matiz adversativo.
- source_word: יָדֹעַ תֵּדַע
  english_pob_choice: You surely know
  chosen_spanish: Tú bien sabes
  alternatives_spanish:
  - Tú ciertamente sabes
  - Sabe con certeza
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la afirmación. «Bien sabes» transmite en español la certeza enfática sin sonar artificial.
- source_word: אִתִּי תֵּצֵא
  english_pob_choice: must go out with me
  chosen_spanish: saldrán conmigo
  alternatives_spanish:
  - saldrás conmigo
  - tienes que salir conmigo
  lexicon: HALOT
  rationale: El hebreo es «saldrás» en segunda persona masculina singular; en el contexto de Aquis dirigido a David y a sus hombres, se mantiene la referencia al grupo como unidad en la frase siguiente. Se opta por «saldrán» para evitar una construcción forzada en español con sujeto plural implícito en el desarrollo de la cláusula, aunque la tensión singular/plural queda registrada en las decisiones y notas. La idea de expectativa/obligación se conserva por el contexto inmediato.
- source_word: בַמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en el ejército
  lexicon: HALOT
  rationale: El hebreo puede referirse al campamento mismo o, por extensión, a la fuerza militar. «En el campamento» sigue de cerca el sentido básico y mantiene la ambigüedad contextual.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Aquis/Acís
  lexicon: standard transliteration
  rationale: Se usa la transliteración habitual en español bíblico «Aquis» para el nombre propio.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: standard transliteration
  rationale: Nombre propio establecido en español.
theological_decisions:
- issue: 'Alcance de מַחֲנֶה / בַמַּחֲנֶה: campamento concreto o fuerza militar'
  english_pob_reading: The Hebrew word can mean either the encampment itself or, by extension, the military force.
  chosen_spanish_reading: «Campamento» en sentido literal, con la posibilidad de extensión militar implícita por el contexto.
  alternative_spanish_readings:
  - «fuerzas»
  - «ejército»
  rationale: El texto hebreo conserva la imagen del campamento; la extensión militar está presente, pero no se impone como única lectura. El español mantiene esa tensión para no borrar la ambigüedad documentada.
  doctrine_reference: Sentido lexical contextual del sustantivo מַחֲנֶה en narración histórica.
- issue: 'Número y forma verbal en «אַתָּה וַאֲנָשֶׁיךָ / תֵּצֵא»: singular dirigido a David con referencia al grupo'
  english_pob_reading: You and your men must go out with me in the camp.
  chosen_spanish_reading: «tú y tus hombres» con verbo verbalmente adaptado al español para fluidez.
  alternative_spanish_readings:
  - «tú y tus hombres saldrás»
  - «tú y tus hombres saldréis»
  rationale: El hebreo presenta un singular dirigido a David y luego añade «y tus hombres». El español exige decidir entre concordancia gramatical y transparencia semántica. Se opta por una adaptación fluida en el texto principal y se registra la tensión para no ocultar la forma original.
  doctrine_reference: Transparencia morfosintáctica y fidelidad contextual al destinatario singular más su séquito.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que ajustó el segundo hemistiquio de «in the army» a «in the camp» para acercarse más al hebreo. En español, eso se refleja conservando «en el campamento» y evitando una generalización a «ejército».
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se conserva «Aquis» como forma española estable del nombre propio.
  - «Filisteos» y «Israel» siguen la nomenclatura bíblica estándar en español.
  - Se preserva la imagen de «campamento» en vez de sustituirla por «ejército», conforme al hebreo y a la revisión auditada.
