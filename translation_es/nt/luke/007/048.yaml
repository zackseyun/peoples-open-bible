translation:
  language: es
  text: 'Entonces le dijo: «Tus pecados son perdonados[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Tus pecados han sido perdonados». El perfecto pasivo griego puede enfatizar el acto cumplido con su resultado continuo.'
