translation:
  language: es
  text: 'Entonces Aríoc, apresuradamente, lo llevó ante el rey y le dijo: «He encontrado un hombre de entre los desterrados de Judá[a] que dará a conocer al rey la interpretación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judíos» o «judeano». El arameo identifica a Daniel como perteneciente al pueblo de Judá en el exilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo de secuencia narrativa; «Entonces» conserva el avance de la escena en español natural.
- source_word: בְּהִתְבְּהָלָה
  english_pob_choice: hurriedly
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - con prisa
  - con alarma
  lexicon: HALOT
  rationale: La forma expresa prisa/urgencia. «Apresuradamente» refleja el movimiento rápido sin introducir un matiz emocional no exigido por el contexto.
- source_word: הַנְעֵל
  english_pob_choice: brought
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo introdujo
  lexicon: HALOT
  rationale: El verbo causativo indica llevar/introducir a alguien a un lugar o presencia. «Lo llevó» funciona de manera natural con «ante el rey» y evita forzar un tecnicismo innecesario.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - en presencia del rey
  - delante del rey
  lexicon: HALOT
  rationale: Es una fórmula cortesana estable. «Ante el rey» es idiomático y fiel al valor relacional de la expresión.
- source_word: וְכֵן אֲמַר לֵהּ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y así le dijo
  - y le habló así
  lexicon: HALOT
  rationale: Introduce el discurso directo. En español, la construcción más natural es «y le dijo».
- source_word: הַשְׁכַּחַת
  english_pob_choice: I have found
  chosen_spanish: He encontrado
  alternatives_spanish:
  - Encontré
  - He hallado
  lexicon: HALOT
  rationale: El perfecto de primera persona expresa el hallazgo ya logrado con relevancia inmediata en el reporte de Aríoc. «He encontrado» mantiene ese efecto; «he hallado» sería posible pero menos corriente.
- source_word: גְּבַר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El sustantivo es masculino y concreto. «Un hombre» conserva esa precisión léxica.
- source_word: מִן בְּנֵי גָלוּתָא
  english_pob_choice: from among the exiles
  chosen_spanish: de entre los desterrados
  alternatives_spanish:
  - de entre los exiliados
  - de entre los cautivos
  lexicon: HALOT
  rationale: La expresión se refiere a los deportados/exiliados de Judá. «Desterrados» comunica bien el estado de exilio en español sin perder el valor colectivo.
- source_word: דִּי יְהוּד
  english_pob_choice: of Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - judío
  - judeano
  lexicon: HALOT
  rationale: La referencia inmediata es al pueblo/territorio de Judá en contexto exílico. «De Judá» sigue de cerca el arameo y evita importar un adjetivo posterior que podría sonar más interpretativo.
- source_word: פִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  lexicon: HALOT
  rationale: En Daniel, פשר es término técnico para la interpretación de sueños o misterios. «Interpretación» preserva ese uso recurrente.
- source_word: יְהוֹדַע
  english_pob_choice: will make ... known
  chosen_spanish: dará a conocer
  alternatives_spanish:
  - hará saber
  - le revelará
  lexicon: HALOT
  rationale: El causativo expresa hacer saber/informar. «Dará a conocer» suena natural en español y conserva la idea de comunicar la interpretación al rey.
theological_decisions:
- issue: Designación étnico-geográfica de דִּי יְהוּד
  english_pob_reading: of Judah
  chosen_spanish_reading: de Judá
  alternative_spanish_readings:
  - judío
  - judeano
  rationale: En este relato histórico-cortesano no hay carga doctrinal especial; la expresión identifica el origen del hombre dentro del pueblo de Judá en el exilio. «De Judá» mantiene la proximidad al texto fuente y la referencia histórica.
  doctrine_reference: Ninguna específica; decisión histórico-lexical
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La redacción se mantuvo cercana al original arameo y al audit trail inglés, con una alternativa lexical preservada en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en otros pasajes; aquí no aparece ningún tetragrámaton.
  - Se eligió «Judá» para reflejar el gentilicio/relación territorial del arameo, en línea con el contexto del exilio.
  - Se mantuvo el término técnico «interpretación» para פשר, consistente con el uso daniélico.
  - El nombre propio se hispanizó como «Aríoc» para lectura natural en español.
