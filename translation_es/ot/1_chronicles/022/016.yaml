    reason: lexical_alternative
  - marker: c
    text: 'O: ''y Yahvé estará contigo'' o ''y sea Yahvé contigo''. La forma hebrea puede expresar un deseo o bendición.'
    reason: alternative_reading
  revision_rationale: 'Se mantiene intacta la traducción principal porque es fiel y natural, pero se restaura el aparato de notas requerido por el audit trail inglés: alternativa para ''bronce/cobre'', alternativa para ''no hay número'', y una nota modal mejor ubicada y formulada para la bendición final.'
