translation:
  language: es
  text: En aquel día, el príncipe proveerá[a], por sí mismo y por todo el pueblo de la tierra, un toro como ofrenda por el pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrecerá». El hebreo עשה puede designar, en contexto sacrificial, la acción de preparar, realizar u ofrecer la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O «como ofrenda de purificación». El hebreo חַטָּאת puede referirse a la ofrenda que quita el pecado o la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall provide
  chosen_spanish: hará
  alternatives_spanish:
  - proveerá
  - hará la ofrenda
  - ofrecerá
  lexicon: HALOT
  rationale: El hebreo עשה en contextos sacrificiales puede referirse a realizar o preparar la ofrenda. En español, ‘hará’ conserva la literalidad básica sin introducir una explicación interpretativa excesiva; el contexto cultual deja claro que se trata de la acción sacrificial.
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא nombra al dirigente/autoridad principal del pueblo en la visión del templo. ‘Príncipe’ mantiene el término ya establecido y evita diluir su función específica.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es la equivalencia temporal natural en español para una fórmula profética. ‘En aquel día’ conserva el tono solemne y apunta a un día particular ya determinado por el contexto.
- source_word: בַּעֲדוֹ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - por él mismo
  - a favor de sí mismo
  - para sí
  lexicon: HALOT
  rationale: La preposición בעד con sufijo indica representación o beneficio. En español, ‘por sí mismo’ comunica de manera natural que la ofrenda incluye su propia responsabilidad/beneficio, sin forzar una lectura moderna de mera autoprestación.
- source_word: וּבְעַד כָּל עַם הָאָרֶץ
  english_pob_choice: and for all the people of the land
  chosen_spanish: y por todo el pueblo de la tierra
  alternatives_spanish:
  - y a favor de todo el pueblo de la tierra
  - y por todo el pueblo del país
  - y por toda la gente de la tierra
  lexicon: HALOT
  rationale: ‘עַם הָאָרֶץ’ se puede rendir como ‘pueblo de la tierra’, una forma fiel y sobria que mantiene la construcción hebrea. ‘Pueblo’ comunica el colectivo representado; ‘de la tierra’ conserva la referencia territorial del texto.
- source_word: פַּר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un novillo
  - un toro joven
  - un buey
  lexicon: HALOT
  rationale: פַּר designa un macho bovino para sacrificio. ‘Toro’ es natural en español y suficientemente preciso; no se añade ‘joven’ porque el hebreo aquí no lo especifica.
- source_word: חַטָּאת
  english_pob_choice: as a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado/culpa
  - como sacrificio por el pecado
  - como ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede designar la ofrenda misma y no solo el pecado abstracto. ‘Ofrenda por el pecado’ preserva la terminología bíblica reconocible en español y mantiene abierta la tensión entre expiación y purificación que el término puede abarcar.
theological_decisions:
- issue: Valor cultual de חַטָּאת en un contexto de expiación/purificación
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El hebreo puede referirse al sacrificio que trata con pecado e impureza. En español, ‘ofrenda por el pecado’ conserva la forma bíblica tradicional sin reducir el alcance del término a una sola explicación teológica. La nota permite la alternativa de ‘purificación’ donde el lector quiera explicitar esa dimensión.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés: mantiene ‘príncipe’, conserva la estructura representativa ‘por sí mismo y por todo el pueblo de la tierra’, y traslada חַטָּאת con una expresión española equivalente que no borra la posibilidad de un matiz de purificación. No se detectaron revisiones necesarias respecto del contexto fuente.'
  spanish_consistency_notes:
  - Se mantiene ‘príncipe’ para נָשִׂיא conforme al uso de Ezequiel.
  - Se usa ‘ofrenda por el pecado’ para חַטָּאת, coherente con la terminología bíblica estándar en español y con la nota alternativa de ‘purificación’.
  - ‘En aquel día’ preserva el tono profético sin arcaísmo excesivo.
  - ‘Pueblo de la tierra’ conserva la construcción hebrea y su referente colectivo territorial.
