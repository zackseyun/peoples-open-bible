translation:
  language: es
  text: Entonces Jacob envió y llamó a Raquel y a Lea al campo, donde estaba su rebaño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «al campo, a su rebaño». La frase final probablemente precisa el lugar del encuentro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a llamar
  lexicon: HALOT
  rationale: El hebreo expresa la iniciativa de Jacob de hacer venir a Raquel y a Lea; en español, «envió» reproduce de forma natural esa acción de despachar o hacer venir a alguien, y evita añadir explícitamente «a llamar» cuando el siguiente verbo ya lo incluye.
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - citó
  lexicon: HALOT
  rationale: Con לְ + personas, קרא indica llamar a alguien o convocarlo. «Llamó» conserva la sencillez narrativa del hebreo y evita un término más formal como «convocó» que podría intensificar indebidamente el tono.
- source_word: לְרָחֵל וּלְלֵאָה
  english_pob_choice: Rachel and Leah
  chosen_spanish: a Raquel y a Lea
  alternatives_spanish:
  - Raquel y Lea
  lexicon: convención onomástica
  rationale: Se usa la forma española habitual de los nombres propios, con la preposición explícita que corresponde al llamado dirigido a ambas mujeres.
- source_word: הַשָּׂדֶה
  english_pob_choice: to the field
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - al terreno
  lexicon: HALOT
  rationale: שׂדה designa el campo o la zona abierta fuera del asentamiento. «Campo» es la equivalencia más natural en español y mantiene la dirección espacial del texto.
- source_word: אֶל צֹאנוֹ
  english_pob_choice: to his flock
  chosen_spanish: a su rebaño
  alternatives_spanish:
  - junto a su rebaño
  - donde estaba su rebaño
  lexicon: HALOT
  rationale: צֹאן se refiere al rebaño de ganado menor. La preposición אֶל marca dirección o destino; en español «a su rebaño» conserva esa relación sin forzar una paráfrasis. La expresión puede sugerir el lugar del encuentro por el contexto, pero el texto hebreo mantiene la formulación breve.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y toma en cuenta la auditoría inglesa: conserva la secuencia «envió y llamó», mantiene la localización espacial del doble complemento con un español natural, y evita sobreinterpretar la frase final, que probablemente aclara el sitio del encuentro más que describir dos movimientos distintos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no lo contiene.
  - Se conserva «rebaño» para צֹאן, en lugar de «ovejas» o «ganado», porque el término español puede abarcar el grupo de animales y mantiene la ambigüedad controlada del hebreo.
  - La puntuación con coma antes del segundo complemento reproduce la relación locativa del hebreo sin volverla innecesariamente rígida.
