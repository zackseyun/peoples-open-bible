translation:
  language: es
  text: Porque los hijos de Jehonadab hijo de Recab han guardado el mandamiento de su padre, que él les mandó; pero este pueblo no me ha escuchado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No me ha escuchado» también puede entenderse como «no me ha obedecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «Porque» conserva bien el valor explicativo causal sin sonar forzado.
- source_word: הֵקִימוּ
  english_pob_choice: have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han cumplido
  - han observado
  - han mantenido
  lexicon: HALOT
  rationale: El verbo hiphil de קום con מִצְוָה expresa hacer que un mandato permanezca en vigor, es decir, cumplirlo u observarlo. «Han guardado» transmite esa obediencia con buena naturalidad en español bíblico contemporáneo.
- source_word: בְּנֵי יְהוֹנָדָב בֶּן רֵכָב
  english_pob_choice: the sons of Jehonadab son of Rechab
  chosen_spanish: los hijos de Jehonadab hijo de Recab
  alternatives_spanish:
  - los descendientes de Jehonadab hijo de Recab
  lexicon: HALOT
  rationale: «Hijos» mantiene la relación de clan y conserva la forma familiar del hebreo. Se mantiene el patrón nominal «Jehonadab hijo de Recab» como en el original y en la POB inglesa.
- source_word: מִצְוַת
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la orden
  - la instrucción
  lexicon: HALOT
  rationale: מִצְוָה puede ser «mandamiento», «mandato» u «orden». Aquí «mandamiento» encaja bien con la obediencia filial subrayada por el texto y conserva el tono de obligación.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su antepasado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su padre». Se conserva la lectura familiar directa, que es retóricamente importante para el contraste con «este pueblo».
- source_word: אֲשֶׁר צִוָּם
  english_pob_choice: that he commanded them
  chosen_spanish: el que les mandó
  alternatives_spanish:
  - que les ordenó
  - que les dio como mandamiento
  lexicon: HALOT
  rationale: La cláusula relativa especifica el contenido del mandamiento. «El que les mandó» reproduce de forma natural el vínculo entre el padre y la obediencia de los hijos.
- source_word: וְהָעָם הַזֶּה
  english_pob_choice: but this people
  chosen_spanish: pero este pueblo
  alternatives_spanish:
  - y este pueblo
  - mientras que este pueblo
  lexicon: HALOT
  rationale: En contexto hay contraste fuerte entre la obediencia de los recabitas y la desobediencia de Judá. «Pero» hace explícito ese valor adversativo en español.
- source_word: לֹא שָׁמְעוּ אֵלָי
  english_pob_choice: have not listened to me
  chosen_spanish: no me ha escuchado
  alternatives_spanish:
  - no me han escuchado
  - no me han obedecido
  - no han atendido a mí
  lexicon: HALOT
  rationale: שׁמע con אֶל suele significar «escuchar a» con implicación de obedecer. «No me ha escuchado» mantiene el sentido lexical y deja audible la implicación de desobediencia. Se usa singular colectivo para «este pueblo».
theological_decisions:
- issue: Lenguaje filial aplicado a los recabitas
  english_pob_reading: their father
  chosen_spanish_reading: su padre
  alternative_spanish_readings:
  - su antepasado
  rationale: 'El hebreo usa lenguaje familiar directo, no un término genealógico abstracto. Mantener «su padre» preserva la fuerza retórica y teológica del contraste: obedecen a un padre humano, mientras el pueblo no escucha a Yahvé.'
  doctrine_reference: Principios POB de fidelidad lexical y de mantener el contraste retórico del texto
- issue: Valor obediencial de שׁמע
  english_pob_reading: ‘Listened to me’ can also carry the sense ‘obeyed me.’
  chosen_spanish_reading: no me ha escuchado
  alternative_spanish_readings:
  - no me ha obedecido
  - no me ha atendido
  rationale: En español, «escuchar» conserva el campo semántico de oír con atención y permite inferir obediencia por el contexto. No se elimina la tensión lexical entre oír y obedecer; queda disponible sin sobreinterpretación.
  doctrine_reference: HALOT; principio POB de mantener tensiones lexicológicas cuando el contexto las sostiene
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios necesarios y que existe alto acuerdo entre la traducción auditada y la revisión externa. La redacción española conserva ese perfil de estabilidad sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca explícitamente en el texto; este versículo no lo requiere.
  - Se preservó la distinción entre el obedecer humano de los recabitas y el no escuchar obediencial del pueblo.
  - Se usó singular colectivo en «este pueblo no me ha escuchado» para reflejar el sustantivo colectivo hebreo.
  - Se mantuvo un estilo bíblico contemporáneo, claro y digno, sin depender de fórmulas tradicionales que oculten el matiz lexical.
