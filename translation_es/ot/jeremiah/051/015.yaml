translation:
  language: es
  text: Él hizo la tierra por su poder, estableció el mundo[a] por su sabiduría, y por su entendimiento extendió los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mundo habitado' para 'el mundo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hace
  - creó
  - el que hace
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí en una afirmación poética de acción creadora. En español, el pretérito perfecto simple 'hizo' comunica con naturalidad el acto creador de Dios, siguiendo la decisión auditada del POB en inglés de usar un verbo finito pasado.
- source_word: אֶרֶץ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto cósmico, 'la tierra' corresponde mejor que 'el país' o 'la región', porque el verso contrasta la tierra con los cielos. 'Tierra' mantiene el alcance universal del hebreo.
- source_word: בְּכֹחוֹ
  english_pob_choice: by his power
  chosen_spanish: por su poder
  alternatives_spanish:
  - con su poder
  - mediante su poder
  - por su fuerza
  lexicon: HALOT
  rationale: El ב instrumental se expresa de forma natural con 'por'. 'Poder' conserva el sentido directo de כֹחַ sin desplazarlo a una paráfrasis más libre como 'fuerza'.
- source_word: מֵכִין
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - preparó
  - afirmó
  - dejó firme
  lexicon: HALOT
  rationale: כון en esta construcción transmite la idea de fijar o establecer con firmeza. 'Estableció' reproduce bien esa estabilidad ordenadora y sigue de cerca el valor elegido en la POB inglesa.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: HALOT
  rationale: Aunque תבל puede implicar 'mundo habitado', el POB inglés optó por 'the world' por naturalidad. En español, 'el mundo' es la equivalencia idiomática más directa y conserva la intención cósmica del pasaje.
- source_word: בְּחָכְמָתוֹ
  english_pob_choice: by his wisdom
  chosen_spanish: por su sabiduría
  alternatives_spanish:
  - con su sabiduría
  - mediante su sabiduría
  lexicon: HALOT
  rationale: '''Sabiduría'' es la correspondencia estándar para חכמה y mantiene el paralelismo con los otros complementos instrumentales. ''Por'' refleja bien el valor instrumental del hebreo.'
- source_word: וּבִתְבוּנָתוֹ
  english_pob_choice: and by his understanding
  chosen_spanish: y por su entendimiento
  alternatives_spanish:
  - y por su discernimiento
  - y con su entendimiento
  lexicon: HALOT
  rationale: תבונה añade el matiz de comprensión/discernimiento distinto de 'sabiduría'. 'Entendimiento' conserva esa distinción en español sin diluirla en un mero sinónimo ornamental.
- source_word: נָטָה
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - tendió
  - desplegó
  - extendió hacia
  lexicon: HALOT
  rationale: En contexto de creación, נטה describe la acción de extender los cielos. 'Extendió' es natural en español y preserva la imagen sin sonar arcaico como 'tendió' ni excesivamente interpretativo.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: La forma plural y el contexto cosmológico favorecen 'los cielos'. Mantiene el paralelismo con 'la tierra' y 'el mundo' y evita reducir el plural hebreo a un singular.
theological_decisions:
- issue: 'Secuencia verbal poética: participio inicial y verbos perfectos en una declaración de creación'
  english_pob_reading: 'Use finite past verbs throughout: ''He made... he established... he stretched out...'''
  chosen_spanish_reading: 'Usar verbos finitos en pasado: ''hizo... estableció... extendió...''.'
  alternative_spanish_readings:
  - '''Hace... establece... extiende...'''
  - '''el que hace... el que establece... el que extiende...'''
  rationale: Aunque el hebreo abre con un participio, la línea funciona como una confesión poética sobre la obra creadora de Dios. El pasado simple en español ofrece una declaración clara y natural, en consonancia con la lectura auditada del POB en inglés, sin introducir matices doctrinales ajenos al texto.
  doctrine_reference: Poética bíblica; equivalencia óptima; conservación del sentido declarativo de la creación
- issue: Posible matiz de תֵּבֵל como 'mundo' o 'mundo habitado'
  english_pob_reading: Or 'the inhabited world' for 'the world.'
  chosen_spanish_reading: '''el mundo'', con posibilidad semántica de ''el mundo habitado''.'
  alternative_spanish_readings:
  - '''el mundo habitado'''
  - '''la tierra habitada'''
  rationale: El inglés POB conservó una nota de alternativa léxica. En español, 'el mundo' es la forma más idiomática y mantiene la amplitud semántica; la alternativa 'mundo habitado' se entiende como trasfondo léxico sin imponerse en el texto principal.
  doctrine_reference: Lexicografía de תבל; nota de alternativa léxica
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el rastro de auditoría inglés sin cambios de revisión posteriores; el borrador respeta la decisión ya aprobada de leer la línea como una declaración creadora en pasado, con la única nota léxica heredada para תֵּבֵל.
  spanish_consistency_notes:
  - Se mantiene 'la tierra' frente a 'los cielos' para preservar el paralelismo cósmico.
  - Se usa 'por' para los tres complementos instrumentales del hebreo, reflejando una misma relación causal/instrumental.
  - '''Entendimiento'' se diferencia de ''sabiduría'' para conservar la distinción léxica entre חכמה y תבונה.'
  - La nota [a] aparece anclada exactamente en 'poder' para preservar la alternativa léxica asociada a תֵּבֵל en la tradición auditada.
