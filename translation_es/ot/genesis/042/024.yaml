  source_alignment_summary: 'El borrador español sigue fielmente la secuencia y el sentido del hebreo: retirada de la presencia de sus hermanos, llanto, regreso, habla, selección de Simeón de entre el grupo, y acto visible de atarlo ante ellos. No omite ni añade contenido relevante.'
