translation:
  language: es
  text: 'Ellos le dijeron[a]: «Calla; pon tu mano sobre tu boca, y ven con nosotros; sé para nosotros padre y sacerdote. ¿Es mejor que seas sacerdote de la casa de un solo hombre[b], o que seas sacerdote de una tribu y de un clan[c] en Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guarda silencio» o «Quédate en silencio». El imperativo hebreo puede traducirse como «calla», «guarda silencio» o «quédate en silencio».'
    reason: lexical_alternative
  - marker: b
    text: «Padre» aquí es un título de liderazgo social o religioso, no una relación biológica.
    reason: cultural_note
  - marker: c
    text: 'O: «familia». El término hebreo designa un grupo de parentesco dentro de una tribu.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרֵשׁ
  english_pob_choice: Be quiet
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Calla y no hables
  lexicon: HALOT
  rationale: El imperativo expresa silencio inmediato. «Calla» es natural en español moderno y conserva la fuerza del mandato sin suavizarlo demasiado.
- source_word: שִׂים יָדְךָ עַל פִּיךָ
  english_pob_choice: put your hand over your mouth
  chosen_spanish: pon tu mano sobre tu boca
  alternatives_spanish:
  - coloca tu mano sobre tu boca
  - pon la mano sobre la boca
  lexicon: HALOT
  rationale: La imagen corporal se mantiene de forma transparente. «Sobre tu boca» conserva el gesto idiomático de contención/silencio.
- source_word: וְהְיֵה לָנוּ לְאָב וּלְכֹהֵן
  english_pob_choice: be to us a father and a priest
  chosen_spanish: sé para nosotros padre y sacerdote
  alternatives_spanish:
  - sé nuestro padre y sacerdote
  - hazte para nosotros un padre y un sacerdote
  lexicon: HALOT
  rationale: Se preservan ambos títulos. «Padre» se mantiene literal para no reducir su carga social y religiosa; «sacerdote» es el equivalente regular de כהן.
- source_word: לְאָב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - guía
  - patrono
  - líder
  lexicon: HALOT
  rationale: La traducción literal conserva el matiz cultural del título. En este contexto no se trata de filiación biológica, sino de una función de autoridad y amparo.
- source_word: כֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdote cultual
  lexicon: HALOT
  rationale: «Sacerdote» es el término español estándar y fiel para כהן. Se evita un término más explicativo porque el texto no lo exige.
- source_word: הֲטוֹב
  english_pob_choice: Is it better for you
  chosen_spanish: ¿Es mejor que...
  alternatives_spanish:
  - ¿Te conviene más que...
  - ¿Sería mejor que...
  lexicon: HALOT
  rationale: La comparación del hebreo se expresa bien con «es mejor que», que suena natural y mantiene la evaluación de ventaja implícita.
- source_word: לְבֵית אִישׁ אֶחָד
  english_pob_choice: to the house of one man
  chosen_spanish: de la casa de un solo hombre
  alternatives_spanish:
  - para la casa de un solo hombre
  - de la casa de un hombre
  lexicon: HALOT
  rationale: «Casa» conserva el sentido de casa/hogar/household. «Un solo hombre» refleja אִישׁ אֶחָד y mantiene el contraste con la unidad mayor que sigue.
- source_word: לְשֵׁבֶט וּלְמִשְׁפָּחָה בְּיִשְׂרָאֵל
  english_pob_choice: to a tribe and a clan in Israel
  chosen_spanish: de una tribu y de una familia en Israel
  alternatives_spanish:
  - de una tribu y de un clan en Israel
  - de una tribu y de una estirpe en Israel
  lexicon: HALOT
  rationale: «Tribu» para שבט es directo. Para משפחה, «familia» es comprensible y natural en español; aunque «clan» puede ser más técnico, aquí «familia» permite mantener la oposición con «casa» sin sonar extrañamente etnográfico.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: HALOT
  rationale: Preposición directa y sin ambigüedad.
- source_word: וַיֹּאמְרוּ לוֹ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Y le dijeron
  lexicon: HALOT
  rationale: Se mantiene la referencia pronominal del destinatario y el ritmo narrativo natural del español.
theological_decisions:
- issue: Título social/religioso «padre»
  english_pob_reading: Retain the literal title 'father' rather than interpret it as 'advisor' or 'leader.'
  chosen_spanish_reading: Mantener «padre» como título, no como parentesco biológico ni como glosa interpretativa.
  alternative_spanish_readings:
  - consejero
  - líder
  - patrono
  rationale: El hebreo usa un título cargado social y religiosamente junto con «sacerdote». Traducirlo literalmente preserva la transparencia del texto y evita estrechar su alcance semántico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Contraste entre בית / משפחה / שבט
  english_pob_reading: Render as 'clan' in distinction from 'tribe.'
  chosen_spanish_reading: Mantener la gradación social entre «casa», «tribu» y «familia» sin borrar la distinción de unidades.
  alternative_spanish_readings:
  - de una tribu y de un clan en Israel
  - de una tribu y de una familia extensa en Israel
  rationale: En español, «familia» comunica de manera natural la unidad de parentesco menor dentro de una tribu, aunque «clan» sea más técnico. La elección busca claridad sin perder la relación jerárquica del texto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y concuerda con el auditable English POB: mantiene el imperativo de silencio, la imagen de la mano sobre la boca, el doble título «padre y sacerdote», y la comparación entre la casa de un hombre y una unidad tribal mayor. No se reportan revisiones aplicadas en el paquete de auditoría, y el estado de acuerdo es alto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Sacerdote» se mantiene para כהן conforme al uso normal del español bíblico y a la decisión inglesa auditada.
  - Se prefirió «familia» en el cuerpo principal para una lectura natural; la nota c conserva la alternativa «clan» documentada por la POB inglesa.
  - 'Los marcadores de nota están anclados en el texto: [a] en «dijo», [b] en «padre», [c] en «familia».'
