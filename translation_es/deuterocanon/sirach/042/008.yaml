translation:
  language: es
  text: 'En cuanto a la disciplina de un ingenuo y de un necio, y de un anciano que vuelve y toma consejo en inmoralidad sexual[a]: sé verdaderamente cuidadoso[b], y sé un hombre modesto ante todo ser viviente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y un anciano de extrema vejez siendo juzgado con jóvenes», en lugar de «y un anciano que vuelve y toma consejo en inmoralidad sexual». El hebreo y el griego difieren notablemente en esta cláusula.'
    reason: alternative_reading
  - marker: b
    text: O «sé verdaderamente instruido ... y aprobado ante toda persona viviente», siguiendo más de cerca el paralelo griego en la exhortación final.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוסר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  lexicon: HALOT
  rationale: מוסר puede expresar formación correctiva o disciplina moral. «Disciplina» conserva el matiz de formación exigente y encaja naturalmente con la abertura preposicional de la sentencia.
- source_word: פותה
  english_pob_choice: simpleton
  chosen_spanish: simple
  alternatives_spanish:
  - persona ingenua
  - persona fácil de engañar
  lexicon: HALOT
  rationale: El hebreo apunta a alguien crédulo o fácilmente seducible; «simple» conserva la evaluación sapiencial de modo claro y breve, sin suavizarla demasiado.
- source_word: כסיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - estúpido
  - insensato
  lexicon: HALOT
  rationale: «Necio» es un término sapiencial natural en español y mantiene la carga ética del término, mejor que una mera descripción intelectual.
- source_word: ושב
  english_pob_choice: who turns back
  chosen_spanish: que vuelve
  alternatives_spanish:
  - que regresa
  - que recae
  lexicon: HALOT
  rationale: La forma verbal sugiere retorno a una conducta previa. «Que vuelve» es fiel y comprensible en español, y deja abierta la exacta dirección del retorno.
- source_word: ישיש
  english_pob_choice: an old man
  chosen_spanish: un anciano
  alternatives_spanish:
  - un hombre viejo
  - un hombre de edad avanzada
  lexicon: HALOT
  rationale: El término indica vejez avanzada; «anciano» es natural, digno y más idiomático que «hombre viejo» en español bíblico moderno.
- source_word: נוטל עצה
  english_pob_choice: to take counsel
  chosen_spanish: toma consejo
  alternatives_spanish:
  - busca consejo
  - recibe consejo
  lexicon: HALOT
  rationale: «Tomar consejo» reproduce bien el modismo hebreo y mantiene la idea deliberativa o consultiva sin expandir el sentido.
- source_word: בזנות
  english_pob_choice: in sexual immorality
  chosen_spanish: en la inmoralidad sexual
  alternatives_spanish:
  - en fornicación
  - en prostitución
  - en desenfreno sexual
  lexicon: HALOT
  rationale: זנות abarca conducta sexual ilícita en general; «inmoralidad sexual» preserva ese alcance sin restringirlo solo a prostitución.
- source_word: זהיר
  english_pob_choice: careful
  chosen_spanish: cuidadoso
  alternatives_spanish:
  - cauto
  - prudente
  lexicon: HALOT
  rationale: En el imperativo, «cuidadoso» comunica vigilancia prudente en español corriente y mantiene el tono exhortativo.
- source_word: באמת
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - de veras
  - en verdad
  lexicon: HALOT
  rationale: El adverbio intensifica la exhortación. «Verdaderamente» conserva la fuerza enfática con un registro digno.
- source_word: צנוע
  english_pob_choice: modest
  chosen_spanish: modesto
  alternatives_spanish:
  - recogido
  - discreto
  - humilde
  lexicon: HALOT
  rationale: En este contexto, «modesto» expresa reserva y conducta apropiada; es el equivalente más natural para el lector hispanohablante.
- source_word: לפני כל חי
  english_pob_choice: before every living being
  chosen_spanish: delante de todo ser viviente
  alternatives_spanish:
  - ante toda persona viva
  - a la vista de todo viviente
  lexicon: HALOT
  rationale: La expresión mantiene la amplitud universal del hebreo כל חי. «Todo ser viviente» es claro en español y conserva el matiz inclusivo del original.
theological_decisions:
- issue: Preferencia por el hebreo conservado frente al paralelo griego en la cláusula central
  english_pob_reading: The Hebrew clause speaks of an old man who turns back and takes counsel in sexual immorality, while the Greek has an old man being judged with youths. The English POB follows the Hebrew in the main text and preserves the Greek as a footnote.
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado: «un anciano que vuelve y toma consejo en la inmoralidad sexual», y deja la variante griega en nota.'
  alternative_spanish_readings:
  - «un anciano juzgado junto con jóvenes»
  - «un anciano que comparece ante jóvenes»
  rationale: Sirácida se traduce desde el hebreo donde existe, pero se preserva honestamente la discrepancia con el griego. La cláusula hebrea y la griega difieren sustancialmente; por eso la nota documenta la alternativa sin mezclarla en el cuerpo del versículo.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando se conserva; usar el paralelo griego como testimonio secundario y mantener la incertidumbre de forma explícita.'
- issue: 'Última cláusula: exhortación ética vs. lectura de instrucción probada'
  english_pob_reading: be truly careful, and a modest man before every living being; or, following the Greek more closely, be truly instructed and approved before every living person.
  chosen_spanish_reading: «sé verdaderamente cuidadoso, y un hombre modesto delante de todo ser viviente»
  alternative_spanish_readings:
  - «sé verdaderamente instruido y aprobado delante de toda persona viviente»
  - «sé realmente formado y aprobado ante todo ser viviente»
  rationale: 'La lectura principal sigue la conclusión hebrea, que exhorta a la conducta prudente y modesta. La alternativa griega se preserva en nota porque introduce una idea distinta: instrucción/validación más que modestia.'
  doctrine_reference: 'PHILOSOPHY.md: cuando hebreo y griego divergen, la lectura principal sigue el testimonio primario y la alternativa significativa se conserva en nota.'
translation_notes:
  revision_awareness: Se siguió el hebreo conservado como texto principal, en línea con la política del proyecto para Sirácida, y se preservó explícitamente la discrepancia con el griego en la nota a. La revisión inglesa reciente ajustó la coordinación de 'take counsel' para reflejar mejor el hebreo; en español se mantuvo la coordinación verbal natural («vuelve y toma consejo»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - 'Se eligieron términos sapienciales naturales y de registro bíblico moderado: «simple», «necio», «anciano», «modesto».'
  - «Inmoralidad sexual» se usó para no restringir indebidamente זנות a prostitución.
  - La expresión final «delante de todo ser viviente» conserva la amplitud inclusiva de כל חי sin introducir un giro más interpretativo.
