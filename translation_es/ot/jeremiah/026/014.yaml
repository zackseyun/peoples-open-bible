translation:
  language: es
  text: Pero en cuanto a mí[a], aquí estoy en su mano[b]. Hagan conmigo lo que les parezca bueno y recto a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Y en cuanto a mí». El hebreo usa una construcción contrastiva que marca el cambio de enfoque hacia la situación personal de Jeremías.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «en sus manos» o «bajo su poder». El hebreo conserva la imagen singular de «mano» en un modismo de control o dominio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: El hebreo abre con un giro contrastivo/discursivo; «Pero en cuanto a mí» reproduce mejor ese matiz que un simple «Y yo», y suena natural en español sin perder la oposición al contexto previo.
- source_word: הִנְנִי
  english_pob_choice: here I am
  chosen_spanish: aquí estoy
  alternatives_spanish:
  - he aquí que estoy
  - aquí me hallo
  lexicon: HALOT
  rationale: La fórmula presentativa expresa disponibilidad o entrega inmediata. «Aquí estoy» es idiomático en español y conserva esa fuerza sin el tono arcaico de «he aquí».
- source_word: בְיֶדְכֶם
  english_pob_choice: in your hand
  chosen_spanish: en vuestra mano
  alternatives_spanish:
  - en vuestras manos
  - bajo vuestro poder
  lexicon: HALOT
  rationale: Se mantiene la imagen singular de «mano» del hebreo, que es idiomática para estar bajo control. «Vuestra mano» conserva la metáfora con claridad en español; el plural «manos» y «poder» explicitan más de lo que el texto exige.
- source_word: עֲשׂוּ לִי
  english_pob_choice: Do to me
  chosen_spanish: Haced conmigo
  alternatives_spanish:
  - Tratadme
  - Hacedme
  lexicon: HALOT
  rationale: El verbo con לִי apunta a acción dirigida a Jeremías. «Haced conmigo» comunica de modo directo y natural el trato personal/judicial implicado, sin añadir una interpretación más fuerte que el hebreo.
- source_word: כַּטּוֹב
  english_pob_choice: what is good
  chosen_spanish: lo que os parezca bueno
  alternatives_spanish:
  - lo bueno
  - lo que es bueno
  lexicon: HALOT
  rationale: El כ introduce la norma o medida de lo bueno. En español, la formulación con «os parezca» refleja bien el valor evaluativo de la expresión y enlaza con el final del versículo.
- source_word: וְכַיָּשָׁר
  english_pob_choice: and right
  chosen_spanish: y recto
  alternatives_spanish:
  - y justo
  - y correcto
  lexicon: HALOT
  rationale: «Recto» preserva el paralelismo con «bueno» y mantiene la idea de lo derecho/recto del hebreo mejor que una simplificación meramente ética como «correcto».
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: ante vuestros ojos
  alternatives_spanish:
  - a vuestros ojos
  - a vuestro parecer
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de evaluación. «Ante vuestros ojos» mantiene la metáfora visual y la transparencia frente al lector español; «a vuestro parecer» sería una alternativa más dinámica pero menos cercana a la imagen original.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios, y el control cruzado reportó alta concordancia; por eso este borrador sigue de cerca la lectura estable del POB inglés, ajustándola a un español natural y transparente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» por defecto para el tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se mantiene el campo semántico de control con «mano» en singular, en vez de neutralizarlo con «poder», para respetar el modismo hebreo.
  - «Recto» se usa para preservar el paralelismo con «bueno» y la forma moral-jurídica del hebreo.
  - No se introduce terminología doctrinal ajena al versículo; el registro es judicial y de sumisión personal.
