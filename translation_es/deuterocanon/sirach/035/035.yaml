review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: ζυγός/ἱμάς → ''yugo/correa'', κάμψουσιν τράχηλον → ''doblarán el cuello'', y la pareja punitiva στρέβλαι καὶ βάσανοι se conserva de forma concreta y general. También mantiene correctamente la decisión principal de οἰκέτῃ como ''esclavo'' en línea con el contexto coercitivo y con la auditoría inglesa final. Sin embargo, ''para un esclavo malo hay'' suena menos natural y menos directamente equivalente que una formulación existencial impersonal en español.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero necesita un pequeño ajuste de naturalidad sintáctica: ''para un esclavo malo hay potros y torturas'' resulta algo forzado. ''Para el esclavo malvado, hay…'' todavía conserva esa torpeza. En español bíblico claro, ''al esclavo malvado le corresponden potros y torturas'' o ''para el esclavo malvado son los potros y las torturas'' fluye mejor. Además, ''malo'' es posible, pero ''malvado'' comunica mejor la fuerza moral de κακούργῳ sin reducirlo a mera mala conducta. ''Potros'' es aceptable y comprensible.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto en el punto principal: οἰκέτῃ se mantiene como ''esclavo'', no ''sirviente/siervo''. No hay términos divinos o cristológicos en este versículo. La nota léxica alternativa está bien planteada y anclada correctamente.'
  issues:
  - severity: medium
    issue: Sintaxis poco natural en 'y para un esclavo malo hay potros y torturas'
    rationale: Aunque comprensible, esta construcción con 'hay' después de 'para…' suena rígida en español y no ofrece la mejor legibilidad eclesial. Una reformulación impersonal o de correspondencia mejora la naturalidad sin alejarse del griego.
  - severity: low
    issue: '''malo'' queda algo débil para κακούργῳ'
    rationale: El adjetivo griego tiene fuerza moral/dañina. 'Malo' no es erróneo, pero 'malvado' o una opción equivalente preserva mejor la carga del original en este contexto punitivo.
  revised_spanish_text: Un yugo y una correa doblarán el cuello, y al esclavo[a] malvado le corresponden potros y torturas.
  revised_footnotes:
  - marker: a
    text: O 'sirviente malvado'. El griego οἰκέτης puede denotar a un sirviente doméstico, pero el contexto coercitivo favorece 'esclavo'.
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad léxica principal del borrador, pero se mejora la naturalidad del español con una construcción más idiomática que expresa la misma relación punitiva. También se refuerza ligeramente la fuerza moral de κακούργῳ con 'malvado', sin sobreinterpretar el griego. La nota alternativa sobre οἰκέτης se mantiene.
