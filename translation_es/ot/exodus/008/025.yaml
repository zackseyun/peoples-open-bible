translation:
  language: es
  text: 'Moisés dijo: «Mira, yo salgo de junto a ti, y rogaré a Yahvé, y el enjambre[a] se apartará de Faraón, de sus siervos y de su pueblo mañana. Solo que Faraón no siga burlándose[b] al no dejar ir al pueblo a sacrificar a Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo עָרֹב puede referirse más específicamente a un enjambre de moscas u otros insectos; el referente exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo tiene aquí el sentido de burlarse con engaño o de actuar de manera insolente y engañosa; no solo de reírse en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - Mira bien
  lexicon: HALOT
  rationale: La partícula introduce la declaración con fuerza de atención. «Mira» comunica esa inmediatez de forma natural en español moderno sin perder el tono enfático.
- source_word: יוֹצֵא מֵעִמָּךְ
  english_pob_choice: am going out from you
  chosen_spanish: salgo de junto a ti
  alternatives_spanish:
  - salgo de ti
  - me voy de junto a ti
  - salgo de tu presencia
  lexicon: HALOT
  rationale: «Salir de junto a» conserva la idea concreta de separación espacial del hebreo y su relación personal inmediata, sin volverlo demasiado perifrástico.
- source_word: וְהַעְתַּרְתִּי אֶל יְהוָה
  english_pob_choice: I will plead with Yahweh
  chosen_spanish: rogaré a Yahvé
  alternatives_spanish:
  - suplicaré a Yahvé
  - intercederé ante Yahvé
  - oraré a Yahvé
  lexicon: HALOT
  rationale: El verbo expresa ruego vehemente e intercesión, no solo oración genérica. «Rogaré» mantiene ese matiz con buen registro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el nombre divino. En español, «Yahvé» es la forma estándar adoptada para preservar el nombre del pacto sin la convención de sustitución por «SEÑOR».
- source_word: וְסָר הֶעָרֹב
  english_pob_choice: the swarm will depart
  chosen_spanish: el enjambre se apartará
  alternatives_spanish:
  - el enjambre se irá
  - la plaga se retirará
  - la manada de insectos se apartará
  lexicon: HALOT
  rationale: «Se apartará» reproduce el valor intransitivo de סור como retirarse/irse. «Enjambre» conserva la imagen de agrupación móvil sin resolver de manera indebida la identificación zoológica.
- source_word: הֶעָרֹב
  english_pob_choice: the swarm
  chosen_spanish: el enjambre
  alternatives_spanish:
  - la plaga de insectos
  - la multitud de insectos
  - el swarm
  lexicon: HALOT
  rationale: El término es semánticamente incierto. «Enjambre» permite preservar la indeterminación del original y su cualidad de masa zumbante o agrupada, sin especificar «moscas» de más.
- source_word: מִפַּרְעֹה מֵעֲבָדָיו וּמֵעַמּוֹ
  english_pob_choice: from Pharaoh, from his servants, and from his people
  chosen_spanish: de Faraón, de sus siervos y de su pueblo
  alternatives_spanish:
  - de Faraón, de sus esclavos y de su pueblo
  - lejos de Faraón, de sus servidores y de su pueblo
  lexicon: HALOT
  rationale: Se conserva la distribución repetida de los complementos con «de», reflejando el alcance del alejamiento. «Siervos» se usa aquí por el contexto cortesano y administrativo; «esclavos» sería demasiado fuerte para los oficiales de la corte.
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - para mañana
  - al día siguiente
  lexicon: HALOT
  rationale: Equivale de manera directa al adverbio temporal hebreo.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero solo
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Marca la restricción de la advertencia con concisión natural en español.
- source_word: אַל יֹסֵף ... הָתֵל
  english_pob_choice: let Pharaoh not continue to mock
  chosen_spanish: no siga Faraón burlándose
  alternatives_spanish:
  - no continúe Faraón mofándose
  - que Faraón no vuelva a burlarse
  - no persista Faraón en engañar
  lexicon: HALOT
  rationale: La construcción con יסף expresa continuidad; הָתֵל implica burla engañosa o trato insolente. «Burlándose» transmite la falta de seriedad y el tono de desprecio sin sobrecargar con una interpretación específica.
- source_word: לְבִלְתִּי שַׁלַּח
  english_pob_choice: by not letting ... go
  chosen_spanish: para no dejar ir
  alternatives_spanish:
  - para no soltar
  - con el fin de no dejar salir
  - al no dejar ir
  lexicon: HALOT
  rationale: «Dejar ir» es una fórmula natural en español para el acto de liberar a un pueblo. Conserva el sentido de negativa a permitir la partida.
- source_word: לִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: a sacrificar
  alternatives_spanish:
  - a ofrecer sacrificio
  - a inmolar
  - para sacrificar
  lexicon: HALOT
  rationale: El infinitivo conserva el valor cultual específico de זבח. «A sacrificar» encaja bien con la construcción final y mantiene la relación con el propósito de salida.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del Dios del pacto en vez de sustituirlo por un título. La elección sigue el criterio auditado del proyecto y evita borrar la forma explícita del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identificación de הֶעָרֹב
  english_pob_reading: the swarm
  chosen_spanish_reading: el enjambre
  alternative_spanish_readings:
  - la plaga de insectos
  - las moscas
  - el enjambre de insectos
  rationale: El hebreo no fija con certeza la especie. En español, «enjambre» preserva la indeterminación y la imagen de masa móvil, sin resolver interpretativamente la plaga más allá de lo que el texto asegura.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological/interpretive tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el último pass de revisión, que mantuvo el texto sin cambios, y se respetó la decisión auditada de no especificar zoológicamente עָרֹב más allá de la incertidumbre del hebreo. La formulación española ajusta el tono para publicación y conserva la advertencia final con el matiz de burla engañosa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «Faraón» con mayúscula para el nombre propio.
  - «Siervos» se eligió para la corte faraónica, evitando una carga semántica excesiva de «esclavos» en este contexto.
  - La nota textual sobre עָרֹב se ancla en el término traducido «enjambre», preservando la incertidumbre del referente.
  - La nota sobre הָתֵל se ancla en «burlándose» para explicar el matiz de burla engañosa.
