revisions:
- from: 'Cuando Aarón lo vio[a], edificó un altar delante de él. Luego Aarón proclamó y dijo: «Mañana habrá una fiesta para Yahvé».'
  to: 'Cuando Aarón lo vio, edificó un altar delante del becerro[a]. Luego Aarón proclamó y dijo: «Mañana habrá una fiesta para Yahvé».'
  rationale: Se corrige el referente principal de לְפָנָיו para alinearlo con la evidencia contextual y con la decisión documentada del POB inglés, evitando en el texto base una ambigüedad que en español suena personal. También se mueve la nota al lugar correcto para que comente la frase que realmente explica.
