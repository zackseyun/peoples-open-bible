id: DEU.2.30
reference: Deuteronomy 2:30
source:
  edition: WLC
  text: וְ/לֹ֣א אָבָ֗ה סִיחֹן֙ מֶ֣לֶךְ חֶשְׁבּ֔וֹן הַעֲבִרֵ֖/נוּ בּ֑/וֹ כִּֽי הִקְשָׁה֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ אֶת רוּח֗/וֹ וְ/אִמֵּץ֙ אֶת לְבָב֔/וֹ לְמַ֛עַן תִּתּ֥/וֹ בְ/יָדְ/ךָ֖ כַּ/יּ֥וֹם הַ/זֶּֽה־־־׃ס
translation:
  text: But Sihon king of Heshbon was not willing to let us pass through his land[a], because Yahweh your God had hardened his spirit and made his heart stubborn, in order to give him into your hand, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and strengthened his heart.' The Hebrew verb can mean 'make strong,' but here likely carries the sense of making him obstinate or stubborn in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - did not consent
  - refused
  lexicon: HALOT
  rationale: The verb denotes willingness/consent rather than merely an external act of refusal. 'Was not willing' preserves the internal volitional nuance in readable English.
- source_word: הַעֲבִרֵנוּ בּוֹ
  chosen: to let us pass through his land
  alternatives:
  - to let us pass through him
  - to make us pass through it
  lexicon: HALOT
  rationale: The Hiphil of עבר with pronominal suffix means 'cause/allow us to pass,' and בּוֹ refers to his territory/domain in context, not his person. 'His land' makes the implied territorial sense explicit in natural English.
- source_word: הִקְשָׁה ... אֶת רוּחוֹ
  chosen: had hardened his spirit
  alternatives:
  - made his spirit hard
  - made him obstinate
  lexicon: HALOT
  rationale: The verb קשׁה in Hiphil means to make hard/harden. 'Spirit' is retained rather than paraphrased away, preserving the Hebrew anthropological term and its theological resonance.
- source_word: וְאִמֵּץ אֶת לְבָבוֹ
  chosen: and made his heart stubborn
  alternatives:
  - and strengthened his heart
  - and made his heart strong
  lexicon: HALOT
  rationale: אמץ can mean strengthen/make strong, but in this context of judicial hardening the idiomatic sense is stubbornness/obstinacy. Rendering 'made his heart stubborn' communicates the contextual force while distinguishing it from the previous 'hardened his spirit.'
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the sake of
  lexicon: HALOT
  rationale: This marks purpose/result. 'In order to' clearly expresses the purposive force in contemporary English.
- source_word: תִּתּוֹ בְיָדְךָ
  chosen: to give him into your hand
  alternatives:
  - to deliver him into your hand
  - to hand him over to you
  lexicon: HALOT
  rationale: The idiom נתן ביד commonly means to give/deliver into someone's power. 'Give him into your hand' stays close to the Hebrew while remaining intelligible.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as is the case today
  lexicon: HALOT
  rationale: This common Deuteronomic idiom points to the present, evident state of affairs. 'As it is this day' preserves the formal flavor without becoming opaque.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
