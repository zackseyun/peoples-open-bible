lexical_decisions:
- source_word: וּבָקָר
  english_pob_choice: and cattle
  chosen_spanish: y reses bovinas
  alternatives_spanish:
  - y ganado vacuno
  - y ganado bovino
  - y vacunos
  lexicon: HALOT
  rationale: בָּקָר nombra ganado bovino/cattle en sentido colectivo. En español, "reses bovinas" conserva el sentido colectivo y evita restringirlo a animales de labor o a "bueyes". La forma breve "ganado bovino" también sería válida, pero "reses bovinas" encaja bien en un inventario numérico y suena natural en registro bíblico moderno.
- source_word: שְׁנַיִם וְשִׁבְעִים אָלֶף
  english_pob_choice: 72,000
  chosen_spanish: '72.000'
  alternatives_spanish:
  - setenta y dos mil
  lexicon: HALOT
  rationale: La frase hebrea expresa literalmente "dos y setenta mil", equivalente idiomático a 72.000. En español, la cifra arábiga mantiene con claridad el dato exacto dentro de una lista de botín y sigue la práctica de la POB inglesa de priorizar legibilidad numérica.
translation_notes:
  revision_awareness: El inglés POB presenta este miembro de inventario como una unidad numérica simple, sin notas ni variantes; el hebreo coincide plenamente con una lectura directa de cantidad y clase de ganado, por lo que no se requieren decisiones textuales adicionales.
  spanish_consistency_notes:
