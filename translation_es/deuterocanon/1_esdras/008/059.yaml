translation:
  language: es
  text: Permanezcan despiertos y guárdenlas[a] hasta que ustedes las entreguen a los jefes de los sacerdotes y de los levitas y a los jefes de las casas paternas[b] de Israel en Jerusalén, en las cámaras[c] de la casa de nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Manténganse vigilantes y guárdenlas». El par inicial de verbos enfatiza una custodia atenta y vigilante.'
    reason: lexical_alternative
  - marker: b
    text: «Casas paternas» traduce una expresión técnica de linaje y organización familiar, no solo hogares individuales.
    reason: lexical_alternative
  - marker: c
    text: «Cámaras» se refiere a dependencias o habitaciones del complejo del templo; el paralelo hebreo habla de lishkoth, «salas/cámaras».
    reason: cross_reference
lexical_decisions:
- source_word: ἀγρυπνεῖτε
  english_pob_choice: Stay awake
  chosen_spanish: Permanezcan despiertos
  alternatives_spanish:
  - Estén vigilantes
  - Manténganse despiertos
  lexicon: BDAG
  rationale: El verbo expresa estar en vela y atento. 'Permanezcan despiertos' conserva la imagen concreta y la fuerza exhortativa, y funciona bien con el mandato paralelo de guardar.
- source_word: φυλάσσετε
  english_pob_choice: guard
  chosen_spanish: guárdenlas
  alternatives_spanish:
  - custodienlas
  - vigílenlas
  lexicon: BDAG
  rationale: En este contexto se trata de custodia protectora de objetos sagrados, no solo de observar. 'Guárdenlas' comunica bien la idea de custodiar, y el pronombre retoma los objetos mencionados previamente.
- source_word: ἕως τοῦ παραδοῦναι
  english_pob_choice: until you hand ... over
  chosen_spanish: hasta que ustedes las entreguen
  alternatives_spanish:
  - hasta que ustedes las pongan en manos de
  - hasta que ustedes las entreguen en
  lexicon: BDAG
  rationale: La construcción marca el término de la custodia. 'Entreguen' es natural en español y refleja la acción de transferencia de responsabilidad.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las cosas
  - los objetos
  lexicon: BDAG
  rationale: El pronombre femenino plural concuerda con 'las' en español y remite a los objetos sagrados del contexto inmediato sin añadir explicación al texto principal.
- source_word: φυλάρχοις
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - principales
  lexicon: LSJ
  rationale: El término designa personas con autoridad directiva. 'Jefes' es breve, natural y suficientemente amplio para la doble referencia a sacerdotes y levitas.
- source_word: ἡγουμένοις
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - dirigentes
  - cabezas
  lexicon: BDAG
  rationale: Aquí el sentido es de quienes encabezan las casas paternas. 'Jefes' evita una traducción literal torpe y mantiene la estructura de autoridad del original.
- source_word: πατριῶν
  english_pob_choice: fathers’ houses
  chosen_spanish: casas paternas
  alternatives_spanish:
  - casas de los padres
  - casas ancestrales
  lexicon: LSJ
  rationale: La expresión es técnica para unidades de linaje. 'Casas paternas' conserva la estructura formal del término y su carácter genealógico.
- source_word: παστοφορίοις
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - cuartos
  - salas
  lexicon: LSJ
  rationale: El término se refiere a habitaciones o dependencias del recinto del templo. 'Cámaras' es fiel al valor espacial y suena natural en un contexto cultual.
- source_word: τοῦ οἴκου τοῦ κυρίου ἡμῶν
  english_pob_choice: the house of our Lord
  chosen_spanish: la casa de nuestro Señor
  alternatives_spanish:
  - la casa de nuestro Señor Dios
  - el templo de nuestro Señor
  lexicon: BDAG
  rationale: Se mantiene la referencia explícita al 'Señor' de la fuente griega y el giro idiomático de 'casa' para el templo. 'Señor' sigue la convención POB para κύριος.
theological_decisions:
- issue: Referencia del templo en τοῦ οἴκου τοῦ κυρίου ἡμῶν
  english_pob_reading: the house of our Lord
  chosen_spanish_reading: la casa de nuestro Señor
  alternative_spanish_readings:
  - el templo de nuestro Señor
  - la casa del Señor nuestro Dios
  rationale: La fuente griega dice literalmente 'la casa de nuestro Señor'. 'Casa' preserva el idioma del templo sin reemplazarlo por una explicación interpretativa. En este versículo la referencia cultual es clara por el contexto y por el paralelo hebreo, pero la redacción griega se mantiene visible.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of κύριος → Señor'
- issue: Estructura de parentesco en τῶν πατριῶν
  english_pob_reading: fathers’ houses
  chosen_spanish_reading: casas paternas
  alternative_spanish_readings:
  - familias
  - linajes paternos
  rationale: No se trata solo de familias en sentido general, sino de una estructura formal de parentesco y autoridad. 'Casas paternas' conserva ese matiz y evita aplanar la organización social del texto.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y con el paralelo hebreo; no se requieren cambios sustantivos. Se mantuvieron la imagen concreta de vigilancia, la terminología de custodia y la estructura de parentesco, evitando una paráfrasis que borre el matiz técnico de los términos griegos.
  spanish_consistency_notes:
  - Se conservó la convención POB de traducir κύριος como ‘Señor’ cuando aparece en la fórmula del templo.
  - Se optó por ‘cámaras’ para παστοφορίοις por su correspondencia con el paralelo hebreo y por su naturalidad en español culto.
  - ‘Jefes’ se usó de manera uniforme para φυλάρχοις y ἡγουμένοις, diferenciando por contexto la función de autoridad sin añadir términos no sustentados por la fuente.
