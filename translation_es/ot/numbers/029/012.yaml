- from: Y el día quince del séptimo mes habrá para ustedes una santa convocación. No harán ningún trabajo ordinario, y celebrarán fiesta para Yahvé durante siete días.
  to: Y el día quince del séptimo mes tendrán una santa convocación. No harán ningún trabajo ordinario, y celebrarán una fiesta para Yahvé durante siete días.
  rationale: 'Se ajusta la frase verbal a un español más natural y fiel: «tendrán» refleja mejor יִהְיֶה לָכֶם, y «celebrarán una fiesta» expresa con claridad la construcción cognada וְחַגֹּתֶם חַג sin sonar truncada. No se requieren notas adicionales porque no surge una ambigüedad nueva en español.'
