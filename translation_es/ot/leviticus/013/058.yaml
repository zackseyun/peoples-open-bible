revisions:
- from: Pero el vestido, o la urdimbre, o la trama, o cualquier objeto de cuero que laves, y la plaga se aparta de ellos, será lavado por segunda vez y quedará limpio.
  to: Pero la prenda, o la urdimbre, o la trama, o cualquier objeto de cuero que laves, y la infección se aparta de ellos, será lavado por segunda vez y quedará limpio.
  rationale: Se reemplaza 'el vestido' por 'la prenda' para reflejar mejor el sentido general de הַבֶּגֶד en español natural. Se reemplaza 'la plaga' por 'la infección' para alinearse con la decisión léxica documentada del POB en Levítico 13 y mejorar la claridad moderna sin imponer un diagnóstico médico técnico. El resto del texto preserva bien la estructura y el sentido del hebreo.
