translation:
  language: es
  text: Pero Hamán se contuvo[a] y fue a su casa[b]. Entonces envió a llamar e hizo venir a sus amigos y a Zeres, su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «se controló» o «se refrenó».'
    reason: lexical_alternative
  - marker: b
    text: O «fue a casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַפַּק
  english_pob_choice: restrained himself
  chosen_spanish: se contuvo
  alternatives_spanish:
  - se controló
  - se refrenó
  - se dominó
  lexicon: HALOT
  rationale: El hitpael de אפק expresa auto-represión o contención de sí mismo en un contexto de ira. «Se contuvo» reproduce bien el sentido reflexivo y suena natural en español, sin perder la idea de frenar la reacción.
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  english_pob_choice: went to his house
  chosen_spanish: fue a su casa
  alternatives_spanish:
  - fue a su hogar
  - volvió a su casa
  - fue a su hogar
  lexicon: HALOT
  rationale: La construcción indica movimiento hacia la casa de Hamán. «Fue a su casa» es idiomático en español y mantiene la referencia espacial directa; «casa» conserva la concreción del hebreo mejor que una paráfrasis más interpretativa.
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: mandó traer
  alternatives_spanish:
  - envió
  - mandó llamar
  lexicon: HALOT
  rationale: 'En contexto, el envío se completa con el causativo siguiente, por lo que en español conviene expresar la acción resultante: mandó traer. Esto mantiene la secuencia narrativa y deja claro que se hizo venir a las personas mencionadas.'
- source_word: וַיָּבֵא
  english_pob_choice: brought in
  chosen_spanish: traer
  alternatives_spanish:
  - hacer entrar
  - introducir
  lexicon: HALOT
  rationale: 'El hiphil de בוא es causativo: «hacer venir / traer». En español, «mandó traer» comunica el resultado del verbo sin sobrecargar la frase con una literalidad artificial.'
- source_word: אֹהֲבָיו
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - los que lo amaban
  lexicon: HALOT
  rationale: Aunque el término deriva de אהב, en este uso nominal plural designa compañeros cercanos o allegados. «Sus amigos» es la opción más natural y sigue la decisión contextual documentada por el POB en inglés.
- source_word: זֶרֶשׁ אִשְׁתּוֹ
  english_pob_choice: Zeresh his wife
  chosen_spanish: Zeres, su esposa
  alternatives_spanish:
  - su esposa Zeres
  - Zeres, la esposa de él
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la relación posesiva de manera clara y fluida. En español, la aposición con coma hace explícito que Zeresh es la esposa de Hamán, sin perder el orden del hebreo ni forzar una fórmula más pesada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, sin cambios detectados en la revisión más reciente; se preserva la secuencia narrativa y el matiz de auto-contención de Hamán.
  spanish_consistency_notes:
  - Se usó «Hamán» con tilde para el nombre propio de acuerdo con la ortografía usual en español bíblico.
  - Se eligió «Zeres» como forma española del nombre Zeresh, manteniendo el referente femenino del hebreo.
  - Se evitó «SEÑOR» u otros términos teológicos irrelevantes al verso.
  - La coordinación «sus amigos y a Zeres, su esposa» refleja el objeto doble del hebreo de forma natural en español.
