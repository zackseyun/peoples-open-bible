translation:
  language: es
  text: entonces oye[a] desde el cielo y perdona el pecado de tus siervos y de tu pueblo Israel, cuando les enseñes el buen camino por el que deben andar, y envía lluvia sobre tu tierra, que has dado a tu pueblo como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oye desde los cielos». El hebreo dice literalmente «oye los cielos/el cielo», un giro idiomático para expresar que Dios oye desde su morada celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה תִּשְׁמַע הַשָּׁמַיִם
  english_pob_choice: hear from heaven
  chosen_spanish: oirás desde los cielos
  alternatives_spanish:
  - oirás en los cielos
  - escucharás desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de escucha asociada con el ámbito celestial de Dios. «Desde los cielos» conserva la procedencia del acto de oír sin enmascarar la imagen bíblica. «Oirás» mantiene el valor verbal directo de שׁמע en este contexto de oración.
- source_word: וְסָלַחְתָּ לְחַטַּאת
  english_pob_choice: forgive the sin
  chosen_spanish: perdonarás el pecado
  alternatives_spanish:
  - perdonarás el pecado/culpa
  - perdonarás la falta
  lexicon: HALOT
  rationale: חטאת aquí denota pecado o culpa moral, no simplemente un error. «Pecado» es la equivalencia más clara y fiel en español, y conserva la fuerza teológica del acto de perdonar.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: En esta oración de pacto, עבד designa a los que pertenecen y sirven a Dios; el inglés POB eligió «servants» por el mismo motivo. En español, «siervos» transmite bien ese registro religioso sin imponer la dureza de «esclavos».
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: and of your people Israel
  chosen_spanish: y de tu pueblo Israel
  alternatives_spanish:
  - y tu pueblo Israel
  - y de tu pueblo, Israel
  lexicon: HALOT
  rationale: La coordinación mantiene a Israel dentro del mismo objeto de perdón. «De tu pueblo» ayuda a reflejar la relación posesiva implícita en el hebreo y en la lectura inglesa auditada.
- source_word: כִּי תוֹרֵם
  english_pob_choice: when you teach them
  chosen_spanish: cuando les enseñes
  alternatives_spanish:
  - cuando los instruyas
  - porque les enseñes
  lexicon: HALOT
  rationale: El verbo hifil de ירה tiene aquí el sentido de enseñar/instruir. «Cuando» refleja mejor la circunstancia temporal o condicional del conjunto que «porque», y evita cargar el texto con una causalidad más fuerte de la que exige el hebreo.
- source_word: הַדֶּרֶךְ הַטּוֹבָה
  english_pob_choice: the good way
  chosen_spanish: el buen camino
  alternatives_spanish:
  - el camino bueno
  - la buena senda
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora bíblica de conducta y dirección de vida. «Buen camino» reproduce con naturalidad la calificación moral sin sobreinterpretarla.
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  english_pob_choice: in which they should walk
  chosen_spanish: en que han de andar
  alternatives_spanish:
  - en que deben andar
  - en el cual caminarán
  lexicon: HALOT
  rationale: «Andar» es un equivalente bíblico natural en español para la metáfora de conducta. «Han de andar» conserva el matiz normativo/expectativo del contexto mejor que un futuro simple.
- source_word: וְנָתַתָּה מָטָר
  english_pob_choice: send rain
  chosen_spanish: enviarás lluvia
  alternatives_spanish:
  - darás lluvia
  - mandarás lluvia
  lexicon: HALOT
  rationale: Aunque נתן con מטר puede traducirse literalmente «dar lluvia», en español «enviar lluvia» resulta más idiomático y coincide con la revisión auditada en inglés. Se mantiene el acto divino de concederla sin forzar una literalidad poco natural.
- source_word: עַל אַרְצְךָ
  english_pob_choice: on your land
  chosen_spanish: sobre tu tierra
  alternatives_spanish:
  - en tu tierra
  - sobre tu país
  lexicon: HALOT
  rationale: El poseedor divino se conserva en «tu tierra». «Sobre» reproduce bien el alcance espacial de la lluvia y el objeto de la bendición.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - como patrimonio
  lexicon: HALOT
  rationale: נחלה alude a la herencia/correspondiente posesión concedida por pacto. «Herencia» es la forma española más natural y fiel para mantener esa carga covenantal.
theological_decisions:
- issue: Secuencia de respuesta divina en la oración de Salomón
  english_pob_reading: The verse is rendered as a petition that God forgive, instruct, and send rain in response to Israel's prayer and repentance.
  chosen_spanish_reading: El versículo se traduce como una petición para que Dios perdone, enseñe y envíe lluvia en el marco de la restauración del pacto.
  alternative_spanish_readings:
  - 'Podría leerse más estrictamente como una causalidad: «porque les enseñes...»'
  - Podría suavizarse la secuencia a una mera expectativa sin valor de petición.
  rationale: El contexto de la dedicación del templo y la estructura de la oración favorecen una lectura de restauración pactual. «Cuando» preserva la relación temporal-condicional de כִּי sin resolverla en una causalidad más fuerte ni borrar la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla prematuramente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «from heaven» por naturalidad y «send rain» por idiomaticidad, procurando un equivalente español igualmente natural sin perder la imagen hebrea ni el valor pactual del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal del nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton explícito.
  - Se eligió «siervos» en lugar de «esclavos» porque el contexto es una oración de pacto y servicio a Dios, no una declaración sobre servidumbre social.
  - «Herencia» se usa para נחלה como término teológico-covenantal constante en la traducción.
