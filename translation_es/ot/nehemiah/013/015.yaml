base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/013/015.yaml
  text: In those days I saw in Judah people treading winepresses on the Sabbath[a], and bringing in heaps of grain and loading them on donkeys—and also wine, grapes, figs, and every kind of load—and bringing them into Jerusalem on the Sabbath day[c][b]. So I testified against them on the day they sold provisions.
  footnotes:
  - marker: a
    text: Or 'heaps' or 'piles'; the Hebrew does not explicitly say 'of grain,' though the context of harvest transport suggests produce.
    reason: lexical_alternative
  - marker: b
    text: Or 'I warned them' or 'I protested'; the Hebrew verb can carry the sense of solemn warning or testimony against wrongdoing.
    reason: lexical_alternative
  - marker: c
    text: Or 'provisions' or 'game'; the Hebrew word can refer more specifically to hunted food, but here likely means food being sold.
    reason: lexical_alternative
