translation:
  language: es
  text: 'David dijo: «¿Qué he hecho ahora? ¿No fue solo una palabra[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿No fue solo un asunto?». El hebreo דָּבָר puede significar «palabra», «asunto» o «cosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר introduce discurso directo; en español, «dijo» es la equivalencia natural y sobria en narrativa.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: מֶה עָשִׂיתִי עָתָּה
  english_pob_choice: What have I done now?
  chosen_spanish: ¿Qué he hecho ahora?
  alternatives_spanish:
  - ¿Qué hice ahora?
  - ¿Qué he hecho esta vez?
  lexicon: HALOT
  rationale: La pregunta expresa protesta o desconcierto de David. «¿Qué he hecho ahora?» conserva la fuerza inmediata del hebreo y su referencia al presente relevante sin volverla más explicativa de lo que permite el texto.
- source_word: הֲלוֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿No es
  - ¿Acaso no fue
  - ¿No era
  lexicon: HALOT
  rationale: La partícula espera respuesta afirmativa; en español, la forma interrogativa negativa mantiene ese tono retórico. «Fue» sigue el matiz retrospectivo del contexto, sin forzar una paráfrasis.
- source_word: דָּבָר
  english_pob_choice: just a word
  chosen_spanish: más que una palabra
  alternatives_spanish:
  - solo una palabra
  - solo un asunto
  - solo una cosa
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «cosa». Aquí la réplica minimiza la acción de David como algo verbal; «más que una palabra» preserva la ambigüedad semántica y suena natural en español, sin cerrar el sentido a una sola opción.
- source_word: הוּא
  english_pob_choice: it
  chosen_spanish: —
  alternatives_spanish:
  - eso
  - ello
  lexicon: HALOT
  rationale: El pronombre hebreo queda absorbido en la estructura idiomática española; no requiere un equivalente explícito separado.
theological_decisions:
- issue: 'Valor de דָּבָר: ‘palabra’ frente a ‘asunto/cosa’'
  english_pob_reading: Or, “Was it not just a matter?” The Hebrew word דָּבָר can mean “word,” “matter,” or “thing.”
  chosen_spanish_reading: «¿No fue más que una palabra?» con la posibilidad implícita de «asunto/cosa».
  alternative_spanish_readings:
  - ¿No fue más que un asunto?
  - ¿No fue más que una cosa?
  - ¿No fue solo charla?
  rationale: La lectura inglesa preserva la tensión léxica de דָּבָר. En español, «palabra» comunica bien la minimización del habla de David, mientras que «asunto/cosa» queda como alternativa semántica real sin imponerla en el texto principal.
  doctrine_reference: Léxico hebreo; no doctrinal
- issue: Fuerza retórica de la pregunta
  english_pob_reading: Was it not just a word?
  chosen_spanish_reading: ¿No fue más que una palabra?
  alternative_spanish_readings:
  - ¿Acaso no fue solo una palabra?
  - ¿No era más que una palabra?
  rationale: La construcción interrogativa negativa conserva el tono de protesta y espera afirmativa del hebreo הֲלוֹא, sin suavizarlo a una simple aseveración.
  doctrine_reference: Retórica del texto; no doctrinal
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «only a word» a «just a word» para naturalidad, manteniendo el mismo campo semántico de דָּבָר. La versión española sigue esa decisión de naturalidad, pero preserva la ambigüedad léxica con «más que una palabra» y una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «David» como nombre propio estándar.
  - Se usa «dijo» para el narrativo אמר, en línea con un registro bíblico claro y no arcaizante.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el Tetragrámaton.
  - Se conserva la interrogación retórica con signo de apertura y cierre, y se usa puntuación española convencional.
