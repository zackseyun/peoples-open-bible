translation:
  language: es
  text: Por aquel tiempo, Antíoco emprendió su segunda expedición a Egipto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envió» o «despachó» su segunda campaña a Egipto. El griego puede expresarse más literalmente con un verbo como «envió» o «despachó», y ἔφοδος puede significar «ataque», «campaña» o «expedición».
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τὸν καιρὸν τοῦτον
  english_pob_choice: About that time
  chosen_spanish: Por aquel tiempo
  alternatives_spanish:
  - Alrededor de este tiempo
  - Con respecto a este tiempo
  lexicon: LSJ
  rationale: La expresión temporal con περί + acusativo introduce el marco narrativo. «Por aquel tiempo» es natural en español y conserva el valor aproximado sin volver la frase rígidamente literal.
- source_word: τὴν δευτέραν ἔφοδον
  english_pob_choice: his second expedition
  chosen_spanish: su segunda expedición
  alternatives_spanish:
  - su segundo ataque
  - su segunda campaña
  - su segunda invasión
  lexicon: LSJ
  rationale: ἔφοδος puede abarcar ataque, campaña o expedición. En este contexto histórico-militar, «expedición» comunica bien la marcha organizada hacia Egipto. Se mantiene «segunda» y se omite la explicitación de «su» en nota porque el español lo exige de modo natural con el posesivo del sujeto.
- source_word: ὁ Ἀντίοχος
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antíoco el rey
  lexicon: Policy transliteration
  rationale: Nombre propio transliterado conforme a la política del proyecto. No se añade título porque el griego aquí presenta solo el nombre, y el contexto narrativo ya identifica al personaje.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: into Egypt
  chosen_spanish: contra Egipto
  alternatives_spanish:
  - a Egipto
  - hacia Egipto
  lexicon: LSJ
  rationale: Aunque εἰς puede expresar movimiento hacia/into, en una expedición militar la dirección se entiende como avance hostil. «Contra Egipto» expresa mejor la fuerza bélica del contexto en español sin negar el componente direccional.
- source_word: ἐστέλατο
  english_pob_choice: launched
  chosen_spanish: emprendió
  alternatives_spanish:
  - despachó
  - salió en
  - lanzó
  lexicon: LSJ
  rationale: 'El medio/momento de στέλλω admite la idea de ponerse en marcha o emprender. «Emprendió» es idiomático y fiel al acto de iniciar la campaña, evitando un calco poco natural como «lanzó». '
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en el sentido general y en la ambigüedad de ἔφοδος; la única adaptación relevante es elegir una formulación española que haga explícita la hostilidad implícita del movimiento militar al decir «contra Egipto».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, apropiado para la prosa histórica de 2 Macabeos.
  - Se evitó «SEÑOR» y otros términos no pertinentes; no hay vocabulario teológico especial en este versículo.
  - La nota al pie conserva la alternativa léxica principal documentada por el POB en inglés.
