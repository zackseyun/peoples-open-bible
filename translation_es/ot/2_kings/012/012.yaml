translation:
  language: es
  text: Y entregaron la plata pesada en manos[a] de los obreros que estaban puestos a cargo de la casa de Yahvé[b], y la pagaron a los carpinteros y a los constructores que trabajaban en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la mano de»; el giro hebreo expresa entrega a la custodia o responsabilidad de alguien.
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, el nombre divino; aquí se traduce «Yahvé» en lugar de sustituirlo por un título.
    reason: alternative_reading
lexical_decisions:
- source_word: הַכֶּסֶף הַמְתֻכָּן
  english_pob_choice: the weighed-out silver
  chosen_spanish: la plata pesada
  alternatives_spanish:
  - la plata medida
  - el dinero contado
  - la plata tasada
  lexicon: HALOT
  rationale: En este contexto de entrega para obra del templo, מְתֻכָּן comunica una cantidad cuantificada y lista para ser distribuida. «Plata pesada» conserva la idea concreta de metal monetario y de cantidad verificada, sin forzar «dinero» donde el hebreo habla literalmente de plata.
- source_word: עַל יַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano
  alternatives_spanish:
  - en la mano de
  - a cargo de
  - bajo la responsabilidad de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice «en/por mano de». En español, «en mano de» mantiene esa textura semítica y su valor de entrega/encargo con buena naturalidad; por eso se conserva y se ancla con nota.
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: the workmen
  chosen_spanish: los encargados
  alternatives_spanish:
  - los obreros
  - los trabajadores
  - los que hacían la obra
  lexicon: HALOT
  rationale: El hebreo describe a quienes estaban a cargo del trabajo, no solo a obreros genéricos. «Encargados» refleja mejor la función administrativa implícita en el versículo y prepara la cláusula siguiente sobre la distribución del dinero.
- source_word: הַפְּקֻדִים בֵּית יְהוָה
  english_pob_choice: who were appointed over the house of the LORD
  chosen_spanish: sobre la casa de Yahvé
  alternatives_spanish:
  - de la casa de Yahvé
  - encargados de la casa de Yahvé
  - puestos sobre la casa de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea incluye la idea de nombramiento/supervisión sobre la casa de Yahvé. En español, la preposición «sobre» conserva esa relación de autoridad o administración. Se mantiene «Yahvé» por la política terminológica del proyecto.
- source_word: וַיּוֹצִיאֻהוּ
  english_pob_choice: and they paid it out
  chosen_spanish: y la pagaron
  alternatives_spanish:
  - y la sacaron
  - y la distribuyeron
  - y la desembolsaron
  lexicon: HALOT
  rationale: Aunque el verbo base significa «sacar», en contexto financiero la acción es la de desembolsar fondos. «La pagaron» es la opción española más natural y clara para expresar ese uso distributivo sin perder la referencia al dinero entregado.
- source_word: לְחָרָשֵׁי הָעֵץ
  english_pob_choice: to the carpenters
  chosen_spanish: a los carpinteros
  alternatives_spanish:
  - a los artesanos de la madera
  - a los trabajadores de madera
  - a los carpinteros de madera
  lexicon: HALOT
  rationale: La expresión alude específicamente a trabajadores de madera. «Carpinteros» es el equivalente español más claro y tradicionalmente inteligible, sin estrechar indebidamente el oficio más allá de lo que el contexto permite.
- source_word: וְלַבֹּנִים
  english_pob_choice: and the builders
  chosen_spanish: y a los albañiles
  alternatives_spanish:
  - y a los constructores
  - y a los edificadores
  - y a los masones
  lexicon: HALOT
  rationale: בֹּנִים puede abarcar constructores en general, pero en español «albañiles» comunica bien la labor de edificación en un proyecto material. Se evita «masones», que podría sonar más estrecho o menos natural en lectura pública.
- source_word: הָעֹשִׂים בֵּית יְהוָה
  english_pob_choice: who were working on the house of the LORD
  chosen_spanish: que trabajaban en la casa de Yahvé
  alternatives_spanish:
  - que hacían la casa de Yahvé
  - que estaban reparando la casa de Yahvé
  - que trabajaban en la casa de Yahvé
  lexicon: HALOT
  rationale: El participio expresa labor activa sobre el templo. «Trabajaban en» reproduce bien esa actividad sin sobreespecificar «reparando», aunque la restauración del templo está en el trasfondo narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada «Yahvé», conforme a la terminología del proyecto y al valor del Tetragrámaton en el texto hebreo. No se sustituye por un título como «Señor».
theological_decisions:
- issue: El nombre divino יְהוָה en un contexto de financiamiento del templo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre propio del pacto, no un título genérico. En español se preserva «Yahvé» para mantener visible esa elección teológica y textual, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: El sentido administrativo de עַל יַד / הַפְּקֻדִים
  english_pob_reading: into the hand of ... who were appointed over
  chosen_spanish_reading: en mano de ... encargados sobre
  alternative_spanish_readings:
  - a cargo de
  - bajo la supervisión de
  rationale: La frase no describe solo una entrega física, sino un traspaso de responsabilidad y administración. La formulación española conserva la tensión entre el gesto concreto de entrega y la comisión oficial sobre la obra.
  doctrine_reference: Terminología POB sobre custodia y administración de recursos del templo
translation_notes:
  revision_awareness: 'El borrador sigue el sentido del texto hebreo y del audit trail inglés sin depender mecánicamente de la redacción inglesa. Se mantuvieron las decisiones ya estabilizadas: equivalencia funcional para la entrega del dinero, conservación del nombre divino como Yahvé y lectura administrativa del encargo sobre la obra. No se detectaron revisiones posteriores que alteren estas opciones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Plata» conserva el valor material del hebreo כֶּסֶף; no se generaliza como «dinero» en el texto principal.
  - «Carpinteros» y «albañiles» son términos claros para lectura pública y compatibles con el contexto de restauración del templo.
  - La nota [a] cubre la idiomática hebrea de «en la mano de»; la nota [b] explica la transliteración del nombre divino.
