translation:
  language: es
  text: Que perezca en fuego llameante la lengua de los murmuradores[a], lejos de los devotos[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calumniadores» para «murmuradores».
    reason: lexical_alternative
  - marker: b
    text: O «piadosos» para «devotos».
    reason: lexical_alternative
  - marker: c
    text: O «lejos de los santos».
    reason: previous_rendering
lexical_decisions:
- source_word: γλῶττα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - voz
  lexicon: LSJ
  rationale: En español, "lengua" conserva la imagen concreta del órgano y mantiene el paralelo poético con el inglés POB "tongue". "Habla" o "voz" abstractan demasiado y debilitan la fuerza figurada.
- source_word: ψιθύρων
  english_pob_choice: whisperers
  chosen_spanish: susurradores
  alternatives_spanish:
  - murmuradores
  - calumniadores
  - chismosos
  lexicon: LSJ
  rationale: El griego designa a quienes susurran en secreto; "susurradores" conserva la imagen literal y deja que el contexto exprese la carga moral. "Calumniadores" sería una interpretación más explícita, preservada como alternativa en nota.
- source_word: ἀπόλοιτο
  english_pob_choice: perish
  chosen_spanish: perezca
  alternatives_spanish:
  - sea destruida
  - sea borrada
  lexicon: LSJ
  rationale: El optativo expresa un deseo de juicio; "perezca" suena natural, solemne y mantiene el matiz de maldición sin sobreespecificar el modo de destrucción.
- source_word: ἐν πυρὶ φλογός
  english_pob_choice: in flaming fire
  chosen_spanish: en fuego ardiente
  alternatives_spanish:
  - en fuego flamígero
  - en el fuego de la llama
  - en fuego llameante
  lexicon: LSJ
  rationale: La expresión duplica la imagen del fuego; "fuego ardiente" comunica el énfasis poético de manera idiomática en español sin perder la intensidad. Evita una calca torpe como "en fuego de llama".
- source_word: ὁσίων
  english_pob_choice: devout
  chosen_spanish: devotos
  alternatives_spanish:
  - piadosos
  - fieles
  - santos
  lexicon: LSJ
  rationale: En Psalmos de Salomón, ὅσιοι se refiere al grupo de los piadosos/devotos, no a ἅγιοι "santos". "Devotos" sigue el audit trail inglés y expresa mejor la identidad sociológica del grupo que "santos", que en español podría sugerir otro término técnico.
theological_decisions:
- issue: 'Alcance de ὁσίων: identidad del grupo al que se aparta la maldición'
  english_pob_reading: away from the devout
  chosen_spanish_reading: lejos de los devotos
  alternative_spanish_readings:
  - lejos de los santos
  - lejos de los piadosos
  rationale: El contexto editorial del POB indica que ὅσιοι aquí nombra a los devotos/piadosos como grupo específico. "Devotos" evita confundirlo con "santos" y sigue la decisión revisada del inglés POB. "Piadosos" es semánticamente válido, pero menos directo como designación grupal en español actual.
  doctrine_reference: lexical/theological distinction between ὅσιος and ἅγιος in the Psalms of Solomon tradition
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrigió el inglés POB de «away from the holy ones» a «away from the devout», porque el contexto de Psalmos de Salomón usa ὅσιοι en el sentido de los devotos/piadosos y no como ἅγιοι. La versión española sigue esa decisión revisada y evita introducir «santos» como lectura principal.
  spanish_consistency_notes:
  - Se mantuvo el tono de imprecación/jussivo con «Que perezca» para reflejar el optativo griego y el «May» del inglés POB.
  - «Lengua» conserva la imaginería corporal del original y armoniza con el estilo poético del corpus.
  - Se evitó «Señor» u otras sustituciones no presentes en el versículo.
  - La preposición «lejos de» representa con naturalidad ἀπὸ sin añadir matices no respaldados por el texto.
