lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En este contexto genealógico, בְּנֵי introduce a los varones listados como pertenecientes a Simei. «Los hijos de» conserva de modo natural y transparente la relación inmediata que el hebreo expresa.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  lexicon: Transliteración / uso hispánico bíblico
  rationale: Se mantiene el nombre propio en forma transliterada, adaptado a la ortografía hispana común. «Simei» es la forma más natural en español para este nombre.
- source_word: שלמות
  english_pob_choice: Shelomoth
  chosen_spanish: Selomot
  alternatives_spanish:
  - Selomit
  - Shelomot
  - Shelomith
  lexicon: Transliteración del nombre propio
  rationale: La forma consonántica y el contexto genealógico favorecen un nombre masculino. En español, «Selomot» conserva mejor la forma hebrea que una adaptación tradicionalizante como «Selomith».
- source_word: וַחֲזִיאֵל
  english_pob_choice: Haziel
  chosen_spanish: Haziel
  alternatives_spanish:
  - Jaziel
  lexicon: Transliteración del nombre propio
  rationale: Se conserva el nombre propio de manera directa. La forma con H refleja el valor de ח en transliteración bíblica amplia, como en el POB inglés.
- source_word: וְהָרָן
  english_pob_choice: and Haran
  chosen_spanish: y Harán
  alternatives_spanish:
  - y Haran
  lexicon: Transliteración del nombre propio
  rationale: Se traduce la conjunción con naturalidad y se translitera el nombre propio. «Harán» respeta la acentuación hispana y evita ambigüedad de lectura.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - tres en total
  lexicon: HALOT
  rationale: El cardinal resume explícitamente a los tres nombres mencionados; se mantiene como dato total, sin diluirlo en la sintaxis.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo retoma a los tres individuos mencionados. En español, «Estos» es la forma más directa y concordante con el referente masculino plural implícito.
- source_word: רָאשֵׁי
  english_pob_choice: heads of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: En contextos genealógico-administrativos, רָאשֵׁי señala cabezas o representantes principales. «Jefes de» transmite de forma clara la función de autoridad o representación.
- source_word: הָאָבוֹת
  english_pob_choice: the fathers’ houses
  chosen_spanish: las casas paternas
  alternatives_spanish:
  - las casas de los padres
  - las casas ancestrales
  lexicon: HALOT
  rationale: La expresión crónica apunta a unidades parentales/clánicas. «Casas paternas» conserva la estructura semítica y evita reducirla a «familias».
- source_word: לְלַעְדָּן
  english_pob_choice: of Ladan
  chosen_spanish: de Ladan
  alternatives_spanish:
  - para Ladan
  - pertenecientes a Ladan
  lexicon: HALOT
  rationale: El prefijo ל marca pertenencia o relación genealógica. En español, «de Ladan» reproduce de manera natural esa relación sin sobreespecificarla.
translation_notes:
  revision_awareness: Se ha revisado la lectura del nombre שלמות en el contexto genealógico de 1 Crónicas 23:9 y se ha preferido una transliteración española más cercana a la forma hebrea, manteniendo la nota alternativa documentada por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene la terminología genealógica con «hijos», «jefes» y «casas paternas» para conservar la estructura del hebreo.
  - Los nombres propios se transliteran con ortografía española estable y acentuación cuando ayuda a la lectura.
  - No se introduce interpretación adicional sobre la función de Ladan más allá de la relación genealógica explícita en el texto.
