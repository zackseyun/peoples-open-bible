translation:
  language: es
  text: 'Porque así me dijo Yahvé, el Dios de Israel: «Toma de mi mano esta copa del vino de la ira[a], y haz beberlo a todas las naciones a las cuales yo te envío».'
  philosophy: formal
  footnotes:
  - marker: a
    text: O «furia».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según el estándar del proyecto. En español, «Yahvé» comunica el Tetragrámaton sin ocultarlo bajo un título.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For thus said
  chosen_spanish: Porque así dijo
  alternatives_spanish:
  - Porque esto es lo que dijo
  - Pues así dijo
  lexicon: HALOT
  rationale: «כִּי» introduce la cláusula con valor discursivo/causal, y «כֹה אָמַר» se vierte de modo formal como «así dijo», manteniendo el registro profético y la fuerza demonstrativa sin sobreparafrasear.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  lexicon: HALOT
  rationale: Construcción nominal estándar y directa; «Dios de Israel» es la equivalencia natural y fiel en español.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: Marca de dirección personal en español. Se mantiene explícito el destinatario del habla divina.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - AgarrA
  lexicon: HALOT
  rationale: Imperativo simple y fiel al Qal. «Toma» conserva la orden directa en español natural.
- source_word: כּוֹס
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - vaso
  - cáliz
  lexicon: HALOT
  rationale: «Copa» es la imagen concreta y bíblica más natural en español para el recipiente simbólico del juicio.
- source_word: הַיַּיִן הַחֵמָה
  english_pob_choice: the wine of wrath
  chosen_spanish: el vino de la ira
  alternatives_spanish:
  - el vino de la furia
  - el vino del enojo
  lexicon: HALOT
  rationale: Se conserva la metáfora del vino asociado al juicio divino. «Ira» es el equivalente más sobrio y teológicamente estable para חֵמָה; «furia» expresa la alternativa lexical que el inglés POB consignó, pero en español suena más intensa y menos medida.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi propia mano
  - de mi mano misma
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal de entrega directa, sin explicitar más de lo que el hebreo dice.
- source_word: וְהִשְׁקִיתָה
  english_pob_choice: make ... drink
  chosen_spanish: da a beber
  alternatives_spanish:
  - haz beber
  - haz que beba
  lexicon: HALOT
  rationale: El hiphil causativo se expresa con una forma natural y compacta en español. «Da a beber» preserva la causación sin sonar mecánico.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: En el contexto de juicio internacional de Jeremías, גּוֹיִם designa «naciones». Se evita «gentiles» por ser menos exacto en español contemporáneo.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ אוֹתְךָ אֲלֵיהֶם
  english_pob_choice: to whom I am sending you
  chosen_spanish: a las cuales yo te envío
  alternatives_spanish:
  - adonde yo te envío
  - a quienes yo te envío
  lexicon: HALOT
  rationale: Se conserva el relativo y el participio/imperfectivo de comisión con claridad formal. «A las cuales» concuerda con «naciones» y mantiene el vínculo sintáctico.
theological_decisions:
- issue: חֵמָה como término de juicio divino
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - furia
  - enojo
  rationale: La escena representa el juicio de Yahvé bajo la metáfora de una copa que se bebe. «Ira» conserva el peso teológico sin resolver la intensidad emocional en una sola dirección; «furia» es posible, pero más abrupta en español.
  doctrine_reference: Preservación de la tensión léxica-teológica en profecía de juicio; evitar suavizar el juicio divino.
translation_notes:
  revision_awareness: El inglés POB revisó la apertura de «For this is what ... said» a «For thus said» para reflejar mejor כִּי כֹה אָמַר con registro formal. La versión española sigue ese mismo ajuste con «Porque así dijo», manteniendo la estructura profética y sin introducir una paráfrasis explicativa. También se respetó la decisión lexical de traducir הַחֵמָה con una opción de ira/juicio y no atenuarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, consistente con el proyecto.
  - Se conserva «naciones» para גּוֹיִם, alineado con el contexto de juicio internacional.
  - La metáfora de la copa y del vino se preserva sin explicaciones añadidas.
  - El español usa «a mí» explícito para reflejar la dirección personal del discurso divino.
  - Se evita «SEÑOR» para no ocultar el nombre propio del texto fuente.
