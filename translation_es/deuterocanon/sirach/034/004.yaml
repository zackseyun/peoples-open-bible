- from: ¿De lo impuro[a], qué podrá ser hecho limpio? ¿Y de la falsedad, qué podrá volverse verdadero?
  to: ¿De lo impuro[a], qué llegará a ser limpio? ¿Y de la falsedad, qué llegará a ser verdadero?
