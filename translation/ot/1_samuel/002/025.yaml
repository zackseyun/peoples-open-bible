id: 1SA.2.25
reference: 1 Samuel 2:25
source:
  edition: WLC
  text: אִם יֶחֱטָ֨א אִ֤ישׁ לְ/אִישׁ֙ וּ/פִֽלְל֣/וֹ אֱלֹהִ֔ים וְ/אִ֤ם לַֽ/יהוָה֙ יֶֽחֱטָא אִ֔ישׁ מִ֖י יִתְפַּלֶּל ל֑/וֹ וְ/לֹ֤א יִשְׁמְעוּ֙ לְ/ק֣וֹל אֲבִי/הֶ֔ם כִּֽי חָפֵ֥ץ יְהוָ֖ה לַ/הֲמִיתָֽ/ם־־־־׃
translation:
  text: If a man sins against another man[a], God will mediate for him; but if a man sins against Yahweh, who will pray for him? But they would not listen to the voice of their father[b], because Yahweh desired to put them to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the judges will judge him.' The Hebrew אֱלֹהִים can sometimes refer to human judges; here the main text reads 'God' because the contrast with 'the LORD' favors a divine referent.
    reason: alternative_reading
  - marker: b
    text: Or 'who will intercede for him?' The Hebrew verb can carry the sense of praying or interceding.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֱטָא
  chosen: sins
  alternatives:
  - does wrong
  - offends
  lexicon: HALOT
  rationale: The verb חטא commonly means 'to sin' or 'to miss the mark.' 'Sins' preserves the moral and theological force of the Hebrew better than a weaker rendering such as 'does wrong.'
- source_word: אִישׁ לְאִישׁ
  chosen: a man ... another man
  alternatives:
  - someone ... another person
  - a man ... his fellow
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular in both instances. Per the translation philosophy, a gender-accurate rendering is preferred. 'Another man' clearly expresses the interpersonal offense signaled by לְאִישׁ.
- source_word: וּפִלְלוֹ
  chosen: will mediate for him
  alternatives:
  - will judge him
  - will arbitrate for him
  - will intercede for him
  lexicon: HALOT
  rationale: From פלל in the piel, the sense here is that God acts as adjudicator or mediator in a dispute between humans. 'Will mediate for him' captures the judicial-relational sense without implying merely condemnation. Because the same root appears later in the hitpael ('pray'), this rendering also preserves the semantic connection while fitting the context.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the judges
  lexicon: HALOT
  rationale: Although אֱלֹהִים can in some contexts refer to judges, the parallel with 'against the LORD' and the theological force of the warning favor 'God' here. The singular verbal/pronominal sense in translation also supports this reading.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  lexicon: HALOT
  rationale: The preposition marks the object offended. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: מִי יִתְפַּלֶּל לוֹ
  chosen: who will pray for him?
  alternatives:
  - who will intercede for him?
  - who will mediate for him?
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'to pray' or 'to intercede.' 'Pray for him' is the most natural English and preserves the rhetorical force of the question. 'Intercede' is a viable alternative and is preserved in a footnote because it highlights the connection with the earlier verb.
- source_word: וְלֹא יִשְׁמְעוּ לְקוֹל אֲבִיהֶם
  chosen: But they would not listen to the voice of their father
  alternatives:
  - But they did not listen to their father's voice
  - But they would not obey their father
  lexicon: HALOT
  rationale: '''Would not listen'' captures both refusal and ongoing resistance. Retaining ''the voice of their father'' stays close to the Hebrew idiom while remaining understandable in English.'
- source_word: כִּי חָפֵץ יְהוָה
  chosen: because the LORD desired
  alternatives:
  - because the LORD was pleased
  - because the LORD had determined
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, desiring, or willing. 'Desired' best preserves the lexical sense without softening the severity of the statement. 'Had determined' is interpretive and less directly lexical.
- source_word: לַהֲמִיתָם
  chosen: to put them to death
  alternatives:
  - to kill them
  - to cause their death
  lexicon: HALOT
  rationale: The hiphil infinitive of מות is causative. 'To put them to death' is idiomatic, weighty, and accurately reflects the causative force.
