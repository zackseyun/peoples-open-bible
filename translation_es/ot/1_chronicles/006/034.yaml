  - severity: medium
    issue: La preposición 'sobre' en ambos altares suena menos natural en español
    rationale: Aunque no es imposible, en español bíblico natural para el acto cultual se prefiere 'en el altar' antes que 'sobre el altar' en este tipo de formulación.
  - severity: low
    issue: La nota 'Santo de los santos' es menos idiomática que 'santo de los santos'
    rationale: En la alternativa tradicional, la forma sin mayúscula inicial en 'santo' suele leerse mejor en español cuando no funciona como nombre propio fijo.
