translation:
  language: es
  text: 'y traerá su ofrenda por la culpa[a] a Yahvé, por el pecado que ha cometido: una hembra del rebaño, una cordera o una cabra, como ofrenda por el pecado; y el sacerdote hará expiación por él por su pecado[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ofrenda para la culpa» o «su ofrenda de reparación». El hebreo usa un término asociado con culpa/reparación (אשם), mientras que más adelante en el versículo se especifica «como ofrenda por el pecado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de su pecado». La expresión puede enfatizar la remoción del pecado como resultado de la expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: and he shall bring
  chosen_spanish: y traerá
  alternatives_spanish:
  - y deberá traer
  - y llevará
  lexicon: HALOT
  rationale: En material legal, el verbo con sentido injuntivo/futuro se expresa naturalmente en español con futuro simple. «Traerá» conserva la prescripción sin sonar demasiado perifrástico.
- source_word: אֲשָׁמוֹ
  english_pob_choice: his guilt offering
  chosen_spanish: su ofrenda por la culpa
  alternatives_spanish:
  - su ofrenda de culpa
  - su ofrenda de reparación
  lexicon: HALOT
  rationale: El término אשם puede referirse a culpa/reparación y el auditrail inglés retiene esa tensión. En español, «ofrenda por la culpa» conserva el vínculo con la culpa sin borrar el matiz sacrificial y deja visible la ambigüedad del término.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliterar יהוה como «Yahvé» en vez de ocultarlo con un sustituto. La preposición se ajusta al español culto y bíblico.'
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for his sin that he has committed
  chosen_spanish: por el pecado que ha cometido
  alternatives_spanish:
  - a causa de su pecado que cometió
  - por su pecado que ha cometido
  lexicon: HALOT
  rationale: La construcción causal/relacional con עַל y el verbo cognado חטא se vierte de forma natural como «por el pecado que ha cometido», manteniendo el referente explícito al pecado realizado.
- source_word: נְקֵבָה
  english_pob_choice: a female
  chosen_spanish: una hembra
  alternatives_spanish:
  - una animal hembra
  - una hembra del animal
  lexicon: HALOT
  rationale: El hebreo especifica sexo del animal; «hembra» es breve y exacto en español, y el contexto inmediato aclara que se trata de ganado menor.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de entre el rebaño
  - del ganado menor
  lexicon: HALOT
  rationale: צאן denota pequeño ganado, especialmente ovejas y cabras. «Rebaño» es un equivalente natural y bíblicamente inteligible en español.
- source_word: כִּשְׂבָּה
  english_pob_choice: a lamb
  chosen_spanish: una cordera
  alternatives_spanish:
  - una oveja joven
  - una corderita
  lexicon: HALOT
  rationale: Como el hebreo especifica una hembra de ovino, «cordera» comunica mejor que el genérico «cordero» y mantiene la precisión sexual que ya marca el texto.
- source_word: אוֹ שְׂעִירַת עִזִּים
  english_pob_choice: or a female goat
  chosen_spanish: o una cabra
  alternatives_spanish:
  - o una chiva
  - o una cabra hembra
  lexicon: HALOT
  rationale: El hebreo indica una cabra hembra; en español, «cabra» funciona de manera natural y, junto con «hembra» al inicio del verso, no pierde la referencia a sexo animal.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para sacrificio por el pecado
  lexicon: HALOT
  rationale: En lenguaje sacrificial, חטאת suele corresponder a «ofrenda por el pecado». Se evita «purificación» porque el audit trail inglés mantiene «sin offering» para conservar la terminología cultual del texto.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: and the priest shall make atonement for him
  chosen_spanish: y el sacerdote hará expiación por él
  alternatives_spanish:
  - y el sacerdote hará propiciación por él
  - y el sacerdote lo reconciliará
  lexicon: HALOT
  rationale: «Hacer expiación» preserva el valor cultual de כפר sin imponer una teoría posterior específica. Es la opción más fiel y transparente en español bíblico contemporáneo.
- source_word: מֵחַטָּאתוֹ
  english_pob_choice: for his sin
  chosen_spanish: por su pecado
  alternatives_spanish:
  - de su pecado
  - desde su pecado
  lexicon: HALOT
  rationale: Después de «hará expiación», el valor relacional de מן se comunica con naturalidad como «por su pecado». La alternativa más literal «de su pecado» puede sonar menos clara en español.
theological_decisions:
- issue: Tensión lexical entre אשם y חטאת en la misma cláusula
  english_pob_reading: Retain 'guilt offering' for אֲשָׁמוֹ and 'sin offering' for לְחַטָּאת in the same verse
  chosen_spanish_reading: Retener «ofrenda por la culpa» para אֲשָׁמוֹ y «ofrenda por el pecado» para לְחַטָּאת en el mismo versículo
  alternative_spanish_readings:
  - «ofrenda de reparación» para suavizar la tensión
  - «ofrenda de purificación» para חטאת
  rationale: El hebreo yuxtapone ambos términos y la traducción no debe borrar esa fricción terminológica. «Ofrenda por la culpa» y «ofrenda por el pecado» dejan visible la estructura del texto y su lógica sacrificial.
  doctrine_reference: Principios de traducción 1, 3 y 5
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - Señor
  rationale: El proyecto exige reproducir el nombre divino con una forma transparente y auditable. «Yahvé» evita la sustitución convencional y sigue el criterio establecido para יהוה.
  doctrine_reference: 'Tabla doctrinal del nombre divino: יהוה / YHWH'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registraron cambios; el texto fue confirmado con alta concordancia entre revisores y sin observaciones abiertas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva la distinción cultual entre «ofrenda por la culpa» y «ofrenda por el pecado», sin armonizarla artificialmente.
  - «Hacer expiación» se usa como equivalente técnico de כפר.
  - La especificación sexual del animal se mantiene en español con «hembra», «cordera» y «cabra».
