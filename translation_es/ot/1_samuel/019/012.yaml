    text: 'O: «lo dejó bajar por la ventana».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de estilo y naturalidad en español sin cambiar el sentido del hebreo ni las decisiones léxicas principales: «Entonces» por «Así que», «se fue» por «fue», y coma en lugar de punto y coma. Se conserva la nota alternativa documentada para el valor causativo de וַתֹּרֶד.'
