translation:
  language: es
  text: 'Entonces Judá los reconoció y dijo[a]: «Ella es más justa que yo, porque no la di a Shelah, mi hijo». Y no volvió a conocerla[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Ella está más en lo correcto que yo».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «conocerla», eufemismo para relaciones sexuales.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּכֵּר
  english_pob_choice: recognized them
  chosen_spanish: lo reconoció
  alternatives_spanish:
  - los reconoció
  - la reconoció
  lexicon: HALOT
  rationale: El hebreo expresa que Judá identifica los objetos/prenda por el contexto inmediato; en español, como el referente ya está claro, «lo reconoció» mantiene la acción de reconocer sin forzar un plural que suena menos natural en la frase final.
- source_word: צָדְקָה מִמֶּנִּי
  english_pob_choice: She is more righteous than I
  chosen_spanish: Ella es más justa que yo
  alternatives_spanish:
  - Ella está más en lo correcto que yo
  - Ella es más recta que yo
  lexicon: HALOT
  rationale: «Justa» conserva la conexión léxica con צדק y permite la comparación con «que yo». «Más en lo correcto» sería más explicativo, pero menos directo; «más recta» puede sonar menos natural en este contexto narrativo.
- source_word: נְתַתִּיהָ לְשֵׁלָה בְנִי
  english_pob_choice: I did not give her to Shelah my son
  chosen_spanish: no la di a Shelah, mi hijo
  alternatives_spanish:
  - no se la di a Shelah, mi hijo
  - no la di en matrimonio a Shelah, mi hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «darla a Shelah, mi hijo»; el sentido matrimonial está implícito en la narración. Se conserva la literalidad básica sin añadir «en matrimonio» al texto principal.
- source_word: וְלֹא יָסַף עוֹד לְדַעְתָּהּ
  english_pob_choice: And he did not know her again
  chosen_spanish: Y no volvió a conocerla
  alternatives_spanish:
  - Y no la conoció de nuevo
  - Y no volvió a tener relaciones con ella
  lexicon: HALOT
  rationale: «Conocerla» preserva el eufemismo hebreo de relaciones sexuales, y «no volvió» refleja bien el valor de cessation/continuación de יָסַף עוֹד. La opción explícita se deja fuera del texto principal para no sobreexplicar.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: Transliteration policy
  rationale: Nombre propio bíblico según la forma habitual en español.
- source_word: שֵׁלָה
  english_pob_choice: Shelah
  chosen_spanish: Shelah
  alternatives_spanish:
  - Séla
  lexicon: Transliteration policy
  rationale: Se conserva la transliteración auditada del POB en inglés para coherencia onomástica, sin imponer una adaptación española no documentada en el material provisto.
theological_decisions:
- issue: Valor moral de la confesión de Judá
  english_pob_reading: Judah acknowledges Tamar as more righteous than himself in this matter, without implying her absolute sinlessness or making a broader doctrinal claim.
  chosen_spanish_reading: Judá reconoce que Tamar tenía razón / era más justa que él en este asunto, sin convertir la comparación en una declaración de impecabilidad absoluta.
  alternative_spanish_readings:
  - Tamar fue totalmente inocente
  - Judá solo admite una superioridad procedimental de Tamar
  rationale: '«Más justa que yo» conserva la fuerza comparativa del hebreo y deja intacta la tensión narrativa: Judá se autocondena en este caso concreto, pero el texto no exige una afirmación absoluta sobre el carácter moral total de Tamar.'
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla indebidamente.
translation_notes:
  revision_awareness: 'No se requieren revisiones adicionales: la redacción sigue de cerca el hebreo y concuerda con el POB inglés en los puntos léxicos y narrativos clave.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de nombres propios con transliteración bíblica estándar en español.
  - Se conserva el eufemismo sexual de ידע mediante «conocerla», con nota explicativa.
  - La comparación moral se expresa con «más justa que yo» para preservar la tensión del original sin expandirla doctrinalmente.
  - La cláusula causal se integra de forma natural en español con «porque».
