translation:
  language: es
  text: Y si alguien ama la rectitud[a], sus labores son virtudes; porque enseña la templanza y la prudencia, la rectitud y el valor[b], que nada es más útil para los seres humanos en la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘justicia’. El griego δικαιοσύνη puede denotar tanto rectitud moral como justicia.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente ‘sus labores… enseña’, y conserva la personificación femenina de la rectitud en este versículo; el español la mantiene de forma implícita en ‘sus labores’ y en el sujeto tácito de ‘enseña’.
    reason: cultural_note
lexical_decisions:
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia moral
  lexicon: LSJ
  rationale: El término griego puede abarcar justicia y rectitud moral. En español, ‘justicia’ conserva esa amplitud y también refleja la alternativa lexical preservada por el POB inglés; aquí el contexto de una lista de virtudes permite usarla sin restringirla indebidamente a un ámbito jurídico.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama intensamente
  - estima
  lexicon: LSJ
  rationale: ‘Ama’ reproduce de manera natural y fiel el valor afectivo y volitivo del verbo, sin rebajarlo a mera preferencia o apreciación.
- source_word: οἱ πόνοι ταύτης
  english_pob_choice: her labors
  chosen_spanish: sus labores
  alternatives_spanish:
  - sus afanes
  - sus trabajos
  - sus toiles
  lexicon: LSJ
  rationale: ‘Labores’ traduce bien πόνοι como esfuerzos o trabajos. En español, el posesivo ‘sus’ deja implícita la personificación femenina de δικαιοσύνη sin forzar un pronombre explícito donde el giro resulta más natural.
- source_word: ἀρεταί
  english_pob_choice: virtues
  chosen_spanish: virtudes
  alternatives_spanish:
  - excelencias
  lexicon: LSJ
  rationale: ‘Virtudes’ es el equivalente idiomático más claro en la lista ética del verso. Mantiene el registro sapiencial y el plural abstracto del griego.
- source_word: σωφροσύνην
  english_pob_choice: self-control
  chosen_spanish: templanza
  alternatives_spanish:
  - autocontrol
  - moderación
  lexicon: LSJ
  rationale: Aunque el POB inglés eligió ‘self-control’, en español ‘templanza’ es un término clásico y plenamente comprensible para esta virtud; conserva el matiz de dominio de sí propio del término griego y encaja con la enumeración de virtudes.
- source_word: φρόνησιν
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría práctica
  - buen juicio
  lexicon: LSJ
  rationale: ‘Prudencia’ es la correspondencia directa y tradicional de φρόνησις en un catálogo de virtudes. Evita ampliar demasiado hacia ‘sabiduría práctica’ y mantiene el paralelismo con el original.
- source_word: ἀνδρείαν
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - coraje
  - fortaleza
  lexicon: LSJ
  rationale: ‘Valor’ comunica la virtud de la valentía de forma natural en español. Se evita ‘fortaleza’ por su posible ambigüedad con resistencia general, y se evita el matiz sexualizado de una traducción literal como ‘virilidad’.
- source_word: χρησιμώτερον
  english_pob_choice: more useful
  chosen_spanish: más útil
  alternatives_spanish:
  - más beneficioso
  - más provechoso
  lexicon: LSJ
  rationale: ‘Más útil’ sigue de cerca el comparativo griego y coincide con la decisión inglesa, sin introducir un sentido evaluativo más amplio que el del texto.
- source_word: ἐν βίῳ
  english_pob_choice: in life
  chosen_spanish: en la vida
  alternatives_spanish:
  - en la vida humana
  - en la existencia
  lexicon: LSJ
  rationale: La expresión conserva el ámbito general de la frase griega. ‘En la vida’ es natural en español y suficientemente amplio para el uso sapiencial del verso.
- source_word: ἀνθρώποις
  english_pob_choice: for human beings
  chosen_spanish: para los seres humanos
  alternatives_spanish:
  - para las personas
  - para los hombres
  lexicon: LSJ
  rationale: ‘Seres humanos’ refleja el valor genérico del dativo y evita la lectura masculinizada de ‘hombres’. Mantiene la universalidad del proverbio sapiencial.
theological_decisions:
- issue: Personificación femenina de la justicia/righteousness
  english_pob_reading: Retain feminine reference with 'her labors' and 'she teaches'
  chosen_spanish_reading: Conservar la personificación implícita sin necesidad de pronombres explícitos, mediante ‘sus labores’ y el sujeto tácito de ‘enseña’
  alternative_spanish_readings:
  - sus labores y ella enseña
  - sus labores y la justicia enseña
  - sus labores y su enseñanza
  rationale: El griego continúa la personificación femenina de δικαιοσύνη. En español, la repetición de pronombres femeninos puede sonar más forzada que en inglés; la formulación elegida conserva la personificación en el posesivo y en la concordancia implícita del sujeto verbal, sin perder la textura literaria del original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderización de δικαιοσύνη
  english_pob_reading: righteousness with justice as lexical alternative
  chosen_spanish_reading: justicia en el texto principal, con posible alternativa semántica de ‘rectitud’
  alternative_spanish_readings:
  - rectitud
  - justicia moral
  rationale: El término griego permite tanto justicia como rectitud moral. ‘Justicia’ es una opción bíblica clara y amplia en español; en este contexto sapiencial no obliga a una lectura meramente legal y permite conservar la alternativa reconocida por el audit trail.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Última cláusula proverbial
  english_pob_reading: than which nothing is more useful for human beings in life
  chosen_spanish_reading: de las cuales nada es más útil para los seres humanos en la vida
  alternative_spanish_readings:
  - que nada es más útil para los seres humanos en la vida
  - y no hay nada más útil para los seres humanos en la vida
  rationale: La construcción española intenta reproducir la comparación absoluta del griego sin volverla torpe. ‘De las cuales’ mantiene la referencia a las virtudes mencionadas y refleja la estructura relativa del original mejor que una paráfrasis libre.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y toma en cuenta la lectura inglesa auditada, especialmente la clausula final corregida para evitar una paráfrasis defectuosa. He evitado calcar el inglés cuando el español requería una estructura más natural, pero he preservado los elementos semánticos y la personificación del original.
  spanish_consistency_notes:
  - He mantenido ‘justicia’ como término principal y dejado la alternativa ‘rectitud’ en nota, acorde con el manejo POB de δικαιοσύνη.
  - ‘Templanza’ y ‘prudencia’ conservan el tono sapiencial de la lista de virtudes.
  - La clausula final procura seguir la comparación griega sin convertirla en una frase idiomática moderna que borre la estructura relativa del original.
  - El plural ‘seres humanos’ preserva el sentido genérico de ἀνθρώποις y evita ambigüedad sexista.
