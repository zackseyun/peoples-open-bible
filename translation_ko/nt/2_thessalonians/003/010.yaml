id: 2TH.3.10
reference: 2 Thessalonians 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γὰρ ὅτε ἦμεν πρὸς ὑμᾶς, τοῦτο παρηγγέλλομεν ὑμῖν, ὅτι εἴ τις οὐ θέλει ἐργάζεσθαι μηδὲ ἐσθιέτω.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/010.yaml
  text: 'For even when we were with you, we kept commanding you this: if anyone is not willing to work, neither let him eat.'
translation:
  language: ko
  text: '우리가 여러분과 함께 있을 때에도 우리는 여러분에게 이것을 거듭 명하곤 했습니다: 누구든지 일하기를 원하지 않으면[a] 먹지도 말라[b]는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 「일하기를 원하지 않으면」으로, 능력이 아니라 의지의 문제를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그로 먹지 못하게 하라」. 헬라어 명령형은 3인칭 단수.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_korean: ~할 때에도
  alternatives_korean:
  - ~조차
  - 진실로 ~할 때에도
  lexicon: BDAG
  rationale: 강조적 인과 연결을 「~할 때에도」 구조 안에 자연스럽게 녹인다.
- source_word: ὅτε ἦμεν πρὸς ὑμᾶς
  english_pob_choice: when we were with you
  chosen_korean: 우리가 여러분과 함께 있을 때
  alternatives_korean:
  - 우리가 여러분 곁에 있을 때
  lexicon: BDAG
  rationale: 표준 한국어 자연 표현.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_korean: 이것을
  alternatives_korean:
  - 다음 사항을
  lexicon: BDAG
  rationale: 다음 내용을 가리키는 지시사. 콜론으로 내용을 도입.
- source_word: παρηγγέλλομεν
  english_pob_choice: we kept commanding
  chosen_korean: 거듭 명하곤 했습니다
  alternatives_korean:
  - 명하고 있었습니다
  - 반복해서 명했습니다
  lexicon: BDAG
  rationale: 미완료의 반복 행위를 「거듭 ~하곤 했다」로 자연스럽게 표현한다.
- source_word: εἴ τις
  english_pob_choice: if anyone
  chosen_korean: 누구든지
  alternatives_korean:
  - 어떤 사람이든
  lexicon: BDAG
  rationale: 부정 조건의 폭넓은 의미.
- source_word: οὐ θέλει ἐργάζεσθαι
  english_pob_choice: is not willing to work
  chosen_korean: 일하기를 원하지 않으면
  alternatives_korean:
  - 일할 뜻이 없으면
  - 일하려 하지 않으면
  lexicon: BDAG
  rationale: 의지의 결여를 명확히 — 능력이 아니라 의지의 문제임을 보존한다.
- source_word: μηδὲ ἐσθιέτω
  english_pob_choice: neither let him eat
  chosen_korean: 먹지도 말라
  alternatives_korean:
  - 그도 먹지 못하게 하라
  - 먹을 자격이 없다
  lexicon: BDAG
  rationale: 3인칭 단수 명령형의 권면적·법칙적 명령을 「~지도 말라」로 자연스럽게 표현한다.
theological_decisions:
- issue: 일하기를 원하지 않음(의지)와 일할 수 없음(능력)의 구분
  chosen_reading: 의지 — 「원하지 않으면」
  alternative_readings:
  - 능력 — 「일할 수 없으면」
  rationale: θέλει는 의지를 가리키므로 무능력 함의를 도입하지 않는다. 본문은 게으름의 윤리적 문제를 다루지 약자에 대한 가혹한 사회 원칙을 세우지 않는다.
  doctrine_reference: 'Translation philosophy §1, §3'
- issue: 결과절의 성별 대명사
  chosen_reading: 「먹지도 말라」 — 한국어 명령형으로 자연스럽게 표현. 「그」를 명시하지 않아도 의미 전달 가능
  alternative_readings:
  - 「그로 먹지 못하게 하라」
  - 「그들도 먹지 못하게 하라」
  rationale: 한국어 명령형은 성별 대명사 없이도 자연스럽다. 헬라어의 단수 대표적 형식은 본문에서 일반화된 「누구든지」로 받는다.
  doctrine_reference: 'Translation philosophy §4'
