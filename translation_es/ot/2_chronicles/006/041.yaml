    reason: lexical_alternative
  - marker: b
    text: O «los piadosos», «los santos» o «los leales». חסיד puede expresar fidelidad pactual y piedad.
    reason: lexical_alternative
  - marker: c
    text: O «en el bien» o «en tu bondad». El hebreo dice literalmente «en lo bueno / en el bien», sin posesivo explícito.
    reason: alternative_reading
  revision_rationale: Se corrige la colocación de la nota [a] para que documente la alternativa léxica de עֻזֶּךָ («poder/fuerza/fortaleza»), en conformidad con el rastro auditado, y se mejora la naturalidad de «para tu lugar de reposo» a «a tu lugar de reposo». El resto del texto puede conservarse.
