translation:
  language: es
  text: Entonces Daniel fue a su casa e hizo saber el asunto a Hananía, Misael y Azarías, sus compañeros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sus amigos». El término arameo puede designar asociados o compañeros estrechamente vinculados con él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: El adverbio marca secuencia narrativa; «Entonces» es natural en español y conserva la progresión temporal sin añadir matices no presentes.
- source_word: לְבַיְתֵהּ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  lexicon: HALOT
  rationale: La forma con prefijo direccional y sufijo posesivo expresa movimiento hacia la vivienda de Daniel; «casa» es más literal que «hogar» y encaja con el contexto narrativo.
- source_word: אֲזַל
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue de camino
  - se dirigió
  lexicon: HALOT
  rationale: Verbo de desplazamiento simple; «fue» es la equivalencia española más directa y natural, sin introducir intención o matiz adicional.
- source_word: מִלְּתָא
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - el tema
  - el hecho
  lexicon: HALOT
  rationale: El sustantivo arameo es amplio; en este contexto se refiere al problema recién planteado. «Asunto» conserva esa amplitud y funciona bien en español formal.
- source_word: הוֹדַע
  english_pob_choice: made known
  chosen_spanish: hizo saber
  alternatives_spanish:
  - dio a conocer
  - informó
  lexicon: HALOT
  rationale: La forma causativa exige una expresión causativa en español. «Hizo saber» refleja con transparencia el valor verbal y mantiene la relación con el verbo de conocimiento.
- source_word: חַבְרוֹהִי
  english_pob_choice: his companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus amigos
  - sus asociados
  lexicon: HALOT
  rationale: El término puede abarcar asociados o personas estrechamente unidas; aquí, en el relato, «compañeros» conserva la relación cercana sin suavizarla en exceso con «amigos».
- source_word: וְלַחֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  english_pob_choice: to Hananiah, Mishael, and Azariah
  chosen_spanish: a Hananías, Misael y Azarías
  alternatives_spanish:
  - a Hananías, Misael y Azarías
  lexicon: HALOT
  rationale: Se transliteran los nombres personales en forma española estándar. El prefijo conjuntivo y preposicional se resuelve naturalmente con «a» ante la serie de destinatarios.
translation_notes:
  revision_awareness: 'Coincide con el sentido narrativo del hebreo/arameo y con la auditoría inglesa: secuencia temporal, movimiento hacia la casa, comunicación del asunto y referencia relacional a los tres compañeros de Daniel. No se detectan revisiones textuales relevantes en el pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en este versículo, sino porque no hay mención del nombre divino aquí.
  - 'Se optó por nombres personales en transliteración española: Hananías, Misael y Azarías.'
  - «Sus compañeros» preserva la relación cercana sin forzar «amigos» en el texto principal; esa alternativa queda en nota.
