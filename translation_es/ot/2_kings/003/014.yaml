translation:
  language: es
  text: 'Y Eliseo dijo: «¡Vive Yahvé de los ejércitos, ante quien estoy[a], que, si no fuera porque tengo consideración por Josafat, rey de Judá[b], no te miraría ni te vería!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante cuya presencia he estado/de pie». El giro también puede implicar servicio profético: «a quien sirvo».'
    reason: lexical_alternative
  - marker: b
    text: O «si no fuera por Josafat, rey de Judá, a quien considero». El hebreo usa un modismo con «levantar el rostro», que significa mostrar favor o consideración.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה צְבָאוֹת
  english_pob_choice: As Yahweh of hosts lives
  chosen_spanish: ¡Vive Yahvé de los ejércitos!
  alternatives_spanish:
  - ¡Tan cierto como vive Yahvé de los ejércitos!
  - ¡Por la vida de Yahvé de los ejércitos!
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne; en español, «¡Vive ...!» conserva la estructura breve y enfática sin volverlo una paráfrasis. «Yahvé» sigue el criterio del proyecto para el Nombre divino, y «de los ejércitos» mantiene צְבָאוֹת con sentido amplio sin especificar indebidamente 'armados' o 'celestiales'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: En español, «los ejércitos» comunica el título divino con naturalidad y mantiene la amplitud semántica del hebreo sin reducirlo a una sola imagen.
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  english_pob_choice: before whom I stand
  chosen_spanish: delante de quien me he puesto
  alternatives_spanish:
  - ante quien estoy
  - delante de quien estoy
  lexicon: HALOT
  rationale: El hebreo literalmente dice «delante de quien he estado/estoy». «Me he puesto» conserva la imagen de posición ante una autoridad y evita el calco rígido, pero mantiene la idea de estar en su presencia. Se reserva «servir» como alternativa interpretativa, no en el texto principal, porque el audit trail inglés privilegia la imagen literal.
- source_word: לוּלֵי פְּנֵי יְהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: were it not that I regard Jehoshaphat king of Judah
  chosen_spanish: si no fuera por la presencia de Josafat, rey de Judá
  alternatives_spanish:
  - si no fuera por Josafat, rey de Judá, a quien considero
  - si no fuera por Josafat, rey de Judá, a quien tengo en cuenta
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con «rostro/presencia». En español, «la presencia de Josafat» comunica la idea del interlocutor presente sin perder el valor idiomático. Se conserva la relación causal-excepcional de לוּלֵי con «si no fuera por».
- source_word: אֲנִי נֹשֵׂא
  english_pob_choice: I would not look at you
  chosen_spanish: no te miraría
  alternatives_spanish:
  - no te prestaría atención
  - no te consideraría
  lexicon: HALOT
  rationale: נָשָׂא con פָּנִים forma el modismo de mostrar favor/consideración. El español necesita resolver ese sentido en una forma natural; «no te miraría» mantiene el paralelismo con «te vería» y comunica rechazo sin sobreexplicar.
- source_word: אִם אַבִּיט אֵלֶיךָ
  english_pob_choice: I would not look at you
  chosen_spanish: no te miraría
  alternatives_spanish:
  - no te miraría siquiera
  - no te volvería a mirar
  lexicon: HALOT
  rationale: El valor apodósico del condicional hebreo exige la negación implícita. «No te miraría» reproduce el golpe de la negativa con registro formal y claro.
- source_word: וְאִם אֶרְאֶךָּ
  english_pob_choice: nor would I see you
  chosen_spanish: ni te vería
  alternatives_spanish:
  - ni siquiera te vería
  - ni te reconocería
  lexicon: HALOT
  rationale: Se preserva el paralelismo entre ver/mirar. «Ni te vería» mantiene la intensificación del segundo verbo sin fusionarlo con el primero.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: Standard transliteration adapted to Spanish usage
  rationale: En español bíblico es más natural la forma «Josafat». Se usa la adaptación estable del nombre propio para lectura eclesial amplia.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: Standard transliteration adapted to Spanish usage
  rationale: «Judá» es la forma estándar en español para el reino de Judah/Judah.
theological_decisions:
- issue: Uso del Nombre divino en la fórmula de juramento
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  rationale: El texto hebreo invoca directamente el Nombre divino como base del juramento. Se mantiene el Nombre propio «Yahvé» y el título «de los ejércitos» sin sustituirlo por una designación impersonal, siguiendo el criterio del proyecto para preservarlo audiblemente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La expresión de presencia/servicio ante Dios
  english_pob_reading: before whom I stand
  chosen_spanish_reading: delante de quien me he puesto
  alternative_spanish_readings:
  - ante quien sirvo
  - ante quien estoy
  rationale: La audit trail inglés preserva la imagen literal de estar de pie ante alguien, aunque reconozca la posible implicación de servicio profético. El español mantiene esa imagen sin convertirla en una explicación interpretativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: La negativa intensa del final
  english_pob_reading: I would not look at you or see you
  chosen_spanish_reading: no te miraría ni te vería
  alternative_spanish_readings:
  - no te miraría, ni siquiera te vería
  - no volvería a mirarte ni a verte
  rationale: La doble negación reproduce la escalada del hebreo y conserva los dos verbos distintos. No se funden en un solo verbo para no borrar el paralelismo retórico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió una condicionalidad idiomática («were it not that») y mantuvo la doble negación final con dos verbos. En español se reflejó esa misma preferencia mediante «si no fuera por» y la pareja «no te miraría ni te vería», evitando una paráfrasis más amplia que borre el paralelismo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se emplea «Josafat» como forma española estable del nombre propio.
  - «Judá» sigue la forma española habitual del reino.
  - Se mantiene el paralelismo verbal «miraría / vería» para reflejar «look / see».
  - No se usa «siervo» en el texto principal para no sustituir la imagen literal de estar delante de alguien por una glosa interpretativa.
