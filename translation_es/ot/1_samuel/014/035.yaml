translation:
  language: es
  text: Saúl levantó un altar para Yahvé[a]; este fue el primer altar que levantó para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «comenzó a edificarlo como altar a Yahvé». El modismo hebreo suele entenderse aquí como que este fue el primer altar de Saúl para Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: En el contexto de un altar, בנה puede expresarse naturalmente como 'edificó' o 'levantó' en español. 'Edificó' conserva el sentido de construir sin sonar técnico o arcaizante.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - sacrificio
  - aras
  lexicon: HALOT
  rationale: מִזְבֵּחַ corresponde de manera directa a 'altar'. Es el término preciso y ampliamente inteligible en español bíblico.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: La preposición ל aquí marca dedicación o relación. En español, 'a Yahvé' expresa bien la dirección/dedicación del altar sin sustituir el nombre divino por un título.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: este
  alternatives_spanish:
  - lo
  - ese altar
  lexicon: HALOT
  rationale: 'El pronombre retoma el altar mencionado; ''este'' en ''este fue...'' reproduce de forma natural la referencia resumptiva que el inglés POB resolvió con ''this''. '
- source_word: הֵחֵל
  english_pob_choice: was the first
  chosen_spanish: fue el primer
  alternatives_spanish:
  - comenzó
  - había comenzado
  lexicon: HALOT
  rationale: El hebreo admite una lectura idiomática que no describe solo el inicio del acto, sino que indica que se trata del primer altar de Saúl para Yahvé. 'Fue el primer' preserva esa lectura contextual.
- source_word: לִבְנוֹת
  english_pob_choice: he built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificar
  lexicon: HALOT
  rationale: 'Tras expresar el valor idiomático de הֵחֵל, el infinitivo queda absorbido en español como parte de la cláusula relativa: ''el primer altar que edificó''. Esto suena natural y sigue el sentido del hebreo.'
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: HALOT
  rationale: Forma española habitual del nombre propio hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El proyecto POB usa 'Yahweh' en inglés para reproducir el nombre del pacto. En español, el equivalente de proyecto es 'Yahvé', forma establecida y reconocible que mantiene el nombre propio divino sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación idiomática de אֹתוֹ הֵחֵל לִבְנוֹת
  english_pob_reading: this was the first altar he built to the LORD
  chosen_spanish_reading: este fue el primer altar que edificó a Yahvé
  alternative_spanish_readings:
  - comenzó a edificarlo como altar a Yahvé
  - este fue el primer altar que comenzó a edificar a Yahvé
  rationale: La construcción hebrea es idiomática y, según el audit trail inglés, el sentido más probable es que se trata del primer altar de Saúl para Yahvé. La traducción española conserva esa decisión sin forzar un calco sintáctico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense over tradition inertia'
translation_notes:
  revision_awareness: El texto sigue la revisión final del audit trail inglés, que prefirió 'this was the first altar...' por encima de una traducción más literal de 'he began to build it'. La versión española adopta esa lectura idiomática y la expresa con una construcción natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה, conforme al estándar del proyecto.
  - '''Edificó'' se usa para בנה en contexto de altar por claridad y naturalidad.'
  - La secuencia 'este fue el primer altar...' reproduce la resolución idiomática del inglés POB sin introducir material adicional.
