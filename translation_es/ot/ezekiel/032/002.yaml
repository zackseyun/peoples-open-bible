translation:
  language: es
  text: '«Hijo de hombre, alza una lamentación sobre el faraón, rey de Egipto, y dile: Fuiste como un león joven entre las naciones, pero fuiste como el monstruo en los mares[a]; irrumpiste en tus ríos, enturbiaste las aguas con tus pies, y ensuciaste sus ríos[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dragón» o «monstruo marino». El término hebreo aquí probablemente se refiere a una gran criatura acuática y deja cierta amplitud semántica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pisoteaste sus ríos». El verbo hebreo subraya la acción de pisotear; «ensuciaste» expresa el efecto dentro de la imagen acuática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene el idiomático hebreo y la forma vocativa tradicional sin borrar la distancia profética ni sustituirla por una paráfrasis.
- source_word: שָׂא קִינָה
  english_pob_choice: raise a lament
  chosen_spanish: alza una lamentación
  alternatives_spanish:
  - toma una lamentación
  - levanta un lamento
  lexicon: HALOT
  rationale: Expresa el imperativo profético de entonar un canto fúnebre con un español natural y solemne.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: el faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey de Egipto
  - el faraón, el rey de Egipto
  lexicon: HALOT
  rationale: Reproduce la secuencia titul ar sin añadir artículos innecesarios al título, y conserva la referencia histórica directa.
- source_word: כְּפִיר גּוֹיִם
  english_pob_choice: a young lion among the nations
  chosen_spanish: como un cachorro de león entre las naciones
  alternatives_spanish:
  - como un león joven entre las naciones
  - como un cachorro de león de entre las naciones
  lexicon: HALOT
  rationale: ‘כְּפִיר’ señala un león joven; ‘cachorro de león’ conserva la fuerza, la juventud y el matiz depredador que el POB inglés quiso preservar.
- source_word: נִדְמֵיתָ
  english_pob_choice: You were like
  chosen_spanish: fuiste como
  alternatives_spanish:
  - fuiste considerado como
  - te asemejaste a
  lexicon: HALOT
  rationale: Sigue la lectura pasiva/receptiva adoptada en el ajuste revisionado del POB inglés, evitando la expansión interpretativa de un reflexivo fuerte.
- source_word: כַּתַּנִּים בַּיַּמִּים
  english_pob_choice: like the monster in the seas
  chosen_spanish: como el monstruo en los mares
  alternatives_spanish:
  - como el monstruo marino en los mares
  - como el dragón en los mares
  lexicon: HALOT
  rationale: ‘תַּנִּים’ en este contexto acuático apunta a una criatura monstruosa del caos; ‘monstruo’ conserva la apertura semántica sin fijar innecesariamente una especie.
- source_word: וַתָּגַח
  english_pob_choice: you burst forth
  chosen_spanish: irrumpiste
  alternatives_spanish:
  - brotaste con fuerza
  - arremetiste
  lexicon: HALOT
  rationale: En la imagen de aguas y ríos, ‘irrumpiste’ transmite la salida violenta y súbita mejor que una traducción zoológica literal de ‘goring’.
- source_word: בְּנַהֲרוֹתֶיךָ
  english_pob_choice: in your rivers
  chosen_spanish: en tus ríos
  alternatives_spanish:
  - en tus corrientes
  - en tus canales
  lexicon: HALOT
  rationale: Conserva de manera directa la imagen plural y la segunda persona, sin sobreespecificar el sistema fluvial.
- source_word: וַתִּדְלַח מַיִם בְּרַגְלֶיךָ
  english_pob_choice: you muddied the waters with your feet
  chosen_spanish: enturbiando las aguas con tus pies
  alternatives_spanish:
  - ensuciando las aguas con tus pies
  - removiendo las aguas con tus pies
  lexicon: HALOT
  rationale: ‘Enturbiar’ expresa el efecto de volver turbias las aguas y preserva el campo semántico de la imagen acuática sin perder claridad en español.
- source_word: וַתִּרְפֹּס נַהֲרוֹתָם
  english_pob_choice: you fouled their rivers
  chosen_spanish: ensuciaste sus ríos
  alternatives_spanish:
  - pisoteaste sus ríos
  - arruinaste sus ríos
  lexicon: HALOT
  rationale: El verbo final puede implicar pisar/trampear y su efecto sobre el agua; ‘ensuciaste’ mantiene la consecuencia visible en la escena y evita una literalidad opaca.
theological_decisions:
- issue: Tratamiento del vocativo profético בֶּן אָדָם
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: Se conserva el título profético tradicional en su forma más cercana al hebreo, sin suavizarlo hacia una designación genérica que perdería la función de llamado.
  doctrine_reference: Vocación profética de Ezequiel; uso del apelativo como forma de comisión.
- issue: Lectura de נִדְמֵיתָָ en sentido pasivo/receptivo
  english_pob_reading: You were like
  chosen_spanish_reading: fuiste como
  alternative_spanish_readings:
  - te comparaste con
  - te hiciste como
  rationale: La revisión inglesa corrigió una expansión reflexiva hacia una lectura pasiva. El español sigue esa decisión para no introducir la idea de autocomparación explícita.
  doctrine_reference: Fidelidad al aspecto y voz del verbo hebreo; evitar eiségesis en lenguaje profético.
- issue: Imagen de la criatura acuática תַּנִּים
  english_pob_reading: monster in the seas
  chosen_spanish_reading: monstruo en los mares
  alternative_spanish_readings:
  - dragón en los mares
  - monstruo marino en los mares
  rationale: Se mantiene el carácter intencionalmente ambiguo y aterrador del término, sin fijarlo a una criatura concreta que el contexto no exige.
  doctrine_reference: Imaginería del caos acuático en el lenguaje profético del Antiguo Testamento.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: se prefirió una lectura pasiva de נִדְמֵיתָ (‘fuiste como’) en lugar de una paráfrasis reflexiva o interpretativa. También se mantuvo la imagen acuática con verbos que expresan irrupción, enturbiamiento y contaminación del cauce, sin perder el paralelo poético del versículo.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo exija explícitamente; este versículo no contiene el tetragrámaton.
  - Se conservó ‘faraón’ como título propio histórico, sin sustituirlo por ‘rey’ aislado.
  - ‘Hijo de hombre’ se mantuvo como vocativo profético, coherente con el uso del libro de Ezequiel.
  - La imagen de las aguas se tradujo con verbos que preservan tanto el movimiento como la contaminación resultante.
  - Los marcadores de nota [a], [b] y [c] aparecen anclados en el texto exactamente donde corresponden.
