id: 2TI.2.22
reference: 2 Timothy 2:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὰς δὲ νεωτερικὰς ἐπιθυμίας φεῦγε, δίωκε δὲ δικαιοσύνην, πίστιν, ἀγάπην, εἰρήνην μετὰ τῶν ἐπικαλουμένων τὸν κύριον ἐκ καθαρᾶς καρδίας.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/022.yaml
  text: But flee youthful desires, and pursue righteousness, faith, love, and peace, together with those who call on the Lord from a pure heart.
translation:
  language: ko
  text: 그대는 젊은이의 욕망을 피하고, 깨끗한 마음으로 주를 부르는 자들과 더불어 의와 믿음과 사랑과 평강을 추구하십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰς νεωτερικὰς ἐπιθυμίας
  english_pob_choice: youthful desires
  chosen_korean: 젊은이의 욕망
  alternatives_korean:
  - 청년의 정욕
  - 젊은 시절의 욕정
  lexicon: BDAG
  rationale: νεωτερικός는 「젊음의·청년의」, ἐπιθυμία는 「강한 욕망·욕정」. 본문이 성적 욕망에 국한되지 않고 청년기 특유의 충동(자만·성급함·논쟁욕 등)을 포괄하므로 「젊은이의 욕망」이 자연스럽다.
- source_word: φεῦγε ... δίωκε
  english_pob_choice: flee ... pursue
  chosen_korean: 피하고 ... 추구하십시오
  alternatives_korean:
  - 도망가고 ... 좇으십시오
  - 멀리하고 ... 따르십시오
  lexicon: BDAG
  rationale: φεύγω/διώκω의 대조 짝(도망/추격)을 자연스러운 한국어 「피하다/추구하다」로 옮긴다.
- source_word: δικαιοσύνην, πίστιν, ἀγάπην, εἰρήνην
  english_pob_choice: righteousness, faith, love, and peace
  chosen_korean: 의와 믿음과 사랑과 평강
  alternatives_korean:
  - 의로움, 신실함, 사랑, 평화
  lexicon: BDAG
  rationale: 글로사리 정형에 따라 δικαιοσύνη→의, πίστις→믿음, ἀγάπη→사랑, εἰρήνη→평강으로 옮긴다.
- source_word: τῶν ἐπικαλουμένων τὸν κύριον ἐκ καθαρᾶς καρδίας
  english_pob_choice: those who call on the Lord from a pure heart
  chosen_korean: 깨끗한 마음으로 주를 부르는 자들
  alternatives_korean:
  - 정결한 마음으로 주를 부르는 자들
  - 청결한 마음에서 주를 부르는 자들
  lexicon: BDAG
  rationale: ἐπικαλέω + 「주의 이름을 부름」은 신자의 표지(2:19과 연결). 「깨끗한 마음으로」가 1:3의 「깨끗한 양심으로」와 일관되게 자연스럽다.
