base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/001/004.yaml
  text: And when I was in my own country[a], in the land of Israel, while I was still young, the whole tribe of my father Naphtali fell away from the house of Jerusalem, which had been chosen from all the tribes of Israel for all the tribes to sacrifice there; and the temple, the dwelling place of the Most High[c][b], was consecrated and built for all generations.
  footnotes:
  - marker: a
    text: The Greek text here distinguishes 'the house of Jerusalem' from 'the temple'; the first likely refers broadly to the Jerusalem sanctuary, while the second names the temple more specifically.
    reason: lexical_alternative
  - marker: b
    text: The final Greek words are textually difficult, ending with 'for all' (εἰς πάσας). The translation supplies 'for all generations' to make coherent sense of the clause; compare the longer Tobit tradition, which supports an enduring, generational reference.
    reason: textual_variant
  - marker: c
    text: Qumran Tobit fragments are known to align more often with the longer Greek tradition in this book, though this verse here is translated from Swete's Greek witness.
    reason: cross_reference
