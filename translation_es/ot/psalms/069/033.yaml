translation:
  language: es
  text: Los humildes han visto y se alegran[a]; ustedes que buscan a Dios, que vivan sus corazones[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los afligidos» o «los mansos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que viva su corazón», un modismo para renovar el valor, la vitalidad o la esperanza.'
    reason: cultural_note
  - marker: c
    text: 'Otra posibilidad: «que viva su corazón».'
    reason: previous_rendering
lexical_decisions:
- source_word: רָאוּ
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - han contemplado
  lexicon: HALOT
  rationale: El perfecto qal plural comunica una acción ya realizada con efecto presente en el contexto poético. «Han visto» conserva ese valor completivo y su relevancia actual sin forzar un tiempo futuro o meramente narrativo.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los afligidos
  - los pobres
  lexicon: HALOT
  rationale: «Humildes» preserva el campo semántico moral/espiritual que el audit trail privilegia, sin excluir el trasfondo de abatimiento o opresión que puede acompañar al término en los Salmos.
- source_word: יִשְׂמָחוּ
  english_pob_choice: rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - se alegrarán
  - están alegres
  lexicon: HALOT
  rationale: El imperfecto en poesía puede expresar respuesta vívida presente o futura. «Se alegran» suena natural en español y mantiene la respuesta inmediata ligada a lo que han visto.
- source_word: דֹּרְשֵׁי אֱלֹהִים
  english_pob_choice: you who seek God
  chosen_spanish: ustedes que buscan a Dios
  alternatives_spanish:
  - los que buscan a Dios
  - buscadores de Dios
  lexicon: HALOT
  rationale: El participio en constructo funciona aquí como vocativo por la continuación en segunda persona. «Ustedes que buscan a Dios» conserva el tono de exhortación directa y la referencia explícita a Dios.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: En este contexto se refiere al Dios de Israel; «Dios» es la equivalencia directa y estándar en español.
- source_word: וִיחִי לְבַבְכֶם
  english_pob_choice: let your hearts live
  chosen_spanish: que viva su corazón
  alternatives_spanish:
  - que vivan sus corazones
  - que su corazón viva
  - cobren ánimo
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «el corazón» como sede de vigor, esperanza o valentía. En español, el singular colectivo «su corazón» comunica el giro idiomático sin perder la fuerza de renovación vital que destaca el audit trail.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del texto fuente sin añadir objeto directo no presente en hebreo. Se evita introducir «lo» u otra referencia implícita. También se conserva el vocativo de segunda persona y la imagen idiomática de «vivir el corazón», que el audit trail identifica como renovadora de valor/esperanza.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en concordancia con los defaults del proyecto.
  - Se evita «SEÑOR» porque el versículo no contiene יהוה.
  - «Los humildes» conserva la opción principal del audit trail frente a alternativas posibles sin cerrar el rango semántico.
  - El español usa una singular colectiva en la nota para reflejar el hebreo, mientras que el texto principal opta por una formulación natural y publicable.
