    text: O, más históricamente, «en este rollo». El término hebreo puede referirse a un documento escrito en forma de rollo.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] defectuosa porque no daba una alternativa real; se conserva solo la nota histórica sobre «libro/rollo», que sí está sustentada por el expediente inglés. Además, se ajusta «se puso en su lugar» a «se puso de pie en su lugar» para reflejar mejor ויעמד y se simplifica la relativa final para mejorar la naturalidad del español.
