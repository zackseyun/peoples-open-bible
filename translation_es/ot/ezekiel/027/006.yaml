review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: remos hechos de madera de Basán y una parte estructural de la nave hecha de marfil procedente de Kittim. Sin embargo, no conserva suficientemente el aparato de incertidumbre documentado en la POB inglesa: falta la nota sobre la dificultad de "ivory, daughter of Ashurim" y la nota cultural sobre Kittim, y la nota existente no recoge la alternativa específica deck/planks/boards de קַרְשֵׁךְ. Además, una decisión léxica atribuye erróneamente בַּת אֲשֻׁרִים a "de las costas de Kittim", cuando eso corresponde a מֵאִיֵּי כִתִּים.'
  spanish_quality_summary: El español es legible y digno. "Hicieron tus remos de encinas de Basán" suena natural, aunque "robles" sería más amplio; no exige cambio. "Tablazón" es entendible, pero la nota debe explicar mejor la alternativa "cubierta/tablas/tablazón" para alinearse con el audit trail. La frase general fluye bien.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. El topónimo "Kittim" está bien conservado transliterado. Las decisiones léxicas necesitan corregirse en la documentación interna para no confundir בַּת אֲשֻׁרִים con מֵאִיֵּי כִתִּים, y conviene preservar en notas la dificultad de la expresión hebrea.
  issues:
  - severity: medium
    issue: Falta la nota sobre el hebreo difícil "marfil, hija de Ashurim".
    rationale: La POB inglesa preserva explícitamente esta dificultad textual/lexical. El español omite una incertidumbre significativa del original y del audit trail.
  - severity: medium
    issue: Falta la nota cultural sobre Kittim.
    rationale: La POB inglesa incluye que Kittim probablemente se refiere a Chipre o regiones marítimas occidentales cercanas. Esta información puede mantenerse sin sobrecargar el texto principal.
  - severity: low
    issue: La nota [a] actual es demasiado genérica.
    rationale: 'Debe reflejar con más precisión la alternativa documentada para קַרְשֵׁךְ: cubierta/tablas/tablazón del barco, no solo una vaga inseguridad.'
  - severity: low
    issue: Error en la documentación léxica del borrador para בַּת אֲשֻׁרִים.
    rationale: Se le asigna indebidamente el sentido de "de las costas de Kittim", que pertenece a la frase siguiente. Aunque esto no altera directamente el texto español, sí afecta la fidelidad del razonamiento documentado.
  revised_spanish_text: Hicieron tus remos de encinas de Basán[c][b]; hicieron tu tablazón[a] de marfil, de las costas de Kittim.
  revised_footnotes:
  - marker: a
    text: O "tus tablas" o "tu cubierta". El término hebreo puede referirse más específicamente al entablado o a las tablas del barco.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es difícil: "marfil, hija de Ashurim". Muchos entienden que alude a marfil trabajado con alguna madera fina, pero el sentido exacto es incierto.'
    reason: alternative_reading
  - marker: c
    text: '"Kittim" probablemente se refiere a Chipre o a regiones marítimas occidentales cercanas.'
    reason: cultural_note
  revision_rationale: 'Se conserva el texto principal casi intacto porque es básicamente fiel y natural, pero se restauran las notas necesarias para reflejar la incertidumbre léxica documentada en el original y en la auditoría inglesa: la alternativa de קַרְשֵׁךְ, la dificultad de "hija de Ashurim" y la referencia cultural de Kittim. También se ordenan los marcadores de nota para que sean únicos y aparezcan en el texto.'
