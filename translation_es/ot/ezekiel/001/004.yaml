base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/004.yaml
  text: And I looked[a], and behold, a storm wind was coming from the north, a great cloud with fire flashing continually, and brightness all around it; and from its midst was something like the appearance of glowing metal[c][b], from the midst of the fire.
  footnotes:
  - marker: a
    text: Or 'a whirlwind.' The Hebrew phrase can denote a violent windstorm; traditional English often has 'whirlwind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew hashmal, a rare term of uncertain meaning; possibly 'electrum' or 'amber-like glow.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fire infolding itself' (traditional rendering). The Hebrew expression is difficult and may describe fire in continual, self-intensifying motion.
    reason: lexical_alternative
