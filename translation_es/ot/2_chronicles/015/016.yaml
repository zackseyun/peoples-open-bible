  rationale: La revisión corrige el anclaje erróneo de la nota léxica, restaura la nota cultural sobre Asherah presente en el POB inglés, y mejora la naturalidad del español con «la apartó de su cargo de reina madre». También reordena ligeramente la cláusula causal para una lectura más fluida, sin cambiar el sentido del hebreo ni las decisiones léxicas principales.
