revisions:
- from: Mira desde los cielos y ve[a], desde tu santa y gloriosa morada[b]. ¿Dónde están tu celo y tus hazañas poderosas? El movimiento de tus entrañas y tus compasiones se han retraído de mí[c].
  to: Mira desde el cielo y ve, desde tu santa y gloriosa morada. ¿Dónde están tu celo[a] y tus obras poderosas? La agitación de tus entrañas y tus compasiones se han contenido lejos de mí[b].
  rationale: 'Se ajustó el texto para hacerlo más fiel al sentido del hebreo y al expediente POB: ''desde el cielo'' por naturalidad idiomática; ''obras poderosas'' en vez de ''hazañas poderosas'' para evitar un matiz épico añadido; ''agitación de tus entrañas'' para reflejar mejor הֲמוֹן como conmoción emocional interna; y ''se han contenido lejos de mí'' para conservar el valor de autoretención del verbo con español más natural. También se sustituyeron las notas por un aparato más útil y alineado con las alternativas léxicas relevantes.'
  reviewer_model: gpt-5.4
