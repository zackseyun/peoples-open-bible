revisions:
- from: El nombre de aquel hombre era Nabal[a], y el nombre de su esposa era Abigail. La mujer era inteligente y hermosa en su apariencia, pero el hombre era duro y malo en sus acciones; él era de la casa de Caleb.
  to: El nombre de aquel hombre era Nabal[a], y el nombre de su esposa era Abigail. La mujer era inteligente y de hermosa apariencia, pero el hombre era áspero y malo en sus tratos; era calebita.
  rationale: Se ajusta el texto principal para seguir más de cerca la decisión auditada del POB en inglés y mejorar la naturalidad del español. «Calebita» preserva la lectura principal documentada, mientras la nota explica el sentido clánico y la rareza textual. «Áspero» refleja mejor קָשֶׁה en contexto interpersonal, «de hermosa apariencia» mejora la fluidez, y «malo en sus tratos» capta mejor el sentido conductual de רַע מַעֲלָלִים.
