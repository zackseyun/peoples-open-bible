  to: 'Y Eliseo había hablado a la mujer a cuyo hijo había devuelto a la vida[a], diciendo: «Levántate, y vete, tú y tu familia, y reside[b] dondequiera que residas, porque Yahvé ha convocado una hambruna, y también ha venido sobre la tierra por siete años».'
  rationale: Se corrige una construcción española defectuosa («a cuyo hijo...»), se aclara el referente doméstico de וּבֵיתֵךְ con «tu familia», se reemplaza «hambre» por «hambruna» y «ha llamado al hambre» por «ha convocado una hambruna» para expresar de forma idiomática y fiel la agencia divina sobre el desastre, y se limpia la nota sobre גור con alternativas genuinamente españolas. Se conserva «Yahvé», el pluscuamperfecto narrativo y la repetición deliberada de «reside ... residas».
