translation:
  language: es
  text: 'Así dice Yahvé: De esta manera arruinaré[a] el orgullo de Judá y el gran orgullo de Jerusalén[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «destruiré» o «echaré a perder». El verbo hebreo puede abarcar arruinar, dañar o destruir; «arruinaré» encaja mejor con la imagen del cinto echado a perder en este capítulo.
    reason: lexical_alternative
  - marker: b
    text: «Orgullo» también puede entenderse como «arrogancia» o, menos probablemente aquí, «majestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, conforme a la norma del proyecto. «Yahvé» es la forma española establecida para reflejar יְהוָה sin sustituirlo por un título.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - De este modo dice
  - Así declara
  lexicon: HALOT
  rationale: Es una fórmula profética fija. «Así dice» reproduce con naturalidad la cadencia solemne del hebreo y del POB en español.
- source_word: כָּכָה
  english_pob_choice: In this way
  chosen_spanish: De esta manera
  alternatives_spanish:
  - Así
  - De este modo
  lexicon: HALOT
  rationale: La segunda ocurrencia señala el modo de la acción anunciada, no solo la fórmula introductoria. «De esta manera» conserva esa referencia prospectiva.
- source_word: אַשְׁחִית
  english_pob_choice: I will ruin
  chosen_spanish: arruinaré
  alternatives_spanish:
  - destruiré
  - echaré a perder
  - desfiguraré
  lexicon: HALOT
  rationale: El verbo puede abarcar arruinar, destruir o echar a perder. «Arruinaré» mantiene la fuerza de juicio y encaja con la imagen inmediata del cinto arruinado, sin exagerar hacia una aniquilación total que el contexto no exige.
- source_word: גְּאוֹן
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - arrogancia
  - majestad
  - exaltación
  lexicon: HALOT
  rationale: En este pasaje el sentido negativo de autoexaltación y presunción es el más probable. «Orgullo» conserva la ambigüedad útil del hebreo entre estatus elevado y soberbia condenada.
- source_word: גְּאוֹן יְהוּדָה
  english_pob_choice: the pride of Judah
  chosen_spanish: el orgullo de Judá
  alternatives_spanish:
  - el orgullo propio de Judá
  - la arrogancia de Judá
  lexicon: HALOT
  rationale: Se conserva la relación constructa de forma transparente en español. «El orgullo de Judá» sigue de cerca la estructura hebrea y el paralelismo con Jerusalén.
- source_word: גְּאוֹן יְרוּשָׁלִַם הָרָב
  english_pob_choice: the great pride of Jerusalem
  chosen_spanish: el gran orgullo de Jerusalén
  alternatives_spanish:
  - el orgullo grande de Jerusalén
  - la gran arrogancia de Jerusalén
  lexicon: HALOT
  rationale: «הָרָב» intensifica el sustantivo como «grande/mucho». En español, «gran orgullo» preserva esa intensificación de manera natural y mantiene el paralelismo poético.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El versículo contiene el Tetragrama explícitamente. Se mantiene la política doctrinal del proyecto de traducirlo como el nombre propio de Dios, no como una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de גְּאוֹן en juicio profético
  english_pob_reading: pride
  chosen_spanish_reading: orgullo
  alternative_spanish_readings:
  - arrogancia
  - majestad
  rationale: El contexto de sentencia favorece una lectura negativa, pero el término hebreo admite también elevación o prominencia. «Orgullo» conserva esa tensión y permite la ironía del juicio contra lo exaltado de Judá y Jerusalén.
  doctrine_reference: POB lexical policy on context-sensitive terms
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión (high_agreement, sin incidencias). La redacción española sigue esa lectura estable y conserva las mismas alternativas semánticas relevantes sin introducir novedades no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, de acuerdo con la terminología del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Orgullo» reproduce la elección inglesa y conserva la ambigüedad contextual de גְּאוֹן.
  - La intensificación de הָרָב se vierte con «gran» para preservar el paralelismo hebreo.
  - La puntuación con dos puntos tras la fórmula profética respeta el registro bíblico en español.
