review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y del POB inglés: pregunta por el acceso a la morada de la luz y por el lugar de las tinieblas. Sin embargo, «hacia la morada de la luz» debilita ligeramente la relación más definida de destino implícita en הַדֶּרֶךְ + יִשְׁכָּן. «Al lugar donde habita la luz» o «a la morada de la luz» representa mejor el vínculo entre «camino» y «habitar».'
  spanish_quality_summary: El español es claro y digno. No obstante, la combinación «el camino hacia la morada» suena un poco redundante y menos directa que una formulación más natural. Además, la nota al pie puede afinarse para sonar más idiomática en español y reflejar con más precisión la alternativa formal del inglés auditado.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Luz» y «tinieblas» son opciones adecuadas en este contexto poético. No aparecen términos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «hacia la morada de la luz» suaviza demasiado la idea de destino del hebreo
    rationale: El hebreo pregunta literalmente por «dónde/ cuál es el camino» respecto del lugar donde habita la luz. «Hacia» puede sugerir mera orientación; «a la morada de la luz» o «al lugar donde habita la luz» conserva mejor la meta del camino.
  - severity: low
    issue: La nota alternativa suena algo calcada
    rationale: «¿Cuál es el camino donde la luz habita?» es comprensible, pero «en que habita la luz» o «por donde se llega a donde habita la luz» sería más idiomático. Conviene mantener la cercanía formal sin sacrificar naturalidad.
  revised_spanish_text: ¿Dónde está el camino[a] a la morada de la luz, y dónde está el lugar de las tinieblas?
