translation:
  language: es
  text: Pero la hija del faraón subió de la Ciudad de David a su casa, que él había construido para ella[a]; entonces edificó el Milo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «las terrazas» o «el relleno»; el hebreo Milo probablemente designa una fortificación o un terraplén o estructura de sostén en terraza.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Solo
  lexicon: HALOT
  rationale: La partícula introduce una transición adversativa o de contraste suave; «Pero» comunica bien ese giro narrativo en español sin sobrerrepresentar el matiz.
- source_word: בַּת פַּרְעֹה
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija del faraón
  alternatives_spanish:
  - la hija de Faraón
  - la hija del faraón
  lexicon: HALOT
  rationale: La construcción de relación se vierte de modo directo y natural. Se mantiene el referente histórico sin añadir interpretación.
- source_word: עָלְתָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue hacia arriba
  - ascendió
  lexicon: HALOT
  rationale: «Subió» conserva la imagen hebrea de ascenso, que puede ser topográfica y narrativa. Es más natural que un calco como «ascendió».
- source_word: מֵעִיר דָּוִד
  english_pob_choice: from the City of David
  chosen_spanish: desde la Ciudad de David
  alternatives_spanish:
  - de la Ciudad de David
  - fuera de la Ciudad de David
  lexicon: HALOT
  rationale: «Desde» expresa mejor el punto de partida del movimiento y mantiene el nombre propio tradicional del lugar.
- source_word: אֶל בֵּיתָהּ
  english_pob_choice: to her house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su palacio
  - a su hogar
  lexicon: HALOT
  rationale: El hebreo dice simplemente «casa». «Palacio» sería interpretativo; «casa» conserva la forma del texto, aunque el contexto sea real.
- source_word: אֲשֶׁר בָּנָה לָהּ
  english_pob_choice: that he had built for her
  chosen_spanish: que él le había construido
  alternatives_spanish:
  - que él construyó para ella
  - que había construido para ella
  lexicon: HALOT
  rationale: Se mantiene el antecedente claro («él») y el sentido de anterioridad que el audit trail inglés explicita con el pluscuamperfecto. «Construido» evita repetir «edificado» en el siguiente hemistiquio.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - después
  lexicon: HALOT
  rationale: Marca secuencia temporal narrativa de forma natural en español.
- source_word: בָּנָה
  english_pob_choice: he built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo narrativo simple se traduce por «edificó» para evitar redundancia inmediata con «construido» y conservar un tono elevado pero claro.
- source_word: הַמִּלּוֹא
  english_pob_choice: the Millo
  chosen_spanish: el Milo
  alternatives_spanish:
  - el Millo
  - la terraza
  - el relleno
  lexicon: HALOT
  rationale: Se preserva el término técnico/topográfico por transliteración. «Milo» es una forma española breve y legible que no decide indebidamente entre las hipótesis de sentido.
translation_notes:
  revision_awareness: 'El testimonio inglés y la revisión más reciente coinciden en leer el versículo como una secuencia narrativa simple: la hija del faraón se traslada desde la Ciudad de David a la casa que le fue construida, y después Salomón edifica el Millo. No se registran revisiones aplicadas ni cambios de fondo; se mantiene la misma resolución léxica, incluyendo la nota alternativa sobre Millo.'
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera de este versículo porque no aparece ningún término divino en el texto.
  - «Milo» se usa como transliteración consistente de un tecnicismo hebreo, con nota alternativa para no fijar indebidamente su identificación arquitectónica.
  - Se prefirió «edificó» para el segundo verbo y «construido» para el relativo, evitando una repetición innecesaria sin alterar el paralelismo narrativo.
