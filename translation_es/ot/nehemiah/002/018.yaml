translation:
  language: es
  text: 'Entonces les conté que la mano de mi Dios había sido buena sobre mí[a], y también las palabras que el rey me había dicho. Y ellos dijeron[c][b]: «Levantémonos y edifiquemos». Así fortalecieron sus manos para la buena obra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había sido favorable a mí» o «había sido graciosa hacia mí». El hebreo dice literalmente: «había sido buena sobre mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Levantémonos y construyamos».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «fortalecieron sus manos para el bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּיד
  english_pob_choice: So I told
  chosen_spanish: Entonces les conté
  alternatives_spanish:
  - Y les conté
  - Luego les declaré
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Entonces» conserva ese enlace consecuencial con naturalidad. «Conté» funciona bien para comunicar un informe a un grupo, sin perder el sentido de comunicar/relatar del hebreo.
- source_word: יַד אֱלֹהַי
  english_pob_choice: the hand of my God
  chosen_spanish: la mano de mi Dios
  alternatives_spanish:
  - la mano de mi Dios
  - el poder de mi Dios
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de «mano» para no borrar la agencia activa de Dios. «Poder» explicita el sentido, pero pierde la imagen que el texto y la POB inglesa preservan.
- source_word: אֲשֶׁר הִיא טוֹבָה עָלַי
  english_pob_choice: was good upon me
  chosen_spanish: había sido buena sobre mí
  alternatives_spanish:
  - había sido favorable a mí
  - había sido gracious toward me
  lexicon: HALOT
  rationale: «Buena sobre mí» es la imagen hebrea básica; en español, «había sido buena sobre mí» mantiene la metáfora sin sonar tan extraña como un calco más rígido. Se evita sustituirla por «favorable» en el texto principal para no borrar la tensión lexical documentada.
- source_word: וְאַף
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - también
  lexicon: HALOT
  rationale: 'Expresa con claridad que Nehemías añade un segundo elemento: no solo la mano de Dios, sino también las palabras del rey.'
- source_word: דִּבְרֵי הַמֶּלֶךְ אֲשֶׁר אָמַר לִי
  english_pob_choice: the words of the king that he had spoken to me
  chosen_spanish: las palabras del rey que me había dicho
  alternatives_spanish:
  - lo que el rey me había dicho
  - las palabras que el rey me había hablado
  lexicon: HALOT
  rationale: «Palabras» conserva el sustantivo plural del hebreo; «me había dicho» es una manera natural de expresar el discurso previo en español. Se evita reducirlo solo a «lo que el rey había dicho» para mantener el paralelismo con el hebreo y con la POB inglesa.
- source_word: נָקוּם וּבָנִינוּ
  english_pob_choice: Let us rise up and build
  chosen_spanish: Levantémonos y edifiquemos
  alternatives_spanish:
  - Alzémonos y edifiquemos
  - Levantémonos y construyamos
  lexicon: HALOT
  rationale: «Levantémonos» transmite bien el exhortativo/cohortativo del hebreo; «edifiquemos» mantiene un tono bíblico digno y corresponde de forma precisa a la acción de reconstrucción en contexto.
- source_word: וַיְחַזְּקוּ יְדֵיהֶם
  english_pob_choice: So they strengthened their hands
  chosen_spanish: Así fortalecieron sus manos
  alternatives_spanish:
  - Entonces fortalecieron sus manos
  - Así cobraron ánimo
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de «fortalecer las manos» porque el hebreo lo expresa así y la POB inglesa decidió mantener la imagen. No se reemplaza por «cobraron ánimo» en el texto principal para no neutralizar la metáfora.
- source_word: לַטּוֹבָה
  english_pob_choice: for the good work
  chosen_spanish: para la buena obra
  alternatives_spanish:
  - para el bien
  - para la buena tarea
  lexicon: HALOT
  rationale: La frase hebrea es breve y algo abierta; «buena obra» comunica de modo natural que se trata de la empresa de reconstrucción como algo bueno, sin añadir demasiado. «Obra» mantiene mejor el matiz de labor emprendida que «trabajo».
theological_decisions:
- issue: La metáfora de la mano de Dios como acción/favor divino
  english_pob_reading: Preserve the metaphor of God's hand rather than interpret it as mere providential favor
  chosen_spanish_reading: Conservar la metáfora de la mano de Dios y no reemplazarla por una abstracción como «favor» en el texto principal
  alternative_spanish_readings:
  - el favor de mi Dios había estado sobre mí
  - mi Dios me había mostrado gracia
  rationale: El versículo atribuye el éxito de Nehemías tanto a la intervención divina como al apoyo del rey. Mantener «la mano de mi Dios» preserva la fuerza teológica y la imagen concreta del hebreo, mientras que las alternativas se reservan para nota por ser interpretaciones válidas pero menos transparentes.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado indicó alta concordancia con observaciones menores; por ello se mantuvo la estructura del sentido, conservando las metáforas hebreas principales y solo ajustando la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «mano» para יַד, en coherencia con el criterio de preservar imágenes con valor teológico.
  - Se usa «edifiquemos» para reflejar la acción de reconstrucción con registro bíblico claro, sin imponer una paráfrasis moderna.
  - Las notas al pie preservan la alternativa lexical clave de טוֹבָה עָלַי y la literalidad de לַטּוֹבָה para no borrar la tensión semántica documentada.
