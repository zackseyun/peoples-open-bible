translation:
  language: es
  text: 'Entonces Faraón mandó aquel día[a] a los capataces del pueblo[b] y a sus oficiales[c], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ese mismo día». La expresión temporal hebrea puede enfatizar la inmediatez.
    reason: lexical_alternative
  - marker: b
    text: «Capataces» traduce un término para quienes impulsaban o exigían la labor; «supervisores» también es posible.
    reason: lexical_alternative
  - marker: c
    text: O «sus capataces». El término hebreo se refiere a funcionarios subordinados dentro del sistema laboral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio órdenes
  lexicon: HALOT
  rationale: El verbo narrativo de צוה expresa una orden autoritativa. En español, "mandó" conserva la fuerza de mando en un registro natural y bíblico sin volver la frase pesada.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el Faraón
  alternatives_spanish:
  - Faraón
  lexicon: nombre/título histórico
  rationale: Se mantiene el título real tradicional y reconocible en español, con artículo definido porque funciona como designación narrativa del personaje.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese mismo día
  - en aquel día
  lexicon: HALOT
  rationale: '"Aquel día" comunica la inmediatez temporal del hebreo sin sonar forzado; conserva la referencia narrativa puntual marcada por el artículo demostrativo.'
- source_word: הַנֹּגְשִׂים
  english_pob_choice: the taskmasters
  chosen_spanish: los capataces
  alternatives_spanish:
  - los taskmasters
  - los supervisores
  - los opresores
  lexicon: HALOT
  rationale: En el contexto del trabajo forzado de Éxodo, el término designa a quienes impulsaban y exigían la labor. "Capataces" es un equivalente natural en español que conserva el matiz de control laboral; "opresores" sería demasiado general.
- source_word: בָּעָם
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - sobre el pueblo
  - entre el pueblo
  lexicon: HALOT
  rationale: 'Aunque la preposición puede matizar localización o pertenencia, aquí el sentido en español queda más claro como pertenencia/relación administrativa: los capataces vinculados al pueblo trabajador. "Del pueblo" evita sobreinterpretar una jerarquía distinta de la que muestra el hebreo.'
- source_word: שֹׁטְרָיו
  english_pob_choice: his officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus foremen
  - sus capataces
  - sus escribas
  lexicon: HALOT
  rationale: El término refiere a subordinados con función administrativa dentro del sistema laboral. "Oficiales" preserva la idea de cargo subordinado sin restringirlo indebidamente a un puesto moderno específico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea se vierte con la partícula verbal más directa en español. "Diciendo" mantiene la conexión formal con el discurso directo que sigue.
theological_decisions:
- issue: Tratamiento del nombre/título real פַּרְעֹה
  english_pob_reading: Pharaoh
  chosen_spanish_reading: el Faraón
  alternative_spanish_readings:
  - Faraón
  rationale: 'No hay una tensión teológica aquí, pero sí una decisión de registro: en español bíblico, "el Faraón" es plenamente transparente y fiel al uso narrativo del título.'
  doctrine_reference: n/a
- issue: Relación entre הַנֹּגְשִׂים בָּעָם y שֹׁטְרָיו
  english_pob_reading: the taskmasters of the people and his officers
  chosen_spanish_reading: los capataces del pueblo y sus oficiales
  alternative_spanish_readings:
  - los capataces entre el pueblo y sus oficiales
  - los taskmasters del pueblo y sus oficiales
  rationale: 'El hebreo distingue dos grupos: los נֹגְשִׂים y los שֹׁטְרִים. La traducción conserva esa distinción sin forzar una terminología técnica más dura de lo necesario.'
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del inglés auditado: se eliminan comas innecesarias y se prefiere una relación más directa para בָּעָם. En español, esto se refleja con una sola oración fluida y con "del pueblo" en lugar de una paráfrasis más expansiva.'
  spanish_consistency_notes:
  - 'Se preserva el orden narrativo simple del hebreo: acción, marco temporal, destinatarios, fórmula de introducción del habla.'
  - Se evita "SEÑOR" porque el versículo no contiene el nombre divino.
  - '"Capataces" y "oficiales" mantienen dos roles distintos sin mezclar sus funciones.'
  - La puntuación usa coma antes de la fórmula de habla y dos puntos al final, conforme al español bíblico moderno.
