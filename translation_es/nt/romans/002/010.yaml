translation:
  language: es
  text: pero gloria y honra y paz a todo el que hace el bien[a][b], al judío primero y también al griego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que es bueno».
    reason: lexical_alternative
  - marker: b
    text: Aquí «griego» probablemente significa no judío en sentido más amplio; es decir, gentil.
    reason: cultural_note
lexical_decisions:
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente natural y estándar en español para δόξα en este contexto de recompensa y reconocimiento, y conserva el peso honorífico y escatológico del término.
- source_word: τιμή
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - estima
  - valor
  lexicon: BDAG
  rationale: Para español, «honra» mantiene bien el paralelismo con «gloria» y comunica la idea de dignidad reconocida; «honor» también sería posible, pero «honra» suena más fluido en esta coordinación.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: «Paz» preserva el sentido bíblico amplio sin limitarlo a tranquilidad interior o bienestar social.
- source_word: παντὶ τῷ ἐργαζομένῳ
  english_pob_choice: to everyone who does
  chosen_spanish: a todo el que hace
  alternatives_spanish:
  - a todo el que obra
  - a todo el que practica
  lexicon: BDAG
  rationale: La construcción participial describe a la persona caracterizada por hacer algo. «A todo el que hace» expresa de forma natural esa idea en español y evita una traducción demasiado literal como «trabaja», que aquí podría sonar ajena al contexto.
- source_word: τὸ ἀγαθόν
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien [= lo bueno]
  lexicon: BDAG
  rationale: Después de «hacer», en español resulta más natural «hacer el bien» que «hacer lo bueno». La alternativa inglesa «what is good» queda suficientemente representada por «el bien», sin perder la referencia al objeto moral del acto.
- source_word: Ἰουδαίῳ
  english_pob_choice: the Jew
  chosen_spanish: al judío
  alternatives_spanish:
  - al judío como representante
  - al pueblo judío
  lexicon: BDAG
  rationale: «Judío» reproduce directamente Ἰουδαῖος y mantiene la forma representativa singular del texto.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  lexicon: BDAG
  rationale: «Primero» es breve, claro y conserva el orden salvífico-histórico expresado en el griego y en la lectura auditada en inglés.
- source_word: Ἕλληνι
  english_pob_choice: the Greek
  chosen_spanish: al griego
  alternatives_spanish:
  - al gentil
  lexicon: BDAG
  rationale: Se conserva el término fuente «griego» para reflejar la forma del texto; el sentido más amplio de «gentil» se preserva en nota, como en el audit trail inglés.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: «Pero» expresa bien el contraste con el versículo anterior y corresponde al valor adversativo de δέ en este contexto.
theological_decisions:
- issue: Alcance de Ἕλληνι en la oposición judío/griego
  english_pob_reading: Rendered as 'the Greek' in the main text, with the broader sense 'Gentile' noted in a footnote.
  chosen_spanish_reading: Se mantiene «el griego» en el texto principal, con nota que aclara que aquí probablemente significa también «gentil», es decir, no judío en sentido más amplio.
  alternative_spanish_readings:
  - el gentil
  - el no judío
  rationale: La traducción principal conserva el lenguaje de la fuente y la tensión interpretativa documentada; la nota evita resolver en exceso el alcance del término, como exige el audit trail.
  doctrine_reference: Preservar la tensión lexical e interpretativa sin forzar una equivalencia única.
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el texto español sigue la lectura aprobada de Romans 2:10 y conserva la decisión de dejar abierta la amplitud de Ἕλληνι con nota. Se ajustó la naturalidad del sintagma final a «hacer el bien», manteniendo la base léxica de τὸ ἀγαθόν.
  spanish_consistency_notes:
  - Se usa «gloria» para δόξα y «paz» para εἰρήνη de forma consistente con los defaults del proyecto.
  - Se emplea «judío»/«griego» en el texto principal para seguir la forma fuente; la nota preserva la lectura ampliada de «griego» como «gentil».
  - Se prefirió «honra» por fluidez estilística; no altera la fuerza semántica de τιμή en este contexto.
  - La puntuación y el orden siguen el paralelismo del griego y del audit trail inglés, con mínima adaptación idiomática al español.
