translation:
  language: es
  text: Un rey indisciplinado arruinará una ciudad, pero una ciudad está habitada gracias a la prudencia de sus gobernantes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «una ciudad está habitada por la prudencia de sus gobernantes». El paralelo griego expresa la idea como que los habitantes de la ciudad reflejan a su líder.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ / κριτὴν... ἡγούμενον
  english_pob_choice: king / rulers
  chosen_spanish: rey / gobernantes
  alternatives_spanish:
  - rey / autoridades
  - gobernante / dirigentes
  lexicon: HALOT; LXX lexical parallel
  rationale: En hebreo aparece el rey; en la paráfrasis griega el énfasis recae en el juez o líder de la ciudad. Para el español, 'rey' mantiene el sujeto del dicho hebreo y 'gobernantes' transmite el plural de שָׂרֶיהָ sin forzar un singular ajeno al hebreo.
- source_word: פָּרוּעַ
  english_pob_choice: undisciplined
  chosen_spanish: indisciplinado
  alternatives_spanish:
  - desordenado
  - sin freno
  - desenfrenado
  lexicon: HALOT
  rationale: '''Indisciplinado'' conserva la idea de falta de contención o orden moral/político, en un registro claro y natural en español. Evita intensificar indebidamente hacia ''ilegal'' o ''malvado''.'
- source_word: יַשְׁחִית
  english_pob_choice: will ruin
  chosen_spanish: arruinará
  alternatives_spanish:
  - destruirá
  - corromperá
  - arrasará
  lexicon: HALOT
  rationale: '''Arruinará'' expresa bien el daño a la ciudad como comunidad política, sin volver el verbo más absoluto de lo que exige el contexto sapiencial.'
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - villa
  lexicon: HALOT
  rationale: '''Ciudad'' es el equivalente directo y mantiene el marco cívico del proverbio.'
- source_word: נוֹשֶׁבֶת
  english_pob_choice: is inhabited
  chosen_spanish: es habitada
  alternatives_spanish:
  - está poblada
  - está habitada
  lexicon: HALOT
  rationale: La pasiva española reproduce con fidelidad el estado de la ciudad como asentada/ocupada por habitantes.
- source_word: בְּשֶׂכֶל
  english_pob_choice: through the wisdom / prudence
  chosen_spanish: por la prudencia
  alternatives_spanish:
  - por la sabiduría
  - gracias a la prudencia
  - con prudencia
  lexicon: HALOT
  rationale: '''שֶׂכֶל'' denota prudencia, buen entendimiento o sensatez. ''Por la prudencia'' conserva la fuerza causal del hebreo y evita reducirlo a mera inteligencia abstracta.'
- source_word: שָׂרֶיהָ
  english_pob_choice: its rulers
  chosen_spanish: sus gobernantes
  alternatives_spanish:
  - sus jefes
  - sus príncipes
  - sus magistrados
  lexicon: HALOT
  rationale: '''Gobernantes'' comunica el valor de líderes civiles sin depender de un título monárquico específico. En español suena más amplio que ''príncipes'' y más natural que ''magistrados''.'
theological_decisions:
- issue: Relación entre los dos miembros del proverbio
  english_pob_reading: A city is inhabited through the wisdom of its rulers; an undisciplined king will ruin a city.
  chosen_spanish_reading: Una ciudad bien gobernada se mantiene por la prudencia de sus gobernantes; un rey sin disciplina la arruina.
  alternative_spanish_readings:
  - Como son los gobernantes, así es la ciudad.
  - La ciudad es poblada según la prudencia de sus jefes.
  rationale: El hebreo presenta primero la ruina causada por el rey indisciplinado y luego la estabilidad de la ciudad vinculada a la prudencia de sus dirigentes. El español mantiene esa relación causal sin convertir el segundo miembro en una simple comparación formal. La nota de la tradición griega queda reflejada en la elección de 'gobernantes' y en la causalidad de 'por la prudencia'.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
- issue: Tensión lexical entre singular hebreo y formulación griega de liderazgo cívico
  english_pob_reading: The Greek parallel expresses the thought as the city's inhabitants reflecting their leader.
  chosen_spanish_reading: El griego queda reflejado implícitamente en 'gobernantes', sin borrar el rey hebreo.
  alternative_spanish_readings:
  - un líder de la ciudad
  - todos los habitantes reflejan a su jefe
  rationale: No conviene imponer al texto principal una paráfrasis del paralelo griego que borre el rey del hebreo. 'Gobernantes' permite conservar el plural hebreo y, a la vez, abrir espacio a la observación del paralelo sobre el efecto del liderazgo en toda la ciudad.
  doctrine_reference: 'PHILOSOPHY.md: preserve primary witness while consulting parallel witness'
translation_notes:
  revision_awareness: La versión final sigue la revisión que reordenó los cola para respetar el hebreo, conservando el paralelismo entre la ruina causada por un rey sin disciplina y la permanencia de la ciudad por la prudencia de sus gobernantes. Se evitó la formulación más mecánica 'como... así...' porque en español oscurecía la relación causal del segundo miembro. También se mantuvo una solución que honra el hebreo principal y deja visible, en nota, la contribución interpretativa del paralelo griego.
  spanish_consistency_notes:
  - Se usa 'ciudad' de manera uniforme para עִיר.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el Tetragrámaton.
  - '''Gobernantes'' se emplea como término cívico amplio y no como traducción de un cargo monárquico específico en el segundo miembro.'
  - La nota al pie mantiene la alternativa literal y la observación del paralelo griego sin desplazar el texto principal.
