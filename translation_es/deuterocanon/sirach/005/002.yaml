translation:
  language: es
  text: No confíes en tu propia fuerza para andar tras el deseo de tu alma[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No te apoyes en tu alma y en tu fuerza para andar en los deseos de tu corazón'', reflejando más de cerca el paralelo griego; el hebreo dice: ''No confíes en tu fuerza para andar tras el deseo de tu alma''.'
    reason: alternative_reading
  - marker: b
    text: '''Alma'' también puede entenderse como ''tú mismo'' o ''tu vida'' en el uso hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּשָּׁעֵן
  english_pob_choice: Do not rely
  chosen_spanish: No confíes
  alternatives_spanish:
  - No te apoyes
  - No dependas
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de apoyarse o depender de algo. En español, 'confiar en' comunica con naturalidad la dependencia interior que el proverbio prohíbe, sin perder el valor exhortativo de la metáfora.
- source_word: כֹּחֶךָ
  english_pob_choice: your own strength
  chosen_spanish: tu propia fuerza
  alternatives_spanish:
  - tu fuerza
  - tu poder
  lexicon: HALOT
  rationale: 'כֹּחַ puede significar fuerza o poder. ''Fuerza'' es el equivalente más claro en español; ''propia'' explicita el matiz reflexivo que el contexto exige: no poner la esperanza en la capacidad personal.'
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para ir
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica de 'andar' para conducta o modo de vida. 'Para andar' suena natural en español y preserva el valor moral del infinitivo.
- source_word: אַחַר
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo
  lexicon: HALOT
  rationale: '''Tras'' mantiene el valor direccional de ''after'' y suena idiomático en español bíblico contemporáneo, conservando la idea de seguir un impulso.'
- source_word: תַּאֲוַת
  english_pob_choice: the desire of
  chosen_spanish: el deseo de
  alternatives_spanish:
  - la apetencia de
  - la codicia de
  lexicon: HALOT
  rationale: El sustantivo hebreo abarca deseo, anhelo o apetito intenso. 'Deseo' es amplio y fiel; evita restringir indebidamente el sentido a lujuria o codicia.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tú mismo
  - tu vida
  - tu ser
  lexicon: HALOT
  rationale: נפשׁ puede significar alma, vida, yo mismo o apetito según el contexto. 'Alma' preserva la textura antropológica del original y armoniza con el paralelo griego ψυχή, sin resolver la ambigüedad a favor de un mero pronombre reflexivo.
theological_decisions:
- issue: Rendering of נַפְשֶׁךָ / ψυχῇ σου in anthropological language
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tú mismo
  - tu vida
  rationale: La advertencia apunta contra una orientación interior desordenada, no sólo contra una acción externa. 'Tu alma' conserva la tensión antropológica del hebreo y del griego, mientras que las alternativas se mantienen posibles para lectores que oigan un matiz más reflexivo o vital.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Hebrew-Greek parallel in the second half of the verse
  english_pob_reading: Do not rely on your own strength to walk after the desire of your soul
  chosen_spanish_reading: No confíes en tu propia fuerza para andar tras el deseo de tu alma
  alternative_spanish_readings:
  - No confíes en tu propia fuerza para andar según el deseo de tu alma
  - No te apoyes en tu fuerza para seguir el deseo de tu alma
  rationale: El hebreo base prohíbe apoyarse en la propia fuerza para seguir el deseo del alma; el paralelo griego añade la doble referencia a alma y fuerza y usa el plural 'deseos' / el giro de 'corazón'. La redacción española sigue principalmente el hebreo, pero conserva una formulación suficientemente abierta para no borrar la relación con el griego.
  doctrine_reference: Documented Hebrew base with Greek parallel; preserve source tension rather than harmonize away.
translation_notes:
  revision_awareness: El borrador sigue la lectura hebrea de base y mantiene visible la tensión con el paralelo griego en la nota alternativa. La elección de singular 'deseo' concuerda con el hebreo, mientras que la nota a recuerda la formulación griega más cercana. Se evita suavizar la advertencia moral hacia una simple exhortación psicológica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en pasajes relacionados; aquí no aparece.
  - Se mantiene 'alma' para נַפְשֶׁךָ con nota de alternativa, en coherencia con el tratamiento POB de ψυχή / נפשׁ.
  - '''Fuerza'' traduce כֹּחַ de forma consistente con el registro moral exhortativo del libro.'
  - '''Andar'' conserva el valor bíblico de conducta y modo de vida, no sólo desplazamiento físico.'
