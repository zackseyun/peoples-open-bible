translation:
  language: es
  text: y los patrusitas[a], los casluhitas (de los cuales salieron los filisteos), y los caftoritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de allí salieron los filisteos». El hebreo puede entenderse como una vinculación del origen de los filisteos con los casluhitas nombrados inmediatamente antes.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתְרֻסִים
  english_pob_choice: Pathrusites
  chosen_spanish: patrusitas
  alternatives_spanish:
  - pathrusitas
  - patrositas
  lexicon: HALOT
  rationale: Se conserva el nombre de pueblo como etnónimo transliterado. En español, la forma con adaptación fonética leve «patrusitas» resulta más natural que una transliteración más rígida, sin dejar de reflejar Pathros como base del nombre.
- source_word: כַּסְלֻחִים
  english_pob_choice: Casluhites
  chosen_spanish: casluhitas
  alternatives_spanish:
  - kasluhitas
  lexicon: HALOT
  rationale: El hebreo designa un grupo étnico de identificación incierta; se mantiene la transliteración para no sobreafirmar una identificación histórica que el texto no explicita.
- source_word: אֲשֶׁר יָצְאוּ מִשָּׁם
  english_pob_choice: from whom the Philistines came
  chosen_spanish: de los cuales salieron los filisteos
  alternatives_spanish:
  - de allí salieron los filisteos
  - de donde salieron los filisteos
  lexicon: HALOT
  rationale: La cláusula hebrea dice literalmente «de allí salieron». En español, «de los cuales salieron» permite vincular la referencia inmediata con los casluhitas, siguiendo la lectura auditada de la POB inglesa, sin forzar un giro más interpretativo como «descendieron».
- source_word: פְּלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Se usa el etnónimo español establecido y transparente. No se adopta una forma más arcaica, porque el texto genealógico pide claridad nominal directa.
- source_word: כַּפְתֹּרִים
  english_pob_choice: Caphtorites
  chosen_spanish: caftoritas
  alternatives_spanish:
  - kaphtoritas
  - caftoreos
  lexicon: HALOT
  rationale: Se conserva el etnónimo como nombre de pueblo. «Caftoritas» sigue la adaptación al español de la raíz Caphtor, manteniendo la relación con el topónimo sin introducir un término explicativo no presente en el hebreo.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - y a
  lexicon: HALOT
  rationale: En una lista genealógica, el marcador conjuntivo se vierte naturalmente con «y»; no se reproduce el objeto directo de manera mecánica porque en español rompería la fluidez del listado.
theological_decisions:
- issue: Alcance del origen de los filisteos
  english_pob_reading: 'The Casluhites are the immediate referent: ''the Casluhites (from whom the Philistines came)'''
  chosen_spanish_reading: 'Los casluhitas son el referente inmediato: «los casluhitas (de los cuales salieron los filisteos)».'
  alternative_spanish_readings:
  - «de allí salieron los filisteos»
  - «de donde salieron los filisteos»
  rationale: El hebreo permite una relación sintáctica algo abierta, pero el flujo genealógico favorece conectar la nota de origen con el grupo inmediatamente anterior. La formulación española mantiene esa tensión sin convertirla en una afirmación histórica más fuerte que la del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual en lugar de resolverla'
- issue: Forma de traducir el verbum de origen
  english_pob_reading: came
  chosen_spanish_reading: salieron
  alternative_spanish_readings:
  - vinieron
  - procedieron
  rationale: «Salieron» conserva el sentido direccional/originario del hebreo יָצְאוּ y de la nota inglesa «came», evitando una paráfrasis más doctrinal o genealógica de «procedieron».
  doctrine_reference: 'Principio POB: fidelidad semántica con español natural'
- issue: Etnónimos en español
  english_pob_reading: Pathrusites / Casluhites / Caphtorites
  chosen_spanish_reading: patrusitas / casluhitas / caftoritas
  alternative_spanish_readings:
  - pathrusitas / kasluhitas / kaphtoritas
  rationale: Se opta por formas consistentes y legibles en español, manteniendo la señal de pueblo con -itas y preservando la transparencia del nombre propio sin domesticarlo a equivalentes tradicionales no atestiguados por el paquete auditado.
  doctrine_reference: Terminología POB para nombres étnicos transliterados
translation_notes:
  revision_awareness: El paquete inglés ya fue revisado sin cambios en el último pase; la presente propuesta sigue de cerca la solución auditada, adaptándola al español con una transliteración consistente y manteniendo la nota de ambigüedad sobre el origen de los filisteos.
  spanish_consistency_notes:
  - Se conserva la lista genealógica con paralelismo coordinado por «y».
  - Se mantiene el etnónimo «filisteos» como forma asentada en español.
  - La nota al pie marca la alternativa de lectura sin desplazarla al cuerpo principal.
  - La puntuación con paréntesis reproduce la aclaración originaria sobre el grupo antecedente.
