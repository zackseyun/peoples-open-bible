translation:
  language: es
  text: Yahvé, por causa de tu siervo y conforme a tu corazón[a], has hecho toda esta grandeza[b], para dar a conocer todas estas grandes cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a tu voluntad». Hebreo: «conforme a tu corazón».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa del singular «toda esta grandeza» al plural «todas estas grandes cosas», probablemente usando el singular como resumen colectivo y el plural para sus manifestaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del hebreo, conforme a la política del proyecto. En español, 'Yahvé' es la forma establecida para reproducir YHWH sin enmascararlo como título.
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por amor de
  - a causa de
  - en favor de
  lexicon: HALOT
  rationale: La construcción expresa motivo o consideración. 'Por causa de' comunica bien la relación de referencia sin perder el matiz de fundamento o ocasión.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En la oración dirigida a Dios, 'siervo' es el equivalente natural y reverente en español. 'Esclavo' conservaría la fuerza léxica, pero aquí sonaría excesivo y menos idiomático para la relación de David con Yahvé.
- source_word: וּכְלִבְּךָ
  english_pob_choice: and according to your heart
  chosen_spanish: conforme a tu corazón
  alternatives_spanish:
  - y según tu corazón
  - y conforme a tu voluntad
  - y según tu querer
  lexicon: HALOT
  rationale: Se conserva 'corazón' para no resolver la metáfora hebrea en 'voluntad'. 'Conforme a' expresa adecuadamente la idea de correspondencia con la disposición interior de Dios.
- source_word: עָשִׂיתָ
  english_pob_choice: you have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - has realizado
  - hiciste
  - has obrado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera natural en español con perfecto compuesto, que mantiene la relevancia presente de la acción divina.
- source_word: כָּל הַגְּדוּלָּה הַזֹּאת
  english_pob_choice: all this greatness
  chosen_spanish: toda esta grandeza
  alternatives_spanish:
  - todo este gran hecho
  - toda esta obra grande
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo. 'Grandeza' permite reflejar la abstracción y el peso de la acción divina sin pasar de inmediato a 'hechos'.
- source_word: לְהוֹדִיעַ
  english_pob_choice: to make known
  chosen_spanish: para dar a conocer
  alternatives_spanish:
  - para hacer saber
  - para revelar
  lexicon: HALOT
  rationale: La forma causativa pide un equivalente natural en español. 'Dar a conocer' transmite claramente el sentido de 'hacer saber' sin sobrecarga formal.
- source_word: כָּל הַגְּדֻלּוֹת
  english_pob_choice: all these great things
  chosen_spanish: todas estas grandezas
  alternatives_spanish:
  - todas estas obras grandes
  - todos estos grandes hechos
  lexicon: HALOT
  rationale: Se refleja el plural hebreo y su relación con la 'grandeza' singular anterior. 'Grandezas' conserva la repetición léxica y la amplitud semántica del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión del proyecto para YHWH. En español, 'Yahvé' mantiene el referente personal y evita el reemplazo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora antropomórfica 'tu corazón'
  english_pob_reading: according to your heart
  chosen_spanish_reading: conforme a tu corazón
  alternative_spanish_readings:
  - conforme a tu voluntad
  - según tu voluntad
  rationale: Se preserva la metáfora del hebreo, porque 'corazón' aquí comunica intención/disposición divina sin necesidad de resolverla. Esto mantiene la tensión teológica y la imagen bíblica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el criterio auditado de la POB inglesa: nombre divino como Yahweh/Yahvé, conservación de la metáfora de ''corazón'', y mantenimiento del contraste singular/plural entre ''grandeza'' y ''grandezas''. No hay revisiones aplicadas en el expediente inglés, y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para YHWH en el texto principal.
  - Se mantiene el singular 'grandeza' y el plural 'grandezas' para reflejar la alternancia del hebreo.
  - '''Conforme a tu corazón'' conserva la imagen antropomórfica sin convertirla en paráfrasis interpretativa.'
