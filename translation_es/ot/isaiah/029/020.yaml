    reason: lexical_alternative
  - marker: b
    text: O «todos los que están entregados al mal» o «todos los que acechan la iniquidad». El participio hebreo sugiere una atención vigilante y deliberada al mal.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el texto para reflejar mejor las decisiones léxicas documentadas del POB y el matiz del hebreo: «el despiadado» evita sobreespecificar עָרִיץ; «llegará a su fin» reemplaza una formulación española menos natural; «serán excluidos» conserva mejor la fuerza judicial de וְנִכְרְתוּ que «serán eliminados»; «la maldad» expresa con más precisión el sentido ético de אָוֶן. También se corrigió la ubicación y el contenido de la nota b para que corresponda al último sintagma, como en la auditoría inglesa.'
