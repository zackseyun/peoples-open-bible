revisions:
- from: 'Y a Caleb hijo de Jefone le dio una porción entre los hijos de Judá[a], conforme a la boca de Yahvé a Josué: Quiriat-arba (Arba fue el padre de Anac), es decir[b], Hebrón.'
  to: 'Y a Caleb hijo de Jefone le dio una porción entre los hijos de Judá, conforme al mandato de Yahvé[a] a Josué: Quiriat-arba (Arba fue el padre de Anac), es decir[b], Hebrón.'
  rationale: La revisión corrige el principal problema de fidelidad idiomática al poner en el texto principal el sentido natural de אֶל־פִּי יְהוָה (‘conforme al mandato de Yahvé’) y deja la literalidad ‘boca’ como alternativa en nota, en línea con el expediente inglés y con un español más natural. También recoloca el anclaje de la nota a en la frase relevante. Se conserva la ambigüedad del sujeto implícito y la aclaración parentética sobre Arba.
  reviewer_model: gpt-5.4
