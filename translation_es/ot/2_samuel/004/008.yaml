revisions:
- from: 'Y trajeron la cabeza de Is-boset a David en Hebrón, y dijeron al rey: «Aquí está la cabeza de Is-boset, hijo de Saúl, tu enemigo, que buscaba tu vida. Yahvé le ha dado hoy a mi señor el rey venganzas[a] contra Saúl y contra su descendencia».'
  to: 'Y trajeron la cabeza de Is-boset a David en Hebrón, y dijeron al rey: «Aquí está la cabeza de Is-boset, hijo de Saúl, tu enemigo, que buscaba tu vida. Yahvé ha dado hoy a mi señor el rey venganza[a] contra Saúl y contra su descendencia».'
  rationale: La revisión mantiene el contenido del hebreo y las decisiones teológicas del POB, pero mejora la legibilidad y la fidelidad funcional al usar el singular abstracto natural «venganza» para el plural intensivo נְקָמוֹת, preservando la información morfológica en nota. También elimina el clítico redundante en «Yahvé ha dado hoy a mi señor el rey...».
