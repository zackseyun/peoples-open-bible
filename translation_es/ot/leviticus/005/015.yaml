  to: 'Si una persona actúa infielmente y peca inadvertidamente respecto de las cosas sagradas de Yahvé, traerá su sacrificio por la culpa[a] a Yahvé: un carnero sin defecto del rebaño, conforme a tu valoración, en siclos de plata, según el siclo del santuario[b], como sacrificio por la culpa.'
