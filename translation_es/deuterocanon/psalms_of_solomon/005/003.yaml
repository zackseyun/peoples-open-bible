- from: Pero si clamo a ti[a], no guardes silencio para conmigo.
  to: Pero si clamo a ti[a], no guardes silencio ante mí.
  rationale: Se reemplaza “para conmigo” por “ante mí” para lograr un español más natural y ampliamente legible, manteniendo el tono de súplica reverente y la referencia personal del griego. Se conserva la nota léxica porque sigue reflejando adecuadamente la alternativa más literal documentada en el POB inglés.
