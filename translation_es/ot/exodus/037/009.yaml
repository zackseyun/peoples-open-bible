translation:
  language: es
  text: Los querubines tenían las alas extendidas hacia arriba[a], cubriendo por encima el propiciatorio con sus alas, y sus rostros estaban el uno hacia el otro; los rostros de los querubines estaban hacia el propiciatorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la cubierta» o «la cubierta de expiación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubines
  lexicon: HALOT
  rationale: Se conserva el término técnico tradicional transliterado en español bíblico. «Querubines» expresa mejor que «querubs» la forma cultual y literaria del hebreo plural.
- source_word: פֹּרְשֵׂי כְנָפַיִם לְמַעְלָה
  english_pob_choice: had their wings spread upward
  chosen_spanish: tenían las alas extendidas hacia arriba
  alternatives_spanish:
  - con las alas extendidas hacia arriba
  - alzaban las alas hacia arriba
  lexicon: HALOT
  rationale: El participio hebreo describe una postura continua; en español, «tenían... extendidas» comunica naturalmente esa disposición sin perder la dirección vertical de las alas.
- source_word: סֹכְכִים
  english_pob_choice: overshadowing
  chosen_spanish: cubriendo
  alternatives_spanish:
  - cubriendo por encima
  - protegiendo
  lexicon: HALOT
  rationale: «Cubriendo» mantiene la idea de cobertura por encima de la tapa del arca. En español, «sombreando» o «ensombreciendo» sería posible, pero aquí «cubriendo» resulta más claro y sigue la imagen cultual sin exagerarla.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta
  - la cubierta de expiación
  lexicon: HALOT
  rationale: Se opta por «propiciatorio» como equivalente bíblico tradicional y preciso para la pieza del arca. «Cubierta» sería más literal, pero pierde el peso cultual que el contexto requiere; por eso se conserva en nota la alternativa más literal.
- source_word: בְּכַנְפֵיהֶם
  english_pob_choice: with their wings
  chosen_spanish: con sus alas
  alternatives_spanish:
  - por medio de sus alas
  - mediante sus alas
  lexicon: HALOT
  rationale: La preposición instrumental se vierte naturalmente como «con», indicando el medio por el cual cubren el propiciatorio.
- source_word: וּפְנֵיהֶם אִישׁ אֶל אָחִיו
  english_pob_choice: and their faces were toward one another
  chosen_spanish: y sus rostros estaban uno frente al otro
  alternatives_spanish:
  - y sus rostros estaban el uno hacia el otro
  - y sus rostros estaban frente a frente
  lexicon: HALOT
  rationale: La frase hebrea se traduce con una construcción recíproca natural en español, conservando el paralelismo sin introducir una metáfora ajena al texto.
- source_word: אֶל הַכַּפֹּרֶת הָיוּ פְּנֵי הַכְּרֻבִים
  english_pob_choice: the faces of the cherubim were toward the mercy seat
  chosen_spanish: los rostros de los querubines estaban hacia el propiciatorio
  alternatives_spanish:
  - los rostros de los querubines miraban hacia el propiciatorio
  - hacia el propiciatorio estaban los rostros de los querubines
  lexicon: HALOT
  rationale: Se preserva el énfasis hebreo en los «rostros» y su orientación hacia el propiciatorio, en paralelo con la cláusula anterior.
theological_decisions:
- issue: Renderización de הַכַּפֹּרֶת en contexto tabernacular
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta
  - cubierta de expiación
  rationale: Aunque el hebreo puede entenderse literalmente como «cubierta», el objeto del arca tiene una función cultual específica. «Propiciatorio» conserva esa carga teológica en español y corresponde al uso bíblico tradicional sin ocultar el referente material.
  doctrine_reference: Ex 25:17-22; Lv 16; Romanos 3:25 (uso teológico posterior del término relacionado)
- issue: Mantener la imagen direccional de los querubines sin simplificarla
  english_pob_reading: their faces were toward one another ... toward the mercy seat
  chosen_spanish_reading: sus rostros estaban uno frente al otro ... hacia el propiciatorio
  alternative_spanish_readings:
  - sus rostros estaban frente a frente ... hacia el propiciatorio
  - sus rostros miraban el uno al otro ... hacia el propiciatorio
  rationale: La disposición de los querubines es parte del simbolismo del santuario; por eso se conserva tanto la reciprocidad como la orientación hacia el propiciatorio, sin colapsarlas en una sola idea.
  doctrine_reference: Éxodo 25:18-20; 1 Reyes 8:6-7
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el auditor inglés: conserva la estructura paralela de la cláusula, la orientación de los rostros y la distinción entre la postura de las alas y su función de cubrir. Se adoptó «propiciatorio» para transmitir la función cultual del objeto, mientras que la alternativa más literal se mantiene en nota para transparencia.'
  spanish_consistency_notes:
  - Se usa «querubines» como término técnico establecido y no «querubs», por inteligibilidad bíblica en español.
  - Se mantiene «rostros» en ambas cláusulas para respetar el énfasis hebreo repetido.
  - «Propiciatorio» se emplea de manera consistente para הַכַּפֹּרֶת, con nota de alternativa literal.
  - La puntuación conserva el paralelismo de dos miembros principales unidos por coma y punto y coma, como en el hebreo.
