base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/002.yaml
  text: '1 And when we went down into Egypt[2:1], Joseph my brother recognized me and said to me, “They smeared your tunic with blood and said, ‘See whether this is your son’s tunic.’”

    2 And he said to me, “Yes, brother. For when the Ishmaelites took me, one of them stripped me of my tunic and gave me a loincloth; and after flogging me, he told me to run.

    3 And while he was going away to hide my garment, a lion met him and killed him.

    4 So his companions, being afraid, sold me to others of their company.

    5 Thus Joseph did not lie in saying these things; for he wanted to hide from me the deeds of our brothers.

    6 And he called his brothers to himself and said,

    7 ‘Do not tell my father what you did to me, but speak in this way, just as I explained it to Benjamin.

    8 And let such thoughts be in you[2:8][2:4][2:3], and let not the words come…’'
  footnotes:
  - marker: '2:1'
    text: Some witnesses read more explicitly, “They sent it and said, ‘See whether this is your son’s tunic.’”
    reason: textual_variant
  - marker: '2:3'
    text: Other witnesses phrase the event differently, but all preserve the sense that the man handling Joseph's garment was killed by a wild beast, commonly a lion.
    reason: textual_variant
  - marker: '2:4'
    text: Some manuscripts read that they sold him to Ishmaelites; others, as here, to other traders of their company.
    reason: textual_variant
  - marker: '2:8'
    text: The Greek text breaks off here. The unfinished sentence has been left incomplete rather than reconstructed.
    reason: textual_variant
