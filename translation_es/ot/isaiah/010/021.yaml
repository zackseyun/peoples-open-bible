translation:
  language: es
  text: Un remanente volverá, el remanente de Jacob[b], al Dios Poderoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Dios, el Poderoso»; menos probable, «a un dios poderoso» o «a un héroe poderoso». El título hebreo אֵל גִּבּוֹר también aparece en Isaías 9:6.
    reason: lexical_alternative
  - marker: b
    text: La redacción evoca el nombre Sear-jasub («un remanente volverá») en Isaías 7:3.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁאָר
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - sobrevivientes
  lexicon: HALOT
  rationale: El sustantivo designa lo que queda después del juicio o la catástrofe. En español, «remanente» conserva ese valor numérico y teológico en Isaías sin volverse explicativo de más.
- source_word: יָשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - retornará
  - volverá atrás
  lexicon: HALOT
  rationale: El imperfecto qal de שוב expresa retorno. «Volverá» es natural en español moderno y preserva el sentido profético futuro y el juego verbal con el nombre Shear-jashub.
- source_word: שְׁאָר יַעֲקֹב
  english_pob_choice: the remnant of Jacob
  chosen_spanish: el remanente de Jacob
  alternatives_spanish:
  - el resto de Jacob
  - el remanente jacobita
  lexicon: HALOT
  rationale: La construcción genitiva se expresa de manera idiomática como «el remanente de Jacob». Mantiene la referencia al patriarca y el sentido colectivo del grupo preservado.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a Jacob. No debe sustituirse por «Israel» en la traducción principal.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición indica movimiento o orientación hacia un referente; «al» es la equivalencia española más clara y natural aquí.
- source_word: אֵל גִּבּוֹר
  english_pob_choice: the Mighty God
  chosen_spanish: Dios Poderoso
  alternatives_spanish:
  - Dios Fuerte
  - el Dios Poderoso
  - Poderoso Dios
  lexicon: HALOT
  rationale: El sintagma funciona como título divino. En español, «Dios Poderoso» conserva la referencia a Dios sin forzar una paráfrasis. Se evita «héroe» porque el contexto de regreso «a» este referente favorece una lectura divina.
theological_decisions:
- issue: Alcance teológico de אֵל גִּבּוֹר
  english_pob_reading: the Mighty God
  chosen_spanish_reading: Dios Poderoso
  alternative_spanish_readings:
  - poderoso dios
  - Dios el Poderoso
  - mighty hero
  rationale: El contexto dice que el remanente vuelve «al» referente de la cláusula, lo que apunta con fuerza a una figura divina. En Isaías, אֵל גִּבּוֹר tiene peso de título de Dios y debe preservarse así en la traducción principal.
  doctrine_reference: Isaías 9:6; afirmaciones de traducción
- issue: Eco nominal con Isaías 7:3
  english_pob_reading: The wording echoes the name Shear-jashub ('a remnant will return') in Isaiah 7:3.
  chosen_spanish_reading: La redacción evoca el nombre Sear-jasub («un remanente volverá») de Isaías 7:3.
  alternative_spanish_readings:
  - La frase alude al nombre Shear-jashub de Isaías 7:3.
  - La expresión recuerda el nombre de Isaías 7:3.
  rationale: Conviene preservar la observación intertextual del texto fuente para que el lector perciba el juego de palabras profético entre el nombre y la frase del versículo.
  doctrine_reference: Isaías 7:3; intertextualidad profética
translation_notes:
  revision_awareness: 'Se siguió el apunte más reciente del expediente en inglés: no hubo revisiones aplicadas y el acuerdo de revisión fue alto. La redacción española conserva la estructura breve y el juego verbal del original, sin suavizar la tensión teológica de אֵל גִּבּוֹר.'
  spanish_consistency_notes:
  - Se mantuvo «remanente» para שְׁאָר por coherencia con el uso profético de Isaías.
  - Se usó «Dios Poderoso» como título divino; el pie de nota preserva la alternativa lexical donde podría entenderse de modo menos fuerte.
  - Se optó por «volverá» para יָשׁוּב porque reproduce el valor futuro profético y mantiene la alusión nominal.
  - «Jacob» se conservó sin sustituirlo por «Israel» porque el hebreo nombra explícitamente a Jacob.
