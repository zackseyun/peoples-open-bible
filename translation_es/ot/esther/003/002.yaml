translation:
  language: es
  text: Y todos los servidores del rey que estaban en la puerta del rey se inclinaban y se postraban ante Amán[a], porque así lo había mandado el rey respecto de él[b]. Pero Mardoqueo no se inclinaba ni se postraba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se prosternaban ante Amán’; el verbo hebreo también puede traducirse ‘adoraban’ en contextos en que el objeto es divino.
    reason: lexical_alternative
  - marker: b
    text: O ‘porque así lo había mandado el rey a él’; el pronombre se entiende mejor como referido a Amán, es decir, la orden concernía al honor debido a él.
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - sirvientes
  lexicon: HALOT
  rationale: En un contexto de corte real, el inglés POB eligió 'servants' para mantener la idea de personal de servicio sin afirmar esclavitud. En español, 'siervos' conserva esa relación subordinada y funciona de manera natural en registro bíblico; 'servidores' suena más neutral pero menos acorde con la carga cortesana del hebreo, y 'sirvientes' es posible pero menos digno.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: at the king’s gate
  chosen_spanish: a la puerta del rey
  alternatives_spanish:
  - en la puerta del rey
  - en la puerta real
  lexicon: HALOT
  rationale: La frase designa el lugar asociado con el ejercicio público y administrativo del poder real. 'A la puerta del rey' reproduce bien la concreción del hebreo y es idiomático en español bíblico; 'en la puerta del rey' también es posible, pero 'a la' sugiere mejor la localización habitual de la escena.
- source_word: כֹּרְעִים
  english_pob_choice: were bowing down
  chosen_spanish: se inclinaban
  alternatives_spanish:
  - se arrodillaban
  - se postraban
  lexicon: HALOT
  rationale: El participio indica una acción habitual o repetida. 'Se inclinaban' preserva la idea básica de inclinarse sin forzar la imagen a un gesto más específico que el hebreo no exige; 'se arrodillaban' estrecha demasiado el sentido, y 'se postraban' queda más cerca del segundo verbo.
- source_word: וּמִשְׁתַּחֲוִים
  english_pob_choice: paying homage
  chosen_spanish: se postraban
  alternatives_spanish:
  - rendían homenaje
  - adoraban
  lexicon: HALOT
  rationale: El verbo puede indicar postración, homenaje o adoración según el contexto. Como el objeto es Amán y no Dios, la POB en inglés evita 'worship' y prefiere un gesto de homenaje. En español, 'se postraban' conserva la fuerza corporal y ceremonial del verbo; 'rendían homenaje' es correcto pero menos visual, y 'adoraban' importaría un matiz religioso no sustentado aquí.
- source_word: לְהָמָן
  english_pob_choice: to Haman
  chosen_spanish: ante Amán
  alternatives_spanish:
  - a Amán
  - frente a Amán
  lexicon: HALOT
  rationale: El complemento marca el destinatario de la reverencia. 'Ante Amán' expresa de modo natural la postura corporal y el acto de reverencia en español, sin perder el referente personal.
- source_word: כִּי כֵן צִוָּה ל֣וֹ הַמֶּלֶךְ
  english_pob_choice: for the king had so commanded concerning him
  chosen_spanish: porque así lo había mandado el rey respecto de él
  alternatives_spanish:
  - porque así se lo había mandado el rey
  - porque el rey así lo había ordenado para él
  lexicon: HALOT
  rationale: El pronombre hebreo admite una relación ambigua; el audit trail inglés entiende que la orden se refería a Amán, es decir, al honor que debía dársele. 'Respecto de él' mantiene esa referencia sin convertirlo en objeto directo de mandato, y conserva la tensión interpretativa documentada.
- source_word: וּמָרְדֳּכַי
  english_pob_choice: But Mordecai
  chosen_spanish: Pero Mardoqueo
  alternatives_spanish:
  - Y Mardoqueo
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el contraste discursivo con la conducta general es fuerte. 'Pero' reproduce mejor ese giro adversativo en español, como en la traducción inglesa auditada.
- source_word: לֹא יִכְרַע וְלֹא יִשְׁתַּחֲוֶה
  english_pob_choice: would not bow down or pay homage
  chosen_spanish: no se inclinaba ni se postraba
  alternatives_spanish:
  - no se arrodillaba ni se postraba
  - no se inclinaba ni rendía homenaje
  lexicon: HALOT
  rationale: Los imperfectos expresan la negativa constante o la negativa de voluntad de Mardoqueo frente a la práctica de los demás. En español, el imperfecto ('no se inclinaba ni se postraba') mantiene ese valor habitual y preserva la repetición del par verbal; 'rendía homenaje' sería menos gráfico aquí.
theological_decisions:
- issue: Si el segundo verbo debe sonar como 'adoración' religiosa o como homenaje cortesano
  english_pob_reading: Rendered as 'paying homage' / 'pay homage' rather than 'worship.'
  chosen_spanish_reading: '''Se postraban'' / ''se postraba'' para conservar el gesto de homenaje sin introducir adoración religiosa'
  alternative_spanish_readings:
  - adoraban
  - se prosternaban en adoración
  - rindían culto
  rationale: 'El hebreo permite tanto homenaje humano como adoración divina según el objeto. Aquí el objeto es Amán, por lo que una traducción abiertamente religiosa añadiría una interpretación no exigida por el texto. La redacción elegida conserva la tensión: la acción es claramente reverente y corporal, pero no se la convierte en culto.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el estado revisado más reciente del POB en inglés: no se aplicaron cambios ulteriores y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se mantuvo 'Amán' como forma hispana del nombre propio, coherente con el uso bíblico en español.
  - Se preservó la distinción entre reverencia corporal y adoración religiosa, siguiendo la decisión auditada del POB en inglés.
  - Se usó imperfecto en los verbos principales para reflejar acción habitual o negativa de voluntad, conforme al valor aspectual del hebreo y al análisis del audit trail.
