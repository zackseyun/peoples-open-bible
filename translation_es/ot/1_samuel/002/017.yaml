revisions:
- from: Así que el pecado de los jóvenes fue muy grande delante de Yahvé[a][b], porque los hombres despreciaron la ofrenda de Yahvé[c].
  to: Y el pecado de los jóvenes fue muy grande delante de Yahvé[b][a], porque los hombres despreciaron la ofrenda de Yahvé[c].
  rationale: Se reemplaza «Así que» por «Y» para reflejar mejor la función narrativa de וַתְּהִי y evitar una inferencia excesiva en español. También se simplifican y alinean las notas con el enfoque léxico del audit trail, manteniendo las aclaraciones útiles sobre el modismo hebreo y sobre minḥah. No se requieren cambios doctrinales ni semánticos de fondo.
