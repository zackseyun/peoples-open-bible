translation:
  language: es
  text: 'Lo profundo[a] dice: «No está en mí», y el mar dice: «No está conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ella no está en mí». El pronombre femenino se refiere a la sabiduría, personificada como femenina en el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo[a]
  alternatives_spanish:
  - el abismo
  - las profundidades
  - el mar profundo
  lexicon: HALOT
  rationale: תְּהוֹם designa la gran masa o profundidad acuática primordial. En español, «abismo» comunica bien esa hondura amplia y poética, y mantiene el paralelismo con «el mar». Se conserva la nota para explicar que el término no es meramente geográfico, sino que personifica una realidad acuática que responde como hablante.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - decía
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en poesía funciona con viveza presente. «Dice» reproduce esa inmediatez personificada mejor que un pasado narrativo.
- source_word: לֹא בִי הִיא
  english_pob_choice: It is not in me
  chosen_spanish: No está en mí
  alternatives_spanish:
  - No está ella en mí
  - No se halla en mí
  lexicon: HALOT
  rationale: La expresión literalmente contiene «en mí», y el pronombre femenino hebreo remite a la sabiduría personificada en el contexto. En español, «No está en mí» suena natural y respeta la ambigüedad entre referencia personal y abstracta; la nota aclara la lectura femenina del hebreo.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: יָם es el término ordinario para «mar». «Mar» es más fiel y poético que «océano», y conserva el paralelismo con «el abismo».
- source_word: אֵין עִמָּדִי
  english_pob_choice: It is not with me
  chosen_spanish: No está conmigo
  alternatives_spanish:
  - No está a mi lado
  - No lo tengo conmigo
  lexicon: HALOT
  rationale: La frase expresa ausencia en la compañía o posesión de alguien. «No está conmigo» mantiene esa idea relacional y la simetría con el primer hemistiquio, sin sobreinterpretar como simple posesión.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Job 28:14 y coincide sustancialmente con el sentido auditado en la versión inglesa POB. Se prefirió una formulación española natural («No está en mí / No está conmigo») manteniendo el paralelismo poético y la personificación, sin introducir interpretaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «el abismo» y «el mar» como dos miembros personificados que hablan.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes; el versículo no contiene el nombre divino.
  - «Dice» conserva mejor la vivacidad poética que un pasado narrativo.
  - La nota [a] es necesaria porque el español pierde por sí solo la referencia femenina implícita en el hebreo.
