translation:
  language: es
  text: 'Y sucedió[a], cuando Raquel había dado a luz a José, que Jacob dijo a Labán: «Déjame partir, para que vaya a mi lugar y a mi tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Envíame, para que vaya a mi lugar y a mi tierra»; el hebreo también puede expresarse como una petición directa seguida del propósito o resultado expresado por la cohortativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo desarrollo en el relato. «Y sucedió» conserva bien el valor discursivo del hebreo con un español natural y digno, sin caer en arcaísmo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  - así que
  lexicon: HALOT
  rationale: Aquí la partícula marca una circunstancia temporal. «Cuando» reproduce la relación temporal sin añadir una precisión de inmediatez que el hebreo no exige explícitamente.
- source_word: יָלְדָה
  english_pob_choice: had borne
  chosen_spanish: había dado a luz
  alternatives_spanish:
  - había parido
  - había alumbrado
  lexicon: HALOT
  rationale: El verbo ילד expresa dar a luz. «Había dado a luz» es claro, sobrio y fiel; mantiene el marco temporal anterior al dicho de Jacob.
- source_word: וַיֹּאמֶר יַעֲקֹב אֶל לָבָן
  english_pob_choice: that Jacob said to Laban
  chosen_spanish: que Jacob dijo a Labán
  alternatives_spanish:
  - y Jacob dijo a Labán
  - Jacob dijo a Labán
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración y en español se integra naturalmente con «que» tras la cláusula temporal. «Dijo a Labán» conserva el valor del discurso directo sin sobrecargarlo.
- source_word: שַׁלְּחֵנִי
  english_pob_choice: Send me away
  chosen_spanish: Despáchame
  alternatives_spanish:
  - Déjame ir
  - Envíame lejos
  lexicon: HALOT
  rationale: El imperativo de שלח con sufijo de primera persona expresa una petición de liberación o permiso para partir. «Despáchame» recoge mejor esa fuerza que un simple «déjame ir», y evita el tono excesivamente coloquial de otras opciones.
- source_word: וְאֵלְכָה
  english_pob_choice: that I may go
  chosen_spanish: para que vaya
  alternatives_spanish:
  - y vaya
  - a fin de que vaya
  lexicon: HALOT
  rationale: La cohortativa expresa propósito o intención. «Para que vaya» transmite la finalidad en español de manera natural y mantiene la relación con la petición anterior.
- source_word: מְקוֹמִי
  english_pob_choice: my place
  chosen_spanish: mi lugar
  alternatives_spanish:
  - mi lugar propio
  - mi sitio
  lexicon: HALOT
  rationale: מקום significa literalmente «lugar». Se evita añadir posesivos enfáticos no presentes en el hebreo; «mi lugar» es fiel y transparente.
- source_word: וּלְאַרְצִי
  english_pob_choice: and to my land
  chosen_spanish: y a mi tierra
  alternatives_spanish:
  - y a mi país
  - y a mi suelo
  lexicon: HALOT
  rationale: אֶרֶץ suele rendirse por «tierra» en este contexto patriarcal. «Mi tierra» preserva la referencia a la tierra natal sin introducir el sentido moderno de «país».
translation_notes:
  revision_awareness: 'El audit trail en inglés revisó una ampliación indebida de ‘own’ y dejó solo ‘my place’ / ‘my land’. La versión española sigue ese ajuste: no añade posesivos enfáticos fuera del hebreo y mantiene una construcción breve y narrativa. No se detectaron cuestiones doctrinales especiales en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «mi tierra» en vez de «mi país» para evitar una modernización semántica ajena al contexto patriarcal.
  - Se evitó «Cristo», «Señor» u այլ terminología ajena al contenido inmediato.
  - La cita directa se marcó con comillas latinas españolas y puntuación acorde al estilo editorial del proyecto.
