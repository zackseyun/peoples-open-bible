translation:
  language: es
  text: Yahvé[a] descendió sobre el monte Sinaí, a la cima del monte. Entonces Yahvé llamó a Moisés a la cima del monte[b], y Moisés subió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''descendió sobre el monte Sinaí, a la cumbre del monte''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''a la cabeza del monte'', es decir, ''a la cima o cumbre del monte''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: El hebreo ירד expresa movimiento hacia abajo. En español, 'descendió' conserva con precisión el sentido direccional y mantiene un registro digno; 'bajó' sería más llano, pero algo menos solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La base auditada del POB usa la transliteración del Nombre divino. En español, 'Yahvé' es el equivalente natural de esa decisión, preservando el nombre propio del pacto y evitando la sustitución por un título.
- source_word: הַר סִינַי
  english_pob_choice: Mount Sinai
  chosen_spanish: el monte Sinaí
  alternatives_spanish:
  - el monte de Sinaí
  - Sinaí
  lexicon: HALOT
  rationale: '''Monte Sinaí'' es la forma castellana más clara e idiomática para el topónimo compuesto, manteniendo la referencia geográfica sin añadir matices no presentes en el hebreo.'
- source_word: אֶל רֹאשׁ הָהָר
  english_pob_choice: to the top of the mountain
  chosen_spanish: a la cima del monte
  alternatives_spanish:
  - al tope del monte
  - a la cumbre del monte
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es 'cabeza', pero aquí es una imagen idiomática del punto más alto. 'Cima' comunica bien esa imagen en español sin sonar mecánico; 'cumbre' también es posible, pero 'cima' encaja mejor con el paralelismo del verso.
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: En este contexto קרא significa llamar a alguien. 'Llamó' reproduce el acto verbal de manera directa y natural; 'convocó' añadiría un matiz más formal que el hebreo no exige.
- source_word: לְמֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: El nombre propio se vierte de manera estándar al español como 'Moisés'. El dativo hebreo queda expresado con la preposición 'a' para reflejar el llamado dirigido a él.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: '''Subió'' es la forma natural y precisa para עלה en español narrativo. Además conserva el contraste con ''descendió'' al inicio del versículo.'
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de teofanía sinaítica
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de forma explícita, y la línea editorial auditada del POB evita sustituirlo por un título. 'Yahvé' preserva el Nombre revelado a Israel en Sinaí y mantiene la coherencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. La redacción mantiene la alternancia descendió/subió y la metáfora hebrea de רֹאשׁ ('cabeza') mediante 'cima'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera uniforme para יְהוָה, conforme a la política del proyecto.
  - '''Monte Sinaí'' y ''monte'' se mantuvieron consistentes para el lugar y su referente inmediato.'
  - 'Se preservó el paralelismo direccional del verso: descendió / llamó / subió.'
