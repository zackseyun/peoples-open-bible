translation:
  language: es
  text: 'Cuando Joab y todo el ejército que estaba con él vinieron, le dijeron a Joab: «Abner hijo de Ner vino al rey, y él lo dejó ir, y se fue en paz[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se fue sin daño» / «partió en paz». El hebreo expresa una partida pacífica, con el matiz de que no sufrió daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  english_pob_choice: When Joab
  chosen_spanish: Cuando Joab
  alternatives_spanish:
  - Y Joab
  - Ahora bien, Joab
  lexicon: HALOT
  rationale: La conjunción con nombre propio en narración puede marcar el comienzo temporal de la escena; «Cuando» reproduce bien esa relación con la siguiente acción verbal sin sonar forzado en español.
- source_word: וְ/כָל הַ/צָּבָא אֲשֶׁר אִתּוֹ
  english_pob_choice: and all the army that was with him
  chosen_spanish: y toda la tropa que estaba con él
  alternatives_spanish:
  - y todo el ejército que estaba con él
  - y todas las fuerzas que estaban con él
  lexicon: HALOT
  rationale: צָבָא aquí designa el contingente militar de Joab. «Tropa» conserva el valor colectivo y militar sin la resonancia litúrgica de «ejército» ni el matiz más abstracto de «fuerzas».
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron / llegaron
  lexicon: HALOT
  rationale: El verbo simple «venir» corresponde directamente al hebreo בוא. En español narrativo, «vinieron» mantiene esa cercanía léxica; «llegaron» sería posible, pero se aleja un poco más del verbo fuente.
- source_word: וַ/יַּגִּדוּ לְ/יוֹאָב לֵ/אמֹר
  english_pob_choice: they told Joab, saying
  chosen_spanish: le avisaron a Joab, diciendo
  alternatives_spanish:
  - le informaron a Joab, diciendo
  - le dijeron a Joab, diciendo
  lexicon: HALOT
  rationale: נגד en Hiphil puede ser «decir/avisar/informar». «Avisaron» comunica el acto de reportar con naturalidad en español y conserva el encadenamiento narrativo con «diciendo».
- source_word: בָּא אַבְנֵר בֶּן נֵר אֶל הַ/מֶּ֔לֶךְ
  english_pob_choice: Abner son of Ner came to the king
  chosen_spanish: Abner hijo de Ner vino al rey
  alternatives_spanish:
  - Abner, hijo de Ner, vino al rey
  - Abner, hijo de Ner, fue al rey
  lexicon: HALOT
  rationale: La construcción hebrea de patronímico se expresa naturalmente con «hijo de». «Vino al rey» sigue de cerca el verbo fuente y evita introducir una idea de propósito que no está explícita.
- source_word: וַֽ/יְשַׁלְּחֵ֖/הוּ
  english_pob_choice: and he sent him away
  chosen_spanish: él lo despidió
  alternatives_spanish:
  - él lo envió
  - él lo dejó ir
  lexicon: HALOT
  rationale: שׁלח con objeto pronominal puede significar despedir o dejar ir. En este contexto narrativo, «despidió» expresa bien la acción de dejarlo partir y recoge la intención relacional del verbo mejor que un simple «envió».
- source_word: וַ/יֵּ֥לֶךְ בְּ/שָׁלוֹם
  english_pob_choice: and he went in peace
  chosen_spanish: y fue en paz
  alternatives_spanish:
  - y se fue en paz
  - y partió en paz
  - y fue sin sufrir daño
  lexicon: HALOT
  rationale: בשלום conserva el modismo de salida pacífica o segura. «Fue en paz» sigue de cerca la formulación hebrea y preserva la ambigüedad entre paz, bienestar y ausencia de daño.
theological_decisions:
- issue: Sentido de בְּשָׁלוֹם al final del versículo
  english_pob_reading: The Hebrew idiom indicates a peaceful, unharmed departure.
  chosen_spanish_reading: La expresión final indica una partida en paz, es decir, sin daño ni hostilidad.
  alternative_spanish_readings:
  - y se fue seguro
  - y partió sin daño
  rationale: No hay una afirmación doctrinal compleja, pero sí una tensión semántica entre «paz» y «seguridad». La redacción principal mantiene el modismo y la nota permite ver el matiz de ausencia de daño.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en «lo despidió[a]». También se mantuvo la correspondencia léxica cercana al hebreo con «vino»/«fue en paz», en línea con la revisión auditada que prefirió «came» sobre «arrived».
  spanish_consistency_notes:
  - Se evitó «ejército» para צָבָא a fin de no sobrecargar el registro; «tropa» preserva el referente militar colectivo.
  - Se conservó el orden narrativo de reportar («le avisaron... diciendo») para reflejar la cadena hebrea.
  - «Fue en paz» mantiene el modismo hebreo sin explicitar innecesariamente la glosa dentro del texto principal.
  - El nombre divino no aparece en este versículo, por lo que no hay decisión sobre Yahvé en el cuerpo textual.
