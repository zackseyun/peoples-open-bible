translation:
  language: es
  text: 'Ahora bien, los hijos de Saúl fueron Jonatán, Isví y Malquísúa; y los nombres de sus dos hijas fueron estos: el nombre de la primogénita[a] era Merab, y el nombre de la menor era Mical.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Primogénita» traduce con más precisión el hebreo que «mayor»; la alternativa «la mayor» sería posible, pero atenúa la relación de nacimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: Now ... were
  chosen_spanish: Ahora bien, ... fueron
  alternatives_spanish:
  - Y ... eran
  - Ahora ... eran
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce un nuevo dato narrativo/genealógico. «Ahora bien» conserva el valor discursivo de transición natural en español; «fueron» comunica la identificación listada, sin forzar una perífrasis innecesaria.
- source_word: בְּנֵי שָׁאוּל
  english_pob_choice: Saul’s sons
  chosen_spanish: los hijos de Saúl
  alternatives_spanish:
  - los hijos de Saúl
  lexicon: HALOT
  rationale: En español, «hijos» es el equivalente natural del constructo y evita un calco rígido. Se mantiene la especificación filial porque el versículo contrasta explícitamente con «sus dos hijas».
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: uso onomástico estándar
  rationale: Se emplea la forma española usual del nombre propio, plenamente reconocible en lectura bíblica.
- source_word: יִשְׁוִי
  english_pob_choice: Ishvi
  chosen_spanish: Isví
  alternatives_spanish:
  - Ishvi
  lexicon: uso onomástico estándar
  rationale: Se translitera de manera española y natural, conservando la forma consonántica del hebreo sin anglicismo innecesario.
- source_word: מַלְכִּי שׁוּעַ
  english_pob_choice: Malchi-shua
  chosen_spanish: Malquísúa
  alternatives_spanish:
  - Malqui-súa
  - Malquisúa
  lexicon: uso onomástico estándar
  rationale: El hebreo presenta dos elementos, pero en español el nombre funciona mejor como forma unificada. Se conserva la división sonora del compuesto sin introducir una glosa no presente en el texto.
- source_word: וְשֵׁם שְׁתֵּי בְנֹתָיו
  english_pob_choice: and the names of his two daughters were these
  chosen_spanish: y los nombres de sus dos hijas fueron estos
  alternatives_spanish:
  - y el nombre de sus dos hijas fue este
  lexicon: HALOT
  rationale: Aunque el hebreo usa שֵׁם en singular, el contexto introduce dos nombres; por eso se mantiene el plural español, como en la auditoría inglesa, para expresar con claridad la función de lista.
- source_word: הַבְּכִירָה
  english_pob_choice: the firstborn
  chosen_spanish: la primogénita
  alternatives_spanish:
  - la mayor
  - la primera nacida
  lexicon: HALOT
  rationale: «Primogénita» preserva con precisión la referencia de orden de nacimiento. En español bíblico es más exacto que «la mayor», que puede sonar solo comparativo de edad.
- source_word: מֵרַב
  english_pob_choice: Merab
  chosen_spanish: Merab
  alternatives_spanish:
  - Merab
  lexicon: uso onomástico estándar
  rationale: Nombre propio transliterado de manera estable en español.
- source_word: הַקְּטַנָּה
  english_pob_choice: the younger
  chosen_spanish: la menor
  alternatives_spanish:
  - la más joven
  - la pequeña
  lexicon: HALOT
  rationale: En este contexto familiar, el adjetivo indica relación de edad/estatus entre hermanas. «La menor» es la forma natural y precisa en español.
- source_word: מִיכַל
  english_pob_choice: Michal
  chosen_spanish: Mical
  alternatives_spanish:
  - Mical
  lexicon: uso onomástico estándar
  rationale: Se adopta la forma española común del nombre, manteniendo la referencia personal sin dependencias del inglés.
translation_notes:
  revision_awareness: Se revisó el alineamiento con el hebreo y con la auditoría inglesa. No se requieren cambios de sentido respecto del texto fuente; solo se ajustó la naturalidad española y se preservó la aclaración sobre el plural «nombres» implícita en la lista.
  spanish_consistency_notes:
  - 'Se conservaron los nombres propios en formas españolas habituales: Jonatán, Isví, Malquísúa y Mical.'
  - Se mantuvo la correspondencia entre el singular hebreo שֵׁם y el plural español «nombres» por exigencia del contexto enumerativo.
  - «Primogénita» y «menor» preservan el orden familiar sin sobreinterpretar el texto.
