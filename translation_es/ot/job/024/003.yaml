translation:
  language: es
  text: Se llevan el asno de los huérfanos[a]; toman el buey de la viuda en prenda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el asno del huérfano'. El hebreo usa un plural en 'huérfanos', que puede entenderse distributiva o colectivamente.
    reason: lexical_alternative
  - marker: b
    text: O 'como garantía'. El verbo se refiere específicamente a tomar un bien como seguridad por una deuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - pollino
  lexicon: HALOT
  rationale: En español, 'asno' es un equivalente natural y digno para el animal doméstico de carga; conserva el registro bíblico sin sonar arcaico como 'pollino' ni demasiado coloquial como 'burro'.
- source_word: יְתוֹמִים
  english_pob_choice: the orphan's
  chosen_spanish: de los huérfanos
  alternatives_spanish:
  - del huérfano
  - de los huérfanos
  lexicon: HALOT
  rationale: El hebreo está en plural y puede leerse colectivamente; por eso conviene mantener el plural en español y no singularizarlo. 'De los huérfanos' conserva mejor el alcance social del grupo.
- source_word: יִנְהָגוּ
  english_pob_choice: drive away
  chosen_spanish: hacían conducir
  alternatives_spanish:
  - llevaban
  - arreaban
  - expulsaban
  lexicon: HALOT
  rationale: La forma verbal admite la idea de conducir o llevar. En este contexto, 'hacían conducir' mantiene la acción sobre el animal sin añadir una interpretación demasiado fuerte como 'expulsaban', y evita perder el matiz de desplazamiento forzado.
- source_word: יַחְבְּלוּ
  english_pob_choice: take ... as a pledge
  chosen_spanish: tomaban en prenda
  alternatives_spanish:
  - tomaban como prenda
  - se llevaban en prenda
  - tomaban como garantía
  lexicon: HALOT
  rationale: '''Tomar en prenda'' expresa el valor jurídico-económico del verbo hebreo, preservando la idea de un bien retenido como seguridad por una deuda. ''En prenda'' es más preciso que un simple ''tomar''.'
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  - res
  lexicon: HALOT
  rationale: '''Buey'' es el equivalente natural en español para el animal de trabajo en este contexto agrario y legal. ''Buey'' comunica mejor la imagen bíblica que ''toro'', que puede sugerir un animal reproductor.'
- source_word: אַלְמָנָה
  english_pob_choice: the widow's
  chosen_spanish: de la viuda
  alternatives_spanish:
  - de la viuda
  - de la viuda
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de manera natural como 'de la viuda', manteniendo el vínculo de propiedad sin forzar una estructura inglesa en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto principal. No se alteró el sentido base del versículo; solo se ajustó la redacción española y la puntuación para que las notas correspondan exactamente a los segmentos traducidos.
  spanish_consistency_notes:
  - Se prefirió 'asno' en lugar de 'burro' para mantener un registro bíblico digno y coherente.
  - Se mantuvo el plural 'huérfanos' conforme al hebreo, que permite lectura colectiva.
  - '''Tomaban en prenda'' preserva el matiz legal-económico del texto.'
  - Se evitó 'SEÑOR' u otras sustituciones no aplicables, ya que el versículo no contiene el tetragrámaton.
