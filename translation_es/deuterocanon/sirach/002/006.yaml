translation:
  language: es
  text: Confía en él[a], y él te sostendrá; endereza tus caminos[b], y pon tu esperanza en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ten fe en él» o «Creele». El hebreo y el griego pueden expresar confianza dependiente, no solo asentimiento mental.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula media está traducida como exhortación, «endereza tus caminos», siguiendo tanto el hebreo como el griego. Algunas traducciones la entienden como promesa: «él dirigirá/enderezará tus caminos».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַאֲמֵן / πίστευσον
  english_pob_choice: Trust in him
  chosen_spanish: Confía en él
  alternatives_spanish:
  - Ten fe en él
  - Cree en él
  lexicon: HALOT; BDAG
  rationale: El imperativo expresa confianza activa y dependencia, no solo asentimiento intelectual. En español, «confía en él» comunica mejor esa भरो/relación de apoyo que «cree en él», que puede sonar más cognitivo en este contexto sapiencial.
- source_word: יַחֲזִיק בְּךָ / ἀντιλήμψεται σου
  english_pob_choice: he will uphold you
  chosen_spanish: él te sostendrá
  alternatives_spanish:
  - él te apoyará
  - él te mantendrá
  - él te tomará de la mano
  lexicon: HALOT; BDAG; LSJ
  rationale: La imagen es de sostén y ayuda eficaz. «Sostendrá» preserva la metáfora sin volverse forzada en español, y mantiene la relación de dependencia que expresa el hebreo y el griego.
- source_word: יַשֵּׁר אָרְחוֹתֶיךָ / εὐθύνας τὰς ὁδούς σου
  english_pob_choice: make your ways straight
  chosen_spanish: endereza tus caminos
  alternatives_spanish:
  - endereza tus sendas
  - haz rectos tus caminos
  - dirige tus caminos
  lexicon: HALOT; BDAG; LSJ
  rationale: 'Sigo la lectura exhortativa del hebreo y del griego: no se trata primero de una acción divina sobre el sujeto, sino de una llamada dirigida al oyente. «Endereza» conserva el verbo de rectitud y el tono imperativo.'
- source_word: אָרְחוֹתֶיךָ / ὁδούς σου
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tu conducta
  - tu andar
  lexicon: HALOT; BDAG
  rationale: «Caminos» es la metáfora más natural y fiel en español para el curso de la vida o conducta moral, equivalente al uso sapiencial de «ways/paths».
- source_word: וְקַוֵּה אֵלָיו / καὶ ἔλπισον ἐπʼ αὐτόν
  english_pob_choice: and hope in him
  chosen_spanish: y espera en él
  alternatives_spanish:
  - y pon tu esperanza en él
  - y confía en él
  lexicon: HALOT; BDAG
  rationale: El hebreo puede significar esperar o tener esperanza, y el griego apunta claramente a la esperanza. «Espera en él» mantiene esa amplitud devocional en un español natural, sin perder el matiz de confianza esperanzada.
theological_decisions:
- issue: 'Fuerza del segundo miembro: mandato al lector o promesa acerca de Dios'
  english_pob_reading: 'The clause is an imperative to the reader: ''make your ways straight.'''
  chosen_spanish_reading: 'La cláusula se traduce como mandato al lector: «endereza tus caminos».'
  alternative_spanish_readings:
  - «él enderezará tus caminos»
  - «él dirigirá tus caminos»
  rationale: La forma verbal hebrea y la griega son imperativas dentro de una secuencia de exhortaciones. La traducción conserva esa continuidad y evita resolverla como promesa divina, ya que la evidencia del original favorece el mandato al oyente.
  doctrine_reference: Preservar la tensión exegética documentada; prioridad del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El inglés auditado presenta acuerdo alto y no registra revisiones aplicadas. Se conservan las decisiones centrales: confianza relacional en el primer miembro, lectura exhortativa del miembro medio y esperanza final en forma de imperativo.'
  spanish_consistency_notes:
  - Se mantiene «él» en minúscula porque el referente es Dios sin necesidad de una mayúscula devocional obligatoria en este proyecto.
  - «Caminos» se usa de manera consistente para אָרְחוֹתֶיךָ / ὁδούς σου, en registro sapiencial natural.
  - No se introduce «Mesías», «Señor» ni otras fórmulas no presentes en el pasaje.
  - La secuencia verbal conserva el paralelismo exhortativo del hebreo y del griego.
