review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Salomón construyó una flota en Ezión-geber, junto a Elot, en la orilla del mar, en territorio de Edom. Sin embargo, se aparta del rastro auditado de la POB inglesa en un punto importante: la POB decidió mantener en el texto principal la forma convencional ''Red Sea'' y preservar la alternativa literal en nota. El español invirtió esa decisión al poner ''mar de Suf'' en el texto y relegar ''Mar Rojo'' a nota.'
  spanish_quality_summary: El español es claro y natural. 'Construyó una flota de naves' y 'junto a Elot' funcionan bien. Hay una mejora menor de estilo y fidelidad convencional al cambiar 'mar de Suf' por 'Mar Rojo' en el texto principal y dejar la alternativa literal en nota, además de capitalizar el nombre propio geográfico conforme al uso común.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto (Yahvé, Mesías, etc.). La cuestión principal es de consistencia con la decisión léxica documentada para יַם סוּף: en este contexto geográfico la POB inglesa usa la forma tradicional en el texto principal y la literal en nota. El español debe alinearse con esa decisión.'
  issues:
  - severity: medium
    issue: El texto principal usa 'mar de Suf' donde la POB auditada decidió 'Red Sea' / 'Mar Rojo' en el cuerpo del texto.
    rationale: 'La documentación léxica inglesa es explícita: en este contexto cerca de Elot y Edom, la forma convencional e inteligible debe ir en el texto principal, y ''Sea of Reeds'' conservarse como alternativa en nota. El español actual invierte esa prioridad.'
  - severity: low
    issue: Capitalización del nombre geográfico.
    rationale: En español bíblico legible y estándar, 'Mar Rojo' se escribe normalmente con mayúsculas como nombre propio. Si se menciona la alternativa literal en nota, 'mar de Suf' puede quedar allí como glosa hebrea.
  revised_spanish_text: El rey Salomón también construyó una flota de naves en Ezión-geber[a], que está junto a Elot, en la orilla del Mar Rojo, en la tierra de Edom.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «mar de Suf»; tradicionalmente se traduce «Mar Rojo».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la principal divergencia con la decisión léxica auditada: el texto principal debe decir ''Mar Rojo'' en este contexto geográfico, mientras la forma más literal ''mar de Suf'' se conserva en nota. El resto del versículo puede mantenerse, pues es fiel al hebreo y natural en español.'
