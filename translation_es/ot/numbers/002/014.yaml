translation:
  language: es
  text: 'Y la tribu de Gad[a], y el jefe de los hijos de Gad: Eliasaf hijo de Reuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos o pasajes paralelos leen «Deuel» como nombre del padre (véase Núm. 1:14).
    reason: textual_variant
lexical_decisions:
- source_word: וְ/מַטֵּה
  english_pob_choice: And the tribe of
  chosen_spanish: Y la tribu de
  alternatives_spanish:
  - Y el bastón de
  - Y la vara de
  - Y el clan de
  lexicon: HALOT
  rationale: En el contexto de la organización campamental de Números, מַטֵּה designa una tribu, no un objeto literal. En español, «tribu» comunica con claridad el valor administrativo y genealógico del término, y conserva la estructura enumerativa del hebreo con «Y».
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: Nombre propio
  rationale: Es un nombre propio tribal, transliterado de forma estable en español.
- source_word: וְ/נָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el líder
  alternatives_spanish:
  - y el jefe
  - y el príncipe
  lexicon: HALOT
  rationale: En este contexto administrativo, נָשִׂיא señala al cabeza reconocido del grupo. «Líder» es claro en español actual y evita la ambigüedad de «príncipe», que puede sonar monárquica o demasiado tradicional.
- source_word: לִ/בְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - de los descendientes de
  - para los hijos de
  - del pueblo de
  lexicon: HALOT
  rationale: La construcción hebrea se conserva de manera transparente. «Hijos de» mantiene el paralelismo genealógico y tribal del texto, sin convertirlo en una paráfrasis más libre.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: Nombre propio
  rationale: Repetición del nombre tribal; se traduce de manera consistente.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliásaf
  lexicon: Nombre propio
  rationale: Se adapta la transliteración al uso español, con grafía natural «Eliasaf». La forma mantiene la identidad del nombre sin introducir una pronunciación excesivamente anglicada.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Es la fórmula patronímica directa y natural en español.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Deuel
  lexicon: Nombre propio
  rationale: Se conserva la lectura del texto consonántico masorético como «Reuel», mientras la variante paralela conocida queda documentada en nota. No se armoniza el nombre en el texto principal.
translation_notes:
  revision_awareness: El texto hebreo de esta línea es breve y formulaico; el ajuste principal fue conservar la estructura coordinada («Y... y...») sin sobrerreformularla, y elegir equivalentes españoles naturales para los títulos tribales y patronímicos. La variante textual del nombre paterno se preserva como nota, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Gad» como transliteración estable del nombre tribal.
  - Se usa «hijos de» para בני, coherente con la fórmula genealógica/tribal del pasaje.
  - «Líder» se emplea como equivalente contextual de נָשִׂיא en una lista administrativa.
  - Se conserva la variante textual del nombre paterno en nota sin alterar el texto principal.
  - La puntuación con dos puntos reproduce la pausa explicativa del original sin añadir contenido.
