translation:
  language: es
  text: 'Cuando los filisteos oyeron el sonido del clamor[a], dijeron: «¿Qué es este gran sonido de clamor[a] en el campamento de los hebreos?». Y supieron que el arca de Yahvé había llegado al campamento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Clamor’ también podría traducirse ‘grito’ o, en contexto militar, ‘grito de guerra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: WLC / uso bíblico estándar
  rationale: Se conserva el etnónimo del relato. En español bíblico, la minúscula es natural aquí porque funciona como nombre étnico común en contexto narrativo.
- source_word: ק֣וֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: קוֹל aquí designa un fenómeno audible, no una voz hablada. 'Sonido' mantiene la amplitud semántica y permite enlazar con el segundo קוֹל sin forzar una interpretación más específica.
- source_word: הַ/תְּרוּעָה
  english_pob_choice: shouting
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - grito de guerra
  - alarido
  lexicon: HALOT
  rationale: תְּרוּעָה puede ser grito, clamor o aullido/alarma. El contexto inmediato muestra una exclamación fuerte vinculada al arca, pero el texto hebreo no obliga a precisar 'grito de guerra'; 'grito' conserva la fuerza sonora sin sobredeterminar la función militar.
- source_word: מֶה
  english_pob_choice: What is this
  chosen_spanish: ¿Qué significa este...
  alternatives_spanish:
  - ¿Qué es este...
  - ¿Qué es lo que...
  lexicon: HALOT
  rationale: La pregunta hebrea indaga la naturaleza o importancia del fenómeno. '¿Qué significa este...?' transmite en español la extrañeza y la búsqueda de sentido, aunque el hebreo sea más literal en su forma interrogativa.
- source_word: הַ/גְּדוֹלָה
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - fuerte
  lexicon: HALOT
  rationale: El adjetivo expresa magnitud. En español, 'gran' antes del sustantivo suena natural y conserva la idea de intensidad sin añadir una valoración innecesaria.
- source_word: בְּ/מַחֲנֵה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en el campamento de
  lexicon: HALOT
  rationale: מַחֲנֶה se refiere al campamento militar/narrativo. 'Campamento' es claro y fiel en castellano moderno.
- source_word: הָ/עִבְרִים
  english_pob_choice: the Hebrews
  chosen_spanish: los hebreos
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva el etnónimo que usan los filisteos, en lugar de normalizarlo a 'israelitas', para mantener la perspectiva del narrador y de los hablantes.
- source_word: וַ/יֵּ֣דְע֔וּ
  english_pob_choice: they knew
  chosen_spanish: supieron
  alternatives_spanish:
  - conocieron
  - llegaron a saber
  - se dieron cuenta
  lexicon: HALOT
  rationale: El verbo expresa la adquisición de información. 'Supieron' da en español un resultado puntual y sobrio, cercano al hebreo sin volverlo demasiado explicativo.
- source_word: אֲרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: Se mantiene 'arca' sin añadir 'del pacto', porque el hebreo no lo dice aquí y el contexto ya identifica el objeto por la frase siguiente.
- source_word: יְהוָה
  english_pob_choice: the LORD / Yahweh (audit context)
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahvéh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la terminología del proyecto para el nombre divino, preservando el Tetragrámaton con 'Yahvé' en el texto principal.
- source_word: בָּא אֶל
  english_pob_choice: had come into
  chosen_spanish: había llegado al
  alternatives_spanish:
  - había venido al
  - había entrado en
  lexicon: HALOT
  rationale: El perfecto hebreo indica acción completada previa al reconocimiento de los filisteos. 'Había llegado al' es natural en español y comunica bien el movimiento hacia el campamento sin añadir un matiz de 'entrada' que el verbo por sí solo no exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvéh
  rationale: El registro español debe reflejar el nombre propio del pacto, no un sustituto reverencial. 'Yahvé' sigue el estándar del proyecto y mantiene visible el Tetragrámaton en la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de תְּרוּעָה en contexto narrativo
  english_pob_reading: shouting
  chosen_spanish_reading: grito
  alternative_spanish_readings:
  - grito de guerra
  - clamor
  rationale: El contexto permite oír una exclamación intensa sin obligar a especificar 'guerra'. 'Grito' preserva la tensión entre una mera exclamación y un grito militar, que el texto no resuelve de forma explícita.
  doctrine_reference: HALOT / contexto de 1 Samuel 4:5-6
translation_notes:
  revision_awareness: El contexto inglés pasó de 'Then they learned' a 'And they knew' para acercarse más al hebreo וַיֵּדְעוּ sin perder naturalidad. En español se optó por 'supieron', que conserva el carácter puntual del descubrimiento y evita un giro excesivamente explicativo. También se siguió la decisión doctrinal del proyecto para renderizar יְהוָה como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' conforme al estándar del proyecto.
  - '''Filisteos'' y ''hebreos'' se conservan como etnónimos narrativos, sin armonizarlos con ''israelitas''.'
  - '''Arca'' se deja sin glosa interpretativa adicional porque el texto inmediato ya da la identificación necesaria.'
  - La puntuación reproduce la división de discurso directo del hebreo con una cita española natural y clara.
