id: 1PE.2.4
reference: 1 Peter 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πρὸς ὃν προσερχόμενοι, λίθον ζῶντα, ὑπὸ ἀνθρώπων μὲν ἀποδεδοκιμασμένον παρὰ δὲ θεῷ ἐκλεκτὸν ἔντιμον
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/004.yaml
  text: 'As you come to him, a living stone, rejected by men but chosen and precious in the sight of God,'
translation:
  language: ko
  text: '여러분이 그분께 나아가니, 그분은 사람들에게는 버림받았으나 하나님께는 택하심을 받고 보배로우신 산 돌이십니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσερχόμενοι
  english_pob_choice: As you come
  chosen_korean: 나아가니
  alternatives_korean:
  - 가까이 나아갈 때
  - 그분께 오는 자로서
  lexicon: BDAG
  rationale: προσέρχομαι의 「가까이 나아감」(제의적 접근 함의 있음)을 「나아가다」로 옮긴다.
- source_word: λίθον ζῶντα
  english_pob_choice: a living stone
  chosen_korean: 산 돌
  alternatives_korean:
  - 살아 있는 돌
  - 생명의 돌
  lexicon: BDAG
  rationale: 한국 성서 전통의 「산 돌」을 채택. 1:3의 ἐλπίδα ζῶσαν(산 소망)과 통일.
- source_word: ἀποδεδοκιμασμένον
  english_pob_choice: rejected
  chosen_korean: 버림받았으나
  alternatives_korean:
  - 배척당했으나
  - 거절당했으나
  lexicon: BDAG
  rationale: 2:7의 시 118:22 인용(ἀπεδοκίμασαν)과 어휘 일관성을 위해 「버림받다」로 옮긴다.
- source_word: ἐκλεκτὸν ἔντιμον
  english_pob_choice: chosen and precious
  chosen_korean: 택하심을 받고 보배로우신
  alternatives_korean:
  - 선택되고 존귀하신
  - 뽑힌 자요 귀하신
  lexicon: BDAG
  rationale: 1:1·1:2의 ἐκλεκτός 어휘와 일관성을 위해 「택하심을 받은」으로 옮긴다. 2:6 사 28:16 인용을 미리 깔아 둔다.
theological_decisions:
- issue: 「살아 있는 돌」 비유와 OT 인용 흐름 도입
  chosen_reading: '본 절을 2:6-8 OT 돌 인용들의 도입부로 처리; 어휘를 다음 절들과 일관되게 배치'
  alternative_readings:
  - 본 절을 독립된 비유로 처리하고 2:6-8과의 어휘 일관성을 풀어 옮김
  rationale: 2:4-10 단락 전체가 돌·집·제사장·백성의 OT 인용 사슬을 이루므로 어휘를 일관되게 배치한다.
  doctrine_reference: 'DOCTRINE.md: 본문의 수사 구조 보존'
