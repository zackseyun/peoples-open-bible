translation:
  language: es
  text: Pero el rey, aunque tenía mucha sed, a pesar de tener abundantes manantiales, no podía aliviar su sed[a] con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apagar su sed». El verbo griego usa un término de sentido médico, «sanar» o «curar», y probablemente conserva una metáfora deliberada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  english_pob_choice: But the king
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  - Ahora bien, el rey
  lexicon: LSJ
  rationale: δέ introduce un giro leve o una transición adversativa. «Pero» conserva ese contraste de forma natural en español.
- source_word: ὡς μάλιστα διψῶν
  english_pob_choice: though very thirsty
  chosen_spanish: aunque tenía mucha sed
  alternatives_spanish:
  - estando muy sediento
  - aunque estaba extremadamente sediento
  lexicon: LSJ
  rationale: La frase participial intensifica la sed del rey. En español, «tenía mucha sed» comunica bien la intensidad sin sonar forzado; «muy» es más natural que un superlativo rígido.
- source_word: καίπερ
  english_pob_choice: even though
  chosen_spanish: aunque
  alternatives_spanish:
  - aun cuando
  - si bien
  lexicon: LSJ
  rationale: καίπερ introduce una concesión clara. «Aunque» es la forma más directa y fluida en español.
- source_word: ἀφθόνους ἔχων πηγάς
  english_pob_choice: he had abundant springs
  chosen_spanish: tenía abundantes manantiales
  alternatives_spanish:
  - tenía abundantes fuentes
  - tenía copiosos manantiales
  lexicon: LSJ
  rationale: ἀφθόνους expresa abundancia; πηγαί son fuentes o manantiales. «Manantiales» mantiene la imagen concreta de agua brotando y suena natural en español bíblico.
- source_word: οὐκ ἠδύνατο
  english_pob_choice: was not able
  chosen_spanish: no podía
  alternatives_spanish:
  - no era capaz
  - no pudo
  lexicon: LSJ
  rationale: El imperfecto marca incapacidad continua o estado. «No podía» reproduce bien esa fuerza aspectual en español.
- source_word: διʼ αὐτῶν
  english_pob_choice: through them
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - a través de ellos
  - mediante ellos
  lexicon: LSJ
  rationale: 'La idea es instrumental: las fuentes eran el medio que, sin embargo, no surtía efecto. «Por medio de ellos» lo expresa con claridad.'
- source_word: ἰάσασθαι τὴν δίψαν
  english_pob_choice: to relieve his thirst
  chosen_spanish: aliviar su sed
  alternatives_spanish:
  - curar su sed
  - apagar su sed
  lexicon: LSJ
  rationale: ἰάομαι suele significar «sanar» o «curar», y la imagen médica se aplica metafóricamente a la sed. En español, «aliviar su sed» conserva la idea de remedio sin perder naturalidad. No se usó «apagar» para no borrar del todo el matiz terapéutico observado en el audit trail.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete 1909 y toma en cuenta el audit trail inglés, especialmente la revisión que prefirió un verbo más idiomático para ἰάσασθαι τὴν δίψαν. En español se preserva la tensión entre la metáfora médica del original y una formulación natural («aliviar su sed»), evitando tanto una paráfrasis libre como una calca rígida.
  spanish_consistency_notes:
  - Se usó «manantiales» para πηγαί, manteniendo la imaginería acuática concreta.
  - «Aunque tenía mucha sed» conserva la intensificación sin sobrecargar el español.
  - La nota al pie marca la alternativa «apagar su sed» para reflejar la ambigüedad lexical relevante.
  - Se evitó «SEÑOR» u otras formas de ocultamiento porque no aparece el Tetragrámaton en este versículo.
