revisions:
- from: Y el fuego sobre el altar será mantenido encendido sobre él[a]; no se apagará. El sacerdote quemará leña sobre él cada mañana[b], y dispondrá sobre él el holocausto, y hará humear sobre él las grasas de los sacrificios de comunión.
  to: Y el fuego sobre el altar se mantendrá encendido sobre él; no se apagará. El sacerdote quemará leña sobre él cada mañana[a], y dispondrá sobre él el holocausto, y quemará sobre él las porciones de grasa de los sacrificios de paz[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las expresiones explicadas. Se ajusta «será mantenido encendido» a «se mantendrá encendido» por naturalidad sin pérdida semántica. Se reemplaza «sacrificios de comunión» por «sacrificios de paz» como término principal para alinearse mejor con la decisión auditada y con una categoría sacrificial reconocible; la alternativa relacional se preserva en nota. También se precisa «las porciones de grasa» y se simplifica «hará humear» a «quemará» para un español más claro y fiel al contexto cultual.
