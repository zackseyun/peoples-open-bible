translation:
  language: es
  text: Partieron de Jacerot y acamparon en Ritmá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa el acto de romper el campamento y salir de un lugar para proseguir. «Partieron» comunica de forma natural y fiel ese movimiento narrativo sin volverlo demasiado interpretativo.
- source_word: מֵחֲצֵרֹת
  english_pob_choice: from Hazeroth
  chosen_spanish: de Jacerot
  alternatives_spanish:
  - desde Jacerot
  lexicon: HALOT
  rationale: Es un nombre propio de lugar con preposición de origen. Se translitera al español como topónimo; «de» refleja bien el valor de מִן en una lista de desplazamientos.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - levantaron campamento
  - se establecieron en campamento
  lexicon: HALOT
  rationale: חנה es el verbo habitual para asentarse en campamento en los itinerarios del desierto. «Acamparon» es claro, contemporáneo y conserva el valor verbal sin arcaísmo.
- source_word: בְּרִתְמָה
  english_pob_choice: at Rithmah
  chosen_spanish: en Ritmá
  alternatives_spanish:
  - en Ritimá
  - en Rithmá
  lexicon: HALOT
  rationale: Nombre propio de lugar con preposición locativa. «En» es la equivalencia natural para el asentamiento en la lista de estaciones; la forma del topónimo se adapta a la ortografía española sin añadir contenido.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni cambios revisados; por ello, la versión española sigue directamente el esquema itinerario breve del hebreo, con transliteración de los topónimos y sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo simple del hebreo: movimiento de salida + destino de campamento.'
  - Se conservaron los nombres propios como topónimos transliterados, evitando traducirlos.
  - No se usó «encamparon» porque «acamparon» resulta más natural en español actual y no altera el sentido.
  - La puntuación final con punto respeta la oración declarativa en español y no añade división no presente en el texto fuente.
