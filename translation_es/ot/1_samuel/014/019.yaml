translation:
  language: es
  text: 'Y aconteció, mientras Saúl hablaba al sacerdote, que el tumulto en el campamento de los filisteos iba aumentando cada vez más. Entonces Saúl dijo al sacerdote: «Retira[a] tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «recoge tu mano» o «reúne tu mano». Saúl le dice al sacerdote que deje de hacer la acción que estaba realizando.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce la secuencia del relato. En español, «aconteció» conserva el tono bíblico sin volverse anticuado de manera excesiva.
- source_word: עַד דִּבֶּר
  english_pob_choice: while ... was speaking
  chosen_spanish: mientras ... hablaba
  alternatives_spanish:
  - cuando ... hablaba
  - antes de que terminara de hablar
  lexicon: HALOT
  rationale: La construcción indica acción simultánea que continúa hasta ser interrumpida. «Mientras ... hablaba» expresa bien el valor progresivo en español natural.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote oficiador
  lexicon: HALOT
  rationale: El término hebreo כהן puede traducirse «sacerdote» en español con mayor naturalidad y fidelidad contextual. «Sacerdote» es el equivalente estándar y mantiene la referencia al oficio ya introducido.
- source_word: הֶהָמוֹן
  english_pob_choice: the tumult
  chosen_spanish: el tumulto
  alternatives_spanish:
  - la conmoción
  - el alboroto
  - el ruido
  lexicon: HALOT
  rationale: Aquí המון no es solo sonido, sino confusión y agitación. «Tumulto» preserva esa carga de desorden y estruendo.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: in the camp of the Philistines
  chosen_spanish: en el campamento de los filisteos
  alternatives_spanish:
  - en el campamento filisteo
  - en el campamento de los filisteos
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma directa y clara. «Campamento de los filisteos» conserva la relación genitiva del hebreo sin forzar el español.
- source_word: וַיֵּלֶךְ הָלוֹךְ וָרָב
  english_pob_choice: kept increasing more and more
  chosen_spanish: iba aumentando cada vez más
  alternatives_spanish:
  - seguía creciendo más y más
  - iba creciendo cada vez más
  lexicon: HALOT
  rationale: El hebreo expresa intensificación progresiva con la construcción de infinitivo absoluto. «Iba aumentando cada vez más» comunica bien el avance continuo y la acumulación creciente del tumulto.
- source_word: אֱסֹף יָדֶךָ
  english_pob_choice: Withdraw your hand
  chosen_spanish: Retira tu mano
  alternatives_spanish:
  - Recoge tu mano
  - Aparta tu mano
  - Retira la mano
  lexicon: HALOT
  rationale: Literalmente es «reúne/recoge tu mano», pero en contexto significa que Saúl pide al sacerdote que cese la acción que estaba realizando. «Retira tu mano» mantiene la imagen concreta y transmite la interrupción del acto.
theological_decisions:
- issue: Cómo traducir el oficio designado por כהן
  english_pob_reading: the priest
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - el sacerdote oficiador
  - el ministro
  rationale: No hay tensión doctrinal especial; el término designa al funcionario cultual. «Sacerdote» es el equivalente más directo y reconocible en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: el tiempo narrativo, la intensificación de הָלוֹךְ וָרָב y la orden final se mantienen de forma equivalente en español. No se detectaron revisiones textuales que obligaran a ajustar el draft.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico natural con verbos de movimiento y progresión claros.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en este versículo.
  - «Sacerdote» se eligió por claridad y equivalencia léxica; no se requiere una nota doctrinal adicional.
  - La frase final conserva el matiz concreto de la expresión hebrea sin volverla opaca.
