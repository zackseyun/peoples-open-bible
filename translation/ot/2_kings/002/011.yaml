id: 2KI.2.11
reference: 2 Kings 2:11
source:
  edition: WLC
  text: וַ/יְהִ֗י הֵ֣מָּה הֹלְכִ֤ים הָלוֹךְ֙ וְ/דַבֵּ֔ר וְ/הִנֵּ֤ה רֶֽכֶב אֵשׁ֙ וְ/ס֣וּסֵי אֵ֔שׁ וַ/יַּפְרִ֖דוּ בֵּ֣ין שְׁנֵי/הֶ֑ם וַ/יַּ֨עַל֙ אֵ֣לִיָּ֔הוּ בַּֽ/סְעָרָ֖ה הַ/שָּׁמָֽיִם־׃
translation:
  text: And as they were going along and talking[a], behold, a chariot of fire and horses of fire separated the two of them[b], and Elijah went up by the whirlwind into heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the whirlwind.' The Hebrew preposition can be understood as indicating means, accompaniment, or location.
    reason: lexical_alternative
  - marker: b
    text: The text says the chariot of fire and horses of fire separated Elijah and Elisha, and that Elijah went up by/in the whirlwind; it does not explicitly say that Elijah rode in the chariot.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And as it happened / And as
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. In modern English, 'And as' captures the temporal transition naturally without archaic style, while preserving the narrative force.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - the two of them
  lexicon: HALOT
  rationale: The independent pronoun emphasizes the subjects, but English normally expresses this simply as 'they' here. The later explicit phrase 'the two of them' preserves the dual relationship more directly.
- source_word: הֹלְכִים הָלוֹךְ
  chosen: were going along
  alternatives:
  - were walking on
  - kept going
  lexicon: HALOT
  rationale: The infinitive absolute with participle intensifies or duratively marks the action. 'Were going along' preserves the ongoing movement in idiomatic English.
- source_word: וְדַבֵּר
  chosen: and talking
  alternatives:
  - and speaking
  lexicon: HALOT
  rationale: The participial sense in sequence with the previous expression describes concurrent action. 'Talking' is more natural modern English than 'speaking' in this narrative setting, without loss of meaning.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks dramatic immediacy. 'Behold' preserves the literary and attention-directing force better than the more interpretive 'suddenly,' while remaining understandable.
- source_word: רֶכֶב אֵשׁ
  chosen: a chariot of fire
  alternatives:
  - a fiery chariot
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'a chariot of fire.' This preserves the imagery without deciding whether 'fire' is descriptive material, appearance, or supernatural quality beyond the Hebrew expression.
- source_word: וְסוּסֵי אֵשׁ
  chosen: and horses of fire
  alternatives:
  - and fiery horses
  lexicon: HALOT
  rationale: Parallel to 'chariot of fire,' the construct is best kept explicit. This maintains the vivid imagery and formal balance of the Hebrew.
- source_word: וַיַּפְרִדוּ בֵּין שְׁנֵיהֶם
  chosen: separated the two of them
  alternatives:
  - came between them both
  - separated them
  lexicon: HALOT
  rationale: The plural verb likely refers to the chariot and horses collectively. 'Separated the two of them' preserves the explicit dual relationship indicated by שְׁנֵיהֶם.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: עלה is straightforwardly 'go up.' 'Went up' is clear, natural, and sufficiently elevated in tone without sounding overly ecclesiastical.
- source_word: בַּסְעָרָה
  chosen: by the whirlwind
  alternatives:
  - in the whirlwind
  - in a stormwind
  lexicon: HALOT
  rationale: The preposition ב can be rendered in several ways here. 'By the whirlwind' communicates means or accompanying agency in idiomatic English and matches the narrative emphasis on the whirlwind as the mode of Elijah's ascent.
- source_word: הַשָּׁמָיִם
  chosen: into heaven
  alternatives:
  - to the heavens
  - into the sky
  lexicon: HALOT
  rationale: In this context, 'heaven' is the best singular English rendering for השמים. 'Sky' would flatten the elevated narrative register, while 'the heavens' is possible but less idiomatic in this sentence.
