translation:
  language: es
  text: el altar de oro[a], el aceite de la unción, el incienso aromático[b] y la cortina para la entrada de la tienda[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el altar dorado».
    reason: lexical_alternative
  - marker: b
