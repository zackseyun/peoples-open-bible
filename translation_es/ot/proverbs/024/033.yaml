  source_alignment_summary: 'El borrador refleja bien la estructura tripartita de מְעַט y el sentido general del hebreo: sueño, somnolencia/slumber, y la postura de manos plegadas con el infinitivo final de propósito/resultado. Sin embargo, el anclaje de la nota está mal ubicado: la nota inglesa y su contenido explican לִשְׁכָּב (''recostarse/descansar''), no שֵׁנוֹת (''sueño''). Además, «cruzar las manos» es comprensible pero algo menos fiel que «doblar los brazos» o «plegar las manos» al modismo hebreo de inactividad; y «adormecimiento» suena algo clínico en registro proverbial.'
