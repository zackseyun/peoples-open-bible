  to: Entonces José se apresuró[a], porque su compasión por su hermano se conmovió[b], y buscó dónde llorar[c]. Entró en la habitación y lloró allí.
  rationale: La revisión devuelve al texto principal la decisión semántica documentada por el POB inglés para נִכְמְרוּ רַחֲמָיו, usando «compasión» en lugar de la imagen más corporal «entrañas», que se preserva como alternativa en nota. También se mejora la naturalidad del español con «habitación» para הַחַדְרָה y se mantiene «buscó dónde llorar», que refleja bien la implicación contextual sin sobreinterpretar.
