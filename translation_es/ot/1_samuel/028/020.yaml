    text: El hebreo dice literalmente que cayó en toda su estatura, es decir, extendido de cuerpo entero; la traducción expresa esa imagen de una caída completa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “pan”, que también puede funcionar de modo más amplio por “alimento”; se conserva “pan” para reflejar el texto fuente.'
    reason: lexical_alternative
  revision_rationale: Se ajustó 'se precipitó' a 'inmediatamente' para reflejar mejor el valor de rapidez súbita sin sobreinterpretación. Se reemplazó 'de lleno' por 'de cuerpo entero' para expresar con mayor claridad el idiomatismo 'full length'. Se suavizó 'tenía fuerza en él' a 'tenía fuerzas' por naturalidad española, evitando añadir 'quedaban' o 'le quedaban', que introduciría un matiz no presente en el hebreo auditado.
