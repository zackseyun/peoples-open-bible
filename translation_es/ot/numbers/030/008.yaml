revisions:
- from: Si su esposo lo oye en el día en que lo oye[a], y calla respecto de ella, entonces sus votos quedarán firmes[b], y sus ataduras, que se impuso sobre sí misma, quedarán firmes.
  to: Si su esposo lo oye en el día en que lo oye[a], y calla respecto de ella, entonces sus votos quedarán firmes, y sus obligaciones vinculantes[b], que se impuso sobre sí misma, quedarán firmes.
  rationale: Se corrige el principal problema léxico-jurídico reemplazando «sus ataduras» por «sus obligaciones vinculantes», que refleja mejor el sentido documentado de וֶאֱסָרֶהָ en este contexto. También se reubica y reescribe la nota [b] para que corresponda al término correcto, en conformidad con el POB inglés. Se conserva la repetición de «quedarán firmes» para mantener la consistencia legal del hebreo.
