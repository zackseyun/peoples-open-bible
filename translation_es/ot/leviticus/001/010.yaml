  text: וְ/אִם מִן הַ/צֹּ֨אן קָרְבָּנ֧/וֹ מִן הַ/כְּשָׂבִ֛ים א֥וֹ מִן הָ/עִזִּ֖ים לְ/עֹלָ֑ה זָכָ֥ר תָּמִ֖ים יַקְרִיבֶֽ/נּוּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/001/010.yaml
  text: And if his offering is from the flock[a], from the sheep or from the goats, for a burnt offering[b], he shall offer a male without blemish.
  footnotes:
  - marker: a
    text: Or 'as a burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Without blemish'' means free from physical defect, the required condition for this sacrifice.'
    reason: cultural_note
