translation:
  language: es
  text: Pero Jerusalén y los lugares santos[a] serán libres; y todas las armas que has hecho, y las fortalezas que has construido, que posees, seguirán siendo tuyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «los lugares santos» traduce τὰ ἅγια de manera amplia. También puede entenderse como «el santuario» o «las cosas santas»; la redacción elegida encaja mejor con el contexto de Jerusalén libre y de los espacios sagrados bajo su posesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalen
  lexicon: LSJ
  rationale: Nombre propio estándar en español; conserva la referencia geográfica sin carga interpretativa.
- source_word: τὰ ἅγια
  english_pob_choice: the holy places
  chosen_spanish: los lugares santos
  alternatives_spanish:
  - el santuario
  - las cosas santas
  lexicon: LSJ
  rationale: El plural neutro puede referirse a los espacios sagrados o a las cosas santas. En este contexto de libertad política y territorial, 'los lugares santos' conserva la amplitud del griego sin reducirlo indebidamente a un solo edificio.
- source_word: ἐλεύθερα
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - exentos
  - independientes
  lexicon: LSJ
  rationale: La concesión expresa libertad de interferencia o control. El plural concuerda naturalmente con 'Jerusalén y los lugares santos'.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamentos
  - armas de guerra
  lexicon: LSJ
  rationale: Término general para equipo militar; 'armas' es natural en español y mantiene la amplitud semántica del griego.
- source_word: κατεσκεύασας
  english_pob_choice: have made
  chosen_spanish: has hecho
  alternatives_spanish:
  - has preparado
  - has fabricado
  lexicon: LSJ
  rationale: El aoristo comunica la acción completada de producir o preparar. 'Has hecho' sigue de cerca el valor amplio del verbo sin forzar una especificación técnica.
- source_word: ὀχυρώματα
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - plazas fuertes
  lexicon: LSJ
  rationale: Denota instalaciones fortificadas; 'fortalezas' es claro, natural y preserva el sentido militar.
- source_word: ᾠκοδόμησας
  english_pob_choice: have built
  chosen_spanish: has construido
  alternatives_spanish:
  - has edificado
  lexicon: LSJ
  rationale: Verbo directo equivalente a 'build'; 'construido' es idiomático y preciso en español moderno.
- source_word: ὧν κρατεῖς
  english_pob_choice: which you hold
  chosen_spanish: de las cuales eres dueño
  alternatives_spanish:
  - que controlas
  - que mantienes
  lexicon: LSJ
  rationale: κρατέω puede significar tener en posesión o controlar. En este marco legal-patrimonial, 'eres dueño' expresa bien la continuidad de posesión concedida por el acuerdo; se conserva la posibilidad alternativa de control en una nota.
- source_word: μενέτω σοι
  english_pob_choice: shall remain yours
  chosen_spanish: te quedarán
  alternatives_spanish:
  - te permanecerán
  - quedarán para ti
  lexicon: LSJ
  rationale: 'Imperativo/jusivo con sentido concesivo: se permite que continúen siendo tuyas. ''Te quedarán'' es natural en español y refleja la persistencia de la posesión.'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de forma alta y no muestran revisiones aplicadas; por eso la versión española sigue de cerca la estructura del original, conservando la amplitud de τὰ ἅγια y el matiz posesivo de ὧν κρατεῖς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usó un español sobrio y público, evitando calcos innecesarios pero conservando la estructura concesiva y legal del griego.
  - «Fortalezas» y «armas» mantienen el campo militar sin introducir vocabulario eclesiástico ajeno al contexto.
