id: ACT.22.14
reference: 'Acts 22:14'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὁ θεὸς τῶν πατέρων ἡμῶν προεχειρίσατό σε γνῶναι τὸ θέλημα αὐτοῦ καὶ ἰδεῖν τὸν δίκαιον καὶ ἀκοῦσαι φωνὴν ἐκ τοῦ στόματος αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/acts/022/014.yaml
  text: And he said[a], ‘The God of our fathers has appointed you to know his will, to see the Righteous One[b], and to hear a voice from his mouth,’
  footnotes:
  - marker: a
    text: "Or 'has chosen you.' The Greek verb can denote selecting or appointing someone for a task."
    reason: lexical_alternative
  - marker: b
    text: "'The Righteous One' is a title for Jesus; alternatively, 'the Just One.'"
    reason: alternative_reading
translation:
  language: ko
  text: 그가 말했습니다. 「우리 조상들의 하나님께서 너를 미리 택하여 그분의 뜻을 알게 하시고, 그 의로우신 분을[a] 보게 하시며, 그분의 입에서 나는 음성을 듣게 하셨다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「의로우신 분」은 예수님에 대한 칭호이며, 「의로운 분」으로도 옮길 수 있다.
    reason: alternative_reading
theological_decisions:
- issue: 「의로우신 분」(τὸν δίκαιον)을 메시아 칭호로 보존
  chosen_reading: 그 의로우신 분
  alternative_readings:
  - 의로운 자
  - 의인
  rationale: '본문은 예수님을 가리키는 칭호로 정관사와 함께 사용한다. 사도행전 3:14, 7:52에서도 동일한 칭호가 쓰이며, 회심 재진술의 신학적 무게를 위해 칭호로 옮긴다.'
  doctrine_reference: 'DOCTRINE.md: Translate titles'
