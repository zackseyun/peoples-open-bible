translation:
  language: es
  text: De entre estos, veinticuatro mil debían supervisar la obra de la casa de Yahvé, y seis mil eran oficiales y jueces.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מֵאֵלֶּה
  english_pob_choice: Of these
  chosen_spanish: De entre estos
  alternatives_spanish:
  - De estos
  - Entre estos
  lexicon: HALOT
  rationale: La construcción partitiva introduce un subconjunto de los levitas ya mencionados. «De entre estos» conserva bien ese valor partitivo en español y suena natural.
- source_word: לְנַצֵּחַ
  english_pob_choice: were to oversee
  chosen_spanish: debían supervisar
  alternatives_spanish:
  - debían dirigir
  - debían estar a cargo de
  - debían supervisar la labor
  lexicon: HALOT
  rationale: Aquí el infinitivo de intención/encargo expresa una función administrativa, no liderazgo musical. «Debían supervisar» comunica la idea de responsabilidad asignada sin perder el matiz de encargo.
- source_word: עַל מְלֶאכֶת
  english_pob_choice: the work of
  chosen_spanish: la obra de
  alternatives_spanish:
  - el trabajo de
  - la labor de
  - el servicio de
  lexicon: HALOT
  rationale: מְלָאכָה abarca trabajo, labor u oficio. En este contexto de organización del templo, «obra» mantiene amplitud y dignidad; evita restringirlo a «servicio», que podría sonar más técnico o litúrgico de lo que el hebreo exige.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la metáfora hebrea de «casa» y el nombre divino en la forma editorial establecida del proyecto: «Yahvé». «Templo» sería más interpretativo que el hebreo aquí.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - '24.000'
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: Número cardinal directo; en español, la forma corrida «veinticuatro mil» es la más natural y legible.
- source_word: וְשֹׁטְרִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - oficiales administrativos
  - funcionarios
  - inspectores
  lexicon: HALOT
  rationale: שֹׁטֵר puede referirse a un funcionario u oficial de administración. «Oficiales» es suficientemente amplio en español y funciona bien junto con «jueces».
- source_word: וְשֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  lexicon: HALOT
  rationale: שֹׁפְטִים denota personas con función judicial. «Jueces» es el equivalente más directo y claro.
- source_word: שֵׁשֶׁת אֲלָפִים
  english_pob_choice: six thousand
  chosen_spanish: seis mil
  alternatives_spanish:
  - '6.000'
  lexicon: HALOT
  rationale: Número cardinal directo; se escribe con palabras para mantener consistencia estilística con la primera cifra.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Para el español del proyecto, la convención establecida es «Yahvé», manteniendo el nombre propio del pacto en vez de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés reciente no requirió cambios según el registro de revisión; la versión española sigue esa lectura estable y conserva la misma estructura semántica sin añadir ni omitir elementos.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con la terminología española del proyecto.
  - «Casa» se conservó frente a «templo» por fidelidad al hebreo בַּיִת.
  - 'La relación numérica y de cargos administrativos quedó paralela al original: 24.000 para supervisión y 6.000 para oficios judiciales/administrativos.'
