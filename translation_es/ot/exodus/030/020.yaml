revisions:
- from: Cuando entren en la tienda de reunión[a], se lavarán con agua, para que no mueran; o cuando se acerquen al altar para ministrar, para quemar una ofrenda encendida a Yahvé[b],
  to: Cuando entren en la tienda de reunión[a], se lavarán con agua, para que no mueran; o cuando se acerquen al altar para ministrar, para quemar una ofrenda de alimento a Yahvé[b],
  rationale: Se revisa únicamente אִשֶּׁה para alinearlo con la decisión léxica auditada del POB ('food offering') y mejorar la naturalidad sacrificial en español. Se conserva 'Yahvé', la estructura del versículo y las notas donde siguen siendo útiles.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la sintaxis y el sentido del hebreo: cláusulas temporales con ב + infinitivo constructo (''cuando entren'', ''cuando se acerquen''), lavado ritual con agua, cláusula de propósito/consecuencia (''para que no mueran''), y servicio cultual en el altar. También conserva correctamente la coma final por continuidad con el versículo siguiente y usa ''Yahvé'' conforme al proyecto. El único desajuste relevante está en אִשֶּׁה: el inglés auditado optó por ''food offering'' con nota alternativa ''offering by fire'', mientras que ''ofrenda encendida'' no refleja bien ni el valor cultual establecido ni la alternativa documentada.'
  spanish_quality_summary: El español es claro y legible en general. 'Tienda de reunión' y 'se lavarán con agua' suenan naturales. 'Para ministrar' es aceptable en registro eclesial. Sin embargo, 'ofrenda encendida' resulta poco idiomático y algo ambiguo en español bíblico contemporáneo; sugiere una antorcha o algo meramente prendido, no una categoría sacrificial bien reconocible. 'Ofrenda de alimento' comunica mejor la decisión principal del POB, y la nota puede preservar la alternativa más tradicional 'ofrenda por fuego'.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; no hay conflicto con Mesías/Cristo, espíritu, esclavo, etc. La excepción importante es אִשֶּׁה, donde conviene acercarse más a la decisión léxica auditada del POB (''food offering'') y mantener la alternativa tradicional en nota.'
  issues:
  - severity: medium
    issue: '''una ofrenda encendida'' para אִשֶּׁה'
    rationale: No preserva bien la decisión principal documentada ('food offering') ni ofrece una expresión española sacrificial clara. En español bíblico moderno es más fiel y entendible 'una ofrenda de alimento', con nota alternativa 'una ofrenda por fuego'.
  - severity: low
    issue: Nota a para אֹהֶל מוֹעֵד
    rationale: La nota 'tienda del encuentro' es posible, pero la alternativa inglesa relevante en este registro también incluye el matiz estándar de denominación cultual. No es incorrecta; puede mantenerse tal como está.
  revised_spanish_text: Cuando entren en la tienda de reunión[a], se lavarán con agua, para que no mueran; o cuando se acerquen al altar para ministrar, para quemar una ofrenda de alimento a Yahvé[b],
  revised_footnotes:
  - marker: a
    text: O, 'tienda del encuentro'.
    reason: lexical_alternative
  - marker: b
    text: O, 'una ofrenda por fuego'.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente אִשֶּׁה para alinearlo con la decisión léxica auditada del POB ('food offering') y mejorar la naturalidad sacrificial en español. Se conserva 'Yahvé', la estructura del versículo y las notas donde siguen siendo útiles.
