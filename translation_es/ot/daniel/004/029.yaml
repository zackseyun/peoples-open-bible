translation:
  language: es
  text: Y serás echado de entre los hombres[a], y tu morada será con las bestias del campo. Te harán comer hierba como a los bueyes, y siete tiempos[b] pasarán sobre ti, hasta que sepas que el Altísimo gobierna en el reino de los hombres y lo da a quien quiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Hombres" aquí significa seres humanos, en contraste con las bestias.'
    reason: lexical_alternative
  - marker: b
    text: 'Arameo: "siete tiempos"; posiblemente "siete años" o, más generalmente, "siete periodos de tiempo".'
    reason: alternative_reading
lexical_decisions:
- source_word: טָֽרְדִ֜ין
  english_pob_choice: you will be driven away
  chosen_spanish: serás expulsado
  alternatives_spanish:
  - te sacarán
  - serás arrojado lejos
  lexicon: HALOT
  rationale: El arameo expresa la acción de ser echado o alejado. En español, "serás expulsado" conserva la fuerza pasiva/resultado del juicio y suena natural en un registro bíblico digno.
- source_word: אֲנָשָׁא
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la humanidad
  lexicon: HALOT
  rationale: La frase contrasta a los seres humanos con las bestias y reaparece en "el reino de los hombres". Mantengo "los hombres" para conservar ese contraste antropológico y la correspondencia interna del verso.
- source_word: מְדֹרָךְ
  english_pob_choice: your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu vivienda
  - tu habitación
  lexicon: HALOT
  rationale: '"Morada" es un equivalente claro y reverente para el lugar donde habita alguien; en español bíblico mantiene bien la imagen de residencia junto a animales salvajes.'
- source_word: חֵיוַת בָּרָא
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: La expresión es una fórmula bíblica para animales no domesticados. "Bestias del campo" preserva el tono y la imagen tradicional sin perder inteligibilidad.
- source_word: עִשְׂבָּא
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - vegetación
  lexicon: HALOT
  rationale: En el contexto de animales que pacen, "hierba" comunica naturalmente la comida de los bueyes. Aunque "pasto" sería posible, "hierba" suena más amplio y fiel al lexema.
- source_word: כְתוֹרִין
  english_pob_choice: like oxen
  chosen_spanish: como a los bueyes
  alternatives_spanish:
  - como bueyes
  - como a los toros
  lexicon: HALOT
  rationale: El término arameo se refiere a bovinos; "bueyes" reproduce bien la imagen de animales de labor que comen pasto. Añadir "a" en la comparación favorece la fluidez del español.
- source_word: יְטַעֲמ֔וּן
  english_pob_choice: you will be made to eat
  chosen_spanish: te harán comer
  alternatives_spanish:
  - serás obligado a comer
  - te darán a comer
  lexicon: HALOT
  rationale: El verbo transmite una acción impuesta. "Te harán comer" conserva la coerción del juicio sin alargar innecesariamente la frase en español.
- source_word: שִׁבְעָה עִדָּנִין
  english_pob_choice: seven times
  chosen_spanish: siete tiempos
  alternatives_spanish:
  - siete periodos
  - siete años
  lexicon: HALOT
  rationale: Se conserva la expresión abierta del arameo sin precisar "años" en el texto principal. "Tiempos" deja visible la ambigüedad lexical y evita resolver interpretativamente más de lo que el verso dice.
- source_word: יַחְלְפ֣וּן עֲלָךְ
  english_pob_choice: will pass over you
  chosen_spanish: pasarán sobre ti
  alternatives_spanish:
  - pasarán por encima de ti
  - te sobrevendrán
  lexicon: HALOT
  rationale: La imagen idiomática de un tiempo que "pasa sobre" alguien se conserva de modo natural con "pasarán sobre ti".
- source_word: תִנְדַּע
  english_pob_choice: you know
  chosen_spanish: sepas
  alternatives_spanish:
  - conozcas
  - reconozcas
  lexicon: HALOT
  rationale: En español, el subjuntivo tras "hasta que" expresa bien el resultado esperado del juicio. "Sepas" preserva el valor cognitivo directo del verbo.
- source_word: שַׁלִּיט עִלָּיָא
  english_pob_choice: the Most High rules
  chosen_spanish: el Altísimo gobierna
  alternatives_spanish:
  - el Altísimo reina
  - el Altísimo tiene dominio
  lexicon: HALOT
  rationale: '"Gobierna" comunica el ejercicio efectivo de soberanía. Frente a opciones más abstractas, mantiene claridad y el matiz real/administrativo del verbo en este contexto regio.'
- source_word: בְּמַלְכוּת אֲנָשָׁא
  english_pob_choice: in the kingdom of men
  chosen_spanish: en el reino de los hombres
  alternatives_spanish:
  - en el reino de la humanidad
  - sobre el reino de los hombres
  lexicon: HALOT
  rationale: '"Reino de los hombres" sigue de cerca la estructura del arameo y conserva el contraste con la autoridad del Altísimo.'
- source_word: וּלְמַן דִּי יִצְבֵּא יִתְּנִנַּהּ
  english_pob_choice: and gives it to whomever he wills
  chosen_spanish: y lo da a quien quiere
  alternatives_spanish:
  - y se lo da a quien desea
  - y lo entrega a quien le place
  lexicon: HALOT
  rationale: La cláusula expresa la libertad soberana de Dios para conceder el reino. "A quien quiere" es breve, natural y fiel al valor volitivo del arameo.
theological_decisions:
- issue: Duración de "siete tiempos"
  english_pob_reading: seven times
  chosen_spanish_reading: siete tiempos
  alternative_spanish_readings:
  - siete años
  - siete periodos de tiempo
  rationale: El arameo עִדָּנִין puede significar un tiempo o periodo, y el verso no especifica explícitamente "años". Se mantiene la ambigüedad en el cuerpo del texto para no resolver interpretativamente lo que el original deja abierto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Contraste humano frente a bestias
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  rationale: El texto contrapone la esfera humana con las bestias y luego repite "reino de los hombres". Se conserva "los hombres" para reflejar esa oposición conceptual y la cohesión interna del verso.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y coincide sustancialmente con el criterio de la POB inglesa, que mantiene la ambigüedad de "siete tiempos" y el contraste antropológico de "men". No se identificaron revisiones recientes que alteren la solución principal.
  spanish_consistency_notes:
  - Se mantuvo "Altísimo" para עִלָּיָא, coherente con el uso bíblico de un título divino elevado y con la terminología POB.
  - Se prefirió "reino" para מַלְכוּת, en paralelo con la formulación española ya establecida del pasaje.
  - Se evitó "SEÑOR" como sustituto de Yahvé porque este verso nombra al "Altísimo" y no contiene el tetragrámaton.
  - 'La comparación animal se mantuvo con lenguaje literal y comprensible: "bestias del campo" y "bueyes".'
