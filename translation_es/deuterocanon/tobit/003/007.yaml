review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: marco temporal, construcción impersonal de συνέβη, identificación de Sara como hija de Ragüel, ubicación en Ecbátana de Media y el hecho de que fue objeto de reproche verbal por parte de las siervas/esclavas de su padre. Sin embargo, la apertura temporal y la sintaxis de συνέβη resultan poco naturales en español (''En aquel mismo día también sucedió a Sara''). También conviene reflejar mejor la nota léxica inglesa sobre ὀνειδισθῆναι evitando ''fue burlada'', que estrecha demasiado el sentido.'
  spanish_quality_summary: La legibilidad general es buena, pero el inicio suena calcado y algo torpe. En español bíblico moderno y natural, 'Ese mismo día también le sucedió a Sara…' o formulación equivalente fluye mejor. 'Hija de Ragüel' funciona, y 'las esclavas de su padre' es defendible por la fuerza léxica de παιδίσκη. La nota al pie necesita ajustar una alternativa para no reducir el campo semántico a mera burla.
  glossary_alignment: No hay términos teológicos sensibles aquí. El uso de 'Sara' y 'Ragüel' es adecuado. 'Esclavas' está en línea con la preferencia del proyecto por preservar estatus servil cuando el original lo justifica; en este contexto es una elección válida frente a 'siervas' o 'criadas'.
  issues:
  - severity: medium
    issue: 'Apertura temporal y sintaxis poco naturales: ''En aquel mismo día también sucedió a Sara'''
    rationale: Aunque comprensible, calca demasiado la estructura fuente/inglesa. Para español natural y digno, 'Ese mismo día también le sucedió a Sara…' o similar expresa mejor el impersonal συνέβη con el dativo.
  - severity: low
    issue: La nota al pie ofrece 'fue burlada' como alternativa
    rationale: '''Burlada'' estrecha ὀνειδισθῆναι hacia la mofa; el inglés auditado prefiere ''insulted'' o ''taunted'' además de ''reproached''. En español conviene ''fue insultada'' o ''fue injuriada''/''le lanzaron insultos'' antes que ''fue burlada''.'
  revised_spanish_text: Ese mismo día también le sucedió a Sara[a], hija de Ragüel, en Ecbátana de Media, que fue reprochada por las esclavas de su padre,
  revised_footnotes:
  - marker: a
    text: O «fue insultada» o «fue injuriada»; el verbo griego expresa reproche público o abuso verbal.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis inicial para un español más natural y fiel al valor impersonal narrativo de συνέβη con dativo ('le sucedió a Sara'). Se mantiene 'también' para reflejar el valor aditivo de καὶ según la revisión inglesa. Se conserva 'fue reprochada' y 'las esclavas de su padre' por fidelidad léxica, pero se mejora la nota al pie sustituyendo 'fue burlada' por 'fue injuriada', que preserva mejor el rango semántico de ὀνειδισθῆναι.
