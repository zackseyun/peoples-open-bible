  to: 'Y envió mensajeros a Abimelec en secreto[a], diciendo: «Mira, Gaal hijo de Ebed y sus hermanos han venido a Siquem, y mira, están asediando la ciudad en contra tuya».'
  rationale: 'Se hizo una reparación menor pero necesaria: «en secreto» mejora la naturalidad de בְּתָרְמָה en español, y «están asediando la ciudad en contra tuya» conserva la decisión formal del POB inglés (''besieging'') mientras elimina la torpeza de «sitiando la ciudad contra ti». No hace falta nueva adjudicación porque el ajuste es de legibilidad y sintaxis española, no de fondo textual o doctrinal.'
