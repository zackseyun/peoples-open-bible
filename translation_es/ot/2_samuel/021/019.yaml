  yaml_path: translation/ot/2_samuel/021/019.yaml
  text: And there was again war at Gob with the Philistines[a], and Elhanan son of Jaare-oregim the Bethlehemite struck down Goliath the Gittite[b], and the shaft of his spear was like a weaver’s beam.
  footnotes:
