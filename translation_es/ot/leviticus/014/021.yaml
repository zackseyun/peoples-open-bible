  text: וְ/אִם דַּ֣ל ה֗וּא וְ/אֵ֣ין יָד/וֹ֮ מַשֶּׂגֶת֒ וְ֠/לָקַח כֶּ֣בֶשׂ אֶחָ֥ד אָשָׁ֛ם לִ/תְנוּפָ֖ה לְ/כַפֵּ֣ר עָלָ֑י/ו וְ/עִשָּׂר֨וֹן סֹ֜לֶת אֶחָ֨ד בָּל֥וּל בַּ/שֶּׁ֛מֶן לְ/מִנְחָ֖ה וְ/לֹ֥ג שָֽׁמֶן־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/021.yaml
  text: But if he is poor and his means are insufficient[a], then he shall take one male lamb for a guilt offering to be waved, to make atonement for him, and one-tenth of an ephah of fine flour mixed with oil for a grain offering[b], and one log of oil.
  footnotes:
  - marker: a
    text: Hebrew literally, 'his hand does not reach'; that is, he lacks sufficient means.
    reason: lexical_alternative
  - marker: b
    text: A 'log' is a small liquid measure used in Israelite ritual law.
    reason: cultural_note
