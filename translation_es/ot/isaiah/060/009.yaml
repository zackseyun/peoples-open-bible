base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/009.yaml
  text: Surely the coastlands wait for me[a], and the ships of Tarshish first, to bring your sons from far away, with their silver and their gold with them, for the name of Yahweh your God, and for the Holy One of Israel[b], because he has glorified you.
  footnotes:
