  - severity: low
    issue: 'Error ortográfico en la nota a: «dolos».'
    rationale: Debe decir «ídolos». Aunque está en nota y no afecta el sentido principal, conviene corregirlo.
  - severity: low
    issue: «Piedra figurada» es fiel pero algo menos natural en español actual.
    rationale: La elección puede mantenerse porque sigue la decisión auditada y la nota explica la ambigüedad; no requiere adjudicación mayor.
