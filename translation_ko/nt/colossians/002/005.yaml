id: COL.2.5
reference: Colossians 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ γὰρ καὶ τῇ σαρκὶ ἄπειμι, ἀλλὰ τῷ πνεύματι σὺν ὑμῖν εἰμι, χαίρων καὶ βλέπων ὑμῶν τὴν τάξιν καὶ τὸ στερέωμα τῆς εἰς Χριστὸν πίστεως ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/005.yaml
  text: For even if I am absent in the flesh, yet I am with you in spirit, rejoicing and seeing your good order and the firmness of your faith in Messiah.
translation:
  language: ko
  text: 비록 내가 육체로는 떨어져 있을지라도, 영으로는 여러분과 함께 있어, 여러분의 질서 있는 모습과 메시아를 향한[a] 여러분의 믿음의 굳건함을 보며 기뻐합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아에 대한」, 「메시아 안의」. 헬라어 εἰς Χριστόν은 믿음의 대상·방향을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ σαρκὶ ἄπειμι
  english_pob_choice: I am absent in the flesh
  chosen_korean: 내가 육체로는 떨어져 있을지라도
  alternatives_korean:
  - 몸으로 떠나 있을지라도
  - 직접 가지 못할지라도
  lexicon: BDAG
  rationale: 「영」과 대조되는 신체적 부재. σάρξ는 글로사리 기본 「육체」.
- source_word: τῷ πνεύματι σὺν ὑμῖν εἰμι
  english_pob_choice: I am with you in spirit
  chosen_korean: 영으로는 여러분과 함께 있어
  alternatives_korean:
  - 영으로 함께 합니다
  - 마음으로 함께 있습니다
  lexicon: BDAG
  rationale: 「영」을 소문자로 두어 바울 자신의 영을 가리키는 가능성과 성령의 가능성을 모두 보존한다. 본문에서는 신체적 부재와의 대조가 우선이다.
- source_word: χαίρων καὶ βλέπων
  english_pob_choice: rejoicing and seeing
  chosen_korean: ~ 보며 기뻐합니다
  alternatives_korean:
  - 기뻐하고 보면서
  - 보면서 즐거워하며
  lexicon: BDAG
  rationale: 두 현재 분사를 한국어에서 자연스러운 어순으로 「보며 기뻐합니다」로 옮긴다.
- source_word: τάξιν
  english_pob_choice: good order
  chosen_korean: 질서 있는 모습
  alternatives_korean:
  - 좋은 질서
  - 규모
  lexicon: BDAG
  rationale: τάξις의 「적절한 질서·배열」을 「질서 있는 모습」으로 옮긴다.
- source_word: στερέωμα
  english_pob_choice: firmness
  chosen_korean: 굳건함
  alternatives_korean:
  - 견고함
  - 단단함
  lexicon: BDAG
  rationale: στερέωμα의 「견고·고정성」을 「굳건함」으로 옮긴다.
- source_word: εἰς Χριστὸν πίστεως
  english_pob_choice: faith in Messiah
  chosen_korean: 메시아를 향한 ... 믿음
  alternatives_korean:
  - 메시아에 대한 믿음
  - 메시아 안의 신앙
  lexicon: BDAG
  rationale: πίστις + εἰς는 믿음의 대상을 가리킨다. 「향한」으로 방향성을 살린다. Χριστόν은 칭호 「메시아」.
theological_decisions:
- issue: πνεύματι의 지시
  chosen_reading: 바울 자신의 영(소문자 「영」)
  alternative_readings:
  - 성령
  rationale: 신체적 부재와의 즉각적 대조가 바울 자신의 비신체적 임재를 우선시한다. 소문자 「영」으로 모호성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
