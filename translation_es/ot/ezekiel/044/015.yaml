revisions:
- from: Pero los sacerdotes levíticos[a], los hijos de Sadoc, que guardaron la carga de mi santuario cuando los hijos de Israel se apartaban de mí, ellos se acercarán a mí para ministrarme, y estarán delante de mí para ofrecerme sebo y sangre, dice el Señor Yahvé.
  to: Pero los sacerdotes levíticos[a], los hijos de Sadoc, que cumplieron el encargo de mi santuario cuando los hijos de Israel[b] se desviaron de mí, ellos se acercarán a mí para ministrarme, y estarán delante de mí para ofrecerme sebo y sangre, declara el Señor Yahvé.
  rationale: Se ajusta una expresión española poco natural ('la carga de mi santuario') a una formulación fiel y legible ('el encargo de mi santuario'), se fortalece el matiz de apostasía con 'se desviaron de mí', se preserva la nota alternativa de 'hijos de Israel' presente en el audit trail inglés, y se mejora la fórmula profética final con 'declara'. No se requiere adjudicación adicional porque las correcciones son directas y están bien sustentadas por el hebreo y la política del proyecto.
