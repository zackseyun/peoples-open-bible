translation:
  text: But when no one answered[a], he drew aside the curtain and went into the bedroom, and found him lying dead on the canopy[b], and his head had been taken from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon the bed canopy' or possibly 'upon the netting/hanging' associated with the bed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his head had been taken away from him'; that is, he had been beheaded.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δʼ οὐθεὶς ἐπήκουσεν
  chosen: But when no one answered
  alternatives:
  - But since no one responded
  - And when no one listened
  lexicon: LSJ
  rationale: ἐπακούω here is best understood in context as responding to a call rather than merely hearing. 'Answered' gives the natural English sense after someone has called out and received no reply.
- source_word: διαστείλας
  chosen: he drew aside the curtain
  alternatives:
  - having parted the hanging
  - having drawn back the drapery
  lexicon: LSJ
  rationale: The participle literally means having separated or drawn apart something. In the bedroom setting, the implied object is the hanging/curtain at the entrance or around the bedchamber. Supplying 'the curtain' makes the action intelligible in English without over-paraphrasing.
- source_word: κοιτῶνα
  chosen: bedroom
  alternatives:
  - bedchamber
  - inner room
  lexicon: LSJ
  rationale: κοιτών denotes a sleeping room or bedchamber. 'Bedroom' is clear modern English; 'bedchamber' is possible but more archaic.
- source_word: ἐπὶ τῆς χελώνιδος
  chosen: upon the canopy
  alternatives:
  - on the mosquito net
  - on the bed canopy
  - on the tester
  lexicon: LSJ
  rationale: χελωνίς in this context refers to the bed covering or canopy/hanging associated with a luxurious bed. 'Canopy' is the most accessible rendering that fits the scene. Because the exact furnishing could also be understood as a net or hanging, an alternative is preserved in a footnote.
- source_word: ἐρριμμένον
  chosen: thrown
  alternatives:
  - cast
  - flung
  lexicon: LSJ
  rationale: The perfect participle of ῥίπτω conveys that the body had been cast or flung down and remained there. 'Thrown' is vivid and natural English.
- source_word: νεκρόν
  chosen: dead
  alternatives:
  - a corpse
  - lifeless
  lexicon: LSJ
  rationale: The adjective straightforwardly describes his state. 'Dead' is direct and avoids adding a noun not present in Greek.
- source_word: ἡ κεφαλὴ αὐτοῦ ἀφῄρητο ἀπʼ αὐτοῦ
  chosen: his head had been taken away from him
  alternatives:
  - his head had been removed from him
  - he had been beheaded
  lexicon: LSJ
  rationale: The Greek states literally that his head had been taken away/removed from him. This preserves the narrative shock without compressing it into the interpretive summary 'beheaded,' though that is the implied sense.
