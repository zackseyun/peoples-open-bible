translation:
  language: es
  text: 'Recuerden la ley[a] de Moisés, mi siervo, que le mandé en Horeb[b] para todo Israel: estatutos y juicios[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la instrucción de Moisés, mi siervo».
    reason: lexical_alternative
  - marker: b
    text: «Horeb» es otro nombre de Sinaí, el monte donde Dios dio a Israel la ley del pacto por medio de Moisés.
    reason: cultural_note
  - marker: c
    text: O «estatutos y ordenanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Tengan presente
  - Recuerden bien
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa a la memoria activa. En español, «Recuerden» conserva el tono exhortativo y el valor de pacto del verbo sin sonar mecánico.
- source_word: תּוֹרַת
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción», el contexto menciona Horeb y las estipulaciones dadas a Israel; por eso «la ley» refleja mejor el sentido legal-covenantal señalado por la POB inglesa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: nombre propio estándar
  rationale: Nombre propio bíblico con forma española estable y ampliamente reconocible.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi servidor
  - mi esclavo
  lexicon: HALOT
  rationale: Para Moisés, el texto funciona como designación honorífica de servicio comisionado. «Siervo» conserva la relación de pertenencia y servicio sin introducir la dureza de «esclavo», que aquí no es el matiz principal.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - en el monte Horeb
  lexicon: HALOT
  rationale: La preposición marca localización. En español, «en Horeb» es natural y respeta la referencia geográfica del monte sin añadir información no explícita en el hebreo.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: para todo Israel
  alternatives_spanish:
  - sobre todo Israel
  - acerca de todo Israel
  lexicon: HALOT
  rationale: Aquí עַל expresa alcance/aplicación del mandato. «Para todo Israel» comunica mejor la intención normativa universal dentro del pueblo del pacto.
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - preceptos
  lexicon: HALOT
  rationale: Término legal-cultual usual para disposiciones fijadas. «Estatutos» mantiene la distinción con el término siguiente y coincide con la pareja legal del hebreo.
- source_word: וּמִשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - ordenanzas
  - sentencias
  lexicon: HALOT
  rationale: La POB inglesa preserva el matiz forense de מִשְׁפָּטִים con «judgments». En español, «juicios» mantiene esa fuerza judicial, aunque admite una lectura más amplia de decisiones normativas.
theological_decisions:
- issue: Alcance de תּוֹרָה en contexto de pacto
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: El verso recuerda a Moisés, Horeb y las estipulaciones dadas a Israel; por tanto, el valor jurídico-covenantal de תּוֹרָה es prioritario. «La ley» refleja esa lectura sin borrar su dimensión instructiva.
  doctrine_reference: 'Translation philosophy: primacía del texto original y consistencia terminológica con excepción justificada.'
- issue: Valor de עַבְדִּי aplicado a Moisés
  english_pob_reading: my servant
  chosen_spanish_reading: mi siervo
  alternative_spanish_readings:
  - mi esclavo
  - mi servidor
  rationale: La evidencia contextual presenta a Moisés como agente comisionado de Yahvé, no como objeto de esclavitud. «Siervo» preserva la relación de servicio fiel y llamado divino, evitando una dureza no requerida aquí.
  doctrine_reference: Optimal equivalence; término de función honorífica en contexto de misión.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; el borrador español sigue esa lectura estable sin introducir cambios textuales adicionales.
  spanish_consistency_notes:
  - Se conserva la distinción legal entre «ley», «estatutos» y «juicios» para reflejar תּוֹרָה / חֻקִּים / מִשְׁפָּטִים.
  - Se usa «siervo» para Moisés por su función honorífica y comisionada, no como equivalente mecánico de «esclavo».
  - «Horeb» se mantiene sin sustituir por «Sinaí» en el texto principal, siguiendo la decisión auditada de la POB inglesa.
