translation:
  language: es
  text: Y si le saca un diente a su esclavo[a], o un diente a su esclava, lo dejará en libertad en compensación por su diente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la dejará en libertad», en aplicación de la ley tanto a un esclavo como a una esclava; la fórmula legal hebrea usa un sufijo de objeto masculino singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La partícula condicional continúa la secuencia legal del contexto anterior. «Y si» conserva la conexión narrativa y suena natural en español jurídico.
- source_word: שֵׁן
  english_pob_choice: tooth
  chosen_spanish: diente
  alternatives_spanish:
  - muela
  - pieza dental
  lexicon: HALOT
  rationale: Término anatómico directo y preciso. En español, «diente» es la forma natural y clara para el caso legal.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su esclavo varón
  lexicon: HALOT
  rationale: Se mantiene el valor de vínculo servil con «esclavo», conforme a la elección auditada de la POB en esta legislación del pacto. El español no necesita añadir «varón» porque la oposición masculina/femenina queda explícita en la cláusula paralela con «esclava».
- source_word: אֲמָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su esclava mujer
  - su sierva
  lexicon: HALOT
  rationale: Equivale al término femenino paralelo de עבד. «Esclava» preserva la distinción de género y la realidad jurídica del texto mejor que «sierva».
- source_word: יַפִּיל
  english_pob_choice: knocks out
  chosen_spanish: le saca
  alternatives_spanish:
  - le hace caer
  - le hace saltar
  lexicon: HALOT
  rationale: El hiphil de נפל expresa causar que el diente caiga. En español, «le saca un diente» es idiomático y reproduce la lesión concreta sin sobreexplicar el mecanismo.
- source_word: לַחָפְשִׁי
  english_pob_choice: go free
  chosen_spanish: en libertad
  alternatives_spanish:
  - libre
  - a libertad
  lexicon: HALOT
  rationale: La expresión denota la condición de liberación. «En libertad» comunica bien el resultado legal en español actual, manteniendo el sentido de liberación.
- source_word: יְשַׁלְּחֶנּוּ
  english_pob_choice: he shall let him go
  chosen_spanish: la dejará
  alternatives_spanish:
  - lo dejará ir
  - lo soltará
  lexicon: HALOT
  rationale: En este contexto legal, שלח significa liberar o dejar ir. Aunque el sufijo hebreo es masculino singular, el antecedente compuesto incluye a esclavo/esclava; por eso se usa «la dejará» para conectar con la cláusula femenina y hacer explícita la aplicación a cualquiera de los dos casos, siguiendo la nota auditada de la POB.
- source_word: תַּחַת
  english_pob_choice: in compensation for
  chosen_spanish: en compensación por
  alternatives_spanish:
  - por
  - a cambio de
  - en lugar de
  lexicon: HALOT
  rationale: Aquí תחת expresa indemnización o retribución por el daño sufrido. «En compensación por» hace explícito el sentido legal de reparación.
- source_word: שִׁנּוֹ
  english_pob_choice: his tooth
  chosen_spanish: su diente
  alternatives_spanish:
  - su muela
  - el diente de él
  lexicon: HALOT
  rationale: Se conserva el singular anatómico del hebreo y se mantiene la referencia al miembro lesionado con una formulación natural en español.
theological_decisions:
- issue: Terminología de esclavitud en legislación del pacto
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - criado / criada
  rationale: La POB documenta que, en este marco legal, el término hebreo designa a una persona en condición servil vinculada jurídicamente. «Esclavo / esclava» preserva mejor esa realidad social y la fuerza léxica del texto que «siervo / sierva» o términos atenuados.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; decisión lexical auditada para עבד/אמה
- issue: Sujeto implícito y alcance de la liberación
  english_pob_reading: he shall let him go free ... application of the law to either a male or a female slave
  chosen_spanish_reading: la dejará en libertad ... aplicación a esclavo o esclava
  alternative_spanish_readings:
  - lo dejará en libertad
  - los dejará en libertad
  rationale: El hebreo usa sufijo masculino singular en la forma verbal, mientras la casuística incluye ambos géneros. En español, la redacción principal se ajusta al paralelo inmediato y evita ocultar la aplicación general de la ley. La ambigüedad se preserva en la nota.
  doctrine_reference: Gramática hebrea de fórmula legal; nota auditada de la POB sobre el sufijo objeto masculino singular
translation_notes:
  revision_awareness: La revisión más reciente no modificó el contenido; el texto permanece en concordancia alta con el audit trail inglés y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «esclavo/esclava» para reflejar la elección auditada de la POB en esta legislación.
  - Se prefiere «en libertad» / «en compensación por» para hacer explícita la fuerza legal de los complementos hebreos.
  - La nota [a] preserva la tensión entre la forma verbal masculina singular y la aplicación a ambos sexos sin neutralizarla.
