  to: 'Pero él mismo caminó un día de camino por el desierto, y llegó y se sentó debajo de una retama[a]. Y pidió morir, y dijo: «Basta; ahora, Yahvé, toma mi vida[b], porque no soy mejor que mis padres».'
  rationale: La revisión corrige el anclaje indebido de la nota sobre el nombre divino eliminando una nota innecesaria, mejora la naturalidad de «דֶּרֶךְ יוֹם» con «un día de camino», corrige el género en «una retama», y reemplaza la expresión poco idiomática «pidió para sí morir» por «pidió morir», sin perder el sentido del hebreo. Se conservan «Yahvé», «mi vida» y «mis padres» por fidelidad al proyecto y al texto fuente.
