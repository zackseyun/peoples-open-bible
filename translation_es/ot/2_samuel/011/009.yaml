translation:
  language: es
  text: Pero Urías durmió[a] a la entrada de la casa del rey[b], con todos los siervos de su señor[c], y no bajó a su casa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acostó» / «pasó la noche». El verbo hebreo puede significar acostarse o dormir; aquí se refiere a que Urías pernoctó allí.
    reason: lexical_alternative
  - marker: b
    text: O «el palacio». Literalmente, «la casa del rey».
    reason: lexical_alternative
  - marker: c
    text: O «su amo». El hebreo «su señor» se refiere aquí a David, el superior de Urías.
    reason: lexical_alternative
  - marker: d
    text: O «no fue a su casa». Literalmente, «no bajó a su casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - pasó la noche
  lexicon: HALOT
  rationale: El hebreo puede significar ‘acostarse’ o ‘dormir’; en este contexto narrativo, la POB inglesa entendió que Urías se alojó allí toda la noche. ‘Durmió’ comunica de forma natural ese sentido de pernoctar sin ir más allá del texto.
- source_word: פֶּתַח
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la puerta
  - junto a la entrada
  lexicon: HALOT
  rationale: פֶּתַח indica una abertura, entrada o umbral. ‘A la entrada’ conserva el sentido espacial y suena natural en español, sin especificar indebidamente una puerta física.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio
  - la casa real
  lexicon: HALOT
  rationale: La expresión es literalmente ‘la casa del rey’. ‘La casa del rey’ sigue de cerca el hebreo y es clara en español; ‘palacio’ sería funcionalmente correcto pero menos transparente como traducción directa.
- source_word: עַבְדֵי אֲדֹנָיו
  english_pob_choice: the servants of his lord
  chosen_spanish: los esclavos de su señor
  alternatives_spanish:
  - los siervos de su señor
  - los servidores de su señor
  lexicon: HALOT
  rationale: La POB inglesa optó por ‘servants’, pero el término hebreo עֲבָדִים tiene fuerza de subordinación laboral o servil. En español, ‘esclavos’ conserva mejor la carga léxica que ‘siervos’, aunque el contexto cortesano atenúa la idea de esclavitud chattel; se mantiene ‘señor’ para reflejar אֲדֹנָיו como superior humano, no como título divino.
- source_word: אֲדֹנָיו
  english_pob_choice: his lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su señorío
  lexicon: HALOT
  rationale: ‘Señor’ reproduce de modo directo el valor de אֲדוֹן en este contexto de autoridad humana. Se evita ‘Señor’ con mayúscula, porque aquí el referente es David, superior de Urías, no una designación divina.
- source_word: וְלֹא יָרַד אֶל בֵּיתוֹ
  english_pob_choice: and did not go down to his house
  chosen_spanish: y no bajó a su casa
  alternatives_spanish:
  - y no fue a su casa
  - y no descendió a su casa
  lexicon: HALOT
  rationale: יַרַד significa literalmente ‘bajar, descender’. ‘No bajó a su casa’ conserva el giro hebreo y la imagen espacial, mientras sigue siendo comprensible en español. ‘Fue a su casa’ suavizaría demasiado el hebreo.
theological_decisions:
- issue: Título humano אֲדֹנָיו y posible ambigüedad con lenguaje divino
  english_pob_reading: his lord refers here to David, Uriah’s superior; lowercase 'lord' avoids confusion with a divine title.
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su señor (con mayúscula)
  rationale: En el contexto, el referente es David y no hay base para una lectura teológica. Mantener minúscula evita confusión con el uso reverencial de ‘Señor’ para Dios y preserva la relación jerárquica humana del pasaje.
  doctrine_reference: Ninguna; decisión de desambiguación contextual y léxica.
translation_notes:
  revision_awareness: La versión inglesa reciente no introdujo cambios respecto del pasaje y fue confirmada como de alta concordancia; esta propuesta sigue ese estado estable, pero ajusta la terminología al español con atención a la fuerza léxica de עֲבָדִים y al giro idiomático de יָרַד.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino cuando corresponda, pero en este versículo no aparece.
  - ‘Señor’ se usa en minúscula para el superior humano de Urías, evitando colisión con el título divino.
  - ‘Casa del rey’ conserva la literalidad hebrea más que la paráfrasis ‘palacio’.
  - ‘Bajó’ reproduce el hebraísmo de ירד sin perder claridad en español.
