translation:
  language: es
  text: Y prendieron fuego al portal, y derramaron sangre inocente; pero oramos al Señor y fuimos escuchados. Ofrecimos sacrificio y flor de harina, encendimos las lámparas[a] y pusimos los panes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sacamos las lámparas». El verbo griego puede significar «sacar» o «traer fuera»; aquí probablemente se refiere a preparar las lámparas para el servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπυραν
  english_pob_choice: set ... on fire
  chosen_spanish: prendieron fuego
  alternatives_spanish:
  - incendiaron
  - quemaron
  lexicon: LSJ
  rationale: El verbo expresa la acción causativa de poner fuego a algo. «Prendieron fuego» comunica bien la acción en español actual sin perder la fuerza del original.
- source_word: τὸν πυλῶνα
  english_pob_choice: the gateway
  chosen_spanish: el portal
  alternatives_spanish:
  - la puerta
  - el pórtico
  - la entrada
  lexicon: LSJ
  rationale: El término griego puede referirse a una estructura de acceso, no solo a una puerta simple. «Portal» mantiene la idea de una entrada arquitectónica amplia y es natural en español bíblico.
- source_word: ἐξέχεαν αἷμα ἀθῷον
  english_pob_choice: poured out innocent blood
  chosen_spanish: derramaron sangre inocente
  alternatives_spanish:
  - vertieron sangre inocente
  - derramaron sangre sin culpa
  lexicon: LSJ
  rationale: En español, la colocación más natural y bíblica es «derramar sangre». Aunque el griego dice literalmente «derramaron», esta elección conserva la imagen sin sonar forzada.
- source_word: ἐδεήθημεν τοῦ κυρίου
  english_pob_choice: we prayed to the Lord
  chosen_spanish: oramos al Señor
  alternatives_spanish:
  - suplicamos al Señor
  - rogamos al Señor
  lexicon: LSJ
  rationale: El verbo denota súplica ferviente. «Oramos al Señor» es claro y reverente en español; «Señor» sigue la convención del POB para κύριος en este contexto griego.
- source_word: εἰσηκούσθημεν
  english_pob_choice: were heard
  chosen_spanish: fuimos escuchados
  alternatives_spanish:
  - fuimos oídos
  - recibimos respuesta
  lexicon: LSJ
  rationale: La voz pasiva indica que Dios atendió la oración. «Fuimos escuchados» preserva la respuesta divina con naturalidad en español moderno.
- source_word: προσηνέγκαμεν θυσίαν
  english_pob_choice: we offered sacrifice
  chosen_spanish: ofrecimos sacrificio
  alternatives_spanish:
  - presentamos un sacrificio
  - ofrecimos una ofrenda
  lexicon: LSJ
  rationale: La construcción cultual se expresa de manera directa y concisa con «ofrecimos sacrificio», adecuada para el contexto ritual.
- source_word: σεμίδαλιν
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: LSJ
  rationale: El término designa harina muy fina usada en ofrendas. «Flor de harina» es el equivalente tradicional y preciso en español bíblico.
- source_word: ἐξηγάγομεν τοὺς λύχνους
  english_pob_choice: lit the lamps
  chosen_spanish: encendimos las lámparas
  alternatives_spanish:
  - sacamos las lámparas
  - trajimos las lámparas
  lexicon: LSJ
  rationale: Aunque el verbo puede significar «sacar» o «traer fuera», el contexto del servicio del templo sugiere la preparación cultual de las lámparas. «Encendimos» comunica la función ritual que el POB ya documenta.
- source_word: προεθήκαμεν τοὺς ἄρτους
  english_pob_choice: set out the loaves
  chosen_spanish: pusimos los panes
  alternatives_spanish:
  - colocamos los panes
  - pusimos los panes delante
  lexicon: LSJ
  rationale: El griego indica poner delante o disponer. «Pusimos los panes» es natural en español y mantiene la acción ritual sin añadir elementos no presentes en el texto.
theological_decisions:
- issue: Renderización de κύριος en contexto de oración a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Maestro
  rationale: Aquí κύριος se refiere al Dios de Israel en un contexto de oración y respuesta divina. Se usa «el Señor» según el criterio ya auditado del POB para κύριος en griego deuterocanónico, sin introducir «Yahvé» donde no está directamente presente en el griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Secuencia cultual restaurada tras la oración escuchada
  english_pob_reading: rendered as restored temple worship actions ('offered sacrifice and fine flour, lit the lamps, and set out the loaves')
  chosen_spanish_reading: 'acciones de culto del templo restaurado: «ofrecimos sacrificio y flor de harina, encendimos las lámparas y pusimos los panes»'
  alternative_spanish_readings:
  - «trajimos fuera las lámparas»
  - «colocamos el pan delante»
  rationale: La secuencia indica actos litúrgicos tras la oración escuchada. Se conserva esa lectura cultual, priorizando claridad española sin debilitar el sentido ritual del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: Se tomó como base el texto griego de Swete y el rastro auditado del POB en inglés. La decisión más sensible fue ἐξηγάγομεν, donde el inglés opta por «lit the lamps» por el contexto cultual; en español se siguió esa interpretación, añadiendo nota alternativa para no perder la posibilidad léxica de «sacar/traer fuera». También se mantuvo la secuencia ritual completa con un español fluido y reverente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara tipográfica y se usó «Señor» coherente con el griego κύριος en este contexto.
  - Se prefirió «flor de harina» como equivalente bíblico natural de σεμίδαλις.
  - Se mantuvo «sangre inocente» como expresión de la inocencia de la víctima y la violencia del derramamiento.
  - El verso conserva una cadencia coordinada adecuada para lectura pública.
