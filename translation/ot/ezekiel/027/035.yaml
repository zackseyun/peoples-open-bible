id: EZK.27.35
reference: Ezekiel 27:35
source:
  edition: WLC
  text: כֹּ֚ל יֹשְׁבֵ֣י הָ/אִיִּ֔ים שָׁמְמ֖וּ עָלָ֑יִ/ךְ וּ/מַלְכֵי/הֶם֙ שָׂ֣עֲרוּ שַׂ֔עַר רָעֲמ֖וּ פָּנִֽים׃
translation:
  text: All the inhabitants of the coastlands are appalled at you[a], and their kings shudder with horror[c][b]; their faces are convulsed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the islands.' The Hebrew אִיִּים can refer to islands or, more broadly, maritime coastlands.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'shudder a shudder,' an intensive expression for extreme horror.
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult; alternatively, 'their faces tremble' or 'their faces are contorted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: All
  lexicon: HALOT
  rationale: Quantifier covering the whole group introduced by the following construct phrase.
- source_word: יֹשְׁבֵי הָאִיִּים
  chosen: the inhabitants of the coastlands
  alternatives:
  - those who dwell in the islands
  - the inhabitants of the islands
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a construct participle, 'inhabitants of.' הָאִיִּים can denote islands, but in prophetic literature often refers more broadly to maritime lands/coastlands. 'Coastlands' fits the Tyre oracle's seafaring context while remaining natural English.
- source_word: שָׁמְמוּ
  chosen: are appalled
  alternatives:
  - are desolated
  - are astonished
  lexicon: HALOT
  rationale: The verb conveys being devastated/astonished in reaction. In this context of onlookers reacting to Tyre's fall, 'are appalled' best captures the emotional shock rather than literal desolation.
- source_word: עָלַיִךְ
  chosen: at you
  alternatives:
  - over you
  - because of you
  lexicon: HALOT
  rationale: With this verb, עַל marks the object or occasion of astonishment. 'At you' is idiomatic in English for the reaction directed toward Tyre.
- source_word: וּמַלְכֵיהֶם
  chosen: and their kings
  lexicon: HALOT
  rationale: Straightforward conjunction plus noun with 3mp suffix, referring to the kings of those coastlands.
- source_word: שָׂעֲרוּ
  chosen: shudder
  alternatives:
  - are horrified
  - are storm-tossed emotionally
  lexicon: HALOT
  rationale: From a root associated with storming or bristling, used figuratively for violent agitation. 'Shudder' conveys the visceral reaction in concise modern English.
- source_word: שַׂעַר
  chosen: with horror
  alternatives:
  - terribly
  - a storm-like shudder
  lexicon: HALOT
  rationale: The cognate accusative intensifies the verb. Rather than a wooden 'shudder a shudder,' English expresses the intensification adverbially; 'with horror' captures the force and emotional sense.
- source_word: רָעֲמוּ פָּנִים
  chosen: their faces are convulsed
  alternatives:
  - their faces tremble
  - their faces are contorted
  lexicon: HALOT
  rationale: The phrase is difficult, but the verb here denotes quivering or being violently disturbed, with 'faces' as the affected body part. 'Their faces are convulsed' preserves the vivid physical image of terror without over-paraphrasing.
