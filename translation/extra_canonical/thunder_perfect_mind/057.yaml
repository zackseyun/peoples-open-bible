translation:
  text: 'This is mine:

    I came forth in an earth[a],

    and you came to be manifest in knowledge;

    an earth is in your heart—you receive those outside[c][b], in places.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Many published English translations place ‘I, I am godless, and I am the
      one whose God is great’ in this slot. The present OCR excerpt instead features
      ‘darkness / knowledge / places,’ suggesting a misalignment.
    reason: alignment_note
  - marker: b
    text: The phrase rendered ‘This is mine’ is uncertain due to OCR; it may intend
      ‘This is my voice/utterance.’
    reason: lexical_alternative
  - marker: c
    text: Or 'I came forth in a darkness,\nand you came to be manifest in knowledge;\na
      darkness is in your heart—you seek outside, in places.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲓⲉⲃⲟⲗ
  chosen: came forth
  alternatives:
  - came out
  - came to light
  lexicon: Sahidic Coptic (common verb phrase ei ebol)
  rationale: Standard Coptic idiom for going/coming out; here fits the declarative
    cadence.
- source_word: ⲕⲁϩ
  chosen: darkness
  alternatives:
  - gloom
  - shadow
  lexicon: Sahidic Coptic
  rationale: Default gloss for ⲕⲁϩ as moral/physical darkness.
- source_word: ⲛⲧⲉⲧⲛϣⲟⲟⲡ ⲉⲃⲟⲗ
  chosen: you came to be manifest
  alternatives:
  - you appeared
  - you came to exist openly
  lexicon: Sahidic Coptic
  rationale: ϣⲟⲟⲡ = be/come to be; ⲉⲃⲟⲗ often functions adverbially as ‘openly/out’
    → ‘manifest.’
- source_word: ⲉⲡⲓⲥⲧⲏⲙ
  chosen: knowledge
  alternatives:
  - understanding
  - learning
  lexicon: Greek loan (ἐπιστήμη) in Coptic
  rationale: ‘Knowledge’ is the primary sense; ‘understanding/learning’ are secondary
    nuances.
- source_word: ⲛϩⲏⲧ
  chosen: in your heart
  alternatives:
  - within you
  - inwardly
  lexicon: Sahidic Coptic
  rationale: Set phrase for interiority; here second-person plural context is retained
    in English.
- source_word: ⲧⲟⲡⲟⲥ
  chosen: places
  alternatives:
  - locales
  - sites
  lexicon: Greek loan (τόπος) in Coptic
  rationale: Plain plural sense; keeping concrete ‘places’ preserves the admonitory
    edge.
- source_word: ⲡⲉⲃⲟⲗ/ⲛⲉⲃⲟⲗ
  chosen: outside
  alternatives:
  - outwardly
  - outside (realm)
  lexicon: Sahidic Coptic
  rationale: Common spatial term ‘the outside’; contrasts with ‘in your heart.’
- source_word: ⲛⲧⲉⲧⲛϣⲟ
  chosen: you seek
  alternatives:
  - you search for
  - you look for
  lexicon: Sahidic Coptic
  rationale: ϣⲟ = seek; second-person plural maintained.
- source_word: ⲧⲉ ⲡⲁⲓ ⲙⲙⲟⲉⲓ
  chosen: This is mine
  alternatives:
  - This is my utterance
  - This is my voice
  lexicon: Reading uncertain (OCR); tentative segmentation of demonstrative ⲡⲁⲓ +
    possessive sense
  rationale: OCR is ambiguous; minimal rendering keeps deictic force without overcommitting
    to a specific noun.
parallelism_check: 'This block does not present the usual ‘I am … / and I am …’ antithetical
  pair expected in the Second “I Am” Speech. Instead it sets up internal contrasts:
  I came forth in darkness // you became manifest in knowledge; darkness within //
  seeking outside in places. The inside/outside and darkness/knowledge tensions are
  preserved without smoothing.'
voice_check: First-person declarative (‘I came forth…’) addressing a plural second
  person (‘you came to be manifest… you seek…’), consistent with Thunder’s commanding,
  paradox-bearing female voice. The cadence is terse and aphoristic, maintaining the
  strangeness of the original.
alignment_risk_note: Alignment confidence is only medium, and the visible lexemes
  (ⲕⲁϩ ‘darkness’, ⲉⲡⲓⲥⲧⲏⲙ ‘knowledge’, ⲧⲟⲡⲟⲥ ‘places’) do not match the well-known
  ‘I, I am godless … and I am the one whose God is great’ pair attested in many editions
  at this position. The opening line is OCR-uncertain. I have translated the lines
  as they read rather than import the traditional ‘godless/great God’ couplet. High
  risk that this block is mis-mapped to segment 057.
