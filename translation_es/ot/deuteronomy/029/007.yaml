translation:
  language: es
  text: y tomamos su tierra y se la dimos como heredad a los rubenitas, a los gaditas y a la media tribu de Manasés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'y a la media tribu del manasita'. El hebreo usa la forma gentilicia 'manasita'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּקַּח
  english_pob_choice: and we took
  chosen_spanish: y tomamos
  alternatives_spanish:
  - y se la quitamos
  - y la arrebatamos
  lexicon: HALOT
  rationale: El verbo לקח en esta forma narrativa básica expresa 'tomar'; en español, 'tomamos' es natural y fiel. 'Arrebatar' o 'quitar' intensifican indebidamente el matiz militar.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: En contexto territorial, אֶרֶץ se refiere a la tierra ocupada. 'Tierra' comunica bien el ámbito heredado sin añadir la carga política de 'país'.
- source_word: וַנִּתְּנָהּ
  english_pob_choice: and gave it
  chosen_spanish: y se la dimos
  alternatives_spanish:
  - y la asignamos
  - y se la adjudicamos
  lexicon: HALOT
  rationale: נתן conserva su sentido básico de 'dar'. El clítico en español permite referir naturalmente 'la tierra' sin forzar una construcción más administrativa que el hebreo.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como heredad
  alternatives_spanish:
  - como herencia
  - como posesión heredada
  lexicon: HALOT
  rationale: נַחֲלָה en contextos de reparto de la tierra tiene fuerte sentido de lote heredado y asignación pactal. 'Heredad' conserva ese valor bíblico con naturalidad en español.
- source_word: לָראוּבֵנִי
  english_pob_choice: the Reubenites
  chosen_spanish: a los rubenitas
  alternatives_spanish:
  - a los de Rubén
  lexicon: HALOT
  rationale: El gentilicio singular hebreo funciona colectivamente para la tribu. En español, el plural 'rubenitas' comunica mejor el referente colectivo que un singular literal.
- source_word: וְלַגָּדִי
  english_pob_choice: the Gadites
  chosen_spanish: a los gaditas
  alternatives_spanish:
  - a los de Gad
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'rubenitas' y el sentido colectivo tribal del gentilicio.
- source_word: וְלַחֲצִי שֵׁבֶט הַמְנַשִּׁי
  english_pob_choice: the half-tribe of the Manassites
  chosen_spanish: a la media tribu de los manasitas
  alternatives_spanish:
  - a la media tribu de Manasés
  - a la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: חֲצִי שֵׁבֶט es literalmente 'media tribu'. הַמְנַשִּׁי es una forma gentilicia ('manasita'), por lo que 'manasitas' conserva la relación morfológica mejor que sustituir directamente por el nombre propio.
theological_decisions:
- issue: Tribal gentilics versus proper-name smoothing
  english_pob_reading: The English POB ultimately chose collective plurals ('Reubenites,' 'Gadites,' 'Manassites') to reflect the Hebrew gentilic forms.
  chosen_spanish_reading: 'Se conservan plurales colectivos: ''rubenitas'', ''gaditas'' y ''manasitas''.'
  alternative_spanish_readings:
  - a los de Rubén, a los de Gad y a la media tribu de Manasés
  - a los rubenitas, a los gaditas y a la media tribu de Manasés
  rationale: El hebreo usa formas gentilicias que designan a los grupos tribales. El español plural reproduce bien el valor colectivo y evita perder la señal morfológica del original.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del audit trail: se prefieren plurales colectivos para los etnónimos tribales, manteniendo el valor morfológico del hebreo y la naturalidad del español. La nota preserva la alternativa idiomática documentada para la media tribu de Manasés.'
  spanish_consistency_notes:
  - Se mantiene 'heredad' para נַחֲלָה en un contexto de reparto territorial.
  - Se usa 'rubenitas/gaditas/manasitas' como plurales colectivos, siguiendo la resolución revisada del inglés POB.
  - No se introduce 'SEÑOR' ni 'Cristo'; no son pertinentes en este versículo.
