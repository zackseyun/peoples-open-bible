translation:
  language: es
  text: Alaben tu gran y temible nombre[a][b][c]; santo es él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘asombroso’; el hebreo describe el nombre como digno de reverente admiración y temor.
    reason: lexical_alternative
  - marker: b
    text: O ‘Que den gracias a tu gran y temible nombre’; el verbo hebreo puede significar ‘dar gracias’ o ‘alabar’, pero ‘alaben’ encaja mejor en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O ‘nombre; santo es él’.
    reason: previous_rendering
lexical_decisions:
- source_word: יוֹדוּ
  english_pob_choice: Let them praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Que den gracias
  - Alabarán
  - Den alabanza
  lexicon: HALOT
  rationale: El verbo hifil puede significar ‘dar gracias’, ‘alabar’ o ‘confesar’. En este contexto salmódico, con ‘tu nombre’ como objeto, ‘alaben’ comunica mejor el reconocimiento público de la fama de Dios, y el subjuntivo exhortativo reproduce bien el valor jussivo.
- source_word: שִׁמְךָ
  english_pob_choice: your ... name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu nombre revelado
  lexicon: HALOT
  rationale: ‘Nombre’ conserva el hebraísmo y su carga teológica de reputación/carácter revelado, sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - majestuoso
  lexicon: HALOT
  rationale: ‘Grande’ es la correspondencia más directa y natural en español; mantiene el enlace léxico con el adjetivo hebreo sin sobrecargar el tono.
- source_word: וְנוֹרָא
  english_pob_choice: and fearsome
  chosen_spanish: y temible
  alternatives_spanish:
  - y asombroso
  - y terrible
  lexicon: HALOT
  rationale: La forma transmite algo que inspira reverente temor. ‘Temible’ conserva mejor esa fuerza que ‘asombroso’, que en español puede sonar demasiado positivo o coloquial.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - apartado
  lexicon: HALOT
  rationale: ‘Santo’ es la forma habitual y más fiel en español para este predicado litúrgico; mantiene el peso teológico del término.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él
  alternatives_spanish:
  - es él
  - él es
  lexicon: HALOT
  rationale: El pronombre enfático final se conserva como ‘él’. En español, la cópula implícita en ‘santo es él’ sigue el orden enfático del hebreo sin añadir contenido ajeno.
theological_decisions:
- issue: Relación entre ‘nombre’ y el pronombre final
  english_pob_reading: The pronoun refers to the LORD, affirming his holiness as the ground for praising his name.
  chosen_spanish_reading: El pronombre final remite al Señor, afirmando su santidad como fundamento de la alabanza de su nombre.
  alternative_spanish_readings:
  - La frase podría leerse como una aclamación litúrgica unida al nombre divino sin enfatizar la referencia pronominal.
  - ‘Santo es su nombre’
  rationale: El hebreo permite una lectura en la que ‘él’ retoma a Dios, aunque el sustantivo inmediatamente previo sea ‘nombre’. Mantener ‘santo es él’ preserva esa tensión y la fuerza teológica del refrán, sin convertirlo en una paráfrasis.
  doctrine_reference: Santidad de Dios; la glorificación de su nombre (cf. Sal 99)
- issue: Valor de ‘temible’ en lenguaje de adoración
  english_pob_reading: fearsome / awesome expresses reverent awe and fear
  chosen_spanish_reading: ‘Temible’ expresa un temor reverente, no mera negatividad.
  alternative_spanish_readings:
  - asombroso
  - digno de reverencia
  rationale: El término hebreo no es solo ‘impresionante’, sino que conserva una arista de temor sagrado. ‘Temible’ evita suavizarla y mantiene el registro reverente del salmo.
  doctrine_reference: La trascendencia y santidad divina
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó un ‘for’ añadido por fluidez y volvió a la estructura breve del hebreo: una exhortación seguida de una afirmación nominal. En español se refleja esa concisión sin insertar conectores inexistentes.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando el texto lo exija; aquí el hebreo usa un pronombre final y no nombra explícitamente el tetragrámaton en la línea traducida.
  - ‘Nombre’ se conserva para שֵׁם por coherencia con el peso teológico del salmo.
  - ‘Santo es él’ preserva la tensión referencial y la clausula breve del hebreo.
  - Se usa puntuación española estándar con punto y coma para separar la exhortación de la afirmación final.
