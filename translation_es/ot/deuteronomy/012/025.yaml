revisions:
- from: No lo comerás[a], para que te vaya bien a ti y a tus hijos después de ti, porque harás lo que es recto ante los ojos de Yahvé.
  to: No lo comerás[a], para que te vaya bien a ti y a tus hijos después de ti, porque harás lo que es recto a los ojos de Yahvé.
  rationale: 'La revisión hace dos ajustes menores: cambia «ante los ojos de Yahvé» por «a los ojos de Yahvé» para un español más idiomático, y corrige la nota para reflejar alternativas reales del hebreo y del audit trail inglés. Se mantiene el texto principal con «tus hijos» por ser natural y tradicionalmente comprensible en español bíblico, mientras la nota aclara el posible sentido más estrecho («hijos varones») o más amplio («descendencia»).'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: prohibición de comer la sangre implícita por el contexto inmediato, propósito/resultado de bienestar, extensión a la posteridad y fundamento en hacer lo recto ante Yahvé. Sin embargo, la elección «tus hijos» no preserva bien la decisión auditada de evitar una restricción masculina innecesaria; el inglés POB optó por ‘children’ y mantuvo ‘sons’ solo como alternativa en nota.'
  spanish_quality_summary: El español es claro y natural. «No lo comerás… para que te vaya bien… porque harás…» fluye bien. No obstante, «ante los ojos de Yahvé» suena un poco menos idiomático que «a los ojos de Yahvé» para este modismo en español bíblico moderno, y «tus hijos» puede leerse como varones solamente en español contemporáneo eclesial.
  glossary_alignment: 'Se alinea bien con el glosario en «Yahvé». No hay otros términos doctrinales conflictivos. La principal desalineación es con la decisión de género-precisión del proyecto para בָנֶיךָ: conviene «tus hijos[a]»? No; mejor «tus hijos/as» sería poco natural y ajeno al estilo. La solución más fiel y legible es «tus hijos» solo si una nota aclarara amplitud, pero dado el inglés POB, «tus hijos» sigue siendo menos exacto que «tus hijos»? En español neutral, «tus hijos» suele oírse masculino-específico. «Tus descendientes» evita eso pero pierde inmediatez familiar. «Tus hijos después de ti» no es la mejor opción. «Tus hijos[a]» con nota no resuelve plenamente la lectura principal. Por tanto, la mejor revisión es «tus hijos[a]»? No. La opción más fiel al audit trail y legible es «tus hijos[a]» sigue problemática. Recomiendo «tus hijos[a]»? No. Finalmente, «tus descendientes[a]» sacrifica algo de cercanía pero preserva mejor el alcance. Sin embargo, el inglés principal eligió
    ‘children’. En español bíblico común, «tus hijos» puede funcionar representativamente. Dado que el proyecto privilegia género-precisión, la revisión mínima más adecuada es «tus hijos[a]» con nota explícita de amplitud. Además, prefiero «a los ojos de Yahvé».'
  issues:
  - severity: medium
    issue: «tus hijos» puede restringir indebidamente בָנֶיךָ a varones
    rationale: El audit trail inglés escogió ‘children’ precisamente para evitar una lectura masculina excluyente. En español actual, «hijos» puede entenderse genéricamente, pero también puede oírse como masculino específico. Conviene ajustar o reforzar la amplitud en la nota.
  - severity: low
    issue: «ante los ojos de Yahvé» es menos idiomático que «a los ojos de Yahvé»
    rationale: Ambas opciones son comprensibles, pero «a los ojos de» es la formulación más natural en español para este modismo de evaluación divina y preserva bien la imagen hebrea.
  - severity: low
    issue: La nota actual no refleja con precisión la dirección de las alternativas del inglés POB
    rationale: 'La nota pone como alternativa el mismo texto principal («tus hijos después de ti») y omite una opción equivalente a ‘tus hijos varones’. Debe ofrecer alternativas reales: «tus hijos varones» o «tu descendencia después de ti».'
  revised_spanish_text: No lo comerás[a], para que te vaya bien a ti y a tus hijos después de ti, porque harás lo que es recto a los ojos de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «tus hijos varones después de ti» o, en sentido más amplio, «tu descendencia después de ti».
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes menores: cambia «ante los ojos de Yahvé» por «a los ojos de Yahvé» para un español más idiomático, y corrige la nota para reflejar alternativas reales del hebreo y del audit trail inglés. Se mantiene el texto principal con «tus hijos» por ser natural y tradicionalmente comprensible en español bíblico, mientras la nota aclara el posible sentido más estrecho («hijos varones») o más amplio («descendencia»).'
