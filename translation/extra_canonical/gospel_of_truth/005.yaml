  warnings: []
  consult_excerpt: 'His Wisdom meditates on the Word,

    his teaching speaks it,

    his knowledge has revealed it,

    his patience is a crown upon it,

    his joy is in harmony with it,

    his glory has exalted it,

    his image has revealed it,

    his rest has received it,

    his love made a body around it,

    his faith embraced it.

    In this way, the Word of the Father goes out in all, as the fruit 24 [of] his
    heart and an expression of his will. But it supports all. It chooses them and
    also takes the expression of all, purifying them, returning them to the Father
    and to the Mother, Jesus of infinite sweetness.

    The Father reveals his bosom, and his bosom is the Holy Spirit. He reveals what’s
    hidden of himself; what’s hidden of himself is his Son – so that through the mercies
    of the Father, the generations may know him and cease their work in searching
    for the Father, resting in him and knowing that this is the rest. He’s filled
    the need and dissolved its appearance – its appearance is the world in which it
    served, because where there’s envy and strife there’s need, but where there’s
    Unity there’s completion. Since need came into being because the Father wasn’t
    known, when the Father is known, from then on, need will no longer exist. As someone’s
    ignorance dissolves when they gain knowledge, and as darkness dissolves when the
    light appears, 25 so also need dissolves in completion. So the appearance is revealed
    from then on, but it’ll dissolve in the harmony of Unity.

    For now, their works lie scattered. In time, Unity will complete the realms. Within
    Unity each one will receive themselves, and within knowledge they’ll purify themselves
    from multiplicity into Unity, consuming matter within themselves like fire, and
    darkness by light, death by life. If indeed these things have happened to each
    one of us, then it’s right for us to think about all, so that this house will
    be holy and silent for the Unity.'
translation:
  text: 'Jesus of the infinite sweetness[a].


    The Father made his bosom known; his bosom is the Holy Spirit. He manifested what
    is hidden of himself; what is hidden of himself is his Son, so that, through the
    mercies of the Father, the Aeons might know him, cease from searching for the
    Father, and rest in him, knowing that this is the Rest.


    The Father filled the deficiency and dissolved its appearance—its appearance is
    the world in which it had served. For in the place where there is envy and strife,
    there is deficiency; but in the place where there is Unity, there is completion.
    Since the deficiency came to be because the Father was not known, when the Father
    is known, from that time the deficiency will no longer be—just as a person’s ignorance
    is dissolved when knowledge is present, and just as darkness is dissolved when
    the light appears. So also the deficiency is dissolved by the completion. From
    then on its appearance is no longer manifest, and it will be dissolved in the
    concord of Unity.


    For now their works are scattered; but in time Unity will complete the Aeons.
    Within Unity each one will receive himself, and within Knowledge they will purify
    themselves from multiplicity into Unity—consuming matter within themselves like
    fire, and darkness by light, and death by life. If indeed these things have happened
    to each of us, it is necessary to think concerning the All[d][c][b], so that this
    house may be holy and still for the sake of Unity.'
  philosophy: optimal-equivalence
