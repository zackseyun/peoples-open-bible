translation:
  language: es
  text: Y cada uno se quedó en su lugar alrededor del campamento[a], y todo el campamento echó a correr, y gritaron y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “alzaron un grito de guerra y huyeron”. El verbo aquí puede referirse a un grito fuerte en combate o en pánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se mantuvo
  alternatives_spanish:
  - se puso de pie
  - se quedó de pie
  - se mantuvo firme
  lexicon: HALOT
  rationale: עמד expresa estar de pie o tomar posición. En este contexto narrativo, «se mantuvo en su lugar» conserva la idea de posición sin sonar forzado en español.
- source_word: אִישׁ תַּחְתָּיו
  english_pob_choice: each man stood in his place
  chosen_spanish: cada hombre se mantuvo en su lugar
  alternatives_spanish:
  - cada uno en su lugar
  - cada hombre donde estaba
  - cada hombre bajo sí
  lexicon: HALOT
  rationale: La expresión idiomática comunica que cada uno ocupó su propia posición. «En su lugar» transmite mejor el sentido distributivo que una traducción literal de «bajo sí».
- source_word: סָבִיב לַמַּחֲנֶה
  english_pob_choice: around the camp
  chosen_spanish: alrededor del campamento
  alternatives_spanish:
  - en torno al campamento
  - rodeando el campamento
  lexicon: HALOT
  rationale: סָבִיב con ל indica posición alrededor. «Alrededor del campamento» es claro y directo en español.
- source_word: וַיָּרָץ כָּל הַמַּחֲנֶה
  english_pob_choice: the whole camp ran
  chosen_spanish: todo el campamento echó a correr
  alternatives_spanish:
  - todo el campamento corrió
  - todo el campamento huyó corriendo
  lexicon: HALOT
  rationale: רץ significa correr; en esta escena de pánico, «echó a correr» conserva el movimiento súbito y desordenado sin añadir más interpretación de la necesaria.
- source_word: וַיָּרִיעוּ
  english_pob_choice: they shouted
  chosen_spanish: gritaron
  alternatives_spanish:
  - alzaron un grito de guerra
  - clamaron
  - dieron un grito
  lexicon: HALOT
  rationale: רוע/ריע puede referir un grito fuerte en batalla o alarma. «Gritaron» mantiene la amplitud semántica sin decidir demasiado entre grito de guerra y grito de pánico.
- source_word: ויניסו
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - tomaron la fuga
  - salieron huyendo
  lexicon: HALOT
  rationale: נוס significa huir. «Huyeron» es el equivalente más natural y exacto en español.
translation_notes:
  revision_awareness: 'La versión inglesa POB mantiene una traducción prudente de los verbos de movimiento y del grito, dejando abierta la posibilidad de un grito de guerra o de alarma. La redacción española conserva esa misma cautela: evita sobretraducir וַיָּרִיעוּ y mantiene la secuencia narrativa simple (se colocaron, corrió el campamento, gritaron, huyeron).'
  spanish_consistency_notes:
  - Se usa «campamento» para מַחֲנֶה, en línea con la tradición de POB en contextos militares.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Huyeron» preserva la fuerza narrativa de la culminación del miedo y la dispersión.
