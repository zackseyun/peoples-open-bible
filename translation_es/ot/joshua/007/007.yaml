    changes_summary: Adjusted 'did you ever bring' to 'have you brought ... at all' to better reflect the Hebrew emphasis, and changed 'had been willing' to 'had been content' to better match the sense of וְלוּ הוֹאַלְנוּ. Kept the rest substantially unchanged for accuracy and natural formal English.
translation:
  language: es
  text: 'Y Josué dijo: «¡Ah, Señor Yahvé[a], por qué has hecho cruzar el Jordán a este pueblo siquiera, para entregarnos en la mano de los amorreos y destruirnos! ¡Ojalá nos hubiéramos contentado con habitar al otro lado del Jordán!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé» (אֲדֹנָי יְהוִה); se conserva el nombre divino YHWH como «Yahvé» en el texto principal.'
    reason: theological_note
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh!
  - ¡Alas!
  lexicon: HALOT
  rationale: Interjección de lamento o angustia. «¡Ah!» conserva el arranque emotivo y sobrio del hebreo sin volverse demasiado arcaico en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - mi Señor, Yahvé
  - Señor, Yahvé
  lexicon: HALOT
  rationale: La forma hebrea combina el título adonai con el nombre divino YHWH. En español, «Señor Yahvé» mantiene ambos elementos y evita la sustitución por un enmascaramiento tipo «SEÑOR».
- source_word: לָמָה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo de causa o motivo. «Por qué» es la forma natural y precisa en español.
- source_word: הֵעֲבַרְתָּ הַעֲבִיר
  english_pob_choice: have you brought ... at all
  chosen_spanish: has hecho pasar
  alternatives_spanish:
  - has pasado
  - has llevado
  - has hecho cruzar
  lexicon: HALOT
  rationale: El verbo en hiphil expresa causar que otros crucen. «Has hecho pasar» preserva esa causatividad mejor que un simple «has pasado».
- source_word: אֶת־הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a este pueblo en particular
  - a esta gente
  lexicon: HALOT
  rationale: «Pueblo» conserva el valor colectivo-nacional de עָם. El demostrativo «este» reproduce el hebreo.
- source_word: אֶת־הַיַּרְדֵּן
  english_pob_choice: across the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - a través del Jordán
  - más allá del Jordán
  lexicon: HALOT
  rationale: Con el sentido de hacer cruzar, la expresión española idiomática es «al otro lado del Jordán».
- source_word: לָתֵת אֹתָנוּ בְּיַד הָאֱמֹרִי
  english_pob_choice: to give us into the hand of the Amorites
  chosen_spanish: para entregarnos en manos de los amorreos
  alternatives_spanish:
  - para ponernos en manos de los amorreos
  - para darnos en manos de los amorreos
  lexicon: HALOT
  rationale: «Entregarnos en manos de» conserva el giro hebreo de entregar a alguien al poder de otro. El plural «amorreos» es el equivalente natural en español para el grupo étnico.
- source_word: לְהַאֲבִידֵנוּ
  english_pob_choice: to destroy us
  chosen_spanish: y destruirnos
  alternatives_spanish:
  - para destruirnos
  - para hacernos perecer
  - y aniquilarnos
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad unida a la idea previa de entrega. «Destruirnos» es directo y fiel al peso del verbo.
- source_word: וְלוּ
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá
  alternatives_spanish:
  - Si tan solo
  - ¡Quién hubiera
  lexicon: HALOT
  rationale: Introduce un deseo contrario a la realidad presente. «¡Ojalá» comunica bien esa fuerza desiderativa en español.
- source_word: הוֹאַלְנוּ
  english_pob_choice: we had been content
  chosen_spanish: nos hubiéramos contentado
  alternatives_spanish:
  - hubiéramos consentido
  - hubiéramos estado dispuestos
  - hubiéramos preferido
  lexicon: HALOT
  rationale: La raíz expresa voluntad/consentimiento/decidirse. En este contexto, «contentado» reproduce la idea de satisfacción con la situación alternativa, siguiendo el ajuste de la auditoría inglesa.
- source_word: וַנֵּשֶׁב
  english_pob_choice: to dwell
  chosen_spanish: con habitar
  alternatives_spanish:
  - a vivir
  - a morar
  - a permanecer
  lexicon: HALOT
  rationale: Después de la construcción desiderativa, el verbo funciona naturalmente como complemento de infinitivo en español. «Habitar» conserva el matiz de residencia estable de ישב.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del lado oriental del Jordán
  lexicon: HALOT
  rationale: Expresión geográfica idiomática desde la perspectiva occidental del narrador y de Josué. «Al otro lado del Jordán» es clara y fiel.
theological_decisions:
- issue: Cómo verter el nombre divino YHWH en la invocación «אֲדֹנָי יְהוִה»
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - mi Señor, Yahvé
  rationale: El texto contiene el Tetragrámaton, y la política española del proyecto pide «Yahvé» en el texto principal. Se mantiene además el título de respeto «Señor» para reflejar adonai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: mantiene la fuerza de la queja inicial, expresa la causatividad de הֵעֲבַרְתָּ con «has hecho pasar», y refleja la preferencia final por «had been content» con «nos hubiéramos contentado». También preserva el paralelo entre la entrega a los amorreos y el deseo de haber permanecido al otro lado del Jordán.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para el Tetragrámaton, conforme a la terminología del proyecto.
  - «Amorreos» se emplea en plural como nombre colectivo natural en español.
  - «Al otro lado del Jordán» se conserva de manera consistente para la localización geográfica.
  - La puntuación reproduce el tono de lamentación y la estructura retórica de la pregunta y el deseo.
