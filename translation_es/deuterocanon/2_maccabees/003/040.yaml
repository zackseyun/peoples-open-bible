translation:
  language: es
  text: Y el asunto acerca de Heliodoro y la custodia del tesoro sucedió de esta manera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y el asunto acerca de Heliodoro y la protección del tesoro resultó de esta manera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... καθʼ Ἡλιόδωρον
  english_pob_choice: the matter concerning Heliodorus
  chosen_spanish: el asunto respecto de Heliodoro
  alternatives_spanish:
  - las cosas respecto de Heliodoro
  - lo ocurrido con Heliodoro
  - el asunto de Heliodoro
  lexicon: LSJ
  rationale: El plural neutro con κατά funciona idiomáticamente como resumen de los hechos o del asunto relacionado con Heliodoro. «El asunto respecto de Heliodoro» conserva el valor sintético y conclusivo sin añadir explicación narrativa que el griego no exige.
- source_word: γαζοφυλακίου
  english_pob_choice: treasury
  chosen_spanish: tesoro
  alternatives_spanish:
  - tesorería
  - cámara del tesoro
  - tesoro del templo
  lexicon: LSJ
  rationale: El término designa el depósito o cámara de fondos del templo. En español, «tesoro» comunica de forma natural y concisa esa idea en un contexto de administración de bienes sagrados; «tesorería» puede sonar más administrativo y menos concreto.
- source_word: τήρησιν
  english_pob_choice: safeguarding
  chosen_spanish: custodia
  alternatives_spanish:
  - protección
  - guarda
  - resguardo
  lexicon: LSJ
  rationale: τήρησις expresa la acción de guardar, vigilar o preservar. «Custodia» mantiene el sentido activo de vigilancia y protección, y suena más natural en español bíblico actual que un calco como «safeguardia».
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  - así pues
  lexicon: LSJ
  rationale: El adverbio cierra la sección indicando que todo ocurrió conforme al relato anterior. «Así» es la forma más breve y fiel en español; evita sobreexplicar el enlace discursivo.
- source_word: ἐχώρησεν
  english_pob_choice: proceeded
  chosen_spanish: siguió
  alternatives_spanish:
  - procedió
  - avanzó
  - ocurrió
  lexicon: LSJ
  rationale: Aquí el verbo expresa que el asunto fue desarrollándose o resultando de esa manera. «Siguió» reproduce bien el movimiento narrativo y evita la dureza de «procedió» en español; junto con «así» mantiene el valor de culminación del pasaje.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva. La única tensión relevante es léxica: ἐχώρησεν puede traducirse como “siguió”, “procedió” o “resultó”, y γαζοφυλακίου como “tesoro” o “tesorería/cámara del tesoro”.'
  spanish_consistency_notes:
  - Se conserva «Y» inicial para reflejar la continuidad narrativa del griego.
  - Se usa «Heliodoro» como forma española estable del nombre propio.
  - Se evita «SEÑOR» u otras terminologías no presentes en el versículo.
  - La nota al pie conserva una alternativa verbal y nominal que corresponde al margen inglés.
  - El registro es bíblico y sobrio, sin arcaísmos innecesarios.
