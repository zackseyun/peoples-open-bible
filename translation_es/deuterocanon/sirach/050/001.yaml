    reason: alternative_reading
  - marker: b
    text: O 'la casa fue atendida/restaurada'. El verbo hebreo puede indicar que fue atendida o reparada; el paralelo griego apunta de manera más concreta a una obra en la casa.
    reason: lexical_alternative
  revision_rationale: Se corrige un error grave de lengua en el texto principal ('укрепecido' → 'fortalecido') y se alisa la sintaxis pasiva para un español más natural ('la casa fue reparada', 'el templo fue fortalecido'). Se mantienen intactos el sentido del hebreo, la distinción léxica entre 'casa' y 'templo', y las notas del rastro POB.
