lexical_decisions:
- source_word: לְ/עֶשְׂרִים
  english_pob_choice: for the twentieth
  chosen_spanish: para el vigésimo
  alternatives_spanish:
  - para el vigésimo lote
  - para la vigésima división
  - el vigésimo
  lexicon: HALOT
  rationale: El prefijo ל indica asignación o pertenencia en la serie de turnos/lotes del capítulo. En español, «para el vigésimo» conserva la fórmula breve y enumerativa del hebreo sin introducir de más una palabra no explicitada en el texto base.
- source_word: לֶֽ/אֱלִיָּתָה
  english_pob_choice: Eliathah
  chosen_spanish: Eliata
  alternatives_spanish:
  - Eliatá
  - Eliatah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de forma natural y publicable. Se evita traducirlo y se mantiene la identificación personal del listado.
- source_word: בָּנָ֥יו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijos
  lexicon: HALOT
  rationale: En español, «hijos» puede abarcar el valor genealógico de בן en un contexto de registro familiar; se conserva la concisión del hebreo y la relación posesiva.
- source_word: וְ/אֶחָ֖י/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos de clan
  - y sus parientes
  lexicon: HALOT
  rationale: «Hermanos» reproduce el parentesco explícito del hebreo sin ampliar innecesariamente a «parientes». Dado el contexto de lista genealógica/ministerial, la lectura literal es la más fiel.
- source_word: שְׁנֵ֥ים עָשָֽׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: Se conserva el estilo nominal del hebreo, que cierra la unidad con el total del grupo sin verbo expreso. En español, «doce» funciona de modo natural y fiel.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene alta concordancia con el hebreo y no presenta revisiones aplicadas. La versión española sigue esa línea: conserva la fórmula breve del listado, la asignación ordinal implícita y el cierre nominal con el total del grupo.'
  spanish_consistency_notes:
  - Se mantiene «Eliata» como transliteración uniforme del nombre propio.
  - «Hijos» y «hermanos» se dejan en sentido relacional directo, sin expansión interpretativa.
  - La nota a pie de página conserva la alternativa explícita del inglés para el elemento implícito «lote».
