id: ROM.15.24
reference: Romans 15:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὡς ⸀ἂν πορεύωμαι εἰς τὴν ⸀Σπανίαν, ἐλπίζω γὰρ διαπορευόμενος θεάσασθαι ὑμᾶς καὶ ὑφ’ ὑμῶν προπεμφθῆναι ἐκεῖ ἐὰν ὑμῶν πρῶτον ἀπὸ μέρους ἐμπλησθῶ—
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/024.yaml
  text: whenever I go to Spain—for I hope, as I pass through, to see you and to be sent on my way there by you, if first I may be satisfied in part with your company—
translation:
  language: ko
  text: 내가 스페인[a]으로 갈 때에 그렇게 하기를 원합니다. 지나는 길에 여러분을 만나보고, 여러분과 잠시 함께 누린 후에 여러분의 도움으로 그곳까지 전송받기를 소망하기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 Σπανία. 정책 지시에 따라 「스페인」으로 음역.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν Σπανίαν
  english_pob_choice: Spain
  chosen_korean: 스페인
  alternatives_korean:
  - 서바나
  lexicon: BDAG
  rationale: '정책 지시: 「스페인」으로 음역. 전통적 「서바나」는 대안.'
- source_word: διαπορευόμενος
  english_pob_choice: as I pass through
  chosen_korean: 지나는 길에
  lexicon: BDAG
  rationale: 분사의 시간·방식.
- source_word: θεάσασθαι ὑμᾶς
  english_pob_choice: to see you
  chosen_korean: 여러분을 만나보다
  lexicon: BDAG
  rationale: θεάομαι는 「유심히 보다」. 「만나보다」가 자연스럽다.
- source_word: ὑφ’ ὑμῶν προπεμφθῆναι ἐκεῖ
  english_pob_choice: to be sent on my way there by you
  chosen_korean: 여러분의 도움으로 그곳까지 전송받다
  alternatives_korean:
  - 여러분이 거기까지 전송해 주시다
  lexicon: BDAG
  rationale: προπέμπω는 여행자에게 식량·동행 등으로 도움을 주는 것. 「전송받다」가 정형.
- source_word: ὑμῶν πρῶτον ἀπὸ μέρους ἐμπλησθῶ
  english_pob_choice: if first I may be satisfied in part with your company
  chosen_korean: 여러분과 잠시 함께 누리다
  alternatives_korean:
  - 여러분으로 어느 정도 만족하다
  lexicon: BDAG
  rationale: ἐμπίπλημι의 「가득 채워짐·만족함」을 한국어 자연스러움을 위해 「함께 누리다」로 풀어낸다.
