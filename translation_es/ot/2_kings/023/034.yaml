  yaml_path: translation/ot/2_kings/023/034.yaml
  text: And Pharaoh Neco made Eliakim son of Josiah king in place of Josiah his father[a], and changed his name to Jehoiakim. But he took Jehoahaz[b], and he came to Egypt and died there.
