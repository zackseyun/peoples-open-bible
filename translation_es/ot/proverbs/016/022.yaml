translation:
  language: es
  text: El entendimiento es una fuente[a] de vida para su poseedor, pero la disciplina[b] de los necios es necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «El entendimiento es un manantial de vida para el que lo posee».'
    reason: lexical_alternative
  - marker: b
    text: «Disciplina» también puede traducirse «instrucción» o «corrección»; probablemente la línea significa que aquello que sirve de corrección para los necios no es más que necedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - fuente
  lexicon: HALOT
  rationale: El término puede referirse a un manantial o fuente. En español, «fuente» conserva la metáfora concreta de origen que da vida y suena natural en un proverbio sapiencial.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo es plural morfológico, aquí funciona como el sustantivo abstracto «vida». El singular español transmite mejor el valor proverbial de vitalidad y sustento.
- source_word: שֵׂכֶל
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - discernimiento
  - buen juicio
  lexicon: HALOT
  rationale: En Proverbios, el término apunta a inteligencia práctica o comprensión recta. «Entendimiento» es claro, bíblico y mantiene la relación con la necedad final.
- source_word: בְּעָלָיו
  english_pob_choice: its possessor
  chosen_spanish: su poseedor
  alternatives_spanish:
  - su dueño
  - el que lo posee
  - quien lo posee
  lexicon: HALOT
  rationale: El hebreo expresa literalmente posesión con sufijo de tercera persona. «Su poseedor» preserva esa relación singular sin forzar una paráfrasis.
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - castigo disciplinario
  lexicon: HALOT
  rationale: El término puede abarcar instrucción correctiva o disciplina. «Disciplina» conserva la ambigüedad productiva y encaja con el contraste irónico del hemistiquio.
- source_word: אֱוִלִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - los necios
  - insensatos
  - los insensatos
  lexicon: HALOT
  rationale: En Proverbios designa a quienes son moralmente torpes y obstinados. «Necios» es el equivalente sapiencial más natural en español.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - locura
  - insensatez
  - fatuidad
  lexicon: HALOT
  rationale: El sustantivo abstracto nombra la cualidad propia del necio. «Necedad» es más directo que «locura» y mantiene el juego proverbial con «necios».
translation_notes:
  revision_awareness: 'La revisión en inglés quedó sin cambios sustanciales: se mantuvo la equivalencia óptima con el mismo sentido proverbial, conservando el contraste entre entendimiento que da vida y la disciplina/necedad de los necios.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no hay terminología divina en el versículo.
  - Se eligió un español neutral y proverbial, sin arcaísmos innecesarios.
  - «Disciplina» conserva la posible doble fuerza de instrucción/corrección indicada en el audit trail inglés, sin explicitarla en el cuerpo principal para no recargar el texto.
