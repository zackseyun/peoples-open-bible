review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Yahvé habla a Moisés, manda tomar sustancias aromáticas específicas, y concluye con la idea de proporciones iguales. Sin embargo, hay un error grave en לְבֹנָה זַכָּה: el texto español introduce «oliva[?] pura de incienso», lo cual no corresponde al hebreo ni al rastro inglés; debe ser «incienso puro» o mejor «olíbano puro». También conviene ajustar la nota para español, ya que «vertidos así» suena calcado.'
  spanish_quality_summary: La redacción es mayormente clara, pero «onycha» queda menos natural en español que «ónice oloroso» sería interpretativo; puede mantenerse por continuidad con la nota. El problema principal de legibilidad y fidelidad es «oliva[?] pura de incienso», que es ininteligible y erróneo. «Entonces Yahvé dijo a Moisés[a]» y «en partes iguales» funcionan bien. «Galbano» es aceptable en español bíblico.
  glossary_alignment: Alinea correctamente יְהוָה con «Yahvé». No hay conflicto terminológico mayor salvo לְבֹנָה זַכָּה, donde el borrador contradice su propia decisión léxica («incienso puro») e introduce una lectura ajena al glosario y al hebreo. La conservación de nombres tradicionales inciertos para נָטָף y שְׁחֵלֶת es defendible con nota.
  issues:
  - severity: high
    issue: Error léxico en לְבֹנָה זַכָּה
    rationale: El hebreo significa «incienso puro» / «olíbano puro», no «oliva[?] pura de incienso». La forma actual altera el sentido y produce una frase incorrecta e ininteligible.
  - severity: medium
    issue: Nota al pie con español poco natural
    rationale: «Tradicionalmente vertidos así» suena calcado del inglés. En español natural conviene «tradicionalmente traducidos de esta manera» o similar.
  - severity: low
    issue: Tensión entre transliteración y naturalidad en «onycha»
    rationale: Puede mantenerse por fidelidad al rastro inglés y a la incertidumbre léxica, pero no es forma española usual. La nota ya mitiga esta dificultad.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés[a]: «Toma para ti especias: estacte, onycha y galbano, especias, y incienso puro; estarán en partes iguales».

    '
