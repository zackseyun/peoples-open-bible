    reason: alternative_reading
lexical_decisions:
- source_word: σὺ δέ
  english_pob_choice: But you
  chosen_spanish: Pero tú[a]
  alternatives_spanish:
  - Pero tú,
  - Mas tú
  lexicon: BDAG
  rationale: δέ marca transición y contraste; con σὺ expresa énfasis directo. «Pero tú» conserva ambos valores de forma natural en español.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: BDAG
  rationale: El vocativo requiere una apelación directa. «Oh rey» mantiene el tono solemne y la fuerza vocativa sin importar un giro demasiado cortesano.
- source_word: δός μοι ἐξουσίαν
  english_pob_choice: give me authority
  chosen_spanish: dame autoridad
  alternatives_spanish:
  - concédeme autoridad
  - dame permiso
  - dame poder
  lexicon: BDAG
  rationale: ἐξουσία aquí denota autoridad delegada o derecho concedido; «autoridad» preserva mejor esa idea que «permiso» o «poder».
- source_word: ἀποκτενῶ
  english_pob_choice: I will kill
  chosen_spanish: mataré
  alternatives_spanish:
  - daré muerte a
  - mataré al
  lexicon: BDAG
  rationale: El futuro simple expresa con claridad el valor verbal de ἀποκτενῶ. «Mataré» es directo y fiel al sentido.
- source_word: τὸν δράκοντα
  english_pob_choice: the dragon
  chosen_spanish: al dragón
  alternatives_spanish:
  - al serpiente
  - al monstruo
  lexicon: LSJ
  rationale: δράκων en este relato designa la criatura venerada por los babilonios; «dragón» es el equivalente natural y tradicional en español para este contexto.
- source_word: ἄνευ μαχαίρας καὶ ῥάβδου
  english_pob_choice: without sword or staff
  chosen_spanish: sin espada ni bastón
  alternatives_spanish:
  - sin espada ni vara
  - sin espada ni cayado
  lexicon: BDAG/LSJ
  rationale: ἄνευ gobierna ambos instrumentos. μαχαίρα es «espada»; ῥάβδος puede ser vara, bastón o bastón de mando. «Bastón» conserva el paralelismo con «espada» y sigue el registro formal de la revisión inglesa.
- source_word: Δίδωμί σοι
  english_pob_choice: I give it to you
  chosen_spanish: Te la doy
  alternatives_spanish:
  - Te lo doy
  - Te doy autoridad
  lexicon: BDAG
  rationale: El griego omite el objeto, pero el contexto remite a la autoridad solicitada. «Te la doy» recupera de forma natural el objeto implícito en español sin explicitarlo en exceso.
translation_notes:
  revision_awareness: La redacción sigue el extracto griego de Swete y el auditorio inglés de la POB, manteniendo la decisión revisada de ῥάβδος como «staff»; en español se resolvió con «bastón» para un registro formal y natural. Se evitó traducir mecánicamente desde el inglés, especialmente en el vocativo y en ἐξουσία, atendiendo al valor de autoridad delegada.
  spanish_consistency_notes:
  - Se mantuvo «dragón» para δράκων por coherencia con la narrativa y el valor léxico documentado.
  - Se usó «autoridad» para ἐξουσία para conservar la idea de autorización concedida, no mera capacidad.
  - Se prefirió «bastón» para ῥάβδος como equivalente formal de staff/vara en español bíblico moderno.
  - El clítico «la» en «Te la doy» retoma la autoridad implícita en el contexto; es una solución natural en español para el objeto omitido.
