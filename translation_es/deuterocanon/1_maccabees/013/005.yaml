  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido global del griego: una fuerte negativa a preservarse en tiempo de angustia, basada en que Simón no es mejor que sus hermanos. Sin embargo, dos elecciones españolas no preservan bien el valor idiomático ni la naturalidad: μή μοι γένοιτο queda débil y poco idiomático en «que no me ocurra», y φείσασθαί μου τῆς ψυχῆς se expresa de forma poco natural con «ahorrar mi vida».'
  spanish_quality_summary: El español es comprensible, pero suena calcado en puntos clave. «Que no me ocurra ahorrar mi vida» no es una formulación natural ni digna en español bíblico actual. «Lejos esté de mí» o equivalente reproduce mejor la repulsa idiomática, y «preservar mi vida»/«perdonarme la vida» suena más claro que «ahorrar mi vida». El resto del versículo es claro y correcto.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La nota sobre ψυχή como «vida» en vez de «alma» está bien encaminada. Conviene ajustar la alternativa española para que coincida con una expresión natural: «preservar mi vida» en el texto, con nota que conserve «preservarme a mí mismo» y el literal «mi vida/mi alma».'
  issues:
  - severity: medium
    issue: «que no me ocurra» debilita y vuelve poco idiomática la fórmula μή μοι γένοιτο
    rationale: La expresión griega es una repulsa fuerte. En español, «que no me ocurra» suena a mera eventualidad, no a rechazo enfático. «Lejos esté de mí» o «de ninguna manera» preserva mejor la fuerza.
  - severity: medium
    issue: «ahorrar mi vida» no es la mejor equivalencia española para φείσασθαί μου τῆς ψυχῆς
    rationale: Aunque el análisis de ψυχή como «vida» es correcto, «ahorrar mi vida» suena antinatural en este contexto. «Preservar mi vida» expresa bien la idea de spared life/self-preservation sin introducir ambigüedad.
  - severity: low
    issue: La combinación «en ningún tiempo de aflicción» es aceptable pero algo rígida
    rationale: Es fiel, pero con la reformulación principal puede mantenerse tal cual o suavizarse a «en ningún tiempo de angustia». No es un problema grave de sentido.
  revised_spanish_text: Y ahora, lejos esté de mí[a] preservar mi vida en ningún tiempo de aflicción; porque no soy mejor que mis hermanos.
