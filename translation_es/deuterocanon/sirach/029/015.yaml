translation:
  language: es
  text: No olvides los favores del fiador[a], porque entregó su vida[b] por ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los favores de quien salió fiador por ti». El término griego designa a la persona que garantiza la obligación de otro.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «su alma»; aquí el sentido es «su vida» o «él mismo» entregado en tu favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτας
  english_pob_choice: kindnesses
  chosen_spanish: favores
  alternatives_spanish:
  - bondades
  - beneficios
  - gracias
  lexicon: BDAG
  rationale: El plural χάριτας aquí apunta a actos concretos de favor o beneficio recibidos del fiador, no a 'gracia' en sentido teológico. 'Favores' conserva bien la pluralidad y suena natural en español bíblico actual.
- source_word: ἐγγύου
  english_pob_choice: of a guarantor
  chosen_spanish: del fiador
  alternatives_spanish:
  - del garante
  - de quien salió fiador
  - de uno que respondió por ti
  lexicon: BDAG
  rationale: ἐγγύος se refiere a quien responde por la obligación de otro. 'Fiador' es claro en español y mantiene la dimensión legal/económica del término mejor que una paráfrasis más larga.
- source_word: μὴ ἐπιλάθῃ
  english_pob_choice: Do not forget
  chosen_spanish: No olvides
  alternatives_spanish:
  - No te olvides de
  - No descuides
  - No dejes de recordar
  lexicon: BDAG
  rationale: La prohibición es directa; 'No olvides' es idiomático, conciso y fiel al sentido imperativo negativo del griego.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - ofreció
  - cedió
  lexicon: BDAG
  rationale: '''Entregó'' comunica mejor que ''dio'' el matiz de autoexposición o entrega personal implicado por el contexto, sin forzar un sentido sacrificial que el pasaje no exige explícitamente.'
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: BDAG
  rationale: ψυχή aquí es idiomático y se refiere a la vida expuesta al riesgo. 'Su vida' preserva el sentido concreto que el audit trail inglés ya distinguió frente a una lectura antropológica de 'alma'.
- source_word: ὑπὲρ σοῦ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - a tu favor
  - en tu beneficio
  - en tu lugar
  lexicon: BDAG
  rationale: ὑπέρ expresa beneficio/representación. 'Por ti' es breve y natural en español; mantiene la relación de actuación en beneficio del destinatario.
theological_decisions:
- issue: Renderización de ψυχή sin sobrelectura antropológica
  english_pob_reading: Literally 'his soul'; here the sense is 'his life' or 'himself' given on your behalf.
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - él mismo
  rationale: El contexto trata de una garantía financiera y del riesgo personal del fiador, no de una afirmación doctrinal sobre el alma. 'Su vida' sigue la decisión auditada del texto inglés y evita una carga teológica indebida.
  doctrine_reference: Translation philosophy §1, §6
- issue: Término para ἐγγύος en contexto social/legal
  english_pob_reading: guarantor / one who stood surety for you
  chosen_spanish_reading: fiador
  alternative_spanish_readings:
  - garante
  - fiador tuyo
  - quien respondió por ti
  rationale: '''Fiador'' conserva la fuerza legal y relacional del término griego. Se evita ''siervo'' o lenguaje eclesiástico tradicional porque no están sustentados por el contexto.'
  doctrine_reference: 'Lexical decision: κοινωνικό-financiero'
translation_notes:
  revision_awareness: 'Coincide con la revisión inglesa más reciente: no se registran cambios aplicados y la lectura sigue en acuerdo alto con el control cruzado.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Fiador'' se eligió por consistencia con el campo semántico legal/económico de ἐγγύος.'
  - '''Favores'' preserva el plural de χάριτας y evita confundirlo con ''gracia'' teológica.'
  - '''Su vida'' refleja la decisión auditada para ψυχή y evita ''alma'' en un contexto no antropológico.'
