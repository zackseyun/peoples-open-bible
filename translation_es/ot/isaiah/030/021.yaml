    rationale: La forma correcta es 'oirán'.
  - severity: low
    issue: La nota al pie no refleja la alternativa del POB en inglés
    rationale: La nota española repite prácticamente la línea principal en vez de preservar la alternativa 'cuando vayas...'. Conviene alinear mejor la nota con la documentación auditada.
