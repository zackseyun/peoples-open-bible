translation:
  language: es
  text: Mis entrañas se encendían como un horno al mirar hacia ella[a]; por eso no la abandonaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y mi vientre se turbó para buscarla; por eso adquirí una buena posesión».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mi vientre
  - mi interior
  - mi ser interior
  lexicon: HALOT / uso idiomático en español bíblico
  rationale: מֵעַי designa literalmente las entrañas, con valor idiomático para la afectividad profunda. «Entrañas» conserva mejor la imagen corporal y emotiva que «interior» o «ser interior»; «vientre» sería más estrecho y menos idiomático en español para esta carga emocional.
- source_word: יֵחַמּוּ
  english_pob_choice: burned
  chosen_spanish: se encendían
  alternatives_spanish:
  - ardían
  - se calentaban
  - se agitaban
  lexicon: HALOT
  rationale: El hebreo expresa el encenderse del calor interior. «Se encendían» comunica el ardor afectivo sin sonar excesivamente mecánico; mantiene la metáfora de calor que el inglés POB prioriza con «burned».
- source_word: כַּתַּנּוּר
  english_pob_choice: like an oven
  chosen_spanish: como un horno
  alternatives_spanish:
  - como un horno de fuego
  - como una hornaza
  lexicon: HALOT
  rationale: תנור es «horno» de modo directo. «Horno» es la correspondencia más natural y precisa en español; «hornaza» o «horno de fuego» intensifican más de lo que el término exige.
- source_word: לְהַבִּיט בָּהּ
  english_pob_choice: as I looked toward her
  chosen_spanish: al mirar hacia ella
  alternatives_spanish:
  - al mirarla
  - al contemplarla
  - mientras la miraba
  lexicon: HALOT
  rationale: El verbo להביט con ב sugiere mirar hacia/upon. «Al mirar hacia ella» preserva la dirección implícita del hebreo mejor que un objeto directo simple como «al mirarla».
- source_word: בַּעֲבוּר כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por lo tanto
  - por esta razón
  - así que
  lexicon: HALOT
  rationale: La fórmula introduce consecuencia. «Por eso» es natural, claro y suficientemente formal en español, sin añadir matices más discursivos de los necesarios.
- source_word: לֹא אֶעֶזְבֶנָּה
  english_pob_choice: I will not forsake her
  chosen_spanish: no la abandonaré
  alternatives_spanish:
  - no la dejaré
  - no la forsacaré
  lexicon: HALOT
  rationale: עזב puede ser «dejar» o «abandonar/forsake». En español contemporáneo, «abandonar» reproduce bien la fuerza relacional del compromiso; «forsake» no es idiomático. Se evita «forsacaré» por ser artificioso.
theological_decisions:
- issue: Divergencia mayor entre el hebreo y el griego en la segunda cola
  english_pob_reading: 'Main text follows the Hebrew: ''therefore I will not forsake her,'' with the Greek alternative preserved in a footnote.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «por eso no la abandonaré», y la variante griega se conserva en nota.'
  alternative_spanish_readings:
  - «por eso adquirí una buena posesión»
  - «por eso obtuve un buen bien»
  rationale: Como el hebreo está presente y con alta confianza, el texto principal debe seguirlo. La lectura griega difiere materialmente y se preserva en nota para mantener la transparencia de la tradición textual y no ocultar la tensión entre testigos.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo cuando se conserva, manteniendo la variante griega como parte del expediente textual.'
translation_notes:
  revision_awareness: El pasaje fue revisado y se mantiene sin cambios sustanciales respecto del pase más reciente; la tensión textual hebreo/griego permanece explícita en la nota.
  spanish_consistency_notes:
  - Se mantiene «entrañas» para מֵעַי conforme al valor corporal-afectivo del hebreo.
  - Se evita «Cristo», «SEÑOR» o vocabulario de tradición posterior, porque el versículo no lo requiere.
  - La nota [a] conserva la alternativa griega de forma auditable y no la mezcla con el texto principal.
  - «No la abandonaré» conserva el compromiso personal y no suaviza a una simple negativa de dejarla.
