translation:
  language: es
  text: Y ellos bendecían al Señor, que glorificaba su propio lugar; y el templo, que un poco antes estaba lleno de temor y tumulto, se llenaba de gozo y alegría cuando apareció[a] el Señor Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se manifestó» para «apareció». El griego usa un término asociado con la aparición divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγουν
  english_pob_choice: were blessing
  chosen_spanish: bendecían
  alternatives_spanish:
  - estaban bendiciendo
  - alababan
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida; «bendecían» conserva bien ese valor durativo en español y mantiene la relación directa con «al Señor».
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino. «El Señor» es la equivalencia natural en español y preserva el tono reverente del texto.
- source_word: παραδοξάζοντα
  english_pob_choice: was glorifying
  chosen_spanish: glorificaba
  alternatives_spanish:
  - magnificaba
  - hacía glorioso
  - honraba
  lexicon: LSJ
  rationale: El participio describe la acción divina sobre su lugar. «Glorificaba» conserva la conexión verbal con la gloria sin ampliar indebidamente el sentido.
- source_word: τὸν ἑαυτοῦ τόπον
  english_pob_choice: his own place
  chosen_spanish: su propio lugar
  alternatives_spanish:
  - su propio santuario
  - su propia morada
  lexicon: LSJ
  rationale: «Lugar» reproduce con fidelidad τόπος y deja que el contexto inmediato identifique ese lugar como el templo, sin introducir un término más interpretativo.
- source_word: τὸ μικρῷ πρότερον
  english_pob_choice: a little earlier
  chosen_spanish: un poco antes
  alternatives_spanish:
  - poco antes
  - hace un momento
  lexicon: LSJ
  rationale: La expresión marca una condición reciente anterior. «Un poco antes» es idiomático en español y conserva ese contraste temporal.
- source_word: δέους καὶ ταραχῆς γέμον
  english_pob_choice: had been full of fear and turmoil
  chosen_spanish: estaba lleno de temor y tumulto
  alternatives_spanish:
  - estaba lleno de miedo y confusión
  - estaba colmado de temor y perturbación
  lexicon: BDAG
  rationale: «Temor» recoge δέος con un matiz más solemne que «miedo», y «tumulto» transmite bien ταραχή como agitación o desorden.
- source_word: ἱερόν
  english_pob_choice: temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto sagrado
  lexicon: BDAG
  rationale: ἱερόν suele referirse al complejo del templo. «El templo» es la forma más clara y natural en español para este contexto.
- source_word: τοῦ παντοκράτορος ... κυρίου
  english_pob_choice: the Almighty Lord
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor Omnipotente
  - el Señor Soberano Todopoderoso
  lexicon: BDAG
  rationale: «Todopoderoso» corresponde a παντοκράτωρ y es una fórmula bíblica comprensible en español. Mantener «Señor» respeta la estructura del título divino.
- source_word: ἐπιφανέντος
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se manifestó
  - se hizo visible
  lexicon: BDAG
  rationale: El aoristo participial señala el acontecimiento decisivo que acompaña el cambio del templo. «Apareció» preserva la epifanía sin recargarla de explicación.
- source_word: χαρᾶς καὶ εὐφροσύνης ἐπληροῦτο
  english_pob_choice: was filled with joy and gladness
  chosen_spanish: se llenó de gozo y alegría
  alternatives_spanish:
  - se llenó de gozo y regocijo
  - quedó lleno de alegría y júbilo
  lexicon: BDAG
  rationale: «Gozo y alegría» conserva la pareja léxica χαρά / εὐφροσύνη con un registro natural y bíblicamente reconocible en español.
theological_decisions:
- issue: Sentido de παραδοξάζοντα τὸν ἑαυτοῦ τόπον
  english_pob_reading: The Lord is described as glorifying his own place, that is, vindicating and honoring the temple by his intervention.
  chosen_spanish_reading: El Señor es presentado como quien glorifica su propio lugar, honrándolo y restaurándolo por su intervención.
  alternative_spanish_readings:
  - el Señor estaba haciendo maravilloso su lugar
  - el Señor mostraba la gloria de su lugar
  rationale: La frase griega vincula la acción divina con el templo y no sólo con un cambio emocional. «Glorificaba su propio lugar» conserva la tensión entre acción divina y resultado cultual sin imponer una explicación más técnica de la que ofrece el texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza de ἐπιφανέντος κυρίου
  english_pob_reading: when the Almighty Lord appeared
  chosen_spanish_reading: cuando apareció el Señor Todopoderoso
  alternative_spanish_readings:
  - cuando el Señor Todopoderoso se manifestó
  - cuando se hizo visible el Señor Todopoderoso
  rationale: El texto describe una verdadera aparición divina en el marco narrativo. «Apareció» mantiene esa afirmación directa y evita reducirla a una mera providencia o expandirla innecesariamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto inglés ya está en alto acuerdo y no requirió cambios de revisión; la redacción española sigue de cerca las decisiones léxicas y teológicas auditadas, conservando el tono reverente y la secuencia narrativa del griego.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος por tratarse de un título divino en este pasaje.
  - Se eligió «Todopoderoso» para παντοκράτωρ, en coherencia con el valor bíblico tradicional del término.
  - «Temor y tumulto» refleja la carga semántica de δέος y ταραχή sin suavizar la escena.
  - La estructura verbal conserva el contraste entre la condición previa del templo y su estado posterior de gozo.
