translation:
  language: es
  text: y lo partirá en dos y asignará su lugar[a] con los hipócritas. Allí habrá llanto y rechinar de dientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su porción» o «su parte con los hipócritas».
    reason: lexical_alternative
lexical_decisions:
- source_word: διχοτομήσει
  english_pob_choice: will cut him in two
  chosen_spanish: lo partirá en dos
  alternatives_spanish:
  - lo cortará en dos
  - lo despedazará
  lexicon: BDAG
  rationale: La imagen concreta de dividir en dos se conserva sin suavizarla hacia una mera fórmula de castigo. «Partir en dos» es natural en español y mantiene la fuerza del verbo griego.
- source_word: μέρος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - porción
  - parte
  - sitio
  lexicon: BDAG
  rationale: En este contexto de juicio y adjudicación, «lugar» comunica bien la idea del destino asignado. «Porción» o «parte» podrían sonar más literales, pero en español resultan menos idiomáticas aquí.
- source_word: ὑποκριτῶν
  english_pob_choice: hypocrites
  chosen_spanish: los hipócritas
  alternatives_spanish:
  - los fingidos
  - los pretenciosos
  lexicon: BDAG
  rationale: Se conserva el término establecido en Mateo y en el uso bíblico para quienes aparentan piedad sin verdad interior. «Hipócritas» es la correspondencia directa y reconocible.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: «Allí» reproduce el valor deíctico del adverbio y encaja con la secuencia final de la frase sin añadir explicación innecesaria.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lloro
  - sollozo
  lexicon: BDAG
  rationale: «Llanto» es un equivalente natural y solemne para el lamento de la fórmula mateana. Mantiene la repetición tradicional sin volverlo demasiado interpretativo.
- source_word: βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: rechinar de dientes
  alternatives_spanish:
  - crujir de dientes
  - crujido de dientes
  lexicon: BDAG
  rationale: «Rechinar de dientes» es la expresión española estable para este modismo y preserva su carácter vívido y proverbial. «Gnashing» no tiene un calco más natural en español.
theological_decisions:
- issue: Si διχοτομήσει debe suavizarse como castigo severo en vez de imagen concreta
  english_pob_reading: Retain the concrete wording 'will cut him in two' in the main text
  chosen_spanish_reading: Mantener la imagen concreta «lo partirá en dos» en el texto principal
  alternative_spanish_readings:
  - lo castigará severamente
  - lo destruirá
  rationale: La traducción conserva la literalidad básica del verbo griego y no borra la tensión de una imagen fuerte. El contexto posterior ya expresa el destino judicial con el resto de la frase.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar τὸ μέρος αὐτοῦ μετὰ τῶν ὑποκριτῶν θήσει
  english_pob_reading: Use 'assign his place with the hypocrites'
  chosen_spanish_reading: «asignará su lugar con los hipócritas»
  alternative_spanish_readings:
  - asignará su porción con los hipócritas
  - lo pondrá con los hipócritas
  rationale: «Asignará su lugar» conserva el matiz de distribución o asignación judicial sin precisar más de lo que el griego indica. Se evita forzar el sustantivo a «porción», que en español podría sonar menos natural aquí.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del contexto inglés, que reordenó la última cláusula para acercarse mejor al griego: «There will be weeping and gnashing of teeth there». Por eso el español coloca «Allí» al inicio de la última oración y evita una formulación más explicativa como «en aquel lugar habrá...»; además, se mantiene el paralelismo breve y la secuencia directa de las dos acciones del juicio.'
  spanish_consistency_notes:
  - Se mantiene «hipócritas» por consistencia con Mateo y con la elección léxica auditada en inglés.
  - Se conserva el tono sobrio y judicial, evitando ampliaciones doctrinales sobre la naturaleza exacta del castigo.
  - «Llanto y rechinar de dientes» sigue la fórmula bíblica habitual en español, sin perder el eco proverbial del griego.
