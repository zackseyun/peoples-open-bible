revisions:
- from: En aquel día habrá una fuente abierta para la casa de David y para los habitantes de Jerusalén, para pecado y para impureza.
  to: En aquel día se abrirá una fuente[a] para la casa de David y para los habitantes de Jerusalén, para el pecado[b] y la impureza[c].
  rationale: Se ajustó la oración para que el español refleje con mayor naturalidad y fidelidad el pasivo de נפתח («se abrirá»). También se corrigió «para pecado» a «para el pecado», que es idiomático y conserva el sentido. Finalmente, se añadieron las notas léxicas significativas que el POB inglés preservó.
