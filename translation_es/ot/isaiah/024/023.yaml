translation:
  language: es
  text: Entonces la luna quedará abochornada[a], y el sol quedará avergonzado, porque Yahvé de los ejércitos reina en el monte de Sion y en Jerusalén, y delante de sus ancianos[b] habrá gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “quedará avergonzada” o “quedará humillada”; el verbo hebreo expresa vergüenza o humillación, y se distingue del verbo siguiente, que también comunica vergüenza.
    reason: lexical_alternative
  - marker: b
    text: O “delante de sus ancianos, gloria”; el hebreo termina con el sustantivo breve “gloria” y también puede entenderse como “delante de sus ancianos está su gloria”. Otra posibilidad es que “sus” se refiera a Sion/Jerusalén en vez de a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וְחָפְרָה
  english_pob_choice: will be abashed
  chosen_spanish: quedará abochornada
  alternatives_spanish:
  - quedará avergonzada
  - será confundida
  lexicon: HALOT
  rationale: El verbo expresa vergüenza/humillación más que una acción literal. “Abochornada” mantiene el matiz poético y distingue este verbo del siguiente, reflejando la decisión inglesa de variar los dos términos paralelos.
- source_word: הַלְּבָנָה
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la blanca
  - la luna llena
  lexicon: HALOT
  rationale: Es el término normal para la luna en este paralelismo con el sol.
- source_word: וּבוֹשָׁה
  english_pob_choice: ashamed
  chosen_spanish: avergonzado
  alternatives_spanish:
  - avergonzada
  - cubierta de vergüenza
  lexicon: HALOT
  rationale: El segundo verbo también comunica vergüenza, pero en español conviene una forma distinta para conservar el paralelismo sin repetir exactamente la misma palabra que en la primera cola.
- source_word: הַחַמָּה
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el calor
  - el resplandor del sol
  lexicon: HALOT
  rationale: En este par poético con “la luna”, el sentido es claramente “sol”.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón de la vergüenza de los astros: el reinado de Yahvé.'
- source_word: מָלַךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha llegado a reinar
  - es rey
  lexicon: HALOT
  rationale: El qatal profético expresa certeza o presente de realeza. “Reina” suena natural en español y conserva la fuerza de entronización.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - Todopoderoso
  lexicon: HALOT
  rationale: “Ejércitos” conserva el sentido amplio de צבאות sin convertirlo en un título interpretativo.
- source_word: בְּהַר צִיּוֹן
  english_pob_choice: on Mount Zion
  chosen_spanish: en el monte de Sion
  alternatives_spanish:
  - sobre el monte de Sion
  - en el monte Sión
  lexicon: HALOT
  rationale: En español, “en el monte de Sion” comunica bien la localización sin forzar la preposición.
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición con ciudad se vierte naturalmente como “en”.
- source_word: וְנֶגֶד
  english_pob_choice: and before
  chosen_spanish: y delante de
  alternatives_spanish:
  - y ante
  - y en presencia de
  lexicon: HALOT
  rationale: Aquí indica presencia ante alguien; “delante de” es claro y solemne en español.
- source_word: זְקֵנָיו
  english_pob_choice: his elders
  chosen_spanish: sus ancianos
  alternatives_spanish:
  - sus mayores
  - sus ancianos/ancianos de él
  lexicon: HALOT
  rationale: Se conserva la ambigüedad del sufijo posesivo. “Sus ancianos” no fuerza en español si el referente es Yahvé, Sion/Jerusalén, o el pueblo, y evita resolver la tensión del hebreo.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - es gloria
  lexicon: HALOT
  rationale: El sustantivo final, muy breve, se mantiene como “gloria” en español. La forma sin verbo conserva la tersura poética del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Se sigue la política del proyecto de transliterarlo como nombre propio en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referente de “sus ancianos” en זְקֵנָיו
  english_pob_reading: his elders, referring to the LORD
  chosen_spanish_reading: sus ancianos, manteniendo la ambigüedad referencial
  alternative_spanish_readings:
  - sus ancianos, refiriéndose a Yahvé
  - sus ancianos, refiriéndose a Sion/Jerusalén
  - los ancianos de su pueblo
  rationale: El hebreo permite más de una referencia posible. Se preserva esa tensión en español sin fijar un referente que el texto no determina de manera inequívoca.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al distinguir los dos verbos paralelos con soluciones distintas y al conservar la clausula final nominal de forma breve y sobria, sin añadir una cópula que no está en el hebreo.
  spanish_consistency_notes:
  - Se usa “Yahvé” conforme al estándar del proyecto para יְהוָה.
  - Se prefiere “Sion” como forma común en español bíblico, con acento omitido por uso corriente editorial en nombres propios bíblicos del proyecto.
  - Se mantiene “gloria” como sustantivo final no expandido.
  - Se evita “señor” o “Señor” como sustituto del nombre divino para no perder la distinción auditada del texto fuente.
