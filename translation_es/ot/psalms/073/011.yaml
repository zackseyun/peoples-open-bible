translation:
  language: es
  text: 'Y dicen[a]: «¿Cómo sabe Dios? ¿Hay conocimiento en el Altísimo[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y dijeron», si el perfecto se entiende como pasado simple en vez de una descripción de habla habitual o presente.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el Altísimo»; la frase pregunta si el Altísimo posee conocimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And they say
  chosen_spanish: Y dicen
  alternatives_spanish:
  - Y dijeron
  lexicon: HALOT
  rationale: El perfecto hebreo puede funcionar en poesía como una descripción presente o iterativa. En español, el presente conserva mejor ese tono de conducta repetida o vigente que el contexto del salmo sugiere.
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Cómo puede
  lexicon: HALOT
  rationale: El adverbio interrogativo se expresa de forma breve para mantener la fuerza retórica de la queja sin añadir modalización que el hebreo no explicita.
- source_word: יָדַע
  english_pob_choice: does know
  chosen_spanish: puede saber
  alternatives_spanish:
  - sabe
  lexicon: HALOT
  rationale: En pregunta retórica, el español idiomático suele requerir un auxiliar o perífrasis. 'Puede saber' comunica la duda desafiadora del hebreo sin perder la referencia al acto de conocer.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como nombre común/título para Dios, no como transliteración. 'Dios' es la equivalencia natural y reverente en español.
- source_word: וְיֵשׁ
  english_pob_choice: Is there
  chosen_spanish: ¿Hay
  alternatives_spanish:
  - ¿Existe
  - Y hay
  lexicon: HALOT
  rationale: La partícula existencial se vuelve una pregunta natural en español con 'hay', manteniendo la estructura retórica del verso.
- source_word: דֵּעָה
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: HALOT
  rationale: '''Conocimiento'' reproduce bien la relación verbal con ''saber'' y conserva el paralelismo con la pregunta anterior.'
- source_word: בְעֶלְיוֹן
  english_pob_choice: in the Most High
  chosen_spanish: en el Altísimo
  alternatives_spanish:
  - en el Excelso
  - junto al Altísimo
  lexicon: HALOT
  rationale: Se conserva la preposición ב con 'en', y el título divino עֶלְיוֹן se vierte como 'el Altísimo', equivalente tradicional y transparente en español.
theological_decisions:
- issue: Título divino עֶלְיוֹן
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Excelso
  rationale: '''Altísimo'' preserva la idea de supremacía divina y funciona de manera natural en español bíblico sin borrar el matiz de título de Dios.'
  doctrine_reference: Soberanía y supremacía de Dios
translation_notes:
  revision_awareness: El verso coincide con el texto hebreo masorético y con el sentido auditado en la POB inglesa. Se mantuvo la tensión del perfecto hebreo en el verbo inicial y la construcción preposicional literal de בְעֶלְיוֹן, expresada de forma idiomática en español.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֵל conforme al uso base del proyecto.
  - Se conserva 'Altísimo' para עֶלְיוֹן como título divino, no como adjetivo común.
  - El presente 'dicen' refleja la opción inglesa presente y el valor discursivo del perfecto hebreo en poesía.
  - La pregunta retórica se formula con cadencia natural en español sin atenuar su tono desafiante.
