translation:
  language: es
  text: El dueño del pozo hará restitución; pagará dinero[a] a su dueño, y el animal muerto será suyo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «plata»; aquí denota compensación monetaria.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y el cadáver le pertenecerá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעַל
  english_pob_choice: owner
  chosen_spanish: dueño
  alternatives_spanish:
  - propietario
  - poseedor
  lexicon: HALOT
  rationale: En este contexto legal, בַּעַל señala a quien responde por el pozo por ser su dueño o responsable. «Dueño» es el equivalente español más natural y jurídico sin sobrecargar el texto.
- source_word: הַבּוֹר
  english_pob_choice: the pit
  chosen_spanish: el pozo
  alternatives_spanish:
  - la fosa
  - el hoyo
  - la cisterna
  lexicon: HALOT
  rationale: En Éxodo 21:33–34 se trata de una excavación peligrosa donde cae ganado. «Pozo» comunica bien la idea de una cavidad excavada y es claro para el lector hispano; «cisterna» sería más específico de almacenamiento de agua, por lo que aquí resulta menos adecuado.
- source_word: יְשַׁלֵּם
  english_pob_choice: shall make restitution
  chosen_spanish: hará restitución
  alternatives_spanish:
  - pagará
  - compensará
  lexicon: HALOT
  rationale: El piel de שׁלם en lenguaje jurídico expresa compensación/restauración. «Hará restitución» conserva ese valor técnico mejor que un simple «pagará».
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: HALOT
  rationale: Aunque literalmente es «plata», aquí funciona como término de pago monetario. «Dinero» expresa con claridad la compensación económica sin forzar una lectura material de plata.
- source_word: יָשִׁיב
  english_pob_choice: he shall pay
  chosen_spanish: pagará
  alternatives_spanish:
  - devolverá
  - restituirá
  lexicon: HALOT
  rationale: El hifil de שוב tiene el sentido básico de hacer volver o restaurar, pero en este contexto legal el español idiomático es «pagará». La idea de restitución ya está expresada en la primera cláusula.
- source_word: לִבְעָלָיו
  english_pob_choice: to its owner
  chosen_spanish: a su dueño
  alternatives_spanish:
  - al dueño de ello
  - a su propietario
  lexicon: HALOT
  rationale: El sufijo se refiere al dueño del animal muerto. «A su dueño» es natural y mantiene la referencia posesiva clara en español.
- source_word: וְהַמֵּת
  english_pob_choice: and the dead animal
  chosen_spanish: y el animal muerto
  alternatives_spanish:
  - y el cadáver
  - y el muerto
  lexicon: HALOT
  rationale: El sustantivo/adjetivo «el muerto» refiere al animal que cayó al pozo. En español, añadir «animal» evita ambigüedad y conserva la referencia concreta del contexto.
- source_word: יִהְיֶה לוֹ
  english_pob_choice: shall be his
  chosen_spanish: será suyo
  alternatives_spanish:
  - pertenecerá a él
  - quedará para él
  lexicon: HALOT
  rationale: La frase asigna posesión del animal muerto al dueño del pozo como parte de la compensación. «Será suyo» es conciso, natural y fiel al resultado legal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la línea auditada en inglés: compensación legal, pago monetario y asignación del animal muerto al responsable del pozo. Se mantiene la distinción entre la obligación de restitución y el pago del valor monetario, sin añadir interpretación doctrinal.'
  spanish_consistency_notes:
  - Se usó «restitución» para conservar el matiz jurídico de יְשַׁלֵּם, coherente con el audit trail inglés.
  - Se eligió «pozo» en lugar de «cisterna» porque el contexto inmediato describe una excavación peligrosa para el ganado.
  - Se evitó «plata» en el texto principal porque en español moderno puede sonar más material que monetario; el valor de compensación queda claro con «dinero».
  - La segunda cláusula mantiene el posesivo singular «su dueño» para reflejar con naturalidad לִבְעָלָיו.
