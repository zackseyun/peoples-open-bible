translation:
  language: es
  text: El extranjero[a] que está entre ti subirá más y más por encima de ti, y tú bajarás más y más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el forastero' o 'el residente extranjero'. El hebreo גֵּר se refiere a un no nativo que vive entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגֵּר
  english_pob_choice: the foreigner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el sojourner
  - el residente extranjero
  - el extraño
  lexicon: HALOT
  rationale: גֵּר designa a una persona no nativa que vive dentro de la comunidad de Israel. En español, 'forastero' comunica bien esa condición de no pertenencia originaria sin recurrir a una fórmula técnica o eclesiástica. 'Residente extranjero' es más explicativo, pero menos natural; 'extraño' puede sonar demasiado vago.
- source_word: אֲשֶׁר בְּקִרְבְּךָ
  english_pob_choice: who is among you
  chosen_spanish: que está entre ustedes
  alternatives_spanish:
  - que está en medio de ustedes
  - que está en vuestro interior
  lexicon: HALOT
  rationale: La frase sitúa al גֵּר dentro del ámbito comunitario de Israel. 'Entre ustedes' es idiomático en español y conserva la idea de presencia interna sin sobrecargar el texto con una expresión más técnica.
- source_word: יַעֲלֶה עָלֶיךָ
  english_pob_choice: will rise ... above you
  chosen_spanish: subirá ... sobre ustedes
  alternatives_spanish:
  - ascenderá ... sobre ustedes
  - subirá por encima de ustedes
  lexicon: HALOT
  rationale: עלה con על expresa aquí ascenso en relación de superioridad o predominio. 'Subirá sobre ustedes' mantiene la imagen vertical y el contraste de estatus sin explicitar más de lo que dice el hebreo.
- source_word: מַעְלָה מָּעְלָה
  english_pob_choice: higher and higher
  chosen_spanish: cada vez más
  alternatives_spanish:
  - más y más alto
  - más alto y más alto todavía
  - cada vez más alto
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica el movimiento ascendente. En español, 'cada vez más' reproduce esa progresión de modo natural. Se evita repetir 'alto' dos veces para no sonar forzado, aunque la imagen de ascenso queda preservada por el verbo 'subirá'.
- source_word: וְאַתָּה
  english_pob_choice: and you
  chosen_spanish: y ustedes
  alternatives_spanish:
  - pero ustedes
  - y tú
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y tú', pero en español contemporáneo, en un contexto colectivo de pacto, el plural es más natural y coherente con el destinatario nacional de la maldición. No se introduce 'pero' como traducción obligatoria; el contraste lo establece el paralelismo mismo.
- source_word: תֵרֵד
  english_pob_choice: will go down
  chosen_spanish: descenderán
  alternatives_spanish:
  - bajarán
  - irán hacia abajo
  lexicon: HALOT
  rationale: ירד se contrapone a עלה en una metáfora de exaltación y humillación. 'Descenderán' conserva la antítesis formal y la gravedad del contraste mejor que un 'bajarán' más coloquial.
- source_word: מַטָּה מָּטָּה
  english_pob_choice: lower and lower
  chosen_spanish: cada vez más
  alternatives_spanish:
  - más y más abajo
  - cada vez más abajo
  - cada vez más bajo
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la caída. En español, repetir 'más' con un verbo ya direccional ('descenderán') expresa bien la progresión. Aunque se pierde la repetición adverbial explícita, el sentido acumulativo queda claro y fluido.
theological_decisions:
- issue: Reversión de estatus bajo la maldición del pacto
  english_pob_reading: Render the verse as a reversal of status in which the non-native resident rises over Israel and Israel declines beneath him.
  chosen_spanish_reading: 'Presentar el versículo como una inversión de estatus: el forastero se eleva por encima de Israel y Israel desciende.'
  alternative_spanish_readings:
  - Interpretarlo solo como prosperidad económica del forastero
  - Interpretarlo solo como dominación política
  rationale: El hebreo usa imágenes verticales para una reversión amplia de posición, propia del marco de las maldiciones del pacto en Deuteronomio 28. La traducción no restringe el alcance a una sola esfera; deja que la metáfora abarque la humillación total implícita en el texto.
  doctrine_reference: Fidelidad al alcance metafórico del texto; evitar estrechar indebidamente una maldición de pacto a una sola dimensión interpretativa.
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente aprobada: no se requieren cambios respecto del análisis auditado, y la traducción española sigue de cerca el hebreo con equivalencia óptima para las repeticiones intensivas y el contraste de ascenso/descenso.'
  spanish_consistency_notes:
  - Se mantiene 'forastero' para גֵּר conforme a la decisión léxica principal del POB en inglés.
  - Se conserva el contraste vertical con 'subirá' / 'descenderán' para reflejar עלה / ירד.
  - La repetición intensiva hebrea se vierte de manera natural como 'cada vez más' en español.
  - Se usa 'ustedes' por coherencia con el destinatario colectivo del pacto en español contemporáneo.
