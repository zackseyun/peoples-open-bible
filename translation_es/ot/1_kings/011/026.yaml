base_translation:
  language: en
  yaml_path: translation/ot/1_kings/011/026.yaml
  text: Now Jeroboam son of Nebat[a], an Ephraimite from Zeredah—his mother's name was Zeruah, a widow—was a servant of Solomon[c][b], and he raised his hand against the king.
  footnotes:
