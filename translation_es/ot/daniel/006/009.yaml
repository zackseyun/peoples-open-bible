translation:
  language: es
  text: Ahora[a], oh, rey, establece la prohibición y firma el documento, para que no pueda cambiarse, conforme a la ley de los medos y persas, según la cual no puede ser revocada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no pueda ser alterado». El arameo enfatiza que el edicto escrito no debe cambiarse.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no puede ser anulada». Literalmente: «no pasa», un modismo de irrevocabilidad legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  lexicon: HALOT
  rationale: Es un adverbio discursivo que introduce la súplica urgente. «Ahora» conserva la inmediatez sin añadir una relación lógica más fuerte de la que exige el arameo.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Es vocativo en apelación directa. «Oh rey» reproduce el tono de address cortesano mejor que un simple sustantivo desnudo.
- source_word: תְּקִים
  english_pob_choice: establish
  chosen_spanish: establece
  alternatives_spanish:
  - confirma
  - instituye
  lexicon: HALOT
  rationale: El verbo expresa poner en firme o dejar establecido. En castellano, «establece» es natural en contexto jurídico y conserva la idea de fijar la medida.
- source_word: אֱסָרָא
  english_pob_choice: the injunction
  chosen_spanish: el decreto
  alternatives_spanish:
  - la prohibición
  - la orden
  - el mandamiento
  lexicon: HALOT
  rationale: El contexto inmediato trata de una disposición legal prohibitiva y oficial. Aunque «injunction» apunta a una restricción vinculante, en español «decreto» comunica mejor la forma jurídica de un edicto real sin perder el carácter obligatorio.
- source_word: וְתִרְשֻׁם
  english_pob_choice: and sign
  chosen_spanish: y firma
  alternatives_spanish:
  - y registra
  - y escribe
  - y suscribe
  lexicon: HALOT
  rationale: En el contexto administrativo, el verbo apunta a la autorización escrita formal del rey. «Firma» es la equivalencia funcional más clara para la validación oficial del documento.
- source_word: כְּתָבָא
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - la escritura
  - el escrito
  - el decreto escrito
  lexicon: HALOT
  rationale: Se trata de un texto legal escrito. «Documento» conserva la formalidad y la naturaleza oficial del escrito mejor que opciones más generales o arcaizantes.
- source_word: דִּי לָא לְהַשְׁנָיָה
  english_pob_choice: so that it cannot be changed
  chosen_spanish: para que no pueda ser cambiado
  alternatives_spanish:
  - para que no se altere
  - de modo que no pueda modificarse
  - para que no sea cambiado
  lexicon: HALOT
  rationale: La construcción expresa la intención de inmutabilidad legal. «No pueda ser cambiado» mantiene la fuerza de imposibilidad legal sin suavizarla a una mera preferencia.
- source_word: כְּדָת
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - de acuerdo con la ley
  - conforme al estatuto
  lexicon: HALOT
  rationale: La frase remite a una norma o costumbre jurídica. «Conforme a la ley» suena natural en español formal y preserva el valor normativo.
- source_word: מָדַי וּפָרַס
  english_pob_choice: the Medes and Persians
  chosen_spanish: de los medos y de los persas
  alternatives_spanish:
  - de Media y Persia
  - de los medos y persas
  lexicon: HALOT
  rationale: La expresión gentilicia se refiere a los pueblos/imperio que respaldan la costumbre legal. Se mantiene la coordinación explícita en español para conservar el paralelismo del original.
- source_word: דִּי לָא תֶעְדֵּא
  english_pob_choice: which cannot be revoked
  chosen_spanish: que no puede ser revocada
  alternatives_spanish:
  - que no pasa
  - que no puede ser derogada
  - que no puede ser anulada
  lexicon: HALOT
  rationale: El arameo usa un giro idiomático de permanencia legal (“no pasa”), entendido como irrevocabilidad. «Revocada» es el equivalente jurídico más preciso en español para una orden real que no puede ser anulada.
translation_notes:
  revision_awareness: La revisión más reciente del pasaje mantuvo sin cambios la redacción inglesa de referencia, y el cotejo de revisión informó alto acuerdo (1.0). No se documentaron revisiones aplicadas ni tensiones textuales pendientes en el expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió un registro jurídico claro y contemporáneo, evitando calcos innecesarios del inglés.
  - «Decreto» y «revocada» conservan la fuerza legal del pasaje sin introducir terminología eclesiástica ajena al contexto.
