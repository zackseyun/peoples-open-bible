translation:
  language: es
  text: Vendrán contra ti con armas[a], carros y carros de carga[b], y con una asamblea de pueblos. Pondrán contra ti, por todos lados, escudo[c], broquel[c] y yelmo. Y pondré delante de ellos el juicio, y te juzgarán conforme a sus juicios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo es raro y de sentido incierto; puede referirse a tropas, ejército, armamento o fuerza militar.
    reason: lexical_alternative
  - marker: b
    text: O «ruedas»; el hebreo probablemente se refiere a vehículos militares con ruedas, por eso aquí se traduce «carros de carga».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo distingue dos términos de defensa: uno para un escudo y otro para un broquel o escudo menor.'
    reason: lexical_alternative
  - marker: d
    text: O «te juzgarán según sus leyes» o «según sus normas».
    reason: alternative_reading
lexical_decisions:
- source_word: הֹצֶן
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - tropas
  - armamento
  - huestes
  lexicon: HALOT
  rationale: El hebreo es raro y de sentido incierto. El audit trail inglés pasó de 'troops' a 'weapons' para acercarse más al término fuente. En español, 'armas' conserva esa amplitud semántica y evita precisar indebidamente si se trata de soldados o de equipo militar.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: Es el término militar estándar. 'Carros' es breve y natural en español; 'carros de guerra' sería más explicativo pero más interpretativo.
- source_word: וְגַלְגַּל
  english_pob_choice: wagons
  chosen_spanish: ruedas
  alternatives_spanish:
  - carros con ruedas
  - vehículos con ruedas
  lexicon: HALOT
  rationale: El inglés optó por 'wagons' para comunicar el probable referente móvil militar. En español, 'ruedas' mantiene la literalidad del campo léxico y la posible ambigüedad del hebreo, sin convertirlo en un vehículo más específico de lo que permite la fuente.
- source_word: בִּקְהַל עַמִּים
  english_pob_choice: with an assembly of peoples
  chosen_spanish: con una asamblea de pueblos
  alternatives_spanish:
  - con una multitud de pueblos
  - con una congregación de pueblos
  lexicon: HALOT
  rationale: '''Kahal'' es una reunión o asamblea; ''pueblos'' conserva el plural étnico/nacional. La formulación española sigue de cerca la estructura del original y mantiene el matiz de pluralidad de naciones.'
- source_word: צִנָּה
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - escudo grande
  - rodel
  - adarga
  lexicon: HALOT
  rationale: Es un término para un tipo de escudo, probablemente más grande. 'Escudo' comunica la clase general sin introducir un tecnicismo español que pudiera desviar el sentido.
- source_word: מָגֵן
  english_pob_choice: buckler
  chosen_spanish: broquel
  alternatives_spanish:
  - escudo pequeño
  - rodela
  lexicon: HALOT
  rationale: El audit trail inglés preserva la distinción entre dos términos de defensa. 'Broquel' es un equivalente tradicional en español que ayuda a mantener esa diferencia léxica entre dos tipos de escudo.
- source_word: וְקוֹבַע
  english_pob_choice: helmet
  chosen_spanish: yelmo
  alternatives_spanish:
  - casco
  - capacete
  lexicon: HALOT
  rationale: Es un término de armadura para la cabeza. 'Yelmo' mantiene el registro elevado y militar y distingue mejor esta pieza del lenguaje más moderno 'casco'.
- source_word: יָשִׂימוּ עָלַיִךְ סָבִיב
  english_pob_choice: They will set ... against you on every side
  chosen_spanish: Pondrán contra ti, alrededor,
  alternatives_spanish:
  - Te colocarán ... por todos lados
  - Te cercarán con ...
  lexicon: HALOT
  rationale: La expresión comunica cerco hostil. En español conviene explicitar la dirección adversarial con 'contra ti' y conservar 'alrededor' para reflejar 'sָבִיב' sin añadir una paráfrasis mayor.
- source_word: וְנָתַתִּי לִפְנֵיהֶם מִשְׁפָּט
  english_pob_choice: I will set judgment before them
  chosen_spanish: Y pondré delante de ellos el juicio
  alternatives_spanish:
  - Y pondré el caso delante de ellos
  - Y les entregaré el juicio
  lexicon: HALOT
  rationale: '''Mishpat'' puede ser ''juicio'', ''causa'' o ''sentencia''. El inglés conserva ''judgment'' y deja abierta la tensión entre acto judicial y veredicto; ''poner delante de ellos el juicio'' mantiene esa ambigüedad sin resolverla demasiado.'
- source_word: וּשְׁפָטוּךְ בְּמִשְׁפְּטֵיהֶם
  english_pob_choice: they will judge you by their judgments
  chosen_spanish: te juzgarán conforme a sus juicios
  alternatives_spanish:
  - te juzgarán según sus leyes
  - te sentenciarán conforme a sus normas
  lexicon: HALOT
  rationale: Se conserva la repetición de la raíz משפט con 'juzgarán' y 'juicios'. 'Conforme a' permite una relación normativa o judicial, coherente con la ambigüedad del hebreo y del inglés auditado.
theological_decisions:
- issue: Intervención divina en el juicio ejecutado por invasores
  english_pob_reading: The invaders are portrayed as instruments through whom God hands over judicial action.
  chosen_spanish_reading: Los invasores aparecen como instrumentos mediante los cuales Dios pone el juicio delante de ellos.
  alternative_spanish_readings:
  - Dios simplemente permite que juzguen
  - Dios delega formalmente el juicio en ellos
  rationale: 'El hebreo y el audit trail inglés sugieren iniciativa divina, pero sin especificar más de lo debido el grado de delegación jurídica. La traducción española conserva esa tensión: Dios actúa, los invasores ejecutan, y no se cierra el matiz entre permiso, entrega y designación.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, que sustituyó 'troops' por 'weapons' para acercarse mejor al término hebreo raro הֹצֶן. Mantengo esa misma orientación en español con 'armas'. También preservo la distinción léxica entre los dos términos de escudo y la ambigüedad judicial de מִשְׁפָּט y בְּמִשְׁפְּטֵיהֶם.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto para el nombre divino cuando aparezca; en este versículo no se presenta.
  - Se mantiene 'juicio' para מִשְׁפָּט, conservando la posible oscilación entre sentencia, causa y acto judicial.
  - '''Broquel'' se eligió para respetar la distinción con ''escudo''; evita colapsar ambos términos en una sola palabra.'
  - La puntuación busca reflejar la acumulación militar del hebreo con una secuencia fluida y publicable en español.
