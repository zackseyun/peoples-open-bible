- from: Y llamó el nombre de aquel lugar Betel[a]; pero el nombre de la ciudad era antes Luz.
  to: Y llamó a aquel lugar Betel[a], pero antes el nombre de la ciudad era Luz.
  rationale: Se ajusta la frase principal para evitar un calco hebraizante poco natural en español, sin perder el sentido auditado de «nombrar». Se conserva el contraste temporal sobre Luz y la nota léxica del topónimo.
