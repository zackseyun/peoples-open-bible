  rationale: 'Se hicieron dos reparaciones menores: (1) ''panes puros'' reemplaza ''panes limpios'' para reflejar mejor el alcance semántico de καθαρῶν en español; (2) ''los colocó sobre ella'' reemplaza la formulación más coloquial ''se los puso encima''. Se conserva la estructura del versículo y la nota de alternativa, simplificada para evitar redundancia con el texto principal.'
