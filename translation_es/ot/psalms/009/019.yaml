translation:
  language: es
  text: Porque el necesitado no será olvidado para siempre[b]; la esperanza de los afligidos[a] no perecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los humildes» o «los mansos» para ענוים.
    reason: lexical_alternative
  - marker: b
    text: La poesía hebrea usa dos expresiones casi paralelas, «para siempre» y «por todo tiempo», para subrayar que el necesitado no queda abandonado de manera permanente.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la base o motivo del enunciado anterior; en español, «Porque» conserva la fuerza explicativa y causal de כִּי con naturalidad bíblica y moderna.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Negación directa que gobierna la acción verbal; «no» mantiene la estructura hebrea sin intensificar más de lo que el texto requiere.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: Expresión temporal idiomática de duración indefinida; «para siempre» comunica bien el valor enfático del adverbio en español natural.
- source_word: יִשָּׁכַח
  english_pob_choice: will be forgotten
  chosen_spanish: será olvidado
  alternatives_spanish:
  - quedará en el olvido
  - será desechado
  lexicon: HALOT
  rationale: 'El nifal de שכח se vierte de forma pasiva: «será olvidado». Aunque el inglés POB mantiene el pasivo, en español la forma pasiva refleja el mismo efecto poético y conserva la no-explicitación del sujeto divino.'
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el desvalido
  - el indigente
  lexicon: HALOT
  rationale: Término amplio para quien carece de lo necesario. «El necesitado» evita reducirlo solo a pobreza económica y funciona bien en el paralelismo del versículo.
- source_word: תִּקְוַת
  english_pob_choice: the hope of
  chosen_spanish: la esperanza de
  alternatives_spanish:
  - la expectativa de
  lexicon: HALOT
  rationale: La forma constructa pide vínculo con el sustantivo siguiente; «la esperanza de» es la correspondencia más natural y clara en español.
- source_word: ענוים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los humildes
  - los mansos
  - los pobres
  lexicon: HALOT
  rationale: En este paralelismo con אביון, el sentido social de sufrimiento está destacado. «Los afligidos» preserva esa dimensión, sin negar la gama semántica de humildad o mansedumbre.
- source_word: תֹּאבַד
  english_pob_choice: will not perish
  chosen_spanish: no perecerá
  alternatives_spanish:
  - no desaparecerá
  - no se perderá
  lexicon: HALOT
  rationale: El qal imperfecto de אבד expresa perecer, desaparecer o ser destruido; «no perecerá» reproduce el valor léxico con el mismo peso semántico que el inglés POB.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  lexicon: HALOT
  rationale: Paralelo poético cercano a לָנֶצַח. Repetir «para siempre» en ambos hemistiquios conserva la fuerza enfática y la simetría del hebreo.
theological_decisions:
- issue: Sujeto implícito de «será olvidado»
  english_pob_reading: Implicitly God will not forget the needy forever, without making God the explicit grammatical subject in translation.
  chosen_spanish_reading: Se mantiene la pasiva impersonal («será olvidado») sin añadir explícitamente a Dios como sujeto gramatical.
  alternative_spanish_readings:
  - Dios no olvidará al necesitado para siempre
  - El necesitado no será olvidado por Dios para siempre
  rationale: El hebreo usa una pasiva sin nombrar a Dios. Conservar la pasiva respeta la forma poética y evita introducir un sujeto que el texto no expresa de manera explícita, aunque el contexto sí lo presupone.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de ענוים
  english_pob_reading: afflicted
  chosen_spanish_reading: afligidos
  alternative_spanish_readings:
  - humildes
  - mansos
  - humildes y afligidos
  rationale: La paralelización con אביון favorece la dimensión de sufrimiento o opresión. «Afligidos» conserva esa carga social-teológica, sin excluir los matices de humildad que el término puede tener en otros contextos.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El borrador sigue el último pase revisado sin cambios sustantivos y mantiene la alta coincidencia del control cruzado; se conservan la pasiva del primer hemistiquio y el paralelismo temporal enfático con «para siempre» en ambos miembros.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se conserva el pasivo «será olvidado» para respetar la forma hebrea y la implicación divina sin explicitarla.
  - Se repite «para siempre» en ambos hemistiquios para preservar el paralelismo poético del hebreo.
  - Se usa «afligidos» según el contexto paralelo con «el necesitado», sin borrar el posible matiz de humildad en otros pasajes.
