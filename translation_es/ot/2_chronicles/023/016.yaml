translation:
  language: es
  text: Entonces Joiadá hizo un pacto entre él mismo[a], todo el pueblo y el rey, para que fueran el pueblo de Yahvé[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cortó un pacto'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''para que fueran pueblo de Yahvé''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''para que fueran un pueblo para Yahvé''.'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּכְרֹת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - hizo un pacto
  lexicon: HALOT
  rationale: El hebreo usa el modismo כרת ברית, literalmente 'cortar un pacto'. En español, 'hizo un pacto' transmite con naturalidad la acción pactal sin perder el contenido formal del verbo idiomático.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: Aquí el acuerdo tiene peso solemne y religioso. 'Pacto' es claro y digno en español; se evita 'alianza' porque puede sonar más político y 'covenio' no es de uso natural.
- source_word: בֵּינוֹ
  english_pob_choice: between himself
  chosen_spanish: entre él
  alternatives_spanish:
  - entre sí
  - entre él mismo
  lexicon: HALOT
  rationale: El pronominal refiere a Joiadá. En español, 'entre él' conserva la relación marcada por בין sin añadir una reflexividad que el hebreo no explicita en la forma.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de la tierra
  - la gente
  lexicon: HALOT
  rationale: El texto dice simplemente 'todo el pueblo'. 'Pueblo' conserva mejor el valor colectivo y solemne que 'gente'.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es la designación directa y normal del sustantivo definido; no hay razón para elevarlo con un equivalente menos común.
- source_word: לִהְיוֹת
  english_pob_choice: that they should be
  chosen_spanish: para que fueran
  alternatives_spanish:
  - para ser
  - a fin de que fueran
  lexicon: HALOT
  rationale: La cláusula infinitiva expresa propósito/resulta. 'Para que fueran' comunica bien la finalidad en un español natural y mantiene el sentido dinámico del hebreo.
- source_word: לְעָם
  english_pob_choice: a people
  chosen_spanish: pueblo
  alternatives_spanish:
  - un pueblo
  - un pueblo como
  lexicon: HALOT
  rationale: En español, 'ser pueblo de Yahvé' suena más natural y conserva el valor de identidad corporativa del hebreo. Se evita introducir un artículo indefinido que podría sonar extraño en esta fórmula.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - pertenecientes a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé''. En esta fórmula de pertenencia/covenantalidad, el genitivo ''de Yahvé'' expresa de manera idiomática la pertenencia del pueblo.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh / the LORD in the audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo contiene directamente el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre divino como 'Yahvé' en vez de ocultarlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Partes del pacto y cláusula de propósito
  english_pob_reading: Jehoiada made a covenant between himself, all the people, and the king, that they should be Yahweh's people
  chosen_spanish_reading: Joiadá pacta con el pueblo y el rey para que sean pueblo de Yahvé
  alternative_spanish_readings:
  - Joiadá hizo un pacto entre sí, todo el pueblo y el rey, para que fueran el pueblo de Yahvé
  - Joiadá hizo un pacto entre él, todo el pueblo y el rey, para que fueran un pueblo para Yahvé
  rationale: El hebreo enumera a Joiadá, al pueblo y al rey como las partes vinculadas por la alianza, y la cláusula final expresa su objetivo de pertenencia a Yahvé. En español conviene mantener esa relación sin añadir como parte explícita del pacto a Yahvé, aunque él es el destinatario teológico de la pertenencia.
  doctrine_reference: 'DOCTRINE.md: Covenant formulae and divine allegiance'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés que favorece una cláusula de pertenencia más natural; en español, 'pueblo de Yahvé' mantiene esa naturalidad sin perder la fuerza covenantal de לְעָם לַיהוָה. También se conserva la tensión interpretativa de que Yahvé es el destinatario de la pertenencia, no un tercer firmante explícito junto con Joiadá, el pueblo y el rey.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme al estándar del proyecto.
  - '''Pacto'' se emplea para בְּרִית por su fuerza solemne y religiosa.'
  - '''Pueblo'' se usa para לְעָם para conservar el sentido corporativo y covenantal.'
  - No se introduce 'Mesías', 'SEÑOR' ni otros equivalentes no presentes en el hebreo de este versículo.
