revisions:
- from: Solo sé fuerte y muy valiente[a], cuidando de actuar conforme a toda la ley que Moisés, mi siervo, te mandó. No te apartes de ella ni a la derecha ni a la izquierda, para que obres con sabiduría[b] en todo lo que emprendas.
  to: Solo sé fuerte y muy valiente, teniendo cuidado de hacer conforme a toda la ley que Moisés, mi siervo, te mandó. No te apartes de ella ni a la derecha ni a la izquierda, para que obres con sabiduría[a] adondequiera que vayas.
  rationale: La revisión corrige el anclaje de la nota para que recaiga sobre «obres con sabiduría», que corresponde a תַּשְׂכִּיל según el hebreo y la POB inglesa. También elimina la nota duplicada, acerca el cierre a בְּכֹל אֲשֶׁר תֵּלֵךְ con «adondequiera que vayas», y mejora la naturalidad y precisión de לִשְׁמֹר לַעֲשׂוֹת con «teniendo cuidado de hacer». No se requiere adjudicación adicional porque los ajustes son claros y directamente sostenidos por la evidencia fuente y el audit trail.
