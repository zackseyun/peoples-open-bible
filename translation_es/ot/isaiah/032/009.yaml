translation:
  language: es
  text: Mujeres complacientes[a], levántense; oigan mi voz. Hijas confiadas[c][b], presten oído a mi palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tranquilas» para «complacientes»; el hebreo puede denotar a quienes viven sin sobresalto o con seguridad descuidada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «hijas». Se conserva el término para mantener la forma hebrea de la dirección.
    reason: cultural_note
  - marker: c
    text: O «seguras» para «confiadas»; el hebreo subraya un sentido de seguridad o autosuficiencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: Mujeres
  alternatives_spanish:
  - esposas
  lexicon: HALOT
  rationale: El sustantivo plural denota de manera directa a mujeres. «Esposas» sería posible en algunos contextos, pero aquí el llamado es amplio y paralelo a «hijas», por lo que «mujeres» conserva mejor el sentido.
- source_word: שַׁאֲנַנּוֹת
  english_pob_choice: complacent
  chosen_spanish: complacientes
  alternatives_spanish:
  - tranquilas
  - seguras
  - sin cuidado
  lexicon: HALOT
  rationale: El adjetivo expresa un estado de seguridad o calma que, en un reproche profético, lleva matiz negativo. «Complacientes» transmite mejor esa mezcla de tranquilidad y descuido culpable que una opción más neutral como «tranquilas».
- source_word: קֹמְנָה
  english_pob_choice: rise up
  chosen_spanish: levántense
  alternatives_spanish:
  - pónganse de pie
  - alcense
  - despierten
  lexicon: HALOT
  rationale: Es un imperativo plural de קום. «Levántense» es natural en español y mantiene el tono urgente de la convocatoria profética.
- source_word: שְׁמַעְנָה
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oigan atentamente
  lexicon: HALOT
  rationale: El imperativo significa oír/escuchar. «Oigan» conserva la fuerza imperativa y funciona bien en paralelo con la segunda línea.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi sonido
  - lo que digo
  lexicon: HALOT
  rationale: קוֹל suele significar «voz» en contextos de discurso directo. «Mi voz» es la equivalencia natural y fiel en español.
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: Hijas
  alternatives_spanish:
  - mujeres
  - niñas
  lexicon: HALOT
  rationale: Literalmente es «hijas». En el vocativo profético puede funcionar como forma de dirigirse a un grupo de mujeres, y conservarlo preserva la imagen hebrea y el paralelismo.
- source_word: בֹּטְחוֹת
  english_pob_choice: confident
  chosen_spanish: confiadas
  alternatives_spanish:
  - seguras
  - tranquilas
  - confiadas en sí mismas
  lexicon: HALOT
  rationale: El participio describe a quienes se sienten seguras. «Confiadas» comunica bien esa seguridad subjetiva en español y evita la implicación de confianza piadosa que tendría «confiadas en Dios».
- source_word: הַאְזֵנָּה
  english_pob_choice: listen
  chosen_spanish: presten oído
  alternatives_spanish:
  - escuchen
  - atiendan
  - den oído
  lexicon: HALOT
  rationale: El verbo en hifil implica escuchar con atención. «Presten oído» es una expresión bíblica clara y digna que conserva esa intensidad atenta.
- source_word: אִמְרָתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi dicho
  - mi decir
  - mi dicho
  lexicon: HALOT
  rationale: El sustantivo se refiere a una expresión o palabra dicha. «Mi palabra» es la opción más natural y concisa en español, y corresponde bien al paralelo con «mi voz».
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de Isaías 32:9 y coincide con la decisión inglesa auditada de mantener el vocativo femenino, la repetición imperativa y la distinción entre seguridad aparente y llamado profético de reprensión. No se registraron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - 'Se conserva la estructura vocativa en dos miembros paralelos: «Mujeres...; ... Hijas...» para reflejar el hebreo.'
  - Se evita traducir «בֹּטְחוֹת» con un término piadoso como «creyentes», porque el contexto es de seguridad carnal o despreocupada, no de fe.
  - «Presten oído» y «oigan» se diferencian levemente para reflejar el paralelismo hebreo sin perder naturalidad en español.
