translation:
  language: es
  text: y Maaseías hijo de Baruc[a], hijo de Col-hóze, hijo de Jazaías, hijo de Adaías, hijo de Joyarib, hijo de Zacarías, hijo del shilonita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el shelonita». El gentilicio hebreo puede referirse a una asociación con Siló o con el clan de Selá/Shilón en la tradición genealógica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַעֲשֵׂיָה
  english_pob_choice: and Maaseiah
  chosen_spanish: y Maseías
  alternatives_spanish:
  - y Maasías
  - y Maaseías
  lexicon: HALOT
  rationale: Se conserva la conjunción inicial como 'y' porque el hebreo continúa la lista genealógica. El nombre propio se translitera; 'Maseías' refleja la forma breve y mantiene cercanía al hebreo sin introducir interpretación.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica repetida, 'hijo de' preserva de manera natural y fiel la estructura del hebreo. 'Descendiente de' sería más interpretativo.
- source_word: בָּרוּךְ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruch
  lexicon: HALOT
  rationale: Se translitera el nombre propio con ortografía española común; 'Baruc' es el equivalente natural en español bíblico.
- source_word: כָּל חֹזֶה
  english_pob_choice: Col-hozeh
  chosen_spanish: Col-hose
  alternatives_spanish:
  - Col-hozé
  - Kol-hoze
  lexicon: HALOT
  rationale: Se mantiene el tratamiento como nombre propio, no como frase descriptiva. La adaptación 'Col-hose' busca una lectura española fluida sin deshacer el compuesto nominal.
- source_word: חֲזָיָה
  english_pob_choice: Hazaiah
  chosen_spanish: Jazaías
  alternatives_spanish:
  - Hazaías
  - Hazayá
  lexicon: HALOT
  rationale: Nombre propio transliterado a una forma española inteligible. Se prefiere 'Jazaías' por adecuación fonética al español y continuidad con nombres bíblicos similares.
- source_word: עֲדָיָה
  english_pob_choice: Adaiah
  chosen_spanish: Adaías
  alternatives_spanish:
  - Adaya
  lexicon: HALOT
  rationale: Transliteración estándar al español del nombre propio.
- source_word: יוֹיָרִיב
  english_pob_choice: Joiarib
  chosen_spanish: Joyarib
  alternatives_spanish:
  - Joiarib
  - Jehoiarib
  lexicon: HALOT
  rationale: Se conserva la forma breve del nombre y se adapta la ortografía al español. 'Joyarib' comunica el valor sonoro del hebreo sin introducir una expansión teofórica no presente aquí.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zecarías
  - Zekarías
  lexicon: HALOT
  rationale: Nombre propio con forma española ya establecida en el uso bíblico.
- source_word: הַ/שִּׁלֹנִי
  english_pob_choice: the Shilonite
  chosen_spanish: el shilonita
  alternatives_spanish:
  - el shelonita
  - el de Siló
  - el descendiente de Silo
  lexicon: HALOT
  rationale: Se conserva el valor gentilicio con artículo. Se evita convertirlo en una glosa geográfica en el texto principal; la ambigüedad entre asociación con Shiloh/Siló y una posible línea clanica se deja para la nota.
theological_decisions:
- issue: 'Naturaleza del último gentilicio: asociación con Shiloh/Siló o con una tradición clánica similar'
  english_pob_reading: Or "the Shelonite." The Hebrew gentilic may refer to association with Shiloh or with the clan of Shelah/Shilon in genealogical tradition.
  chosen_spanish_reading: el shilonita
  alternative_spanish_readings:
  - el shelonita
  - el asociado con Siló
  rationale: Se mantiene en el texto principal la forma gentilicia sin resolver la ambigüedad. Así se preserva la tensión lexical documentada por el POB inglés y se evita imponer una identificación que el hebreo no fija con certeza.
  doctrine_reference: No aplica; decisión lexicográfica y genealógica, no doctrinal.
translation_notes:
  revision_awareness: 'El pasaje coincide con el apunte auditado inglés: no hubo revisiones aplicadas en la fuente inglesa y el estado de concordancia es alto. La decisión española sigue esa lectura estable, conservando la cadena genealógica y la ambigüedad del último gentilicio sin ampliarla.'
  spanish_consistency_notes:
  - Se usa 'hijo de' de manera uniforme para la cadena genealógica.
  - Los nombres propios se transliteran con ortografía española cuando es natural y reconocible.
  - Se conserva 'shilonita' como gentilicio, con nota alternativa para la variante 'shelonita'.
  - No se introduce 'SEÑOR' ni terminología teológica ajena al pasaje.
