translation:
  language: es
  text: Y la casa de José exploró Betel[a]; y el nombre de la ciudad antes era Luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo reconocimiento de Betel» o «espió Betel». El verbo hebreo se refiere, en este contexto, a explorar o reconocer la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּתִירוּ
  english_pob_choice: spied out
  chosen_spanish: reconoció
  alternatives_spanish:
  - exploró
  - reconoció el terreno
  - espió
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto de Josué/Jueces, indica una acción de reconocimiento o exploración previa. En español, 'reconoció' comunica esa idea de manera natural sin forzar un calco militar demasiado técnico; 'espió' sería más fuerte y puede sonar más sospechoso que el contexto exige.
- source_word: בֵית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - los descendientes de José
  - la casa de José
  lexicon: HALOT
  rationale: Se conserva la designación tribal/clánica con el equivalente directo y transparente en español. 'La casa de José' mantiene la forma bíblica sin precisar indebidamente el alcance social del grupo.
- source_word: בְּבֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Betel
  - en Betel
  lexicon: HALOT
  rationale: El topónimo se vierte en su forma habitual en español bíblico. Aunque el inglés POB lo integra como objeto del reconocimiento, en español es natural mantener el nombre propio sin añadir preposición explícita.
- source_word: וְשֵׁם הָעִיר
  english_pob_choice: the name of the city
  chosen_spanish: el nombre de la ciudad
  alternatives_spanish:
  - el nombre de la ciudad
  - su nombre
  lexicon: HALOT
  rationale: Se preserva la estructura nominal hebrea de modo claro y fiel, evitando una paráfrasis más libre.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antiguamente
  - antes
  lexicon: HALOT
  rationale: El adverbio marca un estado previo. 'Antes' es breve y natural en español; 'anteriormente' sería correcto pero más pesado, y 'antiguamente' sugeriría un matiz histórico más amplio que el texto no requiere.
- source_word: לוּז
  english_pob_choice: Luz
  chosen_spanish: Luz
  alternatives_spanish:
  - Luz
  lexicon: HALOT
  rationale: Se translitera el nombre propio conforme al uso bíblico estándar en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alta concordancia; no se observan revisiones aplicadas ni cambios de sentido que requieran notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico, con español moderno pero digno.
  - Se evita la traducción mecánica del inglés cuando una formulación española más natural preserva mejor el sentido del hebreo.
  - Se conserva la tensión léxica de וַיָּתִירוּ mediante una nota alternativa, ya que puede rendirse como reconocimiento/exploración/reconocimiento previo según el contexto.
