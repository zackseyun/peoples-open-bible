translation:
  language: es
  text: Y descendieron a Egipto, porque una hambruna cubrió la faz de la tierra de Canaán, y allí habitaron como forasteros hasta que fueron sustentados; y allí llegaron a ser una multitud muy grande, y no había número de su descendencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su linaje» o «de su pueblo»; el griego γένος puede denotar descendencia, linaje, grupo de parentesco o pueblo descendiente de un antepasado común.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron a
  lexicon: LSJ
  rationale: ‘Descender’ mantiene el movimiento hacia Egipto con el valor bíblico tradicional de ‘ir abajo’, y conserva mejor la imagen direccional que un simple ‘ir’.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - en Egipto
  lexicon: LSJ
  rationale: La preposición en español suena natural como destino de movimiento; no se fuerza una construcción menos idiomática.
- source_word: ἐκάλυψεν
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - abrumó
  - vino sobre
  lexicon: LSJ
  rationale: ‘Cubrió’ preserva la imagen directa del texto griego y funciona bien con el sustantivo siguiente.
- source_word: τὸ πρόσωπον τῆς γῆς
  english_pob_choice: the face of the land
  chosen_spanish: la faz de la tierra
  alternatives_spanish:
  - la superficie de la tierra
  - la faz de la tierra de Canaán
  lexicon: LSJ
  rationale: ‘Faz’ reproduce el giro semítico/helénico con solemnidad y transparencia; se mantiene el idiomatismo sin explicarlo en exceso.
- source_word: λιμός
  english_pob_choice: famine
  chosen_spanish: un hambre
  alternatives_spanish:
  - una hambruna
  - una escasez
  lexicon: LSJ
  rationale: El griego nombra la calamidad de hambre con fuerza narrativa; ‘hambre’ conserva el término básico y, con el artículo indefinido, expresa el evento de forma comprensible y sobria.
- source_word: παρῴκησαν
  english_pob_choice: sojourned there
  chosen_spanish: habitaron como forasteros
  alternatives_spanish:
  - peregrinaron allí
  - moraron allí
  lexicon: LSJ
  rationale: Se preserva la noción de residencia temporal y de condición de extraños, que en español se vuelve explícita para no perder la fuerza histórica del verbo.
- source_word: μέχρις οὗ διετράφησαν
  english_pob_choice: until they were provided for
  chosen_spanish: hasta que fueron proveídos
  alternatives_spanish:
  - hasta que fueron sustentados
  - hasta que tuvieron provisión
  lexicon: LSJ
  rationale: La pasiva griega indica ser mantenidos/provistos; ‘proveídos’ comunica bien esa idea en español sin añadir más contenido del que el texto garantiza.
- source_word: ἐγένοντο ἐκεῖ εἰς πλῆθος πολύ
  english_pob_choice: there they became a very great multitude
  chosen_spanish: allí llegaron a ser una multitud muy grande
  alternatives_spanish:
  - allí se hicieron una multitud muy grande
  - allí se volvieron una multitud muy grande
  lexicon: LSJ
  rationale: ‘Llegaron a ser’ refleja el valor resultativo de ἐγένοντο y mantiene la expansión numérica del texto con un español claro.
- source_word: οὐκ ἦν ἀριθμὸς
  english_pob_choice: there was no number
  chosen_spanish: no había número
  alternatives_spanish:
  - no se podían contar
  - eran incontables
  lexicon: LSJ
  rationale: Se conserva la formulación idiomática de innumerabilidad sin convertirla en una paráfrasis interpretativa.
- source_word: τοῦ γένους αὐτῶν
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - su progenie
  - su raza
  lexicon: LSJ
  rationale: ‘Descendencia’ expresa bien γένος en este contexto genealógico y evita el anacronismo de ‘raza’; mantiene el énfasis en la línea familiar y el crecimiento del pueblo.
theological_decisions:
- issue: γένος como identidad genealógica y colectiva
  english_pob_reading: their offspring
  chosen_spanish_reading: su descendencia
  alternative_spanish_readings:
  - su linaje
  - su gente
  - su raza
  rationale: El versículo habla de multiplicación de un grupo descendiente de un antepasado común. ‘Descendencia’ mantiene la referencia genealógica sin cargar el texto con categorías modernas o raciales.
  doctrine_reference: Translation philosophy §1, §6
- issue: Condition of residence in Egypt
  english_pob_reading: sojourned there
  chosen_spanish_reading: habitaron como forasteros
  alternative_spanish_readings:
  - peregrinaron allí
  - residieron allí como extranjeros
  rationale: El verbo griego no describe mera permanencia geográfica, sino una residencia temporal en condición de extraños. La formulación elegida conserva ese matiz histórico-teológico.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del audit trail, que prefirió un español más natural para la idea de provisión y una designación genealógica más directa para γένος. La redacción española sigue esa dirección, pero conserva el matiz de residencia temporal con una expresión explícita de extranjería, porque el verbo griego παρῴκησαν lo sugiere con fuerza.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se prefirió ‘descendencia’ para γένος, evitando ‘raza’ por su carga moderna.
  - Se conservó el registro bíblico de ‘faz de la tierra’ por su fidelidad al giro semítico del original.
  - La pasiva ‘fueron proveídos’ respeta el sentido del griego sin añadir un agente no expresado.
