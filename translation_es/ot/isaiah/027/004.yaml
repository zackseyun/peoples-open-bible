translation:
  language: es
  text: No tengo ira. ¿Quién me pondría espinos y zarzas en batalla?[a] Yo avanzaría contra ellos[b]; los quemaría todos juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «¿Quién me dará espinos y zarzas en batalla?», un modismo que expresa un desafío o el deseo de que se le pongan delante adversarios hostiles.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa sufijos singulares femeninos en «contra ella» y «la quemaría», refiriéndose colectivamente a «espinos y zarzas». El español expresa el sentido con plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furia
  - enojo
  - cólera
  lexicon: HALOT
  rationale: El hebreo denota ira intensa o ardiente. En español, «ira» conserva la fuerza semántica sin sonar excesivamente idiomático. Preferí «ira» sobre «enojo» por la intensidad, y sobre «furia» por ser menos sobrio en este contexto.
- source_word: אֵין לִי
  english_pob_choice: I have no
  chosen_spanish: No tengo
  alternatives_spanish:
  - No hay para mí
  - No me pertenece
  lexicon: HALOT
  rationale: La construcción existencial con sufijo posesivo se vuelve naturalmente poseesiva en español. «No tengo» es claro y fiel al sentido idiomático del hebreo.
- source_word: מִי יִתְּנֵנִי
  english_pob_choice: Who would set ... against me
  chosen_spanish: ¿Quién me pondría ... en batalla?
  alternatives_spanish:
  - ¿Quién me daría ...?
  - ¿Quién me daría espinos y zarzas?
  - ¿Quién los pondría contra mí?
  lexicon: HALOT
  rationale: La expresión es un desafío/aspiración idiomática. «Pondría ... en batalla» conserva el valor de poner algo frente a alguien en contexto hostil, sin perder naturalidad en español. Mantengo la pregunta retórica abierta como en el hebreo.
- source_word: שָׁמִיר שַׁיִת
  english_pob_choice: briers and thorns
  chosen_spanish: espinos y zarzas
  alternatives_spanish:
  - zarzas y espinos
  - cardos y espinos
  - matorrales espinosos
  lexicon: HALOT
  rationale: El par hebreo designa crecimiento espinoso hostil. «Espinos y zarzas» transmite bien la imagen botánica y el valor metafórico de obstáculo o combustible para el fuego.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en guerra
  - para la batalla
  lexicon: HALOT
  rationale: «En batalla» reproduce con concisión el marco bélico del texto. Es idiomático y conserva el contraste entre el hablante y los elementos hostiles.
- source_word: אֶפְשְׂעָה בָהּ
  english_pob_choice: I would march against them
  chosen_spanish: Yo avanzaría contra ellos
  alternatives_spanish:
  - Yo marcharía contra ellos
  - Yo pisaría sobre ellos
  - Yo los atravesaría
  lexicon: HALOT
  rationale: El verbo puede implicar dar pasos/avanzar con determinación en un contexto militar. «Avanzaría contra ellos» comunica el movimiento ofensivo sin forzar un calco. El plural español sigue el sentido colectivo del antecedente.
- source_word: אֲצִיתֶנָּה
  english_pob_choice: I would burn them up
  chosen_spanish: los quemaría
  alternatives_spanish:
  - los prendería fuego
  - los consumiría con fuego
  - los quemaría por completo
  lexicon: HALOT
  rationale: El causativo expresa prender fuego o incendiar. «Los quemaría» es suficientemente directo; el contexto y el adverbio siguiente intensifican la destrucción sin necesidad de añadir una paráfrasis más fuerte.
- source_word: יָּחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - por completo
  - todos a la vez
  lexicon: HALOT
  rationale: «Juntos» preserva la idea de destrucción conjunta/completa de manera breve y natural en español. En este contexto refuerza la totalidad del acto.
theological_decisions:
- issue: La ausencia de ira divina hacia el viñedo
  english_pob_reading: '''I have no wrath'' is taken as YHWH''s present stance toward his protected vineyard, not as a denial that God ever exercises wrath in any context.'
  chosen_spanish_reading: «No tengo ira» se entiende como la disposición presente de Yahvé hacia su viña protegida, no como una negación absoluta de toda ira divina.
  alternative_spanish_readings:
  - «No estoy enojado» como declaración general y absoluta
  - «No hay ira en mí» como formulación más impersonal
  rationale: El contexto inmediato de Isaías 27 presenta a Yahvé guardando su viña. Mantener la frase sin resolverla en exceso preserva la tensión teológica local, evitando convertirla en una afirmación universal sobre el carácter divino.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
