translation:
  text: '2. “For evil desire is wild and is hard to tame; for it is fearsome, and by its savagery it greatly
    consumes people—especially if a slave of God falls into it and is not sensible, he is grievously consumed
    by it. It consumes such people: those who do not have the garment of good desire, but are entangled
    with this age. These, therefore, it hands over to death.”'
