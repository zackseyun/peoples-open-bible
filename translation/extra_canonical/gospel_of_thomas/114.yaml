translation:
  text: 'Simon Peter said to them, “Let Mary go out from among us, for the female
    is not worthy of life.” Jesus said, “Look: I myself will lead her, so that I will
    make her male, so that she too may become a living spirit like you males. For
    every female who makes herself male will enter the kingdom of the heavens.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The choice ‘female’ (ⲥϩⲓⲙⲉ) over ‘woman’ keeps the parallel with ‘male’
      (ϩⲟⲟⲩⲧ) tight and reflects Thomas’s stark male/female polarity.
    reason: lexical_alternative
  - marker: b
    text: The object pronoun ‘her’ appears as ⲙ̄ⲙⲟⲥ in the manuscript lineation; Dilley’s
      normalization presents the equivalent ⲛⲛⲧⲟⲥ. Both are 3fs direct objects.
    reason: textual_variant
  - marker: c
    text: Spelling varies between ⲛϩⲟⲟⲧ and ⲛϩⲟⲟⲩⲧ for ‘male’; this is an orthographic/dialectal
      fluctuation without semantic difference.
    reason: dialect_note
  - marker: d
    text: ‘Heavens’ renders ⲡⲡⲉ; some translations use ‘heaven’. The Coptic expression
      functions as the locus of divine reign rather than a strictly spatial plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲁⲣⲉ- … ⲉⲓ ⲉⲃⲟⲗ
  chosen: let … go out
  alternatives:
  - have … leave
  - send … away
  lexicon: Layton (grammar), imperative/jussive ⲙⲁⲣⲉ-; Crum s.v. ⲉⲓ ⲉⲃⲟⲗ
  rationale: ⲙⲁⲣⲉ- marks a jussive/volitive; ⲉⲓ ⲉⲃⲟⲗ is the standard verb for ‘go
    out/leave’.
- source_word: ϩⲛⲁⲛⲟⲛ
  chosen: from among us
  alternatives:
  - from our midst
  - among us
  lexicon: Crum s.v. ϩⲛ, ⲁⲛⲟⲛ
  rationale: Preposition ϩⲛ ‘in/among’ + 1pl independent pronoun ‘us’ gives the idiom
    ‘from among us’ in this context with ⲉⲃⲟⲗ.
- source_word: ⲥϩⲓⲙⲉ
  chosen: female
  alternatives:
  - woman
  lexicon: Crum s.v. ⲥϩⲓⲙⲉ
  rationale: In a male/female polarity with ⲛϩⲟⲟⲩⲧ, ‘female’ keeps the biological/sexed
    contrast sharper than ‘woman’ and preserves Thomas’s stark diction.
- source_word: ⲙⲡϣⲁ ⲁⲛ
  chosen: is not worthy
  alternatives:
  - is not fit
  - is not deserving
  lexicon: Crum s.v. ϣⲁ ‘to be worthy’
  rationale: Standard negated worthiness construction; ‘worthy’ is the most literal
    choice.
- source_word: ⲡⲱⲛϩ
  chosen: life
  alternatives:
  - life (existence)
  - life (salvation)
  lexicon: Crum s.v. ⲱⲛϩ
  rationale: Lexically ‘life’; no doctrinal narrowing is imposed.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: Layton (grammar) deictic particle
  rationale: An abrupt deictic that signals attention; ‘Look’ preserves the sharpness.
- source_word: ⲥⲱⲕ (with object pronoun)
  chosen: lead
  alternatives:
  - guide
  - draw
  lexicon: Crum s.v. ⲥⲱⲕ ‘to lead, draw’
  rationale: The verb means lead/bring; ‘lead’ suits the context of guidance/transition.
- source_word: ⲙ̄ⲙⲟⲥ / ⲛⲛⲧⲟⲥ (3fs object)
  chosen: her
  alternatives: null
  lexicon: Layton (grammar) pronominal objects
  rationale: Both orthographies reflect the 3fs direct object ‘her’; translated straightforwardly.
- source_word: ⲉⲓⲣⲉ … ⲛϩⲟⲟⲩⲧ
  chosen: make … male
  alternatives:
  - make … a male
  - turn … into a male
  lexicon: Crum s.v. ⲉⲓⲣⲉ ‘do/make’; Crum s.v. ϩⲟⲟⲩⲧ ‘male’
  rationale: Predicate-noun construction without article; ‘make her male’ preserves
    Thomas’s deliberate strangeness.
- source_word: ⲡⲛⲉⲩⲙⲁ
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: Crum s.v. ⲡⲛⲉⲩⲙⲁ (from Gk. πνεῦμα)
  rationale: Common noun here, not a title; lowercase ‘spirit’ fits the syntax.
- source_word: ⲱⲛϩ (participle)
  chosen: living
  alternatives:
  - alive
  lexicon: Crum s.v. ⲱⲛϩ
  rationale: As an attributive to ‘spirit,’ ‘living’ keeps the compactness.
- source_word: ⲉⲓⲛⲉ
  chosen: like
  alternatives:
  - resembling
  lexicon: Crum s.v. ⲉⲓⲛⲉ ‘to be like’
  rationale: Short, idiomatic equivalence; the following ‘you males’ clarifies the
    comparison.
- source_word: ⲛⲛⲧⲱⲧⲛ
  chosen: you (plural)
  alternatives:
  - you yourselves
  lexicon: Layton (grammar) independent pronouns
  rationale: Plural ‘you’ is required; no reflexive emphasis is marked in English.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - kingship
  - reign
  lexicon: Crum s.v. ⲙⲛⲧⲣⲣⲟ
  rationale: Conventional rendering of the nominalized concept; ‘kingdom’ is concise.
- source_word: ⲡⲡⲉ
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: Crum s.v. ⲡⲉ/ⲡⲡⲉ
  rationale: Thomas often uses this as the locus of divine rule; ‘heavens’ preserves
    the traditional plural coloring without importing Synoptic phrasing.
textual_note: 'Dialect and orthography: The manuscript shows Sahidic with Lycopolitan
  coloring. The masculine term appears as ⲛϩⲟⲟⲧ in Dilley’s normalization (cf. line
  transcription ⲛ̄ϩⲟⲟⲩⲧ̂), an expected orthographic fluctuation; it is the usual ‘male’
  (Crum). Line 21 in the printed text reads ϯⲛⲁⲥⲱⲕ ⲙ̄ⲙⲟⲥ (‘I will lead her’), while
  the normalized lemma represents the same object as ⲛⲛⲧⲟⲥ; both reflect a 3fs direct
  object ‘her’. The double ⲁⲛⲟⲕ (‘I, I’) is emphatic. ⲉⲓⲥϩⲏⲏⲧⲉ functions as a deictic
  exclamation (‘Look’). No lacunae or conjectural restorations are noted by Dilley
  in this saying.'
