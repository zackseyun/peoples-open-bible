translation:
  language: es
  text: Si permanece firme, dejará un nombre más que mil[a]; y si llega a descansar[b], sigue produciéndolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente algo como 'dejará un nombre que mil'. El sentido probable es que su nombre supera al de mil otros.
    reason: lexical_alternative
  - marker: b
    text: '''Llega a descansar'' puede también insinuar la muerte, aunque el verbo griego permite el sentido más amplio de reposo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν ἐμμένῃ
  english_pob_choice: If he remains steadfast
  chosen_spanish: Si permanece firme
  alternatives_spanish:
  - Si persiste
  - Si permanece
  - Si continúa firme
  lexicon: LSJ
  rationale: ἐμμένω expresa permanecer, persistir o mantenerse en una postura. En español, 'permanece firme' conserva el matiz durativo y elogioso de la frase en contexto sapiencial, sin volverla mecánica.
- source_word: ὄνομα καταλείψει
  english_pob_choice: he will leave behind a name
  chosen_spanish: dejará un nombre
  alternatives_spanish:
  - dejará tras de sí un nombre
  - dejará fama
  - dejará renombre
  lexicon: LSJ
  rationale: 'La expresión griega es literal: ''dejará un nombre''. Mantener ''nombre'' preserva el giro bíblico y su posible sentido de memoria o reputación duradera.'
- source_word: ἢ χίλιοι
  english_pob_choice: beyond a thousand
  chosen_spanish: más allá de mil
  alternatives_spanish:
  - por encima de mil
  - más que mil
  - más allá de mil hombres
  lexicon: LSJ
  rationale: La comparación griega es breve y algo difícil. 'Más allá de mil' sigue de cerca la decisión inglesa revisada 'beyond a thousand' y conserva la tensión comparativa sin explicitar de más.
- source_word: ἐὰν ἀναπαύσηται
  english_pob_choice: if he comes to rest
  chosen_spanish: si llega a descansar
  alternatives_spanish:
  - si descansa
  - si reposa
  - si muere
  lexicon: LSJ
  rationale: ἀναπαύομαι puede significar descansar o reposar, y en sabiduría puede insinuar la muerte sin decirla explícitamente. 'Llega a descansar' preserva esa ambigüedad.
- source_word: ἐμποιεῖ αὐτά
  english_pob_choice: he still accomplishes them
  chosen_spanish: todavía los realiza
  alternatives_spanish:
  - todavía los produce
  - todavía los efectúa
  - todavía obra estas cosas
  lexicon: LSJ
  rationale: ἐμποιέω puede significar producir, efectuar o realizar. 'Realiza' comunica continuidad de efecto en un español natural, y 'todavía' refleja el valor de persistencia del contexto.
theological_decisions:
- issue: Posible insinuación de muerte en ἀναπαύσηται
  english_pob_reading: Render as 'comes to rest' rather than explicitly 'dies'
  chosen_spanish_reading: Traducir como 'llega a descansar' en vez de 'muere'
  alternative_spanish_readings:
  - si muere
  - si descansa
  rationale: El griego no usa el verbo 'morir', sino descansar/reposar. La traducción conserva la ambigüedad entre reposo literal y posible alusión a la muerte, acorde con la pauta de no resolver lo que el texto no explicita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Valor comparativo de ἢ χίλιοι
  english_pob_reading: '''beyond a thousand'' to reflect the awkward comparative idiom'
  chosen_spanish_reading: '''más allá de mil'' para reflejar el comparativo abierto'
  alternative_spanish_readings:
  - más de mil
  - por encima de mil
  rationale: El texto griego es elíptico y no obliga a fijar una paráfrasis fuerte. 'Más allá de mil' mantiene el carácter comparativo y la dificultad del original sin borrar la tensión léxica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó ἢ χίλιοι de 'more than a thousand' a 'beyond a thousand'. Por eso se eligió 'más allá de mil' y se evitó una paráfrasis explicativa que cerrara la comparación. También se conservó la ambigüedad de ἀναπαύσηται con una formulación de reposo, no de muerte explícita.
  spanish_consistency_notes:
  - Se mantuvo 'espíritu'/'Espíritu' sin necesidad de uso en este versículo, y no aparece terminología doctrinal adicional.
  - Se preservó la imagen de 'nombre' en lugar de sustituirla por 'fama' o 'renombre', para respetar el giro bíblico del original.
  - El verso quedó en un registro bíblico actual, claro y no arcaizante, coherente con el estilo del proyecto.
