review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo y del POB inglés: envío repetido de los profetas, llamado a volverse del mal camino, mejora de las obras, rechazo de otros dioses y reproche final por no escuchar. Sin embargo, hay dos desalineaciones relevantes: (1) וּשְׁבוּ אֶל הָאֲדָמָה se ha vertido como «Vuelvan a la tierra», pero aquí el verbo es יָשַׁב ‘habitar/morar’, no שׁוּב; por tanto debe expresarse como habitar/permanecer en la tierra. (2) La nota [a] del español no preserva la alternativa documentada en el POB inglés para שֻׁבוּ נָא, sino que introduce una alternativa distinta sobre «profetas/mensajeros proféticos», sin apoyo del expediente.'
  spanish_quality_summary: El español es claro y bastante natural. «Madrugando y enviándolos» funciona, aunque suena algo brusco; puede mantenerse por cercanía idiomática al hebreo. «No inclinaron su oído» es comprensible y digno. El principal problema de legibilidad/fidelidad es «Vuelvan a la tierra», que confunde el mandato con un retorno físico más que con habitar en la tierra dada. También conviene reordenar y corregir las notas para que correspondan a los anclajes reales y a las decisiones léxicas auditadas.
  glossary_alignment: 'No hay conflicto con terminología principal del proyecto. «Siervos» para עֲבָדַי está justificado en este contexto profético. «Dioses ajenos» es aceptable para אֱלֹהִים אֲחֵרִים. No aparece el nombre divino ni otros términos sensibles del glosario. La nota española debe alinearse con las alternativas del POB: שֻׁבוּ נָא (‘vuélvanse/ regresen/ arrepiéntanse’), הַשְׁכֵּים וְשָׁלֹחַ (idioma de persistencia), וְהֵיטִיבוּ מַעַלְלֵיכֶם (‘enmenden sus obras’), y el distributivo «cada uno».'
  issues:
