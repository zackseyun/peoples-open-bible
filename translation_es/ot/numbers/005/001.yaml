translation:
  language: es
  text: 'Yahvé[a] habló a Moisés, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente se vierte «el SEÑOR». Traducciones alternativas incluyen «Yahvé» y «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula narrativa de introducción del discurso divino, el hebreo דבר marca el inicio de una intervención. En español, «habló» conserva bien ese registro formal y natural; «dijo» también es posible, pero suena menos marcado como introducción de habla solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del tetragrámaton con la forma establecida para este proyecto, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la decisión auditada del POB de no enmascarar el nombre con «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. «A» es la equivalencia natural y fiel en español moderno.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio transliterado según la convención habitual en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: En la fórmula hebrea introductoria, לֵאמֹר funciona como marcador de discurso citado. «Diciendo» reproduce la función sintáctica y el registro bíblico sin volverlo artificial; «para decir» sería más explicativo que el hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB distingue el nombre personal de Dios del título «Señor». En español, «Yahvé» preserva esa decisión y mantiene visible el tetragrámaton sin neutralizarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el paquete fuente; el pasaje permanece en alta concordancia con el control auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, coherente con las decisiones del proyecto.
  - 'Se conserva la estructura formulaica del hebreo con un español fluido: sujeto + verbo de habla + destinatario + participio de citación.'
  - «Diciendo» queda unido al discurso introductorio para reflejar el valor marcativo de לֵאמֹר.
