translation:
  language: es
  text: Has exaltado la mano derecha de sus adversarios[a]; has hecho que todos sus enemigos se alegren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has levantado la mano derecha de sus adversarios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרִימוֹתָ
  english_pob_choice: have exalted
  chosen_spanish: has exaltado
  alternatives_spanish:
  - has levantado
  - has alzado
  lexicon: HALOT
  rationale: El hebreo en hifil expresa causar elevación o levantamiento. En español, «has exaltado» conserva la idea de elevar con fuerza y funciona bien con «la mano derecha» como objeto idiomático, sin volver la frase mecánica.
- source_word: יְמִין
  english_pob_choice: the right hand
  chosen_spanish: la mano derecha
  alternatives_spanish:
  - la diestra
  - el lado derecho
  lexicon: HALOT
  rationale: El sustantivo normalmente designa la mano derecha y puede connotar fuerza o poder. «La mano derecha» es claro y fiel; «diestra» sería posible, pero menos neutral para lectura pública moderna.
- source_word: צָרָיו
  english_pob_choice: his foes
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus enemigos hostiles
  lexicon: HALOT
  rationale: El término señala opositores hostiles. «Enemigos» es natural en español y permite mantener la diferencia con el segundo miembro, donde el hebreo usa otro vocablo cercano.
- source_word: הִשְׂמַחְתָּ
  english_pob_choice: have made ... rejoice
  chosen_spanish: has hecho que ... se alegren
  alternatives_spanish:
  - has alegrado a ...
  - has causado que ... se alegren
  lexicon: HALOT
  rationale: El hifil es causativo. «Has hecho que ... se alegren» expresa con claridad esa causalidad y evita una construcción demasiado literal o antinatural.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todos los
  lexicon: HALOT
  rationale: El valor distributivo se refleja bien con «todos», que encaja de forma natural con el plural siguiente.
- source_word: אוֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - los que lo odian
  lexicon: HALOT
  rationale: El sustantivo es el término común para enemigos. «Adversarios» permite conservar la variación respecto de la primera cláusula y suena digno en español bíblico; sin embargo, «enemigos» también sería plenamente válido.
theological_decisions:
- issue: Referencia del sufijo de tercera persona masculina singular
  english_pob_reading: Rendered as 'his,' referring to the Davidic king/anointed figure in the psalm's immediate context.
  chosen_spanish_reading: «sus» se mantiene sin explicitar el referente, dejando que el contexto del salmo determine a quién se refiere.
  alternative_spanish_readings:
  - «de él»
  - «del rey»
  rationale: El hebreo conserva el sufijo masculino singular en ambas cláusulas. En español, el posesivo «sus» preserva la referencia sin forzar una aclaración que podría cerrar la tensión del lamento en el Salmo 89. Así se respeta la ambigüedad contextual donde corresponde.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; la redacción mantiene la lectura auditada y la variante léxica principal del inglés POB, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando el hebreo nombra explícitamente el nombre divino; en este versículo no aparece.
  - 'Se conserva la distinción entre dos vocablos hebreos cercanos: ''enemigos/adversarios'' en ambas cláusulas, evitando aplanar el paralelismo.'
  - La causalidad del hifil se expresa con verbo perifrástico («has hecho que») para claridad y fidelidad.
  - La nota al pie ofrece una alternativa léxica real sin imponerla en el texto principal.
