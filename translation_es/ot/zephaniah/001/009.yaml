translation:
  language: es
  text: Y aquel día castigaré[a] a todos los que saltan[b] por encima del umbral, los que llenan la casa de sus señores[c] con violencia y engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «castigaré con juicio»; el verbo hebreo puede llevar el matiz de «tomar cuenta de» o «visitar» en sentido judicial.
    reason: alternative_reading
  - marker: b
    text: O «saltan el umbral» o «pasan de un salto el umbral». La frase puede aludir a una práctica conocida o supersticiosa, quizá relacionada con la prohibición del umbral en 1 Samuel 5:5; otros la entienden de modo más figurado como una imagen de intrusión violenta.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «la casa de sus señores»; algunas traducciones leen «la casa de su señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - pediré cuentas
  - visitaré con juicio
  - tomaré cuenta de
  lexicon: HALOT
  rationale: En contexto profético de juicio, פקד expresa intervención judicial contra culpables. «Castigaré» comunica esa fuerza de manera natural en español y mantiene el valor punitivo que el inglés POB ya estableció.
- source_word: הַדּוֹלֵג עַל הַמִּפְתָּן
  english_pob_choice: who leap over the threshold
  chosen_spanish: los que saltan sobre el umbral
  alternatives_spanish:
  - los que brincan sobre el umbral
  - los que pasan de un salto el umbral
  - los que esquivan el umbral
  lexicon: HALOT
  rationale: דָּלַג significa saltar o brincar. «Saltan sobre el umbral» conserva la imagen concreta y ambigua del hebreo sin resolverla interpretativamente, como hace el POB en inglés.
- source_word: הַמִּפְתָּן
  english_pob_choice: the threshold
  chosen_spanish: el umbral
  alternatives_spanish:
  - la entrada
  - el dintel
  - el quicio
  lexicon: HALOT
  rationale: «Umbral» es el equivalente preciso y natural para מִפְתָּן en español bíblico contemporáneo. Conserva la referencia física al paso de entrada sin introducir una interpretación adicional.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal se expresa bien con «aquel día», que suena idiomático y solemne en español y conserva el tono escatológico/judicial.
- source_word: הַמְמַלְאִים
  english_pob_choice: who fill
  chosen_spanish: los que llenan
  alternatives_spanish:
  - los que están llenando
  - los que colman
  lexicon: HALOT
  rationale: El participio sustantivado describe a personas caracterizadas por una acción continua o habitual. «Los que llenan» refleja esa función de modo natural y directo.
- source_word: בֵּית אֲדֹנֵיהֶם
  english_pob_choice: their masters’ house
  chosen_spanish: la casa de sus señores
  alternatives_spanish:
  - la casa de sus amos
  - la casa de sus dueños
  - la casa de su señor
  lexicon: HALOT
  rationale: El hebreo tiene plural posesivo, por lo que conviene mantener la pluralidad en español. «Señores» preserva la referencia social de superioridad sin forzar un referente singular o divino.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia violenta
  - opresión
  - daño
  lexicon: HALOT
  rationale: «Violencia» es el equivalente directo y más habitual para חָמָס, y conserva el peso moral del término en paralelo con «engaño».
- source_word: וּמִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - fraude
  - treta
  - falsedad
  lexicon: HALOT
  rationale: מִרְמָה designa engaño, fraude o traición. «Engaño» funciona bien en español junto con «violencia» y mantiene la categoría moral sin sobreespecificar el mecanismo.
theological_decisions:
- issue: Interpretación de «salta sobre el umbral»
  english_pob_reading: Retain the literal wording as a concrete practice rather than resolving it into a specific superstition or cultic custom in the main text.
  chosen_spanish_reading: Conservar el giro literal «saltan sobre el umbral» sin aclararlo en el cuerpo principal.
  alternative_spanish_readings:
  - «evitan pisar el umbral»
  - «saltan el umbral por superstición»
  - «entran violentamente»
  rationale: El hebreo es vívido pero culturalmente opaco; el POB en inglés preserva esa ambigüedad. La traducción principal debe dejar abierta la posibilidad de una práctica ritual, supersticiosa o figurativa sin imponer una explicación.
  doctrine_reference: Translation philosophy §3
- issue: Referente de «la casa de sus señores»
  english_pob_reading: Translate the plural form straightforwardly as 'their masters’ house' without collapsing it to a singular title.
  chosen_spanish_reading: Traducir de manera transparente el plural posesivo como «la casa de sus señores».
  alternative_spanish_readings:
  - «la casa de su señor»
  - «la casa de sus amos»
  - «la casa de su dueño»
  rationale: La morfología hebrea es plural, y el contexto no identifica un referente singular. Mantener el plural evita suavizar la forma del texto o sugerir indebidamente una referencia específica.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión final del POB en inglés cambió 'everyone who leaps' a 'all who leap' para un registro más formal y cercano al hebreo, y simplificó la apposición. En español se siguió esa línea con «a todos los que saltan», manteniendo el participio sustantivado y el flujo directo del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto sólo cuando el texto lo exija; este versículo no contiene el nombre divino explícito, por lo que no aparece.
  - Se preservó la ambigüedad de «saltan sobre el umbral» en lugar de interpretarla en el texto principal.
  - Se conservó el plural de posesión en «sus señores», en coherencia con la morfología hebrea.
  - El paralelismo «violencia y engaño» reproduce la binariedad moral del hebreo חָמָס וּמִרְמָה sin intensificar ni suavizar el contraste.
