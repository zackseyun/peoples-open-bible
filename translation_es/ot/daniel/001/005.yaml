  rationale: Se corrige la colocación de las notas para que coincidan con las frases que explican, se reemplaza el giro poco natural «al final de ellos» por «al final de ese tiempo» conservando la literalidad en nota, y se mantiene «estar delante del rey» con su nota cultural porque refleja bien el modismo cortesano del original.
