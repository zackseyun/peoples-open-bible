- from: Abominación es para los reyes hacer maldad[a], porque por la justicia se establece un trono.
  to: Es una abominación para los reyes hacer maldad, porque por la rectitud[a] se establece un trono.
  rationale: 'Se ajusta la sintaxis para que el español sea natural y digno, se reubica correctamente la nota al término pertinente del segundo hemistiquio, y se alinea la decisión principal sobre צדקה con el audit trail inglés: lectura principal equivalente a ''righteousness'' (''rectitud'') y alternativa ''justice'' (''justicia''). No hay incertidumbre doctrinal ni textual que requiera adjudicación adicional.'
