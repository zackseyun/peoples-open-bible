translation:
  language: es
  text: Porque de Yahvé[a] es el reino[b], y él gobierna sobre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יהוה (YHWH), el nombre propio de Dios; tradicionalmente se vierte «el SEÑOR».
    reason: alternative_reading
  - marker: b
    text: O «la realeza» o «el reinado». El sustantivo hebreo puede denotar «reino», «realeza» o «reinado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introducción causal o explicativa del motivo de la alabanza anterior. En español, «Porque» conserva con naturalidad el valor de fundamento.
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh
  chosen_spanish: es de Yahvé
  alternatives_spanish:
  - pertenece a Yahvé
  - le pertenece a Yahvé
  lexicon: HALOT
  rationale: La preposición ל indica pertenencia o relación posesiva. Se conserva el nombre divino «Yahvé» según el criterio del proyecto, sin sustituirlo por un título velado.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la soberanía
  lexicon: HALOT
  rationale: מְלוּכָה puede abarcar reino, realeza o reinado. «El reino» es la opción más clara y fiel en español, manteniendo la afirmación de dominio real universal sin forzar una abstracción excesiva.
- source_word: וּמֹשֵׁל
  english_pob_choice: and he rules
  chosen_spanish: y él gobierna
  alternatives_spanish:
  - y reina
  - y domina
  - y ejerce dominio
  lexicon: HALOT
  rationale: El participio qal de משל expresa acción habitual o continua. «Gobierna» comunica bien ese sentido y evita una construcción demasiado literal o arcaica.
- source_word: בַּגּוֹיִם
  english_pob_choice: over the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - sobre las naciones
  - entre los pueblos
  - sobre los pueblos
  lexicon: HALOT
  rationale: Con משל, ב puede marcar ámbito o esfera de ejercicio del dominio. «Entre las naciones» conserva el hebraísmo de ubicación/esfera sin perder inteligibilidad, y evita imponer de entrada una preposición de dominación que el hebreo no exige de forma única.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh / traditionally 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se mantiene el nombre propio en español como «Yahvé», evitando el enmascaramiento con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de מְלוּכָה
  english_pob_reading: the kingdom / kingship / reign
  chosen_spanish_reading: el reino
  alternative_spanish_readings:
  - la realeza
  - el reinado
  - la soberanía
  rationale: La palabra puede expresar reino, reinado o realeza. «El reino» conserva la fuerza teológica de dominio real sin introducir un matiz más abstracto que el del hebreo poético.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El contexto inglés mantiene la misma estructura básica del hebreo y no introduce cambios textuales. La principal decisión relevante para el español es el tratamiento de יהוה como «Yahvé», coherente con la política del proyecto, y la elección de «entre las naciones» para respetar la flexibilidad sintáctica de ב con משל. No se detectan variantes textuales ni revisiones previas que obliguen a alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y claro, sin calcos innecesarios.
  - «Yahvé» se usa de forma consistente para יהוה en el texto principal.
  - «Reino» conserva la metáfora política-teológica del hebreo y armoniza con el resto del corpus POB en español.
