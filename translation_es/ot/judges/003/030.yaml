translation:
  language: es
  text: Así Moab quedó sometido bajo la mano de Israel[a][b], aquel día; y la tierra tuvo reposo[c] durante ochenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en aquel día».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo la mano de Israel», un modismo para quedar bajo el poder de Israel.'
    reason: cultural_note
  - marker: c
    text: O «estuvo quieta» o «estuvo en paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכָּנַע
  english_pob_choice: was subdued
  chosen_spanish: fue subyugado
  alternatives_spanish:
  - fue humillado
  - fue sometido
  lexicon: HALOT
  rationale: 'El nifal de כנע aquí expresa resultado pasivo: Moab quedó puesto bajo dominio. En español, «subyugado» conserva la fuerza político-militar sin diluirla en un mero sentimiento de humillación.'
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moabita
  lexicon: Transliteración estándar
  rationale: Es el nombre propio de la nación y se mantiene sin adaptación.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: La expresión temporal demostrativa se vierte con un español natural que conserva la referencia puntual y enfática.
- source_word: תַּחַת יַד יִשְׂרָאֵל
  english_pob_choice: under the hand of Israel
  chosen_spanish: bajo la mano de Israel
  alternatives_spanish:
  - bajo el poder de Israel
  - bajo el dominio de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como idiomática de control y poder. Aunque la versión española principal no la desarrolla, la nota explica su valor semántico.
- source_word: וַתִּשְׁקֹט
  english_pob_choice: had rest
  chosen_spanish: tuvo reposo
  alternatives_spanish:
  - estuvo quieta
  - estuvo en paz
  lexicon: HALOT
  rationale: En Jueces, שקט suele señalar ausencia de conflicto. «Tuvo reposo» es una forma bíblica y clara en español, cercana al sentido de «had rest».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto narrativo-histórico, «la tierra» reproduce mejor el alcance geográfico/covenantal del hebreo que «el país».
- source_word: שְׁמוֹנִים שָׁנָה
  english_pob_choice: for eighty years
  chosen_spanish: durante ochenta años
  alternatives_spanish:
  - por ochenta años
  - ochenta años
  lexicon: HALOT
  rationale: El español expresa la duración con naturalidad mediante «durante», manteniendo el valor temporal del hebreo.
theological_decisions:
- issue: Naturaleza de la dominación de Israel sobre Moab
  english_pob_reading: military-political subjugation expressed in conventional biblical idiom
  chosen_spanish_reading: subyugación político-militar expresada con el modismo bíblico de la mano
  alternative_spanish_readings:
  - humillación meramente moral
  - aniquilación total
  rationale: El versículo describe la sujeción de Moab y el reposo subsiguiente en la tierra. No debe intensificarse hasta exterminio, ni reducirse a una humillación interior sin contenido político.
  doctrine_reference: Jueces 3:30; uso idiomático de תַּחַת יַד en contexto histórico-narrativo
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y confirma la ausencia de cambios de revisión recientes en la pasarela más reciente; no se observan tensiones textuales nuevas respecto del hebreo base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se conserva el paralelismo narrativo de subyugación seguida de reposo sin añadir elementos interpretativos.
  - La imagen de «mano» se documenta en nota para no perder el modismo hebreo, aunque la línea principal privilegia fluidez española.
