translation:
  language: es
  text: 'Y esto les será como heredad: yo soy su heredad[a]. Y no les daréis posesión[b] en Israel; yo soy su posesión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y les será esto por heredad: yo soy su heredad». El hebreo abre con una construcción algo elíptica.'
    reason: alternative_reading
  - marker: b
    text: «Posesión» también puede traducirse como «propiedad» o «posesión de tierra», con referencia a una posesión permanente en la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה לָהֶם לְנַחֲלָה
  english_pob_choice: And this shall be their inheritance
  chosen_spanish: Y esto les será por heredad
  alternatives_spanish:
  - Y esto será su heredad
  - Y esto les será por herencia
  - Y les tocará esto como heredad
  lexicon: HALOT
  rationale: El hebreo es algo elíptico; en español, 'esto' ayuda a suplir el sujeto implícito sin perder el tono jurídico de la declaración. 'Heredad' conserva el vínculo léxico con נחלה y su fuerza de asignación pactal/territorial.
- source_word: נַחֲלָה / נַחֲלָתָם
  english_pob_choice: inheritance / their inheritance
  chosen_spanish: heredad / su heredad
  alternatives_spanish:
  - herencia / su herencia
  - posesión heredada / su posesión heredada
  - lote / su lote
  lexicon: HALOT
  rationale: '''Heredad'' es suficientemente bíblico y claro en español, y mantiene la idea de porción asignada. Se evita ''herencia'' para no reducir el sentido a sucesión patrimonial común cuando el contexto es territorial y sacerdotal.'
- source_word: אֲנִי נַחֲלָתָם
  english_pob_choice: I am their inheritance
  chosen_spanish: yo soy su heredad
  alternatives_spanish:
  - yo soy su herencia
  - yo soy su porción
  - yo soy su patrimonio
  lexicon: HALOT
  rationale: Se conserva la identificación directa y enfática de Yahvé con el bien asignado a los sacerdotes. 'Heredad' mantiene la repetición con la cláusula anterior y refleja mejor el campo semántico del pasaje que un término patrimonial moderno.
- source_word: וַאֲחֻזָּה
  english_pob_choice: possession
  chosen_spanish: posesión
  alternatives_spanish:
  - propiedad
  - tenencia
  - heredad
  lexicon: HALOT
  rationale: '''Posesión'' es el equivalente más natural en español para el campo de אחזה y permite conservar la distinción con נחלה sin sonar demasiado técnico. Evita colapsar ambos términos en una sola palabra.'
- source_word: לֹא תִתְּנ֤וּ לָהֶם֙ בְּיִשְׂרָאֵל
  english_pob_choice: you shall give them no possession in Israel
  chosen_spanish: no les daréis posesión en Israel
  alternatives_spanish:
  - no les daréis propiedad en Israel
  - no les daréis tierra en Israel
  - no les daréis tenencia en Israel
  lexicon: HALOT
  rationale: El plural de mandato se conserva con 'daréis'. 'Posesión' reproduce el sustantivo del hebreo y mantiene la prohibición legal de asignarles una tenencia territorial ordinaria dentro de Israel.
- source_word: אֲנִי אֲחֻזָּתָם
  english_pob_choice: I am their possession
  chosen_spanish: yo soy su posesión
  alternatives_spanish:
  - yo soy su propiedad
  - yo soy su heredad
  - yo soy su tenencia
  lexicon: HALOT
  rationale: 'Se mantiene el paralelismo con la primera mitad del versículo, pero con el segundo término hebreo distinto. ''Posesión'' preserva la diferencia léxica y el contraste teológico: no reciben propiedad territorial, porque Yahvé mismo es su posesión.'
theological_decisions:
- issue: Distinción entre נַחֲלָה y אֲחֻזָּה
  english_pob_reading: Preserve the Hebrew distinction by rendering נחלה as 'inheritance' and אחזה as 'possession' rather than flattening both to one English term.
  chosen_spanish_reading: Preservar la distinción entre 'heredad' y 'posesión' en español, en vez de usar una sola palabra para ambas.
  alternative_spanish_readings:
  - Traducir ambos términos como 'herencia'
  - Traducir ambos términos como 'posesión'
  rationale: El hebreo usa dos vocablos emparentados pero no idénticos para el reparto territorial. Mantener la diferencia ayuda a ver que el texto no solo habla de una herencia en sentido general, sino del hecho de que los sacerdotes carecen de una porción territorial ordinaria porque Yahvé mismo ocupa ese lugar.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Elipsis inicial de la cláusula
  english_pob_reading: And this shall be their inheritance
  chosen_spanish_reading: Y esto les será por heredad
  alternative_spanish_readings:
  - Y esto será su heredad
  - Y les tocará esto como heredad
  rationale: La forma española elegida conserva la estructura declarativa y el matiz formal del hebreo, al tiempo que suple con naturalidad el referente implícito. No se expande más de lo que el texto justifica.
  doctrine_reference: Translation philosophy §2 (Clarity without paraphrase)
translation_notes:
  revision_awareness: El texto y las decisiones siguen de cerca el contexto auditado en inglés. Se conservó la distinción léxica entre נחלה y אחזה, la observación sobre la elipsis inicial y el sentido de prohibición legal en la segunda cláusula. No se detectaron revisiones recientes que exigieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma base para el nombre divino en este proyecto.
  - Se usa 'heredad' para נחלה y 'posesión' para אחזה de manera consistente con la distinción auditada.
  - El mandato en plural se conserva con 'daréis', sin convertirlo en infinitivo impersonal.
  - La puntuación con dos puntos refleja la pausa explicativa del hebreo y del texto inglés auditado.
