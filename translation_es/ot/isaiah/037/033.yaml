translation:
  language: es
  text: 'Por tanto, así dice Yahvé acerca del rey de Asiria: no entrará en esta ciudad, ni disparará allí una flecha, ni vendrá delante de ella con un escudo[a], ni levantará contra ella un terraplén de asedio[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘avanzará contra ella con un escudo’. La expresión hebrea presenta preparativos de asedio en lenguaje militar.
    reason: lexical_alternative
  - marker: b
    text: O ‘construirá un terraplén contra ella’. El hebreo literalmente dice ‘derramará contra ella un terraplén/montículo de asedio’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama directamente; en español se mantiene el nombre divino transliterado como 'Yahvé' para conservar el nombre propio del pacto, en lugar de sustituirlo por un título genérico.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa la conexión inferencial con el contexto anterior de manera natural y formal en español, sin perder el valor lógico de conclusión.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética estándar; 'así dice' mantiene la fuerza proclamativa y la cercanía al hebreo sin sonar arcaica.
- source_word: אֶל מֶלֶךְ אַשּׁוּר
  english_pob_choice: concerning the king of Assyria
  chosen_spanish: acerca del rey de Asiria
  alternatives_spanish:
  - al rey de Asiria
  - contra el rey de Asiria
  lexicon: HALOT
  rationale: En este contexto oracular, אֶל introduce el tema de la declaración. 'Acerca de' comunica mejor el alcance del anuncio en español que una simple dirección 'a'.
- source_word: לֹא יָבוֹא אֶל הָעִיר הַזֹּאת
  english_pob_choice: He will not come into this city
  chosen_spanish: no entrará en esta ciudad
  alternatives_spanish:
  - no vendrá a esta ciudad
  - no llegará a esta ciudad
  lexicon: HALOT
  rationale: '''Entrará'' reproduce con naturalidad el sentido de movimiento hacia el interior de la ciudad y es la opción más idiomática en español para el contexto de invasión.'
- source_word: יוֹרֶה שָׁם חֵץ
  english_pob_choice: shoot an arrow there
  chosen_spanish: disparará allí una flecha
  alternatives_spanish:
  - lanzará allí una flecha
  - tirará allí una flecha
  lexicon: HALOT
  rationale: El verbo hebreo con חֵץ se refiere al acto de disparar una flecha; 'disparará' es claro en español moderno y conserva la imagen bélica. 'Allí' mantiene שָׁם.
- source_word: יְקַדְּמֶנָּה מָגֵן
  english_pob_choice: come before it with a shield
  chosen_spanish: se le adelantará con un escudo
  alternatives_spanish:
  - se le presentará con un escudo
  - vendrá delante de ella con un escudo
  lexicon: HALOT
  rationale: El verbo קדם en esta construcción puede expresar adelantarse o ponerse delante. 'Se le adelantará con un escudo' conserva la imagen de aproximación en formación de asedio y evita sobreinterpretar el gesto militar.
- source_word: יִשְׁפֹּךְ עֳלֶיהָ סֹלְלָה
  english_pob_choice: heap up a siege ramp against it
  chosen_spanish: levantará contra ella un terraplén de asedio
  alternatives_spanish:
  - apilará contra ella un terraplén de asedio
  - construirá contra ella un terraplén de asedio
  lexicon: HALOT
  rationale: En contexto de asedio, סֹלְלָה designa una obra de tierra/ataque; 'terraplén de asedio' comunica la función militar con claridad. 'Levantar' refleja la acción de echar/poner en posición la obra contra la ciudad.
theological_decisions:
- issue: Renderización del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino del hebreo. 'Yahvé' es el equivalente coherente con la política del proyecto de no enmascarar el Tetragrama mediante un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa, pero ajusta el verbo principal y la terminología de asedio para sonar natural en español. Se conserva la serie de negaciones y la progresión militar: entrar, disparar, adelantarse con escudo y levantar un terraplén.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Asiria'' se usa consistentemente para אַשּׁוּר.'
  - '''Terraplén de asedio'' traduce la obra militar de סֹלְלָה sin introducir un término eclesiástico o interpretativo.'
  - La frase 'se le adelantará con un escudo' conserva la imagen de acercamiento bélico sin convertirla en una paráfrasis general.
