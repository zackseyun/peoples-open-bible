translation:
  language: es
  text: 'Entonces Josué hijo de Nun[a], servidor de Moisés, uno de sus jóvenes, respondió y dijo: «Mi señor Moisés, refrénalos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde su juventud», o posiblemente «de entre los escogidos de él». La expresión hebrea es compacta y algo ambigua.
    reason: alternative_reading
  - marker: b
    text: O «prohíbelos». El verbo hebreo puede significar restringir, detener o prohibir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: HALOT
  rationale: La secuencia narrativa waw + verbo se expresa naturalmente con «Entonces», y ענה en este contexto introduce una respuesta; «respondió» conserva el valor discursivo sin sonar arcaico.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre al español usual «Josué» y se mantiene la filiación de manera directa y sobria.
- source_word: מְשָׁרֵת מֹשֶׁה
  english_pob_choice: Moses’ attendant
  chosen_spanish: servidor de Moisés
  alternatives_spanish:
  - asistente de Moisés
  - asistente/servidor de Moisés
  lexicon: HALOT
  rationale: מְשָׁרֵת describe a alguien que sirve en una función de apoyo. «Servidor» comunica la relación de servicio personal sin sugerir esclavitud, pero evitando también una formulación demasiado administrativa como «asistente».
- source_word: מִבְּחֻרָיו
  english_pob_choice: from his youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - de entre sus jóvenes
  - de sus jóvenes
  - desde sus jóvenes
  lexicon: HALOT
  rationale: La frase hebrea es compacta y algo ambigua. La revisión inglesa preferida «from his youth» refleja el valor idiomático posible; en español, «desde su juventud» preserva esa lectura idiomática y resulta natural, sin fijar innecesariamente una de las otras posibilidades léxicas.
- source_word: אֲדֹנִי מֹשֶׁה
  english_pob_choice: My lord Moses
  chosen_spanish: Mi señor Moisés
  alternatives_spanish:
  - Mi amo Moisés
  lexicon: HALOT
  rationale: אֲדֹנִי es un tratamiento respetuoso a un superior humano. «Mi señor» mantiene el tono deferente y evita asociaciones divinas.
- source_word: כְּלָאֵם
  english_pob_choice: restrain them
  chosen_spanish: refrena los
  alternatives_spanish:
  - reprímelos
  - prohíbeles
  lexicon: HALOT
  rationale: El imperativo de כלא puede significar restringir, detener o prohibir. «Refrena» conserva el sentido de impedir o contener su acción sin imponer una explicación más específica de la medida.
theological_decisions:
- issue: Tratamiento del discurso respetuoso hacia Moisés
  english_pob_reading: My lord Moses
  chosen_spanish_reading: Mi señor Moisés
  alternative_spanish_readings:
  - Mi amo Moisés
  rationale: No se traduce como un título divino ni como lenguaje litúrgico; el hebreo expresa deferencia humana hacia Moisés. «Mi señor» preserva esa relación jerárquica sin exceso interpretativo.
  doctrine_reference: Éxodo 20:12; Números 12:7
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente en la interpretación idiomática de מִבְּחֻרָיו («from his youth»), pero se mantuvo visible la ambigüedad de la expresión hebrea mediante nota alternativa. También se conservó el valor imperativo de כְּלָאֵם sin endurecerlo a una sola opción interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Josué» se mantiene como forma española estándar del nombre propio.
  - Se prefirió un español reverente pero actual, con puntuación de cita directa en estilo editorial moderno.
  - La nota a marca la ambigüedad del sintagma hebreo; la nota b preserva la alternativa semántica del imperativo.
