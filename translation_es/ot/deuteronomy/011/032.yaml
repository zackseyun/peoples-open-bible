translation:
  language: es
  text: Y se cuidarán de cumplir todos los estatutos y los juicios que yo pongo delante de ustedes hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘que yo estoy dando delante de ustedes hoy’; el modismo hebreo significa ‘poniendo delante de ustedes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: you shall be careful
  chosen_spanish: cuidarán de
  alternatives_spanish:
  - deberán cuidar de
  - tendrán cuidado de
  - guardarán
  lexicon: HALOT
  rationale: 'שׁמר en esta construcción con לַעֲשׂוֹת expresa más que simple ‘guardar’: implica prestar atención cuidadosa para cumplir. ‘Cuidarán de’ conserva esa fuerza de diligencia en español sin reducirlo a mera observancia formal.'
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: poner por obra
  alternatives_spanish:
  - hacer
  - cumplir
  - realizar
  lexicon: HALOT
  rationale: עָשָׂה en contexto legal de mandamientos puede sonar más natural en español como ‘poner por obra’, que mantiene la idea de ejecución efectiva de lo mandado sin perder el tono bíblico.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: ‘Todos’ transmite la totalidad exigida por el hebreo y funciona bien con los sustantivos plurales que siguen.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las leyes
  lexicon: HALOT
  rationale: חֻקִּים suele referirse a disposiciones establecidas o estatutos. ‘Estatutos’ preserva el registro jurídico-covenantal y distingue este término de מִשְׁפָּטִים.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los decretos
  alternatives_spanish:
  - los juicios
  - las ordenanzas
  - las decisiones
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede abarcar decisiones legales, juicios u ordenanzas. Dado que ‘decretos’ es una opción española ya usada en registros bíblicos y permite distinguirlo de ‘estatutos’, se adopta aquí como equivalente funcional. Se evita ‘juicios’, que en español moderno suena menos natural en este contexto.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן
  english_pob_choice: that I am setting
  chosen_spanish: que yo presento
  alternatives_spanish:
  - que yo pongo
  - que yo doy
  - que yo establezco
  lexicon: HALOT
  rationale: 'נתן con לִפְנֵיכם es idiomático: no solo ‘dar’, sino ‘poner/presentar ante’. ‘Presento’ comunica bien el acto de colocar públicamente delante de ellos, conservando la fuerza presente del participio.'
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: ante ustedes
  alternatives_spanish:
  - delante de ustedes
  - frente a ustedes
  lexicon: HALOT
  rationale: ‘Ante ustedes’ es una forma natural, solemne y clara en español para el hebreo idiomático ‘delante de/before you’, preservando el carácter público y legal de la presentación.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - el día de hoy
  lexicon: HALOT
  rationale: ‘Hoy’ es la equivalencia más directa y moderna para el valor temporal inmediato del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene el par jurídico ‘estatutos / decretos’, reproduce la idea de obligación cuidadosa expresada por שׁמר+לַעֲשׂוֹת, y conserva el modismo de presentación pública con un verbo natural en español.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
  - ‘Decretos’ se usa para מִשְׁפָּטִים como solución funcional en español, manteniendo distinción con ‘estatutos’.
  - ‘Ante ustedes’ y la nota al pie preservan la tensión entre una traducción idiomática y una lectura más literal del modismo hebreo.
