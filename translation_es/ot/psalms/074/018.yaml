    reason: lexical_alternative
  revision_rationale: 'Se corrige la colocación de notas, se restaura la concordancia plural explícita del hebreo en נִאֲצוּ, y se añaden las notas significativas que el rastro inglés preserva: la carga moral de «necio» y las alternativas léxicas para el desprecio del nombre. Se mantiene «Yahvé» conforme al proyecto y «afrentado» como opción válida y digna para חרף.'
