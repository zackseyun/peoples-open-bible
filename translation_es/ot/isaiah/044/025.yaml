  to: el que frustra las señales de los jactanciosos[a] y hace que los adivinos actúen como necios[b], el que hace volver atrás a los sabios[c] y vuelve necio su conocimiento.
  rationale: Se ajusta בַּדִּים a 'jactanciosos' para reflejar mejor la revisión POB a 'boasters'; se corrige דַעְתָּם de 'sabiduría' a 'conocimiento' para respetar el sustantivo fuente y la decisión léxica documentada; se afinan las notas para que correspondan al expediente inglés y a un español más natural y preciso.
