translation:
  language: es
  text: Ecrón[a], con sus poblados y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'y sus hijas y sus aldeas'. Aquí 'hijas' es un modismo hebreo para designar poblados o asentamientos dependientes de una ciudad principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶקְרוֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ekron
  - Accrón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera al español con forma natural y reconocible. Mantengo la adaptación fonética Ecrón para respetar la pronunciación castellana sin perder la referencia geográfica.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: with its towns
  chosen_spanish: con sus poblados
  alternatives_spanish:
  - y sus hijas
  - con sus ciudades dependientes
  - con sus ciudades
  lexicon: HALOT
  rationale: La imagen literal 'hijas' es idiomática en listas territoriales y designa asentamientos subordinados. 'Poblados' comunica bien la relación de dependencia en español sin cargar el texto con un calco opaco.
- source_word: וַחֲצֵרֶיהָ
  english_pob_choice: and its villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus villas
  - y sus asentamientos
  - y sus aldeas menores
  lexicon: HALOT
  rationale: חצרים en este contexto alude a asentamientos menores; 'aldeas' es una equivalencia natural y concisa en español, coherente con la lista de dependencias urbanas.
translation_notes:
  revision_awareness: 'El texto fuente y la traducción inglesa auditada coinciden plenamente en el sentido general: nombre propio + dos términos de asentamientos dependientes. No se registran revisiones aplicadas; la versión española sigue esa lectura sin añadir matices no sustentados.'
  spanish_consistency_notes:
  - He preferido Ecrón como adaptación fonética española del topónimo, manteniendo el carácter de nombre propio.
  - '''Poblados'' y ''aldeas'' preservan la distinción entre asentamientos dependientes mayores y menores, correspondiente al par hebreo ''hijas'' / ''hצרים''.'
  - La nota conserva la tensión lexical entre la literalidad de 'hijas' y el sentido idiomático territorial, tal como lo hace el aparato inglés.
