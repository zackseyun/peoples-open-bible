review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: vigilancia diligente sobre la vida doméstica y rechazo de la pereza. Sin embargo, «los caminos de su casa» suena poco natural en español y puede sugerir rutas físicas más que el sentido contextual de movimientos/asuntos del hogar. Dado que el inglés POB conserva la literalidad con nota, en español conviene una formulación principal más idiomática que siga reflejando el hebreo mediante nota.'
  spanish_quality_summary: «Vigila» y «no come el pan de la ociosidad» son naturales y dignos. La principal debilidad es «los caminos de su casa», que resulta rígido y menos claro para lectura eclesial general. «Su casa» es posible, pero «su hogar» o «su casa» en combinación con «asuntos» funciona mejor; aquí «hogar» mejora la referencia doméstica funcional.
  glossary_alignment: No hay términos del glosario principal en disputa. La revisión propuesta respeta la decisión auditada de mantener «pan» para לֶחֶם y el modismo con nota. También preserva el valor habitual de לֹא תֹאכֵל con «no come».
  issues:
  - severity: medium
    issue: «los caminos de su casa» es una calca poco natural
    rationale: הֲלִיכוֹת בֵּיתָהּ literalmente habla de los ‘caminos/idas’ de su casa, pero en contexto se refiere a la marcha o los asuntos del hogar. En español, «caminos de su casa» no comunica bien ese sentido sin tropiezo.
  - severity: low
    issue: «su casa» puede quedarse demasiado en lo físico
    rationale: בֵּיתָהּ aquí apunta al hogar/la unidad doméstica más que al edificio. «Hogar» ayuda a expresar el sentido funcional sin apartarse del original.
  revised_spanish_text: Vigila los asuntos de su hogar[a], y no come el pan de la ociosidad[b].
