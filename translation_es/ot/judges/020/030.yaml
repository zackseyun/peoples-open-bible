translation:
  language: es
  text: Entonces los hijos de Israel subieron contra los hijos de Benjamín al tercer día[a], y se desplegaron contra Gibeá como antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas ... los benjaminitas». El hebreo dice más literalmente «los hijos de Israel» y «los hijos de Benjamín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - avanzaron
  lexicon: HALOT
  rationale: עלה conserva el movimiento ascendente y, en contexto militar, puede implicar avance. «Subieron» mantiene el verbo básico del hebreo sin forzar una interpretación más técnica que el texto no exige.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión de parentesco del hebreo para reflejar el paralelismo con «los hijos de Benjamín» y no nivelar el matiz lexical a una denominación colectiva más libre.
- source_word: אֶל בְּנֵי בִנְיָמִן
  english_pob_choice: against the sons of Benjamin
  chosen_spanish: contra los hijos de Benjamín
  alternatives_spanish:
  - hacia los hijos de Benjamín
  - a los hijos de Benjamín
  lexicon: HALOT
  rationale: En este contexto bélico, אֶל no se traduce literalmente como dirección neutra, sino con un valor hostil natural en español. «Contra» comunica la oposición militar que el inglés POB también explicitó.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - el tercer día
  lexicon: HALOT
  rationale: La frase temporal admite ambas opciones; «en el tercer día» conserva el valor preposicional del hebreo, mientras que suena plenamente natural en español narrativo.
- source_word: וַיַּעַרְכ֥וּ
  english_pob_choice: they drew up
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se arreglaron en formación
  - se pusieron en orden de batalla
  - se alinearon
  lexicon: HALOT
  rationale: ערך en contexto militar describe el arreglo o despliegue de tropas. «Se desplegaron» transmite la acción estratégica con un español actual y digno, manteniendo el sentido de preparación para combate.
- source_word: אֶל הַגִּבְעָה
  english_pob_choice: against Gibeah
  chosen_spanish: contra Gibeá
  alternatives_spanish:
  - hacia Gibeá
  - frente a Gibeá
  lexicon: HALOT
  rationale: Con el verbo militar, la preposición marca posición de ataque. Se conserva el topónimo en forma española usual «Gibeá», y «contra» evita una lectura meramente espacial.
- source_word: כְּפַעַם בְּפָעַם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como en ocasiones anteriores
  - como antes de esto
  lexicon: HALOT
  rationale: El hebreo es idiomático y no conviene traducirlo de manera literal. «Como antes» reproduce con concisión el valor temporal-comparativo que el inglés POB ya identificó.
theological_decisions:
- issue: Referencia a grupos étnico-tribales con lenguaje de parentesco
  english_pob_reading: the sons of Israel ... the sons of Benjamin
  chosen_spanish_reading: los hijos de Israel ... los hijos de Benjamín
  alternative_spanish_readings:
  - los israelitas ... los benjaminitas
  - el pueblo de Israel ... el pueblo de Benjamín
  rationale: 'No hay una cuestión doctrinal abierta, pero sí una decisión textual relevante: conservar el paralelismo del hebreo entre ambas expresiones de parentesco. Eso preserva la dureza narrativa y evita suavizar la forma original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente y el audit trail en inglés. No se detectan revisiones aplicadas; se mantuvo la lectura estable de la edición WLC y la equivalencia óptima del POB inglés, ajustando solo la idiomaticidad española donde el hebreo bélico lo requería.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton ni un equivalente directo en el hebreo dado.
  - Se usó «hijos de» para conservar el paralelismo formal con el hebreo; la nota ofrece la alternativa más natural «israelitas/benjaminitas».
  - Se prefirió «Gibeá» como forma española del topónimo, consistente con una transliteración bíblica ampliamente reconocible.
  - La expresión militar «se desplegaron» busca equilibrar claridad moderna y precisión semántica sin introducir un matiz táctico más específico que el hebreo.
