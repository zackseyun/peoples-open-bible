translation:
  language: es
  text: Cuéntenles acerca de ello a sus hijos[a], y que sus hijos les cuenten a sus hijos, y que sus hijos le cuenten a otra generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijos ... sus hijos ... sus hijos»; aquí «hijos» se usa como término representativo de la transmisión intergeneracional en general, no solo de descendientes varones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיהָ
  english_pob_choice: about it
  chosen_spanish: Contadlo
  alternatives_spanish:
  - Contad acerca de ello
  - Contad de ello
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere al desastre/plaga mencionado en el contexto previo; en español, el clítico neutro de objeto directo «lo» es la forma natural para remitir a ese acontecimiento sin forzar género personal.
- source_word: לִבְנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: a vuestros hijos
  alternatives_spanish:
  - a vuestros hijos e hijas
  - a vuestros descendientes
  lexicon: HALOT
  rationale: בנים puede referirse a hijos en sentido amplio de descendencia generacional. Se mantiene «hijos» como reproducción cercana del término hebreo, sin restringirlo a varones en el sentido idiomático español.
- source_word: סַפֵּרוּ
  english_pob_choice: Tell
  chosen_spanish: Contad
  alternatives_spanish:
  - Narrad
  - Decid
  lexicon: HALOT
  rationale: El imperativo plural piel pide una acción deliberada de transmitir/recontar. «Contad» conserva el valor exhortativo y suena natural en español bíblico contemporáneo.
- source_word: וּבְנֵיכֶם
  english_pob_choice: and let your children tell
  chosen_spanish: y vuestros hijos
  alternatives_spanish:
  - y que vuestros hijos cuenten
  - y vuestros hijos cuenten
  lexicon: HALOT
  rationale: El hebreo omite el verbo repetido en los miembros siguientes; el español puede omitirlo también para mantener la cadena paralela y, en contexto, el verbo implícito sigue siendo «contar/transmitir».
- source_word: לִבְנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos e hijas
  - a sus descendientes
  lexicon: HALOT
  rationale: Como en la cláusula anterior, בנים funciona aquí de modo representativo para la descendencia sucesiva; «sus hijos» preserva la estructura de generaciones sin sobreexplicar.
- source_word: וּבְנֵיהֶם
  english_pob_choice: and their children
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus descendientes
  - y a sus hijos
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de la cadena generacional. La repetición de «hijos» reproduce el patrón hebreo de forma transparente.
- source_word: לְדוֹר אַחֵר
  english_pob_choice: another generation
  chosen_spanish: a otra generación
  alternatives_spanish:
  - a la siguiente generación
  - a una generación futura
  lexicon: HALOT
  rationale: «Otra generación» refleja con precisión דּוֹר אַחֵר y evita limitar el alcance a solo una generación inmediata; la preposición «a» en español expresa la dirección de la transmisión.
translation_notes:
  revision_awareness: 'Se siguió el último estado auditado en inglés: la cláusula final incluye el verbo implícito «tell»/«contar» para completar la paralela generacional. El español reproduce esa completitud con la cadena «Contadlo ... y vuestros hijos ... y sus hijos ...».'
  spanish_consistency_notes:
  - Se mantuvo «hijos» por coherencia con la decisión léxica auditada de בנים como descendencia general.
  - Se prefirió el imperativo plural «Contad» para conservar el tono exhortativo del hebreo.
  - Se usó «a otra generación» para reflejar el alcance abierto de לְדוֹר אַחֵר sin reducirlo a una sola generación siguiente.
