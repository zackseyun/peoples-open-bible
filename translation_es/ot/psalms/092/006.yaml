translation:
  language: es
  text: ¡Cuán grandiosas son tus obras, Yahvé; muy profundos son tus pensamientos[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus planes» o «tus propósitos» para «tus pensamientos».
