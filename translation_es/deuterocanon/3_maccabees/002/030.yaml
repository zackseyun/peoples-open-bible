translation:
  language: es
  text: 'Pero para que no pareciera odioso[a] para todos, añadió por escrito: «Pero si algunos de ellos eligen vivir entre los iniciados en los ritos, a estos los hace ciudadanos con iguales derechos que los alejandrinos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los iniciados en los misterios». El griego usa lenguaje de iniciación cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεχθόμενος
  english_pob_choice: hateful
  chosen_spanish: odioso
  alternatives_spanish:
  - odioso
  - detestado
  - hostil
  lexicon: LSJ
  rationale: El participio expresa una percepción ajena de repulsión u odio; en español, «odioso» comunica bien esa apariencia sin volverlo demasiado interpretativo. «Hostil» debilita el matiz afectivo y «detestado» suena más fuerte de lo que exige el contexto.
- source_word: ὑπέγραψεν
  english_pob_choice: he added in writing
  chosen_spanish: lo añadió por escrito
  alternatives_spanish:
  - lo añadió por escrito
  - lo agregó por escrito
  - lo consignó por escrito
  lexicon: LSJ
  rationale: 'La idea es documental: el rey incorpora una cláusula al decreto. «Lo añadió por escrito» conserva la función legal sin introducir un tecnicismo innecesario.'
- source_word: προαιρῶνται
  english_pob_choice: choose
  chosen_spanish: prefieren
  alternatives_spanish:
  - eligen
  - prefieren
  - deciden
  lexicon: LSJ
  rationale: El verbo implica decisión deliberada y también preferencia. En este contexto, «prefieren» capta bien la elección voluntaria y suena natural en español; «eligen» también sería posible, pero menos expresivo de la inclinación implícita.
- source_word: ἐν τοῖς κατὰ τελετὰς μεμυημένοις
  english_pob_choice: among those initiated in the rites
  chosen_spanish: entre los iniciados en los ritos
  alternatives_spanish:
  - entre los iniciados en los ritos
  - entre los iniciados en las ceremonias
  - entre los iniciados en los misterios
  lexicon: LSJ
  rationale: La frase conserva el lenguaje cultual de iniciación. «Ritos» mantiene el campo religioso sin forzar el término técnico «misterios», que en español puede sonar más específico de lo que el griego exige.
- source_word: ἀναστρέφεσθαι
  english_pob_choice: to live
  chosen_spanish: vivir
  alternatives_spanish:
  - vivir
  - habitar
  - relacionarse
  lexicon: LSJ
  rationale: Siguiendo la revisión inglesa, aquí «vivir» es la opción más natural en español para una permanencia o modo de vida dentro de ese grupo; evita endurecer el verbo hacia un sentido demasiado abstracto.
- source_word: ἰσοπολίτας
  english_pob_choice: equal citizens
  chosen_spanish: ciudadanos con iguales derechos
  alternatives_spanish:
  - ciudadanos con iguales derechos
  - ciudadanos iguales
  - co-ciudadanos
  lexicon: LSJ
  rationale: La expresión apunta a igualdad cívica o de estatus. «Ciudadanos con iguales derechos» explicita la fuerza jurídica del término sin perder fidelidad; «ciudadanos iguales» sería menos claro en español.
- source_word: Ἀλεξανδρεῦσι
  english_pob_choice: the Alexandrians
  chosen_spanish: los alejandrinos
  alternatives_spanish:
  - los alejandrinos
  - los de Alejandría
  - los ciudadanos alejandrinos
  lexicon: LSJ
  rationale: En español, «los alejandrinos» funciona de modo idiomático y conserva el referente colectivo comparativo del dativo griego.
- source_word: ποιεῖ
  english_pob_choice: he makes
  chosen_spanish: los hace
  alternatives_spanish:
  - los hace
  - los constituye
  - les concede
  lexicon: LSJ
  rationale: Se mantiene la fuerza directa del presente legal del decreto. «Los hace» refleja la formulación de efecto jurídico inmediato mejor que una paráfrasis más explícita.
theological_decisions:
- issue: Lenguaje de iniciación cultual (τελεταί / μεμυημένοι)
  english_pob_reading: rites / initiated
  chosen_spanish_reading: ritos / iniciados
  alternative_spanish_readings:
  - ceremonias / instruidos
  - misterios / iniciados
  rationale: La POB inglesa preserva el lenguaje cultual sin sobredeterminarlo. En español, «ritos» e «iniciados» mantienen esa tensión y evitan tanto secularizar el pasaje como cargarlo con terminología religiosa más técnica de lo que el griego impone.
  doctrine_reference: Principio de primacía del texto fuente; conservar el sentido cultual histórico sin anacronismo confesional.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «live» para ἀναστρέφεσθαι. En español se reflejó con «vivir», manteniendo además la cláusula legal y el paralelismo del decreto sin añadir interpretación externa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí, ya que el versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece ninguna de esas formas en el texto fuente.
  - Se mantuvo un registro sobrio y legal en la cláusula final para conservar el tono del edicto.
  - La puntuación en español sigue el patrón narrativo con comillas angulares para el discurso directo interno.
