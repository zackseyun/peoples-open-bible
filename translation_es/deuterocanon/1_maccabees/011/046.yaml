translation:
  language: es
  text: Y el rey huyó al patio[a], y los de la ciudad se apoderaron de los accesos[b] de la ciudad, y comenzaron a combatir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «patio interior»; el griego puede referirse al patio o área de la corte real.
    reason: lexical_alternative
  - marker: b
    text: O «entradas» o «pasajes»; el término griego puede denotar rutas de acceso, no solo puertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: BDAG
  rationale: El aoristo de φεύγω expresa huida ante peligro. «Huyó» comunica con naturalidad la retirada urgente y conserva la fuerza del verbo sin añadir matices innecesarios.
- source_word: αὐλήν
  english_pob_choice: court
  chosen_spanish: patio
  alternatives_spanish:
  - corte
  - patio interior
  lexicon: LSJ
  rationale: αὐλή puede significar patio o área de corte/courtyard. En español «patio» es claro y natural; «corte» podría confundirse con la institución real, y el griego no exige «palacio».
- source_word: κατελάβοντο
  english_pob_choice: seized
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - tomaron control de
  - ocuparon
  lexicon: BDAG
  rationale: La forma media indica tomar posesión o control. «Se apoderaron de» preserva la fuerza militar de la acción sin convertirla en una ocupación más técnica de lo que el griego dice.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: the men of the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los hombres de la ciudad
  - los habitantes de la ciudad
  lexicon: BDAG
  rationale: Literalmente es «los que son de la ciudad». «Los de la ciudad» mantiene la amplitud del griego sin forzar un género masculino que el texto no explicita, y sigue siendo natural en español militar.
- source_word: τὰς διόδους τῆς πόλεως
  english_pob_choice: the passages of the city
  chosen_spanish: los accesos de la ciudad
  alternatives_spanish:
  - los pasos de la ciudad
  - las entradas de la ciudad
  - las vías de acceso de la ciudad
  lexicon: LSJ
  rationale: δίοδος puede ser pasaje, paso o vía de acceso. «Accesos» comunica bien la idea de rutas o puntos de entrada/salida y evita restringir indebidamente el término a «entradas».
- source_word: ἤρξαντο ἐκπολεμεῖν
  english_pob_choice: began to fight
  chosen_spanish: comenzaron a pelear
  alternatives_spanish:
  - comenzaron a combatir
  - empezaron a guerrear
  lexicon: BDAG
  rationale: La construcción significa iniciar hostilidades. «Comenzaron a pelear» es idiomático en español y conserva el arranque del conflicto; «combatir» o «guerrear» serían más formales, pero no necesarios aquí.
translation_notes:
  revision_awareness: 'El pasaje griego coincide ampliamente con la traducción inglesa auditada: huida del rey, toma de los accesos por los ciudadanos y comienzo del combate. La revisión más reciente no introdujo cambios, y el punto principal de decisión en español fue cómo representar αὐλή y διόδους sin estrechar demasiado su campo semántico.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también «Cristo/Mesías» porque no aparecen en el texto.
  - «Los de la ciudad» conserva la referencia colectiva del griego sin sobreespecificar género o función.
  - «Accesos» deja abierta la gama semántica de δίοδος, en línea con la nota inglesa sobre pasajes/aproaches/entrances.
