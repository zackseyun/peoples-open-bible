review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: el reparto por suertes, los tres grupos participantes, la finalidad de llevar la leña al templo, la organización por casas paternas, la periodicidad anual, el destino cultual en el altar y la referencia a Yahvé y a la Ley. Sin embargo, hay un ajuste importante de fidelidad léxica: לְבַעֵר עַל מִזְבַּח se refiere a quemar la madera en/sobre el altar, no necesariamente a quemar ''la ofrenda'' como objeto femenino. En español, ''quemarla'' hace que el referente parezca ser ''la ofrenda'', cuando el contexto más inmediato es la madera destinada al fuego del altar. Conviene una formulación menos ambigua.'
  spanish_quality_summary: El texto es natural, claro y eclesialmente legible. 'Echamos suertes', 'casa de nuestro Dios', 'tiempos señalados', 'año tras año' y 'Yahvé' funcionan bien. La nota al pie está bien orientada. El principal problema de calidad es la ambigüedad introducida por 'traerla' y especialmente 'quemarla', que puede sonar como si se quemara la ofrenda en general más que la madera. Una leve reparación mejora precisión sin perder fluidez.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé'', אֱלֹהֵינוּ → ''nuestro Dios'', בַּיִת → ''casa'', y la lista ''los sacerdotes, los levitas y el pueblo'' se conserva correctamente. La decisión ''acerca de la ofrenda de madera'' sigue de cerca el audit trail inglés y la nota alternativa también está bien. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: '''para traerla ... para quemarla'' introduce un referente femenino implícito que desplaza el foco de la madera al sintagma ''ofrenda''.'
    rationale: El hebreo expresa el suministro de la madera para arder en el altar. En español, repetir pronombres femeninos hace más natural entender que se trae y se quema 'la ofrenda', mientras que el sentido operativo del pasaje es proveer madera para el altar.
  - severity: low
    issue: 'La nota al pie abre con comilla simple y formato poco natural: ''''O: «para la ofrenda de madera»...''.'
    rationale: No afecta el sentido, pero conviene normalizar la puntuación española para una presentación más limpia.
  revised_spanish_text: Echamos suertes acerca de la ofrenda de madera[a]—los sacerdotes, los levitas y el pueblo—para llevar madera a la casa de nuestro Dios, según las casas de nuestros padres, en tiempos señalados, año tras año, para quemarla sobre el altar de Yahvé nuestro Dios, como está escrito en la Ley.
  revised_footnotes:
  - marker: a
    text: 'O: «para la ofrenda de madera». El hebreo de עַל puede entenderse como el asunto sobre el cual se echaban las suertes; el sentido es que se asignaba por sorteo la responsabilidad de proveer la madera.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'traerla' por 'llevar madera' para explicitar el referente material implícito en el contexto y evitar que 'la ofrenda' parezca el objeto directo principal. Se conserva 'quemarla' porque ahora su referente inmediato es claramente 'madera'. También se normaliza la puntuación de la nota al pie. El resto del texto ya preserva bien el significado fuente, la terminología del proyecto y la legibilidad en español.
