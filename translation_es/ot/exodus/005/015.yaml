review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: llegada de los oficiales, clamor dirigido a Faraón, introductor de cita y pregunta directa. Sin embargo, en dos puntos no sigue fielmente la línea auditada del POB: (1) לַעֲבָדֶיךָ en este contexto fue resuelto en el inglés principal como ''your servants'', con ''your slaves'' solo en nota; el español invirtió indebidamente esa prioridad. (2) La nota literal sobre כֹה corresponde mejor a ''así/de este modo'' y no debe duplicar sin más una redacción principal que además cambia el matiz de עבד.'
  spanish_quality_summary: El español es claro y digno, pero 'haces así a tus esclavos' suena algo rígido y menos natural en registro bíblico actual. '¿Por qué haces esto a tus siervos?' mantiene mayor naturalidad, refleja mejor la revisión inglesa final ('do this to your servants') y conserva el matiz deferencial propio de una súplica al faraón. 'Oficiales' es aceptable, aunque algo genérico; no requiere cambio.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. El punto relevante de proyecto es עבד: aunque el proyecto suele preferir ''esclavo'' cuando el inglés eligió ''slave'', aquí el inglés auditado eligió ''servants'' en el texto principal por razón de registro cortesano, dejando ''slaves'' como alternativa. El español debe seguir esa decisión contextual con ''siervos'' en el texto y ''esclavos'' en nota.'
  issues:
  - severity: high
    issue: El texto principal usa 'tus esclavos' donde el POB inglés auditado eligió 'your servants' como lectura principal.
    rationale: La decisión documentada para לַעֲבָדֶיךָ depende del registro deferente de los hablantes ante Faraón. Invertir principal y nota altera la resolución léxica aprobada y el tono del discurso.
  - severity: medium
    issue: La formulación '¿Por qué haces así a...?' es menos natural en español que una forma más directa.
    rationale: Aunque 'hacer así' refleja literalmente כֹה, el propio rastro auditado inglés movió la redacción principal a 'do this to...' para cercanía y naturalidad. En español 'haces esto a' comunica mejor sin perder fidelidad.
  - severity: low
    issue: La nota b debe corresponder a la alternativa literal de כֹה sin mezclar el cambio de עבד.
    rationale: Conviene separar claramente la nota sobre 'así/de este modo' de la nota sobre 'siervos/esclavos', como hace el expediente inglés con notas distintas.
  revised_spanish_text: 'Entonces los oficiales de los hijos de Israel fueron y clamaron a Faraón[a], diciendo[c][b]: «¿Por qué haces esto a tus siervos?»'
  revised_footnotes:
  - marker: a
    text: O «los israelitas»; literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿Por qué haces así a tus siervos?»
    reason: lexical_alternative
  - marker: c
    text: O «tus esclavos», según cómo se entienda עבד en este contexto.
    reason: lexical_alternative
  revision_rationale: Se cambia 'esclavos' por 'siervos' en el texto principal para seguir la decisión auditada del POB sobre עבד en registro cortesano, dejando 'esclavos' como alternativa en nota. También se ajusta 'haces así' a 'haces esto' para un español más natural y en línea con la revisión inglesa final, mientras la literalidad de כֹה queda preservada en la nota correspondiente.
