revisions:
- from: ¿Quién puede sacar un ser limpio[a] de uno impuro? Nadie[b].
  to: ¿Quién puede sacar algo limpio[a] de algo impuro? Nadie[b].
  rationale: Se reemplaza "un ser limpio ... de uno impuro" por "algo limpio ... de algo impuro" para reflejar mejor los adjetivos sustantivados del hebreo sin introducir un referente personal o animado. Se conserva la fuerza retórica de la pregunta y la negación absoluta final en español natural. Las notas se ajustan a alternativas fieles e idiomáticas.
