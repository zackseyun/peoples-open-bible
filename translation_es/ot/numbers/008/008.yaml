translation:
  language: es
  text: Entonces tomarán un novillo y su ofrenda vegetal de flor de harina amasada con aceite, y tú tomarás un segundo novillo para una ofrenda por el pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חַטָּאת puede denotar la ofrenda por el pecado o la ofrenda purificatoria en contextos rituales sacerdotales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  english_pob_choice: Then they shall take
  chosen_spanish: Entonces tomarán
  alternatives_spanish:
  - Y tomarán
  - Luego tomarán
  lexicon: HALOT
  rationale: El waw secuencial introduce la siguiente acción ritual; en español, «entonces» expresa bien la secuencia sin volver la frase pesada. El futuro verbal conserva el valor directivo de instrucción.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: one young bull
  chosen_spanish: un novillo
  alternatives_spanish:
  - un toro joven
  - un becerro
  lexicon: HALOT
  rationale: La expresión hebrea designa un toro joven o novillo. «Novillo» es natural en español bíblico actual y mantiene la fuerza sacrificial mejor que un calco literal.
- source_word: וּמִנְחָתוֹ
  english_pob_choice: and its grain offering
  chosen_spanish: y su ofrenda vegetal
  alternatives_spanish:
  - y su ofrenda de cereal
  - y su ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal es la ofrenda no sangrienta asociada al animal. «Ofrenda vegetal» preserva el valor cultual tradicional en español y evita reducirla a una ofrenda genérica.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es el equivalente cultual más transparente y tradicional en español para harina finamente molida.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio indica una preparación ritual de la harina con aceite. «Amasada con aceite» comunica la imagen concreta de la mezcla preparada para ofrenda.
- source_word: וּפַר שֵׁנִי בֶן בָּקָר
  english_pob_choice: and you shall take a second young bull
  chosen_spanish: y tú tomarás un segundo novillo
  alternatives_spanish:
  - y tomarás un segundo novillo
  - y tú tomarás otro novillo
  lexicon: HALOT
  rationale: La segunda persona singular debe reflejarse en español con «tú». «Segundo» preserva el orden del hebreo y la relación con el primer animal.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - como expiación
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En contextos rituales sacerdotales, חַטָּאת puede significar la ofrenda expiatoria/purificatoria. Aquí se optó por «expiación» para mantener la amplitud semántica sin fijarla solo en el pecado moral.
theological_decisions:
- issue: Sentido de חַטָּאת en sacrificio sacerdotal
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: El POB inglés conserva «sin offering» en el texto y nota la alternativa «purification offering». En español, «expiación» deja abierta esa tensión cultual entre pecado y purificación sin forzar una sola lectura interpretativa.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que solo haya una nota al pie y que su marcador [a] aparezca exactamente en el texto principal. No se incluye ningún marcador no anclado.
  spanish_consistency_notes:
  - Se mantuvo la secuencia ritual con un futuro directivo natural en español.
  - 'Se prefirió una terminología cultual consistente: «novillo», «ofrenda vegetal», «flor de harina», «expiación».'
  - Se evitó el calco mecánico de «grain offering» para preservar el registro bíblico español sin perder el sentido ritual.
