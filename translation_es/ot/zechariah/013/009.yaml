translation:
  language: es
  text: 'Y haré pasar a la tercera parte por el fuego, y la refinaré como se refina la plata, y la probaré como se prueba el oro. Él invocará mi nombre, y yo le responderé. Diré: «Él es mi pueblo[a]», y él dirá: «Yahvé es mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con más fluidez en español: «Ellos son mi pueblo», ya que los pronombres singulares aquí representan colectivamente al remanente.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְּׁלִשִׁית
  english_pob_choice: the third part
  chosen_spanish: los
  alternatives_spanish:
  - la tercera parte
  - el tercio
  - la tercera
  lexicon: HALOT
  rationale: El contexto inmediato habla del remanente sobreviviente; en español, el pronombre plural en el resto de la frase comunica naturalmente ese colectivo. Aun así, el artículo implícito de 'la tercera parte' podría añadirse, pero en esta cláusula la fluidez y la referencia al grupo hacen preferible 'los' dentro de la secuencia verbal.
- source_word: בָּאֵשׁ
  english_pob_choice: through the fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - a través del fuego
  - en el fuego
  lexicon: HALOT
  rationale: Con הֵבֵאתִי, el sentido es de hacer pasar a través de una prueba de refinamiento. 'Por el fuego' transmite en español la experiencia de atravesar una prueba sin convertirla solo en ubicación.
- source_word: וּצְרַפְתִּים
  english_pob_choice: I will refine them
  chosen_spanish: los refinaré
  alternatives_spanish:
  - los purificaré
  - los fundiré/refinaré
  - los acrisolaré
  lexicon: HALOT
  rationale: צרף es el verbo técnico de refinar metales. 'Refinar' es el equivalente claro y natural; 'purificar' sería posible, pero desplaza un poco la imagen metalúrgica explícita por el paralelo con la plata.
- source_word: כִּצְרֹף אֶת־הַכֶּסֶף
  english_pob_choice: as silver is refined
  chosen_spanish: como se refina la plata
  alternatives_spanish:
  - como se refina la plata
  - como la plata es refinada
  - como quien refina la plata
  lexicon: HALOT
  rationale: La comparación conserva el proceso metalúrgico y sugiere una acción habitual/gnómica. La forma impersonal española suena natural y mantiene el valor comparativo del infinitivo constructo.
- source_word: וּבְחַנְתִּים
  english_pob_choice: and test them
  chosen_spanish: los probaré
  alternatives_spanish:
  - los examinaré
  - los pondré a prueba
  - los verificaré
  lexicon: HALOT
  rationale: בחן denota probar la autenticidad o calidad. 'Probar' encaja bien con el paralelo del oro y evita un matiz demasiado académico de 'examinar'.
- source_word: כִּבְחֹן אֶת־הַזָּהָב
  english_pob_choice: as gold is tested
  chosen_spanish: como se prueba el oro
  alternatives_spanish:
  - como se prueba el oro
  - como se examina el oro
  - como se ensaya el oro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la plata y la imagen de ensayo de metales preciosos. 'Probar' preserva la idea de autenticidad más que una simple observación.
- source_word: הוּא יִקְרָא בִשְׁמִי
  english_pob_choice: He will call on my name
  chosen_spanish: Él invocará mi nombre
  alternatives_spanish:
  - Él llamará mi nombre
  - Él llamará sobre mi nombre
  - Él clamará a mi nombre
  lexicon: HALOT
  rationale: קרא בשם puede significar invocar en oración o culto. 'Invocar' expresa con precisión ese uso religioso y mantiene la referencia al nombre divino sin sonar forzado en español.
- source_word: וַאֲנִי אֶעֱנֶה אֹתוֹ
  english_pob_choice: and I will answer him
  chosen_spanish: y yo le responderé
  alternatives_spanish:
  - y yo le responderé
  - y yo lo responderé
  - y yo responderé a él
  lexicon: HALOT
  rationale: El singular representa al remanente colectivo; el dativo 'le' conserva el carácter personal de la respuesta divina y suena más natural que repetir el objeto directo con 'lo'.
- source_word: עַמִּי הוּא
  english_pob_choice: He is my people
  chosen_spanish: Él es mi pueblo
  alternatives_spanish:
  - Él es mi pueblo
  - Ellos son mi pueblo
  - Es mi pueblo
  lexicon: HALOT
  rationale: En español, 'pueblo' exige una formulación más natural que la literalidad inglesa. Se conserva el singular representativo del hebreo con 'Él', mientras 'mi pueblo' mantiene la fórmula de alianza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre propio divino en español y evita la sustitución por un título.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: La confesión pactal final se traduce de forma directa y transparente. 'Mi Dios' conserva el vínculo personal y la fórmula de respuesta del pacto.
theological_decisions:
- issue: El singular representativo en los pronombres finales
  english_pob_reading: 'Retain the Hebrew representative singular: ''He is my people'' ... ''Yahweh is my God.'''
  chosen_spanish_reading: 'Mantener el singular representativo: «Él es mi pueblo» ... «Yahvé es mi Dios».'
  alternative_spanish_readings:
  - «Ellos son mi pueblo» ... «Yahvé es nuestro Dios»
  - «Este es mi pueblo» ... «Yahvé es mi Dios»
  rationale: El hebreo alterna entre plural y singular para expresar al remanente como una unidad representada por un singular. La traducción conserva esa tensión teológica en vez de suavizarla.
  doctrine_reference: Translation philosophy §3; §4
- issue: Forma de responder al nombre divino
  english_pob_reading: He will call on my name
  chosen_spanish_reading: Él invocará mi nombre
  alternative_spanish_readings:
  - Él llamará mi nombre
  - Él pronunciará mi nombre
  rationale: En este contexto no se trata solo de mencionar un nombre, sino de dirigirse a Yahvé en acto de dependencia y culto. 'Invocará' comunica mejor ese acto religioso.
  doctrine_reference: Uso bíblico de קרא בשם
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: Se mantiene la transliteración del nombre de pacto en lugar de ocultarlo tras 'Señor'. Esto preserva la identidad propia del Dios de Israel según la política del proyecto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en el último pase; no hubo revisiones aplicadas. El punto principal de atención sigue siendo la alternancia singular/plural del remanente y la traducción del nombre divino.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, coherente con el criterio general del proyecto.
  - Se prefirió «invocará» para קרא בשם por su valor cultual y oracional.
  - Se conservó el paralelismo metalúrgico con «refinará»/«probará» y «plata»/«oro».
  - Se mantuvo la tensión del singular representativo en la confesión final, sin normalizarla a plural.
