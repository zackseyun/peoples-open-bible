- from: Tomaron ciudades fortificadas y tierra fértil[a]; y se apoderaron de casas llenas de todo bien, cisternas labradas, viñas, olivos y árboles frutales en abundancia. Así comieron y se saciaron, engordaron[b][c], y se deleitaron en tu gran bondad.
  to: Capturaron ciudades fortificadas y tierra fértil[a], y tomaron posesión de casas llenas de todo bien, cisternas labradas, viñas, olivos y árboles frutales en abundancia. Así comieron y se saciaron, engordaron, y se deleitaron[b] en tu gran bondad[c].
  rationale: Se ajusta 'tomaron' a 'capturaron' para reflejar mejor לכד en contexto militar y se cambia 'se apoderaron de' por 'tomaron posesión de' para una correspondencia más neutra y precisa con ירשׁ. Se eliminó la nota redundante en 'se saciaron' y se redistribuyeron las notas alternativas para que correspondan correctamente a וַיִּתְעַדְּנוּ ('vivieron en lujo') y a בְּטוּבְךָ הַגָּדוֹל ('tu gran abundancia' como alternativa contextual a 'tu gran bondad').
