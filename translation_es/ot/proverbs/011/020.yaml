  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יהוה → «Yahvé» correctamente; «corazón» se mantiene literal; תּוֹעֲבַת → «abominación» preserva la fuerza; תְּמִימֵי דָרֶךְ → «íntegros en su camino» es una buena solución española para la idea de integridad/blamelessness. No hay conflicto doctrinal relevante.'
