theological_decisions:
- issue: Rendering מַלְאַךְ אֱלֹהִים in a passage where the 'angel of God' may function as a divine messenger closely identified with God
  chosen_reading: the angel of God
  alternative_readings:
  - an angel of God
  - God’s angel
  rationale: The translation preserves the Hebrew expression without resolving broader theological debates about the identity of the angel. This follows the principle of preserving theological tension rather than importing a more specific doctrinal conclusion than the text states.
  doctrine_reference: Translation philosophy §3
