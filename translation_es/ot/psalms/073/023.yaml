translation:
  language: es
  text: Pero yo estoy continuamente contigo[a]; tú has sostenido mi mano derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has tomado de la mano derecha» o «has sujetado mi mano derecha». El verbo hebreo puede destacar tanto el acto de asir como el sostén resultante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: Yet I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Pero yo
  - Mas yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: El hebreo introduce contraste con el contexto previo. En español, «Y yo» mantiene la primera persona y el giro contrastivo sin añadir una adversativa demasiado pesada para el tono poético.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  - de continuo
  lexicon: HALOT
  rationale: El adverbio expresa continuidad durativa. «Continuamente» conserva esa idea de permanencia y suena natural en español bíblico moderno.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto a ti
  - en tu presencia
  lexicon: HALOT
  rationale: La preposición con el sufijo pronominal expresa compañía o cercanía. «Contigo» es la forma natural en español y mantiene la relación personal directa.
- source_word: אָחַזְתָּ
  english_pob_choice: you have held
  chosen_spanish: has tomado
  alternatives_spanish:
  - has sujetado
  - has asido
  - has agarrado
  lexicon: HALOT
  rationale: El verbo puede significar tomar, asir o sujetar. En este contexto de apoyo divino, «has tomado» comunica el acto de agarrar y sostener sin sonar brusco en español, y permite la misma tensión entre acción puntual y efecto duradero que el perfecto hebreo.
- source_word: בְּיַד
  english_pob_choice: my ... hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - la mano de mí
  - mi mano derecha
  lexicon: HALOT
  rationale: La construcción hebrea señala el objeto agarrado. En español, la relación queda naturalmente expresada con «mi mano» dentro de la frase verbal.
- source_word: יְמִינִי
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - mano diestra
  - lado derecho
  lexicon: HALOT
  rationale: El sustantivo nombra específicamente la mano derecha. «Mano derecha» conserva la imagen concreta de guía y sostén.
theological_decisions:
- issue: Matiz aspectual del perfecto hebreo en la acción divina
  english_pob_reading: you have held my right hand
  chosen_spanish_reading: tú has tomado mi mano derecha
  alternative_spanish_readings:
  - tú tomaste mi mano derecha
  - tú sostienes mi mano derecha
  - tú has sujetado mi mano derecha
  rationale: 'El perfecto puede expresar una acción ya realizada con vigencia presente. «Has tomado» deja abierta esa doble referencia: un acto de apoyo ya efectuado y cuya consecuencia permanece en la relación del creyente con Dios.'
  doctrine_reference: Translation philosophy §1, §3, §6
