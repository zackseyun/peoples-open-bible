translation:
  language: es
  text: 'Y lo pondré en manos de tus atormentadores[a], que te[c] dijeron: «Agáchate, para que pasemos»[d]; y pusiste tu espalda como el suelo[b], y como la calle para los que pasan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la copa o cáliz de aturdimiento/juicio mencionado en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «los que te oprimen».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «a tu alma», un giro idiomático que significa «a ti».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «para que pasemos por encima»; el hebreo probablemente evoca a personas que la pisan en humillación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּיהָ
  english_pob_choice: And I will put it
  chosen_spanish: Y pondré eso
  alternatives_spanish:
  - Y lo pondré
  - Y lo colocaré
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar. «Pondré» es natural y conserva el objeto pronominal implícito. «Eso» mantiene la referencia inmediata al cáliz de juicio del contexto previo sin expandir el verso.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - en poder de
  lexicon: HALOT
  rationale: La expresión transmite entrega al control de otros. «En manos de» es una equivalencia idiomática clara en español y mantiene el sentido de transferencia de poder.
- source_word: מוֹגַיִךְ
  english_pob_choice: those who torment you
  chosen_spanish: tus atormentadores
  alternatives_spanish:
  - los que te afligen
  - los que te oprimen
  - los que te atormentan
  lexicon: HALOT
  rationale: El sustantivo designa a quienes causan daño o aflicción. «Atormentadores» sigue la revisión inglesa que estrecha el matiz hacia el daño opresivo. Se deja abierta la alternativa «afligen/oprimen» para reflejar la amplitud léxica.
- source_word: אֲשֶׁר אָמְרוּ לְנַפְשֵׁךְ
  english_pob_choice: who said to you
  chosen_spanish: que te dijeron
  alternatives_spanish:
  - que dijeron a tu alma
  - que dijeron a ti
  lexicon: HALOT
  rationale: נֶפֶשׁ funciona idiomáticamente como la persona misma. «Te dijeron» comunica el sentido natural en español sin perder la relación directa del discurso; la opción más literal «a tu alma» se reserva en nota.
- source_word: שְׁחִי
  english_pob_choice: Bow down
  chosen_spanish: Agáchate
  alternatives_spanish:
  - Inclínate
  - Baja
  - Hazte abajo
  lexicon: HALOT
  rationale: El imperativo exige humillación física. «Agáchate» es una forma viva en español y conserva la imagen corporal de someterse para que otros pasen sobre ella.
- source_word: וְנַעֲבֹרָה
  english_pob_choice: that we may pass over
  chosen_spanish: para que pasemos
  alternatives_spanish:
  - para que pasemos sobre ti
  - y pasemos por encima
  - para que podamos pasar
  lexicon: HALOT
  rationale: El cohortativo expresa propósito. «Para que pasemos» es natural y suficiente; el matiz de pasar sobre ella queda implícito por el contexto inmediato de humillación, aunque puede explicitarse en nota.
- source_word: וַתָּשִׂימִי
  english_pob_choice: and you made
  chosen_spanish: y pusiste
  alternatives_spanish:
  - y hiciste
  - y colocaste
  - y dejaste
  lexicon: HALOT
  rationale: Aquí שׂים introduce el resultado de la humillación. «Pusiste» conserva el verbo básico y permite la construcción predicativa con los complementos siguientes.
- source_word: כָאָרֶץ
  english_pob_choice: like the ground
  chosen_spanish: como la tierra
  alternatives_spanish:
  - como el suelo
  - como el piso
  - como la tierra del suelo
  lexicon: HALOT
  rationale: En español «tierra» reproduce bien la imagen de algo pisoteado. «Suelo» sería también posible, pero «tierra» mantiene mejor la amplitud del hebreo y la fuerza poética del paralelo.
- source_word: גֵּוֵךְ
  english_pob_choice: your back
  chosen_spanish: tu espalda
  alternatives_spanish:
  - tu dorso
  - tu cuerpo
  - tu espalda/dorso
  lexicon: HALOT
  rationale: El sustantivo alude al dorso o espalda expuesta a ser pisada. «Espalda» es la forma más clara y natural en español para la imagen de humillación corporal.
- source_word: וְכַחוּץ
  english_pob_choice: and like the street
  chosen_spanish: y como la calle
  alternatives_spanish:
  - y como una calle
  - y como el camino
  - y como la vía
  lexicon: HALOT
  rationale: חוּץ puede referirse al espacio exterior o a la calle/espacio público. «Calle» preserva la imagen de paso continuo y encaja con el paralelo de los transeúntes.
- source_word: לָעֹבְרִים
  english_pob_choice: for those passing by
  chosen_spanish: para los que pasan
  alternatives_spanish:
  - para los transeúntes
  - para los que van pasando
  - para los que pasan por allí
  lexicon: HALOT
  rationale: El participio describe a los que van pasando. «Los que pasan» es directo y mantiene el flujo del verso; «transeúntes» sería más compacto, pero menos transparente en un registro bíblico amplio.
theological_decisions:
- issue: Referente del objeto implícito en «Y pondré eso»
  english_pob_reading: The pronoun refers to the cup/bowl of divine wrath from the immediate preceding context, left as 'it' rather than expanded in the main text.
  chosen_spanish_reading: El objeto implícito se refiere al cáliz/copa del juicio divino del contexto inmediato, pero se deja como «eso» en el texto principal.
  alternative_spanish_readings:
  - Y pondré la copa
  - Y pondré el cáliz
  - Y pondré aquello
  rationale: El hebreo conserva la referencia pronominal; el español puede mantenerla sin añadir un sustantivo no presente en el verso. La expansión explicativa quedaría para una nota, no para el texto principal.
  doctrine_reference: Isaías 51:22-23; continuidad contextual del juicio de Yahvé
translation_notes:
  revision_awareness: La redacción inglesa más reciente sustituyó «afflict you» por «torment you» para ajustar con mayor fuerza léxica el daño de los opresores, y simplificó «so that» a «that» en la cláusula de propósito. La versión española sigue esa línea de mayor intensidad semántica con «atormentadores» y mantiene una cláusula final natural en español, sin perder la imagen de pasar sobre ella.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto, aunque este versículo no lo contiene explícitamente.
  - «Espalda» traduce el valor imagético de גֵּוֵךְ de modo claro y natural; no se usa «dorso» por ser menos común.
  - Se evita «SEÑOR» y «Cristo» por no ser pertinentes aquí.
  - La puntuación y comillas siguen el uso español estándar; se conservan las notas al pie con anclajes [a]-[d] en el texto.
