translation:
  language: es
  text: Cuando todo Jabes de Galaad oyó todo lo que los filisteos habían hecho a Saúl[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los habitantes de Jabes de Galaad». El hebreo dice literalmente «todo Jabes de Galaad».
    reason: lexical_alternative
  - marker: b
    text: O «lo que los filisteos habían hecho contra Saúl».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyó
  alternatives_spanish:
  - Y ... oyó
  - Entonces ... oyó
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Cuando» expresa mejor la relación temporal y prepara la acción que continúa en el versículo siguiente, sin perder la secuencia del hebreo.
- source_word: כֹּל יָבֵישׁ גִּלְעָד
  english_pob_choice: all Jabesh-gilead
  chosen_spanish: todo Jabes-galaad
  alternatives_spanish:
  - todos los habitantes de Jabes-galaad
  - toda la gente de Jabes-galaad
  lexicon: HALOT
  rationale: Mantengo la construcción literal con el topónimo compuesto para conservar la transparencia del hebreo. En español, el singular colectivo «todo Jabes-galaad» refleja la forma del original, aunque el referente son sus habitantes.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: «Todo lo que» reproduce con naturalidad la amplitud total de la construcción hebrea sin añadir matices no presentes en el texto.
- source_word: עָשׂוּ
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - hicieron
  - habían realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa con claridad que la acción de los filisteos es anterior al acto de oír, siguiendo el valor temporal que la POB inglesa marcó con «had done».
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Se usa el etnónimo español corriente y transparente para este pueblo.
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - contra Saúl
  - para Saúl
  lexicon: HALOT
  rationale: La preposición hebrea ל con עשה señala al afectado por la acción. «A Saúl» conserva esa relación de manera directa; «contra Saúl» sería más interpretativo de lo que exige el hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el texto fuente; por ello, el borrador conserva la estructura breve y narrativa del hebreo sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el topónimo «Jabes-galaad» en forma unida y con guion para reflejar el nombre compuesto de manera legible en español.
  - Se usa el pluscuamperfecto («habían hecho») porque la acción de los filisteos antecede al oír de Jabes-galaad.
