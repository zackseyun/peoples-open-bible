base_translation:
  language: en
  yaml_path: translation/ot/isaiah/053/002.yaml
  text: For he grew up before him like a young plant[a], and like a root out of dry ground. He had no form or majesty that we should look at him[c][b], and no appearance that we should desire him.
  footnotes:
