translation:
  language: es
  text: el que edifica a Sion con sangre y a Jerusalén con injusticia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con derramamiento de sangre»; el plural hebreo suele referirse idiomáticamente a sangre derramada o a culpabilidad de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּנֶה
  english_pob_choice: who builds
  chosen_spanish: el que edifica
  alternatives_spanish:
  - quien construye
  - el que construye
  - el que edifica
  lexicon: HALOT
  rationale: El participio masculino singular se presenta como una caracterización del sujeto denunciado. En español, "el que edifica" reproduce bien el valor de rasgo/identidad del participio y suena natural en una acusación profética.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  - Zion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en forma reconocible para el español bíblico. "Sion" es la grafía más estable y readable en español, sin perder la referencia al lugar.
- source_word: בְּדָמִים
  english_pob_choice: with bloodshed
  chosen_spanish: con sangre
  alternatives_spanish:
  - con derramamiento de sangre
  - con sangre derramada
  - con sangre y violencia
  lexicon: HALOT
  rationale: El hebreo plural "sangres" apunta idiomáticamente a sangre derramada o violencia sangrienta. En español, "con sangre" mantiene la fuerza breve del hebreo y deja la expresión profética abierta; la nota recoge la alternativa idiomática explícita.
- source_word: וִירוּשָׁלִַם
  english_pob_choice: and Jerusalem
  chosen_spanish: y a Jerusalén
  alternatives_spanish:
  - y Jerusalén
  - y a la Jerusalén
  lexicon: HALOT
  rationale: El complemento directo coordinado en español fluye mejor con la preposición "a" ante el nombre propio de ciudad en esta construcción verbal. Se mantiene el paralelismo con Sion y la referencia geográfica explícita.
- source_word: בְּעַוְלָה
  english_pob_choice: with injustice
  chosen_spanish: con injusticia
  alternatives_spanish:
  - con perversidad
  - con maldad
  - con iniquidad
  lexicon: HALOT
  rationale: '"Injusticia" transmite con claridad la carga ética y judicial de עַוְלָה en el contexto de denuncia profética. Evita arcaísmos innecesarios y conserva el sentido de trato torcido o injusto.'
theological_decisions:
- issue: Sentido idiomático de "con sangre" / "with bloodshed"
  english_pob_reading: The verse indicts the city's leaders for establishing Zion/Jerusalem through violent and unjust means, not literally constructing with blood.
  chosen_spanish_reading: La frase se entiende como una acusación de edificar Sion y Jerusalén por medios violentos, no como construcción literal con sangre.
  alternative_spanish_readings:
  - edifica literalmente con sangre
  - con sangre derramada, de forma explícita
  rationale: El hebreo plural de "sangre" funciona idiomáticamente para referirse a derramamiento de sangre o culpabilidad sangrienta. La lectura elegida preserva la denuncia profética sin volverla extraña o engañosamente literal.
  doctrine_reference: Ética profética y justicia social en la denuncia de pecado estructural
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó estable tras el control de concordancia alta. La presente propuesta sigue esa línea, priorizando la equivalencia óptima y manteniendo la tensión idiomática de "sangre" en nota.
  spanish_consistency_notes:
  - Se usa "Sion" como forma bíblica estable en español.
  - Se mantiene "Jerusalén" con acento ortográfico estándar del español.
  - Se evita "SEÑOR" porque el verso no contiene el Tetragrámaton ni κύριος en el texto fuente inmediato.
  - Se conserva la acusación ética con "injusticia" en paralelo con "sangre" para reflejar el paralelismo hebreo.
