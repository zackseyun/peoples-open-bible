base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/001.yaml
  text: Again the anger of Yahweh burned against Israel[a], and he incited David against them, saying, “Go[b], count Israel and Judah.”
  footnotes:
  - marker: a
    text: 1 Chronicles 21:1 says that Satan stood against Israel and incited David. The main text here follows the plain subject of the Hebrew in 2 Samuel and preserves the tension between the accounts rather than harmonizing them.
    reason: cross_reference
