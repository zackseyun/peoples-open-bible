translation:
  language: es
  text: Vagaron ciegos por las calles[a], contaminados con sangre[b], de modo que no pudieron tocar sus ropas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vagaron como ciegos por las calles». El hebreo es condensado y puede entenderse con un matiz comparativo más explícito: «como ciegos».'
    reason: alternative_reading
  - marker: b
    text: «Contaminados con sangre» probablemente conserva lenguaje de impureza, no solo la idea de estar manchados físicamente de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָעוּ
  english_pob_choice: they wandered
  chosen_spanish: se tambalearon
  alternatives_spanish:
  - vagaron
  - anduvieron errantes
  - se fueron tambaleando
  lexicon: HALOT
  rationale: El hebreo expresa movimiento inestable o errante. En español, 'se tambalearon' conserva la idea de marcha desorientada y debilitada, cercana al matiz de 'wandered' en el contexto lamentoso, sin suavizar el cuadro.
- source_word: עִוְרִים
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - como ciegos
  - los ciegos
  - cegados
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo funciona como 'ciegos' o 'hombres ciegos'. En español, 'ciegos' es natural y mantiene la imagen directa. No se añadió 'como' porque el hebreo no trae un comparativo explícito.
- source_word: בַּחוּצוֹת
  english_pob_choice: through the streets
  chosen_spanish: por las calles
  alternatives_spanish:
  - en las calles
  - por las plazas
  - por las vías
  lexicon: HALOT
  rationale: חוּצוֹת alude a calles o espacios abiertos de la ciudad. 'Por las calles' reproduce bien el movimiento del verbo y es idiomático en español.
- source_word: נְגֹאֲלוּ
  english_pob_choice: defiled
  chosen_spanish: contaminados
  alternatives_spanish:
  - profanados
  - impurificados
  - manchados
  lexicon: HALOT
  rationale: El pasivo nifal aquí tiene fuerte valor de impureza ritual, no solo mancha física. 'Contaminados' comunica esa contaminación, aunque 'profanados' o 'impurificados' también serían posibles. Se evita reducirlo a simple suciedad.
- source_word: בַּדָּם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - en sangre
  - por sangre
  lexicon: HALOT
  rationale: La preposición indica la materia o medio de la contaminación. 'Con sangre' es la forma más clara y directa en español.
- source_word: בְּלֹא יוּכְלוּ
  english_pob_choice: so that they could not
  chosen_spanish: de modo que no pudieron
  alternatives_spanish:
  - hasta no poder
  - sin poder
  - de forma que no podían
  lexicon: HALOT
  rationale: 'El hebreo es sintácticamente comprimido. La lectura de POB entiende una consecuencia: por la contaminación sanguínea, quedaron impedidos. ''De modo que no pudieron'' expresa esa consecuencia con naturalidad y mantiene el sujeto del verbo.'
- source_word: יִגְּעוּ
  english_pob_choice: touch
  chosen_spanish: tocar
  alternatives_spanish:
  - rozar
  - tomar
  - alcanzar
  lexicon: HALOT
  rationale: נגע significa 'tocar' o 'alcanzar'. 'Tocar' es la opción más directa y encaja con el lenguaje de impureza por contacto.
- source_word: בִּלְבֻשֵׁיהֶם
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus mantos
  lexicon: HALOT
  rationale: לְבוּשׁ designa ropa o vestidura. 'Vestidos' mantiene un registro elevado y literario, adecuado al tono poético del lamento.
theological_decisions:
- issue: Matiz de impureza ritual en 'defiled with blood'
  english_pob_reading: '''Defiled with blood'' likely carries impurity language, not merely the idea of being physically bloodstained.'
  chosen_spanish_reading: '''Contaminados con sangre'' conserva el matiz de impureza, no solo de mancha física.'
  alternative_spanish_readings:
  - manchados de sangre
  - ensuciados con sangre
  - impurificados con sangre
  rationale: En el contexto del lamento, el verbo no describe únicamente apariencia externa. 'Contaminados' mantiene la fuerza de impureza/contagio que la nota inglesa señala, sin volverlo excesivamente técnico.
  doctrine_reference: Pureza ritual en el AT; Levítico 15; Números 19
- issue: Sujeto explícito en la cláusula final
  english_pob_reading: The Hebrew is compressed, and the subject of 'could not touch' is not explicit.
  chosen_spanish_reading: '''de modo que no pudieron tocar sus vestidos'' mantiene el sujeto implícito del hebreo sin añadir ''nadie''.'
  alternative_spanish_readings:
  - de modo que nadie pudo tocar sus vestidos
  - de modo que no se pudo tocar sus vestidos
  rationale: La revisión inglesa corrigió la lectura anterior para respetar el sujeto gramatical del hebreo. En español, conservar 'no pudieron' refleja mejor que el impedimento recae en ellos, sin introducir un sujeto ajeno al texto.
  doctrine_reference: Gramática hebrea; corrección de la revisión auditada
translation_notes:
  revision_awareness: La versión inglesa auditada revisó la cláusula final de 'they could not touch' para ajustarla al sujeto hebreo, en lugar de 'no one could touch'. La redacción española sigue esa decisión y evita introducir un sujeto impersonal externo. También se tuvo en cuenta la nota inglesa sobre la contaminación con sangre como impureza ritual, no meramente física.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal del nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se eligió 'tocar' para נגע por coherencia con el lenguaje de impureza por contacto en español bíblico.
  - '''Vestidos'' mantiene un registro poético y evita una reducción demasiado coloquial de בִּלְבֻשֵׁיהֶם.'
  - 'Se preserva el paralelismo de dos miembros: movimiento desorientado + contaminación sanguínea + impedimento final.'
