lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: And he died
  chosen_spanish: Y murió
  alternatives_spanish:
  - Entonces murió
  - Así murió
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente evento en secuencia. En español, «Y murió» reproduce bien esa continuidad narrativa sin añadir una conclusión interpretativa.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en su forma castellana habitual.
- source_word: זָקֵן
  english_pob_choice: old
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - de edad avanzada
  lexicon: HALOT
  rationale: El adjetivo describe de manera directa la edad de Job. «Viejo» es breve y fiel; «anciano» puede sonar más honorífico que el hebreo aquí.
- source_word: וּשְׂבַע יָמִים
  english_pob_choice: full of days
  chosen_spanish: satisfecho de días
  alternatives_spanish:
  - lleno de días
  - habiendo tenido su lleno de días
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo de muerte que indica una vida completa. «Satisfecho de días» preserva mejor la imagen idiomática que una paráfrasis como «vivió una vida plena».
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales o interpretativas relevantes en el expediente proporcionado; la redacción sigue de cerca el hebreo y el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene el nombre «Job» en la forma castellana habitual.
  - Se conserva la imagen idiomática de la muerte con «satisfecho de días» y se explica en nota.
  - El orden breve y narrativo respeta el tono de la noticia de muerte sin añadir solemnización extra.
