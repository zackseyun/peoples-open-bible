lexical_decisions:
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Symeon
  lexicon: LSJ
  rationale: Es un nombre propio; en español la forma natural y reconocible es «Simón». «Symeon» es posible como transliteración más cercana a otra tradición nominal, pero aquí no hace falta romper el uso habitual.
- source_word: ὁ καλούμενος
  english_pob_choice: who was called
  chosen_spanish: el llamado
  alternatives_spanish:
  - el que era llamado
  - el nombrado
  lexicon: BDAG
  rationale: El participio con artículo identifica al personaje por un sobrenombre o epíteto. «El llamado» conserva esa función atributiva de manera breve y natural en español, sin añadir interpretación.
- source_word: Θασσίς
  english_pob_choice: Thassi
  chosen_spanish: Tassis
  alternatives_spanish:
  - Thassi
  - Tasís
  lexicon: LSJ
  rationale: Es un epíteto/nombre propio que debe transliterarse. «Tassis» mantiene la forma griega con una adaptación ortográfica fluida para el español; «Thassi» preserva más la transliteración inglesa, pero resulta menos natural en español.
translation_notes:
  revision_awareness: El paquete fuente presenta acuerdo alto y no registra revisiones aplicadas; por eso se conserva una solución breve y directa, sin añadir glosas ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene el nombre propio en forma hispanizada («Simón») y el epíteto como transliteración («Tassis»), siguiendo el criterio de transparencia para nombres propios.
  - La cláusula atributiva se vierte con un giro natural en español, pero se documenta la alternativa más literal en nota para preservar la tensión léxica del griego.
