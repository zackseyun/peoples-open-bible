  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de traducir שָׂטָן como «acusador» en vez de «Satanás» está bien alineada con la evidencia fuente y con la rationale teológica documentada. No hay términos del glosario mayor que requieran ajuste adicional.
