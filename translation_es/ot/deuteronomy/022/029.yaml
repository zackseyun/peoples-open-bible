base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/022/029.yaml
  text: Then the man who lay with her shall give fifty shekels of silver to the young woman's father[a], and she shall become his wife because he has violated her[b]. He may not send her away all his days.
  footnotes:
  - marker: a
    text: Or 'because he has humbled/debased her.' The Hebrew verb can be rendered more literally this way, but in this context it refers to sexual violation.
    reason: lexical_alternative
  - marker: b
    text: '''Send her away'' refers to dismissing or divorcing her.'
    reason: lexical_alternative
