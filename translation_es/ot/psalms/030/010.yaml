  to: ¿Qué provecho hay en mi sangre[a], cuando yo baje a la fosa[b]? ¿Te alabará el polvo? ¿Declarará tu fidelidad[c]?
  rationale: La revisión restaura la imaginería concreta documentada para שׁחת mediante «la fosa» en lugar de «el sepulcro», y reemplaza la expresión algo calcada «en mi descender» por «cuando yo baje», que conserva el sentido del hebreo con mejor fluidez poética en español. Se mantienen «sangre», «polvo» y «fidelidad» según las decisiones auditadas, y se reordenan las alternativas de la nota b para que el texto principal refleje la opción más fiel al expediente.
