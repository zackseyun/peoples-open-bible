translation:
  language: es
  text: Y cuando apareció[a], habiendo invocado a Dios, el que vela por todos[b] y Salvador, tomó a las dos doncellas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando se había hecho visible». La frase participial griega también puede traducirse de forma más literal así.
    reason: lexical_alternative
  - marker: b
    text: O «el vigilante de todos» o «el Dios que todo lo ve». El griego expresa que Dios observa y cuida de todos.
    reason: lexical_alternative
  - marker: c
    text: «Doncellas» se refiere a las acompañantes femeninas que iban con Ester.
    reason: cultural_note
lexical_decisions:
- source_word: γενηθεῖσα ἐπιφανής
  english_pob_choice: when she had become visible
  chosen_spanish: cuando se había hecho visible
  alternatives_spanish:
  - cuando apareció
  - habiendo llegado a ser visible
  - cuando se manifestó
  lexicon: LSJ
  rationale: La frase participial indica un cambio desde el ocultamiento hacia la aparición pública. «Se había hecho visible» conserva ese movimiento y mantiene la transparencia respecto del griego, sin cargar el sentido hacia «aparición» solemne o «manifestación» teológica.
- source_word: ἐπικαλεσαμένη
  english_pob_choice: having called upon
  chosen_spanish: habiendo invocado
  alternatives_spanish:
  - después de invocar
  - habiendo llamado a
  - tras invocar
  lexicon: BDAG
  rationale: El participio medio expresa invocación en contexto de oración. «Habiendo invocado» refleja bien la relación participial con el verbo principal y mantiene el registro devocional del texto.
- source_word: τὸν πάντων ἐπόπτην θεὸν
  english_pob_choice: God, the overseer of all
  chosen_spanish: Dios, el supervisor de todos
  alternatives_spanish:
  - Dios, el vigilante de todos
  - Dios, el que ve todo
  - el Dios que todo lo ve
  lexicon: LSJ
  rationale: ἐπόπτης designa a quien observa o supervisa. «Supervisor de todos» preserva el valor relacional y de vigilancia universal sin convertirlo en una paráfrasis más libre como «el que todo lo ve». Aunque «supervisor» es menos tradicional, refleja mejor la elección POB y el título descriptivo del griego.
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - salvador
  lexicon: BDAG
  rationale: «Salvador» es la forma española natural y digna para σωτήρ en este contexto religioso. Mantiene el paralelismo con el título anterior y conserva el registro elevado de la oración de Ester.
- source_word: παρελαβεν
  english_pob_choice: she took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - tomó consigo
  - recibió
  lexicon: LSJ
  rationale: El verbo aquí indica que Ester tomó a las dos jóvenes para acompañarla. «Tomó» es breve, exacto y fiel; en español, añadir «consigo» sería posible, pero no está exigido por el griego y podría recargar la frase.
- source_word: τὰς δύο ἅβρας
  english_pob_choice: the two maids
  chosen_spanish: las dos doncellas
  alternatives_spanish:
  - las dos sirvientas
  - las dos jóvenes criadas
  - las dos damas de compañía
  lexicon: LSJ
  rationale: ἅβρα se refiere a una joven sirvienta o acompañante femenina. «Doncellas» mantiene un tono literario y bíblico comprensible en español, y evita el matiz más doméstico de «sirvientas»; también refleja la nota cultural de acompañantes femeninas.
theological_decisions:
- issue: 'Títulos divinos en aposición: ἐπόπτην θεὸν καὶ σωτῆρα'
  english_pob_reading: God, the overseer of all and Savior
  chosen_spanish_reading: Dios, el supervisor de todos y Salvador
  alternative_spanish_readings:
  - Dios, que vigila a todos, y Salvador
  - el Dios que todo lo ve y Salvador
  rationale: La construcción griega presenta dos predicados/títulos ligados a Dios. Mantener ambos en aposición evita fusionarlos en una sola paráfrasis y conserva la tensión entre vigilancia universal y acción salvífica. «Supervisor» es menos eclesiástico que «obispo» y menos interpretativo que «el que todo lo ve»; por eso respeta mejor la relación con el griego.
  doctrine_reference: Preservar la tensión teológica y la estructura del título divino sin resolverla en una fórmula tradicional fijada por la costumbre.
translation_notes:
  revision_awareness: 'Se siguió la última revisión del audit trail: se prefirió una forma participial más formal en español para ἐπικαλεσαμένη y se mantuvo una traducción directa y sobria de παρελαβεν como «tomó». La opción inglesa «visible» se reflejó en «se había hecho visible» para conservar la idea de pasar de ocultamiento a aparición pública.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «Salvador» para σωτῆρα, conforme al criterio del proyecto.
  - Se evitó «SEÑOR» porque el texto griego no contiene κύριος en este versículo.
  - Se usó «doncellas» como equivalente de una acompañante femenina joven, en lugar de un término eclesiástico o demasiado moderno.
  - Se preservó la aposición de los títulos divinos sin convertirla en una glosa interpretativa.
