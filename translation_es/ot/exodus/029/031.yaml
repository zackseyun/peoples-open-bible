translation:
  language: es
  text: Tomarás el carnero[a] de la ordenación y hervirás su carne en un lugar santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el carnero de la consagración». El término hebreo se refiere al rito de instalación sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O, «en el Lugar Santo», aunque el hebreo dice más literalmente «en un lugar santo».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - macho ovino
  lexicon: HALOT
  rationale: En español, "carnero" es el equivalente natural y tradicional para el animal sacrificial hebreo אֵיל. Mantiene el referente zoológico y cultual sin sonar excesivamente técnico.
- source_word: הַמִּלֻּאִים
  english_pob_choice: of ordination
  chosen_spanish: de la ordenación
  alternatives_spanish:
  - de la consagración
  - de la investidura
  lexicon: HALOT
  rationale: El contexto sacerdotal exige un término ritual/funcional. "Ordenación" comunica bien la instalación oficial en el oficio, preservando la idea técnica del rito sin reducirla a una simple santificación abstracta.
- source_word: תִּקָּח
  english_pob_choice: you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Deberás tomar
  - has de tomar
  lexicon: HALOT
  rationale: 'El imperfecto segundo masculino singular en instrucción se expresa de forma natural en español con futuro exhortativo: "Tomarás". Conserva el valor directivo del mandato.'
- source_word: וּבִשַּׁלְתָּ
  english_pob_choice: and boil
  chosen_spanish: y hervirás
  alternatives_spanish:
  - y cocinarás
  - y cocerás
  lexicon: HALOT
  rationale: Aquí el verbo denota cocer/hervir en líquido. "Hervirás" es más preciso que el genérico "cocinarás" y sigue el matiz culinario-cúltico del hebreo.
- source_word: בְּשָׂר֖וֹ
  english_pob_choice: its flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su carne sacrificada
  - su cuerpo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "su carne", en español "carne" comunica de manera más natural el sentido sacrificial. "Flesh" en español bíblico puede sonar arcaico o ambiguo, mientras que "carne" conserva el valor literal suficiente.
- source_word: בְּמָקֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el Lugar Santo
  lexicon: HALOT
  rationale: Se refleja la ausencia de artículo en hebreo con "un lugar santo". Se evita "el Lugar Santo" porque introduciría la identificación técnica con el recinto tabernacular que el hebreo no obliga a inferir.
theological_decisions:
- issue: Término técnico הַמִּלֻּאִים en el rito sacerdotal
  english_pob_reading: the ram of ordination
  chosen_spanish_reading: el carnero de la ordenación
  alternative_spanish_readings:
  - el carnero de la consagración
  - el carnero de la investidura
  rationale: Se conserva el valor técnico del rito de instalación sacerdotal. "Ordenación" es inteligible en español y mantiene la función ceremonial señalada por el contexto sin borrar la dimensión de consagración.
  doctrine_reference: Éxodo 29; principios de precisión terminológica en ritos sacerdotales
- issue: Alcance de בְּמָקוֹם קָדֹשׁ
  english_pob_reading: in a holy place
  chosen_spanish_reading: en un lugar santo
  alternative_spanish_readings:
  - en el Lugar Santo
  - en un lugar sagrado
  rationale: El hebreo carece de artículo definido, por lo que la lectura genérica es la más fiel. Evita convertir la frase en un nombre técnico de una cámara del santuario sin base explícita en el texto.
  doctrine_reference: Éxodo 29:31; distinción entre lugar genérico y recinto técnico del tabernáculo
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto hebreo y el expediente auditado en inglés. Mantiene las dos tensiones documentadas: הַמִּלֻּאִים como término técnico de ordenación/consagración, y בְּמָקוֹם קָדֹשׁ como expresión genérica sin forzarla al nombre técnico "Lugar Santo".'
  spanish_consistency_notes:
  - Se usó "Yahvé" cuando corresponda en el proyecto, pero este versículo no lo contiene.
  - Se prefirió "carnero" por ser el equivalente cultual natural de אֵיל en español bíblico.
  - Se evitó "SEÑOR" y "Lugar Santo" como formas de normalización no requeridas por el hebreo.
  - La puntuación y el orden siguen el estilo bíblico moderno en español sin añadir contenido interpretativo.
