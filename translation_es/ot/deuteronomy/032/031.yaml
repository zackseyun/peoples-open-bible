lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del dicho anterior; «porque» conserva bien la relación explicativa sin añadir énfasis no requerido.
- source_word: כְּצוּרֵנוּ
  english_pob_choice: like our Rock
  chosen_spanish: como nuestra Roca
  alternatives_spanish:
