review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en casi todos los elementos: «matanza», «cautiverio», «desolación», «herencia», «entre las naciones», «serviremos como esclavos», «piedra de tropiezo», «oprobio» y «quienes nos poseen» preservan bien el sentido fuente. Sin embargo, la anotación de nota [a] está mal anclada: el contenido de esa nota trata la alternativa sobre el verbo singular implícito («volverá/caerá sobre nuestras cabezas»), no sobre «nuestros hermanos». Además, el texto español conserva «allí» después de «donde serviremos como esclavos», lo cual es posible por el griego, pero en español suena algo pesado; puede mantenerse con nota léxica o aligerarse sin pérdida. La mejor reparación es reanclar las notas para que reflejen correctamente la evidencia fuente y la auditoría inglesa.'
  spanish_quality_summary: 'El español es mayormente claro, digno y natural. La principal falla es de aparato crítico, no de traducción base: la nota [a] crea confusión semántica al aparecer sobre «nuestros hermanos». También conviene evitar una doble nota innecesaria sobre el mismo punto verbal. Con una redistribución simple de notas, el verso queda legible y fiel.'
  glossary_alignment: Alinea bien con las pautas del proyecto. No hay conflicto con terminología teológica central. «Serviremos como esclavos» respeta la política para la familia δοῦλος/δουλεύω en contexto de cautiverio. «Herencia» preserva la resonancia de κληρονομία. «Quienes nos poseen» sigue de cerca κτωμένων sin sobrerresolverlo.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «nuestros hermanos», pero su contenido trata el verbo singular implícito de «volverá».
    rationale: Esto desorienta al lector y no preserva correctamente la racionalidad documentada en la auditoría inglesa, donde la nota se refiere a la cláusula verbal, no a ἀδελφῶν.
  - severity: low
    issue: Hay dos notas consecutivas sobre el mismo fenómeno verbal implícito.
    rationale: La nota [a] y la [b] se solapan; conviene simplificar el aparato para mayor claridad y economía editorial.
  - severity: low
    issue: «allí» después de «donde serviremos como esclavos» es algo rígido en español.
    rationale: El griego incluye ἐκεῖ y la auditoría inglesa lo preserva con nota alternativa; en español puede mantenerse, pero requiere una formulación cuidada y una nota bien ubicada para no sonar torpe.
