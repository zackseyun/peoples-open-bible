base_translation:
  language: en
  yaml_path: translation/ot/genesis/008/021.yaml
  text: And Yahweh smelled the pleasing aroma[a], and Yahweh said in his heart, “I will never again curse the ground because of man, for the inclination of man’s heart is evil from his youth[d][c][b]. And I will never again strike down every living thing as I have done.”
  footnotes:
