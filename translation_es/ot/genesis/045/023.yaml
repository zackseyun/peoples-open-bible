  text: וּ/לְ/אָבִ֞י/ו שָׁלַ֤ח כְּ/זֹאת֙ עֲשָׂרָ֣ה חֲמֹרִ֔ים נֹשְׂאִ֖ים מִ/טּ֣וּב מִצְרָ֑יִם וְ/עֶ֣שֶׂר אֲתֹנֹ֡ת נֹֽ֠שְׂאֹת בָּ֣ר וָ/לֶ֧חֶם וּ/מָז֛וֹן לְ/אָבִ֖י/ו לַ/דָּֽרֶךְ׃
