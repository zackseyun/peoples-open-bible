translation:
  language: es
  text: No sigan hablando con tanta arrogancia; no salga insolencia de su boca[a], porque Yahvé es un Dios que sabe, y por él se pesan las acciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y las acciones no se pesan». El texto consonántico permite esa lectura, pero el sentido tradicional y contextual entiende que Yahvé evalúa las obras humanas.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תַּרְבּוּ תְדַבְּרוּ
  english_pob_choice: Do not keep speaking
  chosen_spanish: No hablen tanto
  alternatives_spanish:
  - No sigan hablando
  - No hablen sin cesar
  - No multipliquen sus palabras
  lexicon: HALOT
  rationale: 'La combinación hebrea intensifica la prohibición: no solo ‘no hablen’, sino ‘no sigan hablando’ o ‘no hablen en exceso’. ‘No hablen tanto’ conserva esa idea en español natural y digno sin volverla demasiado interpretativa.'
- source_word: גְּבֹהָה גְבֹהָה
  english_pob_choice: so very proudly
  chosen_spanish: con tanta arrogancia
  alternatives_spanish:
  - muy altivamente
  - con tanta soberbia
  - de manera tan orgullosa
  lexicon: HALOT
  rationale: La repetición expresa énfasis de exaltación/haughtiness en el habla. ‘Con tanta arrogancia’ comunica bien el tono moral del pasaje y evita un calco extraño como ‘altamente altamente’.
- source_word: יֵצֵא עָתָק מִפִּיכֶם
  english_pob_choice: do not let arrogance come out of your mouth
  chosen_spanish: no salga insolencia de su boca
  alternatives_spanish:
  - no salga arrogancia de su boca
  - no salga presunción de su boca
  - no salga habla insolente de su boca
  lexicon: HALOT
  rationale: עָתָק refiere a habla arrogante, insolente o presuntuosa. ‘Insolencia’ conserva la fuerza ética del término y funciona bien con el verbo ‘salga’ en español.
- source_word: אֵל דֵּעוֹת יְהוָה
  english_pob_choice: the LORD is a God of knowledge
  chosen_spanish: Yahvé es un Dios de conocimiento
  alternatives_spanish:
  - Yahvé es un Dios que todo lo sabe
  - Yahvé es un Dios de saber
  - Yahvé es Dios de conocimientos
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘un Dios de conocimientos’; en español, el singular ‘de conocimiento’ expresa mejor la plenitud de sabiduría sin perder la fuerza del constructo. Se mantiene ‘Yahvé’ según la decisión del proyecto para el Nombre divino.
- source_word: וְלֹא נִתְכְּנוּ עֲלִלוֹת
  english_pob_choice: by him actions are weighed
  chosen_spanish: y por él se pesan las acciones
  alternatives_spanish:
  - y las acciones no son pesadas
  - y por él son evaluadas las acciones
  - y él pesa las acciones
  lexicon: HALOT
  rationale: La imagen de pesar/evaluar se conserva con ‘se pesan las acciones’. ‘Por él’ explicita el agente implícito de la lectura tradicional, manteniendo la metáfora de balanza. La alternativa textual de ‘no se pesan las acciones’ queda documentada en la nota.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. En el estándar español del proyecto, se vierte como ‘Yahvé’ para conservar el Nombre propio en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cláusula final וְלֹא נִתְכְּנוּ עֲלִלוֹת
  english_pob_reading: and by him actions are weighed
  chosen_spanish_reading: y por él se pesan las acciones
  alternative_spanish_readings:
  - y las acciones no se pesan
  - y por él se miden las acciones
  rationale: 'Se adopta la lectura tradicional coherente con el contexto: Yahvé evalúa las obras humanas. Se conserva la posibilidad textual alternativa de una negación explícita en la nota, sin borrar la tensión documentada.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'The English POB audit trail was reviewed alongside the Hebrew source. I preserved the main interpretive decisions already documented: the intensified prohibition, the moral sense of haughtiness/insolence, the divine name as Yahvé, and the traditional reading of the final clause while retaining the textual variant in a note. No applied revisions were listed in the source packet, and the latest revision pass reported the text as unchanged.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se prefirió ‘conocimiento’ frente a un calco plural (‘conocimientos’) por naturalidad en español, sin perder la plenitud semántica.
  - ‘Insolencia’ conserva mejor el matiz de habla arrogante/presuntuosa que una simple repetición de ‘arrogancia’.
  - La nota [a] preserva la variante textual sin oscurecer la lectura principal del versículo.
