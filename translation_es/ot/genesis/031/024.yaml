    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «Labán el sirio»; el etnónimo hebreo es «arameo».
    reason: alternative_reading
  revision_rationale: 'Se revisa la cláusula final para que el español suene natural y conserve el sentido del hebreo: la advertencia prohíbe que Labán le diga a Jacob absolutamente nada, ni favorable ni desfavorable. «Decirle ... nada, ni bueno ni malo» expresa mejor esa idea que «hablar ... ni bien ni mal». También se reordenan las notas para preservar las alternativas significativas del expediente inglés: alternativa verbal («hablar con Jacob»), explicación del modismo «de bien a mal» y la nota etnónima «arameo/sirio».'
