translation:
  language: es
  text: Él los persigue y sigue adelante sin peligro[a], por un camino que sus pies no habían recorrido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él los persigue y pasa en paz; por un camino que sus pies no habían andado». La cláusula final en hebreo es difícil y puede enfatizar ya sea un avance seguro o el movimiento por un camino antes no transitado.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְדְּפֵם
  english_pob_choice: He pursues them
  chosen_spanish: Él los persigue
  alternatives_spanish:
  - Él los sigue persiguiendo
  - Él los acosa
  lexicon: HALOT
  rationale: El verbo רדף conserva la idea de persecución activa. «Persigue» mantiene el sentido hostil y en presente narrativo reproduce el avance vívido del texto, como en la decisión inglesa.
- source_word: יַעֲב֣וֹר
  english_pob_choice: and passes on
  chosen_spanish: y avanza
  alternatives_spanish:
  - y pasa
  - y pasa adelante
  - y atraviesa
  lexicon: HALOT
  rationale: עבר aquí expresa continuidad del movimiento después de la persecución. «Avanza» comunica el progreso militar sin cargar indebidamente el matiz de atravesar un objeto específico.
- source_word: שָׁל֑וֹם
  english_pob_choice: safely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - en paz
  - sin tropiezo
  - sin daño
  lexicon: HALOT
  rationale: Aunque el sentido básico es «paz», en este contexto funciona adverbialmente para indicar avance sin oposición ni lesión. «Con seguridad» es natural en español y preserva esa idea de avance resguardado.
- source_word: אֹ֥רַח
  english_pob_choice: by a path
  chosen_spanish: por un camino
  alternatives_spanish:
  - por una senda
  - por una ruta
  - por un sendero
  lexicon: HALOT
  rationale: אֹרַח designa un camino/senda/huella de tránsito. «Por un camino» suena claro y mantiene la imagen concreta de desplazamiento.
- source_word: בְּרַגְלָ֖י/ו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - con sus pies
  - bajo sus pies
  lexicon: HALOT
  rationale: 'La expresión hebrea es instrumental o locativa, pero en español queda más natural incorporarla en la imagen del recorrido: «sus pies». Esto permite enlazar con el resto de la cláusula sin forzar la sintaxis.'
- source_word: לֹ֥א יָבֽוֹא
  english_pob_choice: had not traveled
  chosen_spanish: no habían recorrido
  alternatives_spanish:
  - no habían ido
  - no habían pisado
  - no había pasado
  lexicon: HALOT
  rationale: La cláusula final es compacta y difícil. En relación con «camino» y «pies», la idea es de una ruta antes no transitada por él. «No habían recorrido» expresa esa anterioridad de manera idiomática en español y conserva la tensión del hebreo.
theological_decisions:
- issue: Sentido de la cláusula final אֹרַח בְּרַגְלָיו לֹא יָבוֹא
  english_pob_reading: The conqueror advances along a path previously untrodden by his feet.
  chosen_spanish_reading: El conquistador avanza por un camino que antes no había recorrido.
  alternative_spanish_readings:
  - El conquistador avanza por un camino que sus pies no habían tocado
  - El conquistador pasa por una senda inédita para sus pies
  rationale: El hebreo permite varias lecturas, pero en el contexto de un avance victorioso la idea más probable es la de una marcha inédita o no transitada antes, no una metáfora de un modo no literal de viajar. La redacción española conserva la imagen y la dificultad sin resolverla de forma excesiva.
  doctrine_reference: Isaías 41:3; lectura contextual del avance victorioso en el discurso de Yahvé.
translation_notes:
  revision_awareness: Se siguió el pasaje ya auditado en inglés sin cambios revisionales reportados; la versión española mantiene la misma decisión interpretativa principal y conserva la ambigüedad relevante del final mediante una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la convención del proyecto cuando el contexto corresponde al nombre divino en el marco de Isaías.
  - Se prefiere un presente narrativo («persigue», «avanza») para reflejar la vivacidad del hebreo y la solución inglesa.
  - «Camino» se usa como equivalente sobrio de אֹרַח, evitando un calco más técnico que sonaría menos natural en español.
