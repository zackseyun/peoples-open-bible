review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: un clamor público por el vino, la imagen de la alegría oscurecida y la desaparición del regocijo de la tierra. Sin embargo, no preserva del todo la distinción léxica entre שִׂמְחָה y מְשׂוֹשׂ, ya que usa «alegría» para ambos, y además las notas al pie no reflejan exactamente el rastro de auditoría inglés: la nota [a] introduce una alternativa distinta de la inglesa, mientras que falta la alternativa correspondiente a la última cláusula.'
  spanish_quality_summary: El español es claro, natural y digno. «Hay un clamor por el vino en las calles» y «toda alegría se ha oscurecido» funcionan bien. No obstante, conviene variar el segundo sustantivo de gozo para evitar repetición innecesaria y reflejar mejor el paralelismo hebreo; «regocijo» o «gozo» mejora la lectura y la fidelidad. También es preferible alinear las notas con las alternativas preservadas por el POB inglés.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La elección «tierra» para הָאָרֶץ es aceptable en español y mantiene la amplitud contextual. El ajuste principal es léxico-estilístico: distinguir שִׂמְחָה («alegría») de מְשׂוֹשׂ («regocijo») y corregir las notas para que correspondan a las alternativas documentadas en el audit trail inglés.'
  issues:
  - severity: medium
    issue: Se usa «alegría» para שִׂמְחָה y también para מְשׂוֹשׂ.
    rationale: El hebreo presenta dos términos cercanos pero distintos en cláusulas paralelas. Aunque no siempre se requiere una diferenciación fuerte, en español aquí conviene distinguirlos para preservar mejor la textura poética y evitar repetición plana.
  - severity: medium
    issue: La nota [a] no coincide con la alternativa del POB inglés.
    rationale: La nota inglesa [a] se refiere a «all joy has become evening», es decir, a la imagen de oscurecimiento en la segunda cláusula, no a una alternativa para «outcry». La nota española actual introduce una nota nueva no respaldada por el audit trail.
  - severity: medium
    issue: Falta en español la alternativa documentada para la última cláusula.
    rationale: El POB inglés conserva una alternativa para «the gladness of the earth has departed»/«the gladness of the land has departed». En español debe preservarse esa alternativa, especialmente porque «tierra» también puede entenderse como «land/earth».
