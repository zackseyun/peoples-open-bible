translation:
  language: es
  text: Y el resto de Israel[a], los sacerdotes y los levitas estaban en todas las ciudades de Judá, cada uno en su heredad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada hombre en su heredad». El hebreo es literalmente singular y distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: And the rest of
  chosen_spanish: Y el resto de
  alternatives_spanish:
  - Y el remanente de
  - Y lo que quedaba de
  lexicon: HALOT
  rationale: שְׁאָר expresa lo que queda o permanece. «El resto de» conserva bien esa idea en español y encaja con la enumeración de grupos que se amplía respecto del contexto inmediato.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Es un nombre propio del pueblo; mantener «Israel» evita añadir una glosa interpretativa innecesaria.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros sacerdotales
  lexicon: HALOT
  rationale: כֹּהֲנִים corresponde al oficio sacerdotal. En español bíblico contemporáneo, «sacerdotes» es el equivalente natural y claro.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas del culto
  lexicon: HALOT
  rationale: לְוִיִּם se refiere a los miembros de la tribu de Leví. «Levitas» es el término estándar y transparente en español.
- source_word: בְּכָל עָרֵי יְהוּדָה
  english_pob_choice: in all the cities of Judah
  chosen_spanish: en todas las ciudades de Judá
  alternatives_spanish:
  - por todas las ciudades de Judá
  - en todas las urbes de Judá
  lexicon: HALOT
  rationale: La preposición בְּ marca ubicación. «En todas las ciudades de Judá» es directo y fiel; «por todas» sería más interpretativo.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: Aunque literalmente significa «hombre», aquí funciona distributivamente. «Cada uno» transmite ese valor sin forzar una lectura genérica masculina en español.
- source_word: בְּנַחֲלָתוֹ
  english_pob_choice: in his inheritance
  chosen_spanish: en su heredad
  alternatives_spanish:
  - en su herencia
  - en su posesión asignada
  lexicon: HALOT
  rationale: נַחֲלָה denota una porción heredada o asignada, especialmente de tierra. «Heredad» preserva mejor el matiz bíblico-covenantal que «propiedad» o una simple «herencia» abstracta.
theological_decisions:
- issue: Valor distributivo del singular masculino
  english_pob_reading: each in his inheritance
  chosen_spanish_reading: cada uno en su heredad
  alternative_spanish_readings:
  - cada uno en su posesión
  - todos en su heredad
  rationale: El hebreo usa אִישׁ en singular con sufijo singular, con sentido distributivo. Se mantiene esa forma con «cada uno» y «su», sin neutralizarla indebidamente ni perder el carácter singular del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto inglés auditado ya estaba estable y no mostró cambios en la última revisión; no se identificaron revisiones aplicadas al versículo. La versión española sigue esa lectura estable y solo ajusta el orden natural del español y la correspondencia léxica de términos clave.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el nombre divino.
  - «Heredad» se conserva como término bíblico consistente para נַחֲלָה en contextos de reparto territorial.
  - Se evita «SEÑOR» porque no hay sustitución del nombre divino en este versículo.
  - La estructura distributiva se expresa con «cada uno», coherente con el singular del hebreo y con el estilo POB de mantener la tensión gramatical cuando existe.
