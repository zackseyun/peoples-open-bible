translation:
  language: es
  text: Amarás a Yahvé tu Dios con todo tu corazón, con toda tu alma[a] y con todas tus fuerzas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo נֶפֶשׁ («néfesh») también puede significar «vida» o «ser».
    reason: lexical_alternative
  - marker: b
    text: El hebreo מְאֹד («me'od») se relaciona literalmente con la idea de abundancia o intensidad, y puede denotar fuerza, vigor o recursos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָהַבְתָּ
  english_pob_choice: And you shall love
  chosen_spanish: Y amarás
  alternatives_spanish:
  - y debes amar
  - y ama
  lexicon: HALOT
  rationale: El perfecto qal 2ms con waw en este contexto exhortativo/legal funciona con fuerza imperativa-futura. «Amarás» conserva el mandato del pacto en español natural; «y ama» sería demasiado abrupto y «y debes amar» debilita el valor formular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton con la forma de uso fijada para la POB en español. «Yahvé» mantiene el valor de nombre personal y evita la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el referente es singular y contextual. «Tu Dios» es la equivalencia idiomática y clara en español.
- source_word: בְּכָל
  english_pob_choice: with all
  chosen_spanish: con todo
  alternatives_spanish:
  - en todo
  - por todo
  lexicon: HALOT
  rationale: La construcción expresa totalidad de entrega/afecto. «Con todo» reproduce de modo natural la repetición enfática del hebreo y encaja con los tres complementos coordinados.
- source_word: לְבָבְךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: לֵבָב/Lֵב abarca la interioridad, incluido pensamiento y voluntad, no solo emoción. «Corazón» es la equivalencia tradicional y suficientemente amplia; «mente» estrecharía indebidamente el término.
- source_word: נַפְשְׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. En esta tríada, «alma» preserva el paralelismo y la amplitud antropológica sin resolver la tensión semántica.
- source_word: מְאֹדֶךָ
  english_pob_choice: your might
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu poder
  - todos tus recursos
  lexicon: HALOT
  rationale: מְאֹד denota literalmente «mucho/muchness» y aquí expresa intensidad o capacidad total. «Fuerza» es una traducción breve y natural que conserva el sentido de totalidad de energía/capacidad.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La POB en inglés lo rinde como nombre propio y no como título; en español, «Yahvé» preserva la misma decisión de fondo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Antropología de la exhortación total
  english_pob_reading: heart ... soul ... might
  chosen_spanish_reading: corazón ... alma ... fuerza
  alternative_spanish_readings:
  - corazón ... vida ... fuerza
  - corazón ... alma ... recursos
  rationale: La secuencia hebrea presenta términos superpuestos para la totalidad de la persona. Se conserva la tensión teológica y antropológica en vez de redefinirla según una psicología moderna más analítica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión fue de alta concordancia y no se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio español del proyecto para יְהוָה.
  - 'Se conservaron los tres miembros antropológicos con paralelismo claro: «corazón», «alma» y «fuerza».'
  - Las notas a[a][b] se colocan en los términos donde aparece la ambigüedad léxica relevante en español.
