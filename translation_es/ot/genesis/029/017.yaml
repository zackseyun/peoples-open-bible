translation:
  language: es
  text: Los ojos de Lea eran suaves[a], pero Raquel era hermosa de figura y de apariencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiernos», «delicados» o «débiles». El adjetivo hebreo puede sugerir suavidad o delicadeza; el matiz exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - mirada
  - aspecto
  lexicon: HALOT
  rationale: El constructo plural se refiere de manera directa a los ojos de Lea, no a su apariencia general. «Ojos» mantiene el foco concreto del hebreo.
- source_word: רַכּוֹת
  english_pob_choice: soft
  chosen_spanish: suaves
  alternatives_spanish:
  - tiernos
  - delicados
  - débiles
  lexicon: HALOT
  rationale: «Suaves» comunica la idea básica de suavidad/delicadeza sin imponer por sí solo el matiz evaluativo de «débiles». Como en el audit trail inglés, la ambigüedad se conserva en nota.
- source_word: יְפַת תֹּאַר
  english_pob_choice: beautiful in form
  chosen_spanish: hermosa en su figura
  alternatives_spanish:
  - hermosa de figura
  - bien proporcionada
  lexicon: HALOT
  rationale: La combinación hebrea describe la forma o figura corporal. «En su figura» preserva esa referencia física sin perder naturalidad en español.
- source_word: וִיפַת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: en su aspecto
  alternatives_spanish:
  - hermosa en apariencia
  - hermosa de aspecto
  - hermosa al verla
  lexicon: HALOT
  rationale: מַרְאֶה se refiere a lo visible, al aspecto. Traducirlo como «en su aspecto» mantiene la segunda parte del paralelismo sin redundar en otra vez «hermosa».
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente coordinante, aquí marca contraste entre las dos mujeres; «pero» expresa mejor ese valor discursivo en español.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la distinción entre Leah y Rachel y conserva la ambigüedad de רַכּוֹת con una nota; la versión española sigue esa misma estrategia, evitando añadir juicios que el hebreo no exige y preservando el paralelismo entre «figura» y «aspecto».
  spanish_consistency_notes:
  - Se usa «Raquel» y «Lea» según la forma española bíblica estándar.
  - Se evita «SEÑOR» o terminología teológica no pertinente porque el versículo no contiene el nombre divino.
  - Se preserva el contraste del hebreo con «pero», siguiendo el valor discursivo reconocido en el audit trail inglés.
