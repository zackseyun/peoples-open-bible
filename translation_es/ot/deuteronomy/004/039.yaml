translation:
  language: es
  text: Así que conoce hoy[a], y guárdalo[a] en tu corazón, que Yahvé, él es Dios en los cielos arriba y en la tierra abajo; no hay otro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hazlo volver a tu corazón» o «ponlo en tu corazón», un modismo para reconocer interiormente y abrazar lo que es verdadero.'
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «no hay ningún otro».
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: conoce
  alternatives_spanish:
  - reconoce
  - sabe
  lexicon: HALOT
  rationale: El hebreo funciona de manera exhortativa en este contexto. «Conoce» conserva el valor apelativo de reconocer como verdadero, sin volverlo una paráfrasis más libre.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español, equivalente a «today» en el contexto exhortativo.
- source_word: וַהֲשֵׁבֹתָ אֶל לְבָבֶךָ
  english_pob_choice: take it to your heart
  chosen_spanish: tómalo a tu corazón
  alternatives_spanish:
  - tráelo a tu corazón
  - grábalo en tu corazón
  - ponlo en tu corazón
  lexicon: HALOT
  rationale: La imagen idiomática hebrea es de interiorizar y volver algo al centro de la persona. «Tómalo a tu corazón» conserva la metáfora del corazón y el gesto de apropiación interior.
- source_word: לְבָבֶךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: Se conserva «corazón» para no reducir el hebreo לבב a mera cognición; en antropología bíblica incluye pensamiento, voluntad y afecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB: el nombre divino יהוה se vierte como «Yahvé», manteniendo el nombre propio y evitando sustituirlo por un título.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: es
  alternatives_spanish:
  - él es
  - él
  lexicon: HALOT
  rationale: En español, la copulativa suele expresar adecuadamente la lectura enfática sin sonar forzada. El énfasis queda en la identificación exclusiva de Yahvé con Dios.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: «Dios» es la forma idiomática y mantiene la identidad verdadera/única afirmada por el verso. «El Dios» sonaría más rígido sin aportar más precisión.
- source_word: בַּשָּׁמַיִם מִמַּעַל
  english_pob_choice: in the heavens above
  chosen_spanish: en los cielos arriba
  alternatives_spanish:
  - en los cielos de arriba
  - en el cielo arriba
  lexicon: HALOT
  rationale: «Cielos» refleja el plural hebreo y conserva el alcance cósmico del texto. «Arriba» traduce מִמַּעַל de forma transparente.
- source_word: וְעַל הָאָרֶץ מִתָּחַת
  english_pob_choice: and on the earth beneath
  chosen_spanish: y sobre la tierra abajo
  alternatives_spanish:
  - y sobre la tierra de abajo
  - y en la tierra debajo
  lexicon: HALOT
  rationale: «Sobre la tierra abajo» mantiene el paralelismo con «los cielos arriba» y expresa el merismo de totalidad sin volverlo artificial.
- source_word: אֵין עוֹד
  english_pob_choice: there is no other
  chosen_spanish: no hay otro
  alternatives_spanish:
  - no existe otro
  - no hay nadie más
  lexicon: HALOT
  rationale: La afirmación exclusiva queda natural y directa en español. «No hay otro» preserva la contundencia monoteísta sin añadir matices innecesarios.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La POB inglesa ya opta por transliterar el Tetragrama. En español, «Yahvé» es la forma adoptada como equivalente del nombre divino, preservando el carácter propio del nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Afirmación exclusiva de unicidad divina en אֵין עוֹד
  english_pob_reading: there is no other
  chosen_spanish_reading: no hay otro
  alternative_spanish_readings:
  - no existe otro
  - no hay nadie más
  rationale: La frase española mantiene la exclusividad absoluta del hebreo sin expandirla con fórmulas doctrinales posteriores. Conserva el sentido de unicidad de Yahvé sobre cielo y tierra.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El borrador refleja el pasaje base sin cambios de revisión aplicados en el audit trail; se alinea con la lectura inglesa aprobada y con la comprobación de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» conforme al criterio POB y al uso pedido para el español.
  - Se conserva la metáfora del «corazón» para לְבָבֶךָ, sin reducirla a mente o intelecto.
  - Se preserva el paralelismo cielo/tierra y la exclusividad monoteísta final.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
