    text: O «están a gusto» o «viven seguros» para «prosperan». El verbo hebreo puede expresar también tranquilidad o seguridad, además de prosperidad.
    reason: lexical_alternative
  - marker: b
    text: O «sus niños» o «sus infantes». El término hebreo puede referirse a niños pequeños y subraya su vulnerabilidad.
    reason: lexical_alternative
  revision_rationale: Se recolocaron las notas al pie en las palabras que realmente explican y se cambió «sus hijos» por «sus pequeños» para reflejar mejor עוֹלָלֶיהָ y el matiz de vulnerabilidad infantil documentado en el expediente inglés. El resto del texto puede mantenerse por ser fiel y legible.
