translation:
  language: es
  text: Como una viajera sedienta abre la boca[a], y de toda agua cercana beberá; frente a todo poste[c][b] se sentará, y frente a toda flecha abrirá su aljaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen es metafórica y probablemente apunta a una disponibilidad sexual indiscriminada: toma lo que encuentra a mano.'
    reason: cultural_note
  - marker: b
    text: Se conservan literalmente 'poste' y la imagen de 'flecha' y 'aljaba'. El sentido exacto de la imagen final es discutido, pero sigue la metáfora sexual del versículo.
    reason: lexical_alternative
  - marker: c
    text: El griego de este versículo es vívido pero algo difícil, especialmente en la cláusula final; la traducción se mantiene cerca de la redacción en lugar de resolver la metáfora de manera más explícita.
    reason: textual_variant
lexical_decisions:
- source_word: διψῶν
  english_pob_choice: thirsty
  chosen_spanish: sediento
  alternatives_spanish:
  - con sed
  - lleno de sed
  lexicon: LSJ
  rationale: El participio expresa una condición urgente; 'sediento' es natural en español y conserva la fuerza de la comparación sin explicarla de más.
- source_word: ὁδοιπόρος
  english_pob_choice: traveler
  chosen_spanish: viajero
  alternatives_spanish:
  - caminante
  - forastero
  lexicon: LSJ
  rationale: '''Viajero'' comunica de forma clara y digna a quien va por el camino. Evita un arcaísmo innecesario como ''viandante'' o ''peregrino''.'
- source_word: ἀνοίγει
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - abre la boca
  - la abre
  lexicon: LSJ
  rationale: El verbo es simple y concreto; en español puede mantenerse igual de directo. 'Abre la boca' conserva la imagen literal del gesto.
- source_word: ἀπὸ παντὸς ὕδατος τοῦ σύνεγγυς
  english_pob_choice: from every nearby water
  chosen_spanish: de toda agua cercana
  alternatives_spanish:
  - de cualquier agua cercana
  - de toda agua que esté cerca
  lexicon: LSJ
  rationale: La frase subraya la disponibilidad inmediata y el carácter indiscriminado del acto. 'Toda agua cercana' mantiene la literalidad y la naturalidad en español.
- source_word: πίεται
  english_pob_choice: she will drink
  chosen_spanish: beberá
  alternatives_spanish:
  - tomará
  - beberá de ella
  lexicon: LSJ
  rationale: El futuro medio se expresa con futuro simple en español. El sujeto queda claro por el contexto, así que no es necesario repetir 'ella'.
- source_word: κατέναντι παντὸς πασσάλου
  english_pob_choice: opposite every stake
  chosen_spanish: frente a todo poste
  alternatives_spanish:
  - frente a toda estaca
  - ante todo poste
  lexicon: LSJ
  rationale: '''Πάσσαλος'' puede ser ''poste'' o ''estaca''; ''poste'' funciona bien en español sin perder el carácter concreto de la imagen. Se conserva la literalidad porque la metáfora es deliberadamente cruda.'
- source_word: καθίσεται
  english_pob_choice: she will sit down
  chosen_spanish: se sentará
  alternatives_spanish:
  - se sentará a
  - tomará asiento
  lexicon: LSJ
  rationale: '''Se sentará'' reproduce el valor de asentarse o colocarse en posición de descanso/espera. Es claro y suficientemente directo.'
- source_word: ἔναντι βέλους
  english_pob_choice: before every arrow
  chosen_spanish: frente a toda flecha
  alternatives_spanish:
  - ante toda flecha
  - delante de toda flecha
  lexicon: LSJ
  rationale: La construcción es difícil y probablemente metafórica. Se mantiene el paralelismo con 'frente a' para no resolver interpretativamente más de lo que el griego permite.
- source_word: φαρέτραν
  english_pob_choice: quiver
  chosen_spanish: aljaba
  alternatives_spanish:
  - carcaj
  - quiver
  lexicon: LSJ
  rationale: '''Aljaba'' es el término español tradicional y comprensible para ''quiver''. Se evita el anglicismo y se preserva la imagen literal.'
theological_decisions:
- issue: Metáfora sexual sin explicitación interpretativa
  english_pob_reading: Retain the concrete imagery of drinking, stake, arrow, and quiver rather than replacing it with an explicit interpretive paraphrase about promiscuity.
  chosen_spanish_reading: Conservar la imaginería concreta de beber, poste, flecha y aljaba, sin convertirla en una paráfrasis moral explícita.
  alternative_spanish_readings:
  - Parafrasear el versículo como una denuncia directa de la promiscuidad
  - Explicar en el texto principal que se trata de disponibilidad sexual indiscriminada
  rationale: La fuerza del pasaje está en su imagen vívida y en su ambigüedad deliberada. Traducirla literalmente permite que el lector perciba el tono admonitorio sin añadir más explicitación que la del original.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referencia de género en el contexto inmediato
  english_pob_reading: Use 'she' throughout for coherence with the immediate context about a woman/wife.
  chosen_spanish_reading: Usar la forma femenina implícita en el contexto, sin añadir pronombres innecesarios salvo donde el español exige claridad.
  alternative_spanish_readings:
  - Repetir 'ella' en cada miembro
  - Usar un sujeto impersonal como 'uno'
  rationale: El contexto griego y el audit trail inglés apuntan a una figura femenina. En español, la forma verbal basta en varios miembros; donde haga falta, se deja implícita la referencia femenina sin recargar el verso.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: ''every arrow'' fue ajustado por coherencia con παντός, y el español refleja esa repetición con ''toda flecha''. También se mantuvo la decisión de conservar el lenguaje figurado concreto en lugar de explicitarlo en el texto principal.'
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se mantiene la literalidad de las imágenes clave para no borrar la tensión metafórica documentada en el audit trail.
  - '''Aljaba'' se eligió por ser el equivalente español natural de φαρέτρα.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones terminológicas no presentes en el texto fuente.
