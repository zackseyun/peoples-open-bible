translation:
  language: es
  text: Habló acerca de los árboles[a], desde el cedro que está en Líbano hasta el hisopo que crece en la pared; también habló acerca de los animales, de las aves, de los animales que se arrastran y de los peces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «una pequeña planta aromática»; la identificación botánica exacta de אֵזוֹב es incierta, aunque «hisopo» sigue siendo la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: he spoke about
  chosen_spanish: habló acerca de
  alternatives_spanish:
  - habló sobre
  - discursó acerca de
  lexicon: HALOT
  rationale: דבר con עַל expresa hablar sobre un tema. «Habló acerca de» conserva el valor temático y suena natural en español sin añadir el tono técnico de «enseñó» ni la rareza de una fórmula más literal.
- source_word: הָעֵצִים
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - las maderas
  - las plantas
  lexicon: HALOT
  rationale: El plural עֵצִים en este contexto zoológico-botánico apunta al ámbito de los árboles o vegetación leñosa. «Los árboles» refleja bien el merismo con cedro e hisopo y evita «maderas», que sería demasiado material.
- source_word: הָאֶרֶז
  english_pob_choice: the cedar
  chosen_spanish: el cedro
  alternatives_spanish:
  - el árbol de cedro
  lexicon: HALOT
  rationale: אֶרֶז es «cedro». En español, «el cedro» es la forma más natural y fiel, suficiente porque la cláusula relativa ya ubica el árbol en Líbano.
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en Líbano
  alternatives_spanish:
  - en el Líbano
  lexicon: HALOT
  rationale: La preposición local indica procedencia o ubicación. «En Líbano» es una forma actual y clara en español bíblico de registro neutro; «en el Líbano» también sería posible, pero no es necesaria aquí.
- source_word: הָאֵזוֹב
  english_pob_choice: the hyssop
  chosen_spanish: el hisopo
  alternatives_spanish:
  - la mejorana
  - una planta aromática pequeña
  lexicon: HALOT
  rationale: Se conserva el término tradicional «hisopo», porque la identificación botánica exacta es incierta y la POB inglesa mantuvo la equivalencia tradicional, con nota de alternativa. El español puede sostener esa misma tensión sin resolverla de forma especulativa.
- source_word: יֹצֵא בַּקִּיר
  english_pob_choice: grows out of the wall
  chosen_spanish: sale de la pared
  alternatives_spanish:
  - brota de la pared
  - crece de la pared
  lexicon: HALOT
  rationale: יצא literalmente es «salir». «Sale de la pared» mantiene la imagen hebrea con buena naturalidad. «Pared» traduce קיר de manera directa y comprensible; «muro» sería posible pero menos preciso para una planta que brota de una superficie doméstica.
- source_word: הַבְּהֵמָה
  english_pob_choice: the animals
  chosen_spanish: los animales
  alternatives_spanish:
  - las bestias
  - el ganado
  lexicon: HALOT
  rationale: En una lista general junto con aves, reptiles y peces, בְּהֵמָה funciona como categoría amplia de animales. «Los animales» preserva esa amplitud mejor que «ganado», que sería demasiado estrecho, o «bestias», que suena más arcaico.
- source_word: הָעוֹף
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves voladoras
  lexicon: HALOT
  rationale: עוֹף puede abarcar criaturas voladoras, pero en una enumeración general «aves» es el equivalente español más amplio y digno. «Pájaros» sería más coloquial y «aves voladoras» redundante.
- source_word: הָרֶמֶשׂ
  english_pob_choice: the creeping things
  chosen_spanish: los reptiles
  alternatives_spanish:
  - los reptiles y otros animales que se arrastran
  - las criaturas que se arrastran
  lexicon: HALOT
  rationale: רֶמֶשׂ designa criaturas que se arrastran o reptan. «Reptiles» es una opción española compacta y comprensible, aunque algo más estrecha que el hebreo; por eso se deja constancia de la alternativa más amplia en la nota del registro.
- source_word: הַדָּגִים
  english_pob_choice: the fish
  chosen_spanish: los peces
  alternatives_spanish:
  - los peces del mar
  - los pescados
  lexicon: HALOT
  rationale: דָּגִים es el plural ordinario de fish. En español, para una categoría general, «peces» es más natural que «pescados», que implicaría comida, y mantiene bien la enumeración zoológica.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se detectaron revisiones posteriores que exijan ajustes; se conserva la nota lexical sobre אֵזוֹב para reflejar la incertidumbre botánica sin abandonar la traducción tradicional.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología predeterminada del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - 'Se mantiene una enumeración zoológica paralela y amplia: animales, aves, reptiles y peces.'
  - «Hisopo» queda marcado con nota para sostener la alternativa botánica sin perder la forma tradicional.
  - El estilo evita calcos rígidos y conserva un registro bíblico claro, moderno y publicable.
