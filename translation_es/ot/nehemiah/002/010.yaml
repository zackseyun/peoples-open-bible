base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/010.yaml
  text: When Sanballat the Horonite and Tobiah the Ammonite slave heard this[b][a], it was very displeasing to them that a man had come to seek the welfare of the children of Israel.
  footnotes:
  - marker: a
    text: Or 'it was a great evil to them'; the Hebrew repeats the רע ('bad/evil') word-group for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'to seek the welfare of the children of Israel.'
    reason: lexical_alternative
