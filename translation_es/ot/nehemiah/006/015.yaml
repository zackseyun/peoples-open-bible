translation:
  language: es
  text: Así que la muralla quedó terminada el día veinticinco de Elul[a], en cincuenta y dos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Elul es el sexto mes del calendario hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּשְׁלַם
  english_pob_choice: was finished
  chosen_spanish: terminó
  alternatives_spanish:
  - fue terminada
  - quedó terminada
  - se completó
  lexicon: HALOT
  rationale: El verbo שלם en esta forma expresa que la obra llegó a su culminación. En español, «terminó» reproduce bien el sentido eventivo y suena natural; las pasivas «fue terminada» o «se completó» también serían posibles, pero «terminó» evita una construcción rígida sin perder el valor de resultado.
- source_word: הַחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: la muralla
  alternatives_spanish:
  - el muro
  - la pared
  lexicon: HALOT
  rationale: En el contexto narrativo de Nehemías se trata de la fortificación de Jerusalén. «Muralla» comunica mejor en español una obra defensiva de este tipo que «muro» o «pared», aunque «muro» sigue siendo una alternativa lexicalmente válida.
- source_word: בְּעֶשְׂרִים וַחֲמִשָּׁה לֶאֱלוּל
  english_pob_choice: on the twenty-fifth day of Elul
  chosen_spanish: el día veinticinco de Elul
  alternatives_spanish:
  - el veinticinco de Elul
  - en el día veinticinco de Elul
  lexicon: HALOT
  rationale: La preposición con el numeral funciona como expresión de fecha. En español, añadir «día» hace la referencia más clara y natural. El nombre del mes se translitera como «Elul», conforme a la práctica de conservar el calendario hebreo.
- source_word: לַחֲמִשִּׁים וּשְׁנַיִם יוֹם
  english_pob_choice: in fifty-two days
  chosen_spanish: en cincuenta y dos días
  alternatives_spanish:
  - durante cincuenta y dos días
  - a lo largo de cincuenta y dos días
  lexicon: HALOT
  rationale: La frase indica la duración total en que se completó la obra. «En cincuenta y dos días» conserva ese valor temporal y coincide con el sentido narrativo de la culminación dentro de ese lapso.
translation_notes:
  revision_awareness: 'Coincide con el inglés POB en el sentido básico: la muralla quedó terminada el día veinticinco de Elul, en cincuenta y dos días. Se mantiene la nota cultural sobre Elul y se opta por un español natural sin perder la referencia temporal precisa.'
  spanish_consistency_notes:
  - Se usó «muralla» por el contexto de fortificación de Jerusalén; si en pasajes cercanos se prefirió «muro», convendrá revisar consistencia contextual, no meramente terminológica.
  - Se mantuvo «Elul» sin adaptar, siguiendo la práctica de transliterar los meses hebreos.
  - La estructura temporal «en cincuenta y dos días» conserva la duración total, no una secuencia posterior.
