translation:
  language: es
  text: Por tanto[a], he aquí, traigo contra ti extranjeros, los más crueles de las naciones; sacarán sus espadas[b] contra la belleza de tu sabiduría[c], y mancharán tu esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘forasteros’ para ‘extranjeros’.
    reason: lexical_alternative
  - marker: b
    text: O ‘desenvainarán sus espadas’. Literalmente, ‘vaciarán sus espadas’.
    reason: lexical_alternative
  - marker: c
    text: O ‘profanarán tu radiancia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación inferencial de juicio/consecuencia del contexto previo, manteniendo el valor de conclusión del hebreo.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: mira, estoy
  alternatives_spanish:
  - he aquí, estoy
  - mira, yo estoy
  lexicon: HALOT
  rationale: La fórmula profética deíctica se conserva con un giro solemne pero natural en español; 'mira' comunica la inmediatez enfática sin depender de una forma demasiado arcaica.
- source_word: מֵבִיא עָלֶיךָ
  english_pob_choice: I am bringing against you
  chosen_spanish: estoy trayendo contra ti
  alternatives_spanish:
  - voy a traer contra ti
  - estoy por traer contra ti
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inminencia vívida; 'estoy trayendo' preserva esa fuerza aspectual y el movimiento hostil 'contra ti'.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - extraños
  lexicon: HALOT
  rationale: '''Extranjeros'' comunica bien la idea de personas de fuera en un juicio bélico. Se prefiere esta opción en español por claridad y por ser la alternativa lexical reconocida en el audit trail (''foreigners'').'
- source_word: עָרִיצֵי גּוֹיִם
  english_pob_choice: the most ruthless of the nations
  chosen_spanish: los más crueles de las naciones
  alternatives_spanish:
  - los más feroces de las naciones
  - los tiranos de las naciones
  lexicon: HALOT
  rationale: '''עָרִיץ'' denota violencia, dureza y crueldad opresiva; ''los más crueles'' transmite la fuerza superlativa idiomática en un español claro y digno.'
- source_word: וְהֵרִיקוּ חַרְבוֹתָם
  english_pob_choice: they will draw their swords
  chosen_spanish: ellos sacarán sus espadas
  alternatives_spanish:
  - desenvainarán sus espadas
  - vaciarán sus espadas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'vaciarán', en este contexto bélico el sentido natural es desenvainar o sacar para atacar. 'Sacar sus espadas' es claro y fiel sin volver mecánica la frase.
- source_word: עַל יְפִי חָכְמָתֶךָ
  english_pob_choice: against the beauty of your wisdom
  chosen_spanish: contra la belleza de tu sabiduría
  alternatives_spanish:
  - contra el hermosor de tu sabiduría
  - contra la hermosura de tu sabiduría
  lexicon: HALOT
  rationale: Se conserva la construcción poética 'la belleza de tu sabiduría', que mantiene la ironía del texto y evita paraphrasear el genitivo hebreo.
- source_word: וְחִלְּלוּ
  english_pob_choice: they will defile
  chosen_spanish: profanarán
  alternatives_spanish:
  - deshonrarán
  - contaminarán
  lexicon: HALOT
  rationale: '''חלל'' en piel connota profanar/violar lo valioso; ''profanarán'' preserva la carga de desacralización o ultraje, cercana al matiz de ''defile/profane'' del audit trail.'
- source_word: יִפְעָתֶךָ
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu resplandor
  - tu radiancia
  lexicon: HALOT
  rationale: '''Esplendor'' funciona bien en el registro real/poético y corresponde al campo semántico de brillo, majestad y apariencia resplandeciente.'
theological_decisions:
- issue: Referencia inmediata del oráculo contra Tiro
  english_pob_reading: Translate the verse as a historical-prophetic judgment against the addressed ruler/city without importing later theological identifications into the main text.
  chosen_spanish_reading: Traducir el versículo como un juicio histórico-profético contra el gobernante/la ciudad de Tiro, sin introducir en el texto principal identificaciones teológicas posteriores.
  alternative_spanish_readings:
  - Leerlo tipológicamente como eco de una caída cósmica
  - Ajustar el texto para sugerir una referencia satánica
  rationale: El hebreo habla directamente de invasores, espadas, sabiduría y esplendor en un oráculo de juicio. La traducción debe conservar ese sentido inmediato y no añadir una interpretación debatida al cuerpo del versículo.
  doctrine_reference: Primacía del texto original; preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de los controles cruzados es alto, con observaciones menores בלבד en opciones léxicas, por lo que se mantiene una traducción estable y auditada.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' según corresponda; en este versículo no aparece ninguno de esos términos.
  - '''Extranjeros'' se usa aquí para זָרִים, pero se deja la nota con la alternativa ''forasteros'' para reflejar la tensión lexical documentada.'
  - '''Espadas'' evita un calco mecánico de ''vaciar'' y sigue el equivalente idiomático natural en español para armas desenvainadas.'
  - '''Profanarán'' conserva la fuerza de חלל sin volverlo exclusivamente cultual en español.'
  - No se introduce 'Cristo', 'Mesías' ni otra identificación teológica ajena al sentido inmediato del oráculo.
