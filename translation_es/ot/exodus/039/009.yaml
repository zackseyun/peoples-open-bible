translation:
  language: es
  text: Era cuadrado; hicieron el pectoral doble[a], un palmo de largo y un palmo de ancho, doble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «plegado en dos». El hebreo כָּפוּל indica que el pectoral fue hecho en una forma doble o doblada sobre sí misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָב֧וּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - cuadrangular
  lexicon: HALOT
  rationale: El hebreo describe una forma de cuatro lados; en español, «cuadrado» es la equivalencia natural y clara, mientras que «cuadrangular» sería más técnico y menos fluido.
- source_word: הָיָ֛ה
  english_pob_choice: it was
  chosen_spanish: Era
  alternatives_spanish:
  - Fue
  - Estaba
  lexicon: HALOT
  rationale: Funciona como cópula descriptiva de la forma del objeto. «Era» expresa mejor el estado/forma en español sin introducir una idea de cambio.
- source_word: כָּפ֖וּל
  english_pob_choice: doubled
  chosen_spanish: doble
  alternatives_spanish:
  - doblado
  - de doble capa
  - plegado en dos
  lexicon: HALOT
  rationale: El término indica una construcción en dos capas o plegada sobre sí misma. «Doble» conserva la fuerza lexical de manera natural; las otras opciones explicitan más de lo que el hebreo exige.
- source_word: עָשׂ֣וּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - lo hicieron
  - fabricaron
  lexicon: HALOT
  rationale: Verbo común de hacer/fabricar. «Hicieron» preserva la simplicidad del original sin añadir color estilístico.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral sacerdotal
  - la bolsa
  lexicon: HALOT
  rationale: En el contexto sacerdotal del tabernáculo, חֹשֶׁן se refiere al pectoral del sumo sacerdote. «Pectoral» es claro y fiel; «bolsa» sería demasiado interpretativo. No se añade «de juicio» porque no aparece en este versículo.
- source_word: זֶרֶת
  english_pob_choice: a span
  chosen_spanish: un codo
  alternatives_spanish:
  - un palmo
  - medio codo
  lexicon: HALOT
  rationale: 'Aquí hay una decisión de equivalencia funcional para lectura pública: el hebreo usa una medida antigua pequeña. «Un codo» no reproduce la medida exacta de זֶרֶת, pero en español bíblico resulta comprensible; no obstante, esta opción conserva el carácter antiguo de la unidad. Si se prefiriera máxima literalidad, «un palmo» sería la alternativa más cercana en español común.'
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: de largo
  alternatives_spanish:
  - su longitud
  lexicon: HALOT
  rationale: La construcción con sufijo posesivo se expresa naturalmente en español con «de largo». Es más idiomático que «su longitud» y mantiene el sentido dimensional.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - su anchura
  lexicon: HALOT
  rationale: «De ancho» es la forma natural en español para una medida transversal. «Anchura» es correcta pero más abstracta.
- source_word: כָּפֽוּל
  english_pob_choice: doubled
  chosen_spanish: doble
  alternatives_spanish:
  - dobladamente
  - plegado en dos
  lexicon: HALOT
  rationale: 'La repetición final del adjetivo refuerza la condición del objeto: nuevamente «doble». En español, repetir el mismo término al final reproduce la insistencia hebrea sin añadir una interpretación temporal.'
translation_notes:
  revision_awareness: Se siguió la revisión que colocó el adjetivo final al final de la cláusula y se evitó introducir una nuance temporal como «cuando». En español, la repetición de «doble» al final conserva la prominencia del hebreo y la lectura auditiva natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se usó «pectoral» para חֹשֶׁן, conforme al contexto sacerdotal, sin añadir la expansión tradicional «de juicio» que no aparece aquí.
  - Se optó por una equivalencia funcional en la medida para preservar inteligibilidad en español; la nota explica la tensión con la unidad hebrea exacta.
  - La repetición final de «doble» refleja la estructura hebrea y la revisión auditiva del POB en inglés.
