  rationale: Es un nombre propio de lugar en una lista territorial. Se conserva la transliteración convencional al español, ajustada a la acentuación gráfica natural del español con tilde para indicar el hiato/acentuación final.
- source_word: הָרָמָה
  english_pob_choice: Ramah
