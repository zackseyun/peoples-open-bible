  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los gentilicios, «hermano» y «tierra» están bien resueltos. «Forastero» es aceptable para גֵר con nota alternativa «residente extranjero». Debe corregirse la nota de «aborrezcas» para alinearla mejor con «detest/loathe», y añadirse la nota sobre la hermandad de Edom con Israel por Esaú.
  issues:
