    text: Or 'and no outsider mingles with its joy' or 'participates in its joy.' The Hebrew verb can denote becoming involved with or sharing in something.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the bitterness of its soul.' 'Soul' here refers to the inner self or life, not necessarily a technical statement about human constitution.
    reason: lexical_alternative
