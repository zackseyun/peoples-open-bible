    text: O «no lo dio en su mano». El hebreo dice literalmente «no lo dio en su mano».
    reason: lexical_alternative
  revision_rationale: Se corrige la frase final para que suene natural en español ('en manos de Saúl') y, a la vez, se preserva en nota el modismo hebreo literal y la alternativa documentada en el audit trail inglés. También se simplifica el inicio a una construcción española más fluida sin perder la doble referencia locativa del hebreo. No se requiere adjudicación adicional.
