translation:
  language: es
  text: Entonces el límite subió a Bet-hoglá, y pasó al norte de Bet-arabá; y el límite subió a la piedra de Bohán[a], hijo de Rubén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la piedra de Bohan».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  lexicon: HALOT
  rationale: En descripciones de fronteras, עלה expresa un recorrido que asciende o avanza en elevación. «Subió» es natural en español y conserva esa imagen topográfica sin volverla demasiado técnica.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: Aquí גְּבוּל se refiere a la línea limítrofe. «Límite» comunica bien la idea en español bíblico actual y evita la connotación moderna de frontera política.
- source_word: בֵּית חָגְלָה
  english_pob_choice: Beth-hoglah
  chosen_spanish: Bet-hoglá
  alternatives_spanish:
  - Bet Hoglá
  - Bet-hogla
  lexicon: HALOT
  rationale: Se translitera el topónimo. «Bet-hoglá» conserva la forma hebrea compuesta de בית + el nombre propio, con acento español para facilitar la lectura.
- source_word: וְעָבַר
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - pasó por
  lexicon: HALOT
  rationale: En una lista de mojones fronterizos, עבר marca que la línea continúa más allá de un punto. «Pasó» es directo y reproduce esa función descriptiva.
- source_word: מִצְּפוֹן
  english_pob_choice: north of
  chosen_spanish: al norte de
  alternatives_spanish:
  - desde el norte de
  - por el norte de
  lexicon: HALOT
  rationale: La construcción con מִן + צפון en este contexto señala posición relativa. «Al norte de» expresa la relación de ubicación de manera idiomática en español.
- source_word: לְבֵית הָעֲרָבָה
  english_pob_choice: Beth-arabah
  chosen_spanish: Bet-arabá
  alternatives_spanish:
  - Bet Arabá
  - Bet-araba
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. La forma con guion sigue el patrón del registro inglés POB y distingue claramente el elemento «Bet-».
- source_word: אֶבֶן בֹּהַן
  english_pob_choice: the stone of Bohan
  chosen_spanish: la piedra de Bohán
  alternatives_spanish:
  - la piedra de Bohan
  - Bohán piedra
  lexicon: HALOT
  rationale: Se mantiene la relación constructa del hebreo. «La piedra de Bohán» es transparente y evita una reinterpretación posesiva que el hebreo no obliga a adoptar.
- source_word: בֶּן רְאוּבֵן
  english_pob_choice: son of Reuben
  chosen_spanish: hijo de Rubén
  alternatives_spanish:
  - el rubenita
  - descendiente de Rubén
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «hijo de Rubén», por lo que se conserva esa forma precisa. «Rubén» es la forma española usual del nombre bíblico.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el acuerdo alto entre el texto hebreo y el audio editorial inglés: se preserva la estructura de la fórmula fronteriza, el orden de los mojones y la alternativa posesiva documentada para אֶבֶן בֹּהַן.'
  spanish_consistency_notes:
  - Se usa «Bet-» de modo uniforme para topónimos compuestos con בית.
  - Se evita «SEÑOR» u otros sustitutos porque el versículo no contiene el Nombre divino.
  - «Límite» y «piedra» mantienen el carácter geográfico concreto del pasaje, sin añadir interpretaciones.
  - Los nombres propios se transliteran de forma estable y readable para español bíblico.
