  language: en
  yaml_path: translation/ot/1_samuel/011/015.yaml
  text: So all the people went to Gilgal[a], and there they made Saul king before Yahweh at Gilgal. There they sacrificed peace offerings before Yahweh, and there Saul and all the men of Israel rejoiced greatly.
  footnotes:
