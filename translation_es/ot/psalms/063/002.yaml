translation:
  language: es
  text: Dios, tú eres mi Dios; te busco al amanecer[a]. Mi alma tiene sed de ti, mi carne te anhela, en una tierra seca y árida, sin agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te busco temprano», «te busco con diligencia» o, de manera más interpretativa, «te busco con fervor». El verbo hebreo evoca literalmente buscar al amanecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: El sustantivo plural formal funciona aquí como designación singular del Dios de Israel. En español, "Dios" transmite la referencia sin añadir una interjección que el hebreo no expresa.
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios poderoso
  lexicon: HALOT
  rationale: 'אֵל con sufijo posesivo se entiende aquí como título de relación: "mi Dios". Se conserva la estructura de aposición con el vocativo inicial.'
- source_word: אַתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - tú
  lexicon: HALOT
  rationale: 'El pronombre independiente mantiene el énfasis de la identificación directa: "tú eres mi Dios". El verbo copulativo en español es necesario y natural.'
- source_word: אֲשַׁחֲרֶךָּ
  english_pob_choice: I seek you at dawn
  chosen_spanish: te busco al amanecer
  alternatives_spanish:
  - te busco temprano
  - te busco con diligencia
  - te busco de madrugada
  lexicon: HALOT
  rationale: Se preserva la imagen temporal de buscar al alba/amanecer, que es el núcleo semántico del verbo. "Al amanecer" suena natural en español y conserva la metáfora de inicio del día.
- source_word: צָמְאָה
  english_pob_choice: thirsts for
  chosen_spanish: tiene sed de
  alternatives_spanish:
  - sed de
  lexicon: HALOT
  rationale: Aunque una forma verbal literal sería posible, "tiene sed de" es idiomático en español y mantiene el sentido de anhelo intenso. Evita una formulación forzada.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: En la poesía hebrea, נֶפֶשׁ puede ser alma, vida o persona. Aquí, en contraste con "mi carne", "mi alma" conserva el paralelo interior/exterior sin perder naturalidad.
- source_word: כָּמַהּ
  english_pob_choice: longs for
  chosen_spanish: te anhela
  alternatives_spanish:
  - te suspira
  - te desea intensamente
  - te añora
  lexicon: HALOT
  rationale: El verbo expresa un deseo intenso, un pinar/añorar. "Anhela" es claro, digno y suficientemente fuerte en español, sin exceder la imagen del original.
- source_word: בְשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: Se conserva "carne" por su fuerza literal y por el paralelismo antropológico con "alma". En español bíblico moderno sigue siendo comprensible y evita aplanar la imaginería.
- source_word: בְּאֶרֶץ צִיָּה וְעָיֵף
  english_pob_choice: in a dry and weary land
  chosen_spanish: en tierra seca y agotada
  alternatives_spanish:
  - en una tierra seca y cansada
  - en una tierra árida y exhausta
  lexicon: HALOT
  rationale: צִיָּה apunta a sequedad/parchedness y עָיֵף a cansancio o agotamiento; aplicado a la tierra, "seca y agotada" conserva la personificación poética y el contraste con el agua.
- source_word: בְּלִי מָיִם
  english_pob_choice: without water
  chosen_spanish: sin agua
  alternatives_spanish:
  - sin ninguna agua
  - donde no hay agua
  lexicon: HALOT
  rationale: La frase privativa se expresa de forma concisa y natural con "sin agua". Mantiene el final enfático del verso sin sobreexplicar.
theological_decisions:
- issue: Paralelismo antropológico de נֶפֶשׁ / בָּשָׂר
  english_pob_reading: Retain 'my soul' and 'my flesh' as poetic inner/outer dimensions of the person
  chosen_spanish_reading: Mantener 'mi alma' y 'mi carne' como dimensiones poéticas interior y corporal de la persona
  alternative_spanish_readings:
  - '"todo mi ser" y "mi cuerpo" para mayor claridad contemporánea'
  rationale: El paralelismo hebreo quiere conservar la tensión entre deseo interior y corporal. Traducir con "alma" y "carne" preserva la textura teológica y literaria, sin imponer una dualidad filosófica ajena al poema.
  doctrine_reference: Translation philosophy §§3, 6; antropología bíblica del paralelismo poético
- issue: Intensidad devocional de אֲשַׁחֲרֶךָּ
  english_pob_reading: I seek you at dawn
  chosen_spanish_reading: Te busco al amanecer
  alternative_spanish_readings:
  - Te busco temprano
  - Te busco con diligencia
  rationale: Se mantiene la orientación temporal y devocional del verbo, evitando reducirlo a una mera idea de "buscar con empeño". La imagen del amanecer forma parte del sentido del original.
  doctrine_reference: Lexical guidance on שחר / seeking at dawn
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente hebreo y el audit trail inglés, respetando la imagen de búsqueda al amanecer y el paralelismo de sed/anhelo. La puntuación hace que "en tierra seca y agotada, sin agua" модifique la unidad entera de la sed y el anhelo, como en la revisión inglesa que unió las cláusulas con coma.
  spanish_consistency_notes:
  - Se usa "Dios" para אֱלֹהִים y "mi Dios" para אֵלִי, conforme al estándar del proyecto.
  - Se conserva "carne" por su fuerza antropológica y poética.
  - '"Amanecer" se eligió para reflejar el valor temporal de שחר sin caer en una paraphrasis interpretativa.'
  - La nota al pie marca la alternativa semántica principal de כָּמַהּ sin duplicar otras opciones menores.
