translation:
  language: es
  text: Uno está orando y otro está maldiciendo; ¿a cuál voz escuchará el Maestro?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oirá», «prestará atención a» o «atenderá». El verbo griego puede significar oír, a menudo con el matiz de oír favorablemente o prestar atención.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el Maestro» (ὁ δεσπότης), no el más común «el Señor» (κύριος).'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς ... καὶ εἷς
  english_pob_choice: One ... and one ...
  chosen_spanish: Uno ... y uno ...
  alternatives_spanish:
  - Uno ... y otro ...
  - El uno ... y el otro ...
  lexicon: LSJ
  rationale: La repetición de εἷς presenta dos participantes en contraste. «Uno ... y uno ...» conserva la brevedad y el paralelismo del griego sin expandir innecesariamente el sentido.
- source_word: εὐχόμενος
  english_pob_choice: is praying
  chosen_spanish: está orando
  alternatives_spanish:
  - ora
  - está rezando
  - hace una oración
  lexicon: BDAG
  rationale: En este contexto, frente a «maldiciendo», el sentido es claramente de oración. «Está orando» mantiene el valor verbal y resulta natural en español bíblico contemporáneo.
- source_word: καταρώμενος
  english_pob_choice: is cursing
  chosen_spanish: está maldiciendo
  alternatives_spanish:
  - lanza una maldición
  - está pronunciando una maldición
  - está invocando una maldición
  lexicon: BDAG
  rationale: El participio expresa el acto de maldecir. «Está maldiciendo» es directo y conserva el contraste con «está orando».
- source_word: τίνος
  english_pob_choice: which
  chosen_spanish: de cuál
  alternatives_spanish:
  - de quién
  - cuál
  - de qué persona
  lexicon: LSJ
  rationale: Aunque τίνος puede sonar como «de quién», aquí la revisión inglesa subraya que se trata de «which» en contraste entre dos voces. «De cuál» reproduce mejor esa comparación.
- source_word: φωνῆς
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - clamor
  - sonido
  - palabra
  lexicon: BDAG
  rationale: φωνή significa literalmente «voz». Mantener «voz» evita interpretar de antemano como «oración» para uno y «maldición» para el otro.
- source_word: εἰσακούσεται
  english_pob_choice: will ... listen to
  chosen_spanish: escuchará
  alternatives_spanish:
  - oirá
  - prestará atención a
  - atenderá
  lexicon: BDAG
  rationale: El verbo puede implicar oír con atención favorable. «Escuchará» conserva esa amplitud sin forzar una respuesta teológica explícita.
- source_word: ὁ δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Dueño
  - el Soberano
  - el Señor
  lexicon: BDAG
  rationale: δεσπότης no es κύριος. «El Maestro» distingue este título de «Señor» y preserva la relación de autoridad que el griego sugiere, sin borrar la diferencia léxica.
theological_decisions:
- issue: Distinción de δεσπότης frente a κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: La transparencia del proyecto requiere no nivelar δεσπότης con el término más habitual para κύριος. «El Maestro» conserva la singularidad del título y el tono de autoridad implícito.
  doctrine_reference: 'DOCTRINE.md: términos diferenciados; δεσπότης no debe fusionarse sin motivo con κύριος.'
- issue: Ambigüedad de τίνος en la pregunta retórica
  english_pob_reading: which voice
  chosen_spanish_reading: ¿de cuál voz escuchará el Maestro?
  alternative_spanish_readings:
  - ¿la voz de quién escuchará el Maestro?
  - ¿cuál voz escuchará el Maestro?
  rationale: La revisión inglesa corrigió «whose» por «which» para reflejar mejor el griego en el contraste entre dos voces. En español, «de cuál voz» mantiene esa comparación, aunque suene algo formal; se conserva para no perder el matiz del original.
  doctrine_reference: Notas de revisión del audit trail de Sirach 34:25.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que cambió la formulación inglesa de «whose voice» a «which voice» para reflejar mejor τίνος en este contraste entre dos voces. También se preservó la distinción léxica entre δεσπότης y κύριος mediante «el Maestro».
  spanish_consistency_notes:
  - Se evitó usar «Señor» para δεσπότης, siguiendo la distinción documental del POB inglés.
  - Se mantuvo «voz» para φωνή y no se interpretó como «oración» o «maldición» para no borrar el paralelismo del griego.
  - La redacción usa presente progresivo natural en español («está orando / está maldiciendo») para reflejar los participios griegos sin perder fluidez.
