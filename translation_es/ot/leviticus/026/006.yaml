  text: וְ/נָתַתִּ֤י שָׁלוֹם֙ בָּ/אָ֔רֶץ וּ/שְׁכַבְתֶּ֖ם וְ/אֵ֣ין מַחֲרִ֑יד וְ/הִשְׁבַּתִּ֞י חַיָּ֤ה רָעָה֙ מִן הָ/אָ֔רֶץ וְ/חֶ֖רֶב לֹא תַעֲבֹ֥ר בְּ/אַרְצְ/כֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/006.yaml
  text: And I will give peace in the land[a], and you will lie down, with no one making you afraid. And I will remove harmful beasts from the land[b], and the sword will not pass through your land.
  footnotes:
  - marker: a
    text: Or 'wild beasts.' The Hebrew phrase refers to dangerous animals in the land; 'harmful beasts' makes explicit the threatening sense of the adjective.
    reason: lexical_alternative
  - marker: b
    text: '''The sword'' is a Hebrew figure for war or armed invasion.'
    reason: lexical_alternative
