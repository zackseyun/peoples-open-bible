translation:
  language: es
  text: Entonces alcé mis ojos y vi, y he aquí, salían dos mujeres; y el viento estaba en sus alas. Tenían alas como las alas de una cigüeña, y alzaron el efa[a] entre la tierra y los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cesta de medida». El efa era una medida seca estándar y aquí se refiere al recipiente visto en la visión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre la tierra y el cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא עֵינַי
  english_pob_choice: Then I lifted up my eyes
  chosen_spanish: Entonces alcé mis ojos
  alternatives_spanish:
  - Luego alcé mis ojos
  - Levanté mis ojos
  lexicon: HALOT
  rationale: Conserva el modismo visionario hebreo y la secuencia narrativa; «alcé mis ojos» es natural en español bíblico sin volverse arcaizante.
- source_word: וָאֵרֶא וְהִנֵּה
  english_pob_choice: and saw, and behold
  chosen_spanish: y vi, y he aquí
  alternatives_spanish:
  - y vi, y miré
  - y vi, y entonces
  lexicon: HALOT
  rationale: Mantiene la vivacidad de la escena profética; «he aquí» comunica el valor deíctico de הִנֵּה sin perder solemnidad.
- source_word: שְׁתַּיִם נָשִׁים
  english_pob_choice: two women
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos mujeres
  lexicon: HALOT
  rationale: Traducción directa y explícita del género marcado en el hebreo.
- source_word: יֹצְאוֹת
  english_pob_choice: were coming out
  chosen_spanish: salían
  alternatives_spanish:
  - iban saliendo
  - estaban saliendo
  lexicon: HALOT
  rationale: El participio presenta una acción en curso en la visión; «salían» preserva ese aspecto con fluidez en español.
- source_word: וְרוּחַ בְּכַנְפֵיהֶם
  english_pob_choice: and the wind was in their wings
  chosen_spanish: y el viento estaba en sus alas
  alternatives_spanish:
  - y un viento estaba en sus alas
  - y el espíritu estaba en sus alas
  lexicon: HALOT
  rationale: Aquí רוּחַ se entiende mejor como «viento» por el contexto de vuelo y transporte; «sus alas» refleja el referente femenino del pasaje y suena natural en español.
- source_word: וְלָהֵנָּה כְנָפַיִם
  english_pob_choice: They had wings
  chosen_spanish: Tenían alas
  alternatives_spanish:
  - Y tenían alas
  - Les eran alas
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se expresa idiomáticamente con «tenían alas»; se evita una calca que sonaría extraña en español.
- source_word: כְּכַנְפֵי הַחֲסִידָה
  english_pob_choice: like the wings of a stork
  chosen_spanish: como las alas de una cigüeña
  alternatives_spanish:
  - como alas de cigüeña
  lexicon: HALOT
  rationale: חֲסִידָה es «cigüeña»; se conserva la comparación concreta y visual del hebreo.
- source_word: וַתִּשֶּׂאנָה
  english_pob_choice: they lifted up
  chosen_spanish: alzaron
  alternatives_spanish:
  - levantaron
  - transportaron
  lexicon: HALOT
  rationale: En este contexto de vuelo/traslado, «alzaron» reproduce bien la acción de elevar el efa sin forzar una interpretación más específica que la del hebreo.
- source_word: אֶת הָאֵיפָה
  english_pob_choice: the ephah
  chosen_spanish: el efa
  alternatives_spanish:
  - la efa
  - la medida
  lexicon: HALOT
  rationale: Se mantiene el término técnico «efa» para conservar la continuidad léxica y la imagen profética; en español puede entenderse como medida/recipiente sin reemplazar el vocablo original.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמָיִם
  english_pob_choice: between the earth and the heavens
  chosen_spanish: entre la tierra y los cielos
  alternatives_spanish:
  - entre la tierra y el cielo
  - entre la tierra y los cielos
  lexicon: HALOT
  rationale: «Tierra» y «cielos» conservan el contraste cósmico del hebreo y suenan naturales en español bíblico contemporáneo.
theological_decisions:
- issue: רוּחַ en la escena de transporte visionario
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  rationale: 'El contexto inmediato es físico y visual: alas, vuelo y elevación del efa. «Viento» evita introducir una lectura espiritual no requerida por la escena.'
  doctrine_reference: Translation philosophy §1, §3
- issue: אֵיפָה como unidad/objeto en la visión
  english_pob_reading: the ephah
  chosen_spanish_reading: el efa
  alternative_spanish_readings:
  - la medida
  - la cesta de medida
  rationale: Conservar «efa» preserva la continuidad del símbolo en la visión y evita sustituir el término técnico por una explicación interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: בֵּין הָאָרֶץ וּבֵין הַשָּׁמָיִם
  english_pob_reading: between the earth and the heavens
  chosen_spanish_reading: entre la tierra y los cielos
  alternative_spanish_readings:
  - entre la tierra y el cielo
  rationale: «Los cielos» refleja bien el plural hebreo y mantiene el contraste espacial amplio del pasaje.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail inglés sin cambios revisionales posteriores; la redacción española conserva el vocabulario técnico («efa»), el valor aspectual del participio y la imaginería espacial del versículo.
  spanish_consistency_notes:
  - Se mantiene «he aquí» para reproducir הִנֵּה de manera consistente con el estilo POB.
  - Se usa «cielos» en plural para reflejar הַשָּׁמָיִם y preservar el contraste cósmico.
  - Se evita «SEÑOR» o términos de reemplazo no presentes en el versículo.
  - «Efa» se conserva como tecnicismo bíblico, con aclaración en nota para lectores no familiarizados.
