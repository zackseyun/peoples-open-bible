translation:
  language: es
  text: Él anda en mis estatutos y guarda mis juicios[a], actuando con fidelidad; él es justo; ciertamente vivirá, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obrando con fidelidad»; el hebreo puede entenderse como «hacer verdad», es decir, actuar con verdad o fidelidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֻקּוֹתַי
  english_pob_choice: in my statutes
  chosen_spanish: en mis estatutos
  alternatives_spanish:
  - por mis estatutos
  - según mis estatutos
  lexicon: HALOT
  rationale: חֻקּוֹתַי designa disposiciones normativas del pacto. En español, «estatutos» conserva el matiz jurídico-covenantal y «andar en» reproduce bien el hebraísmo sin sonar forzado.
- source_word: יְהַלֵּךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: HALOT
  rationale: El verbo hebreo expresa conducta habitual, no solo desplazamiento físico. «Anda» es natural en español y puede conservar el valor idiomático de la manera de vivir.
- source_word: וּמִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis decretos
  alternatives_spanish:
  - mis juicios
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones/mandatos legales. «Decretos» comunica bien el peso normativo en español y mantiene el paralelo con «estatutos».
- source_word: שָׁמַר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: HALOT
  rationale: En contexto legal-covenantal, שׁמר implica guardar/observar cuidadosamente. «Guarda» conserva mejor la imagen de custodia fiel que «cumple».
- source_word: לַעֲשׂוֹת אֱמֶת
  english_pob_choice: acting faithfully
  chosen_spanish: actuando con fidelidad
  alternatives_spanish:
  - obrando con verdad
  - haciendo verdad
  lexicon: HALOT
  rationale: אֱמֶת aquí no es solo «verdad» abstracta, sino confiabilidad, rectitud y fidelidad práctica. «Actuando con fidelidad» expresa ese valor ético sin perder la tensión lexical entre verdad y fidelidad.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justificado
  lexicon: HALOT
  rationale: צַדִּיק en este marco de pacto y responsabilidad ética puede traducirse con «justo». En español, «justo» suena natural y mantiene el valor moral/legal sin depender de un uso técnico posterior.
- source_word: חָיֹה יִחְיֶה
  english_pob_choice: he shall surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá sin duda
  - de cierto vivirá
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la certeza de la promesa. «Ciertamente vivirá» reproduce esa fuerza enfática de manera idiomática en español.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé, el Señor
  alternatives_spanish:
  - declara Yahvé Dios
  - afirma el Señor Yahvé
  lexicon: HALOT
  rationale: Se distingue el nombre divino יְהוָה como «Yahvé» conforme al criterio del proyecto, y אֲדֹנָי como «el Señor». La aposición preserva el tono solemne del fórmulario profético sin ocultar el nombre del pacto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé Dios
  rationale: El hebreo conserva explícitamente el Tetragrámaton. Siguiendo la directriz del proyecto, se traduce como «Yahvé» en vez de ocultarlo bajo mayúsculas o una máscara litúrgica. «El Señor» representa אֲדֹנָי y mantiene la solemnidad de la clausura oracular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la promesa de vida en חָיֹה יִחְיֶה
  english_pob_reading: he shall surely live
  chosen_spanish_reading: ciertamente vivirá
  alternative_spanish_readings:
  - vivirá seguramente
  - de seguro vivirá
  rationale: La frase promete vida con énfasis enfático en el marco de la argumentación de Ezequiel sobre responsabilidad individual. La traducción conserva esa seguridad sin añadir especificaciones teológicas que el contexto inmediato no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Valor de אֱמֶת en לַעֲשׂוֹת אֱמֶת
  english_pob_reading: acting faithfully
  chosen_spanish_reading: actuando con fidelidad
  alternative_spanish_readings:
  - obrando con verdad
  - actuando con verdad y fidelidad
  rationale: Aquí אֱמֶת expresa verdad practicada, confiabilidad y fidelidad ética. En español, «fidelidad» preserva ese peso relacional y moral, evitando reducir el término a veracidad abstracta.
  doctrine_reference: HALOT lexical sense for אֱמֶת in ethical context
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión más reciente del POB en inglés, que prefirió una forma más natural («acting faithfully») sobre una infinidad más rígida. En español se reflejó esa misma naturalidad con «actuando con fidelidad», manteniendo la equivalencia óptima y la tensión lexical de אֱמֶת.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton conforme al criterio del proyecto.
  - Se eligió «estatutos» y «decretos» para conservar el registro jurídico-covenantal del par חֻקּוֹת / מִשְׁפָּטִים.
  - «Anda» reproduce el hebraísmo de conducta habitual mejor que un simple desplazamiento físico.
  - La nota[a] preserva la alternativa lexical de אֱמֶת sin borrar el sentido principal del texto.
