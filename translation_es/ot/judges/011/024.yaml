translation:
  language: es
  text: ¿No poseerás lo que Quemós tu dios te hace poseer[a]? Y todo lo que Yahvé nuestro Dios ha quitado de delante de nosotros[b], eso poseeremos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «lo que Quemós tu dios te hace poseer»; el verbo puede llevar el sentido de obtener posesión al desposeer a otros.
    reason: lexical_alternative
  - marker: b
    text: O «ha desposeído de delante de nosotros» / «ha expulsado de delante de nosotros»; el hebreo expresa quitar de la presencia o del camino de Israel a ocupantes previos.
    reason: lexical_alternative
  - marker: c
    text: O «heredaremos» / «tomaremos posesión de» para el verbo hebreo repetido ירשׁ; el término se refiere a la posesión de territorio, a menudo mediante la desposesión de ocupantes previos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No poseerás…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es verdad que…?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y espera asentimiento. En español, la forma con futuro directo conserva el tono de desafío argumentativo y suena natural en discurso directo.
- source_word: יוֹרִישְׁךָ
  english_pob_choice: causes you to possess
  chosen_spanish: te hace poseer
  alternatives_spanish:
  - te causa poseer
  - te hace heredar
  lexicon: HALOT
  rationale: El hifil de ירשׁ expresa causación de posesión, a menudo mediante desposesión previa. «Te hace poseer» comunica el efecto causal sin perder naturalidad en español.
- source_word: כְּמוֹשׁ אֱלֹהֶיךָ
  english_pob_choice: Chemosh your god
  chosen_spanish: Quemós tu dios
  alternatives_spanish:
  - Quemós, tu dios
  - Quemós, tu dios al que sirves
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se conserva la aposición directa «tu dios», porque el hebreo presenta la formulación sin matiz adicional. No se añaden comillas ni distanciamiento interpretativo.
- source_word: תִירָשׁ
  english_pob_choice: possess
  chosen_spanish: poseerás
  alternatives_spanish:
  - heredarás
  - tomarás posesión de
  lexicon: HALOT
  rationale: Aquí ירשׁ se refiere a la posesión territorial. «Poseer» mantiene la fuerza semántica y funciona mejor en español que «heredar», que sonaría demasiado familiar o testamentario.
- source_word: הוֹרִישׁ
  english_pob_choice: has dispossessed
  chosen_spanish: ha desposeído
  alternatives_spanish:
  - ha expulsado
  - ha quitado de en medio
  lexicon: HALOT
  rationale: El hifil foregrounda la acción de remover a los ocupantes previos. «Desposeído» preserva esa fuerza de expulsión/conquista y enlaza con la posesión resultante del final del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.'
- source_word: מִפָּנֵינוּ
  english_pob_choice: before us
  chosen_spanish: de delante de nosotros
  alternatives_spanish:
  - de ante nosotros
  - de nuestra presencia
  lexicon: HALOT
  rationale: La locución hebrea indica remoción espacial en relación con el pueblo. «De delante de nosotros» reproduce bien la imagen de desalojo y es natural en español bíblico contemporáneo.
- source_word: נִירָשׁ
  english_pob_choice: we will possess
  chosen_spanish: poseeremos
  alternatives_spanish:
  - heredaremos
  - tomaremos posesión de
  lexicon: HALOT
  rationale: Se conserva la coherencia léxica con la primera mitad del versículo y el sentido territorial de ירשׁ.
theological_decisions:
- issue: Referencia a Quemós como «tu dios» en el argumento de Jefté
  english_pob_reading: Translate straightforwardly as diplomatic/rhetorical speech without implying the narrator affirms Chemosh's real divinity or power.
  chosen_spanish_reading: Traducir literalmente el argumento retórico sin añadir comillas, ironía explícita ni marcadores que nieguen la afirmación del hablante.
  alternative_spanish_readings:
  - «tu supuesto dios»
  - «tu llamado dios»
  - poner comillas a «tu dios»
  rationale: El hebreo presenta la argumentación de Jefté tal como la pronuncia. Añadir distanciamiento introduciría una interpretación no exigida por el texto y alteraría la fuerza retórica del intercambio diplomático.
  doctrine_reference: Affirmaciones; filosofía de traducción §1 y §3
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audito en inglés con alta concordancia. Se adoptó «te hace poseer» para reflejar el valor causativo del hifil, y «ha desposeído de delante de nosotros» para mantener la imagen espacial y la relación causa-resultado entre desposeer y poseer. Se mantiene «Yahvé» conforme a la política del proyecto y «Quemós» como transliteración del nombre propio.
  spanish_consistency_notes:
  - Se conserva la repetición de ירשׁ con un mismo campo léxico («poseer» / «poseeremos») para reflejar la cohesión del hebreo.
  - El nombre divino יְהוָה se vierte como «Yahvé» en todo el texto, en coherencia con el proyecto.
  - «de delante de nosotros» reproduce el valor idiomático de מִפָּנֵינוּ sin convertirlo en una paráfrasis explicativa.
  - No se atenúa la referencia a Quemós; la frase conserva la voz del hablante y la lógica argumentativa del contexto.
