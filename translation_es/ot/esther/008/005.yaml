    rationale: 'El inglés preservó expresamente esta alternativa literal: «the letters, the scheme of Haman». Esa explicación debe mantenerse también en español, porque aclara que las cartas encarnaban la trama de Amán.'
  - severity: low
    issue: 'Error ortográfico en la nota [c]: «Literlamente».'
    rationale: Debe corregirse a «Literalmente».
