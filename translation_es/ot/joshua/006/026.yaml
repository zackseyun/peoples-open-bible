base_translation:
  language: en
  yaml_path: translation/ot/joshua/006/026.yaml
  text: At that time Joshua made them swear[a], saying, “Cursed before Yahweh is the man who rises up and rebuilds this city, Jericho. At the cost of his firstborn he will lay its foundation[c][b], and at the cost of his youngest he will set up its gates.”
  footnotes:
  - marker: a
    text: 'Or ''adjured them'' / ''put them under oath.'' The Hebrew verb is causative: Joshua caused the people to swear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Cursed before the LORD is anyone who rises up and rebuilds this city.' Hebrew 'the man' is grammatically masculine singular and functions generically here.
    reason: lexical_alternative
  - marker: c
    text: Literally 'with/in his firstborn ... and with/in his youngest.' The expression likely means 'at the cost of' them.
    reason: lexical_alternative
