  text: וְ/הַ/גּ֗וֹי אֲשֶׁ֨ר יָבִ֧יא אֶת צַוָּאר֛/וֹ בְּ/עֹ֥ל מֶֽלֶךְ בָּבֶ֖ל וַֽ/עֲבָד֑/וֹ וְ/הִנַּחְתִּ֤י/ו עַל אַדְמָת/וֹ֙ נְאֻם יְהוָ֔ה וַֽ/עֲבָדָ֖/הּ וְ/יָ֥שַׁב בָּֽ/הּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/027/011.yaml
  text: But the nation that brings its neck under the yoke of the king of Babylon and serves him[a], I will let remain on its own land, declares Yahweh[b], and it will till it and dwell in it.
  footnotes:
  - marker: a
    text: Or 'I will leave it on its land' or 'I will let it rest on its land.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and it will work it,' that is, the land; alternatively, 'cultivate it.'
    reason: lexical_alternative
