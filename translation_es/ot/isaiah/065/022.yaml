  rationale: Se reemplaza «para que» por la simple coordinación futura para reflejar con más precisión la sintaxis hebrea y evitar una finalidad no expresada. Se conserva «desgastarán» por fidelidad a יְבַלּוּ según la revisión auditada, con nota aclaratoria para prevenir una lectura equívoca en español. No se requiere adjudicación adicional porque el ajuste es estilístico y de alineación sintáctica, no doctrinal ni textualmente incierto.
