    rationale: El inglés auditado fue revisado de 'all at once' a 'at once' precisamente para evitar intensificación innecesaria. En español, 'en un solo momento' introduce una formulación más explicativa de la que exige el proverbio; el matiz interpretativo ya debe quedar en la nota.
  - severity: low
