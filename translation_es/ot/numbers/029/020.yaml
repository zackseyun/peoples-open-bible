translation:
  language: es
  text: 'Y el tercer día: once toros, dos carneros, catorce corderos de un año, todos sin defecto[a],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sin mancha". El término hebreo se refiere a animales sacrificiales libres de defecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y en el día
  - En el ... día
  lexicon: HALOT
  rationale: La combinación de conjunción y preposición introduce naturalmente el siguiente día de la serie ritual. En español, "Y en el tercer día" conserva la coordinación enumerativa del hebreo sin sonar forzado.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Es un ordinal directo que modifica a "día"; "tercer" es la forma natural antepuesta en español.
- source_word: פָּרִים עַשְׁתֵּי עָשָׂר
  english_pob_choice: eleven bulls
  chosen_spanish: once toros
  alternatives_spanish:
  - once becerros
  - once bueyes
  - once toros jóvenes
  lexicon: HALOT
  rationale: El contexto sacrificial pide un término para ganado macho ofrecido en sacrificio. "Toros" refleja bien el valor léxico de פָּרִים sin añadir "jóvenes", que no está explícito en el hebreo. Se evita "bueyes" por su posible asociación con animales de tiro más que con la ofrenda ritual.
- source_word: אֵילִם שְׁנָיִם
  english_pob_choice: two rams
  chosen_spanish: dos carneros
  alternatives_spanish:
  - dos machos de oveja
  - dos rams
  lexicon: HALOT
  rationale: '"Carneros" es el equivalente español claro y estándar para el animal sacrificial masculino. Conserva el valor técnico del término sin una paráfrasis excesiva.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen one-year-old lambs
  chosen_spanish: catorce corderos de un año
  alternatives_spanish:
  - catorce corderos de un año de edad
  - catorce corderos de un año cumplido
  lexicon: HALOT
  rationale: '"Corderos" comunica bien כְּבָשִׂים en contexto sacrificial. La idiomática hebrea "hijos de un año" se vierte naturalmente como "de un año", preservando la especificación de edad sin calco pesado.'
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - sin tacha
  lexicon: HALOT
  rationale: En lenguaje sacrificial, תָּמִים/תְּמִימִם indica animales libres de defecto físico. "Sin defecto" es claro y fiel; evita "perfectos", que podría desviar el sentido hacia una cualidad moral o abstracta.
theological_decisions:
- issue: Estado ritual de los animales ofrecidos
  english_pob_reading: without blemish means sacrificial animals are free from defect
  chosen_spanish_reading: sin defecto
  alternative_spanish_readings:
  - sin mancha
  - sin tacha
  rationale: 'La elección mantiene el sentido cultual del texto: animales aptos para sacrificio por carecer de defecto físico. No se introduce una carga moral ajena al contexto.'
  doctrine_reference: Levítico 22:19-25; Deuteronomio 17:1
translation_notes:
  revision_awareness: El texto base y el cotejo revisado muestran acuerdo alto y sin cambios pendientes; se preserva la estructura enumerativa y la terminología sacrificial establecida en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se usa terminología sacrificial consistente: toros, carneros, corderos, sin defecto.'
  - La puntuación con dos puntos reproduce la enumeración solemne del original y del inglés auditado.
