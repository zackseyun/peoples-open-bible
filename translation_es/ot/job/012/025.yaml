translation:
  language: es
  text: Tantean en tinieblas[a], sin luz; él los hace tambalear como un borracho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hace errar». El verbo hebreo puede expresar tanto vagar como desviarse; aquí, el paralelo con «tantean en tinieblas» y «como un borracho» favorece la idea de tambalearse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמַשְׁשׁוּ
  english_pob_choice: they grope
  chosen_spanish: tantean
  alternatives_spanish:
  - palpan
  - andan tanteando
  lexicon: HALOT
  rationale: El verbo en piel expresa buscar o tocar a tientas con la mano cuando falta la visión. «Tantean» comunica en español la acción de moverse y buscar a oscuras sin volverse explicativo en exceso.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombra
  lexicon: HALOT
  rationale: «Tinieblas» mantiene el campo semántico de oscuridad intensa y suena natural en español bíblico sin depender de un giro arcaizante rígido.
- source_word: וְלֹא אוֹר
  english_pob_choice: without light
  chosen_spanish: sin luz
  alternatives_spanish:
  - y no luz
  - y sin luz
  lexicon: HALOT
  rationale: La relación hebrea literalmente dice «y no luz», pero en español «sin luz» expresa con mayor naturalidad la contraposición total preservada por el texto.
- source_word: וַיַּתְעֵם
  english_pob_choice: he makes them stagger
  chosen_spanish: él los hace tambalear
  alternatives_spanish:
  - él los hace errar
  - él los hace andar extraviados
  - los hace vagar
  lexicon: HALOT
  rationale: 'El causativo de תעה puede significar hacer errar o vagar, pero el contexto inmediato de ir a tientas en tinieblas y la comparación con un borracho favorecen en español la imagen de desequilibrio físico: «tambalear».'
- source_word: כַּשִּׁכּוֹר
  english_pob_choice: like a drunkard
  chosen_spanish: como borracho
  alternatives_spanish:
  - como un ebrio
  - como un borracho
  lexicon: HALOT
  rationale: El sustantivo/adjetivo describe a una persona ebria. «Como borracho» conserva la comparación y suena idiomático; el artículo indefinido puede omitirse en español sin perder sentido.
theological_decisions:
- issue: Sujeto implícito de וַיַּתְעֵם
  english_pob_reading: he makes them stagger
  chosen_spanish_reading: él los hace tambalear
  alternative_spanish_readings:
  - los hace tambalear
  - él los hace errar
  rationale: La forma verbal hebrea es 3ms con sufijo de objeto plural, por lo que el sujeto singular debe mantenerse explícito. Dado el contexto del libro, ese «él» apunta a Dios; conservarlo evita borrar la agencia divina que el texto da por sentada.
  doctrine_reference: Job 12:25; lectura gramatical del perfecto/wayyiqtol con objeto plural; POB translation philosophy
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; la presente propuesta sigue ese estado estable, manteniendo la misma lectura de conjunto y trasladando al español la tensión lexical entre «errar/vagar» y «tambalear» sin perder la imagen de desorientación.
  spanish_consistency_notes:
  - Se preservó el sujeto singular explícito («él») para reflejar la gramática hebrea y la agencia divina implícita en el contexto.
  - Se evitó «SEÑOR» para no sustituir el nombre divino cuando no aparece en este versículo; el verso contiene un sujeto implícito, no una forma del Tetragrámaton.
  - «Tinieblas» y «sin luz» mantienen el paralelismo poético sin añadir interpretaciones ajenas al hebreo.
