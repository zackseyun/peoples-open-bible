translation:
  language: es
  text: Todo alimento que se pueda comer[a], al cual le llegue agua, quedará impuro; y toda bebida que se pueda beber en cualquier recipiente quedará impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «todo alimento que es comido, al cual le llega agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל
  english_pob_choice: Any
  chosen_spanish: Todo
  alternatives_spanish:
  - Cualquier
  - De todo
  lexicon: HALOT
  rationale: El hebreo tiene un valor distributivo/general. En español, «todo alimento» comunica ese alcance de manera natural y legal, sin sonar forzado. «Cualquier» también sería posible, pero aquí «todo» suena más fluido en el registro de Levítico.
- source_word: הָאֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimento comestible
  lexicon: HALOT
  rationale: El sustantivo se refiere a lo que se come. «Alimento» es un término claro, digno y apto para un contexto ritual; evita la redundancia de «comida» en una formulación legal.
- source_word: אֲשֶׁר יֵאָכֵל
  english_pob_choice: that may be eaten
  chosen_spanish: que se pueda comer
  alternatives_spanish:
  - que pueda comerse
  - que se come
  lexicon: HALOT
  rationale: El niphal imperfecto expresa una cualidad/categoría de lo comestible. «Que se pueda comer» conserva ese matiz de posibilidad o aptitud sin volverlo una paráfrasis excesiva.
- source_word: אֲשֶׁר יָבֹא עָלָיו מַיִם
  english_pob_choice: on which water comes
  chosen_spanish: sobre el cual caiga agua
  alternatives_spanish:
  - sobre el que venga agua
  - sobre el que entre agua
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «que agua venga sobre él». En español, «caiga agua sobre el cual» o «sobre el cual caiga agua» reproduce el movimiento y la relación preposicional de manera natural.
- source_word: יִטְמָא
  english_pob_choice: becomes unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - se contaminará
  - se volverá impuro
  lexicon: HALOT
  rationale: En este contexto ritual, טמא expresa un cambio de estado cultual. «Quedará impuro» comunica el resultado legal de forma sobria y legible; «impuro» preserva el término técnico más directamente que «contaminado».
- source_word: מַשְׁקֶה
  english_pob_choice: drink
  chosen_spanish: bebida
  alternatives_spanish:
  - líquido
  - lo que se bebe
  lexicon: HALOT
  rationale: Aquí el término designa algo para beber. «Bebida» es la opción más natural en español y mantiene la categoría semántica sin ampliar el sentido a cualquier líquido.
- source_word: אֲשֶׁר יִשָּׁתֶה
  english_pob_choice: that may be drunk
  chosen_spanish: que se pueda beber
  alternatives_spanish:
  - que pueda beberse
  - que se bebe
  lexicon: HALOT
  rationale: El pasivo niphal describe la aptitud de lo bebible. «Que se pueda beber» es un equivalente claro y idiomático, manteniendo la idea de categoría apta para beber.
- source_word: בְּכָל כְּלִי
  english_pob_choice: in any vessel
  chosen_spanish: en cualquier vaso
  alternatives_spanish:
  - en cualquier recipiente
  - en todo recipiente
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para recipiente/vaso/utensilio. «Vaso» funciona bien en español moderno y sigue el registro concreto del texto; «recipiente» también sería válido, pero menos cotidiano. Dado el contexto alimentario, «vaso» comunica con sencillez sin perder precisión.
theological_decisions:
- issue: Pureza ritual y término técnico de impureza
  english_pob_reading: becomes unclean
  chosen_spanish_reading: quedará impuro
  alternative_spanish_readings:
  - se volverá impuro
  - se contaminará
  rationale: No se suaviza el concepto a una simple higiene. El texto trata de impureza ritual/cultual, y «impuro» mantiene ese valor técnico. «Quedará» expresa el cambio de estado en la situación legal.
  doctrine_reference: Levítico 11; distinción entre pureza ritual y limpieza física
- issue: Alcance distributivo de «any food» y «any drink»
  english_pob_reading: Any food ... and any drink ... in any vessel
  chosen_spanish_reading: Todo alimento... y toda bebida... en cualquier vaso
  alternative_spanish_readings:
  - Cualquier alimento... y cualquier bebida...
  - Todo lo que se coma... y todo lo que se beba...
  rationale: Se conserva la generalidad del hebreo sin convertirlo en una abstracción más amplia de lo que el texto dice. «Todo» mantiene el carácter distributivo de la norma.
  doctrine_reference: Exégesis del lenguaje legal en Levítico
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «on which water comes» para reflejar con más precisión la construcción hebrea. En español se reproduce esa relación con «sobre el cual caiga agua», manteniendo el tono legal y evitando una paráfrasis interpretativa. No se introduce ninguna tensión doctrinal nueva; el foco permanece en la impureza ritual de alimentos y bebidas al contacto con agua en ciertos recipientes.
  spanish_consistency_notes:
  - Se usa «impuro» como término técnico de pureza ritual, en continuidad con Levítico.
  - Se evita «SEÑOR» o equivalentes de sustitución porque este versículo no contiene el Tetragrámaton.
  - «Vaso» se emplea en sentido amplio de recipiente, adecuado al contexto de utensilios para beber.
  - La nota al pie conserva la alternativa más literal del hebreo sin duplicar innecesariamente el sentido principal.
