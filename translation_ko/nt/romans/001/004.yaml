id: ROM.1.4
reference: Romans 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ ὁρισθέντος υἱοῦ θεοῦ ἐν δυνάμει κατὰ πνεῦμα ἁγιωσύνης ἐξ ἀναστάσεως νεκρῶν, Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/004.yaml
  text: and who was declared to be the Son of God in power according to the Spirit of holiness by the resurrection from the dead—Jesus Messiah our Lord[b][a],
  footnotes:
  - marker: a
    text: Or 'declared' or 'designated' Son of God in power.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the Holy Spirit.'
    reason: alternative_reading
translation:
  language: ko
  text: 거룩하심의 영을 따라서는 죽은 자들로부터의 부활로 능력 가운데 하나님의 아들로 선포되신[a] 분, 곧 우리 주 예수 메시아입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「지명된」, 「임명된」. 헬라어 ὁρισθέντος는 「경계를 정하여 드러내다」의 함의를 지닌다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρισθέντος
  english_pob_choice: declared
  chosen_korean: 선포되신
  alternatives_korean:
  - 지명된
  - 임명된
  - 공식적으로 드러난
  lexicon: BDAG
  rationale: 바울이 본디 신성이 부활로 「드러나」 공식적으로 선포되었다는 의미를 보존한다. 「임명된」은 입양주의 해석을 함의할 수 있어 피한다.
- source_word: πνεῦμα ἁγιωσύνης
  english_pob_choice: Spirit of holiness
  chosen_korean: 거룩하심의 영
  alternatives_korean:
  - 성령
  - 거룩의 영
  lexicon: BDAG
  rationale: 헬라어 표현이 일반적 πνεῦμα ἅγιον보다 특이한 셈어식이므로 직역에 가까운 「거룩하심의 영」을 채택한다.
