  text: And he sent letters to all the provinces of the king[a], to each province in its own script and to each people in its own language[d][c][b], that every man should be master in his own house and speak the language of his own people.
  footnotes:
  - marker: a
    text: Or 'all the king's provinces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in its own script ... in its own language,' emphasizing that the decree was distributed in forms appropriate to each province and people.
