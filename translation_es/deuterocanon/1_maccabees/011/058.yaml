review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del griego y el sentido cortesano del versículo, incluyendo los tres privilegios concedidos. Sin embargo, dos elecciones debilitan la fidelidad semántica en español: «beber en objetos de oro» no es idiomático y no transmite claramente el uso de recipientes para beber; además, la repetición de «objetos de oro» pierde la concreción contextual que el propio griego adquiere por el sintagma πίνειν ἐν χρυσώμασιν. Conviene ajustar χρυσώματα en este contexto a «vasijas» o «vasos» de oro, manteniendo nota para la amplitud léxica.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «beber en objetos de oro» suena antinatural y puede resultar confuso. «Vestir púrpura» y «broche de oro» son buenas soluciones. La frase inicial también gana naturalidad si χρυσώματα se vierte como «vasijas de oro» en vez de «objetos de oro», sin perder demasiada amplitud gracias a nota aclaratoria.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales armonizan con el audit trail inglés salvo en la necesidad de una solución española más natural para χρυσώματα y πίνειν ἐν χρυσώμασιν. «Autorización» para ἐξουσίαν es aceptable, aunque «privilegio» también sería posible; no requiere cambio.
  issues:
  - severity: high
    issue: «beber en objetos de oro» es poco idiomático y semánticamente impreciso
    rationale: El griego πίνειν ἐν χρυσώμασιν indica beber usando recipientes de oro. En español, «beber en objetos» suena incorrecto y no deja claro que se trata de vasijas o vasos.
  - severity: medium
    issue: «objetos de oro» en la primera mención resulta demasiado amplio para el contexto inmediato
    rationale: Aunque χρυσώματα puede significar objetos de oro en general, el mismo versículo los vincula con beber de ellos; una forma más concreta como «vasijas de oro» preserva mejor el contexto cortesano y de mesa, con nota para la amplitud léxica.
  - severity: low
    issue: Faltan notas que preserven alternativas léxicas ya documentadas en el audit trail inglés
    rationale: El inglés conserva alternativas para χρυσώματα, διακονίαν y πόρπη. En español, al menos una nota para χρυσώματα y otra para los términos más debatibles ayuda a mantener la trazabilidad y evitar pérdida de matiz.
