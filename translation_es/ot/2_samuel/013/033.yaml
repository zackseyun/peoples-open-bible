    text: 'Hebreo literalmente: «no ponga esta palabra/asunto en su corazón».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase idiomática para un español más natural y fiel al sentido, mientras la nota conserva la formulación literal hebrea. Se elimina la nota redundante sobre «solo», y se mueve el anclaje de la nota al lugar correcto en el texto.
