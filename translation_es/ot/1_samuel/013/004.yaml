translation:
  language: es
  text: 'Y todo Israel oyó decir[a]: «Saúl ha atacado a la guarnición filistea[c], y además Israel se ha vuelto odioso[b] a los filisteos». Entonces el pueblo fue convocado para unirse a Saúl en Guilgal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oyó el informe». La expresión hebrea introduce noticia reportada con la estructura «oír + decir».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se ha vuelto un hedor»; es un modismo que expresa que Israel se volvió detestable o repulsivo para los filisteos.
    reason: lexical_alternative
  - marker: c
    text: O «el prefecto/gobernador filisteo» o «el puesto filisteo». El término hebreo puede referirse a un oficial o a una fuerza estacionada; el contexto militar favorece «guarnición».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ לֵאמֹר
  english_pob_choice: heard it said
  chosen_spanish: oyó decir
  alternatives_spanish:
  - oyó el reporte
  - oyó que decían
  lexicon: HALOT
  rationale: La fórmula hebrea combina el verbo de oír con un infinitivo de decir para introducir noticia indirecta. «Oyó decir» conserva ese giro reportativo sin volverlo mecánico.
- source_word: הִכָּה
  english_pob_choice: has struck down
  chosen_spanish: ha derrotado
  alternatives_spanish:
  - ha golpeado
  - ha herido
  - ha abatido
  lexicon: HALOT
  rationale: En contexto militar, el verbo puede expresar golpear/smiter, pero el sentido comunicativo aquí es la victoria sobre la fuerza filistea. «Ha derrotado» comunica el resultado bélico de manera natural en español.
- source_word: נְצִיב פְּלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: el destacamento filisteo
  alternatives_spanish:
  - la guarnición filistea
  - el prefecto filisteo
  - el puesto filisteo
  lexicon: HALOT
  rationale: El sustantivo admite tanto una persona/funcionario como un puesto militar. Siguiendo el contexto bélico y la decisión inglesa de favorecer el sentido militar, «destacamento» preserva la referencia a una fuerza estacionada sin forzar una lectura administrativa.
- source_word: נִבְאַשׁ
  english_pob_choice: has become odious
  chosen_spanish: se ha vuelto odioso
  alternatives_spanish:
  - se ha hecho detestable
  - ha llegado a ser un hedor
  - se ha hecho abominable
  lexicon: HALOT
  rationale: La raíz evoca literalmente un mal olor y, por extensión, repulsión. «Se ha vuelto odioso» mantiene la fuerza relacional y el matiz de rechazo sin perder inteligibilidad.
- source_word: בַּפְּלִשְׁתִּים
  english_pob_choice: to the Philistines
  chosen_spanish: a los filisteos
  alternatives_spanish:
  - entre los filisteos
  - ante los filisteos
  - para los filisteos
  lexicon: HALOT
  rationale: Con el verbo de volverse odioso, la preposición marca la relación hostil con quienes consideran repulsivo a Israel. «A los filisteos» es la forma más directa en español y mantiene esa relación.
- source_word: וַיִּצָּעֲקוּ
  english_pob_choice: were called out
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fueron convocados
  - se reunió
  - fueron llamados a filas
  lexicon: HALOT
  rationale: Aunque el verbo puede traducirse como «gritar/clamar», aquí, junto con la frase siguiente, tiene valor de movilización o convocatoria militar. «Fue llamado» conserva la idea de ser convocado para reunirse y seguir a Saúl.
- source_word: אַחֲרֵי שָׁאוּל
  english_pob_choice: to join Saul
  chosen_spanish: a seguir a Saúl
  alternatives_spanish:
  - tras Saúl
  - detrás de Saúl
  - para seguir a Saúl
  lexicon: HALOT
  rationale: Literalmente «después de Saúl», pero en este contexto expresa seguirlo en una acción común. «A seguir a Saúl» comunica bien la dirección funcional del hebreo sin convertirlo en una secuencia temporal.
- source_word: הַגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Guilgal
  alternatives_spanish:
  - a Guilgal
  - en Gilgal
  lexicon: HALOT
  rationale: El topónimo se translitera como «Guilgal» para una sonoridad natural en español y coherente con la tradición bíblica hispana. Se mantiene la referencia locativa con «en».
theological_decisions:
- issue: Cómo reflejar el matiz idiomático de «Israel se ha vuelto odioso/hedor» sin suavizarlo de más
  english_pob_reading: Israel has also become odious to the Philistines.
  chosen_spanish_reading: Israel se ha vuelto odioso a los filisteos.
  alternative_spanish_readings:
  - Israel se ha hecho un hedor para los filisteos
  - Israel se ha hecho detestable para los filisteos
  rationale: La frase hebrea expresa rechazo hostil mediante una metáfora olfativa. La redacción española principal mantiene el valor relacional y evita borrar la tensión figurada, mientras que la nota conserva la alternativa más literal.
  doctrine_reference: Uso figurado del lenguaje en la Escritura; preservación de metáforas semíticas.
- issue: Valor de la reunión del pueblo junto a Saúl
  english_pob_reading: Then the people were called out to join Saul at Gilgal.
  chosen_spanish_reading: Entonces el pueblo fue llamado a seguir a Saúl en Guilgal.
  alternative_spanish_readings:
  - Entonces el pueblo fue convocado para reunirse con Saúl en Guilgal
  - Entonces el pueblo fue llamado tras Saúl en Guilgal
  rationale: El hebreo sugiere movilización militar más que simple desplazamiento o ruido. La formulación elegida mantiene la idea de convocatoria y seguimiento sin reducirla a una llamada genérica.
  doctrine_reference: Lectura contextual de verbos de reunión/movilización en narrativa histórica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó «were summoned» por «were called out» para reflejar con mayor precisión el verbo hebreo de convocatoria/movilización. Se evitó traducir mecánicamente desde el inglés y se atendió directamente a la ambigüedad de נְצִיב y al modismo de נִבְאַשׁ.
  spanish_consistency_notes:
  - Se usa «Guilgal» como transliteración uniforme del topónimo.
  - Se mantiene «filisteos» en minúscula por tratarse del gentilicio y no de un nombre propio.
  - Se preserva el contraste entre la victoria sobre el destacamento y la hostilidad resultante hacia Israel.
  - La frase final conserva el sentido de movilización militar, no solo de reunión social.
