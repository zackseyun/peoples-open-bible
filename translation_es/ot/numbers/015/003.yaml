translation:
  language: es
  text: y presentarán una ofrenda hecha por fuego[a] a Yahvé—ya sea un holocausto o un sacrificio—para cumplir un voto, o como ofrenda voluntaria, o en sus tiempos señalados[b], para hacer un aroma agradable a Yahvé, del ganado o del rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘una ofrenda de fuego’.
    reason: lexical_alternative
  - marker: b
    text: O ‘en sus festividades señaladas’. El hebreo puede referirse en sentido amplio a tiempos señalados o más específicamente a ocasiones festivas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: you present
  chosen_spanish: presentarán
  alternatives_spanish:
  - harán
  - ofrecerán
  lexicon: HALOT
  rationale: En contexto sacrificial, el hebreo literal 'hacer' se entiende como el acto cultual de presentar una ofrenda. 'Presentarán' suena natural en español y conserva la acción ritual sin perder el sentido idiomático.
- source_word: אִשֶּׁה
  english_pob_choice: an offering by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: Se mantiene el valor sacrificial técnico del término. 'Encendida' comunica el ofrecimiento por fuego con español más fluido que un calco mecánico, sin borrar la referencia al fuego.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé''. La preposición ''a'' expresa dirección de la ofrenda y es natural en español.'
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda totalmente quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente consagrado en español para la ofrenda completamente quemada. Conserva el carácter técnico del sacrificio específico.'
- source_word: זֶבַח
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - una víctima
  - una ofrenda
  lexicon: HALOT
  rationale: El término es general y contrasta con 'holocausto'. 'Sacrificio' mantiene esa amplitud sin especializar indebidamente el sentido.
- source_word: לְפַלֵּא נֶדֶר
  english_pob_choice: to fulfill a vow
  chosen_spanish: para cumplir un voto
  alternatives_spanish:
  - para realizar un voto
  - para pagar un voto
  lexicon: HALOT
  rationale: '''Cumplir un voto'' expresa con claridad el sentido de llevar a cabo lo prometido en el voto. ''Voto'' es el equivalente más natural y fiel en español.'
- source_word: בִנְדָבָה
  english_pob_choice: as a freewill offering
  chosen_spanish: como ofrenda voluntaria
  alternatives_spanish:
  - como ofrenda libre
  - voluntariamente
  lexicon: HALOT
  rationale: La expresión técnica se vierte bien como 'ofrenda voluntaria', que conserva la idea de don no obligado y resulta comprensible en registro bíblico.
- source_word: בְּמֹעֲדֵיכֶם
  english_pob_choice: at your appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus festividades señaladas
  - en sus citas señaladas
  lexicon: HALOT
  rationale: '''מוֹעֵד'' puede abarcar tiempos señalados o festividades. ''Tiempos señalados'' preserva el rango más amplio que la auditoría inglesa quiso mantener.'
- source_word: לַעֲשׂוֹת רֵיחַ נִיחֹחַ
  english_pob_choice: to make a pleasing aroma
  chosen_spanish: para hacer un aroma agradable
  alternatives_spanish:
  - para producir un aroma agradable
  - para ofrecer un aroma agradable
  lexicon: HALOT
  rationale: Se conserva el giro cultual sin suavizarlo a una paráfrasis más interpretativa. 'Aroma agradable' reproduce bien la expresión hebrea tradicional con español claro.
- source_word: מִן הַבָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la res
  - del vacuno
  lexicon: HALOT
  rationale: '''Ganado'' es una forma natural y colectiva para el bovino sacrificial, equivalente al inglés ''herd'' y más transparente que una especificación excesiva.'
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: o del rebaño
  alternatives_spanish:
  - o de la majada
  - o del ganado menor
  lexicon: HALOT
  rationale: '''Rebaño'' conserva el sentido colectivo de pequeños animales de cría. Mantiene el paralelismo con ''ganado'' y es idiomático en español bíblico.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - para Yahvé
  rationale: Se sigue el estándar del proyecto para el nombre pactual de Dios, evitando la sustitución por un título enmascarador. Esto preserva la identidad propia del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aroma sacrificial y metáfora cultual רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: un aroma agradable
  alternative_spanish_readings:
  - un aroma placentero
  - un aroma suave
  rationale: Se conserva la metáfora sacrificial sin introducir explicaciones ajenas al texto. 'Agradable' refleja la aceptación cultual en un español natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción española sigue el acuerdo alto del audit trail inglés y conserva las decisiones revisadas: ''make a pleasing aroma'' se refleja con ''hacer un aroma agradable'', evitando una paráfrasis más interpretativa. También mantiene el rango de בְּמֹעֲדֵיכֶם como ''tiempos señalados'', en línea con la nota inglesa que deja abierta la posibilidad de festividades específicas.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה conforme al criterio del proyecto.
  - '''Ofrenda encendida'' refleja el término sacrificial técnico sin recurrir a ''SEÑOR''.'
  - '''Holocausto'' y ''sacrificio'' conservan el contraste entre la ofrenda totalmente quemada y el término general.'
  - '''Aroma agradable'' preserva la fórmula cultual sin intensificar ni moralizar el efecto.'
  - Las referencias al ganado y al rebaño conservan el paralelismo colectivo del hebreo.
