base_translation:
  language: en
  yaml_path: translation/ot/2_kings/001/016.yaml
  text: 'And he spoke to him[a], “Thus says Yahweh: Because you have sent messengers to inquire of Baal-zebub, the god of Ekron—is it because there is no God in Israel to inquire of his word? Therefore you shall not come down from the bed to which you have gone up[c][b], for you shall surely die.”'
  footnotes:
