translation:
  language: es
  text: Aunque la higuera no florezca[a], ni haya fruto en las vides; aunque falle el producto del olivo[b], y los campos no den alimento; aunque el rebaño sea cortado del redil, y no haya ganado en los establos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque la higuera no florezca ...». La partícula hebrea inicial puede leerse causalmente («porque») o con sentido concesivo («aunque»); el flujo hacia la declaración de gozo del versículo siguiente favorece la lectura concesiva.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «la obra/producto del olivo prueba falsa», un modismo que significa que la cosecha del olivo falla.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Porque
  - Pues
  - Incluso si
  lexicon: HALOT
  rationale: En este contexto poético introduce una serie concesiva que prepara la resolución de la siguiente línea; «aunque» reproduce bien ese valor discursivo en español natural.
- source_word: תְאֵנָה
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higo
  - higuera de higos
  lexicon: HALOT
  rationale: El hebreo designa el árbol. «Higuera» es el equivalente natural y preciso en español.
- source_word: תִפְרָח
  english_pob_choice: does not blossom
  chosen_spanish: no florezca
  alternatives_spanish:
  - no brote
  - no dé flor
  lexicon: HALOT
  rationale: Para un árbol, el verbo se expresa con claridad como «florecer». Mantiene la imagen agrícola sin sonar forzado.
- source_word: יְבוּל
  english_pob_choice: produce
  chosen_spanish: fruto
  alternatives_spanish:
  - producción
  - cosecha
  - rendimiento
  lexicon: HALOT
  rationale: En la frase con vides, «fruto» comunica de forma natural la ausencia de producción; conserva el paralelismo agrícola sin calco mecánico.
- source_word: בַּ/גְּפָנִ֔ים
  english_pob_choice: on the vines
  chosen_spanish: en las vides
  alternatives_spanish:
  - en los pámpanos
  - en las parras
  lexicon: HALOT
  rationale: «Vides» es el plural agrícola normal y mantiene el referente de grapevines con dignidad y claridad.
- source_word: כִּחֵשׁ
  english_pob_choice: fails
  chosen_spanish: falle
  alternatives_spanish:
  - engaña
  - se frustra
  - resulta falso
  lexicon: HALOT
  rationale: El hebreo puede implicar «engañar/probar falso», pero en este contexto agrícola la idea es que la cosecha de aceituna no responde; «falle» conserva esa fuerza sin volver el texto oscuro.
- source_word: מַעֲשֵׂה זַיִת
  english_pob_choice: the yield of the olive
  chosen_spanish: el producto del olivo
  alternatives_spanish:
  - la cosecha del olivo
  - el rendimiento del olivo
  - el fruto del olivo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la obra/producto del olivo». «Producto del olivo» conserva la relación idiomática y evita interpretar de más; por eso se prefiere a «fruto» aquí.
- source_word: שְׁדֵמֹות
  english_pob_choice: the fields
  chosen_spanish: los campos
  alternatives_spanish:
  - las tierras cultivadas
  - los sembrados
  lexicon: HALOT
  rationale: El plural alude a terrenos cultivados; «campos» es la equivalencia natural y ampliamente inteligible.
- source_word: עָשָׂה אֹכֶל
  english_pob_choice: produce no food
  chosen_spanish: no den alimento
  alternatives_spanish:
  - no produzcan alimento
  - no hagan comida
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de producción agrícola. En español, «dar alimento» comunica con naturalidad la falta de cosecha útil.
- source_word: גָּזַר
  english_pob_choice: is cut off
  chosen_spanish: sea cortada
  alternatives_spanish:
  - sea apartada
  - sea arrancada
  - sea separada
  lexicon: HALOT
  rationale: El verbo expresa la idea de cortar/separar. El pasivo «sea cortada» conserva la dureza de la pérdida y funciona bien con el sujeto colectivo en singular.»
- source_word: מִכְלָה
  english_pob_choice: the fold
  chosen_spanish: redil
  alternatives_spanish:
  - corral
  - aprisco
  - encierro
  lexicon: HALOT
  rationale: «Redil» es el término tradicional y preciso para el recinto de ovejas y cabras; mantiene bien el paralelismo pastoril.
- source_word: צֹאן
  english_pob_choice: the flock
  chosen_spanish: la oveja
  alternatives_spanish:
  - el rebaño
  - el ganado menor
  - las ovejas
  lexicon: HALOT
  rationale: Aunque el sustantivo es colectivo, en esta línea la imagen se vuelve concreta en español con «la oveja», que sigue el movimiento del verso y evita una repetición demasiado abstracta con «redil».
- source_word: בָּקָר
  english_pob_choice: herd
  chosen_spanish: ganado
  alternatives_spanish:
  - bueyes
  - vacuno
  - reses
  lexicon: HALOT
  rationale: El hebreo refiere al ganado vacuno en conjunto. «Ganado» preserva la colectividad y encaja con el contraste pastoril con «oveja».
- source_word: בָּרְפָתִים
  english_pob_choice: in the stalls
  chosen_spanish: en los establos
  alternatives_spanish:
  - en los pesebres
  - en los corrales
  - en las cuadras
  lexicon: HALOT
  rationale: «Establos» expresa bien el lugar de resguardo del ganado y resulta natural en español bíblico contemporáneo.
theological_decisions:
- issue: Valor concesivo de כִּי al inicio del lamento
  english_pob_reading: Though the fig tree does not blossom ...
  chosen_spanish_reading: Aunque la higuera no florezca ...
  alternative_spanish_readings:
  - Porque la higuera no florezca ...
  - Pues la higuera no florezca ...
  - Si bien la higuera no florezca ...
  rationale: La secuencia prepara la confesión de gozo y confianza del verso siguiente; por eso se adopta el valor concesivo y no el causal.
  doctrine_reference: Lectura discursiva del hebreo poético en Habacuc 3:17-18
- issue: Tensión lexical en מַעֲשֵׂה זַיִת
  english_pob_reading: the yield of the olive fails
  chosen_spanish_reading: falle el producto del olivo
  alternative_spanish_readings:
  - falle la cosecha del olivo
  - se frustre el producto del olivo
  - el olivo no rinda
  rationale: Se conserva la metáfora hebrea de «obra/producto» sin borrarla con una paráfrasis excesiva, pero se la expresa de forma comprensible en español.
  doctrine_reference: Precisión semántica del campo agrícola en poesía hebrea
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el desglose morfológico, tomando como guía el análisis auditado en inglés. Se mantuvo la lectura concesiva de כִּי, la imagen agrícola completa y el paralelismo pastoril final, sin suavizar la pérdida expresada en el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto no lo requería; este versículo no contiene el nombre divino.
  - Se prefirió «higuera», «vides», «olivo», «campos», «redil» y «establos» por ser términos claros y de registro bíblico natural en español.
  - Se conservó la progresión paralela de negaciones y clausuras del verso, evitando reorganizar el orden hebreo más allá de lo necesario para la sintaxis española.
