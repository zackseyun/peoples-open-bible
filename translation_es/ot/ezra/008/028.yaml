review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva correctamente Yahvé, los vasos, la plata y el oro, y la fórmula pactual «el Dios de sus padres». Sin embargo, «Ustedes son cosa santa para Yahvé» no refleja bien el predicado dirigido a personas; קֹדֶשׁ aquí expresa consagración/santidad de los sacerdotes, no que sean una «cosa».
  spanish_quality_summary: El texto es mayormente claro y digno, pero «cosa santa» suena impropio e incluso degradante al aplicarse a personas en español. También «a ellos» tras «dije» es menos natural que «les», aunque no es incorrecto. Una leve revisión mejora fidelidad y legibilidad sin apartarse del original.
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé» para יהוה. «Ofrenda voluntaria» es una buena opción para נְדָבָה. «Vasos» funciona en contexto cultual. La principal desviación terminológica es «cosa santa» para קֹדֶשׁ aplicado a «ustedes»; debe ajustarse a «santos» o «consagrados».
  issues:
  - severity: high
    issue: «cosa santa» aplicado a personas
    rationale: El hebreo אַתֶּם קֹדֶשׁ לַיהוָה predica santidad/consagración sobre los destinatarios. En español, «ustedes son cosa santa» suena antinatural y distorsiona el referente personal.
  - severity: low
    issue: «a ellos» tras «dije» es menos natural que «les»
    rationale: El complemento indirecto está bien representado, pero en español corriente y literario «les dije» fluye mejor que «dije a ellos».
  - severity: low
    issue: Inconsistencia semántica entre la primera y segunda cláusula de קֹדֶשׁ
    rationale: El borrador usa «cosa santa» para las personas y «santos» para los vasos. El paralelismo hebreo se preserva mejor con una formulación coherente como «santos ... santos» o «consagrados ... santos».
  revised_spanish_text: 'Y les dije: «Ustedes son santos para Yahvé, y los vasos son santos; y la plata y el oro son una ofrenda voluntaria para Yahvé, el Dios de sus padres».'
  revision_rationale: Se reemplaza «cosa santa» por «santos» para reflejar adecuadamente el predicado de santidad aplicado a personas y mantener el paralelismo con «los vasos son santos». Se cambia «a ellos» por «les» por naturalidad en español. Se añade «una» antes de «ofrenda voluntaria» para una sintaxis más natural, sin alterar el sentido de נְדָבָה.
