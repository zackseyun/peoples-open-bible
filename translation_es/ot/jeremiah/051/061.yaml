translation:
  language: es
  text: 'Y Jeremías dijo a Seraías[a]: «Cuando llegues a Babilonia, entonces verás y leerás todas estas palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en un sentido más formal: «y verás y leerás todas estas palabras». El hebreo probablemente lleva aquí el matiz de «ver a que» o «ocuparte de» en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la acción siguiente en secuencia. En español, «Y ... dijo» conserva el flujo narrativo sin cargar un matiz temporal más fuerte de lo que exige el hebreo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: Convención estándar de nombre propio
  rationale: Se translitera el nombre propio al español bíblico usual, manteniendo la identificación directa del personaje.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de dirección o destinatario se rinde naturalmente con «a» en español, sin sobrecargarla con un matiz diferente.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  lexicon: Convención estándar de nombre propio
  rationale: Nombre propio transliterado al español con la forma bíblica habitual.
- source_word: כְּבֹאֲךָ
  english_pob_choice: When you come
  chosen_spanish: Cuando llegues
  alternatives_spanish:
  - Cuando vengas
  - Cuando entres
  lexicon: HALOT
  rationale: El valor temporal de כ + infinitivo constructo de בוא con sufijo de 2ms se expresa de forma natural como «cuando llegues». «Llegues» comunica bien el evento de arribo a Babilonia en español sin alejarse del hebreo.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  lexicon: Convención estándar de nombre de lugar
  rationale: Se usa la forma española habitual del topónimo.
- source_word: וְרָאִיתָ
  english_pob_choice: see that / and you shall see
  chosen_spanish: verás
  alternatives_spanish:
  - verás que
  - verás y
  lexicon: HALOT
  rationale: El hebreo puede funcionar como una instrucción o admonición ligada a la siguiente acción. Se mantiene el verbo «verás» para respetar el valor léxico de ראה, sin convertirlo en una paráfrasis excesiva; la coordinación con «y leerás» deja abierta la fuerza de la secuencia.
- source_word: וְקָרָאתָ
  english_pob_choice: you read
  chosen_spanish: leerás
  alternatives_spanish:
  - leerás en voz alta
  - recitarás
  lexicon: HALOT
  rationale: En contexto de un rollo escrito, קרא apunta a la lectura de un texto. «Leerás» es la opción más clara y natural en español; el carácter público o audible queda implícito en el contexto narrativo.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos asuntos
  lexicon: HALOT
  rationale: «דברים» se conserva como «palabras» porque el contexto trata del contenido escrito y profético. «Palabras» mantiene mejor que «cosas» o «asuntos» la referencia al texto mismo.
theological_decisions:
- issue: Valor del doble verbo hebreo «verás y leerás»
  english_pob_reading: The Hebrew 'and you will see' likely carries the sense 'see to it' or 'take care' in context, but the revised English retained both verbs more formally.
  chosen_spanish_reading: «Entonces verás y leerás» conserva ambos verbos sin resolver por completo la tensión interpretativa.
  alternative_spanish_readings:
  - «Entonces verás que leerás»
  - «Entonces verás a ver si lees»
  - «Entonces te encargarás de leer»
  rationale: El hebreo admite una lectura idiomática de «ver» como atención o cuidado, pero el registro español debe evitar una explicación intrusiva dentro del texto principal. Se mantiene la tensión textual en la traducción principal y no se elimina el verbo «verás», acorde con la revisión inglesa que retuvo ambos verbos.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto sigue la revisión final inglesa, que volvió a incluir ambos verbos («see and read») para reflejar más completamente el hebreo. La versión española preserva esa doblez con «verás y leerás», sin convertirla en una paráfrasis interpretativa que borre la posible fuerza idiomática de «ver».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto; este versículo no contiene el nombre divino.
  - Se usa «palabras» para דברים por coherencia con el énfasis textual/profético del pasaje.
  - 'Los nombres propios se adaptan a formas españolas bíblicas usuales: Jeremías, Seraías, Babilonia.'
