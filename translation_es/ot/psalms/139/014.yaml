translation:
  language: es
  text: Te alabo[a], porque he sido formado de manera asombrosa y maravillosa; maravillosas son tus obras, y mi alma[b] lo sabe muy bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de manera que inspira reverente temor» o «de un modo imponente». El hebreo expresa asombro reverente, no terror.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi alma»; también puede entenderse «yo mismo» o «mi ser interior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹדְךָ
  english_pob_choice: I praise you
  chosen_spanish: Te alabo
  alternatives_spanish:
  - Te doy gracias
  - Te confieso
  lexicon: HALOT
  rationale: La forma causativa de ידה puede significar dar gracias o alabar. En este contexto poético dirigido a Dios por su obra creadora, «te alabo» expresa mejor el tono doxológico de manera natural en español. «Te doy gracias» sigue siendo una alternativa válida, pero suena menos centrada en la alabanza poética.
- source_word: עַל כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La construcción introduce la razón del elogio; «porque» comunica claramente la relación causal sin añadir matices ajenos al hebreo.
- source_word: נוֹרָאוֹת
  english_pob_choice: fearfully
  chosen_spanish: de manera tan admirable y asombrosa
  alternatives_spanish:
  - de forma temible
  - de manera que inspira reverente temor
  - de un modo sobrecogedor
  lexicon: HALOT
  rationale: El hebreo comunica reverencia y asombro, no miedo aterrador. En español, «admirable y asombrosa» preserva la fuerza de asombro reverente de forma idiomática; se evita «temiblemente» por su posible connotación de terror.
- source_word: נִפְלֵיתִי
  english_pob_choice: I am ... made
  chosen_spanish: he sido hecho
  alternatives_spanish:
  - he sido formado
  - soy hecho maravilloso
  - he sido hecho de modo maravilloso
  lexicon: HALOT
  rationale: El verbo פלא en niphal expresa ser extraordinario o maravilloso. En contexto de la formación divina del salmista, el español fluye mejor con «he sido hecho», que conserva la referencia a la acción creadora implícita por el contexto inmediato. La cualidad admirativa queda reforzada por la primera cláusula.
- source_word: נִפְלָאִים
  english_pob_choice: wonderful
  chosen_spanish: maravillosas
  alternatives_spanish:
  - admirables
  - asombrosas
  - extraordinarias
  lexicon: HALOT
  rationale: Se mantiene el enlace léxico con la primera cláusula mediante un campo semántico de maravilla/asombro. «Maravillosas» es natural en español y refleja el paralelismo con el hebreo y con la decisión inglesa de conservar «wonderful».
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - lo que has hecho
  - tus acciones
  lexicon: HALOT
  rationale: En este contexto de creación, «obras» es el equivalente más amplio y formalmente cercano para מעשה, y puede abarcar la obra creadora que incluye la formación del salmista.
- source_word: וְנַפְשִׁי
  english_pob_choice: and my soul
  chosen_spanish: y mi alma
  alternatives_spanish:
  - y yo mismo
  - y mi interior
  - y mi ser
  lexicon: HALOT
  rationale: «Alma» preserva la imagen poética del hebreo y su registro litúrgico. Se documentan alternativas para no imponer una lectura dualista rígida que el hebreo no exige.
- source_word: יֹדַעַת מְאֹד
  english_pob_choice: knows it very well
  chosen_spanish: lo sabe muy bien
  alternatives_spanish:
  - lo conoce muy bien
  - lo sabe plenamente
  - lo sabe sobremanera
  lexicon: HALOT
  rationale: 'El objeto está implícito por el contexto: la verdad de la obra maravillosa de Dios y la formación del salmista. «Lo sabe muy bien» es claro y fiel, y evita sobrecargar el verso con una explicítación innecesaria.'
theological_decisions:
- issue: Matiz antropológico de נֶפֶשׁ
  english_pob_reading: Rendered as 'my soul' in the main text, with a footnote preserving 'I myself'/'my inner being' as contextual alternatives.
  chosen_spanish_reading: «mi alma» en el texto principal, con nota que preserve «yo mismo» o «mi ser interior» como alternativas contextuales.
  alternative_spanish_readings:
  - yo mismo
  - mi ser interior
  - mi interior
  rationale: «Alma» es una traducción tradicional y poética, pero el hebreo puede referirse al yo entero o al ser interior, no necesariamente a una división filosófica alma/cuerpo. La nota documenta ese rango semántico sin perder la fluidez del texto principal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste auditado del inglés POB que vuelve la segunda cláusula con orden más cercano al hebreo: «maravillosas son tus obras», en vez de una construcción más directa en español con sujeto pospuesto. También conserva el paralelismo poético entre la manera admirable de ser hecho y el carácter maravilloso de las obras de Dios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton; por tanto, no aplica aquí.
  - Se mantiene «alma» por su valor poético y eclesial, sin forzar una antropología técnica que el hebreo no exige.
  - Se conserva un registro reverente y natural en español, evitando calcos como «temerosamente» o «temible» que distorsionarían el sentido.
  - El paralelismo se refleja con una cláusula adjetival inicial («de manera tan admirable y asombrosa») y una segunda cláusula también adjetival («maravillosas son tus obras»), siguiendo la revisión auditada.
