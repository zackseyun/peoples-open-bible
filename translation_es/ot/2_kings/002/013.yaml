translation:
  language: es
  text: Él recogió el manto[a] de Elías, que se le había caído, y volvió y se detuvo a la orilla del Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capa». El hebreo se refiere a una vestidura exterior distintiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  english_pob_choice: picked up
  chosen_spanish: recogió
  alternatives_spanish:
  - levantó
  - tomó
  lexicon: HALOT
  rationale: El verbo hebreo implica levantar/tomar físicamente un objeto; en este contexto narrativo, con una prenda caída al suelo, «recogió» comunica de modo natural la acción concreta sin perder la idea de alzar/tomar.
- source_word: אַדֶּרֶת
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - abrigo
  lexicon: HALOT
  rationale: El término designa una prenda exterior distintiva asociada con Elías. «Manto» conserva la fuerza tradicional y la referencia a una vestidura exterior especial; en español bíblico resulta más preciso que opciones demasiado generales.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  lexicon: convención bíblica española
  rationale: Nombre propio transliterado según el uso bíblico habitual en español.
- source_word: אֲשֶׁר נָפְלָה מֵעָלָיו
  english_pob_choice: which had fallen from him
  chosen_spanish: que se le había caído
  alternatives_spanish:
  - que había caído de él
  - que le había caído
  lexicon: HALOT
  rationale: La cláusula relativa identifica el manto que cayó de Elías. En español, el dativo «se le había caído» expresa de forma natural la relación de desprendimiento sin forzar una construcción demasiado literal.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta y volvió
  lexicon: HALOT
  rationale: שׁוּב aquí expresa retorno al lugar anterior; «volvió» es breve, claro y coherente con la secuencia narrativa.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - estuvo de pie
  - se mantuvo de pie
  lexicon: HALOT
  rationale: El verbo denota estar de pie. «Se puso de pie» suena natural en español y transmite el acto de colocarse en posición de pie junto al río.
- source_word: עַל שְׂפַת הַיַּרְדֵּן
  english_pob_choice: on the bank of the Jordan
  chosen_spanish: a la orilla del Jordán
  alternatives_spanish:
  - en la ribera del Jordán
  - junto a la orilla del Jordán
  lexicon: HALOT
  rationale: שָׂפָה aplicado a un río significa borde/orilla/banco. «A la orilla del Jordán» es idiomático y fiel al sentido topográfico; «Jordán» conserva el nombre bíblico usual en español.
translation_notes:
  revision_awareness: 'Se siguió el sentido narrativo del hebreo y el criterio de equivalencia óptima del texto base inglés: acción concreta, prenda exterior distintiva, retorno y postura final junto al río. No se observaron revisiones textuales en el expediente aportado.'
  spanish_consistency_notes:
  - Se mantiene «Jordán» sin añadir «río», conforme al uso bíblico español y al hebreo פשוט «el Jordán».
  - Se eligió «manto» como término principal para אַדֶּרֶת, preservando la alternativa léxica en nota.
  - Se evitó una traducción mecánica de «stand on»; «se puso de pie» conserva la acción sin sonar rígido.
