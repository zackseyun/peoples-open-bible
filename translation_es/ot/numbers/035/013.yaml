lexical_decisions:
- source_word: וְ/הֶ/עָרִים
  english_pob_choice: And the cities
  chosen_spanish: Y las ciudades
  alternatives_spanish:
  - Ahora, las ciudades
  - Y las ciudades mismas
  lexicon: HALOT
  rationale: Se conserva la conjunción y el artículo definido del sustantivo plural. «Y» reproduce el enlace simple del hebreo; no hace falta una marcación discursiva más interpretativa.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  lexicon: HALOT
  rationale: La partícula relativa se vierte con «que», la opción más natural en español moderno y suficientemente precisa para modificar «las ciudades».
- source_word: תִּתֵּנוּ
  english_pob_choice: you give
  chosen_spanish: ustedes den
  alternatives_spanish:
  - ustedes darán
  - ustedes entreguen
  lexicon: HALOT
  rationale: El imperfecto 2mp en este marco legal tiene valor prospectivo/mandativo. «Den» conserva el sentido de acción requerida sin volver la frase demasiado rígida con un futuro perifrástico.
- source_word: שֵׁשׁ
  english_pob_choice: six
  chosen_spanish: seis
  lexicon: HALOT
  rationale: Número cardinal directo y sin matiz especial.
- source_word: עָרֵי מִקְלָט
  english_pob_choice: cities of refuge
  chosen_spanish: ciudades de refugio
  alternatives_spanish:
  - ciudades-refugio
  - ciudades de asilo
  lexicon: HALOT
  rationale: La construcción en hebreo es literalmente «ciudades de refugio». «Refugio» mantiene la institución legal con claridad; «asilo» sería posible pero menos transparente y más cargado en español contemporáneo.
- source_word: תִּהְיֶינָה
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - serán para ser
  - han de ser
  lexicon: HALOT
  rationale: El imperfecto 3fp en una disposición legal puede expresarse con futuro simple en español. «Serán» conserva bien el carácter normativo sin añadir perífrasis innecesarias.
- source_word: לָ/כֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: HALOT
  rationale: El sufijo 2mp se vierte con una forma neutral latinoamericana. «Para» expresa mejor la relación de beneficio/destino que «a» en este contexto.
