translation:
  language: es
  text: Dios es padre de los huérfanos[a] y juez de las viudas[b] en su santa morada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los que no tienen padre»; el hebreo se refiere más literalmente a quienes carecen de padre.
    reason: lexical_alternative
  - marker: b
    text: O «defensor de las viudas»; la palabra hebrea denota más literalmente a quien juzga o administra justicia.
    reason: lexical_alternative
  - marker: c
    text: O «desde su santa morada»; algunas traducciones entienden la frase como el lugar desde donde Dios actúa, aunque la preposición hebrea significa literalmente «en».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבִי
  english_pob_choice: a father of
  chosen_spanish: padre de
  alternatives_spanish:
  - padre para
  - padre de
  lexicon: HALOT
  rationale: 'La forma constructa expresa una relación posesiva o de pertenencia: Dios aparece como padre en relación con los huérfanos. En español, «padre de» comunica esa relación de manera natural y fiel; «padre para» suena más explicativo que textual.'
- source_word: יְתוֹמִים
  english_pob_choice: the fatherless
  chosen_spanish: los huérfanos
  alternatives_spanish:
  - los desamparados
  - los que no tienen padre
  lexicon: HALOT
  rationale: El hebreo apunta a los niños sin padre; en español bíblico actual, «huérfanos» es claro y comprensible. Aunque «los padresless» subraya la ausencia paterna, «huérfanos» comunica bien la condición social de vulnerabilidad sin perder inteligibilidad.
- source_word: דַיַּן
  english_pob_choice: a judge of
  chosen_spanish: juez de
  alternatives_spanish:
  - defensor de
  - el que hace justicia a
  lexicon: HALOT
  rationale: El sustantivo denota primariamente a quien juzga o administra justicia. «Juez de» conserva la imagen jurídica del hebreo; «defensor de» expresa una implicación posible, pero sería más interpretativa.
- source_word: אַלְמָנוֹת
  english_pob_choice: widows
  chosen_spanish: las viudas
  alternatives_spanish:
  - viudas
  lexicon: HALOT
  rationale: Es el equivalente directo y normal en español. No hay razón contextual para variar el sentido básico.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí el plural morfológico funciona con sentido singular y es el sujeto de la cláusula nominal. «Dios» es la traducción natural y correcta.
- source_word: בִּמְעוֹן
  english_pob_choice: in his holy dwelling
  chosen_spanish: en su santa morada
  alternatives_spanish:
  - en su santa habitación
  - en su santa habitación divina
  lexicon: HALOT
  rationale: מָעוֹן significa morada o lugar de habitación. «Morada» es más idiomático y reverente en español que «habitación». La preposición ב se conserva como «en», siguiendo de cerca el hebreo.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - consagrada
  lexicon: HALOT
  rationale: El sufijo posesivo unido a קֹדֶשׁ da la idea de pertenencia a la santidad de Dios. En español, «santa» funciona naturalmente como adjetivo de «morada» y preserva la relación sin forzar una expresión más pesada como «morada de su santidad».
theological_decisions:
- issue: Cómo expresar la función de דַיַּן sin suavizar el matiz jurídico
  english_pob_reading: a judge of widows
  chosen_spanish_reading: juez de las viudas
  alternative_spanish_readings:
  - defensor de las viudas
  - amparo de las viudas
  rationale: La imagen central no es solo protección, sino justicia administrada a favor de quienes son vulnerables. «Juez» mantiene ese marco legal y evita sustituirlo por un término más pastoral que el hebreo no exige.
  doctrine_reference: 'Translation philosophy: primacy of source-language image and lexical force.'
- issue: Si la frase final debe leerse locativamente o como origen
  english_pob_reading: in his holy dwelling
  chosen_spanish_reading: en su santa morada
  alternative_spanish_readings:
  - desde su santa morada
  - de su santa morada
  rationale: La preposición hebrea ב indica de manera directa localización («en»). Aunque algunas traducciones entienden el lugar como punto de acción, la lectura más cercana al texto conserva la expresión locativa.
  doctrine_reference: 'Translation philosophy: preserve the source preposition unless context compels a shift.'
translation_notes:
  revision_awareness: The English audit trail is internally consistent and marked unchanged in the latest revision pass, with high agreement and only minor issues noted. No textual or theological revision from the audit context requires alteration of the verse; the Spanish draft therefore follows the established optimal-equivalence decisions closely while rendering them in natural, publication-ready Spanish.
  spanish_consistency_notes:
  - Se usó «Dios» y no «Yahvé» porque el hebreo aquí presenta אֱלֹהִים como sujeto explícito.
  - Se mantuvo «juez» por la fuerza jurídica de דַיַּן, evitando una paráfrasis como «defensor».
  - «Morada» conserva mejor el registro bíblico y la naturalidad del español que una calca como «habitación».
  - No se introdujeron notas al pie porque no quedó ninguna alternativa textual o ambigüedad española que requiriera marcación en el texto final.
