translation:
  language: es
  text: Y sucedió cierto día que sus hijos y sus hijas estaban comiendo y bebiendo vino en la casa de su hermano mayor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hermano primogénito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y aconteció
  - Y había
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce una nueva escena; «Ahora había» conserva esa función de encuadre de manera natural en español sin volverla demasiado literal.
- source_word: הַיּוֹם
  english_pob_choice: a day
  chosen_spanish: un día
  alternatives_spanish:
  - el día
  - aquel día
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, la expresión funciona idiomáticamente como marcador indefinido de escena; «un día» comunica mejor el valor narrativo.
- source_word: וּבָנָיו וּבְנֹתָיו
  english_pob_choice: his sons and his daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente hijos varones e hijas; se conserva esa precisión en español en vez de generalizar a «hijos» como colectivo.
- source_word: אֹכְלִים וְשֹׁתִים
  english_pob_choice: were eating and drinking
  chosen_spanish: estaban comiendo y bebiendo
  alternatives_spanish:
  - comían y bebían
  - estaban celebrando
  lexicon: HALOT
  rationale: Los participios describen una acción en curso; el progresivo español mantiene mejor ese aspecto que un pretérito simple. Se evita «celebrando» por ser más interpretativo.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - bebida
  - licor
  lexicon: HALOT
  rationale: Equivalente léxico directo y no marcado.
- source_word: בְּבֵית
  english_pob_choice: in the house of
  chosen_spanish: en la casa de
  alternatives_spanish:
  - en el hogar de
  - en la casa
  lexicon: HALOT
  rationale: La construcción locativa se refleja con la preposición española habitual «en la casa de».
- source_word: אֲחִיהֶם
  english_pob_choice: their brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano varón
  - su pariente
  lexicon: HALOT
  rationale: El sustantivo indica relación fraterna; el posesivo singular en español funciona naturalmente con el sujeto plural mixto del contexto.
- source_word: הַבְּכוֹר
  english_pob_choice: oldest
  chosen_spanish: mayor
  alternatives_spanish:
  - primogénito
  - el primero nacido
  lexicon: HALOT
  rationale: En este contexto identifica al hermano por orden de nacimiento; «mayor» es más idiomático en español que «primogénito», aunque se preserva la alternativa lexical.
translation_notes:
  revision_awareness: El texto inglés POB estableció una lectura dinámica para הַיּוֹם («a day») y una identificación idiomática de הַבְּכוֹר como «oldest brother», con nota alternativa «firstborn brother». La versión española sigue esas decisiones con equivalentes naturales y conserva la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva el tono narrativo simple y no se introduce vocabulario interpretativo como «banquete» o «fiesta».
  - La nota [a] se coloca solo en «hermano mayor» para reflejar la alternativa léxica documentada.
