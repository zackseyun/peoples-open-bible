translation:
  language: es
  text: '¿Por qué no te postras ante Bel? Pero él dijo[a]: «Porque no venero ídolos hechos por manos humanas, sino al Dios vivo, que creó el cielo y»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego proporcionado para este versículo termina a mitad de frase con καί («y»). Por eso la traducción conserva la cláusula inconclusa en vez de completar el sentido.
    reason: textual_variant
lexical_decisions:
- source_word: προσκυνεῖς
  english_pob_choice: bow down to
  chosen_spanish: te postras ante
  alternatives_spanish:
  - te inclinas ante
  - adoras a
  - rindes homenaje a
  lexicon: BDAG
  rationale: El verbo griego expresa postración u homenaje reverente. «Te postras ante» conserva el gesto físico/religioso sin convertirlo en una glosa más doctrinal que el contexto inmediato.
- source_word: σέβομαι
  english_pob_choice: revere
  chosen_spanish: venero
  alternatives_spanish:
  - reverencio
  - adoro
  - honro
  lexicon: BDAG
  rationale: «Venero» refleja reverencia religiosa y evita repetir exactamente el verbo anterior, manteniendo la distinción que el POB observó entre προσκυνέω y σέβομαι.
- source_word: εἴδωλα
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - figuras
  lexicon: BDAG
  rationale: En este contexto el término es polémico y denuncia objetos de culto tratados como dioses; «ídolos» transmite mejor ese valor que una traducción neutral como «imágenes».
- source_word: χειροποίητα
  english_pob_choice: made by hands
  chosen_spanish: hechos por manos
  alternatives_spanish:
  - hechos a mano
  - fabricados por manos humanas
  - hechos por la mano humana
  lexicon: BDAG
  rationale: La frase debe preservar el contraste con el Dios vivo y creador. «Hechos por manos» sigue de cerca la construcción griega y mantiene la fuerza antiidólatra; aunque suena algo más literal que «hechos a mano», evita suavizar el matiz de manufactura humana.
- source_word: ζῶντα θεόν
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - un Dios vivo
  lexicon: BDAG
  rationale: El artículo apunta al Dios verdadero frente a los ídolos; «el Dios vivo» es la forma natural y fiel en español bíblico.
- source_word: κτίσαντα
  english_pob_choice: who created
  chosen_spanish: que creó
  alternatives_spanish:
  - que hizo
  - que formó
  lexicon: BDAG
  rationale: El participio identifica a Dios por su acto creador. «Creó» conserva mejor el alcance teológico que «hizo».
- source_word: τὸν οὐρανὸν
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo y la tierra
  - el cielo/los cielos
  lexicon: BDAG
  rationale: Dado que el extracto griego termina en καί («y»), no se debe completar el objeto faltante. «El cielo» reproduce el término disponible sin suplir el final perdido.
theological_decisions:
- issue: Frase final incompleta en el testimonio griego
  english_pob_reading: Retain the verse as an unfinished clause ending with 'and'
  chosen_spanish_reading: Mantener el versículo como cláusula inconclusa que termina en «y»
  alternative_spanish_readings:
  - Completar tácitamente con «la tierra»
  - Suavizar el final para hacerlo fluido
  rationale: La fuente griega proporcionada termina en καί, por lo que la traducción debe reflejar honestamente ese corte y no completar lo que no está en el testimonio recibido. Esto preserva la transparencia textual y evita introducir material no atestiguado.
  doctrine_reference: 'PHILOSOPHY.md: primacía del texto original; transparencia en el manejo de variantes y lagunas textuales'
translation_notes:
  revision_awareness: El paquete auditado indica alta concordancia y no registra revisiones aplicadas; esta propuesta sigue la lectura inglesa aprobada y adapta sus decisiones léxicas al español sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Dios vivo» para ζῶντα θεόν, conforme al uso bíblico español.
  - Se usa «Bel» como nombre propio del ídolo, sin sustituirlo por una glosa interpretativa.
  - La nota a pie de página marca explícitamente la incompletitud del extracto griego y su reflejo en español.
  - Se evita completar con «la tierra» porque el origen griego no la conserva en el segmento suministrado.
