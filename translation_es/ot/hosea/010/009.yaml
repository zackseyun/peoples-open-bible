base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/009.yaml
  text: From the days of Gibeah you have sinned[a], O Israel; there they have stood[b]. Will not war against the sons of injustice overtake them in Gibeah?
  footnotes:
  - marker: a
    text: Or, 'The war against the children of iniquity in Gibeah did not overtake them,' or, 'shall not overtake them.' The Hebrew of this clause is difficult.
    reason: alternative_reading
  - marker: b
    text: Gibeah recalls the outrage and civil war in Judges 19–21, which Hosea uses as a paradigm of Israel's deep-rooted corruption.
    reason: cross_reference
