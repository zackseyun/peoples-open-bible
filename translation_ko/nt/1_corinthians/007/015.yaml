id: 1CO.7.15
reference: '1 Corinthians 7:15'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δὲ ὁ ἄπιστος χωρίζεται, χωριζέσθω· οὐ δεδούλωται ὁ ἀδελφὸς ἢ ἡ ἀδελφὴ ἐν τοῖς τοιούτοις, ἐν δὲ εἰρήνῃ κέκληκεν ⸀ἡμᾶς ὁ θεός.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/015.yaml
  text: But if the unbeliever separates[a], let him separate. The brother or the sister is not enslaved in such cases[c][b], but God has called us in peace.
  footnotes:
  - marker: a
    text: 'Or ''the unbeliever'' or, contextually, ''the unbelieving spouse.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''is not bound.'' The Greek verb is from δουλόω (''to enslave''), not the more usual verb for ''bind.'''
    reason: lexical_alternative
  - marker: c
    text: 'Some manuscripts read ''you'' instead of ''us.'''
    reason: textual_variant
translation:
  language: ko
  text: 그러나 만일 믿지 않는 자가 갈라서면, 갈라서게 두십시오. 그러한 경우들에서 형제나 자매는 매여 있지 않습니다. 하나님께서 우리를 평화 안에서 부르셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ δεδούλωται
  english_pob_choice: is not enslaved
  chosen_korean: 매여 있지 않습니다
  alternatives_korean:
  - 노예처럼 묶여 있지 않습니다
  lexicon: BDAG
  rationale: 'δουλόω의 완료 수동 — 「노예가 되다」. 본 문맥은 결혼의 강제적 속박을 가리키며 「매여 있다」가 자연스러움. 7:21–23의 「노예/자유」 어휘 호응.'
- source_word: ἐν εἰρήνῃ κέκληκεν
  english_pob_choice: called us in peace
  chosen_korean: 평화 안에서 부르셨습니다
  alternatives_korean:
  - 화평 가운데 부르셨습니다
  lexicon: BDAG
  rationale: 부르심의 정황·영역.
