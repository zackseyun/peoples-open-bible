translation:
  language: es
  text: 'Y cuando tu hijo te pregunte en el futuro[a], diciendo: «¿Qué es esto?»[b], le dirás: «Con fuerza de su mano Yahvé nos sacó de Egipto, de la casa de esclavitud[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «mañana». Aquí el hebreo usa un modismo para referirse a un tiempo futuro, no necesariamente al día siguiente.
    reason: lexical_alternative
  - marker: b
    text: O, «¿Qué significa esto?»
    reason: lexical_alternative
  - marker: c
    text: O, «de la casa de servidumbre». La expresión hebrea conserva la imagen concreta de una casa marcada por la esclavitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y acontecerá cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una situación futura o contingente; «Y cuando» comunica con naturalidad ese valor prospectivo en español sin volverlo artificial.
- source_word: יִשְׁאָלְךָ בִנְךָ
  english_pob_choice: your son asks you
  chosen_spanish: tu hijo te pregunte
  alternatives_spanish:
  - tu hijo te preguntará
  - tu hijo te consulte
  lexicon: HALOT
  rationale: Se conserva la relación directa padre-hijo y el valor futuro/instructivo del verbo. «Pregunte» suena natural dentro de la oración condicional y mantiene el matiz de consulta.
- source_word: מָחָר
  english_pob_choice: in time to come
  chosen_spanish: en el futuro
  alternatives_spanish:
  - mañana
  - más adelante
  - en tiempos venideros
  lexicon: HALOT
  rationale: En este contexto no se trata de un «mañana» literal sino de un tiempo venidero. «En el futuro» expresa el sentido idiomático de manera clara y fiel.
- source_word: מַה זֹּאת
  english_pob_choice: What is this?
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué significa esto?
  - ¿Qué es esta cosa?
  lexicon: HALOT
  rationale: La pregunta directa reproduce bien la sencillez del hebreo. Se deja «¿Qué es esto?» como forma primaria; «¿Qué significa esto?» sería una interpretación válida pero menos literal.
- source_word: בְּחֹזֶק יָד
  english_pob_choice: By strength of hand
  chosen_spanish: Con fuerza de mano
  alternatives_spanish:
  - Con mano poderosa
  - Con gran fuerza de mano
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. «Con fuerza de mano» sigue de cerca la forma original, mientras que «con mano poderosa» sería más idiomático pero menos transparente.
- source_word: הוֹצִיאָנוּ
  english_pob_choice: brought us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos hizo salir
  - nos llevó fuera
  - nos sacó afuera
  lexicon: HALOT
  rationale: El verbo causativo de יצא se expresa naturalmente como «sacó» en español. Se evita recargar la frase con una paráfrasis innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Según el criterio proyectual, el Tetragrámaton se vierte como «Yahvé» en el texto principal, preservando el nombre divino personal sin sustituirlo por un título.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición hebrea se expresa de modo normal en español con «de» en este contexto de procedencia.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de servidumbre
  - de la casa de esclavos
  - de la casa de esclavitud
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «casa» y el sustantivo abstracto que expresa el estado de esclavitud. Se evita «bondad» o equivalentes tradicionales no transparentes para el lector moderno.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso contiene el Tetragrámaton de forma explícita. La política del proyecto pide conservar el nombre divino en la traducción principal; en español, la forma elegida es «Yahvé» como adaptación gráfica y fonética recibida en la tradición bíblica hispanohablante del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor temporal de מָחָר
  english_pob_reading: in time to come
  chosen_spanish_reading: en el futuro
  alternative_spanish_readings:
  - mañana
  - más adelante
  rationale: Una traducción literal por «mañana» induciría un sentido cronológico erróneo. La elección «en el futuro» conserva la fuerza idiomática y la orientación pedagógica del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y el auditorio del POB en inglés: conserva la estructura instructiva del versículo, mantiene la metáfora de «mano» y traduce el Tetragrámaton como «Yahvé». También refleja la revisión del audit trail que prefirió una formulación más cercana de בְּחֹזֶק יָד y una expresión más estándar para מִבֵּית עֲבָדִים.'
  spanish_consistency_notes:
  - Se mantuvo el estilo reverente pero claro, sin sustituir el nombre divino por «Señor».
  - «Casa de esclavitud» conserva la imagen original y evita una domesticación excesiva.
  - La puntuación introduce la cita directa con comillas angulares, propia del español editorial.
  - Los marcadores de nota aparecen solo donde el texto contiene una alternativa significativa.
