id: JER.51.28
reference: Jeremiah 51:28
source:
  edition: WLC
  text: קַדְּשׁ֨וּ עָלֶ֤י/הָ גוֹיִם֙ אֶת מַלְכֵ֣י מָדַ֔י אֶת פַּחוֹתֶ֖י/הָ וְ/אֶת כָּל סְגָנֶ֑י/הָ וְ/אֵ֖ת כָּל אֶ֥רֶץ מֶמְשַׁלְתּֽ/וֹ־־־־־׃
translation:
  text: Consecrate the nations against her—the kings of Media[a], her governors and all her prefects[c][b], and every land of his dominion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the kings of the Medes.'
    reason: lexical_alternative
  - marker: b
    text: '''Consecrate'' here carries the sense of setting apart for battle or mustering for holy war.'
    reason: cultural_note
  - marker: c
    text: Hebrew shifts from 'her governors ... her prefects' to 'his dominion'; the final pronoun may refer to the ruler of Media as representative head, though some translations smooth the shift.
    reason: alternative_reading
lexical_decisions:
- source_word: קַדְּשׁוּ
  chosen: Consecrate
  alternatives:
  - Set apart
  - Prepare for holy war
  - Sanctify
  lexicon: HALOT
  rationale: The imperative of קדשׁ in warfare contexts commonly means to set apart or prepare for battle in a sacral sense. 'Consecrate' preserves the formal force and the martial-religious nuance better than a flatter 'prepare.'
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - concerning her
  - over her
  lexicon: HALOT
  rationale: With על in this military context, the sense is hostile direction toward Babylon, hence 'against her' rather than a more neutral spatial gloss.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - peoples
  lexicon: HALOT
  rationale: '''Nations'' is the standard and contextually fitting rendering for foreign political entities summoned for war.'
- source_word: מַלְכֵי מָדַי
  chosen: the kings of Media
  alternatives:
  - the kings of the Medes
  lexicon: HALOT
  rationale: The construct phrase refers to rulers associated with Media. 'Of Media' is natural modern English while preserving the geopolitical reference.
- source_word: פַּחוֹתֶיהָ
  chosen: her governors
  alternatives:
  - her satraps
  - her provincial officials
  lexicon: HALOT
  rationale: פחה denotes provincial rulers or governors. 'Governors' is accessible modern English. The feminine suffix most naturally refers back to Media in agreement with the preceding phrase.
- source_word: סְגָנֶיהָ
  chosen: her prefects
  alternatives:
  - her deputies
  - her officials
  - her commanders
  lexicon: HALOT
  rationale: סגן refers to subordinate officials. 'Prefects' distinguishes the term from 'governors' and preserves an administrative nuance without collapsing the offices into one.
- source_word: כָּל אֶרֶץ מֶמְשַׁלְתּוֹ
  chosen: every land of his dominion
  alternatives:
  - all the land of his rule
  - the whole territory of his dominion
  - every country under his dominion
  lexicon: HALOT
  rationale: The phrase is somewhat collective, referring to the territorial extent of rule. 'Every land of his dominion' preserves the distributive sense of כָּל with אֶרֶץ and the singular masculine suffix on מֶמְשַׁלְתּוֹ.
