translation:
  language: es
  text: La gloria postrera de esta casa será mayor que la primera, ha dicho Yahvé de los ejércitos[a]; y en este lugar daré paz[b], declara Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Yahvé de las huestes'.
    reason: lexical_alternative
  - marker: b
    text: ‘Paz’ (shalom) también puede incluir la idea de bienestar o plenitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּד֣וֹל יִֽהְיֶ֡ה
  english_pob_choice: will be greater
  chosen_spanish: será mayor
  alternatives_spanish:
  - será grande
  - llegará a ser grande
  lexicon: HALOT
  rationale: גדול con היה funciona aquí de modo predicativo y comparativo. En español, 'será mayor' comunica naturalmente la comparación con la gloria anterior sin perder la fuerza del hebreo.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - esplendor
  lexicon: HALOT
  rationale: כבוד en un contexto de templo tiene resonancia cultual y teológica. 'Gloria' preserva mejor esa carga que 'honra' o 'esplendor'.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente 'casa'. Mantener 'esta casa' sigue de cerca el texto hebreo y conserva la referencia covenantal, aunque el referente histórico sea el templo.
- source_word: הָאַחֲרוֹן
  english_pob_choice: the latter
  chosen_spanish: postrera
  alternatives_spanish:
  - última
  - posterior
  lexicon: HALOT
  rationale: '''Postrera'' refleja el contraste con ''la primera'' y suena natural en español bíblico contemporáneo, sin volverlo excesivamente arcaico.'
- source_word: מִן הָרִאשׁוֹן
  english_pob_choice: than the former
  chosen_spanish: que la primera
  alternatives_spanish:
  - que la anterior
  - que la primera de antes
  lexicon: HALOT
  rationale: El hebreo compara la gloria 'postrera' con la 'primera'. En español, 'mayor que la primera' es la construcción comparativa más clara y fiel.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' para el Nombre divino según la norma del proyecto. צְבָאוֹת se traduce como 'de los Ejércitos' para conservar la fuerza plural/militar del título sin usar 'SEÑOR' ni la forma tradicional 'de los ejércitos' con minúscula si el estilo editorial prefiere mayúscula reverencial.
- source_word: וּבַמָּקוֹם הַזֶּה
  english_pob_choice: and in this place
  chosen_spanish: y en este lugar
  alternatives_spanish:
  - y en este sitio
  - y en este mismo lugar
  lexicon: HALOT
  rationale: '''Lugar'' comunica bien מָקוֹם en español y evita una rigidez innecesaria. ''En este lugar'' conserva la deixis y el paralelismo con ''esta casa''.'
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - otorgaré
  - concederé
  lexicon: HALOT
  rationale: '''Daré'' es la correspondencia más directa y natural para נָתַן en esta promesa profética. ''Otorgaré'' o ''concederé'' serían más interpretativos.'
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: '''Paz'' es el equivalente estándar y fiel de שָׁלוֹם en este contexto. Su amplitud semántica queda disponible para nota, sin sobrecargar el texto principal.'
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: HALOT
  rationale: '''Declara'' preserva el tono solemne del pronunciamiento profético mejor que un simple ''dice'', sin caer en arcaísmo.'
theological_decisions:
- issue: Identidad y alcance de 'la gloria postrera de esta casa'
  english_pob_reading: Render the phrase straightforwardly as a promise about the glory of this house/temple without specifying in the main text whether the contrast is between successive temples, successive states of the same temple, or an eschatological fulfillment.
  chosen_spanish_reading: Se traduce de manera directa como una promesa sobre la gloria de esta casa, sin resolver en el cuerpo del texto si el contraste se refiere al segundo templo, a fases sucesivas del mismo templo o a un cumplimiento escatológico.
  alternative_spanish_readings:
  - La gloria de este templo será mayor que la de Salomón
  - La gloria final de esta casa será mayor que la anterior
  - La gloria mesiánica de este lugar será mayor
  rationale: El hebreo expresa la comparación, pero no precisa el esquema histórico-teológico. Mantener la formulación abierta preserva la tensión interpretativa documentada en la POB inglesa.
  doctrine_reference: Translation philosophy §3
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. Conforme al estándar del proyecto, se usa 'Yahvé' en el texto principal para conservar el Nombre del pacto y evitar el ocultamiento convencional por 'SEÑOR'.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia, revisión sin cambios y ninguna corrección aplicada en la última pasada; por eso la redacción española sigue de cerca el hebreo y conserva la misma apertura interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se traduce צְבָאוֹת como 'de los Ejércitos' para conservar la fuerza del título divino.
  - '''Casa'' se conserva en vez de ''templo'' para reflejar el hebreo בַּיִת, con el referente cultual implícito.'
  - '''Paz'' se usa en el texto principal y se amplía en nota para reflejar el rango semántico de שָׁלוֹם.'
