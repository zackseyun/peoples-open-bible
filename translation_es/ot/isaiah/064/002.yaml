    rationale: El audit trail inglés documenta que el verbo evoca fluir/disolverse, con alternativas interpretativas «temblaron» o «se derritieron». El español principal «se estremecieron» es defendible, pero debe ir acompañado por una nota en el lugar correspondiente para no perder la justificación lexical/theological.
