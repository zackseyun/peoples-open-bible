  source_alignment_summary: 'El borrador español transmite bien la comparación arquitectónica del griego y conserva la mayoría de las decisiones léxicas auditadas: ''arquitecto'', ''toda la estructura'', ''decorarla y pintarla'', y el inciso parentético ''pienso''. Sin embargo, pierde un matiz discursivo al coordinar con ''y'' donde el griego contrasta con δέ (''pero''), y ''examinar las cosas convenientes'' suena algo rígido frente al sentido deliberativo de ἐξεταστέον/English ''consider''.'
  spanish_quality_summary: El texto es claro y comprensible, pero puede fluir mejor en español con 'pero' para marcar el contraste y con 'considerar lo adecuado' en vez de 'examinar las cosas convenientes', que resulta más pesado e idiomáticamente menos natural. También conviene omitir el 'Porque' inicial, ya que 'así como' ya introduce bien la comparación y evita una apertura algo trabada.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El borrador se alinea con la terminología del proyecto y con las decisiones léxicas documentadas, salvo un ajuste estilístico-semántico menor en ἐξεταστέον y en la articulación contrastiva de δέ.
  issues:
  - severity: medium
    issue: El borrador usa 'y' donde el griego tiene δέ adversativo.
    rationale: La estructura griega contrasta las responsabilidades del arquitecto y del decorador/pintor. 'Pero' refleja mejor ese giro que una simple coordinación copulativa.
  - severity: medium
    issue: '''Debe examinar las cosas convenientes'' suena poco natural en español y no refleja del todo la revisión inglesa final.'
    rationale: La auditoría inglesa revisó 'examine' a 'consider'. En español, 'debe considerar lo adecuado para el adorno' mantiene la deliberación requerida y mejora la fluidez.
  - severity: low
    issue: El inicio con 'Porque, así como' es algo redundante y trabado.
    rationale: καθάπερ γάρ puede representarse de forma natural sin forzar un 'Porque' explícito al inicio; 'Pues así como' o simplemente 'Porque así como' sería posible, pero aquí la frase fluye mejor sin la coma y con formulación más sencilla.
  revised_spanish_text: Porque así como, en el caso de una casa nueva, el arquitecto debe preocuparse por toda la estructura, pero el que emprende decorarla[a] y pintarla debe considerar lo adecuado para el adorno, así también, pienso, sucede con nosotros.
  revised_footnotes:
  - marker: a
    text: O 'acondicionarla'; el verbo griego también puede denotar equipar o preparar una casa, no solo ornamentarla.
    reason: lexical_alternative
  revision_rationale: Se ajusta la conjunción para reflejar mejor el contraste de δέ, se sustituye una expresión rígida por una formulación más natural y fiel al sentido deliberativo ('considerar lo adecuado'), y se preserva en nota la alternativa léxica documentada para ἐγκαινίζειν. No se requiere adjudicación adicional.
