    text: 'O: «Trae de vuelta a nuestros cautivos» / «restaura nuestro cautiverio». El modismo hebreo puede referirse específicamente al regreso de exiliados o, más ampliamente, a la restauración de la condición del pueblo.'
    reason: alternative_reading
  - marker: b
    text: La imagen es la de los cauces normalmente secos del Néguev que de pronto se llenan con la lluvia.
    reason: cultural_note
  revision_rationale: Se reemplaza «nuestras fortunas» por «nuestra suerte» para expresar de manera más natural en español el modismo hebreo de restauración, manteniendo la amplitud semántica documentada en el POB inglés. Se conserva «Yahvé», «torrentes» y la referencia al Néguev. La nota alternativa se ajusta levemente para mayor naturalidad y precisión contextual.
