translation:
  language: es
  text: Y la palabra de Yahvé vino a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... aconteció
  - Y ... sucedió
  lexicon: HALOT
  rationale: En esta fórmula profética, וַיְהִי introduce la llegada de la palabra de Yahvé. En español, "vino" reproduce con naturalidad la idea de que la palabra llega al profeta, sin volver la frase mecánica con "aconteció" o "sucedió".
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la construcción דְבַר יְהוָה, "palabra" es la equivalencia más fiel y reconocible para la fórmula profética. "Mensaje" suaviza demasiado el matiz formal y repetido del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo emplea el nombre propio del pacto, no un título. En español, el POB usa "Yahvé" para conservar ese nombre divino de manera transparente, en lugar de sustituirlo por "el SEÑOR".
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta. "A mí" es la equivalencia natural en español y conserva la relación directa del destinatario.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - para decir,
  lexicon: HALOT
  rationale: En español, "diciendo" conserva la función introductoria del infinitivo hebreo y mantiene abierto el paso a la cita directa, como en el inglés auditado.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión doctrinal del POB es traducir el nombre divino por transliteración, no por sustitución tradicional. En español, "Yahvé" preserva la identidad personal del nombre del pacto y evita ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado presenta alta concordancia y sin cambios recientes; la versión española sigue directamente la fórmula profética establecida, adaptándola a un español natural sin perder la transparencia del nombre divino.
  spanish_consistency_notes:
  - 'Se mantiene el patrón profético breve y formularia: "Y la palabra de Yahvé vino a mí, diciendo,".'
  - '"Yahvé" se usa de forma consistente para el nombre divino en lugar de una sustitución tipográfica.'
  - La puntuación conserva la apertura de discurso directo con coma final, acorde con el hebreo y el inglés auditado.
