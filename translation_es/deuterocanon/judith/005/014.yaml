translation:
  language: es
  text: Y los condujo por la ruta de Sinaí y Cades-barnea[a]; y expulsaron a todos los que habitaban en el desierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la ruta hacia Sinaí y Cades-barnea». La frase griega puede denotar la ruta asociada con esos lugares o que lleva hacia ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a todos los habitantes del desierto». El griego usa un participio: «todos los que vivían/habitaban en el desierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  english_pob_choice: led
  chosen_spanish: condujo
  alternatives_spanish:
  - los llevó
  - los guió
  lexicon: LSJ
  rationale: ἄγω en aoristo expresa llevar o guiar; «condujo» conserva la dirección activa del sujeto y suena natural en español bíblico actual sin endurecer el estilo.
- source_word: εἰς ὁδὸν
  english_pob_choice: onto the way
  chosen_spanish: al camino
  alternatives_spanish:
  - sobre el camino
  - por la ruta
  - hacia el camino
  lexicon: LSJ
  rationale: La expresión griega presenta una imagen de orientación hacia una ruta concreta. «Al camino» preserva esa dirección de forma natural en español, sin forzar un calco.
- source_word: τοῦ Σεινὰ
  english_pob_choice: of Sinai
  chosen_spanish: de Sinaí
  alternatives_spanish:
  - hacia Sinaí
  lexicon: LSJ
  rationale: El genitivo funciona con ὁδὸν para señalar la ruta asociada con Sinaí; «de Sinaí» mantiene esa relación nominal y la transliteración estándar del topónimo.
- source_word: Καδής Βαρνή
  english_pob_choice: Kadesh-barnea
  chosen_spanish: Cades-barnea
  alternatives_spanish:
  - Cades Barnea
  lexicon: LSJ
  rationale: Se conserva el nombre propio con transliteración bíblica reconocible en español. La forma compuesta con guion sigue la práctica editorial habitual para este topónimo.
- source_word: ἐξέβαλον
  english_pob_choice: drove out
  chosen_spanish: expulsaron
  alternatives_spanish:
  - arrojaron fuera
  - expulsaron violentamente
  - echaron
  lexicon: LSJ
  rationale: ἐκβάλλω puede significar expulsar o echar fuera. En contexto territorial, «expulsaron» transmite el desplazamiento forzoso de los habitantes con fuerza suficiente y claridad en español.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos y cada uno de
  - a todos los
  lexicon: LSJ
  rationale: El cuantificador es totalizador; la preposición y el complemento directo en español requieren «a todos» para reflejar el alcance completo del original.
- source_word: τοὺς κατοικοῦντας
  english_pob_choice: who were living
  chosen_spanish: los que habitaban
  alternatives_spanish:
  - los que vivían
  - los habitantes
  lexicon: LSJ
  rationale: El participio presente marca a quienes residen en un lugar. «Los que habitaban» conserva el valor verbal y resulta más bíblico y preciso que nominalizar sin necesidad.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en el yermo
  - en el desierto o la soledad
  lexicon: LSJ
  rationale: ἐρήμος puede ser desierto o yermo; aquí «desierto» comunica bien el espacio geográfico del relato. Se evita «wilderness» traducido mecánicamente, porque en español «desierto» es la equivalencia más natural y estable.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; se conservó la lectura aprobada y se reflejaron en español las mismas dos alternativas lexicográficas señaladas por la POB, adaptadas a la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Desierto» se eligió como equivalente estándar de ἐρήμος en este contexto geográfico.
  - Los topónimos se transliteraron de manera reconocible para lectores hispanohablantes.
  - Las notas al pie conservan las alternativas relevantes sin sobreinterpretar el griego.
