translation:
  language: es
  text: El terror, la fosa y la trampa[a] están sobre ti, habitante de Moab[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El temor, la fosa y la trampa están sobre ti».'
    reason: lexical_alternative
  - marker: b
    text: 'Esta tríada recuerda Isaías 24:17: «terror, fosa y trampa».'
    reason: cross_reference
lexical_decisions:
- source_word: פַּחַד
  english_pob_choice: Terror
  chosen_spanish: Terror
  alternatives_spanish:
  - Miedo
  - Temor
  - Pavor
  lexicon: HALOT
  rationale: El sustantivo en este contexto profético expresa pánico o terror ante juicio inminente. «Terror» conserva la fuerza de la triada y evita suavizar el término.
- source_word: פַחַת
  english_pob_choice: the pit
  chosen_spanish: la fosa
  alternatives_spanish:
  - el pozo
  - el hoyo
  - la trampa
  lexicon: HALOT
  rationale: En español, «fosa» comunica mejor la imagen de caída/sepultura que «pozo» o «hoyo», y mantiene el paralelismo con los dos sustantivos siguientes en una fórmula de juicio.
- source_word: פָח
  english_pob_choice: the snare
  chosen_spanish: la trampa
  alternatives_spanish:
  - la red
  - el lazo
  - la soga
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «snare», en español «trampa» es la equivalencia más natural y clara para un artefacto de captura. Preserva el contraste con «fosa» sin forzar un arcaísmo.
- source_word: עָלֶיךָ
  english_pob_choice: are upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - caen sobre ti
  - vienen sobre ti
  lexicon: HALOT
  rationale: La preposición עַל con sufijo de 2.ª masc. singular expresa algo que recae o pesa sobre el destinatario. En español, la frase nominal «sobre ti» permite una construcción elíptica fiel al hebreo, con verbo implícito de estar/recaer.
- source_word: יוֹשֵׁב מוֹאָב
  english_pob_choice: inhabitant of Moab
  chosen_spanish: habitante de Moab
  alternatives_spanish:
  - morador de Moab
  - el que habitas en Moab
  - habitante moabita
  lexicon: HALOT
  rationale: El participio singular funciona como vocativo representativo. «Habitante de Moab» conserva el valor apelativo y evita introducir una perífrasis más interpretativa.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se rinde con un verbo declarativo solemne. Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה, sin sustituir el nombre divino por un título.
theological_decisions:
- issue: Tríada de juicio «terror / pit / snare»
  english_pob_reading: Terror and the pit and the snare
  chosen_spanish_reading: Terror, la fosa y la trampa
  alternative_spanish_readings:
  - Temor, la fosa y la trampa
  - Terror, el pozo y la trampa
  - Miedo, el hoyo y el lazo
  rationale: La traducción conserva la triada fija de juicio sin diluirla en explicaciones. Se evita una lectura moralizante o alegórica; el texto presenta imágenes concretas de desastre y captura, en paralelo con Isaías 24:17.
  doctrine_reference: Isaías 24:17; Jeremías 48:43
- issue: Forma de citar la intervención divina
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: Se conserva la solemnidad profética mediante «declara». El nombre divino se traduce como «Yahvé» según la norma del proyecto, preservando el Tetragrama en la superficie del texto español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto en inglés y el expediente de revisión muestran alta concordancia y sin cambios sustantivos. La versión española sigue esa estabilidad, ajustando solo la idiomaticidad natural de «pit/snare» a «fosa/trampa» y manteniendo la referencia explícita al nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene el trato singular vocativo en «habitante de Moab», coherente con el hebreo participial singular.
  - Se conserva el paralelismo de tres miembros con puntuación en serie.
  - «Yahvé» se usa de forma consistente para יְהוָה en el texto principal.
  - Las notas al pie preservan la alternativa léxica documentada y la alusión intertextual a Isaías 24:17.
