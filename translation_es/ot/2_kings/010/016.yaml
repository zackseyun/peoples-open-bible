review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: invitación imperativa («Ven conmigo»), segundo imperativo («mira»), sustantivo קִנְאָה como «celo», nombre divino «Yahvé», y el causativo final sobre hacer montar/subir a alguien en un vehículo. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica: repite «mi celo por Yahvé» en vez de ofrecer la alternativa «mis celos por Yahvé» o mejor «mi celo / mis celos por Yahvé». Además, «carro» en español latino moderno suele sugerir automóvil y no transmite tan claramente רכב como vehículo tipo carro de guerra; «carroza» tampoco encaja bien. «Carro de guerra» o «carro» en contexto bíblico puede funcionar, pero aquí conviene aclararlo en el texto principal para legibilidad y precisión.'
  spanish_quality_summary: La redacción es generalmente natural y digna. «Ven conmigo y mira mi celo por Yahvé» suena bien y es fiel. El punto más débil de legibilidad es «en su carro», que hoy puede sonar anacrónico de manera confusa o demasiado ambigua. «En su carro de guerra» mejora la comprensión sin sobreparafrasear, dado el contexto monárquico y el sentido habitual de רכב. La nota al pie actual tiene un error interno al no presentar realmente la alternativa.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; קִנְאָה -> «celo» es adecuado con alternativa de «celos» en nota; no hay otros términos doctrinales sensibles. La excepción necesaria es ajustar la nota para reflejar con exactitud la alternativa preservada por el inglés.'
  issues:
  - severity: medium
    issue: La nota al pie no presenta la alternativa léxica correcta.
    rationale: El texto de la nota dice «O “mi celo por Yahvé”», que repite la lectura principal en vez de documentar la alternativa «mis celos»/«mi celo o mis celos». Esto falla en preservar el razonamiento léxico auditado.
  - severity: medium
    issue: «En su carro» es potencialmente ambiguo o poco natural en español moderno.
    rationale: Aunque «carro» puede usarse en registros bíblicos, en español latinoamericano suele entenderse como automóvil. Dado que רכב aquí corresponde a un vehículo real/monárquico y el inglés auditado eligió «chariot», «carro de guerra» comunica mejor el referente.
  revised_spanish_text: 'Entonces dijo[a]: «Ven conmigo y mira mi celo por Yahvé». Y lo hicieron subir en su carro de guerra.'
  revised_footnotes:
  - marker: a
    text: O «mis celos por Yahvé». El sustantivo hebreo puede denotar «celo» o «celos» según el contexto.
    reason: lexical_alternative
