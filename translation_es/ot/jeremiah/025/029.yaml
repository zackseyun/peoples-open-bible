translation:
  language: es
  text: Porque, he aquí, en la ciudad sobre la cual es llamado mi nombre[a], yo estoy comenzando a traer daño; ¿y ustedes de veras quedarán sin castigo? No quedarán sin castigo, porque estoy llamando a la espada[b] contra todos los habitantes de la tierra[c], declara Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la ciudad que es llamada por mi nombre». El modismo hebreo es literalmente «la ciudad sobre la cual es llamado mi nombre».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «estoy llamando a la espada»; el hebreo personifica la espada como instrumento de juicio convocado por Dios.
    reason: lexical_alternative
  - marker: c
    text: O «la tierra» o «el país». El hebreo אֶרֶץ puede referirse a una región o a la tierra en sentido amplio; aquí se toma el alcance universal.
    reason: alternative_reading
lexical_decisions:
- source_word: בָעִיר אֲשֶׁר נִקְרָא שְׁמִי עָלֶיהָ
  english_pob_choice: in the city over which my name is called
  chosen_spanish: en la ciudad sobre la cual es invocado mi nombre
  alternatives_spanish:
  - en la ciudad que es llamada por mi nombre
  - en la ciudad sobre la que es invocado mi nombre
  lexicon: HALOT
  rationale: Conservo el valor idiomático de נִקְרָא שֵׁם עַל como nombre ‘invocado sobre’ alguien o algo, que expresa pertenencia o designación. ‘Es invocado mi nombre’ mantiene la imagen hebrea mejor que un giro más fluido pero menos transparente.
- source_word: מֵחֵל לְהָרַע
  english_pob_choice: am beginning to bring harm
  chosen_spanish: yo estoy comenzando a traer mal
  alternatives_spanish:
  - yo estoy comenzando a traer daño
  - yo comienzo a traer calamidad
  - yo estoy empezando a hacer daño
  lexicon: HALOT
  rationale: La construcción marca inicio, por eso ‘estoy comenzando’. רעה en este contexto judicial no sugiere mal moral de parte de Dios, sino mal/daño/calamidad traídos como juicio. ‘Traer mal’ sigue de cerca el campo semántico sin borrar la tensión.
- source_word: הִנָּקֵה תִנָּקוּ
  english_pob_choice: shall you indeed go unpunished?
  chosen_spanish: ¿quedarán sin castigo?
  alternatives_spanish:
  - ¿escaparán completamente del castigo?
  - ¿serán de veras absueltos?
  lexicon: HALOT
  rationale: La fuerza intensiva de la infinitiva absoluta más el verbo se expresa naturalmente con una pregunta enfática. ‘Quedarán sin castigo’ conserva el sentido forense de נקה sin introducir un tecnicismo demasiado rígido.
- source_word: לֹא תִנָּקוּ
  english_pob_choice: You shall not go unpunished
  chosen_spanish: No quedarán sin castigo
  alternatives_spanish:
  - No escaparán del castigo
  - No serán absueltos
  lexicon: HALOT
  rationale: Mantiene la misma raíz conceptual que la pregunta anterior, ahora en forma negativa. ‘Quedarán sin castigo’ es claro y judicialmente preciso en español.
- source_word: חֶרֶב אֲנִי קֹרֵא
  english_pob_choice: I am calling for a sword
  chosen_spanish: estoy llamando a espada
  alternatives_spanish:
  - estoy convocando a espada
  - llamo a espada
  - estoy llamando contra ellos a espada
  lexicon: HALOT
  rationale: Conservo la personificación del ‘sword’ como agente de juicio convocado por Dios. En español, ‘llamar a espada’ preserva la metáfora breve y enérgica del hebreo; la ausencia de artículo refleja el uso concreto e imagístico.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all the inhabitants of the earth
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes del país
  - todos los habitantes de la tierra/país
  lexicon: HALOT
  rationale: אָרֶץ puede significar ‘tierra’ o ‘país’. Aquí, conforme a la amplitud del juicio en el contexto, ‘tierra’ comunica mejor el alcance universal sin cerrar la posibilidad regional que conserva la nota inglesa.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - oráculo de Yahvé de los ejércitos
  - declara Yahvé Sebaot
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el nombre divino: ‘Yahvé’. ‘De los ejércitos’ traduce צְבָאוֹת de manera transparente y reconocible en español; ‘declara’ reproduce la fórmula profética נְאֻם.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo la convención doctrinal del proyecto para español, se usa ‘Yahvé’ para preservar el nombre del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: término controvertido יְהוָה / YHWH'
- issue: Si מֵחֵל לְהָרַע atribuye mal moral a Dios
  english_pob_reading: am beginning to bring harm
  chosen_spanish_reading: estoy comenzando a traer mal
  alternative_spanish_readings:
  - estoy comenzando a hacer mal
  - estoy comenzando a traer calamidad
  rationale: En un contexto de juicio, el hebreo apunta a daño/calamidad, no a pecado moral. ‘Traer mal’ conserva esa tensión sin imputar maldad ética a Dios.
  doctrine_reference: 'DOCTRINE.md: principios de traducción §1, §3'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo WLC y el aparato de decisiones del POB en inglés. La redacción española mantiene la imagen idiomática de ‘sobre la cual es invocado mi nombre’, la intensidad forense de ‘no quedarán sin castigo’, y la referencia concreta a ‘espada’ en lugar de suavizarla a ‘guerra’. No se detectaron revisiones posteriores que requirieran ajuste adicional; el último pase indica ‘unchanged’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה conforme al estándar del proyecto en español.
  - Se mantiene ‘habitantes de la tierra’ por la decisión contextual de alcance amplio, dejando la alternativa ‘país’ en nota.
  - ‘Mal’ se emplea como daño/calamidad en juicio, no como maldad moral; la nota lo aclara para evitar ambigüedad.
  - La metáfora de ‘espada’ se conserva sin expansión interpretativa para respetar el paralelismo del hebreo.
