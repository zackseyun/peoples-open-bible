translation:
  language: es
  text: Puso guarniciones en Edom[a], y todos los edomitas quedaron sometidos a David[b]. Y Yahvé dio la victoria a David dondequiera que iba[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puestos militares» o «prefectos». El hebreo puede referirse a una presencia militar o administrativa de control; en este contexto de conquista, la idea militar es la más probable.
    reason: lexical_alternative
  - marker: b
    text: Lit. «todo Edom llegó a ser siervos/esclavos de David». El nombre del país representa a su pueblo; en español se traduce de forma más natural como «los edomitas quedaron sometidos a David».
    reason: lexical_alternative
  - marker: c
    text: O «Yahvé salvó a David» o «Yahvé libró a David». El verbo hebreo puede traducirse más literalmente como «salvó»; aquí «dio la victoria» hace explícito el sentido militar del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: He placed
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Estableció
  - Puso guarniciones
  lexicon: HALOT
  rationale: וַיָּשֶׂם expresa ‘poner/colocar/establecer’. En español, ‘puso’ es natural y directo; con ‘guarniciones’ se entiende el acto militar de instalar fuerzas de control sin añadir explicación ajena al texto.
- source_word: בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: en Edom
  alternatives_spanish:
  - en todo Edom
  - dentro de Edom
  lexicon: HALOT
  rationale: La preposición ב marca ubicación. ‘En Edom’ conserva la referencia geográfica simple del hebreo.
- source_word: נְצִיבִים
  english_pob_choice: garrisons
  chosen_spanish: guarniciones
  alternatives_spanish:
  - puestos militares
  - destacamentos
  - prefectos
  lexicon: HALOT
  rationale: En este contexto de conquista, נְצִיבִים designa una presencia militar o administrativa que afirma control. ‘Guarniciones’ comunica bien esa fuerza en español, sin reducirlo solo a ‘gobernadores’.
- source_word: וַיִּהְיוּ כָל אֱדוֹם
  english_pob_choice: and all Edom became
  chosen_spanish: y todo Edom quedó sometido
  alternatives_spanish:
  - y todo Edom se hizo
  - y todos los edomitas quedaron sometidos
  lexicon: HALOT
  rationale: El hebreo usa Edom como metonimia del pueblo. ‘Quedó sometido’ expresa la condición resultante de subordinación en el contexto de conquista, sin perder la referencia colectiva.
- source_word: עֲבָדִים
  english_pob_choice: servants
  chosen_spanish: sometido
  alternatives_spanish:
  - esclavo
  - siervo
  - sujeto
  lexicon: HALOT
  rationale: El audit trail inglés pasó de ‘slaves’ a ‘servants’ por naturalidad en un contexto político. En español, ‘sometido’ evita una lectura demasiado servil o doméstica de עֲבָדִים y mantiene la idea de subordinación nacional. ‘Esclavo’ sería demasiado fuerte; ‘siervo’ puede sonar eclesiástico.
- source_word: לְדָוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - bajo David
  lexicon: HALOT
  rationale: Después de ‘quedó sometido’, la relación lamed se expresa naturalmente como ‘a David’. Esto preserva la dirección de subordinación sin sobretraducir.
- source_word: וַיּוֹשַׁע
  english_pob_choice: gave ... victory
  chosen_spanish: dio la victoria
  alternatives_spanish:
  - salvó
  - libró
  - dio salvación
  lexicon: HALOT
  rationale: יָשַׁע puede significar salvar, librar o dar victoria. En un marco militar, ‘dio la victoria’ transmite el resultado concreto de la intervención divina y concuerda con el contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El proyecto español usa ‘Yahvé’ para el Tetragrámaton, evitando la sustitución por ‘SEÑOR’. Esto mantiene el nombre personal divino según la política del proyecto.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  english_pob_choice: wherever he went
  chosen_spanish: en todo lo que fue adonde iba
  alternatives_spanish:
  - dondequiera que fue
  - en todo lugar donde iba
  lexicon: HALOT
  rationale: El hebreo expresa alcance completo sobre los movimientos de David. ‘En todo lo que fue adonde iba’ es un español algo más literal que ‘dondequiera que fue’, pero conserva la amplitud del idiomatismo sin perder claridad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio del Dios del pacto en lugar de ocultarlo con un título. ‘Yahvé’ es la forma establecida en este proyecto para el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עֲבָדִים en contexto de conquista
  english_pob_reading: servants
  chosen_spanish_reading: quedó sometido
  alternative_spanish_readings:
  - quedó en servidumbre
  - quedó como esclavo
  - quedó sujeto
  rationale: El inglés audita una tensión entre ‘slaves’ y ‘servants’, optando por ‘servants’ por naturalidad política. En español, ‘sometido’ conserva la idea de sujeción nacional sin forzar una imagen doméstica o eclesiástica. Mantiene la tensión entre servicio y dominio bajo una formulación más idiomática.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; treatment of subordinated-status language in conquest contexts
- issue: Traducción de וַיּוֹשַׁע en marco bélico
  english_pob_reading: gave David victory
  chosen_spanish_reading: dio la victoria a David
  alternative_spanish_readings:
  - salvó a David
  - libró a David
  rationale: La forma elegida explicita la victoria militar que el verbo puede implicar en este contexto. No se pierde la idea de liberación divina, pero se hace inteligible la acción en términos narrativos y bélicos.
  doctrine_reference: HALOT יָשַׁע; contextual military sense
translation_notes:
  revision_awareness: El borrador inglés más reciente suavizó עֲבָדִים de ‘slaves’ a ‘servants’ por naturalidad en un contexto de subyugación política. La versión española refleja esa misma cautela semántica, pero evita ‘siervos’ por su posible resonancia eclesiástica y ‘esclavos’ por su dureza excesiva en español moderno. También conserva ‘Yahvé’ en lugar de una sustitución por título, según la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton, conforme al estándar del proyecto.
  - Se eligió una solución de subordinación política para עֲבָדִים, coherente con el giro editorial del audit trail inglés hacia una lectura menos literal que ‘esclavos’.
  - ‘Guarniciones’ y ‘sometido’ trabajan juntos para transmitir el control militar sobre Edom sin introducir detalles no atestiguados.
