    issue: La nota [a] es defectuosa
    rationale: La nota dice «O “Mira”» cuando el texto principal ya usa «Mira». No preserva una alternativa real ni refleja bien la razón de la nota inglesa.
  - severity: medium
    issue: «ni te desanimes» debilita תֵּחָת
    rationale: El hebreo sugiere quedar abatido, quebrantado o intimidado; «desanimarse» puede sonar demasiado psicológico y menos fuerte que la prohibición original.
  - severity: low
    issue: «te ha dicho» puede sonar demasiado coloquial frente a דִּבֶּר
    rationale: Aunque es posible, «ha hablado» conserva mejor la solemnidad verbal destacada en la auditoría inglesa, que evitó «prometió» por ser más interpretativo.
