translation:
  language: es
  text: y los heveos[a], los arquitas, y los sinitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el clan heveo", "el clan arquita" y "el clan sinita". El hebreo usa formas gentilicias singulares con artículo, funcionando colectivamente para pueblos o clanes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - así como
  lexicon: HALOT
  rationale: En esta lista genealógica, וְ introduce un elemento más de la serie; el marcador de objeto directo no se expresa en español. Se conserva solo la conjunción coordinante natural.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los heveos
  alternatives_spanish:
  - los hivitas
  - la gente hevea
  lexicon: HALOT
  rationale: El hebreo presenta un gentilicio colectivo con artículo. En español, 'heveos' comunica el grupo étnico de forma natural y evita una transliteración menos transparente como 'hivitas', que no refleja tan bien la forma tradicional del nombre en español bíblico.
- source_word: הָעַרְקִי
  english_pob_choice: the Arkites
  chosen_spanish: los arkeos
  alternatives_spanish:
  - los arkitas
  - la gente de Arca
  lexicon: HALOT
  rationale: Se vierte como etnónimo colectivo en plural para reflejar el uso gentilicio del hebreo. 'Arkeos' mantiene la relación con Arca/Arká sin forzar una transliteración inglesa.
- source_word: הַסִּינִי
  english_pob_choice: the Sinites
  chosen_spanish: los sineos
  alternatives_spanish:
  - los sinitas
  - la gente de Sin
  lexicon: HALOT
  rationale: Se conserva el valor de gentilicio colectivo. 'Sineos' sigue el patrón castellano para etnónimos bíblicos y refleja mejor la forma hebrea que un calco inglés.
translation_notes:
  revision_awareness: El texto fuente y el control de revisión coinciden plenamente; no se detectaron variantes textuales ni cambios de sentido en la pasada de revisión más reciente.
