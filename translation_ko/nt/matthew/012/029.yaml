  text: '또한 어떻게 누가 강한 자의 집에 들어가 그의 세간을 빼앗을 수 있겠느냐? 먼저 그 강한 자를 결박해야 한다. 그렇게 한 뒤에야 그의 집을 약탈할 것이다.'
