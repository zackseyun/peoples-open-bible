- from: Entonces la ofrenda de Judá y de Jerusalén será agradable para Yahvé[a][b], como en los días de antaño y como en los años antiguos.
  to: Entonces la ofrenda de Judá y Jerusalén será agradable a Yahvé[a][b], como en los días de antaño y como en los años antiguos.
  rationale: Se ajusta la preposición a la construcción española más idiomática («agradable a Yahvé») y se aligera la coordinación de los topónimos («Judá y Jerusalén») sin cambiar el sentido ni las decisiones léxicas principales.
