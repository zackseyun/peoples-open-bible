translation:
  language: es
  text: Le darás su salario el mismo día, antes que se ponga el sol, porque es pobre y de ello depende su vida[a]; no sea que clame contra ti a Yahvé, y haya en ti pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "depende de él para su vida". El hebreo dice literalmente: "a ello lleva/carga su vida", un modismo que expresa una dependencia urgente del salario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹמוֹ
  english_pob_choice: the same day
  chosen_spanish: el mismo día
  alternatives_spanish:
  - ese día
  - en su día
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa 'en/en su día', pero en español 'el mismo día' comunica con naturalidad la obligación de pagar sin demora, preservando la inmediatez legal del mandato.
- source_word: תִתֵּן
  english_pob_choice: You shall give
  chosen_spanish: Le darás
  alternatives_spanish:
  - deberás darle
  - darás
  lexicon: HALOT
  rationale: El imperfecto legal hebreo se expresa en español como futuro de mandato. 'Le darás' mantiene el tono normativo sin volverlo más explicativo de lo que permite el texto.
- source_word: שְׂכָרוֹ
  english_pob_choice: his wages
  chosen_spanish: su salario
  alternatives_spanish:
  - su paga
  - su jornal
  lexicon: HALOT
  rationale: En este contexto laboral, 'salario' transmite la compensación debida por el trabajo. 'Jornal' puede sonar más específico o regional; 'paga' es más general, pero algo menos preciso para una obligación legal.
- source_word: וְלֹא תָבוֹא עָלָיו הַשֶּׁמֶשׁ
  english_pob_choice: and the sun shall not go down on it
  chosen_spanish: y el sol no se pondrá sobre ello
  alternatives_spanish:
  - y no se pondrá el sol sobre ello
  - y el sol no caerá sobre ello
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de que el sol 'viene sobre' la deuda/objetivo, evitando suavizarla en exceso. 'Ponerse sobre ello' suena natural en español y mantiene la referencia temporal al ocaso.
- source_word: כִּי עָנִי הוּא
  english_pob_choice: because he is poor
  chosen_spanish: porque él es pobre
  alternatives_spanish:
  - porque es pobre
  - porque es necesitado
  lexicon: HALOT
  rationale: '''Pobre'' es la equivalencia más directa en este contexto económico. Se mantiene el pronombre explícito (''él'') para reflejar la focalización del hebreo.'
- source_word: וְאֵלָיו הוּא נֹשֵׂא אֶת נַפְשׁוֹ
  english_pob_choice: and depends on it
  chosen_spanish: y de ello depende su vida
  alternatives_spanish:
  - y en ello pone su vida
  - y a ello lleva su vida
  lexicon: HALOT
  rationale: El hebreo usa un modismo de gran carga idiomática. 'De ello depende su vida' hace explícita la dependencia urgente sin borrar la tensión lexical ni convertir el dicho en una paráfrasis libre.
- source_word: וְלֹא יִקְרָא עָלֶיךָ אֶל יְהוָה
  english_pob_choice: lest he cry out against you to Yahweh
  chosen_spanish: para que no clame contra ti a Yahvé
  alternatives_spanish:
  - no sea que clame contra ti a Yahvé
  - y no clame contra ti a Yahvé
  lexicon: HALOT
  rationale: '''Clame'' reproduce bien la idea de una apelación agravada o denuncia ante Dios. ''A Yahvé'' conserva el nombre divino conforme al estándar del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre propio del pacto en lugar de sustituirlo por un título.'
- source_word: וְהָיָה בְךָ חֵטְא
  english_pob_choice: and there be sin in you
  chosen_spanish: y no haya pecado en ti
  alternatives_spanish:
  - y habrá pecado en ti
  - y habrá culpa en ti
  lexicon: HALOT
  rationale: El hebreo expresa la consecuencia moral como la presencia de 'pecado' en la persona. 'No haya pecado en ti' conserva la fuerza de advertencia y suena natural en español bíblico moderno.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, por lo que se traduce con la forma del nombre divino y no con una sustitución titular. 'Yahvé' es la forma estándar adoptada por el proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la última cláusula moral
  english_pob_reading: and there be sin in you
  chosen_spanish_reading: y no haya pecado en ti
  alternative_spanish_readings:
  - y habrá pecado en ti
  - y serás culpable
  rationale: 'El hebreo no desarrolla una doctrina técnica de imputación; formula una consecuencia ética directa. La negación en español corresponde al giro exhortativo del conjunto: evitar que el incumplimiento produzca pecado en el receptor.'
  doctrine_reference: 'DOCTRINE.md: Ethical warnings and covenant accountability'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés auditado que prefirió 'the same day', 'depends on it' y 'lest he cry out'. La redacción española sigue esa línea de naturalidad sin perder el modismo hebreo subyacente ni el tono jurídico-admonitorio del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''salario'' se eligió por claridad laboral en español, sin añadir una referencia a pago mensual o contractual ausente en el hebreo.'
  - '''no haya pecado en ti'' preserva la consecuencia moral en forma fluida y bíblica, sin convertirla en una explicación doctrinal más amplia.'
