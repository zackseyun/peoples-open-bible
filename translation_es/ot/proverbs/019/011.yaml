translation:
  language: es
  text: El discernimiento del hombre le hace lento para la ira[a], y su gloria es pasar por alto una ofensa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «alarga su nariz», un modismo hebreo para la paciencia o la ira tardía.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pasar por alto una transgresión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂכֶל
  english_pob_choice: insight
  chosen_spanish: discernimiento
  alternatives_spanish:
  - prudencia
  - entendimiento
  - buen juicio
  lexicon: HALOT
  rationale: שֵׂכֶל denota inteligencia práctica o buen juicio aplicado. «Discernimiento» comunica esa capacidad de percibir con acierto y actuar con sensatez en un proverbio de sabiduría, sin volver el verso demasiado técnico ni abstracto.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם funciona en sentido genérico para un individuo humano. En español, «el hombre» conserva ese valor representativo y se ajusta al tono proverbial, sin perder la referencia general.
- source_word: הֶאֱרִיךְ אַפּוֹ
  english_pob_choice: makes him slow to anger
  chosen_spanish: le hace lento para la ira
  alternatives_spanish:
  - le hace tardar en enojarse
  - le hace paciente
  - alarga su enojo
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente «alarga su nariz», un modismo para paciencia o ira demorada. «Le hace lento para la ira» conserva la relación causal del proverbio y evita una paráfrasis más fuerte como «paciente» o «tardo para enojarse»; la nota explica el modismo.
- source_word: וְתִפְאַרְתּוֹ
  english_pob_choice: and it is his glory
  chosen_spanish: y su gloria es
  alternatives_spanish:
  - y su honra es
  - y su hermosura es
  - y su honor es
  lexicon: HALOT
  rationale: תִפְאֶרֶת puede expresar gloria, honor o hermosura. «Gloria» mantiene el registro elevado y el valor de lo honorable/lo digno de elogio, coherente con el paralelismo sapiencial.
- source_word: עֲבֹר עַל
  english_pob_choice: to overlook
  chosen_spanish: pasar por alto
  alternatives_spanish:
  - pasar sobre
  - ignorar
  - perdonar
  lexicon: HALOT
  rationale: La construcción significa pasar por encima o no tomar en cuenta una falta. «Pasar por alto» es la equivalencia natural en español y conserva la idea de no retaliar ni insistir en la falta, sin convertirla directamente en «perdonar».
- source_word: פָּשַׁע
  english_pob_choice: an offense
  chosen_spanish: una ofensa
  alternatives_spanish:
  - una transgresión
  - una rebelión
  - una falta
  lexicon: HALOT
  rationale: פֶּשַׁע puede significar transgresión o rebelión, pero en este proverbio interpersonal «ofensa» es la opción más natural y suficientemente seria en español. Preserva el sentido de una falta real sin cargar el verso con un tecnicismo más jurídico o teológico.
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado de la POB inglesa: se mantiene el sentido idiomático de paciencia en lugar de la metáfora literal, y se conserva la alternativa de «pasar por alto» como nota. No se requieren revisiones textuales adicionales respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa «hombre» en sentido genérico, en línea con el valor representativo del hebreo אָדָם.
  - «Gloria» traduce תִפְאַרְתּוֹ con un registro acorde a la sabiduría bíblica.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente al pasaje.
  - La estructura mantiene el paralelismo del proverbio y una puntuación natural en español.
