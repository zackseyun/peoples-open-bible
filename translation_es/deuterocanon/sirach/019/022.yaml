translation:
  language: es
  text: Hay quien maquina el mal[a], encorvado en la penumbra, y por dentro está lleno de engaño;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «encorvado en la melancolía» o «doblado en negrura»; el griego puede sugerir tanto un estado de ánimo sombrío como una apariencia oscurecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  - Se encuentra
  lexicon: LSJ
  rationale: El griego abre con una fórmula existencial general; en español, «Hay» reproduce de forma natural esa presentación de un tipo de persona sin añadir énfasis no presente en el texto.
- source_word: πονηρευόμενος
  english_pob_choice: who plots evil
  chosen_spanish: que maquina el mal
  alternatives_spanish:
  - que hace el mal
  - que trama el mal
  - malévolo
  lexicon: LSJ
  rationale: La forma participial sugiere acción deliberada, no solo un rasgo fijo. «Maquina el mal» conserva la idea de intención y actividad encubierta, cercana a «plots evil», sin volverlo demasiado idiomático o genérico.
- source_word: συγκεκυφώς
  english_pob_choice: bent low
  chosen_spanish: encorvado
  alternatives_spanish:
  - inclinado
  - agachado
  - doblado
  lexicon: LSJ
  rationale: El participio perfecto expresa una postura de estar doblado o encorvado. «Encorvado» mantiene la imagen corporal y funciona bien en español contemporáneo.
- source_word: μελανίᾳ
  english_pob_choice: in gloom
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en la penumbra
  - en la tristeza
  - en melancolía
  lexicon: LSJ
  rationale: El término griego puede sugerir tanto negrura exterior como un estado anímico sombrío. «En la oscuridad» preserva esa ambigüedad visual y afectiva; no resuelve el verso solo hacia una emoción interna.
- source_word: τὰ ἐντὸς αὐτοῦ
  english_pob_choice: inwardly
  chosen_spanish: por dentro
  alternatives_spanish:
  - en su interior
  - en lo íntimo de él
  - internamente
  lexicon: LSJ
  rationale: La frase contrapone el exterior encorvado con el interior real. «Por dentro» es una equivalencia natural y clara que mantiene el contraste sin anatomizar la expresión.
- source_word: πλήρης δόλου
  english_pob_choice: full of deceit
  chosen_spanish: lleno de engaño
  alternatives_spanish:
  - lleno de dolo
  - lleno de astucia
  - lleno de fraude
  lexicon: LSJ
  rationale: «δόλος» designa engaño, astucia o guile. «Engaño» es transparente y fiel en español; «dolo» sería más técnico y menos inmediato para lectura eclesial general.
theological_decisions:
- issue: Relación entre postura exterior y corrupción interior
  english_pob_reading: The verse describes a person whose outwardly lowered or gloomy demeanor masks inward deceit.
  chosen_spanish_reading: El versículo presenta a una persona cuya apariencia encorvada y oscura contrasta con un interior lleno de engaño.
  alternative_spanish_readings:
  - El versículo describe solo tristeza o abatimiento literal, sin implicar hipocresía.
  - La oscuridad puede leerse únicamente como estado de ánimo, no como apariencia
  rationale: El griego yuxtapone postura externa y contenido interno. La traducción conserva esa tensión sin decidir en exceso si la postura es fingida, emocional o visual, respetando la ambigüedad documentada en la nota inglesa.
  doctrine_reference: Sabiduría/ética bíblica sobre integridad interior y exterior; sin afirmación doctrinal específica.
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego de cerca y mantiene la ambigüedad señalada en el aparato inglés entre una oscuridad exterior y un estado interior sombrío, sin neutralizar la imagen corporal del participio ni la carga moral de δόλος.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene «engaño» para δόλος por claridad y porque el contexto apunta a malicia encubierta, no a un tecnicismo jurídico.
  - «En la oscuridad» se eligió para no cerrar la lectura hacia «melancolía» únicamente; la nota conserva ambas posibilidades.
  - «Maquina el mal» expresa deliberación y no solo conducta mala genérica.
