translation:
  language: es
  text: Te comparo, mi amada, con mi yegua[a] entre los carros de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una yegua entre los carros de Faraón». El hebreo lleva un sufijo de primera persona en «mi yegua», aunque la idea principal es la comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְסֻסָתִי
  english_pob_choice: to my mare
  chosen_spanish: con mi yegua
  alternatives_spanish:
  - con mi mare
  - con mi caballo
  - como mi yegua
  lexicon: HALOT
  rationale: El hebreo presenta סֻסָתִי, forma femenina singular con sufijo de primera persona; en español, 'yegua' conserva el rasgo femenino marcado mejor que 'caballo'. 'Con' expresa con naturalidad la comparación poética del verso, y 'mi' refleja el sufijo, tal como la revisión inglesa decidió explicitarlo.
- source_word: בְּרִכְבֵי פַרְעֹה
  english_pob_choice: among Pharaoh’s chariots
  chosen_spanish: entre los carros de Faraón
  alternatives_spanish:
  - en los carros de Faraón
  - junto a los carros de Faraón
  - entre la charrería de Faraón
  lexicon: HALOT
  rationale: El plural constructo רִכְבֵי con בְּ admite sentido locativo o asociativo. 'Entre los carros de Faraón' conserva la imagen de presencia destacada dentro del conjunto y evita una literalidad poco natural en español. 'Carros' es más transparente que 'carros de guerra' aquí, porque el hebreo no lo especifica.
- source_word: דִּמִּיתִיךְ
  english_pob_choice: I compare you
  chosen_spanish: Te comparo
  alternatives_spanish:
  - Te he comparado
  - Te asemejo
  - Te hago semejante
  lexicon: HALOT
  rationale: El verbo דמה en piel perfecto 1cs + sufijo 2fs expresa el acto de comparar/llevar a semejanza. En español, el presente poético 'Te comparo' comunica bien la acción enunciativa y evita un pasado que el hebreo perfecto no obliga a enfatizar aquí.
- source_word: רַעְיָתִי
  english_pob_choice: my beloved
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi amada mía
  - mi querida
  - mi amores
  lexicon: HALOT
  rationale: En Cantar de los Cantares, רַעְיָתִי es un vocativo afectuoso y elevado dirigido a la mujer amada. 'Mi amada' preserva el tono íntimo y literario sin introducir coloquialismos ni términos eclesiásticos ajenos al contexto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del POB inglés, que añadió explícitamente el posesivo en 'my mare' para reflejar mejor el sufijo hebreo. La versión española mantiene esa completitud y adapta la comparación a una construcción natural en español.
  spanish_consistency_notes:
  - Se preserva 'Faraón' como nombre propio, sin añadir glosa interpretativa.
  - Se mantiene el tono poético y relacional del Cantar, evitando términos de registro litúrgico que no pertenecen al hebreo del verso.
  - La nota textual/lexical marca la alternativa possessiva explícita en el sustantivo, paralela a la decisión auditada en inglés.
