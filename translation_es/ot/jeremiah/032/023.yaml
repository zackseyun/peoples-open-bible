base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/023.yaml
  text: They came in and took possession of it[a], but they did not listen to your voice, and they did not walk in your law. They did not do all that you commanded them to do[b], and you brought upon them all this disaster.
  footnotes:
  - marker: a
    text: Or, 'they did not walk in your instruction.' The Hebrew torah can mean 'law' or 'instruction'; here it refers to God's covenantal teaching.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you brought upon them all this calamity.' The Hebrew literally says 'you called to them all this disaster,' an idiom for bringing judgment upon them.
    reason: lexical_alternative
