translation:
  language: es
  text: Los aplasto[a], y no pueden levantarse[b]; caen bajo mis pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hago pedazos» / «los abato»; el verbo hebreo comunica aplastamiento violento en contexto de batalla.
    reason: lexical_alternative
  - marker: b
    text: O «no pueden ponerse de pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶמְחָצֵם
  english_pob_choice: I crush them
  chosen_spanish: Los aplasto
  alternatives_spanish:
  - Los destruyo
  - Los hago pedazos
  - Los golpeo con fuerza
  lexicon: HALOT
  rationale: El verbo hebreo מחץ expresa golpe/ruptura violenta en contexto de combate. «Aplasto» conserva la imagen física de trituración y suena natural en español sin suavizar la fuerza del original.
- source_word: וְלֹא
  english_pob_choice: and ... not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - ni
  lexicon: HALOT
  rationale: Se mantiene la coordinación simple del hebreo, uniendo la acción con la incapacidad resultante en una sola construcción española.
- source_word: יֻכְלוּ
  english_pob_choice: they cannot
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - logran
  lexicon: HALOT
  rationale: El hebreo de יכל expresa capacidad. En español, la negación con «no pueden» transmite de manera natural la imposibilidad indicada por el verbo.
- source_word: קוּם
  english_pob_choice: rise
  chosen_spanish: levantarse
  alternatives_spanish:
  - ponerse de pie
  - alzarse
  - subirse
  lexicon: HALOT
  rationale: Después de ser aplastados, la imagen apunta a recuperar la postura erguida. «Levantarse» comunica bien la idea de volver a ponerse en pie, mejor que un calco más rígido.
- source_word: יִפְּלוּ
  english_pob_choice: they fall
  chosen_spanish: caen
  alternatives_spanish:
  - se derrumban
  - caen al suelo
  lexicon: HALOT
  rationale: נפל significa caer. «Caen» mantiene la forma simple y poética del hebreo, y en el contexto ya queda claro el sentido de derrota.
- source_word: תַּחַת רַגְלָי
  english_pob_choice: beneath my feet
  chosen_spanish: debajo de mis pies
  alternatives_spanish:
  - bajo mis pies
  - a mis pies
  lexicon: HALOT
  rationale: La expresión espacial se traduce de modo literal y comprensible. «Debajo de mis pies» conserva la imagen de sometimiento total sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Imaginería bélica intensa en un salmo real
  english_pob_reading: Retain the first-person martial language without softening
  chosen_spanish_reading: Mantener el lenguaje marcial en primera persona sin suavizarlo
  alternative_spanish_readings:
  - Vencerlos
  - Derrotarlos
  - Someterlos
  rationale: El hebreo usa imágenes corporales y de combate explícitas; la traducción no debe reemplazarlas por un lenguaje abstracto de victoria. «Aplasto» y «caen debajo de mis pies» preservan la tensión y la fuerza del pasaje.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje fuente; el control más reciente indica alta concordancia y ningún cambio necesario.
  spanish_consistency_notes:
  - Se mantiene «y no pueden» para reflejar la coordinación hebrea con la negación.
  - Se evita «Señor» o eufemismos no presentes; el versículo habla en primera persona del hablante poético.
  - Se conserva el plural directo «los» para el objeto del verbo, en línea con el hebreo pronominal.
