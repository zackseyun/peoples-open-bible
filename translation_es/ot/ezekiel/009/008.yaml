translation:
  language: es
  text: 'Y sucedió que, mientras ellos los abatían y yo quedaba solo, caí rostro en tierra y clamé, y dije: «¡Ah, Señor Yahvé[a], destruirás a todo el remanente de Israel cuando derrames tu ira sobre Jerusalén?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֲדֹנָי יְהוִה combina el título «Señor» con el Nombre divino «Yahvé»; por eso se traduce «Señor Yahvé» y no se oculta el Nombre divino.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el cambio de escena; «Y sucedió» conserva ese valor discursivo sin sonar arcaico en español.
- source_word: כְּהַכּוֹתָם
  english_pob_choice: while they were striking them down
  chosen_spanish: mientras ellos los abatían
  alternatives_spanish:
  - mientras los golpeaban
  - cuando los herían
  lexicon: HALOT
  rationale: El infinitivo con כ expresa simultaneidad. «Abatían» comunica mejor en español el matiz de golpe mortal o destrucción que un simple «golpeaban», y mantiene el tono de juicio del contexto.
- source_word: וְנֵאשֲׁאַר אֲנִי
  english_pob_choice: and I was left alone
  chosen_spanish: y yo quedaba solo
  alternatives_spanish:
  - y fui dejado solo
  - y permanecí solo
  lexicon: HALOT
  rationale: El nifal de שׁאר significa quedar/remanecer. «Quedaba solo» refleja la situación resultante y hace explícita la fuerza enfática del pronombre personal en un español natural.
- source_word: וָאֶפְּלָה עַל־פָּנַי
  english_pob_choice: I fell on my face
  chosen_spanish: caí sobre mi rostro
  alternatives_spanish:
  - me postré sobre mi rostro
  - caí rostro en tierra
  lexicon: HALOT
  rationale: Es una expresión idiomática de postración. «Sobre mi rostro» conserva la imagen literal del hebreo, y «caí» mantiene la concisión del original.
- source_word: וָאֶזְעַק
  english_pob_choice: cried out
  chosen_spanish: clamé
  alternatives_spanish:
  - grité
  - dije a voz en cuello
  lexicon: HALOT
  rationale: זעק es un clamor urgente, no una mera mención. «Clamé» conserva la intensidad lamentativa y de súplica del verbo.
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh!
  lexicon: HALOT
  rationale: Interjección de dolor o angustia. «¡Ah!» es breve y adecuada en español para este lamento.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yavé
  lexicon: HALOT
  rationale: Se mantiene el patrón POB de renderizar el Nombre divino como «Yahvé» en español, en lugar de ocultarlo con «SEÑOR». La forma vocativa «Señor Yahvé» conserva la doble referencia del hebreo אֲדֹנָי יְהוִה y evita la redundancia «Señor Señor».
- source_word: הֲמַשְׁחִית אַתָּה
  english_pob_choice: will you destroy
  chosen_spanish: vas a destruir
  alternatives_spanish:
  - destruirás
  - estás por destruir
  lexicon: HALOT
  rationale: La pregunta retórica expresa acción contemplada/inminente. «Vas a destruir» reproduce bien esa fuerza en español sin volverla demasiado distante ni excesivamente formal.
- source_word: כָּל שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: all the remnant of Israel
  chosen_spanish: todo el remanente de Israel
  alternatives_spanish:
  - toda la restante de Israel
  - toda la supervivencia de Israel
  lexicon: HALOT
  rationale: «Remanente» preserva el término teológico שְׁאֵרִית y su resonancia de juicio y preservación. «Todo» conserva כָּל sin diluir la totalidad retórica.
- source_word: בְּשָׁפְכְּךָ אֶת חֲמָתְךָ
  english_pob_choice: when you pour out your wrath
  chosen_spanish: cuando derrames tu ira
  alternatives_spanish:
  - al derramar tu ira
  - mientras derramas tu ira
  lexicon: HALOT
  rationale: El בְּ temporal aquí se entiende naturalmente como «cuando». «Derrames» conserva la metáfora de שׁפך, y «ira» es un equivalente válido y más idiomático en español para חֲמָה en este contexto de juicio.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: on Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: «Sobre» expresa mejor la imagen de la ira derramada que un simple «en». Mantiene el valor direccional y judicial del hebreo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה en la invocación אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yavé
  rationale: La política del proyecto pide traducir יהוה como «Yahvé» en el texto principal. En este caso el hebreo combina el título אֲדֹנָי con el Nombre divino, por lo que «Señor Yahvé» conserva ambos elementos y evita esconder el Nombre bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Matiz de חֲמָה en un contexto de juicio divino
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - furia
  - cólera
  rationale: Aunque «ira» puede ser más general que «furia», aquí funciona bien en español bíblico y mantiene el registro solemne. En combinación con «derramar» preserva el forcejeo metafórico del hebreo sin sobrecargar el verso.
  doctrine_reference: 'DOCTRINE.md: Context-sensitive terms — חֵמָה / ὀργή'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más reciente del inglés POB: mantiene la simultaneidad de la acción, el valor de la pregunta retórica y la temporalidad de בְּ como «when». Se adoptó «quedaba solo» para reflejar el estado resultante, y se preservó la fórmula de invocación con el Nombre divino explícito, según la doctrina del proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en vez de una máscara reverencial para יהוה, conforme a la terminología del proyecto.
  - «Remanente» se conservó por su carga teológica en שְׁאֵרִית.
  - La imagen corporal «caí sobre mi rostro» se mantuvo literal para no perder la postura de postración.
  - «Clamé» comunica mejor la intensidad de זעק que un simple «llamé» o «grité».
  - La puntuación interrogativa final se ajusta al español, manteniendo la pregunta retórica abierta del hebreo.
