    issue: La nota [a] está anclada a «carta», pero su contenido explica «partida/regreso» (ἄφοδος).
    rationale: Esto desinforma al lector y rompe la correspondencia obligatoria entre nota y término relevante en el texto.
  - severity: medium
    issue: «Pidieron» atenúa la fuerza de προσηξίωσαν.
    rationale: El griego y la auditoría inglesa apuntan a una solicitud insistente; «instaron» preserva mejor el matiz sin sonar forzado.
  - severity: medium
    issue: «Los que eran del linaje de los judíos, los que habían...» es torpe y redundante.
    rationale: La repetición de «los que» no refleja ninguna necesidad del griego y entorpece la lectura en español.
  - severity: low
