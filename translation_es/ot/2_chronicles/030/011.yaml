lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: Marca contraste concesivo con la respuesta negativa del versículo anterior. «Sin embargo» conserva bien la transición adversativa sin volverla excesivamente coloquial.
- source_word: אֲנָשִׁים
  english_pob_choice: some men
  chosen_spanish: algunos hombres
  alternatives_spanish:
  - unos hombres
  - ciertos hombres
  - algunas personas
  lexicon: HALOT
  rationale: El hebreo plural masculino designa aquí a un subconjunto indefinido de los habitantes de esas tribus. «Algunos hombres» preserva el matiz de subset y la forma masculina del original.
- source_word: מֵאָשֵׁר וּמְנַשֶּׁה וּמִזְּבֻלוּן
  english_pob_choice: from Asher, Manasseh, and Zebulun
  chosen_spanish: de Aser, de Manasés y de Zabulón
  alternatives_spanish:
  - desde Aser, Manasés y Zabulón
  - procedentes de Aser, de Manasés y de Zabulón
  lexicon: HALOT
  rationale: Las preposiciones de origen se expresan naturalmente con «de». Se mantienen los nombres tribales en forma reconocible para el lector bíblico en español.
- source_word: נִכְנְעוּ
  english_pob_choice: humbled themselves
  chosen_spanish: se humillaron
  alternatives_spanish:
  - se sometieron
  - se abatieron
  - se rindieron
  lexicon: HALOT
  rationale: El niphal de כנע en este contexto expresa una respuesta voluntaria de humillación ante Dios; «se humillaron» conserva el sentido reflexivo y evita una lectura pasiva.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y fueron
  - y acudieron
  lexicon: HALOT
  rationale: «Llegaron» transmite bien el movimiento narrativo hacia Jerusalén y mantiene una equivalencia natural en español sin perder el valor direccional del verbo.
- source_word: לִירוּשָׁלִָם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - para Jerusalén
  lexicon: HALOT
  rationale: La preposición direccional se rinde con «a» en español estándar; el topónimo se adapta a la forma usual castellana de Jerusalén.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la decisión inglesa auditada de leer אַךְ como contraste concesivo, נִכְנְעוּ como humillación voluntaria y וַיָּבֹאוּ como movimiento narrativo simple hacia Jerusalén. No se registran revisiones textuales ni variantes en el expediente inglés, y el chequeo cruzado indica alta concordancia.
  spanish_consistency_notes:
  - Se usa «Jerusalén» con la ortografía española estándar.
  - Se mantiene «Manasés» como forma bíblica habitual en español.
  - La sintaxis conserva el paralelismo simple del hebreo sin añadir inferencias sobre la motivación de los hombres más allá de la humillación explícita.
