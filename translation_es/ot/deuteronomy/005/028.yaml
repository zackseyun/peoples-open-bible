translation:
  language: es
  text: 'Yahvé oyó el sonido de sus palabras cuando ustedes me hablaron[a], y Yahvé me dijo: «He oído el sonido de las palabras de este pueblo, que te dijeron; han hablado bien en todo lo que han dicho[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la voz de sus palabras»; קול דבריכם es un giro auditivo hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han hecho bien en todo lo que han dicho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del pacto según el criterio del proyecto en español. «Yahvé» preserva el valor auditivo y teológico del Tetragrámaton sin ocultarlo detrás de una sustitución litúrgica.
- source_word: וַיִּשְׁמַע / שָׁמַעְתִּי
  english_pob_choice: heard / I have heard
  chosen_spanish: oyó / he oído
  alternatives_spanish:
  - escuchó / he escuchado
  - oyó / he escuchado
  lexicon: HALOT
  rationale: שׁמע aquí es oír lo que fue dicho, no solo prestar atención. «Oyó» y «he oído» reproducen el hecho de percibir el الكلام hablado y conservan el valor completivo del discurso directo.
- source_word: ק֣וֹל
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el eco
  lexicon: HALOT
  rationale: Como en el inglés POB, קול se rinde mejor aquí como «sonido» para evitar forzar «voz de sus palabras» en español, aunque se conserva la posible tensión idiomática con el sentido de «voz».
- source_word: דִּבְרֵי/כֶם / דִּבְרֵי
  english_pob_choice: your words / the words
  chosen_spanish: sus palabras / las palabras
  alternatives_spanish:
  - vuestras palabras
  - lo que dijeron
  lexicon: HALOT
  rationale: דבר en plural se entiende naturalmente como «palabras» en este contexto. En español, «sus palabras» permite una referencia clara al pueblo sin perder el paralelismo con la repetición interna del texto.
- source_word: בְּדַבֶּרְכֶם אֵלַי
  english_pob_choice: when you spoke to me
  chosen_spanish: cuando me hablaron
  alternatives_spanish:
  - cuando me hablaron a mí
  - al hablarme
  lexicon: HALOT
  rationale: La forma temporal/contigua del hebreo se expresa con naturalidad en español con «cuando». Se usa «me hablaron» para un registro claro y directo, sin añadir una paráfrasis interpretativa.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» conserva el sustantivo colectivo singular del hebreo y es más formal y exacto que «gente»; «nación» sería posible pero más interpretativo en este intercambio oral.
- source_word: אֲשֶׁר דִּבְּרוּ אֵלֶיךָ
  english_pob_choice: which they have spoken to you
  chosen_spanish: que te han hablado
  alternatives_spanish:
  - que te dijeron
  - lo que te hablaron
  lexicon: HALOT
  rationale: Se mantiene la conexión verbal con דבר y el marco de discurso directo. «Te han hablado» suena natural en español y conserva la idea de lo dicho por ellos al interlocutor.
- source_word: הֵיטִיבוּ
  english_pob_choice: they have spoken well
  chosen_spanish: han hablado bien
  alternatives_spanish:
  - han hecho bien
  - han dicho bien
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «hacer bien», el contexto inmediato evalúa palabras dichas. «Han hablado bien» conserva la valoración positiva ligada a la conversación sin disolverla en una formulación más general.
- source_word: כָּל אֲשֶׁר דִּבֵּרוּ
  english_pob_choice: in all that they have said
  chosen_spanish: en todo lo que han dicho
  alternatives_spanish:
  - todo lo que han hablado
  - en cuanto han dicho
  lexicon: HALOT
  rationale: «En todo lo que han dicho» transmite el alcance totalizador de כָּל אֲשֶׁר y suena idiomático en español. Se evita ampliar el sentido más allá del contenido explícito del dicho.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. En español, la política del proyecto pide transliterarlo como «Yahvé», no enmascararlo con una sustitución tradicional, para mantener transparencia textual y coherencia con el audit trail.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הֵיטִיבוּ en un contexto de discurso
  english_pob_reading: they have spoken well
  chosen_spanish_reading: han hablado bien
  alternative_spanish_readings:
  - han hecho bien
  - han dicho bien
  rationale: La alabanza divina se dirige al contenido de lo dicho. En esta cláusula, traducir con un verbo de hablar evita desanclar el juicio positivo del ámbito verbal, sin negar que el hebreo pueda tener un matiz más amplio de 'hacer bien'.
  doctrine_reference: HALOT יטב, contexto inmediato de discurso
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que no requirió cambios sustantivos. La versión española conserva el paralelismo del hebreo, el nombre divino explícito y la ambigüedad controlada de הֵיטִיבוּ en una forma inteligible para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» para no ocultar el Nombre propio.
  - «Pueblo» se usa como colectivo singular, coherente con el hebreo הָעָם.
  - Se conserva la repetición de «oído/han oído» y «palabras» para reflejar el paralelismo.
  - Las notas al pie señalan alternativas reales sin sobrecargar el verso principal.
