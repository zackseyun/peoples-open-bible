translation:
  language: es
  text: Y él hará firme un pacto con los muchos por una semana[a], y por la mitad de la semana hará cesar el sacrificio y la ofrenda[b]. Y sobre el ala de las abominaciones vendrá uno que causa desolación[c][d], hasta que el fin decretado sea derramado sobre el desolador[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirmará un pacto» o «fortalecerá un pacto». El verbo hebreo significa hacer fuerte o hacer prevalecer.
    reason: lexical_alternative
  - marker: b
    text: O «sacrificio y ofrenda de cereal». El segundo término puede referirse más específicamente a una ofrenda vegetal.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sobre el ala de las abominaciones». La expresión es difícil; entre las alternativas están «sobre la cumbre de las abominaciones» o «sobre un ala de las abominaciones».'
    reason: alternative_reading
  - marker: d
    text: O «un desolador» / «uno que causa desolación».
    reason: lexical_alternative
  - marker: e
    text: O «sea derramado sobre el que es desolado» o «sobre el lugar desolado». La cláusula final es textualmente estable, pero sintácticamente difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִגְבִּיר
  english_pob_choice: will make a firm
  chosen_spanish: hará firme
  alternatives_spanish:
  - confirmará
  - fortalecerá
  - hará prevalecer
  lexicon: HALOT
  rationale: El verbo en hifil comunica hacer fuerte o hacer prevalecer. «Harà firme» conserva esa fuerza causativa y suena natural en español sin reducir el pacto a una mera ratificación ceremonial.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - tratado
  - acuerdo
  lexicon: HALOT
  rationale: «Pacto» mantiene el peso bíblico del término y es comprensible en español. «Acuerdo» sería demasiado débil; «tratado» puede sonar demasiado político.
- source_word: לָרַבִּים
  english_pob_choice: with the many
  chosen_spanish: con los muchos
  alternatives_spanish:
  - para los muchos
  - entre los muchos
  lexicon: HALOT
  rationale: La preposición ל admite varias posibilidades. «Con los muchos» sigue la lectura relacional del contexto y conserva el colectivo definido sin convertirlo en un simple indefinido.
- source_word: שָׁבוּעַ אֶחָד
  english_pob_choice: for one week
  chosen_spanish: por una semana
  alternatives_spanish:
  - por un heptado
  - por un período de siete
  - por una semana de siete días
  lexicon: HALOT
  rationale: En Daniel, el término suele entenderse como una unidad de siete. «Una semana» es la forma más natural y ya deja abierta la discusión interpretativa sobre su valor simbólico.
- source_word: וַחֲצִי הַשָּׁבוּעַ
  english_pob_choice: and for half of the week
  chosen_spanish: a la mitad de la semana
  alternatives_spanish:
  - en medio de la semana
  - durante la mitad de la semana
  lexicon: HALOT
  rationale: La traducción sigue de cerca la expresión hebrea sin resolver si el énfasis es temporal exacto o si describe el punto medio.
- source_word: יַשְׁבִּית
  english_pob_choice: he will put a stop to
  chosen_spanish: hará cesar
  alternatives_spanish:
  - pondrá fin a
  - causará que cese
  - suspenderá
  lexicon: HALOT
  rationale: El hifil de שבת expresa causar cesación. «Hará cesar» es la forma española más fiel y directa.
- source_word: זֶבַח וּמִנְחָה
  english_pob_choice: sacrifice and offering
  chosen_spanish: el sacrificio y la ofrenda
  alternatives_spanish:
  - el sacrificio y la ofrenda vegetal
  - el sacrificio y la ofrenda de cereal
  lexicon: HALOT
  rationale: «Sacrificio y ofrenda» mantiene la pareja cultual con buena fluidez. La alternativa más específica se conserva como posibilidad léxica porque מִנְחָה puede referirse de modo más preciso a una ofrenda de cereal.
- source_word: וְעַל כְּנַף שִׁקּוּצִים
  english_pob_choice: And on the wing of abominations
  chosen_spanish: Y sobre el ala de las abominaciones
  alternatives_spanish:
  - Y sobre la ala de las abominaciones
  - Y en la cumbre de las abominaciones
  - Y sobre la extremidad de las abominaciones
  lexicon: HALOT
  rationale: כָּנָף significa literalmente «ala» o «wing». Se conserva la metáfora y la dificultad del hebreo en vez de resolverla con una imagen arquitectónica no segura.
- source_word: מְשֹׁמֵם
  english_pob_choice: will come one who makes desolate
  chosen_spanish: vendrá uno que hace desolación
  alternatives_spanish:
  - vendrá un desolador
  - vendrá uno que causa desolación
  lexicon: HALOT
  rationale: El participio denota al agente que desola. «Uno que hace desolación» conserva el valor verbal y evita imponer como única opción el sustantivo «desolador».
- source_word: וְעַד כָּלָה וְנֶחֱרָצָה
  english_pob_choice: until the decreed end
  chosen_spanish: hasta que el fin decretado
  alternatives_spanish:
  - hasta la destrucción decretada
  - hasta el final determinado
  - hasta la consumación decretada
  lexicon: HALOT
  rationale: La expresión combina fin/consumación con lo decretado. «Fin decretado» es breve y fiel, y mantiene la idea de un término ya fijado.
- source_word: תִּתַּךְ
  english_pob_choice: is poured out
  chosen_spanish: sea derramado
  alternatives_spanish:
  - sea derramado
  - sea vertido
  - caiga
  lexicon: HALOT
  rationale: El verbo puede expresarse con la imagen de derramamiento, especialmente en contextos de juicio. El subjuntivo español encaja con «hasta que».
- source_word: עַל שֹׁמֵם
  english_pob_choice: on the desolator
  chosen_spanish: sobre el desolador
  alternatives_spanish:
  - sobre el que desola
  - sobre el devastador
  - sobre el desolado
  lexicon: HALOT
  rationale: La forma masculina singular del participio favorece una referencia personal/agente. «Desolador» es la solución más directa, aunque se preserva la posibilidad de otras lecturas en notas.
theological_decisions:
- issue: Identidad del sujeto implícito «él»
  english_pob_reading: Retained as the ambiguous 'he' without identifying him as Messiah, Antiochus, Titus, or an end-time ruler.
  chosen_spanish_reading: Se mantiene el sujeto implícito ambiguo «él» sin identificarlo como Mesías, Antíoco, Tito ni un gobernante final.
  alternative_spanish_readings:
  - el Mesías
  - el príncipe que ha de venir
  - Antíoco IV
  - un anticristo escatológico
  rationale: El hebreo no identifica de manera explícita al antecedente en este versículo, y las tradiciones interpretativas difieren ampliamente. La traducción conserva esa tensión sin resolverla en el texto principal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de כְּנַף שִׁקּוּצִים
  english_pob_reading: Rendered literally as 'the wing of abominations' with alternatives footnoted.
  chosen_spanish_reading: Se traduce literalmente como «el ala de las abominaciones» para preservar la ambigüedad.
  alternative_spanish_readings:
  - la cumbre de las abominaciones
  - la extremidad de las abominaciones
  - sobre cosas abominables
  rationale: La frase es difícil desde el punto de vista léxico y sintáctico. Traducirla de forma literal mantiene la incertidumbre del original y deja abiertas las lecturas alternativas.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Referencia final de שֹׁמֵם
  english_pob_reading: Rendered 'the desolator.'
  chosen_spanish_reading: Se traduce «el desolador».
  alternative_spanish_readings:
  - el que es desolado
  - el lugar desolado
  rationale: El participio masculino singular favorece una lectura agentiva, pero la clausula final sigue siendo difícil. Se conserva la lectura más directa sin cerrar indebidamente la cuestión.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La versión inglesa revisada más reciente no introdujo cambios respecto al pasaje; se mantiene la misma solución auditada y la misma postura de preservar ambigüedades relevantes.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «pacto» para בְּרִית por su fuerza bíblica y para evitar diluir el término en «acuerdo».
  - Se mantiene la imagen difícil «ala de las abominaciones» en lugar de resolverla con una interpretación arquitectónica.
  - Se conserva la ambigüedad sobre el sujeto implícito del verbo principal y sobre el referente final del participio שֹׁמֵם.
  - «Ofrenda» se usa como equivalente general de מִנְחָה, con la alternativa más específica preservada en nota.
