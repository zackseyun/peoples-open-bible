lexical_decisions:
- source_word: יְבָרֶכְךָ
  english_pob_choice: May ... bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendecirá
  - bendícete
  - que te bendiga
  lexicon: HALOT
  rationale: El hebreo es un yusivo/petición benedictoria; en español, el subjuntivo 'te bendiga' comunica bien el valor volitivo sin convertirlo en simple futuro. Se evita el imperativo y también una paráfrasis más explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino YHWH; en español se mantiene la transliteración 'Yahvé' conforme al estándar POB, en vez de sustituirlo por un título.
- source_word: וְיִשְׁמְרֶךָ
  english_pob_choice: and keep you
  chosen_spanish: y te guarde
  alternatives_spanish:
  - y te conserve
  - y te proteja
  - y te cuide
  lexicon: HALOT
  rationale: שמר expresa guardar, preservar y proteger. 'Te guarde' conserva la concisión poética del paralelismo y el sentido de protección/preservación que encaja con la bendición sacerdotal.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del inglés POB preserva el nombre personal del pacto en lugar de una sustitución titular. En español, 'Yahvé' mantiene esa decisión sin ocultar el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada de revisión: sin cambios necesarios y con acuerdo alto entre auditoría y revisión. Se conservó la brevedad y la cadencia benedictoria del hebreo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con el estándar POB para יְהוָה.
  - Se prefirió el subjuntivo benedictorio 'te bendiga'/'te guarde' para reproducir el valor jussivo del hebreo.
  - No se introdujeron elementos no presentes en el versículo ni se suavizó el paralelismo semántico.
