translation:
  language: es
  text: Así, todos los funcionarios y todo el pueblo que habían entrado en el pacto para dejar ir[a], cada hombre a su esclavo y cada hombre a su esclava, libres, para no hacerlos servir más tiempo, obedecieron y los dejaron ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘escucharon’. El verbo hebreo suele significar ‘oír/escuchar’, pero aquí tiene el sentido de obedecer, como lo muestra la acción que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: obeyed
  chosen_spanish: obedecieron
  alternatives_spanish:
  - oyeron
  - escucharon
  lexicon: HALOT
  rationale: En este contexto de pacto, שׁמע no indica solo percepción auditiva, sino respuesta obediente a la obligación asumida. ‘Obedecieron’ conserva el valor idiomático que el audit trail inglés también identifica.
- source_word: הַשָּׂרִים
  english_pob_choice: officials
  chosen_spanish: funcionarios
  alternatives_spanish:
  - príncipes
  - jefes
  - autoridades
  lexicon: HALOT
  rationale: שׂרים designa autoridades o dirigentes del ámbito público. ‘Funcionarios’ comunica bien el sentido político-administrativo en español actual sin recurrir a un término demasiado monárquico como ‘príncipes’.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: ‘Pueblo’ mantiene el sentido colectivo del hebreo עָם y encaja con el registro bíblico sin volverlo técnico en exceso.
- source_word: בָּאוּ בַבְּרִית
  english_pob_choice: had entered into the covenant
  chosen_spanish: habían entrado en el pacto
  alternatives_spanish:
  - habían entrado en el convenio
  - se habían unido al pacto
  lexicon: HALOT
  rationale: La expresión idiomática de entrar en pacto se rinde de manera directa. ‘Pacto’ es la opción más natural y fiel en español para ברית en este contexto.
- source_word: לְשַׁלַּח
  english_pob_choice: to send away
  chosen_spanish: para dejar ir
  alternatives_spanish:
  - para enviar lejos
  - para soltar
  lexicon: HALOT
  rationale: Aquí שׁלח describe la liberación/manumisión de esclavos. ‘Dejar ir’ expresa la acción de liberar con naturalidad en español y evita una traducción demasiado mecánica.
- source_word: אִישׁ ... וְאִישׁ
  english_pob_choice: each man ... and each man
  chosen_spanish: cada uno ... y cada uno
  alternatives_spanish:
  - cada hombre ... y cada hombre
  - uno ... y uno
  lexicon: HALOT
  rationale: La repetición distributiva del hebreo se conserva con ‘cada uno’, que en español evita una lectura demasiado masculina genérica sin borrar la distribución original.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo varón
  alternatives_spanish:
  - su esclavo
  - su siervo varón
  lexicon: HALOT
  rationale: Se mantiene la fuerza de ‘esclavo’ por la condición de servidumbre/bondaje. ‘Varón’ explicita el contraste con la esclava femenina que sigue, como en el hebreo y en la nota inglesa.
- source_word: שִׁפְחָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su esclava mujer
  - su sierva
  lexicon: HALOT
  rationale: La forma femenina del término se expresa con ‘esclava’, preservando el estatus social del texto. En español no hace falta añadir ‘mujer’ porque el contraste de género ya está claro en la pareja con ‘varón’.
- source_word: חָפְשִׁים
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - en libertad
  - liberados
  lexicon: HALOT
  rationale: Como predicativo, חָפְשִׁים describe el estado resultante. ‘Libres’ es breve, natural y mantiene la idea de emancipación.
- source_word: לְבִלְתִּי עֲבָד בָּם עוֹד
  english_pob_choice: so as not to make them serve any longer
  chosen_spanish: para no esclavizarlos más
  alternatives_spanish:
  - para no hacerlos servir más
  - para no tenerlos sometidos a servidumbre nunca más
  lexicon: HALOT
  rationale: 'El infinitivo final expresa propósito: que no sean sujetos a servidumbre de nuevo. ‘Esclavizarlos’ comunica de forma compacta el causativo de עבד en este contexto legal, sin perder la relación con el motivo de liberación.'
- source_word: וַיְשַׁלֵּחוּ
  english_pob_choice: sent them away
  chosen_spanish: los dejaron ir
  alternatives_spanish:
  - los enviaron lejos
  - los liberaron
  lexicon: HALOT
  rationale: Se repite שׁלח al final. ‘Los dejaron ir’ suena natural en español y conserva la idea de despedida/liberación implícita en el verbo.
theological_decisions:
- issue: Terminología de esclavitud en un contexto de emancipación legal
  english_pob_reading: Use 'male slave' and 'female slave' rather than 'servant' terminology
  chosen_spanish_reading: Usar ‘esclavo’ y ‘esclava’ en lugar de ‘siervo’
  alternative_spanish_readings:
  - siervo / sierva
  - criado / criada
  rationale: La situación descrita es la liberación de personas en condición de servidumbre vinculante. ‘Esclavo’ preserva mejor la fuerza social y legal del hebreo, coherente con la filosofía de la POB en pasajes donde el vínculo de dependencia es central.
  doctrine_reference: Translation philosophy §1; treatment of bonded labor terminology
- issue: Mantener la distribución masculina/femenina del hebreo
  english_pob_reading: Retain 'each man'
  chosen_spanish_reading: Conservar ‘cada uno’ y explicitar ‘varón’ en el paralelo
  alternative_spanish_readings:
  - cada persona
  - todos
  rationale: El hebreo usa אִישׁ distributivamente y diferencia expresamente entre esclavo y esclava. ‘Cada uno’ respeta la distribución sin borrar la estructura del original, y ‘varón’ ayuda a no perder el contraste de género.
  doctrine_reference: Translation philosophy §4; gender-accurate rendering
- issue: Sentido de שׁמע en contexto de pacto
  english_pob_reading: '''obeyed'' rather than ''heard/listened'''
  chosen_spanish_reading: ‘obedecieron’
  alternative_spanish_readings:
  - oyeron
  - escucharon
  - prestaron atención
  rationale: La secuencia narrativaclaramente muestra cumplimiento de la cláusula pactal, no mera percepción auditiva. Traducirlo como obediencia evita diluir el valor del verbo hebreo en este contexto.
  doctrine_reference: Lexical context of שׁמע in covenantal narratives
translation_notes:
  revision_awareness: Se tomó en cuenta el pase más reciente del texto fuente inglés, que quedó sin cambios tras revisión. El control cruzado mostró acuerdo moderado con objeciones menores; por eso se conservan la lectura de obediencia de שׁמע y la terminología de esclavitud, pero se ajustó el español para sonar natural y transparente sin perder la fuerza legal del pasaje.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - ‘Pacto’ se usa consistentemente para ברית.
  - ‘Esclavo/esclava’ se conserva por la naturaleza jurídica del texto; no se suaviza a ‘siervo’.
  - ‘Obedecieron’ recoge el valor de שׁמע en este contexto y se repite en la clausura narrativa.
  - La repetición distributiva se conserva con ‘cada uno’ para reflejar אִישׁ ... וְאִישׁ.
