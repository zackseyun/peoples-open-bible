translation:
  language: es
  text: Pero todo esclavo[a] de un hombre, comprado con dinero, cuando lo hayas circuncidado, podrá comer de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo esclavo de un hombre, comprado con dinero».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, podrá participar de la comida pascual solo después de la circuncisión.
    reason: cultural_note
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: But every
  chosen_spanish: Pero todo
  alternatives_spanish:
  - Y todo
  - Ahora bien, todo
  lexicon: HALOT
  rationale: וְ conecta esta norma con la restricción anterior; en español, «Pero» conserva el contraste legal, y «todo» mantiene el valor distributivo de כָּל sin volver la frase pesada.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: El contexto legal y la mención de compra con dinero apuntan a una persona en condición de propiedad/servidumbre forzada; «esclavo» refleja mejor esa fuerza que «siervo».
- source_word: אִישׁ
  english_pob_choice: man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un jefe de casa
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y funciona como sujeto poseedor en la formulación legal. «De un hombre» conserva esa forma sin introducir una paráfrasis interpretativa.
- source_word: מִקְנַת כָּסֶף
  english_pob_choice: bought with silver
  chosen_spanish: comprado con dinero
  alternatives_spanish:
  - adquirido con plata
  - comprado con plata
  lexicon: HALOT
  rationale: La construcción remite a una persona adquirida por compra; en español, «dinero» expresa con naturalidad el valor de כֶּסֶף, mientras que «plata» podría sonar arcaizante o demasiado literal.
- source_word: וּמַלְתָּה אֹתוֹ
  english_pob_choice: when you have circumcised him
  chosen_spanish: después de que lo hayas circuncidado
  alternatives_spanish:
  - cuando lo hayas circuncidado
  - y lo circuncides
  lexicon: HALOT
  rationale: La forma verbal presenta la circuncisión como requisito previo a la participación. «Después de que lo hayas circuncidado» expresa con claridad esa condición temporal sin perder el matiz de anterioridad.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - así
  lexicon: HALOT
  rationale: אָז introduce la consecuencia inmediata; «entonces» es la correspondencia más directa y natural en español.
- source_word: יֹאכַל בּוֹ
  english_pob_choice: he may eat of it
  chosen_spanish: podrá comer de ello
  alternatives_spanish:
  - podrá comer de él
  - podrá participar de ello
  lexicon: HALOT
  rationale: El verbo expresa permiso para participar del alimento pascual. «Comer de ello» conserva la referencia al sustento/banquete sin imponer un objeto masculino en español que no está explícito en el hebreo.
theological_decisions:
- issue: Terminología de estatus dependiente/patrimonial
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: El versículo habla de una persona comprada con dinero; suavizar a «siervo» diluiría la realidad social y jurídica del texto. «Esclavo» mantiene la tensión documental del hebreo y del audit trail inglés.
  doctrine_reference: Translation philosophy §1; principio de fidelidad lexical en términos socialmente marcados
- issue: Circuncisión como requisito para la comida pascual
  english_pob_reading: That is, he may participate in the Passover meal only after circumcision.
  chosen_spanish_reading: podrá comer de ello después de la circuncisión
  alternative_spanish_readings:
  - podrá comerlo
  - podrá participar de la Pascua
  rationale: La oración española conserva la condición previa implícita en el inglés auditado sin añadir explicación extra en el texto principal. La referencia sacrificial/pascual queda suficientemente marcada por el contexto inmediato del pasaje.
  doctrine_reference: Éxodo 12:43–49; nota cultural del audit trail
- issue: Referencia del pronombre objeto
  english_pob_reading: of it
  chosen_spanish_reading: de ello
  alternative_spanish_readings:
  - de él
  - de eso
  rationale: El hebreo usa בּוֹ, literalmente «en ello/por medio de ello». En español, «de ello» evita forzar un antecedente masculino o feminizante y mantiene la ambigüedad referencial del texto.
  doctrine_reference: Observación sintáctica del hebreo preposicional
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con acuerdo alto: se preservó la contraposición inicial, la fuerza legal de «esclavo», la referencia a compra con dinero/plata y la condición previa de la circuncisión. La decisión española principal se alineó con el inglés revisado, evitando añadidos interpretativos innecesarios.'
  spanish_consistency_notes:
  - Se usa «esclavo» de forma consistente para עֶבֶד en contextos de compra/propiedad.
  - «Circuncidado» y «circuncisión» mantienen la misma familia léxica para conservar la relación condicional.
  - «De ello» se usa para evitar introducir un antecedente no explicitado por el hebreo.
