translation:
  language: es
  text: Pero cuando recibieron esta carta, no se apresuraron inmediatamente para la partida[a], sino que instaron al rey a que los del linaje de los judíos[b] que habían transgredido voluntariamente la ley del Dios santo recibieran por medio de ellos[c] el castigo debido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «la vuelta» o «el regreso»; el término griego admite la perspectiva de salir de un lugar o de volver a uno anterior.
    reason: lexical_alternative
  - marker: b
    text: Lit. «los del linaje de los judíos».
    reason: lexical_alternative
  - marker: c
    text: 'O: «recibieran de manos de ellos el castigo debido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λαβόντες
  english_pob_choice: when they received
  chosen_spanish: cuando recibieron
  alternatives_spanish:
  - habiendo recibido
  - después de recibir
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia temporal previa a la acción principal. «Cuando recibieron» expresa esa relación de manera natural en español sin perder la secuencia narrativa.
- source_word: ἐπιστολήν
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - escrito
  - misiva
  lexicon: LSJ
  rationale: En este contexto narrativo, «carta» es el equivalente claro y más natural en español.
- source_word: οὐκ ἐσπούδασαν εὐθέως περὶ τὴν ἄφοδον
  english_pob_choice: they did not immediately hasten for the departure
  chosen_spanish: no se apresuraron inmediatamente para la partida
  alternatives_spanish:
  - no se apresuraron de inmediato para el regreso
  - no se dieron prisa enseguida por la partida
  lexicon: LSJ
  rationale: El griego expresa falta de prisa inmediata respecto de ἄφοδος. «Partida» mantiene la idea de salir, mientras que «regreso» sería una alternativa posible según el ángulo de perspectiva; se conserva esa tensión sin resolverla artificialmente.
- source_word: προσηξίωσαν
  english_pob_choice: urged
  chosen_spanish: pidieron
  alternatives_spanish:
  - instaron
  - suplicaron
  - apremiaron
  lexicon: LSJ
  rationale: El verbo comunica una solicitud insistente dirigida al rey. «Pidieron» es menos enfático que «instaron», pero resulta fiel y fluido en español; el contexto mantiene la presión de la petición.
- source_word: τοὺς ἐκ τοῦ γένους τῶν Ἰουδαίων
  english_pob_choice: those of the Jewish race
  chosen_spanish: los que eran del linaje de los judíos
  alternatives_spanish:
  - los de la raza judía
  - los del pueblo judío
  - los procedentes del linaje de los judíos
  lexicon: LSJ
  rationale: γένος denota linaje, raza o grupo de origen. «Linaje» conserva el matiz genealógico/étnico del griego y evita suavizarlo demasiado; se mantiene la dureza del término histórico.
- source_word: τὸν ἅγιον θεὸν
  english_pob_choice: the holy God
  chosen_spanish: el Dios santo
  alternatives_spanish:
  - el Dios Sagrado
  - el Dios santo
  lexicon: LSJ
  rationale: Se invierte el orden por naturalidad del español, sin perder la cualidad descriptiva. «Dios santo» conserva la referencia a Dios de Israel y el calificativo moral-religioso del texto.
- source_word: αὐθαιρέτως
  english_pob_choice: willfully
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - a sabiendas
  - deliberadamente
  - por propia voluntad
  lexicon: LSJ
  rationale: El adverbio subraya acción autoelegida y culpable. «Voluntariamente» recoge bien esa voluntad propia sin exceder el alcance del término.
- source_word: παραβεβηκότας
  english_pob_choice: had transgressed
  chosen_spanish: habían transgredido
  alternatives_spanish:
  - habían violado
  - habían quebrantado
  - habían sobrepasado
  lexicon: LSJ
  rationale: El participio perfecto implica una transgresión consumada con efecto vigente. «Transgredido» funciona bien en registro jurídico-religioso y conserva la fuerza del verbo.
- source_word: τοῦ θεοῦ τὸν νόμον
  english_pob_choice: the law of the holy God
  chosen_spanish: la ley del Dios santo
  alternatives_spanish:
  - la ley de Dios
  - la ley del Dios santo
  lexicon: LSJ
  rationale: La construcción posesiva se expresa de modo idiomático en español como «la ley del Dios santo». Se mantiene la relación entre Dios y su ley sin atenuar la carga religiosa del texto.
- source_word: τυχεῖν διʼ αὐτῶν τῆς ὀφειλομένης κολάσεως
  english_pob_choice: might, through them, receive the punishment that was due
  chosen_spanish: recibieran por medio de ellos el castigo que se debía
  alternatives_spanish:
  - recibieran de manos de ellos el castigo debido
  - sufrieran por su medio la pena debida
  - obtuvieran por medio de ellos el castigo debido
  lexicon: LSJ
  rationale: τυχεῖν con genitivo puede significar «recibir/obtener». «Recibieran» conserva la idea de experiencia judicial; «por medio de ellos» refleja la mediación instrumental de διʼ αὐτῶν. «Castigo que se debía» mantiene la noción de obligación/adeudamiento de ὀφειλομένης.
theological_decisions:
- issue: Referencia de «el Dios santo» y de «la ley de Dios»
  english_pob_reading: The phrase refers straightforwardly to Israel's God, whose law certain Jews had willfully transgressed.
  chosen_spanish_reading: La frase remite directamente al Dios de Israel, cuya ley algunos judíos habían transgredido voluntariamente.
  alternative_spanish_readings:
  - La frase podría leerse como un título más solemne, «el Dios Santo».
  - Podría suavizarse a «la ley divina», pero eso diluiría la referencia concreta.
  rationale: Se conserva la acusación histórica y religiosa sin ampliarla ni suavizarla. El texto distingue entre Dios y su ley, y la traducción mantiene esa relación directa.
  doctrine_reference: 'DOCTRINE.md: Primacía de la fuente; conservar la tensión teológica sin resolverla artificialmente'
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor que ajustó «about the departure» a «for the departure» y «from the Jewish race» a «of the Jewish race» por fluidez. La versión española refleja esa misma dirección interpretativa: mantiene la ambigüedad de ἄφοδος con «partida» y conserva la referencia étnica de γένος con «linaje».'
  spanish_consistency_notes:
  - Se usó «Dios» en lugar de una traducción velada como «SEÑOR», conforme al nombre divino implícito en el texto fuente.
  - Se conservó «transgredido» para el registro jurídico-religioso del pasaje.
  - Se evitó reemplazar la referencia étnica de γένος por un término más general como «pueblo» para no borrar la dureza del original.
  - La puntuación refleja una sola oración larga, acorde con la sintaxis griega y el estilo narrativo del pasaje.
