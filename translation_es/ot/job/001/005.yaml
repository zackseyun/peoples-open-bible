  yaml_path: translation/ot/job/001/005.yaml
  text: And when the days of feasting had run their course[a], Job would send and consecrate them, and he would rise early in the morning and offer burnt offerings according to the number of them all. For Job said, “Perhaps my sons have sinned and cursed God in their hearts.” Thus Job would do continually.
