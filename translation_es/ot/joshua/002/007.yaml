translation:
  language: es
  text: Y los hombres los persiguieron por el camino hacia el Jordán, hasta los vados[a]; y cerraron la puerta tras ellos, apenas salieron los perseguidores tras ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta los lugares de cruce», es decir, los vados del Jordán donde se podía pasar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: And the men
  chosen_spanish: Y los hombres
  alternatives_spanish:
  - Y los hombres de Jericó
  - Y ahora los hombres
  lexicon: HALOT
  rationale: Se conserva el referente definido del hebreo con el conector narrativo inicial. No se explicita "de Jericó" porque el contexto inmediato ya identifica a los agentes del rey; añadirlo sería inferencial, no textual.
- source_word: רָדְפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - perseguieron
  - salieron en persecución de
  lexicon: HALOT
  rationale: '"Perseguir"/"persiguieron" reproduce bien el movimiento de búsqueda militar y mantiene la repetición verbal del verso. "Persiguieron" suena natural en español narrativo y evita una calca excesiva.'
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - después de ellos
  - en persecución de ellos
  lexicon: HALOT
  rationale: En español, con un verbo de persecución, "tras ellos" comunica mejor la dirección y evita la redundancia de "persiguieron después de ellos". Se conserva la relación espacial/direccional del hebreo.
- source_word: דֶּרֶךְ הַיַּרְדֵּן
  english_pob_choice: on the way to the Jordan
  chosen_spanish: por el camino del Jordán
  alternatives_spanish:
  - por el camino hacia el Jordán
  - por la ruta del Jordán
  lexicon: HALOT
  rationale: '"Camino" corresponde a דֶּרֶךְ. Se prefirió "del Jordán" porque el hebreo indica el camino asociado al Jordán en contexto de ruta, sin forzar una preposición de dirección que no aparece de forma explícita en el sustantivo.'
- source_word: עַל הַמַּעְבְּרוֹת
  english_pob_choice: as far as the fords
  chosen_spanish: hasta los vados
  alternatives_spanish:
  - hasta los lugares de cruce
  - a los vados
  lexicon: HALOT
  rationale: La opción "vados" conserva el valor léxico de lugares poco profundos para cruzar un río. "Hasta" refleja con naturalidad el alcance del recorrido en esta escena de persecución. Se evita "lugares de cruce" por ser más explicativo que textual.
- source_word: וְהַשַּׁעַר
  english_pob_choice: and the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - el portón
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "la puerta", en español "puerta" es la forma más clara y fiel para el acceso de la ciudad. Se evita añadir "de la ciudad" en el texto principal porque el contexto ya lo sugiere.
- source_word: סָגָרוּ
  english_pob_choice: they shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - la cerraron
  - la atrancaron
  lexicon: HALOT
  rationale: '"Cerrar" es el equivalente directo y sobrio para una puerta. "Cerraron" preserva la narración simple del hebreo sin introducir una acción más específica de la que el texto no da evidencia.'
- source_word: אַחֲרֵי
  english_pob_choice: behind them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - después de ellos
  lexicon: HALOT
  rationale: Con la puerta como sujeto implícito, "tras ellos" reproduce la imagen espacial del cierre detrás de los perseguidores. Es más idiomático que "detrás de ellos" en este contexto narrativo.
- source_word: כַּאֲשֶׁר יָצְאוּ
  english_pob_choice: as soon as ... had gone out
  chosen_spanish: apenas salieron
  alternatives_spanish:
  - cuando salieron
  - en cuanto salieron
  lexicon: HALOT
  rationale: '"Apenas" expresa bien la secuencia inmediata que el inglés POB entendió en el hebreo. Mantiene el sentido temporal de inmediatez sin sobrecargar la frase con una construcción más larga.'
- source_word: הָרֹדְפִים
  english_pob_choice: the pursuers
  chosen_spanish: los perseguidores
  alternatives_spanish:
  - los que perseguían
  - los hombres que perseguían
  lexicon: HALOT
  rationale: El participio funciona sustantivamente; "los perseguidores" preserva esa fuerza nominal y la repetición temática del verso. Es la forma más concisa y natural en español.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - en persecución de ellos
  lexicon: HALOT
  rationale: Se mantiene la misma relación direccional que al inicio del verso, con una variación estilística leve para que el español fluya. No se borra la repetición hebrea, solo se adapta a la sintaxis española.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y el rastro auditado del POB en inglés. No se detectaron revisiones aplicadas en la fuente inglesa; se mantuvo la lectura de persecución y cierre inmediato de la puerta, con ajuste natural al español para evitar calco mecánico.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - Se tradujo דֶּרֶךְ como "camino" y מַעְבְּרוֹת como "vados" para conservar la distinción léxica.
  - Se evitó la fórmula eclesiástica "la puerta de la ciudad" en el texto principal porque el hebreo solo dice "la puerta"; la clarificación queda implícita por el contexto.
  - La nota al pie conserva la alternativa lexical del POB inglés, adaptada a la terminología española de geografía fluvial.
