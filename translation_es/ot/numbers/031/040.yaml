translation:
  language: es
  text: Y hubo dieciséis mil personas[a], y su tributo[b] para Yahvé fue de treinta y dos personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «almas de hombre», es decir, personas humanas. «Almas» sería una alternativa más literal, pero aquí funciona como término de conteo para personas.'
    reason: lexical_alternative
  - marker: b
    text: O «su cuota» o «su gravamen». El hebreo se refiere a la porción tasada del botín apartada para Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ אָדָם
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - seres humanos
  lexicon: HALOT
  rationale: En este listado numérico, נֶפֶשׁ funciona como término de conteo para individuos humanos. «Personas» comunica naturalmente ese valor referencial en español sin cargarlo de un sentido metafísico de «alma».
- source_word: אָדָם
  english_pob_choice: of mankind
  chosen_spanish: humanas
  alternatives_spanish:
  - del hombre
  - de la humanidad
  lexicon: HALOT
  rationale: El hebreo marca que se trata de seres humanos y no de animales. En español, ese matiz queda integrado en «personas»; no hace falta sobretraducirlo en el cuerpo principal.
- source_word: שִׁשָּׁה עָשָׂר אָלֶף
  english_pob_choice: sixteen thousand
  chosen_spanish: dieciséis mil
  alternatives_spanish:
