lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  - el que
  lexicon: HALOT
  rationale: La partícula relativa enlaza con el antecedente inmediato; «el cual» mantiene una relación formal clara en español y funciona bien en una cláusula explicativa sin sonar demasiado coloquial.
- source_word: כָּרַת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - concertó
  - estableció
  lexicon: HALOT
  rationale: En contexto de pacto, כרת expresa la acción de pactar. Siguiendo la decisión inglesa de evitar un calco duro en la forma final, «hizo» comunica la acción de establecer/concertar el pacto con naturalidad, dejando que el contexto de 105:8 suministre el objeto implícito.
- source_word: אֶת
  english_pob_choice: with (implicit in English construction)
  chosen_spanish: con
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La partícula señala la relación de pacto con Abraham. En español, la construcción natural es «hizo con Abraham», que preserva el valor relacional sin forzar una sintaxis extraña.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: וּ/שְׁב֖וּעָת֣/וֹ
  english_pob_choice: and his oath
  chosen_spanish: y su juramento
  alternatives_spanish:
  - y su oath
  - y el juramento que hizo
  - y el juramento que juró
  lexicon: HALOT
  rationale: שְׁבוּעָה designa un juramento; el sufijo de tercera masculina singular se conserva como «su». «Juramento» mantiene el sustantivo hebreo y evita convertir la expresión en una paráfrasis verbal no exigida por el texto.
- source_word: לְ/יִשְׂחָֽק
  english_pob_choice: to Isaac
  chosen_spanish: para Isaac
  alternatives_spanish:
  - a Isaac
  - de Isaac
  lexicon: HALOT
  rationale: La preposición ל puede expresar dirección o referencia/beneficio según el contexto. Aquí, como en la decisión inglesa, la idea es que el juramento concierne a Isaac; «para Isaac» suena natural en español y conserva esa orientación.
theological_decisions:
- issue: Idioma pactal implícito por el verbo כרת sin repetir explícitamente «pacto»
  english_pob_reading: 'Render כרת as ''made'' and let the antecedent ''the covenant'' from verse 8 supply the covenant object: ''which he made with Abraham.'''
  chosen_spanish_reading: «el cual hizo con Abraham» deja implícito el pacto ya mencionado en el versículo anterior.
  alternative_spanish_readings:
  - «el cual cortó con Abraham»
  - «el pacto que hizo con Abraham»
  - «el cual concertó con Abraham»
  rationale: El hebreo omite el sustantivo «pacto» porque ya está disponible por el contexto inmediato. En español, «hizo con Abraham» reproduce esa economía del texto y evita tanto el calco «cortó» como la repetición innecesaria de «pacto».
  doctrine_reference: Principio de equivalencia óptima; prioridad del sentido de pacto transmitido por el contexto inmediato.
translation_notes:
  revision_awareness: No hay cambios de revisión en el paquete inglés; el cotejo indica alta concordancia y solo observaciones menores, sin afectar la lectura principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - Se conserva la referencia relacional del hebreo entre Abraham e Isaac sin expandirla a una paráfrasis explicativa.
  - «Juramento» se usa como sustantivo léxico para שְׁבוּעָה, en continuidad con la decisión inglesa de no verbalizar innecesariamente la expresión.
