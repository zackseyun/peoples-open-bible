translation:
  language: es
  text: Y cuando termines de leer este rollo[a], átale una piedra y arrójalo en medio del Eufrates[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este libro». El hebreo סֵפֶר puede referirse de manera general a un documento escrito, pero aquí probablemente alude a un rollo.
    reason: lexical_alternative
  - marker: b
    text: O «al interior del Eufrates». El hebreo expresa la idea de lanzarlo hacia dentro del río, en medio de sus aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia temporal futura; en español, «Y cuando» comunica esa función de modo natural y fiel, sin forzar una fórmula existencial.
- source_word: כְּכַלֹּתְךָ לִקְרֹא
  english_pob_choice: you finish reading
  chosen_spanish: termines de leer
  alternatives_spanish:
  - hayas terminado de leer
  - acabes de leer
  lexicon: HALOT
  rationale: La secuencia verbal expresa el momento en que concluye la lectura. «Termines de leer» conserva la relación temporal y suena natural en español.
- source_word: אֶת הַסֵּפֶר הַזֶּה
  english_pob_choice: this scroll
  chosen_spanish: este rollo
  alternatives_spanish:
  - este libro
  - este documento
  lexicon: HALOT
  rationale: סֵפֶר aquí designa un escrito material; «rollo» mantiene mejor la imagen histórica que «libro» en este contexto. Se evita exagerar la modernización.
- source_word: תִּקְשֹׁר עָלָיו אֶבֶן
  english_pob_choice: tie a stone to it
  chosen_spanish: átalas una piedra
  alternatives_spanish:
  - átale una piedra
  - ata una piedra a él
  lexicon: HALOT
  rationale: En español, el clítico con el objeto implícito del rollo puede sonar áspero si se repite literalmente. La forma elegida intenta conservar la acción de fijar la piedra al rollo. La redacción es la más discutible del versículo y refleja la tensión del hebreo, donde el objeto pronominal remite al rollo y la piedra se añade como carga.
- source_word: וְהִשְׁלַכְתּוֹ
  english_pob_choice: and throw it
  chosen_spanish: arrójalo
  alternatives_spanish:
  - y tíralo
  - y échalo
  lexicon: HALOT
  rationale: «Arrojar» reproduce bien el valor de lanzar con fuerza del verbo hebreo y mantiene un registro digno.
- source_word: אֶל תּוֹךְ פְּרָת
  english_pob_choice: into the midst of the Euphrates
  chosen_spanish: al medio del Éufrates
  alternatives_spanish:
  - al seno del Éufrates
  - en medio del Éufrates
  lexicon: HALOT
  rationale: Se conserva la idea espacial de entrar en el interior del río. «Al medio» es claro en español y mantiene el sentido de inmersión del texto, aunque es menos formal que «en medio de»; se privilegia la concisión.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en los puntos léxicos principales: סֵפֶר como «scroll/rollo», תּוֹךְ como un interior espacial del río, y el valor temporal idiomático de וְהָיָה + כְּכַלֹּתְךָ. La decisión del registro conservó una equivalencia óptima con español natural y lectura pública, sin perder la imaginería del acto simbólico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto, pero este versículo no contiene el Tetragrámaton.
  - «Rollo» se prefiere a «libro» por fidelidad al contexto profético y al audit trail inglés.
  - Se conserva «Éufrates» como nombre propio del río.
  - La construcción con clítico en «átalas una piedra» intenta reflejar la relación entre el objeto pronominal y la piedra; es una solución de trabajo para la ambigüedad sintáctica del hebreo en español.
