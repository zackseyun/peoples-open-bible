translation:
  language: es
  text: 'Samuel respondió a Saúl y dijo: «Yo soy el vidente[a]. Sube delante de mí al lugar alto, y come conmigo hoy[b]. Por la mañana te despediré, y te haré saber todo lo que está en tu corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el profeta». El hebreo usa el término más antiguo «vidente», explicado en 1 Samuel 9:9 como una designación anterior para un profeta.
    reason: alternative_reading
  - marker: b
    text: El hebreo está en segunda persona plural, lo que probablemente incluye también al criado de Saúl.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: '''הָרֹאֶה'' nombra literalmente al que ve, y en este contexto histórico es un título antiguo para una figura profética. ''Vidente'' preserva ese valor histórico y el matiz lexical mejor que igualarlo sin más a ''profeta''.'
- source_word: הַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: el lugar alto
  alternatives_spanish:
  - el santuario elevado
  - el alto lugar
  lexicon: HALOT
  rationale: '''בָּמָה'' designa un sitio cultual elevado. ''Lugar alto'' es claro en español y conserva la imagen espacial y cultual sin sobreinterpretar.'
- source_word: עֲלֵה לְפָנַי
  english_pob_choice: Go up before me
  chosen_spanish: Sube delante de mí
  alternatives_spanish:
  - Sube antes que yo
  - Sube en frente de mí
  lexicon: HALOT
  rationale: La expresión mantiene el movimiento ascendente hacia el sitio elevado y la relación de precedencia. 'Delante de mí' suena natural en español y respeta la dirección espacial del hebreo.
- source_word: וַאֲכַלְתֶּם עִמִּי הַיּוֹם
  english_pob_choice: and eat with me today
  chosen_spanish: y comerán conmigo hoy
  alternatives_spanish:
  - y comerás conmigo hoy
  - y comerán con nosotros hoy
  lexicon: HALOT
  rationale: El verbo hebreo está en segunda persona plural; el español 'comerán' puede abarcar a Saúl y a su criado, manteniendo la tensión gramatical que la nota inglesa preserva.
- source_word: וְשִׁלַּחְתִּיךָ
  english_pob_choice: I will send you on your way
  chosen_spanish: te enviaré
  alternatives_spanish:
  - te mandaré
  - te despediré
  lexicon: HALOT
  rationale: El verbo significa enviar para partir. En este contexto, 'te enviaré' es breve y fiel; la idea de despedida o salida queda implícita en el contexto inmediato.
- source_word: בַבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Mañana por la mañana
  lexicon: HALOT
  rationale: La referencia temporal es explícita y se conserva de manera natural en español. 'Por la mañana' evita añadir 'mañana' como especificación que el hebreo no expresa.
- source_word: וְכֹל אֲשֶׁר בִּלְבָבְךָ
  english_pob_choice: all that is in your heart
  chosen_spanish: todo lo que está en tu corazón
  alternatives_spanish:
  - todo lo que piensas
  - todo lo que llevas dentro
  lexicon: HALOT
  rationale: '''לבב'' remite al centro interior de pensamientos, intenciones y deseos. ''Corazón'' preserva la metáfora antropológica bíblica y la amplitud semántica del original.'
- source_word: אַגִּיד
  english_pob_choice: I will tell / I will make known
  chosen_spanish: te declararé
  alternatives_spanish:
  - te diré
  - te haré saber
  lexicon: HALOT
  rationale: El hiphil de נגד tiene sentido de hacer saber o declarar. 'Declararé' conserva un tono más formal y preciso que un simple 'diré'.
theological_decisions:
- issue: Título profético antiguo ('seer') frente a 'prophet'
  english_pob_reading: The seer
  chosen_spanish_reading: el vidente
  alternative_spanish_readings:
  - el profeta
  rationale: Se conserva el término histórico marcado por el relato y por 1 Samuel 9:9, evitando borrar la distinción lexical entre el título antiguo y la función profética posterior.
  doctrine_reference: 1 Samuel 9:9
- issue: Plural implícito en 'you shall eat' / 'eat'
  english_pob_reading: and eat with me today
  chosen_spanish_reading: y comerán conmigo hoy
  alternative_spanish_readings:
  - y comerás conmigo hoy
  rationale: El hebreo está en plural, probablemente incluyendo al criado de Saúl. El español pluraliza para no perder esa tensión, aunque la apelación principal siga dirigida a Saúl.
  doctrine_reference: 1 Samuel 9:19
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que cambió 'you shall eat' por la forma más directa 'eat' para reflejar mejor el imperativo y la naturalidad. En español se ha preservado el plural verbal del hebreo ('comerán') porque el dato gramatical es significativo y el contexto admite la inclusión del criado. También se ha mantenido la distinción histórica entre 'vidente' y 'profeta'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la serie POB cuando el texto hebreo muestre el nombre divino; este versículo no lo contiene.
  - '''Vidente'' se usa como término técnico para הָרֹאֶה en este contexto, sin sustituirlo por ''profeta''.'
  - Se conserva 'corazón' para לבב como equivalente bíblico del interior personal, no como simple emoción.
  - Se mantiene un registro reverente pero natural, apto para lectura pública eclesial.
