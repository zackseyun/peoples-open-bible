review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido del hebreo: fórmula de mensajero, destinatario, prohibición, acusación hostil contra Dios, y pasivo final sobre Jerusalén. Sin embargo, el texto español introduce un matiz menos natural en «te[a] engañe» al anclar la nota al pronombre en vez del verbo, y «en manos del rey de Asiria» suena menos idiomático en singular definido dentro de esta construcción. También conviene ajustar la nota para que no diga «Literalmente» cuando ese es precisamente el texto principal, sino presentar la alternativa léxica como tal.'
  spanish_quality_summary: El español es claro y digno, pero requiere un pulido menor para mayor naturalidad y mejor anclaje de nota. «Así les dirán a Ezequías» suena más completo en español al explicitar el objeto indirecto plural implícito del contexto, y «en manos del rey de Asiria» mejora como «en poder del rey de Asiria» si se quiere evitar aspereza idiomática; no obstante, para conservar mejor el color del hebreo, «en manos del rey de Asiria» sigue siendo aceptable. La corrección principal es mover la nota al verbo «engañe[a]» y reescribir su contenido.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé. «Dios», «Ezequías», «Judá» y «Asiria» están bien. La decisión de usar «engañe» concuerda con el POB inglés y la rationale teológica. No hay términos mesiánicos ni otros elementos sensibles del glosario.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota léxica en «te[a]» en lugar del verbo «engañe».
    rationale: La alternativa léxica corresponde al verbo hebreo נשׁא ('engañar / desviar'), no al pronombre objeto. El marcador debe aparecer sobre la palabra o frase relevante para evitar ambigüedad.
  - severity: medium
    issue: 'Texto de nota mal formulado: «Literalmente, “te engañe”».'
    rationale: 'El texto principal ya dice «te engañe», así que presentarlo como ''literalmente'' no informa bien al lector. La nota debe explicar la alternativa semántica real: también puede significar «te desvíe» o «te extravíe».'
  - severity: low
    issue: «en manos del rey de Asiria» es algo áspero en esta sintaxis.
    rationale: No es infiel, pero en español bíblico más natural suele oírse «en manos del rey de Asiria» o «en poder del rey de Asiria» con mejor flujo; aquí basta un ajuste menor manteniendo el idiomatismo.
  revised_spanish_text: 'Así les dirán a Ezequías, rey de Judá: «No dejes que tu Dios, en quien confías, te engañe[a], diciendo: “Jerusalén no será entregada en manos del rey de Asiria”».'
  revised_footnotes:
  - marker: a
    text: O «te desvíe». El verbo hebreo puede significar «engañar» o «extraviar».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores sin cambiar el sentido: se añadió «les» para una formulación española más natural del encargo de mensajero, se movió el marcador de nota al verbo correcto, y se reescribió la nota para reflejar adecuadamente la alternativa léxica documentada en el POB inglés. No se requiere adjudicación adicional.'
