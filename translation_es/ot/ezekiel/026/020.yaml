review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: descenso con los que bajan al pozo, ubicación en la tierra de abajo, comparación con ruinas antiguas, finalidad de deshabitación y contraste final con la gloria en la tierra de los vivientes. Sin embargo, la nota [b] está mal anclada: su contenido corresponde a בְּאֶרֶץ תַּחְתִּיּוֹת (''la tierra de abajo''), pero en el texto está colocada sobre ''habitada''. También conviene ajustar la nota [c], porque la nota inglesa preserva alternativas para צְבִי y el texto español ya usa ''gloria''; no debe decir ''O gloria o esplendor'', sino ofrecer alternativas reales al término elegido.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. 'Entonces te haré bajar', 'te haré habitar' y 'la tierra de los vivientes' funcionan bien. 'Pozo' es defendible, aunque 'fosa' también sería posible; no exige cambio. La principal reparación es técnica-editorial de notas, no de redacción principal.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. No aparece Yahvé ni terminología mesiánica. Las decisiones 'gloria', 'espíritu', etc., no entran aquí. La elección de 'gloria' para צְבִי concuerda con la revisión inglesa auditada, pero la nota debe reflejar alternativas distintas ('esplendor', 'hermosura/belleza') y no repetir el término principal.
  issues:
  - severity: medium
    issue: La nota [b] está anclada al lugar equivocado.
    rationale: El contenido de la nota [b] ('en la tierra de abajo' / 'en las regiones más bajas') explica בְּאֶרֶץ תַּחְתִּיּוֹת, no 'para que no seas habitada'. Debe moverse al sintagma 'la tierra de abajo'.
  - severity: medium
    issue: La nota [c] repite el término principal en vez de dar una alternativa real.
    rationale: Como el texto principal ya dice 'gloria', una nota que diga 'O gloria o esplendor' no aporta una variante genuina. Debe conservar las alternativas semánticas de צְבִי, p. ej. 'esplendor' o 'hermosura'/'belleza'.
  revised_spanish_text: Entonces te haré bajar con los que descienden al pozo[a], al pueblo antiguo; y te haré habitar en la tierra de abajo[b], como las ruinas antiguas, con los que descienden al pozo, para que no seas habitada. Pero pondré gloria[c] en la tierra de los vivientes.
  revised_footnotes:
