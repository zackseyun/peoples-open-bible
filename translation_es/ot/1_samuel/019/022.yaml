translation:
  language: es
  text: 'Él también fue a Ramá[a], y llegó hasta el gran pozo que está en Secú. Preguntó y dijo: «¿Dónde están Samuel y David?». Y uno dijo[b]: «Mira, están en Naiot, en Ramá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gran cisterna» o «el gran foso» para «el gran pozo» (בּוֹר הַגָּדוֹל).
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Y dijo»; el sujeto de la respuesta no se especifica, por lo que la traducción usa «uno» para mayor claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָמָתָה / בָּרָמָה
  english_pob_choice: to Ramah / in Ramah
  chosen_spanish: a Ramá / en Ramá
  alternatives_spanish:
  - hacia Ramá
  - en Ramá
  lexicon: HALOT
  rationale: La forma direccional hebrea indica movimiento hacia Ramá; en español natural se expresa con «a Ramá». La segunda mención locativa se conserva como «en Ramá», manteniendo la distinción del texto fuente.
- source_word: בּוֹר הַגָּדוֹל
  english_pob_choice: the great well
  chosen_spanish: el gran pozo
  alternatives_spanish:
  - la gran cisterna
  - el gran hoyo
  lexicon: HALOT
  rationale: בּוֹר puede referirse a pozo, cisterna o foso. Dado que funciona como punto de referencia en el camino, «pozo» es una opción clara en español y conserva la amplitud semántica sin forzar una interpretación única.
- source_word: בַּשֶּׂכוּ
  english_pob_choice: at Seku
  chosen_spanish: en Secú
  alternatives_spanish:
  - en Seku
  - junto a Secú
  lexicon: HALOT
  rationale: Es un topónimo; se translitera/adapta al español como nombre propio. La preposición locativa se vierte de manera idiomática como «en».
- source_word: וַיִּשְׁאַל וַיֹּאמֶר
  english_pob_choice: He asked and said
  chosen_spanish: preguntó y dijo
  alternatives_spanish:
  - inquirió y dijo
  - preguntó, diciendo
  lexicon: HALOT
  rationale: La secuencia verbal hebrea se conserva con dos verbos coordinados, sin volverla más libre de lo que permite el original. «Preguntó y dijo» mantiene el paralelismo narrativo y suena natural en español.
- source_word: אֵיפֹה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están
  alternatives_spanish:
  - ¿Dónde está
  - ¿En dónde están
  lexicon: HALOT
  rationale: El interrogativo requiere concordancia plural en español por el sujeto compuesto «Samuel y David». «¿Dónde están?» refleja de forma directa la pregunta del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce la respuesta con fuerza señaladora. «Mira» preserva ese valor de atención directa en español contemporáneo sin recurrir a un arcaísmo.
- source_word: בנוית
  english_pob_choice: at Naioth
  chosen_spanish: en Naiot
  alternatives_spanish:
  - en Naioth
  - en las Naiot
  lexicon: HALOT
  rationale: Se conserva el nombre propio con adaptación gráfica común al español. El valor locativo se expresa con «en».
- source_word: וַיֹּאמֶר (sujeto implícito)
  english_pob_choice: And one said
  chosen_spanish: Y uno dijo
  alternatives_spanish:
  - Y él dijo
  - Y alguien dijo
  lexicon: HALOT
  rationale: El hebreo no explicita el sujeto del rétor; en español, «uno» conserva la indefinición del original y sigue de cerca la solución auditada en inglés.
