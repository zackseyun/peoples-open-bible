translation:
  language: es
  text: Con él están la fuerza y la sabiduría eficaz[a]; el que se extravía y el que hace extraviar pertenecen a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sabiduría sensata». El hebreo תּוּשִׁיָּה puede expresar sabiduría práctica, firme o efectiva; se eligió «sabiduría eficaz» para conservar ese matiz sin reducirla a una simple repetición de «sabiduría».
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  english_pob_choice: With him
  chosen_spanish: Con él
  alternatives_spanish:
  - Junto a él
  - En su poder
  lexicon: HALOT
  rationale: La construcción hebrea expresa cercanía/posesión. «Con él» conserva el giro idiomático y comunica que estas realidades están en su ámbito o disposición, sin forzar una paráfrasis.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - la fortaleza
  - el poder
  lexicon: HALOT
  rationale: «Fuerza» es un equivalente natural en español para עֹז y encaja bien con el paralelismo del versículo. «Fortaleza» o «poder» son posibles, pero «fuerza» es más directo y menos abstracto.
- source_word: תּוּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: la sabiduría sólida
  alternatives_spanish:
  - la sabiduría sana
  - el juicio sólido
  - la sabiduría eficaz
  lexicon: HALOT
  rationale: El término apunta a sabiduría efectiva, firme, práctica. «Sabiduría sólida» intenta conservar esa idea de solidez y eficacia mejor que un simple «sabiduría», sin perder el matiz sapiencial.
- source_word: לּוֹ
  english_pob_choice: belong to him
  chosen_spanish: pertenecen a él
  alternatives_spanish:
  - son suyos
  - están para él
  lexicon: HALOT
  rationale: La preposición ל con sufijo aquí marca pertenencia o relación de dominio. «Pertenecen a él» hace explícito ese sentido, manteniendo el paralelismo con «Con él».
- source_word: שֹׁגֵג
  english_pob_choice: the deceived / the one who goes astray
  chosen_spanish: el que se extravía
  alternatives_spanish:
  - el engañado
  - el que yerra
  lexicon: HALOT
  rationale: Como participio qal de שׁגה, el sentido básico es errar o extraviarse. «El que se extravía» preserva el movimiento verbal y no reduce de entrada el término a una interpretación pasiva.
- source_word: מַשְׁגֶּה
  english_pob_choice: the deceiver / the one who leads astray
  chosen_spanish: el que desvía
  alternatives_spanish:
  - el que engaña
  - el que hace errar
  lexicon: HALOT
  rationale: Como participio hiphil, el verbo expresa causar extravío. «El que desvía» mantiene el contraste verbal con «se extravía» y es natural en español; «engaña» es posible, pero añade un matiz no necesario para el hebreo base.
theological_decisions:
- issue: Relación divina con el extraviado y el que extravía
  english_pob_reading: Both are said to belong to God or be under his dominion, without specifying moral causation.
  chosen_spanish_reading: Ambos quedan en la esfera de dominio de Dios, sin afirmar que él sea la causa moral directa del engaño.
  alternative_spanish_readings:
  - Ambos le pertenecen en soberanía
  - Dios controla a ambos en providencia
  - Dios es la fuente del error y del engaño
  rationale: 'El hebreo afirma una pertenencia/dominio fuerte, pero no desarrolla causalidad moral. La redacción española conserva esa tensión: afirma la soberanía de Dios y evita resolver el problema con una explicación que el texto no da.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue la última revisión del POB inglés que opta por una formulación compacta de los dos participios. En español se mantiene la misma decisión de fondo, pero se prefiere «el que se extravía y el que desvía» por claridad verbal y para conservar el contraste activo del hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el contexto del libro; el versículo no nombra a Yahvé en esta línea, así que no hay sustitución terminológica aquí.
  - Se prefirió «con él» en vez de «con Yahvé» porque el hebreo usa un pronombre y el contexto inmediato ya identifica al referente.
  - «Pertenecen a él» conserva la idea de dominio/posesión sin convertir el verso en una afirmación de autoría moral del error.
