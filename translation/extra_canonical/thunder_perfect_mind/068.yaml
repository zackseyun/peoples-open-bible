  as "those in smallness … they despise," matching the consult’s theme but without
  over-committing to "childhood." The final clause is rendered "I am the knowledge
  of my seeking for myself" by analogy to well-attested Thunder lines, with ⲡⲁⲅⲓⲛⲉ
  interpreted as "my seeking"; this is plausible but not certain. Note too that ⲛⲟⲕ
  may be a dropped-initial OCR for ⲁⲛⲟⲕ; the translation assumes "I am," not "you
  are."
