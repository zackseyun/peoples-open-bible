translation:
  language: es
  text: Engancha el carro[a] al caballo veloz, habitante[b] de Laquis; ella fue el comienzo del pecado a[c] la hija de Sion[d], porque en ti se hallaron las rebeliones de Israel[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apareja el carro»; el hebreo presenta un imperativo de enganchar o preparar el vehículo.
    reason: lexical_alternative
  - marker: b
    text: O «moradora de Laquis» o «tú que habitas en Laquis»; el hebreo usa una forma femenina singular que se dirige a la ciudad como a una mujer.
    reason: lexical_alternative
  - marker: c
    text: O «para»; el hebreo ל puede expresar relación o destino. Aquí se traduce «a» para reflejar más de cerca la construcción hebrea sin eliminar su amplitud.
    reason: theological_note
  - marker: d
    text: «La hija de Sion» es una personificación poética hebrea de Sion/Jerusalén.
    reason: cultural_note
  - marker: e
    text: O «las transgresiones de Israel». פֶּשַׁע puede resaltar rebelión deliberada contra el pacto, no solo falta en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְתֹם
  english_pob_choice: Harness
  chosen_spanish: Ajusta
  alternatives_spanish:
  - Arrea
  - Apareja
  - Apresta
  lexicon: HALOT
  rationale: El imperativo pide preparar o enganchar el vehículo para la huida o la acción militar. 'Ajusta' comunica la acción de disponer el carro de manera natural en español, sin perder la fuerza imperativa.
- source_word: הַמֶּרְכָּבָה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carro de guerra
  - el carruaje
  lexicon: HALOT
  rationale: En este contexto bélico, 'carro' transmite el vehículo de combate con naturalidad en español. 'Carro de guerra' explicita el matiz, pero 'carro' conserva mayor fluidez y sigue siendo suficientemente claro.
- source_word: לָרֶכֶשׁ
  english_pob_choice: to the swift horse
  chosen_spanish: al caballo veloz
  alternatives_spanish:
  - al corcel
  - al caballo ligero
  lexicon: HALOT
  rationale: רֶכֶשׁ designa un animal de monta rápido o de carrera. 'Caballo veloz' preserva el sentido y evita un arcaísmo innecesario, manteniendo el contraste poético con la ciudad de Laquis.
- source_word: יוֹשֶׁבֶת לָכִישׁ
  english_pob_choice: inhabitant of Lachish
  chosen_spanish: habitante de Laquis
  alternatives_spanish:
  - habitante de Laquis, mujer
  - tú que habitas en Laquis
  - moradora de Laquis
  lexicon: HALOT
  rationale: El participio femenino singular trata a la ciudad/población como persona. 'Habitante de Laquis' conserva esa personificación sin sobrecargar el español; la referencia femenina se refleja en 'ella'.
- source_word: רֵאשִׁית חַטָּאת הִיא
  english_pob_choice: she was the beginning of sin
  chosen_spanish: ella fue el comienzo del pecado
  alternatives_spanish:
  - ella fue el principio del pecado
  - ella fue la primera causa del pecado
  lexicon: HALOT
  rationale: '''Comienzo'' reproduce רֵאשִׁית con naturalidad y mantiene la tensión histórica/moral del texto. ''Pecado'' refleja חַטָּאת en su sentido ético, no cultual.'
- source_word: לְבַת צִיּוֹן
  english_pob_choice: to daughter Zion
  chosen_spanish: para la hija de Sion
  alternatives_spanish:
  - a la hija de Sion
  - para la hija de Sion, es decir, Sion/Jerusalén
  - a Sion
  lexicon: HALOT
  rationale: La preposición ל se entiende aquí en sentido relacional/destinativo y la frase personifica a Sion como hija. 'Hija de Sion' conserva la imagen hebrea; 'para' ayuda a reflejar la relación marcada por el hebreo sin forzar una traducción demasiado literal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en
  lexicon: HALOT
  rationale: Introduce la base explicativa de la acusación. 'Porque' es la opción más natural en español y mantiene la relación causal del texto.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  - entre ustedes
  lexicon: HALOT
  rationale: Segundo femenino singular dirigido a Laquis. 'En ti' preserva la dirección personal y la personificación de la ciudad.
- source_word: נִמְצְאוּ
  english_pob_choice: were found
  chosen_spanish: se hallaron
  alternatives_spanish:
  - fueron halladas
  - se encontraron
  lexicon: HALOT
  rationale: El pasivo de מצא se expresa con una pasiva refleja natural en español. 'Se hallaron' comunica el hallazgo sin sonar mecánico.
- source_word: פִּשְׁעֵי יִשְׂרָאֵל
  english_pob_choice: the transgressions of Israel
  chosen_spanish: las rebeliones de Israel
  alternatives_spanish:
  - las transgresiones de Israel
  - los pecados de Israel
  - las rebeliones de Israel
  lexicon: HALOT
  rationale: פֶּשַׁע puede enfatizar rebelión o ruptura deliberada del pacto. 'Rebeliones' preserva esa fuerza covenantal mejor que un genérico 'pecados'; 'transgresiones' queda como alternativa viable pero algo menos incisiva.
theological_decisions:
- issue: Relación de Laquis con Sion en la frase רֵאשִׁית חַטָּאת הִיא לְבַת צִיּוֹן
  english_pob_reading: Lachish as an originating point or first instance of sin for daughter Zion
  chosen_spanish_reading: Laquis como comienzo del pecado para la hija de Sion
  alternative_spanish_readings:
  - Laquis como la primera causa del pecado para la hija de Sion
  - Laquis como el comienzo del pecado hacia la hija de Sion
  rationale: La frase mantiene la acusación profética sin resolver del todo el mecanismo histórico exacto. 'Comienzo del pecado' deja abierta la relación causal/originante que el audit trail en inglés preserva.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Sentido de חַטָּאת en un contexto profético de denuncia
  english_pob_reading: sin
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - culpa
  - ofrenda por el pecado
  rationale: Aquí el término no es cultual sino moral y judicial. 'Pecado' conserva el sentido de acusación y evita introducir una lectura sacrificial ajena al contexto.
  doctrine_reference: HALOT; contexto profético de juicio
- issue: Valor de פִּשְׁעֵי יִשְׂרָאֵל
  english_pob_reading: the transgressions of Israel
  chosen_spanish_reading: las rebeliones de Israel
  alternative_spanish_readings:
  - las transgresiones de Israel
  - las desobediencias de Israel
  rationale: '''Rebeliones'' mantiene la carga de ruptura voluntaria contra el pacto, en línea con el inglés auditado. Esto evita suavizar el término con una versión demasiado genérica.'
  doctrine_reference: HALOT; lectura covenantal de פֶּשַׁע
translation_notes:
  revision_awareness: Se siguió el criterio revisado del audit trail de reflejar ל en relación con la hija de Sion. También se preservó la personificación femenina de Laquis con un tratamiento natural en español y se mantuvo la ambigüedad causal de 'comienzo del pecado' sin convertirla en una explicación histórica cerrada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino cuando no aparece en este versículo.
  - '''Sion'' se mantuvo como forma española estándar para el topónimo poético; ''hija de Sion'' conserva la personificación hebrea.'
  - '''Rebeliones'' se eligió por su fuerza pactal y se dejó nota alternativa para ''transgresiones''.'
  - La puntuación reproduce la división de cola poética con punto y coma y coma final antes de la cláusula causal.
