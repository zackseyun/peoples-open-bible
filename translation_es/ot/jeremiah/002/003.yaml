revisions:
- from: Israel fue santo para Yahvé[a], las primicias de su cosecha; todos los que lo devoraban[b] se hicieron culpables; el mal[c] les vendrá, declara Yahvé.
  to: Israel fue santo para Yahvé, las primicias[a] de su cosecha; todos los que lo devoraban[b] se hicieron culpables[c]; la calamidad vino sobre ellos, declara Yahvé.
  rationale: Se reubican los marcadores para que correspondan a las palabras pertinentes, se corrige la nota léxica de יֶאְשָׁמוּ, y se reemplaza 'el mal les vendrá' por 'la calamidad vino sobre ellos' para reflejar mejor el sentido judicial de רָעָה y la secuencia verbal del hebreo.
