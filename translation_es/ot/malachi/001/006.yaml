  to: 'Un hijo honra a su padre, y un siervo a su señor. Si, pues, yo soy padre, ¿dónde está mi honor[a]? Y si yo soy señor, ¿dónde está el temor que se me debe? dice Yahvé de los Ejércitos a ustedes, sacerdotes que desprecian mi nombre. Pero ustedes dicen: «¿En qué[b] hemos despreciado tu nombre?»'
