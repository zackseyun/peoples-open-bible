translation:
  language: es
  text: El temor de Yahvé supera todo[a]; ¿con quién se comparará el que se aferra a él[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El temor de Yahvé está por encima de todo». El griego expresa superioridad sobre todas las cosas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el que lo posee». κρατῶν puede sugerir posesión firme además de aferrarse a ello.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος Κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - la reverencia de Yahvé
  lexicon: LSJ
  rationale: Se conserva φόβος con «temor» para mantener el peso teológico y sapiencial de la expresión. Se usa «Yahvé» siguiendo la norma del proyecto para יהוה, en vez de un reemplazo eclesiástico genérico.
- source_word: ὑπὲρ πᾶν ὑπερέβαλεν
  english_pob_choice: surpasses everything
  chosen_spanish: supera todo
  alternatives_spanish:
  - está por encima de todo
  - sobrepasa todas las cosas
  lexicon: LSJ
  rationale: La construcción expresa superioridad sobre todo lo demás. «Supera todo» comunica bien el valor gnómico en español moderno sin volverla áspera ni demasiado literal.
- source_word: ὁ κρατῶν αὐτοῦ
  english_pob_choice: the one who holds fast to it
  chosen_spanish: el que se mantiene firme en él
  alternatives_spanish:
  - el que lo posee
  - el que se aferra a él
  - el que lo guarda
  lexicon: LSJ
  rationale: κρατέω puede implicar sostener con firmeza o mantener posesión. «Se mantiene firme en él» conserva la idea de adhesión estable y suena natural en español; el antecedente es «el temor de Yahvé».
- source_word: τίνι ὁμοιωθήσεται
  english_pob_choice: to whom will he be compared?
  chosen_spanish: ¿con quién se comparará?
  alternatives_spanish:
  - ¿a quién se asemejará?
  - ¿con quién podrá compararse?
  lexicon: LSJ
  rationale: La pasiva futura interrogativa se vierte de modo natural con una construcción reflexiva en español. «Con quién se comparará» conserva la fuerza retórica sin forzar un pasivo poco idiomático.
theological_decisions:
- issue: Mantener «temor» en vez de suavizar a «reverencia»
  english_pob_reading: the fear of the Lord
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia de Yahvé
  - el respeto de Yahvé
  rationale: La poesía sapiencial usa un término fuerte y técnico. Traducirlo como «temor» preserva la tensión teológica que el texto presenta en lugar de resolverla por anticipado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms'
- issue: Cómo expresar el valor proverbial del verbo en presente
  english_pob_reading: surpasses everything
  chosen_spanish_reading: supera todo
  alternative_spanish_readings:
  - ha superado todo
  - sobrepasó todo
  rationale: El griego formula una verdad general, no un hecho puntual pasado. El presente español transmite mejor el carácter proverbial y sabio del dicho.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern Spanish'
- issue: Cómo reflejar la comparación retórica final sin neutralizarla
  english_pob_reading: to whom will he be compared?
  chosen_spanish_reading: ¿con quién se comparará?
  alternative_spanish_readings:
  - ¿a quién se asemejará?
  - ¿quién podrá compararse con él?
  rationale: La pregunta retórica conserva la idea de incomparabilidad. Se evita una paráfrasis excesiva y se mantiene la fuerza del cierre sapiencial.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una formulación más literal a una ordenación más natural de la pregunta final, manteniendo «surpasses everything» y «holds fast to it». La versión española sigue ese mismo criterio: conserva el sentido gnómico, el paralelismo sapiencial y la ambigüedad útil de κρατέω sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino conforme al estándar del proyecto.
  - Se preserva «temor» como término técnico sapiencial, no suavizado a «reverencia».
  - La comparación final se formula en español natural, pero sin perder la estructura retórica del griego.
  - El antecedente de «él» en la nota b es «el temor de Yahvé», no una persona distinta.
