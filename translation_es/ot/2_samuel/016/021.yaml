translation:
  language: es
  text: 'Ahitofel le dijo a Absalón: «Llégate[a] a las concubinas de tu padre, que él dejó para guardar la casa, y todo Israel oirá que te has hecho odioso[b] a tu padre, y se fortalecerán las manos[c] de todos los que están contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «llégate a» funciona aquí como eufemismo para relaciones sexuales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te has vuelto odioso»; el hebreo evoca volverse ofensivo u objetable.'
    reason: lexical_alternative
  - marker: c
    text: Hebraísmo para decir que se animarán o cobrarán valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹא אֶל
  english_pob_choice: Go in to
  chosen_spanish: Entra a
  alternatives_spanish:
  - Ten relaciones con
  - Ve a
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual; en español, «entra a» preserva la imagen idiomática sin volverla cruda y deja claro el sentido por el contexto.
- source_word: פִּלַגְשֵׁי
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - esposas secundarias
  - mujeres del harén
  lexicon: HALOT
  rationale: «Concubinas» es el equivalente directo y preciso en español para פילגשׁ, manteniendo el matiz de estatus marital inferior reconocido en la casa real.
- source_word: הִנִּיחַ לִשְׁמֹר הַבָּיִת
  english_pob_choice: he left to keep the house
  chosen_spanish: que él dejó para guardar la casa
  alternatives_spanish:
  - que él dejó para vigilar la casa
  - que él dejó encargadas de la casa
  lexicon: HALOT
  rationale: «Guardar la casa» conserva el valor de שׁמר en sentido doméstico/vigilante y sigue de cerca la construcción hebrea sin sonar forzado en español.
- source_word: נִבְאַשְׁתָּ
  english_pob_choice: you have become odious
  chosen_spanish: te has hecho odioso
  alternatives_spanish:
  - te has vuelto repulsivo
  - te has hecho aborrecible
  lexicon: HALOT
  rationale: «Odioso» refleja con más precisión el valor de ‘odioso/aborrecible’ que una paráfrasis demasiado explicativa. En español, la expresión «te has hecho odioso a alguien» suena natural y conserva la fuerza social del término.
- source_word: וְחָזְקוּ יְדֵי
  english_pob_choice: the hands of ... will be strengthened
  chosen_spanish: se fortalecerán las manos
  alternatives_spanish:
  - se animarán
  - se fortalecerán
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «las manos» como metáfora de resolución/coraje, igual que en el inglés auditado, en lugar de reemplazarla por una explicación interpretativa.
- source_word: כָּל אֲשֶׁר אִתָּךְ
  english_pob_choice: all who are with you
  chosen_spanish: de todos los que están contigo
  alternatives_spanish:
  - de todos tus partidarios
  - de todos los que te acompañan
  lexicon: HALOT
  rationale: La frase mantiene el vínculo relacional del hebreo sin introducir un matiz político más estrecho que el texto no exige.
theological_decisions:
- issue: Eufemismo sexual con carga política
  english_pob_reading: 'Render the euphemism transparently but not crudely: ''Go in to your father’s concubines.'''
  chosen_spanish_reading: 'Traducir el eufemismo de manera transparente pero sobria: «Entra a las concubinas de tu padre».'
  alternative_spanish_readings:
  - «Ten relaciones con las concubinas de tu padre»
  - «Duérmete con las concubinas de tu padre»
  rationale: La acción tiene sentido de ruptura política irreversible. La redacción debe preservar la gravedad del acto y el eufemismo bíblico sin vulgarizarlo ni ocultarlo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s plain sense without paraphrase beyond what it warrants.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió «odious» frente a una formulación más libre. Por eso se eligió «odioso» en español para mantener una equivalencia formal y natural. También se preservó la imagen de «las manos» como idiomática de ánimo o fortaleza, en línea con el registro del POB en inglés.
  spanish_consistency_notes:
  - Se usa «Absalón» con acento en el nombre propio, conforme al español bíblico estándar.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se mantiene el registro sobrio y narrativo, sin expandir el sentido más allá del hebreo.
  - Las notas se anclan explícitamente en el texto para cumplir con la validación de marcadores.
