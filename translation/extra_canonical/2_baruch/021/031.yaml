  from: The multitude of the world is the spirit of man
  to: For the spirit of man is the administrator of the world
  rationale: The current rendering is extremely obscure in English and likely misconstrues
    the underlying Syriac syntax/lexicon. In 2 Baruch 21, the context is about man's
    role and his lack of knowledge regarding his own destiny. Standard translations
    (e.g., Charles, Klijn) render this clause as 'For the spirit of man is the administrator/maker
    of the world' (reflecting the Syriac root for 'administer' or 'govern', rather
    than 'multitude'). The current draft's 'multitude' makes the sentence unintelligible.
