translation:
  language: es
  text: Como el rebaño santo, como el rebaño de Jerusalén en sus fiestas señaladas, así las ciudades en ruinas estarán llenas de rebaños de personas[a]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llenas de rebaños humanos» o «llenas de personas como un rebaño». El hebreo dice literalmente «llenas de rebaños de אדם», conservando la imagen de gente multiplicada como ovejas sacrificiales en Jerusalén durante las fiestas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצֹאן קָדָשִׁים
  english_pob_choice: Like the holy flock
  chosen_spanish: Como el rebaño santo
  alternatives_spanish:
  - Como el rebaño sagrado
  - Como el rebaño de cosas consagradas
  lexicon: HALOT
  rationale: צֹאן es un sustantivo colectivo para rebaño; en español, «rebaño» es más natural que una expresión literal con «ovejas». קָדָשִׁים califica el carácter santo/culto del rebaño, y «santo» conserva esa fuerza sin añadir explicación.
- source_word: כְּצֹאן יְרוּשָׁלִַם בְּמוֹעֲדֶיהָ
  english_pob_choice: like the flock of Jerusalem at her appointed feasts
  chosen_spanish: como el rebaño de Jerusalén en sus tiempos señalados
  alternatives_spanish:
  - como el rebaño de Jerusalén en sus fiestas señaladas
  - como el rebaño de Jerusalén en sus fechas establecidas
  lexicon: HALOT
  rationale: מוֹעֵד puede ser «tiempo señalado» o «fiesta» en contexto cultual. «Tiempos señalados» mantiene el vínculo con lo festivo y lo establecido por cita, sin forzar una sola lectura. «Sus» refleja el sufijo femenino referido a Jerusalén.
- source_word: הֶעָרִים הֶחֳרֵבוֹת
  english_pob_choice: the ruined cities
  chosen_spanish: las ciudades en ruinas
  alternatives_spanish:
  - las ciudades arruinadas
  - las ciudades devastadas
  lexicon: HALOT
  rationale: חָרֵב/חֳרֵב describe algo arruinado o devastado. «En ruinas» es idiomático en español y comunica bien el estado resultante.
- source_word: מְלֵאוֹת צֹאן אָדָם
  english_pob_choice: filled with flocks of people
  chosen_spanish: llenas de rebaños de personas
  alternatives_spanish:
  - llenas de rebaños de hombres
  - llenas de personas como rebaños
  lexicon: HALOT
  rationale: La expresión hebrea es metafórica y literalmente dice «rebaños de אדם». «Rebaños de personas» conserva la imagen colectiva sin endurecerla con «hombres» en español, que aquí sonaría menos natural y podría oscurecer el sentido genérico humano.
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: La conjunción + forma verbal expresa consecuencia. «Entonces» comunica ese resultado implícito con naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es transliterar el nombre divino. «Yahvé» es la forma española estándar y digna para el Tetragrámaton, evitando la sustitución por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto en lugar de ocultarlo tras un título. En español, «Yahvé» es la transliteración más reconocible y reverente para lectores bíblicos amplios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / transliteración del Nombre divino'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente, que suavizó «flocks of men» a «flocks of people» por naturalidad, sin perder la metáfora humana. En español se optó por una formulación igualmente natural y de imagen conservada: «rebaños de personas».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se tradujo צֹאן como «rebaño» en singular colectivo para evitar una literalidad dura y conservar el valor figurado.
  - Se preservó la correlación comparativa hebrea con «Como ... así ...».
  - Se evitó «SEÑOR» porque el texto fuente usa el nombre divino directamente.
