revisions:
- from: ¿No es acaso de Yahvé de los ejércitos que los pueblos se fatiguen por el fuego[a][b], y las naciones se cansen para la vaciedad?
  to: ¿No es acaso de parte de Yahvé de los Ejércitos que los pueblos se afanen para el fuego[a], y las naciones se agoten para el vacío[b]?
  rationale: Se ajustó «por el fuego» a «para el fuego» para reflejar mejor el valor de finalidad/resultado del hebreo בְּדֵי אֵשׁ. Se sustituyó «vaciedad» por «vacío» por mayor naturalidad y legibilidad, preservando la idea de futilidad de רִיק y manteniendo en nota las alternativas tradicionales. También se suavizó la sintaxis con «de parte de» y se eligieron verbos paralelos naturales («se afanen… se agoten»).
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:30:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura retórica y mantiene correctamente Yahvé. Sin embargo, dos elecciones españolas no preservan bien el sentido/idiomaticidad del hebreo: «por el fuego» suena causal/instrumental en español, cuando בְּדֵי אֵשׁ expresa meta/resultado («para el fuego»), y «vaciedad» es poco natural y menos legible que «vacío» o «nada» para רִיק. También conviene evitar la repetición de dos verbos casi sinónimos («se fatiguen… se cansen») y mantener una formulación más natural del título divino.'
  spanish_quality_summary: El texto es mayormente claro, pero «para la vaciedad» resulta poco idiomático en español bíblico actual y «de Yahvé de los ejércitos» puede fluir mejor como «de parte de Yahvé de los Ejércitos». La frase revisada conserva dignidad, mejora la naturalidad y mantiene el paralelismo.
  glossary_alignment: 'Alineado en lo esencial con las pautas del proyecto: יְהוָה → «Yahvé». «de los Ejércitos» es aceptable para צְבָאוֹת en español. No hay conflicto terminológico mayor; la principal corrección es semántico-idiomática en בְּדֵי אֵשׁ / בְּדֵי רִיק.'
  issues:
  - severity: medium
    issue: «por el fuego» para בְּדֵי אֵשׁ
    rationale: 'En español «por el fuego» suele oírse como causa o medio («a causa del fuego»), mientras que el hebreo aquí expresa finalidad/resultado: laborar para algo destinado al fuego o consumido por él. «Para el fuego» refleja mejor el valor idiomático y coincide con la nota alternativa inglesa.'
  - severity: medium
    issue: «para la vaciedad» para בְּדֵי רִיק
    rationale: «Vaciedad» es comprensible pero suena forzado y poco natural en español general e iglesia. «Para el vacío» o «para nada» transmiten mejor la futilidad. «Vacío» preserva el campo semántico de emptiness sin sonar arcaico ni rebuscado.
  - severity: low
    issue: Redacción algo pesada en «de Yahvé de los ejércitos»
    rationale: «De parte de Yahvé de los Ejércitos» suena más natural al expresar procedencia con מֵאֵת, sin cambiar el sentido.
  revised_spanish_text: ¿No es acaso de parte de Yahvé de los Ejércitos que los pueblos se afanen para el fuego[a], y las naciones se agoten para el vacío[b]?
  revised_footnotes:
  - marker: a
    text: O «para el fuego», es decir, para aquello que será consumido por el fuego.
    reason: lexical_alternative
  - marker: b
    text: O «para nada» o «para la vanidad».
    reason: lexical_alternative
  revision_rationale: Se ajustó «por el fuego» a «para el fuego» para reflejar mejor el valor de finalidad/resultado del hebreo בְּדֵי אֵשׁ. Se sustituyó «vaciedad» por «vacío» por mayor naturalidad y legibilidad, preservando la idea de futilidad de רִיק y manteniendo en nota las alternativas tradicionales. También se suavizó la sintaxis con «de parte de» y se eligieron verbos paralelos naturales («se afanen… se agoten»).
