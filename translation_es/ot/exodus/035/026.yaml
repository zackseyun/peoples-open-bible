translation:
  language: es
  text: Y todas las mujeres cuyos corazones las impulsaron, con habilidad, hilaron pelo de cabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «las cabras»; el hebreo aquí usa una elipsis que se refiere al pelo de cabra empleado para hilar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הַנָּשִׁים
  english_pob_choice: And all the women
  chosen_spanish: Y todas las mujeres
  alternatives_spanish:
  - Y cada una de las mujeres
  - Y todas las señoras
  lexicon: HALOT
  rationale: כָּל con sustantivo plural expresa un conjunto completo; en español, 'todas las mujeres' conserva el sentido colectivo con naturalidad y sin perder el matiz inclusivo.
- source_word: אֲשֶׁר נָשָׂא לִבָּן אֹתָנָה
  english_pob_choice: whose hearts stirred them up
  chosen_spanish: cuyo corazón las impulsó
  alternatives_spanish:
  - cuyo corazón las movió
  - cuyo corazón las despertó
  lexicon: HALOT
  rationale: El hebreo usa el modismo 'alzar/levantar el corazón' para indicar impulso interior o disposición. 'Impulsó' comunica esa motivación interna de forma clara en español sin borrar el carácter idiomático.
- source_word: בְּחָכְמָה
  english_pob_choice: in wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - con habilidad
  - sapientemente
  lexicon: HALOT
  rationale: En este contexto artesanal, חָכְמָה puede abarcar pericia práctica además de sabiduría. Se eligió 'con sabiduría' porque sigue de cerca la fuente y preserva el lenguaje del texto, mientras que la habilidad queda implícita por el acto de hilar.
- source_word: טָוּ
  english_pob_choice: spun
  chosen_spanish: hilaron
  alternatives_spanish:
  - torcieron
  - tejieron
  lexicon: HALOT
  rationale: El verbo significa hilar fibra/textil. 'Hilaron' es el equivalente español más preciso y directo; 'tejer' sería demasiado amplio y 'torcer' no expresa tan bien la labor textil.
- source_word: אֶת הָעִזִּים
  english_pob_choice: the goats' hair
  chosen_spanish: el pelo de las cabras
  alternatives_spanish:
  - la lana de las cabras
  - el pelo de cabra
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las cabras', con una elipsis contextual para el material textil. Se mantiene la explicitación del material en español para evitar la lectura errónea de animales vivos, siguiendo la misma solución auditada por la POB inglesa.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con equivalencia óptima y conserva la solución auditada del inglés POB para la elipsis de הָעִזִּים. Se prefirió 'con sabiduría' para mantener la correspondencia léxica con בְּחָכְמָה, y 'hilaron' para reflejar con precisión el verbo טָוּ.
  spanish_consistency_notes:
  - Se usa 'corazón' como equivalente idiomático de לֵב/לִבָּן, manteniendo la imagen bíblica interior.
  - '''Sabiduría'' se conserva en un sentido práctico-artesanal, no meramente abstracto.'
  - La nota al pie explicita la elipsis material, como en el audit trail inglés, para evitar ambigüedad en español.
