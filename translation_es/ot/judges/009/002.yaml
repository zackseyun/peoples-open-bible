translation:
  language: es
  text: 'Por favor, hablen para que oigan todos los líderes de Siquem: ¿Qué es mejor para ustedes: que los gobiernen setenta hombres, todos los hijos de Jerubaal, o que los gobierne un solo hombre? Y recuerden que yo soy su hueso y su carne.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo de parentesco: «su hueso y su carne» significa «su propia carne y sangre» o un pariente cercano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ נָא
  english_pob_choice: Please speak
  chosen_spanish: Por favor, hablen
  alternatives_spanish:
  - Hablen, por favor
  - Les ruego que hablen
  lexicon: HALOT
  rationale: El imperativo plural con נָא expresa ruego o exhortación cortés. En español, «por favor» conserva esa petición sin volver la frase rígida.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: a oídos de
  alternatives_spanish:
  - en el oído de
  - ante
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y designa una declaración pública dirigida a ser escuchada. «A oídos de» preserva esa fuerza en español natural.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los señores[a] de Siquem
  alternatives_spanish:
  - los líderes de Siquem
  - los dueños de Siquem
  - los magistrados de Siquem
  lexicon: HALOT
  rationale: בַּעֲלֵי puede significar dueños, señores o personas principales según el contexto. Aquí se trata de los hombres influyentes/cívicamente prominentes de Siquem; «señores» conserva esa amplitud de manera más cercana al hebreo que «líderes», aunque requiere una nota para evitar leerlo como nobleza feudal.
- source_word: מַה טּוֹב לָכֶם
  english_pob_choice: Which is better for you
  chosen_spanish: ¿Qué es mejor para ustedes?
  alternatives_spanish:
  - ¿Cuál es mejor para ustedes?
  - ¿Qué les conviene más?
  lexicon: HALOT
  rationale: El hebreo introduce una comparación retórica entre dos opciones. «¿Qué es mejor para ustedes?» comunica con naturalidad el comparativo implícito.
- source_word: הַ/מְשֹׁ֨ל בָּ/כֶ֜ם ... אִם מְשֹׁ֥ל בָּ/כֶ֖ם
  english_pob_choice: rule over you ... rule over you
  chosen_spanish: que los gobiernen ... que los gobierne
  alternatives_spanish:
  - que reinen sobre ustedes ... que reine sobre ustedes
  - que ejerzan dominio sobre ustedes ... que ejerza dominio sobre ustedes
  lexicon: HALOT
  rationale: En este contexto político, משל expresa ejercer autoridad o gobierno. «Gobernar» es claro en español y evita una carga excesiva de dominio, aunque mantiene la idea de autoridad sobre ellos.
- source_word: שִׁבְעִים אִישׁ כֹּל בְּנֵי יְרֻבַּעַל
  english_pob_choice: seventy men, all the sons of Jerubbaal
  chosen_spanish: setenta hombres, todos los hijos de Jerubaal
  alternatives_spanish:
  - setenta varones, todos los hijos de Jerubaal
  - setenta hombres, todos los hijos de Jerobaal
  lexicon: HALOT
  rationale: אִישׁ tras un numeral cuenta personas varones; «hombres» conserva la correspondencia y la fuerza del contraste con «un solo hombre». «Jerubaal» sigue la forma del audit trail inglés y el nombre hebreo transliterado.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - si
  lexicon: HALOT
  rationale: En esta pregunta disyuntiva, אִם introduce la segunda alternativa. En español, «o» expresa mejor la contraposición que «si».
- source_word: אִישׁ אֶחָד
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - un hombre
  - una sola persona
  lexicon: HALOT
  rationale: La contraparte de «setenta hombres» pide mantener el singular masculino. «Un solo hombre» hace explícita la oposición numérica y retórica.
- source_word: וּ/זְכַרְתֶּ֕ם
  english_pob_choice: And remember
  chosen_spanish: Y acuérdense
  alternatives_spanish:
  - Y recuerden
  - Y tengan presente
  lexicon: HALOT
  rationale: El verbo en contexto funciona como exhortación. «Acuérdense» transmite el mandato con un tono natural y solemne en español.
- source_word: עַצְמֵ/כֶם וּ/בְשַׂרְ/כֶם
  english_pob_choice: your bone and your flesh
  chosen_spanish: hueso y carne de ustedes
  alternatives_spanish:
  - su propio hueso y carne
  - su propia carne y hueso
  - su familia cercana
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático de parentesco cercano. Se conserva el valor concreto con «hueso y carne», y se mantiene la relación posesiva con «de ustedes» para evitar una paráfrasis demasiado libre; la nota aclara el sentido de consanguinidad.
- source_word: אָנִי
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy
  - yo mismo soy
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. «Yo soy» conserva esa prominencia de la primera persona sin alterar el español.
theological_decisions:
- issue: Tratamiento del nombre propio y de la relación de parentesco
  english_pob_reading: Retain the concrete idiom 'your bone and your flesh' with a note explaining kinship
  chosen_spanish_reading: Mantener la imagen concreta «hueso y carne de ustedes» y aclararla con nota
  alternative_spanish_readings:
  - «su propia carne y hueso»
  - «su familia cercana»
  rationale: No hay motivo doctrinal para reemplazar el hebraísmo por una explicación en el texto principal. Conservar la imagen respeta la tensión lexical y la nota puede explicar que el sentido es parentesco cercano o sangre.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Lectura política de בַּעֲלֵי שְׁכֶם
  english_pob_reading: the leaders of Shechem
  chosen_spanish_reading: los señores de Siquem
  alternative_spanish_readings:
  - los líderes de Siquem
  - los dueños de Siquem
  rationale: El término no define una institución doctrinal sino una designación social/política. «Señores» conserva la ambigüedad del hebreo sin imponer una interpretación más estrecha de la que la fuente warrants.
  doctrine_reference: Translation philosophy §§1, 2, 6
translation_notes:
  revision_awareness: El registro inglés fue revisado y quedó estable en optimal-equivalence; no se reportaron cambios aplicados. La traducción española sigue esa misma decisión, conservando el paralelismo retórico, el idiomatismo de parentesco y la distinción numérica entre «setenta hombres» y «un solo hombre».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se preserva la transliteración «Jerubaal» para coherencia con el expediente inglés del POB.
  - Se usa «Siquem» como forma española habitual de Shechem.
  - Se evita sustituir «hueso y carne» por una paráfrasis, para no borrar el hebraísmo documentado.
