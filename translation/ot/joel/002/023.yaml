id: JOL.2.23
reference: Joel 2:23
source:
  edition: WLC
  text: וּ/בְנֵ֣י צִיּ֗וֹן גִּ֤ילוּ וְ/שִׂמְחוּ֙ בַּ/יהוָ֣ה אֱלֹֽהֵי/כֶ֔ם כִּֽי נָתַ֥ן לָ/כֶ֛ם אֶת הַ/מּוֹרֶ֖ה לִ/צְדָקָ֑ה וַ/יּ֣וֹרֶד לָ/כֶ֗ם גֶּ֛שֶׁם מוֹרֶ֥ה וּ/מַלְק֖וֹשׁ בָּ/רִאשֽׁוֹן־־׃
translation:
  text: And you[a], children of Zion, rejoice and be glad in Yahweh your God, for he has given you the early rain for righteousness[c][b]; and he causes the rain to come down for you—the early rain and the latter rain as before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the teacher for righteousness' or 'the teacher of righteousness.' The Hebrew word moreh can mean either 'teacher' or 'early rain'; the surrounding mention of rain favors 'early rain' here.
    reason: alternative_reading
  - marker: b
    text: Or, 'in just measure' or 'for your vindication.' The Hebrew phrase literally reads 'for righteousness.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'in the first month.' The Hebrew can also be read as a calendrical reference, though 'as before' fits the restoration context well.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי צִיּוֹן
  chosen: And you, children of Zion
  alternatives:
  - O children of Zion
  - sons of Zion
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' but in direct address to the people of Zion it functions collectively. 'Children of Zion' preserves the familial/covenantal sense without implying only males. The prefixed conjunction is carried as 'And' to preserve discourse flow.
- source_word: גִּילוּ וְשִׂמְחוּ
  chosen: rejoice and be glad
  alternatives:
  - exult and rejoice
  - be glad and rejoice
  lexicon: HALOT
  rationale: The paired imperatives intensify joy. 'Rejoice and be glad' is idiomatic modern English and preserves the twofold exhortation without unnecessary archaism.
- source_word: בַּיהוָה אֱלֹהֵיכֶם
  chosen: in the LORD your God
  alternatives:
  - in Yahweh your God
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The preposition ב marks the sphere/object of rejoicing: ''in the LORD your God.'''
- source_word: כִּי נָתַן לָכֶם
  chosen: for he has given you
  alternatives:
  - because he has given you
  - for he gives you
  lexicon: HALOT
  rationale: 'כִּי here introduces the reason for rejoicing. The perfect נָתַן is best rendered as a completed act with present relevance: ''has given.'''
- source_word: אֶת הַמּוֹרֶה לִצְדָקָה
  chosen: the early rain for righteousness
  alternatives:
  - the teacher for righteousness
  - the early rain in just measure
  - the autumn rain for your vindication
  lexicon: HALOT
  rationale: מוֹרֶה can mean 'teacher' or, in agricultural contexts, 'early rain.' The immediate context continues with גֶּשֶׁם מוֹרֶה וּמַלְקוֹשׁ ('rain, early rain and latter rain'), strongly favoring the meteorological sense here. לִצְדָקָה is difficult; it can denote accordance with what is right/just. 'For righteousness' preserves the lexical link to צדקה without overinterpreting it as merely 'in just measure,' while allowing the covenantal sense that the gift accords with God's righteous dealing.
- source_word: וַיּוֹרֶד לָכֶם
  chosen: and he causes rain to come down for you
  alternatives:
  - and he sends down for you
  - and he has poured down for you
  lexicon: HALOT
  rationale: 'The Hiphil of ירד is causative: ''cause to come down'' or ''send down.'' Because the direct object גֶּשֶׁם follows, ''causes rain to come down for you'' is explicit and natural.'
- source_word: גֶּשֶׁם
  chosen: rain
  alternatives:
  - showers
  lexicon: HALOT
  rationale: Generic term for rain/precipitation; 'rain' is the plain sense.
- source_word: מוֹרֶה וּמַלְקוֹשׁ
  chosen: the early rain and the latter rain
  alternatives:
  - the autumn rain and the spring rain
  lexicon: HALOT
  rationale: 'These are the standard agricultural terms for the seasonal rains in the land: the early/autumn rain and the latter/spring rain. ''Early'' and ''latter'' preserve the lexical pairing and traditional distinction.'
- source_word: בָּרִאשׁוֹן
  chosen: as before
  alternatives:
  - in the first month
  - at the first
  lexicon: HALOT
  rationale: Though רִאשׁוֹן can mean 'first,' in this context the adverbial sense 'as formerly/before' fits the restoration theme and avoids forcing a calendrical reference. A minority reading takes it as 'in the first month,' but the broader context of restoration supports 'as before.'
