translation:
  language: es
  text: Aquel día derrotaron a los filisteos desde Micmas hasta Aijalón[a], y el pueblo estaba muy fatigado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre de lugar hebreo también vertido comúnmente como «Micmash».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - vencieron
  lexicon: HALOT
  rationale: El verbo נכה en narración militar puede abarcar ‘golpear’ y también causar derrota o daño. ‘Hirieron’ conserva la fuerza de acción violenta sin imponer demasiado el resultado, y suena natural en español bíblico moderno.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: That day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - Ese día
  - En aquel día
  lexicon: HALOT
  rationale: Expresa bien la referencia temporal definida del hebreo y mantiene un registro narrativo natural en español.
- source_word: בַּפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: a los filisteos
  alternatives_spanish:
  - contra los filisteos
  - sobre los filisteos
  lexicon: HALOT
  rationale: El hebreo marca el objeto hostil de la acción. En español, ‘herir a’ comunica adecuadamente la agresión contra ese pueblo.
- source_word: מִמִּכְמָשׂ אַיָּלֹנָה
  english_pob_choice: from Mikmash to Aijalon
  chosen_spanish: desde Micmas hasta Aijalón
  alternatives_spanish:
  - desde Michmash hasta Aijalón
  - desde Micmas a Aijalón
  lexicon: HALOT
  rationale: Se conserva el valor direccional del hebreo con ‘desde... hasta...’. ‘Micmas’ reproduce la forma española ya documentada como alternativa lexical para מִכְמָשׂ, mientras ‘Aijalón’ sigue una transliteración clara y tradicionalmente inteligible en español.
- source_word: וַיָּעַף
  english_pob_choice: were very weary
  chosen_spanish: quedó muy cansado
  alternatives_spanish:
  - estaba muy cansado
  - quedaron muy cansados
  - se fatigó mucho
  lexicon: HALOT
  rationale: עיף describe fatiga/agotamiento. En español, el singular colectivo ‘el pueblo’ puede tomarse como unidad y ‘quedó muy cansado’ expresa el estado resultante sin exagerar hacia ‘exhausto’.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: HALOT
  rationale: Aunque ‘the people’ en inglés suele corresponder a ‘el pueblo’, aquí el colectivo hebreo funciona de manera natural con esa forma singular en español y conserva el tono comunitario del relato.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - mucho
  lexicon: HALOT
  rationale: Intensificador adverbial ordinario; ‘muy’ es la equivalencia más directa y sobria en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; esta redacción mantiene la equivalencia óptima del inglés POB y ajusta la sintaxis al español natural sin introducir interpretación adicional.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de lugar ‘Micmas’ para reflejar la alternativa lexical documentada, con nota que preserva la forma común ‘Micmash’.
  - Se evitó ‘exhausto’ para no intensificar más allá del hebreo מְאֹד + וַיָּעַף, optando por una fatiga fuerte pero no explicada en exceso.
  - ‘Aquel día’ conserva el valor deíctico de בַּיּוֹם הַהוּא sin forzar una construcción más arcaica.
