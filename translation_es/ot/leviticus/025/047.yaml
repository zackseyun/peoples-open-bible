translation:
  language: es
  text: Ahora bien, si los recursos del forastero o residente entre ustedes llegan a ser suficientes[a], y tu hermano junto a él se empobrece y se vende al forastero o residente entre ustedes, o a una rama[b] de la familia del forastero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la mano del forastero o residente ... llega a ser suficiente». El hebreo dice literalmente «la mano ... alcanza»; la traducción principal expresa el sentido económico del modismo.'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea es difícil. También podría entenderse: «a la estirpe» o «a un miembro/derivación de la familia de un forastero». El texto principal conserva la imagen familiar con «rama».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׂיג יַד
  english_pob_choice: the means ... become sufficient
  chosen_spanish: la mano ... prospera
  alternatives_spanish:
  - los medios ... llegan a ser suficientes
  - la mano ... alcanza
  - los recursos ... prosperan
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a capacidad económica o recursos suficientes. En español, 'la mano' conserva la imagen original, y 'prospera' comunica de forma natural el aumento de capacidad/recursos sin perder el valor económico del giro.
- source_word: גֵּר
  english_pob_choice: sojourner / resident foreigner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - forastero residente
  - extranjero residente
  lexicon: HALOT
  rationale: El par גֵּר / תּוֹשָׁב combina extranjería y residencia. 'Forastero' mantiene la condición de no pertenencia local; se evita 'SEÑOR' u otros términos litúrgicos, y se conserva la tensión social del término con 'residente'.
- source_word: תוֹשָׁב
  english_pob_choice: resident
  chosen_spanish: residente
  alternatives_spanish:
  - morador
  - avecindado
  - residente temporal
  lexicon: HALOT
  rationale: '''Residente'' es el equivalente más claro y moderno para תּוֹשָׁב en este contexto legal. Mantiene la idea de alguien que habita allí sin diluir la distinción con גֵּר.'
- source_word: וּמָךְ
  english_pob_choice: becomes poor
  chosen_spanish: se empobrece
  alternatives_spanish:
  - se hace pobre
  - cae en pobreza
  - llega a ser pobre
  lexicon: HALOT
  rationale: El verbo expresa un descenso a la pobreza. 'Se empobrece' es directo, actual y suficientemente formal para el registro legal del texto.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu pariente
  - tu hermano de pacto
  lexicon: HALOT
  rationale: Se conserva el lenguaje familiar-covenantal del hebreo. 'Tu hermano' es literal y preserva la fuerza ética y comunitaria del término en la ley.
- source_word: עִמּוֹ
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - con él
  - al lado de él
  - en relación con él
  lexicon: HALOT
  rationale: '''Junto a él'' comunica proximidad espacial y social sin la posible ambigüedad de un simple ''con él''. Encaja con la comparación de estados entre el prosperado y el empobrecido.'
- source_word: וְנִמְכַּר
  english_pob_choice: sells himself
  chosen_spanish: se vende
  alternatives_spanish:
  - se vende a sí mismo
  - es vendido
  - entra en servidumbre
  lexicon: HALOT
  rationale: El contexto legal sugiere autoenajenación por pobreza/deuda. En español, 'se vende' conserva la reflexividad implícita del niphal sin volver la frase pesada o redundante.
- source_word: לְגֵר תּוֹשָׁב עִמָּךְ
  english_pob_choice: to the sojourner or resident among you
  chosen_spanish: al forastero o residente entre ustedes
  alternatives_spanish:
  - al forastero residente entre ustedes
  - al extranjero o residente entre ustedes
  - al forastero que reside entre ustedes
  lexicon: HALOT
  rationale: La duplicación 'forastero o residente' refleja ambas palabras del hebreo. 'Entre ustedes' traduce עִמָּךְ en su sentido comunitario, manteniendo el marco legal-social del pasaje.
- source_word: לְעֵקֶר מִשְׁפַּחַת גֵּר
  english_pob_choice: to an offshoot of a sojourner’s family
  chosen_spanish: a un retoño de la familia del forastero
  alternatives_spanish:
  - a un brote de la familia del forastero
  - a una rama de la familia del forastero
  - a un descendiente de la familia del forastero
  lexicon: HALOT
  rationale: עֵקֶר es difícil y el inglés POB también lo trata como una imagen familiar irregular ('offshoot'). 'Retoño' conserva la metáfora orgánica de rama/brote y señala una derivación familiar sin afirmar más precisión de la que el hebreo permite.
theological_decisions:
- issue: La relación entre גֵּר y תּוֹשָׁב en una ley económica/covenantal
  english_pob_reading: sojourner or resident
  chosen_spanish_reading: forastero o residente
  alternative_spanish_readings:
  - residente extranjero
  - forastero residente
  - extranjero residente
  rationale: El hebreo mantiene dos términos contiguos, y la revisión inglesa también insistió en reflejarlos por separado. En español, conservar ambos evita aplanar la distinción social y legal entre extranjería y residencia estable.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Naturaleza de וְנִמְכַּר en contexto de pobreza
  english_pob_reading: sells himself
  chosen_spanish_reading: se vende
  alternative_spanish_readings:
  - se vende a sí mismo
  - es vendido
  rationale: La ley describe una venta provocada por pobreza, no un mero pasivo impersonal. 'Se vende' preserva la idea de autoentrega económica inferida por el contexto, sin añadir interpretaciones ajenas al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la primera categoría para reflejar ambos términos del hebreo (sojourner / resident) y afinó la expresión difícil de לְעֵקֶר מִשְׁפַּחַת גֵּר. La versión española conserva esa doble referencia, mantiene el registro formal y evita sustituir la imagen familiar difícil por una explicación excesiva.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conservó 'tu hermano' para אָחִיךָ, por su fuerza covenantal y legal.
  - '''Forastero'' y ''residente'' se mantuvieron como pares diferenciados para גֵּר / תּוֹשָׁב.'
  - Se evitó 'siervo' porque el hebreo describe una venta ligada a pobreza, no un rol servicial escogido libremente.
  - '''Retoño'' se eligió como solución transparente para la imagen difícil de עֵקֶר, sin convertirla en paráfrasis interpretativa amplia.'
