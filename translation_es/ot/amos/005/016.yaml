  to: 'Por tanto, así dice Yahvé, el Dios de los ejércitos, el Señor: En todas las plazas habrá llanto, y en todas las calles dirán: «¡Ay! ¡Ay!»[a]. Llamarán al labrador al duelo, y a los que conocen el lamento[b] al llanto.'
  rationale: Se corrigió la anclación de la nota para que corresponda a הוֹ הוֹ, se restauró la nota cultural sobre «los que conocen el lamento», y se cambió «luto» por «llanto» en la primera cláusula para reflejar mejor el valor de מִסְפֵּד como lamentación audible y pública.
