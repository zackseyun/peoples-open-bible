    rationale: «La muerte primogénita» no corresponde bien a «death’s firstborn». La alternativa natural en español es «el primogénito de la muerte» o «el primogénito de la muerte; lit. “el primer nacido de la muerte”». La forma actual puede sugerir que la muerte misma es primogénita.
