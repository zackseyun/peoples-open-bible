  - severity: low
    issue: 'Nota al pie con alternativa española débil: «la carne contraria a la ley»'
    rationale: Esa alternativa desplaza el foco desde el acto de comer hacia la carne misma, cuando el griego describe más bien la acción de comer carne como ilícita. Conviene ofrecer alternativas que mantengan el evento verbal.
  revised_spanish_text: Cuando el tirano lo instaba de esta manera a comer carne ilícitamente[a], Eleazar pidió hablar.
