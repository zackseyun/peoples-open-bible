translation:
  language: es
  text: Yahvé es mi fuerza y mi escudo; en él confía mi corazón[a], y soy ayudado. Por eso mi corazón se alegra[b], y con mi canto[c] lo alabaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en él mi corazón confió'.
    reason: lexical_alternative
  - marker: b
    text: O 'mi corazón exulta'.
    reason: lexical_alternative
  - marker: c
    text: O 'le daré gracias'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte aquí como el nombre propio divino, no como un título genérico. 'Yahvé' preserva la decisión del POB inglés de reproducir el nombre revelado y evita la sustitución litúrgica por 'el SEÑOR'.
- source_word: עֻזִּי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi poder
  - mi fortaleza
  lexicon: HALOT
  rationale: '''עֹז'' denota fuerza, poder o vigor; ''mi fuerza'' es la opción más directa y natural en español, manteniendo el paralelismo con ''mi escudo''.'
- source_word: וּמָגִנִּי
  english_pob_choice: my shield
  chosen_spanish: mi escudo
  alternatives_spanish:
  - mi protector
  - mi defensa
  lexicon: HALOT
  rationale: '''מָגֵן'' es literalmente ''escudo''. Conviene conservar la metáfora concreta, tal como hace el POB inglés, en vez de generalizarla a un término más abstracto.'
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en quien
  lexicon: HALOT
  rationale: Con בְּ en combinación con בטח, el sentido de confianza personal se expresa bien con 'en él', forma idiomática y fiel al valor relacional del hebreo.
- source_word: בָטַח
  english_pob_choice: trusted
  chosen_spanish: confía
  alternatives_spanish:
  - confiaba
  - se apoya
  lexicon: HALOT
  rationale: El hebreo presenta una afirmación actual y poética; el presente 'confía' sigue la revisión inglesa que actualizó el verbo para ajustarse mejor al hebreo, sin forzar una narración pasada.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: '''Corazón'' es la equivalencia estándar para לֵב/לֵבָב en poesía bíblica y conserva el sentido de centro interior de la persona.'
- source_word: וְנֶעֱזָרְתִּי
  english_pob_choice: I am helped
  chosen_spanish: soy ayudado
  alternatives_spanish:
  - he sido ayudado
  - recibo ayuda
  lexicon: HALOT
  rationale: 'El nifal de עזר expresa pasividad: ''soy ayudado'' reproduce con sobriedad la forma verbal y mantiene el presente elegido en la revisión inglesa. Se evita una paráfrasis más interpretativa.'
- source_word: וַיַּעֲלֹז
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - exulta
  - salta de gozo
  lexicon: HALOT
  rationale: '''עלז'' comunica alegría exultante. En español, ''se alegra'' es claro y digno; ''exulta'' sería posible, pero menos natural para lectura pública general.'
- source_word: וּמִשִּׁירִי
  english_pob_choice: with my song
  chosen_spanish: con mi canto
  alternatives_spanish:
  - con mi canción
  - desde mi canto
  - con mi cántico
  lexicon: HALOT
  rationale: El prefijo מִן probablemente expresa medio o acompañamiento. 'Con mi canto' suena natural en español y conserva el sentido de que la alabanza se ofrece cantando.
- source_word: אֲהוֹדֶנּוּ
  english_pob_choice: I will praise him
  chosen_spanish: lo alabaré
  alternatives_spanish:
  - le daré gracias
  - lo daré gracias
  lexicon: HALOT
  rationale: La forma hifil de ידה puede significar 'dar gracias' o 'alabar'. Aquí, en paralelo con 'mi canto', 'lo alabaré' capta bien el impulso doxológico; la lectura de gratitud queda preservada como posibilidad semántica.
theological_decisions:
- issue: Nombre divino en el versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente יְהוָה. La traducción española mantiene el nombre propio divino para ser transparente con la fuente y coherente con la política del POB.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Valor de la expresión final אֲהוֹדֶנּוּ
  english_pob_reading: I will praise him
  chosen_spanish_reading: lo alabaré
  alternative_spanish_readings:
  - le daré gracias
  - lo agradeceré
  rationale: La ambigüedad entre alabanza y acción de gracias está documentada en el inglés POB. En español, 'alabar' funciona mejor con el contexto poético de 'mi canto', sin perder la opción de gratitud implícita.
  doctrine_reference: Lexical ambiguity in ידה / Hiphil; doxological context of Psalms
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para ajustar los verbos al presente ('trusts', 'am helped') y cambiar 'So' por 'Therefore'. La traducción española refleja esa misma actualización con 'confía', 'soy ayudado' y 'Por eso'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio POB para יְהוָה.
  - Se conserva la metáfora concreta 'escudo' sin generalizarla.
  - '''Con mi canto'' reproduce el medio/acompañamiento del hebreo y resulta natural en español.'
  - La puntuación con punto y coma y la secuencia causal reflejan la estructura poética del versículo.
