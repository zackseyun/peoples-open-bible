  text: וְ/קֶ֤צֶף גָּדוֹל֙ אֲנִ֣י קֹצֵ֔ף עַל הַ/גּוֹיִ֖ם הַ/שַּֽׁאֲנַנִּ֑ים אֲשֶׁ֤ר אֲנִי֙ קָצַ֣פְתִּי מְּעָ֔ט וְ/הֵ֖מָּה עָזְר֥וּ לְ/רָעָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/001/015.yaml
  text: And I am exceedingly angry with the nations that are at ease[a]; for I was only a little angry[d][c][b], but they helped forward the disaster.
  footnotes:
  - marker: a
    text: Or 'with great wrath' for 'exceedingly angry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'complacent' for 'at ease.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I was angry for a little while'; the Hebrew may be understood as limited duration, though 'only a little angry' better fits the contrast here.
    reason: alternative_reading
  - marker: d
    text: Literally 'they helped toward evil,' that is, they intensified the calamity.
    reason: lexical_alternative
