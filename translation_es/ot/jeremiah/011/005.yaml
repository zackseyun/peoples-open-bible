translation:
  language: es
  text: 'para que yo establezca el juramento que hice a sus padres[a], para darles una tierra que mana leche y miel, como sucede hoy». Y respondí y dije: «Amén, Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a sus antepasados'. El hebreo dice literalmente 'a sus padres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa bien la finalidad del infinitivo y suena natural en español bíblico moderno sin perder el valor purposivo.
- source_word: הָקִים
  english_pob_choice: I may establish
  chosen_spanish: yo establezca
  alternatives_spanish:
  - yo cumpla
  - yo confirme
  - yo lleve a cabo
  lexicon: HALOT
  rationale: En este contexto de juramento, el verbo apunta a poner en vigor o hacer efectivo lo jurado; 'establezca' sigue de cerca la elección inglesa revisada y conserva la fuerza de קום en hifil.
- source_word: הַשְּׁבוּעָה
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - el voto
  - la promesa jurada
  lexicon: HALOT
  rationale: '''Juramento'' es el equivalente más directo en español para שְׁבוּעָה y funciona bien en un contexto de pacto.'
- source_word: לַאֲבוֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/patriarcas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a vuestros padres'. Mantengo el parentesco masculino plural en el texto principal, como el audit trail inglés, y dejo la alternativa inclusiva en nota.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: para darles
  alternatives_spanish:
  - para entregárselas
  - para concedérsela
  lexicon: HALOT
  rationale: Infinitivo simple y natural en español que conserva la relación de finalidad del juramento.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra abundante en leche y miel
  lexicon: HALOT
  rationale: Preserva la imagen idiomática de abundancia. 'Fluye' sigue la lectura inglesa; 'mana' es una alternativa española igualmente legítima, pero 'fluye' resulta más transparente para lectores amplios.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta este día
  - tal como hoy
  lexicon: HALOT
  rationale: Mantiene la referencia al presente como confirmación de la promesa, con una formulación breve y comprensible en español.
- source_word: וָאַעַן וָאֹמַר
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y contesté y dije
  - Entonces respondí y dije
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa hebrea de doble verbo sin reducirla a un solo verbo.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se mantiene la forma litúrgica y tradicional, que también preserva la respuesta textual inmediata de Jeremías.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el nombre divino, en consonancia con el texto fuente y la política terminológica dada.
theological_decisions:
- issue: Cómo reflejar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma directa. Conforme a la política del proyecto, se conserva el nombre propio divino en español, no una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cómo traducir לַאֲבוֹתֵיכֶם en contexto pactal
  english_pob_reading: to your fathers
  chosen_spanish_reading: a sus padres
  alternative_spanish_readings:
  - a sus antepasados
  - a sus padres/patriarcas
  rationale: El hebreo es literalmente masculino plural y en este contexto evoca a los padres del pacto. Se conserva esa señal semántica en la traducción principal; la opción neutral se deja como alternativa, no como sustitución.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción principal sigue la revisión más reciente del POB inglés al preferir un verbo que corresponda más de cerca a הָקִים ('establezca') y al mantener la forma directa de la respuesta final sin añadir matiz vocativo. También conserva la decisión de renderizar el nombre divino como Yahvé y de no neutralizar automáticamente 'padres' en לַאֲבוֹתֵיכֶם.
  spanish_consistency_notes:
  - Se mantiene Yahvé en todo el pasaje para el Tetragrama, conforme al estándar del proyecto.
  - Se conserva el paralelismo narrativo 'respondí y dije' para reflejar la duplicación verbal hebrea.
  - '''Juramento'' se usa de manera consistente para שְׁבוּעָה en contexto legal-pactual.'
  - La imagen 'tierra que fluye leche y miel' se conserva como fórmula idiomática de abundancia sin explicitarla en exceso.
