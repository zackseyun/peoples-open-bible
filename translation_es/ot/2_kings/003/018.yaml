  revision_awareness: El material de referencia presenta acuerdo alto y no registra revisiones aplicadas; la redacción española sigue de cerca el sentido hebreo y la auditoría inglesa, preservando el modismo evaluativo y la imagen de la mano.
  spanish_consistency_notes:
