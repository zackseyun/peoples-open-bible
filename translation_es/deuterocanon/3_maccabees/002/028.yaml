translation:
  language: es
  text: Que nadie que no sacrifica entre en sus santuarios[a], sino que todos los judíos sean sometidos a inscripción[b] y a estado de esclavitud, y que los que se opongan sean llevados por la fuerza y muertos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus lugares sagrados' o 'sus cosas sagradas'; el griego τὰ ἱερά puede referirse tanto a espacios sagrados como a realidades cultuales.
    reason: lexical_alternative
  - marker: b
    text: '''Inscripción'' puede referirse más específicamente al enrolamiento para control estatal o tributación.'
    reason: cultural_note
  - marker: c
    text: Literalmente, 'remover de la vida'; es decir, darles muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδένα
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Que no entre nadie
  - No sea permitido a nadie
  lexicon: LSJ
  rationale: La construcción prohibitiva del decreto se expresa de manera natural en español con 'Que nadie', que conserva el tono formal e imperativo sin volverse rígido.
- source_word: τῶν μὴ θυόντων
  english_pob_choice: of those who do not sacrifice
  chosen_spanish: que no sacrifica
  alternatives_spanish:
  - de los que no sacrifican
  - de quienes no ofrecen sacrificio
  lexicon: LSJ
  rationale: El participio presente con μή identifica una clase por no participar en el sacrificio cultual. 'No sacrifica' es claro y fiel al valor cultual del verbo.
- source_word: ἐπὶ τὰ ἱερὰ αὐτῶν
  english_pob_choice: their sanctuaries
  chosen_spanish: en sus santuarios
  alternatives_spanish:
  - a sus lugares sagrados
  - en sus cosas sagradas
  lexicon: LSJ
  rationale: ἱερά puede referirse a lugares sagrados, recintos o realidades cultuales. Dado que el verbo siguiente es 'entrar', 'santuarios' transmite de forma natural el sentido espacial/cultual sin reducirlo a un rito abstracto.
- source_word: εἰσιέναι
  english_pob_choice: enter
  chosen_spanish: entre
  alternatives_spanish:
  - ingrese
  - tenga acceso
  lexicon: LSJ
  rationale: El infinitivo de entrada se expresa con 'entre', que mantiene la fuerza de acceso físico/cultual requerida por el contexto.
- source_word: λαογραφίαν
  english_pob_choice: registration
  chosen_spanish: registro
  alternatives_spanish:
  - empadronamiento
  - inscripción
  lexicon: LSJ
  rationale: El término apunta a un enrolamiento poblacional con posible finalidad administrativa o fiscal. 'Registro' es lo bastante amplio y no fuerza un matiz no explicitado.
- source_word: οἰκετικὴν διάθεσιν
  english_pob_choice: slave status
  chosen_spanish: esclavitud
  alternatives_spanish:
  - estado de esclavitud
  - condición servil
  - estatus de esclavo
  lexicon: LSJ
  rationale: La expresión designa una disposición/condición de tipo servil o esclavo. En español, 'esclavitud' preserva mejor la dureza social y jurídica que una formulación suavizada como 'servicio'.
- source_word: ἀχθῆναι
  english_pob_choice: be subjected to
  chosen_spanish: sean sometidos
  alternatives_spanish:
  - sean llevados
  - sean reducidos
  lexicon: LSJ
  rationale: El pasivo de ἄγω expresa ser llevado o puesto bajo una condición impuesta. 'Sean sometidos' comunica bien la imposición coercitiva que gobierna ambos sustantivos siguientes.
- source_word: ἀντιλέγοντας
  english_pob_choice: those who object
  chosen_spanish: los que se opongan
  alternatives_spanish:
  - los que objeten
  - los que contradigan
  lexicon: LSJ
  rationale: El participio denota resistencia o contradicción. 'Se opongan' conserva el valor de oposición activa, más natural en español que un calco literal.
- source_word: βίᾳ φερομένους
  english_pob_choice: be taken by force
  chosen_spanish: sean llevados por la fuerza
  alternatives_spanish:
  - sean arrastrados por la fuerza
  - sean conducidos violentamente
  lexicon: LSJ
  rationale: La frase expresa captura o traslado coercitivo. 'Llevados por la fuerza' mantiene el pasivo y la violencia sin añadir imágenes excesivas.
- source_word: τοῦ ζῇν μεταστῆσαι
  english_pob_choice: put to death
  chosen_spanish: privados de la vida
  alternatives_spanish:
  - dados muerte
  - matados
  - hechos salir de la vida
  lexicon: LSJ
  rationale: El giro idiomático significa remover de la vida, es decir, ejecutar o matar. 'Privados de la vida' conserva el valor idiomático con solemnidad y claridad.
theological_decisions:
- issue: Tratamiento de la coerción estatal sobre una minoría religiosa
  english_pob_reading: Let all the Jews be subjected to registration and slave status, and let those who object be taken by force and put to death.
  chosen_spanish_reading: que todos los judíos sean sometidos a registro y a esclavitud, y que los que se opongan sean llevados por la fuerza y privados de la vida
  alternative_spanish_readings:
  - sean empadronados y reducidos a servidumbre
  - sean inscritos y puestos en condición servil
  rationale: El texto griego describe una política represiva concreta. La traducción española debe conservar su dureza sin suavizarla. 'Esclavitud' comunica con fuerza el carácter opresivo de οἰκετικὴν διάθεσιν, y 'privados de la vida' mantiene el eufemismo idiomático de la fuente sin ocultar la ejecución.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve ethical and social force of coercive terms'
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió la ubicación de τὰ ἱερά con ''enter their sanctuaries'' y reforzó οἰκετικὴν διάθεσιν con ''slave status''. En español se sigue ese ajuste: ''en sus santuarios'' se vincula con ''entre'', y ''esclavitud'' busca reflejar el peso social del término sin diluirlo.'
  spanish_consistency_notes:
  - Se mantiene 'judíos' para τοὺς Ἰουδαίους en continuidad con la terminología del corpus.
  - Se usa 'santuarios' para τὰ ἱερά, dejando abierta la alternativa cultual/espacial en nota.
  - '''Privados de la vida'' conserva el valor idiomático de τοῦ ζῇν μεταστῆσαι sin explicitar de más el mecanismo de muerte.'
  - No se sustituye la coerción del pasaje por formulaciones eufemísticas; el español conserva el registro legal y violento del decreto.
