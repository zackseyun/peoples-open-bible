translation:
  language: es
  text: 'Y el Espíritu[a] revistió a Amasai, jefe de los Treinta, y dijo: «Somos tuyos, David, y contigo, hijo de Isaí. Paz, paz para ti, y paz para tus ayudantes[b], porque tu Dios te ayuda[c]». Entonces David los recibió y los puso como jefes de las tropas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu revistió a Amasai» o «el espíritu vino sobre Amasai». El hebreo dice literalmente que el espíritu “vistió” a Amasai.
    reason: alternative_reading
  - marker: b
    text: O «tu ayudante»; el singular hebreo puede entenderse colectivamente como «tus ayudantes».
    reason: lexical_alternative
  - marker: c
    text: O «porque tu Dios te ha ayudado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרוּחַ לָבְשָׁה
  english_pob_choice: the Spirit clothed
  chosen_spanish: el Espíritu[a] se puso sobre
  alternatives_spanish:
  - un espíritu se puso sobre
  - el espíritu vino sobre
  lexicon: HALOT
  rationale: La imagen hebrea literalmente dice que el espíritu “vistió” a Amasai. En español, «se puso sobre» conserva la idea de investidura/influjo sin sonar forzado, y la mayúscula en «Espíritu» sigue la lectura divina que el POB inglés privilegia, sin borrar la tensión con la lectura alternativa.
- source_word: אֶת עֲמָשַׂי
  english_pob_choice: Amasai
  chosen_spanish: Amasai
  alternatives_spanish:
  - Amasai
  lexicon: N/A
  rationale: Nombre propio transliterado de forma directa y consistente.
- source_word: רֹאשׁ הַשְּׁלֹשִׁים
  english_pob_choice: chief of the Thirty
  chosen_spanish: jefe de los Treinta
  alternatives_spanish:
  - cabeza de los Treinta
  - jefe de los treinta guerreros
  lexicon: HALOT
  rationale: רֹאשׁ aquí tiene sentido de jefe/líder. «Los Treinta» conserva el cuerpo militar reconocido, como en el audit trail inglés con mayúscula convencional para un grupo definido.
- source_word: לְךָ דָוִיד
  english_pob_choice: We are yours, David
  chosen_spanish: Somos tuyos, David
  alternatives_spanish:
  - Somos de ti, David
  - Tuyos somos, David
  lexicon: HALOT
  rationale: La fórmula hebrea es elíptica y expresa lealtad. «Somos tuyos» es natural en español y conserva la relación posesiva/allegiance sin añadir explicaciones.
- source_word: וְעִמְּךָ בֶן יִשַׁי
  english_pob_choice: and with you, son of Jesse
  chosen_spanish: y contigo, hijo de Isaí
  alternatives_spanish:
  - y con ustedes, hijo de Isaí
  - y estamos contigo, hijo de Isaí
  lexicon: HALOT
  rationale: «Contigo» refleja la preposición con el sufijo de segunda persona masculina singular; «hijo de Isaí» mantiene el vocativo del hebreo y la forma fijada en español bíblico.
- source_word: שָׁלוֹם שָׁלוֹם לְךָ
  english_pob_choice: Peace, peace to you
  chosen_spanish: Paz, paz para ti
  alternatives_spanish:
  - Paz, paz a ti
  - Paz sobre ti, paz
  lexicon: HALOT
  rationale: La repetición enfática se preserva. «Para ti» funciona bien en español contemporáneo y mantiene el valor benedictorio del saludo.
- source_word: וְשָׁלוֹם לְעֹזְרֶךָ
  english_pob_choice: and peace to your helpers
  chosen_spanish: y paz para tus ayudadores[b]
  alternatives_spanish:
  - y paz para tu ayudador
  - y paz para los que te ayudan
  lexicon: HALOT
  rationale: El participio singular con sufijo puede entenderse colectivamente. Se opta por «ayudadores» para reflejar esa posibilidad y conservar el vínculo con la nota textual del inglés, sin perder fluidez en español.
- source_word: כִּי עֲזָרְךָ אֱלֹהֶיךָ
  english_pob_choice: for your God helps you
  chosen_spanish: porque tu Dios te ayuda[c]
  alternatives_spanish:
  - porque tu Dios te ha ayudado
  - porque Dios te ayuda
  lexicon: HALOT
  rationale: El verbo puede leerse como ayuda presente/gnómica o como perfecto resultativo. Se conserva el presente, como en el POB inglés, para expresar apoyo divino vigente.
- source_word: וַיְקַבְּלֵם
  english_pob_choice: received them
  chosen_spanish: los recibió
  alternatives_spanish:
  - los aceptó
  - los acogió
  lexicon: HALOT
  rationale: «Recibió» es fiel y narrativamente sobrio; evita sobredeterminar si el matiz es aceptación formal o acogida.
- source_word: וַיִּתְּנֵם בְּרָאשֵׁי הַגְּדוּד
  english_pob_choice: made them chiefs of the troops
  chosen_spanish: los puso como jefes de las tropas
  alternatives_spanish:
  - los nombró jefes del grupo armado
  - los estableció como cabezas de las tropas
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de nombramiento. «Los puso como jefes» comunica la designación de liderazgo; «tropas» reproduce de forma amplia el valor militar de גְּדוּד.
theological_decisions:
- issue: 'Referencia de רוּחַ: ¿Espíritu divino o espíritu/impulso?'
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - un espíritu
  - el espíritu
  rationale: El contexto de Crónicas presenta empoderamiento divino para una proclamación inspirada. La mayúscula mantiene la lectura teológica preferida por el POB, pero la nota permite la alternativa literal sin resolver indebidamente la tensión del hebreo.
  doctrine_reference: Preservar la tensión del original; prioridad del dato lingüístico sobre una armonización doctrinal.
- issue: 'Valor de עֲזָרְךָ אֱלֹהֶיךָ: ayuda pasada o presente'
  english_pob_reading: for your God helps you
  chosen_spanish_reading: porque tu Dios te ayuda
  alternative_spanish_readings:
  - porque tu Dios te ha ayudado
  - porque tu Dios te ayuda continuamente
  rationale: El presente en español comunica mejor la fuerza gnómica/actual del hebreo y coincide con la solución del POB inglés, sin excluir un matiz de acción completada en el contexto.
  doctrine_reference: Tiempo verbal aspectual; no forzar una única lectura temporal.
translation_notes:
  revision_awareness: 'Se siguió el cierre revisado del POB inglés: «We are yours» se volvió una forma más natural en español («Somos tuyos»). También se mantuvo la decisión revisada de leer la acción divina como apoyo presente, sin añadir matices no sustentados por el texto.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología general del proyecto, pero en este versículo no aparece el tetragrámaton; por eso no se usa aquí.
  - Se mantiene «Espíritu» con mayúscula por la lectura divina preferida, aunque la nota deja visible la alternativa literal sin mayúscula.
  - «Los Treinta» se capitaliza como grupo militar definido, siguiendo la convención auditada del inglés POB.
  - «Ayudadores» preserva la ambigüedad singular/colectiva del hebreo y evita suavizarla demasiado.
  - «Jefes de las tropas» traduce el nombramiento final sin introducir estructura eclesiástica ni militar más precisa de lo que el hebreo exige.
