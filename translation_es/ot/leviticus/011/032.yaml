revisions:
- from: 'Y todo lo que caiga sobre ello cuando mueran, quedará impuro: cualquier recipiente de madera, o vestido, o cuero, o saco, cualquier recipiente que se haga para cualquier trabajo; se pondrá en el agua[a], y quedará impuro hasta la tarde; entonces quedará limpio.'
  to: 'Y todo aquello sobre lo que caiga alguno de ellos cuando estén muertos quedará impuro: cualquier objeto de madera, o prenda, o piel, o arpillera, cualquier objeto con el que se haga trabajo; será puesto en el agua[a], y quedará impuro hasta la tarde; entonces quedará limpio.'
  rationale: 'Se revisa para reflejar con mayor precisión el hebreo y el rastro léxico del POB: se añade «alguno de ellos» para מֵהֶם; se cambia «cuando mueran» por «cuando estén muertos»; se corrige la cláusula instrumental a «con el que se haga trabajo»; y se ajustan varios sustantivos («objeto», «prenda», «arpillera») para un español más fiel y natural en contexto legal. La nota alternativa se conserva y se afina levemente en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva la estructura básica del versículo y la secuencia legal de contaminación, lavado y restauración. Sin embargo, pierde dos matices importantes del hebreo y del rastro POB: (1) אֲשֶׁר יִפֹּל עָלָיו מֵהֶם requiere explícitamente «alguno de ellos», no solo «caiga sobre ello»; y (2) כָּל כְּלִי אֲשֶׁר יֵעָשֶׂה מְלָאכָה בָּהֶם significa un objeto con el cual se hace trabajo, no un recipiente «que se haga para cualquier trabajo». También «cuando mueran» es menos preciso que «cuando estén muertos / al estar muertos» en un contexto de cadáveres.'
  spanish_quality_summary: 'El español es comprensible, pero varias elecciones suenan menos naturales o menos exactas para un registro bíblico-legal. «Ello» es torpe aquí; «vestido» es demasiado estrecho frente a בגד; «saco» no expresa bien שַׂק como material tipo arpillera/tela áspera; y la repetición de «cualquier recipiente» reduce claridad. Conviene una redacción más idiomática y precisa: «todo aquello sobre lo que caiga alguno de ellos cuando estén muertos… cualquier objeto con el que se haga trabajo».'
  glossary_alignment: No hay conflicto con terminología de proyecto mayor. La decisión teológica «impuro/limpio» está bien alineada con el sentido ritual-legal. Las mejoras necesarias son léxicas y sintácticas, no doctrinales.
  issues:
  - severity: high
    issue: Se omite el valor distributivo de מֵהֶם en la cláusula relativa.
    rationale: «que caiga sobre ello» no expresa «alguno de ellos / cualquiera de ellos». El hebreo y el English POB señalan que uno de esos cuerpos muertos cae sobre el objeto.
  - severity: high
    issue: La cláusula «cualquier recipiente que se haga para cualquier trabajo» tergiversa כָּל כְּלִי אֲשֶׁר יֵעָשֶׂה מְלָאכָה בָּהֶם.
    rationale: El hebreo describe un objeto con el cual se realiza trabajo, no uno fabricado para trabajo. Además, בָּהֶם es instrumental («con ellos / con el que»), no final («para»).
  - severity: medium
    issue: «cuando mueran» es menos fiel al contexto que «cuando estén muertos».
    rationale: בְּמֹתָם aquí apunta al estado de estar muertos, es decir, al contacto con sus cuerpos muertos, no al momento del acto de morir.
  - severity: medium
    issue: «vestido» restringe innecesariamente בֶּגֶד.
    rationale: בגד es más amplio, «prenda» o «ropa/vestidura» funciona mejor en un inventario legal de materiales/objetos.
  - severity: medium
    issue: «saco» no refleja bien שָׂק en este contexto.
    rationale: El término apunta al material tosco conocido como sackcloth; en español bíblico general «arpillera» o «tela áspera» comunica mejor que un saco concreto.
  - severity: low
    issue: «ello» suena poco natural en español contemporáneo de lectura eclesial.
    rationale: «Aquello» o una reformulación con «sobre lo que» evita rigidez sin perder fidelidad.
  revised_spanish_text: 'Y todo aquello sobre lo que caiga alguno de ellos cuando estén muertos quedará impuro: cualquier objeto de madera, o prenda, o piel, o arpillera, cualquier objeto con el que se haga trabajo; será puesto en el agua[a], y quedará impuro hasta la tarde; entonces quedará limpio.'
  revised_footnotes:
  - marker: a
    text: 'O: «será introducido en el agua». El hebreo literalmente dice: «será traído al agua».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar con mayor precisión el hebreo y el rastro léxico del POB: se añade «alguno de ellos» para מֵהֶם; se cambia «cuando mueran» por «cuando estén muertos»; se corrige la cláusula instrumental a «con el que se haga trabajo»; y se ajustan varios sustantivos («objeto», «prenda», «arpillera») para un español más fiel y natural en contexto legal. La nota alternativa se conserva y se afina levemente en español.'
