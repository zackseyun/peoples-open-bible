translation:
  language: es
  text: Porque tú eres mi esperanza, Señor Yahvé[a], mi confianza desde mi juventud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'Señor Yahvé' (título + nombre divino).
    reason: source_note
  - marker: b
    text: O 'desde joven'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. 'Porque' conserva bien el valor explicativo/causal y suena natural en español bíblico moderno.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre de segunda persona singular queda explícito en el hebreo y mantiene la dirección personal de la oración.
- source_word: תִקְוָתִי
  english_pob_choice: my hope
  chosen_spanish: mi esperanza
  alternatives_spanish:
  - mi expectativa
  lexicon: HALOT
  rationale: El sustantivo expresa esperanza/expectativa. 'Esperanza' es la opción más natural y transparente en español en este contexto de confianza dirigida a Dios.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahveh
  - Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוָה. En español, 'Señor Yahvé' preserva la distinción entre título y nombre propio sin recurrir a una sustitución enmascaradora como 'SEÑOR'.
- source_word: מִבְטַחִי
  english_pob_choice: my confidence
  chosen_spanish: mi confianza
  alternatives_spanish:
  - mi seguridad
  - mi refugio
  lexicon: HALOT
  rationale: El término señala aquello en lo que uno confía. 'Confianza' conserva esa fuerza relacional y resulta idiomática junto a 'esperanza'.
- source_word: מִנְּעוּרָי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde que era joven
  - desde mis años mozos
  lexicon: HALOT
  rationale: La preposición marca punto de inicio temporal. 'Desde mi juventud' expresa de modo claro y fiel la continuidad de la confianza a lo largo de toda la vida.
theological_decisions:
- issue: Representación del nombre divino יְהוָה junto con אֲדֹנָי
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor el Yahvé
  - Señor Yahveh
  rationale: El texto hebreo contiene el título 'Adonai' junto al nombre divino. Dado el estándar del proyecto para יְהוָה, se usa 'Yahvé' en español; 'Señor' traduce el título y mantiene la lectura reverente y legible sin ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente del expediente cambió la representación inglesa de 'Lord GOD' a 'Lord Yahweh' para reflejar más directamente יְהוָה. La presente versión española sigue esa misma dirección y evita la convención enmascaradora, manteniendo además el paralelo poético entre 'esperanza' y 'confianza'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יְהוָה, conforme al estándar del proyecto.
  - Se usa 'Señor' para אֲדֹנָי y no 'Señor el Señor', por claridad y fluidez en español.
  - '''esperanza'' y ''confianza'' conservan el campo semántico de expectación y seguridad personal sin forzar una repetición innecesaria.'
