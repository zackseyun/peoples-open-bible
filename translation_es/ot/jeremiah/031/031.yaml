translation:
  language: es
  text: Miren[a], vienen días, declara Yahvé, cuando haré un nuevo pacto con la casa de Israel y con la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pacto renovado». El adjetivo hebreo normalmente significa «nuevo», pero algunos intérpretes subrayan la continuidad del pacto y lo entienden como «renovado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención profética. «Mira» reproduce mejor el impacto directo y natural del inglés «Look» que el arcaísmo «He aquí», sin perder la fuerza deíctica.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - los días vienen
  - vienen los días
  lexicon: HALOT
  rationale: La expresión profética anuncia un tiempo futuro inminente. «Vienen días» conserva la imagen y la fluidez natural del español; omitir el artículo puede sonar más proverbial y enérgico.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: «Declara Yahvé» conserva el tono solemne de la fórmula profética y sigue el estándar POB de traducir יְהוָה como «Yahvé» en el texto principal.
- source_word: וְכָרַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - cortaré
  - estableceré
  - haré un pacto
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal «cortar» un pacto, pero en español «haré un pacto» sería más natural. Aquí se ha condensado en «haré» porque el objeto «un nuevo pacto» ya expresa el acto pactal, manteniendo la equivalencia funcional sin añadir rigidez. La alternativa «estableceré» sería más interpretativa.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la casa de Israel
  - la familia de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen corporativa de «casa» en lugar de suavizarla a «pueblo», porque la frase pertenece al lenguaje pactal del hebreo.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - la casa de Judá
  - la familia de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «la casa de Israel» y la formulación corporativa del original.
- source_word: בְּרִית חֲדָשָׁה
  english_pob_choice: a new covenant
  chosen_spanish: un nuevo pacto
  alternatives_spanish:
  - un pacto nuevo
  - un pacto renovado
  - una alianza nueva
  lexicon: HALOT
  rationale: «Pacto» es el término bíblico más reconocido en español y comunica bien בְּרִית; «nuevo» traduce el sentido directo de חֲדָשָׁה. «Renovado» quedaría como interpretación teológica alternativa, no como sentido primario.
theological_decisions:
- issue: Si חֲדָשָׁה debe interpretarse como «nuevo» o «renovado»
  english_pob_reading: new covenant
  chosen_spanish_reading: nuevo pacto
  alternative_spanish_readings:
  - pacto renovado
  - pacto restablecido
  rationale: El adjetivo hebreo expresa de manera directa novedad. Aunque algunas lecturas teológicas subrayan continuidad del pacto, el texto base favorece «nuevo»; por eso se mantiene en el texto principal y se deja la alternativa solo como posibilidad interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue el último estado de revisión disponible, que no requiere cambios sustantivos, y conserva la decisión principal del inglés POB de traducir חֲדָשָׁה como «nuevo» en el texto principal, dejando la lectura «renovado» como nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la norma del proyecto para יהוה.
  - Se mantiene «casa de Israel / casa de Judá» para conservar el lenguaje corporativo pactal.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Pacto» se prefiere a «alianza» por coherencia bíblica y terminológica en español.
  - La nota al pie preserva la tensión lexical entre novedad y renovación sin resolverla interpretativamente en el cuerpo del texto.
