id: JDG.20.48
reference: Judges 20:48
source:
  edition: WLC
  text: וְ/אִ֨ישׁ יִשְׂרָאֵ֜ל שָׁ֣בוּ אֶל בְּנֵ֤י בִנְיָמִן֙ וַ/יַּכּ֣וּ/ם לְ/פִי חֶ֔רֶב מֵ/עִ֤יר מְתֹם֙ עַד בְּהֵמָ֔ה עַ֖ד כָּל הַ/נִּמְצָ֑א גַּ֛ם כָּל הֶ/עָרִ֥ים הַ/נִּמְצָא֖וֹת שִׁלְּח֥וּ בָ/אֵֽשׁ־־־־־׃פ
translation:
  text: And the men of Israel turned back against the sons of Benjamin and struck them with the edge of the sword[a], from each city, men to livestock, even all that was found[c][b]. Also all the cities that were found they set on fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Benjamin'; that is, the Benjaminites.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'from each city, men' is difficult. It likely means that they struck down the inhabitants of the cities completely, along with the livestock and everything else found there.
    reason: lexical_alternative
  - marker: c
    text: Or 'they put to the torch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - each man of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Though אִישׁ is singular in form, with a collective sense before a plural verb it functions distributively/collectively. 'The men of Israel' best reflects the masculine, military referent in context and follows the gender-accurate principle better than the more generic 'people of Israel'.
- source_word: שָׁבוּ
  chosen: turned back
  alternatives:
  - returned
  lexicon: HALOT
  rationale: The verb שוב here marks a reversal of movement back toward Benjaminite territory after the battle. 'Turned back' captures the narrative motion more vividly than the flatter 'returned'.
- source_word: אֶל בְּנֵי בִנְיָמִן
  chosen: against the sons of Benjamin
  alternatives:
  - to the Benjaminites
  - against the Benjaminites
  lexicon: HALOT
  rationale: Because the following verb is hostile, English idiom requires 'against' rather than a simple 'to.' 'Sons of Benjamin' preserves the Hebrew kinship expression, though 'Benjaminites' is a viable smoother alternative.
- source_word: וַיַּכּוּם
  chosen: struck them
  alternatives:
  - killed them
  - smote them
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/defeating/slaying. Since the verse then specifies the manner ('with the edge of the sword'), 'struck them' preserves the Hebrew wording without over-specifying beyond the text.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This is the standard idiom literally involving the 'mouth/edge' of the sword. 'With the edge of the sword' is a natural English equivalent that preserves the concrete imagery better than the more generalized 'by the sword'.
- source_word: מֵעִיר מְתֹם
  chosen: from each city, men
  alternatives:
  - from the city, whole
  - city and all within it
  - from city, entirety
  lexicon: HALOT
  rationale: The phrase is difficult. מְתֹם likely conveys completeness/wholeness, and in context the sense is that they struck down the inhabitants of the cities completely. Rendering 'from each city, men' makes explicit the implied human referent while preserving the city-by-city scope. The completeness nuance is then carried by the following phrases 'to livestock, even all that was found.'
- source_word: עַד בְּהֵמָה
  chosen: to livestock
  alternatives:
  - as far as the cattle
  - including livestock
  lexicon: HALOT
  rationale: The עד construction here extends the scope of destruction from humans to animals. 'To livestock' is concise and natural in English.
- source_word: עַד כָּל הַנִּמְצָא
  chosen: even all that was found
  alternatives:
  - and all that was found
  - everything that was found
  lexicon: HALOT
  rationale: This phrase rounds out the totality of the destruction. 'Even all that was found' preserves the climactic force of עַד while remaining readable.
- source_word: גַּם כָּל הֶעָרִים הַנִּמְצָאוֹת
  chosen: Also all the cities that were found
  alternatives:
  - Moreover, all the cities they came upon
  - And all the cities that remained
  lexicon: HALOT
  rationale: The participle from מצא likely means the cities encountered/located by the Israelites. 'That were found' is formally close to the Hebrew; a smoother idiom is possible, but this keeps the lexical link with the previous 'all that was found.'
- source_word: שִׁלְּחוּ בָאֵשׁ
  chosen: they set on fire
  alternatives:
  - they sent into the fire
  - they put to the torch
  - they burned
  lexicon: HALOT
  rationale: The idiom literally involves 'sending into fire.' 'Set on fire' is clear modern English and avoids archaic phrasing while preserving the action.
