review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Elías toma doce piedras, en correspondencia con las doce tribus, y la cláusula relativa remite correctamente a Jacob como aquel a quien llegó la palabra de Yahvé: «Israel será tu nombre». También mantiene bien Yahvé para יְהוָה y la cita de renombramiento. Sin embargo, la nota al pie [a] está mal anclada y no corresponde al lugar donde existe la alternativa léxica en la evidencia inglesa: la alternativa afecta «los hijos de Jacob», no «doce piedras».'
  spanish_quality_summary: El español es claro y digno, pero «a quien había venido la palabra de Yahvé» suena algo menos natural que «a quien había llegado la palabra de Yahvé» o «a quien vino la palabra de Yahvé». Además, la puntuación con dos puntos tras «diciendo» funciona bien. El principal problema de calidad editorial es la colocación incorrecta de la nota [a].
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֵלִיָּהוּ -> «Elías», שִׁבְטֵי -> «tribus», בְנֵי יַעֲקֹב -> «los hijos de Jacob». No hay conflicto doctrinal ni terminológico mayor. La única corrección necesaria es reubicar la nota lexical al sintagma pertinente y mejorar levemente la naturalidad de «había venido».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «doce piedras» pero su contenido trata sobre «los hijos de Jacob».
    rationale: La evidencia inglesa preserva una alternativa léxica para בְנֵי יַעֲקֹב («sons/children of Jacob»). En español, esa nota debe anclarse en «los hijos de Jacob», no en «doce piedras».
  - severity: low
    issue: «a quien había venido la palabra de Yahvé» es comprensible pero algo rígido en español.
    rationale: Para la fórmula הָיָה דְבַר־יְהוָה אֵלָיו, «había llegado» suena más natural y sigue siendo fiel al sentido de una palabra divina que llega al destinatario.
  revised_spanish_text: 'Y Elías tomó doce piedras, según el número de las tribus de los hijos[a] de Jacob, a quien había llegado la palabra de Yahvé, diciendo[b]: «Israel será tu nombre.»'
  revised_footnotes:
  - marker: a
    text: O, «los hijos de Jacob». El hebreo dice literalmente «los hijos de Jacob».
    reason: lexical_alternative
  - marker: b
    text: 'Esto recuerda el renombramiento de Jacob por Dios en Génesis 32:28; 35:10: «Israel será tu nombre».'
    reason: cross_reference
  revision_rationale: 'Se requiere una reparación menor: mover la nota [a] al sintagma correcto («los hijos[a] de Jacob») para que corresponda a la alternativa léxica documentada, y pulir «había venido» a «había llegado» para un español más natural sin cambiar el sentido. No hace falta adjudicación adicional.'
