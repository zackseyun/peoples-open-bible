review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el hermano ya no era útil para sus torturadores, se ordena llevarlo al fuego mientras aún vive, freírlo en la sartén, y luego los demás se animan con su madre a morir con nobleza. Sin embargo, hay dos desajustes importantes: la nota [a] convierte en alternativa ''para los demás'' lo que en realidad corresponde a τοῖς λοιποῖς mejor que el texto principal ''para ellos''; y la frase ''había alcanzado ya gran medida'' no representa con naturalidad ni precisión ἐφʼ ἱκανὸν διδούσης, que describe la emisión abundante/considerable del vapor desde la sartén.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una construcción poco natural en 'el vapor de la sartén había alcanzado ya gran medida'. También 'diciendo así' suena algo calcado; 'diciendo esto' o 'diciendo:' sería más natural. La colocación de 'todavía respirando' es aceptable, aunque 'mientras todavía respiraba' fluye mejor en español narrativo.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas clave son en general adecuadas: ''inútil'', ''fuego'', ''sartén'', ''morir noblemente''. La principal corrección léxica/documental es alinear τοῖς λοιποῖς con ''para los demás'' en el texto principal, y reservar la nota para la alternativa intensiva de ἔτινουν, tal como hace la auditoría inglesa.'
  issues:
  - severity: medium
    issue: El texto principal usa 'para ellos' donde el griego dice τοῖς λοιποῖς.
    rationale: La auditoría inglesa adoptó 'to them' por naturalidad, pero dejó claro que el griego se refiere a 'los demás/los restantes'. En español, 'para los demás' es natural y preserva mejor el referente explícito.
  - severity: high
    issue: La nota [a] está anclada a la frase equivocada y no preserva la alternativa documentada para ἔτινουν.
    rationale: La auditoría inglesa usa la nota de alternativa para 'while still breathing' / 'while he was still alive', no para τοῖς λοιποῖς. La nota española actual introduce un comentario interpretativo distinto y desplaza una alternativa fuente-significativa.
  - severity: medium
    issue: '''Había alcanzado ya gran medida'' es poco idiomático y no expresa bien ἐφʼ ἱκανὸν διδούσης.'
    rationale: El griego describe que la sartén estaba despidiendo vapor/humos en cantidad considerable. En español conviene algo como 'despedía abundante vapor' o 'el vapor... se había extendido considerablemente'.
  - severity: low
    issue: La nota [b] repite 'vapor' como alternativa y no incluye 'steam' con claridad.
    rationale: 'La nota debería presentar alternativas reales: ''el humo'' o ''los humos'', quizá ''el vapor/los vapores'', explicando que ἀτμίς puede denotar vapor o humos/fumes en este contexto.'
  - severity: low
    issue: '''Diciendo así'' suena algo rígido en español contemporáneo.'
    rationale: Aunque no es incorrecto, 'diciendo esto:' o 'diciendo:' es más natural y sigue siendo fiel a λέγοντες οὕτως.
