revisions:
- from: 'Así Samuel le contó todas las palabras y no le ocultó nada[a]. Y dijo: «Yahvé[b] es él; hará lo que es bueno a sus ojos»[c].'
  to: 'Así Samuel le contó todas las palabras y no le ocultó nada. Y dijo: «Él es Yahvé; que haga lo que es bueno a sus ojos[a]»[b].'
  rationale: 'Se corrige el texto para alinear la lectura principal con la decisión auditada de la POB inglesa: una expresión sumisa («que haga») en el texto base, con el futuro como alternativa en nota. También se mejora la naturalidad del español con «Él es Yahvé» y se reubican las notas para que expliquen el modismo hebreo «a sus ojos» y la alternativa verbal documentada. Se elimina la nota redundante.'
