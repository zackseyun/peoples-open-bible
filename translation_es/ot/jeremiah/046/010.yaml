    rationale: La nota inglesa [a] trata de «has a sacrifice / there is a sacrifice», mientras que la española [a] está puesta en «Yahvé Dios de los Ejércitos». La nota española [b] trata la cláusula existencial, pero está anclada a «tierra del norte». Esto rompe la trazabilidad del audit trail y la disciplina de anclaje requerida.
  - severity: medium
