  text: λέγει γὰρ ἡ γραφή· Βοῦν ἀλοῶντα οὐ φιμώσεις, καί· Ἄξιος ὁ ἐργάτης τοῦ μισθοῦ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/018.yaml
  text: For the Scripture says[a], “You shall not muzzle an ox while it is threshing,” and[b], “The laborer is worthy of his wages.”
  footnotes:
  - marker: a
    text: Or “treading out grain.” The Greek participle refers to an ox engaged in threshing.
    reason: lexical_alternative
  - marker: b
    text: Or “The laborer is worthy of his pay.”
    reason: lexical_alternative
translation:
  language: ko
  text: 성경이 말씀하기를, 「곡식을 떠는[a] 소의 입에 망을 씌우지 말라」 하셨고, 또한 「일꾼은 자기 삯[b]을 받기에 합당하다」 하셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「곡식을 밟는」. 헬라어 분사는 타작하는 소를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기 품삯」 「자기 보수」.
    reason: lexical_alternative
