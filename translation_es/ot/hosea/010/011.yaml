  timestamp: '2026-05-07T23:05:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la imagen agrícola general: Efraín como novilla entrenada que amaba trillar, seguida por una transición a labor más pesada para Efraín, Judá y Jacob. Sin embargo, dos elecciones no preservan de manera suficientemente fiel la decisión auditada del POB: «respeté su hermoso cuello» no comunica bien el sentido de haberlo perdonado/escatimado, y «hará el rastreo» suena poco natural y menos preciso que una formulación española agrícola más clara. También conviene alinear el verbo principal con la revisión inglesa final («harness») sin perder la nota literal.'
  spanish_quality_summary: El texto es mayormente claro, pero tiene giros mejorables para español eclesial natural. «Respeté su hermoso cuello» resulta semánticamente extraño en este contexto; «hará el rastreo» es entendible por la nota, pero no suena idiomático. «Novilla entrenada» y «amaba trillar» son buenas opciones. La sintaxis general es fluida.
  glossary_alignment: No hay términos de glosario mayor en conflicto. Los nombres propios están bien. La decisión sobre אַרכיב debe expresarse en español de manera más directa y natural, idealmente «unciré» o «pondré bajo arnés/yugo»; y la cláusula difícil sobre el cuello debe reflejar la racionalidad documentada de haberle perdonado una carga más dura.
  issues:
  - severity: medium
    issue: «respeté su hermoso cuello» no refleja adecuadamente «I spared her fair neck»
    rationale: «Respetar» en español normalmente significa mostrar consideración o deferencia, pero aquí no comunica con claridad la idea contextual de no imponer aún una carga pesada. «Perdoné/escatimé su hermoso cuello» o «le perdoné su hermoso cuello» preserva mejor la decisión léxica y teológica auditada.
  - severity: medium
    issue: «hará el rastreo» es poco natural en español bíblico general
    rationale: Aunque intenta evitar tecnicismo, la expresión no es idiomática. «Pasará la rastra» o «desmenuzará los terrones» comunica mejor la labor posterior al arado; además se alinea mejor con la nota cultural del POB.
  - severity: low
    issue: La nota b y el texto principal no están del todo alineados en naturalidad
    rationale: El texto principal dice «pondré a Efraín bajo el yugo», mientras la revisión inglesa final favorece «I will harness Ephraim». En español, «unciré a Efraín» o «pondré arnés a Efraín» sería más directo, pero «pondré a Efraín bajo el yugo» sigue siendo fiel. Se recomienda una forma más idiomática y concisa.
  revised_spanish_text: Efraín era una novilla[a] entrenada, que amaba trillar, y yo le perdoné su hermoso cuello.[b] Unciré a Efraín; Judá arará; Jacob pasará la rastra[c] para él.
  revised_footnotes:
