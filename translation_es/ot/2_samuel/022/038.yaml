translation:
  language: es
  text: Perseguí a mis enemigos y los destruí[a], y no volví atrás hasta que fueron consumidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que los consumí»; «hasta que fueron acabados»; o «hasta que llegaron a su fin». El verbo hebreo puede expresar terminar, consumir o llevar algo a su fin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרְדְּפָ֥ה
  english_pob_choice: I pursued
  chosen_spanish: Perseguí
  alternatives_spanish:
  - los perseguí
  - seguí persiguiendo
  lexicon: HALOT
  rationale: רדף en qal expresa perseguir o dar caza. «Perseguí» es natural en español, mantiene el movimiento militar del verso y no agrega matices de continuidad que el hebreo no exige de forma explícita.
- source_word: אֹיְבַ֖י
  english_pob_choice: my enemies
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a los que me eran hostiles
  - a mis adversarios
  lexicon: HALOT
  rationale: אויב con sufijo de primera persona singular significa literalmente «mis enemigos». Se conserva el sentido personal y bélico del original.
- source_word: וָאַשְׁמִידֵ֑ם
  english_pob_choice: and destroyed them
  chosen_spanish: los destruí
  alternatives_spanish:
  - los exterminé
  - los aniquilé
  - los borré
  lexicon: HALOT
  rationale: שׁמד en causativo expresa destruir, exterminar o arrasar. «Los destruí» refleja bien la fuerza del verbo sin caer en una intensificación demasiado interpretativa para el español corriente.
- source_word: וְלֹ֥א אָשׁ֖וּב
  english_pob_choice: and I did not turn back
  chosen_spanish: y no volví atrás
  alternatives_spanish:
  - y no regresé
  - y no me di vuelta
  lexicon: HALOT
  rationale: שׁוב aquí alude a volver atrás de la persecución, no a regresar al hogar. «No volví atrás» conserva la imagen de no abandonar la caza o el avance militar.
- source_word: עַד כַּלּוֹתָֽ/ם
  english_pob_choice: until they were consumed
  chosen_spanish: hasta que fueron consumidos
  alternatives_spanish:
  - hasta que los consumí
  - hasta que fueron destruidos por completo
  - hasta su consumación
  lexicon: HALOT
  rationale: כלה puede significar terminar, consumir o llevar a su fin. La pasiva «fueron consumidos» sigue de cerca la revisión final inglesa y mantiene la posible tensión entre consumación y destrucción total sin resolverla prematuramente.
theological_decisions:
- issue: Intensidad de destrucción final en el cierre del verso
  english_pob_reading: until they were consumed
  chosen_spanish_reading: hasta que fueron consumidos
  alternative_spanish_readings:
  - hasta que los consumí
  - hasta que fueron destruidos por completo
  - hasta su consumación
  rationale: El hebreo permite tanto la idea de consumir como la de llevar a término o acabar completamente. Se preserva esa amplitud con «fueron consumidos», que suena formal y no borra la ambigüedad semántica documentada por la nota inglesa.
  doctrine_reference: Hebrew verb כלה; lexical-semantic range rather than doctrinal assertion
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó «were finished off» por «were consumed» para reflejar con mayor cercanía el hebreo y mantener un registro más formal. Por eso se eligió «fueron consumidos» en vez de una paráfrasis más idiomática.
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé / Mesías / Cristo» fuera de este versículo, por no aparecer en el texto.
  - Se usa pasado perfecto simple en español para reflejar la sucesión narrativa y bélica del hebreo.
  - La nota al pie conserva la alternativa semántica importante sin introducir una lectura doctrinal añadida.
