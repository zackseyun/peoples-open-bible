    reason: lexical_alternative
  - marker: b
    text: O ‘el glorioso monte santo’. La expresión hebrea puede referirse al monte santo en su belleza o esplendor, probablemente a Sion/Jerusalén.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes de las notas para que correspondan a las expresiones correctas del hebreo y del audit trail inglés: [a] con ‘su pabellón real’ y [b] con ‘el hermoso monte santo’. No se requieren cambios sustantivos adicionales en el texto principal.'
