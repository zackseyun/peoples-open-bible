lexical_decisions:
- source_word: וִיהֻד
  english_pob_choice: Jehud
  chosen_spanish: Jehud
  alternatives_spanish:
  - Yehud
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar en una lista de ciudades. Mantengo la transliteración como topónimo, siguiendo la decisión inglesa; 'Jehud' es la forma más establecida en español bíblico para este nombre, aunque 'Yehud' reflejaría más de cerca la yod inicial.
- source_word: וּבְנֵי בְרַק
  english_pob_choice: Bene-berak
  chosen_spanish: Bene-berak
  alternatives_spanish:
  - Bnei-berak
  - Bene-beraq
  lexicon: HALOT
  rationale: En este contexto funciona como un nombre de lugar compuesto, no como la frase común 'hijos de Berak'. Conservo el compuesto con guion para señalar que es un solo topónimo, como en el registro inglés.
- source_word: וְגַת רִמּוֹן
  english_pob_choice: Gath-rimmon
  chosen_spanish: Gat-rimón
  alternatives_spanish:
  - Gat Rimón
  lexicon: HALOT
  rationale: También es un topónimo compuesto. Uso 'Gat-rimón' con guion para reflejar la unidad del nombre de la ciudad y adaptar la forma al español, manteniendo la estructura del compuesto hebreo.
translation_notes:
  revision_awareness: El texto inglés revisado permaneció sin cambios y fue verificado con alta concordancia; por ello, la versión española sigue la misma segmentación de topónimos y conserva las opciones de glosa donde el hebreo podría leerse de manera composicional, aunque el contexto favorece nombres propios de ciudades.
  spanish_consistency_notes:
  - He mantenido la transliteración de los tres topónimos como nombres propios de una lista territorial.
  - Conservo el guion en los compuestos para ayudar a reconocer una sola entidad geográfica.
  - La nota de Bene-berak preserva la tensión entre lectura composicional y lectura toponímica, tal como en el audit trail inglés.
  - '''Gat-rimón'' se adapta con tilde por la forma española de ''rimón'' y se entiende como un solo nombre de ciudad.'
