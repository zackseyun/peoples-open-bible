translation:
  language: es
  text: Terrores[a] lo alcanzan como aguas; de noche, una tormenta[b] se lo lleva furtivamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como inundaciones».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «tempestad» o «torbellino».'
