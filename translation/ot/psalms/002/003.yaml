theological_decisions:
- issue: Metaphor of divine/royal restraint
  chosen_reading: Render the imagery concretely as physical restraints ('chains'/'ropes') without interpreting them as specifically oppressive or liberating in the translation itself.
  alternative_readings:
  - Use more abstract terms such as 'bonds' and 'cords'
  rationale: The speakers in context are rebellious nations rejecting the LORD and his Anointed, but the verse itself presents their words metaphorically. A concrete rendering preserves the poetic force and avoids importing an interpretive judgment into the line beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
