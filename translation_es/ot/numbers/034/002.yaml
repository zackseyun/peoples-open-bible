review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: mandato a Moisés, referencia a los hijos de Israel, entrada en la tierra de Canaán, y la tierra asignada como herencia dentro de sus límites. Sin embargo, hay un desajuste menor en las notas: la nota [a] española comenta «y diles a ellos», pero el anclaje [a] está puesto tras «diles» mientras que en la POB inglesa la nota a corresponde al modismo «that will fall to you / be allotted to you». Además, conviene reflejar esa alternativa idiomática donde realmente ocurre. También puede mejorarse «fronteras» a «límites» o «bordes» para un contexto de delimitación territorial interna, aunque «fronteras» no es erróneo.'
  spanish_quality_summary: El español es claro, natural y digno. «Ordena», «los hijos de Israel» y «Cuando entren» funcionan bien. «Les tocará en herencia» es idiomático y comunica adecuadamente el valor de asignación. La frase final suena mejor con «según sus límites» que con «conforme a sus fronteras», porque se trata de delimitación territorial formal más que de fronteras estatales modernas.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Hijos de Israel» preserva la literalidad documentada. «Canaán» está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal corrección es alinear la nota léxica con אֲשֶׁר תִּפֹּל לָכֶם y ajustar «fronteras» a una opción más fiel al matiz de לִגְבֻלֹתֶיהָ.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado y comenta un detalle secundario no priorizado por la auditoría inglesa.
    rationale: La nota inglesa [a] explica el modismo hebreo «caer/tocar» de la porción asignada, no «y diles a ellos». En español, si se conserva una nota, debe anclarse en «les tocará» o expresión equivalente.
  - severity: low
    issue: «Conforme a sus fronteras» suena algo moderno-político para לִגְבֻלֹתֶיהָ.
    rationale: En un listado de límites territoriales, «según sus límites» reproduce mejor el sentido de delimitación geográfica formal.
