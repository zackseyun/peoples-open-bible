translation:
  language: es
  text: 'a quienes Yahvé de los Ejércitos[a] ha bendecido, diciendo: «Bendito sea Egipto, mi pueblo, y Asiria, la obra de mis manos[b] e Israel, mi heredad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé de las huestes».
    reason: lexical_alternative
  - marker: b
    text: Los títulos «mi pueblo» y «la obra de mis manos», frecuentemente asociados con Israel, aquí se aplican también a Egipto y Asiria.
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Hostes
  - el SEÑOR de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé», siguiendo el criterio del proyecto, y צְבָאוֹת se vierte con el plural militar transparente «Ejércitos». «Hostes» es tradicional, pero menos claro para el lector moderno.
- source_word: בֵּרֲכוֹ
  english_pob_choice: has blessed
  chosen_spanish: ha bendecido
  alternatives_spanish:
  - bendijo
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción divina ya realizada con vigencia presente; el pretérito perfecto compuesto («ha bendecido») comunica bien esa relación en español.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a quien
  - los que
  lexicon: HALOT
  rationale: El relativo introduce un antecedente colectivo implícito y, en español, «a quienes» mantiene la referencia personal y la función de complemento marcada por la oración.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  lexicon: HALOT
  rationale: La fórmula benedictoria hebrea pide un giro optativo/sentencial en español; «Bendito sea» preserva mejor el valor litúrgico y exhortativo que «Bendito es».
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo mío
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente natural y bíblico de עַם en este contexto. Se conserva el posesivo «mi» para mantener la tensión teológica de aplicar a Egipto un título asociado al pacto.
- source_word: וּמַעֲשֵׂה יָדַי
  english_pob_choice: and the work of my hands
  chosen_spanish: la obra de mis manos
  alternatives_spanish:
  - el trabajo de mis manos
  - la hechura de mis manos
  lexicon: HALOT
  rationale: «Obra de mis manos» reproduce con naturalidad la imagen creativa del hebreo y evita endurecer el español con una estructura más literal que resultaría menos idiomática.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: Se usa el nombre geográfico e histórico estándar en español. «Asur» es posible, pero menos transparente para lectores generales.
- source_word: וְנַחֲלָתִי
  english_pob_choice: and Israel my inheritance
  chosen_spanish: e Israel, mi heredad
  alternatives_spanish:
  - e Israel, mi herencia
  - e Israel, mi posesión
  lexicon: HALOT
  rationale: נַחֲלָה puede ser «herencia» o «heredad»; aquí «heredad» preserva mejor el tono bíblico y la relación de pertenencia/covenantalidad sin perder claridad. Se conserva la apposición con Israel.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio estándar; no requiere explicación adicional en el texto.
theological_decisions:
- issue: Aplicación de títulos de pacto a Egipto y Asiria
  english_pob_reading: Preserve the direct appositional titles 'Egypt my people' and 'Assyria the work of my hands' without softening
  chosen_spanish_reading: Preservar sin suavizar «Egipto, mi pueblo» y «Asiria, la obra de mis manos»
  alternative_spanish_readings:
  - «Egipto, ahora mi pueblo»
  - «Asiria, hecha por mis manos»
  rationale: El hebreo concede a naciones extranjeras lenguaje normalmente asociado a Israel. La traducción debe retener esa tensión teológica y no explicarla dentro del versículo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los Ejércitos
  - Yahvé de los Hostes
  rationale: Se mantiene el nombre propio divino YHWH en español como «Yahvé» y se traduce צְבָאוֹת con un equivalente transparente. Esto preserva la referencia al nombre revelado, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la última pasada revisada, sin cambios de sentido respecto del audit trail inglés. Se mantuvo la formulación benedictoria y la apposición teológica directa para no atenuar la sorpresa del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología proyectual, no la sustitución «SEÑOR».
  - Se mantuvo «Ejércitos» por claridad moderna, consistente con el sentido militar/plural de צְבָאוֹת.
  - Se prefirió «heredad» para נַחֲלָה por su registro bíblico y su valor de posesión pactal.
  - La puntuación con comillas angulares y la coma vocativa siguen el español editorial estándar.
  - Se conservó la apposición sin reordenarla de forma interpretativa, para reflejar la estructura hebrea.
