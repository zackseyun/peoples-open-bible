translation:
  language: es
  text: Y ahora, que mi señor envíe a sus siervos el trigo y la cebada, el aceite[a] y el vino, de los cuales ha hablado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el aceite’ puede entenderse más específicamente como ‘aceite de oliva’ en este contexto de provisiones.
    reason: lexical_alternative
  - marker: b
    text: O ‘de los cuales dijo’; el hebreo no exige el sentido más fuerte de ‘ha prometido’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva de ו más el valor temporal de עתה. En español, 'Y ahora' reproduce bien la transición discursiva hacia la petición práctica.
- source_word: הַחִטִּים
  english_pob_choice: the wheat
  chosen_spanish: el trigo
  alternatives_spanish:
  - el trigo
  lexicon: HALOT
  rationale: En español, 'trigo' funciona de manera natural como sustantivo de producto/comida, equivalente al mass noun inglés 'wheat'. Mantiene el artículo definido como en el hebreo.
- source_word: וְהַשְּׂעֹרִים
  english_pob_choice: the barley
  chosen_spanish: la cebada
  alternatives_spanish:
  - la cebada
  lexicon: HALOT
  rationale: Sustantivo de cereal directamente correspondiente a la forma hebrea. El artículo definido preserva la lista específica de provisiones.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el aceite'; 'aceite' es la forma neutral y fiel en español. 'Aceite de oliva' es contextual, pero el texto base no lo explicita.
- source_word: וְהַיַּיִן
  english_pob_choice: the wine
  chosen_spanish: el vino
  alternatives_spanish:
  - el vino
  lexicon: HALOT
  rationale: Correspondencia directa y natural. Se conserva el artículo definido para reflejar la enumeración hebrea de bienes concretos.
- source_word: אֲשֶׁר אָמַר
  english_pob_choice: of which he has spoken
  chosen_spanish: de los cuales ha hablado
  alternatives_spanish:
  - que ha dicho
  - de los que ha hablado
  lexicon: HALOT
  rationale: '''Ha hablado'' reproduce el sentido básico de אמר sin añadir ''prometió''. La construcción ''de los cuales'' mantiene el vínculo formal con la lista de bienes y evita sobreinterpretar el verbo.'
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  lexicon: HALOT
  rationale: Se trata de un tratamiento cortesano hacia una autoridad humana; 'mi señor' es natural en español y evita la confusión con el título divino.
- source_word: יִשְׁלַח
  english_pob_choice: let ... send
  chosen_spanish: que ... envíe
  alternatives_spanish:
  - que ... mande
  - que ... remita
  lexicon: HALOT
  rationale: El yiqtol funciona como petición/jussivo. En español, 'que envíe' preserva esa fuerza rogativa de forma digna y clara.
- source_word: לַעֲבָדָיו
  english_pob_choice: to his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus esclavos
  - a sus servidores
  lexicon: HALOT
  rationale: '''עבדים'' puede significar sirvientes/siervos/esclavos; aquí el contexto de provisión y corte favorece ''siervos'' como equivalente español reverente y funcional. ''Esclavos'' sería más fuerte lexicalmente, pero menos natural en este contexto relacional.'
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título humano y no divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  rationale: El contexto es una petición diplomática a un soberano humano. Traducirlo como 'mi señor' mantiene la deferencia sin trasladar el título al ámbito divino.
  doctrine_reference: Cortesía/registro de autoridad humana; distinción entre señorío humano y divino
translation_notes:
  revision_awareness: La revisión inglesa afinó la cláusula final desde una formulación más explícita hacia 'of which he has spoken' para un registro más formal sin añadir la idea de promesa. La versión española sigue esa misma cautela al usar 'de los cuales ha hablado', manteniendo la referencia abierta y no intensificando el verbo. También se conservó el carácter de petición del yiqtol con 'que ... envíe'.
  spanish_consistency_notes:
  - Se mantiene 'mi señor' para אֲדֹנִי en contextos humanos, en línea con el criterio de no usar fórmulas litúrgicas o divinas sin base textual.
  - Se conserva un registro digno y transparente, evitando paráfrasis como 'ha prometido' que no están exigidas por אמר.
  - La lista de bienes se presenta con artículos definidos para reflejar la especificidad del hebreo.
  - '''Siervos'' se usa aquí por contexto cortesano; no se introduce ''esclavos'' porque el español podría sonar demasiado duro para esta escena diplomática, aunque la raíz admita esa fuerza en otros contextos.'
