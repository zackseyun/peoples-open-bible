  yaml_path: translation/nt/1_corinthians/013/012.yaml
  text: For now we see in a mirror[a], dimly, but then face to face. Now I know in part, but then I will know fully, just as I also have been fully known.
  footnotes:
  - marker: a
    text: Or 'dimly.' The Greek more literally says 'in a riddle' or 'enigmatically,' emphasizing indirect and puzzling perception.
    reason: lexical_alternative
translation:
  language: ko
  text: 지금은 우리가 거울로 어렴풋이 보지만, 그때에는 얼굴과 얼굴을 마주 보게 될 것입니다. 지금은 내가 부분적으로 알지만, 그때에는 나도 온전히 알려진 것처럼 온전히 알게 될 것입니다.
  philosophy: optimal-equivalence
