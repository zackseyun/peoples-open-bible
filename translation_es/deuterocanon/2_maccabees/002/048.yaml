lexical_decisions:
- source_word: ἐπιφανείας
  english_pob_choice: appearances
  chosen_spanish: manifestaciones
  alternatives_spanish:
  - apariciones
  - epifanías
  lexicon: LSJ
  rationale: En este contexto, ἐπιφανείας alude a intervenciones visibles de origen celestial. «Manifestaciones» conserva la idea de algo hecho visible sin cargar el término con el sentido técnico posterior de «epifanías»; «apariciones» sería posible, pero «manifestaciones» suena más natural para una intervención divina.
- source_word: τὰς ἐξ οὐρανοῦ γενομένας
  english_pob_choice: from heaven that came
  chosen_spanish: que vinieron de los cielos
  alternatives_spanish:
  - que procedieron del cielo
  - celestiales
  lexicon: LSJ
  rationale: La frase indica origen celestial y el carácter acontecido de esas acciones. «Vinieron de los cielos» preserva ambos rasgos y evita comprimir el sentido en un adjetivo más abstracto como «celestiales».
- source_word: φιλοτίμως ἀνδραγαθήσασιν
  english_pob_choice: those who fought nobly
  chosen_spanish: los que con noble empeño actuaron con valentía
  alternatives_spanish:
  - los que pelearon noblemente
  - los que se esforzaron noblemente
  lexicon: LSJ
  rationale: La combinación adverbial y verbal apunta a una actuación valerosa y honorable. «Con noble empeño» intenta reproducir φιλοτίμως sin perder la idea de dedicación, y «actuaron con valentía» recoge ἀνδραγαθήσασιν sin forzar un tecnicismo militar en español.
- source_word: ὑπὲρ τοῦ Ἰουδαισμοῦ
  english_pob_choice: for Judaism
  chosen_spanish: por el judaísmo
  alternatives_spanish:
  - por la fe judía
  - por el modo de vida judío
  lexicon: LSJ
  rationale: Ἰουδαϊσμός aquí nombra la identidad religiosa y cultural defendida frente a la presión helenizante. «Judaísmo» es el equivalente directo y conserva la referencia histórica del texto.
- source_word: ὡς τὴν ὅλην χώραν ὀλίγους ὄντας λεηλατεῖν
  english_pob_choice: so that, though they were few, they plundered the whole country
  chosen_spanish: de modo que, aunque eran pocos, saquearon toda la tierra
  alternatives_spanish:
  - de suerte que, siendo pocos, despojaron todo el país
  - así que, aunque pocos, devastaron toda la región
  lexicon: LSJ
  rationale: 'El resultado se expresa con una concesión clara: eran pocos, pero tuvieron éxito militar. «Saquearon» traduce λεηλατεῖν con la fuerza adecuada, y «toda la tierra» conserva χώρα sin neutralizarlo demasiado.'
- source_word: καὶ τὰ βάρβαρα πλήθη διώκειν
  english_pob_choice: and drove off the barbarian hordes
  chosen_spanish: y pusieron en fuga a las hordas bárbaras
  alternatives_spanish:
  - y persiguieron a las multitudes bárbaras
  - y ahuyentaron a las muchedumbres extranjeras
  lexicon: LSJ
  rationale: βάρβαρα πλήθη conserva un etiquetado etnocultural peyorativo del griego. «Hordas bárbaras» mantiene esa carga y el tono bélico; «pusieron en fuga» transmite el resultado de διώκειν en este contexto narrativo.
theological_decisions:
- issue: Cómo renderizar Ἰουδαισμός en un contexto histórico de resistencia religiosa
  english_pob_reading: Judaism refers to the Jewish religion and way of life defended against foreign pressure.
  chosen_spanish_reading: judaísmo como la identidad religiosa y cultural defendida frente a la presión extranjera
  alternative_spanish_readings:
  - la religión judía
  - el modo de vida judío
  rationale: En 2 Macabeos, Ἰουδαισμός no es una abstracción moderna desligada del conflicto, sino la forma de vida y fidelidad del pueblo judío frente a la helenización. «Judaísmo» mantiene el vínculo histórico y evita suavizar el contraste del pasaje.
  doctrine_reference: 'Principio POB: primacía de la fuente original y preservación de matices históricos y culturales sin neutralizarlos.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Swete 1909 y toma en cuenta la revisión inglesa más reciente que afinó φιλοτίμως ἀνδραγαθήσασιν hacia «fought nobly». Por eso el español busca una solución compacta y digna («con noble empeño… con valentía») que conserve tanto la nobleza como la valentía del original, sin perder el valor resultativo de la cláusula final.
  spanish_consistency_notes:
  - Se usa «judaísmo» para Ἰουδαϊσμός, conforme al contexto histórico-religioso del libro.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni κύριος en este versículo.
  - «Hordas bárbaras» mantiene la fuerza polémica del texto griego, en vez de neutralizarla.
  - La puntuación conserva la estructura acumulativa del período griego con una sola oración extensa.
