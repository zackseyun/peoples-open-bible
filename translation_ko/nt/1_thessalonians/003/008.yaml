  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι νῦν ζῶμεν ἐὰν ὑμεῖς στήκετε ἐν κυρίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/008.yaml
  text: For now we live[b][a], if you stand firm in the Lord.
  footnotes:
  - marker: a
    text: Or 'because now we live, if you stand firm in the Lord.' The opening conjunction can be rendered 'for,' 'because,' or simply left implicit in English.
    reason: lexical_alternative
  - marker: b
    text: '''We live'' is likely a rhetorical expression of renewed encouragement or vitality, not merely physical survival.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 주 안에 굳게 서 있기에 우리는 이제 살아납니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이제 우리가 사는 까닭은 여러분이 주 안에 굳게 서 있기 때문입니다」. 헬라어 접속사는 「~이기 때문에」 혹은 함축적으로 옮길 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 「우리가 산다」는 단순한 생존이 아니라 새로 얻은 격려와 활력의 수사적 표현일 가능성이 크다.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν ζῶμεν
  english_pob_choice: now we live
  chosen_korean: 우리는 이제 살아납니다
  alternatives_korean:
  - 우리는 지금 살아 있습니다
  - 우리는 이제 살았다는 마음입니다
  lexicon: BDAG
  rationale: 단순 「살아 있다」가 아니라 곤경 가운데 회복된 활력의 수사. 한국어 「살아나다」가 본문의 정서적 무게를 담는다.
- source_word: ἐὰν ὑμεῖς στήκετε ἐν κυρίῳ
  english_pob_choice: if you stand firm in the Lord
  chosen_korean: 여러분이 주 안에 굳게 서 있기에
  alternatives_korean:
  - 여러분이 주 안에 견고히 서 있다면
  - 여러분이 주 안에 서 있는 한
  lexicon: BDAG
  rationale: 본 문맥의 ἐάν은 실현된 조건. 한국어 「~ 있기에」가 결과의 근거를 분명히 한다. 영어 POB의 「if」 선택보다 본 절 흐름이 명확해진다.
