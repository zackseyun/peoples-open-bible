translation:
  language: es
  text: ¿Debería decirse[a], oh casa de Jacob, «¿Está impaciente el Espíritu de Yahvé? ¿Son estas sus obras?» ¿No hacen bien mis palabras al que camina rectamente?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Está acortado el Espíritu de Yahvé?». El hebreo también puede sugerir: «¿Es corta la paciencia de Yahvé?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָמ֣וּר
  english_pob_choice: Should it be said
  chosen_spanish: ¿Debería decirse
  alternatives_spanish:
  - ¿Se dirá
  - ¿Debería hablarse así
  lexicon: HALOT
  rationale: La forma introduce una pregunta retórica con valor de reprensión o cita implícita. El impersonal español conserva ese giro sin volverlo más explicativo de lo que permite el hebreo.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: O house of Jacob
  chosen_spanish: oh casa de Jacob
  alternatives_spanish:
  - casa de Jacob
  lexicon: HALOT
  rationale: Se conserva el vocativo profético. «Oh» da un tono de llamado directo sin añadir contenido nuevo.
- source_word: הֲקָצַר רוּחַ יְהוָה
  english_pob_choice: Is the Spirit of Yahweh impatient
  chosen_spanish: ¿Está impaciente el Espíritu de Yahvé?
  alternatives_spanish:
  - ¿Se ha acortado el Espíritu de Yahvé?
  - ¿Está corta la paciencia de Yahvé?
  - ¿Está restringido el Espíritu de Yahvé?
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y puede sugerir falta de paciencia o restricción. Se elige «impaciente» como equivalente natural, manteniendo «Espíritu» por el paralelo con יְהוָה y el uso del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino. En este contexto no se enmascara con «SEÑOR».
- source_word: אִם אֵלֶּה מַעֲלָלָיו
  english_pob_choice: Are these his deeds
  chosen_spanish: ¿Son estas sus obras?
  alternatives_spanish:
  - ¿Son estas sus acciones?
  - ¿Serían estas sus obras?
  lexicon: HALOT
  rationale: מַעֲלָלִים se rinde con «obras» para conservar un término bíblico amplio y natural en español. La pregunta mantiene el paralelo retórico con la cláusula anterior.
- source_word: הֲלוֹא דְבָרַי יֵיטִיבוּ
  english_pob_choice: Do not my words do good
  chosen_spanish: ¿No hacen bien mis palabras
  alternatives_spanish:
  - ¿No benefician mis palabras
  - ¿No son buenas mis palabras
  lexicon: HALOT
  rationale: הֲלוֹא introduce una expectativa de respuesta afirmativa. «Hacen bien» preserva el valor de יֵיטִיבוּ sin perder fluidez española.
- source_word: עִם הַיָּשָׁר הוֹלֵךְ
  english_pob_choice: to the one who walks uprightly
  chosen_spanish: al que camina rectamente
  alternatives_spanish:
  - al que anda en rectitud
  - al que anda recto
  lexicon: HALOT
  rationale: El participio describe un modo de vida continuo. «Camina rectamente» comunica bien la imagen hebrea de conducta habitual.
theological_decisions:
- issue: 'רוח יהוה: ¿«Espíritu» o un sentido impersonal como «paciencia»?'
  english_pob_reading: Spirit of Yahweh
  chosen_spanish_reading: Espíritu de Yahvé
  alternative_spanish_readings:
  - paciencia de Yahvé
  - temperamento de Yahvé
  rationale: El texto hebreo permite una lectura idiomática sobre la paciencia, pero el POB inglés opta por «Spirit». En español se conserva esa decisión para no borrar la tensión semántica entre el sentido literal de «espíritu» y la posible implicación de paciencia o restricción.
  doctrine_reference: Translation philosophy §1, §3; contested term רוּחַ con יְהוָה
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se aplica el estándar del proyecto para el Tetragrámaton, manteniendo el nombre propio y la transparencia textual.
  doctrine_reference: Contested terms table for יְהוָה
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la pregunta de «Has the Spirit of the LORD become impatient?» a «Is the Spirit of the LORD impatient?»; por eso la versión española evita una perífrasis de «ha llegado a estar» y usa una pregunta directa y natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto, no «SEÑOR».
  - Se conserva «Espíritu» con mayúscula cuando refiere al Espíritu de Yahvé.
  - «Obras» traduce מַעֲלָלִים de manera amplia y bíblica, sin especificar más de lo que el hebreo exige.
  - La pregunta final mantiene el paralelismo retórico del hebreo y del POB inglés.
