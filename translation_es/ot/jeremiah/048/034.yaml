  to: Desde el clamor de Hesbón hasta Elealé[a], hasta Jahaz, alzan su voz; desde Soar hasta Horonaim, hasta Eglat-shelishiyá. Porque incluso las aguas de Nimrim se convertirán en desolaciones.
  rationale: Se revisa el verbo final para preservar el valor resultativo documentado de היה + לְ («se convertirán en desolaciones»). Se ajusta «Jahaza» a «Jahaz» para seguir el audit trail y se mejora la transliteración de עֶגְלַת שְׁלִשִׁיָּה como «Eglat-shelishiyá», manteniendo la nota alternativa. «Porque incluso» suena un poco más natural en español contemporáneo que «Porque aun» sin alterar el sentido de כִּי גַּם.
