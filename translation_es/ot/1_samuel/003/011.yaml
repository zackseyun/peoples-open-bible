- from: 'Entonces Yahvé dijo a Samuel[a]: «Mira, yo estoy por hacer una cosa en Israel, de la cual a todo el que la oiga[b] le zumbarán ambos oídos».'
  to: 'Entonces Yahvé dijo a Samuel: «Mira, yo estoy por hacer una cosa en Israel que hará que a todo el que la oiga[a] le zumben ambos oídos[b]».'
  rationale: Se eliminó la nota innecesaria sobre 'Samuel'. Se rehízo la cláusula relativa para que suene natural en español y siga de cerca el sentido del hebreo. Se mantuvo 'Yahvé', 'Mira', 'estoy por hacer' y 'una cosa' como opciones válidas. También se corrigió la nota del modismo auditivo para que ofrezca alternativas reales y una explicación útil.
