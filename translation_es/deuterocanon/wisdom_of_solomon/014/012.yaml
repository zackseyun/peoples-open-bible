translation:
  language: es
  text: Porque el comienzo de la inmoralidad sexual es el idear ídolos[a], y el inventarlos[b] es la corrupción de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el origen de la inmoralidad sexual es la concepción de ídolos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el inventarlos es la ruina de la vida» o «la destrucción de la vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀρχὴ
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - el origen
  lexicon: LSJ
  rationale: ἀρχή puede expresar comienzo u origen. «El comienzo» mantiene la concisión y la relación causal del dicho sin convertirlo en una explicación más interpretativa que el griego.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - prostitución
  - inmoralidad
  lexicon: LSJ
  rationale: πορνεία abarca conducta sexual ilícita en sentido amplio. «Inmoralidad sexual» comunica bien ese alcance en español contemporáneo y evita reducirlo a un solo acto o a un registro excesivamente eclesiástico.
- source_word: ἐπίνοια
  english_pob_choice: the devising
  chosen_spanish: el idear
  alternatives_spanish:
  - el concebir
  - la intención
  - el plan
  lexicon: LSJ
  rationale: ἐπίνοια tiene la fuerza de una idea o plan elaborado. «El idear» conserva el carácter activo e intencional del término y funciona mejor que un sustantivo más pesado en español.
- source_word: εἰδώλων
  english_pob_choice: of idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - ídolos
  lexicon: LSJ
  rationale: 'εἴδωλον en este contexto judío-griego apunta claramente a ídolos. En español basta «ídolos»; el genitivo se expresa naturalmente con el verbo sustantivado: «el idear ídolos».'
- source_word: εὕρεσις
  english_pob_choice: the invention
  chosen_spanish: el inventarlos
  alternatives_spanish:
  - la invención de ellos
  - el descubrimiento de ellos
  - el hallarlos
  lexicon: LSJ
  rationale: εὕρεσις puede significar descubrimiento, pero aquí, en paralelo con ἐπίνοια y en referencia a ídolos, el sentido es el de inventar o producir por la mente humana. «El inventarlos» refleja ese matiz y suena natural en español.
- source_word: αὐτῶν
  english_pob_choice: of them
  chosen_spanish: los
  alternatives_spanish:
  - de ellos
  - sus
  lexicon: LSJ
  rationale: El pronombre remite a los ídolos. En español, el enclítico «los» tras «inventar» mantiene la relación directa y evita una construcción más rígida.
- source_word: φθορὰ
  english_pob_choice: the corruption
  chosen_spanish: la corrupción
  alternatives_spanish:
  - la ruina
  - la destrucción
  - el deterioro
  lexicon: LSJ
  rationale: φθορά puede expresar corrupción, ruina o destrucción. «La corrupción» conserva la amplitud moral y existencial del término, tal como en la traducción inglesa, sin limitarlo demasiado.
- source_word: ζωῆς
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de la vida
  - para la vida
  - de la existencia
  lexicon: LSJ
  rationale: El genitivo se mantiene de forma compacta con «de la vida», preservando la brevedad proverbial del griego y la conexión con φθορά.
theological_decisions:
- issue: Si πορνεία debe interpretarse metafóricamente como idolatría o traducirse en su sentido sexual literal
  english_pob_reading: Rendered literally as 'sexual immorality' while allowing the surrounding anti-idolatry context to supply any metaphorical resonance.
  chosen_spanish_reading: Traducida literalmente como «inmoralidad sexual», dejando que el contexto antiidolátrico aporte la resonancia metafórica si se percibe.
  alternative_spanish_readings:
  - idolatría
  - infidelidad
  rationale: El versículo distingue entre el idear ídolos y el resultado llamado πορνεία. Traducirlo directamente evita borrar la relación causal y conserva la tensión del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo expresar φθορά ζωῆς sin volverlo demasiado interpretativo
  english_pob_reading: Kept as 'the corruption of life.'
  chosen_spanish_reading: «la corrupción de la vida»
  alternative_spanish_readings:
  - la ruina de la vida
  - la destrucción de la vida
  rationale: La frase griega es breve y densa. «La corrupción de la vida» preserva su fuerza y amplitud, sin restringirla a una sola clase de daño.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego se tomó de la capa de traducción adjudicada y coincide con el pasaje auditado; la versión inglesa POB mantiene la misma estructura y sus notas alternativas se reflejan aquí en español sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantuvo «ídolos» para εἴδωλα, no «imágenes», por la fuerza antiidolátrica del contexto.
  - Se prefirió «inmoralidad sexual» sobre «fornicación» para comunicar el alcance amplio de πορνεία en español contemporáneo.
  - La elección de «corrupción» para φθορά conserva el paralelismo con la nota alternativa sobre ruina o destrucción.
  - Se usó «de la vida» para reproducir el genitivo compacto ζωῆς y mantener el tono sentencioso del griego.
