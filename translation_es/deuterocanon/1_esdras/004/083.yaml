revisions:
- from: Y tomó las cartas y salió a Babilonia, y se lo informó a todos sus hermanos[a].
  to: Y tomó las cartas, y partió hacia Babilonia, y comunicó[a] a todos sus hermanos.
  rationale: Se eliminó el objeto explícito añadido por «se lo informó» para respetar la elipsis del griego y la revisión del English POB. También se mejoró la naturalidad del español con «partió hacia Babilonia» y se mantuvo «hermanos» como equivalente directo de ἀδελφοί.
  reviewer_model: gpt-5.4
