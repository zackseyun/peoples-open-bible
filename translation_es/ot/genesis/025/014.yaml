lexical_decisions:
- source_word: מִשְׁמָע
  english_pob_choice: Mishma
  chosen_spanish: Misma
  alternatives_spanish:
  - Mishmá
  - Mishmah
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica, por lo que se translitera. En español, "Misma" conserva la secuencia consonántica y evita una grafía demasiado anglicada; se mantiene la posibilidad de una variante más explícita en nota porque el hebreo permite reflejar la consonante final de distintas maneras.
- source_word: דוּמָה
  english_pob_choice: Dumah
  chosen_spanish: Dumá
  alternatives_spanish:
  - Duma
  - Dumah
  lexicon: HALOT
  rationale: Es un nombre propio y no un sustantivo común. La acentuación final ayuda a la lectura en español y refleja la vocal final larga del hebreo sin convertirla en una traducción interpretativa.
- source_word: מַשָּׂא
  english_pob_choice: Massa
  chosen_spanish: Masá
  alternatives_spanish:
  - Massa
  - Masa
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio en la genealogía de Ismael, no como el sustantivo común 'carga/oráculo'. Por eso se translitera; la tilde final favorece la pronunciación española y evita confusión con el sustantivo común 'masa'.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en que se trata de tres nombres propios en una genealogía; no hay cambios textuales ni ajustes de sentido doctrinal. La única cuestión relevante es transliteración y forma española legible.
  spanish_consistency_notes:
  - Se mantuvo transliteración de nombres propios en vez de traducirlos, conforme al contexto genealógico.
  - Se prefirió una ortografía española fluida con tildes en las formas finales para facilitar la lectura, sin alterar la identificación de los nombres.
  - No se introdujo 'Massa' como sustantivo común, porque el contexto exige un nombre propio.
