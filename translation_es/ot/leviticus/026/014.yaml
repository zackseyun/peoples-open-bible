translation:
  language: es
  text: Pero si no me escuchan y no hacen todos estos mandamientos,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecerme». El verbo hebreo puede expresar escucha atenta con el matiz de obediencia; el texto principal conserva la formulación más literal «escucharme».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción introduce contraste con las bendiciones anteriores, por lo que «Pero si» comunica bien el matiz adversativo y conserva el valor condicional.
- source_word: לֹא תִשְׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: no me escuchan
  alternatives_spanish:
  - no me oyen
  - no me obedecen
  lexicon: HALOT
  rationale: שמַע con ל puede significar escuchar con atención y, por extensión, obedecer. En español, «escuchar» preserva esa base relacional y auditiva sin cerrar prematuramente el sentido, mientras que la segunda cláusula explicita la desobediencia mediante «no hacen».
- source_word: וְלֹא תַעֲשׂוּ
  english_pob_choice: do not do
  chosen_spanish: y no hacen
  alternatives_spanish:
  - y no cumplen
  - y no practican
  - ni hacen
  lexicon: HALOT
  rationale: עָשָׂה es amplio y en contexto legal puede traducirse con un simple «hacer». Se mantiene la coordinación directa del hebreo con «y no hacen».
- source_word: אֵת כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El marcador de objeto directo no se vierte en español; כָּל se expresa naturalmente con «todos» para mantener la cuantificación total.
- source_word: הַמִּצְוֺת
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  - ordenanzas
  lexicon: HALOT
  rationale: «Mandamientos» conserva el registro legal-covenantal de מִצְוֹת mejor que opciones más genéricas o más técnicas que podrían desplazar el sentido.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - éstos
  - tales
  lexicon: HALOT
  rationale: El demostrativo se refiere a los mandamientos recién expuestos; «estos» es la forma natural y fiel en español.
theological_decisions:
- issue: 'Valor de שׁמע ל: escuchar vs. obedecer'
  english_pob_reading: listen to me
  chosen_spanish_reading: no me escuchan
  alternative_spanish_readings:
  - no me obedecen
  - no hacen caso de mí
  rationale: Se conserva la tensión lexical del hebreo entre oír y obedecer. La formulación principal mantiene el verbo de escucha, mientras la segunda cláusula separa explícitamente la falta de cumplimiento de los mandamientos.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés concuerdan estrechamente: no hubo revisiones aplicadas y el revisor marcó alto acuerdo. La decisión principal en español reproduce la misma tensión lexical que el inglés POB preserva entre «escuchar» y «obedecer».'
  spanish_consistency_notes:
  - Se mantiene «mandamientos» para מִצְוֺת, en paralelo con la elección inglesa.
  - Se conserva la diferenciación entre escuchar y hacer, evitando fusionar ambas ideas en un solo verbo.
  - La puntuación con coma antes de la nota al pie sigue el estilo de publicación en español.
  - No se usa «SEÑOR» como máscara del nombre divino porque este versículo no contiene el Tetragrámaton.
