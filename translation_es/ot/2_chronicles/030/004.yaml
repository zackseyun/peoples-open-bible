lexical_decisions:
- source_word: וַיִּישַׁר
  english_pob_choice: seemed right
  chosen_spanish: pareció recto
  alternatives_spanish:
  - fue recto
  - resultó aprobado
  - pareció bien
  lexicon: HALOT
  rationale: El verbo ישר en esta construcción expresa evaluación favorable. «Pareció recto» conserva la noción de juicio percibido, paralela al modismo «a los ojos de», sin forzar una afirmación de aprobación absoluta que el hebreo no explicita directamente.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el tema
  - la propuesta
  lexicon: HALOT
  rationale: 'דָּבָר es amplio: ''palabra, asunto, cosa''. En el contexto inmediato se trata de una decisión o iniciativa concreta, y «asunto» mantiene la amplitud del término sin volverlo demasiado técnico o demasiado vago.'
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en la opinión de
  - a juicio de
  - ante
  lexicon: HALOT
  rationale: El modismo hebreo de evaluación se conserva de forma natural en español con «a los ojos de», que reproduce la imagen y comunica bien el juicio favorable.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Traducción directa y transparente del sustantivo con artículo.
- source_word: כָּל הַקָּהָל
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: קָהָל designa al grupo reunido; «asamblea» es formal, claro y fiel. «Toda» refleja el valor de כָּל sin cambiar el sustantivo colectivo.
translation_notes:
  revision_awareness: 'Se siguió el testimonio hebreo directo: יישר expresa que el asunto fue considerado recto/favorable, y בְּעֵינֵי mantiene el modismo evaluativo. La redacción española evita depender mecánicamente del inglés, pero coincide con la decisión auditada de preservar el lenguaje de valoración.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones porque el verso no contiene el nombre divino.
  - «Asamblea» se mantuvo para קָהָל por ser el equivalente más transparente y sobrio en español.
  - Se eligió un registro formal y publicable, sin añadir interpretaciones narrativas no presentes en el hebreo.
