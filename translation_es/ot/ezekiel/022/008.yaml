translation:
  language: es
  text: Has despreciado mis cosas sagradas[a], y has profanado mis sábados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis santuarios» / «mis lugares santos». El hebreo puede referirse más específicamente a lugares sagrados, pero aquí se traduce de forma más amplia como «mis cosas sagradas».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָדָשַׁי
  english_pob_choice: my holy things
  chosen_spanish: mis cosas santas
  alternatives_spanish:
  - mis cosas sagradas
  - mis lugares santos
  - mis santuarios
  lexicon: HALOT
  rationale: El plural con sufijo de primera persona permite una referencia amplia a lo que pertenece a la santidad de Yahvé. «Cosas santas» conserva esa amplitud sin restringirlo indebidamente a un edificio o recinto; «santuarios» sería demasiado específico, y «cosas sagradas» es posible pero menos natural en español bíblico contemporáneo.
- source_word: בָּזִית
  english_pob_choice: you have despised
  chosen_spanish: has despreciado
  alternatives_spanish:
  - has tratado con desprecio
  - has desdeñado
  - has despreciado con desdén
  lexicon: HALOT
  rationale: El verbo בזה expresa menos una acción física que una actitud de menosprecio. «Has despreciado» reproduce bien la fuerza moral y judicial de la acusación y es natural en español.
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de sábado
  - mis sábados de reposo
  - mis días de reposo
  lexicon: HALOT
  rationale: Aunque el término remite a la institución sabática, en español «sábados» conserva la forma plural directa del hebreo y el valor cultual/covenantal. «Días de reposo» explicita el sentido, pero pierde la correspondencia léxica y la sobriedad del original.
- source_word: חִלָּלְתְּ
  english_pob_choice: you have profaned
  chosen_spanish: has profanado
  alternatives_spanish:
  - has contaminado
  - has mancillado
  - has desacralizado
  lexicon: HALOT
  rationale: En contexto de santidad cultual, חלל significa hacer común lo santo, profanar. «Has profanado» es la equivalencia más precisa y estable en español bíblico; «mancillado» o «contaminado» desplazan el matiz hacia suciedad o impureza física.
theological_decisions:
- issue: Alcance de קָדָשַׁי
  english_pob_reading: broad reference to God's holy things
  chosen_spanish_reading: referencia amplia a las cosas santas de Yahvé
  alternative_spanish_readings:
  - referencia específica al santuario
  - referencia a los lugares santos
  rationale: El hebreo plural permite un sentido colectivo amplio. Traducirlo como «mis cosas santas» evita forzar el pasaje a un solo lugar sagrado y mantiene la denuncia contra el desprecio de todo lo consagrado a Yahvé.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de שַׁבְּתֹתַי
  english_pob_reading: my Sabbaths
  chosen_spanish_reading: mis sábados como institución cultual y pactual
  alternative_spanish_readings:
  - mis días de reposo
  - mis sabbaths
  rationale: En este contexto, el plural no designa meramente días del calendario, sino la observancia sabática como señal del pacto. «Mis sábados» conserva la terminología bíblica y permite que el contexto defina su alcance.
  doctrine_reference: Éxodo 31:13; Ezequiel 20:12
- issue: Tono forense de la acusación
  english_pob_reading: You have despised... and you have profaned...
  chosen_spanish_reading: Has despreciado... y has profanado...
  alternative_spanish_readings:
  - Has menospreciado... y has deshonrado...
  rationale: La frase hebrea tiene tono acusatorio y judicial. El español elegido mantiene paralelismo, gravedad y segunda persona singular femenina implícita del hebreo.
  doctrine_reference: Ezequiel 22:2-5
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés existente. No hubo revisiones aplicadas en el pasaje base; la versión española conserva la amplitud semántica de קָדָשַׁי, la fuerza acusatoria de בָּזִית y חִלָּלְתְּ, y la terminología pactual de שַׁבְּתֹתַי.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como convención del proyecto cuando el contexto refiere posesión divina implícita.
  - Se mantiene el paralelismo verbal con dos perfectos en segunda persona singular.
  - «Mis cosas santas» evita estrechar el hebreo a un solo edificio o recinto.
  - «Mis sábados» conserva la forma terminológica del hebreo y su carácter cultual.
