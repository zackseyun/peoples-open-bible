    text: 'O: «¿Los entregarás en poder de Israel?»'
    reason: lexical_alternative
  revision_rationale: Se corrige 'ir' por 'bajar' para preservar el valor de ירד, se mantiene 'tras los filisteos' como equivalente adecuado de אַחֲרֵי, se ajusta el modismo a 'en la mano de Israel' para mejorar la naturalidad sin perder la imagen hebrea, y se rehace la nota al pie para reflejar una alternativa española real y útil del modismo bélico.
