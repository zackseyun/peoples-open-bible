translation:
  language: es
  text: Todo primogénito que abre el vientre[a], de toda carne que presentan[a?] a Yahvé[b], sea hombre o bestia, será tuyo. Sin embargo, deberás redimir sin falta al primogénito del hombre, y redimirás al primogénito de la bestia impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que abre el vientre». El modismo hebreo se refiere a la primera cría o al primer hijo que sale del vientre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que ofrecen a Yahvé». El verbo puede significar «acercar», «presentar» u «ofrecer» en contextos de sacrificio o dedicación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּטֶר רֶחֶם
  english_pob_choice: firstborn that opens the womb
  chosen_spanish: primogénito que abre el vientre
  alternatives_spanish:
  - primogénito que abre la matriz
  - lo primero que abre el vientre
  - el que abre el seno materno
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático para el primer nacido. 'Primogénito' conserva el valor referencial y 'que abre el vientre' mantiene la imagen corporal del original sin volverla extraña en español.
- source_word: כָּל ... לְכָל בָּשָׂר
  english_pob_choice: Every ... of all flesh
  chosen_spanish: Todo ... de toda carne
  alternatives_spanish:
  - Todo ... entre toda carne
  - Todo ... de todo ser vivo
  lexicon: HALOT
  rationale: '''Toda carne'' reproduce el alcance amplio de בָּשָׂר como categoría de seres vivos, y ''todo'' al inicio conserva la universalidad del hebreo sin sobreparafrasear.'
- source_word: אֲשֶׁר יַקְרִיבוּ לַֽ/יהוָה
  english_pob_choice: that they present to Yahweh
  chosen_spanish: que presentan a Yahvé
  alternatives_spanish:
  - que ofrecen a Yahvé
  - que acercan a Yahvé
  - que presentan ante Yahvé
  lexicon: HALOT
  rationale: יַקְרִיבוּ puede significar 'presentar' o 'ofrecer' en contexto cultual. 'Presentan' sigue la decisión auditada en inglés y evita restringir indebidamente el acto a sacrificio cuando el versículo incluye tanto personas como animales.
- source_word: בָּאָדָם וּבַבְּהֵמָה
  english_pob_choice: whether man or beast
  chosen_spanish: sea hombre o bestia
  alternatives_spanish:
  - ya sea hombre o animal
  - entre hombre y bestia
  - sea humano o animal
  lexicon: HALOT
  rationale: La oposición hebrea distingue entre la esfera humana y la animal. 'Hombre o bestia' conserva esa antítesis con una formulación natural en español, siguiendo la lectura auditada de 'man or beast'.
- source_word: יִהְיֶה לָּךְ
  english_pob_choice: shall be yours
  chosen_spanish: será tuyo
  alternatives_spanish:
  - pertenecerá a ti
  - será para ti
  lexicon: HALOT
  rationale: La frase señala derecho o pertenencia. 'Será tuyo' es directo, idiomático y suficientemente fuerte para expresar la asignación sacerdotal.
- source_word: אַךְ
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Con todo
  lexicon: HALOT
  rationale: אַךְ introduce una restricción fuerte tras la concesión anterior. 'Sin embargo' mantiene el valor adversativo y marca el giro legal del versículo.
- source_word: פָּדֹה תִפְדֶּה
  english_pob_choice: you must surely redeem
  chosen_spanish: ciertamente redimirás
  alternatives_spanish:
  - de cierto redimirás
  - sin falta redimirás
  - has de redimir
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la obligación. 'Ciertamente redimirás' comunica énfasis y mantiene el lenguaje jurídico del texto.
- source_word: בְּכוֹר הָאָדָם
  english_pob_choice: the firstborn of man
  chosen_spanish: al primogénito del hombre
  alternatives_spanish:
  - al primogénito humano
  - al primogénito de la humanidad
  lexicon: HALOT
  rationale: '''Hombre'' conserva el contraste con bestia y sigue la preferencia auditada por el inglés para אָדָם en este pasaje. En español, el artículo con preposición expresa bien el objeto de la redención.'
- source_word: בְּכוֹר הַבְּהֵמָה הַטְּמֵאָה
  english_pob_choice: the firstborn of the unclean beast
  chosen_spanish: al primogénito de la bestia impura
  alternatives_spanish:
  - al primogénito del animal impuro
  - al primogénito de la bestia inmunda
  - al primogénito del ganado impuro
  lexicon: HALOT
  rationale: '''Impura'' traduce טְּמֵאָה en registro bíblico amplio y actual. ''Bestia'' conserva la categoría general del hebreo y el paralelo con el miembro humano/animal del versículo.'
theological_decisions:
- issue: Sentido de אָדָם frente a bestia
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humano
  - ser humano
  - humanidad
  rationale: 'El versículo contrapone dos dominios: humano y animal. ''Hombre'' mantiene la forma de contraste del hebreo y evita neutralizar una oposición que es parte del razonamiento legal del pasaje.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Alcance de יַקְרִיבוּ לַיהוָה
  english_pob_reading: present to Yahweh
  chosen_spanish_reading: presentan a Yahvé
  alternative_spanish_readings:
  - ofrecen a Yahvé
  - acercan a Yahvé
  rationale: La cláusula incluye seres humanos y animales, por lo que una lectura exclusivamente sacrificial sería demasiado estrecha. 'Presentan' preserva la amplitud cultual y la cualificación inmediata del versículo, que luego exige redención en ciertos casos.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 y §3
- issue: Redención obligatoria de los primogénitos humanos y de bestias impuras
  english_pob_reading: you must surely redeem the firstborn of man, and you must redeem the firstborn of the unclean beast
  chosen_spanish_reading: ciertamente redimirás al primogénito del hombre, y redimirás al primogénito de la bestia impura
  alternative_spanish_readings:
  - de seguro rescatarás al primogénito del hombre
  - debes redimir al primogénito del hombre
  rationale: El hebreo marca énfasis mediante infinitivo absoluto. La traducción mantiene la obligación y no suaviza la norma; además, conserva la distinción entre lo presentado a Yahvé y lo que, por ser humano o impuro, debe ser redimido.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios en la revisión más reciente y el control cruzado indicó alta concordancia (acuerdo total).'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'primogénito' para בְּכוֹר y se mantiene la imagen idiomática 'abre el vientre' con nota alternativa.
  - '''Impura'' se reserva para טְּמֵאָה, alineado con el registro bíblico y el léxico del proyecto.'
  - '''Presentan'' evita imponer una lectura sacrificial estrecha al verbo יַקְרִיבוּ.'
  - '''Hombre'' y ''bestia'' mantienen la oposición antropológica del versículo sin neutralización.'
