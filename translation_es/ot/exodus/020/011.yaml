translation:
  language: es
  text: Porque en seis días Yahvé hizo los cielos y la tierra, el mar y todo lo que hay en ellos, y descansó[a] el séptimo día. Por eso Yahvé bendijo el día de reposo y lo santificó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cesó” el séptimo día. El verbo hebreo puede destacar el entrar en reposo o el cesar de la obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base explicativa o causal del mandamiento anterior; 'Porque' conserva con claridad la relación de fundamento sin sonar forzado en español.
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: in six days
  chosen_spanish: en seis días
  alternatives_spanish:
  - durante seis días
  - por seis días
  lexicon: HALOT
  rationale: La construcción expresa el lapso dentro del cual se describe la obra creadora. 'En seis días' es natural y fiel al valor temporal del hebreo.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo y formó
  - creó
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio de 'hacer'. 'Hizo' conserva su alcance sin añadir una precisión que el verbo por sí mismo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la convención del proyecto en español, evitando la sustitución por un título. 'Yahvé' refleja el Tetragrámaton en una forma reconocible y reverente.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se conserva con 'los cielos', más cercano al sentido cósmico de la fórmula creadora que 'el cielo' singular.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En la fórmula de creación corresponde al mundo/tierra en contraste con los cielos; 'la tierra' es la equivalencia natural en español.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  - los mares
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'the sea', en español 'el mar' es la forma idiomática singular y mantiene la enumeración de dominios creados.
- source_word: כָּל אֲשֶׁר בָּם
  english_pob_choice: all that is in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todo cuanto hay en ellos
  - todo lo contenido en ellos
  lexicon: HALOT
  rationale: La cláusula relativa abarca de manera total el contenido de los cielos, la tierra y el mar. 'Todo lo que hay en ellos' es claro y fiel al hebreo.
- source_word: וַיָּנַח
  english_pob_choice: he rested
  chosen_spanish: descansó
  alternatives_spanish:
  - reposó
  - cesó
  lexicon: HALOT
  rationale: En el contexto del sábado, 'descansó' comunica naturalmente la idea de cesar la obra y entrar en reposo. Se preserva la tensión léxica con la nota textual sobre la posible fuerza de 'cesó'.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - al séptimo día
  lexicon: HALOT
  rationale: La frase temporal se vierte de forma directa y natural con 'en el séptimo día', manteniendo el paralelismo narrativo del hebreo.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Marca conclusión/inferencia a partir del patrón creacional. 'Por eso' suena natural en español y conserva el valor consecutivo.
- source_word: בֵּרַךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - dio su bendición a
  - pronunció bendición sobre
  lexicon: HALOT
  rationale: El verbo ברך se traduce de manera directa con 'bendijo'; expresa la acción de conferir bendición sobre el día.
- source_word: יוֹם הַשַּׁבָּת
  english_pob_choice: the Sabbath day
  chosen_spanish: el día de reposo
  alternatives_spanish:
  - el día de sábado
  - el día de sabbat
  lexicon: HALOT
  rationale: Para la función del mandato en español, 'día de reposo' comunica con claridad la jornada apartada para descanso sagrado. Se evita imponer una tradición denominacional con una terminología más rígida si el hebreo enfatiza el carácter de reposo/sabbat.
- source_word: וַיְקַדְּשֵׁהוּ
  english_pob_choice: made it holy
  chosen_spanish: lo santificó
  alternatives_spanish:
  - lo hizo santo
  - lo consagró
  lexicon: HALOT
  rationale: קדשׁ en piel indica consagrar o hacer santo. 'Lo santificó' preserva el verbo teológico tradicional y la referencia al día como objeto directo.
theological_decisions:
- issue: El nombre divino יְהוָה en la fórmula creadora
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de conservar el nombre propio divino. 'Yahvé' evita la sustitución por un título y mantiene la identidad pactal del nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de וַיָּנַח en el séptimo día
  english_pob_reading: he rested
  chosen_spanish_reading: descansó
  alternative_spanish_readings:
  - cesó
  - reposó
  rationale: '''Descansó'' comunica bien el patrón del sábado sin sugerir cansancio. La alternativa ''cesó'' sigue siendo viable y se conserva la tensión léxica en la nota.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather than over-resolve)
- issue: Nombre/función de יוֹם הַשַּׁבָּת
  english_pob_reading: the Sabbath day
  chosen_spanish_reading: el día de reposo
  alternative_spanish_readings:
  - el día de sábado
  - el día de shabat
  rationale: '''Día de reposo'' expresa el valor funcional del término en este contexto de creación y mandamiento. Aunque ''sábado'' es posible, puede sonar más calendario-litúrgico que el énfasis del texto.'
  doctrine_reference: 'DOCTRINE.md: renderings of cultic/time terms by context'
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del pasaje en inglés (revisión sin cambios, acuerdo alto) y conserva la única nota léxica relevante sobre וַיָּנַח: en español principal se optó por ''descansó'', mientras que la nota mantiene visible la alternativa ''cesó'' para no aplanar la tensión semántica del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton, según la terminología del proyecto.
  - Se mantiene la distinción entre 'los cielos' y 'la tierra' en la fórmula creacional.
  - '''El mar'' se prefiere aquí por naturalidad idiomática en español, sin alterar el singular del hebreo.'
  - '''Día de reposo'' conserva el valor funcional del יום השבת y es coherente con el contexto del mandamiento.'
  - La nota [a] está anclada en 'descansó' para reflejar la alternativa léxica documentada.
