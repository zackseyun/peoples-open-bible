translation:
  language: es
  text: Y se sentaron con él en el suelo siete días y siete noches[a], y nadie le habló palabra alguna, porque vieron que su dolor era muy grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que su sufrimiento era muy grande», o «que su angustia era muy grande», o «que su pena era muy grande». El término hebreo puede abarcar dolor en sentido amplio, incluyendo sufrimiento físico y angustia emocional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they sat
  chosen_spanish: se sentaron
  alternatives_spanish:
  - permanecieron sentados
  - estuvieron sentados
  lexicon: HALOT
  rationale: El verbo básico ישׁב puede expresar sentarse o permanecer; en este contexto de duelo, «se sentaron» conserva la imagen concreta y solemne mejor que una paráfrasis más general.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: HALOT
  rationale: El sentido comitativo es directo; «con él» es la forma más natural y fiel en español.
- source_word: לָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - sobre la tierra
  - en el suelo
  lexicon: HALOT
  rationale: Aunque ארץ puede significar «tierra» o «país», aquí el contexto de luto corporal indica el suelo/la tierra. «En tierra» preserva la sobriedad literal y es idiomático en español bíblico moderno.
- source_word: שִׁבְעַת יָמִים וְשִׁבְעַת לֵילוֹת
  english_pob_choice: seven days and seven nights
  chosen_spanish: siete días y siete noches
  alternatives_spanish:
  - por siete días y siete noches
  lexicon: HALOT
  rationale: Se mantiene la expresión temporal completa como fórmula de un período entero de duelo, sin suavizarla.
- source_word: וְאֵין דֹּבֵר אֵלָיו דָּבָר
  english_pob_choice: and no one spoke a word to him
  chosen_spanish: y nadie le habló palabra alguna
  alternatives_spanish:
  - y nadie le dijo nada
  - y nadie pronunció palabra para él
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza el silencio absoluto; «habló palabra alguna» conserva mejor esa fuerza que «dijo nada».
- source_word: כִּי רָאוּ
  english_pob_choice: because they saw
  chosen_spanish: porque vieron
  alternatives_spanish:
  - pues vieron
  - ya que vieron
  lexicon: HALOT
  rationale: La causalidad es explícita; «porque» es claro y fiel al valor explicativo de כִּי.
- source_word: כִּי גָדַל הַכְּאֵב מְאֹד
  english_pob_choice: that his pain was very great
  chosen_spanish: que su dolor era muy grande
  alternatives_spanish:
  - que su sufrimiento era muy grande
  - que su angustia era muy grande
  - que su pena era muy grande
  lexicon: HALOT
  rationale: כאב abarca dolor físico y sufrimiento/pena. «Dolor» mantiene la amplitud semántica sin decidir de manera indebida por una sola dimensión; el intensificador «muy grande» refleja מְאֹד con naturalidad.
theological_decisions:
- issue: Alcance semántico de כְּאֵב en el cierre del versículo
  english_pob_reading: his pain was very great, with a note that it can also mean suffering or grief
  chosen_spanish_reading: su dolor era muy grande, con una nota que reconoce también sufrimiento, angustia o pena
  alternative_spanish_readings:
  - su sufrimiento era muy grande
  - su angustia era muy grande
  - su pena era muy grande
  rationale: El término hebreo no se limita al dolor físico; en Job puede incluir aflicción integral. Mantener «dolor» en el texto principal evita estrechar indebidamente el sentido, mientras la nota conserva las alternativas documentadas.
  doctrine_reference: Job 2:13; uso léxico de כְּאֵב en contexto sapiencial y de aflicción humana
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide en sustancia con el audit trail en inglés. Se decidió «en tierra» por naturalidad bíblica en español y «nadie le habló palabra alguna» para conservar el énfasis idiomático de silencio total. No se detectaron revisiones posteriores que alteraran la lectura base.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se usa «dolor» para כְּאֵב por su amplitud semántica; la nota preserva las alternativas documentadas sin borrar la tensión léxica.
  - «En tierra» refleja el escenario de duelo y evita una traducción más explicativa que desdibuje la concreción del hebreo.
