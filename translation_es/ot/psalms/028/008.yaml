  spanish_quality_summary: El español es natural, claro y digno, con registro bíblico moderno y buena legibilidad eclesial. La sintaxis fluye bien y evita calcos innecesarios. «Fortaleza de salvación» suena idiomático en este contexto y mantiene el paralelismo poético.
