review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: instalación real por los habitantes de Jerusalén, razón causal por la muerte de los hijos mayores, y nota final de reinado. También preserva correctamente la ambigüedad secundaria de הַבָּא בָעַרְבִים mediante nota. Sin embargo, hay dos desajustes relevantes con la fidelidad contextual y la legibilidad: «Ocozías»/«Joram» se apartan innecesariamente de los nombres documentados en el rastro POB («Ahazías»/«Jehoram»), y «todos los mayores» omite un referente que el inglés explicitó desde el contexto inmediato y que en español queda demasiado elíptico.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «la banda» suena algo poco natural en registro bíblico; aun así puede mantenerse por cercanía léxica al POB inglés. La mejora principal es explicitar «hijos mayores» para evitar ambigüedad, y ajustar los nombres a formas más alineadas con la auditoría y de lectura eclesial amplia. «En su lugar» fluye mejor que «en lugar de él».
  glossary_alignment: 'No hay términos del glosario teológico mayor en juego. Sí hay una desviación onomástica respecto del audit trail: el inglés POB usa Ahaziah/Jehoram, y el español draft introduce Ocozías/Joram sin justificación documentada. Conviene normalizar a «Ahazías» y «Jehoram» para preservar consistencia intertextual del proyecto.'
  issues:
  - severity: medium
    issue: Nombres propios no alineados con la auditoría POB
    rationale: El borrador usa «Ocozías» y «Joram», mientras el rastro inglés identifica Ahaziah y Jehoram. En español ambas formas existen, pero sin una política documentada aquí, cambiar de forma rompe consistencia editorial innecesariamente.
  - severity: medium
    issue: «Todos los mayores» deja demasiado implícito el referente
    rationale: El hebreo dice literalmente «los primeros/anteriores», pero el propio POB inglés explicitó «older sons» por claridad contextual. En español, «todos los mayores» podría referirse a personas mayores en general; «todos los hijos mayores» conserva mejor el sentido.
  - severity: low
    issue: «En lugar de él» es menos natural que «en su lugar»
    rationale: Ambas son fieles a תַּחְתָּיו, pero «en su lugar» suena más natural para sucesión real en español sin pérdida de precisión.
  revised_spanish_text: Entonces los habitantes de Jerusalén hicieron rey a Ahazías[a], su hijo menor, en su lugar, porque la banda que vino con los árabes al campamento había matado a todos los hijos mayores. Así reinó Ahazías, hijo de Jehoram, rey de Judá.
  revised_footnotes:
