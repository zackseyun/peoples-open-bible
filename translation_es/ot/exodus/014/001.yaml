review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido del hebreo: avance narrativo (''Entonces''), verbo formal de habla divina (''habló''), nombre propio ''Yahvé'', destinatario ''a Moisés'' y fórmula introductoria ''diciendo''. No hay pérdida semántica relevante frente a la fuente ni frente al rastro POB en inglés.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español bíblico moderno. La única reparación necesaria está en la nota al pie: el texto actual dice como alternativa ''Yahvé'', que ya es la forma usada en el texto principal, por lo que no funciona como alternativa real. Conviene ajustar la nota para reflejar variantes genuinas.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהֹוָה → ''Yahvé'', מֹשֶׁה → ''Moisés'', לֵּאמֹר → ''diciendo''. La decisión doctrinal de visibilizar el Tetragrámaton en español está bien aplicada. La nota debe armonizarse mejor con esa política, mencionando alternativas reales como ''Yahweh'' o ''Jehová''.'
  issues:
  - severity: low
    issue: La nota al pie presenta 'Yahvé' como alternativa aunque esa es la forma ya usada en el texto principal.
    rationale: Esto crea una nota redundante e inexacta desde el punto de vista editorial. La nota debe documentar variantes reales de transcripción o traducción, no repetir la lectura principal como si fuera alternativa.
  revised_spanish_text: Entonces Yahvé habló[a] a Moisés, diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: YHWH; también puede transcribirse ''Yahweh'' o ''Jehová''.'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo, natural en español y coherente con la política terminológica del proyecto. Solo se corrige la nota al pie para eliminar una pseudoalternativa redundante y reemplazarla por variantes reales de transcripción del Tetragrámaton.
