  language: en
  yaml_path: translation/deuterocanon/sirach/013/020.yaml
  text: When a rich man stumbles[a], he is supported by a friend; but when a poor man stumbles[b], he is driven away from friend to friend.
  footnotes:
  - marker: a
    text: Or, 'from one friend to another.' The Hebrew suggests that the poor man is passed along or driven off repeatedly rather than receiving real support.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs substantially here ('Lowliness is an abomination to the proud, and a poor man is an abomination to a rich man'), but the Hebrew witness is the primary source for this verse where it survives.
    reason: textual_variant
