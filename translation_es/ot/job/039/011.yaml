  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura interrogativa, la causalidad de כִּי, y el sentido básico de confiar y dejar el trabajo al animal. También preserva bien la nota léxica sobre יְגִיעֶךָ. Sin embargo, la secuencia final «dejarías tu labor a él» suena poco idiomática en español y no representa de la mejor manera el valor de אֵלָיו dentro de una construcción natural.
  spanish_quality_summary: El español es claro en general, pero «dejarías tu labor a él» resulta forzado y poco natural en registro bíblico moderno. Una formulación como «le dejarías tu labor» conserva el sentido, mejora la fluidez y expresa adecuadamente el complemento pronominal. También conviene mantener la nota alternativa sin problema.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. «Confiarías en él», «fuerza», y «labor» están bien alineados con las decisiones fuente. La nota sobre «labor / trabajo / fruto del trabajo» respeta la amplitud semántica de יְגִיעַ.
