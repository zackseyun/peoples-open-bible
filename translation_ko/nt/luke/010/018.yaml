source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτοῖς· Ἐθεώρουν τὸν Σατανᾶν ὡς ἀστραπὴν ἐκ τοῦ οὐρανοῦ πεσόντα.
base_translation:
  language: en
  yaml_path: translation/nt/luke/010/018.yaml
  text: 'And he said to them[a], “I was watching Satan fall like lightning from heaven.”'
  footnotes:
  - marker: a
    text: 'Or, ''I saw Satan fall like lightning from heaven.'' The Greek imperfect verb can be rendered more simply as ''I saw,'' though ''I was watching'' better preserves the ongoing aspect.'
    reason: lexical_alternative
translation:
  language: ko
  text: 예수께서 그들에게 이르셨습니다. 「사탄이 번개같이 하늘에서 떨어지는 것을 내가 보았다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: '10:18 — 「번개같이 떨어지는 사탄」의 묵시적 환상 보존'
  chosen_reading: 사탄이 번개같이 하늘에서 떨어지는 것을 내가 보았다
  alternative_readings:
  - 내가 사탄이 하늘에서 번갯불처럼 떨어지는 것을 보았다
  rationale: 헬라어 미완료 Ἐθεώρουν(나는 보고 있었다)와 부정과거 분사 πεσόντα(떨어진/떨어지는)의 결합은 일회적 환상 — 칠십이 인의 사역 중에 일어난 우주적 패배의 묵시적 광경 — 을 가리킨다. 한국어로는 「번개같이 ... 떨어지는 것」의 시각적 즉시성을 보존하고, 「내가 보았다」로 환상의 주체적 목격을 분명히 한다.
  doctrine_reference: DOCTRINE.md §1 (Original-language primacy)
