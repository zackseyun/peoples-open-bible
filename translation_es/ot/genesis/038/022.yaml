translation:
  language: es
  text: 'Así que volvió a Judá y dijo: «No la encontré, y además los hombres del lugar dijeron: “No ha habido aquí una prostituta de culto[a]”».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo qĕdēšâ, una mujer asociada con práctica sexual cultual ilícita; también puede traducirse «prostituta del templo».
    reason: lexical_alternative
  - marker: b
    text: 'O: «No hubo aquí una prostituta de culto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: So he returned
  chosen_spanish: Así que volvió
  alternatives_spanish:
  - Entonces volvió
  - Y volvió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide avance secuencial; «Así que» conserva la relación de consecuencia/narración natural en español sin sobrecargar el verso.
- source_word: אֶל יְהוּדָה
  english_pob_choice: to Judah
  chosen_spanish: a Judá
  alternatives_spanish:
  - a Yehudá
  - hacia Judá
  lexicon: HALOT
  rationale: El hebreo marca dirección hacia la persona llamada Judá. En español bíblico estándar, «Judá» es claro y fiel al nombre propio.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y le dijo
  - y respondió
  lexicon: HALOT
  rationale: El reporte de habla directa se traduce con el pasado simple. No se explicita un objeto indirecto porque el hebreo no lo exige aquí.
- source_word: לֹא מְצָאתִיהָ
  english_pob_choice: I did not find her
  chosen_spanish: No la encontré
  alternatives_spanish:
  - No la he encontrado
  - No pude encontrarla
  lexicon: HALOT
  rationale: El perfecto negativo informa una acción pasada concluida; «No la encontré» reproduce bien el sentido sin añadir matiz modal o aspectual extra.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: La partícula suma un segundo informe corroborativo; «y además» suena natural en español y preserva el valor aditivo.
- source_word: אַנְשֵׁי הַמָּקוֹם
  english_pob_choice: the men of the place
  chosen_spanish: los hombres del lugar
  alternatives_spanish:
  - los hombres de aquel lugar
  - la gente del lugar
  lexicon: HALOT
  rationale: El hebreo es masculino plural; «hombres» conserva ese rasgo, mientras que «del lugar» refleja la expresión local sin ampliar indebidamente a un colectivo neutro.
- source_word: אָמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - me dijeron
  lexicon: HALOT
  rationale: Es un verbo de decir en pasado simple; «dijeron» mantiene la sobriedad narrativa del original.
- source_word: לֹא הָיְתָה בָזֶה
  english_pob_choice: There has been no cult prostitute here
  chosen_spanish: No ha habido aquí
  alternatives_spanish:
  - No hubo aquí
  - Aquí no había
  lexicon: HALOT
  rationale: La negación existencial se expresa de forma natural con «no ha habido aquí». El adverbio «aquí» traduce בָזֶה sin forzar una frase más pesada.
- source_word: קְדֵשָׁה
  english_pob_choice: cult prostitute
  chosen_spanish: una qĕdēšâ
  alternatives_spanish:
  - una prostituta de culto
  - una prostituta sagrada
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transliterada para no borrar la tensión lexical y cultural del término, cuya equivalencia exacta es debatida. La nota explica la lectura cultual sin cerrar indebidamente el sentido.
theological_decisions:
- issue: Sentido de קְדֵשָׁה
  english_pob_reading: a woman associated with illicit cultic sexual practice; alternatively rendered “temple prostitute”
  chosen_spanish_reading: una mujer asociada con práctica sexual cultual ilícita, sin traducirla de forma interpretativa en el texto principal
  alternative_spanish_readings:
  - prostituta de culto
  - prostituta del templo
  - mujer consagrada
  rationale: El POB inglés conserva la tensión entre el dato léxico y la interpretación cultual. En español, una transliteración en el texto principal evita imponer una equivalencia discutible, mientras la nota ofrece la explicación semántica.
  doctrine_reference: Lexical-theological note on ancient Near Eastern cultic terminology; cf. HALOT and context in Genesis 38
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la segunda cláusula a una negación existencial más natural («There has been no...»). La versión española sigue ese mismo valor con «No ha habido aquí», manteniendo el sentido y la fluidez. No se introdujeron otros cambios relevantes respecto del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el nombre propio según el uso bíblico en español.
  - Se evita «SEÑOR» o sustituciones eufemísticas porque el versículo no contiene el Nombre divino.
  - «Los hombres del lugar» conserva el género masculino plural del hebreo.
  - La transliteración qĕdēšâ se reserva para preservar la tensión léxica documentada por el POB inglés.
