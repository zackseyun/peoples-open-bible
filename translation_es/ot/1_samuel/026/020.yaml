base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/020.yaml
  text: So now[a], do not let my blood fall to the ground away from the presence of Yahweh, for the king of Israel has come out to seek a single flea[b], as one hunts a partridge in the mountains.
  footnotes:
