base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/040.yaml
  text: And Nehemiah and Atharias told them not to partake of the holy things until a priest should arise clothed with the Urim and the Thummim[a][b].
  footnotes:
  - marker: a
    text: Traditionally, 'the Manifestation and the Truth' refers to the priestly objects known from the Hebrew parallel as the Urim and the Thummim.
    reason: alternative_reading
  - marker: b
    text: That is, they were not to eat from the sacred priestly provisions until a qualified priest could render a definitive decision.
    reason: cultural_note
