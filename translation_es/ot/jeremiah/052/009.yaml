translation:
  language: es
  text: Capturaron al rey y lo llevaron ante el rey de Babilonia, en Ribla, en la tierra de Hamat, y pronunció sentencia contra él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo literalmente dice: «y habló con él juicios», un modismo para emitir decisiones judiciales. También puede traducirse: «y le dictó sentencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפְּשׂוּ
  english_pob_choice: They captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - apresaron
  - tomaron preso
  - se apoderaron de
  lexicon: HALOT
  rationale: El verbo hebreo expresa aprehender con fuerza en contexto militar. 'Capturaron' es natural en español moderno y conserva el sentido de tomar prisionero sin añadir matiz excesivo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - al rey
  - el monarca
  lexicon: HALOT
  rationale: 'Se mantiene la referencia definida al rey ya identificado en el contexto. En español, el acusativo personal con ''a'' es obligatorio: ''al rey''.'
- source_word: וַיַּעֲלוּ אֹתוֹ אֶל
  english_pob_choice: and brought him up to
  chosen_spanish: lo llevaron ante
  alternatives_spanish:
  - lo subieron a
  - lo llevaron a
  - lo condujeron ante
  lexicon: HALOT
  rationale: עלה conserva en hebreo el giro direccional de 'subir/llevar arriba'. En español, 'lo llevaron ante' comunica con naturalidad el traslado a presencia del rey sin perder el sentido procesal del contexto.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el monarca de Babilonia
  - Babilonia, su rey
  lexicon: HALOT
  rationale: Construcción posesiva normal y transparente en español; no hay razón para alterar el título real.
- source_word: רִבְלָתָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblatá
  - en Riblá
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma usual en español bíblico. La forma breve 'Ribla' es clara y legible.
- source_word: בְּאֶרֶץ חֲמָת
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Hamat
  alternatives_spanish:
  - en el territorio de Hamat
  - en la región de Hamat
  lexicon: HALOT
  rationale: '''Tierra de Hamat'' reproduce el valor geográfico de אֶרֶץ sin forzar una paráfrasis. ''Hamat'' sigue el patrón toponímico del español bíblico.'
- source_word: וַיְדַבֵּר אִתּוֹ מִשְׁפָּטִים
  english_pob_choice: and he passed sentence on him
  chosen_spanish: y le dictó sentencia
  alternatives_spanish:
  - y pronunció juicios sobre él
  - y pasó sentencia sobre él
  - y dio sentencia contra él
  lexicon: HALOT
  rationale: La frase hebrea literal 'habló con él juicios' es un modismo judicial. 'Le dictó sentencia' comunica con precisión el acto judicial y preserva el valor decisorio que el POB inglés resolvió con 'passed sentence on him'.
theological_decisions:
- issue: Modismo judicial de מִשְׁפָּטִים
  english_pob_reading: and he passed sentence on him
  chosen_spanish_reading: y le dictó sentencia
  alternative_spanish_readings:
  - y pronunció juicios sobre él
  - y dio sentencia contra él
  rationale: No se traduce literalmente 'juicios' porque en español sonaría artificial y oscurecería el acto forense. La elección conserva la tensión entre la literalidad del hebreo y la inteligibilidad judicial del contexto narrativo.
  doctrine_reference: Hebrew idiom / legal diction; cf. narrative judicial usage in prophetic historiography
translation_notes:
  revision_awareness: 'El texto base inglés pasó de ''he pronounced judgments on him'' a ''he passed sentence on him'' en una revisión posterior para lograr una formulación más natural y precisa del modismo judicial. La versión española sigue esa revisión y opta por una equivalencia natural equivalente: ''le dictó sentencia''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Babilonia'' y ''Hamat'' se mantienen como topónimos bíblicos estándar en español.'
  - La estructura narrativa conserva sujetos y objetos explícitos para evitar ambigüedad en español.
  - No se introduce el nombre propio del rey de Judá, porque el hebreo también dice simplemente 'el rey'.
