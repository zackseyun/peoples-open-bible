- from: Yo también no reprimiré mi boca[a]; hablaré en la angustia de mi espíritu[b][c]; me quejaré en la amargura de mi alma.
  to: Tampoco yo reprimiré mi boca[a]; hablaré en la angustia de mi espíritu[b]; me quejaré[c] en la amargura de mi alma.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y claridad del español sin cambiar el sentido: «Tampoco yo» expresa mejor la continuación aditiva en contexto que «Yo también no». Además, se corrigió una nota redundante para que realmente preserve una alternativa léxica documentada, y se reubicó la nota del verbo שׂיחַ sobre «me quejaré», que es donde corresponde.'
