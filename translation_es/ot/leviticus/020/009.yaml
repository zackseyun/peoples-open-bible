base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/009.yaml
  text: For any man who curses his father or his mother shall surely be put to death[a]; he has cursed his father and his mother[c][b]; his blood is on him.
  footnotes:
  - marker: a
    text: Hebrew 'a man, a man,' an idiom meaning 'any man' or 'whoever.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his father and his mother'; English 'or' brings out the legal sense that cursing either parent incurs the penalty.
    reason: lexical_alternative
  - marker: c
    text: Or 'his bloodguilt is upon him.' The Hebrew idiom assigns responsibility for his death to himself.
    reason: lexical_alternative
