review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura casuística del hebreo, distingue correctamente entre el hombre al que ella está vinculada y «otro hombre», mantiene «virgen» y conserva la neutralidad de וְשָׁכַב עִמָּהּ sin introducir coerción. La nota sobre מְאֹרָשָׂה también preserva la idea de un vínculo formal y legalmente vinculante.
  spanish_quality_summary: El texto es claro y legible, pero «Si hay una joven» suena menos idiomático en español jurídico-narrativo que «Si hay una joven…»? El mayor ajuste necesario es «comprometida con un hombre», que en español moderno suele sugerir un compromiso menos formal que el hebreo מְאֹרָשָׂה. «Desposada con un hombre» o «prometida a un hombre» transmiten mejor el carácter jurídicamente vinculante. También conviene armonizar la nota con la opción principal elegida.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es mantener la fuerza formal de מְאֹרָשָׂה; para ello, «desposada» funciona mejor en este contexto legal que «comprometida».
  issues:
  - severity: medium
    issue: «comprometida con un hombre» debilita el carácter formal/jurídicamente vinculante de מְאֹרָשָׂה
    rationale: Aunque es comprensible, en español contemporáneo «comprometida» puede sonar a compromiso social informal. El hebreo describe un desposorio formal con peso legal, y el propio rastro de auditoría lo subraya.
  - severity: low
    issue: La nota al pie ofrece como alternativa la opción más precisa, mientras el texto principal usa una forma menos exacta
    rationale: Esto crea una pequeña incoherencia entre texto y nota. Si «desposada» es la alternativa más fiel al valor legal, conviene llevarla al texto principal y dejar «comprometida» como posible alternativa implícita no necesaria en nota.
  revised_spanish_text: Si hay una joven, virgen, desposada[a] con un hombre, y otro hombre la encuentra en la ciudad y se acuesta con ella,
