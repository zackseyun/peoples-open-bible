translation:
  language: es
  text: Y recordó la maldad de los hijos de Baian[a], que eran para el pueblo un lazo y un tropiezo, tendiéndoles emboscadas en los caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de Baean»; el nombre griego Βαιάν admite más de una transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - tuvo presente
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι introduce la rememoración de una hostilidad previa como motivo narrativo. «Recordó» es natural, formal y conserva la idea de traer a la mente sin añadir matices no explicitados.
- source_word: κακίας
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad criminal
  - maldad maliciosa
  - malicia
  lexicon: BDAG
  rationale: En este contexto narrativo, κακία expresa conducta hostil y mala. «Maldad» preserva el sentido moral amplio sin restringirlo indebidamente a una sola clase de mal.
- source_word: υἱῶν Βαιάν
  english_pob_choice: the sons of Baian
  chosen_spanish: los hijos de Baian
  alternatives_spanish:
  - los descendientes de Baian
  - los hijos de Baean
  lexicon: LSJ
  rationale: υἱοί con nombre propio puede designar un clan o grupo asociado con un antepasado. «Hijos de Baian» mantiene la forma de la fuente y evita expandir interpretativamente el parentesco.
- source_word: παγίδα
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: BDAG
  rationale: El campo semántico apunta a un artefacto de captura figurado. En español, «trampa» comunica con claridad la imagen peligrosa; la alternativa «lazo» podría sonar más arcaica o menos general.
- source_word: σκάνδαλον
  english_pob_choice: a stumbling block
  chosen_spanish: un tropiezo
  alternatives_spanish:
  - una piedra de tropiezo
  - un escándalo
  lexicon: BDAG
  rationale: σκάνδαλον conserva la idea de algo que hace caer o tropezar. «Tropiezo» es breve y natural en español; «piedra de tropiezo» sería más explícito pero añade materialidad no exigida por el contexto.
- source_word: ἐν τῷ ἐνεδρεύειν
  english_pob_choice: by lying in ambush
  chosen_spanish: acechándolos
  alternatives_spanish:
  - mientras los acechaban
  - al acecharlos
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa circunstancia o medio. «Acechándolos» conserva el valor durativo y la relación con la acción hostil sin sobrecargar la frase.
- source_word: αὐτοὺς
  english_pob_choice: for them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El pronombre se refiere al pueblo como objeto de la emboscada. En español, la referencia queda clara por el objeto directo enclítico en «acechándolos»; no es necesario repetirla con una construcción más pesada.
- source_word: ἐν ταῖς ὁδοῖς
  english_pob_choice: on the roads
  chosen_spanish: en los caminos
  alternatives_spanish:
  - sobre los caminos
  - por los caminos
  lexicon: BDAG
  rationale: ὁδοί designa rutas de viaje; «caminos» es idiomático y natural en español bíblico contemporáneo. «En los caminos» conserva la localización sin forzar una imagen moderna ajena al texto.
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión final inglesa, que suprimió «by» para reflejar más directamente la construcción griega. En español se optó por una estructura equivalente y natural («acechándolos»), manteniendo todos los elementos semánticos del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó el paralelismo figurado «trampa y tropiezo» para reflejar παγίδα y σκάνδαλον sin nivelar sus matices.
  - La transliteración «Baian» sigue la forma principal del audit trail; la nota registra la variante «Baean».
