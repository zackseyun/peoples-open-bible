translation:
  language: es
  text: ¡Pon la trompeta[a] en tu boca! Como un águila[b] sobre la casa de Yahvé, porque han transgredido mi pacto y se han rebelado contra mi ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuerno'. שׁוֹפָר puede referirse al cuerno de carnero o a un instrumento de alarma similar.
    reason: lexical_alternative
  - marker: b
    text: O 'buitre'. נֶשֶׁר puede referirse de manera más amplia a un gran ave de rapiña.
    reason: lexical_alternative
  - marker: c
    text: O 'mi instrucción'. תּוֹרָה puede significar 'ley', 'instrucción' o 'enseñanza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל חִכְּךָ שֹׁפָר
  english_pob_choice: Put the trumpet to your mouth
  chosen_spanish: Pon el cuerno a tu boca
  alternatives_spanish:
  - Pon la trompeta a tu boca
  - Lleva el cuerno a tus labios
  - Pon el cuerno en tu paladar
  lexicon: HALOT
  rationale: El hebreo es abrupto y elíptico; en español conviene una orden clara sin perder la imagen concreta del instrumento llevado a la boca. 'Cuerno' mantiene el valor probable del שֹׁפָר y evita imponer 'trompeta' si se quiere conservar la concreción del término hebreo.
- source_word: כַּנֶּשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: Como un águila
  alternatives_spanish:
  - Como un buitre
  - Como un ave de rapiña
  lexicon: HALOT
  rationale: '''Águila'' sigue la elección principal del POB en inglés y conserva la imagen de un ave de presa que desciende con rapidez. Se mantiene la alternativa zoológica implícita en nota para no borrar la ambigüedad del término hebreo.'
- source_word: עַל בֵּית יְהוָה
  english_pob_choice: over the house of Yahweh
  chosen_spanish: sobre la casa de Yahvé
  alternatives_spanish:
  - contra la casa de Yahvé
  - encima de la casa de Yahvé
  - sobre el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora espacial 'sobre' para reflejar עַל y no resolver de más el matiz hostil o vigilante. 'Casa de Yahvé' mantiene la ambigüedad del hebreo entre templo, casa real o comunidad del pacto, sin estrechar el referente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide rendir el Tetragrámaton como 'Yahvé' en el texto principal. Se evita la sustitución por un título para conservar el nombre divino del hebreo.
- source_word: עָבְרוּ בְרִיתִי
  english_pob_choice: they have transgressed my covenant
  chosen_spanish: han transgredido mi pacto
  alternatives_spanish:
  - han quebrantado mi pacto
  - han pasado por encima de mi pacto
  - han violado mi pacto
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'transgressed' por ser más natural y exacto. 'Transgredido' conserva la fuerza jurídica y covenantal de עבר sin borrar la relación de alianza; 'pacto' es el equivalente idiomático más claro en español.
- source_word: תּוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  - mi torá
  lexicon: HALOT
  rationale: En este contexto litigioso, 'ley' reproduce bien la fuerza normativa de תּוֹרָה y corresponde a la elección principal del POB. Se preserva la posibilidad de 'instrucción' en nota porque el término hebreo es más amplio que una simple ley codificada.
- source_word: פָּשָׁעוּ
  english_pob_choice: rebelled against
  chosen_spanish: se han rebelado contra
  alternatives_spanish:
  - han transgredido
  - se han insurgido contra
  - han desafiado
  lexicon: HALOT
  rationale: '''Rebelarse contra'' recoge la oposición voluntaria y relacional de פשע, no solo una infracción puntual. Además, funciona naturalmente con ''mi ley'' en español.'
theological_decisions:
- issue: Referente de 'la casa de Yahvé'
  english_pob_reading: retain the literal phrase without resolving whether it refers to the temple, the land, or the covenant people
  chosen_spanish_reading: conservar 'la casa de Yahvé' sin precisar si alude al templo, al pueblo o al ámbito del pacto
  alternative_spanish_readings:
  - el templo de Yahvé
  - el pueblo de Yahvé
  - la casa/población de Yahvé
  rationale: El hebreo permite una ambigüedad significativa en contexto profético. Mantenerla evita cerrar prematuramente el alcance del anuncio de juicio.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de traducir el Tetragrámaton como 'Yahvé', preservando el nombre propio revelado en lugar de una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: He seguido la última revisión inglesa que prefirió 'transgressed my covenant' en lugar de 'crossed my covenant', y he reflejado esa decisión con 'han transgredido mi pacto'. También he mantenido el nombre divino como 'Yahvé' conforme a la política del proyecto. La única corrección necesaria respecto del intento previo es anclar todos los marcadores de nota presentes en el texto español; por eso cada nota a, b y c aparece exactamente donde corresponde.
  spanish_consistency_notes:
  - Usé 'Yahvé' en lugar de 'el SEÑOR' para seguir la terminología del proyecto.
  - Elegí 'pacto' para בְרִיתִי porque es la forma más natural y estable en español bíblico contemporáneo, sin borrar el matiz de alianza.
  - Conservé 'ley' para תּוֹרָתִי en el cuerpo principal y dejé 'instrucción' en nota para no perder la amplitud semántica.
  - '''Casa de Yahvé'' se mantuvo sin resolver su referente, preservando la tensión profética del hebreo.'
