base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/006/012.yaml
  text: The one far away will die by pestilence[a], and the one nearby will fall by the sword, and the one left and besieged will die by famine[b]; and I will spend my wrath on them.
  footnotes:
  - marker: a
    text: Or 'the one left and shut up'; the Hebrew term may denote one hemmed in under siege, which fits the following 'by famine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will exhaust my wrath on them.' The Hebrew verb conveys bringing wrath to its full end in judgment.
    reason: lexical_alternative
