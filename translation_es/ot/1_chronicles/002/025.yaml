translation:
  language: es
  text: Los hijos de Jerameel[a], el primogénito de Hezrón, fueron Ram su primogénito, Buna, Oren, Ozem y Ahías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sintaxis hebrea puede leerse como una lista de cinco hijos de Jerameel, con Ram identificado como «su primogénito». Algunos intérpretes han propuesto entender «Ahías» de otro modo dentro de la lista, pero la lectura más directa lo toma como otro nombre personal de la serie.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - estuvieron
  lexicon: HALOT
  rationale: En una lista genealógica, el verbo introduce a los miembros de la línea familiar; en español, «fueron» reproduce bien la función enumerativa sin forzar un matiz de cambio de estado.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos varones de
  lexicon: HALOT
  rationale: La frase genealógica con un antepasado masculino se expresa de forma natural como «los hijos de». Mantiene el valor familiar y genealógico del hebreo sin volverlo más técnico de lo necesario.
- source_word: יְרַחְמְאֵל
  english_pob_choice: Jerahmeel
  chosen_spanish: Jerameel
  alternatives_spanish:
  - Jerahmeel
  lexicon: Transliteración bíblica convencional en español
  rationale: Se adopta la forma española más asentada y legible, «Jerameel», para un nombre propio, evitando una transliteración más cercana al inglés que sería menos natural en español.
- source_word: בְּכ֥וֹר / הַבְּכ֣וֹר
  english_pob_choice: the firstborn / his firstborn
  chosen_spanish: el primogénito / su primogénito
  alternatives_spanish:
  - el primero nacido
  - el hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor genealógico y de estatus del término hebreo mejor que una paráfrasis. La repetición se mantiene con «su primogénito» para reflejar la apposición y la relación con Jerameel, como en el audit trail inglés.
- source_word: רָם
  english_pob_choice: Ram
  chosen_spanish: Ram
  lexicon: Transliteración bíblica convencional
  rationale: Nombre propio mantenido por transliteración estándar.
- source_word: וּבוּנָה
  english_pob_choice: Bunah
  chosen_spanish: Buná
  alternatives_spanish:
  - Buna
  lexicon: Transliteración bíblica convencional en español
  rationale: Se adapta el nombre a una forma española legible y coherente con la acentuación del idioma.
- source_word: וָאֹרֶן
  english_pob_choice: Oren
  chosen_spanish: Oren
  lexicon: Transliteración bíblica convencional
  rationale: Nombre propio mantenido por transliteración estándar.
- source_word: וָאֹצֶם
  english_pob_choice: Ozem
  chosen_spanish: Ozem
  lexicon: Transliteración bíblica convencional
  rationale: Nombre propio mantenido por transliteración estándar.
- source_word: אֲחִיָּה
  english_pob_choice: Ahijah
  chosen_spanish: Ahías
  alternatives_spanish:
  - Ahíah
  - Ahijah
  lexicon: Transliteración bíblica convencional en español
  rationale: Se usa la forma española tradicional y reconocible «Ahías», equivalente al nombre hebreo, en lugar de una transliteración más anglicada.
theological_decisions:
- issue: Relación sintáctica entre «primogénito de Hezrón» y «su primogénito»
  english_pob_reading: Ram is identified as Jerahmeel's firstborn, while Jerahmeel is the firstborn of Hezron.
  chosen_spanish_reading: Ram queda identificado como el primogénito de Jerameel, y Jerameel como el primogénito de Hezrón.
  alternative_spanish_readings:
  - Ram el primogénito
  - Ram, el primogénito de Hezrón
  rationale: La redacción conserva la doble relación de estatus sin aplanarla. Esto refleja el hebreo y el ajuste editorial del texto inglés, donde «his firstborn» clarifica a quién pertenece la primogenitura.
  doctrine_reference: No aplica; decisión sintáctico-genealógica.
translation_notes:
  revision_awareness: El inglés revisado cambió de «Ram the firstborn» a «Ram his firstborn» para aclarar la relación posesiva con Jerahmeel. La versión española sigue esa revisión con «Ram, su primogénito», manteniendo además la repetición genealógica del hebreo.
  spanish_consistency_notes:
  - Se usa «primogénito» de manera consistente para בְּכוֹר.
  - Los nombres propios se mantienen transliterados o adaptados con formas bíblicas usuales en español, sin añadir artículos innecesarios.
  - Se conserva la estructura genealógica breve y enumerativa del hebreo, sin expandirla con explicaciones dentro del versículo.
