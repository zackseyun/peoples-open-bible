review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contraste de reversión (''En lugar de''), estado previo de desolación y odio, ausencia de tránsito, y transformación futura en honor duradero y gozo continuo. Sin embargo, la nota al pie está mal formulada: presenta como alternativa el mismo texto principal (''una majestad eterna'') en vez de preservar las alternativas léxicas documentadas para גאון, especialmente ''gloria'' o ''exaltación''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Abandonada y odiada', 'sin que nadie pasara' y 'de generación en generación' leen bien. 'Te convertiré en una majestad eterna' es comprensible, aunque algo menos directo que 'te haré'. Aun así, no requiere cambio forzoso. El problema real es de calidad editorial en la nota, no de legibilidad del texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión 'majestad' para גאון sigue correctamente la revisión inglesa y evita el matiz negativo de 'orgullo'. No aparecen términos de glosario sensible como Yahvé, Mesías, esclavo, etc. Debe corregirse solo la nota léxica para alinearla con el expediente inglés y con las alternativas hebreas pertinentes.
  issues:
  - severity: medium
    issue: La nota al pie repite 'una majestad eterna' como si fuera alternativa.
    rationale: El texto principal ya usa 'una majestad eterna'. Una nota de alternativa léxica no debe ofrecer la misma lectura como variante; debe preservar alternativas reales como 'una gloria eterna' o 'una exaltación eterna', conforme al expediente inglés y al valor de גאון.
  - severity: low
    issue: La formulación de la nota podría reflejar mejor el abanico semántico de גאון.
    rationale: La explicación actual es aceptable, pero puede afinarse para destacar 'exaltación', 'majestad' o 'gloria' como honor/estatus elevado, evitando ambigüedad editorial.
  revised_spanish_text: En lugar de que fueras abandonada y odiada[a], sin que nadie pasara, te convertiré en una majestad eterna, un gozo de generación en generación.
  revised_footnotes:
  - marker: a
    text: O ‘una gloria eterna’ o ‘una exaltación eterna’. El término hebreo puede denotar exaltación, majestad o gloria en el sentido de estatus honrado.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo, natural en español y coherente con la decisión inglesa de usar 'majesty'. Solo se corrige la nota al pie, que erróneamente repetía la misma lectura del texto principal en vez de dar alternativas reales y documentadas para גאון.
