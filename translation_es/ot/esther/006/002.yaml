review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: «se halló escrito», «había informado acerca de», «dos de los eunucos del rey», y la pertenencia al grupo «entre los que guardaban el umbral». También preserva la variación onomástica de בִּגְתָנָא mediante nota. Sin embargo, «echar mano al rey Asuero» no comunica con claridad en español moderno el modismo hostil de לִשְׁלֹחַ יָד; suena ambiguo o coloquial y puede entenderse como ‘agarrar’ más que como atentado.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero necesita un ajuste idiomático clave. «Los cuales» funciona, aunque una relativa simple fluye mejor. La nota b está mal anclada: la alternativa léxica sobre «oficiales de la corte» corresponde a «eunucos», no a «umbral». Además, en la nota b conviene quitar las comillas inglesas sobrantes.'
  glossary_alignment: No hay términos teológicos de proyecto implicados. «Eunucos» concuerda con la decisión POB para סָרִיס, con alternativa preservada en nota. Los nombres propios están razonablemente manejados, manteniendo «Bigtana» con nota sobre «Bigtán».
  issues:
  - severity: high
    issue: «echar mano al rey Asuero» no reproduce bien el sentido hostil de לִשְׁלֹחַ יָד
    rationale: En español actual, «echar mano a» suele significar ‘asir’ o ‘recurrir a’, no ‘atentar contra’. El hebreo expresa una acción hostil idiomática; «poner las manos sobre» o «atentar contra» comunica mejor el sentido sin perder naturalidad.
  - severity: medium
    issue: La nota b está anclada en «umbral» pero su contenido explica «eunucos»
    rationale: La nota lexical alternativa trata de סָרִיסֵי הַמֶּלֶךְ, no de מִשֹּׁמְרֵי הַסַּף. Debe colocarse junto a «eunucos» para corresponder al término explicado.
  - severity: low
    issue: Puntuación/formato mejorable en la nota b
    rationale: Empieza con una comilla simple innecesaria antes de O:. Conviene normalizarla a estilo español claro.
  revised_spanish_text: Y se halló escrito que Mardoqueo había informado acerca de Bigtana y Tares[a], dos de los eunucos[b] del rey, entre los que guardaban el umbral, que habían buscado poner las manos sobre el rey Asuero.
