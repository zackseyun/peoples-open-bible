- from: Y recordé las misericordias de Yahvé, y sus actos de fidelidad del pacto desde antiguo, que libra[a] a los que se refugian en él[b], y los rescata de todo mal.
  to: Y recordé las misericordias de Yahvé, y sus actos de fidelidad del pacto desde antiguo[a], que libra a los que se refugian en él[b], y los redime de todo mal.
