revisions:
- from: No temas[a], ni te turbes. ¿No te hice oír desde hace mucho y te lo declaré? Y ustedes son mis testigos. ¿Hay un Dios[b] fuera de mí? No hay Roca[c]; no conozco ninguna.
  to: No teman[a], y no tiemblen. ¿No les hice oír[b] desde hace mucho y lo declaré? Y ustedes son mis testigos. ¿Hay un Dios fuera de mí? No hay Roca[c]; no conozco ninguna otra.
  rationale: Se revisa para (1) unificar el tratamiento en plural, que en español lee mejor en este contexto comunitario y evita la mezcla 'tú/ustedes'; (2) alinear la nota [b] con la alternativa documentada en el POB inglés para מֵאָז; y (3) usar 'tiemblen' para reflejar mejor el paralelismo con 'no teman'. Se conserva 'Dios' y 'Roca' conforme a las decisiones léxicas y teológicas auditadas.
