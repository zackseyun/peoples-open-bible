translation:
  language: es
  text: 'Los sacerdotes no dijeron: «¿Dónde está Yahvé?» Los que manejan[a] la ley no me conocieron; los pastores se rebelaron contra mí; los profetas profetizaron por Baal[b] y fueron tras cosas que no sirven de nada[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que empuñan la ley» o «los que enseñan la ley». El hebreo dice literalmente «los que manejan» o «agarran» la ley.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los profetas profetizaron en nombre de Baal».'
    reason: alternative_reading
  - marker: c
    text: 'O: «fueron tras lo que no aprovecha» o «fueron tras cosas inútiles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - el sacerdocio
  lexicon: HALOT
  rationale: Se trata del plural concreto del grupo sacerdotal; en español, «sacerdotes» conserva la referencia directa y natural del hebreo.
- source_word: אַיֵּה יְהוָה
  english_pob_choice: Where is Yahweh?
  chosen_spanish: ¿Dónde está Yahvé?
  alternatives_spanish:
  - ¿Dónde está Yahweh?
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino directamente; por la norma del proyecto se mantiene «Yahvé» en el texto principal, conservando la pregunta retórica de abandono del pacto.
- source_word: תֹפְשֵׂי הַתּוֹרָה
  english_pob_choice: Those who handle the law
  chosen_spanish: los que manejan la ley
  alternatives_spanish:
  - los que enseñan la ley
  - los que toman la ley
  - los que se aferran a la ley
  lexicon: HALOT
  rationale: El verbo sugiere tomar o asir con la mano; «manejan» conserva la imagen concreta sin restringir indebidamente a una sola función ministerial.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto profético, «la ley» es la forma más idiomática y clara en español, manteniendo el referente revelado sin transliterar.
- source_word: לֹא יְדָעוּנִי
  english_pob_choice: did not know me
  chosen_spanish: no me conocieron
  alternatives_spanish:
  - no me reconocieron
  - no me llegaron a conocer
  lexicon: HALOT
  rationale: «Conocer» en hebreo tiene fuerza relacional y de pacto; «me conocieron» preserva esa acusación personal en español, aunque puede implicar mero saber o relación según el contexto.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los líderes
  - los gobernantes
  lexicon: HALOT
  rationale: Se conserva la metáfora profética de liderazgo como pastoreo, que el español entiende bien y no debe desactivar prematuramente.
- source_word: פָּשְׁעוּ בִי
  english_pob_choice: rebelled against me
  chosen_spanish: se rebelaron contra mí
  alternatives_spanish:
  - transgredieron contra mí
  - se alzaron contra mí
  lexicon: HALOT
  rationale: פשע expresa rebelión o traición de pacto; «se rebelaron contra mí» comunica mejor la fuerza del término que un simple «pecaron».
- source_word: הַנְּבִיאִים נִבְּאוּ בַבַּעַל
  english_pob_choice: the prophets prophesied by Baal
  chosen_spanish: los profetas profetizaron por Baal
  alternatives_spanish:
  - los profetas profetizaron en nombre de Baal
  - los profetas profetizaron a Baal
  lexicon: HALOT
  rationale: La preposición hebrea permite una relación de esfera o agencia; «por Baal» mantiene la brevedad y el choque del texto, sin decidir más de lo que exige la forma hebrea.
- source_word: וְאַחֲרֵי לֹא יוֹעִלוּ הָלָכוּ
  english_pob_choice: went after things that do not profit
  chosen_spanish: y fueron tras cosas que no aprovechan
  alternatives_spanish:
  - y fueron tras lo que no aprovecha
  - y caminaron tras cosas inútiles
  - y siguieron lo que no sirve
  lexicon: HALOT
  rationale: La construcción idiomática de ir/fuer tras expresa persecución o seguimiento; «cosas que no aprovechan» refleja con naturalidad el participio de «no aprovechar» sin añadir explícitamente «ídolos».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo usa el Tetragrámaton directamente. Conforme a la norma terminológica del proyecto, se traduce como «Yahvé» en el texto principal, evitando la máscara «SEÑOR» y manteniendo visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: How explicit the final object should be
  english_pob_reading: things that do not profit
  chosen_spanish_reading: cosas que no aprovechan
  alternative_spanish_readings:
  - cosas inútiles
  - lo que no aprovecha
  - ídolos que no aprovechan
  rationale: El hebreo deja implícito el objeto de 'ir tras' y usa una forma verbal de 'no aprovechar'. La traducción conserva esa apertura y evita especificar 'ídolos' más allá de lo que el texto muestra, aunque el contexto lo sugiera.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que cada marcador de nota aparece exactamente en el texto español y que no hay notas sin anclaje. La redacción sigue el texto hebreo y el audit trail inglés, con el nombre divino y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «ley» para הַתּוֹרָה en este contexto.
  - «Manejan la ley» conserva la metáfora concreta del hebreo.
  - «Se rebelaron contra mí» refleja la fuerza de פָּשְׁעוּ בִי como rebelión de pacto.
  - No se explicita 'ídolos' en la línea principal para no exceder el hebreo.
