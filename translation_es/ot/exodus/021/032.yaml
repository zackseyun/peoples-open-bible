  verdict: revise
  source_alignment_summary: 'El borrador conserva la mayor parte del sentido legal del hebreo: el buey que cornea, la compensación de treinta siclos de plata, el pago al amo del esclavo y la pena del buey. Sin embargo, la redacción principal altera una distinción significativa del original al convertir la pareja explícita ''esclavo varón o esclava'' en ''un esclavo... sea hombre o mujer''. El hebreo distingue dos términos, עֶבֶד y אָמָה, y el inglés POB preserva esa distinción en el texto principal, no solo en nota.'
  spanish_quality_summary: 'El español es claro y legible, pero ''Si un esclavo es corneado por el buey, sea hombre o mujer'' suena menos natural y además desdibuja la distinción sexual/jurídica que el texto expresa. Una formulación coordinada explícita mejora tanto la fidelidad como la fluidez: ''Si el buey cornea a un esclavo o a una esclava''. El resto del verso suena bien en español bíblico moderno.'
  glossary_alignment: La elección de 'esclavo/esclava' está bien alineada con la política del proyecto para עֶבֶד/אָמָה en contexto legal. 'Siclos de plata', 'amo' y 'será apedreado' son aceptables y fieles. No hay asuntos terminológicos teológicos especiales.
  issues:
  - severity: high
    issue: La distinción entre esclavo varón y esclava no se preserva en el texto principal.
    rationale: El hebreo usa dos sustantivos distintos, עֶבֶד y אָמָה, y el English POB los mantiene como 'male slave or a female slave'. El borrador los fusiona en 'un esclavo... sea hombre o mujer', relegando la distinción a la nota. Eso reduce una elección léxica significativa del original.
  - severity: medium
    issue: La estructura pasiva 'es corneado por el buey' es menos directa que el original.
    rationale: Aunque no es incorrecta, el hebreo presenta al buey como sujeto del verbo ('si el buey cornea'). En español legal-narrativo, mantener esa estructura resulta más natural y precisa aquí.
  revised_spanish_text: Si el buey cornea a un esclavo o a una esclava[a], dará treinta siclos de plata a su amo, y el buey será apedreado.
  revised_footnotes:
  - marker: a
    text: O «a un esclavo, hombre o mujer». El hebreo distingue un esclavo varón (עֶבֶד) y una esclava (אָמָה).
    reason: lexical_alternative
  revision_rationale: Se revisa para preservar en el texto principal la distinción léxica explícita del hebreo entre esclavo varón y esclava, en conformidad con el audit trail inglés y con la fuerza jurídica del pasaje. También se ajusta la cláusula inicial a una sintaxis más natural y más cercana al original hebreo, manteniendo el buey como sujeto del verbo.
