  yaml_path: translation/ot/isaiah/005/025.yaml
  text: Therefore the anger of Yahweh burned against his people[a], and he stretched out his hand against them and struck them; the mountains quaked, and their corpses were like refuse in the midst of the streets. For all this, his anger has not turned away, and his hand is still stretched out.
  footnotes:
