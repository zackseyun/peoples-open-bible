translation:
  language: es
  text: Seraías, hijo de Hilcías, hijo de Mesulam, hijo de Sadoc, hijo de Merayot, hijo de Ahitub, jefe[a] de la casa de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «líder» o «supervisor».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo.
    reason: cultural_note
lexical_decisions:
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Seraia
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre personal para conservar la forma identificable del hebreo, con adaptación ortográfica española normalizada en -ías, común en nombres bíblicos.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En esta genealogía repetida, la relación familiar directa es la opción más natural en español y sigue de cerca la fórmula hebrea sin ampliar innecesariamente el alcance.
- source_word: נְגִיד
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - jefe
  - supervisor
  lexicon: HALOT
  rationale: En español, 'jefe' comunica bien la idea de alguien puesto al frente. 'Líder' es posible, pero suena más moderno y menos preciso en una lista administrativa-sacerdotal; 'jefe' conserva mejor la función de autoridad.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'casa de Dios' porque refleja con transparencia el hebreo. Aunque el referente es el templo, la forma constructa es importante y no conviene reemplazarla por una interpretación en el texto principal.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios de Israel dentro de la construcción 'casa de Dios'; el singular 'Dios' es el equivalente correcto en español.
theological_decisions:
- issue: Título funcional נְגִיד en contexto del templo
  english_pob_reading: leader of the house of God
  chosen_spanish_reading: jefe de la casa de Dios
  alternative_spanish_readings:
  - líder de la casa de Dios
  - supervisor de la casa de Dios
  - jefe de la casa de Dios
  rationale: El hebreo presenta una función de autoridad u պաշտոն; no introduce un cargo sacerdotal técnico distinto. 'Jefe' mantiene la fuerza funcional sin sobrecargar el término con connotaciones ajenas al contexto.
  doctrine_reference: Nehemías 11:11; uso léxico de נְגִיד en el AT
translation_notes:
  revision_awareness: El pasaje se mantiene alineado con la revisión inglesa más reciente, que no introdujo cambios; por ello la traducción española sigue de cerca la solución auditada sin necesidad de ajustes de variante textual.
  spanish_consistency_notes:
  - Se conserva la secuencia genealógica repetida con 'hijo de' para mantener el ritmo y la estructura del hebreo.
  - '''Casa de Dios'' se deja literal para evitar sustituir una expresión transparente por una interpretación más explícita en el texto principal.'
  - Los nombres propios se adaptan a la ortografía bíblica española usual sin intentar traducirlos.
