revisions:
- from: 'Entonces él clamó a Yahvé y dijo[a]: «¡Oh Yahvé, mi Dios!, ¿acaso también has hecho daño[b] a la viuda con la cual yo estoy residiendo, al hacer morir a su hijo?»'
  to: 'Entonces él clamó a Yahvé y dijo: «¡Oh Yahvé, mi Dios! ¿Acaso también has hecho daño[a] a la viuda con quien me estoy hospedando[b], al hacer morir a su hijo?»'
  rationale: Se corrigieron los anclajes de las notas para que correspondan a los términos que explican, se mejoró la naturalidad de מִתְגּוֹרֵר con «me estoy hospedando», y se ajustó la puntuación del vocativo para un español correcto y fluido sin perder el tono solemne.
