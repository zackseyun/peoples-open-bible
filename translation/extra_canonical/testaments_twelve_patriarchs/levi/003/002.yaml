translation:
  text: And it has fire, snow, and ice prepared for the day determined by God, as
    a righteous judgment of God upon men. In it are all the spirits of the punishments
    for vengeance on the lawless. Above this is the holy place, and in it are the
    hosts of the armies appointed for the day of judgment[b], to carry out vengeance
    on the spirits of deceit and of Beliar. Above them are the holy ones. In the highest
    of all dwells the Great Glory, far above all holiness. In the heaven next to it
    are the archangels, who minister and make propitiation to the Lord for all the
    sins committed in ignorance by the righteous, offering to the Lord a sweet-smelling
    fragrance, a reasonable and bloodless offering. And in the heaven below this are
    the angels who bear answers to the angels of the presence of the Lord. But in
    the heaven next below are thrones and dominions, in which hymns are continually
    offered to God. Therefore, when the Lord looks upon us through the degree of his
    holiness, the heavens are shaken. And the earth also is moved from its foundations,
    and, trembling, it is shaken to its depths. But the sons of men, having no understanding
    of these things[c], go astray and provoke him to anger.
