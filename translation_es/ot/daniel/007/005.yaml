  yaml_path: translation/ot/daniel/007/005.yaml
  text: 'And look[a], another beast, a second one, resembling a bear; it was raised up on one side, and three ribs were in its mouth between its teeth. And this is what they were saying to it: “Arise[b], eat much flesh.”'
  footnotes:
