  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro de auditoría inglés: mantiene la secuencia narrativa con «Entonces», conserva «Hiram, rey de Tiro», traduce מַלְאָכִים de forma no sobredeterminada como «mensajeros», expresa וַעֲצֵי אֲרָזִים como material de construcción («madera de cedro»), distingue los dos grupos de artesanos («canteros y carpinteros») y preserva el sentido literal de לִבְנוֹת לוֹ בָּיִת como «para edificarle una casa».'
