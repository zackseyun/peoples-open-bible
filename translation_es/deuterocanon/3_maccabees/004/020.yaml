translation:
  language: es
  text: afirmando con pruebas que ya se habían agotado incluso el papiro[a] y las cañas para escribir que habían estado usando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las plumas de caña». El griego dice literalmente «las cañas de escritura».
    reason: lexical_alternative
lexical_decisions:
- source_word: λεγόντων
  english_pob_choice: asserting
  chosen_spanish: afirmando
  alternatives_spanish:
  - declarando
  - sosteniendo
  lexicon: LSJ
  rationale: El participio genitivo introduce el contenido de la alegación; «afirmando» conserva el tono formal y acusativo del enunciado mejor que un simple «diciendo».
- source_word: μετὰ ἀποδείξεως
  english_pob_choice: with proof
  chosen_spanish: con prueba
  alternatives_spanish:
  - con demostración
  - con evidencia
  lexicon: LSJ
  rationale: ἀπόδειξις expresa demostración o prueba. «Con prueba» es natural en español y mantiene la idea de una afirmación respaldada.
- source_word: τὴν χαρτηρίαν
  english_pob_choice: the papyrus
  chosen_spanish: el papiro
  alternatives_spanish:
  - el material de escritura
  - el papel
  lexicon: LSJ
  rationale: El término se refiere al material de papiro; «papiro» conserva con mayor precisión el referente histórico que una paráfrasis general como «material de escritura».
- source_word: τοὺς γραφικοὺς καλάμους
  english_pob_choice: the writing reeds
  chosen_spanish: los juncos de escritura
  alternatives_spanish:
  - las cañas de escribir
  - los juncos para escribir
  lexicon: LSJ
  rationale: El griego dice literalmente «juncos/cañas de escribir». «Juncos de escritura» conserva la imagen material sin imponer la equivalencia más interpretativa de «plumas» o «lapiceros».
- source_word: ἐν οἷς ἐχρῶντο
  english_pob_choice: they had been using
  chosen_spanish: que habían estado usando
  alternatives_spanish:
  - que usaban
  - que habían usado
  lexicon: LSJ
  rationale: El imperfecto medio indica uso continuo o habitual en el pasado; la perífrasis española refleja esa continuidad previa.
- source_word: ἐκλελοιπέναι
  english_pob_choice: had already run out
  chosen_spanish: ya se habían agotado
  alternatives_spanish:
  - ya se habían acabado
  - ya estaban agotados
  lexicon: LSJ
  rationale: El perfecto infinitivo expresa un agotamiento completado. «Se habían agotado» mantiene el sentido de falta/depleción, aplicado tanto al papiro como a los juncos.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete (1909) y el rastro auditado en inglés; no hubo revisiones sustantivas en el pasaje base, y la principal decisión fue conservar el valor material de χαρτηρία y la imagen literal de γραφικοὺς καλάμους en español.
  spanish_consistency_notes:
  - Se mantiene «papiro» para χαρτηρία conforme al valor histórico del término.
  - Se conserva la metáfora material de «juncos de escritura» para evitar una modernización excesiva.
  - La sintaxis busca ser publicable y natural en español sin alejarse del orden y sentido del griego.
