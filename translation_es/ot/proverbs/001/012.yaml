translation:
  language: es
  text: Traguémoslos vivos, como el Sheol[a], y enteros como los que descienden al pozo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la tumba»; «Sheol» designa en el pensamiento hebreo el ámbito de los muertos.
    reason: lexical_alternative
  - marker: b
    text: O «íntegros», «intactos» o «completos»; el hebreo puede expresar aquí la idea de totalidad o integridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלָעֵם
  english_pob_choice: Let us swallow them
  chosen_spanish: Traguémoslos
  alternatives_spanish:
  - Traguémoslos vivos
  - Engullámoslos
  lexicon: HALOT
  rationale: El cohortativo exhortativo se expresa de manera natural con un imperativo exhortativo en español. «Traguémoslos» conserva la imagen violenta de devorar sin añadir paráfrasis; el contexto inmediato ya aporta «vivos».
- source_word: כִּשְׁאוֹל
  english_pob_choice: like Sheol
  chosen_spanish: como el Seol
  alternatives_spanish:
  - como la morada de los muertos
  - como la tumba
  lexicon: HALOT
  rationale: Se conserva «Seol» para mantener el concepto hebreo y no reducirlo a «tumba» o «sepulcro». En español, el artículo definido ayuda a leerlo como el ámbito de la muerte, no como un nombre propio aislado sin referencia.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - vivo
  - en vida
  lexicon: HALOT
  rationale: El adverbial hebreo expresa que la víctima es tragada mientras todavía vive. «Vivos» mantiene la vividez poética y la relación con el sujeto plural implícito en el verbo.
- source_word: וּתְמִימִים
  english_pob_choice: whole
  chosen_spanish: enteros
  alternatives_spanish:
  - íntegros
  - intactos
  - completos
  lexicon: HALOT
  rationale: En este contexto de violencia, el término describe la integridad física de la presa, no una evaluación moral. «Enteros» comunica bien la idea de ser tragados sin quedar fragmentados, como sugiere el paralelo con los que descienden al pozo.
- source_word: כְּיֹרְדֵי בוֹר
  english_pob_choice: like those who go down to the pit
  chosen_spanish: como los que descienden al pozo
  alternatives_spanish:
  - como los que bajan al pozo
  - como los que van al pozo
  lexicon: HALOT
  rationale: «Pozo» conserva la imagen concreta de בּוֹר y su asociación poética con la muerte o la caída al ámbito de los muertos, sin forzar una equivalencia interpretativa más específica.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - la morada de los muertos
  - el sepulcro
  rationale: Se preserva el término hebreo transcrito para mantener la referencia conceptual al ámbito de los muertos, siguiendo la decisión auditable de la POB en inglés. Evita una reducción prematura a «tumba» o «sepulcro».
  doctrine_reference: Translation philosophy §1, primacía del original sobre la tradición
- issue: Sentido de תְמִימִים en el marco de la imagen
  english_pob_reading: whole
  chosen_spanish_reading: enteros
  alternative_spanish_readings:
  - íntegros
  - intactos
  - completos
  rationale: 'El pasaje presenta una agresión depredadora, no una afirmación moral sobre inocencia. Por eso la lectura elegida comunica totalidad física: tragados sin quedar desgarrados o divididos.'
  doctrine_reference: Translation philosophy §1, primacía del original sobre la tradición
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del texto hebreo y del audit trail en inglés. No se requirieron cambios de contenido doctrinal ni ajustes textuales posteriores; se mantuvo la imaginería violenta y la distinción entre Seol y el pozo, con una opción española fluida y auditable.
  spanish_consistency_notes:
  - Seol se mantiene transliterado de forma consistente como término técnico bíblico.
  - «Pozo» se usa para בור, reservando otras equivalencias solo si el contexto las exigiera.
  - «Enteros» en esta línea se entiende físicamente, no moralmente, en coherencia con la POB en inglés.
  - La puntuación reproduce la cadencia poética del paralelismo hebreo con dos miembros coordinados.
