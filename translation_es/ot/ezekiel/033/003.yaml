translation:
  language: es
  text: y ve la espada que viene contra el país, y toca la trompeta[a] y advierte al pueblo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cuerno” o “cuerno de carnero” para “trompeta” (hebreo shofar).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: and he sees
  chosen_spanish: y ve
  alternatives_spanish:
  - y vio
  - y mira y ve
  lexicon: HALOT
  rationale: La forma verbal hebrea marca secuencia narrativa/protásica; en español, el presente “ve” mantiene la inmediatez de la escena y funciona naturalmente en un contexto de advertencia, sin perder el valor secuencial.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la guerra
  - el arma
  lexicon: HALOT
  rationale: חֶרֶב es literalmente “espada”. Conservar la imagen concreta preserva el tono profético y el posible valor metonímico de juicio o invasión, sin explicitarlo en exceso.
- source_word: בָּאָה עַל הָאָרֶץ
  english_pob_choice: coming against the land
  chosen_spanish: que viene contra la tierra
  alternatives_spanish:
  - que viene sobre la tierra
  - que viene sobre el país
  lexicon: HALOT
  rationale: La preposición עַל puede expresar movimiento hostil hacia un lugar. “Contra la tierra” conserva esa fuerza amenazante; “tierra” mantiene el registro bíblico y la referencia territorial.
- source_word: וְתָקַע בַּשּׁוֹפָר
  english_pob_choice: and he blows the trumpet
  chosen_spanish: y toca la trompeta
  alternatives_spanish:
  - y hace sonar el cuerno
  - y sopla la trompeta
  - y toca el cuerno
  lexicon: HALOT
  rationale: תקע בשופר es un giro idiomático para emitir una señal de alarma. “Toca la trompeta” es una equivalencia natural en español bíblico moderno; “toca” evita una traducción demasiado mecánica de “blows” mientras conserva la función señalizadora.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - cuerno de carnero
  - shofar
  lexicon: HALOT
  rationale: Aunque שׁוֹפָר designa técnicamente un cuerno, “trompeta” comunica mejor su función de alarma en español. Se preserva la alternativa literal en la nota para no borrar la especificidad del término hebreo.
- source_word: וְהִזְהִיר
  english_pob_choice: and warns
  chosen_spanish: y advierte
  alternatives_spanish:
  - y da advertencia
  - y previene
  - y amonesta
  lexicon: HALOT
  rationale: El hifil de זהר significa dar aviso o advertir. “Advierte” es conciso y fiel, y mantiene el sentido causativo sin añadir interpretaciones.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  - al país
  lexicon: HALOT
  rationale: עָם se refiere al colectivo que recibe la advertencia. “Pueblo” es la forma natural en español para ese conjunto humano dentro de un contexto profético.
theological_decisions:
- issue: Imagen concreta de la espada como anuncio de juicio
  english_pob_reading: Retain the literal image 'the sword' in the main text while allowing readers to infer invading war/judgment from context.
  chosen_spanish_reading: Conservar “la espada” en el texto principal y dejar que el contexto comunique la amenaza de invasión o juicio.
  alternative_spanish_readings:
  - traducir interpretivamente como “la guerra”
  - explicitar “un ejército invasor”
  rationale: El hebreo usa el sustantivo concreto חֶרֶב. Mantenerlo preserva la textura profética y evita sustituir la imagen por una explicación interpretativa que el original no da de forma explícita.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El borrador sigue el mismo consenso de revisión del texto fuente: no se requieren cambios respecto al audit trail inglés; la elección española mantiene la imagen concreta de חֶרֶב y la función de alarma de שׁוֹפָר sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usa “tierra” para הָאָרֶץ, no “país”, para conservar el registro bíblico y la resonancia territorial.
  - “Toca la trompeta” traduce la función idiomática de תקע בַּשּׁוֹפָר con español natural.
  - El marcador [a] aparece exactamente en el texto para anclar la nota léxica sobre שׁוֹפָר.
