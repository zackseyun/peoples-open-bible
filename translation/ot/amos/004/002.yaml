id: AMO.4.2
reference: Amos 4:2
source:
  edition: WLC
  text: נִשְׁבַּ֨ע אֲדֹנָ֤/י יְהוִה֙ בְּ/קָדְשׁ֔/וֹ כִּ֛י הִנֵּ֥ה יָמִ֖ים בָּאִ֣ים עֲלֵי/כֶ֑ם וְ/נִשָּׂ֤א אֶתְ/כֶם֙ בְּ/צִנּ֔וֹת וְ/אַחֲרִיתְ/כֶ֖ן בְּ/סִיר֥וֹת דּוּגָֽה׃
translation:
  text: 'The Lord GOD has sworn by his holiness: For behold[a], days are coming upon you when they will lift you away with hooks[b], and your posterity with fishhooks.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the last of you' for 'your remnant'; the Hebrew term can denote one's end, future, or those remaining.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for 'hooks' and 'fishhooks' are difficult; some understand the imagery more generally as being carried off with sharp implements used like fishing gear.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: The Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the compound divine title in standard English style. Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed combination אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by using 'Lord GOD,' which preserves both elements without awkward duplication.
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swears
  - swore
  lexicon: HALOT
  rationale: The perfect verb presents a solemn completed oath with present force in prophetic discourse; 'has sworn' captures the force naturally in English.
- source_word: בְּקָדְשׁוֹ
  chosen: by his holiness
  alternatives:
  - by his holy place
  - by his holiness
  lexicon: HALOT
  rationale: The noun קדשׁ here most naturally denotes God's holiness as the basis of the oath, not the sanctuary. The idiom 'sworn by his holiness' is well established in prophetic usage and fits the theological context.
- source_word: כִּי הִנֵּה
  chosen: For look
  alternatives:
  - For behold
  - Surely, look
  lexicon: HALOT
  rationale: Combines causal/asseverative כִּי with deictic הִנֵּה in readable modern English while preserving prophetic urgency.
- source_word: יָמִים בָּאִים עֲלֵיכֶם
  chosen: days are coming upon you
  alternatives:
  - days are coming against you
  - the days are coming upon you
  lexicon: HALOT
  rationale: A standard prophetic announcement formula. 'Upon you' preserves the threatening force of עַל without overinterpreting.
- source_word: וְנִשָּׂא אֶתְכֶם
  chosen: they will lift you away
  alternatives:
  - he will take you away
  - one will carry you off
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb functions with an indefinite/impersonal subject in context. English often expresses this naturally with 'they.' 'Lift...away' preserves the concrete image of forced removal.
- source_word: בְּצִנּוֹת
  chosen: with hooks
  alternatives:
  - with shields
  - with thorns
  - with harpoons
  lexicon: HALOT
  rationale: In this judgment context the term is commonly understood as hooks or barbed implements used to drag captives, not the more common sense 'shields' from a different semantic development. The parallel with fishhooks in the next clause supports this rendering.
- source_word: וְאַחֲרִיתְכֶן
  chosen: and your remnant
  alternatives:
  - and your posterity
  - and your end
  - and the last of you
  lexicon: HALOT
  rationale: The noun can mean 'end,' 'future,' or 'posterity/remnant.' In this context of total deportation, 'your remnant' or 'the last of you' best fits the sense that even those left behind will be taken. 'Remnant' is concise and preserves the collective force.
- source_word: בְּסִירוֹת דּוּגָה
  chosen: with fishhooks
  alternatives:
  - with fishing hooks
  - in fish baskets
  lexicon: HALOT
  rationale: The phrase is difficult, but the dominant contextual sense is implements associated with fishing. Given the parallelism with 'hooks' and the image of being hauled away, 'fishhooks' best conveys the metaphor.
