lexical_decisions:
- source_word: אָטֵר
  english_pob_choice: Ater
  chosen_spanish: Ater
  alternatives_spanish:
  - Atar
  lexicon: HALOT
  rationale: Es un nombre propio dentro de una lista de firmantes; por eso se translitera. Mantengo la forma tradicional inglesa 'Ater' como base de transliteración al español, sin traducir el nombre.
- source_word: חִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Hezequías
  alternatives_spanish:
  - Hizquías
  - Ezequías
  lexicon: HALOT
  rationale: Es nombre propio. En español bíblico, 'Hezequías' conserva mejor la correspondencia con la forma inglesa auditada 'Hezekiah' sin adoptar una adaptación tradicional distinta como 'Ezequías'.
- source_word: עַזּוּר
  english_pob_choice: Azzur
  chosen_spanish: Azur
  alternatives_spanish:
  - Azzur
  lexicon: HALOT
  rationale: Nombre propio en la misma secuencia; se translitera. En español, 'Azur' evita una grafía excesivamente anglicizada, aunque 'Azzur' preserva más explícitamente la geminación reflejada por el hebreo.
theological_decisions:
- issue: Secuencia de tres nombres propios sin verbo ni comentario explícito
  english_pob_reading: Hebrew consists of three personal names in sequence, likely members of the covenant-signing list.
  chosen_spanish_reading: Tres nombres personales en secuencia, probablemente miembros de la lista de firmantes del pacto.
  alternative_spanish_readings:
  - Tres nombres personales aislados sin identificación de función
  - Una lista genealógica
  rationale: 'El hebreo presenta solo una cadena nominal; no se debe introducir un verbo o relación que el texto no expresa. La nota conserva la cautela del POB inglés: ''probablemente'' indica una inferencia histórica, no una certeza interpretativa.'
  doctrine_reference: Nehemías 10:1-27; lista de firmantes del pacto
translation_notes:
