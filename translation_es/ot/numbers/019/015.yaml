translation:
  language: es
  text: Y todo recipiente[a] abierto que no tenga una tapa bien asegurada[b] sobre él es impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vasija' o 'contenedor'; el hebreo usa un término amplio para un objeto o recipiente.
    reason: lexical_alternative
  - marker: b
    text: O 'una tapa sujeta' o 'una cubierta asegurada'; el hebreo expresa una cobertura fijada o amarrada sobre el recipiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: And every
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y cada
  - Y todo y cada
  lexicon: HALOT
  rationale: כֹל con un sustantivo singular se entiende distributivamente; en español, 'todo' conserva esa fuerza general. Mantengo la conjunción inicial para enlazar con el contexto legal anterior.
- source_word: כְּלִי
  english_pob_choice: vessel
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - vaso
  - contenedor
  lexicon: HALOT
  rationale: El término hebreo es amplio. En español, 'recipiente' comunica bien un objeto que puede quedar abierto sin especificar material o forma, y funciona naturalmente en un contexto de pureza ceremonial.
- source_word: פָתוּחַ
  english_pob_choice: open
  chosen_spanish: abierto
  alternatives_spanish:
  - descubierto
  - sin cubrir
  lexicon: HALOT
  rationale: '''Abierto'' es la forma más directa y natural en español. No necesito añadir ''descubierto'' porque la cláusula siguiente ya precisa la ausencia de cobertura asegurada.'
- source_word: צָמִיד פָּתִיל
  english_pob_choice: a fastened lid
  chosen_spanish: una tapa bien asegurada
  alternatives_spanish:
  - una tapa sujeta
  - una cubierta asegurada
  - una tapa atada
  lexicon: HALOT
  rationale: El hebreo describe una cobertura fijada o amarrada; 'tapa bien asegurada' preserva la idea concreta sin forzar una imagen demasiado técnica o extraña para el español moderno. 'Tapa' es más idiomático que 'cubierta' en este contexto.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ella
  lexicon: HALOT
  rationale: Sigo el referente de 'recipiente', masculino en español, y mantengo la relación espacial simple del hebreo con 'sobre él'.
- source_word: טָמֵא הוּא
  english_pob_choice: is unclean
  chosen_spanish: es impuro
  alternatives_spanish:
  - está impuro
  - es ritualmente impuro
  lexicon: HALOT
  rationale: '''Impuro'' conserva el valor ceremonial del hebreo sin añadir explicaciones. ''Es'' mantiene la estructura predicativa del original; ''ritualmente impuro'' quedaría como glosa interpretativa que el texto hebreo no formula.'
theological_decisions:
- issue: Naturaleza de la impureza ritual
  english_pob_reading: Render טָמֵא simply as 'unclean' rather than 'ritually unclean' in the main text.
  chosen_spanish_reading: Traducir טָמֵא como 'impuro' en el texto principal, sin ampliar a 'ritualmente impuro'.
  alternative_spanish_readings:
  - ritualmente impuro
  - ceremonialmente impuro
  rationale: El pasaje pertenece a normas de pureza, pero el hebreo solo afirma el estado de impureza. 'Impuro' conserva la sencillez del original y deja la especificación al contexto, sin importar una formulación explicativa que el texto no requiere.
  doctrine_reference: Primacía del texto מקור/original sobre la terminología explicativa; evitar añadir matices doctrinales no explicitados por el hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'tied cover' por 'fastened lid' para hacer más natural la imagen de צָמִיד פָּתִיל sin perder la idea de una cubierta firmemente cerrada. En español reflejo esa actualización con 'una tapa bien asegurada', que mantiene la cobertura cerrada y sujeta sobre el recipiente.
  spanish_consistency_notes:
  - He mantenido 'Y' al inicio para reflejar la conexión discursiva con la norma anterior.
  - '''Impuro'' corresponde al valor ceremonial de טָמֵא y evita sobretraducción.'
  - Usé 'recipiente' porque su amplitud coincide con כְּלִי y suena natural en español bíblico moderno.
  - Las notas al pie preservan alternativas léxicas significativas sin introducir una paráfrasis libre.
