translation:
  language: es
  text: 'Entonces salieron primero los jóvenes de los comandantes de las provincias, y Ben-hadad envió[a], y le informaron, diciendo: «Han salido hombres de Samaria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente que Ben-hadad «envió»; el complemento del envío no aparece explícito en el texto, aunque el contexto implica algún tipo de mensajeros o exploradores.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי
  english_pob_choice: the young men of
  chosen_spanish: los jóvenes de
  alternatives_spanish:
  - los servidores de
  - los asistentes de
  lexicon: HALOT
  rationale: נַעַר puede significar joven, servidor o asistente según el contexto. En este relato militar, 'jóvenes' conserva el valor básico del término y suena natural en español sin perder la referencia a personal subordinado a los comandantes.
- source_word: שָׂרֵי הַמְּדִינוֹת
  english_pob_choice: the commanders of the provinces
  chosen_spanish: los comandantes de las provincias
  alternatives_spanish:
  - los oficiales de las provincias
  - los jefes de los distritos
  lexicon: HALOT
  rationale: שָׂרִים aquí denota jefes o comandantes, y מְדִינוֹת son provincias o distritos administrativos. 'Comandantes de las provincias' sigue de cerca la estructura hebrea y evita un título más interpretativo.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - al principio
  - en la primera embestida
  lexicon: HALOT
  rationale: El adverbio indica prioridad temporal o secuencial. 'Primero' reproduce bien esa función sin añadir la idea más específica de una 'primera embestida'.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo פשוטamente significa 'enviar'. El texto hebreo no especifica el objeto enviado; por eso se mantiene la forma general 'envió' y no se explicita 'exploradores'.
- source_word: וַיַּגִּידוּ לוֹ לֵאמֹר
  english_pob_choice: and they reported to him, saying
  chosen_spanish: y le informaron, diciendo
  alternatives_spanish:
  - y le reportaron, diciendo
  - y le dijeron
  lexicon: HALOT
  rationale: נגד en hifil suele significar declarar, informar o reportar. 'Le informaron' comunica bien el acto de transmitir el informe en un contexto militar, y 'diciendo' conserva la introducción hebrea al discurso directo.
- source_word: אֲנָשִׁים
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Algunos hombres
  - Personas
  lexicon: HALOT
  rationale: El sustantivo plural masculino significa literalmente 'hombres'. Se conserva el valor masculino del hebreo en lugar de neutralizarlo.
- source_word: יָצְאוּ מִשֹּׁמְרוֹן
  english_pob_choice: have come out from Samaria
  chosen_spanish: han salido de Samaria
  alternatives_spanish:
  - han salido fuera de Samaria
  - han salido de Samaria
  lexicon: HALOT
  rationale: '''Han salido'' reproduce el perfecto con valor de acción completada desde la perspectiva de los informantes. ''De Samaria'' es la forma natural en español para מִן + topónimo.'
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-hadad
  alternatives_spanish:
  - Ben Adad
  lexicon: Standard transliteration
  rationale: Los nombres propios se transliteran por convención. Se mantiene la forma compuesta tradicional usada en español académico y bíblico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió 'provincial commanders' a 'commanders of the provinces' para una correspondencia más cercana al hebreo, y eliminó la explicitación 'scouts' porque el texto fuente solo dice 'sent'. La versión española sigue esa decisión y evita añadir un objeto no expresado.
  spanish_consistency_notes:
  - Se mantiene 'Ben-hadad' como transliteración estable del nombre propio.
  - Se usa 'Samaria' para שֹׁמְרוֹן, acorde con el uso estándar en español bíblico.
  - Se conserva una estructura narrativa simple y directa, cercana al hebreo, sin añadir información inferida más allá de lo necesario para la fluidez española.
