base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/011/007.yaml
  text: For King Nebuchadnezzar[a], of all the earth, lives, and his dominion lives—he who sent you for the prosperity of every living being. For not only will men serve him through you[c][b], but also the wild animals and the livestock and the birds of the sky will live for Nebuchadnezzar and all his house through your strength.
  footnotes:
  - marker: a
    text: Or 'for the accomplishment/prosperity of every person.' The Greek phrase 'every living soul' likely means every life or living being, not specifically the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional wording: ''the beasts of the field ... the birds of heaven.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause is rhetorically compressed in Greek and may also be understood, 'will live for Nebuchadnezzar and all his house by your strength.'
    reason: alternative_reading
