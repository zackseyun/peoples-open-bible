  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mandato de presentar una ofrenda a Yahvé durante siete días, proclamación sagrada en el séptimo día y prohibición de trabajo laboral. También preserva correctamente Yahvé para יהוה y mantiene la nota de alternativa léxica para אִשֶּׁה.'
  spanish_quality_summary: El texto es claro y legible, pero 'ofrenda encendida' no suena idiomático en español bíblico general y puede sugerir simplemente que la ofrenda está ardiendo, no que sea una ofrenda sacrificial ofrecida por fuego. Además, 'santa convocación' es comprensible, pero 'convocación sagrada' o 'asamblea sagrada' suenan más naturales; aun así, no es un error grave. La reparación principal debe concentrarse en אִשֶּׁה.
  glossary_alignment: Alinea bien con el glosario del proyecto en 'Yahvé'. No hay términos doctrinalmente conflictivos aparte de la mejor forma española para אִשֶּׁה. 'Trabajo laborioso' refleja la decisión auditada, aunque en español es algo rígido; puede mantenerse por fidelidad al expediente inglés.
  issues:
  - severity: medium
    issue: '''ofrenda encendida'' para אִשֶּׁה es poco natural y semánticamente imprecisa en español.'
    rationale: אִשֶּׁה en contexto sacerdotal significa una ofrenda hecha por fuego / ofrenda ígnea, no meramente una ofrenda 'encendida'. La nota ya conserva 'ofrenda por fuego' y 'ofrenda de fuego', que reflejan mejor el valor léxico. Conviene usar una forma principal más idiomática y precisa.
  - severity: low
