translation:
  language: es
  text: Como una estrella resplandeciente de entre las nubes[a], y como la luna llena en los días de la fiesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Como una estrella de la mañana en medio de una nube». El hebreo dice más generalmente: «como una estrella resplandeciente de entre las nubes».'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּכוֹכָב
  english_pob_choice: Like a star
  chosen_spanish: Como una estrella
  alternatives_spanish:
  - Como la estrella
  - Como un astro
  lexicon: HALOT
  rationale: כוכב significa normalmente 'estrella'; el prefijo כ introduce comparación. En español, 'como una estrella' reproduce la simetría del símil sin volverlo rígido.
- source_word: אוֹר
  english_pob_choice: shining
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - brillante
  - que brilla
  - luminosa
  lexicon: HALOT
  rationale: El hebreo enfatiza luminosidad. 'Resplandeciente' conserva ese valor con un registro digno y natural en español, sin introducir la referencia interpretativa de 'mañana' que pertenece al paralelo griego.
- source_word: מִבֵּין עָבִים
  english_pob_choice: from among clouds
  chosen_spanish: de entre las nubes
  alternatives_spanish:
  - entre las nubes
  - desde entre las nubes
  - de entre nubes
  lexicon: HALOT
  rationale: מִבֵּין indica procedencia desde el interior de un conjunto. 'De entre las nubes' mantiene la imagen de emerger y suena idiomático en español.
- source_word: וּכְיָרֵחַ מָלֵא
  english_pob_choice: and like the full moon
  chosen_spanish: y como la luna llena
  alternatives_spanish:
  - y como una luna llena
  - y como la luna en plenitud
  lexicon: HALOT
  rationale: ירח es 'luna'; מלא comunica plenitud. 'La luna llena' es la equivalencia más natural en español y preserva el paralelismo del símil.
- source_word: בִּימֵי מוֹעֵד
  english_pob_choice: in the days of the feast
  chosen_spanish: en los días de la fiesta
  alternatives_spanish:
  - en los días de la festividad
  - en días señalados
  - en los días del tiempo señalado
  lexicon: HALOT
  rationale: מועד puede significar 'tiempo señalado' o 'fiesta'. En este contexto poético y cultual, la versión española conserva la referencia festiva general sin especificar indebidamente una fiesta concreta.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego ('morning star in the midst of a cloud')
  english_pob_reading: Retain the Hebrew-based 'shining star' in the main text; Greek parallel preserved in footnote
  chosen_spanish_reading: Mantener 'estrella resplandeciente' en el texto principal y señalar en nota la lectura griega 'estrella de la mañana'
  alternative_spanish_readings:
  - Como la estrella de la mañana en medio de una nube
  - Como un astro matutino entre las nubes
  rationale: El testimonio hebreo disponible es claro y de alta confianza, así que gobierna el texto principal. El paralelo griego se conserva como lectura alternativa importante para no borrar la tensión textual ni el matiz interpretativo tradicional.
  doctrine_reference: 'Principio POB: primacía de la lengua original conservada; preservar variantes significativas'
- issue: Sentido de מוֹעֵד en un contexto poético-cultual
  english_pob_reading: in the days of the feast
  chosen_spanish_reading: fiesta / festividad general
  alternative_spanish_readings:
  - tiempo señalado
  - día señalado
  - fiesta concreta
  rationale: En español, 'fiesta' comunica mejor el valor cultual y poético del término sin forzar una identificación histórica específica. Se evita una sobreinterpretación que el hebreo no exige.
  doctrine_reference: 'Principio POB: no resolver tensiones léxicas sin base textual suficiente'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente más reciente; el control cruzado informó alta concordancia y ninguna corrección fue necesaria.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'fiesta' para מוֹעֵד por el valor cultual-poético del contexto, evitando un calco rígido de 'tiempo señalado'.
  - Se prefiere 'luna llena' por naturalidad y fidelidad a ירח מָלֵא.
  - La nota a pie de página queda anclada en 'nubes' para reflejar la alternativa griega sin interrumpir la lectura principal.
