translation:
  language: es
  text: Sion ha extendido sus manos; no hay quien la consuele. Yahvé ha mandado respecto a Jacob que sus enemigos lo rodeen; Jerusalén se ha vuelto una cosa impura[a] entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «como una menstruante» o «como impureza menstrual»; el término hebreo lleva imaginería de impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּֽרְשָׂ֨ה
  english_pob_choice: has spread out
  chosen_spanish: extendió
  alternatives_spanish:
  - ha extendido
  - ha tendido
  lexicon: HALOT
  rationale: El verbo expresa el gesto de abrir o extender las manos en una súplica. En español, «extendió sus manos» comunica con naturalidad ese gesto visible sin añadir una interpretación más específica que el hebreo no exige.
- source_word: צִיּ֜וֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  - Sión
  lexicon: HALOT
  rationale: Como nombre propio bíblico, «Sion» es la forma más usual y legible en español; conserva la referencia geográfica y teológica sin necesidad de transliteración más marcada.
- source_word: בְּיָדֶיהָ
  english_pob_choice: her hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ella
  - su mano
  lexicon: HALOT
  rationale: La forma hebrea tiene sentido plural en el gesto; «sus manos» es la equivalencia natural en español y preserva la imagen corporal de la súplica.
- source_word: אֵין מְנַחֵם לָהּ
  english_pob_choice: there is no one to comfort her
  chosen_spanish: no hay quien la consuele
  alternatives_spanish:
  - no tiene consolador
  - no hay consolador para ella
  lexicon: HALOT
  rationale: La construcción existencial se vuelve con naturalidad como «no hay quien…»; «consuele» mantiene el motivo de consuelo sin endurecer el tono con un sustantivo menos idiomático.
- source_word: צִוָּה יְהוָה
  english_pob_choice: Yahweh has commanded
  chosen_spanish: Yahvé ha mandado
  alternatives_spanish:
  - Yahvé ha ordenado
  - Yahvé mandó
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la convención del proyecto y el valor fuerte de צוה como «mandar/ordenar». «Ha mandado» sigue bien el perfecto hebreo y suena solemne en español.
- source_word: לְיַעֲקֹב
  english_pob_choice: concerning Jacob
  chosen_spanish: contra Jacob
  alternatives_spanish:
  - respecto de Jacob
  - para Jacob
  lexicon: HALOT
  rationale: En este contexto de juicio y asedio, el sentido adversativo resulta más probable y más coherente con la cláusula siguiente; por eso se traduce «contra Jacob».
- source_word: סְבִיבָיו
  english_pob_choice: surround him
  chosen_spanish: que sus enemigos lo rodeen
  alternatives_spanish:
  - que lo rodeen alrededor
  - que lo cercen por todas partes
  lexicon: HALOT
  rationale: La idea central es el cercamiento hostil. En español, convertir el adverbio en verbo («lo rodeen») produce un enunciado fluido y conserva la fuerza del cerco.
- source_word: צָרָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus opresores
  lexicon: HALOT
  rationale: El sustantivo designa a quienes hostilizan o afligen; «enemigos» es la opción más clara y directa en español.
- source_word: הָיְתָה יְרוּשָׁלִַם
  english_pob_choice: Jerusalem has become
  chosen_spanish: Jerusalén ha llegado a ser
  alternatives_spanish:
  - Jerusalén se ha vuelto
  - Jerusalén fue
  lexicon: HALOT
  rationale: La forma verbal marca un estado resultante. «Ha llegado a ser» conserva el proceso de transformación hacia una condición degradada, sin perder la fuerza del hebreo.
- source_word: לְנִדָּה
  english_pob_choice: an unclean thing
  chosen_spanish: una cosa impura
  alternatives_spanish:
  - una impureza
  - como una mujer impura
  - como inmundicia ritual
  lexicon: HALOT
  rationale: El término evoca impureza ritual con connotaciones de rechazo. «Una cosa impura» mantiene la amplitud semántica y evita cerrar el sentido solo a una lectura clínica o solo a una figura humana.
- source_word: בֵּינֵיהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su presencia
  lexicon: HALOT
  rationale: «Entre ellos» reproduce de modo idiomático la ubicación relacional de Jerusalén dentro del grupo hostil o contaminado al que pertenece el contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre pactal en español como «Yahvé» en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza ritual y social de לְנִדָּה
  english_pob_reading: an unclean thing
  chosen_spanish_reading: una cosa impura
  alternative_spanish_readings:
  - como una menstruante
  - como impureza menstrual
  - una impureza ritual
  rationale: El hebreo probablemente activa imaginería de impureza menstrual y rechazo ritual. La traducción principal conserva el impacto general sin reducir el verso a una sola explicación, y así deja espacio para la nota de matiz.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto en inglés mantiene un equilibrio entre la imagen corporal de súplica, el juicio divino y la impureza ritual. La versión española sigue ese equilibrio, conservando el nombre divino y el matiz de לְנִדָּה sin volver el texto excesivamente técnico.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Sion» se mantiene como forma española tradicional y legible del nombre propio.
  - «Impura» conserva el campo semántico de impureza ritual sin introducir explicaciones ajenas al verso en el cuerpo principal.
  - La sintaxis española prioriza claridad poética y fidelidad al paralelismo hebreo.
