base_translation:
  language: en
  yaml_path: translation/ot/psalms/054/006.yaml
  text: Behold[a], God is my helper[b]; the Lord is among those who sustain my life.
  footnotes:
  - marker: a
    text: Or 'the Lord upholds my soul' / 'the Lord is the sustainer of my life.' The Hebrew phrase with 'among those who sustain my life' is syntactically difficult, and some translations construe the Lord himself as the direct sustainer.
    reason: alternative_reading
  - marker: b
    text: Hebrew נֶפֶשׁ (nephesh), often meaning 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
