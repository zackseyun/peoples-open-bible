review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura y el sentido del hebreo: adición permisiva («También podrán»), compra directa, referencia a las familias y resultado legal de «posesión». Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro inglés: (1) «en su tierra» traduce incorrectamente בְּאַרְצְכֶם, que es «en la tierra de ustedes / en su tierra» refiriéndose a Israel, no a la tierra de los forasteros; (2) la nota b altera la función de la nota inglesa, que no comenta «a quienes engendraron...», sino el sentido legal de לַאֲחֻזָּה como posesión heredable. Además, en español «comprar de» suena menos natural que «comprar a».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene cierta rigidez: «de los hijos de los forasteros residentes» es formalmente aceptable; «que habitan con ustedes» funciona bien. Conviene ajustar «comprar de» a «comprar a» por naturalidad idiomática. «Llegarán a ser para ustedes una posesión» es fiel, aunque «serán para ustedes una posesión» suena un poco más directo; ambas son válidas. El principal problema de legibilidad y fidelidad es «su tierra», que induce a un referente equivocado.'
  glossary_alignment: 'El borrador sigue bien las decisiones POB relevantes: mantiene lenguaje directo de compra y posesión, conserva «hijos de» para בני, y usa «posesión» para אֲחֻזָּה. No hay conflicto con la terminología teológica principal del proyecto. La excepción necesaria es corregir el referente posesivo en «su tierra» a «la tierra de ustedes / su tierra» dirigida a Israel, y mover la nota legal a «posesión».'
  issues:
  - severity: high
    issue: «en su tierra» traduce mal בְּאַרְצְכֶם
    rationale: El sufijo hebreo es 2mp («la tierra de ustedes»), no 3ª persona. La frase significa que fueron engendrados en la tierra de Israel, no en la tierra de los forasteros.
  - severity: high
    issue: La nota b está anclada al segmento equivocado y no preserva la decisión auditada
    rationale: La nota inglesa b explica לַאֲחֻזָּה como posesión con sentido legal de propiedad heredable. El borrador la coloca sobre «su tierra» y cambia su contenido a una explicación de descendencia nacida allí.
  - severity: medium
    issue: «comprar de» es poco idiomático en español
    rationale: Aunque comprensible, en español general «comprar a alguien/algo a alguien» o simplemente «comprar» suena más natural. «Comprar a» mantiene bien el sentido comercial del hebreo en este contexto.
  revised_spanish_text: También podrán comprar a los hijos de los forasteros residentes que habitan con ustedes[a], y de sus familias que están con ustedes, a quienes ellos engendraron en la tierra de ustedes; y serán para ustedes una posesión[b].
  revised_footnotes:
  - marker: a
    text: 'O: «de entre los descendientes de los forasteros residentes que habitan con ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como una posesión»; aquí el sentido legal es que llegan a ser propiedad heredable.'
    reason: lexical_alternative
  revision_rationale: Se corrigió un error de referente en בְּאַרְצְכֶם («en la tierra de ustedes»), se reubicó y reescribió la nota b para reflejar la decisión auditada sobre אֲחֻזָּה, y se mejoró la naturalidad española con «comprar a». También se ajustó «que están con ustedes» para reflejar de cerca אֲשֶׁר עִמָּכֶם en la segunda cláusula relativa.
