  text: אֹסְרִ֤י לַ/גֶּ֨פֶן֙ עיר/ה וְ/לַ/שֹּׂרֵקָ֖ה בְּנִ֣י אֲתֹנ֑/וֹ כִּבֵּ֤ס בַּ/יַּ֨יִן֙ לְבֻשׁ֔/וֹ וּ/בְ/דַם עֲנָבִ֖ים סות/ה־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/011.yaml
  text: Binding his donkey to the vine[a], and his donkey’s colt to the choice vine, he washes his garments in wine[c][b], and his robe in the blood of grapes.
  footnotes:
  - marker: a
    text: Or 'his foal'; the Hebrew עִיר can denote a young donkey or donkey colt.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the noble vine'; the Hebrew שֹׂרֵקָה refers to a select or choice vine.
    reason: lexical_alternative
  - marker: c
    text: '''Blood of grapes'' is a Hebrew poetic expression for grape juice or wine, preserved here for its imagery.'
    reason: cultural_note
