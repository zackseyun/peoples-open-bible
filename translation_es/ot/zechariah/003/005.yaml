    text: La expresión «el ángel de Yahvé» se traduce de manera transparente sin decidir si se trata de un mensajero creado o de una manifestación de Yahvé.
    reason: theological_note
  revision_rationale: Se ajusta «vestidos» a «vestiduras» por naturalidad y registro, manteniendo el sentido amplio de בְּגָדִים. Se cambia «estaba de pie» por «estaba junto a ellos» para reflejar mejor el valor contextual de עֹמֵד como presencia continua junto a la acción, en línea con el análisis del audit trail.
