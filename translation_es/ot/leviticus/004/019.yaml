  - marker: a
    text: O, más formalmente, «y lo hará subir en humo sobre el altar». El verbo hebreo especifica la acción ritual de hacer subir una ofrenda en humo en un contexto sacrificial.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'de él' por 'de este' para una referencia más natural al animal sacrificial en español, sin alterar el sentido de separación marcado por מִמֶּנּוּ. También se afina la nota para reflejar mejor el valor cultual específico de הִקְטִיר.
