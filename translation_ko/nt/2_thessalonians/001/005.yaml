id: 2TH.1.5
reference: 2 Thessalonians 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔνδειγμα τῆς δικαίας κρίσεως τοῦ θεοῦ, εἰς τὸ καταξιωθῆναι ὑμᾶς τῆς βασιλείας τοῦ θεοῦ, ὑπὲρ ἧς καὶ πάσχετε,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/005.yaml
  text: This is evidence of the righteous judgment of God[a], so that you may be counted worthy of the kingdom of God, for which you are also suffering[c][b],
translation:
  language: ko
  text: 이것은 하나님의 의로우신 심판의 증거이며[a], 그리하여 여러분이 하나님 나라에 합당하게 여겨지도록 하기 위함입니다. 여러분은 또한 그 나라를 위하여 고난을 받고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「증표」, 「표징」. 헬라어 ἔνδειγμα는 어떤 실재를 가리키는 가시적 표지를 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδειγμα
  english_pob_choice: evidence
  chosen_korean: 증거
  alternatives_korean:
  - 증표
  - 표징
  lexicon: BDAG
  rationale: 어떤 실재를 추론케 하는 가시적 표지의 의미를 「증거」로 자연스럽게 옮긴다. 헬라어 본문은 동사 없는 구문이므로 「이것은 ~이며」로 보충한다.
- source_word: δικαίας κρίσεως
  english_pob_choice: righteous judgment
  chosen_korean: 의로우신 심판
  alternatives_korean:
  - 공의로우신 심판
  - 정의로운 심판
  lexicon: BDAG
  rationale: δίκαιος의 도덕·신학적 무게를 살려 「의로우신」으로 옮기며, 「공의」나 「정의」보다 성경적 어휘에 가깝다.
- source_word: εἰς τὸ καταξιωθῆναι
  english_pob_choice: so that you may be counted worthy
  chosen_korean: 합당하게 여겨지도록 하기
  alternatives_korean:
  - 합당하게 여김 받도록 하기
  - 가치 있는 자로 여겨지도록 하기
  lexicon: BDAG
  rationale: καταξιόω의 수동태는 「~하게 만드는」이 아니라 「~로 여기는·간주하는」 의미이다. 한국어로 「합당하게 여겨지다」가 그 평가적 음조를 보존한다.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_korean: 하나님 나라
  alternatives_korean:
  - 하나님의 나라
  lexicon: BDAG
  rationale: 표준적·관습적 한국어 표현.
- source_word: ὑπὲρ ἧς καὶ πάσχετε
  english_pob_choice: for which you are also suffering
  chosen_korean: 또한 그 나라를 위하여 고난을 받고 있습니다
  alternatives_korean:
  - 그 나라를 위해서도 고난을 받고 있습니다
  lexicon: BDAG
  rationale: ὑπέρ + 속격의 「~을 위하여」 의미와 καί의 「또한」을 모두 보존한다.
theological_decisions:
- issue: 고난과 하나님 나라의 합당함 관계
  chosen_reading: 고난은 하나님의 의로우신 심판 안에서의 증거이며, 하나님 나라에 합당하게 여겨지도록 하기 위함이다(고난이 자격을 획득하지 않음).
  alternative_readings:
  - 고난이 하나님 나라의 자격을 획득한다(공로적 해석)
  rationale: καταξιωθῆναι의 수동태는 「합당하게 여겨지다」를 뜻하며, 본문은 고난을 의로운 심판의 정황 표지로 제시할 뿐 자격 획득의 공로로 제시하지 않는다.
  doctrine_reference: 'Translation philosophy §3; Affirmations'
