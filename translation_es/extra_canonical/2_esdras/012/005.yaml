translation:
  language: es
  text: y en mi espíritu estoy muy débil[a], y no hay ni siquiera un poco de fuerza en mí a causa del gran temor que me aterrorizó esta noche. Ahora, pues, oraré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que sentí».
    reason: alternative_reading
lexical_decisions:
- source_word: spiritu meo
  english_pob_choice: in my spirit
  chosen_spanish: en mi espíritu
  alternatives_spanish:
  - en mi ser interior
  - en mi alma
  lexicon: πνεῦμα / spiritus
  rationale: El latín habla del ámbito interior y no del cuerpo; «espíritu» preserva de forma natural esa referencia en español y sigue la lectura de la versión inglesa.
- source_word: inualidus sum ualde
  english_pob_choice: I am very weak
  chosen_spanish: estoy muy débil
  alternatives_spanish:
  - soy muy débil
  - estoy totalmente sin fuerzas
  lexicon: invalido / debilis
  rationale: «Estoy muy débil» expresa bien el estado resultante y evita una construcción menos natural en español, sin atenuar la intensidad del original.
- source_word: nec modica est in me uirtus
  english_pob_choice: there is not even a little strength in me
  chosen_spanish: no hay ni siquiera un poco de fuerza en mí
  alternatives_spanish:
  - no me queda ni una chispa de fuerza
  - ni poca fuerza me queda
  lexicon: virtus
  rationale: «Virtus» aquí tiene el sentido concreto de fuerza/capacidad; «fuerza» es la opción más transparente en español para conservar la negación enfática.
- source_word: a multo timore
  english_pob_choice: because of the great fear
  chosen_spanish: a causa del gran temor
  alternatives_spanish:
  - por el gran temor
  - debido al gran miedo
  lexicon: timor
  rationale: «Temor» mantiene el registro más solemne y cercano al latín; «miedo» sería posible, pero «temor» conserva mejor la tonalidad del pasaje.
- source_word: quem expaui
  english_pob_choice: that terrified me
  chosen_spanish: que me aterrorizó
  alternatives_spanish:
  - que me llenó de terror
  - que me sobrecogió de terror
  lexicon: expavesco
  rationale: 'Se sigue la revisión auditada que corrige la lectura suavizada «que sentí» hacia la fuerza de expavesco/expaui: el temor no solo fue percibido, sino que aterrorizó al hablante.'
- source_word: Nunc ergo orabo
  english_pob_choice: Now therefore I will pray
  chosen_spanish: Ahora, pues, oraré
  alternatives_spanish:
  - Por tanto, oraré ahora
  - Así que ahora oraré
  lexicon: oro
  rationale: La frase final introduce la respuesta inmediata del hablante; «oraré» conserva el futuro del latín y el tono decidido de la conclusión.
theological_decisions:
- issue: Intensidad de la experiencia interior y del miedo apocalíptico
  english_pob_reading: and in my spirit I am very weak, and there is not even a little strength in me because of the great fear that terrified me this night
  chosen_spanish_reading: y en mi espíritu estoy muy débil, y no hay ni siquiera un poco de fuerza en mí a causa del gran temor que me aterrorizó esta noche
  alternative_spanish_readings:
  - y en mi espíritu estoy muy débil, y no me queda fuerza alguna por el gran temor que me sobrecogió esta noche
  rationale: La redacción conserva la tensión entre debilidad interior y terror intenso, sin suavizar la afección ni convertirla en mera emoción subjetiva. Esto respeta el peso experiencial del texto y la revisión que enfatiza «aterrorizó» frente a una lectura mitigada.
  doctrine_reference: 2 Esdras 12:5; lectura del latín «expaui» y su fuerza afectiva
- issue: Paso a la oración como respuesta de fe
  english_pob_reading: Now therefore I will pray
  chosen_spanish_reading: Ahora, pues, oraré
  alternative_spanish_readings:
  - Ahora, pues, voy a orar
  - Por eso oraré ahora
  rationale: 'Se mantiene el movimiento narrativo: del temor a la oración. El futuro simple conserva el tono resolutivo del latín y evita añadir matices no presentes en el texto.'
  doctrine_reference: 2 Esdras 12:5; continuidad discursiva del pasaje
translation_notes:
  revision_awareness: 'La revisión posterior del audit trail corrigió una propuesta más suave para expaui/expavesco («que sentí») y confirmó una lectura más fuerte: «que me aterrorizó». La versión española adopta esa decisión revisada para preservar la intensidad lexical del latín.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto cuando aparece el nombre divino, pero no hay ese término en este versículo.
  - «Espíritu» se mantiene en minúscula porque el contexto es el espíritu humano del hablante, no el Espíritu Santo.
  - '«Temor» y «aterrorizó» se combinan para reflejar la doble carga del latín: miedo intenso y efecto devastador.'
