revisions:
- from: Ahora envía y reúne[a] junto a mí a todo Israel en el monte Carmelo, y a los profetas de Baal, cuatrocientos cincuenta, y a los profetas de Ashera[c], cuatrocientos[b], los que comen de la mesa de Jezabel.
  to: Ahora envía y reúne[a] a mí a todo Israel en el monte Carmelo, y a los profetas de Baal, cuatrocientos cincuenta, y a los profetas de Aserá[c], cuatrocientos, los que comen en la mesa de Jezabel[b].
  rationale: 'La revisión corrige tres puntos para alinearse mejor con el hebreo y con la auditoría inglesa: (1) אֵלַי se vierte como «a mí», sin el matiz añadido de «junto»; (2) אֲשֵׁרָה se normaliza a «Aserá», forma más natural y reconocible en español; y (3) la cláusula final se formula como «los que comen en la mesa de Jezabel», con la nota alternativa anclada donde corresponde. No se requiere adjudicación adicional porque son ajustes de fidelidad y estilo, no cuestiones doctrinalmente inciertas.'
  reviewer_model: gpt-5.4
