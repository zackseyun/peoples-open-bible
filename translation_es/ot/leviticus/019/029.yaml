translation:
  language: es
  text: No profanes a tu hija prostituyéndola[a], para que la tierra no se prostituya[b] y la tierra se llene de perversidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «haciéndola prostituta» o «haciéndola cometer prostitución». El verbo hebreo es causativo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para que la tierra no cometa prostitución». La frase presenta la corrupción de la comunidad de manera metafórica.
    reason: lexical_alternative
  - marker: c
    text: O, «lascivia» o «maldad». El término hebreo denota una perversidad moral grave, a menudo en contexto sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַלֵּל
  english_pob_choice: profane
  chosen_spanish: profanes
  alternatives_spanish:
  - deshonres
  - contamines
  lexicon: HALOT
  rationale: En Levítico, חלל pertenece al registro de lo santo y lo profano. «Profanar» preserva mejor ese marco que «deshonrar» o «contaminar», y funciona naturalmente en español en un mandato negativo.
- source_word: בִּתְּךָ
  english_pob_choice: your daughter
  chosen_spanish: tu hija
  alternatives_spanish:
  - a tu hija
  lexicon: HALOT
  rationale: El poseído de segunda persona masculina singular se refleja de manera directa como «tu hija». El complemento con «a» queda implícito por la sintaxis imperativa en español.
- source_word: לְהַזְנוֹתָהּ
  english_pob_choice: by making her a prostitute
  chosen_spanish: haciéndola prostituta
  alternatives_spanish:
  - prostituyéndola
  - haciéndola cometer prostitución
  lexicon: HALOT
  rationale: 'El causativo de זנה debe conservarse: no dice solo que ella practique prostitución, sino que alguien la haga entrar en esa condición. «Haciéndola prostituta» conserva la fuerza causativa en una forma idiomática y clara.'
- source_word: תִזְנֶה הָאָרֶץ
  english_pob_choice: the land become prostituted
  chosen_spanish: la tierra se prostituya
  alternatives_spanish:
  - la tierra se prostituya sexualmente
  - la tierra cometa prostitución
  lexicon: HALOT
  rationale: La metáfora de la tierra prostituyéndose se mantiene para no borrar el lenguaje figurado del hebreo. «Se prostituya» suena natural en español y conserva la personificación moral del texto.
- source_word: וּמָלְאָה הָאָרֶץ
  english_pob_choice: and the land be filled
  chosen_spanish: la tierra se llene
  alternatives_spanish:
  - la tierra quede llena
  - la tierra se vea llena
  lexicon: HALOT
  rationale: 'El valor consecutivo/resultativo del verbo permite una subordinada de consecuencia con subjuntivo: «se llene». Mantiene la lógica de advertencia introducida por «para que no».'
- source_word: זִמָּה
  english_pob_choice: depravity
  chosen_spanish: perversidad
  alternatives_spanish:
  - depravación
  - lascivia
  - maldad
  lexicon: HALOT
  rationale: זִמָּה en Levítico abarca una corrupción moral grave, a menudo sexual, pero no se limita a un solo matiz. «Perversidad» conserva la gravedad y amplitud del término sin reducirlo a una sola categoría sexual.
theological_decisions:
- issue: Metáfora de la tierra “prostituyéndose”
  english_pob_reading: Retain the metaphor with 'the land become prostituted' rather than flattening it to a generic moral decline.
  chosen_spanish_reading: 'Conservar la metáfora: «la tierra se prostituya».'
  alternative_spanish_readings:
  - la tierra caiga en inmoralidad
  - la tierra se corrompa
  rationale: El hebreo personifica la tierra y usa lenguaje sexual para expresar corrupción comunitaria y pactual. En español, mantener la metáfora conserva la fuerza retórica y evita debilitar el vínculo entre pecado sexual y contaminación del orden comunitario.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor teológico de חלל en un contexto de santidad
  english_pob_reading: Use 'profane' in the main text.
  chosen_spanish_reading: Usar «profanes» en el texto principal.
  alternative_spanish_readings:
  - deshonres
  - contamines
  rationale: Levítico estructura la ética de Israel en torno a la santidad; «profanar» es la equivalencia más transparente para ese contraste. «Deshonrar» pierde el eje santo/profano, y «contaminar» desplaza el matiz hacia impureza material.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales. El borrador español conserva la lectura de alta concordancia con el original hebreo y con el audit trail en inglés, sin suavizar la metáfora ni perder el matiz causativo del infinitivo hifil.
  spanish_consistency_notes:
  - Se mantiene «profanar» para חלל conforme al registro de Levítico.
  - Se conserva «prostituya» para la metáfora de la tierra, evitando un giro más abstracto.
  - «Perversidad» traduce זִמָּה con suficiente amplitud moral y sin restringirlo indebidamente a lo sexual.
  - El orden del versículo sigue la lógica hebrea de mandato + consecuencia + resultado.
