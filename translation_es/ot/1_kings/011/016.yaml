review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: cláusula explicativa, duración de seis meses, permanencia de Joab y todo Israel, y eliminación de todos los varones en Edom. Sin embargo, no preserva del todo la decisión léxica auditada para הִכְרִית, ya que el inglés POB mantuvo el modismo fuerte pero más literal ''cut off'', con alternativas en nota. En español, ''exterminado'' es posible, pero aquí se aleja de la decisión documentada más de lo necesario.'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos problemas de forma: (1) la nota [a] está anclada dos veces para dos funciones distintas, lo cual viola la disciplina de marcadores únicos; y (2) la secuencia ''hasta que había exterminado'' suena poco natural en español narrativo bíblico. ''Hasta que eliminó/cortó de raíz'' o ''hasta haber eliminado'' sería más idiomático. También conviene reordenar las notas para que los marcadores aparezcan en el orden textual correcto.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. ''Todo Israel'' está bien conservado con nota explicativa. La principal desviación es lexical: הִכְרִית debería reflejar mejor ''cortar/quitar de en medio'' que un término interpretativo más cargado como ''exterminar'' en el texto principal, dejando las alternativas en nota.'
  issues:
  - severity: medium
    issue: El texto principal usa 'había exterminado' para הִכְרִית en vez de una opción más cercana a 'cut off'.
    rationale: La auditoría inglesa prioriza preservar el idiomático 'cut off' y poner 'destroyed/exterminated' como alternativas en nota. En español conviene acercarse a esa decisión con 'eliminó' o similar en el texto principal y dejar 'cortó/destruyó/exterminó' en nota.
  - severity: high
    issue: La nota [a] se reutiliza en dos lugares del texto.
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas distintas dentro del mismo registro. Además, la segunda ancla en 'había[a]' no corresponde claramente a una nota distinta.
  - severity: medium
    issue: '''Hasta que había exterminado'' es una construcción poco natural en español.'
    rationale: Después de 'hasta que', el pluscuamperfecto suena forzado. En narrativa española bíblica es más natural 'hasta que eliminó' o 'hasta haber eliminado'.
  - severity: low
    issue: El orden de los marcadores no sigue bien el flujo del texto.
    rationale: La nota cultural sobre 'todo Israel' debe anclarse allí, y la nota léxica sobre הִכְרִית en el verbo correspondiente, con marcadores en orden de aparición.
  revised_spanish_text: Porque Joab y todo Israel[a] habían permanecido allí seis meses, hasta que eliminó[b] a todo varón en Edom.
  revised_footnotes:
  - marker: a
    text: «Todo Israel» probablemente se refiere al contingente de guerra israelita con Joab, no necesariamente a cada individuo de la nación.
    reason: cultural_note
  - marker: b
    text: O «cortó de raíz», «destruyó» o «exterminó» a todo varón. El verbo hebreo significa literalmente «cortar» o «cortar de en medio», un modismo para eliminar una población.
    reason: lexical_alternative
  revision_rationale: Se corrige la reutilización indebida de marcadores, se reordena el anclaje de notas según su aparición en el texto, y se mejora la naturalidad del español narrativo. También se ajusta el verbo principal a 'eliminó', que preserva mejor la severidad del hebreo sin apartarse tanto de la decisión auditada 'cut off', dejando las opciones más interpretativas en la nota lexical.
