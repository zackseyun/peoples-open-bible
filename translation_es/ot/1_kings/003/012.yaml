  text: הִנֵּ֥ה עָשִׂ֖יתִי כִּ/דְבָרֶ֑י/ךָ הִנֵּ֣ה נָתַ֣תִּי לְ/ךָ֗ לֵ֚ב חָכָ֣ם וְ/נָב֔וֹן אֲשֶׁ֤ר כָּמ֨וֹ/ךָ֙ לֹא הָיָ֣ה לְ/פָנֶ֔י/ךָ וְ/אַחֲרֶ֖י/ךָ לֹא יָק֥וּם כָּמֽוֹ/ךָ׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/012.yaml
  text: Behold[a], I have done according to your words. Behold, I have given you a wise and discerning heart, such that no one like you has been before you, and no one like you shall arise after you.
  footnotes:
