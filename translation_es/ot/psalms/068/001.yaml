translation:
  language: es
  text: Para el director del coro[a]. De David. Salmo. Cántico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director musical» o «Para el maestro del coro».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de música
  - Para el jefe del coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala a la persona encargada de la ejecución musical. «Director del coro» conserva esa función y suena natural en español actual, sin perder el matiz litúrgico/musical.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea ל en los encabezados puede indicar autoría, dedicación o asociación. «De David» preserva esa amplitud mejor que una opción más interpretativa como «Por David».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto salmódico
  lexicon: HALOT
  rationale: «Salmo» es el equivalente natural y reconocido en español para esta etiqueta de género. Se omite el artículo para que el encabezado fluya como fórmula breve, como en el hebreo.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canto
  - Canción
  lexicon: HALOT
  rationale: «Cántico» comunica mejor en español bíblico la categoría de composición cantada y mantiene la distinción con מִזְמוֹר. «Canción» sería más moderna, pero menos solemne; «canto» es viable, aunque menos distintivo en este encabezado.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en el repaso más reciente y no requirió revisiones. El español conserva la estructura breve y paralela del encabezado hebreo, con equivalentes naturales y una nota para la ambigüedad de לְדָוִד y del título musical.
  spanish_consistency_notes:
  - Se mantiene «David» sin artículos ni explicaciones añadidas para respetar la forma de encabezado.
  - «Salmo» y «Cántico» se distinguen como dos rótulos genéricos paralelos, siguiendo la duplicación del hebreo.
  - Se usa «director del coro» como término claro y eclesialmente neutral, en lugar de calcos más rígidos.
