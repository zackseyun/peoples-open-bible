revisions:
- from: Azarías hijo de Natán estaba sobre los gobernadores[a], y Zabud hijo de Natán era sacerdote y amigo del rey.
  to: Azarías hijo de Natán estaba a cargo de los gobernadores, y Zabud hijo de Natán era sacerdote[a] y amigo del rey.
  rationale: Se reubica la nota al pie para que ancle correctamente en 'sacerdote', el término al que realmente comenta, y se mejora la naturalidad del cargo administrativo con 'estaba a cargo de'. No se requieren cambios doctrinales ni una nueva adjudicación compleja.
