translation:
  language: es
  text: Entonces el rey Roboam hizo escudos de bronce en lugar de ellos[a] y los encomendó al cuidado de los comandantes de los guardias[b], que vigilaban la entrada de la casa del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, escudos de bronce que reemplazaban a los escudos de oro tomados por Sisac (véase el versículo anterior).
    reason: cross_reference
  - marker: b
    text: 'Hebreo: «los corredores»; probablemente se refiere a los guardias reales o mensajeros que servían como guardia del palacio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: עשה expresa aquí fabricar o producir. En español, «hizo» comunica de manera natural la acción de producir los escudos sin añadir matices ajenos.
- source_word: תַּחְתֵּיהֶם
  english_pob_choice: in their place
  chosen_spanish: en lugar de ellos
  alternatives_spanish:
  - en su lugar
  - en vez de ellos
  lexicon: HALOT
  rationale: תחת con sufijo indica sustitución. «En lugar de ellos» conserva esa relación de reemplazo y es claro en español.
- source_word: מָגִנֵּי נְחֹשֶׁת
  english_pob_choice: bronze shields
  chosen_spanish: escudos de bronce
  alternatives_spanish:
  - escudos de cobre
  - escudos broncíneos
  lexicon: HALOT
  rationale: נחושת puede referirse a cobre o bronce, pero en armamento el sentido más probable y usual es «bronce». El genitivo «de bronce» suena natural en español y conserva la imagen del objeto.
- source_word: וְהִפְקִיד
  english_pob_choice: committed to the care of
  chosen_spanish: los puso al cuidado de
  alternatives_spanish:
  - los encomendó a
  - los confió a
  lexicon: HALOT
  rationale: El hifil de פקד aquí implica poner algo bajo custodia o encargo. «Los puso al cuidado de» refleja bien la idea de encomienda y custodia, siguiendo de cerca el matiz del inglés auditado.
- source_word: עַל יַד
  english_pob_choice: to the care of
  chosen_spanish: al cuidado de
  alternatives_spanish:
  - en manos de
  - bajo la autoridad de
  lexicon: HALOT
  rationale: La expresión idiomática comunica entrega bajo responsabilidad de otros. «Al cuidado de» es idiomático en español y preserva la noción de custodia.
- source_word: שָׂרֵי הָרָצִים
  english_pob_choice: the commanders of the guards
  chosen_spanish: los comandantes de los guardias
  alternatives_spanish:
  - los capitanes de los corredores
  - los jefes de la guardia
  lexicon: HALOT
  rationale: שׂרים en este contexto son jefes o comandantes; הרצים, literalmente «los corredores», se entiende en contexto real como personal de guardia real. «Guardias» sigue la solución contextual del inglés POB y comunica la función sin perder el trasfondo léxico.
- source_word: הָרָצִים
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los corredores
  - la guardia real
  lexicon: HALOT
  rationale: Aunque el sentido literal es «los corredores», el contexto palaciego sugiere una función de guardia/custodia. Se mantiene «guardias» en el texto principal para claridad, con la alternativa literal preservable en nota.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: who kept watch
  chosen_spanish: que vigilaban
  alternatives_spanish:
  - que estaban guardando
  - que velaban
  lexicon: HALOT
  rationale: El participio indica acción continua. «Vigilaban» conserva la duración del cuidado y suena natural en español.
- source_word: פֶּתַח בֵּית הַמֶּלֶךְ
  english_pob_choice: the entrance of the king’s house
  chosen_spanish: la entrada de la casa del rey
  alternatives_spanish:
  - la entrada del palacio del rey
  - el umbral de la casa del rey
  lexicon: HALOT
  rationale: פתח es «entrada» o «acceso». בית המלך es literalmente «la casa del rey»; se mantiene esa forma cercana al hebreo en lugar de explicitar «palacio», aunque esa sea una posible referencia contextual.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético y el audit trail inglés con alta concordancia. Se mantuvo la idea de sustitución («en lugar de ellos»), el encargo/custodia («los puso al cuidado de»), y la referencia funcional de הרצים como guardia palaciega, dejando la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usó «Roboam» como forma estándar en español bíblico para רחבעם.
  - Se prefirió «bronce» por el uso contextual en armamento.
  - Se preservó «casa del rey» en vez de expandirlo a «palacio» para no alejarse del hebreo.
  - La nota a mantiene la tensión entre la traducción funcional «guardias» y el sentido literal «corredores».
