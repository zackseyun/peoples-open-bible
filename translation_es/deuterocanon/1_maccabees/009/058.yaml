review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: consejo deliberado de los ἄνομοι, señalamiento de Jonatán y los suyos, su residencia tranquila y confiada, propuesta de traer a Báquides/Bacchides, y captura nocturna de todos. Sin embargo, hay dos desajustes importantes: «traeremos» debilita la fuerza exhortativa de ἄξομεν, que aquí se expresa mejor como «traigamos» o «vamos a traer»; y «Bákides» no sigue una adaptación española eclesialmente legible ni la forma más natural en español para Βακχίδης.'
  spanish_quality_summary: El texto es legible, pero «se aconsejaron» suena poco natural en este contexto; «tomaron consejo» o «deliberaron» lee mejor. «Habitan en quietud y confianza» es comprensible pero algo rígido; una formulación más natural y fiel en español es «viven tranquilos y confiados» o «viven en tranquilidad y confianza». También conviene evitar el futuro indicativo «traeremos» para una propuesta deliberativa.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «Los hombres inicuos» es aceptable, aunque «los hombres sin ley» reflejaría más literalmente ἄνομοι; no es necesario forzar cambio si se mantiene el tono moral. El principal ajuste lexical es ἄξομεν -> «traigamos».
  issues:
  - severity: medium
    issue: «traeremos» para ἄξομεν
    rationale: El audit trail inglés documenta fuerza exhortativa («let us bring»). El futuro indicativo español suena predictivo más que propositivo. «Traigamos» preserva mejor el matiz deliberativo del complot.
  - severity: medium
    issue: «Bákides» como forma del nombre propio
    rationale: La grafía con k y acento agudo no es la solución más natural en español bíblico. «Báquides» es la forma castellana más reconocible y legible para Βακχίδης.
  - severity: low
    issue: «se aconsejaron» suena poco idiomático
    rationale: Aunque no es imposible, en español narrativo bíblico resulta más natural «tomaron consejo» o «deliberaron entre sí», sin alterar el sentido.
  - severity: low
    issue: «habitan en quietud y confianza» es algo rígido
    rationale: La frase reproduce los componentes griegos, pero en español suena menos natural. Una mejora como «viven tranquilos y confiados» preserva el contraste entre calma exterior y confianza interior, además de armonizar con la nota existente.
  revised_spanish_text: 'Y todos los hombres inicuos tomaron consejo[a], diciendo: «Miren, Jonatán y los que están con él viven tranquilos y confiados. Ahora, pues, traigamos a Báquides, y él los capturará a todos en una sola noche».'
  revised_footnotes:
