translation:
  language: es
  text: 'En aquel tiempo Yahvé habló por medio de Isaías hijo de Amoz, diciendo: «Ve, quítate el cilicio de la cintura y quítate las sandalias de los pies». Y lo hizo así, caminando desnudo[a] y descalzo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'despojado' o 'al descubierto'; el hebreo puede indicar estar insuficientemente vestido más que completamente sin ropa en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme a la política del proyecto y a la elección inglesa 'Yahweh'. Se evita la sustitución por un título, manteniendo la transparencia textual.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Aquel tiempo
  lexicon: HALOT
  rationale: Expresa de modo natural en español la referencia temporal demostrativa del hebreo sin perder su valor deíctico.
- source_word: דִּבֶּר ... בְּיַד
  english_pob_choice: spoke by the hand of
  chosen_spanish: habló por medio de
  alternatives_spanish:
  - habló por la mano de
  - habló mediante
  lexicon: HALOT
  rationale: El hebreo usa una fórmula profética idiomática literal 'por la mano de'. En español, 'por medio de' conserva la mediación profética con mayor naturalidad y evita un calco duro.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  english_pob_choice: Isaiah son of Amoz
  chosen_spanish: Isaías hijo de Amoz
  alternatives_spanish:
  - Isaías, hijo de Amoz
  - Isaías el hijo de Amoz
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar; la construcción filial se vierte directamente con 'hijo de'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Equivale de forma directa a la introducción de cita en discurso directo.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Id
  lexicon: HALOT
  rationale: Imperativo natural en español para introducir la acción ordenada.
- source_word: וּפִתַּחְתָּ
  english_pob_choice: loosen
  chosen_spanish: quítate
  alternatives_spanish:
  - desata
  - afloja
  - despréndete de
  lexicon: HALOT
  rationale: En este contexto no se trata simplemente de 'abrir', sino de desprender o retirar lo que se lleva puesto. 'Quítate' comunica con claridad la acción exigida en español, sin negar el trasfondo de desatar/aflojar.
- source_word: הַשַּׂק
  english_pob_choice: the sackcloth
  chosen_spanish: el cilicio
  alternatives_spanish:
  - el sayal
  - la tela burda
  - el saco
  lexicon: HALOT
  rationale: En español eclesiástico 'cilicio' es el equivalente más asentado para la prenda de duelo/aflicción. Aunque 'sayal' es posible, 'cilicio' preserva mejor el matiz cultual y profético del hebreo en un registro ampliamente reconocible.
- source_word: מֵעַל מָתְנֶיךָ
  english_pob_choice: from your waist
  chosen_spanish: de la cintura
  alternatives_spanish:
  - de tus lomos
  - de la cintura de tus lomos
  - de la faja
  lexicon: HALOT
  rationale: '''Cintura'' es una solución natural y comprensible; conserva el área corporal indicada por el hebreo sin arcaizar innecesariamente.'
- source_word: וְנַעַלְךָ תַחֲלֹץ מֵעַל רַגְלֶיךָ
  english_pob_choice: remove your sandals from your feet
  chosen_spanish: quítate las sandalias de los pies
  alternatives_spanish:
  - sácate las sandalias de los pies
  - descalza tus pies
  lexicon: HALOT
  rationale: '''Sandalias'' funciona mejor en español que el singular colectivo; ''quítate'' refleja el valor de retirar/descargar de ''חלץ'' en una forma idiomática y clara.'
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: And he did so
  chosen_spanish: Y lo hizo así
  alternatives_spanish:
  - Y así lo hizo
  - Y obedeció
  lexicon: HALOT
  rationale: Reproduce la fórmula narrativa de cumplimiento sin añadir interpretación explícita como 'obedeció'.
- source_word: הָלֹךְ
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - yendo
  - andando
  lexicon: HALOT
  rationale: La forma adverbial/participial se vierte naturalmente con un gerundio que describe el modo de su desplazamiento.
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - despojado
  - desnudo de ropa
  lexicon: HALOT
  rationale: Se conserva el sentido léxico directo. El término puede abarcar una exposición total o una desnudez relativa en contextos de sign-act; la ambigüedad se mantiene para no resolverla prematuramente.
- source_word: יָחֵף
  english_pob_choice: barefoot
  chosen_spanish: descalzo
  alternatives_spanish:
  - con los pies descalzos
  - sin sandalias
  lexicon: HALOT
  rationale: Equivalente natural y exacto para la ausencia de calzado.
theological_decisions:
- issue: Alcance de עָרוֹם en el signo profético
  english_pob_reading: Render as 'naked' in the main text while preserving the possibility of partial undress in a footnote.
  chosen_spanish_reading: Se mantiene 'desnudo' en el texto principal, con nota que deja abierta la posibilidad de 'despojado' o 'desnudo' en sentido de ropa insuficiente.
  alternative_spanish_readings:
  - despojado
  - con una prenda interior
  - semi-desnudo
  rationale: El hebreo favorece la traducción directa 'desnudo', pero el contexto del despojo de cilicio y sandalias permite una desnudez relativa. La nota conserva esa tensión sin suavizar el impacto del signo.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa ajustó 'take your sandals off your feet' a 'remove your sandals from your feet' por mayor formalidad y direccionalidad; en español se reflejó con 'quítate las sandalias de los pies', manteniendo un verbo de remoción claro y natural. También se preservó la elección revisada de una formulación más directa para la acción sobre el calzado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefiere 'cilicio' como término eclesiástico transparente para הַשַּׂק, en lugar de 'saco' o 'sayal'.
  - Se conserva la ambigüedad de עָרוֹם con nota, evitando interpretar de antemano el grado exacto de desnudez.
  - '''Descalzo'' se usa como equivalente estable de יָחֵף, sin añadir explicaciones innecesarias en el cuerpo del texto.'
