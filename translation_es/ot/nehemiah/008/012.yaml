revisions:
- from: Y todo el pueblo se fue a comer y a beber[a], a enviar porciones, y a celebrar con gran alegría[b], porque habían entendido las palabras que se les habían dado a conocer.
  to: Y todo el pueblo se fue a comer y a beber[a], a enviar porciones y a celebrar con gran alegría, porque habían entendido las palabras que se les habían hecho saber[b].
  rationale: Se suaviza una frase poco idiomática («dado a conocer» -> «hecho saber») para reflejar mejor הוֹדִיעוּ en español natural y se ajusta la puntuación de la serie coordinada. Se conserva el resto de las decisiones léxicas y las notas del POB inglés.
