translation:
  language: es
  text: 'Por tanto he jurado a la casa de Elí: la iniquidad de la casa de Elí no será expiada jamás por sacrificio ni por ofrenda[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente no será expiada». La fórmula hebrea de juramento usa «si» para expresar una negación enfática.'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda» traduce el hebreo minchah, a menudo con el sentido más específico de «ofrenda de cereal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación inferencial del hebreo y mantiene el sentido de consecuencia del juicio previo sin sonar forzado.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - juré
  - he hecho un juramento
  lexicon: HALOT
  rationale: El perfecto hebreo comunica un juramento ya pronunciado con vigencia presente; el perfecto compuesto español conserva bien ese valor solemne.
- source_word: לְבֵית עֵלִי
  english_pob_choice: to the house of Eli
  chosen_spanish: a la casa de Elí
  alternatives_spanish:
  - contra la casa de Elí
  - respecto de la casa de Elí
  lexicon: HALOT
  rationale: La preposición ל marca aquí el destinatario/objeto del juramento; en español, 'a la casa de Elí' conserva cercanía formal al hebreo. El contenido hostil del juramento queda claro por la cláusula siguiente.
- source_word: אִם
  english_pob_choice: shall never
  chosen_spanish: jamás
  alternatives_spanish:
  - ciertamente no
  - nunca
  lexicon: HALOT
  rationale: Después de un verbo de jurar, אִם funciona como fórmula idiomática de negación enfática. 'Jamás' transmite mejor ese valor que traducirlo literalmente por 'si'.
- source_word: יִתְכַּפֵּר
  english_pob_choice: be atoned for
  chosen_spanish: será expiada
  alternatives_spanish:
  - será atonada
  - será purgada
  lexicon: HALOT
  rationale: En este contexto sacrificial, el verbo expresa la remoción de la culpa mediante expiación. 'Expiar' es el equivalente español más claro y digno, y preserva la tensión teológica del texto.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: culpa
  alternatives_spanish:
  - iniquidad
  - pecado
  lexicon: HALOT
  rationale: עָוֹן puede abarcar culpa, iniquidad y la responsabilidad penal del acto. 'Culpa' comunica bien la dimensión judicial del pasaje en español moderno, sin perder el peso moral.
- source_word: בֵּית עֵלִי
  english_pob_choice: Eli’s house
  chosen_spanish: la casa de Elí
  alternatives_spanish:
  - la familia de Elí
  lexicon: HALOT
  rationale: La construcción posesiva natural en español mantiene el sentido del linaje/casa doméstica implicado por el hebreo.
- source_word: בְּזֶבַח
  english_pob_choice: by sacrifice
  chosen_spanish: por sacrificio
  alternatives_spanish:
  - mediante sacrificio
  lexicon: HALOT
  rationale: El ב marca medio/instrumento; 'por' comunica que el sacrificio no logra producir expiación en este caso.
- source_word: וּבְמִנְחָה
  english_pob_choice: or offering
  chosen_spanish: ni por ofrenda
  alternatives_spanish:
  - ni por oblación
  - ni por ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה puede ser más específica como 'ofrenda vegetal/de cereal', pero en este par cultual funciona también como 'ofrenda' en general. Se conserva la amplitud del texto, con la especificidad posible en nota.
- source_word: עַד עוֹלָם
  english_pob_choice: shall never
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: En la fórmula negativa de juramento, 'hasta siempre' no sería idiomático en español; 'jamás' condensa bien la permanencia absoluta de la negación.
theological_decisions:
- issue: Alcance de la negación del perdón expiatorio
  english_pob_reading: The verse declares that no sacrificial system remedy will atone for the iniquity of Eli's house.
  chosen_spanish_reading: El texto afirma que la culpa de la casa de Elí no será expiada jamás por sacrificio ni por ofrenda.
  alternative_spanish_readings:
  - no será perdonada jamás
  - no podrá ser purificada jamás por sacrificio ni ofrenda
  rationale: La traducción conserva la fuerza del juicio sin resolver más de lo que el hebreo dice. 'Expiada' mantiene el marco sacrificial; no se sustituye por 'perdonada' para no borrar la tensión entre culpa, expiación y culto.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: Se verificó el pasaje contra el hebreo masorético y el audit trail inglés; no hubo revisiones textuales en el expediente reciente y el acuerdo de revisión fue alto, sin objeciones pendientes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el tetragrámaton; aquí no aparece.
  - Se usa 'casa de Elí' de forma consistente para la construcción hebrea בית + nombre propio.
  - Se conserva el campo sacrificial con 'expiada' y 'ofrenda' para no perder la tensión léxica del original.
  - El negativo enfático final se expresó con 'jamás' para reflejar la fórmula juramentaria hebrea sin literalismo opaco.
