revisions:
- from: Pero quebranto de rebeldes y pecadores[a], juntamente[b], y los que abandonan a Yahvé serán consumidos.
  to: Pero rebeldes y pecadores serán quebrantados juntos[a][b], y los que abandonan a Yahvé llegarán a su fin.
  rationale: 'Se reparó la cláusula inicial para expresar en español una predicación completa y natural, conforme al análisis del hebreo y al audit trail inglés: el sustantivo שֶׁבֶר se vierte verbalmente en el texto principal y su alternativa nominal se conserva en nota. También se ajustó יִכְלוּ a una opción principal más amplia (''llegarán a su fin''), dejando las opciones más fuertes como alternativas en nota. Se mantuvo ''Yahvé'' según la norma del proyecto.'
