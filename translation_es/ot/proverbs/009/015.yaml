translation:
  language: es
  text: 'para llamar a quienes pasan por el camino[a], quienes siguen derecho por sus sendas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quienes hacen rectas sus sendas». El participio hebreo puede destacar tanto a quienes siguen recto como a quienes mantienen recto su curso.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרֹא
  english_pob_choice: to call
  chosen_spanish: llamar
  alternatives_spanish:
  - convocar
  - gritar
  lexicon: HALOT
  rationale: El infinitivo constructo expresa propósito; en español, «llamar» conserva el sentido verbal básico y el matiz de una llamada audible sin introducir más intensidad de la que requiere el hebreo.
- source_word: לְעֹבְרֵי דָרֶךְ
  english_pob_choice: to those passing by on the road
  chosen_spanish: a los que pasan por el camino
  alternatives_spanish:
  - a los transeúntes del camino
  - a los que pasan por la vía
  lexicon: HALOT
  rationale: El participio de עבר describe a personas en acto de pasar; «los que pasan por el camino» mantiene esa fuerza verbal y el cuadro concreto de viajeros.
- source_word: דָרֶךְ
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - carretera
  lexicon: HALOT
  rationale: Aunque el inglés opta por «road», en español «camino» suena más natural y conserva el campo semántico de una vía de paso sin imponer una imagen demasiado moderna o específica.
- source_word: הַמְיַשְּׁרִים
  english_pob_choice: who are going straight on
  chosen_spanish: los que van derecho
  alternatives_spanish:
  - los que van rectos
  - los que enderezan
  lexicon: HALOT
  rationale: El participio puede significar ir recto o hacer recto; aquí, con «sus sendas» como complemento, el sentido probable es el de continuar sin desviarse. «Van derecho» preserva esa ambivalencia mínima sin explicar de más.
- source_word: אֹרְחוֹתָם
  english_pob_choice: their paths
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus rutas
  lexicon: HALOT
  rationale: אֹרַח suele denotar senda o curso de viaje, literal o figurado. «Sendas» encaja con la imaginería sapiencial y conserva un matiz ligeramente más formal que «caminos».
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión menor: se prefirió «to call» frente a «to call out» para mayor precisión léxica y registro más formal. La versión española sigue esa decisión con «llamar», sin añadir intensidad no indicada por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con español natural.
  - «Camino» y «sendas» se distinguen para conservar la diferencia entre דָרֶךְ y אֹרְחוֹת.
  - La nota al pie preserva la alternativa lexical del hebreo sin resolverla unilateralmente.
