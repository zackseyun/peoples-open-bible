translation:
  language: es
  text: Y ahora, habitante de Jerusalén y hombre de Judá[a], juzguen, por favor, entre mí y mi viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa expresiones singulares, «habitante de Jerusalén» y «hombre de Judá», como un llamamiento representativo al pueblo en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene el giro discursivo y la continuidad con la canción anterior; el añadido de 'Y' conserva la conexión retórica que el inglés POB también preserva con 'And now'.
- source_word: יוֹשֵׁב יְרוּשָׁלַם
  english_pob_choice: inhabitant of Jerusalem
  chosen_spanish: habitante de Jerusalén
  alternatives_spanish:
  - morador de Jerusalén
  - el que habita en Jerusalén
  lexicon: HALOT
  rationale: El participio singular con el nombre de la ciudad funciona de manera colectiva/representativa. 'Habitante' conserva el singular sin volver la frase innecesariamente literal o forzada en español.
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: and man of Judah
  chosen_spanish: y hombre de Judá
  alternatives_spanish:
  - y varón de Judá
  - y hombres de Judá
  - y pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo de אִישׁ, paralelo a 'habitante de Jerusalén'. 'Hombre' es fiel y claro en español; no se neutraliza a plural porque el hebreo mantiene la forma singular.
- source_word: שִׁפְטוּ
  english_pob_choice: judge
  chosen_spanish: juzgad
  alternatives_spanish:
  - juzguen
  - decidan
  - hagan juicio
  lexicon: HALOT
  rationale: El imperativo plural pide un acto de discernimiento/juzgamiento. 'Juzgad' suena digno y refleja bien la fuerza exhortativa; se prefiere esta forma por el registro profético solemne.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - os ruego
  - les ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula de súplica suaviza el imperativo. 'Por favor' expresa la apelación con naturalidad contemporánea y sin arcaísmo.
- source_word: בֵּינִי וּבֵין כַּרְמִי
  english_pob_choice: between me and my vineyard
  chosen_spanish: entre mí y mi viña
  alternatives_spanish:
  - entre yo y mi viña
  - entre mí y mi viñedo
  lexicon: HALOT
  rationale: '''Viña'' es la equivalencia natural y bíblica de כֶּרֶם en este contexto. Se mantiene la relación bilateral del litigio metafórico entre Dios y su plantación.'
theological_decisions:
- issue: Dirección corporativa mediante singular representativo
  english_pob_reading: Retain singular forms as 'inhabitant of Jerusalem and man of Judah'
  chosen_spanish_reading: Conservar 'habitante de Jerusalén y hombre de Judá' como singulares representativos en una llamada colectiva
  alternative_spanish_readings:
  - habitantes de Jerusalén y hombres de Judá
  - gente de Jerusalén y de Judá
  rationale: El hebreo usa singulares que apelan a la comunidad por medio de representantes. La traducción española conserva esa tensión formal para no borrar el rasgo retórico ni la textura del original, aunque la función sea claramente colectiva.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: La revisión más reciente indicó 'unchanged' y alta concordancia; no se requieren cambios sustantivos respecto al texto de trabajo, solo adecuación al español natural conservando el singular representativo.
  spanish_consistency_notes:
  - Se mantiene 'viña' para כֶּרֶם por coherencia con el lenguaje profético y el uso estándar del POB.
  - Se conserva el tratamiento plural implícito en 'juzgad' porque el hebreo es imperativo plural, aunque los sujetos estén en singular representativo.
  - No se usa 'Señor' ni 'Cristo' porque este versículo no contiene esos términos ni una cita que los requiera.
