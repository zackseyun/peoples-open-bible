review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: temporalidad con τότε, anterioridad de γράψαντες, distributivo ἕκαστος, y el acto de sellar y colocar los escritos bajo el προσκεφάλαιον de Darío. Sin embargo, introduce desajustes menores: usa singular (''la sellaron... la pusieron'') donde el contexto pide plural colectivo implícito como en el inglés auditado, y ''debajo del almohadón'' suena menos preciso/natural que ''debajo de la almohada'' para este contexto. También la colocación de marcas de nota no coincide limpiamente con el término anotado.'
  spanish_quality_summary: El español es generalmente claro, pero hay mejoras necesarias para naturalidad y corrección estilística. 'Después de que cada uno había escrito' funciona, pero 'después de que cada uno escribió' o 'después de que cada uno hubo escrito' sería más idiomático; aun así, no es un error grave. Sí conviene corregir el singular anafórico a plural ('los sellaron y los pusieron') para concordar con 'cada uno' como participantes que producen escritos. 'Almohadón' y una nota adicional de estilo son innecesarios; 'almohada' es más natural y fiel, con una sola nota léxica para 'cabecera/apoyo para la cabeza'.
  glossary_alignment: 'No hay términos teológicos clave en juego. La decisión léxica principal debe alinearse con el audit trail: προσκεφάλαιον -> ''almohada'' con nota alternativa ''cabecera'' o ''apoyo para la cabeza''. ''λόγον'' como ''declaración'' es aceptable, aunque ''escrito'' también sería posible en contexto; no requiere cambio. La nota de estilo sobre ''almohadón'' no está justificada por el proyecto y añade ruido.'
  issues:
  - severity: medium
    issue: Pronombres y verbos en singular donde el contexto requiere plural
    rationale: El griego ἐσφραγίσαντο ... ἔθηκαν tiene sujeto plural; aunque cada uno escribió su propio texto, luego 'ellos los sellaron y los pusieron' expresa mejor la acción sobre los escritos presentados. 'La sellaron y la pusieron' sugiere un único documento.
  - severity: medium
    issue: Elección de 'almohadón' y nota de estilo innecesaria
    rationale: προσκεφάλαιον se cubre bien con 'almohada' en español general. 'Almohadón' puede sonar regional o menos exacto, y la segunda nota explica una elección que no mejora la fidelidad.
  - severity: low
    issue: Anclaje de notas inconsistente
    rationale: La marca [a] aparece separada por 'del [a]almohadón[b]', mientras que las decisiones léxicas asocian la alternativa solo a ese sustantivo. Conviene dejar una sola nota anclada directamente en 'almohada[a]'.
  - severity: low
    issue: Tiempo verbal algo menos idiomático en la subordinada
    rationale: '''Después de que cada uno había escrito'' es comprensible, pero en narración española suele sonar más natural ''después de que cada uno escribió'' o ''después de que cada uno hubo escrito''.'
  revised_spanish_text: Y entonces, después de que cada uno escribió su propia declaración, los sellaron y los pusieron debajo de la almohada[a] de Darío el rey,
