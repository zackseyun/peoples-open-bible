translation:
  language: es
  text: Tú me das a conocer el camino de la vida; en tu presencia[a] hay plenitud de gozo[b]; a tu derecha hay placeres para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'delante de tu rostro'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''plenitud de gozos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹדִיעֵנִי
  english_pob_choice: You make known to me
  chosen_spanish: Tú me haces conocer
  alternatives_spanish:
  - Tú me darás a conocer
  - Tú me muestras
  lexicon: HALOT
  rationale: 'El hiphil de ידע con sufijo de primera persona expresa una acción causativa: hacer saber, hacer conocer. ''Me haces conocer'' conserva mejor esa fuerza causativa que un simple ''muestras''.'
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - ruta
  lexicon: HALOT
  rationale: En español, 'camino' comunica con naturalidad la metáfora de una vía o curso de vida. 'Sendero' sería más literal pero menos natural aquí.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente plural, funciona como sustantivo abstracto singular. 'Vida' reproduce esa fuerza idiomática en español.
- source_word: שֹׂבַע
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - abundancia
  - satisfacción
  lexicon: HALOT
  rationale: El término denota saciedad, abundancia o plenitud. 'Plenitud' conserva la idea concreta de colmamiento y combina bien con 'gozos'.
- source_word: שְׂמָחוֹת
  english_pob_choice: joys
  chosen_spanish: gozos
  alternatives_spanish:
  - alegrías
  - gozo
  lexicon: HALOT
  rationale: El plural hebreo intensifica la idea de alegría múltiple. 'Gozos' mantiene ese plural y suena digno en español bíblico.
- source_word: אֶת פָּנֶיךָ
  english_pob_choice: in your presence
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - en tu presencia
  - ante tu faz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'antes/delante de tu rostro' y, por uso, indica presencia inmediata. Se conserva una formulación transparente en el texto principal para no borrar la imagen del original.
- source_word: נְעִמוֹת
  english_pob_choice: pleasures
  chosen_spanish: placeres
  alternatives_spanish:
  - delicias
  - cosas agradables
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural comunica cosas agradables, deleites o placeres. 'Placeres' es natural y corresponde al paralelo poético.
- source_word: בִּימִינְךָ
  english_pob_choice: at your right hand
  chosen_spanish: a tu derecha
  alternatives_spanish:
  - en tu mano derecha
  - junto a tu derecha
  lexicon: HALOT
  rationale: La preposición con 'mano derecha' puede expresarse en español de forma idiomática como 'a tu derecha'. Conserva la imagen de proximidad favorable sin sonar forzado.
- source_word: נֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: '''Para siempre'' es el equivalente natural moderno y comunica duración continua en este contexto poético.'
theological_decisions:
- issue: Cómo traducir אֶת פָּנֶיךָ sin perder la imagen corporal ni ocultar el sentido de presencia divina
  english_pob_reading: in your presence
  chosen_spanish_reading: delante de tu rostro
  alternative_spanish_readings:
  - en tu presencia
  - ante tu faz
  rationale: El hebreo es literalmente 'delante de tu rostro', pero el sentido es de presencia inmediata ante Dios. Se deja la imagen en el texto principal para transparencia fuente-textual, y se evita reemplazarla por una fórmula totalmente idiomática que borre la tensión entre literalidad y sentido.
  doctrine_reference: Principio de primacía del texto original y conservación de la imaginería bíblica
translation_notes:
  revision_awareness: 'El audit trail inglés revisó ''before your face'' hacia ''in your presence'' por naturalidad, pero también preservó la tensión literal/idiomática en la nota. Esta versión española sigue esa misma tensión: mantiene la imagen de ''delante de tu rostro'' en el texto principal y ofrece ''en tu presencia'' como alternativa idiomática.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y se usa lenguaje que no masquea el nombre divino cuando no aparece aquí.
  - '''Gozos'' conserva el plural hebreo de intensificación; no se simplifica a singular.'
  - '''Delante de tu rostro'' es deliberadamente más transparente que ''en tu presencia'' para mantener la imaginería del original.'
  - Se prefiere 'para siempre' por naturalidad idiomática en español bíblico contemporáneo.
