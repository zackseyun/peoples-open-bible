translation:
  language: es
  text: Ahora, un río salía de Edén para regar el jardín[a], y de allí se dividía y formaba cuatro cabeceras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cuatro cabezas”. El hebreo dice literalmente “cabezas”, un término usado aquí para las cuatro divisiones principales del río.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָהָר
  english_pob_choice: Now a river
  chosen_spanish: Ahora un río
  alternatives_spanish:
  - Y un río
  - Un río
  lexicon: HALOT
  rationale: נָהָר significa “río”. El וְ inicial funciona narrativamente; “Ahora” da continuidad natural en español sin perder el arranque de escena.
- source_word: יֹצֵא
  english_pob_choice: flowed out
  chosen_spanish: salía
  alternatives_spanish:
  - fluía
  - salía fuera
  - estaba saliendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso. “Salía” conserva el movimiento continuo del río con naturalidad en español.
- source_word: מֵעֵדֶן
  english_pob_choice: out of Eden
  chosen_spanish: de Edén
  alternatives_spanish:
  - desde Edén
  - fuera de Edén
  lexicon: HALOT
  rationale: La preposición marca origen. “De Edén” es la forma más directa y natural; el contexto fluvial ya comunica el movimiento de salida.
- source_word: לְהַשְׁקוֹת
  english_pob_choice: to water
  chosen_spanish: para regar
  alternatives_spanish:
  - para irrigar
  - para dar de beber
  lexicon: HALOT
  rationale: El infinitivo indica finalidad. “Regar” comunica bien la función del río respecto del jardín y evita un tecnicismo innecesario.
- source_word: אֶת־הַגָּן
  english_pob_choice: the garden
  chosen_spanish: el jardín
  alternatives_spanish:
  - el huerto
  - el huerto-jardín
  lexicon: HALOT
  rationale: הַגָּן es simplemente “el jardín” en este contexto. “Huerto” sería posible pero cambiaría el matiz semántico habitual del término.
- source_word: וּמִשָּׁם
  english_pob_choice: and from there
  chosen_spanish: y desde allí
  alternatives_spanish:
  - y de allí
  - y desde ese lugar
  lexicon: HALOT
  rationale: La frase señala un nuevo tramo del curso del río. “Desde allí” es idiomático y directo en español.
- source_word: יִפָּרֵד
  english_pob_choice: it divided
  chosen_spanish: se dividía
  alternatives_spanish:
  - se separaba
  - era dividido
  lexicon: HALOT
  rationale: 'El nifal de פרד puede ser intransitivo: el río se divide/se separa. “Se dividía” mantiene el valor aspectual continuo del hebreo narrativo.'
- source_word: וְהָיָה
  english_pob_choice: and became
  chosen_spanish: y llegaba a ser
  alternatives_spanish:
  - y se hacía
  - y se convertía en
  lexicon: HALOT
  rationale: היה expresa el resultado de la división. “Llegaba a ser” conserva el valor de transición sin forzar una forma demasiado rígida.
- source_word: לְאַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - en cuatro
  - hasta cuatro
  lexicon: HALOT
  rationale: La construcción con לְ tras היה marca estado resultante. En español, el número se expresa naturalmente como parte del predicado.
- source_word: רָאשִׁים
  english_pob_choice: headwaters
  chosen_spanish: cauces principales
  alternatives_spanish:
  - cabeceras
  - cabezas
  - ramas principales
  lexicon: HALOT
  rationale: Literalmente “cabezas”, pero en contexto hidrográfico alude a las principales divisiones o cursos del río. “Cauces principales” comunica la idea sin ocultar la metáfora de “cabezas”.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conservan el valor progresivo de וְנָהָר y יֹצֵא, el origen de מֵעֵדֶן, el propósito de לְהַשְׁקוֹת, el valor reflexivo/intransitivo de יִפָּרֵד, y la metáfora de רָאשִׁים explicada en nota. No se introdujeron cambios doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se usó “Edén” sin artículo, como nombre propio.
  - Se evitó “SEÑOR” o cualquier sustitución teológica no presente en el versículo.
  - “Cauces principales” mantiene la claridad moderna y conserva en nota la alternativa literal “cabezas”.
  - La puntuación sigue la lógica narrativa del hebreo y del texto base en inglés.
