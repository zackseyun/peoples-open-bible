    issue: Falta la nota léxica tradicional para הַחֹמֶשׁ.
    rationale: La auditoría inglesa preserva explícitamente la alternativa tradicional 'in the fifth rib' en nota. El español principal puede decir 'vientre', pero debe conservar esa alternativa en una nota anclada para mantener la trazabilidad léxica del proyecto.
  - severity: low
    issue: '''Al centro de la puerta'' suena algo rígido en español.'
    rationale: Aunque es fiel, en español bíblico natural 'en medio de la puerta' comunica mejor el sentido de תוך השער como espacio del portón/gateway. Es una mejora estilística menor, no un error de sentido.
