revisions:
- from: Y las obras santas prosperaban[a], mientras Hageo y Zacarías, los profetas, profetizaban.
  to: Y las obras sagradas prosperaban[a], mientras Hageo y Zacarías, los profetas, profetizaban.
  rationale: Se cambia 'obras santas' por 'obras sagradas' para mejorar la naturalidad del español sin apartarse del sentido de τὰ ἱερὰ ἔργα. Se conserva la misma nota alternativa porque refleja bien la opción más literal y la referencia contextual al templo sin introducirla en el texto principal. No se requiere adjudicación adicional.
