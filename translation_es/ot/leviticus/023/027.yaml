revisions:
- from: Pero en el día diez de este séptimo mes[a], será el Día de la Expiación; será para ustedes una santa convocación, y se afligirán[b] a ustedes mismos, y presentarán una ofrenda encendida[c] a Yahvé.
  to: Pero el día diez de este séptimo mes[a] será el Día de la Expiación; será para ustedes una santa convocación, y se afligirán[b], y presentarán una ofrenda de alimento[c] a Yahvé.
  rationale: 'Se hicieron reparaciones menores pero necesarias para mejorar la fidelidad idiomática al hebreo y al rastro léxico POB: se reemplazó «en el día diez» por «el día diez», se eliminó el calco poco natural «a ustedes mismos» después de «se afligirán», y se cambió «ofrenda encendida» por «ofrenda de alimento» para alinearse con la decisión principal documentada para אִשֶּׁה, conservando la alternativa tradicional en nota. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.'
  reviewer_model: gpt-5.4
