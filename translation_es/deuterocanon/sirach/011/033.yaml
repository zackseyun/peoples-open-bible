revisions:
- from: Antes de la muerte[a], no declares feliz[b] a un hombre, porque en su fin un hombre es conocido[c].
  to: Antes de la muerte[a], no llames dichoso[b] a un hombre, porque al final se conoce[c] a un hombre.
  rationale: Se ajusta el español para reflejar mejor el valor sapiencial y declarativo de אַל תְּאַשֶּׁר mediante «no llames dichoso», y se reemplaza la construcción rígida «en su fin un hombre es conocido» por «al final se conoce a un hombre», que suena más natural en español sin perder la idea de que la verdadera condición de una persona solo se hace patente en su desenlace. También se pule levemente la nota griega y se ordenan mejor las alternativas léxicas.
