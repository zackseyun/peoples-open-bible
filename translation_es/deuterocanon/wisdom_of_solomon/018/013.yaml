translation:
  language: es
  text: Pues, aunque no habían creído nada por causa de sus hechicerías[a], ante la destrucción de los primogénitos reconocieron que este pueblo era hijo de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «artes mágicas». El término griego aquí alude a prácticas ocultas asociadas con Egipto.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Israel es reconocido corporativamente como hijo de Dios; aquí no se trata de un título individual.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπιστοῦντες
  english_pob_choice: disbelieved
  chosen_spanish: habían dejado de creer
  alternatives_spanish:
  - desconfiaban
  - habían sido incrédulos
  - no creían
  lexicon: BDAG
  rationale: En español, «dejar de creer» conserva la idea activa de rechazo a lo ya mostrado, sin sonar forzado. Mantiene el valor concesivo del participio con un pasado anterior al reconocimiento final.
- source_word: φαρμακείας
  english_pob_choice: sorceries
  chosen_spanish: hechicerías
  alternatives_spanish:
  - artes mágicas
  - magia
  - sortilegios
  lexicon: LSJ
  rationale: «Hechicerías» comunica prácticas ocultas o mágicas en un registro bíblico natural. Evita reducir el término a mero truco o adorno y preserva la carga polémica del contexto egipcio.
- source_word: ὀλέθρῳ
  english_pob_choice: destruction
  chosen_spanish: exterminio
  alternatives_spanish:
  - destrucción
  - ruina
  - muerte
  lexicon: LSJ
  rationale: Aquí el contexto inmediato son los primogénitos muertos; «exterminio» hace visible la catástrofe sin añadir un objeto ajeno al texto. Aun así, se mantiene como opción interpretativa y no como expansión doctrinal.
- source_word: πρωτοτόκων
  english_pob_choice: the firstborn
  chosen_spanish: los primogénitos
  alternatives_spanish:
  - los primeros nacidos
  - sus primogénitos
  - los primogénitos de ellos
  lexicon: BDAG
  rationale: «Los primogénitos» es natural y fiel al plural genérico del griego, que en contexto se refiere a los de Egipto. Conserva el sustantivo sin imponer un posesivo que el griego no expresa de forma explícita.
- source_word: ὡμολόγησαν
  english_pob_choice: acknowledged
  chosen_spanish: reconocieron
  alternatives_spanish:
  - confesaron
  - admitieron
  - declararon
  lexicon: BDAG
  rationale: «Reconocieron» refleja la admisión pública producida por los hechos y es más idiomática en español que «confesaron» en este contexto narrativo. Mantiene la idea de aceptación forzada por la evidencia.
- source_word: θεοῦ υἱὸν
  english_pob_choice: God's son
  chosen_spanish: hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  - hijo de Dios
  lexicon: BDAG
  rationale: El griego presenta una filiación corporativa, no un título individual mesiánico. «Hijo de Dios» conserva el lenguaje pactal aplicado al pueblo como conjunto, y el contexto español permite entenderlo de forma colectiva sin explicitarlo en el texto principal.
- source_word: λαὸν
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - el pueblo
  - este pueblo de Israel
  lexicon: BDAG
  rationale: «Este pueblo» hace explícito el referente de Israel con el demostrativo implícito en la escena, sin añadir material ajeno. Encaja con el contraste narrativo entre Egipto e Israel.
theological_decisions:
- issue: Sonship corporativa de Israel
  english_pob_reading: this people was God's son
  chosen_spanish_reading: este pueblo era hijo de Dios
  alternative_spanish_readings:
  - este pueblo era un hijo de Dios
  - este pueblo eran hijos de Dios
  rationale: 'Se conserva la singularidad corporativa del griego: un solo «pueblo» descrito como «hijo». La forma plural «hijos» suavizaría el motivo bíblico de filiación corporativa y perdería la tensión teológica presente en el texto.'
  doctrine_reference: Preservar el motivo bíblico de filiación corporativa; no resolver la tensión al pluralizar.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail al usar una concesiva pasada natural («aunque habían dejado de creer») y un verbo de reconocimiento en pasado («reconocieron»), en lugar de una formulación simultánea o presente. También conserva la lectura corporativa de «hijo de Dios» y evita convertirla en plural.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «hijo de Dios» para θεοῦ υἱὸν, de acuerdo con la terminología POB.
  - «Hechicerías» se emplea para φαρμακείας por su registro bíblico y su cercanía al campo semántico ocultista.
  - La puntuación refleja la relación causal/concesiva del griego con una estructura fluida en español.
  - No se añadió posesivo en «los primogénitos», respetando la economía del griego.
