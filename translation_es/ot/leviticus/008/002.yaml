  to: Toma a Aarón y a sus hijos con él[a], y las vestiduras, y el aceite de la unción, y el toro del sacrificio por el pecado[b], y los dos carneros, y la cesta de panes sin levadura.
  rationale: Se ajusta «novillo» a «toro» para una correspondencia sacrificial más estándar con פַּר, se afina la construcción de חַטָּאת como «sacrificio por el pecado» para mejor naturalidad y cercanía al expediente inglés, y se cambia «canasta» por «cesta» por mayor neutralidad panhispánica. Las notas se mantienen y se adaptan a los nuevos anclajes léxicos.
