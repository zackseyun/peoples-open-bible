translation:
  language: es
  text: Entonces sirve de leña para un hombre, y toma parte de ella y se calienta; además enciende un fuego y hornea pan. También hace un dios y se postra; hace de ello una imagen tallada y se inclina ante ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se inclina ante ellos'. El hebreo final usa una forma pronominal plural ('ante ellos/para ellos'), aunque el referente inmediato es una sola imagen; esto puede reflejar una referencia colectiva al material o una forma poética.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה / Then it becomes
  english_pob_choice: Then it becomes
  chosen_spanish: Entonces queda como
  alternatives_spanish:
  - Entonces se convierte en
  - Y llega a ser
  lexicon: HALOT
  rationale: La construcción hebrea introduce el resultado del uso de la madera. En español, 'queda como leña para' transmite de manera natural la función resultante sin perder la idea de transición lógica.
- source_word: לְאָדָם
  english_pob_choice: for a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para la humanidad
  lexicon: HALOT
  rationale: אָדָם es singular y genérico aquí. Se conserva el masculino representativo del hebreo, como hace la tradición POB en inglés, evitando pluralizar o despersonalizar el sujeto.
- source_word: לְבָעֵר
  english_pob_choice: fuel
  chosen_spanish: leña
  alternatives_spanish:
  - combustible
  - para quemar
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa finalidad: madera destinada a arder. En español, ''leña'' comunica de forma idiomática la materia usada para el fuego y mantiene la imagen concreta del pasaje.'
- source_word: מֵהֶם
  english_pob_choice: some of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de una parte de ellos
  - de algunos de ellos
  lexicon: HALOT
  rationale: El plural pronominal retoma los trozos de madera. 'De ellos' conserva el referente colectivo sin forzar una explicitación que el español puede dejar implícita.
- source_word: וַיָּחָם
  english_pob_choice: warms himself
  chosen_spanish: se calienta
  alternatives_spanish:
  - se entra en calor
  - se calienta a sí mismo
  lexicon: HALOT
  rationale: El verbo describe volverse/calorizarse. En español, la forma reflexiva 'se calienta' expresa con naturalidad el resultado práctico del acto de usar la madera.
- source_word: אַף יַשִּׂיק
  english_pob_choice: he also kindles a fire
  chosen_spanish: además enciende fuego
  alternatives_spanish:
  - también prende fuego
  - incluso enciende
  lexicon: HALOT
  rationale: אַף añade la idea de 'además/también'. El Hifil se entiende aquí como encender o prender. 'Enciende fuego' es idiomático y conserva el progreso de acciones del versículo.
- source_word: וְאָפָה לָחֶם
  english_pob_choice: and bakes bread
  chosen_spanish: y hornea pan
  alternatives_spanish:
  - y cuece pan
  - y hace pan
  lexicon: HALOT
  rationale: אָפָה es 'hornear/cocer al horno'. 'Hornea pan' mantiene la acción concreta del hebreo y su secuencia doméstica.
- source_word: אַף יִפְעַל אֵל
  english_pob_choice: He also makes a god
  chosen_spanish: También hace un dios
  alternatives_spanish:
  - También fabrica un dios
  - También hace un ídolo
  lexicon: HALOT
  rationale: 'Se conserva אֵל como ''dios'', no se sustituye por ''ídolo'', para preservar la ironía profética: del mismo material destinado al fuego sale algo tratado como divino.'
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: and bows down
  chosen_spanish: y se postra
  alternatives_spanish:
  - y se inclina
  - y adora
  lexicon: HALOT
  rationale: El verbo indica postración física. 'Se postra' conserva ese gesto corporal más directamente que 'adorar', que ya interpreta el acto.
- source_word: פֶסֶל
  english_pob_choice: a carved image
  chosen_spanish: una imagen tallada
  alternatives_spanish:
  - un ídolo tallado
  - una imagen esculpida
  lexicon: HALOT
  rationale: פֶסֶל remite a una imagen hecha por talla/esculpido. 'Imagen tallada' es claro y mantiene el componente artesanal mejor que el término más interpretativo 'ídolo'.
- source_word: וַיִּסְגָּד לָמוֹ
  english_pob_choice: and prostrates himself before it
  chosen_spanish: y se inclina ante él
  alternatives_spanish:
  - y se postra ante ello
  - y lo adora
  lexicon: HALOT
  rationale: סגד expresa reverencia/prostración. Aunque el hebreo tiene una forma pronominal plural, el contexto inmediato en español apunta a la imagen singular; por eso se traduce con el singular 'él', manteniendo la referencia del objeto sin introducir una ambigüedad innecesaria en la lectura pública.
theological_decisions:
- issue: 'Ironía profética: tratar un objeto fabricado como dios, pero describirlo también como imagen tallada'
  english_pob_reading: makes a god ... makes it a carved image
  chosen_spanish_reading: hace un dios ... lo hace una imagen tallada
  alternative_spanish_readings:
  - hace un ídolo ... lo hace un ídolo tallado
  - hace un dios ... lo convierte en un ídolo
  rationale: 'La distinción entre ''dios'' y ''imagen tallada'' preserva la ironía del hebreo: el artesano atribuye divinidad a algo que, en realidad, es un objeto fabricado. Traducir ambos miembros como ''ídolo'' aplanaría el contraste retórico.'
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms table for אֵל / פֶסֶל
- issue: Referencia pronominal final y posible tensión entre singular y plural
  english_pob_reading: and prostrates himself before it
  chosen_spanish_reading: y se inclina ante él
  alternative_spanish_readings:
  - y se inclina ante ellos
  - y se postra ante ello
  rationale: La revisión inglesa reciente optó por el singular para concordar con la imagen tallada. En español se sigue esa resolución, manteniendo la referencia singular y evitando cargar al lector con una literalidad plural que oscurecería la escena.
  doctrine_reference: Revision awareness note; Translation philosophy §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que corrigió el pronombre final de 'them' a 'it' para concordar con la imagen tallada singular. La redacción española sigue esa decisión y conserva la ironía del original entre la leña usada para el fuego y el objeto fabricado como dios.
  spanish_consistency_notes:
  - Se mantuvo 'dios' para אֵל y 'imagen tallada' para פֶסֶל, evitando 'ídolo' como sustituto automático.
  - '''Se postra'' y ''se inclina'' se usaron para distinguir postración física de la simple reverencia.'
  - La nota al pie ofrece la alternativa reflejando la tensión morfológica del hebreo final sin sobrecargar el texto principal.
