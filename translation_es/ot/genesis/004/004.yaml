translation:
  language: es
  text: Y Abel también trajo de los primogénitos de su rebaño[a] y de sus partes grasas. Y Yahvé miró a Abel y a su ofrenda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los primogénitos de su rebaño».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «de sus partes grasas»; esto probablemente se refiere a las porciones grasas más selectas de los animales ofrecidos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/הֶבֶל
  english_pob_choice: And Abel
  chosen_spanish: Y Abel
  alternatives_spanish:
  - Ahora Abel
  lexicon: HALOT
  rationale: La ו inicial funciona como conjunción narrativa normal. «Y Abel» conserva la secuencia hebrea sin cargarla con un matiz discursivo que el texto no exige.
- source_word: הֵבִיא
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - presentó
  lexicon: HALOT
  rationale: En un contexto de ofrenda, el verbo causa el sentido de llevar/ofrecer. «Trajo» es natural en español y mantiene la acción concreta del texto.
- source_word: גַם הוּא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - él también
  lexicon: HALOT
  rationale: La combinación enfatiza que Abel, igual que Caín, hizo una ofrenda. «También» reproduce ese énfasis de manera fluida en español.
- source_word: מִבְּכֹרוֹת צֹאנוֹ
  english_pob_choice: some of the firstborn of his flock
  chosen_spanish: de los primogénitos de su rebaño
  alternatives_spanish:
  - de entre los primogénitos de su rebaño
  - algunos de los primogénitos de su rebaño
  lexicon: HALOT
  rationale: El מן es partitivo, pero en español «de los primogénitos» comunica bien la procedencia sin forzar «algunos» ni restringir indebidamente el alcance. «Rebaño» es el equivalente natural de צֹאן en este contexto.
- source_word: וּמֵחֶלְבֵהֶן
  english_pob_choice: and of their fat portions
  chosen_spanish: y de sus partes grasas
  alternatives_spanish:
  - y de su grasa
  - y de sus mejores porciones grasosas
  lexicon: HALOT
  rationale: חֵלֶב puede referirse a grasa literal y, en contexto sacrificial, a las porciones grasas apartadas para la ofrenda. «Partes grasas» conserva esa tensión entre literalidad y función cultual sin resolverla en exceso.
- source_word: וַיִּשַׁע
  english_pob_choice: regarded
  chosen_spanish: miró
  alternatives_spanish:
  - miró con favor
  - prestó atención a
  lexicon: HALOT
  rationale: «Miró» mantiene la imagen básica de orientar la mirada hacia alguien. En español puede quedar algo general, pero evita imponer de entrada «aceptó» o «miró con favor», que ya resuelven el sentido interpretativo; el favor queda sugerido por el contexto y por la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, según la pauta del proyecto, en vez de sustituirlo por un título como «el Señor».
- source_word: אֶל הֶבֶל וְאֶל מִנְחָתוֹ
  english_pob_choice: Abel and his offering
  chosen_spanish: a Abel y a su ofrenda
  alternatives_spanish:
  - hacia Abel y hacia su ofrenda
  lexicon: HALOT
  rationale: La repetición de אֶל marca el objeto del mirar de Yahvé. En español, «a Abel y a su ofrenda» reproduce esa doble referencia de forma idiomática.
- source_word: מִנְחָתוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su tributo
  lexicon: HALOT
  rationale: מִנְחָה en este contexto es una ofrenda cultual. «Ofrenda» es la opción más fiel y clara en español.
theological_decisions:
- issue: Naturaleza de la respuesta divina en וַיִּשַׁע
  english_pob_reading: The verse states that Yahweh regarded Abel and his offering, implying acceptance without specifying the mechanism.
  chosen_spanish_reading: El versículo dice que Yahvé miró a Abel y a su ofrenda, sugiriendo aceptación sin precisar el modo.
  alternative_spanish_readings:
  - Yahvé aceptó a Abel y su ofrenda
  - Yahvé miró con favor a Abel y su ofrenda
  rationale: «Miró» preserva la ambigüedad lexical del hebreo וַיִּשַׁע y no cierra la interpretación con una formulación más explícita. La aceptación favorable queda insinuada por el contexto y por la nota, manteniendo la tensión teológica documentada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto base en inglés muestra una revisión estable (latest_revision_pass sin cambios, concordancia alta). La presente versión mantiene esa línea, pero ajusta el español para conservar el valor partitivo de מן, la ambigüedad cultual de חֵלֶב y la indeterminación de וַיִּשַׁע sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva «ofrenda» para מִנְחָה por su sentido cultual inmediato.
  - Se evita «aceptó» en el cuerpo principal para no cerrar una tensión lexical que el inglés POB dejó abierta con «regarded».
  - «Partes grasas» mantiene la nota cultual sin sustituir el detalle hebreo por una paráfrasis demasiado libre.
  - La puntuación reproduce dos cláusulas coordinadas separadas por punto, compatible con el ritmo narrativo breve del hebreo.
