review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura proverbial del hebreo: huir del terror, caer en el hoyo, salir del hoyo, ser atrapado en la trampa, y el cierre de juicio contra Moab con el nombre divino Yahvé. También preserva adecuadamente el femenino singular de «sobre ella» en aposición con Moab. Sin embargo, hay un desajuste importante en שנת פקדתם: el hebreo tiene sufijo plural «de ellos», no singular «de ella/su» en esa frase final.'
  spanish_quality_summary: 'El español es claro y legible. «El que huye», «caerá en el hoyo» y «declara Yahvé» suenan naturales. «Haré venir sobre ella» es comprensible, aunque algo calcado; no requiere cambio obligatorio. La principal reparación necesaria es concordar «su castigo» con el plural del hebreo y de la traducción inglesa auditada: «su castigo» en español puede ser ambiguo, pero aquí debe quedar explícito como plural colectivo.'
  glossary_alignment: 'Se respeta correctamente Yahvé para יְהוָה. «Terror» para פַּחַד y «hoyo» para פַּחַת son defendibles. «Red» para פָּח es posible, pero «trampa»/«lazo» sería más cercano a «snare»; no es un error suficientemente grave para exigirlo. La nota de פְּקֻדָּה debe ajustarse también al plural: «su castigo» → «su castigo/de ellos» o mejor «su castigo» reemplazado en texto por «su castigo» plural explícito en español.'
  issues:
  - severity: medium
    issue: Número incorrecto en «el año de su castigo»
    rationale: שנת פקדתם contiene sufijo plural de tercera persona masculina («de ellos»). El inglés auditado lo refleja con «their punishment». El español borrador usa singular posesivo ambiguo («su»), que puede leerse como Moab singular y no preserva con suficiente fidelidad el plural del hebreo.
  - severity: low
    issue: La nota textual de פְּקֻדָּה también usa posesivos singulares
    rationale: Las alternativas «el año de su visitación» y «de su recuento» repiten la misma pérdida del plural; conviene repararlas para mantener trazabilidad con el hebreo.
