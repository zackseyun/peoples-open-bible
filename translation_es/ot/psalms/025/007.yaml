review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: petición negativa de no recordar los pecados/transgresiones, petición positiva de recordar al salmista, y base en la bondad de Yahvé. Sin embargo, en כְּחַסְדְּךָ se aparta del sentido documentado por el POB al elegir «misericordia» en vez de una formulación que preserve mejor el valor de hesed como amor fiel/constante. Además, la nota [a] está mal anclada: el marcador se coloca sobre «pecados» pero la nota trata la conjunción antes de «mis rebeliones».'
  spanish_quality_summary: El español es claro, natural y digno. «No recuerdes… acuérdate de mí» funciona bien. «Ni mis rebeliones» es legible, aunque «transgresiones» se alinea mejor con la decisión POB y con el registro moral-jurídico del hebreo. La puntuación general es correcta. Conviene también ajustar la nota y su anclaje para evitar confusión.
  glossary_alignment: 'Cumple con «Yahvé» para יְהוָה. El principal desajuste terminológico es חסד: el proyecto y la auditoría inglesa favorecen «steadfast love», que en español aquí se preserva mejor como «amor fiel» o «amor constante/leal» que como «misericordia».'
  issues:
  - severity: medium
    issue: Traducción de כְּחַסְדְּךָ como «conforme a tu misericordia»
    rationale: Aunque «misericordia» es posible, la auditoría inglesa documenta explícitamente «steadfast love» por su fuerza pactal y leal. En español, «amor fiel» preserva mejor ese matiz teológico y léxico.
  - severity: medium
    issue: «Rebeliones» para וּפְשָׁעַי
    rationale: No es incorrecto, pero «transgresiones» corresponde más estrechamente al registro moral-legal escogido en el POB inglés y evita una posible lectura de actos de insurrección más concreta de lo que exige el contexto.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] comenta la conjunción que introduce «mis transgresiones/rebeliones», pero el marcador aparece en «pecados», lo que desubica la alternativa textual.
  revised_spanish_text: No recuerdes los pecados de mi juventud ni[a] mis transgresiones; conforme a tu amor fiel[b], acuérdate de mí, por causa de tu bondad, Yahvé.
  revised_footnotes:
