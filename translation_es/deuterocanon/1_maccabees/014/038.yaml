  rationale: Se reemplaza 'confirmó' por 'nombró' para reflejar de manera más natural la acción de poner a alguien en un cargo, en línea con la revisión inglesa final. Se sustituye 'según estas cosas' por 'conforme a esto' para representar idiomáticamente κατὰ ταῦτα en español claro y digno.
