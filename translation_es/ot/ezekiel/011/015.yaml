translation:
  language: es
  text: '«Hijo de hombre[a], tus hermanos, tus hermanos, los hombres de tu redención, y toda la casa de Israel, toda ella: estos son aquellos a quienes los habitantes de Jerusalén les dijeron: “Aléjense de Yahvé; esta tierra nos ha sido dada como posesión[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hombres de tu parentesco», «tus compañeros de exilio» o «los hombres de tu derecho de redención». La frase hebrea es difícil y usa la raíz relacionada con redención y el pariente-redentor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como herencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene la fórmula profética fija de Ezequiel y preserva el valor idiomático. «Hijo de hombre» comunica mejor la forma establecida que una paráfrasis como «ser humano» o «mortal».
- source_word: אַחֶיךָ אַחֶיךָ
  english_pob_choice: your brothers, your brothers
  chosen_spanish: tus hermanos, tus hermanos
  alternatives_spanish:
  - tus hermanos y tus parientes
  - tus hermanos—tus hermanos
  lexicon: HALOT
  rationale: La repetición está en el hebreo y se conserva en español para no suavizar el énfasis. La duplicación funciona como intensificación antes de la aclaración siguiente.
- source_word: אַנְשֵׁי גְאֻלָּתֶךָ
  english_pob_choice: the men of your redemption
  chosen_spanish: los hombres de tu redención
  alternatives_spanish:
  - los hombres de tu parentesco redentor
  - tus compañeros de exilio
  - los hombres de tu linaje
  lexicon: HALOT
  rationale: «Redención» conserva visible la raíz גאל y la relación con rescate/reden­tor familiar. «Hombres de tu redención» suena algo duro, pero evita borrar la tensión léxica del hebreo con una interpretación más lisa.
- source_word: וְכָל בֵּית יִשְׂרָאֵל כֻּלֹּה
  english_pob_choice: and all the house of Israel, all of it
  chosen_spanish: y toda la casa de Israel, toda ella
  alternatives_spanish:
  - y toda la casa de Israel, toda ella misma
  - y toda la casa de Israel, en su totalidad
  lexicon: HALOT
  rationale: «Casa de Israel» conserva la expresión colectiva pactal; «toda ella» refleja el singular colectivo de כֻּלֹּה sin convertirlo en plural interpretativo.
- source_word: אֲשֶׁר
  english_pob_choice: these are the ones to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  - de quienes
  lexicon: HALOT
  rationale: El antecedente y el dativo implícito quedan claros en español con «a quienes», sin añadir una expansión innecesaria en la línea principal.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: Es la manera más natural y exacta de reproducir el participio en español, manteniendo el contraste entre Jerusalén y el exilio.
- source_word: רַחֲקוּ מֵעַל יְהוָה
  english_pob_choice: Go far away from Yahweh
  chosen_spanish: Aparteos de Yahvé
  alternatives_spanish:
  - Aléjense de Yahvé
  - Manténganse lejos de Yahvé
  lexicon: HALOT
  rationale: La forma verbal funciona como mandato/taunt en discurso directo. «Aparteos» preserva el tono imperativo y la distancia marcada por מֵעַל sin volverlo meramente descriptivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el nombre divino. «Yahvé» mantiene la referencia transparente al Tetragrámaton sin disfrazarlo por una convención de sustitución.
- source_word: לָנוּ הִיא נִתְּנָה הָאָרֶץ
  english_pob_choice: this land has been given to us
  chosen_spanish: esta tierra nos ha sido dada
  alternatives_spanish:
  - la tierra nos ha sido dada
  - esta tierra se nos ha dado
  lexicon: HALOT
  rationale: La pasiva conserva el sentido del Niphal hebreo y sugiere la apropiación arrogante de la cita. «Esta tierra» da claridad referencial en español.
- source_word: לְמוֹרָשָׁה
  english_pob_choice: as a possession
  chosen_spanish: en posesión
  alternatives_spanish:
  - como herencia
  - como posesión
  lexicon: HALOT
  rationale: «En posesión» reproduce de forma sobria el reclamo de propiedad. «Herencia» es posible, pero aquí podría inclinar demasiado el matiz hacia la herencia familiar en lugar de la ocupación reclamada.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto y se evita la sustitución por un título. Esto sigue la línea doctrinal del proyecto y hace auditable la decisión a partir del hebreo directo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: אַנְשֵׁי גְאֻלָּתֶךָ
  english_pob_reading: the men of your redemption
  chosen_spanish_reading: los hombres de tu redención
  alternative_spanish_readings:
  - tus compañeros de exilio
  - los hombres de tu parentesco
  rationale: La expresión es difícil y puede apuntar al campo semántico de redención/parentesco. Se prefiere mantener visible esa tensión léxica en vez de resolverla por completo con una equivalencia interpretativa más suave.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: La versión española sigue la última revisión del texto fuente-analizado sin cambios necesarios reportados en el pase más reciente; se ha mantenido la redundancia de «tus hermanos» y la ambigüedad léxica de גְאֻלָּה para no borrar tensiones documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición hebrea de «tus hermanos» en lugar de armonizarla.
  - «Casa de Israel» se traduce como colectividad singular («toda ella») para reflejar el hebreo.
  - La cita directa conserva el tono de reprensión/taunt con «Aparteos».
  - «En posesión» se deja como alternativa a «como herencia» en nota para no cerrar el sentido de לְמוֹרָשָׁה.
