translation:
  language: es
  text: Y el rey dijo a Ester también en el segundo día, en el banquete de vino[a], «¿Cuál es tu petición, reina Ester? Te será concedida. ¿Y cuál es tu solicitud? Hasta la mitad del reino[b], se hará».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en el banquete de vino».
    reason: lexical_alternative
  - marker: b
    text: La expresión «hasta la mitad del reino» es una oferta real convencional que expresa un favor extraordinario, no necesariamente una propuesta literal de dividir el reino.
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - además
  lexicon: HALOT
  rationale: גַּם marca continuación de la escena del día anterior; «también» conserva esa continuidad sin añadir énfasis extraño en español.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: el segundo día
  alternatives_spanish:
  - al segundo día
  - en el segundo día
  lexicon: HALOT
  rationale: La expresión temporal se rinde de forma natural en español con «el segundo día», manteniendo la referencia cronológica directa.
- source_word: בְּמִשְׁתֵּה הַיַּיִן
  english_pob_choice: at the banquet of wine
  chosen_spanish: en el banquete de vino
  alternatives_spanish:
  - en el festín de vino
  - durante el banquete de vino
  lexicon: HALOT
  rationale: «Banquete de vino» conserva la construcción del hebreo y el contexto cortesano. Usé «en» para reflejar el valor locativo de בְּ sin volver la frase pesada.
- source_word: מַה שְּׁאֵלָתֵךְ
  english_pob_choice: What is your petition
  chosen_spanish: ¿Cuál es tu petición?
  alternatives_spanish:
  - ¿Qué es lo que pides?
  - ¿Cuál es tu súplica?
  lexicon: HALOT
  rationale: «Petición» preserva el matiz formal y cortesano de שְׁאֵלָה en este contexto real.
- source_word: וְתִנָּתֵן לָךְ
  english_pob_choice: It shall be granted to you
  chosen_spanish: Te será concedida
  alternatives_spanish:
  - Te será dada
  - Se te otorgará
  lexicon: HALOT
  rationale: En un contexto de favor real, «concedida» comunica mejor que un literal «dada» la fuerza performativa del verbo.
- source_word: בַּקָּשָׁתֵךְ
  english_pob_choice: your request
  chosen_spanish: tu solicitud
  alternatives_spanish:
  - tu petición
  - tu ruego
  lexicon: HALOT
  rationale: Variar a «solicitud» refleja la alternancia hebrea con שְׁאֵלָה sin forzar una diferencia doctrinal; mantiene el paralelismo natural en español.
- source_word: עַד חֲצִי הַמַּלְכ֖וּת
  english_pob_choice: Even to half the kingdom
  chosen_spanish: Hasta la mitad del reino
  alternatives_spanish:
  - Incluso hasta la mitad del reino
  - Hasta media mitad del reino
  lexicon: HALOT
  rationale: Se conserva la fórmula hiperbólica del ofrecimiento real sin añadir «mi», que el hebreo no expresa explícitamente. El español «hasta la mitad del reino» permite dejar esa tensión retórica abierta.
- source_word: וְתֵעָשׂ
  english_pob_choice: it shall be done
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecho
  - se llevará a cabo
  lexicon: HALOT
  rationale: La pasiva impersonal española reproduce bien la fuerza resultativa/jussiva del hebreo en un registro solemne.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: reina Ester
  alternatives_spanish:
  - Ester la reina
  - la reina Ester
  lexicon: HALOT
  rationale: «Reina Ester» es la colocación más natural y respetuosa en español, conservando el título honorífico.
theological_decisions:
- issue: Ofrecimiento real hiperbólico de «hasta la mitad del reino»
  english_pob_reading: The expression 'up to half the kingdom' is a conventional royal offer expressing extraordinary favor, not necessarily a literal proposal to divide the realm.
  chosen_spanish_reading: La fórmula «hasta la mitad del reino» se entiende como ofrecimiento real convencional de favor extraordinario, no como división literal del reino.
  alternative_spanish_readings:
  - hasta media mitad del reino, literalmente
  - hasta la mitad de mi reino
  rationale: El hebreo usa una expresión cortesana convencional. Mantenerla sin explicitar posesión evita sobreinterpretar el texto, pero la nota aclara su carácter hiperbolico y ceremonial.
  doctrine_reference: Retórica real del Antiguo Oriente; cf. uso convencional de fórmulas de favor cortesano en narrativa bíblica.
translation_notes:
  revision_awareness: 'Ajusté la redacción para que cada nota tenga anclaje explícito en el texto: [a] marca la alternativa lexical de la preposición/locución del sintagma del banquete, y [b] marca la observación cultural sobre la fórmula real hiperbólica. También mantuve la ausencia de «mi» para respetar el hebreo, aunque el POB inglés lo explicite en nota.'
  spanish_consistency_notes:
  - Usé «Ester» sin artículo cuando va con el título «reina», para conservar naturalidad y dignidad en español.
  - Mantuve el paralelismo «petición / solicitud» para reflejar la variación hebrea entre שְׁאֵלָה y בַּקָּשָׁה sin forzar distinción excesiva.
  - Elegí «se hará» y «te será concedida» para conservar el tono formal y performativo del hebreo.
  - Evité traducir «el reino» como «mi reino», porque el hebreo no lo dice explícitamente; la tensión se preserva y se explica en la nota cultural.
