translation:
  language: es
  text: Que los pueblos te alaben[a], oh Dios[b]; que todos los pueblos te alaben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los pueblos te alabarán, oh Dios; todos los pueblos te alabarán».'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo también puede significar «dar gracias a»; aquí «alaben» se elige porque en este estribillo poético expresa mejor el sentido de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּךָ
  english_pob_choice: let ... praise you
  chosen_spanish: que ... te alaben
  alternatives_spanish:
  - que ... te den gracias
  - que ... te confiesen
  - alabarán
  lexicon: HALOT
  rationale: El verbo hebreo en esta doxología expresa alabanza agradecida dirigida a Dios. En español, «alaben» conserva el sentido cultual y poético mejor que una traducción más literal como «den gracias», que suena menos unificada con el paralelismo del verso. El subjuntivo exhortativo reproduce bien el valor volitivo del hebreo.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: «Pueblos» preserva el plural colectivo del hebreo y el alcance universal del salmo. «Naciones» sería posible, pero desplaza el matiz hacia unidades políticas modernas y suaviza la imagen étnico-cultural del texto poético.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Dios
  lexicon: HALOT
  rationale: Aquí el hebreo funciona como vocativo directo. En español, «oh Dios» hace explícito ese valor y mantiene el tono orante y poético.
- source_word: כֻּלָּם
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos
  - todos ellos
  - todos los pueblos
  lexicon: HALOT
  rationale: «Todos» comunica la totalidad sin recargar el verso. En la segunda línea retoma y intensifica el primer hemistiquio, por lo que el español puede mantener brevedad y paralelismo.
theological_decisions:
- issue: 'Valor verbal: petición/exhortación versus predicción'
  english_pob_reading: 'Render as a prayer/wish: ''Let the peoples praise you'''
  chosen_spanish_reading: «Que los pueblos te alaben» como ruego/exhortación poética
  alternative_spanish_readings:
  - «Los pueblos te alabarán»
  - «Que los pueblos te den gracias»
  rationale: El hebreo permite una lectura volitiva en el marco del salmo. En español, el subjuntivo exhortativo conserva mejor la función de súplica y deseo comunitario que una simple futura afirmación. No se traduce como una predicción desnuda para no perder la tonalidad de oración.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia del auditoría inglesa; no se requieren revisiones respecto del paquete fuente. Se mantuvo el valor volitivo del verbo hebreo y el plural universal de עַמִּים.
  spanish_consistency_notes:
  - Se usó «pueblos» de manera consistente para עַמִּים, evitando «naciones» salvo nota alternativa.
  - Se mantuvo «Dios» en vocativo con «oh» para reflejar el адресamiento directo del hebreo.
  - El subjuntivo exhortativo («que ... alaben») conserva el tono de oración y evita convertir el verso en mera profecía declarativa.
