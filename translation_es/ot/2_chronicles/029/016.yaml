translation:
  language: es
  text: Entonces los sacerdotes entraron en la parte interior de la casa de Yahvé para limpiarla, y sacaron al atrio de la casa de Yahvé toda la impureza que hallaron en el templo de Yahvé[a]. Y los levitas la recibieron para llevarla al valle del Cedrón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘santuario de Yahvé’ para ‘templo de Yahvé’ (hebreo הֵיכָל).
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente también se ha vertido ‘torrente Cedrón’ o ‘arroyo Cedrón’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנִימָה
  english_pob_choice: into the inner part
  chosen_spanish: en la parte interior
  alternatives_spanish:
  - en el interior
  - adentro
  lexicon: HALOT
  rationale: El adverbio marca movimiento hacia el interior. ‘En la parte interior’ conserva la orientación espacial y suena natural en español sin inventar un recinto técnico no nombrado en el hebreo.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘casa de YHWH’. Se conserva ‘casa de Yahvé’ para reflejar el nombre divino y la fórmula del original, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el Señor
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio ‘Yahvé’, conforme al criterio del proyecto, manteniendo la referencia directa al nombre del pacto.
- source_word: לְטַהֵר
  english_pob_choice: to cleanse it
  chosen_spanish: para limpiarla
  alternatives_spanish:
  - para purificarla
  - para hacerla limpia
  lexicon: HALOT
  rationale: En contexto cultual, טהר expresa limpieza ritual. ‘Limpiarla’ es claro y fiel en español; ‘purificarla’ también sería posible, pero puede sonar más abstracto aquí.
- source_word: הַטֻּמְאָה
  english_pob_choice: the uncleanness
  chosen_spanish: toda la impureza
  alternatives_spanish:
  - toda la inmundicia
  - toda la contaminación ritual
  lexicon: HALOT
  rationale: ‘Impureza’ comunica el sentido cultual de טומאה con dignidad y precisión. Se evita ‘inmundicia’ por sonar demasiado fuerte o moralizante en español contemporáneo.
- source_word: בְּהֵיכַל יְהוָה
  english_pob_choice: in the temple of Yahweh
  chosen_spanish: en el templo de Yahvé
  alternatives_spanish:
  - en el santuario de Yahvé
  - en el palacio de Yahvé
  lexicon: HALOT
  rationale: Aquí הֵיכָל designa el edificio/santuario del templo. ‘Templo’ es la equivalencia más clara en español, y evita sobrecargar el término con matices arquitectónicos no explicitados.
- source_word: לַחֲצַר
  english_pob_choice: to the court
  chosen_spanish: a la corte
  alternatives_spanish:
  - al atrio
  - al patio
  lexicon: HALOT
  rationale: En lenguaje bíblico español, ‘corte’ refleja el espacio del templo con concisión. ‘Atrio’ también sería posible, pero puede sonar más litúrgico o menos directo en este contexto.
- source_word: וַיְקַבְּלוּ
  english_pob_choice: received it
  chosen_spanish: la recibieron
  alternatives_spanish:
  - la tomaron
  - la aceptaron
  lexicon: HALOT
  rationale: El verbo expresa que los levitas toman a su cargo lo que los sacerdotes sacaron. ‘La recibieron’ preserva la idea de transferencia/encargo entre grupos sacerdotal y levítico.
- source_word: לְהוֹצִיא
  english_pob_choice: to carry it out
  chosen_spanish: para llevarla
  alternatives_spanish:
  - para sacarla
  - para transportarla
  lexicon: HALOT
  rationale: El infinitivo indica continuar la remoción física de lo impuro. ‘Llevarla’ es natural en español y suficiente en combinación con el contexto inmediato de salida del recinto.
- source_word: נַחַל קִדְרוֹן
  english_pob_choice: the Kidron Valley
  chosen_spanish: el valle del Cedrón
  alternatives_spanish:
  - el torrente Cedrón
  - el arroyo Cedrón
  lexicon: HALOT
  rationale: Para este topónimo, ‘valle del Cedrón’ es la forma más inteligible y estable en español bíblico. Se conserva el referente geográfico sin forzar ‘arroyo’ o ‘torrente’ donde el uso español común favorece ‘valle’.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa el nombre propio del pacto. Se mantiene su transliteración en español para no ocultarlo tras un título y para ser coherentes con el criterio POB auditado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje ritual de טהר / טומאה
  english_pob_reading: cleanse / uncleanness
  chosen_spanish_reading: limpiarla / impureza
  alternative_spanish_readings:
  - purificarla / inmundicia
  - sanearla / contaminación ritual
  rationale: En el contexto de purificación del templo, el español debe reflejar la limpieza ritual sin moralizar el término. ‘Impureza’ conserva mejor el registro cultual que un equivalente más coloquial.
  doctrine_reference: Uso cultual del vocabulario de pureza en el AT
- issue: Traslado del material impuro por levitas
  english_pob_reading: received it to carry it out
  chosen_spanish_reading: la recibieron para llevarla
  alternative_spanish_readings:
  - la recibieron para sacarla
  - la recibieron para trasladarla
  rationale: 'El hebreo describe una cadena de responsabilidades: los sacerdotes sacan y los levitas reciben para continuar la retirada. ‘La recibieron’ conserva esa distribución de funciones sin añadir detalle innecesario.'
  doctrine_reference: Organización sacerdotal/levítica en Crónicas
translation_notes:
  revision_awareness: El draft inglés más reciente simplificó el final a ‘carry it out to the Kidron Valley.’ La versión española refleja ese mismo flujo de salida sin añadir ‘fuera’ redundante; también mantiene la diferencia entre ‘casa de Yahvé’ y ‘templo de Yahvé’ para conservar la variación lexical del hebreo entre בֵית y הֵיכָל.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה, según el estándar del proyecto.
  - Se mantiene ‘casa de Yahvé’ para בֵית יְהוָה y ‘templo de Yahvé’ para הֵיכָל, preservando la distinción del hebreo.
  - ‘Impureza’ traduce טֻמְאָה con registro cultual; no se suaviza a un término moral genérico.
  - ‘Valle del Cedrón’ sigue el uso bíblico español más claro para נַחַל קִדְרוֹן.
