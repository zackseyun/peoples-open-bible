    reason: lexical_alternative
  revision_rationale: Se reemplaza 'para Yahvé / para él' por 'en favor de Yahvé / en favor de él' porque expresa de manera más natural y precisa en español el valor contextual de hablar en defensa de Dios, que es justamente la lectura preferida por la evidencia contextual y el audit trail. Se conserva una nota breve con la alternativa 'a Yahvé / a él' para reflejar la ambigüedad de la preposición hebrea. También se armoniza la terminología de la nota con 'Yahvé'.
