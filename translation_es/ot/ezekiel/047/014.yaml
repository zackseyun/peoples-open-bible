review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro auditado en puntos clave: herencia de la tierra, distribución individual/equitativa, conservación del modismo de juramento «levantar la mano», y el giro idiomático de que la tierra «cae» como herencia. Sin embargo, la colocación de las notas no coincide con los anclajes semánticos del texto: la nota sobre «levanté mi mano» está marcada en «heredarán», y la nota sobre la igualdad distributiva está marcada en «cada uno» pero debería anclarse a toda la frase distributiva. También conviene ajustar «respecto de la cual» a «acerca de la cual» o «con respecto a la cual» para una lectura más natural en español digno.'
  spanish_quality_summary: 'El español es generalmente claro y eclesialmente legible. «Ustedes la heredarán» es natural en español latinoamericano. «Cada uno como su hermano» es aceptable, aunque algo rígido; funciona si se conserva la nota alternativa. «Les caerá en heredad» suena bíblico y entendible, aunque algo tradicional; es compatible con el proyecto porque preserva el modismo hebreo. La principal reparación necesaria es técnica y de legibilidad: reubicar la nota [a] al modismo de juramento y suavizar «respecto de la cual» a una formulación más natural.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. «Heredarán», «padres», «tierra», y «heredad»/«herencia» están dentro del rango permitido. La conservación de la imagen idiomática del juramento coincide con la decisión teológica documentada.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «heredarán» pero explica «levanté mi mano».
    rationale: Las notas deben aparecer exactamente en la palabra o frase relevante. Tal como está, el lector asociará erróneamente la explicación del modismo de juramento con «heredarán».
  - severity: medium
    issue: La relación entre notas y marcadores no sigue bien el audit trail inglés.
    rationale: En el original auditado, una nota explica el juramento, otra la distribución equitativa, y otra el modismo «caer»/asignarse. En español conviene mantener esa lógica con anclajes claros y ordenados.
  - severity: low
    issue: «Respecto de la cual» es algo tieso en español bíblico moderno.
    rationale: No es incorrecto, pero «acerca de la cual» o «con respecto a la cual» fluye mejor y preserva el valor formal del inglés revisado «concerning which».
  revised_spanish_text: Ustedes la heredarán, cada uno como su hermano[b], acerca de la cual levanté mi mano[a] para dársela a sus padres; y esta tierra les caerá en heredad[c].
  revised_footnotes:
