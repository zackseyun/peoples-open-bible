  text: υἱοὶ Ζαβουλών¹³, *προσέχετε ῥήμασιν¹⁴ *τοῦ πατρὸς ὑμῶν¹⁵. 3. Ἐγὼ¹⁶ Ζαβουλὼν δόσις ἀγαθὴ¹⁷ γέγονα¹⁸ τοῖς γονεῦσί μου· ἐν γὰρ τῷ τεχθῆναι¹⁹ με, ηὐξήνθη²⁰ ὁ πατήρ μου²¹ σφόδρα καὶ τὰ πρόβατα²² καὶ τὰ βουκόλια, ὅτε²³ *ἐν ταῖς ποικίλαις ῥάβδοις²⁴ εἶχον²⁵ τὸν κλῆρον. 4. Οὐκ ἔγνων ⌜δὲ²⁶⌝ ὅτι ἥμαρτον ἐν ταῖς ἡμέραις μου ⌜παρεκτὸς ἐννοίας⌝. 5. Οὐ²⁷ μνήσκομαι²⁸ ὅτι παρανομίαν ἐποίησα, πλὴν τὴν ἄγνοιαν ἣν ἐποίησα²⁹ ἐπὶ τοῦ³⁰ Ἰωσήφ, ὅτι ἐβεβαίωσα³¹ τοῖς ἀδελφοῖς μου³² *μὴ εἰπεῖν³³ *τῷ πατρί μου³⁴ τὸ γενόμενον. 6. Ἀλλ'³⁵ ἔκλαιον³⁶ Γἐν κρυφῇ˥³⁷ *ἡμέρας πολλὰς³⁸ *διὰ τὸν Ἰωσήφ³⁹. *ἐφοβούμην γὰρ⁴⁰ *τοὺς ἀδελφούς μου, Γὅτι⁴¹ συνέθεντο πάντες⁴² *ὅστις ἐξείπῃ⁴³ τὸ μυστήριον ἀναιρεθῆναι⁴⁴ αὐτόν⁴⁵˥. 7. *Πλὴν ὅτε⁴⁶ ἐβούλοντο ἀνελεῖν αὐτόν⁴⁷, *ἐγὼ μετὰ δακρύων προσεκάλουν αὐτοὺς⁴⁸ μὴ ποιῆσαι τὴν ἁμαρτίαν⁴⁹ ταύτην. II. Ἦλθον¹ γὰρ ὁ² Συμεὼν Γκαὶ ὁ Δὰν˥ καὶ ὁ² Γὰδ ἐπὶ τὸν Ἰωσὴφ τοῦ ἀνελεῖν αὐτόν, καὶ ἔλεγεν αὐτοῖς μετὰ δακρύων. 2. Ἐλεήσατέ με ἀδελφοί μου⁷. οἰκτειρήσατε⁸ σπλάγχνα⁹ Ἰακὼβ τοῦ πατρὸς ἡμῶν¹⁰. Μὴ¹¹ ἐπαγάγετε¹² τὰς χεῖρας ὑμῶν Γτοῦ˥¹³ ἐκχέαι αἷμα ἀθῷον, ὅτι οὐχ ἥμαρτον¹⁴ καὶ πεσὼν εἰς ὑμᾶς. 3. Εἰ δὲ καὶ¹⁵ ἥμαρτον, ἐν παιδείᾳ παιδεύσατέ με, Γἀδελφοί μου˥¹⁶, *τὴν δὲ χεῖρα ὑμῶν μὴ¹⁷ *ἐνέγκατε ἐν φόνῳ ἀδελφοῦ ὑμῶν¹⁸ διὰ Ἰακὼβ τὸν πατέρα ὑμῶν¹⁹. 4. Ὡς δὲ ἔλεγεν Γὀδυρόμενος˥²⁰ τὰ *ῥήματα ταῦτα²¹, *μὴ φέρων ἐγὼ τῶν οἰμωγῶν²² Γἠρξάμην κλαίειν˥, καὶ τὰ ἤπατά μου ἐξεχύθησαν²³, καὶ πᾶσα²⁴ ἡ ὑπόστασις²⁵ τῶν σπλάγχνων μου ἐχαυνοῦτο²⁶. 5. *Ἔκλαιον δὲ σὺν τῷ Ἰωσὴφ²⁷ καὶ ἐβόμβει²⁸ ἡ καρδία μου, Γκαὶ οἱ ἁρμοὶ τοῦ σώματός μου ἔτρεμον²⁹˥, καὶ οὐκ ἠδυνάμην στῆναι.
