review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la personificación maternal, el sentido futuro de los perfectos proféticos y la alternativa léxica para אַחֲרִית גּוֹיִם. Sin embargo, no preserva adecuadamente la distinción del hebreo en la tríada final: מִדְבָּר / צִיָּה / עֲרָבָה. Al traducir tanto מִדְבָּר como עֲרָבָה como «desierto», colapsa dos términos que el texto fuente y el POB inglés distinguen deliberadamente.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos problemas de calidad: 1) la repetición «un desierto ... y un desierto» suena torpe y evitable; 2) hay inconsistencia de tratamiento pronominal, pues el hebreo tiene sufijo plural («vuestra madre / la que os dio a luz»), mientras el borrador usa singular («tu madre ... te dio a luz»). En español bíblico neutral y legible conviene mantener plural coherente: «su madre ... la que los dio a luz» o «vuestra madre ... la que os dio a luz».'
  glossary_alignment: 'No hay conflicto con términos teológicos mayores del glosario. La decisión sobre הִנֵּה como «Miren»/«He aquí» es estilística y aceptable. La corrección principal es léxica: diferenciar «desierto», «tierra seca» y «estepa/llanura árida» para reflejar el audit trail del POB.'
  issues:
  - severity: high
    issue: Se repite «desierto» para מִדְבָּר y וַעֲרָבָה
    rationale: El POB inglés distinguió intencionalmente «wilderness ... dry land ... desert». El hebreo acumula tres términos de desolación con matices distintos; repetir «desierto» dos veces borra esa gradación y debilita la fidelidad léxica.
  - severity: medium
    issue: Inconsistencia y posible pérdida del plural de segunda persona
    rationale: אִמְּכֶם y יֹלַדְתְּכֶם llevan sufijo 2mp. El borrador pasa a singular («tu ... te»), lo que no refleja la referencia colectiva a los habitantes de Babilonia. Una forma plural natural en español mejora la alineación con la fuente.
  - severity: low
    issue: «Mira» con sujeto femenino singular («ella») tras formas de plural implícito puede sonar menos natural
    rationale: Si se corrige el tratamiento al plural, «Miren» armoniza mejor con la apelación al auditorio colectivo sin afectar el sentido.
  revised_spanish_text: Su madre quedará totalmente avergonzada; la que los dio a luz será deshonrada. Miren[a], ella será la última de las naciones, un desierto, una tierra seca y una estepa.
  revised_footnotes:
  - marker: a
    text: O «la menor de las naciones». La expresión hebrea puede señalar el estatus final y rebajado de Babilonia entre las naciones.
    reason: lexical_alternative
  revision_rationale: Se ajusta el tratamiento pronominal al plural del hebreo con un español natural («su madre ... los dio a luz»), se conserva la metáfora maternal y el futuro profético, y se repara la tríada final diferenciando los tres términos de desolación. «Estepa» para עֲרָבָה evita la repetición de «desierto» y preserva mejor la gradación semántica documentada en el audit trail inglés.
