translation:
  language: es
  text: He oído el oprobio[a] de Moab y las afrentas de los hijos de Amón[b], con las que insultaron a mi pueblo y se engrandecieron contra su frontera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reproche' o 'afrenta'.
    reason: lexical_alternative
  - marker: b
    text: O 'los amonitas' para 'los hijos de Amón'.
    reason: lexical_alternative
  - marker: c
    text: O 'se jactaron contra su frontera' o 'se engrandecieron contra su territorio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera natural en español con perfecto compuesto para expresar una acción ya ocurrida con relevancia presente en la voz profética.
- source_word: חֶרְפַּת
  english_pob_choice: the reproach
  chosen_spanish: el oprobio
  alternatives_spanish:
  - el reproche
  - la afrenta
  lexicon: HALOT
  rationale: El sustantivo expresa deshonra y vergüenza pública; 'oprobio' conserva mejor el peso formal y moral del término en español bíblico sin sonar arcaico.
- source_word: גִדּוּפֵי
  english_pob_choice: the insults
  chosen_spanish: las afrentas
  alternatives_spanish:
  - los insultos
  - las injurias
  lexicon: HALOT
  rationale: El término apunta a lenguaje abusivo y ofensivo. 'Afrentas' mantiene el paralelismo con 'oprobio' y conserva el carácter insultante sin reducirlo a un registro demasiado coloquial.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal, como en el inglés POB, para mantener la forma de parentesco étnico del texto fuente y su paralelismo poético.
- source_word: חֵרְפוּ אֶת עַמִּי
  english_pob_choice: they reproached my people
  chosen_spanish: insultaron a mi pueblo
  alternatives_spanish:
  - afrentaron a mi pueblo
  - reprocharon a mi pueblo
  lexicon: HALOT
  rationale: El verbo חוזר al campo semántico de injuriar/afrentar. 'Insultaron' es claro y natural en español; 'reprocharon' sería posible, pero puede sonar menos fuerte que el hebreo en este contexto.
- source_word: וַיַּגְדִּילוּ
  english_pob_choice: magnified themselves
  chosen_spanish: se engrandecieron
  alternatives_spanish:
  - se jactaron
  - se exaltaron
  - se hicieron grandes
  lexicon: HALOT
  rationale: La forma causativa transmite autoexaltación. 'Se engrandecieron' conserva la imagen verbal y refleja de cerca la opción inglesa revisada 'magnified themselves' sin interpretarla demasiado.
- source_word: עַל גְּבוּלָם
  english_pob_choice: against their border
  chosen_spanish: contra su frontera
  alternatives_spanish:
  - contra su territorio
  - sobre su frontera
  - contra el territorio de ellos
  lexicon: HALOT
  rationale: Se mantiene el sufijo plural 'su' conforme al hebreo y el valor hostil de עַל con 'contra'. 'Frontera' es más literal que 'territorio' y preserva la tensión del referente sin resolverlo en el texto principal.
theological_decisions:
- issue: Referente de גְּבוּלָם ('su frontera')
  english_pob_reading: their border refers to the border/territory of 'my people' just mentioned
  chosen_spanish_reading: '''su frontera'' conserva el referente probable a la frontera del pueblo mencionado, sin explicitarlo en el cuerpo del versículo'
  alternative_spanish_readings:
  - su propia frontera
  - la frontera de mi pueblo
  rationale: El hebreo deja un sufijo de tercera persona plural cuyo antecedente inmediato es ambiguo en la forma pero claro por el contexto. Se preserva esa tensión en español, evitando resolverla de manera excesiva en la traducción principal.
  doctrine_reference: Preservar la tensión textual y el referente probable sin sobreexplicar; optimal equivalence
- issue: Valor de חֶרְפַּת y גִדּוּפֵי como ofensa dirigida al pueblo de Yahvé
  english_pob_reading: reproach/insults directed at my people
  chosen_spanish_reading: oprobio y afrentas contra mi pueblo
  alternative_spanish_readings:
  - reproche e insultos contra mi pueblo
  - afrentas y blasfemias contra mi pueblo
  rationale: El texto presenta ofensa verbal y deshonra social contra el pueblo de Yahvé. 'Oprobio' y 'afrentas' mantienen ambos aspectos sin introducir la idea de blasfemia, que sería más específica de un ataque directamente contra Dios.
  doctrine_reference: Lenguaje de injuria contra el pueblo del pacto; no ampliar indebidamente el alcance semántico
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó 'made themselves great' por 'magnified themselves' para reflejar con mayor cercanía el idiomismo hebreo. Por eso el español adopta 'se engrandecieron', que conserva la imagen de autoexaltación sin perder naturalidad ni necesidad de una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino explícito; este versículo no lo contiene, por lo que no se introduce.
  - Se conservó la estructura paralela de dos sustantivos de ofensa y una cláusula relativa, acorde con el hebreo.
  - '''Frontera'' se usó para גְּבוּלָם siguiendo la literalidad del texto fuente y la nota del inglés POB; no se resolvió el referente en el cuerpo principal.'
