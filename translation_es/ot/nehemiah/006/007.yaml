revisions:
- from: 'Y aun has puesto profetas para proclamar acerca de ti en Jerusalén, diciendo: «¡Hay un rey en Judá!» Y ahora estos informes llegarán[a] al rey. Así que ahora, ven[b], y consultemos juntos.'
  to: 'Y hasta has nombrado profetas para proclamar acerca de ti en Jerusalén, diciendo: «¡Hay un rey en Judá!». Y ahora estos informes[a] llegarán al rey. Así que ahora, ven[b], y consultemos juntos.'
  rationale: 'Se hicieron reparaciones menores de naturalidad y precisión: «Y hasta has» por «Y aun has», «has nombrado» por «has puesto», y se movió la nota [a] a «estos informes», que es donde corresponde la alternativa léxica de כדברים האלה. El resto del sentido y de las decisiones del POB se mantiene.'
