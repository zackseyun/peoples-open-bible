lexical_decisions:
- source_word: οὐκ ἐπέγνων
  english_pob_choice: I did not recognize
  chosen_spanish: No reconocí
  alternatives_spanish:
  - No entendí
  - No percibí
  - No conocí
  lexicon: BDAG
  rationale: ἐπιγινώσκω suele expresar llegar a conocer o reconocer. En este lamento, «reconocí» conserva la idea de que la hablante no supo captar lo que tenía delante, sin reducirlo a mera comprensión intelectual.
- source_word: τὴν σώζουσαν
  english_pob_choice: that was saving
  chosen_spanish: que salvaba
  alternatives_spanish:
  - que estaba salvando
  - que preservaba
  - la que salvaba
  lexicon: BDAG
  rationale: El participio presente femenino concuerda con σωτηρίαν y expresa una acción en curso. «Que salvaba» mantiene la relación verbal con σωτηρία y su fuerza temporal, evitando una frase nominal pesada en español.
- source_word: ἑπτὰ υἱοὺς
  english_pob_choice: seven sons
  chosen_spanish: siete hijos
  alternatives_spanish:
  - siete hijos varones
  - siete muchachos
  - siete hijos e hijas
  lexicon: BDAG
  rationale: υἱούς significa literalmente «hijos/varones hijos». En español, «hijos» comunica de forma natural la referencia a los siete varones del contexto; «hijos varones» sería más explícito pero más pesado.
- source_word: πρὸς ὀλίγον χρόνον
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por un corto tiempo
  - por breve tiempo
  - por un momento
  lexicon: BDAG
  rationale: La frase denota duración limitada. «Por un poco de tiempo» es natural en español y conserva el matiz temporal sin volverlo demasiado idiomático o interpretativo.
- source_word: σωτηρίαν
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - el rescate
  - la preservación
  lexicon: BDAG
  rationale: σωτηρία puede significar salvación, liberación o preservación. Aquí el contexto martirial apunta a una preservación temporal frente a la muerte; sin embargo, «salvación» mantiene el peso del término griego y la tensión teológica del pasaje, mientras el complemento temporal aclara su alcance inmediato.
theological_decisions:
- issue: Sentido de σωτηρία en un contexto martirial
  english_pob_reading: temporal preservation/deliverance is in view, expressed as 'the salvation that was saving seven sons for a little while'
  chosen_spanish_reading: se ve una preservación o liberación temporal, expresada como «la salvación que salvaba a siete hijos por un poco de tiempo»
  alternative_spanish_readings:
  - la liberación que libraba a siete hijos por un poco de tiempo
  - la preservación que preservaba a siete hijos por un poco de tiempo
  - la salvación en sentido espiritual
  rationale: En el contexto, la madre reflexiona sobre la preservación temporal de sus hijos antes del martirio. «Salvación» conserva la amplitud del término griego y deja visible la tensión entre un rescate temporal y la carga teológica más amplia del vocablo.
  doctrine_reference: 'Contested terms: σωτηρία no listada; se aplica el principio general de equivalencia óptima y de preservar tensiones léxicas/teológicas.'
translation_notes:
  revision_awareness: El inglés POB revisó «preserving» a «saving» para acercarse más a σώζουσαν/σωτηρίαν y conservar el juego verbal. La versión española sigue ese ajuste con «salvaba», manteniendo el vínculo entre el participio y σωτηρίαν sin desvanecer el matiz temporal.
  spanish_consistency_notes:
  - Se mantiene «salvación» para σωτηρία y no se sustituye por «liberación» en el texto principal, porque el término griego conserva peso teológico incluso en un contexto de preservación temporal.
  - «No reconocí» sigue la decisión inglesa de ἐπέγνων como reconocimiento y no solo entendimiento.
  - «Siete hijos» se traduce como «siete hijos» en sentido masculino específico, acorde con el contexto narrativo.
