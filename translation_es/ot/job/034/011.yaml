  rationale: Se ajusta «paga» a «retribuye» para reflejar mejor el sentido judicial de יְשַׁלֶּם; se cambia «lo hace hallar» por «le hace encontrar» para un español más natural conservando el causativo de יַמְצִאֶנּוּ; y se mejora la nota para preservar las alternativas léxicas documentadas en el audit trail inglés. Se mantiene «obra» y la metáfora de «camino».
