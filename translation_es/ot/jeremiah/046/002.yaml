translation:
  language: es
  text: 'Acerca de Egipto: acerca del ejército de Faraón Necao, rey de Egipto[a], que estaba junto al río Éufrates, en Carquemis, y al que Nabucodonosor, rey de Babilonia, derrotó en el cuarto año de Joacim, hijo de Josías[b], rey de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede entenderse como «Contra Egipto» en el encabezado; aquí se prefiere «Acerca de Egipto» porque el versículo funciona como superscripción que introduce el tema del oráculo.
    reason: alternative_reading
  - marker: b
    text: La forma hebrea del nombre aquí se aproxima más a «Nabucodrezar», pero en el uso bíblico tradicional del español se emplea «Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִצְרַיִם
  english_pob_choice: Concerning Egypt
  chosen_spanish: Con respecto a Egipto
  alternatives_spanish:
  - Acerca de Egipto
  - Contra Egipto
  - Para Egipto
  lexicon: HALOT
  rationale: El ל introductorio en un encabezado profético señala el tema del oráculo. En español, «Con respecto a» conserva el valor discursivo de encabezamiento mejor que una traducción estrictamente preposicional. No se opta por «contra» como lectura principal porque el contexto inmediato presenta una superscripción temática; la hostilidad queda implícita por el contenido histórico del oráculo.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Aquí עַל funciona como marcador del tema del anuncio. «Acerca de» expresa bien ese valor en español y evita cargar de antemano la relación como una acusación directa.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza militar
  - hueste
  - tropas
  lexicon: HALOT
  rationale: חֵיל aquí denota fuerzas militares. «Ejército» es el equivalente más claro y natural para el lector español, sin perder el sentido bélico.
- source_word: פַּרְעֹה נְכוֹ
  english_pob_choice: Pharaoh Neco
  chosen_spanish: Faraón Necao
  alternatives_spanish:
  - Faraón Neco
  - Faraón Necho
  lexicon: HALOT
  rationale: Se mantiene la forma tradicional española «Necao», ampliamente reconocible y adecuada en contexto bíblico. «Faraón» conserva el título real egipcio sin sustituirlo por un término genérico.
- source_word: אֲשֶׁר הָיָה עַל נְהַר פְּרָת
  english_pob_choice: which was by the Euphrates River
  chosen_spanish: que estaba junto al río Éufrates
  alternatives_spanish:
  - que estaba en el río Éufrates
  - que estaba a orillas del río Éufrates
  lexicon: HALOT
  rationale: La combinación de היה con עַל en un marco locativo indica proximidad o ubicación junto a un lugar. «Junto al río Éufrates» conserva esa cercanía sin forzar una traducción demasiado literal.
- source_word: נְהַר פְּרָת
  english_pob_choice: the Euphrates River
  chosen_spanish: el río Éufrates
  alternatives_spanish:
  - el Éufrates
  - el río Eufrates
  lexicon: HALOT
  rationale: Se explicita «río» porque el hebreo lo expresa. «Éufrates» es la forma usual en español bíblico; se conserva con tilde según norma gráfica.
- source_word: בְּכַרְכְּמִשׁ
  english_pob_choice: at Carchemish
  chosen_spanish: en Carquemis
  alternatives_spanish:
  - en Carquemish
  - junto a Carquemis
  lexicon: HALOT
  rationale: Se elige la forma castellanizada «Carquemis», común en español bíblico e histórica. La preposición «en» es natural para ubicar el acontecimiento en el sitio de la batalla.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: derrotó
  alternatives_spanish:
  - golpeó
  - hirió
  - abatió
  lexicon: HALOT
  rationale: En este contexto militar, הִכָּה significa vencer/abatir en combate. «Derrotó» comunica el resultado bélico de manera clara en español, aunque la imagen literal de «golpear» queda subordinada al sentido histórico.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodreor
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se usa la forma consagrada en español bíblico «Nabucodonosor». Aunque la forma hebrea se aproxima más a «Nabucodre...», la tradición española hace de esta la lectura más reconocible y estable.
- source_word: בִּשְׁנַת הָרְבִיעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  - al cuarto año
  lexicon: HALOT
  rationale: La fórmula cronológica se traduce de manera directa y natural. El sustantivo «año» está implícito y se expresa en español para completar la fecha regnal.
- source_word: לִיהוֹיָקִים
  english_pob_choice: of Jehoiakim
  chosen_spanish: de Joacim
  alternatives_spanish:
  - de Joaquim
  - de Jehoiaquim
  lexicon: HALOT
  rationale: 'Se adopta la forma española tradicional «Joacim» para el rey de Judá. El prefijo ל en la datación se entiende como relación de pertenencia temporal: «de Joacim».'
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josia
  - Josías
  lexicon: HALOT
  rationale: «Josías» es la forma estándar en español bíblico y transmite claramente la identificación del padre de Joacim.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: El nombre de la entidad política se vierte como «Judá», que corresponde al reino de la época. «Judea» sería más propio de periodos posteriores o geográficos distintos.
theological_decisions:
- issue: 'Encabezado profético: tema del oráculo o dirección hostil'
  english_pob_reading: The verse functions as a superscription introducing the subject of the oracle, so 'Concerning Egypt' is chosen over a more aggressive 'Against Egypt.'
  chosen_spanish_reading: Con respecto a Egipto / acerca de Egipto como encabezado temático, sin explicitar en la primera frase la hostilidad como si fuera una acusación directa.
  alternative_spanish_readings:
  - Contra Egipto
  - Para Egipto
  rationale: La forma hebrea en este tipo de fórmulas puede introducir el tema del oráculo sin requerir que la traducción lo estreche inmediatamente a una hostilidad frontal. La opción elegida mantiene abierta la función de superscripción y deja que el contenido profético despliegue la carga adversativa.
  doctrine_reference: Hermenéutica profética; función de encabezados oraculares en el AT
- issue: Forma del nombre del rey babilonio
  english_pob_reading: The Hebrew name form here is closer to 'Nebuchadrezzar'; English tradition commonly uses 'Nebuchadnezzar.'
  chosen_spanish_reading: Nabucodonosor como forma tradicional española, aunque el hebreo apunta a una vocalización cercana a Nabucodre...
  alternative_spanish_readings:
  - Nabucodreor
  - Nebucodonosor
  rationale: La tradición bíblica española ha fijado «Nabucodonosor» como nombre propio reconocible. Se conserva esa forma por claridad lectora, sin negar en la nota la proximidad de la forma hebrea a otra vocalización.
  doctrine_reference: Onomástica bíblica; fidelidad al nombre tradicional frente a variantes transliteradas
translation_notes:
  revision_awareness: Se siguió el expediente inglés existente sin cambios sustantivos; el punto principal de decisión se concentró en la función del encabezado profético y en la elección de las formas españolas tradicionales de los nombres propios. No se requirieron revisiones textuales adicionales frente al hebreo base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - 'Se prefirieron formas tradicionales españolas de nombres históricos cuando están firmemente establecidas: Necao, Nabucodonosor, Joacim, Josías, Judá.'
  - Se conservó un registro formal y bíblico sin imitar servilmente la sintaxis hebrea donde el español pide una construcción más natural.
  - El marcador [a] se ancla en el encabezado oracular; [b] se ancla en el nombre de Nabucodonosor para documentar la variante léxica.
