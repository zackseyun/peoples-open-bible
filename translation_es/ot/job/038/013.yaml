translation:
  language: es
  text: para que tome los extremos de la tierra[a], y los malvados sean sacudidos de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las esquinas de la tierra». El hebreo dice literalmente «las alas/extremidades de la tierra», una imagen poética de sus extremos.
    reason: lexical_alternative
  - marker: b
    text: La imagen es la del amanecer que toma la tierra y sacude de ella a los malvados, como se sacude el polvo de una prenda.
    reason: cultural_note
lexical_decisions:
- source_word: לֶאֱחֹז
  english_pob_choice: that it might take hold of
  chosen_spanish: para que tome
  alternatives_spanish:
  - para que agarre
  - para que se apodere de
  - para que sujete
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito; en español, «para que» comunica bien esa finalidad. «Tomar» conserva la imagen concreta de aferrar o agarrar sin volver el verso demasiado áspero.
- source_word: בְּכַנְפוֹת
  english_pob_choice: of the edges
  chosen_spanish: las orillas
  alternatives_spanish:
  - los bordes
  - las esquinas
  - los extremos
  lexicon: HALOT
  rationale: כָּנָף puede significar literalmente «ala», pero en este giro poético con הארץ alude a las partes extremas del horizonte o de la tierra. «Orillas» transmite la idea de límite periférico de forma natural en español, sin forzar una geometría exacta.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico, el referente es la tierra como esfera creada. «La tierra» es la opción más directa y fiel en español.
- source_word: וְיִנָּעֲרוּ
  english_pob_choice: and ... be shaken out
  chosen_spanish: sean sacudidos
  alternatives_spanish:
  - sean sacudidos fuera
  - sean sacudidos de allí
  - sean sacudidos y expulsados
  lexicon: HALOT
  rationale: El niphal de נער expresa ser sacudido. En español, «sean sacudidos» mantiene la fuerza pasiva de la imagen; el complemento posterior completa la idea de expulsión/remoción.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: Rְשָׁעִים designa personas moralmente culpables. «Los malvados» es claro y natural; conserva la categoría moral sin añadir un matiz eclesiástico específico.
- source_word: מִמֶּנָּה
  english_pob_choice: out of it
  chosen_spanish: de ella
  alternatives_spanish:
  - fuera de ella
  - de su superficie
  - de allí
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a «la tierra». «De ella» preserva la referencia pronominal y deja al contexto la imagen de ser sacudidos fuera de la tierra.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail inglés; no se registran revisiones aplicadas ni variantes textuales relevantes en esta entrega.
  spanish_consistency_notes:
  - Se usa «tierra» para הָאָרֶץ en sentido cósmico, no «país».
  - 'Se mantiene el paralelismo imagético del hebreo: aferrar los límites de la tierra y sacudir de ella a los malvados.'
  - «Malvados» conserva el sustantivo moral sin introducir una glosa doctrinal adicional.
