translation:
  language: es
  text: ¿Y cuál es la duración de la vida del hombre sobre la tierra? Conforme a su duración, así también su esperanza está puesta en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «…así también su esperanza está puesta en ella», es decir, en la duración de su vida.'
    reason: alternative_reading
lexical_decisions:
- source_word: χρόνος
  english_pob_choice: span
  chosen_spanish: medida
  alternatives_spanish:
  - tiempo
  - plazo
  - extensión
  lexicon: BDAG
  rationale: En este contexto, χρόνος no apunta al tiempo abstracto sino a la duración medida de una vida humana. «Medida» comunica de manera natural la idea de extensión delimitada sin sonar forzado en español.
- source_word: ζωῆς
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - lifetime
  lexicon: BDAG
  rationale: El genitivo califica a χρόνος; mantener «vida» conserva la relación directa con el sustantivo original y permite la expresión «la vida del hombre».
- source_word: ἀνθρώπου
  english_pob_choice: man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de una persona
  - humana
  lexicon: BDAG
  rationale: El singular genérico se expresa de forma natural en español con «del hombre», manteniendo el referente humano representativo del texto.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra
  lexicon: BDAG
  rationale: «Sobre la tierra» reproduce bien la localización del original y conserva un tono bíblico natural en español, sin recurrir a una fórmula demasiado técnica.
- source_word: κατὰ τὸν χρόνον αὐτοῦ
  english_pob_choice: According to his span
  chosen_spanish: Conforme a su medida
  alternatives_spanish:
  - Según su medida
  - De acuerdo con su tiempo
  lexicon: BDAG
  rationale: El griego expresa correspondencia o proporción, no solo duración. «Conforme a» conserva esa relación comparativa, y «su medida» evita una traducción mecánica que perdería la idea de límite o proporción.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza confiada
  - expectativa
  lexicon: BDAG
  rationale: «Esperanza» es el equivalente más claro y natural en español, y preserva la carga semántica del sustantivo sin ampliar indebidamente el sentido.
- source_word: ἐπʼ αὐτόν
  english_pob_choice: on him / on it
  chosen_spanish: está
  alternatives_spanish:
  - recae sobre él
  - descansa sobre él
  lexicon: BDAG
  rationale: El audit trail inglés considera la ambigüedad del pronombre; en español, la construcción «está su esperanza» deja la referencia abierta de manera natural, sin forzar un antecedente único. Esto permite conservar la tensión textual entre la esperanza ligada a la medida de la vida y la posible referencia al hombre mismo.
theological_decisions:
- issue: 'Ambigüedad del pronombre final: si se refiere a la vida medida o al hombre'
  english_pob_reading: The main text takes the reference as the lifespan while preserving the personal reading in a footnote.
  chosen_spanish_reading: La frase final queda de modo que la esperanza está vinculada a la medida de la vida, pero sin cerrar del todo la referencia del pronombre.
  alternative_spanish_readings:
  - …así también está su esperanza sobre él.
  - …así también su esperanza descansa sobre ella (la medida).
  rationale: El comentario de revisión señala una tensión real en el griego y en el flujo del argumento. En español, «está su esperanza» conserva la relación semántica sin sobreespecificar un antecedente que el texto permite mantener abierto.
  doctrine_reference: Lectura textual y argumental de Salmos de Salomón 17:2-3
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente y el aviso de control cruzado: la traducción anterior fue corregida porque «As long as that span lasts» debilitaba la comparación proporcional de κατὰ τὸν χρόνον αὐτοῦ y porque la referencia final de ἐπʼ αὐτόν no debía fijarse de modo que borrara la tensión del texto. El español propuesto intenta conservar la proporción y la ambigüedad controlada.'
  spanish_consistency_notes:
  - Se evitó «Señor» o cualquier sustitución no presente en el texto.
  - «Esperanza» se mantiene como término principal, en paralelo con el inglés auditado.
  - La puntuación interrogativa y la cadencia siguen el orden retórico del original griego.
  - Las notas a pie de página quedan ancladas explícitamente en el texto con [a] y [b].
