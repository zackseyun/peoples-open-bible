translation:
  language: es
  text: El remanente de Israel no hará mal ni dirá mentiras[a], y no se hallará en su boca lengua de engaño; porque ellos pastarán y se echarán[b], y no habrá quien los atemorice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «falsedad».'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final conserva la imagen pastoral: «pastarán y se echarán», como un rebaño que habita en seguridad.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: The remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - el remanente de Israel
  lexicon: HALOT
  rationale: שְׁאֵרִית designa al grupo que sobrevive o queda preservado; en profetas, 'remanente' conserva mejor la carga teológica que 'resto'. 'Remanente de Israel' sigue de cerca la estructura hebrea y mantiene el sentido de un pueblo preservado.
- source_word: יַעֲשׂוּ עַוְלָה
  english_pob_choice: will do no wrong
  chosen_spanish: no cometerá injusticia
  alternatives_spanish:
  - no hará mal
  - no hará injusticia
  - no cometerá iniquidad
  lexicon: HALOT
  rationale: עַוְלָה puede abarcar injusticia, mal o desviación moral. 'Cometerá injusticia' conserva la fuerza ética y jurídica del término sin volverlo demasiado general. Se usa singular colectivo en español porque 'remanente' funciona como conjunto.
- source_word: יְדַבְּרוּ כָזָב
  english_pob_choice: speak no lies
  chosen_spanish: hablará mentira
  alternatives_spanish:
  - dirá ninguna mentira
  - pronunciará falsedad
  - hablará falsedad
  lexicon: HALOT
  rationale: כָזָב es 'mentira' o 'falsedad'. 'Hablar mentira' es español natural y directo; conserva el verbo de habla del hebreo sin forzar una perífrasis más abstracta.
- source_word: יִמָּצֵא בְּפִי הֶם לְשׁוֹן תַּרְמִית
  english_pob_choice: no deceitful tongue will be found in their mouth
  chosen_spanish: no se hallará en su boca lengua de engaño
  alternatives_spanish:
  - no se hallará en su boca una lengua engañosa
  - no se encontrará en su boca una lengua de fraude
  - no se hallará en su boca lengua de traición
  lexicon: HALOT
  rationale: 'La imagen hebrea es concreta: ''lengua de engaño'' como modo de hablar fraudulento. ''Lengua de engaño'' preserva la metáfora corporal mejor que ''habla engañosa'', y ''se hallará'' refleja el pasivo impersonal del original.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior. 'Porque' es la conexión causal más natural en español y mantiene la relación explicativa del hebreo.
- source_word: יִרְע֥וּ
  english_pob_choice: will graze
  chosen_spanish: pastarán
  alternatives_spanish:
  - apacentarán
  - comerán del pasto
  - pacerán
  lexicon: HALOT
  rationale: El verbo describe a animales que pastan. 'Pastarán' conserva la imagen pastoral y funciona bien junto con 'se recostarán', sin perder la concreción del texto.
- source_word: וְרָבְצ֖וּ
  english_pob_choice: and lie down
  chosen_spanish: se recostarán
  alternatives_spanish:
  - se echarán
  - reposarán
  - se acostarán
  lexicon: HALOT
  rationale: רָבַץ es la acción de echarse o recostarse, especialmente de animales. 'Se recostarán' mantiene el cuadro pastoril con un registro digno y claro en español.
- source_word: אֵין מַחֲרִיד
  english_pob_choice: with no one to make them afraid
  chosen_spanish: y no habrá quien los atemorice
  alternatives_spanish:
  - y nadie los aterrará
  - y no habrá quien los asuste
  - y no habrá quien los haga temer
  lexicon: HALOT
  rationale: El participio expresa al que provoca terror. 'Atemorice' conserva la idea de causar miedo y mantiene el paralelismo con la seguridad pastoral del verso.
theological_decisions:
- issue: Terminología de remanente
  english_pob_reading: Rendered שְׁאֵרִית as 'remnant' in the main text.
  chosen_spanish_reading: '''Remanente'' en el texto principal.'
  alternative_spanish_readings:
  - '''resto'''
  - '''supervivientes'''
  rationale: 'En la literatura profética, ''remanente'' tiene un peso textual y teológico reconocido: no solo indica cantidad reducida, sino pueblo preservado. Esa carga está en el hebreo y conviene mantenerla.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Imágenes pastorales finales
  english_pob_reading: Retained the sheep/flock imagery with 'graze and lie down' rather than abstracting to general peace and rest.
  chosen_spanish_reading: '''pastarán y se recostarán'''
  alternative_spanish_readings:
  - '''comerán y descansarán'''
  - '''vivirán seguros'''
  rationale: El hebreo usa lenguaje concreto de rebaño; no conviene desdibujarlo en una abstracción. La imagen preserva la paz del pueblo bajo cuidado divino sin añadir formulaciones doctrinales externas.
  doctrine_reference: Translation philosophy §1, §6
- issue: Negación triple de conducta y habla
  english_pob_reading: '''will do no wrong and speak no lies... no deceitful tongue will be found in their mouth'''
  chosen_spanish_reading: '''no cometerá injusticia ni hablará mentira... no se hallará en su boca lengua de engaño'''
  alternative_spanish_readings:
  - '''no hará mal ni dirá mentira'''
  - '''no obrará injustamente ni hablará falsedad'''
  rationale: La triple negación del hebreo intensifica la pureza moral y verbal del remanente. Conviene conservar esa secuencia sin suavizarla, manteniendo tanto la dimensión ética como la del discurso.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios: la correspondencia con el hebreo y con el audit trail inglés fue confirmada como de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo 'remanente' por coherencia con la terminología profética ya auditada.
  - Se preservó la metáfora pastoral con verbos concretos ('pastarán', 'se recostarán') en lugar de abstracciones.
  - Se usó 'injusticia' y 'mentira/engaño' para sostener el campo semántico moral y verbal del hebreo.
  - El singular colectivo en español ('remanente... no cometerá') sigue el uso natural del sustantivo colectivo en este contexto.
