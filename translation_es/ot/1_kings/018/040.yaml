translation:
  language: es
  text: 'Entonces Elías les dijo[a]: «Atrapen a los profetas de Baal; que no escape ninguno de ellos». Y los atraparon, y Elías los bajó al torrente Quisón[b] y allí los degolló.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «que no escape nadie». El hebreo dice literalmente: «que no escape un hombre».'
    reason: lexical_alternative
  - marker: b
    text: O «el torrente Quisón». Hebreo naḥal puede referirse a un wadi, arroyo, cauce o torrente.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְשׂוּ
  english_pob_choice: Seize
  chosen_spanish: Atrapen
  alternatives_spanish:
  - Capturen
  - Agarren
  lexicon: HALOT
  rationale: El imperativo plural pide una acción física y urgente de aprehender. «Atrapen» conserva la fuerza de «seize» sin sonar demasiado jurídico en español.
- source_word: נְבִיאֵי הַבַּעַל
  english_pob_choice: the prophets of Baal
  chosen_spanish: los profetas de Baal
  alternatives_spanish:
  - los profetas del Baal
  - los profetas de Baal
  lexicon: HALOT
  rationale: La construcción de posesión o pertenencia se expresa de forma natural en español con «de Baal». Mantiene la identidad del grupo sin paraphrasear.
- source_word: אִישׁ אַל יִמָּלֵט
  english_pob_choice: let not one of them escape
  chosen_spanish: que no escape ninguno de ellos
  alternatives_spanish:
  - que no escape uno de ellos
  - que nadie escape
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular distributivo con negación jussiva. En español, «ninguno de ellos» transmite bien la totalidad exigida sin forzar un masculino genérico antinatural.
- source_word: וַיִּתְפְּשׂוּם
  english_pob_choice: they seized them
  chosen_spanish: los atraparon
  alternatives_spanish:
  - los capturaron
  - los apresaron
  lexicon: HALOT
  rationale: Se conserva la continuidad verbal con el mandato previo, pero en español narrativo «los atraparon» suena natural y refleja la aprehensión efectiva.
- source_word: וַיּוֹרִדֵם
  english_pob_choice: brought them down
  chosen_spanish: los bajó
  alternatives_spanish:
  - los llevó abajo
  - los condujo hacia abajo
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar el descenso. «Los bajó» es la forma más directa y natural en español para ese movimiento.
- source_word: נַחַל קִישׁוֹן
  english_pob_choice: the Kishon Wadi
  chosen_spanish: el torrente Quisón
  alternatives_spanish:
  - el wadi de Quisón
  - el arroyo Quisón
  - el cauce del Quisón
  lexicon: HALOT
  rationale: נחל puede designar wadi, cauce o torrente. «Torrente» comunica bien el sentido geográfico sin depender del arabismo «wadi», y «Quisón» conserva el nombre propio.
- source_word: וַיִּשְׁחָטֵם
  english_pob_choice: slaughtered them
  chosen_spanish: degolló
  alternatives_spanish:
  - los degolló
  - los mató
  - los sacrificó
  lexicon: HALOT
  rationale: שחט denota una matanza violenta, a menudo por degüello o sacrificio. «Degolló» preserva la crudeza del verbo mejor que un genérico «mató».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí mismo
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es la equivalencia directa y fluida en español.
theological_decisions:
- issue: Representación de la violencia narrativa contra los profetas de Baal
  english_pob_reading: Translate the event directly as Elijah's command and execution of the prophets without softening the violence or adding moral commentary.
  chosen_spanish_reading: Traducir el mandato y la ejecución de forma directa, sin suavizar la violencia ni introducir una valoración explícita en el versículo.
  alternative_spanish_readings:
  - los ejecutó
  - los hizo morir
  - los castigó con la muerte
  rationale: El hebreo narra una acción violenta de forma abierta. En español conviene mantener esa dureza textual sin reemplazarla por un eufemismo ni añadir una glosa interpretativa que el verso no formula.
  doctrine_reference: Primacía del texto fuente; evitar añadir contenido doctrinal o explicativo no presente en el versículo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la cláusula de escape de «let not a man escape from them» a «let not one of them escape». La redacción española refleja esa corrección con una negación distributiva natural en español.
  spanish_consistency_notes:
  - Se mantiene «Baal» como nombre propio transliterado, coherente con la tradición del proyecto.
  - Se eligió «torrente» para נחל por claridad idiomática en español, preservando una nota para la alternativa geográfica.
  - La violencia del cierre se conserva con un verbo fuerte («degolló») acorde con el valor del hebreo שחט.
