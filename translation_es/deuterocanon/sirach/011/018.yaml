review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue el griego de Sirácida 11:18, lo cual concuerda con la decisión principal del English POB para este versículo frente al hebreo divergente. Sin embargo, omite la nota textual obligatoria que documenta que la línea hebrea disponible dice otra sentencia distinta. Además, el rastro de auditoría inglés contiene una revisión interna inconsistente que sustituyó el texto griego por el hebreo; por eso la revisión debe seguir la decisión léxica y teológica documentada, no esa revisión errónea.
  spanish_quality_summary: El español es claro y natural. 'Hay quien se enriquece por su atención y su mezquindad, y esta es la parte de su recompensa' es legible, pero 'atención' suena un poco débil para προσοχή en este contexto; 'cuidado' o 'diligencia' fluye mejor. También conviene evitar el posesivo repetido si no aporta. La principal carencia es la ausencia de la nota textual.
  glossary_alignment: No hay conflictos relevantes con la terminología base del proyecto, ya que este versículo no contiene los términos teológicos centrales salvo la variante hebrea con יהוה, que en español debe aparecer como 'Yahvé' dentro de la nota, no 'el Señor'.
  issues:
  - severity: high
    issue: Falta la nota textual sobre la divergencia del hebreo
    rationale: El English POB preserva explícitamente en nota que la línea hebrea disponible no corresponde al contenido griego de Sirácida 11:18. Omitirla oculta una incertidumbre textual importante y no preserva el audit trail.
  - severity: medium
    issue: '''por su atención'' no refleja tan bien προσοχή como ''por su cuidado'''
    rationale: Aunque 'atención' es posible, en español suena más mental que conductual. 'Cuidado' conserva mejor el matiz de cautela/esmero que produce la riqueza en la sentencia sapiencial.
  - severity: low
    issue: El borrador no refleja la inconsistencia del historial de revisión inglés
    rationale: La revisión inglesa aplicada cambió indebidamente al texto hebreo divergente. El revisor español debe atenerse a las decisiones léxicas y teológicas principales que siguen el griego, y dejar constancia de la variante en nota.
  revised_spanish_text: Hay quien se enriquece por su cuidado y su mezquindad,[a] y esta es la parte de su recompensa.
