translation:
  language: es
  text: Su corazón es duro como una piedra[a], duro como la muela inferior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «firme como la muela inferior»; el verbo hebreo se relaciona literalmente con algo vertido o colado, de ahí la idea de rigidez o solidez.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב designa el centro interior de pensamiento, voluntad y disposición. En español, «corazón» conserva ese valor antropológico amplio y mantiene la imagen poética de dureza interna.
- source_word: יָצ֣וּק
  english_pob_choice: is hard
  chosen_spanish: es duro
  alternatives_spanish:
  - es firme
  - es sólido
  - está vaciado
  lexicon: HALOT
  rationale: El verbo procede de יצק, cuyo sentido básico es «verter/colar/castigar», pero en esta construcción poética describe algo rigidizado o sólido. «Es duro» comunica el efecto en español sin perder la base imagética de rigidez.
- source_word: כְּמוֹ אָבֶן
  english_pob_choice: like a stone
  chosen_spanish: como una piedra
  alternatives_spanish:
  - como piedra
  lexicon: HALOT
  rationale: La comparación es directa. «Como una piedra» es natural en español y conserva la concreción del símil.
- source_word: וְיָצוּק
  english_pob_choice: hard
  chosen_spanish: duro
  alternatives_spanish:
  - firme
  - sólido
  - vertido
  lexicon: HALOT
  rationale: La repetición intensifica el paralelismo. Repetir «duro» reproduce mejor la fuerza retórica del hebreo que una traducción más literal de la raíz verbal.
- source_word: כְּפֶלַח תַּחְתִּית
  english_pob_choice: like the lower millstone
  chosen_spanish: como la piedra de muela inferior
  alternatives_spanish:
  - como la muela inferior
  - como la piedra de molino inferior
  - como la parte inferior de la muela
  lexicon: HALOT
  rationale: פֶלַח puede sugerir «pieza» o «tajada», pero en este contexto junto con תַּחְתִּית apunta a la piedra inferior del molino. «Piedra de muela inferior» mantiene la imagen de una piedra de molino y hace explícita la función del elemento inferior, que es el punto relevante de dureza.
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del tramo revisado: se mantiene la doble comparación enfática del hebreo y la opción de sentido para יצק (rigidez/solidez) en lugar de una traducción mecánica por «vertido». No se detectaron revisiones aplicadas en el registro inglés, así que no se incorporan cambios secundarios.'
  spanish_consistency_notes:
  - Se preserva «corazón» como centro interior, coherente con la terminología bíblica habitual y con la decisión inglesa.
  - «Piedra de muela inferior» evita ambigüedad para lectores hispanos y conserva la imagen de dureza excepcional.
  - La nota a pie de página recoge la alternativa semántica del verbo hebreo sin desplazar la lectura principal del verso.
