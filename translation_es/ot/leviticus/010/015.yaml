revisions:
- from: Traerán el muslo de la contribución[a] y el pecho de la ofrenda mecida[b], junto con las ofrendas encendidas de las porciones de grasa, para mecerlo como ofrenda mecida delante de Yahvé; y será para ti y para tus hijos contigo como estatuto perpetuo, tal como Yahvé mandó.
  to: Traerán el muslo de la contribución[a] y el pecho de la ofrenda mecida[b], junto con las ofrendas de alimento de las porciones de grasa, para presentarlos como ofrenda mecida delante de Yahvé; y será para ti y para tus hijos contigo como estatuto perpetuo, tal como Yahvé mandó.
  rationale: Se ajusta אִשֵּׁי hacia «ofrendas de alimento» para seguir mejor la decisión documentada en la auditoría inglesa y evitar la rareza de «ofrendas encendidas». Se cambia «para mecerlo» por «para presentarlos» para no introducir un singular ajeno al hebreo y para mantener una expresión natural en español que abarque las porciones mencionadas, sin perder el valor técnico porque «ofrenda mecida» se conserva de inmediato después. También se afinan las notas para reflejar mejor las alternativas léxicas relevantes de la POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en gran medida la estructura y el sentido del hebreo: las porciones sacerdotales, su presentación ritual delante de Yahvé, y su asignación permanente a Aarón y sus hijos. Mantiene correctamente «Yahvé» para יְהוָה y reproduce bien «muslo», «pecho», «contribución», «ofrenda mecida» y «estatuto perpetuo». Sin embargo, hay dos puntos de fidelidad mejorables: (1) «las ofrendas encendidas de las porciones de grasa» no sigue de cerca la decisión auditada «food offerings of the fat portions» y en español suena menos claro; «ofrendas de alimento de las porciones de grasa» o una formulación equivalente preserva mejor אִשֵּׁי sin reducirlo solo al fuego. (2) «para mecerlo» introduce un singular («lo») no presente en el hebreo y puede sugerir un solo objeto, cuando el verbo abarca las porciones mencionadas; conviene una formulación impersonal o plural.'
  spanish_quality_summary: El español es generalmente claro, digno y legible. «Traerán el muslo... y el pecho...» está bien construido, y «delante de Yahvé» y «tal como Yahvé mandó» suenan naturales. No obstante, «ofrendas encendidas» resulta algo extraño en español eclesial general y menos transparente que otras opciones. Además, «mecerlo» crea una leve aspereza referencial. Una pequeña revisión mejora precisión y fluidez sin alterar el tono.
  glossary_alignment: 'Buen alineamiento global con el glosario del proyecto: יְהוָה -> «Yahvé» correcto; תְּרוּמָה -> «contribución» correcto; תְּנוּפָה -> «ofrenda mecida» aceptable y coherente; חָק עוֹלָם -> «estatuto perpetuo» correcto. El único desajuste relevante frente a la auditoría inglesa es אִשֵּׁי, donde el inglés documentó «food offerings» y el borrador optó por «ofrendas encendidas», que desplaza el matiz léxico.'
  issues:
  - severity: medium
    issue: «ofrendas encendidas» para אִשֵּׁי
    rationale: La auditoría inglesa eligió «food offerings» por legibilidad y precisión cultual. «Encendidas» enfatiza el fuego pero no comunica tan bien el valor técnico del sustantivo y suena algo forzado en español.
  - severity: medium
    issue: «para mecerlo» introduce un singular explícito no presente en el hebreo
    rationale: El hebreo dice לְהָנִיף תְּנוּפָה, con énfasis en la acción ritual y la categoría de ofrenda, no un objeto singular expreso. «Mecerlo» puede inducir a pensar solo en un elemento en vez de las porciones mencionadas.
  - severity: low
    issue: Falta en español una nota equivalente a la alternativa de «contribución» / «ofrenda elevada» y la nota cultural sobre «ofrenda mecida» podría expresarse más claramente
    rationale: No es un error grave, pero la POB inglesa conservó alternativas significativas para terminología cultual. En español conviene preservar al menos la alternativa tradicional de תְּרוּמָה y clarificar la explicación de תְּנוּפָה.
  revised_spanish_text: Traerán el muslo de la contribución[a] y el pecho de la ofrenda mecida[b], junto con las ofrendas de alimento de las porciones de grasa, para presentarlos como ofrenda mecida delante de Yahvé; y será para ti y para tus hijos contigo como estatuto perpetuo, tal como Yahvé mandó.
  revised_footnotes:
  - marker: a
    text: También puede traducirse «pierna». «Contribución» corresponde al término tradicional «ofrenda elevada».
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda mecida» se refiere a una presentación ritual delante de Yahvé; algunos la traducen más generalmente como «ofrenda presentada».
    reason: cultural_note
  revision_rationale: Se ajusta אִשֵּׁי hacia «ofrendas de alimento» para seguir mejor la decisión documentada en la auditoría inglesa y evitar la rareza de «ofrendas encendidas». Se cambia «para mecerlo» por «para presentarlos» para no introducir un singular ajeno al hebreo y para mantener una expresión natural en español que abarque las porciones mencionadas, sin perder el valor técnico porque «ofrenda mecida» se conserva de inmediato después. También se afinan las notas para reflejar mejor las alternativas léxicas relevantes de la POB.
