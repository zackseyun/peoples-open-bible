  yaml_path: translation/ot/2_chronicles/023/003.yaml
  text: And all the assembly made a covenant in the house of God with the king[a], and he said to them, “Behold, the king’s son will reign[c][b], just as Yahweh spoke concerning the sons of David.”
  footnotes:
