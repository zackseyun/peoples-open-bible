review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la prohibición de desear intensamente los alimentos del anfitrión y preserva el sentido proverbial de advertencia. Sin embargo, la segunda cláusula no refleja del todo la decisión auditada del POB inglés: el hebreo לֶחֶם puede significar ''pan'' literalmente, pero aquí el contexto de מַטְעַמּוֹתָיו (''sus manjares/delicadezas'') favorece el sentido amplio ''comida/alimento''. ''Pan engañoso'' suena más estrecho en español y no enlaza tan naturalmente con ''manjares''.'
  spanish_quality_summary: La frase es legible y digna. 'No codicies sus manjares' funciona bien y mantiene la fuerza moral del verbo. La mejora principal es hacer más natural y contextual la segunda cláusula con 'comida engañosa', que además armoniza mejor con la nota literal. La puntuación y el registro son adecuados para una Biblia de lectura eclesial amplia.
  glossary_alignment: 'No hay términos del glosario mayor implicados como Yahvé, Mesías, etc. La elección de ''codicies'' para תִּתְאָו y ''manjares'' para מַטְעַמּוֹתָיו está alineada con la racionalidad léxica del proyecto. La excepción relevante es לֶחֶם: conviene seguir la racionalidad contextual del POB inglés (''food'') en el texto principal y reservar ''pan de mentiras'' para la nota literal.'
  issues:
  - severity: medium
    issue: '''pan engañoso'' traduce לֶחֶם de manera demasiado estrecha en este contexto'
    rationale: Aunque לֶחֶם puede ser literalmente 'pan', aquí se refiere de manera amplia a comida/alimento, en relación con 'sus manjares'. El POB inglés documenta precisamente esta ampliación contextual. 'Comida engañosa' preserva mejor el sentido y suena más natural en español.
  - severity: low
    issue: La nota al pie puede integrarse mejor con el texto principal revisado
    rationale: Si el texto principal usa 'comida engañosa', la nota literal 'pan de mentiras' queda más claramente justificada como alternativa léxica y evita tensión interna entre texto y nota.
  revised_spanish_text: No codicies sus manjares[a], porque son comida engañosa.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «pan de mentiras».
    reason: lexical_alternative
  revision_rationale: Se conserva la fuerza de 'codicies' y la buena elección de 'manjares', pero se ajusta לֶחֶם al sentido contextual amplio 'comida' para reflejar mejor tanto el hebreo en este contexto como la decisión documentada del POB inglés. La literalidad 'pan de mentiras' se preserva en la nota al pie.
