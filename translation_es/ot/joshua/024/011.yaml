base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/011.yaml
  text: Then you crossed the Jordan and came to Jericho[a], and the men of Jericho fought against you—the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites—and I gave them into your hand.
  footnotes:
  - marker: a
    text: Or 'the lords of Jericho.' The Hebrew expression literally means 'masters/owners of Jericho' and may refer to the city's rulers or leading men rather than all its inhabitants.
