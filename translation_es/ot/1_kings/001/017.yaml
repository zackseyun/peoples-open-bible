translation:
  language: es
  text: 'Ella le dijo[a]: «Mi señor, tú juraste por Yahvé tu Dios a tu sierva: “Salomón tu hijo reinará después de mí, y él se sentará en mi trono”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu criada». El hebreo usa aquí un término femenino específico para «sierva»; «sierva» comunica bien el matiz sin perder claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: HALOT
  rationale: En el contexto de una audiencia cortesana, אֲדֹנִי es un tratamiento respetuoso dirigido al rey. «Mi señor» conserva la deferencia sin introducir la idea de posesión que tendría «amo» o «dueño».
- source_word: נִשְׁבַּעְתָּ בַּיהוָה אֱלֹהֶיךָ
  english_pob_choice: you swore by Yahweh your God
  chosen_spanish: juraste por Yahvé tu Dios
  alternatives_spanish:
  - hiciste juramento por Yahvé tu Dios
  - te juraste por Yahvé tu Dios
  lexicon: HALOT
  rationale: El verbo expresa tomar un juramento; en español, «jurar por» es la forma natural y precisa. Se mantiene «Yahvé» conforme al criterio del proyecto, y «tu Dios» preserva la fórmula completa del juramento.
- source_word: לַאֲמָתֶךָ
  english_pob_choice: to your female servant
  chosen_spanish: a tu sierva
  alternatives_spanish:
  - a tu criada
  - a tu esclava mujer
  lexicon: HALOT
  rationale: אָמָה designa específicamente a una servidora femenina. «Sierva» comunica bien la relación de subordinación y el tono humilde del discurso; «criada» suaviza demasiado y «esclava mujer» suena forzado en español.
- source_word: שְׁלֹמֹה בְנֵךְ
  english_pob_choice: Solomon your son
  chosen_spanish: Salomón, tu hijo
  alternatives_spanish:
  - Salomón tu hijo
  - tu hijo Salomón
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la forma habitual en español, y se mantiene el orden semítico de título/posesión de manera idiomática. La coma ayuda a que la apposición sea clara sin alterar el sentido.
- source_word: יִמְלֹךְ אַחֲרָי
  english_pob_choice: will reign after me
  chosen_spanish: reinará después de mí
  alternatives_spanish:
  - será rey después de mí
  - reinará en mi lugar
  lexicon: HALOT
  rationale: מלך se expresa con «reinar»; «después de mí» conserva la idea temporal y dinástica de sucesión. «En mi lugar» explicita la sustitución, pero va más allá de la formulación hebrea.
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי
  english_pob_choice: and he will sit on my throne
  chosen_spanish: y él se sentará en mi trono
  alternatives_spanish:
  - y se sentará sobre mi trono
  - y ocupará mi trono
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del trono y la fórmula de entronización. «Se sentará en mi trono» es natural en español y mantiene la metáfora real sin sustituirla por una paráfrasis interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al estándar del proyecto en español, se traduce con «Yahvé» para preservar el nombre del pacto sin la convención de máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de כִּי en la cita del juramento
  english_pob_reading: the oath content is introduced without an explicit emphatic gloss in the revised English draft
  chosen_spanish_reading: Se introduce simplemente como el contenido citado del juramento, sin añadir énfasis como «ciertamente» o «seguramente»
  alternative_spanish_readings:
  - ciertamente Salomón, tu hijo, reinará después de mí
  - seguramente Salomón, tu hijo, reinará después de mí
  rationale: La revisión inglesa eliminó el matiz enfático previo porque כִּי aquí introduce el contenido del juramento. En español conviene reflejar esa decisión con una traducción sobria, sin añadir adverbios que no están exigidos por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Discurso citado y partículas de complemento'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se eliminó el realce interpretativo de כִּי y se mantuvo la estructura de juramento y sucesión. También se conserva la elección doctrinal de traducir el nombre divino como «Yahvé» y la nota léxica sobre el femenino específico de לַאֲמָתֶךָ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con los criterios del proyecto.
  - «Mi señor» conserva la deferencia cortesana frente a opciones más literales pero menos naturales.
  - «Tu sierva» es consistente con el valor femenino explícito del hebreo y con el estilo sobrio de la POB.
  - El pronombre explícito «él» en «y él se sentará» ayuda a la claridad en español, aunque el hebreo ya lo expresa mediante el pronombre independiente.
  - Se evita introducir énfasis inexistente en כִּי, en consonancia con la revisión auditada.
