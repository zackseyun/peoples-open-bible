translation:
  language: es
  text: Porque el impío se jacta del deseo de su alma, y el avaro bendice[a], pero desprecia a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «bendice»; también puede entenderse «se bendice», o, menos probablemente en este contexto, como un eufemismo con sentido de «maldice» o «reniega».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación de la afirmación anterior; «Porque» reproduce bien esa función causal/explicativa en español sin añadir interpretación.
- source_word: הִלֵּל
  english_pob_choice: boasts
  chosen_spanish: se jacta
  alternatives_spanish:
  - se gloría
  - se alaba
  lexicon: HALOT
  rationale: En este contexto el verbo no es alabanza dirigida a Dios, sino autoexaltación del impío. «Se jacta» conserva el matiz negativo de ostentación.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado singular se traduce naturalmente como «el impío», manteniendo el valor moral fuerte del hebreo y el singular genérico.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: de
  alternatives_spanish:
  - por
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: Con el verbo de jactarse, la preposición expresa el contenido u objeto de la jactancia; en español «de» es la solución más natural y fiel al sentido.
- source_word: תַּאֲוַת נַפְשׁוֹ
  english_pob_choice: the desire of his soul
  chosen_spanish: los deseos de su alma
  alternatives_spanish:
  - el deseo de su alma
  - el anhelo de su ser
  - la pasión de su alma
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de נֶפֶשׁ como centro del apetito/deseo sin reducirla a psicología abstracta. Se pluraliza «deseos» porque el español fluye mejor con el genérico en este tipo de formulación y mantiene la idea de impulso deseado.
- source_word: וּבֹצֵעַ
  english_pob_choice: the greedy man
  chosen_spanish: el avaro
  alternatives_spanish:
  - el codicioso
  - el que obtiene ganancia injusta
  - el explotador
  lexicon: HALOT
  rationale: בצע puede implicar codicia o ganancia injusta. «El avaro» es breve, idiomático y conserva el carácter moral negativo del término sin explicitar más de lo que el hebreo exige.
- source_word: בֵּרֵךְ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - se bendice
  - bendice a sí mismo
  - bless
  - maldice
  lexicon: HALOT
  rationale: Se conserva el verbo «bendice», porque el hebreo permite esa lectura básica y el texto masorético la sostiene. La ambigüedad tradicional del pasaje se deja visible en la nota, sin resolverla artificialmente en el cuerpo del texto.
- source_word: נִאֵץ
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - menosprecia
  - rechaza
  - desdeña
  lexicon: HALOT
  rationale: El verbo expresa trato despectivo o desprecio. «Desprecia» es claro, moderno y mantiene la fuerza moral del juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la transliteración del Nombre divino según la norma del proyecto: «Yahvé», en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Relación sintáctica del segundo hemistiquio
  english_pob_reading: The greedy man blesses but despises Yahweh.
  chosen_spanish_reading: El avaro bendice y desprecia a Yahvé.
  alternative_spanish_readings:
  - El avaro se bendice y desprecia a Yahvé.
  - El avaro bendice, pero desprecia a Yahvé.
  rationale: El hebreo es comprimido y admite varias lecturas. En español se conserva la estructura más directa sin añadir pronombres ni resolver de forma excesiva la tensión textual; la ambigüedad de «bendice» se deja abierta como en la tradición auditada.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Valor del Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El proyecto exige renderizar יְהוָה como el Nombre propio, no como sustituto litúrgico. Aquí no hay indicio de cita indirecta que requiera ocultarlo.
  doctrine_reference: 'Project terminology: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés más reciente, especialmente la revisión que evitó añadir «man» y «himself», mantuvo el final como una cláusula compacta y dejó abierta la ambigüedad de בֵּרֵךְ. La versión española preserva esa tensión sin forzar una solución interpretativa adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la norma del proyecto para יהוה.
  - Se eligió «impío» para רָשָׁע, en armonía con el registro bíblico y sin suavizar el juicio moral.
  - «Desprecia» reproduce el sentido de נִאֵץ sin intensificarlo a «blasfema» o «insulta», que irían más allá del hebreo.
  - La nota conserva la ambigüedad de בֵּרֵךְ sin convertirla en una paráfrasis explicativa en el texto principal.
