  rationale: 'Se corrigen las notas para que coincidan con el audit trail inglés y con las ambigüedades reales del hebreo: la nota [a] vuelve a «joven», y la nota [b] pasa a la cláusula de envío. También se elimina una nota innecesaria sobre «me dijo» y se suaviza levemente la redacción principal para mantener cercanía al hebreo sin sonar antinatural en español.'
