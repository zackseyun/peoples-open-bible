translation:
  language: es
  text: Vio que no había hombre[a], y quedó consternado de que no hubiera quien intercediera; por eso su propio brazo le trajo salvación, y su rectitud[b] lo sostuvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombre» traduce un término hebreo singular masculino. Aquí señala la ausencia de cualquier agente humano.
    reason: cultural_note
  - marker: b
    text: 'O: «su justicia lo sostuvo». El término hebreo puede denotar tanto rectitud como justicia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - uno
  lexicon: HALOT
  rationale: El hebreo es singular masculino y, en el contexto, señala la ausencia de cualquier agente humano. «Hombre» conserva esa forma marcada sin neutralizarla en el texto principal.
- source_word: וַיִּשְׁתּוֹמֵם
  english_pob_choice: he was appalled
  chosen_spanish: se asombró
  alternatives_spanish:
  - quedó consternado
  - se horrorizó
  lexicon: HALOT
  rationale: El verbo expresa conmoción profunda o asombro impactado. «Se asombró» mantiene el sentido básico en español; el matiz de gravedad se complementa con el contexto de fracaso social y con la nota léxica.
- source_word: מַפְגִּיעַ
  english_pob_choice: to intercede
  chosen_spanish: quien intercediera
  alternatives_spanish:
  - quien interviniera
  - quien abogara
  lexicon: HALOT
  rationale: El participio hifil indica quien se pone en medio en favor de otro. «Intercediera» reproduce bien la relación mediadora y evita una formulación más vaga como «intervenir».
- source_word: זְרֹעוֹ
  english_pob_choice: his own arm
  chosen_spanish: su propio brazo
  alternatives_spanish:
  - su brazo
  - su brazo mismo
  lexicon: HALOT
  rationale: '«Brazo» conserva la metáfora hebrea de fuerza y acción decisiva. «Propio» hace explícita la fuerza reflexiva que el contexto exige: ante la ausencia de mediador humano, él mismo actúa.'
- source_word: וַתּוֹשַׁע
  english_pob_choice: brought ... salvation
  chosen_spanish: le trajo salvación
  alternatives_spanish:
  - lo salvó
  - le dio salvación
  lexicon: HALOT
  rationale: El verbo femenino concuerda con «brazo» y comunica una acción efectiva de liberación. «Le trajo salvación» mantiene audible el sustantivo «salvación» y el valor causativo/resultativo.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia y rectitud
  lexicon: HALOT
  rationale: En este versículo צדקה puede abarcar justicia y rectitud. Dado que el castellano bíblico y teológico suele distinguir mejor esta amplitud con «justicia», se la adopta aquí y se preserva la alternativa doctrinalmente relevante.
- source_word: סְמָכָתְהוּ
  english_pob_choice: upheld him
  chosen_spanish: lo sostuvo
  alternatives_spanish:
  - lo sustentó
  - lo apoyó
  lexicon: HALOT
  rationale: El verbo significa sostener o dar apoyo firme. «Lo sostuvo» es natural en español y conserva la imagen de algo que mantiene firme la acción salvadora.
theological_decisions:
- issue: Referencia de los pronombres y sujeto implícito
  english_pob_reading: Todos los pronombres se refieren a Yahvé; el versículo describe su acción salvadora iniciada por él mismo porque no se halló mediador humano.
  chosen_spanish_reading: Los pronombres se refieren a Yahvé; el versículo presenta su iniciativa salvadora sin mediador humano.
  alternative_spanish_readings:
  - Las cláusulas podrían leerse de manera más impersonal, como la manifestación de poder divino sin enfatizar la autorreferencia.
  - Podría suavizarse el reflexivo, pero se perdería la fuerza del contexto.
  rationale: 'El hebreo encadena sufijos y verbos que apuntan al mismo agente divino. La traducción debe conservar la tensión teológica: la falta de intercesor humano contrasta con la acción directa de Dios.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Renderización de צדקה
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: El término puede abarcar justicia y rectitud. En español, «justicia» comunica con más naturalidad la dimensión activa y forense que el versículo sugiere, sin negar su trasfondo de rectitud pactal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / righteousness ~ justice'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo masorético y del aparato auditado en inglés. Se mantuvo la estructura paralela del verso, la referencia singular masculina de אִישׁ, la fuerza mediadora de מַפְגִּיעַ, la metáfora del brazo como agente de salvación y la ambigüedad relevante de צדקה entre justicia y rectitud.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar para el nombre divino según las pautas del proyecto.
  - «Intercediera» preserva el matiz relacional y mediador de מַפְגִּיעַ.
  - «Le trajo salvación» mantiene el sustantivo «salvación» audible, en línea con el audit trail inglés.
  - La nota [b] preserva la alternativa semántica relevante sin introducir terminología eclesiástica ajena al texto.
