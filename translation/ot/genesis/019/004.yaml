id: GEN.19.4
reference: Genesis 19:4
source:
  edition: WLC
  text: טֶרֶם֮ יִשְׁכָּבוּ֒ וְ/אַנְשֵׁ֨י הָ/עִ֜יר אַנְשֵׁ֤י סְדֹם֙ נָסַ֣בּוּ עַל הַ/בַּ֔יִת מִ/נַּ֖עַר וְ/עַד זָקֵ֑ן כָּל הָ/עָ֖ם מִ/קָּצֶֽה־־־׃
translation:
  text: Before they lay down[a], the men of the city, the men of Sodom, surrounded the house—from young to old[c][b], all the people from every quarter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encircled the house' or 'gathered around the house.' The Hebrew verb can denote surrounding or assembling around, with the context suggesting an enclosing crowd.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from young to old,' a merism meaning people across the full age range.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the end'; idiomatically, 'from every quarter' or 'from every part of the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם
  chosen: Before
  alternatives:
  - Before they had lain down
  - Before they went to bed
  lexicon: HALOT
  rationale: Temporal adverb introducing the action that precedes the city's gathering. 'Before' is the plain and natural English equivalent.
- source_word: יִשְׁכָּבוּ
  chosen: they lay down
  alternatives:
  - they had lain down
  - they went to bed
  lexicon: HALOT
  rationale: From שׁכב, here referring to lying down for the night. 'Lay down' preserves the concrete verbal sense without over-paraphrasing; 'went to bed' is possible but slightly more interpretive.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the townsmen
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of,' not a gender-neutral collective. In this context the masculine reference is intentional and should be preserved per the gender-accurate policy.
- source_word: אַנְשֵׁי סְדֹם
  chosen: the men of Sodom
  alternatives:
  - the men of Sodom city
  - the Sodomite men
  lexicon: HALOT
  rationale: Appositional restatement identifying which city's men are in view. 'The men of Sodom' is the most natural and direct rendering.
- source_word: נָסַבּוּ עַל הַבַּיִת
  chosen: surrounded the house
  alternatives:
  - encircled the house
  - gathered around the house
  lexicon: HALOT
  rationale: The verb נסב with עַל conveys surrounding or gathering around. 'Surrounded the house' best captures the hostile, enclosing sense in idiomatic English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the home
  lexicon: HALOT
  rationale: Straightforward reference to Lot's house. 'House' is more literal and contextually appropriate than 'home.'
- source_word: מִנַּעַר וְעַד זָקֵן
  chosen: from young to old
  alternatives:
  - from boy to old man
  - from the young to the old
  lexicon: HALOT
  rationale: An idiomatic merism indicating the full age range. 'From young to old' is natural English and preserves the sense of comprehensiveness without forcing overly narrow age labels.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  - all the men
  lexicon: HALOT
  rationale: Though the verse begins with 'the men of the city,' this phrase broadens to the whole populace as a collective. 'All the people' best reflects the noun עָם without unnecessarily narrowing it.
- source_word: מִקָּצֶה
  chosen: from every part of the city
  alternatives:
  - from every quarter
  - from the farthest end
  - from every part
  lexicon: HALOT
  rationale: Literally 'from the extremity/end,' here idiomatically meaning from every quarter of the city. Adding 'of the city' makes explicit the implied referent in smooth English.
