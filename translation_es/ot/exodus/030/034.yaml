translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Toma para ti especias: estacte, onycha y galbano, especias, y incienso puro; estarán en partes iguales».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identidad exacta de estacte y onycha es incierta; el hebreo probablemente se refiere a ingredientes aromáticos específicos para el incienso, tradicionalmente traducidos de esta manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton, conforme al criterio de la POB en inglés; en español, «Yahvé» es la forma transparente y reconocible para el nombre divino, evitando la sustitución por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «Entonces ... dijo» preserva la secuencia con naturalidad en español.
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: Toma para ti
  alternatives_spanish:
  - Toma
  - Tómate
  lexicon: HALOT
  rationale: El imperativo con לְךָ añade un matiz personal/reflexivo. «Toma para ti» lo comunica sin forzar una forma extraña.
- source_word: סַמִּים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromáticos
  - sustancias aromáticas
  lexicon: HALOT
  rationale: Término amplio para ingredientes aromáticos; «especias» es claro y natural en el contexto de la mezcla para incienso.
- source_word: נָטָף
  english_pob_choice: stacte
  chosen_spanish: estacte
  alternatives_spanish:
  - resina aromática
  - goma aromática
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional del ingrediente, dado que su identificación botánica exacta es incierta.
- source_word: שְׁחֵלֶת
  english_pob_choice: onycha
  chosen_spanish: onycha
  alternatives_spanish:
  - opérculo aromático
  - sustancia aromática de concha
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional y transliterado por la misma incertidumbre referencial presente en el original.
- source_word: חֶלְבְּנָה
  english_pob_choice: galbanum
  chosen_spanish: galbano
  alternatives_spanish:
  - galbano aromático
  - resina de galbano
  lexicon: HALOT
  rationale: La identificación habitual del término es galbanum; «galbano» funciona como equivalente hispano reconocido y conservador.
- source_word: לְבֹנָה זַכָּה
  english_pob_choice: pure frankincense
  chosen_spanish: incienso puro
  alternatives_spanish:
  - olíbano puro
  - franquincienso puro
  lexicon: HALOT
  rationale: לְבֹנָה designa el incienso/olíbano; «incienso puro» reproduce bien el sentido adjetival de זַכָּה. Se evita «franqueincenso» por ser menos natural en español.
- source_word: בַּד בְּבַד
  english_pob_choice: in equal parts
  chosen_spanish: en partes iguales
  alternatives_spanish:
  - parte por parte
  - cada uno por igual
  lexicon: HALOT
  rationale: El modismo expresa proporción igual entre los ingredientes. «En partes iguales» comunica el valor idiomático con claridad.
- source_word: יִהְיֶה
  english_pob_choice: they shall be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - habrán de estar
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el sentido recae colectivamente sobre los ingredientes; «estarán» suena natural en español y mantiene la lectura colectiva.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre divino en forma transliterada, coherente con la POB y con el principio de no ocultar el nombre propio en favor de un sustituto funcional.
  doctrine_reference: Éxodo 3:15; uso consistente del nombre propio de Dios en la POB
- issue: Referencia a ingredientes inciertos
  english_pob_reading: The exact identities of 'stacte' and 'onycha' are uncertain; the Hebrew likely refers to specific aromatic incense ingredients, traditionally rendered this way.
  chosen_spanish_reading: Se conservan los nombres tradicionales de los ingredientes, sin resolver indebidamente la incertidumbre botánica.
  alternative_spanish_readings:
  - goma aromática
  - sustancia de concha aromática
  rationale: La incertidumbre léxica forma parte del dato textual; no conviene cerrar el sentido con una identificación demasiado específica que el hebreo no garantiza.
  doctrine_reference: Principio de transparencia lexical y honestidad textual
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió una coma después de la segunda aparición de 'spices' y explicitó la conjunción antes de 'pure frankincense' como 'and'. En español se mantiene la acumulación coordinada de ingredientes con puntuación equivalente y una conjunción explícita antes del último miembro.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene terminología tradicional solo donde la incertidumbre léxica lo exige.
  - «En partes iguales» refleja el modismo hebreo בַּד בְּבַד sin expandirlo innecesariamente.
  - Se evita «Cristo», «SEÑOR» y otras sustituciones no presentes en el texto fuente.
