  yaml_path: translation/ot/zephaniah/001/016.yaml
  text: a day of trumpet and battle cry against the fortified cities and against the high battlements[a][b].
  footnotes:
  - marker: a
    text: Or "a day of trumpet and alarm" or "a day of trumpet and shouting." The Hebrew term translated "battle cry" can denote a loud shout, alarm signal, or war cry; the military sense is favored by the context of attack on fortified cities.
    reason: lexical_alternative
  - marker: b
    text: Literally "the high corners." This likely refers to elevated corner fortifications or corner towers of city walls.
    reason: lexical_alternative
