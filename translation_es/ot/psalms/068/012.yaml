translation:
  language: es
  text: El Señor da la palabra[a][b]; las mujeres que anuncian las buenas noticias son una gran hueste[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje» o «la orden» para «la palabra».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene un participio femenino plural: «las mujeres que traen buenas noticias» o «las heraldas».'
    reason: lexical_alternative
  - marker: c
    text: O «un gran ejército» o «una gran compañía».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: HALOT
  rationale: La forma funciona aquí como título divino; en español, «El Señor» es la manera natural y reverente de reproducir el valor titular sin sustituirlo por un término más interpretativo. Se conserva la mayúscula por tratarse de referencia a Dios.
- source_word: יִתֶּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - dará
  - entrega
  lexicon: HALOT
  rationale: El yiqtol hebreo admite valor presente o futuro en poesía. «Da» refleja bien el sentido gnómico/proclamativo del verso y suena natural en español bíblico contemporáneo.
- source_word: אֹמֶר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la orden
  - el dicho
  lexicon: HALOT
  rationale: «La palabra» preserva la densidad poética de אֹמֶר y permite la amplitud semántica de habla, mensaje u आदेश. Se mantiene la alternativa «mensaje» en nota porque el término también puede enfatizar el contenido comunicado.
- source_word: הַמְבַשְּׂרוֹת
  english_pob_choice: the women who announce the good news
  chosen_spanish: las mujeres que anuncian la buena noticia
  alternatives_spanish:
  - las mujeres que traen buenas noticias
  - las heraldas
  - las anunciadoras de buenas noticias
  lexicon: HALOT
  rationale: El participio femenino plural debe conservarse explícitamente en español. «Anuncian la buena noticia» reproduce el valor de בִּשֵּׂר con un giro claro y digno, sin neutralizar el género marcado del hebreo.
- source_word: צָבָא
  english_pob_choice: host
  chosen_spanish: ejército
  alternatives_spanish:
  - hueste
  - multitud
  - compañía
  lexicon: HALOT
  rationale: En este contexto el sustantivo puede tener matiz colectivo y militar. «Ejército» transmite con fuerza esa imaginería, mientras que «hueste» sería una alternativa más tradicional pero menos transparente para lectores modernos.
- source_word: רָב
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - numeroso
  lexicon: HALOT
  rationale: «Gran» es la colocación natural en español con un sustantivo como «ejército» y conserva el sentido de magnitud expresado por רָב.
theological_decisions:
- issue: Tratamiento del nombre/título divino אֲדֹנָי
  english_pob_reading: The Lord
  chosen_spanish_reading: El Señor
  alternative_spanish_readings:
  - Señor
  rationale: Aunque la forma hebrea es אֲדֹנָי y no el Tetragrámaton, el contexto poético la usa como título divino. En español, «El Señor» es el equivalente titular más claro y reverente, sin introducir una convención ajena al versículo.
  doctrine_reference: DOCTRINE.md §Nombre divino y títulos reverenciales
- issue: Género marcado del participio הַמְבַשְּׂרוֹת
  english_pob_reading: 'Render explicitly as female: ''the women who announce the good news'''
  chosen_spanish_reading: las mujeres que anuncian la buena noticia
  alternative_spanish_readings:
  - las mujeres que traen buenas noticias
  - las heraldas
  rationale: Se conserva el género femenino explícito porque el hebreo lo marca con claridad. No se neutraliza a «mensajeros» ni «quienes», ya que eso borraría un rasgo gramatical y literario del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final informó alta concordancia; por eso se mantiene la solución establecida, con ajustes de formulación al español y conservación de las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se usa «El Señor» como título divino reverencial en esta línea poética.
  - Se conserva el femenino plural explícito en «las mujeres que anuncian la buena noticia».
  - «la palabra» se entiende en sentido amplio de dicho/mensaje/comando, según el contexto poético.
  - «ejército» traduce el matiz colectivo de צָבָא y queda apoyado por una nota con alternativas.
  - La puntuación y las mayúsculas siguen el uso estándar del español bíblico contemporáneo.
