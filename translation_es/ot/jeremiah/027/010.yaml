- from: Porque profetizan mentiras[a] para ustedes, con el fin de alejarlos de su tierra; y yo los expulsaré[b][c], y ustedes perecerán.
  to: Porque les profetizan mentiras[a], con el fin de alejarlos de su tierra; y yo los expulsaré[b][c], y ustedes perecerán.
  rationale: Se corrige «para ustedes» a «les» para expresar de manera fiel y natural el dativo hebreo לָכֶם en español. Se mantiene «mentiras», «con el fin de», «de su tierra», «yo los expulsaré» y «perecerán» porque preservan bien el sentido del fuente y la decisión auditada en inglés. También se simplifica la nota a para que encaje mejor con el texto revisado.
