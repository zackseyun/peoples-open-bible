translation:
  language: es
  text: Hoy Yahvé te entregará[a] en mi mano, y yo te heriré y te quitaré la cabeza. Y hoy daré los cadáveres del campamento de los filisteos a las aves del cielo y a los animales salvajes de la tierra, para que toda la tierra sepa que hay un Dios para Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hay un Dios en Israel". El hebreo dice literalmente "para Israel", lo que puede expresar relación de pacto o defensa en favor de Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama en español como 'Yahvé', siguiendo la decisión doctrinal del proyecto y evitando la sustitución titular 'SEÑOR'.
- source_word: יְסַגֶּרְךָ
  english_pob_choice: will deliver you into my hand
  chosen_spanish: te entregará en mi mano
  alternatives_spanish:
  - te pondrá en mi mano
  - te entregará en mi poder
  - te entregará en mis manos
  lexicon: HALOT
  rationale: El hifil de סגר expresa entregar o poner a alguien bajo poder ajeno. 'Te entregará en mi mano' mantiene la imagen hebrea y el sentido militar/judicial.
- source_word: בְּיָדִי
  english_pob_choice: into my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mis manos
  - bajo mi poder
  lexicon: HALOT
  rationale: La imagen hebrea de 'mano' se conserva en español sin forzar una abstracción prematura como 'poder'.
- source_word: וְהִכִּיתִךָ
  english_pob_choice: I will strike you down
  chosen_spanish: yo te heriré
  alternatives_spanish:
  - yo te golpearé
  - yo te derribaré
  - yo te mataré
  lexicon: HALOT
  rationale: נכה puede significar herir, golpear o matar según el contexto. 'Heriré' conserva la fuerza bélica sin adelantar más de lo que el verbo exige, y la secuencia posterior ya muestra el resultado letal.
- source_word: וַהֲסִרֹתִי אֶת רֹאשְׁךָ מֵעָלֶיךָ
  english_pob_choice: remove your head from you
  chosen_spanish: quitaré tu cabeza de sobre ti
  alternatives_spanish:
  - cortaré tu cabeza
  - tomaré tu cabeza de sobre ti
  - separaré tu cabeza de sobre ti
  lexicon: HALOT
  rationale: El hebreo usa 'quitar/retirar' (סור) en vez de un verbo explícito de cortar; por eso se conserva una formulación cercana al original que sigue implicando la decapitación por el contexto.
- source_word: פֶּגֶר
  english_pob_choice: corpses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - los cuerpos muertos
  - los cuerpos
  - los despojos
  lexicon: HALOT
  rationale: פֶּגֶר designa un cuerpo muerto; 'cadáveres' es natural en español y mantiene el tono gráfico del pasaje bélico.
- source_word: מַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the Philistine camp
  chosen_spanish: el campamento de los filisteos
  alternatives_spanish:
  - el campamento filisteo
  - el ejército de los filisteos
  - el campamento filisteo
  lexicon: HALOT
  rationale: La construcción de estado constructo se expresa con claridad en español como 'campamento de los filisteos', sin perder el referente militar encampado.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: to the birds of the sky
  chosen_spanish: a las aves del cielo
  alternatives_spanish:
  - a las aves del cielo
  - a las aves del firmamento
  - a los pájaros del cielo
  lexicon: HALOT
  rationale: '''Aves del cielo'' reproduce la expresión hebrea de modo natural y respetuoso; ''aves'' es más digno y bíblico que ''pájaros'' en este registro.'
- source_word: וּלְחַיַּת הָאָרֶץ
  english_pob_choice: to the wild animals of the earth
  chosen_spanish: y a las bestias de la tierra
  alternatives_spanish:
  - y a los animales de la tierra
  - y a las fieras de la tierra
  - y a las bestias del campo
  lexicon: HALOT
  rationale: '''Bestias de la tierra'' conserva el paralelismo bíblico tradicional y el campo semántico de animales salvajes sin suavizarlo demasiado.'
- source_word: וְיֵדְעוּ כָּל הָאָרֶץ
  english_pob_choice: so that all the earth may know
  chosen_spanish: para que toda la tierra sepa
  alternatives_spanish:
  - para que toda la tierra conozca
  - y toda la tierra sabrá
  - de modo que toda la tierra sepa
  lexicon: HALOT
  rationale: La forma final expresa resultado/intención. 'Para que ... sepa' es natural en español y conserva la amplitud retórica de 'toda la tierra'.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el mundo
  - toda la tierra
  - todo el país
  lexicon: HALOT
  rationale: Se preserva la amplitud hebrea del término sin restringirlo a territorio local.
- source_word: יֵשׁ אֱלֹהִים לְיִשְׂרָאֵל
  english_pob_choice: there is a God for Israel
  chosen_spanish: hay un Dios para Israel
  alternatives_spanish:
  - hay un Dios en Israel
  - Israel tiene un Dios
  - hay un Dios de Israel
  lexicon: HALOT
  rationale: La preposición ל admite relación, pertenencia o dirección. 'Para Israel' mantiene la decisión auditada del POB inglés y deja visible la fuerza de advocación/covenio sin resolverla prematuramente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a YHWH. En el proyecto, la traducción española usa 'Yahvé' como transliteración del nombre divino, preservando su referencia personal y de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: The force of לְיִשְׂרָאֵל
  english_pob_reading: there is a God for Israel
  chosen_spanish_reading: hay un Dios para Israel
  alternative_spanish_readings:
  - hay un Dios en Israel
  - Israel tiene un Dios
  rationale: Se conserva la tensión entre pertenencia, relación y favor/covenio. 'Para Israel' refleja la lectura auditada del POB inglés sin excluir la alternativa idiomática 'en Israel', que sigue siendo plausible en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y no se introdujeron cambios sustantivos respecto de su última revisión, que quedó marcada como sin cambios y con alto grado de acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma constante para יְהוָה.
  - Se conserva la imagen corporal y bélica del hebreo sin suavizarla innecesariamente.
  - La nota al pie se ancla en 'para Israel' para preservar la ambigüedad documentada de לְיִשְׂרָאֵל.
  - El registro es bíblico, claro y apto para lectura pública en español latinoamericano.
