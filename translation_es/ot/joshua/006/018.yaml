  text: וְ/רַק אַתֶּם֙ שִׁמְר֣וּ מִן הַ/חֵ֔רֶם פֶּֽן תַּחֲרִ֖ימוּ וּ/לְקַחְתֶּ֣ם מִן הַ/חֵ֑רֶם וְ/שַׂמְתֶּ֞ם אֶת מַחֲנֵ֤ה יִשְׂרָאֵל֙ לְ/חֵ֔רֶם וַ/עֲכַרְתֶּ֖ם אוֹתֽ/וֹ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/006/018.yaml
  text: But as for you[a], keep yourselves from the things devoted to destruction, lest you yourselves become devoted to destruction and take some of the things devoted to destruction, and make the camp of Israel devoted to destruction[c][b], and bring trouble on it.
  footnotes:
  - marker: a
    text: Hebrew חֵרֶם (cherem), traditionally 'the ban' or 'the accursed thing'; here it refers to persons or things irrevocably devoted to God for destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you put yourselves under the ban.'
    reason: alternative_reading
  - marker: c
    text: '''Bring trouble on it'' echoes the theme later seen in Achan''s sin and its consequences for Israel (Josh 7:1, 25).'
    reason: cross_reference
