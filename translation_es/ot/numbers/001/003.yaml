  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: umbral de edad, elegibilidad militar, marco nacional, mandato de contar y organización por compañías. Sin embargo, omite en el texto principal la explicitación masculina que el expediente inglés documenta como requerida por el contexto del capítulo y por la decisión teológica/lexical de ''every man going out to war''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''todo el que sale para la guerra'' suena algo menos natural y menos preciso que una formulación que exprese varones aptos para la guerra. Además, la raya de inciso está mal cerrada: se abre antes de ''tú y Aarón'' pero no se cierra. El resto del verso fluye bien.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. 'Aarón' y 'Israel' están bien. 'Compañías' sigue correctamente la revisión inglesa para לְצִבְאֹתָם. La principal desviación es no preservar en español la decisión auditada de lenguaje masculino explícito para la elegibilidad militar.
  issues:
  - severity: high
    issue: Falta explicitación masculina en 'todo el que sale para la guerra'
    rationale: 'El expediente inglés no usa lenguaje neutro aquí por razón contextual y doctrinalmente documentada: el censo del capítulo es de varones elegibles para servicio militar. El español debería preservar esa restricción en el texto principal, no solo dejarla implícita.'
  - severity: medium
    issue: '''sale para la guerra'' es menos idiomático en español bíblico natural'
    rationale: Aunque intenta conservar la imagen concreta, en español suena más natural 'sale a la guerra' o una formulación equivalente. La preposición 'para' aquí resulta algo forzada.
  - severity: low
    issue: La raya de inciso no está cerrada
    rationale: Se abre '—tú y Aarón...' pero falta la raya de cierre antes del punto. Es un detalle tipográfico/estilístico.
