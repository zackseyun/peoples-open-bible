translation:
  language: es
  text: Los haré un horror[a], una calamidad, para todos los reinos de la tierra; una afrenta, un proverbio, una burla[b] y una maldición, en todos los lugares adonde los eche[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un objeto de horror» para «un horror».
    reason: lexical_alternative
  - marker: b
    text: «Proverbio» también puede traducirse aquí como «refrán» o «dicho proverbial», pues el sentido es un dicho repetido acerca de ellos con desprecio.
    reason: lexical_alternative
  - marker: c
    text: O «adonde los destierre». El verbo puede significar «echar», «expulsar» o «desterrar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  english_pob_choice: I will make them
  chosen_spanish: los convertiré
  alternatives_spanish:
  - los haré
  - los pondré
  lexicon: HALOT
  rationale: נתן con una construcción predicativa expresa hacer que alguien llegue a un estado o condición. En español, «convertiré» comunica bien ese cambio de estado sin sugerir una simple entrega o donación.
- source_word: לְזַוֲעָה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - un objeto de horror
  - un terror
  lexicon: HALOT
  rationale: El sustantivo denota algo que causa espanto o horror. «Un horror» conserva la fuerza nominal y sigue siendo natural en español.
- source_word: לְרָעָה
  english_pob_choice: a calamity
  chosen_spanish: una calamidad
  alternatives_spanish:
  - un mal
  - un desastre
  lexicon: HALOT
  rationale: Aquí la forma nominal va en serie con «un horror» y describe el estado resultante del juicio. «Calamidad» refleja bien el valor de desastre/ruina y evita suavizar el término a una idea meramente moral.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: to all the kingdoms of the earth
  chosen_spanish: para todos los reinos de la tierra
  alternatives_spanish:
  - ante todos los reinos de la tierra
  - entre todos los reinos de la tierra
  lexicon: HALOT
  rationale: La preposición puede indicar alcance o esfera. «Para todos los reinos de la tierra» mantiene el campo de referencia universal del reproche sin sobrecargar la sintaxis.
- source_word: לְחֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: en afrenta
  alternatives_spanish:
  - en reproche
  - en vergüenza
  lexicon: HALOT
  rationale: חרפה suele expresar deshonra, afrenta o vergüenza pública. «En afrenta» es claro y conserva el matiz de deshonra social/profética.
- source_word: וּלְמָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: en proverbio
  alternatives_spanish:
  - en dicho
  - en refrán
  lexicon: HALOT
  rationale: En contextos de juicio, משל puede ser una fórmula o dicho repetido acerca de alguien. «En proverbio» conserva la correspondencia léxica y el tono bíblico.
- source_word: לִשְׁנִינָה
  english_pob_choice: a taunt
  chosen_spanish: en burla
  alternatives_spanish:
  - en escarnio
  - en mote
  lexicon: HALOT
  rationale: El término raro apunta a habla despectiva, repetida con intención de ridiculizar. «En burla» comunica el carácter mockingly despectivo de forma natural en español.
- source_word: וְלִקְלָלָה
  english_pob_choice: a curse
  chosen_spanish: y en maldición
  alternatives_spanish:
  - y en anatema
  - y en maldito ejemplo
  lexicon: HALOT
  rationale: קללה significa maldición/curse. «Maldición» es el equivalente más directo y comprensible en español bíblico contemporáneo.
- source_word: בְּכָל הַמְּקֹמוֹת
  english_pob_choice: in all the places
  chosen_spanish: en todos los lugares
  alternatives_spanish:
  - en todos los sitios
  - por todos los lugares
  lexicon: HALOT
  rationale: La frase es locativa y general. «En todos los lugares» mantiene la amplitud y suena natural en español.
- source_word: אֲשֶׁר אַדִּיחֵם שָׁם
  english_pob_choice: where I drive them
  chosen_spanish: adonde los eche
  alternatives_spanish:
  - donde los destierre
  - adonde los expulse
  lexicon: HALOT
  rationale: El Hiphil de נדח puede significar echar, expulsar o desterrar. «Eche» conserva la imagen de expulsión/impulso fuera de un lugar sin fijar más de lo que el verbo exige; la relativa con «adonde» expresa bien el desplazamiento.
theological_decisions:
- issue: Acumulación de sustantivos de juicio
  english_pob_reading: Render the sequence as a list of statuses/results of divine judgment rather than smoothing it into a single paraphrased consequence.
  chosen_spanish_reading: 'Conservar la cadena de nombres: «un horror, una calamidad, ... en afrenta, en proverbio, en burla y en maldición».'
  alternative_spanish_readings:
  - los haré objeto de horror y de desprecio entre todas las naciones
  - los volveré un ejemplo de juicio
  rationale: El hebreo intensifica el juicio mediante una serie de sustantivos con repetidas preposiciones. La lista española preserva ese peso retórico y evita diluirlo en una paráfrasis general.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de לְרָעָה en este contexto
  english_pob_reading: a calamity
  chosen_spanish_reading: una calamidad
  alternative_spanish_readings:
  - un mal
  - un desastre
  rationale: La revisión inglesa preferida corrigió una opción demasiado general. En español, «calamidad» recoge mejor el matiz de ruina/judgment sin cargarlo con una lectura moralista ajena al contexto.
  doctrine_reference: HALOT; applied revision pass
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que sustituyó «an evil thing» por «a calamity» en לְרָעָה para mayor precisión. También mantiene la estructura acumulativa de sustantivos y la ambigüedad controlada del verbo final, sin suavizar el registro profético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se conserva la serie nominal con preposiciones repetidas para reflejar el hebreo, en lugar de condensarla en una sola frase explicativa.
  - «Burla» se usa para לִשְׁנִינָה para distinguirla de «proverbio» y conservar el matiz de ridiculización pública.
  - La puntuación con punto y coma y comas reproduce la cadencia acumulativa del original y facilita la lectura litúrgica o comunitaria.
