translation:
  language: es
  text: Y el necio[a] multiplica palabras. El ser humano[b] no sabe qué será, ¿y quién puede decírselo, lo que será después de él[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el insensato». El hebreo tiene el singular definido הַסָּכָל.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Un hombre no sabe» o «La humanidad no sabe». El hebreo usa הָאָדָם, un singular representativo de la humanidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo que sucederá después de él» o «lo que será cuando él ya no esté». El hebreo puede referirse a lo que viene después de una persona en el tiempo, especialmente después de su vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַסָּכָל
  english_pob_choice: And the fool
  chosen_spanish: Y el necio
  alternatives_spanish:
  - Pero el necio
  - Y el insensato
  lexicon: HALOT
  rationale: הַסָּכָל designa al necio o insensato. En español, «necio» conserva bien el valor sapiencial del término y suena más natural que un calco. Se mantiene la conjunción inicial con «Y» para seguir el flujo discursivo del hebreo; «Pero» es posible, pero menos seguro sin una señal más explícita de contraste.
- source_word: יַרְבֶּה דְבָרִים
  english_pob_choice: multiplies words
  chosen_spanish: multiplica palabras
  alternatives_spanish:
  - habla mucho
  - aumenta palabras
  - sigue hablando
  lexicon: HALOT
  rationale: La construcción hiphil con דְבָרִים expresa hablar en abundancia. «Multiplica palabras» preserva la imagen hebrea y el paralelismo con la traducción inglesa POB sin volverse demasiado literal para el español moderno.
- source_word: לֹא יֵדַע הָאָדָם
  english_pob_choice: A man does not know
  chosen_spanish: El ser humano no sabe
  alternatives_spanish:
  - Un hombre no sabe
  - La humanidad no sabe
  - Nadie sabe
  lexicon: HALOT
  rationale: הָאָדָם es un singular representativo de la humanidad. En español, «el ser humano» comunica mejor ese valor genérico que «un hombre», que puede sonar masculino restringido. Se evita «nadie» porque sería más interpretativo que el hebreo.
- source_word: מַה שֶׁיִּהְיֶה
  english_pob_choice: what will be
  chosen_spanish: qué será
  alternatives_spanish:
  - qué va a pasar
  - qué ocurrirá
  - lo que será
  lexicon: HALOT
  rationale: La frase es una referencia abierta al futuro. «Qué será» es breve, natural y fiel al alcance indeterminado del hebreo.
- source_word: וַאֲשֶׁר יִהְיֶה מֵאַחֲרָיו
  english_pob_choice: what will be after him
  chosen_spanish: lo que será después de él
  alternatives_spanish:
  - lo que sucederá después de él
  - lo que vendrá tras él
  - lo que será cuando él ya no esté
  lexicon: HALOT
  rationale: La expresión admite el matiz de lo que viene después de la persona, incluso después de su vida. «Después de él» mantiene la ambigüedad del hebreo y se corresponde con la nota inglesa que señala esa posibilidad temporal.
- source_word: מִי יַגִּיד לוֹ
  english_pob_choice: who can tell him
  chosen_spanish: quién le dirá
  alternatives_spanish:
  - quién puede decirle
  - quién se lo dirá
  - quién podrá declarárselo
  lexicon: HALOT
  rationale: La pregunta retórica del hebreo pide un informante capaz de comunicarle eso. «Quién le dirá» conserva la naturalidad del español y la fuerza interrogativa, sin forzar un verbo más técnico como «declarar».
theological_decisions:
- issue: Valor genérico de הָאָדָם
  english_pob_reading: A man does not know; the Hebrew has the singular הָאָדָם, a representative singular for humanity.
  chosen_spanish_reading: El ser humano no sabe
  alternative_spanish_readings:
  - Un hombre no sabe
  - La humanidad no sabe
  - Nadie sabe
  rationale: Se conserva el carácter representativo del singular hebreo, pero en español se evita una lectura masculinizada innecesaria. «El ser humano» expresa de forma clara y digna la referencia universal.
  doctrine_reference: Gender-accurate translation principle; generic singular in Hebrew wisdom literature.
- issue: Alcance temporal de lo que viene 'después de él'
  english_pob_reading: what will be after him; what will be after he is gone
  chosen_spanish_reading: lo que será después de él
  alternative_spanish_readings:
  - lo que será cuando él ya no esté
  - lo que sucederá después de él
  - lo que vendrá tras él
  rationale: 'La formulación española deja abierta la misma tensión que el hebreo y la nota inglesa: puede referirse tanto a lo que sigue en el tiempo como a lo que ocurre después de la vida de la persona. No se resuelve la ambigüedad en exceso.'
  doctrine_reference: Wisdom literature temporal ambiguity; faithful preservation of semantic range.
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se documentaron cambios posteriores: latest_revision_pass indica que no hubo modificaciones y cross_check_summary reporta alto acuerdo. La versión española conserva las dos ambigüedades principales señaladas por la POB: el valor genérico de הָאָדָם y la referencia temporal de מֵאַחֲרָיו.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma del proyecto, aunque este versículo no contiene el tetragrama.
  - Se prefirió «necio» para reflejar el tono sapiencial de הַסָּכָל; «insensato» queda como alternativa registrada.
  - Se usó el singular genérico «el ser humano» para evitar una restricción masculina indebida y conservar el valor representativo del hebreo.
  - La puntuación final con signo de interrogación refleja la pregunta retórica del hebreo; si el flujo editorial prefiere el estilo castellano, puede normalizarse a cierre interrogativo completo según maquetación del libro.
