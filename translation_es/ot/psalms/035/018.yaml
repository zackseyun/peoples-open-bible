translation:
  language: es
  text: Te daré gracias en la gran asamblea[a]; entre un pueblo poderoso[b] te alabaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la gran congregación».
    reason: lexical_alternative
  - marker: b
    text: O «entre un pueblo numeroso» o «entre un pueblo fuerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: א֭וֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Te confesaré
  lexicon: HALOT
  rationale: El hebreo hifil de ידה en contexto de adoración suele expresar dar gracias; en español, «daré gracias» conserva la distinción frente al verbo siguiente de alabanza y evita fundir ambos miembros en una sola idea.
- source_word: בְּקָהָל רָב
  english_pob_choice: in the great assembly
  chosen_spanish: en la gran asamblea
  alternatives_spanish:
  - en la gran congregación
  - en la asamblea numerosa
  lexicon: HALOT
  rationale: קָהָל señala una reunión convocada; «asamblea» es natural en español bíblico moderno. רָב funciona como adjetivo de tamaño/importancia, por eso «gran» comunica bien el valor de reunión pública y numerosa.
- source_word: בְּעַם עָצ֣וּם
  english_pob_choice: among a mighty people
  chosen_spanish: entre un pueblo poderoso
  alternatives_spanish:
  - entre un pueblo numeroso
  - entre un pueblo fuerte
  - entre una multitud poderosa
  lexicon: HALOT
  rationale: עַם es «pueblo» y עָצוּם puede denotar fuerza, poder o gran número. «Poderoso» conserva esa amplitud sin decidir de forma innecesaria entre fuerza militar, prestigio o cantidad.
- source_word: אֲהַֽלְלֶֽךָּ
  english_pob_choice: I will praise you
  chosen_spanish: te alabaré
  alternatives_spanish:
  - te ensalzaré
  - te celebraré
  lexicon: HALOT
  rationale: El piel de הלל expresa alabar o ensalzar; «alabaré» es la opción más directa y natural en español y mantiene el paralelismo con «daré gracias».
translation_notes:
  revision_awareness: El texto sigue el sentido confirmado por el hebreo masorético y conserva la distinción poética entre agradecer y alabar. La revisión inglesa más reciente no introdujo cambios, y el control cruzado señaló solo una diferencia menor de preferencia léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no lo contiene.
  - «Asamblea» conserva mejor el matiz de reunión pública que «iglesia».
  - «Pueblo poderoso» mantiene la ambigüedad semántica de עָצוּם sin forzar una lectura exclusivamente numérica o exclusivamente militar.
