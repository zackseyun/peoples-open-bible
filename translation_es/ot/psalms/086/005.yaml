  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: כִּי como causal inicial, pronombre enfático «tú», título divino אֲדֹנָי como «Señor», predicados «bueno» y «perdonador», y la idea de רַב חֶסֶד hacia quienes lo invocan. También preserva correctamente la nota alternativa con «dispuesto a perdonar» / «grande en amor leal».'
  spanish_quality_summary: 'El español es claro y digno, pero dos elecciones suenan menos naturales de lo deseable en español bíblico contemporáneo: «perdonador» es comprensible pero algo tosco, y «para todos los que te invocan» fluye peor que «con todos los que te invocan» o «hacia todos los que te invocan» en combinación con «abundante en amor leal». Una leve pulida mejora la naturalidad sin perder precisión.'
  glossary_alignment: «Señor» para אֲדֹנָי está correctamente alineado con la distinción frente a Yahvé. «Amor leal» es una opción defendible para חֶסֶד y sigue la rationale auditada. «Invocan» también está bien alineado. El único ajuste recomendado es preferir una formulación más idiomática para סַלָּח y para la relación de רַב חֶסֶד con sus beneficiarios.
  issues:
  - severity: medium
    issue: «perdonador» suena menos idiomático que «dispuesto a perdonar» en este contexto.
    rationale: Aunque «perdonador» puede defenderse léxicamente, en español eclesial general resulta menos natural y menos elegante que una formulación que exprese la disposición al perdón, la cual además está documentada en la alternativa inglesa y encaja bien con סַלָּח.
  - severity: low
    issue: «abundante en amor leal para todos los que te invocan» tiene una preposición poco natural en español.
    rationale: «Para todos» no es incorrecto, pero con «abundante en amor leal» la relación suena más natural como «con todos los que te invocan», preservando el sentido de benevolencia dirigida hacia ellos.
  revised_spanish_text: Porque tú[a], Señor, eres bueno y dispuesto a perdonar, abundante en amor leal con todos los que te invocan.
  revised_footnotes:
  - marker: a
    text: 'O: «Porque tú, Señor, eres bueno y perdonador, y grande en amor leal con todos los que te invocan».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «perdonador» a «dispuesto a perdonar» para lograr un español más natural y plenamente fiel al valor adjetival de סַלָּח, apoyado además por la alternativa ya documentada en la auditoría inglesa. Se cambia «para todos» por «con todos» para mejorar la idiomaticidad con «abundante en amor leal», sin alterar el sentido de חֶסֶד dirigido a quienes invocan a Dios. La nota se actualiza de forma paralela y mantiene la alternativa significativa «perdonador / grande en amor leal».
