revisions:
- from: cuando venga tu pavor como una tormenta[a], y tu calamidad llegue como un torbellino, cuando vengan sobre ustedes la angustia y la opresión.
  to: cuando venga vuestro pavor como una tormenta[a], y vuestra calamidad llegue como un torbellino, cuando vengan sobre ustedes la aflicción y la angustia.
  rationale: Se corrige la incoherencia de tratamiento ajustando los primeros posesivos al plural del hebreo ('vuestro/vuestra') y se mejora la naturalidad de la pareja final con 'aflicción y angustia', preservando la distinción poética entre צָרָה y צוּקָה sin introducir una formulación menos idiomática. Se conserva la nota léxica sobre 'tormenta/devastación' porque refleja correctamente la evidencia y el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:19:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura temporal y el paralelismo del hebreo: dos cláusulas con בְּבֹא (''cuando venga/llegue'') y la secuencia de desastre que irrumpe sobre los oyentes. También preserva adecuadamente las comparaciones כְּשָׁאוָה / כְּסוּפָה con ''como una tormenta'' y ''como un torbellino'', incluyendo la alternativa léxica documentada en nota. Sin embargo, hay una inconsistencia importante de persona/número: los sufijos hebreos son 2mp en todo el verso (''vuestro''), pero el borrador mezcla singular informal (''tu pavor'', ''tu calamidad'') con plural (''ustedes'').'
  spanish_quality_summary: El español es claro y poético, pero la mezcla de tratamiento ('tu' + 'ustedes') afecta la legibilidad y la fidelidad. Además, 'la opresión' para צוּקָה es posible, pero en esta pareja con צָרָה suena menos natural que 'la angustia' o 'la congoja'; conviene distinguir sin perder fluidez. Una solución elegante es usar 'la aflicción y la angustia', que mantiene paralelismo y buen español eclesial general.
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos en este versículo. La revisión propuesta mantiene la terminología poética del audit trail: ''tormenta'' para כְּשָׁאוָה con nota alternativa, ''torbellino'' para כְּסוּפָה, y dos términos distintos para צָרָה / צוּקָה.'
  issues:
  - severity: high
    issue: Mezcla de segunda persona singular y plural en el mismo versículo
    rationale: El hebreo usa consistentemente sufijos de segunda persona plural ('vuestro/ustedes'). El borrador dice 'tu pavor... tu calamidad' pero luego 'sobre ustedes', creando una incoherencia que no refleja el original.
  - severity: medium
    issue: '''Opresión'' para צוּקָה suena menos idiomático en esta pareja poética'
    rationale: Aunque la raíz puede expresar presión/estrechez, en español bíblico general 'aflicción', 'angustia' o 'congoja' leen más naturalmente junto a צָרָה. 'Opresión' puede sugerir más fuertemente un opresor externo o una categoría sociopolítica no exigida por el contexto.
  revised_spanish_text: cuando venga vuestro pavor como una tormenta[a], y vuestra calamidad llegue como un torbellino, cuando vengan sobre ustedes la aflicción y la angustia.
  revised_footnotes:
  - marker: a
    text: O «como devastación»; el término hebreo puede enfatizar la ruina destructiva tanto como la fuerza de un temporal violento.
    reason: lexical_alternative
  revision_rationale: Se corrige la incoherencia de tratamiento ajustando los primeros posesivos al plural del hebreo ('vuestro/vuestra') y se mejora la naturalidad de la pareja final con 'aflicción y angustia', preservando la distinción poética entre צָרָה y צוּקָה sin introducir una formulación menos idiomática. Se conserva la nota léxica sobre 'tormenta/devastación' porque refleja correctamente la evidencia y el audit trail inglés.
