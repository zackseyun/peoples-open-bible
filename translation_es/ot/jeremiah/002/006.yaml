translation:
  language: es
  text: 'No dijeron: «¿Dónde está Yahvé, el que nos hizo subir de la tierra de Egipto, el que nos llevó por el desierto, por tierra de llanura y hoyo, por tierra de sequedad y de tinieblas profundas[a], por tierra por la que no pasó ningún hombre ni habitó ser humano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sombra de muerte' para 'tinieblas profundas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la práctica de la POB de no sustituirlo por un título. 'Yahvé' es la forma de uso común en español bíblico para ese nombre y mantiene la decisión auditada del texto base.
- source_word: הַמַּעֲלֶה אֹתָנוּ מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought us up from the land of Egypt
  chosen_spanish: el que nos hizo subir de la tierra de Egipto
  alternatives_spanish:
  - el que nos trajo de la tierra de Egipto
  - el que nos sacó de la tierra de Egipto
  lexicon: HALOT
  rationale: עלה en hifil expresa hacer subir, llevar arriba. 'Nos hizo subir' conserva la imagen verbal del hebreo mejor que una simplificación como 'sacó', y es plenamente natural en español.
- source_word: הַמּוֹלִיךְ אֹתָנוּ
  english_pob_choice: who led us
  chosen_spanish: el que nos llevó
  alternatives_spanish:
  - el que nos guió
  - el que nos conducía
  lexicon: HALOT
  rationale: La idea es de conducción a través del camino. 'Nos llevó' reproduce la secuencia narrativa y evita añadir matices no necesarios.
- source_word: בַּמִּדְבָּר
  english_pob_choice: through the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - por el desierto árido
  - por la estepa
  lexicon: HALOT
  rationale: En español, 'desierto' comunica con claridad el entorno hostil; mantiene la función de tránsito del contexto anterior. 'Wilderness' no exige una transliteración.
- source_word: עֲרָבָה
  english_pob_choice: desert plain
  chosen_spanish: llanura
  alternatives_spanish:
  - estepa
  - llanura desértica
  - Arabá
  lexicon: HALOT
  rationale: La palabra hebrea señala una región abierta, árida, de llanura. 'Llanura' es breve y natural; el contexto ya da la cualidad desolada junto con el resto de la enumeración.
- source_word: שׁוּחָה
  english_pob_choice: pit
  chosen_spanish: hoyo
  alternatives_spanish:
  - pozo
  - foso
  - hondonada
  lexicon: HALOT
  rationale: '''Hoyo'' es un equivalente español directo y claro para la idea de depresión o cavidad peligrosa del terreno.'
- source_word: צִיָּה
  english_pob_choice: drought
  chosen_spanish: sequedad
  alternatives_spanish:
  - aridez
  - tierra seca
  - desierto seco
  lexicon: HALOT
  rationale: El término describe aridez extrema. 'Sequedad' preserva el sustantivo abstracto del hebreo y evita confundirlo con un evento meteorológico específico.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: tinieblas profundas
  alternatives_spanish:
  - sombra de muerte
  - oscuridad profunda
  - tiniebla espesa
  lexicon: HALOT
  rationale: '''Tinieblas profundas'' comunica la intensidad del término sin fijarlo exclusivamente como ''sombra de muerte''. Se preserva así la tensión léxica documentada por la POB entre una lectura de oscuridad intensa y la alternativa tradicional.'
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - nadie
  - ningún hombre
  - persona
  lexicon: HALOT
  rationale: Aunque el sentido es genérico, el hebreo usa 'ish' y la POB preserva ese valor formal con 'man'. En español, 'hombre' mantiene el paralelismo y la fuerza representativa del original.
- source_word: אָדָם
  english_pob_choice: human
  chosen_spanish: ser humano
  alternatives_spanish:
  - hombre
  - persona
  - humano
  lexicon: HALOT
  rationale: אָדָם aquí es genérico. 'Ser humano' distingue mejor este término del 'hombre' anterior y evita perder la doble formulación hebrea.
- source_word: עָבַר בָּהּ
  english_pob_choice: passed through
  chosen_spanish: pasó
  alternatives_spanish:
  - atravesó
  - pasó por ella
  - transitó
  lexicon: HALOT
  rationale: '''Pasó'' es la forma más natural en esta construcción; con ''por tierra'' y el contexto, ya implica atravesar el lugar.'
- source_word: יָשַׁב
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se asentó
  - moró
  lexicon: HALOT
  rationale: '''Habitó'' conserva el registro bíblico y la idea de residencia estable. ''Ser humano'' en la segunda cola evita repetir ''hombre'' y refleja el paralelo del hebreo.'
theological_decisions:
- issue: Traducción de יְהוָה como nombre propio divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La POB mantiene el nombre divino revelado en el texto. En español, 'Yahvé' preserva esa decisión y evita la sustitución por un título, respetando el testimonio del texto fuente.
  doctrine_reference: Tradición POB sobre el Tetragrámaton; transparencia del nombre divino
- issue: Valor de צַלְמָוֶת
  english_pob_reading: deep darkness
  chosen_spanish_reading: tinieblas profundas
  alternative_spanish_readings:
  - sombra de muerte
  - oscuridad profunda
  rationale: 'Se conserva la ambigüedad léxica observada por la POB: el hebreo puede evocar oscuridad extrema y la lectura tradicional ''sombra de muerte''. ''Tinieblas profundas'' da el sentido contextual sin borrar la alternativa histórica.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Distinción entre אִישׁ y אָדָם
  english_pob_reading: man / human
  chosen_spanish_reading: hombre / ser humano
  alternative_spanish_readings:
  - persona / persona
  - nadie / nadie
  rationale: La doble formulación del hebreo diferencia un varón/individuo representativo de la humanidad genérica. El español mantiene esa distinción para no nivelar el paralelismo.
  doctrine_reference: Principio de preservación de matices léxicos del hebreo
translation_notes:
  revision_awareness: Revisado con base en el texto hebreo masorético y el audit trail inglés; no hay revisiones aplicadas en la fuente auditada. Se preserva la enumeración de lugares y la doble fórmula final sin suavizar la tensión léxica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva la distinción 'hombre' / 'ser humano' para reflejar אִישׁ / אָדָם.
  - '''Tinieblas profundas'' mantiene el sentido contextual y deja la alternativa tradicional en nota.'
  - La sintaxis sigue el paralelismo del hebreo con un registro bíblico claro y natural en español.
