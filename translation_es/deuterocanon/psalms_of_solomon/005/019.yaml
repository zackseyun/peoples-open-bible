  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional del griego y el sentido básico de ἐξαμαρτάνει como «peca». Sin embargo, ὑπερπλεονάσῃ expresa sobreabundancia o tener más de lo debido; «tiene abundancia» suena demasiado neutral/positiva en español y atenúa el matiz de exceso que el original y la nota inglesa preservan.
  spanish_quality_summary: El español es claro y natural, pero «tener abundancia» resulta algo rígido y menos idiomático que una formulación que explicite mejor el exceso. «Si un hombre tiene demasiado, peca» suena más natural y comunica mejor el valor proverbial sin añadir una interpretación teológica ajena.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La revisión propuesta sigue la decisión teológica documentada de no reducir el sentido a «avaricia», pero en español representa mejor la idea de exceso presente en ὑπερπλεονάσῃ.
  issues:
  - severity: medium
    issue: «tiene abundancia» debilita el matiz de exceso de ὑπερπλεονάσῃ
    rationale: En español, «abundancia» puede denotar prosperidad o suficiencia sin implicar necesariamente exceso. El griego apunta a sobrepasar la medida; «tiene demasiado» lo comunica con mayor fidelidad y naturalidad.
  - severity: low
    issue: La nota al pie repite una opción que funciona mejor como texto principal
    rationale: Dado que la alternativa «tiene demasiado» es más fiel al matiz griego en español, conviene promoverla al texto principal y mantener como nota una alternativa más literal como «tiene abundancia».
