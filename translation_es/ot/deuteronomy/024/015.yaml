revisions:
- from: Le darás su salario el mismo día[a], y el sol no se pondrá sobre ello, porque él es pobre y de ello depende su vida; para que no clame contra ti a Yahvé, y no haya pecado en ti.
  to: Le darás su salario el mismo día, antes que se ponga el sol, porque es pobre y de ello depende su vida[a]; no sea que clame contra ti a Yahvé, y haya en ti pecado.
  rationale: Se corrigió la inversión de sentido en la cláusula final, se ajustó la advertencia a un español más fiel ('no sea que clame'), se reemplazó la formulación rígida sobre el ocaso por una expresión natural y exacta, y se movió la nota al modismo que realmente explica.
