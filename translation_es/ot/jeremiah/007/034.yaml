translation:
  language: es
  text: Y haré cesar[a], de las ciudades de Judá y de las calles[b] de Jerusalén, la voz de gozo y la voz de alegría[c], la voz del novio y la voz de la novia, porque la tierra llegará a ser una ruina[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «pondré fin»; el hebreo expresa una acción causativa: hacer cesar.'
    reason: lexical_alternative
  - marker: b
    text: O «plazas» o «espacios públicos»; el término hebreo puede referirse a calles o lugares públicos abiertos.
    reason: lexical_alternative
  - marker: c
    text: O «el sonido de gozo y el sonido de alegría».
    reason: lexical_alternative
  - marker: d
    text: O «la tierra quedará desolada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: And I will put an end
  chosen_spanish: Y haré cesar
  alternatives_spanish:
  - y pondré fin
  - y haré que cesen
  - y silenciaré
  lexicon: HALOT
  rationale: 'El verbo en hifil expresa acción causativa: Yahvé hará que cesen esos sonidos. «Haré cesar» conserva bien la fuerza causativa y suena natural en español bíblico moderno sin perder el agente divino.'
- source_word: מֵעָרֵי יְהוּדָה
  english_pob_choice: from the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - de las ciudades de Judá
  - desde las ciudades de Judá
  lexicon: HALOT
  rationale: La partícula מן marca separación/origen. En español, con «haré cesar» la construcción «en las ciudades de Judá» funciona de modo natural para ubicar el cese dentro de ese ámbito; también se puede entender como cesación retirada de allí. Se conserva la referencia geográfica sin recargar la sintaxis.
- source_word: וּמֵחֻצוֹת יְרוּשָׁלִַם
  english_pob_choice: and from the streets of Jerusalem
  chosen_spanish: y en las calles[b] de Jerusalén
  alternatives_spanish:
  - y en las plazas de Jerusalén
  - y en los espacios públicos de Jerusalén
  lexicon: HALOT
  rationale: חֻצוֹת puede significar calles o plazas/espacios públicos. «Calles» es la opción más clara en español actual; por la ambigüedad semántica se añade una nota de alternativa.
- source_word: קוֹל שָׂשׂוֹן
  english_pob_choice: the sound of joy
  chosen_spanish: la voz de gozo
  alternatives_spanish:
  - el sonido de gozo
  - la voz de alegría
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido». Aquí el paralelismo con las expresiones festivas favorece «voz», como en la fórmula tradicional, y «gozo» traduce bien שָׂשׂוֹן con un matiz de júbilo festivo.
- source_word: וְקוֹל שִׂמְחָה
  english_pob_choice: and the sound of gladness
  chosen_spanish: y la voz de alegría
  alternatives_spanish:
  - y el sonido de alegría
  - y la voz de regocijo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior. «Alegría» refleja שִׂמְחָה de manera natural en español y conserva el campo semántico del regocijo festivo.
- source_word: קוֹל חָתָן
  english_pob_choice: the voice of the bridegroom
  chosen_spanish: la voz del novio
  alternatives_spanish:
  - la voz del desposado
  - el sonido del novio
  lexicon: HALOT
  rationale: En español contemporáneo, «novio» comunica mejor que «bridegroom» el miembro masculino de la pareja en contexto nupcial. Se conserva la idea de voz humana real, no solo de festividad general.
- source_word: וְקוֹל כַּלָּה
  english_pob_choice: and the voice of the bride
  chosen_spanish: y la voz de la novia
  alternatives_spanish:
  - y la voz de la desposada
  - y el sonido de la novia
  lexicon: HALOT
  rationale: Se sigue la misma fórmula con «novia» para mantener el paralelismo hebreo y la escena matrimonial concreta.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - desolación
  - desierto
  - devastación
  lexicon: HALOT
  rationale: חָרְבָּה denota devastación/desolación con sentido concreto. «Ruina» reproduce bien esa fuerza y encaja de manera idiomática con «será».
- source_word: תִּהְיֶה הָאָרֶץ
  english_pob_choice: the land will become
  chosen_spanish: la tierra será
  alternatives_spanish:
  - la tierra llegará a ser
  - la tierra se convertirá en
  lexicon: HALOT
  rationale: El hebreo expresa devenir con היה + sustantivo; en español, «será una ruina» comunica el resultado sin sobredeterminar el proceso. «Tierra» es adecuado para el ámbito de juicio sobre el país/territorio.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: 'The verse is rendered with explicit first-person divine action: ''I will put an end,'' preserving Yahweh''s direct agency in removing joy from Judah and Jerusalem.'
  chosen_spanish_reading: «Haré cesar» mantiene la acción directa de Yahvé como sujeto que provoca el fin de la alegría en Judá y Jerusalén.
  alternative_spanish_readings:
  - «cesará»
  - «se acabará»
  rationale: El hebreo usa primera persona causativa; no conviene diluirla en una formulación impersonal. La traducción conserva la responsabilidad directa de Yahvé en el juicio.
  doctrine_reference: Juicio divino y soberanía de Yahvé
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. No se adoptó una traducción mecánica del inglés: se preservó la causatividad del hifil, la ambigüedad de חֻצוֹת mediante nota, el paralelismo poético de קוֹל ... קוֹל ..., y la posibilidad de leer לְחָרְבָּה como «ruina» o «desolación» sin perder el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la norma del proyecto.
  - Se prefirió «voz» para קוֹל por el paralelismo hebreo y la imagen de sonidos festivos concretos.
  - Se usó «Judá» y «Jerusalén» con mayúscula propia, y «tierra» para הָאָרֶץ en sentido territorial.
  - Se evitó «SEÑOR» y «Cristo», ya que no corresponden al texto de este versículo.
