translation:
  text: Jesus said, “The splinter that is in your brother’s eye, you see it; but the
    beam that is in your own eye, you do not see it. When you take the beam out of
    your own eye, then you will see clearly to take the splinter out of your brother’s
    eye.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “See clearly” renders the idiom ⲛⲁⲩ ⲉⲃⲟⲗ, literally “see out.”
    reason: dialect_note
  - marker: b
    text: The verb ⲛⲟⲩϫⲉ can mean “cast out/expel”; here “take out/remove” fits the
      eye-removal context.
    reason: lexical_alternative
  - marker: c
    text: “Splinter” could also be translated “speck.”
    reason: lexical_alternative
  - marker: d
    text: “Beam” could be rendered “log,” but ⲥⲟⲓ specifically denotes a structural
      beam.
    reason: lexical_alternative
  - marker: e
    text: “Brother” translates ⲥⲟⲛ; in context it can be understood inclusively as
      a fellow disciple.
    reason: cultural_note
  - marker: f
    text: POxy 1 preserves “…and then you will see in order to cast out the splinter
      which is in the eye of your brother,” aligning with the Coptic’s final clause.
    reason: cross_reference
  - marker: g
    text: Cf. Matthew 7:3–5; Luke 6:41–42 for canonical parallels.
    reason: cross_reference
  - marker: h
    text: Or 'The splinter that is in your brother’s eye—you see; but the beam that
      is in your own eye—you do not see.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡϫⲏ
  chosen: splinter
  alternatives:
  - speck
  - chip
  lexicon: Crum, s.v. ϫⲏ
  rationale: A small piece of wood; “splinter” preserves the wood imagery and contrast
    with a beam without importing Synoptic harmonization. “Speck” is acceptable but
    less specifically wooden.
- source_word: ⲡⲥⲟⲓ
  chosen: beam
  alternatives:
  - log
  - timber
  lexicon: Crum, s.v. ⲥⲟⲓ
  rationale: Crum glosses ⲥⲟⲓ as a structural beam; “beam” keeps the architectural
    sense and sharp size contrast with ‘splinter.’ “Log” is a traditional rendering
    but shifts imagery toward a felled tree rather than a structural beam.
- source_word: ⲛⲟⲩϫⲉ
  chosen: take out
  alternatives:
  - remove
  - cast out
  lexicon: Crum, s.v. ⲛⲟⲩϫⲉ
  rationale: Verb can mean throw/drive out or remove; with an object from the eye,
    English idiom favors “take out/remove.” We avoid “cast out” here to fit the medical/removal
    context.
- source_word: ⲛⲁⲩ ⲉⲃⲟⲗ
  chosen: see clearly
  alternatives:
  - see out
  lexicon: Layton, Coptic Grammar (adverbial ⲉⲃⲟⲗ as completive/clarifying particle
    with perception verbs)
  rationale: The idiom literally “see out” denotes clarity of sight; “see clearly”
    conveys the idiomatic force in natural English while preserving the contrastive
    progression.
- source_word: ⲥⲟⲛ
  chosen: brother
  alternatives:
  - sibling
  - fellow
  - kinsman
  lexicon: Crum, s.v. ⲥⲟⲛ
  rationale: Lexically male “brother”; Thomas often uses familial terms for fellow
    disciples. We retain “brother” for formal accuracy and note inclusivity as an
    alternative.
- source_word: ϩⲟⲧⲁⲛ ⲉⲣϣⲁⲛ_
  chosen: when (you) take
  alternatives:
  - when you have taken
  - whenever you take
  lexicon: Layton, Coptic Grammar (ϩⲟⲧⲁⲛ with ⲉⲣϣⲁⲛ_ + infinitive for future/conditional
    temporal clauses)
  rationale: Construction signals a future/conditional temporal clause; simple “when
    you take” matches Thomas’s terseness without over-encoding aspect.
- source_word: ⲃⲁⲗ
  chosen: eye
  alternatives: []
  lexicon: Crum, s.v. ⲃⲁⲗ
  rationale: Standard anatomical term; no special nuance here.
textual_note: Sahidic with typical Nag Hammadi orthography; no lacunae or conjectural
  restorations in Dilley’s text for Saying 26. The construction ϩⲟⲧⲁⲛ ⲉⲣϣⲁⲛ_ⲛⲧⲟⲕⲛⲟⲩϫⲉ
  marks a future/conditional temporal clause. The idiom ⲛⲁⲩ ⲉⲃⲟⲗ (“see out”) conveys
  ‘see clearly.’ Object pronoun ⲛⲧⲟϥ refers back to masculine ⲡϫⲏ. Orthographic supralinear
  strokes in the diplomatic line-break text are scribal and do not affect meaning
  in this saying.
