translation:
  language: es
  text: Y escribió que se diera mantenimiento[a] a los levitas hasta el día en que la casa[b] estuviera terminada y Jerusalén fuera edificada[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provisión», «sustento» o «suministro» para los levitas.
    reason: lexical_alternative
  - marker: b
    text: «La casa» se refiere al templo.
    reason: cross_reference
  - marker: c
    text: O «Jerusalén reconstruida». El griego dice simplemente «edificada», aunque el contexto es de restauración.
    reason: lexical_alternative
  - marker: d
    text: La redacción griega después de «hasta el día» es algo áspera en la transmisión; el sentido es que el apoyo debía continuar hasta que el templo estuviera terminado y Jerusalén edificada.
    reason: textual_variant
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: he wrote that
  chosen_spanish: y escribió que
  alternatives_spanish:
  - y ordenó por escrito que
  - y escribió a
  lexicon: LSJ
  rationale: El aoristo de γράφω introduce una disposición escrita real. «Escribió que» conserva el valor de decreto o instrucción sin añadir un destinatario explícito que el griego no menciona.
- source_word: δοῦναι
  english_pob_choice: should be given
  chosen_spanish: se diera
  alternatives_spanish:
  - se diera
  - debería darse
  - se proporcionara
  lexicon: LSJ
  rationale: El infinitivo expresa la acción ordenada; en español, una pasiva/impersonal subordinada reproduce bien la modalidad de mandato y evita forzar un sujeto inexistente en el original.
- source_word: τὴν χορηγίαν
  english_pob_choice: support
  chosen_spanish: mantenimiento
  alternatives_spanish:
  - provisión
  - sustento
  - asistencia
  lexicon: LSJ
  rationale: χορηγία denota provisión material continuada, especialmente para necesidades de servicio. «Mantenimiento» comunica mejor en español la idea de apoyo sostenido; se deja nota de alternativas porque el término puede abarcar provisión o sustento.
- source_word: τοῖς Λευείταις
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  lexicon: LSJ
  rationale: Dativo directo e inequívoco. «Levitas» es el equivalente estándar y claro en español bíblico.
- source_word: ἕως τῆς ἡμέρας
  english_pob_choice: until the day
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día
  - hasta que
  lexicon: LSJ
  rationale: La construcción temporal se expresa de manera natural con «hasta el día en que», manteniendo el marcador de límite temporal del griego.
- source_word: ᾖ ἐπιτελεσθῇ
  english_pob_choice: would be completed
  chosen_spanish: estuviera terminada
  alternatives_spanish:
  - fuera terminada
  - se terminara
  - estuviera completada
  lexicon: LSJ
  rationale: La sintaxis transmitida es algo irregular; el sentido es un punto de finalización futura. «Estuviera terminada» expresa con naturalidad la culminación de la obra sin exceder el alcance semántico.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: LSJ
  rationale: Se conserva la imagen literal del griego, tal como hace la POB en inglés. En este contexto alude al templo, pero no se sustituye en el texto principal para no perder el idiomario bíblico.
- source_word: Ἰερουσαλὴμ οἰκοδομηθῆναι
  english_pob_choice: Jerusalem built
  chosen_spanish: Jerusalén fuera edificada
  alternatives_spanish:
  - Jerusalén fuera reconstruida
  - Jerusalén fuera edificada de nuevo
  lexicon: LSJ
  rationale: οἰκοδομηθῆναι significa «ser edificada». «Edificada» sigue de cerca el griego; se evita «reconstruida» en el texto principal porque el griego dice simplemente «construida/edificada», aunque el contexto sea restaurativo.
theological_decisions:
- issue: Referencia de «la casa»
  english_pob_reading: the house refers to the temple in Jerusalem
  chosen_spanish_reading: la casa se entiende como el templo de Jerusalén
  alternative_spanish_readings:
  - la casa como edificio real
  - la casa como una construcción genérica
  rationale: En el contexto de Esdras/Esdras griego, «la casa» es una abreviatura reconocible para el templo. Se conserva la expresión literal en el texto y se explica su referente en la decisión teológica para no perder la tensión entre imagen bíblica y claridad contextual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Literalidad de οἶκος frente a interpretación explícita
  english_pob_reading: retain 'the house' in the main text
  chosen_spanish_reading: retener «la casa» en el texto principal
  alternative_spanish_readings:
  - poner «el templo» en el texto principal
  rationale: La equivalencia óptima favorece preservar el giro bíblico cuando sigue siendo comprensible. «La casa» mantiene la forma del original y la referencia al templo queda accesible por el contexto y la nota.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido; el control cruzado indicó alta concordancia y ningún problema relevante, por lo que el borrador español sigue de cerca el estado auditado actual sin introducir ajustes no motivados por la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí no aparece el tetragrámaton ni un κύριος equivalente en el versículo.
  - Se conserva «la casa» por fidelidad al idioma bíblico, con aclaración contextual en nota.
  - Se usa «levitas» como término bíblico estándar en español, sin necesidad de glosa adicional.
  - Se evita «Cristo/Mesías» porque no aparece en el texto.
  - El tiempo verbal en español busca reproducir el valor prospectivo del griego sin sobrerresolver la sintaxis irregular del original.
