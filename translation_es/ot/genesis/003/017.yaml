translation:
  language: es
  text: 'Y a Adán le dijo[a]: «Porque escuchaste la voz[b][f] de tu esposa y comiste del árbol acerca del cual te mandé[e], diciendo: “No comerás de él”, maldita es la tierra[c] por causa de ti; con penoso trabajo[d] comerás de ella todos los días de tu vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hombre» para «Adán».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «escuchaste la voz de tu esposa».'
    reason: lexical_alternative
  - marker: c
    text: O «maldita es la tierra por tu causa»; el hebreo también admite una formulación más formal.
    reason: lexical_alternative
  - marker: d
    text: El término hebreo también puede entenderse como «con tristeza» o «con dolor»; aquí se refiere a la dureza del trabajo para obtener alimento.
    reason: lexical_alternative
  - marker: e
    text: O «acerca del cual te mandé».
    reason: alternative_reading
  - marker: f
    text: O «escuchaste a tu esposa».
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְאָדָם
  english_pob_choice: And to Adam he said
  chosen_spanish: Y a Adán le dijo
  alternatives_spanish:
  - Y al hombre le dijo
  lexicon: HALOT
  rationale: El referente en el relato es el individuo del jardín, por lo que ‘Adán’ preserva el sujeto personal. ‘Al hombre’ queda como alternativa posible si se quisiera subrayar el sentido genérico del término, pero aquí no es la mejor opción.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio. ‘Porque’ es natural en español y mantiene la relación explicativa del hebreo.
- source_word: שָׁמַעְתָּ לְקוֹל אִשְׁתֶּךָ
  english_pob_choice: you listened to the voice of your wife
  chosen_spanish: escuchaste la voz de tu esposa
  alternatives_spanish:
  - escuchaste a tu esposa
  - prestaste oído a la voz de tu esposa
  lexicon: HALOT
  rationale: Conservo ‘voz’ para reflejar la expresión hebrea literal שָׁמַע לְקוֹל. En español, ‘escuchaste la voz de tu esposa’ mantiene la imagen sin convertirla en una simple obediencia explícita. ‘Escuchaste a tu esposa’ suaviza la metáfora pero pierde el eco lexical.
- source_word: וַתֹּאכַל מִן הָעֵץ
  english_pob_choice: and ate from the tree
  chosen_spanish: y comiste del árbol
  alternatives_spanish:
  - y comiste del árbol
  - y comiste de ese árbol
  lexicon: HALOT
  rationale: ‘Comer de’ expresa bien la preposición מִן en español y suena natural. Mantengo ‘árbol’ sin ampliar el referente, porque el contexto ya lo identifica.
- source_word: אֲשֶׁר צִוִּיתִיךָ לֵאמֹר
  english_pob_choice: about which I commanded you, saying
  chosen_spanish: acerca del cual te mandé, diciendo
  alternatives_spanish:
  - sobre el cual te mandé, diciendo
  - del cual te mandé, diciendo
  lexicon: HALOT
  rationale: La relación relativa se conserva con ‘acerca del cual’, que reproduce la estructura sin volverla pesada. ‘Te mandé’ comunica el imperativo divino con claridad y ‘diciendo’ conserva la introducción del contenido del mandato.
- source_word: לֹא תֹאכַל מִמֶּנּוּ
  english_pob_choice: You shall not eat from it
  chosen_spanish: No comerás de él
  alternatives_spanish:
  - No debes comer de él
  - No comerás de ese árbol
  lexicon: HALOT
  rationale: ‘No comerás’ refleja la fuerza prohibitiva formal del hebreo. ‘De él’ conserva el antecedente singular del árbol; no hace falta repetir ‘árbol’ porque ya está explícito en la oración anterior.
- source_word: אֲרוּרָה הָאֲדָמָה
  english_pob_choice: the ground is cursed
  chosen_spanish: maldita será la tierra
  alternatives_spanish:
  - la tierra está maldita
  - cursed is the ground
  lexicon: HALOT
  rationale: ‘Tierra’ es preferible a ‘suelo’ en español por la amplitud semántica de אֲדָמָה en este contexto de cultivo y alimentación. ‘Maldita será’ preserva el carácter declarativo/performativo del juicio, mientras que ‘la tierra está maldita’ suena más estático.
- source_word: בַּעֲבוּרֶךָ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - por tu causa
  lexicon: HALOT
  rationale: La preposición señala causalidad ligada a Adán. ‘Por causa de ti’ es claro, solemne y evita cualquier lectura benéfica de ‘por tu bien’.
- source_word: בְּעִצָּבוֹן
  english_pob_choice: in painful toil
  chosen_spanish: con dolor y fatiga
  alternatives_spanish:
  - con penoso trabajo
  - en dolorosa fatiga
  - en duro trabajo
  lexicon: HALOT
  rationale: El sustantivo cubre dolor, pena y carga laboral. ‘Con dolor y fatiga’ conserva esa tensión semántica sin reducirlo solo a sensación emocional ni solo a trabajo, y encaja bien con el contexto agrícola.
- source_word: תֹּאכֲלֶנָּה
  english_pob_choice: you shall eat from it
  chosen_spanish: comerás de ella
  alternatives_spanish:
  - comerás de la tierra
  - la comerás
  lexicon: HALOT
  rationale: El sufijo femenino remite a ‘la tierra’. En español, ‘comerás de ella’ mantiene el vínculo referencial y evita la imagen inexacta de comer tierra literalmente.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  - por todos los días de tu vida
  lexicon: HALOT
  rationale: Es una fórmula idiomática hebrea. La versión plena en español conserva solemnidad y paralelismo con otros enunciados bíblicos.
theological_decisions:
- issue: Rendering of אָדָם in narrative judgment speech
  english_pob_reading: Adam
  chosen_spanish_reading: Adán
  alternative_spanish_readings:
  - el hombre
  rationale: El discurso se dirige al personaje individual del relato, no a la humanidad en general. ‘Adán’ preserva esa referencia personal sin borrar que el término hebreo también puede significar ‘hombre’ según el contexto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — אָדָם adam | man / humankind (context)'
- issue: How to render the curse formula on the ground/earth
  english_pob_reading: the ground is cursed
  chosen_spanish_reading: maldita será la tierra
  alternative_spanish_readings:
  - la tierra está maldita
  - cursed is the ground
  rationale: El hebreo presenta una declaración de juicio con efecto real. En español, ‘maldita será’ conserva mejor el tono oracular y la inversión predicativa del original que una simple descripción estática.
  doctrine_reference: Genesis 3:17 textual/poetic judgment formula
- issue: Preserving the idiom 'listen to the voice of your wife'
  english_pob_reading: you listened to the voice of your wife
  chosen_spanish_reading: escuchaste la voz de tu esposa
  alternative_spanish_readings:
  - escuchaste a tu esposa
  - prestaste oído a la voz de tu esposa
  rationale: La POB inglesa mantiene la voz como parte del ídolo [idiom] hebreo. En español, conservar ‘la voz de tu esposa’ mantiene la textura del original y evita suavizar el eco verbal a una simple obediencia o escucha genérica.
  doctrine_reference: Hebrew idiom שׁמע לקול; lexical preservation policy
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y la trayectoria de la POB inglesa: preserva el destinatario personal ‘Adán’, mantiene la idiomática ‘la voz de tu esposa’, traduce la maldición como declaración performativa (‘maldita será la tierra’) y conserva la ambigüedad semántica de בְּעִצָּבוֹן con una nota que deja abiertas las alternativas ‘tristeza/dolor’ y ‘dureza del trabajo’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene ‘Adán’ como nombre propio en la dirección narrativa, coherente con la política del proyecto para אָדָם en contextos individuales.
  - ‘Tierra’ traduce אֲדָמָה en el campo semántico agrícola del pasaje.
  - Se conserva la imagen de la ‘voz’ para reflejar el hebraísmo שָׁמַע לְקוֹל sin convertirlo en una paráfrasis interpretativa.
  - La fórmula final reproduce la cadencia de juicio solemne propia del hebreo bíblico.
