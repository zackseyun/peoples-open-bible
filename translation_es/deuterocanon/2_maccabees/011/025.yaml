review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: causal inicial, deseo/decisión política, restauración del templo y permiso para vivir según costumbres ancestrales. Sin embargo, dos elecciones españolas debilitan la fidelidad fina: ''queremos'' atenúa el matiz volitivo de αἱρούμενοι como ''elegir/preferir/decidir una política'', y ''para ellos'' no expresa tan bien αὐτοῖς como dativo de beneficio/posesión institucional en este contexto; ''les sea restaurado'' o ''les sea devuelto/restaurado'' funciona mejor. Además, la nota al pie pierde el matiz temporal preservado por el inglés (''in the time of their ancestors'').'
  spanish_quality_summary: El español es claro y natural, con tono digno y eclesialmente legible. No obstante, 'libre de perturbación' suena algo menos idiomático que 'libre de disturbios' o 'sin perturbación', aunque sigue siendo aceptable. La frase 'sea restaurado para ellos' suena poco natural en español; 'les sea restaurado' mejora mucho la fluidez. Conviene también ajustar la nota para reflejar mejor la alternativa auditada en inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Nación', 'templo' y 'costumbres de sus antepasados' están bien alineados. La decisión sobre πολιτεύεσθαι como 'vivan' respeta la explicación auditada y evita sobretraducirlo como autonomía política. La principal mejora es léxica y sintáctica, no terminológica.
  issues:
  - severity: medium
    issue: αἱρούμενοι se tradujo como 'queremos'
    rationale: El participio medio aquí expresa más específicamente elegir/preferir una política que un mero querer. 'Puesto que también preferimos' o 'ya que también hemos decidido' preserva mejor el matiz volitivo-administrativo documentado por el POB.
  - severity: medium
    issue: '''sea restaurado para ellos'' suena poco natural y menos preciso para αὐτοῖς'
    rationale: En español administrativo y bíblico, 'que el templo les sea restaurado' refleja mejor el dativo y evita una construcción forzada.
  - severity: low
    issue: La nota al pie no conserva la alternativa temporal del inglés auditado
    rationale: El inglés preserva 'according to the customs in the time of their ancestors'. La nota española actual solo repite la idea de vida común, pero omite explícitamente ese matiz temporal; conviene incorporarlo.
  revised_spanish_text: Por tanto[a], puesto que también preferimos que esta nación esté libre de perturbación, decidimos que el templo les sea restaurado y que vivan conforme a las costumbres de sus antepasados.
  revised_footnotes:
  - marker: a
    text: 'O: «ordenen su vida común conforme a las costumbres de tiempos de sus antepasados»'
    reason: lexical_alternative
  revision_rationale: Se ajusta αἱρούμενοι a 'preferimos' para reflejar mejor la elección de política; se corrige 'para ellos' a 'les sea restaurado' por fidelidad y naturalidad; y se mejora la nota para preservar tanto el matiz de vida común de πολιτεύεσθαι como la posible nuance temporal de κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη.
