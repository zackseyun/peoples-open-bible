translation:
  language: es
  text: No voy a echarme atrás[a], tirano, ante la tortura por causa de la virtud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no voy a rechazar la tortura por causa de la virtud». El verbo griego puede significar declinar o rehusar, pero en este contexto expresa no echarse atrás ante el sufrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλλω
  english_pob_choice: I am not about to
  chosen_spanish: No estoy a punto de
  alternatives_spanish:
  - No voy a
  - No tengo intención de
  - No me dispongo a
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa intención inmediata o resolución inminente. «No estoy a punto de» conserva la inmediatez enfática y el tono desafiante del habla directa mejor que un futuro simple.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - déspota
  - oh tirano
  lexicon: LSJ
  rationale: El vocativo acusa al gobernante con un término moralmente cargado. «Tirano» en español transmite la misma fuerza confrontativa que el inglés POB y funciona naturalmente como vocativo implícito.
- source_word: πρὸς τὸν ... βασανισμόν
  english_pob_choice: from the torture
  chosen_spanish: ante el tormento
  alternatives_spanish:
  - ante la tortura
  - frente al tormento
  - ante el suplicio
  lexicon: LSJ
  rationale: En este contexto martirial, βασανισμός denota un sufrimiento de tortura/tormento. «Ante el tormento» preserva la idea de resistencia frente al sufrimiento sin endurecer innecesariamente la frase, mientras que la nota explica la alternativa más literal «tortura».
- source_word: ὑπὲρ τῆς ἀρετῆς
  english_pob_choice: for the sake of virtue
  chosen_spanish: por causa de la virtud
  alternatives_spanish:
  - por la virtud
  - en favor de la virtud
  - por virtud
  lexicon: LSJ
  rationale: ἀρετή aquí es virtud moral/excelencia ética, central en 4 Macabeos. «Por causa de la virtud» preserva el sentido causal/teleológico de ὑπέρ y mantiene el registro filosófico del libro.
- source_word: παραιτεῖσθαι
  english_pob_choice: shrink back
  chosen_spanish: retroceder
  alternatives_spanish:
  - rechazar
  - declinar
  - apartarme
  lexicon: BDAG
  rationale: En este contexto la idea no es solo «rechazar» verbalmente, sino rehuir o echarse atrás ante el sufrimiento. «Retroceder» comunica bien la dimensión de cobardía o retirada física/voluntaria que el POB inglés quiso captar con «shrink back».
theological_decisions:
- issue: Sentido de ἀρετή en un contexto martirial y filosófico
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia
  - rectitud
  rationale: 4 Macabeos usa ἀρετή en un marco de piedad razonada y firmeza moral bajo sufrimiento. «Virtud» mantiene ese registro ético-filosófico sin expandir indebidamente el término.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa: se evita añadir ideas no expresadas en el griego, como cualquier equivalente de «endured», y se conserva la fuerza inmediata de μέλλω y el matiz de resistencia de παραιτεῖσθαι.'
  spanish_consistency_notes:
  - Se usó «tirano» para τύραννε de manera consistente con el valor vocativo y despectivo del original.
  - Se prefirió «virtud» para ἀρετή por coherencia con el registro filosófico-martirial de 4 Macabeos.
  - «Tormento» en el texto principal mantiene naturalidad en español, mientras la nota registra «tortura» como alternativa más literal.
  - La puntuación con coma vocativa sigue el tono directo del discurso.
  - El marcador [a] está anclado en «retroceder» para señalar la alternativa léxica principal.
