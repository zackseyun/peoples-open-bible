translation:
  language: es
  text: Mira a Sión[a], la ciudad de nuestras fiestas señaladas; tus ojos verán a Jerusalén, una morada tranquila[b], una tienda que no será removida; sus estacas nunca serán arrancadas[c], y ninguna de sus cuerdas será rota.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de nuestras asambleas señaladas» o «la ciudad de nuestras festividades». El hebreo מוֹעֲדֵנוּ puede referirse a tiempos señalados o a reuniones, especialmente en contextos de adoración.
    reason: lexical_alternative
  - marker: b
    text: O «segura». El adjetivo puede denotar calma, ausencia de perturbación o seguridad.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa imagen de tienda para la permanencia de Jerusalén: sus estacas no serán arrancadas y sus cuerdas no serán rotas.'
    reason: cultural_note
lexical_decisions:
- source_word: חֲזֵה
  english_pob_choice: Look upon
  chosen_spanish: Mira
  alternatives_spanish:
  - Contempla
  - Mira atentamente
  lexicon: HALOT
  rationale: El imperativo pide una observación directa. «Mira» mantiene la fuerza exhortativa y suena natural en español sin perder el valor visual del hebreo.
- source_word: קִרְיַת מוֹעֲדֵנוּ
  english_pob_choice: the city of our appointed feasts
  chosen_spanish: la ciudad de nuestras fiestas señaladas
  alternatives_spanish:
  - la ciudad de nuestras citas señaladas
  - la ciudad de nuestras asambleas señaladas
  - la ciudad de nuestras festividades
  lexicon: HALOT
  rationale: מוֹעֵד puede ser tiempo señalado, reunión o fiesta. En el contexto de Sión/Jerusalén, «fiestas señaladas» conserva el matiz cultual y calendárico que el audit trail inglés privilegia.
- source_word: עֵינֶיךָ תִרְאֶינָה
  english_pob_choice: your eyes will see
  chosen_spanish: tus ojos verán
  alternatives_spanish:
  - verás
  - tus ojos contemplarán
  lexicon: HALOT
  rationale: Se preserva el sujeto explícito «tus ojos» para mantener el énfasis corporal del hebreo, en vez de reducirlo al simple «verás».
- source_word: נָוֶה
  english_pob_choice: habitation
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - lugar de morada
  lexicon: HALOT
  rationale: «Morada» comunica bien la idea de residencia estable en español y evita la rareza de «habitación» en un registro bíblico digno.
- source_word: שַׁאֲנָן
  english_pob_choice: quiet
  chosen_spanish: tranquila
  alternatives_spanish:
  - sosegada
  - segura
  - sin disturbio
  lexicon: HALOT
  rationale: El adjetivo expresa calma y ausencia de perturbación. «Tranquila» recoge esa estabilidad sin sobreinterpretar el término como seguridad militar estricta.
- source_word: אֹהֶל
  english_pob_choice: a tent
  chosen_spanish: una tienda
  alternatives_spanish:
  - un tabernáculo
  - un toldo
  lexicon: HALOT
  rationale: El sentido básico es «tienda». Se conserva la imagen concreta de campamento que el verso desarrolla con estacas y cuerdas.
- source_word: בַּל יִצְעָן
  english_pob_choice: will not be moved
  chosen_spanish: no será removida
  alternatives_spanish:
  - no vacilará
  - no será desplazada
  - no será movida
  lexicon: HALOT
  rationale: El verbo raro apunta a inestabilidad o desplazamiento. «No será removida» mantiene la idea de permanencia de la tienda sin forzar una lectura más específica que el texto no exige.
- source_word: בַּל יִסַּע יְתֵדֹתָיו
  english_pob_choice: its stakes will never be pulled up
  chosen_spanish: sus estacas nunca serán arrancadas
  alternatives_spanish:
  - sus clavijas nunca serán quitadas
  - sus estacas nunca serán levantadas
  lexicon: HALOT
  rationale: נסע en este contexto de tienda sugiere sacar o levantar las estacas al desarmar. «Arrancadas» transmite bien la imagen de retiro violento o completo.
- source_word: לָנֶצַח
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - jamás
  lexicon: HALOT
  rationale: En este contexto adverbial, «nunca» expresa de forma idiomática la permanencia absoluta del acto negado.
- source_word: וְכָל חֲבָלָיו בַּל יִנָּתֵקוּ
  english_pob_choice: and none of its ropes will be torn apart
  chosen_spanish: y ninguna de sus cuerdas será desgarrada
  alternatives_spanish:
  - y ninguna de sus sogas se romperá
  - y todas sus cuerdas no serán rotas
  lexicon: HALOT
  rationale: חבלים son cuerdas de tienda. «Desgarrada» conserva la violencia de נתק en pasiva y mantiene el paralelo físico con estacas y tienda.
theological_decisions:
- issue: Imagen de Sión/Jerusalén como tienda permanente
  english_pob_reading: Render the verse as a promise of Jerusalem's secure, peaceful stability using literal tent imagery without over-allegorizing it ecclesiologically or eschatologically.
  chosen_spanish_reading: Presentar el verso como una promesa de estabilidad segura y pacífica de Jerusalén, manteniendo la imagen literal de la tienda sin convertirla en una alegoría eclesiológica o escatológica.
  alternative_spanish_readings:
  - Leer la tienda como símbolo primario del pueblo de Dios en sentido escatológico
  - Entender el texto solo como restauración histórico-política
  rationale: El hebreo presenta a Sión/Jerusalén como una morada firme mediante una metáfora concreta de tienda no movida. La traducción debe preservar esa imagen y no resolver en el texto las preguntas interpretativas más amplias.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la redacción.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés de POB. Se mantuvo la metáfora de tienda con sus elementos físicos, se conservó el sujeto explícito ‘tus ojos’, y se evitó suavizar el valor de permanencia de las negaciones con formulaciones demasiado interpretativas. No se requirieron cambios respecto del último pase auditado.
  spanish_consistency_notes:
  - Se usa ‘Sión’ y ‘Jerusalén’ de manera consistente con el paralelismo hebreo.
  - ‘Fiestas señaladas’ conserva el valor cultual de מוֹעֵד sin sustituirlo por un término eclesiástico tradicional que el hebreo no exige.
  - Se mantiene ‘tienda’, ‘estacas’ y ‘cuerdas’ para sostener la unidad de la metáfora.
  - La negación doble del hebreo se refleja con ‘nunca’ y ‘ninguna’ para preservar el énfasis de permanencia.
