translation:
  language: es
  text: Entonces el sacerdote mandará que se degüelle[a] un ave sobre un recipiente de barro que contiene agua corriente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea sacrificado»; el verbo hebreo expresa el degüello ritual de un animal.
    reason: lexical_alternative
  - marker: b
    text: O «agua viva», es decir, agua corriente o fresca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: Then ... shall command
  chosen_spanish: Entonces ... mandará
  alternatives_spanish:
  - Y el sacerdote mandará
  - Entonces el sacerdote ordenará
  lexicon: HALOT
  rationale: En español legal-ritual, «entonces» conserva la secuencia procedimental del waw consecutivo; «mandará» mantiene la idea de dar una orden autorizada sin volver más rígido el estilo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el priest
  - el ministro
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente natural y exacto en contexto cultual levítico.
- source_word: וְשָׁחַט
  english_pob_choice: be slaughtered
  chosen_spanish: se degüelle
  alternatives_spanish:
  - sea sacrificado
  - sea matado
  lexicon: HALOT
  rationale: El verbo refiere a un sacrificio ritual de animal; «degollar» conserva la fuerza concreta del acto mejor que «matar», y la forma pasiva refleja la orden dada por el sacerdote.
- source_word: אֶת־הַצִּפּוֹר הָאֶחָת
  english_pob_choice: one bird
  chosen_spanish: un ave
  alternatives_spanish:
  - un pájaro
  - una de las aves
  lexicon: HALOT
  rationale: «Ave» es más amplio y natural en español bíblico que «pájaro». El numeral indefinido conserva la individuación de הָאֶחָת; el contexto ya señala que se trata de una de dos.
- source_word: אֶל כְּלִי חֶרֶשׂ
  english_pob_choice: over an earthenware vessel
  chosen_spanish: sobre un recipiente de barro
  alternatives_spanish:
  - sobre un vaso de barro
  - sobre un vaso de cerámica
  lexicon: HALOT
  rationale: «Recipiente de barro» transmite bien el utensilio de cerámica sin sonar técnico o arcaizante. La preposición «sobre» sigue la revisión inglesa que alineó mejor la escena con el hebreo.
- source_word: עַל מַיִם חַיִּים
  english_pob_choice: containing fresh water
  chosen_spanish: con agua fresca
  alternatives_spanish:
  - con agua viva
  - con agua corriente
  lexicon: HALOT
  rationale: «Agua fresca» comunica de modo accesible el sentido ritual de מים חיים como agua no estancada. Se preservan las alternativas literales en nota porque el hebreo permite la lectura tradicional «agua viva».
theological_decisions:
- issue: Sentido de מַיִם חַיִּים en el rito de purificación
  english_pob_reading: fresh water
  chosen_spanish_reading: agua fresca
  alternative_spanish_readings:
  - agua viva
  - agua corriente
  rationale: Aquí la expresión describe el tipo de agua usada en el rito, no una elaboración simbólica posterior. «Agua fresca» evita imponer una lectura teológica que el contexto inmediato no exige, pero la nota preserva la ambigüedad lexical.
  doctrine_reference: Translation philosophy §3; §6
- issue: Relación espacial entre el ave y el recipiente
  english_pob_reading: over an earthenware vessel containing fresh water
  chosen_spanish_reading: sobre un recipiente de barro, con agua fresca
  alternative_spanish_readings:
  - dentro de un recipiente de barro con agua fresca
  - sobre un recipiente de barro que contiene agua fresca
  rationale: La revisión inglesa dejó claro que el ave se sacrifica sobre el recipiente, y que el recipiente está asociado con el agua. El español sigue esa misma relación sin añadir más de lo que el hebreo permite.
  doctrine_reference: Textual alignment / source fidelity
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que ajustó la relación preposicional para reflejar mejor el hebreo: el ave se sacrifica sobre el recipiente de barro, y el recipiente está vinculado al agua fresca. Se evitó trasladar mecánicamente «living water» como fórmula teológica fija en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כהן en contexto cultual.
  - «Degüelle» conserva el acto ritual preciso que el inglés POB expresó con «be slaughtered».
  - «Agua fresca» se usa como equivalente funcional de מים חיים, reservando la alternativa más literal en nota.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología ajena al hebreo de este versículo.
