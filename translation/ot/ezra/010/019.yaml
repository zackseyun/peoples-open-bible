theological_decisions:
- issue: Whether to make the sacrificial offering explicit as a 'guilt offering' in the main text
  chosen_reading: Kept the text as 'they offered a ram from the flock for their guilt' rather than inserting 'as a guilt offering'
  alternative_readings:
  - they offered a ram of the flock as a guilt offering for their guilt
  rationale: The Hebrew explicitly mentions a ram and their guilt, but does not include a separate noun for 'offering' in this clause. English can supply 'offered' for readability, but adding the full technical label 'guilt offering' in the main text risks over-specifying beyond the wording. The sacrificial implication is preserved, and the more explicit alternative is noted in a footnote.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; optimal equivalence'
