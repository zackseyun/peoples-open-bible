translation:
  language: es
  text: Ellos solo planean derribarlo de su posición elevada[a]; se complacen en la falsedad. Con la boca bendicen, pero por dentro maldicen[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su dignidad», «de su exaltación» o «de su eminencia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente, «con su boca bendicen»; el sentido probable es colectivo: bendicen exteriormente, pero por dentro maldicen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  - solo / únicamente
  lexicon: HALOT
  rationale: La partícula restringe la intención de los enemigos; «solo» reproduce bien ese valor restrictivo en español natural y mantiene el matiz de exclusividad del texto.
- source_word: מִשְּׂאֵתוֹ
  english_pob_choice: from his high position
  chosen_spanish: de su alta posición
  alternatives_spanish:
  - de su dignidad
  - de su exaltación
  - de su eminencia
  lexicon: HALOT
  rationale: El sustantivo admite ideas de elevación, exaltación o dignidad. «Alta posición» conserva la imagen de elevación y el sentido de estatus sin forzar una sola lectura interpretativa.
- source_word: יָעֲצוּ
  english_pob_choice: plan
  chosen_spanish: planean
  alternatives_spanish:
  - aconsejan
  - toman consejo
  - traman
  lexicon: HALOT
  rationale: El verbo expresa deliberación intencional con matiz hostil. «Planean» es natural en español y refleja la idea de propósito calculado; el contexto ya marca la hostilidad.
- source_word: לְהַדִּיחַ
  english_pob_choice: to cast him down
  chosen_spanish: derribarlo
  alternatives_spanish:
  - arrojarlo abajo
  - hacerlo caer
  - destronarlo
  lexicon: HALOT
  rationale: El hifil transmite hacer caer o expulsar de una posición elevada. «Derribarlo» conserva la imagen de descenso forzado y funciona bien en español bíblico contemporáneo.
- source_word: יִרְצוּ כָזָב
  english_pob_choice: they delight in falsehood
  chosen_spanish: se complacen en la falsedad
  alternatives_spanish:
  - se deleitan en la mentira
  - aprecian la mentira
  - favorecen la falsedad
  lexicon: HALOT
  rationale: רצה con כזב comunica agrado o complacencia en el engaño. «Se complacen en la falsedad» mantiene el registro moral amplio de «falsehood» y evita reducir el campo semántico a una sola mentira aislada.
- source_word: בְּפִיו יְבָרֵכוּ
  english_pob_choice: With their mouth they bless
  chosen_spanish: Con su boca bendicen
  alternatives_spanish:
  - Con la boca bendicen
  - Bendicen con su boca
  lexicon: HALOT
  rationale: Aunque el hebreo literal puede sonar singular en la forma consonántica, el sentido colectivo del contexto exige plural. «Con su boca bendicen» preserva el contraste entre expresión externa e intención interna en español claro.
- source_word: וּבְקִרְבָּם
  english_pob_choice: inwardly
  chosen_spanish: por dentro
  alternatives_spanish:
  - interiormente
  - en su interior
  - dentro de sí
  lexicon: HALOT
  rationale: La expresión señala la disposición interior frente a la palabra externa. «Por dentro» es idiomática, directa y conserva bien el contraste retórico.
- source_word: יְקַלְלוּ
  english_pob_choice: they curse
  chosen_spanish: maldicen
  alternatives_spanish:
  - cursan
  - proferían maldiciones
  - pronuncian maldiciones
  lexicon: HALOT
  rationale: El verbo significa literalmente «maldecir». En español, «maldicen» reproduce la fuerza verbal y mantiene la antítesis con «bendicen».
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Sela
  lexicon: HALOT
  rationale: El término litúrgico se translitera porque su función precisa es incierta. Conservar «Selah» respeta la forma hebrea y la tradición de transliteración del POB.
theological_decisions:
- issue: Sufijo singular masculino en «de su alta posición» y objeto de «derribarlo»
  english_pob_reading: The verse speaks of hostile opponents seeking to bring down the psalmist/the righteous individual from an exalted or secure standing.
  chosen_spanish_reading: El verso presenta a adversarios que buscan derribar al salmista o al justo de su posición elevada o segura.
  alternative_spanish_readings:
  - Podría traducirse de forma más genérica como «de una alta posición»
  - La frase podría enfatizar «dignidad» o «honor» más que «posición»
  rationale: El sufijo hebreo es singular masculino y el contexto es personal. Mantener el singular en español protege el referente individual y evita diluir la fuerza del ataque descrito.
  doctrine_reference: Exégesis del referente pronominal y del sujeto del salmo
- issue: Contraste entre bendecir con la boca y maldecir por dentro
  english_pob_reading: Outwardly they bless, but inwardly they curse.
  chosen_spanish_reading: Exteriormente bendicen, pero interiormente maldicen.
  alternative_spanish_readings:
  - «Con la boca bendicen, pero en su corazón maldicen»
  - «Bendicen de palabra, pero maldicen por dentro»
  rationale: El hebreo presenta una oposición entre expresión pública e intención interna. «Con su boca» / «por dentro» conserva la imagen sin introducir un lenguaje más interpretativo de lo necesario, aunque el sentido sea claramente moral y psicológico.
  doctrine_reference: Integridad del habla y contraste entre apariencia e intención
translation_notes:
  revision_awareness: El texto inglés revisado solo ajustó la puntuación final después de «Selah»; no hubo cambios sustantivos de sentido. La versión española sigue de cerca la lectura auditada del POB y conserva el mismo perfil semántico y retórico.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según el estándar POB, pero este versículo no los contiene.
  - Se mantiene el paralelismo antitético «bendicen / maldicen» para reflejar la estructura hebrea.
  - «Selah» se conserva transliterado por consistencia con el tratamiento POB de términos litúrgicos inciertos.
  - «Alta posición» evita resolver de antemano si el matiz principal es dignidad, exaltación o estatus.
