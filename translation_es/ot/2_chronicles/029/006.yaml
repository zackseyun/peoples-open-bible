revisions:
- from: Porque nuestros padres actuaron con infidelidad y hicieron lo malo ante los ojos de Yahvé nuestro Dios[a]. Lo abandonaron, volvieron sus rostros de espaldas[b] al lugar donde habitaba Yahvé, y le dieron la espalda[c].
  to: Porque nuestros padres actuaron con infidelidad e hicieron lo malo ante los ojos de Yahvé nuestro Dios[a]. Lo abandonaron, apartaron sus rostros de la morada de Yahvé[b], y le dieron la espalda[c].
  rationale: 'La revisión corrige la cláusula central para reflejar fielmente el hebreo y sonar natural en español: «apartaron sus rostros de la morada de Yahvé» preserva tanto la imagen de rechazo como el valor léxico de מִשְׁכָּן. También se ajusta la nota correspondiente para mantener la razón documentada en el audit trail sobre «morada» frente a «tabernáculo».'
