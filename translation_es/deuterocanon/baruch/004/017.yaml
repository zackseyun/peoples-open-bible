translation:
  language: es
  text: Pero en cuanto a mí, ¿cómo puedo ayudarles?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγώ
  english_pob_choice: I / me
  chosen_spanish: en cuanto a mí
  alternatives_spanish:
  - yo
  - por mi parte
  lexicon: BDAG
  rationale: El pronombre explícito se conserva en español mediante una frase enfática natural. «En cuanto a mí» reproduce bien el contraste personal del griego sin sonar forzado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro suave de contraste; «Pero» comunica ese cambio de tono de forma natural en español.
- source_word: τί
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - qué
  lexicon: BDAG
  rationale: 'Aunque τί es literalmente «qué», en esta construcción idiomática expresa la idea de imposibilidad o modo: «cómo puedo ayudar». «Cómo» preserva mejor el sentido del giro retórico.'
- source_word: δυνατή
  english_pob_choice: am I able
  chosen_spanish: puedo
  alternatives_spanish:
  - soy capaz de
  - tengo capacidad para
  lexicon: BDAG
  rationale: El adjetivo con infinitivo expresa capacidad. En español, «puedo» transmite esa capacidad de manera clara y fluida, sin perder el valor semántico del griego.
- source_word: βοηθῆσαι
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - socorrer
  - venir en ayuda de
  lexicon: BDAG
  rationale: βοηθέω significa dar ayuda o auxilio. «Ayudar» es la equivalencia más directa y comprensible en español moderno.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - os
  lexicon: BDAG
  rationale: El dativo plural se refleja en español con el clítico de objeto indirecto «les», que conserva bien el destinatario plural sin añadir volumen innecesario.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa auditada coinciden en una pregunta retórica de incapacidad: no se requirieron cambios revisionales ni variantes textuales.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con español neutral y lectura pública fluida.
  - Se evitó el calco mecánico «¿qué soy capaz de ayudarles?» porque no reproduce bien la idiomática griega ni suena natural en español.
  - La opción «en cuanto a mí» conserva el énfasis del pronombre explícito sin recurrir a una repetición pesada de «yo mismo».
