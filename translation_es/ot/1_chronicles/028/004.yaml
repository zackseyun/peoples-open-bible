base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/028/004.yaml
  text: Yet Yahweh[a], the God of Israel, chose me from all my father's house to be king over Israel forever; for he chose Judah as leader, and in the house of Judah, my father's house, and among my father's sons[b], he took pleasure in me to make me king over all Israel.
  footnotes:
  - marker: a
    text: Or 'as prince' for 'as ruler' (Hebrew nagid).
    reason: lexical_alternative
  - marker: b
    text: '''Forever'' reflects the Hebrew term often used for enduring or perpetual duration, here in the context of the Davidic kingship.'
    reason: cultural_note
