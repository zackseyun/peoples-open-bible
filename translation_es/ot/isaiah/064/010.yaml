review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la referencia al templo, el relativo locativo, ''nuestros padres'', y ''ruina'' están bien encaminados. Sin embargo, la frase ''una quemadura con fuego'' no preserva de manera natural ni fiel el valor de לִשְׂרֵפַת אֵשׁ en español; suena como lesión física más que como devastación por incendio. También falta la nota alternativa sobre ''padres/antepasados'' que el audit trail inglés conserva como opción léxica significativa.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'se ha convertido en una quemadura con fuego' es poco idiomático y confuso. 'Cosas preciosas' es entendible, aunque 'cosas' resulta algo débil; aun así puede mantenerse por amplitud semántica. Conviene ajustar la frase del incendio y añadir la nota sobre 'padres/antepasados' para reflejar mejor el expediente auditado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Se conserva correctamente 'padres' frente a 'antepasados'. La revisión propuesta mantiene el peso nominal de הָיָה לִשְׂרֵפַת אֵשׁ sin caer en un calco extraño, usando 'ha quedado consumida por el fuego' en nota y 'ha venido a ser pasto del fuego' en texto como equivalente español más natural y solemne.
  issues:
  - severity: high
    issue: '''una quemadura con fuego'' es una mala equivalencia para לִשְׂרֵפַת אֵשׁ'
    rationale: En español, 'quemadura' se entiende primariamente como lesión o marca de quemarse, no como estado de un edificio devastado por incendio. Distorsiona la imagen del templo destruido.
  - severity: medium
    issue: Falta la nota léxica sobre 'nuestros padres' / 'nuestros antepasados'
    rationale: El English POB conserva explícitamente esta alternativa por razón de precisión de género y valor histórico-covenantal; debería mantenerse también en español.
  - severity: low
    issue: La nota actual está anclada al sintagma inicial en vez de a la frase del incendio
    rationale: La alternativa 'ha sido quemada por el fuego' corresponde a הָיָה לִשְׂרֵפַת אֵשׁ, no a 'Nuestra casa santa y hermosa'.
  revised_spanish_text: Nuestra casa santa y hermosa, donde nuestros padres[b] te alabaron, ha venido a ser pasto del fuego[a], y todas nuestras cosas preciosas se han vuelto una ruina.
