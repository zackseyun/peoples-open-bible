translation:
  language: es
  text: 'Entonces el ángel de Yahvé respondió y dijo[a]: «Oh Yahvé de los ejércitos, ¿hasta cuándo no tendrás compasión de Jerusalén y de las ciudades de Judá[c][b], contra las cuales has estado airado estos setenta años?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «no mostrarás misericordia a Jerusalén y a las ciudades de Judá».
    reason: lexical_alternative
  - marker: c
    text: O «contra las cuales has estado indignado estos setenta años».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar tanto ‘mensajero’ como ‘ángel’. En este contexto visionario, y siguiendo el uso consolidado de esta figura, ‘ángel’ es la opción más natural en español. Se conserva Yahvé por la norma terminológica del proyecto.
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: HALOT
  rationale: El hebreo introduce una respuesta en diálogo. ‘Respondió’ suena natural en español bíblico moderno y preserva el valor narrativo sin sobrecarga estilística.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: O Yahweh of hosts
  chosen_spanish: Oh Yahvé de los ejércitos
  alternatives_spanish:
  - Oh Yahvé de los ejércitos celestiales
  - Oh Yahvé de las huestes
  lexicon: HALOT
  rationale: צְבָאוֹת se refiere literalmente a ‘ejércitos/huestes’. ‘De los ejércitos’ mantiene la transparencia semántica y la solemnidad del título divino sin sustituirlo por una paráfrasis más interpretativa.
- source_word: עַד מָתַי
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar del lamento/intercesión. La forma interrogativa española conserva la urgencia del hebreo.
- source_word: לֹא תְרַחֵם
  english_pob_choice: will you have no compassion
  chosen_spanish: no tendrás compasión
  alternatives_spanish:
  - no mostrarás misericordia
  - no tendrás misericordia
  lexicon: HALOT
  rationale: רחם expresa compasión/clemencia. ‘No tendrás compasión’ reproduce la negación verbal del hebreo y mantiene el peso afectivo del reclamo sin endurecerlo con un giro excesivamente técnico.
- source_word: אֶת יְרוּשָׁלִַם וְאֵת עָרֵי יְהוּדָה
  english_pob_choice: on Jerusalem and on the cities of Judah
  chosen_spanish: sobre Jerusalén y sobre las ciudades de Judá
  alternatives_spanish:
  - para Jerusalén y para las ciudades de Judá
  - con Jerusalén y con las ciudades de Judá
  lexicon: HALOT
  rationale: Con compadecerse/mostrar compasión, el español prefiere normalmente ‘sobre’ o ‘de’. Aquí ‘sobre’ conserva el paralelismo del hebreo y el foco de la petición sobre ambos objetos.
- source_word: אֲשֶׁר זָעַמְתָּה
  english_pob_choice: against which you have been angry
  chosen_spanish: contra las cuales has estado airado
  alternatives_spanish:
  - con las cuales has estado indignado
  - contra las que te has indignado
  lexicon: HALOT
  rationale: זעם denota ira/indignación. ‘Has estado airado’ mantiene una equivalencia sobria y bíblica; ‘contra las cuales’ refleja mejor la relación semántica introducida por el contexto y la revisión inglesa.
- source_word: זֶה שִׁבְעִים שָׁנָה
  english_pob_choice: these seventy years
  chosen_spanish: estos setenta años
  alternatives_spanish:
  - durante setenta años
  - por estos setenta años
  lexicon: HALOT
  rationale: La deixis de זה se conserva con ‘estos’, que en español suena natural y refleja la duración vigente hasta el momento de la oración.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el default proyectual para el Tetragrámaton en español: ‘Yahvé’. Se evita ‘SEÑOR’ porque el encargo pide no enmascarar el nombre divino y mantener la transparencia textual.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Se conserva la formulación sin resolver la posible identificación teológica de esta figura. El texto no exige importar una lectura doctrinal adicional, por lo que se mantiene la ambigüedad controlada del original.
  doctrine_reference: Translation philosophy §3; no especulación cristológica no explicitada por el texto
- issue: Sentido de la súplica sobre la compasión divina
  english_pob_reading: will you have no compassion
  chosen_spanish_reading: no tendrás compasión
  alternative_spanish_readings:
  - no mostrarás misericordia
  - no tendrás misericordia
  rationale: ‘Compasión’ conserva la fuerza afectiva de רחם y evita aplanarlo de inmediato a un tecnicismo litúrgico. La forma negativa mantiene el reclamo intercesor del hebreo.
  doctrine_reference: HALOT רחם; uso contextual de compasión/misericordia
translation_notes:
  revision_awareness: La base inglesa revisó la frase relacional de ‘with which you have been angry’ a ‘against which you have been angry’ por mayor naturalidad y precisión. La versión española refleja esa revisión con ‘contra las cuales has estado airado’, manteniendo además la posibilidad alternativa de la compasión en la nota b, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con la política del proyecto para יְהוָה.
  - Se usa ‘ángel’ en el texto principal y ‘mensajero’ solo como alternativa anotada, preservando la decisión lexical documentada.
  - ‘Compasión’ se usa en el cuerpo principal para reflejar רחם; la nota ofrece la variante ‘misericordia’ por la ambigüedad española/teológica.
  - ‘Airado’ conserva el matiz de זעם sin sobretraducirlo como ‘indignado’ en el texto principal; la nota alternativa cubre esa opción.
  - La puntuación y el orden de las cláusulas siguen de cerca el hebreo y el texto auditado en inglés, sin forzar calcos innecesarios.
