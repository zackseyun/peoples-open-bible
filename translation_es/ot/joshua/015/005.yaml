review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido básico del hebreo: dos segmentos de límite, ‘oriental’ y ‘del lado norte’; conserva ‘Mar Salado’ para יָם הַמֶּלַח y mantiene ‘lengua del mar’ para לָשׁוֹן הַיָּם. También sigue bien la revisión inglesa al usar ‘extremo’ en ambas ocurrencias de קְצֵה en lugar de una interpretación más fuerte como ‘boca’. Sin embargo, la distribución de las notas b/c quedó invertida respecto del rastro de auditoría inglés: la alternativa sobre ‘extremo del Jordán’ debe anclarse en esa frase, y la nota cultural sobre ‘lengua del mar’ debe quedar solo allí. Además, la nota c actual repite exactamente la lectura principal (‘extremo del Jordán’), por lo que no funciona como alternativa real.'
  spanish_quality_summary: El español es claro, natural y digno. ‘Límite oriental’, ‘Mar Salado’ y ‘desde la lengua del mar’ son legibles en registro bíblico moderno. Solo conviene reparar el sistema de notas para que sea coherente y útil; el texto principal puede mantenerse sin cambios sustanciales.
  glossary_alignment: No hay términos del glosario mayor en juego aparte de topónimos y léxico geográfico. ‘Mar Salado’ está bien alineado con la preferencia por transparencia al original. ‘Límite’ para גְּבוּל y ‘extremo’ para קְצֵה concuerdan con la documentación léxica. No hay conflicto teológico ni terminológico de proyecto.
  issues:
  - severity: medium
    issue: Las notas b y c están mal asignadas en relación con sus anclajes.
    rationale: En el audit trail inglés, la nota cultural corresponde a ‘tongue of the sea’ y la alternativa léxica corresponde al punto donde el Jordán entra en el mar. En el español, ‘del mar[b]’ recibe la nota cultural, pero ‘Jordán[c]’ recibe una nota cuya alternativa repite la lectura principal en vez de ofrecer una opción real.
  - severity: medium
    issue: La nota c no ofrece una alternativa genuina.
    rationale: Dice ‘O “extremo del Jordán”’ cuando el texto principal ya dice ‘extremo del Jordán’. Debe ofrecer una alternativa distinta, p. ej. ‘fin del Jordán’, y luego la aclaración contextual.
  revised_spanish_text: Y el límite oriental era el Mar Salado[a], hasta el extremo del Jordán. Y el límite del lado norte era desde la lengua del mar[b], desde el extremo del Jordán[c].
  revised_footnotes:
  - marker: a
    text: 'O ‘Mar Muerto’. Hebreo: ‘Mar Salado’.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘lengua del mar’, expresión topográfica para una extensión o saliente con forma de lengua.'
    reason: cultural_note
  - marker: c
    text: O ‘fin del Jordán’; aquí se refiere al punto donde el Jordán entra en el mar.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrige la nota c para que aporte una alternativa real y se mantiene la nota cultural anclada a ‘lengua del mar’, en conformidad con el expediente de auditoría inglés y con la semántica del hebreo.
