translation:
  language: es
  text: Sin embargo, un manantial o una cisterna, una acumulación de agua[a], estará limpio; pero el que toque el cadáver de esos animales[b] quedará impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea מִקְוֵה מַיִם puede entenderse como «acumulación de agua», «reunión de aguas» o «poza de agua». Se refiere a agua reunida o almacenada en un manantial o en una cisterna.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su cadáver»; el hebreo usa un singular colectivo con sufijo plural para referirse a los animales muertos mencionados en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Solo
  lexicon: HALOT
  rationale: La partícula introduce una excepción o contraste respecto de las reglas anteriores. «Sin embargo» conserva el valor adversativo de modo natural en español y evita el matiz restrictivo de «solo».
- source_word: מַעְיָן
  english_pob_choice: spring
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - surgencia
  lexicon: HALOT
  rationale: Se trata de una fuente natural de agua. «Manantial» es un equivalente claro y digno en español, cercano a «spring» sin sonar técnico de más.
- source_word: בּוֹר
  english_pob_choice: cistern
  chosen_spanish: cisterna
  alternatives_spanish:
  - pozo
  - hoyo
  - aljibe
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, designa un receptáculo de agua hecho por el ser humano. «Cisterna» comunica esa idea con precisión; «pozo» podría sugerir otra realidad.
- source_word: מִקְוֵה מַיִם
  english_pob_choice: a gathering of water
  chosen_spanish: una reunión de aguas
  alternatives_spanish:
  - un تجمع de aguas
  - una acumulación de aguas
  - una poza de agua
  lexicon: HALOT
  rationale: La expresión hebrea describe agua reunida o acumulada. «Reunión de aguas» mantiene la estructura nominal y la imagen original, sin ocultar la ambigüedad lexical entre depósito, acumulación o conjunto de aguas.
- source_word: יִהְיֶה טָהוֹר
  english_pob_choice: shall be clean
  chosen_spanish: será limpio
  alternatives_spanish:
  - permanecerá limpio
  - será puro
  lexicon: HALOT
  rationale: En el contexto ritual, «limpio» refleja la terminología de pureza/impureza. Se eligió «será limpio» para corresponder de manera cercana al verbo hebreo y evitar una paráfrasis de continuidad no explicitada por el texto.
- source_word: נֹגֵעַ
  english_pob_choice: whoever touches
  chosen_spanish: el que toque
  alternatives_spanish:
  - quien toque
  - el que toca
  lexicon: HALOT
  rationale: El participio funciona de manera genérica. «El que toque» es natural en español bíblico contemporáneo y preserva el valor general de la acción.
- source_word: נִבְלָתָם
  english_pob_choice: their carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - sus cadáveres
  - su cuerpo muerto
  lexicon: HALOT
  rationale: La forma hebrea se refiere al cuerpo muerto de los animales del contexto. «Cadáver» expresa bien la realidad física; se usa el singular posesivo porque el hebreo puede tener sentido colectivo aunque el sufijo sea plural.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - se contaminará
  lexicon: HALOT
  rationale: La fórmula ritual de Levítico se traduce con «impuro», que comunica de forma más directa la categoría cultual que «inmundo» o «contaminado» en español actual.
theological_decisions:
- issue: Terminología ritual de pureza
  english_pob_reading: clean / unclean
  chosen_spanish_reading: limpio / impuro
  alternative_spanish_readings:
  - puro / impuro
  - limpio / inmundo
  rationale: En Levítico 11 el contraste es ritual, no moral. «Limpio / impuro» mantiene la oposición tradicional de pureza ceremonial en un español comprensible y evita la carga arcaizante de «inmundo».
  doctrine_reference: Ley de pureza ceremonial en Levítico; traducción transparente sin desplazar el sentido a categorías morales posteriores.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó la frase de «collecting water» a «a gathering of water» y cambió «shall remain clean» por «shall be clean» para acercarse más al hebreo. La redacción española sigue esa corrección: conserva una construcción nominal cercana («una reunión de aguas») y evita añadir una idea de permanencia no expresada explícitamente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «impuro/limpio» para la terminología ritual, en coherencia con el resto de Levítico.
  - «Cadáver» se emplea en sentido cultual-legal, no como registro funerario moderno.
