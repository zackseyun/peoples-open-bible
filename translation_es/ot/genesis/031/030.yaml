revisions:
- from: Y ahora[a], has ido de verdad, porque anhelaste con gran intensidad la casa de tu padre. ¿Por qué robaste mis dioses?
  to: Y ahora[a], de veras te has ido, porque anhelabas profundamente la casa de tu padre. ¿Por qué robaste mis dioses?
  rationale: 'Se ajusta el énfasis de los dos infinitivos absolutos a un español más natural y digno: «de veras te has ido» refleja mejor la intensificación de הָלֹךְ הָלַכְתָּ que «has ido de verdad», y «anhelabas profundamente» suena más fluido que «anhelaste con gran intensidad» sin perder fuerza. Se conserva «mis dioses» en el texto principal y la nota aclaratoria, en línea con la evidencia fuente y la decisión teológica auditada.'
