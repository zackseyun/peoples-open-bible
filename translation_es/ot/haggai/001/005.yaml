lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Ahora, por tanto
  lexicon: HALOT
  rationale: La conjunción con el adverbio temporal introduce una transición inferencial y exhortativa. «Ahora pues» conserva el enlace discursivo y el tono de aplicación inmediata sin sonar forzado en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» comunica bien la proclamación autorizada en presente y es natural en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración recomendada en el proyecto. «Yahvé» mantiene el Tetragrámaton como nombre propio, en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: El título divino tradicional corresponde bien a «de los ejércitos»; mantiene el sentido de señorío sobre las huestes sin restringirlo indebidamente a una sola esfera.
- source_word: שִׂימוּ לְבַבְכֶם
  english_pob_choice: Set your heart
  chosen_spanish: Pongan su corazón
  alternatives_spanish:
  - Pongan atención
  - Consideren
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pongan su corazón». En español, «poner el corazón» reproduce la imagen idiomática y preserva la fuerza de reflexión deliberada que el audit trail quiso mantener.
- source_word: עַל דַּרְכֵיכֶם
  english_pob_choice: on your ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - sobre sus caminos
  - en su conducta
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora hebrea de conducta o curso de vida. «En» es una preposición natural en español para esta exhortación, sin perder el valor figurado del sustantivo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española debe preservar el nombre propio de Dios, no reemplazarlo por un título. «Yahvé» sigue la convención del proyecto y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó «Consider your ways» a «Set your heart on your ways» para reflejar con más precisión שִׂימוּ לְבַבְכֶם עַל דַּרְכֵיכֶם. La propuesta española sigue esa revisión y conserva explícitamente «corazón» y «caminos».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino, coherente con las pautas del proyecto.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - «Caminos» preserva la metáfora hebrea y armoniza con el tono profético del versículo.
  - La nota al pie marca la alternativa más literal sin desplazar la lectura principal publicada.
