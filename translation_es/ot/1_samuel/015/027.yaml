- from: Mientras Samuel se volvía para irse[a], le asió el borde de su manto, y se rasgó.
  to: Cuando Samuel se volvió para irse[a], agarró el borde de su manto, y se rasgó.
  rationale: Se ajusta la cláusula inicial para reflejar mejor la secuencia hebrea sin una progresividad innecesaria; se reemplaza la construcción ambigua «le asió» por «agarró» con objeto explícito para mayor claridad en español; y se corrige la nota para que preserve alternativas léxicas reales de כָּנָף. No se requiere adjudicación especial.
