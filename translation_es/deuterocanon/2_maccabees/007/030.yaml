translation:
  language: es
  text: 'Y mientras ella aún terminaba, el joven dijo: «¿Qué esperan[a]? No obedezco el mandato del rey, pero obedezco el mandato de la ley que fue dada a nuestros padres por medio de Moisés».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Por qué esperan?». La pregunta griega es elíptica y puede traducirse de cualquiera de estas maneras en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ ταύτης καταληγούσης
  english_pob_choice: And while she was still finishing
  chosen_spanish: Y mientras ella aún terminaba
  alternatives_spanish:
  - Y mientras ella aún estaba hablando
  - Y mientras ella aún llegaba a su fin
  lexicon: LSJ
  rationale: καταληγούσης expresa acción que llega a su término; en contexto se refiere al discurso de la madre. «Aún terminaba» conserva la simultaneidad y evita una paráfrasis más libre.
- source_word: ὁ νεανίας
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven varón
  lexicon: LSJ
  rationale: νεανίας designa a un varón joven. «El joven» suena natural en español y mantiene la referencia narrativa al hijo.
- source_word: Τίνα μένετε;
  english_pob_choice: What are you waiting for?
  chosen_spanish: ¿Qué esperan?
  alternatives_spanish:
  - ¿Por qué esperan?
  - ¿Qué están esperando?
  lexicon: LSJ
  rationale: La pregunta griega es elíptica. En español, la forma breve «¿Qué esperan?» conserva el desafío directo y la fuerza idiomática sin introducir innecesariamente un sujeto explícito.
- source_word: οὐχ ὑπακούω
  english_pob_choice: I do not obey
  chosen_spanish: No obedezco
  alternatives_spanish:
  - No voy a obedecer
  - No estoy obedeciendo
  lexicon: LSJ
  rationale: El presente expresa una negativa firme y resuelta. «No obedezco» sigue de cerca el griego y mantiene el contraste con el mandato real.
- source_word: τοῦ προστάγματος τοῦ βασιλέως
  english_pob_choice: the king’s command
  chosen_spanish: el mandato del rey
  alternatives_spanish:
  - la orden del rey
  - el decreto del rey
  lexicon: LSJ
  rationale: πρόσταγμα puede ser orden, mandato o decreto. «Mandato» conserva bien el valor de orden autoritativa y hace eco del contraste con el mandato de la ley.
- source_word: τοῦ δὲ προστάγματος ἀκούω τοῦ νόμου
  english_pob_choice: but I obey the command of the law
  chosen_spanish: pero obedezco el mandato de la ley
  alternatives_spanish:
  - pero escucho el mandato de la ley
  - pero hago caso al mandato de la ley
  lexicon: LSJ
  rationale: ἀκούω con genitivo puede significar oír, atender u obedecer. Dado el contraste con ὑπακούω y la referencia a una orden, «obedezco» comunica mejor el sentido práctico en español.
- source_word: τοῦ δοθέντος τοῖς πατράσιν ἡμῶν
  english_pob_choice: that was given to our fathers
  chosen_spanish: que fue dada a nuestros padres
  alternatives_spanish:
  - que fue dada a nuestros antepasados
  - que fue entregada a nuestros padres
  lexicon: LSJ
  rationale: πατράσιν es literalmente «padres». Se conserva la forma hereditaria/covenantal «nuestros padres» porque refleja la formulación del texto y el paralelismo tradicional del pasaje.
- source_word: διὰ Μωσῆ
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por Moisés
  - a través de Moisés
  lexicon: LSJ
  rationale: διά con genitivo expresa mediación o agencia. «Por medio de Moisés» es claro en español y mantiene la mediación de la entrega de la ley.
theological_decisions:
- issue: πατράσιν como lenguaje de linaje ancestral y pacto
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros forefathers
  rationale: El griego usa un plural masculino concreto, no un término neutro. Se preserva la referencia ancestral y de pacto con «nuestros padres», sin neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El contexto inglés fue ajustado en la revisión más reciente de «Why are you waiting?» a «What are you waiting for?». La propuesta española sigue esa misma comprensión idiomática con una formulación breve y natural («¿Qué esperan?»), sin cambiar el valor de desafío del griego.
  spanish_consistency_notes:
  - Se usa «Moisés» con acento español estándar y la preposición compuesta «por medio de» para la mediación.
  - Se mantiene la tensión entre el mandato del rey y el mandato de la ley, conservando el paralelismo léxico.
  - «Padres» se conserva en sentido ancestral/covenantal, coherente con el tratamiento POB del griego masculino plural.
