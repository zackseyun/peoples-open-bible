translation:
  language: es
  text: aparte de los registrados por genealogía entre los varones de tres años para arriba[a], todo el que entraba en la casa de Yahvé, según lo que requería cada día[b], para su servicio en sus turnos[c], conforme a sus divisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los inscritos por genealogía entre los varones».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo, literalmente: «para el asunto de un día en su día», es decir, lo requerido para cada día.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en sus guardias» o «por sus turnos de servicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: apart from
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - excepto
  lexicon: HALOT
  rationale: La expresión introduce una categoría adicional distinguible de la anterior. «Aparte de» conserva el matiz separativo sin volverlo una mera suma ni una exclusión más fuerte de lo que el hebreo exige.
- source_word: הִתְיַחְשָׂם
  english_pob_choice: those enrolled by genealogy
  chosen_spanish: los inscritos por genealogía
  alternatives_spanish:
  - los registrados por genealogía
  - su inscripción genealógica
  lexicon: HALOT
  rationale: El hitpael de יחס apunta a inscripción/registro genealógico. En español, «inscritos por genealogía» mantiene el valor administrativo y evita una paráfrasis excesiva.
- source_word: לִזְכָרִים
  english_pob_choice: among the males
  chosen_spanish: entre los varones
  alternatives_spanish:
  - entre los hombres
  - para los varones
  lexicon: HALOT
  rationale: El hebreo especifica el grupo masculino; «varones» reproduce con precisión esa restricción de género y suena natural en español bíblico actual.
- source_word: מִבֶּן שָׁלֹשׁ שָׁנִים וּלְמַעְלָה
  english_pob_choice: from three years old and upward
  chosen_spanish: desde tres años de edad y más
  alternatives_spanish:
  - desde la edad de tres años y en adelante
  - desde tres años cumplidos y más
  lexicon: HALOT
  rationale: Es una fórmula de umbral de edad. «Desde tres años de edad y más» conserva el sentido literal y resulta claro para el lector moderno.
- source_word: לְכָל הַבָּא
  english_pob_choice: everyone who entered
  chosen_spanish: todos los que entraban
  alternatives_spanish:
  - cada uno que entraba
  - todos los que llegaban
  lexicon: HALOT
  rationale: El participio expresa una acción habitual o general. «Todos los que entraban» reproduce bien el valor colectivo y continuo del hebreo.
- source_word: לְבֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y la construcción literal «casa de» para בית יהוה.
- source_word: לִדְבַר י֣וֹם בְּיוֹמ֑וֹ
  english_pob_choice: as each day's matter required
  chosen_spanish: según lo que cada día requería
  alternatives_spanish:
  - para lo que requería cada día
  - según la necesidad de cada día
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y alude a la necesidad o exigencia diaria. La versión elegida conserva el sentido sin forzar un calco semítico opaco.
- source_word: לַעֲבֹדָתָם
  english_pob_choice: for their service
  chosen_spanish: para su servicio
  alternatives_spanish:
  - para su labor
  - para su ministerio
  lexicon: HALOT
  rationale: En contexto de templo, עֲבוֹדָה es «servicio». «Ministerio» sería más eclesiástico de lo que el hebreo requiere; «servicio» mantiene el marco cultual.
- source_word: בְּמִשְׁמְרוֹתָם
  english_pob_choice: in their duties
  chosen_spanish: en sus turnos
  alternatives_spanish:
  - en sus guardias
  - en sus funciones
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת puede aludir a turnos/guardias de servicio. «Turnos» comunica con naturalidad la organización por relevos y conserva la idea funcional.
- source_word: כְּמַחְלְקוֹתֵיהֶם
  english_pob_choice: according to their divisions
  chosen_spanish: conforme a sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - de acuerdo con sus clases
  lexicon: HALOT
  rationale: El término se refiere a divisiones ordenadas, probablemente sacerdotales/levíticas. «Conforme a» mantiene el valor normativo de la disposición y suena fluido en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se preserva el nombre propio «Yahvé» en lugar de sustituirlo por un título, siguiendo el criterio del proyecto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Especificación de género en el registro genealógico
  english_pob_reading: among the males
  chosen_spanish_reading: entre los varones
  alternative_spanish_readings:
  - entre las personas
  - entre los inscritos
  rationale: El hebreo usa un sustantivo masculino plural y una referencia explícita a varones. No se neutraliza el género porque ello borraría una restricción semántica presente en el original.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'La versión inglesa revisada mejoró la naturalidad al precisar «everyone who entered» y aclarar la locución diaria como «as each day''s matter required». La redacción española sigue ese mismo ajuste: usa una frase natural para el participio colectivo y explicita la exigencia diaria sin perder el trasfondo idiomático hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelo de grupos y funciones con una sintaxis sobria y legible.
  - «Varones» se usa para reflejar la restricción de género del hebreo.
  - «Servicio», «turnos» y «divisiones» preservan el marco administrativo-cultual del texto.
