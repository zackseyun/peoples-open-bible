base_translation:
  language: en
  yaml_path: translation/ot/genesis/008/001.yaml
  text: But God remembered Noah[a], and all the wild animals, and all the livestock that were with him in the ark. And God caused a wind to pass over the earth[b], and the waters subsided.
  footnotes:
  - marker: a
    text: Or 'God was mindful of Noah.' The Hebrew 'remembered' often implies faithful action, not mere recollection.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רוּחַ can mean 'wind,' 'breath,' or 'spirit.' Here 'wind' best fits the context, though some see an echo of the Spirit/wind over the waters in Genesis 1:2.
    reason: alternative_reading
