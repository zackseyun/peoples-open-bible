    issue: «y no hay investigación» traduce de forma deficiente וְאֵין חֵקֶר
    rationale: El hebreo expresa inescrutabilidad/insondabilidad, no simplemente la ausencia de una investigación. La formulación actual suena torpe y puede malinterpretarse.
  - severity: medium
    issue: Ubicación incorrecta del marcador [a]
    rationale: El marcador debe anclarse a la palabra o frase pertinente en el texto, no quedar suelto tras «hay».
  - severity: low
    issue: «cosas grandes» es aceptable pero menos idiomático que «grandes cosas»
    rationale: No es un error; «cosas grandes» es comprensible. Se puede conservar para evitar una revisión innecesaria, ya que la corrección principal está en la frase idiomática central.
