    issue: ‘al borde de Gibeá’ suena poco natural y demasiado literal
    rationale: Aunque קצה puede significar ‘borde/extremo’, para una localidad en español ‘a las afueras de Gibeá’ comunica mejor el sentido espacial y sigue la revisión inglesa hacia ‘outskirts’.
  - severity: medium
    issue: ‘estaba’ para יוֹשֵׁב queda demasiado desnudo en español
    rationale: El hebreo participial indica permanencia/ubicación. En español, ‘se encontraba’ o ‘estaba instalado’ transmite mejor la localización continua sin implicar mera postura física.
  - severity: low
    issue: ‘como seiscientos hombres’ es menos idiomático que ‘unos seiscientos hombres’
    rationale: Ambas pueden reflejar aproximación, pero ‘unos seiscientos hombres’ es más natural y fluido en español narrativo neutro.
  revised_spanish_text: Saúl se encontraba en las afueras de Gibeá[a], bajo el granado[b] que está en Migrón, y el pueblo que estaba con él era de unos seiscientos hombres.
