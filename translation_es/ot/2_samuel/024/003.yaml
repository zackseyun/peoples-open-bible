translation:
  language: es
  text: 'Pero Joab dijo al rey: «Que Yahvé, tu Dios, añada al pueblo cien veces tantos como ahora son, y que los ojos de mi señor el rey lo vean[a]. ¿Por qué mi señor el rey se complace en este asunto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y que los ojos de mi señor el rey lo vean [a ellos]». El hebreo deja implícito el objeto; el sentido es que Joab desea que el rey viva para presenciar un aumento así.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: 'La conjunción adversativa está motivada por el contexto: Joab responde oponiéndose a la petición del rey, no solo continuando la narración. «Pero» preserva ese matiz discursivo en español natural.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la norma del proyecto. «Yahvé» mantiene la referencia al nombre del pacto sin sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu Señor
  lexicon: HALOT
  rationale: El sufijo posesivo de segunda persona masculina singular se expresa de forma directa como «tu Dios».
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la nación
  lexicon: HALOT
  rationale: «עָם» se traduce de manera general como «pueblo». En este contexto censal puede aludir a la población de Israel, pero «pueblo» conserva mejor la amplitud del término hebreo.
- source_word: כָּהֵם וְכָהֵם מֵאָה פְעָמִים
  english_pob_choice: a hundred times as many as they are
  chosen_spanish: cien veces más de lo que ahora es
  alternatives_spanish:
  - cien veces tanto como son
  - cien veces más que ellos
  lexicon: HALOT
  rationale: La expresión hebrea comunica multiplicación abundante a partir del número actual. En español, «cien veces más de lo que ahora es» conserva el sentido idiomático sin volverlo rígidamente literal.
- source_word: וְעֵינֵי אֲדֹנִי הַמֶּלֶךְ רֹאוֹת
  english_pob_choice: and may the eyes of my lord the king see it
  chosen_spanish: y que los ojos de mi señor el rey lo vean
  alternatives_spanish:
  - y que los ojos de mi señor el rey vean esto
  - y que mi señor el rey lo vea
  lexicon: HALOT
  rationale: La imagen hebrea personifica los ojos como sujetos de la visión. En español, se mantiene la metáfora de «los ojos» para no perder el color del hebreo, y se resuelve el objeto implícito con «lo».
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: Es una fórmula cortesana de tratamiento directo. «Señor» comunica mejor la dignidad del título que «amo», y evita una modernización demasiado informal.
- source_word: חָפֵץ
  english_pob_choice: delight in
  chosen_spanish: se complace en
  alternatives_spanish:
  - se deleita en
  - desea
  lexicon: HALOT
  rationale: «חָפֵץ» expresa preferencia o complacencia, no solo deseo. «Se complace en» conserva el matiz evaluativo y la intención cuestionadora de Joab.
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: in this thing
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en esto
  - en esta cosa
  - en este plan
  lexicon: HALOT
  rationale: «דָּבָר» puede abarcar cosa, asunto o materia. «Asunto» suena natural en español y conserva la referencia amplia al tema propuesto, sin especificarlo de más.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente יְהוָה. La traducción española debe preservar el nombre divino en vez de sustituirlo por un título, siguiendo la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Objeto implícito en la cláusula de visión
  english_pob_reading: and may the eyes of my lord the king see it
  chosen_spanish_reading: y que los ojos de mi señor el rey lo vean
  alternative_spanish_readings:
  - y que los ojos de mi señor el rey vean esto
  - y que mi señor el rey lo vea
  rationale: El hebreo omite el objeto explícito, pero el sentido es que el rey alcance a ver ese aumento. «Lo» es una forma sobria de recuperar el referente implícito sin añadir una explicación excesiva.
  doctrine_reference: Principio de transparencia textual / objeto implícito no alterado
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que sustituyó una paráfrasis temporal por una jussiva más directa («and may the eyes... see it»). En español se reflejó esa misma lectura con «y que los ojos... lo vean», evitando una versión interpretativa como «mientras los ojos... todavía lo vean».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se traduce δοῦλος no aplicable aquí; no se introduce terminología eclesiástica ajena al hebreo.
  - «Pueblo» conserva la amplitud de עָם sin convertirlo en «ejército» o «nación».
  - La metáfora de los «ojos» se preserva por fidelidad al hebreo, con el objeto implícito indicado en nota.
