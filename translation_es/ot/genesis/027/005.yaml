translation:
  language: es
  text: Y Rebeca estaba escuchando[a] mientras Isaac hablaba a Esaú su hijo, y Esaú fue al campo para cazar caza[b] y traerla de vuelta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oyó cuando Isaac hablaba a Esaú su hijo». El hebreo puede traducirse de forma más puntual, pero también permite el sentido durativo «estaba escuchando».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para cazar caza y traerla»; también, de forma menos literal, «para cazar y traer lo cazado». El hebreo usa un término general para lo cazado; se evita «venado» porque sería demasiado específico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רִבְקָה
  english_pob_choice: Now Rebekah
  chosen_spanish: Ahora Rebeca
  alternatives_spanish:
  - Y Rebeca
  lexicon: HALOT
  rationale: Al inicio de la escena, וְ introduce continuidad narrativa. En español, «Ahora» marca mejor el desarrollo del relato sin forzar una coordinación literal que suena menos natural.
- source_word: שֹׁמַעַת
  english_pob_choice: was listening
  chosen_spanish: estaba escuchando
  alternatives_spanish:
  - escuchaba
  - oyó
  lexicon: HALOT
  rationale: El participio describe una acción en curso o un estado durativo. «Estaba escuchando» conserva ese valor progresivo mejor que un pasado simple.
- source_word: בְּ/דַבֵּר
  english_pob_choice: when Isaac spoke
  chosen_spanish: mientras Isaac hablaba
  alternatives_spanish:
  - cuando Isaac hablaba
  - así que Isaac hablaba
  lexicon: HALOT
  rationale: La preposición con infinitivo marca simultaneidad. «Mientras Isaac hablaba» expresa con naturalidad la coincidencia temporal entre hablar y escuchar.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - con
  lexicon: HALOT
  rationale: La preposición de dirección del habla se rinde de forma directa con «a» en español.
- source_word: בְּנ֑/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa de manera natural con «su hijo»; el contexto ya identifica a Esaú y no exige reforzar la posesión.
- source_word: וַ/יֵּ֤לֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: הלך en narrativa suele equivaler a un movimiento simple. «Fue» es directo y suficientemente fiel para el contexto.
- source_word: הַ/שָּׂדֶ֔ה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo abierto
  - la campiña
  lexicon: HALOT
  rationale: שׂדה puede ser «campo» o «campo abierto». «El campo» mantiene la referencia amplia y encaja bien con la caza.
- source_word: לָ/צ֥וּד
  english_pob_choice: to hunt
  chosen_spanish: para cazar
  alternatives_spanish:
  - para cazar presas
  - para ir de caza
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para cazar» es el equivalente natural de la acción de צוד en este contexto.
- source_word: צַ֖יִד
  english_pob_choice: game
  chosen_spanish: presa
  alternatives_spanish:
  - caza
  - animal cazado
  lexicon: HALOT
  rationale: ציד designa lo cazado o la presa de la caza. «Presa» conserva el sentido general sin restringirlo a una especie concreta.
- source_word: לְ/הָבִֽיא
  english_pob_choice: to bring back
  chosen_spanish: traerla de vuelta
  alternatives_spanish:
  - traerla
  - llevarla de regreso
  lexicon: HALOT
  rationale: El propósito final del verbo es regresar con lo cazado. «Traerla de vuelta» expresa explícitamente ese regreso y se ajusta al flujo narrativo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió una coordinación más natural en inglés entre «hunting» y «bringing back». En español, se conservó esa coordinación mediante «para cazar ... y traerla de vuelta», manteniendo el sentido de dos propósitos vinculados.
  spanish_consistency_notes:
  - Se mantuvo «Rebeca» y «Esaú» en lugar de formas con acento o transliteraciones variables para consistencia bíblica en español.
  - Se eligió «campo» como equivalente de הַשָּׂדֶה por ser la opción más directa y comprensible en español bíblico contemporáneo.
  - «Presa» refleja mejor que «venado» la amplitud de צַיִד en el hebreo.
  - La construcción «estaba escuchando» preserva la acción en curso del participio hebreo.
  - Se evitó «Señor» u այլ terminología no pertinente, ya que no aparece el nombre divino en este versículo.
