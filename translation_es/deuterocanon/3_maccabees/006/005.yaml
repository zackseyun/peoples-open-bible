  to: Tú quebrantaste a Senaquerib, el gran rey[a] de los asirios, que se había envanecido por sus innumerables fuerzas, que ya había puesto toda la tierra bajo su mano[b] por la lanza, y que se había levantado contra tu santa ciudad, hablando cosas graves con jactancia e insolencia; tú, Soberano[c], haciendo manifiesto tu poder a muchas naciones.
