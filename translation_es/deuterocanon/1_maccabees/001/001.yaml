    reason: cultural_note
  - marker: b
    text: 'O: «derrotó a Darío». El verbo griego literalmente significa «hirió» o «golpeó».'
    reason: lexical_alternative
  revision_rationale: 'Se reancló la nota cultural a «Kittim», que es el término que comenta. Se rehízo la sintaxis para reflejar con claridad la secuencia del griego: después de herir a Darío, Alejandro reinó en su lugar. También se pulió el español con «después de que», «rey de los persas y medos» y la explicitación de «él» para deshacer la ambigüedad del sujeto.'
