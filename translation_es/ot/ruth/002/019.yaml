translation:
  language: es
  text: 'Y su suegra le dijo: «¿Dónde has espigado hoy, y dónde has trabajado? ¡Bendito sea el que se fijó en ti[a]!». Entonces ella le contó a su suegra con quién había trabajado, y dijo: «El nombre del hombre con quien trabajé hoy es Boaz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo más literalmente: «el que te reconoció» o «el que notó tu presencia». «Se fijó en ti» expresa la atención favorable que exige el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמוֹתָהּ
  english_pob_choice: her mother-in-law
  chosen_spanish: su suegra
  alternatives_spanish:
  - su madre política
  - la madre de su esposo
  lexicon: HALOT
  rationale: En español, 'suegra' es el equivalente natural y preciso de la relación familiar en este contexto narrativo.
- source_word: לִקַּטְתְּ
  english_pob_choice: did you glean
  chosen_spanish: has espigado
  alternatives_spanish:
  - has recogido
  - has juntado espigas
  lexicon: HALOT
  rationale: '''Espigar'' conserva la acción técnica de recoger restos de grano en el campo, manteniendo la referencia legal y cultural propia de Rut.'
- source_word: וְאָנָה
  english_pob_choice: and where
  chosen_spanish: y dónde
  alternatives_spanish:
  - y a dónde
  - y en qué lugar
  lexicon: HALOT
  rationale: La forma interrogativa paralela se expresa de modo natural con 'dónde' en español.
- source_word: עָשִׂית
  english_pob_choice: have you worked
  chosen_spanish: has trabajado
  alternatives_spanish:
  - has hecho
  - has laborado
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hecho', el contexto agrícola exige un verbo de labor; 'trabajado' preserva el sentido contextual sin perder naturalidad.
- source_word: יְהִי מַכִּירֵךְ בָּרוּךְ
  english_pob_choice: Blessed be the one who took notice of you
  chosen_spanish: ¡Bendito sea el que ha tomado nota de ti!
  alternatives_spanish:
  - ¡Bendito sea el que te reconoció!
  - ¡Bendito sea el que te prestó atención!
  lexicon: HALOT
  rationale: '''Tomar nota de'' comunica la atención favorable implicada por מַכִּירֵךְ, manteniendo la persona que la favoreció sin reducirlo a una mera identificación.'
- source_word: וַתַּגֵּד
  english_pob_choice: So she told
  chosen_spanish: Entonces ella le contó
  alternatives_spanish:
  - Y ella le dijo
  - Así que ella le explicó
  lexicon: HALOT
  rationale: '''Contó'' reproduce el acto de relatar con suficiente naturalidad en español y encaja con la transición narrativa.'
- source_word: אֵת אֲשֶׁר עָשְׂתָה עִמּוֹ
  english_pob_choice: with whom she had worked
  chosen_spanish: con quién había trabajado
  alternatives_spanish:
  - lo que había hecho con él
  - con el cual había trabajado
  lexicon: HALOT
  rationale: La frase hebrea es más literal 'lo que había hecho con él', pero en este contexto de campo el español necesita explicitar la relación laboral; 'con quién había trabajado' evita ambigüedad y refleja el sentido contextual.
- source_word: שֵׁם הָאִישׁ
  english_pob_choice: The name of the man
  chosen_spanish: El nombre del hombre
  alternatives_spanish:
  - El nombre de aquel hombre
  - El nombre del varón
  lexicon: HALOT
  rationale: Es una equivalencia cercana y natural, conservando el orden y la sobriedad del hebreo.
- source_word: אֲשֶׁר עָשִׂיתִי עִמּוֹ
  english_pob_choice: with whom I worked
  chosen_spanish: con quien he trabajado
  alternatives_spanish:
  - con quien trabajé
  - con quien hice trabajo
  lexicon: HALOT
  rationale: El contexto sigue siendo laboral; el presente perfecto mantiene la referencia al día presente con tono narrativo natural en español.
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: HALOT
  rationale: Se sigue la transliteración tradicional castellana ya establecida para este nombre propio en español bíblico.
translation_notes:
  revision_awareness: Se ha mantenido la lectura narrativa del texto hebreo y la decisión contextual de traducir עשה con sentido laboral, en línea con el rastro de auditoría en inglés; no se detectaron revisiones textuales posteriores que alteren la base de traducción.
  spanish_consistency_notes:
  - Se conserva el tratamiento de respeto implícito en la escena con el pronombre de tercera persona singular.
  - '''Espigado'' se usa como término agrícola específico para no diluir el trasfondo legal y social de Rut.'
  - Se mantiene 'Booz' como forma castellana tradicional del nombre propio, coherente con la práctica bíblica en español.
  - La estructura de diálogo reproduce la alternancia narrativa del hebreo sin añadir explicaciones interpretativas.
