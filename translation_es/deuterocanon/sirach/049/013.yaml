translation:
  language: es
  text: Nehemías —que su memoria sea honrada— levantó nuestras ruinas[a], sanó nuestra destrucción y puso puertas y cerrojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: ''el que levantó para nosotros muros caídos, y colocó puertas y cerrojos, y reconstruyó nuestros edificios/viviendas''. El testimonio hebreo es más amplio: ''nuestras ruinas'' y ''nuestra destrucción'', con la metáfora de sanar la devastación.'
    reason: alternative_reading
lexical_decisions:
- source_word: יאדר זכרו
  english_pob_choice: may his memory be honored
  chosen_spanish: que su memoria sea honrada
  alternatives_spanish:
  - que su memoria sea glorificada
  - que su memoria sea adornada
  - que su recuerdo sea honrado
  lexicon: HALOT
  rationale: El hebreo es una fórmula benedictoria u honorífica, no solo una afirmación de que se le recuerda. En español, el subjuntivo expresa bien ese matiz optativo y 'honrada' conserva la naturalidad y la dignidad del tono.
- source_word: המקים
  english_pob_choice: who raised up
  chosen_spanish: el que levantó
  alternatives_spanish:
  - el que estableció
  - el que reconstruyó
  - el que levantó de nuevo
  lexicon: HALOT
  rationale: '''Levantó'' conserva la imagen de restaurar algo caído y se alinea con el paralelo griego ἐγείραντος. ''Reconstruyó'' sería posible, pero estrecha demasiado la imagen.'
- source_word: חרבתינו
  english_pob_choice: our ruins
  chosen_spanish: nuestras ruinas
  alternatives_spanish:
  - nuestras desolaciones
  - nuestros lugares arruinados
  - nuestras ruinas derruidas
  lexicon: HALOT
  rationale: El hebreo apunta de manera amplia a lugares arruinados. 'Ruinas' es una equivalencia directa, sobria y fiel; el contexto de Nehemías aporta la referencia a la ciudad sin forzarla en la traducción.
- source_word: וירפא
  english_pob_choice: and healed
  chosen_spanish: y sanó
  alternatives_spanish:
  - y curó
  - y restauró
  - y reparó
  lexicon: HALOT
  rationale: Se conserva la metáfora de sanidad aplicada a la devastación. 'Sanó' transmite con claridad esa personificación sin convertir el verbo en un mero término técnico de reparación.
- source_word: הריסתינו
  english_pob_choice: our destruction
  chosen_spanish: nuestra destrucción
  alternatives_spanish:
  - nuestro derrumbe
  - nuestra ruina
  - nuestra devastación
  lexicon: HALOT
  rationale: El término denota lo derribado o destruido. 'Destrucción' sigue la revisión más formal del inglés POB y evita una paráfrasis demasiado libre.
- source_word: ויצב
  english_pob_choice: and set up
  chosen_spanish: y colocó
  alternatives_spanish:
  - y puso
  - y estableció
  - y erigió
  lexicon: HALOT
  rationale: '''Colocó'' funciona bien con los objetos del cierre de la puerta y mantiene un registro claro y literario.'
- source_word: דלתים ובריח
  english_pob_choice: doors and bars
  chosen_spanish: puertas y cerrojos
  alternatives_spanish:
  - puertas y barras
  - portones y cerrojos
  - puertas y pestillos
  lexicon: HALOT
  rationale: En contexto de muralla urbana, el hebreo alude al cierre de las puertas. 'Cerrojos' hace explícita la función de seguridad; el griego μοχλούς confirma esa idea. Se mantiene una equivalencia natural en español sin perder el sentido.
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que prefirió 'destruction' para הריסתינו, reflejándola como 'nuestra destrucción' en lugar de una opción más coloquial. También se corrigió la nota al pie para que el marcador [a] aparezca exactamente en el texto español, evitando el error de validación anterior.
  spanish_consistency_notes:
  - Se preservó el nombre propio 'Nehemías' como forma española establecida y transparente.
  - Se mantuvo la metáfora de sanidad para וירפא, en vez de neutralizarla como simple 'reparó'.
  - Se evitó imponer el vocabulario litúrgico tradicional 'Señor' o similares, porque no corresponde al contenido de este versículo.
  - '''Puertas y cerrojos'' refleja mejor el cierre fortificado en el contexto, sin abandonar la literalidad base del hebreo y del griego.'
