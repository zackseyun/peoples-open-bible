review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: respuesta del rey, petición de no ocultar información, y respuesta deferente de la mujer. Sin embargo, introduce un problema de puntuación/cierre de discurso al meter la segunda intervención dentro de la misma cita iniciada por el rey, lo que desfigura la estructura dialogal del original. Además, la nota [a] en español suena poco natural con «de lo que te pregunto» tras «una cosa».'
  spanish_quality_summary: El español es mayormente natural y digno. «Por favor, no me ocultes nada de lo que te pregunto» y «Por favor, hable, mi señor el rey» son comprensibles. No obstante, la puntuación de comillas debe separarse en dos discursos directos, y conviene suavizar la nota [a] para que el alternativo literal siga siendo inteligible en español. El resto mantiene buena legibilidad.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. «Mi señor el rey» corresponde bien a אֲדֹנִי הַמֶּלֶךְ. «Ocultes» para תְכַחֲדִי y «respondió / dijo» para los verbos de habla están alineados con la evidencia y la filosofía del POB.
  issues:
  - severity: medium
    issue: Puntuación y estructura incorrectas del discurso directo
    rationale: 'El texto español pone la respuesta de la mujer dentro de la cita del rey: «... te pregunto. Y la mujer dijo: “...”». El hebreo presenta dos intervenciones separadas; en español deben cerrarse y reabrirse las comillas para preservar con claridad la estructura dialogal.'
  - severity: low
    issue: Nota [a] demasiado literal y poco idiomática
    rationale: «No me ocultes una cosa de lo que te pregunto» reproduce de forma torpe el hebreo y suena extraña en español. Puede mantenerse el valor alternativo con una formulación más natural como «no me ocultes cosa alguna de lo que te pregunto».
  revised_spanish_text: 'Entonces el rey respondió y dijo a la mujer[a]: «Por favor, no me ocultes nada de lo que te pregunto». Y la mujer dijo: «Por favor, hable[b], mi señor el rey».'
  revised_footnotes:
