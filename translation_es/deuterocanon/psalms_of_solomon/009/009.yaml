  - marker: b
    text: O «ante Yahvé» o «de parte de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: «Alma» también puede entenderse como «vida» o «sí mismo».
    reason: lexical_alternative
  - marker: d
    text: O «en ruina».
    reason: alternative_reading
  revision_rationale: Se conserva la traducción general, pero se ajusta la cláusula final para que el español sea comprensible y fiel sin añadir una interpretación más fuerte que la del griego. «Para destrucción» está respaldado por las alternativas documentadas para ἐν ἀπωλείᾳ y funciona mejor en español que «en destrucción». Además, se corrige la nota [a] para que presente una alternativa real.
