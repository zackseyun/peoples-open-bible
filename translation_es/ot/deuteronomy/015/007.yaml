translation:
  language: es
  text: Si hay entre ustedes[a] algún pobre, uno de tus hermanos[b], en una de tus puertas, en tu tierra que Yahvé tu Dios te está dando, no endurecerás tu corazón ni cerrarás tu mano contra tu hermano pobre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de una de tus ciudades»; literalmente, «en una de tus puertas».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» y «hermano» aquí usan lenguaje familiar para referirse a otros miembros de la comunidad del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En una cláusula legal condicional, «Si» reproduce mejor la apertura casuística del hebreo que un futuro directo o una paráfrasis.
- source_word: יִהְיֶה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - habrá
  lexicon: HALOT
  rationale: 'El valor general de la cláusula legal en español se expresa de manera natural con presente impersonal: «Si hay...», sin perder el sentido de situación hipotética general.'
- source_word: אֶבְיוֹן
  english_pob_choice: poor man
  chosen_spanish: algún pobre
  alternatives_spanish:
  - una persona necesitada
  - un pobre
  lexicon: HALOT
  rationale: «Pobre» conserva la fuerza léxica de אֶבְיוֹן; se mantiene el singular humano sin introducir una formulación más explicativa que el hebreo no exige. «Algún» ayuda a naturalizar la sintaxis española.
- source_word: מֵאַחַד אַחֶיךָ
  english_pob_choice: one of your brothers
  chosen_spanish: uno de tus hermanos
  alternatives_spanish:
  - uno de tus parientes
  - uno de tus compatriotas
  lexicon: HALOT
  rationale: Se preserva el lenguaje familiar/covenantal de «hermanos», que el inglés POB ya documenta como elección deliberada. En español, «hermanos» comunica mejor esa relación comunitaria que una generalización étnica.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  english_pob_choice: within one of your gates
  chosen_spanish: en una de tus puertas
  alternatives_spanish:
  - dentro de una de tus ciudades
  - en uno de tus poblados
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «puertas», ya que el hebreo usa el término como metonimia de la ciudad; la opción más literal es transparente y auditable.
- source_word: בְּאַרְצְךָ אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  english_pob_choice: in your land that Yahweh your God is giving you
  chosen_spanish: en tu tierra que Yahvé tu Dios te está dando
  alternatives_spanish:
  - en la tierra que Yahvé tu Dios te da
  - en tu tierra que Yahvé tu Dios te da
  lexicon: HALOT
  rationale: Se conserva el participio/progresivo con «te está dando», reflejando la dádiva en curso. «Yahvé» sigue el estándar del proyecto para יהוה, y «tierra» mantiene el marco territorial del pacto.
- source_word: לֹא תְאַמֵּץ אֶת לְבָבְךָ
  english_pob_choice: you shall not harden your heart
  chosen_spanish: no endurecerás tu corazón
  alternatives_spanish:
  - no harás duro tu corazón
  - no te endurecerás de corazón
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se vierte con el equivalente natural y asentado en español, «endurecer el corazón», que conserva el valor moral y volitivo del original.
- source_word: וְלֹא תִקְפֹּץ אֶת יָדְךָ
  english_pob_choice: or shut your hand
  chosen_spanish: ni cerrarás tu mano
  alternatives_spanish:
  - ni recogerás tu mano
  - ni te replegarás con la mano
  lexicon: HALOT
  rationale: «Cerrar la mano» reproduce bien la metáfora hebrea de retener ayuda; «ni» coordina con la prohibición anterior de forma idiomática en español.
- source_word: מֵאָחִיךָ הָאֶבְיוֹן
  english_pob_choice: against your poor brother
  chosen_spanish: contra tu hermano pobre
  alternatives_spanish:
  - frente a tu hermano pobre
  - de tu hermano pobre
  lexicon: HALOT
  rationale: La preposición expresa la oposición ética de negar ayuda; «contra» reproduce mejor el valor relacional y adversativo que un simple «de».
theological_decisions:
- issue: Renderización de יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto establece «Yahvé» como forma principal para el nombre divino, preservando la transparencia respecto al tetragrámaton y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Lenguaje de parentesco covenantal con אַחֶיךָ / אָחִיךָ
  english_pob_reading: brothers / brother
  chosen_spanish_reading: hermanos / hermano
  alternative_spanish_readings:
  - parientes
  - compatriotas
  - correligionarios
  rationale: Se conserva la metáfora familiar del texto, importante teológicamente para enmarcar la obligación económica dentro de la comunidad del pacto. La forma masculina singular/plural se mantiene como lenguaje representativo del original legal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El contexto auditado del inglés POB se mantiene sin cambios relevantes: la lectura es de alta concordancia, con decisión estable sobre el valor legal condicional de כִּי, la imagen literal de שְׁעָרִים (‘puertas’) y el lenguaje de parentesco covenantal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se conserva el lenguaje de parentesco en masculino plural/singular («hermanos», «hermano») por fidelidad al hebreo legal.
  - La sintaxis española evita calcos innecesarios, pero conserva las imágenes corporales y espaciales del hebreo.
  - La nota al pie aclara la posible equivalencia contextual de «puertas» con «ciudades» sin borrar la imagen textual.
