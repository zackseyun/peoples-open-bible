review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia y el sentido del hebreo: la gloria de Yahvé sale desde su posición sobre el umbral de la casa y luego toma posición sobre los querubines. Mantiene correctamente «Yahvé», «umbral», «la casa» con nota alternativa a «el templo», y «querubines». Sin embargo, «se puso sobre los querubines» introduce un matiz más dinámico y algo menos preciso que «se detuvo/estuvo sobre» para וַיַּעֲמֹד, y la combinación «salió de sobre» suena poco natural en español.'
  spanish_quality_summary: La redacción es comprensible, pero «salió de sobre» resulta torpe en español general, y «se puso sobre» puede sugerir simplemente colocarse encima más que «quedó/estuvo de pie» o «se detuvo» en la escena visionaria. Una leve revisión mejora la naturalidad sin perder cercanía al hebreo.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; הַבָּיִת → «la casa» con nota «el templo»; הַכְּרוּבִים → «los querubines». No hay conflictos doctrinales. La única mejora es estilístico-lexical para עמד y la frase preposicional מֵעַל.'
  issues:
  - severity: medium
    issue: «salió de sobre el umbral» suena poco idiomático en español
    rationale: Aunque intenta reflejar מֵעַל, en español bíblico natural «se alejó de encima del umbral» o «salió de encima del umbral» comunica mejor la relación espacial sin rigidez impropia.
  - severity: medium
    issue: «se puso sobre los querubines» no refleja con la mayor precisión וַיַּעֲמֹד
    rationale: עמד significa ‘estar de pie, detenerse, permanecer’. «Se puso» enfatiza el acto de colocarse; «se detuvo sobre» o «quedó sobre» preserva mejor el resultado visual de la visión y se acerca más al inglés auditado «stood over».
  revised_spanish_text: Entonces la gloria de Yahvé salió de encima del umbral de la casa y se detuvo sobre los querubines[a].
  revised_footnotes:
  - marker: a
    text: 'O «el templo». El hebreo dice: «la casa».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «de sobre» por «de encima de» para una expresión espacial más natural en español, manteniendo el sentido de מֵעַל. Se cambia «se puso sobre» por «se detuvo sobre» para reflejar mejor וַיַּעֲמֹד (‘se paró/estuvo’) en el contexto visionario. Se conserva «Yahvé», «la casa» y la nota alternativa «el templo» conforme al rastro auditado.
