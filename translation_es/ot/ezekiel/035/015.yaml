revisions:
- from: 'Así como te alegraste sobre la herencia de la casa de Israel porque estaba desolada[a], así haré contigo: desolado[b] estarás, monte Seír, y todo Edom, todo ello[c]. Entonces sabrán que yo soy Yahvé.'
  to: 'Así como te alegraste por la herencia de la casa de Israel porque estaba desolada, así haré contigo: quedarás desolado[a], monte Seír, y todo Edom, por completo[b]. Entonces sabrán que yo soy Yahvé.'
  rationale: Se ajustó «sobre» a «por» para un español más natural sin cambiar el sentido; se reemplazó «desolado estarás» por «quedarás desolado», que suena más idiomático y se acompaña con nota para preservar la fuerza nominal de שְׁמָמָה; se cambió «todo ello» por «por completo» para reflejar la intensificación hebrea de manera natural; y se eliminó la nota problemática sobre «porque sería desolada».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura comparativa y retributiva del hebreo, mantiene «Yahvé» correctamente y refleja la conclusión resultativa «Entonces sabrán». Sin embargo, hay varios puntos donde el español no preserva con precisión la fuerza o la naturalidad del original: «sobre la herencia» suena poco idiomático para el objeto de alegrarse; «desolado estarás» masculiniza indebidamente un juicio dirigido a un monte/territorio y además pierde parte de la fuerza nominal de שְׁמָמָה; y «todo ello» para Edom es poco natural en español. La nota a también introduce una alternativa («sería desolada») que no está bien sustentada por el hebreo aquí.'
  spanish_quality_summary: El texto es generalmente comprensible y digno, pero necesita pulido para sonar natural en español bíblico contemporáneo y evitar formulaciones extrañas. «Te alegraste por la herencia» y «quedarás desolado / quedarás en desolación» fluyen mejor; «todo Edom, por completo» expresa mejor la intensificación hebrea que «todo ello».
  glossary_alignment: Alineación buena con la terminología del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. La revisión propuesta también mantiene la distinción relevante al expresar שְׁמָמָה con fuerza de desolación mediante una nota léxica.
  issues:
  - severity: medium
    issue: «sobre la herencia de la casa de Israel» es poco idiomático en español
    rationale: Aunque calca la decisión inglesa, en español «alegrarse sobre» suena forzado; «alegrarse por» o «a causa de» transmite mejor el objeto/motivo del regocijo sin perder sentido.
  - severity: high
    issue: «desolado estarás» no es la mejor representación de שְׁמָמָה תִהְיֶה
    rationale: El hebreo usa el sustantivo «desolación» predicativamente, y el referente es territorial («monte Seír»/Edom), por lo que «desolado» suena menos exacto y algo extraño. Conviene una formulación como «quedarás desolado» con nota, o mejor aún una que preserve la fuerza nominal.
  - severity: medium
    issue: «todo Edom, todo ello» es antinatural
    rationale: La repetición enfática hebrea כָּל ... כֻּלָּהּ debe sentirse en español, pero «todo ello» no suena natural con un topónimo. «todo Edom, por completo» o «todo Edom entero» comunica mejor la totalidad.
  - severity: medium
    issue: La nota a ofrece una alternativa mal enfocada
    rationale: «Porque sería desolada» no refleja bien שָׁמֵמָה como estado/perfecto referido a la heredad. La nota inglesa relevante no iba aquí sino en la frase de juicio «desolación serás / quedarás desolado».
  revised_spanish_text: 'Así como te alegraste por la herencia de la casa de Israel porque estaba desolada, así haré contigo: quedarás desolado[a], monte Seír, y todo Edom, por completo[b]. Entonces sabrán que yo soy Yahvé.'
  revised_footnotes:
  - marker: a
    text: 'O: «serás una desolación». El hebreo usa más literalmente el sustantivo «desolación»: «desolación serás / llegarás a ser desolación».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y todo Edom, todo él/ella», una manera enfática de expresar la totalidad de Edom.'
    reason: lexical_alternative
  revision_rationale: Se ajustó «sobre» a «por» para un español más natural sin cambiar el sentido; se reemplazó «desolado estarás» por «quedarás desolado», que suena más idiomático y se acompaña con nota para preservar la fuerza nominal de שְׁמָמָה; se cambió «todo ello» por «por completo» para reflejar la intensificación hebrea de manera natural; y se eliminó la nota problemática sobre «porque sería desolada».
