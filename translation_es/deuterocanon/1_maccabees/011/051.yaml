translation:
  language: es
  text: Y arrojaron sus armas y hicieron la paz. Y los judíos fueron honrados ante el rey y ante todos los que estaban en su reino; y regresaron a Jerusalén con mucho botín.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔρριψαν τὰ ὅπλα
  english_pob_choice: threw down their weapons
  chosen_spanish: arrojaron sus armas
  alternatives_spanish:
  - tiraron sus armas
  - dejaron caer sus armas
  lexicon: LSJ
  rationale: El griego usa un verbo fuerte de arrojar, con sentido de desarme o rendición. «Arrojaron sus armas» conserva la fuerza verbal sin sonar forzado en español; «tiraron» es posible, pero menos solemne; «dejaron caer» suaviza demasiado la imagen.
- source_word: ἐποίησαν εἰρήνην
  english_pob_choice: made peace
  chosen_spanish: hicieron la paz
  alternatives_spanish:
  - establecieron la paz
  - concertaron la paz
  lexicon: LSJ
  rationale: La frase griega es una expresión idiomática de conclusión de paz. «Hicieron la paz» sigue de cerca el original y es natural en español bíblico contemporáneo.
- source_word: ἐδοξάσθησαν
  english_pob_choice: were honored
  chosen_spanish: fueron honrados
  alternatives_spanish:
  - fueron glorificados
  - fueron tenidos en honor
  lexicon: LSJ
  rationale: En este contexto histórico, el pasivo de δοξάζω expresa estima pública y reconocimiento, no una glorificación teológica. «Fueron honrados» reproduce esa idea con claridad.
- source_word: ἐναντίον τοῦ βασιλέως
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - en presencia del rey
  - a la vista del rey
  lexicon: LSJ
  rationale: «Ante el rey» conserva el valor relacional y público de ἐναντίον, con un español más fluido que un calco literal.
- source_word: ἐνώπιον πάντων τῶν ἐν τῇ βασιλείᾳ αὐτοῦ
  english_pob_choice: before all those in his kingdom
  chosen_spanish: ante todos los que estaban en su reino
  alternatives_spanish:
  - a la vista de todos los que estaban en su reino
  - en presencia de todos los de su reino
  lexicon: LSJ
  rationale: La construcción amplía el círculo de reconocimiento del rey a toda la población de su reino. «Los que estaban en su reino» refleja el participio con precisión y mantiene el sentido público.
- source_word: ἐπέστρεψαν εἰς Ἰερουσαλήμ
  english_pob_choice: returned to Jerusalem
  chosen_spanish: regresaron a Jerusalén
  alternatives_spanish:
  - volvieron a Jerusalén
  - retornaron a Jerusalén
  lexicon: LSJ
  rationale: «Regresaron» es la forma más natural y digna en español para ἐπέστρεψαν en narración histórica.
- source_word: σκῦλα πολλά
  english_pob_choice: much plunder
  chosen_spanish: mucho botín
  alternatives_spanish:
  - muchos despojos
  - abundante botín
  lexicon: LSJ
  rationale: σκῦλα designa despojos de guerra. «Botín» es la equivalencia más clara y usual en español; «despojos» es más literal pero menos transparente para el lector actual.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego dado y con la traducción inglesa auditada; no se requieren notas de variante ni ajustes por revisión.
