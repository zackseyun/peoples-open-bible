translation:
  language: es
  text: Las hijas de Zelofehad tienen razón[a]. Ciertamente les darás una posesión hereditaria entre los hermanos de su padre[b], y les transferirás la herencia de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Las hijas de Zelofehad hablan correctamente». La traducción «tienen razón» expresa de manera natural el veredicto implícito en la expresión hebrea.'
    reason: lexical_alternative
  - marker: b
    text: El texto hebreo tiene en un punto un sufijo masculino plural en «a ellos», pero el referente en el contexto son las hijas de Zelofehad; por eso el sentido se expresa en español con referente femenino contextual.
    reason: textual_variant
lexical_decisions:
- source_word: כֵּן / דֹּבְרֹת
  english_pob_choice: are right
  chosen_spanish: tienen razón
  alternatives_spanish:
  - hablan correctamente
  - están en lo correcto
  lexicon: HALOT
  rationale: La expresión hebrea funciona aquí como veredicto judicial sobre la validez de la reclamación. En español, 'tienen razón' comunica de forma natural la aprobación del argumento sin perder el sentido evaluativo del original.
- source_word: נָתֹן תִּתֵּן
  english_pob_choice: must surely give
  chosen_spanish: debes darles ciertamente
  alternatives_spanish:
  - ciertamente darás
  - debes sin falta darles
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica el mandato. 'Debes darles ciertamente' conserva esa fuerza imperativa en un español claro y digno.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellas
  - a ellos
  lexicon: HALOT
  rationale: El texto consonántico presenta sufijo masculino plural, pero el referente contextual son las hijas de Zelofehad. En español, el dativo plural 'les' mantiene la referencia contextual sin forzar el género gramatical del original en la forma pronominal.
- source_word: אֲחֻזַּת נַחֲלָה
  english_pob_choice: a hereditary possession
  chosen_spanish: una posesión hereditaria
  alternatives_spanish:
  - un patrimonio heredado
  - una porción de herencia
  lexicon: HALOT
  rationale: La construcción combina posesión territorial y herencia. 'Posesión hereditaria' conserva ambos componentes de modo comprensible y sin sobreinterpretar el término.
- source_word: בְּתוֹךְ אֲחֵי אֲבִיהֶם
  english_pob_choice: among their father's brothers
  chosen_spanish: entre los hermanos de su padre
  alternatives_spanish:
  - entre sus tíos paternos
  - en medio de los hermanos de su padre
  lexicon: HALOT
  rationale: '''Entre los hermanos de su padre'' reproduce el marco clánico del texto de manera directa y natural en español. ''Tíos paternos'' sería más interpretativo; aquí se prefiere la forma transparente del parentesco.'
- source_word: וְהַעֲבַרְתָּ
  english_pob_choice: you shall transfer
  chosen_spanish: transferirás
  alternatives_spanish:
  - harás pasar
  - pasarás
  lexicon: HALOT
  rationale: El hiphil de עבר tiene aquí sentido jurídico-administrativo respecto de una herencia. 'Transferirás' expresa con precisión ese traslado legal en español contemporáneo.
- source_word: נַחֲלַת אֲבִיהֶן
  english_pob_choice: their father's inheritance
  chosen_spanish: la herencia de su padre
  alternatives_spanish:
  - la herencia paterna
  - la herencia de su padre
  lexicon: HALOT
  rationale: Se trata de la porción hereditaria perteneciente al padre fallecido. 'La herencia de su padre' preserva la relación familiar y el valor legal del sustantivo.
theological_decisions:
- issue: Tratamiento del referente masculino plural en el texto consonántico frente al contexto femenino
  english_pob_reading: The Hebrew text has a masculine plural suffix in 'to them' at one point, but the referent in context is Zelophehad's daughters; the sense is therefore rendered with feminine referent in English.
  chosen_spanish_reading: Se conserva el referente contextual femenino en el sentido de la frase, aunque en la forma pronominal española se use 'les' por ser genérico de dativo plural.
  alternative_spanish_readings:
  - darles ... a ellas
  - darles ... a ellos
  rationale: 'El punto no es doctrinal sino textual/gramatical: el hebreo transmite un sufijo masculino plural en un lugar, mientras que el contexto narrativo y legal se refiere inequívocamente a las hijas. El español debe reflejar ese referente sin ocultar la tensión textual.'
  doctrine_reference: Crítica textual y referencia anafórica en el contexto narrativo
- issue: Matiz jurídico de la afirmación inicial
  english_pob_reading: are right
  chosen_spanish_reading: tienen razón
  alternative_spanish_readings:
  - hablan correctamente
  - están en lo correcto
  rationale: La frase hebrea es una validación legal de la petición. 'Tienen razón' mantiene la fuerza de la aprobación judicial y evita un tono demasiado académico o artificial.
  doctrine_reference: Lenguaje legal del Pentateuco
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin cambios de revisión en la versión más reciente. La redacción española procura conservar el veredicto legal, la intensificación del mandato y la tensión textual del sufijo pronominal sin sobreexplicar el verso.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estándar del nombre divino en este proyecto; aquí no aparece.
  - Se evitó 'SEÑOR' como sustituto del tetragrama, ya que el versículo no lo contiene.
  - Se mantuvo un registro formal y claro, adecuado para lectura eclesial y auditabilidad fuente a fuente.
