    rationale: Aunque intenta expresar restauración amplia, 'bienestar' desplaza el foco hacia un estado subjetivo y debilita el enlace con las alternativas literales documentadas ('cautividad', 'cautivos'). 'Restauraré la suerte' preserva mejor el idiomatismo y la auditabilidad frente a la nota inglesa.
  - severity: medium
