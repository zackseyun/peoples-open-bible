translation:
  language: es
  text: Y esta es la copia de la carta[a] que enviaron los espartanos —los gobernantes de los espartanos y la ciudad— a Simón, el sumo sacerdote, y a los ancianos, y a los sacerdotes, y al resto del pueblo de los judíos[b], sus hermanos, saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la copia de las cartas»; el griego usa el plural «cartas», aunque la oración introduce una sola pieza de correspondencia. Aquí se usa el singular «carta» para mayor claridad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el resto del pueblo judío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - duplicado
  lexicon: LSJ
  rationale: En el contexto epistolar, ἀντίγραφον designa una reproducción escrita del documento. «Copia» es el equivalente natural en español moderno y conserva el sentido administrativo del original.
- source_word: ἐπιστολῶν
  english_pob_choice: letter
  chosen_spanish: cartas
  alternatives_spanish:
  - carta
  - epístolas
  lexicon: LSJ
  rationale: El griego usa un plural («cartas»), aunque la frase introduce una sola pieza documental. En español conviene mantener el plural de forma transparente, como hace el griego, sin perder la función introductoria del texto.
- source_word: οἱ Σπαρτιᾶται Σπαρτιατῶν ἄρχοντες καὶ ἡ πόλις
  english_pob_choice: the Spartans—the rulers of the Spartans and the city—
  chosen_spanish: los espartanos, los gobernantes de los espartanos y la ciudad
  alternatives_spanish:
  - los espartanos, los gobernantes de Esparta y la ciudad
  - los gobernantes de los espartanos y la ciudad
  lexicon: LSJ
  rationale: La construcción griega es appositiva y condensada. «Gobernantes» conserva el valor político de ἄρχοντες, y «de los espartanos» sigue más de cerca Σπαρτιατῶν que un simple «de Esparta».
- source_word: ἱερεῖ μεγάλῳ
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  lexicon: LSJ
  rationale: Es el título institucional judío normal en español. «Gran sacerdote» sería más literal, pero menos idiomático y potencialmente confuso.
- source_word: πρεσβυτέροις
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: LSJ
  rationale: En este contexto cívico-religioso se refiere a los dirigentes reconocidos. «Ancianos» comunica esa función con una equivalencia ya establecida en español bíblico, sin imponer un tecnicismo eclesial innecesario.
- source_word: τῷ λοιπῷ δήμῳ τῶν Ἰουδαίων
  english_pob_choice: the rest of the people of the Jews
  chosen_spanish: el resto del pueblo de los judíos
  alternatives_spanish:
  - el resto del pueblo judío
  - los demás judíos
  lexicon: LSJ
  rationale: Δῆμος conserva el sentido de pueblo como cuerpo colectivo. «Del pueblo de los judíos» sigue de cerca la construcción griega y preserva la referencia étnica/cívica del original.
- source_word: ἀδελφοῖς
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - hermanos
  - sus parientes
  lexicon: LSJ
  rationale: La fórmula diplomática expresa una reivindicación de parentesco o fraternidad entre espartanos y judíos. «Sus hermanos» reproduce esa relación explícita, como en el inglés auditado.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - que os vaya bien
  lexicon: LSJ
  rationale: Es la salutación epistolar convencional que corresponde a χαίρειν. «Salud» mantiene una equivalencia breve y formal, adecuada al estilo documental.
theological_decisions:
- issue: Título judío ἱερεῖ μεγάλῳ
  english_pob_reading: high priest
  chosen_spanish_reading: sumo sacerdote
  alternative_spanish_readings:
  - gran sacerdote
  rationale: No hay una disputa doctrinal especial, pero sí una decisión terminológica importante. «Sumo sacerdote» es la forma establecida y clara en español para el oficio del templo, equivalente funcional de «high priest».
  doctrine_reference: Consistencia terminológica bíblica; claridad institucional sin paraphrase.
- issue: Relación fraterna expresada por ἀδελφοῖς
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - hermanos
  - sus parientes
  rationale: La expresión no debe suavizarse a una simple cortesía. Mantener «sus hermanos» conserva la tensión diplomática y la afirmación de fraternidad étnico-política presente en el griego y en el POB inglés.
  doctrine_reference: Consistencia con el léxico bíblico de fraternidad/covenantal kinship.
translation_notes:
  revision_awareness: El audito inglés revisó la frase para reflejar con más precisión el genitivo griego en «the rulers of the Spartans». He reflejado esa revisión manteniendo «los gobernantes de los espartanos» y conservando la estructura appositiva comprimida del original. También he preservado el plural de ἐπιστολῶν con «cartas», porque el griego presenta plural aunque funcione como encabezado de una sola comunicación.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Mantuve «sumo sacerdote» como término técnico estable, no «gran sacerdote», por claridad idiomática.
  - Conservé la fórmula epistolar breve «salud» para χαίρειν, en lugar de un verbo exhortativo más libre.
  - No sustituí «judíos» por una paráfrasis colectiva más amplia, para respetar la referencia étnico-cívica del griego.
  - La puntuación reproduce el arranque documental y la lista de destinatarios sin añadir interpretaciones.
