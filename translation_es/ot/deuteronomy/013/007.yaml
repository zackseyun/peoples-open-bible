translation:
  language: es
  text: 'Porque si tu hermano, el hijo de tu madre, o tu hijo o tu hija, o la mujer de tu seno, o tu amigo[a] que es como tu propia alma, te incita en secreto, diciendo: «Vayamos y sirvamos a otros dioses», dioses que ni tú ni tus padres han conocido—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu amigo que es como tu propia vida/alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְסִיתְךָ
  english_pob_choice: secretly entices you
  chosen_spanish: te seduce en secreto
  alternatives_spanish:
  - te incita en secreto
  - te tienta en secreto
  - te induce en secreto
  lexicon: HALOT
  rationale: El verbo en hifil expresa inducir o atraer a una acción; en este contexto de apostasía, «seduce» comunica bien la fuerza de la persuasión indebida. «En secreto» conserva el valor de בַּסֵּתֶר como circunstancia adverbial.
- source_word: אָחִיךָ בֶן אִמֶּךָ
  english_pob_choice: your brother, the son of your mother
  chosen_spanish: tu hermano, el hijo de tu madre
  alternatives_spanish:
  - tu hermano materno
  - tu hermano, hijo de tu madre
  lexicon: HALOT
  rationale: Se preserva la aposición explícita del hebreo para mantener el énfasis en la cercanía familiar, sin reducirla a una sola etiqueta idiomática.
- source_word: אֵשֶׁת חֵיקֶךָ
  english_pob_choice: the wife of your bosom
  chosen_spanish: la mujer de tu seno
  alternatives_spanish:
  - la esposa de tu abrazo
  - la mujer que tienes en tu seno
  - tu esposa querida
  lexicon: HALOT
  rationale: «Seno» reproduce el hebreo חֵיק con un registro bíblico comprensible en español y conserva la imagen de intimidad cercana. «Mujer» sigue el sustantivo hebreo sin imponer una formulación más interpretativa que «esposa».
- source_word: רֵעֲךָ אֲשֶׁר כְּנַפְשְׁךָ
  english_pob_choice: your friend who is as your own soul
  chosen_spanish: tu amigo[b] que es como tu propia alma
  alternatives_spanish:
  - tu amigo que es como tu propia vida
  - tu compañero que es como tú mismo
  - tu amigo, que es como tu propia alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí expresa la profundidad del vínculo personal; «como tu propia alma» mantiene esa intensidad. Se conserva la posibilidad de lectura alternativa con nota porque el inglés POB también la documenta.
- source_word: בַּסֵּתֶר
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: HALOT
  rationale: La preposición nominal señala el ámbito oculto de la acción; «en secreto» es natural en español y fiel al matiz contextual.
- source_word: נֵלְכָה וְנַעַבְדָה
  english_pob_choice: Let us go and serve
  chosen_spanish: Vamos y sirvamos
  alternatives_spanish:
  - Vayamos y sirvamos
  - Vamos a servir
  - Vayamos a servir
  lexicon: HALOT
  rationale: Los cohortativos expresan una invitación/exhortación inclusiva. «Servir» conserva el valor de עבד en contexto idolátrico mejor que «adorar», que sería más restrictivo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: אֲחֵרִים significa «otros»; la traducción directa evita introducir una cualidad no expresada por el término.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  english_pob_choice: gods that neither you nor your fathers have known
  chosen_spanish: dioses que ni tú ni tus padres conocisteis
  alternatives_spanish:
  - dioses que ni tú ni tus padres habéis conocido
  - dioses que no conociste ni tú ni tus padres
  lexicon: HALOT
  rationale: יַדַע en este contexto denota conocimiento/reconocimiento relacional o pactal. «Conocisteis» conserva el pasado del hebreo y la coordinación negativa de la frase.
theological_decisions:
- issue: Cómo mantener la fuerza retórica de los vínculos familiares e íntimos
  english_pob_reading: Preserve the familial and relational intensity with 'the son of your mother,' 'the wife of your bosom,' and 'your friend who is as your own soul.'
  chosen_spanish_reading: Preservar «el hijo de tu madre», «la mujer de tu seno» y «tu amigo que es como tu propia alma».
  alternative_spanish_readings:
  - tu propio hermano, tu esposa querida y tu amigo más íntimo
  - tu hermano, tu esposa y tu mejor amigo
  rationale: El versículo acumula relaciones cada vez más cercanas para subrayar la gravedad de la tentación. Mantener la explicitud del hebreo preserva esa carga retórica sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Cómo traducir עבד respecto de dioses falsos
  english_pob_reading: Translate as 'serve' rather than 'worship.'
  chosen_spanish_reading: Traducir como «servir» y no como «adorar».
  alternative_spanish_readings:
  - adorar
  - rendir culto a
  rationale: En este contexto, עבד conserva el sentido de servicio religioso. «Servir» es más amplio y evita reducir indebidamente el verbo a una acción litúrgica más estrecha.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó expresiones idiomáticas para mayor naturalidad formal; aquí se siguió la misma intención, pero con equivalentes españoles que conservan la literalidad suficiente del hebreo y la intensidad retórica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no lo contiene.
  - Se usa «dioses» para אֱלֹהִים aquí porque el hebreo va con adjetivo plural «otros», y el contexto es idolátrico.
  - Se conserva «servir» para עבד en lugar de «adorar», en coherencia con la terminología POB documentada.
  - Se eligió «la mujer de tu seno» como equivalente idiomático de «wife of your bosom» sin recurrir a una formulación eclesiástica fija.
  - Se preserva la nota sobre la posible lectura alternativa de רֵעַ/נֶפֶשׁ porque el inglés POB también la documenta.
