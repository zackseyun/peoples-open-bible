translation:
  language: es
  text: Entonces la ofrenda de Judá y Jerusalén será agradable a Yahvé[a][b], como en los días de antaño y como en los años antiguos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Agradable» también puede entenderse como «aceptable».
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda» puede ser más específicamente «ofrenda vegetal» o «ofrenda de cereal» en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָרְבָה
  english_pob_choice: Then ... will be pleasing
  chosen_spanish: Entonces ... será agradable
  alternatives_spanish:
  - Y ... será agradable
  - Y ... será aceptable
  - Entonces ... será aceptable
  lexicon: HALOT
  rationale: El verbo ערב en esta forma expresa que algo resulta agradable o aceptable. «Entonces» conserva la relación consecutiva del waw en el contexto profético, y «será agradable» suena natural en español sin perder el valor evaluativo del verbo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'La preposición ל indica relación orientada hacia Yahvé: la ofrenda es agradable en su presencia y respecto de él. Se mantiene «Yahvé» por la política terminológica del proyecto para el nombre divino.'
- source_word: מִנְחַת
  english_pob_choice: the offering
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la ofrenda vegetal
  - la ofrenda de cereal
  - la oblación
  lexicon: HALOT
  rationale: מִנְחָה puede referirse específicamente a una ofrenda vegetal, pero aquí el contexto de restauración cultual permite un sentido más amplio. «Ofrenda» preserva esa amplitud sin precisar indebidamente el tipo de sacrificio.
- source_word: יְהוּדָה וִירוּשָׁלָם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: de Judá y de Jerusalén
  alternatives_spanish:
  - de Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conservan los nombres propios como en el hebreo. La repetición de «de» refleja con claridad la relación genitiva en español y evita una lectura demasiado compacta.
- source_word: כִּימֵי עוֹלָם
  english_pob_choice: as in the days of old
  chosen_spanish: como en los días de antaño
  alternatives_spanish:
  - como en los días de ayer
  - como en los días de la antigüedad
  - como en los días de antiguo
  lexicon: HALOT
  rationale: עוֹלָם aquí señala antigüedad o lejanía temporal, no eternidad metafísica. «Antaño» comunica bien la idea de un pasado remoto y mantiene el tono poético del paralelismo.
- source_word: וּכְשָׁנִים קַדְמֹנִיּוֹת
  english_pob_choice: and as in former years
  chosen_spanish: y como en los años antiguos
  alternatives_spanish:
  - y como en los años anteriores
  - y como en los años de antaño
  lexicon: HALOT
  rationale: La segunda cola paralela refuerza la referencia a un período previo e ideal. «Años antiguos» conserva la correspondencia con la primera mitad del versículo y su matiz de tiempo pasado considerable.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Siguiendo la convención del proyecto para el español, se usa «Yahvé» y no un sustituto de ocultamiento como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de מִנְחָה
  english_pob_reading: offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - ofrenda vegetal
  - ofrenda de cereal
  rationale: Aunque מִנְחָה puede ser una ofrenda vegetal en contextos cultuales, el marco de la profecía sobre la restauración del culto favorece un término más general. «Ofrenda» evita restringir el sentido más allá de lo que el hebreo exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del expediente inglés y mantiene sin cambios sustantivos la lectura auditada: sentido consecutivo de וְעָרְבָה, nombre divino explícito como Yahvé, y מִנְחָה en un valor amplio de ofrenda. No se detectaron revisiones posteriores que alteren la decisión principal.'
  spanish_consistency_notes:
  - Se mantiene un español moderno y reverente, evitando calcos innecesarios.
  - 'Los paralelismos temporales se conservaron con estructura simétrica: «como en los días de antaño y como en los años antiguos».'
  - No se añadió puntuación interpretativa más allá de la coma de paralelismo.
  - Las notas al pie se anclan en las palabras con ambigüedad léxica real en español.
