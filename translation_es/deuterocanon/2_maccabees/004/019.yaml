translation:
  language: es
  text: Jasón, el hombre vil, envió delegados antioquianos desde Jerusalén[a], llevando trescientas dracmas de plata para el sacrificio a Heracles; pero los que las llevaban pidieron que no se usaran para sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como de Jerusalén», quizá subrayando que fueron enviados en calidad representativa desde Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιερὸς
  english_pob_choice: the vile man
  chosen_spanish: el hombre vil
  alternatives_spanish:
  - el hombre impuro
  - el hombre abominable
  - el hombre malvado
  lexicon: LSJ
  rationale: El adjetivo es fuertemente peyorativo y expresa condena moral/religiosa. «Vil» conserva esa fuerza en español sin suavizarla ni volverla demasiado arcaica.
- source_word: θεωρούς
  english_pob_choice: envoys
  chosen_spanish: embajadores
  alternatives_spanish:
  - enviados
  - delegados
  - emisarios
  lexicon: LSJ
  rationale: En este contexto el término designa personas enviadas oficialmente. «Embajadores» comunica bien la representación formal; se mantiene el matiz de delegación pública que el inglés POB resolvió con «envoys».
- source_word: ὡς ἀπʼ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - como de Jerusalén
  - en representación de Jerusalén
  - desde Jerusalén, como enviados de allí
  lexicon: LSJ
  rationale: La frase puede indicar procedencia o representación. En el cuerpo principal se opta por una solución natural y breve; la nota preserva la alternativa «como de Jerusalén» para el matiz representativo.
- source_word: Ἀντιοχέας
  english_pob_choice: Antiochians
  chosen_spanish: antioquianos
  alternatives_spanish:
  - antioqueños
  - hombres de Antioquía
  - antioquenos
  lexicon: LSJ
  rationale: El etnónimo se vierte con una forma clara y comprensible en español. «Antioquianos» conserva la referencia étnica directa del griego.
- source_word: παρακομίζοντας
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - transportando
  - trayendo
  - conduciendo
  lexicon: LSJ
  rationale: El participio describe el traslado del dinero. «Llevando» es natural en español y mantiene la relación sintáctica con el objeto portado.
- source_word: ἀργυρίου δραχμὰς τριακοσίους
  english_pob_choice: three hundred silver drachmas
  chosen_spanish: trescientas dracmas de plata
  alternatives_spanish:
  - trescientas dracmas de plata
  - trescientas dracmas argentadas
  lexicon: LSJ
  rationale: Se preserva el monto y el material con una construcción idiomática en español. «De plata» corresponde al valor material de la expresión griega.
- source_word: εἰς τὴν τοῦ Ἡρακλέους θυσίαν
  english_pob_choice: for the sacrifice to Heracles
  chosen_spanish: para el sacrificio a Heracles
  alternatives_spanish:
  - para el sacrificio de Heracles
  - para el sacrificio ofrecido a Heracles
  - para el sacrificio a Heracles
  lexicon: LSJ
  rationale: La frase señala el destino cultual del dinero. «A Heracles» mantiene el referente pagano sin sustituirlo por una equivalencia cristianizada o interpretativa.
- source_word: ἠξίωσαν
  english_pob_choice: requested
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - exigieron
  - rogaron
  lexicon: LSJ
  rationale: El verbo expresa una petición o reclamación. «Pidieron» conserva la fuerza suficiente del gesto de los portadores sin exagerarla como exigencia.
- source_word: μὴ χρησθαι εἰς θυσίαν
  english_pob_choice: that they not be used for sacrifice
  chosen_spanish: que no se usaran para sacrificio
  alternatives_spanish:
  - que no se emplearan para sacrificio
  - que no se destinaran al sacrificio
  - que no fueran usados en sacrificio
  lexicon: LSJ
  rationale: La construcción refiere al uso de las dracmas. En español, el plural concuerda naturalmente con «dracmas»; se mantiene la restricción de no destinarlas al rito.
theological_decisions:
- issue: Condena narrativa en μιερὸς
  english_pob_reading: Retain explicit condemnation with 'the vile man'
  chosen_spanish_reading: Mantener la condena explícita con «el hombre vil»
  alternative_spanish_readings:
  - el hombre impuro
  - el hombre profano
  - el hombre abominable
  rationale: 'El griego no es neutral: el narrador juzga moralmente a Jasón. La traducción debe conservar esa valoración negativa sin atenuarla.'
  doctrine_reference: Principio de transparencia léxica; tono evaluativo del narrador
- issue: Posible matiz representativo de ὡς ἀπʼ Ἱεροσολύμων
  english_pob_reading: from Jerusalem, possibly emphasizing that they were sent in a representative capacity from Jerusalem
  chosen_spanish_reading: desde Jerusalén[a]
  alternative_spanish_readings:
  - como de Jerusalén
  - en representación de Jerusalén
  - como enviados de Jerusalén
  rationale: El griego admite que la expresión indique procedencia o representación. Se deja el texto principal sobrio y se documenta la alternativa para no borrar la ambigüedad.
  doctrine_reference: Transparencia textual y preservación de alternativas semánticas
translation_notes:
  revision_awareness: El POB inglés revisó la frase de «Antiochians from Jerusalem as envoys» a «Antiochian envoys from Jerusalem» para reflejar mejor el orden y la sintaxis griegos. La versión española sigue esa revisión al colocar «embajadores antioquianos desde Jerusalén» y mantener el flujo participial con «llevando».
  spanish_consistency_notes:
  - Se usa «Heracles» para el nombre propio pagano, sin reemplazo por una forma tradicionalizada distinta.
  - Se conserva la fuerza peyorativa de μιερὸς con «vil», en armonía con el inglés POB.
  - 'El numeral y la unidad monetaria se mantienen explícitos: «trescientas dracmas de plata».'
  - La estructura del final refleja el griego con un dativo de finalidad vertido naturalmente como «para el sacrificio».
