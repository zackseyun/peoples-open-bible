  text: וַ/אֲנִ֤י אָ֘מַ֤רְתִּי בְ/חָפְזִ֗/י נִגְרַזְתִּי֮ מִ/נֶּ֪גֶד עֵ֫ינֶ֥י/ךָ אָכֵ֗ן שָׁ֭מַעְתָּ ק֥וֹל תַּחֲנוּנַ֗/י בְּ/שַׁוְּעִ֥/י אֵלֶֽי/ךָ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/031/023.yaml
  text: As for me[a], I said in my alarm[b], “I am cut off from before your eyes.” Yet you heard the sound of my pleas when I cried to you for help.
  footnotes:
