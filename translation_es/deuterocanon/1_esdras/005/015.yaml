base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/015.yaml
  text: The sons of Azeir Ezekias[a], the sons of Keilan and Azetas, sixty-seven; the sons of Azaros, four hundred thirty-two.
  footnotes:
  - marker: a
    text: The Greek names in this verse differ notably from the approximate Masoretic parallel, which reads instead 'the sons of Adin, four hundred fifty-four' in the corresponding list location. Because 1 Esdras often reorders or reshapes these returnee lists, the Greek witness is followed here rather than harmonizing to the Hebrew parallel.
