translation:
  language: es
  text: Apártate de tus enemigos, y estate alerta contra tus amigos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los que te aman»; griego paralelo: «amigos».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִשֹּׂנְאֶיךָ / ἐχθρῶν σου
  english_pob_choice: from your enemies
  chosen_spanish: de tus enemigos
  alternatives_spanish:
  - de los que te odian
  - de quienes te odian
  lexicon: HALOT; LXX ἐχθρός
  rationale: El hebreo dice literalmente 'de tus odiadores' y la versión griega usa 'enemigos'. En español, 'enemigos' comunica con naturalidad la relación adversarial y conserva la fuerza proverbial sin volverla torpe.
- source_word: הִבָּדֵל / διαχωρίσθητι
  english_pob_choice: Keep away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Sepárate
  - Aléjate
  lexicon: HALOT
  rationale: El imperativo pide distancia deliberada. 'Apártate' conserva la idea de separación activa y funciona como mandato directo y claro en español.
- source_word: וּמֵאֹהֲבֶיָך / ἀπὸ τῶν φίλων σου
  english_pob_choice: against your friends
  chosen_spanish: contra tus amigos
  alternatives_spanish:
  - de tus amigos
  - de quienes te aman
  lexicon: HALOT; LXX φίλοι
  rationale: La tradición hebrea subyacente dice 'de los que te aman', mientras que el griego dice 'amigos'. En la traducción principal, 'amigos' sigue el paralelo griego y 'contra' mantiene la advertencia vigilante que exige el hebreo y el contexto proverbial.
- source_word: הֵשָּׁמֵר / πρόσεχε
  english_pob_choice: be on guard
  chosen_spanish: estate alerta
  alternatives_spanish:
  - guárdate
  - vigila
  lexicon: HALOT
  rationale: El verbo pide cautela atenta. 'Estate alerta' transmite vigilancia personal continua en un registro natural y sobrio, cercano a 'be on guard'.
theological_decisions:
- issue: Relación entre el hebreo 'los que te aman' y el griego 'amigos'
  english_pob_reading: Render the second group as 'friends' in the main text while preserving 'those who love you' as an alternative.
  chosen_spanish_reading: Traducir en el texto principal 'amigos' y preservar 'los que te aman' en nota.
  alternative_spanish_readings:
  - los que te aman
  - tus seres queridos
  rationale: Como el dossier auditado usa el paralelo griego como dato de traducción, 'amigos' es la opción principal más idiomática y coherente con el contraste sapiencial. La nota conserva la lectura hebrea más literal para no borrar la tensión documental.
  doctrine_reference: 'Principio POB: traducir desde el hebreo preservado, usando el paralelo griego como insumo auditable cuando aclara el sentido.'
translation_notes:
  revision_awareness: Tomé como punto de partida la revisión auditada del inglés, que ajustó la segunda colon de 'even with your friends' a 'against your friends' por mayor cercanía al hebreo y un tono más formal. En español, resolví esa tensión con 'contra tus amigos', mientras mantengo la lectura griega/hebrea en nota.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando corresponda; aquí no aparece el nombre divino.
  - '''Amigos'' se eligió por el paralelo griego φίλων, sin borrar la lectura hebrea más literal, que queda en nota.'
  - '''Apártate'' y ''estate alerta'' conservan el paralelismo imperativo breve del verso.'
  - La preposición 'contra' expresa la cautela relacional sin convertir el consejo en hostilidad activa.
