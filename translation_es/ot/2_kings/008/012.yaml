    reason: lexical_alternative
  - marker: b
    text: O «quemarás sus fortalezas». Literalmente, «enviarás sus fortalezas al fuego».
    reason: lexical_alternative
  revision_rationale: La revisión corrige la ubicación del marcador [a] para que coincida con la frase explicada, elimina la adición no atestiguada «contra el suelo», mejora levemente la naturalidad narrativa en español, y aclara «sus mujeres embarazadas» sin suavizar la violencia del texto ni apartarse de las decisiones léxicas documentadas.
