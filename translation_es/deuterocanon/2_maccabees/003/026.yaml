translation:
  language: es
  text: Pero se le aparecieron otros dos jóvenes, sobresalientes en fuerza, hermosísimos en apariencia y espléndidos en vestidura; y, puestos a ambos lados, lo azotaban sin cesar, asestándole muchos golpes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἕτεροι δὲ δύο
  english_pob_choice: But two other
  chosen_spanish: Pero otros dos
  alternatives_spanish:
  - Y otros dos
  - Entonces dos otros
  lexicon: LSJ
  rationale: ἕτεροι con δύο señala dos figuras adicionales distintas; δέ se expresa con un giro adversativo suave, natural en español narrativo.
- source_word: ἐφάνησαν αὐτῷ
  english_pob_choice: appeared to him
  chosen_spanish: aparecieron a él
  alternatives_spanish:
  - se le aparecieron
  - fueron vistos por él
  lexicon: LSJ
  rationale: El aoristo pasivo/intransitivo de φαίνω se vierte como aparición narrativa. Se conserva αὐτῷ con un dativo explícito de dirección/relación.
- source_word: νεανίαι
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jóvenes varones
  - muchachos
  lexicon: LSJ
  rationale: El término designa hombres jóvenes; 'jóvenes' es natural en español moderno y no añade una connotación militar que el sustantivo no exige.
- source_word: τῇ ῥώμῃ μὲν ἐκπρεπεῖς
  english_pob_choice: outstanding in strength
  chosen_spanish: sobresalientes en fuerza
  alternatives_spanish:
  - distinguido en vigor
  - notables en poder
  lexicon: LSJ
  rationale: ῥώμη refiere fuerza corporal o vigor, y ἐκπρεπής a algo que sobresale. 'Sobresalientes en fuerza' mantiene el sentido físico y la evaluación laudatoria.
- source_word: κάλλιστοι δὲ τὴν δόξαν
  english_pob_choice: most handsome in appearance
  chosen_spanish: hermosísimos en apariencia
  alternatives_spanish:
  - muy bellos en semblante
  - de belleza excelentísima en aspecto
  lexicon: LSJ
  rationale: Aquí δόξα describe el aspecto visible o porte, no 'gloria' en sentido abstracto. Se eligió una expresión española que conserve el superlativo y la referencia externa.
- source_word: διαπρεπεῖς δὲ τὴν περιβολήν
  english_pob_choice: splendid in clothing
  chosen_spanish: espléndidos en su vestidura
  alternatives_spanish:
  - distinguido en su atuendo
  - magníficos en su ropa
  lexicon: LSJ
  rationale: περιβολή se refiere a la vestimenta o atuendo; διαπρεπής añade esplendor/distinción. 'Vestidura' suena digno y bíblico sin volverse arcaico.
- source_word: οἵ καὶ παραστάντες ἐξ ἑκατέρου μέρους
  english_pob_choice: and standing on either side of him
  chosen_spanish: y, puestos a ambos lados de él
  alternatives_spanish:
  - y, colocados a cada lado
  - y, situados de uno y otro lado
  lexicon: LSJ
  rationale: El participio se vierte con valor adverbial. 'Puestos' comunica la posición establecida y mantiene el movimiento narrativo.
- source_word: ἐμαστίγουν αὐτὸν ἀδιαλείπτως
  english_pob_choice: they kept scourging him without ceasing
  chosen_spanish: lo azotaban sin cesar
  alternatives_spanish:
  - lo flagelaban sin interrupción
  - lo castigaban continuamente
  lexicon: LSJ
  rationale: μαστιγόω es azotar/flagelar con fuerza; el imperfecto expresa acción continuada y ἀδιαλείπτως equivale a 'sin cesar'. Se prefiere un español claro y solemne.
- source_word: πολλὰς ἐπιρριπτοῦντες αὐτῷ πληγάς
  english_pob_choice: inflicting many blows on him
  chosen_spanish: lanzándole muchos golpes
  alternatives_spanish:
  - causándole muchas heridas
  - asestándole muchos golpes
  lexicon: LSJ
  rationale: La imagen literal de ἐπιρρίπτω es arrojar/superponer; en español se conserva como un participio de modo que sugiera golpes repetidos. 'Golpes' reproduce πληγαί de manera directa.
theological_decisions:
- issue: Identidad de las figuras celestiales
  english_pob_reading: Render descriptively as 'two other young men' without specifying angelic identity in the translation.
  chosen_spanish_reading: Traducir descriptivamente como 'otros dos jóvenes' sin identificar su naturaleza angelical.
  alternative_spanish_readings:
  - dos ángeles
  - dos seres celestiales
  rationale: El texto griego los llama νεανίαι y los describe por su fuerza, belleza y vestidura, pero en este versículo no los nombra ángeles. La traducción preserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Primacía del texto original y preservación de la ambigüedad narrativa cuando el griego no la resuelve.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente en el matiz de ἀδιαλείπτως, optando por 'sin cesar' como equivalente formal de 'without ceasing'. También se mantuvo el énfasis en el carácter descriptivo de las figuras, sin añadir identificación angelical. La redacción española prioriza claridad pública y fidelidad semántica al griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere; aquí no aparece.
  - '''Jóvenes'' mantiene la neutralidad descriptiva de νεανίαι.'
  - '''Azotar'' conserva la fuerza de μαστιγόω mejor que un simple ''golpear''.'
  - '''Vestidura'' fue preferido sobre ''ropa'' por dignidad estilística y correspondencia con περιβολή.'
