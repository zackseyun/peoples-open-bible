  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Vino nuevo» preserva correctamente תִירוֹשׁ; «rediles» para אֲוֵרוֹת es una buena opción principal. «Establos» para אֻרָוֹת es defendible, aunque «corrales» o «cuadras» serían posibles; no requiere cambio. La principal desalineación está en «producción de», que se aparta del valor de תְבוּאַת como producto/rendimiento.
