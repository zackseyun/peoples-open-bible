translation:
  language: es
  text: Llevarán turbantes de lino sobre la cabeza[a], y prendas interiores de lino sobre sus caderas; no se ceñirán con nada que haga sudar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no se ceñirán con sudor». El hebreo es elíptico; el sentido probable es que no deben llevar o sujetar prendas que produzcan sudoración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּאֲרֵי
  english_pob_choice: turbans
  chosen_spanish: turbantes
  alternatives_spanish:
  - tocados
  - coberturas para la cabeza
  - gorros ornamentales
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término designa una prenda de cabeza, no la idea abstracta de adorno. «Turbantes» mantiene la función cultual y suena natural en español bíblico moderno.
- source_word: פִשְׁתִּים
  english_pob_choice: linen
  chosen_spanish: de lino
  alternatives_spanish:
  - de lino fino
  - de lino tejido
  - de lino (flax)
  lexicon: HALOT
  rationale: En vestimenta, el material se expresa mejor como «lino» en español. Se conserva la repetición del hebreo para mantener la claridad del mandato.
- source_word: מִכְנְסֵי
  english_pob_choice: undergarments
  chosen_spanish: pantalones
  alternatives_spanish:
  - calzoncillos
  - ropa interior
  - breeches
  lexicon: HALOT
  rationale: El término apunta a una prenda inferior, junto al cuerpo. «Pantalones» comunica la cobertura de las piernas en español actual, aunque el hebreo no obliga a una forma exacta; por eso no se precisó más allá de la función básica de la prenda.
- source_word: מָתְנֵיהֶם
  english_pob_choice: their loins
  chosen_spanish: sus lomos
  alternatives_spanish:
  - sus cinturas
  - sus caderas
  - su cintura
  lexicon: HALOT
  rationale: «Lomos» conserva el registro anatómico tradicional y corresponde al ámbito de la vestimenta sacerdotal. «Cinturas» sería más general, pero menos preciso respecto del hebreo.
- source_word: יַחְגְּרוּ
  english_pob_choice: gird themselves
  chosen_spanish: se ceñirán
  alternatives_spanish:
  - se ajustarán
  - se atarán
  - se vestirán con
  lexicon: HALOT
  rationale: El verbo expresa la acción de ceñir o ajustar una prenda alrededor del cuerpo. «Ceñirse» preserva esa fuerza verbal en un español digno y natural.
- source_word: בַּיָּזַע
  english_pob_choice: with anything that causes sweat
  chosen_spanish: con nada que haga sudar
  alternatives_spanish:
  - con sudor
  - con algo que produzca sudor
  - con nada que los haga sudar
  lexicon: HALOT
  rationale: 'El hebreo es elíptico y la POB inglesa opta por expresar el sentido probable: evitar lo que provoque sudoración. En español, «con nada que haga sudar» conserva esa tensión sin convertirla en una interpretación más específica de lo que permite el texto.'
theological_decisions:
- issue: Sentido de la prohibición final sobre el sudor
  english_pob_reading: Render the final clause as a prohibition against wearing or fastening garments that induce sweating.
  chosen_spanish_reading: Traducir la cláusula como una prohibición de ceñirse con algo que provoque sudor.
  alternative_spanish_readings:
  - No se ceñirán con sudor.
  - No se ceñirán con nada de sudor.
  - No llevarán nada que los haga sudar.
  rationale: El hebreo es breve y elíptico; no especifica con precisión el objeto omitido. La formulación española conserva la idea práctica del pasaje sin forzar una lectura más estrecha que el texto no exige.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; keeping lexical/theological tension in priestly clothing regulations'
- issue: Naturaleza de la prenda inferior
  english_pob_reading: undergarments
  chosen_spanish_reading: pantalones
  alternative_spanish_readings:
  - ropa interior
  - calzones
  - breeches
  rationale: El hebreo nombra una prenda de cobertura inferior sacerdotal, pero no obliga a un corte exacto. «Pantalones» ofrece una equivalencia funcional clara para lectores actuales; se evita «ropa interior» por sonar demasiado moderna y menos acorde al registro del pasaje.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; cultic attire terminology'
translation_notes:
  revision_awareness: El borrador sigue la evaluación de alta concordancia del pasaje y no introduce revisiones textuales adicionales; mantiene la ambigüedad del hebreo en la cláusula final mediante una equivalencia funcional prudente.
  spanish_consistency_notes:
  - Se mantiene «lino» de forma consistente para פִשְׁתִּים en ambos miembros del versículo.
  - Se conserva el paralelismo de dos prendas sacerdotales separadas por la cláusula final.
  - La nota al pie ancla únicamente la alternativa interpretativa del hebreo elíptico, siguiendo el audit trail inglés.
  - No se introduce «SEÑOR» ni terminología no presente en este versículo.
