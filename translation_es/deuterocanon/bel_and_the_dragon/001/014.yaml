  text: and they consumed them completely. And it happened that[a], when those men had gone out, the king set the food before Bel, and Daniel commanded his young servants, and they brought ashes and scattered them over the whole temple in the presence of the king alone. Then, after going out, they shut the door and sealed it with the king’s signet ring, and went away.
