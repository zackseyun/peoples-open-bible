translation:
  language: es
  text: 'Entonces se llenó nuestra boca de risa, y nuestra lengua de gritos de alegría[a]; entonces dijeron entre las naciones[b]: «Yahvé ha hecho grandes cosas por ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «nuestra lengua con un grito resonante» o «nuestra lengua con gritos de alegría».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé ha engrandecido para hacer con estos», un giro idiomático que significa «Yahvé ha hecho grandes cosas por ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marca la secuencia temporal y el giro de celebración retrospectiva; «Entonces» es natural en español y conserva el valor discursivo de resultado o consecuencia.
- source_word: יִמָּלֵא
  english_pob_choice: was filled
  chosen_spanish: se llenó
  alternatives_spanish:
  - será llenada
  - está llena
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta pasiva, en el contexto poético retrospectivo de la restauración se entiende como resultado ya experimentado; «se llenó» transmite ese sentido mejor que un futuro literal.
- source_word: שְׂחוֹק
  english_pob_choice: laughter
  chosen_spanish: risa
  alternatives_spanish:
  - risa jubilosa
  - risa de alegría
  lexicon: HALOT
  rationale: El término expresa risa gozosa, no burla. En español, «risa» comunica de manera natural la alegría del paralelismo con רִנָּה.
- source_word: פִּינוּ
  english_pob_choice: our mouth
  chosen_spanish: nuestra boca
  alternatives_spanish:
  - nuestros labios
  - nuestras bocas
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con sufijo plural; «nuestra boca» conserva la imagen corporal singular del original y suena natural en español.
- source_word: וּלְשׁוֹנֵנוּ
  english_pob_choice: and our tongue
  chosen_spanish: y nuestra lengua
  alternatives_spanish:
  - y nuestras lenguas
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «nuestra boca» y la expresión idiomática singular del hebreo; «lengua» es la correspondencia más directa y literaria.
- source_word: רִנָּה
  english_pob_choice: joyful shouting
  chosen_spanish: gritos de alegría
  alternatives_spanish:
  - clamores de alegría
  - canto de júbilo
  - aclamación gozosa
  lexicon: HALOT
  rationale: El sustantivo puede expresar un clamor o grito de júbilo. «Gritos de alegría» conserva el carácter vocal y festivo sin restringirlo a «canto».
- source_word: יֹאמְרוּ
  english_pob_choice: they said
  chosen_spanish: se dirá
  alternatives_spanish:
  - dirán
  - decían
  lexicon: HALOT
  rationale: En español impersonal pasivo refleja bien la cita pública y generalizada «entre las naciones», sin cargar el sujeto explícito más de lo que el hebreo requiere.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» es la opción más transparente y menos cargada teológicamente para el contexto salmódico.
- source_word: הִגְדִּיל יְהוָה לַעֲשׂוֹת עִם אֵלֶּה
  english_pob_choice: Yahweh has done great things for them
  chosen_spanish: Yahvé ha hecho grandes cosas con ellos
  alternatives_spanish:
  - Yahvé ha hecho grandes cosas para ellos
  - Yahvé ha obrado grandemente con ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente que Yahvé «ha engrandecido para hacer con estos». La expresión idiomática se vierte de forma natural como «ha hecho grandes cosas con ellos», preservando el sentido benefactivo sin suavizar el vínculo verbal de לַעֲשׂוֹת עִם אֵלֶּה.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto y no el reemplazo tradicional por un título. «Yahvé» es la forma proyectada por el POB en español y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del perfecto/imperfecto narrativo en יִמָּלֵא
  english_pob_reading: past-reflective ('was filled')
  chosen_spanish_reading: pasado retrospectivo ('se llenó')
  alternative_spanish_readings:
  - futuro ('se llenará')
  - presente ('se llena')
  rationale: El poema recuerda una restauración ya vivida; en español, el pasado reflejado por «se llenó» conserva ese carácter celebrativo y no fuerza una lectura estrictamente futura del imperfecto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el archivo auditado en inglés, pero ajusta el tiempo verbal al español poético retrospectivo y mantiene la elección consistente de «Yahvé» para el nombre divino. También conserva la ambigüedad idiomática de לַעֲשׂוֹת עִם אֵלֶּה mediante una nota, en paralelo al tratamiento auditado en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma coherente con la política del proyecto para יְהוָה.
  - Se prefirió «nuestra boca / nuestra lengua» para respetar el singular colectivo del hebreo.
  - «Gritos de alegría» evita «canto» porque el sustantivo hebreo no exige una forma musical específica.
  - La cita final se dejó en español natural sin añadir «gente» o «personas», porque el hebreo dice simplemente «ellos/estos».
