translation:
  language: es
  text: 'Entonces Yahvé abrió la boca de la asna[a], y ella dijo a Balaam: «¿Qué te he hecho, que me has golpeado estas tres veces[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «la boca de la asna»; el sustantivo es femenino, de modo que «ella dijo» conserva ese rasgo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «esto tres pies/pasos»; aquí la expresión es un modismo que significa «estas tres veces» o «en estas tres ocasiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - causó que se abriera
  - abriese
  lexicon: HALOT
  rationale: El qal wayyiqtol expresa una acción directa y simple; «abrió» reproduce bien la acción de Yahvé sin expansión innecesaria y es natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La POB inglesa preserva el nombre divino como «Yahweh»; en español la forma establecida del mismo enfoque es «Yahvé», evitando la sustitución por un título.
- source_word: פִּי הָאָתוֹן
  english_pob_choice: the mouth of the donkey
  chosen_spanish: la boca de la asna
  alternatives_spanish:
  - la boca del asno
  - la boca de la burra
  lexicon: HALOT
  rationale: El constructo hebreo es literalmente «la boca de la asna». «Asna» mantiene el matiz femenino que se activa también en el verbo siguiente.
- source_word: וַתֹּאמֶר
  english_pob_choice: and she said
  chosen_spanish: y ella dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El verbo femenino singular señala que la hablante es la asna; en español conviene explicitar «ella» para conservar esa marca gramatical y evitar ambigüedad.
- source_word: לְבִלְעָם
  english_pob_choice: to Balaam
  chosen_spanish: a Balaam
  alternatives_spanish:
  - para Balaam
  lexicon: HALOT
  rationale: La preposición ל indica dirección de habla; en español se expresa naturalmente con «a».
- source_word: מֶה עָשִׂיתִי לְךָ
  english_pob_choice: What have I done to you
  chosen_spanish: ¿Qué te he hecho?
  alternatives_spanish:
  - ¿Qué he hecho contra ti?
  - ¿Qué te hice?
  lexicon: HALOT
  rationale: La pregunta idiomática se vuelve más natural en español con «¿Qué te he hecho?», que conserva el sentido de reclamo directo sin sobreexplicar.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de la queja: «¿Qué te he hecho, que...?». «Que» reproduce mejor la relación sintáctica que una causalidad independiente.'
- source_word: הִכִּיתַנִי
  english_pob_choice: you have struck me
  chosen_spanish: me has golpeado
  alternatives_spanish:
  - me has herido
  - me has pegado
  lexicon: HALOT
  rationale: נכה suele significar «golpear, herir, herir con golpe». En español «golpeado» comunica la acción de forma directa y mantiene el tono de la protesta.
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  english_pob_choice: these three times
  chosen_spanish: estas tres veces
  alternatives_spanish:
  - tres ocasiones
  - estas tres ocasiones
  lexicon: HALOT
  rationale: La POB inglesa preserva el valor idiomático como «these three times». En español, «estas tres veces» comunica la expresión hebrea sin perder el demostrativo ni forzar una glosa literal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión del POB de no enmascarar el Tetragrámaton con un título. «Yahvé» es la forma habitual en español para conservar el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Marcas de género en el sujeto que habla
  english_pob_reading: and she said
  chosen_spanish_reading: y ella dijo
  alternative_spanish_readings:
  - y dijo
  rationale: El hebreo usa verbo femenino singular; la asna es sujeto hablante. En español se explicita el femenino para preservar el dato gramatical y narrativo.
  doctrine_reference: 'Género gramatical en el texto hebreo: concordancia verbal con הָאָתוֹן'
translation_notes:
  revision_awareness: 'Coincide con el último pase sin cambios reportados: no hay revisiones aplicadas en el contexto inglés y el consenso de revisión es de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española coherente con la política del proyecto para יְהוָה.
  - Se mantiene un registro sobrio y readable, con puntuación española y comillas angulares.
  - «Asna» refleja el femenino del hebreo y armoniza con el pronombre explícito «ella».
  - La expresión idiomática final se traduce por sentido («estas tres veces») sin perder la repetición enfática del original.
