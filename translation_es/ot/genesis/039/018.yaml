translation:
  language: es
  text: Y cuando alcé mi voz y grité, él dejó su prenda[a] junto a mí y huyó afuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su capa». El hebreo בֶּגֶד es un término general para una prenda o vestidura y no especifica el artículo exacto de ropa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, al
  alternatives_spanish:
  - Y cuando
  - Y fue que
  lexicon: HALOT
  rationale: La construcción narrativa introduce la cláusula temporal; «Y sucedió que» conserva el valor discursivo sin volverla mecánica, y enlaza bien con la frase temporal siguiente.
- source_word: כַּהֲרִימִי
  english_pob_choice: I raised
  chosen_spanish: alzando mi
  alternatives_spanish:
  - cuando alcé mi
  - levantando mi
  lexicon: HALOT
  rationale: El hifil de רום expresa ‘levantar/alzar’; en español, el gerundio «alzando» mantiene la acción simultánea con mayor naturalidad que una literalidad rígida.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: voz
  alternatives_spanish:
  - voz
  - voces
  lexicon: HALOT
  rationale: קוֹל en este contexto es singular y se refiere a la voz del hablante; «mi voz» conserva la relación posesiva y el sentido idiomático de ‘alzar la voz’.
- source_word: וָאֶקְרָא
  english_pob_choice: and cried out
  chosen_spanish: y gritando
  alternatives_spanish:
  - y clamando
  - y exclamando
  lexicon: HALOT
  rationale: קרא aquí expresa una llamada/clamor urgente; «gritando» transmite el estallido vocal del contexto acusatorio, sin añadir contenido no presente.
- source_word: וַיַּעֲזֹב
  english_pob_choice: he left
  chosen_spanish: él dejó
  alternatives_spanish:
  - él abandonó
  - él soltó
  lexicon: HALOT
  rationale: עָזַב describe que dejó allí la prenda; «dejó» es la opción más natural y fiel al movimiento narrativo.
- source_word: בִּגְדוֹ
  english_pob_choice: his garment
  chosen_spanish: su ropa
  alternatives_spanish:
  - su prenda
  - su vestido
  lexicon: HALOT
  rationale: בגד es un término general para vestidura/prenda; «ropa» evita especificar indebidamente un tipo concreto de prenda, manteniendo la amplitud semántica documentada por la nota inglesa.
- source_word: אֶצְלִי
  english_pob_choice: beside me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - al lado de mí
  - cerca de mí
  lexicon: HALOT
  rationale: אצל indica proximidad espacial; «junto a mí» reproduce esa cercanía de manera idiomática en español.
- source_word: וַיָּנָס
  english_pob_choice: and fled
  chosen_spanish: y huyó
  alternatives_spanish:
  - y escapó
  - y corrió fuera
  lexicon: HALOT
  rationale: נוס significa huir/fugarse; «huyó» conserva la urgencia y el matiz de escape.
- source_word: הַחֽוּצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: La forma direccional con ה marca movimiento hacia afuera; «afuera» expresa con naturalidad el destino del movimiento.
translation_notes:
  revision_awareness: El texto inglés auditado está en alto acuerdo con la fuente hebrea y no requiere cambios de sentido. La única tensión lexical documentada es בֶּגֶד, que en español se resuelve sin especificación excesiva, conservando en nota la alternativa «capa» donde el contexto la permitiría.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se conserva la referencia espacial precisa de אצל con «junto a mí».
  - No se introduce vocabulario doctrinal ajeno al versículo; la nota sobre בֶּגֶד preserva la ambigüedad lexical documentada.
