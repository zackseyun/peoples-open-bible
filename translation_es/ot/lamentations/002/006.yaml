translation:
  language: es
  text: Él ha devastado su refugio[a] como un jardín; ha destruido su lugar señalado de reunión[b]. Yahvé ha hecho que se olviden en Sion las festividades señaladas[c] y el sábado, y en la indignación de su ira ha desechado al rey y al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su choza' o 'su tabernáculo'. El término hebreo puede designar un refugio o una choza; la imagen exacta aquí es debatida.
    reason: lexical_alternative
  - marker: b
    text: O 'su lugar de asamblea señalado'; posiblemente 'su tienda de reunión'. La palabra está relacionada con el término que después se traduce 'festividades señaladas'.
    reason: lexical_alternative
  - marker: c
    text: O 'tiempo señalado' o 'fiesta'. En este contexto, junto con 'sábado', el término probablemente se refiere a los tiempos festivos establecidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹס
  english_pob_choice: has laid waste
  chosen_spanish: ha devastado
  alternatives_spanish:
  - ha arrasado
  - ha hecho violencia a
  - ha desolado
  lexicon: HALOT
  rationale: El verbo expresa acción violenta y destructiva; 'ha devastado' comunica bien esa fuerza en español actual sin suavizar el sentido.
- source_word: כַּגַּן
  english_pob_choice: like a garden
  chosen_spanish: como a un jardín
  alternatives_spanish:
  - como un jardín
  lexicon: HALOT
  rationale: La comparación se conserva de forma explícita. En español, 'como a un jardín' mantiene la imagen con fluidez poética, sin cambiar su alcance.
- source_word: שֻׂכּוֹ
  english_pob_choice: his shelter
  chosen_spanish: su lugar de reunión
  alternatives_spanish:
  - su refugio
  - su choza
  - su tabernáculo
  lexicon: HALOT
  rationale: El sustantivo es debatido y el contexto inmediato lo vincula con la idea de reunión/culto. La decisión se alinea con la lectura del audit trail, preservando la ambigüedad en nota y evitando imponer una técnica posterior como 'tabernáculo' sin necesidad.
- source_word: שִׁחֵת
  english_pob_choice: has destroyed
  chosen_spanish: ha destruido
  alternatives_spanish:
  - ha arruinado
  - ha echado a perder
  lexicon: HALOT
  rationale: '''Ha destruido'' reproduce la devastación concreta del contexto de juicio, de modo directo y natural.'
- source_word: מוֹעֲדוֹ
  english_pob_choice: his appointed meeting place
  chosen_spanish: su lugar de reunión
  alternatives_spanish:
  - su lugar señalado
  - su lugar de asamblea
  - su tienda de reunión
  lexicon: HALOT
  rationale: Se mantiene el vínculo con la raíz de 'cita/convocatoria' y se traduce con una expresión clara en español. La opción evita confundir este primer uso espacial con el posterior uso temporal/festal de מוֹעֵד.
- source_word: שִׁכַּח
  english_pob_choice: has caused ... to be forgotten
  chosen_spanish: ha hecho que se olviden
  alternatives_spanish:
  - ha hecho olvidar
  - ha borrado de la memoria
  lexicon: HALOT
  rationale: El causativo se expresa de forma natural en español. 'Ha hecho que se olviden' conserva la fuerza del hebreo sin forzar una construcción demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, usando 'Yahvé' como forma española estable y reverente del nombre divino.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico tradicional en español, que además es plenamente transparente en este contexto.
- source_word: מוֹעֵד
  english_pob_choice: appointed feast
  chosen_spanish: las festividades señaladas
  alternatives_spanish:
  - el tiempo señalado
  - la fiesta señalada
  - las citas señaladas
  lexicon: HALOT
  rationale: En paralelo con 'sábado', aquí el término tiene fuerza temporal/festal. El plural español refleja mejor el sentido colectivo del hebreo y la nota del audit trail sobre los tiempos señalados o fiestas.
- source_word: וְשַׁבָּת
  english_pob_choice: and Sabbath
  chosen_spanish: y el sábado
  alternatives_spanish:
  - y el día de reposo
  - y el sábado santo
  lexicon: HALOT
  rationale: '''El sábado'' es la forma más clara y natural en español, conservando el referente bíblico sin añadir explicaciones innecesarias.'
- source_word: וַיִּנְאַץ
  english_pob_choice: has spurned
  chosen_spanish: ha desechado
  alternatives_spanish:
  - ha rechazado
  - ha despreciado
  - ha desdeñado
  lexicon: HALOT
  rationale: El verbo comunica rechazo con desprecio. 'Ha desechado' mantiene esa dureza en español y funciona bien con el objeto doble 'rey y sacerdote'.
- source_word: בְּזַעַם אַפּוֹ
  english_pob_choice: in the indignation of his anger
  chosen_spanish: en la indignación de su ira
  alternatives_spanish:
  - en el ardor de su ira
  - en su ira encendida
  - en la furia de su ira
  lexicon: HALOT
  rationale: Se preserva la doble intensificación del hebreo ('indignación' + 'ira') sin neutralizarla. La expresión es solemne y fiel al paralelismo semítico.
- source_word: מֶלֶךְ וְכֹהֵן
  english_pob_choice: king and priest
  chosen_spanish: al rey y al sacerdote
  alternatives_spanish:
  - rey y sacerdote
  - el rey y el sacerdote
  lexicon: HALOT
  rationale: El objeto directo queda claro en español con la preposición 'a'. Se conservan los dos cargos de forma representativa e institucional.
theological_decisions:
- issue: Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se adopta la forma española del nombre divino exigida por el proyecto, manteniendo el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מוֹעֲדוֹ / מוֹעֵד en dos cláusulas
  english_pob_reading: 'first: appointed meeting place; second: appointed feast / appointed time'
  chosen_spanish_reading: 'primer uso: lugar de reunión; segundo uso: festividades señaladas y sábado'
  alternative_spanish_readings:
  - 'primer uso: tienda de reunión; segundo uso: tiempo señalado'
  - 'primer uso: lugar señalado de asamblea; segundo uso: fiesta señalada'
  rationale: 'Se conserva la distinción contextual destacada en el audit trail: el primer término es espacial y el segundo temporal/festal. La traducción evita homogeneizar ambos usos y deja visible la tensión lexicológica del hebreo.'
  doctrine_reference: 'DOCTRINE.md: lexical/context-sensitive rendering'
translation_notes:
  revision_awareness: La revisión más reciente señalaba que el segundo miembro podría sonar más natural en plural ('appointed times') y que 'meeting place' también puede expresarse como 'appointed place/assembly'. En español, se optó por 'lugar de reunión' y 'festividades señaladas' para reflejar mejor la ambigüedad controlada del hebreo y su sentido colectivo/festal en el segundo miembro.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Sion'' se conservó como topónimo bíblico tradicional en español.'
  - Se preservó la distinción entre el primer מוֹעֵד espacial ('lugar de reunión') y el segundo temporal/festal ('festividades señaladas').
  - La doble intensidad de 'indignación de su ira' se conservó deliberadamente para no aplanar el hebreo.
  - '''Rey y sacerdote'' se tradujo con objeto directo explícito (''al rey y al sacerdote'') para naturalidad sintáctica en español.'
