translation:
  language: es
  text: entonces te deleitarás en Yahvé, y yo te haré cabalgar sobre las alturas de la tierra[a]; te alimentaré con la herencia de Jacob tu padre[b], porque la boca de Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares altos de la tierra» o «las alturas del país».
    reason: lexical_alternative
  - marker: b
    text: «Jacob tu padre» usa lenguaje de familia de pacto; es decir, Jacob como antepasado del pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְעַנַּג עַל
  english_pob_choice: will delight yourself in
  chosen_spanish: te deleitarás en
  alternatives_spanish:
  - te deleitarás con
  - encontrarás tu deleite en
  lexicon: HALOT
  rationale: El hitpael de ענג expresa gozo/disfrute intenso y reflexivo. En español, «deleitarse en» conserva bien la orientación personal y relacional con Yahvé sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma editorial acordada en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: וְהִרְכַּבְתִּיךָ
  english_pob_choice: I will make you ride
  chosen_spanish: yo te haré subir
  alternatives_spanish:
  - yo te haré cabalgar
  - yo te pondré montado
  lexicon: HALOT
  rationale: El hifil de רכב es causativo. En español, «haré subir» comunica la elevación resultante y funciona de manera natural en la metáfora del verso, sin perder el sentido de hacer llegar a una posición alta.
- source_word: בָּמוֹתֵי אָרֶץ
  english_pob_choice: the heights of the earth
  chosen_spanish: las alturas de la tierra
  alternatives_spanish:
  - los altos de la tierra
  - los lugares altos de la tierra
  lexicon: HALOT
  rationale: Se conserva la metáfora espacial amplia. «Alturas de la tierra» reproduce bien la imagen sin convertirla en una alusión cultual a «lugares altos», que el contexto no exige.
- source_word: וְהַאֲכַלְתִּיךָ
  english_pob_choice: I will feed you with
  chosen_spanish: te haré comer
  alternatives_spanish:
  - te alimentaré con
  - te haré participar de
  lexicon: HALOT
  rationale: El hifil de אכל puede significar «hacer comer / alimentar». «Te haré comer» mantiene la causalidad verbal y enlaza con el objeto directo «la herencia» de manera fiel al hebreo.
- source_word: נַחֲלַת יַעֲקֹב אָבִיךָ
  english_pob_choice: the inheritance of Jacob your father
  chosen_spanish: la herencia de Jacob tu padre
  alternatives_spanish:
  - la herencia de Jacob, tu antepasado
  - el patrimonio de Jacob tu padre
  lexicon: HALOT
  rationale: «Herencia» conserva el peso pactal/covenantal de נַחֲלָה. Se mantiene «Jacob tu padre» porque el hebreo preserva la fórmula familiar y el audit trail la entiende como lenguaje de familia de pacto.
- source_word: כִּי פִּי יְהוָה דִּבֵּר
  english_pob_choice: for the mouth of Yahweh has spoken
  chosen_spanish: porque la boca de Yahvé ha hablado
  alternatives_spanish:
  - pues la boca de Yahvé ha hablado
  - porque Yahvé ha hablado
  lexicon: HALOT
  rationale: Se conserva la fórmula solemne «la boca de Yahvé» como en el hebreo. No se reduce a «Yahvé ha hablado», para no borrar el matiz profético de autoridad literal de la palabra pronunciada.
theological_decisions:
- issue: Metáfora de «las alturas de la tierra»
  english_pob_reading: Retain the metaphor of exaltation/blessing without over-interpreting it as military conquest, purely geographical elevation, or cultic high places.
  chosen_spanish_reading: 'Conservar la metáfora de exaltación y bendición: «las alturas de la tierra».'
  alternative_spanish_readings:
  - victoria sobre la tierra
  - prosperidad en la tierra
  - los lugares altos de la tierra
  rationale: La frase hebrea permite varias resonancias; la traducción mantiene esa amplitud sin fijar una sola lectura. Así se preserva la tensión interpretativa del texto, en vez de resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it.'
- issue: Lenguaje de pacto en «Jacob tu padre»
  english_pob_reading: '''Jacob your father'' uses covenant-family language; that is, Jacob as the forefather/ancestor of the people.'
  chosen_spanish_reading: 'Mantener el lenguaje de familia de pacto: «Jacob tu padre».'
  alternative_spanish_readings:
  - Jacob tu antepasado
  - Jacob, padre tuyo
  rationale: El hebreo conserva la relación genealógica y pactal. En español, la forma directa «tu padre» reproduce esa densidad sin suavizarla a una explicación más genérica.
  doctrine_reference: 'DOCTRINE.md: covenant-family language / source-sensitive kinship terminology'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y el audit trail inglés: conserva el nombre divino Yahvé, la metáfora de alturas, el verbo causativo «hacer subir/hacer comer» y la fórmula solemne «la boca de Yahvé ha hablado». No se introdujeron cambios respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió un español bíblico moderno, con metáforas intactas y sin sustituir el lenguaje de pacto por paráfrasis explicativas en el cuerpo principal.
  - «Herencia» se usó de forma uniforme para נַחֲלָה en consonancia con el audit trail.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin alejarse del hebreo ni del inglés POB auditado.
