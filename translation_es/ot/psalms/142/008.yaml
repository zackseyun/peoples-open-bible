translation:
  language: es
  text: Saca mi alma de la cárcel, para que dé gracias a tu nombre; los justos me rodearán[a], porque tú tratarás generosamente conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «los justos se coronarán por causa de mí» o «se gloriarán por causa de mí». El verbo hebreo también puede entenderse así, aunque menos comúnmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיאָה
  english_pob_choice: Bring ... out
  chosen_spanish: Saca ... de
  alternatives_spanish:
  - Saca ... fuera de
  - Lleva ... fuera de
  - Libra
  lexicon: HALOT
  rationale: El imperativo causativo de יצא pide una acción de hacer salir. 'Saca ... de' es natural en español y conserva la imagen de salida sin convertirla prematuramente en un abstracto 'libra'.
- source_word: מִמַּסְגֵּר
  english_pob_choice: out of prison
  chosen_spanish: de la cárcel
  alternatives_spanish:
  - de la prisión
  - de la reclusión
  - del calabozo
  lexicon: HALOT
  rationale: מַסְגֵּר denota un lugar de confinamiento. 'Cárcel' es la opción más clara y pública en español moderno, sin endurecer el texto con un matiz más arcaico que el contexto no exige.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ conserva fuerza personal y afectiva. 'Alma' mantiene el paralelismo tradicional con el original y expresa la totalidad de la persona que clama, sin reducirlo a un mero cuerpo encarcelado.
- source_word: לְהוֹדוֹת
  english_pob_choice: so that I may give thanks
  chosen_spanish: para que dé gracias
  alternatives_spanish:
  - para alabar
  - para confesar gracias
  - para dar gracias
  lexicon: HALOT
  rationale: El infinitivo de propósito en español se rinde bien con 'para que dé gracias'. Mantiene el sentido de agradecimiento dirigido a Dios y suena más natural que un giro demasiado literal.
- source_word: אֶת שְׁמֶךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre
  - por tu nombre
  lexicon: HALOT
  rationale: Se conserva 'nombre' porque en hebreo no se reduce a una etiqueta, sino que remite a la persona y reputación divina. 'A tu nombre' refleja la relación verbal de agradecimiento sin ocultar esa dimensión.
- source_word: בִּי
  english_pob_choice: around me
  chosen_spanish: me rodearán
  alternatives_spanish:
  - me circundarán
  - estarán alrededor de mí
  - me cercarán
  lexicon: HALOT
  rationale: La preposición y el verbo admiten un sentido de rodear/ceñir. 'Me rodearán' da una imagen directa y natural en español, y preserva la lectura comunitaria documentada en el audit trail.
- source_word: יַכְתִּרוּ
  english_pob_choice: will surround me
  chosen_spanish: rodearán
  alternatives_spanish:
  - ceñirán
  - coronarán
  - gloriarán
  lexicon: HALOT
  rationale: Hifil de כתר puede entenderse como rodear/ceñir, aunque existe la alternativa más rara de 'coronar' o 'gloriarse'. Se elige 'rodearán' porque es la correspondencia más directa y clara en este contexto.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: HALOT
  rationale: Como sustantivo colectivo, 'los justos' es la equivalencia española más estándar y fiel para צַדִּיקִים en un contexto moral y comunitario.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La cláusula introduce la razón de la reacción de los justos y la confianza del salmista. 'Porque' expresa mejor esa relación causal en español.
- source_word: תִגְמֹל עָלַי
  english_pob_choice: you will deal bountifully with me
  chosen_spanish: tú me harás bien
  alternatives_spanish:
  - tú me recompensarás
  - tú me tratarás con bondad
  - tú me colmarás de bien
  lexicon: HALOT
  rationale: גמל con על puede implicar recompensar o tratar con generosidad. 'Me harás bien' mantiene la amplitud semántica sin introducir una doctrina de mérito, y suena breve y bíblico en español contemporáneo.
theological_decisions:
- issue: Si el final implica retribución por mérito o simple benevolencia divina
  english_pob_reading: God's generous beneficence toward the psalmist, not a doctrinal claim of earned reward
  chosen_spanish_reading: La bondad generosa de Dios hacia el salmista, no una afirmación de recompensa merecida
  alternative_spanish_readings:
  - Dios me pagará según mis méritos
  - Dios me recompensará estrictamente
  rationale: El contexto es una súplica de liberación y expectativa de rescate. En español conviene preservar la amplitud de גמל sin convertirla en una tesis doctrinal sobre mérito humano.
  doctrine_reference: Preservar la tensión lexical y no imponer una lectura sistemática ajena al verso.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se preferió ''rodearán'' frente a una opción más general como ''se reunirán'' para reflejar con mayor precisión el hebreo, sin perder naturalidad en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto para el nombre divino, pero este versículo no contiene el Tetragrámaton explícito.
  - Se mantiene 'justos' para צַדִּיקִים y no 'santos', para evitar desplazar el matiz moral/jurídico del hebreo.
  - La cláusula final se dejó abierta con 'me hará bien' para conservar la amplitud semántica de גמל sin fijar una idea de mérito.
