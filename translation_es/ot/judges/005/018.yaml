translation:
  language: es
  text: Zabulón fue un pueblo que arriesgó su vida hasta la muerte[a], y Neftalí también[b], en las alturas del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘despreció su vida hasta la muerte’; es decir, ‘arriesgó su vida aun hasta la muerte’. El hebreo usa un singular colectivo para Zabulón y un verbo que puede implicar tratar algo con desprecio.
    reason: lexical_alternative
  - marker: b
    text: O ‘en las alturas del campo abierto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבֻלוּן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulun
  lexicon: nombre propio tribal
  rationale: Se translitera el nombre tribal al uso español bíblico natural. 'Zabulón' es reconocible y no añade sentido ajeno al hebreo.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo
  - gente
  - un conjunto de personas
  lexicon: HALOT
  rationale: Conserva el sustantivo colectivo del hebreo aplicado a Zabulón. 'Un pueblo' mantiene la construcción nominal y la valoración colectiva.
- source_word: חֵרֵף
  english_pob_choice: risked
  chosen_spanish: arriesgó
  alternatives_spanish:
  - despreció
  - desafió
  - puso en riesgo
  lexicon: HALOT
  rationale: La revisión inglesa optó por 'risked' para expresar el resultado práctico del verbo. En español, 'arriesgó' comunica bien la acción resultante sin perder el trasfondo de desprecio implícito que el hebreo puede llevar.
- source_word: נַפְשׁוֹ
  english_pob_choice: its life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su propia vida
  lexicon: HALOT
  rationale: En este contexto militar, נֶפֶשׁ refiere a la vida o al ser de la tribu, no al sentido teológico de 'alma'. 'Su vida' es natural y conserva el referente colectivo.
- source_word: לָמוּת
  english_pob_choice: to the death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - para morir
  - hasta morir
  - a muerte
  lexicon: HALOT
  rationale: La expresión española más idiomática para la idea de extremidad es 'hasta la muerte'. Mantiene la fuerza de llegar al límite mortal sin forzar un calco.
- source_word: וְנַפְתָּלִי
  english_pob_choice: and Naphtali also
  chosen_spanish: y Neftalí también
  alternatives_spanish:
  - y Neftalí
  - Neftalí también
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el primer miembro y el valor aditivo de la conjunción. 'También' reproduce el énfasis compartido.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - sobre las
  - en las
  lexicon: HALOT
  rationale: '''Sobre'' transmite mejor la imagen topográfica de ubicación elevada que el simple ''en''.'
- source_word: מְרוֹמֵי
  english_pob_choice: the heights of
  chosen_spanish: las alturas de
  alternatives_spanish:
  - las cumbres de
  - los altos de
  lexicon: HALOT
  rationale: '''Alturas'' es un equivalente claro para el plural constructo de elevación. Evita una lectura cultual de ''lugares altos'' que no está exigida aquí.'
- source_word: שָׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el llano
  - el campo abierto
  - la llanura
  lexicon: HALOT
  rationale: '''Campo'' conserva la imagen literal y funciona bien en español. No se especifica ''campo abierto'' o ''batalla'' porque el hebreo no lo exige de manera explícita.'
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto bélico
  english_pob_reading: its life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - su persona
  rationale: Se evita 'alma' para no cargar el texto con una lectura teológica posterior. El contraste es de exposición de la vida al peligro, no de doctrina antropológica.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ
- issue: 'Valor de חֵרֵף: desprecio vs. arriesgar'
  english_pob_reading: risked its life
  chosen_spanish_reading: arriesgó su vida
  alternative_spanish_readings:
  - despreció su vida
  - menospreció su vida
  rationale: La POB inglesa revisada ya indicó que la idea comunicativa principal es el riesgo extremo. En español, 'arriesgó su vida' expresa esa idea con naturalidad, mientras que 'despreció' preservaría más literalmente la posible tensión léxica del hebreo. La decisión mantiene la fuerza narrativa sin borrar la posible connotación de desprecio.
  doctrine_reference: Léxico verbal hebreo; tensión entre sentido literal y efecto discursivo
- issue: Topografía poética final
  english_pob_reading: on the heights of the field
  chosen_spanish_reading: sobre las alturas del campo
  alternative_spanish_readings:
  - en las alturas del campo
  - sobre las alturas del llano
  - en las alturas de la llanura
  rationale: Se conserva la imagen poética casi literalmente, sin convertirla en 'campo de batalla'. El texto hebreo habla en términos topográficos; la traducción mantiene esa ambigüedad productiva.
  doctrine_reference: Poética hebrea; imaginería topográfica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que reemplazó 'scorned its life' por 'risked its life' para reflejar mejor el valor léxico y lograr una expresión más natural. La versión española sigue esa línea, pero preserva en nota la alternativa literal de desprecio que el verbo hebreo puede sugerir. También se mantuvo la imagen final de 'the heights of the field' sin expandirla a 'campo de batalla'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; aquí no aparece.
  - Se prefirió 'arriesgó su vida' por naturalidad y fidelidad funcional, sin borrar la posible tensión semántica del verbo hebreo.
  - '''Neftalí'' y ''Zabulón'' siguen la tradición bíblica española común y coherente con nombres tribales.'
  - La imagen espacial final se conserva poéticamente, evitando una explicación interpretativa en el texto principal.
