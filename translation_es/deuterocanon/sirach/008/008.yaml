    rationale: El verbo hebreo en piel significa causar vergüenza o deshonra, no simplemente despreciar o pasar por alto.
  - severity: medium
    issue: Falta en el texto principal la segunda mitad hebrea sobre el lector siendo contado entre los ancianos.
    rationale: Se pierde la lógica exhortativa de recordar el propio envejecimiento futuro.
  - severity: medium
    issue: «Revuélvete en sus proverbios» es poco idiomático en español actual.
    rationale: Incluso si fuera apropiado en una nota para la lectura griega, esa formulación no es clara ni eclesialmente natural.
  revised_spanish_text: No avergüences a un anciano[a]; recuerda que tú también serás contado entre los ancianos.
