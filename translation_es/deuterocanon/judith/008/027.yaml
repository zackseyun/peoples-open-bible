    text: Or 'For he did not burn us as he did them, to test their hearts.' The Greek keeps the imagery of fire while using it in the sense of testing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord disciplines/chastens those who draw near to him.' The Greek verb is literally 'scourges,' preserving the severity of the corrective image.
    reason: lexical_alternative
