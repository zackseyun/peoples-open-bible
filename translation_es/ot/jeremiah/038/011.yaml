base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/011.yaml
  text: So Ebed-melech took the men with him and went into the king’s house[a], to a place below the storeroom, and from there took worn-out rags and worn-out garments[c][b], and sent them down by ropes to Jeremiah in the cistern.
  footnotes:
  - marker: a
    text: Or 'to the place under the treasury.' The Hebrew אוֹצָר can refer to a treasury or a storeroom; the context here favors a storage area.
    reason: lexical_alternative
  - marker: b
    text: Or 'worn-out garments.' The Hebrew term מְלָחִים is rare and its exact sense is uncertain, but the context suggests old cloth items used to protect Jeremiah from the ropes.
    reason: lexical_alternative
  - marker: c
    text: Or 'pit.' The Hebrew בּוֹר can denote a pit or a cistern; here 'cistern' fits the narrative setting.
    reason: lexical_alternative
