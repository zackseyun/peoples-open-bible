translation:
  language: es
  text: Al cabo de dos años completos[a], el faraón soñó, y he aquí que estaba de pie junto al Nilo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dos años de días», un modismo hebreo que indica un período completo de dos años.
    reason: lexical_alternative
  - marker: b
    text: O «el río»; en este contexto egipcio, el término se refiere al Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: At the end of
  chosen_spanish: Al cabo de
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo desarrollo temporal; en español, «al cabo de» comunica de modo natural ese giro de tiempo sin perder la función de enlace narrativo.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - después de
  - al término de
  lexicon: HALOT
  rationale: קֵץ con prefijo מִן marca el punto final de un período. «Al cabo de» conserva la idea de término consumado mejor que un simple «después de».
- source_word: שְׁנָתַיִם יָמִים
  english_pob_choice: two full years
  chosen_spanish: dos años completos
  alternatives_spanish:
  - dos años
  - dos años de tiempo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «dos años de días», un modismo que enfatiza la totalidad del período. «Dos años completos» transmite esa plenitud sin sonar forzado en español.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: nombre propio/título
  rationale: Se conserva el título real en español estándar. El artículo definido concuerda con el uso narrativo y la referencia específica al gobernante de Egipto.
- source_word: חֹלֵם
  english_pob_choice: dreamed
  chosen_spanish: soñó
  alternatives_spanish:
  - estaba soñando
  - tuvo un sueño
  lexicon: HALOT
  rationale: El participio verbal en este contexto narra la acción de soñar en la escena. «Soñó» sigue la decisión revisada del POB en inglés hacia un pasado más natural y formal en narración española.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «He aquí» preserva el marcador discursivo de sorpresa e inmediatez; en español bíblico es una forma digna y comprensible que mantiene la fuerza literaria del hebreo.
- source_word: עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba de pie
  - se hallaba
  lexicon: HALOT
  rationale: En una visión onírica, el participio expresa una escena en curso; «estaba» es suficiente en español porque la localización completa se aclara con la frase siguiente, sin necesidad de añadir una repetición pesada de «de pie».
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - sobre
  lexicon: HALOT
  rationale: Aunque el hebreo usa עַל, aquí el contexto del río exige un valor locativo adyacente. «Junto a» comunica la posición de manera natural y fiel.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En el contexto egipcio de Génesis, יְאֹר se refiere específicamente al Nilo. «El Nilo» evita ambigüedad y corresponde a la identificación contextual del POB en inglés.
theological_decisions:
- issue: Referencia al río egipcio en contexto narrativo
  english_pob_reading: In this Egyptian setting, the term refers to the Nile.
  chosen_spanish_reading: En este escenario egipcio, la referencia es al Nilo.
  alternative_spanish_readings:
  - el río
  - el cauce
  rationale: No se trata de una decisión doctrinal, sino contextual. Mantener «el Nilo» sigue la identificación explícita del contexto y evita diluir el referente geográfico.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del POB en inglés que sustituyó «was dreaming» por «dreamed» por razones de naturalidad y adecuación formal. La versión española sigue esa decisión con «soñó», manteniendo a la vez el valor discursivo de la escena y la identificación contextual de «el Nilo».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en este proyecto, pero aquí no aparece el tetragrámaton.
  - Se evita calcar «y aconteció» porque en español actual suena más pesado que la función narrativa hebrea requiere.
  - «Faraón» se mantiene como título tradicional y transparente en español.
  - La nota de pie [a] conserva la tensión entre traducción idiomática y literalidad del hebreo.
  - La nota de pie [b] preserva el matiz discursivo de sorpresa del hebreo sin sobreexplicar el texto.
