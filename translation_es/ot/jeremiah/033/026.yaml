base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/026.yaml
  text: then I would also reject the offspring of Jacob and of David my servant[a], not taking from his offspring rulers over the offspring of Abraham, Isaac, and Jacob[b]. For I will restore their fortunes and have compassion on them.
  footnotes:
  - marker: a
    text: Or 'the seed of Jacob' and throughout the verse 'seed' instead of 'offspring.' The Hebrew זֶרַע is a collective singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore their captivity' / 'I will bring back their exiles.' The Hebrew idiom can refer specifically to return from exile or more broadly to restoration of fortunes.
    reason: lexical_alternative
