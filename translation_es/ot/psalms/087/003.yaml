  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: נִכְבָּדוֹת = «cosas gloriosas», מְדֻבָּר = predicación pasiva sobre esas cosas, בָּךְ = referencia a la ciudad, עִיר הָאֱלֹהִים = «ciudad de Dios», y סֶלָה transliterado. Sin embargo, «se han dicho» introduce un matiz perfectivo no exigido por el participio hebreo ni por el inglés auditado («are spoken» / «spoken of you»).'
  spanish_quality_summary: El español es claro y digno, pero «se dicen de ti» suena más natural y más cercano al aspecto gnómico/poético del original que «se han dicho de ti». También conviene alinear la nota con la justificación inglesa, que preserva específicamente la alternativa «de ti» / «en ti» y favorece un equivalente de «acerca de/sobre ti».
  glossary_alignment: No hay conflictos con el glosario mayor del proyecto. «Dios» y «Selah» están bien. La elección «cosas gloriosas» encaja con el registro poético. La única desviación relevante es aspectual/estilística en «se han dicho».
  issues:
