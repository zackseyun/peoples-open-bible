translation:
  language: es
  text: Así que Absalón vivió en Jerusalén durante dos años, y no vio el rostro del rey.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y el rostro del rey no vio». El hebreo usa una expresión idiomática para indicar que no se le concedió audiencia personal ni acceso al rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - habitó
  - residió
  - permaneció
  lexicon: HALOT
  rationale: El verbo puede significar sentarse, morar o permanecer. En este contexto narrativo de residencia prolongada, «vivió» comunica con naturalidad la estancia continuada sin perder el sentido de habitar.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma establecida en español bíblico para el nombre propio, manteniendo identificabilidad y lectura eclesial amplia.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerushalén
  lexicon: Uso geográfico estándar
  rationale: El hebreo expresa localización simple; «en Jerusalén» es la forma natural y fiel en español.
- source_word: שְׁנָתַיִם יָמִים
  english_pob_choice: for two years
  chosen_spanish: durante dos años
  alternatives_spanish:
  - por dos años
  - en dos años
  lexicon: HALOT
  rationale: La construcción hebrea intensifica o especifica un periodo completo; en español, «durante dos años» transmite con precisión la duración sin añadir «completos», que no está explícito en el texto final revisado.
- source_word: וּפְנֵי הַמֶּלֶךְ
  english_pob_choice: the king's face
  chosen_spanish: el rostro del rey
  alternatives_spanish:
  - la presencia del rey
  - el semblante del rey
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «rostro» para reflejar el hebraísmo. En español, «rostro del rey» mantiene la tensión idiomática de acceso personal, sin sustituirla por una explicación interpretativa en el texto principal.
- source_word: לֹא רָאָה
  english_pob_choice: did not see
  chosen_spanish: no vio
  alternatives_spanish:
  - no contempló
  - no llegó a ver
  lexicon: HALOT
  rationale: La negación verbal se vierte de manera directa y sobria. En combinación con «el rostro del rey», expresa la falta de audiencia o acceso, conforme al valor idiomático señalado en el audit trail.
theological_decisions:
- issue: Idiom of royal access
  english_pob_reading: The Hebrew idiom refers to being denied personal audience or access to the king.
  chosen_spanish_reading: La frase «no vio el rostro del rey» se conserva como hebraísmo, entendida como negativa de audiencia o acceso personal al rey.
  alternative_spanish_readings:
  - no tuvo audiencia con el rey
  - no se le permitió ver al rey
  rationale: El texto hebreo usa una expresión concreta que puede perder su sabor si se la sustituye por una explicación total en el cuerpo del versículo. Se mantiene la imagen original y se aclara en nota el sentido idiomático.
  doctrine_reference: No aplica doctrina específica; se trata de una decisión idiomática y narrativa.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se evita añadir «completos» a la duración, porque no está explícito en el hebreo, y se mantiene la segunda cláusula de forma directa («y no vio...») en vez de una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa «rostro» para preservar el hebraísmo de פני, en coherencia con la preferencia del proyecto por no ocultar el lenguaje fuente cuando es comprensible en español.
  - El tiempo verbal «vivió» ofrece una equivalencia natural para un estado de residencia continuada, sin exagerar con matices no presentes en el texto.
