translation:
  language: es
  text: y tu pobreza vendrá como un merodeador[a], y tu carencia como un hombre armado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «como uno que anda de un lado a otro».
    reason: lexical_alternative
  - marker: b
    text: O, «como un hombre con escudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: and ... will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá y
  - llegará
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal con valor proverbial/futuro; en español, «vendrá» expresa bien la irrupción futura y mantiene la naturalidad del aviso.
- source_word: כִמְהַלֵּךְ
  english_pob_choice: like a prowler
  chosen_spanish: como un merodeador
  alternatives_spanish:
  - como uno que anda de un lado a otro
  - como un vagabundo
  - como un viajero
  lexicon: HALOT
  rationale: El participio con כ indica comparación. La POB inglesa opta por una imagen amenazante; «merodeador» conserva el matiz de alguien que anda rondando con intención inquietante, sin volver el español demasiado literal.
- source_word: רֵאשֶׁךָ
  english_pob_choice: your poverty
  chosen_spanish: tu pobreza
  alternatives_spanish:
  - tu destitución
  - tu necesidad
  - tu penuria
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede tener matiz de necesidad o carencia, aquí el sentido es pobreza material. «Pobreza» es claro y conserva el paralelismo con «carencia».
- source_word: וּמַחְסֹרְךָ
  english_pob_choice: and your lack
  chosen_spanish: tu carencia
  alternatives_spanish:
  - tu falta
  - tu necesidad
  - tu penuria
  lexicon: HALOT
  rationale: מַחְסוֹר expresa falta o carencia. «Carencia» mantiene la concisión poética y el paralelismo semántico sin forzar una interpretación más específica.
- source_word: כְּאִישׁ
  english_pob_choice: like a ... man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular; «hombre» reproduce ese rasgo y conserva la imagen del símil.
- source_word: מָגֵן
  english_pob_choice: armed
  chosen_spanish: armado
  alternatives_spanish:
  - con escudo
  - portando un escudo
  - escudado
  lexicon: HALOT
  rationale: La POB entiende la expresión idiomática como alguien preparado para la acción/amenaza. En español, «armado» comunica esa fuerza con naturalidad; la alternativa más literal se conserva en nota.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión inglesa sin depender mecánicamente de ella: mantiene el contraste poético entre «pobreza» y «carencia», y conserva la tensión entre una imagen idiomática («merodeador», «armado») y sus alternativas literales reflejadas en nota.'
  spanish_consistency_notes:
  - Se usa «pobreza» para רֵאשֶׁךָ y «carencia» para מַחְסֹרְךָ para respetar el paralelismo hebreo.
  - Se evita «SEÑOR» u otra terminología no presente en el verso; no hay nombres divinos ni cuestiones teológicas explícitas aquí.
  - «Armado» traduce el sentido idiomático de אִישׁ מָגֵן; la nota preserva la lectura más literal «hombre con escudo».
