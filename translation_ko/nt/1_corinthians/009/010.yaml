source:
  edition: SBLGNT
  text: ἢ δι’ ἡμᾶς πάντως λέγει; δι’ ἡμᾶς γὰρ ἐγράφη, ὅτι ⸂ὀφείλει ἐπ’ ἐλπίδι⸃ ὁ ἀροτριῶν ἀροτριᾶν, καὶ ὁ ἀλοῶν ⸂ἐπ’ ἐλπίδι τοῦ μετέχειν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/010.yaml
  text: Or is he speaking entirely for our sake? Yes[a], it was written for our sake, because the one who plows ought to plow in hope[b], and the one who threshes ought to thresh in hope of sharing.
  footnotes:
  - marker: a
    text: Or 'surely' or 'certainly' for 'entirely.' The Greek adverb intensifies the rhetorical question.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in hope of sharing.' The object ('the harvest' or 'the crop') is implicit in the Greek and supplied from the farming context.
    reason: lexical_alternative
translation:
  language: ko
  text: 아니면 전적으로 우리를 위해 말씀하시는 것입니까? 분명히 우리를 위해 기록된 것입니다. 밭 가는 자는 소망 가운데 밭을 갈고, 곡식을 떠는 자는 함께 나눌 소망 가운데 떠는 것이 마땅하기 때문입니다.
  philosophy: optimal-equivalence
