translation:
  language: ko
  text: 그리고 내 말과 내 선포는 설득력 있는 지혜의 말이 아니라 영과 능력의 나타나심으로 한 것이었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πειθοῖ σοφίας
  english_pob_choice: persuasive wisdom
  chosen_korean: 설득력 있는 지혜
  alternatives_korean:
  - 지혜의 설득
  lexicon: BDAG
  rationale: πειθώ는 그리스 수사학의 핵심 가치 「설득」.
- source_word: ἀποδείξει πνεύματος
  english_pob_choice: demonstration of the Spirit
  chosen_korean: 영의 … 나타나심
  alternatives_korean:
  - 영의 입증
  lexicon: BDAG
  rationale: ἀπόδειξις는 수사학·논리학의 「확증」. 본문에서 영의 능력으로 입증된 사실을 가리키므로 「나타나심」으로 자연스럽게 옮긴다.
- source_word: πνεύματος
  english_pob_choice: the Spirit
  chosen_korean: 영
  alternatives_korean:
  - 성령
  lexicon: BDAG
  rationale: πνεῦμα를 「영」으로 옮긴다(글로사리 기본값). 4–5절은 인간 지혜 ↔ 하나님 능력의 대비 안에서 「영」으로 충분하다.
