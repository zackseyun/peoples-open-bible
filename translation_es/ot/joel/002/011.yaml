base_translation:
  language: en
  yaml_path: translation/ot/joel/002/011.yaml
  text: And Yahweh gives his voice before his army[a], for his camp is exceedingly great; for mighty is the one who does his word[c][b]. For the day of Yahweh is great and exceedingly dreadful—who can endure it?
