translation:
  language: es
  text: No habrá allí león, ni bestia feroz[a] subirá por ella[b]; no se hallará allí[c], pero los redimidos caminarán allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bestia violenta» o «bestia depredadora» para la expresión hebrea traducida aquí como «bestia feroz».
    reason: lexical_alternative
  - marker: b
    text: El pronombre probablemente remite al camino elevado mencionado en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O «los rescatados»; este verso usa el término hebreo de «redimir», distinto del término de «rescatar» usado en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león salvaje
  lexicon: HALOT
  rationale: Es el equivalente directo y natural del sustantivo hebreo singular usado genéricamente para el animal.
- source_word: פְרִיץ חַיּוֹת
  english_pob_choice: ravenous beast
  chosen_spanish: bestia feroz
  alternatives_spanish:
  - bestia violenta
  - bestia depredadora
  - bestia rapaz
  lexicon: HALOT
  rationale: La expresión combina violencia/rudeza con la idea de una bestia salvaje. 'Bestia feroz' conserva la fuerza amenazante sin forzar una imagen de hambre que el hebreo no exige necesariamente.
- source_word: בַּל
  english_pob_choice: no / not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula negativa poética se expresa naturalmente con 'no' en español, manteniendo la negación enfática.
- source_word: יַעֲלֶנָּה
  english_pob_choice: will go up on it
  chosen_spanish: subirá por ella
  alternatives_spanish:
  - subirá sobre ella
  - ascenderá por ella
  lexicon: HALOT
  rationale: El verbo עלה conserva la idea de subir/ascender. En español, 'subirá por ella' comunica bien el movimiento sobre el camino implícito y permite reflejar el antecedente femenino sin añadir explícitamente 'camino' en el cuerpo principal.
- source_word: תִמָּצֵא
  english_pob_choice: will be found
  chosen_spanish: se hallará
  alternatives_spanish:
  - será hallada
  - se encontrará
  lexicon: HALOT
  rationale: El nifal de מצא se expresa de forma natural con 'se hallará' o 'se encontrará'. 'Se hallará' mantiene el pasivo impersonal y el tono poético.
- source_word: גְּאוּלִים
  english_pob_choice: the redeemed
  chosen_spanish: los redimidos
  alternatives_spanish:
  - los rescatados
  - los rescatados por Yahvé
  lexicon: HALOT
  rationale: '''Redimidos'' preserva la raíz גאל y la distinción léxica respecto al término de ''rescatar/ransom'' del verso siguiente, tal como lo preserva el audit trail inglés.'
- source_word: וְהָלְכוּ
  english_pob_choice: will walk there
  chosen_spanish: caminarán allí
  alternatives_spanish:
  - irán allí
  - transitarán allí
  lexicon: HALOT
  rationale: הָלַךְ se vierte de modo directo con 'caminarán'. En el contexto de una senda segura, 'caminarán allí' suena natural y mantiene la imagen de desplazamiento.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' reproduce la repetición enfática del adverbio hebreo y funciona bien en un registro bíblico moderno.'
theological_decisions:
- issue: Distinción entre גְּאוּלִים ('redimidos') y el término de 'rescate' del versículo siguiente
  english_pob_reading: the redeemed
  chosen_spanish_reading: los redimidos
  alternative_spanish_readings:
  - los rescatados
  - los que han sido rescatados
  rationale: Conviene conservar la distinción léxica observada en el POB inglés entre גאל ('redimir') y פדה ('rescatar') para no aplanar el contraste del pasaje.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Referencia pronominal de 'por ella' en יַעֲלֶנָּה
  english_pob_reading: the pronoun ... likely refers back to the highway mentioned in the previous verse
  chosen_spanish_reading: por ella
  alternative_spanish_readings:
  - por el camino
  - sobre él
  rationale: Aunque el antecedente inmediato está en el versículo anterior, mantener el pronombre femenino en español conserva la sutileza del texto y evita sobreespecificar en el cuerpo principal.
  doctrine_reference: Translation philosophy §4 (Contextual reference and coherence)
- issue: Intensidad de פְרִיץ חַיּוֹת
  english_pob_reading: ravenous beast
  chosen_spanish_reading: bestia feroz
  alternative_spanish_readings:
  - bestia violenta
  - bestia depredadora
  - bestia rapaz
  rationale: El hebreo apunta a una bestia peligrosa y violenta. 'Bestia feroz' comunica esa amenaza sin introducir una connotación de voracidad que podría ser demasiado específica para el compuesto hebreo.
  doctrine_reference: Translation philosophy §2 (Lexical precision and restraint)
translation_notes:
  revision_awareness: Se ha revisado el versículo a la luz del texto hebreo consonante/vocalizado y del audit trail inglés. Se conservó la distinción entre el campo semántico de redimir y el de rescatar, y se mantuvo la referencia pronominal implícita del camino anterior sin explicitarla en el cuerpo principal. No se detectaron cambios de revisión que obligaran a alterar la lectura base.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se mantuvo un registro bíblico moderno y sobrio, evitando calcos innecesarios.
  - Se preservó la repetición de «allí» para reflejar el hebreo שָׁם.
  - Se evitó sustituir «redimidos» por «rescatados» para conservar la distinción léxica documentada.
