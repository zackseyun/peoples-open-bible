review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «Entonces ... habló», יְהוָה = «Yahvé», אֶל מֹשֶׁה = «a Moisés», לֵאמֹר = «diciendo». No hay pérdida de sentido fuente. La única corrección necesaria es en la nota al pie: al ser «Yahvé» la forma principal en el texto español, no debe presentarse como mera alternativa; la alternativa pertinente es la forma tradicional enmascarada «el SEÑOR» y, si se desea, la transliteración «Yahweh».'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces Yahvé habló a Moisés, diciendo:» suena bíblico sin ser arcaico. La puntuación es correcta. La nota actual, sin embargo, crea una tensión editorial al listar «Yahvé» como alternativa cuando ya es la lectura adoptada en el texto.
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé», no «SEÑOR» en el texto principal; מֹשֶׁה → «Moisés»; fórmula introductoria conservada con «diciendo». La revisión propuesta solo ajusta la nota para que coincida con la política terminológica documentada.'
  issues:
  - severity: medium
    issue: La nota al pie presenta «Yahvé» como alternativa aunque es la lectura principal del texto.
    rationale: Esto desajusta la auditoría léxica y puede confundir al lector sobre cuál es la decisión editorial española establecida.
  - severity: low
    issue: La nota mezcla «Yahvé» y «Yahweh» como alternativas sin distinguir que una es la forma adoptada en español del proyecto y la otra una transliteración posible.
    rationale: Conviene que la nota preserve la racionalidad documental del POB y no diluya la preferencia terminológica española.
