translation:
  language: es
  text: Este es mi lugar de descanso para siempre; aquí habitaré, porque he deseado este lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la he deseado a ella', tomando el sufijo femenino como referencia a Sion personificada más que al lugar de descanso o ubicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Este
  - Esta morada
  lexicon: HALOT
  rationale: El demostrativo femenino singular concuerda con מְנוּחָה, que es femenino; en español, 'esta' mantiene la deixis inmediata y la concordancia natural.
- source_word: מְנוּחָתִי
  english_pob_choice: my resting place
  chosen_spanish: mi morada
  alternatives_spanish:
  - mi descanso
  - mi lugar de reposo
  - mi lugar de descanso
  lexicon: HALOT
  rationale: En este contexto locativo, la idea es un lugar de reposo habitable. 'Morada' comunica bien el valor concreto de un lugar de residencia sin sonar forzado en español.
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El modismo expresa duración perpetua; 'para siempre' es idiomático, claro y fiel al valor de permanencia.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio locativo directo; 'aquí' conserva la inmediatez del hebreo.
- source_word: אֵשֵׁב
  english_pob_choice: I will dwell
  chosen_spanish: habitaré
  alternatives_spanish:
  - moraré
  - me quedaré
  lexicon: HALOT
  rationale: Aunque el verbo puede significar literalmente 'sentarse', en contextos de asentamiento/divina morada el sentido natural es 'habitar'. 'Habitaré' es la solución más clara y digna en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la morada; 'porque' reproduce la relación causal de manera natural en español.
- source_word: אִוִּתִיתִיהָ/אִוִּתִיהָ
  english_pob_choice: I have desired it
  chosen_spanish: la he deseado
  alternatives_spanish:
  - la he querido
  - la he anhelado
  - la he deseado a ella
  lexicon: HALOT
  rationale: El verbo אוה expresa desear/ansiar. La forma con sufijo femenino concuerda naturalmente con 'la' en español; así se preserva el objeto femenino implícito del hebreo sin forzar personificación en la línea principal.
theological_decisions:
- issue: Referencia del sufijo femenino en אִוִּתִיהָ
  english_pob_reading: The English audit trail notes a tension between 'her' (Zion personified) and 'it' (the resting place/location), with the latest revision preferring 'it' in natural English.
  chosen_spanish_reading: '''la'' deja abierta la referencia femenina, compatible tanto con la morada/lugar como con Sion personificada, sin imponer una opción innecesaria en el texto principal.'
  alternative_spanish_readings:
  - '''la he deseado'' leído como referencia a la morada/lugar'
  - '''la he deseado'' leído como referencia a Sion personificada'
  - '''la he deseado a ella'' para explicitar personificación'
  rationale: El hebreo usa sufijo femenino, y el español puede conservar esa forma sin resolver de manera excesiva la ambigüedad. Dado que el audit trail reconoce dos posibilidades, la versión española mantiene la tensión documentada con un pronombre femenino natural.
  doctrine_reference: 'DOCTRINE.md: preservar el género y la ambigüedad fuente cuando sea significativo.'
translation_notes:
  revision_awareness: El registro inglés pasó de 'I have desired her' a 'I have desired it' para alinearse con el referente probable en inglés natural. En español, 'la he deseado' mantiene el femenino del hebreo y deja abierta la referencia, evitando perder la tensión textual documentada.
  spanish_consistency_notes:
  - Se mantuvo la concordancia femenina de 'esta' con 'morada' por la forma femenina de מְנוּחָה.
  - '''habitaré'' se eligió por el valor contextual de ''dwell'' en un marco de asentamiento divino, no por traducción mecánica de ''sentar''.'
  - '''la he deseado'' conserva el sufijo femenino del hebreo y evita fijar prematuramente si el referente es la morada o Sion.'
  - El tono es reverente y publicable, pero sin recurrir a 'SEÑOR' ni a formulaciones tradicionales que oculten el paralelismo del texto.
