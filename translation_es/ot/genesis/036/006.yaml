  yaml_path: translation/ot/genesis/036/006.yaml
  text: And Esau took his wives[a], his sons, his daughters, and all the persons of his household, along with his livestock, all his animals, and all his possessions that he had acquired in the land of Canaan, and went to a land away from his brother Jacob.
