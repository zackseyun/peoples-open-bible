- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_korean: 영원한 생명
  lexicon: BDAG
  rationale: 표준.
theological_decisions:
- issue: 하나님께 대한 δουλωθέντες의 강한 번역
  chosen_reading: 「하나님께 노예가 되어」
  alternative_readings:
  - 「하나님께 종이 되어」
  rationale: 바울의 충격적 수사 — 그리스도인은 무관여한 「자유인」이 아니라 새 주인에게 절대적으로 매인 자라는 점 — 을 보존. 약화시키지 않음.
  doctrine_reference: 'DOCTRINE.md §1: Contested terms — δοῦλος'
