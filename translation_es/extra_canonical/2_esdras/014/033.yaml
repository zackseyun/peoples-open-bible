    changes_summary: Revised 'farther inland' to 'within you' to reflect Latin introrsum vestrum more accurately; changed 'rule your understanding' to 'command your mind' for closer lexical correspondence to imperaueritis sensui vestro while keeping formal, natural English.
translation:
  language: es
  text: Ahora ustedes están aquí, y sus hermanos están dentro de ustedes. Si, pues, mandaren a su mente y instruyeren su corazón,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: nunc uos hic estis
  english_pob_choice: Now you are here
  chosen_spanish: Ahora ustedes están aquí
  alternatives_spanish:
  - Ahora están aquí
  - Ahora vosotros estáis aquí
  lexicon: nunc / uos / hic esse
  rationale: Conservo el valor deíctico simple de nunc e hic con un español natural y reverente. 'Ustedes' evita ambigüedad regional y mantiene una forma plural clara para el contexto de exhortación.
- source_word: fratres uestri introrsum uestrum sunt
  english_pob_choice: and your brothers are within you
  chosen_spanish: y sus hermanos están dentro de ustedes
  alternatives_spanish:
  - y sus hermanos están dentro de ustedes mismos
  - y sus hermanos están en lo interior de ustedes
  lexicon: fratres / introrsum / vestrum
  rationale: '''Introrsum vestrum'' se rinde de forma más natural como ''dentro de ustedes'' para conservar la imagen espacial sin forzar un calco idiomático extraño. ''Dentro de ustedes mismos'' sería más explícito, pero añade énfasis reflexivo que el latín no exige.'
- source_word: imperaueritis sensui uestro
  english_pob_choice: if you will command your mind
  chosen_spanish: mandaren a su mente
  alternatives_spanish:
  - mandaren a su entendimiento
  - gobernaren su entendimiento
  - mandaren a su entendimiento
  lexicon: imperare / sensus
  rationale: '''Imperaueritis'' tiene fuerza de mandar/ordenar, no solo aconsejar. ''Sensui'' se aproxima mejor a ''mente'' o ''entendimiento''; aquí elijo ''mente'' por claridad contemporánea, sin perder el sentido cognitivo. Mantengo el tono exhortativo del condicional.'
- source_word: erudieritis cor uestrum
  english_pob_choice: and instruct your heart
  chosen_spanish: y enseñaren su corazón
  alternatives_spanish:
  - y instruyeren su corazón
  - y adiestraren su corazón
  lexicon: erudire / cor
  rationale: '''Erudire'' puede significar instruir, enseñar, formar. En español, ''enseñar'' comunica bien la idea de formación interior; ''corazón'' conserva el centro volitivo-afectivo del latín bíblico. ''Instruyeren'' sería más cercano, pero menos natural en español actual.'
theological_decisions:
- issue: Relación entre mente, entendimiento y corazón como facultades internas
  english_pob_reading: command your mind and instruct your heart
  chosen_spanish_reading: mandaren a su mente y enseñaren su corazón
  alternative_spanish_readings:
  - mandaren a su entendimiento y enseñaren su corazón
  - gobiernen su mente y formen su corazón
  rationale: La línea latina distingue sensus y cor, pero no impone una antropología técnica cerrada. El español debe preservar dos centros interiores diferenciados sin sobreinterpretar. 'Mente' y 'corazón' transmiten la exhortación moral e interior con suficiencia y naturalidad.
  doctrine_reference: Sabiduría moral e interioridad exhortativa; antropología bíblica no técnica
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue corregida para volver al límite correcto del versículo 33: solo incluye la ubicación presente y la exhortación condicional inicial, sin arrastrar la promesa del versículo 34. La traducción española sigue esa delimitación y evita introducir el resultado final.'
  spanish_consistency_notes:
  - Se mantiene 'corazón' para cor y no 'ánimo' o 'espíritu', porque el latín y la tradición bíblica aquí apuntan al centro interior afectivo-volitivo.
  - Se usa 'mente' para sensui por claridad moderna, pero se conserva en las decisiones léxicas la alternativa 'entendimiento' para reflejar mejor el posible rango semántico.
  - Se evita 'Cristo', 'Señor' u otra terminología no presente en el texto fuente.
  - La puntuación conserva la estructura condicional abierta del latín, sin cerrar la frase como si perteneciera al siguiente versículo.
