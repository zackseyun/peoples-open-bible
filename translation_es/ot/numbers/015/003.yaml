base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/003.yaml
  text: and you present an offering by fire to Yahweh—either a burnt offering or a sacrifice—to fulfill a vow[a], or as a freewill offering, or at your appointed times, to make a pleasing aroma to Yahweh, from the herd or from the flock[b],
  footnotes:
