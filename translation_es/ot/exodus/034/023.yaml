translation:
  language: es
  text: Tres veces en el año se presentarán todos tus varones delante[a] del Señor Yahvé[b], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante el rostro de». La expresión significa «delante de» o «en presencia de».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo distingue aquí dos expresiones: «el Señor» (ha’adon) y el nombre divino YHWH, rendido en esta traducción como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: Three times
  chosen_spanish: Tres veces
  alternatives_spanish:
  - Tres ocasiones
  lexicon: HALOT
  rationale: La expresión indica frecuencia de manera directa; «Tres veces» es natural en español y conserva la fuerza idiomática del hebreo sin expandir el sentido.
- source_word: בַּשָּׁנָה
  english_pob_choice: in the year
  chosen_spanish: en el año
  alternatives_spanish:
  - cada año
  - en el año
  lexicon: HALOT
  rationale: La frase con artículo señala el ciclo anual. «En el año» sigue de cerca la forma hebrea y sigue siendo inteligible en español bíblico actual.
- source_word: יֵרָאֶה
  english_pob_choice: shall appear
  chosen_spanish: se presentarán
  alternatives_spanish:
  - aparecerán
  - comparecerán
  lexicon: HALOT
  rationale: El niphal de ראה funciona aquí como fórmula cultual de comparecencia ante Dios. «Se presentarán» comunica bien la obligación de comparecer y evita el pasivo engañoso de «ser vistos».
- source_word: כָּל זְכוּרְךָ
  english_pob_choice: all your males
  chosen_spanish: todos tus varones
  alternatives_spanish:
  - todos los varones de entre ustedes
  - todos tus hombres
  lexicon: HALOT
  rationale: Zָכוּר es masculino explícito y designa a los obligados a la peregrinación festiva. «Varones» mantiene la referencia masculina precisa mejor que una neutralización más amplia.
- source_word: אֶת פְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: La expresión hebrea «ante el rostro de» es idiomática para presencia delante de alguien. En español, «delante de» es natural y conserva la relación espacial/relacional sin calcar la metáfora.
- source_word: הָאָדֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: HALOT
  rationale: אָדוֹן con artículo aquí funciona como título divino. «El Señor» es el equivalente español más natural y distingue el título del nombre propio que sigue.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelíes
  lexicon: HALOT
  rationale: La cadena constructa identifica a YHWH como el Dios propio de Israel. «El Dios de Israel» es la traducción estándar, clara y fiel al hebreo.
theological_decisions:
- issue: 'Doble designación divina: הָאָדֹן + יְהוָה'
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor, Yahvé
  - el Señor Yahvé, el Dios de Israel
  rationale: El hebreo distingue un título divino («el Señor») del nombre propio («Yahvé»). En español, «el Señor Yahvé» preserva esa distinción sin duplicar innecesariamente títulos, y refleja la revisión del POB inglés que evitó «the Lord, the LORD».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Obligación masculina explícita
  english_pob_reading: all your males
  chosen_spanish_reading: todos tus varones
  alternative_spanish_readings:
  - todos tus hombres
  - todos los varones de entre ustedes
  rationale: El texto hebreo marca explícitamente el referente masculino. Se conserva esa precisión por fidelidad lexical y porque el contexto trata de la obligación de peregrinación festiva de los varones israelitas.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El POB inglés fue revisado para evitar la duplicación «the Lord, the LORD» y fijar «the Lord Yahweh»; la versión española refleja esa misma distinción con «el Señor Yahvé». También se mantuvo la lectura cultual de יֵרָאֶה como comparecencia, no como simple visión pasiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el matiz masculino explícito de זְכוּרְךָ con «varones».
  - «Delante de» funciona como equivalente idiomático de אֶת־פְּנֵי, mientras la nota aclara la literalidad hebrea.
  - La puntuación separa la apposición divina de forma natural en español sin perder la distinción entre título y nombre.
