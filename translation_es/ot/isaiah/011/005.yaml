translation:
  language: es
  text: La justicia[a] será el cinturón de su cintura, y la fidelidad[b] el cinturón de sus lomos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rectitud' para צֶדֶק.
    reason: lexical_alternative
  - marker: b
    text: O 'fidelidad' para אֱמוּנָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - y será
  - habrá de ser
  lexicon: HALOT
  rationale: En español profético, el futuro simple comunica con naturalidad el valor prospectivo del hebreo. No hace falta repetir la conjunción inicial si la cláusula ya fluye con el paralelismo del verso.
- source_word: צֶדֶק
  english_pob_choice: Righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: HALOT
  rationale: El término puede abarcar justicia o rectitud. Aquí, por el paralelismo ético del retrato del rey davídico, 'justicia' es claro y fiel; además, la nota permite la alternativa semántica sin imponer una sola precisión.
- source_word: אֵזוֹר
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - ceñidor
  - faja
  lexicon: HALOT
  rationale: '''Cinturón'' conserva el objeto concreto y es natural en español moderno. ''Cinto'' también sería posible, pero ''cinturón'' resulta más transparente para lectores amplios.'
- source_word: מָתְנָיו
  english_pob_choice: his waist
  chosen_spanish: su cintura
  alternatives_spanish:
  - sus lomos
  - su cintura/riñones
  lexicon: HALOT
  rationale: '''Cintura'' es el equivalente español más natural para el tramo corporal indicado y mantiene contraste con la segunda hemistiquio. No se traduce mecánicamente como ''lomos'' aquí porque en español podría sonar más arcaico o menos claro en el primer miembro.'
- source_word: וְהָאֱמוּנָה
  english_pob_choice: faithfulness
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la fe firme
  - la lealtad
  - la constancia
  lexicon: HALOT
  rationale: אֱמוּנָה aquí expresa firmeza, confiabilidad y constancia moral; 'fidelidad' recoge bien esa fuerza y evita reducirlo a 'fe' en sentido meramente subjetivo.
- source_word: אֵזוֹר
  english_pob_choice: the belt of
  chosen_spanish: el cinturón de
  alternatives_spanish:
  - el cinto de
  - el ceñidor de
  lexicon: HALOT
  rationale: Se repite para preservar el paralelismo hebreo y la imagen corporal de vestidura/ceñimiento.
- source_word: חֲלָצָיו
  english_pob_choice: his loins
  chosen_spanish: sus lomos
  alternatives_spanish:
  - su cintura
  - sus riñones
  - sus caderas
  lexicon: HALOT
  rationale: Aquí 'lomos' reproduce mejor el registro poético y el paralelismo con el hebreo, donde el segundo término corporal mantiene la imaginería antigua distinta de 'cintura'.
theological_decisions:
- issue: Virtudes del rey mesiánico expresadas como vestidura
  english_pob_reading: Use 'Righteousness' and 'faithfulness' as qualities characterizing the promised ruler without importing later doctrinal formulation into the verse itself.
  chosen_spanish_reading: Presentar 'justicia' y 'fidelidad' como cualidades que describen al gobernante prometido, conservando la metáfora de vestidura.
  alternative_spanish_readings:
  - Traducir צֶדֶק como 'rectitud'
  - Traducir אֱמוּנָה como 'verdad'
  rationale: 'El verso es poético y descriptivo: las virtudes rodean al rey como cinturones. La traducción mantiene la imagen y no fuerza una formulación dogmática ajena al texto hebreo.'
  doctrine_reference: Preservar la tensión teológica y la imaginería original; primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el hebreo y el audit trail inglés: conserva el paralelismo, la imaginería corporal y la pareja de virtudes sin suavizar la tensión léxica entre justicia/rectitud y fidelidad/constancia.'
  spanish_consistency_notes:
  - Se emplea 'cinturón' de manera consistente para אֵזוֹר en ambos miembros.
  - Se mantiene el contraste corporal 'cintura' / 'lomos' para reflejar la estructura poética hebrea.
  - Las notas alternativas se anclan explícitamente en el texto mediante [a] y [b], sin agregar pies de nota sin marcador.
