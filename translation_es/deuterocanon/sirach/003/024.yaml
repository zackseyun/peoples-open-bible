    rationale: Aunque intenta preservar el hebreo בְּנֵי אָדָם, en español bíblico legible la forma estable es 'los hijos del hombre'. La versión actual suena defectuosa más que deliberadamente semítica.
  - severity: low
    issue: '''desvían'' puede resultar demasiado elíptico para el causativo de מַתְעוֹת'
    rationale: El hebreo y el griego apuntan a hacer errar/extraviar. 'Desvían' no es falso, pero 'hacen errar' o 'extravían' comunica mejor el efecto de inducir al error.
  - severity: low
