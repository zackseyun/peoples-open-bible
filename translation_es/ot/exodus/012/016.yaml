revisions:
- from: El primer día habrá para ustedes una santa asamblea[a], y el séptimo día una santa asamblea. No se hará[b] ningún trabajo en ellos, excepto lo que haya de comerse[c] por toda persona; eso solo se hará para ustedes.
  to: El primer día habrá para ustedes una santa asamblea[a], y el séptimo día una santa asamblea. No se hará ningún trabajo en esos días[b], excepto lo que cada persona deba comer[c]; solo eso podrá prepararse para ustedes.
  rationale: Se corrigieron dos calcos poco naturales («en ellos» y «lo que haya de comerse por toda persona») para producir un español claro y fiel al hebreo y al audit trail inglés. Se mantuvo «santa asamblea», «para ustedes» y «persona» por su buena alineación con las decisiones léxicas del POB. También se consolidaron las notas para preservar tanto el literal hebreo como la explicación de נֶפֶשׁ y de la excepción sobre preparación de alimentos.
