translation:
  language: es
  text: Así que Absalón envió a pedir a Joab que lo enviara al rey[a], pero no quiso venir a él. Entonces envió de nuevo, por segunda vez, pero no quiso venir a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se negó a venir» (lit. «no quiso venir»).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent for
  chosen_spanish: envió a pedir
  alternatives_spanish:
  - envió
  - mandó llamar
  lexicon: HALOT
  rationale: El hebreo usa el verbo general ‘enviar’, pero con el infinitivo de propósito la acción es pedir la intervención de Joab. ‘Envió a pedir’ conserva el sentido idiomático sin perder la base verbal de ‘enviar’.
- source_word: לִשְׁלֹחַ אֹתוֹ אֶל הַמֶּלֶךְ
  english_pob_choice: to send him to the king
  chosen_spanish: que lo enviara al rey
  alternatives_spanish:
  - para enviarlo al rey
  - para llevarlo al rey
  lexicon: HALOT
  rationale: 'La frase expresa propósito y mediación: Absalón quería que Joab gestionara el acceso del mensajero ante el rey. ‘Que lo enviara al rey’ sigue de cerca la estructura hebrea y preserva la función indirecta de Joab.'
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto
  - se negó
  lexicon: HALOT
  rationale: אָבָה denota voluntad o consentimiento. ‘No quiso’ es natural en español y mantiene la idea de falta de disposición mejor que una parapráfrasis más fuerte.
- source_word: לָבוֹא אֵלָיו
  english_pob_choice: to come to him
  chosen_spanish: venir a él
  alternatives_spanish:
  - acercarse a él
  - venir donde él
  lexicon: HALOT
  rationale: El complemento direccional debe conservarse. ‘Venir a él’ refleja el movimiento hacia Absalón sin neutralizar la referencia personal.
- source_word: עוֹד שֵׁנִית
  english_pob_choice: again a second time
  chosen_spanish: de nuevo, por segunda vez
  alternatives_spanish:
  - otra vez, por segunda vez
  - de nuevo
  lexicon: HALOT
  rationale: Ambos elementos refuerzan la repetición. El español puede sonar redundante, pero aquí la redundancia está en el hebreo y conviene preservarla.
- source_word: וַיִּשְׁלַח ... וְלֹא אָבָה ... וַיִּשְׁלַח ... וְלֹא אָבָה
  english_pob_choice: So Absalom sent ... but he was not willing ... So he sent again ... but he was not willing
  chosen_spanish: Así que Absalón envió ... pero no quiso ... Entonces envió de nuevo ... pero no quiso
  alternatives_spanish:
  - Luego Absalón envió ... pero no quiso ... luego envió otra vez ... pero no quiso
  lexicon: HALOT
  rationale: La secuencia narrativa repetida se refleja con conectores sencillos (‘Así que’, ‘Entonces’, ‘pero’) que mantienen el avance del relato y el contraste.
theological_decisions:
- issue: 'El valor de אָבָה: voluntad vs. rechazo explícito'
  english_pob_reading: was not willing, with footnote 'refused to come' as an acceptable alternative
  chosen_spanish_reading: no quiso venir
  alternative_spanish_readings:
  - no estaba dispuesto a venir
  - se negó a venir
  rationale: La base léxica indica falta de voluntad o consentimiento, no necesariamente un rechazo formal. En español, ‘no quiso’ conserva esa tensión y deja abierta la alternativa contextual de ‘se negó’ sin imponerla como lectura principal.
  doctrine_reference: Lexical precision in narrative Hebrew; no doctrinal issue.
translation_notes:
  revision_awareness: La redacción sigue de cerca el packet hebreo y coincide con la lectura del POB inglés en el movimiento narrativo, la mediación de Joab y la repetición enfática de la negativa. Se preserva la ambigüedad léxica de אָבָה mediante una nota alternativa, sin intensificarla indebidamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «rey» sin mayúscula por no funcionar como título divino ni nombre propio.
  - Se conserva el referente pronominal «lo / él» para evitar añadir explicaciones no presentes en el hebreo.
  - La redundancia de «de nuevo, por segunda vez» es intencional y corresponde al hebreo.
