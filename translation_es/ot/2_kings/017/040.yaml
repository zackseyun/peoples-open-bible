translation:
  language: es
  text: Pero no escucharon; al contrario[a], seguían actuando según su antigua costumbre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguían actuando según su antigua ordenanza/práctica». El hebreo מִשְׁפָּט puede denotar ordenanza, norma o práctica habitual; aquí se refiere a su manera previa y establecida de culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Sin embargo ... no
  lexicon: HALOT
  rationale: La conjunción con negación introduce contraste narrativo con lo anterior. «Pero» expresa ese giro adversativo de forma natural en español sin perder la continuidad del relato.
- source_word: שָׁמֵעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar o obedecer. Aquí el sentido es la negativa a atender la advertencia previa; «no escucharon» conserva esa fuerza responsiva sin convertirlo demasiado pronto en «no obedecieron».
- source_word: כִּי אִם
  english_pob_choice: instead
  chosen_spanish: al contrario
  alternatives_spanish:
  - sino
  - más bien
  - en cambio
  lexicon: HALOT
  rationale: La construcción idiomática contrapone la acción negada con la real. «Al contrario» expresa bien ese giro en español contemporáneo y mantiene la relación adversativa.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their former custom
  chosen_spanish: según su antigua costumbre
  alternatives_spanish:
  - conforme a su antiguo rito
  - según su antigua práctica
  - de acuerdo con su antiguo orden
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar ordenanza, norma o práctica establecida. En este contexto de conducta religiosa, «costumbre» comunica una práctica consolidada sin forzar un matiz jurídico que el contexto no exige.
- source_word: הָרִאשׁוֹן
  english_pob_choice: former
  chosen_spanish: antigua
  alternatives_spanish:
  - primera
  - anterior
  - primordial
  lexicon: HALOT
  rationale: El adjetivo retoma una práctica previa; «antigua» suena natural en español y transmite la referencia a un modo de actuar anterior.
- source_word: הֵם עֹשִׂים
  english_pob_choice: they kept acting
  chosen_spanish: seguían actuando
  alternatives_spanish:
  - seguían haciendo
  - continuaban practicando
  - persistían en actuar
  lexicon: HALOT
  rationale: La forma participial indica continuidad o hábito. «Seguían actuando» reproduce esa idea de manera fluida y deja claro que no fue un acto aislado sino una práctica persistente.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; el cotejo indica alto acuerdo con la fuente hebrea, por lo que la redacción española sigue de cerca la sintaxis y las decisiones léxicas auditadas, especialmente el valor habitual de מִשְׁפָּט y el aspecto continuo de עֹשִׂים.
  spanish_consistency_notes:
  - Se evitó «obedecieron» para no sobreespecificar שׁמע más allá del contexto.
  - «Costumbre» se usa aquí por la combinación de מִשְׁפָּט con el adjetivo temporal; en español mantiene el contraste entre una práctica antigua y la conducta presente.
  - El marcador [a] se coloca en el segmento donde surge la alternativa léxica relevante.
