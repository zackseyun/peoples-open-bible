revisions:
- from: Y le puso el turbante sobre la cabeza[a], y sobre el frente del turbante colocó la placa de oro, la corona santa, tal como Yahvé había mandado a Moisés.
  to: Y le puso el turbante sobre su cabeza, y sobre el frente del turbante colocó la placa de oro, la corona santa[a], tal como Yahvé había mandado a Moisés.
  rationale: Se corrige el posesivo explícito del hebreo («su cabeza») y se reubica la nota lexical al sintagma «la corona santa», que es donde pertenece la alternativa «la diadema sagrada». No se requieren cambios doctrinales ni estructurales adicionales.
