revisions:
- from: ¿Acaso puede una mujer olvidar a su hijo[a] que mama, y dejar de compadecerse del hijo de su vientre? Aunque estas mujeres lleguen a olvidarlo, yo no me olvidaré de ti.
  to: ¿Acaso puede una mujer olvidar a su niño lactante[a], y dejar de compadecerse del hijo de su vientre? Aun estas pueden olvidar, pero yo no me olvidaré de ti.
  rationale: Se corrige la nota para que refleje la alternativa documentada en el audit trail inglés, se elimina el objeto añadido no expreso en el hebreo, y se ajusta la concesión a «Aun estas» para conservar mejor el énfasis demostrativo. También se mejora la naturalidad de עוּלָהּ con «niño lactante», manteniendo la imagen de lactancia sin perder claridad.
  reviewer_model: gpt-5.4
