translation:
  language: es
  text: Entonces Salomón envió a Hiram[a], diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Salomón envió a Hiram, diciendo». La conjunción narrativa hebrea puede verterse como «y» o «entonces»; aquí se eligió una forma que refleja mejor la sucesión de acciones.'
    reason: lexical_alternative
  - marker: b
    text: Hiram aparece con la grafía hebrea de este versículo; en otros pasajes puede aparecer la variante «Huram».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Luego ... envió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; en español, «entonces» conserva bien la secuencia temporal sin sonar demasiado arcaico. «Envió» sigue de cerca el verbo de movimiento hacia un destinatario.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española asentada del nombre propio, más reconocible y natural en texto bíblico en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia un destinatario; en español, «a» es la equivalencia natural para el complemento indirecto con verbos de envío.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: convención onomástica bíblica
  rationale: Se mantiene la forma hebrea del nombre tal como aparece en este versículo. La variante «Huram» queda reservada para pasajes donde esa forma está atestiguada.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso que sigue; «diciendo» preserva la función de marcador de habla con naturalidad en español.
translation_notes:
  revision_awareness: El texto hebreo es breve y coincide plenamente con la lectura auditada en inglés; no se requieren cambios textuales ni decisiones teológicas adicionales. La principal tarea es reflejar con naturalidad la conjunción narrativa, el destinatario y el conector de discurso.
  spanish_consistency_notes:
  - Se mantiene «Salomón» como forma española estable del nombre propio.
  - Se conserva «Hiram» con nota sobre la variante «Huram» para reflejar el expediente auditado en inglés.
  - La traducción adopta un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
