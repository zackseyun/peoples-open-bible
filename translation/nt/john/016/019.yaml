theological_decisions:
- issue: Nuance between θεωρέω and ὁράω in the paired clauses
  chosen_reading: Render both with 'see' in the main text
  alternative_readings:
  - Differentiate as 'you no longer behold me ... you will see me'
  rationale: The Greek uses two related verbs, but in this context the discourse emphasis falls on temporary absence and renewed sight, not on a sharp theological distinction between kinds of seeing. Using 'see' for both preserves the parallelism and readability; the lexical distinction is documented here rather than forced into awkward English.
  doctrine_reference: Translation philosophy §6; §5
- issue: Force of Jesus' question
  chosen_reading: 'Translate as a real question: ''Are you discussing this with one another...?'''
  alternative_readings:
  - '''You are asking one another about this...'''
  - '''Is this what you are discussing among yourselves...?'''
  rationale: The Greek interrogative form with ζητεῖτε naturally functions as a question exposing the disciples' private discussion. The chosen rendering preserves Jesus' probing tone without adding interpretive emphasis.
  doctrine_reference: Translation philosophy §1; §6
