review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: los redimidos de Yahvé regresan a Sion, con alegría perpetua, y la aflicción desaparece. También preserva correctamente el nombre divino como «Yahvé» y mantiene la nota alternativa sobre פְדוּיֵי. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y la auditoría inglesa: בְּרִנָּה se inclinó en el POB a «with singing», mientras que «con júbilo» debilita el matiz de canto/júbilo vocal; y la cláusula final hebrea presenta como sujeto a «sorrow and sighing», por lo que en español conviene explicitar mejor que ellos son los que huyen, no dejar una sintaxis algo ambigua.'
  spanish_quality_summary: 'El texto es claro y digno, pero admite una mejora de naturalidad y precisión poética. «Vendrán a Sion» es aceptable, aunque «llegarán a Sion» sería más idiomático; no obstante, no es necesario cambiarlo. La principal reparación de legibilidad está en la última cláusula: «y huirán la tristeza y el gemido» suena forzado y puede tropezar en español; «y la tristeza y el gemido huirán» o «huirán lejos» resuelve esto. Además, «con canto» o «con cánticos» se ajusta mejor al hebreo y al rastro de auditoría que «con júbilo».'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה → «Yahvé» correctamente; פְדוּיֵי → «redimidos» con alternativa «rescatados» bien preservada en nota. No hay conflictos doctrinales relevantes. El único ajuste léxico importante es acercar בְּרִנָּה al campo de canto/júbilo cantado, no solo emoción general.'
  issues:
  - severity: medium
    issue: «con júbilo» para בְּרִנָּה
    rationale: Aunque el hebreo puede incluir regocijo amplio, la auditoría POB fijó «with singing» y el sustantivo suele denotar júbilo expresado vocalmente. «Con canto» preserva mejor el matiz fuente sin sonar rígido en español.
  - severity: medium
    issue: Sintaxis de «y huirán la tristeza y el gemido»
    rationale: El hebreo personifica «sorrow and sighing» como sujetos del verbo «flee». En español, el orden actual resulta poco natural y momentáneamente ambiguo. Reordenar a «y la tristeza y el gemido huirán» conserva el sentido y mejora la lectura.
  - severity: low
    issue: Correspondencia del matiz de «will flee away»
    rationale: El inglés auditado añade «away» para reforzar el alejamiento. En español no es obligatorio, pero «huirán» solo puede sonar algo escueto; aun así, el sentido básico queda intacto.
  revised_spanish_text: Y los redimidos de Yahvé volverán y vendrán a Sion con canto; alegría eterna estará sobre sus cabezas. Gozo y alegría los alcanzarán[a], y la tristeza y el gemido huirán.
  revised_footnotes:
  - marker: a
    text: O, «los rescatados de Yahvé». El término hebreo puede referirse a quienes han sido reclamados por redención o rescate.
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación menor para alinear mejor el español con el hebreo y con la auditoría inglesa: «con canto» refleja mejor בְּרִנָּה que «con júbilo», y la cláusula final se reordena para que quede claro y natural que «la tristeza y el gemido» son quienes huyen. El resto del versículo está bien orientado y no necesita cambios mayores.'
