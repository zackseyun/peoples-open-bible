translation:
  text: Therefore he confirmed it to him with an oath that nations would be blessed in his offspring[a], and that he would give them as an inheritance from sea to sea[b], and from the River to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'from water(s) to sea' in the cited edition, but the Greek parallel reads 'from sea to sea,' which likely preserves the intended territorial formula; the translation follows that sense.
    reason: textual_variant
  - marker: b
    text: '''The River'' is the conventional biblical way of referring to the Euphrates in territorial-promise language.'
    reason: cross_reference
lexical_decisions:
- source_word: על כן
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: HALOT
  rationale: Standard inferential connective introducing the consequence of the preceding commendation of Abraham.
- source_word: בשבועה הקים לו
  chosen: he confirmed it to him with an oath
  alternatives:
  - he established for him by oath
  - he upheld it for him with an oath
  lexicon: HALOT
  rationale: The Hebrew idiom with הקים plus oath language conveys confirming or establishing a promise/covenant by sworn commitment. 'It' is supplied in English for the implied promise, matching the sense also reflected in the Greek ἐν ὅρκῳ ἔστησεν αὐτῷ.
- source_word: לברך בזרעו גוים
  chosen: that nations would be blessed in his offspring
  alternatives:
  - to bless nations in his seed
  - that he would bless nations through his offspring
  lexicon: HALOT
  rationale: The infinitive phrase echoes the Abrahamic promise tradition. 'Offspring' is preferred over 'seed' for natural modern English while preserving the collective singular sense. The passive 'would be blessed' aligns well with the Greek ἐνευλογηθῆναι and avoids over-specifying agency.
- source_word: זרעו
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: Collective singular with covenantal resonance. 'Offspring' preserves both singular form and collective meaning better than 'descendants,' while remaining more readable than 'seed'.
- source_word: להנחילם
  chosen: that he would give them as an inheritance
  alternatives:
  - to cause them to inherit
  - to allot them an inheritance
  lexicon: HALOT
  rationale: The Hiphil of נחל commonly means to give as an inheritance or cause to inherit. Because the object suffix likely refers to Abraham's offspring in context, English expresses the inheritance grant clearly. The Greek κατακληρονομῆσαι supports inheritance language.
- source_word: מים עד ים
  chosen: from sea to sea
  alternatives:
  - from waters to sea
  - from one sea to another
  lexicon: HALOT
  rationale: Although the Hebrew reads מים, the phrase is almost certainly the well-known territorial formula 'from sea to sea,' strongly supported by the Greek ἀπὸ θαλάσσης ἕως θαλάσσης. The Zone 1 validation notes a minor mismatch, so the Greek helps stabilize the intended reading here.
- source_word: ומנהר
  chosen: and from the River
  alternatives:
  - and from a river
  - and from the Euphrates
  lexicon: HALOT
  rationale: With no article in English but definite sense in biblical territorial formulae, 'the River' preserves the conventional reference, likely the Euphrates, without importing the proper name into the main text.
- source_word: עד אפסי ארץ
  chosen: to the ends of the earth
  alternatives:
  - to the extremities of the earth
  - to earth's farthest bounds
  lexicon: HALOT
  rationale: A standard biblical idiom for the farthest reaches of the land/world. 'Ends of the earth' is idiomatic and faithful.
