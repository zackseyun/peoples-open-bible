translation:
  language: es
  text: Mis seres queridos y mis amigos se mantienen apartados de mi aflicción[a][c], y mis parientes cercanos[b] se mantienen lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi plaga», «mi golpe» o «mi herida» para «mi aflicción». El sustantivo hebreo puede referirse a un golpe físico, a una enfermedad o a una herida.
    reason: lexical_alternative
  - marker: b
    text: O «mis allegados» o «los que me son cercanos» para «mis parientes cercanos».
    reason: lexical_alternative
  - marker: c
    text: O «frente a mi aflicción».
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֲבַי
  english_pob_choice: my loved ones
  chosen_spanish: mis amados
  alternatives_spanish:
  - los que me aman
  - mis seres queridos
  lexicon: HALOT
  rationale: El participio con sufijo de 1cs designa a quienes aman al salmista. «Mis amados» conserva la relación personal y la cercanía afectiva sin añadir connotación romántica, y resulta natural en español bíblico actual.
- source_word: וְרֵעַי
  english_pob_choice: and my friends
  chosen_spanish: y mis amigos
  alternatives_spanish:
  - y mis compañeros
  - y mis allegados
  lexicon: HALOT
  rationale: רֵעַ suele significar amigo, compañero o asociado. «Mis amigos» funciona bien en paralelo con «mis amados» y comunica la relación humana de forma clara y directa.
- source_word: מִנֶּגֶד
  english_pob_choice: apart from / opposite
  chosen_spanish: apartados de
  alternatives_spanish:
  - enfrentados a
  - frente a
  - a distancia de
  lexicon: HALOT
  rationale: El hebreo expresa la idea de colocarse en una posición opuesta o apartada. «Apartados de» comunica con naturalidad la distancia social y espacial, sin forzar el matiz técnico de «enfrente de».
- source_word: נִגְעִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi plaga
  - mi golpe
  - mi herida
  lexicon: HALOT
  rationale: El sustantivo puede referirse a plaga, golpe, herida o aflicción. En este contexto de sufrimiento y alejamiento social, «aflicción» es suficientemente amplio y fiel, y evita restringir indebidamente el sentido.
- source_word: יַעֲמֹדוּ
  english_pob_choice: stand
  chosen_spanish: se mantienen
  alternatives_spanish:
  - se ponen de pie
  - se quedan firmes
  - permanecen
  lexicon: HALOT
  rationale: Aunque el verbo significa «estar de pie», en español la imagen de permanecer en una posición social distante se expresa con mayor naturalidad con «se mantienen». Conserva la idea de postura sostenida sin sonar forzado.
- source_word: וּקְרוֹבַי
  english_pob_choice: my close kin
  chosen_spanish: mis parientes cercanos
  alternatives_spanish:
  - mis allegados
  - mis parientes
  - los que me son cercanos
  lexicon: HALOT
  rationale: קָרוֹב puede denotar cercanía familiar o personal. «Parientes cercanos» preserva la probable referencia relacional/familiar mejor que una expresión más vaga, y encaja con el paralelismo poético.
- source_word: מֵרָחֹק
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  - muy lejos
  lexicon: HALOT
  rationale: La expresión indica distancia. «Lejos» es la forma más natural y sobria en español, manteniendo el contraste con «apartados» en la primera cola.
- source_word: עָמָדוּ
  english_pob_choice: stand
  chosen_spanish: se mantienen
  alternatives_spanish:
  - están
  - permanecen
  - se quedaron
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en el paralelismo poético puede traducirse con valor de estado presente. «Se mantienen» preserva la continuidad de la escena y evita limitarla a un hecho pasado.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa del POB, que prefirió un sentido espacial más formal («apart from») en lugar de «aloof from». En español, «apartados de» conserva ese matiz sin introducir una interpretación excesiva.
  spanish_consistency_notes:
  - Se mantiene «aflicción» para נגע, en línea con la elección inglesa principal y con la amplitud semántica documentada.
  - Se evita «SEÑOR» u այլ terminología de sustitución porque no hay aquí un Tetragrámaton ni un caso que lo requiera.
  - La concordancia verbal plural se mantiene en ambas cláusulas para reflejar el paralelismo hebreo.
