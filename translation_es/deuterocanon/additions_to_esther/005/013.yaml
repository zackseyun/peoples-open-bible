translation:
  language: es
  text: habiendo buscado, mediante astutas maquinaciones de engaño[b], la destrucción de Mardoqueo, nuestro salvador[a] y benefactor perpetuo, y de Ester, la compañera irreprochable del reino, junto con toda su nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'libertador' para σωτῆρα; aquí el griego describe a Mardoqueo como quien salvó o preservó, no necesariamente como un título formal.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'astutas maquinaciones de engaño' condensa varios términos griegos peyorativos para astucia, artificio y razonamiento engañoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωτῆρα
  english_pob_choice: savior
  chosen_spanish: salvador
  alternatives_spanish:
  - libertador
  - preservador
  lexicon: BDAG
  rationale: En este contexto narrativo y acusatorio, σωτῆρα expresa a alguien que salva o preserva. 'Salvador' reproduce con fidelidad la fuerza del término y sigue la decisión inglesa, sin convertirlo en un título mesiánico. 'Libertador' o 'preservador' serían posibles, pero atenúan o desplazan el matiz lexical.
- source_word: διὰ παντὸς
  english_pob_choice: continual
  chosen_spanish: perpetuo
  alternatives_spanish:
  - continuo
  - constante
  - siempre
  lexicon: LSJ
  rationale: La expresión comunica una acción o cualidad permanente. 'Perpetuo' transmite bien la continuidad duradera aplicada a 'benefactor' en español natural y solemne.
- source_word: εὐεργέτην
  english_pob_choice: benefactor
  chosen_spanish: benefactor
  alternatives_spanish:
  - hacedor de bien
  - bienhechor
  lexicon: LSJ
  rationale: El término tiene un matiz público y cortesano. 'Benefactor' es la equivalencia más directa y conserva ese peso político-social sin caer en una paráfrasis.
- source_word: ἄμεμπτον
  english_pob_choice: blameless
  chosen_spanish: irreprochable
  alternatives_spanish:
  - sin culpa
  - intachable
  - impecable
  lexicon: BDAG
  rationale: El adjetivo indica ausencia de reproche o culpa. 'Irreprochable' suena natural en español y mantiene el valor moral y legal del término. Se evita 'blameless' calcado en inglés y también 'intachable' por ser algo más idiomático pero menos explícito en el registro jurídico.
- source_word: κοινωνὸν
  english_pob_choice: partner
  chosen_spanish: compañera
  alternatives_spanish:
  - partícipe
  - socia
  - participante
  lexicon: BDAG
  rationale: Aquí κοινωνός expresa a alguien que comparte una condición o estatus respecto del reino. En español, 'compañera' es una forma natural si se matiza con el complemento 'del reino'; no implica solo amistad, sino pertenencia compartida. 'Partícipe' o 'socia' son posibles, pero menos fluidas aquí.
- source_word: Βασιλείας
  english_pob_choice: the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - de la realeza
  - del reinado
  - del poder real
  lexicon: LSJ
  rationale: La genitiva apunta al ámbito real o al reino. 'Del reino' es la opción más directa y equilibrada, sin sobreinterpretar hacia 'reinado' o 'realeza'.
- source_word: σὺν παντὶ τῷ τούτων ἔθνει
  english_pob_choice: together with all their nation
  chosen_spanish: junto con toda la nación de estos
  alternatives_spanish:
  - junto con todo su pueblo
  - con toda la nación perteneciente a ellos
  lexicon: LSJ
  rationale: ἔθνος puede ser 'nación' o 'pueblo'. 'Nación' conserva el peso colectivo-político; 'de estos' refleja el demostrativo plural que remite a Mardoqueo y Ester. Se prefiere una construcción más pegada al griego para no perder la referencia colectiva.
- source_word: πολυπλόκοις μεθόδων παραλογισμοῖς
  english_pob_choice: by devious schemes of deceit
  chosen_spanish: mediante astutas maquinaciones de engaño
  alternatives_spanish:
  - por intrincadas artimañas de engaño
  - mediante complejas estratagemas engañosas
  - con métodos retorcidos de engaño
  lexicon: LSJ
  rationale: La secuencia griega acumula términos de complicación, artificio y razonamiento falso. 'Astutas maquinaciones de engaño' conserva la carga negativa y la densidad retórica sin volverse demasiado mecánica. 'Maquinaciones' recoge la idea de contrivance, y 'astutas' la de cunning.
- source_word: αἰτησάμενος
  english_pob_choice: having sought
  chosen_spanish: habiendo buscado
  alternatives_spanish:
  - habiendo pedido
  - habiendo solicitado
  - tras haber requerido
  lexicon: BDAG
  rationale: El participio expresa la acción de pedir o procurar. 'Habiendo buscado' reproduce bien el giro de 'having sought' y encaja con la siguiente frase de finalidad/destrucción; 'habiendo pedido' es posible, pero suena algo más administrativo.
- source_word: εἰς ἀπώλειαν
  english_pob_choice: for the destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - la perdición
  - la aniquilación
  lexicon: BDAG
  rationale: 'La frase señala el resultado pretendido. En español, el complemento directo sin preposición en dependencia de ''buscar'' suena natural: ''buscar la destrucción''. ''Ruina'' o ''perdición'' suavizan; ''aniquilación'' intensifica más de lo que exige el griego.'
theological_decisions:
- issue: Cómo verter σωτῆρα aplicado a Mardoqueo sin importar un título cristológico
  english_pob_reading: The English POB keeps 'savior' but notes that it means deliverer/preserver in this context, not a formal title.
  chosen_spanish_reading: Se mantiene 'salvador' para Mardoqueo, entendido en su sentido narrativo de quien preserva o salva, no como título doctrinal.
  alternative_spanish_readings:
  - libertador
  - preservador
  rationale: El griego llama a Mardoqueo σωτήρ en un sentido político-histórico. 'Salvador' es la traducción más directa; la nota doctrinal implícita es evitar una lectura cristológica fuera de lugar. En español, 'preservador' explicaría más, pero perdería la fuerza lexical del término.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia de τούτων en 'σὺν παντὶ τῷ τούτων ἔθνει'
  english_pob_reading: 'The demonstrative refers back to Mordecai and Esther collectively: ''their nation.'''
  chosen_spanish_reading: '''De estos'' se entiende como referencia conjunta a Mardoqueo y Ester; la frase completa queda ''toda la nación de estos''.'
  alternative_spanish_readings:
  - su nación
  - la nación de ellos
  - la nación perteneciente a ellos
  rationale: El plural demostrativo apunta a ambos personajes. En español, conservar 'de estos' mantiene la proximidad al griego y deja visible la referencia colectiva, aunque resulte menos idiomático que 'su nación'.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del inglés POB que prefirió 'having sought' frente a 'having asked ... for the destruction'. Por eso el español usa 'habiendo buscado' con objeto directo 'la destrucción', más cercano a αἰτησάμενος εἰς ἀπώλειαν y más natural que una construcción explícita con 'pedir'.
  spanish_consistency_notes:
  - Se mantiene 'Mardoqueo' y 'Ester' como formas estándar en español bíblico.
  - '''Yahvé'' no aparece porque el texto no contiene el tetragrámaton ni una cita directa del nombre divino.'
  - '''salvador'' se usa en sentido lexical narrativo, no doctrinal; la nota preserva la tensión semántica documentada.'
  - '''reino'' se conserva como la opción más neutral para Βασιλείας sin expandir a ''realeza'' o ''reinado''.'
  - La frase final conserva la referencia colectiva de 'τούτων' sin convertirla en un posesivo no atestiguado por el griego.
