  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los topónimos y nombres están bien. Se conserva correctamente “pan” para לֶחֶם, con nota aclaratoria sobre su uso idiomático. No hay términos teológicos sensibles en este versículo.
  issues:
