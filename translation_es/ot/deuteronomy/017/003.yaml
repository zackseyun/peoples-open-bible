  to: y va y sirve a otros dioses y se postra ante ellos, o al sol, o a la luna, o a toda la hueste del cielo[a], lo cual yo no he mandado[b].
  rationale: Se corrige el anclaje de la nota léxica [a] para que corresponda al sintagma hebreo צְבָא הַשָּׁמַיִם, y se mejora la naturalidad bíblica del español con 'hueste del cielo'. Se conserva la estructura, el sentido legal-condicional y la ambigüedad deliberada de la cláusula final.
