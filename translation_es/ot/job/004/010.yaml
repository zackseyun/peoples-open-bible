  - severity: medium
    issue: «leoncillos» para כְפִירִים
    rationale: El diminutivo español sugiere cachorros pequeños y atenúa la imagen de fuerza. La auditoría inglesa especifica «young lions», no «cubs», y explica que se trata de leones jóvenes vigorosos.
  - severity: low
    issue: Puntuación algo calcada del inglés/hebreo
    rationale: La secuencia «..., y ..., y ...» es posible, pero una puntuación ligeramente ajustada mejora la naturalidad en español sin alterar el paralelismo poético.
  - severity: low
    issue: Nota al pie mejorable en precisión estilística
    rationale: «Son sacados» es menos idiomático y menos preciso que «son arrancados» o «son extraídos». La formulación puede limpiarse manteniendo el contenido de la auditoría inglesa.
