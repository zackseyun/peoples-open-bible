translation:
  language: es
  text: En cuanto a la puerta cuyo frente daba al norte, hacia el atrio exterior[a], midió su longitud y su anchura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cuyo frente estaba hacia el norte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשַּׁעַר
  english_pob_choice: As for the gate
  chosen_spanish: En cuanto a la puerta
  alternatives_spanish:
  - Y la puerta
  - La puerta
  lexicon: HALOT
  rationale: El hebreo introduce otro elemento arquitectónico dentro de una secuencia descriptiva. «En cuanto a» reproduce bien el cambio de tópico que el inglés POB marcó con «As for», y «puerta» es el equivalente natural en español para שַׁעַר en este contexto.
- source_word: אֲשֶׁר פָּנָיו
  english_pob_choice: whose front faced
  chosen_spanish: cuyo frente daba
  alternatives_spanish:
  - que daba al frente
  - cuya cara estaba hacia
  lexicon: HALOT
  rationale: פָּנִים aquí expresa la parte frontal de una estructura. «Frente» conserva esa idea sin forzar un literalismo de «cara», y «daba» expresa de forma natural la orientación espacial de la puerta.
- source_word: דֶּרֶךְ הַצָּפוֹן
  english_pob_choice: north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección al norte
  lexicon: HALOT
  rationale: La combinación indica orientación direccional. En español, «hacia el norte» comunica con claridad la dirección sin perder el matiz espacial del hebreo.
- source_word: לֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: toward the outer court
  chosen_spanish: hacia el atrio exterior
  alternatives_spanish:
  - al atrio exterior
  - dirigido al atrio exterior
  lexicon: HALOT
  rationale: חָצֵר en este pasaje del templo se entiende mejor como «atrio» en español bíblico y eclesial. «Exterior» conserva la distinción arquitectónica con el atrio interior.
- source_word: מָדַד
  english_pob_choice: he measured
  chosen_spanish: midió
  alternatives_spanish:
  - lo midió
  - tomó la medida de
  lexicon: HALOT
  rationale: El verbo hebreo indica la acción de medir. El sujeto implícito se sobreentiende en español, por lo que «midió» es suficiente y natural.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - la longitud de ella
  lexicon: HALOT
  rationale: En lenguaje arquitectónico, «longitud» expresa con precisión la dimensión longitudinal del objeto medido.
- source_word: וְרָחְבּוֹ
  english_pob_choice: and its width
  chosen_spanish: y su anchura
  alternatives_spanish:
  - y su ancho
  - y su amplitud
  lexicon: HALOT
  rationale: «Anchura» mantiene el paralelismo técnico con «longitud» y refleja bien la dimensión transversal de la puerta.
translation_notes:
  revision_awareness: Se siguió el sentido arquitectónico del hebreo y el trazado del audit trail inglés, manteniendo la orientación espacial y el orden descriptivo sin introducir interpretación adicional. No hubo revisiones aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usó «atrio» para חָצֵר en coherencia con el registro bíblico-templo en español.
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - «Puerta» se mantuvo como término arquitectónico básico para שַׁעַר, sin necesidad de tecnicismos adicionales.
