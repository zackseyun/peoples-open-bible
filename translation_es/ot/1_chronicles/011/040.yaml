  lexicon: HALOT
  rationale: Es un nombre propio masculino; en español se conserva por transliteración, sin intentar traducirlo.
- source_word: הַיִּתְרִי
  english_pob_choice: the Ithrite
  chosen_spanish: el jitreo
  alternatives_spanish:
  - el itrita
  - el jitrí
  lexicon: HALOT
  rationale: El gentilicio del hebreo se vierte como adjetivo gentilicio natural en español. Se prefirió "jitreo" para reflejar la forma tradicional asociada al grupo y mantener la relación con el hebreo y la alternativa inglesa "Jithrite"; se evita "Ithrite" por menos natural en español.
- source_word: גָּרֵב
