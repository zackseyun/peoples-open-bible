translation:
  language: es
  text: Y la rueda estaba manchada por todas partes con sangre[a], y el montón de brasas se iba apagando por las gotas de fluidos corporales[b], y la carne corría alrededor de los ejes del instrumento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba ensangrentada por todas partes». El verbo griego puede denotar mancha visible, y también contaminación; aquí se prefiere una expresión concreta y natural en español.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las gotas de los líquidos que fluían de las heridas». El término griego se refiere al fluido que sale de las heridas; «fluidos corporales» se usa para claridad en español moderno.
    reason: lexical_alternative
  - marker: c
    text: O «del aparato». El griego ὄργανον nombra el artefacto de tortura como implemento o instrumento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμολύνετο
  english_pob_choice: was stained
  chosen_spanish: estaba manchada
  alternatives_spanish:
  - estaba contaminada
  - estaba profanada
  - estaba ensangrentada
  lexicon: BDAG
  rationale: El griego puede expresar una mancha visible, pero también una idea de contaminación. En español, 'manchada' conserva la imagen concreta de sangre sobre la rueda sin añadir una carga moral que el contexto no exige de modo directo. 'Ensangrentada' sería posible, pero desplaza el foco hacia la cantidad de sangre más que hacia el efecto de cubrirla.
- source_word: πάντοθεν
  english_pob_choice: all around
  chosen_spanish: por todas partes
  alternatives_spanish:
  - por todos lados
  - de todos lados
  lexicon: LSJ
  rationale: La expresión española reproduce la distribución espacial completa del adverbio griego y suena natural en lectura pública.
- source_word: ὁ τροχός
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - el torno
  - la rueda de tortura
  lexicon: LSJ
  rationale: '''Rueda'' es el equivalente directo y suficiente; el contexto ya identifica el instrumento de tortura sin necesidad de ampliar el sintagma.'
- source_word: ὁ σωρὸς τῆς ἀνθρακιᾶς
  english_pob_choice: the heap of coals
  chosen_spanish: el montón de brasas
  alternatives_spanish:
  - la pila de carbón
  - el montón de carbón encendido
  lexicon: LSJ
  rationale: '''Ἀνθρακιά'' apunta a un lecho o montón de brasas encendidas; ''brasas'' comunica mejor que ''carbón'' la imagen ardiente y visible en español.'
- source_word: τοῖς τῶν ἰχώρων ἐσβέννυτο σταλαγμοῖς
  english_pob_choice: by the drops of bodily fluids
  chosen_spanish: por las gotas de fluidos corporales
  alternatives_spanish:
  - por las gotas de ichor
  - por las gotas de humores corporales
  lexicon: LSJ
  rationale: '''Ἰχώρ'' nombra un líquido que sale de heridas. ''Fluidos corporales'' evita el helenismo opaco ''ichor'' y mantiene el sentido físico y crudo del pasaje. La construcción con ''por'' expresa el medio por el cual se apagaban las brasas.'
- source_word: ἐσβέννυτο
  english_pob_choice: was being quenched
  chosen_spanish: era apagado
  alternatives_spanish:
  - se iba apagando
  - era extinguido
  lexicon: BDAG
  rationale: El imperfecto indica acción continua; 'era apagado' preserva esa pasividad y funciona bien con brasas en español. 'Se iba apagando' añade un matiz aspectual más libre.
- source_word: περὶ τοὺς ἄξονας
  english_pob_choice: around the axles
  chosen_spanish: alrededor de los ejes
  alternatives_spanish:
  - en torno a los ejes
  - alrededor de los axles
  lexicon: LSJ
  rationale: '''Ejes'' es el equivalente natural de ἄξονας y mantiene la concreción mecánica del objeto.'
- source_word: τοῦ ὀργάνου
  english_pob_choice: of the instrument
  chosen_spanish: del instrumento
  alternatives_spanish:
  - del aparato
  - de la máquina
  lexicon: LSJ
  rationale: '''Instrumento'' reproduce con fidelidad ὄργανον en su referencia al artefacto de tortura, sin sustituirlo por ''máquina'', que sería más interpretativo.'
- source_word: περιέρεον
  english_pob_choice: was flowing around
  chosen_spanish: iban fluyendo alrededor
  alternatives_spanish:
  - corrían alrededor
  - se deslizaban alrededor
  lexicon: LSJ
  rationale: El imperfecto sugiere continuidad. 'Iban fluyendo' conserva el movimiento sostenido y el carácter corporal del pasaje.
- source_word: αἱ σάρκες
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne desgarrada
  - los trozos de carne
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en español el sustantivo colectivo 'carne' transmite de manera natural la materia humana desgarrada y conserva el tono gráfico sin forzar una pluralización artificial.
theological_decisions:
- issue: Términos de violencia ritualizada y contaminación
  english_pob_reading: The wheel was stained all around with blood; the language is kept concrete and does not soften the gore.
  chosen_spanish_reading: La rueda estaba manchada por todas partes con sangre.
  alternative_spanish_readings:
  - La rueda estaba ensangrentada por todas partes con sangre.
  - La rueda estaba contaminada por todas partes con sangre.
  rationale: No hay aquí un problema doctrinal, pero sí una decisión de mantener el efecto físico del relato sin suavizarlo ni moralizarlo de más. 'Manchada' preserva la crudeza visual y evita un giro más abstracto como 'contaminada'.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto inglés revisó una opción anterior (''defiled'') por ''stained'', suprimió el posesivo añadido (''their'') y cambió ''machine'' por ''instrument''. La versión española sigue esa línea: evita ''profanada'' o ''contaminada'' como lectura principal, no introduce posesivos ajenos al griego y usa ''instrumento'' para ὀργάνου.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando corresponda a otras secciones del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'carne' como término colectivo para αἱ σάρκες, siguiendo la estrategia POB de no forzar un plural innecesario.
  - '''Fluidos corporales'' se eligió por claridad; no se usa ''ichor'' en el texto principal porque sería opaco para lectores hispanos.'
