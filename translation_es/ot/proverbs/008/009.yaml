review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: כֻּלָּם retoma las palabras de la sabiduría; לַמֵּבִין y לְמֹצְאֵי expresan relación con quienes perciben/encuentran; y דָעַת se distingue correctamente de בין. Sin embargo, el uso de «rectos» en ambos hemistiquios aplana una distinción significativa entre נְכֹחִים y יְשָׁרִים que el inglés POB preservó como «straightforward» / «upright».'
  spanish_quality_summary: El español es claro y legible, pero la repetición de «rectos» suena innecesariamente plana y menos natural en este paralelismo. «Todos ellos» funciona, aunque «Todas ellas» sería más concordante si se explicita «las palabras», pero no es obligatorio porque el referente no está expresado en el verso. La mejor mejora es diferenciar el primer adjetivo con «claras» o «directas» en función del contexto del habla sapiencial.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La principal cuestión léxica es mantener la diferencia entre נְכֹחִים y יְשָׁרִים. «Clar[a]s»/«directas» para el primero y «rectas» para el segundo preserva mejor la razón léxica documentada.
  issues:
  - severity: medium
    issue: Se traduce tanto נְכֹחִים como וִישָׁרִים con «rectos».
    rationale: El hebreo usa dos adjetivos cercanos pero no idénticos; el POB inglés preserva esa diferencia con «straightforward» y «upright». Repetir «rectos» borra un matiz del paralelismo y debilita la precisión semántica.
  - severity: low
    issue: La nota al pie para «rectos» en el primer hemistiquio ya insinúa «claros»/«derechos», pero el texto principal no aprovecha esa mejor opción.
    rationale: Dado que el contexto es el habla de la sabiduría, una forma como «claras» o «directas» comunica mejor que sus palabras no son torcidas ni engañosas para el entendido.
  revised_spanish_text: Todos ellos son claros[a] para el que entiende, y rectos para los que hallan conocimiento.
  revised_footnotes:
