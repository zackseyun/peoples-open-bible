id: COL.2.23
reference: Colossians 2:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἅτινά ἐστιν λόγον μὲν ἔχοντα σοφίας ἐν ἐθελοθρησκίᾳ καὶ ταπεινοφροσύνῃ καὶ ἀφειδίᾳ σώματος, οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/023.yaml
  text: These indeed have an appearance of wisdom in self-made religion and humility and harsh treatment of the body, but are of no value against the indulgence of the flesh.
translation:
  language: ko
  text: 이러한 것들은 자의적인 경건[a]과 겸손과 몸에 대한 가혹한 다룸으로 지혜로워 보이지만, 육체의 욕망[b]을 억제하는 데에는 아무런 가치가 없습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「스스로 만든 종교」, 「자기 의지로 드리는 예배」(전통적 「의지적 예배」).
    reason: lexical_alternative
  - marker: b
    text: 헬라어 σάρξ는 본 문맥에서 「타락한 인간 욕망」을 가리킬 수 있으나, 본 번역은 「육체」를 보존한다. 마지막 구절은 헬라어가 어려운 구문으로, 「육체의 욕망을 채우는 데로 흘러간다」로도 옮길 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον μὲν ἔχοντα σοφίας
  english_pob_choice: have an appearance of wisdom
  chosen_korean: 지혜로워 보이지만
  alternatives_korean:
  - 지혜의 모양을 가지나
  - 지혜로 이름이 있으나
  lexicon: BDAG
  rationale: λόγον ἔχειν의 「평판·외관을 가짐」을 「~로 보이지만」으로 자연스럽게 옮긴다. μέν은 다음의 대조 정도를 나타낸다.
- source_word: ἐθελοθρησκίᾳ
  english_pob_choice: self-made religion
  chosen_korean: 자의적인 경건
  alternatives_korean:
  - 스스로 만든 종교
  - 자의적 예배
  lexicon: BDAG
  rationale: 「자기 의지로 시작한 종교」. 「자의적인 경건」으로 부정적 어감을 살린다.
- source_word: ταπεινοφροσύνῃ
  english_pob_choice: humility
  chosen_korean: 겸손
  alternatives_korean:
  - 자기 비하
  lexicon: BDAG
  rationale: 2:18과 어휘적 일관성.
- source_word: ἀφειδίᾳ σώματος
  english_pob_choice: harsh treatment of the body
  chosen_korean: 몸에 대한 가혹한 다룸
  alternatives_korean:
  - 몸에 대한 무자비한 학대
  - 몸을 아끼지 않음
  lexicon: BDAG
  rationale: ἀφειδία의 「무자비함」을 「가혹한 다룸」으로 옮긴다.
- source_word: οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός
  english_pob_choice: of no value against the indulgence of the flesh
  chosen_korean: 육체의 욕망을 억제하는 데에는 아무런 가치가 없습니다
  alternatives_korean:
  - 어떤 영예도 없으며 육체를 만족시키기 위함이다
  - 육체의 만족을 제어하는 데에 어떤 도움도 되지 않는다
  lexicon: BDAG
  rationale: 본 구절은 학계에서 어렵게 다루어진다. 본문은 「금욕 규례가 육체의 욕망 억제에 무용함」의 흐름을 따라 옮긴다. 다른 해석은 각주로 보존.
theological_decisions:
- issue: οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός의 해석
  chosen_reading: 「육체의 욕망을 억제하는 데에 가치가 없음」
  alternative_readings:
  - 「어떤 영예도 없으며 단지 육체의 만족만을 위한 것」
  - 「몸에 대한 영예는 없으나 육체의 충만을 노린 것」
  rationale: 헬라어는 구문적으로 어려우나, 문맥상 바울은 금욕 규례가 지혜로워 보이지만 실제로는 육체적 욕망을 막지 못함을 비판한다. 본문은 이 흐름을 따르고 다른 가능성은 각주로 보존.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
- issue: σάρξ의 의미
  chosen_reading: 「육체」(글로사리 기본 유지, 문맥상 타락한 인간 욕망의 어감을 함의)
  alternative_readings:
  - 「죄성」
  rationale: 본 절의 σάρξ는 타락한 인간 충동을 가리킬 가능성이 높으나, 「육체」로 옮겨 신학적 긴장을 보존한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for σάρξ'
