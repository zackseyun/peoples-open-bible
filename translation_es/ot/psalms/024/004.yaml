translation:
  language: es
  text: El que tiene manos limpias y corazón puro, que no ha elevado su alma[a] a lo falso[b] ni ha jurado con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo consonántico dice «mi alma»; muchas traducciones siguen la lectura contextual «su alma» para concordar con la descripción en tercera persona a lo largo del versículo.
    reason: textual_variant
  - marker: b
    text: O «a la vanidad», «a lo que es falso»; algunos entienden aquí «lo falso» como referencia a un ídolo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְקִי
  english_pob_choice: clean
  chosen_spanish: limpias
  alternatives_spanish:
  - puras
  - inocentes
  lexicon: HALOT
  rationale: En paralelo con «manos», el adjetivo expresa limpieza moral visible en la conducta. «Limpias» conserva la imagen concreta y resulta natural en español.
- source_word: כַפַּיִם
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - palmas
  lexicon: HALOT
  rationale: Aunque literalmente alude a las palmas, en español «manos» es el equivalente idiomático que mantiene el sentido de conducta externa.
- source_word: בַר לֵבָב
  english_pob_choice: a pure heart
  chosen_spanish: corazón puro
  alternatives_spanish:
  - corazón limpio
  - de corazón puro
  lexicon: HALOT
  rationale: La expresión describe pureza interior moral. «Corazón puro» conserva el paralelismo con «manos limpias» y suena natural en español.
- source_word: נָשָׂא ... נַפְשִׁי
  english_pob_choice: has lifted up his soul
  chosen_spanish: ha elevado su alma
  alternatives_spanish:
  - ha levantado su alma
  - ha dirigido su alma
  - ha puesto su alma
  lexicon: HALOT
  rationale: Se conserva el verbo e imagen hebreos de elevar/levantar el alma, sin sustituirla por una paráfrasis. «Su alma» sigue la lectura contextual adoptada por la revisión inglesa más reciente.
- source_word: לַשָּׁוְא
  english_pob_choice: to falsehood
  chosen_spanish: a lo falso
  alternatives_spanish:
  - a la vanidad
  - a lo vano
  - a la falsedad
  - a un ídolo
  lexicon: HALOT
  rationale: שָׁוְא puede significar vacío, falsedad o vanidad. «A lo falso» es breve, idiomático y mantiene abierta la gama semántica sin forzar una sola concreción.
- source_word: נִשְׁבַּע לְמִרְמָה
  english_pob_choice: has not sworn deceitfully
  chosen_spanish: ha jurado con engaño
  alternatives_spanish:
  - ha jurado falsamente
  - ha jurado engañosamente
  - ha jurado para engañar
  lexicon: HALOT
  rationale: La combinación expresa jurar de manera engañosa. «Con engaño» reproduce bien la fuerza adverbial y evita una explicitación mayor de la que el hebreo exige.
theological_decisions:
- issue: 'Lectura de נַפְשִׁי: forma consonántica ''mi alma'' versus lectura contextual ''su alma'''
  english_pob_reading: The latest English revision reads 'his soul' in context, while earlier audit material preserved 'my soul' as a textual issue.
  chosen_spanish_reading: su alma
  alternative_spanish_readings:
  - mi alma
  rationale: En el verso domina la tercera persona («el que... que no...»), por lo que en español «su alma» resulta coherente y refleja la revisión contextual más reciente. Se evita reproducir la tensión textual en el cuerpo principal, porque aquí la versión inglesa auditada ya la resolvió en favor de la lectura contextual.
  doctrine_reference: Principios POB sobre primacía de la evidencia original y resolución contextual de variantes
- issue: Relación entre las dos negaciones finales
  english_pob_reading: not ... or sworn deceitfully
  chosen_spanish_reading: ni ha jurado con engaño
  alternative_spanish_readings:
  - y no ha jurado con engaño
  - ni ha jurado engañosamente
  rationale: En español, la coordinación negativa con «ni» fluye de modo natural y conserva la estructura hebrea de dos acciones negadas dentro de una sola cláusula relativa.
  doctrine_reference: Principios POB sobre equivalencia óptima y sintaxis natural del español
translation_notes:
  revision_awareness: Se tomó en cuenta que el inglés auditado pasó de 'my soul' a 'his soul' en la revisión más reciente, y que el cierre inglés también fue estilísticamente ajustado para unir las negaciones con 'or'. La redacción española refleja esa decisión contextual con 'su alma' y coordina las negaciones con 'ni'.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo manos/corazón con adjetivo concreto en el primer miembro y adjetivo calificativo en el segundo, sin introducir diferencias teológicas no requeridas.
  - Se evitó 'SEÑOR', 'Cristo' o terminología litúrgica no presente en el verso.
  - La frase 'a lo falso' preserva la amplitud semántica de שָׁוְא sin cerrar prematuramente la referencia a 'vanidad' o 'ídolo'.
  - La puntuación separa claramente el sintagma nominal inicial de la cláusula relativa, como en la estructura hebrea.
  - No se añadió nota de variante textual en el cuerpo porque la decisión 'su alma' sigue la revisión contextual más reciente del audit trail inglés.
