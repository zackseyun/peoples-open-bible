translation:
  language: es
  text: 'Alzó su rostro hacia la ventana y dijo[a]: «¿Quién está conmigo? ¿Quién?» Entonces dos o tres eunucos lo miraron desde arriba.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficiales de la corte» para «eunucos»; el término hebreo puede denotar cualquiera de los dos, aunque en un contexto palaciego la lectura «eunucos» es la más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא פָנָיו
  english_pob_choice: He lifted up his face
  chosen_spanish: Alzó su rostro
  alternatives_spanish:
  - Levantó su rostro
  - Alzó la vista
  lexicon: HALOT
  rationale: La imagen hebrea de ‘levantar el rostro’ se conserva de forma natural en español con ‘alzó su rostro’. Mantiene la metáfora corporal sin sonar tan forzada como una traducción mecánica, y evita reducirla del todo a ‘miró hacia arriba’.
- source_word: הַחַלּוֹן
  english_pob_choice: the window
  chosen_spanish: la ventana
  alternatives_spanish:
  - el ventanal
  lexicon: HALOT
  rationale: ‘Ventana’ es el equivalente directo y claro para el marco arquitectónico del pasaje.
- source_word: מִי אִתִּי מִי
  english_pob_choice: Who is with me? Who?
  chosen_spanish: ¿Quién está conmigo? ¿Quién?
  alternatives_spanish:
  - ¿Quién está de mi parte? ¿Quién?
  - ¿Quién está conmigo —quién?
  lexicon: HALOT
  rationale: ‘Conmigo’ expresa con precisión אִתִּי sin introducir la interpretación de ‘de mi parte’. La repetición interrogativa conserva la intensidad del llamado.
- source_word: וַיַּשְׁקִיפוּ אֵלָיו
  english_pob_choice: looked down at him
  chosen_spanish: miraron hacia abajo, hacia él
  alternatives_spanish:
  - se asomaron hacia él
  - miraron desde arriba hacia él
  lexicon: HALOT
  rationale: El verbo implica mirar desde un lugar más alto. En español, ‘miraron hacia abajo, hacia él’ conserva tanto la dirección espacial como la relación de altura sugerida por la escena.
- source_word: שְׁנַיִם שְׁלֹשָׁה
  english_pob_choice: two or three
  chosen_spanish: dos o tres
  alternatives_spanish:
  - dos, tres
  - un par o tres
  lexicon: HALOT
  rationale: 'La pareja numérica hebrea se entiende naturalmente en español como una cantidad pequeña e indefinida: ‘dos o tres’.'
- source_word: סָרִיסִים
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales de la corte
  - funcionarios de la corte
  lexicon: HALOT
  rationale: En el contexto palaciego, ‘eunucos’ es el sentido más probable y coincide con la opción principal de la POB en inglés. Se conserva la tensión lexical frente al sentido más amplio de ‘oficiales’.
theological_decisions:
- issue: El término סָרִיסִים puede denotar eunucos o funcionarios de la corte.
  english_pob_reading: The Hebrew term can denote either, though in a royal palace setting “eunuchs” is most likely.
  chosen_spanish_reading: ‘Eunucos’ en el texto principal, con nota sobre la alternativa ‘oficiales de la corte’.
  alternative_spanish_readings:
  - oficiales de la corte
  - funcionarios de la corte
  rationale: No hay necesidad doctrinal de resolver la ambigüedad a favor del sentido administrativo. El contexto de palacio hace más probable el sentido corporal/funcional de ‘eunucos’, y la alternativa queda preservada para transparencia.
  doctrine_reference: Transparencia léxica y fidelidad contextual; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés sin depender mecánicamente de la formulación inglesa. No se registran revisiones aplicadas en el pasaje fuente, y la versión actual coincide con la lectura revisada más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘eunucos’ como término principal por coherencia con la decisión léxica inglesa y el contexto palaciego.
  - La puntuación de discurso directo sigue la convención española con comillas angulares invertidas no requeridas aquí; se emplean comillas latinas estándar para claridad editorial.
