    rationale: Aunque intenta conservar la imagen de 'swept away', en español 'ser barrido' suele sonar truncado sin un complemento, y puede sugerir limpieza más que destrucción. 'serás arrastrado' preserva mejor la pasividad y la fuerza imagística sin añadir información.
