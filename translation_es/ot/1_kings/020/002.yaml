- from: Y envió mensajeros[a] a la ciudad, a Ahab, rey de Israel.
  to: Y envió mensajeros a la ciudad[a], a Acab, rey de Israel.
  rationale: Se conserva fielmente el sentido del hebreo y del audit trail inglés, pero se normaliza el nombre propio al uso bíblico español ('Acab') y se mantiene una redacción natural y clara. La nota se ajusta para expresar mejor la alternativa asociada al sufijo direccional, sin introducir un matiz nuevo. No se requiere adjudicación adicional.
