revisions:
- from: Y junto a ellos hicieron reparaciones los tecoítas, pero sus nobles no pusieron su cuello[a] a la obra de sus señores.
  to: Y junto a ellos hicieron reparaciones los tecoítas, pero sus nobles no quisieron poner su cuello[a] a la obra de sus señores.
  rationale: Se ajusta la cláusula negativa para reflejar mejor la idea de rechazo deliberado presente en el hebreo y ya reconocida en el inglés POB. También se reemplaza la nota defectuosa por una que preserve la literalidad hebrea y explique el valor idiomático sin crear redundancia.
