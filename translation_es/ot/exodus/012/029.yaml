    text: O "hirió de muerte".
    reason: lexical_alternative
  - marker: b
    text: O "del prisionero que estaba en el calabozo"; literalmente, "en la casa del pozo".
    reason: lexical_alternative
  revision_rationale: La revisión fortalece la fidelidad al hebreo y a la auditoría inglesa sin exceder el sentido fuente. 'Derribó' refleja mejor el valor letal de הִכָּה en contexto, mientras que 'foso de la prisión' conserva la imaginería concreta de בור con español claro. También se suaviza el arranque narrativo y se mejora la fluidez de la relativa sobre Faraón.
