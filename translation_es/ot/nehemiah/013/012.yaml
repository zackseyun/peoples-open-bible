translation:
  language: es
  text: Y todo Judá trajeron el diezmo del grano, del vino nuevo y del aceite, a los almacenes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'depósitos'. El término hebreo puede designar cámaras de almacenamiento o tesorerías; aquí el contexto de grano, vino y aceite favorece 'almacenes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל יְהוּדָה
  english_pob_choice: And all Judah
  chosen_spanish: Y todo Judá
  alternatives_spanish:
  - Y toda Judá
  - Y todo el pueblo de Judá
  lexicon: HALOT
  rationale: כָּל con el nombre propio יְהוּדָה expresa el conjunto de Judá como comunidad. En español, 'todo Judá' conserva la colectividad de forma natural y sin añadir explicaciones no requeridas por el hebreo.
- source_word: הֵבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - trajeron
  - trajeron consigo
  - lo llevaron
  lexicon: HALOT
  rationale: El hebreo usa un perfecto 3cp con sujeto colectivo; en español puede concordar naturalmente con el sujeto colectivo singular 'todo Judá' como estilo de conjunto. 'Trajo' mantiene brevedad y evita sobreinterpretar el matiz de 'introducir' que ya queda claro por el complemento de destino.
- source_word: מַעְשַׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  - los diezmos
  lexicon: HALOT
  rationale: מַעְשַׂר es el término técnico regular para el diezmo. 'Diezmo' es el equivalente natural y fiel en español; 'décima parte' explicita la forma pero pierde el valor terminológico.
- source_word: הַ/דָּגָן
  english_pob_choice: the grain
  chosen_spanish: del grano
  alternatives_spanish:
  - del cereal
  - del trigo
  lexicon: HALOT
  rationale: דָּגָן designa grano/produce cereal en general. 'Grano' conserva ese sentido amplio sin restringirlo a una especie concreta.
- source_word: וְ/הַ/תִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: del vino nuevo
  alternatives_spanish:
  - del mosto
  - del vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ se refiere a vino nuevo o fresco, distinto del término general para vino. 'Vino nuevo' preserva esa distinción lexical mejor que 'vino' a secas; 'mosto' sería más interpretativo según el contexto agrícola.
- source_word: וְ/הַ/יִּצְהָר
  english_pob_choice: the oil
  chosen_spanish: del aceite
  alternatives_spanish:
  - del aceite de oliva
  - del aceite fresco
  lexicon: HALOT
  rationale: יִצְהָר suele referirse al aceite producido en el contexto agrícola, normalmente de oliva. 'Aceite' es el equivalente más directo y natural en español, suficientemente preciso dentro de esta tríada cultual.
- source_word: לָ/אוֹצָרוֹת
  english_pob_choice: into the storehouses
  chosen_spanish: a los almacenes
  alternatives_spanish:
  - a los graneros
  - a las cámaras de depósito
  - a las tesorerías
  lexicon: HALOT
  rationale: אוֹצָרוֹת puede denotar cámaras de almacenamiento o tesoros. En este contexto de grano, vino y aceite, 'almacenes' comunica bien la función de depósito y evita la posible sugerencia de dinero propia de 'tesorerías'. La nota alternativa se conserva porque el hebreo permite ambos matices.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de WLC y armoniza con la decisión auditada en inglés de mantener la tríada agrícola y resolver אוֹצָרוֹת como un lugar de almacenamiento por el contexto inmediato. No se registran revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - 'Se conserva la tríada cultual/agroalimentaria: grano, vino nuevo y aceite.'
  - Se usa 'todo Judá' como sujeto colectivo, coherente con el hebreo y con un español bíblico claro.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - '''Almacenes'' mantiene la ambigüedad útil de אוֹצָרוֹת sin cargarla hacia una noción monetaria.'
