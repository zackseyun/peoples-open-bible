translation:
  language: es
  text: De ningún modo desvió los timones[a] de la piedad, hasta que entró navegando en el puerto de la victoria sobre la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente pero menos probable en contexto: «el puerto de la victoria de la muerte». La secuencia de genitivos griega está comprimida.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατʼ οὐδένα τρόπον
  english_pob_choice: In no way
  chosen_spanish: De ningún modo
  alternatives_spanish:
  - En ninguna manera
  - De ninguna forma
  lexicon: LSJ
  rationale: La expresión griega es una negación enfática. «De ningún modo» conserva bien esa fuerza y suena natural en español moderno.
- source_word: μετέτρεψεν
  english_pob_choice: did he turn aside
  chosen_spanish: desvió
  alternatives_spanish:
  - volvió
  - cambió de rumbo
  - apartó
  lexicon: LSJ
  rationale: En un contexto náutico, el verbo comunica desviar o hacer cambiar de dirección. «Desvió» mantiene la imagen de la navegación sin volver la frase pesada.
- source_word: τοὺς ... οἴακας
  english_pob_choice: the rudders
  chosen_spanish: los timones
  alternatives_spanish:
  - los remos de gobierno
  - el timón
  lexicon: LSJ
  rationale: οἴαξ puede referirse a pieza de gobierno náutico; «timones» expresa el instrumento directivo de forma clara en español, aunque el plural griego no siempre tenga equivalente exacto en singular funcional.
- source_word: τῆς εὐσεβείας
  english_pob_choice: of godliness
  chosen_spanish: de la piedad
  alternatives_spanish:
  - de la devoción
  - de la reverencia
  lexicon: LSJ
  rationale: εὐσέβεια en este contexto apunta a devoción fiel hacia Dios y su ley. «Piedad» es la opción española más cercana y sobria, aunque «devoción» también podría servir.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: LSJ
  rationale: Marca temporal simple; «hasta que» es la equivalencia natural en español.
- source_word: ἔπλευσεν
  english_pob_choice: he sailed
  chosen_spanish: navegó
  alternatives_spanish:
  - zarpó
  - surcó
  - siguió navegando
  lexicon: LSJ
  rationale: El verbo mantiene la metáfora marítima. «Navegó» es idiomático y preserva el movimiento continuo del pasaje.
- source_word: ἐπὶ ... λιμένα
  english_pob_choice: into the harbor
  chosen_spanish: hacia el puerto
  alternatives_spanish:
  - al puerto
  - hasta el puerto
  lexicon: LSJ
  rationale: Con el verbo de navegación, «hacia el puerto» comunica llegada orientada al destino. «Puerto» es la forma española más natural aquí, aunque el griego usa la imagen de un refugio marítimo.
- source_word: τὸν τῆς θανάτου νίκης λιμένα
  english_pob_choice: the harbor of victory over death
  chosen_spanish: el puerto de la victoria sobre la muerte
  alternatives_spanish:
  - el puerto de la victoria de la muerte
  - el puerto de la victoria en la muerte
  lexicon: LSJ
  rationale: 'Se sigue la lectura preferida por la POB inglesa: el genitivo comprimido se entiende como victoria sobre la muerte, coherente con el elogio del martirio. «Puerto» conserva la imagen de refugio/arribo y evita una formulación demasiado interpretativa.'
theological_decisions:
- issue: Lectura del sintagma τὸν τῆς θανάτου νίκης λιμένα
  english_pob_reading: the harbor of victory over death
  chosen_spanish_reading: el puerto de la victoria sobre la muerte
  alternative_spanish_readings:
  - el puerto de la victoria de la muerte
  rationale: La cadena genitiva griega es compacta y podría leerse formalmente de otra manera. Sin embargo, el contexto exalta la perseverancia hasta el martirio, así que la lectura que presenta una victoria sobre la muerte es la que mejor encaja con el movimiento retórico y con la decisión auditada de la POB inglesa. Se preserva, no obstante, la tensión interpretativa en las notas.
  doctrine_reference: Conservar la tensión lexical cuando el original es comprimido; documentar la alternativa literal sin imponer una resolución no sustentada.
translation_notes:
  revision_awareness: El borrador sigue la lectura ya revisada de la POB inglesa sin cambios sustanciales; se mantiene la decisión de entender el sintagma final como «victoria sobre la muerte» y no como «victoria de la muerte», pero se documenta la alternativa literal por la compresión del griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Piedad» reproduce mejor εὐσέβεια que «religión» o «devoción» en un registro bíblico sobrio.
  - 'La metáfora náutica se conserva de manera consistente: desvió/timones/navegó/puerto.'
  - La nota al pie ancla la única ambigüedad importante del versículo y respeta el criterio de no borrar la tensión del original.
