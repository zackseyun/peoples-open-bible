base_translation:
  language: en
  yaml_path: translation/ot/2_kings/015/025.yaml
  text: Then Pekah son of Remaliah[a], his officer, conspired against him and struck him down in Samaria, in the citadel of the king’s house, with Argob and Arieh, and with him were fifty men of the Gileadites[d][c][b]. So he put him to death and reigned in his place.
  footnotes:
  - marker: a
    text: Or 'his captain.' The Hebrew שָׁלִישׁ refers to a high-ranking military officer, but the exact rank is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the palace of the king’s house.' The Hebrew אַרְמוֹן can denote a palace or fortified royal residence.
    reason: lexical_alternative
  - marker: c
    text: אַרְיֵה may be understood as the personal name 'Arieh'; lexically the word can also mean 'lion,' but here it is best read as a name alongside Argob.
    reason: lexical_alternative
  - marker: d
    text: Or 'and with him fifty men from the Gileadites.'.
    reason: previous_rendering
