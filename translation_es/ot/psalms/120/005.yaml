translation:
  language: es
  text: ¡Ay de mí![a] porque he morado en Mesec; he habitado entre[b] las tiendas de Cedar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mesec y Cedar pueden funcionar poéticamente como nombres de pueblos lejanos y hostiles, más que indicar una residencia literal simultánea en ambos lugares.
    reason: cultural_note
  - marker: b
    text: 'O: «con las tiendas de Cedar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹיָה
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay!
  - ¡Pobre de mí!
  lexicon: HALOT
  rationale: La interjección expresa lamento y angustia personal. En español, «¡Ay de mí!» transmite mejor el clamor doliente que un calco frío, conservando el valor exclamativo y la primera persona implícita del dativo.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: de mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El hebreo marca el lamento como personalmente experimentado. En esta exclamación española, «¡Ay de mí!» integra de forma natural ese dativo de afectación.
- source_word: גַרְתִּי
  english_pob_choice: I have sojourned
  chosen_spanish: he morado
  alternatives_spanish:
  - he forasterado
  - he residido como extranjero
  - he habitado
  lexicon: HALOT
  rationale: El verbo גוּר indica residencia de extranjero o forastero, con matiz de estancia no plenamente asentada. «He morado» es natural en español y permite conservar el sentido de permanencia sufrida sin forzar un arcaísmo poco transparente; el matiz de extrañeza queda reforzado por el contexto y por el paralelo con Kedar.
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Meshec
  - Mesech
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme a uso español bíblico sobrio y legible. Se mantiene como nombre, no como paráfrasis geográfica, para preservar la imagen poética del texto fuente.
- source_word: שָׁכַנְתִּי
  english_pob_choice: I have dwelt
  chosen_spanish: he habitado
  alternatives_spanish:
  - he morado
  - he vivido
  - me he asentado
  lexicon: HALOT
  rationale: שׁכן expresa habitar o residir. «He habitado» conserva el paralelismo poético con «he morado» y evita repetir exactamente la misma forma, manteniendo dos verbos cercanos pero distinguibles.
- source_word: עִם אָהֳלֵי
  english_pob_choice: among the tents of
  chosen_spanish: entre las tiendas de
  alternatives_spanish:
  - con las tiendas de
  - junto a las tiendas de
  lexicon: HALOT
  rationale: Aunque עִם puede significar «con», aquí el español idiomático pide una relación espacial de coexistencia. «Entre las tiendas de» comunica bien la idea de vivir en medio de ese grupo nómada sin perder la imagen concreta de las tiendas.
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Cedar
  alternatives_spanish:
  - Quedar
  - Kedar
  lexicon: HALOT
  rationale: Se usa la forma bíblica tradicional en español «Cedar», ampliamente reconocible y fiel al nombre propio. Mantiene la referencia a un pueblo/entorno árabe nómada asociado con tiendas.
theological_decisions:
- issue: Si Mesec y Cedar deben leerse literalmente como nombres propios o interpretarse simbólicamente en el texto principal.
  english_pob_reading: Retain the proper names literally in the main text, while noting that they may function poetically as distant, hostile peoples.
  chosen_spanish_reading: Mantener los nombres propios en el cuerpo del texto, con nota sobre su posible función poética como pueblos lejanos y hostiles.
  alternative_spanish_readings:
  - Reformular como «entre pueblos lejanos y hostiles»
  - Explicitar una lectura figurada en el texto principal
  rationale: El hebreo nombra Mesec y Cedar directamente. Traducirlos por una interpretación borraría la imaginería histórica-poética. La nota permite conservar la tensión entre literalidad y función poética sin resolverla prematuramente.
  doctrine_reference: 'Principio de traducción: preservar nombres propios y el relieve poético del texto, dejando que la nota aclare la posible función figurada.'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control cruzado y no requirió revisiones sustantivas. Se conserva la estructura paralela de dos verbos de residencia y la serie de nombres propios, con una nota que recoge la posible función poética señalada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa una exclamación idiomática española para reflejar el hebreo interjectivo sin diluir la intensidad del lamento.
  - 'Se preserva la duplicidad verbal del paralelismo hebreo mediante dos verbos próximos: «he morado» / «he habitado».'
  - Los nombres propios se transliteran con formas bíblicas españolas legibles y tradicionales, sin convertirlos en paráfrasis.
