revisions:
- from: Y haré que muchachos sean sus príncipes[a], y niños caprichosos gobernarán sobre ellos.
  to: Y pondré a muchachos por sus príncipes[a], y niños caprichosos dominarán sobre ellos.
  rationale: Se ajusta la primera cláusula a un español más idiomático y más cercano al sentido appointive de נתן en contexto gubernamental. Se mantiene «muchachos» para נְעָרִים y «príncipes» para שָׂרֵיהֶם, en línea con la POB. En la segunda cláusula, «dominarán sobre ellos» expresa con mayor fuerza y naturalidad el valor de משל ב que «gobernarán sobre ellos». La nota léxica se conserva porque la ambigüedad de juventud/niñez y conducta caprichosa sigue siendo relevante.
