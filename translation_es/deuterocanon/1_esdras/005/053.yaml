translation:
  language: es
  text: Y dieron plata a los canteros y carpinteros, y bebida, comida y provisiones[a] a los sidonios y tirios, para traer maderos de cedro desde el Líbano, transportándolos en balsas hasta el puerto de Joppa, conforme al decreto escrito que les fue dado por Ciro, rey de los persas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de la palabra traducida aquí como 'provisiones' es difícil; el paralelo hebreo en Esdras 3:7 especifica 'aceite'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: LSJ
  rationale: En griego el término es literalmente 'plata'; en contexto de pago también puede equivaler a 'dinero'. 'Plata' conserva la imagen original y es natural en español bíblico actual.
- source_word: λατόμοις
  english_pob_choice: stonecutters
  chosen_spanish: canteros
  alternatives_spanish:
  - picapedreros
  - canteros de piedra
  - albañiles
  lexicon: LSJ
  rationale: El vocablo designa trabajadores que cortan piedra. 'Canteros' comunica bien el oficio sin sonar rebuscado; evita el posible matiz de construcción general que tendría 'albañiles'.
- source_word: τέκτοσι
  english_pob_choice: carpenters
  chosen_spanish: carpinteros
  alternatives_spanish:
  - artesanos
  - constructores
  - obreros
  lexicon: LSJ
  rationale: En este contexto de obra del templo, el término apunta naturalmente a trabajadores de la madera. 'Carpinteros' es preciso y corresponde al contraste con 'canteros'.
- source_word: ποτὰ
  english_pob_choice: drink
  chosen_spanish: bebida
  alternatives_spanish:
  - bebidas
  - licor
  lexicon: LSJ
  rationale: La palabra se refiere a suministros para beber. 'Bebida' funciona como colectivo natural en español junto con 'comida'.
- source_word: βρωτὰ
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - víveres
  lexicon: LSJ
  rationale: El sentido básico es aquello que se come. 'Comida' es claro y idiomático; no carga un matiz militar o administrativo como 'víveres'.
- source_word: χάρα
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - suministros
  - aceite
  - donativo
  lexicon: LSJ
  rationale: 'La forma transmitida es oscura en este pasaje. Siguiendo la nota auditada del inglés y el paralelo de Esdras 3:7, se mantiene una solución general y cauta: ''provisiones'', sin introducir un artículo específico que el griego no expresa de forma segura.'
- source_word: παράγειν
  english_pob_choice: bring
  chosen_spanish: traer
  alternatives_spanish:
  - llevar
  - transportar
  - conducir
  lexicon: LSJ
  rationale: El infinitivo expresa hacer venir la madera desde el Líbano. 'Traer' es simple, directo y adecuado al propósito.
- source_word: ξύλα κέδρινα
  english_pob_choice: cedar logs
  chosen_spanish: maderos de cedro
  alternatives_spanish:
  - troncos de cedro
  - madera de cedro
  - cedros
  lexicon: LSJ
  rationale: La expresión alude a madera de cedro preparada para construcción. 'Maderos de cedro' mantiene concreción sin obligar a imaginar troncos enteros si el contexto no lo exige.
- source_word: διαφέρειν σχεδίαις
  english_pob_choice: transporting them by rafts
  chosen_spanish: transportándolos en balsas
  alternatives_spanish:
  - llevándolos en balsas
  - flotándolos en balsas
  - cruzándolos en balsas
  lexicon: LSJ
  rationale: La construcción indica el medio de traslado por agua. 'Transportándolos en balsas' comunica bien el mecanismo y es fluido en español.
- source_word: Ἰόππης λιμένα
  english_pob_choice: the harbor of Joppa
  chosen_spanish: el puerto de Joppa
  alternatives_spanish:
  - el puerto de Jope
  - el fondeadero de Joppa
  lexicon: LSJ
  rationale: λιμήν puede traducirse como 'puerto' o 'bahía/harbor'. 'Puerto de Joppa' es claro y estándar; se conserva el topónimo en su forma tradicional usada en la tradición bíblica.
- source_word: πρόσταγμα
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - mandato
  - orden
  - autorización
  lexicon: LSJ
  rationale: Se trata de una disposición oficial real. 'Decreto' capta mejor el registro administrativo que un 'mandato' más general.
- source_word: τὸ γραφὲν
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - redactado
  - puesto por escrito
  lexicon: LSJ
  rationale: El participio especifica que el decreto estaba en forma escrita. 'Escrito' es la forma más natural y fiel en español.
- source_word: Κύρου τοῦ Περσῶν βασιλέως
  english_pob_choice: Cyrus king of the Persians
  chosen_spanish: Ciro, rey de los persas
  alternatives_spanish:
  - Ciro, rey de Persia
  - Ciro, rey persa
  lexicon: LSJ
  rationale: Se conserva la referencia étnica exacta 'de los persas', como en el griego, sin convertirla en una formulación territorial distinta.
theological_decisions:
- issue: Tratamiento de la forma oscura χάρα en una lista de suministros
  english_pob_reading: Use 'provisions' cautiously, with the Hebrew parallel in Ezra 3:7 indicating that the item list concerns practical supplies and that the exact commodity is uncertain in Greek.
  chosen_spanish_reading: Mantener 'provisiones' como término general, sin especificar aceite u otro artículo.
  alternative_spanish_readings:
  - aceite
  - suministros
  - donativos
  rationale: La política de 1 Esdras da primacía al griego, pero permite usar el paralelo hebreo como control. Dado que el griego no identifica con certeza el bien, el español debe conservar la ambigüedad con un término general.
  doctrine_reference: 'PHILOSOPHY.md: prioridad del testimonio griego con apoyo del paralelo hebreo cuando el griego es oscuro'
translation_notes:
  revision_awareness: Se siguió la revisión auditada que eliminó una paráfrasis modal innecesaria en la cláusula de propósito, conservando el infinitivo directo ('para traer'). También se mantuvo la solución cautelosa para χάρα, evitando emendar el texto al artículo específico del paralelo hebreo.
  spanish_consistency_notes:
  - Se usa 'Yoppa' como forma tradicional coherente con la historia bíblica en español, aunque 'Joppa' también es comprensible; aquí se prefirió la forma más reconocible en el corpus bíblico hispano.
  - Se eligieron 'plata', 'canteros' y 'carpinteros' para reflejar con precisión los oficios y la metáfora monetaria del griego sin suavizarla.
