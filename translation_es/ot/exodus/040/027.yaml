translation:
  language: es
  text: Y quemó incienso aromático[a] sobre él, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «especiado» o «fragante»; la frase hebrea se refiere a incienso hecho con especias aromáticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְטֵר
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - hizo quemar
  - ofreció en humo
  lexicon: HALOT
  rationale: El hebreo hifil de קטר señala hacer subir en humo una ofrenda, especialmente en contexto cultual. En español, «quemó» comunica de manera natural y breve la acción ritual sin perder el sentido de combustión/ofrecimiento implícito.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre esto
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular remite al altar de incienso mencionado en el contexto inmediato. «Sobre él» conserva la referencia directa y el tono sobrio del texto.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume para quemar
  - aroma para ofrenda
  lexicon: HALOT
  rationale: El sustantivo designa el incienso usado en el culto. «Incienso» es la equivalencia española estándar y más transparente.
- source_word: סַמִּים
  english_pob_choice: fragrant
  chosen_spanish: aromático
  alternatives_spanish:
  - fragante
  - especiado
  - de aromas
  lexicon: HALOT
  rationale: El término alude a especias/aromas. «Aromático» expresa bien la cualidad olfativa sin sobrecargar el sintagma ni volverlo artificial en español. La nota conserva la posibilidad de «especiado» o «fragante».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La expresión introduce conformidad estricta con el mandato divino. «Tal como» mantiene esa idea de correspondencia precisa con naturalidad en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja la prioridad temporal del mandato previo respecto de la acción narrada. «Mandado» mantiene el registro bíblico y cultual, equivalente a «commanded» en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino personal en transliteración española establecida por el proyecto. «Yahvé» es la forma de uso más natural en español y evita la sustitución por un título.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
theological_decisions:
- issue: Renderizar el Tetragrámaton יְהוָה sin sustituirlo por un título
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre divino propio, no un título. La tradición POB pide preservarlo. En español, «Yahvé» comunica el mismo principio que el inglés «Yahweh» y evita la ocultación del nombre por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantener la conformidad ritual con el mandato previo
  english_pob_reading: just as Yahweh had commanded Moses
  chosen_spanish_reading: tal como Yahvé había mandado a Moisés
  alternative_spanish_readings:
  - como Yahvé había mandado a Moisés
  - según Yahvé había mandado a Moisés
  rationale: La cláusula final subraya obediencia exacta a la instrucción divina. «Tal como» preserva esa fuerza de conformidad sin suavizarla ni volverla una simple comparación.
  doctrine_reference: Exodus 40:27 — obedience to divine command in ritual actions
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para reordenar la frase de forma más natural sin perder contenido: «burned fragrant incense on it». La versión española sigue esa misma transparencia, colocando el complemento locativo después del objeto y manteniendo la relación entre el incienso aromático y el altar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la convención del proyecto para יְהוָה.
  - «Incienso aromático» conserva la relación genitiva del hebreo קְטֹרֶת סַמִּים sin introducir una interpretación más específica de la necesaria.
  - «Sobre él» remite al altar de incienso ya identificado en el contexto inmediato; no se añadió el sustantivo «altar» para no exceder el verso.
  - El pluscuamperfecto «había mandado» sigue el valor temporal del inglés audit trail y deja clara la anterioridad del mandato.
