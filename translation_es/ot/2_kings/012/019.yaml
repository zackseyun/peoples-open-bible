translation:
  language: es
  text: Entonces Joás, rey de Judá, tomó todos los objetos sagrados que Josafat, Joram y Ocozías, sus padres[a], reyes de Judá, habían dedicado, junto con sus propios objetos sagrados, y todo el oro hallado en los tesoros de la casa de Yahvé y de la casa del rey, y lo envió a Hazael, rey de Aram; entonces se apartó de Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'sus antepasados reales'. El hebreo dice literalmente 'sus padres', una forma genealógica que aquí se refiere a los reyes anteriores de Judá.
    reason: cultural_note
  - marker: b
    text: O, 'se retiró de Jerusalén'. El hebreo literalmente dice 'subió de sobre Jerusalén', un modismo que indica que Hazael dejó de avanzar contra la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recogió
  - se llevó
  lexicon: HALOT
  rationale: לקח en este contexto narrativo expresa una acción simple de tomar para disponer de bienes; 'tomó' es natural en español y mantiene la concisión del hebreo.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: los objetos sagrados
  alternatives_spanish:
  - las cosas santas
  - los bienes sagrados
  - las cosas consagradas
  lexicon: HALOT
  rationale: קדשים aquí se refiere a bienes apartados para uso sagrado; 'objetos sagrados' preserva el valor cultual sin volverlo demasiado técnico ni implícitamente litúrgico.
- source_word: הִקְדִּישׁוּ
  english_pob_choice: had dedicated
  chosen_spanish: habían dedicado
  alternatives_spanish:
  - habían consagrado
  - habían apartado para uso sagrado
  lexicon: HALOT
  rationale: El hifil de קדש comunica dedicar/consagrar algo a uso sagrado. 'Habían dedicado' refleja bien la idea y suena idiomático en español.
- source_word: אֲבֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres reales
  lexicon: HALOT
  rationale: En contexto dinástico, el hebreo 'sus padres' puede significar sus antecesores; se conserva la forma literal en español, aclarada por el appositive 'reyes de Judá'.
- source_word: קֳדָשָׁיו
  english_pob_choice: his own holy things
  chosen_spanish: sus propios objetos sagrados
  alternatives_spanish:
  - sus propias cosas sagradas
  - sus propios bienes sagrados
  lexicon: HALOT
  rationale: El sufijo indica posesión sobre elementos previamente dedicados por Joás; repetir 'sagrados' mantiene el vínculo léxico con קדשים.
- source_word: הַנִּמְצָא
  english_pob_choice: found
  chosen_spanish: que se halló
  alternatives_spanish:
  - encontrado
  - que estaba
  lexicon: HALOT
  rationale: El participio señala lo que estaba presente en los depósitos; 'se halló' conserva la pasiva impersonal sin forzar la sintaxis.
- source_word: בְּאֹצְרוֹת
  english_pob_choice: in the treasuries
  chosen_spanish: en los tesoros
  alternatives_spanish:
  - en los almacenes
  - en las cámaras del tesoro
  lexicon: HALOT
  rationale: En español bíblico 'tesoros' comunica bien el lugar de resguardo de bienes valiosos y permite mantener el paralelo con la casa de Yahvé y la del rey.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el estándar del proyecto, y 'casa' refleja literalmente בית sin sustituirlo por una glosa interpretativa.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio
  - la casa real
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'casa del rey'; se mantiene esa forma para preservar el paralelismo con 'la casa de Yahvé'.
- source_word: וַיִּשְׁלַח לַחֲזָאֵל
  english_pob_choice: sent it to Hazael
  chosen_spanish: lo envió a Hazael
  alternatives_spanish:
  - se lo envió a Hazael
  - lo mandó a Hazael
  lexicon: HALOT
  rationale: El pronombre resume el conjunto de objetos y oro ya enumerados; 'lo envió' es idiomático en español y respeta el valor colectivo del objeto.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: '''Aram'' mantiene el nombre histórico/geográfico del original y evita la tradición interpretativa ''Siria'' cuando no es necesaria.'
- source_word: וַיַּעַל מֵעַל יְרוּשָׁלִָם
  english_pob_choice: then he went up away from Jerusalem
  chosen_spanish: entonces se apartó de Jerusalén
  alternatives_spanish:
  - entonces se retiró de Jerusalén
  - entonces subió y se apartó de Jerusalén
  lexicon: HALOT
  rationale: El hebreo idiomático literalmente dice que 'subió de sobre Jerusalén', indicando que Hazael cesó su avance. En español, 'se apartó' comunica el resultado sin calcar una imagen extraña.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh / Yahweh in the source context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El proyecto español usa 'Yahvé' para יהוה como representación transparente del nombre propio divino; se evita el reemplazo por mayúsculas devocionales que ocultaría el dato textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֲבֹתָיו en contexto real
  english_pob_reading: his fathers = royal forefathers or ancestors
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus padres reales
  rationale: Se conserva la literalidad del hebreo mientras la apposición 'reyes de Judá' aclara que se trata de antecesores dinásticos, no necesariamente de padres inmediatos.
  doctrine_reference: English audit note on cultural_note for אֲבֹתָיו
- issue: Última cláusula como secuencia, no causa
  english_pob_reading: then he went up away from Jerusalem
  chosen_spanish_reading: entonces se apartó de Jerusalén
  alternative_spanish_readings:
  - y se retiró de Jerusalén
  - entonces se retiró de Jerusalén
  rationale: Se mantiene el valor secuencial del waw final sin imponer una causalidad explícita; 'se apartó' expresa la retirada implícita en el hebreo idiomático.
  doctrine_reference: Applied revision pass 2026-04-23T10:17:28Z
translation_notes:
  revision_awareness: Esta redacción incorpora la revisión más reciente del audit trail, que cambió la última cláusula de un matiz más resultado ('so') a secuencia simple ('then'). También conserva la decisión revisada de mantener una traducción formalmente cercana de la expresión hebrea final sin convertirla en paráfrasis causal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conserva la repetición léxica de 'sagrados' para reflejar קדשים / קדשָיו.
  - '''Aram'' se usa de manera consistente en lugar de ''Siria'' siguiendo la fuente.'
  - La última cláusula evita la causalidad implícita y conserva la secuencia narrativa.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto traducido donde corresponde.
