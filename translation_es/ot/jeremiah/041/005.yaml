    text: O «cortándose». El hebreo describe la práctica de hacerse incisiones sobre el cuerpo como señal de duelo.
    reason: lexical_alternative
  - marker: b
    text: O «ofrendas de cereal». El hebreo minḥāh suele designar una ofrenda vegetal en contexto cultual.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la casa de Yahvé». Puede aludir al santuario como sitio de culto más que a un edificio del templo intacto.'
    reason: cultural_note
  revision_rationale: Se corrige el problema principal de fidelidad editorial reubicando la nota [b] desde 'haciéndose cortes' a 'ofrendas vegetales', que es la expresión a la que realmente corresponde. También se mejora la naturalidad y precisión del español con 'sus barbas rasuradas' y 'sus ropas rasgadas', sin alterar el sentido del hebreo ni las decisiones teológicas del proyecto.
