translation:
  language: es
  text: Y ahora, oh Señor, santo en toda santidad[a], conserva para siempre esta casa[b], recientemente purificada, sin mancha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'santo en toda santidad' traduce de cerca una formulación griega inusual; también puede entenderse como 'santo por encima de toda consagración' o con un sentido intensivo parecido.
    reason: lexical_alternative
  - marker: b
    text: O ‘este templo’. El griego dice literalmente ‘esta casa’, una forma bíblica común de referirse al santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγιε
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - santísimo
  lexicon: LSJ
  rationale: Es un vocativo dirigido a Dios; 'santo' es la forma directa y transparente en español para el adjetivo ἄγιος sin añadir solemnidad no requerida.
- source_word: παντὸς ἁγιασμοῦ
  english_pob_choice: in all holiness
  chosen_spanish: en toda santidad
  alternatives_spanish:
  - en toda consagración
  - de toda santificación
  lexicon: LSJ
  rationale: La expresión griega es intensiva y algo inusual; 'en toda santidad' conserva la fuerza totalizante y suena natural en español, sin convertirla en una explicación interpretativa.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Como título divino en oración, 'Señor' es el equivalente natural y reverente en español.
- source_word: διατήρησον
  english_pob_choice: keep
  chosen_spanish: conserva
  alternatives_spanish:
  - guarda
  - mantén
  lexicon: LSJ
  rationale: El imperativo pide preservación continua del estado del edificio; 'conserva' expresa bien esa idea sin perder naturalidad.
- source_word: εἰς αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: LSJ
  rationale: Es el equivalente idiomático y duradero en español para una duración indefinida/continua.
- source_word: ἀμίαντον
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculada
  - sin contaminación
  lexicon: LSJ
  rationale: El contexto es cultual; 'sin mancha' comunica pureza ritual y moral de manera clara en español. 'Inmaculada' puede sonar más técnico o mariano, y 'sin contaminación' resulta más pesado.
- source_word: τόνδε τὸν ... οἶκον
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta morada
  lexicon: LSJ
  rationale: ἶκος conserva el literal 'casa'; en contexto del santuario, 'casa' mantiene la idiomática bíblica sin ocultar el término de base. 'Templo' es posible, pero explicita más de lo que dice el griego.
- source_word: προσφάτως κεκαθερισμένον
  english_pob_choice: recently purified
  chosen_spanish: recientemente purificada
  alternatives_spanish:
  - recién purificada
  - hace poco purificada
  lexicon: LSJ
  rationale: El adverbio y el participio pasivo indican una purificación reciente; 'recientemente purificada' preserva con precisión la temporalidad y el estado resultante.
theological_decisions:
- issue: Cómo expresar el genitivo intensivo παντὸς ἁγιασμοῦ sin suavizar la fuerza retórica
  english_pob_reading: holy in all holiness
  chosen_spanish_reading: santo en toda santidad
  alternative_spanish_readings:
  - santo de toda santidad
  - santo en toda consagración
  rationale: La frase griega es comprimida e intensiva; la opción elegida evita una paráfrasis como 'fuente de toda santidad', que iría más allá del texto. Se conserva la elevación retórica y la ambigüedad controlada del original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si traducir οἶκος como 'casa' o 'templo' en una plegaria al Dios de Israel
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: La lectura básica del griego es 'casa', y el uso bíblico puede designar el santuario. Mantener 'casa' respeta el texto base; una nota puede aclarar el sentido cultual para el lector español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca la versión inglesa auditada, pero ajusta la sintaxis al español para evitar calcos duros. Se mantiene 'casa' para οἶκος, 'sin mancha' para ἀμίαντον y 'santo en toda santidad' para la expresión intensiva de ἄγιε παντὸς ἁγιασμοῦ, sin ampliar el sentido hacia 'fuente de santidad'.
  spanish_consistency_notes:
  - Se usa 'Señor' como título divino reverente, coherente con el tratamiento de κύριος en el POB.
  - Se conserva el término literal 'casa' con nota alternativa, siguiendo la decisión inglesa y evitando sustituirlo por 'templo' en el texto principal.
  - '''Sin mancha'' se emplea como equivalente cultual de ἀμίαντον, manteniendo la resonancia ritual sin introducir un tono doctrinal ajeno al pasaje.'
