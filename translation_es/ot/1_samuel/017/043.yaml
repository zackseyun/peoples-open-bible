translation:
  language: es
  text: 'Y dijo el filisteo a David: «¿Acaso soy yo un perro, para que vengas a mí con palos[a]?». Y el filisteo maldijo a David por sus dioses[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con bastones». El hebreo puede referirse a varas, bastones o palos; aquí expresa el desprecio del filisteo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el nombre de sus dioses».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  lexicon: HALOT
  rationale: Se mantiene la identificación étnica/narrativa sin añadir ‘guerrero’, que no está en el hebreo y no es necesario para el sentido.
- source_word: הֲכֶלֶב אָנֹכִי
  english_pob_choice: Am I a dog
  chosen_spanish: ¿Acaso soy yo un perro?
  alternatives_spanish:
  - ¿Soy yo un perro?
  - ¿Acaso soy yo un perro, yo?
  lexicon: HALOT
  rationale: Conserva literalmente la imagen insultante y la fuerza retórica del hebreo; ‘perro’ se mantiene por fidelidad cultural y narrativa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En esta construcción, la partícula introduce la cláusula que explica la indignación del hablante; ‘para que’ expresa de modo natural el valor resultativo/explicativo en español sin perder el tono retórico.
- source_word: בָא אֵלַי
  english_pob_choice: you come to me
  chosen_spanish: vengas a mí
  alternatives_spanish:
  - vienes a mí
  - estés viniendo a mí
  lexicon: HALOT
  rationale: El participio con pronombre transmite una acción dirigida hacia el hablante; en el español de la cita directa, el subjuntivo tras ‘para que’ comunica bien la reproche implícito.
- source_word: בַּמַּקְלוֹת
  english_pob_choice: with sticks
  chosen_spanish: con palos
  alternatives_spanish:
  - con bastones
  - con varas
  lexicon: HALOT
  rationale: ‘Palos’ es un equivalente natural y despectivo en español, adecuado al tono de desprecio. ‘Bastones’ o ‘varas’ suenan más formales y suavizan el insulto.
- source_word: וַיְקַלֵּל
  english_pob_choice: cursed
  chosen_spanish: maldijo
  alternatives_spanish:
  - amaldeció
  - blasfemó contra
  lexicon: HALOT
  rationale: ‘Maldijo’ conserva el sentido fuerte de pronunciar una maldición, más preciso que un simple insulto.
- source_word: בֵּאלֹהָיו
  english_pob_choice: by his gods
  chosen_spanish: por sus dioses
  alternatives_spanish:
  - en nombre de sus dioses
  - con sus dioses
  lexicon: HALOT
  rationale: Se preserva el plural teológico del hebreo y el contexto filisteo politeísta. ‘Por’ refleja una fórmula de invocación/instrumentalidad en español sin ocultar el plural.
theological_decisions:
- issue: Pluralidad de אֱלֹהִים en contexto filisteo
  english_pob_reading: his gods
  chosen_spanish_reading: sus dioses
  alternative_spanish_readings:
  - su dios
  - sus deidades
  rationale: El hebreo presenta una forma plural con sufijo de 3ms; en este contexto no israelita, el plural es la lectura más natural y evita normalizarlo indebidamente a singular.
  doctrine_reference: Preservar la tensión léxica del original; primacía del texto fuente sobre la armonización teológica
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin traducirlo mecánicamente: se preservó la literalidad de la imagen insultante (‘perro’), el plural de ‘dioses’, y se eligieron equivalentes naturales en español (‘palos’, ‘maldijo’) acordes al tono despectivo del pasaje. No hubo revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa ‘filisteo’ en minúscula por ser etnónimo/narrativo, coherente con el estilo bíblico español moderno.
  - ‘Yahvé’ no aparece en este versículo; no se introduce terminología divina ajena al texto.
  - Se mantiene el registro directo y narrativo, sin paráfrasis devocional.
