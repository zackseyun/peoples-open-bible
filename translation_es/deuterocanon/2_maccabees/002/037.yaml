translation:
  language: es
  text: Así como también Moisés oró al Señor[a], y descendió fuego del cielo y consumió las cosas del sacrificio; así también Salomón oró al Señor[b], y el fuego descendió y consumió los holocaustos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene una expresión más amplia, ‘las cosas del sacrificio’, que puede aludir a los materiales sacrificiales o a las ofrendas asociadas con el sacrificio.
    reason: lexical_alternative
  - marker: b
    text: O ‘ofrendas totalmente quemadas’. El término griego designa ofrendas consumidas por completo por el fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rezó
  - hizo oración
  lexicon: LSJ
  rationale: El aoristo medio de προσεύχομαι significa simplemente ‘orar/pray’. En español, ‘oró’ es natural, digno y fiel; ‘hizo oración’ resulta más forzado, y ‘rezó’ puede sonar más restringido por uso confesional.
- source_word: Κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: LSJ
  rationale: El griego tiene Κύριον, no el Tetragrámaton explícito. Por eso se conserva el equivalente reverencial ‘Señor’, sin introducir ‘Yahvé’ en el texto principal. En español, la mayúscula inicial marca la referencia divina.
- source_word: κατέβη πῦρ ἐκ τοῦ οὐρανοῦ
  english_pob_choice: fire came down from heaven
  chosen_spanish: descendió fuego del cielo
  alternatives_spanish:
  - bajó fuego del cielo
  - cayó fuego del cielo
  lexicon: LSJ
  rationale: ‘Descendió fuego del cielo’ preserva el movimiento narrativo y es natural en español. ‘Cayó’ añade una imagen no exigida por el griego; ‘bajó’ es posible, pero menos solemne.
- source_word: τὰ τῆς θυσίας
  english_pob_choice: the things of the sacrifice
  chosen_spanish: las cosas del sacrificio
  alternatives_spanish:
  - el sacrificio
  - las ofrendas del sacrificio
  - lo perteneciente al sacrificio
  lexicon: LSJ
  rationale: Se mantiene la amplitud y rareza del giro griego, que es más amplio que un simple singular. ‘Las cosas del sacrificio’ conserva el carácter plural/neutro sin cerrar indebidamente el referente.
- source_word: ἐδαπάνησεν
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - agotó
  - destruyó
  lexicon: LSJ
  rationale: En contexto de fuego celestial sobre material sacrificial, ‘consumió’ es la equivalencia idiomática más clara y fiel.
- source_word: οὕτως ... καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de la misma manera
  - así
  lexicon: LSJ
  rationale: ‘Así también’ expresa la comparación explícita entre Moisés y Salomón y conserva el paralelismo del pasaje.
- source_word: καταβῆναι τὸ πῦρ
  english_pob_choice: the fire that came down
  chosen_spanish: el fuego descendió
  alternatives_spanish:
  - el fuego que descendió
  - descendió el fuego
  lexicon: LSJ
  rationale: La construcción griega es comprimida; el español fluye mejor con una cláusula directa. Además, el texto ya había mencionado que el fuego descendió del cielo, por lo que esta repetición mantiene la secuencia narrativa sin forzar una relativa.
- source_word: ἀνήλωσεν
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - destruyó
  - agotó
  - devoró
  lexicon: LSJ
  rationale: Se conserva la misma solución que para ἐδαπάνησεν para respetar el paralelismo del verso.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - holocaustos completos
  - holocaustos de expiación
  lexicon: LSJ
  rationale: 'Aunque ‘holocaustos’ puede sonar tradicional, es el término técnico que refleja mejor el griego ὁλοκαυτώματα: ofrendas enteramente quemadas. Se evita ‘sacrificios’ por ser demasiado general.'
theological_decisions:
- issue: Referencia divina de Κύριον en contexto de oración
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El griego presenta Κύριον, no una cita explícita del nombre divino hebreo. En la línea del POB inglés, se traduce con el título reverencial correspondiente, sin sustituirlo por el nombre Yahvé.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; en español, Señor como equivalente reverencial'
- issue: Precisión cultual de ὁλοκαυτώματα
  english_pob_reading: whole burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas totalmente quemadas
  - holocaustos completos
  - sacrificios
  rationale: La forma griega denota ofrendas consumidas íntegramente por fuego. ‘Holocaustos’ preserva esa especificidad cultual mejor que ‘sacrificios’, que es demasiado amplio.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Posible ambigüedad de τὰ τῆς θυσίας
  english_pob_reading: the things of the sacrifice
  chosen_spanish_reading: las cosas del sacrificio
  alternative_spanish_readings:
  - las ofrendas del sacrificio
  - el sacrificio
  - lo perteneciente al sacrificio
  rationale: Se conserva la amplitud del griego sin forzar una identificación más concreta de lo que el texto no precisa. Esto evita borrar la tensión lexical señalada en el audit trail inglés.
  doctrine_reference: LSJ; nota lexical de la POB inglesa
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una secuencia más directa en la cláusula final (‘the fire came down and consumed’) y mantuvo la amplitud de la expresión sacrificial. La versión española conserva esa linealidad, evitando una relativa innecesaria, y mantiene el paralelismo entre Moisés y Salomón.
  spanish_consistency_notes:
  - Se usa ‘Señor’ para Κύριον, en continuidad con el tratamiento auditado de κύριος en el POB inglés.
  - Se eligió ‘consumió’ de manera consistente para ἐδαπάνησεν y ἀνήλωσεν, preservando el paralelismo léxico del versículo.
  - ‘Holocaustos’ se usa aquí en su sentido cultual específico de ofrendas totalmente quemadas, no en su uso histórico moderno.
  - La puntuación con punto y coma separa con claridad las dos cláusulas comparativas del griego y mantiene un tono bíblico formal.
  - Las notas a y b se limitan a las alternativas lexicales realmente documentadas en el audit trail inglés, sin ampliar indebidamente el abanico interpretativo.
