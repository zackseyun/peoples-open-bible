  yaml_path: translation/nt/acts/022/008.yaml
  text: And I answered[a], ‘Who are you, Lord?’ And he said to me, ‘I am Jesus the Nazarene[b], whom you are persecuting.’
  footnotes:
  - marker: a
    text: Or ‘sir.’ The Greek κύριε can function as a respectful form of address as well as the title ‘Lord.’
    reason: alternative_reading
  - marker: b
    text: Or ‘Jesus of Nazareth’ or ‘Jesus the Nazorean.’
    reason: lexical_alternative
translation:
  language: ko
  text: 제가 대답했습니다. 「주여, 누구십니까?」 그가 저에게 말씀하셨습니다. 「나는 네가 박해하는 나사렛 사람 예수다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「선생님」. 헬라어 κύριε는 정중한 호칭으로도 「주」라는 칭호로도 쓰일 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριε
  english_pob_choice: Lord
  chosen_korean: 주여
  alternatives_korean:
  - 선생님
  - 주님
  lexicon: BDAG
  rationale: 대답 시점의 바울은 상대를 모르나 본문은 후일의 「주」 정체성을 드러낸다. 「주여」를 채택하되 각주로 정중 호칭 가능성을 둔다.
