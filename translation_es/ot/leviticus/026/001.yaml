translation:
  language: es
  text: No harán para ustedes ídolos, ni levantarán para ustedes imagen tallada o piedra erguida; tampoco pondrán en su tierra piedra figurada[a], para postrarse ante ella, porque yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אֶבֶן מַשְׂכִּית. También podría entenderse como «piedra tallada» o «imagen de piedra». El matiz exacto es discutido, pero el texto se refiere a una piedra asociada con adoración prohibida.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִילִם
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - dolos
  - falsos dioses
  lexicon: HALOT
  rationale: El hebreo apunta a objetos de culto prohibidos, con matiz de vaciedad o nulidad; en español, «ídolos» comunica con claridad esa función religiosa y mantiene el alcance legal de la prohibición sin explicitar más de lo que el texto exige.
- source_word: פֶסֶל
  english_pob_choice: carved image
  chosen_spanish: imagen tallada
  alternatives_spanish:
  - imagen esculpida
  - ídolo
  lexicon: HALOT
  rationale: פֶסֶל designa una imagen hecha por tallado o escultura. «Imagen tallada» conserva el rasgo material y no la diluye en el término más general «ídolo».
- source_word: מַצֵּבָה
  english_pob_choice: standing stone
  chosen_spanish: piedra erguida
  alternatives_spanish:
  - pilar
  - piedra levantada
  lexicon: HALOT
  rationale: La palabra se refiere a una piedra erigida verticalmente, a menudo con función cultual. «Piedra erguida» traduce con concreción y evita introducir de antemano la interpretación de «pilar sagrado».
- source_word: אֶבֶן מַשְׂכִּית
  english_pob_choice: figured stone
  chosen_spanish: piedra figurada
  alternatives_spanish:
  - piedra tallada
  - piedra esculpida
  lexicon: HALOT
  rationale: La expresión es debatida, pero probablemente nombra una piedra con figura o relieve asociado al culto. «Piedra figurada» preserva esa ambigüedad lexical y el contraste con פֶסֶל, sin resolverla de manera demasiado interpretativa.
- source_word: תַעֲשׂוּ לָכֶם
  english_pob_choice: make idols for yourselves
  chosen_spanish: se harán para ustedes
  alternatives_spanish:
  - harán para ustedes
  - se fabricarán para ustedes
  lexicon: HALOT
  rationale: El hebreo combina el verbo «hacer» con el dativo benefactivo/reflexivo. En español, «se harán para ustedes» conserva la idea de producción destinada a su propio uso y evita una construcción torpe; el referente de «ídolos» se explicita por el contexto inmediato.
- source_word: תָקִימוּ לָכֶם
  english_pob_choice: set up for yourselves
  chosen_spanish: se levantarán para ustedes
  alternatives_spanish:
  - erigirán para ustedes
  - colocarán para ustedes
  lexicon: HALOT
  rationale: El verbo hifil de קום expresa erigir o establecer objetos cultuales. «Levantarán» sigue esa fuerza verbal en español bíblico moderno, y mantiene el paralelismo con la prohibición anterior.
- source_word: תִתְּנוּ בְּאַרְצְכֶם
  english_pob_choice: place in your land
  chosen_spanish: pondrán en su tierra
  alternatives_spanish:
  - colocarán en su tierra
  - meterán en su tierra
  lexicon: HALOT
  rationale: נתן con complemento locativo se expresa naturalmente como «poner». «Su tierra» conserva la dimensión pactal y territorial del hebreo, sin estrechar el sentido a un recinto específico.
- source_word: לְהִשְׁתַּחֲוֺת עָלֶיהָ
  english_pob_choice: to bow down to it
  chosen_spanish: para postrarse ante ella
  alternatives_spanish:
  - para inclinarse ante ella
  - para adorarla
  lexicon: HALOT
  rationale: 'El infinitivo indica finalidad: la piedra no debe ponerse con el propósito de rendirle reverencia. «Postrarse ante ella» transmite la acción física y cultual; «adorarla» sería más interpretativo y menos preciso frente al hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino revelado en el hebreo con la forma española establecida por el proyecto: «Yahvé». No se sustituye por un título como «Señor».'
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El plural de segunda persona exige referir la relación de pacto con el pueblo. «Su Dios» es idiomático en español bíblico contemporáneo y mantiene la poseción relacional del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la línea auditada del POB, se conserva el nombre propio divino en transliteración española, en vez de ocultarlo bajo un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción de objetos cultuales prohibidos
  english_pob_reading: Different Hebrew terms are distinguished as 'idols,' 'carved image,' 'standing stone,' and 'figured stone' rather than collapsed into one term.
  chosen_spanish_reading: Se distinguen «ídolos», «imagen tallada», «piedra erguida» y «piedra figurada».
  alternative_spanish_readings:
  - Reducir todo a «ídolos» o «imágenes»
  - unificar «piedra erguida» y «piedra figurada»
  rationale: La acumulación de términos en hebreo tiene peso legal y cultual. Mantenerlos diferenciados en español evita aplanar la variedad semántica y conserva la fuerza específica de cada prohibición.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registraron cambios necesarios y la evaluación cruzada indicó alto grado de acuerdo. Se mantuvo la distinción léxica de los objetos cultuales y el uso de Yahvé para יְהוָה, conforme al audit trail inglés.'
  spanish_consistency_notes:
  - Se preserva el paralelismo legal de las negaciones múltiples con verbos en futuro perifrástico de mandato negativo implícito en español.
  - Se mantuvo «su tierra» para reflejar el marco pactal y territorial del hebreo.
  - No se colapsaron los cuatro términos cultuales en una sola palabra, para respetar la especificidad semántica del original.
  - Se usó «ante ella» para el referente femenino implícito de «piedra», siguiendo la concordancia natural en español.
