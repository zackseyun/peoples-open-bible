translation:
  language: es
  text: Tendrás una estaca[a] entre tu equipo[b], y cuando te sientes afuera[c], cavarás con ella, y te volverás y cubrirás tu excremento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «estaca»; algunos lo interpretan más funcionalmente como una herramienta para cavar o una pequeña pala.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre tu oreja». La expresión hebrea es idiomática y probablemente alude a tu equipo o implementos.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «cuando te sientes afuera», usando un eufemismo discreto para aliviarse.
    reason: cultural_note
lexical_decisions:
- source_word: יָתֵד
  english_pob_choice: peg
  chosen_spanish: estaca
  alternatives_spanish:
  - clavo
  - poste
  - pica
  lexicon: HALOT
  rationale: El término hebreo puede referirse a una pieza clavada o a un implemento de madera/metal. En español, «estaca» conserva la imagen concreta y funciona bien en este contexto, donde también puede sugerir una herramienta simple para cavar sin forzar un tecnicismo.
- source_word: עַל אֲזֵנֶךָ
  english_pob_choice: among your equipment
  chosen_spanish: entre tu equipo
  alternatives_spanish:
  - entre tus utensilios
  - entre tu equipo de campamento
  - a tu lado
  lexicon: HALOT
  rationale: La expresión es idiomática y no debe traducirse literalmente como «sobre tu oreja». «Entre tu equipo» conserva la idea de pertenencia al ajuar/implementos del campamento y sigue de cerca la lectura auditada del inglés POB.
- source_word: בְּשִׁבְתְּךָ חוּץ
  english_pob_choice: when you sit down outside
  chosen_spanish: cuando te sientes fuera
  alternatives_spanish:
  - cuando te sientas afuera
  - cuando vayas fuera
  - cuando te sientes fuera del campamento
  lexicon: HALOT
  rationale: La frase hebrea usa un eufemismo modesto para aliviarse. En español, «cuando te sientes fuera» mantiene la literalidad relativa y el pudor del hebreo sin explicar de más en el cuerpo del texto.
- source_word: וְחָפַרְתָּה בָהּ
  english_pob_choice: you shall dig with it
  chosen_spanish: cavarás con ella
  alternatives_spanish:
  - cavarás con eso
  - harás un hoyo con ella
  - cavarás con la estaca
  lexicon: HALOT
  rationale: El pronombre femenino remite a la estaca. «Cavarás con ella» es claro, natural y suficientemente preciso; el objeto de la acción queda implícito como en el hebreo.
- source_word: וְשַׁבְתָּ
  english_pob_choice: turn back
  chosen_spanish: te volverás
  alternatives_spanish:
  - volverás
  - te darás vuelta
  - retornarás
  lexicon: HALOT
  rationale: El verbo שׁוב aquí indica el giro de regresar tras cavar para completar la acción. «Te volverás» reproduce bien esa secuencia y suena natural en español bíblico contemporáneo.
- source_word: צֵאָתֶךָ
  english_pob_choice: your excrement
  chosen_spanish: tus excrementos
  alternatives_spanish:
  - tu excremento
  - tus heces
  - tu desecho
  lexicon: HALOT
  rationale: El sustantivo designa desechos humanos. Se usa el plural de cortesía/concreción «tus excrementos» para una traducción pública y formal, manteniendo el referente sin vulgaridad.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: el texto inglés auditado quedó sin cambios sustanciales, y no se detectaron revisiones aplicadas que obligaran a alterar la decisión léxica principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el registro legal y campamental sin recurrir a terminología eclesiástica tradicional.
  - El eufemismo del hebreo se conserva con una formulación sobria en el texto principal y se explicita en nota.
  - 'No se suaviza el referente escatológico/humano del cierre: se traduce de forma directa y formal.'
