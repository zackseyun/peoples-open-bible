translation:
  language: es
  text: Escúchenme[a], hijos santos, y broten como una rosa creciendo junto a un arroyo[b] en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escúchenme, hijos piadosos». El adjetivo puede expresar personas piadosas o fieles en su conducta reverente.
    reason: lexical_alternative
  - marker: b
    text: O «junto a un arroyo del campo». La imagen de crecimiento vegetal es exhortativa y puede expresarse con ligeras variaciones sin cambiar el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσακούσατέ
  english_pob_choice: Listen to
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: LSJ
  rationale: El imperativo aoristo pide una escucha atenta y receptiva; en español, «Escúchenme» conserva el tono directo y exhortativo sin caer en un arcaísmo.
- source_word: υἱοὶ
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos míos
  lexicon: LSJ
  rationale: El griego usa un plural masculino explícito. «Hijos» mantiene esa forma de dirección y es natural en español bíblico; «niños» o «hijos míos» introducirían matices no presentes en el texto.
- source_word: ὅσιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - piadosos
  - devotos
  - santos y devotos
  lexicon: LSJ
  rationale: Ὅσιος puede expresar piedad o fidelidad reverente; «santos» comunica bien la consagración religiosa en español y preserva el tono elevado sin expandir el sentido.
- source_word: βλαστήσατε
  english_pob_choice: bud
  chosen_spanish: broten
  alternatives_spanish:
  - reverdezcan
  - florezcan
  - saquen brotes
  lexicon: LSJ
  rationale: El verbo mantiene la imagen de crecimiento vegetal. «Broten» reproduce la idea de surgir o producir crecimiento nuevo; «florezcan» avanzaría demasiado hacia la floración plena.
- source_word: ῥόδον
  english_pob_choice: rose
  chosen_spanish: rosa
  alternatives_spanish:
  - rosal
  lexicon: LSJ
  rationale: ῥόδον designa una rosa. «Rosa» es la correspondencia directa y breve en español.
- source_word: φυόμενον
  english_pob_choice: growing
  chosen_spanish: que crece
  alternatives_spanish:
  - que va creciendo
  - creciendo
  lexicon: LSJ
  rationale: El participio describe crecimiento continuo de la planta. «Que crece» es natural y mantiene el carácter descriptivo de la imagen.
- source_word: ἐπὶ ῥεύματος
  english_pob_choice: by a stream
  chosen_spanish: junto a un arroyo
  alternatives_spanish:
  - al borde de un arroyo
  - junto a una corriente
  lexicon: LSJ
  rationale: La preposición sugiere cercanía al agua, no apoyo literal sobre ella. «Junto a un arroyo» preserva la imagen de vegetación favorecida por el agua en español natural.
- source_word: ἀγροῦ
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - de la campiña
  - del terreno
  lexicon: LSJ
  rationale: ἀγρός remite a campo, tierra cultivada o abierta. «Del campo» conserva el escenario agrícola y funciona de modo fluido con la imagen anterior.
theological_decisions:
- issue: Forma de tratamiento en υἱοὶ ὅσιοι
  english_pob_reading: holy children
  chosen_spanish_reading: hijos santos
  alternative_spanish_readings:
  - hijos piadosos
  - hijos devotos
  - santos hijos
  rationale: No hay un problema doctrinal mayor, pero sí una tensión de matiz entre la literalidad del plural masculino y la naturalidad del español. «Hijos santos» mantiene el vocativo masculino plural y el tono reverente; la colocación adjetival pospuesta es normal en español y evita neutralizar el género del original.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; readable modern Spanish'
- issue: Imagen exhortativa de crecimiento vegetal
  english_pob_reading: bud like a rose growing by a stream of the field
  chosen_spanish_reading: broten como una rosa que crece junto a un arroyo del campo
  alternative_spanish_readings:
  - florezcan como una rosa que crece junto a un arroyo del campo
  - broten como rosa creciendo junto a un arroyo del campo
  rationale: La comparación es exhortativa y poética, por lo que conviene conservar el movimiento de vida vegetal sin intensificarlo. «Broten» reproduce mejor la fuerza imperativa de βλαστήσατε que «florezcan», y «que crece» mantiene la imagen continua sin sobreinterpretarla.
  doctrine_reference: 'DOCTRINE.md: Preserve figurative imagery and avoid unnecessary paraphrase'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su revisión posterior: la versión inglesa pasó de ‘sons’ a ‘children’ y de ‘bud forth’ a ‘bud’, además de ajustar la frase del arroyo/campo. En español se preservó la literalidad masculina de υἱοὶ, pero con una formulación natural y poética; también se mantuvo la relación cercana con el agua y el campo sin añadir elementos ausentes en el griego.'
  spanish_consistency_notes:
  - Se conservó el paralelismo exhortación + imagen de crecimiento vegetal.
  - Se evitó ‘SEÑOR’ o terminología de sustitución, porque el versículo no contiene el Tetragrámaton ni κύριος.
  - ‘Santos’ se prefirió a ‘piadosos/devotos’ para mantener la concisión reverente del vocativo.
  - La puntuación busca leer con fluidez en español bíblico contemporáneo sin volver el texto paraphrástico.
