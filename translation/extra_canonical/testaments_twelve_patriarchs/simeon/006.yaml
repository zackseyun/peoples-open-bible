translation:
  text: '1 Behold[a], I have told you everything, so that I may be justified from your sin. 2 But if you remove from yourselves envy and every hardness of heart, my bones will blossom like a rose in Israel, and my flesh like a lily in Jacob; and my fragrance will be like the fragrance of Lebanon. Holy ones will be multiplied from me forever and ever, and their branches will extend far away.


    3 Then the seed of Canaan will perish[a], and no remnant will remain in Amalek; all the Cappadocians will perish, and all the Hittites will be utterly destroyed. 4 Then the land of Ham will fail, and every people will perish. Then all the earth will cease from turmoil, and all that is under heaven from war.


    5 Then a great sign will be glorified for Israel, because the Lord God, appearing on the earth, will come and save Adam in him. 6 Then all the spirits of deceit will be given over to be trampled down, and men will rule over the evil spirits. 7 Then I also will arise in gladness[b][a], and I will bless the Most High for his wonders.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Textually complex verse. Some witnesses read 'Then Shem will be glorified,' others 'Then Seth will be glorified,' instead of 'a great sign will be glorified.'
    reason: textual_variant
    anchor_ref: '6:5'
  - marker: a
    text: Some witnesses add 'as a man' after 'will appear on the earth.' This is likely a later expansion and is not included in the main text.
    reason: textual_variant
    anchor_ref: '6:5'
  - marker: a
    text: '''Adam'' may be understood representatively as humankind, but the Greek names Adam explicitly.'
    reason: lexical_alternative
    anchor_ref: '6:5'
  - marker: b
    text: 'Some witnesses add: ''for God, having taken a body and eaten with men, saved men.'' Because this appears as a bracketed expansion in the source, it is not included in the main text.'
    reason: textual_variant
    anchor_ref: '6:7'
lexical_decisions:
- source_word: δικαιωθῶ
  chosen: I may be cleared
  alternatives:
  - I may be justified
  - I may be vindicated
  lexicon: BDAG
  rationale: In this testamentary context Simeon speaks of having fully warned his sons so as not to bear responsibility for their sin. 'Be cleared' communicates release from liability more naturally than the more doctrinally loaded 'justified,' while preserving the forensic sense.
- source_word: φθόνον
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: The Testament of Simeon centers on destructive envy, especially in relation to Joseph. 'Envy' best matches the vice-theme and should remain stable.
- source_word: σκληροκαρδίαν
  chosen: hardness of heart
  alternatives:
  - stubbornness
  - hard-heartedness
  lexicon: BDAG
  rationale: The compound is rendered transparently to preserve the biblical moral texture and the inward moral condition implied by the Greek.
- source_word: ἀνθήσει
  chosen: will blossom
  alternatives:
  - will flower
  - will bloom
  lexicon: LSJ
  rationale: The image is poetic and resurrection-adjacent in tone. 'Will blossom' preserves the vivid metaphor without overinterpreting it.
- source_word: ὀστᾶ μου
  chosen: my bones
  alternatives:
  - my remains
  lexicon: BDAG
  rationale: The Greek is concrete. Keeping 'bones' preserves the bodily and ancestral imagery.
- source_word: σάρξ μου
  chosen: my flesh
  alternatives:
  - my body
  lexicon: BDAG
  rationale: The text pairs bones and flesh in parallel. 'Flesh' preserves the literal bodily imagery and avoids flattening the poetic structure.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  - holy people
  lexicon: BDAG
  rationale: '''Holy ones'' is transparent and avoids importing later ecclesiastical associations of ''saints,'' while leaving open whether descendants or consecrated people are in view.'
- source_word: κλάδοι
  chosen: branches
  alternatives:
  - shoots
  - offspring
  lexicon: LSJ
  rationale: The botanical metaphor continues the flowering imagery. 'Branches' preserves the figurative extension of descendants without collapsing image into interpretation.
- source_word: ἐκλείψει
  chosen: will fail
  alternatives:
  - will vanish
  - will come to an end
  lexicon: LSJ
  rationale: For 'the land of Ham,' the verb suggests disappearance or cessation. 'Will fail' keeps the prophetic tone while remaining readable.
- source_word: ταραχῆς
  chosen: turmoil
  alternatives:
  - disturbance
  - trouble
  lexicon: BDAG
  rationale: The context is global unrest paired with war. 'Turmoil' captures broad social upheaval better than narrower alternatives.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - banner
  - mark
  lexicon: BDAG
  rationale: The noun is textually difficult in this verse, but 'sign' is the most direct rendering and best preserves the ambiguity of a revelatory event or token.
- source_word: ἐνδοξασθήσεται
  chosen: will be glorified
  alternatives:
  - will be made glorious
  - will be honored
  lexicon: BDAG
  rationale: The passive keeps the elevated prophetic register. 'Will be glorified' also preserves the theological resonance of manifested glory.
- source_word: φαινόμενος ἐπὶ τῆς γῆς
  chosen: appearing on the earth
  alternatives:
  - being manifested on the earth
  - appearing upon the earth
  lexicon: BDAG
  rationale: This participial phrase is rendered straightforwardly without softening its force. 'Appearing on the earth' preserves the epiphanic sense.
- source_word: σώζων ἐν αὐτῷ τὸν Ἀδάμ
  chosen: save Adam in him
  alternatives:
  - save Adam through him
  - save humankind in him
  lexicon: BDAG
  rationale: The Greek is difficult. I retain 'Adam' rather than interpretively broadening to 'humankind,' and keep 'in him' in the main text to reflect the wording while noting the ambiguity in a footnote.
- source_word: πνεύματα τῆς πλάνης
  chosen: spirits of deceit
  alternatives:
  - spirits of error
  - deceptive spirits
  lexicon: BDAG
  rationale: πλάνη can denote error or deception. In this moral-apocalyptic context 'spirits of deceit' best conveys active misleading power.
- source_word: εἰς καταπάτησιν
  chosen: to be trampled down
  alternatives:
  - for trampling
  - underfoot
  lexicon: LSJ
  rationale: The phrase expresses subjugation. The infinitival English phrase makes the sense clear while preserving the violent imagery.
- source_word: βασιλεύσουσιν
  chosen: will rule over
  alternatives:
  - will reign over
  lexicon: BDAG
  rationale: '''Rule over'' is slightly more idiomatic in modern English while preserving dominion language.'
- source_word: ἀναστησόμαι
  chosen: will arise
  alternatives:
  - will be raised
  - will stand up
  lexicon: BDAG
  rationale: The verb can suggest resurrection here. 'Will arise' preserves the ambiguity between rising and being raised, fitting the testament's eschatological tone.
- source_word: εὐφροσύνῃ
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: BDAG
  rationale: '''Gladness'' fits the elevated register and pairs well with Simeon''s future blessing of the Most High.'
- source_word: θαυμασίοις
  chosen: wonders
  alternatives:
  - marvels
  - wonderful deeds
  lexicon: BDAG
  rationale: A concise rendering that preserves doxological force.
