translation:
  language: es
  text: ¡Oh, Dios[a], líbrame; Yahvé, date prisa en ayudarme!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: el nombre divino es «Yahvé» (יְהוָה), no el sustituto tradicional «SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh, Dios!
  - Dios mío
  lexicon: HALOT
  rationale: En vocativo poético, el hebreo invoca directamente a Dios. En español, el vocativo queda bien sin interjección añadida, y «Dios» conserva la dirección de la súplica sin sobrecargar el estilo.
- source_word: לְהַצִּילֵנִי
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - sálvame
  - rescátame
  lexicon: HALOT
  rationale: El hifil de נצל expresa causar liberación o rescate. «Líbrame» es natural en español devocional y mantiene la idea de ser puesto fuera del peligro, sin restringirla a salvación final.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé,
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título. En vocativo, la coma marca la apelación directa.
- source_word: לְעֶזְרָתִי
  english_pob_choice: to help me
  chosen_spanish: en ayudarme
  alternatives_spanish:
  - para ayudarme
  - a ayudarme
  lexicon: HALOT
  rationale: La lamed de propósito/movimiento hacia asistencia se vierte de manera idiomática como «en ayudarme» dentro de la construcción «date prisa en». Así se conserva la dirección hacia el acto de ayuda sin sonar forzado.
- source_word: חוּשָׁה
  english_pob_choice: hurry
  chosen_spanish: date prisa
  alternatives_spanish:
  - apresúrate
  - date prisa
  lexicon: HALOT
  rationale: El imperativo expresa urgencia. «Date prisa» es claro, natural y mantiene el tono suplicante del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrammaton directamente. En español, el proyecto usa «Yahvé» para preservar el nombre propio del pacto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el contexto inglés; la solución española sigue directamente el sentido del hebreo y conserva la decisión auditada de traducir el Tetragrama con el nombre propio divino.
  spanish_consistency_notes:
  - Se mantuvo un registro vocativo breve y poético acorde con el hebreo.
  - «Líbrame» evita la restricción semántica de una salvación exclusivamente soteriológica.
  - «Yahvé» se usa de forma consistente con la terminología proyectada para יְהוָה.
