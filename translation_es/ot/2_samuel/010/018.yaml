base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/010/018.yaml
  text: Aram fled from before Israel[a], and David killed seven hundred charioteers and forty thousand horsemen from Aram. He also struck down Shobach, the commander of their army[b], and he died there.
  footnotes:
  - marker: a
    text: Hebrew 'seven hundred chariot/chariotry.' The exact referent may be the chariot force, hence 'charioteers.' 1 Chronicles 19:18 has 'seven thousand chariots.'
    reason: textual_variant
  - marker: b
    text: Or 'the commander of his army.' The Hebrew suffix is singular.
    reason: lexical_alternative
