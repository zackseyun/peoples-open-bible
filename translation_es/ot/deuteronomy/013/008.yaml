translation:
  language: es
  text: de los dioses de los pueblos que están alrededor de ti[a], ya sean cercanos a ti o lejanos de ti, desde un extremo de la tierra hasta el otro extremo de la tierra—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde un extremo de la tierra hasta el otro extremo de la tierra». El hebreo אֶרֶץ puede significar «tierra» o «país/territorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֱלֹהֵי
  english_pob_choice: from the gods of
  chosen_spanish: de los dioses de
  alternatives_spanish:
  - de entre los dioses de
  lexicon: HALOT
  rationale: 'La preposición מִן aquí expresa procedencia/origen: la tentación proviene de los dioses pertenecientes a los pueblos circundantes. «De los dioses de» conserva esa relación de pertenencia sin añadir una idea más fuerte que el hebreo no exige.'
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: עַמִּים tiene sentido étnico-colectivo plural. En español, «pueblos» preserva mejor ese matiz que «naciones», que puede sonar más político o estatal.
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  english_pob_choice: that are around you
  chosen_spanish: que están alrededor de ti
  alternatives_spanish:
  - que te rodean
  - que están en derredor de ti
  lexicon: HALOT
  rationale: La cláusula relativa modifica a «los pueblos» y expresa ubicación espacial. «Alrededor de ti» es natural en español moderno y mantiene el valor locativo de סְבִיבוֹת.
- source_word: הַקְּרֹבִים אֵלֶיךָ
  english_pob_choice: near to you
  chosen_spanish: cercanos a ti
  alternatives_spanish:
  - cerca de ti
  - próximos a ti
  lexicon: HALOT
  rationale: קָרוֹב indica proximidad. «Cercanos a ti» conserva la comparación con «lejanos» en la segunda mitad y suena idiomático en español.
- source_word: הָרְחֹקִים מִמֶּךָּ
  english_pob_choice: far from you
  chosen_spanish: lejanos de ti
  alternatives_spanish:
  - distantes de ti
  - muy alejados de ti
  lexicon: HALOT
  rationale: רָחוֹק expresa distancia. «Lejanos de ti» empareja de manera clara con «cercanos a ti» y mantiene el paralelismo del texto.
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  english_pob_choice: from one end of the earth to the other end of the earth
  chosen_spanish: desde un extremo de la tierra hasta el otro extremo de la tierra
  alternatives_spanish:
  - desde un extremo de la tierra al otro
  - de un cabo de la tierra al otro cabo de la tierra
  lexicon: HALOT
  rationale: El hebreo usa un modismo de extensión total. «Extremo» reproduce bien קצה y el paralelismo de «desde... hasta...». Se mantiene «tierra» siguiendo la lectura amplia del POB en inglés, sin restringirla a «tierra» como solo territorio local.
theological_decisions:
- issue: Alcance de הָאָרֶץ en el modismo final
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: 'El contexto formula una amplitud máxima: no solo un área local, sino cualquier límite imaginable. «Tierra» conserva esa amplitud en español y no reduce el alcance a la tierra de Israel.'
  doctrine_reference: Deuteronomio 13:8; uso semántico de אֶרֶץ
- issue: Referencia de los «dioses» a objetos de adoración ajenos a Yahvé
  english_pob_reading: the gods of the peoples
  chosen_spanish_reading: los dioses de los pueblos
  alternative_spanish_readings:
  - los dioses de las naciones
  rationale: Se mantiene el plural concreto del hebreo sin suavizarlo a una expresión genérica. El texto contrasta a Yahvé con divinidades de otros pueblos, y la traducción debe conservar esa tensión lexical y teológica.
  doctrine_reference: Deuteronomio 13:8; monoteísmo yahvista
translation_notes:
  revision_awareness: La versión inglesa POB y su auditoría presentan alta concordancia y no registran revisiones aplicadas. La traducción española sigue esa lectura estable, manteniendo el paralelismo del hebreo y la opción amplia «tierra» en el modismo final.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología base del proyecto cuando el versículo no contiene el nombre divino directamente.
  - Se traduce עַמִּים como «pueblos» para mantener el matiz étnico plural frente a «naciones».
  - Se evita suavizar «dioses» en formas que borren el contraste explícito del texto hebreo.
  - 'El paralelismo cercano/lejos se mantiene con una pareja léxica equivalente: «cercanos/lejanos».'
