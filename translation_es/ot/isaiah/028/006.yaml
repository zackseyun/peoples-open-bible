translation:
  language: es
  text: y un espíritu de justicia para el que se sienta para juzgar[a][b], y fortaleza para los que hacen retroceder la batalla en la puerta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de juicio».
    reason: lexical_alternative
  - marker: b
    text: O «para el que se sienta en juicio» o «en el tribunal».
    reason: lexical_alternative
  - marker: c
    text: O «para los que repelen la batalla/la guerra en la puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְרוּחַ
  english_pob_choice: and a spirit
  chosen_spanish: y un espíritu
  alternatives_spanish:
  - y para un espíritu
  - y espíritu
  lexicon: HALOT
  rationale: La construcción preposicional continúa la serie de dones/promesas del contexto inmediato. En español, «y un espíritu» conserva la lectura predicativa natural sin imponer una paráfrasis más amplia.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: Aquí el sustantivo califica al «espíritu»; «justicia» comunica mejor la cualidad gobernante o recta del don. «Juicio» queda como alternativa porque el campo semántico incluye la decisión judicial.
- source_word: לַיֹּשֵׁב
  english_pob_choice: to the one who sits
  chosen_spanish: para el que se sienta
  alternatives_spanish:
  - para el que está sentado
  - al que se sienta
  lexicon: HALOT
  rationale: El participio singular se vierte de manera natural en español sin perder el valor de sujeto definido. «Para el que se sienta» mantiene el carácter funcional de la frase y su relación con el cargo judicial.
- source_word: עַל הַמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - sobre el juicio
  - en la silla del juicio
  - en el tribunal
  lexicon: HALOT
  rationale: La opción española debe reflejar la función judicial sin forzar una imagen específica que el hebreo no exige de manera exclusiva. «En juicio» es breve y suficientemente amplio; puede abarcar la actividad de juzgar.
- source_word: וְלִגְבוּרָה
  english_pob_choice: and strength
  chosen_spanish: y fortaleza
  alternatives_spanish:
  - y fuerza
  - y valor
  lexicon: HALOT
  rationale: «Fortaleza» en español conserva el paralelo con el don anterior y puede abarcar tanto fuerza como vigor/mayor capacidad resistente. «Valor» sería más restrictivo al ámbito militar.
- source_word: מְשִׁיבֵי
  english_pob_choice: to those who turn back
  chosen_spanish: para los que rechazan
  alternatives_spanish:
  - para los que hacen retroceder
  - para los que repelen
  - para los que hacen volver
  lexicon: HALOT
  rationale: El verbo causativo de שוב puede expresar hacer retroceder o repeler. «Rechazan» captura en español la idea de hacer retroceder al enemigo/batalla en un contexto militar, aunque se mantiene la alternativa más literal en el léxico.
- source_word: מִלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En este contexto concreto, «batalla» es más exacto y natural que «guerra», porque el pasaje describe un enfrentamiento localizado.
- source_word: שַׁעְרָה
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - a la puerta
  - junto a la puerta
  - en la entrada
  lexicon: HALOT
  rationale: El término designa la zona de la puerta/portal como lugar del conflicto. «Puerta» reproduce el hebreo de forma clara y es comprensible en español bíblico; «en la puerta» preserva la localización del combate.
theological_decisions:
- issue: ¿El verso presenta un don dado por Yahvé o solo una cualidad abstracta?
  english_pob_reading: 'The verse continues the description of what the LORD will be/provide for his people: a spirit of justice and strength.'
  chosen_spanish_reading: 'El verso continúa describiendo lo que Yahvé será o proveerá para su pueblo: un espíritu de justicia y fortaleza.'
  alternative_spanish_readings:
  - Solo describe cualidades abstractas sin sujeto explícito.
  - Presenta dones independientes sin retomar a Yahvé como sujeto implícito.
  rationale: El hebreo mantiene la dependencia sintáctica del contexto anterior; la traducción española debe conservar esa continuidad sin añadir un sujeto nuevo. La formulación evita sobreespecificar, pero deja claro que se trata de provisión divina en continuidad con el versículo previo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de מִשְׁפָּט en el sintagma final
  english_pob_reading: justice / judgment
  chosen_spanish_reading: justicia / juicio
  alternative_spanish_readings:
  - solo justicia
  - solo juicio
  rationale: El español obliga a escoger una forma principal, pero la tensión semántica debe permanecer visible. «Justicia» funciona mejor para el primer miembro; «juicio» se conserva en el segundo como posibilidad interpretativa del cargo o función judicial.
  doctrine_reference: Lexical transparency principle
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el estado más reciente indica que no se necesitaron cambios y que la concordancia general fue alta. La redacción española, por tanto, sigue de cerca las decisiones auditadas sin introducir reajustes no documentados.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino según la convención del proyecto.
  - Se usa «espíritu» en minúscula porque no hay indicación de que se trate del Espíritu Santo.
  - «Batalla» se mantiene como término militar concreto y no se eleva a «guerra» en el texto principal.
  - Las notas preservan la ambigüedad entre «justicia» y «juicio» sin eliminar ninguna opción documentada.
  - «Puerta» refleja la localización del conflicto; no se sustituye por «portal» por ser menos transparente para el lector bíblico medio.
