base_translation:
  language: en
  yaml_path: translation/ot/amos/006/008.yaml
  text: 'The Lord GOD has sworn by himself—oracle of Yahweh[a], the God of Armies: I abhor the pride of Jacob, and I hate his citadels[c][b]; and I will hand over the city and all that fills it.'
  footnotes:
  - marker: a
    text: Or 'the majesty of Jacob.' The Hebrew word can denote either exalted majesty or arrogant pride; here the judgment context favors the negative sense.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the God of hosts.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his palaces.' The Hebrew term can refer to palatial strongholds.
    reason: lexical_alternative
