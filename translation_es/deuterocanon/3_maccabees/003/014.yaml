review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador reproduce bien la estructura y el sentido general del griego: campaña hacia Asia, conocimiento compartido del auditorio, alianza de los dioses en plural, y culminación pasiva de la campaña. Sin embargo, hay dos desajustes importantes con el expediente inglés y con la anchura semántica del griego: (1) la nota [a] está anclada en «Asia», pero su contenido explica ἀρρωστῷ y debería ir en «infalible»; (2) «como era de esperarse» debilita el matiz de κατὰ λόγον, que en este contexto se acerca más a «como correspondía» o «como era apropiado/fitting» que a mera expectativa.'
  spanish_quality_summary: El español es claro y digno, pero la oración gana naturalidad y precisión con «hacia Asia» en vez de «a Asia» y con «como correspondía» en vez de «como era de esperarse». Además, la colocación de la nota debe corregirse para que no genere confusión. «Infalible» es posible, pero en español puede sonar más abstracto o epistemológico; «inquebrantable» comunica mejor una alianza militar firme.
  glossary_alignment: No hay conflicto con los glosarios principales del proyecto. Se preserva correctamente «de los dioses» en discurso pagano. La elección «campaña» para ἐπιστρατείας y «alianza» para συμμαχίᾳ es adecuada. La mejora propuesta en ἀρρωστῷ a «inquebrantable» refleja mejor el valor de firme/no débil sin introducir la resonancia más especializada de «infalible».
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: En el texto español [a] aparece tras «Asia», pero la nota explica el adjetivo ἀρρωστῷ y la alternativa de «alianza invencible de los dioses». Esto rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: «Como era de esperarse» no refleja con suficiente precisión κατὰ λόγον.
    rationale: El griego apunta más a conveniencia, propiedad o correspondencia racional que a simple expectativa. «Como correspondía» conserva mejor el matiz evaluativo del original y del POB inglés («as was fitting»).
  - severity: medium
    issue: «Infalible» para ἀρρωστῷ es menos natural en este contexto militar.
    rationale: Aunque posible, en español «infalible» puede sugerir incapacidad de errar. Para una «alianza», «inquebrantable» o «invencible» encajan mejor con la idea de firmeza/no debilidad destacada en la nota léxica.
  revised_spanish_text: en cuanto a nuestra campaña hacia Asia, que ustedes mismos también conocen, la cual, por la alianza inquebrantable[a] de los dioses, fue llevada, como correspondía, hasta su conclusión[b],
