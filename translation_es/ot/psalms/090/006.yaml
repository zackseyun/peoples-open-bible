translation:
  language: es
  text: Por la mañana brota[a] y florece[b]; al atardecer se marchita[c] y se seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «florece» para «brota» (יָצִיץ); el hebreo puede enfatizar tanto la salida del brote como la floración.
    reason: lexical_alternative
  - marker: b
    text: O más literalmente, «y pasa» para «y florece» (וְחָלָף); la traducción elegida refleja el sentido probable dentro de la metáfora vegetal.
    reason: lexical_alternative
  - marker: c
    text: O «se corta» para «se marchita» (יְמוֹלֵל); el verbo hebreo puede denotar ser cortado o desvanecerse en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Por la mañana temprano
  lexicon: HALOT
  rationale: La expresión temporal marca el momento inicial del ciclo de la hierba. En español, «por la mañana» comunica de forma natural el contraste con «por la tarde» y conserva el valor temporal del hebreo.
- source_word: יָצִיץ
  english_pob_choice: it sprouts
  chosen_spanish: brota
  alternatives_spanish:
  - florece
  - germina
  - echa brotes
  lexicon: HALOT
  rationale: El hebreo puede referirse tanto a brotar como a florecer. En español, «brota» conserva la imagen de aparición viva y encaja con el paralelismo del ciclo vegetal sin forzar una lectura demasiado técnica.
- source_word: וְחָלָף
  english_pob_choice: and flourishes
  chosen_spanish: y florece
  alternatives_spanish:
  - y pasa
  - y se desvanece
  - y prospera
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «pasar» o «cambiar», el contexto de la metáfora vegetal favorece una idea de auge breve. «Florece» mantiene esa vitalidad contextual y evita una literalidad opaca en español.
- source_word: לָעֶרֶב
  english_pob_choice: by evening
  chosen_spanish: por la tarde
  alternatives_spanish:
  - al caer la tarde
  - al anochecer
  - en la tarde
  lexicon: HALOT
  rationale: «Por la tarde» expresa bien el contraste temporal con «por la mañana». También evita una secuencia demasiado rígida o regionalmente marcada.
- source_word: יְמוֹלֵל
  english_pob_choice: it withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se corta
  - se desvanece
  - se seca
  lexicon: HALOT
  rationale: El verbo puede sugerir marchitarse o ser cortado. En español, «se marchita» transmite la decadencia de la planta y deja abierta la tensión semántica documentada en el audit trail.
- source_word: וְיָבֵשׁ
  english_pob_choice: and dries up
  chosen_spanish: y se seca
  alternatives_spanish:
  - y se agosta
  - y se vuelve seco
  lexicon: HALOT
  rationale: «Se seca» es la forma natural y fiel para la etapa final de desecación de la hierba. Conserva el cierre del paralelismo sin agregar elementos ajenos al hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura de equivalencia óptima y no presenta revisiones sustantivas; la versión española conserva la misma decisión semántica general, incluyendo las tensiones léxicas documentadas en el hebreo para יָצִיץ, וְחָלָף y יְמוֹלֵל.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo temporal «Por la mañana... por la tarde...» para reflejar la progresión del hebreo.
  - Se evitó «SEÑOR» u otra terminología no pertinente; el versículo no contiene nombres divinos.
  - 'Se preservó la tensión lexical en notas: brotar/florecer, pasar/florecer, marchitarse/cortarse.'
