lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, el inglés POB eligió "came" para expresar la llegada de la revelación. En español, "vino a mí" reproduce de manera natural ese valor idiomático de recepción de la palabra sin volverlo rígido o literalista.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: Aquí דְבַר designa una comunicación divina. "La palabra" conserva el registro profético y sigue de cerca la elección auditada del POB en inglés, evitando una paráfrasis más interpretativa como "mensaje".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el nombre divino. En español, el proyecto requiere "Yahvé" como forma principal para יְהוָה, manteniendo el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición más sufijo indica dirección hacia el receptor de la revelación. "A mí" es la correspondencia española más directa y natural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso que sigue. "Diciendo" preserva esa función introductoria de manera fiel y en español idiomático.
theological_decisions:
- issue: Forma de renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'La decisión doctrinal del POB en inglés preserva el Tetragrámaton como nombre propio. En español se aplica la equivalencia establecida del proyecto: "Yahvé". Esto evita la sustitución litúrgica por un título y mantiene visible la referencia al nombre revelado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; el pasaje mantiene alta concordancia y no presenta variantes textuales o de sentido que exijan ajuste en español. La nota a conserva la alternativa literal del hebreo, paralela al aparato inglés.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma estable para יְהוָה.
  - Se usa "la palabra" en lugar de "mensaje" para conservar el registro profético.
  - La frase verbal "vino a mí" refleja la fórmula revelatoria sin caer en calco rígido.
  - La puntuación con coma final prepara la continuación del discurso, como en el inglés auditado.
