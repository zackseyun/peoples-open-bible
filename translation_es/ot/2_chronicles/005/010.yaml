translation:
  language: es
  text: No había nada en el arca, excepto las dos tablas[a] que Moisés puso allí en Horeb, donde Yahvé hizo un pacto con el pueblo de Israel[b] cuando salieron de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «las dos tablas que Moisés colocó en Horeb». El verbo hebreo es literalmente «dio», pero aquí se refiere a poner las tablas dentro del arca.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There was nothing
  chosen_spanish: No había nada
  alternatives_spanish:
  - No había
  - No existía nada
  lexicon: HALOT
  rationale: La negación existencial se expresa con naturalidad en español como 'No había nada', conservando la ausencia total indicada por el hebreo.
- source_word: בָּאָרוֹן
  english_pob_choice: in the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - dentro del arca
  - en el arca
  lexicon: HALOT
  rationale: La preposición ב con אָרוֹן se rinde de forma directa como 'en el arca'; 'dentro del arca' es posible, pero menos sobrio aquí.
- source_word: רַק
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - solo
  - sino
  lexicon: HALOT
  rationale: '''Excepto'' expresa con precisión la restricción del hebreo junto con la negación previa.'
- source_word: שְׁנֵי הַלֻּחוֹת
  english_pob_choice: the two tablets
  chosen_spanish: las dos tablas
  alternatives_spanish:
  - las dos tablas de piedra
  - las dos tablas
  lexicon: HALOT
  rationale: '''Tablas'' es el equivalente natural de לֻחוֹת. No se añade ''de piedra'' en el texto principal porque el hebreo de este versículo no lo explicita.'
- source_word: אֲשֶׁר נָתַן מֹשֶׁה
  english_pob_choice: that Moses put there
  chosen_spanish: que Moisés puso allí
  alternatives_spanish:
  - que Moisés colocó allí
  - que Moisés dio
  lexicon: HALOT
  rationale: Aunque נָתַן significa literalmente 'dar', aquí el contexto del arca exige la idea espacial de 'poner/colocar'. 'Puso allí' mantiene la equivalencia funcional sin volver opaca la escena.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - en Horeb
  lexicon: HALOT
  rationale: En español la localización con nombres propios de lugar se expresa naturalmente con 'en'. Se conserva Horeb sin armonizarlo con Sinaí.
- source_word: אֲשֶׁר כָּרַת יְהוָה עִם
  english_pob_choice: where Yahweh made a covenant with
  chosen_spanish: donde Yahvé hizo un pacto con
  alternatives_spanish:
  - donde Yahvé estableció un pacto con
  - donde Yahvé cortó un pacto con
  lexicon: HALOT
  rationale: El hebreo usa el idiomático כָּרַת בְּרִית. En español, 'hizo un pacto' transmite mejor la fórmula convencional sin perder el trasfondo pactal; 'cortó' sonaría demasiado literal e inusual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, evitando el sustituto 'SEÑOR'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Aquí se conserva más de cerca la expresión hebrea 'hijos de Israel', que el audit trail inglés ya había señalado como opción literal relevante.
- source_word: בְּצֵאתָם מִמִּצְרַיִם
  english_pob_choice: when they came out of Egypt
  chosen_spanish: cuando salieron de Egipto
  alternatives_spanish:
  - al salir de Egipto
  - cuando salieron de Egipto
  lexicon: HALOT
  rationale: La idea temporal del infinitivo constructo se vierte de modo natural como 'cuando salieron de Egipto', preservando la referencia al éxodo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide rendirlo como 'Yahvé' en español para mantener la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula de pacto כָּרַת ... עִם
  english_pob_reading: made a covenant with
  chosen_spanish_reading: hizo un pacto con
  alternative_spanish_readings:
  - estableció un pacto con
  - cortó un pacto con
  rationale: Aunque el hebreo subyace a la expresión 'cortar un pacto', en español bíblico actual 'hizo un pacto' comunica de manera fiel y comprensible la acción pactal sin introducir asperezas innecesarias.
  doctrine_reference: Hebrew covenant idiom / ברית
- issue: 'Identificación de los destinatarios: בְּנֵי יִשְׂרָאֵל'
  english_pob_reading: the people of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los hijos de Israel
  rationale: Se conserva la huella semítica de la expresión hebrea, que el inglés POB trató de manera más idiomática. En español esto sigue siendo claro y mantiene el paralelismo de la fuente.
  doctrine_reference: Hebrew collective designation
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios necesarios y el control cruzado reporta alta concordancia. Por eso se mantiene la estructura semántica del texto base, con ajustes mínimos de naturalidad en español y conservación de las dos notas léxicas relevantes del audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto.
  - Se preserva 'hijos de Israel' para reflejar la fórmula hebrea documentada.
  - '''Hizo un pacto'' evita una calca innecesaria de ''cortar'' sin perder el sentido pactal.'
  - Las notas a y b se anclan en palabras del texto para reflejar las alternativas documentadas.
