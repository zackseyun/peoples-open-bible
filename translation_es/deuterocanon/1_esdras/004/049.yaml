translation:
  language: es
  text: Y escribió a todos los judíos que subían del reino a Judea, acerca de la libertad[a], que ningún funcionario ni sátrapa ni toparca[b] ni administrador viniera[c] a sus puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por la libertad'; la frase griega ὑπὲρ τῆς ἐλευθερίας puede entenderse como el asunto del escrito o como una finalidad relacionada con la libertad.
    reason: alternative_reading
  - marker: b
    text: '''Toparca'' conserva el título administrativo griego; alternativamente, ''gobernante local'' o ''gobernador local''.'
    reason: cultural_note
  - marker: c
    text: La expresión griega puede sugerir no solo 'venir', sino también acercarse para imponer demandas o entrometerse en la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: he wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - envió por escrito
  - expidió por escrito
  lexicon: LSJ
  rationale: El verbo griego significa de forma directa 'escribió'. En español, 'escribió' mantiene la simplicidad del original y deja abierta la posibilidad administrativa sin añadir más de lo que dice el texto.
- source_word: τοῖς ἀναβαίνουσιν
  english_pob_choice: who were going up
  chosen_spanish: que subían
  alternatives_spanish:
  - que iban subiendo
  - que regresaban
  - que estaban subiendo
  lexicon: LSJ
  rationale: ἀναβαίνω significa literalmente 'subir'. 'Subían' conserva la imagen geográfica y cultual del ascenso a Judea sin forzar una paráfrasis como 'regresaban'.
- source_word: ἀπὸ τῆς βασιλείας
  english_pob_choice: from the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - de la realeza
  - del imperio
  - de la región
  lexicon: LSJ
  rationale: βασιλεία se traduce de manera directa como 'reino'. 'Imperio' sería más interpretativo que el griego, y 'reino' mantiene mejor la forma del original.
- source_word: ὑπὲρ τῆς ἐλευθερίας
  english_pob_choice: concerning freedom
  chosen_spanish: acerca de la libertad
  alternatives_spanish:
  - con respecto a la libertad
  - por la libertad
  - para la libertad
  lexicon: LSJ
  rationale: Aquí ὑπέρ introduce el asunto del escrito. 'Acerca de la libertad' conserva el tono administrativo del mandato y evita imponer una finalidad que el griego no exige.
- source_word: πάντα δυνατὸν
  english_pob_choice: every official
  chosen_spanish: ningún funcionario
  alternatives_spanish:
  - ninguna autoridad
  - ningún poderoso
  - todo funcionario
  lexicon: LSJ
  rationale: 'La frase es difícil y la tradición inglesa la entiende como una referencia general a autoridades/poderosos. En español, el contexto prohibitivo pide expresar la fuerza negativa de manera natural: ''ningún funcionario''. Se preserva la tensión semántica entre poder y cargo mediante el término ''funcionario'', sin convertir la expresión en un título técnico ajeno al contexto.'
- source_word: σατράπην
  english_pob_choice: satrap
  chosen_spanish: sátrapa
  alternatives_spanish:
  - gobernador provincial
  lexicon: LSJ
  rationale: Se conserva el título persa específico mediante transliteración. 'Gobernador provincial' explicaría, pero perdería la precisión histórica del cargo.
- source_word: τοπάρχην
  english_pob_choice: toparch
  chosen_spanish: toparca
  alternatives_spanish:
  - gobernante local
  - gobernador local
  - jefe de distrito
  lexicon: LSJ
  rationale: Se conserva el tecnicismo administrativo con transliteración al español. Así se mantiene la lista de cargos sin diluir el término en una explicación más larga.
- source_word: οἰκονόμον
  english_pob_choice: steward
  chosen_spanish: administrador
  alternatives_spanish:
  - mayordomo
  - encargado
  - administrador de casa
  lexicon: LSJ
  rationale: '''Administrador'' comunica bien la función de gestión en español contemporáneo y evita una asociación demasiado doméstica de ''mayordomo'' que podría estrechar indebidamente el sentido.'
- source_word: μὴ ἐπελεύσεσθαι ἐπὶ τὰς θύρας αὐτῶν
  english_pob_choice: should come to their doors
  chosen_spanish: viniera a sus puertas
  alternatives_spanish:
  - se acercara a sus puertas
  - irrumpiera en sus puertas
  - viniera contra sus puertas
  lexicon: LSJ
  rationale: El giro griego es idiomático y probablemente implica intrusión o presión en el hogar. 'Viniera a sus puertas' reproduce la imagen con naturalidad; el matiz hostil queda sugerido por el contexto de prohibición, sin añadir una interpretación demasiado específica.
theological_decisions:
- issue: Modo de traducir la cláusula prohibitiva con lista de cargos
  english_pob_reading: No official or satrap or toparch or steward should come to their doors.
  chosen_spanish_reading: que ningún funcionario ni sátrapa ni toparca ni administrador viniera a sus puertas.
  alternative_spanish_readings:
  - que no vinieran a sus puertas ningún funcionario, sátrapa, toparca ni administrador
  - que ningún funcionario, sátrapa, toparca ni administrador se acercara a sus puertas
  rationale: El griego presenta una prohibición dirigida a una serie de autoridades. En español, la construcción con 'ningún... ni... ni...' expresa con claridad la negación distribuida y evita la ambigüedad de una lectura colectiva. Mantiene el sentido administrativo del decreto sin añadir un matiz doctrinal inexistente.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que cambió la formulación de la prohibición para hacerla más natural y fiel al negativo griego. En español, eso se reflejó con 'ningún... ni... ni...' y con un verbo simple ('viniera') en lugar de una paráfrasis más pesada. También se mantuvo la lista de cargos con transliteraciones donde el original usa títulos técnicos.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo, por lo que no se requiere decisión sobre el nombre divino.
  - Se usó 'sátrapa' y 'toparca' como transliteraciones consistentes con la terminología administrativa del POB.
  - '''Administrador'' se eligió para οἰκονόμος por claridad contemporánea, sin perder la función de gestión.'
  - La cláusula final conserva la imagen de las puertas, como en el griego y en la auditoría inglesa.
