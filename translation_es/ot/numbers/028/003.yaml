review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo, la referencia a Yahvé, los dos corderos machos de un año y la naturaleza de holocausto diario. Sin embargo, se aparta del rastro léxico auditado en dos puntos significativos: הָאִשֶּׁה fue documentado en inglés como ‘food offering’ con alternativas ‘offering by fire / fire offering’, y el español ‘ofrenda encendida’ no refleja bien ninguna de esas opciones ni su sentido cultual establecido; además, תָמִיד aquí expresa la regularidad continua del rito diario, y ‘perpetuo’ puede sugerir duración eterna más que regularidad establecida.'
  spanish_quality_summary: El texto es generalmente claro, pero ‘Y dirás a ellos’ suena calco innecesario frente a ‘Y les dirás’, y ‘ofrenda encendida’ resulta poco idiomático y semánticamente impreciso en español bíblico. ‘Holocausto regular’ o ‘holocausto continuo’ suena más natural y más fiel que ‘holocausto perpetuo’ en este contexto. El resto del verso es legible y de registro adecuado.
  glossary_alignment: Alinea bien con la norma del proyecto al usar ‘Yahvé’. ‘Holocausto’ es una buena equivalencia para עֹלָה. La principal desalineación terminológica está en הָאִשֶּׁה, donde conviene una forma española trazable al audit trail, como ‘ofrenda de alimento’, preservando en nota las alternativas ‘ofrenda por fuego / de fuego’. También conviene ajustar תמיד a ‘regular’ para reflejar la decisión inglesa documentada.
  issues:
  - severity: medium
    issue: ‘Y dirás a ellos’ es un calco poco natural
    rationale: וְאָמַרְתָּ לָהֶם se expresa naturalmente en español como ‘Y les dirás’. El calco no mejora fidelidad y sí empeora la legibilidad.
  - severity: high
    issue: ‘ofrenda encendida’ no representa fielmente הָאִשֶּׁה según el audit trail
    rationale: La decisión inglesa principal fue ‘food offering’, con alternativas ‘offering by fire / fire offering’. ‘Ofrenda encendida’ no corresponde bien ni al sentido principal ni a las alternativas documentadas, y puede sonar improvisado en español.
  - severity: medium
    issue: ‘holocausto perpetuo’ sobretraduce תמיד
    rationale: En este contexto sacerdotal תמיד marca regularidad continua del rito, no necesariamente perpetuidad en sentido absoluto. ‘Regular’ refleja mejor la decisión documentada; ‘continuo’ sería otra opción válida.
  revised_spanish_text: 'Y les dirás[a]: «Esta es la ofrenda de alimento que presentarán a Yahvé: dos corderos machos de un año, sin defecto, cada día, como holocausto regular».

    '
  revised_footnotes:
