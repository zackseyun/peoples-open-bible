review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el griego en su secuencia narrativa y conserva el discurso directo del rey sin corregir la ironía teológica. «Y sucedió que», «al abrirse las puertas», «miró la mesa» y «Grande eres tú, Bel» reflejan adecuadamente καὶ ἐγένετο, ἅμα τῷ ἀνοῖξαι, ἐπιβλέψας, τὴν τράπεζαν y Μέγας εἶ. El único ajuste importante es ἐβόησεν φωνῇ μεγάλῃ, que pide una expresión más fuerte que «exclamó con voz fuerte».
  spanish_quality_summary: El español es claro y natural, pero «con voz fuerte» suena menos idiomático y menos preciso que «a gran voz» o «con fuerte voz / en alta voz». Además, «¡Grande eres tú, Bel!» es fiel, pero «¡Grande eres, Bel!» fluye mejor en español sin pérdida de énfasis. El resto del verso es legible y digno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Bel» está bien conservado como nombre propio. No aparecen términos sensibles del glosario principal. La decisión teológica de mantener la alabanza del rey como habla directa, sin aprobación narratorial, está correctamente preservada.
  issues:
  - severity: medium
    issue: «exclamó con voz fuerte» debilita y endurece innecesariamente ἐβόησεν φωνῇ μεγάλῃ
    rationale: El griego expresa un clamor fuerte o grito solemne. En español bíblico legible, «clamó a gran voz» o «gritó a gran voz» refleja mejor tanto el verbo como la frase instrumental explícita.
  - severity: low
    issue: «¡Grande eres tú, Bel!» suena algo marcado en español
    rationale: Es comprensible y fiel, pero «¡Grande eres, Bel!» conserva el tono elevado con mejor naturalidad en español general.
