revisions:
- from: La casa[a], cuando fue edificada, fue construida con piedra terminada, sacada de la cantera de antemano; y no se oyó martillo ni hacha ni herramienta[b] de hierro alguna en la casa mientras se la edificaba.
  to: La casa fue construida, al ser edificada, con piedra acabada, sacada de la cantera de antemano[a]; y no se oyó martillo ni hacha ni herramienta de hierro alguna en la casa mientras era edificada.
  rationale: Se reubica la nota al término correcto, se mejora la naturalidad de «piedra acabada» y de la cláusula temporal final, y se elimina una nota innecesaria para mantener fidelidad, claridad y disciplina de anotación del proyecto.
