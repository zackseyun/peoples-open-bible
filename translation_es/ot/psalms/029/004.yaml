lexical_decisions:
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: «קוֹל» suele significar «voz» o «sonido». Aquí conviene «voz» porque conserva la fuerza personal y activa del habla de Yahvé, en armonía con el paralelismo del versículo y con el uso repetido en el salmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se traduce con el nombre divino «Yahvé», que en español es la forma habitual del proyecto para preservar el nombre propio del pacto, en lugar de sustituirlo por un título.
- source_word: בַּכֹּחַ
  english_pob_choice: powerful
  chosen_spanish: poderosa
  alternatives_spanish:
  - con poder
  - en poder
  lexicon: HALOT
  rationale: El hebreo usa una construcción con ב + sustantivo que puede expresar medio o cualidad. En español, «poderosa» reproduce de forma natural el valor descriptivo que la revisión inglesa alcanzó con «powerful», sin perder la referencia a «poder».
- source_word: הָדָר
  english_pob_choice: majestic
  chosen_spanish: majestuosa
  alternatives_spanish:
  - espléndida
  - gloriosa
  lexicon: HALOT
  rationale: «הָדָר» denota majestad, esplendor o dignidad regia. «Majestuosa» preserva mejor el tono teofánico y el paralelismo con «poderosa» que opciones más generales como «gloriosa».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo presenta directamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre propio «Yahvé» para no ocultar el nombre del pacto mediante una sustitución titulística.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que prefirió construcciones adjetivales naturales («is powerful», «is majestic») frente a giros más literales como «with power / with majesty». El español adopta esa misma decisión de naturalidad controlada, manteniendo el paralelismo y la intensidad poética del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se traduce קוֹל como «voz» y no como «sonido» para conservar el carácter personal de la proclamación divina.
  - «Poderosa» y «majestuosa» respetan el paralelismo binario del hebreo y la revisión auditada del inglés.
  - No se introduce lenguaje eclesiástico tradicional innecesario; el registro busca ser claro, digno y publicable.
