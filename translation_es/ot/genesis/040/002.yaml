revisions:
- from: Yahvé se enojó contra sus dos oficiales[a], contra el jefe de los coperos y contra el jefe de los panaderos.
  to: Y Faraón se enojó contra sus dos oficiales[a], contra el jefe de los coperos y contra el jefe de los panaderos.
  rationale: La revisión corrige el error crítico del sujeto, restaurando 'Faraón' conforme al hebreo. Se conserva 'se enojó' por naturalidad narrativa y 'contra ... contra ... y contra' para reflejar la repetición de עַל en el original. También se ajusta la nota para que sea coherente con la elección principal 'oficiales' y preserve la alternativa léxica documentada 'eunucos'.
