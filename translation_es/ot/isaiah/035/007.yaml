translation:
  language: es
  text: El arenal ardiente se convertirá en un estanque[a], y la tierra sedienta en manantiales de agua; en la guarida de chacales[b], donde se echan, habrá hierba, cañas y juncos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el espejismo se convertirá en un estanque». שָׁרָב puede denotar calor abrasador o el aspecto centelleante del desierto.
    reason: lexical_alternative
  - marker: b
    text: O «en el paraje/morada de chacales, su lugar de descanso». La sintaxis hebrea de la cláusula final es comprimida y admite varias relaciones entre «chacales», «lugar de descanso» y la nueva vegetación.
    reason: lexical_alternative
  - marker: c
    text: «Juncos» también puede entenderse como «papiro» para גֹמֶא.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁרָב
  english_pob_choice: the burning sand
  chosen_spanish: el arenal ardiente
  alternatives_spanish:
  - la miraje
  - la tierra abrasada
  - el calor ardiente
  lexicon: HALOT
  rationale: שָׁרָב puede denotar calor abrasador o la apariencia deslumbrante del desierto. En español, «arenal ardiente» conserva la imagen concreta del paisaje y evita una abstracción excesiva; «miraje» quedaría demasiado interpretativo si se toma como pura ilusión óptica.
- source_word: לַאֲגַם
  english_pob_choice: a pool
  chosen_spanish: un estanque
  alternatives_spanish:
  - un charco
  - una laguna
  - un pantano
  lexicon: HALOT
  rationale: אֲגַם designa un cuerpo de agua como estanque o laguna. «Estanque» es natural en español y comunica bien la transformación sin precisar más de lo que exige el hebreo.
- source_word: צִמָּאוֹן
  english_pob_choice: the thirsty ground
  chosen_spanish: la tierra sedienta
  alternatives_spanish:
  - la tierra reseca
  - la tierra de sed
  - el terreno sediento
  lexicon: HALOT
  rationale: El sustantivo puede expresar sequedad o sed de la tierra misma. «La tierra sedienta» preserva la personificación del texto y el paralelo con el arenal ardiente.
- source_word: לְמַבּוּעֵי מָיִם
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - fuentes de agua
  - manaderos de agua
  - fuentes manantiales
  lexicon: HALOT
  rationale: מַבּוּעַ es un manantial o fuente. «Manantiales de agua» es idiomático y conserva la abundancia plural del constructo hebreo.
- source_word: בִּנְוֵה תַנִּים
  english_pob_choice: in the haunt of jackals
  chosen_spanish: en la guarida de chacales
  alternatives_spanish:
  - en el paraje de chacales
  - en la morada de chacales
  - en la morada de dragones
  lexicon: HALOT
  rationale: נָוֶה es un lugar de habitación o refugio; תַנִּים en contextos proféticos del desierto se entiende mejor como «chacales». «Guarida» comunica el carácter salvaje y desolado del lugar.
- source_word: רִבְצָהּ
  english_pob_choice: where they lie down
  chosen_spanish: donde se recuestan
  alternatives_spanish:
  - su lugar de descanso
  - donde se echan
  - su guarida
  lexicon: HALOT
  rationale: De רבץ, «echarse» o «recostarse». La forma verbal en español hace visible la imagen del hebreo y enlaza naturalmente con «chacales».
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - yerba
  - césped
  lexicon: HALOT
  rationale: חָצִיר suele significar hierba o forraje. «Hierba» es claro y general, y evita restringir demasiado el tipo de vegetación.
- source_word: לְקָנֶה וָגֹמֶא
  english_pob_choice: reeds, and rushes
  chosen_spanish: cañas y juncos
  alternatives_spanish:
  - cañas y papiro
  - reeds y rushes
  - cañas y totoras
  lexicon: HALOT
  rationale: קָנֶה es caña o junco alto; גֹמֶא puede ser junco o papiro. «Cañas y juncos» mantiene la secuencia vegetal del texto y funciona con naturalidad en español, sin cerrar indebidamente la referencia botánica.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que separa la lista final como «grass, reeds, and rushes» en vez de vincular «reeds and rushes» solo como acompañamiento de «grass». En español se reflejó esa secuencia con una enumeración directa: «hierba, cañas y juncos».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se eligió «Mesías/Cristo» no relevante aquí; no hay terminología cristológica en el versículo.
  - Se evitó «dragones» para תַנִּים por la decisión auditada del POB inglés de preferir «jackals/chacales» en contexto profético desértico.
  - 'La enumeración final respeta el orden del hebreo: vegetación básica primero, luego vegetación de humedal.'
