base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/002/014.yaml
  text: My dove[a], in the clefts of the rock, in the hiding place of the cliff, let me see your appearance; let me hear your voice, for your voice is sweet[b], and your appearance is lovely.
  footnotes:
  - marker: a
    text: Or 'in the secret place of the steep path' / 'in the shelter of the precipice'; the Hebrew word translated 'cliff' is rare and may refer to a steep rocky ascent or ledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'show me your face'; the Hebrew can refer more specifically to visible appearance or countenance.
    reason: lexical_alternative
