  source_alignment_summary: 'El borrador español refleja bien la estructura acusatoria del hebreo: sobornos para derramar sangre, toma de interés y ganancia, explotación del prójimo y olvido de Dios. También conserva adecuadamente la segunda persona femenina dirigida a la ciudad personificada. Sin embargo, la fórmula final אֲדֹנָי יְהוִה no queda bien representada como «Yahvé Dios»; en español eso invierte o difumina la relación título+nombre. Una forma más fiel y clara es «el Señor Yahvé», que preserva tanto אֲדֹנָי como יהוה sin enmascarar el nombre divino.'
  spanish_quality_summary: El español es generalmente claro y digno. «Dentro de ti» funciona, aunque «En ti» sería más directo; no es un error. «Interés y lucro» es legible, y la nota aclara bien la alternativa. El principal problema de naturalidad/precisión está en «declara Yahvé Dios», que suena poco idiomático y menos transparente que una fórmula española estable. El resto del verso es sólido.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יהוה aparece como «Yahvé», no como convención enmascaradora. No obstante, en la secuencia אֲדֹנָי יְהוִה conviene mantener el título separado del nombre: «el Señor Yahvé». Esto sigue la pauta del proyecto mejor que «Yahvé Dios» y evita una reconfiguración léxica no respaldada por el hebreo.'
  issues:
