translation:
  language: es
  text: Ahora, si ustedes muestran bondad y fidelidad[a] hacia mi señor, háganmelo saber; pero si no, háganmelo saber, para que me vuelva a la derecha o a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «amor leal y fidelidad». La pareja hebrea suele expresar una bondad leal y confiable dentro de una relación comprometida; también puede traducirse «misericordia y fidelidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca la transición inmediata del discurso del siervo; «Ahora» es natural en español y conserva el valor discursivo sin añadir énfasis innecesario.
- source_word: אִם יֶשְׁכֶם עֹשִׂים
  english_pob_choice: if you will show
  chosen_spanish: si ustedes hacen
  alternatives_spanish:
  - si ustedes van a hacer
  - si ustedes están haciendo
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con idea de disposición/acción futura. En español, «si ustedes hacen» mantiene la condición de manera directa y fiel al intercambio conversacional.
- source_word: חֶסֶד וֶאֱמֶת
  english_pob_choice: kindness and faithfulness
  chosen_spanish: misericordia y verdad
  alternatives_spanish:
  - bondad y fidelidad
  - amor leal y fidelidad
  - lealtad y confiabilidad
  lexicon: HALOT
  rationale: La pareja hebrea puede expresar bondad leal y confiable de pacto. «Misericordia y verdad» es una equivalencia bíblica bien arraigada en español y conserva la tensión entre benevolencia y fidelidad; se anota la alternativa semántica porque el campo puede ser también «amor leal y fidelidad».
- source_word: אֶת אֲדֹנִי
  english_pob_choice: to my master
  chosen_spanish: para con mi señor
  alternatives_spanish:
  - a mi señor
  - hacia mi señor
  lexicon: HALOT
  rationale: El objeto directo con el verbo de mostrar se expresa mejor en español con una preposición relacional. «Para con mi señor» comunica adecuadamente el trato hacia Abraham, sin perder el valor de relación y obligación.
- source_word: הַגִּידוּ לִי
  english_pob_choice: tell me
  chosen_spanish: háganmelo saber
  alternatives_spanish:
  - díganmelo
  - infórmenme
  lexicon: HALOT
  rationale: El imperativo pide una respuesta clara sobre la decisión. «Háganmelo saber» es formal, natural y conserva el carácter directo de la petición; además mantiene el paralelismo con la segunda cláusula.
- source_word: וְאִם לֹא
  english_pob_choice: but if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - o si no
  lexicon: HALOT
  rationale: El contraste está presente, pero en español la coordinación simple «y si no» fluye bien en el paralelismo del diálogo. La alternativa «pero si no» también sería válida; aquí se prioriza la continuidad sintáctica.
- source_word: וְאֶפְנֶה
  english_pob_choice: that I may turn
  chosen_spanish: para que me vuelva
  alternatives_spanish:
  - y me volveré
  - entonces me volveré
  lexicon: HALOT
  rationale: La forma cohortativa expresa acción consecuente/intencional. «Para que me vuelva» conserva el matiz de propósito o resultado y mantiene el registro formal del pasaje.
- source_word: עַל יָמִין אוֹ עַל שְׂמֹאל
  english_pob_choice: to the right or to the left
  chosen_spanish: a la derecha o a la izquierda
  alternatives_spanish:
  - a diestra o a siniestra
  - a un lado o al otro
  lexicon: HALOT
  rationale: Se preserva la imagen direccional literal, plenamente inteligible en español. «A la derecha o a la izquierda» reproduce el hebraísmo sin forzar un modismo menos natural.
theological_decisions:
- issue: חֶסֶד וֶאֱמֶת como cualidad relacional/covenantal
  english_pob_reading: The Hebrew pair often carries the sense of loyal, dependable covenantal kindness.
  chosen_spanish_reading: La pareja se entiende como benevolencia leal y confiable en el marco de la relación familiar y del pacto.
  alternative_spanish_readings:
  - misericordia y fidelidad
  - amor leal y verdad
  - bondad y fidelidad
  rationale: En este contexto el siervo no pide mera cortesía abstracta, sino una respuesta fiel y benigna hacia la casa de Abraham. «Misericordia y verdad» es una opción bíblica legítima en español, pero puede sonar algo más general; por eso se deja constancia de la alternativa conceptual de fidelidad leal.
  doctrine_reference: Lexical/theological note on covenantal loyalty; no distinct doctrinal dispute.
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés POB, que conserva el condicional directo («will show») y el cierre final con finalidad («that I may turn»). La versión española refleja esa estructura sin añadir explicaciones ajenas al texto y mantiene el paralelismo imperativo de «háganmelo saber» en ambas cláusulas.
  spanish_consistency_notes:
  - Se usó «mi señor» para אֲדֹנִי en el sentido relacional del contexto narrativo, no como título divino.
  - Se mantuvo la imagen espacial «a la derecha o a la izquierda» por ser transparente y fiel al hebreo.
  - 'No se tradujo mecánicamente desde el inglés: la sintaxis española se ajustó para sonar natural en un registro bíblico moderno.'
