review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del arameo: la fórmula narrativa «respondió y dijo», el imperfectivo de חָזֵה הֲוֵית, el marco «en mi visión ... de noche», el marcador vívido וַאֲרוּ, la lectura principal «los cuatro vientos del cielo» y la imagen de agitar «el gran mar». La nota sobre «espíritus» preserva correctamente la alternativa léxica de רוּחֵי.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero necesita un ajuste formal de notas: la marca [a] está anclada a «dijo», aunque la nota corresponde a «vientos». Además, «Yo estaba viendo» es aceptable, pero sin el pronombre inicial suena más natural en español sin perder el valor aspectual.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Vientos» con nota «espíritus» sigue fielmente la decisión léxico-teológica documentada. No aparecen términos sensibles como Yahvé, Mesías/Cristo, espíritu/Espíritu en contexto doctrinal que exijan otro ajuste.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota explica la ambigüedad de רוּחֵי («vientos/espíritus»), por lo que debe aparecer junto a «vientos», no junto a «dijo». El proyecto exige que cada nota esté anclada en la palabra o frase pertinente.
  - severity: low
    issue: «Yo estaba viendo» suena un poco más pesado de lo necesario.
    rationale: El aspecto progresivo puede conservarse con «estaba viendo» sin el pronombre explícito. En español neutro, omitir «yo» mejora la fluidez salvo que haya contraste enfático, que aquí no existe.
  revised_spanish_text: 'Daniel respondió y dijo: «Estaba viendo en mi visión de noche, y he aquí, los cuatro vientos[a] del cielo agitaban el gran mar».'
  revised_footnotes:
  - marker: a
    text: O «espíritus». La palabra aramea puede significar tanto «vientos» como «espíritus».
    reason: alternative_reading
  revision_rationale: Se reubicó la nota al término «vientos», que es donde pertenece la alternativa léxica documentada, y se suavizó ligeramente la redacción quitando el pronombre «Yo» para un español más natural sin alterar el sentido ni el aspecto verbal.
