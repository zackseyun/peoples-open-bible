  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos en este versículo. El borrador sigue adecuadamente las decisiones del POB: «Samaria», «abominaciones», «justas» en sentido comparativo, y evita introducir formulaciones doctrinalmente más fuertes que el contexto.'
