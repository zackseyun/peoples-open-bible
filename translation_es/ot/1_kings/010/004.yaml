translation:
  language: es
  text: Cuando la reina de Sabá vio toda la sabiduría de Salomón y la casa[a] que él había construido,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio que él había construido». El hebreo dice literalmente «casa», pero en este contexto real puede referirse a la residencia palaciega.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: El waw consecutivo introduce el avance narrativo; en español, «Cuando» funciona de modo natural para enlazar esta acción con la oración que continúa en el versículo siguiente, sin perder la secuencia del relato.
- source_word: מַלְכַּת שְׁבָא
  english_pob_choice: the queen of Sheba
  chosen_spanish: la reina de Sabá
  alternatives_spanish:
  - la Reina de Sabá
  lexicon: HALOT
  rationale: Es un sintagma constructo que identifica al gobernante de Sabá. «Reina» en minúscula sigue el valor descriptivo del título y mantiene un español natural y reverente.
- source_word: כָּל חָכְמַת שְׁלֹמֹה
  english_pob_choice: all the wisdom of Solomon
  chosen_spanish: toda la sabiduría de Salomón
  alternatives_spanish:
  - toda la sabiduría de Salomón
  - toda la sabiduría que tenía Salomón
  lexicon: HALOT
  rationale: כָּל expresa totalidad, y חָכְמָה aquí se traduce con el sustantivo usual «sabiduría». «Toda la sabiduría de Salomón» conserva la relación formal del hebreo y es natural en español.
- source_word: וְהַבַּיִת
  english_pob_choice: and the house
  chosen_spanish: y la casa
  alternatives_spanish:
  - y el palacio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». Aunque en este contexto real puede aludir al palacio, la traducción principal conserva la forma más transparente; la alternativa contextual queda indicada en la nota.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he had built
  chosen_spanish: que él había construido
  alternatives_spanish:
  - que construyó
  - que él construyó
  lexicon: HALOT
  rationale: La cláusula relativa describe una obra ya terminada en el momento de la observación de la reina; el pluscuamperfecto español comunica bien esa anterioridad y mantiene el sentido narrativo.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la fuente hebrea (WLC) y con el audit trail en inglés; no se registran revisiones textuales o decisiones alternativas fuera de la nota léxica sobre בַּיִת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se conserva la puntuación abierta con coma final para reflejar que la oración continúa en el versículo siguiente, siguiendo el flujo sintáctico del hebreo y del inglés auditado.
  - Se evita «palacio» en el texto principal para no cerrar la ambigüedad del hebreo; la nota preserva la alternativa contextual.
