translation:
  language: es
  text: Y contigo está la sabiduría[a], que conoce tus obras, y estuvo presente cuando hacías el mundo, y entiende lo que es agradable ante tus ojos y lo que es recto según tus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el cosmos'. El griego κόσμος puede enfatizar el mundo ordenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ σοῦ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con tú
  - junto a ti
  - en tu presencia
  lexicon: LSJ
  rationale: La expresión indica acompañamiento o asociación cercana. 'Contigo' es el equivalente natural en español y conserva la relación personal sin añadir matices espaciales no explícitos.
- source_word: ἡ σοφία
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  - la sabiduría personificada
  lexicon: LSJ
  rationale: '''Sabiduría'' mantiene el sustantivo común y permite conservar la personificación mediante las cláusulas relativas, sin imponer una mayúscula doctrinal que el griego no exige.'
- source_word: ἡ εἰδυῖα
  english_pob_choice: who knows
  chosen_spanish: que conoce
  alternatives_spanish:
  - que sabe
  - conocedora de
  lexicon: LSJ
  rationale: El participio femenino caracteriza a la sabiduría. 'Que conoce' conserva el valor atributivo y suena natural en español, manteniendo el matiz de conocimiento activo.
- source_word: τὰ ἔργα σου
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - lo que has hecho
  lexicon: LSJ
  rationale: '''Obras'' reproduce el alcance amplio de ἔργα y encaja bien en un registro bíblico sin reducirlo a ''hechos'' morales בלבד.'
- source_word: παροῦσα
  english_pob_choice: was present
  chosen_spanish: estaba presente
  alternatives_spanish:
  - presente estaba
  - se hallaba presente
  - acompañaba
  lexicon: LSJ
  rationale: El participio expresa presencia en la acción creadora. 'Estaba presente' es idiomático y fiel, sin introducir la imagen más fuerte de 'estar al lado' o 'acompañar'.
- source_word: ὅτε ἐποίεις τὸν κόσμον
  english_pob_choice: when you made the world
  chosen_spanish: cuando hiciste el mundo
  alternatives_spanish:
  - cuando creabas el mundo
  - cuando formabas el mundo
  - cuando hiciste el cosmos
  lexicon: LSJ
  rationale: '''Mundo'' es el equivalente más natural de κόσμος en este contexto. ''Hiciste'' refleja ἐποίεις con un pasado descriptivo aceptable en español bíblico y evita sobrecargar el verbo con una fórmula técnica de creación.'
- source_word: ἐπισταμένη
  english_pob_choice: who understands
  chosen_spanish: y entiende
  alternatives_spanish:
  - y comprende
  - y sabe discernir
  - y está versada en
  lexicon: LSJ
  rationale: Tras 'que conoce', repetir 'que entiende' haría el español más pesado. La coordinación con 'y entiende' conserva el sentido de competencia y discernimiento del participio.
- source_word: τί ἀρεστὸν ἐν ὀφθαλμοῖς σου
  english_pob_choice: what is pleasing in your eyes
  chosen_spanish: lo que es agradable a tus ojos
  alternatives_spanish:
  - lo que es grato a tus ojos
  - lo que te agrada
  - lo que es aceptable ante ti
  lexicon: LSJ
  rationale: Se conserva el giro semítico 'a tus ojos', que el español entiende bien y que preserva la perspectiva evaluativa de Dios. 'Agradable' refleja ἀρεστόν de forma clara y sobria.
- source_word: τί εὐθὲς ἐν ἐντολαῖς σου
  english_pob_choice: what is right according to your commandments
  chosen_spanish: y lo que es recto según tus mandamientos
  alternatives_spanish:
  - y lo que es derecho en tus mandamientos
  - y lo que es justo según tus mandamientos
  - y lo que es recto en tus mandamientos
  lexicon: LSJ
  rationale: εὐθές literalmente apunta a lo recto/rectilíneo, y en contexto ético 'recto' es la mejor equivalencia. 'Según tus mandamientos' expresa el ámbito normativo indicado por ἐν.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Retain personal relative clauses while keeping 'wisdom' as an abstract-personified figure.
  chosen_spanish_reading: Conservar una frase nominal común ('la sabiduría') y describirla con relativas personales implícitas en 'que conoce' y 'estaba presente'.
  alternative_spanish_readings:
  - '''Sabiduría'' con mayúscula'
  - '''la sabiduría, la que conoce...'''
  rationale: El griego personifica claramente a σοφία, pero no obliga a una mayúscula en español. La redacción mantiene la tensión entre abstracción y personificación sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión literaria y teológica del texto fuente; primacía del original sobre la tradición tipográfica.
- issue: κόσμος
  english_pob_reading: world
  chosen_spanish_reading: mundo
  alternative_spanish_readings:
  - cosmos
  - universo
  rationale: '''Mundo'' es más natural y suficientemente amplio en español. ''Cosmos'' sería más técnico y ''universo'' demasiado moderno para el matiz del griego en este contexto.'
  doctrine_reference: Legibilidad reverente sin tecnicismos innecesarios.
translation_notes:
  revision_awareness: El inglés auditado eliminó una repetición innecesaria de 'who' antes de 'understands' para mayor fluidez. En español se refleja esa misma fluidez con la coordinación simple 'y entiende', sin perder el paralelismo del original griego.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' en minúscula como sustantivo personificado, coherente con el tratamiento POB de la personificación sin capitalización doctrinal.
  - Se conserva 'mundo' para κόσμος y se ofrece 'cosmos' en nota como alternativa lexical, alineado con el audit trail inglés.
  - Se usa 'mandamientos' para ἐντολαῖς, en continuidad con el registro bíblico y sin sustituirlo por 'leyes' o 'preceptos' sin necesidad textual.
