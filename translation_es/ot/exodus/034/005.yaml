review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal y la sintaxis principal del hebreo: Yahvé desciende, está con Moisés allí, y proclama. Conserva correctamente «Yahvé» para יְהוָה y «proclamó el nombre de Yahvé» como lectura principal, en línea con el audit trail inglés. Sin embargo, «se detuvo» debilita el sentido de וַיִּתְיַצֵּב, que aquí expresa más bien «se puso allí / se mantuvo de pie / se colocó», no simplemente cesar movimiento.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse para mayor precisión y naturalidad bíblica. «Se puso allí con él» o «estuvo allí con él» representa mejor la escena que «se detuvo allí con él». La nota al pie actual contiene un anglicismo crudo («en/by») impropio del texto español; conviene expresarlo como «en/por» y añadir la alternativa inglesa auditada omitida: «llamó/invocó el nombre de Yahvé».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», conservación de «nombre de Yahvé», y tono general adecuado. El único ajuste léxico relevante es וַיִּתְיַצֵּב, donde «se detuvo» no corresponde tan bien como «se puso allí» al valor de tomar posición/estar de pie.'
  issues:
  - severity: medium
    issue: «se detuvo» para וַיִּתְיַצֵּב
    rationale: El hitpael de יצב indica tomar posición, ponerse, presentarse o mantenerse de pie. «Se detuvo» sugiere solo detener el movimiento y pierde la imagen estática de presencia junto a Moisés.
  - severity: medium
    issue: Nota al pie con formulación poco idiomática y alternativa incompleta
    rationale: «en/by» no es español natural. Además, el audit trail inglés preserva también la alternativa «called on the name of the LORD», que conviene reflejar en español como «llamó/invocó el nombre de Yahvé».
  revised_spanish_text: Yahvé descendió en la nube y se puso allí con él[a], y proclamó el nombre de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «y llamó el nombre de Yahvé», «y proclamó en el nombre de Yahvé» o «y proclamó por el nombre de Yahvé». La frase hebrea incluye literalmente la preposición «en/por» con «nombre».'
    reason: lexical_alternative
