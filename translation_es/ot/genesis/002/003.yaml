    text: Or 'sanctified it' or 'set it apart as holy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'rested'; the verb can also mean 'ceased.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'that God had created to do.' The final phrase is difficult; some understand it as 'that God created and made' or 'that God had created by making.'
    reason: alternative_reading
  - marker: d
    text: Or 'that God had created to do'.
    reason: previous_rendering
