translation:
  language: es
  text: 'Pero Zorobabel, Jesúa y el resto de los jefes de las casas paternas de Israel les dijeron: «No es para ustedes ni para nosotros construir una casa[b] para nuestro Dios; sino que nosotros solos[a] la construiremos para Yahvé, el Dios de Israel, tal como nos mandó el rey Ciro, rey de Persia»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque nosotros juntos construiremos»; aquí «solos» expresa en contexto que ellos mismos, sin los socios ofrecidos, serían quienes harían la obra.'
    reason: lexical_alternative
  - marker: b
    text: «Una casa» se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: les dijeron
  alternatives_spanish:
  - dijeron
  - respondieron
  - hablaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se vierte naturalmente con el pasado simple plural en español. ‘Les dijeron’ mantiene el valor discursivo y la referencia a los interlocutores sin forzar una paráfrasis.
- source_word: זְרֻבָּבֶל וְיֵשׁוּעַ
  english_pob_choice: Zerubbabel, Jeshua
  chosen_spanish: Zorobabel, Jesúa
  alternatives_spanish:
  - Zerubbabel, Jeshua
  - Zorobabel, Josué
  lexicon: HALOT
  rationale: Se conservan los nombres propios en forma castellanizada y reconocible. ‘Jesúa’ refleja mejor la forma hebrea יֵשׁוּעַ en este contexto que ‘Josué’, que en español suele asociarse con otra tradición nominal.
- source_word: וּשְׁאָר רָאשֵׁי הָאָבוֹת לְיִשְׂרָאֵל
  english_pob_choice: and the rest of the heads of the fathers’ houses of Israel
  chosen_spanish: el resto de los jefes de las casas paternas de Israel
  alternatives_spanish:
  - los demás jefes de las casas paternas de Israel
  - el resto de los jefes de familia de Israel
  lexicon: HALOT
  rationale: ‘Casas paternas’ preserva la estructura social del hebreo רָאשֵׁי הָאָבוֹת sin reducirla a un término más genérico. Se mantiene el valor de liderazgo y linaje.
- source_word: לֹא לָכֶם וָלָנוּ
  english_pob_choice: It is not for you and for us
  chosen_spanish: No es para ustedes ni para nosotros
  alternatives_spanish:
  - No tienen parte con nosotros
  - No les corresponde a ustedes ni a nosotros
  lexicon: HALOT
  rationale: La traducción refleja de modo cercano la construcción hebrea y la revisión inglesa, evitando una formulación demasiado idiomática que borraría la tensión de exclusión compartida.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: construir una casa
  alternatives_spanish:
  - edificar una casa
  - construir el templo
  lexicon: HALOT
  rationale: ‘Construir una casa’ conserva el lenguaje literal del hebreo. Aunque el contexto refiere al templo, la POB inglesa preserva ‘house’; en español se mantiene esa transparencia.
- source_word: בַּיִת לֵאלֹהֵינוּ
  english_pob_choice: a house for our God
  chosen_spanish: una casa para nuestro Dios
  alternatives_spanish:
  - la casa de nuestro Dios
  - un templo para nuestro Dios
  lexicon: HALOT
  rationale: Se conserva ‘casa’ para no sustituir el término base por ‘templo’, que es interpretativo. ‘Nuestro Dios’ refleja el posesivo del original.
- source_word: כִּי אֲנַחְנוּ יַחַד
  english_pob_choice: for we alone
  chosen_spanish: pero nosotros solos
  alternatives_spanish:
  - porque nosotros juntos
  - pues nosotros en conjunto
  lexicon: HALOT
  rationale: יַחַד literalmente significa ‘juntos’, pero en este contraste funciona como exclusión de los solicitantes, no como simple cooperación. ‘Nosotros solos’ transmite esa fuerza, siguiendo la decisión auditada en inglés.
- source_word: נִבְנֶה
  english_pob_choice: will build it
  chosen_spanish: la construiremos
  alternatives_spanish:
  - construiremos
  - la edificaremos
  lexicon: HALOT
  rationale: El imperfecto en contexto expresa intención/futuro. El objeto femenino se sobreentiende por ‘casa’; ‘la construiremos’ lo hace explícito en español sin añadir contenido.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahweh
  - para el Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: ‘Yahvé’. Se evita ‘el Señor’ porque enmascara el nombre divino y no corresponde a la política terminológica indicada.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente. ‘El Dios de Israel’ mantiene la relación de pacto y pertenencia sin sobreexplicar.
- source_word: כַּאֲשֶׁר צִוָּנוּ
  english_pob_choice: just as ... commanded us
  chosen_spanish: tal como nos mandó
  alternatives_spanish:
  - tal como nos ordenó
  - según nos mandó
  lexicon: HALOT
  rationale: ‘Mandó’ reproduce bien el peso de צוה con una forma natural en español. ‘Tal como’ expresa conformidad con la orden recibida.
- source_word: הַמֶּלֶךְ כּוֹרֶשׁ מֶלֶךְ פָּרָס
  english_pob_choice: King Cyrus, the king of Persia
  chosen_spanish: el rey Ciro, rey de Persia
  alternatives_spanish:
  - Ciro, rey de Persia
  - el rey Ciro de Persia
  lexicon: HALOT
  rationale: Se conserva la doble titulación del hebreo con una sintaxis fluida en español. ‘Rey de Persia’ mantiene la apposición formal del original.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo la política terminológica del proyecto y la lectura inglesa auditada, se usa ‘Yahvé’ en lugar de una sustitución litúrgica como ‘el SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que afinó la primera cláusula hacia una correspondencia más literal con לֹא לָכֶם וָלָנוּ. En español se preserva esa tensión con «No es para ustedes ni para nosotros», y se mantiene el valor contrastivo de יַחַד con «nosotros solos».
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para יהוה conforme al estándar del proyecto.
  - Se conservó ‘casa’ en vez de ‘templo’ para reflejar el hebreo בַּיִת y la decisión auditada en inglés.
  - ‘Jesúa’ fue preferido sobre ‘Josué’ para reflejar mejor la forma hebrea del nombre en este versículo.
  - La cláusula de exclusión se mantuvo sin suavizarla para no borrar la tensión textual entre los grupos.
