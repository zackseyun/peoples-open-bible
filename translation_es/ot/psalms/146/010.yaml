translation:
  language: es
  text: Yahvé reinará para siempre; tu Dios, Sion, de generación en generación. ¡Aleluya![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¡Alabad a Yah!». La exclamación se conserva aquí con la forma litúrgica española «Aleluya».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְלֹךְ
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - reina
  - reinará como rey
  - será rey
  lexicon: HALOT
  rationale: El imperfecto qal expresa aquí una afirmación futura/de duración. En español, 'reinará' conserva bien el valor verbal y la declaración de soberanía continua sin forzar una perífrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en forma transparente y reconocible en español. 'Yahvé' es la forma estándar de transliteración usada en este proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos
  - para la eternidad
  lexicon: HALOT
  rationale: La expresión denota duración sin límite en un contexto de alabanza y reinado. 'Para siempre' es idiomático en español y comunica con naturalidad la permanencia.
- source_word: אֱלֹהַיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Diosa
  - tu divinidad
  lexicon: HALOT
  rationale: El sufijo femenino singular se mantiene en la relación posesiva dirigida a Sion personificada. 'Dios' conserva el referente al Dios de Israel; en español no hace falta marcar mayúscula por exigencia gramatical, aunque puede usarse por reverencia según estilo editorial.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se emplea la forma asentada en español bíblico y eclesial, 'Sion', más natural que la transliteración inglesa 'Zion' en una publicación española.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por todas las generaciones
  - generación tras generación
  lexicon: HALOT
  rationale: El modismo hebreo se reproduce con la equivalencia española convencional, que conserva la idea de continuidad sucesiva entre generaciones.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Hallelujah!
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Alabad a Yah!
  - ¡Aleluya, alabad a Yah!
  lexicon: HALOT
  rationale: Se preserva la forma litúrgica establecida en español. Aunque el trasfondo literal es '¡Alabad a Yah!', la exclamación '¡Aleluya!' es una equivalencia natural y fiel del hebreo en uso devocional.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La decisión del POB en inglés es transliterar el nombre divino; en español, 'Yahvé' mantiene esa transparencia y evita el sustituto tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Exclamación final הַלְלוּ יָהּ
  english_pob_reading: Hallelujah!
  chosen_spanish_reading: ¡Aleluya!
  alternative_spanish_readings:
  - ¡Alabad a Yah!
  - ¡Aleluya! (con nota explicativa)
  rationale: No hay disputa doctrinal, pero sí una tensión lexical entre la forma tradicional litúrgica y la transparencia etimológica. Se opta por la forma asentada en español, manteniendo la raíz hebrea en una nota para no perder el sentido literal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; transliterate names, but preserve meaning where appropriate'
translation_notes:
  revision_awareness: El texto revisa fielmente el hebreo y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se mantiene la diferencia entre el nombre divino (Yahvé) y la exclamación final (Aleluya), como en el original, y no se introducen glosas no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה según la terminología por defecto del proyecto.
  - Se usa 'Sion' como forma española establecida del topónimo bíblico.
  - Se mantiene la puntuación enfática con exclamación final.
  - La nota al pie está anclada al cierre '¡Aleluya!' para explicar la relación con '¡Alabad a Yah!' sin duplicar marcadores.
