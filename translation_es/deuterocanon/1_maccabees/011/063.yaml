translation:
  language: es
  text: Y Jonatán oyó que los comandantes de Demetrio habían llegado a Quedes en Galilea con una gran fuerza[a], con la intención de removerlo de su cargo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un gran ejército». El griego puede referirse de manera amplia a una fuerza militar numerosa, no necesariamente con un término técnico único.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró
  - escuchó
  lexicon: LSJ
  rationale: En este contexto narrativo, ἤκουσεν introduce información recibida por reporte. «Oyó» conserva la inmediatez narrativa sin volverla demasiado interpretativa; «se enteró» explicitaría más el carácter informativo, pero es menos directo.
- source_word: οἱ ἄρχοντες Δημητρίου
  english_pob_choice: Demetrius’s commanders
  chosen_spanish: los comandantes de Demetrio
  alternatives_spanish:
  - los oficiales de Demetrio
  - los líderes de Demetrio
  - los jefes de Demetrio
  lexicon: LSJ
  rationale: En el marco militar del versículo, ἄρχοντες se entiende mejor como mandos o comandantes, no como autoridades civiles. «Comandantes» mantiene la fuerza militar del contexto y el genitivo de pertenencia relacional.
- source_word: παρῆσαν
  english_pob_choice: had come
  chosen_spanish: habían llegado
  alternatives_spanish:
  - estaban presentes
  - habían venido
  lexicon: LSJ
  rationale: El verbo señala presencia como resultado de una llegada previa. «Habían llegado» reproduce bien ese estado resultante y suena natural en español.
- source_word: Κῆδες τὴν ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: Kedesh in Galilee
  chosen_spanish: Cedes de Galilea
  alternatives_spanish:
  - Cedes, la de Galilea
  - Cades de Galilea
  lexicon: LSJ
  rationale: La construcción identificatoria del griego distingue este lugar por su ubicación. Se usa «Cedes» como forma española transliterada del topónimo, con «de Galilea» para preservar la función identificadora. «Cades» es posible, pero «Cedes» mantiene una adaptación gráfica clara y cercana al nombre bíblico.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a large force
  chosen_spanish: con mucha tropa
  alternatives_spanish:
  - con una gran fuerza
  - con un gran ejército
  - con muchos soldados
  lexicon: LSJ
  rationale: δώναμις en contexto militar remite a fuerza armada. «Mucha tropa» expresa el carácter colectivo y militar sin forzar «ejército», que podría ser más específico de lo que el griego exige. «Fuerza» queda más abstracto en español.
- source_word: βουλόμενοι
  english_pob_choice: intending
  chosen_spanish: con la intención de
  alternatives_spanish:
  - queriendo
  - planeando
  - buscando
  lexicon: LSJ
  rationale: El participio expresa propósito. La construcción «con la intención de» conserva ese matiz final sin sonar mecánica.
- source_word: μεταστῆσαι αὐτὸν τῆς χρείας
  english_pob_choice: to remove him from office
  chosen_spanish: quitarlo de su cargo
  alternatives_spanish:
  - destituirlo de su cargo
  - removerlo de su puesto
  - apartarlo de su función
  lexicon: LSJ
  rationale: La frase puede denotar retirar a alguien de su función o cargo asignado. «Quitarlo de su cargo» comunica esa idea de manera neutral y comprensible en español, manteniendo la ambigüedad entre cargo, puesto y función sin sobredeterminarla.
translation_notes:
  revision_awareness: Se siguió la lectura revisada del audit trail inglés que omite «his» antes de «office», por lo que el español evita igualmente un posesivo explícito y usa la forma neutral «de su cargo» solo como equivalencia idiomática del complemento griego de función, no como añadido posesivo interpretativo. La referencia topográfica se mantuvo como identificación geográfica, y la frase final conserva la alternativa lexical documentada entre destitución y remoción de cargo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantuvo «cargo» para χρεία en consonancia con el sentido funcional/administrativo documentado en el audit trail inglés.
  - «Comandantes» se usó para ἄρχοντες por el contexto militar inmediato.
  - La topografía se adaptó con una forma española estable («Cedes») y no con una transliteración inglesa pura.
