translation:
  language: es
  text: Entonces el sacerdote tomará algo de la sangre[a] de la ofrenda por la culpa, y el sacerdote la pondrá sobre el lóbulo[b] de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la sangre de la ofrenda por la culpa»; el sentido es que el sacerdote toma parte de esa sangre para el rito.'
    reason: lexical_alternative
  - marker: b
    text: O «la punta de la oreja derecha».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּם
  english_pob_choice: some of the blood of
  chosen_spanish: algo de la sangre de
  alternatives_spanish:
  - de la sangre de
  - parte de la sangre de
  lexicon: HALOT
  rationale: El hebreo con מִן expresa origen/parte tomada de la sangre; en español, «algo de la sangre de» comunica con naturalidad el sentido partitivo sin sugerir que se toma toda la sangre.
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de restitución
  - la ofrenda por la culpa/culpabilidad
  lexicon: HALOT
  rationale: En contexto levítico, אָשָׁם nombra una ofrenda sacrificial específica. «Ofrenda por la culpa» conserva el valor técnico y evita reemplazarlo por un término más eclesiástico o genérico.
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: the lobe of the ... ear
  chosen_spanish: el lóbulo de la oreja
  alternatives_spanish:
  - la punta de la oreja
  - la parte blanda de la oreja
  lexicon: HALOT
  rationale: תְּנוּךְ apunta a la parte extrema o blanda del oído en este rito. «Lóbulo» es la equivalencia anatómica más natural en español y sigue bien la decisión auditada en inglés.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que está siendo limpiado
  alternatives_spanish:
  - el que se está purificando
  - el que va a ser limpiado
  lexicon: HALOT
  rationale: El participio hitpael en este contexto describe al receptor del rito de purificación, no a alguien que se limpia a sí mismo. «Está siendo limpiado» conserva el matiz pasivo/procesual; se usa «limpiado» siguiendo la forma verbal que el texto ritual permite, aunque «purificado» también sería posible.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - de la derecha
  - diestra
  lexicon: HALOT
  rationale: El adjetivo indica el lado derecho del miembro. En español, «oreja derecha», «mano derecha» y «pie derecho» suenan naturales y precisos.
- source_word: בֹּהֶן יָדוֹ
  english_pob_choice: the thumb of his ... hand
  chosen_spanish: el pulgar de su mano
  alternatives_spanish:
  - el dedo pulgar de su mano
  - el dedo gordo de su mano
  lexicon: HALOT
  rationale: בֹּהֶן con la mano designa el pulgar. «Pulgar» es el equivalente directo y claro en español.
- source_word: בֹּהֶן רַגְלוֹ
  english_pob_choice: the big toe of his ... foot
  chosen_spanish: el dedo gordo de su pie
  alternatives_spanish:
  - el dedo grande del pie
  - el dedo pulgar del pie
  lexicon: HALOT
  rationale: בֹּהֶן con el pie designa el dedo gordo. «Dedo gordo del pie» es el uso natural en español actual y mantiene la claridad anatómica.
- source_word: וְלָקַח ... וְנָתַן
  english_pob_choice: shall take ... shall put
  chosen_spanish: tomará ... pondrá
  alternatives_spanish:
  - tomará ... colocará
  - ha de tomar ... ha de poner
  lexicon: HALOT
  rationale: Las formas verbales en este contexto legal-instructivo tienen valor prescriptivo/futuro. «Tomará» y «pondrá» expresan bien la instrucción ritual en español sin sonar artificiales.
theological_decisions:
- issue: Naturaleza del sujeto en el rito de purificación
  english_pob_reading: the one being cleansed
  chosen_spanish_reading: el que está siendo limpiado
  alternative_spanish_readings:
  - el que se está purificando
  - el purificado
  rationale: El hebreo describe al participante como receptor del proceso de purificación sacerdotal, no como agente de una auto-purificación. «Está siendo limpiado» preserva el carácter pasivo/procesual y evita introducir una lectura reflexiva no requerida por el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no se requieren cambios respecto del control final; se mantiene la concordancia alta con el audit trail inglés y con la decisión de lectura pasiva del participio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «se» reflexivo en la cláusula del participante para no sugerir auto-purificación.
  - «Ofrenda por la culpa» conserva el término técnico sacrificial sin sustituirlo por vocabulario litúrgico tradicional no auditado.
  - La nota a[] conserva la alternativa semántica documentada para תְּנוּךְ sin introducir una glosa excesiva en el texto principal.
