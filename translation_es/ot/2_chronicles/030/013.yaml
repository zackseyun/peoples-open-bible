translation:
  language: es
  text: Se reunieron en Jerusalén muchísima gente para celebrar la Fiesta de los Panes sin levadura[a][b] en el segundo mes, una asamblea muy grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «observar» o «guardar» la Fiesta de los Panes sin levadura; literalmente, «hacer» la fiesta.
    reason: lexical_alternative
  - marker: b
    text: O «Festival de los Panes sin levadura».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - se congregó
  - fue reunida
  lexicon: HALOT
  rationale: El nifal de אסף expresa la idea de ser/venir juntos. En español, «se reunió» suena natural y conserva el sentido de reunión comunitaria sin volverlo rígido.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: N/A
  rationale: Se mantiene el nombre propio estándar en español bíblico.
- source_word: עַם רָב
  english_pob_choice: a great many people
  chosen_spanish: mucha gente
  alternatives_spanish:
  - mucho pueblo
  - numerosa gente
  - una gran multitud
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza cantidad; «mucha gente» comunica bien la abundancia sin sonar forzado. «Pueblo» podría sugerir una entidad colectiva más técnica que el énfasis numérico aquí.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to keep
  chosen_spanish: para celebrar
  alternatives_spanish:
  - para observar
  - para guardar
  - para hacer
  lexicon: HALOT
  rationale: Con una fiesta como objeto, el hebreo literalmente dice «hacer», pero el uso idiomático implica observar/celebrar la fiesta. «Celebrar» es la opción española más natural y fiel al acto festivo señalado por el contexto.
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Festival of Unleavened Bread
  chosen_spanish: la Fiesta de los Panes sin levadura
  alternatives_spanish:
  - la Fiesta de los Panes Ázimos
  - el Festival de los Panes sin levadura
  - la Fiesta de la Pascua de los Panes sin levadura
  lexicon: HALOT
  rationale: «חג» admite «fiesta»; «המצות» se refiere a panes sin levadura. «Panes sin levadura» es claro y fiel en español contemporáneo; se evita «ázimos» por menos accesible.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - durante el segundo mes
  lexicon: HALOT
  rationale: Equivalencia directa y cronológicamente precisa.
- source_word: קָהָל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - reunión
  lexicon: HALOT
  rationale: «Asamblea» conserva el valor de reunión formal de un grupo convocado. «Congregación» puede sonar más eclesiástico de lo que exige el hebreo.
- source_word: לָרֹב מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - excesivamente grande
  - sumamente numerosa
  - de tamaño muy grande
  lexicon: HALOT
  rationale: La intensificación hebrea se expresa de forma natural con «muy grande», aplicada a «asamblea». «Muy grande» mantiene la fuerza sin añadir matices innecesarios.
theological_decisions:
- issue: Valor idiomático de la expresión ritual con חג + לעשות
  english_pob_reading: to keep/celebrate the Festival of Unleavened Bread
  chosen_spanish_reading: para celebrar la Fiesta de los Panes sin levadura
  alternative_spanish_readings:
  - para guardar la Fiesta de los Panes sin levadura
  - para observar la Fiesta de los Panes sin levadura
  - para hacer la Fiesta de los Panes sin levadura
  rationale: No se traduce de forma mecánica «hacer», porque en español el giro ritual requiere una expresión natural. «Celebrar» comunica la observancia festiva sin perder el sentido cultual del texto.
  doctrine_reference: Uso bíblico de los verbos de observancia festiva; cf. el sentido idiomático de los textos rituales del AT.
- issue: Nombre de la fiesta y registro terminológico
  english_pob_reading: Festival of Unleavened Bread
  chosen_spanish_reading: Fiesta de los Panes sin levadura
  alternative_spanish_readings:
  - Feast of Unleavened Bread
  - Festival de los Panes sin levadura
  rationale: Se prefiere «Fiesta» por su naturalidad en español y por conservar el carácter festivo/cultual de חַג. «Panes sin levadura» mantiene la referencia concreta de מַצּוֹת.
  doctrine_reference: Terminología cultual del Pentateuco y Crónicas sobre las fiestas de Israel.
translation_notes:
  revision_awareness: Se siguió el texto hebreo base (WLC) y el audit trail inglés. No se detectaron revisiones textuales ni cambios de sentido que requirieran notas sobre variantes; la única tensión principal es idiomática en לַעֲשׂוֹת אֶת חַג, resuelta con una nota léxica. Se mantuvo la intensificación final con una asamblea «muy grande», en paralelo con el hebreo קָהָל לָרֹב מְאֹד.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Fiesta» se emplea de manera consistente para חַג en este contexto.
  - «Asamblea» conserva el matiz formal de קָהָל sin introducir lenguaje eclesiástico innecesario.
  - La intensificación hebrea se refleja con «mucha gente» y «muy grande», sin duplicar de manera torpe la misma idea en español.
