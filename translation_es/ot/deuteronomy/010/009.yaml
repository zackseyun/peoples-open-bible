translation:
  language: es
  text: Por tanto, Leví[a] no tiene parte ni herencia con sus hermanos; Yahvé es su herencia[b], tal como Yahvé, tu Dios, le dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El singular 'Leví' representa a la tribu de Leví en contraste con las demás tribus de Israel.
    reason: cultural_note
  - marker: b
    text: 'O: «Yahvé es su porción». El hebreo repite el lenguaje de herencia para subrayar que la parte de Leví no es tierra, sino el propio Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor inferencial/consecutivo del hebreo y mantiene el enlace lógico con el contexto previo sin añadir paráfrasis.
- source_word: לְלֵוִי
  english_pob_choice: Levi
  chosen_spanish: Levi
  alternatives_spanish:
  - la tribu de Levi
  - el levita
  lexicon: HALOT
  rationale: Se conserva el nombre singular como representante de la tribu, tal como hace la POB en inglés, dejando que el contexto tribal haga la identificación.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - reparto
  lexicon: HALOT
  rationale: En español, 'parte' transmite bien la idea de participación en un reparto; 'porción' también es posible, pero puede sonar más marcada en registros bíblicos y duplicaría demasiado el paralelismo con 'herencia'.
- source_word: וְנַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - posesión heredada
  lexicon: HALOT
  rationale: '''Herencia'' comunica la noción de heredad territorial/covenantal de modo claro en español moderno. Se evita ''heredad'' por ser más arcaizante, aunque sigue siendo una alternativa válida.'
- source_word: עִם אֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - entre sus hermanos
  - con sus parientes
  lexicon: HALOT
  rationale: Se mantiene el masculino plural literal del hebreo, sin neutralizarlo, conforme al audit trail inglés y la referencia tribal a los otros israelitas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre divino frente a la sustitución por un título.
- source_word: הוּא נַחֲלָתוֹ
  english_pob_choice: is his inheritance
  chosen_spanish: es su herencia
  alternatives_spanish:
  - es su porción
  - es su heredad
  lexicon: HALOT
  rationale: Se conserva el eco léxico con 'herencia' para reflejar el juego deliberado del hebreo entre la ausencia de herencia territorial y la presencia de Yahvé como herencia de Levi.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... spoke
  chosen_spanish: tal como ... dijo
  alternatives_spanish:
  - como ... habló
  - según ... habló
  lexicon: HALOT
  rationale: '''Dijo'' es una forma natural en español para el discurso divino/promisorio y mantiene el sentido de hablar/decir del hebreo sin introducir la idea de ''prometer'' que no aparece explícitamente.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios Yahvé
  - tu Dios
  lexicon: HALOT
  rationale: Se traduce directamente la fórmula de pacto en segunda persona singular, manteniendo la relación personal del hablante con el destinatario.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural con 'le' en español; en este contexto refiere a Levi como representante tribal.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Conforme a la política del proyecto, se conserva el nombre divino en transliteración española en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Levi como referente singular de la tribu
  english_pob_reading: Levi has no portion or inheritance
  chosen_spanish_reading: Levi no tiene parte ni herencia
  alternative_spanish_readings:
  - la tribu de Levi no tiene parte ni herencia
  - Levi no tuvo parte ni herencia
  rationale: El hebreo presenta el nombre singular לוי como sujeto. Se mantiene esa forma para respetar la economía del original y la lectura representativa, sin borrar la referencia tribal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Tiempo verbal del perfecto hebreo
  english_pob_reading: has
  chosen_spanish_reading: no tiene
  alternative_spanish_readings:
  - no tuvo
  - no tenía
  rationale: Como en la revisión inglesa, el perfecto hebreo se entiende mejor como estado vigente en el contexto. En español, el presente 'tiene' comunica esa vigencia actual de manera natural.
  doctrine_reference: Applied revision note 2026-04-23T10:25:22Z
- issue: Imagen de herencia aplicada a Yahvé
  english_pob_reading: Yahweh is his inheritance
  chosen_spanish_reading: Yahvé es su herencia
  alternative_spanish_readings:
  - Yahvé es su porción
  - Yahvé es su heredad
  rationale: Se conserva el paralelismo léxico con 'herencia' para no diluir la oposición del verso entre no tener herencia territorial y tener a Yahvé como herencia.
  doctrine_reference: DOCTRINE.md lexical consistency / Deut 10:9
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que cambió 'had' por 'has' para reflejar el perfecto hebreo como estado presente en el contexto. La redacción española usa presente ('tiene') por la misma razón, y conserva la repetición léxica de 'herencia' para mantener el contraste teológico del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se conserva el nombre singular 'Levi' por coherencia con el texto fuente y con la lectura representativa tribal.
  - '''Parte'' y ''herencia'' reflejan la doble secuencia nominal del hebreo sin fusionarla en una sola idea.'
  - No se introduce lenguaje eclesiástico tradicional como 'el SEÑOR' o 'heredad' salvo como alternativa anotada.
  - La puntuación y el orden sintáctico buscan lectura natural en español sin perder la estructura inferencial del hebreo.
