revisions:
- from: Mi viña[a], la que es mía, está delante de mí. Los mil son para ti, Salomón[b], y doscientos para los que guardan su fruto.
  to: Mi viña, mi propia viña, está delante de mí. El millar[a] es para ti, Salomón, y doscientos para los que guardan su fruto.[b]
  rationale: Se corrige el anclaje de las notas para que coincidan con el rastro inglés y con el lugar semántico correcto. Se mejora שֶׁלִּי con «mi propia viña», más natural y enfático en español. Se sustituye «Los mil» por «El millar» para reflejar mejor הָאֶלֶף sin añadir moneda al texto principal. La nota sobre «delante de mí» se mantiene como alternativa contextual y se ancla al final del versículo para evitar interrumpir la frase nominal inicial.
