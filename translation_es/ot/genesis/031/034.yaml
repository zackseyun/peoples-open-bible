translation:
  language: es
  text: Ahora Raquel había tomado los ídolos domésticos[a], los había puesto en el cojín de la silla de montar del camello[b] y se había sentado sobre ellos. Labán palpó por toda la tienda, pero no los encontró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los terafines» o «los dioses domésticos». El término hebreo se refiere a objetos cultuales domésticos.
    reason: lexical_alternative
  - marker: b
    text: O «en la silla de montar del camello» o «en el aparejo acolchado del camello». El hebreo probablemente se refiere a una parte acolchada del equipo de montar del camello.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos domésticos
  alternatives_spanish:
  - los terafines
  - los dioses domésticos
  lexicon: HALOT
  rationale: תרפים designa objetos cultuales domésticos; en español, «ídolos domésticos» comunica con claridad su carácter idolátrico sin dejar un transliterado opaco. «Terafines» se conserva como alternativa por transparencia lexical, y «dioses domésticos» es posible, aunque «ídolos» refleja mejor la valoración narrativa del objeto.
- source_word: בְּכַר הַגָּמָל
  english_pob_choice: in the camel’s saddle cushion
  chosen_spanish: en el cojín de la silla de montar del camello
  alternatives_spanish:
  - en la silla de montar del camello
  - en el aparejo acolchado del camello
  lexicon: HALOT
  rationale: כַּר puede referirse a un cojín o pieza acolchada. En este contexto, la idea de un soporte acolchado del camello se expresa de forma natural como «cojín de la silla de montar». Se evita un término demasiado técnico o ambiguo, manteniendo la concreción del objeto.
- source_word: וַתֵּשֶׁב עֲלֵיהֶם
  english_pob_choice: and she sat on them
  chosen_spanish: y se había sentado sobre ellos
  alternatives_spanish:
  - y se sentó sobre ellos
  - y estaba sentada sobre ellos
  lexicon: HALOT
  rationale: El valor narrativo aquí funciona como trasfondo pluperfectivo en español, tal como el audit trail inglés. «Se había sentado» integra mejor la secuencia previa a la búsqueda de Labán y conserva la acción física de ocultamiento.
- source_word: וַיְמַשֵּׁשׁ
  english_pob_choice: felt through
  chosen_spanish: palpó
  alternatives_spanish:
  - tanteó
  - palpó a lo largo de
  lexicon: HALOT
  rationale: ממששׁ enfatiza el tanteo táctil. «Palpó» es breve, idiomático y conserva la búsqueda por contacto físico; «tanteó» también es viable, pero «palpó» suena más natural en este contexto narrativo.
- source_word: כָּל הָאֹהֶל
  english_pob_choice: the whole tent
  chosen_spanish: toda la tienda
  alternatives_spanish:
  - toda la tienda de campaña
  - la tienda entera
  lexicon: HALOT
  rationale: כָּל con el sustantivo definido se vierte de manera natural como «toda la tienda». «Tienda» es el término bíblico usual en español para אֹהֶל y evita una acumulación innecesaria de palabras.
- source_word: וְלֹא מָצָא
  english_pob_choice: but did not find them
  chosen_spanish: pero no los encontró
  alternatives_spanish:
  - y no los encontró
  - pero no encontró nada
  lexicon: HALOT
  rationale: El objeto queda implícito en hebreo y el contexto lo identifica como los ídolos domésticos. En español, «los» recupera el referente con claridad y el «pero» refleja bien el contraste narrativo.
- source_word: וְרָחֵל
  english_pob_choice: Now Rachel
  chosen_spanish: Ahora Raquel
  alternatives_spanish:
  - Y Raquel
  - Raquel
  lexicon: HALOT
  rationale: La waw inicial introduce el siguiente movimiento narrativo. «Ahora» reproduce esa transición con naturalidad en español y mantiene el tono de enlace explicativo.
theological_decisions:
- issue: Naturaleza de los terafines
  english_pob_reading: The Hebrew term refers to household cult objects.
  chosen_spanish_reading: «Ídolos domésticos» comunica que se trata de objetos cultuales ilícitos desde la perspectiva narrativa.
  alternative_spanish_readings:
  - «terafines»
  - «dioses domésticos»
  rationale: No se atenúa el carácter religioso del término ni se lo convierte en un simple adorno doméstico. La traducción conserva la tensión entre el nombre técnico y su función cultual, visible en el relato.
  doctrine_reference: Exodus 20:3-5; Genesis 35:2-4
- issue: Tiempo verbal de las acciones de Raquel
  english_pob_reading: The current phrasing breaks the parallel structure ... Rendering this as a simple list ('had taken..., put..., and sat on them') more clearly and smoothly unites the three actions as a single sequence of background events preceding Laban's search.
  chosen_spanish_reading: 'Se usa pluperfecto para las acciones previas: «había tomado», «había puesto», «se había sentado».'
  alternative_spanish_readings:
  - presente histórico
  - pretérito simple
  rationale: El español necesita expresar explícitamente el valor de trasfondo que el hebreo narra con forma verbal secuencial pero con función retrospectiva. El pluperfecto preserva la relación temporal con la búsqueda de Labán sin alterar el contenido.
  doctrine_reference: Genesis 31:33-35
translation_notes:
  revision_awareness: El pasaje sigue el acuerdo alto del auditor y conserva la revisión que unifica las tres acciones de Raquel como trasfondo anterior a la búsqueda de Labán. No se introdujeron cambios doctrinales ni textuales respecto del apunte inglés; solo se adaptó el valor aspectual al español con pluperfecto y se mantuvo la imagen concreta del objeto ocultado.
  spanish_consistency_notes:
  - Se mantiene «Raquel» y «Labán» de forma consistente con la onomástica bíblica estándar en español.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el tetragrámaton.
  - Se usa «tienda» para אֹהֶל, término bíblico natural en español.
  - Se evita «SEÑOR» como sustituto no pertinente aquí.
  - El marcador [b] se coloca en «todo[b] la tienda» para señalar la alternativa sobre el alcance de כָּל הָאֹהֶל, aunque la redacción principal natural es «toda la tienda»; el texto principal puede leerse fluidamente como «palpó toda la tienda».
