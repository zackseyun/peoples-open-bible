translation:
  language: es
  text: ¿Acaso yo como la carne de los toros[a], o bebo la sangre de los machos cabríos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «machos cabríos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאוֹכַל
  english_pob_choice: Do I eat
  chosen_spanish: ¿Acaso como
  alternatives_spanish:
  - ¿Como acaso
  - ¿He de comer
  - ¿Voy a comer
  lexicon: HALOT
  rationale: La partícula interrogativa הֲ con el imperfecto 1cs expresa una pregunta retórica. En español, «¿Acaso como...?» comunica bien la fuerza retórica sin volverla mecánica.
- source_word: בְּשַׂר
  english_pob_choice: the flesh of
  chosen_spanish: la carne de
  alternatives_spanish:
  - la carne
  - la carne de los
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente «carne». «La carne de» preserva la imagen concreta del sacrificio y evita una generalización como «carne» sin complemento.
- source_word: אַבִּירִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - toros fuertes
  - machos poderosos
  lexicon: HALOT
  rationale: Aunque el término puede tener un matiz de «fuertes/muertos», en este contexto sacrificial junto con la sangre y los machos cabríos apunta a bovinos. «Toros» mantiene el campo sacrificial y la naturalidad en español.
- source_word: וְדַם
  english_pob_choice: or drink the blood of
  chosen_spanish: o bebo la sangre de
  alternatives_spanish:
  - y bebo la sangre de
  - o tomaría la sangre de
  lexicon: HALOT
  rationale: El waw coordinante en este paralelismo funciona naturalmente en español como «o» para conservar la estructura de pregunta retórica con dos miembros paralelos.
- source_word: עַתּוּדִים
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras macho
  - cabras
  - carneros
  lexicon: HALOT
  rationale: עַתּוּדִים denota machos cabríos, no carneros. «Machos cabríos» es preciso y conserva el matiz léxico que el inglés POB anotó como alternativa a «goats».
- source_word: אֶשְׁתֶּה
  english_pob_choice: drink
  chosen_spanish: bebo
  alternatives_spanish:
  - bebería
  - voy a beber
  lexicon: HALOT
  rationale: El imperfecto 1cs continúa la pregunta retórica iniciada por el primer verbo. En español, el presente de indicativo funciona de modo natural bajo «¿Acaso...?».
theological_decisions:
- issue: Lenguaje antropomórfico sobre el sacrificio
  english_pob_reading: Render the rhetorical question plainly without softening the imagery
  chosen_spanish_reading: Mantener la imagen concreta sin paraprasiar el sentido a una abstracción
  alternative_spanish_readings:
  - ¿Acaso necesito tus sacrificios?
  - ¿Crees que me alimento de tus ofrendas?
  rationale: El hebreo niega que Dios dependa literalmente de alimento sacrificial, pero lo hace mediante una imagen cultual concreta. La traducción debe conservar esa tensión y no resolverla con una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El contexto auditado coincide plenamente con la lectura inglesa: pregunta retórica directa, imagen sacrificial concreta y preferencia por términos zoológicos precisos. No se requieren revisiones respecto del sentido base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el texto lo exigiera; aquí no aparece el tetragrámaton.
  - «Toros» se eligió por naturalidad en español y por el contexto sacrificial; «machos cabríos» conserva la precisión del segundo hemistiquio.
  - La nota a preserva la alternativa léxica documentada por el POB inglés sin introducir una glosa interpretativa excesiva.
