id: 2TI.3.13
reference: 2 Timothy 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πονηροὶ δὲ ἄνθρωποι καὶ γόητες προκόψουσιν ἐπὶ τὸ χεῖρον, πλανῶντες καὶ πλανώμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/013.yaml
  text: But evil people and impostors will go on from bad to worse, deceiving and being deceived.
translation:
  language: ko
  text: 그러나 악한 사람들과 사기꾼들[a]은 점점 더 악한 데로 나아갈 것입니다. 그들은 남을 속이면서 자신도 속아 넘어갑니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「협잡꾼들」. 헬라어 γόης는 본래 주술적 사기꾼을 가리키며, 일반적으로는 거짓으로 사람을 속이는 자를 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηροὶ ἄνθρωποι καὶ γόητες
  english_pob_choice: evil people and impostors
  chosen_korean: 악한 사람들과 사기꾼들
  alternatives_korean:
  - 악인들과 협잡꾼들
  - 악한 자들과 마술쟁이들
  lexicon: BDAG
  rationale: γόης의 「주술적 사기꾼」 함의는 본 문맥에서 일반적 「사기꾼·속이는 자」로 자연스럽게 옮겨진다.
- source_word: προκόψουσιν ἐπὶ τὸ χεῖρον
  english_pob_choice: will go on from bad to worse
  chosen_korean: 점점 더 악한 데로 나아갈 것입니다
  alternatives_korean:
  - 더 나쁜 쪽으로 나아갈 것입니다
  - 갈수록 악해질 것입니다
  lexicon: BDAG
  rationale: 2:16, 3:9의 προκόπτω와 어휘 통일. 「악한 데로 나아가다」가 자연스럽다.
- source_word: πλανῶντες καὶ πλανώμενοι
  english_pob_choice: deceiving and being deceived
  chosen_korean: 남을 속이면서 자신도 속아 넘어갑니다
  alternatives_korean:
  - 미혹하면서 미혹을 받습니다
  - 속이면서 속고 있습니다
  lexicon: BDAG
  rationale: πλανάω의 능동/수동 분사 짝을 한국어 「남을 속이면서 자신도 속아 넘어간다」로 풀어 그 비극적 자기 기만의 짝 구조를 분명히 드러낸다.
