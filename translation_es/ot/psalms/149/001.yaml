translation:
  language: es
  text: ¡Alaben a Yah! Canten a Yahvé un cántico nuevo[a], su alabanza en la asamblea de los fieles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hallelu-Yah», literalmente: «Alaben a Yah».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la congregación de los piadosos» o «en la asamblea de los santos».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alaben a Dios!
  - ¡Alaben! ¡Alaben!
  lexicon: HALOT
  rationale: Es un imperativo plural de הלל. En español, «¡Alaben!» conserva la exhortación directa y el tono litúrgico sin introducir un complemento que el hebreo no expresa aquí.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: Es la forma corta del nombre divino. Se conserva «Yah» para reflejar la forma breve del hebreo y evitar fusionarla con יְהוָה, que aparece inmediatamente después.
- source_word: שִׁ֣ירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten un canto
  - Entonen
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר pide cantar. «Canten» es natural, digno y directo en español contemporáneo.
- source_word: לַֽיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: El nombre tetragramático se rinde como «Yahvé» según la norma del proyecto. La preposición ל aquí introduce el destinatario del canto, por eso «a Yahvé» comunica bien la dirección.
- source_word: שִׁ֣יר חָדָ֑שׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - un nuevo cántico
  - una canción nueva
  lexicon: HALOT
  rationale: La combinación fija de los Salmos se expresa de forma natural como «cántico nuevo», preservando su resonancia literaria. «Canción» sería más coloquial; «cántico» mantiene un registro más bíblico sin ser arcaizante.
- source_word: תְּ֝הִלָּת֗/וֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su elogio
  - la alabanza de él
  lexicon: HALOT
  rationale: El sustantivo en estado constructo con sufijo 3ms se entiende de manera natural como «su alabanza». En español, la forma posesiva directa conserva la referencia sin sobreexplicar la estructura hebrea.
- source_word: בִּ/קְהַ֥ל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - entre la asamblea
  lexicon: HALOT
  rationale: קהל designa una comunidad reunida. «Asamblea» reproduce bien el sentido colectivo y evita una carga denominacional excesiva.
- source_word: חֲסִידִֽים
  english_pob_choice: the faithful
  chosen_spanish: de los fieles
  alternatives_spanish:
  - de los santos
  - de los piadosos
  lexicon: HALOT
  rationale: חֲסִידִים nombra a los leales/devotos del pacto. «Los fieles» comunica esa lealtad religiosa con claridad y evita asociaciones eclesiásticas más tardías que puede tener «santos».
theological_decisions:
- issue: Cómo rendir los dos nombres divinos distintos en el mismo verso (יָהּ y יהוה)
  english_pob_reading: Retain the short form as 'Yah' and render YHWH as 'Yahweh'
  chosen_spanish_reading: Mantener «Yah» para la forma corta y «Yahvé» para יהוה
  alternative_spanish_readings:
  - Rendir ambos como «Señor»
  - Sustituir יָהּ por «Yahvé» también
  rationale: El hebreo distingue la forma breve יָהּ del Tetragrámaton יהוה. Mantener esa distinción en español evita borrar una diferencia lexical y teológica real del texto fuente. «Yahvé» para יהוה sigue la terminología del proyecto, mientras «Yah» preserva la forma corta.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #1 and #5'
- issue: Sentido de חֲסִידִים
  english_pob_reading: the faithful
  chosen_spanish_reading: los fieles
  alternative_spanish_readings:
  - los santos
  - los piadosos
  rationale: El término apunta a personas caracterizadas por lealtad de pacto y devoción. «Los fieles» equilibra precisión léxica y naturalidad en español, sin imponer un matiz confesional posterior que «los santos» podría sugerir.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #6 and #5'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el hebreo masorético, preservando la distinción entre יָהּ y יהוה, y manteniendo la imagen poética de «cántico nuevo» y la reunión comunitaria. No se introdujeron revisiones adicionales; el pasaje muestra alto acuerdo con el control de revisión.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה conforme a la terminología del proyecto, y «Yah» para יָהּ para no colapsar ambos nombres.
  - «Cántico nuevo» mantiene el registro bíblico y la collocación salmódica sin sonar demasiado arcaico.
  - «Los fieles» traduce חֲסִידִים con un término comprensible y no confesional.
  - Las notas al pie preservan la alternativa de «congregación/assemblea» y «santos/piadosos» que el audit trail inglés documenta.
