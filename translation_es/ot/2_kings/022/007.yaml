translation:
  language: es
  text: Pero la plata[a] que se pone en sus manos no se les ha de pedir cuenta[b], porque actúan con fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dinero». Hebreo כֶּסֶף suele referirse al dinero en contextos financieros.
    reason: lexical_alternative
  - marker: b
    text: O «no se les ha de requerir cuenta»; es decir, no se exigía rendición de cuentas a los hombres que manejaban los fondos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: HALOT
  rationale: La partícula introduce una restricción o contraste con lo anterior. «Pero» expresa bien el valor adversativo en español sin volver la frase pesada.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata [como dinero]
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente «plata» y en contexto financiero puede referirse a dinero. «La plata» preserva la textura léxica del hebreo y sigue siendo inteligible en español.
- source_word: הַנִּתָּן עַל יָדָם
  english_pob_choice: that is put into their hands
  chosen_spanish: que se pone en sus manos
  alternatives_spanish:
  - que se les da en las manos
  - que se les entrega
  lexicon: HALOT
  rationale: La imagen hebrea de poner algo en la mano se conserva de manera natural en español. «Se pone en sus manos» mantiene el matiz de entrega/encargo.
- source_word: יֵחָשֵׁב אִתָּם
  english_pob_choice: is not to be counted with them
  chosen_spanish: no se les ha de pedir cuenta
  alternatives_spanish:
  - no se ha de contar con ellos
  - no se les ha de requerir cuenta
  lexicon: HALOT
  rationale: El nifal de חשב en este contexto es contable/administrativo. En español, «pedir cuenta» comunica con claridad la idea de exigir rendición de cuentas sin perder el sentido de auditoría implícito.
- source_word: בֶאֱמוּנָה
  english_pob_choice: faithfully
  chosen_spanish: con fidelidad
  alternatives_spanish:
  - fielmente
  - con lealtad
  - con integridad
  lexicon: HALOT
  rationale: אֱמוּנָה expresa confiabilidad y fidelidad práctica, no fe doctrinal. «Con fidelidad» mantiene ese valor moral y es natural en español.
- source_word: הֵם עֹשִׂים
  english_pob_choice: they are acting
  chosen_spanish: actúan
  alternatives_spanish:
  - están actuando
  - hacen
  - están trabajando
  lexicon: HALOT
  rationale: El verbo «hacer» aquí describe la conducta en el manejo del dinero. «Actúan» suena fluido y conserva el énfasis en la manera correcta de proceder.
translation_notes:
  revision_awareness: 'Se siguió el contexto financiero del hebreo y el audit trail inglés: no se tradujo mecánicamente «counted with them», sino que se expresó la idea administrativa de rendir cuentas, manteniendo la imagen de entrega del dinero en las manos y el valor de אֱמוּנָה como fidelidad práctica.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología no pertinente; el versículo no contiene lenguaje divino.
  - «Plata» se usó como equivalente principal de כֶּסֶף, con nota para la alternativa «dinero».
  - «Con fidelidad» refleja conducta confiable, no una abstracción doctrinal de la fe.
  - El registro mantiene tono bíblico moderno y legible para público eclesial amplio.
