revisions:
- from: Además[a], la Gloria de Israel no mentirá, ni se arrepentirá, porque no es hombre[b] para que se arrepienta.
  to: Además[a], la Gloria de Israel no mentirá, ni cambiará de parecer[b], porque no es hombre[c] para cambiar de parecer.
  rationale: Se revisa נחם a 'cambiar de parecer' para alinearlo mejor con la decisión contextual de la POB inglesa ('relent') y evitar en español la implicación más fuerte de arrepentimiento moral que suele tener 'arrepentirse'. Se conservan alternativas relevantes en nota, incluida 'se arrepentirá' como posibilidad léxica secundaria. También se separan las notas para que cada marcador corresponda exactamente al segmento pertinente del texto.
