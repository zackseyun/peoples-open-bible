translation:
  language: es
  text: No seas testigo contra tu prójimo sin causa[a], y no engañes con tus labios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin causa» también puede entenderse como «por nada» o «sin razón».
    reason: lexical_alternative
  - marker: b
    text: O «y engañes con tus labios». La conjunción hebrea puede leerse simplemente como «y»; en el texto principal se expresa la segunda prohibición de forma explícita para mayor claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  lexicon: HALOT
  rationale: La partícula de prohibición se expresa naturalmente en español con «No» delante del imperativo negativo o subjuntivo prohibitivo.
- source_word: תְּהִי
  english_pob_choice: be
  chosen_spanish: seas
  alternatives_spanish:
  - estés
  - te conviertas
  lexicon: HALOT
  rationale: 'Con אַל + imperfecto, la prohibición apunta al estado/condición: «No seas». En español es más natural que un calco como «no estés siendo».'
- source_word: עֵד
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  lexicon: HALOT
  rationale: El sustantivo designa a un testigo en contexto legal o cuasi legal; «testigo» conserva esa fuerza mejor que «testimonio».
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - por nada
  - sin motivo
  - gratuitamente
  lexicon: HALOT
  rationale: La base semántica aquí es la acción injustificada o gratuita. «Sin causa» reproduce bien la idea ética/jurídica y es idiomática en español bíblico moderno.
- source_word: בְּרֵעֶךָ
  english_pob_choice: against your neighbor
  chosen_spanish: contra tu prójimo
  alternatives_spanish:
  - contra tu vecino
  - respecto de tu prójimo
  lexicon: HALOT
  rationale: Aunque la preposición puede ser amplia, con «testigo» el español natural es «ser testigo contra». «Prójimo» preserva el matiz relacional de רֵעַ mejor que «vecino».
- source_word: וַהֲפִתִּיתָ
  english_pob_choice: and do not deceive / and deceive
  chosen_spanish: y no engañes
  alternatives_spanish:
  - y no seduzcas
  - y no induzcas a error
  - y no desvíes
  lexicon: HALOT
  rationale: El verbo פתה puede abarcar engañar, seducir o inducir al error. En un contexto de habla falsa, «engañes» comunica con claridad el abuso verbal sin perder la fuerza del término.
- source_word: בִּשְׂפָתֶיךָ
  english_pob_choice: with your lips
  chosen_spanish: con tus labios
  alternatives_spanish:
  - con tus palabras
  - con tu boca
  lexicon: HALOT
  rationale: La imagen corporal se conserva de forma directa; «labios» reproduce el hebreo y mantiene la concreción retórica.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de Proverbios 24:28 junto con el audit trail inglés. Se mantuvo la estructura de dos prohibiciones paralelas, evitando el «o» inicial del borrador inglés previo y reflejando la revisión que volvió a «and do not» como coordinación prohibitiva más directa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino porque este registro sigue la convención general del proyecto cuando el nombre divino está presente; aquí no aplica.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al texto.
  - «Prójimo» se eligió por su valor relacional y bíblico, más que «vecino», que puede sonar demasiado doméstico en español moderno.
  - La segunda cláusula conserva la imagen de «labios» por fidelidad al hebreo, aunque «palabras» sería una explicación posible.
