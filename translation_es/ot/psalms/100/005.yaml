translation:
  language: es
  text: Porque Yahvé es bueno[a]; su amor leal[b] es para siempre, y su fidelidad dura de generación en generación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues Yahvé es bueno» o «Porque bueno es Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo «su hesed»: amor leal, con matices de misericordia, fidelidad y amor del pacto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para todas las generaciones»; literalmente, «hasta generación y generación», una expresión hebrea de continuidad sucesiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base o razón del llamado del salmo; en español, «Porque» conserva claramente ese valor explicativo-causal sin sonar forzado.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  lexicon: HALOT
  rationale: «Bueno» es la equivalencia más directa y natural para la afirmación general sobre Yahvé; evita estrechar indebidamente el alcance moral y benéfico del adjetivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliteración del Tetragrámaton como «Yahvé», preservando el nombre personal de Dios en vez de sustituirlo por un título.'
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad pactal, misericordia y amor fiel. «Amor leal» mantiene esa tensión mejor que opciones más tradicionales o más estrechas, y evita reducir el término solo a afecto o solo a fidelidad.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» expresa con naturalidad la duración indefinida marcada por el hebreo y funciona bien con el sustantivo siguiente en una estructura idiomática española.
- source_word: דֹּר וָדֹר
  english_pob_choice: generation and generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - de generación en generación y generación
  - para todas las generaciones
  lexicon: HALOT
  rationale: Aunque el hebreo repite literalmente «generación y generación», en español la fórmula idiomática y fiel es «de generación en generación», que conserva la idea de sucesión continua sin sonar artificial.
- source_word: אֱמוּנָתוֹ
  english_pob_choice: his faithfulness
  chosen_spanish: su fidelidad
  alternatives_spanish:
  - su confianza firme
  - su confiabilidad
  - su constancia
  lexicon: HALOT
  rationale: El sustantivo denota firmeza, confiabilidad y fidelidad. «Fidelidad» es la correspondencia más natural en español, especialmente en paralelo con el amor leal de la primera cola.
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre propio de Dios como «Yahvé» para no ocultar la referencia personal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido pactal de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - fidelidad amorosa
  rationale: El verso une la bondad de Yahvé con su חֶסֶד duradero. «Amor leal» comunica el peso de lealtad, misericordia y compromiso del pacto sin desdibujar la riqueza semántica del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Paralelismo temporal final
  english_pob_reading: his faithfulness endures from generation to generation
  chosen_spanish_reading: su fidelidad dura de generación en generación
  alternative_spanish_readings:
  - su fidelidad permanece de generación en generación
  - su fidelidad es de generación en generación
  rationale: El hebreo expresa duración mediante el paralelismo con לְעוֹלָם y la expresión «de generación en generación». En español, «dura» comunica bien esa permanencia y evita la extrañeza de una cópula sin verbo explícito en la segunda cola.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §6
translation_notes:
  revision_awareness: El contexto inglés muestra un ajuste reciente en la última cola para expresar con claridad la duración («from generation to generation»). La versión española adopta directamente una fórmula idiomática estable («de generación en generación») y conserva la fuerza temporal del hebreo sin sobrecargar la sintaxis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» conforme a la política del proyecto sobre el Tetragrámaton.
  - Se usa «amor leal» para חֶסֶד, evitando sustituirlo por «misericordia» como traducción única y preservando su espesor pactal.
  - «Fidelidad» se mantiene para אֱמוּנָה, en paralelo conceptual con חֶסֶד.
  - La cadencia de la línea busca ser publicable y litúrgicamente legible en español, sin copiar mecánicamente el orden del inglés.
