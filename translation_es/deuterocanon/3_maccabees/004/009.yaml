translation:
  language: es
  text: 'Y fueron bajados[a], siendo llevados a la fuerza como bestias bajo la coerción de ligaduras de hierro: unos con sus cuellos fijados[c] a los yugos[b] de las naves, y otros con sus pies asegurados en grillos irrompibles,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'conducidos abajo'; el verbo griego puede traducirse de manera más neutral, pero el contexto favorece una formulación más fuerte de coerción.
    reason: lexical_alternative
  - marker: b
    text: '''Yugos de las naves'' puede aludir a vigas o travesaños del barco a los que estaban sujetos los prisioneros; se conserva deliberadamente la imagen del yugo animal.'
    reason: cultural_note
  - marker: c
    text: '''Fijados'' también podría traducirse ''clavados'' si se toma el verbo en su sentido más fuerte, pero el contexto inmediato no exige esa especificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατήχθησαν
  english_pob_choice: were brought down
  chosen_spanish: fueron llevados abajo
  alternatives_spanish:
  - fueron bajados
  - fueron conducidos abajo
  - fueron traídos abajo
  lexicon: LSJ
  rationale: El aoristo pasivo de κατάγω conserva una idea direccional de descenso/traslado. 'Fueron llevados abajo' mantiene esa dirección sin precisar más de lo que el griego dice.
- source_word: θηρίων τρόπον
  english_pob_choice: like beasts
  chosen_spanish: como bestias
  alternatives_spanish:
  - a la manera de bestias
  - como animales salvajes
  lexicon: LSJ
  rationale: La comparación es degradante e idiomática. 'Como bestias' es natural en español y preserva el deshumanizamiento.
- source_word: ἀγόμενοι
  english_pob_choice: being driven
  chosen_spanish: siendo arrastrados
  alternatives_spanish:
  - siendo llevados
  - siendo conducidos
  - siendo obligados
  lexicon: LSJ
  rationale: Aunque el participio puede significar 'llevados', el contexto de trato brutal favorece una rendición más fuerte. 'Siendo arrastrados' refleja la coerción sin añadir contenido ajeno.
- source_word: σιδηροδέσμοις ἀνάγκαις
  english_pob_choice: by the compulsion of iron bonds
  chosen_spanish: por la compulsión de ataduras de hierro
  alternatives_spanish:
  - bajo la fuerza de ataduras de hierro
  - por la necesidad de hierro
  - con la compulsión de grilletes de hierro
  lexicon: LSJ
  rationale: La frase griega combina la imagen física de ataduras de hierro con la idea de constricción/forzamiento. 'Compulsión de ataduras de hierro' preserva ambos elementos y el tono áspero.
- source_word: τοῖς ζυγοῖς τῶν πλοίων
  english_pob_choice: the yokes of the ships
  chosen_spanish: los yugos de las naves
  alternatives_spanish:
  - los yokes de los barcos
  - las barras de las naves
  - los travesaños de las naves
  lexicon: LSJ
  rationale: ζυγός conserva la imagen de yugo. 'Naves' mantiene un registro digno y permite conservar el enlace metafórico con animales de carga.
- source_word: προσηλωμένοι
  english_pob_choice: fastened
  chosen_spanish: fijados
  alternatives_spanish:
  - clavados
  - asegurados
  - sujetos firmemente
  lexicon: LSJ
  rationale: El verbo puede intensificar hasta 'clavar', pero no obliga a esa lectura. 'Fijados' preserva la sujeción firme sin sobretraducir.
- source_word: τοὺς τραχήλους
  english_pob_choice: their necks
  chosen_spanish: sus cuellos
  alternatives_spanish:
  - el cuello
  - sus cervices
  lexicon: LSJ
  rationale: 'El acusativo con el participio se vierte con posesivo explícito en español: ''sus cuellos''.'
- source_word: ἀρρήκτοις
  english_pob_choice: unbreakable
  chosen_spanish: irrompibles
  alternatives_spanish:
  - indestructibles
  - inquebrantables
  lexicon: LSJ
  rationale: El adjetivo expresa algo no susceptible de romperse. 'Irrompibles' es claro y directo en español contemporáneo.
- source_word: κατησφαλισμένοι
  english_pob_choice: secured
  chosen_spanish: asegurados
  alternatives_spanish:
  - afianzados
  - sujetos
  - cerrados con seguridad
  lexicon: LSJ
  rationale: El participio comunica que quedaron firmemente sujetos o asegurados. 'Asegurados' conserva esa fuerza sin especificar mecanismo.
- source_word: πέδαις
  english_pob_choice: fetters
  chosen_spanish: grillos
  alternatives_spanish:
  - cadenas
  - argollas
  - fierros
  lexicon: LSJ
  rationale: πέδαι designa específicamente grilletes/frenos para los pies. 'Grillos' es el equivalente español más preciso para esa restricción de pies.
translation_notes:
  revision_awareness: La redacción sigue el tramo revisado del POB en inglés, incluyendo la preferencia por 'being driven' y la ampliación de σιδηροδέσμοις a un sentido más amplio que 'chains'. Se conserva la tensión entre la imagen animal y la restricción física, sin convertir 'προσηλωμένοι' en 'clavados' de forma obligatoria.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aparece en el pasaje; no aplica.'
  - Se preserva 'grillos' para πέδαις por precisión lexical sobre las ataduras de los pies.
  - La construcción participial se reproduce en español con 'siendo arrastrados' para reflejar el aspecto continuo/acompañante del griego.
