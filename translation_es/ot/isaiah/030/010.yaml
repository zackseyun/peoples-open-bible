  rationale: 'Se corrige el anclaje de la nota para que documente נְכֹחוֹת, como en el audit trail inglés. También se suaviza el español sin apartarse del hebreo: ''lo recto'' representa bien נְכֹחוֹת; ''cosas halagüeñas'' hace explícito el valor retórico de חֲלָקוֹת en español; y ''vean ilusiones'' mejora la fluidez manteniendo el campo visual de חזה/מַהֲתַלּוֹת.'
