    rationale: Aunque עָרֶב es literalmente «tarde/anochecer», después de «me acuesto» y antes de «hasta el alba» el español más natural entiende el periodo como «la noche». El audit trail inglés retuvo «evening», pero en español «la tarde se prolonga» puede distraer o sonar temporalmente impreciso.
