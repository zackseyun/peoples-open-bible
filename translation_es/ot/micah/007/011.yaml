translation:
  language: es
  text: Un día para edificar tus murallas; en aquel día la frontera[a] se alejará mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el decreto se alejará mucho». El hebreo puede significar «frontera/límite» o «decreto/estatuto».
    reason: lexical_alternative
lexical_decisions:
- source_word: י֖וֹם
  english_pob_choice: A day
  chosen_spanish: Un día
  alternatives_spanish:
  - El día
  - Un día está llegando
  lexicon: HALOT
  rationale: El hebreo usa יוֹם como anuncio profético breve y elíptico. «Un día» conserva la concisión y el tono exclamativo sin añadir un verbo que no está en el texto.
- source_word: לִ/בְנ֣וֹת
  english_pob_choice: for building
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - para reconstruir
  lexicon: HALOT
  rationale: La preposición ל con infinitivo constructo expresa finalidad. «Edificar» comunica bien el sentido de levantar muros en español y mantiene un registro digno. «Reconstruir» es posible por contexto, pero no está explícito en el verbo.
- source_word: גְּדֵרָ֑יִ/ךְ
  english_pob_choice: your walls
  chosen_spanish: tus murallas
  alternatives_spanish:
  - tus muros
  - tus cercas
  - tus fortificaciones
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo apunta a estructuras de cierre o barrera. «Murallas» es natural en un contexto de restauración y refuerza la imagen urbana/defensiva. «Muros» sería más general; «cercas» rebaja demasiado la fuerza; «fortificaciones» es más específico de lo que exige el hebreo.
- source_word: י֥וֹם הַ/ה֖וּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se expresa de modo natural con «en aquel día» en español. Mantiene el valor de referencia temporal concreta y futura sin sonar rígida.
- source_word: יִרְחַק
  english_pob_choice: will be far removed
  chosen_spanish: será alejado
  alternatives_spanish:
  - se apartará
  - será quitado
  - estará lejos
  lexicon: HALOT
  rationale: El verbo רחק expresa hacerse lejano o ser alejado. En español, «será alejado» conserva la idea de desplazamiento/retirada del objeto sin imponer más agencia de la que el hebreo exige. «Se apartará» puede sonar demasiado intransitivo; «será quitado» ya interpreta más fuertemente la acción.
- source_word: חֹֽק
  english_pob_choice: the boundary
  chosen_spanish: el límite
  alternatives_spanish:
  - el decreto
  - la frontera
  - la medida
  lexicon: HALOT
  rationale: 'Aunque חֹק puede significar «decreto» o «estatuto», el contexto de muros y expansión territorial favorece un sentido espacial: límite, frontera, demarcación. «El límite» es la opción más breve y fiel para español; dejo la alternativa legal en nota porque el hebreo la permite.'
theological_decisions:
- issue: Sentido de חֹק al final del versículo
  english_pob_reading: spatial boundary/limit rather than legal decree
  chosen_spanish_reading: límite espacial alejado
  alternative_spanish_readings:
  - decreto
  - estatuto
  - frontera
  rationale: 'La imagen inmediata es arquitectónica y territorial: se habla de edificar murallas. Por eso, traducir חֹק como «límite» integra mejor la escena de restauración. La lectura jurídica sigue siendo léxicamente posible, pero es menos coherente con el flujo del verso; por eso se preserva como alternativa.'
  doctrine_reference: No doctrinal; decisión léxico-contextual basada en el paralelismo del versículo
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: el texto inglés de referencia y la evaluación posterior no requieren cambios sustantivos. La decisión clave sigue siendo la misma: entender חֹק como límite espacial en coherencia con la imagen de muros y restauración, dejando constancia de la alternativa jurídica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «murallas» por su fuerza restauradora y urbana, compatible con el hebreo plural de cierres o barreras.
  - Se conserva una sola nota al pie para la ambigüedad de חֹק, sin añadir interpretaciones no atestiguadas.
