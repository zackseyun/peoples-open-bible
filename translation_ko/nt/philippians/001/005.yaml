id: PHP.1.5
reference: Philippians 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐπὶ τῇ κοινωνίᾳ ὑμῶν εἰς τὸ εὐαγγέλιον ἀπὸ ⸀τῆς πρώτης ἡμέρας ἄχρι τοῦ νῦν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/005.yaml
  text: because of your partnership in the gospel from the first day until now,[a]
  footnotes:
  - marker: a
    text: Or 'for the gospel.' The Greek phrase can express either the sphere of their shared participation or its goal/purpose.
    reason: lexical_alternative
translation:
  language: ko
  text: 첫날부터 지금까지 복음 안에서 함께해 온 여러분의 동역[a] 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「복음을 위한 동역」. 헬라어 εἰς τὸ εὐαγγέλιον은 함께함의 영역(in)일 수도, 목적(for)일 수도 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τῇ κοινωνίᾳ
  english_pob_choice: because of your partnership
  chosen_korean: ~의 동역 때문입니다
  alternatives_korean:
  - ~의 친교 때문입니다
  - ~의 참여 때문입니다
  lexicon: BDAG
  rationale: 여격과 함께 쓰인 ἐπί는 감사의 근거를 가리키므로 인과적 「때문에/때문입니다」가 자연스럽다. 앞 4절 「간구하면서」의 분사절을 받아 합쇼체 종결로 마무리한다.
- source_word: κοινωνίᾳ
  english_pob_choice: partnership
  chosen_korean: 동역
  alternatives_korean:
  - 친교
  - 참여
  - 사귐
  lexicon: BDAG
  rationale: κοινωνία는 단순한 따뜻한 사귐이 아니라 복음의 전진에 함께 참여하는 능동적 결속이다. 「동역」은 사역적 협력의 의미를 가장 잘 담아낸다. 「사귐」은 본문 흐름에 비해 가볍다.
- source_word: εἰς τὸ εὐαγγέλιον
  english_pob_choice: in the gospel
  chosen_korean: 복음 안에서
  alternatives_korean:
  - 복음을 위한
  - 복음을 향한
  lexicon: BDAG
  rationale: εἰς는 흔히 방향성(「~을 위한」)을 가지지만, 이 결속 구문에서는 함께함의 영역·목적을 함께 표현한다. 영어 POB의 「in」 선택을 따라 「안에서」로 옮기되, 각주로 「~을 위한」 가능성을 둔다.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_korean: 복음
  alternatives_korean:
  - 좋은 소식
  lexicon: BDAG
  rationale: 「복음」이 바울 신학의 무게를 담은 정립된 한국어 어휘이며, 「좋은 소식」은 일반어로 무게가 약하다.
- source_word: ἀπὸ τῆς πρώτης ἡμέρας
  english_pob_choice: from the first day
  chosen_korean: 첫날부터
  alternatives_korean:
  - 처음 날부터
  lexicon: BDAG
  rationale: 빌립보 성도의 참여 시점을 명확히 표시하는 간결한 한국어.
- source_word: ἄχρι τοῦ νῦν
  english_pob_choice: until now
  chosen_korean: 지금까지
  alternatives_korean:
  - 이제까지
  - 현재까지
  lexicon: BDAG
  rationale: 현재 순간까지의 연속성을 자연스럽게 표현한다.
