review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: circunstancia temporal al segar, prohibición de no agotar el borde del campo y de no recoger lo dejado de la cosecha. Sin embargo, omite una alternativa léxica importante ya documentada en el rastro inglés para פְּאַת שָׂדְךָ (''edge/corner of your field''), y la elección ''espigas caídas'' para לֶקֶט estrecha innecesariamente el referente, que incluye los restos dejados en la siega y no solo espigas caídas al suelo.'
  spanish_quality_summary: El español es claro, natural y digno. 'Cuando siegues la cosecha de tu tierra' y 'no segarás por completo el borde de tu campo' funcionan bien. La mejora principal es usar un sustantivo más amplio y preciso para לֶקֶט, como 'los rebuscos', y añadir la nota léxica sobre 'borde/esquina'.
  glossary_alignment: No hay términos del glosario mayor implicados. La traducción mantiene bien el registro legal. 'Borde' encaja con la decisión POB; conviene preservar en nota la alternativa 'esquina'. 'Rebuscos' alinea mejor con el valor de 'gleanings' que 'espigas caídas'.
  issues:
  - severity: medium
    issue: Falta la nota léxica para פְּאַת שָׂדְךָ
    rationale: El POB inglés conservó explícitamente la alternativa 'corner of your field'. Dado que 'borde' es una elección interpretativa correcta pero no exhaustiva, la edición española debe reflejar esa alternativa en nota.
  - severity: medium
    issue: '''Espigas caídas'' reduce demasiado el sentido de לֶקֶט'
    rationale: לֶקֶט no se limita a espigas caídas; se refiere a lo dejado o disperso tras la siega, es decir, los rebuscos. La redacción actual puede sugerir solo grano en el suelo y no el concepto legal más amplio.
  revised_spanish_text: Cuando siegues la cosecha de tu tierra, no segarás por completo el borde[a] de tu campo, ni recogerás los rebuscos de tu cosecha.
  revised_footnotes:
  - marker: a
    text: O «la esquina de tu campo». El término hebreo puede denotar borde, lado o esquina; aquí se refiere a la parte exterior del campo que debe dejarse sin segar.
    reason: lexical_alternative
  revision_rationale: Se añadió la nota léxica ya sustentada por el expediente inglés para preservar la alternativa 'esquina'. Además, se cambió 'las espigas caídas' por 'los rebuscos' para reflejar con mayor precisión y amplitud legal el sentido de לֶקֶט sin perder claridad en español.
