base_translation:
  language: en
  yaml_path: translation/ot/2_kings/013/019.yaml
  text: Then the man of God was angry with him and said[a], “You should have struck five or six times; then you would have struck Aram until it was consumed[b]. But now you will strike Aram only three times.”
  footnotes:
