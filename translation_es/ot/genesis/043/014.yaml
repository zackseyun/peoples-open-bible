  text: וְ/אֵ֣ל שַׁדַּ֗י יִתֵּ֨ן לָ/כֶ֤ם רַחֲמִים֙ לִ/פְנֵ֣י הָ/אִ֔ישׁ וְ/שִׁלַּ֥ח לָ/כֶ֛ם אֶת אֲחִי/כֶ֥ם אַחֵ֖ר וְ/אֶת בִּנְיָמִ֑ין וַ/אֲנִ֕י כַּ/אֲשֶׁ֥ר שָׁכֹ֖לְתִּי שָׁכָֽלְתִּי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/014.yaml
  text: May God Almighty grant you mercy before the man[a], so that he may send back your other brother and Benjamin. And as for me, if I am bereaved[c][b], I am bereaved.
  footnotes:
  - marker: a
    text: Or 'grant you compassion before the man.' The Hebrew רַחֲמִים can denote mercy, compassion, or tender pity.
    reason: lexical_alternative
  - marker: b
    text: '''Your other brother'' refers to Simeon, who had been detained in Egypt.'
    reason: cross_reference
  - marker: c
    text: Or 'If I am bereaved of my children, I am bereaved.' The Hebrew repeats the same verb for emphasis, expressing Jacob's resignation.
    reason: lexical_alternative
