translation:
  language: es
  text: los que se recuestan en camas de marfil y se tienden[a] sobre sus divanes, y comen corderos del rebaño y terneros del establo[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se estiran» o «se echan» sobre sus divanes.
    reason: lexical_alternative
  - marker: b
    text: O «del establo de engorde», subrayando animales especialmente alimentados para el lujo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁכְבִים
  english_pob_choice: those who lie
  chosen_spanish: los que se recuestan
  alternatives_spanish:
  - los que yacen
  - los que están acostados
  lexicon: HALOT
  rationale: El participio funciona como sustantivo y describe de manera continua a quienes viven en comodidad. «Se recuestan» comunica bien la postura de relajación habitual sin perder el matiz descriptivo.
- source_word: מִטּוֹת שֵׁן
  english_pob_choice: beds of ivory
  chosen_spanish: camas de marfil
  alternatives_spanish:
  - lechos de marfil
  - camas incrustadas de marfil
  lexicon: HALOT
  rationale: La expresión hebrea es concisa y probablemente idiomática; «camas de marfil» conserva la imagen de lujo. «Camas» resulta natural en español y mantiene la referencia al mobiliario.
- source_word: וּסְרֻחִים
  english_pob_choice: sprawl
  chosen_spanish: se echan
  alternatives_spanish:
  - se tienden
  - se desploman
  - se estiran
  lexicon: HALOT
  rationale: El verbo expresa recostarse o estirarse con abandono. «Se echan» es una opción idiomática en español para la acción de recostarse de forma relajada y acomodada, sin sobreexplicar.
- source_word: עַל עַרְשׂוֹתָם
  english_pob_choice: on their couches
  chosen_spanish: sobre sus divanes
  alternatives_spanish:
  - sobre sus camas
  - sobre sus lechos
  - sobre sus sofás
  lexicon: HALOT
  rationale: Se conserva la distinción entre מִטּוֹת («camas») y עַרְשׂוֹתָם («divanes/couches»). «Divanes» comunica un entorno de banquete o lujo y distingue mejor el segundo término.
- source_word: וְאֹכְלִים
  english_pob_choice: and eat
  chosen_spanish: y comen
  alternatives_spanish:
  - y están comiendo
  - comiendo
  lexicon: HALOT
  rationale: El participio encadena acciones características; el presente simple en español expresa bien la serie descriptiva habitual.
- source_word: כָּרִים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos selectos
  - borregos
  lexicon: HALOT
  rationale: El término designa ovejas jóvenes aptas para banquete. «Corderos» es el equivalente claro y natural; el matiz de selección se deduce del contexto.
- source_word: מִצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de entre el rebaño
  lexicon: HALOT
  rationale: «Del rebaño» traduce de modo directo la procedencia y mantiene la imagen de escoger animales para comer.
- source_word: וַעֲגָלִים
  english_pob_choice: and calves
  chosen_spanish: y terneros
  alternatives_spanish:
  - y becerros
  - y novillos jóvenes
  lexicon: HALOT
  rationale: «Terneros» es el equivalente natural en español para animales jóvenes. Mantiene la sencillez del hebreo sin añadir precisión innecesaria.
- source_word: מִתּוֹךְ מַרְבֵּק
  english_pob_choice: from the stall
  chosen_spanish: del establo
  alternatives_spanish:
  - del corral
  - de la engorda
  - del establo de engorde
  lexicon: HALOT
  rationale: מַרְבֵּק alude al lugar donde se crían o engordan animales. «Del establo» es breve y comprensible en español; la idea de engorde queda sugerida por el contexto y puede explicitarse en nota.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: se mantuvo la serie participial descriptiva, se preservó la distinción entre camas y divanes, y se reflejó el matiz de lujo y exceso sin añadir interpretación. La revisión inglesa que cambió «lounge» por «sprawl» apoya aquí una solución más enérgica que simple «reclinarse».'
  spanish_consistency_notes:
  - Se usó «camas» para מִטּוֹת y «divanes» para עַרְשׂוֹתָם para conservar la distinción léxica.
  - Se evitó «SEÑOR» u otros reemplazos no pertinentes; no hay términos divinos en el versículo.
  - Se prefirió vocabulario común y digno («corderos», «terneros», «establo») para una lectura pública clara.
  - La nota sobre מַרְבֵּק preserva la tensión entre una traducción breve en el texto principal y la posibilidad de un matiz técnico de engorde.
