base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/011.yaml
  text: Far be it from me[a], by Yahweh, to stretch out my hand against Yahweh’s anointed. But now, please take the spear that is at his head, and the jar of water[c][b], and let us go.
  footnotes:
  - marker: a
    text: Or, 'Far be it from me from the LORD,' an idiom meaning strong refusal or abhorrence; 'by the LORD' reflects the oath-like force of the Hebrew.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD’s anointed.' The word is related to 'Messiah,' but here it refers to Saul as the king anointed by the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the LORD,'.
    reason: previous_rendering
