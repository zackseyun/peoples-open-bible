theological_decisions:
- issue: 황금률(7:12) — 율법과 예언서의 요약
  chosen_reading: 무엇이든지…똑같이 행하십시오. 이것이 율법이요 예언서이기 때문입니다
  alternative_readings:
  - 남에게 대접받고자 하는 대로 너희도 남을 대접하라
  rationale: 마태가 명시적으로 「이것이 율법과 예언자」라고 봉합한다(5:17의 「내가 율법이나 예언서를 폐하러…」와 인클루지오). 한국어에서도 「율법이요 예언서」 정형을 유지해 산상수훈의 구조적 연결을 살린다.
  doctrine_reference: 'Preserve Matthew''s inclusio: 5:17 ↔ 7:12'
