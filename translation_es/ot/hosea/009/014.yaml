translation:
  language: es
  text: Dales[a], Yahvé—¿qué les darás? Dales un vientre que aborta y pechos secos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un vientre que deja sin hijos». El participio hebreo también puede llevar la idea de causar pérdida de hijos; «vientre que aborta» hace más explícito el juicio reproductivo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּן
  english_pob_choice: Give
  chosen_spanish: Dales
  alternatives_spanish:
  - Da
  - Concede
  lexicon: HALOT
  rationale: El imperativo de נתן dirigido a Dios pide una forma breve y directa en español. «Dales» conserva el tono de súplica y de juicio inminente del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se rinde como «Yahvé» según la convención doctrinal del proyecto, preservando el nombre divino personal en vez de sustituirlo por un título.
- source_word: מַה תִּתֵּן
  english_pob_choice: what will you give?
  chosen_spanish: ¿qué les darás?
  alternatives_spanish:
  - ¿qué darás?
  - ¿qué les vas a dar?
  lexicon: HALOT
  rationale: La pregunta retórica en futuro reproduce mejor la fuerza inmediata del hebreo en contexto de oración y juicio. El objeto pronominal «les» explicita el referente ya presente en el primer imperativo.
- source_word: רֶחֶם
  english_pob_choice: womb
  chosen_spanish: vientre
  alternatives_spanish:
  - matriz
  - útero
  lexicon: HALOT
  rationale: Aunque «útero» es más técnico, «vientre» es natural en español bíblico moderno y mantiene la imagen reproductiva sin sonar clínico.
- source_word: מַשְׁכִּיל
  english_pob_choice: miscarrying
  chosen_spanish: abortivo
  alternatives_spanish:
  - que aborta
  - que provoca aborto
  - estéril
  lexicon: HALOT
  rationale: El participio aquí funciona adjetivalmente con «vientre». «Abortivo» transmite que el vientre no lleva la gestación a término y conserva la dureza del juicio; «estéril» sería más débil y desplazaría el matiz.
- source_word: וְ/שָׁדַ֖יִם
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - senos
  - mamas
  lexicon: HALOT
  rationale: «Pechos» mantiene el referente corporal concreto del hebreo con registro bíblico claro en español. Evita la tecnicidad de «mamas» y la posible ambigüedad de «senos».
- source_word: צֹמְקִים
  english_pob_choice: dry
  chosen_spanish: secos
  alternatives_spanish:
  - marchitos
  - ajados
  - sin leche
  lexicon: HALOT
  rationale: «Secos» es la equivalencia breve y directa para la imagen de pechos sin leche/nutrición. Conserva la concisión del participio hebreo.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión del POB de preservar el nombre propio del pacto. «Yahvé» es la forma española estable del transliterado y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El auditorio inglés mantiene alta concordancia y no requiere ajustes textuales adicionales; la presente propuesta sigue el mismo sentido, trasladando la elección de «miscarrying womb» a una solución española idiomática sin suavizar la dureza del juicio.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» en lugar de «SEÑOR» para alinearse con la política del proyecto.
  - Se mantiene la imaginería corporal concreta («vientre», «pechos») sin eufemizarla.
  - La pregunta retórica se vierte en futuro para reflejar el hebreo y el inglés auditado.
