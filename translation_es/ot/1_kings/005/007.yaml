translation:
  language: es
  text: Estos funcionarios[a] proveían para el rey Salomón y para todos los que se acercaban a la mesa del rey Salomón[b], cada uno en su mes; nada les faltaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delegados» o «gobernadores» para «funcionarios». El hebreo se refiere a administradores nombrados sobre distritos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todos los que se acercaban a la mesa del rey Salomón», una expresión para quienes tenían acceso a la mesa real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלְכְּלוּ
  english_pob_choice: provided for
  chosen_spanish: proveían para
  alternatives_spanish:
  - sostenían
  - suministraban
  - atendían a
  lexicon: HALOT
  rationale: El piel de כלכל expresa abastecer o mantener con provisiones. «Proveían para» conserva el sentido de suministrar lo necesario en un contexto administrativo y suena natural en español.
- source_word: הַנִּצָּבִים
  english_pob_choice: deputies
  chosen_spanish: delegados
  alternatives_spanish:
  - funcionarios
  - gobernadores
  - oficiales
  lexicon: HALOT
  rationale: El término alude a administradores nombrados sobre distritos. «Delegados» comunica bien la idea de personas encargadas por delegación, sin imponer el matiz moderno de «gobernadores».
- source_word: וְאֵת כָּל הַקָּרֵב אֶל שֻׁלְחַן הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: and for all who came near the table of King Solomon
  chosen_spanish: y para todos los que se acercaban a la mesa del rey Salomón
  alternatives_spanish:
  - y para todos los que llegaban a la mesa del rey Salomón
  - y para todos los que tenían acceso a la mesa del rey Salomón
  lexicon: HALOT
  rationale: El participio indica literalmente «los que se acercan». «Se acercaban a la mesa» preserva la imagen hebrea y deja visible que se trata de quienes tenían acceso a la mesa real.
- source_word: אִישׁ חָדְשׁוֹ
  english_pob_choice: each in his month
  chosen_spanish: cada uno en su mes
  alternatives_spanish:
  - cada hombre en su mes
  - uno por su mes
  lexicon: HALOT
  rationale: La expresión es distributiva y señala la rotación mensual. «Cada uno en su mes» reproduce el valor distributivo sin sobrecargar el español con una literalidad innecesaria.
- source_word: לֹא יְעַדְּרוּ דָּבָר
  english_pob_choice: they lacked nothing
  chosen_spanish: nada les faltaba
  alternatives_spanish:
  - no les faltaba nada
  - no omitían nada
  - nada faltaba
  lexicon: HALOT
  rationale: 'El verbo aquí comunica ausencia o carencia de lo necesario. «Nada les faltaba» es idiomático en español y conserva el resultado: no había ninguna carencia en el abastecimiento.'
theological_decisions:
- issue: Referencia a la mesa real como acceso privilegiado
  english_pob_reading: an expression for those with access to the royal table
  chosen_spanish_reading: una expresión para los que tenían acceso a la mesa real
  alternative_spanish_readings:
  - los que comían en la mesa del rey
  - los servidores de la mesa del rey
  rationale: El hebreo no describe solo proximidad física, sino una relación de acceso y provisión en el ámbito real. La redacción mantiene esa ambigüedad útil sin convertirla en una explicación interpretativa cerrada.
  doctrine_reference: Comentario lexical-contextual; no doctrinal
- issue: Rotación mensual de responsabilidad
  english_pob_reading: each in his month
  chosen_spanish_reading: cada uno en su mes
  alternative_spanish_readings:
  - uno por mes
  - cada uno durante su mes
  rationale: La frase indica distribución ordenada del servicio o provisión por meses. La traducción conserva la regularidad administrativa sin añadir más de lo que el texto dice.
  doctrine_reference: Comentario lexical-contextual; no doctrinal
translation_notes:
  revision_awareness: 'El borrador sigue el sentido confirmado en el texto hebreo y en la auditoría inglesa: suministro administrativo continuo, referencia a oficiales nombrados y la expresión idiomática sobre el acceso a la mesa real. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «rey Salomón» para conservar la apposición natural del hebreo y la claridad en español.
  - «Proveían para» conserva la idea de abastecer sin introducir una imagen demasiado doméstica.
  - «Mesa» se conserva literalmente porque el hebreo usa שֻׁלְחַן y la nota aclara el valor idiomático.
  - «Nada les faltaba» refleja la conclusión del versículo con una fórmula idiomática clara y fiel.
