    text: Or “If it pleases the king.”
    reason: lexical_alternative
  - marker: b
    text: “Beyond the River” is the Persian administrative term for the region west of the Euphrates.
    reason: cultural_note
  - marker: c
    text: Or “that they may grant me passage.”
