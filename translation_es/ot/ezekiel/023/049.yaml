review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juicio retributivo (''traerán sobre ustedes''), carga de los pecados idolátricos (''cargarán con los pecados de sus ídolos'') y fórmula de reconocimiento (''entonces sabrán''). También conserva correctamente el título divino compuesto como ''el Señor Yahvé'', en línea con la norma del proyecto para יהוה.'
  spanish_quality_summary: 'La principal falla es de legibilidad y fidelidad pronominal en ''Ellas traerán sobre ustedes su lascivia'': mezcla tercera persona plural femenina con segunda persona plural y añade un posesivo español mal construido (''su lascivia'') donde el hebreo dice claramente ''vuestra/su propia lascivia'' dirigida a las mismas destinatarias femeninas. En español natural y fiel conviene evitar ''Ellas'' sin antecedente y reparar el posesivo. El resto del versículo es claro y digno.'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: ''Yahvé'' para יהוה, ''ídolos'' con nota para el matiz peyorativo de גִלּוּלִים, y lenguaje judicial para נשא. Se requiere ajuste en la formulación de זִמַּתְכֶנָה para expresar correctamente el posesivo de segunda persona femenina plural en español sin crear una construcción defectuosa.'
  issues:
  - severity: high
    issue: Construcción defectuosa y posesivo incorrecto en 'Ellas traerán sobre ustedes su lascivia'
    rationale: El hebreo זִמַּתְכֶנָה significa 'vuestra/su lascivia' refiriéndose a las destinatarias femeninas. En español, 'sobre ustedes su lascivia' suena gramaticalmente mal y ambiguo; además, 'Ellas' introduce un sujeto no explicitado en el contexto inmediato del versículo. Debe repararse para que el juicio recaiga sobre las mismas destinatarias de forma clara y natural.
  - severity: medium
    issue: Nota al pie [a] está anclada en 'lascivia' pero comenta גִלּוּלִים ('ídolos')
    rationale: La nota explica el término hebreo para 'ídolos', por lo que el marcador debe ir junto a 'ídolos', no junto a 'lascivia', para mantener correspondencia exacta entre texto y nota.
  revised_spanish_text: Harán recaer sobre ustedes su lascivia, y ustedes cargarán con los pecados de sus ídolos[a]; entonces sabrán que yo soy el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: Hebreo גִלּוּלִים es un término fuertemente despectivo para los ídolos; también puede verterse como “ídolos inmundos” o, con más viveza, “ídolos de estiércol”.
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'Ellas traerán' por 'Harán recaer' para evitar un sujeto español innecesariamente explícito y mantener la idea judicial de que la lascivia les será puesta encima. Se eliminó la construcción defectuosa 'sobre ustedes su lascivia' preservando el posesivo correcto en una formulación natural. También se movió la nota al pie al término 'ídolos', que es la palabra a la que realmente corresponde la observación léxica sobre גִלּוּלִים.
