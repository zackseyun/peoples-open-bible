translation:
  language: es
  text: 'No[a], más bien, hicimos esto por preocupación por este asunto, diciendo: «Mañana, sus hijos e hijas podrán decirles a nuestros hijos e hijas: “¿Qué tienen ustedes que ver con Yahvé, el Dios de Israel?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijos ... nuestros hijos». Aquí «hijos e hijas» refleja el sentido generacional del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם לֹא
  english_pob_choice: No, rather
  chosen_spanish: No, más bien
  alternatives_spanish:
  - Si no
  - Ciertamente no
  lexicon: HALOT
  rationale: En este contexto no introduce una condición simple, sino una negación correctiva frente a la acusación previa. «No, más bien» conserva esa fuerza discursiva en español.
- source_word: מִדְּאָגָה
  english_pob_choice: out of concern
  chosen_spanish: por preocupación
  alternatives_spanish:
  - por ansiedad
  - por temor
  - por inquietud
  lexicon: HALOT
  rationale: El sustantivo expresa preocupación, ansiedad o inquietud. «Por preocupación» transmite el matiz emocional sin exagerarlo como pánico.
- source_word: מִדָּבָר
  english_pob_choice: for a reason
  chosen_spanish: acerca de un asunto
  alternatives_spanish:
  - por un asunto
  - sobre un asunto
  - por esta cuestión
  lexicon: HALOT
  rationale: La secuencia hebrea es idiomática y alude a una preocupación vinculada con un asunto concreto. En español, «acerca de un asunto» conserva esa relación sin forzar una calca.
- source_word: עָשִׂינוּ אֶת זֹאת
  english_pob_choice: we did this
  chosen_spanish: hicimos esto
  alternatives_spanish:
  - hemos hecho esto
  - realizamos esto
  lexicon: HALOT
  rationale: Es una acción pasada simple y directa. «Hicimos esto» suena natural y fiel al contexto narrativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Introduce la cita del temor expresado por ellos. «Diciendo» mantiene la cercanía formal al hebreo.
- source_word: מָחָר
  english_pob_choice: Tomorrow / in time to come
  chosen_spanish: Mañana
  alternatives_spanish:
  - En el futuro
  - Más adelante
  lexicon: HALOT
  rationale: El texto fuente usa literalmente «mañana», y el audit trail inglés revisó esta decisión de manera explícita. En español, mantener «Mañana» preserva la formulación concreta del hebreo.
- source_word: בְנֵיכֶם לְבָנֵינוּ
  english_pob_choice: your children ... our children
  chosen_spanish: sus hijos ... nuestros hijos
  alternatives_spanish:
  - sus hijos ... nuestros hijos
  - sus descendientes ... nuestros descendientes
  - sus niños ... nuestros niños
  lexicon: HALOT
  rationale: El hebreo usa el masculino plural, pero el contexto es generacional, no exclusivamente masculino. «Hijos» conserva la referencia familiar y generacional con naturalidad en español.
- source_word: מַה לָּכֶם וְלַיהוָה
  english_pob_choice: What have you to do with Yahweh
  chosen_spanish: ¿Qué tienen ustedes que ver con Yahvé?
  alternatives_spanish:
  - ¿Qué tienen que ver ustedes con Yahvé?
  - ¿Qué relación tienen ustedes con Yahvé?
  lexicon: HALOT
  rationale: La frase es un modismo de desvinculación o rechazo de relación. «¿Qué tienen ustedes que ver con…?» reproduce bien el tono confrontativo y el sentido idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de ocultarlo con un sustituto como «SEÑOR».'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es la construcción normal del hebreo y preserva la identificación pactual en español de manera clara y reverente.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo contiene explícitamente el Tetragrámaton. Conforme a la terminología del proyecto, se conserva el nombre propio divino como «Yahvé», evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia generacional en בנים
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: La advertencia se refiere a generaciones futuras en general. En español, «hijos» funciona de manera natural como plural generacional, sin restringir indebidamente el alcance al sexo masculino.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más literal de מִדָּבָר y conservó «Tomorrow»; por eso la línea española mantiene «Mañana» y traduce la segunda expresión con un sustantivo concreto («asunto») sin expandir el sentido. También se respetó la decisión auditada de usar el nombre divino transliterado y de leer בנים de forma generacional.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el tono directo y correctivo de la apertura («No, más bien»).
  - «Hijos» se emplea con valor generacional, no como restricción masculina biológica.
