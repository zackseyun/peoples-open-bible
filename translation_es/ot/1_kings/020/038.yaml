    text: 'Hebreo: «con ceniza sobre sus ojos». La expresión puede referirse ya sea a ceniza literal o, en este contexto, a un cubrimiento o venda usado como disfraz.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura narrativa a «Entonces» para reflejar mejor el avance del relato, y se reemplaza la construcción poco idiomática «para el rey» por «esperando al rey», que expresa con claridad la finalidad contextual de su posición junto al camino sin sobreinterpretar el hebreo. Se conserva la decisión léxica principal «venda» con la nota alternativa sobre «ceniza».
