review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB en casi todos los segmentos: convocación de toda la comunidad, fecha calendárica, registro genealógico-censal, divisiones por clanes y casas paternas, conteo por nombres, umbral de edad y conteo individual. Sin embargo, la nota [a] está anclada en ''asamblea'' pero explica el verbo raro וַיִּתְיַלְדוּ, no ese sustantivo; por tanto, no preserva correctamente la evidencia fuente ni la auditoría inglesa. También conviene mejorar la fórmula de edad para español más natural y más fiel a ''and upward''.'
  spanish_quality_summary: El texto es claro y ampliamente legible, con buen registro bíblico moderno. 'Toda la asamblea', 'por sus clanes' y 'cabeza por cabeza' funcionan bien. Los principales problemas son de colocación de nota y una leve aspereza en 'desde los veinte años de edad y más', que suena menos idiomático que 'de veinte años para arriba' o 'de veinte años en adelante'.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son apropiadas: עֵדָה -> ''asamblea'', מִשְׁפָּחָה -> ''clanes'', לְבֵית אֲבֹתָם -> ''las casas de sus padres'', y לְגֻלְגְּלֹתָם -> ''cabeza por cabeza''. La excepción necesaria es corregir la nota del verbo raro וַיִּתְיַלְדוּ y anclarla en ''se registraron[a]''.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: En el borrador, [a] aparece sobre 'asamblea', pero el contenido de la nota describe el verbo raro וַיִּתְיַלְדוּ ('se registraron / declararon su ascendencia'), no כָּל הָעֵדָה. Esto desaline­a fuente, traducción y aparato de notas.
  - severity: medium
    issue: El contenido de la nota [a] además introduce 'reunieron' como alternativa, que corresponde a הִקְהִילוּ y no al ancla actual ni al enfoque del POB inglés.
    rationale: La auditoría inglesa preserva para וַיִּתְיַלְדוּ alternativas como 'declararon su ascendencia' o 'se inscribieron por genealogía'. La nota española debe seguir esa decisión léxica, no mezclarla con el verbo anterior.
  - severity: low
    issue: La fórmula 'desde los veinte años de edad y más' suena poco natural en español bíblico actual.
    rationale: Aunque comprensible, no es la manera más idiomática de expresar מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה. 'De veinte años en adelante' mantiene el sentido umbral de forma más natural y digna.
