base_translation:
  language: en
  yaml_path: translation/deuterocanon/susanna/001/048.yaml
  text: But he stood in their midst and said[a], “Are you such fools, sons of Israel? Without examining the matter or even learning the facts clearly[b], have you condemned a daughter of Israel?”
  footnotes:
  - marker: a
    text: Or “Are you so foolish, sons of Israel?” The Greek rebuke Οὕτως μωροί can be rendered either with the noun “fools” or the adjective “foolish.”
    reason: lexical_alternative
  - marker: b
    text: Or “without investigating and without ascertaining the plain facts.” The Greek wording is judicial in tone, stressing failure to examine the case properly before condemning Susanna.
    reason: lexical_alternative
