translation:
  language: es
  text: Si andan en mis estatutos y guardan mis mandamientos y los ponen por obra,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siguen mis estatutos». El hebreo dice literalmente «andan en mis estatutos», un modismo del pacto para ordenar la vida conforme a ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si de veras
  - Cuando
  lexicon: HALOT
  rationale: La cláusula introduce una condición explícita; «si» conserva ese valor condicional sin suavizarlo. «Cuando» debilitaría la fuerza de la formulación del pacto.
- source_word: בְּחֻקֹּתַי
  english_pob_choice: in my statutes
  chosen_spanish: en mis estatutos
  alternatives_spanish:
  - según mis estatutos
  - por mis estatutos
  - en mis decretos
  lexicon: HALOT
  rationale: El hebreo usa ב con el sustantivo para expresar el ámbito o norma de conducta; «en mis estatutos» reproduce bien la imagen de andar dentro de ese marco normativo. «Estatutos» mantiene el matiz legal-covenantal.
- source_word: תֵּלֵכוּ
  english_pob_choice: you walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - viven
  - se conducen
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «caminar», pero en este contexto es un modismo de conducta. En español, «andar» conserva mejor la metáfora que «vivir» o «conducirse», y resulta natural en una lectura bíblica sin perder el color del original.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: «Mandamientos» es la correspondencia más estable para מִצְוָה en registro bíblico y se coordina bien con «estatutos». «Mandatos» sería posible, pero menos preciso en el tono legal y pactal del versículo.
- source_word: תִּשְׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  - conservan
  lexicon: HALOT
  rationale: שמר en contextos legales expresa custodiar/observar fielmente. «Guardar» es la opción más cercana en español bíblico contemporáneo y evita reducir el verbo a mera obediencia externa.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los cumplen
  alternatives_spanish:
  - y los hacen
  - y obran conforme a ellos
  - y los ponen por obra
  lexicon: HALOT
  rationale: עָשָׂה con objeto pronominal indica ejecutar realmente los mandamientos. «Cumplen» comunica la realización efectiva y suena natural en español; «hacerlos» sería más literal, pero menos idiomático en este contexto.
theological_decisions:
- issue: Preservar el modismo del pacto «caminar» sin perder claridad
  english_pob_reading: Retain the metaphor 'walk in my statutes' rather than flattening it to 'live by' or 'obey.'
  chosen_spanish_reading: Conservar el modismo con «andan en mis estatutos» en vez de reducirlo a «viven según mis estatutos» o «obedecen mis estatutos».
  alternative_spanish_readings:
  - viven según mis estatutos
  - obedecen mis estatutos
  - siguen mis estatutos
  rationale: El hebreo presenta una imagen de vida ordenada bajo la norma divina. «Andan» mantiene la metáfora del caminar y, junto con «guardan» y «cumplen», comunica el sentido de obediencia pactal sin borrar la textura figurada del original.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase.'
translation_notes:
  revision_awareness: 'Revisión alineada con el expediente auditado: se conserva la equivalencia óptima de la versión inglesa, sin cambios respecto del último pase, y se mantiene el énfasis en el modismo pactal del caminar junto con la progresión obediencial «andar / guardar / cumplir».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene «estatutos» y «mandamientos» para respetar el registro legal-pactual del hebreo.
  - «Andan» conserva la metáfora verbal de הלך; la nota al pie ofrece la alternativa más explícita «siguen».
  - «Guardan» y «cumplen» reflejan la secuencia hebrea de custodiar y ejecutar los mandamientos sin añadir contenido doctrinal no presente en el texto.
