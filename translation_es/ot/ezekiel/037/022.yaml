revisions:
- from: Y los haré un solo pueblo en la tierra[a], en los montes de Israel; y un solo rey será rey de todos ellos. No serán ya dos naciones[b], ni estarán divididos en dos reinos.
  to: Y los haré una sola nación en la tierra[a], en los montes de Israel; y un solo rey será rey de todos ellos.[b] Ya no serán dos naciones, y ya no estarán divididos en dos reinos.
  rationale: Se revisa «un solo pueblo» a «una sola nación» para respetar mejor גוי y el paralelismo con «dos naciones». Se ajusta la cláusula final para reflejar más claramente la doble fuerza de עוֹד con «ya no ... y ya no ...», manteniendo un español natural y digno. Se conservan las notas existentes porque siguen siendo pertinentes y sus marcadores quedan correctamente anclados en el texto.
