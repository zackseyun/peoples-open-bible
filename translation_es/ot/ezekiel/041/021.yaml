    reason: lexical_alternative
  revision_rationale: Se corrige «pórtico» a «nave» para reflejar fielmente הֵיכָל en el contexto del templo de Ezequiel y alinearse con la decisión auditada. Se cambia «jamba» por «marco de puerta» para representar mejor מְזוּזַת como unidad arquitectónica cuadrada. Se mejora la redacción de la nota explicativa para un español más natural y preciso.
