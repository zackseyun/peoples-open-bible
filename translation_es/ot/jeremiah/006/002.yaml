translation:
  language: es
  text: He comparado a la hija de Sión con una mujer[a] hermosa y delicada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «he destruido a la hija de Sión, la hermosa y delicada». El verbo hebreo es difícil aquí, y algunos lo entienden con sentido destructivo en vez de «he comparado».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּוָה
  english_pob_choice: lovely
  chosen_spanish: hermosa
  alternatives_spanish:
  - bonita
  - linda
  - bella
  lexicon: HALOT
  rationale: El adjetivo hebreo describe belleza/atractivo en este contexto poético. En español, 'hermosa' transmite bien esa cualidad con registro digno y natural. 'Bella' sería posible, pero 'hermosa' suena más fluido en esta construcción.
- source_word: וְהַמְּעֻנָּגָה
  english_pob_choice: delicate
  chosen_spanish: delicada
  alternatives_spanish:
  - refinada
  - mimada
  - delicada y fina
  lexicon: HALOT
  rationale: El término apunta a suavidad, fineza o trato delicado. 'Delicada' conserva esa idea sin introducir una valoración moral de 'mimada' ni una sobreinterpretación social de 'refinada'.
- source_word: דָּמִיתִי
  english_pob_choice: I have likened
  chosen_spanish: he comparado
  alternatives_spanish:
  - he asemejado
  - comparo
  - he destruido
  lexicon: HALOT
  rationale: La forma verbal admite una lectura de comparación y el contexto de los adjetivos femeninos favorece esa lectura. 'He comparado' es la manera más natural en español para mantener la imagen de símil sin forzar el verbo.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: la hija de Sion
  alternatives_spanish:
  - Hija de Sion
  - la hija de Sión
  - Daughter Zion
  lexicon: HALOT
  rationale: En español, el equivalente más claro y auditable de la personificación es 'la hija de Sion'. Mantiene el constructo hebreo sin convertirlo en un título litúrgico ni borrar la personificación.
- source_word: implicit feminine referent
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  - doncella
  - persona
  lexicon: English audit trail implicit supplement
  rationale: El hebreo solo aporta adjetivos femeninos; español requiere un sustantivo explícito para que la comparación sea idiomática. 'Mujer' es el suplemento menos interpretativo y más neutro.
theological_decisions:
- issue: Lectura principal de דָּמִיתִי
  english_pob_reading: The verse compares daughter Zion to a beautiful, delicate woman.
  chosen_spanish_reading: 'El verso presenta una comparación: la hija de Sion es comparada con una mujer hermosa y delicada.'
  alternative_spanish_readings:
  - 'El verso podría significar: ''He destruido a la hija de Sion, la hermosa y delicada.'''
  rationale: Se preserva la lectura comparativa que mejor encaja con los adjetivos y con el valor más directo de דמה, sin ocultar la tensión textual. La alternativa destructiva queda reconocida porque el hebreo es difícil y la POB inglesa la documenta.
  doctrine_reference: Preservar la tensión textual y la primacía del original, sin resolver artificialmente la ambigüedad.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; el texto inglés quedó sin cambios en el último pase, aunque el control cruzado marcó revisión pendiente por la dificultad principal del verbo hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Sion' sin tilde para seguir el uso bíblico habitual en español y la forma del nombre propio en transliteración tradicional.
  - Se evita 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
  - Se usa el pasado perfecto compuesto ('he comparado') para reflejar el valor verbal de la forma hebrea y la lectura auditada de la POB inglesa.
