id: PHM.1.25
reference: Philemon 1:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἡ χάρις τοῦ ⸀κυρίου Ἰησοῦ Χριστοῦ μετὰ τοῦ πνεύματος ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/025.yaml
  text: The grace of the Lord Jesus Christ be with your spirit[a][b].
  footnotes:
  - marker: a
    text: Or, traditionally, 'The grace of the Lord Jesus Christ be with your spirit.'
    reason: alternative_reading
  - marker: b
    text: The pronoun 'your' is plural, reflecting that the closing blessing extends beyond Philemon alone to the gathered recipients of the letter.
    reason: lexical_alternative
translation:
  language: ko
  text: 주 예수 메시아[a]의 은혜가 여러분의[b] 영과 함께하기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 전통적으로 「주 예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: alternative_reading
  - marker: b
    text: 「여러분」은 복수 인칭대명사이며, 마무리 축복이 빌레몬 한 사람만이 아니라 편지의 모든 수신자에게 미친다는 것을 반영한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  alternatives_korean:
  - 호의
  - 은총
  lexicon: BDAG
  rationale: 바울 서신 축복 정형의 표준 어휘. 3절과 일관되게 「은혜」.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 기본값 「주」. 3절과 일관성 유지.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 본 번역의 칭호 원칙에 따라 「메시아」로 옮긴다. 3절과 일관성 유지.
- source_word: μετὰ
  english_pob_choice: with
  chosen_korean: 함께하기를 빕니다
  alternatives_korean:
  - 함께 있기를
  - 함께 있게 되기를
  lexicon: BDAG
  rationale: 동사가 생략된 축복 정형. 한국어로는 「함께하기를 빕니다」가 축복문의 어조를 가장 자연스럽게 살린다.
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_korean: 영
  alternatives_korean:
  - 영혼
  - 성령
  lexicon: BDAG
  rationale: 소문자 「영」을 유지. 「여러분의 영」은 수신자들의 내면·속사람을 가리키며, 직접적으로 성령을 가리키지 않는다. 글로서리 원칙(πνεῦμα의 신적 영 force가 명백할 때만 「성령」)을 따른다.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_korean: 여러분의
  alternatives_korean:
  - 그대들의
  lexicon: BDAG
  rationale: 복수 2인칭. 빌레몬을 넘어 가정 회중 전체를 향한 마무리 축복이므로 「여러분」으로 복수성을 살린다.
theological_decisions:
- issue: 마무리 축복의 Χριστοῦ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관된 원칙. 축복 정식에서도 칭호의 무게가 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: 「여러분의 영」에서 「영」의 지시 대상
  chosen_reading: 수신자들의 인간적 영·속사람
  alternative_readings:
  - 성령
  rationale: 소유 「여러분의」는 수신자들의 영을 강하게 가리키며 성령이 아니다. 본문이 명시하지 않는 신학적 주장을 더하지 않기 위해 대문자화하지 않고 「영」으로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
