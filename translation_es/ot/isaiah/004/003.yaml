    text: 'O: «todo el que esté escrito entre los vivos en Jerusalén».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «inscrito para vida» puede aludir a un registro oficial de quienes quedaron con vida y también evoca el motivo bíblico más amplio del libro de la vida.
    reason: cross_reference
  revision_rationale: Se corrigió la ubicación de las notas para anclarlas a la frase pertinente. Se reemplazó «sea dejado» por «quede» para un español más natural sin perder la idea de remanente. Se ajustó «registrado» a «inscrito» por mayor fluidez y mejor conexión con el participio «escrito» de la nota alternativa. También se sustituyó la raya por dos puntos, que aquí fluye mejor en español para introducir la aposición explicativa.
