revisions:
- from: Desde la sangre de los caídos[a], desde la grasa de los valientes[b], el arco de Jonatán no retrocedió, y la espada de Saúl no volvió vacía.
  to: Ante la sangre de los caídos, ante la grasa de los poderosos[a], el arco de Jonatán no retrocedió[b], y la espada de Saúl no volvió vacía.
  rationale: 'Se reemplazó «desde» por «ante» para expresar de forma idiomática y poética el sentido contextual del hebreo sin perder la imagen de que las armas no se echaron atrás frente a la carnicería de la batalla. Se corrigió la ubicación de las notas para que coincidan con el audit trail inglés: la alternativa verbal va en «no retrocedió», y la nota sobre «grasa» permanece en ese término. También se ajustó «los valientes» a «los poderosos» para acercarse mejor al registro de גִּבּוֹרִים / «the mighty».'
