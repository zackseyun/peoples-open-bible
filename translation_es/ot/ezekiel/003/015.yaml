translation:
  language: es
  text: Entonces llegué a los exiliados en Tel-abib[a], que vivían junto al río Kebar[b], donde ellos vivían; y me senté allí entre ellos durante siete días, atónito[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tel-abib: se conserva el topónimo antiguo transliterado; no debe confundirse con la ciudad moderna de Tel Aviv.'
    reason: cultural_note
  - marker: b
    text: 'Kebar: transliteración del nombre del río. En algunas tradiciones españolas también aparece como «Quebar» o «Chebar».'
    reason: lexical_alternative
  - marker: c
    text: «Atónito» traduce un hebreo que también puede entenderse como «consternado» o «estupefacto». El sentido central es un estado de shock o devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la comunidad de los desterrados
  lexicon: HALOT
  rationale: El hebreo nombra a las personas en condición de destierro, no la abstracción del cautiverio. ‘Desterrados’ conserva esa referencia colectiva y suena natural en español bíblico contemporáneo.
- source_word: תֵּל אָבִיב
  english_pob_choice: Tel-abib
  chosen_spanish: Tel-abib
  alternatives_spanish:
  - Tel Aviv
  lexicon: HALOT
  rationale: Es un topónimo antiguo. Se conserva la transliteración con guion para señalar el nombre compuesto y evitar confusión con la ciudad moderna.
- source_word: הַיֹּשְׁבִים אֶל־נְהַר כְּבָר
  english_pob_choice: who were living by the Kebar River
  chosen_spanish: que habitaban junto al río Quebar
  alternatives_spanish:
  - que vivían junto al río Quebar
  - que estaban asentados junto al río Quebar
  lexicon: HALOT
  rationale: ‘Habitar’ reproduce bien el sentido de residencia estable del participio, y ‘junto a’ expresa con naturalidad la relación locativa. ‘Quebar’ sigue la transliteración habitual del nombre propio.
- source_word: וַאֲשֶׁר הֵמָּה יוֹשְׁבִים שָׁם
  english_pob_choice: where they were living
  chosen_spanish: donde ellos habitaban
  alternatives_spanish:
  - donde vivían
  - y donde estaban habitando
  lexicon: HALOT
  rationale: La cláusula hebrea es repetitiva y sintácticamente compacta. ‘Donde ellos habitaban’ preserva la repetición enfática sin introducir elementos ajenos al texto, como ‘vi’ o ‘estaban establecidos’.
- source_word: וָאֵשֵׁב שָׁם
  english_pob_choice: and I sat there
  chosen_spanish: y me senté allí
  alternatives_spanish:
  - y permanecí allí sentado
  - y estuve allí sentado
  lexicon: HALOT
  rationale: El verbo es literalmente ‘sentarse’. En español, ‘me senté allí’ conserva la concreción del gesto; el matiz de permanencia queda sugerido por el contexto y por la duración posterior.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: ‘Durante’ expresa mejor la duración continua en español estándar que ‘for’ traducido mecánicamente.
- source_word: מַשְׁמִים
  english_pob_choice: appalled
  chosen_spanish: abrumado
  alternatives_spanish:
  - atónito
  - consternado
  - estupefacto
  lexicon: HALOT
  rationale: El término hebreo describe una reacción de shock, devastación o aturdimiento. ‘Abrumado’ comunica bien el impacto emocional y mantiene la amplitud semántica sin reducirlo sólo a sorpresa intelectual.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: HALOT
  rationale: ‘Entre ellos’ es la forma más natural y clara en español para indicar presencia dentro del grupo.
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura de llegada, ubicación repetida y permanencia de siete días, y nota una ambigüedad léxica en מַשְׁמִים; la propuesta española conserva esa tensión semántica con «abrumado» y evita añadir acciones no presentes en el hebreo.
  spanish_consistency_notes:
  - 'Se preserva la secuencia narrativa del hebreo: llegada, ubicación de los desterrados, repetición locativa, permanencia de siete días y estado emocional final.'
  - Se usa «desterrados» para mantener el enfoque en las personas en exilio, coherente con la decisión POB en inglés.
  - Se mantiene la transliteración de nombres propios antiguos sin adaptar al uso moderno de la ciudad de Tel Aviv.
