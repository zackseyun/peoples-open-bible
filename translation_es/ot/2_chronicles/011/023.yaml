translation:
  language: es
  text: Y actuó con discernimiento[a] y dispersó a algunos de todos sus hijos por todas las tierras de Judá y de Benjamín, a todas las ciudades fortificadas[b]; les dio abundantes provisiones y buscó muchas esposas para ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''mostró entendimiento'' o ''actuó con discernimiento''.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, dispuso a algunos de sus hijos en las ciudades fortificadas, no en todas las ciudades a la vez.
    reason: lexical_alternative
  - marker: c
    text: 'Es decir, arregló matrimonios para sus hijos; el hebreo dice literalmente: ''y buscó una multitud de esposas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֶן
  english_pob_choice: He acted wisely
  chosen_spanish: actuó con discernimiento
  alternatives_spanish:
  - actuó sabiamente
  - entendió
  - mostró discernimiento
  lexicon: HALOT
  rationale: El hebreo expresa comprensión aplicada a una acción real de gobierno; en español, 'actuó con discernimiento' conserva la fuerza de juicio prudente sin volverlo una simple traducción mecánica de 'entendió'.
- source_word: וַיִּפְרֹץ מִכָּל בָּנָיו
  english_pob_choice: dispersed some of all his sons
  chosen_spanish: dispersó a algunos de todos sus hijos
  alternatives_spanish:
  - esparció a sus hijos
  - distribuyó a algunos de sus hijos
  - desparramó a sus hijos
  lexicon: HALOT
  rationale: Se conserva el matiz de dispersión geográfica. 'Algunos de todos sus hijos' refleja el valor partitivo de מִן sin forzar la idea de que cada hijo fue enviado a cada lugar.
- source_word: לְכָל אַרְצוֹת יְהוּדָה וּבִנְיָמִן
  english_pob_choice: throughout all the lands of Judah and Benjamin
  chosen_spanish: por todas las tierras de Judá y de Benjamín
  alternatives_spanish:
  - por todas las regiones de Judá y de Benjamín
  - en todas las tierras de Judá y de Benjamín
  lexicon: HALOT
  rationale: '''Tierras'' comunica de manera natural el sentido territorial de אַרְצוֹת y mantiene la referencia administrativa del texto.'
- source_word: לְכֹל עָרֵי הַמְּצֻרוֹת
  english_pob_choice: to all the fortified cities
  chosen_spanish: a todas las ciudades fortificadas
  alternatives_spanish:
  - a todas las ciudades amuralladas
  - a todas las ciudades fuertes
  lexicon: HALOT
  rationale: מְצֻרוֹת se refiere a ciudades defendidas o fortificadas; 'fortificadas' es el equivalente más directo y claro en español contemporáneo.
- source_word: הַמָּזוֹן לָרֹב
  english_pob_choice: abundant provisions
  chosen_spanish: abundantes provisiones
  alternatives_spanish:
  - alimento en abundancia
  - mucho sustento
  - provisiones en abundancia
  lexicon: HALOT
  rationale: מָזוֹן incluye provisión, alimento y sustento. 'Provisiones' mantiene el tono administrativo del pasaje y 'abundantes' reproduce לָרֹב.
- source_word: וַיִּשְׁאַ֖ל הֲמ֥וֹן נָשִׁים
  english_pob_choice: sought many wives for them
  chosen_spanish: buscó muchas esposas para ellos
  alternatives_spanish:
  - tomó para ellos muchas esposas
  - obtuvo muchas esposas para ellos
  - buscó muchas mujeres para ellos
  lexicon: HALOT
  rationale: שׁאל puede significar pedir o buscar. En este contexto de arreglos matrimoniales, 'buscó' evita una literalidad extraña y mantiene la idea de procurarlas para los hijos. 'Esposas' es más natural en español que 'mujeres' y refleja el sentido matrimonial.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el auditorio inglés revisado: conserva el inicio conjuntivo, el matiz partitivo de ''algunos de todos sus hijos'', la distribución territorial a ciudades fortificadas y la interpretación matrimonial de ''buscó muchas esposas''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - '''Judá'' y ''Benjamín'' se mantienen como nombres propios territoriales, con ''tierras'' para אַרְצוֹת.'
  - Se prefirió 'esposas' sobre 'mujeres' por claridad contextual y porque el objeto del verbo es el arreglo matrimonial.
