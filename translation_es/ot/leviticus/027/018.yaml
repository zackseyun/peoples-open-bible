  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido legal del hebreo: consagrar el campo después del Jubileo, cálculo sacerdotal prorrateado por los años restantes hasta el Jubileo, y reducción respecto de la valoración. Conserva correctamente la segunda persona singular en מֵעֶרְכֶּךָ como «tu».'
  spanish_quality_summary: El español es claro y mayormente natural, pero «y será deducido de tu valoración» suena algo torpe e impersonal en español bíblico-jurídico. También la nota b puede formularse mejor para corresponder al inglés auditado («assess the price»), evitando «calculará el precio», que suena menos idiomático. Una leve revisión mejora fluidez y precisión.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Consagra» para יַקְדִּישׁ está bien; «Jubileo» es adecuado; no aparecen términos sensibles como Yahvé/Mesías. La conservación de «tu valoración» sigue la decisión teológica documentada.
  issues:
  - severity: medium
    issue: «y será deducido de tu valoración» es poco natural en español
    rationale: Aunque semánticamente correcto, el pasivo con «será deducido» sin sujeto expreso suena rígido. «y se deducirá de tu valoración» mantiene el valor legal/monetario de וְנִגְרַע y lee mejor en español.
  - severity: low
    issue: La nota alternativa b no refleja de la mejor manera la alternativa auditada
    rationale: El inglés ofrece «the priest shall assess the price for him». En español es más natural «el sacerdote le tasará el precio» que «el sacerdote le calculará el precio» para expresar una tasación/avaluación.
  revised_spanish_text: Pero si consagra su campo después del Jubileo[a], el sacerdote calculará para él el dinero[b] según los años que queden hasta el año del Jubileo, y se deducirá de tu valoración[c].
  revised_footnotes:
