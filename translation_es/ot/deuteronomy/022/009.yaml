revisions:
- from: No sembrarás tu viña con dos clases de semilla, no sea que se haga [a] sagrada la plenitud, la semilla que siembras y el fruto de la viña.
  to: 'No sembrarás tu viña con dos clases de semilla, no sea que se pierda[a] toda la cosecha: la semilla que siembres y el producto de la viña.'
  rationale: Se ajusta תִּקְדַּשׁ al sentido legal documentado por el POB ('se pierda' como consecuencia de quedar vedado/forfeitado), mientras la nota conserva la alternativa más literal de consagración. Se reemplaza 'la plenitud' por 'toda la cosecha' para reflejar הַמְלֵאָה con español natural y claro. También se mejora la fluidez de la enumeración final sin apartarse del sentido fuente.
