    rationale: El inglés POB documenta explícitamente la alternativa ortográfica 'Amassai' para עֲמָשַׂי. Trasladar esa nota a 'Ahimot' altera la evidencia lexical auditada y puede inducir a error sobre qué nombre tiene variante documentada.
  - severity: low
    issue: El texto de la nota menciona 'siguiendo una convención inglesa de transliteración' para 'Ahimoth'.
    rationale: Aunque 'Ahimoth' es una transliteración inglesa plausible del hebreo, esa no es la alternativa preservada en el expediente auditado para este versículo. La nota debe reflejar la alternativa real o eliminarse.
