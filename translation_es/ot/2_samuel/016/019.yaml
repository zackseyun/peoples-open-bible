revisions:
- from: Y en segundo lugar[a], ¿a quién he de servir? ¿No es antes de su hijo? Como he servido antes de tu padre, así estaré antes de ti.
  to: Y en segundo lugar, ¿a quién he de servir? ¿No ha de ser ante su hijo[a]? Como serví ante tu padre, así estaré ante ti.
  rationale: Se reemplaza «antes de» por «ante» en las tres ocurrencias para reflejar fielmente לִפְנֵי como modismo cortesano de presencia/servicio y evitar la ambigüedad temporal del español. Se ajusta «¿No es...?» a «¿No ha de ser...?» para acompañar mejor la pregunta retórica con infinitivo implícito de servicio. Se usa «serví» en vez de «he servido» por fluidez narrativa. La nota se mantiene, pero su marcador se traslada a la primera frase que realmente ilustra el modismo.
  reviewer_model: gpt-5.4
