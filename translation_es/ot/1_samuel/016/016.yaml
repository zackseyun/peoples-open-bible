  text: יֹאמַר נָ֤א אֲדֹנֵ֨/נוּ֙ עֲבָדֶ֣י/ךָ לְ/פָנֶ֔י/ךָ יְבַקְשׁ֕וּ אִ֕ישׁ יֹדֵ֖עַ מְנַגֵּ֣ן בַּ/כִּנּ֑וֹר וְ/הָיָ֗ה בִּֽ/הְי֨וֹת עָלֶ֤י/ךָ רֽוּחַ אֱלֹהִים֙ רָעָ֔ה וְ/נִגֵּ֥ן בְּ/יָד֖/וֹ וְ/ט֥וֹב לָֽ/ךְ־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/016.yaml
  text: Please let our lord say to your servants before you that they should seek out a man who knows how to play the lyre; and when a harmful spirit from God is upon you[a], he will play with his hand, and it will be well for you.
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from God'; Hebrew 'an evil/harmful spirit of/from God.'
    reason: alternative_reading
