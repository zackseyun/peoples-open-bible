    text: O 'esclavos'. El griego δοῦλοι puede significar 'siervos' o 'esclavos' según el contexto; aquí se prefiere 'siervos' por el contexto de servicio en la corte real, aunque la otra posibilidad sigue siendo léxicamente válida.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige la principal desviación respecto del expediente POB: el griego δοῦλοι debe representarse en el texto principal de acuerdo con la decisión contextual documentada (''servants''), no con la alternativa (''slaves''). Se mantiene esa alternativa en nota. Además, se mejora la naturalidad del español con ''te trate injustamente'' y ''más bien'', sin alterar el sentido fuente.'
