translation:
  language: es
  text: 'Así han llegado a ser para ti aquellos con quienes trabajaste: tus mercaderes desde tu juventud. Cada uno anda por su propio lado[a]; no hay quien te salve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno a su propio lado», «cada uno en su propia dirección» o «cada uno al otro lado de su camino». La expresión hebrea es breve y puede subrayar más la dispersión que un destino específico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: Introduce el resultado de lo anterior con una inferencia natural en español, manteniendo el valor consecutivo del hebreo sin volverlo demasiado interpretativo.
- source_word: הָיוּ לָךְ
  english_pob_choice: have ... become to you
  chosen_spanish: les ha sucedido a los que contigo se fatigaron
  alternatives_spanish:
  - han llegado a ser para ti
  - te han resultado
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante; en español, 'les ha sucedido' comunica ese giro de resultados, y el complemento relacional 'contigo se fatigaron' conserva la idea de relación/participación en el esfuerzo.
- source_word: אֲשֶׁר יָגַעַתְּ
  english_pob_choice: those with whom you labored
  chosen_spanish: los que contigo se fatigaron
  alternatives_spanish:
  - aquellos con quienes trabajaste
  - los que tú agotaste
  lexicon: HALOT
  rationale: יגע indica fatigarse o trabajar con esfuerzo. 'Contigo se fatigaron' evita una lectura demasiado causal y conserva la relación estrecha entre la destinataria y esos agentes comerciales.
- source_word: סֹחֲרַיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus mercaderes
  alternatives_spanish:
  - tus comerciantes
  - tus negociantes
  lexicon: HALOT
  rationale: '''סֹחֵר'' es el término de comerciante/mercader; ''mercaderes'' es claro y digno en español bíblico sin forzar un tecnicismo.'
- source_word: מִנְּעוּרַיִךְ
  english_pob_choice: from your youth
  chosen_spanish: desde tu juventud
  alternatives_spanish:
  - desde que eras joven
  - de tu temprana vida
  lexicon: HALOT
  rationale: La expresión temporal mantiene la idea de una relación comercial antigua y prolongada, con una formulación natural en español.
- source_word: אִישׁ לְעֶבְרוֹ
  english_pob_choice: Each one wanders to his own quarter
  chosen_spanish: Cada uno anda por su propio lado
  alternatives_spanish:
  - Cada uno se va a su lado
  - Cada uno anda en su propia dirección
  - Cada uno cruza hacia su lado
  lexicon: HALOT
  rationale: El hebreo es conciso y admite varias direcciones de sentido ('lado', 'dirección', 'cruce'). 'Por su propio lado' preserva la dispersión sin decidir indebidamente una localización concreta.
- source_word: תָּעוּ
  english_pob_choice: wanders
  chosen_spanish: anda
  alternatives_spanish:
  - vaga
  - se extravía
  lexicon: HALOT
  rationale: Con sujeto distributivo singular en español, 'anda' expresa el movimiento disperso y no coordinado; evita una connotación moral excesiva que 'se extravía' podría introducir aquí.
- source_word: אֵין מוֹשִׁיעֵךְ
  english_pob_choice: there is no one to save you
  chosen_spanish: no hay quien te salve
  alternatives_spanish:
  - no hay quien te rescate
  - no tienes salvador
  lexicon: HALOT
  rationale: מוֹשִׁיעַ se refiere al que salva/libera; 'no hay quien te salve' mantiene la fuerza completa de impotencia y la resonancia bíblica de salvación sin añadir más de lo que el verso dice.
theological_decisions:
- issue: Modo de expresar מוֹשִׁיעֵךְ sin borrar su peso de liberación
  english_pob_reading: there is no one to save you
  chosen_spanish_reading: no hay quien te salve
  alternative_spanish_readings:
  - no hay quien te rescate
  - no hay salvador para ti
  rationale: '''Salvar'' preserva el valor amplio del verbo hebreo y su eco teológico, mientras que ''rescatar'' estrecha más el campo semántico hacia liberación puntual. Aquí el contexto denuncia la impotencia total de Babilonia, por lo que la formulación negativa mantiene el énfasis del original.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without paraphrase.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'region' a 'quarter' para acercarse mejor a la idea de lado/dirección en לעברו. La redacción española adopta esa misma cautela semántica con 'por su propio lado', evitando precisar un destino no explícito.
  spanish_consistency_notes:
  - Se mantuvo 'mercaderes' para סֹחֲרַיִךְ por consistencia con el campo económico del pasaje.
  - Se prefirió 'salve' para מוֹשִׁיעֵךְ por coherencia con la elección inglesa 'save' y por su amplitud semántica.
  - La nota al pie se ancla en 'lado' para reflejar la ambigüedad del hebreo לעברו sin sobrecargar el texto principal.
