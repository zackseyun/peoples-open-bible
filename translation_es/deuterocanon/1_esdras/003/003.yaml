translation:
  language: es
  text: Y comieron y bebieron, y cuando quedaron llenos[a], se retiraron[b]. Pero Darío el rey entró en su cámara y durmió, y luego despertó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo quedado satisfechos». El participio griego ἐμπλησθέντες expresa de forma concreta estar llenos después de comer y beber.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se apartaron». El verbo griego ἀνέλυσαν probablemente significa aquí que la compañía se disolvió y se fue después de la comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - cenaron
  - banquetearon
  lexicon: LSJ
  rationale: Aorist narrative of ἐσθίω. «Comieron» es el equivalente más natural y directo en español sin añadir el matiz de banquete que no está explícito en el verbo.
- source_word: ἐπίοσαν
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - estuvieron bebiendo
  lexicon: LSJ
  rationale: Aorist de πίνω en secuencia narrativa. «Bebieron» conserva la simplicidad y el paralelismo con «comieron».
- source_word: ἐμπλησθέντες
  english_pob_choice: when they were filled
  chosen_spanish: cuando quedaron satisfechos
  alternatives_spanish:
  - habiendo quedado llenos
  - cuando estuvieron saciados
  lexicon: LSJ
  rationale: El participio indica estar llenos/saciados después de comer y beber. «Quedaron satisfechos» reproduce la idea de plenitud de manera natural en español, aunque también puede leerse literalmente como saciedad física.
- source_word: ἀνέλυσαν
  english_pob_choice: they departed
  chosen_spanish: se retiraron
  alternatives_spanish:
  - partieron
  - se dispersaron
  lexicon: LSJ
  rationale: En este contexto el verbo expresa que la compañía se deshizo o se fue tras la comida. «Se retiraron» comunica esa salida colectiva con registro natural y respetuoso.
- source_word: κοιτῶνα
  english_pob_choice: bedchamber
  chosen_spanish: cámara
  alternatives_spanish:
  - alcoba
  - dormitorio
  lexicon: LSJ
  rationale: El término designa un aposento para dormir; en español, «cámara» mantiene un registro cortesano/real adecuado al contexto de Darío sin sonar excesivamente moderno.
- source_word: ἐκοιμήθη
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se quedó dormido
  - se durmió
  lexicon: LSJ
  rationale: El aoristo de κοιμάω aquí significa simplemente dormir. «Durmió» es breve, natural y conserva la secuencia narrativa con el verbo siguiente.
- source_word: ἔξυπνος ἐγένετο
  english_pob_choice: then awoke
  chosen_spanish: luego despertó
  alternatives_spanish:
  - despertó
  - se hizo despierto
  lexicon: LSJ
  rationale: Literalmente «llegó a estar despierto». «Luego despertó» mantiene la sucesión de acciones en un español fluido sin perder el valor de resultado del griego.
- source_word: ὁ δὲ Δαρεῖος ὁ βασιλεύς
  english_pob_choice: But Darius the king
  chosen_spanish: Pero Darío el rey
  alternatives_spanish:
  - Y Darío el rey
  - Ahora Darío el rey
  lexicon: LSJ
  rationale: δέ introduce un giro leve desde el grupo hacia Darío. «Pero» refleja mejor ese cambio de foco que «y», sin exagerar la oposición.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron cambios sustantivos; la única decisión principal de estilo fue elegir equivalentes españoles naturales para las acciones sucesivas y para el aposento real de Darío, manteniendo la saciedad explícita del participio griego.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia narrativa simple del griego: comer, beber, quedar satisfechos, retirarse; luego entrar, dormir y despertar.'
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - «Darío el rey» conserva el orden del original y el tono narrativo del texto helenístico.
