translation:
  language: es
  text: La ira del rey es como el gruñido de un león joven[a], pero su favor[b] es como el rocío sobre la hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rugido de un león joven».
    reason: lexical_alternative
  - marker: b
    text: O «su buena voluntad» o «su placer».
    reason: lexical_alternative
lexical_decisions:
- source_word: נַהַם
  english_pob_choice: growling
  chosen_spanish: rugido
  alternatives_spanish:
  - gruñido
  - rugido de un joven león
  lexicon: HALOT
  rationale: El hebreo expresa un sonido amenazante de un león joven. En español, «rugido» comunica bien la fuerza del cuadro; «gruñido» puede sonar demasiado doméstico o débil para el tono proverbial. Mantiene la opción alternativa documentada en inglés sin forzar una calca.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: leoncillo
  alternatives_spanish:
  - joven león
  - león joven
  - cachorro de león
  lexicon: HALOT
  rationale: El referente es un león joven, pero la imagen en español fluye mejor con «leoncillo», que conserva la idea de juventud y peligro implícito. «León joven» sería más literal, aunque menos natural en este proverbio.
- source_word: זַעַף
  english_pob_choice: wrath
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - furor
  - ira encendida
  lexicon: HALOT
  rationale: La palabra hebrea denota una ira fuerte, pero en español «enojo del rey» suena natural y sostiene el paralelo con «favor» sin sobrerrecrudir el tono. «Ira» y «furor» son posibles, pero pueden cargar más el registro que el hebreo exige aquí.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: Traducción directa y adecuada al contexto sapiencial y político del proverbio.
- source_word: וּכְטַל
  english_pob_choice: but his favor is like dew
  chosen_spanish: pero su favor es como el rocío
  alternatives_spanish:
  - y su favor es como rocío
  - pero su benevolencia es como el rocío
  lexicon: HALOT
  rationale: El hebreo introduce una comparación paralela; en español, «pero» hace explícito el contraste implícito de la coordenada waw, como en la tradición auditada en inglés. «Rocío» preserva la imagen refrescante y benéfica.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: «Sobre» reproduce de forma natural la relación espacial de la imagen poética y suena más fluido que «en».
- source_word: עֵשֶׂב
  english_pob_choice: grass
  chosen_spanish: la hierba
  alternatives_spanish:
  - el pasto
  - la yerba
  - el césped
  lexicon: HALOT
  rationale: «Hierba» es el equivalente más amplio y bíblicamente transparente para la vegetación baja sobre la que cae el rocío. «Pasto» o «césped» serían más limitados regionalmente.
- source_word: רְצוֹנוֹ
  english_pob_choice: his favor
  chosen_spanish: su favor
  alternatives_spanish:
  - su goodwill
  - su beneplácito
  - su placer
  lexicon: HALOT
  rationale: En contexto de rey, el sustantivo expresa favor o benevolencia. «Favor» es la mejor correspondencia en español y mantiene el paralelismo con la ira/enojo del rey. No se adopta «beneplácito» porque suena más técnico y menos proverbial.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se detectan revisiones sustantivas aplicadas en la pasada más reciente. La versión española sigue ese mismo perfil, conservando la antítesis entre la ira real y el favor benévolo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se opta por un registro proverbial natural en español, sin sustituir el paralelo poético por una explicación.
  - «Favor» se conserva como término relacional/político, no como mero sentimiento interno.
  - La imagen de «rocío sobre la hierba» se mantiene literal por ser clara y poéticamente estable en español.
