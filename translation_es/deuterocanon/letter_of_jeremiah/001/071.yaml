review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del audit trail inglés: la decadencia de los materiales sobre los ídolos demuestra que no son dioses, luego ellos mismos terminan consumidos y en vergüenza pública. Sin embargo, «Desde la púrpura...» suena poco natural para ἀπό aquí; en español conviene «Por la púrpura... se conocerá» o equivalente probatorio. También «se pudren» con sujeto coordinado «púrpura y mármol» resulta algo extraño porque «mármol» no se pudre literalmente; el griego usa una sola imagen de deterioro, y en español «se deterioran» o «se corrompen» evita tropiezo innecesario sin perder fuerza.'
  spanish_quality_summary: 'El texto es legible y digno, pero necesita un pequeño ajuste de naturalidad y precisión idiomática. «Por la púrpura y el mármol que se deterioran sobre ellos...» fluye mejor que «Desde la púrpura... que se pudren». El resto está bien: «dioses», «serán comidos», «oprobio» y «en la tierra» son defendibles. La nota al pie está bien anclada y clara.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dioses» corresponde a θεοί. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Oprobio» conserva bien ὄνειδος. «Serán comidos» respeta la literalidad de βρωθήσονται, con la alternativa correctamente documentada en nota.
  issues:
  - severity: medium
    issue: «Desde la púrpura» no refleja bien el valor probatorio de ἀπό en este contexto
    rationale: Aquí ἀπό introduce la evidencia por la cual se reconocerá algo. En español, «Por la púrpura...» o «A partir de la púrpura...» funciona mejor que «Desde la púrpura», que suena espacial o de origen físico.
  - severity: medium
    issue: «Que se pudren» aplicado a «púrpura y mármol» suena torpe en español
    rationale: Aunque el griego usa una imagen unificada de deterioro, en español «mármol que se pudre» choca más de lo necesario. «Se deterioran» preserva el sentido visible de decadencia sin introducir una rareza que distraiga al lector.
  - severity: low
    issue: Hay un desliz en la justificación léxica de βρωθήσονται
    rationale: La nota interna dice «βιβλίos? No», lo cual parece un artefacto editorial. No afecta el texto bíblico, pero indica que la entrada léxica debería limpiarse en el YAML si se va a conservar.
  revised_spanish_text: Por la púrpura y el mármol que se deterioran sobre ellos se conocerá que no son dioses; y al final ellos mismos serán comidos[a], y serán un oprobio en la tierra.
