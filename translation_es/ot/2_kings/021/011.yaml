translation:
  language: es
  text: Porque Manasés, rey de Judá, ha hecho estas abominaciones, y ha hecho más maldad que todos los amorreos que fueron antes que él, y también ha hecho pecar a Judá con sus ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término despectivo para «ídolos»; alternativamente, «ídolos inmundos» o, de forma más vívida, «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La partícula causal introduce el fundamento del juicio anunciado; «Porque» es natural en español y conserva la relación de causa sin añadir matices inexistentes.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha cometido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta acciones consumadas con relevancia en la acusación profética; «ha hecho» mantiene esa fuerza y permite la repetición verbal del versículo.
- source_word: מְנַשֶּׁה מֶלֶךְ יְהוּדָה
  english_pob_choice: Manasseh king of Judah
  chosen_spanish: Manasés, rey de Judá
  alternatives_spanish:
  - Manasés, el rey de Judá
  - Manasés, rey judío
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración usual española y el título en aposición directa, sin explicitar más de lo que dice el hebreo.
- source_word: הַתֹּעֵבוֹת הָאֵלֶּה
  english_pob_choice: these abominations
  chosen_spanish: estas abominaciones
  alternatives_spanish:
  - estas cosas abominables
  - estas detestables acciones
  lexicon: HALOT
  rationale: «Abominaciones» preserva el peso profético y cultual del término תּוֹעֵבָה, ya asentado en el registro bíblico español y fiel al juicio moral del texto.
- source_word: הֵרַע
  english_pob_choice: doing more evil
  chosen_spanish: ha hecho más mal
  alternatives_spanish:
  - ha hecho más maldad
  - ha actuado peor
  lexicon: HALOT
  rationale: El verbo expresa conducta peor o más malvada; «ha hecho más mal» conserva el comparativo con lenguaje claro y sobrio, sin forzar un giro interpretativo.
- source_word: מִכֹּל אֲשֶׁר עָשׂוּ
  english_pob_choice: than all ... did
  chosen_spanish: que todos los amorreos que hicieron
  alternatives_spanish:
  - que todos los amorreos que habían hecho
  - que todos los amorreos que hicieron antes de él
  lexicon: HALOT
  rationale: La comparación exige en español una cláusula explícita; se mantiene la referencia a los amorreos como precedente colectivo, tal como lo hace el texto fuente y la lectura auditada en inglés.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular morfológico, funciona colectivamente; el plural español es el equivalente idiomático para el pueblo mencionado.
- source_word: אֲשֶׁר לְפָנָיו
  english_pob_choice: who were before him
  chosen_spanish: que fueron antes que él
  alternatives_spanish:
  - que lo precedieron
  - que estaban antes de él
  lexicon: HALOT
  rationale: La frase indica precedencia temporal; «antes que él» reproduce el sentido de forma natural y evita añadir localización espacial no expresada.
- source_word: וַיַּחֲטִא גַם אֶת יְהוּדָה
  english_pob_choice: and has also caused Judah to sin
  chosen_spanish: y también ha hecho pecar a Judá
  alternatives_spanish:
  - y también ha causado que Judá peque
  - y también llevó a Judá al pecado
  lexicon: HALOT
  rationale: El Hifil de חטא es causativo; «ha hecho pecar» conserva esa fuerza de manera directa y transparente en español, mejor que una formulación meramente resultativa.
- source_word: בְּגִלּוּלָיו
  english_pob_choice: with his idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - por medio de sus ídolos
  - con sus ídolos inmundos
  - con sus ídolos repugnantes
  lexicon: HALOT
  rationale: Se conserva la referencia instrumental/associativa del prefijo ב con un español simple. El matiz despectivo de גִּלּוּלִים se explica en la nota textual, evitando sobrecargar el verso principal.
theological_decisions:
- issue: Término despectivo גִּלּוּלִים para ídolos
  english_pob_reading: idols
  chosen_spanish_reading: ídolos
  alternative_spanish_readings:
  - ídolos inmundos
  - ídolos repugnantes
  - ídolos de estiércol
  rationale: El main text mantiene la claridad y lectura pública con «ídolos», mientras la nota preserva el valor peyorativo del hebreo sin introducir un coloquialismo excesivo en la línea principal.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió de nuevo el segundo «ha hecho» para reflejar con mayor precisión la repetición verbal del hebreo. Esta versión española refleja esa repetición con «ha hecho... y ha hecho...», y conserva la causalidad, la comparación y el causativo de חטא sin suavizarlos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención POB cuando aparezca el Nombre divino; en este versículo no ocurre.
  - «Abominaciones» conserva el valor cultual-moral fuerte de תּוֹעֵבָה.
  - Se usa el plural español «los amorreos» por equivalencia idiomática, aunque el hebreo tenga forma singular colectiva.
  - «Ha hecho pecar» reproduce el causativo del hebreo mejor que «condujo al pecado» en este contexto.
  - La nota del término peyorativo en los ídolos preserva la tensión lexical sin recargar el texto principal.
