    text: 'O: «fueron considerados descalificados del sacerdocio» o «fueron tenidos por impuros para el sacerdocio». El verbo hebreo puede expresar que se los trató como no aptos para el estado sacerdotal porque no pudo verificarse su genealogía.'
    reason: lexical_alternative
