  alternatives:
  - the wind was moving
  - the spirit was flying
  lexicon: Lewis & Short
  rationale: This echoes creation language and likely reflects a Semitic background akin to hovering over the waters; 'hovering' is the most fitting English choice.
- source_word: thesauris tuis
