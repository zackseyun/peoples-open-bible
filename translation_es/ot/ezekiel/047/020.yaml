translation:
  language: es
  text: Y el lado occidental[a] será el Gran Mar, desde el límite hasta enfrente de Lebo-hamat[b]. Este es el lado occidental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente ‘lado del mar’; en la geografía de Israel esto designa el lado occidental, frente al mar Mediterráneo (‘el Gran Mar’).
    reason: cultural_note
  - marker: b
    text: Hebreo Lebo-hamat; tradicionalmente se entiende como ‘la entrada de Hamat’, y aquí probablemente funciona como nombre de lugar en el extremo septentrional de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְאַת יָם
  english_pob_choice: And the west side
  chosen_spanish: Y el lado occidental
  alternatives_spanish:
  - Y el lado del mar
  - Y el lado del oeste
  lexicon: HALOT
  rationale: פְּאָה significa ‘lado, borde, extremo’. En descripciones de límites, la combinación con יָם apunta al lado occidental; en español, ‘lado occidental’ comunica de manera natural la orientación geográfica sin perder el valor direccional del hebreo.
- source_word: הַ/יָּם הַ/גָּדוֹל
  english_pob_choice: the Great Sea
  chosen_spanish: el Gran Mar
  alternatives_spanish:
  - el gran mar
  - el mar Mediterráneo
  lexicon: HALOT
  rationale: La expresión hebrea es el nombre tradicional del Mediterráneo. Se conserva la forma más cercana al original, ‘Gran Mar’, en lugar de sustituirla por un glosado interpretativo.
- source_word: מִ/גְּבוּל
  english_pob_choice: from the border
  chosen_spanish: desde el límite
  alternatives_spanish:
  - desde la frontera
  - a partir del límite
  lexicon: HALOT
  rationale: גְּבוּל designa el borde o línea de demarcación territorial. ‘Límite’ es natural en español bíblico y mantiene el sentido de extensión geográfica.
- source_word: עַד נֹכַח
  english_pob_choice: up to opposite
  chosen_spanish: hasta enfrente de
  alternatives_spanish:
  - hasta opuesto a
  - hasta frente a
  lexicon: HALOT
  rationale: 'נֹכַח tiene aquí valor espacial: ‘enfrente de, opuesto a’. ‘Hasta enfrente de’ conserva la relación direccional de la fórmula de fronteras sin añadir elementos no presentes en el hebreo.'
- source_word: לְבֹא חֲמָת
  english_pob_choice: Lebo-hamath
  chosen_spanish: Lebo-hamat
  alternatives_spanish:
  - la entrada de Hamat
  - Lebo-hamat
  lexicon: HALOT
  rationale: La expresión puede funcionar como topónimo en fórmulas limítrofes, aunque literalmente significa ‘entrada de Hamat’. Se mantiene transliterada como nombre geográfico reconocido.
- source_word: זֹאת פְּאַת יָם
  english_pob_choice: This is the west side
  chosen_spanish: Este es el lado occidental
  alternatives_spanish:
  - Este es el lado del mar
  - Esta es la parte occidental
  lexicon: HALOT
  rationale: La cláusula concluye y resume la descripción del límite. En español, ‘Este es’ refleja bien la fórmula demostrativa, y ‘lado occidental’ transmite el sentido geográfico de פְּאַת יָם.
translation_notes:
  revision_awareness: El texto coincide con el sentido del borrador inglés auditado y no requiere cambios sustantivos; se preserva la estructura de fórmula territorial y la transliteración de Lebo-hamat.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - ‘Gran Mar’ se conserva como designación bíblica tradicional y como equivalente directo del hebreo.
  - ‘Lado occidental’ evita el calco demasiado literal ‘lado del mar’ en el texto principal; ese matiz queda explicado en nota.
  - La transliteración ‘Lebo-hamat’ mantiene la forma de nombre propio reconocible y evita sobrerrecrear la etimología en el cuerpo del texto.
