translation:
  language: es
  text: Un resto[a] quedó para Judá, y para la casa de David un gobernante. Algunos de ellos hicieron lo recto, pero algunos aumentaron mucho la apostasía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «algunos de ellos multiplicaron pecados». El hebreo dice más con fuerza, «apostasia/traición».'
    reason: alternative_reading
lexical_decisions:
- source_word: וישאר
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejado
  - permaneció
  lexicon: HALOT
  rationale: El hebreo expresa un resultado pasivo de permanecer/restar. «Quedó» es natural en español y conserva la idea de resto sin añadir agente.
- source_word: ליהודה
  english_pob_choice: to Judah
  chosen_spanish: para Judá
  alternatives_spanish:
  - a Judá
  - de Judá
  lexicon: HALOT
  rationale: En el contexto de supervivencia dinástica, «para» comunica bien la relación de destino/beneficio implícita en la cláusula pasiva, sin perder el valor relacional del hebreo.
- source_word: מזער
  english_pob_choice: a remnant
  chosen_spanish: un resto
  alternatives_spanish:
  - un remanente
  - unos pocos
  lexicon: HALOT
  rationale: El término apunta a una cantidad pequeña o sobrante. «Resto» es idiomático en español bíblico y evita sobrecargar con una interpretación más técnica que no exige el contexto.
- source_word: בית דוד
  english_pob_choice: the house of David
  chosen_spanish: la casa de David
  alternatives_spanish:
  - la dinastía de David
  - la casa davídica
  lexicon: HALOT
  rationale: Se conserva la expresión dinástica tradicional del texto fuente. «Casa de David» mantiene el paralelismo y la referencia al linaje real.
- source_word: קצין
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un príncipe
  - un jefe
  - un líder
  lexicon: HALOT
  rationale: El término designa a alguien con autoridad; «gobernante» es amplio y claro en español, sin imponer un rango más específico que el hebreo no determina.
- source_word: עשו יושר
  english_pob_choice: did what was right
  chosen_spanish: hicieron lo recto
  alternatives_spanish:
  - actuaron con rectitud
  - practicaron la rectitud
  lexicon: HALOT
  rationale: La locución combina hacer + rectitud/uprightness. «Hicieron lo recto» reproduce la sencillez del original y su sentido moral.
- source_word: הפליאו
  english_pob_choice: greatly increased
  chosen_spanish: aumentaron mucho
  alternatives_spanish:
  - se excedieron grandemente
  - multiplicaron mucho
  lexicon: HALOT
  rationale: El verbo intensifica la acción; la revisión inglesa optó por una formulación más natural sin perder fuerza. «Aumentaron mucho» conserva esa intensificación y encaja bien con el objeto abstracto siguiente.
- source_word: מעל
  english_pob_choice: apostasy
  chosen_spanish: apostasía
  alternatives_spanish:
  - traición
  - infidelidad
  - pecado
  lexicon: HALOT
  rationale: Aunque el griego paralelo amplía a «pecados», el hebreo usa un término de ruptura de fidelidad. «Apostasía» preserva ese matiz de infidelidad pactal, más fuerte que un pecado genérico.
theological_decisions:
- issue: Tensión entre el hebreo y el paralelo griego sobre el último hemistiquio
  english_pob_reading: 'Some of them greatly increased apostasy; Greek parallel: some of them multiplied sins.'
  chosen_spanish_reading: algunos aumentaron mucho la apostasía
  alternative_spanish_readings:
  - algunos multiplicaron los pecados
  - algunos aumentaron mucho sus pecados
  - algunos se apartaron gravemente
  rationale: La base hebrea es prioritaria donde está disponible y usa מעל, término de infidelidad/traición. El paralelo griego ofrece la lectura más amplia «pecados». La traducción principal mantiene la fuerza covenantal del hebreo y deja constancia del matiz alternativo en nota.
  doctrine_reference: 'Principio POB: primacía de la fuente original con preservación de tensiones textuales'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que pasó de «greatly multiplied apostasy» a «greatly increased apostasy» por naturalidad; en español se reflejó con «aumentaron mucho» para conservar el valor intensivo sin calco incómodo.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» según corresponda, pero este versículo no lo requiere.
  - «Apostasía» se mantuvo para מעל por coherencia con el valor de infidelidad pactal documentado en la auditoría inglesa.
  - La nota de pie conserva la tensión hebreo/griego en lugar de resolverla por armonización.
