translation:
  language: es
  text: Y de ellos tomarás algunos más[a], y los arrojarás en medio del fuego, y los quemarás en el fuego. De él saldrá un fuego a toda la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De allí saldrá un fuego», con el sufijo singular probablemente referido al fuego recién mencionado; algunos entienden, menos probablemente, «De ellos saldrá un fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  english_pob_choice: And from them
  chosen_spanish: Y de ellos
  alternatives_spanish:
  - Y de entre ellos
  - Y de ahí
  lexicon: HALOT
  rationale: La preposición מן con pronombre señala origen o separación partitiva. «De ellos» conserva ese valor básico en español y mantiene el enlace con el grupo previamente reservado.
- source_word: ע֣וֹד
  english_pob_choice: some more
  chosen_spanish: aún más
  alternatives_spanish:
  - todavía más
  - algo más
  lexicon: HALOT
  rationale: Aquí עוֹד aporta la idea de adición respecto de una porción ya tomada. «Aún más» transmite esa suma adicional con naturalidad en español.
- source_word: תִּקָּ֔ח
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - deberás tomar
  - vas a tomar
  lexicon: HALOT
  rationale: El imperfecto 2ms en una instrucción profética se puede verter con futuro de mandato en español. «Tomarás» conserva el tono directivo sin sobreexplicar.
- source_word: וְהִשְׁלַכְתָּ֤
  english_pob_choice: and throw
  chosen_spanish: y los arrojarás
  alternatives_spanish:
  - y los echarás
  - y los lanzarás
  lexicon: HALOT
  rationale: El verbo hiphil de שלך expresa arrojar/castar. «Arrojarás» es fiel, claro y suficientemente fuerte para el acto simbólico descrito.
- source_word: אֶל תּ֣וֹךְ הָאֵ֔שׁ
  english_pob_choice: into the midst of the fire
  chosen_spanish: en medio del fuego
  alternatives_spanish:
  - dentro del fuego
  - al centro del fuego
  lexicon: HALOT
  rationale: תוך enfatiza interioridad o centro. «En medio del fuego» reproduce bien la imagen idiomática del hebreo y evita aplanarla a «dentro».
- source_word: וְשָׂרַפְתָּ֥ אֹתָ֖ם בָּאֵ֑שׁ
  english_pob_choice: and burn them in the fire
  chosen_spanish: y los quemarás en el fuego
  alternatives_spanish:
  - y los incendiarás con fuego
  - y los quemarás con fuego
  lexicon: HALOT
  rationale: שׂרף significa quemar. Con בָּאֵשׁ, «en el fuego» mantiene la locución concreta del texto y evita una paráfrasis innecesaria.
- source_word: מִמֶּנּוּ
  english_pob_choice: From it
  chosen_spanish: De él
  alternatives_spanish:
  - De allí
  - De eso
  lexicon: HALOT
  rationale: El sufijo singular masculino apunta más naturalmente al fuego mencionado inmediatamente antes. «De él» conserva esa referencia singular y la tensión interpretativa del pasaje.
- source_word: תֵצֵא אֵשׁ
  english_pob_choice: a fire will go out
  chosen_spanish: saldrá un fuego
  alternatives_spanish:
  - saldrá fuego
  - brotará un fuego
  lexicon: HALOT
  rationale: יצא literalmente es salir. «Saldrá un fuego» conserva la imagen de procedencia o emanación del fuego sin añadir matices no presentes en el hebreo.
- source_word: אֶל כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: to all the house of Israel
  chosen_spanish: a toda la casa de Israel
  alternatives_spanish:
  - para toda la casa de Israel
  - sobre toda la casa de Israel
  lexicon: HALOT
  rationale: אֶל se vierte aquí con «a», como dirección de alcance. «Casa de Israel» se mantiene como expresión covenantal y colectiva, sin sustituirla por una formulación más interpretativa.
theological_decisions:
- issue: Sentido del fuego que sale de lo quemado
  english_pob_reading: The verse depicts judgment spreading from this act to the whole house of Israel.
  chosen_spanish_reading: El verso presenta el juicio propagándose desde este acto hacia toda la casa de Israel.
  alternative_spanish_readings:
  - El fuego sale específicamente del resto quemado
  - El fuego sale del fuego simbólico, no necesariamente de los cabellos quemados
  rationale: El hebreo permite que el sufijo de מִמֶּנּוּ se vincule de manera natural al fuego recién mencionado, sin resolver mecánicamente la mecánica simbólica. La traducción mantiene esa imagen abierta mientras conserva el alcance judicial del anuncio.
  doctrine_reference: Preservar la tensión exegética sin forzar una precisión no explícita en el texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final del POB inglés: se prefirió una formulación de alcance neutral («a toda la casa de Israel») en lugar de una lectura más interpretativa. También se conserva la ambigüedad de מִמֶּנּוּ con una nota alternativa, en línea con el expediente auditado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se mantuvo «casa de Israel» para respetar la expresión nacional-covenantal del hebreo.
  - No se introdujo léxico tradicional eclesiástico que altere el valor verbal o imagético del pasaje.
