review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y la mayoría de las decisiones del POB: la protesta modal inicial, la comparación con un hombre aturdido y un guerrero incapaz de salvar, la presencia de Yahvé en medio del pueblo, y la súplica final de no abandonarlos. Sin embargo, en וְשִׁמְךָ עָלֵינוּ נִקְרָא el español ''tu nombre es invocado sobre nosotros'' cambia el sentido principal de la fórmula de pertenencia (''tu nombre es llamado sobre nosotros'') hacia ''invocación'', que sugiere apelación cultual más que identificación pactal. Además, la nota al pie repite ese mismo giro literal incorrecto.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. '¿Por qué habrías de ser...?' y 'Sin embargo, tú estás en medio de nosotros' funcionan bien. 'No nos abandones' es natural y fiel. La principal mejora necesaria es reemplazar 'es invocado sobre nosotros' por una formulación que preserve mejor la imagen hebrea sin sonar forzada; 'tu nombre es llamado sobre nosotros' funciona, con nota idiomática para 'se nos llama por tu nombre'.
  glossary_alignment: Se respeta correctamente 'Yahvé' para יְהוָה y el resto de la terminología principal. No hay conflicto con las pautas de Mesías/Cristo, espíritu, carne, etc. El único desajuste léxico relevante es la fórmula de nombre/pacto, donde debe evitarse 'invocado' porque no corresponde a la decisión auditada del POB.
  issues:
  - severity: medium
    issue: La cláusula 'tu nombre es invocado sobre nosotros' no preserva fielmente וְשִׁמְךָ עָלֵינוּ נִקְרָא.
    rationale: El hebreo usa el verbo 'ser llamado' sobre alguien como fórmula de pertenencia/identificación. 'Invocado' introduce la idea de invocación o apelación, distinta de la imagen base y de la decisión documentada del POB.
  - severity: medium
    issue: La nota al pie literaliza incorrectamente la expresión con 'tu nombre es invocado sobre nosotros'.
    rationale: La nota debe conservar la alternativa idiomática española y explicar que literalmente es 'tu nombre es llamado sobre nosotros', no 'invocado'.
  revised_spanish_text: ¿Por qué habrías de ser como un hombre aturdido, como un guerrero que no puede salvar? Sin embargo, tú estás en medio de nosotros, Yahvé, y tu nombre es llamado sobre nosotros[a]; no nos abandones.
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente: “se nos llama por tu nombre”. Literalmente: “tu nombre es llamado sobre nosotros”.'
    reason: lexical_alternative
  revision_rationale: Se corrige la fórmula pactal para reflejar el verbo hebreo 'ser llamado' y alinearse con la decisión lexical/theológica del POB, manteniendo en nota la alternativa idiomática natural en español. No se requieren otros cambios.
