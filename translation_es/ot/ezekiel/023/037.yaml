translation:
  language: es
  text: Porque cometieron adulterio, y hay sangre en sus manos; con sus ídolos cometieron adulterio, y aun a sus hijos, que habían dado a luz para mí[b], los hicieron pasar por el fuego[a] a ellos como alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo, literalmente, «hicieron pasar»; en este contexto la expresión alude al sacrificio de niños, tradicionalmente entendido como hacerlos pasar por el fuego.
    reason: cultural_note
  - marker: b
    text: O «que me habían dado a luz». El hebreo dice literalmente «que dieron a luz para/a mí» y expresa la reclamación de Yahvé sobre esos hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִאֵפוּ
  english_pob_choice: have committed adultery
  chosen_spanish: cometieron adulterio
  alternatives_spanish:
  - han cometido adulterio
  - fueron adúlteros
  - cometieron inmoralidad sexual
  lexicon: HALOT
  rationale: El hebreo נאף denota adulterio de forma directa. En Ezequiel conserva además la fuerza metafórica de infidelidad del pacto. «Cometieron adulterio» mantiene ese valor profético sin diluirlo en una generalización moral.
- source_word: דָם בִּידֵיהֶן
  english_pob_choice: blood is on their hands
  chosen_spanish: sangre hay sobre sus manos
  alternatives_spanish:
  - la sangre está en sus manos
  - sus manos están llenas de sangre
  - hay sangre en sus manos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para culpa de sangre. «Sangre hay sobre sus manos» conserva el sentido legal-moral y suena natural en español sin perder la imagen corporal del original.
- source_word: גִּלּוּלֵיהֶן
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos abominables
  - sus ídolos inmundos
  - sus ídolos de estiércol
  lexicon: HALOT
  rationale: El sustantivo es el término despectivo de Ezequiel para los ídolos. En el texto principal, «ídolos» comunica el referente con claridad; el matiz peyorativo queda como tensión contextual, sin añadir una glosa que vuelva pesado el verso.
- source_word: וְאֶת גִּלּוּלֵיהֶן נִאֵפוּ
  english_pob_choice: they have committed adultery with their idols
  chosen_spanish: con sus ídolos cometieron adulterio
  alternatives_spanish:
  - cometieron adulterio con sus ídolos
  - cometieron adulterio por medio de sus ídolos
  - se hicieron adúlteros con sus ídolos
  lexicon: HALOT
  rationale: El hebreo vincula la acusación de adulterio con los ídolos como objeto de la infidelidad. El orden español «con sus ídolos cometieron adulterio» preserva la relación sin sonar forzado, y mantiene la paralelismo verbal del verso.
- source_word: בְּנֵיהֶן אֲשֶׁר יָלְדוּ לִי
  english_pob_choice: their sons, whom they bore to me
  chosen_spanish: a sus hijos, que me habían dado a luz
  alternatives_spanish:
  - a sus hijos, que habían dado a luz para mí
  - a sus hijos, que me habían engendrado
  - a sus hijos, a quienes habían dado a luz para mí
  lexicon: HALOT
  rationale: בנים es «hijos»/«varones»; aquí «hijos» comunica bien el referente familiar. «Me habían dado a luz» refleja la relación de pertenencia/custodia divina del hebreo לִי sin convertirla en una paráfrasis explicativa. Se evita «para mí» porque el inglés POB revisado optó por «to me», manteniendo la tensión de que fueron hijos dados a Yahvé.
- source_word: הֶעֱבִירוּ
  english_pob_choice: made ... pass through the fire
  chosen_spanish: los hicieron pasar por el fuego
  alternatives_spanish:
  - los hicieron pasar por el fuego como sacrificio
  - los ofrecieron pasándolos por el fuego
  - los hicieron atravesar el fuego
  lexicon: HALOT
  rationale: El verbo es el idiomático «hacer pasar». En este contexto cultual alude al sacrificio infantil; español debe conservar el giro base del original y permitir que el contexto y la nota expliciten el sentido sacrificial.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - a los ídolos
  - para los ídolos
  lexicon: HALOT
  rationale: El pronombre se refiere a los ídolos mencionados. «Para ellos» conserva la referencia dativa y evita decidir demasiado pronto entre destinatario y beneficio, aunque el contexto sacrificial apunta a ofrecerlos a los ídolos.
- source_word: לְאָכְלָה
  english_pob_choice: as food
  chosen_spanish: como alimento
  alternatives_spanish:
  - para alimento
  - como comida
  - para que los devoraran
  lexicon: HALOT
  rationale: El sustantivo expresa comida/consumo. «Como alimento» refleja el valor léxico básico y mantiene el estremecedor sentido sacrificial sin intensificarlo con un verbo interpretativo.
theological_decisions:
- issue: Si explicitar o no la idea de sacrificio infantil en el texto principal
  english_pob_reading: made their sons ... pass through the fire to them as food
  chosen_spanish_reading: los hicieron pasar por el fuego
  alternative_spanish_readings:
  - los hicieron pasar por el fuego como sacrificio
  - los ofrecieron al fuego
  - los entregaron para ser quemados
  rationale: El hebreo usa la fórmula cultual establecida «hacer pasar»; en este contexto el lector entiende la acusación de sacrificio infantil por la combinación de sangre, idolatría y alimento. Mantener la fórmula evita sobrerregularizar el verso y preserva la alusión técnica, mientras la nota puede aclarar el trasfondo.
  doctrine_reference: Principio de equivalencia óptima; preservar el peso teológico e histórico del lenguaje profético sin sobreparafrasear.
- issue: Cómo traducir la relación de los hijos con Dios en יָלְדוּ לִי
  english_pob_reading: whom they bore to me
  chosen_spanish_reading: que me habían dado a luz
  alternative_spanish_readings:
  - que habían dado a luz para mí
  - que me habían engendrado
  - que habían dado a luz a mí
  rationale: El hebreo afirma una relación personal/covenantal con Dios. «Me habían dado a luz» conserva esa vinculación y su extrañeza retórica; no se neutraliza a «para mí» porque el texto de origen conserva una cercanía posesiva que debe permanecer audible.
  doctrine_reference: Doctrina de la responsabilidad de pacto y de la profanación de lo consagrado a Yahvé.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en cuanto a reflejar el dativo final con «para ellos»/«to them» y mantener la fórmula cultual «hacer pasar por el fuego» sin convertirla en una paráfrasis. También conserva la secuencia retórica del hebreo: adulterio, sangre, adulterio con ídolos y sacrificio de los hijos.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo aquí usa formas pronominales y no el tetragrámaton explícito; la referencia divina queda en la nota b.
  - «Hijos» se conserva para בנים, en vez de «niños», porque el hebreo usa el término filial con fuerza de descendencia y pertenencia.
  - «Alimento» se eligió en lugar de «comida» por tono más bíblico y por corresponder al sustantivo de consumo/sustento sin añadir interpretación adicional.
  - No se incorporó el matiz insultante de גִּלּוּלִים al texto principal; se deja como tensión léxica reconocible en la acusación profética.
