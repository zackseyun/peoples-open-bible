  to: ¿Ves a un hombre[a] precipitado al hablar? Hay más esperanza para un necio que para él.
  rationale: Se ajusta una expresión algo rígida a un español más natural ('precipitado al hablar') sin apartarse del hebreo, y se completa la nota alternativa para reflejar fielmente la documentación del inglés POB sobre el perfecto inicial.
